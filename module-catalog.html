<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){var K="reasondx-user";function g(){var d=(location.pathname.match(/\//g)||[]).length-1,p="";for(var i=0;i<d;i++)p+="../";return p+"auth/login.html"}function a(){try{var u=localStorage.getItem(K);if(u){var j=JSON.parse(u);return j&&j.email&&j.name}}catch(e){}return false}if(!a()){sessionStorage.setItem("reasondx-redirect",location.href);location.replace(g())}})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Module Catalog | ReasonDx</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#059669;--primary-light:#10b981;--primary-bg:#ecfdf5;--text:#1e293b;--text2:#64748b;--text3:#94a3b8;--bg:#f8fafc;--card:#ffffff;--border:#e2e8f0;--radius:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.nav{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;position:sticky;top:0;z-index:100}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.nav-brand{font-size:22px;font-weight:700;color:var(--primary);text-decoration:none}
.nav-links{display:flex;gap:6px;flex-wrap:wrap}
.nav-link{padding:7px 14px;color:var(--text2);text-decoration:none;font-size:13px;font-weight:500;border-radius:8px;transition:all .2s}
.nav-link:hover{background:#f1f5f9;color:var(--text)}
.nav-link.active{background:var(--primary-bg);color:var(--primary)}

.hero{background:linear-gradient(135deg,#ecfdf5 0%,#f0fdf4 50%,#fff 100%);padding:48px 24px;text-align:center;border-bottom:1px solid var(--border)}
.hero h1{font-size:36px;font-weight:800;margin-bottom:8px}
.hero h1 span{color:var(--primary)}
.hero p{font-size:16px;color:var(--text2);max-width:600px;margin:0 auto 24px}
.hero-stats{display:flex;justify-content:center;gap:40px;flex-wrap:wrap}
.hs{text-align:center}
.hs-num{font-size:32px;font-weight:800;color:var(--primary)}
.hs-label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}

.controls{max-width:1200px;margin:0 auto;padding:24px 24px 0;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:250px;position:relative}
.search-box input{width:100%;padding:12px 16px 12px 42px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--card);transition:border .2s;outline:none}
.search-box input:focus{border-color:var(--primary)}
.search-box::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.filter-btn{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--card);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-btn:hover{border-color:var(--primary);color:var(--primary)}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.filter-count{background:rgba(255,255,255,.3);padding:1px 6px;border-radius:4px;font-size:11px;margin-left:4px}

.view-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.view-btn{padding:8px 12px;background:var(--card);border:none;cursor:pointer;font-size:16px;transition:all .2s}
.view-btn.active{background:var(--primary);color:#fff}

.main{max-width:1200px;margin:0 auto;padding:24px}
.results-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;color:var(--text2);font-size:13px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.grid.list{grid-template-columns:1fr}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all .2s;text-decoration:none;color:inherit;display:block;position:relative}
.card:hover{border-color:var(--primary-light);box-shadow:0 4px 16px rgba(5,150,105,.1);transform:translateY(-2px)}
.card-type{position:absolute;top:12px;right:12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:4px}
.card-type.crt{background:#fef3c7;color:#92400e}
.card-type.module{background:#dbeafe;color:#1e40af}
.card-icon{font-size:28px;margin-bottom:10px}
.card-title{font-size:15px;font-weight:600;margin-bottom:6px;padding-right:60px}
.card-cat{font-size:12px;color:var(--primary);font-weight:500;margin-bottom:8px}
.card-keywords{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.card-kw{font-size:11px;background:#f1f5f9;color:var(--text2);padding:2px 8px;border-radius:4px}
.card-progress{margin-top:12px;height:4px;background:#e2e8f0;border-radius:2px;overflow:hidden}
.card-progress-fill{height:100%;background:var(--primary);border-radius:2px;transition:width .3s}

.card.list-view{display:flex;align-items:center;gap:16px;padding:16px 20px}
.card.list-view .card-icon{font-size:24px;margin:0;min-width:36px;text-align:center}
.card.list-view .card-title{margin:0;padding:0}
.card.list-view .card-cat{margin:0}
.card.list-view .card-type{position:static}
.card.list-view .card-keywords{display:none}
.list-info{flex:1}

.empty{text-align:center;padding:60px 24px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:12px}

.category-header{display:flex;align-items:center;gap:10px;margin:32px 0 16px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.category-header:first-child{margin-top:0}
.cat-icon{font-size:22px}
.cat-name{font-size:18px;font-weight:700}
.cat-count{background:var(--primary-bg);color:var(--primary);padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600}

.completion-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;margin-left:auto}
.completion-badge.done{background:#dcfce7;color:#166534}
.completion-badge.partial{background:#fef3c7;color:#92400e}
.completion-badge.new{background:#dbeafe;color:#1e40af}

footer{border-top:1px solid var(--border);padding:24px;text-align:center;color:var(--text3);font-size:12px;background:var(--card)}
footer a{color:var(--primary);text-decoration:none}

@media(max-width:640px){
.hero h1{font-size:24px}
.hero-stats{gap:20px}
.hs-num{font-size:24px}
.grid{grid-template-columns:1fr}
.controls{flex-direction:column}
.filter-group{overflow-x:auto;flex-wrap:nowrap;width:100%;-webkit-overflow-scrolling:touch}
}
</style>
<script src="dx-user-bar.js" defer></script>
</head>
<body>

<nav class="nav">
<div class="nav-inner">
<a href="index.html" class="nav-brand">🩺 ReasonDx</a>
<div class="nav-links">
<a href="learn-hub.html" class="nav-link">Learn</a>
<a href="module-catalog.html" class="nav-link active">Catalog</a>
<a href="crt-hub.html" class="nav-link">CRT Hub</a>
<a href="quiz-engine.html" class="nav-link">Quiz</a>
<a href="tools/learning-dashboard.html" class="nav-link">Dashboard</a>
<a href="reference-library.html" class="nav-link">Library</a>
</div>
</div>
</nav>

<div class="hero">
<h1>Module <span>Catalog</span></h1>
<p>Browse and search all learning modules, clinical reasoning trainers, and pathophysiology content.</p>
<div class="hero-stats">
<div class="hs"><div class="hs-num" id="totalModules">—</div><div class="hs-label">Modules</div></div>
<div class="hs"><div class="hs-num" id="totalCRTs">—</div><div class="hs-label">CRTs</div></div>
<div class="hs"><div class="hs-num" id="totalCategories">—</div><div class="hs-label">Categories</div></div>
<div class="hs"><div class="hs-num" id="completionPct">—</div><div class="hs-label">Completed</div></div>
</div>
</div>

<div class="controls">
<div class="search-box">
<input type="text" id="searchInput" placeholder="Search modules, topics, keywords..." oninput="applyFilters()">
</div>
<div class="filter-group" id="filterGroup"></div>
<div class="view-toggle">
<button class="view-btn active" onclick="setView('grid')" id="gridBtn">▦</button>
<button class="view-btn" onclick="setView('list')" id="listBtn">☰</button>
</div>
</div>

<div class="main">
<div class="results-bar">
<span id="resultsCount">Loading...</span>
<label style="display:flex;align-items:center;gap:6px;cursor:pointer">
<input type="checkbox" id="groupByCategory" onchange="applyFilters()" checked> Group by category
</label>
</div>
<div id="catalogContainer"></div>
</div>

<footer>
<a href="index.html">ReasonDx</a> · Module Catalog · <span id="footerCount">270</span> modules
</footer>

<script>
// ============================================================
// STATE
// ============================================================
let allModules = [];
let currentView = 'grid';
let activeFilter = 'all';

// Category icons
const CAT_ICONS = {
    "Cardiology":"❤️","Pulmonology":"🫁","Neurology":"🧠","Nephrology":"🫘",
    "Gastroenterology":"🔬","Endocrinology":"⚡","Hematology":"🩸","Hematology/Oncology":"🔬",
    "Infectious Disease":"🦠","Allergy/Immunology":"🛡️","Dermatology":"🩹","Psychiatry":"🧩",
    "OB/GYN":"👶","Pediatrics":"🍼","Emergency Medicine":"🚨","Surgery":"🔪",
    "Toxicology":"☠️","Anesthesiology":"💉","Critical Care":"🏥","Oncology":"🎗️",
    "GI Embryology":"🧬","Neuro Embryology":"🧬","MSK Embryology":"🧬",
    "Respiratory Embryology":"🧬","Endocrine Emergency":"⚡","Internal Medicine":"📋",
    "Clinical Reasoning":"🎯","General":"📚"
};

// ============================================================
// LOAD DATA
// ============================================================
async function loadCatalog() {
    try {
        const resp = await fetch('data/topic-map.json');
        const tm = await resp.json();
        
        const topics = tm.topics || {};
        allModules = [];
        
        for (const [key, val] of Object.entries(topics)) {
            const isCRT = val.mechanism && val.mechanism.includes('-crt');
            allModules.push({
                id: key,
                title: val.displayName || key.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()),
                category: val.category || 'General',
                file: val.mechanism || null,
                keywords: val.keywords || [],
                isCRT: isCRT,
                related: val.related || [],
                status: val.status || 'complete',
                hasAdventure: val.adventures && val.adventures.length > 0,
                hasCoachDx: val.coachDx && val.coachDx.length > 0,
                completion: getCompletion(key)
            });
        }
        
        // Also scan for modules NOT in topic map
        // We'll add them from a supplementary list if needed
        
        allModules.sort((a,b) => a.title.localeCompare(b.title));
        
        // Update stats
        const cats = [...new Set(allModules.map(m=>m.category))];
        document.getElementById('totalModules').textContent = allModules.length;
        document.getElementById('totalCRTs').textContent = allModules.filter(m=>m.isCRT).length;
        document.getElementById('totalCategories').textContent = cats.length;
        
        const completed = allModules.filter(m=>m.completion >= 100).length;
        const pct = allModules.length > 0 ? Math.round(completed/allModules.length*100) : 0;
        document.getElementById('completionPct').textContent = pct + '%';
        
        buildFilterButtons(cats);
        applyFilters();
        
    } catch(e) {
        console.error('Failed to load catalog:', e);
        document.getElementById('catalogContainer').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>Failed to load module catalog. Please refresh.</p></div>';
    }
}

function getCompletion(moduleId) {
    try {
        const key = 'rdx-progress-' + moduleId;
        const val = localStorage.getItem(key);
        if (val) return parseInt(val) || 0;
        
        // Check XP-based completion
        const xp = localStorage.getItem('rdx-xp-' + moduleId);
        if (xp && parseInt(xp) > 0) return 100;
        
        // Check score-based
        const score = localStorage.getItem('moduleScore_' + moduleId);
        if (score && parseInt(score) > 0) return 100;
    } catch(e) {}
    return 0;
}

// ============================================================
// FILTER BUTTONS
// ============================================================
function buildFilterButtons(categories) {
    const group = document.getElementById('filterGroup');
    const counts = {};
    allModules.forEach(m => { counts[m.category] = (counts[m.category]||0)+1; });
    
    let html = '<button class="filter-btn active" onclick="setFilter(\'all\',this)">All<span class="filter-count">' + allModules.length + '</span></button>';
    html += '<button class="filter-btn" onclick="setFilter(\'crt\',this)">CRTs<span class="filter-count">' + allModules.filter(m=>m.isCRT).length + '</span></button>';
    
    // Top categories
    const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    for (const [cat, count] of sorted.slice(0, 12)) {
        html += '<button class="filter-btn" onclick="setFilter(\'' + cat.replace(/'/g,"\\'") + '\',this)">' + cat + '<span class="filter-count">' + count + '</span></button>';
    }
    group.innerHTML = html;
}

function setFilter(filter, btn) {
    activeFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    applyFilters();
}

// ============================================================
// RENDER
// ============================================================
function applyFilters() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const grouped = document.getElementById('groupByCategory').checked;
    
    let filtered = allModules;
    
    // Category filter
    if (activeFilter === 'crt') {
        filtered = filtered.filter(m => m.isCRT);
    } else if (activeFilter !== 'all') {
        filtered = filtered.filter(m => m.category === activeFilter);
    }
    
    // Search
    if (query) {
        filtered = filtered.filter(m => {
            const searchable = (m.title + ' ' + m.category + ' ' + m.keywords.join(' ') + ' ' + m.id).toLowerCase();
            return query.split(/\s+/).every(term => searchable.includes(term));
        });
    }
    
    document.getElementById('resultsCount').textContent = filtered.length + ' of ' + allModules.length + ' modules';
    
    const container = document.getElementById('catalogContainer');
    
    if (filtered.length === 0) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><p>No modules match your search. Try different keywords.</p></div>';
        return;
    }
    
    if (grouped && !query) {
        renderGrouped(filtered, container);
    } else {
        renderFlat(filtered, container);
    }
}

function renderGrouped(modules, container) {
    const groups = {};
    modules.forEach(m => {
        groups[m.category] = groups[m.category] || [];
        groups[m.category].push(m);
    });
    
    const sortedCats = Object.keys(groups).sort();
    let html = '';
    for (const cat of sortedCats) {
        const icon = CAT_ICONS[cat] || '📚';
        html += '<div class="category-header"><span class="cat-icon">' + icon + '</span><span class="cat-name">' + cat + '</span><span class="cat-count">' + groups[cat].length + '</span></div>';
        html += '<div class="grid' + (currentView === 'list' ? ' list' : '') + '">';
        groups[cat].forEach(m => { html += renderCard(m); });
        html += '</div>';
    }
    container.innerHTML = html;
}

function renderFlat(modules, container) {
    let html = '<div class="grid' + (currentView === 'list' ? ' list' : '') + '">';
    modules.forEach(m => { html += renderCard(m); });
    html += '</div>';
    container.innerHTML = html;
}

function renderCard(m) {
    const icon = CAT_ICONS[m.category] || '📚';
    const typeClass = m.isCRT ? 'crt' : 'module';
    const typeLabel = m.isCRT ? 'CRT' : 'MODULE';
    const href = m.file ? 'mechanism/' + m.file : '#';
    
    let completionBadge = '';
    if (m.completion >= 100) {
        completionBadge = '<span class="completion-badge done">✅ Done</span>';
    } else if (m.completion > 0) {
        completionBadge = '<span class="completion-badge partial">' + m.completion + '%</span>';
    }
    
    if (currentView === 'list') {
        return '<a href="' + href + '" class="card list-view">' +
            '<div class="card-icon">' + icon + '</div>' +
            '<div class="list-info">' +
            '<div class="card-title">' + m.title + '</div>' +
            '<div class="card-cat">' + m.category + '</div>' +
            '</div>' +
            '<span class="card-type ' + typeClass + '">' + typeLabel + '</span>' +
            completionBadge +
            '</a>';
    }
    
    let kws = '';
    if (m.keywords.length > 0) {
        kws = '<div class="card-keywords">' + m.keywords.slice(0, 5).map(k => '<span class="card-kw">' + k + '</span>').join('') + '</div>';
    }
    
    let extras = '';
    if (m.hasAdventure) extras += '<span class="card-kw" style="background:#fef3c7;color:#92400e">🎮 Adventure</span> ';
    if (m.hasCoachDx) extras += '<span class="card-kw" style="background:#ede9fe;color:#6d28d9">🤖 CoachDx</span>';
    
    return '<a href="' + href + '" class="card">' +
        '<span class="card-type ' + typeClass + '">' + typeLabel + '</span>' +
        '<div class="card-icon">' + icon + '</div>' +
        '<div class="card-title">' + m.title + '</div>' +
        '<div class="card-cat">' + m.category + (extras ? ' · ' + extras : '') + '</div>' +
        kws +
        (m.completion > 0 ? '<div class="card-progress"><div class="card-progress-fill" style="width:' + m.completion + '%"></div></div>' : '') +
        completionBadge +
        '</a>';
}

// ============================================================
// VIEW TOGGLE
// ============================================================
function setView(view) {
    currentView = view;
    document.getElementById('gridBtn').classList.toggle('active', view === 'grid');
    document.getElementById('listBtn').classList.toggle('active', view === 'list');
    applyFilters();
}

// ============================================================
// INIT
// ============================================================
loadCatalog();
</script>
<script src="dx-progress.js"></script>
<script src="data/rdx-persist.js"></script>
</body>
</html>
