<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReasonDx — Student Review</title>
<meta name="description" content="ReasonDx student review and admin tools.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2874A6;--blue-dk:#1B5272;--blue-lt:#EBF4FB;
  --green:#059669;--green-lt:#ECFDF5;
  --amber:#D97706;--amber-lt:#FFFBEB;
  --purple:#7C3AED;--purple-lt:#F5F3FF;
  --red:#DC2626;--red-lt:#FEF2F2;
  --text:#1E293B;--muted:#64748B;--border:#E2E8F0;--bg:#F8FAFC;
  --font:'Inter',-apple-system,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

/* Header */
.hdr{background:var(--blue-dk);color:#fff;padding:12px 24px;display:flex;align-items:center;gap:16px}
.hdr-logo{font-size:18px;font-weight:800;letter-spacing:-.5px}
.hdr-logo em{font-style:normal;color:#93C6E7}
.hdr-title{font-size:13px;color:#93C6E7;margin-left:4px}
.hdr-back{margin-left:auto;font-size:12px;color:#93C6E7;text-decoration:none;padding:5px 12px;border:1px solid #93C6E760;border-radius:7px;transition:.15s}
.hdr-back:hover{background:#ffffff20}
.imp-banner{background:var(--purple);color:#fff;padding:8px 24px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px}

/* Layout */
.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 96px)}

/* Sidebar */
.sidebar{background:#fff;border-right:1px solid var(--border);padding:16px;overflow-y:auto}
.sidebar-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:12px 0 6px}
.student-card{padding:10px 12px;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:.15s;border:1.5px solid transparent;margin-bottom:4px}
.student-card:hover{background:var(--blue-lt)}
.student-card.active{background:var(--blue-lt);border-color:var(--blue)}
.student-avatar{width:34px;height:34px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.student-name{font-size:13px;font-weight:600}
.student-meta{font-size:11px;color:var(--muted)}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge-green{background:var(--green-lt);color:var(--green)}
.badge-amber{background:var(--amber-lt);color:var(--amber)}
.no-data{padding:24px;text-align:center;color:var(--muted);font-size:13px}

/* Main */
.main{padding:24px;overflow-y:auto}
.section-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:10px}

/* Submission tabs */
.sub-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.sub-tab{padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:var(--muted);transition:.15s}
.sub-tab.active{border-color:var(--blue);background:var(--blue-lt);color:var(--blue)}

/* Two-column doc view */
.doc-cols{display:grid;grid-template-columns:1fr 340px;gap:16px}
.doc-col{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden}
.doc-col-hdr{padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--muted)}

/* Note sections */
.note-section{border-bottom:1px solid var(--border)}
.note-section:last-child{border-bottom:none}
.note-sec-hdr{padding:8px 16px;display:flex;align-items:center;justify-content:space-between}
.note-sec-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.note-body{padding:12px 16px;font-size:12.5px;line-height:1.75;color:var(--text);white-space:pre-wrap;font-family:'IBM Plex Mono',monospace;user-select:text;cursor:text}
.note-body.empty{color:var(--muted);font-style:italic}

/* Annotation highlight */
mark.ann{border-radius:2px;cursor:pointer;border-bottom:2px solid}
mark.ann:hover{opacity:.75}

/* Tools col */
.tools-col{display:flex;flex-direction:column;gap:0}
.tools-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.tools-section:last-child{border-bottom:none}

/* Annotation composer */
.ann-composer{display:none;background:var(--blue-lt);border:1.5px solid var(--blue);border-radius:10px;padding:12px;margin-bottom:12px}
.ann-preview{font-size:11px;font-family:monospace;background:#fff;padding:6px 8px;border-radius:6px;margin-bottom:8px;color:var(--muted);border-left:3px solid var(--blue)}
.ann-input{width:100%;padding:8px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;font-family:inherit;resize:vertical;min-height:60px;margin-bottom:8px}
.ann-input:focus{outline:none;border-color:var(--blue)}
.color-dots{display:flex;gap:6px;align-items:center;margin-bottom:10px}
.color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid #ddd;transition:.1s}
.color-dot.sel{border:3px solid #333!important}
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.15s}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{opacity:.9}
.btn-outline{background:#fff;color:var(--blue);border:1.5px solid var(--blue)}.btn-outline:hover{background:var(--blue-lt)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-row{display:flex;gap:6px}

/* Annotation list */
.ann-item{padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;background:#fff}
.ann-quote{font-size:11px;font-family:monospace;padding:4px 8px;border-radius:4px;margin-bottom:5px;border-left:3px solid}
.ann-comment{font-size:12px;color:var(--text);line-height:1.5}
.ann-meta{font-size:11px;color:var(--muted);margin-top:4px;display:flex;justify-content:space-between}
.ann-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px}.ann-del:hover{color:var(--red)}
.empty-ann{font-size:12px;color:var(--muted);font-style:italic}

/* Rubric */
.rubric-row{margin-bottom:12px}
.rubric-label{font-size:12px;font-weight:600;margin-bottom:4px}
.rubric-inputs{display:flex;align-items:center;gap:8px}
.score-input{width:52px;padding:5px 8px;border:1.5px solid var(--border);border-radius:7px;font-size:14px;font-weight:700;text-align:center;font-family:monospace}
.score-input:focus{outline:none;border-color:var(--blue)}
.score-max{font-size:11px;color:var(--muted)}
.comment-input{flex:1;padding:5px 9px;border:1.5px solid var(--border);border-radius:7px;font-size:11px;font-family:inherit}
.comment-input:focus{outline:none;border-color:var(--blue)}
.total-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-top:1px solid var(--border);margin-top:8px}
.total-score{font-size:22px;font-weight:800;color:var(--blue);font-family:monospace}
.overall-input{width:100%;padding:9px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;resize:vertical;min-height:70px;margin-top:6px}
.overall-input:focus{outline:none;border-color:var(--blue)}
.save-btn{width:100%;margin-top:10px}

/* Saved feedback view */
.fb-score-bar{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.fb-bar-bg{flex:1;background:var(--border);border-radius:4px;height:6px}
.fb-bar-fill{height:6px;border-radius:4px;background:var(--green)}
.fb-narrative{font-size:12.5px;line-height:1.7;color:var(--text);background:var(--bg);padding:10px 12px;border-radius:8px;border-left:3px solid var(--blue)}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#1E293B;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transform:translateY(8px);transition:.25s;pointer-events:none;z-index:9999}
.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">Reason<em>Dx</em> <span class="hdr-title">· Admin Review</span></div>
  <a href="faculty-dashboard.html" class="hdr-back">← Faculty Dashboard</a>
</div>
<div class="imp-banner" id="impBanner" style="display:none">
  👁️ Viewing as: <span id="impUid"></span> &nbsp;·&nbsp; All changes save to shared localStorage
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="no-data">Loading students…</div>
  </div>
  <div class="main" id="main">
    <div class="no-data" style="padding:80px 24px">
      <div style="font-size:36px;margin-bottom:12px">👈</div>
      <div style="font-weight:700;font-size:15px;margin-bottom:6px">Select a student</div>
      <div style="font-size:13px">Choose a student from the sidebar to review their submissions, add annotations, and grade.</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Storage helpers ──────────────────────────────────────────────────────────
function db(k){try{var r=localStorage.getItem(k);return r?JSON.parse(r):null}catch(e){return null}}
function dbSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function relTime(ts){if(!ts)return'';var d=Date.now()-new Date(ts).getTime(),m=Math.floor(d/60000),h=Math.floor(m/60),dy=Math.floor(h/24);return dy>0?dy+'d ago':h>0?h+'h ago':m>0?m+'m ago':'just now'}
function initials(n){return(n||'?').split(/\s+/).map(function(w){return w[0]||''}).join('').toUpperCase().slice(0,2)}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2200)}

// ── State ────────────────────────────────────────────────────────────────────
var STATE = {
  students: [],
  selectedUid: null,
  selectedSubIdx: 0,
  scores: {},
  comments: {},
  overallComment: '',
  annPending: null,
  annColor: '2874A6',
};

var RUBRIC = [
  {id:'hpi',         label:'History of Present Illness', max:30, color:'2874A6'},
  {id:'assessment',  label:'Assessment & Differential',  max:25, color:'059669'},
  {id:'plan',        label:'Management Plan',            max:25, color:'D97706'},
  {id:'communication',label:'Communication & Organization',max:20,color:'7C3AED'},
];

var SECTIONS = [
  {id:'hpi',           label:'History of Present Illness',    color:'#2874A6', bg:'#EBF4FB'},
  {id:'assessment',    label:'Assessment & Differential',     color:'#059669', bg:'#ECFDF5'},
  {id:'plan',          label:'Management Plan',               color:'#D97706', bg:'#FFFBEB'},
  {id:'communication', label:'Communication & Organization',  color:'#7C3AED', bg:'#F5F3FF'},
];

// ── Boot ─────────────────────────────────────────────────────────────────────
(function(){
  // Show impersonation banner if ?as= in URL
  var urlParams = new URLSearchParams(location.search);
  var asUid = urlParams.get('as');
  if(asUid){
    document.getElementById('impBanner').style.display='flex';
    document.getElementById('impUid').textContent = asUid;
    // Auto-select that student
    STATE.selectedUid = asUid;
  }

  // Load all students from emr-users
  var users = db('emr-users') || {};
  var roles = db('emr-roles') || {};
  STATE.students = Object.values(users).filter(function(u){
    return (roles[u.username]||'student') === 'student';
  });

  renderSidebar();
  if(STATE.selectedUid) renderMain();
})();

// ── Sidebar ──────────────────────────────────────────────────────────────────
function renderSidebar(){
  var sb = document.getElementById('sidebar');
  if(!STATE.students.length){
    sb.innerHTML = '<div class="no-data"><div style="font-size:24px;margin-bottom:8px">📭</div><div style="font-weight:700;margin-bottom:4px">No students found</div><div style="font-size:12px">Load demo data first from the Faculty Dashboard.</div><br><a href="faculty-dashboard.html" style="color:var(--blue);font-size:12px">← Go to Dashboard</a></div>';
    return;
  }
  var html = '<div class="sidebar-label">Students (' + STATE.students.length + ')</div>';
  STATE.students.forEach(function(u){
    var subs = db('subs-' + u.username) || [];
    var hasGrade = subs.some(function(s){ return db('feedback-'+u.username+'-'+(s.week||'')); });
    var active = STATE.selectedUid === u.username;
    html += '<div class="student-card' + (active?' active':'') + '" onclick="selectStudent(' + JSON.stringify(u.username) + ')">';
    html += '<div class="student-avatar">' + esc(initials(u.displayName||u.username)) + '</div>';
    html += '<div style="flex:1;min-width:0"><div class="student-name">' + esc(u.displayName||u.username) + '</div>';
    html += '<div class="student-meta">' + subs.length + ' submission' + (subs.length!==1?'s':'') + '</div></div>';
    if(hasGrade) html += '<span class="badge badge-green">✓</span>';
    else if(subs.length) html += '<span class="badge badge-amber">⏳</span>';
    html += '</div>';
  });
  sb.innerHTML = html;
}

function selectStudent(uid){
  STATE.selectedUid = uid;
  STATE.selectedSubIdx = 0;
  STATE.scores = {}; STATE.comments = {}; STATE.overallComment = '';
  STATE.annPending = null;
  renderSidebar();
  renderMain();
}

// ── Main ─────────────────────────────────────────────────────────────────────
function renderMain(){
  var uid = STATE.selectedUid;
  if(!uid){ document.getElementById('main').innerHTML=''; return; }

  var subs = db('subs-' + uid) || [];
  if(!subs.length){
    document.getElementById('main').innerHTML = '<div class="no-data" style="padding:60px"><div style="font-size:32px;margin-bottom:12px">📭</div><div style="font-weight:700">No submissions yet</div><div style="margin-top:6px;font-size:13px">This student has not submitted any notes.</div></div>';
    return;
  }

  var sub = subs[STATE.selectedSubIdx] || subs[0];
  var fields = sub.fields || {};
  var week = sub.week || 'Submission';
  var savedAnns = db('annotations-'+uid+'-'+week) || [];
  var savedFb = db('feedback-'+uid+'-'+week);

  // Load saved scores into state
  if(savedFb && Object.keys(STATE.scores).length===0){
    STATE.scores = savedFb.scores || {};
    STATE.comments = savedFb.comments || {};
    STATE.overallComment = savedFb.overallComment || '';
  }

  var html = '';

  // Submission tabs
  if(subs.length > 1){
    html += '<div class="section-hdr">Submissions</div>';
    html += '<div class="sub-tabs">';
    subs.forEach(function(s,i){
      html += '<button class="sub-tab' + (i===STATE.selectedSubIdx?' active':'') + '" onclick="selectSub(' + i + ')">' + esc(s.week||('Submission '+(i+1))) + '</button>';
    });
    html += '</div>';
  }

  // Two-column layout
  html += '<div class="doc-cols">';

  // ── Left: note ──────────────────────────────────────────────────────────
  html += '<div class="doc-col">';
  html += '<div class="doc-col-hdr">📄 ' + esc(sub.studentDisplay||uid) + ' — ' + esc(week) + ' <span style="font-weight:400;font-size:11px;color:var(--muted)">· Select text to annotate</span></div>';

  SECTIONS.forEach(function(sec){
    var text = fields[sec.id] || '';
    var secAnns = savedAnns.filter(function(a){ return a.sectionId===sec.id; });
    html += '<div class="note-section">';
    html += '<div class="note-sec-hdr" style="background:' + sec.bg + ';border-bottom:1px solid ' + sec.color + '30">';
    html += '<span class="note-sec-label" style="color:' + sec.color + '">' + sec.label + '</span>';
    if(secAnns.length) html += '<span style="font-size:11px;background:' + sec.color + ';color:#fff;padding:2px 8px;border-radius:8px">' + secAnns.length + ' annotation' + (secAnns.length!==1?'s':'') + '</span>';
    html += '</div>';
    if(text){
      var display = buildAnnotatedText(text, secAnns);
      html += '<div class="note-body" data-secid="' + sec.id + '" onmouseup="onTextSelect(event,\'' + sec.id + '\')">' + display + '</div>';
    } else {
      html += '<div class="note-body empty">— not completed —</div>';
    }
    html += '</div>';
  });
  html += '</div>'; // doc-col

  // ── Right: tools ────────────────────────────────────────────────────────
  html += '<div class="doc-col tools-col">';

  // Annotation composer (hidden)
  html += '<div class="tools-section">';
  html += '<div class="section-hdr">💬 Annotations (' + savedAnns.length + ')</div>';
  html += '<div class="ann-composer" id="annComposer">';
  html += '<div class="ann-preview" id="annPreview"></div>';
  html += '<textarea class="ann-input" id="annInput" placeholder="Add your comment…"></textarea>';
  html += '<div class="color-dots">';
  html += '<span style="font-size:11px;color:var(--muted)">Color:</span>';
  [['2874A6','Correct reasoning'],['059669','Exemplary'],['D97706','Consider this'],['DC2626','Significant gap']].forEach(function(c,i){
    html += '<div class="color-dot' + (i===0?' sel':'') + '" style="background:#'+c[0]+(i===0?';border-color:#'+c[0]+';border-width:3px':'')+'" title="'+c[1]+'" onclick="setColor(this,\''+c[0]+'\')"></div>';
  });
  html += '</div>';
  html += '<div class="btn-row"><button class="btn btn-primary" onclick="saveAnn()">Save</button><button class="btn btn-outline" onclick="cancelAnn()">Cancel</button></div>';
  html += '</div>'; // ann-composer

  // Annotation list
  html += '<div id="annList">' + renderAnnList(savedAnns, uid, week) + '</div>';
  html += '</div>'; // tools-section

  // Rubric
  html += '<div class="tools-section">';
  html += '<div class="section-hdr">📊 Rubric</div>';
  RUBRIC.forEach(function(r){
    html += '<div class="rubric-row">';
    html += '<div class="rubric-label" style="color:#' + r.color + '">' + r.label + '</div>';
    html += '<div class="rubric-inputs">';
    html += '<input type="number" class="score-input" min="0" max="'+r.max+'" value="'+(STATE.scores[r.id]||'')+'" placeholder="—" oninput="setScore(\''+r.id+'\',this.value)" onchange="setScore(\''+r.id+'\',this.value)">';
    html += '<span class="score-max">/'+r.max+'</span>';
    html += '<input type="text" class="comment-input" value="'+esc(STATE.comments[r.id]||'')+'" placeholder="Comment…" oninput="setComment(\''+r.id+'\',this.value)">';
    html += '</div></div>';
  });
  var total = RUBRIC.reduce(function(a,r){return a+(parseInt(STATE.scores[r.id])||0)},0);
  var maxTotal = RUBRIC.reduce(function(a,r){return a+r.max},0);
  html += '<div class="total-bar"><span style="font-size:13px;color:var(--muted)">Total:</span><span class="total-score" id="totalScore">'+total+'</span><span style="color:var(--muted)">/'+maxTotal+'</span></div>';
  html += '</div>';

  // Overall feedback
  html += '<div class="tools-section">';
  html += '<div class="section-hdr">Overall Feedback</div>';
  html += '<textarea class="overall-input" placeholder="Narrative feedback for the student…" oninput="STATE.overallComment=this.value">'+esc(STATE.overallComment)+'</textarea>';
  html += '<button class="btn btn-primary save-btn" onclick="saveFeedback()">✓ Save & Share Feedback</button>';

  if(savedFb){
    html += '<div style="margin-top:10px;padding:8px 10px;background:var(--green-lt);border-radius:8px;font-size:11px;font-weight:600;color:var(--green)">✓ Feedback saved · ' + relTime(savedFb.savedAt) + '</div>';
  }
  html += '</div>';

  html += '</div>'; // tools-col
  html += '</div>'; // doc-cols

  document.getElementById('main').innerHTML = html;
}

// ── Annotated text builder ────────────────────────────────────────────────────
function buildAnnotatedText(text, anns){
  var escaped = esc(text);
  (anns||[]).forEach(function(a){
    var q = esc(a.selectedText||'');
    if(!q) return;
    var color = a.color || '2874A6';
    var mark = '<mark class="ann" style="background:#'+color+'22;border-color:#'+color+'" title="'+esc(a.comment||'').replace(/"/g,"'")+'">' + q + '</mark>';
    escaped = escaped.replace(q, mark);
  });
  return escaped;
}

function renderAnnList(anns, uid, week){
  if(!anns||!anns.length) return '<div class="empty-ann">Select text in the note to add an annotation.</div>';
  return anns.map(function(a,i){
    var color = a.color || '2874A6';
    return '<div class="ann-item">' +
      '<div class="ann-quote" style="background:#'+color+'18;border-color:#'+color+'">"'+esc((a.selectedText||'').substring(0,80)+(a.selectedText&&a.selectedText.length>80?'…':''))+'"</div>' +
      '<div class="ann-comment">'+esc(a.comment||'')+'</div>' +
      '<div class="ann-meta"><span>'+esc(a.sectionId||'')+' · '+relTime(a.timestamp)+'</span>' +
      '<button class="ann-del" onclick="deleteAnn('+i+')">✕</button></div>' +
      '</div>';
  }).join('');
}

// ── Annotation interactions ───────────────────────────────────────────────────
function onTextSelect(e, sectionId){
  var sel = window.getSelection();
  if(!sel||sel.isCollapsed) return;
  var text = sel.toString().trim();
  if(text.length < 3) return;
  STATE.annPending = {selectedText: text, sectionId: sectionId};
  var preview = document.getElementById('annPreview');
  var composer = document.getElementById('annComposer');
  if(preview) preview.textContent = '"' + text.substring(0,100) + (text.length>100?'…':'"');
  if(composer){ composer.style.display='block'; composer.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  var inp = document.getElementById('annInput');
  if(inp){ inp.value=''; setTimeout(function(){inp.focus()},50); }
}

function setColor(el, color){
  document.querySelectorAll('.color-dot').forEach(function(d){ d.classList.remove('sel'); d.style.borderWidth='2px'; d.style.borderColor='#ddd'; });
  el.classList.add('sel'); el.style.borderColor='#'+color; el.style.borderWidth='3px';
  STATE.annColor = color;
}

function saveAnn(){
  if(!STATE.annPending) return;
  var comment = (document.getElementById('annInput')||{}).value || '';
  if(!comment.trim()){ toast('Please add a comment'); return; }
  var uid = STATE.selectedUid;
  var subs = db('subs-'+uid)||[];
  var sub = subs[STATE.selectedSubIdx]||subs[0];
  var week = sub ? sub.week||'' : '';
  var key = 'annotations-'+uid+'-'+week;
  var anns = db(key)||[];
  anns.push({
    selectedText: STATE.annPending.selectedText,
    sectionId: STATE.annPending.sectionId,
    comment: comment.trim(),
    color: STATE.annColor,
    grader: 'Faculty',
    timestamp: new Date().toISOString()
  });
  dbSet(key, anns);
  STATE.annPending = null;
  toast('✓ Annotation saved');
  renderMain();
}

function cancelAnn(){
  STATE.annPending = null;
  var c = document.getElementById('annComposer');
  if(c) c.style.display='none';
  window.getSelection().removeAllRanges();
}

function deleteAnn(idx){
  var uid = STATE.selectedUid;
  var subs = db('subs-'+uid)||[];
  var sub = subs[STATE.selectedSubIdx]||subs[0];
  var week = sub ? sub.week||'' : '';
  var key = 'annotations-'+uid+'-'+week;
  var anns = db(key)||[];
  anns.splice(idx,1);
  dbSet(key, anns);
  toast('Annotation removed');
  renderMain();
}

// ── Rubric interactions ───────────────────────────────────────────────────────
function setScore(id, val){
  STATE.scores[id] = parseInt(val)||0;
  var total = RUBRIC.reduce(function(a,r){return a+(parseInt(STATE.scores[r.id])||0)},0);
  var t = document.getElementById('totalScore');
  if(t) t.textContent = total;
}
function setComment(id, val){ STATE.comments[id] = val; }

function saveFeedback(){
  var uid = STATE.selectedUid;
  if(!uid) return;
  var subs = db('subs-'+uid)||[];
  var sub = subs[STATE.selectedSubIdx]||subs[0];
  var week = sub ? sub.week||'' : '';
  var total = RUBRIC.reduce(function(a,r){return a+(parseInt(STATE.scores[r.id])||0)},0);
  var maxTotal = RUBRIC.reduce(function(a,r){return a+r.max},0);
  var overallEl = document.querySelector('.overall-input');
  var overall = overallEl ? overallEl.value : STATE.overallComment;
  dbSet('feedback-'+uid+'-'+week, {
    scores: STATE.scores,
    comments: STATE.comments,
    overallComment: overall,
    totalScore: total,
    maxScore: maxTotal,
    savedAt: new Date().toISOString()
  });
  toast('✓ Feedback saved and shared with student');
  renderSidebar();
  renderMain();
}

function selectSub(idx){
  STATE.selectedSubIdx = idx;
  STATE.scores={}; STATE.comments={}; STATE.overallComment=''; STATE.annPending=null;
  renderMain();
}
</script>
</body>
</html>
