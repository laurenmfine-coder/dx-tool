<script>
let currentStage = 0, score = 0, maxScore = 0, difficulty = 'standard', answeredQuestions = new Set(), decisionPath = [];

const stages = [
    {
        title: "The Call",
        content: `<div class="narrative"><p>You're the senior medical resident. The ED calls:</p><p style="margin-top:12px;"><em>"We have a <span class="highlight">58-year-old man</span> with <span class="critical">crushing substernal chest pain</span> radiating to his left arm. Started 45 minutes ago while raking leaves. He's diaphoretic and nauseated."</em></p><p style="margin-top:12px;"><strong>PMH:</strong> HTN, hyperlipidemia, DM2, 30 pack-year smoking history</p></div>
        <div class="socratic-prompt"><h4>Before You See the Patient</h4><p>Based on this history alone, what vital sign abnormalities would you ANTICIPATE finding, and why? Think about what's happening physiologically.</p></div>`,
        hint_beginner: "The body responds to pain and stress with sympathetic activation. What does that do to HR and BP?",
        hint_advanced: "Consider the difference between early compensated shock vs decompensated. What determines which pattern you see?",
        question: {
            prompt: "What vital sign pattern would you most expect in a patient with acute MI presenting within the first hour?",
            options: [
                { text: "Tachycardia and hypertension - sympathetic surge from pain and catecholamine release", correct: true },
                { text: "Bradycardia and hypotension - vagal response to inferior wall ischemia", correct: false },
                { text: "Normal vital signs - compensatory mechanisms maintain homeostasis early", correct: false },
                { text: "Tachycardia and hypotension - immediate cardiogenic shock", correct: false }
            ],
            explanation: {
                correct: "Exactly right! In early acute MI, the sympathetic surge from pain and stress typically causes TACHYCARDIA and HYPERTENSION. However, inferior MI can cause a VAGAL response (bradycardia, hypotension).",
                incorrect: "In the first hour of acute MI, the typical pattern is tachycardia and hypertension due to sympathetic activation. Remember that INFERIOR MI can cause bradycardia."
            },
            teaching: `<h4>Vital Signs in Acute MI</h4><table class="comparison-table"><tr><th>Pattern</th><th>Mechanism</th><th>Territory</th></tr><tr><td>Tachy + HTN</td><td>Sympathetic surge</td><td>Most common early</td></tr><tr><td>Brady + Hypotension</td><td>Vagal (Bezold-Jarisch)</td><td>Inferior MI</td></tr><tr><td>Tachy + Hypotension</td><td>Cardiogenic shock</td><td>Large anterior, RV</td></tr></table><p style="margin-top:12px;"><strong>This patient's vitals:</strong> BP 158/94, HR 98, RR 22, SpO2 96%</p>`,
            why_chain: [{q: "Why does inferior MI cause bradycardia?", a: "The inferior wall has high vagal innervation. Ischemia triggers the Bezold-Jarisch reflex causing bradycardia."}, {q: "Why is RV infarct prone to hypotension?", a: "The RV is preload-dependent. When it fails, it can't fill the LV. Nitrates reduce preload further causing severe hypotension."}],
            points: 10
        }
    },
    {
        title: "Predicting the ECG",
        content: `<div class="narrative"><p>You're walking to the ED. The patient has <span class="critical">crushing substernal chest pain radiating to the LEFT arm</span>.</p></div>
        <div class="socratic-prompt"><h4>Before the ECG Prints</h4><p>Left arm radiation suggests ischemia to a specific coronary territory. Which territory would you predict?</p></div>`,
        hint_beginner: "Left arm pain suggests lateral or anterolateral wall. Which leads look at the lateral wall?",
        hint_advanced: "Consider the sensory dermatomes. C8-T1 covers the medial arm. Which territory refers to this dermatome?",
        question: {
            prompt: "Given LEFT arm radiation, which ECG leads would you expect to show ST changes?",
            options: [
                { text: "V1-V4, I, aVL (anterior and lateral) - left arm radiation suggests LAD territory", correct: true },
                { text: "II, III, aVF (inferior) - referred pain to the arm is non-specific", correct: false },
                { text: "V1-V2 only (septal) - arm pain localizes to the septum", correct: false },
                { text: "All leads equally - arm radiation doesn't localize territory", correct: false }
            ],
            explanation: {
                correct: "Excellent! Left arm radiation classically indicates anterolateral ischemia (LAD territory). The anterior and lateral leads (V1-V6, I, aVL) would show changes.",
                incorrect: "Left arm radiation is CLASSIC for anterolateral ischemia. The LAD supplies the anterior wall. The anterior leads (V1-V4) and high lateral leads (I, aVL) would show changes."
            },
            teaching: `<h4>Referred Pain Patterns</h4><ul><li><strong>Left arm/jaw:</strong> Anterolateral (LAD)</li><li><strong>Epigastric/nausea:</strong> Inferior (RCA)</li><li><strong>Back pain:</strong> Posterior OR aortic dissection</li></ul>`,
            why_chain: [{q: "Why does cardiac ischemia cause arm pain?", a: "Visceral afferents from the heart share spinal neurons with somatic afferents from the arm (viscerosomatic convergence)."}, {q: "Why might diabetics have 'silent' MI?", a: "Diabetic autonomic neuropathy damages cardiac afferents, preventing typical pain signaling."}],
            points: 10
        }
    },
    {
        title: "The ECG Reveals",
        content: `<div class="ecg-box"><div class="ecg-title">12-Lead ECG Findings</div><p>Rate: 98 bpm, Rhythm: Sinus</p><p><span class="critical">ST elevation 3mm in V2-V4</span></p><p><span class="critical">ST elevation 2mm in V5-V6, I, aVL</span></p><p>Reciprocal ST depression in III, aVF</p><p>No Q waves yet</p></div>
        <div class="socratic-prompt"><h4>Interpret Before Acting</h4><p>ST elevation in V2-V6, I, aVL with reciprocal depression inferiorly. What artery is occluded, and at what level?</p></div>`,
        hint_beginner: "V1-V4 = anterior = LAD. When lateral leads are ALSO involved, what does that tell you about how proximal?",
        hint_advanced: "A 'wraparound' LAD supplies the apex. How do you distinguish LAD-wrap from RCA occlusion?",
        question: {
            prompt: "This ECG pattern indicates occlusion of:",
            options: [
                { text: "Proximal LAD - large territory including anterior, septum, and lateral wall", correct: true },
                { text: "Mid-LAD - would affect anterior wall but spare lateral leads", correct: false },
                { text: "Left circumflex - causes lateral changes but not anterior", correct: false },
                { text: "RCA - causes inferior and possibly RV changes", correct: false }
            ],
            explanation: {
                correct: "Perfect! This is PROXIMAL LAD - the 'widow maker.' The extensive territory (V2-V6 + I, aVL) indicates occlusion BEFORE the diagonal branches. Proximal LAD supplies 40-50% of LV mass.",
                incorrect: "This shows PROXIMAL LAD occlusion. The key is the EXTENT - V2-V6 (anterior) PLUS I, aVL (lateral) means the occlusion is before diagonal branches."

function shuffleArray(arr) { const s=[...arr]; for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];} return s; }
function setDifficulty(l,b) { difficulty=l; document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderStage(currentStage); }

function renderStage(i) {
    const s=stages[i], opts=shuffleArray(s.question.options.map((o,idx)=>({...o,idx}))), ltrs='ABCDE';
    let hints='';
    if(difficulty==='beginner'&&s.hint_beginner) hints=`<div class="hint-beginner" style="display:block;">💡 ${s.hint_beginner}</div>`;
    else if(difficulty==='advanced'&&s.hint_advanced) hints=`<div class="hint-advanced" style="display:block;">🎯 ${s.hint_advanced}</div>`;
    const why=s.question.why_chain?`<div class="why-chain" id="why"><h4>🔗 WHY Chain</h4>${s.question.why_chain.map(w=>`<div class="why-item"><div class="why-q">❓ ${w.q}</div><div class="why-a">${w.a}</div></div>`).join('')}</div>`:'';
    document.getElementById('progress').style.width=((i)/stages.length*100)+'%';
    document.getElementById('scene-container').innerHTML=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${i+1} of ${stages.length}</div><div class="scene-title">${s.title}</div></div>${s.content}${hints}<div class="question-box"><div class="question-prompt">${s.question.prompt}</div><div class="mcq-options">${opts.map((o,j)=>`<div class="mcq-option" data-correct="${o.correct}" onclick="selectOption(this,${i})"><span class="option-letter">${ltrs[j]}</span><span class="option-text">${o.text}</span></div>`).join('')}</div><div class="feedback correct-feedback" id="fb-c"><div class="feedback-title">✓ Excellent!</div><div class="feedback-explanation">${s.question.explanation.correct}</div></div><div class="feedback incorrect-feedback" id="fb-i"><div class="feedback-title">✗ Not Quite</div><div class="feedback-explanation">${s.question.explanation.incorrect}</div></div><div class="teaching-point" id="teach">${s.question.teaching}</div>${why}<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div></div>`;
}

function selectOption(el,i) {
    if(answeredQuestions.has(i)) return;
    const c=el.dataset.correct==='true', s=stages[i];
    answeredQuestions.add(i); decisionPath.push({stage:s.title,correct:c,points:c?s.question.points:0});
    if(c) score+=s.question.points; maxScore+=s.question.points;
    document.getElementById('score').textContent=score; document.getElementById('maxScore').textContent=maxScore;
    document.querySelectorAll('.mcq-option').forEach(o=>{o.classList.add('disabled');if(o.dataset.correct==='true')o.classList.add('correct');else if(o===el&&!c)o.classList.add('incorrect');});
    document.getElementById(c?'fb-c':'fb-i').classList.add('show');
    document.getElementById('teach').classList.add('show');
    const w=document.getElementById('why'); if(w)w.classList.add('show');
    document.getElementById('next-btn').classList.add('show');
}

function nextStage() { if(++currentStage<stages.length){renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'});}else showCompletion(); }

function showCompletion() {
    const p=Math.round(score/maxScore*100);
    let g,m,clr;
    if(p>=90){g='Outstanding!';clr='#22c55e';m='Excellent understanding of ACS!';}
    else if(p>=80){g='Great Work!';clr='#3b82f6';m='Strong grasp of ACS concepts.';}
    else if(p>=70){g='Good Progress';clr='#f59e0b';m='Solid foundation. Review WHY chains.';}
    else{g='Keep Learning';clr='#ef4444';m='Review ECG localization and management.';}
    document.getElementById('scene-container').innerHTML=`<div class="scene completion"><div class="completion-grade" style="color:${clr}">${g}</div><div class="completion-percent" style="color:${clr}">${p}%</div><div style="font-size:1.3rem;margin-bottom:8px">${score}/${maxScore} points</div><div class="completion-message">${m}</div><div class="completion-breakdown"><h4>Your Clinical Journey</h4>${decisionPath.map((d,j)=>`<div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;"><span><span style="color:${d.correct?'#22c55e':'#ef4444'}">${d.correct?'✓':'✗'}</span> Stage ${j+1}: ${d.stage}</span><span style="color:#94a3b8">${d.points}/${stages[j].question.points}pts</span></div>`).join('')}</div><div class="crossplatform"><h4>Continue Learning</h4><div class="crossplatform-links"><a href="#" class="crossplatform-link">🧬 MechanismDx: Coronary Circulation</a><a href="#" class="crossplatform-link">📚 Related: Heart Failure</a><a href="javascript:location.reload()" class="crossplatform-link">🔄 Restart</a></div></div></div>`;
    document.getElementById('progress').style.width='100%';
}

document.addEventListener('DOMContentLoaded',()=>renderStage(0));


// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
