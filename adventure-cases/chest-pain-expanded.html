    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"The 5 Deadly Causes",content:'<div class="narrative"><p>A <span class="highlight">55-year-old man</span> presents with acute chest pain. Before diving into details, you must consider the life-threatening causes.</p></div><div class="alert-box"><div class="alert-title">🚨 The Deadly 5</div><p>Always rule out: ACS, PE, Aortic Dissection, Tension Pneumothorax, Esophageal Rupture</p></div>',question:{prompt:"Which chest pain diagnosis can be made clinically without waiting for tests?",options:[{text:"STEMI",correct:false},{text:"Pulmonary embolism",correct:false},{text:"Tension pneumothorax",correct:true},{text:"Aortic dissection",correct:false}],explanation:{correct:"Correct! Tension pneumothorax is a clinical diagnosis - hypotension, JVD, absent breath sounds, tracheal deviation. Treat immediately with needle decompression. Don't wait for CXR!",incorrect:"Tension pneumothorax is diagnosed clinically. Hypotension + JVD + absent breath sounds = immediate needle decompression. Don't wait for imaging!"},teaching:'<h4>The Deadly 5</h4><table class="comparison-table"><tr><th>Diagnosis</th><th>Key Features</th></tr><tr><td>ACS</td><td>Crushing pain, diaphoresis, ECG changes, troponin</td></tr><tr><td>PE</td><td>Pleuritic pain, dyspnea, hypoxia, D-dimer, CTPA</td></tr><tr><td>Aortic Dissection</td><td>Tearing pain to back, BP differential, wide mediastinum</td></tr><tr style="background:rgba(251,191,36,0.2);"><td>Tension PTX</td><td>CLINICAL DIAGNOSIS - treat immediately!</td></tr><tr><td>Esophageal Rupture</td><td>Pain after vomiting, subcutaneous emphysema</td></tr></table>',why_chain:[],points:10}},
        {title:"ACS vs Other Causes",content:'<div class="narrative"><p>Your patient describes <span class="highlight">substernal pressure</span> radiating to left arm, with diaphoresis. Onset 2 hours ago.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 95, BP 145/90<br><strong>Risk factors:</strong> HTN, DM, smoker</p></div>',question:{prompt:"Which ECG finding requires IMMEDIATE cath lab activation?",options:[{text:"T wave inversions in V1-V4",correct:false},{text:"ST elevations in V2-V5 with reciprocal changes",correct:true},{text:"Sinus tachycardia",correct:false},{text:"Q waves in II, III, aVF",correct:false}],explanation:{correct:"Correct! ST elevation with reciprocal changes = STEMI. Door-to-balloon <90 minutes. Activate cath lab immediately. Do not wait for troponin!",incorrect:"STEMI (ST elevation + reciprocal changes) = emergent PCI. Time is muscle. Activate cath lab immediately."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 ACS Spectrum</div><div class="pathway">STEMI: ST elevation + troponin rise\n  → Emergent PCI (D2B <90 min)\n\nNSTEMI: No ST elevation + troponin rise\n  → Early invasive (24-72h)\n\nUnstable Angina: No ST elevation + normal troponin\n  → Risk stratify, may need cath</div></div>',why_chain:[],points:10}},
        {title:"Aortic Dissection",content:'<div class="narrative"><p>Different patient: <span class="highlight">62-year-old</span> with sudden <span class="critical">tearing chest pain radiating to back</span>. History of uncontrolled HTN.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 110, BP 185/105 (R arm) vs 145/85 (L arm)<br><strong>Exam:</strong> New aortic regurgitation murmur</p></div>',question:{prompt:"What is the MOST specific clinical finding for aortic dissection?",options:[{text:"Severe hypertension",correct:false},{text:"Blood pressure differential >20 mmHg between arms",correct:true},{text:"Chest pain radiating to back",correct:false},{text:"Widened mediastinum on CXR",correct:false}],explanation:{correct:"Correct! BP differential >20 mmHg between arms is highly specific (though not sensitive). Also look for: pulse deficits, new AI murmur, neurologic deficits.",incorrect:"BP differential >20 mmHg is most specific. Back pain and widened mediastinum are suggestive but less specific."},teaching:'<h4>Aortic Dissection Types</h4><table class="comparison-table"><tr><th>Stanford</th><th>Location</th><th>Treatment</th></tr><tr style="background:rgba(239,68,68,0.2);"><td>Type A</td><td>Involves ascending aorta</td><td>EMERGENT SURGERY</td></tr><tr><td>Type B</td><td>Descending aorta only</td><td>Medical (BP/HR control)</td></tr></table><div class="alert-box"><div class="alert-title">⚠️ Target BP/HR</div><p>SBP 100-120, HR <60. Use esmolol or labetalol. β-blocker BEFORE vasodilator (prevent reflex tachycardia).</p></div>',why_chain:[],points:10}},
        {title:"Pulmonary Embolism",content:'<div class="narrative"><p>Another patient: <span class="highlight">35-year-old woman</span> on OCPs with sudden <span class="critical">pleuritic chest pain and dyspnea</span>. Recent long flight.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 115, RR 24, SpO2 92%</p></div>',question:{prompt:"What is the next best step for this patient?",options:[{text:"D-dimer",correct:false},{text:"Wells score then CTPA",correct:true},{text:"V/Q scan",correct:false},{text:"Lower extremity ultrasound",correct:false}],explanation:{correct:"Correct! Use Wells score to assess pretest probability. If high/intermediate probability, go straight to CTPA. D-dimer only useful in low-probability patients to rule out.",incorrect:"Risk stratify first. Wells score determines pretest probability. High probability → CTPA directly. Low probability → D-dimer can rule out."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Wells Score for PE</div><div class="pathway">Clinical signs of DVT: +3\nPE most likely diagnosis: +3\nHR >100: +1.5\nImmobilization/surgery: +1.5\nPrior PE/DVT: +1.5\nHemoptysis: +1\nMalignancy: +1\n\n>4 points = PE likely → CTPA\n≤4 points = D-dimer, if negative rules out</div></div>',why_chain:[],points:10}},
        {title:"Other Important Causes",content:'<div class="narrative"><p>Not all chest pain is deadly. Consider other causes after ruling out the Big 5.</p></div>',question:{prompt:"Which feature suggests PERICARDITIS rather than ACS?",options:[{text:"Pain worse with exertion",correct:false},{text:"Pain relieved by leaning forward",correct:true},{text:"Pain radiating to jaw",correct:false},{text:"Associated with diaphoresis",correct:false}],explanation:{correct:"Correct! Pericarditis: sharp, pleuritic pain worse supine and improved leaning forward. Also: friction rub, diffuse ST elevation with PR depression.",incorrect:"Pericarditis = sharp pain improved by leaning forward. Look for friction rub and diffuse ST elevation with PR depression."},teaching:'<h4>Non-Cardiac Chest Pain</h4><table class="comparison-table"><tr><th>Cause</th><th>Features</th></tr><tr><td>Pericarditis</td><td>Sharp, pleuritic, better leaning forward, friction rub</td></tr><tr><td>GERD</td><td>Burning, worse after meals, relieved by antacids</td></tr><tr><td>MSK</td><td>Reproducible with palpation</td></tr><tr><td>Costochondritis</td><td>Tender at costochondral junctions</td></tr><tr><td>Anxiety/Panic</td><td>Younger patient, hyperventilation, tingling</td></tr></table>',why_chain:[],points:10}},
        {title:"Risk Stratification",content:'<div class="narrative"><p>For ACS, risk scores help guide management. The HEART score is widely used.</p></div>',question:{prompt:"A patient with HEART score of 7 should receive:",options:[{text:"Discharge with outpatient stress test",correct:false},{text:"Admission and early invasive strategy",correct:true},{text:"D-dimer testing",correct:false},{text:"Observation for 6 hours only",correct:false}],explanation:{correct:"Correct! HEART score 7+ = high risk (>12% 30-day MACE). Requires admission and likely early invasive strategy with cardiology consultation.",incorrect:"HEART score 7+ is high risk. Needs admission and early invasive evaluation."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 HEART Score</div><div class="pathway">H - History (0-2)\nE - ECG (0-2)\nA - Age (0-2)\nR - Risk factors (0-2)\nT - Troponin (0-2)\n\n0-3: Low risk (discharge with follow-up)\n4-6: Moderate (observe, consider cath)\n7-10: High risk (admit, early invasive)</div></div>',why_chain:[],points:10}},
        {title:"Case Resolution",content:'<div class="narrative"><p>Your original patient had STEMI. He received aspirin, heparin, and emergent PCI with stent placement. Door-to-balloon time was 75 minutes.</p></div><div class="mechanism-box"><div class="mechanism-title">📚 Chest Pain Summary</div><div class="pathway">ALWAYS CONSIDER THE DEADLY 5:\n1. ACS (STEMI/NSTEMI/UA)\n2. PE\n3. Aortic Dissection\n4. Tension Pneumothorax\n5. Esophageal Rupture\n\nKEY PRINCIPLES:\n• Tension PTX = clinical diagnosis\n• STEMI = immediate cath lab\n• Dissection = BP differential, surgery for Type A\n• PE = Wells score → CTPA or D-dimer\n• HEART score for ACS risk stratification</div></div>',question:{prompt:"What medication should be given to ALL suspected ACS patients (if no contraindication)?",options:[{text:"Nitroglycerin",correct:false},{text:"Morphine",correct:false},{text:"Aspirin",correct:true},{text:"Heparin",correct:false}],explanation:{correct:"Correct! Aspirin 325mg should be given to all suspected ACS unless true allergy. It reduces mortality by 23%. MONA is outdated - aspirin is the only universal agent.",incorrect:"Aspirin 325mg for ALL ACS (unless allergy). Proven mortality benefit. NTG is for symptom relief. Morphine may increase mortality. Heparin depends on strategy."},teaching:'<h4>Key Takeaways</h4><ul style="line-height:2;margin-left:20px;"><li>Always consider the Deadly 5</li><li>Tension PTX = clinical diagnosis, treat immediately</li><li>STEMI = emergent PCI</li><li>Dissection: β-blocker before vasodilator</li><li>PE: Wells score guides workup</li><li>Aspirin for all ACS</li></ul>',why_chain:[],points:10}},
        {title:"Clinical Integration",content:'<div class="narrative"><p>You synthesize all the clinical information to ensure optimal patient care.</p></div>',question:{prompt:"What principle is MOST important for excellent clinical outcomes?",options:[{text:"Integrating clinical presentation with evidence-based guidelines while reassessing response to treatment",correct:true},{text:"Following protocols exactly without clinical judgment",correct:false},{text:"Ordering comprehensive testing to avoid any missed diagnoses",correct:false},{text:"Making a diagnosis quickly and committing to it without reconsideration",correct:false}],explanation:{correct:"Excellent clinical care combines systematic assessment, evidence-based treatment, and ongoing reassessment. Guidelines inform but don't replace clinical reasoning.",incorrect:"Good clinical care requires flexibility, reassessment, and integration of guidelines with patient-specific factors."},teaching:'<h4>Clinical Reasoning</h4><ul><li>Systematic data gathering</li><li>Evidence-based management</li><li>Regular reassessment</li><li>Patient-centered communication</li></ul>',why_chain:[],points:10}}
    ];
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:#4ade80;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><p>You mastered Chest Pain!</p></div>';}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
