<!DOCTYPE html>
<html lang="en">
<head>
<script>
// Auth Guard - Redirect if not logged in
(function(){var AUTH_KEY="reasondx-user";function getAuthPath(){var d=(location.pathname.match(/\//g)||[]).length-1,p="";for(var i=0;i<d;i++)p+="../";return p+"auth/login.html"}function isAuth(){try{var u=localStorage.getItem(AUTH_KEY);if(u){var j=JSON.parse(u);return j&&j.email&&j.name}}catch(e){}return false}if(!isAuth()){sessionStorage.setItem("reasondx-redirect",location.href);location.replace(getAuthPath())}})();</script>
<script>(function(){var d=(location.pathname.match(/\//g)||[]).length-1,p="";for(var i=0;i<d;i++)p+="../";var s=document.createElement("script");s.src=p+"dx-user-bar.js";document.head.appendChild(s)})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acute Sinusitis | Clinical Adventure</title>
    <link href="../css/rdx-adventure-responsive.css" rel="stylesheet">
<link href="../css/rdx-a11y.css" rel="stylesheet">
<style>
        :root { --primary: #4A90A4; --primary-dark: #2D5A6A; --accent: #F4A261; --success: #2A9D8F; --danger: #E63946; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #F8FAFC; }
        .container { max-width: 900px; margin: 0 auto; padding: 1rem; }
        .header { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; }
        .scene { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .scene-title { font-size: 1.1rem; font-weight: 600; color: var(--primary-dark); margin-bottom: 1rem; }
        .patient-info { background: #E3F2FD; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .narrative { line-height: 1.7; margin-bottom: 1.5rem; }
        .question { background: #FFF8E1; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border-left: 4px solid var(--accent); }
        .options { display: flex; flex-direction: column; gap: 0.75rem; }
        .option { padding: 1rem; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; background: white; text-align: left; }
        .option:hover { border-color: var(--primary); }
        .option.correct { border-color: var(--success); background: #E8F5E9; }
        .option.incorrect { border-color: var(--danger); background: #FFEBEE; }
        .feedback { padding: 1rem; border-radius: 8px; margin-top: 1rem; display: none; }
        .feedback.show { display: block; }
        .feedback.correct { background: #E8F5E9; border-left: 4px solid var(--success); }
        .feedback.incorrect { background: #FFEBEE; border-left: 4px solid var(--danger); }
        .teaching { background: #E8F5E9; padding: 1rem; border-radius: 8px; margin-top: 1rem; }
        .teaching h4 { color: var(--success); margin-bottom: 0.5rem; }
        .btn { padding: 0.75rem 1.5rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; }
        .btn-primary { background: var(--primary); color: white; }
        .nav-row { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .score-card { background: var(--success); color: white; padding: 2rem; border-radius: 12px; text-align: center; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.3); border-radius: 4px; margin-top: 1rem; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
    </style>
    <link rel="stylesheet" href="dx-case-banner-fix.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👃 Acute Sinusitis</h1>
            <p>Viral vs bacterial and antibiotic stewardship</p>
            <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        </div>
        <div id="scene-container"></div>
        <div id="completion" style="display:none;"></div>
    </div>
    <script>
const scenes = [
    {icon:'🏥',title:'Scene 1: Initial Presentation',patient:'35-year-old female with nasal congestion and facial pressure × 5 days',narrative:'She reports bilateral facial pressure worse when bending, thick yellow-green discharge, mild headache. No fever. Symptoms started with a cold 5 days ago.',question:'Based on duration, is this viral or bacterial?',options:[{text:'Bacterial - purulent discharge',correct:false,feedback:'Purulent discharge is normal in viral URI.'},{text:'Viral - symptoms <10 days without red flags',correct:true,feedback:'Correct! Bacterial criteria: ≥10 days without improvement, severe onset, or "double sickening."'},{text:'Cannot determine without imaging',correct:false,feedback:'Imaging not needed for uncomplicated sinusitis.'}],teaching:'IDSA bacterial criteria: (1) ≥10 days without improvement, (2) Severe onset (fever ≥39°C + purulent × 3-4 days), (3) Double sickening.'},
    {icon:'📅',title:'Scene 2: Day 12',narrative:'Patient returns at day 12 with persistent symptoms, now with maxillary tooth pain and low-grade fever (38.1°C).',question:'What is first-line antibiotic for bacterial sinusitis?',options:[{text:'Azithromycin',correct:false,feedback:'High resistance rates. Not first-line.'},{text:'Amoxicillin-clavulanate × 5-7 days',correct:true,feedback:'Correct! Covers S. pneumoniae, H. influenzae, M. catarrhalis.'},{text:'Ciprofloxacin',correct:false,feedback:'Poor S. pneumoniae coverage.'}]},
    {icon:'⚠️',title:'Scene 3: Red Flags',narrative:'You prescribe antibiotics and counsel about red flag symptoms.',question:'Which finding needs urgent evaluation?',options:[{text:'Low-grade fever on day 2 of antibiotics',correct:false,feedback:'Expected - takes 48-72h to improve.'},{text:'Periorbital swelling, vision changes, or severe headache',correct:true,feedback:'Correct! Suggest orbital cellulitis, cavernous sinus thrombosis, or intracranial extension.'},{text:'Persistent nasal congestion',correct:false,feedback:'Congestion can persist for weeks.'}],teaching:'Emergencies: Orbital cellulitis (proptosis, EOM limitation), cavernous sinus thrombosis, meningitis, brain abscess.'},
    {icon:'🔬',title:'Scene 4: Allergic Rhinitis Overlap',narrative:'The patient mentions this is her 4th sinusitis episode this year. She has year-round nasal congestion.',question:'What underlying condition should you evaluate?',options:[{text:'Immunodeficiency',correct:false,feedback:'Consider if severe/unusual infections. This pattern suggests allergic rhinitis.'},{text:'Allergic rhinitis - major predisposing factor',correct:true,feedback:'Correct! Allergic inflammation causes ostial obstruction, predisposing to sinusitis. Treating underlying allergies reduces recurrence.'},{text:'Cystic fibrosis',correct:false,feedback:'Consider if chronic sinusitis + respiratory/GI symptoms in younger patient.'}]},
    {icon:'✅',title:'Scene 5: Resolution',narrative:'Patient improves with antibiotics. You refer for allergy testing and start intranasal corticosteroids for allergic rhinitis prophylaxis.',teaching:'Sinusitis Summary:\n• Most acute sinusitis is viral (98%)\n• Bacterial criteria: ≥10 days, severe onset, double-sickening\n• First-line: Amoxicillin-clavulanate × 5-7 days\n• Red flags: Periorbital swelling, vision change, severe headache\n• Treat underlying allergic rhinitis to prevent recurrence'}
];
let currentScene=0,score=0;
function renderScene(){const s=scenes[currentScene];document.getElementById('progress').style.width=((currentScene+1)/scenes.length*100)+'%';let h='<div class="scene"><div class="scene-title">'+(s.icon||'📋')+' '+s.title+'</div>';if(s.patient)h+='<div class="patient-info"><strong>'+s.patient+'</strong></div>';h+='<div class="narrative">'+s.narrative+'</div>';if(s.question){h+='<div class="question"><strong>❓ '+s.question+'</strong></div><div class="options">';s.options.forEach((o,i)=>h+='<button class="option" onclick="select('+i+')" data-c="'+!!o.correct+'">'+o.text+'</button>');h+='</div><div class="feedback" id="fb"></div>';}if(s.teaching)h+='<div class="teaching"><h4>📚 Teaching</h4><p>'+s.teaching+'</p></div>';h+='<div class="nav-row">'+(s.question?'':'<button class="btn btn-primary" onclick="next()">Continue →</button>')+'</div></div>';document.getElementById('scene-container').innerHTML=h;}
function select(i){const opts=document.querySelectorAll('.option'),fb=document.getElementById('fb'),s=scenes[currentScene];opts.forEach((o,j)=>{o.style.pointerEvents='none';if(j===i){if(o.dataset.c==='true'){o.classList.add('correct');score++;fb.className='feedback show correct';fb.innerHTML='<strong>✓ Correct!</strong> '+s.options[i].feedback;}else{o.classList.add('incorrect');fb.className='feedback show incorrect';fb.innerHTML='<strong>✗</strong> '+s.options[i].feedback;opts.forEach(x=>{if(x.dataset.c==='true')x.classList.add('correct');});}}});setTimeout(()=>{document.querySelector('.nav-row').innerHTML='<button class="btn btn-primary" onclick="next()">Continue →</button>';},800);}
function next(){currentScene++;if(currentScene>=scenes.length)complete();else{renderScene();window.scrollTo({top:0,behavior:'smooth'});}}
function complete(){document.getElementById('scene-container').style.display='none';const q=scenes.filter(s=>s.question).length;document.getElementById('completion').innerHTML='<div class="score-card"><h2>🎉 Complete!</h2><p>Score: '+score+'/'+q+'</p></div><div class="nav-row" style="justify-content:center;margin-top:1rem;"><a href="../adventure-hub.html" class="btn btn-primary">← Back</a></div>';document.getElementById('completion').style.display='block';}
renderScene();
    </script>

    <!-- ReasonDx AI Tutor Integration -->
    <div data-dx-tutor
         data-module-title="Acute Sinusitis"

         style="display:none;"></div>
