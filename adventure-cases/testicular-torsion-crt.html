    <meta charset="UTF-8">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #7f1d1d 0%, #dc2626 100%); min-height: 100vh; padding: 20px; color: #f8fafc; }

        .header h1 { font-size: 1.5rem; color: #fca5a5; }
        .emergency-banner { background: #dc2626; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; margin: 10px 0; }

        .progress-fill { height: 100%; background: linear-gradient(90deg, #fca5a5, #fbbf24); border-radius: 3px; transition: width 0.3s; }

        .narrative { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px 20px; margin: 16px 0; border-left: 4px solid #f87171; line-height: 1.7; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .question-box { background: linear-gradient(135deg, rgba(248,113,113,0.2), rgba(251,191,36,0.2)); border: 1px solid rgba(248,113,113,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .question-prompt { font-size: 1.1rem; font-weight: 600; color: #fee2e2; margin-bottom: 16px; }
        .mcq-options { display: flex; flex-direction: column; gap: 10px; }
        .mcq-option { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: flex-start; gap: 12px; }
        .mcq-option:hover:not(.disabled) { background: rgba(255,255,255,0.1); }
        .mcq-option.disabled { cursor: default; opacity: 0.7; }

        .mcq-option.incorrect { border-color: #ef4444 !important; background: rgba(239,68,68,0.2) !important; }
        .option-letter { width: 28px; height: 28px; background: rgba(248,113,113,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
        .feedback { display: none; margin-top: 16px; padding: 16px; border-radius: 10px; }
        .feedback.show { display: block; }
        .correct-feedback { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); }
        .incorrect-feedback { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); }
        .teaching-point { display: none; margin-top: 20px; background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.3); border-radius: 12px; padding: 20px; }
        .teaching-point.show { display: block; }
        .mechanism-box { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 16px; margin: 12px 0; }

        .btn { background: linear-gradient(135deg, #f87171, #fbbf24); color: white; border: none; padding: 12px 28px; border-radius: 25px; font-weight: 600; cursor: pointer; display: none; margin-top: 16px; }

<body>
    <div class="container">
        <div class="header">
            <h1>🚨 Testicular Torsion</h1>
            <div class="emergency-banner">⏰ TIME IS TESTICLE - SURGICAL EMERGENCY</div>
            <div class="score-display">
                <div class="score-item">Score: <strong id="score">0</strong>/<span id="maxScore">60</span></div>
                <div class="score-item">Stage: <span id="stageNum">1</span>/6</div>
            </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width: 16%"></div></div>
        <div id="scene-container"></div>
    </div>
    <script>
    let currentStage = 0, score = 0;
    const stages = [
        {title:"Midnight Emergency",content:'<div class="narrative"><p>A <span class="highlight">15-year-old boy</span> is brought to the ED at 2 AM with <span class="critical">sudden onset severe left testicular pain</span> that woke him from sleep 2 hours ago. He has <span class="highlight">nausea and has vomited twice</span>. He denies dysuria, urethral discharge, or recent trauma. He had a similar episode 3 months ago that resolved on its own.</p></div>',question:{prompt:"What is your leading diagnosis?",options:[{text:"Epididymitis",correct:false},{text:"Testicular torsion",correct:true},{text:"Torsion of appendix testis",correct:false},{text:"Inguinal hernia",correct:false}],explanation:{correct:"Correct! The classic presentation - sudden onset severe testicular pain waking from sleep in an adolescent male with nausea/vomiting - is testicular torsion until proven otherwise. The prior self-resolving episode suggests intermittent torsion/detorsion.",incorrect:"Sudden onset severe pain + adolescent + waking from sleep + nausea = testicular torsion until proven otherwise!"},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Classic Presentation</div><div class="pathway">TESTICULAR TORSION CLUES:\n• Sudden onset severe pain\n• Wakes patient from sleep\n• Peak age: puberty (12-18)\n• Nausea/vomiting (common)\n• Prior similar episodes\n  (intermittent torsion)\n• NO urinary symptoms\n\nEPIDIDYMITIS clues (different):\n• Gradual onset\n• Dysuria, pyuria\n• Sexually active\n• Fever</div></div>',points:10}},
        
        {title:"Physical Examination",content:'<div class="narrative"><p>On exam, the left testis appears <span class="highlight">high-riding</span> with a <span class="highlight">transverse lie</span>. The scrotum is erythematous and swollen. You test the cremasteric reflex by stroking the inner thigh.</p></div>',question:{prompt:"What finding on physical exam is MOST sensitive for testicular torsion?",options:[{text:"High-riding testis",correct:false},{text:"Absent cremasteric reflex",correct:true},{text:"Blue discoloration",correct:false},{text:"Positive Prehn sign",correct:false}],explanation:{correct:"Correct! Absent cremasteric reflex is the most sensitive physical exam finding (~99%). In torsion, the reflex arc is disrupted. High-riding testis and transverse lie are also classic but less sensitive.",incorrect:"Absent cremasteric reflex is ~99% sensitive for torsion. Prehn sign (relief with elevation) is unreliable and should NOT be used to rule out torsion."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Physical Exam Findings</div><div class="pathway">CLASSIC FINDINGS:\n• High-riding testis\n  (cord shortens with twist)\n• Transverse lie\n  (horizontal orientation)\n• ABSENT CREMASTERIC REFLEX\n  (most sensitive - 99%!)\n• Diffuse tenderness\n• Swelling, erythema\n\nPREHN SIGN: UNRELIABLE!\nDon\'t use to rule out torsion.</div></div>',points:10}},

        {title:"Time-Critical Decision",content:'<div class="narrative"><p>The cremasteric reflex is <span class="critical">absent</span>. Symptom onset was approximately <span class="highlight">2 hours ago</span>. You need to make a decision about the next step.</p></div>',question:{prompt:"What is the BEST next step?",options:[{text:"Doppler ultrasound of the scrotum",correct:false},{text:"Urinalysis and urine culture",correct:false},{text:"Emergent scrotal exploration in the OR",correct:true},{text:"Trial of manual detorsion and observation",correct:false}],explanation:{correct:"Correct! With high clinical suspicion (classic presentation + absent cremasteric reflex), go directly to the OR. Do NOT delay for imaging. Salvage rate is >90% if explored within 6 hours.",incorrect:"With high clinical suspicion, GO TO THE OR. Don't delay for imaging. A negative exploration is acceptable; a missed torsion is devastating."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Salvage Rates by Time</div><div class="pathway">TIME FROM ONSET → SALVAGE RATE\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n<6 hours    →  90-100% ✓\n6-12 hours  →  50%\n12-24 hours →  10-20%\n>24 hours   →  Near 0%\n\nBOTTOM LINE:\nHigh suspicion → OR, not imaging\nA negative exploration is OK\nA missed torsion is NOT</div></div>',points:10}},

        {title:"Surgical Findings",content:'<div class="narrative"><p>In the OR, you make a scrotal incision and find the left testis is twisted <span class="highlight">720 degrees</span> (two full turns). After detorsion, the testis is initially dusky but gradually pinks up over 15 minutes with palpable arterial pulsations.</p></div>',question:{prompt:"The testis appears viable. What MUST you do next?",options:[{text:"Close and schedule follow-up",correct:false},{text:"Perform left orchiopexy only",correct:false},{text:"Perform BILATERAL orchiopexy",correct:true},{text:"Remove the testis prophylactically",correct:false}],explanation:{correct:"Correct! You MUST fix BOTH testes. The bell clapper deformity that allows torsion is bilateral in ~80% of cases. Fixing only the affected side leaves the patient at high risk for contralateral torsion.",incorrect:"Always bilateral orchiopexy! The anatomic predisposition (bell clapper deformity) is bilateral in 80% of cases."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Bell Clapper Deformity</div><div class="pathway">WHY BILATERAL ORCHIOPEXY?\n\nBell clapper deformity:\n• Tunica vaginalis wraps\n  entire testis\n• Testis hangs freely\n• Can rotate on cord\n\nBILATERAL in 80% of cases!\n\nIf you only fix one side:\n• Contralateral torsion risk\n• Medico-legal liability\n\nALWAYS FIX BOTH SIDES\n(3-point fixation)</div></div>',points:10}},

        {title:"Manual Detorsion",content:'<div class="narrative"><p>A colleague asks about manual detorsion as a temporizing measure while waiting for the OR.</p></div>',question:{prompt:"For manual detorsion, which direction should you rotate the LEFT testis?",options:[{text:"Clockwise (medial rotation)",correct:true},{text:"Counterclockwise (lateral rotation)",correct:false},{text:"It doesn't matter which direction",correct:false},{text:"Manual detorsion is contraindicated",correct:false}],explanation:{correct:"Correct! 'Open the book' - rotate outward/laterally. For LEFT testis, that means CLOCKWISE. For RIGHT testis, counterclockwise. However, if pain worsens, try the opposite direction. Still need surgical fixation afterward!",incorrect:"'Open the book' = rotate outward. LEFT = clockwise. RIGHT = counterclockwise. Surgery still required for fixation."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Manual Detorsion</div><div class="pathway">"OPEN THE BOOK" TECHNIQUE:\n\nRotate testis OUTWARD (lateral)\n\nLEFT testis  → Clockwise\nRIGHT testis → Counterclockwise\n\nMay need 1-3 full rotations\n\nSUCCESS SIGNS:\n• Pain relief\n• Cord lengthens\n• Testis descends\n\n⚠️ STILL NEED SURGERY!\nThis is temporizing only.\nBilateral orchiopexy required.</div></div>',points:10}},

        {title:"Differential Diagnosis",content:'<div class="narrative"><p>An 8-year-old boy presents with testicular pain. On exam, you see a small <span class="highlight">blue dot</span> visible through the scrotal skin at the upper pole of the testis. Cremasteric reflex is intact.</p></div>',question:{prompt:"This presentation is most consistent with:",options:[{text:"Testicular torsion",correct:false},{text:"Torsion of appendix testis",correct:true},{text:"Epididymitis",correct:false},{text:"Testicular tumor",correct:false}],explanation:{correct:"Correct! The 'blue dot sign' is pathognomonic for torsion of the appendix testis - an infarcted appendage visible through thin scrotal skin. This is the most common cause of acute scrotum in prepubertal boys. It's self-limited and managed conservatively.",incorrect:"Blue dot sign = torsion of appendix testis. This is benign and self-limited. Most common acute scrotum in prepubertal boys."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Torsion of Appendix Testis</div><div class="pathway">APPENDIX TESTIS:\n• Müllerian remnant at upper pole\n• Most common acute scrotum\n  in PREPUBERTAL boys\n\nBLUE DOT SIGN:\n• Infarcted appendage visible\n  through scrotal skin\n• Pathognomonic!\n\nKEY DIFFERENCES FROM TORSION:\n• Cremasteric reflex INTACT\n• Point tenderness (upper pole)\n• Less severe pain\n\nMANAGEMENT:\n• Conservative (NSAIDs, rest)\n• Self-limited (1-2 weeks)\n• Surgery only if uncertain dx</div></div>',points:10}}
    ];
    
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('stageNum').textContent=currentStage+1;document.getElementById('maxScore').textContent=stages.length*10;}
    
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><strong>✓ Correct!</strong> '+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><strong>✗ Not quite.</strong> '+stage.question.explanation.incorrect+'</div><div class="teaching-point" id="teaching">'+stage.question.teaching+'</div><button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=10;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}document.getElementById('teaching').classList.add('show');document.getElementById('next-btn').classList.add('show');}
    
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene" style="text-align:center;padding:40px;"><h2 style="color:#fca5a5;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong>/60</p><div style="margin-top:20px;padding:15px;background:rgba(59,130,246,0.15);border-radius:10px;border:1px solid rgba(59,130,246,0.3);"><p style="color:#93c5fd;margin-bottom:10px;font-weight:600;">📚 Learn More:</p><div style="display:flex;flex-wrap:wrap;gap:8px;"><a href="../../mechanism/testicular-torsion-module.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📘 MechanismDx</a><a href="https://www.ncbi.nlm.nih.gov/books/?term=testicular+torsion" target="_blank" title="Deep dive via StatPearls" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📊 Deep Dive</a></div><div style="margin-top:10px;"><a href="https://www.ncbi.nlm.nih.gov/books/NBK448199/" target="_blank" style="color:#93c5fd;font-size:0.8rem;">📖 StatPearls Reference</a></div></div><p>You mastered Testicular Torsion!</p><p style="margin-top:20px;color:#fbbf24;">Remember: Time is Testicle! <6 hours = 90%+ salvage</p></div>';}}
    
    renderStage();
    </script>
