<script>(function(){var d=(location.pathname.match(/\//g)||[]).length-1,p="";for(var i=0;i<d;i++)p+="../";var s=document.createElement("script");s.src=p+"dx-user-bar.js";document.head.appendChild(s)})();</script>
    <meta charset="UTF-8">

    <title>Urinary Incontinence - Clinical Reasoning Case</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #be185d 0%, #ec4899 100%); min-height: 100vh; padding: 20px; color: #f8fafc; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { background: rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: #fbcfe8; }
        .score-display { display: flex; gap: 20px; font-size: 0.9rem; margin-top: 10px; }
        .score-item { background: rgba(255,255,255,0.15); padding: 8px 16px; border-radius: 20px; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; margin-top: 12px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #fbcfe8, #fbbf24); border-radius: 3px; transition: width 0.3s; }
        .scene { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        .scene-phase { font-size: 0.85rem; color: #fbcfe8; text-transform: uppercase; }

        .narrative { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px 20px; margin: 16px 0; border-left: 4px solid #ec4899; line-height: 1.7; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #fca5a5; font-weight: 600; }
        .question-box { background: linear-gradient(135deg, rgba(236,72,153,0.2), rgba(251,191,36,0.2)); border: 1px solid rgba(236,72,153,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .question-prompt { font-size: 1.1rem; font-weight: 600; color: #fce7f3; margin-bottom: 16px; }
        .mcq-options { display: flex; flex-direction: column; gap: 10px; }
        .mcq-option { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: flex-start; gap: 12px; }
        .mcq-option:hover:not(.disabled) { background: rgba(255,255,255,0.1); }
        .mcq-option.disabled { cursor: default; opacity: 0.7; }
        .mcq-option.correct { border-color: #22c55e !important; background: rgba(34,197,94,0.2) !important; opacity: 1 !important; }
        .mcq-option.incorrect { border-color: #ef4444 !important; background: rgba(239,68,68,0.2) !important; }
        .option-letter { width: 28px; height: 28px; background: rgba(236,72,153,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
        .feedback { display: none; margin-top: 16px; padding: 16px; border-radius: 10px; }
        .feedback.show { display: block; }
        .correct-feedback { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); }
        .incorrect-feedback { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); }
        .teaching-point { display: none; margin-top: 20px; background: rgba(236,72,153,0.15); border: 1px solid rgba(236,72,153,0.3); border-radius: 12px; padding: 20px; }
        .teaching-point.show { display: block; }
        .mechanism-box { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 16px; margin: 12px 0; }
        .mechanism-title { color: #fbcfe8; font-weight: 600; margin-bottom: 10px; }
        .pathway { font-family: 'Monaco', 'Consolas', monospace; font-size: 0.85rem; white-space: pre-wrap; line-height: 1.6; }
        .btn { background: linear-gradient(135deg, #ec4899, #fbbf24); color: white; border: none; padding: 12px 28px; border-radius: 25px; font-weight: 600; cursor: pointer; display: none; margin-top: 16px; }
        .btn.show { display: inline-block; }

<body>
    <div class="container">
        <div class="header">
            <h1>💧 Urinary Incontinence</h1>
            <div class="score-display">
                <div class="score-item">Score: <strong id="score">0</strong>/<span id="maxScore">70</span></div>
                <div class="score-item">Stage: <span id="stageNum">1</span>/7</div>
            </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width: 14%"></div></div>
        <div id="scene-container"></div>
    </div>
    <script>
    let currentStage = 0, score = 0;
    const stages = [
        {title:"The Complaint",content:'<div class="narrative"><p>A <span class="highlight">52-year-old woman</span> (G3P3) presents with urinary leakage that has been worsening over the past 2 years. She reports <span class="critical">leaking when she coughs, sneezes, laughs, or exercises</span>. She denies any strong urge before leaking. She\'s started wearing pads daily and has stopped going to her exercise class because of embarrassment.</p></div>',question:{prompt:"Based on her symptoms, what type of incontinence does she most likely have?",options:[{text:"Urge incontinence",correct:false},{text:"Stress urinary incontinence",correct:true},{text:"Overflow incontinence",correct:false},{text:"Functional incontinence",correct:false}],explanation:{correct:"Correct! Leakage with increased abdominal pressure (cough, sneeze, laugh, exercise) WITHOUT preceding urgency is classic STRESS urinary incontinence. It's caused by urethral sphincter weakness or hypermobility.",incorrect:"Leakage WITH activity (cough, sneeze) and WITHOUT urgency = Stress incontinence. Key: no urge before leaking."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Types of Incontinence</div><div class="pathway">STRESS URINARY INCONTINENCE (SUI):\n• Leaks WITH activity/pressure\n• Cough, sneeze, laugh, exercise\n• NO urge before leaking\n• Mechanism: Sphincter weakness or\n  urethral hypermobility\n\nURGE INCONTINENCE (OAB-wet):\n• Sudden strong urge\n• Can\'t make it to bathroom\n• "Gotta go, gotta go"\n• Mechanism: Detrusor overactivity\n\nMIXED INCONTINENCE:\n• Features of BOTH\n• Very common in women\n\nOVERFLOW INCONTINENCE:\n• Constant dribbling\n• Incomplete emptying\n• High post-void residual</div></div>',points:10}},
        
        {title:"Risk Factors",content:'<div class="narrative"><p>You take more history. She had 3 vaginal deliveries, the largest baby was 9 lbs. She went through menopause 3 years ago. Her BMI is 32. She has chronic cough from allergies.</p></div>',question:{prompt:"Which of her risk factors is MOST associated with stress urinary incontinence?",options:[{text:"Menopause alone",correct:false},{text:"Vaginal deliveries",correct:true},{text:"Allergies",correct:false},{text:"Age over 50",correct:false}],explanation:{correct:"Correct! Vaginal delivery is the strongest risk factor for SUI due to pelvic floor trauma, pudendal nerve injury, and fascial stretching. Multiple deliveries and large babies increase risk. Obesity, menopause, and chronic cough also contribute.",incorrect:"Vaginal delivery is the #1 risk factor for SUI due to pelvic floor/nerve/fascia damage during childbirth."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 SUI Risk Factors</div><div class="pathway">MAJOR RISK FACTORS:\n• Vaginal delivery (most important)\n  - Multiple deliveries\n  - Large babies\n  - Instrumented delivery\n• Obesity\n• Menopause (estrogen loss)\n• Pelvic surgery (hysterectomy)\n• Chronic cough/straining\n• Connective tissue disorders\n\nMECHANISM:\n• Pelvic floor weakness\n• Urethral hypermobility\n• Intrinsic sphincter deficiency\n• Loss of urethral support\n\nVaginal estrogen helps with\natrophic changes but doesn\'t\ncure SUI alone</div></div>',points:10}},

        {title:"Evaluation",content:'<div class="narrative"><p>On exam, you ask her to cough with a full bladder. You observe <span class="highlight">urine leakage during the cough</span>. Pelvic exam shows mild cystocele and vaginal atrophy.</p></div>',question:{prompt:"What office test did you just perform?",options:[{text:"Urodynamic study",correct:false},{text:"Cystoscopy",correct:false},{text:"Cough stress test",correct:true},{text:"Voiding cystourethrogram",correct:false}],explanation:{correct:"Correct! The cough stress test is a simple office test - with a comfortably full bladder, the patient coughs and you observe for leakage. Positive test supports the diagnosis of SUI. No special equipment needed.",incorrect:"Cough stress test = simple office test. Patient coughs with full bladder; observe for leakage. Confirms SUI."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 SUI Evaluation</div><div class="pathway">INITIAL EVALUATION:\n\n1. HISTORY:\n   • When does leakage occur?\n   • Urge present? (differentiates types)\n   • Voiding diary helpful\n\n2. PHYSICAL EXAM:\n   • Cough stress test\n   • Pelvic exam (prolapse, atrophy)\n   • Neurologic exam\n\n3. BASIC TESTS:\n   • Urinalysis (rule out UTI)\n   • Post-void residual (PVR)\n\n4. OPTIONAL/COMPLEX CASES:\n   • Urodynamics\n   • Cystoscopy\n   \nUrodynamics reserved for:\n• Failed prior surgery\n• Mixed symptoms\n• Neurologic disease</div></div>',points:10}},

        {title:"First-Line Treatment",content:'<div class="narrative"><p>You discuss treatment options. She wants to start with conservative measures before considering surgery.</p></div>',question:{prompt:"What is FIRST-LINE treatment for stress urinary incontinence?",options:[{text:"Midurethral sling surgery",correct:false},{text:"Anticholinergic medication",correct:false},{text:"Pelvic floor muscle training (Kegels)",correct:true},{text:"Bladder Botox injection",correct:false}],explanation:{correct:"Correct! Pelvic floor muscle training (PFMT/Kegels) is first-line for SUI. Supervised physical therapy is more effective than self-directed. 6-12 weeks needed to see benefit. Weight loss also important if obese.",incorrect:"Pelvic floor exercises (Kegels) are first-line for SUI. Anticholinergics and Botox are for URGE incontinence. Sling is surgical option."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 SUI Treatment Algorithm</div><div class="pathway">FIRST-LINE (Conservative):\n• Pelvic floor muscle training (PFMT)\n  - Supervised PT most effective\n  - 6-12 weeks to see results\n  - 50-75% improvement\n• Weight loss (if obese)\n• Treat chronic cough\n• Timed voiding\n\nSECOND-LINE:\n• Pessary (provides support)\n• Urethral inserts\n• Duloxetine (some countries)\n\nTHIRD-LINE (Surgery):\n• Midurethral sling (gold standard)\n• Burch colposuspension\n• Urethral bulking agents\n\nNOTE: Anticholinergics do NOT\nwork for pure SUI!</div></div>',points:10}},

        {title:"Surgical Options",content:'<div class="narrative"><p>After 3 months of dedicated pelvic floor therapy, she has some improvement but still has bothersome leakage. She\'s interested in surgical options.</p></div>',question:{prompt:"What is the GOLD STANDARD surgical treatment for SUI?",options:[{text:"Anterior colporrhaphy",correct:false},{text:"Midurethral sling (TVT/TOT)",correct:true},{text:"Bladder neck suspension",correct:false},{text:"Artificial urinary sphincter",correct:false}],explanation:{correct:"Correct! Midurethral sling (TVT = transvaginal tape, or TOT = transobturator tape) is the gold standard with >80-90% success rates. It provides support under the mid-urethra without tension.",incorrect:"Midurethral sling (TVT/TOT) is gold standard - 80-90% success. Outpatient procedure with quick recovery."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Surgical Options for SUI</div><div class="pathway">MIDURETHRAL SLING (Gold Standard):\n• TVT (retropubic) or TOT (transobturator)\n• Synthetic mesh under mid-urethra\n• Success: 80-90%\n• Outpatient, quick recovery\n• Complications: voiding dysfunction,\n  mesh erosion, pain\n\nBURCH COLPOSUSPENSION:\n• Sutures elevate bladder neck\n• Good long-term data\n• More invasive than sling\n\nURETHRAL BULKING:\n• Injection around urethra\n• Less invasive\n• Lower success, may need repeat\n• Good for poor surgical candidates\n\nAUS (Artificial Urinary Sphincter):\n• Mainly for men post-prostatectomy\n• Rarely used in women</div></div>',points:10}},

        {title:"Different Patient - Urge",content:'<div class="narrative"><p>Another patient: a <span class="highlight">68-year-old woman</span> reports <span class="critical">sudden strong urges to urinate and sometimes doesn\'t make it to the bathroom</span>. She voids 12 times per day and wakes 4 times at night. She has no leakage with coughing.</p></div>',question:{prompt:"This patient has which type of incontinence?",options:[{text:"Stress urinary incontinence",correct:false},{text:"Urge urinary incontinence (OAB)",correct:true},{text:"Overflow incontinence",correct:false},{text:"Mixed incontinence",correct:false}],explanation:{correct:"Correct! Sudden urge with inability to reach bathroom = URGE incontinence (overactive bladder - wet). Frequency and nocturia are hallmarks. No stress leakage. Caused by detrusor overactivity.",incorrect:"Strong urge → can't make it to bathroom = Urge incontinence (OAB). NO leakage with cough/sneeze (that would be stress)."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Urge Incontinence (OAB)</div><div class="pathway">OVERACTIVE BLADDER SYNDROME:\n• Urgency (hallmark symptom)\n• With or without incontinence\n• Usually with frequency, nocturia\n\nURGE INCONTINENCE (OAB-wet):\n• Urgency + involuntary leakage\n• "When I gotta go, I GOTTA GO"\n• Can\'t suppress the urge\n\nMECHANISM:\n• Detrusor overactivity\n• Involuntary bladder contractions\n• Often idiopathic\n• Can be neurogenic\n\nTRIGGERS:\n• Running water\n• Cold\n• Key in door ("latchkey" incont.)\n• Caffeine, alcohol</div></div>',points:10}},

        {title:"Urge Treatment",content:'<div class="narrative"><p>For her urge incontinence, you discuss the treatment approach which differs from stress incontinence.</p></div>',question:{prompt:"What is FIRST-LINE treatment for urge incontinence?",options:[{text:"Midurethral sling",correct:false},{text:"Behavioral therapy and bladder training",correct:true},{text:"Urethral bulking",correct:false},{text:"Pelvic floor surgery",correct:false}],explanation:{correct:"Correct! Behavioral therapy (bladder training, fluid management, timed voiding, avoiding irritants like caffeine) is first-line. Anticholinergics or beta-3 agonists are added if behavioral therapy insufficient.",incorrect:"Behavioral therapy first for urge incontinence: bladder training, timed voiding, avoid caffeine. Meds (anticholinergics/mirabegron) are second-line."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Urge Incontinence Treatment</div><div class="pathway">FIRST-LINE (Behavioral):\n• Bladder training/retraining\n• Timed voiding\n• Fluid management\n• Avoid bladder irritants:\n  - Caffeine, alcohol, spicy foods\n• Pelvic floor exercises can help\n\nSECOND-LINE (Medications):\n• Anticholinergics:\n  - Oxybutynin, tolterodine, solifenacin\n  - Side effects: dry mouth, constipation,\n    cognitive effects (avoid in elderly!)\n• Beta-3 agonists:\n  - Mirabegron\n  - Fewer anticholinergic effects\n\nTHIRD-LINE:\n• OnabotulinumtoxinA (Botox)\n• Sacral neuromodulation (InterStim)\n• PTNS (tibial nerve stimulation)</div></div>',points:10}}
    ];
    
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('stageNum').textContent=currentStage+1;document.getElementById('maxScore').textContent=stages.length*10;}
    
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><strong>✓ Correct!</strong> '+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><strong>✗ Not quite.</strong> '+stage.question.explanation.incorrect+'</div><div class="teaching-point" id="teaching">'+stage.question.teaching+'</div><button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=10;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}document.getElementById('teaching').classList.add('show');document.getElementById('next-btn').classList.add('show');}
    
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene" style="text-align:center;padding:40px;"><h2 style="color:#fbcfe8;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong>/70</p><div style="margin-top:20px;padding:15px;background:rgba(59,130,246,0.15);border-radius:10px;border:1px solid rgba(59,130,246,0.3);"><p style="color:#93c5fd;margin-bottom:10px;font-weight:600;">📚 Learn More:</p><div style="display:flex;flex-wrap:wrap;gap:8px;"><a href="../../mechanism/urinary-incontinence-module.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📘 MechanismDx</a><a href="https://www.ncbi.nlm.nih.gov/books/?term=urinary+incontinence" target="_blank" title="Deep dive via StatPearls" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📊 Deep Dive</a></div><div style="margin-top:10px;"><a href="https://www.ncbi.nlm.nih.gov/books/NBK559095/" target="_blank" style="color:#93c5fd;font-size:0.8rem;">📖 StatPearls Reference</a></div></div><p>You mastered Urinary Incontinence!</p></div>';}}
    
    renderStage();
    </script>

         data-module-title="Urinary Incontinence"
