    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"The Seizing Febrile Child",content:'<div class="narrative"><p>A <span class="highlight">18-month-old girl</span> had a <span class="critical">generalized tonic-clonic seizure</span> at home lasting 2 minutes. She has a fever of 39.5°C with URI symptoms. She is now alert and back to baseline. No seizure history. Vaccinations UTD.</p></div>',question:{prompt:"What is the age range for febrile seizures?",options:[{text:"1 month to 3 years",correct:false},{text:"6 months to 5 years",correct:true},{text:"Any age with fever",correct:false},{text:"3-10 years",correct:false}],explanation:{correct:"Correct! Febrile seizures occur in children 6 months to 5 years (some say 6 months to 6 years). Peak incidence is 12-18 months. Outside this range, consider other causes.",incorrect:"Febrile seizures: 6 months to 5 years. Peak at 12-18 months. Outside this range = different diagnosis."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Febrile Seizure Basics</div><div class="pathway">DEFINITION:\nSeizure + fever in child 6mo-5yr\nwithout CNS infection or other cause\n\nPEAK AGE: 12-18 months\n\nPREVALENCE: 2-5% of children\n\nRISK FACTORS:\n• Family history of febrile seizures\n• Daycare attendance\n• Developmental delay\n• Viral infections (HHV-6, influenza)</div></div>',why_chain:[],points:10}},
        {title:"Simple vs Complex",content:'<div class="narrative"><p>This seizure was generalized, lasted 2 minutes, and occurred once. The child is back to baseline.</p></div>',question:{prompt:"What makes a febrile seizure SIMPLE (vs complex)?",options:[{text:"Any seizure with high fever",correct:false},{text:"Generalized, <15 min, single episode in 24h, no postictal focal deficits",correct:true},{text:"Focal onset seizure",correct:false},{text:"Multiple seizures in 24 hours",correct:false}],explanation:{correct:"Correct! Simple febrile seizure: generalized, <15 minutes, only one in 24 hours, no postictal focal deficits, returns to baseline. Complex = any feature that doesn\'t meet these criteria.",incorrect:"Simple = generalized + <15 min + single in 24h + no focal deficits. Complex = anything else."},teaching:'<h4>Simple vs Complex Febrile Seizures</h4><table class="comparison-table"><tr><th>Feature</th><th>Simple</th><th>Complex</th></tr><tr><td>Type</td><td>Generalized</td><td>Focal or generalized</td></tr><tr><td>Duration</td><td><15 minutes</td><td>≥15 minutes</td></tr><tr><td>Frequency</td><td>Single in 24h</td><td>Multiple in 24h</td></tr><tr><td>Postictal</td><td>No focal deficits</td><td>Focal deficits (Todd\'s)</td></tr><tr><td>Recurrence risk</td><td>~30%</td><td>Higher</td></tr><tr><td>Epilepsy risk</td><td>~1-2%</td><td>Higher (~4-6%)</td></tr></table>',why_chain:[],points:10}},
        {title:"Workup: Do We Need Labs?",content:'<div class="narrative"><p>Parents want to know what tests are needed. The child is alert, well-appearing, with a clear URI as the fever source.</p></div>',question:{prompt:"For a SIMPLE febrile seizure in a well-appearing child with clear fever source, what workup is needed?",options:[{text:"CBC, CMP, blood cultures, LP",correct:false},{text:"EEG and MRI brain",correct:false},{text:"No routine workup required if well-appearing with identified fever source",correct:true},{text:"CT head required",correct:false}],explanation:{correct:"Correct! Simple febrile seizure in a well-appearing child with identified fever source needs NO routine workup. No labs, LP, EEG, or imaging required. Evaluate/treat the fever source.",incorrect:"Simple febrile seizure + well-appearing + clear source = no routine workup. Focus on treating the fever source."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Workup Guidelines</div><div class="pathway">SIMPLE FEBRILE SEIZURE:\n• Well-appearing + clear fever source\n• NO routine labs, LP, EEG, or imaging!\n• Treat the fever source\n\nCONSIDER LP IF:\n• <12 months (especially if unvaccinated)\n• Meningeal signs\n• Already on antibiotics\n• Complex seizure features\n• Not returning to baseline\n\nEEG/IMAGING:\n• Not indicated for simple FS\n• Consider for complex or recurrent</div></div>',why_chain:[],points:10}},
        {title:"Lumbar Puncture Decision",content:'<div class="narrative"><p>When should you consider LP in a child with febrile seizure?</p></div>',question:{prompt:"In which scenario is LP MOST indicated after febrile seizure?",options:[{text:"All first febrile seizures",correct:false},{text:"Child <12 months with incomplete Hib/pneumococcal vaccination",correct:true},{text:"Temperature >40°C",correct:false},{text:"Family history of febrile seizures",correct:false}],explanation:{correct:"Correct! Consider LP in: age <12 months (especially unvaccinated), meningeal signs, pretreated with antibiotics, not returning to baseline. Meningitis can present as seizure + fever.",incorrect:"LP if: <12 months + incomplete vaccination, meningeal signs, on antibiotics, not back to baseline."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 LP Considerations</div><div class="pathway">STRONGLY CONSIDER LP:\n• Age <12 months\n  (especially incomplete Hib/PCV)\n• Meningeal signs present\n• Pretreated with antibiotics\n  (may mask meningitis signs)\n• Not returning to baseline\n• Prolonged postictal period\n\nLP NOT ROUTINELY NEEDED:\n• Simple FS, age >12 mo\n• Fully vaccinated\n• Well-appearing, back to baseline\n• Clear fever source identified</div></div>',why_chain:[],points:10}},
        {title:"Prognosis and Recurrence",content:'<div class="narrative"><p>Parents are worried: "Will this happen again? Will she have epilepsy?"</p></div>',question:{prompt:"What is the approximate recurrence risk after a first simple febrile seizure?",options:[{text:"5%",correct:false},{text:"30%",correct:true},{text:"70%",correct:false},{text:"90%",correct:false}],explanation:{correct:"Correct! ~30% will have another febrile seizure. Risk factors for recurrence: young age at first seizure, family history, lower temperature at seizure, shorter duration of fever before seizure.",incorrect:"~30% recurrence risk. Higher if: young age, family history, lower temp at seizure, short fever duration before seizure."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Prognosis</div><div class="pathway">RECURRENCE RISK: ~30%\n\nRECURRENCE RISK FACTORS:\n• Age <18 months at first seizure\n• Family history of febrile seizures\n• Lower temperature at seizure\n• Shorter fever duration before seizure\n\nEPILEPSY RISK:\n• Simple FS: ~1-2% (vs 1% general)\n• Complex FS: ~4-6%\n• Multiple complex features: higher\n\nDEVELOPMENT:\n• NO increased risk of intellectual disability\n• Reassure parents!</div></div>',why_chain:[],points:10}},
        {title:"Management and Counseling",content:'<div class="narrative"><p>What do you tell the parents about management?</p></div>',question:{prompt:"What is the role of prophylactic anticonvulsants in simple febrile seizures?",options:[{text:"All children should receive them",correct:false},{text:"Not recommended routinely due to side effects outweighing benefits",correct:true},{text:"Only phenobarbital is effective",correct:false},{text:"Required after second seizure",correct:false}],explanation:{correct:"Correct! Prophylactic anticonvulsants are NOT recommended for simple febrile seizures. Risks (sedation, behavioral effects) outweigh benefits. Antipyretics don\'t prevent febrile seizures either.",incorrect:"Prophylactic anticonvulsants NOT recommended. Side effects > benefits. Antipyretics don\'t prevent FS either."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Management</div><div class="pathway">ACUTE:\n• Most stop spontaneously (<5 min)\n• Benzodiazepine if prolonged (>5 min)\n• Treat fever source\n\nPROPHYLAXIS:\n• NOT recommended for simple FS\n• Anticonvulsants have side effects\n• Antipyretics DON\'T prevent FS\n\nCOUNSELING:\n• Reassure (benign condition)\n• ~30% recurrence - that\'s okay\n• Low epilepsy risk\n• Seizure first aid education\n• When to call 911 (>5 min, breathing issues)</div></div>',why_chain:[],points:10}},
        {title:"Case Resolution",content:'<div class="narrative"><p>You diagnose simple febrile seizure secondary to viral URI. No labs or imaging needed. Parents are counseled about recurrence risk, reassured about excellent prognosis, and given seizure first aid education. Follow-up with pediatrician arranged.</p></div><div class="mechanism-box"><div class="mechanism-title">📚 Febrile Seizure Summary</div><div class="pathway">DEFINITION: Seizure + fever, age 6mo-5yr\n\nSIMPLE: Generalized, <15min, single, no focal\nCOMPLEX: Focal, ≥15min, multiple, or focal deficits\n\nWORKUP:\n• Simple + well + clear source = none\n• Consider LP if <12mo, unvaccinated, meningeal signs\n\nPROGNOSIS:\n• Recurrence ~30%\n• Epilepsy risk 1-2% (simple)\n• Normal development expected\n\nNO PROPHYLACTIC ANTICONVULSANTS\nAntipyretics don\'t prevent FS</div></div>',question:{prompt:"A well-appearing 2-year-old has a 3-minute generalized seizure with fever from otitis media. Next step?",options:[{text:"CT head and LP",correct:false},{text:"Start phenobarbital prophylaxis",correct:false},{text:"Treat otitis media, educate parents, no further workup needed",correct:true},{text:"EEG before discharge",correct:false}],explanation:{correct:"Correct! Simple febrile seizure with clear source (otitis) = treat the source, educate parents, no further workup. This is a benign condition with excellent prognosis.",incorrect:"Simple FS + clear source = treat source, educate, no further workup."},teaching:'<h4>Key Takeaways</h4><ul style="line-height:2;margin-left:20px;"><li>Febrile seizures: 6 months to 5 years</li><li>Simple = generalized, <15min, single, no focal</li><li>Simple FS + well-appearing = no routine workup</li><li>LP if <12mo unvaccinated, meningeal signs</li><li>~30% recurrence, ~1-2% epilepsy risk</li><li>No prophylactic anticonvulsants</li><li>Reassure parents!</li></ul>',why_chain:[],points:10}},
        {title:"Clinical Integration",content:'<div class="narrative"><p>You synthesize all the clinical information to ensure optimal patient care.</p></div>',question:{prompt:"What principle is MOST important for excellent clinical outcomes?",options:[{text:"Integrating clinical presentation with evidence-based guidelines while reassessing response to treatment",correct:true},{text:"Following protocols exactly without clinical judgment",correct:false},{text:"Ordering comprehensive testing to avoid any missed diagnoses",correct:false},{text:"Making a diagnosis quickly and committing to it without reconsideration",correct:false}],explanation:{correct:"Excellent clinical care combines systematic assessment, evidence-based treatment, and ongoing reassessment. Guidelines inform but don't replace clinical reasoning.",incorrect:"Good clinical care requires flexibility, reassessment, and integration of guidelines with patient-specific factors."},teaching:'<h4>Clinical Reasoning</h4><ul><li>Systematic data gathering</li><li>Evidence-based management</li><li>Regular reassessment</li><li>Patient-centered communication</li></ul>',why_chain:[],points:10}}
    ];
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:#4ade80;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><p>You mastered Febrile Seizures!</p></div>';}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}

</script>
