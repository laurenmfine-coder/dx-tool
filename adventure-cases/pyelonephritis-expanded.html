<script>
let currentStage = 0, score = 0, maxScore = 0, difficulty = 'standard', answeredQuestions = new Set(), decisionPath = [];

const stages = [
    {
        title: "The Febrile Patient",
        content: `<div class="narrative"><p>A <span class="highlight">28-year-old woman</span> presents with <span class="critical">fever, chills, and flank pain</span> for 2 days. She had dysuria and urinary frequency starting 5 days ago.</p></div>
        <div class="socratic-prompt"><h4>Before Examining the Patient</h4><p>She started with lower urinary tract symptoms (dysuria, frequency) and now has fever and flank pain. What does this progression tell you about the infection's location?</p></div>`,
        hint_beginner: "Lower tract = bladder (cystitis). Fever + flank pain = kidney involvement.",
        hint_advanced: "How does bacterial virulence (P-fimbriae) relate to ascending infection?",
        question: {
            prompt: "What is the HALLMARK finding that distinguishes pyelonephritis from uncomplicated cystitis?",
            options: [
                { text: "Costovertebral angle tenderness (CVA tenderness) - indicates kidney involvement", correct: true },
                { text: "Dysuria and urinary frequency", correct: false },
                { text: "Positive urine leukocyte esterase", correct: false },
                { text: "Bacteriuria on urinalysis", correct: false }
            ],
            explanation: {
                correct: "Excellent! CVA tenderness is the clinical hallmark of pyelonephritis. Cystitis causes bladder symptoms but NO fever and NO flank/CVA tenderness.",
                incorrect: "Dysuria, frequency, pyuria, and bacteriuria occur in BOTH conditions. The distinguishing features of pyelonephritis are: CVA tenderness and fever."
            },
            teaching: `<h4>Cystitis vs Pyelonephritis</h4><table class="comparison-table"><tr><th>Feature</th><th>Cystitis</th><th>Pyelonephritis</th></tr><tr><td>Location</td><td>Bladder</td><td>Kidney</td></tr><tr><td>Symptoms</td><td>Dysuria, frequency</td><td>Fever, chills, flank pain</td></tr><tr><td>Exam</td><td>Suprapubic tenderness</td><td><strong>CVA tenderness</strong></td></tr><tr><td>Systemic</td><td>No fever</td><td>Fever, tachycardia</td></tr></table>`,
            why_chain: [{q: "Why does pyelonephritis cause flank pain?", a: "The renal capsule is stretched by kidney inflammation. The capsule is richly innervated and refers pain to the flank."}, {q: "What causes fever and chills?", a: "Bacterial invasion of kidney triggers systemic inflammation. Gram-negative bacteremia occurs in 20-30% of cases."}],
            points: 10
        }
    },
    {
        title: "Complicated vs Uncomplicated",
        content: `<div class="narrative"><p>You examine the patient:</p><ul><li><strong>Vitals:</strong> T 102.4°F, HR 105, BP 118/72</li><li><strong>Back:</strong> <span class="critical">Marked right CVA tenderness</span></li></ul></div>
        <div class="socratic-prompt"><h4>Risk Stratification</h4><p>What factors would make this a "complicated" pyelonephritis requiring more aggressive management?</p></div>`,
        hint_beginner: "Think: anatomic abnormalities, immunocompromise, pregnancy, male gender",
        hint_advanced: "Why are diabetics at risk for emphysematous pyelonephritis?",
        question: {
            prompt: "Which factor makes pyelonephritis 'COMPLICATED'?",
            options: [
                { text: "Diabetes, pregnancy, urinary obstruction, or male gender", correct: true },
                { text: "Temperature greater than 101°F", correct: false },
                { text: "WBC count greater than 15,000", correct: false },
                { text: "Bilateral CVA tenderness", correct: false }
            ],
            explanation: {
                correct: "Correct! Complicated UTI involves factors increasing treatment failure risk: diabetes, obstruction, pregnancy, male gender, catheter, immunocompromise.",
                incorrect: "Complicated is defined by host/anatomic factors, not severity markers. Male UTI is always complicated."
            },
            teaching: `<h4>Complicated vs Uncomplicated</h4><table class="comparison-table"><tr><th>Uncomplicated</th><th>Complicated</th></tr><tr><td>Young healthy woman</td><td>Diabetes mellitus</td></tr><tr><td>No anatomic abnormalities</td><td>Obstruction (stone, stricture)</td></tr><tr><td>Community-acquired</td><td>Pregnancy</td></tr><tr><td>Can treat outpatient</td><td>Male gender</td></tr></table>`,
            why_chain: [{q: "Why is male UTI complicated?", a: "UTI in men is rare due to longer urethra. When it occurs, it usually indicates underlying abnormality."}, {q: "Why are diabetics high risk?", a: "Impaired immunity, glucosuria promotes growth, neuropathic bladder, risk of emphysematous pyelo."}],
            points: 10
        }
    },
    {
        title: "Uropathogens",
        content: `<div class="narrative"><p><strong>UA:</strong> Positive LE, positive nitrites, WBC 50-100/hpf, bacteria many<br><strong>CBC:</strong> WBC 16,400 with left shift</p></div>
        <div class="socratic-prompt"><h4>Testing Interpretation</h4><p>What organism MOST commonly causes pyelonephritis? Which is suggested by positive nitrites?</p></div>`,
        hint_beginner: "E. coli causes 80% of community-acquired UTI.",
        hint_advanced: "Why don't Enterococcus and Pseudomonas produce positive nitrites?",
        question: {
            prompt: "Which organism causes approximately 80% of community-acquired pyelonephritis?",
            options: [
                { text: "Escherichia coli (E. coli)", correct: true },
                { text: "Klebsiella pneumoniae", correct: false },
                { text: "Enterococcus species", correct: false },
                { text: "Pseudomonas aeruginosa", correct: false }
            ],
            explanation: {
                correct: "Correct! E. coli causes ~80% of cases. It produces positive nitrites (nitrate→nitrite conversion).",
                incorrect: "E. coli causes 80% of pyelonephritis. It has P-fimbriae allowing ascent to kidney."
            },
            teaching: `<h4>Uropathogens</h4><table class="comparison-table"><tr><th>Organism</th><th>Frequency</th><th>Nitrite</th></tr><tr><td>E. coli</td><td>80%</td><td>Positive</td></tr><tr><td>Klebsiella</td><td>5-10%</td><td>Positive</td></tr><tr><td>Proteus</td><td>5%</td><td>Positive</td></tr><tr><td>Enterococcus</td><td>5%</td><td>Negative</td></tr></table>`,
            why_chain: [{q: "Why is E. coli so common?", a: "P-fimbriae bind uroepithelial cells, resisting washout. UPEC strains have specific virulence factors."}, {q: "When suspect other organisms?", a: "Healthcare-associated, recent antibiotics, recurrent UTI, catheter."}],
            points: 10
        }
    },
    {
        title: "When to Image",
        content: `<div class="narrative"><p>This healthy young woman has uncomplicated pyelonephritis. Should you get imaging?</p></div>
        <div class="socratic-prompt"><h4>Imaging Decision</h4><p>Imaging is NOT routine. When WOULD you order CT or ultrasound?</p></div>`,
        hint_beginner: "Think: obstruction, abscess, treatment failure",
        hint_advanced: "What findings would change management?",
        question: {
            prompt: "Which scenario MOST indicates need for renal imaging?",
            options: [
                { text: "No improvement after 48-72 hours of appropriate antibiotics", correct: true },
                { text: "First episode in healthy young woman", correct: false },
                { text: "Temperature of 103°F at presentation", correct: false },
                { text: "WBC count of 18,000", correct: false }
            ],
            explanation: {
                correct: "Yes! Failure to improve after 48-72h suggests obstruction, abscess, or emphysematous changes.",
                incorrect: "High fever and elevated WBC don't mandate imaging if patient responds to treatment."
            },
            teaching: `<h4>Indications for Imaging</h4><ul><li>No improvement after 48-72h antibiotics</li><li>Complicated pyelonephritis (diabetes, stones)</li><li>Recurrent pyelonephritis</li><li>Concern for abscess</li><li>Severe sepsis</li></ul>`,
            why_chain: [{q: "Why not image everyone?", a: "Most cases resolve with antibiotics. CT adds radiation and cost without changing management."}, {q: "What is emphysematous pyelo?", a: "Gas-forming infection in diabetics. 20-40% mortality. Often needs nephrectomy."}],
            points: 10
        }
    },
    {
        title: "Outpatient Antibiotics",
        content: `<div class="narrative"><p>This healthy woman can tolerate oral intake. You decide on outpatient treatment.</p></div>
        <div class="socratic-prompt"><h4>Antibiotic Selection</h4><p>Which antibiotics achieve adequate renal tissue levels? (Some UTI drugs work only in bladder.)</p></div>`,
        hint_beginner: "Fluoroquinolones reach kidney. Nitrofurantoin does NOT.",
        hint_advanced: "Fluoroquinolone resistance is 20-30% in many areas.",
        question: {
            prompt: "Which antibiotic is CONTRAINDICATED for pyelonephritis?",
            options: [
                { text: "Nitrofurantoin - only achieves bladder levels, not renal tissue", correct: true },
                { text: "Ciprofloxacin", correct: false },
                { text: "Trimethoprim-sulfamethoxazole", correct: false },
                { text: "Ceftriaxone", correct: false }
            ],
            explanation: {
                correct: "Correct! Nitrofurantoin concentrates in bladder urine but NOT renal parenchyma. Great for cystitis, contraindicated for pyelo.",
                incorrect: "Nitrofurantoin is the answer - excellent for cystitis but doesn't reach kidney tissue."
            },
            teaching: `<h4>Outpatient Regimens</h4><table class="comparison-table"><tr><th>Drug</th><th>Duration</th></tr><tr><td>Ciprofloxacin 500mg BID</td><td>7 days</td></tr><tr><td>TMP-SMX DS BID</td><td>14 days</td></tr><tr><td>Ceftriaxone 1g IM × 1 + oral</td><td>10-14 days</td></tr></table><p><strong>Never use:</strong> Nitrofurantoin, fosfomycin</p>`,
            why_chain: [{q: "Why doesn't nitrofurantoin work?", a: "Rapidly excreted into urine but doesn't accumulate in renal tissue. High bladder levels but subtherapeutic in parenchyma."}],
            points: 10
        }
    },
    {
        title: "Inpatient Management",
        content: `<div class="narrative"><p>Another patient: 55-year-old <span class="highlight">diabetic woman</span> with pyelo, T 103.5°F, BP 88/54. Vomiting, cannot take oral meds.</p></div>
        <div class="socratic-prompt"><h4>Admission Criteria</h4><p>This patient needs admission. What IV antibiotic would you choose?</p></div>`,
        hint_beginner: "Ceftriaxone covers most uropathogens.",
        hint_advanced: "Consider ESBL risk in diabetics.",
        question: {
            prompt: "Which IV antibiotic is MOST appropriate for severe pyelonephritis?",

function setDifficulty(level, btn) {
    difficulty = level;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderStage();
}

function shuffleArray(array) {
    const shuffled = [...array];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
}

function renderStage() {
    const stage = stages[currentStage];
    const progress = ((currentStage + 1) / stages.length) * 100;
    document.getElementById('progress').style.width = progress + '%';
    
    let html = `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${currentStage + 1} of ${stages.length}</div><div class="scene-title">${stage.title}</div></div>${stage.content}`;
    
    if (difficulty === 'beginner' && stage.hint_beginner) html += `<div class="hint-beginner" style="display:block">🌱 <strong>Beginner:</strong> ${stage.hint_beginner}</div>`;
    if (difficulty === 'advanced' && stage.hint_advanced) html += `<div class="hint-advanced" style="display:block">🎯 <strong>Advanced:</strong> ${stage.hint_advanced}</div>`;
    
    if (stage.question) {
        const q = stage.question, questionId = `q${currentStage}`, answered = answeredQuestions.has(questionId);
        if (!answered) { maxScore += q.points; document.getElementById('maxScore').textContent = maxScore; }
        const shuffledOptions = answered ? q.options : shuffleArray(q.options);
        if (!answered) stage.shuffledOptions = shuffledOptions;
        
        html += `<div class="question-box"><div class="question-prompt">${q.prompt}</div><div class="mcq-options">`;
        shuffledOptions.forEach((opt, i) => {
            const letter = String.fromCharCode(65 + i);
            html += `<div class="mcq-option ${answered ? (opt.correct ? 'correct' : 'incorrect') + ' disabled' : ''}" onclick="handleAnswer(${currentStage}, ${opt.correct}, this, '${questionId}')" data-correct="${opt.correct}"><div class="option-letter">${letter}</div><div class="option-text">${opt.text}</div></div>`;
        });
        html += `</div><div class="feedback ${answered ? 'show' : ''} ${answered ? (decisionPath[currentStage]?.correct ? 'correct-feedback' : 'incorrect-feedback') : ''}" id="feedback${currentStage}"><div class="feedback-title">${answered ? (decisionPath[currentStage]?.correct ? '✓ Correct!' : '✗ Not Quite') : ''}</div><div>${answered ? (decisionPath[currentStage]?.correct ? q.explanation.correct : q.explanation.incorrect) : ''}</div></div>`;
        if (q.teaching) html += `<div class="teaching-point ${answered ? 'show' : ''}">${q.teaching}</div>`;
        if (q.why_chain) {
            html += `<div class="why-chain ${answered ? 'show' : ''}"><h4>🔗 Why Chain</h4>`;
            q.why_chain.forEach(w => html += `<div class="why-item"><div class="why-q">Q: ${w.q}</div><div class="why-a">${w.a}</div></div>`);
            html += `</div>`;
        }
    }
    
    const isLast = currentStage === stages.length - 1, answered = stage.question ? answeredQuestions.has(`q${currentStage}`) : true;
    html += `<button class="btn ${answered ? 'show' : ''}" onclick="${isLast ? 'showCompletion()' : 'nextStage()'}">${isLast ? 'Complete Case' : 'Continue →'}</button></div>`;
    document.getElementById('scene-container').innerHTML = html;
}

function handleAnswer(stageIndex, correct, element, questionId) {
    if (answeredQuestions.has(questionId)) return;
    answeredQuestions.add(questionId);
    const stage = stages[stageIndex];
    if (correct) { score += stage.question.points; document.getElementById('score').textContent = score; }
    decisionPath[stageIndex] = { correct };
    document.querySelectorAll('.mcq-option').forEach(opt => { opt.classList.add('disabled'); if (opt.dataset.correct === 'true') opt.classList.add('correct'); else if (opt === element && !correct) opt.classList.add('incorrect'); });
    document.getElementById(`feedback${stageIndex}`).classList.add('show', correct ? 'correct-feedback' : 'incorrect-feedback');
    document.querySelectorAll('.teaching-point, .why-chain').forEach(el => el.classList.add('show'));
    document.querySelector('.btn').classList.add('show');
}

function nextStage() { currentStage++; renderStage(); window.scrollTo(0, 0); }

function showCompletion() {
    const percent = Math.round((score / maxScore) * 100);
    let grade = percent >= 90 ? 'Outstanding!' : percent >= 80 ? 'Excellent!' : percent >= 70 ? 'Good Work!' : 'Keep Learning!';
    let color = percent >= 90 ? '#22c55e' : percent >= 80 ? '#84cc16' : percent >= 70 ? '#eab308' : '#f97316';
    document.getElementById('scene-container').innerHTML = `<div class="scene completion"><div style="font-size:2.5rem;font-weight:700;color:${color}">${grade}</div><div style="font-size:3rem;font-weight:700;color:${color};margin:20px 0">${percent}%</div><p>Score: ${score} / ${maxScore}</p><button class="btn show" onclick="location.reload()" style="margin-top:24px">Restart Case</button></div>`;
}

renderStage();


// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
