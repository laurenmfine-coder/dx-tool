        content: `<div class="narrative"><p>A <span class="highlight">52-year-old woman</span> presents with <span class="critical">unilateral left leg swelling and pain</span> × 3 days. She had knee replacement surgery 2 weeks ago.</p></div>

            prompt: "Which clinical feature gives the HIGHEST points on Wells DVT score?",
            options: [

                { text: "Active cancer (+1 point)", correct: false },
                { text: "Calf swelling >3cm compared to other leg (+1 point)", correct: false },
                { text: "Recent immobilization or surgery (+1 point)", correct: false }

            explanation: {
                correct: "Correct! 'Alternative diagnosis less likely than DVT' is worth 3 points - the highest single criterion. This is a clinical judgment call that heavily weighs your overall impression. Most other criteria are worth 1 point each.",

            teaching: `<h4>Wells Score for DVT</h4><table class="comparison-table"><tr><th>Criterion</th><th>Points</th></tr><tr><td>Active cancer (treatment within 6 months)</td><td>+1</td></tr><tr><td>Paralysis/recent plaster immobilization</td><td>+1</td></tr><tr><td>Bedridden >3 days or major surgery <12 weeks</td><td>+1</td></tr><tr><td>Tenderness along deep venous system</td><td>+1</td></tr><tr><td>Entire leg swollen</td><td>+1</td></tr><tr><td>Calf swelling >3cm vs asymptomatic side</td><td>+1</td></tr><tr><td>Pitting edema (greater in symptomatic leg)</td><td>+1</td></tr><tr><td>Collateral superficial veins</td><td>+1</td></tr><tr><td><strong>Alternative diagnosis as likely or more likely</strong></td><td><strong>-2</strong></td></tr></table><p>≥2 = DVT likely; <2 = DVT unlikely</p>`,
            why_chain: [{q: "Why is 'alternative diagnosis' weighted so heavily?", a: "Clinical gestalt matters! If cellulitis, Baker's cyst, or muscle strain is equally or more likely, DVT probability drops significantly. This criterion rewards clinical reasoning, not just checklist completion."}, {q: "How does Wells score guide testing?", a: "Low probability (<2): D-dimer first. If negative, rules out DVT. High probability (≥2): Go directly to ultrasound. D-dimer adds little value and delay."}],

        <div class="socratic-prompt"><h4>Testing Strategy</h4><p>With Wells ≥2 (DVT likely), what is the most appropriate INITIAL diagnostic test?</p></div>`,

                { text: "Venous duplex with Doppler of bilateral legs", correct: false }

            explanation: {
                correct: "Correct! With high pretest probability (Wells ≥2), go directly to compression ultrasound. D-dimer has poor specificity - it's elevated in many conditions and adds no value when clinical probability is high. Ultrasound is the diagnostic test of choice.",
                incorrect: "High pretest probability = direct to imaging. D-dimer is only useful for ruling OUT DVT in LOW-probability patients. High probability patients need ultrasound regardless of D-dimer result."

D-dimer specificity: ~50% (poor rule-in)

High pretest + positive D-dimer = 
Still need ultrasound anyway!

D-dimer only saves testing when:
Pretest LOW + D-dimer NEGATIVE</div></div>`,
            why_chain: [{q: "What causes false-positive D-dimer?", a: "Surgery (this patient!), trauma, cancer, pregnancy, age >50, infection, inflammation, hospitalization. Almost any illness elevates D-dimer. That's why it can't 'rule in' DVT - only rule out in low-risk patients."}, {q: "What if ultrasound is negative but suspicion remains high?", a: "Options: (1) Repeat ultrasound in 5-7 days (clot may propagate), (2) CT venography, (3) MR venography. Isolated calf DVT may be missed initially but propagates to popliteal/femoral vein later."}],

function setDifficulty(level, btn) { difficulty = level; document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderStage(); }
function shuffleArray(array) { const shuffled = [...array]; for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; } return shuffled; }
function renderStage() {
    const stage = stages[currentStage], progress = ((currentStage + 1) / stages.length) * 100;
    document.getElementById('progress').style.width = progress + '%';
    let html = `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${currentStage + 1} of ${stages.length}</div><div class="scene-title">${stage.title}</div></div>${stage.content}`;
    if (difficulty === 'beginner' && stage.hint_beginner) html += `<div class="hint-beginner" style="display:block">🌱 ${stage.hint_beginner}</div>`;
    if (difficulty === 'advanced' && stage.hint_advanced) html += `<div class="hint-advanced" style="display:block">🎯 ${stage.hint_advanced}</div>`;
    if (stage.question) {
        const q = stage.question, questionId = `q${currentStage}`, answered = answeredQuestions.has(questionId);
        if (!answered) { maxScore += q.points; document.getElementById('maxScore').textContent = maxScore; }
        const shuffledOptions = answered ? q.options : shuffleArray(q.options);
        if (!answered) stage.shuffledOptions = shuffledOptions;
        html += `<div class="question-box"><div class="question-prompt">${q.prompt}</div><div class="mcq-options">`;
        shuffledOptions.forEach((opt, i) => html += `<div class="mcq-option ${answered ? (opt.correct ? 'correct' : 'incorrect') + ' disabled' : ''}" onclick="handleAnswer(${currentStage}, ${opt.correct}, this, '${questionId}')" data-correct="${opt.correct}"><div class="option-letter">${String.fromCharCode(65 + i)}</div><div class="option-text">${opt.text}</div></div>`);
        html += `</div><div class="feedback ${answered ? 'show ' + (decisionPath[currentStage]?.correct ? 'correct-feedback' : 'incorrect-feedback') : ''}" id="feedback${currentStage}"><div class="feedback-title">${answered ? (decisionPath[currentStage]?.correct ? '✓ Correct!' : '✗ Not Quite') : ''}</div><div>${answered ? (decisionPath[currentStage]?.correct ? q.explanation.correct : q.explanation.incorrect) : ''}</div></div>`;
        if (q.teaching) html += `<div class="teaching-point ${answered ? 'show' : ''}">${q.teaching}</div>`;
        if (q.why_chain) { html += `<div class="why-chain ${answered ? 'show' : ''}"><h4>🔗 Why Chain</h4>`; q.why_chain.forEach(w => html += `<div class="why-item"><div class="why-q">Q: ${w.q}</div><div class="why-a">${w.a}</div></div>`); html += `</div>`; }
    }
    html += `<button class="btn ${(stage.question ? answeredQuestions.has(`q${currentStage}`) : true) ? 'show' : ''}" onclick="${currentStage === stages.length - 1 ? 'showCompletion()' : 'nextStage()'}">${currentStage === stages.length - 1 ? 'Complete Case' : 'Continue →'}</button></div>`;
    document.getElementById('scene-container').innerHTML = html;
}
function handleAnswer(stageIndex, correct, element, questionId) {
    if (answeredQuestions.has(questionId)) return;
    answeredQuestions.add(questionId);
    if (correct) { score += stages[stageIndex].question.points; document.getElementById('score').textContent = score; }
    decisionPath[stageIndex] = { correct };
    document.querySelectorAll('.mcq-option').forEach(opt => { opt.classList.add('disabled'); if (opt.dataset.correct === 'true') opt.classList.add('correct'); else if (opt === element && !correct) opt.classList.add('incorrect'); });
    document.getElementById(`feedback${stageIndex}`).classList.add('show', correct ? 'correct-feedback' : 'incorrect-feedback');
    document.querySelectorAll('.teaching-point, .why-chain').forEach(el => el.classList.add('show'));
    document.querySelector('.btn').classList.add('show');
}
function nextStage() { currentStage++; renderStage(); window.scrollTo(0, 0); }
function showCompletion() {
    const percent = Math.round((score / maxScore) * 100);
    document.getElementById('scene-container').innerHTML = `<div class="scene completion"><div style="font-size:2.5rem;font-weight:700;color:${percent >= 90 ? '#22c55e' : percent >= 80 ? '#84cc16' : percent >= 70 ? '#eab308' : '#f97316'}">${percent >= 90 ? 'Outstanding!' : percent >= 80 ? 'Excellent!' : percent >= 70 ? 'Good Work!' : 'Keep Learning!'}</div><div style="font-size:3rem;font-weight:700;color:${percent >= 90 ? '#22c55e' : '#84cc16'};margin:20px 0">${percent}%</div><p>Score: ${score} / ${maxScore}</p><button class="btn show" onclick="location.reload()" style="margin-top:24px">Restart Case</button></div>`;
}
renderStage();


// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
