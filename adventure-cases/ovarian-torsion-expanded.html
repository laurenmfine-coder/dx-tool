    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"Acute Pelvic Pain",content:'<div class="narrative"><p>A <span class="highlight">22-year-old woman</span> presents with sudden-onset severe <span class="critical">right lower quadrant pain</span> that woke her from sleep. She has nausea and vomiting. Pain is colicky and radiates to the back.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 110, BP 110/70, afebrile<br><strong>Exam:</strong> RLQ tenderness, no peritoneal signs</p></div><div class="alert-box"><div class="alert-title">🚨 Think Ovarian Torsion!</div><p>Time-sensitive diagnosis. Ovarian salvage depends on early intervention.</p></div>',question:{prompt:"What is the CLASSIC presentation of ovarian torsion?",options:[{text:"Gradual onset dull ache",correct:false},{text:"Sudden severe unilateral pelvic pain with nausea/vomiting",correct:true},{text:"Bilateral pelvic pain with fever",correct:false},{text:"Painless vaginal bleeding",correct:false}],explanation:{correct:"Correct! Classic torsion: sudden severe unilateral pelvic pain, often with nausea/vomiting (from peritoneal irritation). Pain may be intermittent if torsion/detorsion occurs.",incorrect:"Sudden severe unilateral pain + N/V is classic. May wax/wane with intermittent torsion-detorsion."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Classic Presentation</div><div class="pathway">SUDDEN ONSET:\n• Severe unilateral pelvic/lower abdominal pain\n• Often wakes patient from sleep\n• May radiate to back, flank, groin\n\nASSOCIATED SYMPTOMS:\n• Nausea/vomiting (very common)\n• Pain may wax and wane\n  (intermittent torsion-detorsion)\n\nEXAM:\n• Unilateral adnexal tenderness\n• May have palpable mass\n• Often no peritoneal signs early</div></div>',why_chain:[],points:10}},
        {title:"Risk Factors",content:'<div class="narrative"><p>This patient has a history of a <span class="highlight">6 cm ovarian cyst</span> found incidentally last year.</p></div>',question:{prompt:"What is the MOST significant risk factor for ovarian torsion?",options:[{text:"Nulliparity",correct:false},{text:"Ovarian mass or cyst (especially 5-10 cm)",correct:true},{text:"History of PID",correct:false},{text:"Intrauterine device",correct:false}],explanation:{correct:"Correct! Ovarian mass (especially 5-10 cm) is the biggest risk factor. The enlarged ovary acts as a fulcrum for twisting. Dermoid cysts are particularly prone to torsion.",incorrect:"Ovarian mass 5-10 cm is the main risk factor. Mass creates leverage for twisting. Normal ovaries can also torse, especially in children."},teaching:'<h4>Risk Factors</h4><table class="comparison-table"><tr><th>Factor</th><th>Notes</th></tr><tr style="background:rgba(251,191,36,0.2);"><td>Ovarian mass/cyst</td><td>5-10 cm highest risk</td></tr><tr><td>Dermoid cyst</td><td>Most common mass causing torsion</td></tr><tr><td>Ovarian hyperstimulation</td><td>Fertility treatments</td></tr><tr><td>Pregnancy</td><td>Corpus luteum cysts</td></tr><tr><td>Prior torsion</td><td>Recurrence risk</td></tr><tr><td>Long ovarian ligament</td><td>Pediatric patients</td></tr></table>',why_chain:[],points:10}},
        {title:"Imaging: Ultrasound",content:'<div class="narrative"><p>You order a pelvic ultrasound with Doppler.</p></div>',question:{prompt:"What is the MOST specific ultrasound finding for ovarian torsion?",options:[{text:"Free fluid in pelvis",correct:false},{text:"Absent or decreased ovarian arterial flow on Doppler",correct:true},{text:"Enlarged ovary",correct:false},{text:"Ovarian cyst",correct:false}],explanation:{correct:"Correct! Absent/decreased arterial flow is most specific but NOT 100% sensitive - flow can be preserved early or with intermittent torsion. An enlarged edematous ovary with peripheral follicles (string of pearls) is also suggestive.",incorrect:"Decreased/absent Doppler flow is most specific. But normal flow does NOT rule out torsion - can have intermittent torsion or preserved flow early."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Ultrasound Findings</div><div class="pathway">DOPPLER:\n• Absent/decreased arterial flow (specific)\n• BUT normal flow does NOT rule out!\n• Venous flow lost before arterial\n\nGRAYSCALE:\n• Enlarged edematous ovary (>4 cm)\n• Peripheral follicles ("string of pearls")\n• Free fluid\n• Ovarian mass/cyst\n\n"WHIRLPOOL SIGN":\n• Twisted vascular pedicle on Doppler\n• Highly specific when present</div></div>',why_chain:[],points:10}},
        {title:"The Diagnostic Dilemma",content:'<div class="narrative"><p>Ultrasound shows an enlarged right ovary with a 5 cm cyst. Doppler flow is present but diminished. Is this torsion?</p></div><div class="alert-box"><div class="alert-title">⚠️ Normal Doppler Does NOT Rule Out Torsion!</div><p>Clinical suspicion should drive management. When in doubt, go to OR.</p></div>',question:{prompt:"If clinical suspicion is high but Doppler shows flow, what should you do?",options:[{text:"Discharge with follow-up ultrasound",correct:false},{text:"Proceed to diagnostic laparoscopy",correct:true},{text:"CT scan for confirmation",correct:false},{text:"Repeat ultrasound in 6 hours",correct:false}],explanation:{correct:"Correct! If clinical suspicion is high, proceed to surgery even with flow on Doppler. Torsion is a clinical diagnosis - imaging supports but doesn\'t rule out. Delay = ovarian loss.",incorrect:"High suspicion = surgery. Don\'t delay for more imaging. Torsion is time-sensitive - ovarian salvage decreases with time."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Decision Making</div><div class="pathway">TORSION IS A CLINICAL DIAGNOSIS!\n\nHigh suspicion + any of:\n• Suggestive ultrasound\n• Even NORMAL Doppler\n→ Proceed to surgery!\n\nWHY FLOW MAY BE PRESENT:\n• Intermittent torsion/detorsion\n• Early torsion (venous first)\n• Dual blood supply\n• Incomplete torsion\n\nDELAY = OVARIAN NECROSIS</div></div>',why_chain:[],points:10}},
        {title:"Surgical Management",content:'<div class="narrative"><p>You take the patient to the OR. Laparoscopy reveals a twisted right ovary with a dermoid cyst. The ovary looks dusky but not necrotic.</p></div>',question:{prompt:"What is the preferred surgical approach for ovarian torsion?",options:[{text:"Oophorectomy (removal) in all cases",correct:false},{text:"Detorsion with ovarian conservation when possible",correct:true},{text:"Aspiration of the cyst only",correct:false},{text:"Medical management with antibiotics",correct:false}],explanation:{correct:"Correct! Detorsion (untwisting) with ovarian conservation is preferred, even if the ovary looks dusky/black. Studies show most ovaries recover function after detorsion. Remove only if clearly necrotic.",incorrect:"Detorsion and conservation is preferred. Even dusky/black ovaries often recover! Remove cyst if indicated, but save the ovary when possible."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Surgical Approach</div><div class="pathway">PREFERRED: DETORSION + CONSERVATION\n\n• Untwist the ovary\n• Even if appears dusky/ischemic\n• Most ovaries recover function!\n• Remove associated cyst if needed\n\nOOPHORECTOMY only if:\n• Clearly necrotic (rare)\n• Postmenopausal patient\n• Malignancy suspected\n\nLAPAROSCOPY preferred\n(faster recovery, less adhesions)</div></div>',why_chain:[],points:10}},
        {title:"Special Populations",content:'<div class="narrative"><p>Ovarian torsion can occur in different populations with unique considerations.</p></div>',question:{prompt:"In which population can ovarian torsion occur WITHOUT an ovarian mass?",options:[{text:"Postmenopausal women",correct:false},{text:"Pediatric patients",correct:true},{text:"Pregnant women only",correct:false},{text:"It always requires a mass",correct:false}],explanation:{correct:"Correct! Pediatric patients can have torsion of normal ovaries due to long utero-ovarian ligaments. In adults, torsion usually (but not always) involves a mass. Always consider torsion in girls with acute abdominal pain!",incorrect:"Children can torse normal ovaries (long ligaments). Always consider torsion in pediatric acute abdominal pain!"},teaching:'<h4>Special Populations</h4><table class="comparison-table"><tr><th>Population</th><th>Considerations</th></tr><tr style="background:rgba(251,191,36,0.2);"><td>Pediatric</td><td>Can torse normal ovary, long ligaments</td></tr><tr><td>Pregnant</td><td>Corpus luteum cysts, difficult exam</td></tr><tr><td>Fertility treatment</td><td>Hyperstimulated ovaries at high risk</td></tr><tr><td>Prior torsion</td><td>Consider oophoropexy to prevent recurrence</td></tr></table>',why_chain:[],points:10}},
        {title:"Case Resolution",content:'<div class="narrative"><p>Your patient underwent laparoscopic detorsion and dermoid cystectomy. The ovary pinked up after detorsion. She recovered well with preserved ovarian function confirmed on follow-up ultrasound.</p></div><div class="mechanism-box"><div class="mechanism-title">📚 Ovarian Torsion Summary</div><div class="pathway">PRESENTATION:\nSudden severe unilateral pain + N/V\n\nRISK FACTORS:\nOvarian mass 5-10 cm (especially dermoid)\n\nDIAGNOSIS:\n• Clinical suspicion is key\n• US with Doppler (but normal doesn\'t rule out!)\n• When in doubt, go to OR\n\nTREATMENT:\n• Laparoscopic detorsion\n• Conserve ovary when possible\n• Even dusky ovaries often recover!</div></div>',question:{prompt:"A 25-year-old has high suspicion for torsion but normal Doppler flow. Next step?",options:[{text:"Reassurance and discharge",correct:false},{text:"CT scan",correct:false},{text:"Diagnostic laparoscopy",correct:true},{text:"Repeat ultrasound tomorrow",correct:false}],explanation:{correct:"Correct! High clinical suspicion = surgery. Normal Doppler does NOT rule out torsion. Time is ovary - don\'t delay!",incorrect:"High suspicion = surgery regardless of Doppler. Time is critical for ovarian salvage."},teaching:'<h4>Key Takeaways</h4><ul style="line-height:2;margin-left:20px;"><li>Sudden unilateral pain + N/V = think torsion</li><li>Ovarian mass is the main risk factor</li><li>Normal Doppler does NOT rule out torsion</li><li>Clinical diagnosis - when in doubt, go to OR</li><li>Detorsion and conservation preferred</li><li>Even dusky ovaries often recover</li></ul>',why_chain:[],points:10}},
        {title:"Clinical Integration",content:'<div class="narrative"><p>You synthesize all the clinical information to ensure optimal patient care.</p></div>',question:{prompt:"What principle is MOST important for excellent clinical outcomes?",options:[{text:"Integrating clinical presentation with evidence-based guidelines while reassessing response to treatment",correct:true},{text:"Following protocols exactly without clinical judgment",correct:false},{text:"Ordering comprehensive testing to avoid any missed diagnoses",correct:false},{text:"Making a diagnosis quickly and committing to it without reconsideration",correct:false}],explanation:{correct:"Excellent clinical care combines systematic assessment, evidence-based treatment, and ongoing reassessment. Guidelines inform but don't replace clinical reasoning.",incorrect:"Good clinical care requires flexibility, reassessment, and integration of guidelines with patient-specific factors."},teaching:'<h4>Clinical Reasoning</h4><ul><li>Systematic data gathering</li><li>Evidence-based management</li><li>Regular reassessment</li><li>Patient-centered communication</li></ul>',why_chain:[],points:10}}
    ];
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:#4ade80;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><p>You mastered Ovarian Torsion!</p></div>';}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}

</script>
