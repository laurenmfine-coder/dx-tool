<script>
let currentStage=0,score=0,maxScore=0,difficulty='standard',answeredQuestions=new Set(),decisionPath=[];
const stages=[
{title:"The Penicillin Label",content:`<div class="narrative"><p>35-year-old woman listed as "penicillin allergic" needs antibiotics for cellulitis. Her chart says "allergic to penicillin - rash" from childhood.</p><p style="margin-top:12px;">She doesn't remember the details but her mother told her she "broke out" as a child.</p></div><div class="socratic-prompt"><h4>Evaluate the Label</h4><p>How reliable is this "penicillin allergy" label, and what is the likelihood of true IgE-mediated allergy?</p></div>`,
hint_beginner:"90% of patients labeled penicillin allergic are NOT truly allergic when tested",hint_advanced:"What happens to IgE-mediated penicillin allergy over time?",
question:{prompt:"What is the likelihood this patient has true IgE-mediated penicillin allergy?",
options:[{text:"Low - 90% of labeled patients test negative; childhood rashes are often viral exanthems or non-IgE reactions that wane over time",correct:true},
{text:"High - any history of rash means lifelong allergy",correct:false},
{text:"Moderate - need to avoid all beta-lactams forever",correct:false},
{text:"Cannot determine - treat as allergic regardless of history",correct:false}],
explanation:{correct:"KEY FACT: 90% of patients labeled penicillin allergic are NOT truly allergic when tested. Childhood rashes are often viral exanthems misattributed to antibiotics. Even true IgE-mediated allergy wanes - 80% lose sensitivity after 10 years.",incorrect:"Most penicillin allergy labels are incorrect. Childhood rashes are often viral. Testing can safely de-label most patients."},
teaching:`<h4>Penicillin Allergy Reality</h4><p><strong>90%</strong> of labeled patients test NEGATIVE</p><p><strong>Causes of false labels:</strong> Viral exanthems, GI upset, family history, unknown</p><p><strong>IgE wanes:</strong> 50% lose at 5 years, 80% at 10 years</p><p><strong>Impact:</strong> Unnecessary broad-spectrum abx, increased C. diff, resistance</p>`,
why_chain:[{q:"Why does penicillin IgE wane?",a:"Without re-exposure, IgE-producing B cells and memory cells decline. Half-life of sensitization is about 5 years. Testing can confirm tolerance."},{q:"Why does de-labeling matter?",a:"Penicillin-allergic patients receive broader spectrum antibiotics (vancomycin, fluoroquinolones) with more side effects, resistance, and C. diff risk."}],points:10}},

{title:"Reaction Timing",content:`<div class="narrative"><p>You obtain more history. The patient recalls taking amoxicillin for an ear infection as a child and developing a rash "a few days later."</p></div><div class="socratic-prompt"><h4>Immediate vs Delayed</h4><p>What does the timing of the reaction tell you about the mechanism?</p></div>`,
hint_beginner:"IgE reactions occur within 1-6 hours; delayed reactions are T-cell mediated",hint_advanced:"What delayed reactions are contraindications to rechallenge?",
question:{prompt:"A rash appearing 'a few days' after starting amoxicillin suggests what mechanism?",
options:[{text:"Delayed T-cell mediated reaction - NOT IgE mediated; penicillin skin testing would not detect this type",correct:true},
{text:"IgE-mediated allergy requiring skin testing",correct:false},
{text:"Anaphylaxis risk on re-exposure",correct:false},
{text:"Timing is irrelevant to mechanism",correct:false}],
explanation:{correct:"Timing is CRITICAL. IgE-mediated (immediate): within 1-6 hours. Delayed (T-cell): days to weeks. A rash appearing days later is T-cell mediated, not IgE. Penicillin skin testing detects IgE only - it would be negative here.",incorrect:"Reactions after 24-72 hours are delayed (T-cell mediated), not IgE. Different mechanism, different risk, different testing."},
teaching:`<h4>Reaction Timing and Mechanism</h4><p><strong>Immediate (under 1-6h):</strong> IgE-mediated - urticaria, angioedema, anaphylaxis</p><p><strong>Delayed (days-weeks):</strong> T-cell mediated - maculopapular rash, DRESS, SJS</p><p><strong>Skin testing:</strong> Only detects IgE - not useful for delayed reactions</p>`,
why_chain:[{q:"Why does timing matter for management?",a:"IgE reactions can be anaphylactic and are detected by skin testing. Delayed reactions are rarely anaphylactic but can include severe SCARs (DRESS, SJS/TEN) - these are contraindications to rechallenge."},{q:"Can delayed reactions be dangerous?",a:"Yes - DRESS, SJS, TEN are delayed T-cell reactions that can be fatal. Benign maculopapular rashes are also delayed but are not dangerous."}],points:10}},

{title:"Beta-Lactam Cross-Reactivity",content:`<div class="narrative"><p>The patient asks if she can take cephalosporins since she's "allergic to penicillin."</p></div><div class="socratic-prompt"><h4>Understand Cross-Reactivity</h4><p>What is the true cross-reactivity risk between penicillins and cephalosporins?</p></div>`,
hint_beginner:"Cross-reactivity is lower than historically quoted - related to side chains, not just the ring",hint_advanced:"Which cephalosporins share side chains with amoxicillin?",
question:{prompt:"What is the actual cross-reactivity between penicillins and cephalosporins?",
options:[{text:"1-2% with modern cephalosporins; cross-reactivity relates to R-group side chains, not the beta-lactam ring itself",correct:true},
{text:"10% - the historically quoted rate is accurate",correct:false},
{text:"Zero - completely different drugs",correct:false},
{text:"100% - all beta-lactams cross-react",correct:false}],
explanation:{correct:"The old 10% cross-reactivity rate was inflated by contaminated early cephalosporins. True rate is 1-2%. Cross-reactivity is due to SIDE CHAIN similarity, not the beta-lactam ring. Amoxicillin shares side chains with cefadroxil and cephalexin.",incorrect:"The 10% rate is outdated. Modern studies show 1-2% cross-reactivity, primarily based on side chain similarity."},
teaching:`<h4>Beta-Lactam Cross-Reactivity</h4><p><strong>True rate:</strong> 1-2% (not 10%)</p><p><strong>Mechanism:</strong> Side chain (R-group) similarity</p><p><strong>Amoxicillin cross-reacts with:</strong> Cefadroxil, cephalexin, cefprozil (similar side chain)</p><p><strong>Safe alternatives:</strong> Cefuroxime, ceftriaxone, cefepime (different side chains)</p>`,
why_chain:[{q:"Why was the old 10% rate wrong?",a:"Early cephalosporins were contaminated with penicillin. Also, studies counted any reaction, not confirmed IgE-mediated allergy. Modern studies with skin-test-confirmed allergy show 1-2%."},{q:"What about carbapenems?",a:"Carbapenem cross-reactivity with penicillin is less than 1%. Most penicillin-allergic patients can safely receive carbapenems."}],points:15}},

{title:"Penicillin Skin Testing",content:`<div class="narrative"><p>You decide to evaluate this patient's penicillin allergy more definitively.</p></div><div class="socratic-prompt"><h4>Testing Strategy</h4><p>When is penicillin skin testing indicated, and what does a negative result mean?</p></div>`,
hint_beginner:"Negative skin test + oral challenge = can safely receive penicillins",hint_advanced:"What is the negative predictive value of penicillin skin testing?",
question:{prompt:"What does negative penicillin skin testing indicate?",
options:[{text:"Greater than 99% negative predictive value for IgE-mediated reaction; patient can receive penicillins safely after oral challenge",correct:true},
{text:"Only rules out anaphylaxis, not other reactions",correct:false},
{text:"Must still avoid penicillins regardless of result",correct:false},
{text:"Testing is unreliable and not recommended",correct:false}],
explanation:{correct:"Penicillin skin testing has greater than 99% negative predictive value for IgE-mediated reactions. Negative test followed by oral amoxicillin challenge confirms tolerance. Patient can be de-labeled and receive penicillins safely.",incorrect:"Penicillin skin testing is highly reliable. Negative result + oral challenge allows safe de-labeling."},
teaching:`<h4>Penicillin Skin Testing</h4><p><strong>NPV:</strong> Greater than 99% for IgE reactions</p><p><strong>Includes:</strong> Major determinant (penicilloyl) + minor determinants</p><p><strong>Protocol:</strong> Prick then intradermal, followed by oral challenge if negative</p><p><strong>Outcome:</strong> De-label if negative testing + tolerated challenge</p>`,
why_chain:[{q:"Why oral challenge after negative skin test?",a:"Skin testing is highly sensitive but not 100%. Oral challenge confirms tolerance. Start with low dose, observe, then give full therapeutic dose."},{q:"Who should NOT undergo testing?",a:"Patients with history of severe non-IgE reactions (DRESS, SJS, TEN, AGEP) should never be rechallenged regardless of skin testing."}],points:10}},

{title:"AERD - Samter's Triad",content:`<div class="narrative"><p>Different patient: 42-year-old woman with asthma and recurrent nasal polyps takes ibuprofen and develops severe bronchospasm and nasal congestion within 2 hours.</p></div><div class="socratic-prompt"><h4>Recognize the Pattern</h4><p>What syndrome does asthma + nasal polyps + NSAID reaction suggest?</p></div>`,
hint_beginner:"Samter's triad = asthma + polyps + NSAID sensitivity",hint_advanced:"Is AERD an IgE-mediated allergy or something else?",
question:{prompt:"What is the diagnosis and mechanism?",
options:[{text:"AERD (Aspirin-Exacerbated Respiratory Disease) - NOT IgE mediated; caused by COX-1 inhibition shifting arachidonic acid toward leukotrienes",correct:true},
{text:"IgE-mediated NSAID allergy",correct:false},
{text:"Coincidental asthma exacerbation",correct:false},
{text:"Allergic reaction to tablet coating",correct:false}],
explanation:{correct:"AERD (Samter's triad): asthma + nasal polyps + NSAID sensitivity. This is NOT an IgE allergy - it's a pharmacologic reaction. COX-1 inhibition shifts arachidonic acid metabolism toward leukotrienes, causing bronchoconstriction. Cross-reactive to ALL COX-1 inhibitors.",incorrect:"AERD is a metabolic/pharmacologic reaction to COX-1 inhibition, not IgE-mediated allergy. This distinction determines safe alternatives."},
teaching:`<h4>AERD (Samter's Triad)</h4><p><strong>Triad:</strong> Asthma + nasal polyps + NSAID sensitivity</p><p><strong>Mechanism:</strong> COX-1 inhibition shifts metabolism to leukotrienes (NOT IgE)</p><p><strong>Cross-reactive to:</strong> ALL COX-1 NSAIDs</p><p><strong>SAFE:</strong> COX-2 selective (celecoxib), acetaminophen</p><p><strong>Treatment:</strong> Aspirin desensitization (reduces polyp recurrence)</p>`,
why_chain:[{q:"Why does COX-1 inhibition cause symptoms in AERD?",a:"AERD patients have abnormal arachidonic acid metabolism with overproduction of cysteinyl leukotrienes. Blocking COX-1 shifts more substrate to the leukotriene pathway, causing bronchoconstriction and nasal symptoms."},{q:"What about aspirin desensitization?",a:"Paradoxically, daily aspirin after desensitization has therapeutic benefit - reduces polyp recurrence and improves asthma control."}],points:15}},

{title:"DRESS Syndrome",content:`<div class="narrative"><p>28-year-old man started allopurinol 3 weeks ago. Now presents with fever (103F), diffuse rash over 50% BSA, facial edema, lymphadenopathy, AST 450, ALT 520, eosinophils 18%.</p></div><div class="socratic-prompt"><h4>Recognize the SCAR</h4><p>What severe cutaneous adverse reaction is this, and what is the management?</p></div>`,
hint_beginner:"Rash + fever + eosinophilia + organ involvement = think DRESS",hint_advanced:"What is the role of HHV-6 in DRESS?",
question:{prompt:"What is the diagnosis and key management principle?",
options:[{text:"DRESS syndrome - stop allopurinol IMMEDIATELY, systemic steroids, NEVER rechallenge (can be fatal)",correct:true},
{text:"Simple drug rash - continue allopurinol with antihistamines",correct:false},
{text:"Stevens-Johnson syndrome - transfer to burn unit",correct:false},
{text:"Viral illness unrelated to allopurinol",correct:false}],
explanation:{correct:"DRESS: Rash + fever + eosinophilia + organ involvement (liver), onset 2-8 weeks. Classic causes: allopurinol, anticonvulsants, sulfonamides. STOP the drug immediately. Systemic steroids. NEVER rechallenge - recurrence is often more severe and can be fatal.",incorrect:"This is DRESS, not a simple rash. Fever, eosinophilia, and hepatitis indicate systemic involvement. Continuing the drug could be fatal."},

{title:"Local Anesthetic 'Allergy'",content:`<div class="narrative"><p>Patient insists she's "allergic to lidocaine." She became lightheaded with palpitations during dental work. The dentist said she had an "allergic reaction."</p></div><div class="socratic-prompt"><h4>True Allergy vs Mimic</h4><p>What is the most likely explanation for this reaction?</p></div>`,

question:{prompt:"What is the most likely cause of this 'reaction'?",

{text:"True lidocaine allergy - avoid all local anesthetics",correct:false},

{text:"Cannot determine without extensive testing",correct:false}],
explanation:{correct:"True local anesthetic allergy is extremely rare (under 1%). Most reactions are: vasovagal (anxiety, lightheadedness), epinephrine effects (palpitations, tremor from epi in the anesthetic), or toxic reactions. Over 99% of patients can be cleared with testing.",incorrect:"Lightheadedness and palpitations are classic for vasovagal or epinephrine effect, not allergy. True local anesthetic allergy is vanishingly rare."},

function shuffleArray(a){const s=[...a];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s;}
function setDifficulty(l,b){difficulty=l;document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderStage(currentStage);}
function renderStage(i){
const s=stages[i],opts=shuffleArray(s.question.options.map((o,idx)=>({...o,idx}))),ltrs='ABCD';
let hints='';
if(difficulty==='beginner'&&s.hint_beginner)hints=`<div class="hint-beginner" style="display:block;">Hint: ${s.hint_beginner}</div>`;
else if(difficulty==='advanced'&&s.hint_advanced)hints=`<div class="hint-advanced" style="display:block;">Challenge: ${s.hint_advanced}</div>`;
const why=s.question.why_chain?`<div class="why-chain" id="why"><h4>WHY Chain</h4>${s.question.why_chain.map(w=>`<div class="why-item"><div class="why-q">Q: ${w.q}</div><div class="why-a">${w.a}</div></div>`).join('')}</div>`:'';
document.getElementById('progress').style.width=((i)/stages.length*100)+'%';
document.getElementById('scene-container').innerHTML=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${i+1} of ${stages.length}</div><div class="scene-title">${s.title}</div></div>${s.content}${hints}<div class="question-box"><div class="question-prompt">${s.question.prompt}</div><div class="mcq-options">${opts.map((o,j)=>`<div class="mcq-option" data-correct="${o.correct}" onclick="selectOption(this,${i})"><span class="option-letter">${ltrs[j]}</span><span class="option-text">${o.text}</span></div>`).join('')}</div><div class="feedback correct-feedback" id="fb-c"><div class="feedback-title">Correct!</div><div>${s.question.explanation.correct}</div></div><div class="feedback incorrect-feedback" id="fb-i"><div class="feedback-title">Not Quite</div><div>${s.question.explanation.incorrect}</div></div><div class="teaching-point" id="teach">${s.question.teaching}</div>${why}<button class="btn" id="next-btn" onclick="nextStage()">Continue</button></div></div>`;
}
function selectOption(el,i){
if(answeredQuestions.has(i))return;
const c=el.dataset.correct==='true',s=stages[i];
answeredQuestions.add(i);decisionPath.push({stage:s.title,correct:c,points:c?s.question.points:0});
if(c)score+=s.question.points;maxScore+=s.question.points;
document.getElementById('score').textContent=score;document.getElementById('maxScore').textContent=maxScore;
document.querySelectorAll('.mcq-option').forEach(o=>{o.classList.add('disabled');if(o.dataset.correct==='true')o.classList.add('correct');else if(o===el&&!c)o.classList.add('incorrect');});
document.getElementById(c?'fb-c':'fb-i').classList.add('show');
document.getElementById('teach').classList.add('show');
const w=document.getElementById('why');if(w)w.classList.add('show');
document.getElementById('next-btn').classList.add('show');
}
function nextStage(){if(++currentStage<stages.length){renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'});}else showCompletion();}
function showCompletion(){
const p=Math.round(score/maxScore*100);
let g,m,clr;
if(p>=90){g='Outstanding!';clr='#22c55e';m='Excellent drug allergy evaluation!';}
else if(p>=80){g='Great Work!';clr='#3b82f6';m='Strong grasp. Review cross-reactivity patterns.';}
else if(p>=70){g='Good Progress';clr='#f59e0b';m='Focus on timing and mechanism.';}
else{g='Keep Learning';clr='#ef4444';m='Review reaction types and de-labeling.';}
document.getElementById('scene-container').innerHTML=`<div class="scene completion"><div class="completion-grade" style="color:${clr}">${g}</div><div class="completion-percent" style="color:${clr}">${p}%</div><div style="font-size:1.3rem;margin-bottom:8px">${score}/${maxScore} points</div><div class="completion-message">${m}</div><div class="completion-breakdown"><h4>Your Clinical Journey</h4>${decisionPath.map((d,j)=>`<div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;"><span><span style="color:${d.correct?'#22c55e':'#ef4444'}">${d.correct?'Yes':'No'}</span> Stage ${j+1}: ${d.stage}</span><span style="color:#94a3b8">${d.points}/${stages[j].question.points}</span></div>`).join('')}</div></div>`;
document.getElementById('progress').style.width='100%';
}
document.addEventListener('DOMContentLoaded',()=>renderStage(0));


// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
