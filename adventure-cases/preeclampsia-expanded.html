<a href="https://www.acog.org/clinical/clinical-guidance/practice-bulletin/articles/2020/06/gestational-hypertension-and-preeclampsia" target="_blank" rel="noopener">ACOG Hypertension Guidelines (ACOG)</a>

    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"New Hypertension in Pregnancy",content:'<div class="narrative"><p>A <span class="highlight">28-year-old G1P0</span> at 34 weeks presents with headache and visual changes. BP is <span class="critical">165/105</span>. She had normal BPs earlier in pregnancy. Urinalysis shows 2+ protein.</p></div><div class="alert-box"><div class="alert-title">🚨 Preeclampsia!</div><p>New hypertension + proteinuria after 20 weeks = preeclampsia until proven otherwise.</p></div>',question:{prompt:"What defines preeclampsia?",options:[{text:"Any hypertension in pregnancy",correct:false},{text:"New HTN (≥140/90) after 20 weeks + proteinuria OR end-organ dysfunction",correct:true},{text:"Hypertension before 20 weeks with proteinuria",correct:false},{text:"Proteinuria alone in third trimester",correct:false}],explanation:{correct:"Correct! Preeclampsia: new-onset HTN (≥140/90) after 20 weeks PLUS proteinuria (≥300mg/24h or protein/Cr ≥0.3) OR other end-organ dysfunction (even without proteinuria).",incorrect:"Preeclampsia = new HTN after 20 weeks + proteinuria OR end-organ dysfunction. Before 20 weeks = chronic HTN."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Diagnostic Criteria</div><div class="pathway">PREECLAMPSIA:\nNew HTN (≥140/90) after 20 weeks\n\nPLUS one of:\n• Proteinuria (≥300mg/24h or P/Cr ≥0.3)\n• Thrombocytopenia (<100,000)\n• Renal insufficiency (Cr >1.1 or doubling)\n• Elevated liver enzymes (2× normal)\n• Pulmonary edema\n• Cerebral or visual symptoms\n\nNote: Proteinuria NOT required if other\nend-organ dysfunction present!</div></div>',why_chain:[],points:10}},
        {title:"Severe Features",content:'<div class="narrative"><p>Your patient has BP 165/105 and visual changes. Does she have severe features?</p></div>',question:{prompt:"Which is a SEVERE feature of preeclampsia?",options:[{text:"BP 145/95",correct:false},{text:"Proteinuria of 500mg/24h",correct:false},{text:"SBP ≥160 or DBP ≥110, visual changes, or thrombocytopenia",correct:true},{text:"Mild headache only",correct:false}],explanation:{correct:"Correct! Severe features include: SBP ≥160 or DBP ≥110, cerebral/visual symptoms, pulmonary edema, thrombocytopenia (<100K), elevated LFTs (2x), renal insufficiency, severe RUQ pain.",incorrect:"Severe = BP ≥160/110, neuro symptoms, platelets <100K, elevated LFTs, renal failure, pulmonary edema."},teaching:'<h4>Preeclampsia WITH Severe Features</h4><table class="comparison-table"><tr><th>Severe Feature</th><th>Criteria</th></tr><tr><td>Blood pressure</td><td>SBP ≥160 OR DBP ≥110</td></tr><tr><td>Thrombocytopenia</td><td>Platelets <100,000</td></tr><tr><td>Liver</td><td>AST/ALT ≥2× normal, RUQ pain</td></tr><tr><td>Renal</td><td>Cr >1.1 or doubling</td></tr><tr><td>Pulmonary</td><td>Pulmonary edema</td></tr><tr><td>Neuro</td><td>Headache, visual changes, AMS</td></tr></table>',why_chain:[],points:10}},
        {title:"Magnesium Sulfate",content:'<div class="narrative"><p>You diagnose preeclampsia with severe features. Time to start seizure prophylaxis!</p></div>',question:{prompt:"What is the PRIMARY purpose of magnesium sulfate in preeclampsia?",options:[{text:"Blood pressure control",correct:false},{text:"Seizure prophylaxis (prevent eclampsia)",correct:true},{text:"Tocolysis",correct:false},{text:"Fetal neuroprotection only",correct:false}],explanation:{correct:"Correct! Magnesium sulfate prevents eclamptic seizures. It is NOT for BP control. Give to all severe preeclampsia and continue 24-48h postpartum. Also provides fetal neuroprotection if <32 weeks.",incorrect:"Mg is for SEIZURE prophylaxis, not BP control. Prevents progression to eclampsia."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Magnesium Sulfate</div><div class="pathway">PURPOSE: Seizure prophylaxis\n(NOT for blood pressure!)\n\nINDICATIONS:\n• Preeclampsia with severe features\n• Eclampsia (treatment + prophylaxis)\n• Consider in all preeclampsia\n\nDOSING:\n• Load: 4-6g IV over 15-20 min\n• Maintenance: 1-2g/hr IV\n• Continue 24-48h postpartum\n\nMONITOR FOR TOXICITY:\n• Reflexes (loss = early sign)\n• Respiratory depression\n• Cardiac arrest (very high levels)</div></div>',why_chain:[],points:10}},
        {title:"Blood Pressure Management",content:'<div class="narrative"><p>Her BP is still 165/105 after magnesium. You need to treat the hypertension.</p></div>',question:{prompt:"What is the FIRST-LINE antihypertensive for acute severe hypertension in pregnancy?",options:[{text:"ACE inhibitors",correct:false},{text:"Labetalol or hydralazine IV",correct:true},{text:"Nitroprusside",correct:false},{text:"Oral amlodipine",correct:false}],explanation:{correct:"Correct! First-line: IV labetalol, IV hydralazine, or oral nifedipine. Goal: <160/110 within 30-60 minutes. ACE inhibitors are CONTRAINDICATED in pregnancy!",incorrect:"Labetalol, hydralazine, or nifedipine. ACE inhibitors are contraindicated in pregnancy!"},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 BP Management</div><div class="pathway">GOAL: <160/110 within 30-60 min\n\nFIRST-LINE OPTIONS:\n• Labetalol 20mg IV, then 40mg, 80mg\n• Hydralazine 5-10mg IV q20min\n• Nifedipine 10-20mg PO\n\nCONTRAINDICATED:\n• ACE inhibitors (fetal harm!)\n• ARBs (fetal harm!)\n• Nitroprusside (cyanide toxicity)\n\nDO NOT lower too fast!\nRisk of placental hypoperfusion</div></div>',why_chain:[],points:10}},
        {title:"Definitive Treatment",content:'<div class="narrative"><p>What is the only definitive treatment for preeclampsia?</p></div>',question:{prompt:"What is the DEFINITIVE treatment for preeclampsia?",options:[{text:"Magnesium sulfate",correct:false},{text:"Antihypertensive medications",correct:false},{text:"Delivery of the fetus and placenta",correct:true},{text:"Bed rest and hydration",correct:false}],explanation:{correct:"Correct! Delivery is the only cure. Timing depends on severity and gestational age. Severe features at ≥34 weeks = deliver. <34 weeks = may temporize with close monitoring if stable, but not for long.",incorrect:"Delivery is the ONLY cure. Mg and antihypertensives are supportive. Timing depends on gestational age and severity."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Delivery Timing</div><div class="pathway">DELIVER IMMEDIATELY IF:\n• ≥37 weeks (any preeclampsia)\n• ≥34 weeks with severe features\n• Uncontrollable severe HTN\n• Eclampsia\n• HELLP syndrome\n• Nonreassuring fetal status\n• Abruption\n\nMAY TEMPORIZE <34 WEEKS IF:\n• Stable, no severe features\n• Give steroids for fetal lungs\n• Very close monitoring\n• Ready to deliver at any time</div></div>',why_chain:[],points:10}},
        {title:"HELLP Syndrome",content:'<div class="narrative"><p>Labs return: platelets 85,000, AST 250, LDH 800. This is concerning for HELLP.</p></div>',question:{prompt:"What does HELLP stand for?",options:[{text:"Hypertension, Elevated Liver enzymes, Low Platelets",correct:false},{text:"Hemolysis, Elevated Liver enzymes, Low Platelets",correct:true},{text:"Headache, Edema, Liver failure, Low Platelets",correct:false},{text:"Hemorrhage, Eclampsia, Liver damage, Proteinuria",correct:false}],explanation:{correct:"Correct! HELLP: Hemolysis (↑LDH, schistocytes, ↑bilirubin), Elevated Liver enzymes, Low Platelets. This is a severe variant of preeclampsia. Delivery is urgent.",incorrect:"HELLP = Hemolysis + Elevated Liver enzymes + Low Platelets. Severe form requiring urgent delivery."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 HELLP Syndrome</div><div class="pathway">H - Hemolysis\n  • ↑LDH (>600)\n  • Schistocytes on smear\n  • ↑Indirect bilirubin\n\nEL - Elevated Liver enzymes\n  • AST/ALT ≥2× normal\n\nLP - Low Platelets\n  • <100,000\n\nCOMPLICATIONS:\n• Placental abruption\n• DIC\n• Liver hematoma/rupture\n• Acute renal failure\n\nMANAGEMENT: Urgent delivery!</div></div>',why_chain:[],points:10}},
        {title:"Case Resolution",content:'<div class="narrative"><p>Your patient received magnesium sulfate and IV labetalol. At 34 weeks with severe features, she was delivered via cesarean after betamethasone. Postpartum, she was monitored for 48 hours on magnesium, with resolution of symptoms. BP medications were weaned over weeks.</p></div><div class="mechanism-box"><div class="mechanism-title">📚 Preeclampsia Summary</div><div class="pathway">DIAGNOSIS:\nNew HTN (≥140/90) after 20 weeks\n+ proteinuria OR end-organ dysfunction\n\nSEVERE FEATURES:\nBP ≥160/110, neuro symptoms, plt <100K,\nelevated LFTs, renal failure, pulmonary edema\n\nTREATMENT:\n• Magnesium for seizure prophylaxis\n• Labetalol/hydralazine for BP\n• Delivery is the only cure\n\nHELLP:\nHemolysis + Elevated LFTs + Low Platelets\n→ Urgent delivery</div></div>',question:{prompt:"A pregnant patient at 36 weeks has BP 155/100 and 1+ proteinuria but no severe features. Next step?",options:[{text:"Discharge with follow-up in 1 week",correct:false},{text:"Expectant management until 37 weeks then deliver",correct:true},{text:"Immediate cesarean delivery",correct:false},{text:"Start magnesium and wait until 40 weeks",correct:false}],explanation:{correct:"Correct! Preeclampsia without severe features at 36 weeks = expectant management with close monitoring, deliver at 37 weeks. If develops severe features, deliver immediately.",incorrect:"Without severe features at 36 weeks, can manage expectantly until 37 weeks. Close monitoring required."},teaching:'<h4>Key Takeaways</h4><ul style="line-height:2;margin-left:20px;"><li>New HTN after 20 weeks + proteinuria/end-organ damage</li><li>Severe: BP ≥160/110, neuro, plt <100K, LFTs, renal</li><li>Magnesium for seizure prophylaxis (not BP!)</li><li>Labetalol/hydralazine for BP control</li><li>Delivery is the only cure</li><li>HELLP = Hemolysis + Elevated LFTs + Low Plts</li></ul>',why_chain:[],points:10}},
        {title:"Clinical Integration",content:'<div class="narrative"><p>You synthesize all the clinical information to ensure optimal patient care.</p></div>',question:{prompt:"What principle is MOST important for excellent clinical outcomes?",options:[{text:"Integrating clinical presentation with evidence-based guidelines while reassessing response to treatment",correct:true},{text:"Following protocols exactly without clinical judgment",correct:false},{text:"Ordering comprehensive testing to avoid any missed diagnoses",correct:false},{text:"Making a diagnosis quickly and committing to it without reconsideration",correct:false}],explanation:{correct:"Excellent clinical care combines systematic assessment, evidence-based treatment, and ongoing reassessment. Guidelines inform but don't replace clinical reasoning.",incorrect:"Good clinical care requires flexibility, reassessment, and integration of guidelines with patient-specific factors."},teaching:'<h4>Clinical Reasoning</h4><ul><li>Systematic data gathering</li><li>Evidence-based management</li><li>Regular reassessment</li><li>Patient-centered communication</li></ul>',why_chain:[],points:10}}
    ];
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:#4ade80;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><p>You mastered Preeclampsia!</p></div>';}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}

</script>
