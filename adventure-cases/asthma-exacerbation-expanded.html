<script>
let currentStage=0,score=0,maxScore=0,difficulty='standard',answeredQuestions=new Set(),decisionPath=[];
const stages=[
{title:"The Wheezing Patient",content:`<div class="narrative"><p>28-year-old woman with known asthma presents with progressive dyspnea, cough, and wheeze for 2 days after URI symptoms.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 110, RR 28, BP 138/82, SpO2 91% on RA, T 99.8°F<br><strong>Exam:</strong> Speaking in short phrases, accessory muscle use, diffuse expiratory wheezes, prolonged expiratory phase<br><strong>Meds:</strong> Uses albuterol PRN (ran out 1 week ago), no controller</p></div><div class="socratic-prompt"><h4>Assess Severity</h4><p>What severity classification is this exacerbation, and what features determine severity?</p></div>`,
hint_beginner:"Severity determined by speech, accessory muscles, RR, SpO2, mental status",hint_advanced:"What ABG finding would indicate life-threatening severity?",
question:{prompt:"What severity is this asthma exacerbation?",
options:[{text:"Severe: speaking in phrases, accessory muscle use, RR >25, SpO2 90-92%, tachycardia - requires aggressive treatment",correct:true},
{text:"Mild-moderate: can still speak so not severe",correct:false},
{text:"Life-threatening: any hypoxia is life-threatening",correct:false},
{text:"Cannot assess severity without peak flow",correct:false}],
explanation:{correct:"Severe exacerbation: speaking in phrases (not sentences), accessory muscle use, RR 28, SpO2 91%. Not yet life-threatening (no silent chest, altered mental status, bradycardia, or cyanosis).",incorrect:"Speaking in phrases (not sentences), accessory muscles, SpO2 90-92% all indicate SEVERE. Life-threatening would show silent chest, confusion, or bradycardia."},
teaching:`<h4>Asthma Severity Classification</h4><p><strong>Mild-Moderate:</strong> Speaks sentences, SpO2 >92%, no accessory muscles</p><p><strong>Severe:</strong> Speaks phrases, SpO2 90-92%, accessory muscles, RR >25</p><p><strong>Life-threatening:</strong> Silent chest, cyanosis, altered mental status, bradycardia, exhaustion</p>`,
why_chain:[{q:"Why is 'silent chest' ominous?",a:"Silent chest means NO air movement - not enough airflow to generate wheeze. This indicates impending respiratory failure. Wheeze requires airflow."},{q:"Why normal/rising pCO2 concerning?",a:"In asthma, hyperventilation should cause LOW pCO2. Normal or elevated pCO2 means the patient is tiring and can't maintain minute ventilation - impending arrest."}],points:10}},

{title:"First-Line Treatment",content:`<div class="narrative"><p>You initiate treatment. What are the first-line medications?</p></div><div class="socratic-prompt"><h4>Immediate Interventions</h4><p>What medications should be started immediately for severe asthma exacerbation?</p></div>`,
hint_beginner:"SABA + ipratropium + systemic steroids + oxygen",hint_advanced:"Why is ipratropium only used in the first hour?",
question:{prompt:"What is the initial treatment for severe asthma exacerbation?",
options:[{text:"Albuterol nebs q20min x3, ipratropium x3 (first hour only), systemic steroids immediately, O2 to target SpO2 93-95%",correct:true},
{text:"Albuterol alone - add other meds if no response",correct:false},
{text:"IV steroids first, then bronchodilators",correct:false},
{text:"Epinephrine IM as first-line",correct:false}],
explanation:{correct:"Triple therapy: 1) Albuterol q20min x3 (or continuous if severe), 2) Ipratropium q20min x3 in FIRST HOUR only (no benefit after), 3) Systemic steroids EARLY (take 4-6h to work), 4) O2 to target 93-95%.",incorrect:"All components should start together. Steroids take hours to work - start early. Ipratropium adds benefit only in first hour of severe exacerbations."},
teaching:`<h4>Initial Treatment Bundle</h4><p><strong>Albuterol:</strong> 2.5-5mg neb q20min x3, then q1-4h (or continuous 10-15mg/hr if severe)</p><p><strong>Ipratropium:</strong> 0.5mg x3 doses FIRST HOUR ONLY</p><p><strong>Steroids:</strong> Prednisone 40-60mg PO or methylpred 125mg IV</p><p><strong>O2:</strong> Target SpO2 93-95%</p>`,
why_chain:[{q:"Why ipratropium only first hour?",a:"Studies show added bronchodilation only in first hour of severe exacerbation. Continued use doesn't help and adds anticholinergic side effects."},{q:"Why start steroids early?",a:"Onset 4-6 hours. Starting early means they're working by the time bronchodilator effects peak. Don't wait 'to see if nebs work.'"}],points:15}},

{title:"Steroid Selection",content:`<div class="narrative"><p>The patient can take PO. You need to choose a steroid regimen.</p></div><div class="socratic-prompt"><h4>Steroid Options</h4><p>What steroid regimen is appropriate, and is a taper needed?</p></div>`,
hint_beginner:"5-day course, no taper needed for short courses",hint_advanced:"What's the evidence for dexamethasone vs prednisone?",
question:{prompt:"What steroid regimen should you prescribe?",
options:[{text:"Prednisone 40-60mg daily x 5 days - no taper needed for courses under 2 weeks; OR dexamethasone 12mg x 1-2 days",correct:true},
{text:"Prednisone with mandatory 2-week taper",correct:false},
{text:"Inhaled steroids only - systemic not needed",correct:false},
{text:"IV steroids required for all severe exacerbations",correct:false}],
explanation:{correct:"5-day prednisone course is standard - no taper needed for courses under 2 weeks. Dexamethasone (longer half-life) as 1-2 doses is equivalent and may improve compliance. IV only needed if NPO.",incorrect:"No taper needed for short courses. Inhaled steroids are for maintenance, not acute exacerbation. Oral is as effective as IV if patient can swallow."},
teaching:`<h4>Steroid Options</h4><p><strong>Prednisone:</strong> 40-60mg x 5 days (no taper)</p><p><strong>Dexamethasone:</strong> 12-16mg x 1-2 days (equivalent)</p><p><strong>Methylpred IV:</strong> 125mg if NPO</p><p><strong>Key:</strong> Oral = IV efficacy if tolerating PO</p>`,
why_chain:[{q:"Why is dexamethasone gaining favor?",a:"Longer half-life (36-72h vs 12-36h for prednisone). Single dose or 2 doses = 5 days prednisone. Better compliance, no 'steroid taste.'"},{q:"Why no taper?",a:"HPA axis suppression requires 2-3 weeks of steroids. Short courses don't suppress the axis, so no taper needed."}],points:10}},

{title:"Magnesium Sulfate",content:`<div class="narrative"><p>After initial treatment, SpO2 improves to 93% but patient still has significant work of breathing.</p></div><div class="socratic-prompt"><h4>Escalation Therapy</h4><p>When is magnesium sulfate indicated in asthma?</p></div>`,
hint_beginner:"Magnesium for severe exacerbations not responding to initial therapy",hint_advanced:"What is the mechanism of magnesium bronchodilation?",
question:{prompt:"Is magnesium sulfate indicated in this patient?",
options:[{text:"Yes - indicated for severe exacerbations with incomplete response to initial therapy; give 2g IV over 20 minutes",correct:true},
{text:"No - only for life-threatening exacerbations",correct:false},
{text:"Yes - should be first-line for all exacerbations",correct:false},
{text:"No - no evidence for magnesium in asthma",correct:false}],
explanation:{correct:"Magnesium 2g IV over 20 min is indicated for severe exacerbations not fully responding to bronchodilators. Smooth muscle relaxant. Reduces admission rates in severe exacerbations.",incorrect:"Magnesium is indicated for severe (not just life-threatening) exacerbations with incomplete response. Good evidence for reducing admissions."},
teaching:`<h4>Magnesium Sulfate</h4><p><strong>Indication:</strong> Severe exacerbation with incomplete response to initial therapy</p><p><strong>Dose:</strong> 2g IV over 20 minutes</p><p><strong>Mechanism:</strong> Smooth muscle relaxation, inhibits Ca2+ influx</p><p><strong>Evidence:</strong> Reduces admission rates in severe exacerbations</p>`,
why_chain:[{q:"How does magnesium cause bronchodilation?",a:"Magnesium blocks calcium channels in bronchial smooth muscle, causing relaxation. Also inhibits acetylcholine release and histamine release from mast cells."},{q:"Why not use for mild exacerbations?",a:"Studies show benefit only in severe exacerbations. In mild-moderate, bronchodilators alone are sufficient."}],points:10}},

{title:"The ABG Question",content:`<div class="narrative"><p>Resident asks if ABG is needed. Patient now on 2L NC with SpO2 94%, still working hard.</p></div><div class="socratic-prompt"><h4>Role of ABG</h4><p>When is ABG indicated in asthma exacerbation, and what findings are concerning?</p></div>`,
hint_beginner:"ABG for severe exacerbations not improving, looking for rising pCO2",hint_advanced:"What pCO2 would you expect in a typical asthma exacerbation?",
question:{prompt:"What ABG findings would concern you most?",
options:[{text:"Normal or elevated pCO2 - should be LOW from hyperventilation; normal/high means fatigue and impending respiratory failure",correct:true},
{text:"Low pCO2 - indicates severe hyperventilation",correct:false},
{text:"Low pO2 alone determines severity",correct:false},
{text:"ABG not useful in asthma management",correct:false}],
explanation:{correct:"Asthmatics hyperventilate during exacerbation, so pCO2 should be LOW (25-35). Normal pCO2 (40) or elevated means the patient is tiring and can't maintain minute ventilation - this is an ominous sign of impending respiratory failure.",incorrect:"Low pCO2 is EXPECTED. Normal or high pCO2 is the danger sign - indicates respiratory muscle fatigue."},
teaching:`<h4>ABG in Asthma</h4><p><strong>Expected:</strong> Respiratory alkalosis (low pCO2) from hyperventilation</p><p><strong>Danger sign:</strong> Normal or elevated pCO2 = fatigue, impending failure</p><p><strong>When to get:</strong> Severe exacerbation not responding, life-threatening features</p>`,
why_chain:[{q:"Why is normal pCO2 bad?",a:"During exacerbation, respiratory drive is high → hyperventilation → low pCO2. If pCO2 'normalizes,' it means the patient can no longer compensate - respiratory muscles are fatiguing."},{q:"What about VBG?",a:"VBG pCO2 correlates well with ABG (typically 3-5 mmHg higher). Can use VBG to screen, but ABG preferred for severe cases."}],points:15}},

{title:"Non-Responder",content:`<div class="narrative"><p>Despite aggressive treatment, patient remains in severe distress. What are the next steps?</p></div><div class="socratic-prompt"><h4>Escalation Options</h4><p>What therapies are available for refractory severe asthma?</p></div>`,
hint_beginner:"Consider ICU, BiPAP, IV beta-agonists, heliox",hint_advanced:"What is the role of ketamine in status asthmaticus?",
question:{prompt:"What escalation options exist for refractory severe asthma?",
options:[{text:"ICU admission, BiPAP (reduces work of breathing), consider IV terbutaline, heliox, and prepare for intubation if failing",correct:true},
{text:"Continue same treatment longer - just needs more time",correct:false},
{text:"Intubate immediately for any refractory case",correct:false},
{text:"Switch to oral medications",correct:false}],
explanation:{correct:"Escalation ladder: ICU, BiPAP (reduces WOB, bridges to steroid effect), IV terbutaline or epinephrine, heliox (if available). Intubation last resort - high risk in asthma (air trapping, hypotension).",incorrect:"Refractory severe asthma needs escalation, not just more time. BiPAP can help bridge. Intubation is high-risk and last resort."},
teaching:`<h4>Refractory Asthma Options</h4><p><strong>BiPAP:</strong> Reduces WOB, buys time for steroids</p><p><strong>IV terbutaline:</strong> 0.25mg SQ or IV</p><p><strong>Heliox:</strong> Lower density gas, reduces turbulent flow</p><p><strong>Ketamine:</strong> Bronchodilator properties, consider for sedation if intubating</p><p><strong>Intubation:</strong> Last resort - high risk of air trapping</p>`,
why_chain:[{q:"Why is intubation high-risk in asthma?",a:"Air trapping during positive pressure ventilation can cause auto-PEEP, barotrauma, and hemodynamic collapse. Use low RR, long expiratory time, permissive hypercapnia."},{q:"Why consider ketamine?",a:"Ketamine has bronchodilator properties. If intubation needed, ketamine is preferred induction agent. Can also be used as continuous infusion for sedation."}],points:10}},

{title:"Discharge Planning",content:`<div class="narrative"><p>After 4 hours, patient improved: SpO2 97% RA, speaking full sentences, no accessory muscles, peak flow 75% predicted.</p></div><div class="socratic-prompt"><h4>Safe Discharge</h4><p>What criteria must be met for discharge, and what does the discharge plan include?</p></div>`,

function shuffleArray(a){const s=[...a];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s;}
function setDifficulty(l,b){difficulty=l;document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderStage(currentStage);}
function renderStage(i){
const s=stages[i],opts=shuffleArray(s.question.options.map((o,idx)=>({...o,idx}))),ltrs='ABCD';
let hints='';
if(difficulty==='beginner'&&s.hint_beginner)hints=`<div class="hint-beginner" style="display:block;">Hint: ${s.hint_beginner}</div>`;
else if(difficulty==='advanced'&&s.hint_advanced)hints=`<div class="hint-advanced" style="display:block;">Challenge: ${s.hint_advanced}</div>`;
const why=s.question.why_chain?`<div class="why-chain" id="why"><h4>WHY Chain</h4>${s.question.why_chain.map(w=>`<div class="why-item"><div class="why-q">Q: ${w.q}</div><div class="why-a">${w.a}</div></div>`).join('')}</div>`:'';
document.getElementById('progress').style.width=((i)/stages.length*100)+'%';
document.getElementById('scene-container').innerHTML=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${i+1} of ${stages.length}</div><div class="scene-title">${s.title}</div></div>${s.content}${hints}<div class="question-box"><div class="question-prompt">${s.question.prompt}</div><div class="mcq-options">${opts.map((o,j)=>`<div class="mcq-option" data-correct="${o.correct}" onclick="selectOption(this,${i})"><span class="option-letter">${ltrs[j]}</span><span class="option-text">${o.text}</span></div>`).join('')}</div><div class="feedback correct-feedback" id="fb-c"><div class="feedback-title">Correct!</div><div>${s.question.explanation.correct}</div></div><div class="feedback incorrect-feedback" id="fb-i"><div class="feedback-title">Not Quite</div><div>${s.question.explanation.incorrect}</div></div><div class="teaching-point" id="teach">${s.question.teaching}</div>${why}<button class="btn" id="next-btn" onclick="nextStage()">Continue</button></div></div>`;
}
function selectOption(el,i){
if(answeredQuestions.has(i))return;
const c=el.dataset.correct==='true',s=stages[i];
answeredQuestions.add(i);decisionPath.push({stage:s.title,correct:c,points:c?s.question.points:0});
if(c)score+=s.question.points;maxScore+=s.question.points;
document.getElementById('score').textContent=score;document.getElementById('maxScore').textContent=maxScore;
document.querySelectorAll('.mcq-option').forEach(o=>{o.classList.add('disabled');if(o.dataset.correct==='true')o.classList.add('correct');else if(o===el&&!c)o.classList.add('incorrect');});
document.getElementById(c?'fb-c':'fb-i').classList.add('show');
document.getElementById('teach').classList.add('show');
const w=document.getElementById('why');if(w)w.classList.add('show');
document.getElementById('next-btn').classList.add('show');
}
function nextStage(){if(++currentStage<stages.length){renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'});}else showCompletion();}
function showCompletion(){
const p=Math.round(score/maxScore*100);
let g,m,clr;
if(p>=90){g='Outstanding!';clr='#22c55e';m='Excellent asthma management!';}
else if(p>=80){g='Great Work!';clr='#3b82f6';m='Strong grasp. Review escalation options.';}
else if(p>=70){g='Good Progress';clr='#f59e0b';m='Focus on early steroids and discharge planning.';}
else{g='Keep Learning';clr='#ef4444';m='Review severity assessment and treatment bundle.';}
document.getElementById('scene-container').innerHTML=`<div class="scene completion"><div class="completion-grade" style="color:${clr}">${g}</div><div class="completion-percent" style="color:${clr}">${p}%</div><div style="font-size:1.3rem;margin-bottom:8px">${score}/${maxScore} points</div><div style="margin:16px 0;color:#e2e8f0">${m}</div><div class="completion-breakdown"><h4 style="margin-bottom:16px">Your Journey</h4>${decisionPath.map((d,j)=>`<div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;"><span style="color:${d.correct?'#4ade80':'#f87171'}">${d.correct?'Y':'N'} ${d.stage}</span><span style="color:#94a3b8">${d.points}/${stages[j].question.points}</span></div>`).join('')}</div></div>`;
document.getElementById('progress').style.width='100%';
}
document.addEventListener('DOMContentLoaded',()=>renderStage(0));


// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
