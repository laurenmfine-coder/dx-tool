<script>
let currentStage = 0, score = 0, maxScore = 0, difficulty = 'standard', answeredQuestions = new Set(), decisionPath = [];

const stages = [
    {
        title: "The Red Leg",
        content: `<div class="narrative"><p>A <span class="highlight">58-year-old diabetic man</span> presents with <span class="critical">rapidly progressive leg pain, swelling, and erythema</span> over 2 days. He cut his leg while gardening.</p><p style="margin-top:12px;">He appears toxic - confused and febrile.</p></div>
        <div class="socratic-prompt"><h4>Before Seeing Vitals</h4><p>This patient has a red, swollen leg. What SINGLE clinical feature, if present, would make you most concerned this is necrotizing fasciitis rather than simple cellulitis?</p></div>`,
        hint_beginner: "Think about what distinguishes superficial infection from deep tissue destruction...",
        hint_advanced: "Consider why nec fasc causes severe pain early but may cause numbness later.",
        question: {
            prompt: "Which clinical feature is MOST specific for necrotizing fasciitis over cellulitis?",
            options: [
                { text: "Pain out of proportion to skin findings - severe deep pain despite mild-appearing erythema", correct: true },
                { text: "Fever and elevated white blood cell count", correct: false },
                { text: "Red, warm, swollen skin", correct: false },
                { text: "History of diabetes mellitus", correct: false }
            ],
            explanation: {
                correct: "Excellent! PAIN OUT OF PROPORTION is the most important early clue! In nec fasc, the deep fascia is necrotic while skin may look deceptively benign. The severe deep tissue destruction causes intense pain that seems 'too much' for what you see on the surface. Later, when cutaneous nerves are destroyed, paradoxical ANESTHESIA develops - an even worse prognostic sign.",
                incorrect: "While these can occur in nec fasc, they're not specific. PAIN OUT OF PROPORTION is the key early clue - severe deep pain despite relatively mild-appearing skin. This occurs because deep fascia is necrotic while skin initially looks okay."
            },
            teaching: `<h4>Hard Signs vs Soft Signs of Nec Fasc</h4><table class="comparison-table"><tr><th>Hard Signs (OR NOW!)</th><th>Soft Signs (High Suspicion)</th></tr><tr><td>Crepitus (gas in tissue)</td><td><strong>Pain out of proportion</strong></td></tr><tr><td>Skin necrosis/bullae</td><td>Edema beyond erythema</td></tr><tr><td>Gas on imaging</td><td>Tense woody swelling</td></tr><tr><td>Gray "dishwater" drainage</td><td>Rapid progression despite antibiotics</td></tr><tr><td>Hemodynamic instability</td><td>High fever, tachycardia</td></tr></table>`,
            why_chain: [{q: "Why does pain out of proportion occur?", a: "Deep fascial necrosis destroys tissue below the skin while the epidermis/dermis remain relatively intact early on. The massive tissue destruction causes severe pain, but the skin 'looks okay' - creating a dangerous mismatch."}, {q: "Why does numbness develop later?", a: "As infection spreads, cutaneous nerves are destroyed. Paradoxically, the patient may report LESS pain as the disease worsens - this is an ominous sign of extensive necrosis."}],
            points: 15
        }
    },
    {
        title: "Risk Stratification",
        content: `<div class="narrative"><p>Now you examine the patient:</p><ul style="margin-top:12px;"><li><strong>Vitals:</strong> HR 118, BP 92/58, T 102.8°F (39.3°C), RR 24</li><li><strong>Leg exam:</strong> Dusky erythema, tense edema, <span class="critical">crepitus palpable</span></li><li><strong>Labs:</strong> WBC 24,000, Cr 2.1, Glucose 380, Na 131</li></ul></div>
        <div class="socratic-prompt"><h4>Critical Decision Point</h4><p>You feel CREPITUS (crackling under the skin). What does this physical finding represent, and what is your IMMEDIATE next step?</p></div>`,
        hint_beginner: "Crepitus = gas in the tissues. Where does gas in soft tissue come from?",
        hint_advanced: "Think about which organisms produce gas and the implications for time to OR.",
        question: {
            prompt: "Crepitus is palpated. What is the IMMEDIATE next action?",
            options: [
                { text: "Emergent surgical consultation - this is a hard sign requiring immediate debridement", correct: true },
                { text: "Order CT scan to confirm gas before calling surgery", correct: false },
                { text: "Start broad-spectrum antibiotics and observe for 6 hours", correct: false },
                { text: "Calculate LRINEC score to determine if surgery is needed", correct: false }
            ],
            explanation: {
                correct: "YES! Crepitus is a HARD SIGN - it indicates gas-producing organisms in tissue and mandates IMMEDIATE surgical consultation. Don't delay for imaging or scoring systems. Mortality increases 7-9% per HOUR of delayed surgery. 'When in doubt, cut it out.'",
                incorrect: "CREPITUS IS A HARD SIGN - surgery cannot wait! Each hour of delay increases mortality 7-9%. Imaging, scoring systems, and observation periods waste critical time. Call surgery IMMEDIATELY."
            },
            teaching: `<h4>The Time Factor in Necrotizing Fasciitis</h4><ul><li><strong>Mortality with early surgery (&lt;12h):</strong> ~20%</li><li><strong>Mortality with delayed surgery (&gt;24h):</strong> >50%</li><li><strong>Each hour of delay:</strong> 7-9% increased mortality</li></ul><div class="mechanism-box"><div class="mechanism-title">🧬 Gas in Tissue = Anaerobic Infection</div><div class="pathway">Gas-producing organisms:
→ Clostridium species (most virulent)
→ Mixed anaerobic/aerobic (Type I)
→ Group A Strep (Type II) can also produce gas

Crepitus = surgical emergency
Do NOT delay for imaging!</div></div>`,
            why_chain: [{q: "Why is delay so deadly?", a: "Nec fasc spreads along fascial planes at 1 inch/hour. The infection outpaces the immune system and antibiotics cannot penetrate necrotic tissue. Only surgical removal of dead tissue can control the infection."}, {q: "Why not wait for CT confirmation?", a: "Clinical crepitus IS the diagnosis. CT may miss early gas, and the hour spent getting imaging could mean the difference between amputation and death."}],
            points: 15
        }
    },
    {
        title: "LRINEC Score",
        content: `<div class="narrative"><p>While awaiting the surgeon, the medical student asks about the LRINEC score. The patient's labs show:</p><ul style="margin-top:12px;"><li>WBC: 24,000 (2 points)</li><li>Hemoglobin: 10.2 (1 point)</li><li>Sodium: 131 (2 points)</li><li>Glucose: 380 (1 point)</li><li>Creatinine: 2.1 (2 points)</li><li>CRP: 280 (4 points)</li></ul><p style="margin-top:12px;"><strong>Total: 12 points</strong></p></div>
        <div class="socratic-prompt"><h4>Understanding the Tool</h4><p>The LRINEC score is ≥6 (high risk). But you've already called surgery based on clinical findings. When is LRINEC actually useful?</p></div>`,
        hint_beginner: "Think about when you're NOT sure if it's nec fasc vs cellulitis...",
        hint_advanced: "Consider LRINEC's sensitivity and specificity - what are its limitations?",
        question: {
            prompt: "When is the LRINEC score MOST useful clinically?",
            options: [
                { text: "When clinical findings are equivocal - soft signs present but no hard signs", correct: true },
                { text: "To rule out nec fasc when you're confident it's just cellulitis", correct: false },
                { text: "To decide whether surgery should be emergent vs urgent", correct: false },
                { text: "To replace clinical judgment in septic patients", correct: false }
            ],
            explanation: {
                correct: "Correct! LRINEC is useful when you have SOFT signs (pain out of proportion, rapid progression) but no HARD signs (crepitus, necrosis). A high score supports your suspicion; a low score should NOT override clinical concern. It's a 'rule-in' tool, not a 'rule-out' tool.",
                incorrect: "LRINEC has good specificity but poor sensitivity (~80%). It should NEVER be used to rule out nec fasc or delay surgery when clinical suspicion is high. It's most useful when clinical findings are equivocal."
            },
            teaching: `<h4>LRINEC Score Interpretation</h4><table class="comparison-table"><tr><th>Score</th><th>Risk</th><th>Action</th></tr><tr><td>≤5</td><td>Low (&lt;50%)</td><td>Low but NOT zero - clinical judgment trumps</td></tr><tr><td>6-7</td><td>Intermediate (50-75%)</td><td>High suspicion - surgical consult</td></tr><tr><td>≥8</td><td>High (&gt;75%)</td><td>Strong predictor - emergent surgery</td></tr></table><p style="margin-top:12px;"><strong>Key limitation:</strong> Sensitivity only ~80%. A low score does NOT rule out nec fasc!</p>`,
            why_chain: [{q: "Why can't LRINEC rule out nec fasc?", a: "Early nec fasc may have normal labs before systemic inflammation develops. Additionally, 20% of true cases have low LRINEC scores. Clinical suspicion must drive decision-making."}, {q: "Why include CRP?", a: "CRP rises rapidly with tissue destruction and bacterial infection. Values >150 mg/L strongly suggest nec fasc over simple cellulitis. It's the most heavily weighted component (4 points)."}],
            points: 10
        }
    },
    {
        title: "Antibiotic Selection",
        content: `<div class="narrative"><p>Surgery is on the way. You need to start empiric antibiotics BEFORE the OR. The patient has no known drug allergies.</p></div>
        <div class="socratic-prompt"><h4>Coverage Considerations</h4><p>Nec fasc can be Type I (polymicrobial) or Type II (monomicrobial). What organisms must your empiric regimen cover?</p></div>`,
        hint_beginner: "Think: Gram positives (including MRSA), Gram negatives, AND anaerobes",
        hint_advanced: "Why is clindamycin specifically recommended even when other drugs cover the same organisms?",
        question: {
            prompt: "Which empiric antibiotic regimen is MOST appropriate for necrotizing fasciitis?",
            options: [
                { text: "Vancomycin + piperacillin-tazobactam + clindamycin", correct: true },

function setDifficulty(level, btn) {
    difficulty = level;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderStage();
}

function shuffleArray(array) {
    const shuffled = [...array];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
}

function renderStage() {
    const stage = stages[currentStage];
    const progress = ((currentStage + 1) / stages.length) * 100;
    document.getElementById('progress').style.width = progress + '%';
    
    let html = `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${currentStage + 1} of ${stages.length}</div><div class="scene-title">${stage.title}</div></div>${stage.content}`;
    
    if (difficulty === 'beginner' && stage.hint_beginner) {
        html += `<div class="hint-beginner" style="display:block">🌱 <strong>Beginner Hint:</strong> ${stage.hint_beginner}</div>`;
    }
    if (difficulty === 'advanced' && stage.hint_advanced) {
        html += `<div class="hint-advanced" style="display:block">🎯 <strong>Advanced Challenge:</strong> ${stage.hint_advanced}</div>`;
    }
    
    if (stage.question) {
        const q = stage.question;
        const questionId = `q${currentStage}`;
        const answered = answeredQuestions.has(questionId);
        
        if (!answered) {
            maxScore += q.points;
            document.getElementById('maxScore').textContent = maxScore;
        }
        
        const shuffledOptions = answered ? q.options : shuffleArray(q.options);
        if (!answered) stage.shuffledOptions = shuffledOptions;
        else if (stage.shuffledOptions) shuffledOptions.splice(0, shuffledOptions.length, ...stage.shuffledOptions);
        
        html += `<div class="question-box"><div class="question-prompt">${q.prompt}</div><div class="mcq-options">`;
        
        shuffledOptions.forEach((opt, i) => {
            const letter = String.fromCharCode(65 + i);
            const optionClass = answered ? (opt.correct ? 'correct' : 'incorrect') + ' disabled' : '';
            html += `<div class="mcq-option ${optionClass}" onclick="handleAnswer(${currentStage}, ${opt.correct}, this, '${questionId}')" data-correct="${opt.correct}"><div class="option-letter">${letter}</div><div class="option-text">${opt.text}</div></div>`;
        });
        
        html += `</div><div class="feedback ${answered ? 'show' : ''} ${answered ? (decisionPath[currentStage]?.correct ? 'correct-feedback' : 'incorrect-feedback') : ''}" id="feedback${currentStage}"><div class="feedback-title">${answered ? (decisionPath[currentStage]?.correct ? '✓ Correct!' : '✗ Not Quite') : ''}</div><div class="feedback-text">${answered ? (decisionPath[currentStage]?.correct ? q.explanation.correct : q.explanation.incorrect) : ''}</div></div>`;
        
        if (q.teaching) {
            html += `<div class="teaching-point ${answered ? 'show' : ''}" id="teaching${currentStage}">${q.teaching}</div>`;
        }
        
        if (q.why_chain) {
            html += `<div class="why-chain ${answered ? 'show' : ''}" id="why${currentStage}"><h4>🔗 Why Chain - Deep Dive</h4>`;
            q.why_chain.forEach(w => {
                html += `<div class="why-item"><div class="why-q">Q: ${w.q}</div><div class="why-a">${w.a}</div></div>`;
            });
            html += `</div>`;
        }
    }
    
    const isLastStage = currentStage === stages.length - 1;
    const answered = stage.question ? answeredQuestions.has(`q${currentStage}`) : true;
    html += `<button class="btn ${answered ? 'show' : ''}" onclick="${isLastStage ? 'showCompletion()' : 'nextStage()'}">${isLastStage ? 'Complete Case' : 'Continue →'}</button></div>`;
    
    document.getElementById('scene-container').innerHTML = html;
}

function handleAnswer(stageIndex, correct, element, questionId) {
    if (answeredQuestions.has(questionId)) return;
    
    answeredQuestions.add(questionId);
    const stage = stages[stageIndex];
    
    if (correct) {
        score += stage.question.points;
        document.getElementById('score').textContent = score;
    }
    
    decisionPath[stageIndex] = { correct };
    
    document.querySelectorAll('.mcq-option').forEach(opt => {
        opt.classList.add('disabled');
        if (opt.dataset.correct === 'true') opt.classList.add('correct');
        else if (opt === element && !correct) opt.classList.add('incorrect');
    });
    
    const feedback = document.getElementById(`feedback${stageIndex}`);
    feedback.classList.add('show', correct ? 'correct-feedback' : 'incorrect-feedback');
    feedback.querySelector('.feedback-title').textContent = correct ? '✓ Correct!' : '✗ Not Quite';
    feedback.querySelector('.feedback-text').textContent = correct ? stage.question.explanation.correct : stage.question.explanation.incorrect;
    
    const teaching = document.getElementById(`teaching${stageIndex}`);
    if (teaching) teaching.classList.add('show');
    
    const why = document.getElementById(`why${stageIndex}`);
    if (why) why.classList.add('show');
    
    document.querySelector('.btn').classList.add('show');
}

function nextStage() {
    currentStage++;
    renderStage();
    window.scrollTo(0, 0);
}

function showCompletion() {
    const percent = Math.round((score / maxScore) * 100);
    let grade, color;
    if (percent >= 90) { grade = 'Outstanding!'; color = '#22c55e'; }
    else if (percent >= 80) { grade = 'Excellent!'; color = '#84cc16'; }
    else if (percent >= 70) { grade = 'Good Work!'; color = '#eab308'; }
    else { grade = 'Keep Learning!'; color = '#f97316'; }
    
    document.getElementById('scene-container').innerHTML = `
        <div class="scene completion">
            <div class="completion-grade" style="color:${color}">${grade}</div>
            <div class="completion-percent" style="color:${color}">${percent}%</div>
            <p style="font-size:1.2rem;margin-bottom:24px;">Score: ${score} / ${maxScore} points</p>
            <div class="completion-breakdown">
                <h4 style="margin-bottom:16px;color:#fca5a5;">Key Learning Points:</h4>
                <ul style="text-align:left;margin-left:20px;">
                    <li><strong>Pain out of proportion</strong> - Most important early sign of nec fasc</li>

                    <li><strong>Serial debridements</strong> - Average 3-4 operations needed</li>
                    <li><strong>Non-purulent cellulitis</strong> - Strep, use cephalexin</li>

    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
