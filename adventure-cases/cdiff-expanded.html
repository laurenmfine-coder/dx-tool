    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"Post-Hospitalization Diarrhea",content:`<div class="narrative"><p>A <span class="highlight">72-year-old woman</span> presents with profuse watery diarrhea (10-12/day), crampy pain, and fever. Discharged 10 days ago after pneumonia treatment with <span class="critical">ceftriaxone then levofloxacin</span>.</p><p style="margin-top:12px;"><strong>PMH:</strong> HTN, DM2, GERD (on PPI)<br><strong>Labs:</strong> WBC 18,500, Cr 1.6 (baseline 0.9)</p></div>`,question:{prompt:"What is the MOST appropriate diagnostic test for C. difficile?",options:[{text:"Stool culture for bacterial pathogens",correct:false},{text:"Stool PCR for C. diff toxin gene alone",correct:false},{text:"Multi-step testing: GDH/toxin EIA or NAAT with toxin confirmation",correct:true},{text:"CT abdomen to look for colitis",correct:false}],explanation:{correct:"Correct! IDSA recommends multi-step testing to distinguish infection from colonization. PCR alone can be positive in asymptomatic carriers (5-15% of hospitalized patients).",incorrect:"Multi-step testing is recommended. PCR detects toxin GENE (positive in colonizers). Multi-step confirms active toxin PRODUCTION."},teaching:`<h4>C. diff Testing</h4><table class="comparison-table"><tr><th>Test</th><th>Detects</th><th>Limitation</th></tr><tr><td>GDH</td><td>C. diff antigen</td><td>Needs toxin confirmation</td></tr><tr><td>Toxin EIA</td><td>Toxin protein</td><td>Lower sensitivity</td></tr><tr><td>NAAT/PCR</td><td>Toxin gene</td><td>Positive in colonizers</td></tr></table>`,why_chain:[{q:"Why not PCR alone?",a:"5-15% of hospitalized patients are colonized WITHOUT disease. Treating colonizers = antibiotics without benefit."}],points:10}},
        {title:"Risk Factors",content:`<div class="narrative"><p>Her risk factors: Age 72, recent hospitalization, <span class="critical">fluoroquinolone</span> use, <span class="highlight">PPI</span> therapy.</p></div>`,question:{prompt:"Which factors put her at HIGHEST risk for CDI?",options:[{text:"Age and diabetes",correct:false},{text:"Fluoroquinolone use and PPI therapy",correct:true},{text:"Hospitalization alone",correct:false},{text:"IV antibiotics specifically",correct:false}],explanation:{correct:"Correct! Fluoroquinolones are highest-risk antibiotics. PPIs allow more spores to survive gastric transit.",incorrect:"Fluoroquinolones and PPIs are major modifiable risk factors."},teaching:`<h4>Highest-Risk Antibiotics</h4><p>Fluoroquinolones, clindamycin, cephalosporins, carbapenems</p><div class="alert-box"><div class="alert-title">⚠️</div><p>Each additional day of antibiotics increases CDI risk by ~2%!</p></div>`,why_chain:[{q:"Why are fluoroquinolones high-risk?",a:"Broad anaerobic activity eliminates gut bacteria that suppress C. diff. Also select for hypervirulent strains."}],points:10}},
        {title:"Severity Classification",content:`<div class="narrative"><p>C. diff positive. Classify severity:<br><strong>WBC <span class="critical">18,500</span> | Cr <span class="critical">1.6</span> (1.8x baseline)</strong></p></div>`,question:{prompt:"Based on IDSA criteria, this is:",options:[{text:"Non-severe CDI",correct:false},{text:"Severe CDI",correct:true},{text:"Fulminant CDI",correct:false},{text:"Moderate CDI",correct:false}],explanation:{correct:"Correct! WBC ≥15,000 OR Cr >1.5x baseline = SEVERE. She has both!",incorrect:"IDSA: WBC ≥15K OR Cr >1.5x = Severe. No 'moderate' category exists."},teaching:`<h4>IDSA Severity</h4><table class="comparison-table"><tr><th>Severity</th><th>Criteria</th></tr><tr><td>Non-severe</td><td>WBC <15K AND Cr <1.5x</td></tr><tr style="background:rgba(251,191,36,0.2);"><td>Severe</td><td>WBC ≥15K OR Cr >1.5x</td></tr><tr style="background:rgba(239,68,68,0.2);"><td>Fulminant</td><td>Shock, ileus, megacolon</td></tr></table>`,why_chain:[{q:"Why does severity matter?",a:"Metronidazole is INFERIOR for severe CDI. Severity determines antibiotic choice."}],points:10}},
        {title:"Treatment Selection",content:`<div class="narrative"><p>This is <span class="critical">SEVERE CDI</span>. Patient tolerates oral meds, no ileus.</p></div>`,question:{prompt:"What is first-line treatment for SEVERE CDI?",options:[{text:"IV metronidazole 500mg q8h",correct:false},{text:"Oral vancomycin 125mg QID for 10 days",correct:true},{text:"IV vancomycin 1g q12h",correct:false},{text:"Oral metronidazole 500mg TID",correct:false}],explanation:{correct:"Correct! Oral vancomycin 125mg QID x10 days. IV vancomycin is useless (excreted by kidneys, not colon). Metronidazole NOT recommended for severe.",incorrect:"ORAL vancomycin is first-line. IV vanco doesn't reach colon. Metro inferior for severe."},teaching:`<div class="alert-box"><div class="alert-title">Key Points</div><p>• IV vancomycin does NOT treat CDI<br>• Metronidazole NOT for severe<br>• 500mg vanc only for fulminant</p></div>`,why_chain:[{q:"Why oral vancomycin?",a:"Not absorbed - stays in GI tract at 100-1000x MIC. Exactly where needed."}],points:10}},
        {title:"Antibiotic Stewardship",content:`<div class="narrative"><p>Patient on day 7 of levofloxacin. Pneumonia resolved. About to start vancomycin for CDI.</p></div>`,question:{prompt:"What should you do about the levofloxacin?",options:[{text:"Continue alongside vancomycin",correct:false},{text:"Stop levofloxacin immediately",correct:true},{text:"Switch to azithromycin",correct:false},{text:"Add probiotics and continue",correct:false}],explanation:{correct:"Correct! Stop the offending antibiotic! Pneumonia resolved. Continuing perpetuates dysbiosis.",incorrect:"Stop unnecessary antibiotics, especially fluoroquinolones. Each day delays microbiome recovery."},teaching:`<div class="mechanism-box"><div class="mechanism-title">Stewardship in CDI</div><div class="pathway">1. Stop unnecessary antibiotics
2. If needed, use lowest-risk options
3. Shortest effective duration</div></div>`,why_chain:[],points:10}},
        {title:"Response Assessment",content:`<div class="narrative"><p><strong>Day 3:</strong> Diarrhea 5-6/day (was 10-12), WBC 14,200 (was 18,500), Cr 1.3 (was 1.6). Still loose stools.</p></div>`,question:{prompt:"How do you interpret this?",options:[{text:"Treatment failure - switch therapy",correct:false},{text:"Appropriate response - continue vancomycin",correct:true},{text:"Order repeat C. diff testing",correct:false},{text:"Add IV metronidazole",correct:false}],explanation:{correct:"Correct! This IS appropriate response. Day 3-5 is when improvement starts. NEVER retest during treatment.",incorrect:"Patient is responding! Don't abandon effective therapy. NEVER repeat testing - stays positive for weeks."},teaching:`<div class="alert-box"><div class="alert-title">🚨 NEVER Retest!</div><p>PCR positive for weeks even with success. Test only for NEW symptoms after completing therapy.</p></div>`,why_chain:[],points:10}},
        {title:"Recurrence Prevention",content:`<div class="narrative"><p>Day 10: Treatment complete. Diarrhea resolved. She asks about recurrence.</p></div>`,question:{prompt:"What is the recurrence risk?",options:[{text:"Very low - she completed treatment",correct:false},{text:"15-30%; consider bezlotoxumab for high-risk",correct:true},{text:"Take probiotics indefinitely",correct:false},{text:"Monthly vancomycin prophylaxis",correct:false}],explanation:{correct:"Correct! 15-30% recurrence after first episode. Bezlotoxumab reduces recurrence in high-risk patients.",incorrect:"Recurrence is common (15-30%). Probiotics have weak evidence. Bezlotoxumab is indicated for high-risk."},teaching:`<div class="mechanism-box"><div class="mechanism-title">Prevention</div><div class="pathway">First episode: Bezlotoxumab if high-risk
First recurrence: Fidaxomicin (lower recurrence)
Multiple recurrences: FMT (85-90% success!)</div></div>`,why_chain:[{q:"What is bezlotoxumab?",a:"Anti-toxin B antibody. Single IV dose during treatment. Reduces recurrence ~40%."}],points:10}},
        {title:"Case Resolution",content:`<div class="narrative"><p>Bezlotoxumab given. PPI discontinued. At 3-month follow-up: No recurrence.</p></div><div class="mechanism-box"><div class="mechanism-title">📚 CDI Summary</div><div class="pathway">Testing: Multi-step (GDH/toxin or NAAT/toxin)
Severity: WBC ≥15K OR Cr >1.5x = Severe
Treatment: Oral vanc or fidaxomicin
STOP offending antibiotics!
Don't retest during treatment
Recurrence: 15-30%, consider bezlotoxumab</div></div>`,question:{prompt:"Most important factor for preventing CDI recurrence?",options:[{text:"Daily probiotics",correct:false},{text:"Avoiding unnecessary antibiotics",correct:true},{text:"Continuing PPI",correct:false},{text:"Monthly stool testing",correct:false}],explanation:{correct:"Correct! Antibiotic stewardship is the most important modifiable factor.",incorrect:"Avoid unnecessary antibiotics. Probiotics have weak evidence. PPIs increase risk."},teaching:`<h4>Key Takeaways</h4><ul style="line-height:2;margin-left:20px;"><li>Multi-step testing</li><li>WBC ≥15K OR Cr >1.5x = Severe</li><li>Oral vanco or fidaxomicin</li><li>Stop offending antibiotics</li><li>Never retest during treatment</li></ul>`,why_chain:[],points:10}}
    ];
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${currentStage+1} of ${stages.length}</div><div class="scene-title">${stage.title}</div></div>${stage.content}`;if(stage.question){html+=`<div class="question-box"><div class="question-prompt">${stage.question.prompt}</div><div class="mcq-options">`;stage.question.options.forEach((opt,i)=>{html+=`<div class="mcq-option" onclick="checkAnswer(${i},${opt.correct})"><div class="option-letter">${String.fromCharCode(65+i)}</div><div>${opt.text}</div></div>`;});html+=`</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>${stage.question.explanation.correct}</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>${stage.question.explanation.incorrect}</div>`;if(stage.question.teaching)html+=`<div class="teaching-point" id="teaching">${stage.question.teaching}</div>`;if(stage.question.why_chain&&stage.question.why_chain.length>0){html+=`<div class="why-chain" id="why-chain"><h4>🔗 WHY Chain</h4>`;stage.question.why_chain.forEach(w=>{html+=`<div class="why-item"><div class="why-q">${w.q}</div><div style="color:#e2e8f0;line-height:1.6;">${w.a}</div></div>`;});html+=`</div>`;}html+=`<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>`;}html+=`</div>`;document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');const w=document.getElementById('why-chain');if(w)w.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML=`<div class="scene completion"><h2 style="color:#4ade80;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>${score}</strong> / ${stages.length*10}</p><p>You've mastered C. difficile Colitis!</p></div>`;}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}

</script>
