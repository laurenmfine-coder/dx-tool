    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"The Wheezing Infant",content:'<div class="narrative"><p>A <span class="highlight">6-month-old infant</span> presents in January with <span class="critical">cough, wheezing, and difficulty feeding</span> for 2 days. Started with rhinorrhea and low-grade fever. Born at term, no prior wheezing episodes.</p><p style="margin-top:12px;"><strong>Vitals:</strong> T 38.1°C, HR 150, RR 55, SpO2 93%<br><strong>Exam:</strong> Nasal flaring, subcostal retractions, diffuse wheezes and crackles</p></div>',question:{prompt:"What is the MOST common cause of bronchiolitis?",options:[{text:"Influenza virus",correct:false},{text:"Respiratory Syncytial Virus (RSV)",correct:true},{text:"Streptococcus pneumoniae",correct:false},{text:"Parainfluenza virus",correct:false}],explanation:{correct:"Correct! RSV causes 50-80% of bronchiolitis cases. Peak season is winter (November-March in Northern Hemisphere). Other causes: rhinovirus, parainfluenza, human metapneumovirus, adenovirus.",incorrect:"RSV is the #1 cause (50-80%). Peak in winter months. Bronchiolitis is viral, not bacterial."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Bronchiolitis Basics</div><div class="pathway">DEFINITION:\nLower respiratory infection in infants\nwith small airway inflammation/obstruction\n\nAGE: <2 years (peak 2-6 months)\n\nCAUSES:\n• RSV: 50-80% (most common)\n• Rhinovirus\n• Parainfluenza\n• Human metapneumovirus\n• Adenovirus\n\nSEASON: Winter (Nov-Mar in N. hemisphere)</div></div>',why_chain:[],points:10}},
        {title:"Clinical Diagnosis",content:'<div class="narrative"><p>Bronchiolitis is a CLINICAL diagnosis. What findings support it?</p></div>',question:{prompt:"What is the typical clinical course of bronchiolitis?",options:[{text:"Sudden onset of high fever and toxic appearance",correct:false},{text:"URI prodrome followed by cough, wheezing, and respiratory distress",correct:true},{text:"Chronic cough for weeks without URI symptoms",correct:false},{text:"Stridor and barking cough",correct:false}],explanation:{correct:"Correct! Classic course: URI prodrome (rhinorrhea, cough, low fever) for 2-3 days → lower respiratory symptoms (wheezing, tachypnea, retractions). Peak severity days 3-5. Usually resolves in 1-2 weeks.",incorrect:"URI prodrome → wheezing/respiratory distress. Peak day 3-5. Resolves 1-2 weeks. Stridor = croup, not bronchiolitis."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Clinical Features</div><div class="pathway">TYPICAL COURSE:\nDay 1-3: URI prodrome\n  (rhinorrhea, cough, low fever)\nDay 3-5: Peak illness\n  (wheezing, tachypnea, poor feeding)\nDay 7-14: Gradual resolution\n\nEXAM FINDINGS:\n• Tachypnea\n• Nasal flaring, retractions\n• Wheezing and/or crackles\n• Prolonged expiratory phase\n• Hypoxia (if severe)</div></div>',why_chain:[],points:10}},
        {title:"Testing: Less is More",content:'<div class="narrative"><p>Parents ask about testing. What workup is needed?</p></div>',question:{prompt:"For typical bronchiolitis, what testing is recommended?",options:[{text:"CXR, CBC, blood cultures in all cases",correct:false},{text:"No routine testing needed - clinical diagnosis",correct:true},{text:"RSV testing required for diagnosis",correct:false},{text:"CT chest to assess severity",correct:false}],explanation:{correct:"Correct! Bronchiolitis is a clinical diagnosis. No routine labs, CXR, or viral testing needed for typical cases. Testing may lead to unnecessary interventions. Consider testing only if atypical or considering other diagnoses.",incorrect:"No routine testing! Clinical diagnosis. CXR often shows nonspecific findings that don\'t change management."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 AAP Guidelines on Testing</div><div class="pathway">ROUTINE TESTING NOT RECOMMENDED:\n• Chest X-ray\n• Viral testing (RSV, etc.)\n• CBC, blood cultures\n• Blood gas\n\nWHY AVOID TESTING?\n• CXR often shows atelectasis\n  → mistaken for pneumonia\n  → unnecessary antibiotics\n• RSV result doesn\'t change management\n\nCONSIDER TESTING IF:\n• Atypical presentation\n• Severe/ICU-level illness\n• Immunocompromised\n• Ruling out other diagnoses</div></div>',why_chain:[],points:10}},
        {title:"Treatment: Supportive Care",content:'<div class="narrative"><p>What treatments actually work for bronchiolitis?</p></div><div class="alert-box"><div class="alert-title">⚠️ Most Treatments Don\'t Help!</div><p>Supportive care is the mainstay. Many commonly used treatments are ineffective.</p></div>',question:{prompt:"What is the MAINSTAY of bronchiolitis treatment?",options:[{text:"Bronchodilators (albuterol)",correct:false},{text:"Systemic corticosteroids",correct:false},{text:"Supportive care: oxygen, hydration, nasal suctioning",correct:true},{text:"Antibiotics",correct:false}],explanation:{correct:"Correct! Supportive care only: supplemental O2 if needed, hydration (oral or IV), nasal suctioning for congestion. Bronchodilators, steroids, and antibiotics are NOT recommended.",incorrect:"Supportive care only! O2, hydration, suctioning. Albuterol, steroids, antibiotics do NOT help."},teaching:'<h4>What Works vs What Doesn\'t</h4><table class="comparison-table"><tr><th>Intervention</th><th>Recommended?</th></tr><tr style="background:rgba(34,197,94,0.2);"><td>Supplemental O2 (if SpO2 <90%)</td><td>YES</td></tr><tr style="background:rgba(34,197,94,0.2);"><td>Hydration (oral/NG/IV)</td><td>YES</td></tr><tr style="background:rgba(34,197,94,0.2);"><td>Nasal suctioning</td><td>YES</td></tr><tr style="background:rgba(239,68,68,0.2);"><td>Albuterol/bronchodilators</td><td>NO</td></tr><tr style="background:rgba(239,68,68,0.2);"><td>Systemic corticosteroids</td><td>NO</td></tr><tr style="background:rgba(239,68,68,0.2);"><td>Antibiotics</td><td>NO</td></tr><tr style="background:rgba(239,68,68,0.2);"><td>Chest physiotherapy</td><td>NO</td></tr></table>',why_chain:[],points:10}},
        {title:"Admission Criteria",content:'<div class="narrative"><p>Your patient has SpO2 93% and moderate respiratory distress. Does she need admission?</p></div>',question:{prompt:"Which is an indication for hospitalization in bronchiolitis?",options:[{text:"Any infant with bronchiolitis",correct:false},{text:"Hypoxia (SpO2 <90-92%), severe distress, poor feeding, or high-risk infant",correct:true},{text:"Positive RSV test",correct:false},{text:"Wheezing on exam",correct:false}],explanation:{correct:"Correct! Admit for: hypoxia (SpO2 <90-92% on room air), severe respiratory distress, dehydration/unable to feed, apnea, or high-risk infant (premature, <12 weeks, comorbidities).",incorrect:"Admit for hypoxia, severe distress, poor feeding, apnea, or high-risk patients. Not all bronchiolitis needs admission."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Admission Criteria</div><div class="pathway">ADMIT IF:\n• SpO2 <90-92% on room air\n• Significant respiratory distress\n• Unable to maintain hydration\n• Apnea\n• Age <12 weeks\n• High-risk comorbidities\n  (prematurity, CHD, immunodeficiency)\n\nDISCHARGE IF:\n• SpO2 ≥90% on room air\n• Adequate oral intake\n• Mild respiratory distress\n• Reliable follow-up\n• Caregiver education complete</div></div>',why_chain:[],points:10}},
        {title:"Prevention: Palivizumab",content:'<div class="narrative"><p>How can severe RSV bronchiolitis be prevented in high-risk infants?</p></div>',question:{prompt:"Who should receive palivizumab (RSV prophylaxis)?",options:[{text:"All infants during RSV season",correct:false},{text:"High-risk infants: premature (<29 weeks), certain CHD, chronic lung disease",correct:true},{text:"Any infant hospitalized with bronchiolitis",correct:false},{text:"Only term infants with siblings",correct:false}],explanation:{correct:"Correct! Palivizumab (monoclonal antibody) for high-risk infants: born <29 weeks in first RSV season, hemodynamically significant CHD, chronic lung disease of prematurity. Monthly injections during RSV season.",incorrect:"Palivizumab for high-risk: premature <29 weeks, certain CHD, chronic lung disease. Monthly during RSV season."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 RSV Prevention</div><div class="pathway">PALIVIZUMAB (Synagis):\n• Monoclonal antibody against RSV\n• Monthly IM injections during season\n• Reduces hospitalization ~50%\n\nINDICATIONS (AAP):\n• Premature <29 weeks (1st RSV season)\n• Chronic lung disease of prematurity\n• Hemodynamically significant CHD\n• Certain immunodeficiencies\n• Pulmonary/neuromuscular disease\n\nNEW: RSV maternal vaccine and\nnirsevimab (long-acting antibody)\nfor broader infant protection</div></div>',why_chain:[],points:10}},
        {title:"Case Resolution",content:'<div class="narrative"><p>Your patient was admitted for supplemental oxygen and IV fluids. She gradually improved over 48 hours, maintaining SpO2 >92% on room air with adequate feeding. Discharged with return precautions.</p></div><div class="mechanism-box"><div class="mechanism-title">📚 Bronchiolitis Summary</div><div class="pathway">CAUSE: RSV most common (50-80%)\nAGE: <2 years, peak 2-6 months\n\nDIAGNOSIS: Clinical (no routine testing!)\n\nCOURSE:\nURI prodrome → peak day 3-5 → resolves 1-2 wks\n\nTREATMENT: Supportive only\n• Oxygen if SpO2 <90%\n• Hydration\n• Nasal suctioning\n• NO albuterol, steroids, antibiotics\n\nADMIT: Hypoxia, severe distress, poor feeding\n\nPREVENTION: Palivizumab for high-risk</div></div>',question:{prompt:"A 4-month-old with bronchiolitis is given albuterol with no improvement. What should you do?",options:[{text:"Increase albuterol dose",correct:false},{text:"Add ipratropium",correct:false},{text:"Discontinue albuterol - it doesn\'t work in bronchiolitis",correct:true},{text:"Switch to epinephrine nebulizer",correct:false}],explanation:{correct:"Correct! Bronchodilators don\'t work in bronchiolitis. The wheezing is from inflammation and mucus, not bronchospasm. If given a trial with no response, discontinue. Don\'t continue ineffective treatments.",incorrect:"Albuterol doesn\'t work - discontinue if no response. Bronchiolitis wheezing isn\'t from bronchospasm."},teaching:'<h4>Key Takeaways</h4><ul style="line-height:2;margin-left:20px;"><li>RSV causes 50-80% of cases</li><li>Clinical diagnosis - no routine testing</li><li>Supportive care only</li><li>Albuterol, steroids, antibiotics don\'t help</li><li>Admit for hypoxia, severe distress, poor feeding</li><li>Palivizumab for high-risk infants</li></ul>',why_chain:[],points:10}},
        {title:"Clinical Integration",content:'<div class="narrative"><p>You synthesize all the clinical information to ensure optimal patient care.</p></div>',question:{prompt:"What principle is MOST important for excellent clinical outcomes?",options:[{text:"Integrating clinical presentation with evidence-based guidelines while reassessing response to treatment",correct:true},{text:"Following protocols exactly without clinical judgment",correct:false},{text:"Ordering comprehensive testing to avoid any missed diagnoses",correct:false},{text:"Making a diagnosis quickly and committing to it without reconsideration",correct:false}],explanation:{correct:"Excellent clinical care combines systematic assessment, evidence-based treatment, and ongoing reassessment. Guidelines inform but don't replace clinical reasoning.",incorrect:"Good clinical care requires flexibility, reassessment, and integration of guidelines with patient-specific factors."},teaching:'<h4>Clinical Reasoning</h4><ul><li>Systematic data gathering</li><li>Evidence-based management</li><li>Regular reassessment</li><li>Patient-centered communication</li></ul>',why_chain:[],points:10}}
    ];
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:#4ade80;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><p>You mastered Bronchiolitis!</p></div>';}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
