<script>
let currentStage=0,score=0,maxScore=0,difficulty='standard',answeredQuestions=new Set(),decisionPath=[];
const stages=[
{title:"The Recurrent Infections",content:`<div class="narrative"><p>28-year-old man referred for recurrent sinopulmonary infections: 4 episodes of pneumonia in 3 years, chronic sinusitis requiring multiple antibiotic courses, and one hospitalization for sepsis from Streptococcus pneumoniae.</p><p style="margin-top:12px;"><strong>History:</strong> No serious infections as child, started having problems in late teens<br><strong>Family:</strong> Maternal uncle died of "lung problems" in 40s<br><strong>Exam:</strong> No lymphadenopathy, no tonsils visible (tonsillectomy age 12)</p></div><div class="socratic-prompt"><h4>Recognize Warning Signs</h4><p>What features suggest primary immunodeficiency, and what pattern of infections is this?</p></div>`,
hint_beginner:"Recurrent sinopulmonary infections with encapsulated bacteria suggest antibody deficiency",hint_advanced:"What are the 10 warning signs of primary immunodeficiency?",
question:{prompt:"Recurrent pneumonias, chronic sinusitis, sepsis from S. pneumoniae. What type of immune defect?",
options:[{text:"Antibody (B-cell) deficiency - recurrent sinopulmonary infections with encapsulated bacteria (Strep pneumo, H. flu) are classic for humoral immunodeficiency",correct:true},
{text:"T-cell deficiency - would present with opportunistic infections",correct:false},
{text:"Neutrophil defect - would present with skin/soft tissue infections",correct:false},
{text:"Complement deficiency - would present with Neisseria infections",correct:false}],
explanation:{correct:"Pattern recognition: Recurrent sinopulmonary infections with encapsulated bacteria = antibody deficiency. B-cells/antibodies are critical for opsonizing encapsulated organisms. T-cell defects → opportunistic infections (PCP, fungi). Neutrophil defects → skin abscesses, catalase+ organisms. Complement → Neisseria.",incorrect:"The pattern of infections points to the immune defect. Encapsulated bacteria (pneumococcus, H. flu) require antibody for opsonization. Recurrent sinopulmonary infections = think antibody deficiency first."},
teaching:`<h4>Infection Patterns by Immune Defect</h4><p><strong>Antibody (B-cell):</strong> Sinopulmonary, encapsulated bacteria</p><p><strong>T-cell:</strong> Opportunistic (PCP, CMV, fungi, mycobacteria)</p><p><strong>Neutrophil:</strong> Skin abscesses, catalase+ organisms (S. aureus, Aspergillus)</p><p><strong>Complement:</strong> Neisseria (meningococcus, gonococcus)</p>`,
why_chain:[{q:"Why encapsulated bacteria specifically?",a:"Encapsulated organisms (pneumococcus, H. flu, Klebsiella) have polysaccharide capsules that prevent phagocytosis. Antibodies coat the capsule (opsonization), allowing phagocytes to recognize and engulf them. Without antibodies, these organisms evade killing."}],points:15}},

{title:"Warning Signs",content:`<div class="narrative"><p>Review the warning signs that should prompt immunodeficiency evaluation.</p></div><div class="socratic-prompt"><h4>When to Suspect PID</h4><p>What are the clinical warning signs of primary immunodeficiency?</p></div>`,
hint_beginner:"SPUR: Severe, Persistent, Unusual, Recurrent infections",hint_advanced:"What family history features suggest PID?",
question:{prompt:"What clinical features suggest primary immunodeficiency?",
options:[{text:"≥4 ear infections/year, ≥2 serious sinus infections/year, ≥2 pneumonias/year, recurrent deep abscesses, persistent thrush after age 1, need for IV antibiotics, infections with unusual organisms, family history of PID",correct:true},
{text:"One episode of pneumonia",correct:false},
{text:"Seasonal allergies",correct:false},
{text:"Single ear infection",correct:false}],
explanation:{correct:"Warning signs (Jeffrey Modell Foundation): ≥4 ear infections/year, ≥2 serious sinus infections/year, ≥2 months on antibiotics with little effect, ≥2 pneumonias/year, failure to thrive, recurrent deep abscesses, persistent thrush, need for IV antibiotics, ≥2 deep-seated infections, family history.",incorrect:"Single infections are common. It's the PATTERN of recurrent, severe, or unusual infections that suggests immunodeficiency. Family history is important - many PIDs are inherited."},
teaching:`<h4>Warning Signs of PID</h4><p><strong>SPUR:</strong> Severe, Persistent, Unusual, Recurrent</p><p><strong>Frequency:</strong> ≥4 ear infections, ≥2 pneumonias, ≥2 sinus infections/year</p><p><strong>Severity:</strong> Need for IV antibiotics, hospitalizations</p><p><strong>Organisms:</strong> Unusual or opportunistic</p><p><strong>Family:</strong> Early deaths, consanguinity, similar infections</p>`,
why_chain:[{q:"Why did symptoms start in late teens?",a:"Common Variable Immunodeficiency (CVID) typically presents in 2nd-3rd decade, unlike X-linked agammaglobulinemia which presents in infancy after maternal antibodies wane. The late onset suggests CVID."}],points:10}},

{title:"Initial Workup",content:`<div class="narrative"><p>Begin the immunodeficiency workup.</p></div><div class="socratic-prompt"><h4>Laboratory Evaluation</h4><p>What is the initial laboratory workup for suspected antibody deficiency?</p></div>`,
hint_beginner:"Quantitative immunoglobulins are the first step",hint_advanced:"What additional tests confirm antibody deficiency?",
question:{prompt:"What labs should you order first for suspected antibody deficiency?",
options:[{text:"Quantitative immunoglobulins (IgG, IgA, IgM) - if low, check specific antibody responses to vaccines (tetanus, pneumococcal); also CBC with differential, consider lymphocyte subsets",correct:true},
{text:"Only check IgE levels",correct:false},
{text:"Bone marrow biopsy first",correct:false},
{text:"Genetic testing immediately",correct:false}],
explanation:{correct:"Start with quantitative immunoglobulins: IgG, IgA, IgM. If low, assess FUNCTION with specific antibody titers (response to protein antigens like tetanus, and polysaccharide antigens like pneumococcal serotypes). CBC to check lymphocyte count. Flow cytometry for B and T cell subsets if needed.",incorrect:"Quantitative immunoglobulins are the screening test. Low levels need functional confirmation with vaccine response titers. Genetic testing and bone marrow come later if diagnosis unclear."},
teaching:`<h4>Antibody Deficiency Workup</h4><p><strong>First:</strong> Quantitative IgG, IgA, IgM</p><p><strong>Second:</strong> Specific antibody titers (tetanus, diphtheria, pneumococcal)</p><p><strong>Third:</strong> Lymphocyte subsets (CD19+ B cells, CD3+ T cells)</p><p><strong>Consider:</strong> IgG subclasses if total IgG normal but high suspicion</p>`,
why_chain:[{q:"Why check both protein and polysaccharide responses?",a:"Some patients respond to protein antigens (T-dependent, like tetanus) but not polysaccharide antigens (T-independent, like pneumococcal). This pattern suggests specific polysaccharide antibody deficiency, a distinct entity from CVID."}],points:10}},

{title:"Laboratory Results",content:`<div class="narrative"><p>Labs return: IgG 180 mg/dL (normal 700-1600), IgA <7 mg/dL (normal 70-400), IgM 25 mg/dL (normal 40-230). Tetanus antibody: undetectable. Pneumococcal titers: 0/23 serotypes protective after vaccination.</p></div><div class="socratic-prompt"><h4>Interpret the Results</h4><p>What do these results indicate?</p></div>`,
hint_beginner:"Very low immunoglobulins + poor vaccine responses = primary antibody deficiency",hint_advanced:"How do you distinguish CVID from XLA?",
question:{prompt:"IgG 180, IgA undetectable, IgM low, absent vaccine responses. Diagnosis?",
options:[{text:"Common Variable Immunodeficiency (CVID) - most common symptomatic primary antibody deficiency; characterized by low IgG + low IgA and/or IgM + poor vaccine responses + onset typically after age 4",correct:true},
{text:"IgA deficiency alone",correct:false},
{text:"Normal results",correct:false},
{text:"Transient hypogammaglobulinemia",correct:false}],
explanation:{correct:"CVID criteria: significantly reduced IgG (at least 2 SD below mean) + low IgA and/or IgM + impaired vaccine responses + exclusion of other causes. Onset typically >4 years (usually teens/young adult). Most common symptomatic PID in adults.",incorrect:"This is not isolated IgA deficiency (IgG is also very low). CVID requires low IgG plus low IgA and/or IgM, plus impaired vaccine responses. This patient meets all criteria."},
teaching:`<h4>CVID Diagnostic Criteria</h4><p><strong>Required:</strong> IgG significantly reduced (usually <450-500)</p><p><strong>Required:</strong> Low IgA and/or IgM</p><p><strong>Required:</strong> Poor response to vaccines</p><p><strong>Required:</strong> Onset >4 years (excludes XLA)</p><p><strong>Exclusion:</strong> Rule out secondary causes</p>`,
why_chain:[{q:"How is CVID different from X-linked agammaglobulinemia (XLA)?",a:"XLA (Bruton's): absent B cells (BTK mutation), presents in infancy (<1 year), males only, absent tonsils/lymph nodes. CVID: B cells present but dysfunctional, presents later, both sexes, variable lymphoid tissue."}],points:15}},

{title:"Rule Out Secondary Causes",content:`<div class="narrative"><p>Before diagnosing primary immunodeficiency, must exclude secondary causes.</p></div><div class="socratic-prompt"><h4>Secondary Hypogammaglobulinemia</h4><p>What conditions cause secondary antibody deficiency?</p></div>`,
hint_beginner:"Medications, malignancies, and protein loss are common causes",hint_advanced:"Which medications cause hypogammaglobulinemia?",
question:{prompt:"What secondary causes of hypogammaglobulinemia must be excluded?",
options:[{text:"Medications (rituximab, anticonvulsants, immunosuppressants), malignancy (CLL, myeloma, thymoma), protein loss (nephrotic syndrome, protein-losing enteropathy), HIV",correct:true},
{text:"No secondary causes exist",correct:false},
{text:"Only HIV causes this",correct:false},
{text:"Only medications cause this",correct:false}],
explanation:{correct:"Secondary causes: Medications (rituximab - B cell depletion, anticonvulsants, corticosteroids), malignancy (CLL, multiple myeloma, lymphoma, thymoma), protein loss (nephrotic syndrome, enteropathy), and infections (HIV). Must exclude before diagnosing CVID.",incorrect:"Many secondary causes exist. Rituximab causes prolonged B cell depletion. CLL and myeloma affect antibody production. Protein loss syndromes lose immunoglobulins. Always exclude before diagnosing primary."},
teaching:`<h4>Secondary Hypogammaglobulinemia</h4><p><strong>Medications:</strong> Rituximab, anticonvulsants, steroids, mycophenolate</p><p><strong>Malignancy:</strong> CLL, myeloma, lymphoma, thymoma</p><p><strong>Protein loss:</strong> Nephrotic syndrome, protein-losing enteropathy</p><p><strong>Infection:</strong> HIV (check in all patients)</p>`,
why_chain:[{q:"Why does rituximab cause prolonged hypogammaglobulinemia?",a:"Rituximab depletes CD20+ B cells. B cell recovery takes 6-12 months, but plasma cells (which make most serum IgG) can be affected longer. Some patients develop prolonged or permanent hypogammaglobulinemia."}],points:10}},

{title:"Treatment",content:`<div class="narrative"><p>CVID confirmed after excluding secondary causes. What is the treatment?</p></div><div class="socratic-prompt"><h4>Immunoglobulin Replacement</h4><p>What is the primary treatment for CVID?</p></div>`,
hint_beginner:"Replace what's missing - immunoglobulin replacement therapy",hint_advanced:"IV vs subcutaneous IgG - what are the differences?",
question:{prompt:"What is the primary treatment for CVID?",
options:[{text:"Immunoglobulin replacement therapy (IVIG or SCIG) - provides passive antibodies; goal trough IgG >500-800 mg/dL; reduces infections but doesn't cure underlying defect",correct:true},
{text:"Antibiotics only when infected",correct:false},
{text:"Bone marrow transplant for all CVID",correct:false},
{text:"No treatment available",correct:false}],
explanation:{correct:"Immunoglobulin replacement is mainstay: IVIG (every 3-4 weeks) or SCIG (weekly/biweekly at home). Goal: trough IgG >500-800 mg/dL (some need higher). Reduces infection frequency and severity but doesn't fix underlying defect. Lifelong therapy required.",incorrect:"Immunoglobulin replacement is essential - waiting for infections leads to organ damage (bronchiectasis). BMT is reserved for severe combined immunodeficiency, not CVID typically."},
teaching:`<h4>Immunoglobulin Replacement</h4><p><strong>IVIG:</strong> IV every 3-4 weeks; hospital/infusion center</p><p><strong>SCIG:</strong> Subcutaneous weekly/biweekly; home self-infusion</p><p><strong>Goal:</strong> Trough IgG >500-800 (individualize)</p><p><strong>Monitoring:</strong> Trough levels, infection frequency, lung function</p>`,
why_chain:[{q:"What are advantages of SCIG vs IVIG?",a:"SCIG: more stable IgG levels (less peak-trough variation), fewer systemic side effects, home administration, better quality of life for many. IVIG: less frequent infusions, faster for severe infections, doesn't require self-injection."}],points:10}},

{title:"Complications of CVID",content:`<div class="narrative"><p>CVID has important non-infectious complications to monitor.</p></div><div class="socratic-prompt"><h4>Beyond Infections</h4><p>What non-infectious complications occur in CVID?</p></div>`,

function shuffleArray(a){const s=[...a];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s;}
function setDifficulty(l,b){difficulty=l;document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderStage(currentStage);}
function renderStage(i){
const s=stages[i],opts=shuffleArray(s.question.options.map((o,idx)=>({...o,idx}))),ltrs='ABCD';
let hints='';
if(difficulty==='beginner'&&s.hint_beginner)hints=`<div class="hint-beginner" style="display:block;">Hint: ${s.hint_beginner}</div>`;
else if(difficulty==='advanced'&&s.hint_advanced)hints=`<div class="hint-advanced" style="display:block;">Challenge: ${s.hint_advanced}</div>`;
const why=s.question.why_chain?`<div class="why-chain" id="why"><h4>WHY Chain</h4>${s.question.why_chain.map(w=>`<div class="why-item"><div class="why-q">Q: ${w.q}</div><div class="why-a">${w.a}</div></div>`).join('')}</div>`:'';
document.getElementById('progress').style.width=((i)/stages.length*100)+'%';
document.getElementById('scene-container').innerHTML=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${i+1} of ${stages.length}</div><div class="scene-title">${s.title}</div></div>${s.content}${hints}<div class="question-box"><div class="question-prompt">${s.question.prompt}</div><div class="mcq-options">${opts.map((o,j)=>`<div class="mcq-option" data-correct="${o.correct}" onclick="selectOption(this,${i})"><span class="option-letter">${ltrs[j]}</span><span class="option-text">${o.text}</span></div>`).join('')}</div><div class="feedback correct-feedback" id="fb-c"><div class="feedback-title">Correct!</div><div>${s.question.explanation.correct}</div></div><div class="feedback incorrect-feedback" id="fb-i"><div class="feedback-title">Not Quite</div><div>${s.question.explanation.incorrect}</div></div><div class="teaching-point" id="teach">${s.question.teaching}</div>${why}<button class="btn" id="next-btn" onclick="nextStage()">Continue</button></div></div>`;
}
function selectOption(el,i){
if(answeredQuestions.has(i))return;
const c=el.dataset.correct==='true',s=stages[i];
answeredQuestions.add(i);decisionPath.push({stage:s.title,correct:c,points:c?s.question.points:0});
if(c)score+=s.question.points;maxScore+=s.question.points;
document.getElementById('score').textContent=score;document.getElementById('maxScore').textContent=maxScore;
document.querySelectorAll('.mcq-option').forEach(o=>{o.classList.add('disabled');if(o.dataset.correct==='true')o.classList.add('correct');else if(o===el&&!c)o.classList.add('incorrect');});
document.getElementById(c?'fb-c':'fb-i').classList.add('show');
document.getElementById('teach').classList.add('show');
const w=document.getElementById('why');if(w)w.classList.add('show');
document.getElementById('next-btn').classList.add('show');
}
function nextStage(){if(++currentStage<stages.length){renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'});}else showCompletion();}
function showCompletion(){
const p=Math.round(score/maxScore*100);
let g,m,clr;
if(p>=90){g='Outstanding!';clr='#22c55e';m='Excellent immunodeficiency knowledge!';}
else if(p>=80){g='Great Work!';clr='#3b82f6';m='Strong grasp. Review CVID complications.';}
else if(p>=70){g='Good Progress';clr='#f59e0b';m='Focus on infection patterns by defect type.';}
else{g='Keep Learning';clr='#ef4444';m='Review warning signs and workup approach.';}
document.getElementById('scene-container').innerHTML=`<div class="scene completion"><div class="completion-grade" style="color:${clr}">${g}</div><div class="completion-percent" style="color:${clr}">${p}%</div><div style="font-size:1.3rem;margin-bottom:8px">${score}/${maxScore} points</div><div style="margin:16px 0;color:#e2e8f0">${m}</div><div class="completion-breakdown"><h4 style="margin-bottom:16px">Your Journey</h4>${decisionPath.map((d,j)=>`<div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;"><span style="color:${d.correct?'#4ade80':'#f87171'}">${d.correct?'Y':'N'} ${d.stage}</span><span style="color:#94a3b8">${d.points}/${stages[j].question.points}</span></div>`).join('')}</div></div>`;
document.getElementById('progress').style.width='100%';
}
document.addEventListener('DOMContentLoaded',()=>renderStage(0));


// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
