<script>
let currentStage=0,score=0,maxScore=0,difficulty='standard',answeredQuestions=new Set(),decisionPath=[];
const stages=[
{title:"The Febrile Cough",content:`<div class="narrative"><p>58-year-old man with 4 days of productive cough, fever, pleuritic chest pain.</p><p style="margin-top:12px;"><strong>Vitals:</strong> T 102.8F, HR 108, RR 22, BP 128/78, SpO2 93% RA<br><strong>Exam:</strong> Crackles RLL, bronchial breath sounds, dullness to percussion<br><strong>PMH:</strong> DM2, HTN, former smoker</p></div><div class="socratic-prompt"><h4>Establish Diagnosis</h4><p>What confirms pneumonia diagnosis?</p></div>`,
hint_beginner:"Fever + cough + infiltrate = classic triad",hint_advanced:"When is CXR falsely negative?",
question:{prompt:"What confirms pneumonia diagnosis?",
options:[{text:"Clinical syndrome (fever, cough, dyspnea) PLUS radiographic infiltrate; focal exam findings increase probability",correct:true},
{text:"Positive sputum culture required",correct:false},
{text:"CT chest required for all",correct:false},
{text:"Procalcitonin determines diagnosis",correct:false}],
explanation:{correct:"Pneumonia = clinical syndrome + radiographic evidence. Focal findings (bronchial breath sounds, dullness) have high specificity. CXR confirms diagnosis.",incorrect:"Pneumonia is clinical-radiographic diagnosis. Sputum cultures often negative. CXR is standard imaging."},
teaching:`<h4>Pneumonia Diagnosis</h4><p><strong>Clinical:</strong> Fever, cough, dyspnea, pleuritic pain</p><p><strong>Exam:</strong> Crackles, bronchial breath sounds, dullness</p><p><strong>Imaging:</strong> CXR infiltrate confirms</p>`,
why_chain:[{q:"When is CXR falsely negative?",a:"Early infection (first 24h), severe dehydration, neutropenia, PCP. If high suspicion with negative CXR, treat empirically or CT."}],points:10}},

{title:"Severity Assessment",content:`<div class="narrative"><p>CXR: RLL consolidation. Determine disposition.</p></div><div class="socratic-prompt"><h4>Site of Care</h4><p>What scoring guides admission decision?</p></div>`,
hint_beginner:"CURB-65 validated for CAP severity",hint_advanced:"What factors do scores miss?",
question:{prompt:"CURB-65: Confusion(-), BUN 24(+), RR 22(-), BP normal(-), Age 58(-). Score and disposition?",
options:[{text:"CURB-65 = 1; consider outpatient vs observation; also consider hypoxia (SpO2 93%), DM not in score",correct:true},
{text:"Must admit all pneumonia",correct:false},
{text:"Score 0, send home",correct:false},
{text:"Always admit diabetics",correct:false}],
explanation:{correct:"CURB-65 = 1 (BUN only). Score 0-1 = low risk. BUT SpO2 93% and DM favor observation. Scores guide, clinical judgment decides.",incorrect:"CURB-65: 0-1 outpatient, 2 consider admit, 3+ ICU. But scores miss hypoxia, comorbidities."},
teaching:`<h4>CURB-65</h4><p><strong>C:</strong> Confusion | <strong>U:</strong> BUN >19 | <strong>R:</strong> RR >=30 | <strong>B:</strong> BP <90 | <strong>65:</strong> Age >=65</p><p>0-1: Outpatient | 2: Consider admit | 3+: ICU</p>`,
why_chain:[{q:"What does CURB-65 miss?",a:"Hypoxia (not in score!), comorbidities, multilobar disease, social factors."}],points:15}},

{title:"Pathogen Considerations",content:`<div class="narrative"><p>Admitted for observation. What organisms to cover?</p></div><div class="socratic-prompt"><h4>Know Your Bugs</h4><p>Most common CAP pathogens?</p></div>`,
hint_beginner:"S. pneumoniae #1 in all CAP",hint_advanced:"When suspect Pseudomonas?",
question:{prompt:"Most common bacterial cause of CAP?",
options:[{text:"S. pneumoniae #1; also cover atypicals (Mycoplasma, Chlamydophila, Legionella)",correct:true},
{text:"Staph aureus most common",correct:false},
{text:"H. influenzae in all ages",correct:false},
{text:"Atypicals rare, skip coverage",correct:false}],
explanation:{correct:"Pneumococcus is #1 at all severity levels. Atypicals account for 10-30%. MRSA/Pseudomonas only with risk factors.",incorrect:"Pneumococcus dominates. Atypicals common enough for empiric coverage."},
teaching:`<h4>CAP Microbiology</h4><p><strong>S. pneumoniae:</strong> #1 (40-50%)</p><p><strong>Atypicals:</strong> Mycoplasma, Chlamydophila, Legionella</p><p><strong>MRSA/Pseudomonas:</strong> Only with risk factors</p>`,
why_chain:[{q:"When cover MRSA?",a:"Prior MRSA, recent hospitalization, severe necrotizing, post-influenza."},{q:"When cover Pseudomonas?",a:"Structural lung disease, recent IV antibiotics, severe COPD."}],points:10}},

{title:"Antibiotic Selection",content:`<div class="narrative"><p>Select empiric antibiotics for non-severe inpatient CAP.</p></div><div class="socratic-prompt"><h4>Empiric Coverage</h4><p>Recommended regimen?</p></div>`,
hint_beginner:"Beta-lactam + macrolide OR fluoroquinolone",hint_advanced:"Why add atypical coverage?",
question:{prompt:"What empiric regimen for non-severe inpatient CAP?",
options:[{text:"Beta-lactam (ceftriaxone) PLUS macrolide (azithromycin) OR respiratory fluoroquinolone monotherapy",correct:true},
{text:"Ceftriaxone alone sufficient",correct:false},
{text:"Vancomycin for all inpatients",correct:false},
{text:"Oral amoxicillin only",correct:false}],
explanation:{correct:"Non-severe inpatient: beta-lactam + macrolide (covers pneumococcus + atypicals) OR respiratory FQ alone (levofloxacin/moxifloxacin covers both).",incorrect:"Must cover both typical (pneumococcus) and atypical organisms. Ceftriaxone alone misses atypicals."},
teaching:`<h4>Inpatient CAP Antibiotics</h4><p><strong>Option 1:</strong> Ceftriaxone 1g IV + Azithromycin 500mg</p><p><strong>Option 2:</strong> Levofloxacin 750mg or Moxifloxacin 400mg</p><p><strong>Severe:</strong> Add vanc + pip-tazo if MRSA/Pseudomonas risk</p>`,
why_chain:[{q:"Why macrolide with beta-lactam?",a:"Beta-lactam covers pneumococcus, H. flu. Macrolide adds atypical coverage plus possible immunomodulatory benefit."}],points:15}},

{title:"Duration of Therapy",content:`<div class="narrative"><p>Patient improving. How long to treat?</p></div><div class="socratic-prompt"><h4>When to Stop</h4><p>Standard duration for uncomplicated CAP?</p></div>`,
hint_beginner:"Shorter courses now preferred",hint_advanced:"What about procalcitonin-guided duration?",
question:{prompt:"Duration of antibiotics for uncomplicated CAP?",
options:[{text:"Minimum 5 days; can stop when afebrile 48h and clinically stable; longer courses not better",correct:true},
{text:"Always 10-14 days",correct:false},
{text:"Until CXR clears",correct:false},
{text:"7 days minimum for all",correct:false}],
explanation:{correct:"5 days minimum if: afebrile 48+ hours, hemodynamically stable, tolerating PO, no complications. Studies show 5 days = 7-10 days for uncomplicated CAP.",incorrect:"Shorter courses (5 days) are now standard for uncomplicated CAP. CXR lags clinical improvement by weeks."},
teaching:`<h4>CAP Duration</h4><p><strong>Minimum:</strong> 5 days</p><p><strong>Stop when:</strong> Afebrile 48h, stable, tolerating PO</p><p><strong>Longer if:</strong> Complications, slow response, specific pathogens (Legionella, Pseudomonas)</p>`,
why_chain:[{q:"Why not treat until CXR clears?",a:"Radiographic resolution lags clinical improvement by weeks to months, especially in elderly. Treating to CXR clearance leads to unnecessary antibiotic exposure."}],points:10}},

{title:"Severe CAP",content:`<div class="narrative"><p>Different patient: ICU admission with septic shock from pneumonia.</p></div><div class="socratic-prompt"><h4>Escalate Coverage</h4><p>What additional coverage for severe CAP?</p></div>`,
hint_beginner:"Severe CAP needs broader coverage",hint_advanced:"What defines severe CAP?",
question:{prompt:"What antibiotic changes for severe CAP requiring ICU?",
options:[{text:"Beta-lactam + macrolide BOTH required (not FQ monotherapy); add MRSA coverage (vanc) and Pseudomonas coverage (pip-tazo) if risk factors",correct:true},
{text:"Same as floor - FQ monotherapy OK",correct:false},
{text:"Add antifungals empirically",correct:false},
{text:"Broader coverage not needed",correct:false}],
explanation:{correct:"Severe CAP: beta-lactam + macrolide required (FQ monotherapy not adequate). Add vancomycin if MRSA risk, broader gram-negative (pip-tazo, cefepime) if Pseudomonas risk.",incorrect:"Severe CAP needs dual therapy (beta-lactam + macrolide), not FQ monotherapy. Consider MRSA/Pseudomonas coverage based on risk factors."},
teaching:`<h4>Severe CAP Antibiotics</h4><p><strong>Required:</strong> Beta-lactam + macrolide (both)</p><p><strong>Add if MRSA risk:</strong> Vancomycin or linezolid</p><p><strong>Add if Pseudomonas risk:</strong> Pip-tazo or cefepime</p>`,
why_chain:[{q:"Why no FQ monotherapy in severe CAP?",a:"Higher mortality with FQ monotherapy in severe CAP. Dual therapy with beta-lactam + macrolide has mortality benefit, possibly from macrolide immunomodulation."}],points:15}},

{title:"Case Synthesis",content:`<div class="narrative"><p>Original patient discharged after 3 days, completing 5-day course with levofloxacin.</p></div><div class="socratic-prompt"><h4>Key Principles</h4><p>Summarize CAP management approach.</p></div>`,
hint_beginner:"Diagnose, severity assess, cover bugs, short duration",hint_advanced:"What follow-up is needed?",
question:{prompt:"What are the key CAP management principles?",
options:[{text:"Clinical + radiographic diagnosis; CURB-65 for disposition; cover pneumococcus + atypicals; 5 days if uncomplicated; escalate for severe/risk factors",correct:true},
{text:"Treat all CAP the same regardless of severity",correct:false},
{text:"Always use broadest spectrum antibiotics",correct:false},
{text:"10-14 days for all patients",correct:false}],
explanation:{correct:"CAP approach: 1) Diagnose clinically + CXR, 2) Severity score + clinical judgment for disposition, 3) Cover typical + atypical, 4) 5 days if uncomplicated, 5) Escalate for severe/MRSA/Pseudomonas risk.",incorrect:"CAP management is tailored to severity and risk factors. Shorter courses preferred. Broad spectrum only when indicated."},
teaching:`<h4>CAP Management Summary</h4><p>1. Diagnose: Clinical + CXR</p><p>2. Severity: CURB-65 + clinical judgment</p><p>3. Antibiotics: Cover typical + atypical</p><p>4. Duration: 5 days if uncomplicated</p><p>5. Escalate: Severe, MRSA/Pseudomonas risks</p>`,
why_chain:[{q:"What follow-up needed?",a:"Repeat CXR in 6-8 weeks for smokers and age >50 to rule out underlying malignancy. Earlier if not improving."}],points:10}},
        {title:"Clinical Integration",content:'<div class="narrative"><p>You synthesize all the clinical information to ensure optimal patient care.</p></div>',question:{prompt:"What principle is MOST important for excellent clinical outcomes?",options:[{text:"Integrating clinical presentation with evidence-based guidelines while reassessing response to treatment",correct:true},{text:"Following protocols exactly without clinical judgment",correct:false},{text:"Ordering comprehensive testing to avoid any missed diagnoses",correct:false},{text:"Making a diagnosis quickly and committing to it without reconsideration",correct:false}],explanation:{correct:"Excellent clinical care combines systematic assessment, evidence-based treatment, and ongoing reassessment. Guidelines inform but don't replace clinical reasoning.",incorrect:"Good clinical care requires flexibility, reassessment, and integration of guidelines with patient-specific factors."},teaching:'<h4>Clinical Reasoning</h4><ul><li>Systematic data gathering</li><li>Evidence-based management</li><li>Regular reassessment</li><li>Patient-centered communication</li></ul>',why_chain:[],points:10}}
];
function shuffleArray(a){const s=[...a];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s;}
function setDifficulty(l,b){difficulty=l;document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderStage(currentStage);}
function renderStage(i){
const s=stages[i],opts=shuffleArray(s.question.options.map((o,idx)=>({...o,idx}))),ltrs='ABCD';
let hints='';
if(difficulty==='beginner'&&s.hint_beginner)hints=`<div class="hint-beginner" style="display:block;">Hint: ${s.hint_beginner}</div>`;
else if(difficulty==='advanced'&&s.hint_advanced)hints=`<div class="hint-advanced" style="display:block;">Challenge: ${s.hint_advanced}</div>`;
const why=s.question.why_chain?`<div class="why-chain" id="why"><h4>WHY Chain</h4>${s.question.why_chain.map(w=>`<div class="why-item"><div class="why-q">Q: ${w.q}</div><div class="why-a">${w.a}</div></div>`).join('')}</div>`:'';
document.getElementById('progress').style.width=((i)/stages.length*100)+'%';
document.getElementById('scene-container').innerHTML=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${i+1} of ${stages.length}</div><div class="scene-title">${s.title}</div></div>${s.content}${hints}<div class="question-box"><div class="question-prompt">${s.question.prompt}</div><div class="mcq-options">${opts.map((o,j)=>`<div class="mcq-option" data-correct="${o.correct}" onclick="selectOption(this,${i})"><span class="option-letter">${ltrs[j]}</span><span class="option-text">${o.text}</span></div>`).join('')}</div><div class="feedback correct-feedback" id="fb-c"><div class="feedback-title">Correct!</div><div>${s.question.explanation.correct}</div></div><div class="feedback incorrect-feedback" id="fb-i"><div class="feedback-title">Not Quite</div><div>${s.question.explanation.incorrect}</div></div><div class="teaching-point" id="teach">${s.question.teaching}</div>${why}<button class="btn" id="next-btn" onclick="nextStage()">Continue</button></div></div>`;
}
function selectOption(el,i){
if(answeredQuestions.has(i))return;
const c=el.dataset.correct==='true',s=stages[i];
answeredQuestions.add(i);decisionPath.push({stage:s.title,correct:c,points:c?s.question.points:0});
if(c)score+=s.question.points;maxScore+=s.question.points;
document.getElementById('score').textContent=score;document.getElementById('maxScore').textContent=maxScore;
document.querySelectorAll('.mcq-option').forEach(o=>{o.classList.add('disabled');if(o.dataset.correct==='true')o.classList.add('correct');else if(o===el&&!c)o.classList.add('incorrect');});
document.getElementById(c?'fb-c':'fb-i').classList.add('show');
document.getElementById('teach').classList.add('show');
const w=document.getElementById('why');if(w)w.classList.add('show');
document.getElementById('next-btn').classList.add('show');
}
function nextStage(){if(++currentStage<stages.length){renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'});}else showCompletion();}
function showCompletion(){
const p=Math.round(score/maxScore*100);
let g,m,clr;
if(p>=90){g='Outstanding!';clr='#22c55e';m='Excellent pneumonia management!';}
else if(p>=80){g='Great Work!';clr='#3b82f6';m='Strong grasp of CAP principles.';}
else if(p>=70){g='Good Progress';clr='#f59e0b';m='Review severity scoring and antibiotic selection.';}
else{g='Keep Learning';clr='#ef4444';m='Focus on empiric coverage and duration.';}
document.getElementById('scene-container').innerHTML=`<div class="scene completion"><div class="completion-grade" style="color:${clr}">${g}</div><div class="completion-percent" style="color:${clr}">${p}%</div><div style="font-size:1.3rem;margin-bottom:8px">${score}/${maxScore} points</div><div style="margin:16px 0;color:#e2e8f0">${m}</div><div class="completion-breakdown"><h4 style="margin-bottom:16px">Your Journey</h4>${decisionPath.map((d,j)=>`<div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;"><span style="color:${d.correct?'#4ade80':'#f87171'}">${d.correct?'Y':'N'} ${d.stage}</span><span style="color:#94a3b8">${d.points}/${stages[j].question.points}</span></div>`).join('')}</div></div>`;
document.getElementById('progress').style.width='100%';
}
document.addEventListener('DOMContentLoaded',()=>renderStage(0));


// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
