<script>
let currentStage = 0, score = 0, maxScore = 0, difficulty = 'standard', answeredQuestions = new Set(), decisionPath = [];

const stages = [
    {
        title: "The Septic Patient",
        content: `<div class="narrative"><p>A <span class="highlight">68-year-old woman</span> with diabetes is brought from a nursing home with <span class="critical">fever, confusion, and hypotension</span>. Vitals: T 39.2°C, HR 118, BP 82/48, RR 26, SpO2 92% on RA.</p><p>She's confused, with CVA tenderness and a foley catheter in place. Labs show <span class="critical">WBC 18,000, Cr 2.8 (baseline 1.0), lactate 4.8</span>.</p></div>
        <div class="socratic-prompt"><h4>Recognition Challenge</h4><p>This patient has infection (likely UTI) plus organ dysfunction. The old SIRS criteria are OUT. What is the current definition of sepsis according to Sepsis-3?</p></div>`,
        hint_beginner: "Sepsis-3 (2016) replaced SIRS criteria with organ dysfunction measured by SOFA score.",
        hint_advanced: "How do the definitions of sepsis vs septic shock differ in terms of prognostic implications?",
        question: {
            prompt: "According to Sepsis-3 criteria, what DEFINES sepsis?",
            options: [
                { text: "Life-threatening organ dysfunction caused by dysregulated host response to infection", correct: true },
                { text: "Meeting 2 or more SIRS criteria with suspected infection", correct: false },
                { text: "Positive blood cultures with fever", correct: false },
                { text: "Hypotension requiring vasopressors", correct: false }
            ],
            explanation: {
                correct: "Correct! Sepsis-3 (2016) defines sepsis as life-threatening organ dysfunction from dysregulated host response to infection. Organ dysfunction is measured by SOFA score ≥2. SIRS criteria are no longer used - they were too sensitive and non-specific.",
                incorrect: "Sepsis-3 moved away from SIRS criteria. The new definition is: life-threatening organ dysfunction (SOFA ≥2) caused by dysregulated host response to infection. This better predicts mortality than SIRS."
            },
            teaching: `<h4>Sepsis-3 Definitions</h4><table class="comparison-table"><tr><th>Term</th><th>Definition</th><th>Mortality</th></tr><tr><td><strong>Sepsis</strong></td><td>Infection + SOFA ≥2</td><td>~10%</td></tr><tr><td><strong>Septic Shock</strong></td><td>Sepsis + vasopressors for MAP ≥65 + lactate >2 despite fluids</td><td>>40%</td></tr></table><p style="margin-top:12px;">This patient: Infection (UTI) + SOFA ≥2 (AKI, altered mental status, hypotension) = <strong>Sepsis</strong></p>`,
            why_chain: [{q: "Why did we abandon SIRS?", a: "SIRS criteria (temp, HR, RR, WBC) were present in >90% of ICU admissions, including non-infectious conditions. Too sensitive, not specific enough. SOFA-based definition better predicts mortality."}, {q: "What makes this septic SHOCK specifically?", a: "Needs vasopressors to maintain MAP ≥65 AND lactate >2 mmol/L despite adequate fluid resuscitation. Both criteria must be met."}],
            points: 10
        }
    },
    {
        title: "The First Hour",
        content: `<div class="narrative"><p>You recognize this as <span class="critical">septic shock</span>. Time is critical - <strong>each hour of delay in antibiotics increases mortality ~7.6%</strong>.</p><p>The Hour-1 Bundle must be initiated immediately.</p></div>
        <div class="socratic-prompt"><h4>Bundle Elements</h4><p>What are the 5 components of the Hour-1 Bundle that must ALL be initiated within 1 hour of sepsis recognition?</p></div>`,
        hint_beginner: "Think: Lactate, Cultures, Antibiotics, Fluids, Vasopressors (if needed)",
        hint_advanced: "What's the evidence behind the 1-hour timing? What if cultures delay antibiotics?",
        question: {
            prompt: "Which action should NEVER delay antibiotic administration in septic shock?",
            options: [
                { text: "Waiting for blood culture results", correct: false },
                { text: "Obtaining blood cultures - draw quickly, don't wait for results", correct: true },
                { text: "Completing a CT scan to identify source", correct: false },
                { text: "Waiting for lactate results", correct: false }
            ],
            explanation: {
                correct: "Correct! Draw cultures BEFORE antibiotics - but don't wait for results. The key is to not let the culture-taking process delay antibiotic administration. Each hour delay = ~7.6% increased mortality (Kumar et al., 2006).",
                incorrect: "Blood cultures should be obtained before antibiotics, but the actual drawing takes only minutes. Never wait for culture RESULTS or imaging before starting antibiotics in septic shock."
            },
            teaching: `<h4>Hour-1 Bundle (2021 SSC Guidelines)</h4><ol style="line-height:2;margin-left:20px;"><li><strong>Measure lactate</strong> (remeasure if >2)</li><li><strong>Obtain blood cultures</strong> before antibiotics</li><li><strong>Administer broad-spectrum antibiotics</strong></li><li><strong>30 mL/kg crystalloid</strong> for hypotension or lactate ≥4</li><li><strong>Vasopressors</strong> if hypotensive during/after fluid resuscitation</li></ol>`,
            why_chain: [{q: "Why 1 hour specifically?", a: "Kumar et al. showed each hour delay in antibiotics increases mortality ~7.6%. Seymour et al. confirmed faster bundle completion = lower risk-adjusted mortality. The 'golden hour' concept applies to sepsis."}, {q: "Can cultures realistically be obtained before antibiotics?", a: "Yes - drawing blood cultures takes ~5 minutes. Don't wait for results, but do attempt to draw before antibiotics when possible without significant delay."}],
            points: 10
        }
    },
    {
        title: "Fluid Resuscitation",
        content: `<div class="narrative"><p>The nurse asks how much fluid to give. The patient weighs 70 kg.</p><p>Current guideline: <span class="highlight">30 mL/kg crystalloid</span> for hypotension or lactate ≥4.</p></div>
        <div class="socratic-prompt"><h4>Fluid Choice</h4><p>What crystalloid should you choose for initial resuscitation, and why does it matter?</p></div>`,
        hint_beginner: "Balanced crystalloids (LR, Plasmalyte) vs Normal Saline - which causes less kidney injury?",
        hint_advanced: "What does the SMART trial tell us about crystalloid choice in sepsis?",
        question: {
            prompt: "Which fluid is PREFERRED for initial sepsis resuscitation based on SMART trial data?",
            options: [
                { text: "Normal saline - most studied and safest", correct: false },
                { text: "Balanced crystalloids (LR/Plasmalyte) - less AKI and death", correct: true },
                { text: "Albumin - better volume expansion", correct: false },
                { text: "D5W - provides calories during illness", correct: false }
            ],
            explanation: {
                correct: "Correct! SMART trial showed balanced crystalloids (LR, Plasmalyte) reduced major adverse kidney events and mortality compared to NS, especially in sepsis. NS has supraphysiologic chloride (154 mEq/L vs plasma ~100) leading to hyperchloremic acidosis.",
                incorrect: "Balanced crystalloids (LR, Plasmalyte) are preferred. Normal saline causes hyperchloremic metabolic acidosis and renal vasoconstriction with large volumes. SMART trial showed better outcomes with balanced fluids."
            },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">🧬 Why Balanced Crystalloids?</div><div class="pathway">Normal saline: 154 mEq/L chloride (plasma ~100)
→ Large volumes → hyperchloremic acidosis
→ Renal vasoconstriction → ↓ GFR

SMART trial (2018): Balanced crystalloids
→ ↓ Major adverse kidney events
→ ↓ Mortality in sepsis subgroup
→ NNT ~100 for mortality benefit</div></div>`,
            why_chain: [{q: "How much fluid should this patient get initially?", a: "30 mL/kg × 70 kg = 2.1 liters. This is the INITIAL bolus. After that, assess fluid responsiveness before giving more - avoid fluid overload!"}, {q: "How do you assess fluid responsiveness?", a: "Passive leg raise test, pulse pressure variation (if ventilated), bedside echo (IVC variability). Static measures like CVP are poor predictors."}],
            points: 10
        }
    },
    {
        title: "Vasopressor Selection",
        content: `<div class="narrative"><p>After 2L crystalloid, BP remains 78/44 (MAP 55). The patient needs <span class="critical">vasopressors</span> to maintain perfusion.</p><p>You must choose the right agent and target.</p></div>
        <div class="socratic-prompt"><h4>First-Line Agent</h4><p>What is the FIRST-LINE vasopressor in septic shock and why?</p></div>`,
        hint_beginner: "Norepinephrine is first-line. Think about the primary problem in septic shock - vasodilation.",
        hint_advanced: "When do you add vasopressin? What's the mechanism and dose?",
        question: {
            prompt: "What is the FIRST-LINE vasopressor for septic shock?",
            options: [
                { text: "Norepinephrine - strong α1 agonist to restore SVR", correct: true },
                { text: "Dopamine - provides renal protection", correct: false },
                { text: "Epinephrine - strongest overall effect", correct: false },
                { text: "Phenylephrine - pure α1 without cardiac effects", correct: false }
            ],
            explanation: {
                correct: "Correct! Norepinephrine is first-line because septic shock is primarily DISTRIBUTIVE (↓↓ SVR). NE's strong α1 effect restores vascular tone, with some β1 maintaining cardiac output. It has fewer arrhythmias than dopamine.",
                incorrect: "Norepinephrine is first-line. Dopamine causes more arrhythmias (De Backer trial). Epinephrine is added for cardiac dysfunction. Phenylephrine lacks inotropy and may reduce cardiac output."
            },
            teaching: `<h4>Vasopressor Hierarchy</h4><table class="comparison-table"><tr><th>Line</th><th>Drug</th><th>Mechanism</th><th>Notes</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>1st</strong></td><td>Norepinephrine</td><td>α1 >> β1</td><td>↑ SVR, some inotropy</td></tr><tr><td><strong>2nd</strong></td><td>Vasopressin</td><td>V1 receptor</td><td>Add at NE 0.25-0.5 mcg/kg/min</td></tr><tr><td><strong>3rd</strong></td><td>Epinephrine</td><td>α1, β1, β2</td><td>Add for cardiac dysfunction</td></tr></table>`,
            why_chain: [{q: "Why not dopamine first?", a: "De Backer (NEJM 2010): Dopamine had higher arrhythmia rates. 'Renal-dose dopamine' is a myth - no proven renal protection. Norepinephrine is safer."}, {q: "When do you add vasopressin?", a: "When NE reaches 0.25-0.5 mcg/kg/min. Vasopressin acts on V1 receptors (different pathway). Fixed dose 0.03-0.04 units/min - NOT titrated. Allows lower NE dose."}],
            points: 10
        }
    },

function setDifficulty(level, btn) {
    difficulty = level;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateHints();
}

function updateHints() {
    document.querySelectorAll('.hint-beginner').forEach(h => h.style.display = difficulty === 'beginner' ? 'block' : 'none');
    document.querySelectorAll('.hint-advanced').forEach(h => h.style.display = difficulty === 'advanced' ? 'block' : 'none');
}

function renderStage() {
    const stage = stages[currentStage];
    const progress = ((currentStage + 1) / stages.length) * 100;
    document.getElementById('progress').style.width = progress + '%';
    
    let html = `<div class="scene"><div class="scene-header">
        <div class="scene-phase">Stage ${currentStage + 1} of ${stages.length}</div>
        <div class="scene-title">${stage.title}</div></div>`;
    
    if (stage.hint_beginner) {
        html += `<div class="hint-beginner" style="display:${difficulty === 'beginner' ? 'block' : 'none'}">🌱 <strong>Beginner Hint:</strong> ${stage.hint_beginner}</div>`;
    }
    if (stage.hint_advanced) {
        html += `<div class="hint-advanced" style="display:${difficulty === 'advanced' ? 'block' : 'none'}">🎯 <strong>Advanced Challenge:</strong> ${stage.hint_advanced}</div>`;
    }
    
    html += stage.content;
    
    if (stage.question) {
        const qId = `q${currentStage}`;
        const answered = answeredQuestions.has(qId);
        html += `<div class="question-box"><div class="question-prompt">${stage.question.prompt}</div><div class="mcq-options">`;
        stage.question.options.forEach((opt, i) => {
            const letter = String.fromCharCode(65 + i);
            let classes = 'mcq-option';
            if (answered) {
                classes += ' disabled';
                if (opt.correct) classes += ' correct';
                else if (decisionPath[currentStage] === i && !opt.correct) classes += ' incorrect';
            }
            html += `<div class="${classes}" onclick="selectOption(${i}, ${opt.correct})">
                <div class="option-letter">${letter}</div><div>${opt.text}</div></div>`;
        });
        html += '</div>';
        
        html += `<div class="feedback ${answered ? 'show' : ''} ${answered ? (stage.question.options[decisionPath[currentStage]]?.correct ? 'correct-feedback' : 'incorrect-feedback') : ''}">
            <div class="feedback-title">${answered && stage.question.options[decisionPath[currentStage]]?.correct ? '✓ Correct!' : '✗ Not quite'}</div>
            <p>${answered ? (stage.question.options[decisionPath[currentStage]]?.correct ? stage.question.explanation.correct : stage.question.explanation.incorrect) : ''}</p></div>`;
        
        if (stage.question.teaching) {
            html += `<div class="teaching-point ${answered ? 'show' : ''}">${stage.question.teaching}</div>`;
        }
        
        if (stage.question.why_chain) {
            html += `<div class="why-chain ${answered ? 'show' : ''}"><h4>🔗 Why Chain - Deeper Understanding</h4>`;
            stage.question.why_chain.forEach(item => {
                html += `<div class="why-item"><div class="why-q">Q: ${item.q}</div><div class="why-a">${item.a}</div></div>`;
            });
            html += '</div>';
        }
        
        html += `<button class="btn ${answered ? 'show' : ''}" onclick="nextStage()">Continue →</button></div>`;
    } else {
        html += `<div style="text-align:center;margin-top:24px;"><p style="font-size:1.2rem;">Final Score: <strong>${score}</strong> / ${maxScore}</p></div>`;
    }
    
    html += '</div>';
    document.getElementById('scene-container').innerHTML = html;
}

function selectOption(index, correct) {
    const qId = `q${currentStage}`;
    if (answeredQuestions.has(qId)) return;
    
    answeredQuestions.add(qId);
    decisionPath[currentStage] = index;
    
    const stage = stages[currentStage];
    maxScore += stage.question.points;
    if (correct) score += stage.question.points;
    
    document.getElementById('score').textContent = score;
    document.getElementById('maxScore').textContent = maxScore;
    
    renderStage();
}

function nextStage() {
    if (currentStage < stages.length - 1) {
        currentStage++;
        renderStage();
        window.scrollTo(0, 0);
    }
}

// Initialize
stages.forEach(s => { if (s.question) maxScore += s.question.points; });
maxScore = 0; // Reset - will accumulate as questions are answered
document.getElementById('maxScore').textContent = '0';
renderStage();


// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
