<!DOCTYPE html>
<html lang="en">
<head>
<meta name="theme-color" content="#1B4F72">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-EKCVJ1SMN3"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag("js",new Date());gtag("config","G-EKCVJ1SMN3");</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinic Board | ReasonDx</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/rdx-theme.css">
<link rel="stylesheet" href="mobile.css">
<meta name="description" content="Virtual outpatient clinic board with scheduled appointment slots and clinical reasoning practice on ReasonDx.">
<meta property="og:title" content="Clinic Board | ReasonDx">
<meta property="og:url" content="https://reasondx.com/clinic-board.html">
<style>
:root {
  --primary:#2874A6; --primary-dark:#1B4F72; --primary-light:#EBF5FB;
  --teal:#0D7A67; --teal-light:#E8F8F5;
  --success:#27AE60; --success-light:#E8F8F0;
  --warning:#F39C12; --warning-light:#FEF9E7;
  --danger:#E74C3C; --danger-light:#FDEDEC;
  --purple:#7C3AED; --purple-light:#F5F3FF;
  --text:#1a1a2e; --text-muted:#4B5563; --bg:#F0F4F8;
  --card:#ffffff; --border:#DCE3EB;
  /* Acuity palette — clinic uses 3 & 4 only */
  --acuity-3:#F59E0B; --acuity-4:#22C55E;
  --font:'IBM Plex Sans',-apple-system,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06);
  --shadow-md:0 4px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 30px rgba(0,0,0,.12);
  --radius:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}

/* ── Top bar ── */
.topbar{background:linear-gradient(135deg,var(--primary-dark),var(--teal));color:white;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15);position:sticky;top:56px;z-index:100}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{font-size:16px;font-weight:700}.topbar-logo span{font-weight:400;opacity:.85}
.topbar-badge{background:rgba(255,255,255,.18);padding:3px 12px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-time{font-family:var(--mono);font-size:13px;opacity:.9}
.topbar-user{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500}
.topbar-avatar{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}

/* ── Board header ── */
.board-header{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.board-title{font-size:22px;font-weight:700;display:flex;align-items:center;gap:8px}
.count{background:var(--teal);color:white;font-size:12px;padding:2px 8px;border-radius:10px;font-weight:700}
.board-controls{display:flex;gap:8px;flex-wrap:wrap}

/* ── Buttons ── */
.btn{font-family:var(--font);font-size:13px;font-weight:600;padding:8px 16px;border-radius:var(--radius);cursor:pointer;transition:all .15s;border:1px solid transparent;white-space:nowrap}
.btn-primary{background:var(--teal);color:white;border-color:var(--teal)}.btn-primary:hover{filter:brightness(1.1)}
.btn-outline{background:white;color:var(--text);border-color:var(--border)}.btn-outline:hover{border-color:var(--teal);color:var(--teal)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── Stats bar ── */
.stats-bar{padding:0 24px 12px;display:flex;gap:12px;flex-wrap:wrap}
.stat-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:8px 16px;min-width:100px}
.stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted)}
.stat-value{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--text)}
.stat-value.teal{color:var(--teal)}.stat-value.warn{color:var(--warning)}.stat-value.ok{color:var(--success)}

/* ── Schedule grid (replaces bed table) ── */
.board-container{padding:0 24px 24px}
.schedule-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.schedule-title{font-size:14px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px}
.date-nav{display:flex;align-items:center;gap:10px}
.date-btn{background:white;border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:13px;color:var(--text);font-family:var(--font)}.date-btn:hover{border-color:var(--teal);color:var(--teal)}
.date-label{font-family:var(--mono);font-size:13px;font-weight:600;min-width:160px;text-align:center}

.board-table-wrap{background:white;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow-md);overflow:hidden}
.board-table{width:100%;border-collapse:collapse}
.board-table thead th{background:#f7f9fc;border-bottom:2px solid var(--border);padding:10px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);white-space:nowrap}
.board-table tbody tr{border-bottom:1px solid #f0f2f5;cursor:pointer;transition:background .12s}
.board-table tbody tr:hover{background:var(--primary-light)}
.board-table tbody tr.active{background:#dbeafe}
.board-table tbody tr.empty-slot{cursor:default;background:#FAFBFC}
.board-table tbody tr.empty-slot:hover{background:#FAFBFC}
.board-table td{padding:12px 14px;font-size:13px;vertical-align:middle;color:var(--text)}

/* ── Slot time cell ── */
.slot-time{font-family:var(--mono);font-weight:700;font-size:14px;color:var(--primary-dark);white-space:nowrap}
.slot-time.past{color:var(--text-muted);opacity:.6}
.slot-time.now{color:var(--teal);font-weight:800}
.slot-room{font-size:11px;color:var(--text-muted);margin-top:2px}

/* ── Patient cell ── */
.patient-name{font-weight:700;font-size:13px;color:#1E293B}
.patient-demo{font-size:11px;color:var(--text-muted);font-weight:500}
.empty-name{font-size:13px;color:var(--text-muted);font-style:italic}

/* ── Acuity badge ── */
.acuity-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.acuity-3{background:#fffbeb;color:#b45309;border:1px solid #fde68a}
.acuity-4{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.acuity-dot{width:7px;height:7px;border-radius:50%}
.acuity-3 .acuity-dot{background:var(--acuity-3)}
.acuity-4 .acuity-dot{background:var(--acuity-4)}

/* ── Visit status badge ── */
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.status-scheduled{background:#F1F5F9;color:var(--text-muted)}
.status-checked-in{background:#FEF9E7;color:#b45309}
.status-roomed{background:#EBF5FB;color:var(--primary)}
.status-with-provider{background:var(--teal-light);color:var(--teal)}
.status-pending-results{background:var(--purple-light);color:var(--purple)}
.status-ready-pickup{background:var(--success-light);color:#15803d}
.status-checked-out{background:#F1F5F9;color:var(--text-muted)}
.status-pulse{width:6px;height:6px;border-radius:50%;animation:pulse 2s infinite}
.status-roomed .status-pulse{background:var(--primary)}
.status-checked-in .status-pulse{background:var(--warning)}
.status-with-provider .status-pulse{background:var(--teal)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Reason for visit tag ── */
.visit-type{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.visit-new{background:#EDE9FE;color:#5B21B6}
.visit-follow{background:#E0F2FE;color:#0369A1}
.visit-annual{background:#ECFDF5;color:#065F46}
.visit-urgent{background:#FEF2F2;color:#991B1B}

/* ── Provider cell ── */
.provider-cell{font-weight:500;font-size:12px;color:var(--text-muted)}
.provider-you{color:var(--teal);font-weight:700}

/* ── Empty state ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state h3{font-size:18px;color:var(--text);margin-bottom:8px}
.empty-state p{font-size:14px;margin-bottom:20px}

/* ── Detail panel (slide-in) ── */
.panel-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.panel-overlay.open{opacity:1;pointer-events:all}
.detail-panel{position:fixed;top:0;right:-640px;width:640px;max-width:90vw;height:100vh;background:white;z-index:300;box-shadow:-4px 0 30px rgba(0,0,0,.15);transition:right .3s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;overflow:hidden}
.detail-panel.open{right:0}
.panel-header{background:linear-gradient(135deg,var(--primary-dark),var(--teal));color:white;padding:16px 20px;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
.panel-patient-info h2{font-size:20px;font-weight:700;margin-bottom:4px}
.panel-patient-meta{display:flex;gap:12px;font-size:12px;opacity:.85;flex-wrap:wrap}
.panel-close{background:rgba(255,255,255,.15);border:none;color:white;width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.panel-close:hover{background:rgba(255,255,255,.25)}

/* ── EMR tabs ── */
.emr-tabs{display:flex;border-bottom:2px solid var(--border);background:#f7f9fc;flex-shrink:0;overflow-x:auto}
.emr-tab{font-family:var(--font);padding:10px 16px;font-size:12px;font-weight:600;color:var(--text-muted);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s}
.emr-tab:hover{color:var(--teal)}
.emr-tab.active{color:var(--teal);border-bottom-color:var(--teal);background:white}
.emr-content{flex:1;overflow-y:auto;padding:0;display:flex;flex-direction:column}
.tab-body{padding:20px;flex:1;overflow-y:auto}

/* ── Content sections ── */
.emr-section{margin-bottom:20px}
.emr-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.emr-field{display:flex;margin-bottom:6px;font-size:13px}
.emr-field-label{font-weight:600;color:var(--text-muted);min-width:140px;flex-shrink:0}
.emr-field-value{color:var(--text)}

/* ── Vitals ── */
.vitals-header{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px;padding:10px;background:linear-gradient(135deg,#f8fafc,#f0f4f8);border:1px solid var(--border);border-radius:10px}
.vital-chip{text-align:center;padding:6px 4px;background:white;border-radius:6px;border:1px solid #e8ecf0}
.vital-chip .vital-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);font-weight:600}
.vital-chip .vital-value{font-size:14px;font-weight:700;font-family:var(--mono);color:var(--text);margin-top:2px}
.vital-chip.abnormal .vital-value{color:var(--danger)}

/* ── Labs ── */
.lab-table{width:100%;border-collapse:collapse;font-size:12px}
.lab-table th{text-align:left;padding:6px 8px;background:var(--bg);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--text-muted);border-bottom:1px solid var(--border)}
.lab-table td{padding:6px 8px;border-bottom:1px solid #f0f2f5}
.lab-table .abnormal{color:var(--danger);font-weight:600}
.lab-flag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:700}
.lab-flag.H{background:#fef2f2;color:var(--danger)}
.lab-flag.L{background:#eff6ff;color:#1d4ed8}

/* ── Teaching card ── */
.teaching-card{background:#f0f9ff;border:1px solid #bae6fd;border-radius:6px;padding:12px;margin-bottom:8px}
.teaching-card h4{font-size:12px;font-weight:700;color:var(--primary);margin-bottom:6px}
.teaching-item{font-size:13px;padding:3px 0;display:flex;gap:6px}
.teaching-item::before{content:"💡";flex-shrink:0}
.pitfall-item::before{content:"⚠️"}

/* ── AI chat ── */
.chat-wrap{display:flex;flex-direction:column;height:100%}
.chat-tracker{background:#f7f9fc;border-bottom:1px solid var(--border);padding:10px 16px;flex-shrink:0}
.tracker-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:6px}
.tracker-grid{display:flex;gap:4px;flex-wrap:wrap}
.tracker-pill{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;border:1px solid var(--border);background:white;color:var(--text-muted)}
.tracker-pill.covered{background:var(--success-light);color:var(--success);border-color:#86efac}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;min-height:200px}
.chat-msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;animation:msgIn .2s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-patient{background:#f1f5f9;color:var(--text);border-bottom-left-radius:4px;align-self:flex-start}
.msg-student{background:var(--teal);color:white;border-bottom-right-radius:4px;align-self:flex-end}
.msg-system{background:#fffbeb;color:#92400e;font-size:11px;align-self:center;border-radius:8px;text-align:center;max-width:90%;border:1px solid #fde68a}
.typing-indicator{display:flex;gap:4px;padding:4px 0}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:typeBounce .6s infinite alternate}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typeBounce{from{opacity:.3;transform:translateY(0)}to{opacity:1;transform:translateY(-4px)}}
.chat-input-area{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);background:white;flex-shrink:0}
.chat-input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13px;outline:none;resize:none}
.chat-input:focus{border-color:var(--teal)}
.chat-send{background:var(--teal);color:white;border:none;border-radius:8px;padding:8px 14px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer}
.chat-send:hover{filter:brightness(1.1)}
.chat-send:disabled{opacity:.4;cursor:not-allowed}

/* ── Plan / Mgmt ── */
.plan-section{background:#f7f9fc;border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.plan-section h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted);margin-bottom:10px}
.plan-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer;transition:all .15s;background:white;margin-bottom:6px;line-height:1.4}
.plan-item:hover{border-color:var(--teal);background:var(--teal-light)}
.plan-item.ordered{border-color:var(--success);background:#ECFDF5;opacity:.8;pointer-events:none}
.plan-item input[type=checkbox]{accent-color:var(--teal);flex-shrink:0;margin-top:1px}
.plan-label{flex:1}
.plan-label strong{display:block;margin-bottom:2px}
.plan-tag{font-size:10px;font-weight:600;padding:1px 6px;border-radius:6px;background:#E0E7FF;color:#3730A3;margin-left:6px}
.plan-tag.critical{background:#FEF2F2;color:var(--danger)}
.plan-tag.counseling{background:#FEF9E7;color:#92400e}

/* ── Scorecard ── */
.scorecard{background:linear-gradient(135deg,#f0f4f8,#e8eef4);border:2px solid var(--teal);border-radius:12px;padding:16px;margin-bottom:16px}
.scorecard-title{font-size:14px;font-weight:700;color:var(--primary-dark);margin-bottom:12px}
.scorecard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.score-metric{background:white;border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.score-metric .sm-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);font-weight:600}
.score-metric .sm-value{font-size:22px;font-weight:700;font-family:var(--mono);margin:4px 0}
.score-metric.excellent .sm-value{color:var(--success)}
.score-metric.good .sm-value{color:var(--primary)}
.score-metric.fair .sm-value{color:var(--warning)}
.score-metric.poor .sm-value{color:var(--danger)}
.score-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.score-bar-label{width:110px;font-weight:600;color:var(--text);text-align:right}
.score-bar-track{flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:4px;transition:width .6s}
.score-bar-val{width:36px;font-family:var(--mono);font-weight:700;font-size:11px}

/* ── Panel footer ── */
.panel-footer{padding:12px 20px;border-top:1px solid var(--border);background:#f7f9fc;display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}

/* ── Toast ── */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:1000;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--text);color:white;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);transform:translateY(20px);opacity:0;animation:toastIn .3s forwards,toastOut .3s 2.7s forwards}
@keyframes toastIn{to{transform:translateY(0);opacity:1}}
@keyframes toastOut{to{transform:translateY(20px);opacity:0}}
.toast.success{background:var(--teal)}.toast.warning{background:var(--warning)}
.save-indicator{position:fixed;bottom:8px;left:8px;font-size:10px;color:var(--text-muted);opacity:.6;z-index:100}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){
  .board-header{padding:12px 16px}.stats-bar{padding:0 16px 12px}.board-container{padding:0 16px 16px}
  .board-table td,.board-table th{padding:8px 10px}.detail-panel{width:100vw;max-width:100vw}.hide-mobile{display:none}
}
</style>
</head>
<body>
<a href="#main-content" class="rdx-skip-link">Skip to main content</a>
<div id="main-content" role="main"></div>

<div class="topbar">
  <div class="topbar-left">
    <a href="./index.html" style="text-decoration:none;color:#fff;display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;transition:background .15s;font-size:13px;font-weight:600;background:rgba(255,255,255,0.12)" onmouseover="this.style.background='rgba(255,255,255,0.22)'" onmouseout="this.style.background='rgba(255,255,255,0.12)'">← Exit Clinic</a>
    <div class="topbar-logo">🩺 ReasonDx <span>Virtual Hospital</span></div>
    <div class="topbar-badge">Outpatient Clinic</div>
  </div>
  <div class="topbar-right">
    <div class="topbar-time" id="simTime">8:00 AM</div>
    <div class="topbar-user"><div class="topbar-avatar">MS</div><span>Medical Student</span></div>
  </div>
</div>

<div class="board-header">
  <div class="board-title">Clinic Schedule <span class="count" id="patientCount">0</span></div>
  <div class="board-controls">
    <button type="button" class="btn btn-primary" onclick="addWalkIn()">+ Walk-In</button>
    <button type="button" class="btn btn-outline" onclick="advanceTime()">⏩ Next Slot</button>
    <button type="button" class="btn btn-outline" onclick="resetBoard()">Reset Day</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-card"><div class="stat-label">Scheduled</div><div class="stat-value teal" id="statTotal">0</div></div>
  <div class="stat-card"><div class="stat-label">Checked In</div><div class="stat-value warn" id="statCheckedIn">0</div></div>
  <div class="stat-card"><div class="stat-label">In Room</div><div class="stat-value teal" id="statRoomed">0</div></div>
  <div class="stat-card"><div class="stat-label">Pending Results</div><div class="stat-value" id="statPending">0</div></div>
  <div class="stat-card"><div class="stat-label">Checked Out</div><div class="stat-value ok" id="statDone">0</div></div>
</div>

// ── SCHEDULE SLOTS ────────────────────────────────────────────────────────────
const SLOT_TIMES = [
  '8:00 AM','8:20 AM','8:40 AM','9:00 AM','9:20 AM','9:40 AM',
  '10:00 AM','10:20 AM','10:40 AM','11:00 AM','11:20 AM','11:40 AM',
  '1:00 PM','1:20 PM','1:40 PM','2:00 PM','2:20 PM','2:40 PM',
  '3:00 PM','3:20 PM'
];
const ROOMS = ['Exam 1','Exam 2','Exam 3','Exam 4','Exam 5','Exam 6'];

// ── APP STATE ─────────────────────────────────────────────────────────────────
var slots = [];           // { time, room, patient|null }
var selectedSlotId = null;
var simMinutes = 8 * 60; // 8:00 AM
var dayOffset = 0;

// ── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  updateDateLabel();
  generateSchedule();
  startClock();
  updateStats();
  // Check for saved state
  try {
    var saved = JSON.parse(localStorage.getItem('rdx-clinic-board'));
    if (saved && saved.slots && saved.slots.length) {
      document.getElementById('resumeBtn') && (document.getElementById('resumeBtn').style.display = 'inline-block');
    }
  } catch(e) {}
}

function generateSchedule() {
  slots = [];
  var pool = CLINIC_CASES.slice();
  // Shuffle pool
  for (var i = pool.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i+1));
    var tmp = pool[i]; pool[i] = pool[j]; pool[j] = tmp;
  }
  var poolIdx = 0;
  SLOT_TIMES.forEach(function(time, i) {
    var hasPatient = Math.random() < 0.75; // 75% fill rate
    var room = ROOMS[i % ROOMS.length];
    if (hasPatient) {
      var tpl = pool[poolIdx % pool.length];
      poolIdx++;
      var isMale = Math.random() < tpl.demographics.genderDistribution.male;
      var names = isMale ? tpl.demographics.nameOptions.male : tpl.demographics.nameOptions.female;
      var age = Math.floor(Math.random() * (tpl.demographics.ageRange[1] - tpl.demographics.ageRange[0])) + tpl.demographics.ageRange[0];
      var name = names[Math.floor(Math.random() * names.length)];
      // Determine slot status based on simTime
      var slotMin = parseTimeToMinutes(time);
      var status = 'scheduled';
      if (slotMin < simMinutes - 40) status = 'checked-out';
      else if (slotMin < simMinutes - 20) status = 'ready-pickup';
      else if (slotMin < simMinutes) status = 'with-provider';
      else if (slotMin < simMinutes + 20) status = 'checked-in';

      slots.push({
        id: 'slot-' + i + '-' + Date.now(),
        time: time, room: room,
        patient: {
          id: 'pt-' + Date.now() + '-' + i,
          name: name, age: age,
          gender: isMale ? 'M' : 'F',
          mrn: String(100000 + Math.floor(Math.random() * 900000)),
          status: status,
          provider: 'You',
          template: tpl,
          chatHistory: [],
          planOrdered: [],
          discovered: { labsReady: true, startedAt: Date.now() }
        }
      });
    } else {
      slots.push({ id: 'slot-' + i, time: time, room: room, patient: null });
    }
  });
  renderBoard();
}

function parseTimeToMinutes(t) {
  var parts = t.match(/(\d+):(\d+)\s+(AM|PM)/);
  if (!parts) return 0;
  var h = parseInt(parts[1]); var m = parseInt(parts[2]); var ampm = parts[3];
  if (ampm === 'PM' && h !== 12) h += 12;
  if (ampm === 'AM' && h === 12) h = 0;
  return h * 60 + m;
}

// ── BOARD RENDER ──────────────────────────────────────────────────────────────
function renderBoard() {
  var body = document.getElementById('boardBody');
  if (!slots.length) {
    body.innerHTML = '<tr><td colspan="7"><div class="empty-state"><h3>No appointments scheduled</h3><p>Generate a new schedule to begin your clinic session.</p><button class="btn btn-primary" onclick="generateSchedule()">Generate Schedule</button></div></td></tr>';
    document.getElementById('patientCount').textContent = '0';
    updateStats(); return;
  }
  var currentMin = simMinutes;
  body.innerHTML = slots.map(function(slot) {
    var slotMin = parseTimeToMinutes(slot.time);
    var isNow = Math.abs(slotMin - currentMin) < 20;
    var isPast = slotMin < currentMin - 20;
    var timeClass = isNow ? 'now' : isPast ? 'past' : '';
    if (!slot.patient) {
      return '<tr class="empty-slot">' +
        '<td><span class="slot-time ' + timeClass + '">' + slot.time + '</span><div class="slot-room">' + slot.room + '</div></td>' +
        '<td colspan="6"><span class="empty-name">— Open slot —</span></td>' +
        '</tr>';
    }
    var p = slot.patient;
    var tpl = p.template;
    var isActive = p.id === selectedSlotId;
    return '<tr class="' + (isActive ? 'active' : '') + '" onclick="selectPatient(\'' + p.id + '\')">' +
      '<td><span class="slot-time ' + timeClass + '">' + slot.time + '</span><div class="slot-room">' + slot.room + '</div></td>' +
      '<td><div class="patient-name">' + esc(p.name) + '</div><div class="patient-demo">' + p.age + p.gender + ' · MRN ' + p.mrn + '</div></td>' +
      '<td>' + esc(tpl.boardCC) + '</td>' +
      '<td><span class="acuity-badge acuity-' + tpl.acuity + '"><span class="acuity-dot"></span> ' + tpl.acuity + '</span></td>' +
      '<td><span class="visit-type visit-' + tpl.visitType + '">' + ucfirst(tpl.visitType) + '</span></td>' +
      '<td><span class="status-badge status-' + p.status + '"><span class="status-pulse"></span> ' + statusLabel(p.status) + '</span></td>' +
      '<td class="hide-mobile"><span class="provider-cell provider-you">' + esc(p.provider) + '</span></td>' +
      '</tr>';
  }).join('');

  var filledCount = slots.filter(function(s){return s.patient;}).length;
  document.getElementById('patientCount').textContent = filledCount;
  updateStats();
}

function statusLabel(s) {
  return {
    'scheduled':'Scheduled','checked-in':'Checked In','roomed':'Roomed',
    'with-provider':'With Provider','pending-results':'Pending Results',
    'ready-pickup':'Ready','checked-out':'Checked Out'
  }[s] || s;
}
function ucfirst(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

function updateStats() {
  var pts = slots.map(function(s){return s.patient;}).filter(Boolean);
  document.getElementById('statTotal').textContent = pts.length;
  document.getElementById('statCheckedIn').textContent = pts.filter(function(p){return p.status==='checked-in'||p.status==='roomed';}).length;
  document.getElementById('statRoomed').textContent = pts.filter(function(p){return p.status==='with-provider';}).length;
  document.getElementById('statPending').textContent = pts.filter(function(p){return p.status==='pending-results';}).length;
  document.getElementById('statDone').textContent = pts.filter(function(p){return p.status==='checked-out'||p.status==='ready-pickup';}).length;
}

  var p = slot.patient;

  if (p.status === 'scheduled' || p.status === 'checked-in') {
    p.status = 'with-provider';

function openTab(id) {

function switchTab(id, btn) {

// ── AI PATIENT CHAT ───────────────────────────────────────────────────────────
function renderAIChat(p, tpl, container) {
  var tracker = ['HPI','PMH','Medications','Allergies','Social Hx','Review of Systems'];
  var covered = tracker.filter(function(t){ return p.chatHistory.some(function(m){return m.role==='user'&&m.content.length>5;}); });
  var chatId = 'chat-' + p.id;
  var html = '<div class="chat-wrap">';
  html += '<div class="chat-tracker"><div class="tracker-title">History Checklist</div><div class="tracker-grid">';
  tracker.forEach(function(t){ html += '<div class="tracker-pill' + (covered.indexOf(t)>=0?' covered':'') + '">' + t + '</div>'; });
  html += '</div></div>';
  html += '<div class="chat-messages" id="' + chatId + '">';
  if (p.chatHistory.length === 0) {
    html += '<div class="chat-msg msg-patient">Hello, I\'m ' + esc(p.name) + '. I\'m here for my ' + esc(tpl.visitType) + ' appointment regarding ' + esc(tpl.reasonForVisit.toLowerCase()) + '.</div>';
  } else {
    p.chatHistory.forEach(function(m){
      html += '<div class="chat-msg ' + (m.role==='user'?'msg-student':'msg-patient') + '">' + esc(m.content) + '</div>';
    });
  }
  html += '</div>';
  html += '<div class="chat-input-area"><textarea class="chat-input" id="chatInput-' + p.id + '" rows="2" placeholder="Ask the patient a question…" onkeydown="handleChatKey(event,\'' + p.id + '\')"></textarea><button class="chat-send" onclick="sendChat(\'' + p.id + '\')">Send</button></div>';
  html += '</div>';
  container.innerHTML = html;
}

function handleChatKey(e, pid) { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat(pid);} }

async function sendChat(pid) {
  var slot = slots.find(function(s){return s.patient&&s.patient.id===pid;});
  if (!slot) return;
  var p = slot.patient; var tpl = p.template;
  var input = document.getElementById('chatInput-' + pid);
  if (!input || !input.value.trim()) return;
  var msg = input.value.trim();
  input.value = '';
  p.chatHistory.push({role:'user',content:msg});
  var chatEl = document.getElementById('chat-' + pid);
  if (chatEl) {
    chatEl.innerHTML += '<div class="chat-msg msg-student">' + esc(msg) + '</div>';
    chatEl.innerHTML += '<div class="chat-msg msg-patient"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
    chatEl.scrollTop = chatEl.scrollHeight;
  }
  var systemPrompt = 'You are a clinic patient named ' + p.name + ', age ' + p.age + p.gender + ', presenting for: ' + tpl.reasonForVisit + '. Your chief complaint context: ' + tpl.boardCC + '. HPI: ' + tpl.hpi + '. PMH: ' + tpl.pmh + '. Meds: ' + tpl.medications + '. Allergies: ' + tpl.allergies + '. Respond in character as the patient — brief, natural, realistic clinic patient answers. If asked about symptoms not described, say you have not noticed that. Do not offer diagnoses.';
  try {
    var resp = await fetch(WORKER_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        messages:[{role:'user',content:systemPrompt+'\n\nStudent says: '+msg}],
        model:'claude-haiku-4-5-20251001', max_tokens:300
      })
    });
    var data = await resp.json();
    var reply = (data.content && data.content[0] && data.content[0].text) ? data.content[0].text : 'I\'m not sure how to answer that.';
    p.chatHistory.push({role:'assistant',content:reply});
    if (chatEl) {
      var typing = chatEl.querySelectorAll('.typing-indicator');
      if (typing.length) typing[typing.length-1].parentElement.remove();
      chatEl.innerHTML += '<div class="chat-msg msg-patient">' + esc(reply) + '</div>';
      chatEl.scrollTop = chatEl.scrollHeight;
    }
  } catch(e) {
    p.chatHistory.push({role:'assistant',content:'Sorry, I\'m having trouble hearing you right now.'});
    if (chatEl) {
      var typing = chatEl.querySelectorAll('.typing-indicator');
      if (typing.length) typing[typing.length-1].parentElement.remove();
      chatEl.innerHTML += '<div class="chat-msg msg-patient">Sorry, I\'m having trouble hearing you right now.</div>';
    }
  }
}

// ── ASSESSMENT & PLAN ─────────────────────────────────────────────────────────
function renderPlan(p, tpl, container) {
  var ordered = p.planOrdered || [];
  var categories = {};
  tpl.plan.forEach(function(item){
    if (!categories[item.category]) categories[item.category] = [];
    categories[item.category].push(item);
  });
  var html = '<div class="tab-body">';
  html += '<div style="margin-bottom:12px;font-size:12px;color:var(--text-muted)">Check off your management plan. Critical items are marked.</div>';
  Object.entries(categories).forEach(function(kv) {
    var cat = kv[0]; var items = kv[1];
    html += '<div class="plan-section"><h4>' + esc(cat) + '</h4>';
    items.forEach(function(item) {
      var isDone = ordered.indexOf(item.id) >= 0;
      var isWrong = !item.correct;
      var borderStyle = isWrong ? 'border:1.5px solid #fca5a5;background:#fef2f2' : '';
      html += '<div class="plan-item' + (isDone?' ordered':'') + '" style="' + borderStyle + '" onclick="togglePlan(\'' + p.id + '\',\'' + item.id + '\')">';
      html += '<input type="checkbox"' + (isDone?' checked':'') + (isWrong?' style="accent-color:#ef4444"':'') + '>';
      html += '<div class="plan-label"><strong>' + esc(item.label) + '</strong>';
      if (item.critical) html += '<span class="plan-tag critical">Critical</span>';
      if (isWrong) html += '<span class="plan-tag critical">⚠ Incorrect</span>';
      html += '</div></div>';
    });
    html += '</div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

function togglePlan(pid, itemId) {
  var slot = slots.find(function(s){return s.patient&&s.patient.id===pid;});
  if (!slot) return;
  var p = slot.patient;
  p.planOrdered = p.planOrdered || [];
  var idx = p.planOrdered.indexOf(itemId);
  if (idx >= 0) p.planOrdered.splice(idx, 1);
  else p.planOrdered.push(itemId);
  renderTab('plan', p, p.template, document.getElementById('emrContent'));
  renderTab('plan', p, p.template);
}

// ── SCORECARD ─────────────────────────────────────────────────────────────────
function renderScore(p, tpl, container) {
  var ordered = p.planOrdered || [];
  var correct = tpl.plan.filter(function(i){return i.correct && ordered.indexOf(i.id)>=0;}).length;
  var total = tpl.plan.filter(function(i){return i.correct;}).length;
  var wrong = tpl.plan.filter(function(i){return !i.correct && ordered.indexOf(i.id)>=0;}).length;
  var critCorrect = tpl.plan.filter(function(i){return i.correct&&i.critical&&ordered.indexOf(i.id)>=0;}).length;
  var critTotal = tpl.plan.filter(function(i){return i.correct&&i.critical;}).length;
  var historyScore = Math.min(100, p.chatHistory.filter(function(m){return m.role==='user';}).length * 15);
  var planScore = total > 0 ? Math.round((correct/total)*100) : 0;
  var safetyScore = wrong === 0 ? 100 : Math.max(0, 100 - wrong*25);
  var critScore = critTotal > 0 ? Math.round((critCorrect/critTotal)*100) : 100;
  var overall = Math.round((historyScore*0.25)+(planScore*0.35)+(safetyScore*0.2)+(critScore*0.2));
  var grade = overall>=90?'A':overall>=80?'B':overall>=70?'C':overall>=60?'D':'F';
  var gradeColor = overall>=80?'var(--success)':overall>=70?'var(--primary)':overall>=60?'var(--warning)':'var(--danger)';

  var html = '<div class="tab-body"><div class="scorecard">';
  html += '<div class="scorecard-title">📊 Visit Scorecard — ' + esc(tpl.diagnosis) + '</div>';
  html += '<div class="scorecard-grid">';
  [{label:'History',val:historyScore,q:(historyScore>=80?'excellent':historyScore>=60?'good':'fair')},
   {label:'Plan',val:planScore,q:(planScore>=80?'excellent':planScore>=60?'good':'fair')},
   {label:'Safety',val:safetyScore,q:(safetyScore>=80?'excellent':safetyScore>=60?'good':'fair')},
   {label:'Critical Items',val:critScore,q:(critScore>=80?'excellent':critScore>=60?'good':'fair')}
  ].forEach(function(m){
    html += '<div class="score-metric ' + m.q + '"><div class="sm-label">' + m.label + '</div><div class="sm-value">' + m.val + '%</div></div>';
  });
  html += '</div>';
  html += '<div style="text-align:center;padding:12px;background:white;border-radius:10px;border:1px solid var(--border)">';
  html += '<div style="font-size:36px;font-weight:700;font-family:var(--mono);color:' + gradeColor + '">' + grade + '</div>';
  html += '<div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px">Overall: ' + overall + '%</div>';
  html += '</div></div>';

  if (tpl.teaching.mustNotMiss.length) {
    html += '<div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;padding:12px;margin-bottom:12px">';
    html += '<div style="font-size:12px;font-weight:700;color:var(--danger);margin-bottom:6px">🚨 Must-Not-Miss</div>';
    tpl.teaching.mustNotMiss.forEach(function(m){ html += '<div style="font-size:12px;padding:3px 0">' + esc(m) + '</div>'; });
    html += '</div>';
  }
  html += '</div>';
  container.innerHTML = html;
}

// ── STATUS ADVANCE ────────────────────────────────────────────────────────────
function advanceStatus(pid) {
  var slot = slots.find(function(s){return s.patient&&s.patient.id===pid;});
  if (!slot) return;
  var p = slot.patient;
  var flow = ['scheduled','checked-in','roomed','with-provider','pending-results','ready-pickup','checked-out'];
  var idx = flow.indexOf(p.status);
  if (idx < flow.length-1) p.status = flow[idx+1];
  renderBoard();
  if (p.status === 'checked-out') {
    closePanel();
    showToast(p.name + ' — visit complete', 'success');
  } else {
    showToast('Status: ' + statusLabel(p.status), '');
  }
}

function closePanel() {
  document.getElementById('panelOverlay').classList.remove('open');
  document.getElementById('detailPanel').classList.remove('open');
  selectedSlotId = null;
  renderBoard();
}

// ── BOARD ACTIONS ─────────────────────────────────────────────────────────────
function addWalkIn() {
  var pool = CLINIC_CASES.filter(function(c){return c.acuity >= 3;});
  var tpl = pool[Math.floor(Math.random()*pool.length)];
  var isMale = Math.random() < tpl.demographics.genderDistribution.male;
  var names = isMale ? tpl.demographics.nameOptions.male : tpl.demographics.nameOptions.female;
  var age = Math.floor(Math.random()*(tpl.demographics.ageRange[1]-tpl.demographics.ageRange[0]))+tpl.demographics.ageRange[0];
  // Find first open slot or append
  var openIdx = slots.findIndex(function(s){return !s.patient;});
  var room = openIdx >= 0 ? slots[openIdx].room : ROOMS[slots.length % ROOMS.length];
  var time = openIdx >= 0 ? slots[openIdx].time : formatTime(simMinutes + 20);
  var patient = {
    id:'pt-walkin-'+Date.now(),
    name:names[Math.floor(Math.random()*names.length)],
    age:age, gender:isMale?'M':'F',
    mrn:String(100000+Math.floor(Math.random()*900000)),
    status:'checked-in', provider:'You',
    template:tpl, chatHistory:[], planOrdered:[],
    discovered:{startedAt:Date.now()}
  };
  if (openIdx >= 0) { slots[openIdx].patient = patient; slots[openIdx].room = room; }
  else { slots.push({id:'walkin-'+Date.now(),time:time,room:room,patient:patient}); }
  renderBoard();
  showToast('Walk-in: ' + patient.name + ' (' + patient.age + patient.gender + ') — ' + tpl.reasonForVisit, 'success');
}

function advanceTime() {
  simMinutes += 20;
  if (simMinutes >= 17*60) simMinutes = 8*60; // wrap around 5PM
  updateClock();
  // Update slot statuses
  slots.forEach(function(slot){
    if (!slot.patient) return;
    var p = slot.patient;
    var slotMin = parseTimeToMinutes(slot.time);
    if (p.status === 'scheduled' && slotMin <= simMinutes + 10) p.status = 'checked-in';
  });
  renderBoard();
  showToast('Time advanced to ' + formatTime(simMinutes));
}

function resetBoard() {
  simMinutes = 8*60; slots = []; selectedSlotId = null;
  updateClock(); generateSchedule();
  showToast('Schedule reset for new clinic day');
}

function prevDay() { dayOffset--; updateDateLabel(); generateSchedule(); }
function nextDay() { dayOffset++; updateDateLabel(); generateSchedule(); }

function updateDateLabel() {
  var d = new Date(); d.setDate(d.getDate() + dayOffset);
  document.getElementById('dateLabel').textContent = d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}

function formatTime(min) {
  var h = Math.floor(min/60); var m = min%60;
  var ampm = h>=12?'PM':'AM'; if(h>12)h-=12; if(h===0)h=12;
  return h+':'+(m<10?'0':'')+m+' '+ampm;
}

// ── CLOCK ─────────────────────────────────────────────────────────────────────
function updateClock() {
  document.getElementById('simTime').textContent = formatTime(simMinutes);
}
function startClock() {
  updateClock(); updateDateLabel();
  setInterval(function(){ simMinutes+=1; if(simMinutes>=17*60)simMinutes=8*60; updateClock(); }, 60000);
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg, type) {
  var t = document.createElement('div');
  t.className = 'toast' + (type?' '+type:'');
  t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(function(){t.remove();}, 3200);
}

// ── START ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', init);
</script>
