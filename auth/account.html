<!DOCTYPE html>
<html lang="en">
<head>
<meta name="theme-color" content="#1f5f8b">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<title>My Account | ReasonDx</title>
<meta name="description" content="Manage your ReasonDx account settings and subscription.">
<style>
:root{--blue:#2874A6;--dark:#1B4F72;--font:'IBM Plex Sans',-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:#f0f4f8;color:#1e293b}
.container{max-width:600px;margin:80px auto;padding:0 24px}
h1{font-size:28px;font-weight:700;margin-bottom:24px}
.card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 4px 16px rgba(0,0,0,.06);margin-bottom:16px}
.card h2{font-size:18px;font-weight:700;margin-bottom:12px;color:var(--dark)}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;margin-top:12px}
input{width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;font-family:inherit}
.btn{padding:10px 20px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:16px}
.btn:hover{background:var(--dark)}
.btn-outline{background:none;color:#64748b;border:1px solid #d1d5db}
.plan-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;background:#EBF5FB;color:var(--blue)}

/* Dark mode */
[data-theme="dark"] body{background:var(--rdx-bg,#0f172a);color:var(--rdx-text,#e2e8f0)}
[data-theme="dark"] .card,[data-theme="dark"] .container{background:var(--rdx-bg-card,#1e293b);color:var(--rdx-text,#e2e8f0)}
[data-theme="dark"] input,[data-theme="dark"] select{background:#1e293b;color:#e2e8f0;border-color:#334155}
[data-theme="dark"] h1,[data-theme="dark"] h2,[data-theme="dark"] h3{color:var(--rdx-text,#e2e8f0)}
[data-theme="dark"] p{color:var(--rdx-text-secondary,#94a3b8)}
[data-theme="dark"] .subtitle,[data-theme="dark"] .plan-price,[data-theme="dark"] .switch{color:var(--rdx-text-muted,#64748b)}
[data-theme="dark"] label{color:#94a3b8}
[data-theme="dark"] .plan{border-color:#334155;background:#1e293b}
[data-theme="dark"] .plan.active,[data-theme="dark"] .plan:hover{background:rgba(40,116,166,.15);border-color:#5ba3cc}
[data-theme="dark"] .legal{color:#475569}
[data-theme="dark"] .badge{background:rgba(217,119,6,.15)}
[data-theme="dark"] .back{color:#5ba3cc}
</style>
<meta name="robots" content="noindex, nofollow">
</head>
<body>
<noscript><div style="padding:40px;text-align:center;font-family:sans-serif"><h2>JavaScript Required</h2><p>ReasonDx requires JavaScript to run. Please enable it in your browser.</p></div></noscript>
<a href="#main-content" class="rdx-skip-link">Skip to main content</a>
<div id="main-content"></div>
<script src="../auth/auth-guard.js"></script>
<div class="container">
  <h1>My Account</h1>
  <div class="card">
    <h2>Profile</h2>
    <label>Name</label><input type="text" id="acct-name" placeholder="Your name">
    <label>Email</label><input type="email" id="acct-email" placeholder="you@school.edu">
    <button class="btn" onclick="alert('Profile saved!')">Save Changes</button>
  </div>
  <div class="card">
    <h2>Subscription</h2>
    <p>Current plan: <span class="plan-badge">Free</span></p>
    <p style="font-size:14px;color:#64748b;margin-top:8px">Upgrade to Pro for full access to all 256 cases, AI coaching, and advanced analytics.</p>
    <button class="btn">Upgrade to Pro — $14.99/mo</button>
  </div>
  <div class="card">
    <h2>Danger Zone</h2>
    <button class="btn btn-outline" onclick="if(confirm('Log out?')){localStorage.removeItem('reasondx-user');window.location.href='register.html'}">Log Out</button>
  </div>
</div>
<script src="../js/rdx-nav.js"></script>
<script src="../js/rdx-help-widget.js"></script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('../sw.js').catch(()=>{})</script>
</body>
</html>
