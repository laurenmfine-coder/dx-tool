<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account | ReasonDx</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',-apple-system,sans-serif;background:#F8FAFC;color:#1E293B;padding-top:52px;min-height:100vh}
    .container{max-width:520px;margin:40px auto;padding:0 20px}
    h1{font-size:22px;font-weight:700;margin-bottom:24px;color:#1E293B}
    .card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:24px;margin-bottom:16px}
    .card h2{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#64748B;margin-bottom:16px}
    label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:4px}
    input{width:100%;padding:10px 14px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border .15s;margin-bottom:14px}
    input:focus{border-color:#2874A6}
    input[disabled]{background:#F8FAFC;color:#94A3B8;cursor:not-allowed}
    .btn{display:inline-block;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
    .btn-primary{background:#2874A6;color:#fff}
    .btn-primary:hover{background:#1B5E8A}
    .btn-danger{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
    .btn-danger:hover{background:#FEE2E2}
    .plan-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;background:#EBF5FB;color:#2874A6}
    .plan-badge.pro{background:#F0FDF4;color:#16A34A}
    .msg{display:none;padding:10px 14px;border-radius:8px;font-size:13px;margin-top:8px}
    .msg.success{background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0}
    .msg.error{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
  </style>
</head>
<body>
<div class="container">
  <h1>My Account</h1>

  <div class="card">
    <h2>Profile</h2>
    <label for="acct-name">Display Name</label>
    <input type="text" id="acct-name" placeholder="Your name">
    <label for="acct-email">Email</label>
    <input type="email" id="acct-email" placeholder="you@school.edu" disabled>
    <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
    <div id="save-msg" class="msg"></div>
  </div>

  <div class="card">
    <h2>Subscription</h2>
    <p>Current plan: <span id="plan-badge" class="plan-badge">Free</span></p>
    <p style="font-size:13px;color:#64748B;margin-top:8px;margin-bottom:16px">
      Free tier includes all 520 cases and all core features.
    </p>
    <a href="/pricing.html" class="btn btn-primary">View Plans</a>
  </div>

  <div class="card">
    <h2>Session</h2>
    <p style="font-size:13px;color:#64748B;margin-bottom:16px">
      Signing out will preserve your progress — it's saved to your account.
    </p>
    <button class="btn btn-danger" onclick="signOut()">Sign Out</button>
  </div>
</div>

<script src="/js/nav-global.js"></script>
<script>
(function() {
  // Load user data
  var user = {};
  try { user = JSON.parse(localStorage.getItem('reasondx-user') || '{}'); } catch(e) {}

  if (!user || !user.email) {
    window.location.replace('/auth/login.html');
    return;
  }

  // Populate fields
  var nameEl = document.getElementById('acct-name');
  var emailEl = document.getElementById('acct-email');
  if (nameEl) nameEl.value = user.name || user.displayName || '';
  if (emailEl) emailEl.value = user.email || '';

  // Show plan
  var planEl = document.getElementById('plan-badge');
  if (planEl && (user.tier === 'pro' || user.tier === 'institutional')) {
    planEl.textContent = user.tier.charAt(0).toUpperCase() + user.tier.slice(1);
    planEl.className = 'plan-badge pro';
  }
})();

function saveProfile() {
  var nameEl = document.getElementById('acct-name');
  var msgEl = document.getElementById('save-msg');
  var name = nameEl ? nameEl.value.trim() : '';

  if (!name) {
    showMsg('error', 'Please enter a display name.');
    return;
  }

  // Update localStorage
  try {
    var user = JSON.parse(localStorage.getItem('reasondx-user') || '{}');
    user.name = name;
    user.displayName = name;
    localStorage.setItem('reasondx-user', JSON.stringify(user));
    showMsg('success', 'Profile updated.');
  } catch(e) {
    showMsg('error', 'Could not save. Please try again.');
  }
}

function showMsg(type, text) {
  var msgEl = document.getElementById('save-msg');
  if (!msgEl) return;
  msgEl.className = 'msg ' + type;
  msgEl.textContent = text;
  msgEl.style.display = 'block';
  setTimeout(function() { msgEl.style.display = 'none'; }, 3000);
}

function signOut() {
  if (!confirm('Sign out of ReasonDx?')) return;
  // Clear session data (keep progress data)
  localStorage.removeItem('reasondx-user');
  localStorage.removeItem('rdx_user');
  try { sessionStorage.clear(); } catch(e) {}
  window.location.href = '/index.html';
}
</script>
</body>
</html>
