<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | ReasonDx</title>
<meta name="theme-color" content="#0f766e">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/rdx-theme.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--rdx-font);
  background: var(--rdx-bg);
  color: var(--rdx-text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.auth-card {
  background: var(--rdx-bg-card);
  border: 1px solid var(--rdx-border);
  border-radius: 20px;
  box-shadow: var(--rdx-shadow-lg);
  width: 100%;
  max-width: 420px;
  padding: 40px 36px;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo svg { height: 56px; width: auto; }
.logo-tagline {
  font-size: 14px;
  color: var(--rdx-text-muted);
  margin-top: 8px;
  font-style: italic;
}

.auth-tabs {
  display: flex;
  border: 1px solid var(--rdx-border);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 28px;
}
.auth-tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: var(--rdx-bg);
  color: var(--rdx-text-muted);
  transition: all 0.15s;
}
.auth-tab.active {
  background: var(--rdx-teal);
  color: white;
}

.form-group {
  margin-bottom: 18px;
}
.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--rdx-text-secondary);
  margin-bottom: 6px;
}
.form-group input {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--rdx-border);
  border-radius: 10px;
  font-size: 15px;
  font-family: var(--rdx-font);
  color: var(--rdx-text);
  background: var(--rdx-bg);
  transition: border-color 0.15s;
  outline: none;
}
.form-group input:focus {
  border-color: var(--rdx-teal);
  box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
}
.form-group input::placeholder {
  color: var(--rdx-text-faint);
}

.error-msg {
  display: none;
  background: var(--rdx-danger-bg);
  color: var(--rdx-danger);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
}
.error-msg.show { display: block; }

.submit-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: var(--rdx-teal);
  color: white;
  font-size: 15px;
  font-weight: 600;
  font-family: var(--rdx-font);
  cursor: pointer;
  transition: background 0.15s;
  margin-top: 4px;
}
.submit-btn:hover { background: var(--rdx-teal-dark); }
.submit-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.auth-footer {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: var(--rdx-text-muted);
}
.auth-footer a {
  color: var(--rdx-teal);
  text-decoration: none;
  font-weight: 500;
}

.page-footer {
  margin-top: 32px;
  text-align: center;
  font-size: 12px;
  color: var(--rdx-text-faint);
}
.page-footer a {
  color: var(--rdx-text-muted);
  text-decoration: none;
}
</style>
<script>
  // Apply saved theme
  (function(){
    var t = localStorage.getItem('rdx-theme') || 'light';
    if (t !== 'light' && t !== 'dark') t = 'light';
    document.documentElement.setAttribute('data-theme', t);
  })();
  // If already logged in, redirect
  (function(){
    try {
      var u = localStorage.getItem('reasondx-user');
      if (u) {
        var j = JSON.parse(u);
        if (j && j.email && j.name) {
          var dest = sessionStorage.getItem('reasondx-redirect') || '../index.html';
          sessionStorage.removeItem('reasondx-redirect');
          location.replace(dest);
        }
      }
    } catch(e) {}
  })();
</script>
</head>
<body>

<div class="auth-card">
  <!-- Logo -->
  <div class="logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 120">
      <text x="20" y="70" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="normal" fill="currentColor" letter-spacing="-1">Reason</text>
      <text x="200" y="70" font-family="Georgia, serif" font-size="58" fill="currentColor">D</text>
      <line x1="248" y1="42" x2="272" y2="72" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
      <ellipse cx="246" cy="39" rx="2.5" ry="4.5" transform="rotate(-28 246 39)" fill="currentColor"/>
      <path d="M 272 42 L 256 58 Q 250 66 250 76 Q 250 86 258 92 Q 266 98 266 108" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" fill="none"/>
      <ellipse cx="274" cy="39" rx="2.5" ry="4.5" transform="rotate(28 274 39)" fill="currentColor"/>
      <circle cx="266" cy="108" r="10" fill="none" stroke="currentColor" stroke-width="2.5"/>
      <circle cx="266" cy="108" r="5" fill="currentColor"/>
    </svg>
    <div class="logo-tagline">Asking the right questions can change everything.</div>
  </div>

  <!-- Tabs -->
  <div class="auth-tabs">
    <button class="auth-tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
    <button class="auth-tab" id="tab-signup" onclick="window.location.href='register.html'">Sign Up</button>
  </div>

  <!-- Error -->
  <div class="error-msg" id="error-msg"></div>

  <!-- Sign In Form -->
  <form id="signin-form" onsubmit="handleSignIn(event)">
    <div class="form-group">
      <label for="signin-email">Email</label>
      <input type="email" id="signin-email" placeholder="you@school.edu" required autocomplete="email">
    </div>
    <div class="form-group">
      <label for="signin-password">Password</label>
      <input type="password" id="signin-password" placeholder="Your password" required autocomplete="current-password">
    </div>
    <button type="submit" class="submit-btn" id="signin-btn">Sign In</button>
    <div class="auth-footer">
      Don't have an account? <a href="register.html">Sign up</a>
    </div>
  </form>

  <!-- Sign Up Form (hidden — redirects to register.html) -->
</div>

<div class="page-footer">
  <a href="../index.html">ReasonDx</a> &middot; Created by Lauren Fine, MD, FAAAAI
</div>

<script>
// ============================================================
// AUTH LOGIC
// ============================================================

function switchTab(tab) {
  document.getElementById('error-msg').classList.remove('show');
  if (tab === 'signup') {
    window.location.href = 'register.html';
  }
}

function showError(msg) {
  var el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}

function setAuthAndRedirect(name, email) {
  // Set the auth token that all 349+ platform pages check
  localStorage.setItem('reasondx-user', JSON.stringify({
    name: name,
    email: email,
    loginTime: Date.now()
  }));

  // Redirect to where the user was trying to go, or home
  var redirect = sessionStorage.getItem('reasondx-redirect') || '../index.html';
  sessionStorage.removeItem('reasondx-redirect');
  window.location.href = redirect;
}

// ============================================================
// SIMPLE LOCAL AUTH (no backend required)
// Stores credentials in localStorage. For production, replace
// with Firebase Auth or your backend of choice.
// ============================================================

var USERS_KEY = 'reasondx-users-db';

function getUsers() {
  try {
    return JSON.parse(localStorage.getItem(USERS_KEY) || '{}');
  } catch(e) { return {}; }
}

function saveUsers(users) {
  localStorage.setItem(USERS_KEY, JSON.stringify(users));
}

// Simple hash for password storage (NOT cryptographic — for demo only)
function simpleHash(str) {
  var hash = 0;
  for (var i = 0; i < str.length; i++) {
    var c = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + c;
    hash |= 0;
  }
  return 'h' + Math.abs(hash).toString(36);
}

function handleSignIn(e) {
  e.preventDefault();
  document.getElementById('error-msg').classList.remove('show');

  var email = document.getElementById('signin-email').value.trim().toLowerCase();
  var password = document.getElementById('signin-password').value;

  if (!email || !password) {
    showError('Please fill in all fields.');
    return;
  }

  var users = getUsers();
  var user = users[email];

  if (!user) {
    showError('No account found with that email. Please sign up first.');
    return;
  }

  if (user.hash !== simpleHash(password)) {
    showError('Incorrect password. Please try again.');
    return;
  }

  setAuthAndRedirect(user.name, email);
}
</script>
</body>
</html>
