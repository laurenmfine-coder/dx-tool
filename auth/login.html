<!DOCTYPE html>
<html data-theme="light" lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign In | ReasonDx</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bl:#2874A6;--bld:#1B4F72;--tx:#1E293B;--ts:#64748B;--bd:#E2E8F0;--bg:#F0F2F5;--sf:#fff;--ft:'IBM Plex Sans',-apple-system,sans-serif}
body{background:var(--bg);font-family:var(--ft);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:var(--sf);border:1px solid var(--bd);border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.06);width:100%;max-width:420px;padding:40px}
.logo{text-align:center;margin-bottom:32px}
.logo img{height:36px;margin-bottom:8px}
.logo h1{font-size:20px;font-weight:800;color:var(--tx)}
.logo p{font-size:13px;color:var(--ts);margin-top:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--ts);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.form-group input{width:100%;padding:10px 14px;border:1px solid var(--bd);border-radius:8px;font-size:14px;font-family:var(--ft);outline:none;transition:border-color .15s}
.form-group input:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(40,116,166,.1)}
.btn-primary{width:100%;padding:12px;background:var(--bl);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:var(--ft);cursor:pointer;transition:background .15s}
.btn-primary:hover{background:var(--bld)}.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-magic{width:100%;padding:10px;background:var(--sf);color:var(--bl);border:1px solid var(--bd);border-radius:8px;font-size:13px;font-weight:600;font-family:var(--ft);cursor:pointer;margin-top:8px;transition:all .15s}
.btn-magic:hover{border-color:var(--bl);background:#EBF5FB}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--ts);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--bd)}
.links{text-align:center;margin-top:20px;font-size:13px;color:var(--ts)}
.links a{color:var(--bl);font-weight:600;text-decoration:none}
.links a:hover{text-decoration:underline}
.error-msg{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.success-msg{background:#ECFDF5;border:1px solid #A7F3D0;color:#065F46;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
</style>
</head>
<body>
<div class="auth-card">
  <div class="logo">
    <img src="../icons/logo.png" alt="ReasonDx" onerror="this.style.display='none'">
    <h1>Sign In to ReasonDx</h1>
    <p>Clinical Reasoning Education Platform</p>
  </div>

  <div id="error" class="error-msg"></div>
  <div id="success" class="success-msg"></div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required placeholder="you@institution.edu" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required placeholder="Your password" autocomplete="current-password">
    </div>
    <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
  </form>

  <div class="divider">or</div>

  <button class="btn-magic" onclick="handleMagicLink()">✉️ Sign in with Magic Link</button>

  <div class="links">
    <p>Don't have an account? <a href="register.html">Create one</a></p>
    <p style="margin-top:8px"><a href="../index.html">← Back to ReasonDx</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/rdx-supabase.js"></script>
<script>
function showError(msg) {
  var el = document.getElementById('error');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('success').style.display = 'none';
}
function showSuccess(msg) {
  var el = document.getElementById('success');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('error').style.display = 'none';
}

async function handleLogin(e) {
  e.preventDefault();
  var email = document.getElementById('email').value;
  var password = document.getElementById('password').value;
  var btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in...';

  var result = await RDX.auth.signIn(email, password);
  if (result.error) {
    showError(result.error.message);
    btn.disabled = false; btn.textContent = 'Sign In';
  } else {
    showSuccess('Signed in! Redirecting...');
    setTimeout(function() {
      window.location.href = '../dashboard.html';
    }, 500);
  }
}

async function handleMagicLink() {
  var email = document.getElementById('email').value;
  if (!email) { showError('Enter your email address first.'); return; }

  var result = await RDX.auth.signInWithMagicLink(email);
  if (result.error) {
    showError(result.error.message);
  } else {
    showSuccess('Check your email! We sent you a sign-in link.');
  }
}

// If already logged in, redirect
(async function() {
  var session = await RDX.auth.getSession();
  if (session) window.location.href = '../dashboard.html';
})();
</script>
</body>
</html>
