<!DOCTYPE html>
<html lang="en">
<head>
<script src="/js/rdx-config.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — ReasonDx</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<meta property="og:title" content="Sign In | ReasonDx">
<meta name="description" content="Sign in or create a free ReasonDx account to save your progress and Reasoning Fingerprint.">
<link rel="canonical" href="https://www.reasondx.com/auth/login.html">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060a10;--card:#0c1118;--border:rgba(255,255,255,.06);--border-hi:rgba(255,255,255,.12);
  --text:#e0e0e0;--dim:rgba(255,255,255,.45);--dim2:rgba(255,255,255,.25);
  --blue:#2874A6;--blue-bg:rgba(40,116,166,.08);--blue-bd:rgba(40,116,166,.2);
  --blue-light:#5BA8D0;--error:#EF4444;--success:#10B981;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* Ambient background */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 40%,rgba(40,116,166,.07) 0%,transparent 70%);pointer-events:none}

/* Back link */
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--dim);text-decoration:none;margin-bottom:24px;transition:color .15s;position:relative;z-index:1}
.back:hover{color:var(--text)}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;width:100%;max-width:420px;overflow:hidden;position:relative;z-index:1}
.card-hdr{padding:32px 32px 20px;text-align:center;border-bottom:1px solid var(--border)}
.logo-mark{width:44px;height:44px;background:var(--blue);border-radius:11px;display:inline-flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:18px;color:#fff;font-weight:400;margin-bottom:16px}
.card-title{font-family:'DM Serif Display',serif;font-size:24px;font-weight:400;color:#fff;margin-bottom:6px}
.card-sub{font-size:13px;color:var(--dim);line-height:1.5}
.card-body{padding:24px 32px 28px}
.card-ftr{padding:16px 32px;border-top:1px solid var(--border);text-align:center;font-size:12px;color:var(--dim2)}
.card-ftr a{color:var(--dim);text-decoration:none}
.card-ftr a:hover{color:var(--text)}

/* Mode toggle (Sign in / Sign up) */
.mode-toggle{display:flex;background:rgba(255,255,255,.04);border-radius:10px;padding:3px;margin-bottom:20px;gap:2px}
.mode-btn{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;transition:all .15s;color:var(--dim);border:none;background:transparent;font-family:inherit}
.mode-btn.active{background:var(--blue);color:#fff}

/* Primary Google button */
.btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px 20px;background:#fff;color:#1a1a1a;font-size:15px;font-weight:600;font-family:inherit;border:none;border-radius:12px;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.btn-google:hover{background:#f5f5f5;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.15)}
.btn-google:active{transform:translateY(0)}
.btn-google:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* Divider */
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--dim2);font-size:11px;text-transform:uppercase;letter-spacing:.08em}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* Fields */
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.field input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:16px;font-family:inherit;color:var(--text);outline:none;transition:all .15s}
.field input:focus{border-color:rgba(40,116,166,.5);background:rgba(255,255,255,.06);box-shadow:0 0 0 3px rgba(40,116,166,.1)}
.field input::placeholder{color:var(--dim2)}

/* Buttons */
.btn-primary{width:100%;padding:13px;background:var(--blue);color:#fff;font-size:14px;font-weight:700;font-family:inherit;border:none;border-radius:10px;cursor:pointer;transition:all .15s;margin-top:4px}
.btn-primary:hover{background:#1B4F72;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

.btn-text{background:none;border:none;color:var(--dim);font-size:12px;font-family:inherit;cursor:pointer;padding:4px;text-decoration:underline;text-underline-offset:2px}
.btn-text:hover{color:var(--text)}

/* Magic-link collapse */
.magic-wrap{margin-top:10px;text-align:center}
.magic-form{display:none;margin-top:10px;padding:14px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:10px}
.magic-form.open{display:block}

/* Messages */
.msg{padding:10px 14px;border-radius:9px;font-size:13px;margin-bottom:14px;display:none;line-height:1.4}
.msg.show{display:block}
.msg-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#FCA5A5}
.msg-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6EE7B7}
.msg-info{background:var(--blue-bg);border:1px solid var(--blue-bd);color:var(--blue-light)}

/* Forgot link */
.forgot-row{text-align:right;margin-top:4px}
.forgot-row a{font-size:12px;color:var(--dim);text-decoration:none}
.forgot-row a:hover{color:var(--text);text-decoration:underline}

/* Spinner */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,.2);border-top-color:#1a1a1a;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px}
.btn-primary .spinner{border-color:rgba(255,255,255,.3);border-top-color:#fff}
@keyframes spin{to{transform:rotate(360deg)}}

/* Small print */
.legal{margin-top:14px;font-size:11px;color:var(--dim2);text-align:center;line-height:1.5}
.legal a{color:var(--dim);text-decoration:underline;text-underline-offset:2px}
</style>
<script src="/js/rdx-kb-click.js"></script>
</head>
<body>

<a class="back" href="../index.html">← Back to ReasonDx</a>

<div class="card">
  <div class="card-hdr">
    <div class="logo-mark">Rx</div>
    <div class="card-title" id="cardTitle">Welcome back</div>
    <div class="card-sub" id="cardSub">Sign in to save your progress and Reasoning Fingerprint</div>
  </div>

  <div class="card-body">

    <div class="mode-toggle" role="tablist">
      <button class="mode-btn active" id="modeSignIn" onclick="setMode('signin')" type="button">Sign in</button>
      <button class="mode-btn" id="modeSignUp" onclick="setMode('signup')" type="button">Create account</button>
    </div>

    <div class="msg msg-error" id="msgError"></div>
    <div class="msg msg-success" id="msgSuccess"></div>
    <div class="msg msg-info" id="msgInfo"></div>

    <button class="btn-google" id="btnGoogle" type="button" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
        <path d="M3.964 10.706A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.962L3.964 6.294C4.672 4.169 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      <span id="btnGoogleLabel">Continue with Google</span>
    </button>

    <div class="divider">or</div>

    <div id="formSignIn">
      <div class="field">
        <label for="siEmail">Email</label>
        <input type="email" id="siEmail" placeholder="you@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="siPassword">Password</label>
        <input type="password" id="siPassword" placeholder="••••••••" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')doSignIn()">
        <div class="forgot-row"><a role="button" tabindex="0" onkeydown="rdxKbClick(event)" href="#" onclick="doForgotPassword();return false">Forgot password?</a></div>
      </div>
      <button class="btn-primary" id="btnSignIn" type="button" onclick="doSignIn()">Sign In</button>

      <div class="magic-wrap">
        <button class="btn-text" type="button" onclick="toggleMagic()">Email me a sign-in link instead</button>
      </div>
    </div>

    <div id="formSignUp" style="display:none">
      <div class="field">
        <label for="suEmail">Email</label>
        <input type="email" id="suEmail" placeholder="you@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label for="suPassword">Password</label>
        <input type="password" id="suPassword" placeholder="Minimum 8 characters" autocomplete="new-password"
          onkeydown="if(event.key==='Enter')doSignUp()">
      </div>
      <button class="btn-primary" id="btnSignUp" type="button" onclick="doSignUp()">Create free account</button>

      <div class="legal">
        By creating an account you agree to our
        <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a>.
      </div>
    </div>

    <div class="magic-form" id="magicForm">
      <div class="field" style="margin-bottom:10px">
        <label for="mlEmail">Email for sign-in link</label>
        <input type="email" id="mlEmail" placeholder="you@email.com" autocomplete="email"
          onkeydown="if(event.key==='Enter')doMagicLink()">
      </div>
      <button class="btn-primary" id="btnMagic" type="button" onclick="doMagicLink()">Send link</button>
    </div>

  </div>

  <div class="card-ftr">
    No account required to try ReasonDx — <a href="../index.html">continue as guest</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/rdx-supabase.js"></script>
<script>
/* ── CONFIG ── */
var SUPABASE_URL  = (window.RDX_CONFIG && window.RDX_CONFIG.SUPABASE_URL)  || 'https://lpwbiqpojisqgezycupw.supabase.co';
var SUPABASE_ANON = (window.RDX_CONFIG && window.RDX_CONFIG.SUPABASE_ANON_KEY) || '';

var _sb = null;
function getSB() {
  if (_sb) return _sb;
  if (window._rdxSbClient) { _sb = window._rdxSbClient; return _sb; }
  if (window.supabase && window.supabase.createClient) {
    _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
  }
  return _sb;
}

/* ── REDIRECT TARGET (preserves ?next=) ── */
function getRedirectTarget() {
  var p = new URLSearchParams(window.location.search);
  var next = p.get('next');
  if (!next) return '../index.html';
  // Only allow same-origin redirects
  try {
    var u = new URL(next, window.location.origin);
    if (u.origin === window.location.origin) return u.pathname + u.search + u.hash;
  } catch(e) {}
  return '../index.html';
}

/* Build a redirectTo URL that preserves ?next= through the OAuth round-trip */
function authRedirectUrl() {
  var next = new URLSearchParams(window.location.search).get('next');
  var base = window.location.origin + window.location.pathname;
  return next ? (base + '?next=' + encodeURIComponent(next)) : base;
}

/* ── LOCALSTORAGE BRIDGE (other pages read these keys) ── */
function bridgeSession(session) {
  if (!session || !session.user) return;
  try {
    var u = session.user;
    var displayName = (u.user_metadata && u.user_metadata.full_name)
                   || (u.user_metadata && u.user_metadata.name)
                   || (u.email ? u.email.split('@')[0] : 'User');
    localStorage.setItem('reasondx-user', JSON.stringify({
      email: u.email,
      name: displayName,
      supabaseId: u.id,
      lastLogin: new Date().toISOString()
    }));
    localStorage.setItem('vemr-session', JSON.stringify({
      displayName: displayName,
      email: u.email
    }));
  } catch(e) {}
}

/* ── UI HELPERS ── */
function showMsg(type, text) {
  ['Error','Success','Info'].forEach(function(t) {
    var el = document.getElementById('msg' + t);
    if (el) { el.classList.remove('show'); el.textContent = ''; }
  });
  if (!text) return;
  var el = document.getElementById('msg' + type);
  if (el) { el.textContent = text; el.classList.add('show'); }
}

function setLoading(btnId, loading, label) {
  var btn = document.getElementById(btnId);
  if (!btn) return;
  btn.disabled = loading;
  if (loading) {
    btn.innerHTML = '<span class="spinner"></span>' + label;
  } else {
    btn.textContent = label;
  }
}

/* ── MODE TOGGLE ── */
function setMode(mode) {
  var isSignIn = mode === 'signin';
  document.getElementById('modeSignIn').classList.toggle('active', isSignIn);
  document.getElementById('modeSignUp').classList.toggle('active', !isSignIn);
  document.getElementById('formSignIn').style.display = isSignIn ? '' : 'none';
  document.getElementById('formSignUp').style.display = isSignIn ? 'none' : '';
  document.getElementById('cardTitle').textContent = isSignIn ? 'Welcome back' : 'Create your account';
  document.getElementById('cardSub').textContent = isSignIn
    ? 'Sign in to save your progress and Reasoning Fingerprint'
    : 'Free — no credit card, all cases unlocked';
  document.getElementById('btnGoogleLabel').textContent = isSignIn
    ? 'Continue with Google'
    : 'Sign up with Google';
  // Close magic form when switching modes
  document.getElementById('magicForm').classList.remove('open');
  showMsg('Error', '');
}

/* ── MAGIC LINK TOGGLE ── */
function toggleMagic() {
  var el = document.getElementById('magicForm');
  el.classList.toggle('open');
  if (el.classList.contains('open')) {
    var ml = document.getElementById('mlEmail');
    var si = document.getElementById('siEmail');
    if (si && si.value && ml && !ml.value) ml.value = si.value;
    if (ml) ml.focus();
  }
}

/* ── GOOGLE ── */
async function signInGoogle() {
  var sb = getSB();
  if (!sb) { showMsg('Error', 'Auth service unavailable. Please refresh and try again.'); return; }

  var btn = document.getElementById('btnGoogle');
  btn.disabled = true;
  document.getElementById('btnGoogleLabel').innerHTML = '<span class="spinner"></span>Redirecting…';

  try {
    var res = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: authRedirectUrl(),
        queryParams: { access_type: 'offline', prompt: 'select_account' }
      }
    });
    if (res.error) throw res.error;
    // Supabase performs the redirect
  } catch (err) {
    btn.disabled = false;
    document.getElementById('btnGoogleLabel').textContent = 'Continue with Google';
    var msg = (err && err.message) ? err.message : 'Google sign-in failed. Please try again.';
    if (/provider.*not.*enabled/i.test(msg)) {
      msg = 'Google sign-in is temporarily unavailable. Use email below to sign in.';
    }
    showMsg('Error', msg);
  }
}

/* ── EMAIL SIGN IN ── */
async function doSignIn() {
  var sb = getSB();
  if (!sb) { showMsg('Error', 'Auth service unavailable.'); return; }

  var email = (document.getElementById('siEmail').value || '').trim();
  var password = document.getElementById('siPassword').value;

  if (!email) { showMsg('Error', 'Please enter your email.'); return; }
  if (!password) { showMsg('Error', 'Please enter your password.'); return; }

  setLoading('btnSignIn', true, 'Signing in…');

  try {
    var res = await sb.auth.signInWithPassword({ email: email, password: password });
    if (res.error) throw res.error;
    if (res.data && res.data.session) {
      bridgeSession(res.data.session);
      window.location.href = getRedirectTarget();
      return;
    }
    showMsg('Error', 'Unexpected response. Please try again.');
    setLoading('btnSignIn', false, 'Sign In');
  } catch (err) {
    setLoading('btnSignIn', false, 'Sign In');
    var m = err && err.message ? err.message : 'Sign-in failed.';
    if (/invalid login/i.test(m)) m = 'Incorrect email or password.';
    if (/email not confirmed/i.test(m)) m = 'Please confirm your email first — check your inbox.';
    showMsg('Error', m);
  }
}

/* ── EMAIL SIGN UP (no name required) ── */
async function doSignUp() {
  var sb = getSB();
  if (!sb) { showMsg('Error', 'Auth service unavailable.'); return; }

  var email = (document.getElementById('suEmail').value || '').trim();
  var password = document.getElementById('suPassword').value;

  if (!email) { showMsg('Error', 'Please enter your email.'); return; }
  if (!password || password.length < 8) { showMsg('Error', 'Password must be at least 8 characters.'); return; }

  setLoading('btnSignUp', true, 'Creating account…');

  try {
    var res = await sb.auth.signUp({
      email: email,
      password: password,
      options: {
        emailRedirectTo: authRedirectUrl()
      }
    });
    if (res.error) throw res.error;

    if (res.data && res.data.session) {
      // Auto-confirmed: straight in
      bridgeSession(res.data.session);
      window.location.href = getRedirectTarget();
      return;
    }
    if (res.data && res.data.user) {
      setLoading('btnSignUp', false, 'Create free account');
      showMsg('Success', '✓ Check your email to confirm your account, then sign in.');
      return;
    }
    setLoading('btnSignUp', false, 'Create free account');
    showMsg('Error', 'Could not create account. Please try again.');
  } catch (err) {
    setLoading('btnSignUp', false, 'Create free account');
    var m = err && err.message ? err.message : 'Sign-up failed.';
    if (/already registered|user already/i.test(m)) m = 'That email already has an account — try signing in.';
    showMsg('Error', m);
  }
}

/* ── MAGIC LINK ── */
async function doMagicLink() {
  var sb = getSB();
  if (!sb) { showMsg('Error', 'Auth service unavailable.'); return; }

  var mlEl = document.getElementById('mlEmail');
  var siEl = document.getElementById('siEmail');
  var email = ((mlEl && mlEl.value) || (siEl && siEl.value) || '').trim();
  if (!email) { showMsg('Error', 'Enter your email first.'); if (mlEl) mlEl.focus(); return; }

  setLoading('btnMagic', true, 'Sending…');

  try {
    var res = await sb.auth.signInWithOtp({
      email: email,
      options: { emailRedirectTo: authRedirectUrl() }
    });
    if (res.error) throw res.error;
    setLoading('btnMagic', false, 'Send link');
    showMsg('Success', '✓ Check your email for a sign-in link.');
  } catch (err) {
    setLoading('btnMagic', false, 'Send link');
    showMsg('Error', (err && err.message) || 'Could not send link.');
  }
}

/* ── FORGOT PASSWORD ── */
async function doForgotPassword() {
  var email = (document.getElementById('siEmail').value || '').trim();
  if (!email) {
    showMsg('Info', 'Enter your email above, then click "Forgot password?" again.');
    document.getElementById('siEmail').focus();
    return;
  }

  var sb = getSB();
  if (!sb) { showMsg('Error', 'Auth service unavailable.'); return; }

  setLoading('btnSignIn', true, 'Sending reset email…');

  try {
    var res = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/auth/reset-password.html'
    });
    setLoading('btnSignIn', false, 'Sign In');
    if (res.error) throw res.error;
    showMsg('Success', '✓ Password reset email sent. Check your inbox.');
  } catch (err) {
    setLoading('btnSignIn', false, 'Sign In');
    showMsg('Error', (err && err.message) || 'Could not send reset email.');
  }
}

/* ── OAUTH CALLBACK / EXISTING SESSION ── */
async function handleLoadState() {
  var sb = getSB();
  if (!sb) return;

  var hasHashToken = window.location.hash.indexOf('access_token') !== -1;
  var hasCodeParam = window.location.search.indexOf('code=') !== -1;

  async function check() {
    var r = await sb.auth.getSession();
    if (r.data && r.data.session) {
      bridgeSession(r.data.session);
      window.location.href = getRedirectTarget();
      return true;
    }
    return false;
  }

  if (hasHashToken || hasCodeParam) {
    // Brief retry loop — lets supabase-js parse the hash/code on return
    for (var i = 0; i < 5; i++) {
      if (await check()) return;
      await new Promise(function(r){ setTimeout(r, 150); });
    }
    if (hasHashToken) history.replaceState(null, '', window.location.pathname + window.location.search);
    showMsg('Error', 'We could not complete sign-in. Please try again.');
    return;
  }

  // Otherwise, bounce already-signed-in users to their destination
  await check();
}

window.addEventListener('load', handleLoadState);
</script>
</body>
</html>
