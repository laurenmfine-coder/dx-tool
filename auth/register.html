<!DOCTYPE html>
<html data-theme="light" lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Create Account | ReasonDx</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bl:#2874A6;--bld:#1B4F72;--tx:#1E293B;--ts:#64748B;--bd:#E2E8F0;--bg:#F0F2F5;--sf:#fff;--ft:'IBM Plex Sans',-apple-system,sans-serif}
body{background:var(--bg);font-family:var(--ft);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-card{background:var(--sf);border:1px solid var(--bd);border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.06);width:100%;max-width:420px;padding:40px}
.logo{text-align:center;margin-bottom:32px}
.logo img{height:36px;margin-bottom:8px}
.logo h1{font-size:20px;font-weight:800;color:var(--tx)}
.logo p{font-size:13px;color:var(--ts);margin-top:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--ts);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.form-group input,.form-group select{width:100%;padding:10px 14px;border:1px solid var(--bd);border-radius:8px;font-size:16px;font-family:var(--ft);outline:none;transition:border-color .15s;background:var(--sf)}
.form-group input:focus,.form-group select:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(40,116,166,.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-primary{width:100%;padding:12px;background:var(--bl);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:var(--ft);cursor:pointer;transition:background .15s}
.btn-primary:hover{background:var(--bld)}.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.links{text-align:center;margin-top:20px;font-size:13px;color:var(--ts)}
.links a{color:var(--bl);font-weight:600;text-decoration:none}
.error-msg{background:#FEF2F2;border:1px solid #FECACA;color:#991B1B;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.success-msg{background:#ECFDF5;border:1px solid #A7F3D0;color:#065F46;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.tier-note{font-size:11px;color:var(--ts);text-align:center;margin-top:12px;line-height:1.5}
</style>
<meta property="og:title" content="Create Account | ReasonDx">
<meta name="description" content="Create a free ReasonDx account. Access 394 clinical reasoning cases and AI-powered coaching across 11 health professions. Free forever.">
<link rel="canonical" href="https://www.reasondx.com/auth/register.html">
</head>
<body>
<div class="auth-card">
  <div class="logo">
    <img src="../icons/logo-web.jpg" alt="ReasonDx" onerror="this.style.display='none'">
    <h1>Create Your Account</h1>
    <p>Start building clinical reasoning skills today</p>
  </div>

  <div id="error" class="error-msg"></div>
  <div id="success" class="success-msg"></div>

  <form id="registerForm" onsubmit="handleRegister(event)">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="displayName" required placeholder="e.g., Sarah Chen, MD">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required placeholder="you@institution.edu" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required placeholder="Min 8 characters" minlength="8" autocomplete="new-password">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Role</label>
        <select id="role">
          <option value="fellow">Fellow / Resident</option>
          <option value="faculty">Faculty</option>
          <option value="program_director">Program Director</option>
        </select>
      </div>
      <div class="form-group">
        <label>PGY Level</label>
        <select id="pgy">
          <option value="">N/A</option>
          <option value="1">PGY-1</option>
          <option value="2">PGY-2</option>
          <option value="3">PGY-3</option>
          <option value="4">PGY-4</option>
          <option value="5">PGY-5</option>
          <option value="6">PGY-6</option>
          <option value="7">PGY-7</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Program Code <span style="font-weight:400;text-transform:none">(optional — from your PD)</span></label>
      <input type="text" id="programCode" placeholder="e.g., REF-AI2026">
    </div>
    <button type="submit" class="btn-primary" id="registerBtn">Create Account</button>
  </form>

  <div class="tier-note">
    Free tier includes select cases and tools.<br>
    Pro features unlock at $14.99/mo or $99/year.
  </div>

  <div class="links">
    <p>Already have an account? <a href="login.html">Sign in</a></p>
    <p style="margin-top:8px"><a href="../index.html">← Back to ReasonDx</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/rdx-supabase.js"></script>
<script>
function showError(msg) {
  var el = document.getElementById('error');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('success').style.display = 'none';
}
function showSuccess(msg) {
  var el = document.getElementById('success');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('error').style.display = 'none';
}

async function handleRegister(e) {
  e.preventDefault();
  var btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.textContent = 'Creating account...';

  var displayName = document.getElementById('displayName').value;
  var email = document.getElementById('email').value;
  var password = document.getElementById('password').value;
  var role = document.getElementById('role').value;
  var pgy = document.getElementById('pgy').value;

  var result = await RDX.auth.signUp(email, password, {
    display_name: displayName,
    role: role,
    pgy_level: pgy ? parseInt(pgy) : null
  });

  if (result.error) {
    showError(result.error.message);
    btn.disabled = false; btn.textContent = 'Create Account';
  } else {
    showSuccess('Account created! Check your email to confirm, then sign in.');
    document.getElementById('registerForm').style.display = 'none';
    if (window.RDX_ProfessionOnboardingModal) {
      setTimeout(function() {
        var modal = new RDX_ProfessionOnboardingModal({
          allowSkip: true,
          onComplete: function(profile) {
            if (profile) profile.save();
            setTimeout(function() { window.location.href = '/browse.html'; }, 400);
          },
          onSkip: function() {
            setTimeout(function() { window.location.href = '/browse.html'; }, 200);
          }
        });
        modal.inject();
      }, 800);
    } else {
      // No profession modal — redirect directly
      setTimeout(function() { window.location.href = '/browse.html'; }, 1500);
    }
  }
}

</script>
<script src="/rdx-profession-onboarding.js"></script>
</body>
</html>
