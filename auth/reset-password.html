<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | ReasonDx</title>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-EKCVJ1SMN3"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag("js",new Date());gtag("config","G-EKCVJ1SMN3");</script>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/rdx-theme.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #f0f6fc;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(40,116,166,0.12);
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 420px;
  }
  .logo { text-align: center; margin-bottom: 1.5rem; }
  .logo span { font-size: 1.1rem; font-weight: 700; color: #2874A6; letter-spacing: 1px; }
  h1 { font-size: 1.5rem; font-weight: 700; color: #1A5276; margin-bottom: 0.5rem; text-align: center; }
  p.sub { color: #666; font-size: 0.9rem; text-align: center; margin-bottom: 1.75rem; }
  .field { margin-bottom: 1rem; }
  label { display: block; font-size: 0.85rem; font-weight: 600; color: #444; margin-bottom: 6px; }
  input[type="password"] {
    width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0;
    border-radius: 10px; font-family: inherit; font-size: 1rem;
    transition: border-color 0.2s; outline: none;
  }
  input[type="password"]:focus { border-color: #2874A6; }
  .btn {
    width: 100%; padding: 14px; background: #2874A6; color: white;
    border: none; border-radius: 10px; font-family: inherit;
    font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 0.5rem;
    transition: background 0.2s;
  }
  .btn:hover { background: #1A5276; }
  .btn:disabled { background: #aac4da; cursor: not-allowed; }
  .msg { margin-top: 1rem; padding: 12px; border-radius: 8px; font-size: 0.9rem; text-align: center; display: none; }
  .msg.success { background: #eafaf1; color: #1e8449; border: 1px solid #a9dfbf; }
  .msg.error   { background: #fdf2f2; color: #c0392b; border: 1px solid #f5c6cb; }
  .strength-bar { height: 4px; border-radius: 2px; background: #e0e0e0; margin-top: 6px; overflow: hidden; }
  .strength-fill { height: 100%; width: 0%; border-radius: 2px; transition: width 0.3s, background 0.3s; }
  .strength-hint { font-size: 0.75rem; color: #888; margin-top: 4px; }
  .back-link { text-align: center; margin-top: 1.25rem; font-size: 0.85rem; }
  .back-link a { color: #2874A6; text-decoration: none; font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span>REASONDX</span></div>
  <h1>Set New Password</h1>
  <p class="sub">Choose a strong password for your account.</p>

  <div class="field">
    <label for="new-password">New Password</label>
    <input type="password" id="new-password" placeholder="At least 8 characters" oninput="checkStrength(this.value)">
    <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
    <div class="strength-hint" id="strength-hint"></div>
  </div>
  <div class="field">
    <label for="confirm-password">Confirm Password</label>
    <input type="password" id="confirm-password" placeholder="Repeat your new password">
  </div>

  <button class="btn" id="submit-btn" onclick="submitReset()">Update Password</button>
  <div class="msg" id="msg"></div>
  <div class="back-link"><a href="login.html">← Back to Sign In</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="auth-system.js"></script>
<script>
  function checkStrength(val) {
    const fill = document.getElementById('strength-fill');
    const hint = document.getElementById('strength-hint');
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const colors = ['#e74c3c','#e67e22','#f1c40f','#1abc9c'];
    const labels = ['Too short','Weak','Fair','Strong'];
    fill.style.width = (score * 25) + '%';
    fill.style.background = colors[score - 1] || '#e0e0e0';
    hint.textContent = score > 0 ? labels[score - 1] : '';
  }

  async function submitReset() {
    const pwd  = document.getElementById('new-password').value;
    const conf = document.getElementById('confirm-password').value;
    const btn  = document.getElementById('submit-btn');
    const msg  = document.getElementById('msg');

    msg.style.display = 'none';
    if (pwd.length < 8) return showMsg('Password must be at least 8 characters.', 'error');
    if (pwd !== conf)  return showMsg('Passwords do not match.', 'error');

    btn.disabled = true;
    btn.textContent = 'Updating…';

    try {
      const { error } = await window.RdxAuth.updatePassword(pwd);
      if (error) throw new Error(error);
      showMsg('Password updated! Redirecting to sign in…', 'success');
      setTimeout(() => window.location.href = 'login.html', 2000);
    } catch(e) {
      showMsg(e.message || 'Something went wrong. Please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Update Password';
    }
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
    el.style.display = 'block';
  }
</script>
</body>
</html>
