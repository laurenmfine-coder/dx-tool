    <script>
    const questions = [
        // CRYSTAL ARTHROPATHIES
        {
            id: 'MSK-001',
            domains: ['Rheumatology', 'Pathophysiology'],
            conceptId: 'PP-GOUT-1',
            vignette: 'A 58-year-old man with obesity and hypertension presents with acute onset of severe pain, swelling, and redness of his right first metatarsophalangeal joint. He had a similar episode 6 months ago that resolved spontaneously. He drinks 2-3 beers daily.',
            question: 'Which crystal would most likely be seen on polarized microscopy of joint aspirate?',
            options: [
                { id: 'A', text: 'Needle-shaped, negatively birefringent crystals', correct: true },
                { id: 'B', text: 'Rhomboid-shaped, positively birefringent crystals', correct: false },
                { id: 'C', text: 'Needle-shaped, positively birefringent crystals', correct: false },
                { id: 'D', text: 'No crystals visible', correct: false },
                { id: 'E', text: 'Rectangular crystals with notched corners', correct: false }
            ],
            explanation: 'This is classic podagra (gout of the first MTP joint). Monosodium urate (MSU) crystals are needle-shaped and negatively birefringent (yellow when parallel to the slow axis of the compensator). Risk factors include male sex, obesity, alcohol (especially beer), hypertension, and diuretic use. Calcium pyrophosphate (CPPD/pseudogout) crystals are rhomboid and positively birefringent (blue when parallel). Gout typically affects the first MTP, while CPPD commonly affects the knee and wrist.',
            reference: 'Dalbeth N, et al. Gout. Lancet. 2016;388(10055):2039-2052. [Open Access via PubMed Central]'
        },
        {
            id: 'MSK-002',
            domains: ['Pharmacology', 'Rheumatology'],
            conceptId: 'PH-GOUT-MGMT',
            vignette: 'The same patient from the previous question is started on therapy for his acute gout flare. Three days later, his pain has improved significantly.',
            question: 'Which medication is CONTRAINDICATED for acute gout prophylaxis when initiating urate-lowering therapy?',
            options: [
                { id: 'A', text: 'Colchicine 0.6 mg daily', correct: false },
                { id: 'B', text: 'Naproxen 250 mg twice daily', correct: false },
                { id: 'C', text: 'Prednisone 5 mg daily', correct: false },
                { id: 'D', text: 'Allopurinol 100 mg daily without prophylaxis', correct: true },
                { id: 'E', text: 'Febuxostat with colchicine', correct: false }
            ],
            explanation: 'Starting urate-lowering therapy (allopurinol, febuxostat) WITHOUT anti-inflammatory prophylaxis can precipitate acute gout flares due to rapid changes in serum urate levels mobilizing crystals. Guidelines recommend continuing prophylaxis (colchicine, NSAIDs, or low-dose prednisone) for 3-6 months when starting urate-lowering therapy. Allopurinol should be started at low doses (100 mg) and titrated slowly. The target serum urate is <6 mg/dL (or <5 mg/dL in tophaceous gout).',
            reference: 'FitzGerald JD, et al. 2020 ACR Guideline for Management of Gout. Arthritis Care Res. 2020;72(6):744-760.'
        },
        {
            id: 'MSK-003',
            domains: ['Rheumatology', 'Radiology'],
            conceptId: 'PP-CPPD-1',
            vignette: 'A 72-year-old woman presents with acute knee pain and swelling. She has a history of hypothyroidism and hemochromatosis. X-ray shows linear calcification in the meniscal cartilage. Joint aspirate shows rhomboid crystals.',
            question: 'Which condition is NOT associated with calcium pyrophosphate deposition disease (CPPD)?',
            options: [
                { id: 'A', text: 'Hemochromatosis', correct: false },
                { id: 'B', text: 'Hyperparathyroidism', correct: false },
                { id: 'C', text: 'Hypothyroidism', correct: false },
                { id: 'D', text: 'Hyperthyroidism', correct: true },
                { id: 'E', text: 'Hypomagnesemia', correct: false }
            ],
            explanation: 'CPPD (pseudogout) is associated with the "5 Hs": Hemochromatosis, Hyperparathyroidism, Hypothyroidism, Hypophosphatasia, and Hypomagnesemia. Hyperthyroidism is NOT associated. Chondrocalcinosis (cartilage calcification) on X-ray is characteristic. CPPD commonly affects large joints (knee, wrist, shoulder) and can mimic gout, RA, or OA. Unlike gout, CPPD crystals are positively birefringent (blue when parallel to compensator axis). Treatment of acute attacks is similar to gout (NSAIDs, colchicine, steroids).',
            reference: 'Rosenthal AK, Ryan LM. Calcium Pyrophosphate Deposition Disease. N Engl J Med. 2016;374(26):2575-2584.'
        },
        // INFLAMMATORY ARTHRITIS
        {
            id: 'MSK-004',
            domains: ['Rheumatology', 'Immunology'],
            conceptId: 'PP-RA-1',
            vignette: 'A 45-year-old woman presents with 3 months of symmetric joint pain and swelling affecting her wrists, MCPs, and PIPs bilaterally. She has morning stiffness lasting 2 hours. Labs show positive RF and anti-CCP antibodies.',
            question: 'What is the primary mechanism of joint destruction in rheumatoid arthritis?',
            options: [
                { id: 'A', text: 'Crystal deposition in synovium', correct: false },
                { id: 'B', text: 'Pannus formation with inflammatory cytokine-mediated erosion', correct: true },
                { id: 'C', text: 'Avascular necrosis of subchondral bone', correct: false },
                { id: 'D', text: 'Mechanical wear of articular cartilage', correct: false },
                { id: 'E', text: 'Bacterial infection of joint space', correct: false }
            ],
            explanation: 'RA involves synovial inflammation leading to pannus formation - a proliferative, invasive tissue composed of fibroblast-like synoviocytes, macrophages, and inflammatory cells. The pannus produces cytokines (TNF-α, IL-1, IL-6) and matrix metalloproteinases that erode cartilage and bone. This differs from OA (mechanical wear), gout (crystal-induced), and septic arthritis (infection). Anti-CCP antibodies are highly specific for RA and associated with more erosive disease. Early DMARD therapy (methotrexate) prevents irreversible joint damage.',
            reference: 'McInnes IB, Schett G. Pathogenetic insights from the treatment of rheumatoid arthritis. Lancet. 2017;389(10086):2328-2337.'
        },
        {
            id: 'MSK-005',
            domains: ['Rheumatology', 'Clinical Medicine'],
            conceptId: 'PP-SPONDY-1',
            vignette: 'A 28-year-old man presents with 6 months of low back pain and stiffness that is worse in the morning and improves with exercise. He also reports heel pain. HLA-B27 is positive. X-ray of the sacroiliac joints shows bilateral sacroiliitis.',
            question: 'Which extraarticular manifestation is MOST commonly associated with this condition?',
            options: [
                { id: 'A', text: 'Anterior uveitis', correct: true },
                { id: 'B', text: 'Pleuritis', correct: false },
                { id: 'C', text: 'Malar rash', correct: false },
                { id: 'D', text: 'Subcutaneous nodules', correct: false },
                { id: 'E', text: 'Raynaud phenomenon', correct: false }
            ],
            explanation: 'This patient has ankylosing spondylitis (AS), a seronegative spondyloarthropathy. Anterior uveitis (iritis) occurs in 25-40% of AS patients and is the most common extraarticular manifestation. Other associations include aortitis, cardiac conduction abnormalities, apical pulmonary fibrosis, and inflammatory bowel disease. Enthesitis (heel pain from Achilles or plantar fascia inflammation) is characteristic. Inflammatory back pain criteria: age <40, insidious onset, improves with exercise, no improvement with rest, night pain. HLA-B27 is positive in >90% of AS patients.',
            reference: 'Sieper J, Poddubnyy D. Axial spondyloarthritis. Lancet. 2017;390(10089):73-84.'
        },
        // OSTEOARTHRITIS
        {
            id: 'MSK-006',
            domains: ['Rheumatology', 'Anatomy'],
            conceptId: 'PP-OA-1',
            vignette: 'A 65-year-old overweight woman presents with bilateral knee pain that worsens with activity and improves with rest. She has no morning stiffness. Physical exam shows bony enlargement at the DIP joints and crepitus with knee flexion.',
            question: 'Which joints are typically SPARED in primary osteoarthritis?',
            options: [
                { id: 'A', text: 'Distal interphalangeal (DIP) joints', correct: false },
                { id: 'B', text: 'First carpometacarpal (CMC) joint', correct: false },
                { id: 'C', text: 'Metacarpophalangeal (MCP) joints', correct: true },
                { id: 'D', text: 'Hip joints', correct: false },
                { id: 'E', text: 'Knee joints', correct: false }
            ],
            explanation: 'Primary OA typically affects weight-bearing joints (knees, hips), the spine, DIPs (Heberden nodes), PIPs (Bouchard nodes), and the first CMC joint (thumb base). MCPs are characteristically SPARED in OA but commonly affected in RA - this is a key differentiating feature. The DIP involvement in OA vs. MCP/PIP involvement in RA is a classic board question. OA pain is "mechanical" (worse with use, better with rest), while inflammatory arthritis pain improves with activity and has prolonged morning stiffness.',
            reference: 'Hunter DJ, Bierma-Zeinstra S. Osteoarthritis. Lancet. 2019;393(10182):1745-1759.'
        },
        // SEPTIC ARTHRITIS
        {
            id: 'MSK-007',
            domains: ['Infectious Disease', 'Emergency Medicine'],
            conceptId: 'PP-SEPTIC-1',
            vignette: 'A 62-year-old man with diabetes presents with acute onset of severe right knee pain, swelling, and fever. He is unable to bear weight. The knee is warm, erythematous, and extremely tender with any movement. WBC is 18,000.',
            question: 'Joint aspiration shows 85,000 WBC/μL with 95% PMNs. What is the most likely causative organism?',
            options: [
                { id: 'A', text: 'Staphylococcus aureus', correct: true },
                { id: 'B', text: 'Neisseria gonorrhoeae', correct: false },
                { id: 'C', text: 'Streptococcus pneumoniae', correct: false },
                { id: 'D', text: 'Pseudomonas aeruginosa', correct: false },
                { id: 'E', text: 'Escherichia coli', correct: false }
            ],
            explanation: 'Staphylococcus aureus is the most common cause of non-gonococcal septic arthritis in adults (>50% of cases), especially in patients with diabetes, RA, or prosthetic joints. Synovial WBC >50,000/μL with >90% PMNs strongly suggests infection. Gonococcal arthritis is more common in young, sexually active patients and often presents with migratory polyarthralgia, tenosynovitis, and dermatitis. Septic arthritis is an orthopedic emergency requiring prompt drainage (arthrocentesis or surgical) plus IV antibiotics. Delayed treatment leads to rapid cartilage destruction.',
            reference: 'Margaretten ME, et al. Does this adult patient have septic arthritis? JAMA. 2007;297(13):1478-1488.'
        },
        {
            id: 'MSK-008',
            domains: ['Infectious Disease', 'Clinical Medicine'],
            conceptId: 'PP-SEPTIC-2',
            vignette: 'A 24-year-old sexually active woman presents with 5 days of migratory joint pain affecting her wrists, ankles, and knees. She has pustular skin lesions on her hands and tenosynovitis. She has no significant PMH.',
            question: 'What is the most appropriate initial diagnostic test?',
            options: [
                { id: 'A', text: 'Serum rheumatoid factor', correct: false },
                { id: 'B', text: 'Blood and synovial fluid culture plus NAAT from urogenital sites', correct: true },

    // State
    let currentQuestion = 0;
    let score = 0;
    let startTime = Date.now();
    let confidenceRatings = [];
    let answers = [];

    function renderQuestion() {
        const q = questions[currentQuestion];
        const container = document.getElementById('questionContainer');
        const domainsHTML = q.domains.map(d => `<span class="domain-tag">${d}</span>`).join('');
        
        container.innerHTML = `
            <div class="question-card">
                <div class="question-number">Question ${currentQuestion + 1} of ${questions.length}</div>
                ${domainsHTML}
                ${q.vignette ? `<div class="vignette">${q.vignette}</div>` : ''}
                <div class="question-text">${q.question}</div>
                <div class="confidence-slider">
                    <label>How confident are you? <span id="confValue" class="confidence-value">50%</span></label>
                    <input type="range" min="0" max="100" value="50" id="confidenceSlider" oninput="document.getElementById('confValue').textContent = this.value + '%'">
                </div>
                <div class="options">
                    ${q.options.map((opt, i) => `
                        <div class="option" onclick="selectOption(${i})" id="opt${i}">
                            <strong>${opt.id}.</strong> ${opt.text}
                        </div>
                    `).join('')}
                </div>
                <div style="margin-top: 24px; text-align: center;">
                    <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()" disabled>Submit Answer</button>
                </div>
                <div class="explanation" id="explanation">
                    <h4>Explanation</h4>
                    <p>${q.explanation}</p>
                    <p style="margin-top: 12px; font-size: 13px; color: #64748b;"><strong>Reference:</strong> ${q.reference}</p>
                    <div style="margin-top: 20px; text-align: center;">
                        <button class="btn btn-primary" onclick="nextQuestion()">Next Question</button>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('progressFill').style.width = `${(currentQuestion / questions.length) * 100}%`;
        document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
    }

    let selectedOption = null;

    function selectOption(index) {
        document.querySelectorAll('.option').forEach((opt, i) => {
            opt.classList.remove('selected');
            if (i === index) opt.classList.add('selected');
        });
        selectedOption = index;
        document.getElementById('submitBtn').disabled = false;
    }

    function submitAnswer() {
        const q = questions[currentQuestion];
        const confidence = parseInt(document.getElementById('confidenceSlider').value);
        confidenceRatings.push(confidence);
        
        const isCorrect = q.options[selectedOption].correct;
        answers.push({ questionId: q.id, selected: selectedOption, correct: isCorrect, confidence });
        if (isCorrect) score++;
        
        document.querySelectorAll('.option').forEach((opt, i) => {
            opt.onclick = null;
            if (q.options[i].correct) opt.classList.add('correct');
            else if (i === selectedOption && !isCorrect) opt.classList.add('incorrect');
        });
        
        document.getElementById('submitBtn').style.display = 'none';
        document.getElementById('explanation').classList.add('show');
    }

    function nextQuestion() {
        currentQuestion++;
        selectedOption = null;
        if (currentQuestion >= questions.length) showResults();
        else renderQuestion();
    }

    function showResults() {
        document.getElementById('questionContainer').classList.add('hidden');
        document.getElementById('resultsContainer').classList.remove('hidden');
        
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const minutes = Math.floor(elapsed / 60);
        const seconds = elapsed % 60;
        
        const avgConfidence = confidenceRatings.reduce((a, b) => a + b, 0) / confidenceRatings.length;
        const actualScore = (score / questions.length) * 100;
        const calibration = Math.abs(avgConfidence - actualScore);
        
        document.getElementById('scoreValue').textContent = Math.round(actualScore) + '%';
        document.getElementById('timeValue').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        document.getElementById('calibrationValue').textContent = calibration < 10 ? 'Good' : calibration < 20 ? 'Fair' : 'Needs Work';
        
        console.log('Module results:', { score: actualScore, time: elapsed, calibration, answers });
    }

    function restartModule() {
        currentQuestion = 0; score = 0; startTime = Date.now();
        confidenceRatings = []; answers = []; selectedOption = null;
        document.getElementById('questionContainer').classList.remove('hidden');
        document.getElementById('resultsContainer').classList.add('hidden');
        renderQuestion();
    }

    renderQuestion();
    </script>
