    <script>
        const questions = [
            // TYPE I HYPERSENSITIVITY & ANAPHYLAXIS
            {
                question: "A 32-year-old woman develops urticaria, angioedema, and hypotension within 10 minutes of receiving IV penicillin. Which immunoglobulin mediates this reaction?",
                options: ["IgA", "IgE", "IgG", "IgM"],
                correct: 1,
                explanation: "Type I hypersensitivity (immediate/anaphylactic) is mediated by IgE antibodies bound to mast cells and basophils. Cross-linking of IgE by allergen triggers degranulation and release of histamine, tryptase, and other mediators.",
                deepDive: [
                    "Prior sensitization: First exposure → B cells produce allergen-specific IgE",
                    "IgE binds to FcεRI receptors on mast cells/basophils",
                    "Re-exposure: Allergen cross-links bound IgE molecules",
                    "Degranulation releases histamine, tryptase, prostaglandins, leukotrienes",
                    "Histamine → vasodilation, increased permeability, bronchoconstriction",
                    "Late phase (4-8 hrs): Eosinophils, cytokines cause prolonged inflammation"
                ],
                topics: ["anaphylaxis", "type-1-hypersensitivity"],
                resources: [
                    { name: "LITFL Anaphylaxis", url: "https://litfl.com/anaphylaxis/", type: "website" },
                    { name: "AAAAI Anaphylaxis", url: "https://www.aaaai.org/conditions-treatments/allergies/anaphylaxis", type: "guidelines" }
                ]
            },
            {
                question: "Which of the following is the FIRST-LINE treatment for anaphylaxis?",
                options: ["IV diphenhydramine", "IV methylprednisolone", "IM epinephrine", "Nebulized albuterol"],
                correct: 2,
                explanation: "Intramuscular epinephrine (0.3-0.5 mg in adults) is the FIRST-LINE treatment for anaphylaxis. It reverses vasodilation (α1), bronchospasm (β2), and stabilizes mast cells (β2). Delay in epinephrine administration is associated with fatal outcomes.",
                deepDive: [
                    "Epinephrine mechanisms: α1 → vasoconstriction, ↑BP; β1 → ↑HR, inotropy; β2 → bronchodilation, ↓mast cell degranulation",
                    "IM injection in anterolateral thigh provides fastest absorption",
                    "IV epinephrine only for refractory/cardiac arrest cases (risk of arrhythmia)",
                    "Antihistamines and steroids are ADJUNCTS, not first-line",
                    "Steroids may help prevent biphasic reactions (4-8 hrs later)",
                    "All patients need observation ≥4-6 hours for biphasic reaction"
                ],
                topics: ["anaphylaxis", "emergency-treatment"],
                resources: [
                    { name: "EMCrit Anaphylaxis", url: "https://emcrit.org/emcrit/anaphylaxis/", type: "podcast" },
                    { name: "ACAAI Anaphylaxis Treatment", url: "https://acaai.org/allergies/allergic-conditions/anaphylaxis/", type: "guidelines" }
                ]
            },
            {
                question: "A patient with known peanut allergy accidentally ingests peanuts. Which mast cell mediator is most useful for confirming anaphylaxis diagnostically?",
                options: ["Histamine", "Tryptase", "Prostaglandin D2", "Leukotriene C4"],
                correct: 1,
                explanation: "Serum tryptase is the most useful biomarker for confirming anaphylaxis. It peaks 1-2 hours after onset and remains elevated for several hours. Histamine has a very short half-life (minutes) making it impractical to measure.",
                deepDive: [
                    "Tryptase is released from mast cell granules during degranulation",
                    "Draw tryptase 1-2 hours after symptom onset (peak)",
                    "Normal baseline: <11.4 ng/mL; elevated suggests mast cell activation",
                    "Compare to baseline (if available) - >20% increase is significant",
                    "May be normal in food-induced anaphylaxis (IgE-mediated)",
                    "Persistently elevated tryptase → consider mastocytosis"
                ],
                topics: ["anaphylaxis", "diagnosis"],
                resources: [
                    { name: "AAAAI Tryptase", url: "https://www.aaaai.org/allergist-resources/ask-the-expert/answers/2022/tryptase", type: "website" }
                ]
            },
            {
                question: "Which cytokine is primarily responsible for IgE class switching in B cells?",
                options: ["IL-2", "IL-4", "IL-6", "IFN-γ"],
                correct: 1,
                explanation: "IL-4 (and IL-13) produced by Th2 cells drives IgE class switching in B cells. This is why allergic diseases are associated with Th2-skewed immune responses. IFN-γ from Th1 cells actually inhibits IgE production.",
                deepDive: [
                    "Th2 cells: IL-4, IL-5, IL-13 → allergic inflammation",
                    "IL-4 binds IL-4R on B cells → activates STAT6 → IgE class switch",
                    "IL-5 recruits and activates eosinophils",
                    "IL-13 promotes mucus production, airway hyperreactivity",
                    "Th1 cells: IFN-γ → inhibits Th2, promotes cell-mediated immunity",
                    "Therapeutic targets: Dupilumab blocks IL-4Rα; Omalizumab binds IgE"
                ],
                topics: ["immunology", "th2-response"],
                resources: [
                    { name: "NCBI Immunology", url: "https://www.ncbi.nlm.nih.gov/books/NBK27136/", type: "textbook" }
                ]
            },
            
            // TYPE II HYPERSENSITIVITY
            {
                question: "A patient receives a blood transfusion and develops fever, hemoglobinuria, and flank pain within an hour. Which type of hypersensitivity is responsible?",
                options: ["Type I (IgE-mediated)", "Type II (cytotoxic)", "Type III (immune complex)", "Type IV (delayed)"],
                correct: 1,
                explanation: "Acute hemolytic transfusion reaction is a Type II hypersensitivity. Pre-formed IgM or IgG antibodies against donor RBC antigens (usually ABO incompatibility) cause complement activation and intravascular hemolysis.",
                deepDive: [
                    "Type II: Antibodies (IgG/IgM) bind cell surface or matrix antigens",
                    "Mechanisms: Complement activation → MAC → cell lysis; Opsonization → phagocytosis; ADCC",
                    "ABO incompatibility: Anti-A or Anti-B (IgM) → rapid complement activation",
                    "Rh incompatibility: Anti-D (IgG) → extravascular hemolysis in spleen",
                    "Other Type II: Autoimmune hemolytic anemia, Goodpasture's, Graves', Myasthenia gravis",
                    "Treatment: Stop transfusion, supportive care, check for DIC"
                ],
                topics: ["type-2-hypersensitivity", "transfusion-reaction"],
                resources: [
                    { name: "LITFL Transfusion Reactions", url: "https://litfl.com/blood-transfusion-reactions/", type: "website" },
                    { name: "Blood Bank Guy", url: "https://www.bbguy.org", type: "podcast" }
                ]
            },
            {
                question: "Goodpasture syndrome is characterized by antibodies against which target?",
                options: ["Acetylcholine receptors", "Type IV collagen (basement membrane)", "TSH receptors", "Intrinsic factor"],
                correct: 1,
                explanation: "Goodpasture syndrome involves anti-GBM (glomerular basement membrane) antibodies targeting type IV collagen in the kidneys and lungs. This causes rapidly progressive glomerulonephritis and pulmonary hemorrhage.",
                deepDive: [
                    "Target: α3 chain of type IV collagen in basement membrane",
                    "Kidney: Crescentic glomerulonephritis → rapidly progressive renal failure",
                    "Lung: Pulmonary hemorrhage (especially in smokers)",
                    "Linear IgG staining on immunofluorescence (pathognomonic)",
                    "Treatment: Plasmapheresis (remove antibodies), immunosuppression",
                    "Contrast with Wegener's (ANCA+, granulomatous) - pauci-immune on IF"
                ],
                topics: ["type-2-hypersensitivity", "autoimmune"],
                resources: [
                    { name: "NCBI Goodpasture", url: "https://www.ncbi.nlm.nih.gov/books/NBK542300/", type: "textbook" }
                ]
            },
            
            // TYPE III HYPERSENSITIVITY
            {
                question: "A patient develops fever, joint pain, urticaria, and lymphadenopathy 10 days after starting a new medication. Which hypersensitivity type is most likely?",
                options: ["Type I", "Type II", "Type III", "Type IV"],
                correct: 2,
                explanation: "Serum sickness is a Type III hypersensitivity reaction. Immune complexes (antigen-antibody) deposit in tissues 7-14 days after exposure, activating complement and causing inflammation in joints, skin, kidneys, and other organs.",
                deepDive: [
                    "Type III: Immune complexes deposit in blood vessel walls and tissues",
                    "Complement activation → C3a, C5a (anaphylatoxins) → inflammation",
                    "Neutrophil recruitment → tissue damage",
                    "Classic causes: Horse serum antitoxins, monoclonal antibodies (rituximab, infliximab)",
                    "Serum sickness-like: Cefaclor, penicillins (milder, no true immune complexes)",
                    "Other Type III: Post-strep GN, lupus nephritis, rheumatoid arthritis"
                ],
                topics: ["type-3-hypersensitivity", "drug-reaction"],
                resources: [
                    { name: "AAAAI Serum Sickness", url: "https://www.aaaai.org/tools-for-the-public/conditions-library/allergies/serum-sickness", type: "website" }
                ]
            },
            {
                question: "In Type III hypersensitivity, what is the primary mechanism of tissue damage?",
                options: ["Direct antibody-mediated cell lysis", "T cell cytotoxicity", "Complement activation and neutrophil recruitment", "Eosinophil degranulation"],
                correct: 2,
                explanation: "In Type III reactions, immune complex deposition activates complement (C3a, C5a), which recruits neutrophils. Neutrophils release proteolytic enzymes and reactive oxygen species, causing tissue damage at sites of immune complex deposition.",
                deepDive: [
                    "Immune complexes form when antibody production matches antigen load",
                    "Small complexes escape clearance → deposit in vessel walls, joints, glomeruli",
                    "Complement activation: C3a, C5a → chemotaxis, mast cell degranulation",
                    "Neutrophils: Phagocytose complexes, release lysosomal enzymes, ROS",
                    "Results: Vasculitis, glomerulonephritis, arthritis",
                    "Factors: Complex size, antigen-antibody ratio, blood flow turbulence"
                ],
                topics: ["type-3-hypersensitivity", "complement"],
                resources: [
                    { name: "NCBI Complement", url: "https://www.ncbi.nlm.nih.gov/books/NBK27100/", type: "textbook" }
                ]
            },
            
            // TYPE IV HYPERSENSITIVITY
            {
                question: "A healthcare worker develops vesicular, pruritic dermatitis on her hands after wearing latex gloves. The reaction appears 48-72 hours after exposure. Which type of hypersensitivity is this?",
                options: ["Type I", "Type II", "Type III", "Type IV"],
                correct: 3,
                explanation: "Contact dermatitis appearing 48-72 hours after exposure is Type IV (delayed-type) hypersensitivity. It is T cell-mediated, not antibody-mediated. Sensitized T cells recognize the allergen and release cytokines causing inflammation.",
                deepDive: [
                    "Type IV: T cell-mediated (no antibodies involved)",
                    "Sensitization: Hapten (e.g., nickel, urushiol) binds skin proteins → APC presents to T cells",
                    "Re-exposure: Memory T cells recognize antigen → release IFN-γ, TNF-α",
                    "Macrophage activation → granuloma formation in some cases",
                    "Examples: Contact dermatitis, TB skin test, transplant rejection",
                    "Note: Latex can cause Type I (immediate, IgE) OR Type IV (delayed)"
                ],
                topics: ["type-4-hypersensitivity", "contact-dermatitis"],
                resources: [
                    { name: "DermNet Contact Dermatitis", url: "https://dermnetnz.org/topics/allergic-contact-dermatitis", type: "website" }
                ]
            },
            {
                question: "The tuberculin skin test (PPD) is an example of which immunologic mechanism?",
                options: ["IgE-mediated mast cell degranulation", "Antibody-dependent cellular cytotoxicity", "Immune complex deposition", "Delayed-type hypersensitivity (Th1 cells)"],
                correct: 3,
                explanation: "The PPD test is a classic example of Type IV delayed-type hypersensitivity. Previously sensitized Th1 cells recognize tuberculin antigens presented by APCs and release IFN-γ, causing macrophage activation and local induration at 48-72 hours.",
                deepDive: [
                    "Intradermal injection of purified protein derivative (PPD)",
                    "In previously exposed individuals: Memory Th1 cells present in skin",
                    "APCs process PPD → present to Th1 cells",
                    "Th1 cells release IFN-γ → macrophage activation → induration",
                    "Read at 48-72 hours; measure induration (not erythema)",
                    "Positive: ≥5mm (high risk), ≥10mm (moderate risk), ≥15mm (low risk)"
                ],
                topics: ["type-4-hypersensitivity", "tb-testing"],
                resources: [
                    { name: "CDC TB Testing", url: "https://www.cdc.gov/tb/topic/testing/tbtesttypes.htm", type: "guidelines" }
                ]
            },
            
            // IMMUNODEFICIENCY
            {
                question: "A 6-month-old boy presents with recurrent sinopulmonary infections. Lab work shows very low IgG, IgA, and IgM with absent B cells but normal T cells. What is the most likely diagnosis?",
                options: ["DiGeorge syndrome", "X-linked agammaglobulinemia (Bruton's)", "Common variable immunodeficiency", "Selective IgA deficiency"],
                correct: 1,
                explanation: "X-linked agammaglobulinemia (XLA/Bruton's) is caused by BTK gene mutations preventing B cell maturation. Patients have absent B cells, very low immunoglobulins of ALL classes, and present after 6 months (when maternal IgG wanes) with encapsulated bacterial infections.",
                deepDive: [
                    "BTK (Bruton's tyrosine kinase) essential for pre-B → B cell maturation",
                    "X-linked: Almost exclusively males affected",
                    "B cells absent or <2%; T cells normal",
                    "All immunoglobulin classes very low (<100 mg/dL total)",
                    "Infections: S. pneumoniae, H. influenzae (encapsulated bacteria)",
                    "Treatment: Lifelong IVIG replacement; avoid live vaccines"
                ],
                topics: ["immunodeficiency", "primary-immunodeficiency"],
                resources: [
                    { name: "Immune Deficiency Foundation", url: "https://primaryimmune.org/about-primary-immunodeficiencies/specific-disease-types/x-linked-agammaglobulinemia", type: "website" }
                ]
            },
            {
                question: "A newborn with DiGeorge syndrome would have deficiency of which immune cell type?",
                options: ["B cells", "T cells", "Neutrophils", "NK cells"],
                correct: 1,
                explanation: "DiGeorge syndrome results from 22q11.2 deletion causing thymic hypoplasia/aplasia. Without a thymus, T cell maturation is impaired. The classic triad is: Cardiac defects, Abnormal facies, Thymic aplasia, Cleft palate, Hypocalcemia (CATCH-22).",
                deepDive: [
                    "22q11.2 deletion → failed development of 3rd/4th pharyngeal pouches",
                    "Thymus: T cell maturation site → T cell lymphopenia",
                    "Parathyroids: Hypocalcemia → tetany, seizures",
                    "Cardiac: Truncus arteriosus, tetralogy of Fallot, interrupted aortic arch",
                    "B cells present but may have poor antibody responses (need T help)",
                    "Treatment: Thymus transplant (severe); IVIG; calcium supplementation"
                ],
                topics: ["immunodeficiency", "digeorge"],
                resources: [
                    { name: "NCBI DiGeorge", url: "https://www.ncbi.nlm.nih.gov/books/NBK532232/", type: "textbook" }
                ]
            },

        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        
        function renderQuestion() {
            const q = questions[currentQuestion];
            const container = document.getElementById('questionContainer');
            
            container.innerHTML = `
                <div class="question-card">
                    <div class="question-number">Question ${currentQuestion + 1} of ${questions.length}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">
                        ${q.options.map((opt, i) => `
                            <div class="option" onclick="selectOption(${i})" id="option${i}">
                                <div class="option-letter">${String.fromCharCode(65 + i)}</div>
                                <div class="option-text">${opt}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="explanation" id="explanation">
                        <div class="explanation-title">💡 Explanation</div>
                        <div class="explanation-text">${q.explanation}</div>
                    </div>
                    <div class="deep-dive" id="deepDive">
                        <div class="deep-dive-title">🔬 Deep Dive: Mechanism</div>
                        <ul class="mechanism-list">
                            ${q.deepDive.map((step, i) => `
                                <li>
                                    <span class="mechanism-step">${i + 1}</span>
                                    <span>${step}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                    <div class="external-resources" id="externalResources">
                        <div class="external-resources-title">📚 Learn More (Open Access)</div>
                        ${q.resources.map(r => `
                            <a href="${r.url}" target="_blank" class="resource-link">
                                <span class="resource-icon">${getResourceIcon(r.type)}</span>
                                <span class="resource-name">${r.name}</span>
                                <span class="resource-type">${r.type}</span>
                            </a>
                        `).join('')}
                    </div>
                    <div class="btn-container">
                        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>Next Question</button>
                        <button class="btn btn-secondary" id="deepDiveBtn" onclick="toggleDeepDive()" style="display: none;">Show Mechanism</button>
                    </div>
                </div>
                
                <div class="cross-platform" id="crossPlatform" style="display: none;">
                    <div class="cross-platform-title">🔗 Continue Learning Across Platforms</div>
                    <div class="platform-links">
                        <a href="../index.html#allergy" class="platform-link reasondx">
                            <span>🔬</span>
                            <span>Practice Allergy Cases on ReasonDx</span>
                        </a>
                        <a href="../CoachDx/mentor-chat.html?case=anaphylaxis" class="platform-link coachdx">
                            <span>🩺</span>
                            <span>Discuss with AI Attending on CoachDx</span>
                        </a>
                    </div>
                </div>
            `;
            
            updateProgress();
            answered = false;
        }
        
        function getResourceIcon(type) {
            const icons = {
                'website': '🌐',
                'podcast': '🎧',
                'video': '📹',
                'guidelines': '📋',
                'textbook': '📚',
                'database': '🗄️'
            };
            return icons[type] || '📎';
        }
        
        function selectOption(index) {
            if (answered) return;
            answered = true;
            
            const q = questions[currentQuestion];
            const options = document.querySelectorAll('.option');
            
            options.forEach((opt, i) => {
                opt.onclick = null;
                if (i === q.correct) {
                    opt.classList.add('correct');
                } else if (i === index) {
                    opt.classList.add('incorrect');
                }
            });
            
            if (index === q.correct) {
                score++;
            }
            
            document.getElementById('explanation').classList.add('show');
            document.getElementById('deepDiveBtn').style.display = 'inline-block';
            document.getElementById('externalResources').classList.add('show');
            document.getElementById('nextBtn').disabled = false;
            document.getElementById('crossPlatform').style.display = 'block';
            
            // Track for research
            trackAnswer(q, index);
        }
        
        function toggleDeepDive() {
            const dd = document.getElementById('deepDive');
            const btn = document.getElementById('deepDiveBtn');
            if (dd.classList.contains('show')) {
                dd.classList.remove('show');
                btn.textContent = 'Show Mechanism';
            } else {
                dd.classList.add('show');
                btn.textContent = 'Hide Mechanism';
            }
        }
        
        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion >= questions.length) {
                showResults();
            } else {
                renderQuestion();
            }
        }
        
        function updateProgress() {
            const pct = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = `${currentQuestion} / ${questions.length} questions`;
        }
        
        function showResults() {
            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('questionContainer').style.display = 'none';
            document.getElementById('resultsContainer').style.display = 'block';
            document.getElementById('resultsContainer').innerHTML = `
                <div class="results">
                    <div class="results-score">${pct}%</div>
                    <div class="results-text">You got ${score} out of ${questions.length} correct!</div>
                    <p style="color: #94a3b8; margin-bottom: 24px;">
                        ${pct >= 80 ? 'Excellent work! You have a strong grasp of allergy and immunology mechanisms.' :
                          pct >= 60 ? 'Good progress! Review the mechanisms you missed and try again.' :
                          'Keep studying! Focus on the hypersensitivity types and their mechanisms.'}
                    </p>
                    <div class="btn-container" style="justify-content: center;">
                        <button class="btn btn-primary" onclick="location.reload()">Try Again</button>
                        <a href="index.html" class="btn btn-secondary">Back to Modules</a>
                    </div>
                    
                    <div class="cross-platform" style="margin-top: 32px; text-align: left;">
                        <div class="cross-platform-title">🔗 Continue Your Learning Journey</div>
                        <div class="platform-links" style="justify-content: center;">
                            <a href="index.html" class="platform-link reasondx">
                                <span>🔬</span>
                                <span>Practice Clinical Cases on ReasonDx</span>
                            </a>
                            <a href="../CoachDx/" class="platform-link coachdx">
                                <span>🩺</span>
                                <span>Learn with AI Attending on CoachDx</span>
                            </a>
                        </div>
                    </div>
                </div>
            `;
            
            // Track completion
            trackCompletion();
        }
        
        function trackAnswer(question, selectedIndex) {
            // Send to localStorage for fingerprint tracking
            try {
                const data = {
                    timestamp: new Date().toISOString(),
                    module: 'allergy-immunology',
                    question: question.question.substring(0, 50),
                    correct: selectedIndex === question.correct,
                    topics: question.topics
                };
                const history = JSON.parse(localStorage.getItem('mechanismDxHistory') || '[]');
                history.push(data);
                localStorage.setItem('mechanismDxHistory', JSON.stringify(history.slice(-500)));
            } catch(e) {}
        }
        
        function trackCompletion() {
            try {
                const completion = {
                    timestamp: new Date().toISOString(),
                    module: 'allergy-immunology',
                    score: score,
                    total: questions.length,
                    percentage: Math.round((score / questions.length) * 100)
                };
                const completions = JSON.parse(localStorage.getItem('mechanismDxCompletions') || '[]');
                completions.push(completion);
                localStorage.setItem('mechanismDxCompletions', JSON.stringify(completions));
            } catch(e) {}
        }
        
        // Initialize
        renderQuestion();
    </script>
