<title>MechanismDx — Ambulatory & Preventive Care</title>

<style>
:root{--bg:#F0F2F5;--surface:#FFF;--primary:#2874A6;--primary-dark:#1B5E8A;--primary-light:#E3F2FD;--accent:#00897B;--accent-light:#E0F2F1;--text:#1A1A2E;--text-secondary:#5A6178;--border:#DFE1E6;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
.page-container{max-width:960px;margin:0 auto;padding:24px 16px}
.page-header{text-align:center;margin-bottom:32px}
.page-header h1{font-size:24px;font-weight:700;color:var(--primary-dark)}
.page-header p{color:var(--text-secondary);margin-top:8px}
.back-link{display:inline-block;margin-bottom:16px;color:var(--text-secondary);text-decoration:none;font-size:13px}
.back-link:hover{color:var(--primary)}
.module-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:32px}
.module-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all .2s}
.module-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-2px)}
.module-card-bar{height:4px}
.module-card-body{padding:20px}
.module-card-icon{font-size:28px;margin-bottom:8px}
.module-card-title{font-size:15px;font-weight:700;margin-bottom:4px}
.module-card-desc{font-size:12px;color:var(--text-secondary);line-height:1.5}
.module-card-tags{margin-top:10px;display:flex;flex-wrap:wrap;gap:4px}
.tag{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:var(--primary-light);color:var(--primary)}

.section-title{font-size:18px;font-weight:700;margin:24px 0 12px;color:var(--primary-dark);border-bottom:2px solid var(--border);padding-bottom:8px}

/* Module detail view */
.module-detail{display:none;background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:24px;margin-bottom:24px}
.module-detail.active{display:block}
.module-detail h2{font-size:18px;font-weight:700;margin-bottom:8px}
.module-detail h3{font-size:14px;font-weight:700;color:var(--primary);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.3px}
.module-detail p{font-size:13px;line-height:1.7;margin-bottom:12px}
.mechanism-box{background:#F8F9FA;border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:12px 0}
.mechanism-box-title{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.mechanism-box p{margin-bottom:8px}
.clinical-pearl{background:#FFF8E1;border-left:3px solid #F57F17;padding:12px 16px;border-radius:0 var(--radius) var(--radius) 0;margin:12px 0;font-size:13px}
.close-detail{background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}

@media(max-width:600px){
  .module-grid{grid-template-columns:1fr}
  .page-container{padding:16px 12px}
  .module-detail{padding:16px}
}
</style>

<div class="page-container">

    <h1>🔬 MechanismDx — Ambulatory Care</h1>
    <p>Pathophysiology and pharmacology for outpatient clinical reasoning</p>
  </div>

  <h2 class="section-title">Chronic Disease Management</h2>
  <div class="module-grid" id="chronic-grid"></div>

  <h2 class="section-title">Preventive Care Rationale</h2>
  <div class="module-grid" id="preventive-grid"></div>

  <h2 class="section-title">Ambulatory Pharmacology</h2>
  <div class="module-grid" id="pharma-grid"></div>

  <div id="detail-container"></div>
</div>

<script>
var MODULES = {
  chronic: [
    {
      id:"dm2-management",
      title:"Type 2 Diabetes — Stepwise Management",
      icon:"🩸",
      color:"#C62828",
      desc:"Why metformin first? When to add GLP-1, SGLT2, insulin. A1c targets by patient context.",
      tags:["Endocrine","Pharmacology","Guideline-Based"],
      content:{
        overview:"Diabetes management follows a stepwise algorithm where drug selection is guided by A1c trajectory, comorbidities (especially CKD and ASCVD), and patient preference — not just glucose numbers.",
        mechanism:"Metformin decreases hepatic glucose production and improves insulin sensitivity. GLP-1 receptor agonists stimulate insulin secretion in a glucose-dependent manner (low hypoglycemia risk) and slow gastric emptying. SGLT2 inhibitors block glucose reabsorption in the proximal tubule, providing glucosuria with additional cardiorenal benefits independent of glucose lowering.",
        clinicalPearl:"SGLT2 inhibitors reduce heart failure hospitalization and slow CKD progression regardless of whether the patient has diabetes. This is a mechanism question, not a diabetes question — the natriuresis and tubuloglomerular feedback reset are what matter.",
        management:"A1c < 7% for most adults. Metformin + lifestyle first. If A1c still above target at 3 months, add GLP-1 RA (if ASCVD or high CV risk) or SGLT2i (if HF or CKD). If still above target, consider combination or basal insulin. Individualize: A1c < 8% may be appropriate for elderly with limited life expectancy.",
        whyItMatters:"Students often prescribe by algorithm without understanding mechanism. The question 'Why this drug for this patient?' requires understanding both the pharmacology and the patient's comorbidity profile."
      }
    },
    {
      id:"htn-cascade",
      title:"Hypertension — The Treatment Cascade",
      icon:"💓",
      color:"#1565C0",
      desc:"ACEi vs ARB vs CCB vs thiazide: why does the choice matter? Compelling indications and contraindications.",
      tags:["Cardiovascular","Pharmacology","Guidelines"],
      content:{
        overview:"Antihypertensive selection is driven by compelling indications (CKD → ACEi/ARB, HFrEF → ACEi + BB + diuretic, DM → ACEi/ARB) rather than just BP numbers.",
        mechanism:"ACE inhibitors block conversion of angiotensin I to II, reducing systemic vasoconstriction AND aldosterone secretion (reducing volume). The efferent arteriole dilation reduces intraglomerular pressure — this is why ACEi protect kidneys in CKD/DM. Calcium channel blockers (dihydropyridine) block L-type calcium channels in vascular smooth muscle → vasodilation without affecting cardiac conduction.",
        clinicalPearl:"Creatinine rising 20-30% after starting an ACEi is expected and acceptable — it reflects the desired drop in intraglomerular pressure. Only stop if it rises >30% or hyperkalemia develops. Many students panic at a Cr bump and incorrectly stop the drug.",
        management:"Stage 1 (130-139/80-89): lifestyle + consider monotherapy. Stage 2 (≥140/90): two-drug combo preferred. Resistant HTN (uncontrolled on 3 drugs including diuretic): add spironolactone. Target <130/80 for most, <140/90 for elderly >65.",
        whyItMatters:"Understanding why we choose specific agents prevents the 'just add another drug' approach and teaches students to think about mechanism-based prescribing."
      }
    },
    {
      id:"chf-outpatient",
      title:"Heart Failure — Outpatient GDMT Optimization",
      icon:"❤️",
      color:"#AD1457",
      desc:"The four pillars of HFrEF therapy and why each one matters. Titration to target doses.",
      tags:["Cardiovascular","Chronic Disease","GDMT"],
      content:{
        overview:"HFrEF guideline-directed medical therapy (GDMT) has four pillars, each targeting a different neurohormonal pathway. The mortality benefit is additive — patients need ALL four, titrated to target doses.",
        mechanism:"Pillar 1: ACEi/ARB/ARNI — blocks RAAS, reduces afterload and aldosterone. Pillar 2: Beta-blocker (carvedilol, metoprolol succinate, bisoprolol only) — blocks sympathetic overdrive, reduces HR, allows reverse remodeling. Pillar 3: MRA (spironolactone/eplerenone) — blocks aldosterone-mediated fibrosis and potassium wasting. Pillar 4: SGLT2i — natriuresis, osmotic diuresis, and metabolic benefits independent of HF etiology.",
        clinicalPearl:"Beta-blockers in heart failure seem counterintuitive — they block the compensatory tachycardia. The key is that chronic sympathetic activation is maladaptive: it drives remodeling, arrhythmias, and myocyte death. Short-term compensation becomes long-term destruction.",
        management:"Start low, titrate up every 2 weeks as tolerated. Never start a beta-blocker during acute decompensation. Check K+ and Cr with ACEi/ARB and MRA. Target doses: carvedilol 25mg BID, sacubitril-valsartan 97-103 BID, spironolactone 25-50mg daily, empagliflozin or dapagliflozin 10mg daily.",
        whyItMatters:"Most HF patients are undertreated — not because their doctor doesn't know the guidelines, but because titration is hard. Teaching the 'why' of each drug helps students persist through the titration."
      }
    },
    {
      id:"ckd-progression",
      title:"CKD — Slowing Progression",
      icon:"🫘",
      color:"#00695C",
      desc:"Why does CKD progress? RAAS blockade, SGLT2i, BP control, and avoiding nephrotoxins.",
      tags:["Renal","Chronic Disease","Pharmacology"],
      content:{
        overview:"CKD progression is driven by intraglomerular hypertension, proteinuria-mediated tubular injury, and metabolic derangements. Management targets these mechanisms — BP control alone is necessary but not sufficient.",
        mechanism:"Damaged nephrons trigger compensatory hyperfiltration in remaining nephrons. This increases intraglomerular pressure, which initially maintains GFR but accelerates further nephron loss — a vicious cycle. Proteinuria directly injures tubular cells. RAAS blockade (ACEi/ARB) dilates the efferent arteriole, reducing intraglomerular pressure. SGLT2 inhibitors restore tubuloglomerular feedback, reducing hyperfiltration through a completely different mechanism.",
        clinicalPearl:"The initial GFR 'dip' seen with both ACEi and SGLT2i initiation is hemodynamic, not structural damage. It reflects the desired reduction in intraglomerular pressure. Expect it, monitor it, but don't stop the drug unless the drop is severe (>30%).",
        management:"BP < 130/80 (ACEi/ARB first-line if proteinuria). SGLT2i for all CKD with eGFR 20-90 and albuminuria. Avoid NSAIDs. Minimize contrast. Adjust medication doses. Monitor K+ closely with RAAS blockade. Refer to nephrology at eGFR < 30 or rapidly declining.",
        whyItMatters:"Understanding the hyperfiltration injury model explains why every intervention works — they all reduce intraglomerular pressure through different mechanisms. This unifying concept makes the management algorithm intuitive rather than memorized."
      }
    },
    {
      id:"copd-stepwise",
      title:"COPD — Stepwise Inhaler Therapy",
      icon:"🫁",
      color:"#4527A0",
      desc:"LAMA vs LABA vs ICS: who gets what and why? GOLD classification and escalation/de-escalation.",
      tags:["Pulmonary","Pharmacology","GOLD Guidelines"],
      content:{
        overview:"COPD inhaler therapy follows the GOLD framework: classify by symptoms (mMRC/CAT) and exacerbation history, then select therapy targeting the dominant mechanism — bronchodilation for symptoms, anti-inflammatory for exacerbation prevention.",
        mechanism:"LAMAs (tiotropium) block M3 muscarinic receptors on airway smooth muscle → sustained bronchodilation (24h). LABAs (salmeterol, formoterol) stimulate beta-2 adrenergic receptors → smooth muscle relaxation. ICS suppress airway eosinophilic inflammation — effective ONLY in the subset of COPD patients with eosinophilic phenotype. Unlike asthma, most COPD is neutrophilic, and ICS increase pneumonia risk without benefit in these patients.",
        clinicalPearl:"ICS in COPD is NOT the same as ICS in asthma. In asthma, ICS is first-line and always appropriate. In COPD, ICS should be reserved for patients with eosinophils ≥300 or frequent exacerbations despite dual bronchodilator therapy. Over-prescribing ICS in COPD increases pneumonia risk.",
        management:"Group A (few symptoms, low exacerbation): SABA PRN. Group B (more symptoms): LAMA or LABA. Group E (exacerbations): LAMA+LABA, add ICS only if eosinophils ≥300. De-escalate ICS if eosinophils <100 and no frequent exacerbations.",
        whyItMatters:"Students often treat all obstructive disease the same way. Understanding the neutrophilic vs eosinophilic distinction in COPD changes prescribing behavior fundamentally."
      }
    }
  ],

  preventive: [
    {
      id:"cancer-screening",
      title:"Cancer Screening — Evidence and Timing",
      icon:"🔍",
      color:"#E65100",
      desc:"USPSTF recommendations for breast, colon, lung, cervical, and prostate cancer screening.",
      tags:["Preventive","USPSTF","Screening"],
      content:{
        overview:"Cancer screening decisions require understanding lead-time bias, length-time bias, and overdiagnosis. Not all screening prevents death — some detect cancers that would never have caused harm.",
        mechanism:"Screening works by catching disease in a pre-symptomatic phase when treatment is more effective (stage shift). But lead-time bias can make survival appear longer even without actual benefit. Length-time bias preferentially detects slow-growing tumors. Overdiagnosis detects true disease that would never have progressed to cause symptoms or death.",
        clinicalPearl:"Prostate cancer screening (PSA) is controversial precisely because of overdiagnosis — many low-grade prostate cancers would never cause harm, but detection leads to biopsies and treatments with real side effects (incontinence, impotence). Shared decision-making is essential.",
        management:"Breast: mammogram q2yr ages 40-74 (USPSTF 2024). Colon: colonoscopy q10yr or stool DNA q1-3yr starting age 45. Cervical: Pap q3yr (21-29), Pap+HPV q5yr (30-65). Lung: low-dose CT annually if age 50-80 with ≥20 pack-year history and currently smoke or quit <15yr. Prostate: shared decision-making age 55-69.",
        whyItMatters:"Teaching screening as mechanism-based (not just memorized ages) helps students counsel patients and engage in shared decision-making rather than just ordering tests."
      }
    },
    {
      id:"immunizations-adult",
      title:"Adult Immunization — Beyond the Schedule",
      icon:"💉",
      color:"#1B5E20",
      desc:"Why do some vaccines need boosters? Live vs inactivated. Special populations.",
      tags:["Preventive","Immunology","Vaccines"],
      content:{
        overview:"Vaccine schedules reflect immunologic principles: the type of immune response generated (humoral vs cellular), the durability of memory, and the epidemiology of the target pathogen.",
        mechanism:"Inactivated vaccines (flu, Tdap, hepatitis B) stimulate primarily humoral (antibody) immunity. Protection wanes as antibody titers decline, requiring boosters. Live attenuated vaccines (MMR, varicella, zoster-live) generate broader immune memory including cellular immunity, often providing lifelong protection with fewer doses. mRNA vaccines (COVID-19) generate targeted spike protein production by host cells, stimulating both humoral and cellular responses.",
        clinicalPearl:"Live vaccines are contraindicated in immunocompromised patients because the attenuated virus can cause actual disease. But Shingrix (recombinant zoster) is NOT a live vaccine — it's safe in immunocompromised patients, unlike the older Zostavax.",
        management:"Flu: annually. Tdap: once then Td q10yr (Tdap in pregnancy 27-36 weeks each pregnancy). Pneumococcal: PCV20 once at 65+ or younger with risk factors. Shingrix: 2 doses at 50+. HPV: through age 26 (shared decision 27-45). COVID: per current CDC guidance.",
        whyItMatters:"Understanding why the schedule exists (not just what it is) helps students adapt recommendations for special populations and answer patient questions about vaccine safety."
      }
    },
    {
      id:"cardiovascular-risk",
      title:"Cardiovascular Risk Reduction",
      icon:"🫀",
      color:"#B71C1C",
      desc:"Statin therapy, aspirin, lifestyle: who benefits and by how much? NNT reasoning.",
      tags:["Preventive","Cardiovascular","Statins"],
      content:{
        overview:"CV risk reduction requires understanding absolute risk (not just relative risk), NNT, and the concept that interventions are most valuable in high-risk patients.",
        mechanism:"Statins inhibit HMG-CoA reductase → reduced hepatic cholesterol synthesis → upregulation of LDL receptors → increased LDL clearance. But the benefit extends beyond LDL lowering: statins stabilize atherosclerotic plaques, reduce inflammation (CRP), and improve endothelial function. This is why benefit correlates with baseline risk more than baseline LDL.",
        clinicalPearl:"A 50% relative risk reduction sounds dramatic, but if baseline risk is 2%, the absolute risk reduction is only 1% (NNT = 100). If baseline risk is 20%, the same relative reduction yields 10% absolute reduction (NNT = 10). Always calculate absolute benefit for the patient in front of you.",
        management:"10-year ASCVD risk calculator guides statin intensity. Risk ≥20%: high-intensity statin (atorvastatin 40-80mg, rosuvastatin 20-40mg). Risk 7.5-20%: moderate-to-high intensity based on risk enhancers. Risk <5%: lifestyle modification. Aspirin for primary prevention: only if 40-70 with high ASCVD risk AND no increased bleeding risk.",
        whyItMatters:"NNT reasoning is a core clinical skill. Teaching students to think in absolute terms prevents both over-treatment (low-risk patients) and under-treatment (high-risk patients)."
      }
    }
  ],

  pharma: [
    {
      id:"polypharmacy",
      title:"Polypharmacy & Deprescribing",
      icon:"💊",
      color:"#6A1B9A",
      desc:"When more drugs = more harm. The art of stopping medications. Beers criteria.",
      tags:["Geriatrics","Pharmacology","Safety"],
      content:{
        overview:"Polypharmacy (≥5 medications) increases adverse drug event risk exponentially. Deprescribing — the systematic process of tapering, stopping, or reducing medications — is as important as prescribing.",
        mechanism:"Drug-drug interactions increase combinatorially: 5 drugs = 10 potential pairwise interactions, 10 drugs = 45. Renal and hepatic clearance decline with age, increasing drug levels. Pharmacodynamic sensitivity increases (e.g., benzodiazepine sensitivity in elderly due to GABA receptor changes). The prescribing cascade: side effect of Drug A is treated with Drug B, whose side effect is treated with Drug C.",
        clinicalPearl:"The most common prescribing cascade: NSAID → hypertension → antihypertensive → dizziness → meclizine → sedation → fall → hip fracture. The best intervention was never the meclizine — it was stopping the NSAID.",
        management:"Review all medications at every visit. Apply Beers criteria for potentially inappropriate medications in elderly. Consider STOPP/START criteria. Taper one medication at a time. Monitor for withdrawal or rebound. Ask: 'Is there a pill for a problem that could be solved by stopping a different pill?'",
        whyItMatters:"Students are trained to prescribe, not deprescribe. Teaching the mechanism of harm from polypharmacy creates clinicians who question every medication on the list."
      }
    },
    {
      id:"antibiotic-stewardship",
      title:"Outpatient Antibiotic Stewardship",
      icon:"🦠",
      color:"#00838F",
      desc:"When NOT to prescribe antibiotics. Duration dogma. Narrow-spectrum principles.",
      tags:["Infectious Disease","Stewardship","Guidelines"],
      content:{
        overview:"Most outpatient antibiotics are unnecessary (30-50% of all outpatient antibiotic prescriptions are inappropriate per CDC). Teaching when NOT to prescribe is as important as teaching what to prescribe.",
        mechanism:"Antibiotics disrupt the microbiome, selecting for resistant organisms and increasing risk of C. difficile colitis. Resistance mechanisms include beta-lactamase production, efflux pumps, target site modification, and horizontal gene transfer via plasmids. Each unnecessary prescription contributes to population-level resistance.",
        clinicalPearl:"Acute bronchitis in healthy adults is viral >95% of the time. Prescribing antibiotics for bronchitis is the single most common inappropriate antibiotic use in the outpatient setting. The green sputum myth ('purulent = bacterial') has been debunked — sputum color reflects neutrophil activity, not bacterial infection.",
        management:"URI/bronchitis: NO antibiotics (viral >95%). Acute sinusitis: wait 10 days before antibiotics (most resolve). Pharyngitis: test before treating (Centor/McIsaac score + rapid strep). UTI: 3-5 days for uncomplicated (not 7-14 days). Duration: shortest effective course per current evidence (many infections need fewer days than traditionally taught).",
        whyItMatters:"Students who understand resistance mechanisms are more comfortable withholding antibiotics and explaining why to patients who expect a prescription."
      }
    },
    {
      id:"pain-management",
      title:"Chronic Pain — The Non-Opioid Toolkit",
      icon:"⚡",
      color:"#D84315",
      desc:"Mechanism-based pain management: nociceptive vs neuropathic vs nociplastic. When to use what.",
      tags:["Pain","Pharmacology","Mechanism-Based"],
      content:{
        overview:"Chronic pain management requires classifying the pain mechanism first (nociceptive, neuropathic, nociplastic), then selecting therapy that targets that mechanism. One-size-fits-all approaches fail.",
        mechanism:"Nociceptive pain: tissue damage activating peripheral nociceptors → responds to NSAIDs, acetaminophen, physical therapy. Neuropathic pain: nerve damage creating aberrant signaling (sodium channel dysfunction, central sensitization) → responds to gabapentinoids, SNRIs, TCAs. Nociplastic pain (fibromyalgia, IBS): central sensitization without clear peripheral pathology → responds to SNRIs, exercise, CBT, sleep optimization. NOT responsive to opioids long-term.",
        clinicalPearl:"Gabapentin for nociceptive back pain (like a muscle strain) is mechanistically irrational — it targets voltage-gated calcium channels at the dorsal horn, which is relevant for neuropathic pain but not for peripheral nociception. Yet it's commonly prescribed. Matching drug to mechanism prevents this.",
        management:"Step 1: Classify the pain mechanism. Step 2: Non-pharmacologic first (PT, CBT, exercise, sleep hygiene). Step 3: Mechanism-targeted pharmacology. Nociceptive: NSAID trial → acetaminophen → topical agents. Neuropathic: gabapentin/pregabalin or duloxetine or amitriptyline. Nociplastic: duloxetine + exercise + CBT. Step 4: Opioids only for acute severe pain or cancer pain, with exit strategy.",
        whyItMatters:"Mechanism-based prescribing in pain management prevents the default escalation to opioids and teaches students to think about WHY a drug should work, not just prescribe by habit."
      }
    }
  ]
};

function renderGrid(containerId, modules) {
  var grid = document.getElementById(containerId);
  grid.innerHTML = modules.map(function(m) {
    return '<div class="module-card" onclick="showDetail(\'' + m.id + '\')">' +
      '<div class="module-card-bar" style="background:' + m.color + '"></div>' +
      '<div class="module-card-body">' +
      '<div class="module-card-icon">' + m.icon + '</div>' +
      '<div class="module-card-title">' + m.title + '</div>' +
      '<div class="module-card-desc">' + m.desc + '</div>' +
      '<div class="module-card-tags">' + m.tags.map(function(t){return '<span class="tag">' + t + '</span>'}).join('') + '</div>' +
      '</div></div>';
  }).join('');
}

function findModule(id) {
  var all = MODULES.chronic.concat(MODULES.preventive).concat(MODULES.pharma);
  for (var i = 0; i < all.length; i++) {
    if (all[i].id === id) return all[i];
  }
  return null;
}

function showDetail(id) {
  var m = findModule(id);
  if (!m) return;
  var c = m.content;
  var html = '<div class="module-detail active" id="detail-' + id + '">' +
    '<button class="close-detail" onclick="hideDetail()" style="float:right;margin-bottom:12px">✕ Close</button>' +
    '<h2>' + m.icon + ' ' + m.title + '</h2>' +
    '<h3>Overview</h3><p>' + c.overview + '</p>' +
    '<div class="mechanism-box"><div class="mechanism-box-title">Mechanism</div><p>' + c.mechanism + '</p></div>' +
    '<div class="clinical-pearl"><strong>Clinical Pearl:</strong> ' + c.clinicalPearl + '</div>' +
    '<h3>Management</h3><p>' + c.management + '</p>' +
    '<h3>Why It Matters for Clinical Reasoning</h3><p>' + c.whyItMatters + '</p>' +
    '</div>';
  document.getElementById('detail-container').innerHTML = html;
  document.getElementById('detail-container').scrollIntoView({behavior:'smooth'});
}

function hideDetail() {
  document.getElementById('detail-container').innerHTML = '';
}

renderGrid('chronic-grid', MODULES.chronic);
renderGrid('preventive-grid', MODULES.preventive);
renderGrid('pharma-grid', MODULES.pharma);
</script>
</body>
</html>
