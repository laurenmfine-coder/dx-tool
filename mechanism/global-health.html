<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Health - ReasonDx</title>
<style>
:root{--bg-page:#f8fafc;--bg-white:#fff;--bg-subtle:#f1f5f9;--text-primary:#0f172a;--text-secondary:#475569;--border:#e2e8f0;--accent:#10b981;--accent-light:#d1fae5;--green:#059669;--red:#dc2626;--radius-sm:8px;--radius-lg:16px}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg-page);color:var(--text-primary);line-height:1.6}
.header{background:linear-gradient(135deg,#10b981,#059669);color:#fff;padding:16px 24px}.logo{font-weight:700;font-size:18px}
.module-header{background:var(--bg-white);border-bottom:1px solid var(--border);padding:24px}.module-title{display:flex;align-items:center;gap:16px;max-width:1400px;margin:0 auto}.module-icon{width:56px;height:56px;background:linear-gradient(135deg,#d1fae5,#a7f3d0);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:28px}.module-title h1{font-size:26px;font-weight:700}.enhanced-badge{background:linear-gradient(135deg,var(--accent),#059669);color:#fff;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-left:8px}
.progress-bar{background:var(--bg-white);border-bottom:1px solid var(--border);padding:12px 24px}.progress-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:16px}.progress-track{flex:1;height:8px;background:var(--bg-subtle);border-radius:4px}.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .3s}.progress-count{font-size:13px;font-weight:600}
.timeline-nav{background:var(--bg-white);border-bottom:1px solid var(--border);padding:0 24px}.timeline-inner{max-width:1400px;margin:0 auto;display:flex}.timeline-phase{flex:1;padding:16px 8px;cursor:pointer;border-bottom:3px solid transparent;text-align:center}.timeline-phase.active{border-bottom-color:var(--accent)}.timeline-phase.locked{opacity:.4}.phase-label{font-size:12px;font-weight:600}.phase-time{font-size:10px;color:var(--text-secondary)}
.main-container{max-width:1400px;margin:0 auto;padding:24px;display:grid;grid-template-columns:300px 1fr;gap:24px}@media(max-width:900px){.main-container{grid-template-columns:1fr}}
.card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:16px}.card-header{padding:14px 18px;border-bottom:1px solid var(--border)}.card-title{font-size:13px;font-weight:600}.card-content{padding:16px 18px}.case-narrative{font-size:14px;color:var(--text-secondary)}
.clinical-pearl{margin-top:12px;padding:12px;background:var(--accent-light);border-radius:var(--radius-sm);border-left:3px solid var(--accent)}.pearl-title{font-size:10px;font-weight:600;color:#059669}.pearl-text{font-size:11px;color:#047857}
.phase-objectives{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px}.obj-title{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:8px}.obj-list{list-style:none;font-size:11px}.obj-list li{padding:4px 0 4px 16px;position:relative}.obj-list li::before{content:'→';position:absolute;left:0;color:var(--accent)}
.quiz-card{background:var(--bg-white);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:16px}.quiz-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}.quiz-num{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),#059669);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}.quiz-type{font-size:12px;font-weight:600}.quiz-meta{margin-left:auto;display:flex;gap:6px}.quiz-tag{font-size:9px;padding:2px 6px;background:var(--bg-subtle);border-radius:4px}
.quiz-body{padding:16px}.quiz-stem{font-size:14px;font-weight:500;margin-bottom:14px}.quiz-options{display:flex;flex-direction:column;gap:8px}.quiz-option{display:flex;gap:12px;padding:12px 14px;background:var(--bg-subtle);border:2px solid transparent;border-radius:var(--radius-sm);cursor:pointer}.quiz-option.selected{border-color:var(--accent)}.quiz-option.correct{border-color:var(--green);background:rgba(5,150,105,.08)}.quiz-option.incorrect{border-color:var(--red);background:rgba(220,38,38,.08)}.quiz-option.disabled{pointer-events:none;opacity:.7}
.option-letter{width:24px;height:24px;border:2px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}.quiz-option.selected .option-letter{border-color:var(--accent);color:var(--accent)}.quiz-option.correct .option-letter{background:var(--green);color:#fff;border-color:var(--green)}.quiz-option.incorrect .option-letter{background:var(--red);color:#fff;border-color:var(--red)}
.submit-btn{margin-top:14px;width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),#059669);color:#fff;border:none;border-radius:var(--radius-sm);font-weight:600;cursor:pointer}.submit-btn:disabled{background:var(--bg-subtle);color:var(--text-secondary)}
.explanation{margin-top:16px;padding:16px;border-radius:var(--radius-sm);display:none;font-size:13px}.explanation.visible{display:block}.explanation.correct{background:#f0fdf4;border:1px solid #bbf7d0}.explanation.incorrect{background:#fef2f2;border:1px solid #fecaca}
.keypoint{margin-top:10px;padding:10px;background:rgba(16,185,129,.1);border-radius:6px;font-size:12px}.keypoint-label{font-weight:600;color:var(--accent);font-size:10px}
</style>
</head>
<body>
<header class="header"><div class="logo">🌍 ReasonDx — Global Health</div></header>
<div class="module-header"><div class="module-title"><div class="module-icon">🌍</div><div><h1>Global Health<span class="enhanced-badge">✨ TRAVEL MEDICINE</span></h1><p>Malaria, TB, HIV, Parasites, and Tropical Diseases</p></div></div></div>
<div class="progress-bar"><div class="progress-inner"><span style="font-size:12px;color:var(--text-secondary)">Progress</span><div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div><span class="progress-count" id="progressCount">0/20</span></div></div>
<nav class="timeline-nav"><div class="timeline-inner">
<div class="timeline-phase active" onclick="goPhase(1)"><div class="phase-label">🦟 Malaria</div><div class="phase-time">Diagnosis & Rx</div></div>
<div class="timeline-phase locked" onclick="goPhase(2)"><div class="phase-label">🫁 TB & HIV</div><div class="phase-time">Global Epidemics</div></div>
<div class="timeline-phase locked" onclick="goPhase(3)"><div class="phase-label">🐛 Parasites</div><div class="phase-time">Helminths & Protozoa</div></div>
<div class="timeline-phase locked" onclick="goPhase(4)"><div class="phase-label">💉 Prevention</div><div class="phase-time">Vaccines & PH</div></div>
</div></nav>
<div class="main-container">
<aside>
<div class="phase-objectives" id="phaseObjectives"></div>
<div class="card"><div class="card-header"><div class="card-title">📋 Clinical Snapshot</div></div><div class="card-content"><div class="case-narrative" id="caseNarrative"></div><div class="clinical-pearl"><div class="pearl-title">💡 Pearl</div><div class="pearl-text" id="pearlText"></div></div></div></div>
</aside>
<main id="questionsPanel"></main>
</div>
<script>
var phase=1,state={};for(var i=1;i<=20;i++)state[i]={pick:null,done:false,ok:false};
var phases={
1:{qs:[1,2,3,4,5],narrative:'Traveler from Sub-Saharan Africa with fever and chills. Malaria until proven otherwise.',pearl:'Malaria: thick smear diagnosis, P. falciparum most deadly, ACT treatment.',objectives:['Diagnose malaria','Know species differences','Choose treatment','Understand prophylaxis']},
2:{qs:[6,7,8,9,10],narrative:'TB and HIV are interlinked global epidemics requiring systematic approaches.',pearl:'TB: RIPE x2mo then RI x4mo. HIV: start ART immediately for all.',objectives:['Diagnose active TB','Know TB regimen','Stage HIV','Start ART']},
3:{qs:[11,12,13,14,15],narrative:'Parasitic diseases affect billions. Pattern recognition and exposure history are key.',pearl:'Eosinophilia + exposure history = think parasites. Many single-dose cures.',objectives:['Recognize syndromes','Know treatments','Understand transmission','Identify eosinophilia causes']},
4:{qs:[16,17,18,19,20],narrative:'Prevention through vaccines and public health saves millions annually.',pearl:'Measles vaccine greatest impact. Clean water foundational.',objectives:['Know vaccines','Understand interventions','Recognize priorities','Apply prevention']}
};
var Qs={
1:{type:'Malaria Dx',tags:['Global'],stem:'Fever after Ghana travel. First test?',opts:[['a','Thick and thin blood smear'],['b','Chest X-ray'],['c','Blood cultures'],['d','Dengue serology']],ans:'a',exp:'<strong>Malaria:</strong> Fever + endemic travel = smear first. Thick (sensitive), thin (species).',kp:'Fever + travel = malaria smear first.'},
2:{type:'Species',tags:['Global'],stem:'Most severe Plasmodium species?',opts:[['a','P. vivax'],['b','P. falciparum'],['c','P. ovale'],['d','P. malariae']],ans:'b',exp:'<strong>P. falciparum:</strong> Cerebral malaria, highest mortality, any-age RBCs.',kp:'P. falciparum = most severe, cerebral malaria.'},
3:{type:'Treatment',tags:['Global'],stem:'First-line for uncomplicated P. falciparum?',opts:[['a','Chloroquine'],['b','ACT (artemisinin combination)'],['c','Quinine alone'],['d','Doxycycline alone']],ans:'b',exp:'<strong>ACT:</strong> Artemether-lumefantrine. Widespread chloroquine resistance.',kp:'ACT for uncomplicated falciparum.'},
4:{type:'Prophylaxis',tags:['Global'],stem:'Safe antimalarial prophylaxis in pregnancy?',opts:[['a','Doxycycline'],['b','Mefloquine'],['c','Primaquine'],['d','None are safe']],ans:'b',exp:'<strong>Pregnancy:</strong> Mefloquine safe all trimesters. Doxycycline contraindicated.',kp:'Mefloquine safe in pregnancy.'},
5:{type:'Severe',tags:['Global'],stem:'P. falciparum with altered consciousness - treatment?',opts:[['a','Oral ACT'],['b','IV artesunate'],['c','IM chloroquine'],['d','Oral doxycycline']],ans:'b',exp:'<strong>Severe malaria:</strong> IV artesunate. Better than IV quinine.',kp:'IV artesunate for severe malaria.'},
6:{type:'TB Dx',tags:['Global'],stem:'Gold standard for TB diagnosis?',opts:[['a','TST/PPD'],['b','Sputum culture'],['c','CXR alone'],['d','IGRA']],ans:'b',exp:'<strong>TB:</strong> Culture gold standard. Xpert MTB/RIF for rapid diagnosis.',kp:'Culture = gold standard for TB.'},
7:{type:'TB Rx',tags:['Global'],stem:'Standard drug-susceptible TB regimen?',opts:[['a','INH alone 9 months'],['b','RIPE 2mo then RI 4mo'],['c','Rifampin alone'],['d','Fluoroquinolone 6mo']],ans:'b',exp:'<strong>TB treatment:</strong> RIPE x2 months, RI x4 months = 6 months total.',kp:'RIPE 2mo + RI 4mo = 6 months.'},
8:{type:'AIDS',tags:['Global'],stem:'What defines AIDS?',opts:[['a','Positive HIV test'],['b','CD4 less than 200 or AIDS-defining illness'],['c','Viral load greater than 1000'],['d','Any OI']],ans:'b',exp:'<strong>AIDS:</strong> CD4 <200 OR AIDS-defining condition (PCP, CMV, KS, etc).',kp:'AIDS: CD4 <200 or AIDS-defining illness.'},
9:{type:'ART',tags:['Global'],stem:'When to start antiretroviral therapy?',opts:[['a','CD4 less than 350'],['b','Immediately for all HIV patients'],['c','Only with symptoms'],['d','After AIDS diagnosis']],ans:'b',exp:'<strong>ART:</strong> Start immediately for all. Test-and-treat strategy.',kp:'Start ART immediately for all HIV+.'},
10:{type:'PCP',tags:['Global'],stem:'PCP prophylaxis CD4 threshold?',opts:[['a','Less than 500'],['b','Less than 200'],['c','Less than 50'],['d','All patients']],ans:'b',exp:'<strong>PCP prophylaxis:</strong> TMP-SMX when CD4 <200.',kp:'PCP prophylaxis at CD4 <200.'},
11:{type:'Giardia',tags:['Global'],stem:'Bloating, foul diarrhea, contaminated water exposure?',opts:[['a','Giardia'],['b','Cholera'],['c','Typhoid'],['d','Amebiasis']],ans:'a',exp:'<strong>Giardia:</strong> Foul stools, bloating, weight loss. Metronidazole treatment.',kp:'Giardia: bloating, foul stools, water exposure.'},
12:{type:'Amebiasis',tags:['Global'],stem:'Bloody diarrhea with flask-shaped colonic ulcers?',opts:[['a','UC'],['b','E. histolytica'],['c','Giardia'],['d','Crypto']],ans:'b',exp:'<strong>Amebiasis:</strong> Flask-shaped ulcers, liver abscess. Metronidazole + paromomycin.',kp:'Amebiasis: flask ulcers, liver abscess.'},
13:{type:'Hookworm',tags:['Global'],stem:'Iron deficiency anemia + eosinophilia in tropical patient?',opts:[['a','Hookworm'],['b','Diet alone'],['c','Thalassemia'],['d','Lead']],ans:'a',exp:'<strong>Hookworm:</strong> Chronic GI blood loss causes IDA. Eosinophilia common.',kp:'Hookworm: IDA + eosinophilia.'},
14:{type:'Schisto',tags:['Global'],stem:'Hematuria after African freshwater exposure?',opts:[['a','S. haematobium'],['b','Giardia'],['c','Malaria'],['d','Leishmania']],ans:'a',exp:'<strong>S. haematobium:</strong> GU schistosomiasis, hematuria. Praziquantel treatment.',kp:'S. haematobium: hematuria, freshwater.'},
15:{type:'Leish',tags:['Global'],stem:'Chronic non-healing ulcer, Middle East travel?',opts:[['a','Cutaneous leishmaniasis'],['b','Cellulitis'],['c','SCC'],['d','Fungal']],ans:'a',exp:'<strong>Leishmaniasis:</strong> Sandfly vector. Cutaneous, mucocutaneous, visceral forms.',kp:'Leishmaniasis: chronic ulcer, sandfly.'},
16:{type:'Vaccines',tags:['Global'],stem:'Greatest impact on child mortality?',opts:[['a','Measles vaccine'],['b','Hep A'],['c','HPV'],['d','Typhoid']],ans:'a',exp:'<strong>Measles:</strong> Prevented millions of deaths. Highly contagious.',kp:'Measles vaccine: greatest child mortality impact.'},
17:{type:'Cholera',tags:['Global'],stem:'Most important cholera treatment?',opts:[['a','Antibiotics'],['b','Aggressive rehydration'],['c','Antidiarrheals'],['d','Probiotics']],ans:'b',exp:'<strong>Cholera:</strong> Rehydration saves lives. ORS or IV. Antibiotics secondary.',kp:'Cholera: rehydration is life-saving.'},
18:{type:'Typhoid',tags:['Global'],stem:'Rose spots, relative bradycardia, stepwise fever?',opts:[['a','Typhoid'],['b','Dengue'],['c','Malaria'],['d','Leptospirosis']],ans:'a',exp:'<strong>Typhoid:</strong> S. typhi. Blood culture diagnosis. Fluoroquinolones or azithromycin.',kp:'Typhoid: rose spots, relative bradycardia.'},
19:{type:'Dengue',tags:['Global'],stem:'Breakbone fever, retro-orbital pain, thrombocytopenia?',opts:[['a','Dengue'],['b','Malaria'],['c','Typhoid'],['d','Flu']],ans:'a',exp:'<strong>Dengue:</strong> Severe myalgias, retro-orbital pain, rash. Warning signs: abd pain, vomiting.',kp:'Dengue: breakbone, retro-orbital pain.'},
20:{type:'Maternal',tags:['Global'],stem:'Leading cause of maternal mortality globally?',opts:[['a','Postpartum hemorrhage'],['b','Malaria'],['c','HIV'],['d','Trauma']],ans:'a',exp:'<strong>Maternal mortality:</strong> PPH #1. Also HTN, sepsis, unsafe abortion.',kp:'PPH = #1 maternal mortality cause.'}
};
var answers={1:'b',2:'d',3:'a',4:'a',5:'b',6:'c',7:'b',8:'c',9:'a',10:'d',11:'a',12:'a',13:'b',14:'c',15:'d',16:'c',17:'b',18:'c',19:'d',20:'d'};
function goPhase(p){if(p<1||p>4)return;phase=p;renderPhase();}
function renderPhase(){var ph=phases[phase];document.querySelectorAll('.timeline-phase').forEach(function(el,i){el.classList.remove('active','locked');if(i+1===phase)el.classList.add('active');else if(i+1>phase)el.classList.add('locked');});document.getElementById('caseNarrative').innerHTML=ph.narrative;document.getElementById('pearlText').textContent=ph.pearl;var objHtml='<div class="obj-title">🎯 Phase '+phase+' Objectives</div><ul class="obj-list">';ph.objectives.forEach(function(o){objHtml+='<li>'+o+'</li>';});objHtml+='</ul>';document.getElementById('phaseObjectives').innerHTML=objHtml;renderQuestions(ph.qs);}
function renderQuestions(qIds){var html='';qIds.forEach(function(qid){var q=Qs[qid];if(!q)return;html+='<div class="quiz-card" id="q'+qid+'"><div class="quiz-header"><div class="quiz-num">'+qid+'</div><span class="quiz-type">'+q.type+'</span><div class="quiz-meta">';q.tags.forEach(function(t){html+='<span class="quiz-tag">'+t+'</span>';});html+='</div></div>';html+='<div class="quiz-body"><div class="quiz-stem">'+q.stem+'</div><div class="quiz-options">';q.opts.forEach(function(opt){html+='<div class="quiz-option" data-q="'+qid+'" data-opt="'+opt[0]+'" onclick="selectOpt(this)"><div class="option-letter">'+opt[0].toUpperCase()+'</div><div class="option-text">'+opt[1]+'</div></div>';});html+='</div><button class="submit-btn" id="sub'+qid+'" disabled onclick="submitQ('+qid+')">Submit</button><div class="explanation" id="exp'+qid+'"></div></div></div>';});document.getElementById('questionsPanel').innerHTML=html;}
function selectOpt(el){var qid=el.dataset.q;document.querySelectorAll('.quiz-option[data-q="'+qid+'"]').forEach(function(o){o.classList.remove('selected');});el.classList.add('selected');state[qid].pick=el.dataset.opt;document.getElementById('sub'+qid).disabled=false;}
function submitQ(qid){if(state[qid].done)return;state[qid].done=true;var correct=answers[qid],picked=state[qid].pick,isCorrect=picked===correct;state[qid].ok=isCorrect;document.querySelectorAll('.quiz-option[data-q="'+qid+'"]').forEach(function(o){o.classList.add('disabled');if(o.dataset.opt===correct)o.classList.add('correct');else if(o.dataset.opt===picked&&!isCorrect)o.classList.add('incorrect');});document.getElementById('sub'+qid).style.display='none';var q=Qs[qid],expDiv=document.getElementById('exp'+qid);var expHtml='<div>'+(isCorrect?'✓ Correct!':'✗ Incorrect')+'</div><div>'+q.exp+'</div><div class="keypoint"><span class="keypoint-label">⚡ Key:</span> '+q.kp+'</div>';expDiv.innerHTML=expHtml;expDiv.classList.add('visible',isCorrect?'correct':'incorrect');updateProgress();}
function updateProgress(){var done=0;for(var i=1;i<=20;i++)if(state[i].done)done++;document.getElementById('progressFill').style.width=(done/20*100)+'%';document.getElementById('progressCount').textContent=done+'/20';}
renderPhase();
</script>
</body>
</html>
