var phase=1,state={};for(var i=1;i<=20;i++)state[i]={pick:null,done:false,ok:false};

var phases={
1:{qs:[1,2,3,4,5],narrative:'<strong>Delirium</strong>: Acute confusional state - the "vital sign" of geriatrics.',pearl:'Delirium = acute, fluctuating, inattention. Dementia = chronic, progressive. Delirium superimposed on dementia is common.',objectives:['Distinguish delirium from dementia','Identify precipitating factors','Apply CAM criteria','Non-pharmacologic management first'],refs:[{t:'Delirium in Elderly (NEJM)',u:'https://www.nejm.org/doi/full/10.1056/NEJMra1313875'},{t:'CAM Diagnostic Algorithm',u:'https://pubmed.ncbi.nlm.nih.gov/2240918/'},{t:'AGS Delirium Guidelines',u:'https://www.americangeriatrics.org/'}]},
2:{qs:[6,7,8,9,10],narrative:'<strong>Falls</strong>: Leading cause of injury death in elderly. Multifactorial etiology.',pearl:'Falls = geriatric syndrome. Always multifactorial: intrinsic (gait, vision, cognition) + extrinsic (environment, medications).',objectives:['Assess fall risk factors','Evaluate gait and balance','Review medications','Implement prevention strategies'],refs:[{t:'Falls Prevention (NEJM)',u:'https://www.nejm.org/doi/full/10.1056/NEJMcp1903252'},{t:'AGS/BGS Falls Guidelines',u:'https://pubmed.ncbi.nlm.nih.gov/21226685/'},{t:'STEADI Initiative (CDC)',u:'https://www.cdc.gov/steadi/'}]},
3:{qs:[11,12,13,14,15],narrative:'<strong>Polypharmacy</strong>: ≥5 medications. Major cause of adverse events in elderly.',pearl:'Beers Criteria: medications to avoid in elderly. START/STOPP criteria. "Prescribing cascade" - new drug to treat side effect of another.',objectives:['Apply Beers Criteria','Recognize prescribing cascades','Deprescribe safely','Balance risks and benefits'],refs:[{t:'AGS Beers Criteria 2023',u:'https://agsjournals.onlinelibrary.wiley.com/doi/10.1111/jgs.18372'},{t:'Deprescribing Guidelines',u:'https://deprescribing.org/'},{t:'Polypharmacy Review (Lancet)',u:'https://www.thelancet.com/journals/lancet/article/PIIS0140-6736(17)32431-6/fulltext'}]},
4:{qs:[16,17,18,19,20],narrative:'<strong>End-of-Life</strong>: Goals of care, advance directives, palliative care.',pearl:'Palliative care ≠ hospice. Palliative = symptom management at any stage. Hospice = prognosis <6 months, comfort-focused.',objectives:['Conduct goals of care conversations','Understand advance directives','Manage common symptoms','Distinguish palliative from hospice'],refs:[{t:'Goals of Care (NEJM)',u:'https://www.nejm.org/doi/full/10.1056/NEJMra1615879'},{t:'Palliative Care (Lancet)',u:'https://www.thelancet.com/journals/lancet/article/PIIS0140-6736(17)31868-1/fulltext'},{t:'Hospice Eligibility Guidelines',u:'https://www.nhpco.org/'}]}
};

var Qs={
1:{type:'Delirium Recognition',isNBME:true,difficulty:'medium',domains:['mechanism'],tags:['Step2'],
stem:'An 82-year-old hospitalized for pneumonia becomes acutely confused and agitated at night. He cannot focus during conversation. How do you distinguish this from dementia?',
opts:[['a','Delirium: acute onset, fluctuating course, inattention, altered consciousness; Dementia: chronic, progressive, attention relatively preserved until late stages'],['b','Dementia is always acute'],['c','Delirium is chronic'],['d','No way to distinguish']],
exp:'<strong>Delirium vs Dementia:</strong> Delirium is ACUTE (hours to days), FLUCTUATING (often worse at night - "sundowning"), with prominent INATTENTION and altered level of consciousness. Dementia is chronic and progressive with relatively preserved attention until late stages. Importantly, patients with dementia are at HIGH RISK for delirium.',
kp:'CAM criteria: (1) Acute onset + fluctuating course, (2) Inattention, (3) Disorganized thinking OR (4) Altered consciousness. Need 1+2 plus either 3 or 4.',
dd:{mechanism:{title:'Delirium vs Dementia',content:'<h4>Key Differences</h4><table><tr><th>Feature</th><th>Delirium</th><th>Dementia</th></tr><tr><td>Onset</td><td>Acute (hours-days)</td><td>Chronic (months-years)</td></tr><tr><td>Course</td><td>Fluctuating</td><td>Progressive</td></tr><tr><td>Attention</td><td>Impaired</td><td>Preserved (until late)</td></tr><tr><td>Consciousness</td><td>Altered</td><td>Clear</td></tr><tr><td>Reversibility</td><td>Usually reversible</td><td>Irreversible</td></tr></table><h4>CAM Criteria</h4><ol><li>Acute onset + fluctuating course</li><li>Inattention (cant spell WORLD backward)</li><li>Disorganized thinking</li><li>Altered level of consciousness</li></ol><p>Diagnosis: (1) + (2) + either (3) or (4)</p>',bw:['Acute + fluctuating','Inattention key feature','CAM diagnostic tool','Dementia is risk factor']}},
dist:{b:'Dementia is chronic',c:'Delirium is acute',d:'CAM distinguishes'},related:[2]},

2:{type:'Delirium Causes',isNBME:true,difficulty:'medium',domains:['mechanism'],tags:['Step2'],
ctx:'I WATCH DEATH mnemonic.',
stem:'What are common precipitating factors for delirium?',
opts:[['a','I WATCH DEATH: Infection, Withdrawal, Acute metabolic, Trauma/pain, CNS pathology, Hypoxia, Deficiencies, Endocrine, Acute vascular, Toxins/drugs, Heavy metals'],['b','Only infection'],['c','Only medications'],['d','Only metabolic']],
exp:'<strong>Delirium causes (I WATCH DEATH):</strong> Infection (UTI, pneumonia most common), Withdrawal (alcohol, benzos), Acute metabolic (electrolytes, glucose, renal/liver failure), Trauma/pain, CNS pathology (stroke, bleed), Hypoxia, Deficiencies (B12, thiamine), Endocrine (thyroid), Acute vascular (MI, PE), Toxins/drugs, Heavy metals.',
kp:'In hospitalized elderly, most common causes: infection, medications (especially anticholinergics, opioids, benzos), metabolic disturbance, urinary retention, constipation. Always check med list!',
dd:{mechanism:{title:'Delirium Causes',content:'<h4>I WATCH DEATH Mnemonic</h4><ul><li><strong>I</strong>nfection (UTI, pneumonia)</li><li><strong>W</strong>ithdrawal (alcohol, benzos)</li><li><strong>A</strong>cute metabolic</li><li><strong>T</strong>rauma/pain</li><li><strong>C</strong>NS pathology</li><li><strong>H</strong>ypoxia</li><li><strong>D</strong>eficiencies (B12, thiamine)</li><li><strong>E</strong>ndocrine</li><li><strong>A</strong>cute vascular (MI, PE)</li><li><strong>T</strong>oxins/drugs</li><li><strong>H</strong>eavy metals</li></ul><h4>High-Risk Medications</h4><ul><li>Anticholinergics</li><li>Benzodiazepines</li><li>Opioids</li><li>Antihistamines (diphenhydramine)</li><li>Steroids</li></ul>',bw:['UTI most common in elderly','Check medication list','Anticholinergics high risk','I WATCH DEATH']}},
dist:{b:'Many causes',c:'One of many',d:'One of many'},related:[1,3]},

3:{type:'Delirium Management',isNBME:true,difficulty:'hard',domains:['mechanism'],tags:['Step2'],
stem:'What is the first-line management approach for delirium?',
opts:[['a','Non-pharmacologic interventions: treat underlying cause, reorient frequently, maintain sleep-wake cycle, mobilize, avoid restraints, minimize lines/catheters; antipsychotics only if danger to self/others'],['b','Haloperidol for all patients'],['c','Physical restraints'],['d','Benzodiazepines routinely']],
exp:'<strong>Delirium management:</strong> Cornerstone is NON-PHARMACOLOGIC: identify and treat underlying cause, frequent reorientation, maintain day-night cycle (natural light, minimize nighttime interruptions), early mobilization, remove unnecessary lines/catheters, avoid restraints (worsen agitation), hearing aids/glasses. Medications only if severe agitation threatening safety.',
kp:'If medications needed: low-dose haloperidol or atypical antipsychotic (quetiapine, olanzapine). Avoid benzos unless alcohol/benzo withdrawal. Restraints increase delirium duration.',
dd:{mechanism:{title:'Delirium Management',content:'<h4>Non-Pharmacologic (First-Line)</h4><ul><li>Treat underlying cause</li><li>Frequent reorientation (clock, calendar, family)</li><li>Sleep hygiene (minimize nighttime interruptions)</li><li>Early mobilization</li><li>Sensory aids (glasses, hearing aids)</li><li>Remove unnecessary lines/catheters</li><li>Avoid restraints</li><li>Minimize room changes</li></ul><h4>Pharmacologic (If Severe Agitation)</h4><table><tr><th>Drug</th><th>Dose</th><th>Notes</th></tr><tr><td>Haloperidol</td><td>0.5-1mg</td><td>Avoid in Parkinsons</td></tr><tr><td>Quetiapine</td><td>12.5-25mg</td><td>Sedating</td></tr><tr><td>Olanzapine</td><td>2.5-5mg</td><td>Less sedating</td></tr></table><h4>Avoid</h4><ul><li>Benzodiazepines (except for withdrawal)</li><li>Physical restraints</li><li>Anticholinergics</li></ul>',bw:['Non-pharmacologic first','Treat underlying cause','Avoid restraints','Low-dose antipsychotic if needed']}},
dist:{b:'Only if safety concern',c:'Worsens delirium',d:'Only for withdrawal'},related:[1,2]},

4:{type:'Delirium Subtypes',isNBME:false,difficulty:'medium',domains:['mechanism'],tags:['Step2'],
stem:'What are the subtypes of delirium?',
opts:[['a','Hyperactive (agitated, hallucinations - easier to recognize), Hypoactive (withdrawn, quiet - often missed, worse prognosis), Mixed (fluctuates between both)'],['b','Only hyperactive'],['c','All delirium is agitated'],['d','Subtypes dont matter']],
exp:'<strong>Delirium subtypes:</strong> Hyperactive: agitation, restlessness, hallucinations, pulling at lines - easily recognized. Hypoactive: withdrawn, quiet, decreased activity - often MISSED, mistaken for depression or fatigue, actually has WORSE prognosis. Mixed: fluctuates between both. Hypoactive is most common in elderly.',
kp:'Hypoactive delirium is underdiagnosed - always screen hospitalized elderly. Worse outcomes than hyperactive because treatment is delayed.',
dd:{mechanism:{title:'Delirium Subtypes',content:'<h4>Comparison</h4><table><tr><th>Feature</th><th>Hyperactive</th><th>Hypoactive</th></tr><tr><td>Presentation</td><td>Agitated, restless</td><td>Withdrawn, quiet</td></tr><tr><td>Recognition</td><td>Easily recognized</td><td>Often missed</td></tr><tr><td>Prognosis</td><td>Better</td><td>Worse</td></tr><tr><td>Frequency</td><td>~25%</td><td>~25%</td></tr></table><p>Mixed subtype: ~35-50%</p><h4>Clinical Implications</h4><ul><li>Screen all hospitalized elderly</li><li>Dont mistake hypoactive for depression</li><li>Same management principles apply</li></ul>',bw:['Hypoactive often missed','Worse prognosis if hypoactive','Mixed most common','Screen all elderly']}},
dist:{b:'Three subtypes',c:'Hypoactive is quiet',d:'Affect prognosis'},related:[1]},

5:{type:'Delirium Prevention',isNBME:true,difficulty:'medium',domains:['mechanism'],tags:['Step2'],
ctx:'HELP program.',
stem:'What strategies prevent delirium in hospitalized elderly?',
opts:[['a','HELP program: orientation, therapeutic activities, sleep protocol, early mobilization, vision/hearing optimization, hydration; reduces delirium incidence by 30-40%'],['b','Prophylactic antipsychotics'],['c','Bed rest'],['d','Frequent room changes']],
exp:'<strong>Delirium prevention (HELP - Hospital Elder Life Program):</strong> Proven interventions: orientation protocols, therapeutic activities (cognitive stimulation), non-pharmacologic sleep protocol, early mobilization, vision/hearing optimization, hydration protocol. Reduces delirium incidence by 30-40% and prevents functional decline.',
kp:'Prevention is more effective than treatment. High-risk patients: dementia, prior delirium, sensory impairment, severe illness, advanced age.',
dd:{mechanism:{title:'Delirium Prevention',content:'<h4>HELP Program Components</h4><ul><li>Orientation (clocks, calendars, reorientation)</li><li>Therapeutic activities (cognitive stimulation)</li><li>Sleep protocol (minimize interruptions, no sleeping pills)</li><li>Early mobilization (OT/PT)</li><li>Vision protocol (glasses, lighting)</li><li>Hearing protocol (hearing aids, communication)</li><li>Hydration protocol</li></ul><h4>Evidence</h4><ul><li>30-40% reduction in delirium incidence</li><li>Prevents functional decline</li><li>Cost-effective</li></ul><h4>High-Risk Patients</h4><ul><li>Pre-existing dementia</li><li>Prior delirium</li><li>Sensory impairment</li><li>Severe illness</li><li>Age >65</li></ul>',bw:['HELP program','Prevention > treatment','30-40% reduction','Early mobilization key']}},
dist:{b:'No evidence for prophylaxis',c:'Increases risk',d:'Increases confusion'},related:[3]},

6:{type:'Falls Assessment',isNBME:true,difficulty:'medium',domains:['mechanism'],tags:['Step2'],
stem:'An 78-year-old presents after a fall at home. What is the comprehensive assessment approach?',
opts:[['a','History (circumstances, LOC, prodrome), physical (orthostatics, gait/balance, vision, neuro, cardiac, MSK), medication review, home safety assessment, cognitive screen'],['b','X-ray only'],['c','CT head only'],['d','No workup needed']],
exp:'<strong>Falls assessment:</strong> History: circumstances, witnesses, loss of consciousness, prodromal symptoms (dizziness, palpitations), prior falls. Exam: orthostatic vitals, gait assessment (Timed Up and Go), balance (Romberg), vision, hearing, neurologic exam (strength, sensation, reflexes), cardiac (murmurs, arrhythmia), MSK (joint disease, foot problems). Review ALL medications.',
kp:'Timed Up and Go: rise from chair, walk 10 feet, turn, return, sit. >12 seconds = increased fall risk. Always check orthostatics (drop >20 systolic or symptoms).',
dd:{mechanism:{title:'Falls Assessment',content:'<h4>History</h4><ul><li>Circumstances of fall</li><li>Witnesses?</li><li>Loss of consciousness?</li><li>Prodrome (dizziness, palpitations)?</li><li>Prior falls (>2 in past year = high risk)</li><li>Fear of falling</li></ul><h4>Physical Exam</h4><ul><li>Orthostatic vital signs</li><li>Gait assessment (Timed Up and Go)</li><li>Balance (Romberg, tandem stance)</li><li>Vision (acuity)</li><li>Neurologic (strength, sensation)</li><li>Cardiovascular (murmurs, rhythm)</li><li>MSK (arthritis, foot exam)</li></ul><h4>Timed Up and Go</h4><ul><li>Rise from chair</li><li>Walk 10 feet</li><li>Turn and return</li><li>Sit down</li><li>>12 seconds = increased risk</li></ul>',bw:['Timed Up and Go >12 sec','Check orthostatics','Review medications','Multifactorial assessment']}},
dist:{b:'Comprehensive workup needed',c:'Part of workup',d:'Always needs evaluation'},related:[7]},

7:{type:'Falls Risk Factors',isNBME:true,difficulty:'medium',domains:['mechanism'],tags:['Step2'],
ctx:'Modifiable factors.',
stem:'Which medications increase fall risk in elderly?',
opts:[['a','Sedative-hypnotics, antidepressants, antipsychotics, opioids, antihypertensives (orthostasis), anticholinergics, anticonvulsants - all increase risk 1.5-2x'],['b','Only sedatives'],['c','No medications affect falls'],['d','Antibiotics']],
exp:'<strong>Medications and falls:</strong> High-risk medications: benzodiazepines/sedative-hypnotics (strongest association), antidepressants (TCAs, SSRIs), antipsychotics, opioids, antihypertensives (especially those causing orthostasis), anticholinergics, anticonvulsants. Each increases risk ~1.5-2x. Polypharmacy (≥4 meds) independently increases risk.',
kp:'Review and minimize psychoactive medications. If must use, start low, go slow. Consider tapering benzos if appropriate. Vitamin D supplementation may reduce falls.',
dd:{mechanism:{title:'Medications and Falls',content:'<h4>High-Risk Medications</h4><table><tr><th>Class</th><th>Risk Increase</th></tr><tr><td>Benzodiazepines</td><td>1.5-2x</td></tr><tr><td>Antidepressants</td><td>1.5-2x</td></tr><tr><td>Antipsychotics</td><td>1.5-2x</td></tr><tr><td>Opioids</td><td>1.5x</td></tr><tr><td>Antihypertensives</td><td>1.2-1.5x</td></tr></table><h4>Other Risk Factors</h4><ul><li>Polypharmacy (≥4 medications)</li><li>Orthostatic hypotension</li><li>Visual impairment</li><li>Gait/balance disorder</li><li>Cognitive impairment</li><li>Lower extremity weakness</li><li>Foot problems</li><li>Environmental hazards</li></ul>',bw:['Benzos highest risk','Polypharmacy >4 meds','Start low go slow','Vitamin D may help']}},
dist:{b:'Many classes',c:'Major contributor',d:'Not associated'},related:[6,11]},

8:{type:'Falls Prevention',isNBME:true,difficulty:'medium',domains:['mechanism'],tags:['Step2'],
stem:'What interventions reduce fall risk?',
opts:[['a','Exercise (strength + balance training), medication review/reduction, vision correction, home safety modifications, vitamin D supplementation, treat orthostatic hypotension'],['b','Bed rest'],['c','More medications'],['d','Single intervention sufficient']],
exp:'<strong>Falls prevention:</strong> Evidence-based interventions: exercise programs (Tai Chi, strength + balance training - strongest evidence), medication review and deprescribing, vision correction (cataract surgery), home safety assessment (remove rugs, improve lighting, grab bars), vitamin D supplementation (especially if deficient), PT evaluation, treating orthostatic hypotension.',
kp:'Multifactorial interventions more effective than single interventions. Tai Chi particularly effective (reduces falls ~30%). Hip protectors reduce fracture risk in falls but compliance poor.',
dd:{mechanism:{title:'Falls Prevention',content:'<h4>Evidence-Based Interventions</h4><table><tr><th>Intervention</th><th>Evidence</th></tr><tr><td>Exercise (balance/strength)</td><td>Strong</td></tr><tr><td>Tai Chi</td><td>Strong (~30% reduction)</td></tr><tr><td>Medication review</td><td>Moderate</td></tr><tr><td>Vision correction</td><td>Moderate</td></tr><tr><td>Home safety</td><td>Moderate (with OT)</td></tr><tr><td>Vitamin D</td><td>Moderate (if deficient)</td></tr></table><h4>Home Safety Modifications</h4><ul><li>Remove throw rugs</li><li>Improve lighting</li><li>Install grab bars (bathroom)</li><li>Non-slip mats</li><li>Remove clutter</li></ul><h4>NOT Effective</h4><ul><li>Bed rest (increases weakness)</li><li>Restraints (increase injury)</li></ul>',bw:['Exercise strongest evidence','Tai Chi 30% reduction','Multifactorial approach','Vitamin D if deficient']}},
dist:{b:'Increases weakness',c:'Reduce medications',d:'Need multifactorial'},related:[6,7]},

9:{type:'Hip Fracture',isNBME:true,difficulty:'medium',domains:['mechanism'],tags:['Step2'],
ctx:'Common consequence of falls.',
stem:'An elderly patient falls and has groin pain, shortened externally rotated leg. X-ray shows femoral neck fracture. What is the management?',
opts:[['a','Surgical repair within 24-48 hours improves outcomes; displaced femoral neck: arthroplasty (hemiarthroplasty or total hip); intertrochanteric: internal fixation; optimize medically but dont delay surgery'],['b','Conservative management'],['c','Delay surgery 1 week'],['d','All fractures same treatment']],
exp:'<strong>Hip fracture management:</strong> Surgery within 24-48 hours reduces mortality and complications. Femoral neck (intracapsular): blood supply at risk → displaced fractures need arthroplasty (hemiarthroplasty if not ambulatory, total hip if active). Intertrochanteric (extracapsular): blood supply preserved → internal fixation (sliding hip screw or intramedullary nail).',
kp:'1-year mortality after hip fracture ~20-30%. Prevent DVT, delirium, pressure ulcers. Early mobilization essential. Osteoporosis treatment after fracture.',
dd:{mechanism:{title:'Hip Fractures',content:'<h4>Types and Treatment</h4><table><tr><th>Type</th><th>Location</th><th>Treatment</th></tr><tr><td>Femoral neck (non-displaced)</td><td>Intracapsular</td><td>Internal fixation</td></tr><tr><td>Femoral neck (displaced)</td><td>Intracapsular</td><td>Arthroplasty</td></tr><tr><td>Intertrochanteric</td><td>Extracapsular</td><td>Internal fixation</td></tr><tr><td>Subtrochanteric</td><td>Below trochanter</td><td>Intramedullary nail</td></tr></table><h4>Surgical Timing</h4><ul><li>Within 24-48 hours</li><li>Reduces mortality, complications</li><li>Medical optimization but dont delay</li></ul><h4>Complications</h4><ul><li>DVT/PE</li><li>Delirium</li><li>Pressure ulcers</li><li>Pneumonia</li><li>Nonunion/AVN (femoral neck)</li></ul>',bw:['Surgery within 24-48h','Displaced femoral neck = arthroplasty','Intertrochanteric = fixation','20-30% 1-year mortality']}},
dist:{b:'Surgery improves outcomes',c:'Delay increases mortality',d:'Treatment differs by type'},related:[6]},

10:{type:'Osteoporosis',isNBME:true,difficulty:'medium',domains:['mechanism'],tags:['Step2'],
stem:'When should you screen for osteoporosis and how is it treated?',
opts:[['a','DEXA screening: all women ≥65, men ≥70, younger if risk factors; T-score ≤-2.5 = osteoporosis; treat with bisphosphonates first-line + calcium/vitamin D'],['b','Screen only after fracture'],['c','T-score ≤-1.0 is osteoporosis'],['d','No treatment available']],
exp:'<strong>Osteoporosis:</strong> DEXA screening: women ≥65, men ≥70, or earlier if risk factors (steroid use, prior fracture, low BMI, smoking). T-score: ≤-1.0 to -2.5 = osteopenia, ≤-2.5 = osteoporosis. Treatment: calcium 1200mg/day, vitamin D 800-1000 IU/day, bisphosphonate (alendronate, risedronate, zoledronic acid) first-line.',
kp:'FRAX calculator estimates 10-year fracture risk. Bisphosphonate holiday after 5 years oral or 3 years IV. Alternatives: denosumab, teriparatide (for severe osteoporosis).',
dd:{mechanism:{title:'Osteoporosis',content:'<h4>Screening</h4><ul><li>Women ≥65</li><li>Men ≥70</li><li>Younger with risk factors</li></ul><h4>T-Score Interpretation</h4><table><tr><th>T-Score</th><th>Diagnosis</th></tr><tr><td>≥-1.0</td><td>Normal</td></tr><tr><td>-1.0 to -2.5</td><td>Osteopenia</td></tr><tr><td>≤-2.5</td><td>Osteoporosis</td></tr></table><h4>Treatment</h4><ul><li>Calcium 1200mg/day</li><li>Vitamin D 800-1000 IU/day</li><li>Bisphosphonates (first-line)</li><li>Denosumab (alternative)</li><li>Teriparatide (severe)</li></ul><h4>FRAX Tool</h4><p>Estimates 10-year fracture probability. Treat if: hip fracture risk ≥3% or major osteoporotic fracture risk ≥20%</p>',bw:['T-score ≤-2.5 = osteoporosis','Bisphosphonates first-line','Screen women ≥65','FRAX for risk estimation']}},
dist:{b:'Screen before fracture',c:'-2.5 is osteoporosis',d:'Effective treatments exist'},related:[9]},

11:{type:'Polypharmacy',isNBME:true,difficulty:'medium',domains:['mechanism'],tags:['Step2'],
stem:'An 80-year-old takes 12 medications. What approach should you take?',
opts:[['a','Review using Beers Criteria, identify potentially inappropriate medications, assess for drug-drug interactions, consider deprescribing with shared decision-making, prioritize based on goals of care'],['b','Continue all medications'],['c','Stop all medications'],['d','Add more medications']],
exp:'<strong>Polypharmacy approach:</strong> Define goals of care first. Review each medication: still indicated? appropriate dose for renal function? on Beers list? drug-drug interactions? Consider deprescribing: stop one medication at a time, monitor, involve patient in decisions. Use tools: Beers Criteria, STOPP/START, deprescribing guidelines.',
kp:'Polypharmacy associated with: falls, cognitive impairment, hospitalization, mortality. Prescribing cascade: new drug to treat side effect of another drug.',
dd:{mechanism:{title:'Polypharmacy Management',content:'<h4>Definition</h4><ul><li>Polypharmacy: ≥5 medications</li><li>Excessive polypharmacy: ≥10 medications</li></ul><h4>Review Process</h4><ol><li>Define goals of care</li><li>List all medications (including OTC, supplements)</li><li>Review indication for each</li><li>Check renal/hepatic dosing</li><li>Identify drug-drug interactions</li><li>Apply Beers Criteria</li><li>Prioritize based on life expectancy and goals</li></ol><h4>Beers Criteria Categories</h4><ul><li>Avoid in older adults</li><li>Avoid in certain conditions</li><li>Use with caution</li><li>Drug-drug interactions</li></ul><h4>Deprescribing Principles</h4><ul><li>One medication at a time</li><li>Start with highest risk</li><li>Taper if needed</li><li>Monitor for withdrawal/rebound</li></ul>',bw:['≥5 meds = polypharmacy','Beers Criteria','Deprescribe one at a time','Prescribing cascade']}},
dist:{b:'Review and reduce',c:'Systematic approach',d:'Reduce medications'},related:[12,13]},

12:{type:'Beers Criteria',isNBME:true,difficulty:'hard',domains:['mechanism'],tags:['Step2'],
ctx:'High-risk medications.',
stem:'Which medications should generally be avoided in elderly per Beers Criteria?',
opts:[['a','Long-acting benzodiazepines, anticholinergics (diphenhydramine, TCAs), NSAIDs long-term, muscle relaxants, sliding scale insulin alone, PPIs long-term without indication'],['b','All blood pressure medications'],['c','All pain medications'],['d','Short-acting medications only']],
exp:'<strong>Beers Criteria highlights:</strong> AVOID: benzodiazepines (especially long-acting), anticholinergics (diphenhydramine, first-gen antihistamines, TCAs), chronic NSAIDs (GI bleed, renal, CV risk), muscle relaxants (anticholinergic, sedating), sliding scale insulin alone (hypoglycemia), PPIs long-term without indication (C. diff, fractures, B12 deficiency).',
kp:'Alternatives: use trazodone/melatonin instead of benzos for sleep, use SSRI instead of TCA, use topical NSAIDs instead of oral.',
dd:{mechanism:{title:'Beers Criteria',content:'<h4>Avoid in Older Adults</h4><table><tr><th>Drug Class</th><th>Concern</th></tr><tr><td>Benzodiazepines</td><td>Falls, cognitive impairment</td></tr><tr><td>Anticholinergics</td><td>Confusion, constipation, urinary retention</td></tr><tr><td>NSAIDs (chronic)</td><td>GI bleed, renal, CV</td></tr><tr><td>Muscle relaxants</td><td>Sedation, anticholinergic</td></tr><tr><td>Meperidine</td><td>Seizures, not effective orally</td></tr><tr><td>Sliding scale insulin alone</td><td>Hypoglycemia</td></tr></table><h4>Common Anticholinergics</h4><ul><li>Diphenhydramine</li><li>Hydroxyzine</li><li>First-gen antihistamines</li><li>Tricyclic antidepressants</li><li>Oxybutynin</li></ul><h4>Safer Alternatives</h4><ul><li>Sleep: trazodone, melatonin</li><li>Depression: SSRI, SNRI</li><li>Pain: acetaminophen, topical NSAIDs</li><li>Allergies: second-gen antihistamines</li></ul>',bw:['Avoid benzos in elderly','Anticholinergics cause confusion','Chronic NSAIDs risky','Know safer alternatives']}},
dist:{b:'Some are appropriate',c:'Many alternatives exist',d:'Long-acting more problematic'},related:[11,13]},

13:{type:'Deprescribing',isNBME:true,difficulty:'medium',domains:['mechanism'],tags:['Step2'],
stem:'How do you safely deprescribe a benzodiazepine in an elderly patient?',
opts:[['a','Gradual taper (reduce by 10-25% every 1-2 weeks), counsel about withdrawal symptoms, provide non-pharmacologic sleep strategies, monitor closely, may take months'],['b','Stop abruptly'],['c','Continue indefinitely'],['d','Switch to higher dose']],
exp:'<strong>Benzodiazepine deprescribing:</strong> Never stop abruptly (risk of seizures, severe withdrawal). Gradual taper: reduce by 10-25% every 1-2 weeks. Longer-acting agents may be easier to taper. Provide alternatives (sleep hygiene, CBT-I). Counsel about temporary worsening of insomnia. Process may take 2-6 months.',
kp:'Deprescribing resources: deprescribing.org has evidence-based algorithms. PPIs can usually be stopped or stepped down if no clear indication. Statins may be stopped if limited life expectancy and primary prevention.',
dd:{mechanism:{title:'Deprescribing Principles',content:'<h4>General Approach</h4><ol><li>Identify target medication</li><li>Plan taper schedule</li><li>Discuss with patient/family</li><li>Taper gradually</li><li>Monitor for withdrawal/rebound</li><li>Provide alternatives</li></ol><h4>Benzodiazepine Taper</h4><ul><li>Reduce 10-25% every 1-2 weeks</li><li>May convert to long-acting first</li><li>2-6 months total duration</li><li>Slower at lower doses</li></ul><h4>PPI Deprescribing</h4><ul><li>Step down (once daily → PRN)</li><li>Or taper over 2-4 weeks</li><li>Rebound acid hypersecretion possible</li><li>Use antacids PRN during taper</li></ul><h4>When NOT to Deprescribe</h4><ul><li>Clear ongoing indication</li><li>Symptom control for palliation</li><li>Patient preference after discussion</li></ul>',bw:['Never stop benzos abruptly','Taper 10-25% every 1-2 weeks','Provide alternatives','deprescribing.org']}},
dist:{b:'Can cause seizures',c:'Should reduce if possible',d:'Reduce, not increase'},related:[11,12]},

14:{type:'Anticholinergic Burden',isNBME:true,difficulty:'medium',domains:['mechanism'],tags:['Step2'],
stem:'What are the effects of anticholinergic medications in elderly?',
opts:[['a','Central: confusion, delirium, cognitive impairment, sedation; Peripheral: dry mouth, constipation, urinary retention, blurred vision, tachycardia; cumulative burden increases risk'],['b','No cognitive effects'],['c','Only peripheral effects'],['d','Safe in elderly']],
exp:'<strong>Anticholinergic effects:</strong> Central: cognitive impairment, confusion, delirium, hallucinations, sedation - elderly brain more sensitive due to decreased cholinergic reserve. Peripheral: dry mouth, constipation, urinary retention, blurred vision, tachycardia. Anticholinergic burden is cumulative - multiple low-anticholinergic drugs add up.',
kp:'Anticholinergic cognitive burden scale helps quantify risk. Common culprits often overlooked: diphenhydramine (Benadryl), oxybutynin, TCAs, first-gen antihistamines.',
dd:{mechanism:{title:'Anticholinergic Effects',content:'<h4>Central Effects</h4><ul><li>Confusion/delirium</li><li>Cognitive impairment</li><li>Hallucinations</li><li>Sedation</li><li>Memory impairment</li></ul><h4>Peripheral Effects</h4><ul><li>Dry mouth</li><li>Constipation</li><li>Urinary retention</li><li>Blurred vision</li><li>Tachycardia</li></ul><h4>High Anticholinergic Burden</h4><ul><li>Diphenhydramine</li><li>Hydroxyzine</li><li>Oxybutynin</li><li>Tricyclic antidepressants</li><li>First-gen antipsychotics</li></ul><h4>Why Elderly Are Vulnerable</h4><ul><li>Decreased cholinergic reserve</li><li>Increased BBB permeability</li><li>Reduced hepatic metabolism</li><li>Cumulative burden from polypharmacy</li></ul>',bw:['Cumulative burden','Central + peripheral effects','Diphenhydramine common culprit','Check anticholinergic burden scale']}},
dist:{b:'Major cognitive effects',c:'Both central and peripheral',d:'High risk in elderly'},related:[11,12]},

15:{type:'Urinary Incontinence',isNBME:false,difficulty:'medium',domains:['mechanism'],tags:['Step2'],
ctx:'Common geriatric issue.',
stem:'What are the types of urinary incontinence and their management?',
opts:[['a','Stress (cough/sneeze, pelvic floor exercises), Urge (overactive bladder, behavioral + anticholinergics if needed), Overflow (retention, treat obstruction), Functional (mobility/cognition)'],['b','All treated the same'],['c','All need surgery'],['d','Anticholinergics for all']],
exp:'<strong>Urinary incontinence types:</strong> Stress: leakage with increased abdominal pressure (cough, sneeze) - treat with Kegels, pessary, surgery. Urge: overactive bladder, sudden urge - behavioral (timed voiding, bladder training), then anticholinergics. Overflow: incomplete emptying, dribbling - treat underlying cause (BPH, neurogenic). Functional: cant get to bathroom in time.',
kp:'DIAPPERS mnemonic for reversible causes: Delirium, Infection, Atrophic vaginitis, Pharmaceuticals, Psychological, Excess output, Restricted mobility, Stool impaction.',
dd:{mechanism:{title:'Urinary Incontinence',content:'<h4>Types</h4><table><tr><th>Type</th><th>Features</th><th>Treatment</th></tr><tr><td>Stress</td><td>Leakage with cough/sneeze</td><td>Kegels, pessary, surgery</td></tr><tr><td>Urge</td><td>Sudden urge, cant hold</td><td>Behavioral, anticholinergics</td></tr><tr><td>Overflow</td><td>Dribbling, incomplete emptying</td><td>Treat obstruction</td></tr><tr><td>Functional</td><td>Cant reach toilet</td><td>Mobility aids, scheduled toileting</td></tr></table><h4>DIAPPERS Mnemonic</h4><ul><li><strong>D</strong>elirium</li><li><strong>I</strong>nfection (UTI)</li><li><strong>A</strong>trophic vaginitis</li><li><strong>P</strong>harmaceuticals</li><li><strong>P</strong>sychological</li><li><strong>E</strong>xcess output (CHF, hyperglycemia)</li><li><strong>R</strong>estricted mobility</li><li><strong>S</strong>tool impaction</li></ul>',bw:['Stress = cough/sneeze','Urge = sudden, cant hold','DIAPPERS for reversible causes','Behavioral therapy first']}},
dist:{b:'Different types different treatment',c:'Most dont need surgery',d:'Only for urge, and not first-line'},related:[11]},

16:{type:'Goals of Care',isNBME:true,difficulty:'hard',domains:['mechanism'],tags:['Step2'],
stem:'How do you approach a goals of care conversation?',
opts:[['a','Ask about understanding of illness, explore values and priorities, discuss prognosis honestly, present options aligned with goals, document clearly, revisit as condition changes'],['b','Tell patient what to do'],['c','Avoid discussing prognosis'],['d','One-time conversation']],
exp:'<strong>Goals of care conversation:</strong> Ask-Tell-Ask approach. First ask: "What is your understanding of your illness?" Provide honest prognostic information at appropriate level. Explore: "What matters most to you?" "What are you hoping for?" Present treatment options aligned with goals. Avoid false hope but maintain realistic hope. Document clearly. Revisit as condition changes.',
kp:'SPIKES protocol for serious news: Setting, Perception, Invitation, Knowledge, Emotions, Strategy/Summary. Focus on what you CAN do, not just what you cant.',
dd:{mechanism:{title:'Goals of Care',content:'<h4>Conversation Framework</h4><ol><li>Assess understanding of illness</li><li>Explore values and priorities</li><li>Share prognostic information</li><li>Present options aligned with goals</li><li>Make recommendations</li><li>Document and communicate to team</li></ol><h4>Key Questions</h4><ul><li>"What is your understanding of your illness?"</li><li>"What matters most to you?"</li><li>"What are you hoping for?"</li><li>"What are you worried about?"</li><li>"What gives your life meaning?"</li></ul><h4>SPIKES Protocol</h4><ul><li><strong>S</strong>etting (private, sit down)</li><li><strong>P</strong>erception (what do they know?)</li><li><strong>I</strong>nvitation (how much do they want to know?)</li><li><strong>K</strong>nowledge (share information)</li><li><strong>E</strong>motions (respond empathetically)</li><li><strong>S</strong>trategy/Summary</li></ul>',bw:['Ask-Tell-Ask','Explore values first','Focus on what CAN do','SPIKES protocol']}},
dist:{b:'Shared decision-making',c:'Essential for planning',d:'Ongoing process'},related:[17]},

17:{type:'Advance Directives',isNBME:true,difficulty:'medium',domains:['mechanism'],tags:['Step2'],
stem:'What are the types of advance directives?',
opts:[['a','Living will (specific instructions), Healthcare proxy/POA (designates decision-maker), POLST/MOLST (actionable medical orders); all should be documented and accessible'],['b','Only living will exists'],['c','Verbal wishes are sufficient'],['d','Doctor decides']],
exp:'<strong>Advance directives:</strong> Living will: written instructions about specific treatments (CPR, ventilator, feeding tube) - limited because cant anticipate all scenarios. Healthcare proxy/Durable POA for Healthcare: designates surrogate decision-maker - more flexible. POLST/MOLST: actionable medical orders signed by physician, for seriously ill patients, travels with patient.',
kp:'Healthcare proxy is generally more useful than living will. POLST is for current medical decision-making, not future wishes. Surrogate should use substituted judgment (what patient would want), not their own preferences.',
dd:{mechanism:{title:'Advance Directives',content:'<h4>Types</h4><table><tr><th>Type</th><th>Description</th><th>Limitations</th></tr><tr><td>Living Will</td><td>Specific treatment preferences</td><td>Cant anticipate all scenarios</td></tr><tr><td>Healthcare Proxy/POA</td><td>Designates decision-maker</td><td>Proxy may not know wishes</td></tr><tr><td>POLST/MOLST</td><td>Medical orders for current treatment</td><td>Only for seriously ill</td></tr></table><h4>Key Principles</h4><ul><li>Document in medical record</li><li>Communicate to family/team</li><li>Review and update regularly</li><li>POLST is physician order</li></ul><h4>Surrogate Decision-Making</h4><ol><li>Substituted judgment (what patient would want)</li><li>If unknown: best interest standard</li></ol>',bw:['Healthcare proxy most flexible','POLST = medical orders','Substituted judgment','Document and communicate']}},
dist:{b:'Multiple types',c:'Written documentation important',d:'Patient autonomy'},related:[16]},

18:{type:'Palliative Care',isNBME:true,difficulty:'medium',domains:['mechanism'],tags:['Step2'],
stem:'When should palliative care be involved?',
opts:[['a','Any serious illness regardless of prognosis - focuses on symptom management, quality of life, psychosocial support; can be concurrent with curative treatment; NOT just end-of-life'],['b','Only at end of life'],['c','Only for cancer'],['d','When giving up on treatment']],
exp:'<strong>Palliative care:</strong> Specialty focused on symptom management, quality of life, and psychosocial/spiritual support for patients with serious illness. Can be provided at ANY stage of illness, concurrent with curative treatment. Not the same as hospice. Early palliative care improves quality of life AND may extend survival (lung cancer data).',
kp:'Palliative care ≠ giving up. Primary palliative care: all clinicians should have basic skills. Specialty palliative care: complex cases, refractory symptoms.',
dd:{mechanism:{title:'Palliative Care',content:'<h4>Definition</h4><p>Specialized care focused on relief of symptoms and stress of serious illness, with goal of improving quality of life for patient and family.</p><h4>Key Principles</h4><ul><li>Any serious illness, any prognosis</li><li>Concurrent with curative treatment</li><li>Focus on quality of life</li><li>Symptom management</li><li>Psychosocial/spiritual support</li><li>Care coordination</li></ul><h4>Palliative vs Hospice</h4><table><tr><th></th><th>Palliative</th><th>Hospice</th></tr><tr><td>Prognosis</td><td>Any</td><td><6 months</td></tr><tr><td>Curative Tx</td><td>Yes</td><td>No</td></tr><tr><td>Setting</td><td>Any</td><td>Usually home/facility</td></tr></table>',bw:['Not just end-of-life','Can have with curative treatment','Focus on quality of life','Early involvement beneficial']}},
dist:{b:'Any stage of serious illness',c:'Any serious illness',d:'Can be with curative treatment'},related:[19]},

19:{type:'Hospice',isNBME:true,difficulty:'medium',domains:['mechanism'],tags:['Step2'],
ctx:'End-of-life care.',
stem:'What are the criteria for hospice eligibility?',
opts:[['a','Prognosis of 6 months or less if disease runs normal course; patient/family choose comfort over curative treatment; can receive hospice at home, facility, or inpatient unit'],['b','Must be in hospital'],['c','Prognosis of 2 years'],['d','Cannot receive any medications']],
exp:'<strong>Hospice criteria:</strong> Two physicians certify prognosis of ≤6 months if disease runs natural course. Patient elects comfort-focused care over curative treatment. Can receive hospice at home (most common), nursing facility, or inpatient hospice unit. Medicare Hospice Benefit covers: nursing visits, medications for comfort, DME, respite care, bereavement support.',
kp:'Hospice does NOT mean stopping all medications - continue comfort meds. Can revoke hospice and return to curative care. Respite care: up to 5 days to give caregivers a break.',
dd:{mechanism:{title:'Hospice',content:'<h4>Eligibility Criteria</h4><ul><li>Prognosis ≤6 months (2 physician certification)</li><li>Patient chooses comfort care</li><li>Disease-specific criteria available</li></ul><h4>Medicare Hospice Benefit</h4><ul><li>RN visits</li><li>Home health aide</li><li>Social work</li><li>Chaplain</li><li>Medications (for comfort)</li><li>DME</li><li>Respite care (up to 5 days)</li><li>Bereavement support (13 months)</li></ul><h4>Settings</h4><ul><li>Home (most common)</li><li>Nursing facility</li><li>Inpatient hospice</li><li>Hospital (general inpatient)</li></ul><h4>What Hospice is NOT</h4><ul><li>Not stopping all treatment</li><li>Not giving up</li><li>Not necessarily dying soon</li><li>Can be revoked</li></ul>',bw:['≤6 month prognosis','Comfort-focused care','Can be at home','Can revoke and return']}},
dist:{b:'Usually at home',c:'6 months prognosis',d:'Comfort medications continue'},related:[18]},

20:{type:'Symptom Management',isNBME:true,difficulty:'hard',domains:['mechanism'],tags:['Step2'],
stem:'How do you manage dyspnea at end of life?',
opts:[['a','Opioids first-line (reduce respiratory drive and air hunger), oxygen if hypoxic, fan to face, positioning, anxiolytics for anxiety component, not hastening death when treating symptom'],['b','Avoid opioids'],['c','Only oxygen helps'],['d','Nothing can be done']],
exp:'<strong>Dyspnea management:</strong> Opioids are first-line for dyspnea - reduce sensation of air hunger through central and peripheral mechanisms. Start low dose morphine. Oxygen if hypoxic (may not help if not hypoxic). Non-pharmacologic: fan to face, positioning, relaxation techniques. Benzodiazepines if anxiety component. Treating symptoms is not euthanasia - principle of double effect.',
kp:'Principle of double effect: action with good intent (symptom relief) is ethical even if unintended consequence (hastened death) may occur. Opioids for dyspnea do NOT hasten death when dosed appropriately.',
dd:{mechanism:{title:'End-of-Life Symptom Management',content:'<h4>Dyspnea</h4><ul><li>Opioids: first-line</li><li>Oxygen: if hypoxic</li><li>Fan to face</li><li>Positioning (upright)</li><li>Benzodiazepines (anxiety)</li></ul><h4>Pain</h4><ul><li>WHO ladder</li><li>Scheduled dosing + PRN</li><li>Rotate opioids if needed</li><li>Adjuvants for neuropathic</li></ul><h4>Nausea</h4><ul><li>Identify cause</li><li>Antiemetics by mechanism</li></ul><h4>Delirium</h4><ul><li>Treat reversible causes</li><li>Haloperidol if needed</li></ul><h4>Principle of Double Effect</h4><ol><li>Act must be good or neutral</li><li>Good effect intended</li><li>Bad effect not means to good</li><li>Proportionate reason</li></ol>',bw:['Opioids for dyspnea','Principle of double effect','Not hastening death','Fan to face helpful']}},
dist:{b:'First-line treatment',c:'Opioids more effective',d:'Many effective treatments'},related:[18,19]}
};

var answers={};for(var i=1;i<=20;i++)answers[i]='a';
function goPhase(p){if(p<1||p>4)return;phase=p;renderPhase();}
function renderPhase(){var ph=phases[phase];document.querySelectorAll('.timeline-phase').forEach(function(el,i){el.classList.remove('active','locked');if(i+1===phase)el.classList.add('active');else if(i+1>phase)el.classList.add('locked');});document.getElementById('caseNarrative').innerHTML=ph.narrative;document.getElementById('pearlText').textContent=ph.pearl;var objHtml='<div class="obj-title">🎯 Phase '+phase+' Objectives</div><ul class="obj-list">';ph.objectives.forEach(function(o){objHtml+='<li>'+o+'</li>';});objHtml+='</ul>';if(ph.refs&&ph.refs.length){objHtml+='<div style="margin-top:12px;padding-top:10px;border-top:1px dashed #e2e8f0"><div style="font-size:10px;font-weight:600;color:#64748b;margin-bottom:6px">📚 Academic References</div>';ph.refs.forEach(function(r){objHtml+='<a href="'+r.u+'" target="_blank" style="font-size:10px;color:#2563eb;text-decoration:none;display:block;margin:3px 0">'+r.t+'</a>';});objHtml+='</div>';}document.getElementById('phaseObjectives').innerHTML=objHtml;renderQuestions(ph.qs);}
function renderQuestions(qIds){var html='';qIds.forEach(function(qid){var q=Qs[qid];if(!q)return;html+='<div class="quiz-card" id="q'+qid+'"><div class="quiz-header"><div class="quiz-num">'+qid+'</div><span class="quiz-type">'+q.type+'</span><div class="quiz-meta">';if(q.isNBME)html+='<span class="quiz-tag nbme">NBME</span>';q.tags.forEach(function(t){html+='<span class="quiz-tag">'+t+'</span>';});html+='<span class="quiz-difficulty '+q.difficulty+'">'+q.difficulty+'</span></div></div>';if(q.ctx)html+='<div class="quiz-context">'+q.ctx+'</div>';html+='<div class="quiz-body"><div class="quiz-stem">'+q.stem+'</div><div class="quiz-options">';q.opts.forEach(function(opt){html+='<div class="quiz-option" data-q="'+qid+'" data-opt="'+opt[0]+'" onclick="selectOpt(this)"><div class="option-letter">'+opt[0].toUpperCase()+'</div><div class="option-text">'+opt[1]+'</div></div>';});html+='</div><button class="submit-btn" id="sub'+qid+'" disabled onclick="submitQ('+qid+')">Submit</button><div class="explanation" id="exp'+qid+'"></div></div></div>';});document.getElementById('questionsPanel').innerHTML=html;}
function selectOpt(el){var qid=el.dataset.q;document.querySelectorAll('.quiz-option[data-q="'+qid+'"]').forEach(function(o){o.classList.remove('selected');});el.classList.add('selected');state[qid].pick=el.dataset.opt;document.getElementById('sub'+qid).disabled=false;}
function submitQ(qid){if(state[qid].done)return;state[qid].done=true;var correct=answers[qid],picked=state[qid].pick,isCorrect=picked===correct;state[qid].ok=isCorrect;document.querySelectorAll('.quiz-option[data-q="'+qid+'"]').forEach(function(o){o.classList.add('disabled');if(o.dataset.opt===correct)o.classList.add('correct');else if(o.dataset.opt===picked&&!isCorrect)o.classList.add('incorrect');});document.getElementById('sub'+qid).style.display='none';var q=Qs[qid],expDiv=document.getElementById('exp'+qid);var expHtml='<div class="exp-header '+(isCorrect?'correct':'incorrect')+'">'+(isCorrect?'✓ Correct!':'✗ Incorrect')+'</div><div>'+q.exp+'</div><div class="keypoint"><span class="keypoint-label">⚡ Key:</span> '+q.kp+'</div>';if(q.dd){expHtml+='<div class="deep-dive"><button class="dd-toggle" onclick="toggleDD(this)">📚 Deep Dive <span>▼</span></button><div class="dd-content">';for(var d in q.dd){expHtml+=q.dd[d].content;if(q.dd[d].bw){expHtml+='<div class="buzzwords">';q.dd[d].bw.forEach(function(b){expHtml+='<span class="buzzword">'+b+'</span>';});expHtml+='</div>';}}expHtml+='</div></div>';}expDiv.innerHTML=expHtml;expDiv.classList.add('visible',isCorrect?'correct':'incorrect');updateProgress();}
function toggleDD(btn){btn.nextElementSibling.classList.toggle('visible');btn.querySelector('span').textContent=btn.nextElementSibling.classList.contains('visible')?'▲':'▼';}
function updateProgress(){var done=0;for(var i=1;i<=20;i++)if(state[i].done)done++;document.getElementById('progressFill').style.width=(done/20*100)+'%';document.getElementById('progressCount').textContent=done+'/20';}
renderPhase();
</script>
</body>
</html>
