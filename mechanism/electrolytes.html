<!DOCTYPE html>

<head>

</head>
<body class="text-white p-6">
    <nav class="mb-6"><a href="index.html" class="text-gray-400 hover:text-white text-sm">‚Üź MechanismX</a>

    <div class="flex gap-2 mb-6">

<script>
const D={

lo:{n:'Hyponatremia',t:'<136',sx:'Headache‚Üíseizures‚Üícoma',m:'‚ÜďNa‚Üí‚ÜďOsm‚ÜíWater into cells‚ÜíCerebral edema',
c:'Hypovolemic: diuretics,GI | Euvolemic: SIADH | Hypervolemic: CHF,cirrhosis',
tx:'Correct ‚Č§8-10/24h. Severe‚Üí3% saline'},

c:'Water loss (DI,GI). Why not drinking?',tx:'Correct ‚Č§10-12/24h. D5W or 0.45%NS'}},
k:{n:'Potassium',s:'K‚Āļ',r:'3.5-5.0',p:'98% intracellular. ALWAYS check Mg¬≤‚Āļ!',

tx:'KCl. FIX Mg FIRST!'},
hi:{n:'Hyperkalemia',t:'>5.0',sx:'Weakness‚Üícardiac arrest',m:'ECG: peaked T‚Üíwide QRS‚Üísine wave',

c:'‚ÜďPTH(surgical,‚ÜďMg) | ‚ÜďVitD',tx:'IV Ca gluconate. Fix Mg!'},

function show(e){
document.querySelectorAll('button').forEach(b=>{b.classList.remove('bg-blue-600');b.classList.add('bg-slate-700');});
document.getElementById('btn-'+e).classList.remove('bg-slate-700');document.getElementById('btn-'+e).classList.add('bg-blue-600');
const d=D[e];

<h3 class="font-bold text-blue-400 mb-3">${d.lo.n} (${d.lo.t})</h3>
<div class="space-y-2 text-sm">

}

</script>
</body>
