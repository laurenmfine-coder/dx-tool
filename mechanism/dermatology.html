    <script>
    const questions = [
        // DERMATOLOGIC EMERGENCIES
        {
            id: 'DERM-001',
            domains: ['Emergency Medicine', 'Dermatology'],
            vignette: 'A 28-year-old woman started allopurinol 2 weeks ago. She now presents with fever, malaise, and a painful rash. Examination shows targetoid lesions with central necrosis on her trunk, mucosal erosions in her mouth, and skin that sloughs with gentle pressure. Approximately 15% of her body surface area is affected.',
            question: 'What is the most likely diagnosis?',
            options: [
                { id: 'A', text: 'Erythema multiforme minor', correct: false },
                { id: 'B', text: 'Stevens-Johnson syndrome', correct: true },
                { id: 'C', text: 'Toxic epidermal necrolysis', correct: false },
                { id: 'D', text: 'Staphylococcal scalded skin syndrome', correct: false },
                { id: 'E', text: 'Drug reaction with eosinophilia and systemic symptoms (DRESS)', correct: false }
            ],
            explanation: 'Stevens-Johnson syndrome (SJS) and toxic epidermal necrolysis (TEN) are on a spectrum of severe mucocutaneous reactions. SJS involves <10% body surface area (BSA) detachment, SJS-TEN overlap is 10-30% BSA, and TEN is >30% BSA. This patient with 15% BSA falls in the overlap range. The positive Nikolsky sign (skin sloughing with pressure), mucosal involvement, and recent drug exposure (allopurinol is a common cause) are characteristic. SSSS affects young children and spares mucosa. DRESS has prominent eosinophilia and internal organ involvement with a longer latency (2-8 weeks).',
            reference: 'Harr T, French LE. Toxic epidermal necrolysis and Stevens-Johnson syndrome. Orphanet J Rare Dis. 2010;5:39.'
        },
        {
            id: 'DERM-002',
            domains: ['Infectious Disease', 'Emergency Medicine'],
            vignette: 'A 55-year-old man with diabetes presents with severe right leg pain, swelling, and fever. The pain seems disproportionate to the physical findings. Examination shows erythema with dusky discoloration, crepitus on palpation, and hemorrhagic bullae. He appears toxic with HR 120 and BP 90/60.',
            question: 'What is the most appropriate next step?',
            options: [
                { id: 'A', text: 'CT scan of the leg', correct: false },
                { id: 'B', text: 'Blood cultures and IV antibiotics alone', correct: false },
                { id: 'C', text: 'Emergent surgical debridement', correct: true },
                { id: 'D', text: 'MRI of the leg', correct: false },
                { id: 'E', text: 'Incision and drainage at bedside', correct: false }
            ],
            explanation: 'Necrotizing fasciitis is a surgical emergency. Key features: pain out of proportion to exam, rapid progression, systemic toxicity, crepitus (gas in tissues), dusky/necrotic skin, hemorrhagic bullae. Mortality is 20-40% and increases with delayed surgery. Imaging should NOT delay surgical exploration if clinical suspicion is high. Broad-spectrum antibiotics (vancomycin + piperacillin-tazobactam + clindamycin for toxin suppression) are given but are adjunctive to surgery. Risk factors include diabetes, immunosuppression, IV drug use, and recent trauma/surgery.',
            reference: 'Stevens DL, Bryant AE. Necrotizing Soft-Tissue Infections. N Engl J Med. 2017;377(23):2253-2265.'
        },
        // BACTERIAL INFECTIONS
        {
            id: 'DERM-003',
            domains: ['Infectious Disease', 'Dermatology'],
            vignette: 'A 45-year-old woman presents with a warm, erythematous, tender area on her left lower leg that developed over 2 days. She has no fever. The affected area has poorly defined borders and no fluctuance. She has a history of chronic venous insufficiency and tinea pedis.',
            question: 'What is the most likely causative organism?',
            options: [
                { id: 'A', text: 'Staphylococcus aureus', correct: false },
                { id: 'B', text: 'Beta-hemolytic streptococci', correct: true },
                { id: 'C', text: 'Pseudomonas aeruginosa', correct: false },
                { id: 'D', text: 'Escherichia coli', correct: false },
                { id: 'E', text: 'Clostridium perfringens', correct: false }
            ],
            explanation: 'This is classic cellulitis - a spreading infection of the dermis and subcutaneous tissue. Beta-hemolytic streptococci (especially Group A Strep) are the most common cause of non-purulent cellulitis, while S. aureus is more common in purulent infections (abscesses, furuncles). Tinea pedis is a common portal of entry. Cellulitis has poorly defined borders (unlike erysipelas which has sharply demarcated, raised borders). Treatment for non-purulent cellulitis should cover streptococci (penicillin, cephalexin). Venous stasis is a risk factor due to skin barrier disruption.',
            reference: 'Raff AB, Kroshinsky D. Cellulitis: A Review. JAMA. 2016;316(3):325-337.'
        },
        {
            id: 'DERM-004',
            domains: ['Infectious Disease', 'Pediatrics'],
            vignette: 'A 6-year-old boy presents with honey-colored crusted lesions around his nose and mouth that developed over 3 days. The lesions started as small vesicles. He attends daycare and several classmates have similar lesions.',
            question: 'What is the most appropriate treatment?',
            options: [
                { id: 'A', text: 'Topical mupirocin', correct: true },
                { id: 'B', text: 'Oral acyclovir', correct: false },
                { id: 'C', text: 'Topical hydrocortisone', correct: false },
                { id: 'D', text: 'Oral fluconazole', correct: false },
                { id: 'E', text: 'No treatment needed', correct: false }
            ],
            explanation: 'This is impetigo, a superficial bacterial skin infection common in children. The honey-colored crusts are pathognomonic. It is highly contagious (daycare outbreaks). Causative organisms: S. aureus (most common now) and Group A Strep. For localized, non-bullous impetigo, topical mupirocin or retapamulin is first-line. Oral antibiotics (cephalexin, dicloxacillin) are used for extensive disease or bullous impetigo. Good hygiene prevents spread. Herpes (acyclovir) presents with grouped vesicles on erythematous base. Steroids would worsen infection.',
            reference: 'Bowen AC, et al. The global epidemiology of impetigo. PLoS One. 2015;10(8):e0136789.'
        },
        // VIRAL INFECTIONS
        {
            id: 'DERM-005',
            domains: ['Infectious Disease', 'Dermatology'],
            vignette: 'A 72-year-old man with a history of lymphoma presents with severe burning pain on his right chest followed by grouped vesicles on an erythematous base in a dermatomal distribution. The rash does not cross the midline.',
            question: 'Within what timeframe should antiviral therapy be initiated for maximum benefit?',
            options: [
                { id: 'A', text: 'Within 24 hours of rash onset', correct: false },
                { id: 'B', text: 'Within 72 hours of rash onset', correct: true },
                { id: 'C', text: 'Within 7 days of rash onset', correct: false },
                { id: 'D', text: 'Antivirals are not indicated', correct: false },
                { id: 'E', text: 'Only after vesicles have crusted', correct: false }
            ],
            explanation: 'This is herpes zoster (shingles), caused by reactivation of varicella-zoster virus (VZV) from dorsal root ganglia. Antivirals (valacyclovir, famciclovir, acyclovir) reduce acute pain duration, accelerate healing, and may reduce postherpetic neuralgia if started within 72 hours of rash onset. This patient is immunocompromised (lymphoma), increasing his risk for dissemination, complications, and PHN. Pain often precedes the rash (prodrome). The dermatomal, unilateral distribution is classic. Shingrix vaccine prevents zoster and is recommended for adults ≥50.',
            reference: 'Dworkin RH, et al. Recommendations for the management of herpes zoster. Clin Infect Dis. 2007;44(Suppl 1):S1-S26.'
        },
        {
            id: 'DERM-006',
            domains: ['Dermatology', 'Infectious Disease'],
            vignette: 'A 25-year-old woman presents with multiple flesh-colored, dome-shaped papules with central umbilication on her lower abdomen and inner thighs. She is sexually active with multiple partners.',
            question: 'What is the causative organism?',
            options: [
                { id: 'A', text: 'Human papillomavirus', correct: false },
                { id: 'B', text: 'Herpes simplex virus', correct: false },
                { id: 'C', text: 'Molluscum contagiosum virus (poxvirus)', correct: true },
                { id: 'D', text: 'Treponema pallidum', correct: false },
                { id: 'E', text: 'Sarcoptes scabiei', correct: false }
            ],
            explanation: 'Molluscum contagiosum is caused by a poxvirus. The flesh-colored, dome-shaped papules with central umbilication (dell) are pathognomonic. In adults, genital/lower abdominal location suggests sexual transmission. In children, it spreads by direct contact and fomites. Lesions are self-limited (months to years) but can be treated for cosmetic reasons or to prevent spread (curettage, cryotherapy, cantharidin). In HIV patients, extensive or giant molluscum suggests severe immunosuppression. HPV causes warts (verrucous surface). HSV causes grouped vesicles.',
            reference: 'Chen X, et al. Molluscum contagiosum virus infection. Lancet Infect Dis. 2013;13(10):877-888.'
        },
        // FUNGAL INFECTIONS
        {
            id: 'DERM-007',
            domains: ['Dermatology', 'Infectious Disease'],
            vignette: 'A 35-year-old man presents with an annular, erythematous, scaly plaque on his arm with central clearing and an advancing raised border. He recently adopted a kitten. KOH preparation shows septate hyphae.',
            question: 'What is the most likely diagnosis?',
            options: [
                { id: 'A', text: 'Granuloma annulare', correct: false },
                { id: 'B', text: 'Tinea corporis', correct: true },
                { id: 'C', text: 'Nummular eczema', correct: false },
                { id: 'D', text: 'Pityriasis rosea', correct: false },
                { id: 'E', text: 'Psoriasis', correct: false }
            ],
            explanation: 'Tinea corporis (ringworm) presents with annular plaques with central clearing, raised scaly borders, and pruritus. The kitten exposure suggests Microsporum canis (zoophilic dermatophyte). KOH showing septate hyphae confirms dermatophyte infection. Tinea is named by location: corporis (body), pedis (feet), cruris (groin), capitis (scalp), unguium (nails). Topical antifungals (terbinafine, clotrimazole) work for limited tinea corporis. Oral therapy needed for extensive disease, tinea capitis, or onychomycosis. Granuloma annulare has similar morphology but no scale and negative KOH.',
            reference: 'Sahoo AK, Mahajan R. Management of tinea corporis, tinea cruris, and tinea pedis. Indian Dermatol Online J. 2016;7(2):77-86.'
        },
        // INFLAMMATORY CONDITIONS
        {
            id: 'DERM-008',
            domains: ['Dermatology', 'Rheumatology'],
            vignette: 'A 30-year-old man presents with well-demarcated, salmon-pink plaques with silvery scale on his elbows, knees, and scalp. He also has pitting of his fingernails. His father has similar skin lesions.',
            question: 'What is the underlying pathophysiology?',
            options: [
                { id: 'A', text: 'IgE-mediated mast cell degranulation', correct: false },
                { id: 'B', text: 'T-cell mediated inflammation with keratinocyte hyperproliferation', correct: true },
                { id: 'C', text: 'Autoantibodies against desmoglein proteins', correct: false },
                { id: 'D', text: 'Defective filaggrin protein', correct: false },
                { id: 'E', text: 'Type III hypersensitivity with immune complex deposition', correct: false }
            ],
            explanation: 'Psoriasis is a chronic, immune-mediated disease driven by T-helper (Th1/Th17) cells. Cytokines (TNF-α, IL-17, IL-23) cause keratinocyte hyperproliferation with shortened turnover time (28 days → 4 days), leading to thickened epidermis and silvery scale. Classic features: well-demarcated plaques, extensor surfaces, nail changes (pitting, onycholysis, oil spots), Auspitz sign (pinpoint bleeding with scale removal). 30% develop psoriatic arthritis. Treatment: topicals (steroids, vitamin D analogs), phototherapy, systemic agents (methotrexate, biologics targeting TNF, IL-17, IL-23).',
            reference: 'Boehncke WH, Schön MP. Psoriasis. Lancet. 2015;386(9997):983-994.'
        },
        {
            id: 'DERM-009',
            domains: ['Dermatology', 'Allergy'],
            vignette: 'A 2-year-old child is brought in for itchy, red patches in the antecubital and popliteal fossae. The skin appears dry and lichenified. The child also has a history of food allergies and wheezing episodes.',
            question: 'Which genetic mutation is most commonly associated with this condition?',
            options: [
                { id: 'A', text: 'CFTR mutation', correct: false },
                { id: 'B', text: 'Filaggrin (FLG) mutation', correct: true },
                { id: 'C', text: 'Keratin 5/14 mutation', correct: false },
                { id: 'D', text: 'COL7A1 mutation', correct: false },
                { id: 'E', text: 'BRCA1 mutation', correct: false }
            ],
            explanation: 'This child has atopic dermatitis (eczema), part of the "atopic triad" with allergic rhinitis and asthma. Filaggrin mutations are present in up to 50% of moderate-severe AD patients. Filaggrin is essential for skin barrier function; its deficiency leads to transepidermal water loss (dry skin) and allergen penetration. Age-dependent distribution: infants (face, extensors), children/adults (flexural areas, lichenification). Management: emollients (cornerstone), topical steroids, calcineurin inhibitors, and avoiding triggers. Keratin mutations cause epidermolysis bullosa simplex.',
            reference: 'Weidinger S, Novak N. Atopic dermatitis. Lancet. 2016;387(10023):1109-1122.'
        },
        {
            id: 'DERM-010',
            domains: ['Dermatology', 'Allergy'],
            vignette: 'A 40-year-old woman develops an intensely pruritic, vesicular eruption with geometric or linear borders on her wrist 48 hours after wearing a new bracelet.',
            question: 'What type of hypersensitivity reaction is this?',
            options: [
                { id: 'A', text: 'Type I (IgE-mediated)', correct: false },
                { id: 'B', text: 'Type II (antibody-mediated cytotoxic)', correct: false },
                { id: 'C', text: 'Type III (immune complex)', correct: false },
                { id: 'D', text: 'Type IV (delayed-type, T-cell mediated)', correct: true },
                { id: 'E', text: 'Type V (stimulatory)', correct: false }
            ],
            explanation: 'Allergic contact dermatitis is a Type IV (delayed-type) hypersensitivity reaction. The 48-hour delay is characteristic - sensitized T cells recognize the hapten-carrier complex, migrate to the site, and recruit macrophages. Common allergens: nickel (jewelry), urushiol (poison ivy), fragrances, preservatives, rubber. The geometric/linear pattern suggests external contactant. Patch testing identifies specific allergens. Treatment: allergen avoidance, topical steroids. Irritant contact dermatitis is non-immunologic and occurs in anyone with sufficient exposure.',
            reference: 'Thyssen JP, et al. The epidemiology of contact allergy in the general population. Contact Dermatitis. 2007;57(5):287-299.'
        },
        // AUTOIMMUNE BLISTERING
        {
            id: 'DERM-011',
            domains: ['Dermatology', 'Immunology'],
            vignette: 'A 70-year-old man presents with tense bullae on his trunk and extremities. The bullae do not rupture easily. Nikolsky sign is negative. Biopsy shows subepidermal blister with eosinophils.',
            question: 'Where are the pathogenic autoantibodies directed?',
            options: [
                { id: 'A', text: 'Desmoglein 1', correct: false },
                { id: 'B', text: 'Desmoglein 3', correct: false },
                { id: 'C', text: 'BP180 and BP230 (hemidesmosomes)', correct: true },
                { id: 'D', text: 'Type VII collagen', correct: false },
                { id: 'E', text: 'Laminin-332', correct: false }
            ],
            explanation: 'Bullous pemphigoid (BP) is the most common autoimmune blistering disease, typically affecting elderly patients. Autoantibodies target BP180 (type XVII collagen) and BP230 at the dermal-epidermal junction hemidesmosomes. This causes SUBEPIDERMAL blisters that are tense and don\'t rupture easily. Nikolsky sign is negative (unlike pemphigus). Eosinophils in the blister are characteristic. Treatment: topical/systemic steroids, doxycycline, dapsone. Pemphigus vulgaris has anti-desmoglein antibodies causing INTRAEPIDERMAL (flaccid) blisters with positive Nikolsky sign.',
            reference: 'Schmidt E, Zillikens D. Pemphigoid diseases. Lancet. 2013;381(9863):320-332.'
        },
        {
            id: 'DERM-012',
            domains: ['Dermatology', 'Immunology'],
            vignette: 'A 50-year-old woman presents with painful oral erosions for 3 months. She now develops flaccid blisters on her trunk that rupture easily, leaving denuded areas. Nikolsky sign is positive.',
            question: 'What histologic finding would you expect on skin biopsy?',
            options: [
                { id: 'A', text: 'Subepidermal blister with neutrophils', correct: false },
                { id: 'B', text: 'Intraepidermal acantholysis with "tombstoning" of basal cells', correct: true },
                { id: 'C', text: 'Interface dermatitis with colloid bodies', correct: false },
                { id: 'D', text: 'Spongiosis with eosinophils', correct: false },
                { id: 'E', text: 'Subcorneal pustules', correct: false }
            ],
            explanation: 'Pemphigus vulgaris (PV) presents with oral erosions (often first) followed by flaccid cutaneous blisters. Autoantibodies against desmoglein 3 (mucosa) and desmoglein 1 (skin) disrupt keratinocyte adhesion (acantholysis). Histology shows intraepidermal blister with acantholysis; basal keratinocytes remain attached to basement membrane ("tombstoning" or "row of tombstones"). Positive Nikolsky sign (lateral pressure causes epidermal separation). Direct immunofluorescence shows intercellular IgG/C3 in a "chicken wire" pattern. Treatment: systemic steroids, rituximab, other immunosuppressants. Mortality was high before steroids.',
            reference: 'Kasperkiewicz M, et al. Pemphigus. Nat Rev Dis Primers. 2017;3:17026.'
        },
        // SKIN CANCER
        {
            id: 'DERM-013',
            domains: ['Dermatology', 'Oncology'],
            vignette: 'A 65-year-old fair-skinned man who worked outdoors presents with a pearly, dome-shaped papule with telangiectasias and a rolled border on his nose. The lesion has been present for 1 year and occasionally bleeds.',
            question: 'What is the most likely diagnosis?',
            options: [
                { id: 'A', text: 'Squamous cell carcinoma', correct: false },
                { id: 'B', text: 'Basal cell carcinoma', correct: true },
                { id: 'C', text: 'Melanoma', correct: false },
                { id: 'D', text: 'Keratoacanthoma', correct: false },
                { id: 'E', text: 'Seborrheic keratosis', correct: false }
            ],
            explanation: 'Basal cell carcinoma (BCC) is the most common skin cancer. Classic nodular BCC features: pearly/translucent papule, telangiectasias, rolled borders, central ulceration ("rodent ulcer"). Risk factors: UV exposure, fair skin, chronic sun damage. BCCs are locally destructive but rarely metastasize (<0.1%). Treatment: excision (Mohs for high-risk sites like nose), electrodesiccation, topical imiquimod (superficial type). SCC appears more keratotic/scaly with potential for metastasis. Melanoma shows ABCDE features (Asymmetry, Border irregularity, Color variation, Diameter >6mm, Evolution).',
            reference: 'Cameron MC, et al. Basal cell carcinoma: Epidemiology, pathophysiology, clinical and histological subtypes. J Am Acad Dermatol. 2019;80(2):303-317.'
        },
        {
            id: 'DERM-014',
            domains: ['Dermatology', 'Oncology'],
            vignette: 'A 45-year-old woman presents with a pigmented lesion on her back that has changed over 6 months. Examination shows an asymmetric, 8mm lesion with irregular borders, color variation (brown, black, and red areas), and recent enlargement.',
            question: 'Which histologic feature indicates the WORST prognosis?',
            options: [
                { id: 'A', text: 'Radial growth phase only', correct: false },
                { id: 'B', text: 'Breslow thickness >4mm', correct: true },
                { id: 'C', text: 'Clark level II (papillary dermis)', correct: false },
                { id: 'D', text: 'No ulceration', correct: false },
                { id: 'E', text: 'Low mitotic rate', correct: false }
            ],
            explanation: 'This lesion meets ABCDE criteria for melanoma. Breslow thickness (depth of invasion in millimeters) is the most important prognostic factor. Thicker melanomas have higher metastatic potential and worse survival. Staging: ≤1mm (stage I), 1-2mm (stage II), >2mm or node+ (stage III), distant mets (stage IV). Other poor prognostic features: ulceration, high mitotic rate, positive sentinel lymph node. Clark level (anatomic depth) is less predictive than Breslow. Early detection is key - 5-year survival for localized melanoma is >99%, but drops dramatically with metastasis.',
            reference: 'Swetter SM, et al. Guidelines of care for the management of primary cutaneous melanoma. J Am Acad Dermatol. 2019;80(1):208-250.'
        },
        // VASCULAR LESIONS
        {
            id: 'DERM-015',
            domains: ['Dermatology', 'Rheumatology'],
            vignette: 'A 55-year-old woman with hepatitis C presents with palpable purpura on her lower extremities, arthralgias, and fatigue. Labs show positive rheumatoid factor, low C4, and cryoglobulins.',
            question: 'What is the underlying mechanism?',
            options: [
                { id: 'A', text: 'IgE-mediated mast cell activation', correct: false },
                { id: 'B', text: 'Immune complex deposition in small vessels', correct: true },
                { id: 'C', text: 'Anti-neutrophil cytoplasmic antibodies', correct: false },
                { id: 'D', text: 'Thrombotic microangiopathy', correct: false },
                { id: 'E', text: 'Arterial atherosclerosis', correct: false }
            ],
            explanation: 'This is cryoglobulinemic vasculitis (mixed cryoglobulinemia), classically associated with hepatitis C. Cryoglobulins are immunoglobulins that precipitate at cold temperatures and dissolve on rewarming. Type II (mixed) cryoglobulinemia involves monoclonal IgM with rheumatoid factor activity against polyclonal IgG. These immune complexes deposit in small vessels, activate complement (low C4), and cause palpable purpura, arthralgias, glomerulonephritis, and neuropathy. Treatment: HCV eradication, rituximab for severe disease. ANCA vasculitis would show c-ANCA or p-ANCA.',
            reference: 'Cacoub P, et al. Cryoglobulinemia Vasculitis. Am J Med. 2015;128(9):950-955.'
        },
        // PIGMENTARY DISORDERS
        {
            id: 'DERM-016',
            domains: ['Dermatology', 'Endocrinology'],
            vignette: 'A 25-year-old woman develops symmetric depigmented patches on her face, hands, and around body orifices. The patches have well-defined borders. Wood\'s lamp examination accentuates the lesions.',
            question: 'What is the most likely diagnosis?',
            options: [
                { id: 'A', text: 'Tinea versicolor', correct: false },
                { id: 'B', text: 'Vitiligo', correct: true },
                { id: 'C', text: 'Post-inflammatory hypopigmentation', correct: false },
                { id: 'D', text: 'Pityriasis alba', correct: false },
                { id: 'E', text: 'Albinism', correct: false }
            ],
            explanation: 'Vitiligo is an autoimmune condition causing destruction of melanocytes, resulting in depigmented (not hypopigmented) patches. Characteristic locations: face, hands, body orifices (perioral, periocular, genital), areas of trauma (Koebner phenomenon). Wood\'s lamp (365nm UV) makes depigmented areas appear bright white, helping distinguish from hypopigmentation. Associated autoimmune conditions: thyroid disease (most common), type 1 diabetes, pernicious anemia, Addison disease. Treatment: topical steroids, calcineurin inhibitors, phototherapy, depigmentation for extensive cases.',
            reference: 'Ezzedine K, et al. Vitiligo. Lancet. 2015;386(9988):74-84.'
        },
        // DRUG ERUPTIONS
        {
            id: 'DERM-017',
            domains: ['Dermatology', 'Pharmacology'],
            vignette: 'A 35-year-old man started trimethoprim-sulfamethoxazole 10 days ago for a UTI. He now presents with fever, facial swelling, diffuse morbilliform rash, lymphadenopathy, and elevated liver enzymes. CBC shows eosinophilia (15%).',
            question: 'What is the most likely diagnosis?',
            options: [
                { id: 'A', text: 'Stevens-Johnson syndrome', correct: false },
                { id: 'B', text: 'Simple drug exanthem', correct: false },
                { id: 'C', text: 'DRESS syndrome', correct: true },
                { id: 'D', text: 'Serum sickness', correct: false },
                { id: 'E', text: 'Acute urticaria', correct: false }
            ],
            explanation: 'Drug Reaction with Eosinophilia and Systemic Symptoms (DRESS) is characterized by the triad: skin eruption + eosinophilia + internal organ involvement (liver most common). Onset is typically 2-8 weeks after starting the drug (longer latency than other drug reactions). Common culprits: anticonvulsants (phenytoin, carbamazepine, lamotrigine), allopurinol, sulfonamides, dapsone. Facial edema is characteristic. HHV-6 reactivation may play a role. Treatment: stop drug, systemic corticosteroids. Mortality ~10% from organ failure. Unlike SJS/TEN, DRESS has prominent eosinophilia and less mucosal involvement.',
            reference: 'Kardaun SH, et al. Drug reaction with eosinophilia and systemic symptoms (DRESS). Br J Dermatol. 2013;169(5):1071-1080.'
        },
        // PAPULOSQUAMOUS
        {
            id: 'DERM-018',
            domains: ['Dermatology', 'Infectious Disease'],
            vignette: 'A 22-year-old woman presents with a single 3cm oval, salmon-colored patch with fine scale and a collarette on her trunk. One week later, she develops multiple smaller similar lesions in a "Christmas tree" distribution on her back.',
            question: 'What is the most likely diagnosis?',
            options: [
                { id: 'A', text: 'Psoriasis', correct: false },
                { id: 'B', text: 'Pityriasis rosea', correct: true },
                { id: 'C', text: 'Secondary syphilis', correct: false },
                { id: 'D', text: 'Tinea corporis', correct: false },
                { id: 'E', text: 'Nummular eczema', correct: false }
            ],
            explanation: 'Pityriasis rosea classically begins with a "herald patch" (large oval plaque with collarette scale) followed 1-2 weeks later by smaller similar lesions in a "Christmas tree" pattern following skin lines on the back. It is likely viral in origin (HHV-6, HHV-7). Self-limited, resolving in 6-8 weeks. Pruritus is common. Important DDx: secondary syphilis (get RPR, especially if palms/soles involved or sexually active). Treatment is symptomatic (antihistamines, topical steroids for itch). Herald patch is KEY - without it, must consider other diagnoses.',
            reference: 'Chuh A, et al. Pityriasis rosea: an update. Indian J Dermatol. 2005;50(4):193-199.'
        },
        // HAIR DISORDERS
        {
            id: 'DERM-019',
            domains: ['Dermatology', 'Endocrinology'],
            vignette: 'A 28-year-old woman presents with thinning hair over the crown of her scalp with preservation of the frontal hairline. She has irregular menses and mild acne. Examination shows fine vellus hairs replacing terminal hairs.',
            question: 'What is the underlying mechanism?',
            options: [
                { id: 'A', text: 'Autoimmune attack on hair follicles', correct: false },
                { id: 'B', text: 'Androgen-mediated follicular miniaturization', correct: true },
                { id: 'C', text: 'Telogen effluvium from stress', correct: false },
                { id: 'D', text: 'Fungal infection of the scalp', correct: false },
                { id: 'E', text: 'Traction on hair follicles', correct: false }
            ],
            explanation: 'This is female pattern hair loss (androgenetic alopecia). Androgens (DHT) cause progressive miniaturization of hair follicles, converting terminal hairs to vellus hairs. In women, the pattern differs from men - diffuse thinning over crown with preserved frontal hairline ("Christmas tree" pattern on part). The irregular menses and acne suggest possible PCOS with androgen excess. Treatment: topical minoxidil (FDA-approved), anti-androgens (spironolactone) if hyperandrogenism present. Alopecia areata causes patchy, non-scarring hair loss with exclamation point hairs.',
            reference: 'Fabbrocini G, et al. Female pattern hair loss: A clinical, pathophysiologic, and therapeutic review. Int J Womens Dermatol. 2018;4(4):203-211.'
        },
        // PEDIATRIC
        {
            id: 'DERM-020',
            domains: ['Pediatrics', 'Dermatology'],
            vignette: 'A newborn is noted to have multiple "blueberry muffin" lesions - non-blanching blue-red papules scattered over the body. The mother had a flu-like illness with rash during the first trimester.',
            question: 'What is the most likely underlying cause?',
            options: [
                { id: 'A', text: 'Neonatal lupus', correct: false },
                { id: 'B', text: 'Congenital rubella syndrome', correct: true },
                { id: 'C', text: 'Hemangiomas', correct: false },
                { id: 'D', text: 'Child abuse', correct: false },
                { id: 'E', text: 'Vitamin K deficiency', correct: false }
            ],
            explanation: '"Blueberry muffin" lesions are dermal extramedullary hematopoiesis - the body producing blood cells outside the bone marrow. This is classically seen in congenital infections (TORCH: Toxoplasmosis, Other [syphilis, parvovirus], Rubella, CMV, HSV). The maternal first-trimester illness with rash strongly suggests rubella. Congenital rubella syndrome also includes: cataracts, sensorineural deafness, and cardiac defects (PDA, pulmonary stenosis). Other causes of blueberry muffin baby: CMV, neuroblastoma, twin-twin transfusion. Rubella vaccination has made this rare in developed countries.',
            reference: 'Banatvala JE, Brown DW. Rubella. Lancet. 2004;363(9415):1127-1137.'
        }
    ];

    // State
    let currentQuestion = 0;
    let score = 0;
    let startTime = Date.now();
    let confidenceRatings = [];
    let answers = [];

    function renderQuestion() {
        const q = questions[currentQuestion];
        const container = document.getElementById('questionContainer');
        const domainsHTML = q.domains.map(d => `<span class="domain-tag">${d}</span>`).join('');
        
        container.innerHTML = `
            <div class="question-card">
                <div class="question-number">Question ${currentQuestion + 1} of ${questions.length}</div>
                ${domainsHTML}
                ${q.vignette ? `<div class="vignette">${q.vignette}</div>` : ''}
                <div class="question-text">${q.question}</div>
                <div class="confidence-slider">
                    <label>How confident are you? <span id="confValue" class="confidence-value">50%</span></label>
                    <input type="range" min="0" max="100" value="50" id="confidenceSlider" oninput="document.getElementById('confValue').textContent = this.value + '%'">
                </div>
                <div class="options">
                    ${q.options.map((opt, i) => `
                        <div class="option" onclick="selectOption(${i})" id="opt${i}">
                            <strong>${opt.id}.</strong> ${opt.text}
                        </div>
                    `).join('')}
                </div>
                <div style="margin-top: 24px; text-align: center;">
                    <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()" disabled>Submit Answer</button>
                </div>
                <div class="explanation" id="explanation">
                    <h4>Explanation</h4>
                    <p>${q.explanation}</p>
                    <p style="margin-top: 12px; font-size: 13px; color: #64748b;"><strong>Reference:</strong> ${q.reference}</p>
                    <div style="margin-top: 20px; text-align: center;">
                        <button class="btn btn-primary" onclick="nextQuestion()">Next Question</button>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('progressFill').style.width = `${(currentQuestion / questions.length) * 100}%`;
        document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
    }

    let selectedOption = null;

    function selectOption(index) {
        document.querySelectorAll('.option').forEach((opt, i) => {
            opt.classList.remove('selected');
            if (i === index) opt.classList.add('selected');
        });
        selectedOption = index;
        document.getElementById('submitBtn').disabled = false;
    }

    function submitAnswer() {
        const q = questions[currentQuestion];
        const confidence = parseInt(document.getElementById('confidenceSlider').value);
        confidenceRatings.push(confidence);
        
        const isCorrect = q.options[selectedOption].correct;
        answers.push({ questionId: q.id, selected: selectedOption, correct: isCorrect, confidence });
        if (isCorrect) score++;
        
        document.querySelectorAll('.option').forEach((opt, i) => {
            opt.onclick = null;
            if (q.options[i].correct) opt.classList.add('correct');
            else if (i === selectedOption && !isCorrect) opt.classList.add('incorrect');
        });
        
        document.getElementById('submitBtn').style.display = 'none';
        document.getElementById('explanation').classList.add('show');
    }

    function nextQuestion() {
        currentQuestion++;
        selectedOption = null;
        if (currentQuestion >= questions.length) showResults();
        else renderQuestion();
    }

    function showResults() {
        document.getElementById('questionContainer').classList.add('hidden');
        document.getElementById('resultsContainer').classList.remove('hidden');
        
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const minutes = Math.floor(elapsed / 60);
        const seconds = elapsed % 60;
        
        const avgConfidence = confidenceRatings.reduce((a, b) => a + b, 0) / confidenceRatings.length;
        const actualScore = (score / questions.length) * 100;
        const calibration = Math.abs(avgConfidence - actualScore);
        
        document.getElementById('scoreValue').textContent = Math.round(actualScore) + '%';
        document.getElementById('timeValue').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        document.getElementById('calibrationValue').textContent = calibration < 10 ? 'Excellent' : calibration < 20 ? 'Good' : 'Needs Work';
    }

    function restartModule() {
        currentQuestion = 0; score = 0; startTime = Date.now();
        confidenceRatings = []; answers = []; selectedOption = null;
        document.getElementById('questionContainer').classList.remove('hidden');
        document.getElementById('resultsContainer').classList.add('hidden');
        renderQuestion();
    }

    renderQuestion();
    </script>
</body>
