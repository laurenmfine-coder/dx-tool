            domains: ['Stroke', 'Emergency Medicine'],
            vignette: 'A 68-year-old man with atrial fibrillation presents with sudden onset right-sided weakness and aphasia that began 2 hours ago. He is not on anticoagulation. CT head shows no hemorrhage. His NIHSS score is 14.',
            question: 'What is the most appropriate next step in management?',
            options: [
                { id: 'A', text: 'Administer aspirin 325 mg orally and admit for observation', correct: false },
                { id: 'B', text: 'Order MRI brain with diffusion-weighted imaging sequence', correct: false },
                { id: 'C', text: 'Administer intravenous alteplase after reviewing contraindications', correct: true },

            explanation: 'This patient has acute ischemic stroke within the 4.5-hour window for IV thrombolysis. IV alteplase is indicated when: symptom onset <4.5 hours, CT excludes hemorrhage, and no contraindications exist. After tPA, antiplatelet/anticoagulant therapy should be held for 24 hours. Consider mechanical thrombectomy for large vessel occlusion. Long-term anticoagulation will be needed for AFib-related stroke prevention.',

        // Q2 - Answer: D
        {
            id: 'NEURO-002',
            domains: ['Stroke', 'Neuroanatomy'],
            vignette: 'A 72-year-old woman presents with sudden left-sided weakness affecting her face and arm more than her leg, along with difficulty speaking. She understands commands but cannot express herself fluently. She is right-handed.',
            question: 'Which vascular territory is most likely affected in this patient?',
            options: [
                { id: 'A', text: 'Right middle cerebral artery distribution territory', correct: false },
                { id: 'B', text: 'Left anterior cerebral artery distribution territory', correct: false },

        // Q3 - Answer: B
        {
            id: 'NEURO-003',
            domains: ['Stroke', 'Diagnosis'],
            vignette: 'A 55-year-old man presents with the worst headache of his life that started suddenly while lifting weights. He has neck stiffness and photophobia. CT head performed 3 hours after symptom onset is reported as normal.',
            question: 'What is the most appropriate next step in evaluation?',
            options: [
                { id: 'A', text: 'Discharge home with migraine medications and follow-up', correct: false },
                { id: 'B', text: 'Perform lumbar puncture to evaluate for xanthochromia', correct: true },

            explanation: 'This presentation is concerning for SAH - thunderclap headache with exertional onset and meningismus. CT sensitivity decreases over time (~98% at 6 hours). A normal CT does NOT rule out SAH. LP is required - looking for xanthochromia (yellow CSF from bilirubin) or RBCs. If positive, CTA identifies the aneurysm. Rebleeding risk is highest in first 24 hours.',

        // Q7 - Answer: C
        {

            vignette: 'A 50-year-old man presents with severe unilateral periorbital pain occurring 2-3 times daily for 3 weeks. Each episode lasts 30-60 minutes with ipsilateral tearing, nasal congestion, and eyelid drooping. Alcohol triggers attacks.',

                { id: 'A', text: 'Oral ibuprofen 800 mg at the onset of each attack', correct: false },
                { id: 'B', text: 'Intravenous morphine for severe pain control measures', correct: false },

            reference: 'Robbins MS, et al. Treatment of Cluster Headache Guidelines. Headache. 2016;56(7):1093-1106.'
        },
        // Q8 - Answer: D
        {
            id: 'NEURO-008',
            domains: ['Multiple Sclerosis', 'Diagnosis'],
            vignette: 'A 28-year-old woman presents with 5 days of painful vision loss in her right eye. Six months ago she had numbness in her legs that resolved spontaneously. MRI shows multiple periventricular white matter lesions with some enhancing.',

        {

        {

            vignette: 'A 30-year-old woman presents with fluctuating double vision worse at the end of the day and difficulty chewing. She has bilateral ptosis that worsens with sustained upgaze. Ice pack test improves the ptosis.',

        {

            domains: ['Neuromuscular', 'Emergency Medicine'],
            vignette: 'A 55-year-old man presents with 4 days of progressive weakness starting in his legs, now affecting his arms. He had gastroenteritis 2 weeks ago. Deep tendon reflexes are absent throughout. He reports mild dyspnea.',

                { id: 'E', text: 'Myasthenia gravis with predominantly facial muscle involvement', correct: false }
            ],
            explanation: 'Bell\'s palsy is acute idiopathic peripheral CN VII palsy. Key: involvement of BOTH upper and lower face indicates peripheral (LMN) lesion. Central lesions spare forehead (bilateral cortical innervation). Likely related to HSV reactivation. Treatment within 72 hours: oral prednisone. Eye protection is crucial. Most patients recover.',
            reference: 'Baugh RF, et al. Clinical practice guideline: Bell\'s Palsy. Otolaryngol Head Neck Surg. 2013;149(3 Suppl):S1-27.'
        },
        // Q17 - Answer: B
        {
            id: 'NEURO-017',
            domains: ['Consciousness', 'Assessment'],
            vignette: 'A 70-year-old man is brought unresponsive after being found down at home. On examination: no eye opening to painful stimuli, extensor posturing (decerebrate) to pain, and no verbal response. Pupils are 3 mm and reactive.',
            question: 'What is this patient\'s Glasgow Coma Scale score?',
            options: [
                { id: 'A', text: '3 points indicating minimal neurological responsiveness', correct: false },
                { id: 'B', text: '4 points indicating severe neurological impairment present', correct: true },
                { id: 'C', text: '5 points indicating moderate neurological impairment present', correct: false },
                { id: 'D', text: '6 points indicating moderate neurological impairment present', correct: false },
                { id: 'E', text: '8 points indicating need for airway protection measures', correct: false }
            ],
            explanation: 'GCS = Eye (E) + Verbal (V) + Motor (M). This patient: E1 (no eye opening) + V1 (no verbal) + M2 (extensor posturing) = 4. Scale ranges 3-15. GCS ≤8 indicates coma requiring airway protection. Motor scale: 6=obeys, 5=localizes, 4=withdraws, 3=flexor posturing, 2=extensor posturing, 1=none. Reactive pupils indicate intact midbrain.',
            reference: 'Teasdale G, Jennett B. Assessment of coma. Lancet. 1974;2(7872):81-84.'
        },
        // Q18 - Answer: E
        {
            id: 'NEURO-018',
            domains: ['Infectious Disease', 'Neurology'],
            vignette: 'A 19-year-old college student presents with fever, headache, and neck stiffness. CSF shows: WBC 1500/μL (92% neutrophils), protein 200 mg/dL, glucose 30 mg/dL (serum glucose 110 mg/dL). Gram stain shows gram-negative diplococci.',
            question: 'What is the most likely causative organism in this patient?',
            options: [
                { id: 'A', text: 'Streptococcus pneumoniae with polysaccharide capsule', correct: false },
                { id: 'B', text: 'Listeria monocytogenes affecting immunocompromised hosts', correct: false },
                { id: 'C', text: 'Herpes simplex virus type 1 causing temporal encephalitis', correct: false },
                { id: 'D', text: 'Cryptococcus neoformans in setting of immune suppression', correct: false },
                { id: 'E', text: 'Neisseria meningitidis spreading in close-contact settings', correct: true }
            ],
            explanation: 'The CSF profile shows bacterial meningitis: high WBC with neutrophils, elevated protein, LOW glucose. Gram-negative diplococci confirms N. meningitidis, common in college-age patients in close quarters. Treatment: ceftriaxone + vancomycin + dexamethasone. Close contacts need chemoprophylaxis. S. pneumoniae shows gram-positive diplococci.',
            reference: 'van de Beek D, et al. Bacterial meningitis. Nat Rev Dis Primers. 2016;2:16074.'
        },
        // Q19 - Answer: D
        {
            id: 'NEURO-019',
            domains: ['Neuro-Oncology', 'Imaging'],
            vignette: 'A 58-year-old man presents with 3 weeks of progressive headaches worse in the morning and with coughing. He had a new-onset seizure yesterday. MRI shows a 5 cm ring-enhancing mass in the right frontal lobe crossing the corpus callosum.',
            question: 'What is the most likely diagnosis based on these findings?',
            options: [
                { id: 'A', text: 'Meningioma arising from the dura with calcifications', correct: false },
                { id: 'B', text: 'Brain abscess from hematogenous bacterial seeding source', correct: false },
                { id: 'C', text: 'Low-grade astrocytoma with indolent growth characteristics', correct: false },
                { id: 'D', text: 'Glioblastoma with characteristic aggressive imaging features', correct: true },
                { id: 'E', text: 'Metastatic carcinoma from unknown primary tumor source', correct: false }
            ],
            explanation: 'Glioblastoma (GBM) is the most common aggressive primary brain tumor. Classic MRI: ring-enhancing mass with central necrosis, irregular borders, surrounding edema, crossing corpus callosum (\"butterfly glioma\"). Median survival ~15 months with treatment. Meningiomas are extra-axial with dural tail. Abscesses have smooth enhancement and restricted diffusion.',
            reference: 'Wen PY, Kesari S. Malignant gliomas in adults. N Engl J Med. 2008;359(5):492-507.'
        },
        // Q20 - Answer: A
        {
            id: 'NEURO-020',
            domains: ['Spinal Cord', 'Oncology'],
            vignette: 'A 68-year-old man with metastatic prostate cancer presents with 10 days of progressive back pain and 3 days of bilateral leg weakness. He now has urinary retention and decreased perianal sensation. Rectal tone is diminished.',
            question: 'What is the most appropriate immediate management step?',
            options: [
                { id: 'A', text: 'Administer high-dose dexamethasone and obtain urgent MRI spine', correct: true },
                { id: 'B', text: 'Schedule outpatient MRI spine within the next 2 weeks', correct: false },
                { id: 'C', text: 'Begin physical therapy and prescribe opioid pain medications', correct: false },

            explanation: 'This is malignant spinal cord compression, an oncologic emergency. Red flags: known cancer, progressive neurological deficits, saddle anesthesia, bowel/bladder dysfunction. Immediate management: high-dose dexamethasone (reduces edema) and urgent MRI of entire spine. Definitive treatment: surgery and/or radiation. Delays lead to permanent paralysis. Ambulatory status at presentation predicts outcome.',
            reference: 'Loblaw DA, et al. Malignant spinal cord compression management. J Clin Oncol. 2005;23(9):2028-2037.'
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let startTime = Date.now();
    let confidenceRatings = [];
    let answers = [];
    let selectedOption = null;

    function renderQuestion() {
        const q = questions[currentQuestion];
        const container = document.getElementById('questionContainer');
        const domainsHTML = q.domains.map(d => `<span class="domain-tag">${d}</span>`).join('');
        
        container.innerHTML = `
            <div class="question-card">
                <div class="question-number">Question ${currentQuestion + 1} of ${questions.length}</div>
                ${domainsHTML}
                <div class="vignette">${q.vignette}</div>
                <div class="question-text">${q.question}</div>
                <div class="confidence-slider">
                    <label>How confident are you? <span id="confValue" class="confidence-value">50%</span></label>
                    <input type="range" min="0" max="100" value="50" id="confidenceSlider" oninput="document.getElementById('confValue').textContent = this.value + '%'">
                </div>
                <div class="options">
                    ${q.options.map((opt, i) => `
                        <div class="option" onclick="selectOption(${i})" id="opt${i}">
                            <strong>${opt.id}.</strong> ${opt.text}
                        </div>
                    `).join('')}
                </div>
                <div style="margin-top: 24px; text-align: center;">
                    <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()" disabled>Submit Answer</button>
                </div>
                <div class="explanation" id="explanation">
                    <h4>Explanation</h4>
                    <p>${q.explanation}</p>
                    <p style="margin-top: 12px; font-size: 13px; color: #64748b;"><strong>Reference:</strong> ${q.reference}</p>
                    <div style="margin-top: 20px; text-align: center;">
                        <button class="btn btn-primary" onclick="nextQuestion()">Next Question</button>
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('progressFill').style.width = `${(currentQuestion / questions.length) * 100}%`;
        document.getElementById('progressText').textContent = `Question ${currentQuestion + 1} of ${questions.length}`;
    }

    function selectOption(index) {
        document.querySelectorAll('.option').forEach((opt, i) => {
            opt.classList.remove('selected');
            if (i === index) opt.classList.add('selected');
        });
        selectedOption = index;
        document.getElementById('submitBtn').disabled = false;
    }

    function submitAnswer() {
        const q = questions[currentQuestion];
        const confidence = parseInt(document.getElementById('confidenceSlider').value);
        confidenceRatings.push(confidence);
        
        const isCorrect = q.options[selectedOption].correct;
        answers.push({ questionId: q.id, selected: selectedOption, correct: isCorrect, confidence });
        if (isCorrect) score++;
        
        document.querySelectorAll('.option').forEach((opt, i) => {
            opt.onclick = null;
            if (q.options[i].correct) opt.classList.add('correct');
            else if (i === selectedOption && !isCorrect) opt.classList.add('incorrect');
        });
        
        document.getElementById('submitBtn').style.display = 'none';
        document.getElementById('explanation').classList.add('show');
    }

    function nextQuestion() {
        currentQuestion++;
        selectedOption = null;
        if (currentQuestion >= questions.length) showResults();
        else renderQuestion();
    }

    function showResults() {
        document.getElementById('questionContainer').classList.add('hidden');
        document.getElementById('resultsContainer').classList.remove('hidden');
        
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const minutes = Math.floor(elapsed / 60);
        const seconds = elapsed % 60;
        
        const avgConfidence = confidenceRatings.reduce((a, b) => a + b, 0) / confidenceRatings.length;
        const actualScore = (score / questions.length) * 100;
        const calibration = Math.abs(avgConfidence - actualScore);
        
        document.getElementById('scoreValue').textContent = Math.round(actualScore) + '%';
        document.getElementById('timeValue').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        document.getElementById('calibrationValue').textContent = calibration < 10 ? 'Excellent' : calibration < 20 ? 'Good' : 'Needs Work';
    }

    function restartModule() {
        currentQuestion = 0; score = 0; startTime = Date.now();
        confidenceRatings = []; answers = []; selectedOption = null;
        document.getElementById('questionContainer').classList.remove('hidden');
        document.getElementById('resultsContainer').classList.add('hidden');
        renderQuestion();
    }

    renderQuestion();
    </script>
</body>
</html>
