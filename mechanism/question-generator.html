<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MechanismDx - Dynamic Question Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; }
        .option-card { transition: all 0.2s; cursor: pointer; }
        .option-card:hover:not(.disabled) { transform: scale(1.01); background: rgba(71, 85, 105, 0.5); }
        .option-card.selected { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .option-card.correct { border-color: #22c55e; background: rgba(34, 197, 94, 0.15); }
        .option-card.incorrect { border-color: #ef4444; background: rgba(239, 68, 68, 0.15); }
    
.header { background: #ffffff; border-bottom: 1px solid #e4e4e7; }
.header-inner { max-width: 1200px; margin: 0 auto; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
.logo-link { text-decoration: none; color: #18181b; display: flex; align-items: center; gap: 20px; }
.tagline { font-style: italic; font-size: 13px; color: #71717a; padding-left: 20px; border-left: 1px solid #e4e4e7; }
.header-nav { display: flex; gap: 8px; }
.nav-link { padding: 8px 14px; color: #71717a; text-decoration: none; font-size: 14px; font-weight: 500; border-radius: 8px; transition: all 0.15s; }
.nav-link:hover { background: #f4f4f5; color: #18181b; }
.nav-link.active { color: #18181b; }
@media (max-width: 768px) { .tagline { display: none; } }

</style>
</head>
<body class="text-white">
    <header class="header">
    <div class="header-inner">
        <a href="index.html" class="logo-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 70" style="height: 36px; width: auto;">
                <text x="5" y="45" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="normal" fill="currentColor" letter-spacing="-1">Mechanism</text>
                <text x="213" y="45" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="normal" fill="currentColor">D</text>
                <line x1="247" y1="24" x2="263" y2="45" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
                <ellipse cx="245" cy="22" rx="2" ry="3.5" transform="rotate(-28 245 22)" fill="currentColor"/>
                <path d="M 263 24 L 253 35 Q 249 40 249 47 Q 249 54 254 58 Q 259 62 259 68" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" fill="none"/>
                <ellipse cx="265" cy="22" rx="2" ry="3.5" transform="rotate(28 265 22)" fill="currentColor"/>
                <circle cx="259" cy="68" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
                <circle cx="259" cy="68" r="3.5" fill="currentColor"/>
            </svg>
            <span class="tagline">The right mechanism unlocks everything.</span>
        </a>
        <nav class="header-nav">
            <a href="/" class="nav-link">ReasonDx</a>
            <a href="/mechanism/" class="nav-link active">Mechanisms</a>
            <a href="/fingerprint-dashboard.html" class="nav-link">Progress</a>
        </nav>
    </div>
</header>

    <main class="max-w-3xl mx-auto p-6">
        <!-- Stats -->
        <div class="grid grid-cols-4 gap-3 mb-6">
            <div class="bg-slate-800 rounded-lg p-3 text-center border border-slate-700">
                <div id="stat-q" class="text-xl font-bold">0</div>
                <div class="text-xs text-gray-400">Questions</div>
            </div>
            <div class="bg-slate-800 rounded-lg p-3 text-center border border-slate-700">
                <div id="stat-correct" class="text-xl font-bold text-green-400">0</div>
                <div class="text-xs text-gray-400">Correct</div>
            </div>
            <div class="bg-slate-800 rounded-lg p-3 text-center border border-slate-700">
                <div id="stat-acc" class="text-xl font-bold">--%</div>
                <div class="text-xs text-gray-400">Accuracy</div>
            </div>
            <div class="bg-slate-800 rounded-lg p-3 text-center border border-slate-700">
                <div id="stat-streak" class="text-xl font-bold text-amber-400">0🔥</div>
                <div class="text-xs text-gray-400">Streak</div>
            </div>
        </div>

        <!-- Question -->
        <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden">
            <div class="bg-slate-700/50 px-4 py-2 flex items-center justify-between">
                <span id="q-topic" class="text-xs text-blue-400">Cardiovascular</span>
                <span id="q-mech" class="text-xs text-gray-400">Testing: RAAS → Aldosterone</span>
            </div>
            <div class="p-6">
                <div id="stem" class="mb-6 leading-relaxed">Loading...</div>
                <div id="options" class="space-y-3 mb-6"></div>
                <div class="flex justify-between">
                    <button onclick="skip()" class="text-gray-400 hover:text-white text-sm">Skip</button>
                    <div>
                        <button onclick="submit()" id="btn-submit" class="bg-blue-600 hover:bg-blue-700 px-5 py-2 rounded-lg text-sm">Submit</button>
                        <button onclick="next()" id="btn-next" class="bg-green-600 hover:bg-green-700 px-5 py-2 rounded-lg text-sm hidden">Next →</button>
                    </div>
                </div>
            </div>
            <div id="explanation" class="border-t border-slate-700 p-6 hidden">
                <div class="flex gap-3">
                    <span id="res-icon" class="text-2xl">✓</span>
                    <div>
                        <div id="res-title" class="font-semibold mb-1">Correct!</div>
                        <div id="res-text" class="text-gray-300 text-sm"></div>
                        <div class="mt-3 bg-slate-700/50 rounded p-3">
                            <div class="text-xs text-gray-400">Mechanism:</div>
                            <div id="res-path" class="text-blue-300 text-sm"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Connections Tested -->
        <div class="bg-slate-800 rounded-xl p-4 border border-slate-700 mt-6">
            <div class="text-xs text-gray-400 mb-2">CONNECTIONS TESTED</div>
            <div id="connections" class="flex flex-wrap gap-2">
                <span class="text-gray-500 text-sm italic">Answer questions to track...</span>
            </div>
        </div>
    </main>

<script>
const MECHANISMS = {
    cardiovascular: {
        connections: [
            { from: "↓ Cardiac Output", to: "↓ Renal Perfusion", key: "co_renal" },
            { from: "↓ Renal Perfusion", to: "RAAS Activation", key: "renal_raas" },
            { from: "RAAS Activation", to: "↑ Angiotensin II", key: "raas_ang2" },
            { from: "RAAS Activation", to: "↑ Aldosterone", key: "raas_aldo" },
            { from: "↑ Angiotensin II", to: "Vasoconstriction", key: "ang2_vasocon" },
            { from: "↑ Aldosterone", to: "Na+ Retention", key: "aldo_na" },
            { from: "↑ Aldosterone", to: "K+ Excretion", key: "aldo_k" },
            { from: "Na+ Retention", to: "Volume Overload", key: "na_vol" },
            { from: "Volume Overload", to: "Peripheral Edema", key: "vol_edema" },
            { from: "LV Dysfunction", to: "↑ BNP", key: "lv_bnp" },
            { from: "SNS Activation", to: "Tachycardia", key: "sns_hr" }
        ],
        scenarios: [
            "A 68-year-old man presents with progressive dyspnea and bilateral leg swelling over the past month.",
            "A 72-year-old woman with HTN and DM presents with orthopnea and paroxysmal nocturnal dyspnea.",
            "A 55-year-old man with ischemic cardiomyopathy presents with increased fatigue and weight gain."
        ]
    },
    renal: {
        connections: [
            { from: "Hypovolemia", to: "↓ Renal Perfusion", key: "vol_renal" },
            { from: "↓ Renal Perfusion", to: "↓ GFR", key: "perf_gfr" },
            { from: "↓ GFR", to: "↑ Creatinine", key: "gfr_cr" },
            { from: "↓ GFR", to: "↑ BUN", key: "gfr_bun" },
            { from: "Prerenal State", to: "Avid Na+ Reabsorption", key: "prerenal_na" },
            { from: "Avid Na+ Reabsorption", to: "FeNa < 1%", key: "na_fena" },
            { from: "Tubular Injury (ATN)", to: "FeNa > 2%", key: "atn_fena" },
            { from: "Tubular Injury (ATN)", to: "Muddy Brown Casts", key: "atn_casts" },
            { from: "Uremia", to: "Platelet Dysfunction", key: "uremia_plt" }
        ],
        scenarios: [
            "A 58-year-old man with 3 days of diarrhea presents with oliguria and rising creatinine.",
            "A 65-year-old woman is post-op day 2 from hip replacement with new AKI.",
            "A 70-year-old man with CHF presents after aggressive diuresis with worsening renal function."
        ]
    },
    pulmonary: {
        connections: [
            { from: "Airway Inflammation", to: "Bronchospasm", key: "inflam_spasm" },
            { from: "Bronchospasm", to: "↑ Airway Resistance", key: "spasm_resist" },
            { from: "V/Q Mismatch", to: "Hypoxemia", key: "vq_hypox" },
            { from: "Chronic Hypoxemia", to: "Pulmonary HTN", key: "hypox_pah" },
            { from: "Pulmonary HTN", to: "RV Strain", key: "pah_rv" },
            { from: "RV Strain", to: "Cor Pulmonale", key: "rv_corpulm" },
            { from: "Air Trapping", to: "Hyperinflation", key: "trap_inflate" }
        ],
        scenarios: [
            "A 65-year-old smoker presents with progressive dyspnea on exertion over 2 years.",
            "A 28-year-old presents with acute wheezing and dyspnea after visiting a friend with cats.",
            "A 72-year-old with known COPD presents with increased sputum production and worsening dyspnea."
        ]
    }
};

let state = {
    topic: 'all',
    current: null,
    selected: null,
    submitted: false,
    stats: { answered: 0, correct: 0, streak: 0 },
    tested: new Map()
};

function generateQuestion() {
    const topics = state.topic === 'all' ? Object.keys(MECHANISMS) : [state.topic];
    const topic = topics[Math.floor(Math.random() * topics.length)];
    const data = MECHANISMS[topic];
    const mech = data.connections[Math.floor(Math.random() * data.connections.length)];
    const scenario = data.scenarios[Math.floor(Math.random() * data.scenarios.length)];
    
    // Generate question asking about downstream effect
    const stem = `${scenario}\n\nThe patient's condition involves ${mech.from}. Which of the following is the most likely direct physiological consequence?`;
    
    // Correct answer
    const options = [{ text: mech.to, correct: true, expl: `${mech.from} directly leads to ${mech.to} through established pathophysiology.` }];
    
    // Distractors from same topic
    const others = data.connections.filter(c => c.to !== mech.to);
    const shuffled = others.sort(() => Math.random() - 0.5).slice(0, 3);
    shuffled.forEach(c => {
        options.push({ text: c.to, correct: false, expl: `${c.to} results from ${c.from}, not from ${mech.from}.` });
    });
    
    // Shuffle options
    for (let i = options.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [options[i], options[j]] = [options[j], options[i]];
    }
    
    return { topic, mech, stem, options, path: `${mech.from} → ${mech.to}` };
}

function loadQuestion() {
    state.current = generateQuestion();
    state.selected = null;
    state.submitted = false;
    
    const q = state.current;
    document.getElementById('q-topic').textContent = q.topic.charAt(0).toUpperCase() + q.topic.slice(1);
    document.getElementById('q-mech').textContent = `Testing: ${q.mech.key.replace('_', ' → ')}`;
    document.getElementById('stem').innerHTML = q.stem.replace('\n\n', '<br><br>');
    
    document.getElementById('options').innerHTML = q.options.map((o, i) => `
        <div class="option-card bg-slate-700/30 border-2 border-slate-600 rounded-lg p-4" data-idx="${i}" onclick="select(${i})">
            <div class="flex items-start gap-3">
                <div class="w-6 h-6 rounded-full border-2 border-slate-500 flex items-center justify-center text-sm flex-shrink-0">${String.fromCharCode(65+i)}</div>
                <span>${o.text}</span>
            </div>
        </div>
    `).join('');
    
    document.getElementById('btn-submit').classList.remove('hidden');
    document.getElementById('btn-next').classList.add('hidden');
    document.getElementById('explanation').classList.add('hidden');
}

function select(idx) {
    if (state.submitted) return;
    state.selected = idx;
    document.querySelectorAll('.option-card').forEach((c, i) => {
        c.classList.toggle('selected', i === idx);
    });
}

function submit() {
    if (state.selected === null) return alert('Select an answer');
    state.submitted = true;
    state.stats.answered++;
    
    const q = state.current;
    const sel = q.options[state.selected];
    const correct = sel.correct;
    
    if (correct) { state.stats.correct++; state.stats.streak++; }
    else { state.stats.streak = 0; }
    
    // Track connection
    const key = q.mech.key;
    const t = state.tested.get(key) || { n: 0, c: 0 };
    t.n++; if (correct) t.c++;
    state.tested.set(key, t);
    
    // Show results
    q.options.forEach((o, i) => {
        const card = document.querySelector(`[data-idx="${i}"]`);
        card.classList.add('disabled');
        if (o.correct) card.classList.add('correct');
        else if (i === state.selected) card.classList.add('incorrect');
    });
    
    document.getElementById('res-icon').textContent = correct ? '✓' : '✗';
    document.getElementById('res-icon').className = correct ? 'text-2xl text-green-400' : 'text-2xl text-red-400';
    document.getElementById('res-title').textContent = correct ? 'Correct!' : 'Incorrect';
    document.getElementById('res-title').className = correct ? 'font-semibold mb-1 text-green-400' : 'font-semibold mb-1 text-red-400';
    document.getElementById('res-text').textContent = sel.expl;
    document.getElementById('res-path').textContent = q.path;
    document.getElementById('explanation').classList.remove('hidden');
    
    document.getElementById('btn-submit').classList.add('hidden');
    document.getElementById('btn-next').classList.remove('hidden');
    
    updateStats();
    updateConnections();
}

function next() { loadQuestion(); }
function skip() { loadQuestion(); }
function setTopic(t) { state.topic = t; loadQuestion(); }

function updateStats() {
    document.getElementById('stat-q').textContent = state.stats.answered;
    document.getElementById('stat-correct').textContent = state.stats.correct;
    document.getElementById('stat-acc').textContent = state.stats.answered > 0 ? Math.round((state.stats.correct / state.stats.answered) * 100) + '%' : '--%';
    document.getElementById('stat-streak').textContent = state.stats.streak + '🔥';
}

function updateConnections() {
    const cont = document.getElementById('connections');
    if (state.tested.size === 0) {
        cont.innerHTML = '<span class="text-gray-500 text-sm italic">Answer questions to track...</span>';
        return;
    }
    cont.innerHTML = Array.from(state.tested.entries()).map(([k, d]) => {
        const acc = Math.round((d.c / d.n) * 100);
        const col = acc >= 80 ? 'bg-green-500/20 text-green-400' : acc >= 50 ? 'bg-amber-500/20 text-amber-400' : 'bg-red-500/20 text-red-400';
        return `<span class="${col} text-xs px-2 py-1 rounded">${k.replace('_', '→')} ${acc}%</span>`;
    }).join('');
}

document.addEventListener('DOMContentLoaded', loadQuestion);
</script>
</body>
</html>
