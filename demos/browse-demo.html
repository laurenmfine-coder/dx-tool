<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin: 0; padding: 0; background: #000; }
svg { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1920" height="1080" fill="#0a1929"/>
  
  <!-- Search Bar (animated) -->
  <g id="searchBar">
    <rect x="360" y="200" width="1200" height="60" rx="12" fill="#1a3a5c" stroke="#2874A6" stroke-width="2">
      <animate attributeName="fill" values="#1a3a5c;#2874A6;#1a3a5c" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="390" y="240" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.5)">
      Search by chief complaint or diagnosis...
      <animate attributeName="fill-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </text>
  </g>
  
  <!-- Filter Buttons (animated) -->
  <g id="filters" transform="translate(360, 300)">
    <rect x="0" y="0" width="180" height="48" rx="8" fill="#2874A6" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
    </rect>
    <text x="90" y="30" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle" opacity="0">
      Cardiology
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
    </text>
    
    <rect x="200" y="0" width="180" height="48" rx="8" fill="#1a3a5c" stroke="#2874A6" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.7s" fill="freeze"/>
    </rect>
    <text x="290" y="30" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle" opacity="0">
      Pulmonology
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.7s" fill="freeze"/>
    </text>
    
    <rect x="400" y="0" width="180" height="48" rx="8" fill="#1a3a5c" stroke="#2874A6" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.9s" fill="freeze"/>
    </rect>
    <text x="490" y="30" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)" text-anchor="middle" opacity="0">
      Neurology
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.9s" fill="freeze"/>
    </text>
  </g>
  
  <!-- Case Cards (animated in sequence) -->
  <g id="caseCards">
    <!-- Card 1 -->
    <g opacity="0" transform="translate(360, 400)">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.2s" fill="freeze"/>
      <rect width="500" height="140" rx="12" fill="#1a3a5c" stroke="#2874A6" stroke-width="1"/>
      <circle cx="30" cy="30" r="16" fill="#2874A6"/>
      <text x="30" y="36" font-family="Arial, sans-serif" font-size="18" fill="#fff" text-anchor="middle">🫀</text>
      <text x="60" y="35" font-family="Arial, sans-serif" font-size="18" fill="#fff" font-weight="bold">Chest Pain - STEMI</text>
      <text x="60" y="65" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">52-year-old with crushing substernal pain...</text>
      <rect x="60" y="85" width="80" height="24" rx="6" fill="rgba(40,116,166,0.2)"/>
      <text x="100" y="102" font-family="Arial, sans-serif" font-size="11" fill="#85C1E9" text-anchor="middle">CARDIO</text>
    </g>
    
    <!-- Card 2 -->
    <g opacity="0" transform="translate(900, 400)">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.4s" fill="freeze"/>
      <rect width="500" height="140" rx="12" fill="#1a3a5c" stroke="#2874A6" stroke-width="1"/>
      <circle cx="30" cy="30" r="16" fill="#2874A6"/>
      <text x="30" y="36" font-family="Arial, sans-serif" font-size="18" fill="#fff" text-anchor="middle">🫁</text>
      <text x="60" y="35" font-family="Arial, sans-serif" font-size="18" fill="#fff" font-weight="bold">Dyspnea - Heart Failure</text>
      <text x="60" y="65" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">68-year-old with progressive shortness of breath...</text>
      <rect x="60" y="85" width="80" height="24" rx="6" fill="rgba(40,116,166,0.2)"/>
      <text x="100" y="102" font-family="Arial, sans-serif" font-size="11" fill="#85C1E9" text-anchor="middle">CARDIO</text>
    </g>
    
    <!-- Card 3 -->
    <g opacity="0" transform="translate(360, 570)">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.6s" fill="freeze"/>
      <rect width="500" height="140" rx="12" fill="#1a3a5c" stroke="#2874A6" stroke-width="1"/>
      <circle cx="30" cy="30" r="16" fill="#2874A6"/>
      <text x="30" y="36" font-family="Arial, sans-serif" font-size="18" fill="#fff" text-anchor="middle">⚡</text>
      <text x="60" y="35" font-family="Arial, sans-serif" font-size="18" fill="#fff" font-weight="bold">Palpitations - Atrial Fib</text>
      <text x="60" y="65" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">45-year-old with irregular rapid heartbeat...</text>
      <rect x="60" y="85" width="80" height="24" rx="6" fill="rgba(40,116,166,0.2)"/>
      <text x="100" y="102" font-family="Arial, sans-serif" font-size="11" fill="#85C1E9" text-anchor="middle">CARDIO</text>
    </g>
    
    <!-- Card 4 -->
    <g opacity="0" transform="translate(900, 570)">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.8s" fill="freeze"/>
      <rect width="500" height="140" rx="12" fill="#1a3a5c" stroke="#2874A6" stroke-width="1"/>
      <circle cx="30" cy="30" r="16" fill="#2874A6"/>
      <text x="30" y="36" font-family="Arial, sans-serif" font-size="18" fill="#fff" text-anchor="middle">🩸</text>
      <text x="60" y="35" font-family="Arial, sans-serif" font-size="18" fill="#fff" font-weight="bold">Syncope - Arrhythmia</text>
      <text x="60" y="65" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.6)">33-year-old with sudden loss of consciousness...</text>
      <rect x="60" y="85" width="80" height="24" rx="6" fill="rgba(40,116,166,0.2)"/>
      <text x="100" y="102" font-family="Arial, sans-serif" font-size="11" fill="#85C1E9" text-anchor="middle">CARDIO</text>
    </g>
  </g>
  
  <!-- Count Badge (top right) -->
  <g opacity="0" transform="translate(1600, 200)">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2s" fill="freeze"/>
    <rect width="180" height="60" rx="12" fill="rgba(40,116,166,0.2)" stroke="#2874A6" stroke-width="2"/>
    <text x="90" y="28" font-family="Arial, sans-serif" font-size="24" fill="#fff" text-anchor="middle" font-weight="bold">394</text>
    <text x="90" y="48" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">TOTAL CASES</text>
  </g>
  
  <!-- Bottom instruction -->
  <text x="960" y="1000" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.5)" text-anchor="middle" opacity="0">
    Click any case to start simulation →
    <animate attributeName="opacity" values="0;1;0" dur="2s" begin="2.5s" repeatCount="indefinite"/>
  </text>
</svg>
</body>
</html>
