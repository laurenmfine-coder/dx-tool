<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin: 0; padding: 0; background: #000; }
svg { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1920" height="1080" fill="#0a1929"/>
  
  <!-- Chat Interface (left side) -->
  <g id="chatPanel">
    <rect x="60" y="60" width="900" height="960" rx="16" fill="#1a3a5c" stroke="#2874A6" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="60" y="60" width="900" height="60" rx="16" fill="#2874A6"/>
    <text x="510" y="98" font-family="Arial, sans-serif" font-size="18" fill="#fff" text-anchor="middle" font-weight="bold">
      Simulation: 52F with Chest Pain
    </text>
    
    <!-- Phase Indicator -->
    <g transform="translate(100, 150)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">
        Phase 2 of 10: Chief Complaint
      </text>
    </g>
    
    <!-- Patient Message (animated in) -->
    <g opacity="0" transform="translate(100, 200)">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
      <rect width="700" height="180" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
      <circle cx="30" cy="30" r="20" fill="#2874A6"/>
      <text x="30" y="38" font-family="Arial, sans-serif" font-size="20" fill="#fff" text-anchor="middle">👤</text>
      <text x="70" y="32" font-family="Arial, sans-serif" font-size="14" fill="#85C1E9" font-weight="bold">Patient</text>
      <text x="70" y="65" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.9)">
        I've been having this crushing pain in my chest for the
      </text>
      <text x="70" y="90" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.9)">
        past 30 minutes. It started while I was shoveling snow.
      </text>
      <text x="70" y="115" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.9)">
        The pain goes down my left arm and I'm sweating a lot.
      </text>
      <text x="70" y="140" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.9)">
        I feel like something heavy is sitting on my chest.
      </text>
    </g>
    
    <!-- Input area (animated in) -->
    <g opacity="0" transform="translate(100, 850)">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1s" fill="freeze"/>
      <rect width="800" height="100" rx="12" fill="rgba(255,255,255,0.05)" stroke="#2874A6" stroke-width="2">
        <animate attributeName="stroke" values="#2874A6;#85C1E9;#2874A6" dur="2s" begin="1.5s" repeatCount="indefinite"/>
      </rect>
      <text x="20" y="40" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.5)">
        Type your question or click microphone...
      </text>
      <!-- Mic icon (pulsing) -->
      <circle cx="750" cy="50" r="30" fill="#2874A6" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.5s" fill="freeze"/>
        <animate attributeName="r" values="30;34;30" dur="1.5s" begin="2s" repeatCount="indefinite"/>
      </circle>
      <text x="750" y="60" font-family="Arial, sans-serif" font-size="24" fill="#fff" text-anchor="middle">🎤</text>
    </g>
  </g>
  
  <!-- Right Panel - DDx Builder -->
  <g id="ddxPanel" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2s" fill="freeze"/>
    <rect x="1000" y="60" width="860" height="960" rx="16" fill="#1a3a5c" stroke="#2874A6" stroke-width="2"/>
    
    <text x="1430" y="110" font-family="Arial, sans-serif" font-size="18" fill="#fff" text-anchor="middle" font-weight="bold">
      Differential Diagnosis
    </text>
    
    <!-- DDx Items (animate in sequence) -->
    <g transform="translate(1040, 160)">
      <!-- Item 1 -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.5s" fill="freeze"/>
        <rect width="780" height="80" rx="10" fill="rgba(40,116,166,0.15)" stroke="#2874A6" stroke-width="1"/>
        <text x="20" y="30" font-family="Arial, sans-serif" font-size="16" fill="#fff" font-weight="bold">STEMI (Acute MI)</text>
        <text x="20" y="55" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">Crushing chest pain, diaphoresis, radiation to arm</text>
        <rect x="650" y="20" width="100" height="40" rx="8" fill="#27AE60"/>
        <text x="700" y="47" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">HIGH</text>
      </g>
      
      <!-- Item 2 -->
      <g opacity="0" transform="translate(0, 100)">
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.8s" fill="freeze"/>
        <rect width="780" height="80" rx="10" fill="rgba(40,116,166,0.1)" stroke="rgba(40,116,166,0.5)" stroke-width="1"/>
        <text x="20" y="30" font-family="Arial, sans-serif" font-size="16" fill="#fff" font-weight="bold">Unstable Angina</text>
        <text x="20" y="55" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">Ischemic chest pain without infarction</text>
        <rect x="650" y="20" width="100" height="40" rx="8" fill="#F39C12"/>
        <text x="700" y="47" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">MED</text>
      </g>
      
      <!-- Item 3 -->
      <g opacity="0" transform="translate(0, 200)">
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="3.1s" fill="freeze"/>
        <rect width="780" height="80" rx="10" fill="rgba(40,116,166,0.1)" stroke="rgba(40,116,166,0.5)" stroke-width="1"/>
        <text x="20" y="30" font-family="Arial, sans-serif" font-size="16" fill="#fff" font-weight="bold">Aortic Dissection</text>
        <text x="20" y="55" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.6)">Tearing chest pain, risk with exertion</text>
        <rect x="650" y="20" width="100" height="40" rx="8" fill="#E74C3C"/>
        <text x="700" y="47" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="bold">LOW</text>
      </g>
    </g>
    
    <!-- Add button -->
    <g opacity="0" transform="translate(1040, 500)">
      <animate attributeName="opacity" values="0;1" dur="0.4s" begin="3.5s" fill="freeze"/>
      <rect width="780" height="60" rx="10" fill="rgba(40,116,166,0.2)" stroke="#2874A6" stroke-width="2" stroke-dasharray="8,4">
        <animate attributeName="stroke" values="#2874A6;#85C1E9;#2874A6" dur="2s" begin="4s" repeatCount="indefinite"/>
      </rect>
      <text x="390" y="38" font-family="Arial, sans-serif" font-size="16" fill="#85C1E9" text-anchor="middle">+ Add another diagnosis</text>
    </g>
  </g>
  
  <!-- Bottom instruction -->
  <text x="960" y="1050" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.5)" text-anchor="middle" opacity="0">
    Build your differential → Order tests → Reach diagnosis
    <animate attributeName="opacity" values="0;1;0" dur="2s" begin="4s" repeatCount="indefinite"/>
  </text>
</svg>
</body>
</html>
