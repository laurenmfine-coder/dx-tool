<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
:root{--bg:#F8FAFC;--surface:#fff;--border:#E2E8F0;--text:#1E293B;--ts:#64748B;--blue:#2874A6;--blue-l:#EBF5FB}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);padding-top:52px;min-height:100vh;display:flex;flex-direction:column}
.puzzle-wrap{max-width:640px;margin:0 auto;padding:40px 24px;flex:1;width:100%}
.puzzle-header{text-align:center;margin-bottom:32px}
.puzzle-header h1{font-size:1.4rem;font-weight:700;letter-spacing:-.02em}
.puzzle-header p{font-size:.88rem;color:var(--ts);margin-top:4px}
.puzzle-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:28px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.puzzle-type{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--blue);margin-bottom:12px}
.puzzle-scenario{font-size:.92rem;line-height:1.7;color:var(--text);margin-bottom:20px}
.puzzle-prompt{font-size:1rem;font-weight:700;color:var(--text);margin-bottom:16px;line-height:1.4}
.puzzle-input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:.88rem;font-family:inherit;resize:vertical;min-height:80px;outline:none;transition:border .15s}
.puzzle-input:focus{border-color:var(--blue)}
.puzzle-actions{display:flex;gap:10px;margin-top:14px}
.puzzle-btn{padding:10px 20px;border:none;border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.puzzle-btn-primary{background:var(--blue);color:#fff}
.puzzle-btn-primary:hover{background:#1B4F72}
.puzzle-btn-secondary{background:var(--blue-l);color:var(--blue);border:1.5px solid rgba(40,116,166,.2)}
.puzzle-feedback{margin-top:20px;padding:16px;border-radius:10px;font-size:.88rem;line-height:1.6;display:none}
.puzzle-feedback.show{display:block}
.puzzle-feedback.correct{background:#ECFDF5;border:1px solid #A7F3D0;color:#065F46}
.puzzle-feedback.teaching{background:var(--blue-l);border:1px solid rgba(40,116,166,.2);color:#1B4F72}
.puzzle-streak{text-align:center;margin-top:24px;font-size:.82rem;color:var(--ts)}
.puzzle-streak strong{color:var(--blue)}
.puzzle-nav{display:flex;justify-content:center;gap:12px;margin-top:20px}
</style>

<script>
var PUZZLES = [
  {type:'Lab Shift',scenario:'52-year-old male with substernal chest pressure for 2 hours. Your differential: ACS, PE, aortic dissection, pericarditis.',prompt:'Troponin comes back 0.04 ng/mL (normal <0.04). D-dimer is 2,400. What changes in your differential and why?',teaching:'Borderline troponin + markedly elevated D-dimer shifts the probability toward PE over ACS. ACS typically has higher troponin at 2 hours. D-dimer >2000 has high specificity for PE. Aortic dissection can also elevate D-dimer — consider CT angiography.'},
  {type:'Physical Exam Finding',scenario:'68-year-old female with progressive dyspnea over 3 weeks. On exam: JVD, bilateral crackles to mid-lung, S3 gallop, 2+ pitting edema.',prompt:'You find a new harsh systolic murmur loudest at the apex radiating to the axilla. Does this change your working diagnosis of CHF exacerbation? Why or why not?',teaching:'New mitral regurgitation in the setting of CHF changes management significantly. Acute MR can be the CAUSE of the decompensation (papillary muscle rupture, endocarditis, chordal rupture) rather than a consequence. This patient needs an urgent echo to evaluate valve function. The CHF treatment is the same, but the underlying cause matters for definitive management.'},
  {type:'Missing Evidence',scenario:'24-year-old female with sudden-onset pleuritic chest pain, tachycardia, and SpO2 91%. Colleague says: "This is definitely a PE."',prompt:'What single finding, if present, would make you disagree?',teaching:'Fever. PE rarely causes fever >38.5°C. If this patient is febrile, pneumonia or empyema becomes much more likely than PE. Other disconfirming findings: productive purulent sputum (pneumonia), unilateral leg swelling absent (reduces PE probability), pleuritic pain that worsens with inspiration AND position (more consistent with pleurisy/pericarditis).'},
  {type:'Time Pressure',scenario:'You are the overnight resident. 78-year-old male found unresponsive. Nurse reports sudden onset 10 minutes ago. GCS 7 (E1V2M4). Right pupil 6mm fixed, left 3mm reactive.',prompt:'You have 60 seconds before the attending arrives. What do you do RIGHT NOW and why?',teaching:'This is a neurosurgical emergency — herniation syndrome (blown pupil = uncal herniation). Immediate actions: (1) Protect airway — RSI with etomidate/succinylcholine, avoid ketamine. (2) Head of bed 30°. (3) Mannitol 1g/kg or hypertonic saline 23.4% 30mL IV push. (4) Call neurosurgery STAT for emergent decompression. (5) STAT CT head — but do NOT delay treatment for imaging. Every minute of herniation causes irreversible damage.'},
  {type:'Distinguishing Case',scenario:'Two patients in your ED both present with "worst headache of my life." Patient A: sudden onset while lifting weights, neck stiffness, vomiting. Patient B: gradual onset over 6 hours, photophobia, history of migraines.',prompt:'Same chief complaint, very different cases. What is the key distinguishing feature and what diagnosis do you pursue for each?',teaching:'Thunderclap onset (peak in seconds) is the critical distinguishing feature. Patient A: SAH until proven otherwise — CT head → LP if CT negative. The Valsalva trigger (weightlifting) and meningismus support this. Patient B: while "worst headache" is concerning, gradual onset + migraine history makes a severe migraine more likely. Still screen for red flags (new neurological deficits, fever, papilledema) but the pre-test probability for SAH is much lower.'},
  {type:'Source Check',scenario:'35-year-old male with 3 days of right lower quadrant pain, low-grade fever, anorexia. WBC 14,000. You think appendicitis.',prompt:'You are about to call surgery. You have evidence from history and labs. What is your third source, and what specific finding would confirm or refute your diagnosis?',teaching:'Physical exam is your third source — specifically: McBurney point tenderness, rebound tenderness, Rovsing sign, psoas sign, obturator sign. If the exam shows diffuse tenderness without localization, or if the pain is actually in the RUQ (cholecystitis) or suprapubic (UTI), your diagnosis changes. Never commit to a surgical consult on history + labs alone. The three-source rule: history tells you the story, labs quantify it, exam localizes it.'},
  {type:'Risk Priority',scenario:'Your differential for a 45-year-old with acute chest pain includes: GERD (prob: 40%), PE (prob: 15%), ACS (prob: 20%), musculoskeletal (prob: 20%), aortic dissection (prob: 5%).',prompt:'Rank these by which you should work up FIRST, not by probability. Explain your reasoning.',teaching:'The FMEA framework: Probability × Severity × Detectability. Aortic dissection (5% probability) should be worked up before GERD (40% probability) because: (1) Severity if missed = death within hours. (2) Detectability = hard to catch later (no biomarker, requires CT-A). Similarly, ACS and PE rank above GERD despite lower probability because missing them is catastrophic. The clinical rule: "rule out the worst, then work down." Never let a common diagnosis blind you to a lethal one.'},
  {type:'Anchoring Check',scenario:'72-year-old with known COPD presents with dyspnea. You started bronchodilators. Nurse mentions BNP is 1,200.',prompt:'You are anchored on COPD exacerbation. The BNP result just arrived. Walk through your reasoning: should you change your management?',teaching:'BNP >400 strongly suggests heart failure as a contributor. But here is the nuance: COPD and CHF frequently coexist, and COPD exacerbation can mildly elevate BNP (usually <500). BNP >1000 in the context of dyspnea has >90% PPV for heart failure. You should add diuresis to bronchodilators, get an echo, and reassess. The anchoring trap: you saw "COPD + dyspnea" and stopped thinking. The BNP is the evidence that breaks the anchor.'},
  // ── RENAL ──
  {type:'Lab Shift',scenario:'58-year-old male with type 2 diabetes, hypertension, and recent NSAID use presents with fatigue and decreased urine output for 3 days. Creatinine 3.8 (baseline 1.1). Urine shows muddy brown casts.',prompt:'Muddy brown casts on urinalysis. How does this single finding narrow your differential from the broad category of acute kidney injury?',teaching:'Muddy brown casts = acute tubular necrosis (ATN). They represent sloughed tubular epithelial cells — the classic finding of ischemic or nephrotoxic injury to the tubules. This rules out prerenal (hyaline casts or none) and obstructive AKI. NSAIDs cause both direct nephrotoxicity and reduced renal perfusion. Management: stop NSAIDs, IV fluids, nephrology consult — not diuretics yet.'},
  {type:'Distinguishing Case',scenario:'Patient A: creatinine 4.2, FENa 0.3%, urine osmolality 620, specific gravity 1.028. Patient B: creatinine 3.9, FENa 2.8%, urine osmolality 290, specific gravity 1.010.',prompt:'What is the pathophysiology behind each patient's AKI, and how does it change your immediate management?',teaching:'Patient A: FENa <1%, concentrated urine = prerenal AKI. The kidney is intact and trying to conserve sodium — give IV fluids, treat the underlying cause. Patient B: FENa >2%, isotonic urine = intrinsic renal AKI (ATN). The tubules cannot concentrate — IV fluids won't fix this. FENa interpretation caveat: unreliable if the patient is on diuretics — use FeUrea instead (<35% = prerenal).'},
  // ── HEMATOLOGY ──
  {type:'Missing Evidence',scenario:'32-year-old female with 3 days of fatigue, jaundice, and dark urine. Hgb 7.2, reticulocyte count 8%, LDH elevated, haptoglobin undetectable, peripheral smear shows spherocytes. Coombs test positive.',prompt:'The hematologist asks you one question before starting steroids: what critical piece of history must you obtain first?',teaching:'Drug history. Drug-induced immune hemolytic anemia (DIIHA) accounts for 15-20% of positive DAT cases and is treated by removing the offending agent — not steroids. Common culprits: cephalosporins, NSAIDs, penicillins, methyldopa, quinine. If you start prednisone without stopping the drug, the patient continues to hemolyze.'},
  {type:'Risk Priority',scenario:'Your patient has a platelet count of 18,000. The team is debating urgent intervention. Diagnosis is immune thrombocytopenia (ITP).',prompt:'At what platelet threshold and clinical scenario do you treat versus observe? Rank urgency: elective surgery tomorrow, mild gum bleeding, no bleeding, ICH risk.',teaching:'ITP treatment thresholds: (1) ICH/life-threatening bleeding → immediate IVIG + steroids + platelets. (2) Wet bleeding → treat if <30,000. (3) Dry purpura/no bleeding → treat if <20,000-30,000. (4) Elective surgery → target >50,000 (>80,000 neuro/ophth) — postpone if below. Treat based on bleeding risk, not number alone.'},
  // ── NEUROLOGY ──
  {type:'Physical Exam Finding',scenario:'45-year-old male with progressive proximal weakness over 3 weeks, areflexia, mild stocking-glove sensory loss, and prior GI illness 2 weeks ago.',prompt:'This is classic ascending weakness. What single exam finding would make you call neurosurgery instead of neurology?',teaching:'Bowel or bladder dysfunction. Ascending weakness + areflexia = Guillain-Barré (GBS) — neurology emergency. But urinary retention, rectal tone loss, or a sensory level on the trunk = spinal cord compression — neurosurgery emergency. GBS gets IVIG or plasmapheresis; cord compression gets emergent MRI ± surgical decompression. Never skip the sphincter exam in ascending weakness.'},
  {type:'Anchoring Check',scenario:'19-year-old with headache, fever, stiff neck. LP: WBC 840 (98% neutrophils), protein 180, glucose 28 (serum 92). You started empiric ceftriaxone.',prompt:'Your intern says "wait for cultures before adding anything else." What two additional agents must you consider adding immediately and why?',teaching:'(1) Vancomycin — empiric coverage for ceftriaxone-resistant S. pneumoniae (up to 30% resistance in some regions). Do NOT wait for sensitivities. (2) Dexamethasone 0.15mg/kg q6h × 4 days — before or with first antibiotic dose. Reduces mortality and hearing loss in pneumococcal meningitis (NNT ~8). Bacterial meningitis has 20-30% mortality even with correct antibiotics.'},
  // ── RHEUMATOLOGY ──
  {type:'Lab Shift',scenario:'38-year-old female with 6 weeks of symmetric small joint arthritis (MCPs, PIPs), morning stiffness >1 hour, fatigue, and low-grade fever. RF positive, anti-CCP strongly positive, ESR 88.',prompt:'Anti-CCP just came back strongly positive. How does this change your management urgency compared to if it were negative?',teaching:'Anti-CCP is highly specific (>95%) for RA and predicts aggressive, erosive disease. Strongly positive = (1) High risk of rapid joint destruction without treatment. (2) DMARD therapy imperative ideally within 12 weeks of symptom onset. (3) Rheumatology referral within 2 weeks. The window: early methotrexate ± hydroxychloroquine significantly improves long-term joint outcomes.'},
  {type:'Missing Evidence',scenario:'52-year-old male with proximal muscle weakness, difficulty rising from a chair, dysphagia, and heliotrope rash. CK 4,200. You are diagnosing dermatomyositis.',prompt:'Before starting immunosuppression, what workup is non-negotiable — and why would delaying treatment to complete it be wrong?',teaching:'Malignancy screening: dermatomyositis is paraneoplastic in 20-25% of adults (ovarian, lung, colorectal, pancreatic, nasopharyngeal). CT chest/abdomen/pelvis + age-appropriate cancer screening required. But do NOT delay steroids — dysphagia + ILD can be fatal. Run the workup simultaneously. Finding malignancy changes management: treating the cancer may resolve the myositis.'},
  // ── GASTROENTEROLOGY ──
  {type:'Time Pressure',scenario:'62-year-old cirrhotic male with acute hematemesis. BP 88/52, HR 124. Two large-bore IVs placed. The nurse asks what to transfuse first.',prompt:'You have 90 seconds. Blood products, pressors, scopes — what is your exact sequence and why does order matter?',teaching:'(1) pRBCs — target Hgb 7-8 (NOT 10 — over-transfusion raises portal pressure, worsens variceal bleeding). (2) Octreotide 50mcg bolus + 50mcg/hr — reduces splanchnic blood flow. (3) Ceftriaxone 1g IV — SBP prophylaxis reduces mortality 30% (NNT 5). (4) Avoid FFP/platelets unless INR >2.5 or platelets <50k — cirrhotic coagulopathy is complex and FFP increases portal pressure. (5) GI consult for emergent EGD within 12h.'},
  {type:'Distinguishing Case',scenario:'Patient A: 34F, bloody diarrhea 8x/day, tenesmus, colonoscopy shows continuous mucosal inflammation rectum to splenic flexure. Patient B: 28M, RLQ pain, non-bloody diarrhea, 15 lb loss, colonoscopy shows skip lesions, cobblestoning, rectal sparing.',prompt:'Both have IBD. Name one extraintestinal manifestation and one complication more likely in each.',teaching:'Patient A (UC): PSC (occurs in ~5% UC, rare in Crohn's). Complication: toxic megacolon (colon >6cm = surgical emergency). Patient B (Crohn's): perianal fistulae/abscess (pathognomonic for Crohn's). Complication: strictures + obstruction from transmural fibrosis. Key: UC is cured by colectomy; Crohn's is not.'},
  // ── INFECTIOUS DISEASE ──
  {type:'Source Check',scenario:'29-year-old male, 5 days of fever, new murmur, history of IV drug use. Blood cultures pending.',prompt:'Before cultures result, what physical exam findings confirm infective endocarditis — and which finding is the strongest predictor of embolic complications?',teaching:'IE stigmata: Osler nodes (painful finger pads — immune complex), Janeway lesions (painless palms/soles — septic emboli), Roth spots, splinter hemorrhages. Strongest predictor of embolic complications: vegetation >10mm on echo, especially anterior mitral leaflet. Most specific exam finding: Osler nodes (PPV >90%). Do not wait for cultures to get the echo.'},
  {type:'Lab Shift',scenario:'HIV-positive patient, CD4 count 48, not on ART. 2 weeks of headache, fever, mild neck stiffness. LP: opening pressure 28 cmH2O, India ink positive.',prompt:'India ink confirms Cryptococcus. Opening pressure is 28. Your intern says "start fluconazole." What critical intervention is your intern missing?',teaching:'Therapeutic LP for elevated ICP. Remove CSF until opening pressure <20 cmH2O (typically 20-30mL). Elevated ICP is the leading cause of early mortality in crypto meningitis — not fungal burden. Fluconazole is NOT first-line: amphotericin B + flucytosine × 2 weeks, then fluconazole consolidation. Daily LPs until pressure normalizes. Missing ICP management = herniation despite antifungal therapy.'},
  // ── ENDOCRINOLOGY ──
  {type:'Physical Exam Finding',scenario:'24-year-old female, 3 months of palpitations, heat intolerance, 12 lb weight loss, diarrhea. HR 118, tremor, lid lag, smooth diffusely enlarged thyroid. TSH <0.01, free T4 4.8.',prompt:'You hear a bruit over the thyroid. What does this tell you about the etiology, and how does it change your workup?',teaching:'Thyroid bruit = increased blood flow = Graves' disease. Not toxic nodular goiter (focal flow) or thyroiditis (tender, not hypervascular). Workup change: TSI/TRAb antibodies (>90% sensitive for Graves'). This changes treatment choice: RAI preferred in Graves'; surgery preferred for large compressive goiters or coexisting malignancy. Bruit is pathognomonic for Graves' in the right clinical context.'},
  // ── PEDIATRICS ──
  {type:'Time Pressure',scenario:'3-year-old, 3 days of fever 39.8°C, refusal to bear weight on right leg. WBC 18,000, ESR 68, CRP 4.2. Hip held in flexion/external rotation, painful with any motion.',prompt:'What is your decision tree — and what single test result pushes you to the OR tonight vs. morning?',teaching:'4/4 Kocher criteria (fever, non-weight-bearing, ESR >40, WBC >12,000) = >99% predicted probability of septic arthritis. Immediate action: hip ultrasound for effusion → arthrocentesis. Synovial WBC >50,000 = OR tonight for joint washout. Delay = avascular necrosis of the femoral head. Transient synovitis is a diagnosis of exclusion — never assume it with 4/4 Kocher.'},
  // ── PSYCHIATRY ──
  {type:'Missing Evidence',scenario:'28-year-old male, no psychiatric history: 4 days no sleep, pressured speech, believes he was chosen to solve a global crisis, spent $40,000 on a business in 72 hours.',prompt:'Before diagnosing bipolar I mania, what three medical causes must you rule out — and which lab is most commonly missed?',teaching:'Rule out organic mania: (1) Thyroid storm / hyperthyroidism — TSH is the most missed lab; always check free T4 too. (2) Stimulant intoxication — urine drug screen (cocaine, meth, bath salts can be indistinguishable from mania). (3) CNS pathology — new-onset mania after 40 or with focal deficits needs MRI (encephalitis, frontal lobe lesion, HIV encephalopathy). Also: steroid-induced mania, anti-NMDA receptor encephalitis. First-break mania always requires organic workup.'},
  // ── DERMATOLOGY ──
  {type:'Distinguishing Case',scenario:'Patient A: 72F, large tense bullae on urticarial base, flexor surfaces, no mucosal involvement, Nikolsky negative. Patient B: 45M, flaccid easily ruptured bullae, Nikolsky positive, painful oral erosions.',prompt:'Both have autoimmune blistering disorders. What is the pathophysiology of each — and which is immediately life-threatening?',teaching:'Patient A: Bullous Pemphigoid — IgG vs BP180/BP230 (hemidesmosomes). Tense bullae, no mucosa, Nikolsky negative. Managed with steroids. Patient B: Pemphigus Vulgaris — IgG vs desmoglein-3 (desmosome, intraepidermal). Flaccid bullae, mucosal involvement (often first sign), Nikolsky positive. Life-threatening: Pemphigus Vulgaris — severe fluid loss, sepsis, >90% mortality untreated. Nikolsky sign: positive = intraepidermal split (pemphigus); negative = subepidermal split (pemphigoid).'},
  // ── CARDIOLOGY (ADVANCED) ──
  {type:'Anchoring Check',scenario:'66-year-old admitted for "COPD exacerbation," day 2, responding poorly to bronchodilators. New: JVP elevated to jaw angle, distant heart sounds, pulsus paradoxus 18mmHg.',prompt:'You've treated COPD for 36 hours. This constellation has a name. What is it — and what do you do in the next 60 seconds?',teaching:'Beck's triad: hypotension + elevated JVP + muffled sounds = cardiac tamponade. Pulsus paradoxus >10mmHg supports this. Next 60 seconds: (1) Bedside echo STAT — effusion + RA/RV diastolic collapse. (2) Cardiology for emergent pericardiocentesis. (3) 500mL NS bolus — tamponade is preload-dependent. (4) Hold diuretics, beta-blockers, vasodilators — all will kill this patient. The anchor trap: COPD + JVD = cor pulmonale, until pulsus paradoxus breaks it.'},
  {type:'Lab Shift',scenario:'55-year-old male post-CABG day 3. New fever 38.8°C, pleuritic chest pain, friction rub. ECG: diffuse saddle-shaped ST elevation, PR depression in lead II.',prompt:'Your intern calls the cath lab for STEMI. What do you tell them — and what is the single distinguishing ECG feature?',teaching:'This is post-cardiac injury syndrome (Dressler) / pericarditis — NOT STEMI. Distinguishing ECG: pericarditis has diffuse ST elevation (not focal territory), saddle-shape, PR depression (pathognomonic, 80%), no reciprocal changes. STEMI: focal territory, reciprocal depression, hyperacute T-waves, no PR depression. Management: NSAIDs + colchicine × 3 months. PR depression is the single most specific ECG finding for pericarditis.'},
  // ── TOXICOLOGY ──
  {type:'Time Pressure',scenario:'22-year-old unresponsive at a party. HR 42, BP 88/54, RR 8, temp 35.1°C, pupils pinpoint, GCS 6.',prompt:'30 seconds: name the toxidrome, the antidote, and what you check before giving it.',teaching:'Opioid toxidrome: bradycardia, hypotension, respiratory depression, hypothermia, miosis. Antidote: Naloxone 0.4-2mg IV/IM/IN. Before giving: in chronic opioid users, high-dose naloxone precipitates dangerous withdrawal (vomiting + aspiration, catecholamine surge, pulmonary edema). Start with 0.04-0.1mg, titrate to RR >12 — NOT full reversal. Naloxone lasts 1-2h; most opioids last longer — watch for re-sedation.'},
  // ── PULMONARY ──
  {type:'Source Check',scenario:'44-year-old nurse, 6 weeks of productive cough, night sweats, 18 lb weight loss, hemoptysis. CXR: right upper lobe cavitary lesion with surrounding infiltrate.',prompt:'History strongly suggests TB. What are your two required diagnostic sources before starting treatment — and what must happen in the next 5 minutes regardless of results?',teaching:'(1) AFB smear (sputum × 3 early morning samples) — sensitivity 50-80%. (2) Chest CT — characterizes cavity, lymphadenopathy, miliary pattern. The 5-minute action: AIRBORNE ISOLATION. Negative-pressure room immediately — before any test. A healthcare worker with cavitary lesion + hemoptysis is presumed smear-positive TB. Delay in isolation has caused institutional outbreaks. Treatment (RIPE: rifampin, isoniazid, pyrazinamide, ethambutol) starts after 3 AFB smears even if culture pending.'}

];

var currentIndex = 0;
var streak = parseInt(localStorage.getItem('rdx_puzzle_streak') || '0');
var lastDate = localStorage.getItem('rdx_puzzle_date') || '';
var today = new Date().toISOString().slice(0, 10);

// Reset streak if missed a day
if (lastDate && lastDate !== today) {
  var lastD = new Date(lastDate);
  var todayD = new Date(today);
  var diff = (todayD - lastD) / 86400000;
  if (diff > 1) streak = 0;
}

// Pick today's puzzle deterministically
currentIndex = Math.abs(hashStr(today)) % PUZZLES.length;

function hashStr(s) {
  var h = 0;
  for (var i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return h;
}

function renderPuzzle() {
  var p = PUZZLES[currentIndex];
  document.getElementById('puzzleType').textContent = p.type;
  document.getElementById('puzzleScenario').textContent = p.scenario;
  document.getElementById('puzzlePrompt').textContent = p.prompt;
  document.getElementById('puzzleAnswer').value = '';
  document.getElementById('puzzleAnswer').disabled = false;
  document.getElementById('puzzleFeedback').className = 'puzzle-feedback';
  document.getElementById('puzzleFeedback').style.display = 'none';
  updateStreak();
},
  // ── EMERGENCY MEDICINE ──
  {type:'Risk Priority',scenario:'68-year-old male, syncope while standing in line. No prodrome. Found on floor by bystanders. Hx: hypertension, prostate cancer on hormonal therapy. ECG: QTc 512ms.',prompt:'Syncope in an elderly patient has a broad differential. Rank these causes by urgency: vasovagal, orthostatic hypotension, arrhythmia, structural cardiac, pulmonary embolism.',teaching:'Rank by mortality if missed: (1) Arrhythmia — QTc 512ms is a critical finding; prolonged QT can cause torsades de pointes and sudden death. Admit, telemetry, electrolytes, medications review. (2) Structural cardiac (AS, HCM, PE) — exertional or sudden syncope without prodrome = structural until proven otherwise. Echo required. (3) PE — hormonal therapy for prostate cancer is a VTE risk factor; no prodrome + PE-related syncope carries 15% mortality. (4) Orthostatic — likely contributor but lower mortality; treat after ruling out above. (5) Vasovagal — classic prodrome (warmth, nausea, tunnel vision) was absent here. Diagnosis of exclusion.'},
  {type:'Missing Evidence',scenario:'You are supervising a student who presents a case: 55-year-old male, 3 days of fever, productive cough, right lower lobe infiltrate on CXR, WBC 14,000. The student says: "Community-acquired pneumonia, starting azithromycin."',prompt:'Before you approve the plan, what single piece of history would most change your management — and what would it change to?',teaching:'Immunosuppression status. If this patient is on corticosteroids, is HIV-positive, has received chemotherapy, or is a solid organ transplant recipient, azithromycin alone is dangerously inadequate. Immunocompromised patients with "CAP" can have Pneumocystis jirovecii (PCP), fungal pneumonia (Cryptococcus, Histoplasma, Aspergillus), or atypical mycobacteria — none of which respond to azithromycin. A single question — "Are you on any medications that affect your immune system?" — changes the workup (LDH, beta-glucan, galactomannan, BAL) and treatment entirely. The teaching point: immunosuppression is the most commonly missed contextual factor that converts "straightforward CAP" into a diagnostic emergency.'}
];
  var fb = document.getElementById('puzzleFeedback');
  fb.className = 'puzzle-feedback show teaching';
  fb.innerHTML = '<div style="font-weight:700;margin-bottom:6px">Expert Analysis</div>' + p.teaching;
  fb.style.display = 'block';

  document.getElementById('puzzleAnswer').disabled = true;

  // Update streak
  streak++;
  localStorage.setItem('rdx_puzzle_streak', streak);
  localStorage.setItem('rdx_puzzle_date', today);
  updateStreak();

  // Log
  try {
    var history = JSON.parse(localStorage.getItem('rdx_puzzle_history') || '[]');
    history.push({ date: today, type: p.type, answered: true, words: answer.split(/\s+/).length });
    if (history.length > 90) history = history.slice(-90);
    localStorage.setItem('rdx_puzzle_history', JSON.stringify(history));
  } catch(e) {}
}

function skipPuzzle() {
  currentIndex = (currentIndex + 1) % PUZZLES.length;
  renderPuzzle();
}

function updateStreak() {
  document.getElementById('puzzleStreak').innerHTML = streak > 0
    ? 'Current streak: <strong>' + streak + ' day' + (streak !== 1 ? 's' : '') + '</strong>'
    : 'Start your streak today';
}

renderPuzzle();
</script>
</body>
</html>
