<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MechanismX - ABG Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);min-height:100vh;}</style>
</head>
<body class="text-white">
    <nav class="bg-slate-800/80 backdrop-blur border-b border-slate-700 px-6 py-4">
        <div class="max-w-4xl mx-auto flex items-center gap-4">
            <a href="index.html" class="text-gray-400 hover:text-white text-sm">← MechanismX</a>
            <h1 class="text-xl font-bold">🔬 ABG Analyzer</h1>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <!-- Input Section -->
        <div class="bg-slate-800 rounded-xl p-6 border border-slate-700 mb-6">
            <h2 class="text-lg font-bold mb-4">Enter ABG Values</h2>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-4">
                <div>
                    <label class="text-sm text-gray-400">pH</label>
                    <input type="number" id="ph" step="0.01" placeholder="7.40" class="w-full bg-slate-700 rounded px-3 py-2 text-white border border-slate-600 focus:border-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="text-sm text-gray-400">PaCO2 (mmHg)</label>
                    <input type="number" id="pco2" placeholder="40" class="w-full bg-slate-700 rounded px-3 py-2 text-white border border-slate-600 focus:border-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="text-sm text-gray-400">HCO3 (mEq/L)</label>
                    <input type="number" id="hco3" placeholder="24" class="w-full bg-slate-700 rounded px-3 py-2 text-white border border-slate-600 focus:border-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="text-sm text-gray-400">Na+ (mEq/L)</label>
                    <input type="number" id="na" placeholder="140" class="w-full bg-slate-700 rounded px-3 py-2 text-white border border-slate-600 focus:border-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="text-sm text-gray-400">Cl- (mEq/L)</label>
                    <input type="number" id="cl" placeholder="100" class="w-full bg-slate-700 rounded px-3 py-2 text-white border border-slate-600 focus:border-blue-500 focus:outline-none">
                </div>
            </div>
            <button onclick="analyzeABG()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition">
                Analyze ABG
            </button>
        </div>

        <!-- Results Section -->
        <div id="results" class="hidden">
            <!-- Primary Disorder -->
            <div class="bg-slate-800 rounded-xl p-6 border border-slate-700 mb-6">
                <h3 class="font-semibold mb-4">Analysis Results</h3>
                <div id="primaryDisorder" class="text-xl font-bold text-center p-4 rounded-lg mb-4"></div>
                <div id="stepByStep" class="space-y-3"></div>
            </div>

            <!-- Calculated Values -->
            <div class="bg-slate-800 rounded-xl p-6 border border-slate-700 mb-6">
                <h3 class="font-semibold mb-4">Calculated Values</h3>
                <div id="calculations" class="grid md:grid-cols-3 gap-4"></div>
            </div>

            <!-- Differential -->
            <div class="bg-slate-800 rounded-xl p-6 border border-slate-700">
                <h3 class="font-semibold mb-4">Differential Diagnosis</h3>
                <div id="differential" class="space-y-2"></div>
            </div>
        </div>

        <!-- Reference -->
        <div class="bg-slate-800 rounded-xl p-6 border border-slate-700 mt-6">
            <h3 class="font-semibold mb-4">Quick Reference: Normal Values</h3>
            <div class="grid grid-cols-5 gap-4 text-center text-sm">
                <div class="bg-slate-700 rounded p-3">
                    <div class="text-amber-400 font-bold">pH</div>
                    <div class="text-gray-300">7.35-7.45</div>
                </div>
                <div class="bg-slate-700 rounded p-3">
                    <div class="text-amber-400 font-bold">PaCO2</div>
                    <div class="text-gray-300">35-45</div>
                </div>
                <div class="bg-slate-700 rounded p-3">
                    <div class="text-amber-400 font-bold">HCO3</div>
                    <div class="text-gray-300">22-26</div>
                </div>
                <div class="bg-slate-700 rounded p-3">
                    <div class="text-amber-400 font-bold">Anion Gap</div>
                    <div class="text-gray-300">8-12</div>
                </div>
                <div class="bg-slate-700 rounded p-3">
                    <div class="text-amber-400 font-bold">Delta Ratio</div>
                    <div class="text-gray-300">1-2</div>
                </div>
            </div>
        </div>

        <!-- Practice Cases -->
        <div class="bg-slate-800 rounded-xl p-6 border border-slate-700 mt-6">
            <h3 class="font-semibold mb-4">Practice Cases</h3>
            <div class="grid md:grid-cols-2 gap-3">
                <button onclick="loadCase(7.28, 60, 28, 140, 100)" class="bg-slate-700 hover:bg-slate-600 rounded-lg p-3 text-left transition">
                    <div class="text-amber-400 font-medium">Case 1: COPD Exacerbation</div>
                    <div class="text-xs text-gray-400">pH 7.28, pCO2 60, HCO3 28</div>
                </button>
                <button onclick="loadCase(7.52, 25, 20, 140, 100)" class="bg-slate-700 hover:bg-slate-600 rounded-lg p-3 text-left transition">
                    <div class="text-amber-400 font-medium">Case 2: Anxiety/Hyperventilation</div>
                    <div class="text-xs text-gray-400">pH 7.52, pCO2 25, HCO3 20</div>
                </button>
                <button onclick="loadCase(7.25, 24, 10, 140, 100)" class="bg-slate-700 hover:bg-slate-600 rounded-lg p-3 text-left transition">
                    <div class="text-amber-400 font-medium">Case 3: DKA</div>
                    <div class="text-xs text-gray-400">pH 7.25, pCO2 24, HCO3 10</div>
                </button>
                <button onclick="loadCase(7.48, 48, 35, 140, 90)" class="bg-slate-700 hover:bg-slate-600 rounded-lg p-3 text-left transition">
                    <div class="text-amber-400 font-medium">Case 4: Vomiting</div>
                    <div class="text-xs text-gray-400">pH 7.48, pCO2 48, HCO3 35</div>
                </button>
                <button onclick="loadCase(7.22, 12, 5, 140, 100)" class="bg-slate-700 hover:bg-slate-600 rounded-lg p-3 text-left transition">
                    <div class="text-amber-400 font-medium">Case 5: Severe Metabolic Acidosis</div>
                    <div class="text-xs text-gray-400">pH 7.22, pCO2 12, HCO3 5</div>
                </button>
                <button onclick="loadCase(7.35, 60, 32, 140, 100)" class="bg-slate-700 hover:bg-slate-600 rounded-lg p-3 text-left transition">
                    <div class="text-amber-400 font-medium">Case 6: Chronic COPD</div>
                    <div class="text-xs text-gray-400">pH 7.35, pCO2 60, HCO3 32</div>
                </button>
                <button onclick="loadCase(7.40, 40, 24, 140, 100)" class="bg-slate-700 hover:bg-slate-600 rounded-lg p-3 text-left transition">
                    <div class="text-green-400 font-medium">Normal ABG</div>
                    <div class="text-xs text-gray-400">pH 7.40, pCO2 40, HCO3 24</div>
                </button>
                <button onclick="loadCase(7.40, 20, 12, 140, 100)" class="bg-slate-700 hover:bg-slate-600 rounded-lg p-3 text-left transition">
                    <div class="text-red-400 font-medium">Case 7: Mixed Disorder (Salicylate)</div>
                    <div class="text-xs text-gray-400">pH 7.40, pCO2 20, HCO3 12</div>
                </button>
            </div>
        </div>
    </main>

    <script>
        function loadCase(ph, pco2, hco3, na, cl) {
            document.getElementById('ph').value = ph;
            document.getElementById('pco2').value = pco2;
            document.getElementById('hco3').value = hco3;
            document.getElementById('na').value = na;
            document.getElementById('cl').value = cl;
            analyzeABG();
        }

        function analyzeABG() {
            const ph = parseFloat(document.getElementById('ph').value);
            const pco2 = parseFloat(document.getElementById('pco2').value);
            const hco3 = parseFloat(document.getElementById('hco3').value);
            const na = parseFloat(document.getElementById('na').value) || 140;
            const cl = parseFloat(document.getElementById('cl').value) || 100;

            if (isNaN(ph) || isNaN(pco2) || isNaN(hco3)) {
                alert('Please enter pH, PaCO2, and HCO3');
                return;
            }

            document.getElementById('results').classList.remove('hidden');

            // Calculate values
            const anionGap = na - cl - hco3;
            const deltaAG = anionGap - 12;
            const expectedHCO3 = 24 + deltaAG;
            const deltaRatio = deltaAG / (24 - hco3);

            // Step 1: Acidemia or Alkalemia
            let step1, acidBase;
            if (ph < 7.35) {
                step1 = { text: 'pH < 7.35 → Acidemia', color: 'text-red-400' };
                acidBase = 'acidemia';
            } else if (ph > 7.45) {
                step1 = { text: 'pH > 7.45 → Alkalemia', color: 'text-blue-400' };
                acidBase = 'alkalemia';
            } else {
                step1 = { text: 'pH 7.35-7.45 → Normal (or mixed disorder)', color: 'text-green-400' };
                acidBase = 'normal';
            }

            // Step 2: Primary disorder
            let step2, primaryDisorder;
            if (acidBase === 'acidemia') {
                if (pco2 > 45 && hco3 >= 22) {
                    primaryDisorder = 'Respiratory Acidosis';
                    step2 = { text: 'High CO2 with acidemia → Respiratory Acidosis', color: 'text-red-400' };
                } else if (hco3 < 22) {
                    primaryDisorder = 'Metabolic Acidosis';
                    step2 = { text: 'Low HCO3 with acidemia → Metabolic Acidosis', color: 'text-amber-400' };
                } else {
                    primaryDisorder = 'Mixed Acidosis';
                    step2 = { text: 'Both CO2 elevated and HCO3 low → Mixed', color: 'text-purple-400' };
                }
            } else if (acidBase === 'alkalemia') {
                if (pco2 < 35 && hco3 <= 26) {
                    primaryDisorder = 'Respiratory Alkalosis';
                    step2 = { text: 'Low CO2 with alkalemia → Respiratory Alkalosis', color: 'text-blue-400' };
                } else if (hco3 > 26) {
                    primaryDisorder = 'Metabolic Alkalosis';
                    step2 = { text: 'High HCO3 with alkalemia → Metabolic Alkalosis', color: 'text-cyan-400' };
                } else {
                    primaryDisorder = 'Mixed Alkalosis';
                    step2 = { text: 'Both CO2 low and HCO3 high → Mixed', color: 'text-purple-400' };
                }
            } else {
                // Normal pH - check for mixed
                if (pco2 < 35 && hco3 < 22) {
                    primaryDisorder = 'Mixed: Respiratory Alkalosis + Metabolic Acidosis';
                    step2 = { text: 'Normal pH but both CO2 and HCO3 low → Mixed disorder', color: 'text-purple-400' };
                } else if (pco2 > 45 && hco3 > 26) {
                    primaryDisorder = 'Mixed: Respiratory Acidosis + Metabolic Alkalosis';
                    step2 = { text: 'Normal pH but both CO2 and HCO3 high → Mixed disorder', color: 'text-purple-400' };
                } else {
                    primaryDisorder = 'Normal ABG';
                    step2 = { text: 'Values within normal range', color: 'text-green-400' };
                }
            }

            // Step 3: Compensation check
            let step3, expectedPCO2, expectedHCO3comp;
            if (primaryDisorder === 'Metabolic Acidosis') {
                expectedPCO2 = 1.5 * hco3 + 8;
                const compensated = Math.abs(pco2 - expectedPCO2) <= 2;
                step3 = { 
                    text: `Winter's formula: Expected CO2 = ${expectedPCO2.toFixed(0)} ± 2. Actual: ${pco2}. ${compensated ? 'Appropriate compensation' : 'Additional respiratory disorder'}`,
                    color: compensated ? 'text-green-400' : 'text-amber-400'
                };
            } else if (primaryDisorder === 'Metabolic Alkalosis') {
                expectedPCO2 = 0.7 * hco3 + 21;
                const compensated = Math.abs(pco2 - expectedPCO2) <= 2;
                step3 = { 
                    text: `Expected CO2 = ${expectedPCO2.toFixed(0)} ± 2. Actual: ${pco2}. ${compensated ? 'Appropriate compensation' : 'Additional respiratory disorder'}`,
                    color: compensated ? 'text-green-400' : 'text-amber-400'
                };
            } else if (primaryDisorder === 'Respiratory Acidosis') {
                // Acute: HCO3 rises 1 per 10 CO2. Chronic: rises 3.5 per 10 CO2
                const acuteHCO3 = 24 + (pco2 - 40) / 10;
                const chronicHCO3 = 24 + 3.5 * (pco2 - 40) / 10;
                step3 = { 
                    text: `Acute expected HCO3: ${acuteHCO3.toFixed(0)}, Chronic: ${chronicHCO3.toFixed(0)}. Actual: ${hco3}`,
                    color: 'text-amber-400'
                };
            } else if (primaryDisorder === 'Respiratory Alkalosis') {
                const acuteHCO3 = 24 - 2 * (40 - pco2) / 10;
                const chronicHCO3 = 24 - 5 * (40 - pco2) / 10;
                step3 = { 
                    text: `Acute expected HCO3: ${acuteHCO3.toFixed(0)}, Chronic: ${chronicHCO3.toFixed(0)}. Actual: ${hco3}`,
                    color: 'text-amber-400'
                };
            } else {
                step3 = { text: 'N/A for this disorder', color: 'text-gray-400' };
            }

            // Step 4: Anion gap
            let step4, agAnalysis;
            if (primaryDisorder.includes('Metabolic Acidosis')) {
                if (anionGap > 12) {
                    agAnalysis = 'Elevated AG Metabolic Acidosis (HAGMA)';
                    step4 = { text: `AG = ${anionGap} (elevated) → High AG Metabolic Acidosis`, color: 'text-red-400' };
                } else {
                    agAnalysis = 'Normal AG Metabolic Acidosis (NAGMA)';
                    step4 = { text: `AG = ${anionGap} (normal) → Non-AG Metabolic Acidosis`, color: 'text-amber-400' };
                }
            } else {
                step4 = { text: `AG = ${anionGap} (calculated)`, color: 'text-gray-400' };
                agAnalysis = '';
            }

            // Step 5: Delta-delta (if HAGMA)
            let step5;
            if (anionGap > 12 && primaryDisorder.includes('Metabolic Acidosis')) {
                if (deltaRatio < 1) {
                    step5 = { text: `Delta ratio = ${deltaRatio.toFixed(2)} (<1) → Additional NAGMA present`, color: 'text-amber-400' };
                } else if (deltaRatio > 2) {
                    step5 = { text: `Delta ratio = ${deltaRatio.toFixed(2)} (>2) → Additional metabolic alkalosis present`, color: 'text-blue-400' };
                } else {
                    step5 = { text: `Delta ratio = ${deltaRatio.toFixed(2)} (1-2) → Pure HAGMA`, color: 'text-green-400' };
                }
            } else {
                step5 = { text: 'Delta-delta not applicable', color: 'text-gray-400' };
            }

            // Render results
            const disorderDiv = document.getElementById('primaryDisorder');
            let bgColor = 'bg-slate-700';
            if (primaryDisorder.includes('Acidosis')) bgColor = 'bg-red-500/20 border border-red-500/50';
            else if (primaryDisorder.includes('Alkalosis')) bgColor = 'bg-blue-500/20 border border-blue-500/50';
            else if (primaryDisorder === 'Normal ABG') bgColor = 'bg-green-500/20 border border-green-500/50';
            else if (primaryDisorder.includes('Mixed')) bgColor = 'bg-purple-500/20 border border-purple-500/50';
            disorderDiv.className = `text-xl font-bold text-center p-4 rounded-lg mb-4 ${bgColor}`;
            disorderDiv.textContent = primaryDisorder + (agAnalysis ? ` (${agAnalysis})` : '');

            // Step by step
            const stepsDiv = document.getElementById('stepByStep');
            stepsDiv.innerHTML = `
                <div class="bg-slate-700 rounded p-3">
                    <span class="text-gray-400">Step 1:</span>
                    <span class="${step1.color}"> ${step1.text}</span>
                </div>
                <div class="bg-slate-700 rounded p-3">
                    <span class="text-gray-400">Step 2:</span>
                    <span class="${step2.color}"> ${step2.text}</span>
                </div>
                <div class="bg-slate-700 rounded p-3">
                    <span class="text-gray-400">Step 3 (Compensation):</span>
                    <span class="${step3.color}"> ${step3.text}</span>
                </div>
                <div class="bg-slate-700 rounded p-3">
                    <span class="text-gray-400">Step 4 (Anion Gap):</span>
                    <span class="${step4.color}"> ${step4.text}</span>
                </div>
                <div class="bg-slate-700 rounded p-3">
                    <span class="text-gray-400">Step 5 (Delta-Delta):</span>
                    <span class="${step5.color}"> ${step5.text}</span>
                </div>
            `;

            // Calculations
            const calcDiv = document.getElementById('calculations');
            calcDiv.innerHTML = `
                <div class="bg-slate-700 rounded p-3 text-center">
                    <div class="text-amber-400 font-bold">Anion Gap</div>
                    <div class="text-2xl">${anionGap}</div>
                    <div class="text-xs text-gray-400">Na - Cl - HCO3</div>
                </div>
                <div class="bg-slate-700 rounded p-3 text-center">
                    <div class="text-amber-400 font-bold">Delta Gap</div>
                    <div class="text-2xl">${deltaAG}</div>
                    <div class="text-xs text-gray-400">AG - 12</div>
                </div>
                <div class="bg-slate-700 rounded p-3 text-center">
                    <div class="text-amber-400 font-bold">Delta Ratio</div>
                    <div class="text-2xl">${isFinite(deltaRatio) ? deltaRatio.toFixed(2) : 'N/A'}</div>
                    <div class="text-xs text-gray-400">ΔAG / ΔHCO3</div>
                </div>
            `;

            // Differential
            const diffDiv = document.getElementById('differential');
            let differential = '';
            
            if (agAnalysis === 'Elevated AG Metabolic Acidosis (HAGMA)') {
                differential = `
                    <div class="bg-slate-700 rounded p-3">
                        <div class="text-red-400 font-medium">MUDPILES</div>
                        <div class="text-sm text-gray-300">Methanol, Uremia, DKA, Propylene glycol, Isoniazid/Iron, Lactic acidosis, Ethylene glycol, Salicylates</div>
                    </div>
                `;
            } else if (agAnalysis === 'Normal AG Metabolic Acidosis (NAGMA)') {
                differential = `
                    <div class="bg-slate-700 rounded p-3">
                        <div class="text-amber-400 font-medium">HARDUPS</div>
                        <div class="text-sm text-gray-300">Hyperalimentation, Addison's, RTA, Diarrhea, Ureteral diversion, Pancreatic fistula, Saline infusion</div>
                    </div>
                `;
            } else if (primaryDisorder === 'Metabolic Alkalosis') {
                differential = `
                    <div class="bg-slate-700 rounded p-3">
                        <div class="text-blue-400 font-medium">Saline-Responsive (Urine Cl <20)</div>
                        <div class="text-sm text-gray-300">Vomiting, NG suction, Diuretics (past), Volume contraction</div>
                    </div>
                    <div class="bg-slate-700 rounded p-3">
                        <div class="text-purple-400 font-medium">Saline-Resistant (Urine Cl >20)</div>
                        <div class="text-sm text-gray-300">Hyperaldosteronism, Cushing's, Bartter/Gitelman, Severe hypoK</div>
                    </div>
                `;
            } else if (primaryDisorder === 'Respiratory Acidosis') {
                differential = `
                    <div class="bg-slate-700 rounded p-3">
                        <div class="text-red-400 font-medium">Hypoventilation Causes</div>
                        <div class="text-sm text-gray-300">COPD, Asthma, Sedatives/Opioids, Neuromuscular disease, Obesity hypoventilation, Airway obstruction</div>
                    </div>
                `;
            } else if (primaryDisorder === 'Respiratory Alkalosis') {
                differential = `
                    <div class="bg-slate-700 rounded p-3">
                        <div class="text-blue-400 font-medium">Hyperventilation Causes</div>
                        <div class="text-sm text-gray-300">Anxiety, Pain, Hypoxemia, PE, Sepsis, Salicylates (early), Pregnancy, Liver failure, CNS disease</div>
                    </div>
                `;
            } else {
                differential = `<div class="text-gray-400">No specific differential for normal ABG</div>`;
            }
            diffDiv.innerHTML = differential;
        }
    </script>
</body>
</html>
