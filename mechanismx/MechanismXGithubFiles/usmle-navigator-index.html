<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USMLE Blueprint Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111827; }
        .domain-card:hover { transform: scale(1.02); }
        .topic-node { transition: all 0.2s; }
        .topic-node:hover { transform: scale(1.05); }
    </style>
</head>
<body class="min-h-screen text-white">
    <!-- Navigation -->
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button id="back-btn" onclick="goBack()" class="text-gray-400 hover:text-white hidden">← Back</button>
                <h1 class="text-xl font-bold">🗺️ USMLE Blueprint Navigator</h1>
            </div>
            <div class="flex items-center gap-4">
                <a href="../mechanismx/index.html" class="text-gray-400 hover:text-white text-sm">MechanismX</a>
                <a href="../integration/learning-hub.html" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm">Learning Hub</a>
            </div>
        </div>
    </nav>

    <!-- Breadcrumb -->
    <div class="bg-gray-800/50 px-6 py-2 border-b border-gray-700">
        <div class="max-w-7xl mx-auto">
            <div id="breadcrumb" class="text-sm text-gray-400">
                <span>Step 1</span>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="bg-gray-800 px-6 py-3 border-b border-gray-700">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-6">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="high-yield-filter" onchange="toggleHighYield()" class="w-4 h-4 rounded">
                    <span class="text-sm">High-Yield Only</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="gaps-filter" onchange="toggleGapsOnly()" class="w-4 h-4 rounded">
                    <span class="text-sm">Show Gaps Only</span>
                </label>
            </div>
            
            <div class="flex items-center gap-4 text-sm">
                <span class="text-gray-400">Mastery:</span>
                <span class="flex items-center gap-1"><div class="w-3 h-3 rounded bg-gray-600"></div> Not Started</span>
                <span class="flex items-center gap-1"><div class="w-3 h-3 rounded bg-amber-500"></div> Learning</span>
                <span class="flex items-center gap-1"><div class="w-3 h-3 rounded bg-blue-500"></div> Practiced</span>
                <span class="flex items-center gap-1"><div class="w-3 h-3 rounded bg-green-500"></div> Mastered</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 py-8">
        <!-- Overview View (Domains) -->
        <div id="overview-view">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold mb-2">USMLE Step 1 Content Map</h2>
                <p class="text-gray-400">Click any domain to explore its topics</p>
            </div>
            
            <div id="domains-grid" class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Domains populated by JavaScript -->
            </div>
        </div>

        <!-- Domain View (Subdomains & Topics) -->
        <div id="domain-view" class="hidden">
            <div id="domain-header" class="mb-8">
                <!-- Populated by JavaScript -->
            </div>
            <div id="subdomains-container" class="space-y-8">
                <!-- Populated by JavaScript -->
            </div>
        </div>

        <!-- Topic Detail View -->
        <div id="topic-view" class="hidden">
            <div id="topic-content" class="max-w-4xl mx-auto">
                <!-- Populated by JavaScript -->
            </div>
        </div>
    </main>

    <!-- Stats Panel (Floating) -->
    <div id="stats-panel" class="fixed bottom-6 right-6 bg-gray-800 rounded-xl shadow-xl border border-gray-700 p-4 cursor-pointer" onclick="toggleStatsPanel()">
        <div class="flex items-center gap-3">
            <div id="overall-score" class="w-12 h-12 rounded-full bg-blue-600 flex items-center justify-center font-bold">
                0%
            </div>
            <div>
                <div class="font-semibold">Overall Mastery</div>
                <div class="text-sm text-gray-400"><span id="gap-count">0</span> gaps detected</div>
            </div>
        </div>
    </div>

    <!-- Load Data -->
    <script src="data/blueprint-structure.js"></script>
    <script src="data/interconnection-web.js"></script>

    <script>
        // ============================================================================
        // USMLE NAVIGATOR CONTROLLER
        // ============================================================================
        
        const Navigator = {
            currentView: 'overview', // overview, domain, topic
            currentDomain: null,
            currentTopic: null,
            filters: {
                highYieldOnly: false,
                gapsOnly: false
            },
            progress: {},
            gaps: [],
            
            init() {
                this.loadProgress();
                this.detectGaps();
                this.renderOverview();
                this.updateStats();
            },
            
            loadProgress() {
                const saved = localStorage.getItem('usmle_navigator_progress');
                if (saved) {
                    this.progress = JSON.parse(saved);
                }
            },
            
            saveProgress() {
                localStorage.setItem('usmle_navigator_progress', JSON.stringify(this.progress));
            },
            
            detectGaps() {
                // Simple gap detection based on progress
                this.gaps = [];
                
                if (typeof USMLEBlueprint !== 'undefined') {
                    Object.entries(USMLEBlueprint.domains).forEach(([domainId, domain]) => {
                        Object.values(domain.subdomains || {}).forEach(subdomain => {
                            subdomain.topics?.forEach(topic => {
                                const topicPath = `${domainId}.${subdomain.id}.${topic.id}`;
                                const mastery = this.progress[topicPath] || 0;
                                
                                if (mastery < 2 && topic.highYield) {
                                    this.gaps.push({
                                        topicPath,
                                        topicName: topic.name,
                                        domain: domain.name,
                                        mastery
                                    });
                                }
                            });
                        });
                    });
                }
            },
            
            renderOverview() {
                this.currentView = 'overview';
                document.getElementById('overview-view').classList.remove('hidden');
                document.getElementById('domain-view').classList.add('hidden');
                document.getElementById('topic-view').classList.add('hidden');
                document.getElementById('back-btn').classList.add('hidden');
                document.getElementById('breadcrumb').innerHTML = '<span>Step 1</span>';
                
                const grid = document.getElementById('domains-grid');
                
                if (typeof USMLEBlueprint === 'undefined') {
                    grid.innerHTML = '<p class="col-span-4 text-center text-gray-400">Loading blueprint data...</p>';
                    return;
                }
                
                grid.innerHTML = Object.entries(USMLEBlueprint.domains).map(([id, domain]) => {
                    const topicCount = this.getTopicCount(domain);
                    const masteryPercent = this.getDomainMastery(id, domain);
                    const hasGaps = this.gaps.some(g => g.topicPath.startsWith(id));
                    
                    return `
                        <div class="bg-gray-800 rounded-xl p-6 cursor-pointer domain-card transition-all border border-gray-700 hover:border-gray-500"
                             style="border-left: 4px solid ${domain.color}"
                             onclick="Navigator.openDomain('${id}')">
                            <div class="flex items-start justify-between mb-4">
                                <span class="text-3xl">${domain.icon}</span>
                                ${hasGaps ? '<span class="bg-red-500/20 text-red-400 text-xs px-2 py-1 rounded">Has Gaps</span>' : ''}
                            </div>
                            
                            <h3 class="text-lg font-semibold mb-1">${domain.name}</h3>
                            <p class="text-sm text-gray-400 mb-4">${topicCount} topics</p>
                            
                            <div class="space-y-2">
                                <div class="flex justify-between text-sm">
                                    <span>Mastery</span>
                                    <span>${masteryPercent}%</span>
                                </div>
                                <div class="h-2 bg-gray-700 rounded-full overflow-hidden">
                                    <div class="h-full rounded-full" style="width: ${masteryPercent}%; background-color: ${domain.color}"></div>
                                </div>
                            </div>
                            
                            <div class="mt-4 text-sm text-gray-400">
                                ${Math.round(domain.weight * 100)}% of exam
                            </div>
                        </div>
                    `;
                }).join('');
            },
            
            openDomain(domainId) {
                this.currentView = 'domain';
                this.currentDomain = domainId;
                
                document.getElementById('overview-view').classList.add('hidden');
                document.getElementById('domain-view').classList.remove('hidden');
                document.getElementById('topic-view').classList.add('hidden');
                document.getElementById('back-btn').classList.remove('hidden');
                
                const domain = USMLEBlueprint.domains[domainId];
                
                document.getElementById('breadcrumb').innerHTML = `
                    <span class="cursor-pointer hover:text-white" onclick="Navigator.renderOverview()">Step 1</span>
                    <span class="mx-2">→</span>
                    <span class="text-blue-400">${domain.name}</span>
                `;
                
                document.getElementById('domain-header').innerHTML = `
                    <h2 class="text-2xl font-bold flex items-center gap-3">
                        <span>${domain.icon}</span>
                        ${domain.name}
                    </h2>
                    <p class="text-gray-400">${Math.round(domain.weight * 100)}% of USMLE Step 1</p>
                `;
                
                const container = document.getElementById('subdomains-container');
                container.innerHTML = Object.values(domain.subdomains || {}).map(subdomain => {
                    let topics = subdomain.topics || [];
                    
                    if (this.filters.highYieldOnly) {
                        topics = topics.filter(t => t.highYield);
                    }
                    
                    if (topics.length === 0) return '';
                    
                    return `
                        <div>
                            <h3 class="text-lg font-semibold mb-4 text-gray-300">${subdomain.name}</h3>
                            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                                ${topics.map(topic => {
                                    const topicPath = `${domainId}.${subdomain.id}.${topic.id}`;
                                    const mastery = this.progress[topicPath] || 0;
                                    const color = this.getMasteryColor(mastery);
                                    const hasGap = this.gaps.some(g => g.topicPath === topicPath);
                                    
                                    return `
                                        <div class="topic-node p-3 rounded-lg cursor-pointer ${hasGap ? 'ring-2 ring-red-500/50' : ''}"
                                             style="background-color: ${color}20; border-left: 3px solid ${color}"
                                             onclick="Navigator.openTopic('${topicPath}', '${topic.name}', '${subdomain.name}')">
                                            <div class="flex items-start justify-between">
                                                <span class="text-sm font-medium">${topic.name}</span>
                                                ${topic.highYield ? '<span class="text-xs bg-amber-500/20 text-amber-400 px-1 rounded">HY</span>' : ''}
                                            </div>
                                            ${topic.depth ? `
                                                <div class="mt-2 flex gap-1">
                                                    ${[1,2,3].map(d => `<div class="w-2 h-2 rounded-full ${d <= topic.depth ? 'bg-blue-500' : 'bg-gray-600'}"></div>`).join('')}
                                                </div>
                                            ` : ''}
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                }).join('');
            },
            
            openTopic(topicPath, topicName, subdomainName) {
                this.currentView = 'topic';
                this.currentTopic = topicPath;
                
                document.getElementById('overview-view').classList.add('hidden');
                document.getElementById('domain-view').classList.add('hidden');
                document.getElementById('topic-view').classList.remove('hidden');
                
                const parts = topicPath.split('.');
                const domain = USMLEBlueprint.domains[parts[0]];
                
                document.getElementById('breadcrumb').innerHTML = `
                    <span class="cursor-pointer hover:text-white" onclick="Navigator.renderOverview()">Step 1</span>
                    <span class="mx-2">→</span>
                    <span class="cursor-pointer hover:text-white" onclick="Navigator.openDomain('${parts[0]}')">${domain.name}</span>
                    <span class="mx-2">→</span>
                    <span class="text-green-400">${topicName}</span>
                `;
                
                const mastery = this.progress[topicPath] || 0;
                const connections = this.getConnections(topicPath);
                
                document.getElementById('topic-content').innerHTML = `
                    <div class="bg-gray-800 rounded-xl p-6 mb-6">
                        <div class="flex items-start justify-between">
                            <div>
                                <div class="text-sm text-gray-400 mb-1">${subdomainName}</div>
                                <h2 class="text-2xl font-bold mb-2">${topicName}</h2>
                            </div>
                            <a href="../mechanismx/index.html" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg font-semibold">
                                Learn in MechanismX
                            </a>
                        </div>
                        
                        <div class="mt-6 grid grid-cols-3 gap-4">
                            <div class="bg-gray-700/50 rounded-lg p-4">
                                <div class="text-sm text-gray-400">Mastery Level</div>
                                <div class="text-2xl font-bold">${['Not Started', 'Learning', 'Practiced', 'Mastered'][mastery]}</div>
                            </div>
                            <div class="bg-gray-700/50 rounded-lg p-4">
                                <div class="text-sm text-gray-400">Questions Attempted</div>
                                <div class="text-2xl font-bold">0</div>
                            </div>
                            <div class="bg-gray-700/50 rounded-lg p-4">
                                <div class="text-sm text-gray-400">Connections</div>
                                <div class="text-2xl font-bold">${connections.length}</div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Mastery Buttons -->
                    <div class="bg-gray-800 rounded-xl p-6 mb-6">
                        <h3 class="font-semibold mb-4">Update Your Mastery</h3>
                        <div class="flex gap-3">
                            ${[0, 1, 2, 3].map(level => `
                                <button onclick="Navigator.setMastery('${topicPath}', ${level})"
                                        class="px-4 py-2 rounded-lg ${mastery === level ? 'bg-blue-600' : 'bg-gray-700 hover:bg-gray-600'}">
                                    ${['Not Started', 'Learning', 'Practiced', 'Mastered'][level]}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                    
                    <!-- Connections -->
                    <div class="bg-gray-800 rounded-xl p-6">
                        <h3 class="font-semibold mb-4">Connected Topics</h3>
                        ${connections.length > 0 ? `
                            <div class="space-y-3">
                                ${connections.map(conn => `
                                    <div class="bg-gray-700/50 rounded-lg p-4">
                                        <div class="flex items-center justify-between">
                                            <div>
                                                <div class="font-medium">${conn.relatedTopic}</div>
                                                <div class="text-sm text-gray-400">${conn.type}</div>
                                            </div>
                                            <div class="text-sm text-gray-400">${conn.explanation || ''}</div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        ` : `
                            <p class="text-gray-400">No connections mapped yet for this topic.</p>
                        `}
                    </div>
                `;
            },
            
            setMastery(topicPath, level) {
                this.progress[topicPath] = level;
                this.saveProgress();
                this.detectGaps();
                this.updateStats();
                
                // Re-render current view
                const parts = topicPath.split('.');
                this.openTopic(topicPath, 
                    this.getTopicName(topicPath), 
                    this.getSubdomainName(topicPath));
            },
            
            getConnections(topicPath) {
                if (typeof InterconnectionWeb === 'undefined') return [];
                
                const topicId = topicPath.split('.').pop();
                return (InterconnectionWeb.connections || []).filter(c => 
                    c.from?.topic === topicId || c.to?.topic === topicId
                ).map(c => ({
                    relatedTopic: (c.from?.topic === topicId ? c.to?.topic : c.from?.topic)?.replace(/_/g, ' '),
                    type: c.type,
                    explanation: c.explanation
                }));
            },
            
            getTopicCount(domain) {
                return Object.values(domain.subdomains || {}).reduce(
                    (sum, sub) => sum + (sub.topics?.length || 0), 0
                );
            },
            
            getDomainMastery(domainId, domain) {
                let total = 0;
                let mastered = 0;
                
                Object.values(domain.subdomains || {}).forEach(subdomain => {
                    subdomain.topics?.forEach(topic => {
                        total++;
                        const topicPath = `${domainId}.${subdomain.id}.${topic.id}`;
                        if (this.progress[topicPath] >= 3) mastered++;
                    });
                });
                
                return total > 0 ? Math.round((mastered / total) * 100) : 0;
            },
            
            getMasteryColor(level) {
                const colors = ['#6B7280', '#F59E0B', '#3B82F6', '#10B981'];
                return colors[level] || colors[0];
            },
            
            getTopicName(topicPath) {
                const parts = topicPath.split('.');
                const domain = USMLEBlueprint.domains[parts[0]];
                const subdomain = domain?.subdomains?.[parts[1]];
                const topic = subdomain?.topics?.find(t => t.id === parts[2]);
                return topic?.name || parts[2];
            },
            
            getSubdomainName(topicPath) {
                const parts = topicPath.split('.');
                const domain = USMLEBlueprint.domains[parts[0]];
                const subdomain = domain?.subdomains?.[parts[1]];
                return subdomain?.name || parts[1];
            },
            
            updateStats() {
                // Calculate overall mastery
                let total = 0;
                let masteredCount = 0;
                
                if (typeof USMLEBlueprint !== 'undefined') {
                    Object.entries(USMLEBlueprint.domains).forEach(([domainId, domain]) => {
                        Object.values(domain.subdomains || {}).forEach(subdomain => {
                            subdomain.topics?.forEach(topic => {
                                total++;
                                const topicPath = `${domainId}.${subdomain.id}.${topic.id}`;
                                if (this.progress[topicPath] >= 3) masteredCount++;
                            });
                        });
                    });
                }
                
                const percent = total > 0 ? Math.round((masteredCount / total) * 100) : 0;
                document.getElementById('overall-score').textContent = `${percent}%`;
                document.getElementById('gap-count').textContent = this.gaps.length;
            }
        };
        
        // Global functions
        function goBack() {
            if (Navigator.currentView === 'topic') {
                Navigator.openDomain(Navigator.currentDomain);
            } else if (Navigator.currentView === 'domain') {
                Navigator.renderOverview();
            }
        }
        
        function toggleHighYield() {
            Navigator.filters.highYieldOnly = document.getElementById('high-yield-filter').checked;
            if (Navigator.currentView === 'domain') {
                Navigator.openDomain(Navigator.currentDomain);
            }
        }
        
        function toggleGapsOnly() {
            Navigator.filters.gapsOnly = document.getElementById('gaps-filter').checked;
            // Implement gaps filtering
        }
        
        function toggleStatsPanel() {
            // Could expand to show more stats
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            Navigator.init();
        });
    </script>
</body>
</html>
