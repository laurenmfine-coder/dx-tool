<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TeamDx - Interprofessional Collaboration Training</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #f8fafc; 
            color: #1e293b;
            min-height: 100vh;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 24px; padding-top: 88px; }
        
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            border-radius: 16px;
            margin-bottom: 24px;
            color: #fff;
        }
        .header h1 { font-size: 2rem; margin-bottom: 8px; }
        .header p { opacity: 0.9; }
        
        .scenario-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .scenario-card {
            padding: 24px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .scenario-card:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-color: #8b5cf6;
        }
        .scenario-card h3 { margin-bottom: 8px; color: #1e293b; }
        .scenario-card p { font-size: 0.9rem; color: #64748b; margin-bottom: 12px; }
        .scenario-card .tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .tag {
            font-size: 0.75rem;
            padding: 4px 10px;
            background: #f1f5f9;
            border-radius: 12px;
            color: #475569;
        }
        
        .sim-panel {
            display: none;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .sim-panel.active { display: block; }
        
        .sim-header {
            padding: 20px 24px;
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
            color: #fff;
        }
        .sim-header h2 { font-size: 1.3rem; margin-bottom: 4px; }
        .sim-header .setting { opacity: 0.85; font-size: 0.9rem; }
        
        .patient-context {
            padding: 16px 24px;
            background: #fef3c7;
            border-bottom: 1px solid #fcd34d;
            font-size: 0.9rem;
            color: #92400e;
        }
        .patient-context strong { color: #78350f; }
        
        .team-roster {
            padding: 12px 24px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .team-member {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .team-member.you { background: #8b5cf6; color: #fff; border-color: #8b5cf6; }
        .team-dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-attending { background: #ef4444; }
        .dot-nurse { background: #22c55e; }
        .dot-rt { background: #ec4899; }
        .dot-pharmacy { background: #f59e0b; }
        .dot-social { background: #14b8a6; }
        .dot-student { background: #8b5cf6; }
        
        .chat-container {
            height: 400px;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fafafa;
        }
        
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .message .sender { font-size: 0.75rem; font-weight: 600; margin-bottom: 4px; }
        .message.attending { background: #fee2e2; }
        .message.attending .sender { color: #dc2626; }
        .message.nurse { background: #dcfce7; }
        .message.nurse .sender { color: #16a34a; }
        .message.rt { background: #fce7f3; }
        .message.rt .sender { color: #db2777; }
        .message.pharmacy { background: #fef3c7; }
        .message.pharmacy .sender { color: #d97706; }
        .message.social { background: #ccfbf1; }
        .message.social .sender { color: #0d9488; }
        .message.student {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: #fff;
            align-self: flex-end;
        }
        .message.student .sender { color: rgba(255,255,255,0.8); }
        .message.system {
            background: #f1f5f9;
            align-self: center;
            text-align: center;
            font-size: 0.85rem;
            color: #64748b;
            max-width: 90%;
        }
        .message.ai-feedback {
            background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(109,40,217,0.1));
            border: 1px solid #8b5cf6;
            max-width: 95%;
        }
        .message.ai-feedback .sender { color: #6d28d9; }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #e2e8f0;
            border-radius: 12px;
            width: fit-content;
        }
        .typing-indicator span {
            width: 8px; height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .input-area {
            padding: 20px 24px;
            border-top: 1px solid #e2e8f0;
            background: #fff;
        }
        .input-prompt { font-size: 0.9rem; color: #475569; margin-bottom: 12px; font-weight: 500; }
        .input-wrapper { display: flex; gap: 12px; }
        .response-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            resize: none;
            min-height: 80px;
            font-family: inherit;
        }
        .response-input:focus { outline: none; border-color: #8b5cf6; }
        .response-input::placeholder { color: #94a3b8; }
        
        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            color: #fff;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(139,92,246,0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary { background: #f1f5f9; color: #475569; }
        .btn-secondary:hover { background: #e2e8f0; }
        
        .resources-panel {
            margin-top: 24px;
            padding: 20px 24px;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .resources-panel h3 { font-size: 1rem; color: #475569; margin-bottom: 16px; }
        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 12px;
        }
        .resource-item {
            padding: 14px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
        }
        .resource-item:hover { border-color: #8b5cf6; background: rgba(139,92,246,0.05); }
        .resource-item .title { font-weight: 600; font-size: 0.9rem; color: #1e293b; margin-bottom: 4px; }
        .resource-item .source { font-size: 0.75rem; color: #64748b; }
        .resource-item .type {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 8px;
            background: #e2e8f0;
            border-radius: 10px;
            color: #475569;
            margin-top: 8px;
        }
        
        .summary-panel {
            display: none;
            margin-top: 24px;
            padding: 24px;
            background: #fff;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
        }
        .summary-panel.visible { display: block; }
        .summary-panel h3 { color: #6d28d9; margin-bottom: 20px; }
        .feedback-summary {
            padding: 20px;
            background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(109,40,217,0.05));
            border-radius: 12px;
            border-left: 4px solid #8b5cf6;
        }
        .feedback-summary h4 { color: #6d28d9; margin-bottom: 12px; }
        .feedback-summary p { color: #475569; line-height: 1.7; }
        .actions { display: flex; gap: 12px; margin-top: 20px; }
        
        @media (max-width: 640px) {
            .input-wrapper { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
<script src="../dx-user-bar.js" defer></script>
</head>
<body>
    <script src="/dx-universal-nav.js"></script>
    
    <div class="container">
        <div class="header">
            <h1>👥 TeamDx</h1>
            <p>AI-Powered Interprofessional Collaboration Training</p>
        </div>
        
        <div class="scenario-grid" id="scenarioGrid"></div>
        
        <div class="sim-panel" id="simPanel">
            <div class="sim-header">
                <h2 id="simTitle"></h2>
                <div class="setting" id="simSetting"></div>
            </div>
            <div class="patient-context" id="patientContext"></div>
            <div class="team-roster" id="teamRoster"></div>
            <div class="chat-container" id="chatContainer"></div>
            <div class="input-area" id="inputArea">
                <div class="input-prompt" id="inputPrompt">How do you respond?</div>
                <div class="input-wrapper">
                    <textarea class="response-input" id="responseInput" placeholder="Type your response... Be specific about what you would say or do."></textarea>
                    <button class="btn btn-primary" id="submitBtn" onclick="submitResponse()">Send</button>
                </div>
            </div>
        </div>
        
        <div class="resources-panel" id="resourcesPanel" style="display: none;">
            <h3>📚 Learning Resources</h3>
            <div class="resource-grid" id="resourceGrid"></div>
        </div>
        
        <div class="summary-panel" id="summaryPanel"></div>
        
        <div style="margin-top: 24px; text-align: center;" id="backBtn" style="display: none;">
            <button class="btn btn-secondary" onclick="backToScenarios()">← Back to Scenarios</button>
        </div>
    </div>
    
    <script>
        const SCENARIOS = [
            {
                id: 'icu-rounds',
                title: 'ICU Multidisciplinary Rounds',
                description: 'Present your patient and coordinate care with the ICU team.',
                tags: ['Communication', 'Presentation', 'Care Coordination'],
                setting: 'Medical ICU - Morning Rounds',
                patient: {
                    name: 'Mr. Johnson',
                    summary: '67M with COPD exacerbation, intubated 2 days ago. FiO2 60%, PEEP 8. Improving but not ready for extubation.',
                    details: 'PMH: COPD (FEV1 45%), HTN, T2DM. Day 2 of intubation, weaning parameters improving but not meeting SBT criteria. Family asking about prognosis.'
                },
                team: [
                    { role: 'Attending', abbrev: 'Dr. Martinez', class: 'attending' },
                    { role: 'You', abbrev: 'You', class: 'student' },
                    { role: 'ICU Nurse', abbrev: 'Sarah, RN', class: 'nurse' },
                    { role: 'RT', abbrev: 'Mike, RT', class: 'rt' },
                    { role: 'Pharmacist', abbrev: 'Dr. Patel', class: 'pharmacy' },
                    { role: 'Social Work', abbrev: 'Lisa, LCSW', class: 'social' }
                ],
                initialMessages: [
                    { from: 'Dr. Martinez', class: 'attending', text: "Good morning. Let's start with Mr. Johnson in bed 4. Who's presenting?" },
                    { from: 'System', class: 'system', text: "You are the medical student assigned to present this patient." }
                ],
                exchanges: [
                    { context: 'initial_presentation', prompt: 'Present Mr. Johnson to the team.',
                      teamResponse: { from: 'Mike, RT', class: 'rt', text: "His secretions are thick - we're suctioning frequently. Cough is weak. I don't think he's ready for an SBT today." }},
                    { context: 'rt_assessment', prompt: 'How do you respond to the RT\'s assessment?',
                      teamResponse: { from: 'Sarah, RN', class: 'nurse', text: "The family called - they're frustrated no one has updated them. His wife is coming at 2pm with questions." }},
                    { context: 'family_communication', prompt: 'How do you address the family communication concern?',
                      teamResponse: { from: 'Dr. Patel', class: 'pharmacy', text: "He's been on empiric vancomycin for 5 days, cultures negative. Should we discuss de-escalation?" }},
                    { context: 'antibiotic_stewardship', prompt: 'How do you respond to the antibiotic stewardship question?',
                      teamResponse: { from: 'Lisa, LCSW', class: 'social', text: "His wife is exhausted as his caregiver. She doesn't think she can manage more support needs at discharge." }},
                    { context: 'discharge_planning', prompt: 'How do you integrate this into the care plan?',
                      teamResponse: { from: 'Dr. Martinez', class: 'attending', text: "Good discussion. Let me summarize our plan..." }}
                ],
                resources: [
                    { title: 'ICU Liberation Bundle (ABCDEF)', source: 'SCCM', url: 'https://www.sccm.org/ICULiberation/Home', type: 'Guideline' },
                    { title: 'TeamSTEPPS Communication', source: 'AHRQ', url: 'https://www.ahrq.gov/teamstepps/index.html', type: 'Framework' },
                    { title: 'Antibiotic Stewardship', source: 'IDSA', url: 'https://www.idsociety.org/practice-guideline/antimicrobial-stewardship/', type: 'Guideline' }
                ]
            },
            {
                id: 'rapid-response',
                title: 'Rapid Response Team',
                description: 'Lead the response to a decompensating patient on the floor.',
                tags: ['Emergency', 'Leadership', 'SBAR'],
                setting: 'Medical Floor - Acute Decompensation',
                patient: {
                    name: 'Mrs. Chen',
                    summary: '72F admitted for CHF exacerbation. Acutely short of breath, O2 sat 82% on 4L NC.',
                    details: 'PMH: HFrEF (EF 25%), AFib on anticoagulation, CKD 3. Was improving on IV diuresis, was on 2L NC this morning.'
                },
                team: [
                    { role: 'You (Intern)', abbrev: 'You', class: 'student' },
                    { role: 'Floor Nurse', abbrev: 'Jenny, RN', class: 'nurse' },
                    { role: 'RT', abbrev: 'Carlos, RT', class: 'rt' },
                    { role: 'Senior Resident', abbrev: 'Dr. Kim', class: 'attending' }
                ],
                initialMessages: [
                    { from: 'Jenny, RN', class: 'nurse', text: "She was fine 30 minutes ago! Now she's gasping, sat 82% and dropping. What do we do?!" }
                ],
                exchanges: [
                    { context: 'initial_response', prompt: 'What is your immediate response?',
                      teamResponse: { from: 'Carlos, RT', class: 'rt', text: "Got her on 15L NRB, sat 88%. Lungs are wet bilaterally. Want me to set up BiPAP?" }},
                    { context: 'bipap_decision', prompt: 'How do you respond to the RT?',
                      teamResponse: { from: 'Dr. Kim', class: 'attending', text: "I'm here. Give me the quick rundown." }},
                    { context: 'senior_handoff', prompt: 'Update the senior resident using SBAR.',
                      teamResponse: { from: 'Jenny, RN', class: 'nurse', text: "BiPAP on, she's at 92%. BP 168/95, HR 110. What meds do you want?" }},
                    { context: 'treatment_orders', prompt: 'What treatments do you want to order?',
                      teamResponse: { from: 'Dr. Kim', class: 'attending', text: "Good work. Let's get CXR, BNP, troponin, BMP. What caused this decompensation?" }}
                ],
                resources: [
                    { title: 'SBAR Communication', source: 'IHI', url: 'https://www.ihi.org/resources/Pages/Tools/SBARToolkit.aspx', type: 'Tool' },
                    { title: 'Acute Heart Failure', source: 'ACC/AHA', url: 'https://www.acc.org/guidelines/hf', type: 'Guideline' },
                    { title: 'Rapid Response Systems', source: 'AHRQ', url: 'https://psnet.ahrq.gov/primer/rapid-response-systems', type: 'Review' }
                ]
            },
            {
                id: 'handoff',
                title: 'End-of-Shift Handoff',
                description: 'Practice structured patient handoff using I-PASS.',
                tags: ['Handoff', 'Patient Safety', 'I-PASS'],
                setting: 'Team Room - 7pm Signout',
                patient: {
                    name: 'Mr. Davis',
                    summary: '58M with new AFib with RVR on diltiazem drip. AKI with K+ 5.8 (gave kayexalate). Repeat K pending.',
                    details: 'Complex patient requiring close monitoring overnight. Family anxious and calling frequently.'
                },
                team: [
                    { role: 'You (Day Intern)', abbrev: 'You', class: 'student' },
                    { role: 'Night Intern', abbrev: 'Dr. Thompson', class: 'attending' },
                    { role: 'Night Senior', abbrev: 'Dr. Okonkwo', class: 'attending' }
                ],
                initialMessages: [
                    { from: 'Dr. Thompson', class: 'attending', text: "Ready for signout. I heard you have a sick one?" }
                ],
                exchanges: [
                    { context: 'handoff_start', prompt: 'Begin your handoff for Mr. Davis.',
                      teamResponse: { from: 'Dr. Thompson', class: 'attending', text: "Got it. What's the plan overnight? What do I need to watch for?" }},
                    { context: 'action_items', prompt: 'What are the action items and contingency plans?',
                      teamResponse: { from: 'Dr. Okonkwo', class: 'attending', text: "What's his code status? Does family know how sick he is?" }},
                    { context: 'goals_of_care', prompt: 'Address the code status and family communication question.',
                      teamResponse: { from: 'Dr. Thompson', class: 'attending', text: "I think I have what I need. Anything you'd do differently overnight?" }}
                ],
                resources: [
                    { title: 'I-PASS Handoff Bundle', source: 'I-PASS Study', url: 'https://www.ipasshandoffstudy.com/', type: 'Framework' },
                    { title: 'Handoffs and Signouts', source: 'AHRQ', url: 'https://psnet.ahrq.gov/primer/handoffs-and-signouts', type: 'Review' }
                ]
            }
        ];
        
        let currentScenario = null;
        let currentExchangeIndex = 0;
        let conversationHistory = [];
        
        function init() {
            document.getElementById('scenarioGrid').innerHTML = SCENARIOS.map(s => `
                <div class="scenario-card" onclick="loadScenario('${s.id}')">
                    <h3>${s.title}</h3>
                    <p>${s.description}</p>
                    <div class="tags">${s.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                </div>
            `).join('');
        }
        
        function loadScenario(id) {
            currentScenario = SCENARIOS.find(s => s.id === id);
            currentExchangeIndex = 0;
            conversationHistory = [];
            
            document.getElementById('scenarioGrid').style.display = 'none';
            document.getElementById('simPanel').classList.add('active');
            document.getElementById('backBtn').style.display = 'block';
            document.getElementById('simTitle').textContent = currentScenario.title;
            document.getElementById('simSetting').textContent = currentScenario.setting;
            document.getElementById('patientContext').innerHTML = `<strong>${currentScenario.patient.name}:</strong> ${currentScenario.patient.summary}`;
            document.getElementById('teamRoster').innerHTML = currentScenario.team.map(t => `
                <div class="team-member ${t.class === 'student' ? 'you' : ''}">
                    <span class="team-dot dot-${t.class}"></span>${t.abbrev}
                </div>
            `).join('');
            
            document.getElementById('resourcesPanel').style.display = 'block';
            document.getElementById('resourceGrid').innerHTML = currentScenario.resources.map(r => `
                <a href="${r.url}" target="_blank" class="resource-item">
                    <div class="title">${r.title}</div>
                    <div class="source">${r.source}</div>
                    <span class="type">${r.type}</span>
                </a>
            `).join('');
            
            const chat = document.getElementById('chatContainer');
            chat.innerHTML = '';
            currentScenario.initialMessages.forEach(m => addMessage(m.from, m.class, m.text));
            document.getElementById('inputPrompt').textContent = currentScenario.exchanges[0].prompt;
            document.getElementById('summaryPanel').classList.remove('visible');
            document.getElementById('inputArea').style.display = 'block';
        }
        
        function addMessage(from, cls, text) {
            const chat = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = `message ${cls}`;
            div.innerHTML = `<div class="sender">${from}</div><div>${text}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }
        
        async function submitResponse() {
            const input = document.getElementById('responseInput');
            const text = input.value.trim();
            if (!text) return;
            
            input.disabled = true;
            document.getElementById('submitBtn').disabled = true;
            addMessage('You', 'student', text);
            conversationHistory.push(text);
            input.value = '';
            
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.id = 'typing';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            document.getElementById('chatContainer').appendChild(indicator);
            
            try {
                const exchange = currentScenario.exchanges[currentExchangeIndex];
                const feedback = await getAIFeedback(text, exchange.context);
                document.getElementById('typing')?.remove();
                addMessage('🤖 Feedback', 'ai-feedback', feedback);
                
                if (exchange.teamResponse) {
                    setTimeout(() => {
                        addMessage(exchange.teamResponse.from, exchange.teamResponse.class, exchange.teamResponse.text);
                        currentExchangeIndex++;
                        if (currentExchangeIndex < currentScenario.exchanges.length) {
                            document.getElementById('inputPrompt').textContent = currentScenario.exchanges[currentExchangeIndex].prompt;
                        } else {
                            completeScenario();
                        }
                    }, 1200);
                }
            } catch (e) {
                document.getElementById('typing')?.remove();
                const exchange = currentScenario.exchanges[currentExchangeIndex];
                if (exchange.teamResponse) addMessage(exchange.teamResponse.from, exchange.teamResponse.class, exchange.teamResponse.text);
                currentExchangeIndex++;
                if (currentExchangeIndex >= currentScenario.exchanges.length) completeScenario();
                else document.getElementById('inputPrompt').textContent = currentScenario.exchanges[currentExchangeIndex].prompt;
            }
            
            input.disabled = false;
            document.getElementById('submitBtn').disabled = false;
            input.focus();
        }
        
        const WORKER_URL = 'https://teamdx-feedback.laurenmfine.workers.dev';
        
        async function getAIFeedback(response, context) {
            const r = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    studentResponse: response,
                    context: context,
                    scenarioTitle: currentScenario.title,
                    patientInfo: currentScenario.patient.details,
                    requestType: 'feedback'
                })
            });
            const data = await r.json();
            return data.feedback || 'Good effort. Consider how to make your communication more effective.';
        }
        
        async function completeScenario() {
            document.getElementById('inputArea').style.display = 'none';
            try {
                const r = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        scenarioTitle: currentScenario.title,
                        conversationHistory: conversationHistory,
                        requestType: 'summary'
                    })
                });
                const data = await r.json();
                const summary = data.feedback || 'Good work completing this scenario.';
                document.getElementById('summaryPanel').innerHTML = `
                    <h3>📊 Session Summary</h3>
                    <div class="feedback-summary"><h4>💡 Overall Feedback</h4><p>${summary}</p></div>
                    <div class="actions">
                        <button class="btn btn-secondary" onclick="loadScenario('${currentScenario.id}')">Try Again</button>
                        <button class="btn btn-primary" onclick="backToScenarios()">More Scenarios</button>
                    </div>`;
            } catch (e) {
                document.getElementById('summaryPanel').innerHTML = `
                    <h3>📊 Session Complete</h3>
                    <p>Great work! Review the resources to strengthen your skills.</p>
                    <div class="actions">
                        <button class="btn btn-secondary" onclick="loadScenario('${currentScenario.id}')">Try Again</button>
                        <button class="btn btn-primary" onclick="backToScenarios()">More Scenarios</button>
                    </div>`;
            }
            document.getElementById('summaryPanel').classList.add('visible');
        }
        
        function backToScenarios() {
            document.getElementById('simPanel').classList.remove('active');
            document.getElementById('scenarioGrid').style.display = 'grid';
            document.getElementById('resourcesPanel').style.display = 'none';
            document.getElementById('summaryPanel').classList.remove('visible');
            document.getElementById('backBtn').style.display = 'none';
        }
        
        document.getElementById('responseInput').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitResponse(); }
        });
        
        init();
    </script>
