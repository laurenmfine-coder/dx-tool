<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Overlay Test</title>
<style>
.loading-overlay{
  position:fixed;
  top:0;
  right:0;
  bottom:0;
  left:0;
  background:linear-gradient(135deg,#0a1929 0%,#0d2b3e 100%);
  z-index:9999;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:24px
}
.loading-spinner{
  width:60px;
  height:60px;
  border:4px solid rgba(40,116,166,0.2);
  border-top-color:#2874A6;
  border-radius:50%;
  animation:spin 0.8s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#fff;font-size:18px;font-weight:600}
.loading-subtext{color:rgba(255,255,255,0.6);font-size:14px;max-width:400px;text-align:center;line-height:1.6}
.loading-overlay.fade-out{opacity:0;transition:opacity 0.3s ease-out;pointer-events:none}
</style>
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading your case...</div>
  <div class="loading-subtext">Preparing the patient, reviewing the chart, and setting up the simulation</div>
</div>

<div style="padding:40px;font-family:sans-serif">
  <h1>Loading Overlay Test</h1>
  <p>If you can read this, the overlay is NOT working.</p>
  <p>You should see a full-screen dark blue overlay with a spinner.</p>
  <button onclick="hideOverlay()">Hide Overlay</button>
</div>

<script>
// Hide overlay after 2 seconds
setTimeout(function() {
  hideOverlay();
}, 2000);

function hideOverlay() {
  var overlay = document.getElementById('loadingOverlay');
  if (overlay) {
    overlay.classList.add('fade-out');
    setTimeout(function() { 
      overlay.style.display = 'none'; 
    }, 300);
  }
}
</script>

</body>
</html>
