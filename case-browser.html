<!DOCTYPE html>
<html lang="en">
<head>
<script src="/js/rdx-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onload="if(window.RDXSupabaseInit)RDXSupabaseInit()"></script>
<script src="/js/rdx-supabase.js"></script>
<script src="/js/rdx-analytics-tracker.js"></script>
<script src="/js/rdx-mobile-gate.js"></script>
<script src="/js/rdx-data-consent.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReasonDx — Case Browser</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="description" content="Browse 394 clinical reasoning cases by chief complaint and specialty. No diagnosis spoilers — find what your patient presents with, figure out the rest.">
<script src="js/nav-global.js"></script>
<script src="emr-data/crt-index.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700&display=swap');
  :root {
    --bg:#F8FAFC;--surface:#FFFFFF;--border:#E2E8F0;
    --text:#1E293B;--text-s:#64748B;--text-m:#94A3B8;
    --primary:#2874A6;--primary-l:#EBF5FB;--primary-d:#1B4F72;
    --danger:#DC2626;--success:#059669;--purple:#7C3AED;
    --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.06);
    --shadow-lg:0 10px 25px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);padding-top:52px}

  .hero{background:linear-gradient(135deg,#0d2b3e,#1B4F72 50%,#2874A6);padding:40px 24px 32px;text-align:center;position:relative;overflow:hidden}
  .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 50%,rgba(133,193,233,.1) 0%,transparent 60%)}
  .hero h1{font-size:1.8rem;font-weight:700;color:#fff;position:relative;z-index:1;letter-spacing:-.02em}
  .hero p{font-size:.92rem;color:rgba(255,255,255,.65);margin-top:6px;position:relative;z-index:1}
  .hero-stats{display:flex;gap:28px;justify-content:center;margin-top:16px;position:relative;z-index:1}
  .hero-stat-num{font-size:1.3rem;font-weight:700;color:#85C1E9}
  .hero-stat-label{font-size:.68rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.8px}

  .container{max-width:1200px;margin:0 auto;padding:20px}

  .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:18px;box-shadow:var(--shadow)}
  .search{flex:1;min-width:200px;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;font-family:inherit;outline:none;transition:border .15s}
  .search:focus{border-color:var(--primary)}
  .fbtn{padding:6px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);font-size:.78rem;font-weight:600;color:var(--text-s);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
  .fbtn:hover{border-color:var(--primary);color:var(--primary)}
  .fbtn.on{background:var(--primary);border-color:var(--primary);color:#fff}

  .section-title{font-size:.75rem;font-weight:700;color:var(--text-m);text-transform:uppercase;letter-spacing:.8px;margin:6px 0 10px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
  .grid-sm{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}

  .card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:all .18s;position:relative}
  .card:hover{border-color:var(--primary);box-shadow:var(--shadow-lg);transform:translateY(-1px)}
  .card-featured{border-left:3px solid var(--purple)}

  .card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
  .card-acuity{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0}
  .esi1{background:#FEF2F2;color:#DC2626}
  .esi2{background:#FFF7ED;color:#EA580C}
  .esi3{background:#FEF9C3;color:#A16207}
  .esi4{background:#ECFDF5;color:#059669}
  .card-cc{font-size:.95rem;font-weight:700;color:var(--text);line-height:1.3}
  .card-pres{font-size:.78rem;color:var(--text-s);margin-top:2px}
  .card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
  .tag{font-size:.65rem;font-weight:600;padding:2px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px}
  .tag-cat{background:var(--primary-l);color:var(--primary-d)}
  .tag-study{background:#F5F3FF;color:var(--purple)}

  .count{font-size:.8rem;color:var(--text-m);margin-bottom:12px}
  .empty{text-align:center;padding:48px;color:var(--text-m);font-size:.88rem}

  @media(max-width:640px){.grid,.grid-sm{grid-template-columns:1fr}.filters{flex-direction:column}.search{min-width:auto}.hero-stats{gap:16px}}
</style>
</head>
<body>

<div class="hero">
  <h1>Clinical Simulations</h1>
  <p>Select a case to run a full patient encounter</p>
  <div class="hero-stats">
    <div style="text-align:center"><div class="hero-stat-num" id="sTotal">0</div><div class="hero-stat-label">Cases</div></div>
    <div style="text-align:center"><div class="hero-stat-num" id="sCats">0</div><div class="hero-stat-label">Specialties</div></div>
    <div style="text-align:center"><div class="hero-stat-num" id="sStudy">5</div><div class="hero-stat-label">Featured</div></div>
  </div>
</div>

<div class="container">
  <div class="filters">
    <input type="text" class="search" id="searchInput" placeholder="Search by chief complaint or specialty..." oninput="filter()">
    <button class="fbtn on" data-cat="all" onclick="setCat('all')">All</button>
    <button class="fbtn" data-cat="cardiovascular" onclick="setCat('cardiovascular')">Cardio</button>
    <button class="fbtn" data-cat="pulmonary" onclick="setCat('pulmonary')">Pulm</button>
    <button class="fbtn" data-cat="neurologic" onclick="setCat('neurologic')">Neuro</button>
    <button class="fbtn" data-cat="infectious" onclick="setCat('infectious')">ID</button>
    <button class="fbtn" data-cat="gastrointestinal" onclick="setCat('gastrointestinal')">GI</button>
    <button class="fbtn" data-cat="allergy" onclick="setCat('allergy')">Allergy</button>
    <button class="fbtn" data-cat="endocrine" onclick="setCat('endocrine')">Endo</button>
    <button class="fbtn" data-cat="toxicologic" onclick="setCat('toxicologic')">Tox</button>
  </div>

  <div id="featuredSection">
    <div class="section-title">Featured Cases</div>
    <div class="grid" id="featuredGrid"></div>
    <div style="height:20px"></div>
  </div>

  <div class="count" id="caseCount"></div>
  <div class="grid grid-sm" id="caseGrid"></div>
  <div class="empty" id="emptyState" style="display:none">No cases match your search.</div>
</div>

<script>
var ALL = [], activeCat = 'all';

// Featured cases — show CHIEF COMPLAINT, not diagnosis
var FEATURED = [
  {id:'DYS-001',cc:'Progressive dyspnea',pres:'6-week worsening SOB with dry cough',cat:'pulmonary',acuity:2,featured:true},
  {id:'DYS-002',cc:'Dyspnea, cough, fever',pres:'10-day progressive respiratory symptoms in a young adult',cat:'pulmonary',acuity:2,featured:true},
  {id:'COUGH-001',cc:'Productive cough, hemoptysis',pres:'3-month cough with blood-streaked sputum and weight loss',cat:'pulmonary',acuity:2,featured:true},
  {id:'CHEST-001',cc:'Chest pain',pres:'Acute onset substernal chest pain in a young adult',cat:'cardiovascular',acuity:1,featured:true},
  {id:'FEVER-001',cc:'Fever, dyspnea',pres:'Progressive fever and shortness of breath with oral findings',cat:'infectious',acuity:2,featured:true}
];

function normCat(c) {
  c=(c||'other').toLowerCase().replace(/_/g,' ');
  var map={cardiology:'cardiovascular',cardiac:'cardiovascular',cardiorenal:'cardiovascular',
    neurology:'neurologic',neurological:'neurologic',toxicology:'toxicologic',
    hematology:'hematologic','allergy immunology':'allergy',immunologic:'allergy',
    gi:'gastrointestinal',surgery:'surgical',surgical:'surgical',respiratory:'pulmonary',
    ophthalmologic:'ophthalmic',vascular:'cardiovascular'};
  return map[c]||c;
}

function init() {
  if (window.CRT_INDEX) {
    Object.entries(window.CRT_INDEX).forEach(function(e) {
      var id=e[0],c=e[1];
      var cc = (c.chiefComplaint||'').split('/')[0].trim();
      ALL.push({
        id:id, cc:cc,
        searchText:(c.chiefComplaint||'').toLowerCase(),
        cat:normCat(c.category), acuity:c.acuity||3, featured:false
      });
    });
  }
  var cats=new Set(ALL.map(function(c){return c.cat;}));
  FEATURED.forEach(function(f){cats.add(f.cat);});
  document.getElementById('sTotal').textContent=ALL.length+FEATURED.length;
  document.getElementById('sCats').textContent=cats.size;
  renderFeatured();
  filter();
}

function renderFeatured() {
  document.getElementById('featuredGrid').innerHTML=FEATURED.map(function(c){return renderCard(c);}).join('');
}

function renderCard(c) {
  var acLabel='ESI '+(c.acuity||3);
  var catLabel=(c.cat||'').charAt(0).toUpperCase()+(c.cat||'').slice(1);
  var h='<div class="card'+(c.featured?' card-featured':'')+'" onclick="launch(\''+c.id+'\')">';
  h+='<div class="card-top">';
  h+='<div class="card-acuity esi'+(c.acuity||3)+'">'+acLabel+'</div>';
  h+='<div><div class="card-cc">'+esc(c.cc)+'</div>';
  if(c.pres) h+='<div class="card-pres">'+esc(c.pres)+'</div>';
  h+='</div></div>';
  h+='<div class="card-tags">';
  h+='<span class="tag tag-cat">'+esc(catLabel)+'</span>';
  if(c.featured) h+='<span class="tag tag-study">Featured</span>';
  h+='</div></div>';
  return h;
}

function filter() {
  var q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  var filtered=ALL.filter(function(c){
    if(activeCat!=='all'&&c.cat!==activeCat) return false;
    if(q) return (c.searchText||c.cc.toLowerCase()).includes(q)||c.cat.includes(q);
    return true;
  });
  filtered.sort(function(a,b){return a.acuity!==b.acuity?a.acuity-b.acuity:a.cc.localeCompare(b.cc);});

  // Featured section
  var fEl=document.getElementById('featuredSection');
  if(activeCat!=='all'||q){
    var fFiltered=FEATURED.filter(function(c){
      if(activeCat!=='all'&&c.cat!==activeCat) return false;
      if(q) return (c.cc+' '+c.cat+(c.pres||'')).toLowerCase().includes(q);
      return true;
    });
    if(fFiltered.length>0){
      fEl.style.display='block';
      document.getElementById('featuredGrid').innerHTML=fFiltered.map(function(c){return renderCard(c);}).join('');
    } else fEl.style.display='none';
  } else {fEl.style.display='block';renderFeatured();}

  document.getElementById('caseCount').textContent=filtered.length+' case'+(filtered.length!==1?'s':'');
  document.getElementById('caseGrid').innerHTML=filtered.map(function(c){return renderCard(c);}).join('');
  document.getElementById('emptyState').style.display=filtered.length===0?'block':'none';
}

function setCat(cat){
  activeCat=cat;
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.toggle('on',b.dataset.cat===cat);});
  filter();
}

function launch(id){window.location.href='virtual-emr.html?case='+encodeURIComponent(id);}
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();
</script>
</body>
</html>
