<!DOCTYPE html>
<html lang="en">
<head>
<meta name="theme-color" content="#0f766e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="stylesheet" href="mobile.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script>(function(){var AUTH_KEY="reasondx-user";function getAuthPath(){var d=(location.pathname.match(/\//g)||[]).length-1,p="";for(var i=0;i<d;i++)p+="../";return p+"auth/login.html"}function isAuth(){try{var u=localStorage.getItem(AUTH_KEY);if(u){var j=JSON.parse(u);return j&&j.email&&j.name}}catch(e){}return false}if(!isAuth()){sessionStorage.setItem("reasondx-redirect",location.href);location.replace(getAuthPath())}})();</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Board Prep Coverage | ReasonDx</title>

<style>
:root{--bg:var(--rdx-bg);--bg2:#1e293b;--card:var(--rdx-bg-card);--border:var(--rdx-border);--text:var(--rdx-text);--text2:#cbd5e1;--muted:var(--rdx-text-muted);--accent:#14b8a6;--accent-light:rgba(59,130,246,.15);--success:#22c55e;--success-light:rgba(34,197,94,.15);--warning:#f59e0b;--warning-light:rgba(245,158,11,.15);--danger:#ef4444;--danger-light:rgba(239,68,68,.15);--purple:#8b5cf6;--teal:#14b8a6}
[data-theme="light"]{--bg:#f8fafc;--bg2:#fff;--card:#fff;--border:#e2e8f0;--text:#0f172a;--text2:#334155;--muted:#64748b;--accent:#0d9488;--success:#16a34a;--warning:#d97706;--danger:var(--rdx-danger);--purple:#7c3aed;--teal:#0d9488;--success-light:rgba(22,163,74,.1);--warning-light:rgba(217,119,6,.1);--danger-light:rgba(220,38,38,.1)}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',system-ui,sans-serif;background:var(--rdx-bg);color:var(--rdx-text);min-height:100vh;padding:1.5rem}
.header{text-align:center;margin-bottom:2rem}.header h1{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,var(--teal),var(--success));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.4rem}.header p{color:var(--muted);font-size:.95rem}
.back-link{display:inline-flex;align-items:center;gap:.4rem;color:var(--accent);text-decoration:none;font-size:.9rem;margin-bottom:1.5rem}.back-link:hover{text-decoration:underline}
.overview{max-width:1000px;margin:0 auto 2rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem}
.ov-card{background:var(--rdx-bg-card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;text-align:center}.ov-card .num{font-size:2rem;font-weight:800}.ov-card .label{font-size:.8rem;color:var(--muted);margin-top:.3rem}
.spec-grid{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1rem}
.spec-card{background:var(--rdx-bg-card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;transition:.2s}.spec-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.spec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.spec-name{font-size:1rem;font-weight:700}.spec-pct{font-size:.85rem;font-weight:700}
.bar-bg{background:var(--border);border-radius:6px;height:8px;overflow:hidden;margin-bottom:.8rem}.bar-fill{height:100%;border-radius:6px;transition:width .8s}
.detail-row{display:flex;justify-content:space-between;font-size:.82rem;color:var(--text2);padding:.2rem 0}
.detail-label{color:var(--muted)}
.badge{display:inline-block;padding:.15rem .4rem;border-radius:12px;font-size:.7rem;font-weight:600}
.badge-full{background:var(--success-light);color:var(--success)}.badge-partial{background:var(--warning-light);color:var(--warning)}.badge-low{background:var(--danger-light);color:var(--danger)}
.exam-legend{max-width:1000px;margin:2rem auto 0;background:var(--rdx-bg-card);border:1px solid var(--border);border-radius:12px;padding:1.25rem}
.exam-legend h3{font-size:.85rem;text-transform:uppercase;color:var(--muted);letter-spacing:.05em;margin-bottom:.8rem}
.exam-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.5rem}
.exam-item{display:flex;align-items:center;gap:.4rem;font-size:.85rem;color:var(--text2)}.exam-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style>
<link rel="stylesheet" href="./css/rdx-theme.css">
</head>
<body>
<a href="index.html" class="back-link">← Back to ReasonDx</a>
<div class="header"><h1>🎯 Board Prep Coverage</h1><p>Specialty mastery depth and exam readiness</p></div>
<div class="overview" id="overview"></div>
<div class="spec-grid" id="spec-grid"></div>
<div class="exam-legend"><h3>Exam Relevance Mapping</h3><div class="exam-grid" id="exam-grid"></div></div>
<script>
async function load(){
  const [qb,tm]=await Promise.all([fetch('data/quiz-bank.json').then(r=>r.json()).catch(()=>({questions:[]})),fetch('data/topic-map.json').then(r=>r.json()).catch(()=>({topics:{}}))]);
  const qs=qb.questions||[],topics=tm.topics||{};
  const ta=Object.entries(topics).filter(([k,v])=>typeof v==='object'&&v.displayName);
  const TT=ta.length,TQ=qs.length;
  const tmc={};qs.forEach(q=>{if(q.topicId)tmc[q.topicId]=(tmc[q.topicId]||0)+1});
  
  // Per-specialty stats
  const specs={};
  ta.forEach(([k,v])=>{
    const c=v.category||'Other';
    if(!specs[c])specs[c]={topics:0,qs:0,dd:0,mech:0,adv:0,exam:0,exams:new Set()};
    specs[c].topics++;
    specs[c].qs+=(tmc[k]||0);
    if(v.deepDive||v.deepDiveUrl)specs[c].dd++;
    if(v.mechanism||v.mechanismUrl)specs[c].mech++;
    if(v.adventure)specs[c].adv++;
    if(v.examRelevance&&v.examRelevance.length){specs[c].exam++;v.examRelevance.forEach(e=>specs[c].exams.add(e))}
  });
  
  const entries=Object.entries(specs).sort((a,b)=>b[1].qs-a[1].qs);
  const totalDD=ta.filter(([k,v])=>v.deepDive||v.deepDiveUrl).length;
  const totalMech=ta.filter(([k,v])=>v.mechanism||v.mechanismUrl).length;
  const totalExam=ta.filter(([k,v])=>v.examRelevance&&v.examRelevance.length).length;
  
  document.getElementById('overview').innerHTML=[
    {n:TQ.toLocaleString(),l:'Total MCQs',c:'var(--accent)'},{n:entries.length,l:'Specialties',c:'var(--purple)'},
    {n:totalDD,l:'Deep Dives',c:'var(--teal)'},{n:totalExam,l:'Exam-Tagged Topics',c:'var(--success)'}
  ].map(i=>'<div class="ov-card"><div class="num" style="color:'+i.c+'">'+i.n+'</div><div class="label">'+i.l+'</div></div>').join('');
  
  document.getElementById('spec-grid').innerHTML=entries.map(([name,s])=>{
    const maxScore=s.topics*4; // MCQ(1)+DD(1)+Mech(1)+Exam(1)
    const score=Math.min(s.topics,Math.floor(s.qs/3))+s.dd+s.mech+s.exam;
    const pct=Math.round(score/maxScore*100);
    const color=pct>=80?'var(--success)':pct>=50?'var(--warning)':'var(--danger)';
    const badge=pct>=80?'full':pct>=50?'partial':'low';
    return '<div class="spec-card"><div class="spec-header"><span class="spec-name">'+name+'</span><span class="spec-pct" style="color:'+color+'">'+pct+'%</span></div><div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%;background:'+color+'"></div></div><div class="detail-row"><span class="detail-label">MCQs</span><span>'+s.qs+'</span></div><div class="detail-row"><span class="detail-label">Topics</span><span>'+s.topics+'</span></div><div class="detail-row"><span class="detail-label">Deep Dives</span><span>'+s.dd+'/'+s.topics+'</span></div><div class="detail-row"><span class="detail-label">Mechanism Modules</span><span>'+s.mech+'/'+s.topics+'</span></div><div class="detail-row"><span class="detail-label">Exam-Tagged</span><span><span class="badge badge-'+badge+'">'+s.exam+'/'+s.topics+'</span></span></div></div>';
  }).join('');
  
  // Exam legend
  const allExams=new Set();ta.forEach(([k,v])=>{if(v.examRelevance)v.examRelevance.forEach(e=>allExams.add(e))});
  const examColors={'step1':'#14b8a6','step2':'#8b5cf6','shelf-internal-medicine':'#22c55e','shelf-surgery':'#ef4444','shelf-family-medicine':'#f59e0b','shelf-pediatrics':'#14b8a6','shelf-ob-gyn':'#ec4899','shelf-psychiatry':'#a855f7','shelf-neurology':'#06b6d4','shelf-emergency':'#f97316'};
  const examCounts={};ta.forEach(([k,v])=>{if(v.examRelevance)v.examRelevance.forEach(e=>{examCounts[e]=(examCounts[e]||0)+1})});
  document.getElementById('exam-grid').innerHTML=[...allExams].sort().map(e=>'<div class="exam-item"><div class="exam-dot" style="background:'+(examColors[e]||'var(--muted)')+'"></div>'+e.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase())+' <span style="color:var(--muted)">('+( examCounts[e]||0)+' topics)</span></div>').join('');
}
load();
</script>
<script src="data/rdx-persist.js"></script>
<script src="./js/rdx-nav.js"></script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
</body></html>
