    <style>

            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

        .case-card {
            background: rgba(255,255,255,0.08);

            margin-bottom: 24px;

        .case-header {

        .checkbox-group {

        .checkbox-item:hover { background: rgba(255,255,255,0.1); }

        .checkbox-item.correct { background: rgba(74,222,128,0.2); border-color: #4ade80; }

        }
        .checkbox-item.selected .check-box { background: #f59e0b; border-color: #f59e0b; }
        .checkbox-item.selected .check-box::after { content: "✓"; color: #fff; font-size: 0.7rem; }
        
        .checkbox-text { font-size: 0.9rem; }
        
        .fishbone-diagram {

        .swiss-cheese {

        }
        .error-arrow {
            color: #ef4444;
            font-size: 1.5rem;
        }
        
        .feedback-btn {
            padding: 14px 24px;
            background: linear-gradient(135deg, #f59e0b, #d97706);

        .results-panel {

        .results-panel.visible { display: block; }
        .results-panel h4 { color: #f59e0b; margin-bottom: 12px; }
        
        .improvement-input {

        .colleague-section {

        .colleague-section h4 { color: #a78bfa; margin-bottom: 12px; }
        
        .message-options {

            transition: all 0.2s;
        }
        .message-opt:hover { background: rgba(167,139,250,0.15); }
        .message-opt.selected { background: rgba(167,139,250,0.25); border-color: #a78bfa; }
        .message-opt.best { background: rgba(74,222,128,0.2); border-color: #4ade80; }
        .message-opt.problematic { background: rgba(239,68,68,0.15); border-color: #ef4444; }
        
        .principle-box {
            padding: 16px;
            background: rgba(74,222,128,0.1);
            border: 1px solid rgba(74,222,128,0.3);
            border-radius: 10px;
            margin-top: 16px;
        }
        .principle-box h5 { color: #4ade80; margin-bottom: 8px; }
    </style>

    <div class="container">
        <div class="header">
            <h1>⚠️ SystemsDx</h1>
            <p>Patient Safety, Root Cause Analysis & Just Culture</p>
        </div>
        
        <div class="module-tabs">
            <div class="module-tab active" onclick="showModule('rca')">🔍 Root Cause Analysis</div>
            <div class="module-tab" onclick="showModule('swiss')">🧀 Swiss Cheese Model</div>
            <div class="module-tab" onclick="showModule('feedback')">💬 Giving Feedback</div>
            <div class="module-tab" onclick="showModule('reporting')">📋 Safety Reporting</div>
        </div>
        
        <div id="moduleContent"></div>
    </div>
    
    <script>
        const CASES = {
            rca: {
                title: 'Medication Error Analysis',
                type: 'adverse',
                typeLabel: 'Adverse Event',
                narrative: `A 72-year-old woman with atrial fibrillation was admitted for pneumonia. She was taking warfarin at home. On admission, her INR was 2.8 (therapeutic). On hospital day 3, she received a dose of vitamin K "to reverse her anticoagulation" before a thoracentesis that was ultimately cancelled. No one re-ordered her warfarin afterward. She was discharged on day 5 without warfarin. Two weeks later, she presented with an ischemic stroke. Her INR on readmission was 1.1.`,
                factors: [
                    { category: 'Communication', icon: '💬', items: [
                        { text: 'Warfarin was not included in discharge medication reconciliation', correct: true },
                        { text: 'Night team was not aware warfarin was held', correct: true },
                        { text: 'No verbal handoff about held anticoagulation', correct: true },
                        { text: 'Patient was non-compliant with medications', correct: false }
                    ]},
                    { category: 'Process/Workflow', icon: '⚙️', items: [
                        { text: 'No automatic alert for held high-risk medications', correct: true },
                        { text: 'Discharge checklist did not include anticoagulation review', correct: true },
                        { text: 'Procedure was scheduled without pharmacy review', correct: false },
                        { text: 'Cancelled procedures don\'t trigger medication review', correct: true }
                    ]},
                    { category: 'Environment/Equipment', icon: '🏥', items: [
                        { text: 'EHR did not flag missing home medication', correct: true },
                        { text: 'Pharmacy was understaffed that day', correct: false },
                        { text: 'Paper orders were used instead of electronic', correct: false },
                        { text: 'No clinical decision support for anticoagulation', correct: true }
                    ]},
                    { category: 'Human Factors', icon: '🧠', items: [
                        { text: 'Cognitive overload during busy admission', correct: true },
                        { text: 'Resident was incompetent', correct: false },
                        { text: 'Attending didn\'t double-check the discharge', correct: false },
                        { text: 'Fatigue from long shift affected attention', correct: true }
                    ]}
                ],
                improvements: [
                    'Implement automatic pharmacy review when high-risk medications are held',
                    'Add anticoagulation status to mandatory discharge checklist',
                    'Create EHR alert for home medications not reconciled at discharge',
                    'Require verbal handoff for any held critical medications',
                    'Automatic notification when procedure is cancelled to review related orders'
                ]
            },
            swiss: {
                title: 'Wrong-Site Surgery Near Miss',
                type: 'near-miss',
                typeLabel: 'Near Miss',
                narrative: `A patient was scheduled for right knee arthroscopy. The consent form correctly stated "right knee." However, the OR schedule listed "left knee" due to a transcription error. The patient was prepped and draped for left knee surgery. Just before incision, the circulating nurse noticed the discrepancy between the consent and the surgical site marking. Surgery was paused, the error was caught, and the correct knee was operated on.`,
                layers: [
                    { name: 'Scheduling', hole: true, description: 'Transcription error in OR schedule' },
                    { name: 'Pre-op', hole: true, description: 'Schedule not compared to consent' },
                    { name: 'Site Marking', hole: false, description: 'Surgeon marked correct site' },
                    { name: 'Time-out', hole: true, description: 'Time-out didn\'t catch discrepancy' },
                    { name: 'Final Check', hole: false, description: 'Nurse caught error before incision' }
                ],
                questions: [
                    {
                        q: 'Which defense layer ultimately prevented the error?',
                        options: [
                            { text: 'Pre-operative verification', correct: false },
                            { text: 'Surgical site marking', correct: false },
                            { text: 'Time-out procedure', correct: false },
                            { text: 'Final visual check by circulating nurse', correct: true }
                        ]
                    },
                    {
                        q: 'What does this case demonstrate about the Swiss Cheese model?',
                        options: [
                            { text: 'One perfect defense is enough to prevent errors', correct: false },
                            { text: 'Multiple defense layers provide redundancy; errors occur when holes align', correct: true },
                            { text: 'Human error is inevitable and cannot be prevented', correct: false },
                            { text: 'Checklists are ineffective at preventing errors', correct: false }
                        ]
                    }
                ]
            },
            feedback: {
                title: 'Providing Constructive Feedback',
                scenario: `You\'re a senior resident. You observed that a medical student, Alex, ordered potassium chloride 40 mEq IV push for a patient with mild hypokalemia (K+ 3.3). The nurse caught this before administration—IV push KCl can cause fatal arrhythmias. The patient was unharmed. How do you address this with Alex?`,
                approaches: [
                    {
                        text: '"Alex, that potassium order could have killed the patient. You need to be more careful. I\'m going to have to report this."',
                        quality: 'problematic',
                        feedback: 'This is punitive and shame-based. It will make Alex defensive and less likely to report future errors. It violates Just Culture principles.'
                    },
                    {
                        text: '"Hey Alex, do you have a few minutes? I wanted to talk about the potassium order from earlier. Walk me through your thinking when you wrote it."',
                        quality: 'best',
                        feedback: 'This is non-judgmental, curious, and educational. It creates psychological safety, allows Alex to reflect, and opens dialogue about the knowledge gap.'
                    },
                    {
                        text: '"Don\'t worry about the potassium thing. The nurse caught it. Just be more careful next time."',
                        quality: 'problematic',
                        feedback: 'This misses a learning opportunity. Alex may not understand why it was dangerous. Dismissing near-misses prevents system improvement.'
                    },
                    {
                        text: '"I noticed the potassium order. In the future, remember that IV push KCl is never appropriate—it must be given diluted over at least an hour. Let me know if you want to review electrolyte replacement protocols."',
                        quality: 'good',
                        feedback: 'This is educational and supportive, though it doesn\'t explore Alex\'s reasoning. Still appropriate if time is limited.'
                    }
                ],
                principles: [
                    'Focus on the system and the behavior, not the person',
                    'Create psychological safety so errors are reported, not hidden',
                    'Distinguish between human error, at-risk behavior, and reckless behavior',
                    'Use errors as learning opportunities, not punishment',
                    'Assume good intent—most errors result from system flaws, not negligence'
                ]
            },
            reporting: {
                title: 'Safety Event Reporting',
                scenario: `You\'re an intern. While drawing blood, you accidentally stick yourself with a needle that was just used on a patient with unknown HIV status. You\'re embarrassed and worried about getting in trouble. A colleague suggests just washing it well and not reporting it. What should you do?`,
                options: [
                    {
                        text: 'Report immediately to Employee Health and follow post-exposure protocol',
                        correct: true,
                        feedback: 'Correct. Needlesticks require immediate reporting for your protection. Post-exposure prophylaxis (PEP) is time-sensitive and must be started within hours. Reporting also helps identify system issues (sharps disposal, needle safety devices).'
                    },
                    {
                        text: 'Wash it thoroughly and monitor yourself for symptoms',
                        correct: false,
                        feedback: 'This is dangerous. PEP must be started within 72 hours (ideally within 2 hours) to be effective. Symptoms of HIV seroconversion may not appear for weeks. By then, prevention is impossible.'
                    },
                    {
                        text: 'Ask the patient directly if they have HIV before deciding whether to report',
                        correct: false,
                        feedback: 'The patient\'s self-report is unreliable—they may not know their status or may not disclose. Protocol requires reporting regardless. The patient\'s blood can be tested with consent.'
                    },
                    {
                        text: 'Report it only if you develop symptoms later',
                        correct: false,
                        feedback: 'By the time symptoms appear, the window for PEP has closed. Reporting also isn\'t about blame—it helps the institution identify sharps safety issues.'
                    }
                ],
                whyReport: [
                    'Protects your health through timely intervention',
                    'Identifies system problems (faulty equipment, inadequate training)',
                    'Creates data to drive safety improvements',
                    'Fulfills regulatory and legal requirements',
                    'Contributes to a culture of transparency and learning'
                ]
            }
        };
        
        let currentModule = 'rca';
        let selectedFactors = new Set();
        
        function showModule(mod) {
            currentModule = mod;
            selectedFactors = new Set();
            
            document.querySelectorAll('.module-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            const content = document.getElementById('moduleContent');
            
            if (mod === 'rca') {
                renderRCA();
            } else if (mod === 'swiss') {
                renderSwissCheese();
            } else if (mod === 'feedback') {
                renderFeedback();
            } else if (mod === 'reporting') {
                renderReporting();
            }
        }
        
        function renderRCA() {
            const c = CASES.rca;
            document.getElementById('moduleContent').innerHTML = `
                <div class="case-card">
                    <div class="case-header">
                        <span class="case-type type-${c.type}">${c.typeLabel}</span>
                        <h3>${c.title}</h3>
                    </div>
                    <div class="case-body">
                        <div class="narrative">${c.narrative}</div>
                        
                        <div class="section-title">🔍 Identify Contributing Factors</div>
                        <p style="font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 16px;">
                            Select all factors that contributed to this event (focus on system issues, not individual blame):
                        </p>
                        
                        <div class="analysis-grid">
                            ${c.factors.map((cat, ci) => `
                                <div class="factor-card">
                                    <h4>${cat.icon} ${cat.category}</h4>
                                    <div class="checkbox-group">
                                        ${cat.items.map((item, ii) => `
                                            <div class="checkbox-item" onclick="toggleFactor('${ci}-${ii}')" id="factor-${ci}-${ii}" data-correct="${item.correct}">
                                                <div class="check-box"></div>
                                                <span class="checkbox-text">${item.text}</span>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        
                        <button class="feedback-btn" onclick="checkRCA()">Check Analysis</button>
                        
                        <div class="results-panel" id="rcaResults">
                            <h4>Analysis Results</h4>
                            <div id="rcaFeedback"></div>
                            
                            <div class="section-title" style="margin-top: 24px;">💡 Propose System Improvements</div>
                            <textarea class="improvement-input" id="improvementInput" placeholder="What system changes would you recommend to prevent this from happening again?"></textarea>
                            
                            <button class="feedback-btn" onclick="showImprovements()" style="margin-top: 12px;">See Recommended Improvements</button>
                            
                            <div id="recommendedImprovements" style="display: none; margin-top: 16px;">
                                <h5 style="margin-bottom: 8px;">Recommended System Improvements:</h5>
                                <ul style="margin-left: 20px; font-size: 0.9rem;">
                                    ${c.improvements.map(i => `<li style="margin-bottom: 6px;">${i}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="principle-box">
                    <h5>🎯 Root Cause Analysis Principles</h5>
                    <ul style="margin-left: 20px; font-size: 0.9rem; margin-top: 8px;">
                        <li>Ask "why" 5 times to find root causes, not proximate causes</li>
                        <li>Focus on systems and processes, not individuals</li>
                        <li>Look for latent conditions that enabled active failures</li>
                        <li>Propose solutions that change the system, not just re-train individuals</li>
                    </ul>
                </div>
            `;
        }
        
        function toggleFactor(id) {
            const el = document.getElementById(`factor-${id}`);
            if (selectedFactors.has(id)) {
                selectedFactors.delete(id);
                el.classList.remove('selected');
            } else {
                selectedFactors.add(id);
                el.classList.add('selected');
            }
        }
        
        function checkRCA() {
            const c = CASES.rca;
            let correctSelected = 0;
            let incorrectSelected = 0;
            let missed = 0;
            
            c.factors.forEach((cat, ci) => {
                cat.items.forEach((item, ii) => {
                    const id = `${ci}-${ii}`;
                    const el = document.getElementById(`factor-${id}`);
                    el.classList.remove('correct', 'missed');
                    
                    if (item.correct) {
                        if (selectedFactors.has(id)) {
                            el.classList.add('correct');
                            correctSelected++;
                        } else {
                            el.classList.add('missed');
                            missed++;
                        }
                    } else if (selectedFactors.has(id)) {
                        incorrectSelected++;
                    }
                });
            });
            
            const total = c.factors.reduce((sum, cat) => sum + cat.items.filter(i => i.correct).length, 0);
            const score = Math.round((correctSelected / total) * 100);
            
            document.getElementById('rcaFeedback').innerHTML = `
                <p>You identified <strong>${correctSelected}/${total}</strong> system factors correctly.</p>
                ${incorrectSelected > 0 ? `<p style="color: #fbbf24;">You selected ${incorrectSelected} individual blame factors—remember to focus on systems!</p>` : ''}
                ${score >= 80 ? '<p style="color: #4ade80;">Excellent systems thinking!</p>' : '<p>Review the highlighted items to see what you missed.</p>'}
            `;
            
            document.getElementById('rcaResults').classList.add('visible');
        }
        
        function showImprovements() {
            document.getElementById('recommendedImprovements').style.display = 'block';
        }
        
        function renderSwissCheese() {
            const c = CASES.swiss;
            document.getElementById('moduleContent').innerHTML = `
                <div class="case-card">
                    <div class="case-header">
                        <span class="case-type type-${c.type}">${c.typeLabel}</span>
                        <h3>${c.title}</h3>
                    </div>
                    <div class="case-body">
                        <div class="narrative">${c.narrative}</div>
                        
                        <div class="section-title">🧀 Swiss Cheese Model Visualization</div>
                        <p style="font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-bottom: 12px;">
                            Each slice represents a defense layer. Holes represent weaknesses. Errors occur when holes align.
                        </p>
                        
                        <div class="swiss-cheese">
                            ${c.layers.map((layer, i) => `
                                <div style="text-align: center;">
                                    <div class="cheese-slice" style="background: ${layer.hole ? '#f59e0b' : '#4ade80'};">
                                        ${layer.hole ? '<div class="cheese-hole" style="width: 15px; height: 15px; top: 30%; left: 30%;"></div><div class="cheese-hole" style="width: 10px; height: 10px; top: 60%; left: 50%;"></div>' : ''}
                                    </div>
                                    <div class="cheese-label">${layer.name}</div>
                                </div>
                                ${i < c.layers.length - 1 ? '<span class="error-arrow">→</span>' : ''}
                            `).join('')}
                            <div style="text-align: center; margin-left: 16px;">
                                <div style="font-size: 2rem;">🛑</div>
                                <div class="cheese-label">Error Caught</div>
                            </div>
                        </div>
                        
                        <div style="display: flex; gap: 20px; margin: 16px 0; font-size: 0.85rem;">
                            <div><span style="display: inline-block; width: 16px; height: 16px; background: #f59e0b; border-radius: 3px; vertical-align: middle;"></span> Defense with holes (weakness)</div>
                            <div><span style="display: inline-block; width: 16px; height: 16px; background: #4ade80; border-radius: 3px; vertical-align: middle;"></span> Intact defense</div>
                        </div>
                        
                        <div class="section-title">📝 Analysis Questions</div>
                        ${c.questions.map((q, qi) => `
                            <div style="margin-bottom: 20px;">
                                <p style="font-weight: 600; margin-bottom: 10px;">${q.q}</p>
                                <div class="checkbox-group" id="swissQ${qi}">
                                    ${q.options.map((opt, oi) => `
                                        <div class="checkbox-item" onclick="selectSwissAnswer(${qi}, ${oi})" id="swiss-${qi}-${oi}" data-correct="${opt.correct}">
                                            <div class="check-box"></div>
                                            <span class="checkbox-text">${opt.text}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="principle-box">
                    <h5>🧀 Swiss Cheese Model Key Concepts</h5>
                    <ul style="margin-left: 20px; font-size: 0.9rem; margin-top: 8px;">
                        <li><strong>Defense layers:</strong> Multiple barriers prevent errors from reaching patients</li>
                        <li><strong>Holes:</strong> Weaknesses exist in every layer (human error, equipment failure, process gaps)</li>
                        <li><strong>Alignment:</strong> Errors occur when holes in multiple layers line up</li>
                        <li><strong>Prevention:</strong> Add layers, shrink holes, make holes dynamic (move around)</li>
                    </ul>
                </div>
            `;
        }
        
        function selectSwissAnswer(qi, oi) {
            const c = CASES.swiss;
            const correct = c.questions[qi].options[oi].correct;
            
            document.querySelectorAll(`#swissQ${qi} .checkbox-item`).forEach((el, i) => {
                el.classList.remove('selected', 'correct', 'missed');
                if (i === oi) {
                    el.classList.add(correct ? 'correct' : 'selected');
                }
                if (c.questions[qi].options[i].correct && !correct) {
                    el.classList.add('correct');
                }
            });
        }
        
        function renderFeedback() {
            const c = CASES.feedback;
            document.getElementById('moduleContent').innerHTML = `
                <div class="case-card">
                    <div class="case-header">
                        <h3>${c.title}</h3>
                    </div>
                    <div class="case-body">
                        <div class="narrative">${c.scenario}</div>
                        
                        <div class="section-title">💬 Choose Your Approach</div>
                        <div class="message-options" id="feedbackOptions">
                            ${c.approaches.map((a, i) => `
                                <div class="message-opt" onclick="selectFeedbackApproach(${i})" id="fb-${i}">
                                    "${a.text}"
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="results-panel" id="feedbackResults"></div>
                    </div>
                </div>
                
                <div class="colleague-section">
                    <h4>⚖️ Just Culture Principles</h4>
                    <ul style="margin-left: 20px; font-size: 0.9rem;">
                        ${c.principles.map(p => `<li style="margin-bottom: 6px;">${p}</li>`).join('')}
                    </ul>
                </div>
            `;
        }
        
        function selectFeedbackApproach(i) {
            const c = CASES.feedback;
            const selected = c.approaches[i];
            
            document.querySelectorAll('.message-opt').forEach((el, j) => {
                el.classList.remove('selected', 'best', 'problematic');
                if (j === i) {
                    el.classList.add(selected.quality);
                }
            });
            
            // Show best approach
            const best = c.approaches.find(a => a.quality === 'best');
            const bestIndex = c.approaches.indexOf(best);
            if (bestIndex !== i) {
                document.getElementById(`fb-${bestIndex}`).classList.add('best');
            }
            
            document.getElementById('feedbackResults').innerHTML = `
                <h4>${selected.quality === 'best' ? '✓ Excellent Approach' : selected.quality === 'good' ? '✓ Good Approach' : '⚠️ Consider a Different Approach'}</h4>
                <p style="margin-top: 8px;">${selected.feedback}</p>
            `;
            document.getElementById('feedbackResults').classList.add('visible');
        }
        
        function renderReporting() {
            const c = CASES.reporting;
            document.getElementById('moduleContent').innerHTML = `
                <div class="case-card">
                    <div class="case-header">
                        <h3>${c.title}</h3>
                    </div>
                    <div class="case-body">
                        <div class="narrative">${c.scenario}</div>
                        
                        <div class="section-title">🤔 What Do You Do?</div>
                        <div class="checkbox-group" id="reportingOptions">
                            ${c.options.map((opt, i) => `
                                <div class="checkbox-item" onclick="selectReportingAnswer(${i})" id="rep-${i}" data-correct="${opt.correct}">
                                    <div class="check-box"></div>
                                    <span class="checkbox-text">${opt.text}</span>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="results-panel" id="reportingResults"></div>
                    </div>
                </div>
                
                <div class="principle-box">
                    <h5>📋 Why Report Safety Events?</h5>
                    <ul style="margin-left: 20px; font-size: 0.9rem; margin-top: 8px;">
                        ${c.whyReport.map(w => `<li style="margin-bottom: 6px;">${w}</li>`).join('')}
                    </ul>
                </div>
            `;
        }
        
        function selectReportingAnswer(i) {
            const c = CASES.reporting;
            const selected = c.options[i];
            
            document.querySelectorAll('#reportingOptions .checkbox-item').forEach((el, j) => {
                el.classList.remove('selected', 'correct', 'missed');
                if (j === i) {
                    el.classList.add(selected.correct ? 'correct' : 'selected');
                }
                if (c.options[j].correct && !selected.correct) {
                    el.classList.add('correct');
                }
            });
            
            document.getElementById('reportingResults').innerHTML = `
                <h4>${selected.correct ? '✓ Correct' : '✗ Not the Best Choice'}</h4>
                <p style="margin-top: 8px;">${selected.feedback}</p>
            `;
            document.getElementById('reportingResults').classList.add('visible');
        }
        
        // Initialize
        showModule('rca');
    </script>
