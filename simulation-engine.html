// Post-processing: strip narrative emotes from patient messages
function stripEmotes(text) {
  if (!text) return text;
  var firstName = caseData ? caseData.presentation.patientName.split(' ')[0] : 'Patient';

  // Strip lines that are pure stage directions (Name + action verb, She/He + action verb)
  var lines = text.split('\n');
  var cleaned = lines.map(function(line) {
    var trimmed = line.trim();
    if (!trimmed) return '';

    // Remove pure emote sentences from within the line
    var sentences = trimmed.split(/(?<=[.!?])\s+/);
    var kept = sentences.filter(function(s) {
      s = s.trim();
      if (!s) return false;
      // Pattern: Name or She/He + action verb (pure narrative)
      var emotePattern = new RegExp('^(' + firstName + '|She|He|Maria|Her eyes|His eyes|Her expression|His expression)\\s+(nods|shakes|looks|smiles|pauses|sighs|coughs|shifts|adjusts|tilts|extends|rubs|trails|frowns|widens|watches|notices|thinks|seems|glances|reaches|picks|gives|demonstrates|touches|turns|leans|sits|stands|places|gazes)', 'i');
      if (emotePattern.test(s)) return false;
      // Pattern: "As if on cue..." or "She seems to be..."
      if (/^(As if|She seems|He seems|She appears|He appears|Looking |She looks |He looks |She is |He is )/i.test(s)) return false;
      // Pattern: ends with prompt "What would you like to..."
      if (/what would you like to (ask|do|say|know|examine|explore)/i.test(s)) return false;
      if (/what (else )?would you like/i.test(s)) return false;
      if (/what are your thoughts/i.test(s)) return false;
      return true;
    });

    return kept.join(' ');
  }).filter(function(line) { return line.trim().length > 0; });

  var result = cleaned.join('\n\n');

  // Strip leftover quotation marks if content was entirely in quotes
  result = result.replace(/^["']+\s*/, '').replace(/\s*["']+$/, '');

  // If everything was stripped, return a minimal acknowledgment
  if (result.trim().length < 5) return text; // fallback to original if over-stripped

  return result;
}
// ── PE EXAM MATCHING ──
// Detects which body systems the student requests and delivers findings
function matchAndDeliverPE(msg) {
  if (state.currentPhase !== PHASES.PHYSICAL_EXAM) return null;
  if (!caseData || !caseData.physicalExam) return null;

  var pe = caseData.physicalExam;
  var examMap = {
    general: { keywords: /\b(general|overall|appearance|vital|look at|inspect)\b/i, label: 'General', finding: pe.general },
    heent: { keywords: /\b(heent|head|eyes|ears|nose|throat|neck|jvp|jvd|jugular|thyroid|lymph|oral|mouth|conjunctiv|fundoscop)\b/i, label: 'HEENT/Neck', finding: pe.heent },
    cardiovascular: { keywords: /\b(cardio|heart|cardiac|auscultat.*heart|listen.*heart|pmi|point of max|murmur|s3|s4|gallop|carotid|jugular venous|jvp|palpate.*chest|precord)\b/i, label: 'Cardiovascular', finding: pe.cardiovascular },
    respiratory: { keywords: /\b(lung|pulmonary|respiratory|breath sounds|auscultat.*lung|listen.*lung|crackle|wheez|rhonchi|percuss.*chest|chest wall|fremitus|egophony|pectoriloquy)\b/i, label: 'Respiratory', finding: pe.respiratory },
    abdomen: { keywords: /\b(abdom|belly|liver|hepat|spleen|bowel|periton|ascit|tender.*abdom|palpat.*abdom|hepatojugular|hepatomegaly)\b/i, label: 'Abdomen', finding: pe.abdomen },
    extremities: { keywords: /\b(extrem|legs?|feet|ankle|edema|swelling|peripheral|pulse.*pedal|pulse.*tibial|pulse.*dorsalis|pitting|calf|lower extrem|upper extrem|clubbing|cyanosis)\b/i, label: 'Extremities', finding: pe.extremities },
    skin: { keywords: /\b(skin|rash|lesion|color|cyanosis|jaundice|pallor|diaphor|petechiae|xanthoma|xanthelasma|corneal arcus|nail|clubbing)\b/i, label: 'Skin/Integument', finding: pe.skin },
    neuro: { keywords: /\b(neuro|mental status|cranial nerve|motor|sensory|reflex|cerebell|gait|babinski|strength|coordination)\b/i, label: 'Neurologic', finding: pe.neuro || 'Alert and oriented x4. Cranial nerves II-XII intact. Motor strength 5/5 all extremities. Sensation intact. Reflexes 2+ symmetric.' }
  };

  var matchedSystems = [];
  var newFindings = [];

  Object.entries(examMap).forEach(function(entry) {
    var system = entry[0];
    var data = entry[1];
    if (data.keywords.test(msg)) {
      if (!state._peDelivered[system]) {
        state._peDelivered[system] = true;
        state._peRequested[system] = true;
        newFindings.push(data.label + ': ' + data.finding);
      }
      matchedSystems.push(system);
    }
  });

  // Check for broad requests ("full physical", "head to toe", "complete exam")
  if (/\b(full physical|complete.*exam|head to toe|comprehensive|full exam|everything)\b/i.test(msg)) {
    Object.entries(examMap).forEach(function(entry) {
      var system = entry[0];
      var data = entry[1];
      if (!state._peDelivered[system]) {
        state._peDelivered[system] = true;
        state._peRequested[system] = true;
        newFindings.push(data.label + ': ' + data.finding);
      }
    });
  }

  if (newFindings.length === 0) return null;

  // Build the findings message
  var findingsText = 'You perform the examination.\n\n' + newFindings.join('\n\n');

  // Count what's been examined vs what's available
  var totalSystems = Object.keys(examMap).length;
  var examinedCount = Object.keys(state._peDelivered).length;

  if (examinedCount < totalSystems - 1) {
    findingsText += '\n\nIs there anything else you would like to examine?';
  } else {
    findingsText += '\n\nBased on all your findings, how does your thinking change?';
  }

  return {
    type: 'patel',
    content: '[As Dr. Patel]\n\n' + findingsText,
    matchedSystems: matchedSystems,
    examinedCount: examinedCount,
    totalSystems: totalSystems
  };
}

// Get PE summary for scoring — what was examined, what was missed
function getPESummary() {
  if (!caseData || !caseData.physicalExam) return null;
  var pe = caseData.physicalExam;
  var allSystems = ['general', 'heent', 'cardiovascular', 'respiratory', 'abdomen', 'extremities', 'skin', 'neuro'];
  var examined = Object.keys(state._peDelivered || {});
  var missed = allSystems.filter(function(s) { return examined.indexOf(s) === -1; });

  // Determine critical exams for this case
  var criticalExams = [];
  if (caseData.scoringCriteria && caseData.scoringCriteria.criticalPEFindings) {
    criticalExams = caseData.scoringCriteria.criticalPEFindings;
  } else {
    // Infer from case category
    var target = (caseData.targetDiagnosis || '').toLowerCase();
    if (/heart|cardiac|chf|mi|myocard/i.test(target)) criticalExams = ['cardiovascular', 'respiratory', 'extremities'];
    else if (/pulmon|pneum|tb|lung|asthma|copd/i.test(target)) criticalExams = ['respiratory', 'cardiovascular'];
    else if (/hiv|pcp|fever/i.test(target)) criticalExams = ['heent', 'respiratory', 'skin'];
    else criticalExams = ['cardiovascular', 'respiratory'];
  }

  var criticalMissed = criticalExams.filter(function(s) { return examined.indexOf(s) === -1; });

  return {
    examined: examined,
    missed: missed,
    criticalMissed: criticalMissed,
    thoroughnessScore: Math.round(examined.length / allSystems.length * 100),
    criticalCoverage: criticalExams.length > 0 ? Math.round((criticalExams.length - criticalMissed.length) / criticalExams.length * 100) : 100
  };
}

// ── VOICE INPUT (Web Speech API) ──
var _recognition = null;
var _isListening = false;

function initVoice() {
  var btn = document.getElementById('micBtn');
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    if (btn) { btn.style.opacity = '0.3'; btn.title = 'Voice input not supported — use Chrome or Edge'; }
    return;
  }
}

function toggleMic() {
  var btn = document.getElementById('micBtn');
  if (!btn) return;
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Voice input requires Chrome or Edge.'); return; }

  if (_isListening) { stopListening(); return; }

  _recognition = new SR();
  _recognition.continuous = true;
  _recognition.interimResults = true;
  _recognition.lang = 'en-US';
  var accumulated = '';

  _recognition.onstart = function() {
    _isListening = true;
    accumulated = '';
    btn.textContent = '⏹';
    btn.style.background = '#DC2626';
    btn.style.color = '#fff';
    btn.title = 'Listening... tap to stop';
  };

  _recognition.onresult = function(e) {
    var inp = document.getElementById('chatInput');
    if (!inp) return;
    var interimTxt = '';
    for (var i = e.resultIndex; i < e.results.length; i++) {
      var t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        accumulated += t.charAt(0).toUpperCase() + t.slice(1) + '. ';
      } else {
        interimTxt += t;
      }
    }
    inp.value = (accumulated + interimTxt).trim();
  };

  _recognition.onerror = function(e) {
    if (e.error === 'not-allowed') alert('Microphone access denied.\n\nAllow microphone access in your browser settings and reload the page.');
    else if (e.error !== 'no-speech') console.warn('Speech error:', e.error);
    stopListening();
  };

  _recognition.onend = function() {
    if (_isListening) {
      try { _recognition.start(); } catch(e) { stopListening(); }
    }
  };

  try { _recognition.start(); } catch(e) { console.warn('recognition.start failed:', e); stopListening(); }
}

function stopListening() {
  _isListening = false;
  var btn = document.getElementById('micBtn');
  if (btn) {
    btn.textContent = '🎤';
    btn.style.background = 'transparent';
    btn.style.color = '';
    btn.title = 'Dictate';
  }
  if (_recognition) { try { _recognition.stop(); } catch(e) {} _recognition = null; }
}

// ── DDX CHOOSER EVENT LISTENER ──
window.addEventListener('ddx:submitted', function(e) {
  if (!state || !e.detail) return;
  var data = e.detail;

  // Store structured differential
  if (!state.differentials) state.differentials = {};
  var phaseLabel = state.currentPhase === PHASES.INITIAL_DIFFERENTIAL ? 'initial'
    : state.currentPhase === PHASES.REVISED_DIFFERENTIAL ? 'revised'
    : 'phase_' + state.currentPhase;
  state.differentials[phaseLabel] = data.entries;

  // Snapshot for comparison
  if (window.DdxChooser) DdxChooser.snapshot(phaseLabel);

  // Hide chooser
  document.getElementById('ddxChooserPanel').style.display = 'none';

  // Format the differential as a message for the conversation
  var ddxText = data.entries.map(function(e) {
    return '#' + e.rank + ' ' + e.diagnosis + ' [' + e.category.toUpperCase() + ']';
  }).join('\n');
  addMessage('student', 'My differential:\n' + ddxText);
  state.conversationMessages.push({ role: 'user', content: 'My differential diagnosis in ranked order:\n' + ddxText });
  state.turns.push({ role: 'student', content: ddxText, timestamp: new Date().toISOString(), phase: state.currentPhase, turnNumber: ++state.turnCount, isDdxSubmission: true });

  // Compare to previous phase if available
  if (phaseLabel === 'revised' && state.differentials.initial && window.DdxChooser) {
    var comparison = DdxChooser.comparePhases('initial', 'revised');
    state._ddxComparison = comparison;
    if (comparison.added.length > 0) {
      addMessage('system', 'New diagnoses added since initial differential: ' + comparison.added.join(', '));
    }
    if (comparison.removed.length > 0) {
      addMessage('system', 'Diagnoses removed: ' + comparison.removed.join(', '));
    }
    if (comparison.rankChanges.length > 0) {
      var promotions = comparison.rankChanges.filter(function(r) { return r.direction === 'promoted'; });
      if (promotions.length > 0) {
        addMessage('system', 'Promoted: ' + promotions.map(function(r) { return r.diagnosis + ' (#' + r.fromRank + ' \u2192 #' + r.toRank + ')'; }).join(', '));
      }
    }
  }

  // Signal transition to next phase
  var signals = { readyToMoveOn: true, providingDifferential: true };
  var transition = checkPhaseTransition(signals);
  if (transition && transition.shouldTransition) {
    if (transition.inject) {
      addMessage(transition.inject.type || 'patel', transition.inject.content);
      state.conversationMessages.push({ role: 'assistant', content: transition.inject.content });
      state.turns.push({ role: 'assistant', content: transition.inject.content, timestamp: new Date().toISOString(), phase: state.currentPhase, turnNumber: ++state.turnCount });
    }
    enterPhase(transition.nextPhase);
  }

  updateSidePanel();
  saveState();
});

          // Keep last 20 encounters
          if (existing.length > 20) existing = existing.slice(-20);
          localStorage.setItem(continuityKey, JSON.stringify(existing));
        } catch(e) { console.warn('Continuity save error:', e); }

        // Gap events
        (state.identifiedGaps || []).forEach(function(gap) {
          P.EventBus.emit('gap_identified', 'rad_study', {
            gapId: gap.id || gap.title,
            category: gap.category,
            severity: gap.severity,
            gapType: gap.gapType
          }, opts);
        });

        // Bias events
        (state.detectedBiases || []).forEach(function(bias) {
          P.EventBus.emit('bias_detected', 'rad_study', {
            biasType: bias.type,
            severity: bias.severity,
            evidence: bias.evidence
          }, opts);
        });

        // Patient continuity
        var patientId = state.caseId.toLowerCase() + '-patient';
        P.ContinuityTracker.recordEncounter(email, patientId, caseData.presentation.patientName, {
          module: 'rad_study',
          caseId: state.caseId,
          sessionId: state.sessionId,
          date: new Date().toISOString(),
          diagnosis: state.envHistoryScore >= 1 ? caseData.targetDiagnosis : 'Undetermined',
          outcome: 'Env history score: ' + state.envHistoryScore + '/2'
        });

        // Confidence events
        (state._confidenceLog || []).forEach(function(c) {
          P.EventBus.emit('confidence_recorded', 'rad_study', {
            phase: c.phase, confidence: c.confidence, correctDxPresent: c.correctDxPresent
          }, opts);
        });
      }
    }

    // Also save individual turns for granular analysis
    const turnRows = state.turns.map(t => ({
      session_id: state.sessionId,
      turn_number: t.turnNumber,
      role: t.role === 'student' ? 'student' : 'assistant',
      phase: t.phase,
      content: t.content,
      timestamp: t.timestamp
    }));
    if (turnRows.length > 0) {
      const { error: turnError } = await sb.from('rad_study_turns').insert(turnRows);
      if (turnError) console.error('Turn save error:', turnError.message);
      else console.log(turnRows.length + ' turns saved to Supabase.');
    }
  } catch(e) {
    console.error('Supabase export failed:', e);
  }
}
</script>

<script>
(function() {

      '<option value="moderate">Moderate</option><option value="realistic">Realistic</option>' +
      '<option value="intense">Intense</option></select>';
  }

  // Hook startStudy to initialize enhancements
  var _origStart = window.startStudy;
  window.startStudy = function() {
    _origStart();
    if (!window.state) return;
    var cogSel = document.getElementById('intakeCogLoad');
    E.CognitiveLoadManager.init(cogSel ? cogSel.value : 'off', window.state.trainingYear);
    window.state.cognitiveLoadLevel = E.CognitiveLoadManager.getCurrentLevel();
    E.PatientEmotionModel.init(6);
    window.state._metacogPrompts = [];
    window.state._confidenceLog = [];
    window.state._nearMisses = [];
    window.state._lastDifferentialCount = 0;
  };

  // Hook sendMessage for real-time enhancements
  var _origSend = window.sendMessage;
  window.sendMessage = async function() {
    if (!window.state) return _origSend();
    var input = document.getElementById('chatInput');
    var msg = input ? input.value.trim() : '';
    if (!msg) return;
    var pk = 'phase' + window.state.currentPhase;
    window.state._lastDifferentialCount = (window.state.differentials[pk] || []).length;

    // Patient emotion (Phase 3)
    if (window.state.currentPhase === 3) E.PatientEmotionModel.update(msg);

    // Near-miss detection
    if (window.caseData && window.caseData.nearMisses) {
      E.NearMissDetector.detect(msg, window.caseData.nearMisses).forEach(function(nm) {
        if (!window.state._nearMisses.some(function(n) { return n.id === nm.id; })) {
          window.state._nearMisses.push(nm);
        }
      });
    }

    await _origSend();

    // Metacognition (50% chance to avoid over-prompting)
    if (window.state.currentPhase < 8 && Math.random() < 0.4) {
      var mc = E.Metacognition.shouldPrompt(msg, window.state, window.state.currentPhase);
      if (mc) {
        window.state._metacogPrompts.push(mc.tracking);
        setTimeout(function() {
          addMessage('patel', '[As Dr. Patel]\n\n' + mc.prompt);
          window.state.conversationMessages.push({ role:'assistant', content: mc.prompt });
        }, 1500);
      }
    }

    // Cognitive load interruptions (Phase 3+)
    if (window.state.currentPhase >= 3) {
      var interrupt = E.CognitiveLoadManager.shouldInterrupt(window.state.turnCount, window.state.currentPhase, window.state);
      if (interrupt) {
        setTimeout(function() {
          addMessage('system', '\uD83D\uDCDF ' + interrupt.speaker + ': ' + interrupt.text);
        }, 2000 + Math.random() * 2000);
      }
    }
  };

  // Global confidence recording
  window.recordConfidence = function(level, phase) {
    if (!window.state) return;
    var pk = 'phase' + phase;
    var dx = (window.state.differentials[pk] || []).map(function(d) { return d.diagnosis.toLowerCase(); });
    var correct = window.caseData && window.caseData.scoringCriteria.highScoreDiagnoses.some(function(h) {
      return dx.some(function(d) { return d.includes(h.toLowerCase()); });
    });
    E.UncertaintyCalibration.record(window.state, phase, level, correct);
    var btns = document.querySelectorAll('.confidence-prompt');
    if (btns.length) btns[btns.length-1].innerHTML = '<div style="font-size:12px;color:#059669;font-weight:600;">\u2713 Confidence: ' + level + '/10</div>';
  };

  // Hook export to include enhancement data
  var _origExport = window.exportStudyData;
  window.exportStudyData = async function() {
    if (window.state) {
      window.state.metacogPrompts = window.state._metacogPrompts || [];
      window.state.confidenceLog = window.state._confidenceLog || [];
      window.state.nearMisses = window.state._nearMisses || [];
      window.state.cognitiveLoadLog = E.CognitiveLoadManager.getLog();
      window.state.patientEmotionFinal = E.PatientEmotionModel.getState();
      window.state.uncertaintyCalibration = E.UncertaintyCalibration.analyze(window.state);
      if (window.RdxAgent && window.RdxAgent.BiasFramework) {
        window.state.detectedBiases = window.RdxAgent.BiasFramework.detectBiases(window.state, window.caseData);
      }
      // Peer comparison
      if (sb) {
        var comp = await E.CollaborativeReasoning.compareToAggregates(sb, window.state, window.caseData.caseId);
        if (comp && comp.insights) comp.insights.forEach(function(i) { addMessage('system', i); });
      }
    }
    await _origExport();
  };
})();
</script>

    // ── DEBRIEF PANEL — renders after simulation completion ──
  function renderReasoningDebrief() {
    var chatEl = document.getElementById('chatMessages');
    if (!chatEl) return;
    var state = window.state;
    var caseData = window.caseData;
    if (!state || !caseData) return;

    var html = '<div style="background:linear-gradient(135deg,#F8FAFC,#F0F4F8);border:1.5px solid #E2E8F0;border-radius:14px;padding:20px;margin:12px 0">';
    html += '<div style="font-size:15px;font-weight:700;color:#1B4F72;margin-bottom:14px">Clinical Reasoning Debrief</div>';

    // ── Source Triangulation Status ──
    html += '<div style="margin-bottom:16px">';
    html += '<div style="font-size:12px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Evidence Triangulation</div>';
    html += R.Triangulation.renderStatusHTML();
    html += '</div>';

    // ── Post-Game Analysis ──
    var postGame = R.PostGame.generate(state, caseData);
    if (postGame) {
      state._postGame = postGame;
      html += '<div style="margin-bottom:16px">';
      html += '<div style="font-size:12px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Expert Pathway Comparison</div>';
      html += R.PostGame.renderHTML(postGame);
      html += '</div>';
    }

    // ── ACH Matrix (if populated) ──
    var achMatrix = R.ACH.getMatrix();
    if (achMatrix && achMatrix.evidence.length > 0) {
      var achAnalysis = R.ACH.analyze();
      html += '<div style="margin-bottom:16px">';
      html += '<div style="font-size:12px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Analysis of Competing Hypotheses</div>';
      html += R.ACH.renderHTML();
      if (achAnalysis && achAnalysis.biases.length > 0) {
        html += '<div style="margin-top:8px">';
        achAnalysis.biases.forEach(function(b) {
          html += '<div style="font-size:11px;color:#D97706;padding:4px 8px;background:#FFF7ED;border-radius:6px;margin-bottom:4px">' + b.message + '</div>';
        });
        html += '</div>';
      }
      html += '</div>';
    }

    // ── Case Pairing Recommendation ──
    if (window.CRT_INDEX || window.CRT_DATA) {
      var index = window.CRT_INDEX || {};
      if (!window.CRT_INDEX && window.CRT_DATA) {
        Object.entries(window.CRT_DATA).forEach(function(e) {
          index[e[0]] = { chiefComplaint: e[1].chiefComplaint || e[1].presentation, category: e[1].category };
        });
      }
      var pair = R.CasePairing.findPair(caseData.caseId, index);
      if (pair) {
        state._casePairing = pair;
        html += '<div style="margin-bottom:16px">';
        html += '<div style="font-size:12px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Distinguishing Cases — Try Next</div>';
        html += '<a href="simulation-engine.html?case=' + encodeURIComponent(pair.recommendedCase) + '" style="display:block;padding:12px 16px;background:#2874A6;color:#fff;border-radius:10px;text-decoration:none;font-size:13px;font-weight:600">';
        html += pair.reason;
        html += '</a>';
        html += '</div>';
      }
    }

    // ── After-Action Review ──
    var initialDx = (state.differentials && state.differentials.initial && state.differentials.initial[0]) ? state.differentials.initial[0].diagnosis : 'unknown';
    R.AAR.start(caseData.caseId, initialDx, caseData.targetDiagnosis);
    var questions = R.AAR.getQuestions();

    html += '<div style="margin-bottom:8px">';
    html += '<div style="font-size:12px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">After-Action Review</div>';
    questions.forEach(function(q, i) {
      html += '<div style="margin-bottom:10px">';
      html += '<div style="font-size:13px;font-weight:700;color:#1E293B;margin-bottom:4px">' + (i + 1) + '. ' + q.label + '</div>';
      html += '<div style="font-size:11px;color:#64748B;margin-bottom:4px">' + q.prompt + '</div>';
      html += '<textarea id="aar-' + q.id + '" rows="3" style="width:100%;padding:8px 10px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:12px;font-family:inherit;resize:vertical;box-sizing:border-box" placeholder="Your reflection..."></textarea>';
      html += '</div>';
    });
    html += '<button onclick="submitAAR()" style="background:#2874A6;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Submit Reflection</button>';
    html += '</div>';


    // ── What's Next Panel ──────────────────────────────────────────
    html += buildWhatsNextPanel(caseData);

    html += '</div>';

    // Inject into chat
    var div = document.createElement('div');
    div.innerHTML = html;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  // ── AAR Submission Handler ──
  window.submitAAR = function() {
    var questions = R.AAR.getQuestions();
    questions.forEach(function(q) {
      var el = document.getElementById('aar-' + q.id);
      if (el && el.value.trim()) {
        R.AAR.respond(q.id, el.value.trim());
        el.disabled = true;
        el.style.background = '#F1F5F9';
      }
    });
    var quality = R.AAR.evaluate();
    if (quality) {
      var btn = document.querySelector('[onclick="submitAAR()"]');
      if (btn) {
        btn.textContent = 'Reflection saved (' + quality.reflectiveDepth + ' depth, ' + quality.totalWords + ' words)';
        btn.disabled = true;
        btn.style.background = '#059669';
      }
    }
    // Save to state for Supabase export
    if (window.state) {
      window.state._reasoningTools = R.getSummary();
    }
  };

  // ── Hook export to include reasoning tool data ──
  var _origExportRT = window.exportStudyData;
  if (_origExportRT) {
    window.exportStudyData = async function() {
      if (window.state) {
        window.state._reasoningTools = R.getSummary();
      }
      return _origExportRT.apply(this, arguments);
    };
  }

})();
</script>
