<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulation Engine | ReasonDx</title>
<meta name="description" content="Full clinical simulation with AI patient, attending, and structured differential. Voice input, physical exam, labs, imaging, and management — 366 cases available.">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/css/rdx-design-system.css?v=2">
<link rel="stylesheet" href="css/rdx-theme.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#2874A6;--primary-dark:#1B4F72;--primary-light:#EBF5FB;--teal:#0D7A67;--teal-light:#E8F8F5;--success:#27AE60;--warning:#F39C12;--danger:#E74C3C;--text:#1a1a2e;--text-muted:#4B5563;--bg:#F0F4F8;--card:#fff;--border:#DCE3EB;--font:'DM Sans',-apple-system,sans-serif;--mono:'IBM Plex Mono',monospace;--radius:8px;--shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}

/* ── Topbar ── */
.topbar{background:linear-gradient(135deg,var(--primary-dark),var(--teal));color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{font-size:16px;font-weight:700}.topbar-logo span{font-weight:400;color:rgba(255,255,255,.85)}
.topbar-badge{background:rgba(255,255,255,.18);padding:3px 12px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.topbar-right{display:flex;align-items:center;gap:16px;font-size:13px}

/* ── Layout ── */
.study-container{display:flex;height:calc(100vh - 56px);overflow:hidden}
.chat-panel{flex:1;display:flex;flex-direction:column;background:#fff;border-right:1px solid var(--border)}
.side-panel{width:320px;background:var(--bg);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
@media(max-width:900px){.side-panel{display:none}}

/* ── Chat ── */
.chat-messages{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px}
.chat-msg{max-width:85%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;word-wrap:break-word;white-space:pre-wrap}
.msg-system{align-self:center;background:#f0f4f8;color:var(--text-muted);font-size:12px;text-align:center;border-radius:8px;max-width:90%;padding:8px 16px}
.msg-student{align-self:flex-end;background:var(--primary);color:#fff;border-bottom-right-radius:4px}
.msg-patel{align-self:flex-start;background:var(--primary-light);color:var(--text);border-bottom-left-radius:4px}
.msg-patient{align-self:flex-start;background:var(--teal-light);color:var(--text);border-bottom-left-radius:4px}
.msg-report{align-self:center;background:#FEFCE8;color:var(--text);border:1px solid #FDE68A;max-width:95%;font-family:var(--mono);font-size:12px;line-height:1.7;border-radius:8px;padding:16px 20px}
.msg-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;opacity:.7}
.typing{align-self:flex-start;background:var(--primary-light);padding:12px 20px;border-radius:12px;border-bottom-left-radius:4px}
.typing-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--primary);margin:0 2px;animation:typingBounce .6s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes typingBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* ── Input ── */
.input-area{border-top:1px solid var(--border);padding:16px 24px;background:#fff}
.input-row{display:flex;gap:8px}
.input-row input{flex:1;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:14px;outline:none;transition:border-color .15s}
.input-row input:focus{border-color:var(--primary)}
.input-row input:disabled{background:#f5f5f5;cursor:not-allowed}
.send-btn{padding:12px 24px;background:var(--teal);color:#fff;border:none;border-radius:var(--radius);font-family:var(--font);font-weight:600;font-size:14px;cursor:pointer;transition:filter .15s}
.send-btn:hover{filter:brightness(1.1)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}

/* ── Side panel cards ── */
.panel-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm)}
.panel-card h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-muted);margin-bottom:8px}
.phase-indicator{display:flex;flex-direction:column;gap:6px}
.phase-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;font-size:12px;font-weight:500;color:var(--text-muted)}
.phase-item.active{background:var(--primary-light);color:var(--primary);font-weight:700}
.phase-item.complete{color:var(--success)}
.phase-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0}
.phase-item.active .phase-dot{background:var(--primary)}
.phase-item.complete .phase-dot{background:var(--success)}
.flag-row{display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 0}
.flag-icon{width:16px;text-align:center}
.stat-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid #f0f2f5}
.stat-label{color:var(--text-muted);font-weight:500}
.stat-val{font-family:var(--mono);font-weight:700}

/* ── Intake form ── */

.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text)}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:14px}

.hidden{display:none}
</style>
<script src="/case-explainer-agent.js"></script>
<script src="/rdx-guidelines-rag.js"></script>
<script src="/rdx-voice-patient.js"></script>
<script src="/rdx-realtime.js"></script>
<script src="/rdx-ecg.js"></script>
</head>
<body>

<!-- ── TOPBAR ── -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">Reason<span>Dx</span></div>
    <div class="topbar-badge">ReasonDx Simulation Engine</div>
  </div>
  <div class="topbar-right">
    <span id="phaseLabel" style="font-weight:600">Phase 1 of 8</span>
    <span id="turnCounter" style="font-family:var(--mono);opacity:.8">Turn 0</span>
  </div>
</div>


<!-- ── MAIN LAYOUT ── -->
<div class="study-container">
  <div class="chat-panel">
    <div class="chat-messages" id="chatMessages"></div>
    <!-- DDx Chooser Panel — shown at Phases 1, 4, 6 -->
    <div id="ddxChooserPanel" style="display:none;padding:12px 16px;background:#F8FAFC;border-top:2px solid #2874A6;max-height:380px;overflow-y:auto">
      <div id="ddxChooserContainer"></div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <input type="text" id="chatInput" placeholder="Type your response, or click mic to speak..." onkeypress="if(event.key==='Enter'&&!event.shiftKey)sendMessage()" disabled>
        <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Dictate" style="padding:12px 14px;background:transparent;border:1px solid var(--border-main,#D0D5DD);border-radius:var(--radius,8px);cursor:pointer;font-size:18px;line-height:1" disabled>🎤</button>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>Send</button>
      </div>
    </div>
  </div>

  <div class="side-panel">
    <!-- Phase Tracker -->
    <div class="panel-card">
      <h3>Simulation Progress</h3>
      <div class="phase-indicator" id="phaseTracker"></div>
    </div>

    <!-- History Flags -->
    <div class="panel-card" id="historyCard" style="display:none">
      <h3>History Coverage</h3>
      <div id="historyFlags"></div>
    </div>

    <!-- Session Stats -->
    <div class="panel-card">
      <h3>Session</h3>
      <div class="stat-row"><span class="stat-label">Turns</span><span class="stat-val" id="statTurns">0</span></div>
      <div class="stat-row"><span class="stat-label">Group</span><span class="stat-val" id="statGroup">--</span></div>
      <div class="stat-row"><span class="stat-label">Env. History</span><span class="stat-val" id="statEnvHist">--</span></div>
    </div>
  </div>
</div>

<!-- ── CASE DATA ── -->
<script src="emr-data/rad-study-dys001.js"></script>
<script src="emr-data/rad-study-dys002.js"></script>
<script src="emr-data/rad-study-cough001.js"></script>
<script src="emr-data/rad-study-chest001.js"></script>
<script src="emr-data/rad-study-fever001.js"></script>
<script src="emr-data/guidelines-library.js"></script>

<script src="js/rdx-agent-core.js"></script>
<script src="js/rdx-agent-enhancements.js"></script>
<script src="js/rdx-study-tools.js"></script>
<script src="js/rdx-rag.js"></script>
<script src="js/rdx-advanced.js"></script>
<script src="js/rdx-rpfs-viz.js"></script>

<script>
// ── INTAKE CASE SEARCH ──
// ── INITIALIZATION ──
function startStudy() {
  // ── Read identity from localStorage (set by auth/browse) ──
  var rdxUser = {};
  try { rdxUser = JSON.parse(localStorage.getItem('rdx_user') || '{}'); } catch(e) {}
  var name  = rdxUser.name  || rdxUser.firstName || 'Student';
  var year  = rdxUser.year  || rdxUser.trainingYear || 'M3';
  var intakeEmail = rdxUser.email || (window.RdxPlatform && window.RdxPlatform.getUserEmail ? window.RdxPlatform.getUserEmail() : '') || '';

  // ── Read case + depth from URL params ──
  var params = new URLSearchParams(window.location.search);
  var selectedCase = params.get('case') || params.get('caseId') || '';
  var depthVersion = params.get('depth') || 'v1';

  if (!selectedCase) {
    // No case in URL — redirect to browse
    window.location.href = 'browse.html';
    return;
  }
  if (selectedCase === 'random') {
    selectedCase = CASE_IDS[Math.floor(Math.random() * CASE_IDS.length)];
  }

  // Random group assignment
  const groupCode = Math.random() < 0.5 ? 'A' : 'B';

  // ── Load case data ──
  var caseLoader = CASE_REGISTRY[selectedCase];
  if (caseLoader) {
    caseData = caseLoader();
  } else if (window.CaseAdapter) {
    caseData = CaseAdapter.fromCRT(selectedCase);
  }
  window.caseData = caseData;
  if (!caseData) {
    addMessage('system', 'Case not found: ' + selectedCase + '. <a href="browse.html">Return to Browse</a>.');
    return;
  }

  // ── Depth version ──
  var isDepthCase = depthVersion !== 'v1' && caseData.caseDepth && caseData.caseDepth[depthVersion];
  var depthData = isDepthCase ? caseData.caseDepth[depthVersion] : null;

  state = {
    sessionId: 'RS-' + Date.now().toString(36) + '-' + Math.random().toString(36).substr(2,6),
    caseId: caseData.caseId,
    depthVersion: depthVersion,
    isDepthCase: isDepthCase,
    studentName: name,
    trainingYear: year,

    groupCode: groupCode,
    currentPhase: PHASES.INITIAL_DIFFERENTIAL,
    phaseHistory: [{ phase: 1, enteredAt: new Date().toISOString(), exitedAt: null }],
    turns: [],
    turnCount: 0,
    conversationMessages: [], // for Claude API (role/content pairs)
    firstReportType: groupCode === 'A' ? 'standard' : 'simplified',
    secondReportType: groupCode === 'A' ? 'simplified' : 'standard',
    firstReportDelivered: !caseData.radiologyReports, // true if no reports to deliver
    secondReportDelivered: !caseData.radiologyReports,
    historyFlags: {
      askedAboutPets:false, askedAboutHomeEnvironment:false,
      askedAboutHobbies:false, askedAboutOccupationalExposures:false,
      askedAboutSymptomLocation:false, askedAboutRecentChanges:false,
      genericPromptDelivered:false, studentDeclinedAfterPrompt:false
    },
    envHistoryScore: null,
    differentials: { phase1:[], phase4:[], phase5:[], phase6:[], phase7:[] },
    phaseTiming: {},
    leakDetails: []
  };

  document.getElementById('chatInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('micBtn').disabled = false;
  initVoice();

  // ── Realtime broadcast init ──
  if (window.RDXRealtime) {
    RDXRealtime.initStudent(intakeEmail || name, state.caseId);
  }
  document.getElementById('statGroup').textContent = groupCode;
  updatePhaseUI();

  // ── AGENT TOOL: Check student prior performance ──
  if (sb && AgentTools) {
    AgentTools.getStudentHistory(sb, name, year).then(function(history) {
      if (history.found) {
        state.priorHistory = history.patterns;
        if(RDX_DEBUG) console.log('Prior student history found:', history.patterns);
        if (history.patterns.isRepeatStudent) {
          addMessage('system', 'Welcome back! This is session ' + (history.patterns.totalCompleted + 1) + ' for you.');
        }
      }
    }).catch(function(e) { console.log('Prior history lookup skipped:', e.message); });
  }

  // Deliver Phase 1 opening
  const p = caseData.presentation;
  let opening;

  if (isDepthCase && depthData) {
    // ── DEPTH CASE: Modified opening for v2/v3 ──
    var depthScenario = depthData.scenario || 'The patient has returned.';
    var newDataStr = '';
    if (depthData.newData) {
      newDataStr = '\n\nUpdated Data:\n' + Object.entries(depthData.newData).map(function(e) { return e[0] + ': ' + e[1]; }).join('\n');
    }

    if (depthVersion === 'v2') {
      // v2: Treatment failure — start at reassessment
      opening = `[As Dr. Patel]\n\nWelcome back. You saw ${p.patientName} previously. Here's the update:\n\n${depthScenario}${newDataStr}\n\nBased on this update, what's your assessment? Has your thinking changed? Walk me through your current differential and what you want to do differently.`;
      // Skip to revised differential phase
      state.currentPhase = PHASES.REVISED_DIFFERENTIAL;
    } else if (depthVersion === 'v3') {
      // v3: Outpatient follow-up — start at management/follow-up
      opening = `[As Dr. Patel]\n\n${p.patientName} is here for their follow-up visit. Here's where things stand:\n\n${depthScenario}${newDataStr}\n\nWalk me through your assessment. How is the patient doing relative to where you expected? What's your plan going forward?`;
      // Skip to management phase
      state.currentPhase = PHASES.MANAGEMENT;
    }
  } else {
    // ── STANDARD v1: Initial encounter ──
    opening = `[As Dr. Patel]\n\nYou're about to see your next patient in clinic. Here's the chart summary:\n\nPatient: ${p.patientName}, ${p.age}-year-old ${p.ethnicity} ${p.sex.toLowerCase()}\nChief Complaint: ${p.chiefComplaint}\nVitals: T ${p.vitals.temp}, HR ${p.vitals.hr}, BP ${p.vitals.bp}, RR ${p.vitals.rr}, SpO\u2082 ${p.vitals.spo2} on room air\nBrief note from triage nurse: "${p.triageNote}"\n\nBefore you see the patient, I'd like you to generate an initial differential diagnosis based on this limited information. What are you thinking, and in what order of priority?`;
  }

  addMessage('patel', opening);
  state.conversationMessages.push({ role: 'assistant', content: opening });
  state.turns.push({ role:'assistant', content:opening, timestamp:new Date().toISOString(), phase:1, turnNumber:0 });
}

// ── SEND MESSAGE ──
async function sendMessage() {
  if (_isListening) stopListening();
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg || !state) return;
  input.value = '';
  input.disabled = true;
  document.getElementById('sendBtn').disabled = true;

  // Log student turn
  state.turnCount++;
  state.turns.push({ role:'student', content:msg, timestamp:new Date().toISOString(), phase:state.currentPhase, turnNumber:state.turnCount });
  state.conversationMessages.push({ role:'user', content: msg });
  addMessage('student', msg);

  // ── Broadcast student turn ──
  if (window.RDXRealtime) {
    RDXRealtime.broadcastTurn({
      role: 'student', content: msg,
      phase: state.currentPhase,
      turnNumber: state.turnCount,
    });
  }

  // Track readability of student message
  if (window.RdxReadability) {
    var readRecord = window.RdxReadability.trackMessage(msg, state.currentPhase, state.turnCount);
    // Attach to the turn for per-message analysis
    state.turns[state.turns.length - 1].readability = {
      grade: readRecord.consensusGrade,
      level: readRecord.level,
      patientAppropriate: readRecord.patientAppropriate
    };
  }

  // Passive data collection (zero student effort)
  if (window.RdxPassive) {
    window.RdxPassive.analyzeStudentMessage(msg, state.currentPhase, state.turnCount);
    // Attach implicit confidence to turn
    var conf = window.RdxPassive._data.confidence;
    if (conf.length > 0) {
      state.turns[state.turns.length - 1].implicitConfidence = conf[conf.length - 1].score;
    }
  }

  // ── TRANSITION CONFIRMATION FLAG ──
  // If the orchestrator injected a transition message last turn,
  // the student's response (even "ok") confirms the transition
  if (state._pendingTransition) {
    var pending = state._pendingTransition;
    state._pendingTransition = null;
    enterPhase(pending.nextPhase);
    if (pending.inject) {
      addMessage(pending.inject.type || 'patel', pending.inject.content);
      state.conversationMessages.push({ role:'assistant', content: pending.inject.content });
      state.turns.push({ role:'assistant', content:pending.inject.content, timestamp:new Date().toISOString(), phase:state.currentPhase, turnNumber:++state.turnCount });
    }
    // Don't return — let the message also be processed normally
  }

  // ── PHASE TIMEOUT GUARDRAIL ──
  // If more than 20 turns in one phase, auto-advance
  var turnsInPhase = state.turns.filter(function(t) { return t.phase === state.currentPhase; }).length;
  if (turnsInPhase > 20 && state.currentPhase < PHASES.COMPLETE) {
    var nextPhase = state.currentPhase + 1;
    if (nextPhase <= PHASES.COMPLETE) {
      addMessage('patel', '[As Dr. Patel]\n\nI think we have enough to work with here. Let\u2019s move on to the next step.');
      state.conversationMessages.push({ role:'assistant', content:'I think we have enough to work with here. Let\u2019s move on.' });
      enterPhase(nextPhase);
    }
  }

  // Extract signals
  const signals = extractSignals(msg);
  updateStateFromSignals(signals);

  // Check for phase transition or injection
  const transition = checkPhaseTransition(signals);

  if (transition && transition.inject) {
    // Enter new phase first if this is a transition
    if (transition.shouldTransition) {
      enterPhase(transition.nextPhase);
    }
    // Orchestrator injects content directly (no Claude call)
    const injected = transition.inject;
    addMessage(injected.type || 'patel', injected.content);
    state.conversationMessages.push({ role:'assistant', content: injected.content });
    state.turns.push({ role:'assistant', content:injected.content, timestamp:new Date().toISOString(), phase:state.currentPhase, turnNumber:++state.turnCount });
    input.disabled = false;
    document.getElementById('sendBtn').disabled = false;
    updateSidePanel();
    return;
  }

  if (transition && transition.shouldTransition) {
    enterPhase(transition.nextPhase);
  }

  // Check for radiologist re-read request
  var reread = handleRadiologistReread(msg);
  if (reread) {
    addMessage(reread.type, reread.content);
    state.conversationMessages.push({ role:'assistant', content: reread.content });
    state.turns.push({ role:'assistant', content:reread.content, timestamp:new Date().toISOString(), phase:state.currentPhase, turnNumber:++state.turnCount });
    input.disabled = false;
    document.getElementById('sendBtn').disabled = false;
    return;
  }

  // ── PE EXAM REQUEST MATCHING ──
  // When in PE phase, intercept exam requests and deliver findings
  var peResult = matchAndDeliverPE(msg);
  if (peResult) {
    addMessage('patel', peResult.content);
    state.conversationMessages.push({ role:'assistant', content: peResult.content });
    state.turns.push({ role:'assistant', content:peResult.content, timestamp:new Date().toISOString(), phase:state.currentPhase, turnNumber:++state.turnCount, peSystemsDelivered: peResult.matchedSystems });
    input.disabled = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
    saveState();
    updateSidePanel();
    return;
  }

  // Build prompt and call Claude via multi-agent router
  showTyping();

  // ── MULTI-AGENT ROUTER ──
  // Determines which agent responds and uses agent-specific context
  var activeAgent = state.currentPhase === PHASES.HISTORY_TAKING ? 'patient' : 'attending';
  var agentModel = 'claude-sonnet-4-20250514';
  var agentMaxTokens = activeAgent === 'patient' ? 300 : 1024;
  var agentMessages = state.conversationMessages.slice(-20);
  var systemPrompt = buildSystemPrompt();

  // Phase 3: Always use patient agent (with or without RdxAdvanced)
  if (state.currentPhase === PHASES.HISTORY_TAKING) {
    activeAgent = 'patient';
    agentMaxTokens = 300;

    // Build patient-only conversation
    if (!state._patientMessages) state._patientMessages = [];
    state._patientMessages.push({ role: 'user', content: msg });
    agentMessages = state._patientMessages.slice(-30);

    // Build patient system prompt from case data
    var ps = caseData.patientScript;
    var patName = caseData.presentation.patientName;
    systemPrompt = 'MEDICAL EDUCATION SIMULATION — You play ' + patName + '.\n\n';
    systemPrompt += 'YOU ARE ' + patName + ', age ' + caseData.presentation.age + '. YOUR AGE IS ' + caseData.presentation.age + '. Never state a different age.\n\n';
    systemPrompt += 'The student interviewing you is ' + state.studentName + ', a medical student on Dr. Patel\'s team.\n\n';
    systemPrompt += 'ABSOLUTE RULES — VIOLATION OF ANY RULE IS A CRITICAL FAILURE:\n';
    systemPrompt += '1. ONLY speak as yourself in first person. Say "I" not "she" or "he."\n';
    systemPrompt += '2. ZERO narrative. ZERO stage directions. NEVER write: "Maria nods" or "She looks" or "He pauses" or any third-person action. You are SPEAKING. Just say your words and STOP.\n';
    systemPrompt += '3. NEVER end with a question to the student like "What would you like to do?" or "What do you think?" Just answer and stop.\n';
    systemPrompt += '4. 1-3 sentences maximum. Short, natural responses.\n';
    systemPrompt += '5. Plain language only. If the student uses a medical term, say "I don\'t know what that means" or "Can you put that in simpler terms?"\n';
    systemPrompt += '6. Answer ONLY what is asked. Do NOT volunteer information.\n';
    systemPrompt += '7. If the student already told you something (like what they think is going on), do NOT keep asking. Acknowledge it and respond to their question.\n';
    systemPrompt += '8. Remember the full conversation. Do not repeat questions the student already answered.\n';

    // Emotional state modifiers
    if (window.RdxAgentEnhanced && window.RdxAgentEnhanced.PatientEmotionModel) {
      var emotionMods = window.RdxAgentEnhanced.PatientEmotionModel.getBehaviorModifiers();
      if (emotionMods && emotionMods.modifiers && emotionMods.modifiers.length > 0) {
        systemPrompt += '\nCURRENT EMOTIONAL STATE:\n';
        emotionMods.modifiers.forEach(function(m) { systemPrompt += '- ' + m + '\n'; });
      }
    }

    // Null guard — CRT-adapted cases always have patientScript, but guard defensively
    if (!ps) {
      ps = {
        identity: patName + ', patient.',
        hpiOnset: caseData.presentation.chiefComplaint || 'I have not been feeling well.',
        hpiProgression: '', hpiCough: '', hpiAssociatedSymptoms: '',
        hpiLocationPattern: '', pmh: '', medications: '',
        allergies: 'No known drug allergies.', familyHistory: '',
        socialSmokingAlcohol: '', socialOccupation: '', socialTravel: '', ros: ''
      };
    }

    // Inject full patient script
    systemPrompt += '\nPATIENT DETAILS:\n';
    systemPrompt += 'Identity: ' + ps.identity + '\n';
    systemPrompt += 'HPI: ' + ps.hpiOnset + ' ' + ps.hpiProgression + ' ' + (ps.hpiCough || '') + ' ' + ps.hpiAssociatedSymptoms + '\n';
    systemPrompt += 'Location pattern (only if asked): ' + (ps.hpiLocationPattern || '') + '\n';
    systemPrompt += 'PMH: ' + ps.pmh + '\nMedications: ' + ps.medications + '\nAllergies: ' + ps.allergies + '\n';
    systemPrompt += 'Family History: ' + ps.familyHistory + '\n';
    systemPrompt += 'Social: ' + ps.socialSmokingAlcohol + ' ' + (ps.socialOccupation || '') + ' ' + (ps.socialTravel || '') + '\n';

    // Case-specific critical history (only revealed if asked)
    var critFields = ['substanceVaping', 'substanceCocaine', 'substanceDrugs', 'substanceGeneral', 'substanceIVDrugs',
                      'socialImmigration', 'socialLiving', 'socialContacts', 'socialSexual', 'socialSexualGeneral',
                      'environmentalBirds', 'environmentalHome', 'environmentalHobbies', 'environmentalMoldDust', 'environmentalRecentChanges',
                      'tbScreening', 'oralFindings'];
    critFields.forEach(function(field) {
      if (ps[field]) systemPrompt += '\n' + ps[field];
    });

    systemPrompt += '\n\nROS: ' + (ps.ros || '');
    systemPrompt += '\n\nCRITICAL: Only reveal sensitive/critical history when the student asks about that exact topic. Do NOT volunteer.';

    // ── TRAINING-LEVEL ADAPTIVE BEHAVIOR ──
    var year = state.trainingYear || 'M3';
    if (year === 'M1' || year === 'M2') {
      systemPrompt += '\n\nBEHAVIOR TIER (pre-clinical): Be cooperative and patient. Answer questions directly. Do NOT ask about your diagnosis or treatment plan. Do NOT ask what the student thinks is wrong. You may express mild concern ("I\'m a little worried") but do not push for answers. Let the student lead entirely.';
    } else if (year === 'M3' || year === 'M4') {
      systemPrompt += '\n\nBEHAVIOR TIER (clinical student): You may occasionally ask a question about what\'s happening ("Is this serious?" or "What are you looking for?") but accept redirection if the student says they need to finish the exam first. Express moderate emotional responses. You may mention 1-2 concerns about work or family.';
    } else {
      systemPrompt += '\n\nBEHAVIOR TIER (advanced): Be fully realistic. Ask about your diagnosis before the workup is complete. Express strong emotions. Have logistical concerns (work, family, finances). If the student explains something, engage with it — ask follow-up questions. If the student already told you what they think, do NOT ask again. Be assertive but not combative.';
    }
  }

  if (window.RdxAdvanced && window.RdxAdvanced.MultiAgentDefs) {
    // Management phase: check for patient pushback triggers
    if (state.currentPhase === PHASES.MANAGEMENT && caseData.patientPushback) {
      var pushbackTriggered = null;
      caseData.patientPushback.forEach(function(pb) {
        if (new RegExp(pb.trigger, 'i').test(msg) && (!state._pushbacksDelivered || !state._pushbacksDelivered[pb.trigger])) {
          pushbackTriggered = pb;
        }
      });

      if (pushbackTriggered) {
        activeAgent = 'patient_pushback';
        if (!state._pushbacksDelivered) state._pushbacksDelivered = {};
        state._pushbacksDelivered[pushbackTriggered.trigger] = true;
      }
    }

    // Log the agent selection
    if (window.RdxAdvanced.ExplainableAgent) {
      window.RdxAdvanced.ExplainableAgent.logDecision({
        turn: state.turnCount, phase: state.currentPhase, type: 'agent_selection',
        action: 'Selected ' + activeAgent + ' agent',
        reasoning: 'Phase ' + state.currentPhase + ', context determines active agent',
        inputs: { phase: state.currentPhase, agentModel: agentModel }
      });
    }
  }

  try {
    // Handle patient pushback without Claude call
    if (activeAgent === 'patient_pushback') {
      removeTyping();
      var pb = caseData.patientPushback.find(function(p) { return new RegExp(p.trigger, 'i').test(msg); });
      if (pb) {
        addMessage('patient', pb.patientResponse);

        // ── Voice Patient — speak the response aloud ──
        if (window.RDXVoicePatient) {
          RDXVoicePatient.speak(pb.patientResponse, caseData && caseData.patientScript);
        }

        // ── Broadcast patient turn ──
        if (window.RDXRealtime) {
          RDXRealtime.broadcastTurn({
            role: 'patient', content: pb.patientResponse,
            phase: state.currentPhase,
            turnNumber: state.turnCount,
          });
        }

        // ── ECG Image: auto-render if ECG mentioned in exchange ──
        if (window.RDXEcg && RDXEcg.hasEcg(state.caseId)) {
          var _ecgTrigger = /12.lead|ecg|ekg|electrocardiogram/i;
          var _lastStudent = state.turns.length > 0
            ? (state.turns[state.turns.length - 1].content || '') : '';
          if (_ecgTrigger.test(_lastStudent) || _ecgTrigger.test(pb.patientResponse)) {
            // Inject ECG result card into chat
            var _ecgDiv = document.createElement('div');
            _ecgDiv.id = 'ecg-result-' + state.caseId;
            _ecgDiv.style.maxWidth = '520px';
            document.getElementById('chatMessages').appendChild(_ecgDiv);
            RDXEcg.renderOrder(state.caseId, 'ecg-result-' + state.caseId);
          }
        }

        state.conversationMessages.push({ role: 'assistant', content: pb.patientResponse });
        state.turns.push({ role: 'assistant', content: pb.patientResponse, timestamp: new Date().toISOString(), phase: state.currentPhase, turnNumber: ++state.turnCount, agentSource: 'patient_pushback' });
        // Log pushback
        if (window.RdxAdvanced && window.RdxAdvanced.ExplainableAgent) {
          window.RdxAdvanced.ExplainableAgent.logDecision({
            turn: state.turnCount, phase: state.currentPhase, type: 'patient_pushback',
            action: 'Patient pushback delivered: ' + pb.trigger,
            reasoning: pb.teachingPoint,
            inputs: { trigger: pb.trigger },
            outputs: { response: pb.patientResponse.substring(0, 80) + '...' }
          });
        }
        // After pushback, Dr. Patel follows up
        setTimeout(async function() {
          showTyping();
          var followUpPrompt = buildSystemPrompt();
          followUpPrompt += '\n\nThe patient just pushed back on the student\'s management plan. The patient said: "' + pb.patientResponse + '"\n\nAsk the student how they would handle this concern. Do NOT solve it for them.';
          var followResp = await fetch(WORKER_URL, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ studyMode: true, studySystem: followUpPrompt, studyModel: 'claude-sonnet-4-20250514', messages: state.conversationMessages.slice(-10), max_tokens: 500 })
          });
          var followData = await followResp.json();
          var followReply = (followData.content && followData.content[0] && followData.content[0].text) || '';
          removeTyping();
          if (followReply) {
            addMessage('patel', followReply);
            state.conversationMessages.push({ role: 'assistant', content: followReply });
            state.turns.push({ role: 'assistant', content: followReply, timestamp: new Date().toISOString(), phase: state.currentPhase, turnNumber: ++state.turnCount, agentSource: 'attending' });
          }
        }, 1500);

        input.disabled = false;
        document.getElementById('sendBtn').disabled = false;
        input.focus();
        saveState();
        updateSidePanel();
        return;
      }
    }

    // Standard multi-agent Claude call
    const resp = await fetch(WORKER_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        studyMode: true,
        studySystem: systemPrompt,
        studyModel: agentModel,
        messages: agentMessages,
        max_tokens: agentMaxTokens
      })
    });
    const data = await resp.json();
    const reply = (data.content && data.content[0] && data.content[0].text) || "I'm having difficulty responding right now.";

    // Leak check
    checkForLeaks(reply);

    removeTyping();

    // Determine message type: phase-based (definitive) + content-based (backup)
    var msgType = 'patel';
    if (activeAgent === 'patient' || state.currentPhase === PHASES.HISTORY_TAKING) {
      msgType = 'patient';
    } else if (caseData) {
      // Content-based backup: detect if Claude responded as patient despite being in wrong phase
      var firstName = caseData.presentation.patientName.split(' ')[0];
      var patternStr = '(' + firstName + '\\s+(nods|shakes|looks|smiles|pauses|sighs|coughs|shifts|adjusts|says|thinks|trails|responds|replies|answers|frowns|widens)|^"[^"]+"|I\\s+(don\'t|haven\'t|didn\'t|can\'t|feel|have been|am |was |got |just |think|started|noticed|had ))'
      var isPatientContent = new RegExp(patternStr, 'im').test(reply);
      if (isPatientContent) msgType = 'patient';
    }
    // Post-process: strip emotes/narrative from patient messages
    var cleanReply = reply;
    if (msgType === 'patient') {
      cleanReply = stripEmotes(reply);
    }

    // ── RESPONSE-SIDE TRANSITION DETECTION ──
    // If Claude (as Dr. Patel) says "let's go see the patient" or similar,
    // set a pending transition so the student's next message auto-advances.
    if (msgType === 'patel' && !state._pendingTransition) {
      if (state.currentPhase === PHASES.INITIAL_DIFFERENTIAL || state.currentPhase === PHASES.JUSTIFICATION) {
        if (/let'?s (go )?see (the patient|Ms\.|Mr\.)|let'?s go to (the|exam)|let me take you to/i.test(reply)) {
          state._pendingTransition = { nextPhase: PHASES.HISTORY_TAKING };
        }
      }
      if (state.currentPhase === PHASES.HISTORY_TAKING) {
        if (/move on to.*(physical|exam)|let'?s (do|start|perform).*(physical|exam)|ready for the (physical|exam)/i.test(reply)) {
          state._pendingTransition = { nextPhase: PHASES.REVISED_DIFFERENTIAL };
        }
      }
      if (state.currentPhase === PHASES.REVISED_DIFFERENTIAL) {
        if (/let'?s (do|start|perform).*(physical|exam)|what.*exam.*would you|proceed.*exam/i.test(reply)) {
          state._pendingTransition = { nextPhase: PHASES.PHYSICAL_EXAM };
        }
      }
      if (state.currentPhase === PHASES.PHYSICAL_EXAM) {
        if (/what (workup|tests|labs|imaging).*order|what.*would you.*order|ready.*order/i.test(reply)) {
          state._pendingTransition = { nextPhase: PHASES.LABS_IMAGING };
        }
      }
    }

    addMessage(msgType, cleanReply);
    state.conversationMessages.push({ role:'assistant', content: cleanReply });
    state.turns.push({ role:'assistant', content:cleanReply, timestamp:new Date().toISOString(), phase:state.currentPhase, turnNumber:++state.turnCount, agentSource: activeAgent });

    // Store patient response in patient conversation history
    if ((activeAgent === 'patient' || msgType === 'patient') && state._patientMessages) {
      state._patientMessages.push({ role: 'assistant', content: reply });

      // Track patient confusion (indicates student used jargon)
      if (/not sure what.*mean|don't understand|can you explain|what does that mean|what's that|in english/i.test(reply)) {
        if (state._healthLiteracy) state._healthLiteracy.patientConfusionCount++;
      }

      // Register patient cues for the signal extractor
      if (window.RdxAgent && window.RdxAgent.SignalExtractor) {
        window.RdxAgent.SignalExtractor.registerCueDelivery(reply, state.turnCount);
      }

      // Passive: auto-detect patient cues for utilization tracking
      if (window.RdxPassive) {
        window.RdxPassive.analyzePatientMessage(reply, state.currentPhase, state.turnCount);
      }
    }

    // Post-response: deliver report if phase just changed to LABS_IMAGING and report not yet delivered
    if (state.currentPhase === PHASES.LABS_IMAGING && !state.firstReportDelivered && hasOrderedImaging(state.turns)) {
      deliverFirstReport();
    }

  } catch(e) {
    console.error('sendMessage error:', e);
    removeTyping();
    var errMsg = (e && (e.name === 'TypeError' || e.message === 'Failed to fetch'))
      ? "[System] Connection to the AI server failed. Please check your internet connection and try again. If this persists, refresh the page."
      : "I'm sorry, I'm having a technical difficulty. Please try again.";
    addMessage('patel', errMsg);
  }

  input.disabled = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
  updateSidePanel();
  saveState();
}

// ── SIGNAL EXTRACTION ──
function extractSignals(msg) {
  var signals = {
    // Structural signals (same for all cases)
    readyToMoveOn: /\b(ready|move on|let'?s go|that'?s all|done|good to go|i'?m good|no more|that covers|let'?s do|let'?s move|let'?s proceed|next step|move forward|shall we|can we move|i think that'?s|anything else\?|that'?s it)\b/i.test(msg),
    providingDifferential: /\b(differential|diagnosis|diagnos|my list|i'?d consider|i'?m thinking|priority|ranking|could be|might be|suspect|likely|top of my list|working diagnosis|possibilities include)\b/i.test(msg),
    orderingTests: /\b(order|cbc|cmp|ct |chest x|x-?ray|mri|esr|crp|bnp|d-dimer|abg|pft|precipitin|ige|imaging|scan|quantiferon|afb|sputum|uds|drug screen|troponin|hiv|cd4|ldh|beta.*glucan|procalcitonin|viral panel)\b/i.test(msg),
    wantsPhysicalExam: /\b(physical exam|examine|auscultate|listen|palpate|percuss|inspect|vitals|lung exam|heart exam|skin exam|check.*heart|check.*lungs|look at)\b/i.test(msg),
    wantsToSeePatient: /\b(see the patient|talk to|interview|meet|history|ask.*patient|go see|let'?s see)\b/i.test(msg),
    proposingManagement: /\b(start|prescribe|give|administer|order.*treatment|discharge|admit|refer|manage|treatment plan|my plan)\b/i.test(msg),
    // Health literacy signals (for scoring communication quality)
    usesJargon: /\b(bilateral|centrilobular|ground.glass|consolidat|differential|etiology|pathophysiology|auscultation|tachycard|bradycard|dyspnea|hypox|cyanosis|bilateral|interstitial|parenchymal|effusion)\b/i.test(msg),
    usesPlainLanguage: /\b(the test shows|what this means|in simple terms|basically|what we found|here'?s what|let me explain|that means)\b/i.test(msg),
    checksUnderstanding: /\b(does that make sense|do you understand|any questions|want me to explain|is that clear|follow me)\b/i.test(msg),
    acknowledgesGap: /\b(i don'?t know|i'?m not sure|i would need to (look|learn|find|research|check)|honestly don'?t know|i'?ll (look|find|come back|check|research).*that|need to learn more|i'?ll get back to you)\b/i.test(msg),
    commitsToFollowUp: /\b(i'?ll (come back|follow up|check on|let you know|find out)|come back.*share|get back to you|follow up with|keep you updated)\b/i.test(msg),
    // Dynamic history signals from case keywordMap
    historyMatches: {}
  };

  // Check each critical history element against the case's keyword map
  if (caseData && caseData.keywordMap) {
    var critHist = (caseData.signals && caseData.signals.criticalHistory) || [];
    critHist.forEach(function(element) {
      var keywords = caseData.keywordMap[element] || [element];
      signals.historyMatches[element] = keywords.some(function(kw) {
        return new RegExp('\\b' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i').test(msg);
      });
    });
  }

  return signals;
}

function updateStateFromSignals(signals) {
  if (state.currentPhase === PHASES.HISTORY_TAKING && signals.historyMatches) {
    Object.entries(signals.historyMatches).forEach(function(entry) {
      if (entry[1]) { // matched
        state.historyFlags[entry[0]] = true;
      }
    });
  }

  // Track health literacy communication quality
  if (!state._healthLiteracy) state._healthLiteracy = { jargonCount: 0, plainLanguageCount: 0, understandingChecks: 0, patientConfusionCount: 0, gapAcknowledgments: 0, followUpCommitments: 0 };
  if (signals.usesJargon) state._healthLiteracy.jargonCount++;
  if (signals.usesPlainLanguage) state._healthLiteracy.plainLanguageCount++;
  if (signals.checksUnderstanding) state._healthLiteracy.understandingChecks++;
  if (signals.acknowledgesGap) state._healthLiteracy.gapAcknowledgments++;
  if (signals.commitsToFollowUp) state._healthLiteracy.followUpCommitments++;
}

// ── PHASE TRANSITIONS ──
function checkPhaseTransition(signals) {
  const phase = state.currentPhase;

  if (phase === PHASES.INITIAL_DIFFERENTIAL && signals.providingDifferential) {
    return { shouldTransition: true, nextPhase: PHASES.JUSTIFICATION };
  }
  if (phase === PHASES.JUSTIFICATION && (signals.readyToMoveOn || signals.wantsToSeePatient)) {
    // Build training-level-appropriate transition
    var year = state.trainingYear || 'M3';
    var patientDisplay = getPatientDisplayName();
    var pronoun = caseData.presentation.sex === 'Male' ? "He's" : "She's";
    var intro = "[As Dr. Patel]\n\nAlright, let's go see " + patientDisplay + ". " + pronoun + " in exam room 3.\n\n" + patientDisplay + ", this is " + state.studentName + ", a medical student on our team. " + state.studentName + " is going to talk with you and ask some questions.";

    // Training-level scaffolding
    if (year === 'M1' || year === 'M2') {
      intro += "\n\n" + state.studentName + ", before you start \u2014 take a moment to think about what categories of history you want to cover. Think about the HPI, past medical history, medications, social history, family history, and review of systems. What areas might be especially important given the chief complaint?";
      intro += "\n\nI'll be right outside. Come find me when you're done.";
    } else if (year === 'M3' || year === 'M4') {
      intro += "\n\n" + state.studentName + ", go ahead and take your history. I'll be right outside \u2014 come get me when you're ready to discuss.";
    } else {
      // PGY+ / Attending — minimal
      intro += "\n\nGo ahead. I'll check back in a few minutes.";
    }

    return {
      shouldTransition: true,
      nextPhase: PHASES.HISTORY_TAKING,
      inject: { type:'patel', content: intro }
    };
  }
  if (phase === PHASES.HISTORY_TAKING && (signals.readyToMoveOn || signals.wantsPhysicalExam)) {
    const critHist = (caseData.signals && caseData.signals.criticalHistory) || [];
    const askedAny = critHist.some(function(h) { return state.historyFlags[h]; });
    if (!askedAny && !state.historyFlags.genericPromptDelivered) {
      state.historyFlags.genericPromptDelivered = true;
      return { inject: { type:'patel', content:"[As Dr. Patel]\n\nIs there anything else you'd like to ask the patient before we move on to the physical exam?" } };
    }
    // Score: 0 = no critical history, 1 = some critical history, 2 = key exposure found
    var critAskedCount = critHist.filter(function(h) { return state.historyFlags[h]; }).length;
    state.envHistoryScore = critAskedCount === 0 ? 0 : (hasKeyExposure() ? 2 : 1);
    state.historyFlags.studentDeclinedAfterPrompt = state.historyFlags.genericPromptDelivered;
    document.getElementById('statEnvHist').textContent = state.envHistoryScore + '/2';
    var patientName = caseData.presentation.patientName.split(' ');
    var shortName = patientName.length > 1 ? (caseData.presentation.sex === 'Male' ? 'Mr. ' : 'Ms. ') + patientName[patientName.length - 1] : caseData.presentation.patientName;
    var returnMsg = "[As Dr. Patel]\n\n";
    if (state.trainingYear === 'M1' || state.trainingYear === 'M2') {
      returnMsg += "Good work in there. Let's step into the hallway for a moment.\n\nTell me what you learned from " + shortName + ". What categories did you cover? And how has your differential changed from your initial list? Walk me through what moved and why.";
    } else if (state.trainingYear === 'M3' || state.trainingYear === 'M4') {
      returnMsg += "Alright, you've had a chance to talk with " + shortName + ". How has your differential changed? Walk me through your revised list and tell me what moved and why.";
    } else {
      returnMsg += "What are you thinking after the history?";
    }
    return {
      shouldTransition: true,
      nextPhase: PHASES.REVISED_DIFFERENTIAL,
      inject: { type:'patel', content: returnMsg }
    };
  }
  if (phase === PHASES.REVISED_DIFFERENTIAL && signals.readyToMoveOn) {
    return {
      shouldTransition: true,
      nextPhase: PHASES.PHYSICAL_EXAM,
      inject: { type:'patel', content:"[As Dr. Patel]\n\nOkay. What physical exam would you like to perform? Tell me what you're looking for and what you expect to find." }
    };
  }
  if (phase === PHASES.PHYSICAL_EXAM && signals.readyToMoveOn) {
    return {
      shouldTransition: true,
      nextPhase: PHASES.LABS_IMAGING,
      inject: { type:'patel', content:"[As Dr. Patel]\n\nAlright. What workup would you like to order?" }
    };
  }
  if (phase === PHASES.LABS_IMAGING && state.firstReportDelivered && signals.readyToMoveOn) {
    if (!caseData.radiologyReports) {
      // No radiology reports — skip directly to reflection
      return {
        shouldTransition: true,
        nextPhase: PHASES.REFLECTION,
        inject: { type:'patel', content:"[As Dr. Patel]\n\nLet's wrap up. I have a few reflection questions for you.\n\nFirst \u2014 what was the single most important piece of information in reaching your diagnosis, and at what point did you get it?\n\nSecond \u2014 looking back, is there anything you wish you had asked earlier or done differently?\n\nThird \u2014 what other diagnoses were you considering, and what helped you narrow your differential?" }
      };
    }
    // Has radiology reports — move to comparison phase
    return {
      shouldTransition: true,
      nextPhase: PHASES.REPORT_COMPARISON
      // No inject here — deliverSecondReport() is called by enterPhase
    };
  }
  if (phase === PHASES.REPORT_COMPARISON && signals.readyToMoveOn) {
    return {
      shouldTransition: true,
      nextPhase: PHASES.REFLECTION,
      inject: { type:'patel', content:"[As Dr. Patel]\n\nLet's wrap up. I have a few reflection questions for you.\n\nFirst \u2014 what was the single most important piece of information in reaching your final differential, and at what point did you get it?\n\nSecond \u2014 looking back, is there anything you wish you had asked earlier?\n\nThird \u2014 how much weight should a radiology report carry in your diagnostic reasoning when the radiologist doesn't have access to the full clinical history?\n\nFourth \u2014 do you think the language and format of a radiology report affects how you interpret the findings?" }
    };
  }
  if (phase === PHASES.REFLECTION) {
    // Complete after student has given at least one substantive response to reflection questions
    const reflectionTurns = state.turns.filter(t => t.role === 'student' && t.phase === PHASES.REFLECTION);
    if (reflectionTurns.length >= 1 && (signals.readyToMoveOn || reflectionTurns.length >= 2)) {
      return {
        shouldTransition: true,
        nextPhase: PHASES.MANAGEMENT,
        inject: { type:'patel', content:"[As Dr. Patel]\n\nGood. Now let's talk management. Based on your current working diagnosis, what is your plan? Walk me through: immediate interventions, workup to confirm, disposition, and follow-up. Also consider — are there any safety concerns or orders that cannot wait?" }
      };
    }
  }
  if (phase === PHASES.MANAGEMENT) {
    const mgmtTurns = state.turns.filter(t => t.role === 'student' && t.phase === PHASES.MANAGEMENT);
    if (mgmtTurns.length >= 1 && (signals.readyToMoveOn || mgmtTurns.length >= 3)) {
      return { shouldTransition: true, nextPhase: PHASES.COMPLETE };
    }
  }
  return null;
}

function enterPhase(phase) {
  const now = new Date().toISOString();
  const prev = state.phaseHistory[state.phaseHistory.length - 1];
  if (prev) {
    prev.exitedAt = now;
    state.phaseTiming[prev.phase] = { start:prev.enteredAt, end:now, durationMs:new Date(now)-new Date(prev.enteredAt) };
  }
  state.currentPhase = phase;
  state.phaseHistory.push({ phase, enteredAt:now, exitedAt:null });

  if (phase === PHASES.HISTORY_TAKING) {
    document.getElementById('historyCard').style.display = 'block';
    document.getElementById('ddxChooserPanel').style.display = 'none';
  }

  // Show DDx Chooser at differential phases
  var ddxPhases = [PHASES.INITIAL_DIFFERENTIAL, PHASES.REVISED_DIFFERENTIAL];
  if (ddxPhases.indexOf(phase) !== -1 && window.DdxChooser) {
    var panel = document.getElementById('ddxChooserPanel');
    panel.style.display = 'block';
    var phaseLabel = phase === PHASES.INITIAL_DIFFERENTIAL ? 'initial' : 'revised';
    DdxChooser.init('ddxChooserContainer', {
      onChange: function(entries) {
        // Store current differential in state
        if (!state.differentials) state.differentials = {};
        state.differentials[phaseLabel] = entries.map(function(e, i) {
          return { rank: i + 1, diagnosis: e.name, category: e.category };
        });
      }
    });
  } else {
    var ddxPanel = document.getElementById('ddxChooserPanel');
    if (ddxPanel) ddxPanel.style.display = 'none';
  }
  if (phase === PHASES.PHYSICAL_EXAM) {
    // Don't auto-deliver — Dr. Patel asks what the student wants to examine
    state._peRequested = {};  // track which systems were requested
    state._peDelivered = {};  // track which systems were delivered
    setTimeout(function() {
      var year = state.trainingYear || 'M3';
      var prompt = "[As Dr. Patel]\n\n";
      if (year === 'M1' || year === 'M2') {
        prompt += "Now let's do the physical exam. Tell me which systems you want to examine and what you're looking for in each one. Think about what findings would support or refute your differential.";
      } else if (year === 'M3' || year === 'M4') {
        prompt += "Go ahead with your physical exam. What are you examining and what do you expect to find?";
      } else {
        prompt += "What's your focused exam?";
      }
      addMessage('patel', prompt);
      state.conversationMessages.push({ role: 'assistant', content: prompt });
      state.turns.push({ role: 'assistant', content: prompt, timestamp: new Date().toISOString(), phase: state.currentPhase, turnNumber: ++state.turnCount });
    }, 500);
  }
  if (phase === PHASES.REPORT_COMPARISON) {
    // Auto-deliver the second report when entering Phase 7
    setTimeout(function() { deliverSecondReport(); }, 500);
  }
  if (phase === PHASES.COMPLETE) {
    document.getElementById('chatInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
    addMessage('system', 'Simulation complete. Thank you for participating. Your responses have been recorded.');

    // ── COMMUNICATION QUALITY REPORT ──
    if (window.RdxReadability) {
      var rs = window.RdxReadability.getSessionSummary();
      if (rs) {
        var hl = state._healthLiteracy || {};
        var commHtml = '<div style="background:linear-gradient(135deg,#F0F7FC,#E8F4FD);border:1px solid rgba(40,116,166,.2);border-radius:12px;padding:16px;margin:4px 0">';

        // Readability scores
        commHtml += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">';
        commHtml += '<div style="background:#fff;border-radius:8px;padding:10px;text-align:center"><div style="font-size:22px;font-weight:700;color:#2874A6">' + (rs.avgGradeAll || '—') + '</div><div style="font-size:10px;color:#64748B;text-transform:uppercase;letter-spacing:.5px">Overall Grade Level</div></div>';
        commHtml += '<div style="background:#fff;border-radius:8px;padding:10px;text-align:center"><div style="font-size:22px;font-weight:700;color:' + (rs.avgGradePatient && rs.avgGradePatient <= 8 ? '#059669' : '#DC2626') + '">' + (rs.avgGradePatient || '—') + '</div><div style="font-size:10px;color:#64748B;text-transform:uppercase;letter-spacing:.5px">To Patient</div></div>';
        commHtml += '<div style="background:#fff;border-radius:8px;padding:10px;text-align:center"><div style="font-size:22px;font-weight:700;color:#6366F1">' + (rs.avgGradeAttending || '—') + '</div><div style="font-size:10px;color:#64748B;text-transform:uppercase;letter-spacing:.5px">To Attending</div></div>';
        commHtml += '</div>';

        // Key metrics
        commHtml += '<div style="font-size:12px;color:#334155;line-height:1.8">';
        if (rs.adjustsLanguageForPatient === true) {
          commHtml += '<div>\u2705 <strong>Adjusts language for patient</strong> — spoke at grade ' + rs.avgGradePatient + ' to patient vs grade ' + rs.avgGradeAttending + ' to attending</div>';
        } else if (rs.adjustsLanguageForPatient === false) {
          commHtml += '<div>\u26A0\uFE0F <strong>Same complexity to patient and attending</strong> — consider simplifying language when speaking with patients</div>';
        }
        if (rs.patientAppropriateRate !== null) {
          commHtml += '<div>' + (rs.patientAppropriateRate >= 80 ? '\u2705' : '\u26A0\uFE0F') + ' <strong>Patient-appropriate rate:</strong> ' + rs.patientAppropriateRate + '% of messages to patient were at \u22648th grade level (CDC recommended)</div>';
        }
        if (hl.plainLanguageCount > 0) {
          commHtml += '<div>\u2705 <strong>Used plain language explanations:</strong> ' + hl.plainLanguageCount + ' time' + (hl.plainLanguageCount > 1 ? 's' : '') + '</div>';
        }
        if (hl.checksUnderstanding > 0) {
          commHtml += '<div>\u2705 <strong>Checked patient understanding:</strong> ' + hl.understandingChecks + ' time' + (hl.understandingChecks > 1 ? 's' : '') + '</div>';
        }
        if (hl.gapAcknowledgments > 0) {
          commHtml += '<div>\u2B50 <strong>Acknowledged knowledge gap honestly:</strong> ' + hl.gapAcknowledgments + ' time' + (hl.gapAcknowledgments > 1 ? 's' : '') + '</div>';
        }
        if (hl.followUpCommitments > 0) {
          commHtml += '<div>\u2B50 <strong>Committed to follow up:</strong> ' + hl.followUpCommitments + ' time' + (hl.followUpCommitments > 1 ? 's' : '') + '</div>';
        }
        if (hl.jargonCount > 2) {
          commHtml += '<div>\u26A0\uFE0F <strong>Medical jargon used:</strong> ' + hl.jargonCount + ' instances — patients may struggle with technical terms</div>';
        }
        if (hl.patientConfusionCount > 0) {
          commHtml += '<div>\u274C <strong>Patient expressed confusion:</strong> ' + hl.patientConfusionCount + ' time' + (hl.patientConfusionCount > 1 ? 's' : '') + ' — patient couldn\'t understand your language</div>';
        }
        commHtml += '</div>';

        // Readability indices detail
        commHtml += '<div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(40,116,166,.15);font-size:11px;color:#94A3B8">Indices: Flesch-Kincaid, SMOG, Automated Readability Index. CDC recommends patient materials at 6th\u20138th grade level. Trend: ' + (rs.trend || 'n/a') + '</div>';
        commHtml += '</div>';

        addMessage('system', commHtml);
        // Flag that this was HTML so addMessage renders it
        var lastMsg = document.getElementById('chatMessages').lastElementChild;
        if (lastMsg) lastMsg.innerHTML = commHtml;
      }
    }

    exportStudyData();

    // ── AGENT TOOLS: Post-simulation processing ──
    if (AgentTools) {
      // 1. Gap Analysis
      var gaps = AgentTools.analyzeGaps(state, caseData);
      state.identifiedGaps = gaps;
      if(RDX_DEBUG) console.log('Gaps identified:', gaps.length, gaps.map(function(g) { return g.id; }));

      // 2. Guidelines Lookup
      var guidelineResults = AgentTools.lookupGuidelines(caseData.caseId, caseData.targetDiagnosis);
      state.relevantGuidelines = guidelineResults;
      if (guidelineResults.found) {
        if(RDX_DEBUG) console.log('Relevant guidelines found:', guidelineResults.guidelines.length);
      }

      // 3. SpacedRep Card Generation
      var cards = AgentTools.generateSpacedRepCards(gaps, state.sessionId, caseData.caseId);
      if (cards.length > 0) {
        try { localStorage.setItem('radStudy_cards_' + state.sessionId, JSON.stringify(cards)); } catch(e) {}
        if(RDX_DEBUG) console.log('SpacedRep cards generated:', cards.length);
      }

      // 4. Generate AI-powered teaching debrief with RAG guideline citations
      if (gaps.length > 0) {
        setTimeout(function() {
          addMessage('system', 'Generating your personalized teaching debrief...');

          // RAG: retrieve relevant guideline chunks, then inject into debrief prompt
          var ragPromise = (window.GuidelinesRAG)
            ? GuidelinesRAG.retrieve(caseData.targetDiagnosis, caseData.category)
            : Promise.resolve({ found: false, contextBlock: '', sources: [] });

          ragPromise.then(function(ragContext) {

              .then(function(debrief) {
                addMessage('patel', '[Teaching Debrief — Post-Simulation]\n\n' + debrief);

                // Show RAG guideline sources (live citations from database)
                if (ragContext && ragContext.found && ragContext.sources && ragContext.sources.length > 0) {
                  var ragEl = document.createElement('div');
                  ragEl.className = 'chat-msg msg-system';
                  ragEl.innerHTML = GuidelinesRAG.formatSourcesForDisplay(ragContext.sources);
                  document.getElementById('chatMessages').appendChild(ragEl);
                } else if (guidelineResults.found) {
                  // Fallback: static guidelines library if RAG table is empty
                  var guidelineText = 'Recommended reading for this case:\n\n' + guidelineResults.guidelines.slice(0, 3).map(function(g) {
                    return '\u2022 ' + g.title + ' (' + g.journal + ', ' + g.year + ')' + (g.url ? '\n  ' + g.url : '');
                  }).join('\n\n');
                  addMessage('system', guidelineText);
                }

            // Show SpacedRep cards
            if (cards.length > 0) {
              addMessage('system', cards.length + ' review card' + (cards.length > 1 ? 's' : '') + ' generated based on your identified gaps. These will appear in your Study Hub for spaced repetition review.');
            }

            // Case recommendation
            if (state.priorHistory) {
              var nextCase = AgentTools.recommendNextCase(
                { found: true, patterns: state.priorHistory },
                ['DYS-001', 'DYS-002', 'CHEST-001', 'COUGH-001', 'FEVER-001']
              );
              if (nextCase.caseId && nextCase.caseId !== caseData.caseId) {
                addMessage('system', 'Recommended next case: ' + nextCase.caseId + ' (' + nextCase.reason + ')');
              }
            }

            // ── STUDY TOOLS: Generate study package for NotebookLM ──
            if (window.RdxStudyTools) {

              var studyPrompts = ST.StudyPrompts.generate(gaps, caseData, guidelineResults);
              var guidelineCompilation = ST.GuidelineCompiler.compile(caseData.caseId, caseData.targetDiagnosis, guidelineResults);
              var studyPackage = ST.NotebookLMBridge.generatePackage(receipt, studyPrompts, guidelineCompilation, caseData);

              // Store for download

              state._receipt = receipt;

              // Add download button to chat

              btnDiv.innerHTML = '<div style="background:#E8F8F5;border-radius:10px;padding:16px;margin:4px 0;">' +
                '<div style="font-weight:700;color:#0D7A67;margin-bottom:8px;">\uD83D\uDCDA Study Package Ready</div>' +
                '<div style="font-size:13px;color:#333;margin-bottom:12px;">Your performance receipt, study questions, and guideline references have been compiled. Upload this to Google NotebookLM to study the topics you need to review.</div>' +
                '<button onclick="downloadStudyPackage()" style="padding:10px 20px;background:#0D7A67;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;margin-right:8px;">Download Study Package</button>' +
                '<button onclick="copyReceipt()" style="padding:10px 20px;background:#fff;color:#0D7A67;border:2px solid #0D7A67;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;">Copy Performance Receipt</button>' +
                '</div>';
              document.getElementById('chatMessages').appendChild(btnDiv);
            }

            // ── REALTIME — stop broadcast ──
            if (window.RDXRealtime) {
              RDXRealtime.stopBroadcast({ caseId: state.caseId, turns: state.turnCount });
            }

            // ── FLODESK EMAIL TRIGGER ──
            if (window.RDXEmail) {
              var _email = (window.RdxPlatform && window.RdxPlatform.getUserEmail)
                ? window.RdxPlatform.getUserEmail() : state.studentName;
              var _ddxAcc = null;
              if (state.differentials && state.differentials.revised && caseData.targetDiagnosis) {
                var _revDx = state.differentials.revised.map(function(e){ return (e.diagnosis||e.name||e||'').toLowerCase(); });
                _ddxAcc = _revDx.includes((caseData.targetDiagnosis||'').toLowerCase()) ? 1 : 0;
              }
              RDXEmail.simCompleted({
                email:      _email,

                specialty:  caseData.category || '',
                acuity:     caseData.acuity || 2,
                ddxAccuracy: _ddxAcc,
                phasesCompleted: state.currentPhase || 0,
              });
            }

            // ── CASE EXPLAINER AGENT — personalized learning synthesis ──
            setTimeout(function() {
              if (window.CaseExplainerAgent) {
                CaseExplainerAgent.run({ state: state, caseData: caseData, chatEl: chatEl });
              }
            }, 800);

              }); // closes .then(function(debrief)
            }).catch(function(e) { console.warn('[RAG debrief] non-fatal error:', e); });
          }); // closes ragPromise.then
        }, 1500);
      }
    }
  }
  updatePhaseUI();
}

// ── REPORT DELIVERY ──
function deliverFirstReport() {
  if (!caseData.radiologyReports) {
    // No radiology reports — skip directly to management
    state.firstReportDelivered = true;
    state.secondReportDelivered = true;
    return;
  }
  const reportType = state.firstReportType;
  const report = caseData.radiologyReports[reportType];
  const imageUrl = caseData.radiologyReports.imageUrl;
  const label = reportType === 'standard' ? 'Standard Radiology Report' : 'Simplified Radiology Report';

  addMessage('system', 'Radiology report received:');
  addMessage('report', report);
  if (imageUrl) addMessage('system', 'CT images available at: ' + imageUrl);

  state.firstReportDelivered = true;
  state.conversationMessages.push({ role:'assistant', content: '[Report delivered: ' + label + ']\n\n' + report });
}

function deliverSecondReport() {
  if (!caseData.radiologyReports) {
    state.secondReportDelivered = true;
    return;
  }
  const reportType = state.secondReportType;
  const report = caseData.radiologyReports[reportType];
  const intro = reportType === 'simplified'
    ? "[As Dr. Patel]\n\nI'd also like to show you an alternative version of this radiology report, written in more accessible language. Take a look and tell me whether it changes anything about your interpretation or differential."
    : "[As Dr. Patel]\n\nHere's the original technical version of the radiology report. Take a look and tell me whether it changes anything about your interpretation or differential.";

  addMessage('patel', intro);
  addMessage('report', report);
  state.secondReportDelivered = true;
  state.conversationMessages.push({ role:'assistant', content: intro + '\n\n' + report });
}

function hasOrderedImaging(turns) {
  return turns.some(t => t.role === 'student' && t.phase === PHASES.LABS_IMAGING && /\b(ct|chest x|x-?ray|hrct|imaging|scan)\b/i.test(t.content));
}

// ── SYSTEM PROMPT BUILDER ──
function buildSystemPrompt() {
  const phase = state.currentPhase;
  let sys = `You are participating in a clinical reasoning simulation on the ReasonDx medical education platform.

ABSOLUTE RULES (apply to every response):
- NEVER introduce a diagnosis, disease category, or clinical concept the student has not already mentioned.
- NEVER name specific exposures, organisms, animals, or environmental triggers.
- NEVER teach. If the student says "I don't know," say "That's okay, work with what you know."
- NEVER use evaluative praise (excellent, great, good thinking, beautiful, spot on). Use ONLY: "Okay," "Tell me more," "Walk me through that," "What else?"
- NEVER use emoji, bullet points, headers, or formatted lists. Speak conversationally.
- Respond in 1-3 short paragraphs. Keep it natural.
- NEVER use brackets to describe what would happen, e.g. [The simulation would...]. NEVER break the fourth wall. You are IN the simulation, not describing it.
- NEVER reference the simulation, the format, the exercise, or that this is a training scenario. You are in a REAL clinical encounter. If you cannot fulfill a request, redirect naturally as a real attending would.`;

  if (phase === PHASES.INITIAL_DIFFERENTIAL || phase === PHASES.JUSTIFICATION) {
    sys += `\n\nYou are Dr. Patel, a neutral attending physician. The student just provided their differential or justification. Ask them to walk through their reasoning for diagnoses THEY listed. Do NOT introduce new diagnoses. If they haven't mentioned the SpO2, you may ask: "Is there anything in the vitals that stands out?" When discussion feels adequate, say: "Okay. Let's go see the patient."`;
  }
  else if (phase === PHASES.HISTORY_TAKING) {
    sys += `\n\nThe student is now in the exam room with the patient. You play ${caseData.presentation.patientName} — respond in character as the patient to every question the student asks.

NEVER describe what "would" happen. NEVER use brackets like [The simulation would...]. NEVER break character. You ARE the patient right now. If the student greets you, greet them back warmly as the patient.

Dr. Patel stays SILENT during the interview. Do not interject as the attending.

PATIENT DETAILS:\n`;
    const ps = caseData.patientScript;

    if (caseData.source === 'crt_adapter' && ps._crtContext) {
      // CRT-adapted case: Claude generates patient responses from case context
      var ctx = ps._crtContext;
      sys += `Identity: ${ps.identity}
This patient presents with: ${ctx.chiefComplaint || ctx.presentation}
The actual diagnosis is: ${ctx.diagnosis} (DO NOT reveal this — the student must figure it out)
Acuity level: ${ctx.acuity} (1=critical, 5=routine)

The patient might describe their symptoms in phrases like: ${(ctx.chiefComplaintPhrasings || []).join('; ')}
Past medical history: ${(ctx.pmh || []).join('. ')}

YOU ARE THIS PATIENT. Generate realistic, conversational responses based on what a real patient with ${ctx.diagnosis} would experience. Answer questions naturally — you are not a medical professional, you describe symptoms in lay terms. Be consistent with the diagnosis but NEVER use medical terminology unless the student teaches it to you.

Key clinical features the student should discover through history (do NOT volunteer these — only reveal when asked):
${(ctx.keyLearningPoints || []).join('\n')}

Must-not-miss considerations (these are things the student should rule out — respond truthfully if asked about related symptoms):
${(ctx.mustNotMiss || []).join('\n')}

If the student asks about something not covered above, respond as a realistic patient would — it's okay to say "I don't think so" or "Not that I can remember" for things that aren't part of this presentation.`;
    } else {
      // Native rad-study case: use pre-scripted patient segments
      sys += `Identity: ${ps.identity}\nHPI: ${ps.hpiOnset} ${ps.hpiProgression} ${ps.hpiCough} ${ps.hpiAssociatedSymptoms}\n`;
      sys += `Location pattern (only if asked): ${ps.hpiLocationPattern}\n`;
      sys += `PMH: ${ps.pmh}\nMedications: ${ps.medications}\nAllergies: ${ps.allergies}\nFamily History: ${ps.familyHistory}\n`;
      sys += `Social: ${ps.socialSmokingAlcohol} ${ps.socialOccupation} ${ps.socialTravel}\n`;
      if (ps.environmentalBirds) sys += `Environmental/Birds (ONLY if pets/animals/hobbies/home specifically asked): ${ps.environmentalBirds}\n`;
      if (ps.environmentalHome) sys += `Home general (if asked about home but NOT pets): ${ps.environmentalHome}\n`;
      if (ps.environmentalHobbies) sys += `Hobbies (if asked): ${ps.environmentalHobbies}\n`;
      if (ps.environmentalMoldDust) sys += `Mold/dust (if asked): ${ps.environmentalMoldDust}\n`;
      if (ps.environmentalRecentChanges) sys += `Recent changes (if asked): ${ps.environmentalRecentChanges}\n`;
      sys += `ROS: ${ps.ros}\n`;
      sys += `\nCRITICAL: Only reveal sensitive/critical history when the student asks about that exact topic. Do NOT volunteer.`;
    }
  }
  else if (phase === PHASES.REVISED_DIFFERENTIAL) {
    sys += `\n\nYou are Dr. Patel. Ask the student how their differential has changed based on the history. Listen and ask them to elaborate on changes THEY describe. Do NOT suggest diagnoses or hint that something is missing.`;
  }
  else if (phase === PHASES.PHYSICAL_EXAM) {
    var peExamined = Object.keys(state._peDelivered || {});
    var peExaminedStr = peExamined.length > 0 ? peExamined.join(', ') : 'none yet';
    sys += `\n\nYou are Dr. Patel. The student is performing their physical exam. Physical findings are delivered by the system when the student specifies which body systems to examine. You do NOT deliver findings — the system does that.

Systems examined so far: ${peExaminedStr}

Your role:
- If the student has just received PE findings: ask them to interpret. "What do those findings tell you?" or "How does that change your thinking?"
- If the student is discussing what to examine: let them explain their reasoning. Ask: "What are you looking for?" or "What would that finding tell you?"
- If the student seems done examining: ask "Is there anything else you want to check before we move on to the workup?"
- Do NOT suggest specific exams to perform — the student should decide based on their differential.
- Do NOT repeat or summarize PE findings that were already delivered.
- When the student is ready to move on, ask what workup they would like to order.`;
  }
  else if (phase === PHASES.LABS_IMAGING) {
    const labs = caseData.labResults || {};
    let labText = Object.entries(labs).map(([k,v]) => `${k}: ${v}`).join('\n');

    if (caseData.source === 'crt_adapter') {
      // CRT case: Claude generates realistic lab results based on diagnosis
      var ctx = caseData.patientScript._crtContext || {};
      sys += `\n\nYou are Dr. Patel. The student is ordering workup. The actual diagnosis is: ${ctx.diagnosis}.

When the student orders a test, provide REALISTIC results consistent with ${ctx.diagnosis}. Use specific numbers, ranges, and units. Only provide results for tests the student specifically orders — do NOT volunteer other results.

For example: if the student orders a CBC, give a full CBC with realistic values. If they order a troponin for an MI case, give an elevated troponin. If they order a test that would be normal in this condition, give a normal result.

${labText ? 'Some pre-defined results:\n' + labText + '\n' : ''}
After delivering results, ask: "Walk me through how you're interpreting those findings."`;
    } else {
      // Native case: use pre-defined results
      sys += `\n\nYou are Dr. Patel. The student is ordering workup. Provide results ONLY for tests they specifically order. Do NOT volunteer results for tests they did not ask for.

Available results (only provide when ordered):
${labText}

${caseData.radiologyReports ? `If the student orders chest imaging (CT, HRCT, chest X-ray), say: "The imaging is back." Then provide the image link: ${caseData.radiologyReports.imageUrl || ''}
The radiology report will be delivered separately by the system — do NOT generate a radiology report yourself.` : ''}

After delivering results, ask: "Walk me through how you're interpreting the findings. What does your differential look like now?"`;
    }
  }
  else if (phase === PHASES.REPORT_COMPARISON) {
    sys += `\n\nYou are Dr. Patel. The student has just seen the second version of the radiology report. Ask: "Did seeing the report in this different format change how you understood the findings? Did it affect your differential? Which version did you find more helpful, and why?" Do not comment on correctness.`;
  }
  else if (phase === PHASES.REFLECTION) {
    sys += `\n\nYou are Dr. Patel. The student is reflecting on the case. Listen to their reflections and ask follow-up questions about their reasoning process. Do not reveal the diagnosis or correct them — this is self-assessment. When they seem done, say: "Good reflections. Now let's talk about what you would actually DO for this patient."`;
  }
  else if (phase === PHASES.MANAGEMENT) {
    sys += `\n\nYou are Dr. Patel. The student is proposing a management plan. Evaluate their plan for:
1. SAFETY — Are there any dangerous omissions or contraindicated orders? Flag these immediately.
2. APPROPRIATENESS — Does the plan match their stated diagnosis?
3. COMPLETENESS — Immediate interventions, confirmatory workup, disposition, follow-up?

CASE-SPECIFIC SAFETY CONCERNS:\n`;
    // Inject case-specific management data if available
    if (caseData.management) {
      if (caseData.management.dangerousActions) {
        sys += `DANGEROUS ACTIONS (flag immediately if student proposes these):\n` + caseData.management.dangerousActions.map(function(d) { return '- ' + d; }).join('\n') + '\n';
      }
      if (caseData.management.criticalActions) {
        sys += `CRITICAL ACTIONS (must be included in plan):\n` + caseData.management.criticalActions.map(function(c) { return '- ' + c; }).join('\n') + '\n';
      }
    }
    sys += `\nIf the student proposes something dangerous, push back firmly: "I'd stop you there — tell me why that might be a problem with this patient."
If the student's plan is reasonable, ask about one gap they haven't addressed.
If the student mentions something the patient might refuse or struggle with, introduce the patient pushback: "Actually, ${caseData.presentation.patientName} has some concerns about that plan. How would you handle that?"
When the plan is adequate, say: "Okay, I think we have a solid plan. Well done."`;
  }

  // ── RAG: Inject verified guideline grounding ──
  if (window.RdxRAG && caseData) {
    var ragContext = window.RdxRAG.getPhaseGrounding(caseData, phase, state);
    if (ragContext) {
      sys += '\n' + ragContext;
      if (window.RdxAdvanced && window.RdxAdvanced.ExplainableAgent) {
        window.RdxAdvanced.ExplainableAgent.logRAGRetrieval(phase, ragContext.split('Source:').length - 1, 'phase-' + phase);
      }
    }
  }

  return sys;
}

// ── RADIOLOGIST RE-READ ──
// Students can request re-read with clinical context during Phase 6
function handleRadiologistReread(studentMessage) {
  if (state.currentPhase !== PHASES.LABS_IMAGING && state.currentPhase !== PHASES.REPORT_COMPARISON) return null;
  if (state._rereadRequested) return null;
  var msg = studentMessage.toLowerCase();
  if (!/\b(re-?read|radiolog|call.*rad|ask.*rad|additional.*read|clinical.*context.*rad|correlat.*rad)\b/i.test(msg)) return null;

  state._rereadRequested = true;

  // Check what history the student has obtained
  var critHist = (caseData.signals && caseData.signals.criticalHistory) || [];
  var obtainedHistory = critHist.filter(function(h) { return state.historyFlags[h]; });

  if (obtainedHistory.length === 0) {
    return {
      type: 'system',
      content: 'Radiology: "We received your request for clinical correlation. However, you haven\'t provided additional clinical history beyond what was in the original order. Our impression remains unchanged. If you have specific exposure or risk factor information, please include it and we can re-evaluate."'
    };
  }

  // Build a re-read that integrates the history the student actually obtained
  var historyContext = obtainedHistory.join(', ');
  var rereadPrompt = 'Radiology called back. Dr. Chu says: "Thank you for the additional history regarding ' + historyContext + '. ';

  // Case-specific re-read responses
  if (caseData.radiologistReread) {
    var matchedReread = null;
    caseData.radiologistReread.forEach(function(rr) {
      var matches = rr.requiredHistory.some(function(rh) { return state.historyFlags[rh]; });
      if (matches && (!matchedReread || rr.requiredHistory.length > matchedReread.requiredHistory.length)) {
        matchedReread = rr;
      }
    });
    if (matchedReread) {
      rereadPrompt += matchedReread.response + '"';
    } else {
      rereadPrompt += 'The additional history is noted. Our differential remains broadly similar, but we have updated the clinical indication in the report."';
    }
  } else {
    rereadPrompt += 'This clinical context is helpful. We will add a note to the report."';
  }

  return { type: 'system', content: rereadPrompt };
}

// ── LEAK DETECTION (universal) ──
function checkForLeaks(response) {
  if (state.currentPhase > PHASES.PHYSICAL_EXAM) return;
  var patterns = [];

  // Case-specific leak patterns from scoring criteria
  if (caseData.scoringCriteria) {
    (caseData.scoringCriteria.highScoreDiagnoses || []).forEach(function(dx) {
      patterns.push({ p: new RegExp('\\b' + dx.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i'), s: 'HIGH', d: 'Named target diagnosis: ' + dx });
    });
  }
  // Case-specific exposure keywords (first 3 from critical history)
  if (caseData.signals && caseData.signals.criticalHistory) {
    caseData.signals.criticalHistory.slice(0, 3).forEach(function(h) {
      var keywords = (caseData.keywordMap && caseData.keywordMap[h]) || [];
      keywords.slice(0, 2).forEach(function(kw) {
        if (kw.length > 3) {
          patterns.push({ p: new RegExp('\\b' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i'), s: 'HIGH', d: 'Named case-specific element: ' + kw });
        }
      });
    });
  }
  // Universal leak patterns
  patterns.push({ p: /\b(excellent|beautiful|great|spot on|nicely done|good thinking)\b/i, s: 'MEDIUM', d: 'Evaluative praise' });

  for (const lp of patterns) {
    if (lp.p.test(response)) {
      state.leakDetails.push({ phase:state.currentPhase, turn:state.turnCount, severity:lp.s, description:lp.d, timestamp:new Date().toISOString() });
    }
  }
}

function hasKeyExposure() {
  // Check if the student found the case's key diagnostic element
  // Uses the first 2 elements of criticalHistoryElements as "key"
  var keyElements = (caseData.scoringCriteria.criticalHistoryElements || []).slice(0, 2);
  return keyElements.some(function(elem) {
    return state.turns.some(function(t) {
      if (t.role !== 'student') return false;
      var keywords = (caseData.keywordMap && caseData.keywordMap[elem]) || [elem];
      return keywords.some(function(kw) {
        return new RegExp('\\b' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i').test(t.content);
      });
    });
  });
}
function getPatientDisplayName() {
  if (!caseData) return 'the patient';
