<!DOCTYPE html>
<html>
<head>
<title>Simple Overlay Test</title>
</head>
<body>

<div id="overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#0a1929;z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="color:white;font-size:24px;">LOADING OVERLAY IS WORKING!</div>
</div>

<div style="padding:40px;">
  <h1>If you see this text, the overlay FAILED</h1>
  <p>You should only see "LOADING OVERLAY IS WORKING!" on a dark background.</p>
</div>

<script>
setTimeout(function() {
  document.getElementById('overlay').style.display = 'none';
}, 3000);
</script>

</body>
</html>
