// ============================================
// SEARCH FUNCTIONALITY
// ============================================
const searchInput = document.getElementById('globalSearch');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', function(e) {
    const query = e.target.value.toLowerCase().trim();
    
    if (query.length < 2) {
        searchResults.classList.remove('visible');
        return;
    }
    
    const results = searchIndex.filter(item => 
        item.title.toLowerCase().includes(query) || 
        item.keywords.toLowerCase().includes(query) ||
        item.type.toLowerCase().includes(query)
    );
    
    if (results.length === 0) {
        searchResults.innerHTML = '<div class="search-no-results">No results found for "' + query + '"</div>';
    } else {
        // Group by type
        const grouped = {};
        results.forEach(r => {
            if (!grouped[r.type]) grouped[r.type] = [];
            grouped[r.type].push(r);
        });
        
        let html = '';
        for (const [type, items] of Object.entries(grouped)) {
            html += `<div class="search-category">${type}</div>`;
            items.slice(0, 5).forEach(item => {
                html += `
                    <a href="${item.link}" class="search-result">
                        <span class="search-result-icon">${item.icon}</span>
                        <div class="search-result-info">
                            <div class="search-result-title">${item.title}</div>
                            <div class="search-result-type">${item.type} • ${item.specialty}</div>
                        </div>
                        <span class="search-result-arrow">→</span>
                    </a>
                `;
            });
        }
        searchResults.innerHTML = html;
    }
    
    searchResults.classList.add('visible');
});

// Close search on click outside
document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-box') && !e.target.closest('.search-results')) {
        searchResults.classList.remove('visible');
    }
});

// Keyboard shortcut
document.addEventListener('keydown', function(e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        searchInput.focus();
    }
    if (e.key === 'Escape') {
        searchResults.classList.remove('visible');
        searchInput.blur();
    }
});

// ============================================
// D3 FORCE GRAPH
// ============================================
let simulation, svg, showLabels = true;
let currentSpecialty = 'all';

function initGraph(specialty) {
    currentSpecialty = specialty;
    const container = document.getElementById('knowledge-graph');
    container.innerHTML = '';
    
    const width = container.offsetWidth;
    const height = container.offsetHeight;
    
    const data = graphData[specialty] || graphData['all'];
    
    // Create SVG
    svg = d3.select('#knowledge-graph')
        .append('svg')
        .attr('width', width)
        .attr('height', height);
    
    // Create links
    const link = svg.append('g')
        .selectAll('line')
        .data(data.links)
        .enter().append('line')
        .attr('class', 'link')
        .attr('stroke-width', 2);
    
    // Create nodes
    const node = svg.append('g')
        .selectAll('g')
        .data(data.nodes)
        .enter().append('g')
        .attr('class', d => `node ${d.type}`)
        .style('cursor', 'pointer')
        .on('click', (event, d) => window.location.href = d.link)
        .call(d3.drag()
            .on('start', dragstarted)
            .on('drag', dragged)
            .on('end', dragended));
    
    node.append('circle')
        .attr('r', d => d.type === 'hub' ? 30 : 20);
    
    node.append('text')
        .attr('dy', d => d.type === 'hub' ? 45 : 35)
        .attr('text-anchor', 'middle')
        .text(d => d.name)
        .style('display', showLabels ? 'block' : 'none');
    
    node.append('text')
        .attr('dy', 5)
        .attr('text-anchor', 'middle')
        .attr('font-size', d => d.type === 'hub' ? '20px' : '14px')
        .text(d => d.icon);
    
    // Tooltip
    node.on('mouseover', function(event, d) {
        const tooltip = document.getElementById('tooltip');
        tooltip.innerHTML = `<strong>${d.name}</strong><br>${d.type}`;
        tooltip.style.display = 'block';
        tooltip.style.left = (event.pageX - 50) + 'px';
        tooltip.style.top = (event.pageY - 60) + 'px';
    }).on('mouseout', function() {
        document.getElementById('tooltip').style.display = 'none';
    });
    
    // Simulation
    simulation = d3.forceSimulation(data.nodes)
        .force('link', d3.forceLink(data.links).id(d => d.id).distance(100))
        .force('charge', d3.forceManyBody().strength(-300))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(40));
    
    simulation.on('tick', () => {
        link
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);
        
        node.attr('transform', d => `translate(${d.x},${d.y})`);
    });
}

function dragstarted(event) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    event.subject.fx = event.subject.x;
    event.subject.fy = event.subject.y;
}

function dragged(event) {
    event.subject.fx = event.x;
    event.subject.fy = event.y;
}

function dragended(event) {
    if (!event.active) simulation.alphaTarget(0);
    event.subject.fx = null;
    event.subject.fy = null;
}

function resetGraph() {
    initGraph(currentSpecialty);
}

function toggleLabels() {
    showLabels = !showLabels;
    svg.selectAll('.node text:first-of-type').style('display', showLabels ? 'block' : 'none');
}

// ============================================
// SPECIALTY TABS & MODULE CARDS
// ============================================
document.querySelectorAll('.specialty-tab').forEach(tab => {
    tab.addEventListener('click', function() {
        document.querySelectorAll('.specialty-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        
        const specialty = this.dataset.specialty;
        document.getElementById('webSpecialtyIcon').textContent = this.textContent.split(' ')[0];
        document.getElementById('webSpecialtyName').textContent = this.textContent.split(' ').slice(1).join(' ') || 'All Specialties';
        
        initGraph(specialty);
        renderModuleCards(specialty);
    });
});

function renderModuleCards(specialty) {
    const grid = document.getElementById('modulesGrid');
    const filtered = specialty === 'all' ? searchIndex : searchIndex.filter(m => m.specialty === specialty);
    
    grid.innerHTML = filtered.map(m => `
        <a href="${m.link}" class="module-card">
            <div class="module-card-header">
                <span class="module-card-icon">${m.icon}</span>
                <span class="module-card-title">${m.title}</span>
                <span class="module-card-type">${m.type}</span>
            </div>
            <div class="module-card-desc">${m.keywords.split(' ').slice(0, 8).join(', ')}</div>
        </a>
    `).join('');
}

// Initialize
window.addEventListener('load', () => {
    initGraph('all');
    renderModuleCards('all');
});

window.addEventListener('resize', () => {
    initGraph(currentSpecialty);
});
