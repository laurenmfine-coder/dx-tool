<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 120">
  <!-- Dx Suite Logo -->
  
  <!-- D -->
  <text x="20" y="70" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="normal" fill="#1a1a1a">
    D
  </text>
  
  <!-- Lowercase x with earpieces -->
  <!-- Left stroke with earpiece -->
  <line x1="68" y1="42" x2="92" y2="72" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <ellipse cx="66" cy="39" rx="2.5" ry="4.5" transform="rotate(-28 66 39)" fill="#1a1a1a"/>
  
  <!-- Right stroke with earpiece becoming tubing -->
  <path d="M 92 42 L 76 58 Q 70 66 70 76 Q 70 86 78 92 Q 86 98 86 108" 
        stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <ellipse cx="94" cy="39" rx="2.5" ry="4.5" transform="rotate(28 94 39)" fill="#1a1a1a"/>
  
  <!-- Chest piece -->
  <circle cx="86" cy="108" r="10" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="86" cy="108" r="5" fill="#1a1a1a"/>
  
  <!-- Suite -->
  <text x="115" y="70" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="normal" fill="#1a1a1a" letter-spacing="-1">
    Suite
  </text>
  
</svg>
