<!DOCTYPE html>
<html data-theme="light" lang="en">
<head>
<script src="/js/rdx-mobile-gate.js"></script>
<script src="/js/rdx-data-consent.js"></script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-EKCVJ1SMN3"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag("js",new Date());gtag("config","G-EKCVJ1SMN3");</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#2874A6">
<title>Faculty Quick-Score | ReasonDx</title>
<meta name="description" content="30-second observation-based milestone assessment for A/I fellowship faculty.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/rdx-theme.css">
<link rel="stylesheet" href="mobile.css">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F0F2F5;--sf:#fff;--sf2:#F8FAFC;--bd:#E2E8F0;--bdl:#F1F5F9;--tx:#1E293B;--ts:#64748B;--tm:#94A3B8;--bl:#2874A6;--blb:#EBF5FB;--gn:#059669;--gnb:#ECFDF5;--am:#D97706;--rd:#DC2626;--ft:'IBM Plex Sans',-apple-system,sans-serif;--mn:'IBM Plex Mono',monospace}
body{background:var(--bg);color:var(--tx);font-family:var(--ft);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}button{font-family:var(--ft);cursor:pointer}
.page{max-width:700px;margin:0 auto;padding:24px 20px 80px}
.bc{font-size:12px;color:var(--tm);margin-bottom:12px}.bc a{color:var(--bl);font-weight:600}
.ph{margin-bottom:24px}.ph h1{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}.ph p{font-size:14px;color:var(--ts);line-height:1.6}

/* Context selector */
.ctx-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.ctx-btn{padding:12px;background:var(--sf);border:2px solid var(--bd);border-radius:10px;text-align:center;cursor:pointer;transition:all .15s;font-size:12px;font-weight:700;color:var(--ts)}
.ctx-btn:hover{border-color:var(--bl)}.ctx-btn.on{border-color:var(--bl);background:var(--blb);color:var(--bl)}
.ctx-btn .ico{font-size:24px;display:block;margin-bottom:4px}

/* Card */
.qc{background:var(--sf);border:1px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:16px}
.qc-h{padding:14px 20px;border-bottom:1px solid var(--bd);background:var(--sf2)}
.qc-h h2{font-size:15px;font-weight:700}
.qc-b{padding:20px}

.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.field select,.field input,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:var(--ft);background:var(--sf);color:var(--tx)}
.field textarea{resize:vertical;min-height:50px}
.field-row{display:flex;gap:10px}.field-row .field{flex:1}

/* Level selector — the key interaction */
.level-row{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.level-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--bd);border-radius:10px;cursor:pointer;transition:all .15s}
.level-item:hover{border-color:var(--bl);background:var(--blb)}
.level-item.sel{border-color:var(--bl);background:var(--blb)}
.level-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;flex-shrink:0}
.level-text{flex:1}.level-text strong{font-size:13px;display:block}.level-text span{font-size:11px;color:var(--ts)}

/* Milestone chips */
.ms-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.ms-chip{padding:6px 12px;border:1px solid var(--bd);border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;background:var(--sf)}
.ms-chip:hover{border-color:var(--bl)}.ms-chip.on{background:var(--blb);border-color:var(--bl);color:var(--bl)}

/* Submitted */
.submitted{text-align:center;padding:32px}
.submitted .check{font-size:48px;margin-bottom:12px}
.submitted h3{font-size:18px;font-weight:800;margin-bottom:4px}
.submitted p{font-size:13px;color:var(--ts)}

.btn{padding:10px 20px;border:none;border-radius:8px;font-size:13px;font-weight:700;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.bp{background:var(--bl);color:#fff;width:100%}.bp:hover{background:#1B4F72}
.bo{background:var(--sf);color:var(--ts);border:1px solid var(--bd)}.bo:hover{border-color:var(--bl);color:var(--bl)}

@media(max-width:640px){.ctx-grid{grid-template-columns:1fr 1fr 1fr}.field-row{flex-direction:column}}
</style>
<script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" onload="if(window.RDXSupabaseInit)RDXSupabaseInit()"></script>
<script src="js/rdx-supabase.js"></script>
<script src="/js/nav-global.js"></script>
</head>
<body>
<!-- ── Minimal back-nav breadcrumb ── -->
<div id="rdx-breadcrumb" style="position:sticky;top:0;z-index:200;background:rgba(27,79,114,0.97);backdrop-filter:blur(8px);padding:8px 20px;display:flex;align-items:center;gap:12px;font-family:'DM Sans',-apple-system,sans-serif;">
  <a href="/browse.html" style="color:rgba(255,255,255,0.8);text-decoration:none;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;transition:color .15s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.8)'">← ReasonDx</a>
  <span style="color:rgba(255,255,255,0.25);font-size:12px">|</span>
  <span id="rdx-bc-title" style="color:rgba(255,255,255,0.5);font-size:12px"></span>
</div>
<script>
(function(){
  var t = document.getElementById('rdx-bc-title');
  if(t) t.textContent = document.title.replace(' | ReasonDx','').replace('ReasonDx','').trim();
})();
</script>

<div id="rdx-loader" class="rdx-loading"><div class="rdx-spinner"></div><div class="rdx-load-text">Loading Quick-Score...</div></div>

<div class="page">
<div class="bc"><a href="index.html">ReasonDx</a> → <a href="milestone-tracker.html">Milestones</a> → Faculty Assessment</div>
<div class="ph"><h1>Faculty Quick-Score Card</h1><p>30-second observation-based assessment. Select the clinical context, rate the relevant milestones, and add optional comments. Data flows to the fellow's milestone tracker and CCC report.</p></div>

<div id="out"></div>
</div>

<script src="js/milestone-data.js"></script>
<script>
(function(){
'use strict';
var MD=window.MILESTONE_DATA;
var ctx=null, submitted=false;
var selectedMilestones={};
var selectedLevel={};

// Clinical contexts with pre-populated relevant milestones
var CONTEXTS={
  clinic:{icon:'🩺',label:'Outpatient Clinic',
    milestones:['PC1','PC3','PC4','MK2','ICS1','PROF1'],
    desc:'After a clinic session with the fellow'},
  consult:{icon:'📞',label:'Consult Response',
    milestones:['PC1','PC3','ICS2','ICS3','SBP2'],
    desc:'After observing a consult callback or response'},
  procedure:{icon:'💉',label:'Procedure',
    milestones:['PC3','PC4','SBP1','ICS1','PROF2'],
    desc:'After skin testing, OFC, or other procedure'},
  presentation:{icon:'🎤',label:'Presentation / Conference',
    milestones:['MK2','MK3','PBLI1','ICS3'],
    desc:'After a case conference, journal club, or lecture'},
  rounds:{icon:'🏥',label:'Inpatient / Rounds',
    milestones:['PC1','PC4','MK2','ICS2','SBP2','PROF2'],
    desc:'After rounding or inpatient service'}
};

var LEVELS=[
  {n:1,label:'Critical Deficiencies',color:'#DC2626',desc:'Not yet performing at expected entry level'},
  {n:2,label:'Early Learner',color:'#D97706',desc:'Developing, needs direct supervision'},
  {n:3,label:'Advancing',color:'#2874A6',desc:'Progressing, minimal supervision needed'},
  {n:4,label:'Ready for Practice',color:'#059669',desc:'Independent, meets graduation target'},
  {n:5,label:'Aspirational',color:'#7C3AED',desc:'Exceeds expectations, role model'}
];

function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;')}

function render(){
  var h='';

  if(submitted){
    h+='<div class="qc"><div class="qc-b"><div class="submitted">';
    h+='<div class="check">✅</div>';
    h+='<h3>Assessment Submitted</h3>';
    h+='<p>This observation has been recorded and will appear in the fellow\'s milestone tracker and next CCC report.</p>';
    h+='<div style="margin-top:20px;display:flex;gap:10px;justify-content:center">';
    h+='<button class="btn bo" onclick="reset()">Submit Another</button>';
    h+='<button class="btn bo" onclick="location.href=\'milestone-tracker.html\'">View Tracker</button>';
    h+='</div></div></div></div>';
    document.getElementById('out').innerHTML=h;
    return;
  }

  // Step 1: Context
  h+='<div style="font-size:11px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Clinical Context</div>';
  h+='<div class="ctx-grid">';
  for(var k in CONTEXTS){
    var c=CONTEXTS[k];
    h+='<div class="ctx-btn'+(ctx===k?' on':'')+'" onclick="setCtx(\''+k+'\')">';
    h+='<span class="ico">'+c.icon+'</span>'+e(c.label)+'</div>';
  }
  h+='</div>';

  if(ctx){
    var c=CONTEXTS[ctx];

    // Fellow + date
    h+='<div class="qc"><div class="qc-h"><h2>'+c.icon+' '+e(c.label)+' Assessment</h2></div><div class="qc-b">';
    h+='<div class="field-row"><div class="field"><label>Fellow</label><select id="qsFellow"><option>Dr. Sarah Chen (PGY-6)</option><option>Dr. James Okafor (PGY-7)</option></select></div>';
    h+='<div class="field"><label>Date</label><input type="date" value="'+new Date().toISOString().split('T')[0]+'"></div></div>';

    // Milestone chips
    h+='<div class="field"><label>Milestones Observed (select all that apply)</label></div>';
    h+='<div class="ms-chips">';
    var allCodes=c.milestones;
    allCodes.forEach(function(code){
      var sc=MD.subcompetencies[code];
      h+='<div class="ms-chip'+(selectedMilestones[code]?' on':'')+'" onclick="togMs(\''+code+'\')">'+code+' — '+e(sc.short)+'</div>';
    });
    // Allow adding others
    h+='<div class="ms-chip" style="color:var(--tm);border-style:dashed" onclick="addMs()">+ Other</div>';
    h+='</div>';

    // Level for each selected milestone
    var selCodes=Object.keys(selectedMilestones).filter(function(k){return selectedMilestones[k]});
    if(selCodes.length>0){
      selCodes.forEach(function(code){
        var sc=MD.subcompetencies[code]||{name:code,short:code};
        h+='<div style="margin-bottom:16px"><div style="font-size:12px;font-weight:700;color:var(--bl);margin-bottom:6px">'+code+' — '+e(sc.name)+'</div>';
        h+='<div style="display:flex;gap:4px">';
        LEVELS.forEach(function(lv){
          var sel=selectedLevel[code]===lv.n;
          h+='<button onclick="setLvl(\''+code+'\','+lv.n+')" style="flex:1;padding:8px 4px;border-radius:8px;border:2px solid '+(sel?lv.color:'var(--bd)')+';background:'+(sel?lv.color+'15':'var(--sf)')+';font-size:11px;font-weight:700;color:'+(sel?lv.color:'var(--tm)')+';text-align:center;transition:all .1s" title="'+e(lv.desc)+'">L'+lv.n+'</button>';
        });
        h+='</div></div>';
      });

      // Comments
      h+='<div class="field"><label>Comments (optional)</label><textarea id="qsComments" placeholder="Brief observation notes..."></textarea></div>';

      // Submit
      h+='<button class="btn bp" onclick="submitScore()">Submit Assessment</button>';
    } else {
      h+='<p style="font-size:12px;color:var(--tm);margin-top:8px">Select at least one milestone above to score.</p>';
    }

    h+='</div></div>';
  }

  document.getElementById('out').innerHTML=h;
}

window.setCtx=function(k){ctx=k;selectedMilestones={};selectedLevel={};
  CONTEXTS[k].milestones.forEach(function(m){selectedMilestones[m]=true});render()};
window.togMs=function(code){selectedMilestones[code]=!selectedMilestones[code];if(!selectedMilestones[code])delete selectedLevel[code];render()};
window.setLvl=function(code,n){selectedLevel[code]=n;render()};
window.addMs=function(){
  // Quick inline input via rdxGenToast-style prompt
  var code = null;
  var inp = document.createElement('div');
  inp.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:16px 20px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:9999;min-width:320px';
  inp.innerHTML = '<div style="font-size:13px;font-weight:700;color:#1E293B;margin-bottom:8px">Subcompetency code</div><input id="rdx-fa-code" placeholder="e.g. PC2, SBP3" style="width:100%;padding:8px 12px;border:1px solid #CBD5E0;border-radius:8px;font-size:14px;font-family:inherit;box-sizing:border-box"><div style="display:flex;gap:8px;margin-top:10px"><button onclick="rdxFaSave()" style="padding:7px 16px;background:#2874A6;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">Add</button><button onclick="this.closest('div[style]').remove()" style="padding:7px 12px;background:#F1F5F9;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit">Cancel</button></div>';
  document.body.appendChild(inp);
  document.getElementById('rdx-fa-code').focus();
  window._rdxFaCallback = function(c) { code = c; };
  return; // rest handled by rdxFaSave
  code = null;
  if(code&&MD.subcompetencies[code.toUpperCase()]){selectedMilestones[code.toUpperCase()]=true;render()}
};
window.submitScore=function(){
  var scored=Object.keys(selectedLevel).length;
  var selected=Object.keys(selectedMilestones).filter(function(k){return selectedMilestones[k]}).length;
  if(scored<selected){rdxGenToast('Assign a level to all selected milestones');return}
  if(scored===0){rdxGenToast('Select and score at least one milestone first');return}
  submitted=true;render();
};
window.reset=function(){ctx=null;submitted=false;selectedMilestones={};selectedLevel={};render()};

render();
setTimeout(function(){var l=document.getElementById('rdx-loader');if(l){l.classList.add('hide');setTimeout(function(){l.remove()},300)}},400);
})();
</script>
<script src="js/dx-feedback.js"></script>
<script src="js/dx-user-bar.js"></script>
<script src="js/rdx-help-widget.js"></script>
<script src="js/rdx-nav.js"></script>
<script src="js/rdx-analytics-tracker.js">
function rdxGenToast(msg){var t=document.createElement('div');t.style.cssText='position:fixed;top:80px;right:20px;z-index:9999;background:#1B4F72;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.2);max-width:300px';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},2500);}

function rdxFaSave() {
  var code = (document.getElementById('rdx-fa-code')||{}).value||'';
  var panel = document.querySelector('div[style*="z-index:9999"]');
  if (panel) panel.remove();
  if (code && typeof addSubcompetency === 'function') addSubcompetency(code);
}
</script>
</body>
</html>
