<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements | Dx Learning Ecosystem</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dx-design-system.css">
    <style>
        .achievements-header{background:linear-gradient(135deg,#f59e0b 0%,#d97706 50%,#b45309 100%);padding:var(--dx-space-8) var(--dx-space-6);color:white;text-align:center}
        .achievements-header h1{font-size:var(--dx-text-3xl);font-weight:var(--dx-font-bold);margin-bottom:var(--dx-space-2)}
        .achievements-stats{display:flex;justify-content:center;gap:var(--dx-space-8);margin-top:var(--dx-space-6)}
        .ach-stat-value{font-size:var(--dx-text-3xl);font-weight:var(--dx-font-bold)}
        .ach-stat-label{font-size:var(--dx-text-sm);opacity:0.8}
        .main-content{max-width:1000px;margin:0 auto;padding:var(--dx-space-8) var(--dx-space-6)}
        .category-section{margin-bottom:var(--dx-space-10)}
        .category-title{font-size:var(--dx-text-xl);font-weight:var(--dx-font-semibold);color:var(--dx-text-primary);margin-bottom:var(--dx-space-4);display:flex;align-items:center;gap:var(--dx-space-2)}
        .badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:var(--dx-space-4)}
        .badge-card{background:var(--dx-bg-secondary);border:2px solid var(--dx-border-light);border-radius:var(--dx-radius-xl);padding:var(--dx-space-5);text-align:center;transition:all var(--dx-transition-base)}
        .badge-card:hover{transform:translateY(-4px);box-shadow:var(--dx-shadow-lg)}
        .badge-card.earned{background:linear-gradient(135deg,var(--dx-amber-50),var(--dx-amber-100));border-color:var(--dx-amber-400)}
        .badge-card.locked{opacity:0.5}
        .badge-card.locked .badge-icon{filter:grayscale(1)}
        .badge-icon{font-size:48px;margin-bottom:var(--dx-space-3);display:block}
        .badge-name{font-size:var(--dx-text-sm);font-weight:var(--dx-font-semibold);color:var(--dx-text-primary);margin-bottom:var(--dx-space-1)}
        .badge-desc{font-size:var(--dx-text-xs);color:var(--dx-text-secondary);margin-bottom:var(--dx-space-2)}
        .badge-status{font-size:10px;font-weight:var(--dx-font-semibold);padding:3px 10px;border-radius:var(--dx-radius-full);display:inline-block}
        .badge-card.earned .badge-status{background:var(--dx-green-100);color:var(--dx-green-600)}
        .badge-card.locked .badge-status{background:var(--dx-bg-tertiary);color:var(--dx-text-tertiary)}
        .footer{text-align:center;padding:var(--dx-space-8) var(--dx-space-6);color:var(--dx-text-tertiary);font-size:var(--dx-text-sm);border-top:1px solid var(--dx-border-light)}
        .footer a{color:var(--dx-blue-500);text-decoration:none}
    </style>
    <link rel="stylesheet" href="dx-unified-nav.css">
</head>
<body>
    <!-- Unified Navigation -->
    <div id="dx-nav"></div>
    
    <header class="achievements-header">
        <h1>🏆 Achievements</h1>
        <p>Track your progress and unlock badges as you learn</p>
        <div class="achievements-stats">
            <div><div class="ach-stat-value" id="earnedCount">0</div><div class="ach-stat-label">Earned</div></div>
            <div><div class="ach-stat-value" id="totalCount">20</div><div class="ach-stat-label">Total</div></div>
            <div><div class="ach-stat-value" id="completionPercent">0%</div><div class="ach-stat-label">Complete</div></div>
        </div>
    </header>
    
    <main class="main-content">
        <section class="category-section">
            <h2 class="category-title">🚀 Getting Started</h2>
            <div class="badge-grid" id="startBadges"></div>
        </section>
        <section class="category-section">
            <h2 class="category-title">📋 Case Mastery</h2>
            <div class="badge-grid" id="caseBadges"></div>
        </section>
        <section class="category-section">
            <h2 class="category-title">📚 Module Excellence</h2>
            <div class="badge-grid" id="moduleBadges"></div>
        </section>
        <section class="category-section">
            <h2 class="category-title">🔥 Consistency</h2>
            <div class="badge-grid" id="streakBadges"></div>
        </section>
        <section class="category-section">
            <h2 class="category-title">⭐ Milestones</h2>
            <div class="badge-grid" id="milestoneBadges"></div>
        </section>
    </main>
    
    <footer class="footer">
        <p><a href="dx-dashboard.html">← Back to Dashboard</a></p>
    </footer>

<script src="js/dx-scoring.js"></script>
<script>
const ALL_ACHIEVEMENTS = {
    start: [
        {id:'first_case',icon:'🎯',name:'First Steps',desc:'Complete your first case'},
        {id:'first_module',icon:'📖',name:'Knowledge Seeker',desc:'Complete a module'},
        {id:'first_session',icon:'💬',name:'Coach Starter',desc:'First CoachDx session'},
        {id:'cross_platform',icon:'🌐',name:'Explorer',desc:'Use all 3 platforms'}
    ],
    cases: [
        {id:'perfect_case',icon:'💯',name:'Perfect Score',desc:'100% on a case'},
        {id:'cases_10',icon:'📋',name:'Case Veteran',desc:'Complete 10 cases'},
        {id:'cases_50',icon:'🏆',name:'Case Champion',desc:'Complete 50 cases'},
        {id:'cases_100',icon:'👑',name:'Case Master',desc:'Complete 100 cases'}
    ],
    modules: [
        {id:'perfect_module',icon:'⭐',name:'Module Master',desc:'Perfect score on module'},
        {id:'mcqs_100',icon:'✅',name:'Question Crusher',desc:'100 correct MCQs'},
        {id:'mcqs_500',icon:'🧠',name:'MCQ Expert',desc:'500 correct MCQs'},
        {id:'all_specialties',icon:'🎓',name:'Polymath',desc:'Complete all specialties'}
    ],
    streaks: [
        {id:'streak_7',icon:'🔥',name:'Week Warrior',desc:'7 day streak'},
        {id:'streak_30',icon:'🌟',name:'Month Master',desc:'30 day streak'},
        {id:'streak_100',icon:'💎',name:'Centurion',desc:'100 day streak'},
        {id:'streak_365',icon:'🏅',name:'Year Champion',desc:'365 day streak'}
    ],
    milestones: [
        {id:'level_10',icon:'🎖️',name:'Rising Star',desc:'Reach Level 10'},
        {id:'level_20',icon:'👑',name:'Expert',desc:'Reach Level 20'},
        {id:'level_50',icon:'🌟',name:'Legend',desc:'Reach Level 50'},
        {id:'well_calibrated',icon:'⚖️',name:'Well Calibrated',desc:'Accurate confidence'}
    ]
};

function init() {
    let earned = [];
    if (typeof DxScoring !== 'undefined') {
        earned = DxScoring.getUnlockedAchievements();
    }
    
    const total = Object.values(ALL_ACHIEVEMENTS).flat().length;
    document.getElementById('earnedCount').textContent = earned.length;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('completionPercent').textContent = Math.round((earned.length/total)*100) + '%';
    
    Object.entries(ALL_ACHIEVEMENTS).forEach(([cat, badges]) => {
        const containerId = cat === 'start' ? 'startBadges' : 
                           cat === 'cases' ? 'caseBadges' : 
                           cat === 'modules' ? 'moduleBadges' : 
                           cat === 'streaks' ? 'streakBadges' : 'milestoneBadges';
        const container = document.getElementById(containerId);
        container.innerHTML = badges.map(b => `
            <div class="badge-card ${earned.includes(b.id) ? 'earned' : 'locked'}">
                <span class="badge-icon">${b.icon}</span>
                <div class="badge-name">${b.name}</div>
                <div class="badge-desc">${b.desc}</div>
                <span class="badge-status">${earned.includes(b.id) ? '✓ Earned' : 'Locked'}</span>
            </div>
        `).join('');
    });
}

document.addEventListener('DOMContentLoaded', init);
</script>

    <script src="dx-unified-nav.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof DxNav !== 'undefined') {
                DxNav.init({ currentPage: 'reason', basePath: '' });
            }
        });
    </script>
</body>
</html>
