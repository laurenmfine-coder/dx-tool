:root{--bg:#F8FAFC;--surface:#fff;--border:#E2E8F0;--text:#1E293B;--ts:#64748B;--tm:#94A3B8;

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--bg);color:var(--text);padding-top:52px}

.hero{background:linear-gradient(135deg,#0d2b3e,#1B4F72 50%,#2874A6);padding:36px 24px 28px;text-align:center;position:relative}
.hero h1{font-size:1.6rem;font-weight:700;color:#fff;letter-spacing:-.02em}
.hero p{font-size:.88rem;color:rgba(255,255,255,.6);margin-top:4px}

/* Mode toggle */
.modes{display:flex;justify-content:center;gap:4px;margin-top:18px;background:rgba(0,0,0,.2);border-radius:10px;padding:4px;max-width:560px;margin-left:auto;margin-right:auto}
.mode-btn{flex:1;padding:10px 8px;border:none;border-radius:8px;background:transparent;color:rgba(255,255,255,.65);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap;text-align:center;line-height:1.3}
.mode-btn:hover{color:#fff}
.mode-btn.on{background:rgba(255,255,255,.15);color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.mode-sub{font-size:.6rem;display:block;opacity:.55;margin-top:2px;font-weight:400;letter-spacing:.02em}

.container{max-width:1200px;margin:0 auto;padding:20px}

/* Shared filter bar */
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;box-shadow:var(--shadow)}
.search{flex:1;min-width:200px;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;font-family:inherit;outline:none;transition:border .15s}
.search:focus{border-color:var(--blue)}
.fbtn{padding:6px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);font-size:.76rem;font-weight:600;color:var(--ts);cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:var(--blue);color:var(--blue)}
.fbtn.on{background:var(--blue);border-color:var(--blue);color:#fff}
#filterBtns{display:contents}

.count{font-size:.78rem;color:var(--tm);margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:11px}
.empty{text-align:center;padding:48px;color:var(--tm);font-size:.88rem}

/* Universal card */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:all .18s;position:relative}
.card:hover{border-color:var(--blue);box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.card-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.card-badge{min-width:36px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0}
.badge-sim{background:var(--blue-l);color:var(--blue-d)}
.badge-prac{background:var(--green-l);color:var(--green)}
.badge-coach{background:var(--purple-l);color:var(--purple)}
.badge-learn{background:var(--orange-l);color:var(--orange)}
.card-title{font-size:.92rem;font-weight:700;color:var(--text);line-height:1.3}
.card-sub{font-size:.76rem;color:var(--ts);margin-top:2px;line-height:1.4}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.tag{font-size:.62rem;font-weight:600;padding:2px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px;background:#F1F5F9;color:var(--tm)}
.tag-cat{background:var(--blue-l);color:var(--blue-d)}
.tag-featured{background:var(--purple-l);color:var(--purple)}

@media(max-width:640px){.grid{grid-template-columns:1fr}.filters{flex-direction:column}.search{min-width:auto}.modes{flex-wrap:wrap}}

  }).join('');
  // Reset all button
  document.querySelector('.fbtn[data-cat="all"]').classList.add('on');
  render();
}

function setCat(c) {
  CAT = c;
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.toggle('on',b.dataset.cat===c);});
  render();
}

function getData() {
  if (MODE === 'simulate') return SIM_FEATURED.concat(SIM_DATA);
  if (MODE === 'practice') return PRAC_DATA;
  if (MODE === 'coach') return COACH_DATA;
  if (MODE === 'learn') return LEARN_DATA;
  return [];
}

function render() {
  var q = (document.getElementById('searchInput').value||'').toLowerCase().trim();
  var data = getData();
  var filtered = data.filter(function(c) {
    if (CAT !== 'all' && c.cat !== CAT) return false;
    if (q) {
      var searchable = (c.title + ' ' + (c.sub||'') + ' ' + c.cat + ' ' + (c.tags||'') + ' ' + (c.search||'')).toLowerCase();
      return searchable.includes(q);
    }
    return true;
  });

  // Sort
  if (MODE === 'simulate' || MODE === 'practice') {
    filtered.sort(function(a,b) {
      if (a.featured && !b.featured) return -1;
      if (!a.featured && b.featured) return 1;
      return (a.acuity||3) !== (b.acuity||3) ? (a.acuity||3) - (b.acuity||3) : a.title.localeCompare(b.title);
    });
  } else {
    filtered.sort(function(a,b){ return a.title.localeCompare(b.title); });
  }

  document.getElementById('count').textContent = filtered.length + ' ' + (MODE === 'coach' ? 'topics' : MODE === 'learn' ? 'modules' : 'cases');
  var grid = document.getElementById('grid');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    document.getElementById('empty').style.display = 'block';
    return;
  }
  document.getElementById('empty').style.display = 'none';

  grid.innerHTML = filtered.map(function(c) {
    var badgeClass = MODE === 'simulate' ? 'badge-sim' : MODE === 'practice' ? 'badge-prac' : MODE === 'coach' ? 'badge-coach' : 'badge-learn';
    var badgeText = MODE === 'simulate' ? 'ESI '+(c.acuity||3) : MODE === 'practice' ? 'EMR' : MODE === 'coach' ? 'Coach' : 'Learn';
    var catLabel = (c.cat||'').charAt(0).toUpperCase() + (c.cat||'').slice(1);

    var h = '<div class="card" onclick="launch(\''+esc(c.id)+'\')">';
    h += '<div class="card-top">';
    h += '<div class="card-badge '+badgeClass+'">'+badgeText+'</div>';
    h += '<div><div class="card-title">'+esc(c.title)+'</div>';
    if (c.sub) h += '<div class="card-sub">'+esc(c.sub)+'</div>';
    h += '</div></div>';
    h += '<div class="card-tags">';
    h += '<span class="tag tag-cat">'+esc(catLabel)+'</span>';
    if (c.featured) h += '<span class="tag tag-featured">Featured</span>';
    h += '</div></div>';
    return h;
  }).join('');
}

function launch(id) {
  if (MODE === 'simulate') window.location.href = 'simulation-engine.html?case=' + encodeURIComponent(id);
  else if (MODE === 'practice') window.location.href = 'virtual-emr.html?case=' + encodeURIComponent(id);
  else if (MODE === 'coach') {
    // CoachDx uses topic name, not ID
    var topic = COACH_DATA.find(function(t) { return t.id === id; });
    var name = topic ? topic.title : id;
    window.location.href = 'CoachDx/mentor-chat.html?topic=' + encodeURIComponent(name);
  }
  else if (MODE === 'learn') window.location.href = 'mechanism/' + id + '.html';
}

function esc(s) { if(!s)return''; var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// Init — check URL param
var _initMode = new URLSearchParams(window.location.search).get('mode') || 'simulate';
if (['simulate','practice','coach','learn'].indexOf(_initMode) === -1) _initMode = 'simulate';
setMode(_initMode);
</script>
</body>
</html>
