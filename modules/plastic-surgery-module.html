<!DOCTYPE html><html lang="en"><head><script>(function(){var K="reasondx-user";function g(){var d=(location.pathname.match(/\//g)||[]).length-1,p="";for(var i=0;i<d;i++)p+="../";return p+"auth/login.html"}function a(){try{var u=localStorage.getItem(K);if(u){var j=JSON.parse(u);return j&&j.email&&j.name}}catch(e){}return false}if(!a()){sessionStorage.setItem("reasondx-redirect",location.href);location.replace(g())}})();</script><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Plastic Surgery | ReasonDx Module</title><style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#3B82F6;--success:#10B981;--danger:#DC2626;--info:#8B5CF6}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#1E3A5F,#3B82F6);padding:12px 20px;position:sticky;top:0;z-index:100;color:#fff}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:900px;margin:0 auto;flex-wrap:wrap;gap:8px}.header-title{font-size:1.1rem;font-weight:600}.badge{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:4px;font-size:.7rem;margin-left:10px}.stats{display:flex;gap:12px}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.progress-bar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin-bottom:20px}.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase;letter-spacing:1px}.card-title{font-size:1.5rem;font-weight:700;margin-top:4px}.card-body{padding:24px}.narrative{background:linear-gradient(135deg,rgba(59,130,246,.1),rgba(139,92,246,.1));border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px;white-space:pre-line}.hl{background:rgba(59,130,246,.3);padding:2px 6px;border-radius:4px;font-weight:500}.choices{display:grid;gap:12px;margin-top:20px}.choice{background:var(--card);border:2px solid var(--border);padding:16px;border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .2s}.choice:hover{border-color:var(--accent);transform:translateX(4px)}.choice.correct{border-color:var(--success);background:rgba(16,185,129,.2);pointer-events:none}.choice.wrong{border-color:var(--danger);background:rgba(220,38,38,.2);pointer-events:none}.choice-icon{font-size:1.5rem}.choice-title{font-weight:600}.teaching{background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);border-radius:12px;padding:16px;margin:20px 0}.teaching h4{color:var(--info);margin-bottom:8px}.alert{padding:16px;border-radius:12px;margin:20px 0;display:flex;gap:12px}.alert.info{background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3)}.btn{padding:12px 24px;border-radius:10px;font-weight:600;cursor:pointer;border:none;font-size:1rem}.btn-primary{background:var(--accent);color:#fff}.btn:hover{opacity:.9}.hidden{display:none!important}.cross-links{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:20px}.cross-link{padding:14px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:10px;text-decoration:none;color:var(--text)}.cross-link:hover{border-color:var(--accent)}.cross-link-title{font-weight:600;font-size:.9rem}@media(max-width:480px){.main{padding:12px}.card-body{padding:16px}}</style><script src="../dx-user-bar.js" defer></script>
</head><body>
<div class="header"><div class="header-row"><div class="header-title">&#128218; Plastic Surgery<span class="badge">EMERGENCY MEDICINE / SURGERY</span></div><div class="stats"><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Score</div></div><div class="stat"><div class="stat-value" id="stageNum">1/1</div><div class="stat-label">Stage</div></div></div></div></div>
<div class="main"><div class="progress-bar"><div class="progress-fill" id="progress" style="width:100%"></div></div>
<div id="s1" class="stage hidden"><div class="card"><div class="card-header"><div class="card-phase">Stage 1 of 1</div><div class="card-title">&#127891; Summary &amp; Key Takeaways</div></div><div class="card-body"><h3 style="color:var(--accent);margin:0 0 12px">Key Takeaways</h3><h3 style="color:var(--info);margin:24px 0 12px">References</h3><div class="cross-links"></div><div style="text-align:center;margin-top:30px"><div style="font-size:4rem">&#127891;</div><div style="font-size:2rem;font-weight:700;color:var(--success);margin:16px 0">Module Complete!</div><p style="color:var(--muted);margin-bottom:20px">Score: <span id="finalScore">0</span> / 0</p><button class="btn btn-primary" onclick="location.reload()">Restart</button></div></div></div></div>
<script>let score=0,total=1;const crtId='plastic-surgery-module';function pick(el,sn){const all=el.parentElement.querySelectorAll('.choice');all.forEach(c=>{c.style.pointerEvents='none';c.style.opacity='.6'});el.style.opacity='1';const correct=el.dataset.correct==='true';el.classList.add(correct?'correct':'wrong');if(correct){score+=100;document.getElementById('score').textContent=score;try{var cs=JSON.parse(localStorage.getItem('crtScores')||'{}');if(!cs[crtId])cs[crtId]={attempts:0,best:0,last:null};cs[crtId].last=new Date().toISOString();var pts=score/100;if(pts>cs[crtId].best)cs[crtId].best=pts;localStorage.setItem('crtScores',JSON.stringify(cs))}catch(e){}}if(!correct){all.forEach(c=>{if(c.dataset.correct==='true')c.classList.add('correct')})}const fbDiv=document.getElementById('fbText'+sn);if(fbDiv){fbDiv.style.background=correct?'rgba(16,185,129,.15)':'rgba(220,38,38,.15)';fbDiv.style.border='1px solid '+(correct?'rgba(16,185,129,.3)':'rgba(220,38,38,.3)');fbDiv.innerHTML=(correct?'&#9989; ':'&#10060; ')+el.dataset.fb;document.getElementById('fb'+sn).classList.remove('hidden')}}function next(n){document.querySelectorAll('.stage').forEach(s=>s.classList.add('hidden'));document.getElementById('s'+n).classList.remove('hidden');document.getElementById('stageNum').textContent=n+'/'+total;document.getElementById('progress').style.width=Math.round(n/total*100)+'%';window.scrollTo(0,0);if(n===total){document.getElementById('finalScore').textContent=score;try{var cs=JSON.parse(localStorage.getItem('crtScores')||'{}');if(!cs[crtId])cs[crtId]={attempts:0,best:0,last:null};cs[crtId].attempts++;cs[crtId].completed=true;cs[crtId].last=new Date().toISOString();var pts=score/100;if(pts>cs[crtId].best)cs[crtId].best=pts;localStorage.setItem('crtScores',JSON.stringify(cs))}catch(e){}}}</script>
