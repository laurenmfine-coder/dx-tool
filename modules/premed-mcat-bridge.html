*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--rdx-font);background:var(--pm-bg);color:var(--pm-text);line-height:1.6;}
.header{background:linear-gradient(135deg,#ea580c,#c2410c);padding:24px;color:#fff;display:flex;align-items:center;gap:16px;}

.search-bar{position:relative;margin-bottom:16px;}
.search-bar input{width:100%;padding:14px 18px 14px 44px;border:2px solid var(--pm-border);border-radius:12px;font-family:inherit;font-size:15px;background:var(--pm-card);transition:.2s;}
.search-bar input:focus{outline:none;border-color:var(--pm-orange);box-shadow:0 0 0 3px rgba(234,88,12,.1);}
.search-bar::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
.filter-btn{padding:8px 16px;border-radius:20px;border:1.5px solid var(--pm-border);background:var(--pm-card);font-size:13px;cursor:pointer;font-weight:600;transition:.2s;font-family:inherit;}
.filter-btn.active{background:var(--pm-orange);color:#fff;border-color:var(--pm-orange);}
.filter-btn:hover{border-color:var(--pm-orange);}
.stats{display:flex;gap:12px;margin-bottom:20px;font-size:13px;color:var(--pm-muted);}
.stats span{background:var(--pm-card);padding:6px 14px;border-radius:8px;border:1px solid var(--pm-border);}
.bridge-card{background:var(--pm-card);border:1px solid var(--pm-border);border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:var(--pm-shadow);transition:.2s;cursor:pointer;}
.bridge-card:hover{border-color:var(--pm-orange);box-shadow:0 2px 8px rgba(234,88,12,.1);}

<div class="container">
<div class="intro">Your prereq courses ARE medical education. This tool maps MCAT topics to real clinical scenarios — so when you study biochemistry, you're also learning medicine.</div>
<div class="search-bar"><input type="text" id="search" placeholder="Search topics, diseases, or MCAT concepts..." oninput="render()"></div>

  <button class="filter-btn active" data-f="all" onclick="setFilter('all',this)">All</button>

<div class="footer"><a href="premed-challenges.html">🧩 Challenges</a> · <a href="premed-lesson-biostats.html">📊 Biostats</a> · <a href="premed-hub.html">← Hub</a> <a href="../index.html" style="color:#fff;text-decoration:none;opacity:.55;font-size:12px;margin-left:8px">ReasonDx Home →</a></div>
<script>
const B=[
// BIO/BIOCHEM
{topic:"Amino Acids & Protein Structure",section:"BB",mcat:"Structure, function, and classification of amino acids; primary through quaternary structure; denaturation",clinical:"Sickle cell disease — a SINGLE amino acid substitution (Glu→Val in β-globin) changes protein quaternary structure, causing RBC sickling under low O₂. This is why a genetics question is really a hematology question.",tags:["hematology","genetics","protein folding","hemoglobin"],diseases:["sickle cell disease","Marfan syndrome","cystic fibrosis"]},
{topic:"Enzyme Kinetics",section:"BB",mcat:"Michaelis-Menten kinetics; Vmax, Km; competitive and non-competitive inhibition; allosteric regulation",clinical:"Competitive inhibition is how many drugs work. Statins competitively inhibit HMG-CoA reductase (the rate-limiting enzyme in cholesterol synthesis). ACE inhibitors competitively block angiotensin-converting enzyme. Understanding Km shifts explains drug potency.",tags:["pharmacology","cardiology","lipids"],diseases:["hyperlipidemia","hypertension","heart failure"]},
{topic:"Glycolysis & Gluconeogenesis",section:"BB",mcat:"Steps of glycolysis; regulation by PFK-1; gluconeogenesis; Cori cycle; pyruvate metabolism",clinical:"Diabetic ketoacidosis (DKA): without insulin, glucose can't enter cells → cells burn fat → ketone bodies accumulate → metabolic acidosis. Understanding why DKA produces an anion gap requires knowing both glycolysis blockade and fatty acid oxidation.",tags:["endocrinology","emergency medicine","metabolism"],diseases:["diabetes mellitus","DKA","lactic acidosis"]},
{topic:"Citric Acid Cycle & Oxidative Phosphorylation",section:"BB",mcat:"TCA cycle intermediates; electron transport chain; ATP yield; oxidative vs substrate-level phosphorylation",clinical:"Cyanide poisoning blocks Complex IV of the ETC. Cells can't use O₂ even though it's present → lactic acidosis despite normal O₂ saturation. Treatment: hydroxocobalamin binds cyanide. Also explains why carbon monoxide is lethal — it blocks hemoglobin AND cytochrome oxidase.",tags:["toxicology","emergency medicine","metabolism"],diseases:["cyanide poisoning","CO poisoning","mitochondrial diseases"]},
{topic:"DNA Replication & Repair",section:"BB",mcat:"DNA polymerase; leading/lagging strand; mismatch repair; nucleotide excision repair; telomeres",clinical:"Lynch syndrome — defective mismatch repair genes (MLH1, MSH2) → microsatellite instability → dramatically increased colorectal cancer risk. Understanding DNA repair mechanisms explains why some cancers cluster in families and how genetic testing guides cancer screening.",tags:["oncology","genetics","gastroenterology"],diseases:["Lynch syndrome","xeroderma pigmentosum","BRCA cancers"]},
{topic:"Transcription & Translation",section:"BB",mcat:"RNA polymerase; promoters; splicing; codons; ribosomes; post-translational modification",clinical:"Antibiotics exploit differences between prokaryotic and eukaryotic translation. Tetracyclines block the 30S ribosomal subunit; macrolides block 50S. This is why they kill bacteria without harming human cells — different ribosomes, different targets.",tags:["pharmacology","infectious disease","microbiology"],diseases:["bacterial infections","antibiotic resistance","thalassemia"]},
{topic:"Mendelian Genetics",section:"BB",mcat:"Autosomal dominant/recessive; X-linked; penetrance; expressivity; Punnett squares",clinical:"Cystic fibrosis is autosomal recessive (CFTR mutation) — both parents can be carriers with no symptoms. Genetic counseling uses Hardy-Weinberg to calculate carrier frequency. Huntington's is autosomal dominant with age-dependent penetrance — knowing the inheritance pattern changes how you counsel families.",tags:["genetics","pulmonology","pediatrics"],diseases:["cystic fibrosis","Huntington disease","sickle cell disease","hemophilia"]},
{topic:"Immune System",section:"BB",mcat:"Innate vs adaptive immunity; T cells, B cells; MHC I/II; antibody structure; complement; hypersensitivity",clinical:"Type I hypersensitivity (IgE-mediated) causes anaphylaxis — mast cell degranulation → histamine release → vasodilation, bronchospasm, edema. Treatment: epinephrine (reverses vasodilation + bronchospasm). Understanding MHC explains why organ transplant rejection occurs and why HLA matching matters.",tags:["allergy","immunology","transplant"],diseases:["anaphylaxis","autoimmune diseases","transplant rejection","HIV/AIDS"]},
{topic:"Endocrine System",section:"BB",mcat:"Hypothalamic-pituitary axis; feedback loops; steroid vs peptide hormones; signal transduction",clinical:"Negative feedback loops explain most endocrine pathology. Hypothyroidism: low T3/T4 → high TSH (pituitary trying harder). Cushing's disease: pituitary adenoma → high ACTH → high cortisol → but ACTH doesn't suppress. The feedback loop tells you WHERE the problem is.",tags:["endocrinology","physiology","pharmacology"],diseases:["hypothyroidism","Cushing syndrome","Addison disease","diabetes"]},
{topic:"Cardiac Physiology",section:"BB",mcat:"Cardiac cycle; action potentials; Frank-Starling mechanism; cardiac output; baroreceptor reflex",clinical:"Heart failure: the Frank-Starling curve shifts downward — the heart can't increase stroke volume with increased preload. This explains fluid overload symptoms (edema, dyspnea). Digoxin increases contractility (shifts curve up); diuretics reduce preload (move left on the curve).",tags:["cardiology","physiology","pharmacology"],diseases:["heart failure","atrial fibrillation","cardiogenic shock"]},
{topic:"Renal Physiology",section:"BB",mcat:"Nephron structure; filtration, reabsorption, secretion; countercurrent multiplier; RAAS; acid-base",clinical:"Diuretics target specific nephron segments: loop diuretics (furosemide) block Na-K-2Cl in the thick ascending limb; thiazides block Na-Cl in the DCT. Understanding where each drug acts predicts its electrolyte side effects — furosemide wastes potassium, spironolactone saves it.",tags:["nephrology","pharmacology","physiology"],diseases:["hypertension","heart failure","kidney disease","metabolic alkalosis"]},
{topic:"Respiratory Physiology",section:"BB",mcat:"Gas exchange; hemoglobin-oxygen dissociation; ventilation-perfusion matching; lung compliance",clinical:"The oxyhemoglobin dissociation curve explains why small changes matter. A right shift (fever, acidosis, high 2,3-BPG) releases more O₂ to tissues — helpful in exercising muscles. Left shift (CO, fetal hemoglobin) holds O₂ tighter. This is why CO poisoning is dangerous even with 'normal' O₂ saturation.",tags:["pulmonology","emergency medicine","physiology"],diseases:["COPD","asthma","PE","pneumonia","ARDS"]},
{topic:"Microbiology & Infectious Disease",section:"BB",mcat:"Bacterial structure; viral replication; fungi; parasites; virulence factors; biofilms",clinical:"Gram stain is the first branch point in infectious disease reasoning: Gram-positive (purple, thick peptidoglycan) vs Gram-negative (pink, outer membrane with LPS). This single test narrows antibiotic choice from hundreds to a handful. Viral replication cycle explains why antivirals target specific steps.",tags:["infectious disease","microbiology","pharmacology"],diseases:["pneumonia","UTI","meningitis","sepsis","HIV"]},
{topic:"Lipid Metabolism & Membranes",section:"BB",mcat:"Fatty acid oxidation; ketogenesis; cholesterol synthesis; membrane fluidity; lipoproteins",clinical:"Understanding LDL vs HDL is clinical cardiology. LDL delivers cholesterol to vessel walls (atherogenic); HDL removes it (protective). Statins block HMG-CoA reductase → less cholesterol synthesis → liver upregulates LDL receptors → lower serum LDL. The biochemistry IS the pharmacology.",tags:["cardiology","pharmacology","metabolism"],diseases:["atherosclerosis","familial hypercholesterolemia","metabolic syndrome"]},

// CHEM/PHYSICS
{topic:"Acid-Base Chemistry",section:"CP",mcat:"pH, pKa, buffers; Henderson-Hasselbalch; titration curves; strong vs weak acids",clinical:"Arterial blood gas (ABG) interpretation uses Henderson-Hasselbalch in real time. pH 7.28, pCO₂ 60, HCO₃ 26 = respiratory acidosis (COPD exacerbation). pH 7.50, pCO₂ 28, HCO₃ 22 = respiratory alkalosis (hyperventilation/anxiety). Every ICU decision involves acid-base balance.",tags:["critical care","pulmonology","nephrology"],diseases:["DKA","COPD","renal tubular acidosis","salicylate toxicity"]},
{topic:"Electrochemistry & Membrane Potentials",section:"CP",mcat:"Nernst equation; Goldman equation; electrochemical gradients; galvanic cells",clinical:"The Nernst equation explains the resting membrane potential of neurons and cardiomyocytes. Hyperkalemia (high K⁺) depolarizes the resting potential → widened QRS on EKG → risk of cardiac arrest. This is why potassium levels are monitored obsessively in hospitals — the Nernst equation is life or death.",tags:["cardiology","nephrology","emergency medicine"],diseases:["hyperkalemia","arrhythmias","long QT syndrome"]},
{topic:"Fluid Dynamics & Hemodynamics",section:"CP",mcat:"Bernoulli's equation; Poiseuille's law; viscosity; Reynolds number; continuity equation",clinical:"Poiseuille's law: flow is proportional to radius⁴. A 50% stenosis doesn't reduce flow by 50% — it reduces it by ~94% (0.5⁴ = 0.0625). This explains why atherosclerosis is asymptomatic until severe, then suddenly catastrophic. Also explains why small vessel vasospasm in Raynaud's causes dramatic symptoms.",tags:["cardiology","vascular surgery","physics"],diseases:["atherosclerosis","aortic stenosis","Raynaud phenomenon"]},
{topic:"Optics & Vision",section:"CP",mcat:"Refraction; lenses; thin lens equation; accommodation; visual acuity",clinical:"Myopia (nearsightedness): eyeball too long → image focuses in front of retina → corrected with diverging (concave) lens. Cataracts: lens protein denaturation → opacity → corrected by replacing the lens surgically. Glaucoma: increased intraocular pressure (fluid dynamics) damages the optic nerve.",tags:["ophthalmology","physics","surgery"],diseases:["myopia","cataracts","glaucoma","macular degeneration"]},
{topic:"Sound & Hearing",section:"CP",mcat:"Wave properties; resonance; decibels; Doppler effect; impedance matching",clinical:"Conductive vs sensorineural hearing loss — Weber and Rinne tests use tuning forks to differentiate. Conductive: bone conduction > air conduction (middle ear problem). Sensorineural: air > bone but both reduced (inner ear/nerve problem). Also: Doppler ultrasound uses the Doppler effect to measure blood flow velocity.",tags:["ENT","radiology","physics"],diseases:["otitis media","presbycusis","Meniere disease","acoustic neuroma"]},
{topic:"Nuclear Chemistry & Radioactivity",section:"CP",mcat:"Alpha, beta, gamma decay; half-life; nuclear medicine; radiation exposure",clinical:"PET scans use positron-emitting isotopes (¹⁸F-FDG) that accumulate in metabolically active tissue — cancer cells consume more glucose, so they light up. Half-life determines imaging timing. Radiation therapy uses targeted ionizing radiation to damage tumor DNA. Thyroid cancer treatment uses radioactive iodine (¹³¹I).",tags:["oncology","radiology","nuclear medicine"],diseases:["cancer staging","thyroid cancer","lymphoma"]},
{topic:"Thermodynamics & Metabolism",section:"CP",mcat:"Gibbs free energy; enthalpy; entropy; coupled reactions; ATP hydrolysis",clinical:"Metabolic rate and body temperature regulation. Fever: pyrogens raise the hypothalamic set point → increased metabolic rate (shivering) → ΔG drives more exothermic reactions → body temperature rises. Malignant hyperthermia: uncontrolled muscle metabolism (ΔG becomes maximally negative) → temperature >40°C → can be fatal.",tags:["physiology","anesthesiology","emergency medicine"],diseases:["fever","malignant hyperthermia","hypothermia","thyroid storm"]},
{topic:"Electricity & Bioelectricity",section:"CP",mcat:"Circuits; resistance; capacitance; RC circuits; current flow in biological systems",clinical:"The EKG is an electrical circuit diagram of the heart. The cardiac conduction system (SA node → AV node → bundle of His → Purkinje fibers) is a biological circuit. Heart blocks occur when resistance increases at the AV node. Pacemakers are artificial current sources that maintain the circuit.",tags:["cardiology","electrophysiology","physics"],diseases:["heart block","atrial fibrillation","Wolff-Parkinson-White"]},

// PSYCH/SOC
{topic:"Classical & Operant Conditioning",section:"PS",mcat:"Pavlov; Skinner; positive/negative reinforcement/punishment; extinction; schedules of reinforcement",clinical:"Chronic pain management uses operant principles. Pain behaviors (guarding, limping) can be inadvertently reinforced by attention and opioid prescriptions (positive reinforcement of sick role). CBT for chronic pain uses extinction — gradually reducing avoidance behaviors. Understanding conditioning prevents iatrogenic chronification.",tags:["psychiatry","pain management","behavioral medicine"],diseases:["chronic pain","phobias","substance use disorders","OCD"]},
{topic:"Memory & Cognition",section:"PS",mcat:"Encoding, storage, retrieval; working memory; long-term memory types; schemas; heuristics",clinical:"Clinical reasoning IS applied cognitive psychology. Pattern recognition is schema-based retrieval. Anchoring bias is a heuristic failure. The availability heuristic explains why physicians overdiagnose diseases they've seen recently. Understanding YOUR cognitive processes makes you a better diagnostician.",tags:["clinical reasoning","cognitive psychology","medical education"],diseases:["delirium","dementia","TBI","Alzheimer disease"]},
{topic:"Stress & the HPA Axis",section:"PS",mcat:"General adaptation syndrome; cortisol; sympathetic/parasympathetic; fight-or-flight; allostatic load",clinical:"Chronic stress → sustained HPA axis activation → elevated cortisol → immunosuppression, insulin resistance, hippocampal atrophy. This is the biological mechanism behind 'stress makes you sick.' Cushing syndrome is what happens when cortisol stays high: weight gain, diabetes, osteoporosis, depression.",tags:["endocrinology","psychiatry","preventive medicine"],diseases:["Cushing syndrome","PTSD","depression","metabolic syndrome"]},
{topic:"Social Determinants of Health",section:"PS",mcat:"SES and health; healthcare disparities; health literacy; cultural competence; social institutions",clinical:"Zip code predicts life expectancy better than genetic code. A patient with diabetes who lives in a food desert, works two jobs, and can't afford medications faces barriers that no prescription can fix. Understanding SDOH transforms how you approach every patient — treatment plans must account for social context.",tags:["public health","preventive medicine","health equity"],diseases:["diabetes","hypertension","obesity","infant mortality"]},
{topic:"Abnormal Psychology",section:"PS",mcat:"Anxiety, mood, psychotic, personality, and substance use disorders; biological and psychological perspectives; DSM criteria",clinical:"Major depressive disorder affects 1 in 5 adults. The biopsychosocial model integrates neurotransmitter theory (serotonin, norepinephrine), cognitive theory (negative thought patterns), and social context (isolation, loss, trauma). SSRIs block serotonin reuptake; CBT restructures cognition. Both work. Both together work better.",tags:["psychiatry","pharmacology","behavioral medicine"],diseases:["depression","anxiety","schizophrenia","bipolar disorder","PTSD"]},
{topic:"Developmental Psychology",section:"PS",mcat:"Piaget; Erikson; Kohlberg; attachment theory; aging and cognitive decline",clinical:"Pediatrics IS developmental psychology applied. A 2-year-old in Piaget's preoperational stage can't understand 'the medicine will help your tummy' — they need concrete demonstrations. Erikson's stages predict adolescent risk-taking (identity vs role confusion). Geriatrics uses cognitive staging to differentiate normal aging from dementia.",tags:["pediatrics","geriatrics","developmental psychology"],diseases:["autism spectrum disorder","ADHD","dementia","failure to thrive"]},
{topic:"Sociology of Medicine",section:"PS",mcat:"Sick role; medicalization; patient-physician relationship; stigma; social construction of illness",clinical:"Parsons' sick role theory explains patient behavior: illness grants temporary exemption from social obligations, but in exchange the patient must seek treatment and try to recover. When chronic illness breaks this model (no recovery), patients face social stigma. Understanding this prevents blaming patients for 'non-compliance.'",tags:["medical sociology","ethics","chronic disease"],diseases:["chronic pain","fibromyalgia","mental illness stigma"]},

// CARS
{topic:"Ethical Reasoning in Medicine",section:"CARS",mcat:"CARS passages frequently test ethical argumentation, competing values, author perspective on bioethics",clinical:"Autonomy vs beneficence is the central tension in clinical ethics. A Jehovah's Witness refusing blood transfusion: autonomy says respect the refusal; beneficence says save the life. There's no 'correct' answer — but there IS a structured approach (identify stakeholders, weigh principles, consider context).",tags:["medical ethics","clinical reasoning","MMI prep"],diseases:[]},
{topic:"Research Methods & Evidence",section:"CARS",mcat:"CARS passages test analysis of experimental design, identification of flaws, evaluation of conclusions vs data",clinical:"Journal club is how physicians evaluate new evidence. Every week, residents tear apart a study: Was it randomized? Blinded? What's the NNT? Are the conclusions supported? The critical analysis skills CARS tests are the EXACT skills you'll use evaluating medical evidence for the rest of your career.",tags:["evidence-based medicine","biostatistics","research"],diseases:[]},
{topic:"Health Policy & Public Health",section:"CARS",mcat:"CARS passages on healthcare systems, policy arguments, resource allocation, public health interventions",clinical:"Should a new $100,000 cancer drug that extends life by 2 months be covered by insurance? This requires analyzing competing arguments — economic, ethical, patient-centered, population-level. CARS trains the reasoning; clinical practice demands it daily in resource allocation, insurance pre-authorizations, and treatment planning.",tags:["health policy","public health","medical ethics"],diseases:[]},
{topic:"Philosophy of Science & Medicine",section:"CARS",mcat:"CARS passages on paradigm shifts, epistemology, limits of scientific knowledge, mind-body problem",clinical:"Evidence-based medicine has limits. Not everything can be randomized — you can't randomize smoking. Observational studies have confounders. Case reports generate hypotheses but don't prove causation. Understanding the philosophy of scientific evidence makes you appropriately skeptical of headlines and appropriately trusting of rigorous science.",tags:["epistemology","evidence-based medicine","research"],diseases:[]}
];

let currentFilter = 'all';
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}
function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let items = B;
  if (currentFilter !== 'all') items = items.filter(b => b.section === currentFilter);
  if (q) items = items.filter(b => 
    b.topic.toLowerCase().includes(q) || b.mcat.toLowerCase().includes(q) || 
    b.clinical.toLowerCase().includes(q) || b.tags.some(t => t.includes(q)) ||
    b.diseases.some(d => d.toLowerCase().includes(q))
  );
  document.getElementById('stats').innerHTML = `<span>Showing ${items.length} of ${B.length} bridges</span>`;
  if (!items.length) {
    document.getElementById('list').innerHTML = '<div class="empty">No matching topics. Try a different search term.</div>';
    return;
  }
  document.getElementById('list').innerHTML = items.map((b, i) => {
    const secClass = {BB:'sec-bb',CP:'sec-cp',PS:'sec-ps',CARS:'sec-cp'}[b.section];
    const secLabel = {BB:'Bio/Biochem',CP:'Chem/Physics',PS:'Psych/Soc',CARS:'CARS'}[b.section];
    return `<div class="bridge-card" onclick="this.querySelector('.bridge-clinical').classList.toggle('open')">
      <div class="bridge-top"><div class="bridge-topic">${b.topic}</div><span class="bridge-section ${secClass}">${secLabel}</span></div>
      <div class="bridge-mcat">📚 <strong>MCAT:</strong> ${b.mcat}</div>
      <div class="bridge-clinical" id="bc-${i}">
        <h4>🏥 Clinical Connection</h4>
        <p>${b.clinical}</p>
        ${b.diseases.length ? `<h4>Related Conditions</h4><div class="bridge-tags">${b.diseases.map(d => `<span class="btag">${d}</span>`).join('')}</div>` : ''}
        <div class="bridge-tags" style="margin-top:8px;">${b.tags.map(t => `<span class="btag" style="background:#fff7ed;color:#ea580c;">#${t}</span>`).join('')}</div>
      </div>
    </div>`;
  }).join('');
}
render();
</script>
