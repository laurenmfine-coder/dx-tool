<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Static Overlay Test</title>
<style>
.loading-overlay{
  position:fixed;
  top:0;
  right:0;
  bottom:0;
  left:0;
  background:linear-gradient(135deg,#0a1929 0%,#0d2b3e 100%);
  z-index:9999;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:24px;
}
.loading-spinner{
  width:60px;
  height:60px;
  border:4px solid rgba(40,116,166,0.2);
  border-top-color:#2874A6;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{
  color:#fff;
  font-size:18px;
  font-weight:600;
}
</style>
</head>
<body>

<!-- This overlay should ALWAYS be visible - NO JavaScript to hide it -->
<div class="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading Overlay Test - This Should Always Be Visible</div>
  <div style="color:rgba(255,255,255,0.6);font-size:14px;text-align:center;">
    If you can see this, the overlay IS working!<br>
    If you see the text below instead, the overlay is NOT working.
  </div>
</div>

<div style="padding:40px;font-family:sans-serif;">
  <h1>YOU SHOULD NOT SEE THIS TEXT</h1>
  <p>The overlay should cover this completely.</p>
</div>

<!-- NO JAVASCRIPT AT ALL - overlay stays forever -->

</body>
</html>
