<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ReasonDx — Clinical Reasoning Assessment</title>
<link rel="icon" href="favicon.ico">
<script src="emr-data/crt-index.js"></script>
<script src="rdx-profession-onboarding.js"></script>
<script src="rdx-study-sequencer.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh}
.hdr{background:#2874A6;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:12px}
.hdr h1{font-size:1.05rem;font-weight:600}
.hdr .prog-txt{margin-left:auto;font-size:0.82rem;opacity:.9}
.body{max-width:760px;margin:28px auto;padding:0 20px}
.card{background:#fff;border-radius:12px;padding:24px;border:1px solid #e2e8f0;margin-bottom:14px}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.07)}
.layer-banner{border-radius:10px;padding:14px 18px;margin-bottom:18px;font-size:.88rem;font-weight:500}
.layer-banner.l1{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
.layer-banner.l2{background:#F0FDF4;color:#15803D;border:1px solid #BBF7D0}
.layer-banner.l3{background:#FFF7ED;color:#C2410C;border:1px solid #FED7AA}
.case-num{font-size:.72rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.case-cc{font-size:1rem;font-weight:600;color:#1e293b;margin-bottom:8px}
.case-q{color:#475569;font-size:.88rem;line-height:1.55;margin-bottom:14px;border-left:3px solid #2874A6;padding-left:10px}
.btn{background:#2874A6;color:#fff;border:none;padding:9px 18px;border-radius:7px;font-size:.88rem;font-weight:500;cursor:pointer;transition:background .2s}
.btn:hover{background:#1a5c8a}
.btn.done-btn{background:#16a34a}
.badge-done{color:#16a34a;font-size:.85rem;font-weight:500}
.prog-bar{width:100%;height:5px;background:#e2e8f0;border-radius:3px;margin:14px 0;overflow:hidden}
.prog-fill{height:100%;background:#2874A6;border-radius:3px;transition:width .4s}
.complete-wrap{text-align:center;padding:48px 24px}
.complete-wrap h2{font-size:1.4rem;color:#2874A6;margin-bottom:10px}
.complete-wrap p{color:#475569;max-width:480px;margin:0 auto 20px;line-height:1.6}
.intro h2{font-size:1.2rem;color:#2874A6;margin-bottom:10px}
.intro p{color:#475569;line-height:1.6;margin-bottom:8px;font-size:.92rem}
.time-badge{display:inline-block;background:#EFF6FF;color:#1D4ED8;padding:3px 10px;border-radius:20px;font-size:.82rem;font-weight:500;margin-top:6px}
</style>
</head>
<body>
<div class="hdr">
  <span style="font-size:1.3rem">🧠</span>
  <h1>Clinical Reasoning Assessment Protocol</h1>
  <div class="prog-txt" id="hdr-prog"></div>
</div>
<div class="body" id="sp-body"></div>

<script>
var state = null;
var profile = null;

function loadProfile() {
  try { profile = JSON.parse(localStorage.getItem('reasondx-user')||'{}'); }
  catch(e) { profile = {}; }
}

function getLayerBannerClass(phase) {
  if (phase==='layer2') return 'l2';
  if (phase==='layer3') return 'l3';
  return 'l1';
}

function getLayerDescription(state) {
  if (state.phase==='not_started') return {
    cls:'l1',
    text:'Part 1 of 3 — Core Clinical Reasoning Cases (all students) · ' +
         state.nextCases.length + ' cases · ~40 min'
  };
  if (state.phase==='layer1') return {
    cls:'l1',
    text:'Part 1 of 3 — Core Cases · ' +
         (state.totalRequired - state.nextCases.length - (state.totalRequired - state.nextCases.length - state.completed)) +
         ' remaining'
  };
  if (state.phase==='layer2') return {
    cls:'l2',
    text:'Part 2 — ' + (state.layerLabel||'Extension Cases') + ' · ' +
         state.nextCases.length + ' cases · ~15 min · Based on your prior clinical background'
  };
  if (state.phase==='layer3') return {
    cls:'l3',
    text:'Part 3 — Cross-Disciplinary Cases (all students) · ' +
         state.nextCases.length + ' cases · ~15 min'
  };
  return null;
}

function markComplete(caseId) {
  state = RDXStudySequencer.markCaseComplete(caseId);
  loadProfile();
  render();
}

function launchCase(caseId) {
  var url = 'simulation-engine.html?case='+encodeURIComponent(caseId)+'&mode=study';
  var win = window.open(url,'_blank');
  window.addEventListener('message', function handler(e) {
    if (e.data && e.data.type==='rdx-case-complete' && e.data.caseId===caseId) {
      markComplete(caseId);
      window.removeEventListener('message', handler);
    }
  });
  // Fallback: mark complete after 3 min if no postMessage
  setTimeout(function(){
    if (state && !state.phase==='complete') {
      var sp = profile.studyProtocol || {};
      var done = new Set(sp.completedCases||[]);
      if (!done.has(caseId)) markComplete(caseId);
    }
  }, 180000);
}

function render() {
  loadProfile();
  state = RDXStudySequencer.getState();
  var total = state.totalRequired;
  var done  = state.completed;
  var pct   = total>0 ? Math.round((done/total)*100) : 0;

  document.getElementById('hdr-prog').textContent = done+' / '+total+' complete';

  if (state.phase==='complete') {
    document.getElementById('sp-body').innerHTML =
      '<div class="complete-wrap">'+
      '<div style="font-size:3rem;margin-bottom:14px">✅</div>'+
      '<h2>Assessment Complete</h2>'+
      '<p>You have completed all '+total+' cases in the Clinical Reasoning Assessment Protocol. The full ReasonDx library is now available for free exploration.</p>'+
      '<a href="browse.html" class="btn done-btn" style="display:inline-block;text-decoration:none;margin-top:8px">Explore ReasonDx →</a>'+
      '</div>';
    return;
  }

  var bannerInfo = getLayerDescription(state);
  var banner = bannerInfo
    ? '<div class="layer-banner '+bannerInfo.cls+'">'+bannerInfo.text+'</div>'
    : '';

  var progBar = '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>';

  var intro = '';
  if (state.phase==='not_started') {
    var hasPriorNote = '';
    if (RDXStudySequencer.hasPriorNursing() || RDXStudySequencer.hasPriorDental()) {
      var types = [];
      if (RDXStudySequencer.hasPriorNursing()) types.push('nursing');
      if (RDXStudySequencer.hasPriorDental()) types.push('dental');
      hasPriorNote = '<p style="margin-top:8px;padding:8px 12px;background:#F0FDF4;border-radius:6px;border:1px solid #BBF7D0;font-size:.85rem">'+
        'Based on your prior <strong>'+types.join(' and ')+'</strong> background, you will also complete a '+
        (types.length>1?'20':'10')+'-minute domain extension after Part 1.</p>';
    }
    intro = '<div class="card intro">'+
      '<h2>Clinical Reasoning Assessment</h2>'+
      '<p>Work through <strong>'+total+' clinical cases</strong> presented as brief vignettes. For each, read the scenario and respond to the clinical question using your own reasoning.</p>'+
      '<p>Cases are presented in a required sequence. Complete each case before the next becomes available.</p>'+
      hasPriorNote+
      '<span class="time-badge">⏱ Est. '+(total<=16?'40–50':total<=21?'55–65':'70–80')+' minutes total</span>'+
      '</div>';
    RDXStudySequencer.startProtocol();
    state = RDXStudySequencer.getState();
  }

  var completedSet = new Set((profile.studyProtocol||{}).completedCases||[]);
  var allCasesForLayer = state.phase==='layer1' ? RDXStudySequencer.getLayer1Cases()
                       : state.phase==='layer2' ? RDXStudySequencer.getLayer2Cases()
                       : state.phase==='layer3' ? RDXStudySequencer.getLayer3Cases()
                       : [];

  // Restore deterministic order: completed ones stay in place, locked ones after
  var displayCases = allCasesForLayer;
  var overallIdx = done; // offset for "Case N" numbering

  var cards = displayCases.map(function(c, i) {
    var isDone = completedSet.has(c.id);
    var absIdx = overallIdx + i + 1;
    var q = c.studyProfQuestion || c.profQuestion || '';
    return '<div class="card">'+
      '<div class="case-num">Case '+absIdx+' of '+total+'</div>'+
      '<div class="case-cc">'+c.chiefComplaint+'</div>'+
      (q ? '<div class="case-q">"'+q+'"</div>' : '')+
      (isDone
        ? '<span class="badge-done">✓ Completed</span>'
        : '<button class="btn" onclick="launchCase(''+c.id+'')">Begin Case →</button>'
      )+
      '</div>';
  }).join('');

  document.getElementById('sp-body').innerHTML = intro + banner + progBar + cards;
}

window.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
