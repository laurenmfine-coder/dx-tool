<script>let currentStage=0,score=0,difficulty='standard';
const stages=[{
title:"Clinical Scenario",
content:`<div class="narrative"><p>A 30-year-old woman with a dental abscess and severe penicillin allergy (anaphylaxis).</p><div class="vital-signs"><div class="vital-item"><span class="label">HR</span><span class="value">94</span></div><div class="vital-item"><span class="label">Temp</span><span class="value">38.3°C</span></div></div></div>`,
hint_beginner:"What is clindamycin mechanism?",
hint_advanced:"Consider the pharmacologic principles underlying this drug class.",
question:{
prompt:"What is clindamycin mechanism?",
options:[{text:"Inhibits folic acid metabolism",correct:false},{text:"Inhibits cell membrane synthesis",correct:false},{text:"Binds 50S ribosome (same site as macrolides) → blocks peptide bond formation → bacteriostatic (but bactericidal at high concentrations vs some organisms)",correct:true},{text:"Blocks RNA polymerase",correct:false}],
explanation:{correct:"Correct! Binds 50S ribosome (same site as macrolides) → blocks peptide bond formation → bacteriostatic (but bactericidal at high concentrations vs some organisms).",incorrect:"Binds 50S ribosome (same site as macrolides) → blocks peptide bond formation → bacteriostatic (but bactericidal at high concentrations vs some organisms)"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Clindamycin MOA</div><div class="pathway"><strong>Target:</strong> 50S ribosomal subunit (23S rRNA, overlapping binding site with macrolides)<br><strong>Effect:</strong> Blocks peptidyl transferase → inhibits peptide bond formation → bacteriostatic<br><strong>Key property:</strong> Suppresses toxin production (protein synthesis inhibitor) → invaluable for toxin-mediated diseases</div></div>`,
why_chain:[],
points:10
}
},{
title:"Spectrum & Coverage",
content:`<div class="narrative"><p>Understanding the antimicrobial spectrum guides appropriate use.</p></div>`,
hint_beginner:"What is clindamycin best spectrum?",
hint_advanced:"Think about the unique organisms this drug covers that alternatives do not.",
question:{
prompt:"What is clindamycin best spectrum?",
options:[{text:"No anaerobic activity",correct:false},{text:"Active only against fungi",correct:false},{text:"Covers only gram-positive organisms",correct:false},{text:"Excellent anaerobic coverage (above the diaphragm), gram-positives including CA-MRSA, toxin suppression in GAS/S. aureus invasive infections",correct:true}],
explanation:{correct:"Correct! Excellent anaerobic coverage (above the diaphragm), gram-positives including CA-MRSA, toxin suppression in GAS/S. aureus invasive infections.",incorrect:"Excellent anaerobic coverage (above the diaphragm), gram-positives including CA-MRSA, toxin suppression in GAS/S. aureus invasive infections"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Clindamycin Spectrum</div><div class="pathway"><strong>Gram-positives:</strong> Strep (including GAS), S. aureus (including CA-MRSA — check D-test)<br><strong>Anaerobes (above diaphragm):</strong> Oral flora, Peptostreptococcus, Prevotella<br><strong>NOT reliable:</strong> B. fragilis (below-diaphragm anaerobes — use metronidazole), Enterococcus, gram-negatives</div></div>`,
why_chain:[],
points:10
}
},{
title:"Dosing & Administration",
content:`<div class="narrative"><p>Proper dosing maximizes efficacy and minimizes toxicity.</p></div>`,
hint_beginner:"What unique property makes clindamycin valuable in toxin-mediated diseases?",
hint_advanced:"Consider the PK/PD parameters that drive efficacy for this class.",
question:{
prompt:"What unique property makes clindamycin valuable in toxin-mediated diseases?",
options:[{text:"Inhibits bacterial protein synthesis including toxin production — used with penicillin for necrotizing fasciitis and toxic shock to stop toxin elaboration",correct:true},{text:"Fixed dose regardless of indication",correct:false},{text:"Always requires IV administration",correct:false},{text:"Dose based on ideal body weight only",correct:false}],
explanation:{correct:"Correct! Inhibits bacterial protein synthesis including toxin production — used with penicillin for necrotizing fasciitis and toxic shock to stop toxin elaboration.",incorrect:"Inhibits bacterial protein synthesis including toxin production — used with penicillin for necrotizing fasciitis and toxic shock to stop toxin elaboration"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Clindamycin Toxin Suppression</div><div class="pathway"><strong>Mechanism:</strong> By blocking ribosomal protein synthesis, clindamycin stops production of toxins (SPE in GAS, PVL/TSST-1 in S. aureus)<br><strong>Clinical use:</strong> Added to penicillin for: necrotizing fasciitis (GAS), toxic shock syndrome (GAS or staph)<br><strong>Eagle effect:</strong> Penicillin less effective at high bacterial density (stationary phase) — clindamycin works regardless of growth phase</div></div>`,
why_chain:[],
points:10
}
},{
title:"Adverse Effects",
content:`<div class="narrative"><p>Monitoring for side effects is essential for patient safety.</p></div>`,
hint_beginner:"What is the most feared adverse effect of clindamycin?",
hint_advanced:"Consider which effects are dose-dependent vs idiosyncratic.",
question:{
prompt:"What is the most feared adverse effect of clindamycin?",
options:[{text:"Ototoxicity only",correct:false},{text:"C. difficile colitis — clindamycin was historically the highest-risk antibiotic for C. diff, though fluoroquinolones have surpassed it",correct:true},{text:"No significant adverse effects",correct:false},{text:"Only affects renal function",correct:false}],
explanation:{correct:"Correct! C. difficile colitis — clindamycin was historically the highest-risk antibiotic for C. diff, though fluoroquinolones have surpassed it.",incorrect:"C. difficile colitis — clindamycin was historically the highest-risk antibiotic for C. diff, though fluoroquinolones have surpassed it"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">C. difficile Risk</div><div class="pathway"><strong>High-risk antibiotics:</strong> Clindamycin, fluoroquinolones, cephalosporins, carbapenems<br><strong>Mechanism:</strong> Disrupts normal colonic flora → C. diff overgrowth → toxin A (enterotoxin) and toxin B (cytotoxin) → pseudomembranous colitis<br><strong>Prevention:</strong> Use clindamycin only when clearly indicated, shortest duration possible</div></div>`,
why_chain:[],
points:10
}
},{
title:"Resistance",
content:`<div class="narrative"><p>Understanding resistance guides empiric therapy choices.</p></div>`,
hint_beginner:"What must be tested before using clindamycin for erythromycin-resistant staph/strep?",
hint_advanced:"Compare enzymatic modification, target alteration, and efflux as resistance strategies.",
question:{
prompt:"What must be tested before using clindamycin for erythromycin-resistant staph/strep?",
options:[{text:"Resistance occurs only in gram-positives",correct:false},{text:"No resistance has been documented",correct:false},{text:"D-test for inducible clindamycin resistance (erm gene). Positive D-test = do NOT use clindamycin",correct:true},{text:"Only plasmid-mediated resistance",correct:false}],
explanation:{correct:"Correct! D-test for inducible clindamycin resistance (erm gene). Positive D-test = do NOT use clindamycin.",incorrect:"D-test for inducible clindamycin resistance (erm gene). Positive D-test = do NOT use clindamycin"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">D-Test</div><div class="pathway"><strong>Purpose:</strong> Detect inducible clindamycin resistance (erm gene)<br><strong>Method:</strong> Place erythromycin and clindamycin disks 15-20mm apart. If zone around clindamycin is D-shaped (flattened toward erythromycin) → positive<br><strong>Positive D-test:</strong> Do NOT use clindamycin (will fail in vivo as erm gene is induced during treatment)<br><strong>Negative D-test:</strong> Safe to use clindamycin even if erythromycin-resistant</div></div>`,
why_chain:[],
points:10
}
},{
title:"Clinical Application",
content:`<div class="narrative"><p>Integrating mechanism, spectrum, and resistance data guides optimal clinical use.</p></div>`,
hint_beginner:"When is clindamycin the best choice?",
hint_advanced:"Consider guideline recommendations and antimicrobial stewardship principles.",
question:{
prompt:"When is clindamycin the best choice?",
options:[{text:"Empiric monotherapy for all infections",correct:false},{text:"Reserved for outpatient use only",correct:false},{text:"Only for prophylaxis",correct:false},{text:"Dental/head-neck anaerobic infections (PCN-allergic), bone/joint infections (excellent bone penetration), toxin suppression in invasive GAS/staph, aspiration pneumonia alternative",correct:true}],
explanation:{correct:"Correct! Dental/head-neck anaerobic infections (PCN-allergic), bone/joint infections (excellent bone penetration), toxin suppression in invasive GAS/staph, aspiration pneumonia alternative.",incorrect:"Dental/head-neck anaerobic infections (PCN-allergic), bone/joint infections (excellent bone penetration), toxin suppression in invasive GAS/staph, aspiration pneumonia alternative"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Clindamycin Clinical Use</div><div class="pathway"><strong>First-line:</strong> Dental infections (PCN-allergic), toxin suppression in invasive GAS/staph<br><strong>Bone infections:</strong> Excellent bone penetration → osteomyelitis (with rifampin for staph prosthetic joint infections)<br><strong>OB/GYN:</strong> Bacterial vaginosis (vaginal cream), GBS prophylaxis (if susceptible, severe PCN allergy)</div></div>`,
why_chain:[],
points:10
}
}];
document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hb=document.querySelector('.hint-box');if(hb)hb.style.display=d==='beginner'?'block':'none'}
function toggleReferences(){const c=document.getElementById('referencesContent');const t=document.getElementById('refToggle');if(c.style.display==='none'){c.style.display='block';t.innerHTML='&#9662;'}else{c.style.display='none';t.innerHTML='&#9656;'}}
function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100);document.getElementById('progress').style.width=pct+'%';let h='<h2 class="scene-title">'+st.title+'</h2>';h+='<div class="scene-content">'+st.content+'</div>';if(st.hint_beginner)h+='<div class="hint-box" id="hint-box"'+(difficulty==='beginner'?' style="display:block"':'')+'> '+st.hint_beginner+'</div>';if(difficulty==='advanced'&&st.hint_advanced)h+='<div class="hint-box" style="display:block;background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.15);color:#5b21b6"> '+st.hint_advanced+'</div>';if(st.question){h+='<div class="socratic-prompt"><h4>Clinical Question</h4><p>'+st.question.prompt+'</p></div>';h+='<div class="options-grid" id="options-'+idx+'">';st.question.options.forEach((opt,oi)=>{h+='<button class="option-btn" id="option-'+idx+'-'+oi+'" onclick="checkAnswer('+idx+','+oi+')">'+String.fromCharCode(65+oi)+'. '+opt.text+'</button>'});h+='</div>';h+='<div class="explanation-box" id="explain-'+idx+'"></div>';h+='<div id="teaching-'+idx+'" style="display:none">'+st.question.teaching+'</div>';if(st.question.why_chain&&st.question.why_chain.length>0){h+='<div id="why-'+idx+'" style="display:none">';st.question.why_chain.forEach((wc,wi)=>{h+='<div class="why-chain"><div class="why-q" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'"> '+wc.q+'</div><div class="why-a">'+wc.a+'</div></div>'});h+='</div>'}}h+='<button class="next-btn" id="next-'+idx+'" onclick="nextStage()">Continue &rarr;</button>';document.getElementById('scene-container').innerHTML=h}
function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll('#options-'+si+' .option-btn').forEach((b,i)=>{b.classList.add('disabled');if(st.question.options[i].correct)b.classList.add('correct');if(i===oi&&!opt.correct)b.classList.add('incorrect')});const eb=document.getElementById('explain-'+si);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;eb.className='explanation-box correct';eb.innerHTML='<strong>Correct!</strong> '+st.question.explanation.correct}else{eb.className='explanation-box incorrect';eb.innerHTML='<strong>Not quite.</strong> '+st.question.explanation.incorrect}eb.style.display='block';document.getElementById('teaching-'+si).style.display='block';const wy=document.getElementById('why-'+si);if(wy)wy.style.display='block';document.getElementById('next-'+si).style.display='inline-block'}
function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let lvl='Developing';if(pct>=90)lvl='Mastery';else if(pct>=70)lvl='Proficient';else if(pct>=50)lvl='Competent';document.getElementById('scene-container').innerHTML='<div class="completion-card"><h2>Case Complete!</h2><p style="font-size:2rem;font-weight:700;color:var(--rdx-teal,#2874a6)">'+pct+'%</p><p style="color:var(--rdx-text-muted,#64748b)">Score: '+score+'/'+mx+'</p><p style="margin:12px 0;font-weight:600">Level: '+lvl+'</p><div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="../adventure-hub.html" style="padding:10px 20px;background:var(--rdx-teal,#2874a6);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">More Cases</a><a href="../tools/learning-dashboard.html" style="padding:10px 20px;background:var(--rdx-purple,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">Dashboard</a><button onclick="currentStage=0;score=0;document.getElementById(\'score\').textContent=0;renderStage(0)" style="padding:10px 20px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;cursor:pointer;font-weight:600">Retry</button></div></div>';try{const progress=JSON.parse(localStorage.getItem('reasondx-progress')||'{}');if(!progress.cases)progress.cases={};progress.cases['clindamycin']=Math.max(progress.cases['clindamycin']||0,pct);localStorage.setItem('reasondx-progress',JSON.stringify(progress))}catch(e){}}
renderStage(0);</script>
