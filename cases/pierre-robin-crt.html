<body>
    <div class="container">
        <div class="header">
            <h1>🍼 Pierre Robin Sequence</h1>
            <div class="score-display">
                <div class="score-item">Score: <strong id="score">0</strong>/<span id="maxScore">60</span></div>
                <div class="score-item">Stage: <span id="stageNum">1</span>/6</div>
            </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width: 16%"></div></div>
        <div id="scene-container"></div>
    </div>
    <script>
    let currentStage = 0, score = 0;
    const stages = [
        {title:"The Newborn in Distress",content:'<div class="narrative"><p>A <span class="highlight">1-day-old male</span> with known prenatal diagnosis of Pierre Robin sequence is having increasing respiratory distress in the newborn nursery. Episodes of <span class="critical">desaturation to 78% when supine</span>, but saturations improve to <span class="highlight">95% when positioned prone</span>.</p><p style="margin-top:12px;"><strong>Exam:</strong> Severe micrognathia (small, recessed mandible), tongue falling back into airway, wide U-shaped cleft palate visible.</p></div><div class="alert-box"><div class="alert-title">⚠️ AIRWAY EMERGENCY</div><p>Pierre Robin sequence can cause life-threatening airway obstruction. Position-dependent saturations are a hallmark.</p></div>',question:{prompt:"What is the PRIMARY mechanism of airway obstruction in Pierre Robin sequence?",options:[{text:"Laryngomalacia",correct:false},{text:"Glossoptosis (tongue base falling posteriorly)",correct:true},{text:"Subglottic stenosis",correct:false},{text:"Tracheomalacia",correct:false}],explanation:{correct:"Correct! Glossoptosis is the primary mechanism. The small mandible provides inadequate space for the tongue, which falls posteriorly into the pharynx, obstructing the airway. This is why PRONE positioning helps - gravity pulls the tongue forward.",incorrect:"Glossoptosis (tongue falling back) is the mechanism. The micrognathia provides insufficient space for the tongue, which occludes the airway when supine."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Pierre Robin Sequence: The Cascade</div><div class="pathway">SEQUENCE (not syndrome):\n\nMICROGNATHIA (Primary defect)\n        ↓\nTongue has no room in small mandible\n        ↓\nGLOSSOPTOSIS (tongue falls back)\n        ↓\nAIRWAY OBSTRUCTION\n        ↓\n(± Tongue blocks palate fusion)\n        ↓\nU-SHAPED CLEFT PALATE (75-90%)\n\nPOSITION-DEPENDENT:\n• Worse SUPINE (tongue falls back)\n• Better PRONE (gravity helps)</div></div>',points:10}},
        
        {title:"Airway Management Algorithm",content:'<div class="narrative"><p>The NICU team asks you for guidance on airway management. This infant improves with prone positioning but still has intermittent desaturations during feeding attempts.</p></div>',question:{prompt:"What is the FIRST-LINE treatment for airway obstruction in Pierre Robin sequence?",options:[{text:"Immediate tracheostomy",correct:false},{text:"Prone positioning",correct:true},{text:"Mandibular distraction osteogenesis",correct:false},{text:"Tongue-lip adhesion",correct:false}],explanation:{correct:"Correct! Prone positioning is FIRST-LINE. It allows the tongue to fall forward with gravity, opening the airway. Effective for 50-70% of mild-moderate cases. Escalate to NPA, MDO, or tracheostomy only if positioning fails.",incorrect:"Positioning is FIRST-LINE! Management escalates: positioning → NPA → MDO → tracheostomy. Most mild-moderate cases can be managed with positioning alone."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Airway Management Algorithm</div><div class="pathway">STEP 1: PRONE POSITIONING ← FIRST!\n• Effective 50-70% of cases\n• Allows tongue to fall forward\n• Requires monitoring\n\nSTEP 2: NASOPHARYNGEAL AIRWAY (NPA)\n• Bypasses tongue obstruction\n• Bridge to definitive treatment\n• Can be home use with training\n\nSTEP 3: MANDIBULAR DISTRACTION (MDO)\n• Surgical lengthening of mandible\n• 85-95% avoid tracheostomy\n• Brings tongue base forward\n\nSTEP 4: TRACHEOSTOMY\n• Reserved for severe/MDO failure\n• Higher morbidity\n• Usually temporary</div></div>',points:10}},

        {title:"Why 'Sequence' Not 'Syndrome'?",content:'<div class="narrative"><p>A medical student asks why this is called Pierre Robin "Sequence" rather than "Syndrome."</p></div>',question:{prompt:"Pierre Robin is called a 'sequence' because:",options:[{text:"It was discovered in sequence by multiple physicians",correct:false},{text:"One malformation (micrognathia) causes the others in a predictable cascade",correct:true},{text:"The features always appear in a specific order during physical exam",correct:false},{text:"It requires a sequence of surgeries to repair",correct:false}],explanation:{correct:"Correct! A 'sequence' describes when one primary malformation causes a cascade of secondary effects. In PRS, micrognathia → glossoptosis → airway obstruction (→ cleft palate). A 'syndrome' implies multiple independent malformations from a single cause.",incorrect:"Sequence = one defect causing others in a cascade. Micrognathia is the primary defect that leads to all the other features."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Terminology Matters</div><div class="pathway">SEQUENCE:\n• One primary defect causes others\n• Cascade/chain of events\n• Example: Pierre Robin\n  Micrognathia → everything else\n\nSYNDROME:\n• Multiple features from one cause\n• Features are independent\n• Example: Down syndrome\n  (multiple features from trisomy 21)\n\nASSOCIATION:\n• Features occur together\n• No known causative link\n• Example: VACTERL\n\nIMPORTANT:\n40% PRS is isolated\n60% PRS is PART OF a syndrome!</div></div>',points:10}},

        {title:"The Syndromic Workup",content:'<div class="narrative"><p>You know that 60% of Pierre Robin sequence is associated with an underlying syndrome. The ophthalmologist is consulted and reports the infant has severe myopia (-10 diopters).</p></div>',question:{prompt:"Severe myopia in a Pierre Robin patient is most concerning for which syndrome and complication?",options:[{text:"22q11.2 deletion - cardiac defects",correct:false},{text:"Treacher Collins - hearing loss",correct:false},{text:"Stickler syndrome - retinal detachment",correct:true},{text:"Nager syndrome - limb anomalies",correct:false}],explanation:{correct:"Correct! Stickler syndrome is the MOST COMMON syndrome associated with PRS. Key features: severe myopia, RETINAL DETACHMENT risk (12-50%), hearing loss, joint hypermobility. Any PRS infant with significant myopia needs urgent ophthalmology follow-up.",incorrect:"Stickler = PRS + severe myopia + retinal detachment risk. This is the most common PRS-associated syndrome. Eye exam is critical."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Syndromic Associations (60%)</div><div class="pathway">STICKLER SYNDROME (Most common!):\n• COL2A1 gene\n• SEVERE MYOPIA (often >-8 D)\n• RETINAL DETACHMENT (12-50%)\n• Hearing loss\n• Joint hypermobility\n→ URGENT OPHTHALMOLOGY!\n\n22q11.2 DELETION:\n• CATCH-22 features\n• Cardiac defects\n• Hypocalcemia\n• Immune deficiency\n\nTREACHER COLLINS:\n• Bilateral mandibular/malar hypoplasia\n• Microtia, hearing loss\n• Often more severe airway\n\nWORKUP ALL PRS:\n✓ Ophthalmology (Stickler)\n✓ Genetics (22q11.2 FISH)\n✓ Echo (cardiac)\n✓ Audiology</div></div>',points:10}},

        {title:"Feeding Challenges",content:'<div class="narrative"><p>The infant is now stable on prone positioning, but feeding is extremely difficult. Feeds take >60 minutes with desaturations, and the infant has lost 15% of birth weight.</p></div>',question:{prompt:"What is the caloric intake goal for an infant, and what intervention is needed here?",options:[{text:"50 kcal/kg/day, continue oral attempts",correct:false},{text:"100-120 kcal/kg/day, NG tube supplementation",correct:true},{text:"80 kcal/kg/day, increase feed frequency only",correct:false},{text:"150 kcal/kg/day, total parenteral nutrition",correct:false}],explanation:{correct:"Correct! Goal is 100-120 kcal/kg/day. With >60 minute feeds and 15% weight loss, oral feeding alone is failing. NG tube supplementation is needed. Feeds >30 minutes often burn more calories than gained!",incorrect:"Goal is 100-120 kcal/kg/day. Feeds >30 minutes are counterproductive. With this weight loss and prolonged feeds, NG tube supplementation is required."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Feeding in PRS</div><div class="pathway">CHALLENGES:\n• Airway worsens during feeds\n• Cleft palate prevents suction\n• Work of breathing burns calories\n• Prolonged feeds = net calorie loss\n\nGOALS:\n• 100-120 kcal/kg/day\n• Weight gain 15-30 g/day\n• Feeds <30 minutes\n\nINTERVENTIONS:\n• Specialized cleft bottles\n• Upright positioning\n• Calorie fortification (24-27 cal/oz)\n• NG tube if failing\n• G-tube if prolonged support needed\n\nRULE: >30 min feeds often\nburn more calories than gained!</div></div>',points:10}},

        {title:"Long-Term Outlook",content:'<div class="narrative"><p>The parents ask about long-term prognosis. You discuss mandibular catch-up growth and the reconstructive timeline.</p></div>',question:{prompt:"What percentage of Pierre Robin patients still require orthognathic surgery at skeletal maturity despite catch-up growth?",options:[{text:"5%",correct:false},{text:"20%",correct:false},{text:"40%",correct:true},{text:"80%",correct:false}],explanation:{correct:"Correct! Despite mandibular catch-up growth (which is encouraging), approximately 40% of PRS patients will still require orthognathic surgery (jaw advancement) at skeletal maturity for persistent Class II malocclusion.",incorrect:"About 40% need orthognathic surgery at maturity. While catch-up growth occurs, it's often incomplete. Lifelong craniofacial follow-up is needed."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Prognosis</div><div class="pathway">MANDIBULAR CATCH-UP GROWTH:\n• Occurs in isolated PRS\n• Most growth in first 2-4 years\n• May achieve near-normal by adolescence\n• BUT ~40% still need surgery\n\nLONG-TERM NEEDS:\n• ~40% orthognathic surgery\n• VPI surgery (speech) common\n• Ongoing orthodontics\n• OSA monitoring\n\nPROGNOSTIC FACTORS:\nBetter: Isolated PRS, mild airway\nWorse: Syndromic, severe airway,\n       tracheostomy, G-tube\n\nNonsyndromic PRS:\nGenerally good outcomes with\nappropriate early management!</div></div>',points:10}}
    ];
    
    function updateProgress(){
        document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';
        document.getElementById('stageNum').textContent=currentStage+1;
        document.getElementById('maxScore').textContent=stages.length*10;
    }
    
    function renderStage(){
        const stage=stages[currentStage];
        let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;
        if(stage.question){
            html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';
            stage.question.options.forEach((opt,i)=>{
                html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';
            });
            html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div>';
            html+='<div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';
            if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';
            html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';
        }
        html+='</div>';
        document.getElementById('scene-container').innerHTML=html;
        updateProgress();
    }
    
    function checkAnswer(idx,correct){
        const options=document.querySelectorAll('.mcq-option');
        if(options[0].classList.contains('disabled'))return;
        options.forEach((opt,i)=>{
            opt.classList.add('disabled');
            if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');
            else if(i===idx&&!correct)opt.classList.add('incorrect');
        });
        if(correct){
            document.getElementById('fb-correct').classList.add('show');
            score+=stages[currentStage].question.points;
            document.getElementById('score').textContent=score;
        }else{
            document.getElementById('fb-incorrect').classList.add('show');
        }
        const t=document.getElementById('teaching');
        if(t)t.classList.add('show');
        document.getElementById('next-btn').classList.add('show');
    }
    
    function nextStage(){
        if(currentStage<stages.length-1){
            currentStage++;
            renderStage();
            window.scrollTo(0,0);
        }else{
            document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:#a78bfa;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><div style="margin-top:20px;padding:15px;background:rgba(59,130,246,0.15);border-radius:10px;border:1px solid rgba(59,130,246,0.3);"><p style="color:#5eead4;margin-bottom:10px;font-weight:600;">📚 Learn More:</p><div style="display:flex;flex-wrap:wrap;gap:8px;"><a href="../../mechanism/pierre-robin-module.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📘 MechanismDx</a><a href="https://www.ncbi.nlm.nih.gov/books/?term=pierre+robin" target="_blank" title="Deep dive via StatPearls" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📊 Deep Dive</a></div><div style="margin-top:10px;"><a href="https://www.ncbi.nlm.nih.gov/books/NBK526103/" target="_blank" style="color:#5eead4;font-size:0.8rem;">📖 StatPearls Reference</a></div></div><p>You mastered Pierre Robin Sequence!</p></div>';
        }
    }
    
    renderStage();
    </script>
