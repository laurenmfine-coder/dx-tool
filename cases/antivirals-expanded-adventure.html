rem}.why-a{display:none;margin-top:6px;font-size:0.88rem;color:var(--rdx-text-muted,#64748b)}.next-btn{background:linear-gradient(135deg,#0f766e,#0d9488);color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:600;cursor:pointer;margin:20px 0;display:none;font-family:var(--rdx-font)}.next-btn:hover{opacity:0.9;transform:translateY(-1px)}.completion-card{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:16px;padding:32px;text-align:center;margin:24px 0}.completion-card h2{font-family:var(--rdx-font-serif);color:var(--rdx-teal-dark,#0f766e);margin-bottom:12px}.references-panel{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:16px;margin:20px 0}.references-panel a{display:block;color:var(--rdx-teal,#0d9488);font-size:13px;margin:4px 0;text-decoration:none}.references-panel a:hover{text-decoration:underline}.rdx-crossplatform-nav{background:var(--rdx-bg-card,#f8fafc);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:20px;margin:24px 0}.rdx-crossplatform-nav h4{color:var(--rdx-text-muted,#64748b);margin-bottom:12px;font-size:0.9rem}.rdx-crossplatform-links{display:flex;gap:12px;flex-wrap:wrap}.rdx-crossplatform-link{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:12px 16px;text-decoration:none;color:var(--rdx-text,#1e293b);font-size:13px;font-weight:500;transition:all 0.2s}.rdx-crossplatform-link:hover{background:rgba(13,148,136,0.05);transform:translateY(-2px)}@media(max-width:640px){.score-tracker{top:auto;bottom:12px;right:12px}.container{padding:12px}.vital-signs{grid-template-columns:repeat(3,1fr)}}</style>

<script>let currentStage=0,score=0,difficulty='standard';
const stages=[{
title:"The Herpes Encephalitis Case",
content:`<div class="narrative"><p>A <span class="highlight">35-year-old woman</span> presents with 3 days of fever, headache, confusion, and new-onset seizure. MRI shows temporal lobe enhancement. CSF HSV PCR is pending.</p><div class="vital-signs"><div class="vital-item"><span class="label">HR</span><span class="value">108</span></div><div class="vital-item"><span class="label">Temp</span><span class="value">39.5°C</span></div><div class="vital-item"><span class="label">BP</span><span class="value">142/88</span></div></div></div>`,
hint_beginner:"What antiviral should be started empirically?",
hint_advanced:"Do not wait for PCR results — what is the mechanism of acyclovir?",
question:{
prompt:"What is the mechanism of action of acyclovir?",
options:[{text:"Guanosine analog activated by viral thymidine kinase → incorporated into viral DNA → chain termination",correct:true},{text:"Neuraminidase inhibitor",correct:false},{text:"Integrase inhibitor",correct:false},{text:"Protease inhibitor",correct:false}],
explanation:{correct:"Correct! Acyclovir requires activation by viral thymidine kinase (TK), which phosphorylates it. Human cells lack TK → minimal toxicity. The triphosphate form is incorporated into viral DNA → chain termination. Start IV acyclovir immediately for suspected HSV encephalitis — mortality drops from 70% to <20%.",incorrect:"Acyclovir requires viral TK activation → selective toxicity. Start immediately for suspected HSV encephalitis without waiting for PCR."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Acyclovir Pharmacology</div><div class="pathway"><strong>Activation:</strong> Viral thymidine kinase → acyclovir monophosphate → cellular kinases → acyclovir triphosphate<br><strong>Target:</strong> Viral DNA polymerase → incorporated into DNA → chain termination (lacks 3-OH for next nucleotide)<br><strong>Selectivity:</strong> 3000× more affinity for viral TK than human kinases → excellent safety<br><br><strong>Spectrum:</strong> HSV-1, HSV-2, VZV. Less active against EBV, CMV.<br><strong>Valacyclovir:</strong> L-valine ester prodrug → better oral bioavailability (same mechanism)</div></div>`,
why_chain:[{q:"Why doesnt acyclovir work well against CMV?",a:"CMV lacks a conventional thymidine kinase. CMV has a different kinase (UL97) that can phosphorylate ganciclovir but not acyclovir efficiently. This is why ganciclovir (not acyclovir) is used for CMV."}],
points:10
}
},{
title:"HIV Antiretrovirals",
content:`<div class="narrative"><p>A 28-year-old man is newly diagnosed with HIV (CD4 340, VL 85,000). You need to initiate antiretroviral therapy.</p></div>`,
hint_beginner:"What is the recommended initial ART regimen?",
hint_advanced:"Consider the modern paradigm: 2 NRTIs + integrase inhibitor.",
question:{
prompt:"What is the currently preferred initial ART regimen?",
options:[{text:"Zidovudine + lamivudine + efavirenz",correct:false},{text:"Tenofovir/emtricitabine (TAF/FTC) + dolutegravir (integrase inhibitor)",correct:true},{text:"Abacavir + lamivudine + nevirapine",correct:false},{text:"Tenofovir/emtricitabine + atazanavir/ritonavir",correct:false}],
explanation:{correct:"Correct! Modern first-line ART: 2 NRTIs (tenofovir alafenamide/emtricitabine backbone) + integrase strand transfer inhibitor (dolutegravir or bictegravir). Start ART regardless of CD4 count. Same-day start is recommended when possible.",incorrect:"Two NRTIs + integrase inhibitor is the modern standard. Dolutegravir has a high barrier to resistance. Start ART immediately regardless of CD4."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">ART Classes</div><div class="pathway"><strong>NRTIs (backbone):</strong> Tenofovir (TAF or TDF) + emtricitabine (FTC). Chain terminators.<br><strong>INSTIs (preferred 3rd agent):</strong> Dolutegravir, bictegravir. High barrier to resistance.<br><strong>NNRTIs:</strong> Efavirenz, rilpivirine. Low barrier to resistance (single mutation).<br><strong>PIs:</strong> Darunavir/ritonavir. High barrier. GI side effects, metabolic effects.<br><br><strong>Preferred regimens:</strong><br>• Bictegravir/TAF/FTC (Biktarvy) — single tablet, once daily<br>• Dolutegravir + TAF/FTC<br>• Cabotegravir + rilpivirine (long-acting injectable, monthly or bimonthly)</div></div>`,
why_chain:[{q:"What does U=U mean?",a:"Undetectable = Untransmittable. Patients with sustained viral suppression (<200 copies/mL) have effectively zero risk of sexual HIV transmission. This is supported by multiple landmark studies (PARTNER, HPTN 052)."}],
points:10
}
},{
title:"Influenza Antivirals",
content:`<div class="narrative"><p>A 72-year-old nursing home resident presents with acute fever, myalgias, and cough during flu season. Rapid influenza test is positive for Influenza A.</p></div>`,
hint_beginner:"When should oseltamivir be started?",
hint_advanced:"What is the benefit of treatment beyond 48 hours?",
question:{
prompt:"What is the mechanism of oseltamivir (Tamiflu)?",
options:[{text:"RNA polymerase inhibitor",correct:false},{text:"M2 ion channel blocker",correct:false},{text:"Neuraminidase inhibitor — prevents viral release from infected cells",correct:true},{text:"Hemagglutinin blocker",correct:false}],
explanation:{correct:"Correct! Oseltamivir inhibits neuraminidase, the enzyme that cleaves sialic acid residues to release new virions from infected cells. Start within 48 hours for maximum benefit (reduces symptoms by ~1 day, reduces complications in high-risk patients). Still beneficial after 48h in hospitalized/high-risk patients.",incorrect:"Oseltamivir blocks neuraminidase → prevents viral release. Most effective within 48h but still beneficial in severe/high-risk cases beyond 48h."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Influenza Treatment</div><div class="pathway"><strong>Oseltamivir (Tamiflu):</strong> Neuraminidase inhibitor. Oral. 75mg BID × 5 days. Start ≤48h.<br><strong>Baloxavir (Xofluza):</strong> Cap-dependent endonuclease inhibitor. Single oral dose. Novel mechanism.<br><strong>Zanamivir:</strong> Inhaled neuraminidase inhibitor (avoid in asthma/COPD).<br><strong>Peramivir:</strong> IV neuraminidase inhibitor (for patients who cant take oral).<br><br><strong>Amantadine/rimantadine:</strong> M2 blockers. NO LONGER USED (100% resistance in circulating strains).<br><strong>Prophylaxis:</strong> Oseltamivir 75mg daily for exposed high-risk individuals.</div></div>`,
why_chain:[{q:"Why did amantadine resistance become universal?",a:"Amantadine targets the M2 ion channel, which only requires a single point mutation (S31N) for high-level resistance. This mutation has no fitness cost, so it spread universally. Neuraminidase inhibitor resistance requires multiple mutations with fitness costs, keeping resistance low."}],
points:10
}
},{
title:"Hepatitis C Direct-Acting Antivirals",
content:`<div class="narrative"><p>A 52-year-old with chronic hepatitis C (genotype 1a, no cirrhosis) needs treatment. HCV DAAs have revolutionized therapy.</p></div>`,
hint_beginner:"What cure rates do modern HCV DAAs achieve?",
hint_advanced:"Consider why the combination of NS5A + NS5B inhibitors is so effective.",
question:{
prompt:"What is the expected sustained virologic response (cure) rate with modern HCV DAA regimens?",
options:[{text:"About 50% with 48 weeks of treatment",correct:false},{text:"75% with 24 weeks",correct:false},{text:"30% requiring lifelong therapy",correct:false},{text:"Greater than 95% SVR (functional cure) in 8-12 weeks",correct:true}],
explanation:{correct:"Correct! Modern pangenotypic DAA regimens (sofosbuvir/velpatasvir or glecaprevir/pibrentasvir) achieve >95% SVR12 (cure) in 8-12 weeks with minimal side effects. This is one of the greatest advances in infectious disease — a chronic viral infection cured with oral pills.",incorrect:"HCV is now curable with 8-12 weeks of oral DAAs achieving >95% SVR. This transformed hepatitis C from a chronic progressive disease to a curable condition."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">HCV DAA Regimens</div><div class="pathway"><strong>Pangenotypic (all genotypes):</strong><br>• Sofosbuvir/velpatasvir (Epclusa) × 12 weeks<br>• Glecaprevir/pibrentasvir (Mavyret) × 8 weeks (non-cirrhotic)<br><br><strong>Targets:</strong><br>• NS5B (sofosbuvir): RNA polymerase inhibitor (nucleotide analog)<br>• NS5A (velpatasvir, pibrentasvir): Replication complex inhibitor<br>• NS3/4A (glecaprevir): Protease inhibitor<br><br><strong>SVR12:</strong> Undetectable HCV RNA 12 weeks post-treatment = functional cure. >95% of patients.</div></div>`,
why_chain:[{q:"Is HCV vaccination available?",a:"No HCV vaccine exists despite decades of effort. The virus has extreme genetic variability (7 genotypes, 67+ subtypes) and the envelope glycoproteins mutate rapidly, evading immune responses. Treatment as prevention (curing infected individuals to reduce transmission) is the current public health strategy."}],
points:10
}
},{
title:"Acyclovir Resistance",
content:`<div class="narrative"><p>An immunocompromised transplant patient has HSV that is not responding to acyclovir. Resistance must be considered.</p></div>`,
hint_beginner:"What is the mechanism of acyclovir resistance?",
hint_advanced:"If viral TK is mutated, what alternative drugs work through a TK-independent mechanism?",
question:{
prompt:"What is the most common mechanism of acyclovir resistance?",
options:[{text:"Thymidine kinase (TK) mutations — acyclovir cannot be activated without viral TK",correct:true},{text:"Efflux pump upregulation",correct:false},{text:"Altered drug entry via membrane changes",correct:false},{text:"DNA polymerase mutations only",correct:false}],
explanation:{correct:"Correct! ~95% of acyclovir resistance is due to TK mutations (null or altered TK). Without TK, acyclovir cannot be phosphorylated to its active form. Treatment: foscarnet (directly inhibits DNA polymerase, no TK activation needed) or cidofovir.",incorrect:"TK mutations prevent acyclovir activation. Use foscarnet (inhibits viral DNA polymerase directly, bypassing TK) for acyclovir-resistant HSV."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Acyclovir Resistance</div><div class="pathway"><strong>Mechanism:</strong> TK mutations (~95%) or DNA polymerase mutations (~5%)<br><strong>Risk:</strong> Immunocompromised patients (transplant, HIV with low CD4) on chronic suppressive therapy<br><br><strong>Alternative agents:</strong><br>• Foscarnet: Pyrophosphate analog → directly inhibits DNA polymerase (no TK needed). Nephrotoxic, electrolyte abnormalities (Ca, Mg, K, PO4).<br>• Cidofovir: Nucleotide analog → already monophosphorylated (no TK needed). Highly nephrotoxic — requires probenecid + hydration.</div></div>`,
why_chain:[{q:"Why is acyclovir resistance rare in immunocompetent patients?",a:"TK-deficient mutants replicate poorly and are less virulent. In immunocompetent hosts, the immune system eliminates these mutants. In immunocompromised patients, the weakened immune system cannot clear them, allowing resistant strains to persist and cause disease."}],
points:10
}
},{
title:"CMV Treatment",
content:`<div class="narrative"><p>A renal transplant patient develops CMV viremia (viral load 15,000 copies/mL). CMV requires different antivirals than HSV.</p></div>`,
hint_beginner:"Why doesnt acyclovir work for CMV?",
hint_advanced:"What activates ganciclovir in CMV-infected cells?",
question:{
prompt:"What is first-line treatment for CMV disease in transplant patients?",
options:[{text:"High-dose acyclovir",correct:false},{text:"Valganciclovir (oral) or ganciclovir (IV) — activated by CMV UL97 kinase",correct:true},{text:"Ribavirin",correct:false},{text:"Oseltamivir",correct:false}],
explanation:{correct:"Correct! Ganciclovir is activated by CMV kinase UL97 (not thymidine kinase). The triphosphate form inhibits CMV DNA polymerase. Main toxicity: bone marrow suppression (neutropenia, thrombocytopenia). Monitor CBC closely.",incorrect:"Ganciclovir/valganciclovir is first-line for CMV. Activated by CMV UL97 kinase. Major toxicity is bone marrow suppression."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">CMV Antivirals</div><div class="pathway"><strong>Ganciclovir/valganciclovir:</strong> First-line. UL97-dependent activation. Myelosuppressive.<br><strong>Foscarnet:</strong> Second-line. Direct polymerase inhibition. Nephrotoxic, electrolyte wasting.<br><strong>Cidofovir:</strong> Third-line. TK-independent. Highly nephrotoxic.<br><strong>Letermovir:</strong> CMV terminase inhibitor. Prophylaxis in HSCT recipients. Non-myelosuppressive.<br><strong>Maribavir:</strong> UL97 kinase inhibitor. For refractory/resistant CMV.<br><br><strong>Resistance:</strong> UL97 mutations → ganciclovir resistance. UL54 (polymerase) mutations → cross-resistance to multiple agents.</div></div>`,
why_chain:[{q:"Why is letermovir preferred for CMV prophylaxis in transplant?",a:"Letermovir inhibits the CMV terminase complex (different target than ganciclovir). It has no significant bone marrow suppression, allowing use in the early post-transplant period when patients are already immunosuppressed and at risk for neutropenia."}],
points:10
}
}];
document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hb=document.querySelector('.hint-box');if(hb)hb.style.display=d==='beginner'?'block':'none'}
function toggleReferences(){const c=document.getElementById('referencesContent');const t=document.getElementById('refToggle');if(c.style.display==='none'){c.style.display='block';t.innerHTML='&#9662;'}else{c.style.display='none';t.innerHTML='&#9656;'}}
function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100);document.getElementById('progress').style.width=pct+'%';let h='<h2 class="scene-title">'+st.title+'</h2>';h+='<div class="scene-content">'+st.content+'</div>';if(st.hint_beginner)h+='<div class="hint-box" id="hint-box"'+(difficulty==='beginner'?' style="display:block"':'')+'> '+st.hint_beginner+'</div>';if(difficulty==='advanced'&&st.hint_advanced)h+='<div class="hint-box" style="display:block;background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.15);color:#5b21b6"> '+st.hint_advanced+'</div>';if(st.question){h+='<div class="socratic-prompt"><h4>Clinical Question</h4><p>'+st.question.prompt+'</p></div>';h+='<div class="options-grid" id="options-'+idx+'">';st.question.options.forEach((opt,oi)=>{h+='<button class="option-btn" id="option-'+idx+'-'+oi+'" onclick="checkAnswer('+idx+','+oi+')">'+String.fromCharCode(65+oi)+'. '+opt.text+'</button>'});h+='</div>';h+='<div class="explanation-box" id="explain-'+idx+'"></div>';h+='<div id="teaching-'+idx+'" style="display:none">'+st.question.teaching+'</div>';if(st.question.why_chain&&st.question.why_chain.length>0){h+='<div id="why-'+idx+'" style="display:none">';st.question.why_chain.forEach((wc,wi)=>{h+='<div class="why-chain"><div class="why-q" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'"> '+wc.q+'</div><div class="why-a">'+wc.a+'</div></div>'});h+='</div>'}}h+='<button class="next-btn" id="next-'+idx+'" onclick="nextStage()">Continue &rarr;</button>';document.getElementById('scene-container').innerHTML=h}
function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll('#options-'+si+' .option-btn').forEach((b,i)=>{b.classList.add('disabled');if(st.question.options[i].correct)b.classList.add('correct');if(i===oi&&!opt.correct)b.classList.add('incorrect')});const eb=document.getElementById('explain-'+si);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;eb.className='explanation-box correct';eb.innerHTML='<strong>Correct!</strong> '+st.question.explanation.correct}else{eb.className='explanation-box incorrect';eb.innerHTML='<strong>Not quite.</strong> '+st.question.explanation.incorrect}eb.style.display='block';document.getElementById('teaching-'+si).style.display='block';const wy=document.getElementById('why-'+si);if(wy)wy.style.display='block';document.getElementById('next-'+si).style.display='inline-block'}
function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let lvl='Developing';if(pct>=90)lvl='Mastery';else if(pct>=70)lvl='Proficient';else if(pct>=50)lvl='Competent';document.getElementById('scene-container').innerHTML='<div class="completion-card"><h2>Case Complete!</h2><p style="font-size:2rem;font-weight:700;color:var(--rdx-teal,#0d9488)">'+pct+'%</p><p style="color:var(--rdx-text-muted,#64748b)">Score: '+score+'/'+mx+'</p><p style="margin:12px 0;font-weight:600">Level: '+lvl+'</p><div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="../adventure-hub.html" style="padding:10px 20px;background:var(--rdx-teal,#0d9488);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">More Cases</a><a href="../tools/learning-dashboard.html" style="padding:10px 20px;background:var(--rdx-purple,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">Dashboard</a><button onclick="currentStage=0;score=0;document.getElementById(\'score\').textContent=0;renderStage(0)" style="padding:10px 20px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;cursor:pointer;font-weight:600">Retry</button></div></div>';try{const progress=JSON.parse(localStorage.getItem('reasondx-progress')||'{}');if(!progress.cases)progress.cases={};progress.cases['antivirals']=Math.max(progress.cases['antivirals']||0,pct);localStorage.setItem('reasondx-progress',JSON.stringify(progress))}catch(e){}}
renderStage(0);</script>
