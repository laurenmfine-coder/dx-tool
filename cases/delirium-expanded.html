    <script>
    let decisionPath = [];
let currentStage = 0, score = 0, difficulty = 'standard';
    const stages = [
    {
        title: "The Confused Elder",
        content: `<div class="narrative"><p>You are called to see an <span class="highlight">82-year-old woman</span> who is <span class="critical">newly confused</span>. She was admitted yesterday for a hip fracture repair. The nurse reports she was oriented earlier today but is now <span class="highlight">agitated, pulling at her IV, and talking to people who aren't there</span>.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 98, BP 142/88, T 38.1°C, RR 20, SpO2 94%<br><strong>Baseline:</strong> Lives independently, no prior cognitive issues per family</p></div>
        <div class="socratic-prompt"><h4>Defining the Problem</h4><p>What distinguishes delirium from other causes of confusion, and why is this presentation concerning?</p></div>`,
        hint_beginner: "Key features: acute onset, fluctuating course, and inattention. Compare to her baseline.",
        hint_advanced: "What is the pathophysiology of postoperative delirium and why are elderly surgical patients at high risk?",
        question: {
            prompt: "What is the HALLMARK feature that distinguishes delirium from dementia?",
            options: [
                { text: "Memory impairment", correct: false },
                { text: "Inattention", correct: true },
                { text: "Visual hallucinations", correct: false },
                { text: "Disorientation to time", correct: false }
            ],
            explanation: {
                correct: "Correct! Inattention is the hallmark of delirium. While dementia patients may have memory issues, their attention is typically preserved early in the disease. Delirious patients cannot focus, are easily distracted, and have difficulty following conversation.",
                incorrect: "Inattention is the hallmark feature. While memory issues and disorientation occur in both conditions, the inability to focus attention is what distinguishes delirium from early dementia."
            },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">🧬 Delirium Definition</div><div class="pathway">DELIRIUM = Acute confusional state

Key features:
• Acute onset (hours to days)
• Fluctuating course (waxes and wanes)
• INATTENTION (hallmark!)
• Altered level of consciousness
• Caused by underlying medical condition

Always represents a MEDICAL EMERGENCY
- Something is wrong with the body affecting the brain</div></div>`,
            why_chain: [{q: "Why is inattention the hallmark?", a: "Attention requires intact arousal systems (reticular activating system) and cortical integration. Delirium disrupts these systems globally, making sustained attention impossible. Dementia initially spares attention because it's a focal cortical process."}, {q: "Why are surgical patients at high risk?", a: "Multiple factors: anesthesia effects, pain, opioid medications, sleep disruption, infection risk, inflammatory response to surgery, immobility, and underlying vulnerability (age, cognitive reserve)."}],
            points: 10
        }
    },
    {
        title: "Delirium Subtypes",
        content: `<div class="narrative"><p>This patient is <span class="highlight">hyperactive</span> - agitated, pulling at lines, hallucinating. But you recall that this isn't the only presentation.</p></div>
        <div class="socratic-prompt"><h4>Clinical Subtypes</h4><p>What are the subtypes of delirium and which is most commonly missed?</p></div>`,
        hint_beginner: "Think about the opposite of agitation - what does a quiet, withdrawn delirious patient look like?",
        hint_advanced: "What is the prognostic significance of different delirium subtypes?",
        question: {
            prompt: "Which subtype of delirium is MOST commonly missed and has the WORST prognosis?",
            options: [
                { text: "Hyperactive delirium", correct: false },
                { text: "Hypoactive delirium", correct: true },
                { text: "Mixed delirium", correct: false },
                { text: "Subsyndromal delirium", correct: false }
            ],
            explanation: {
                correct: "Correct! Hypoactive delirium is most commonly missed because patients are quiet and withdrawn rather than disruptive. It actually has the worst prognosis, possibly because it's often unrecognized and untreated.",
                incorrect: "Hypoactive delirium is most commonly missed. These patients are quiet, withdrawn, and lethargic - often mistaken for depression or 'just tired.' It has worse outcomes than hyperactive delirium."
            },
            teaching: `<h4>Delirium Subtypes</h4><table class="comparison-table"><tr><th>Subtype</th><th>Features</th><th>Recognition</th></tr><tr><td><strong>Hyperactive</strong></td><td>Agitation, restlessness, hallucinations, pulling at lines</td><td>Easily recognized (disruptive)</td></tr><tr style="background:rgba(239,68,68,0.2);"><td><strong>Hypoactive</strong></td><td>Withdrawn, quiet, lethargic, decreased activity</td><td>OFTEN MISSED - looks like depression</td></tr><tr><td><strong>Mixed</strong></td><td>Fluctuates between hyper and hypo</td><td>Most common type</td></tr></table>
<div class="alert-box"><div class="alert-title">⚠️ Hypoactive Delirium</div><p>Up to 70% of delirium is hypoactive or mixed. Hypoactive has WORSE mortality, possibly because it's missed. Always screen - don't wait for agitation!</p></div>`,
            why_chain: [{q: "Why does hypoactive delirium have worse prognosis?", a: "Likely multifactorial: (1) Often unrecognized → underlying cause not treated, (2) May reflect more severe brain dysfunction, (3) Associated with more frail patients, (4) Often caused by metabolic derangements or organ failure."}, {q: "What is mixed delirium?", a: "The most common type - patients fluctuate between hyperactive and hypoactive states, sometimes within hours. The fluctuating course is itself a hallmark of delirium."}],
            points: 10
        }
    },
    {
        title: "The CAM Assessment",
        content: `<div class="narrative"><p>You decide to formally assess for delirium using the <span class="highlight">Confusion Assessment Method (CAM)</span>, the gold standard screening tool.</p></div>
        <div class="socratic-prompt"><h4>Diagnostic Criteria</h4><p>What are the four features of the CAM, and which are required for diagnosis?</p></div>`,
        hint_beginner: "You need Features 1 AND 2, plus either 3 OR 4.",
        hint_advanced: "How do you modify CAM assessment for intubated ICU patients (CAM-ICU)?",
        question: {
            prompt: "According to CAM criteria, delirium requires which combination of features?",
            options: [
                { text: "Any 2 of the 4 features", correct: false },
                { text: "Features 1 + 2 + either 3 OR 4", correct: true },
                { text: "All 4 features must be present", correct: false },
                { text: "Feature 2 (inattention) alone is sufficient", correct: false }
            ],
            explanation: {
                correct: "Correct! CAM requires: (1) Acute onset AND fluctuating course + (2) Inattention + EITHER (3) Disorganized thinking OR (4) Altered level of consciousness.",
                incorrect: "CAM diagnosis requires Features 1 AND 2 (both mandatory), plus EITHER Feature 3 OR 4. This combination has high sensitivity and specificity for delirium."
            },
            teaching: `<h4>Confusion Assessment Method (CAM)</h4><table class="comparison-table"><tr><th>Feature</th><th>Assessment</th><th>Required?</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>1. Acute onset + fluctuating</strong></td><td>Different from baseline? Waxes and wanes?</td><td>YES</td></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>2. Inattention</strong></td><td>Difficulty focusing? Easily distracted?</td><td>YES</td></tr><tr><td><strong>3. Disorganized thinking</strong></td><td>Rambling, illogical, incoherent?</td><td>Need 3 OR 4</td></tr><tr><td><strong>4. Altered LOC</strong></td><td>Anything other than alert?</td><td>Need 3 OR 4</td></tr></table>
<div class="mechanism-box"><div class="mechanism-title">📋 Testing Attention</div><div class="pathway">Simple tests for inattention:
• Days of week backward
• Months of year backward
• Serial 7s (100-7-7-7...)
• Digit span (repeat numbers)
• Spell WORLD backward

If patient cannot complete these → inattention present</div></div>`,
            why_chain: [{q: "What is CAM-ICU?", a: "Modified CAM for intubated/non-verbal patients. Uses RASS for consciousness level, visual attention tasks, and simple yes/no questions. First check RASS: if -4 or -5 (coma), cannot assess for delirium."}, {q: "How sensitive/specific is CAM?", a: "When performed correctly: Sensitivity 94-100%, Specificity 90-95%. However, sensitivity drops significantly if performed incorrectly or rushed."}],
            points: 10
        }
    },
    {
        title: "Finding the Cause",
        content: `<div class="narrative"><p>You've confirmed delirium. Now you must find the underlying cause - delirium is always a symptom of something else!</p><p>This patient has: <span class="highlight">postoperative status, low-grade fever, on opioids for pain</span></p></div>
        <div class="alert-box"><div class="alert-title">🚨 Delirium = Medical Emergency</div><p>Always has an underlying cause. Delirium won't resolve until the cause is identified and treated!</p></div>
        <div class="socratic-prompt"><h4>Etiology</h4><p>What are the common causes of delirium, and what mnemonic helps you remember them?</p></div>`,
        hint_beginner: "Remember 'I WATCH DEATH' - Infection, Withdrawal, Acute metabolic, Trauma, CNS, Hypoxia, Deficiencies, Endocrine, Acute vascular, Toxins, Heavy metals",
        hint_advanced: "Which medications are most commonly implicated in causing delirium?",
        question: {
            prompt: "In this postoperative elderly patient, what is the MOST common cause of delirium?",
            options: [
                { text: "Primary psychiatric disorder", correct: false },
                { text: "Medications (especially opioids and anticholinergics)", correct: true },
                { text: "New stroke", correct: false },
                { text: "Alcohol withdrawal", correct: false }

    function setDifficulty(d, btn) {
        difficulty = d;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.hint-beginner').forEach(h => h.style.display = d === 'beginner' ? 'block' : 'none');
        document.querySelectorAll('.hint-advanced').forEach(h => h.style.display = d === 'advanced' ? 'block' : 'none');
    }
    function updateProgress() {
        document.getElementById('progress').style.width = ((currentStage + 1) / stages.length * 100) + '%';
        document.getElementById('maxScore').textContent = stages.length * 10;
    }
    function renderStage() {
        const stage = stages[currentStage];
        const container = document.getElementById('scene-container');
        let html = `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${currentStage + 1} of ${stages.length}</div><div class="scene-title">${stage.title}</div></div>`;
        if (stage.hint_beginner) html += `<div class="hint-beginner" style="display:${difficulty === 'beginner' ? 'block' : 'none'}">🌱 <strong>Beginner Hint:</strong> ${stage.hint_beginner}</div>`;
        if (stage.hint_advanced) html += `<div class="hint-advanced" style="display:${difficulty === 'advanced' ? 'block' : 'none'}">🎯 <strong>Advanced Challenge:</strong> ${stage.hint_advanced}</div>`;
        html += stage.content;
        if (stage.question) {
            html += `<div class="question-box"><div class="question-prompt">${stage.question.prompt}</div><div class="mcq-options">`;
            stage.question.options.forEach((opt, i) => {
                html += `<div class="mcq-option" onclick="checkAnswer(${i}, ${opt.correct})"><div class="option-letter">${String.fromCharCode(65 + i)}</div><div>${opt.text}</div></div>`;
            });
            html += `</div><div class="feedback correct-feedback" id="fb-correct"><div class="feedback-title">✓ Correct!</div>${stage.question.explanation.correct}</div>`;
            html += `<div class="feedback incorrect-feedback" id="fb-incorrect"><div class="feedback-title">✗ Not quite</div>${stage.question.explanation.incorrect}</div>`;
            if (stage.question.teaching) html += `<div class="teaching-point" id="teaching">${stage.question.teaching}</div>`;
            if (stage.question.why_chain && stage.question.why_chain.length > 0) {
                html += `<div class="why-chain" id="why-chain"><h4>🔗 WHY Chain - Dig Deeper</h4>`;
                stage.question.why_chain.forEach(w => {
                    html += `<div class="why-item"><div class="why-q">${w.q}</div><div class="why-a">${w.a}</div></div>`;
                });
                html += `</div>`;
            }
            html += `<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>`;
        }
        html += `</div>`;
        container.innerHTML = html;
        updateProgress();
    }
    function checkAnswer(idx, correct) {
        const options = document.querySelectorAll('.mcq-option');
        if (options[0].classList.contains('disabled')) return;
        options.forEach((opt, i) => {
            opt.classList.add('disabled');
            if (stages[currentStage].question.options[i].correct) opt.classList.add('correct');
            else if (i === idx && !correct) opt.classList.add('incorrect');
        });
        if (correct) {
            document.getElementById('fb-correct').classList.add('show');
            score += stages[currentStage].question.points;
            document.getElementById('score').textContent = score;
        } else {
            document.getElementById('fb-incorrect').classList.add('show');
        }
        const teaching = document.getElementById('teaching');
        if (teaching) teaching.classList.add('show');
        const whyChain = document.getElementById('why-chain');
        if (whyChain) whyChain.classList.add('show');
        document.getElementById('next-btn').classList.add('show');
    }
    function nextStage() {
        if (currentStage < stages.length - 1) { currentStage++; renderStage(); window.scrollTo(0, 0); }
        else {
            document.getElementById('scene-container').innerHTML = `<div class="scene completion"><h2 style="color:var(--rdx-teal-dark,#1f5f8b);margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>${score}</strong> / ${stages.length * 10}</p><p style="margin-bottom:30px;">You've mastered Delirium!</p><div style="text-align:left;max-width:500px;margin:0 auto;"><h4 style="color:var(--rdx-teal-dark,#1f5f8b);margin-bottom:12px;">Key Points:</h4><ul style="line-height:2;"><li>Hallmark: Inattention</li><li>CAM: Acute + Inattention + (Disorganized OR Altered)</li><li>Most missed: Hypoactive delirium</li><li>Treatment: Address underlying cause</li><li>Meds: Last resort only</li></ul></div></div>`;
        }
    }
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3a90c0'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#b45309'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#b45309'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color: #1f5f8b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
