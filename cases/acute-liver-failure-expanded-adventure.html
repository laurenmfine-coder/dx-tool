rem}.why-a{display:none;margin-top:6px;font-size:0.88rem;color:var(--rdx-text-muted,#64748b)}.next-btn{background:linear-gradient(135deg,#1f5f8b,#2874a6);color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:600;cursor:pointer;margin:20px 0;display:none;font-family:var(--rdx-font)}.next-btn:hover{opacity:0.9;transform:translateY(-1px)}.completion-card{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:16px;padding:32px;text-align:center;margin:24px 0}.completion-card h2{font-family:var(--rdx-font-serif);color:var(--rdx-teal-dark,#1f5f8b);margin-bottom:12px}.references-panel{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:16px;margin:20px 0}.references-panel a{display:block;color:var(--rdx-teal,#2874a6);font-size:13px;margin:4px 0;text-decoration:none}.references-panel a:hover{text-decoration:underline}.rdx-crossplatform-nav{background:var(--rdx-bg-card,#f8fafc);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:20px;margin:24px 0}.rdx-crossplatform-nav h4{color:var(--rdx-text-muted,#64748b);margin-bottom:12px;font-size:0.9rem}.rdx-crossplatform-links{display:flex;gap:12px;flex-wrap:wrap}.rdx-crossplatform-link{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:12px 16px;text-decoration:none;color:var(--rdx-text,#1e293b);font-size:13px;font-weight:500;transition:all 0.2s}.rdx-crossplatform-link:hover{background:rgba(40,116,166,0.05);transform:translateY(-2px)}@media(max-width:640px){.score-tracker{top:auto;bottom:12px;right:12px}.container{padding:12px}.vital-signs{grid-template-columns:repeat(3,1fr)}}</style>

<script>let currentStage=0,score=0,difficulty='standard';
const stages=[{
title:"Defining ALF",
content:`<div class="narrative"><p>A <span class='highlight'>35-year-old woman</span> with no prior liver disease presents with jaundice, confusion, and coagulopathy developing over 5 days. INR 3.8, total bilirubin 18, AST 4,200.</p><div class="vital-signs"><div class="vital-item"><span class="label">HR</span><span class="value">108</span></div><div class="vital-item"><span class="label">BP</span><span class="value">92/54</span></div><div class="vital-item"><span class="label">Temp</span><span class="value">37.8°C</span></div></div></div>`,
hint_beginner:"What defines acute liver failure vs acute hepatitis?",
hint_advanced:"ALF requires both coagulopathy (INR ≥1.5) AND hepatic encephalopathy in a patient WITHOUT pre-existing liver disease, within 26 weeks of symptom onset.",
question:{
prompt:"What findings define acute liver failure?",
options:[{text:"Jaundice with abdominal pain",correct:false},{text:"Elevated transaminases alone",correct:false},{text:"Coagulopathy (INR ≥1.5) + hepatic encephalopathy + no prior liver disease + onset <26 weeks",correct:true},{text:"Cirrhosis with decompensation",correct:false}],
explanation:{correct:"Correct! ALF requires the triad: coagulopathy (INR ≥1.5), encephalopathy, and onset <26 weeks in a patient without pre-existing chronic liver disease. This distinguishes ALF from acute-on-chronic liver failure.",incorrect:"ALF = coagulopathy + encephalopathy + no prior liver disease + acute onset. All elements must be present."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">ALF Classification</div><div class="pathway"><strong>Hyperacute:</strong> <7 days (APAP, hepatitis A/B) — better prognosis, more cerebral edema<br><strong>Acute:</strong> 7-21 days<br><strong>Subacute:</strong> 21 days - 26 weeks — worst prognosis (less edema but less regeneration)<br><br><strong>Most common causes in US:</strong> Acetaminophen (#1, ~46%), indeterminate (~14%), drug reactions (~12%), hepatitis B (~7%)</div></div>`,
why_chain:[],
points:10
}
},{
title:"Etiology Workup",
content:`<div class="narrative"><p>What testing should be done urgently?</p></div>`,
hint_beginner:"What testing should be done urgently?",
hint_advanced:"A systematic workup identifies treatable causes: APAP level, viral hepatitis panel, autoimmune markers, toxicology, pregnancy test, imaging.",
question:{
prompt:"What is the most common cause of ALF in the United States?",
options:[{text:"Wilson disease",correct:false},{text:"Autoimmune hepatitis",correct:false},{text:"Hepatitis B virus",correct:false},{text:"Acetaminophen overdose (~46% of cases)",correct:true}],
explanation:{correct:"Correct! Acetaminophen is #1 in the US and UK. Check APAP level even if patient denies ingestion — unintentional overdose is common. Other treatable causes: hepatitis B (antivirals), autoimmune hepatitis (steroids), Wilson disease (chelation), pregnancy-related (delivery).",incorrect:"Always check APAP level regardless of history. Unintentional overdose from combination products is frequently missed."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">ALF Workup</div><div class="pathway"><strong>Immediate labs:</strong> APAP level, AST/ALT/bilirubin/INR/albumin, hepatitis A/B/C/E serologies, ANA/ASMA/IgG (autoimmune), ceruloplasmin (Wilson), pregnancy test<br><strong>Toxicology:</strong> Drug screen, mushroom ingestion history (Amanita)<br><strong>Imaging:</strong> RUQ ultrasound with Doppler (Budd-Chiari, hepatic vein thrombosis)<br><strong>If pregnant:</strong> Consider AFLP, HELLP, eclampsia</div></div>`,
why_chain:[],
points:10
}
},{
title:"ICU Management",
content:`<div class="narrative"><p>The patient needs ICU admission. What are the priorities?</p></div>`,
hint_beginner:"The patient needs ICU admission. What are the priorities?",
hint_advanced:"Transfer to a transplant center early. Manage cerebral edema, coagulopathy, infection, and hemodynamic instability.",
question:{
prompt:"What is the most important early decision in ALF management?",
options:[{text:"Early transfer to a liver transplant center (before clinical deterioration)",correct:true},{text:"Perform liver biopsy",correct:false},{text:"Start empiric steroids",correct:false},{text:"Wait for peak transaminases before deciding",correct:false}],
explanation:{correct:"Correct! Transfer early — clinical deterioration can be rapid and unpredictable. Once grade III/IV encephalopathy develops, transfer becomes dangerous (intubation needed). Contact the transplant center as soon as ALF is suspected.",incorrect:"Transfer to a transplant center early. Do not wait for deterioration — ALF can progress rapidly to irreversible multiorgan failure."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">ICU Priorities</div><div class="pathway"><strong>1. Transplant center transfer</strong> (most important early decision)<br><strong>2. Cerebral edema:</strong> HOB 30°, avoid stimulation, mannitol or hypertonic saline if ICP elevated. Target Na 145-150.<br><strong>3. Coagulopathy:</strong> Only correct INR for active bleeding or procedures. Do NOT use FFP prophylactically (obscures prognostic INR monitoring).<br><strong>4. Infection:</strong> Surveillance cultures. Low threshold for empiric antibiotics (immune dysfunction).<br><strong>5. NAC:</strong> Continue NAC even for non-APAP ALF (anti-inflammatory benefit, improved transplant-free survival).</div></div>`,
why_chain:[],
points:10
}
},{
title:"Cerebral Edema",
content:`<div class="narrative"><p>The patient progresses to grade III encephalopathy (somnolent, confused but arousable). Cerebral edema is the leading cause of death in ALF.</p></div>`,
hint_beginner:"The patient progresses to grade III encephalopathy (somnolent, confused but arousable). Cerebral edema is the leading cause of death in ALF.",
hint_advanced:"How does cerebral edema develop in ALF, and how do you monitor/treat it?",
question:{
prompt:"What is the primary mechanism of cerebral edema in ALF?",
options:[{text:"Hemorrhagic transformation",correct:false},{text:"Ammonia-driven astrocyte swelling (osmotic/cytotoxic edema)",correct:true},{text:"Vasogenic edema from blood-brain barrier disruption",correct:false},{text:"Hydrocephalus from decreased CSF absorption",correct:false}],
explanation:{correct:"Correct! Ammonia crosses the BBB → glutamine synthetase converts it to glutamine in astrocytes → glutamine is osmotically active → astrocyte swelling → cytotoxic cerebral edema. This is why ammonia control and hyperosmolar therapy are critical.",incorrect:"Ammonia → astrocyte glutamine accumulation → cytotoxic edema. Control ammonia and use hyperosmolar therapy to reduce ICP."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Cerebral Edema in ALF</div><div class="pathway"><strong>Pathophysiology of Acute Liver Failure:</strong> Ammonia → glutamine in astrocytes → osmotic swelling → ICP elevation<br><strong>Prevention:</strong> Hypertonic saline (target Na 145-150), HOB 30°, avoid stimulation<br><strong>Treatment:</strong> Mannitol 0.5-1 g/kg for acute ICP crisis, hypothermia (32-34°C) for refractory cases<br><strong>Monitoring:</strong> ICP bolt controversial (bleeding risk in coagulopathic patients). CT head for herniation signs.</div></div>`,
why_chain:[],
points:10
}
},{
title:"Transplant Decision",
content:`<div class="narrative"><p>Kings College Criteria suggest this patient needs transplant listing. What are the criteria for non-APAP ALF?</p></div>`,
hint_beginner:"Kings College Criteria suggest this patient needs transplant listing. What are the criteria for non-APAP ALF?",
hint_advanced:"Non-APAP criteria differ from APAP criteria.",
question:{
prompt:"What are the Kings College Criteria for non-acetaminophen ALF?",
options:[{text:"pH <7.30 alone",correct:false},{text:"MELD score >30",correct:false},{text:"INR >6.5 alone, OR any 3 of: age <10 or >40, unfavorable etiology, jaundice-to-encephalopathy >7 days, INR >3.5, bilirubin >17.5",correct:true},{text:"Ammonia >200",correct:false}],
explanation:{correct:"Correct! Non-APAP Kings College Criteria: INR >6.5 (single criterion). OR any 3 of: age <10 or >40, unfavorable etiology (seronegative hepatitis, drug reaction), jaundice-to-encephalopathy interval >7 days, INR >3.5, bilirubin >17.5 mg/dL.",incorrect:"Non-APAP KCC differs from APAP KCC. INR >6.5 alone qualifies. The combination criteria use age, etiology, timing, INR, and bilirubin."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Transplant Criteria</div><div class="pathway"><strong>APAP KCC:</strong> pH <7.30 OR (INR >6.5 + Cr >3.4 + Grade III/IV HE)<br><strong>Non-APAP KCC:</strong> INR >6.5 OR any 3 of:<br>• Age <10 or >40<br>• Unfavorable etiology<br>• Jaundice-to-encephalopathy >7 days<br>• INR >3.5<br>• Bilirubin >17.5 mg/dL<br><br><strong>Contraindications to transplant:</strong> Active substance abuse, uncontrolled infection, severe comorbidities, brain death</div></div>`,
why_chain:[],
points:10
}
},{
title:"Prognosis",
content:`<div class="narrative"><p>What factors predict spontaneous survival vs need for transplant?</p></div>`,
hint_beginner:"What factors predict spontaneous survival vs need for transplant?",
hint_advanced:"APAP ALF has the best spontaneous survival (~65% without transplant). Non-APAP ALF has worse spontaneous survival (~25%).",
question:{
prompt:"Which etiology of ALF has the best prognosis for spontaneous recovery?",
options:[{text:"Wilson disease",correct:false},{text:"Drug-induced (non-APAP)",correct:false},{text:"Hepatitis B",correct:false},{text:"Acetaminophen (~65% spontaneous survival without transplant)",correct:true}],
explanation:{correct:"Correct! APAP and hepatitis A have the best spontaneous survival rates. Wilson disease and drug reactions have the worst. With transplant available, overall ALF survival has improved from <20% to >65%.",incorrect:"APAP ALF has the best spontaneous survival. Wilson disease presenting as ALF has very poor prognosis without transplant."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">ALF Outcomes</div><div class="pathway"><strong>Spontaneous survival by etiology:</strong><br>• APAP: ~65%<br>• Hepatitis A: ~60%<br>• Hepatitis B: ~25%<br>• Drug reactions: ~25%<br>• Wilson disease: ~0% (universally fatal without transplant)<br>• Indeterminate: ~15%<br><br><strong>With transplant:</strong> Overall survival >65%<br><strong>Key:</strong> Early prognostication and transplant listing save lives</div></div>`,
why_chain:[],
points:10
}
}];
document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hb=document.querySelector('.hint-box');if(hb)hb.style.display=d==='beginner'?'block':'none'}
function toggleReferences(){const c=document.getElementById('referencesContent');const t=document.getElementById('refToggle');if(c.style.display==='none'){c.style.display='block';t.innerHTML='&#9662;'}else{c.style.display='none';t.innerHTML='&#9656;'}}
function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100);document.getElementById('progress').style.width=pct+'%';let h='<h2 class="scene-title">'+st.title+'</h2>';h+='<div class="scene-content">'+st.content+'</div>';if(st.hint_beginner)h+='<div class="hint-box" id="hint-box"'+(difficulty==='beginner'?' style="display:block"':'')+'> '+st.hint_beginner+'</div>';if(difficulty==='advanced'&&st.hint_advanced)h+='<div class="hint-box" style="display:block;background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.15);color:#5b21b6"> '+st.hint_advanced+'</div>';if(st.question){h+='<div class="socratic-prompt"><h4>Clinical Question</h4><p>'+st.question.prompt+'</p></div>';h+='<div class="options-grid" id="options-'+idx+'">';st.question.options.forEach((opt,oi)=>{h+='<button class="option-btn" id="option-'+idx+'-'+oi+'" onclick="checkAnswer('+idx+','+oi+')">'+String.fromCharCode(65+oi)+'. '+opt.text+'</button>'});h+='</div>';h+='<div class="explanation-box" id="explain-'+idx+'"></div>';h+='<div id="teaching-'+idx+'" style="display:none">'+st.question.teaching+'</div>';if(st.question.why_chain&&st.question.why_chain.length>0){h+='<div id="why-'+idx+'" style="display:none">';st.question.why_chain.forEach((wc,wi)=>{h+='<div class="why-chain"><div class="why-q" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'"> '+wc.q+'</div><div class="why-a">'+wc.a+'</div></div>'});h+='</div>'}}h+='<button class="next-btn" id="next-'+idx+'" onclick="nextStage()">Continue &rarr;</button>';document.getElementById('scene-container').innerHTML=h}
function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll('#options-'+si+' .option-btn').forEach((b,i)=>{b.classList.add('disabled');if(st.question.options[i].correct)b.classList.add('correct');if(i===oi&&!opt.correct)b.classList.add('incorrect')});const eb=document.getElementById('explain-'+si);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;eb.className='explanation-box correct';eb.innerHTML='<strong>Correct!</strong> '+st.question.explanation.correct}else{eb.className='explanation-box incorrect';eb.innerHTML='<strong>Not quite.</strong> '+st.question.explanation.incorrect}eb.style.display='block';document.getElementById('teaching-'+si).style.display='block';const wy=document.getElementById('why-'+si);if(wy)wy.style.display='block';document.getElementById('next-'+si).style.display='inline-block'}
function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let lvl='Developing';if(pct>=90)lvl='Mastery';else if(pct>=70)lvl='Proficient';else if(pct>=50)lvl='Competent';document.getElementById('scene-container').innerHTML='<div class="completion-card"><h2>Case Complete!</h2><p style="font-size:2rem;font-weight:700;color:var(--rdx-teal,#2874a6)">'+pct+'%</p><p style="color:var(--rdx-text-muted,#64748b)">Score: '+score+'/'+mx+'</p><p style="margin:12px 0;font-weight:600">Level: '+lvl+'</p><div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="../adventure-hub.html" style="padding:10px 20px;background:var(--rdx-teal,#2874a6);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">More Cases</a><a href="../tools/learning-dashboard.html" style="padding:10px 20px;background:var(--rdx-purple,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">Dashboard</a><button onclick="currentStage=0;score=0;document.getElementById(\'score\').textContent=0;renderStage(0)" style="padding:10px 20px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;cursor:pointer;font-weight:600">Retry</button></div></div>';try{const progress=JSON.parse(localStorage.getItem('reasondx-progress')||'{}');if(!progress.cases)progress.cases={};progress.cases['acute-liver-failure']=Math.max(progress.cases['acute-liver-failure']||0,pct);localStorage.setItem('reasondx-progress',JSON.stringify(progress))}catch(e){}}
renderStage(0);</script>
