    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"Muscle Pain After Exertion",content:'<div class="narrative"><p>A <span class="highlight">25-year-old man</span> presents with severe muscle pain after an intense CrossFit workout 2 days ago. He notices his <span class="critical">urine is dark brown ("tea-colored")</span>. He has diffuse muscle tenderness.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 100, BP 135/85<br><strong>Labs:</strong> CK 45,000 U/L, Cr 2.1 (baseline 1.0), K 5.8</p></div><div class="alert-box"><div class="alert-title">🚨 Classic Triad of Rhabdomyolysis</div><p>Myalgias + Dark urine + Elevated CK</p></div>',question:{prompt:"What CK level is diagnostic for rhabdomyolysis?",options:[{text:"CK >500 U/L",correct:false},{text:"CK >5× upper limit of normal (~1000 U/L)",correct:true},{text:"CK >100,000 U/L",correct:false},{text:"Any elevated CK",correct:false}],explanation:{correct:"Correct! Rhabdomyolysis is defined as CK >5× ULN (typically >1000 U/L). However, CK can range from 1,500 to >100,000. Higher CK = higher risk of AKI.",incorrect:"CK >5× ULN (roughly >1000 U/L) defines rhabdomyolysis. Higher levels = higher AKI risk."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Rhabdomyolysis Basics</div><div class="pathway">DEFINITION:\nSkeletal muscle breakdown releasing\nintracellular contents into blood\n\nCLASSIC TRIAD:\n• Myalgias/muscle weakness\n• Dark urine (myoglobinuria)\n• Elevated CK (>5× ULN)\n\nRELEASED CONTENTS:\n• Myoglobin (causes AKI)\n• CK (diagnostic marker)\n• Potassium (hyperkalemia!)\n• Phosphorus\n• Uric acid</div></div>',why_chain:[],points:10}},
        {title:"Causes of Rhabdomyolysis",content:'<div class="narrative"><p>This patient had exertional rhabdomyolysis from intense exercise. But there are many other causes.</p></div>',question:{prompt:"Which is the MOST common cause of rhabdomyolysis?",options:[{text:"Statin medications",correct:false},{text:"Trauma/crush injury and exertion",correct:true},{text:"Infections alone",correct:false},{text:"Electrolyte abnormalities alone",correct:false}],explanation:{correct:"Correct! Trauma/crush injury and exertional causes are most common. Other causes: drugs/toxins (statins, alcohol, cocaine), immobilization, seizures, hyperthermia, infections, electrolyte disorders.",incorrect:"Trauma/crush and exertion are most common. Many other causes exist - always look for underlying trigger."},teaching:'<h4>Causes of Rhabdomyolysis</h4><table class="comparison-table"><tr><th>Category</th><th>Examples</th></tr><tr><td>Traumatic</td><td>Crush injury, compartment syndrome</td></tr><tr><td>Exertional</td><td>Intense exercise, seizures, hyperthermia</td></tr><tr><td>Drugs/Toxins</td><td>Statins, alcohol, cocaine, heroin</td></tr><tr><td>Immobilization</td><td>Found down, prolonged surgery</td></tr><tr><td>Metabolic</td><td>Hypokalemia, hypophosphatemia</td></tr><tr><td>Infections</td><td>Influenza, Legionella, HIV</td></tr><tr><td>Genetic</td><td>McArdle disease, CPT2 deficiency</td></tr></table>',why_chain:[],points:10}},
        {title:"Mechanism of AKI",content:'<div class="narrative"><p>Your patient has AKI (Cr 2.1 from baseline 1.0). How does rhabdomyolysis cause kidney injury?</p></div>',question:{prompt:"What is the PRIMARY mechanism of AKI in rhabdomyolysis?",options:[{text:"Direct CK toxicity to tubules",correct:false},{text:"Myoglobin-induced tubular injury and obstruction",correct:true},{text:"Glomerulonephritis",correct:false},{text:"Prerenal azotemia only",correct:false}],explanation:{correct:"Correct! Myoglobin causes AKI via: (1) direct tubular toxicity (free radical generation), (2) tubular obstruction (myoglobin casts), and (3) renal vasoconstriction. Acidic urine worsens precipitation.",incorrect:"Myoglobin is the culprit - tubular toxicity, cast obstruction, and vasoconstriction. Acidic urine worsens it."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 AKI Mechanism</div><div class="pathway">MYOGLOBIN → AKI via:\n\n1. DIRECT TUBULAR TOXICITY\n   • Free radical generation\n   • Lipid peroxidation\n   • Worst in acidic pH\n\n2. TUBULAR OBSTRUCTION\n   • Myoglobin + Tamm-Horsfall protein\n   • Form obstructing casts\n\n3. RENAL VASOCONSTRICTION\n   • Myoglobin scavenges NO\n   • Reduces renal blood flow\n\nRISK FACTORS FOR AKI:\n• CK >15,000-20,000\n• Dehydration/hypovolemia\n• Acidic urine\n• Pre-existing renal disease</div></div>',why_chain:[],points:10}},
        {title:"Treatment: Aggressive IV Fluids",content:'<div class="narrative"><p>The cornerstone of treatment is aggressive fluid resuscitation.</p></div>',question:{prompt:"What is the FIRST-LINE treatment for rhabdomyolysis?",options:[{text:"Loop diuretics",correct:false},{text:"Aggressive IV crystalloid (NS or LR) at 200-300 mL/hr",correct:true},{text:"Sodium bicarbonate infusion",correct:false},{text:"Hemodialysis immediately",correct:false}],explanation:{correct:"Correct! Aggressive IV fluids (NS or LR, 200-300+ mL/hr initially) to maintain UOP 200-300 mL/hr. Goal: dilute myoglobin, maintain renal perfusion, prevent cast formation. Bicarb is controversial.",incorrect:"IV fluids are first-line! Goal UOP 200-300 mL/hr. Bicarb is controversial and not first-line."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Treatment Protocol</div><div class="pathway">AGGRESSIVE IV FLUIDS:\n• NS or LR at 200-300+ mL/hr initially\n• May need 10-12 L/day\n• Goal UOP: 200-300 mL/hr (or 3 mL/kg/hr)\n• Monitor for volume overload\n\nURINE ALKALINIZATION (controversial):\n• Sodium bicarbonate\n• Goal urine pH >6.5\n• May prevent myoglobin precipitation\n• Not proven to improve outcomes\n\nAVOID:\n• Nephrotoxins (NSAIDs, contrast)\n• Loop diuretics (may worsen)\n\nMONITOR:\n• CK q6-12h until trending down\n• Electrolytes (K, Ca, Phos)\n• Renal function</div></div>',why_chain:[],points:10}},
        {title:"Electrolyte Complications",content:'<div class="narrative"><p>Your patient has K 5.8. Hyperkalemia is a major complication of rhabdomyolysis.</p></div>',question:{prompt:"Why is hypocalcemia common EARLY in rhabdomyolysis?",options:[{text:"Increased urinary calcium loss",correct:false},{text:"Calcium deposits in damaged muscle tissue",correct:true},{text:"Vitamin D deficiency",correct:false},{text:"Parathyroid suppression",correct:false}],explanation:{correct:"Correct! Early: calcium deposits into damaged muscle (hypocalcemia). Late: calcium is released back as muscle heals → rebound hypercalcemia. Don\'t aggressively treat early hypocalcemia unless symptomatic!",incorrect:"Calcium deposits in damaged muscle early → hypocalcemia. Later, released back → hypercalcemia. Avoid over-treating early."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Electrolyte Issues</div><div class="pathway">HYPERKALEMIA (most dangerous!):\n• Released from muscle cells\n• Can cause arrhythmias\n• Treat aggressively\n\nHYPOCALCEMIA (early):\n• Calcium enters damaged muscle\n• Usually asymptomatic\n• DON\'T over-treat (causes rebound hypercalcemia)\n• Only treat if symptomatic\n\nHYPERCALCEMIA (late/recovery):\n• Calcium released from healing muscle\n\nHYPERPHOSPHATEMIA:\n• Released from cells\n\nHYPERURICEMIA:\n• From purine metabolism</div></div>',why_chain:[],points:10}},
        {title:"Compartment Syndrome",content:'<div class="narrative"><p>A trauma patient with rhabdomyolysis complains of severe leg pain out of proportion to exam, pain with passive stretch.</p></div>',question:{prompt:"What finding is MOST concerning for compartment syndrome?",options:[{text:"Elevated CK",correct:false},{text:"Pain out of proportion with passive stretch, tense compartment",correct:true},{text:"Dark urine",correct:false},{text:"Hyperkalemia",correct:false}],explanation:{correct:"Correct! Compartment syndrome: pain out of proportion, pain with passive stretch, tense compartment. The 5 P\'s (pain, pressure, paresthesias, paralysis, pulselessness) are late findings. Requires emergent fasciotomy!",incorrect:"Pain out of proportion + pain with passive stretch = compartment syndrome. Emergent fasciotomy needed!"},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Compartment Syndrome</div><div class="pathway">CAN CAUSE OR RESULT FROM RHABDO!\n\nEARLY SIGNS (act on these!):\n• Pain out of proportion to exam\n• Pain with passive stretch\n• Tense, swollen compartment\n\nLATE SIGNS (bad prognosis):\n• Paresthesias\n• Paralysis\n• Pulselessness\n• Pallor\n\nDIAGNOSIS:\n• Clinical suspicion\n• Compartment pressure >30 mmHg\n• Or within 30 of diastolic BP\n\nTREATMENT:\nEMERGENT FASCIOTOMY</div></div>',why_chain:[],points:10}},
        {title:"Case Resolution",content:'<div class="narrative"><p>Your patient received aggressive IV fluids (>10L over first 24h) with UOP maintained at 250 mL/hr. CK peaked at 60,000 then trended down. Creatinine normalized by day 5. Hyperkalemia resolved with fluids. Counseled on gradual return to exercise.</p></div><div class="mechanism-box"><div class="mechanism-title">📚 Rhabdomyolysis Summary</div><div class="pathway">TRIAD:\nMyalgias + Dark urine + CK >5× ULN\n\nCAUSES:\nTrauma, exertion, drugs, immobilization\n\nCOMPLICATIONS:\n• AKI (myoglobin toxicity)\n• Hyperkalemia (life-threatening!)\n• Hypocalcemia (early) → hypercalcemia (late)\n• Compartment syndrome\n\nTREATMENT:\n• Aggressive IV fluids (goal UOP 200-300 mL/hr)\n• Monitor/treat hyperkalemia\n• Avoid nephrotoxins\n• Dialysis if refractory AKI</div></div>',question:{prompt:"A patient with rhabdomyolysis has early asymptomatic hypocalcemia (Ca 7.8). What should you do?",options:[{text:"Aggressively replace calcium IV",correct:false},{text:"Monitor closely but avoid aggressive calcium replacement",correct:true},{text:"Start calcitriol",correct:false},{text:"Emergent dialysis",correct:false}],explanation:{correct:"Correct! Avoid aggressive calcium replacement for asymptomatic early hypocalcemia - it will deposit in damaged muscle and cause worse rebound hypercalcemia during recovery. Only treat if symptomatic.",incorrect:"Don\'t aggressively replace! Calcium deposits in muscle → worsens rebound hypercalcemia. Treat only if symptomatic."},teaching:'<h4>Key Takeaways</h4><ul style="line-height:2;margin-left:20px;"><li>CK >5× ULN defines rhabdomyolysis</li><li>Myoglobin causes AKI</li><li>Aggressive IV fluids are first-line</li><li>Goal UOP 200-300 mL/hr</li><li>Watch for hyperkalemia (dangerous!)</li><li>Don\'t over-treat early hypocalcemia</li><li>Consider compartment syndrome</li></ul>',why_chain:[],points:10}},
        {title:"Clinical Integration",content:'<div class="narrative"><p>You synthesize all the clinical information to ensure optimal patient care.</p></div>',question:{prompt:"What principle is MOST important for excellent clinical outcomes?",options:[{text:"Integrating clinical presentation with evidence-based guidelines while reassessing response to treatment",correct:true},{text:"Following protocols exactly without clinical judgment",correct:false},{text:"Ordering comprehensive testing to avoid any missed diagnoses",correct:false},{text:"Making a diagnosis quickly and committing to it without reconsideration",correct:false}],explanation:{correct:"Excellent clinical care combines systematic assessment, evidence-based treatment, and ongoing reassessment. Guidelines inform but don't replace clinical reasoning.",incorrect:"Good clinical care requires flexibility, reassessment, and integration of guidelines with patient-specific factors."},teaching:'<h4>Clinical Reasoning</h4><ul><li>Systematic data gathering</li><li>Evidence-based management</li><li>Regular reassessment</li><li>Patient-centered communication</li></ul>',why_chain:[],points:10}}
    ];
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:#4ade80;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><p>You mastered Rhabdomyolysis!</p></div>';}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#14b8a6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
