<script>let currentStage=0,score=0,difficulty='standard';
const stages=[{
title:"The Clinical Scenario",
content:`<div class="narrative"><p>A 60-year-old with enterococcal endocarditis needs synergistic therapy. Blood cultures grew ampicillin-susceptible E. faecalis.</p><div class="vital-signs"><div class="vital-item"><span class="label">HR</span><span class="value">96</span></div><div class="vital-item"><span class="label">Temp</span><span class="value">38.5°C</span></div></div></div>`,
hint_beginner:"Review the mechanism of action of Aminoglycosides.",
hint_advanced:"Consider the molecular target and whether Aminoglycosides is bactericidal or bacteriostatic.",
question:{
prompt:"What is the mechanism of action of Aminoglycosides?",
options:[{text:"Bind 30S ribosome causing mRNA misreading — bactericidal",correct:true},{text:"Block DNA gyrase",correct:false},{text:"Inhibit cell wall synthesis",correct:false},{text:"Bind 50S ribosome",correct:false}],
explanation:{correct:"Correct! Aminoglycosides bind the 30S ribosomal subunit, causing mRNA misreading and bactericidal protein synthesis inhibition.",incorrect:"Aminoglycosides bind the 30S ribosomal subunit, causing mRNA misreading and bactericidal protein synthesis inhibition."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Aminoglycosides Mechanism</div><div class="pathway"><strong>Target:</strong> 30S ribosomal subunit (specifically 16S rRNA)<br><strong>Effect:</strong> Causes mRNA misreading → aberrant proteins → membrane damage → bactericidal<br><strong>Unique:</strong> One of few protein synthesis inhibitors that is bactericidal (not just static)<br><strong>Requires O2:</strong> Requires aerobic metabolism for uptake → NO anaerobic activity</div></div>`,
why_chain:[{q:"Why are aminoglycosides bactericidal unlike other protein synthesis inhibitors?",a:"Unlike other ribosomal inhibitors that simply block translation, aminoglycosides cause MISREADING of mRNA → aberrant proteins are inserted into the cell membrane → membrane damage → cell lysis. This membrane disruption also enhances further aminoglycoside uptake (positive feedback)."}],
points:10
}
},{
title:"Spectrum of Activity",
content:`<div class="narrative"><p>Understanding the antimicrobial spectrum is essential for appropriate use of Aminoglycosides.</p></div>`,
hint_beginner:"What organisms does Aminoglycosides cover?",
hint_advanced:"Consider the unique coverage gaps and strengths compared to alternatives.",
question:{
prompt:"What is a key feature of Aminoglycosides spectrum?",
options:[{text:"Primary MRSA agent",correct:false},{text:"Excellent aerobic gram-negative coverage including Pseudomonas, synergy with cell wall agents",correct:true},{text:"Broad anaerobic coverage",correct:false},{text:"Anti-fungal activity",correct:false}],
explanation:{correct:"Correct! Aminoglycosides cover aerobic gram-negatives including Pseudomonas. They are synergistic with beta-lactams for enterococcal endocarditis.",incorrect:"Aminoglycosides cover aerobic gram-negatives including Pseudomonas. They are synergistic with beta-lactams for enterococcal endocarditis."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Aminoglycosides Spectrum</div><div class="pathway"><strong>Gram-negatives:</strong> Excellent aerobic coverage (E. coli, Klebsiella, Pseudomonas, Serratia)<br><strong>Synergy:</strong> With beta-lactams for enterococcal and staphylococcal endocarditis<br><strong>NOT effective:</strong> Anaerobes (requires O2 for drug uptake), intracellular organisms<br><strong>Agents:</strong> Gentamicin (synergy, general), Tobramycin (Pseudomonas, CF), Amikacin (resistant organisms), Streptomycin (TB, tularemia)</div></div>`,
why_chain:[{q:"Why do aminoglycosides not work against anaerobes?",a:"Aminoglycoside uptake into bacteria requires oxygen-dependent active transport across the cytoplasmic membrane. Anaerobes lack this aerobic electron transport → drug cannot enter → no activity."}],
points:10
}
},{
title:"Dosing & Administration",
content:`<div class="narrative"><p>Proper dosing of Aminoglycosides requires understanding its pharmacokinetics.</p></div>`,
hint_beginner:"What are the key dosing principles?",
hint_advanced:"Consider the PK/PD parameters that drive efficacy.",
question:{
prompt:"What dosing principle is most important for Aminoglycosides?",
options:[{text:"Oral administration preferred",correct:false},{text:"Fixed q8h dosing regardless of renal function",correct:false},{text:"Extended-interval (once-daily) dosing to maximize peak concentration and minimize toxicity",correct:true},{text:"Continuous infusion for time-dependent killing",correct:false}],
explanation:{correct:"Correct! Concentration-dependent killing with significant post-antibiotic effect. Extended-interval (once-daily) dosing maximizes peak:MIC ratio while minimizing toxicity.",incorrect:"Concentration-dependent killing with significant post-antibiotic effect. Extended-interval (once-daily) dosing maximizes peak:MIC ratio while minimizing toxicity."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Aminoglycosides Dosing</div><div class="pathway"><strong>Concentration-dependent killing:</strong> Higher peak → more killing<br><strong>Post-antibiotic effect:</strong> Continued killing after drug levels fall below MIC<br><strong>Extended-interval dosing:</strong> Single daily dose (5-7 mg/kg gentamicin) → higher peak, lower trough → better efficacy, less toxicity<br><strong>Renal adjustment:</strong> Extend interval (not reduce dose) in renal impairment<br><strong>Monitor:</strong> Peaks and troughs or use Hartford nomogram</div></div>`,
why_chain:[{q:"Why once-daily dosing instead of divided doses?",a:"Once-daily dosing achieves a higher peak:MIC ratio (concentration-dependent killing) while allowing troughs to fall below toxic thresholds (reducing nephro/ototoxicity). The post-antibiotic effect means bacteria are still suppressed even when drug levels drop."}],
points:10
}
},{
title:"Adverse Effects",
content:`<div class="narrative"><p>Monitoring for adverse effects is critical with Aminoglycosides therapy.</p></div>`,
hint_beginner:"What are the major side effects to monitor?",
hint_advanced:"Consider which adverse effects are dose-dependent vs idiosyncratic.",
question:{
prompt:"What is the most clinically significant adverse effect of Aminoglycosides?",
options:[{text:"Hepatotoxicity",correct:false},{text:"QT prolongation",correct:false},{text:"C. difficile colitis",correct:false},{text:"Ototoxicity (irreversible cochlear and vestibular damage) and nephrotoxicity",correct:true}],
explanation:{correct:"Correct! Nephrotoxicity (reversible, related to trough accumulation) and ototoxicity (irreversible vestibular and cochlear damage).",incorrect:"Nephrotoxicity (reversible, related to trough accumulation) and ototoxicity (irreversible vestibular and cochlear damage)."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Aminoglycosides Adverse Effects</div><div class="pathway"><strong>Nephrotoxicity:</strong> Tubular damage, usually reversible. Risk increases with duration, trough accumulation, concurrent nephrotoxins.<br><strong>Ototoxicity:</strong> IRREVERSIBLE vestibular (vertigo) and/or cochlear (hearing loss) damage. Risk increases with cumulative dose and duration.<br><strong>Neuromuscular blockade:</strong> Rare but can potentiate neuromuscular blocking agents → respiratory failure (caution in myasthenia gravis)</div></div>`,
why_chain:[{q:"Why is ototoxicity irreversible but nephrotoxicity is not?",a:"Hair cells in the cochlea and vestibular apparatus do not regenerate in humans. Aminoglycosides accumulate in the endolymph and destroy these cells permanently. Renal tubular cells can regenerate, so nephrotoxicity is usually reversible if caught early."}],
points:10
}
},{
title:"Resistance Mechanisms",
content:`<div class="narrative"><p>Understanding resistance to Aminoglycosides guides empiric therapy decisions.</p></div>`,
hint_beginner:"How do bacteria develop resistance to Aminoglycosides?",
hint_advanced:"Consider enzymatic modification, target alteration, and efflux mechanisms.",
question:{
prompt:"What is the primary resistance mechanism against Aminoglycosides?",
options:[{text:"Aminoglycoside-modifying enzymes that chemically alter the drug (acetylation, phosphorylation, adenylation)",correct:true},{text:"Beta-lactamase production",correct:false},{text:"Ribosomal methylation only",correct:false},{text:"Porin mutations only",correct:false}],
explanation:{correct:"Correct! Aminoglycoside-modifying enzymes (acetyltransferases, phosphotransferases, nucleotidyltransferases) are the most common mechanism.",incorrect:"Aminoglycoside-modifying enzymes (acetyltransferases, phosphotransferases, nucleotidyltransferases) are the most common mechanism."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Aminoglycosides Resistance</div><div class="pathway"><strong>Most common:</strong> Aminoglycoside-modifying enzymes<br>• Acetyltransferases (AAC), Phosphotransferases (APH), Nucleotidyltransferases (ANT)<br><strong>16S rRNA methylation:</strong> High-level resistance to all aminoglycosides (concerning, plasmid-mediated)<br><strong>Amikacin advantage:</strong> Resistant to most modifying enzymes due to structural protection at the modification sites</div></div>`,
why_chain:[{q:"Why is amikacin resistant to most modifying enzymes?",a:"Amikacin has an additional amino-hydroxybutyric acid side chain that physically blocks most acetyltransferases and phosphotransferases from accessing their modification sites on the drug."}],
points:10
}
},{
title:"Clinical Application",
content:`<div class="narrative"><p>Selecting the optimal clinical scenario for Aminoglycosides requires integrating all of the above knowledge.</p></div>`,
hint_beginner:"When is Aminoglycosides the best choice?",
hint_advanced:"Consider guideline recommendations and clinical pearls.",
question:{
prompt:"In which clinical scenario is Aminoglycosides most appropriate?",
options:[{text:"First-line UTI treatment",correct:false},{text:"Synergistic combination with ampicillin for enterococcal endocarditis",correct:true},{text:"C. difficile treatment",correct:false},{text:"Monotherapy for pneumonia",correct:false}],
explanation:{correct:"Correct! Gentamicin + ampicillin for enterococcal endocarditis synergy. Tobramycin preferred for Pseudomonas (inhaled in CF). Amikacin for resistant gram-negatives (resistant to most modifying enzymes).",incorrect:"Gentamicin + ampicillin for enterococcal endocarditis synergy. Tobramycin preferred for Pseudomonas (inhaled in CF). Amikacin for resistant gram-negatives (resistant to most modifying enzymes)."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Clinical Pearls</div><div class="pathway"><strong>Enterococcal endocarditis:</strong> Ampicillin + gentamicin (or ampicillin + ceftriaxone alternative)<br><strong>CF Pseudomonas:</strong> Inhaled tobramycin chronic suppression<br><strong>MDR gram-negatives:</strong> Amikacin often retains activity<br><strong>TB:</strong> Streptomycin or amikacin as part of MDR-TB regimens<br><strong>Empiric sepsis:</strong> Combined with beta-lactam for double gram-negative coverage</div></div>`,
why_chain:[{q:"When should you avoid gentamicin for enterococcal endocarditis?",a:"When the isolate shows high-level gentamicin resistance (HLGR, MIC >500). HLGR abolishes synergy. Alternative: ampicillin + ceftriaxone (double cell wall inhibition provides synergistic bactericidal activity without aminoglycoside)."}],
points:10
}
}];
document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hb=document.querySelector('.hint-box');if(hb)hb.style.display=d==='beginner'?'block':'none'}
function toggleReferences(){const c=document.getElementById('referencesContent');const t=document.getElementById('refToggle');if(c.style.display==='none'){c.style.display='block';t.innerHTML='&#9662;'}else{c.style.display='none';t.innerHTML='&#9656;'}}
function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100);document.getElementById('progress').style.width=pct+'%';let h='<h2 class="scene-title">'+st.title+'</h2>';h+='<div class="scene-content">'+st.content+'</div>';if(st.hint_beginner)h+='<div class="hint-box" id="hint-box"'+(difficulty==='beginner'?' style="display:block"':'')+'> '+st.hint_beginner+'</div>';if(difficulty==='advanced'&&st.hint_advanced)h+='<div class="hint-box" style="display:block;background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.15);color:#5b21b6"> '+st.hint_advanced+'</div>';if(st.question){h+='<div class="socratic-prompt"><h4>Clinical Question</h4><p>'+st.question.prompt+'</p></div>';h+='<div class="options-grid" id="options-'+idx+'">';st.question.options.forEach((opt,oi)=>{h+='<button class="option-btn" id="option-'+idx+'-'+oi+'" onclick="checkAnswer('+idx+','+oi+')">'+String.fromCharCode(65+oi)+'. '+opt.text+'</button>'});h+='</div>';h+='<div class="explanation-box" id="explain-'+idx+'"></div>';h+='<div id="teaching-'+idx+'" style="display:none">'+st.question.teaching+'</div>';if(st.question.why_chain&&st.question.why_chain.length>0){h+='<div id="why-'+idx+'" style="display:none">';st.question.why_chain.forEach((wc,wi)=>{h+='<div class="why-chain"><div class="why-q" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'"> '+wc.q+'</div><div class="why-a">'+wc.a+'</div></div>'});h+='</div>'}}h+='<button class="next-btn" id="next-'+idx+'" onclick="nextStage()">Continue &rarr;</button>';document.getElementById('scene-container').innerHTML=h}
function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll('#options-'+si+' .option-btn').forEach((b,i)=>{b.classList.add('disabled');if(st.question.options[i].correct)b.classList.add('correct');if(i===oi&&!opt.correct)b.classList.add('incorrect')});const eb=document.getElementById('explain-'+si);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;eb.className='explanation-box correct';eb.innerHTML='<strong>Correct!</strong> '+st.question.explanation.correct}else{eb.className='explanation-box incorrect';eb.innerHTML='<strong>Not quite.</strong> '+st.question.explanation.incorrect}eb.style.display='block';document.getElementById('teaching-'+si).style.display='block';const wy=document.getElementById('why-'+si);if(wy)wy.style.display='block';document.getElementById('next-'+si).style.display='inline-block'}
function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let lvl='Developing';if(pct>=90)lvl='Mastery';else if(pct>=70)lvl='Proficient';else if(pct>=50)lvl='Competent';document.getElementById('scene-container').innerHTML='<div class="completion-card"><h2>Case Complete!</h2><p style="font-size:2rem;font-weight:700;color:var(--rdx-teal,#2874a6)">'+pct+'%</p><p style="color:var(--rdx-text-muted,#64748b)">Score: '+score+'/'+mx+'</p><p style="margin:12px 0;font-weight:600">Level: '+lvl+'</p><div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="../adventure-hub.html" style="padding:10px 20px;background:var(--rdx-teal,#2874a6);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">More Cases</a><a href="../tools/learning-dashboard.html" style="padding:10px 20px;background:var(--rdx-purple,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">Dashboard</a><button onclick="currentStage=0;score=0;document.getElementById(\'score\').textContent=0;renderStage(0)" style="padding:10px 20px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;cursor:pointer;font-weight:600">Retry</button></div></div>';try{const progress=JSON.parse(localStorage.getItem('reasondx-progress')||'{}');if(!progress.cases)progress.cases={};progress.cases['aminoglycosides']=Math.max(progress.cases['aminoglycosides']||0,pct);localStorage.setItem('reasondx-progress',JSON.stringify(progress))}catch(e){}}
renderStage(0);</script>
