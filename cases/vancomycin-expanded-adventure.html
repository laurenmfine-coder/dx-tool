lign:center;font-size:13px}.vital-item .label{color:var(--rdx-text-muted,#64748b);font-size:11px;display:block}.vital-item .value{font-weight:700;color:var(--rdx-teal-dark,#1f5f8b)}.socratic-prompt{background:linear-gradient(135deg,rgba(124,58,237,0.06),rgba(40,116,166,0.06));border:1px solid rgba(124,58,237,0.15);border-radius:12px;padding:16px 20px;margin:16px 0}.socratic-prompt h4{color:var(--rdx-purple,#7c3aed);font-size:0.95rem;margin-bottom:8px}.hint-box{background:rgba(217,119,6,0.06);border:1px solid rgba(217,119,6,0.15);border-radius:8px;padding:12px;margin:8px 0;font-size:0.9rem;color:#92400e;display:none}.options-grid{display:grid;gap:10px;margin:16px 0}.option-btn{background:var(--rdx-bg-card,#fff);border:2px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:14px 18px;cursor:pointer;text-align:left;font-size:14px;transition:all 0.2s;font-family:var(--rdx-font)}.option-btn:hover{border-color:var(--rdx-teal,#2874a6);background:rgba(40,116,166,0.03)}.option-btn.correct{border-color:#16a34a;background:rgba(22,163,74,0.06)}.option-btn.incorrect{border-color:#dc2626;background:rgba(220,38,38,0.04)}.option-btn.disabled{pointer-events:none;opacity:0.7}.explanation-box{border-radius:12px;padding:16px;margin:12px 0;display:none}.explanation-box.correct{background:rgba(22,163,74,0.06);border:1px solid rgba(22,163,74,0.2)}.explanation-box.incorrect{background:rgba(220,38,38,0.04);border:1px solid rgba(220,38,38,0.15)}.mechanism-box{background:linear-gradient(135deg,rgba(40,116,166,0.06),rgba(40,116,166,0.02));border:1px solid rgba(40,116,166,0.15);border-radius:12px;padding:20px;margin:16px 0}.mechanism-title{color:var(--rdx-teal-dark,#1f5f8b);font-weight:700;font-size:0.95rem;margin-bottom:10px}.pathway{line-height:1.8;font-size:0.93rem}.why-chain{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:12px;margin:8px 0}.why-q{font-weight:600;color:var(--rdx-purple,#7c3aed);cursor:pointer;font-size:0.9rem}.why-a{display:none;margin-top:6px;font-size:0.88rem;color:var(--rdx-text-muted,#64748b)}.next-btn{background:linear-gradient(135deg,#1f5f8b,#2874a6);color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:600;cursor:pointer;margin:20px 0;display:none;font-family:var(--rdx-font)}.next-btn:hover{opacity:0.9;transform:translateY(-1px)}.completion-card{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:16px;padding:32px;text-align:center;margin:24px 0}.completion-card h2{font-family:var(--rdx-font-serif);color:var(--rdx-teal-dark,#1f5f8b);margin-bottom:12px}.references-panel{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:16px;margin:20px 0}.references-panel a{display:block;color:var(--rdx-teal,#2874a6);font-size:13px;margin:4px 0;text-decoration:none}.references-panel a:hover{text-decoration:underline}.rdx-crossplatform-nav{background:var(--rdx-bg-card,#f8fafc);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:20px;margin:24px 0}.rdx-crossplatform-nav h4{color:var(--rdx-text-muted,#64748b);margin-bottom:12px;font-size:0.9rem}.rdx-crossplatform-links{display:flex;gap:12px;flex-wrap:wrap}.rdx-crossplatform-link{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:12px 16px;text-decoration:none;color:var(--rdx-text,#1e293b);font-size:13px;font-weight:500;transition:all 0.2s}.rdx-crossplatform-link:hover{background:rgba(40,116,166,0.05);transform:translateY(-2px)}@media(max-width:640px){.score-tracker{top:auto;bottom:12px;right:12px}.container{padding:12px}.vital-signs{grid-template-columns:repeat(3,1fr)}}

<script>
let currentStage=0,score=0,difficulty='standard';
const stages=[
    {
        title: "The MRSA Bacteremia",
        content: `<div class="narrative"><p>A <span class="highlight">58-year-old man</span> with a tunneled central line develops fever, rigors, and 2/2 blood cultures grow MRSA. You initiate IV vancomycin.</p><div class="vital-signs"><div class="vital-item"><span class="label">HR</span><span class="value">108</span></div><div class="vital-item"><span class="label">Temp</span><span class="value">39.2°C</span></div><div class="vital-item"><span class="label">BP</span><span class="value">98/62</span></div></div></div>`,
        hint_beginner: "When is vancomycin indicated?",
        hint_advanced: "Consider the updated 2020 AUC-guided dosing guidelines vs older trough-based monitoring.",
        question: {
            prompt: "What is the mechanism of action of vancomycin?",
            options: [{ text: "Binds D-Ala-D-Ala terminus of peptidoglycan precursors, preventing cell wall cross-linking", correct: true },{ text: "Inhibits 30S ribosomal subunit", correct: false },{ text: "Disrupts cell membrane", correct: false },{ text: "Inhibits DNA gyrase", correct: false }],
            explanation: { correct: "Correct! Vancomycin binds the D-Ala-D-Ala dipeptide at the end of peptidoglycan precursors, physically blocking transpeptidase access. This prevents cross-linking — different mechanism than beta-lactams but same result: weakened cell wall.", incorrect: "Vancomycin blocks cell wall synthesis by binding peptidoglycan precursors (D-Ala-D-Ala), not by binding PBPs like beta-lactams." },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">📋 Vancomycin MOA</div><div class="pathway"><strong>Target:</strong> D-Ala-D-Ala terminus of peptidoglycan precursors (lipid II)<br><strong>Effect:</strong> Physical steric hindrance prevents transpeptidase cross-linking<br><strong>Spectrum:</strong> Gram-positives only (too large to penetrate gram-negative outer membrane)<br>• MRSA, CoNS, Enterococcus (except VRE), C. difficile (oral only), Streptococcus<br><br><strong>Bactericidal</strong> vs most organisms except Enterococcus (bacteriostatic → need aminoglycoside synergy for endocarditis)</div></div>`,
            why_chain: [{q:"Why is vancomycin only effective against gram-positives?",a:"Vancomycin is a large glycopeptide (MW ~1,450) that cannot penetrate the outer membrane porins of gram-negative bacteria. Gram-positives lack this outer membrane barrier."}],
            points: 10
        }
    },
    {
        title: "AUC-Guided Dosing",
        content: `<div class="narrative"><p>The 2020 ASHP/IDSA guidelines fundamentally changed vancomycin monitoring. You need to optimize dosing for this MRSA bacteremia.</p></div>`,
        hint_beginner: "What PK parameter should guide vancomycin dosing?",
        hint_advanced: "The shift from trough-based to AUC-based monitoring was driven by what evidence?",
        question: {
            prompt: "Per 2020 guidelines, what is the recommended PK/PD target for vancomycin in serious MRSA infections?",
            options: [{ text: "Peak level >40 mcg/mL", correct: false },{ text: "AUC/MIC ratio of 400-600 (using AUC-guided dosing)", correct: true },{ text: "Random level >10 mcg/mL", correct: false },{ text: "Trough level of 15-20 mcg/mL", correct: false }],
            explanation: { correct: "Correct! The 2020 guidelines recommend AUC/MIC 400-600 (assuming MIC = 1 by broth microdilution). AUC-guided dosing reduces nephrotoxicity by ~50% compared to trough-based dosing while maintaining efficacy.", incorrect: "AUC/MIC 400-600 is the current target. Trough-based monitoring (15-20) is outdated and associated with higher nephrotoxicity." },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">📋 Vancomycin Dosing 2020</div><div class="pathway"><strong>Target:</strong> AUC/MIC 400-600 (AUC ~400-600 when MIC = 1)<br><strong>Methods:</strong> Bayesian software (preferred) or two-level sampling (peak + trough)<br><strong>Loading dose:</strong> 25-30 mg/kg (actual body weight) for serious infections<br><strong>Maintenance:</strong> 15-20 mg/kg q8-12h, adjusted by AUC<br><br><strong>Why not troughs?</strong> Targeting troughs 15-20 overdoses some patients → nephrotoxicity. AUC-guided dosing achieves same efficacy with ~50% less renal injury.</div></div>`,
            why_chain: [{q:"What is Bayesian dosing?",a:"Bayesian software combines population PK models with individual patient drug levels to estimate the full AUC curve from just 1-2 levels. More accurate and practical than traditional two-level AUC calculations."}],
            points: 10
        }
    },
    {
        title: "Red Man Syndrome",
        content: `<div class="narrative"><p>During the first vancomycin infusion, the patient develops flushing, pruritus, and erythema of the upper body. BP drops slightly to 95/58.</p></div>`,
        hint_beginner: "Is this an allergic reaction or a predictable adverse effect?",
        hint_advanced: "Distinguish histamine-mediated infusion reaction from true IgE-mediated allergy.",
        question: {
            prompt: "What is the correct management of vancomycin-induced red man syndrome?",
            options: [{ text: "Stop vancomycin permanently — this is anaphylaxis", correct: false },{ text: "Switch to teicoplanin immediately", correct: false },{ text: "Slow the infusion rate and premedicate with diphenhydramine (NOT a true allergy)", correct: true },{ text: "Administer epinephrine", correct: false }],
            explanation: { correct: "Correct! Red man syndrome is a rate-dependent histamine release (mast cell degranulation), NOT IgE-mediated allergy. Slow infusion to ≥1 hour per 500mg, premedicate with antihistamine. Patient can continue vancomycin safely.", incorrect: "Red man syndrome is NOT an allergy — it is rate-dependent histamine release. Slow the infusion and premedicate. Do NOT label as vancomycin-allergic." },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">📋 Red Man Syndrome</div><div class="pathway"><strong>Mechanism:</strong> Direct mast cell degranulation → histamine release (not IgE-mediated)<br><strong>Presentation:</strong> Flushing, erythema, pruritus of face/neck/upper body. May include hypotension.<br><strong>Management:</strong><br>1. Slow infusion rate (≥1 hour per 500mg, or ≥2 hours per 1g)<br>2. Premedicate with diphenhydramine 25-50mg<br>3. Continue vancomycin<br><br><strong>NOT a contraindication</strong> to future vancomycin use. Do not mislabel as allergy.</div></div>`,
            why_chain: [{q:"How do you distinguish RMS from true vancomycin allergy?",a:"True allergy: urticaria, bronchospasm, angioedema occurring independent of infusion rate. RMS: rate-dependent flushing/erythema that resolves with slowing infusion. True allergy is rare (<5% of reported reactions)."}],
            points: 10
        }
    },
    {
        title: "Nephrotoxicity",
        content: `<div class="narrative"><p>On day 5, creatinine rises from 1.0 to 1.8 mg/dL. Vancomycin AUC is 580. You need to assess for vancomycin-induced nephrotoxicity.</p></div>`,
        hint_beginner: "What are the risk factors for vancomycin nephrotoxicity?",
        hint_advanced: "Consider the role of AUC-guided dosing in reducing nephrotoxicity compared to trough-based monitoring.",
        question: {
            prompt: "Which factor most increases vancomycin nephrotoxicity risk?",
            options: [{ text: "Oral vancomycin administration", correct: false },{ text: "Using AUC-guided dosing", correct: false },{ text: "Single daily dosing", correct: false },{ text: "Concurrent use of piperacillin-tazobactam (synergistic nephrotoxicity)", correct: true }],
            explanation: { correct: "Correct! Vancomycin + piperacillin-tazobactam increases AKI risk 2-3x compared to vancomycin alone or vancomycin + cefepime. This combination should be avoided when possible. Use cefepime or meropenem instead as the empiric gram-negative agent.", incorrect: "Vancomycin + piperacillin-tazobactam synergistically increases nephrotoxicity. Avoid this combination — use cefepime or meropenem as the gram-negative agent instead." },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">📋 Vancomycin Nephrotoxicity</div><div class="pathway"><strong>Risk factors:</strong><br>• Concurrent piperacillin-tazobactam (2-3x AKI risk)<br>• AUC >600 or troughs >20 (overdosing)<br>• Duration >7 days<br>• Concurrent nephrotoxins (aminoglycosides, contrast, NSAIDs)<br>• Obesity, critical illness<br><br><strong>Prevention:</strong> AUC-guided dosing, avoid pip-tazo combination, monitor renal function q48-72h, shortest effective duration</div></div>`,
            why_chain: [{q:"Does oral vancomycin cause nephrotoxicity?",a:"No — oral vancomycin is not systemically absorbed. It stays in the GI tract, which is why its used for C. difficile but NOT for systemic infections. No renal monitoring needed for oral vancomycin."}],
            points: 10
        }
    },
    {
        title: "Vancomycin Resistance",
        content: `<div class="narrative"><p>A new blood culture from a different patient grows Enterococcus faecium resistant to vancomycin (VRE). Understanding resistance mechanisms is critical.</p></div>`,
        hint_beginner: "What is the molecular basis of vancomycin resistance?",
        hint_advanced: "Compare vanA vs vanB phenotypes and their clinical implications.",
        question: {
            prompt: "What is the mechanism of vancomycin resistance in VRE?",
            options: [{ text: "vanA gene modifies the target from D-Ala-D-Ala to D-Ala-D-Lac, reducing vancomycin binding 1000-fold", correct: true },{ text: "Efflux pumps expel vancomycin", correct: false },{ text: "Thickened cell wall traps vancomycin", correct: false },{ text: "Beta-lactamase destroys vancomycin", correct: false }],
            explanation: { correct: "Correct! vanA operon changes the peptidoglycan terminus from D-Ala-D-Ala to D-Ala-D-Lac, reducing vancomycin binding affinity 1000-fold. This is transferable to other organisms — the nightmare scenario is transfer to MRSA → VRSA.", incorrect: "vanA changes D-Ala-D-Ala → D-Ala-D-Lac, eliminating vancomycins binding site. Transferable to other gram-positives including S. aureus (creating VRSA)." },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">📋 Vancomycin Resistance</div><div class="pathway"><strong>vanA:</strong> High-level resistance (MIC >64), inducible, transferable. D-Ala-D-Lac substitution. Most common and most concerning.<br><strong>vanB:</strong> Variable resistance (MIC 4-1024), inducible, can be transferable. D-Ala-D-Lac. Resistant to vancomycin but susceptible to teicoplanin.<br><strong>vanC:</strong> Low-level, intrinsic to E. gallinarum/casseliflavus. D-Ala-D-Ser.<br><br><strong>VRSA:</strong> S. aureus that acquired vanA from VRE. Extremely rare (<15 US cases) but potentially catastrophic.<br><strong>VISA:</strong> Vancomycin-intermediate S. aureus (MIC 4-8). Thickened cell wall traps vancomycin. More common than VRSA.</div></div>`,
            why_chain: [{q:"What is the difference between VISA and VRSA?",a:"VISA has a thickened cell wall that traps vancomycin before it reaches the target — a quantitative barrier. VRSA has vanA-mediated target modification — a qualitative change. VISA is more common but lower-level resistance; VRSA is rare but high-level."}],
            points: 10
        }
    },
    {
        title: "VRE Treatment",
        content: `<div class="narrative"><p>The VRE bacteremia needs treatment. Vancomycin is ineffective. What are the options?</p></div>`,
        hint_beginner: "What antibiotics treat VRE?",
        hint_advanced: "Compare linezolid vs daptomycin for VRE bacteremia — which has better evidence?",
        question: {
            prompt: "What is first-line treatment for VRE bacteremia?",
            options: [{ text: "Ceftriaxone", correct: false },{ text: "Daptomycin (higher doses, 8-12 mg/kg) — preferred for bacteremia", correct: true },{ text: "Linezolid", correct: false },{ text: "High-dose vancomycin", correct: false }],
            explanation: { correct: "Correct! Daptomycin at higher doses (8-12 mg/kg, higher than the MSSA dose of 6 mg/kg) is preferred for VRE bacteremia due to its bactericidal activity. Linezolid is bacteriostatic and associated with worse outcomes in bacteremia. Vancomycin is ineffective against VRE.", incorrect: "Daptomycin at high doses (8-12 mg/kg) is preferred for VRE bacteremia. Linezolid is bacteriostatic — better for non-bacteremic infections like VRE pneumonia." },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">📋 VRE Treatment Options</div><div class="pathway"><strong>Bacteremia:</strong> Daptomycin 8-12 mg/kg IV daily (bactericidal)<br><strong>Non-bacteremic (UTI, pneumonia):</strong> Linezolid 600mg BID (bacteriostatic, good tissue penetration, oral bioavailability)<br><strong>UTI only:</strong> Nitrofurantoin (if E. faecalis), fosfomycin<br><br><strong>Linezolid limitations:</strong> Bacteriostatic, thrombocytopenia with >14 days, serotonin syndrome with SSRIs, lactic acidosis<br><strong>Daptomycin limitation:</strong> Inactivated by surfactant → do NOT use for pneumonia</div></div>`,
            why_chain: [{q:"Why is daptomycin used at higher doses for VRE than MSSA?",a:"VRE has higher MICs for daptomycin than S. aureus. Higher doses (8-12 mg/kg) achieve the AUC/MIC targets needed for efficacy against VRE. The FDA-approved dose of 6 mg/kg (for S. aureus) is subtherapeutic for many VRE isolates."}],
            points: 10
        }
    }
];
document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hb=document.querySelector('.hint-box');if(hb)hb.style.display=d==='beginner'?'block':'none'}
function toggleReferences(){const c=document.getElementById('referencesContent');const t=document.getElementById('refToggle');if(c.style.display==='none'){c.style.display='block';t.innerHTML='&#9662;'}else{c.style.display='none';t.innerHTML='&#9656;'}}
function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100);document.getElementById('progress').style.width=pct+'%';let h='<h2 class="scene-title">'+st.title+'</h2>';h+='<div class="scene-content">'+st.content+'</div>';if(st.hint_beginner)h+='<div class="hint-box" id="hint-box"'+(difficulty==='beginner'?' style="display:block"':'')+'>&#128161; '+st.hint_beginner+'</div>';if(difficulty==='advanced'&&st.hint_advanced)h+='<div class="hint-box" style="display:block;background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.15);color:#5b21b6">&#127891; '+st.hint_advanced+'</div>';if(st.question){h+='<div class="socratic-prompt"><h4>Clinical Question</h4><p>'+st.question.prompt+'</p></div>';h+='<div class="options-grid" id="options-'+idx+'">';st.question.options.forEach((opt,oi)=>{h+='<button class="option-btn" id="option-'+idx+'-'+oi+'" onclick="checkAnswer('+idx+','+oi+')">'+String.fromCharCode(65+oi)+'. '+opt.text+'</button>'});h+='</div>';h+='<div class="explanation-box" id="explain-'+idx+'"></div>';h+='<div id="teaching-'+idx+'" style="display:none">'+st.question.teaching+'</div>';if(st.question.why_chain&&st.question.why_chain.length>0){h+='<div id="why-'+idx+'" style="display:none">';st.question.why_chain.forEach((wc,wi)=>{h+='<div class="why-chain"><div class="why-q" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">&#128270; '+wc.q+'</div><div class="why-a">'+wc.a+'</div></div>'});h+='</div>'}}h+='<button class="next-btn" id="next-'+idx+'" onclick="nextStage()">Continue &rarr;</button>';document.getElementById('scene-container').innerHTML=h}
function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll('#options-'+si+' .option-btn').forEach((b,i)=>{b.classList.add('disabled');if(st.question.options[i].correct)b.classList.add('correct');if(i===oi&&!opt.correct)b.classList.add('incorrect')});const eb=document.getElementById('explain-'+si);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;eb.className='explanation-box correct';eb.innerHTML='<strong>&#10003; Correct!</strong> '+st.question.explanation.correct}else{eb.className='explanation-box incorrect';eb.innerHTML='<strong>&#10007; Not quite.</strong> '+st.question.explanation.incorrect}eb.style.display='block';document.getElementById('teaching-'+si).style.display='block';const wy=document.getElementById('why-'+si);if(wy)wy.style.display='block';document.getElementById('next-'+si).style.display='inline-block'}
function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let lvl='Developing';if(pct>=90)lvl='Mastery';else if(pct>=70)lvl='Proficient';else if(pct>=50)lvl='Competent';document.getElementById('scene-container').innerHTML='<div class="completion-card"><h2>&#127881; Case Complete!</h2><p style="font-size:2rem;font-weight:700;color:var(--rdx-teal,#2874a6)">'+pct+'%</p><p style="color:var(--rdx-text-muted,#64748b)">Score: '+score+'/'+mx+'</p><p style="margin:12px 0;font-weight:600">Level: '+lvl+'</p><div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="../adventure-hub.html" style="padding:10px 20px;background:var(--rdx-teal,#2874a6);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">More Cases</a><a href="../tools/learning-dashboard.html" style="padding:10px 20px;background:var(--rdx-purple,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">&#128202; Dashboard</a><button onclick="currentStage=0;score=0;document.getElementById(\'score\').textContent=0;renderStage(0)" style="padding:10px 20px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;cursor:pointer;font-weight:600">&#128260; Retry</button></div></div>';try{const progress=JSON.parse(localStorage.getItem('reasondx-progress')||'{}'  );if(!progress.cases)progress.cases={};progress.cases['vancomycin']=Math.max(progress.cases['vancomycin']||0,pct);localStorage.setItem('reasondx-progress',JSON.stringify(progress))}catch(e){}}
renderStage(0);
</script>
