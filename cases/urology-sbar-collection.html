<html data-theme="light" lang="en">
<head>
<meta name="theme-color" content="#0f766e">

<script>
// Auth Guard - Redirect if not logged in
(function(){var AUTH_KEY="reasondx-user";function getAuthPath(){var d=(location.pathname.match(/\//g)||[]).length-1,p="";for(var i=0;i<d;i++)p+="../";return p+"training.html"}function isAuth(){try{var u=localStorage.getItem(AUTH_KEY);if(u){var j=JSON.parse(u);return j&&j.email&&j.name}}catch(e){}return false}if(!isAuth()){sessionStorage.setItem("reasondx-redirect",location.href);location.replace(getAuthPath())}})();</script>
<script>(function(){var d=(location.pathname.match(/\//g)||[]).length-1,p="";for(var i=0;i<d;i++)p+="../";var s=document.createElement("script");s.src=p+"dx-user-bar.js";document.head.appendChild(s)})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Clinical case: CoachDx SBAR: Urology Essentials. Interactive patient scenario with diagnostic reasoning and evidence-based teaching on ReasonDx.">
<title>CoachDx SBAR: Urology Essentials</title>
    <style>
        :root { --primary: #0f766e; --secondary: #8b5cf6; --accent: #f59e0b; --success:var(--rdx-success); --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; min-height: 100vh; color: #1e293b; }
        .container { max-width: 800px; margin: 0 auto; padding: 1.5rem; }
        header { text-align: center; padding: 2rem 1rem; }
        header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .subtitle { color: #1e293b; font-size: 1.1rem; }
        .case-selector { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; margin: 1.5rem 0; }
        .case-btn { background: rgba(255,255,255,0.15); border: 1px solid #e2e8f0; color: white; padding: 0.6rem 1.2rem; border-radius: 25px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
        .case-btn:hover, .case-btn.active { background:var(--rdx-bg-card); color: #0f766e; border-color: white; }
        .sbar-container { background: rgba(255,255,255,0.1); border-radius: 1rem; overflow: hidden; }
        .sbar-section { padding: 1.5rem; border-bottom: 1px solid #e2e8f0; }
        .sbar-section:last-child { border-bottom: none; }
        .sbar-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        .sbar-letter { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; }
        .sbar-letter.s { background: #ef4444; }
        .sbar-letter.b { background: #f59e0b; }
        .sbar-letter.a { background: #10b981; }
        .sbar-letter.r { background: #8b5cf6; }
        .sbar-title { font-size: 1.25rem; font-weight: 600; }
        .sbar-content { padding-left: 66px; line-height: 1.7; }
        .sbar-content ul { padding-left: 1.25rem; }
        .sbar-content li { margin: 0.5rem 0; }
        .highlight { color: #fcd34d; font-weight: 600; }
        .critical { color: #fca5a5; font-weight: 600; }
        .key-point { background: rgba(16,185,129,0.2); border-left: 3px solid #10b981; padding: 0.75rem 1rem; margin: 1rem 0; border-radius: 0 0.5rem 0.5rem 0; }
        .teaching-note { background: rgba(139,92,246,0.2); border-radius: 0.5rem; padding: 1rem; margin-top: 1rem; font-size: 0.95rem; }
        @media (max-width: 600px) {
            .sbar-content { padding-left: 0; margin-top: 1rem; }
            .sbar-header { flex-direction: column; text-align: center; }
        }
    
/* Crossplatform Navigation */
.rdx-crossplatform-nav { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin: 24px auto; max-width: 900px; }
.rdx-crossplatform-nav h4 { color: #64748b; margin-bottom: 16px; font-size: 0.9rem; }
.rdx-crossplatform-links { display: flex; gap: 12px; flex-wrap: wrap; }
.rdx-crossplatform-link { background:var(--rdx-bg-card); border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px 16px; color: #0f766e; text-decoration: none; font-size: 0.9rem; transition: all 0.2s; }
.rdx-crossplatform-link:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }

</style>

<body>
    <div class="container">
        <header>
            <h1>🏥 CoachDx SBAR</h1>
            <p class="subtitle">Urology Communication Scenarios</p>
        </header>
        
        <div class="case-selector">
            <button class="case-btn active" onclick="showCase(0)">Testicular Torsion</button>
            <button class="case-btn" onclick="showCase(1)">Kidney Stone</button>
            <button class="case-btn" onclick="showCase(2)">Urinary Retention</button>
            <button class="case-btn" onclick="showCase(3)">Gross Hematuria</button>
            <button class="case-btn" onclick="showCase(4)">Priapism</button>
            <button class="case-btn" onclick="showCase(5)">Paraphimosis</button>
        </div>

        <div class="sbar-container" id="sbar-display"></div>
    </div>

    <script>
    const cases = [
        {
            title: "Testicular Torsion",
            situation: {
                text: "I'm calling about a <span class='critical'>15-year-old male</span> in the ED with <span class='critical'>acute left testicular pain</span> for the past <span class='highlight'>3 hours</span>.",
                details: ["Sudden onset, woke him from sleep", "Severe pain 9/10", "Associated nausea and one episode of vomiting", "No dysuria or trauma"]
            },
            background: {
                text: "He has no significant past medical history.",
                details: ["He did mention having a similar episode 2 months ago that resolved on its own", "No prior surgeries", "Not sexually active"]
            },
            assessment: {
                text: "On exam, the <span class='critical'>left testis is high-riding with a transverse lie</span>. The <span class='critical'>cremasteric reflex is absent</span>. There's moderate swelling and erythema.",
                details: ["Vitals: HR 105, BP 138/85, afebrile", "Right testis normal", "No inguinal hernia appreciated"],
                keyFinding: "Absent cremasteric reflex with high-riding testis is highly concerning for torsion."
            },
            recommendation: {
                text: "I'm concerned this is <span class='critical'>testicular torsion</span> and he needs <span class='critical'>emergent surgical exploration</span>.",
                requests: ["Would you be able to come evaluate and take him to the OR?", "Should I attempt manual detorsion while waiting?", "Shall I get consent for bilateral orchiopexy?"],
                teaching: "With only 3 hours of symptoms, salvage rate is >90% if we act quickly. Time is testicle!"
            }
        },
        {
            title: "Complicated Kidney Stone",
            situation: {
                text: "I'm calling about a <span class='critical'>48-year-old female</span> with a known <span class='highlight'>8mm left ureteral stone</span> who now has <span class='critical'>fever and rigors</span>.",
                details: ["Known stone from CT 5 days ago, was managing conservatively", "Today developed fever to 39.5°C with shaking chills", "Worsening left flank pain", "Looking toxic"]
            },
            background: {
                text: "She was diagnosed with an 8mm proximal left ureteral stone 5 days ago.",
                details: ["Started on tamsulosin for medical expulsive therapy", "No prior stone history", "PMH: Diabetes mellitus type 2", "Allergies: Sulfa"]
            },
            assessment: {
                text: "She appears <span class='critical'>septic</span> with fever, tachycardia, and significant left CVA tenderness.",
                details: ["Vitals: T 39.5°C, HR 118, BP 95/60, RR 22", "WBC 22,000 with left shift", "Creatinine 1.8 (baseline 0.9)", "UA: Positive nitrites, >100 WBC"],
                keyFinding: "This is obstructive pyelonephritis/pyonephrosis - an infected obstructed system."
            },
            recommendation: {
                text: "This is <span class='critical'>infected obstructing stone - a urologic emergency</span>. She needs <span class='critical'>urgent decompression</span>.",
                requests: ["She needs emergent ureteral stent or nephrostomy tube tonight", "I've started IV fluids and broad-spectrum antibiotics", "Can you come evaluate for urgent decompression?"],
                teaching: "Antibiotics alone cannot treat an infected obstructed system. The pus must be drained. Definitive stone treatment happens AFTER infection is controlled."
            }
        },
        {
            title: "Acute Urinary Retention",
            situation: {
                text: "I'm calling about a <span class='highlight'>72-year-old male</span> with <span class='critical'>inability to urinate for 12 hours</span> and severe suprapubic pain.",
                details: ["Last voided 12 hours ago", "Severe suprapubic discomfort", "Has been having progressive LUTS for years", "Tried to void multiple times without success"]
            },
            background: {
                text: "History of BPH, not on any medications for it.",
                details: ["Saw urology 2 years ago, declined treatment", "Recently started taking over-the-counter cold medicine (pseudoephedrine)", "PMH: Hypertension, hyperlipidemia", "No prior catheterization or retention"]
            },
            assessment: {
                text: "He has a <span class='critical'>palpable distended bladder</span> to the umbilicus and significant discomfort.",
                details: ["Vitals stable, afebrile", "Prostate moderately enlarged, no nodules on DRE", "No signs of infection", "Creatinine normal"],
                keyFinding: "The recent decongestant (alpha-agonist) likely precipitated retention in setting of BPH."
            },
            recommendation: {
                text: "He has <span class='critical'>acute urinary retention</span>, likely precipitated by the decongestant in setting of BPH.",
                requests: ["I'm going to place a Foley catheter for decompression", "Should I start him on tamsulosin before a voiding trial?", "Would you like to see him in clinic for BPH management?"],
                teaching: "Avoid alpha-agonists (decongestants) and anticholinergics in men with BPH - they can precipitate retention."
            }
        },
        {
            title: "Gross Hematuria",
            situation: {
                text: "I'm calling about a <span class='highlight'>65-year-old male</span> with <span class='critical'>painless gross hematuria</span> and clots for 2 days.",
                details: ["Bright red blood in urine for 2 days", "Passing clots", "No pain, no dysuria", "40 pack-year smoking history"]
            },
            background: {
                text: "Significant smoking history. Otherwise healthy.",
                details: ["40 pack-year smoking history, quit 5 years ago", "No prior hematuria", "No anticoagulation", "No recent instrumentation or trauma"]
            },
            assessment: {
                text: "He's hemodynamically stable with <span class='critical'>ongoing gross hematuria with clots</span>.",
                details: ["Vitals stable, Hgb 11.2 (baseline unknown)", "Bladder not distended", "No suprapubic tenderness", "UA: Too bloody to interpret"],
                keyFinding: "Painless gross hematuria in a smoker is bladder cancer until proven otherwise."
            },
            recommendation: {
                text: "Painless gross hematuria with this smoking history is <span class='critical'>concerning for bladder cancer</span>.",
                requests: ["He needs a complete hematuria workup - CT urogram and cystoscopy", "If he develops clot retention, he may need CBI", "Can you see him urgently in clinic to expedite workup?"],
                teaching: "All patients with gross hematuria need complete evaluation (upper tract imaging + cystoscopy) even if bleeding stops or another cause is found."
            }
        },
        {
            title: "Ischemic Priapism",
            situation: {
                text: "I'm calling about a <span class='highlight'>35-year-old male</span> with a <span class='critical'>painful erection for 5 hours</span>.",
                details: ["Erection started 5 hours ago without sexual stimulation", "Severe pain", "Has happened once before, resolved with ice", "History of sickle cell trait"]
            },
            background: {
                text: "Sickle cell trait, otherwise healthy.",
                details: ["Sickle cell trait diagnosed in childhood", "Previous episode of priapism 6 months ago, resolved after 2 hours", "No medications", "Denies intracavernosal injections or recreational drugs"]
            },
            assessment: {
                text: "He has a <span class='critical'>rigid, painful erection</span>. The corpora cavernosa are firm; the glans and corpus spongiosum are soft.",
                details: ["Vitals normal", "Rigid corpora cavernosa bilaterally", "Soft glans (not involved)", "No penile trauma or lesions"],
                keyFinding: "Ischemic (low-flow) priapism - corpora are engorged without drainage. This is an emergency!"
            },
            recommendation: {
                text: "This is <span class='critical'>ischemic priapism for 5 hours - we need to act now</span> to prevent permanent erectile dysfunction.",
                requests: ["He needs corporal aspiration and phenylephrine injection", "If conservative measures fail, may need surgical shunt", "Can you come evaluate him urgently?"],
                teaching: "Ischemic priapism is a compartment syndrome of the penis. After 4-6 hours, risk of permanent ED increases significantly. Goal is detumescence within 4-6 hours."
            }
        },
        {
            title: "Paraphimosis",
            situation: {
                text: "I'm calling about a <span class='highlight'>78-year-old male</span> with a <span class='critical'>swollen foreskin that won't reduce</span>.",
                details: ["Nursing home patient", "Foley catheter was changed earlier today", "Foreskin was left retracted", "Now swollen and painful", "Can't reduce foreskin over glans"]
            },
            background: {
                text: "Nursing home resident with dementia, chronic Foley catheter.",
                details: ["Dementia", "BPH with chronic indwelling catheter", "Diabetes mellitus", "Previous UTIs"]
            },
            assessment: {
                text: "The <span class='critical'>foreskin is retracted behind the glans</span> with a tight constricting band and significant edema of the glans and foreskin.",
                details: ["Vitals stable", "Glans swollen and dusky", "Tight band of foreskin behind corona", "Unable to reduce at bedside"],
                keyFinding: "Paraphimosis - the retracted foreskin causes venous congestion and edema, making reduction increasingly difficult."
            },
            recommendation: {
                text: "He has <span class='critical'>paraphimosis</span> that I couldn't reduce at bedside. The glans is becoming dusky.",
                requests: ["Can you come attempt reduction? May need dorsal slit if unsuccessful", "I've applied ice and compression", "After resolution, he should be considered for circumcision to prevent recurrence"],
                teaching: "Always return the foreskin to its normal position after catheter care! Paraphimosis can lead to glans necrosis if not reduced promptly."
            }
        }
    ];

    function showCase(index) {
        document.querySelectorAll('.case-btn').forEach((btn, i) => {
            btn.classList.toggle('active', i === index);
        });
        
        const c = cases[index];
        document.getElementById('sbar-display').innerHTML = `
            <div class="sbar-section">
                <div class="sbar-header">
                    <div class="sbar-letter s">S</div>
                    <div class="sbar-title">Situation</div>
                </div>
                <div class="sbar-content">
                    <p>${c.situation.text}</p>
                    <ul>${c.situation.details.map(d => `<li>${d}</li>`).join('')}</ul>
                </div>
            </div>
            <div class="sbar-section">
                <div class="sbar-header">
                    <div class="sbar-letter b">B</div>
                    <div class="sbar-title">Background</div>
                </div>
                <div class="sbar-content">
                    <p>${c.background.text}</p>
                    <ul>${c.background.details.map(d => `<li>${d}</li>`).join('')}</ul>
                </div>
            </div>
            <div class="sbar-section">
                <div class="sbar-header">
                    <div class="sbar-letter a">A</div>
                    <div class="sbar-title">Assessment</div>
                </div>
                <div class="sbar-content">
                    <p>${c.assessment.text}</p>
                    <ul>${c.assessment.details.map(d => `<li>${d}</li>`).join('')}</ul>
                    <div class="key-point"><strong>Key Finding:</strong> ${c.assessment.keyFinding}</div>
                </div>
            </div>
            <div class="sbar-section">
                <div class="sbar-header">
                    <div class="sbar-letter r">R</div>
                    <div class="sbar-title">Recommendation</div>
                </div>
                <div class="sbar-content">
                    <p>${c.recommendation.text}</p>
                    <ul>${c.recommendation.requests.map(d => `<li>${d}</li>`).join('')}</ul>
                    <div class="teaching-note"><strong>💡 Teaching Point:</strong> ${c.recommendation.teaching}</div>
                </div>
            </div>
        `;
    }

    showCase(0);
    </script>

    <!-- ReasonDx AI Tutor Integration -->
    <div data-dx-tutor
         data-module-title="CoachDx SBAR: Urology Essentials"
         data-key-points="clinical reasoning, differential diagnosis, diagnostic workup, illness scripts"
         data-objectives="Develop systematic clinical reasoning, refine differential diagnosis skills"
         style="display:none;"></div>
    <script src="dx-ai-tutor.js"></script>

<div id="references-panel" style="margin:20px auto;max-width:800px;padding:20px;background:var(--rdx-bg-hover);border-radius:12px;border: 1px solid #e2e8f0">

<p style="color:#94a3b8;font-size:0.8rem;margin-top:12px">All references are open-access, peer-reviewed sources.</p>
</div>

</div>
