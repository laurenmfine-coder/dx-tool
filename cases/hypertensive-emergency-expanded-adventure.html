*{box-sizing:border-box;margin:0;padding:0}

.container{max-width:800px;margin:0 auto;padding:20px}

.diff-btn:hover{border-color:var(--rdx-teal,#0d9488)}

.narrative .critical{background:rgba(220,38,38,0.1);color:#dc2626;padding:2px 6px;border-radius:4px;font-weight:600}
.vital-signs{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin:12px 0;padding:12px;background:rgba(13,148,136,0.04);border-radius:8px;border:1px solid rgba(13,148,136,0.1)}
.vital-item{text-align:center;font-size:13px}.vital-item .label{color:var(--rdx-text-muted,#64748b);font-size:11px;display:block}.vital-item .value{font-weight:700;color:var(--rdx-teal-dark,#0f766e)}
.socratic-prompt{background:linear-gradient(135deg,rgba(124,58,237,0.06),rgba(13,148,136,0.06));border:1px solid rgba(124,58,237,0.15);border-radius:12px;padding:16px 20px;margin:16px 0}

.options-grid{display:grid;gap:10px;margin:16px 0}
.option-btn{background:var(--rdx-bg-card,#fff);border:2px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:14px 18px;cursor:pointer;text-align:left;font-size:14px;transition:all 0.2s;font-family:var(--rdx-font)}

.explanation-box{border-radius:12px;padding:16px;margin:12px 0;display:none}

.mechanism-box{background:linear-gradient(135deg,rgba(13,148,136,0.06),rgba(13,148,136,0.02));border:1px solid rgba(13,148,136,0.15);border-radius:12px;padding:20px;margin:16px 0}
.mechanism-title{color:var(--rdx-teal-dark,#0f766e);font-weight:700;font-size:0.95rem;margin-bottom:10px}
.pathway{line-height:1.8;font-size:0.93rem;color:var(--rdx-text,#1e293b)}
.why-chain{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:12px;margin:8px 0}

.next-btn{background:linear-gradient(135deg,#0f766e,#0d9488);color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:600;cursor:pointer;margin:20px 0;display:none;font-family:var(--rdx-font)}
.next-btn:hover{opacity:0.9;transform:translateY(-1px)}
.completion-card{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:16px;padding:32px;text-align:center;margin:24px 0}
.completion-card h2{font-family:var(--rdx-font-serif);color:var(--rdx-teal-dark,#0f766e);margin-bottom:12px}

.references-panel a:hover{text-decoration:underline}
.rdx-crossplatform-nav{background:var(--rdx-bg-card,#f8fafc);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:20px;margin:24px 0}
.rdx-crossplatform-nav h4{color:var(--rdx-text-muted,#64748b);margin-bottom:12px;font-size:0.9rem}
.rdx-crossplatform-links{display:flex;gap:12px;flex-wrap:wrap}
.rdx-crossplatform-link{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:12px 16px;text-decoration:none;color:var(--rdx-text,#1e293b);font-size:13px;font-weight:500;transition:all 0.2s}
.rdx-crossplatform-link:hover{background:rgba(13,148,136,0.05);transform:translateY(-2px)}
@media(max-width:640px){.score-tracker{top:auto;bottom:12px;right:12px}.container{padding:12px}.vital-signs{grid-template-columns:repeat(3,1fr)}}

<a href="https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7015587/" target="_blank" rel="noopener">AHA/ACC Hypertension Guidelines - JACC 2018</a>
<a href="https://www.ncbi.nlm.nih.gov/books/NBK470316/" target="_blank" rel="noopener">Hypertensive Emergencies - StatPearls</a>

<script>
let currentStage=0,score=0,difficulty='standard';
const stages=[
    {
        title: "Emergency Department Arrival",
        content: `<div class="narrative"><p>A <span class="highlight">52-year-old man</span> presents with severe headache, blurred vision, and chest pain for 2 hours. He ran out of his blood pressure medications 2 weeks ago.</p><div class="vital-signs"><div class="vital-item"><span class="label">BP</span><span class="value">228/142</span></div><div class="vital-item"><span class="label">HR</span><span class="value">108</span></div><div class="vital-item"><span class="label">RR</span><span class="value">22</span></div><div class="vital-item"><span class="label">SpO2</span><span class="value">96%</span></div><div class="vital-item"><span class="label">Temp</span><span class="value">37.1°C</span></div></div></div>`,
        hint_beginner: "What distinguishes a hypertensive emergency from urgency?",
        hint_advanced: "Consider which target organs are at risk and what defines end-organ damage.",
        question: {
            prompt: "What distinguishes this presentation as a hypertensive EMERGENCY rather than urgency?",
            options: [{ text: "Blood pressure above 180/120 mmHg", correct: false, explanation: "The BP threshold alone doesn't define emergency vs urgency." }, { text: "Evidence of acute target organ damage (headache, visual changes, chest pain)", correct: true, explanation: "" }, { text: "The patient's non-compliance with medications", correct: false, explanation: "Non-compliance is a risk factor but doesn't define the emergency." }, { text: "Heart rate above 100 bpm", correct: false, explanation: "Tachycardia may accompany the emergency but doesn't define it." }],
            explanation: { correct: "Correct! Hypertensive emergency = BP >180/120 WITH evidence of acute end-organ damage. This patient has neurologic symptoms (headache, visual changes) AND chest pain suggesting cardiac involvement.", incorrect: "A hypertensive emergency requires BOTH severely elevated BP AND evidence of acute end-organ damage — not just high numbers." },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">📋 Emergency vs Urgency</div><div class="pathway"><strong>Hypertensive Emergency:</strong> BP >180/120 WITH acute end-organ damage (brain, heart, kidneys, eyes, aorta). Requires IV antihypertensives and ICU monitoring.<br><br><strong>Hypertensive Urgency:</strong> BP >180/120 WITHOUT end-organ damage. Can be treated with oral medications and close outpatient follow-up.</div></div>`,
            why_chain: [{q: "Why does end-organ damage change management?", a: "End-organ damage indicates acute vascular injury requiring controlled IV BP reduction to prevent further organ injury, while urgency can be managed more slowly with oral agents."}, {q: "Which organs are most vulnerable?", a: "Brain (hypertensive encephalopathy, stroke), heart (ACS, acute HF, aortic dissection), kidneys (acute kidney injury), eyes (papilledema, retinal hemorrhage)."}],
            points: 10
        }
    },
    {
        title: "Initial Assessment",
        content: `<div class="narrative"><p>Fundoscopic exam reveals <span class="critical">papilledema and flame hemorrhages</span>. ECG shows LVH with strain pattern. Troponin is 0.08 ng/mL (mildly elevated). Creatinine 1.8 mg/dL (baseline 1.0).</p><div class="socratic-prompt"><h4>Organ Damage Assessment</h4><p>Multiple organs are showing signs of acute damage. What is the most appropriate initial BP target?</p></div></div>`,
        hint_beginner: "You want to lower BP, but not too fast. Think about why.",
        hint_advanced: "Consider cerebral autoregulation and the risk of watershed infarcts with rapid reduction.",
        question: {
            prompt: "What is the recommended initial BP reduction goal in the first hour?",
            options: [{ text: "Reduce to normal (<140/90) within 1 hour", correct: false, explanation: "Too rapid — risks cerebral hypoperfusion." }, { text: "Reduce MAP by no more than 25% in the first hour", correct: true, explanation: "" }, { text: "Reduce to 160/100 within 30 minutes", correct: false, explanation: "This may be too aggressive depending on the starting point." }, { text: "No reduction needed until CT scan is completed", correct: false, explanation: "Delaying treatment risks progressive organ damage." }],
            explanation: { correct: "Correct! Reduce MAP by no more than 25% in the first hour, then toward 160/100 over the next 2-6 hours. Rapid reduction can cause watershed cerebral infarcts due to shifted autoregulation.", incorrect: "Guidelines recommend reducing MAP by ≤25% in the first hour. The cerebral autoregulation curve shifts rightward in chronic hypertension — rapid normalization causes ischemia." },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">📋 BP Reduction Targets</div><div class="pathway"><strong>First hour:</strong> Reduce MAP by ≤25%<br><strong>Next 2-6 hours:</strong> Target 160/100-110<br><strong>Next 24-48 hours:</strong> Cautiously toward normal<br><br><strong>Exception:</strong> Aortic dissection requires more aggressive reduction (SBP <120 in 20 min).</div></div>`,
            why_chain: [{q: "Why does cerebral autoregulation matter?", a: "In chronic hypertension, the brain adapts its autoregulatory range upward. Rapid normalization drops perfusion below the autoregulatory threshold, causing watershed infarcts."}],
            points: 10
        }
    },
    {
        title: "IV Medication Selection",
        content: `<div class="narrative"><p>You need to start an IV antihypertensive infusion. The patient has acute hypertensive encephalopathy with papilledema, mild troponin elevation, and acute kidney injury.</p></div>`,
        hint_beginner: "Which IV agents are commonly used? Think about onset, titratability, and contraindications.",
        hint_advanced: "Consider the pharmacology: clevidipine vs nicardipine vs nitroprusside — which is safest given this patient's renal injury?",
        question: {
            prompt: "Which IV antihypertensive is most appropriate as first-line?",
            options: [{ text: "Nitroprusside infusion", correct: false, explanation: "Cyanide toxicity risk, especially with renal impairment. Not first-line." }, { text: "IV nicardipine infusion", correct: true, explanation: "" }, { text: "IV hydralazine bolus", correct: false, explanation: "Unpredictable response, reflex tachycardia, not easily titratable." }, { text: "Sublingual nifedipine", correct: false, explanation: "Contraindicated — causes unpredictable, precipitous drops." }],
            explanation: { correct: "Correct! IV nicardipine is first-line: predictable dose-response, easily titratable, no toxic metabolites. Also safe in AKI unlike nitroprusside.", incorrect: "IV nicardipine or clevidipine are preferred: titratable, predictable, and safe across organ systems. Nitroprusside carries cyanide risk; hydralazine is not titratable; sublingual nifedipine is contraindicated." },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">📋 IV Antihypertensives</div><div class="pathway"><strong>First-line:</strong> Nicardipine (5-15 mg/hr) or Clevidipine — titratable CCBs<br><strong>Second-line:</strong> Labetalol (if no HF/bradycardia), Fenoldopam (renal-sparing)<br><strong>Avoid:</strong> Sublingual nifedipine (unpredictable), nitroprusside in renal failure (cyanide)</div></div>`,
            why_chain: [{q: "Why not nitroprusside?", a: "Nitroprusside releases cyanide, metabolized to thiocyanate by the liver and excreted by the kidneys. AKI impairs clearance, increasing toxicity risk. Also causes cerebral vasodilation which can worsen ICP."}],
            points: 10
        }
    },
    {
        title: "Monitoring Response",
        content: `<div class="narrative"><p>After 30 minutes of nicardipine at 10 mg/hr, BP is now 195/118 (MAP reduced ~20%). Headache is improving but vision remains blurry. Urine output is 25 mL/hr.</p><div class="vital-signs"><div class="vital-item"><span class="label">BP</span><span class="value">195/118</span></div><div class="vital-item"><span class="label">HR</span><span class="value">96</span></div><div class="vital-item"><span class="label">MAP</span><span class="value">143</span></div></div></div>`,
        hint_beginner: "Is this an appropriate response? Check against the 25% reduction target.",
        hint_advanced: "Consider when to obtain neuroimaging and what complications to rule out.",
        question: {
            prompt: "Is this blood pressure response appropriate, and what is your next step?",
            options: [{ text: "Increase nicardipine — BP is still dangerously high", correct: false, explanation: "The 25% MAP reduction goal is being met appropriately." }, { text: "Response is appropriate; continue current rate and obtain CT head to rule out stroke/hemorrhage", correct: true, explanation: "" }, { text: "Switch to nitroprusside for faster reduction", correct: false, explanation: "Not needed — the response is on target. Nitroprusside adds risk." }, { text: "Stop nicardipine — BP has dropped enough", correct: false, explanation: "Cannot stop; need continued infusion to maintain the reduction." }],
            explanation: { correct: "Correct! MAP dropped from ~180 to 143 (~20% reduction in 30 min) — on target. CT head is essential to rule out hemorrhagic stroke or posterior reversible encephalopathy syndrome (PRES).", incorrect: "The BP reduction is appropriate (MAP ↓20%). Now obtain neuroimaging to evaluate for stroke, hemorrhage, or PRES while continuing the infusion." },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">📋 Monitoring in Hypertensive Emergency</div><div class="pathway"><strong>Frequency:</strong> Arterial line preferred; otherwise q5-15 min cuff BP<br><strong>Targets:</strong> MAP ↓≤25% in hour 1, then toward 160/100 by hour 6<br><strong>Workup:</strong> CT head (stroke/hemorrhage), ECG, troponin, BMP (renal), urinalysis, fundoscopy<br><strong>Watch for:</strong> Overcorrection → ischemia; undercorrection → progressive damage</div></div>`,
            why_chain: [{q: "What is PRES?", a: "Posterior Reversible Encephalopathy Syndrome — vasogenic edema predominantly in posterior brain regions due to endothelial dysfunction from severe hypertension. Presents with headache, visual changes, seizures, altered mental status. Usually reversible with BP control."}],
            points: 10
        }
    },
    {
        title: "Complication Recognition",
        content: `<div class="narrative"><p>CT head shows no hemorrhage but reveals <span class="highlight">bilateral posterior white matter edema</span> consistent with PRES. The patient then has a generalized tonic-clonic seizure lasting 45 seconds.</p></div>`,
        hint_beginner: "What is the first-line treatment for seizures in this context?",
        hint_advanced: "Consider which anticonvulsants interact with BP medications and which have the best safety profile in this scenario.",
        question: {
            prompt: "What is the most appropriate immediate treatment for this seizure?",
            options: [{ text: "IV phenytoin loading dose", correct: false, explanation: "Phenytoin can cause hypotension and arrhythmias — risky in this setting." }, { text: "IV lorazepam 4 mg", correct: true, explanation: "" }, { text: "IV magnesium sulfate", correct: false, explanation: "First-line for eclampsia, not general hypertensive emergency seizures." }, { text: "Increase nicardipine rate to control BP faster", correct: false, explanation: "BP control alone won't stop an active seizure." }],
            explanation: { correct: "Correct! IV benzodiazepines (lorazepam 4 mg or diazepam 10 mg) are first-line for acute seizures in any setting. Continue BP management concurrently — PRES seizures resolve with BP control.", incorrect: "IV benzodiazepines are always first-line for acute seizures. Treat the seizure immediately, then continue addressing the underlying cause (BP control for PRES)." },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">📋 PRES Management</div><div class="pathway"><strong>Seizures:</strong> IV lorazepam first-line → levetiracetam if recurrent (avoid phenytoin — hypotension risk)<br><strong>BP:</strong> Continue controlled reduction with IV nicardipine<br><strong>Prognosis:</strong> PRES is typically reversible within days-weeks with BP control<br><strong>Imaging:</strong> MRI confirms: T2/FLAIR hyperintensity in posterior white matter</div></div>`,
            why_chain: [{q: "Why is PRES posterior-predominant?", a: "The posterior cerebral circulation has less sympathetic innervation than the anterior circulation, making it more vulnerable to breakthrough hyperperfusion when autoregulation fails."}],
            points: 10
        }
    },
    {
        title: "Transition to Oral Therapy",
        content: `<div class="narrative"><p>48 hours later: BP stable at 150/92 on nicardipine 8 mg/hr. No more seizures. Vision improving. Creatinine trending down to 1.4. Time to transition to oral medications.</p></div>`,
        hint_beginner: "Which oral medications should be started before weaning the IV drip?",
        hint_advanced: "Consider the pathophysiology of this patient's hypertension and which oral regimen addresses it best long-term.",
        question: {
            prompt: "What is the most appropriate oral transition strategy?",
            options: [{ text: "Start oral amlodipine and overlap with nicardipine taper for 6-12 hours", correct: true, explanation: "" }, { text: "Stop nicardipine and start oral lisinopril immediately", correct: false, explanation: "Abrupt IV-to-oral switch risks rebound hypertension." }, { text: "Discharge on clonidine patch alone", correct: false, explanation: "Monotherapy with clonidine is not appropriate long-term management." }, { text: "Continue IV nicardipine until next outpatient appointment", correct: false, explanation: "Unnecessarily prolonged IV therapy; transition when stable." }],
            explanation: { correct: "Correct! Start oral long-acting agent (amlodipine or other) while overlapping with the IV infusion for 6-12 hours. This prevents rebound hypertension during the transition. Most patients need 2+ agents.", incorrect: "Best practice: start oral agents with 6-12 hour overlap while tapering the IV infusion. Never abruptly discontinue IV therapy — rebound is common." },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">📋 Transition Principles</div><div class="pathway"><strong>Overlap:</strong> Start oral agent → observe for 6-12 hours → taper IV<br><strong>Regimen:</strong> Most need 2-3 agents (e.g., amlodipine + lisinopril ± HCTZ)<br><strong>Follow-up:</strong> Recheck BP within 1 week. Address adherence barriers.<br><strong>Education:</strong> Medication adherence, dietary sodium reduction, home BP monitoring</div></div>`,
            why_chain: [{q: "Why do most patients need multiple agents?", a: "Severe hypertension typically involves multiple pathophysiologic mechanisms (volume, RAAS, sympathetic tone, vascular stiffness). Combination therapy targets different mechanisms for better control with fewer side effects from any single agent."}],
            points: 10
        }
    }
];
document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hb=document.querySelector('.hint-box');if(hb)hb.style.display=d==='beginner'?'block':'none'}
function toggleReferences(){const c=document.getElementById('referencesContent');const t=document.getElementById('refToggle');if(c.style.display==='none'){c.style.display='block';t.textContent='▾'}else{c.style.display='none';t.textContent='▸'}}
function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100);document.getElementById('progress').style.width=pct+'%';let h='<h2 class="scene-title">'+st.title+'</h2>';h+='<div class="scene-content">'+st.content+'</div>';if(st.hint_beginner)h+='<div class="hint-box" id="hint-box"'+(difficulty==='beginner'?' style="display:block"':'')+'>💡 '+st.hint_beginner+'</div>';if(difficulty==='advanced'&&st.hint_advanced)h+='<div class="hint-box" style="display:block;background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.15);color:#5b21b6">🎓 '+st.hint_advanced+'</div>';if(st.question){h+='<div class="socratic-prompt"><h4>Clinical Question</h4><p>'+st.question.prompt+'</p></div>';h+='<div class="options-grid" id="options-'+idx+'">';st.question.options.forEach((opt,oi)=>{h+='<button class="option-btn" id="option-'+idx+'-'+oi+'" onclick="checkAnswer('+idx+','+oi+')">'+String.fromCharCode(65+oi)+'. '+opt.text+'</button>'});h+='</div>';h+='<div class="explanation-box" id="explain-'+idx+'"></div>';h+='<div id="teaching-'+idx+'" style="display:none">'+st.question.teaching+'</div>';if(st.question.why_chain&&st.question.why_chain.length>0){h+='<div id="why-'+idx+'" style="display:none">';st.question.why_chain.forEach((wc,wi)=>{h+='<div class="why-chain"><div class="why-q" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">🔍 '+wc.q+'</div><div class="why-a">'+wc.a+'</div></div>'});h+='</div>'}}h+='<button class="next-btn" id="next-'+idx+'" onclick="nextStage()">Continue →</button>';document.getElementById('scene-container').innerHTML=h}
function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll('#options-'+si+' .option-btn').forEach((b,i)=>{b.classList.add('disabled');if(st.question.options[i].correct)b.classList.add('correct');if(i===oi&&!opt.correct)b.classList.add('incorrect')});const eb=document.getElementById('explain-'+si);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;eb.className='explanation-box correct';eb.innerHTML='<strong>✓ Correct!</strong> '+st.question.explanation.correct}else{eb.className='explanation-box incorrect';eb.innerHTML='<strong>✗ Not quite.</strong> '+st.question.explanation.incorrect}eb.style.display='block';document.getElementById('teaching-'+si).style.display='block';const why=document.getElementById('why-'+si);if(why)why.style.display='block';document.getElementById('next-'+si).style.display='inline-block'}
function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let lvl='Developing';if(pct>=90)lvl='Mastery';else if(pct>=70)lvl='Proficient';else if(pct>=50)lvl='Competent';document.getElementById('scene-container').innerHTML='<div class="completion-card"><h2>🎉 Case Complete!</h2><p style="font-size:2rem;font-weight:700;color:var(--rdx-teal,#0d9488)">'+pct+'%</p><p style="color:var(--rdx-text-muted,#64748b)">Score: '+score+'/'+mx+'</p><p style="margin:12px 0;font-weight:600">Level: '+lvl+'</p><div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="../adventure-hub.html" style="padding:10px 20px;background:var(--rdx-teal,#0d9488);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">More Cases</a><a href="../tools/learning-dashboard.html" style="padding:10px 20px;background:var(--rdx-purple,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">📊 Dashboard</a><button onclick="currentStage=0;score=0;document.getElementById(\'score\').textContent=0;renderStage(0)" style="padding:10px 20px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;cursor:pointer;font-weight:600">🔄 Retry</button></div></div>';try{const progress=JSON.parse(localStorage.getItem('reasondx-progress')||'{}');if(!progress.cases)progress.cases={};progress.cases['hypertensive-emergency']=Math.max(progress.cases['hypertensive-emergency']||0,pct);localStorage.setItem('reasondx-progress',JSON.stringify(progress))}catch(e){}}
renderStage(0);
</script>
