{text-align:center;font-size:13px}.vital-item .label{color:var(--rdx-text-muted,#64748b);font-size:11px;display:block}.vital-item .value{font-weight:700;color:var(--rdx-teal-dark,#1f5f8b)}.socratic-prompt{background:linear-gradient(135deg,rgba(124,58,237,0.06),rgba(40,116,166,0.06));border:1px solid rgba(124,58,237,0.15);border-radius:12px;padding:16px 20px;margin:16px 0}.socratic-prompt h4{color:var(--rdx-purple,#7c3aed);font-size:0.95rem;margin-bottom:8px}.hint-box{background:rgba(217,119,6,0.06);border:1px solid rgba(217,119,6,0.15);border-radius:8px;padding:12px;margin:8px 0;font-size:0.9rem;color:#92400e;display:none}.options-grid{display:grid;gap:10px;margin:16px 0}.option-btn{background:var(--rdx-bg-card,#fff);border:2px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:14px 18px;cursor:pointer;text-align:left;font-size:14px;transition:all 0.2s;font-family:var(--rdx-font)}.option-btn:hover{border-color:var(--rdx-teal,#2874a6);background:rgba(40,116,166,0.03)}.option-btn.correct{border-color:#16a34a;background:rgba(22,163,74,0.06)}.option-btn.incorrect{border-color:#dc2626;background:rgba(220,38,38,0.04)}.option-btn.disabled{pointer-events:none;opacity:0.7}.explanation-box{border-radius:12px;padding:16px;margin:12px 0;display:none}.explanation-box.correct{background:rgba(22,163,74,0.06);border:1px solid rgba(22,163,74,0.2)}.explanation-box.incorrect{background:rgba(220,38,38,0.04);border:1px solid rgba(220,38,38,0.15)}.mechanism-box{background:linear-gradient(135deg,rgba(40,116,166,0.06),rgba(40,116,166,0.02));border:1px solid rgba(40,116,166,0.15);border-radius:12px;padding:20px;margin:16px 0}.mechanism-title{color:var(--rdx-teal-dark,#1f5f8b);font-weight:700;font-size:0.95rem;margin-bottom:10px}.pathway{line-height:1.8;font-size:0.93rem}.why-chain{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:12px;margin:8px 0}.why-q{font-weight:600;color:var(--rdx-purple,#7c3aed);cursor:pointer;font-size:0.9rem}.why-a{display:none;margin-top:6px;font-size:0.88rem;color:var(--rdx-text-muted,#64748b)}.next-btn{background:linear-gradient(135deg,#1f5f8b,#2874a6);color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:600;cursor:pointer;margin:20px 0;display:none;font-family:var(--rdx-font)}.next-btn:hover{opacity:0.9;transform:translateY(-1px)}.completion-card{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:16px;padding:32px;text-align:center;margin:24px 0}.completion-card h2{font-family:var(--rdx-font-serif);color:var(--rdx-teal-dark,#1f5f8b);margin-bottom:12px}.references-panel{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:16px;margin:20px 0}.references-panel a{display:block;color:var(--rdx-teal,#2874a6);font-size:13px;margin:4px 0;text-decoration:none}.references-panel a:hover{text-decoration:underline}.rdx-crossplatform-nav{background:var(--rdx-bg-card,#f8fafc);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:20px;margin:24px 0}.rdx-crossplatform-nav h4{color:var(--rdx-text-muted,#64748b);margin-bottom:12px;font-size:0.9rem}.rdx-crossplatform-links{display:flex;gap:12px;flex-wrap:wrap}.rdx-crossplatform-link{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:12px 16px;text-decoration:none;color:var(--rdx-text,#1e293b);font-size:13px;font-weight:500;transition:all 0.2s}.rdx-crossplatform-link:hover{background:rgba(40,116,166,0.05);transform:translateY(-2px)}@media(max-width:640px){.score-tracker{top:auto;bottom:12px;right:12px}.container{padding:12px}.vital-signs{grid-template-columns:repeat(3,1fr)}}</style>

<script>let currentStage=0,score=0,difficulty='standard';
const stages=[{
title:"Clinical Scenario",
content:`<div class="narrative"><p>A 35-year-old HIV+ man (CD4 150) needs PCP prophylaxis and develops a UTI.</p><div class="vital-signs"><div class="vital-item"><span class="label">HR</span><span class="value">82</span></div><div class="vital-item"><span class="label">Temp</span><span class="value">37.3°C</span></div></div></div>`,
hint_beginner:"What is the mechanism of TMP-SMX?",
hint_advanced:"Consider the pharmacologic principles underlying this drug class.",
question:{
prompt:"What is the mechanism of TMP-SMX?",
options:[{text:"Sequential folate pathway blockade: SMX inhibits dihydropteroate synthase, TMP inhibits dihydrofolate reductase → synergistic bactericidal",correct:true},{text:"Inhibits cell membrane synthesis",correct:false},{text:"Blocks RNA polymerase",correct:false},{text:"Inhibits folic acid metabolism",correct:false}],
explanation:{correct:"Correct! Sequential folate pathway blockade: SMX inhibits dihydropteroate synthase, TMP inhibits dihydrofolate reductase → synergistic bactericidal.",incorrect:"Sequential folate pathway blockade: SMX inhibits dihydropteroate synthase, TMP inhibits dihydrofolate reductase → synergistic bactericidal"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">TMP-SMX MOA</div><div class="pathway"><strong>Sequential blockade of folate synthesis:</strong><br>SMX → inhibits dihydropteroate synthase (DHPS) → blocks folate synthesis<br>TMP → inhibits dihydrofolate reductase (DHFR) → blocks folate activation<br><strong>Together:</strong> Synergistic bactericidal effect (neither alone is reliably bactericidal)</div></div>`,
why_chain:[],
points:10
}
},{
title:"Spectrum & Coverage",
content:`<div class="narrative"><p>Understanding the antimicrobial spectrum guides appropriate use.</p></div>`,
hint_beginner:"What is TMP-SMX spectrum and key clinical uses?",
hint_advanced:"Think about the unique organisms this drug covers that alternatives do not.",
question:{
prompt:"What is TMP-SMX spectrum and key clinical uses?",
options:[{text:"Covers only gram-positive organisms",correct:false},{text:"Broad gram-pos/neg coverage. First-line for: PCP prophylaxis/treatment, UTI, CA-MRSA skin, Nocardia, Stenotrophomonas, Toxoplasma prophylaxis",correct:true},{text:"No anaerobic activity",correct:false},{text:"Active only against fungi",correct:false}],
explanation:{correct:"Correct! Broad gram-pos/neg coverage. First-line for: PCP prophylaxis/treatment, UTI, CA-MRSA skin, Nocardia, Stenotrophomonas, Toxoplasma prophylaxis.",incorrect:"Broad gram-pos/neg coverage. First-line for: PCP prophylaxis/treatment, UTI, CA-MRSA skin, Nocardia, Stenotrophomonas, Toxoplasma prophylaxis"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">TMP-SMX Uses</div><div class="pathway"><strong>PCP:</strong> First-line treatment (high-dose IV) and prophylaxis (CD4 <200)<br><strong>UTI:</strong> First-line for uncomplicated cystitis (if resistance <20%)<br><strong>MRSA:</strong> CA-MRSA skin infections<br><strong>Other:</strong> Nocardia, Stenotrophomonas, Isospora, Cyclospora, Toxoplasma (prophylaxis at CD4 <100)</div></div>`,
why_chain:[],
points:10
}
},{
title:"Dosing & Administration",
content:`<div class="narrative"><p>Proper dosing maximizes efficacy and minimizes toxicity.</p></div>`,
hint_beginner:"Why is TMP-SMX contraindicated in early pregnancy?",
hint_advanced:"Consider the PK/PD parameters that drive efficacy for this class.",
question:{
prompt:"Why is TMP-SMX contraindicated in early pregnancy?",
options:[{text:"Fixed dose regardless of indication",correct:false},{text:"Always requires IV administration",correct:false},{text:"Folate antagonism → neural tube defects (first trimester). Also avoid in third trimester (kernicterus risk in neonate). Check G6PD (hemolysis risk).",correct:true},{text:"Dose based on ideal body weight only",correct:false}],
explanation:{correct:"Correct! Folate antagonism → neural tube defects (first trimester). Also avoid in third trimester (kernicterus risk in neonate). Check G6PD (hemolysis risk)..",incorrect:"Folate antagonism → neural tube defects (first trimester). Also avoid in third trimester (kernicterus risk in neonate). Check G6PD (hemolysis risk)."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">TMP-SMX Folate</div><div class="pathway"><strong>Why selective toxicity?</strong> Humans get folate from diet. Bacteria must synthesize it. SMX targets a bacterial enzyme (DHPS) that humans lack.<br><strong>TMP:</strong> Targets DHFR (present in humans too), but 50,000× more affinity for bacterial DHFR → acceptable selectivity</div></div>`,
why_chain:[],
points:10
}
},{
title:"Adverse Effects",
content:`<div class="narrative"><p>Monitoring for side effects is essential for patient safety.</p></div>`,
hint_beginner:"What are the major adverse effects?",
hint_advanced:"Consider which effects are dose-dependent vs idiosyncratic.",
question:{
prompt:"What are the major adverse effects?",
options:[{text:"Ototoxicity only",correct:false},{text:"No significant adverse effects",correct:false},{text:"Only affects renal function",correct:false},{text:"Hypersensitivity rash (sulfa allergy), Stevens-Johnson syndrome/TEN, bone marrow suppression, hyperkalemia (TMP blocks ENaC), acute kidney injury",correct:true}],
explanation:{correct:"Correct! Hypersensitivity rash (sulfa allergy), Stevens-Johnson syndrome/TEN, bone marrow suppression, hyperkalemia (TMP blocks ENaC), acute kidney injury.",incorrect:"Hypersensitivity rash (sulfa allergy), Stevens-Johnson syndrome/TEN, bone marrow suppression, hyperkalemia (TMP blocks ENaC), acute kidney injury"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">TMP-SMX Toxicity</div><div class="pathway"><strong>Sulfa allergy:</strong> Rash (most common), SJS/TEN (rare but serious). High rates in HIV patients (50-60%).<br><strong>Hyperkalemia:</strong> TMP blocks ENaC in collecting duct (like amiloride). Monitor K+ especially with ACEi/ARB/spironolactone.<br><strong>Bone marrow:</strong> Megaloblastic anemia (folate depletion), leukopenia, thrombocytopenia.<br><strong>Renal:</strong> Crystal nephropathy (adequate hydration), elevated creatinine (TMP blocks tubular secretion — not true GFR decrease).</div></div>`,
why_chain:[],
points:10
}
},{
title:"Resistance",
content:`<div class="narrative"><p>Understanding resistance guides empiric therapy choices.</p></div>`,
hint_beginner:"How does resistance develop?",
hint_advanced:"Compare enzymatic modification, target alteration, and efflux as resistance strategies.",
question:{
prompt:"How does resistance develop?",
options:[{text:"Altered DHPS (sulfonamide target) and DHFR (trimethoprim target) through acquired genes on plasmids",correct:true},{text:"No resistance has been documented",correct:false},{text:"Resistance occurs only in gram-positives",correct:false},{text:"Only plasmid-mediated resistance",correct:false}],
explanation:{correct:"Correct! Altered DHPS (sulfonamide target) and DHFR (trimethoprim target) through acquired genes on plasmids.",incorrect:"Altered DHPS (sulfonamide target) and DHFR (trimethoprim target) through acquired genes on plasmids"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">TMP-SMX Resistance</div><div class="pathway"><strong>Sulfonamide resistance:</strong> Altered DHPS genes (sul1, sul2) on mobile genetic elements<br><strong>Trimethoprim resistance:</strong> Altered DHFR genes (dfr genes) or overproduction of DHFR<br><strong>E. coli UTI:</strong> 20-30% TMP-SMX resistance in many areas → check local antibiogram. If >20%, use nitrofurantoin instead.</div></div>`,
why_chain:[],
points:10
}
},{
title:"Clinical Application",
content:`<div class="narrative"><p>Integrating mechanism, spectrum, and resistance data guides optimal clinical use.</p></div>`,
hint_beginner:"When is TMP-SMX the drug of choice?",
hint_advanced:"Consider guideline recommendations and antimicrobial stewardship principles.",
question:{
prompt:"When is TMP-SMX the drug of choice?",
options:[{text:"Reserved for outpatient use only",correct:false},{text:"PCP (treatment: high-dose; prophylaxis: SS daily or DS 3×/week), UTI (#1 first-line), CA-MRSA skin, Nocardia, Stenotrophomonas, Whipple disease",correct:true},{text:"Only for prophylaxis",correct:false},{text:"Empiric monotherapy for all infections",correct:false}],
explanation:{correct:"Correct! PCP (treatment: high-dose; prophylaxis: SS daily or DS 3×/week), UTI (#1 first-line), CA-MRSA skin, Nocardia, Stenotrophomonas, Whipple disease.",incorrect:"PCP (treatment: high-dose; prophylaxis: SS daily or DS 3×/week), UTI (#1 first-line), CA-MRSA skin, Nocardia, Stenotrophomonas, Whipple disease"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">TMP-SMX Clinical Pearls</div><div class="pathway"><strong>PCP dosing:</strong> Treatment = TMP 15-20 mg/kg/day. Prophylaxis = 1 SS daily or 1 DS 3×/week<br><strong>Desensitization:</strong> For HIV patients with sulfa allergy who need PCP prophylaxis — graded dose escalation over 4-6 hours<br><strong>Creatinine rise:</strong> TMP competitively inhibits tubular creatinine secretion → Cr rises ~0.5 mg/dL without actual GFR decline. Do NOT reflexively discontinue.</div></div>`,
why_chain:[],
points:10
}
}];
document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hb=document.querySelector('.hint-box');if(hb)hb.style.display=d==='beginner'?'block':'none'}
function toggleReferences(){const c=document.getElementById('referencesContent');const t=document.getElementById('refToggle');if(c.style.display==='none'){c.style.display='block';t.innerHTML='&#9662;'}else{c.style.display='none';t.innerHTML='&#9656;'}}
function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100);document.getElementById('progress').style.width=pct+'%';let h='<h2 class="scene-title">'+st.title+'</h2>';h+='<div class="scene-content">'+st.content+'</div>';if(st.hint_beginner)h+='<div class="hint-box" id="hint-box"'+(difficulty==='beginner'?' style="display:block"':'')+'> '+st.hint_beginner+'</div>';if(difficulty==='advanced'&&st.hint_advanced)h+='<div class="hint-box" style="display:block;background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.15);color:#5b21b6"> '+st.hint_advanced+'</div>';if(st.question){h+='<div class="socratic-prompt"><h4>Clinical Question</h4><p>'+st.question.prompt+'</p></div>';h+='<div class="options-grid" id="options-'+idx+'">';st.question.options.forEach((opt,oi)=>{h+='<button class="option-btn" id="option-'+idx+'-'+oi+'" onclick="checkAnswer('+idx+','+oi+')">'+String.fromCharCode(65+oi)+'. '+opt.text+'</button>'});h+='</div>';h+='<div class="explanation-box" id="explain-'+idx+'"></div>';h+='<div id="teaching-'+idx+'" style="display:none">'+st.question.teaching+'</div>';if(st.question.why_chain&&st.question.why_chain.length>0){h+='<div id="why-'+idx+'" style="display:none">';st.question.why_chain.forEach((wc,wi)=>{h+='<div class="why-chain"><div class="why-q" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'"> '+wc.q+'</div><div class="why-a">'+wc.a+'</div></div>'});h+='</div>'}}h+='<button class="next-btn" id="next-'+idx+'" onclick="nextStage()">Continue &rarr;</button>';document.getElementById('scene-container').innerHTML=h}
function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll('#options-'+si+' .option-btn').forEach((b,i)=>{b.classList.add('disabled');if(st.question.options[i].correct)b.classList.add('correct');if(i===oi&&!opt.correct)b.classList.add('incorrect')});const eb=document.getElementById('explain-'+si);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;eb.className='explanation-box correct';eb.innerHTML='<strong>Correct!</strong> '+st.question.explanation.correct}else{eb.className='explanation-box incorrect';eb.innerHTML='<strong>Not quite.</strong> '+st.question.explanation.incorrect}eb.style.display='block';document.getElementById('teaching-'+si).style.display='block';const wy=document.getElementById('why-'+si);if(wy)wy.style.display='block';document.getElementById('next-'+si).style.display='inline-block'}
function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let lvl='Developing';if(pct>=90)lvl='Mastery';else if(pct>=70)lvl='Proficient';else if(pct>=50)lvl='Competent';document.getElementById('scene-container').innerHTML='<div class="completion-card"><h2>Case Complete!</h2><p style="font-size:2rem;font-weight:700;color:var(--rdx-teal,#2874a6)">'+pct+'%</p><p style="color:var(--rdx-text-muted,#64748b)">Score: '+score+'/'+mx+'</p><p style="margin:12px 0;font-weight:600">Level: '+lvl+'</p><div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="../adventure-hub.html" style="padding:10px 20px;background:var(--rdx-teal,#2874a6);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">More Cases</a><a href="../tools/learning-dashboard.html" style="padding:10px 20px;background:var(--rdx-purple,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">Dashboard</a><button onclick="currentStage=0;score=0;document.getElementById(\'score\').textContent=0;renderStage(0)" style="padding:10px 20px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;cursor:pointer;font-weight:600">Retry</button></div></div>';try{const progress=JSON.parse(localStorage.getItem('reasondx-progress')||'{}');if(!progress.cases)progress.cases={};progress.cases['tmp-smx']=Math.max(progress.cases['tmp-smx']||0,pct);localStorage.setItem('reasondx-progress',JSON.stringify(progress))}catch(e){}}
renderStage(0);</script>
