<script>
let currentStage=0,score=0,maxScore=0,difficulty='standard',answeredQuestions=new Set(),decisionPath=[];
const stages=[
{title:"Post-Sting Anaphylaxis",content:`<div class="narrative"><p>55-year-old man referred 3 weeks after anaphylaxis from a sting while gardening. He developed hives, throat tightness, and near-syncope within 10 minutes. Treated with epinephrine in ED.</p><p style="margin-top:12px;"><strong>PMH:</strong> HTN on lisinopril<br><strong>Description:</strong> "Yellow and black insect, flew away after stinging"</p></div><div class="socratic-prompt"><h4>Classify the Reaction</h4><p>What type of reaction is this, and does it warrant further workup?</p></div>`,
hint_beginner:"Anaphylaxis = systemic reaction with hypotension or respiratory compromise",hint_advanced:"What about large local reactions - do they predict systemic reactions?",
question:{prompt:"What type of sting reaction is this, and what is the next step?",
options:[{text:"Systemic anaphylaxis (hypotension + respiratory) - warrants allergy testing and likely venom immunotherapy (VIT)",correct:true},
{text:"Large local reaction - reassurance only, no workup needed",correct:false},
{text:"Normal local reaction - no further evaluation",correct:false},
{text:"Cutaneous-only systemic - observation without VIT",correct:false}],
explanation:{correct:"Throat tightness (respiratory) + near-syncope (cardiovascular) = anaphylaxis. This patient needs allergy testing and is a candidate for VIT, which is 95-98% effective in preventing future reactions.",incorrect:"This is anaphylaxis, not a local reaction. Hypotension/near-syncope + respiratory symptoms defines severe systemic reaction requiring evaluation."},
teaching:`<h4>Sting Reaction Classification</h4><p><strong>Normal local:</strong> Less than 10cm swelling at site</p><p><strong>Large local:</strong> Greater than 10cm, peaks 24-48h - NOT VIT indication</p><p><strong>Cutaneous systemic:</strong> Generalized urticaria only</p><p><strong>Anaphylaxis:</strong> Respiratory, cardiovascular, severe GI - VIT indicated</p>`,
why_chain:[{q:"Do large local reactions predict anaphylaxis?",a:"No! Large local reactions do NOT predict systemic reactions on future stings. VIT is not indicated for large local reactions regardless of size."}],points:10}},

{title:"Identify the Culprit",content:`<div class="narrative"><p>"It was yellow and black, flew away after stinging me. There was no stinger left behind."</p></div><div class="socratic-prompt"><h4>Entomology Matters</h4><p>Based on the description, which insect is most likely, and why does identification matter?</p></div>`,
hint_beginner:"Honeybees leave stinger behind (barbed), wasps/yellow jackets do not",hint_advanced:"What is the cross-reactivity pattern among Hymenoptera?",
question:{prompt:"What insect most likely caused this reaction?",
options:[{text:"Yellow jacket - yellow/black coloring, no stinger left behind (can sting multiple times), aggressive",correct:true},
{text:"Honeybee - leaves barbed stinger behind",correct:false},
{text:"Fire ant - creates sterile pustules",correct:false},
{text:"Cannot determine - all yellow and black insects are the same",correct:false}],
explanation:{correct:"Yellow jacket: yellow/black stripes, smooth stinger (no barb), flies away and can sting again, aggressive scavenger. Honeybee leaves barbed stinger and dies after stinging. Identification guides which venoms to test.",incorrect:"The key clue is NO stinger left behind. Honeybees have barbed stingers that remain in skin; the bee dies. Yellow jackets have smooth stingers and can sting repeatedly."},
teaching:`<h4>Hymenoptera Identification</h4><p><strong>Honeybee:</strong> Fuzzy, barbed stinger LEFT BEHIND, dies after</p><p><strong>Yellow jacket:</strong> Yellow/black, smooth, scavenger, aggressive</p><p><strong>Paper wasp:</strong> Long legs, dangling, paper nests</p><p><strong>Fire ant:</strong> Multiple stings, sterile pustules</p>`,
why_chain:[{q:"What is the cross-reactivity pattern?",a:"Vespids (yellow jacket, wasp, hornet) have significant cross-reactivity - patients often test positive to multiple. Honeybee has little cross-reactivity with vespids. Fire ant has none."},{q:"Why does identification matter for testing?",a:"Guides which venoms to include in skin testing panel and which to include in VIT if positive."}],points:10}},

{title:"Testing Timeline",content:`<div class="narrative"><p>The patient wants to be tested immediately.</p></div><div class="socratic-prompt"><h4>Timing Matters</h4><p>When should venom allergy testing be performed after a sting reaction, and why?</p></div>`,
hint_beginner:"There is a refractory period after anaphylaxis",hint_advanced:"What happens to IgE and mast cells immediately after degranulation?",
question:{prompt:"When should this patient undergo venom allergy testing?",
options:[{text:"Wait 4-6 weeks after the sting - testing too early may be falsely negative due to refractory period",correct:true},
{text:"Test immediately to capture the acute response",correct:false},
{text:"Wait 6 months for full sensitization",correct:false},
{text:"Testing timing does not affect results",correct:false}],
explanation:{correct:"After anaphylaxis, mast cells are degranulated and refractory, and specific IgE may be consumed. Testing in first 4 weeks may be falsely negative. Wait 4-6 weeks for mast cell/basophil recovery and IgE regeneration.",incorrect:"Testing too early gives false negatives. The refractory period after degranulation requires 4-6 weeks before reliable testing."},
teaching:`<h4>Venom Testing Protocol</h4><p><strong>Timing:</strong> 4-6 weeks post-sting</p><p><strong>Method:</strong> Skin prick first (safer), then intradermal if negative</p><p><strong>Adjunct:</strong> Serum specific IgE</p><p><strong>Always check:</strong> Baseline tryptase</p>`,
why_chain:[{q:"Why check baseline tryptase?",a:"Elevated tryptase (greater than 11.4) suggests mastocytosis. These patients have HIGHER risk of severe reactions and may need lifelong VIT. It's a critical risk stratifier."}],points:10}},

{title:"Test Results",content:`<div class="narrative"><p>Testing at 6 weeks:<br>- Yellow jacket: Skin prick POSITIVE, sIgE 8.5 kU/L<br>- Wasp: Positive (cross-reactivity)<br>- Honeybee: Negative<br>- Baseline tryptase: 5.2 ng/mL (normal)</p></div><div class="socratic-prompt"><h4>Interpret and Risk Stratify</h4><p>What do these results mean, and what risk factors affect management?</p></div>`,
hint_beginner:"Positive testing confirms IgE-mediated allergy to yellow jacket",hint_advanced:"What comorbidities increase risk of fatal anaphylaxis?",
question:{prompt:"What risk factors does this patient have for severe future reactions?",
options:[{text:"Prior anaphylaxis + age 55 + ACE inhibitor use = moderate-high risk; strong VIT indication",correct:true},
{text:"Low risk because tryptase is normal",correct:false},
{text:"Testing positive to wasp means honeybee VIT is needed",correct:false},
{text:"Age is protective - older patients have milder reactions",correct:false}],
explanation:{correct:"Risk factors for severe reactions: prior severe reaction, older age, cardiovascular disease, beta-blocker/ACEi use, elevated tryptase, mastocytosis. This patient has several - strong VIT indication. Normal tryptase is reassuring but doesn't eliminate risk.",incorrect:"Multiple risk factors present. ACE inhibitors can worsen anaphylaxis by preventing bradykinin breakdown. Older age increases severity risk."},
teaching:`<h4>Risk Factors for Severe Reactions</h4><p><strong>Higher risk:</strong> Prior severe reaction, older age, CVD, beta-blocker/ACEi, elevated tryptase, mastocytosis</p><p><strong>Lower risk:</strong> Cutaneous-only reaction, pediatric age, no comorbidities</p>`,
why_chain:[{q:"Why do beta-blockers increase risk?",a:"Beta-blockers block beta-adrenergic receptors. During anaphylaxis, epinephrine is less effective - cannot increase HR/contractility. May cause refractory hypotension. Treatment may require glucagon."},{q:"Why ACE inhibitors?",a:"ACEi block bradykinin breakdown. Bradykinin causes vasodilation and angioedema. During anaphylaxis, bradykinin levels rise and cannot be cleared."}],points:15}},

{title:"Venom Immunotherapy",content:`<div class="narrative"><p>You recommend VIT. The patient asks how it works and how long it takes.</p></div><div class="socratic-prompt"><h4>Explain the Treatment</h4><p>What is the VIT protocol, and how effective is it?</p></div>`,
hint_beginner:"VIT is one of the most effective forms of immunotherapy - 95-98%",hint_advanced:"What is the immunologic mechanism of tolerance induction?",
question:{prompt:"What is the efficacy and protocol for venom immunotherapy?",
options:[{text:"95-98% effective in preventing systemic reactions; build-up to 100mcg maintenance over 8-16 weeks, then monthly for 3-5 years",correct:true},
{text:"50% effective; requires lifelong injections for all patients",correct:false},
{text:"Only effective for honeybee, not vespids",correct:false},
{text:"Works immediately after first injection",correct:false}],
explanation:{correct:"VIT is remarkably effective: reduces anaphylaxis risk from ~60% to less than 5%. Protocol: build-up phase (weekly injections to reach 100mcg), then maintenance (100mcg every 4 weeks). Duration: 3-5 years minimum; lifelong if mastocytosis or very severe reactions.",incorrect:"VIT is 95-98% effective - one of the most effective immunotherapy treatments in allergy. Standard duration is 3-5 years, not lifelong (with exceptions)."},
teaching:`<h4>VIT Protocol</h4><p><strong>Build-up:</strong> 8-16 weeks (conventional) or 1-2 days (rush)</p><p><strong>Maintenance:</strong> 100mcg every 4 weeks</p><p><strong>Duration:</strong> 3-5 years standard; lifelong if mastocytosis/severe</p><p><strong>Efficacy:</strong> 95-98% protection</p>`,
why_chain:[{q:"How does VIT work immunologically?",a:"Repeated venom exposure induces shift from Th2 to Th1/Treg response. Decreases venom-specific IgE over time. Increases IgG4 'blocking antibodies.' Causes mast cell/basophil desensitization."},{q:"Why 100mcg maintenance dose?",a:"100mcg approximates the venom in 1-2 stings. This provides protection against field stings. Some use 200mcg for mastocytosis patients."}],points:15}},

{title:"Monitoring and Duration",content:`<div class="narrative"><p>Patient starts VIT. After 3 years, he is accidentally re-stung - only mild local reaction.</p></div><div class="socratic-prompt"><h4>When to Stop?</h4><p>How do you monitor VIT and when can it be discontinued?</p></div>`,
hint_beginner:"Standard duration is 3-5 years; some patients need lifelong",hint_advanced:"Does protection persist after stopping VIT?",
question:{prompt:"How long should this patient continue VIT?",
options:[{text:"Complete 5 years total; tolerated field sting suggests protection; keep epinephrine after stopping as re-sting risk is 5-10%",correct:true},
{text:"Stop immediately since he tolerated re-sting",correct:false},
{text:"Continue lifelong regardless of response",correct:false},
{text:"Repeat skin testing annually to guide duration",correct:false}],
explanation:{correct:"Standard duration: 3-5 years. Field sting tolerance is reassuring but complete the course. After stopping, maintain epinephrine since 5-10% may react to re-stings even after successful VIT. Lifelong VIT recommended for mastocytosis or very severe initial reactions.",incorrect:"Complete the 3-5 year course even if field sting is tolerated. Keep epinephrine after stopping - protection is excellent but not 100%."},
teaching:`<h4>VIT Duration</h4><p><strong>Standard:</strong> 3-5 years</p><p><strong>Lifelong:</strong> Mastocytosis, very severe initial reaction, occupational exposure</p><p><strong>After stopping:</strong> Keep epinephrine; 5-10% re-sting risk</p><p><strong>Protection:</strong> Persists years after stopping via Treg/IgG4</p>`,

{title:"Special Populations",content:`<div class="narrative"><p>A colleague asks about a 7-year-old with generalized hives (only) after a bee sting.</p></div><div class="socratic-prompt"><h4>Pediatric Considerations</h4><p>Does this child need VIT?</p></div>`,

{title:"Case Resolution",content:`<div class="narrative"><p>Original patient completed 5 years of VIT. Tolerated field sting during therapy. Maintains epinephrine autoinjector. Yearly follow-up confirms sustained tolerance.</p></div><div class="socratic-prompt"><h4>Synthesis</h4><p>What are the key management principles for venom allergy?</p></div>`,

function shuffleArray(a){const s=[...a];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s;}
function setDifficulty(l,b){difficulty=l;document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderStage(currentStage);}
function renderStage(i){
const s=stages[i],opts=shuffleArray(s.question.options.map((o,idx)=>({...o,idx}))),ltrs='ABCD';
let hints='';
if(difficulty==='beginner'&&s.hint_beginner)hints=`<div class="hint-beginner" style="display:block;">Hint: ${s.hint_beginner}</div>`;
else if(difficulty==='advanced'&&s.hint_advanced)hints=`<div class="hint-advanced" style="display:block;">Challenge: ${s.hint_advanced}</div>`;
const why=s.question.why_chain?`<div class="why-chain" id="why"><h4>WHY Chain</h4>${s.question.why_chain.map(w=>`<div class="why-item"><div class="why-q">Q: ${w.q}</div><div class="why-a">${w.a}</div></div>`).join('')}</div>`:'';
document.getElementById('progress').style.width=((i)/stages.length*100)+'%';
document.getElementById('scene-container').innerHTML=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${i+1} of ${stages.length}</div><div class="scene-title">${s.title}</div></div>${s.content}${hints}<div class="question-box"><div class="question-prompt">${s.question.prompt}</div><div class="mcq-options">${opts.map((o,j)=>`<div class="mcq-option" data-correct="${o.correct}" onclick="selectOption(this,${i})"><span class="option-letter">${ltrs[j]}</span><span class="option-text">${o.text}</span></div>`).join('')}</div><div class="feedback correct-feedback" id="fb-c"><div class="feedback-title">Correct!</div><div class="feedback-explanation">${s.question.explanation.correct}</div></div><div class="feedback incorrect-feedback" id="fb-i"><div class="feedback-title">Not Quite</div><div class="feedback-explanation">${s.question.explanation.incorrect}</div></div><div class="teaching-point" id="teach">${s.question.teaching}</div>${why}<button class="btn" id="next-btn" onclick="nextStage()">Continue</button></div></div>`;
}
function selectOption(el,i){
if(answeredQuestions.has(i))return;
const c=el.dataset.correct==='true',s=stages[i];
answeredQuestions.add(i);decisionPath.push({stage:s.title,correct:c,points:c?s.question.points:0});
if(c)score+=s.question.points;maxScore+=s.question.points;
document.getElementById('score').textContent=score;document.getElementById('maxScore').textContent=maxScore;
document.querySelectorAll('.mcq-option').forEach(o=>{o.classList.add('disabled');if(o.dataset.correct==='true')o.classList.add('correct');else if(o===el&&!c)o.classList.add('incorrect');});
document.getElementById(c?'fb-c':'fb-i').classList.add('show');
document.getElementById('teach').classList.add('show');
const w=document.getElementById('why');if(w)w.classList.add('show');
document.getElementById('next-btn').classList.add('show');
}
function nextStage(){if(++currentStage<stages.length){renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'});}else showCompletion();}
function showCompletion(){
const p=Math.round(score/maxScore*100);
let g,m,clr;
if(p>=90){g='Outstanding!';clr='#22c55e';m='Excellent venom allergy management!';}
else if(p>=80){g='Great Work!';clr='#3a90c0';m='Strong grasp of VIT principles.';}
else if(p>=70){g='Good Progress';clr='#f59e0b';m='Review reaction classification and testing timing.';}
else{g='Keep Learning';clr='#ef4444';m='Focus on VIT indications and duration.';}
document.getElementById('scene-container').innerHTML=`<div class="scene completion"><div class="completion-grade" style="color:${clr}">${g}</div><div class="completion-percent" style="color:${clr}">${p}%</div><div style="font-size:1.3rem;margin-bottom:8px">${score}/${maxScore} points</div><div class="completion-message">${m}</div><div class="completion-breakdown"><h4>Your Clinical Journey</h4>${decisionPath.map((d,j)=>`<div style="padding:12px 0;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;"><span><span style="color:${d.correct?'#22c55e':'#ef4444'}">${d.correct?'Yes':'No'}</span> Stage ${j+1}: ${d.stage}</span><span style="color:#94a3b8">${d.points}/${stages[j].question.points}</span></div>`).join('')}</div></div>`;
document.getElementById('progress').style.width='100%';
}
document.addEventListener('DOMContentLoaded',()=>renderStage(0));


// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3a90c0'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#b45309'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#b45309'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color: #1f5f8b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
