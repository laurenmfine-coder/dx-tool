<script>let currentStage=0,score=0,difficulty='standard';
const stages=[{
title:"Clinical Scenario",
content:`<div class="narrative"><p>A 60-year-old with VRE bacteremia. Vancomycin is ineffective. You need a last-resort agent.</p><div class="vital-signs"><div class="vital-item"><span class="label">HR</span><span class="value">106</span></div><div class="vital-item"><span class="label">Temp</span><span class="value">39.0°C</span></div><div class="vital-item"><span class="label">BP</span><span class="value">96/58</span></div></div></div>`,
hint_beginner:"What is the mechanism of linezolid?",
hint_advanced:"Consider the pharmacologic principles underlying this drug class.",
question:{
prompt:"What is the mechanism of linezolid?",
options:[{text:"Inhibits cell membrane synthesis",correct:false},{text:"Inhibits folic acid metabolism",correct:false},{text:"Binds 50S ribosome at a unique site (initiation complex) → prevents 70S formation → bacteriostatic (first oxazolidinone)",correct:true},{text:"Blocks RNA polymerase",correct:false}],
explanation:{correct:"Correct! Binds 50S ribosome at a unique site (initiation complex) → prevents 70S formation → bacteriostatic (first oxazolidinone).",incorrect:"Binds 50S ribosome at a unique site (initiation complex) → prevents 70S formation → bacteriostatic (first oxazolidinone)"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Linezolid MOA</div><div class="pathway"><strong>Target:</strong> 50S ribosomal subunit — unique binding site at initiation complex (prevents 30S+50S assembly into 70S)<br><strong>Effect:</strong> Bacteriostatic (prevents translation initiation)<br><strong>Spectrum:</strong> MRSA, VRE, S. pneumoniae. No gram-negative activity.<br><strong>Bioavailability:</strong> 100% oral — IV-to-PO switch seamless</div></div>`,
why_chain:[],
points:10
}
},{
title:"Spectrum & Coverage",
content:`<div class="narrative"><p>Understanding the antimicrobial spectrum guides appropriate use.</p></div>`,
hint_beginner:"What is daptomycin mechanism?",
hint_advanced:"Think about the unique organisms this drug covers that alternatives do not.",
question:{
prompt:"What is daptomycin mechanism?",
options:[{text:"Active only against fungi",correct:false},{text:"No anaerobic activity",correct:false},{text:"Covers only gram-positive organisms",correct:false},{text:"Calcium-dependent lipopeptide that inserts into gram-positive cell membranes → creates ion channels → depolarization → bactericidal",correct:true}],
explanation:{correct:"Correct! Calcium-dependent lipopeptide that inserts into gram-positive cell membranes → creates ion channels → depolarization → bactericidal.",incorrect:"Calcium-dependent lipopeptide that inserts into gram-positive cell membranes → creates ion channels → depolarization → bactericidal"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Daptomycin MOA</div><div class="pathway"><strong>Mechanism:</strong> Calcium-dependent insertion into gram-positive cell membranes → ion channel formation → K+ efflux → depolarization → cell death<br><strong>Effect:</strong> Concentration-dependent bactericidal<br><strong>Spectrum:</strong> Gram-positives only: MRSA, VRE, CoNS<br><strong>Critical limitation:</strong> Inactivated by surfactant → NO PNEUMONIA USE</div></div>`,
why_chain:[],
points:10
}
},{
title:"Dosing & Administration",
content:`<div class="narrative"><p>Proper dosing maximizes efficacy and minimizes toxicity.</p></div>`,
hint_beginner:"Why cant daptomycin be used for pneumonia?",
hint_advanced:"Consider the PK/PD parameters that drive efficacy for this class.",
question:{
prompt:"Why cant daptomycin be used for pneumonia?",
options:[{text:"Inactivated by pulmonary surfactant — surfactant binds and sequesters daptomycin. Use linezolid or vancomycin for MRSA/VRE pneumonia.",correct:true},{text:"Fixed dose regardless of indication",correct:false},{text:"Dose based on ideal body weight only",correct:false},{text:"Always requires IV administration",correct:false}],
explanation:{correct:"Correct! Inactivated by pulmonary surfactant — surfactant binds and sequesters daptomycin. Use linezolid or vancomycin for MRSA/VRE pneumonia..",incorrect:"Inactivated by pulmonary surfactant — surfactant binds and sequesters daptomycin. Use linezolid or vancomycin for MRSA/VRE pneumonia."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Surfactant Inactivation</div><div class="pathway"><strong>Why:</strong> Pulmonary surfactant (dipalmitoylphosphatidylcholine) binds daptomycin, preventing it from reaching bacterial membranes<br><strong>Clinical impact:</strong> Standard doses achieve zero bactericidal activity in lung tissue<br><strong>Alternative for MRSA/VRE pneumonia:</strong> Linezolid (excellent lung penetration) or vancomycin</div></div>`,
why_chain:[],
points:10
}
},{
title:"Adverse Effects",
content:`<div class="narrative"><p>Monitoring for side effects is essential for patient safety.</p></div>`,
hint_beginner:"What is the major toxicity of linezolid with prolonged use?",
hint_advanced:"Consider which effects are dose-dependent vs idiosyncratic.",
question:{
prompt:"What is the major toxicity of linezolid with prolonged use?",
options:[{text:"No significant adverse effects",correct:false},{text:"Thrombocytopenia (monitor CBC weekly), serotonin syndrome (with SSRIs/MAOIs — linezolid is a reversible MAO inhibitor), lactic acidosis, optic neuropathy",correct:true},{text:"Only affects renal function",correct:false},{text:"Ototoxicity only",correct:false}],
explanation:{correct:"Correct! Thrombocytopenia (monitor CBC weekly), serotonin syndrome (with SSRIs/MAOIs — linezolid is a reversible MAO inhibitor), lactic acidosis, optic neuropathy.",incorrect:"Thrombocytopenia (monitor CBC weekly), serotonin syndrome (with SSRIs/MAOIs — linezolid is a reversible MAO inhibitor), lactic acidosis, optic neuropathy"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Linezolid Toxicity</div><div class="pathway"><strong>Thrombocytopenia:</strong> 20-30% with courses >14 days. Monitor CBC weekly. Usually reversible.<br><strong>Serotonin syndrome:</strong> Linezolid is a reversible MAO inhibitor → avoid with SSRIs, SNRIs, meperidine, tramadol<br><strong>Lactic acidosis:</strong> Mitochondrial toxicity with prolonged use<br><strong>Optic/peripheral neuropathy:</strong> With courses >28 days. May be irreversible.</div></div>`,
why_chain:[],
points:10
}
},{
title:"Resistance",
content:`<div class="narrative"><p>Understanding resistance guides empiric therapy choices.</p></div>`,
hint_beginner:"How does linezolid resistance develop?",
hint_advanced:"Compare enzymatic modification, target alteration, and efflux as resistance strategies.",
question:{
prompt:"How does linezolid resistance develop?",
options:[{text:"No resistance has been documented",correct:false},{text:"Only plasmid-mediated resistance",correct:false},{text:"23S rRNA mutations (G2576T most common) — rare but increasing, especially in E. faecium with prolonged courses",correct:true},{text:"Resistance occurs only in gram-positives",correct:false}],
explanation:{correct:"Correct! 23S rRNA mutations (G2576T most common) — rare but increasing, especially in E. faecium with prolonged courses.",incorrect:"23S rRNA mutations (G2576T most common) — rare but increasing, especially in E. faecium with prolonged courses"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Resistance</div><div class="pathway"><strong>Linezolid:</strong> 23S rRNA mutations (rare, <1% for VRE). cfr gene (methyltransferase, transferable — emerging concern).<br><strong>Daptomycin:</strong> Cell membrane charge modifications (mprF mutations). Non-susceptibility ~3-5% in VRE. Develops more readily from VISA strains.</div></div>`,
why_chain:[],
points:10
}
},{
title:"Clinical Application",
content:`<div class="narrative"><p>Integrating mechanism, spectrum, and resistance data guides optimal clinical use.</p></div>`,
hint_beginner:"When do you choose linezolid vs daptomycin?",
hint_advanced:"Consider guideline recommendations and antimicrobial stewardship principles.",
question:{
prompt:"When do you choose linezolid vs daptomycin?",
options:[{text:"Reserved for outpatient use only",correct:false},{text:"Only for prophylaxis",correct:false},{text:"Empiric monotherapy for all infections",correct:false},{text:"Daptomycin for VRE bacteremia (bactericidal). Linezolid for VRE/MRSA pneumonia (good lung penetration), skin/soft tissue. Linezolid has 100% oral bioavailability → IV-to-PO switch.",correct:true}],
explanation:{correct:"Correct! Daptomycin for VRE bacteremia (bactericidal). Linezolid for VRE/MRSA pneumonia (good lung penetration), skin/soft tissue. Linezolid has 100% oral bioavailability → IV-to-PO switch..",incorrect:"Daptomycin for VRE bacteremia (bactericidal). Linezolid for VRE/MRSA pneumonia (good lung penetration), skin/soft tissue. Linezolid has 100% oral bioavailability → IV-to-PO switch."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Clinical Decision Guide</div><div class="pathway"><strong>VRE bacteremia:</strong> Daptomycin 8-12 mg/kg (bactericidal)<br><strong>MRSA/VRE pneumonia:</strong> Linezolid (surfactant inactivates daptomycin)<br><strong>MRSA bacteremia:</strong> Vancomycin first-line; daptomycin if vancomycin fails or allergy<br><strong>Oral step-down:</strong> Linezolid (100% PO bioavailability) — daptomycin is IV only<br><strong>Prolonged courses:</strong> Prefer daptomycin over linezolid (less cumulative toxicity)</div></div>`,
why_chain:[],
points:10
}
}];
document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hb=document.querySelector('.hint-box');if(hb)hb.style.display=d==='beginner'?'block':'none'}
function toggleReferences(){const c=document.getElementById('referencesContent');const t=document.getElementById('refToggle');if(c.style.display==='none'){c.style.display='block';t.innerHTML='&#9662;'}else{c.style.display='none';t.innerHTML='&#9656;'}}
function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100);document.getElementById('progress').style.width=pct+'%';let h='<h2 class="scene-title">'+st.title+'</h2>';h+='<div class="scene-content">'+st.content+'</div>';if(st.hint_beginner)h+='<div class="hint-box" id="hint-box"'+(difficulty==='beginner'?' style="display:block"':'')+'> '+st.hint_beginner+'</div>';if(difficulty==='advanced'&&st.hint_advanced)h+='<div class="hint-box" style="display:block;background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.15);color:#5b21b6"> '+st.hint_advanced+'</div>';if(st.question){h+='<div class="socratic-prompt"><h4>Clinical Question</h4><p>'+st.question.prompt+'</p></div>';h+='<div class="options-grid" id="options-'+idx+'">';st.question.options.forEach((opt,oi)=>{h+='<button class="option-btn" id="option-'+idx+'-'+oi+'" onclick="checkAnswer('+idx+','+oi+')">'+String.fromCharCode(65+oi)+'. '+opt.text+'</button>'});h+='</div>';h+='<div class="explanation-box" id="explain-'+idx+'"></div>';h+='<div id="teaching-'+idx+'" style="display:none">'+st.question.teaching+'</div>';if(st.question.why_chain&&st.question.why_chain.length>0){h+='<div id="why-'+idx+'" style="display:none">';st.question.why_chain.forEach((wc,wi)=>{h+='<div class="why-chain"><div class="why-q" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'"> '+wc.q+'</div><div class="why-a">'+wc.a+'</div></div>'});h+='</div>'}}h+='<button class="next-btn" id="next-'+idx+'" onclick="nextStage()">Continue &rarr;</button>';document.getElementById('scene-container').innerHTML=h}
function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll('#options-'+si+' .option-btn').forEach((b,i)=>{b.classList.add('disabled');if(st.question.options[i].correct)b.classList.add('correct');if(i===oi&&!opt.correct)b.classList.add('incorrect')});const eb=document.getElementById('explain-'+si);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;eb.className='explanation-box correct';eb.innerHTML='<strong>Correct!</strong> '+st.question.explanation.correct}else{eb.className='explanation-box incorrect';eb.innerHTML='<strong>Not quite.</strong> '+st.question.explanation.incorrect}eb.style.display='block';document.getElementById('teaching-'+si).style.display='block';const wy=document.getElementById('why-'+si);if(wy)wy.style.display='block';document.getElementById('next-'+si).style.display='inline-block'}
function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let lvl='Developing';if(pct>=90)lvl='Mastery';else if(pct>=70)lvl='Proficient';else if(pct>=50)lvl='Competent';document.getElementById('scene-container').innerHTML='<div class="completion-card"><h2>Case Complete!</h2><p style="font-size:2rem;font-weight:700;color:var(--rdx-teal,#2874a6)">'+pct+'%</p><p style="color:var(--rdx-text-muted,#64748b)">Score: '+score+'/'+mx+'</p><p style="margin:12px 0;font-weight:600">Level: '+lvl+'</p><div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="../adventure-hub.html" style="padding:10px 20px;background:var(--rdx-teal,#2874a6);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">More Cases</a><a href="../tools/learning-dashboard.html" style="padding:10px 20px;background:var(--rdx-purple,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">Dashboard</a><button onclick="currentStage=0;score=0;document.getElementById(\'score\').textContent=0;renderStage(0)" style="padding:10px 20px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;cursor:pointer;font-weight:600">Retry</button></div></div>';try{const progress=JSON.parse(localStorage.getItem('reasondx-progress')||'{}');if(!progress.cases)progress.cases={};progress.cases['linezolid-daptomycin']=Math.max(progress.cases['linezolid-daptomycin']||0,pct);localStorage.setItem('reasondx-progress',JSON.stringify(progress))}catch(e){}}
renderStage(0);</script>
