*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--rdx-font);background:var(--rdx-bg,#f8fafc);min-height:100vh;color:var(--rdx-text,#1e293b)}.container{max-width:800px;margin:0 auto;padding:20px}.progress-bar{background:var(--rdx-border,#e2e8f0);border-radius:8px;height:6px;margin-bottom:24px;overflow:hidden}.progress-fill{background:linear-gradient(90deg,#2874a6,#3a90c0);height:100%;border-radius:8px;transition:width 0.5s}.score-tracker{position:fixed;top:12px;right:60px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:8px 16px;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,0.08);display:flex;align-items:center;gap:8px;font-size:14px}.score-label{color:var(--rdx-text-muted,#64748b);font-size:12px}.score-value{font-weight:700;color:var(--rdx-teal,#2874a6);font-size:18px}.difficulty-panel{text-align:center;margin-bottom:20px}.diff-btn{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:500;color:var(--rdx-text-muted,#64748b);transition:all 0.2s}.diff-btn.active{background:var(--rdx-teal,#2874a6);color:#fff;border-color:var(--rdx-teal,#2874a6)}.diff-btn:hover{border-color:var(--rdx-teal,#2874a6)}.scene-title{font-family:var(--rdx-font-serif);font-size:1.6rem;color:var(--rdx-teal-dark,#1f5f8b);margin-bottom:16px}.narrative{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:20px;margin-bottom:16px;line-height:1.7}.narrative .highlight{background:rgba(40,116,166,0.1);padding:2px 6px;border-radius:4px;font-weight:600}.narrative .critical{background:rgba(220,38,38,0.1);color:#dc2626;padding:2px 6px;border-radius:4px;font-weight:600}.vital-signs{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin:12px 0;padding:12px;background:rgba(40,116,166,0.04);border-radius:8px;border:1px solid rgba(40,116,166,0.1)}.vital-item{text-align:center;font-size:13px}.vital-item .label{color:var(--rdx-text-muted,#64748b);font-size:11px;display:block}.vital-item .value{font-weight:700;color:var(--rdx-teal-dark,#1f5f8b)}.socratic-prompt{background:linear-gradient(135deg,rgba(124,58,237,0.06),rgba(40,116,166,0.06));border:1px solid rgba(124,58,237,0.15);border-radius:12px;padding:16px 20px;margin:16px 0}.socratic-prompt h4{color:var(--rdx-purple,#7c3aed);font-size:0.95rem;margin-bottom:8px}.hint-box{background:rgba(217,119,6,0.06);border:1px solid rgba(217,119,6,0.15);border-radius:8px;padding:12px;margin:8px 0;font-size:0.9rem;color:#92400e;display:none}.options-grid{display:grid;gap:10px;margin:16px 0}.option-btn{background:var(--rdx-bg-card,#fff);border:2px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:14px 18px;cursor:pointer;text-align:left;font-size:14px;transition:all 0.2s;font-family:var(--rdx-font)}.option-btn:hover{border-color:var(--rdx-teal,#2874a6);background:rgba(40,116,166,0.03)}.option-btn.correct{border-color:#16a34a;background:rgba(22,163,74,0.06)}.option-btn.incorrect{border-color:#dc2626;background:rgba(220,38,38,0.04)}.option-btn.disabled{pointer-events:none;opacity:0.7}.explanation-box{border-radius:12px;padding:16px;margin:12px 0;display:none}.explanation-box.correct{background:rgba(22,163,74,0.06);border:1px solid rgba(22,163,74,0.2)}.explanation-box.incorrect{background:rgba(220,38,38,0.04);border:1px solid rgba(220,38,38,0.15)}.mechanism-box{background:linear-gradient(135deg,rgba(40,116,166,0.06),rgba(40,116,166,0.02));border:1px solid rgba(40,116,166,0.15);border-radius:12px;padding:20px;margin:16px 0}.mechanism-title{color:var(--rdx-teal-dark,#1f5f8b);font-weight:700;font-size:0.95rem;margin-bottom:10px}.pathway{line-height:1.8;font-size:0.93rem;color:var(--rdx-text,#1e293b)}.why-chain{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:12px;margin:8px 0}.why-q{font-weight:600;color:var(--rdx-purple,#7c3aed);cursor:pointer;font-size:0.9rem}.why-a{display:none;margin-top:6px;font-size:0.88rem;color:var(--rdx-text-muted,#64748b)}.next-btn{background:linear-gradient(135deg,#1f5f8b,#2874a6);color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:600;cursor:pointer;margin:20px 0;display:none;font-family:var(--rdx-font)}.next-btn:hover{opacity:0.9;transform:translateY(-1px)}.completion-card{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:16px;padding:32px;text-align:center;margin:24px 0}.completion-card h2{font-family:var(--rdx-font-serif);color:var(--rdx-teal-dark,#1f5f8b);margin-bottom:12px}.references-panel{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:16px;margin:20px 0}.references-panel a{display:block;color:var(--rdx-teal,#2874a6);font-size:13px;margin:4px 0;text-decoration:none;word-break:break-all}.references-panel a:hover{text-decoration:underline}.rdx-crossplatform-nav{background:var(--rdx-bg-card,#f8fafc);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:20px;margin:24px 0}.rdx-crossplatform-nav h4{color:var(--rdx-text-muted,#64748b);margin-bottom:12px;font-size:0.9rem}.rdx-crossplatform-links{display:flex;gap:12px;flex-wrap:wrap}.rdx-crossplatform-link{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:12px 16px;text-decoration:none;color:var(--rdx-text,#1e293b);font-size:13px;font-weight:500;transition:all 0.2s}.rdx-crossplatform-link:hover{background:rgba(40,116,166,0.05);transform:translateY(-2px)}@media(max-width:640px){.score-tracker{top:auto;bottom:12px;right:12px}.container{padding:12px}.vital-signs{grid-template-columns:repeat(3,1fr)}}

<script>
let currentStage=0,score=0,difficulty='standard';
const stages=[
{
    title:"The Presenting Patient",
    content:`<div class="narrative"><p>8-month-old in winter with rhinorrhea × 3 days, then wheezing, tachypnea, retractions.</p><div class="vital-signs"><div class="vital-item"><span class="label">HR</span><span class="value">160</span></div><div class="vital-item"><span class="label">Temp</span><span class="value">38.3°C</span></div><div class="vital-item"><span class="label">RR</span><span class="value">56</span></div><div class="vital-item"><span class="label">SpO2</span><span class="value">90%</span></div></div></div>`,
    hint_beginner:"What organisms commonly cause this presentation?",
    hint_advanced:"Consider the RNA paramyxovirus classification and most likely pathogens for this clinical scenario.",
    question:{
        prompt:"Based on this presentation, which organism is most likely?",
        options:[{text:"RSV",correct:true,explanation:""},{text:"Consider the clinical clues carefully",correct:false,explanation:"The presentation is classic for RSV"},{text:"An atypical organism",correct:false,explanation:"While possible, the classic presentation points to RSV"},{text:"A viral pathogen",correct:false,explanation:"The clinical features suggest a bacterial/fungal/parasitic etiology."}],
        explanation:{correct:"Correct! This is a classic presentation for RSV. Key clues in the history and exam guide you toward this organism.",incorrect:"The clinical presentation is classic for RSV. Review the key features that distinguish this organism."},
        teaching:`<div class="mechanism-box"><div class="mechanism-title">📋 RSV — Key Features</div><div class="pathway"><strong>Classification:</strong> RNA paramyxovirus<br><br><strong>Classic presentation:</strong> 8-month-old in winter with rhinorrhea × 3 days, then wheezing, tachypnea, retractions.<br><br><strong>Key diseases:</strong> Bronchiolitis (#1 cause in infants), pneumonia, croup. Elderly/immunocompromised: LRTI</div></div>`,
        why_chain:[{q:"Why is this organism likely in this setting?",a:"The clinical scenario, patient demographics, and risk factors are classic for RSV. Key identifying features include the RNA paramyxovirus classification and typical disease manifestations."}],
        points:10
    }
},
{
    title:"Laboratory Identification",
    content:`<div class="narrative"><p>Specimens are sent to the lab. The microbiology report describes: <span class="highlight">RNA paramyxovirus</span>.</p><div class="socratic-prompt"><h4>Organism Identification</h4><p>Lab features: PCR (gold standard), rapid antigen. Syncytial formation in culture. Winter seasonality</p></div></div>`,
    hint_beginner:"What lab tests distinguish this organism from similar ones?",
    hint_advanced:"Consider the specific biochemical and culture characteristics that are pathognomonic.",
    question:{
        prompt:"Why is it called respiratory syncytial virus?",
        options:[{text:"Gram stain morphology alone",correct:false,explanation:"Gram stain narrows the differential but additional tests are needed."},{text:"Forms multinucleated syncytia (fused giant cells) in cell culture",correct:true,explanation:""},{text:"Clinical presentation only",correct:false,explanation:"Lab confirmation is essential for definitive identification."},{text:"Blood culture growth pattern",correct:false,explanation:"Growth pattern helps but specific biochemical tests are more definitive."}],
        explanation:{correct:"Correct! Forms multinucleated syncytia (fused giant cells) in cell culture is the key distinguishing test for RSV.",incorrect:"The definitive identification relies on: Forms multinucleated syncytia (fused giant cells) in cell culture. Remember: PCR (gold standard), rapid antigen. Syncytial formation in culture. Winter seasonality"},
        teaching:`<div class="mechanism-box"><div class="mechanism-title">📋 Identifying RSV</div><div class="pathway"><strong>Gram stain:</strong> RNA paramyxovirus<br><br><strong>Key identification:</strong> PCR (gold standard), rapid antigen. Syncytial formation in culture. Winter seasonality<br><br><strong>Definitive test:</strong> Forms multinucleated syncytia (fused giant cells) in cell culture</div></div>`,
        why_chain:[{q:"What other organisms look similar on Gram stain?",a:"Several organisms share the RNA paramyxovirus morphology. The specific biochemical tests (Forms multinucleated syncytia (fused giant cells) in cell culture) are what differentiate RSV from its look-alikes."}],
        points:10
    }
},
{
    title:"Virulence & Pathogenesis",
    content:`<div class="narrative"><p>Understanding how RSV causes disease is critical for both diagnosis and treatment.</p><div class="socratic-prompt"><h4>Virulence Factors</h4><p>F protein (fusion — syncytia formation, target of monoclonal antibodies), G protein (attachment)</p></div></div>`,
    hint_beginner:"Which virulence factor is the most important for causing disease?",
    hint_advanced:"Consider how each virulence factor contributes to immune evasion, tissue damage, or toxin production.",
    question:{
        prompt:"Target of palivizumab/nirsevimab?",
        options:[{text:"Iron acquisition systems",correct:false,explanation:"Siderophores help with growth but are not the most important virulence factor."},{text:"Biofilm formation",correct:false,explanation:"Biofilm contributes to persistence but is not the primary virulence factor here."},{text:"F (fusion) protein — antibodies prevent viral cell-to-cell fusion and entry",correct:true,explanation:""},{text:"Endotoxin/LPS",correct:false,explanation:"While important in gram-negatives, this is not the key factor for this question."}],
        explanation:{correct:"Correct! F (fusion) protein — antibodies prevent viral cell-to-cell fusion and entry is the critical virulence factor.",incorrect:"The key virulence factor is: F (fusion) protein — antibodies prevent viral cell-to-cell fusion and entry. This drives the pathogenesis of disease caused by RSV."},
        teaching:`<div class="mechanism-box"><div class="mechanism-title">📋 RSV Virulence Factors</div><div class="pathway"><strong>Key virulence factors:</strong><br>F protein (fusion — syncytia formation, target of monoclonal antibodies), G protein (attachment)<br><br><strong>Most important:</strong> F (fusion) protein — antibodies prevent viral cell-to-cell fusion and entry</div></div>`,
        why_chain:[{q:"How does this virulence factor help the organism evade the immune system?",a:"F (fusion) protein — antibodies prevent viral cell-to-cell fusion and entry — this factor is critical because it directly impacts the organism's ability to establish and maintain infection."}],
        points:10
    }
},
{
    title:"Empiric Treatment",
    content:`<div class="narrative"><p>With RSV identified, you need to initiate appropriate antimicrobial therapy.</p><div class="socratic-prompt"><h4>Treatment Selection</h4><p>Current guidelines: Supportive: O2, hydration, suctioning. NO bronchodilators/steroids for bronchiolitis. Ribavirin rarely used</p></div></div>`,
    hint_beginner:"What is the first-line treatment for this organism?",
    hint_advanced:"Consider mechanism of action, spectrum, and potential resistance patterns when selecting therapy.",
    question:{
        prompt:"Why no bronchodilators for RSV bronchiolitis?",
        options:[{text:"Observation without antibiotics",correct:false,explanation:"This infection requires antimicrobial treatment."},{text:"Broad-spectrum carbapenem",correct:false,explanation:"Carbapenems may be appropriate for resistant strains but are not first-line for routine infections."},{text:"Combination therapy with 3 agents",correct:false,explanation:"Multi-drug regimens are reserved for specific situations (TB, endocarditis)."},{text:"Studies show no consistent benefit — airway obstruction is from inflammation and mucus, not bronchospasm",correct:true,explanation:""}],
        explanation:{correct:"Correct! Studies show no consistent benefit — airway obstruction is from inflammation and mucus, not bronchospasm is the appropriate treatment approach.",incorrect:"First-line treatment: Studies show no consistent benefit — airway obstruction is from inflammation and mucus, not bronchospasm. Guidelines recommend: Supportive: O2, hydration, suctioning. NO bronchodilators/steroids for bronchiolitis. Ribavirin rarely used"},
        teaching:`<div class="mechanism-box"><div class="mechanism-title">📋 Treating RSV</div><div class="pathway"><strong>Treatment summary:</strong><br>Supportive: O2, hydration, suctioning. NO bronchodilators/steroids for bronchiolitis. Ribavirin rarely used<br><br><strong>First-line:</strong> Studies show no consistent benefit — airway obstruction is from inflammation and mucus, not bronchospasm</div></div>`,
        why_chain:[{q:"Why this specific antibiotic choice?",a:"The treatment selection is based on the organism's susceptibility profile, the site of infection, and current guideline recommendations. Studies show no consistent benefit — airway obstruction is from inflammation and mucus, not bronchospasm"}],
        points:10
    }
},
{
    title:"Resistance & Treatment Failure",
    content:`<div class="narrative"><p>The patient is not improving after 48 hours. You need to consider resistance mechanisms.</p><div class="socratic-prompt"><h4>Resistance Patterns</h4><p>N/A — antivirals rarely used. Ribavirin limited benefit</p></div></div>`,
    hint_beginner:"What resistance mechanisms does this organism use?",
    hint_advanced:"Think about the molecular mechanisms: altered targets, enzyme production, efflux, permeability changes.",
    question:{
        prompt:"Why is supportive care the mainstay?",
        options:[{text:"No effective antiviral; the disease is self-limited and immune-mediated. Good supportive care is sufficient",correct:true,explanation:""},{text:"Spontaneous clearance of infection",correct:false,explanation:"Resistance, not resolution, is the concern when treatment fails."},{text:"Drug-drug interaction reducing levels",correct:false,explanation:"Pharmacokinetic issues should be considered but organism resistance is the primary concern."},{text:"Patient non-compliance only",correct:false,explanation:"While adherence matters, understanding organism resistance is critical."}],
        explanation:{correct:"Correct! No effective antiviral; the disease is self-limited and immune-mediated. Good supportive care is sufficient",incorrect:"Key resistance mechanism: No effective antiviral; the disease is self-limited and immune-mediated. Good supportive care is sufficient. Full resistance profile: N/A — antivirals rarely used. Ribavirin limited benefit"},
        teaching:`<div class="mechanism-box"><div class="mechanism-title">📋 RSV Resistance</div><div class="pathway"><strong>Resistance mechanisms:</strong><br>N/A — antivirals rarely used. Ribavirin limited benefit<br><br><strong>Key mechanism:</strong> No effective antiviral; the disease is self-limited and immune-mediated. Good supportive care is sufficient</div></div>`,
        why_chain:[{q:"How does this resistance mechanism work at the molecular level?",a:"No effective antiviral; the disease is self-limited and immune-mediated. Good supportive care is sufficient — understanding this mechanism guides selection of alternative antibiotics that bypass the resistance."}],
        points:10
    }
},
{
    title:"Prevention & Stewardship",
    content:`<div class="narrative"><p>After successful treatment, you discuss prevention strategies with the patient and team.</p><div class="socratic-prompt"><h4>Prevention Strategies</h4><p>Nirsevimab (long-acting mAb for all infants). Palivizumab for high-risk. Maternal RSV vaccine (Abrysvo)</p></div></div>`,
    hint_beginner:"What prevention strategies are available?",
    hint_advanced:"Consider vaccines, prophylaxis, infection control measures, and antimicrobial stewardship.",
    question:{
        prompt:"New prevention paradigm?",
        options:[{text:"No prevention measures exist",correct:false,explanation:"Multiple prevention strategies are available for this organism."},{text:"Nirsevimab (single injection) for ALL infants + maternal RSV vaccine (Abrysvo) during pregnancy",correct:true,explanation:""},{text:"Patient isolation for life",correct:false,explanation:"Isolation is not necessary for most resolved infections."},{text:"Universal prophylactic antibiotics",correct:false,explanation:"Universal prophylaxis promotes resistance and is not recommended."}],
        explanation:{correct:"Correct! Nirsevimab (single injection) for ALL infants + maternal RSV vaccine (Abrysvo) during pregnancy",incorrect:"Prevention: Nirsevimab (single injection) for ALL infants + maternal RSV vaccine (Abrysvo) during pregnancy. Comprehensive approach: Nirsevimab (long-acting mAb for all infants). Palivizumab for high-risk. Maternal RSV vaccine (Abrysvo)"},
        teaching:`<div class="mechanism-box"><div class="mechanism-title">📋 Preventing RSV Infections</div><div class="pathway"><strong>Prevention strategies:</strong><br>Nirsevimab (long-acting mAb for all infants). Palivizumab for high-risk. Maternal RSV vaccine (Abrysvo)<br><br><strong>Key measure:</strong> Nirsevimab (single injection) for ALL infants + maternal RSV vaccine (Abrysvo) during pregnancy</div></div>`,
        why_chain:[{q:"What is the role of antimicrobial stewardship?",a:"Appropriate antibiotic use, avoiding unnecessary broad-spectrum agents, and de-escalating therapy when possible all help prevent resistance development in RSV and other organisms."}],
        points:10
    }
}];
document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hb=document.querySelector('.hint-box');if(hb)hb.style.display=d==='beginner'?'block':'none'}
function toggleReferences(){const c=document.getElementById('referencesContent');const t=document.getElementById('refToggle');if(c.style.display==='none'){c.style.display='block';t.textContent='\u25BE'}else{c.style.display='none';t.textContent='\u25B8'}}
function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100);document.getElementById('progress').style.width=pct+'%';let h='<h2 class="scene-title">'+st.title+'</h2>';h+='<div class="scene-content">'+st.content+'</div>';if(st.hint_beginner)h+='<div class="hint-box" id="hint-box"'+(difficulty==='beginner'?' style="display:block"':'')+'>\ud83d\udca1 '+st.hint_beginner+'</div>';if(difficulty==='advanced'&&st.hint_advanced)h+='<div class="hint-box" style="display:block;background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.15);color:#5b21b6">\ud83c\udf93 '+st.hint_advanced+'</div>';if(st.question){h+='<div class="socratic-prompt"><h4>Clinical Question</h4><p>'+st.question.prompt+'</p></div>';h+='<div class="options-grid" id="options-'+idx+'">';st.question.options.forEach((opt,oi)=>{h+='<button class="option-btn" id="option-'+idx+'-'+oi+'" onclick="checkAnswer('+idx+','+oi+')">'+String.fromCharCode(65+oi)+'. '+opt.text+'</button>'});h+='</div>';h+='<div class="explanation-box" id="explain-'+idx+'"></div>';h+='<div id="teaching-'+idx+'" style="display:none">'+st.question.teaching+'</div>';if(st.question.why_chain&&st.question.why_chain.length>0){h+='<div id="why-'+idx+'" style="display:none">';st.question.why_chain.forEach((wc,wi)=>{h+='<div class="why-chain"><div class="why-q" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">\ud83d\udd0d '+wc.q+'</div><div class="why-a">'+wc.a+'</div></div>'});h+='</div>'}}h+='<button class="next-btn" id="next-'+idx+'" onclick="nextStage()">Continue \u2192</button>';document.getElementById('scene-container').innerHTML=h}
function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll('#options-'+si+' .option-btn').forEach((b,i)=>{b.classList.add('disabled');if(st.question.options[i].correct)b.classList.add('correct');if(i===oi&&!opt.correct)b.classList.add('incorrect')});const eb=document.getElementById('explain-'+si);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;eb.className='explanation-box correct';eb.innerHTML='<strong>\u2713 Correct!</strong> '+st.question.explanation.correct}else{eb.className='explanation-box incorrect';eb.innerHTML='<strong>\u2717 Not quite.</strong> '+st.question.explanation.incorrect}eb.style.display='block';document.getElementById('teaching-'+si).style.display='block';const why=document.getElementById('why-'+si);if(why)why.style.display='block';document.getElementById('next-'+si).style.display='inline-block'}
function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let lvl='Developing';if(pct>=90)lvl='Mastery';else if(pct>=70)lvl='Proficient';else if(pct>=50)lvl='Competent';document.getElementById('scene-container').innerHTML='<div class="completion-card"><h2>\ud83c\udf89 Case Complete!</h2><p style="font-size:2rem;font-weight:700;color:var(--rdx-teal,#2874a6)">'+pct+'%</p><p style="color:var(--rdx-text-muted,#64748b)">Score: '+score+'/'+mx+'</p><p style="margin:12px 0;font-weight:600">Level: '+lvl+'</p><div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="../adventure-hub.html" style="padding:10px 20px;background:var(--rdx-teal,#2874a6);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">More Cases</a><a href="../tools/learning-dashboard.html" style="padding:10px 20px;background:var(--rdx-purple,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">\ud83d\udcca Dashboard</a><button onclick="currentStage=0;score=0;document.getElementById(\'score\').textContent=0;renderStage(0)" style="padding:10px 20px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;cursor:pointer;font-weight:600">\ud83d\udd04 Retry</button></div></div>';try{const progress=JSON.parse(localStorage.getItem('reasondx-progress')||'{}'  );if(!progress.cases)progress.cases={};progress.cases['rsv']=Math.max(progress.cases['rsv']||0,pct);localStorage.setItem('reasondx-progress',JSON.stringify(progress))}catch(e){}}
renderStage(0);
</script>
