<script>
let currentStage=0,score=0,maxScore=0,difficulty='standard',answeredQuestions=new Set(),decisionPath=[];
const stages=[
{title:"The Tremulous Patient",content:`<div class="narrative"><p>52-year-old man admitted for elective surgery. Last drink was 18 hours ago. He drinks "a pint of vodka daily" for 15 years.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 108, BP 158/96, T 99.2F, RR 20<br><strong>Exam:</strong> Tremulous, diaphoretic, anxious, oriented but easily startled<br><strong>Labs:</strong> Normal except mild transaminitis</p></div><div class="socratic-prompt"><h4>Recognize Early Withdrawal</h4><p>What stage of alcohol withdrawal is this, and when do symptoms typically begin?</p></div>`,
hint_beginner:"Early withdrawal = autonomic hyperactivity (tremor, tachycardia, hypertension)",hint_advanced:"What determines withdrawal severity?",
question:{prompt:"This patient 18 hours after last drink. What stage of withdrawal?",
options:[{text:"Early/mild withdrawal - tremor, anxiety, tachycardia, hypertension, diaphoresis begin 6-24 hours after last drink; this is the autonomic hyperactivity phase",correct:true},
{text:"Delirium tremens - this is the worst stage",correct:false},
{text:"Too early for withdrawal",correct:false},
{text:"This is intoxication, not withdrawal",correct:false}],
explanation:{correct:"Early withdrawal (6-24h): tremor, anxiety, tachycardia, hypertension, diaphoresis, insomnia. This is CNS hyperexcitability from loss of GABA inhibition. Can progress to seizures (12-48h) and DTs (48-96h) if untreated.",incorrect:"This is early withdrawal - the autonomic hyperactivity phase. Symptoms begin 6-24 hours after last drink. DTs occur later (48-96h) and include hallucinations and severe confusion."},
teaching:`<h4>Alcohol Withdrawal Timeline</h4><p><strong>6-24 hours:</strong> Tremor, anxiety, tachycardia, diaphoresis</p><p><strong>12-48 hours:</strong> Withdrawal seizures (peak 24h)</p><p><strong>12-48 hours:</strong> Alcoholic hallucinosis</p><p><strong>48-96 hours:</strong> Delirium tremens (DTs)</p>`,
why_chain:[{q:"What determines withdrawal severity?",a:"Duration and amount of drinking, prior withdrawal episodes (kindling), comorbidities, concurrent illness. Prior DTs or seizures predict more severe withdrawal."}],points:10}},

{title:"Pathophysiology",content:`<div class="narrative"><p>Understand why withdrawal occurs.</p></div><div class="socratic-prompt"><h4>Mechanism Matters</h4><p>What is the pathophysiology of alcohol withdrawal?</p></div>`,
hint_beginner:"Alcohol enhances GABA, inhibits glutamate - chronic use causes adaptation",hint_advanced:"What is the kindling phenomenon?",
question:{prompt:"What causes alcohol withdrawal symptoms?",
options:[{text:"Chronic alcohol enhances GABA and inhibits NMDA glutamate receptors; brain adapts by downregulating GABA and upregulating glutamate; when alcohol removed, CNS hyperexcitability results",correct:true},
{text:"Direct toxic effect of alcohol",correct:false},
{text:"Liver failure causes symptoms",correct:false},
{text:"Dehydration is the main cause",correct:false}],
explanation:{correct:"Alcohol: enhances GABA (inhibitory), inhibits NMDA (excitatory). Chronic use → brain compensates by reducing GABA receptors and increasing glutamate receptors. When alcohol stops → insufficient inhibition + excess excitation = seizures, autonomic instability.",incorrect:"Withdrawal is CNS hyperexcitability from neuroadaptation to chronic alcohol. Not direct toxicity or dehydration. Understanding mechanism guides treatment (enhance GABA with benzos)."},
teaching:`<h4>Withdrawal Pathophysiology</h4><p><strong>Alcohol effect:</strong> ↑GABA (inhibition), ↓NMDA (excitation)</p><p><strong>Adaptation:</strong> ↓GABA receptors, ↑glutamate receptors</p><p><strong>Withdrawal:</strong> Remove alcohol → unopposed excitation</p><p><strong>Treatment target:</strong> Replace GABA effect with benzodiazepines</p>`,
why_chain:[{q:"What is kindling?",a:"Each withdrawal episode sensitizes the brain to future withdrawal. Repeated withdrawals become progressively more severe. Someone with prior DTs is at very high risk for DTs again."}],points:10}},

{title:"Risk Assessment",content:`<div class="narrative"><p>Assess this patient's risk for severe withdrawal.</p></div><div class="socratic-prompt"><h4>Predict Severity</h4><p>What factors predict severe alcohol withdrawal or DTs?</p></div>`,
hint_beginner:"Prior seizures/DTs, heavy prolonged use, concurrent illness",hint_advanced:"What is the PAWSS score?",
question:{prompt:"What factors predict severe withdrawal?",
options:[{text:"Prior withdrawal seizures or DTs (strongest predictor), heavy prolonged use, concurrent medical illness, older age, abnormal liver function, low platelets",correct:true},
{text:"Only the amount of daily drinking matters",correct:false},
{text:"Age is the only predictor",correct:false},
{text:"All alcoholics have equal risk",correct:false}],
explanation:{correct:"Risk factors for severe withdrawal/DTs: prior seizures or DTs (strongest - kindling), heavy prolonged use, concurrent illness (infection, trauma, surgery), older age, abnormal LFTs, thrombocytopenia. CIWA and PAWSS help assess.",incorrect:"Prior withdrawal history is the strongest predictor. Multiple factors contribute. Assessment tools (CIWA, PAWSS) help standardize risk evaluation."},
teaching:`<h4>Risk Factors for Severe Withdrawal</h4><p><strong>Prior DTs or seizures</strong> (strongest predictor)</p><p><strong>Heavy, prolonged use</strong> (>8 drinks/day, >10 years)</p><p><strong>Concurrent illness</strong> (infection, surgery, trauma)</p><p><strong>Older age</strong></p><p><strong>Labs:</strong> Abnormal LFTs, low platelets, low K/Mg</p>`,
why_chain:[{q:"What is CIWA-Ar?",a:"Clinical Institute Withdrawal Assessment - revised. 10-item scale scoring withdrawal severity (0-67). Guides symptom-triggered therapy. Score >15 = moderate-severe withdrawal needing treatment."}],points:10}},

{title:"First-Line Treatment",content:`<div class="narrative"><p>Patient has CIWA score of 18 (moderate withdrawal). Choose treatment.</p></div><div class="socratic-prompt"><h4>Benzodiazepine Selection</h4><p>What is first-line treatment for alcohol withdrawal?</p></div>`,
hint_beginner:"Benzodiazepines are first-line - they enhance GABA",hint_advanced:"Which benzo for liver disease?",
question:{prompt:"What is first-line treatment for alcohol withdrawal?",
options:[{text:"Benzodiazepines - enhance GABA to replace alcohol's effect; long-acting (diazepam, chlordiazepoxide) preferred for smooth taper; lorazepam if liver disease (no hepatic metabolism)",correct:true},
{text:"Antipsychotics are first-line",correct:false},
{text:"Beta-blockers control withdrawal",correct:false},
{text:"Phenobarbital only",correct:false}],
explanation:{correct:"Benzos are first-line: cross-tolerant with alcohol at GABA receptor, prevent seizures, reduce DT risk. Long-acting (diazepam, chlordiazepoxide) provide smoother course. Lorazepam/oxazepam for liver disease (glucuronidation, not oxidation).",incorrect:"Benzodiazepines are the cornerstone - they address the pathophysiology (GABA deficiency). Antipsychotics lower seizure threshold. Beta-blockers only treat symptoms, not underlying withdrawal."},
teaching:`<h4>Benzodiazepine Selection</h4><p><strong>Long-acting (preferred):</strong> Diazepam, chlordiazepoxide - smooth taper</p><p><strong>Liver disease:</strong> Lorazepam, oxazepam (LOT - Lorazepam, Oxazepam, Temazepam)</p><p><strong>Why long-acting:</strong> Self-tapering, less breakthrough symptoms</p><p><strong>Dosing:</strong> Symptom-triggered (CIWA) or fixed schedule + PRN</p>`,
why_chain:[{q:"Why lorazepam in liver disease?",a:"Lorazepam and oxazepam are metabolized by glucuronidation (Phase II), which is preserved even in severe liver disease. Diazepam requires oxidation (Phase I), which is impaired in liver disease."}],points:15}},

{title:"Dosing Strategy",content:`<div class="narrative"><p>Decide on dosing approach.</p></div><div class="socratic-prompt"><h4>Symptom-Triggered vs Fixed</h4><p>What are the dosing strategies for alcohol withdrawal?</p></div>`,
hint_beginner:"Symptom-triggered uses CIWA scores to guide dosing",hint_advanced:"When is fixed-schedule preferred?",
question:{prompt:"What dosing strategy should you use?",
options:[{text:"Symptom-triggered (CIWA-based) preferred in monitored settings - give benzos when CIWA >8-10; reduces total benzo dose and duration; fixed schedule if unable to assess reliably",correct:true},
{text:"Always use fixed schedule",correct:false},
{text:"Give benzos only when requested",correct:false},
{text:"Same dose for everyone",correct:false}],
explanation:{correct:"Symptom-triggered (CIWA-guided): Give benzos when CIWA >8-10, reassess hourly. Studies show less total medication, shorter treatment, fewer complications. Fixed schedule + PRN for: ICU, intubated, unable to assess (dementia, psychosis).",incorrect:"Symptom-triggered is evidence-based and preferred when reliable assessment is possible. Fixed schedule for patients who can't be assessed reliably."},
teaching:`<h4>Dosing Strategies</h4><p><strong>Symptom-triggered:</strong> CIWA q1-2h, treat if >8-10</p><p><strong>Advantages:</strong> Less medication, shorter course, individualized</p><p><strong>Fixed schedule:</strong> Scheduled doses + PRN; use if can't assess</p><p><strong>Front-loading:</strong> Large initial doses for severe withdrawal</p>`,
why_chain:[{q:"What is front-loading?",a:"Give large doses of long-acting benzo (diazepam 10-20mg q1-2h) until calm, then let it self-taper. Used for severe withdrawal. Requires close monitoring but can prevent escalation to DTs."}],points:10}},

{title:"Withdrawal Seizures",content:`<div class="narrative"><p>Day 2: Patient has a generalized tonic-clonic seizure lasting 90 seconds, self-resolves.</p></div><div class="socratic-prompt"><h4>Manage Seizures</h4><p>How do you manage alcohol withdrawal seizures?</p></div>`,
hint_beginner:"Most are self-limited; treat with benzos, not phenytoin",hint_advanced:"Why doesn't phenytoin work for withdrawal seizures?",
question:{prompt:"How do you manage this withdrawal seizure?",
options:[{text:"IV benzodiazepine (lorazepam 2-4mg) - prevents recurrence; phenytoin does NOT prevent alcohol withdrawal seizures; most are brief and self-limited but 1/3 will have another within 6 hours",correct:true},
{text:"Load with phenytoin",correct:false},
{text:"No treatment needed if seizure stopped",correct:false},
{text:"Start valproate immediately",correct:false}],
explanation:{correct:"Withdrawal seizures: usually brief, generalized, self-limited. Treat with IV benzo (lorazepam) to prevent recurrence - 1/3 will seize again within 6 hours. Phenytoin does NOT prevent withdrawal seizures (different mechanism). Continue aggressive benzo dosing.",incorrect:"Benzos are the treatment - they address the underlying GABA deficiency. Phenytoin is ineffective for withdrawal seizures (works on sodium channels, not GABA). Must continue benzos to prevent recurrence."},
teaching:`<h4>Withdrawal Seizures</h4><p><strong>Timing:</strong> 12-48 hours (peak 24h)</p><p><strong>Character:</strong> Usually generalized, brief, self-limited</p><p><strong>Treatment:</strong> IV benzodiazepine</p><p><strong>Phenytoin:</strong> Does NOT prevent withdrawal seizures</p><p><strong>Risk:</strong> 1/3 have recurrent seizure within 6 hours</p>`,
why_chain:[{q:"Why doesn't phenytoin work?",a:"Withdrawal seizures are from GABA deficiency/glutamate excess, not abnormal sodium channels. Phenytoin blocks sodium channels - ineffective for withdrawal. Benzos directly enhance GABA, addressing the root cause."}],points:15}},

{title:"Delirium Tremens",content:`<div class="narrative"><p>Day 3: Patient becomes severely agitated, disoriented, seeing "bugs crawling on walls," T 102F, HR 140, BP 180/110, profusely diaphoretic.</p></div><div class="socratic-prompt"><h4>Recognize DTs</h4><p>What are the features of delirium tremens, and how do you manage it?</p></div>`,
hint_beginner:"DTs = confusion + hallucinations + severe autonomic instability",hint_advanced:"What is the mortality of untreated DTs?",
question:{prompt:"This presentation is consistent with:",
options:[{text:"Delirium tremens - hallucinations (visual), profound confusion, severe autonomic instability (fever, tachycardia, hypertension, diaphoresis); occurs 48-96h; mortality 5-15% even with treatment",correct:true},
{text:"Simple withdrawal - same as early stage",correct:false},
{text:"Alcoholic hallucinosis only",correct:false},
{text:"Infection is the cause",correct:false}],
explanation:{correct:"DTs: hallucinations (classically visual - bugs, animals), global confusion, severe autonomic instability. Peak 48-96 hours. Life-threatening - mortality 5-15% with treatment, higher without. Requires ICU, aggressive benzos, supportive care.",incorrect:"DTs is severe withdrawal with hallucinations, confusion, and autonomic instability. Different from alcoholic hallucinosis (hallucinations with clear sensorium). Medical emergency requiring ICU care."},
teaching:`<h4>Delirium Tremens</h4><p><strong>Timing:</strong> 48-96 hours after last drink</p><p><strong>Features:</strong> Hallucinations (visual), confusion, autonomic storm</p><p><strong>Mortality:</strong> 5-15% with treatment</p><p><strong>Management:</strong> ICU, high-dose benzos, supportive care</p><p><strong>Complications:</strong> Hyperthermia, arrhythmias, aspiration, rhabdo</p>`,
why_chain:[{q:"How much benzo for DTs?",a:"Often requires massive doses - hundreds of mg of diazepam equivalent. If refractory to benzos, add phenobarbital or propofol/dexmedetomidine. No upper limit - dose to effect."}],points:15}},

{title:"Adjunctive Therapies",content:`<div class="narrative"><p>What other treatments are important in alcohol withdrawal?</p></div><div class="socratic-prompt"><h4>Supportive Care</h4><p>What adjunctive therapies are indicated?</p></div>`,
hint_beginner:"Thiamine prevents Wernicke's; replace electrolytes",hint_advanced:"Why give thiamine before glucose?",
question:{prompt:"What adjunctive therapies are essential?",
options:[{text:"Thiamine (before glucose to prevent Wernicke's), folate, electrolyte replacement (K, Mg, Phos), IV fluids, multivitamins; avoid antipsychotics in early withdrawal (lower seizure threshold)",correct:true},
{text:"Antipsychotics first for agitation",correct:false},
{text:"No vitamins needed",correct:false},
{text:"Fluid restriction recommended",correct:false}],
explanation:{correct:"Thiamine 100-500mg IV/IM before glucose (glucose metabolism consumes thiamine, can precipitate Wernicke's). Replace K, Mg (often depleted). Folate. IV fluids for dehydration. Avoid antipsychotics early (lower seizure threshold) - can use later for DT hallucinations if benzos adequate.",incorrect:"Thiamine is critical to prevent Wernicke encephalopathy. Give BEFORE glucose. Electrolyte replacement essential. Antipsychotics should be used cautiously and only after adequate benzo loading."},
teaching:`<h4>Adjunctive Therapies</h4><p><strong>Thiamine:</strong> 100-500mg IV BEFORE glucose (prevents Wernicke's)</p><p><strong>Electrolytes:</strong> Replace K, Mg, Phos (commonly depleted)</p><p><strong>Folate:</strong> 1mg daily</p><p><strong>Fluids:</strong> Correct dehydration</p><p><strong>Antipsychotics:</strong> Only after adequate benzos, for persistent hallucinations</p>`,
why_chain:[{q:"Why thiamine before glucose?",a:"Thiamine is cofactor for glucose metabolism. In depleted patient, glucose infusion increases thiamine demand, can precipitate acute Wernicke encephalopathy (confusion, ataxia, ophthalmoplegia). Always give thiamine first."}],points:10}},

{title:"Case Synthesis",content:`<div class="narrative"><p>Patient transferred to ICU, received high-dose benzodiazepines, IV thiamine, electrolyte replacement. DTs resolved over 72 hours. Discharged with addiction medicine follow-up.</p></div><div class="socratic-prompt"><h4>Key Principles</h4><p>What are the essential principles of alcohol withdrawal management?</p></div>`,
hint_beginner:"Recognize early, benzos are cornerstone, thiamine, monitor for DTs",hint_advanced:"What's the role of phenobarbital?",
question:{prompt:"What are the key alcohol withdrawal principles?",
options:[{text:"Recognize early, risk-stratify (prior DTs/seizures), benzodiazepines are cornerstone (symptom-triggered preferred), thiamine before glucose, phenytoin doesn't prevent seizures, DTs need ICU and aggressive treatment",correct:true},
{text:"All patients need same treatment",correct:false},
{text:"Phenytoin prevents seizures",correct:false},
{text:"Antipsychotics are first-line",correct:false}],
explanation:{correct:"Key principles: 1) Early recognition and risk stratification, 2) Benzos are first-line (address pathophysiology), 3) Symptom-triggered dosing preferred, 4) Thiamine before glucose, 5) Phenytoin doesn't work for withdrawal seizures, 6) DTs are medical emergency, 7) Replace electrolytes.",incorrect:"Benzodiazepines are the cornerstone - they replace alcohol's GABA effect. Individualize based on risk. Phenytoin is ineffective for withdrawal seizures. DTs require intensive care."},
teaching:`<h4>Alcohol Withdrawal Summary</h4><p>1. Recognize early withdrawal signs</p><p>2. Risk-stratify (prior DTs/seizures = high risk)</p><p>3. Benzodiazepines are first-line</p><p>4. Symptom-triggered (CIWA) preferred</p><p>5. Thiamine BEFORE glucose</p><p>6. Phenytoin does NOT prevent withdrawal seizures</p><p>7. DTs: ICU, high-dose benzos ± adjuncts</p>`,
why_chain:[{q:"What about phenobarbital?",a:"Phenobarbital is useful adjunct for benzo-refractory withdrawal. Also works on GABA. Can be used as primary agent in some protocols. Long half-life provides smooth coverage."}],points:10}}
];
function shuffleArray(a){const s=[...a];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s;}
function setDifficulty(l,b){difficulty=l;document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderStage(currentStage);}
function renderStage(i){
const s=stages[i],opts=shuffleArray(s.question.options.map((o,idx)=>({...o,idx}))),ltrs='ABCD';
let hints='';
if(difficulty==='beginner'&&s.hint_beginner)hints=`<div class="hint-beginner" style="display:block;">Hint: ${s.hint_beginner}</div>`;
else if(difficulty==='advanced'&&s.hint_advanced)hints=`<div class="hint-advanced" style="display:block;">Challenge: ${s.hint_advanced}</div>`;
const why=s.question.why_chain?`<div class="why-chain" id="why"><h4>WHY Chain</h4>${s.question.why_chain.map(w=>`<div class="why-item"><div class="why-q">Q: ${w.q}</div><div class="why-a">${w.a}</div></div>`).join('')}</div>`:'';
document.getElementById('progress').style.width=((i)/stages.length*100)+'%';
document.getElementById('scene-container').innerHTML=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${i+1} of ${stages.length}</div><div class="scene-title">${s.title}</div></div>${s.content}${hints}<div class="question-box"><div class="question-prompt">${s.question.prompt}</div><div class="mcq-options">${opts.map((o,j)=>`<div class="mcq-option" data-correct="${o.correct}" onclick="selectOption(this,${i})"><span class="option-letter">${ltrs[j]}</span><span class="option-text">${o.text}</span></div>`).join('')}</div><div class="feedback correct-feedback" id="fb-c"><div class="feedback-title">Correct!</div><div>${s.question.explanation.correct}</div></div><div class="feedback incorrect-feedback" id="fb-i"><div class="feedback-title">Not Quite</div><div>${s.question.explanation.incorrect}</div></div><div class="teaching-point" id="teach">${s.question.teaching}</div>${why}<button class="btn" id="next-btn" onclick="nextStage()">Continue</button></div></div>`;
}
function selectOption(el,i){
if(answeredQuestions.has(i))return;
const c=el.dataset.correct==='true',s=stages[i];
answeredQuestions.add(i);decisionPath.push({stage:s.title,correct:c,points:c?s.question.points:0});
if(c)score+=s.question.points;maxScore+=s.question.points;
document.getElementById('score').textContent=score;document.getElementById('maxScore').textContent=maxScore;
document.querySelectorAll('.mcq-option').forEach(o=>{o.classList.add('disabled');if(o.dataset.correct==='true')o.classList.add('correct');else if(o===el&&!c)o.classList.add('incorrect');});
document.getElementById(c?'fb-c':'fb-i').classList.add('show');
document.getElementById('teach').classList.add('show');
const w=document.getElementById('why');if(w)w.classList.add('show');
document.getElementById('next-btn').classList.add('show');
}
function nextStage(){if(++currentStage<stages.length){renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'});}else showCompletion();}
function showCompletion(){
const p=Math.round(score/maxScore*100);
let g,m,clr;
if(p>=90){g='Outstanding!';clr='#22c55e';m='Excellent withdrawal management!';}
else if(p>=80){g='Great Work!';clr='#3a90c0';m='Strong grasp. Review DT management.';}
else if(p>=70){g='Good Progress';clr='#f59e0b';m='Focus on benzo selection and seizure management.';}
else{g='Keep Learning';clr='#ef4444';m='Review withdrawal timeline and treatment principles.';}
document.getElementById('scene-container').innerHTML=`<div class="scene completion"><div class="completion-grade" style="color:${clr}">${g}</div><div class="completion-percent" style="color:${clr}">${p}%</div><div style="font-size:1.3rem;margin-bottom:8px">${score}/${maxScore} points</div><div style="margin:16px 0;color:var(--rdx-text)">${m}</div><div class="completion-breakdown"><h4 style="margin-bottom:16px">Your Journey</h4>${decisionPath.map((d,j)=>`<div style="padding:12px 0;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;"><span style="color:${d.correct?'#4ade80':'#f87171'}">${d.correct?'Y':'N'} ${d.stage}</span><span style="color:#94a3b8">${d.points}/${stages[j].question.points}</span></div>`).join('')}</div></div>`;
document.getElementById('progress').style.width='100%';
}
document.addEventListener('DOMContentLoaded',()=>renderStage(0));


// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3a90c0'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color: #1f5f8b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
