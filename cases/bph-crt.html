    <div class="container">
        <div class="header">
            <h1>🔵 Benign Prostatic Hyperplasia</h1>
            <div class="score-display">
                <div class="score-item">Score: <strong id="score">0</strong>/<span id="maxScore">70</span></div>
                <div class="score-item">Stage: <span id="stageNum">1</span>/7</div>

    <script>
    let currentStage = 0, score = 0;
    const stages = [
        {title:"The Complaint",content:'<div class="narrative"><p>A <span class="highlight">68-year-old man</span> presents with urinary symptoms that have been worsening over the past 2 years. He reports <span class="highlight">frequent urination, nocturia 3-4 times per night, weak stream, and feeling like he doesn\'t empty completely</span>. He denies dysuria, hematuria, or pain.</p></div>',question:{prompt:"What term describes this constellation of urinary symptoms?",options:[{text:"Urinary tract infection",correct:false},{text:"Lower urinary tract symptoms (LUTS)",correct:true},{text:"Overactive bladder",correct:false},{text:"Neurogenic bladder",correct:false}],explanation:{correct:"Correct! LUTS (Lower Urinary Tract Symptoms) encompasses both storage symptoms (frequency, urgency, nocturia) and voiding symptoms (weak stream, hesitancy, incomplete emptying). BPH is the most common cause in older men.",incorrect:"LUTS = Lower Urinary Tract Symptoms. It includes both storage (irritative) and voiding (obstructive) symptoms."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 LUTS Classification</div><div class="pathway">STORAGE (Irritative) Symptoms:\n• Frequency\n• Urgency\n• Nocturia\n• Urge incontinence\n\nVOIDING (Obstructive) Symptoms:\n• Weak stream\n• Hesitancy\n• Intermittency\n• Straining\n• Incomplete emptying\n• Post-void dribbling\n\nIPSS/AUA Symptom Score:\n0-7 = Mild\n8-19 = Moderate\n20-35 = Severe</div></div>',points:10}},
        
        {title:"Understanding the Problem",content:'<div class="narrative"><p>You explain to the patient that his symptoms are likely due to BPH. He asks why his prostate is causing urinary problems.</p></div>',question:{prompt:"BPH originates in which zone of the prostate?",options:[{text:"Peripheral zone",correct:false},{text:"Transition zone",correct:true},{text:"Central zone",correct:false},{text:"Anterior fibromuscular stroma",correct:false}],explanation:{correct:"Correct! BPH arises from the TRANSITION ZONE, which surrounds the urethra. As it enlarges, it compresses the urethra causing obstruction. Prostate cancer, in contrast, typically arises from the peripheral zone.",incorrect:"BPH = Transition zone (surrounds urethra). Prostate cancer = Peripheral zone (palpable on DRE)."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Prostate Anatomy</div><div class="pathway">PROSTATE ZONES (McNeal):\n\nTRANSITION ZONE (5-10%):\n• Surrounds urethra\n• BPH originates here\n• Not palpable on DRE\n\nPERIPHERAL ZONE (70%):\n• Posterior, palpable on DRE\n• 70-80% of prostate cancers\n\nCENTRAL ZONE (25%):\n• Surrounds ejaculatory ducts\n\nTHIS IS WHY:\n• DRE misses BPH (anterior)\n• DRE can detect cancer (posterior)</div></div>',points:10}},

        {title:"Two-Component Model",content:'<div class="narrative"><p>You explain that BPH causes obstruction through two mechanisms that can be targeted with different treatments.</p></div>',question:{prompt:"What are the TWO components of BPH-related obstruction?",options:[{text:"Infection and inflammation",correct:false},{text:"Static (tissue) and dynamic (smooth muscle tone)",correct:true},{text:"Neurogenic and myogenic",correct:false},{text:"Proximal and distal",correct:false}],explanation:{correct:"Correct! BPH has two components: 1) STATIC - mechanical obstruction from enlarged tissue (target with 5α-reductase inhibitors); 2) DYNAMIC - smooth muscle tone mediated by α1-adrenergic receptors (target with α-blockers).",incorrect:"Two components: STATIC (tissue bulk → 5ARIs) and DYNAMIC (smooth muscle tone → α-blockers)."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Two-Component Model</div><div class="pathway">STATIC COMPONENT:\n• Enlarged glandular tissue\n• Mechanical obstruction\n• Target: 5α-reductase inhibitors\n  (finasteride, dutasteride)\n• Shrinks prostate over 3-6 months\n\nDYNAMIC COMPONENT:\n• Smooth muscle tone\n• α1-adrenergic receptors\n• Target: α-blockers\n  (tamsulosin, alfuzosin, silodosin)\n• Works within days-weeks\n\nCOMBINATION THERAPY:\nFor larger prostates (>40g)\nboth components addressed</div></div>',points:10}},

        {title:"Initial Evaluation",content:'<div class="narrative"><p>You perform an evaluation. DRE shows a <span class="highlight">smooth, symmetrically enlarged prostate</span> without nodules. PSA is <span class="highlight">2.8 ng/mL</span>. Urinalysis is negative. IPSS is 18 (moderate).</p></div>',question:{prompt:"What additional test would help assess for complications of BPH?",options:[{text:"CT scan of abdomen",correct:false},{text:"Cystoscopy",correct:false},{text:"Post-void residual (PVR)",correct:true},{text:"Prostate biopsy",correct:false}],explanation:{correct:"Correct! Post-void residual (PVR) assesses bladder emptying. Elevated PVR (>200mL) suggests significant obstruction or detrusor dysfunction. Other optional tests include uroflowmetry and pressure-flow studies.",incorrect:"PVR assesses bladder emptying. Elevated PVR indicates significant obstruction. It's a simple, non-invasive test."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 BPH Evaluation</div><div class="pathway">REQUIRED:\n• History + IPSS\n• DRE (size, nodules)\n• Urinalysis (rule out infection)\n• PSA (if >10 year life expectancy)\n\nOPTIONAL/RECOMMENDED:\n• Post-void residual (PVR)\n  - Normal: <50mL\n  - Elevated: >200mL concerning\n• Uroflowmetry (Qmax)\n  - Normal: >15 mL/sec\n• Creatinine (if retention suspected)\n\nNOT ROUTINE:\n• Cystoscopy\n• Urodynamics\n• Imaging</div></div>',points:10}},

        {title:"Medical Management",content:'<div class="narrative"><p>With moderate LUTS (IPSS 18) and PVR of 80mL, you discuss medical management. He asks about medication options.</p></div>',question:{prompt:"Which medication class provides the FASTEST symptom relief?",options:[{text:"5α-reductase inhibitors (finasteride)",correct:false},{text:"α-blockers (tamsulosin)",correct:true},{text:"Anticholinergics",correct:false},{text:"PDE5 inhibitors",correct:false}],explanation:{correct:"Correct! α-blockers work within DAYS to WEEKS by relaxing smooth muscle. 5ARIs take 3-6 MONTHS to shrink prostate tissue. For rapid relief, start with an α-blocker.",incorrect:"α-blockers = fast (days-weeks). 5ARIs = slow (3-6 months). Start α-blocker for quick relief."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Medical Treatment</div><div class="pathway">α-BLOCKERS (First-line):\n• Tamsulosin, alfuzosin, silodosin\n• Onset: Days to weeks\n• Side effects: Orthostatic hypotension,\n  dizziness, retrograde ejaculation\n• ⚠️ IFIS risk with cataract surgery!\n\n5α-REDUCTASE INHIBITORS:\n• Finasteride, dutasteride\n• Onset: 3-6 months\n• Shrinks prostate, reduces PSA 50%\n• Side effects: ED, decreased libido\n• Best for larger prostates (>40g)\n\nCOMBINATION:\n• α-blocker + 5ARI\n• For symptomatic + large prostate\n• MTOPS/CombAT trials showed benefit</div></div>',points:10}},

        {title:"Important Counseling",content:'<div class="narrative"><p>You start tamsulosin. He mentions he has a cataract surgery scheduled in 3 months.</p></div>',question:{prompt:"What important counseling should you provide about tamsulosin and cataract surgery?",options:[{text:"No concerns, continue medication",correct:false},{text:"Stop medication 1 week before surgery",correct:false},{text:"Inform ophthalmologist - risk of intraoperative floppy iris syndrome (IFIS)",correct:true},{text:"Cataract surgery is contraindicated",correct:false}],explanation:{correct:"Correct! α-blockers (especially tamsulosin) cause IFIS - the iris becomes floppy during cataract surgery, increasing complications. The ophthalmologist MUST be informed so they can prepare. Stopping the medication doesn't eliminate risk.",incorrect:"IFIS (Intraoperative Floppy Iris Syndrome) can occur even if medication is stopped. The ophthalmologist must be informed!"},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 IFIS Warning</div><div class="pathway">INTRAOPERATIVE FLOPPY IRIS SYNDROME:\n\nCAUSE:\nα-blockers (especially tamsulosin)\nblock α1 receptors in iris dilator\n\nRISK:\n• Iris billows and prolapses\n• Pupil constriction during surgery\n• Increased complication rate\n\nMANAGEMENT:\n• INFORM OPHTHALMOLOGIST\n• Risk persists even if drug stopped\n• Ophthalmologist can prepare\n  (iris hooks, different technique)\n\nDO NOT start tamsulosin if\ncataract surgery imminent!</div></div>',points:10}},

        {title:"Surgical Indications",content:'<div class="narrative"><p>After 6 months of medical therapy, another patient has <span class="critical">failed to improve</span> and now presents with <span class="critical">urinary retention requiring catheterization</span>.</p></div>',question:{prompt:"What are absolute indications for surgical intervention in BPH?",options:[{text:"Moderate LUTS not improving with medication",correct:false},{text:"Refractory retention, recurrent UTIs, bladder stones, renal insufficiency",correct:true},{text:"PSA elevation",correct:false},{text:"Age over 75",correct:false}],explanation:{correct:"Correct! Absolute surgical indications: refractory urinary retention, recurrent UTIs, recurrent gross hematuria from BPH, bladder stones, and renal insufficiency from obstruction. These represent complications that won't resolve with medical therapy.",incorrect:"Surgical indications: Retention, recurrent UTIs, hematuria, bladder stones, renal insufficiency from obstruction."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Surgical Options</div><div class="pathway">INDICATIONS FOR SURGERY:\n• Refractory urinary retention\n• Recurrent UTIs\n• Recurrent gross hematuria\n• Bladder stones\n• Renal insufficiency from BPH\n• Failed medical therapy\n\nSURGICAL OPTIONS:\n• TURP - Gold standard (<80g)\n• HoLEP - Any size, less bleeding\n• PVP (GreenLight) - Any size\n• Simple prostatectomy (>80-100g)\n• UroLift - Preserves ejaculation\n• Rezūm - Steam ablation\n\nTURP COMPLICATIONS:\n• Retrograde ejaculation (65-75%)\n• TUR syndrome (less with bipolar)\n• ED (5-10%), incontinence (<1%)</div></div>',points:10}}
    ];
    
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('stageNum').textContent=currentStage+1;document.getElementById('maxScore').textContent=stages.length*10;}
    
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><strong>✓ Correct!</strong> '+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><strong>✗ Not quite.</strong> '+stage.question.explanation.incorrect+'</div><div class="teaching-point" id="teaching">'+stage.question.teaching+'</div><button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=10;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}document.getElementById('teaching').classList.add('show');document.getElementById('next-btn').classList.add('show');}
    
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene" style="text-align:center;padding:40px;"><h2 style="color:#5eead4;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong>/70</p><div style="margin-top:20px;padding:15px;background:rgba(59,130,246,0.15);border-radius:10px;border:1px solid rgba(59,130,246,0.3);"><p style="color:#5eead4;margin-bottom:10px;font-weight:600;">📚 Learn More:</p><div style="display:flex;flex-wrap:wrap;gap:8px;"><a href="../../mechanism/bph-module.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📘 MechanismDx</a><a href="https://www.ncbi.nlm.nih.gov/books/?term=bph" target="_blank" title="Deep dive via StatPearls" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📊 Deep Dive</a></div><div style="margin-top:10px;"><a href="https://www.ncbi.nlm.nih.gov/books/NBK558920/" target="_blank" style="color:#5eead4;font-size:0.8rem;">📖 StatPearls Reference</a></div></div><p>You mastered BPH!</p></div>';}}
    
    renderStage();
    </script>
