<style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

    <div class="container">
        <div class="header">
            <h1>🎗️ Prostate Cancer</h1>
            <div class="score-display">
                <div class="score-item">Score: <strong id="score">0</strong>/<span id="maxScore">70</span></div>
                <div class="score-item">Stage: <span id="stageNum">1</span>/7</div>
            </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width: 14%"></div></div>

    </div>
    <script>
    let currentStage = 0, score = 0;
    const stages = [
        {title:"Screening Visit",content:'<div class="narrative"><p>A <span class="highlight">62-year-old African American man</span> presents for annual physical. He has no urinary symptoms. His father was diagnosed with prostate cancer at age 65. He asks about prostate cancer screening.</p></div>',question:{prompt:"What is the appropriate approach to PSA screening for this patient?",options:[{text:"No screening recommended at any age",correct:false},{text:"Shared decision-making with discussion of risks and benefits",correct:true},{text:"Mandatory annual PSA for all men over 50",correct:false},{text:"Only screen if symptomatic",correct:false}],explanation:{correct:"Correct! Current guidelines recommend shared decision-making for PSA screening. This patient has TWO risk factors (African American race, family history), so discussion is particularly important. Men should understand both the benefits (early detection) and risks (overdiagnosis, overtreatment).",incorrect:"Shared decision-making is key. Discuss benefits (early detection) AND risks (overdiagnosis). This patient has elevated risk factors."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 PSA Screening Guidelines</div><div class="pathway">AUA GUIDELINES (2023):\n\nAges 55-69:\n• Shared decision-making\n• Individualized based on risk\n\nAges 40-54:\n• Consider in HIGH-RISK:\n  - African American\n  - Family history\n  - BRCA mutation\n\nAge <40: Not recommended\nAge >70 or <10-15yr life expectancy:\n  Generally not recommended\n\nPSA IS ORGAN-SPECIFIC,\nNOT CANCER-SPECIFIC!\n(BPH, prostatitis also elevate PSA)</div></div>',points:10}},
        
        {title:"PSA Result",content:'<div class="narrative"><p>After discussing the options, the patient opts for screening. His PSA returns at <span class="highlight">5.8 ng/mL</span>. DRE reveals a <span class="critical">firm nodule</span> on the right lobe of the prostate.</p></div>',question:{prompt:"What is the next step in evaluation?",options:[{text:"Repeat PSA in 6 months",correct:false},{text:"Start empiric antibiotics for prostatitis",correct:false},{text:"Prostate biopsy",correct:true},{text:"CT scan of pelvis",correct:false}],explanation:{correct:"Correct! An elevated PSA (especially in this range) PLUS an abnormal DRE (nodule) warrants prostate biopsy. Either finding alone may prompt biopsy; together they strongly indicate need for tissue diagnosis.",incorrect:"Elevated PSA + abnormal DRE = prostate biopsy. Don't delay with repeat PSA when there's a palpable nodule."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Indications for Biopsy</div><div class="pathway">BIOPSY TRIGGERS:\n• Elevated/rising PSA\n• Abnormal DRE (nodule, asymmetry)\n• Suspicious MRI findings (PI-RADS 4-5)\n\nPSA INTERPRETATION:\n• 0-2.5: ~10% cancer probability\n• 2.5-4: ~15%\n• 4-10: ~25%\n• >10: ~50%\n\nBIOPSY APPROACHES:\n• Transrectal US-guided (TRUS)\n• MRI-fusion (targets lesions)\n• Transperineal (lower infection risk)</div></div>',points:10}},

        {title:"Biopsy Results",content:'<div class="narrative"><p>MRI shows a PI-RADS 4 lesion in the right peripheral zone. MRI-fusion biopsy is performed. Pathology returns: <span class="critical">Adenocarcinoma, Gleason 4+3=7</span>, involving 4 of 12 cores, up to 40% of core length.</p></div>',question:{prompt:"What Grade Group does Gleason 4+3=7 correspond to?",options:[{text:"Grade Group 1",correct:false},{text:"Grade Group 2",correct:false},{text:"Grade Group 3",correct:true},{text:"Grade Group 4",correct:false}],explanation:{correct:"Correct! Gleason 4+3=7 is Grade Group 3 (unfavorable intermediate risk). This is different from 3+4=7, which is Grade Group 2 (favorable intermediate). The primary pattern being 4 indicates more aggressive disease.",incorrect:"4+3=7 is Grade Group 3 (unfavorable intermediate). 3+4=7 is Grade Group 2 (favorable intermediate). The difference matters!"},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Gleason & Grade Groups</div><div class="pathway">GRADE GROUP SYSTEM (ISUP 2014):\n\nGroup 1 = Gleason 6 (3+3)\n  → Low risk\n\nGroup 2 = Gleason 7 (3+4)\n  → Favorable intermediate\n\nGroup 3 = Gleason 7 (4+3)\n  → Unfavorable intermediate\n\nGroup 4 = Gleason 8 (4+4, 3+5, 5+3)\n  → High risk\n\nGroup 5 = Gleason 9-10\n  → Very high risk\n\nKEY: 3+4 ≠ 4+3!\nPrimary pattern matters most</div></div>',points:10}},

        {title:"Risk Stratification",content:'<div class="narrative"><p>With Gleason 4+3=7 (Grade Group 3), PSA 5.8, and clinical stage T2a (nodule in one lobe), you need to risk-stratify the cancer.</p></div>',question:{prompt:"What risk category is this patient?",options:[{text:"Low risk",correct:false},{text:"Favorable intermediate risk",correct:false},{text:"Unfavorable intermediate risk",correct:true},{text:"High risk",correct:false}],explanation:{correct:"Correct! This is unfavorable intermediate risk. Key factors: Gleason 4+3=7 (Grade Group 3) is unfavorable intermediate. Even though PSA <10 and stage T2a would be favorable, the Gleason pattern makes it unfavorable intermediate.",incorrect:"Grade Group 3 (4+3=7) automatically places patient in UNFAVORABLE intermediate risk category, regardless of other factors."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Risk Stratification</div><div class="pathway">LOW RISK:\n• PSA <10 AND\n• Gleason 6 (GG1) AND\n• Stage ≤T2a\n\nINTERMEDIATE RISK:\n• PSA 10-20 OR\n• Gleason 7 (GG2-3) OR\n• Stage T2b-T2c\n\nFavorable intermediate:\n  GG1-2 with <50% positive cores\n\nUnfavorable intermediate:\n  GG3 OR >50% positive cores\n\nHIGH RISK:\n• PSA >20 OR\n• Gleason 8-10 (GG4-5) OR\n• Stage ≥T3</div></div>',points:10}},

        {title:"Treatment Discussion",content:'<div class="narrative"><p>You discuss treatment options with the patient. He\'s healthy with a life expectancy >15 years.</p></div>',question:{prompt:"What are appropriate treatment options for unfavorable intermediate-risk prostate cancer?",options:[{text:"Active surveillance only",correct:false},{text:"Radical prostatectomy or radiation with ADT",correct:true},{text:"Chemotherapy first, then surgery",correct:false},{text:"Watchful waiting",correct:false}],explanation:{correct:"Correct! For unfavorable intermediate risk, definitive treatment is indicated: radical prostatectomy OR radiation (usually with short-term ADT). Active surveillance is for low-risk disease; watchful waiting is for limited life expectancy.",incorrect:"Unfavorable intermediate = definitive treatment needed. Options: Radical prostatectomy OR radiation + short-term ADT."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Treatment by Risk</div><div class="pathway">LOW RISK:\n• Active surveillance (preferred)\n• Radiation or surgery\n\nINTERMEDIATE RISK:\n• Surgery (radical prostatectomy)\n• Radiation ± ADT (4-6 months)\n\nHIGH RISK:\n• Radiation + long-term ADT (2-3 yrs)\n• Surgery (select cases)\n\nMETASTATIC:\n• ADT backbone\n• + Chemotherapy (docetaxel)\n• + Novel agents (abiraterone,\n  enzalutamide, apalutamide)\n\nADT = Androgen Deprivation Therapy\n(GnRH agonist/antagonist or orchiectomy)</div></div>',points:10}},

        {title:"Post-Treatment Monitoring",content:'<div class="narrative"><p>The patient undergoes radical prostatectomy. Final pathology confirms Gleason 4+3=7, negative margins, no extracapsular extension, negative lymph nodes (pT2c N0).</p></div>',question:{prompt:"What PSA level is expected after radical prostatectomy, and what defines biochemical recurrence?",options:[{text:"PSA <4, recurrence if >10",correct:false},{text:"PSA undetectable (<0.1), recurrence if ≥0.2 and rising",correct:true},{text:"PSA <1, recurrence if >4",correct:false},{text:"PSA level doesn't matter post-surgery",correct:false}],explanation:{correct:"Correct! After radical prostatectomy, PSA should be undetectable (<0.1 ng/mL) since the prostate is removed. Biochemical recurrence is defined as PSA ≥0.2 ng/mL and rising.",incorrect:"Post-prostatectomy: PSA should be undetectable. Biochemical recurrence = PSA ≥0.2 and rising."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Post-Treatment Monitoring</div><div class="pathway">AFTER RADICAL PROSTATECTOMY:\n• PSA should be UNDETECTABLE (<0.1)\n• Biochemical recurrence: PSA ≥0.2\n  and rising\n• Check PSA every 3-6 months x5 years,\n  then annually\n\nAFTER RADIATION:\n• PSA drops to NADIR (lowest point)\n• Takes months to years\n• Phoenix definition for recurrence:\n  Nadir + 2 ng/mL\n\nIF RECURRENCE:\n• Imaging (PSMA-PET, CT, bone scan)\n• Salvage radiation (post-surgery)\n• Salvage prostatectomy (post-radiation)\n• ADT for metastatic disease</div></div>',points:10}},

        {title:"Metastatic Disease",content:'<div class="narrative"><p>A different patient presents with <span class="critical">new onset back pain</span>. PSA is 85 ng/mL. Bone scan shows <span class="critical">multiple sclerotic lesions</span> in the spine and pelvis.</p></div>',question:{prompt:"What is characteristic of prostate cancer bone metastases?",options:[{text:"Lytic (osteoclastic) lesions",correct:false},{text:"Blastic (osteosclerotic) lesions",correct:true},{text:"Mixed lytic and blastic equally",correct:false},{text:"Bone metastases don't occur in prostate cancer",correct:false}],explanation:{correct:"Correct! Prostate cancer classically causes osteoBLASTIC (sclerotic) metastases, unlike most other cancers which cause osteolytic lesions. Alkaline phosphatase is often elevated. Bone is the most common site of distant metastasis.",incorrect:"Prostate cancer = osteoBLASTIC bone mets (sclerotic). Most other cancers cause osteolytic mets. This is a classic board fact!"},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Metastatic Prostate Cancer</div><div class="pathway">METASTATIC SITES:\n• BONE most common (osteoBLASTIC)\n• Lymph nodes (pelvic, retroperitoneal)\n• Lung, liver (less common)\n\nOSTEOBLASTIC METS:\n• Sclerotic on imaging\n• ↑ Alkaline phosphatase\n• Unique to prostate cancer\n  (most cancers are osteolytic)\n\nTREATMENT OF METASTATIC:\n• ADT (backbone of therapy)\n• ADD: Docetaxel, abiraterone,\n  enzalutamide, or darolutamide\n• Bone-targeted: Zoledronic acid,\n  denosumab, radium-223\n\nMetastatic castration-resistant (mCRPC):\nProgression despite castrate testosterone</div></div>',points:10}}
    ];
    
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('stageNum').textContent=currentStage+1;document.getElementById('maxScore').textContent=stages.length*10;}
    
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><strong>✓ Correct!</strong> '+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><strong>✗ Not quite.</strong> '+stage.question.explanation.incorrect+'</div><div class="teaching-point" id="teaching">'+stage.question.teaching+'</div><button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=10;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}document.getElementById('teaching').classList.add('show');document.getElementById('next-btn').classList.add('show');}
    
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene" style="text-align:center;padding:40px;"><h2 style="color:#c4b5fd;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong>/70</p><div style="margin-top:20px;padding:15px;background:rgba(59,130,246,0.15);border-radius:10px;border:1px solid rgba(59,130,246,0.3);"><p style="color:#5eead4;margin-bottom:10px;font-weight:600;">📚 Learn More:</p><div style="display:flex;flex-wrap:wrap;gap:8px;"><a href="../../mechanism/prostate-cancer-module.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📘 MechanismDx</a><a href="https://www.ncbi.nlm.nih.gov/books/?term=prostate+cancer" target="_blank" title="Deep dive via StatPearls" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📊 Deep Dive</a></div><div style="margin-top:10px;"><a href="https://www.ncbi.nlm.nih.gov/books/NBK556029/" target="_blank" style="color:#5eead4;font-size:0.8rem;">📖 StatPearls Reference</a></div></div><p>You mastered Prostate Cancer!</p></div>';}}
    
    renderStage();
    </script>
