<script>
let currentStage=0,score=0,maxScore=0,difficulty='standard',answeredQuestions=new Set(),decisionPath=[];
const stages=[
{title:"The Agitated Febrile Patient",content:`<div class="narrative"><p>38-year-old woman with Graves' disease (non-compliant with methimazole) presents after a URI with fever, confusion, and palpitations.</p><p style="margin-top:12px;"><strong>Vitals:</strong> T 104.2F, HR 158 (irregular), BP 168/72, RR 26<br><strong>Exam:</strong> Agitated, diaphoretic, tremulous, lid lag, diffuse goiter with bruit, atrial fibrillation<br><strong>Labs:</strong> TSH <0.01, Free T4 6.8 (high), Free T3 18 (high)</p></div><div class="socratic-prompt"><h4>Recognize the Emergency</h4><p>What distinguishes thyroid storm from uncomplicated hyperthyroidism?</p></div>`,
hint_beginner:"Thyroid storm = hyperthyroidism + systemic decompensation",hint_advanced:"What is the Burch-Wartofsky score?",
question:{prompt:"Hyperthyroid patient with high fever, tachycardia, AFib, and altered mental status. What is this?",
options:[{text:"Thyroid storm - life-threatening decompensated hyperthyroidism with multisystem involvement; distinguished from hyperthyroidism by fever, severe tachycardia, CNS dysfunction, GI symptoms, and precipitant",correct:true},
{text:"Uncomplicated Graves' disease",correct:false},
{text:"Sepsis only",correct:false},
{text:"Simple AFib with rapid ventricular response",correct:false}],
explanation:{correct:"Thyroid storm is a clinical diagnosis: hyperthyroidism + systemic decompensation (high fever, severe tachycardia, CNS changes, GI symptoms). Often precipitated by infection, surgery, trauma, or medication non-compliance. Mortality 10-30% even with treatment.",incorrect:"Thyroid storm is more than hyperthyroidism - it's decompensated thyrotoxicosis with multiorgan dysfunction. The degree of fever, tachycardia, and CNS involvement distinguishes it from uncomplicated hyperthyroidism."},
teaching:`<h4>Thyroid Storm vs Hyperthyroidism</h4><p><strong>Fever:</strong> >101.3F (38.5C)</p><p><strong>Cardiovascular:</strong> HR >140, AFib, heart failure</p><p><strong>CNS:</strong> Agitation, delirium, psychosis, coma</p><p><strong>GI:</strong> Nausea, vomiting, diarrhea, jaundice</p><p><strong>Precipitant:</strong> Infection, surgery, trauma, iodine load</p>`,
why_chain:[{q:"What is the Burch-Wartofsky score?",a:"Point-based system to diagnose thyroid storm: temperature, CNS effects, GI-hepatic dysfunction, cardiovascular dysfunction, heart failure, AFib, precipitant. Score ≥45 = highly suggestive of thyroid storm."}],points:15}},

{title:"Treatment Priorities",content:`<div class="narrative"><p>Thyroid storm diagnosed. What is the treatment approach?</p></div><div class="socratic-prompt"><h4>Treatment Sequence</h4><p>What is the order of treatments for thyroid storm?</p></div>`,
hint_beginner:"Block synthesis, block release, block conversion, block symptoms",hint_advanced:"Why give PTU before iodine?",
question:{prompt:"What is the correct treatment sequence for thyroid storm?",
options:[{text:"1) Beta-blocker (control symptoms), 2) Thionamide (block synthesis), 3) Iodine (block release - give 1 hour AFTER thionamide), 4) Glucocorticoids (block T4→T3 conversion), 5) Supportive care",correct:true},
{text:"Iodine first, then beta-blocker",correct:false},
{text:"Surgery immediately",correct:false},
{text:"Radioactive iodine ablation",correct:false}],
explanation:{correct:"Treatment sequence matters: 1) Beta-blocker for symptoms, 2) Thionamide (PTU preferred - also blocks T4→T3 conversion), 3) Iodine 1 HOUR AFTER thionamide (blocks hormone release but can increase synthesis if given first), 4) Glucocorticoids (block conversion, treat possible adrenal insufficiency), 5) Supportive care.",incorrect:"Must give thionamide BEFORE iodine. Iodine given first can transiently increase thyroid hormone synthesis (Jod-Basedow phenomenon). Wait 1 hour after thionamide, then give iodine."},
teaching:`<h4>Thyroid Storm Treatment Sequence</h4><p><strong>1. Beta-blocker:</strong> Propranolol (also blocks T4→T3)</p><p><strong>2. Thionamide:</strong> PTU preferred (blocks synthesis + conversion)</p><p><strong>3. Iodine:</strong> SSKI or Lugol's - 1 hour AFTER thionamide</p><p><strong>4. Glucocorticoids:</strong> Hydrocortisone 100mg q8h</p><p><strong>5. Supportive:</strong> Cooling, fluids, treat precipitant</p>`,
why_chain:[{q:"Why PTU over methimazole in thyroid storm?",a:"PTU blocks both thyroid hormone synthesis (like methimazole) AND peripheral T4→T3 conversion. This dual mechanism provides faster control in thyroid storm. Methimazole only blocks synthesis."}],points:15}},

{title:"Beta-Blocker Selection",content:`<div class="narrative"><p>Start with symptom control using beta-blockers.</p></div><div class="socratic-prompt"><h4>Control the Hyperadrenergic State</h4><p>Which beta-blocker is preferred and why?</p></div>`,
hint_beginner:"Propranolol has additional benefits beyond beta-blockade",hint_advanced:"What if the patient has asthma or heart failure?",
question:{prompt:"Which beta-blocker is preferred for thyroid storm?",
options:[{text:"Propranolol (non-selective) - controls tachycardia AND inhibits peripheral T4→T3 conversion; IV for severe cases, then transition to oral",correct:true},
{text:"Metoprolol is always first choice",correct:false},
{text:"Beta-blockers are contraindicated in thyroid storm",correct:false},
{text:"Only use if heart rate >200",correct:false}],
explanation:{correct:"Propranolol is preferred: non-selective beta-blocker controls tachycardia, tremor, and diaphoresis PLUS inhibits T4→T3 conversion at high doses. IV propranolol 1mg every 10 minutes initially, then oral 60-80mg q4-6h. Esmolol IV for more titratability.",incorrect:"Propranolol has the advantage of blocking T4→T3 conversion. Cardioselective beta-blockers (metoprolol) can be used but don't have this benefit."},
teaching:`<h4>Beta-Blocker Therapy</h4><p><strong>Propranolol (preferred):</strong> Blocks symptoms + T4→T3 conversion</p><p><strong>Dose:</strong> IV 1mg q10min, then PO 60-80mg q4-6h</p><p><strong>Esmolol:</strong> IV for tight control, short-acting</p><p><strong>If asthma/HF:</strong> Cardioselective (metoprolol) or esmolol (short-acting)</p>`,
why_chain:[{q:"What if patient has severe heart failure from thyroid storm?",a:"Heart failure from thyroid storm is usually high-output and responds to treatment of thyrotoxicosis. Beta-blockers may be needed cautiously. If severe decompensated HF, use esmolol (short-acting, titratable) and treat the underlying thyrotoxicosis aggressively."}],points:10}},

{title:"Block Hormone Synthesis",content:`<div class="narrative"><p>Now block thyroid hormone synthesis.</p></div><div class="socratic-prompt"><h4>Thionamides</h4><p>What do thionamides do and which is preferred in thyroid storm?</p></div>`,
hint_beginner:"PTU blocks synthesis AND conversion",hint_advanced:"What are the side effects of thionamides?",
question:{prompt:"Which thionamide and why?",
options:[{text:"PTU (propylthiouracil) preferred in thyroid storm - blocks thyroid peroxidase (synthesis) AND 5'-deiodinase (T4→T3 conversion); loading dose 500-1000mg, then 250mg q4h",correct:true},
{text:"Methimazole is always preferred",correct:false},
{text:"Thionamides are not used in thyroid storm",correct:false},
{text:"Give iodine instead of thionamide",correct:false}],
explanation:{correct:"PTU is preferred in thyroid storm for its dual action: blocks synthesis (like methimazole) AND blocks peripheral T4→T3 conversion. Loading dose 500-1000mg, then 250mg q4h. Methimazole only blocks synthesis. Outside of storm, methimazole is preferred (less hepatotoxicity).",incorrect:"PTU is specifically preferred in thyroid storm due to its additional effect on T4→T3 conversion. In non-emergent hyperthyroidism, methimazole is preferred due to PTU's hepatotoxicity risk."},
teaching:`<h4>Thionamides</h4><p><strong>PTU:</strong> Blocks synthesis + T4→T3 conversion; preferred in storm</p><p><strong>Dose:</strong> 500-1000mg load, then 250mg q4h</p><p><strong>Methimazole:</strong> Blocks synthesis only; preferred in non-emergent</p><p><strong>Side effects:</strong> Agranulocytosis (both), hepatotoxicity (PTU>methimazole)</p>`,
why_chain:[{q:"When is methimazole preferred over PTU?",a:"Outside of thyroid storm and first trimester pregnancy, methimazole is preferred: once-daily dosing, lower hepatotoxicity risk. PTU is preferred in first trimester (methimazole teratogenic) and thyroid storm (blocks T4→T3)."}],points:10}},

{title:"Block Hormone Release",content:`<div class="narrative"><p>After thionamide, add iodine to block hormone release.</p></div><div class="socratic-prompt"><h4>Iodine Timing</h4><p>Why must iodine be given AFTER thionamide?</p></div>`,
hint_beginner:"Iodine can paradoxically increase thyroid hormone synthesis",hint_advanced:"What is the Wolff-Chaikoff effect vs Jod-Basedow?",
question:{prompt:"Why give iodine 1 hour AFTER thionamide?",
options:[{text:"Iodine blocks thyroid hormone RELEASE (Wolff-Chaikoff effect) but can initially increase synthesis if given first; thionamide given first blocks synthesis, then iodine safely blocks release",correct:true},
{text:"Order doesn't matter",correct:false},
{text:"Iodine should always be given first",correct:false},
{text:"Iodine is contraindicated in thyroid storm",correct:false}],
explanation:{correct:"Iodine has dual effects: inhibits hormone release (Wolff-Chaikoff effect - therapeutic) but also provides substrate for increased synthesis (Jod-Basedow effect - harmful). Give thionamide first to block synthesis, then iodine safely blocks release without feeding new synthesis.",incorrect:"Timing is critical. Iodine given before thionamide can transiently increase thyroid hormone production, worsening the storm. Wait at least 1 hour after thionamide."},
teaching:`<h4>Iodine in Thyroid Storm</h4><p><strong>Mechanism:</strong> Blocks thyroid hormone release (Wolff-Chaikoff)</p><p><strong>Timing:</strong> Give 1 hour AFTER thionamide</p><p><strong>Options:</strong> SSKI (5 drops q6h), Lugol's solution, IV iodine</p><p><strong>Caution:</strong> Can worsen storm if given before synthesis blocked</p>`,
why_chain:[{q:"What is Jod-Basedow phenomenon?",a:"Iodine-induced hyperthyroidism - giving iodine to an iodine-deficient patient with underlying thyroid pathology can trigger hyperthyroidism by providing substrate for increased hormone synthesis. This is why we block synthesis first."}],points:10}},

{title:"Glucocorticoids",content:`<div class="narrative"><p>Add glucocorticoids as part of the treatment regimen.</p></div><div class="socratic-prompt"><h4>Multiple Benefits</h4><p>Why give glucocorticoids in thyroid storm?</p></div>`,
hint_beginner:"Block T4→T3 conversion + treat relative adrenal insufficiency",hint_advanced:"What dose of hydrocortisone?",
question:{prompt:"Why are glucocorticoids given in thyroid storm?",
options:[{text:"Multiple benefits: block peripheral T4→T3 conversion, treat possible relative adrenal insufficiency (increased cortisol metabolism in hyperthyroidism), provide hemodynamic support",correct:true},
{text:"Only for autoimmune thyroiditis",correct:false},

{text:"Only if patient has known adrenal disease",correct:false}],

{title:"Identify and Treat Precipitant",content:`<div class="narrative"><p>This patient's thyroid storm was precipitated by a URI. Identify and treat the trigger.</p></div><div class="socratic-prompt"><h4>Find the Trigger</h4><p>What commonly precipitates thyroid storm?</p></div>`,

teaching:`<h4>Thyroid Storm Precipitants</h4><p><strong>Infection:</strong> Most common (#1)</p><p><strong>Surgery:</strong> Thyroid or non-thyroid</p><p><strong>Medication:</strong> Non-compliance, stopping antithyroid drugs</p><p><strong>Iodine:</strong> IV contrast, amiodarone</p><p><strong>Others:</strong> DKA, trauma, MI, stroke, pregnancy</p>`,
why_chain:[{q:"Why does infection precipitate thyroid storm?",a:"Infection causes catecholamine release and cytokine production, which increase metabolic demands and can tip compensated hyperthyroidism into decompensated thyroid storm. The febrile response also accelerates hormone metabolism."}],points:10}},

{title:"Definitive Treatment",content:`<div class="narrative"><p>Patient stabilized on medical therapy. Plan for definitive treatment.</p></div><div class="socratic-prompt"><h4>Long-term Management</h4><p>What are the definitive treatment options for Graves' disease after thyroid storm?</p></div>`,

];
function shuffleArray(a){const s=[...a];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s;}
function setDifficulty(l,b){difficulty=l;document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderStage(currentStage);}
function renderStage(i){
const s=stages[i],opts=shuffleArray(s.question.options.map((o,idx)=>({...o,idx}))),ltrs='ABCD';
let hints='';
if(difficulty==='beginner'&&s.hint_beginner)hints=`<div class="hint-beginner" style="display:block;">Hint: ${s.hint_beginner}</div>`;
else if(difficulty==='advanced'&&s.hint_advanced)hints=`<div class="hint-advanced" style="display:block;">Challenge: ${s.hint_advanced}</div>`;
const why=s.question.why_chain?`<div class="why-chain" id="why"><h4>WHY Chain</h4>${s.question.why_chain.map(w=>`<div class="why-item"><div class="why-q">Q: ${w.q}</div><div class="why-a">${w.a}</div></div>`).join('')}</div>`:'';
document.getElementById('progress').style.width=((i)/stages.length*100)+'%';
document.getElementById('scene-container').innerHTML=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${i+1} of ${stages.length}</div><div class="scene-title">${s.title}</div></div>${s.content}${hints}<div class="question-box"><div class="question-prompt">${s.question.prompt}</div><div class="mcq-options">${opts.map((o,j)=>`<div class="mcq-option" data-correct="${o.correct}" onclick="selectOption(this,${i})"><span class="option-letter">${ltrs[j]}</span><span class="option-text">${o.text}</span></div>`).join('')}</div><div class="feedback correct-feedback" id="fb-c"><div class="feedback-title">Correct!</div><div>${s.question.explanation.correct}</div></div><div class="feedback incorrect-feedback" id="fb-i"><div class="feedback-title">Not Quite</div><div>${s.question.explanation.incorrect}</div></div><div class="teaching-point" id="teach">${s.question.teaching}</div>${why}<button class="btn" id="next-btn" onclick="nextStage()">Continue</button></div></div>`;
}
function selectOption(el,i){
if(answeredQuestions.has(i))return;
const c=el.dataset.correct==='true',s=stages[i];
answeredQuestions.add(i);decisionPath.push({stage:s.title,correct:c,points:c?s.question.points:0});
if(c)score+=s.question.points;maxScore+=s.question.points;
document.getElementById('score').textContent=score;document.getElementById('maxScore').textContent=maxScore;
document.querySelectorAll('.mcq-option').forEach(o=>{o.classList.add('disabled');if(o.dataset.correct==='true')o.classList.add('correct');else if(o===el&&!c)o.classList.add('incorrect');});
document.getElementById(c?'fb-c':'fb-i').classList.add('show');
document.getElementById('teach').classList.add('show');
const w=document.getElementById('why');if(w)w.classList.add('show');
document.getElementById('next-btn').classList.add('show');
}
function nextStage(){if(++currentStage<stages.length){renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'});}else showCompletion();}
function showCompletion(){
const p=Math.round(score/maxScore*100);
let g,m,clr;
if(p>=90){g='Outstanding!';clr='#22c55e';m='Excellent thyroid storm management!';}
else if(p>=80){g='Great Work!';clr='#3a90c0';m='Strong grasp. Review treatment sequence.';}
else if(p>=70){g='Good Progress';clr='#f59e0b';m='Focus on why thionamide before iodine.';}
else{g='Keep Learning';clr='#ef4444';m='Review treatment sequence and precipitants.';}
document.getElementById('scene-container').innerHTML=`<div class="scene completion"><div class="completion-grade" style="color:${clr}">${g}</div><div class="completion-percent" style="color:${clr}">${p}%</div><div style="font-size:1.3rem;margin-bottom:8px">${score}/${maxScore} points</div><div style="margin:16px 0;color:var(--rdx-text)">${m}</div><div class="completion-breakdown"><h4 style="margin-bottom:16px">Your Journey</h4>${decisionPath.map((d,j)=>`<div style="padding:12px 0;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;"><span style="color:${d.correct?'#4ade80':'#f87171'}">${d.correct?'Y':'N'} ${d.stage}</span><span style="color:#94a3b8">${d.points}/${stages[j].question.points}</span></div>`).join('')}</div></div>`;
document.getElementById('progress').style.width='100%';
}
document.addEventListener('DOMContentLoaded',()=>renderStage(0));


// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3a90c0'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#b45309'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#b45309'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color: #1f5f8b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
