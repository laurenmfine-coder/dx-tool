<script>let currentStage=0,score=0,difficulty='standard';
const stages=[{
title:"The Overdose",
content:`<div class="narrative"><p>A <span class='highlight'>19-year-old woman</span> presents 4 hours after ingesting 30 tablets of extra-strength acetaminophen (500mg each = 15g total) in a suicide attempt.</p><div class="vital-signs"><div class="vital-item"><span class="label">HR</span><span class="value">92</span></div><div class="vital-item"><span class="label">BP</span><span class="value">118/72</span></div><div class="vital-item"><span class="label">Temp</span><span class="value">37.1°C</span></div></div></div>`,
hint_beginner:"What is the toxic dose of acetaminophen?",
hint_advanced:"Consider that the initial presentation may appear deceptively well — toxicity manifests in stages over 72 hours.",
question:{
prompt:"What is the minimum potentially toxic single dose of acetaminophen in adults?",
options:[{text:"150 mg/kg or 7.5-10g (whichever is less)",correct:true},{text:"Any amount above 1g",correct:false},{text:"500 mg/kg",correct:false},{text:"50 mg/kg",correct:false}],
explanation:{correct:"Correct! Doses ≥150 mg/kg (or ~7.5-10g in adults) are potentially toxic. This patient ingested 15g (~200 mg/kg) — clearly toxic. Importantly, patients may be asymptomatic for the first 24 hours despite developing severe hepatotoxicity.",incorrect:"Doses ≥150 mg/kg are potentially hepatotoxic. Early symptoms are often minimal — do not be falsely reassured."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">APAP Toxicity Stages</div><div class="pathway"><strong>Stage 1 (0-24h):</strong> Asymptomatic or mild nausea/vomiting/malaise<br><strong>Stage 2 (24-72h):</strong> RUQ pain, rising AST/ALT (hepatocellular injury begins)<br><strong>Stage 3 (72-96h):</strong> Peak hepatotoxicity — ALT can exceed 10,000. Coagulopathy, encephalopathy, renal failure, lactic acidosis<br><strong>Stage 4 (4-14 days):</strong> Recovery or death. Liver regenerates if patient survives.</div></div>`,
why_chain:[],
points:10
}
},{
title:"The Pathophysiology of Acetaminophen Od",
content:`<div class="narrative"><p>What metabolite causes liver damage?</p></div>`,
hint_beginner:"What metabolite causes liver damage?",
hint_advanced:"N-acetyl-p-benzoquinone imine (NAPQI) is normally detoxified by glutathione. In overdose, glutathione is depleted and NAPQI accumulates → hepatocyte necrosis.",
question:{
prompt:"What toxic metabolite causes acetaminophen-induced liver injury?",
options:[{text:"Glucuronide conjugate",correct:false},{text:"NAPQI (N-acetyl-p-benzoquinone imine) — accumulates when glutathione is depleted",correct:true},{text:"Acetaminophen itself (parent compound)",correct:false},{text:"Sulfate conjugate",correct:false}],
explanation:{correct:"Correct! At therapeutic doses, NAPQI is safely conjugated by glutathione. In overdose, glucuronidation and sulfation pathways saturate → more NAPQI produced via CYP2E1 → glutathione depleted → NAPQI binds hepatocyte proteins → centrilobular necrosis (zone 3).",incorrect:"NAPQI is the toxic metabolite. Glutathione depletion is the critical event that allows hepatocyte damage."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">NAPQI Pathway</div><div class="pathway"><strong>Normal:</strong> 90% of APAP → glucuronide/sulfate conjugation (safe). 5% → CYP2E1 → NAPQI → glutathione conjugation (safe).<br><strong>Overdose:</strong> Glucuronide/sulfate saturated → more NAPQI via CYP2E1 → glutathione depleted → NAPQI binds cellular proteins → hepatocyte necrosis (zone 3/centrilobular)<br><br><strong>Risk factors for toxicity at lower doses:</strong> Chronic alcohol (induces CYP2E1 + depletes glutathione), malnutrition, fasting</div></div>`,
why_chain:[],
points:10
}
},{
title:"The Rumack-Matthew Nomogram",
content:`<div class="narrative"><p>A 4-hour acetaminophen level returns at 250 mcg/mL. How do you interpret this?</p></div>`,
hint_beginner:"A 4-hour acetaminophen level returns at 250 mcg/mL. How do you interpret this?",
hint_advanced:"The nomogram starts at 4 hours. Plot the level and determine if NAC is indicated.",
question:{
prompt:"Using the Rumack-Matthew nomogram, a 4-hour APAP level of 250 mcg/mL falls in which zone?",
options:[{text:"Nomogram does not apply at 4 hours",correct:false},{text:"Indeterminate — recheck in 4 hours",correct:false},{text:"Above the treatment line — NAC is indicated",correct:true},{text:"Below the treatment line — observe only",correct:false}],
explanation:{correct:"Correct! The treatment line starts at 150 mcg/mL at 4 hours. At 250 mcg/mL, this patient is well above the line → start NAC immediately. The nomogram only applies to single acute ingestions with known time of ingestion.",incorrect:"Level 250 at 4 hours is above the treatment line (150 at 4h). Start NAC immediately."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Nomogram Rules</div><div class="pathway"><strong>Start at 4 hours:</strong> Levels before 4h are unreliable (absorption incomplete)<br><strong>Treatment line:</strong> 150 mcg/mL at 4h → 37.5 mcg/mL at 12h (linear on semilog scale)<br><strong>Above line:</strong> Start NAC<br><strong>Below line:</strong> Low risk (if single acute ingestion with reliable time)<br><br><strong>Does NOT apply:</strong> Chronic/repeated overdose, unknown time, extended-release formulations → treat empirically with NAC</div></div>`,
why_chain:[],
points:10
}
},{
title:"N-Acetylcysteine (NAC)",
content:`<div class="narrative"><p>NAC is the antidote. How does it work?</p></div>`,
hint_beginner:"NAC is the antidote. How does it work?",
hint_advanced:"NAC replenishes glutathione stores AND provides alternative NAPQI detoxification pathways.",
question:{
prompt:"What is the mechanism of N-acetylcysteine (NAC) in acetaminophen overdose?",
options:[{text:"Directly binds and neutralizes NAPQI in the bloodstream",correct:false},{text:"Inhibits CYP2E1 to prevent NAPQI formation",correct:false},{text:"Accelerates renal excretion of acetaminophen",correct:false},{text:"Replenishes hepatic glutathione stores and provides cysteine for NAPQI detoxification",correct:true}],
explanation:{correct:"Correct! NAC is a cysteine donor that replenishes glutathione. It also serves as a direct NAPQI scavenger and enhances sulfate conjugation of acetaminophen. Most effective if started within 8 hours but beneficial up to 72+ hours.",incorrect:"NAC replenishes glutathione, scavenges NAPQI directly, and enhances non-toxic acetaminophen metabolism."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">NAC Protocol</div><div class="pathway"><strong>IV protocol (21-hour):</strong> 150 mg/kg over 1h → 50 mg/kg over 4h → 100 mg/kg over 16h<br><strong>Oral (72-hour):</strong> 140 mg/kg loading → 70 mg/kg q4h × 17 additional doses<br><strong>Efficacy:</strong> Nearly 100% prevention of hepatotoxicity if started within 8h of ingestion<br><strong>Still beneficial:</strong> Up to 72+ hours post-ingestion (anti-inflammatory and antioxidant effects).<br><strong>Anaphylactoid reaction:</strong> 10-20% with IV NAC (not true allergy — rate-related). Slow infusion, antihistamines.</div></div>`,
why_chain:[],
points:10
}
},{
title:"Liver Failure Assessment",
content:`<div class="narrative"><p>At 48 hours, AST 8,400, INR 4.2, creatinine 2.1, pH 7.28. Is transplant needed?</p></div>`,
hint_beginner:"At 48 hours, AST 8,400, INR 4.2, creatinine 2.1, pH 7.28. Is transplant needed?",
hint_advanced:"Apply the Kings College Criteria for acetaminophen-induced acute liver failure.",
question:{
prompt:"Which finding is the single best prognostic indicator for acetaminophen-induced liver failure?",
options:[{text:"Arterial pH <7.30 after fluid resuscitation (Kings College Criteria)",correct:true},{text:"Peak AST >10,000",correct:false},{text:"INR >4.0 alone",correct:false},{text:"Creatinine >2.0 alone",correct:false}],
explanation:{correct:"Correct! Kings College Criteria for APAP-induced ALF: arterial pH <7.30 (after resuscitation) is sufficient alone. OR all three: INR >6.5 + creatinine >3.4 + grade III/IV encephalopathy. This patient meets the pH criterion → list for transplant.",incorrect:"Arterial pH <7.30 after resuscitation is the single strongest predictor of death without transplant in APAP-induced ALF."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Kings College Criteria (APAP)</div><div class="pathway"><strong>List for transplant if:</strong><br>• pH <7.30 after fluid resuscitation (single criterion is sufficient)<br>OR all three:<br>• INR >6.5<br>• Creatinine >3.4 mg/dL<br>• Grade III/IV hepatic encephalopathy<br><br><strong>Other poor prognostic signs:</strong> Lactate >3.5 after fluid resuscitation, phosphate >3.75 (impaired hepatic regeneration)</div></div>`,
why_chain:[],
points:10
}
},{
title:"Disposition & Prevention",
content:`<div class="narrative"><p>The patient survives with NAC. Before discharge, what is essential?</p></div>`,
hint_beginner:"The patient survives with NAC. Before discharge, what is essential?",
hint_advanced:"Address the psychiatric component — this was a suicide attempt. Psychiatric evaluation is mandatory.",
question:{
prompt:"What is the most important intervention before discharge?",
options:[{text:"Follow-up liver function tests only",correct:false},{text:"Psychiatric evaluation for suicidality and safety planning",correct:true},{text:"Advise to avoid acetaminophen permanently",correct:false},{text:"Prescription for antiemetics",correct:false}],
explanation:{correct:"Correct! This was a suicide attempt — psychiatric evaluation and safety planning are MANDATORY before discharge. Additionally: means restriction counseling (limit medication access), follow-up LFTs, and education that acetaminophen can be used safely at therapeutic doses after recovery.",incorrect:"Psychiatric evaluation is essential — this was an intentional overdose. Means restriction and safety planning save lives."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Post-Overdose Care</div><div class="pathway"><strong>Mandatory:</strong> Psychiatric evaluation, suicide risk assessment, safety planning<br><strong>Means restriction:</strong> Counsel on limiting access to medications (blister packs, small quantities)<br><strong>Medical follow-up:</strong> Repeat LFTs at 48-72h to confirm recovery<br><strong>Education:</strong> Acetaminophen max dose is 3-4g/day in adults. Watch for hidden sources (combination products like Vicodin, NyQuil, Excedrin)</div></div>`,
why_chain:[],
points:10
}
}];
document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hb=document.querySelector('.hint-box');if(hb)hb.style.display=d==='beginner'?'block':'none'}
function toggleReferences(){const c=document.getElementById('referencesContent');const t=document.getElementById('refToggle');if(c.style.display==='none'){c.style.display='block';t.innerHTML='&#9662;'}else{c.style.display='none';t.innerHTML='&#9656;'}}
function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100);document.getElementById('progress').style.width=pct+'%';let h='<h2 class="scene-title">'+st.title+'</h2>';h+='<div class="scene-content">'+st.content+'</div>';if(st.hint_beginner)h+='<div class="hint-box" id="hint-box"'+(difficulty==='beginner'?' style="display:block"':'')+'> '+st.hint_beginner+'</div>';if(difficulty==='advanced'&&st.hint_advanced)h+='<div class="hint-box" style="display:block;background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.15);color:#5b21b6"> '+st.hint_advanced+'</div>';if(st.question){h+='<div class="socratic-prompt"><h4>Clinical Question</h4><p>'+st.question.prompt+'</p></div>';h+='<div class="options-grid" id="options-'+idx+'">';st.question.options.forEach((opt,oi)=>{h+='<button class="option-btn" id="option-'+idx+'-'+oi+'" onclick="checkAnswer('+idx+','+oi+')">'+String.fromCharCode(65+oi)+'. '+opt.text+'</button>'});h+='</div>';h+='<div class="explanation-box" id="explain-'+idx+'"></div>';h+='<div id="teaching-'+idx+'" style="display:none">'+st.question.teaching+'</div>';if(st.question.why_chain&&st.question.why_chain.length>0){h+='<div id="why-'+idx+'" style="display:none">';st.question.why_chain.forEach((wc,wi)=>{h+='<div class="why-chain"><div class="why-q" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'"> '+wc.q+'</div><div class="why-a">'+wc.a+'</div></div>'});h+='</div>'}}h+='<button class="next-btn" id="next-'+idx+'" onclick="nextStage()">Continue &rarr;</button>';document.getElementById('scene-container').innerHTML=h}
function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll('#options-'+si+' .option-btn').forEach((b,i)=>{b.classList.add('disabled');if(st.question.options[i].correct)b.classList.add('correct');if(i===oi&&!opt.correct)b.classList.add('incorrect')});const eb=document.getElementById('explain-'+si);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;eb.className='explanation-box correct';eb.innerHTML='<strong>Correct!</strong> '+st.question.explanation.correct}else{eb.className='explanation-box incorrect';eb.innerHTML='<strong>Not quite.</strong> '+st.question.explanation.incorrect}eb.style.display='block';document.getElementById('teaching-'+si).style.display='block';const wy=document.getElementById('why-'+si);if(wy)wy.style.display='block';document.getElementById('next-'+si).style.display='inline-block'}
function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let lvl='Developing';if(pct>=90)lvl='Mastery';else if(pct>=70)lvl='Proficient';else if(pct>=50)lvl='Competent';document.getElementById('scene-container').innerHTML='<div class="completion-card"><h2>Case Complete!</h2><p style="font-size:2rem;font-weight:700;color:var(--rdx-teal,#2874a6)">'+pct+'%</p><p style="color:var(--rdx-text-muted,#64748b)">Score: '+score+'/'+mx+'</p><p style="margin:12px 0;font-weight:600">Level: '+lvl+'</p><div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="../adventure-hub.html" style="padding:10px 20px;background:var(--rdx-teal,#2874a6);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">More Cases</a><a href="../tools/learning-dashboard.html" style="padding:10px 20px;background:var(--rdx-purple,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">Dashboard</a><button onclick="currentStage=0;score=0;document.getElementById(\'score\').textContent=0;renderStage(0)" style="padding:10px 20px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;cursor:pointer;font-weight:600">Retry</button></div></div>';try{const progress=JSON.parse(localStorage.getItem('reasondx-progress')||'{}');if(!progress.cases)progress.cases={};progress.cases['acetaminophen-od']=Math.max(progress.cases['acetaminophen-od']||0,pct);localStorage.setItem('reasondx-progress',JSON.stringify(progress))}catch(e){}}
renderStage(0);</script>
