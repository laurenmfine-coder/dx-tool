    <script>
    let decisionPath = [];
let currentStage = 0, score = 0, difficulty = 'standard';
    const stages = [
    {
        title: "Peritonitis: The Surgical Abdomen",
        content: `<div class="narrative"><p>A <span class="highlight">45-year-old man</span> presents with severe abdominal pain that woke him from sleep. The pain started suddenly 4 hours ago and has been constant. He lies very still on the stretcher.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 115, BP 100/70, T 38.5°C, RR 24<br><strong>Exam:</strong> Rigid abdomen, diffuse tenderness, rebound and guarding in all quadrants, absent bowel sounds</p></div>
        <div class="alert-box"><div class="alert-title">🚨 Classic "Surgical Abdomen"</div><p>Lying still, rigid abdomen, diffuse peritoneal signs = generalized peritonitis requiring emergent surgery.</p></div>
        <div class="socratic-prompt"><h4>Pattern Recognition</h4><p>What distinguishes peritoneal irritation from visceral pain, and why does the patient lie still?</p></div>`,
        hint_beginner: "Movement exacerbates parietal peritoneal irritation. Visceral pain causes writhing.",
        hint_advanced: "What is the pathophysiology behind guarding and rigidity?",
        question: {
            prompt: "Which exam finding is MOST specific for peritonitis?",
            options: [
                { text: "Severe abdominal tenderness", correct: false },
                { text: "Involuntary guarding and rigidity", correct: true },
                { text: "Absent bowel sounds", correct: false },
                { text: "Rebound tenderness", correct: false }
            ],
            explanation: {
                correct: "Correct! Involuntary guarding (reflex muscle spasm) and rigidity are the most specific signs of peritonitis. The patient cannot voluntarily relax the abdominal muscles because of reflex contraction in response to peritoneal irritation.",
                incorrect: "Involuntary guarding/rigidity is most specific. Tenderness is sensitive but not specific. Absent bowel sounds and rebound are supportive but less specific. The board-style 'rigid abdomen' = peritonitis."
            },
            teaching: `<h4>Peritoneal Signs</h4><table class="comparison-table"><tr><th>Sign</th><th>What It Means</th></tr><tr style="background:rgba(239,68,68,0.2);"><td><strong>Involuntary guarding</strong></td><td>Reflex muscle spasm - MOST SPECIFIC</td></tr><tr><td><strong>Rigidity</strong></td><td>"Board-like" abdomen - severe peritonitis</td></tr><tr><td><strong>Rebound tenderness</strong></td><td>Pain worse on release - peritoneal irritation</td></tr><tr><td><strong>Referred rebound</strong></td><td>Pain elsewhere on release - localized peritonitis</td></tr></table>
<div class="mechanism-box"><div class="mechanism-title">🧬 Peritoneal vs Visceral Pain</div><div class="pathway">VISCERAL PAIN (from hollow/solid organs):
• Poorly localized, midline
• Crampy, colicky
• Patient WRITHES (movement doesn't worsen)

PARIETAL/PERITONEAL PAIN:
• Well-localized
• Sharp, constant
• Patient LIES STILL
• Worse with ANY movement (cough, bump bed)</div></div>`,
            why_chain: [{q: "Why does guarding occur?", a: "Peritoneal inflammation stimulates parietal peritoneum nerve fibers. This triggers a spinal reflex arc causing involuntary abdominal wall muscle contraction to 'splint' the inflamed area."}, {q: "What causes peritonitis?", a: "Perforation (most common), infection, blood, chemical irritation (bile, gastric acid, pancreatic enzymes). Any irritant in the peritoneal cavity triggers the inflammatory response."}],
            points: 10
        }
    },
    {
        title: "Mesenteric Ischemia: Pain Out of Proportion",
        content: `<div class="narrative"><p>A <span class="highlight">78-year-old woman</span> presents with sudden severe abdominal pain for 2 hours. PMH includes HTN, CHF, and <span class="critical">atrial fibrillation (on rate control, not anticoagulated due to fall risk)</span>.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 110 (irregular), BP 150/90, T 99.0°F<br><strong>Exam:</strong> Writhing in pain, very distressed. <span class="highlight">Abdomen: SOFT, mildly tender</span>, NO peritoneal signs, bowel sounds present<br><strong>Labs:</strong> WBC 14K, <span class="critical">lactate 4.5</span>, pH 7.28</p></div>
        <div class="alert-box"><div class="alert-title">🚨 "Pain Out of Proportion to Exam"</div><p>Severe pain + soft abdomen + AFib + elevated lactate = Mesenteric ischemia until proven otherwise!</p></div>
        <div class="socratic-prompt"><h4>The Dangerous Trap</h4><p>Why is the soft abdomen misleading, and why is this presentation an emergency?</p></div>`,
        hint_beginner: "Early ischemia affects only the inner layers of bowel wall. Peritoneum isn't involved yet.",
        hint_advanced: "What are the four types of mesenteric ischemia and their causes?",
        question: {
            prompt: "What is the classic clinical finding that suggests acute mesenteric ischemia?",
            options: [
                { text: "Rigid abdomen with absent bowel sounds", correct: false },
                { text: "Pain out of proportion to physical examination", correct: true },
                { text: "Bloody diarrhea with fever", correct: false },
                { text: "Localized RLQ tenderness", correct: false }
            ],
            explanation: {
                correct: "Correct! 'Pain out of proportion to exam' is the classic teaching. Severe, excruciating pain with a benign-appearing abdomen should terrify you - the ischemia hasn't yet caused full-thickness necrosis and peritonitis.",
                incorrect: "Pain out of proportion to exam is the hallmark. A soft abdomen does NOT rule out serious pathology! By the time peritonitis develops, the bowel is dead. The soft abdomen with severe pain should worry you more."
            },
            teaching: `<h4>Mesenteric Ischemia Types</h4><table class="comparison-table"><tr><th>Type</th><th>Cause</th><th>%</th></tr><tr><td><strong>Arterial embolism</strong></td><td>AFib, cardiac thrombus</td><td>50%</td></tr><tr><td><strong>Arterial thrombosis</strong></td><td>Atherosclerosis</td><td>25%</td></tr><tr><td><strong>Venous thrombosis</strong></td><td>Hypercoagulable states</td><td>5-15%</td></tr><tr><td><strong>NOMI</strong></td><td>Low-flow (shock, pressors)</td><td>20%</td></tr></table>
<div class="mechanism-box"><div class="mechanism-title">🧬 Why Exam is Benign Early</div><div class="pathway">PROGRESSION:
Early: Only mucosa ischemic (innermost)
→ Peritoneum NOT yet involved
→ No guarding, rigidity, rebound
→ Visceral pain = writhing

Later: Full-thickness necrosis
→ Peritoneum involved → Peritonitis
→ But by now bowel is DEAD
→ Much worse prognosis</div></div>`,
            why_chain: [{q: "Why is lactate elevated?", a: "Ischemic bowel produces lactic acid from anaerobic metabolism. Elevated lactate in this context is from gut ischemia, not sepsis (yet). Don't be reassured by a soft abdomen."}, {q: "What imaging is needed?", a: "CT angiography is test of choice. Shows occluded vessel, bowel wall changes, and complications. Time is bowel - get imaging emergently."}],
            points: 10
        }
    },
    {
        title: "Perforated Viscus",
        content: `<div class="narrative"><p>A <span class="highlight">62-year-old man</span> with known peptic ulcer disease presents with sudden-onset severe epigastric pain that rapidly became diffuse. He describes it as <span class="critical">"like being stabbed"</span> 6 hours ago.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 120, BP 90/60, T 38.8°C, RR 28<br><strong>Exam:</strong> Board-like rigidity, diffuse tenderness, absent bowel sounds<br><strong>CXR:</strong> <span class="critical">Free air under diaphragm</span></p></div>
        <div class="socratic-prompt"><h4>Pneumoperitoneum</h4><p>What does free air signify and what are the causes?</p></div>`,
        hint_beginner: "Free air under the diaphragm = perforation of a hollow viscus until proven otherwise.",
        hint_advanced: "What percentage of perforations show free air on upright CXR?",
        question: {
            prompt: "Free air under the diaphragm on upright chest X-ray indicates:",
            options: [
                { text: "Pneumothorax", correct: false },
                { text: "Perforated hollow viscus", correct: true },
                { text: "Subphrenic abscess", correct: false },
                { text: "Normal finding if recent laparoscopy", correct: false }
            ],
            explanation: {
                correct: "Correct! Pneumoperitoneum (free air in abdomen) is best seen on upright CXR. In the right clinical context, it indicates perforation requiring emergent surgery. Note: recent surgery/procedures can cause benign pneumoperitoneum.",
                incorrect: "Free air under the diaphragm indicates perforated hollow viscus. Pneumothorax shows air in chest, not under diaphragm. Abscess doesn't cause free air. Post-surgical air is benign but should be considered in context."
            },
            teaching: `<h4>Causes of Pneumoperitoneum</h4><table class="comparison-table"><tr><th>Pathologic</th><th>Benign</th></tr><tr><td>Perforated ulcer</td><td>Recent surgery/laparoscopy</td></tr><tr><td>Perforated diverticulitis</td><td>Recent endoscopy</td></tr><tr><td>Perforated appendicitis</td><td>Peritoneal dialysis</td></tr><tr><td>Bowel perforation (ischemia, obstruction)</td><td>Pneumatosis (may rupture)</td></tr><tr><td>Trauma</td><td>Barotrauma (rarely)</td></tr></table>
<div class="alert-box"><div class="alert-title">📊 Imaging Sensitivity</div><p>• Upright CXR: ~70-80% sensitive for free air<br>• Left lateral decubitus: Can detect as little as 1mL<br>• CT: Most sensitive (~95%)<br>• If high suspicion and CXR negative → get CT</p></div>`,
            why_chain: [{q: "Why upright CXR?", a: "Free air rises to the highest point - under the diaphragm when upright. This creates the visible crescent of air. Left lateral decubitus (lying on left side) lets air rise to right side for detection."}, {q: "Why do perforated ulcers cause peritonitis?", a: "Gastric acid and duodenal contents spill into the peritoneal cavity causing chemical peritonitis initially, then bacterial peritonitis as gut flora contaminate the space."}],
            points: 10
        }
    },

    function setDifficulty(d, btn) {
        difficulty = d;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.hint-beginner').forEach(h => h.style.display = d === 'beginner' ? 'block' : 'none');
        document.querySelectorAll('.hint-advanced').forEach(h => h.style.display = d === 'advanced' ? 'block' : 'none');
    }
    function updateProgress() {
        document.getElementById('progress').style.width = ((currentStage + 1) / stages.length * 100) + '%';
        document.getElementById('maxScore').textContent = stages.length * 10;
    }
    function renderStage() {
        const stage = stages[currentStage];
        const container = document.getElementById('scene-container');
        let html = `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${currentStage + 1} of ${stages.length}</div><div class="scene-title">${stage.title}</div></div>`;
        if (stage.hint_beginner) html += `<div class="hint-beginner" style="display:${difficulty === 'beginner' ? 'block' : 'none'}">🌱 <strong>Beginner Hint:</strong> ${stage.hint_beginner}</div>`;
        if (stage.hint_advanced) html += `<div class="hint-advanced" style="display:${difficulty === 'advanced' ? 'block' : 'none'}">🎯 <strong>Advanced Challenge:</strong> ${stage.hint_advanced}</div>`;
        html += stage.content;
        if (stage.question) {
            html += `<div class="question-box"><div class="question-prompt">${stage.question.prompt}</div><div class="mcq-options">`;
            stage.question.options.forEach((opt, i) => {
                html += `<div class="mcq-option" onclick="checkAnswer(${i}, ${opt.correct})"><div class="option-letter">${String.fromCharCode(65 + i)}</div><div>${opt.text}</div></div>`;
            });
            html += `</div><div class="feedback correct-feedback" id="fb-correct"><div class="feedback-title">✓ Correct!</div>${stage.question.explanation.correct}</div>`;
            html += `<div class="feedback incorrect-feedback" id="fb-incorrect"><div class="feedback-title">✗ Not quite</div>${stage.question.explanation.incorrect}</div>`;
            if (stage.question.teaching) html += `<div class="teaching-point" id="teaching">${stage.question.teaching}</div>`;
            if (stage.question.why_chain && stage.question.why_chain.length > 0) {
                html += `<div class="why-chain" id="why-chain"><h4>🔗 WHY Chain - Dig Deeper</h4>`;
                stage.question.why_chain.forEach(w => {
                    html += `<div class="why-item"><div class="why-q">${w.q}</div><div class="why-a">${w.a}</div></div>`;
                });
                html += `</div>`;
            }
            html += `<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>`;
        }
        html += `</div>`;
        container.innerHTML = html;
        updateProgress();
    }
    function checkAnswer(idx, correct) {
        const options = document.querySelectorAll('.mcq-option');
        if (options[0].classList.contains('disabled')) return;
        options.forEach((opt, i) => {
            opt.classList.add('disabled');
            if (stages[currentStage].question.options[i].correct) opt.classList.add('correct');
            else if (i === idx && !correct) opt.classList.add('incorrect');
        });
        if (correct) {
            document.getElementById('fb-correct').classList.add('show');
            score += stages[currentStage].question.points;
            document.getElementById('score').textContent = score;
        } else {
            document.getElementById('fb-incorrect').classList.add('show');
        }
        const teaching = document.getElementById('teaching');
        if (teaching) teaching.classList.add('show');
        const whyChain = document.getElementById('why-chain');
        if (whyChain) whyChain.classList.add('show');
        document.getElementById('next-btn').classList.add('show');
    }
    function nextStage() {
        if (currentStage < stages.length - 1) { currentStage++; renderStage(); window.scrollTo(0, 0); }
        else {
            document.getElementById('scene-container').innerHTML = `<div class="scene completion"><h2 style="color:var(--rdx-teal-dark,#0f766e);margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>${score}</strong> / ${stages.length * 10}</p><p style="margin-bottom:30px;">You've mastered Acute Abdomen!</p><div style="text-align:left;max-width:500px;margin:0 auto;"><h4 style="color:#fda4af;margin-bottom:12px;">Key Points:</h4><ul style="line-height:2;"><li>Peritoneal signs: guarding, rigidity = surgery</li><li>Pain out of proportion = mesenteric ischemia</li><li>Free air = perforated viscus</li><li>SBO: adhesions #1; watch for strangulation</li><li>LBO: cancer #1; cecum >12cm = danger</li></ul></div></div>`;
        }
    }
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#14b8a6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color: #0f766e;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
