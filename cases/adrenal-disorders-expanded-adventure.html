<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--rdx-font);background:var(--rdx-bg,#f8fafc);min-height:100vh;color:var(--rdx-text,#1e293b)}.container{max-width:800px;margin:0 auto;padding:20px}.progress-bar{background:var(--rdx-border,#e2e8f0);border-radius:8px;height:6px;margin-bottom:24px;overflow:hidden}.progress-fill{background:linear-gradient(90deg,#0d9488,#14b8a6);height:100%;border-radius:8px;transition:width 0.5s}.score-tracker{position:fixed;top:12px;right:60px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:8px 16px;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,0.08);display:flex;align-items:center;gap:8px;font-size:14px}.score-label{color:var(--rdx-text-muted,#64748b);font-size:12px}.score-value{font-weight:700;color:var(--rdx-teal,#0d9488);font-size:18px}.difficulty-panel{text-align:center;margin-bottom:20px}.diff-btn{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;font-weight:500;color:var(--rdx-text-muted,#64748b);transition:all 0.2s}.diff-btn.active{background:var(--rdx-teal,#0d9488);color:#fff;border-color:var(--rdx-teal,#0d9488)}.diff-btn:hover{border-color:var(--rdx-teal,#0d9488)}.scene-title{font-family:var(--rdx-font-serif);font-size:1.6rem;color:var(--rdx-teal-dark,#0f766e);margin-bottom:16px}.narrative{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:20px;margin-bottom:16px;line-height:1.7}.narrative .highlight{background:rgba(13,148,136,0.1);padding:2px 6px;border-radius:4px;font-weight:600}.narrative .critical{background:rgba(220,38,38,0.1);color:#dc2626;padding:2px 6px;border-radius:4px;font-weight:600}.vital-signs{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin:12px 0;padding:12px;background:rgba(13,148,136,0.04);border-radius:8px;border:1px solid rgba(13,148,136,0.1)}.vital-item{text-align:center;font-size:13px}.vital-item .label{color:var(--rdx-text-muted,#64748b);font-size:11px;display:block}.vital-item .value{font-weight:700;color:var(--rdx-teal-dark,#0f766e)}.socratic-prompt{background:linear-gradient(135deg,rgba(124,58,237,0.06),rgba(13,148,136,0.06));border:1px solid rgba(124,58,237,0.15);border-radius:12px;padding:16px 20px;margin:16px 0}.socratic-prompt h4{color:var(--rdx-purple,#7c3aed);font-size:0.95rem;margin-bottom:8px}.hint-box{background:rgba(217,119,6,0.06);border:1px solid rgba(217,119,6,0.15);border-radius:8px;padding:12px;margin:8px 0;font-size:0.9rem;color:#92400e;display:none}.options-grid{display:grid;gap:10px;margin:16px 0}.option-btn{background:var(--rdx-bg-card,#fff);border:2px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:14px 18px;cursor:pointer;text-align:left;font-size:14px;transition:all 0.2s;font-family:var(--rdx-font)}.option-btn:hover{border-color:var(--rdx-teal,#0d9488);background:rgba(13,148,136,0.03)}.option-btn.correct{border-color:#16a34a;background:rgba(22,163,74,0.06)}.option-btn.incorrect{border-color:#dc2626;background:rgba(220,38,38,0.04)}.option-btn.disabled{pointer-events:none;opacity:0.7}.explanation-box{border-radius:12px;padding:16px;margin:12px 0;display:none}.explanation-box.correct{background:rgba(22,163,74,0.06);border:1px solid rgba(22,163,74,0.2)}.explanation-box.incorrect{background:rgba(220,38,38,0.04);border:1px solid rgba(220,38,38,0.15)}.mechanism-box{background:linear-gradient(135deg,rgba(13,148,136,0.06),rgba(13,148,136,0.02));border:1px solid rgba(13,148,136,0.15);border-radius:12px;padding:20px;margin:16px 0}.mechanism-title{color:var(--rdx-teal-dark,#0f766e);font-weight:700;font-size:0.95rem;margin-bottom:10px}.pathway{line-height:1.8;font-size:0.93rem}.why-chain{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:12px;margin:8px 0}.why-q{font-weight:600;color:var(--rdx-purple,#7c3aed);cursor:pointer;font-size:0.9rem}.why-a{display:none;margin-top:6px;font-size:0.88rem;color:var(--rdx-text-muted,#64748b)}.next-btn{background:linear-gradient(135deg,#0f766e,#0d9488);color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:600;cursor:pointer;margin:20px 0;display:none;font-family:var(--rdx-font)}.next-btn:hover{opacity:0.9;transform:translateY(-1px)}.completion-card{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:16px;padding:32px;text-align:center;margin:24px 0}.completion-card h2{font-family:var(--rdx-font-serif);color:var(--rdx-teal-dark,#0f766e);margin-bottom:12px}.references-panel{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:16px;margin:20px 0}.references-panel a{display:block;color:var(--rdx-teal,#0d9488);font-size:13px;margin:4px 0;text-decoration:none}.references-panel a:hover{text-decoration:underline}.rdx-crossplatform-nav{background:var(--rdx-bg-card,#f8fafc);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:20px;margin:24px 0}.rdx-crossplatform-nav h4{color:var(--rdx-text-muted,#64748b);margin-bottom:12px;font-size:0.9rem}.rdx-crossplatform-links{display:flex;gap:12px;flex-wrap:wrap}.rdx-crossplatform-link{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:12px 16px;text-decoration:none;color:var(--rdx-text,#1e293b);font-size:13px;font-weight:500;transition:all 0.2s}.rdx-crossplatform-link:hover{background:rgba(13,148,136,0.05);transform:translateY(-2px)}@media(max-width:640px){.score-tracker{top:auto;bottom:12px;right:12px}.container{padding:12px}.vital-signs{grid-template-columns:repeat(3,1fr)}}</style>

<div class="score-tracker"><div class="score-label">Score</div><div><span class="score-value" id="score">0</span> / <span id="maxScore">0</span></div></div>
<div class="container">
<div style="margin-bottom:12px"><a href="../adventure-hub.html" style="color:var(--rdx-teal,#0d9488);text-decoration:none;font-size:14px;font-weight:600">Back to Cases</a></div>
<div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

<script>let currentStage=0,score=0,difficulty='standard';
const stages=[{
title:"The Fatigued Patient",
content:`<div class="narrative"><p>A 34-year-old woman with fatigue, weight loss, hyperpigmentation of palms and buccal mucosa, and hypotension for 3 months.</p><div class="vital-signs"><div class="vital-item"><span class="label">HR</span><span class="value">104</span></div><div class="vital-item"><span class="label">BP</span><span class="value">88/56</span></div><div class="vital-item"><span class="label">Temp</span><span class="value">36.8°C</span></div></div></div>`,
hint_beginner:"Hyperpigmentation + hypotension + salt cravings = classic triad.",
hint_advanced:"ACTH shares a precursor (POMC) with MSH — elevated ACTH in primary AI stimulates melanocytes.",
question:{
prompt:"What is the most likely diagnosis?",
options:[{text:"Primary adrenal insufficiency (Addison disease)",correct:true},{text:"Secondary adrenal insufficiency",correct:false},{text:"Hypothyroidism",correct:false},{text:"Pheochromocytoma",correct:false}],
explanation:{correct:"Correct! The triad of hyperpigmentation, hypotension, and salt craving is pathognomonic for primary AI. Elevated ACTH (from POMC) stimulates melanocyte receptors → diffuse hyperpigmentation, especially in palmar creases, buccal mucosa, and scars.",incorrect:"Hyperpigmentation distinguishes primary (high ACTH) from secondary AI (low ACTH, no hyperpigmentation)."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Primary vs Secondary AI</div><div class="pathway"><strong>Primary (Addison):</strong> Adrenal destruction → low cortisol + low aldosterone → high ACTH → hyperpigmentation. Causes: autoimmune (80%), TB, hemorrhage, metastases.<br><strong>Secondary:</strong> Pituitary/hypothalamic → low ACTH → low cortisol, normal aldosterone → NO hyperpigmentation. #1 cause: chronic exogenous glucocorticoid use.</div></div>`,
why_chain:[],
points:10
}
},{
title:"Confirming the Diagnosis",
content:`<div class="narrative"><p>Morning cortisol is 2.1 μg/dL. What confirmatory test is needed?</p></div>`,
hint_beginner:"Morning cortisol is 2.1 μg/dL. What confirmatory test is needed?",
hint_advanced:"The cosyntropin stimulation test is the gold standard for diagnosing AI.",
question:{
prompt:"What is the gold standard confirmatory test for adrenal insufficiency?",
options:[{text:"Insulin tolerance test",correct:false},{text:"Cosyntropin (ACTH) stimulation test — peak cortisol <18 μg/dL confirms AI",correct:true},{text:"24-hour urine cortisol",correct:false},{text:"Random cortisol level",correct:false}],
explanation:{correct:"Correct! Cosyntropin 250 μg IV → measure cortisol at 0 and 60 min. Peak <18 μg/dL confirms AI. Then check plasma ACTH: high = primary, low = secondary.",incorrect:"Cosyntropin stim test: peak cortisol <18 = AI. ACTH level distinguishes primary (high) from secondary (low)."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">ACTH Stim Test</div><div class="pathway"><strong>Procedure:</strong> Cosyntropin 250 μg IV → cortisol at 0, 30, 60 min<br><strong>Normal:</strong> Peak ≥18 μg/dL<br><strong>Primary AI:</strong> Low baseline, no rise. ACTH very high.<br><strong>Secondary AI:</strong> May partially rise (atrophied but intact adrenals). ACTH low.</div></div>`,
why_chain:[],
points:10
}
},{
title:"Electrolyte Pattern",
content:`<div class="narrative"><p>ACTH 892 pg/mL, Na 128, K 5.8. 21-OH antibodies positive.</p></div>`,
hint_beginner:"ACTH 892 pg/mL, Na 128, K 5.8. 21-OH antibodies positive.",
hint_advanced:"Aldosterone deficiency causes sodium wasting and potassium retention.",
question:{
prompt:"Which electrolyte abnormality is most dangerous acutely?",
options:[{text:"Both equally dangerous",correct:false},{text:"Hyponatremia alone",correct:false},{text:"Hyperkalemia (K 5.8) — cardiac risk",correct:true},{text:"Neither requires treatment",correct:false}],
explanation:{correct:"Correct! K 5.8 requires ECG and possible treatment for cardiac risk. Hyponatremia corrects with glucocorticoid/mineralocorticoid replacement.",incorrect:"Hyperkalemia at 5.8 is an immediate cardiac risk. Get ECG and prepare to treat."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Electrolytes in AI</div><div class="pathway"><strong>Primary AI:</strong> Hyponatremia (Na wasting + ADH elevation) + Hyperkalemia (loss of aldosterone K+ secretion) + Metabolic acidosis<br><strong>Secondary AI:</strong> Hyponatremia only (ADH effect), Normal K+ (aldosterone intact)</div></div>`,
why_chain:[],
points:10
}
},{
title:"Adrenal Crisis",
content:`<div class="narrative"><p>Patient becomes confused, BP drops to 72/40 despite fluids.</p></div>`,
hint_beginner:"Patient becomes confused, BP drops to 72/40 despite fluids.",
hint_advanced:"Adrenal crisis is a medical emergency — treat immediately, do not delay for diagnostic testing.",
question:{
prompt:"What is the FIRST medication in adrenal crisis?",
options:[{text:"IV fludrocortisone",correct:false},{text:"IV vasopressin",correct:false},{text:"IV dextrose",correct:false},{text:"IV hydrocortisone 100 mg bolus",correct:true}],
explanation:{correct:"Correct! Hydrocortisone 100 mg IV bolus immediately, then 50 mg q8h. At stress doses (>50 mg/day), hydrocortisone provides sufficient mineralocorticoid activity — no separate fludrocortisone needed acutely. Give NS bolus simultaneously.",incorrect:"IV hydrocortisone 100 mg is life-saving. Do NOT delay for diagnostic confirmation."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Crisis Management</div><div class="pathway"><strong>1.</strong> IV hydrocortisone 100 mg bolus<br><strong>2.</strong> NS 1-2L bolus (dextrose if hypoglycemic)<br><strong>3.</strong> Monitor K+ and ECG<br><strong>4.</strong> Then 50 mg IV q8h → taper to oral over days<br><strong>Precipitants:</strong> Infection, surgery, trauma, missed doses, GI illness</div></div>`,
why_chain:[],
points:10
}
},{
title:"Chronic Replacement",
content:`<div class="narrative"><p>Transitioning to lifelong oral replacement.</p></div>`,
hint_beginner:"Transitioning to lifelong oral replacement.",
hint_advanced:"Primary AI needs dual replacement: glucocorticoid + mineralocorticoid.",
question:{
prompt:"What is appropriate chronic replacement?",
options:[{text:"Hydrocortisone 15-25 mg/day divided + fludrocortisone 0.05-0.2 mg/day",correct:true},{text:"Hydrocortisone 100 mg daily",correct:false},{text:"Dexamethasone 4 mg daily",correct:false},{text:"Prednisone 5 mg daily alone",correct:false}],
explanation:{correct:"Correct! Physiologic replacement: HC 15-25 mg/day (⅔ AM, ⅓ PM to mimic circadian rhythm) + fludrocortisone for mineralocorticoid. Secondary AI needs only glucocorticoid (aldosterone is intact via RAAS).",incorrect:"Primary AI = dual replacement. HC divided to mimic circadian rhythm + fludrocortisone for aldosterone replacement."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Chronic AI Therapy</div><div class="pathway"><strong>Glucocorticoid:</strong> HC 15-25 mg/day (10-15 mg AM + 5-10 mg PM)<br><strong>Mineralocorticoid:</strong> Fludrocortisone 0.05-0.2 mg daily<br><strong>Sick-day rules:</strong> Double/triple oral dose for illness. IM HC 100 mg if vomiting.<br><strong>Medical alert:</strong> Bracelet + emergency injection kit mandatory</div></div>`,
why_chain:[],
points:10
}
},{
title:"Sick Day Rules",
content:`<div class="narrative"><p>Six months later, patient has gastroenteritis with vomiting and cannot take oral meds.</p></div>`,
hint_beginner:"Six months later, patient has gastroenteritis with vomiting and cannot take oral meds.",
hint_advanced:"Cannot absorb oral steroids if vomiting — must use parenteral route.",
question:{
prompt:"What is the correct advice?",
options:[{text:"Continue usual oral dose",correct:false},{text:"Administer IM hydrocortisone 100 mg and go to the ED",correct:true},{text:"Take double oral dose with sips of water",correct:false},{text:"Stop hydrocortisone temporarily",correct:false}],
explanation:{correct:"Correct! If unable to take oral meds due to vomiting, use emergency IM HC 100 mg injection and seek ED care for IV steroids and fluids. Every AI patient must have an emergency injection kit.",incorrect:"Vomiting = cannot absorb oral steroids = potential crisis. IM hydrocortisone + ED immediately."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Sick-Day Protocol</div><div class="pathway"><strong>Mild illness (oral OK):</strong> Double or triple HC dose<br><strong>Vomiting/cannot take oral:</strong> IM HC 100 mg + go to ED<br><strong>Surgery (minor):</strong> HC 25 mg IV at induction<br><strong>Surgery (major):</strong> HC 50-100 mg IV, then 50 mg q8h × 24-48h<br><strong>Must carry:</strong> Emergency kit, medical alert ID, steroid card</div></div>`,
why_chain:[],
points:10
}
}];
document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hb=document.querySelector('.hint-box');if(hb)hb.style.display=d==='beginner'?'block':'none'}
function toggleReferences(){const c=document.getElementById('referencesContent');const t=document.getElementById('refToggle');if(c.style.display==='none'){c.style.display='block';t.innerHTML='&#9662;'}else{c.style.display='none';t.innerHTML='&#9656;'}}
function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100);document.getElementById('progress').style.width=pct+'%';let h='<h2 class="scene-title">'+st.title+'</h2>';h+='<div class="scene-content">'+st.content+'</div>';if(st.hint_beginner)h+='<div class="hint-box" id="hint-box"'+(difficulty==='beginner'?' style="display:block"':'')+'> '+st.hint_beginner+'</div>';if(difficulty==='advanced'&&st.hint_advanced)h+='<div class="hint-box" style="display:block;background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.15);color:#5b21b6"> '+st.hint_advanced+'</div>';if(st.question){h+='<div class="socratic-prompt"><h4>Clinical Question</h4><p>'+st.question.prompt+'</p></div>';h+='<div class="options-grid" id="options-'+idx+'">';st.question.options.forEach((opt,oi)=>{h+='<button class="option-btn" id="option-'+idx+'-'+oi+'" onclick="checkAnswer('+idx+','+oi+')">'+String.fromCharCode(65+oi)+'. '+opt.text+'</button>'});h+='</div>';h+='<div class="explanation-box" id="explain-'+idx+'"></div>';h+='<div id="teaching-'+idx+'" style="display:none">'+st.question.teaching+'</div>';if(st.question.why_chain&&st.question.why_chain.length>0){h+='<div id="why-'+idx+'" style="display:none">';st.question.why_chain.forEach((wc,wi)=>{h+='<div class="why-chain"><div class="why-q" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'"> '+wc.q+'</div><div class="why-a">'+wc.a+'</div></div>'});h+='</div>'}}h+='<button class="next-btn" id="next-'+idx+'" onclick="nextStage()">Continue &rarr;</button>';document.getElementById('scene-container').innerHTML=h}
function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll('#options-'+si+' .option-btn').forEach((b,i)=>{b.classList.add('disabled');if(st.question.options[i].correct)b.classList.add('correct');if(i===oi&&!opt.correct)b.classList.add('incorrect')});const eb=document.getElementById('explain-'+si);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;eb.className='explanation-box correct';eb.innerHTML='<strong>Correct!</strong> '+st.question.explanation.correct}else{eb.className='explanation-box incorrect';eb.innerHTML='<strong>Not quite.</strong> '+st.question.explanation.incorrect}eb.style.display='block';document.getElementById('teaching-'+si).style.display='block';const wy=document.getElementById('why-'+si);if(wy)wy.style.display='block';document.getElementById('next-'+si).style.display='inline-block'}
function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let lvl='Developing';if(pct>=90)lvl='Mastery';else if(pct>=70)lvl='Proficient';else if(pct>=50)lvl='Competent';document.getElementById('scene-container').innerHTML='<div class="completion-card"><h2>Case Complete!</h2><p style="font-size:2rem;font-weight:700;color:var(--rdx-teal,#0d9488)">'+pct+'%</p><p style="color:var(--rdx-text-muted,#64748b)">Score: '+score+'/'+mx+'</p><p style="margin:12px 0;font-weight:600">Level: '+lvl+'</p><div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="../adventure-hub.html" style="padding:10px 20px;background:var(--rdx-teal,#0d9488);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">More Cases</a><a href="../tools/learning-dashboard.html" style="padding:10px 20px;background:var(--rdx-purple,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">Dashboard</a><button onclick="currentStage=0;score=0;document.getElementById(\'score\').textContent=0;renderStage(0)" style="padding:10px 20px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;cursor:pointer;font-weight:600">Retry</button></div></div>';try{const progress=JSON.parse(localStorage.getItem('reasondx-progress')||'{}');if(!progress.cases)progress.cases={};progress.cases['adrenal-disorders']=Math.max(progress.cases['adrenal-disorders']||0,pct);localStorage.setItem('reasondx-progress',JSON.stringify(progress))}catch(e){}}
renderStage(0);</script>
