    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"The Oncologic Emergency",content:'<div class="narrative"><p>A <span class="highlight">55-year-old woman</span> with AML, day 10 post-chemotherapy, presents with <span class="critical">fever 38.5°C</span>. She has a central line. CBC shows <span class="critical">ANC 200</span>.</p></div><div class="alert-box"><div class="alert-title">🚨 Neutropenic Fever = Medical Emergency</div><p>Time to antibiotics is critical. Mortality increases with each hour of delay.</p></div>',question:{prompt:"What defines neutropenic fever?",options:[{text:"ANC <1500 + fever >38°C",correct:false},{text:"ANC <500 (or expected to fall <500) + single temp ≥38.3°C or sustained ≥38.0°C",correct:true},{text:"WBC <4000 + any fever",correct:false},{text:"ANC <100 + hypothermia",correct:false}],explanation:{correct:"Correct! Neutropenic fever: ANC <500 (or expected to fall) PLUS temp ≥38.3°C once OR ≥38.0°C sustained for 1 hour. This is an emergency!",incorrect:"Definition: ANC <500 + fever ≥38.3°C (or sustained ≥38.0°C). ANC 500-1000 with expected nadir <500 also counts."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Definitions</div><div class="pathway">NEUTROPENIA:\n• ANC <500 cells/μL\n• OR ANC 500-1000 with expected decline\n\nFEVER:\n• Single temp ≥38.3°C (101°F)\n• OR sustained ≥38.0°C (100.4°F) for 1h\n\nANC = WBC × (% neutrophils + % bands)</div></div>',why_chain:[],points:10}},
        {title:"Time is Critical",content:'<div class="narrative"><p>You recognize neutropenic fever. How quickly must you act?</p></div>',question:{prompt:"What is the goal time to antibiotics in neutropenic fever?",options:[{text:"Within 4 hours",correct:false},{text:"Within 60 minutes of presentation",correct:true},{text:"After blood cultures return",correct:false},{text:"Within 24 hours",correct:false}],explanation:{correct:"Correct! Antibiotics within 60 minutes! Every hour of delay increases mortality. Don\'t wait for cultures to result - draw them, then give antibiotics immediately.",incorrect:"Within 60 minutes! Mortality increases with each hour of delay. Draw cultures then give antibiotics immediately."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 The Golden Hour</div><div class="pathway">MORTALITY increases with antibiotic delay!\n\nSTEPS (in order):\n1. Recognize neutropenic fever\n2. Draw blood cultures (peripheral + line)\n3. Give empiric antibiotics IMMEDIATELY\n4. Complete workup\n\nDO NOT wait for:\n• Culture results\n• Imaging\n• ID consultation\n• Complete physical exam</div></div>',why_chain:[],points:10}},
        {title:"Empiric Antibiotic Selection",content:'<div class="narrative"><p>You need to choose empiric antibiotics. This patient has a central line and is hemodynamically stable.</p></div>',question:{prompt:"What is the FIRST-LINE empiric antibiotic for neutropenic fever?",options:[{text:"Vancomycin + gentamicin",correct:false},{text:"Anti-pseudomonal beta-lactam monotherapy (cefepime, pip-tazo, meropenem)",correct:true},{text:"Ciprofloxacin + amoxicillin",correct:false},{text:"Azithromycin + ceftriaxone",correct:false}],explanation:{correct:"Correct! Anti-pseudomonal beta-lactam monotherapy: cefepime, piperacillin-tazobactam, or meropenem. Must cover Pseudomonas! Vancomycin only if specific indications.",incorrect:"Anti-pseudomonal beta-lactam monotherapy is first-line. Must cover Pseudomonas. Vanc only if specific indications."},teaching:'<h4>Empiric Antibiotics</h4><table class="comparison-table"><tr><th>First-Line (monotherapy)</th><th>Dose</th></tr><tr><td>Cefepime</td><td>2g IV q8h</td></tr><tr><td>Piperacillin-tazobactam</td><td>4.5g IV q6h</td></tr><tr><td>Meropenem</td><td>1g IV q8h</td></tr><tr><td>Imipenem-cilastatin</td><td>500mg IV q6h</td></tr></table><div class="alert-box"><div class="alert-title">⚠️ Must Cover Pseudomonas!</div><p>Pseudomonas bacteremia in neutropenic patients is rapidly fatal if not covered.</p></div>',why_chain:[],points:10}},
        {title:"When to Add Vancomycin",content:'<div class="narrative"><p>The patient has a tunneled central catheter with surrounding erythema. When should you add vancomycin?</p></div>',question:{prompt:"Which is an indication to ADD vancomycin to empiric therapy?",options:[{text:"All neutropenic fever patients",correct:false},{text:"Catheter site infection, skin/soft tissue infection, or hemodynamic instability",correct:true},{text:"Only if MRSA is cultured",correct:false},{text:"ANC <100",correct:false}],explanation:{correct:"Correct! Add vancomycin for: suspected catheter infection, skin/soft tissue infection, hemodynamic instability, known MRSA colonization, or severe mucositis. Not routine!",incorrect:"Vancomycin indications: catheter infection, skin infection, instability, MRSA colonization, severe mucositis. Not for everyone!"},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Vancomycin Indications</div><div class="pathway">ADD VANCOMYCIN if:\n• Catheter site infection\n• Skin/soft tissue infection\n• Hemodynamic instability\n• Known MRSA colonization\n• Severe mucositis\n• Gram-positive bacteremia pending ID\n• Pneumonia (cover MRSA)\n\nDO NOT add routinely!\n• No mortality benefit if no indication\n• Increases resistance, nephrotoxicity</div></div>',why_chain:[],points:10}},
        {title:"Risk Stratification: MASCC Score",content:'<div class="narrative"><p>Not all neutropenic fever is equal. Some patients can be treated as outpatients!</p></div>',question:{prompt:"What does the MASCC score predict?",options:[{text:"Need for ICU admission",correct:false},{text:"Risk of serious complications in febrile neutropenia",correct:true},{text:"Duration of neutropenia",correct:false},{text:"Response to antibiotics",correct:false}],explanation:{correct:"Correct! MASCC score predicts risk of complications. Score ≥21 = low risk (may be candidates for outpatient oral antibiotics). Score <21 = high risk (requires inpatient IV antibiotics).",incorrect:"MASCC predicts complication risk. High score (≥21) = low risk, may be outpatient candidates."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 MASCC Score</div><div class="pathway">SCORING (add points):\n• Mild/no symptoms: +5\n• No hypotension: +5\n• No COPD: +4\n• Solid tumor or no fungal infection: +4\n• No dehydration: +3\n• Outpatient at fever onset: +3\n• Age <60: +2\n\nSCORE ≥21: Low risk\n→ Consider oral outpatient therapy\n→ ciprofloxacin (Cipro) + amox-clav\n\nSCORE <21: High risk\n→ Inpatient IV antibiotics</div></div>',why_chain:[],points:10}},
        {title:"Persistent Fever",content:'<div class="narrative"><p>Day 4: Patient still febrile despite cefepime. Cultures negative. What now?</p></div>',question:{prompt:"After 4-7 days of persistent neutropenic fever with negative cultures, what should you ADD?",options:[{text:"Another antibacterial",correct:false},{text:"Empiric antifungal therapy",correct:true},{text:"Steroids",correct:false},{text:"G-CSF",correct:false}],explanation:{correct:"Correct! Persistent fever after 4-7 days = add empiric antifungal (usually anti-mold: voriconazole, liposomal amphotericin, or caspofungin). Fungal infections are occult in neutropenic patients.",incorrect:"Persistent fever after 4-7 days = add antifungal. Fungal infections (Aspergillus, Candida) are common in prolonged neutropenia."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Antifungal Coverage</div><div class="pathway">ADD ANTIFUNGAL if:\n• Fever persists 4-7 days on antibiotics\n• High-risk features for invasive fungal\n\nOPTIONS:\n• Caspofungin (echinocandin)\n• Voriconazole (if mold suspected)\n• Liposomal amphotericin B\n\nCONSIDER CT CHEST:\n• Halo sign = Aspergillus\n• Nodules, infiltrates</div></div>',why_chain:[],points:10}},
        {title:"Case Resolution",content:'<div class="narrative"><p>Your patient received cefepime within 30 minutes. Vancomycin was added for the catheter site infection. Blood cultures grew coag-negative staph from the line. She defervesced by day 3 and completed 14 days of antibiotics.</p></div><div class="mechanism-box"><div class="mechanism-title">📚 Neutropenic Fever Summary</div><div class="pathway">DEFINITION:\nANC <500 + Fever ≥38.3°C (or sustained 38.0°C)\n\nTIME IS CRITICAL:\nAntibiotics within 60 minutes!\n\nFIRST-LINE:\nAnti-pseudomonal beta-lactam monotherapy\n(cefepime, pip-tazo, meropenem)\n\nADD VANCOMYCIN if:\nCatheter infection, skin infection, unstable\n\nPERSISTENT FEVER (4-7 days):\nAdd empiric antifungal\n\nRISK STRATIFY:\nMASCC ≥21 = low risk (outpatient possible)</div></div>',question:{prompt:"What organism must ALWAYS be covered empirically in neutropenic fever?",options:[{text:"MRSA",correct:false},{text:"Pseudomonas aeruginosa",correct:true},{text:"Candida albicans",correct:false},{text:"Aspergillus",correct:false}],explanation:{correct:"Correct! Pseudomonas must always be covered. Pseudomonas bacteremia in neutropenic patients is rapidly fatal. This is why we use anti-pseudomonal beta-lactams first-line.",incorrect:"Pseudomonas must be covered - it is rapidly fatal in neutropenic patients. That\'s why we use cefepime, pip-tazo, or meropenem."},teaching:'<h4>Key Takeaways</h4><ul style="line-height:2;margin-left:20px;"><li>ANC <500 + fever = emergency</li><li>Antibiotics within 60 minutes</li><li>Must cover Pseudomonas</li><li>Vancomycin only if specific indication</li><li>MASCC ≥21 = low risk</li><li>Persistent fever → add antifungal</li></ul>',why_chain:[],points:10}},
        {title:"Clinical Integration",content:'<div class="narrative"><p>You synthesize all the clinical information to ensure optimal patient care.</p></div>',question:{prompt:"What principle is MOST important for excellent clinical outcomes?",options:[{text:"Integrating clinical presentation with evidence-based guidelines while reassessing response to treatment",correct:true},{text:"Following protocols exactly without clinical judgment",correct:false},{text:"Ordering comprehensive testing to avoid any missed diagnoses",correct:false},{text:"Making a diagnosis quickly and committing to it without reconsideration",correct:false}],explanation:{correct:"Excellent clinical care combines systematic assessment, evidence-based treatment, and ongoing reassessment. Guidelines inform but don't replace clinical reasoning.",incorrect:"Good clinical care requires flexibility, reassessment, and integration of guidelines with patient-specific factors."},teaching:'<h4>Clinical Reasoning</h4><ul><li>Systematic data gathering</li><li>Evidence-based management</li><li>Regular reassessment</li><li>Patient-centered communication</li></ul>',why_chain:[],points:10}}
    ];
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:var(--rdx-teal-dark,#0f766e);margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><p>You mastered Neutropenic Fever!</p></div>';}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#14b8a6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color: #0f766e;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}

</script>
