    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"The Colicky Infant",content:'<div class="narrative"><p>A <span class="highlight">9-month-old boy</span> presents with <span class="critical">episodic crying and drawing up of legs</span>. Episodes last a few minutes, then he becomes quiet. Parents note a recent viral illness. He had one episode of <span class="critical">currant jelly stool</span>.</p></div><div class="alert-box"><div class="alert-title">🚨 Think Intussusception!</div><p>Most common cause of intestinal obstruction in children 6 months - 3 years.</p></div>',question:{prompt:"What is the CLASSIC triad of intussusception?",options:[{text:"Fever, vomiting, diarrhea",correct:false},{text:"Episodic colicky pain, vomiting, currant jelly stools",correct:true},{text:"Bilious vomiting, abdominal distension, constipation",correct:false},{text:"Bloody diarrhea, fever, tenesmus",correct:false}],explanation:{correct:"Correct! Classic triad: episodic colicky abdominal pain (drawing up legs), vomiting, and currant jelly stools (blood + mucus). But the full triad is present in only ~20% of cases!",incorrect:"Classic triad: colicky pain + vomiting + currant jelly stool. But only ~20% have all three - don\'t wait for complete triad!"},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Classic Presentation</div><div class="pathway">CLASSIC TRIAD (only ~20% have all):\n• Episodic colicky pain\n  (crying, drawing up legs)\n• Vomiting\n• Currant jelly stools\n  (blood + mucus = late finding!)\n\nOTHER FEATURES:\n• Lethargy (may be only sign!)\n• Pallor during episodes\n• "Sausage-shaped" RUQ mass\n• Empty RLQ (Dance sign)\n\nPEAK AGE: 6-18 months</div></div>',why_chain:[],points:10}},
        {title:"Pathophysiology",content:'<div class="narrative"><p>Understanding what happens anatomically helps recognize this condition.</p></div>',question:{prompt:"What is the MOST common type of intussusception in children?",options:[{text:"Jejunojejunal",correct:false},{text:"Ileocolic (ileum into colon)",correct:true},{text:"Colocolic",correct:false},{text:"Ileoileal",correct:false}],explanation:{correct:"Correct! Ileocolic intussusception (ileum telescopes into colon at the ileocecal valve) accounts for ~90% of pediatric cases. Lead point is usually lymphoid hyperplasia from viral illness.",incorrect:"Ileocolic is most common (~90%). Ileum telescopes into colon. Usually no pathologic lead point in children (viral lymphoid hyperplasia)."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Mechanism</div><div class="pathway">INTUSSUSCEPTION:\nOne bowel segment telescopes into another\n\nILEOCOLIC (~90%):\nTerminal ileum → cecum/ascending colon\n\nLEAD POINT:\n• Children: Usually none (idiopathic)\n  - Lymphoid hyperplasia (viral)\n  - Peyer patches\n• Adults/older children: Usually pathologic\n  - Meckel diverticulum\n  - Polyp, tumor, lymphoma\n\nCOMPLICATIONS:\nVenous congestion → edema → arterial\ncompromise → ischemia → necrosis</div></div>',why_chain:[],points:10}},
        {title:"Diagnosis",content:'<div class="narrative"><p>You suspect intussusception. What imaging do you order?</p></div>',question:{prompt:"What is the BEST initial imaging for suspected intussusception?",options:[{text:"Plain abdominal X-ray",correct:false},{text:"Ultrasound",correct:true},{text:"CT scan",correct:false},{text:"Contrast enema",correct:false}],explanation:{correct:"Correct! Ultrasound is first-line - highly sensitive and specific. Look for the \"target sign\" (donut sign) on transverse view and \"pseudokidney sign\" on longitudinal view.",incorrect:"Ultrasound is first-line. Target sign (donut) on transverse, pseudokidney on longitudinal. Highly accurate."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Imaging Findings</div><div class="pathway">ULTRASOUND (first-line):\n• "Target sign" or "donut sign"\n  (transverse view)\n• "Pseudokidney sign"\n  (longitudinal view)\n• Sensitivity/specificity ~100%\n\nX-RAY:\n• May show soft tissue mass\n• Paucity of gas in RLQ\n• Signs of obstruction\n• Often normal early!\n\nCONTRAST ENEMA:\n• Diagnostic AND therapeutic\n• "Coiled spring" or "claw sign"</div></div>',why_chain:[],points:10}},
        {title:"Treatment: Air Enema Reduction",content:'<div class="narrative"><p>Ultrasound confirms ileocolic intussusception. The child is hemodynamically stable with no peritonitis.</p></div>',question:{prompt:"What is the FIRST-LINE treatment for uncomplicated intussusception?",options:[{text:"Immediate surgery",correct:false},{text:"Air or contrast enema reduction",correct:true},{text:"IV antibiotics and observation",correct:false},{text:"NG decompression only",correct:false}],explanation:{correct:"Correct! Air enema (pneumatic reduction) or contrast enema is first-line for stable patients without peritonitis or perforation. Success rate ~80-90%. Surgery reserved for failed reduction or complications.",incorrect:"Enema reduction (air or contrast) is first-line. ~80-90% success rate. Surgery if failed or complicated."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Enema Reduction</div><div class="pathway">FIRST-LINE: AIR ENEMA REDUCTION\n\nREQUIREMENTS:\n• Hemodynamically stable\n• No peritonitis\n• No perforation\n• Surgical backup available\n\nSUCCESS RATE: 80-90%\n\nCONTRAINDICATIONS:\n• Peritonitis\n• Perforation\n• Profound shock\n• Prolonged symptoms (>48h)\n\nRecurrence: ~10% (usually within 72h)</div></div>',why_chain:[],points:10}},
        {title:"Surgical Indications",content:'<div class="narrative"><p>When does intussusception require surgery?</p></div>',question:{prompt:"Which is an indication for SURGICAL management?",options:[{text:"First episode of intussusception",correct:false},{text:"Peritonitis or failed enema reduction",correct:true},{text:"Age over 12 months",correct:false},{text:"Presence of vomiting",correct:false}],explanation:{correct:"Correct! Surgery for: peritonitis, perforation, failed enema reduction, shock unresponsive to resuscitation, or pathologic lead point. Manual reduction ± bowel resection.",incorrect:"Surgery if: peritonitis, perforation, failed reduction, shock, pathologic lead point."},teaching:'<h4>Surgical Indications</h4><table class="comparison-table"><tr><th>Indication</th></tr><tr><td>Peritonitis</td></tr><tr><td>Perforation</td></tr><tr><td>Failed enema reduction (2-3 attempts)</td></tr><tr><td>Shock unresponsive to resuscitation</td></tr><tr><td>Pathologic lead point suspected</td></tr><tr><td>Prolonged symptoms with ischemia concern</td></tr><tr><td>Recurrent intussusception (consider lead point)</td></tr></table>',why_chain:[],points:10}},
        {title:"Red Flags",content:'<div class="narrative"><p>What features suggest a pathologic lead point requiring surgery?</p></div>',question:{prompt:"Which feature suggests a PATHOLOGIC LEAD POINT?",options:[{text:"Age 9 months",correct:false},{text:"Recent viral illness",correct:false},{text:"Age >3 years or recurrent episodes",correct:true},{text:"Currant jelly stool",correct:false}],explanation:{correct:"Correct! Pathologic lead point more likely with: age >3 years, recurrent intussusception, or ileoileal type. Consider Meckel diverticulum, polyp, lymphoma, Henoch-Schönlein purpura.",incorrect:"Age >3 or recurrent = think pathologic lead point (Meckel, polyp, lymphoma). Typical 6-18 month old usually has idiopathic."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Pathologic Lead Points</div><div class="pathway">SUSPECT IF:\n• Age >3 years\n• Recurrent intussusception\n• Ileoileal (not ileocolic)\n• Failed reduction\n\nCAUSES:\n• Meckel diverticulum\n• Intestinal polyp\n• Lymphoma\n• Duplication cyst\n• HSP (Henoch-Schönlein purpura)\n\n→ Surgical exploration indicated</div></div>',why_chain:[],points:10}},
        {title:"Case Resolution",content:'<div class="narrative"><p>Your patient underwent successful air enema reduction. He was observed overnight with return of normal bowel function. Discharged with return precautions for recurrence (~10% risk).</p></div><div class="mechanism-box"><div class="mechanism-title">📚 Intussusception Summary</div><div class="pathway">PEAK AGE: 6-18 months\n\nCLASSIC TRIAD (only 20%):\nColicky pain + vomiting + currant jelly stool\n\nDIAGNOSIS:\nUltrasound - target/donut sign\n\nTREATMENT:\n• First-line: Air/contrast enema reduction\n• Surgery if: peritonitis, perforation, failed\n\nRED FLAGS for pathologic lead point:\n• Age >3 years\n• Recurrent episodes\n• Ileoileal type</div></div>',question:{prompt:"A 5-year-old has recurrent intussusception. What should you consider?",options:[{text:"This is typical for his age",correct:false},{text:"Pathologic lead point - needs surgical exploration",correct:true},{text:"Repeat enema reduction only",correct:false},{text:"Observation without intervention",correct:false}],explanation:{correct:"Correct! Age >3 + recurrent = high suspicion for pathologic lead point (Meckel, polyp, tumor). Surgical exploration to identify and remove lead point.",incorrect:"Recurrent + older child = suspect pathologic lead point. Needs surgical exploration."},teaching:'<h4>Key Takeaways</h4><ul style="line-height:2;margin-left:20px;"><li>Peak age 6-18 months</li><li>Classic triad in only ~20%</li><li>Lethargy may be only sign!</li><li>Ultrasound is first-line (target sign)</li><li>Air enema reduction ~80-90% success</li><li>Surgery if peritonitis/failed reduction</li><li>Age >3 or recurrent → pathologic lead point</li></ul>',why_chain:[],points:10}},
        {title:"Clinical Integration",content:'<div class="narrative"><p>You synthesize all the clinical information to ensure optimal patient care.</p></div>',question:{prompt:"What principle is MOST important for excellent clinical outcomes?",options:[{text:"Integrating clinical presentation with evidence-based guidelines while reassessing response to treatment",correct:true},{text:"Following protocols exactly without clinical judgment",correct:false},{text:"Ordering comprehensive testing to avoid any missed diagnoses",correct:false},{text:"Making a diagnosis quickly and committing to it without reconsideration",correct:false}],explanation:{correct:"Excellent clinical care combines systematic assessment, evidence-based treatment, and ongoing reassessment. Guidelines inform but don't replace clinical reasoning.",incorrect:"Good clinical care requires flexibility, reassessment, and integration of guidelines with patient-specific factors."},teaching:'<h4>Clinical Reasoning</h4><ul><li>Systematic data gathering</li><li>Evidence-based management</li><li>Regular reassessment</li><li>Patient-centered communication</li></ul>',why_chain:[],points:10}}
    ];
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:var(--rdx-teal-dark,#0f766e);margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><p>You mastered Intussusception!</p></div>';}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#14b8a6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color: #0f766e;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
