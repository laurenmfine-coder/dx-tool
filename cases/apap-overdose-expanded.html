    <script>
    let decisionPath = [];
let currentStage = 0, score = 0, difficulty = 'standard';
    const stages = [
    {
        title: "The Intentional Ingestion",
        content: `<div class="narrative"><p>A <span class="highlight">22-year-old woman</span> presents 6 hours after ingesting <span class="critical">"a whole bottle of acetaminophen (Tylenol)"</span> following an argument with her boyfriend. She estimates ~30 extra-strength tablets (500mg each = ~15g total).</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 88, BP 118/72, T 98.6°F<br><strong>Exam:</strong> Mild nausea, otherwise appears well<br><strong>Labs pending:</strong> APAP level, LFTs, INR, BMP</p></div>
        <div class="alert-box"><div class="alert-title">🚨 Patients Look WELL Early!</div><p>APAP toxicity is insidious. Patients are often asymptomatic in the first 24 hours despite ongoing hepatic damage. Don't be falsely reassured!</p></div>
        <div class="socratic-prompt"><h4>Initial Assessment</h4><p>Why is this presentation concerning despite the patient looking well?</p></div>`,
        hint_beginner: "APAP toxicity has a deceptive 'honeymoon' period where patients feel fine.",
        hint_advanced: "What is the threshold for potentially toxic single ingestion?",
        question: {
            prompt: "What is the minimum SINGLE ACUTE ingestion of acetaminophen considered potentially toxic?",
            options: [
                { text: "50 mg/kg or 4g total", correct: false },
                { text: "150 mg/kg or 7.5g total", correct: true },
                { text: "250 mg/kg or 15g total", correct: false },
                { text: "Any amount above the daily maximum (4g)", correct: false }
            ],
            explanation: {
                correct: "Correct! Single acute ingestion of >150 mg/kg or >7.5-10g is potentially toxic. This patient ingested ~15g - clearly in the toxic range.",
                incorrect: "The toxic threshold for single acute ingestion is >150 mg/kg or >7.5-10g. At >250 mg/kg, serious toxicity is likely. This patient's 15g ingestion is definitely concerning."
            },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">🧬 Toxic Doses</div><div class="pathway">SINGLE acute ingestion:
• >150 mg/kg or >7.5-10g = potentially toxic
• >250 mg/kg or >12g = serious toxicity likely

This patient: 15g ingested = TOXIC RANGE

Remember: Many products contain APAP!
• hydrocodone-acetaminophen (Vicodin), oxycodone-acetaminophen (Percocet) (opioid combinations)
• NyQuil, Excedrin, cold medicines
• Always ask specifically about ALL products</div></div>`,
            why_chain: [{q: "Why do patients feel fine initially?", a: "In Stage I (0-24 hours), the liver is being damaged but hasn't failed yet. Symptoms are nonspecific (nausea, malaise) or absent. This is the critical window for treatment."}, {q: "What's the maximum recommended daily dose?", a: "4g/day in healthy adults, 3g/day in chronic alcohol users or those with liver disease. Exceeding this repeatedly can cause chronic toxicity."}],
            points: 10
        }
    },
    {
        title: "The Toxic Metabolite: NAPQI",
        content: `<div class="narrative"><p>Understanding APAP toxicity requires knowing how the drug is metabolized and what goes wrong in overdose.</p></div>
        <div class="socratic-prompt"><h4>Mechanism of Toxicity</h4><p>How does acetaminophen cause liver damage, and why is N-acetylcysteine (NAC) the antidote?</p></div>`,
        hint_beginner: "NAPQI is the toxic metabolite. Glutathione normally detoxifies it.",
        hint_advanced: "What conditions increase NAPQI production or decrease glutathione stores?",
        question: {
            prompt: "What is the mechanism of acetaminophen hepatotoxicity?",
            options: [
                { text: "Direct hepatocyte membrane damage by APAP itself", correct: false },
                { text: "Glutathione depletion allowing NAPQI to damage hepatocytes", correct: true },
                { text: "Immune-mediated hepatocyte destruction", correct: false },
                { text: "Biliary obstruction from APAP crystals", correct: false }
            ],
            explanation: {
                correct: "Correct! In overdose, normal metabolic pathways saturate. More APAP is converted to NAPQI by CYP2E1. When glutathione is depleted (>70%), NAPQI binds hepatocytes causing cell death.",
                incorrect: "NAPQI (N-acetyl-p-benzoquinone imine) is the toxic metabolite. Normally detoxified by glutathione, but in overdose, glutathione depletes and NAPQI causes hepatocyte necrosis."
            },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">🧬 APAP Metabolism</div><div class="pathway">Normal metabolism:
APAP → (90%) Glucuronidation/Sulfation
     → Non-toxic metabolites → Urine

APAP → (5-10%) CYP2E1 (P450)
     → NAPQI (toxic!)
     → + Glutathione
     → Non-toxic mercapturic acid → Urine

IN OVERDOSE:
• Glucuronidation/sulfation SATURATE
• More APAP shunted to CYP2E1
• More NAPQI produced
• Glutathione DEPLETED
• NAPQI binds hepatocytes → CELL DEATH</div></div>
<div class="alert-box"><div class="alert-title">💡 NAC = Glutathione Donor!</div><p>N-acetylcysteine replenishes glutathione stores, allowing continued detoxification of NAPQI. Most effective within 8 hours but beneficial up to 24+ hours!</p></div>`,
            why_chain: [{q: "What conditions deplete glutathione?", a: "Malnutrition, fasting, chronic alcohol use, HIV/AIDS. These patients are at higher risk for toxicity at lower doses."}, {q: "What induces CYP2E1?", a: "Chronic alcohol use, isoniazid, phenobarbital, phenytoin. These patients produce MORE NAPQI from the same APAP dose."}],
            points: 10
        }
    },
    {
        title: "Four Stages of Toxicity",
        content: `<div class="narrative"><p>APAP toxicity follows a predictable clinical course. Understanding these stages is crucial for management and prognosis.</p></div>
        <div class="socratic-prompt"><h4>Clinical Stages</h4><p>What are the four stages of acetaminophen toxicity, and why is Stage I deceptive?</p></div>`,
        hint_beginner: "Stage I is the 'honeymoon' - patients feel fine despite ongoing liver damage.",
        hint_advanced: "What lab abnormalities appear in Stage II and how high can AST/ALT go?",
        question: {
            prompt: "During which stage of APAP toxicity do patients typically appear WELL despite ongoing hepatic damage?",
            options: [
                { text: "Stage I (0-24 hours)", correct: true },
                { text: "Stage II (24-72 hours)", correct: false },
                { text: "Stage III (72-96 hours)", correct: false },
                { text: "Stage IV (4-14 days)", correct: false }
            ],
            explanation: {
                correct: "Correct! Stage I is deceptive - patients have nonspecific symptoms (nausea, malaise) or are asymptomatic. Labs may be normal. This is the critical window for NAC treatment.",
                incorrect: "Stage I (0-24 hours) is when patients look well. By Stage II, AST/ALT are rising. Stage III is peak hepatotoxicity. Stage IV is recovery or death."
            },
            teaching: `<h4>Clinical Stages - BOARDS FAVORITE</h4><table class="comparison-table"><tr><th>Stage</th><th>Time</th><th>Features</th></tr><tr style="background:rgba(251,191,36,0.2);"><td><strong>I</strong></td><td>0-24 hours</td><td>Asymptomatic OR nonspecific (N/V, malaise). Labs often normal!</td></tr><tr><td><strong>II</strong></td><td>24-72 hours</td><td>RUQ pain, ↑ AST/ALT (can be >10,000!), ↑ PT/INR, ↑ bilirubin</td></tr><tr style="background:rgba(239,68,68,0.2);"><td><strong>III</strong></td><td>72-96 hours</td><td>Peak hepatotoxicity. May develop ALF: coagulopathy, encephalopathy, renal failure</td></tr><tr><td><strong>IV</strong></td><td>4-14 days</td><td>Recovery OR death. If survive, liver regenerates completely</td></tr></table>`,
            why_chain: [{q: "Why do patients look well in Stage I?", a: "Hepatocyte damage is occurring but hasn't reached critical mass. The liver has tremendous reserve. Clinical and lab findings lag behind the pathophysiology."}, {q: "What AST/ALT levels are seen?", a: "Can exceed 10,000 IU/L - among the highest seen in any liver disease. The degree of elevation doesn't necessarily correlate with prognosis."}],
            points: 10
        }
    },
    {
        title: "The Rumack-Matthew Nomogram",
        content: `<div class="narrative"><p>Your patient's APAP level returns: <span class="critical">180 mcg/mL at 6 hours post-ingestion</span>. You need to determine if NAC is indicated.</p></div>
        <div class="socratic-prompt"><h4>Risk Stratification</h4><p>How do you use the nomogram to determine treatment, and what are its limitations?</p></div>`,
        hint_beginner: "Plot the APAP level against time. If above the treatment line, give NAC.",
        hint_advanced: "When is the nomogram NOT valid?",
        question: {
            prompt: "The Rumack-Matthew nomogram is ONLY valid for which scenario?",
            options: [
                { text: "Any acetaminophen ingestion", correct: false },
                { text: "Single acute ingestion with KNOWN time of ingestion", correct: true },
                { text: "Chronic supratherapeutic ingestion", correct: false },
                { text: "Ingestion with co-ingestants", correct: false }
            ],

    function setDifficulty(d, btn) {
        difficulty = d;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.hint-beginner').forEach(h => h.style.display = d === 'beginner' ? 'block' : 'none');
        document.querySelectorAll('.hint-advanced').forEach(h => h.style.display = d === 'advanced' ? 'block' : 'none');
    }
    function updateProgress() {
        document.getElementById('progress').style.width = ((currentStage + 1) / stages.length * 100) + '%';
        document.getElementById('maxScore').textContent = stages.length * 10;
    }
    function renderStage() {
        const stage = stages[currentStage];
        const container = document.getElementById('scene-container');
        let html = `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${currentStage + 1} of ${stages.length}</div><div class="scene-title">${stage.title}</div></div>`;
        if (stage.hint_beginner) html += `<div class="hint-beginner" style="display:${difficulty === 'beginner' ? 'block' : 'none'}">🌱 <strong>Beginner Hint:</strong> ${stage.hint_beginner}</div>`;
        if (stage.hint_advanced) html += `<div class="hint-advanced" style="display:${difficulty === 'advanced' ? 'block' : 'none'}">🎯 <strong>Advanced Challenge:</strong> ${stage.hint_advanced}</div>`;
        html += stage.content;
        if (stage.question) {
            html += `<div class="question-box"><div class="question-prompt">${stage.question.prompt}</div><div class="mcq-options">`;
            stage.question.options.forEach((opt, i) => {
                html += `<div class="mcq-option" onclick="checkAnswer(${i}, ${opt.correct})"><div class="option-letter">${String.fromCharCode(65 + i)}</div><div>${opt.text}</div></div>`;
            });
            html += `</div><div class="feedback correct-feedback" id="fb-correct"><div class="feedback-title">✓ Correct!</div>${stage.question.explanation.correct}</div>`;
            html += `<div class="feedback incorrect-feedback" id="fb-incorrect"><div class="feedback-title">✗ Not quite</div>${stage.question.explanation.incorrect}</div>`;
            if (stage.question.teaching) html += `<div class="teaching-point" id="teaching">${stage.question.teaching}</div>`;
            if (stage.question.why_chain && stage.question.why_chain.length > 0) {
                html += `<div class="why-chain" id="why-chain"><h4>🔗 WHY Chain - Dig Deeper</h4>`;
                stage.question.why_chain.forEach(w => {
                    html += `<div class="why-item"><div class="why-q">${w.q}</div><div class="why-a">${w.a}</div></div>`;
                });
                html += `</div>`;
            }
            html += `<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>`;
        }
        html += `</div>`;
        container.innerHTML = html;
        updateProgress();
    }
    function checkAnswer(idx, correct) {
        const options = document.querySelectorAll('.mcq-option');
        if (options[0].classList.contains('disabled')) return;
        options.forEach((opt, i) => {
            opt.classList.add('disabled');
            if (stages[currentStage].question.options[i].correct) opt.classList.add('correct');
            else if (i === idx && !correct) opt.classList.add('incorrect');
        });
        if (correct) {
            document.getElementById('fb-correct').classList.add('show');
            score += stages[currentStage].question.points;
            document.getElementById('score').textContent = score;
        } else {
            document.getElementById('fb-incorrect').classList.add('show');
        }
        const teaching = document.getElementById('teaching');
        if (teaching) teaching.classList.add('show');
        const whyChain = document.getElementById('why-chain');
        if (whyChain) whyChain.classList.add('show');
        document.getElementById('next-btn').classList.add('show');
    }
    function nextStage() {
        if (currentStage < stages.length - 1) { currentStage++; renderStage(); window.scrollTo(0, 0); }
        else {
            document.getElementById('scene-container').innerHTML = `<div class="scene completion"><h2 style="color:var(--rdx-teal-dark,#1f5f8b);margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>${score}</strong> / ${stages.length * 10}</p><p style="margin-bottom:30px;">You've mastered Acetaminophen Overdose!</p><div style="text-align:left;max-width:500px;margin:0 auto;"><h4 style="color:#ef4444;margin-bottom:12px;">Key Points:</h4><ul style="line-height:2;"><li>Toxic dose: >150 mg/kg or >7.5g</li><li>NAPQI causes damage when glutathione depleted</li><li>Stage I is deceptive - treat early!</li><li>Nomogram: single acute + known time only</li><li>NAC within 8h = near 100% protection</li></ul></div></div>`;

    }
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3a90c0'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#b45309'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#b45309'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color: #1f5f8b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');

        content.style.display = 'flex';

    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
