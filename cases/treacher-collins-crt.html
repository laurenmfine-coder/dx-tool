<body>
    <div class="container">
        <div class="header">
            <h1>🧬 Treacher Collins Syndrome</h1>
            <div class="score-display">
                <div class="score-item">Score: <strong id="score">0</strong>/<span id="maxScore">60</span></div>
                <div class="score-item">Stage: <span id="stageNum">1</span>/6</div>
            </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width: 16%"></div></div>
        <div id="scene-container"></div>
    </div>
    <script>
    let currentStage = 0, score = 0;
    const stages = [
        {title:"The Newborn with Bilateral Facial Anomalies",content:'<div class="narrative"><p>A <span class="highlight">1-day-old male</span> with a prenatal diagnosis of Treacher Collins syndrome is having <span class="critical">respiratory distress</span> in the NICU. The father has known Treacher Collins syndrome.</p><p style="margin-top:12px;"><strong>Exam:</strong> <span class="highlight">Bilateral symmetric</span> malar and mandibular hypoplasia, <span class="highlight">downslanting palpebral fissures</span>, notching of the lower eyelids, and bilateral small malformed ears. Severe micrognathia with audible stridor.</p></div><div class="alert-box"><div class="alert-title">⚠️ AIRWAY EMERGENCY</div><p>Severe micrognathia in Treacher Collins can cause life-threatening airway obstruction, similar to Pierre Robin sequence.</p></div>',question:{prompt:"What is the KEY clinical feature that distinguishes Treacher Collins from Hemifacial Microsomia?",options:[{text:"Presence of micrognathia",correct:false},{text:"BILATERAL and SYMMETRIC involvement",correct:true},{text:"Hearing loss",correct:false},{text:"Airway obstruction",correct:false}],explanation:{correct:"Correct! Treacher Collins has BILATERAL, SYMMETRIC involvement of both sides of the face. Hemifacial microsomia is typically UNILATERAL or asymmetrically bilateral. This is the key clinical differentiator between these two conditions.",incorrect:"BILATERAL SYMMETRIC is the key differentiator. TCS affects both sides equally; HFM is unilateral or asymmetric."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 TCS vs HFM</div><div class="pathway">TREACHER COLLINS    HEMIFACIAL MICROSOMIA\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nBILATERAL           UNILATERAL (70%)\nSYMMETRIC           ASYMMETRIC\n\nGenetic (TCOF1)     Usually sporadic\n\nDownslanting        Variable eye\npalpebral fissures  findings\n\nLower lid           No colobomas\ncolobomas\n\nBoth sides same     One side worse\nseverity            than other</div></div>',points:10}},
        
        {title:"Genetics",content:'<div class="narrative"><p>You discuss the genetics with the family. The father is affected, and they want to know the inheritance pattern and recurrence risk.</p></div>',question:{prompt:"What is the inheritance pattern and most common gene involved in Treacher Collins?",options:[{text:"Autosomal recessive, COL2A1",correct:false},{text:"Autosomal dominant, TCOF1 (60% de novo)",correct:true},{text:"X-linked recessive, FGFR2",correct:false},{text:"Autosomal dominant, FGFR3",correct:false}],explanation:{correct:"Correct! TCS is autosomal dominant, with TCOF1 mutations in 78-93% of cases. Importantly, 60% are DE NOVO mutations (no family history). With an affected parent, offspring have 50% risk. Variable expressivity means severity can differ greatly even within families.",incorrect:"TCS is AD with TCOF1 gene (78-93%). 60% are de novo. 50% recurrence risk if parent affected. Variable expressivity is key."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Genetics of TCS</div><div class="pathway">GENE         FREQUENCY    INHERITANCE\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nTCOF1        78-93%       AD\nPOLR1C       ~2%          AR\nPOLR1D       ~2%          AD or AR\n\nKEY POINTS:\n• 60% are DE NOVO mutations\n• 40% inherited from affected parent\n• 50% risk if parent affected\n• VARIABLE EXPRESSIVITY!\n  - Mildly affected parent can\n    have severely affected child\n\nPATHOPHYSIOLOGY:\nTCOF1 → Treacle protein\n↓ Treacle → ↓ Ribosome biogenesis\n→ Neural crest cell apoptosis\n→ 1st/2nd arch hypoplasia</div></div>',points:10}},

        {title:"Airway Management",content:'<div class="narrative"><p>This infant has severe micrognathia causing significant airway obstruction. SpO2 drops to 80% when supine. You need to establish a safe airway.</p></div>',question:{prompt:"When intubating a patient with Treacher Collins, what should you always be prepared for?",options:[{text:"Routine direct laryngoscopy",correct:false},{text:"Difficult airway - have fiberoptic equipment ready",correct:true},{text:"Immediate tracheostomy",correct:false},{text:"LMA only, never intubate",correct:false}],explanation:{correct:"Correct! TCS patients are DIFFICULT AIRWAYS due to severe micrognathia, limited mouth opening, and abnormal anatomy. ALWAYS have fiberoptic equipment, video laryngoscope, and backup airway plans ready. Never assume routine intubation will work.",incorrect:"TCS = DIFFICULT AIRWAY. Always prepare fiberoptic, video laryngoscopy, and backup plans. Severe micrognathia makes direct laryngoscopy extremely challenging."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Airway in TCS</div><div class="pathway">TCS AIRWAY CHALLENGES:\n• Severe micrognathia\n• Limited mouth opening\n• Abnormal anatomy\n• Glossoptosis\n\nAIRWAY PREPARATION:\n✓ ALWAYS anticipate difficult airway\n✓ Fiberoptic bronchoscope ready\n✓ Video laryngoscope\n✓ LMA as backup\n✓ Surgical airway capability\n✓ Experienced team\n\nMANAGEMENT OPTIONS:\n• Prone positioning (first line)\n• Nasopharyngeal airway\n• Mandibular distraction (MDO)\n• Tracheostomy (if severe)\n\nSAME ALGORITHM AS PRS!</div></div>',points:10}},

        {title:"Classic Features",content:'<div class="narrative"><p>You document the classic features of Treacher Collins syndrome in this patient for the medical record.</p></div>',question:{prompt:"Which facial feature is PATHOGNOMONIC for Treacher Collins syndrome?",options:[{text:"Micrognathia",correct:false},{text:"Downslanting palpebral fissures with lower eyelid colobomas",correct:true},{text:"Microtia",correct:false},{text:"Cleft palate",correct:false}],explanation:{correct:"Correct! Downslanting palpebral fissures with lower eyelid colobomas (notching) are pathognomonic for TCS. While micrognathia and microtia occur in other conditions, the specific combination of downslanting lids with colobomas is characteristic of TCS.",incorrect:"Downslanting palpebral fissures + lower lid colobomas are pathognomonic. Other features (micrognathia, microtia) occur in other conditions too."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Classic TCS Features</div><div class="pathway">PATHOGNOMONIC:\n• Downslanting palpebral fissures\n• Lower eyelid COLOBOMAS (notches)\n• Sparse/absent lower lashes\n\nFACIAL BONES (Bilateral/Symmetric):\n• Malar (zygomatic) hypoplasia\n• Mandibular hypoplasia\n• Maxillary hypoplasia\n\nEARS:\n• Bilateral microtia\n• Canal atresia\n• Middle ear anomalies\n• CONDUCTIVE hearing loss\n\nOTHER:\n• Cleft palate (30%)\n• Preauricular hair displacement\n• NORMAL HANDS (vs Apert/Nager)\n• NORMAL intelligence (usually)</div></div>',points:10}},

        {title:"Hearing Intervention",content:'<div class="narrative"><p>Audiology confirms bilateral severe conductive hearing loss from ear canal atresia and middle ear anomalies. You discuss hearing rehabilitation.</p></div>',question:{prompt:"What is the optimal early hearing intervention for an infant with TCS and bilateral conductive hearing loss?",options:[{text:"Wait until school age for hearing aids",correct:false},{text:"Cochlear implant immediately",correct:false},{text:"Bone-anchored hearing device (soft band BAHA)",correct:true},{text:"Ear tubes only",correct:false}],explanation:{correct:"Correct! A soft band BAHA (bone-anchored hearing aid) is ideal for infants with conductive hearing loss from canal atresia. It bypasses the abnormal outer/middle ear by conducting sound through bone. Early amplification during the critical language development period is essential.",incorrect:"Soft band BAHA is optimal for conductive loss with atresia. Provides amplification during critical language period, bypasses abnormal ear canal."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Hearing in TCS</div><div class="pathway">HEARING LOSS IN TCS:\n• Almost always CONDUCTIVE\n• Bilateral\n• Due to canal atresia + middle ear\n• Severity: moderate to severe\n\nINTERVENTION TIMELINE:\nInfancy:  Soft band BAHA\n          (bone conduction headband)\n\nAge 5+:   Osseointegrated BAHA\n          (implanted abutment)\n\nConsider: Canaloplasty if anatomy\n          permits (often not)\n\nKEY PRINCIPLE:\nEarly amplification is CRITICAL\nfor language development!\n\nHearing loss, not intelligence,\nis main cause of learning issues.</div></div>',points:10}},

        {title:"Long-Term Management",content:'<div class="narrative"><p>You discuss the long-term surgical and developmental outlook with the family.</p></div>',question:{prompt:"What is the expected intellectual outcome for most patients with Treacher Collins syndrome?",options:[{text:"Severe intellectual disability",correct:false},{text:"Moderate intellectual disability",correct:false},{text:"Normal intelligence in most cases",correct:true},{text:"Depends on number of surgeries",correct:false}],explanation:{correct:"Correct! Most TCS patients have NORMAL intelligence. Developmental delays, when present, are usually due to untreated hearing loss affecting language development, not inherent cognitive impairment. This is why early hearing intervention is so critical.",incorrect:"Intelligence is typically NORMAL in TCS. Any delays are usually from hearing loss affecting language, not cognitive impairment. Early hearing intervention is key."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 TCS Outcomes</div><div class="pathway">COGNITIVE:\n• NORMAL intelligence in most\n• Delays usually from hearing loss\n• Academic support may be needed\n\nSURGICAL TIMELINE:\nNeonate:   Airway management\n0-6 mo:    BAHA soft band\n1-2 yr:    Palate repair if cleft\n3-5 yr:    Eyelid reconstruction\n6-10 yr:   Microtia repair\n6-12 yr:   Malar reconstruction\nAdolescent: Orthognathic surgery\n            Final refinements\n\nLIFE EXPECTANCY:\n• Normal if airway managed\n• Multiple surgeries needed\n• Excellent functional outcomes\n\nKEYS TO SUCCESS:\n✓ Early hearing intervention\n✓ Multidisciplinary team\n✓ Psychosocial support</div></div>',points:10}}
    ];
    
    function updateProgress(){
        document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';
        document.getElementById('stageNum').textContent=currentStage+1;
        document.getElementById('maxScore').textContent=stages.length*10;
    }
    
    function renderStage(){
        const stage=stages[currentStage];
        let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;
        if(stage.question){
            html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';
            stage.question.options.forEach((opt,i)=>{
                html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';
            });
            html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div>';
            html+='<div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';
            if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';
            html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';
        }
        html+='</div>';
        document.getElementById('scene-container').innerHTML=html;
        updateProgress();
    }
    
    function checkAnswer(idx,correct){
        const options=document.querySelectorAll('.mcq-option');
        if(options[0].classList.contains('disabled'))return;
        options.forEach((opt,i)=>{
            opt.classList.add('disabled');
            if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');
            else if(i===idx&&!correct)opt.classList.add('incorrect');
        });
        if(correct){
            document.getElementById('fb-correct').classList.add('show');
            score+=stages[currentStage].question.points;
            document.getElementById('score').textContent=score;
        }else{
            document.getElementById('fb-incorrect').classList.add('show');
        }
        const t=document.getElementById('teaching');
        if(t)t.classList.add('show');
        document.getElementById('next-btn').classList.add('show');
    }
    
    function nextStage(){
        if(currentStage<stages.length-1){
            currentStage++;
            renderStage();
            window.scrollTo(0,0);
        }else{
            document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:var(--rdx-teal-dark,#1f5f8b);margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><div style="margin-top:20px;padding:15px;background:rgba(59,130,246,0.15);border-radius:12px;border:1px solid rgba(59,130,246,0.3);"><p style="color:var(--rdx-teal-light,#d4e8f7);margin-bottom:10px;font-weight:600;">📚 Learn More:</p><div style="display:flex;flex-wrap:wrap;gap:8px;"><a href="../mechanism/treacher-collins-module.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📘 ReasonDx</a><a href="https://www.ncbi.nlm.nih.gov/books/?term=treacher+collins" target="_blank" title="Deep dive via StatPearls" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📊 Deep Dive</a></div><div style="margin-top:10px;"><a href="https://www.ncbi.nlm.nih.gov/books/NBK541049/" target="_blank" style="color:var(--rdx-teal-light,#d4e8f7);font-size:0.8rem;">📖 StatPearls Reference</a></div></div><p>You mastered Treacher Collins Syndrome!</p></div>';
        }
    }
    
    renderStage();
    </script>
