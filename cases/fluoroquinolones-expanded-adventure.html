rem}.why-a{display:none;margin-top:6px;font-size:0.88rem;color:var(--rdx-text-muted,#64748b)}.next-btn{background:linear-gradient(135deg,#1f5f8b,#2874a6);color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:600;cursor:pointer;margin:20px 0;display:none;font-family:var(--rdx-font)}.next-btn:hover{opacity:0.9;transform:translateY(-1px)}.completion-card{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:16px;padding:32px;text-align:center;margin:24px 0}.completion-card h2{font-family:var(--rdx-font-serif);color:var(--rdx-teal-dark,#1f5f8b);margin-bottom:12px}.references-panel{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:16px;margin:20px 0}.references-panel a{display:block;color:var(--rdx-teal,#2874a6);font-size:13px;margin:4px 0;text-decoration:none}.references-panel a:hover{text-decoration:underline}.rdx-crossplatform-nav{background:var(--rdx-bg-card,#f8fafc);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:20px;margin:24px 0}.rdx-crossplatform-nav h4{color:var(--rdx-text-muted,#64748b);margin-bottom:12px;font-size:0.9rem}.rdx-crossplatform-links{display:flex;gap:12px;flex-wrap:wrap}.rdx-crossplatform-link{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:12px 16px;text-decoration:none;color:var(--rdx-text,#1e293b);font-size:13px;font-weight:500;transition:all 0.2s}.rdx-crossplatform-link:hover{background:rgba(40,116,166,0.05);transform:translateY(-2px)}@media(max-width:640px){.score-tracker{top:auto;bottom:12px;right:12px}.container{padding:12px}.vital-signs{grid-template-columns:repeat(3,1fr)}}</style>

<script>let currentStage=0,score=0,difficulty='standard';
const stages=[{
title:"Clinical Scenario",
content:`<div class="narrative"><p>A 55-year-old with severe CAP requiring ICU admission. PCN allergic (anaphylaxis). Need alternative.</p><div class="vital-signs"><div class="vital-item"><span class="label">HR</span><span class="value">112</span></div><div class="vital-item"><span class="label">Temp</span><span class="value">39.8°C</span></div><div class="vital-item"><span class="label">SpO2</span><span class="value">88%</span></div></div></div>`,
hint_beginner:"What is the mechanism of fluoroquinolones?",
hint_advanced:"Consider the pharmacologic principles underlying this drug class.",
question:{
prompt:"What is the mechanism of fluoroquinolones?",
options:[{text:"Inhibit DNA gyrase (gram-negatives) and topoisomerase IV (gram-positives) → bactericidal",correct:true},{text:"Inhibits cell membrane synthesis",correct:false},{text:"Blocks RNA polymerase",correct:false},{text:"Inhibits folic acid metabolism",correct:false}],
explanation:{correct:"Correct! Inhibit DNA gyrase (gram-negatives) and topoisomerase IV (gram-positives) → bactericidal.",incorrect:"Inhibit DNA gyrase (gram-negatives) and topoisomerase IV (gram-positives) → bactericidal"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">FQ Mechanism</div><div class="pathway"><strong>Targets:</strong> DNA gyrase (topoisomerase II) — primarily gram-neg; Topoisomerase IV — primarily gram-pos<br><strong>Effect:</strong> Block DNA replication and repair → bactericidal<br><strong>Unique:</strong> Excellent oral bioavailability (nearly equivalent to IV)</div></div>`,
why_chain:[],
points:10
}
},{
title:"Spectrum & Coverage",
content:`<div class="narrative"><p>Understanding the antimicrobial spectrum guides appropriate use.</p></div>`,
hint_beginner:"What distinguishes respiratory FQs from urinary FQs?",
hint_advanced:"Think about the unique organisms this drug covers that alternatives do not.",
question:{
prompt:"What distinguishes respiratory FQs from urinary FQs?",
options:[{text:"Covers only gram-positive organisms",correct:false},{text:"Respiratory FQs (levofloxacin, moxifloxacin) have enhanced gram-positive coverage including S. pneumoniae",correct:true},{text:"Active only against fungi",correct:false},{text:"No anaerobic activity",correct:false}],
explanation:{correct:"Correct! Respiratory FQs (levofloxacin, moxifloxacin) have enhanced gram-positive coverage including S. pneumoniae.",incorrect:"Respiratory FQs (levofloxacin, moxifloxacin) have enhanced gram-positive coverage including S. pneumoniae"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">FQ Generations</div><div class="pathway"><strong>2nd gen (urinary):</strong> Ciprofloxacin — best Pseudomonas activity, poor pneumococcal coverage<br><strong>3rd gen (respiratory):</strong> Levofloxacin — good pneumococcal + gram-neg coverage<br><strong>4th gen:</strong> Moxifloxacin — best gram-pos, anaerobe coverage, NO renal excretion (poor for UTI)<br><strong>Avoid:</strong> Gemifloxacin, trovafloxacin (withdrawn/restricted)</div></div>`,
why_chain:[],
points:10
}
},{
title:"Dosing & Administration",
content:`<div class="narrative"><p>Proper dosing maximizes efficacy and minimizes toxicity.</p></div>`,
hint_beginner:"Are FQs concentration- or time-dependent killers?",
hint_advanced:"Consider the PK/PD parameters that drive efficacy for this class.",
question:{
prompt:"Are FQs concentration- or time-dependent killers?",
options:[{text:"Fixed dose regardless of indication",correct:false},{text:"Dose based on ideal body weight only",correct:false},{text:"Concentration-dependent with long post-antibiotic effect → once-daily dosing",correct:true},{text:"Always requires IV administration",correct:false}],
explanation:{correct:"Correct! Concentration-dependent with long post-antibiotic effect → once-daily dosing.",incorrect:"Concentration-dependent with long post-antibiotic effect → once-daily dosing"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">FQ PK/PD</div><div class="pathway"><strong>Concentration-dependent killing:</strong> AUC/MIC and Cmax/MIC predict efficacy<br><strong>Excellent tissue penetration:</strong> Lung, prostate, bone, intracellular<br><strong>Oral bioavailability:</strong> 85-100% — oral ≈ IV (early PO switch)<br><strong>Chelation:</strong> Divalent cations (Ca, Mg, Fe, Al) reduce absorption → separate by 2 hours</div></div>`,
why_chain:[],
points:10
}
},{
title:"Adverse Effects",
content:`<div class="narrative"><p>Monitoring for side effects is essential for patient safety.</p></div>`,
hint_beginner:"What is the FDA black box warning for FQs?",
hint_advanced:"Consider which effects are dose-dependent vs idiosyncratic.",
question:{
prompt:"What is the FDA black box warning for FQs?",
options:[{text:"No significant adverse effects",correct:false},{text:"Ototoxicity only",correct:false},{text:"Only affects renal function",correct:false},{text:"Tendon rupture/tendinitis, peripheral neuropathy, CNS effects, aortic dissection — reserve for when no alternatives exist",correct:true}],
explanation:{correct:"Correct! Tendon rupture/tendinitis, peripheral neuropathy, CNS effects, aortic dissection — reserve for when no alternatives exist.",incorrect:"Tendon rupture/tendinitis, peripheral neuropathy, CNS effects, aortic dissection — reserve for when no alternatives exist"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">FQ Toxicity</div><div class="pathway"><strong>FDA Black Box:</strong><br>• Tendon rupture (Achilles most common, risk ↑ with age >60, steroids, renal failure)<br>• Peripheral neuropathy (may be irreversible)<br>• CNS effects (seizures, confusion, psychosis — lower seizure threshold)<br>• Aortic dissection/aneurysm<br><strong>Other:</strong> QT prolongation (moxifloxacin worst), C. difficile, phototoxicity, dysglycemia</div></div>`,
why_chain:[],
points:10
}
},{
title:"Resistance",
content:`<div class="narrative"><p>Understanding resistance guides empiric therapy choices.</p></div>`,
hint_beginner:"How does FQ resistance develop?",
hint_advanced:"Compare enzymatic modification, target alteration, and efflux as resistance strategies.",
question:{
prompt:"How does FQ resistance develop?",
options:[{text:"Stepwise chromosomal mutations in DNA gyrase (gyrA) and topoisomerase IV (parC) — two mutations needed for high-level resistance",correct:true},{text:"Only plasmid-mediated resistance",correct:false},{text:"No resistance has been documented",correct:false},{text:"Resistance occurs only in gram-positives",correct:false}],
explanation:{correct:"Correct! Stepwise chromosomal mutations in DNA gyrase (gyrA) and topoisomerase IV (parC) — two mutations needed for high-level resistance.",incorrect:"Stepwise chromosomal mutations in DNA gyrase (gyrA) and topoisomerase IV (parC) — two mutations needed for high-level resistance"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">FQ Resistance</div><div class="pathway"><strong>Chromosomal mutations:</strong> Stepwise in gyrA → parC. Two mutations needed for clinical resistance.<br><strong>Efflux pumps:</strong> MDR efflux (especially Pseudomonas)<br><strong>Plasmid-mediated:</strong> qnr genes (low-level), AAC(6)-Ib-cr (modifying enzyme)<br><strong>Resistance concern:</strong> FQ use selects for resistance in pneumococcus and promotes C. diff</div></div>`,
why_chain:[],
points:10
}
},{
title:"Clinical Application",
content:`<div class="narrative"><p>Integrating mechanism, spectrum, and resistance data guides optimal clinical use.</p></div>`,
hint_beginner:"When should FQs be reserved rather than used empirically?",
hint_advanced:"Consider guideline recommendations and antimicrobial stewardship principles.",
question:{
prompt:"When should FQs be reserved rather than used empirically?",
options:[{text:"Only for prophylaxis",correct:false},{text:"Reserve respiratory FQs to preserve efficacy. Use for: PCN-allergic CAP, complicated UTI, TB (second-line), empiric gram-negative coverage",correct:true},{text:"Reserved for outpatient use only",correct:false},{text:"Empiric monotherapy for all infections",correct:false}],
explanation:{correct:"Correct! Reserve respiratory FQs to preserve efficacy. Use for: PCN-allergic CAP, complicated UTI, TB (second-line), empiric gram-negative coverage.",incorrect:"Reserve respiratory FQs to preserve efficacy. Use for: PCN-allergic CAP, complicated UTI, TB (second-line), empiric gram-negative coverage"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">FQ Stewardship</div><div class="pathway"><strong>Reserve for:</strong> Severe CAP (PCN-allergic), complicated UTI/pyelonephritis, prostatitis, Pseudomonas, TB (second-line)<br><strong>Avoid for:</strong> Uncomplicated UTI (use nitrofurantoin/TMP-SMX), uncomplicated sinusitis, bronchitis<br><strong>Key:</strong> FQ stewardship reduces C. difficile rates by 50-80% in hospitals</div></div>`,
why_chain:[],
points:10
}
}];
document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hb=document.querySelector('.hint-box');if(hb)hb.style.display=d==='beginner'?'block':'none'}
function toggleReferences(){const c=document.getElementById('referencesContent');const t=document.getElementById('refToggle');if(c.style.display==='none'){c.style.display='block';t.innerHTML='&#9662;'}else{c.style.display='none';t.innerHTML='&#9656;'}}
function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100);document.getElementById('progress').style.width=pct+'%';let h='<h2 class="scene-title">'+st.title+'</h2>';h+='<div class="scene-content">'+st.content+'</div>';if(st.hint_beginner)h+='<div class="hint-box" id="hint-box"'+(difficulty==='beginner'?' style="display:block"':'')+'> '+st.hint_beginner+'</div>';if(difficulty==='advanced'&&st.hint_advanced)h+='<div class="hint-box" style="display:block;background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.15);color:#5b21b6"> '+st.hint_advanced+'</div>';if(st.question){h+='<div class="socratic-prompt"><h4>Clinical Question</h4><p>'+st.question.prompt+'</p></div>';h+='<div class="options-grid" id="options-'+idx+'">';st.question.options.forEach((opt,oi)=>{h+='<button class="option-btn" id="option-'+idx+'-'+oi+'" onclick="checkAnswer('+idx+','+oi+')">'+String.fromCharCode(65+oi)+'. '+opt.text+'</button>'});h+='</div>';h+='<div class="explanation-box" id="explain-'+idx+'"></div>';h+='<div id="teaching-'+idx+'" style="display:none">'+st.question.teaching+'</div>';if(st.question.why_chain&&st.question.why_chain.length>0){h+='<div id="why-'+idx+'" style="display:none">';st.question.why_chain.forEach((wc,wi)=>{h+='<div class="why-chain"><div class="why-q" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'"> '+wc.q+'</div><div class="why-a">'+wc.a+'</div></div>'});h+='</div>'}}h+='<button class="next-btn" id="next-'+idx+'" onclick="nextStage()">Continue &rarr;</button>';document.getElementById('scene-container').innerHTML=h}
function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll('#options-'+si+' .option-btn').forEach((b,i)=>{b.classList.add('disabled');if(st.question.options[i].correct)b.classList.add('correct');if(i===oi&&!opt.correct)b.classList.add('incorrect')});const eb=document.getElementById('explain-'+si);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;eb.className='explanation-box correct';eb.innerHTML='<strong>Correct!</strong> '+st.question.explanation.correct}else{eb.className='explanation-box incorrect';eb.innerHTML='<strong>Not quite.</strong> '+st.question.explanation.incorrect}eb.style.display='block';document.getElementById('teaching-'+si).style.display='block';const wy=document.getElementById('why-'+si);if(wy)wy.style.display='block';document.getElementById('next-'+si).style.display='inline-block'}
function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let lvl='Developing';if(pct>=90)lvl='Mastery';else if(pct>=70)lvl='Proficient';else if(pct>=50)lvl='Competent';document.getElementById('scene-container').innerHTML='<div class="completion-card"><h2>Case Complete!</h2><p style="font-size:2rem;font-weight:700;color:var(--rdx-teal,#2874a6)">'+pct+'%</p><p style="color:var(--rdx-text-muted,#64748b)">Score: '+score+'/'+mx+'</p><p style="margin:12px 0;font-weight:600">Level: '+lvl+'</p><div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="../adventure-hub.html" style="padding:10px 20px;background:var(--rdx-teal,#2874a6);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">More Cases</a><a href="../tools/learning-dashboard.html" style="padding:10px 20px;background:var(--rdx-purple,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">Dashboard</a><button onclick="currentStage=0;score=0;document.getElementById(\'score\').textContent=0;renderStage(0)" style="padding:10px 20px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;cursor:pointer;font-weight:600">Retry</button></div></div>';try{const progress=JSON.parse(localStorage.getItem('reasondx-progress')||'{}');if(!progress.cases)progress.cases={};progress.cases['fluoroquinolones']=Math.max(progress.cases['fluoroquinolones']||0,pct);localStorage.setItem('reasondx-progress',JSON.stringify(progress))}catch(e){}}
renderStage(0);</script>
