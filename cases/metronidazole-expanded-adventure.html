<script>let currentStage=0,score=0,difficulty='standard';
const stages=[{
title:"Clinical Scenario",
content:`<div class="narrative"><p>A 45-year-old returning from camping trip with foul-smelling watery diarrhea, bloating, and flatulence × 10 days.</p><div class="vital-signs"><div class="vital-item"><span class="label">HR</span><span class="value">78</span></div><div class="vital-item"><span class="label">Temp</span><span class="value">37.2°C</span></div></div></div>`,
hint_beginner:"What is metronidazole mechanism?",
hint_advanced:"Consider the pharmacologic principles underlying this drug class.",
question:{
prompt:"What is metronidazole mechanism?",
options:[{text:"Prodrug activated by anaerobic electron transport → forms toxic free radicals that damage DNA → bactericidal against anaerobes and certain protozoa",correct:true},{text:"Inhibits cell membrane synthesis",correct:false},{text:"Inhibits folic acid metabolism",correct:false},{text:"Blocks RNA polymerase",correct:false}],
explanation:{correct:"Correct! Prodrug activated by anaerobic electron transport → forms toxic free radicals that damage DNA → bactericidal against anaerobes and certain protozoa.",incorrect:"Prodrug activated by anaerobic electron transport → forms toxic free radicals that damage DNA → bactericidal against anaerobes and certain protozoa"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Metronidazole MOA</div><div class="pathway"><strong>Prodrug:</strong> Activated only in anaerobic/microaerophilic organisms (reduced by ferredoxin/flavodoxin electron transport)<br><strong>Active form:</strong> Nitro radical → damages DNA (strand breakage) → bactericidal<br><strong>Selectivity:</strong> Only organisms with anaerobic electron transport can activate the drug → no activity against aerobes</div></div>`,
why_chain:[],
points:10
}
},{
title:"Spectrum & Coverage",
content:`<div class="narrative"><p>Understanding the antimicrobial spectrum guides appropriate use.</p></div>`,
hint_beginner:"What is metronidazole spectrum?",
hint_advanced:"Think about the unique organisms this drug covers that alternatives do not.",
question:{
prompt:"What is metronidazole spectrum?",
options:[{text:"Active only against fungi",correct:false},{text:"Anaerobes (Bacteroides fragilis, Clostridium), protozoa (Giardia, Entamoeba, Trichomonas). NO aerobic coverage.",correct:true},{text:"Covers only gram-positive organisms",correct:false},{text:"No anaerobic activity",correct:false}],
explanation:{correct:"Correct! Anaerobes (Bacteroides fragilis, Clostridium), protozoa (Giardia, Entamoeba, Trichomonas). NO aerobic coverage..",incorrect:"Anaerobes (Bacteroides fragilis, Clostridium), protozoa (Giardia, Entamoeba, Trichomonas). NO aerobic coverage."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Metronidazole Spectrum</div><div class="pathway"><strong>Anaerobic bacteria:</strong> Bacteroides (including fragilis), Clostridium (including C. diff), Fusobacterium, Prevotella<br><strong>Protozoa:</strong> Giardia, Entamoeba histolytica (amebic dysentery/abscess), Trichomonas vaginalis<br><strong>H. pylori:</strong> Part of quadruple therapy<br><strong>NO activity:</strong> Aerobes, Actinomyces (use penicillin)</div></div>`,
why_chain:[],
points:10
}
},{
title:"Dosing & Administration",
content:`<div class="narrative"><p>Proper dosing maximizes efficacy and minimizes toxicity.</p></div>`,
hint_beginner:"What critical drug interaction must patients be warned about?",
hint_advanced:"Consider the PK/PD parameters that drive efficacy for this class.",
question:{
prompt:"What critical drug interaction must patients be warned about?",
options:[{text:"Fixed dose regardless of indication",correct:false},{text:"Dose based on ideal body weight only",correct:false},{text:"Disulfiram-like reaction with alcohol — inhibits aldehyde dehydrogenase → severe nausea, vomiting, flushing. Avoid alcohol during and 48h after treatment.",correct:true},{text:"Always requires IV administration",correct:false}],
explanation:{correct:"Correct! Disulfiram-like reaction with alcohol — inhibits aldehyde dehydrogenase → severe nausea, vomiting, flushing. Avoid alcohol during and 48h after treatment..",incorrect:"Disulfiram-like reaction with alcohol — inhibits aldehyde dehydrogenase → severe nausea, vomiting, flushing. Avoid alcohol during and 48h after treatment."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Disulfiram Reaction</div><div class="pathway"><strong>Mechanism:</strong> Metronidazole inhibits aldehyde dehydrogenase → acetaldehyde accumulates when alcohol consumed → severe nausea, vomiting, flushing, headache, tachycardia<br><strong>Avoid alcohol:</strong> During treatment AND 48 hours after completion<br><strong>Other disulfiram-like drugs:</strong> Cefotetan, cefoperazone, procarbazine, first-gen sulfonylureas</div></div>`,
why_chain:[],
points:10
}
},{
title:"Adverse Effects",
content:`<div class="narrative"><p>Monitoring for side effects is essential for patient safety.</p></div>`,
hint_beginner:"What neurologic side effect limits long-term use?",
hint_advanced:"Consider which effects are dose-dependent vs idiosyncratic.",
question:{
prompt:"What neurologic side effect limits long-term use?",
options:[{text:"Only affects renal function",correct:false},{text:"Ototoxicity only",correct:false},{text:"No significant adverse effects",correct:false},{text:"Peripheral neuropathy (cumulative, may be irreversible). Also seizures and cerebellar dysfunction. Limit duration when possible.",correct:true}],
explanation:{correct:"Correct! Peripheral neuropathy (cumulative, may be irreversible). Also seizures and cerebellar dysfunction. Limit duration when possible..",incorrect:"Peripheral neuropathy (cumulative, may be irreversible). Also seizures and cerebellar dysfunction. Limit duration when possible."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Metronidazole Neurotoxicity</div><div class="pathway"><strong>Peripheral neuropathy:</strong> Dose-dependent, cumulative. May be irreversible. Monitor for paresthesias.<br><strong>CNS:</strong> Seizures (rare), cerebellar dysfunction (ataxia, dysarthria)<br><strong>Metallic taste:</strong> Very common, harmless but bothersome<br><strong>Limit duration:</strong> Avoid prolonged courses when possible (>4 weeks increases neuropathy risk)</div></div>`,
why_chain:[],
points:10
}
},{
title:"Resistance",
content:`<div class="narrative"><p>Understanding resistance guides empiric therapy choices.</p></div>`,
hint_beginner:"How does metronidazole resistance develop?",
hint_advanced:"Compare enzymatic modification, target alteration, and efflux as resistance strategies.",
question:{
prompt:"How does metronidazole resistance develop?",
options:[{text:"Decreased nitroreductase activity (reduced drug activation) — uncommon but increasing in H. pylori and some anaerobes. Trichomonas resistance: 5-10%.",correct:true},{text:"No resistance has been documented",correct:false},{text:"Resistance occurs only in gram-positives",correct:false},{text:"Only plasmid-mediated resistance",correct:false}],
explanation:{correct:"Correct! Decreased nitroreductase activity (reduced drug activation) — uncommon but increasing in H. pylori and some anaerobes. Trichomonas resistance: 5-10%..",incorrect:"Decreased nitroreductase activity (reduced drug activation) — uncommon but increasing in H. pylori and some anaerobes. Trichomonas resistance: 5-10%."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Metronidazole Resistance</div><div class="pathway"><strong>Mechanism:</strong> Decreased nitroreductase activity (reduced prodrug activation)<br><strong>H. pylori:</strong> 30-40% resistance in US → check local rates, use bismuth quadruple therapy if high<br><strong>C. difficile:</strong> Resistance rare but fidaxomicin or oral vancomycin now preferred over metronidazole for most C. diff<br><strong>Trichomonas:</strong> 5-10% resistance → use higher-dose, longer-course metronidazole or tinidazole</div></div>`,
why_chain:[],
points:10
}
},{
title:"Clinical Application",
content:`<div class="narrative"><p>Integrating mechanism, spectrum, and resistance data guides optimal clinical use.</p></div>`,
hint_beginner:"When is metronidazole the drug of choice?",
hint_advanced:"Consider guideline recommendations and antimicrobial stewardship principles.",
question:{
prompt:"When is metronidazole the drug of choice?",
options:[{text:"Reserved for outpatient use only",correct:false},{text:"C. difficile (non-severe, oral), Giardia, Trichomonas, amebic liver abscess, anaerobic intra-abdominal infections (with cephalosporin), bacterial vaginosis, H. pylori (bismuth quad regimen)",correct:true},{text:"Empiric monotherapy for all infections",correct:false},{text:"Only for prophylaxis",correct:false}],
explanation:{correct:"Correct! C. difficile (non-severe, oral), Giardia, Trichomonas, amebic liver abscess, anaerobic intra-abdominal infections (with cephalosporin), bacterial vaginosis, H. pylori (bismuth quad regimen).",incorrect:"C. difficile (non-severe, oral), Giardia, Trichomonas, amebic liver abscess, anaerobic intra-abdominal infections (with cephalosporin), bacterial vaginosis, H. pylori (bismuth quad regimen)"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Metronidazole Clinical Pearls</div><div class="pathway"><strong>C. difficile:</strong> Non-severe = fidaxomicin or oral vancomycin (metronidazole is third-line per 2021 IDSA). IV metronidazole added for fulminant colitis when ileus prevents oral drug delivery.<br><strong>Amebic abscess:</strong> Metronidazole followed by paromomycin (luminal agent to eliminate intestinal cysts)<br><strong>Anaerobic coverage:</strong> First-line for below-diaphragm anaerobes (B. fragilis). Clindamycin for above-diaphragm.</div></div>`,
why_chain:[],
points:10
}
}];
document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hb=document.querySelector('.hint-box');if(hb)hb.style.display=d==='beginner'?'block':'none'}
function toggleReferences(){const c=document.getElementById('referencesContent');const t=document.getElementById('refToggle');if(c.style.display==='none'){c.style.display='block';t.innerHTML='&#9662;'}else{c.style.display='none';t.innerHTML='&#9656;'}}
function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100);document.getElementById('progress').style.width=pct+'%';let h='<h2 class="scene-title">'+st.title+'</h2>';h+='<div class="scene-content">'+st.content+'</div>';if(st.hint_beginner)h+='<div class="hint-box" id="hint-box"'+(difficulty==='beginner'?' style="display:block"':'')+'> '+st.hint_beginner+'</div>';if(difficulty==='advanced'&&st.hint_advanced)h+='<div class="hint-box" style="display:block;background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.15);color:#5b21b6"> '+st.hint_advanced+'</div>';if(st.question){h+='<div class="socratic-prompt"><h4>Clinical Question</h4><p>'+st.question.prompt+'</p></div>';h+='<div class="options-grid" id="options-'+idx+'">';st.question.options.forEach((opt,oi)=>{h+='<button class="option-btn" id="option-'+idx+'-'+oi+'" onclick="checkAnswer('+idx+','+oi+')">'+String.fromCharCode(65+oi)+'. '+opt.text+'</button>'});h+='</div>';h+='<div class="explanation-box" id="explain-'+idx+'"></div>';h+='<div id="teaching-'+idx+'" style="display:none">'+st.question.teaching+'</div>';if(st.question.why_chain&&st.question.why_chain.length>0){h+='<div id="why-'+idx+'" style="display:none">';st.question.why_chain.forEach((wc,wi)=>{h+='<div class="why-chain"><div class="why-q" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'"> '+wc.q+'</div><div class="why-a">'+wc.a+'</div></div>'});h+='</div>'}}h+='<button class="next-btn" id="next-'+idx+'" onclick="nextStage()">Continue &rarr;</button>';document.getElementById('scene-container').innerHTML=h}
function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll('#options-'+si+' .option-btn').forEach((b,i)=>{b.classList.add('disabled');if(st.question.options[i].correct)b.classList.add('correct');if(i===oi&&!opt.correct)b.classList.add('incorrect')});const eb=document.getElementById('explain-'+si);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;eb.className='explanation-box correct';eb.innerHTML='<strong>Correct!</strong> '+st.question.explanation.correct}else{eb.className='explanation-box incorrect';eb.innerHTML='<strong>Not quite.</strong> '+st.question.explanation.incorrect}eb.style.display='block';document.getElementById('teaching-'+si).style.display='block';const wy=document.getElementById('why-'+si);if(wy)wy.style.display='block';document.getElementById('next-'+si).style.display='inline-block'}
function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let lvl='Developing';if(pct>=90)lvl='Mastery';else if(pct>=70)lvl='Proficient';else if(pct>=50)lvl='Competent';document.getElementById('scene-container').innerHTML='<div class="completion-card"><h2>Case Complete!</h2><p style="font-size:2rem;font-weight:700;color:var(--rdx-teal,#2874a6)">'+pct+'%</p><p style="color:var(--rdx-text-muted,#64748b)">Score: '+score+'/'+mx+'</p><p style="margin:12px 0;font-weight:600">Level: '+lvl+'</p><div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="../adventure-hub.html" style="padding:10px 20px;background:var(--rdx-teal,#2874a6);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">More Cases</a><a href="../tools/learning-dashboard.html" style="padding:10px 20px;background:var(--rdx-purple,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">Dashboard</a><button onclick="currentStage=0;score=0;document.getElementById(\'score\').textContent=0;renderStage(0)" style="padding:10px 20px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;cursor:pointer;font-weight:600">Retry</button></div></div>';try{const progress=JSON.parse(localStorage.getItem('reasondx-progress')||'{}');if(!progress.cases)progress.cases={};progress.cases['metronidazole']=Math.max(progress.cases['metronidazole']||0,pct);localStorage.setItem('reasondx-progress',JSON.stringify(progress))}catch(e){}}
renderStage(0);</script>
