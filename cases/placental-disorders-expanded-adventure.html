{text-align:center;font-size:13px}.vital-item .label{color:var(--rdx-text-muted,#64748b);font-size:11px;display:block}.vital-item .value{font-weight:700;color:var(--rdx-teal-dark,#1f5f8b)}.socratic-prompt{background:linear-gradient(135deg,rgba(124,58,237,0.06),rgba(40,116,166,0.06));border:1px solid rgba(124,58,237,0.15);border-radius:12px;padding:16px 20px;margin:16px 0}.socratic-prompt h4{color:var(--rdx-purple,#7c3aed);font-size:0.95rem;margin-bottom:8px}.hint-box{background:rgba(217,119,6,0.06);border:1px solid rgba(217,119,6,0.15);border-radius:8px;padding:12px;margin:8px 0;font-size:0.9rem;color:#92400e;display:none}.options-grid{display:grid;gap:10px;margin:16px 0}.option-btn{background:var(--rdx-bg-card,#fff);border:2px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:14px 18px;cursor:pointer;text-align:left;font-size:14px;transition:all 0.2s;font-family:var(--rdx-font)}.option-btn:hover{border-color:var(--rdx-teal,#2874a6);background:rgba(40,116,166,0.03)}.option-btn.correct{border-color:#16a34a;background:rgba(22,163,74,0.06)}.option-btn.incorrect{border-color:#dc2626;background:rgba(220,38,38,0.04)}.option-btn.disabled{pointer-events:none;opacity:0.7}.explanation-box{border-radius:12px;padding:16px;margin:12px 0;display:none}.explanation-box.correct{background:rgba(22,163,74,0.06);border:1px solid rgba(22,163,74,0.2)}.explanation-box.incorrect{background:rgba(220,38,38,0.04);border:1px solid rgba(220,38,38,0.15)}.mechanism-box{background:linear-gradient(135deg,rgba(40,116,166,0.06),rgba(40,116,166,0.02));border:1px solid rgba(40,116,166,0.15);border-radius:12px;padding:20px;margin:16px 0}.mechanism-title{color:var(--rdx-teal-dark,#1f5f8b);font-weight:700;font-size:0.95rem;margin-bottom:10px}.pathway{line-height:1.8;font-size:0.93rem}.why-chain{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:12px;margin:8px 0}.why-q{font-weight:600;color:var(--rdx-purple,#7c3aed);cursor:pointer;font-size:0.9 <script>let currentStage=0,score=0,difficulty='standard';
const stages=[{
title:"Clinical Presentation",
content:`<div class="narrative"><p>A 32-year-old G3P2 at 34 weeks with sudden painless bright red vaginal bleeding. No contractions. Prior cesarean delivery.</p><div class="vital-signs"><div class="vital-item"><span class="label">HR</span><span class="value">104</span></div><div class="vital-item"><span class="label">BP</span><span class="value">108/68</span></div></div></div>`,
hint_beginner:"Which findings are most diagnostically significant here?",
hint_advanced:"Think about how the mechanism produces each symptom.",
question:{
prompt:"What features distinguish this from other causes of third-trimester bleeding??",
options:[{text:"Normal bloody show of labor",correct:false},{text:"Urinary tract infection causing hematuria",correct:false},{text:"The clinical features are most consistent with placental disorders",correct:true},{text:"Cervical polyp bleeding",correct:false}],
explanation:{correct:"Correct! This presentation is classic for placental disorders. Recognizing the specific clinical features helps identify the condition early.",incorrect:"The combination of findings in this case is characteristic of placental disorders."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Key Features</div><div class="pathway"><strong>Placental Disorders:</strong> The hallmark features of Placental Disorders form a recognizable pattern. Each clinical finding reflects the underlying pathophysiology and helps distinguish this from mimics. provides a clue to the underlying mechanism.</div></div>`,
why_chain:[],
points:10
}
},{
title:"Diagnostic Approach",
content:`<div class="narrative"><p>A systematic diagnostic approach is needed to confirm placental disorders and exclude mimics.</p></div>`,
hint_beginner:"What initial tests should be ordered?",
hint_advanced:"Prioritize the test that most reliably confirms or excludes this diagnosis.",
question:{
prompt:"What imaging modality best diagnoses placental abnormalities??",
options:[{text:"Digital cervical exam first",correct:false},{text:"CT pelvis with contrast",correct:false},{text:"Transvaginal ultrasound for placenta previa",correct:false},{text:"Transabdominal ultrasound",correct:true}],
explanation:{correct:"Correct! This diagnostic approach efficiently confirms Placental Disorders while ruling out conditions that require different management.",incorrect:"Diagnostic confirmation is essential before initiating treatment for placental disorders."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Diagnosing Placental Disorders</div><div class="pathway"><strong>Step 1:</strong> Confirm clinical suspicion with targeted testing<br><strong>Step 2:</strong> Assess severity/staging<br><strong>Step 3:</strong> Identify etiology when possible<br><strong>Step 4:</strong> Evaluate for complications</div></div>`,
why_chain:[],
points:10
}
},{
title:"Pathophysiology",
content:`<div class="narrative"><p>Understanding the mechanism of disease in placental disorders guides rational treatment selection.</p></div>`,
hint_beginner:"What is the underlying mechanism?",
hint_advanced:"Trace each symptom back to the underlying disease mechanism?",
question:{
prompt:"What risk factor most strongly predisposes to this placental disorder??",
options:[{text:"Abnormal placental implantation over the cervical os or into myometrium",correct:true},{text:"Prior cesarean section or uterine surgery",correct:false},{text:"Multiparity without other risks",correct:false},{text:"Advanced maternal age alone",correct:false}],
explanation:{correct:"Correct! The pathophysiology of Placental Disorders follows a logical cascade from cause to clinical effect, guiding both treatment and prognosis.",incorrect:"The pathophysiology of placental disorders directly explains the clinical presentation."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Pathophysiology of Placental Disorders</div><div class="pathway"><strong>Core mechanism:</strong> Understanding how the disease process produces each sign and symptom allows prediction of complications and rational treatment selection.</div></div>`,
why_chain:[],
points:10
}
},{
title:"Management",
content:`<div class="narrative"><p>Evidence-based management of placental disorders requires matching intervention to severity and mechanism.</p></div>`,
hint_beginner:"What is first-line treatment?",
hint_advanced:"Match treatment intensity to disease severity per current guidelines.",
question:{
prompt:"What is the management approach for this placental condition??",
options:[{text:"Vaginal delivery for all placental disorders",correct:false},{text:"Cesarean delivery for complete placenta previa at 36-37 weeks",correct:true},{text:"Bed rest alone as treatment",correct:false},{text:"Expectant management past 40 weeks",correct:false}],
explanation:{correct:"Correct! Current guidelines recommend this approach for Placental Disorders because it targets the primary disease mechanism with the best risk-benefit profile.",incorrect:"The treatment of Placental Disorders follows an evidence-based algorithm that balances efficacy against potential adverse effects."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Treating Placental Disorders</div><div class="pathway"><strong>Mild:</strong> Conservative/first-line therapy<br><strong>Moderate:</strong> Escalated pharmacotherapy<br><strong>Severe:</strong> Aggressive intervention, consider ICU/specialty referral<br><strong>Refractory:</strong> Alternative agents or procedural intervention</div></div>`,
why_chain:[],
points:10
}
},{
title:"Complications of Placental Disorders",
content:`<div class="narrative"><p>Recognizing and preventing complications of placental disorders improves outcomes.</p></div>`,
hint_beginner:"Which complications carry the highest morbidity or mortality?",
hint_advanced:"Distinguish emergent from watchful-waiting complications?",
question:{
prompt:"What is the most life-threatening complication??",
options:[{text:"Mild cramping without hemorrhage",correct:false},{text:"Complications of Placental Disorders only develop after decades",correct:false},{text:"Massive hemorrhage from placenta previa or accreta spectrum",correct:true},{text:"Spotting that always stops spontaneously",correct:false}],
explanation:{correct:"Correct! This is the most dangerous complication of Placental Disorders and requires immediate intervention to prevent irreversible harm.",incorrect:"In Placental Disorders, the most dangerous complications can be anticipated by understanding the disease trajectory. Catching deterioration early changes the clinical trajectory."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Complications of Placental Disorders</div><div class="pathway"><strong>Acute complications:</strong> Require immediate recognition and treatment<br><strong>Chronic complications:</strong> Develop over time if disease is poorly controlled<br><strong>Treatment complications:</strong> Monitor for adverse effects of therapy</div></div>`,
why_chain:[],
points:10
}
},{
title:"Monitoring & Prevention & Prevention",
content:`<div class="narrative"><p>Long-term management and prevention strategies for placental disorders.</p></div>`,
hint_beginner:"What follow-up is needed?",
hint_advanced:"Plan for both prevention of recurrence and criteria for escalation.",
question:{
prompt:"What counseling is appropriate regarding future pregnancy risk??",
options:[{text:"Cesarean not needed for subsequent deliveries",correct:false},{text:"No counseling needed for future pregnancies",correct:false},{text:"Annual pelvic ultrasound",correct:false},{text:"Counseling on recurrence risk and early ultrasound in future pregnancies",correct:true}],
explanation:{correct:"Correct! Follow-up for Placental Disorders targets specific markers at evidence-based intervals to confirm response and detect recurrence early.",incorrect:"Structured follow-up intervals and specific monitoring targets are tailored to the natural history of Placental Disorders."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Monitoring & Prevention for Placental Disorders</div><div class="pathway"><strong>Monitoring:</strong> Reassess Placental Disorders markers at guideline-recommended intervals<br><strong>Prevention:</strong> Target modifiable risk factors specific to Placental Disorders<br><strong>Education:</strong> Patient understanding of warning signs requiring urgent evaluation<br><strong>Referral:</strong> Criteria for specialty involvement</div></div>`,
why_chain:[],
points:10
}
}];
document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hb=document.querySelector('.hint-box');if(hb)hb.style.display=d==='beginner'?'block':'none'}
function toggleReferences(){const c=document.getElementById('referencesContent');const t=document.getElementById('refToggle');if(c.style.display==='none'){c.style.display='block';t.innerHTML='&#9662;'}else{c.style.display='none';t.innerHTML='&#9656;'}}
function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100);document.getElementById('progress').style.width=pct+'%';let h='<h2 class="scene-title">'+st.title+'</h2>';h+='<div class="scene-content">'+st.content+'</div>';if(st.hint_beginner)h+='<div class="hint-box" id="hint-box"'+(difficulty==='beginner'?' style="display:block"':'')+'> '+st.hint_beginner+'</div>';if(difficulty==='advanced'&&st.hint_advanced)h+='<div class="hint-box" style="display:block;background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.15);color:#5b21b6"> '+st.hint_advanced+'</div>';if(st.question){h+='<div class="socratic-prompt"><h4>Clinical Question</h4><p>'+st.question.prompt+'</p></div>';h+='<div class="options-grid" id="options-'+idx+'">';st.question.options.forEach((opt,oi)=>{h+='<button class="option-btn" id="option-'+idx+'-'+oi+'" onclick="checkAnswer('+idx+','+oi+')">'+String.fromCharCode(65+oi)+'. '+opt.text+'</button>'});h+='</div>';h+='<div class="explanation-box" id="explain-'+idx+'"></div>';h+='<div id="teaching-'+idx+'" style="display:none">'+st.question.teaching+'</div>';if(st.question.why_chain&&st.question.why_chain.length>0){h+='<div id="why-'+idx+'" style="display:none">';st.question.why_chain.forEach((wc,wi)=>{h+='<div class="why-chain"><div class="why-q" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'"> '+wc.q+'</div><div class="why-a">'+wc.a+'</div></div>'});h+='</div>'}}h+='<button class="next-btn" id="next-'+idx+'" onclick="nextStage()">Continue &rarr;</button>';document.getElementById('scene-container').innerHTML=h}
function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll('#options-'+si+' .option-btn').forEach((b,i)=>{b.classList.add('disabled');if(st.question.options[i].correct)b.classList.add('correct');if(i===oi&&!opt.correct)b.classList.add('incorrect')});const eb=document.getElementById('explain-'+si);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;eb.className='explanation-box correct';eb.innerHTML='<strong>Correct!</strong> '+st.question.explanation.correct}else{eb.className='explanation-box incorrect';eb.innerHTML='<strong>Not quite.</strong> '+st.question.explanation.incorrect}eb.style.display='block';document.getElementById('teaching-'+si).style.display='block';const wy=document.getElementById('why-'+si);if(wy)wy.style.display='block';document.getElementById('next-'+si).style.display='inline-block'}
function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let lvl='Developing';if(pct>=90)lvl='Mastery';else if(pct>=70)lvl='Proficient';else if(pct>=50)lvl='Competent';document.getElementById('scene-container').innerHTML='<div class="completion-card"><h2>Case Complete!</h2><p style="font-size:2rem;font-weight:700;color:var(--rdx-teal,#2874a6)">'+pct+'%</p><p style="color:var(--rdx-text-muted,#64748b)">Score: '+score+'/'+mx+'</p><p style="margin:12px 0;font-weight:600">Level: '+lvl+'</p><div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="../adventure-hub.html" style="padding:10px 20px;background:var(--rdx-teal,#2874a6);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">More Cases</a><a href="../tools/learning-dashboard.html" style="padding:10px 20px;background:var(--rdx-purple,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">Dashboard</a><button onclick="currentStage=0;score=0;document.getElementById(\'score\').textContent=0;renderStage(0)" style="padding:10px 20px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;cursor:pointer;font-weight:600">Retry</button></div></div>';try{const progress=JSON.parse(localStorage.getItem('reasondx-progress')||'{}');if(!progress.cases)progress.cases={};progress.cases['placental-disorders']=Math.max(progress.cases['placental-disorders']||0,pct);localStorage.setItem('reasondx-progress',JSON.stringify(progress))}catch(e){}}
renderStage(0);</script>
