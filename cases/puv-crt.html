    <div class="container">
        <div class="header">
            <h1>🚫 Posterior Urethral Valves</h1>
            <div class="score-display">
                <div class="score-item">Score: <strong id="score">0</strong>/<span id="maxScore">70</span></div>
                <div class="score-item">Stage: <span id="stageNum">1</span>/7</div>

    </div>
    <script>
    let currentStage = 0, score = 0;
    const stages = [
        {title:"Prenatal Discovery",content:'<div class="narrative"><p>A 28-year-old G2P1 presents for her <span class="highlight">20-week anatomy ultrasound</span>. The sonographer notes <span class="highlight">bilateral hydronephrosis</span>, a <span class="highlight">distended thick-walled bladder</span>, and a <span class="critical">"keyhole sign"</span> - a dilated bladder with dilated posterior urethra. Amniotic fluid volume is decreased.</p></div>',question:{prompt:"What is the most likely diagnosis in this MALE fetus?",options:[{text:"Ureteropelvic junction obstruction",correct:false},{text:"Posterior urethral valves",correct:true},{text:"Vesicoureteral reflux",correct:false},{text:"Prune belly syndrome",correct:false}],explanation:{correct:"Correct! The 'keyhole sign' (dilated bladder + dilated posterior urethra) with bilateral hydronephrosis and oligohydramnios is pathognomonic for PUV. This occurs ONLY in males.",incorrect:"The keyhole sign is pathognomonic for PUV - dilated bladder connected to dilated posterior urethra looks like an old-fashioned keyhole."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Prenatal Findings in PUV</div><div class="pathway">CLASSIC PRENATAL ULTRASOUND:\n• "Keyhole sign" = dilated bladder\n  + dilated posterior urethra\n• Bilateral hydronephrosis\n• Thickened bladder wall\n• Oligohydramnios (decreased AF)\n• ± Echogenic kidneys (dysplasia)\n\nKEY: Only occurs in MALES\n(valves are in prostatic urethra)</div></div>',points:10}},
        
        {title:"Understanding the Pathophysiology",content:'<div class="narrative"><p>You explain to the parents that posterior urethral valves cause obstruction to urine outflow, leading to a cascade of problems affecting the entire urinary system.</p></div>',question:{prompt:"What is the embryologic origin of posterior urethral valves?",options:[{text:"Incomplete canalization of the urethra",correct:false},{text:"Abnormal integration of mesonephric ducts into the urethra",correct:true},{text:"Failure of the urorectal septum",correct:false},{text:"Persistence of the cloaca",correct:false}],explanation:{correct:"Correct! PUV result from abnormal integration/incorporation of the mesonephric (Wolffian) ducts into the primitive urethra during urogenital sinus development.",incorrect:"PUV arise from abnormal mesonephric duct integration into the developing urethra."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Pathophysiologic Cascade</div><div class="pathway">URETHRAL OBSTRUCTION\n        ↓\n↑ Bladder pressure\n        ↓\n┌───────────┴───────────┐\nBladder changes    Upper tract\n• Thickening       • VUR (50%)\n• Trabeculation    • Hydronephrosis\n• Diverticula      • Renal dysplasia\n        ↓\n↓ Fetal urine output\n        ↓\nOLIGOHYDRAMNIOS\n        ↓\nPulmonary hypoplasia</div></div>',points:10}},

        {title:"Severity Assessment",content:'<div class="narrative"><p>The perinatologist is counseling the family about prognosis. They ask what factors predict how the baby will do after birth.</p></div>',question:{prompt:"Which finding is the BEST predictor of poor long-term renal outcome?",options:[{text:"Presence of VUR",correct:false},{text:"Nadir serum creatinine >1.0 mg/dL after birth",correct:true},{text:"Bilateral hydronephrosis",correct:false},{text:"Male gender",correct:false}],explanation:{correct:"Correct! The nadir creatinine (lowest creatinine after initial decompression) is the best predictor of long-term renal function. Nadir Cr >1.0 mg/dL predicts higher risk of ESRD.",incorrect:"Nadir creatinine <1.0 after decompression = better prognosis. >1.0 = higher ESRD risk."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Prognostic Factors</div><div class="pathway">BETTER PROGNOSIS:\n• Nadir creatinine <1.0 mg/dL\n• Normal amniotic fluid\n• Normal renal echogenicity\n• Unilateral VUR (VURD = pop-off)\n\nWORSE PROGNOSIS:\n• Nadir creatinine >1.0 mg/dL\n• Severe oligohydramnios\n• Echogenic/dysplastic kidneys\n• Bilateral high-grade VUR\n• Pulmonary hypoplasia\n\n25-30% progress to ESRD</div></div>',points:10}},

        {title:"Postnatal Management",content:'<div class="narrative"><p>The baby is delivered at 36 weeks. He has respiratory distress requiring support. You are consulted by the NICU. On exam, you palpate a <span class="highlight">distended bladder</span> and the baby has only been producing small amounts of urine.</p></div>',question:{prompt:"What is the FIRST step in management?",options:[{text:"Emergent cystoscopy for valve ablation",correct:false},{text:"Place a bladder catheter for drainage",correct:true},{text:"Obtain VCUG immediately",correct:false},{text:"Start prophylactic antibiotics only",correct:false}],explanation:{correct:"Correct! Initial stabilization requires bladder drainage with a catheter (6-8 Fr feeding tube if Foley won't pass). This decompresses the system while you stabilize the baby and plan definitive treatment.",incorrect:"First priority is DRAINAGE. Stabilize with a catheter, then proceed with workup and definitive treatment."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Initial Management</div><div class="pathway">STEP 1: BLADDER DRAINAGE\n• Foley catheter (6-8 Fr)\n• If won\'t pass → feeding tube\n• Monitor urine output\n\nSTEP 2: STABILIZE\n• Respiratory support if needed\n• Monitor electrolytes (hyperK+)\n• Check creatinine\n• Antibiotics if infection suspected\n\nSTEP 3: CONFIRM DIAGNOSIS\n• Renal/bladder ultrasound\n• VCUG (gold standard)\n\nSTEP 4: DEFINITIVE TREATMENT\n• Valve ablation when stable</div></div>',points:10}},

        {title:"Diagnostic Confirmation",content:'<div class="narrative"><p>After placing a catheter and stabilizing the baby, you order imaging studies. The VCUG is performed.</p></div>',question:{prompt:"What is the GOLD STANDARD finding on VCUG that confirms PUV?",options:[{text:"Bilateral vesicoureteral reflux",correct:false},{text:"Trabeculated bladder",correct:false},{text:"Dilated posterior urethra with abrupt caliber change",correct:true},{text:"Large post-void residual",correct:false}],explanation:{correct:"Correct! VCUG shows the pathognomonic dilated, elongated posterior urethra with an abrupt caliber change at the level of the valve. You may also see trabeculated bladder and VUR, but the urethral finding is diagnostic.",incorrect:"The diagnostic finding is the DILATED POSTERIOR URETHRA with abrupt caliber change at the valve level."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 VCUG Findings in PUV</div><div class="pathway">DIAGNOSTIC FINDINGS:\n• Dilated posterior urethra\n• Abrupt caliber change at valve\n• "Spinning top" or "shield" urethra\n\nASSOCIATED FINDINGS:\n• Trabeculated bladder wall\n• Bladder diverticula\n• VUR (present in ~50%)\n• Vesicoureteral reflux\n\nVCUG is ESSENTIAL for diagnosis!\nUltrasound alone is not sufficient.</div></div>',points:10}},

        {title:"Definitive Treatment",content:'<div class="narrative"><p>The VCUG confirms Type I posterior urethral valves with bilateral Grade III VUR. The baby is now stable on room air with good urine output via catheter.</p></div>',question:{prompt:"What is the definitive treatment for PUV?",options:[{text:"Long-term catheter drainage",correct:false},{text:"Primary endoscopic valve ablation",correct:true},{text:"Bilateral ureteral reimplantation",correct:false},{text:"Vesicostomy only",correct:false}],explanation:{correct:"Correct! Primary endoscopic valve ablation (PEVA) is the treatment of choice. The valve leaflets are resected cystoscopically using cold knife, Bugbee electrode, or laser. If the baby is too small/unstable, temporary vesicostomy can be performed first.",incorrect:"Endoscopic valve ablation is definitive treatment. Vesicostomy is a temporizing option if ablation isn't feasible."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Surgical Options</div><div class="pathway">DEFINITIVE: VALVE ABLATION\n• Cystoscopic resection\n• Cold knife, Bugbee, or laser\n• Can do in neonatal period if stable\n• Re-check with VCUG post-op\n\nIF ABLATION NOT FEASIBLE:\n• Vesicostomy (temporary)\n• Ureterostomy (if severe)\n• Later ablation when larger\n\nVUR MANAGEMENT:\n• Often resolves after ablation\n• Surgery if persistent/symptomatic</div></div>',points:10}},

        {title:"Long-term Considerations",content:'<div class="narrative"><p>The valve ablation was successful. At follow-up, the parents ask about long-term expectations.</p></div>',question:{prompt:"What is the most important long-term complication to monitor for, even after successful valve ablation?",options:[{text:"Recurrence of valves",correct:false},{text:"Bladder dysfunction (valve bladder syndrome)",correct:true},{text:"Urethral stricture",correct:false},{text:"Testicular atrophy",correct:false}],explanation:{correct:"Correct! 'Valve bladder syndrome' is a lifelong concern - even after successful ablation, the bladder may never function normally. Features include poor compliance, incomplete emptying, and myogenic failure. Many patients need CIC long-term.",incorrect:"Valve bladder syndrome persists even after ablation - the bladder dysfunction is often permanent."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Long-term Management</div><div class="pathway">VALVE BLADDER SYNDROME:\n• Poor compliance\n• Myogenic failure\n• Incomplete emptying\n• May need CIC lifelong\n• May need augmentation\n\nLONG-TERM MONITORING:\n• Renal function (creatinine, GFR)\n• Blood pressure\n• Growth\n• Bladder function (urodynamics)\n• Continence\n\nOUTCOMES:\n• 25-30% progress to ESRD\n• Many achieve continence\n• Fertility often preserved\n• Transition to adult care needed</div></div>',points:10}}
    ];
    
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('stageNum').textContent=currentStage+1;document.getElementById('maxScore').textContent=stages.length*10;}
    
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><strong>✓ Correct!</strong> '+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><strong>✗ Not quite.</strong> '+stage.question.explanation.incorrect+'</div><div class="teaching-point" id="teaching">'+stage.question.teaching+'</div><button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}document.getElementById('teaching').classList.add('show');document.getElementById('next-btn').classList.add('show');}
    
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene" style="text-align:center;padding:40px;"><h2 style="color: #64748b;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong>/'+stages.length*10+'</p><div style="margin-top:20px;padding:15px;background:rgba(59,130,246,0.15);border-radius:12px;border:1px solid rgba(59,130,246,0.3);"><p style="color:var(--rdx-teal-light,#ccfbf1);margin-bottom:10px;font-weight:600;">📚 Learn More:</p><div style="display:flex;flex-wrap:wrap;gap:8px;"><a href="../mechanism/posterior-urethral-valves-module.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📘 ReasonDx</a><a href="https://www.ncbi.nlm.nih.gov/books/?term=pediatric+urology" target="_blank" title="Deep dive via StatPearls" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📊 Deep Dive</a></div><div style="margin-top:10px;"><a href="https://www.ncbi.nlm.nih.gov/books/NBK532904/" target="_blank" style="color:var(--rdx-teal-light,#ccfbf1);font-size:0.8rem;">📖 StatPearls Reference</a></div></div><p>You mastered Posterior Urethral Valves!</p></div>';}}
    
    renderStage();
    </script>
