    <div class="container">
        <div class="header">
            <h1>🎗️ Testicular Cancer</h1>
            <div class="score-display">
                <div class="score-item">Score: <strong id="score">0</strong>/<span id="maxScore">70</span></div>
                <div class="score-item">Stage: <span id="stageNum">1</span>/7</div>

    <script>
    let currentStage = 0, score = 0;
    const stages = [
        {title:"The Discovery",content:'<div class="narrative"><p>A <span class="highlight">26-year-old man</span> presents after noticing a <span class="critical">painless lump in his right testicle</span> while showering. He first noticed it 3 weeks ago and it seems to be growing. He has no pain, no urinary symptoms, and no trauma. He had a history of <span class="highlight">right undescended testicle repaired at age 2</span>.</p></div>',question:{prompt:"What is the most likely diagnosis?",options:[{text:"Epididymal cyst",correct:false},{text:"Testicular cancer",correct:true},{text:"Varicocele",correct:false},{text:"Hydrocele",correct:false}],explanation:{correct:"Correct! A painless testicular mass in a young man is testicular cancer until proven otherwise. His history of cryptorchidism increases his risk 5-10x. Testicular cancer is the most common solid tumor in men ages 15-35.",incorrect:"Painless testicular mass = cancer until proven otherwise. Prior cryptorchidism increases risk 5-10x. This is classic presentation."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Testicular Cancer Basics</div><div class="pathway">EPIDEMIOLOGY:\n• Most common solid tumor in men 15-35\n• Highly curable (>95% overall)\n• 95% are germ cell tumors\n\nRISK FACTORS:\n• Cryptorchidism (5-10x risk)\n• Personal history (2-3% contralateral)\n• Family history\n• Testicular dysgenesis\n\nPRESENTATION:\n• Painless testicular mass (classic)\n• Testicular heaviness\n• Dull ache\n• Incidental finding</div></div>',points:10}},
        
        {title:"Initial Workup",content:'<div class="narrative"><p>On exam, you palpate a <span class="critical">firm, non-tender 2cm mass</span> within the right testicle. It does not transilluminate. The left testicle is normal.</p></div>',question:{prompt:"What is the FIRST diagnostic test to order?",options:[{text:"CT scan of abdomen/pelvis",correct:false},{text:"Testicular ultrasound",correct:true},{text:"Testicular biopsy",correct:false},{text:"MRI of scrotum",correct:false}],explanation:{correct:"Correct! Scrotal ultrasound is the first test - it confirms intratesticular location, characterizes the mass, and helps differentiate from benign conditions. A solid intratesticular mass is highly concerning for malignancy.",incorrect:"Scrotal ultrasound is FIRST. It confirms the mass is intratesticular (concerning) vs extratesticular (usually benign). NEVER biopsy through the scrotum!"},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Diagnostic Workup</div><div class="pathway">STEP 1: SCROTAL ULTRASOUND\n• Confirms intratesticular mass\n• Characterizes (solid vs cystic)\n• Evaluates contralateral testis\n\nSTEP 2: TUMOR MARKERS (pre-op)\n• AFP\n• β-hCG\n• LDH\n\nSTEP 3: STAGING CT\n• Chest, abdomen, pelvis\n\nSTEP 4: RADICAL INGUINAL ORCHIECTOMY\n⚠️ NEVER trans-scrotal biopsy!\n⚠️ NEVER trans-scrotal orchiectomy!\n(Disrupts lymphatic drainage)</div></div>',points:10}},

        {title:"Tumor Markers",content:'<div class="narrative"><p>Ultrasound confirms a solid, hypoechoic intratesticular mass. You order tumor markers before surgery: <span class="highlight">AFP 450 ng/mL</span> (normal <10), hCG 15 mIU/mL (normal <5), LDH 280 U/L (normal).</p></div>',question:{prompt:"The elevated AFP indicates this is most likely:",options:[{text:"Pure seminoma",correct:false},{text:"Non-seminomatous germ cell tumor (NSGCT)",correct:true},{text:"Leydig cell tumor",correct:false},{text:"Lymphoma",correct:false}],explanation:{correct:"Correct! Pure seminoma NEVER elevates AFP. If AFP is elevated, there MUST be non-seminomatous elements (yolk sac tumor or embryonal carcinoma), even if pathology says 'seminoma.' This will be treated as NSGCT.",incorrect:"AFP elevation = NSGCT. Pure seminoma NEVER produces AFP. This is a critical rule - even if biopsy says 'seminoma,' elevated AFP means NSGCT treatment."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Tumor Markers</div><div class="pathway">AFP (Alpha-Fetoprotein):\n• Half-life: 5-7 days\n• Elevated in: Yolk sac tumor,\n  embryonal carcinoma, mixed GCT\n• NEVER elevated in pure seminoma!\n\nβ-hCG:\n• Half-life: 24-36 hours\n• Elevated in: Choriocarcinoma (high!),\n  seminoma (10%), embryonal\n\nLDH:\n• Nonspecific\n• Correlates with tumor burden\n\nCRITICAL RULE:\nElevated AFP = NSGCT\n(regardless of what pathology says)</div></div>',points:10}},

        {title:"Surgical Management",content:'<div class="narrative"><p>You schedule surgery. The patient asks why you can\'t just remove the tumor through a scrotal incision.</p></div>',question:{prompt:"What is the CORRECT surgical approach for testicular cancer?",options:[{text:"Trans-scrotal orchiectomy",correct:false},{text:"Trans-scrotal biopsy first, then decide",correct:false},{text:"Radical inguinal orchiectomy with early cord clamping",correct:true},{text:"Partial orchiectomy (testis-sparing)",correct:false}],explanation:{correct:"Correct! Radical INGUINAL orchiectomy with early high ligation of the spermatic cord is the standard approach. The inguinal approach prevents disruption of scrotal lymphatics (which drain differently than testicular lymphatics).",incorrect:"INGUINAL approach is mandatory. Trans-scrotal violates scrotal lymphatics and can upstage disease. Early cord clamping prevents tumor spillage."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Surgical Principles</div><div class="pathway">RADICAL INGUINAL ORCHIECTOMY:\n• Incision: Inguinal (NOT scrotal)\n• Early clamping of spermatic cord\n• Removes testis + cord to internal ring\n\nWHY INGUINAL?\n• Testicular lymphatics → retroperitoneum\n• Scrotal lymphatics → inguinal nodes\n• Trans-scrotal approach alters drainage\n  and can upstage disease\n\nNEVER:\n• Trans-scrotal biopsy\n• Trans-scrotal orchiectomy\n• FNA of testicular mass\n\nThese are contraindicated and\ncan change staging/prognosis!</div></div>',points:10}},

        {title:"Pathology Results",content:'<div class="narrative"><p>Radical inguinal orchiectomy is performed. Pathology returns: <span class="highlight">Mixed germ cell tumor</span> - 60% embryonal carcinoma, 30% yolk sac tumor, 10% teratoma. Tumor confined to testis, no lymphovascular invasion.</p></div>',question:{prompt:"What is the clinical stage if CT shows no lymphadenopathy or metastases and post-op markers normalize?",options:[{text:"Stage I",correct:true},{text:"Stage II",correct:false},{text:"Stage III",correct:false},{text:"Cannot be staged without RPLND",correct:false}],explanation:{correct:"Correct! Stage I = tumor confined to testis with no evidence of metastases. CT shows no lymph nodes, no distant metastases, and markers normalize after orchiectomy. This has excellent prognosis.",incorrect:"Stage I = confined to testis, no mets, markers normalize. Stage II = retroperitoneal nodes. Stage III = distant mets or very high markers."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Staging</div><div class="pathway">STAGE I:\n• Tumor confined to testis\n• No lymph node involvement\n• No distant metastases\n• Markers normalize post-orchiectomy\n\nSTAGE II:\n• Retroperitoneal lymph node involvement\n• IIA: <2cm\n• IIB: 2-5cm\n• IIC: >5cm\n\nSTAGE III:\n• Distant metastases (lung, liver, brain)\n• Or markedly elevated markers\n\nFOR NSGCT STAGE I OPTIONS:\n• Surveillance (if low risk)\n• RPLND (nerve-sparing)\n• Adjuvant chemo (BEP x1-2)</div></div>',points:10}},

        {title:"Stage I Management",content:'<div class="narrative"><p>Staging CT is negative, markers normalized. This is Stage I NSGCT. You discuss management options.</p></div>',question:{prompt:"What are the management options for Stage I NSGCT?",options:[{text:"Radiation therapy",correct:false},{text:"Surveillance, RPLND, or adjuvant chemotherapy",correct:true},{text:"Immediate BEP x4 cycles",correct:false},{text:"No further treatment needed ever",correct:false}],explanation:{correct:"Correct! Stage I NSGCT options include: 1) Surveillance (close monitoring, treat if recurrence); 2) Primary RPLND (removes retroperitoneal nodes); 3) Adjuvant BEP x1-2 cycles. Choice depends on risk factors and patient preference.",incorrect:"Stage I NSGCT: Surveillance OR RPLND OR adjuvant BEP. Radiation is for seminoma, not NSGCT."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Stage I NSGCT Management</div><div class="pathway">SURVEILLANCE:\n• Close follow-up with markers + CT\n• Treat only if recurrence (~30%)\n• Avoids overtreatment in 70%\n• Requires compliant patient\n\nRPLND (Retroperitoneal LN Dissection):\n• Removes nodes at risk\n• Nerve-sparing preserves ejaculation\n• Diagnostic and therapeutic\n• ~20-30% will have positive nodes\n\nADJUVANT BEP x1-2:\n• Reduces recurrence to <5%\n• Quick completion\n• Some toxicity\n\nRISK FACTORS FOR RECURRENCE:\n• Lymphovascular invasion\n• >50% embryonal carcinoma</div></div>',points:10}},

        {title:"Metastatic Disease Treatment",content:'<div class="narrative"><p>A different patient presents with Stage IIB NSGCT - 3cm retroperitoneal lymph nodes, elevated markers.</p></div>',question:{prompt:"What is the standard treatment for metastatic testicular cancer?",options:[{text:"Radiation therapy alone",correct:false},{text:"BEP chemotherapy (bleomycin, etoposide, cisplatin)",correct:true},{text:"Immunotherapy",correct:false},{text:"Hormonal therapy",correct:false}],explanation:{correct:"Correct! BEP chemotherapy is the backbone of treatment for metastatic testicular cancer - bleomycin, etoposide, and platinum (cisplatin). 3-4 cycles depending on risk classification. Cure rates are excellent even with metastatic disease.",incorrect:"BEP chemotherapy is standard for metastatic GCT. Even with widespread metastases, cure rates are 70-80%!"},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Metastatic GCT Treatment</div><div class="pathway">BEP CHEMOTHERAPY:\n• Bleomycin\n• Etoposide\n• Platinum (Cisplatin)\n\n3-4 cycles based on IGCCCG risk:\n• Good risk: 3 cycles BEP (90% cure)\n• Intermediate: 4 cycles BEP (75%)\n• Poor risk: 4 cycles BEP (50%)\n\nAFTER CHEMO:\n• Recheck markers and imaging\n• If residual mass (NSGCT):\n  → Post-chemo RPLND\n• Seminoma: PET, observe if <3cm\n\nHIGHLY CURABLE!\nEven metastatic = 70-80% cure\nThis is one of the great successes\nof modern oncology</div></div>',points:10}}
    ];
    
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('stageNum').textContent=currentStage+1;document.getElementById('maxScore').textContent=stages.length*10;}
    
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><strong>✓ Correct!</strong> '+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><strong>✗ Not quite.</strong> '+stage.question.explanation.incorrect+'</div><div class="teaching-point" id="teaching">'+stage.question.teaching+'</div><button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=10;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}document.getElementById('teaching').classList.add('show');document.getElementById('next-btn').classList.add('show');}
    
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene" style="text-align:center;padding:40px;"><h2 style="color:#94a3b8;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong>/70</p><div style="margin-top:20px;padding:15px;background:rgba(59,130,246,0.15);border-radius:12px;border:1px solid rgba(59,130,246,0.3);"><p style="color:var(--rdx-teal,#2874a6);margin-bottom:10px;font-weight:600;">📚 Learn More:</p><div style="display:flex;flex-wrap:wrap;gap:8px;"><a href="../mechanism/testicular-cancer-module.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📘 ReasonDx</a><a href="https://www.ncbi.nlm.nih.gov/books/?term=testicular+cancer" target="_blank" title="Deep dive via StatPearls" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📊 Deep Dive</a></div><div style="margin-top:10px;"><a href="https://www.ncbi.nlm.nih.gov/books/NBK563159/" target="_blank" style="color:var(--rdx-teal,#2874a6);font-size:0.8rem;">📖 StatPearls Reference</a></div></div><p>You mastered Testicular Cancer!</p><p style="margin-top:15px;color: #1f5f8b;">Remember: Painless mass = cancer until proven otherwise!</p></div>';}}
    
    renderStage();
    </script>
