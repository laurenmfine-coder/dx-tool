<script>let currentStage=0,score=0,difficulty='standard';
const stages=[{
title:"The TB Patient",
content:`<div class="narrative"><p>A <span class="highlight">42-year-old immigrant</span> from India presents with 3 months of cough, night sweats, 10 kg weight loss, and hemoptysis. CXR shows a right upper lobe cavitary lesion. AFB smear is positive.</p><div class="vital-signs"><div class="vital-item"><span class="label">HR</span><span class="value">92</span></div><div class="vital-item"><span class="label">Temp</span><span class="value">38.1°C</span></div><div class="vital-item"><span class="label">RR</span><span class="value">20</span></div></div></div>`,
hint_beginner:"What is the standard initial TB regimen?",
hint_advanced:"Remember RIPE — what does each drug target?",
question:{
prompt:"What is the standard initial regimen for active pulmonary TB?",
options:[{text:"RIPE: Rifampin + Isoniazid + Pyrazinamide + Ethambutol × 2 months, then RI × 4 months",correct:true},{text:"Rifampin monotherapy × 6 months",correct:false},{text:"Levofloxacin + amikacin × 12 months",correct:false},{text:"Isoniazid monotherapy × 9 months",correct:false}],
explanation:{correct:"Correct! The standard 6-month regimen: intensive phase RIPE × 2 months (4 drugs to prevent resistance), then continuation phase RI × 4 months. Never use monotherapy for active TB — resistance develops rapidly.",incorrect:"RIPE × 2 months then RI × 4 months is the standard 6-month regimen. Multi-drug therapy prevents resistance emergence."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">RIPE Regimen</div><div class="pathway"><strong>R</strong>ifampin: RNA polymerase inhibitor. Orange body fluids. CYP450 inducer (drug interactions!).<br><strong>I</strong>soniazid (INH): Mycolic acid synthesis inhibitor. Hepatotoxic. Peripheral neuropathy (give B6/pyridoxine).<br><strong>P</strong>yrazinamide: Disrupts membrane potential. Hepatotoxic. Hyperuricemia/gout.<br><strong>E</strong>thambutol: Arabinosyltransferase inhibitor. Optic neuritis (red-green color blindness). Dose-adjust for renal function.</div></div>`,
why_chain:[{q:"Why 4 drugs initially?",a:"TB bacilli in cavitary lesions number ~10^8-10^9. Spontaneous resistance to any single drug occurs at ~10^-6. With 4 drugs, the probability of resistance to all 4 simultaneously is ~10^-24 — virtually impossible."}],
points:10
}
},{
title:"Isoniazid Deep Dive",
content:`<div class="narrative"><p>INH is the backbone of TB treatment. Understanding its unique pharmacology and toxicity profile is essential.</p></div>`,
hint_beginner:"How does INH work and what are its major side effects?",
hint_advanced:"INH is a prodrug — what enzyme activates it, and what does this tell us about resistance?",
question:{
prompt:"What enzyme activates isoniazid, and what is the implication for resistance?",
options:[{text:"Dihydrofolate reductase",correct:false},{text:"Catalase-peroxidase (KatG) — mutations in KatG cause INH resistance",correct:true},{text:"Cytochrome P450 3A4",correct:false},{text:"DNA gyrase",correct:false}],
explanation:{correct:"Correct! INH is a prodrug activated by mycobacterial catalase-peroxidase (KatG). The active form inhibits InhA, blocking mycolic acid synthesis. KatG mutations are the #1 cause of INH resistance.",incorrect:"INH requires KatG activation. KatG mutations → INH resistance. The active metabolite inhibits mycolic acid synthesis (unique to mycobacteria)."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">INH Pharmacology</div><div class="pathway"><strong>Activation:</strong> KatG (catalase-peroxidase) converts INH → active nicotinoyl radical<br><strong>Target:</strong> InhA (enoyl-ACP reductase) → blocks mycolic acid synthesis<br><strong>Metabolism:</strong> N-acetyltransferase (NAT2) — fast vs slow acetylators (genetic polymorphism)<br><br><strong>Toxicity:</strong><br>• Hepatotoxicity (risk increases with age, alcohol, concurrent rifampin)<br>• Peripheral neuropathy (depletes pyridoxine/B6 → always supplement)<br>• Drug-induced lupus (slow acetylators)<br>• Sideroblastic anemia (B6 depletion)</div></div>`,
why_chain:[{q:"Why give pyridoxine (B6) with INH?",a:"INH competes with pyridoxal phosphate (active B6) and inhibits its function. B6 is a cofactor for peripheral nerve function. Depletion → peripheral neuropathy. Highest risk: pregnancy, malnutrition, HIV, diabetes, slow acetylators."}],
points:10
}
},{
title:"Rifampin Drug Interactions",
content:`<div class="narrative"><p>Your patient is also HIV-positive on antiretroviral therapy. Rifampin has critical drug interactions you must address.</p></div>`,
hint_beginner:"Why is rifampin problematic with many medications?",
hint_advanced:"Rifampin is the most potent CYP450 inducer in clinical use. What does this mean for co-administered drugs?",
question:{
prompt:"What is the mechanism of rifampin drug interactions?",
options:[{text:"Renal tubular secretion blocker",correct:false},{text:"P-glycoprotein inhibitor",correct:false},{text:"Potent CYP450 inducer (especially CYP3A4) → accelerates metabolism of many drugs",correct:true},{text:"CYP450 inhibitor → slows drug metabolism",correct:false}],
explanation:{correct:"Correct! Rifampin is the most potent CYP3A4 inducer known. It dramatically reduces levels of: antiretrovirals (especially PIs and NNRTIs), warfarin, oral contraceptives, methadone, antifungals, and many more. Use rifabutin (weaker inducer) for HIV patients on ART.",incorrect:"Rifampin powerfully induces CYP3A4, reducing levels of countless co-administered drugs. Substitute rifabutin for HIV patients on ART."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Rifampin Interactions</div><div class="pathway"><strong>Mechanism:</strong> Induces CYP3A4, 2C9, 2C19, 1A2, P-glycoprotein<br><strong>Effect:</strong> Reduces levels of co-administered drugs by 50-95%<br><br><strong>Critical interactions:</strong><br>• HIV antiretrovirals (use rifabutin instead)<br>• Warfarin (need 2-3x dose increase)<br>• Oral contraceptives (FAILURE — use alternative contraception)<br>• Methadone (precipitates withdrawal)<br>• Azole antifungals (subtherapeutic levels)<br><br><strong>Rifabutin:</strong> Weaker CYP inducer, preferred when drug interactions are problematic</div></div>`,
why_chain:[{q:"Why not just increase the dose of the interacting drug?",a:"For some drugs (warfarin), dose adjustment works. For others (protease inhibitors), rifampin reduces levels so dramatically that adequate dosing cannot be achieved. Rifabutin achieves similar anti-TB efficacy with manageable interactions."}],
points:10
}
},{
title:"Monitoring for Hepatotoxicity",
content:`<div class="narrative"><p>At the 4-week follow-up, the patient reports nausea and his ALT is 280 U/L (5× ULN). This requires careful management.</p></div>`,
hint_beginner:"When should TB drugs be held for hepatotoxicity?",
hint_advanced:"Which of the RIPE drugs are hepatotoxic, and which is safe to continue?",
question:{
prompt:"At what ALT threshold should TB medications be discontinued?",
options:[{text:"Any ALT elevation above normal",correct:false},{text:"Only if ALT exceeds 1000 U/L",correct:false},{text:"Never — continue treatment regardless",correct:false},{text:"ALT >3× ULN with symptoms OR >5× ULN without symptoms",correct:true}],
explanation:{correct:"Correct! Hold hepatotoxic drugs (INH, rifampin, pyrazinamide) when ALT >3× ULN with symptoms or >5× ULN without symptoms. Ethambutol and a fluoroquinolone can be used as a bridge. Rechallenge one drug at a time (rifampin first, then INH) once LFTs normalize.",incorrect:"Hold INH/rifampin/PZA for ALT >3× with symptoms or >5× without symptoms. Rechallenge sequentially after normalization."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">TB Drug Hepatotoxicity</div><div class="pathway"><strong>Hepatotoxic:</strong> INH, Rifampin, Pyrazinamide (PZA is worst)<br><strong>Non-hepatotoxic:</strong> Ethambutol, Fluoroquinolones, Aminoglycosides<br><br><strong>Management:</strong><br>1. Hold INH + RIF + PZA<br>2. Bridge with ethambutol + fluoroquinolone + aminoglycoside<br>3. When ALT <2× ULN, rechallenge sequentially:<br>   → Rifampin first (3-7 days) → add INH (3-7 days)<br>   → PZA usually NOT rechallenged (most hepatotoxic, contributes least to shortened regimen — extend treatment to 9 months instead)</div></div>`,
why_chain:[{q:"Why rechallenge rifampin before INH?",a:"Rifampin is the most important drug for treatment shortening (6 vs 9+ months). INH hepatotoxicity is more common but rifampin is more critical for efficacy. Reintroducing the most important drug first ensures the most effective regimen."}],
points:10
}
},{
title:"MDR-TB",
content:`<div class="narrative"><p>A different patient has TB resistant to both isoniazid and rifampin (MDR-TB). This requires a fundamentally different approach.</p></div>`,
hint_beginner:"What defines MDR-TB vs XDR-TB?",
hint_advanced:"Consider the newer WHO-recommended regimens including bedaquiline.",
question:{
prompt:"What defines multidrug-resistant TB (MDR-TB)?",
options:[{text:"Resistance to at least isoniazid AND rifampin",correct:true},{text:"Resistance to any single TB drug",correct:false},{text:"Resistance to all four RIPE drugs",correct:false},{text:"Resistance only to fluoroquinolones",correct:false}],
explanation:{correct:"Correct! MDR-TB = resistance to INH + rifampin (the two most potent drugs). XDR-TB = MDR + resistance to a fluoroquinolone AND bedaquiline or linezolid. Treatment requires 9-18 months with second-line agents.",incorrect:"MDR-TB requires resistance to both INH and rifampin. Treatment is longer and more complex, using second-line agents including bedaquiline."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Drug-Resistant TB</div><div class="pathway"><strong>MDR-TB:</strong> Resistant to INH + rifampin<br><strong>Pre-XDR-TB:</strong> MDR + FQ resistance<br><strong>XDR-TB:</strong> MDR + FQ + bedaquiline or linezolid resistance<br><br><strong>MDR-TB regimen (WHO 2022):</strong> Bedaquiline + pretomanid + linezolid (BPaL) ± moxifloxacin × 6-9 months<br><br><strong>Second-line drugs:</strong> Bedaquiline (ATP synthase inhibitor), delamanid, linezolid, fluoroquinolones, clofazimine, cycloserine</div></div>`,
why_chain:[{q:"What is bedaquiline and why is it revolutionary?",a:"Bedaquiline inhibits mycobacterial ATP synthase — the first new TB drug class in 40+ years. It dramatically improved MDR-TB cure rates from ~50% to >80%. Monitor QT interval (can prolong QTc)."}],
points:10
}
},{
title:"Latent TB Treatment",
content:`<div class="narrative"><p>The patients 10-year-old daughter has a positive IGRA but a normal CXR and no symptoms. She has latent TB infection (LTBI).</p></div>`,
hint_beginner:"What are the current LTBI treatment options?",
hint_advanced:"Compare the 3HP (once-weekly × 12 doses) regimen to traditional 9-month INH.",
question:{
prompt:"What is the preferred short-course LTBI regimen?",
options:[{text:"RIPE × 2 months",correct:false},{text:"3HP: once-weekly INH + rifapentine × 12 weeks (directly observed)",correct:true},{text:"Rifampin + ethambutol × 6 months",correct:false},{text:"INH daily × 3 months",correct:false}],
explanation:{correct:"Correct! 3HP (12 weekly doses of INH + rifapentine) has equivalent efficacy to 9-month daily INH with better completion rates (~80% vs ~50%). Alternative short regimens: 4R (rifampin daily × 4 months) or 3HR (INH + rifampin daily × 3 months).",incorrect:"3HP (weekly INH + rifapentine × 12 weeks) is preferred for LTBI — equivalent efficacy with much better adherence than 9-month INH."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">LTBI Treatment Options</div><div class="pathway"><strong>3HP:</strong> INH + rifapentine weekly × 12 weeks (DOT or SAT). Preferred.<br><strong>4R:</strong> Rifampin daily × 4 months<br><strong>3HR:</strong> INH + rifampin daily × 3 months<br><strong>6-9H:</strong> INH daily × 6-9 months (traditional, lowest completion rates)<br><br><strong>Contraindications:</strong> Active TB (always rule out first!), prior LTBI treatment completion<br><strong>Monitor:</strong> Monthly LFTs if risk factors (age >35, liver disease, alcohol, HIV)</div></div>`,
why_chain:[{q:"Why treat LTBI at all if the patient is asymptomatic?",a:"5-10% of LTBI will progress to active TB over a lifetime (higher in immunocompromised). Treatment reduces reactivation risk by 60-90%. It is both an individual benefit and a public health intervention to reduce the TB reservoir."}],
points:10
}
}];
document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hb=document.querySelector('.hint-box');if(hb)hb.style.display=d==='beginner'?'block':'none'}
function toggleReferences(){const c=document.getElementById('referencesContent');const t=document.getElementById('refToggle');if(c.style.display==='none'){c.style.display='block';t.innerHTML='&#9662;'}else{c.style.display='none';t.innerHTML='&#9656;'}}
function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100);document.getElementById('progress').style.width=pct+'%';let h='<h2 class="scene-title">'+st.title+'</h2>';h+='<div class="scene-content">'+st.content+'</div>';if(st.hint_beginner)h+='<div class="hint-box" id="hint-box"'+(difficulty==='beginner'?' style="display:block"':'')+'> '+st.hint_beginner+'</div>';if(difficulty==='advanced'&&st.hint_advanced)h+='<div class="hint-box" style="display:block;background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.15);color:#5b21b6"> '+st.hint_advanced+'</div>';if(st.question){h+='<div class="socratic-prompt"><h4>Clinical Question</h4><p>'+st.question.prompt+'</p></div>';h+='<div class="options-grid" id="options-'+idx+'">';st.question.options.forEach((opt,oi)=>{h+='<button class="option-btn" id="option-'+idx+'-'+oi+'" onclick="checkAnswer('+idx+','+oi+')">'+String.fromCharCode(65+oi)+'. '+opt.text+'</button>'});h+='</div>';h+='<div class="explanation-box" id="explain-'+idx+'"></div>';h+='<div id="teaching-'+idx+'" style="display:none">'+st.question.teaching+'</div>';if(st.question.why_chain&&st.question.why_chain.length>0){h+='<div id="why-'+idx+'" style="display:none">';st.question.why_chain.forEach((wc,wi)=>{h+='<div class="why-chain"><div class="why-q" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'"> '+wc.q+'</div><div class="why-a">'+wc.a+'</div></div>'});h+='</div>'}}h+='<button class="next-btn" id="next-'+idx+'" onclick="nextStage()">Continue &rarr;</button>';document.getElementById('scene-container').innerHTML=h}
function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll('#options-'+si+' .option-btn').forEach((b,i)=>{b.classList.add('disabled');if(st.question.options[i].correct)b.classList.add('correct');if(i===oi&&!opt.correct)b.classList.add('incorrect')});const eb=document.getElementById('explain-'+si);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;eb.className='explanation-box correct';eb.innerHTML='<strong>Correct!</strong> '+st.question.explanation.correct}else{eb.className='explanation-box incorrect';eb.innerHTML='<strong>Not quite.</strong> '+st.question.explanation.incorrect}eb.style.display='block';document.getElementById('teaching-'+si).style.display='block';const wy=document.getElementById('why-'+si);if(wy)wy.style.display='block';document.getElementById('next-'+si).style.display='inline-block'}
function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let lvl='Developing';if(pct>=90)lvl='Mastery';else if(pct>=70)lvl='Proficient';else if(pct>=50)lvl='Competent';document.getElementById('scene-container').innerHTML='<div class="completion-card"><h2>Case Complete!</h2><p style="font-size:2rem;font-weight:700;color:var(--rdx-teal,#2874a6)">'+pct+'%</p><p style="color:var(--rdx-text-muted,#64748b)">Score: '+score+'/'+mx+'</p><p style="margin:12px 0;font-weight:600">Level: '+lvl+'</p><div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="../adventure-hub.html" style="padding:10px 20px;background:var(--rdx-teal,#2874a6);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">More Cases</a><a href="../tools/learning-dashboard.html" style="padding:10px 20px;background:var(--rdx-purple,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">Dashboard</a><button onclick="currentStage=0;score=0;document.getElementById(\'score\').textContent=0;renderStage(0)" style="padding:10px 20px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;cursor:pointer;font-weight:600">Retry</button></div></div>';try{const progress=JSON.parse(localStorage.getItem('reasondx-progress')||'{}');if(!progress.cases)progress.cases={};progress.cases['anti-tb-drugs']=Math.max(progress.cases['anti-tb-drugs']||0,pct);localStorage.setItem('reasondx-progress',JSON.stringify(progress))}catch(e){}}
renderStage(0);</script>
