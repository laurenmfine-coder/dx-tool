<body>
    <div class="container">
        <div class="header">
            <h1>🧠 Neurogenic Bladder</h1>
            <div class="score-display">
                <div class="score-item">Score: <strong id="score">0</strong>/<span id="maxScore">70</span></div>
                <div class="score-item">Stage: <span id="stageNum">1</span>/7</div>
            </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width: 14%"></div></div>
        <div id="scene-container"></div>
    </div>
    <script>
    let currentStage = 0, score = 0;
    const stages = [
        {title:"Spinal Cord Injury",content:'<div class="narrative"><p>A <span class="highlight">28-year-old man</span> is admitted after a motorcycle accident resulting in <span class="critical">T8 spinal cord injury</span>. He has complete paraplegia. After spinal stabilization, the trauma team consults urology regarding bladder management. Currently, he has an indwelling Foley catheter placed in the ED.</p></div>',question:{prompt:"In the acute phase after spinal cord injury, what is the expected bladder finding?",options:[{text:"Overactive bladder with incontinence",correct:false},{text:"Areflexic bladder (spinal shock)",correct:true},{text:"Normal bladder function",correct:false},{text:"Immediate detrusor-sphincter dyssynergia",correct:false}],explanation:{correct:"Correct! Immediately after SCI, spinal shock causes an areflexic, flaccid bladder that cannot contract. This phase can last days to weeks. The bladder must be drained (catheter) during this period.",incorrect:"Spinal shock causes initial areflexic bladder - no contractions, urinary retention. This phase lasts days to weeks before reflexes return."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Spinal Shock Phase</div><div class="pathway">SPINAL SHOCK:\n• Occurs immediately after SCI\n• All reflexes below injury = absent\n• Bladder is AREFLEXIC (flaccid)\n• Cannot contract, causes retention\n• Duration: Days to weeks\n\nMANAGEMENT DURING SPINAL SHOCK:\n• Indwelling catheter initially\n• Transition to CIC when stable\n• Monitor for return of reflexes\n\nAFTER SPINAL SHOCK RESOLVES:\n• Bladder pattern depends on\n  level of injury\n• Above vs below sacral cord (S2-4)</div></div>',points:10}},
        
        {title:"Understanding the Anatomy",content:'<div class="narrative"><p>The patient\'s family asks about long-term bladder function. You explain that the pattern depends on the injury level relative to the sacral micturition center.</p></div>',question:{prompt:"The sacral micturition center is located at which spinal level?",options:[{text:"T10-T12",correct:false},{text:"L1-L3",correct:false},{text:"S2-S4",correct:true},{text:"S5-Coccyx",correct:false}],explanation:{correct:"Correct! The sacral micturition center (S2-S4) contains the parasympathetic neurons controlling detrusor contraction and the somatic neurons controlling the external sphincter. Injuries ABOVE vs BELOW this level produce different patterns.",incorrect:"S2-S4 is the sacral micturition center. Injuries above it (suprasacral) vs below it (sacral/infrasacral) have different bladder patterns."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Bladder Neuroanatomy</div><div class="pathway">INNERVATION:\n\nSYMPATHETIC (T11-L2):\n• Hypogastric nerve\n• Bladder relaxation (β receptors)\n• Sphincter contraction (α receptors)\n• = STORAGE function\n\nPARASYMPATHETIC (S2-S4):\n• Pelvic nerve\n• Detrusor CONTRACTION (M3)\n• = VOIDING function\n\nSOMATIC (S2-S4):\n• Pudendal nerve\n• External sphincter (voluntary)\n\nPONTINE MICTURITION CENTER:\n• Coordinates voiding\n• "Switch" for micturition</div></div>',points:10}},

        {title:"Suprasacral Pattern",content:'<div class="narrative"><p>This patient has a T8 injury, which is <span class="highlight">ABOVE the sacral cord (S2-S4)</span>. After spinal shock resolves, urodynamic testing is performed.</p></div>',question:{prompt:"What urodynamic pattern is expected with a suprasacral (T8) spinal cord injury?",options:[{text:"Areflexic bladder with low pressures",correct:false},{text:"Detrusor overactivity with detrusor-sphincter dyssynergia (DSD)",correct:true},{text:"Stress incontinence only",correct:false},{text:"Normal bladder function",correct:false}],explanation:{correct:"Correct! Suprasacral SCI causes detrusor overactivity (loss of cortical inhibition) WITH detrusor-sphincter dyssynergia (DSD) - the sphincter contracts DURING bladder contraction instead of relaxing. This is DANGEROUS due to high pressures.",incorrect:"Suprasacral SCI = Detrusor overactivity + DSD. The sphincter contracts when the bladder contracts (should relax!), creating dangerous high pressures."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Suprasacral SCI Pattern</div><div class="pathway">SUPRASACRAL INJURY (Above S2-4):\n• T8 injury = suprasacral\n\nPATTERN:\n• Detrusor OVERACTIVITY\n  (loss of cortical inhibition)\n• DETRUSOR-SPHINCTER DYSSYNERGIA\n  (sphincter contracts during void)\n• Loss of coordination\n\nDSD = DANGEROUS!\n• Sphincter won\'t relax\n• High bladder pressures (>40 cmH2O)\n• Risk of:\n  - Hydronephrosis\n  - Vesicoureteral reflux\n  - Renal damage\n  - UTIs\n\nThis is a "hostile bladder"</div></div>',points:10}},

        {title:"The Dangerous Pressure",content:'<div class="narrative"><p>Urodynamics shows detrusor overactivity with DSD. During filling, <span class="critical">detrusor pressure reaches 65 cmH2O</span> during an involuntary contraction with simultaneous sphincter activity.</p></div>',question:{prompt:"What bladder pressure threshold is considered dangerous for the upper urinary tract?",options:[{text:">20 cmH2O",correct:false},{text:">40 cmH2O",correct:true},{text:">80 cmH2O",correct:false},{text:">100 cmH2O",correct:false}],explanation:{correct:"Correct! Detrusor leak point pressure (DLPP) or storage pressure >40 cmH2O is the threshold above which upper tract damage occurs. This patient's pressure of 65 cmH2O puts his kidneys at significant risk.",incorrect:">40 cmH2O is the dangerous threshold. Higher pressures cause hydronephrosis, reflux, and renal damage over time."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 The 40 cmH2O Rule</div><div class="pathway">CRITICAL PRESSURE THRESHOLD:\n\nDLPP >40 cmH2O = DANGER!\n(Detrusor Leak Point Pressure)\n\nCONSEQUENCES OF HIGH PRESSURE:\n• Vesicoureteral reflux\n• Hydronephrosis\n• Renal scarring\n• Progressive renal failure\n• Recurrent UTIs\n\nGOALS OF MANAGEMENT:\n1. Keep pressures <40 cmH2O\n2. Ensure complete emptying\n3. Maintain continence\n4. Prevent UTIs\n5. PROTECT THE KIDNEYS!\n\nRegular urodynamics monitoring\nis essential</div></div>',points:10}},

        {title:"Management Strategy",content:'<div class="narrative"><p>With high-pressure DSD pattern, you need to develop a management plan to protect this patient\'s upper tracts.</p></div>',question:{prompt:"What is the GOLD STANDARD for bladder emptying in neurogenic bladder?",options:[{text:"Indwelling Foley catheter",correct:false},{text:"Suprapubic catheter",correct:false},{text:"Clean intermittent catheterization (CIC)",correct:true},{text:"Credé maneuver (manual pressure)",correct:false}],explanation:{correct:"Correct! CIC is the gold standard for bladder management in neurogenic bladder. It maintains low bladder pressures, allows complete emptying, reduces UTI risk compared to indwelling catheters, and preserves upper tract function.",incorrect:"CIC is gold standard - complete emptying, low pressures, fewer UTIs than indwelling catheters. Usually every 4-6 hours."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 CIC - Gold Standard</div><div class="pathway">CLEAN INTERMITTENT CATHETERIZATION:\n\nBENEFITS:\n• Complete bladder emptying\n• Low-pressure storage between caths\n• Lower UTI risk than indwelling\n• Preserves upper tract function\n• Maintains bladder capacity\n\nTYPICAL SCHEDULE:\n• Every 4-6 hours\n• Keep volumes <400-500mL\n• Adjust frequency as needed\n\nREQUIREMENTS:\n• Adequate hand function (or caregiver)\n• Motivation and training\n• Low-pressure bladder (may need meds)\n\nIF CIC NOT POSSIBLE:\n• Suprapubic > Urethral indwelling\n• Consider diversion in select cases</div></div>',points:10}},

        {title:"Medical Therapy",content:'<div class="narrative"><p>You start CIC every 4 hours. However, he continues to have high detrusor pressures and incontinence between catheterizations due to overactivity.</p></div>',question:{prompt:"What medication helps reduce detrusor overactivity in neurogenic bladder?",options:[{text:"Tamsulosin (alpha-blocker)",correct:false},{text:"Oxybutynin (anticholinergic)",correct:true},{text:"Finasteride (5-alpha reductase inhibitor)",correct:false},{text:"Desmopressin",correct:false}],explanation:{correct:"Correct! Anticholinergics (oxybutynin, tolterodine, solifenacin) or beta-3 agonists (mirabegron) reduce detrusor overactivity by relaxing the bladder muscle, lowering pressures and improving continence.",incorrect:"Anticholinergics reduce detrusor overactivity. They block M3 receptors on the detrusor, decreasing involuntary contractions."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Medical Management</div><div class="pathway">FOR DETRUSOR OVERACTIVITY:\n\nANTICHOLINERGICS:\n• Oxybutynin, tolterodine, solifenacin\n• Block M3 receptors on detrusor\n• Reduce involuntary contractions\n• Side effects: Dry mouth, constipation,\n  cognitive effects (especially elderly)\n\nBETA-3 AGONISTS:\n• Mirabegron\n• Relaxes detrusor\n• Fewer anticholinergic side effects\n• Watch for hypertension\n\nFOR DSD:\n• Alpha-blockers (tamsulosin)\n  - Reduce sphincter tone\n• Botox to sphincter\n• Sphincterotomy (surgical)\n\nIF MEDS FAIL:\n• Botox to detrusor\n• Augmentation cystoplasty</div></div>',points:10}},

        {title:"Autonomic Dysreflexia",content:'<div class="narrative"><p>The patient is doing well on CIC and oxybutynin. One day, he develops sudden <span class="critical">severe headache, flushing above T8, sweating, and BP 210/120</span>. He mentions his catheterization is overdue.</p></div>',question:{prompt:"What is this emergency and the most likely trigger?",options:[{text:"Hypertensive emergency from renal failure",correct:false},{text:"Autonomic dysreflexia from bladder distension",correct:true},{text:"Stroke",correct:false},{text:"Medication side effect",correct:false}],explanation:{correct:"Correct! Autonomic dysreflexia is a medical EMERGENCY in patients with SCI at T6 or above. Bladder distension is the #1 trigger. Uncontrolled sympathetic response causes severe hypertension, risking stroke, seizure, or death.",incorrect:"Autonomic dysreflexia = emergency in SCI ≥T6. Bladder distension is #1 trigger. Causes dangerous hypertension."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Autonomic Dysreflexia</div><div class="pathway">AUTONOMIC DYSREFLEXIA:\n• Occurs with SCI at T6 or ABOVE\n• Life-threatening emergency!\n\nMECHANISM:\n• Noxious stimulus below injury\n• Massive sympathetic discharge\n• Cannot be modulated (injury blocks)\n• Severe hypertension\n\nTRIGGERS (in order):\n1. Bladder distension (#1)\n2. Bowel impaction\n3. Skin issues (pressure sores)\n4. Tight clothing\n\nSYMPTOMS:\n• Severe headache\n• Hypertension (can be >200 systolic)\n• Flushing/sweating above level\n• Bradycardia (reflex)\n\nTREATMENT:\n1. Sit patient UP\n2. FIND AND REMOVE TRIGGER\n3. Catheterize bladder!\n4. Antihypertensives if persists</div></div>',points:10}}
    ];
    
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('stageNum').textContent=currentStage+1;document.getElementById('maxScore').textContent=stages.length*10;}
    
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><strong>✓ Correct!</strong> '+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><strong>✗ Not quite.</strong> '+stage.question.explanation.incorrect+'</div><div class="teaching-point" id="teaching">'+stage.question.teaching+'</div><button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=10;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}document.getElementById('teaching').classList.add('show');document.getElementById('next-btn').classList.add('show');}
    
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene" style="text-align:center;padding:40px;"><h2 style="color:#a3cfe6;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong>/70</p><div style="margin-top:20px;padding:15px;background:rgba(59,130,246,0.15);border-radius:12px;border:1px solid rgba(59,130,246,0.3);"><p style="color:var(--rdx-teal-light,#d4e8f7);margin-bottom:10px;font-weight:600;">📚 Learn More:</p><div style="display:flex;flex-wrap:wrap;gap:8px;"><a href="../mechanism/neurogenic-bladder-module.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📘 ReasonDx</a><a href="https://www.ncbi.nlm.nih.gov/books/?term=neurogenic+bladder" target="_blank" title="Deep dive via StatPearls" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📊 Deep Dive</a></div><div style="margin-top:10px;"><a href="https://www.ncbi.nlm.nih.gov/books/NBK560617/" target="_blank" style="color:var(--rdx-teal-light,#d4e8f7);font-size:0.8rem;">📖 StatPearls Reference</a></div></div><p>You mastered Neurogenic Bladder!</p><p style="margin-top:15px;color: #1f5f8b;">Remember: Protect the kidneys!</p></div>';}}
    
    renderStage();
    </script>
