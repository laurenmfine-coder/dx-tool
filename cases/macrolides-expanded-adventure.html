rem}.why-a{display:none;margin-top:6px;font-size:0.88rem;color:var(--rdx-text-muted,#64748b)}.next-btn{background:linear-gradient(135deg,#1f5f8b,#2874a6);color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:600;cursor:pointer;margin:20px 0;display:none;font-family:var(--rdx-font)}.next-btn:hover{opacity:0.9;transform:translateY(-1px)}.completion-card{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:16px;padding:32px;text-align:center;margin:24px 0}.completion-card h2{font-family:var(--rdx-font-serif);color:var(--rdx-teal-dark,#1f5f8b);margin-bottom:12px}.references-panel{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:16px;margin:20px 0}.references-panel a{display:block;color:var(--rdx-teal,#2874a6);font-size:13px;margin:4px 0;text-decoration:none}.references-panel a:hover{text-decoration:underline}.rdx-crossplatform-nav{background:var(--rdx-bg-card,#f8fafc);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:20px;margin:24px 0}.rdx-crossplatform-nav h4{color:var(--rdx-text-muted,#64748b);margin-bottom:12px;font-size:0.9rem}.rdx-crossplatform-links{display:flex;gap:12px;flex-wrap:wrap}.rdx-crossplatform-link{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:12px 16px;text-decoration:none;color:var(--rdx-text,#1e293b);font-size:13px;font-weight:500;transition:all 0.2s}.rdx-crossplatform-link:hover{background:rgba(40,116,166,0.05);transform:translateY(-2px)}@media(max-width:640px){.score-tracker{top:auto;bottom:12px;right:12px}.container{padding:12px}.vital-signs{grid-template-columns:repeat(3,1fr)}}</style>

<script>let currentStage=0,score=0,difficulty='standard';
const stages=[{
title:"Clinical Scenario",
content:`<div class="narrative"><p>A 22-year-old with atypical pneumonia (dry cough, bilateral patchy infiltrates, cold agglutinins positive).</p><div class="vital-signs"><div class="vital-item"><span class="label">HR</span><span class="value">88</span></div><div class="vital-item"><span class="label">Temp</span><span class="value">38.0°C</span></div></div></div>`,
hint_beginner:"What is the mechanism of macrolides?",
hint_advanced:"Consider the pharmacologic principles underlying this drug class.",
question:{
prompt:"What is the mechanism of macrolides?",
options:[{text:"Inhibits folic acid metabolism",correct:false},{text:"Blocks RNA polymerase",correct:false},{text:"Bind 50S ribosome → block translocation step of protein synthesis (bacteriostatic)",correct:true},{text:"Inhibits cell membrane synthesis",correct:false}],
explanation:{correct:"Correct! Bind 50S ribosome → block translocation step of protein synthesis (bacteriostatic).",incorrect:"Bind 50S ribosome → block translocation step of protein synthesis (bacteriostatic)"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Macrolide MOA</div><div class="pathway"><strong>Target:</strong> 50S ribosomal subunit (23S rRNA)<br><strong>Effect:</strong> Block translocation → bacteriostatic<br><strong>Agents:</strong> Azithromycin, clarithromycin, erythromycin, fidaxomicin<br><strong>Note:</strong> Erythromycin is a motilin receptor agonist → used as prokinetic agent</div></div>`,
why_chain:[],
points:10
}
},{
title:"Spectrum & Coverage",
content:`<div class="narrative"><p>Understanding the antimicrobial spectrum guides appropriate use.</p></div>`,
hint_beginner:"What spectrum do macrolides cover uniquely?",
hint_advanced:"Think about the unique organisms this drug covers that alternatives do not.",
question:{
prompt:"What spectrum do macrolides cover uniquely?",
options:[{text:"Active only against fungi",correct:false},{text:"No anaerobic activity",correct:false},{text:"Covers only gram-positive organisms",correct:false},{text:"Atypical organisms: Mycoplasma, Chlamydia, Legionella (intracellular pathogens)",correct:true}],
explanation:{correct:"Correct! Atypical organisms: Mycoplasma, Chlamydia, Legionella (intracellular pathogens).",incorrect:"Atypical organisms: Mycoplasma, Chlamydia, Legionella (intracellular pathogens)"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Macrolide Spectrum</div><div class="pathway"><strong>Atypicals:</strong> Mycoplasma, Chlamydia, Legionella<br><strong>Respiratory:</strong> S. pneumoniae (rising resistance), H. influenzae<br><strong>Others:</strong> Bordetella (pertussis), MAC (prophylaxis), H. pylori (clarithromycin)<br><strong>Azithromycin added to CAP regimen:</strong> Covers atypicals when combined with beta-lactam</div></div>`,
why_chain:[],
points:10
}
},{
title:"Dosing & Administration",
content:`<div class="narrative"><p>Proper dosing maximizes efficacy and minimizes toxicity.</p></div>`,
hint_beginner:"What PK feature makes azithromycin unique?",
hint_advanced:"Consider the PK/PD parameters that drive efficacy for this class.",
question:{
prompt:"What PK feature makes azithromycin unique?",
options:[{text:"Extensive tissue penetration with long half-life (68h) allowing 5-day courses (Z-pack)",correct:true},{text:"Fixed dose regardless of indication",correct:false},{text:"Dose based on ideal body weight only",correct:false},{text:"Always requires IV administration",correct:false}],
explanation:{correct:"Correct! Extensive tissue penetration with long half-life (68h) allowing 5-day courses (Z-pack).",incorrect:"Extensive tissue penetration with long half-life (68h) allowing 5-day courses (Z-pack)"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Azithromycin PK</div><div class="pathway"><strong>Half-life:</strong> 68 hours (vs clarithromycin 3-7h)<br><strong>Tissue levels:</strong> 10-100× higher than serum (concentrates in macrophages, lungs, tonsils)<br><strong>Dosing:</strong> Z-pack: 500mg day 1, then 250mg days 2-5<br><strong>Drug interactions:</strong> Minimal CYP450 effect (unlike erythromycin/clarithromycin which inhibit CYP3A4)</div></div>`,
why_chain:[],
points:10
}
},{
title:"Adverse Effects",
content:`<div class="narrative"><p>Monitoring for side effects is essential for patient safety.</p></div>`,
hint_beginner:"What is the most concerning cardiac side effect?",
hint_advanced:"Consider which effects are dose-dependent vs idiosyncratic.",
question:{
prompt:"What is the most concerning cardiac side effect?",
options:[{text:"Only affects renal function",correct:false},{text:"QT prolongation (risk of torsades de pointes, especially with other QT-prolonging drugs)",correct:true},{text:"Ototoxicity only",correct:false},{text:"No significant adverse effects",correct:false}],
explanation:{correct:"Correct! QT prolongation (risk of torsades de pointes, especially with other QT-prolonging drugs).",incorrect:"QT prolongation (risk of torsades de pointes, especially with other QT-prolonging drugs)"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Macrolide Side Effects</div><div class="pathway"><strong>GI:</strong> Nausea, diarrhea, abdominal pain (erythromycin worst — motilin agonist)<br><strong>Cardiac:</strong> QT prolongation (all macrolides, azithromycin least). Avoid with other QT-prolongers<br><strong>Hepatotoxicity:</strong> Cholestatic hepatitis (erythromycin estolate)<br><strong>Drug interactions:</strong> Erythromycin and clarithromycin inhibit CYP3A4 → increase levels of warfarin, statins, carbamazepine</div></div>`,
why_chain:[],
points:10
}
},{
title:"Resistance",
content:`<div class="narrative"><p>Understanding resistance guides empiric therapy choices.</p></div>`,
hint_beginner:"What are the two mechanisms of macrolide resistance?",
hint_advanced:"Compare enzymatic modification, target alteration, and efflux as resistance strategies.",
question:{
prompt:"What are the two mechanisms of macrolide resistance?",
options:[{text:"No resistance has been documented",correct:false},{text:"Resistance occurs only in gram-positives",correct:false},{text:"ermB (ribosomal methylation = high-level, cross-resistance to clindamycin) and mefA (efflux = macrolide-only)",correct:true},{text:"Only plasmid-mediated resistance",correct:false}],
explanation:{correct:"Correct! ermB (ribosomal methylation = high-level, cross-resistance to clindamycin) and mefA (efflux = macrolide-only).",incorrect:"ermB (ribosomal methylation = high-level, cross-resistance to clindamycin) and mefA (efflux = macrolide-only)"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Macrolide Resistance</div><div class="pathway"><strong>ermB gene:</strong> Ribosomal methylation (methylates 23S rRNA) → high-level resistance to macrolides, lincosamides (clindamycin), streptogramins (MLS_B phenotype)<br><strong>mefA gene:</strong> Efflux pump → macrolide-only resistance (not clindamycin)<br><strong>Clinical impact:</strong> 30% pneumococcal macrolide resistance in US. Rising GAS resistance.</div></div>`,
why_chain:[],
points:10
}
},{
title:"Clinical Application",
content:`<div class="narrative"><p>Integrating mechanism, spectrum, and resistance data guides optimal clinical use.</p></div>`,
hint_beginner:"When are macrolides first-line?",
hint_advanced:"Consider guideline recommendations and antimicrobial stewardship principles.",
question:{
prompt:"When are macrolides first-line?",
options:[{text:"Reserved for outpatient use only",correct:false},{text:"Only for prophylaxis",correct:false},{text:"Empiric monotherapy for all infections",correct:false},{text:"Atypical pneumonia (Mycoplasma, Chlamydia, Legionella), pertussis, Chlamydia trachomatis in pregnancy",correct:true}],
explanation:{correct:"Correct! Atypical pneumonia (Mycoplasma, Chlamydia, Legionella), pertussis, Chlamydia trachomatis in pregnancy.",incorrect:"Atypical pneumonia (Mycoplasma, Chlamydia, Legionella), pertussis, Chlamydia trachomatis in pregnancy"},
teaching:`<div class="mechanism-box"><div class="mechanism-title">When to Use Macrolides</div><div class="pathway"><strong>First-line:</strong> Atypical CAP, pertussis, Chlamydia in pregnancy (azithromycin), MAC prophylaxis (CD4 <50)<br><strong>Combined:</strong> CAP inpatient (ceftriaxone + azithromycin)<br><strong>Avoid:</strong> When QT-prolonging drugs are used, myasthenia gravis (can worsen)</div></div>`,
why_chain:[],
points:10
}
}];
document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hb=document.querySelector('.hint-box');if(hb)hb.style.display=d==='beginner'?'block':'none'}
function toggleReferences(){const c=document.getElementById('referencesContent');const t=document.getElementById('refToggle');if(c.style.display==='none'){c.style.display='block';t.innerHTML='&#9662;'}else{c.style.display='none';t.innerHTML='&#9656;'}}
function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100);document.getElementById('progress').style.width=pct+'%';let h='<h2 class="scene-title">'+st.title+'</h2>';h+='<div class="scene-content">'+st.content+'</div>';if(st.hint_beginner)h+='<div class="hint-box" id="hint-box"'+(difficulty==='beginner'?' style="display:block"':'')+'> '+st.hint_beginner+'</div>';if(difficulty==='advanced'&&st.hint_advanced)h+='<div class="hint-box" style="display:block;background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.15);color:#5b21b6"> '+st.hint_advanced+'</div>';if(st.question){h+='<div class="socratic-prompt"><h4>Clinical Question</h4><p>'+st.question.prompt+'</p></div>';h+='<div class="options-grid" id="options-'+idx+'">';st.question.options.forEach((opt,oi)=>{h+='<button class="option-btn" id="option-'+idx+'-'+oi+'" onclick="checkAnswer('+idx+','+oi+')">'+String.fromCharCode(65+oi)+'. '+opt.text+'</button>'});h+='</div>';h+='<div class="explanation-box" id="explain-'+idx+'"></div>';h+='<div id="teaching-'+idx+'" style="display:none">'+st.question.teaching+'</div>';if(st.question.why_chain&&st.question.why_chain.length>0){h+='<div id="why-'+idx+'" style="display:none">';st.question.why_chain.forEach((wc,wi)=>{h+='<div class="why-chain"><div class="why-q" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'"> '+wc.q+'</div><div class="why-a">'+wc.a+'</div></div>'});h+='</div>'}}h+='<button class="next-btn" id="next-'+idx+'" onclick="nextStage()">Continue &rarr;</button>';document.getElementById('scene-container').innerHTML=h}
function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll('#options-'+si+' .option-btn').forEach((b,i)=>{b.classList.add('disabled');if(st.question.options[i].correct)b.classList.add('correct');if(i===oi&&!opt.correct)b.classList.add('incorrect')});const eb=document.getElementById('explain-'+si);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;eb.className='explanation-box correct';eb.innerHTML='<strong>Correct!</strong> '+st.question.explanation.correct}else{eb.className='explanation-box incorrect';eb.innerHTML='<strong>Not quite.</strong> '+st.question.explanation.incorrect}eb.style.display='block';document.getElementById('teaching-'+si).style.display='block';const wy=document.getElementById('why-'+si);if(wy)wy.style.display='block';document.getElementById('next-'+si).style.display='inline-block'}
function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let lvl='Developing';if(pct>=90)lvl='Mastery';else if(pct>=70)lvl='Proficient';else if(pct>=50)lvl='Competent';document.getElementById('scene-container').innerHTML='<div class="completion-card"><h2>Case Complete!</h2><p style="font-size:2rem;font-weight:700;color:var(--rdx-teal,#2874a6)">'+pct+'%</p><p style="color:var(--rdx-text-muted,#64748b)">Score: '+score+'/'+mx+'</p><p style="margin:12px 0;font-weight:600">Level: '+lvl+'</p><div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="../adventure-hub.html" style="padding:10px 20px;background:var(--rdx-teal,#2874a6);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">More Cases</a><a href="../tools/learning-dashboard.html" style="padding:10px 20px;background:var(--rdx-purple,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">Dashboard</a><button onclick="currentStage=0;score=0;document.getElementById(\'score\').textContent=0;renderStage(0)" style="padding:10px 20px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;cursor:pointer;font-weight:600">Retry</button></div></div>';try{const progress=JSON.parse(localStorage.getItem('reasondx-progress')||'{}');if(!progress.cases)progress.cases={};progress.cases['macrolides']=Math.max(progress.cases['macrolides']||0,pct);localStorage.setItem('reasondx-progress',JSON.stringify(progress))}catch(e){}}
renderStage(0);</script>
