<body>
    <div class="container">
        <div class="header">
            <h1>⬇️ Cryptorchidism</h1>
            <div class="score-display">
                <div class="score-item">Score: <strong id="score">0</strong>/<span id="maxScore">60</span></div>
                <div class="score-item">Stage: <span id="stageNum">1</span>/6</div>
            </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width: 16%"></div></div>
        <div id="scene-container"></div>
    </div>
    <script>
    let currentStage = 0, score = 0;
    const stages = [
        {title:"Newborn Exam",content:'<div class="narrative"><p>You are examining a <span class="highlight">term male newborn</span> in the nursery. On genital exam, the <span class="critical">right testis is not palpable in the scrotum</span>. The left testis is in normal position. The penis appears normal with the urethral meatus at the tip.</p></div>',question:{prompt:"What is your initial assessment?",options:[{text:"Inguinal hernia",correct:false},{text:"Undescended testis (cryptorchidism)",correct:true},{text:"Retractile testis",correct:false},{text:"Testicular torsion",correct:false}],explanation:{correct:"Correct! A non-palpable testis in the scrotum at birth is cryptorchidism (undescended testis). It affects 3-4% of term newborns. The testis may be palpable in the inguinal canal or nonpalpable (intra-abdominal or absent).",incorrect:"A testis not in the scrotum at birth = cryptorchidism. This is the most common male genital anomaly."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Cryptorchidism Basics</div><div class="pathway">INCIDENCE:\n• 3-4% of term newborns\n• Up to 30% of preterm\n• Spontaneous descent by 6 months\n  → drops to ~1%\n\nTYPES:\n• Palpable (80%): In inguinal canal\n• Nonpalpable (20%): Intra-abdominal,\n  atrophic, or absent\n\nUNILATERAL: 90%\nRIGHT SIDE: More common (descends later)</div></div>',points:10}},
        
        {title:"Physical Exam Technique",content:'<div class="narrative"><p>You attempt to locate the right testis. In a warm room with warm hands, you use two-handed technique - one hand blocking the inguinal canal while the other "milks" the canal down toward the scrotum.</p></div>',question:{prompt:"You feel the testis in the inguinal canal. You can bring it to the upper scrotum but it immediately springs back up. What type is this?",options:[{text:"Retractile testis",correct:false},{text:"True undescended testis",correct:true},{text:"Ectopic testis",correct:false},{text:"Ascending testis",correct:false}],explanation:{correct:"Correct! A testis that can be brought to the scrotum but doesn't STAY there (springs back) is a TRUE undescended testis. A RETRACTILE testis would stay in the scrotum when released (just has hyperactive cremaster).",incorrect:"Key distinction: Retractile testis STAYS in scrotum when released. True UDT springs back. This is important because retractile testes just need observation."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Retractile vs True UDT</div><div class="pathway">RETRACTILE TESTIS:\n• Can bring to scrotum EASILY\n• STAYS when released (temporarily)\n• Hyperactive cremasteric reflex\n• Management: Observation, annual exams\n• May ascend later (10-30%)\n\nTRUE UNDESCENDED:\n• Can\'t reach scrotum OR\n• Springs back immediately\n• Requires surgical intervention\n\nEXAM TIPS:\n• Warm room, warm hands\n• Frog-leg position\n• Two-handed technique</div></div>',points:10}},

        {title:"Timing of Intervention",content:'<div class="narrative"><p>The parents ask when their son will need treatment. You explain that spontaneous descent may occur but has a time limit.</p></div>',question:{prompt:"By what age should orchiopexy be performed?",options:[{text:"Immediately at birth",correct:false},{text:"6-12 months of age",correct:true},{text:"When the child starts school (5-6 years)",correct:false},{text:"At puberty",correct:false}],explanation:{correct:"Correct! Current guidelines recommend orchiopexy by 6-12 months (completed by 18 months at latest). Spontaneous descent is rare after 6 months. Early surgery optimizes fertility potential - germ cell degeneration begins by 6-12 months.",incorrect:"Orchiopexy should be done by 6-12 months. Waiting longer allows germ cell damage that affects fertility."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Timing Matters!</div><div class="pathway">GUIDELINES:\n• Orchiopexy by 6-12 months\n• Complete by 18 months at latest\n\nWHY EARLY?\n• Germ cell degeneration starts\n  at 6-12 months\n• Earlier surgery = better fertility\n• Testicular cancer risk persists\n  regardless, but earlier allows\n  self-exam\n\nSPONTANEOUS DESCENT:\n• Most occurs by 3-6 months\n• Rare after 6 months\n• Don\'t wait past this!</div></div>',points:10}},

        {title:"Consequences of Untreated UDT",content:'<div class="narrative"><p>The parents want to understand why surgery is important. You explain the long-term consequences of leaving a testis undescended.</p></div>',question:{prompt:"What is the MOST serious long-term consequence of untreated cryptorchidism?",options:[{text:"Inguinal hernia",correct:false},{text:"Testicular torsion",correct:false},{text:"Infertility and testicular cancer risk",correct:true},{text:"Erectile dysfunction",correct:false}],explanation:{correct:"Correct! The two major long-term consequences are infertility (germ cell damage from elevated temperature) and increased testicular cancer risk (5-10x higher, persists even after orchiopexy).",incorrect:"Infertility and cancer risk are the major concerns. The elevated temperature damages germ cells, and cancer risk is 5-10x normal."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Consequences of UDT</div><div class="pathway">INFERTILITY:\n• Elevated temperature impairs\n  spermatogenesis\n• Bilateral UDT: 50-70% infertility\n• Early orchiopexy improves but\n  may not normalize fertility\n\nCANCER RISK:\n• 5-10x increased risk\n• Seminoma most common\n• Risk PERSISTS after orchiopexy!\n• Orchiopexy allows self-exam\n\nOTHER:\n• Increased torsion risk\n• Associated inguinal hernia (90%\n  have patent processus vaginalis)\n• Psychological impact</div></div>',points:10}},

        {title:"Nonpalpable Testis",content:'<div class="narrative"><p>Another patient: a 9-month-old with <span class="critical">bilateral nonpalpable testes</span>. Even with careful exam in optimal conditions, neither testis can be felt.</p></div>',question:{prompt:"What additional workup is needed for this baby?",options:[{text:"Ultrasound of the abdomen",correct:false},{text:"MRI of the abdomen",correct:false},{text:"Karyotype and hormonal evaluation (DSD workup)",correct:true},{text:"No workup needed, proceed to surgery",correct:false}],explanation:{correct:"Correct! Bilateral nonpalpable testes requires DSD (Disorder of Sex Development) workup before any surgery. This could be a 46,XX female with CAH! Get karyotype, testosterone, LH, FSH, AMH.",incorrect:"Bilateral nonpalpable testes = DSD workup FIRST! Could be a virilized female (CAH). Never proceed to surgery without karyotype."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 When to Evaluate for DSD</div><div class="pathway">DSD WORKUP REQUIRED:\n• Bilateral nonpalpable testes\n• Unilateral nonpalpable + hypospadias\n• Any genital ambiguity\n\nWORKUP INCLUDES:\n• Karyotype (46,XX? 46,XY?)\n• Testosterone, LH, FSH\n• AMH, inhibin B\n• 17-OH progesterone (CAH)\n• hCG stimulation test\n\nIF NO TESTOSTERONE RESPONSE:\n→ Anorchia (absent testes)\n\nNEVER operate without karyotype\nin bilateral nonpalpable!</div></div>',points:10}},

        {title:"Surgical Approach",content:'<div class="narrative"><p>A 10-month-old has a unilateral nonpalpable right testis (left is normal, karyotype 46,XY). You plan surgical intervention.</p></div>',question:{prompt:"What is the GOLD STANDARD approach for a nonpalpable testis?",options:[{text:"Open inguinal exploration",correct:false},{text:"Ultrasound-guided localization",correct:false},{text:"Diagnostic laparoscopy",correct:true},{text:"MRI then decide",correct:false}],explanation:{correct:"Correct! Diagnostic laparoscopy is the GOLD STANDARD for nonpalpable testis. It's both diagnostic (locates testis or confirms absence) and therapeutic (can do orchiopexy or Fowler-Stephens if intra-abdominal).",incorrect:"Laparoscopy is gold standard - diagnostic AND therapeutic. Imaging (US, MRI) is NOT reliable for localizing intra-abdominal testes."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Nonpalpable Testis Management</div><div class="pathway">DIAGNOSTIC LAPAROSCOPY:\n• GOLD STANDARD\n• Diagnostic: Locates testis or\n  confirms absence\n• Therapeutic: Can do orchiopexy\n\nFINDINGS & ACTIONS:\nIf intra-abdominal testis:\n• Standard orchiopexy if low\n• Fowler-Stephens if high\n  (divide vessels, rely on\n  collateral from vas)\n\nIf blind-ending vessels:\n• Vanishing testis (absent)\n• Confirm, no further surgery\n\nIf nubbin/atrophic:\n• Remove + contralateral fixation\n\nALWAYS fix contralateral side!</div></div>',points:10}}
    ];
    
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('stageNum').textContent=currentStage+1;document.getElementById('maxScore').textContent=stages.length*10;}
    
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><strong>✓ Correct!</strong> '+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><strong>✗ Not quite.</strong> '+stage.question.explanation.incorrect+'</div><div class="teaching-point" id="teaching">'+stage.question.teaching+'</div><button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=10;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}document.getElementById('teaching').classList.add('show');document.getElementById('next-btn').classList.add('show');}
    
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene" style="text-align:center;padding:40px;"><h2 style="color:#c4b5fd;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong>/60</p><div style="margin-top:20px;padding:15px;background:rgba(59,130,246,0.15);border-radius:12px;border:1px solid rgba(59,130,246,0.3);"><p style="color:var(--rdx-teal-light,#ccfbf1);margin-bottom:10px;font-weight:600;">📚 Learn More:</p><div style="display:flex;flex-wrap:wrap;gap:8px;"><a href="../mechanism/cryptorchidism-module.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📘 ReasonDx</a><a href="https://www.ncbi.nlm.nih.gov/books/?term=pediatric+urology" target="_blank" title="Deep dive via StatPearls" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📊 Deep Dive</a></div><div style="margin-top:10px;"><a href="https://www.ncbi.nlm.nih.gov/books/NBK470270/" target="_blank" style="color:var(--rdx-teal-light,#ccfbf1);font-size:0.8rem;">📖 StatPearls Reference</a></div></div><p>You mastered Cryptorchidism!</p></div>';}}
    
    renderStage();
    </script>
