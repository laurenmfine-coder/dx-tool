        *{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--rdx-font);background:#f8fafc;min-height:100vh;padding:20px;color:#1e293b}.container{max-width:900px;margin:0 auto}.scene{background:var(--rdx-bg-card);border:1px solid #e2e8f0;border-radius:16px;padding:24px;margin-bottom:20px}.scene-header{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #e2e8f0}.scene-phase{font-size:0.85rem;color:#64748b;text-transform:uppercase}.scene-title{font-size:1.5rem;font-weight:700;color:#1e293b}.narrative{background:#f8fafc;border-radius:12px;padding:16px 20px;margin:16px 0;border-left:4px solid #94a3b8;line-height:1.7}.highlight{color:#1f5f8b;font-weight:600}.critical{color:#f87171;font-weight:600}.socratic-prompt{background:linear-gradient(135deg,rgba(251,191,36,0.2),rgba(14,165,233,0.15));border:1px solid rgba(251,191,36,0.4);border-radius:12px;padding:20px;margin:16px 0}.socratic-prompt h4{color: #1f5f8b;font-size:0.9rem;text-transform:uppercase;margin-bottom:12px}.socratic-prompt p{font-size:1.1rem;line-height:1.6;font-style:italic;color:#fef3c7}.question-box{background:linear-gradient(135deg,rgba(14,165,233,0.15),rgba(251,191,36,0.15));border:1px solid rgba(14,165,233,0.3);border-radius:12px;padding:20px;margin:20px 0}.question-prompt{font-size:1.1rem;font-weight:600;color:#1e293b;margin-bottom:16px}.mcq-options{display:flex;flex-direction:column;gap:10px}.mcq-option{background:var(--rdx-bg-card);border:2px solid #e2e8f0;border-radius:12px;padding:14px 18px;cursor:pointer;transition:all 0.2s;display:flex;align-items:flex-start;gap:12px}.mcq-option:hover:not(.disabled){background:rgba(255,255,255,0.1);transform:translateX(4px)}.mcq-option.disabled{cursor:default;opacity:0.7}.mcq-option.correct{border-color:#22c55e!important;background:rgba(34,197,94,0.2)!important;opacity:1!important}.mcq-option.incorrect{border-color:#ef4444!important;background:rgba(239,68,68,0.15)!important}.option-letter{font-weight:700;min-width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.1);border-radius:8px}.feedback{margin-top:16px;padding:16px;border-radius:12px;display:none}.feedback.show{display:block}.feedback.correct-feedback{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3)}.feedback.incorrect-feedback{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3)}.feedback-title{font-weight:700;margin-bottom:8px}.teaching-point{background:var(--rdx-info-bg);border:1px solid var(--rdx-info);border-radius:12px;padding:16px;margin-top:16px;display:none}.teaching-point.show{display:block}.teaching-point h4{color:#c4b5fd;margin-bottom:12px}.mechanism-box{background:#f0f7fc;border:1px solid rgba(139,92,246,0.4);border-radius:12px;padding:20px;margin:16px 0}.mechanism-title{font-weight:700;color:#c4b5fd;margin-bottom:12px}.pathway{background: #f1f5f9;border-radius:8px;padding:14px;font-family:monospace;font-size:0.9rem;line-height:1.8;white-space:pre-line}.btn{background:#1f5f8b;color:white;border:none;padding:14px 28px;border-radius:12px;font-weight:600;cursor:pointer;display:none;margin-top:16px}.btn.show{display:inline-block}.progress-bar{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;margin-bottom:20px}.progress-fill{height:100%;background:#1f5f8b;border-radius:3px;transition:width 0.5s}.score-tracker{display:inline-block;background:rgba(0,0,0,0.8);padding:12px 20px;border-radius:12px;margin-right:12px;vertical-align:top}.score-label{font-size:0.8rem;color:#94a3b8}.score-value{font-size:1.4rem;font-weight:700;color:var(--rdx-teal,#2874a6)}.difficulty-panel{position:static;display:inline-block;background:rgba(255,255,255,0.95);padding:12px 16px;border-radius:12px;margin-left:12px}.diff-btns{display:flex;gap:4px}.diff-btn{padding:6px 10px;border:none;border-radius:8px;font-size:0.75rem;cursor:pointer;background:#f1f5f9;color:#475569}.diff-btn.active{background:#1f5f8b;color:white}.completion{text-align:center;padding:60px 40px}.references-panel{background:linear-gradient(135deg,#f0f7fc,#d4e8f7);border:1px solid #a3cfe6;border-radius:12px;margin:20px 0;overflow:hidden}.references-header{padding:14px 20px;font-weight:600;color:#1a4971;display:flex;align-items:center;gap:8px;cursor:pointer}.refs-toggle{background:none;border:none;font-size:0.8rem;cursor:pointer;margin-left:auto}.references-content{padding:0 20px 16px;display:flex;flex-wrap:wrap;gap:10px}.references-content a{background:var(--rdx-bg-card);padding:8px 14px;border-radius:8px;text-decoration:none;color:#2874a6;font-size:0.85rem;border:1px solid #a3cfe6;transition:all 0.2s}.references-content a:hover{background:#2874a6;color:white}.nav-buttons{display:flex;gap:12px;margin-top:20px;justify-content:center}.nav-btn{background:#1f5f8b;color:white;border:none;padding:14px 28px;border-radius:12px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block}@media(max-width:480px){body{padding:12px!important}.scene{padding:16px;margin-bottom:14px}.scene-title{font-size:1.25rem}.narrative{padding:12px 14px;font-size:0.95rem}.mcq-option{padding:12px 14px;min-height:48px}.score-tracker,.difficulty-panel{position:static!important;display:block;margin:8px 0;width:100%}}@media(pointer:coarse){.mcq-option,.nav-btn,button{min-height:44px}}

    <div class="score-tracker"><div class="score-label">Score</div><div><span class="score-value" id="score">0</span> / <span id="maxScore">0</span></div></div>
    <div class="difficulty-panel"><div style="font-size:0.75rem;color:#475569;margin-bottom:8px;font-weight:600">Difficulty</div><div class="diff-btns">
        <button class="diff-btn" onclick="setDifficulty('beginner',this)">Beginner</button>

        <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
<div class="references-panel"><div class="references-header"><span>📚</span> Open-Access References<button onclick="toggleReferences()" class="refs-toggle">▼</button></div><div class="references-content" id="referencesContent"><a href="https://www.ncbi.nlm.nih.gov/books/" target="_blank" rel="noopener">Parkinson Disease - StatPearls</a>
<a href="https://www.ncbi.nlm.nih.gov/pmc/" target="_blank" rel="noopener">Parkinson Disease - NCBI</a></div></div>

    </div>
    <script>
    let decisionPath=[],currentStage=0,score=0,difficulty='standard';
    const stages=[{
        title: "Identifying Parkinson Disease",
        content: `<div class="narrative"><p>An <span class='highlight'>elderly patient</span> presents with <span class='highlight'>resting tremor and shuffling gait</span>. You need to identify the key underlying concept.</p></div><div class="socratic-prompt"><h4>Recognition</h4><p>What is the MOST fundamental concept in Parkinson Disease?</p></div>`,
        hint_beginner: "Review the fundamentals of this topic.",
        hint_advanced: "Consider the underlying mechanism.",
        question: {
            prompt: "What is the MOST fundamental concept in Parkinson Disease?",
            options: [{ text: "Cardinal features (TRAP): Tremor (resting, pill-rolling), Rigidity (cogwheel), Akinesia/bradykinesia, Postural instability", correct: true, explanation: "Cardinal features (TRAP): Tremor (resting, pill-rolling), Rigidity (cogwheel), Akinesia/bradykinesia, Postural instability" }, { text: "Pathology: loss of dopaminergic neurons in substantia nigra pars compacta, Lewy bodies (α-synuclein)", correct: false, explanation: "Important but secondary. The primary concept: Cardinal features (TRAP): Tremor (resting, pill-rolling), Rigidity (cogwheel), Akinesia/bradykinesia, Postural instability" }, { text: "Comprehensive testing before clinical reasoning", correct: false, explanation: "Clinical reasoning should guide the diagnostic approach." }, { text: "This finding is typically incidental", correct: false, explanation: "This requires clinical attention. Key: Cardinal features (TRAP): Tremor (resting, pill-rolling), Rigidity (cogwheel), Akinesia/bradykinesia, Postural instabili" }],
            explanation: { correct: "Correct! Review the teaching point.", incorrect: "Review the teaching point for the correct reasoning." },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">📋 Teaching Point</div><div class="pathway">• Cardinal features (TRAP): Tremor (resting, pill-rolling), Rigidity (cogwheel), Akinesia/bradykinesia, Postural instability\n• Pathology: loss of dopaminergic neurons in substantia nigra pars compacta, Lewy bodies (α-synuclein)\n• Bradykinesia is the MOST important diagnostic feature (required for diagnosis)</div></div>`,
            why_chain: [],
            points: 10
        }
    },
    {
        title: "Key Features of Parkinson Disease",
        content: `<div class="narrative"><p>You're working through the diagnostic features of <span class='highlight'>Parkinson Disease</span>.</p></div><div class="socratic-prompt"><h4>Diagnosis</h4><p>Which feature is MOST diagnostically important?</p></div>`,
        hint_beginner: "Review the fundamentals of this topic.",
        hint_advanced: "Consider the underlying mechanism.",
        question: {
            prompt: "Which feature is MOST diagnostically important?",
            options: [{ text: "Bradykinesia is the MOST important diagnostic feature (required for diagnosis)", correct: true, explanation: "Bradykinesia is the MOST important diagnostic feature (required for diagnosis)" }, { text: "Treatment: carbidopa-levodopa (most effective); dopamine agonists (pramipexole, ropinirole) as initial or adjunct", correct: false, explanation: "Consider: Bradykinesia is the MOST important diagnostic feature (required for diagnosis)" }, { text: "Empiric treatment without confirmation", correct: false, explanation: "Confirm the diagnosis when possible." }, { text: "Observation and reassessment in 2 weeks", correct: false, explanation: "More immediate diagnostic attention is warranted." }],
            explanation: { correct: "Correct! Review the teaching point.", incorrect: "Review the teaching point for the correct reasoning." },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">📋 Teaching Point</div><div class="pathway">• Bradykinesia is the MOST important diagnostic feature (required for diagnosis)\n• Treatment: carbidopa-levodopa (most effective); dopamine agonists (pramipexole, ropinirole) as initial or adjunct\n• Levodopa complications: wearing-off, on-off fluctuations, dyskinesias (after years of use)</div></div>`,
            why_chain: [],
            points: 10
        }
    },
    {
        title: "Managing Parkinson Disease",
        content: `<div class="narrative"><p>Diagnosis of <span class='highlight'>Parkinson Disease</span> is confirmed. Plan the management.</p></div><div class="socratic-prompt"><h4>Management</h4><p>What is the MOST critical management step?</p></div>`,
        hint_beginner: "Review the fundamentals of this topic.",
        hint_advanced: "Consider the underlying mechanism.",
        question: {
            prompt: "What is the MOST critical management step?",
            options: [{ text: "Levodopa complications: wearing-off, on-off fluctuations, dyskinesias (after years of use)", correct: true, explanation: "Levodopa complications: wearing-off, on-off fluctuations, dyskinesias (after years of use)" }, { text: "Watchful waiting only", correct: false, explanation: "Active management is indicated. Key: Levodopa complications: wearing-off, on-off fluctuations, dyskinesias (after years of use)" }, { text: "Immediate surgical referral for all cases", correct: false, explanation: "Management should be individualized to the presentation." }, { text: "Outpatient follow-up in 6 months", correct: false, explanation: "More timely intervention is typically needed." }],
            explanation: { correct: "Correct! Review the teaching point.", incorrect: "Review the teaching point for the correct reasoning." },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">📋 Teaching Point</div><div class="pathway">• Bradykinesia is the MOST important diagnostic feature (required for diagnosis)\n• Treatment: carbidopa-levodopa (most effective); dopamine agonists (pramipexole, ropinirole) as initial or adjunct\n• Levodopa complications: wearing-off, on-off fluctuations, dyskinesias (after years of use)</div></div>`,
            why_chain: [],
            points: 15
        }
    }];
    document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
    function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
    function toggleReferences(){const c=document.getElementById('referencesContent');c.style.display=c.style.display==='none'?'flex':'none'}
    function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100).toFixed(0);document.getElementById('progress').style.width=pct+'%';let html=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${idx+1} of ${stages.length}</div><div class="scene-title">${st.title}</div></div>${st.content}`;if(st.question){const letters=['A','B','C','D'];html+=`<div class="question-box"><div class="question-prompt">${st.question.prompt}</div><div class="mcq-options" id="options-${idx}">`;st.question.options.forEach((opt,oi)=>{html+=`<div class="mcq-option" onclick="checkAnswer(${idx},${oi})" id="opt-${idx}-${oi}"><div class="option-letter">${letters[oi]}</div><div class="option-text">${opt.text}</div></div>`});html+=`</div><div class="feedback" id="feedback-${idx}"></div>`;if(st.question.teaching)html+=`<div class="teaching-point" id="teaching-${idx}">${st.question.teaching}</div>`;html+=`<button class="btn" id="next-${idx}" onclick="nextStage()">Continue →</button></div>`}html+=`</div>`;document.getElementById('scene-container').innerHTML=html}
    function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll(`#options-${si} .mcq-option`).forEach((el,i)=>{el.classList.add('disabled');if(st.question.options[i].correct)el.classList.add('correct')});if(!opt.correct)document.getElementById(`opt-${si}-${oi}`).classList.add('incorrect');const fb=document.getElementById(`feedback-${si}`);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;fb.className='feedback show correct-feedback';fb.innerHTML=`<div class="feedback-title">✅ Correct! (+${st.question.points} pts)</div><p>${opt.explanation||st.question.explanation.correct}</p>`}else{fb.className='feedback show incorrect-feedback';fb.innerHTML=`<div class="feedback-title">❌ Not quite</div><p>${opt.explanation||st.question.explanation.incorrect}</p>`}const tp=document.getElementById(`teaching-${si}`);if(tp)tp.classList.add('show');document.getElementById(`next-${si}`).classList.add('show');decisionPath.push({stage:st.title,correct:opt.correct,choice:opt.text})}
    function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
    function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let g=pct>=90?'🏆':pct>=70?'⭐':pct>=50?'📚':'🔄';document.getElementById('scene-container').innerHTML=`<div class="scene completion"><div style="font-size:4rem;margin-bottom:16px">${g}</div><div style="font-size:2.5rem;font-weight:700">${pct}%</div><div style="color:#94a3b8;margin-bottom:24px">Final Score: ${score} / ${mx}</div><div class="nav-buttons"><a href="../adventure-hub.html" class="nav-btn">🏠 Adventure Hub</a><button class="nav-btn" onclick="location.reload()">🔄 Retry</button></div></div>`}
    renderStage(0);
    </script>
