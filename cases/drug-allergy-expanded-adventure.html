<script>
let currentStage = 0;
let score = 0;
let maxScore = 0;
let difficulty = 'standard';
let answeredQuestions = new Set();
let decisionPath = [];

const stages = [
    {
        "title": "Initial Consultation",
        "content": "<div class=\"narrative\">\n                <p>A <span class=\"highlight\">45-year-old woman</span> is referred to your allergy clinic for evaluation of \"penicillin allergy.\" She needs a hip replacement and the orthopedic surgeon wants clarification before surgery.</p>\n                <p style=\"margin-top:12px;\"><strong>Reported reaction:</strong> \"I broke out in hives as a child when I took penicillin for an ear infection\"</p>\n                <p><strong>Timeline:</strong> Age 8 (37 years ago); no subsequent penicillin exposure</p>\n            </div>",
        "hint_beginner": "What percentage of patients labeled \"penicillin allergic\" actually have true allergy on testing?",
        "hint_advanced": "How does IgE-mediated penicillin allergy change over time? What is the rate of natural resolution?",
        "question": {
            "prompt": "Based on this history alone, what is the likelihood this patient has a true IgE-mediated penicillin allergy today?",
            "options": [
                {
                    "text": "Less than 5% - remote childhood hives with no subsequent reactions suggests very low probability of current true allergy",
                    "correct": true
                },
                {
                    "text": "Greater than 80% - childhood hives to penicillin confirms lifelong IgE-mediated allergy",
                    "correct": false
                },
                {
                    "text": "50% - cannot estimate without skin testing",
                    "correct": false
                },
                {
                    "text": "30-40% - typical probability for any patient with reported penicillin allergy",
                    "correct": false
                },
                {
                    "text": "100% - any history of hives means permanent penicillin allergy",
                    "correct": false
                }
            ],
            "explanation": {
                "correct": "Only ~10% of patients labeled penicillin-allergic test positive, and IgE-mediated penicillin allergy wanes over time (~10% per year). After 10+ years without exposure, over 90% of patients with reported penicillin allergy can tolerate it. Her 37-year-old childhood history of hives carries very low probability (<5%) of current allergy.",
                "incorrect": "Penicillin allergy is vastly over-reported. ~90% of labeled patients tolerate penicillin on testing. IgE-mediated allergy wanes at ~10% per year. A remote childhood reaction, especially isolated hives without anaphylaxis, has very low probability of representing current true allergy."
            },
            "teaching": "<h4>\ud83d\udcda Penicillin Allergy: The Numbers</h4>\n                    <ul>\n                        <li><strong>10%</strong> of patients report penicillin allergy</li>\n                        <li><strong>Less than 10%</strong> of these have true allergy on testing</li>\n                        <li><strong>~1%</strong> of general population is truly penicillin-allergic</li>\n                    </ul>\n                    <p><strong>Natural history:</strong></p>\n                    <ul>\n                        <li>IgE-mediated allergy wanes ~10% per year</li>\n                        <li>After 10 years: ~80% will tolerate penicillin</li>\n                        <li>Remote childhood reactions: greater than 95% will tolerate</li>\n                    </ul>",
            "points": 10
        }
    },
    {
        "title": "Risk Stratification",
        "content": "<div class=\"narrative\">\n                <p>You take a detailed history to risk-stratify her reaction:</p>\n                <ul style=\"margin-top:12px;\">\n                    <li><strong>Symptoms:</strong> Hives only, no swelling, no breathing problems</li>\n                    <li><strong>Timing:</strong> Developed during course of antibiotics (day 3-4)</li>\n                    <li><strong>Treatment:</strong> Stopped antibiotic, hives resolved with diphenhydramine (Benadryl)</li>\n                    <li><strong>Subsequent exposures:</strong> None - has avoided all penicillins and cephalosporins</li>\n                </ul>\n            </div>",
        "hint_beginner": "What features distinguish high-risk from low-risk drug allergy histories?",
        "hint_advanced": "How do you classify drug hypersensitivity reactions? What is the Gell and Coombs classification?",
        "question": {
            "prompt": "How would you classify the risk level of this reported reaction?",
            "options": [
                {
                    "text": "Low risk - isolated urticaria without systemic symptoms, remote history, and reaction during (not immediately after) drug administration",
                    "correct": true
                },
                {
                    "text": "High risk - any hives to penicillin indicates IgE-mediated reaction requiring full avoidance",
                    "correct": false
                },
                {
                    "text": "Moderate risk - cannot classify without knowing the specific penicillin formulation",
                    "correct": false
                },
                {
                    "text": "Unable to classify - all penicillin reactions require the same cautious approach",
                    "correct": false
                },
                {
                    "text": "High risk - pediatric reactions are more likely to persist into adulthood",
                    "correct": false
                }
            ],
            "explanation": {
                "correct": "This is LOW RISK: 1) Isolated urticaria without anaphylaxis, 2) Occurred during antibiotic course (could be viral exanthem or non-IgE reaction), 3) Remote history (37 years), 4) Resolved easily. High-risk features would include: anaphylaxis, immediate onset (<1 hour), recurrent reactions, or recent reaction.",

function shuffleArray(array) {
    const shuffled = [...array];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
}

function setDifficulty(level, btn) {
    difficulty = level;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    document.querySelectorAll('.hint-beginner').forEach(el => {
        el.style.display = level === 'beginner' ? 'block' : 'none';
    });
    document.querySelectorAll('.hint-advanced').forEach(el => {
        el.style.display = level === 'advanced' ? 'block' : 'none';
    });
}

function renderStage(index) {
    const stage = stages[index];
    const container = document.getElementById('scene-container');
    const letters = ['A', 'B', 'C', 'D', 'E'];
    const shuffledOptions = shuffleArray(stage.question.options);
    
    const optionsHTML = shuffledOptions.map((opt, i) => `
        <div class="mcq-option" data-correct="${opt.correct}" data-text="${opt.text.replace(/"/g, '&quot;')}" onclick="selectOption(this)">
            <span class="option-letter">${letters[i]}</span>
            <span class="option-text">${opt.text}</span>
        </div>
    `).join('');
    
    container.innerHTML = `
        <div class="scene">
            <div class="scene-header">
                <div class="scene-phase">Stage ${index + 1} of ${stages.length}</div>
                <div class="scene-title">${stage.title}</div>
            </div>
            <div class="scene-body">
                ${stage.content}
                
                <div class="hint-beginner">🌱 <strong>Hint:</strong> ${stage.hint_beginner}</div>
                <div class="hint-advanced">🎯 <strong>Challenge:</strong> ${stage.hint_advanced}</div>
                
                <div class="question-box">
                    <div class="question-prompt">${stage.question.prompt}</div>
                    <div class="mcq-options" id="options-container">${optionsHTML}</div>
                    
                    <div class="feedback correct-feedback" id="feedback-correct">
                        <div class="feedback-title">✓ Correct!</div>
                        <div class="feedback-explanation">${stage.question.explanation.correct}</div>
                    </div>
                    <div class="feedback incorrect-feedback" id="feedback-incorrect">
                        <div class="feedback-title">✗ Not quite</div>
                        <div class="feedback-explanation">${stage.question.explanation.incorrect}</div>
                    </div>
                    
                    <div class="teaching-point" id="teaching">
                        ${stage.question.teaching}
                    </div>
                    
                    <button class="btn" id="nextBtn" onclick="nextStage()">Continue →</button>
                </div>
            </div>
        </div>
    `;
    
    // Apply difficulty
    document.querySelectorAll('.hint-beginner').forEach(el => {
        el.style.display = difficulty === 'beginner' ? 'block' : 'none';
    });
    document.querySelectorAll('.hint-advanced').forEach(el => {
        el.style.display = difficulty === 'advanced' ? 'block' : 'none';
    });
    
    document.getElementById('progress').style.width = ((index + 1) / stages.length * 100) + '%';
}

function selectOption(element) {
    if (answeredQuestions.has(currentStage)) return;
    answeredQuestions.add(currentStage);
    
    const stage = stages[currentStage];
    const isCorrect = element.dataset.correct === 'true';
    const selectedText = element.dataset.text;
    
    // Track decision
    decisionPath.push({
        stage: currentStage + 1,
        title: stage.title,
        correct: isCorrect,
        selected: selectedText,
        points: isCorrect ? stage.question.points : 0,
        maxPoints: stage.question.points
    });
    
    // Mark options
    document.querySelectorAll('.mcq-option').forEach(opt => {
        opt.classList.add('disabled');
        if (opt.dataset.correct === 'true') opt.classList.add('correct');
    });
    
    if (!isCorrect) element.classList.add('incorrect');
    
    // Update score
    if (isCorrect) {
        score += stage.question.points;
        document.getElementById('feedback-correct').classList.add('show');
    } else {
        document.getElementById('feedback-incorrect').classList.add('show');
    }
    
    maxScore += stage.question.points;
    document.getElementById('score').textContent = score;
    document.getElementById('maxScore').textContent = maxScore;
    
    document.getElementById('teaching').classList.add('show');
    document.getElementById('nextBtn').classList.add('show');
}

function nextStage() {
    currentStage++;
    if (currentStage < stages.length) {
        renderStage(currentStage);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
        showCompletion();
    }
}

function showCompletion() {
    const percentage = Math.round((score / maxScore) * 100);
    let grade, color, emoji;
    if (percentage >= 90) { grade = 'Outstanding!'; color = '#22c55e'; emoji = '🏆'; }
    else if (percentage >= 80) { grade = 'Excellent Work!'; color = '#14b8a6'; emoji = '⭐'; }
    else if (percentage >= 70) { grade = 'Good Progress!'; color = '#eab308'; emoji = '👍'; }
    else { grade = 'Keep Practicing!'; color = '#f87171'; emoji = '📚'; }
    
    const pathHTML = decisionPath.map(d => {
        const icon = d.correct ? '✓' : '✗';
        const cls = d.correct ? 'color: #4ade80' : 'color: #f87171';
        return `<div style="padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between;">
            <span><span style="${cls}; font-weight: 700;">${icon}</span> Stage ${d.stage}: ${d.title}</span>
            <span style="color: #94a3b8;">${d.points}/${d.maxPoints}</span>
        </div>`;
    }).join('');
    
    document.getElementById('scene-container').innerHTML = `
        <div class="scene completion">
            <div style="font-size: 4rem; margin-bottom: 16px;">${emoji}</div>
            <div class="completion-grade" style="color: ${color};">${grade}</div>
            <div class="completion-percent" style="color: ${color};">${percentage}%</div>
            <div class="completion-score">Final Score: ${score} / ${maxScore}</div>
            <div class="completion-message">You've completed this Socratic Case</div>
            
            <div class="completion-breakdown">

                ${pathHTML}
            </div>
            
            <div class="crossplatform">
                <h4>🎯 Continue Learning</h4>
                <div class="crossplatform-links">
                    <a href="../index.html" class="crossplatform-link">📚 Drug Hypersensitivity</a>
<a href="penicillin-delabeling-expanded.html" class="crossplatform-link">🎯 Penicillin Delabeling</a>

            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}

</script>
