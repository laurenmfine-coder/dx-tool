{text-align:center;font-size:13px}.vital-item .label{color:var(--rdx-text-muted,#64748b);font-size:11px;display:block}.vital-item .value{font-weight:700;color:var(--rdx-teal-dark,#1f5f8b)}.socratic-prompt{background:linear-gradient(135deg,rgba(124,58,237,0.06),rgba(40,116,166,0.06));border:1px solid rgba(124,58,237,0.15);border-radius:12px;padding:16px 20px;margin:16px 0}.socratic-prompt h4{color:var(--rdx-purple,#7c3aed);font-size:0.95rem;margin-bottom:8px}.hint-box{background:rgba(217,119,6,0.06);border:1px solid rgba(217,119,6,0.15);border-radius:8px;padding:12px;margin:8px 0;font-size:0.9rem;color:#92400e;display:none}.options-grid{display:grid;gap:10px;margin:16px 0}.option-btn{background:var(--rdx-bg-card,#fff);border:2px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:14px 18px;cursor:pointer;text-align:left;font-size:14px;transition:all 0.2s;font-family:var(--rdx-font)}.option-btn:hover{border-color:var(--rdx-teal,#2874a6);background:rgba(40,116,166,0.03)}.option-btn.correct{border-color:#16a34a;background:rgba(22,163,74,0.06)}.option-btn.incorrect{border-color:#dc2626;background:rgba(220,38,38,0.04)}.option-btn.disabled{pointer-events:none;opacity:0.7}.explanation-box{border-radius:12px;padding:16px;margin:12px 0;display:none}.explanation-box.correct{background:rgba(22,163,74,0.06);border:1px solid rgba(22,163,74,0.2)}.explanation-box.incorrect{background:rgba(220,38,38,0.04);border:1px solid rgba(220,38,38,0.15)}.mechanism-box{background:linear-gradient(135deg,rgba(40,116,166,0.06),rgba(40,116,166,0.02));border:1px solid rgba(40,116,166,0.15);border-radius:12px;padding:20px;margin:16px 0}.mechanism-title{color:var(--rdx-teal-dark,#1f5f8b);font-weight:700;font-size:0.95rem;margin-bottom:10px}.pathway{line-height:1.8;font-size:0.93rem}.why-chain{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:12px;margin:8px 0}.why-q{font-weight:600;color:var(--rdx-purple,#7c3aed);cursor:pointer;font-size:0.9 <script>let currentStage=0,score=0,difficulty='standard';
const stages=[{
title:"The Candidemia Patient",
content:`<div class="narrative"><p>A <span class="highlight">65-year-old woman</span> in the ICU with a central line develops fever unresponsive to broad-spectrum antibiotics. Blood cultures grow Candida albicans.</p><div class="vital-signs"><div class="vital-item"><span class="label">HR</span><span class="value">104</span></div><div class="vital-item"><span class="label">Temp</span><span class="value">38.9°C</span></div><div class="vital-item"><span class="label">BP</span><span class="value">106/64</span></div></div></div>`,
hint_beginner:"What are the major classes of antifungal drugs?",
hint_advanced:"Consider the targets: cell membrane (ergosterol), cell wall (glucan), or nucleic acid synthesis.",
question:{
prompt:"What is the target of azole antifungal drugs?",
options:[{text:"Inhibit beta-1,3-glucan synthase",correct:false},{text:"Bind ergosterol directly → create pores in cell membrane",correct:false},{text:"Inhibit 14-alpha-demethylase (CYP51) → block ergosterol synthesis",correct:true},{text:"Inhibit nucleic acid synthesis",correct:false}],
explanation:{correct:"Correct! Azoles inhibit lanosterol 14-alpha-demethylase (CYP51), blocking conversion of lanosterol to ergosterol. Without ergosterol, the fungal cell membrane becomes unstable. Azoles are generally fungistatic.",incorrect:"Azoles block ergosterol synthesis via CYP51 inhibition. They are fungistatic. Amphotericin binds ergosterol directly; echinocandins target the cell wall."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Antifungal Classes</div><div class="pathway"><strong>Azoles (fungistatic):</strong> Inhibit CYP51 → block ergosterol synthesis<br>• Fluconazole, itraconazole, voriconazole, posaconazole, isavuconazole<br><strong>Polyenes (fungicidal):</strong> Bind ergosterol directly → membrane pores<br>• Amphotericin B (deoxycholate and liposomal)<br><strong>Echinocandins (fungicidal):</strong> Inhibit beta-1,3-glucan synthase → cell wall disruption<br>• Caspofungin, micafungin, anidulafungin<br><strong>Flucytosine:</strong> Nucleic acid synthesis inhibitor (synergy with amphotericin for Cryptococcus)</div></div>`,
why_chain:[{q:"Why are azoles fungistatic but amphotericin is fungicidal?",a:"Azoles slow ergosterol production → gradual membrane weakening. Amphotericin B binds existing ergosterol and physically creates pores → immediate membrane disruption → cell death. The direct pore-forming action is more immediately lethal."}],
points:10
}
},{
title:"First-Line for Candidemia",
content:`<div class="narrative"><p>You need to select the optimal antifungal for this candidemia case. Species identification is pending.</p></div>`,
hint_beginner:"What is first-line for candidemia before species identification?",
hint_advanced:"Why are echinocandins preferred over fluconazole empirically?",
question:{
prompt:"What is the recommended first-line treatment for candidemia?",
options:[{text:"Voriconazole",correct:false},{text:"Amphotericin B",correct:false},{text:"Fluconazole",correct:false},{text:"An echinocandin (micafungin, caspofungin, or anidulafungin)",correct:true}],
explanation:{correct:"Correct! Echinocandins are first-line for candidemia: fungicidal against Candida, excellent safety profile, no drug interactions (unlike azoles), and active against C. glabrata/krusei (which have fluconazole resistance).",incorrect:"Echinocandins are first-line for candidemia — fungicidal, safe, and cover fluconazole-resistant species. Step down to fluconazole once susceptibilities confirm C. albicans."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Candidemia Treatment</div><div class="pathway"><strong>First-line:</strong> Echinocandin (micafungin 100mg, caspofungin 70mg then 50mg, anidulafungin 200mg then 100mg)<br><strong>Step-down:</strong> Fluconazole once species/susceptibilities confirm (C. albicans susceptible)<br><strong>Duration:</strong> 14 days from first negative blood culture<br><strong>Essential:</strong> Remove central venous catheter (source control)<br><strong>Ophthalmology:</strong> Dilated fundoscopic exam to rule out endophthalmitis</div></div>`,
why_chain:[{q:"Why remove the central line?",a:"The catheter biofilm harbors Candida and is a persistent source. Without removal, candidemia persists or recurs in up to 70% of cases. Source control is as important as antifungal selection."}],
points:10
}
},{
title:"Azole Drug Interactions",
content:`<div class="narrative"><p>A different patient needs long-term voriconazole for invasive aspergillosis. Azole drug interactions require careful attention.</p></div>`,
hint_beginner:"Why do azoles cause so many drug interactions?",
hint_advanced:"Compare the CYP450 interaction profiles of different azoles.",
question:{
prompt:"What is the primary mechanism of azole drug interactions?",
options:[{text:"CYP450 inhibition (especially CYP3A4, 2C9, 2C19) → increased levels of co-administered drugs",correct:true},{text:"Renal tubular competition",correct:false},{text:"Protein binding displacement",correct:false},{text:"CYP450 induction → decreased drug levels",correct:false}],
explanation:{correct:"Correct! Azoles inhibit CYP450 enzymes (opposite of rifampin, which induces them). This raises levels of many drugs: immunosuppressants (tacrolimus, sirolimus), warfarin, statins, benzodiazepines, calcium channel blockers.",incorrect:"Azoles are CYP450 INHIBITORS → increase levels of co-administered drugs. Fluconazole is mildest; voriconazole and itraconazole are strongest inhibitors."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Azole Interactions</div><div class="pathway"><strong>Mechanism:</strong> CYP3A4, 2C9, 2C19 inhibition<br><strong>Fluconazole:</strong> Moderate inhibitor. Fewest interactions.<br><strong>Voriconazole:</strong> Strong inhibitor. Many interactions. Therapeutic drug monitoring recommended.<br><strong>Itraconazole/Posaconazole:</strong> Strong CYP3A4 inhibitors.<br><strong>Isavuconazole:</strong> Moderate inhibitor. Fewest interactions among broad-spectrum azoles.<br><br><strong>Critical:</strong> Reduce tacrolimus dose by 50-66% when adding an azole. Monitor levels closely.</div></div>`,
why_chain:[{q:"Why is isavuconazole gaining popularity over voriconazole?",a:"Fewer drug interactions, no visual side effects, no need for therapeutic drug monitoring in most patients, fixed dosing without renal concern, and similar efficacy for invasive aspergillosis."}],
points:10
}
},{
title:"Amphotericin B Toxicity",
content:`<div class="narrative"><p>A patient with mucormycosis requires amphotericin B. You must prepare for its significant toxicity profile.</p></div>`,
hint_beginner:"What is the most important toxicity of amphotericin B?",
hint_advanced:"Why does liposomal formulation reduce nephrotoxicity?",
question:{
prompt:"What is the dose-limiting toxicity of amphotericin B?",
options:[{text:"Bone marrow suppression",correct:false},{text:"Nephrotoxicity (distal renal tubular acidosis, K+ and Mg2+ wasting, decreased GFR)",correct:true},{text:"Ototoxicity",correct:false},{text:"Hepatotoxicity",correct:false}],
explanation:{correct:"Correct! Amphotericin B binds cholesterol in mammalian cell membranes (in addition to fungal ergosterol), particularly in renal tubular cells. This causes: Type I (distal) RTA, potassium and magnesium wasting, and decreased GFR. Liposomal formulations preferentially accumulate in fungal tissue, reducing renal exposure.",incorrect:"Nephrotoxicity is dose-limiting. Pre-hydrate with NS, supplement K+/Mg2+, and use liposomal formulation to reduce renal toxicity."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Amphotericin B Toxicity</div><div class="pathway"><strong>Nephrotoxicity (most important):</strong><br>• Distal RTA (Type I) → non-anion gap metabolic acidosis<br>• K+ and Mg2+ wasting (monitor and replace aggressively)<br>• Decreased GFR (vasoconstriction of afferent arterioles)<br><strong>Infusion reactions:</strong> Fever, rigors, hypotension (premedicate with acetaminophen, diphenhydramine, meperidine)<br><strong>Anemia:</strong> Decreased erythropoietin production<br><br><strong>Liposomal AmB:</strong> 5-10× less nephrotoxic. Preferred for most indications. Use deoxycholate only when cost prohibits liposomal.</div></div>`,
why_chain:[{q:"Why does amphotericin damage kidneys?",a:"Amphotericin binds cholesterol (similar structure to ergosterol) in renal tubular cell membranes, creating pores. This damages distal tubular cells → impaired H+ and K+ secretion. It also causes afferent arteriolar vasoconstriction → decreased GFR."}],
points:10
}
},{
title:"Echinocandin Limitations",
content:`<div class="narrative"><p>Understanding when echinocandins do NOT work is as important as knowing their strengths.</p></div>`,
hint_beginner:"What are the coverage gaps of echinocandins?",
hint_advanced:"Think about which fungi lack the beta-1,3-glucan target.",
question:{
prompt:"Against which fungal infection are echinocandins INEFFECTIVE?",
options:[{text:"Candida albicans bloodstream infection",correct:false},{text:"Invasive aspergillosis",correct:false},{text:"Cryptococcal meningitis (Cryptococcus has minimal beta-1,3-glucan in its cell wall)",correct:true},{text:"Esophageal candidiasis",correct:false}],
explanation:{correct:"Correct! Echinocandins have no activity against Cryptococcus (minimal glucan target), Mucor/Rhizopus, Fusarium, and other molds. Also poor CSF penetration. For Cryptococcus: amphotericin + flucytosine (induction) then fluconazole (consolidation/maintenance).",incorrect:"Echinocandins cannot treat Cryptococcus, Mucor, or CNS infections due to target absence and poor CNS penetration."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Echinocandin Gaps</div><div class="pathway"><strong>No activity:</strong><br>• Cryptococcus (minimal glucan)<br>• Mucor/Rhizopus (minimal glucan)<br>• Fusarium, Scedosporium<br>• Trichosporon<br><br><strong>Poor penetration:</strong> CNS, eye, urine<br><br><strong>Resistance (emerging):</strong> C. glabrata FKS mutations (1-3%) → reduced echinocandin susceptibility. Increasing concern in breakthrough infections.</div></div>`,
why_chain:[{q:"Why do echinocandins work against Aspergillus but not Mucor?",a:"Aspergillus cell walls contain abundant beta-1,3-glucan as a structural component. Mucor/Rhizopus have chitosan-rich walls with minimal glucan → echinocandins have no effective target. This is why mucormycosis requires amphotericin B."}],
points:10
}
},{
title:"Antifungal Selection Summary",
content:`<div class="narrative"><p>Choosing the right antifungal requires matching the drug class to the organism and clinical scenario.</p></div>`,
hint_beginner:"How do you choose between azoles, echinocandins, and amphotericin?",
hint_advanced:"Consider the concept of drug-of-choice for each major fungal infection.",
question:{
prompt:"What is the drug of choice for invasive aspergillosis?",
options:[{text:"Amphotericin B monotherapy",correct:false},{text:"Caspofungin",correct:false},{text:"Fluconazole",correct:false},{text:"Voriconazole (or isavuconazole)",correct:true}],
explanation:{correct:"Correct! Voriconazole (or isavuconazole) is first-line for invasive aspergillosis based on landmark trials showing superiority over amphotericin B. Echinocandins are salvage therapy. Fluconazole has NO Aspergillus activity.",incorrect:"Voriconazole for Aspergillus, echinocandin for Candida, amphotericin for Mucor and Crypto induction — know the first-line for each organism."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Antifungal Selection Guide</div><div class="pathway"><strong>Candida (non-critical):</strong> Fluconazole<br><strong>Candidemia:</strong> Echinocandin → step down to fluconazole<br><strong>Aspergillus:</strong> Voriconazole or isavuconazole<br><strong>Cryptococcus:</strong> AmB + flucytosine (2wk) → fluconazole (8wk) → fluconazole maintenance<br><strong>Mucormycosis:</strong> Liposomal AmB + surgical debridement<br><strong>Histoplasma/Blasto:</strong> Mild = itraconazole; Severe = AmB → itraconazole<br><strong>Coccidioides:</strong> Fluconazole (meningitis = lifelong)<br><strong>PCP:</strong> TMP-SMX (not technically antifungal but first-line)</div></div>`,
why_chain:[{q:"Why is fluconazole ineffective against Aspergillus?",a:"Fluconazole has limited affinity for the Aspergillus CYP51 enzyme (14-alpha-demethylase). Extended-spectrum azoles (voriconazole, itraconazole, posaconazole, isavuconazole) have structural modifications that allow binding to the Aspergillus enzyme."}],
points:10
}
}];
document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hb=document.querySelector('.hint-box');if(hb)hb.style.display=d==='beginner'?'block':'none'}
function toggleReferences(){const c=document.getElementById('referencesContent');const t=document.getElementById('refToggle');if(c.style.display==='none'){c.style.display='block';t.innerHTML='&#9662;'}else{c.style.display='none';t.innerHTML='&#9656;'}}
function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100);document.getElementById('progress').style.width=pct+'%';let h='<h2 class="scene-title">'+st.title+'</h2>';h+='<div class="scene-content">'+st.content+'</div>';if(st.hint_beginner)h+='<div class="hint-box" id="hint-box"'+(difficulty==='beginner'?' style="display:block"':'')+'> '+st.hint_beginner+'</div>';if(difficulty==='advanced'&&st.hint_advanced)h+='<div class="hint-box" style="display:block;background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.15);color:#5b21b6"> '+st.hint_advanced+'</div>';if(st.question){h+='<div class="socratic-prompt"><h4>Clinical Question</h4><p>'+st.question.prompt+'</p></div>';h+='<div class="options-grid" id="options-'+idx+'">';st.question.options.forEach((opt,oi)=>{h+='<button class="option-btn" id="option-'+idx+'-'+oi+'" onclick="checkAnswer('+idx+','+oi+')">'+String.fromCharCode(65+oi)+'. '+opt.text+'</button>'});h+='</div>';h+='<div class="explanation-box" id="explain-'+idx+'"></div>';h+='<div id="teaching-'+idx+'" style="display:none">'+st.question.teaching+'</div>';if(st.question.why_chain&&st.question.why_chain.length>0){h+='<div id="why-'+idx+'" style="display:none">';st.question.why_chain.forEach((wc,wi)=>{h+='<div class="why-chain"><div class="why-q" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'"> '+wc.q+'</div><div class="why-a">'+wc.a+'</div></div>'});h+='</div>'}}h+='<button class="next-btn" id="next-'+idx+'" onclick="nextStage()">Continue &rarr;</button>';document.getElementById('scene-container').innerHTML=h}
function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll('#options-'+si+' .option-btn').forEach((b,i)=>{b.classList.add('disabled');if(st.question.options[i].correct)b.classList.add('correct');if(i===oi&&!opt.correct)b.classList.add('incorrect')});const eb=document.getElementById('explain-'+si);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;eb.className='explanation-box correct';eb.innerHTML='<strong>Correct!</strong> '+st.question.explanation.correct}else{eb.className='explanation-box incorrect';eb.innerHTML='<strong>Not quite.</strong> '+st.question.explanation.incorrect}eb.style.display='block';document.getElementById('teaching-'+si).style.display='block';const wy=document.getElementById('why-'+si);if(wy)wy.style.display='block';document.getElementById('next-'+si).style.display='inline-block'}
function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let lvl='Developing';if(pct>=90)lvl='Mastery';else if(pct>=70)lvl='Proficient';else if(pct>=50)lvl='Competent';document.getElementById('scene-container').innerHTML='<div class="completion-card"><h2>Case Complete!</h2><p style="font-size:2rem;font-weight:700;color:var(--rdx-teal,#2874a6)">'+pct+'%</p><p style="color:var(--rdx-text-muted,#64748b)">Score: '+score+'/'+mx+'</p><p style="margin:12px 0;font-weight:600">Level: '+lvl+'</p><div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="../adventure-hub.html" style="padding:10px 20px;background:var(--rdx-teal,#2874a6);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">More Cases</a><a href="../tools/learning-dashboard.html" style="padding:10px 20px;background:var(--rdx-purple,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">Dashboard</a><button onclick="currentStage=0;score=0;document.getElementById(\'score\').textContent=0;renderStage(0)" style="padding:10px 20px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;cursor:pointer;font-weight:600">Retry</button></div></div>';try{const progress=JSON.parse(localStorage.getItem('reasondx-progress')||'{}');if(!progress.cases)progress.cases={};progress.cases['antifungals']=Math.max(progress.cases['antifungals']||0,pct);localStorage.setItem('reasondx-progress',JSON.stringify(progress))}catch(e){}}
renderStage(0);</script>
