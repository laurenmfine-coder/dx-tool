        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--dx-space-8);
        }

        .page-header {
            text-align: center;
            margin-bottom: var(--dx-space-8);
        }

        .page-header h1 {
            font-size: var(--dx-text-4xl);
            font-weight: 700;
            margin-bottom: var(--dx-space-2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--dx-space-3);
        }

        .page-header p {
            color: var(--dx-text-secondary);
            font-size: var(--dx-text-lg);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Search Bar */
        .search-container {
            max-width: 600px;
            margin: 0 auto var(--dx-space-8);
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: var(--dx-space-4) var(--dx-space-6);
            padding-left: 3rem;
            font-size: var(--dx-text-lg);
            border: 2px solid var(--dx-border-light);
            border-radius: var(--dx-radius-xl);
            background: var(--dx-bg-primary);
            transition: all var(--dx-transition-fast);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--dx-primary);
            box-shadow: 0 0 0 4px var(--dx-primary-light);
        }

        .search-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.25rem;
            color: var(--dx-text-muted);
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: var(--dx-space-2);
            margin-bottom: var(--dx-space-8);
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: var(--dx-space-2) var(--dx-space-4);
            border-radius: var(--dx-radius-full);
            border: 1px solid var(--dx-border-light);
            background: var(--dx-bg-primary);
            font-weight: 500;
            font-size: var(--dx-text-sm);
            cursor: pointer;
            transition: all var(--dx-transition-fast);
            color: var(--dx-text-secondary);
        }

        .filter-tab:hover {
            border-color: var(--dx-primary);
            color: var(--dx-primary);
        }

        .filter-tab.active {
            background: var(--dx-primary);
            color: white;
            border-color: var(--dx-primary);
        }

        /* Topic Grid */
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: var(--dx-space-6);
        }

        .topic-card {
            background: var(--dx-bg-primary);
            border-radius: var(--dx-radius-xl);
            border: 1px solid var(--dx-border-light);
            overflow: hidden;
            transition: all var(--dx-transition-base);
            cursor: pointer;
        }

        .topic-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--dx-shadow-xl);
            border-color: var(--dx-primary);
        }

        .topic-card-header {
            padding: var(--dx-space-5);
            display: flex;
            align-items: center;
            gap: var(--dx-space-4);
        }

        .topic-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--dx-radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            flex-shrink: 0;
        }

        .topic-info h3 {
            font-size: var(--dx-text-lg);
            font-weight: 600;
            margin-bottom: var(--dx-space-1);
        }

        .topic-category {
            font-size: var(--dx-text-sm);
            color: var(--dx-text-muted);
        }

        .topic-resources {
            padding: 0 var(--dx-space-5) var(--dx-space-5);
            display: flex;
            flex-wrap: wrap;
            gap: var(--dx-space-2);
        }

        .resource-badge {
            display: flex;
            align-items: center;
            gap: var(--dx-space-1);
            padding: var(--dx-space-1) var(--dx-space-3);
            border-radius: var(--dx-radius-full);
            font-size: var(--dx-text-xs);
            font-weight: 500;
        }

        .resource-badge.deep-dive {
            background: var(--dx-primary-light);
            color: var(--dx-primary-dark);
        }

        .resource-badge.mechanism {
            background: var(--dx-success-light);
            color: var(--dx-success-dark);
        }

        .resource-badge.mcq {
            background: var(--dx-secondary-light);
            color: var(--dx-secondary-dark);
        }

        .resource-badge.cases {
            background: var(--dx-warning-light);
            color: var(--dx-warning-dark);
        }

        .resource-badge.coach {
            background: #fae8ff;
            color: #a21caf;
        }

        .cat-cardiology { background: #fef2f2; }
        .cat-pulmonary { background: #f0f7fc; }
        .cat-neurology { background: #faf5ff; }
        .cat-gi { background: #fff7ed; }
        .cat-renal { background: #ecfeff; }
        .cat-infectious { background: #f0f7fc; }
        .cat-endocrine { background: #fdf2f8; }
        .cat-hematology { background: #fef2f2; }
        .cat-allergy { background: #d4e8f7; }
        .cat-toxicology { background: #fefce8; }
        .cat-critical { background: #f1f5f9; }

        /* Modal */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            padding: var(--dx-space-8);
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-backdrop.active {
            display: flex;
        }

        .modal {
            background: var(--dx-bg-primary);
            border-radius: var(--dx-radius-xl);
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            animation: modalSlide 0.3s ease;
        }

        @keyframes modalSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            padding: var(--dx-space-6);
            border-bottom: 1px solid var(--dx-border-light);
            display: flex;
            align-items: center;
            gap: var(--dx-space-4);
            position: sticky;
            top: 0;
            background: var(--dx-bg-primary);
            z-index: 10;
        }

        .modal-icon {
            width: 64px;
            height: 64px;
            border-radius: var(--dx-radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .modal-title-area h2 {
            font-size: var(--dx-text-2xl);
            font-weight: 700;
            margin-bottom: var(--dx-space-1);
        }

        .modal-category {
            font-size: var(--dx-text-sm);
            color: var(--dx-text-muted);
        }

        .modal-close {
            position: absolute;
            top: var(--dx-space-4);
            right: var(--dx-space-4);
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--dx-text-muted);
            padding: var(--dx-space-2);
            border-radius: var(--dx-radius-md);
            transition: all var(--dx-transition-fast);
        }

        .modal-close:hover {
            background: var(--dx-bg-secondary);
            color: var(--dx-text-primary);
        }

        .modal-body {
            padding: var(--dx-space-6);
        }

        .modal-section {
            margin-bottom: var(--dx-space-6);
        }

        .modal-section:last-child {
            margin-bottom: 0;
        }

        .modal-section-title {
            font-size: var(--dx-text-sm);
            font-weight: 600;
            color: var(--dx-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: var(--dx-space-3);
            display: flex;
            align-items: center;
            gap: var(--dx-space-2);
        }

        .resource-link {
            display: flex;
            align-items: center;
            gap: var(--dx-space-4);
            padding: var(--dx-space-4);
            background: var(--dx-bg-secondary);
            border-radius: var(--dx-radius-lg);
            text-decoration: none;
            color: inherit;
            margin-bottom: var(--dx-space-3);
            transition: all var(--dx-transition-fast);
            border: 1px solid transparent;
        }

        .resource-link:hover {
            background: var(--dx-bg-primary);
            border-color: var(--dx-primary);
            transform: translateX(4px);
        }

        .resource-link-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--dx-radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;

        .resource-link-info h4 {
            font-weight: 600;
            margin-bottom: var(--dx-space-1);

        .resource-link-info p {
            font-size: var(--dx-text-sm);
            color: var(--dx-text-muted);
            margin: 0;

        .resource-link-arrow {
            margin-left: auto;
            color: var(--dx-text-muted);

            gap: var(--dx-space-4);
            margin-bottom: var(--dx-space-6);
            flex-wrap: wrap;

        .quick-stat {
            background: var(--dx-bg-secondary);
            padding: var(--dx-space-3) var(--dx-space-4);
            border-radius: var(--dx-radius-md);
            text-align: center;
            min-width: 100px;
        }

        .quick-stat-value {
            font-size: var(--dx-text-xl);
            font-weight: 700;
            color: var(--dx-primary);
        }

        .quick-stat-label {
            font-size: var(--dx-text-xs);
            color: var(--dx-text-muted);

            padding: var(--dx-space-4);
            background: var(--dx-primary);
            color: white;
            border: none;
            border-radius: var(--dx-radius-lg);
            font-size: var(--dx-text-lg);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--dx-transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--dx-space-2);
        }

        .start-study-btn:hover {
            background: var(--dx-primary-dark);
            transform: translateY(-2px);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: var(--dx-space-12);
            color: var(--dx-text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: var(--dx-space-4);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .topics-grid {
                grid-template-columns: 1fr;
            }

            .modal {
                margin: var(--dx-space-4);
                max-height: 90vh;
            }

            .filter-tabs {
                justify-content: flex-start;
                overflow-x: auto;
                padding-bottom: var(--dx-space-2);
            }
        }
    /* RDX Loading */
.rdx-loading{position:fixed;inset:0;z-index:8000;background:#F8FAFC;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .3s}
.rdx-loading.hide{opacity:0;pointer-events:none}
.rdx-spinner{width:40px;height:40px;border:3px solid #E2E8F0;border-top-color:#2874A6;border-radius:50%;animation:rdxSpin .8s linear infinite}
@keyframes rdxSpin{to{transform:rotate(360deg)}}
.rdx-load-text{font-family:"DM Sans",sans-serif;font-size:14px;color:#64748B;font-weight:500}
</style>

        // ============ STATE ============
        let currentFilter = 'all';
        let searchQuery = '';

        // ============ RENDER ============
        function renderTopics() {
            const grid = document.getElementById('topicsGrid');
            const emptyState = document.getElementById('emptyState');
            
            const filtered = TOPICS.filter(topic => {
                const matchesFilter = currentFilter === 'all' || topic.category === currentFilter;
                const matchesSearch = searchQuery === '' || 
                    topic.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    topic.category.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesFilter && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            emptyState.style.display = 'none';

            grid.innerHTML = filtered.map(topic => {
                const resourceBadges = [];
                if (topic.resources.mechanism) resourceBadges.push('<span class="resource-badge mechanism">⚙️ Mechanism</span>');
                if (topic.resources.mcq) resourceBadges.push(`<span class="resource-badge mcq">📝 ${topic.resources.mcq.count} MCQs</span>`);
                if (topic.resources.cases) resourceBadges.push('<span class="resource-badge cases">🎯 Cases</span>');
                if (topic.resources.coach) resourceBadges.push('<span class="resource-badge coach">🤖 Coach</span>');

                return `
                    <div class="topic-card" onclick="openTopicModal('${topic.id}')">
                        <div class="topic-card-header">
                            <div class="topic-icon cat-${topic.category}">${topic.icon}</div>
                            <div class="topic-info">
                                <h3>${topic.name}</h3>
                                <div class="topic-category">${formatCategory(topic.category)}</div>
                            </div>
                        </div>
                        <div class="topic-resources">
                            ${resourceBadges.join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function formatCategory(cat) {
            const names = {
                cardiology: '❤️ Cardiology',
                pulmonary: '🫁 Pulmonary',
                neurology: '🧠 Neurology',
                gi: '🫄 GI/Hepatology',
                renal: '🫘 Renal',
                infectious: '🦠 Infectious Disease',
                endocrine: '⚗️ Endocrine',
                hematology: '🩸 Hematology',
                allergy: '🌸 Allergy/Immunology',
                toxicology: '☠️ Toxicology',
                critical: '🚨 Critical Care'
            };
            return names[cat] || cat;
        }

        // ============ MODAL ============
        function openTopicModal(topicId) {
            const topic = TOPICS.find(t => t.id === topicId);
            if (!topic) return;

            const r = topic.resources;
            let totalQuestions = 0;
            let totalResources = 0;

            if (r.mechanism) totalResources++;
            if (r.mcq) { totalQuestions += r.mcq.count; totalResources++; }
            if (r.cases) totalResources++;
            if (r.coach) totalResources++;

            document.getElementById('modalHeader').innerHTML = `
                <div class="modal-icon cat-${topic.category}">${topic.icon}</div>
                <div class="modal-title-area">
                    <h2>${topic.name}</h2>
                    <div class="modal-category">${formatCategory(topic.category)}</div>
                </div>
                <button class="modal-close" onclick="closeModal()">×</button>
            `;

            let bodyHTML = `
                <div class="quick-stats">
                    <div class="quick-stat">
                        <div class="quick-stat-value">${totalResources}</div>
                        <div class="quick-stat-label">Resources</div>
                    </div>
                    <div class="quick-stat">
                        <div class="quick-stat-value">${totalQuestions}</div>
                        <div class="quick-stat-label">Questions</div>
                    </div>

                </div>
            `;


            // ReasonDx
            if (r.mechanism) {
                bodyHTML += `
                    <div class="modal-section">
                        <div class="modal-section-title">⚙️ ReasonDx</div>
                        <a href="${r.mechanism.url}" class="resource-link">
                            <div class="resource-link-icon" style="background: var(--dx-success-light);">⚙️</div>
                            <div class="resource-link-info">
                                <h4>Pathophysiology Module</h4>
                                <p>Visual flowcharts and mechanism maps</p>
                            </div>
                            <span class="resource-link-arrow">→</span>
                        </a>
                    </div>
                `;
            }

            // Board Prep MCQs
            if (r.mcq) {
                bodyHTML += `
                    <div class="modal-section">
                        <div class="modal-section-title">📝 Board Prep MCQs</div>
                        <a href="board-prep.html?tags=${r.mcq.tags.join(',')}" class="resource-link">
                            <div class="resource-link-icon" style="background: var(--dx-secondary-light);">📝</div>
                            <div class="resource-link-info">
                                <h4>${r.mcq.count} Practice Questions</h4>
                                <p>Tags: ${r.mcq.tags.slice(0, 3).join(', ')}${r.mcq.tags.length > 3 ? '...' : ''}</p>
                            </div>
                            <span class="resource-link-arrow">→</span>
                        </a>
                    </div>
                `;
            }

            // Clinical Cases
            if (r.cases) {
                bodyHTML += `
                    <div class="modal-section">
                        <div class="modal-section-title">🎯 Clinical Cases</div>
                        <a href="${r.cases.url}" class="resource-link">
                            <div class="resource-link-icon" style="background: var(--dx-warning-light);">🎯</div>
                            <div class="resource-link-info">
                                <h4>${r.cases.count} Interactive Case${r.cases.count > 1 ? 's' : ''}</h4>
                                <p>Clinical reasoning simulation with feedback</p>
                            </div>
                            <span class="resource-link-arrow">→</span>
                        </a>
                    </div>
                `;
            }

            // CoachDx
            if (r.coach) {
                bodyHTML += `
                    <div class="modal-section">
                        <div class="modal-section-title">🤖 CoachDx AI Mentor</div>
                        <a href="${r.coach.url}" class="resource-link">
                            <div class="resource-link-icon" style="background: #fae8ff;">🤖</div>
                            <div class="resource-link-info">
                                <h4>${r.coach.scenarios} AI Coaching Scenario${r.coach.scenarios > 1 ? 's' : ''}</h4>
                                <p>Practice with an AI attending physician</p>
                            </div>
                            <span class="resource-link-arrow">→</span>
                        </a>
                    </div>
                `;
            }

            // Start Study Button
            const primaryUrl = r.cases?.url || r.mechanism?.url || 'board-prep.html';
            bodyHTML += `
                <button class="start-study-btn" onclick="window.location.href='${primaryUrl}'">
                    🚀 Start Studying ${topic.name}
                </button>
            `;

            document.getElementById('modalBody').innerHTML = bodyHTML;
            document.getElementById('modalBackdrop').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modalBackdrop').classList.remove('active');
            document.body.style.overflow = '';
        }

        // ============ EVENT HANDLERS ============
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                renderTopics();
            });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderTopics();
        });

        // Keyboard shortcut
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
            if (e.key === '/' && !e.target.matches('input')) {
                e.preventDefault();
                document.getElementById('searchInput').focus();
            }
        });

        // ============ INIT ============
        renderTopics();
    </script>
