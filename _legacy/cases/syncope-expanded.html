    <script>
    let decisionPath = [];
let currentStage = 0, score = 0, difficulty = 'standard';
    const stages = [
    {
        title: "The Passing Out Spell",
        content: `<div class="narrative"><p>A <span class="highlight">28-year-old woman</span> presents after <span class="critical">passing out at work</span>. She was standing in a meeting when she felt lightheaded, warm, and nauseated. Coworkers caught her as she slumped to the ground.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 68, BP 118/72, T 36.8°C<br><strong>Exam:</strong> Alert, oriented, no injuries. Normal cardiac and neuro exam.</p></div>
        <div class="socratic-prompt"><h4>Defining the Problem</h4><p>What defines syncope and distinguishes it from other causes of loss of consciousness?</p></div>`,
        hint_beginner: "Syncope is caused by temporary brain hypoperfusion. What makes it different from seizures?",
        hint_advanced: "What causes transient global cerebral hypoperfusion?",
        question: {
            prompt: "What is the DEFINING characteristic of syncope?",
            options: [
                { text: "Any episode of loss of consciousness", correct: false },
                { text: "Transient LOC due to cerebral hypoperfusion with spontaneous recovery", correct: true },
                { text: "Fainting that lasts more than 5 minutes", correct: false },
                { text: "Loss of consciousness with seizure activity", correct: false }
            ],
            explanation: {
                correct: "Correct! Syncope is transient LOC due to global cerebral hypoperfusion, with rapid onset, short duration, and complete spontaneous recovery.",
                incorrect: "Syncope is specifically transient LOC from cerebral hypoperfusion with spontaneous recovery. This distinguishes it from seizures, coma, or other causes."
            },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">🧬 Syncope Definition</div><div class="pathway">SYNCOPE = Transient LOC from global cerebral hypoperfusion

Key features:
• Rapid onset (seconds)
• Short duration (usually <1 minute)
• Complete spontaneous recovery
• No residual neurologic deficit

NOT syncope: Seizures, hypoglycemia, intoxication</div></div>`,
            why_chain: [{q: "Why does cerebral hypoperfusion cause LOC?", a: "The brain is extremely sensitive to blood flow. Just 6-8 seconds of interrupted cerebral perfusion causes LOC."}, {q: "What is presyncope?", a: "Presyncope is the prodromal feeling without actual LOC. Same differential applies."}],
            points: 10
        }
    },
    {
        title: "Etiology Classification",
        content: `<div class="narrative"><p>You need to determine the cause. The differential ranges from benign to life-threatening.</p></div>
        <div class="socratic-prompt"><h4>Risk Stratification</h4><p>How do you categorize syncope causes and which are most dangerous?</p></div>`,
        hint_beginner: "Three main buckets: reflex, orthostatic, and cardiac.",
        hint_advanced: "What percentage of syncope is cardiac, and why does this matter?",
        question: {
            prompt: "Which category of syncope carries the HIGHEST mortality risk?",
            options: [
                { text: "Reflex (vasovagal) syncope", correct: false },
                { text: "Orthostatic syncope", correct: false },
                { text: "Cardiac syncope (arrhythmic or structural)", correct: true },
                { text: "Psychogenic pseudosyncope", correct: false }
            ],
            explanation: {
                correct: "Correct! Cardiac syncope carries significant mortality risk. While only 10-15% of syncope is cardiac, it causes most syncope-related deaths.",
                incorrect: "Cardiac syncope is most dangerous. Though reflex syncope is most common (~60%), cardiac causes have the highest mortality."
            },
            teaching: `<h4>Syncope Classification</h4><table class="comparison-table"><tr><th>Category</th><th>Examples</th><th>Risk</th></tr><tr><td><strong>Reflex</strong></td><td>Vasovagal, situational</td><td style="color:var(--rdx-teal,#2874a6);">Benign</td></tr><tr><td><strong>Orthostatic</strong></td><td>Volume depletion, meds</td><td style="color: #1f5f8b;">Low-moderate</td></tr><tr style="background:rgba(239,68,68,0.2);"><td><strong>Cardiac</strong></td><td>VT, Long QT, AS, HCM</td><td style="color:#f87171;">HIGH</td></tr></table>`,
            why_chain: [{q: "Why is cardiac syncope dangerous?", a: "Cardiac syncope often results from arrhythmias or structural disease that can cause sudden cardiac death."}, {q: "What percentage is cardiac?", a: "About 10-15% overall, but higher in ED patients and elderly."}],
            points: 10
        }
    },
    {
        title: "History: Critical Clues",
        content: `<div class="narrative"><p>The patient describes feeling <span class="highlight">lightheaded, warm, and nauseated</span> for 30 seconds before passing out. She had been standing for 20 minutes in a warm room. She recovered within seconds of lying down.</p><p>No palpitations, chest pain, or dyspnea.</p></div>
        <div class="socratic-prompt"><h4>Pattern Recognition</h4><p>What features distinguish benign from dangerous syncope?</p></div>`,
        hint_beginner: "A prodrome is generally reassuring. What would be concerning?",
        hint_advanced: "What historical features have best sensitivity/specificity for cardiac syncope?",
        question: {
            prompt: "Which historical feature is MOST concerning for cardiac syncope?",
            options: [
                { text: "Prodrome of lightheadedness and warmth", correct: false },
                { text: "Syncope while standing in a warm room", correct: false },
                { text: "Syncope during exertion or while supine", correct: true },
                { text: "Rapid recovery after lying down", correct: false }
            ],
            explanation: {
                correct: "Correct! Exertional and supine syncope are red flags. Exertion triggers arrhythmias or unmasks outflow obstruction. Supine syncope rules out orthostatic causes.",
                incorrect: "Exertional or supine syncope are major red flags. Prodromes and triggers suggest benign reflex syncope."
            },
            teaching: `<h4>History Red Flags</h4><table class="comparison-table"><tr><th>Red Flag</th><th>Concern</th></tr><tr style="background:rgba(239,68,68,0.2);"><td><strong>Exertional syncope</strong></td><td>AS, HCM, arrhythmia</td></tr><tr style="background:rgba(239,68,68,0.2);"><td><strong>Supine syncope</strong></td><td>Must be cardiac</td></tr><tr style="background:rgba(239,68,68,0.2);"><td><strong>No prodrome</strong></td><td>Arrhythmia</td></tr><tr style="background:rgba(239,68,68,0.2);"><td><strong>Palpitations before</strong></td><td>Arrhythmia</td></tr><tr style="background:rgba(239,68,68,0.2);"><td><strong>Family hx sudden death</strong></td><td>Channelopathy, HCM</td></tr></table>`,
            why_chain: [{q: "Why is exertional syncope concerning?", a: "Exercise increases oxygen demand and catecholamines, triggering VT in HCM, ARVC, or channelopathies."}, {q: "What about swimming syncope?", a: "Red flag for Long QT syndrome (LQT1). Cold water and exertion are triggers."}],
            points: 10
        }
    },
    {
        title: "The Essential Test: ECG",
        content: `<div class="narrative"><p>You order an ECG. It shows <span class="highlight">normal sinus rhythm at 72 bpm, normal intervals, no ST changes</span>.</p></div>
        <div class="alert-box"><div class="alert-title">🚨 ECG is Mandatory in ALL Syncope</div><p>ECG can identify arrhythmias, channelopathies (Long QT, Brugada), HCM, and ischemia.</p></div>
        <div class="socratic-prompt"><h4>ECG Interpretation</h4><p>What ECG findings indicate high-risk cardiac syncope?</p></div>`,
        hint_beginner: "Think about Long QT, Brugada, WPW, and HCM findings.",
        hint_advanced: "How do you calculate QTc and what are abnormal cutoffs?",
        question: {
            prompt: "Which ECG finding requires immediate cardiology consultation?",
            options: [
                { text: "Sinus bradycardia at 55 bpm", correct: false },
                { text: "Nonspecific T wave changes", correct: false },
                { text: "QTc >500 ms or Brugada pattern", correct: true },
                { text: "First-degree AV block", correct: false }
            ],
            explanation: {
                correct: "Correct! QTc >500 ms indicates high torsades risk. Brugada pattern carries similar VF risk. Both require urgent cardiology evaluation.",
                incorrect: "Severely prolonged QTc and Brugada pattern are high-risk findings requiring immediate cardiology involvement."

    function setDifficulty(d, btn) {
        difficulty = d;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.hint-beginner').forEach(h => h.style.display = d === 'beginner' ? 'block' : 'none');
        document.querySelectorAll('.hint-advanced').forEach(h => h.style.display = d === 'advanced' ? 'block' : 'none');
    }
    function updateProgress() {
        document.getElementById('progress').style.width = ((currentStage + 1) / stages.length * 100) + '%';
        document.getElementById('maxScore').textContent = stages.length * 10;
    }
    function renderStage() {
        const stage = stages[currentStage];
        const container = document.getElementById('scene-container');
        let html = `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${currentStage + 1} of ${stages.length}</div><div class="scene-title">${stage.title}</div></div>`;
        if (stage.hint_beginner) html += `<div class="hint-beginner" style="display:${difficulty === 'beginner' ? 'block' : 'none'}">🌱 <strong>Beginner Hint:</strong> ${stage.hint_beginner}</div>`;
        if (stage.hint_advanced) html += `<div class="hint-advanced" style="display:${difficulty === 'advanced' ? 'block' : 'none'}">🎯 <strong>Advanced Challenge:</strong> ${stage.hint_advanced}</div>`;
        html += stage.content;
        if (stage.question) {
            html += `<div class="question-box"><div class="question-prompt">${stage.question.prompt}</div><div class="mcq-options">`;
            stage.question.options.forEach((opt, i) => {
                html += `<div class="mcq-option" onclick="checkAnswer(${i}, ${opt.correct})"><div class="option-letter">${String.fromCharCode(65 + i)}</div><div>${opt.text}</div></div>`;
            });
            html += `</div><div class="feedback correct-feedback" id="fb-correct"><div class="feedback-title">✓ Correct!</div>${stage.question.explanation.correct}</div>`;
            html += `<div class="feedback incorrect-feedback" id="fb-incorrect"><div class="feedback-title">✗ Not quite</div>${stage.question.explanation.incorrect}</div>`;
            if (stage.question.teaching) html += `<div class="teaching-point" id="teaching">${stage.question.teaching}</div>`;
            if (stage.question.why_chain && stage.question.why_chain.length > 0) {
                html += `<div class="why-chain" id="why-chain"><h4>🔗 WHY Chain - Dig Deeper</h4>`;
                stage.question.why_chain.forEach(w => {
                    html += `<div class="why-item"><div class="why-q">${w.q}</div><div class="why-a">${w.a}</div></div>`;
                });
                html += `</div>`;
            }
            html += `<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>`;
        }
        html += `</div>`;
        container.innerHTML = html;
        updateProgress();
    }
    function checkAnswer(idx, correct) {
        const options = document.querySelectorAll('.mcq-option');
        if (options[0].classList.contains('disabled')) return;
        options.forEach((opt, i) => {
            opt.classList.add('disabled');
            if (stages[currentStage].question.options[i].correct) opt.classList.add('correct');
            else if (i === idx && !correct) opt.classList.add('incorrect');
        });
        if (correct) {
            document.getElementById('fb-correct').classList.add('show');
            score += stages[currentStage].question.points;
            document.getElementById('score').textContent = score;
        } else {
            document.getElementById('fb-incorrect').classList.add('show');
        }
        const teaching = document.getElementById('teaching');
        if (teaching) teaching.classList.add('show');
        const whyChain = document.getElementById('why-chain');
        if (whyChain) whyChain.classList.add('show');
        document.getElementById('next-btn').classList.add('show');
    }
    function nextStage() {
        if (currentStage < stages.length - 1) { currentStage++; renderStage(); window.scrollTo(0, 0); }
        else {
            document.getElementById('scene-container').innerHTML = `<div class="scene completion"><h2 style="color:var(--rdx-teal-dark,#1f5f8b);margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>${score}</strong> / ${stages.length * 10}</p><p style="margin-bottom:30px;">You've mastered Syncope Evaluation!</p><div style="text-align:left;max-width:500px;margin:0 auto;"><h4 style="color:var(--rdx-teal-dark,#1f5f8b);margin-bottom:12px;">Key Points:</h4><ul style="line-height:2;"><li>ECG is mandatory for ALL syncope</li><li>Cardiac syncope = highest mortality</li><li>Red flags: exertional, supine, no prodrome</li><li>Vasovagal: prodrome + trigger = reassuring</li><li>High-risk ECG: Long QT, Brugada, WPW</li></ul></div></div>`;
        }
    }
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3a90c0'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#b45309'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#b45309'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color: #1f5f8b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
