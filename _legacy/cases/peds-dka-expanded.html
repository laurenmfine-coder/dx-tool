<body>
    <div class="container" id="app"></div>
    <script>
    const state = {
        stage: 0,
        age: 12,
        weight: 40,
        vitals: { hr: 128, rr: 32, bp: '98/60', temp: 98.2, spo2: 99 },
        labs: { glucose: 485, pH: 7.18, bicarb: 8, pCO2: 18, Na: 131, K: 5.8, BUN: 28, Cr: 1.2, ketones: 'large' },
        selectedOrders: new Set(),
        fluidPlan: {},
        insulinPlan: {},
        decisions: [],
        scores: { diagnosis: 0, acidbase: 0, fluids: 0, insulin: 0, monitoring: 0 },
        cerebralEdemaRisk: false,
        hours: 0
    };

    const STAGES = ['arrival', 'history', 'physical', 'labs_order', 'labs_interpret', 'acidbase_analysis',
                    'severity_classification', 'fluid_resuscitation', 'insulin_therapy', 'potassium_management',
                    'monitoring', 'cerebral_edema', 'resolution', 'debrief'];

    function render() {
        const app = document.getElementById('app');
        const progress = ((state.stage + 1) / STAGES.length) * 100;
        let content = `
            <div class="header">
                <div class="case-title">🧪 The Sleepy Child<span class="badge">STEP 1 + STEP 2</span></div>
                <div class="stat"><div class="stat-value">${state.stage + 1}/${STAGES.length}</div><div class="stat-label">Stage</div></div>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
        `;
        switch(STAGES[state.stage]) {
            case 'arrival': content += renderArrival(); break;
            case 'history': content += renderHistory(); break;
            case 'physical': content += renderPhysical(); break;
            case 'labs_order': content += renderLabsOrder(); break;
            case 'labs_interpret': content += renderLabsInterpret(); break;
            case 'acidbase_analysis': content += renderAcidBase(); break;
            case 'severity_classification': content += renderSeverity(); break;
            case 'fluid_resuscitation': content += renderFluids(); break;
            case 'insulin_therapy': content += renderInsulin(); break;
            case 'potassium_management': content += renderPotassium(); break;
            case 'monitoring': content += renderMonitoring(); break;
            case 'cerebral_edema': content += renderCerebralEdema(); break;
            case 'resolution': content += renderResolution(); break;
            case 'debrief': content += renderDebrief(); break;
        }
        app.innerHTML = content;
    }

    function renderArrival() {
        return `
            <div class="vitals">
                <div class="vital"><div class="vital-label">HR</div><div class="vital-value warning">${state.vitals.hr}</div></div>
                <div class="vital"><div class="vital-label">RR</div><div class="vital-value danger">${state.vitals.rr}</div></div>
                <div class="vital"><div class="vital-label">BP</div><div class="vital-value warning">${state.vitals.bp}</div></div>
                <div class="vital"><div class="vital-label">Temp</div><div class="vital-value normal">${state.vitals.temp}°F</div></div>
            </div>
            <div class="scene">
                <div class="scene-header">
                    <div class="scene-phase">Stage 1 of 14</div>
                    <div class="scene-title">Pediatric Emergency Department</div>
                </div>
                <div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#f0f7fc; border:1px solid #7cb8d9; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #2874a6;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> DKA triad: Hyperglycemia (usually >250), Ketosis, Acidosis (pH <7.3)</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What's the role of bicarbonate therapy in severe DKA (pH <6.9)?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#f0f7fc; border:1px solid #3a90c0; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3a90c0;">
                    <p style="margin:0; color:#1a4971; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Continue insulin drip until anion gap closes, not just until glucose normalizes</p>
                </div>
                    <div class="narrative">
                        <p>A <span class="highlight">12-year-old female</span> (40 kg) is brought by her parents for <span class="highlight">progressive lethargy</span> over the past 2 days. She was previously healthy with no known medical conditions.</p>
                    </div>
                    <div class="dialogue">
                        <div class="dialogue-speaker">Mother:</div>
                        <div class="dialogue-text">"She's been so thirsty lately - drinking gallons of water. Going to the bathroom constantly. Lost about 8 pounds in the last few weeks. Today she's just so tired and her breath smells fruity."</div>
                    </div>
                    <div class="mechanism-box">
                        <div class="mechanism-title">🧬 STEP 1 Connection: Pattern Recognition</div>
                        <div class="mechanism-content">
                            <strong>Classic triad appearing here:</strong>
                            <div class="pathway">
                                Polyuria + Polydipsia + Weight Loss = <span class="pathway-arrow">→</span> New-onset Diabetes
                            </div>
                            <p style="margin-top: 10px;">The fruity breath odor (acetone) and lethargy suggest this has progressed to DKA.</p>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="nextStage()">Gather More History →</button>
                </div>
            </div>`;
    }

    function renderHistory() {
        return `
            <div class="scene">
                <div class="scene-header">
                    <div class="scene-phase">Stage 2 of 14</div>
                    <div class="scene-title">History of Present Illness</div>
                </div>
                <div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#f0f7fc; border:1px solid #7cb8d9; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #2874a6;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Fluid first! Start with 1-2L NS in first hour, then reassess</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does SGLT2 inhibitor-associated euglycemic DKA differ in management?</p>
                </div>
                    <div class="narrative"><p><strong>Symptom Timeline:</strong></p>
                        <ul style="margin-left: 20px; margin-top: 8px;">
                            <li><span class="highlight">3 weeks:</span> Increased thirst, frequent urination</li>
                            <li><span class="highlight">2 weeks:</span> Weight loss (~8 lbs), fatigue</li>
                            <li><span class="highlight">2 days:</span> Nausea, vomiting x4, decreased oral intake</li>
                            <li><span class="highlight">Today:</span> Increasingly lethargic, abdominal pain, rapid breathing</li>
                        </ul>
                    </div>
                    <div class="narrative" style="margin-top: 16px;"><p><strong>Review of Systems:</strong></p>
                        <ul style="margin-left: 20px; margin-top: 8px;">
                            <li>No recent illness, fever, or sick contacts</li>
                            <li>No prior episodes, no family history of diabetes</li>
                            <li>Normal development, no medications</li>
                        </ul>
                    </div>
                    <div class="mechanism-box">
                        <div class="mechanism-title">🧬 STEP 1: Pathophysiology of Symptoms</div>
                        <div class="mechanism-content">
                            <div class="pathway">
                                <strong>Insulin deficiency</strong> <span class="pathway-arrow">→</span> Hyperglycemia <span class="pathway-arrow">→</span> Exceeds renal threshold (180 mg/dL)<br>
                                <span class="pathway-arrow">→</span> Glucosuria <span class="pathway-arrow">→</span> Osmotic diuresis <span class="pathway-arrow">→</span> <strong>Polyuria & Dehydration</strong><br><br>
                                <strong>Cell starvation</strong> (glucose can't enter) <span class="pathway-arrow">→</span> Lipolysis <span class="pathway-arrow">→</span> Free fatty acids<br>

        const totalScore = state.scores.diagnosis + state.scores.acidbase + state.scores.fluids + state.scores.insulin + state.scores.monitoring;

                <div class="debrief-item"><div class="debrief-item-detail">This was a <strong>12-year-old with new-onset Type 1 DM presenting with severe DKA</strong>. Key management principles included careful fluid resuscitation to prevent cerebral edema, appropriate insulin dosing, potassium monitoring, and recognition of cerebral edema.</div></div>
            </div>
            <div class="why-chain">
                <div class="why-chain-title">🔗 Integrated Basic Science WHY Chain</div>
                <div class="why-item"><div class="why-q">🧬 BIOCHEMISTRY: Why ketones in DKA?</div><div class="why-a">Without insulin, glucose can't enter cells → cells "starve" → lipolysis releases FFAs → liver converts to ketone bodies (β-hydroxybutyrate, acetoacetate) for alternative fuel. These are acids, causing the metabolic acidosis.</div></div>
                <div class="why-item"><div class="why-q">🧬 PHYSIOLOGY: Why Kussmaul respirations?</div><div class="why-a">Metabolic acidosis (↓pH) stimulates central and peripheral chemoreceptors → respiratory center increases ventilation (rate AND depth) → ↓pCO2 to compensate for ↓HCO3 (Henderson-Hasselbalch equation).</div></div>
                <div class="why-item"><div class="why-q">🧬 CELL BIOLOGY: Why the potassium paradox?</div><div class="why-a">Insulin normally activates Na/K-ATPase, driving K+ into cells. Without insulin, K+ leaks out. Acidosis causes H+/K+ exchange. Osmotic diuresis causes renal K+ wasting. Result: high serum K+ but massive total body depletion.</div></div>
                <div class="why-item"><div class="why-q">🧬 PATHOPHYSIOLOGY: Why cerebral edema?</div><div class="why-a">Brain cells adapt to chronic hyperosmolarity by producing idiogenic osmoles. Rapid correction creates relative serum hypoosmolarity → osmotic gradient favors water movement INTO brain cells → swelling. Children's brains have less room for expansion than adults.</div></div>
            </div>

                    <p>• Glaser N, et al. NEJM 2001 - Cerebral Edema in Pediatric DKA</p>
                </div>

<script>
// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2874a6'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:var(--rdx-text,#1e293b);">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:var(--rdx-text-secondary,#475569);margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:var(--rdx-text-secondary,#475569);margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3a90c0,#3a90c0);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
    
    // Auto-inject hint examples into existing content
    window.rdxInit = function() {
        // Could add dynamic hint injection here based on difficulty
};
    
    // Initialize on load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.rdxInit);
    } else {
        window.rdxInit();
    }
})();
</script>
