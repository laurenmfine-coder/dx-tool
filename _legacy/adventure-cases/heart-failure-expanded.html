<script>
let currentStage = 0, score = 0, maxScore = 0, difficulty = 'standard', answeredQuestions = new Set(), decisionPath = [];
const stages = [
    { title: "The Dyspneic Patient", content: `<div class="narrative"><p>68-year-old man with prior MI presents with progressive dyspnea over 2 weeks. Can't lie flat.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 102, BP 148/92, RR 24, SpO2 91%<br><strong>Last EF:</strong> 35%</p></div><div class="socratic-prompt"><h4>Predict the Findings</h4><p>Before examining this patient, what physical findings would you PREDICT if this is acute decompensated heart failure?</p></div>`,
        hint_beginner: "Think 'backward failure' - where does fluid back up?", hint_advanced: "How would exam differ in HFrEF vs HFpEF?",
        question: { prompt: "What exam findings indicate volume overload in heart failure?",
            options: [{ text: "JVD, bibasilar crackles, S3 gallop, peripheral edema - signs of elevated filling pressures", correct: true },
                { text: "Clear lungs, flat neck veins - compensated state", correct: false },
                { text: "Fever, focal consolidation - pneumonia", correct: false },
                { text: "Wheezing, prolonged expiration - obstructive disease", correct: false }],
            explanation: { correct: "JVD (elevated right-sided pressure), crackles (pulmonary edema), S3 (dilated ventricle), and edema (systemic congestion) indicate volume overload - the 'wet' phenotype.", incorrect: "Volume overload manifests as JVD, crackles, S3, and edema. S3 gallop specifically indicates a dilated failing ventricle." },
            teaching: `<h4>Wet vs Dry, Warm vs Cold</h4><p><strong>Wet:</strong> JVD, orthopnea, crackles, edema → needs diuresis</p><p><strong>Cold:</strong> Cool extremities, narrow pulse pressure → may need inotropes</p><p>Most patients are "warm and wet" - good perfusion but volume overloaded.</p>`,
            why_chain: [{q:"Why does S3 indicate heart failure?",a:"S3 occurs during rapid passive filling in early diastole. In a dilated, compliant ventricle, blood rushes in and decelerates against the large volume - creating the gallop."}], points: 10 }
    },
    { title: "HFrEF Classification", content: `<div class="narrative"><p>Exam confirms: JVD to jaw, bibasilar crackles, S3, 2+ edema. Labs show BNP 1840, Cr 1.6 (baseline 1.1).</p><p style="margin-top:12px;">With EF 35%, this is HFrEF.</p></div><div class="socratic-prompt"><h4>Why EF Matters</h4><p>What EF cutoff defines HFrEF, and why is this classification critical for treatment?</p></div>`,
        hint_beginner: "HFrEF = reduced EF. What's the cutoff?", hint_advanced: "What's the evidence for GDMT in HFrEF vs HFpEF?",
        question: { prompt: "What defines HFrEF and why does it matter?",
            options: [{ text: "EF ≤40% - the Four Pillars of GDMT only have mortality benefit in HFrEF", correct: true },
                { text: "EF ≤50% - any reduction qualifies", correct: false },
                { text: "EF ≤30% - only severely reduced", correct: false },
                { text: "EF doesn't matter - treatment is the same", correct: false }],
            explanation: { correct: "HFrEF = EF ≤40%. The Four Pillars (ARNI/ACEi, BB, MRA, SGLT2i) reduce mortality ONLY in HFrEF. HFpEF (≥50%) has different, less proven therapy.", incorrect: "The cutoff is ≤40%. All mortality-reducing drugs have been studied in this population." },
            teaching: `<h4>EF Classification</h4><p><strong>HFrEF:</strong> ≤40% - strong GDMT evidence</p><p><strong>HFmrEF:</strong> 41-49% - emerging evidence</p><p><strong>HFpEF:</strong> ≥50% - limited (SGLT2i now proven)</p>`,
            why_chain: [{q:"Why doesn't GDMT work in HFpEF?",a:"HFpEF is diastolic dysfunction - heart contracts but doesn't relax. Different pathophysiology, less neurohormonal activation to target."}], points: 10 }
    },
    { title: "Find the Precipitant", content: `<div class="narrative"><p>Patient admits he stopped his 'water pills' 10 days ago and has been eating more salt.</p></div><div class="socratic-prompt"><h4>Why Did This Happen?</h4><p>What is the most common precipitant of acute HF decompensation?</p></div>`,
        hint_beginner: "Think FAILURES mnemonic", hint_advanced: "How would workup differ if ischemia vs dietary trigger?",
        question: { prompt: "What is the most common trigger for HF decompensation?",
            options: [{ text: "Medication/dietary non-adherence - >40% of admissions", correct: true },
                { text: "Acute coronary syndrome", correct: false },
                { text: "New arrhythmia", correct: false },
                { text: "Infection", correct: false }],
            explanation: { correct: "Non-adherence (diuretics, diet, GDMT) causes >40% of admissions. This patient stopped diuretics AND increased salt - classic.", incorrect: "While ACS, arrhythmia, and infection are important, non-adherence is most common and most preventable." },
            teaching: `<h4>FAILURES Mnemonic</h4><p><strong>F</strong>orgot meds, <strong>A</strong>rrhythmia, <strong>I</strong>schemia, <strong>L</strong>ifestyle, <strong>U</strong>pregulation (anemia/thyroid), <strong>R</strong>enal, <strong>E</strong>mbolism (PE), <strong>S</strong>tenosis</p>`,
            why_chain: [{q:"Why identify the precipitant?",a:"Guides workup, affects acute management, prevents recurrence through targeted education. 30-day readmission is 25% - addressing triggers is key."}], points: 10 }
    },
    { title: "Acute Management", content: `<div class="narrative"><p>Assessment: <strong>'Warm and Wet'</strong> - good perfusion, but severely congested.</p></div><div class="socratic-prompt"><h4>Match Treatment to Phenotype</h4><p>What is first-line treatment for warm and wet acute HF?</p></div>`,
        hint_beginner: "Wet = volume overload. How remove volume?", hint_advanced: "When use vasodilators vs inotropes?",
        question: { prompt: "First-line treatment for 'warm and wet' HF?",
            options: [{ text: "IV loop diuretics ± vasodilators - goal is decongestion", correct: true },
                { text: "Inotropes - increase cardiac output", correct: false },
                { text: "Fluid resuscitation", correct: false },
                { text: "Start beta-blocker", correct: false }],
            explanation: { correct: "Warm and wet = diuretics for decongestion ± vasodilators if hypertensive. Inotropes only for 'cold' patients. Don't start beta-blockers during acute decompensation.", incorrect: "Diuretics first for warm and wet. Inotropes are for cold (hypoperfused) patients." },
            teaching: `<h4>Treatment by Profile</h4><p><strong>Warm/Wet:</strong> Diuretics ± vasodilators</p><p><strong>Cold/Wet:</strong> Inotropes + diuretics</p><p><strong>Cold/Dry:</strong> Careful fluid</p>`,
            why_chain: [{q:"Why avoid starting BB acutely?",a:"Patients depend on sympathetic tone for cardiac output. New BB can precipitate shock. Continue if already on it."}], points: 10 }
    },
    { title: "Diuretic Strategy", content: `<div class="narrative"><p>You order IV furosemide. Home dose was 40mg PO daily.</p></div><div class="socratic-prompt"><h4>Get the Dose Right</h4><p>How do you dose IV diuretics in acute HF relative to home oral dose?</p></div>`,
        hint_beginner: "IV is more bioavailable than PO", hint_advanced: "What's the evidence for bolus vs continuous infusion?",
        question: { prompt: "How should IV diuretic dosing relate to home oral dose?",
            options: [{ text: "Start IV dose at least equal to total daily oral dose (often 1-2.5x); can give bolus or continuous", correct: true },
                { text: "Use half the oral dose since IV is stronger", correct: false },
                { text: "Always start with a fixed 40mg dose", correct: false },
                { text: "Only use continuous infusion", correct: false }],
            explanation: { correct: "Start IV furosemide at ≥ daily oral dose. DOSE trial: no difference between bolus Q12h vs continuous, or 1x vs 2.5x dose. Start higher (2.5x) if severe congestion or diuretic resistance.", incorrect: "Don't underdose - diuretic resistance is common in HF. IV bioavailability is ~100% vs 50% PO, but still start at least equal to oral dose." },
            teaching: `<h4>Diuretic Dosing</h4><p>Home 40mg PO → Start ≥40mg IV Q12h or 80-100mg IV bolus</p><p><strong>Monitor:</strong> Daily weights, I/O, renal function, electrolytes</p><p><strong>Target:</strong> 1-2 kg weight loss/day until euvolemic</p>`,
            why_chain: [{q:"What if diuretics don't work?",a:"Diuretic resistance: try higher doses, add thiazide (metolazone), consider ultrafiltration. Rule out NSAIDs which blunt response."}], points: 10 }
    },
    { title: "The Four Pillars", content: `<div class="narrative"><p>Patient is decongesting well. Time to optimize GDMT.</p></div><div class="socratic-prompt"><h4>Know Your GDMT</h4><p>What are the Four Pillars of HFrEF therapy, and why must patients be on ALL of them?</p></div>`,
        hint_beginner: "Four drug classes reduce mortality in HFrEF", hint_advanced: "What's the NNT for each class?",
        question: { prompt: "What are the Four Pillars of HFrEF GDMT?",
            options: [{ text: "ARNI (or ACEi/ARB) + Beta-blocker + MRA + SGLT2i - each reduces mortality ~20-30%", correct: true },
                { text: "ACEi + BB + loop diuretic + digoxin", correct: false },
                { text: "ARB + calcium blocker + statin + aspirin", correct: false },
                { text: "Hydralazine + nitrate + BB + diuretic", correct: false }],
            explanation: { correct: "All four classes have mortality benefit: ARNI/ACEi/ARB + BB (carvedilol, metoprolol succinate, bisoprolol only) + MRA (spironolactone/eplerenone) + SGLT2i (dapagliflozin/empagliflozin). Start ALL within 1 month if possible.", incorrect: "The four pillars are ARNI/ACEi, BB, MRA, and SGLT2i. Loop diuretics improve symptoms but don't reduce mortality." },
            teaching: `<h4>Four Pillars Summary</h4><p>1. <strong>ARNI</strong> (preferred) or ACEi/ARB</p><p>2. <strong>Beta-blocker</strong> (only carvedilol, metoprolol succinate, bisoprolol)</p><p>3. <strong>MRA</strong> if EF ≤35%, NYHA II-IV</p><p>4. <strong>SGLT2i</strong> - works even without diabetes!</p>`,
            why_chain: [{q:"Why only 3 beta-blockers?",a:"Only carvedilol, metoprolol succinate, and bisoprolol have mortality data. Metoprolol tartrate (short-acting) does NOT count."}], points: 15 }

function shuffleArray(arr) { const s=[...arr]; for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];} return s; }
function setDifficulty(l,b) { difficulty=l; document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderStage(currentStage); }
function renderStage(i) {
    const s=stages[i], opts=shuffleArray(s.question.options.map((o,idx)=>({...o,idx}))), ltrs='ABCD';
    let hints='';
    if(difficulty==='beginner'&&s.hint_beginner) hints=`<div class="hint-beginner" style="display:block;">💡 ${s.hint_beginner}</div>`;
    else if(difficulty==='advanced'&&s.hint_advanced) hints=`<div class="hint-advanced" style="display:block;">🎯 ${s.hint_advanced}</div>`;
    const why=s.question.why_chain?`<div class="why-chain" id="why"><h4>🔗 WHY Chain</h4>${s.question.why_chain.map(w=>`<div class="why-item"><div class="why-q">❓ ${w.q}</div><div class="why-a">${w.a}</div></div>`).join('')}</div>`:'';
    document.getElementById('progress').style.width=((i)/stages.length*100)+'%';
    document.getElementById('scene-container').innerHTML=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${i+1} of ${stages.length}</div><div class="scene-title">${s.title}</div></div>${s.content}${hints}<div class="question-box"><div class="question-prompt">${s.question.prompt}</div><div class="mcq-options">${opts.map((o,j)=>`<div class="mcq-option" data-correct="${o.correct}" onclick="selectOption(this,${i})"><span class="option-letter">${ltrs[j]}</span><span class="option-text">${o.text}</span></div>`).join('')}</div><div class="feedback correct-feedback" id="fb-c"><div class="feedback-title">✓ Excellent!</div><div class="feedback-explanation">${s.question.explanation.correct}</div></div><div class="feedback incorrect-feedback" id="fb-i"><div class="feedback-title">✗ Not Quite</div><div class="feedback-explanation">${s.question.explanation.incorrect}</div></div><div class="teaching-point" id="teach">${s.question.teaching}</div>${why}<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div></div>`;
}
function selectOption(el,i) {
    if(answeredQuestions.has(i)) return;
    const c=el.dataset.correct==='true', s=stages[i];
    answeredQuestions.add(i); decisionPath.push({stage:s.title,correct:c,points:c?s.question.points:0});
    if(c) score+=s.question.points; maxScore+=s.question.points;
    document.getElementById('score').textContent=score; document.getElementById('maxScore').textContent=maxScore;
    document.querySelectorAll('.mcq-option').forEach(o=>{o.classList.add('disabled');if(o.dataset.correct==='true')o.classList.add('correct');else if(o===el&&!c)o.classList.add('incorrect');});
    document.getElementById(c?'fb-c':'fb-i').classList.add('show');
    document.getElementById('teach').classList.add('show');
    const w=document.getElementById('why'); if(w)w.classList.add('show');
    document.getElementById('next-btn').classList.add('show');
}
function nextStage() { if(++currentStage<stages.length){renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'});}else showCompletion(); }
function showCompletion() {
    const p=Math.round(score/maxScore*100);
    let g,m,clr;
    if(p>=90){g='Outstanding!';clr='#22c55e';m='Excellent understanding of HF management!';}
    else if(p>=80){g='Great Work!';clr='#3b82f6';m='Strong grasp of HF. Review GDMT details.';}
    else if(p>=70){g='Good Progress';clr='#f59e0b';m='Solid foundation. Focus on Four Pillars.';}
    else{g='Keep Learning';clr='#ef4444';m='Review HF classification and GDMT.';}
    document.getElementById('scene-container').innerHTML=`<div class="scene completion"><div class="completion-grade" style="color:${clr}">${g}</div><div class="completion-percent" style="color:${clr}">${p}%</div><div style="font-size:1.3rem;margin-bottom:8px">${score}/${maxScore} points</div><div class="completion-message">${m}</div><div class="completion-breakdown"><h4>Your Clinical Journey</h4>${decisionPath.map((d,j)=>`<div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;"><span><span style="color:${d.correct?'#22c55e':'#ef4444'}">${d.correct?'✓':'✗'}</span> Stage ${j+1}: ${d.stage}</span><span style="color:#94a3b8">${d.points}/${stages[j].question.points}pts</span></div>`).join('')}</div><div class="crossplatform"><h4>Continue Learning</h4><div class="crossplatform-links"><a href="#" class="crossplatform-link">🧬 MechanismDx: Cardiac Remodeling</a><a href="#" class="crossplatform-link">📚 Related: ACS Case</a><a href="javascript:location.reload()" class="crossplatform-link">🔄 Restart</a></div></div></div>`;
    document.getElementById('progress').style.width='100%';
}
document.addEventListener('DOMContentLoaded',()=>renderStage(0));


// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
