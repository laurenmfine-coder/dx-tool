<script>
let currentStage=0,score=0,maxScore=0,difficulty='standard',answeredQuestions=new Set(),decisionPath=[];
const stages=[
{title:"The Tearing Pain",content:`<div class="narrative"><p>58-year-old man with sudden-onset severe chest pain radiating to back, described as "tearing" or "ripping."</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 102, BP 182/105 (right arm), RR 22, SpO2 96%<br><strong>Exam:</strong> Diaphoretic, anxious, new diastolic murmur at left sternal border<br><strong>PMH:</strong> HTN (poorly controlled), bicuspid aortic valve<br><strong>CXR:</strong> Widened mediastinum</p></div><div class="socratic-prompt"><h4>Recognize the Emergency</h4><p>What clinical features suggest aortic dissection, and what is the most critical next step?</p></div>`,
hint_beginner:"Sudden tearing chest pain + hypertension + widened mediastinum",hint_advanced:"What percentage have classic presentation?",
question:{prompt:"What features suggest aortic dissection?",
options:[{text:"Sudden severe tearing/ripping pain radiating to back + hypertension + widened mediastinum + new aortic regurgitation murmur + risk factors (HTN, bicuspid valve)",correct:true},
{text:"Only EKG changes can diagnose dissection",correct:false},
{text:"Troponin is diagnostic",correct:false},
{text:"Must have hypotension",correct:false}],
explanation:{correct:"Classic features: sudden severe tearing pain (maximal at onset), radiation to back, hypertension, widened mediastinum on CXR, new AR murmur. Risk factors: HTN (#1), connective tissue disorders, bicuspid valve, cocaine. Hypotension is late/ominous sign.",incorrect:"Aortic dissection is a clinical diagnosis confirmed by imaging. Tearing pain, maximal at onset, plus risk factors should trigger immediate workup."},
teaching:`<h4>Aortic Dissection Clues</h4><p><strong>Pain:</strong> Sudden, severe, tearing/ripping, maximal at onset</p><p><strong>Location:</strong> Chest (ascending), back (descending)</p><p><strong>Signs:</strong> HTN, pulse/BP differential, new AR murmur</p><p><strong>CXR:</strong> Widened mediastinum (seen in ~60%)</p><p><strong>Risk factors:</strong> HTN, Marfan, bicuspid valve, cocaine</p>`,
why_chain:[{q:"Why is pain 'maximal at onset'?",a:"The tear happens suddenly - immediate max pain. Unlike MI where pain builds. This history feature helps distinguish dissection from ACS."}],points:10}},

{title:"Check for Asymmetry",content:`<div class="narrative"><p>You check BP in both arms: Right 182/105, Left 148/88 (34 mmHg difference).</p></div><div class="socratic-prompt"><h4>Physical Exam Clues</h4><p>What does BP differential indicate, and what other exam findings suggest dissection?</p></div>`,
hint_beginner:"BP difference >20 mmHg suggests branch vessel involvement",hint_advanced:"What causes pulse deficits?",
question:{prompt:"What does a 34 mmHg BP differential indicate?",
options:[{text:"Dissection involving branch vessels - false lumen compresses or occludes subclavian artery; also check for carotid bruit, focal neuro deficits, limb ischemia",correct:true},
{text:"Normal variation between arms",correct:false},
{text:"Indicates MI not dissection",correct:false},
{text:"Only seen in Type B",correct:false}],
explanation:{correct:"BP differential >20 mmHg suggests dissection involving arch branches. False lumen can compress true lumen of subclavian, carotid, or other branches. Check: bilateral BPs, pulses in all extremities, neurologic exam, abdominal exam (mesenteric ischemia).",incorrect:">20 mmHg difference is significant and suggests branch vessel involvement. Normal difference is <10 mmHg."},
teaching:`<h4>Physical Exam in Dissection</h4><p><strong>BP differential:</strong> >20 mmHg significant</p><p><strong>Pulse deficits:</strong> Absent/diminished pulses</p><p><strong>New AR murmur:</strong> Ascending dissection</p><p><strong>Neuro deficits:</strong> Carotid involvement</p><p><strong>Abdominal pain:</strong> Mesenteric ischemia</p>`,
why_chain:[{q:"How does dissection cause pulse deficits?",a:"The false lumen (between intima and media) expands with pressure and can compress the true lumen or extend into branch vessels, reducing flow to arms, legs, brain, or organs."}],points:10}},

{title:"Imaging Choice",content:`<div class="narrative"><p>High suspicion for dissection. Need definitive imaging.</p></div><div class="socratic-prompt"><h4>Confirm the Diagnosis</h4><p>What is the best imaging modality for suspected aortic dissection?</p></div>`,
hint_beginner:"CT angiography is usually first-line",hint_advanced:"When use TEE instead of CTA?",
question:{prompt:"What imaging should you order?",
options:[{text:"CT angiography (CTA) of chest/abdomen/pelvis - first-line, fast, widely available, shows extent and branch involvement; TEE if unstable or renal failure",correct:true},
{text:"Plain chest X-ray is sufficient",correct:false},
{text:"Echocardiogram only",correct:false},
{text:"MRI is first-line",correct:false}],
explanation:{correct:"CTA is first-line: fast, widely available, excellent sensitivity/specificity, shows full extent and complications. TEE alternative if: unstable (can do bedside), contrast allergy, renal failure. MRI is accurate but too slow for emergencies.",incorrect:"CTA is standard for stable patients. Shows intimal flap, extent, branch involvement. CXR has low sensitivity. MRI too slow for acute setting."},
teaching:`<h4>Imaging for Aortic Dissection</h4><p><strong>CTA:</strong> First-line, fast, shows extent</p><p><strong>TEE:</strong> Unstable patients, bedside, OR</p><p><strong>MRI:</strong> Most accurate but slow</p><p><strong>TTE:</strong> Can see proximal ascending, pericardial effusion</p>`,
why_chain:[{q:"What about D-dimer?",a:"Elevated D-dimer has high sensitivity (~97%) but poor specificity. Useful to RULE OUT if low pretest probability (ADD-RS score). Does NOT rule in - still need imaging if positive or high suspicion."}],points:10}},

{title:"Stanford Classification",content:`<div class="narrative"><p>CTA: Dissection from ascending aorta extending past left subclavian into descending aorta. Intimal flap visible.</p></div><div class="socratic-prompt"><h4>Classify the Dissection</h4><p>What is the Stanford classification, and why does it matter?</p></div>`,
hint_beginner:"Type A = ascending; Type B = descending only",hint_advanced:"What determines surgical vs medical management?",
question:{prompt:"This dissection involving ascending aorta is what Stanford type?",
options:[{text:"Type A - any involvement of ascending aorta; SURGICAL EMERGENCY regardless of extent; Type B (descending only) often managed medically",correct:true},
{text:"Type B because it extends to descending",correct:false},
{text:"Classification doesn't affect management",correct:false},
{text:"Type A only if isolated to ascending",correct:false}],
explanation:{correct:"Stanford Type A = ANY ascending involvement (regardless of extension). Type B = descending ONLY (distal to left subclavian). Type A is SURGICAL EMERGENCY - high mortality without surgery. Type B often managed medically unless complicated.",incorrect:"ANY ascending involvement = Type A = surgical emergency. The distinction determines treatment: surgery vs medical management."},
teaching:`<h4>Stanford Classification</h4><p><strong>Type A:</strong> Involves ascending aorta (any extent) → SURGERY</p><p><strong>Type B:</strong> Descending only (past L subclavian) → Usually medical</p><p><strong>Why it matters:</strong> Type A mortality 1-2% per hour without surgery</p>`,
why_chain:[{q:"Why is Type A surgical?",a:"Ascending dissection can rupture into pericardium (tamponade), disrupt aortic valve (acute AR), occlude coronaries (MI). Without surgery, mortality is 50% at 48 hours."}],points:15}},

{title:"Immediate Management",content:`<div class="narrative"><p>Type A dissection confirmed. Surgery consulted. What medical management while preparing for OR?</p></div><div class="socratic-prompt"><h4>Control the Forces</h4><p>What are the immediate management goals for aortic dissection?</p></div>`,
hint_beginner:"Reduce heart rate and blood pressure to decrease aortic wall stress",hint_advanced:"Why HR control before BP control?",
question:{prompt:"What are the BP and HR targets?",
options:[{text:"Target SBP 100-120 mmHg AND HR <60 bpm; use IV beta-blocker FIRST (reduces dP/dt), then add vasodilator if needed; beta-blocker before vasodilator to prevent reflex tachycardia",correct:true},
{text:"Raise BP to maintain perfusion",correct:false},
{text:"HR control not important",correct:false},
{text:"Use vasodilators first",correct:false}],
explanation:{correct:"Goals: SBP 100-120, HR <60. Start with IV beta-blocker (esmolol, labetalol) to reduce both HR and dP/dt (rate of pressure rise). Add vasodilator (nitroprusside, nicardipine) only AFTER HR controlled - otherwise reflex tachycardia worsens shear stress.",incorrect:"MUST control HR first, then BP. Vasodilators alone cause reflex tachycardia which increases aortic wall stress and propagates dissection."},
teaching:`<h4>Medical Management</h4><p><strong>Targets:</strong> SBP 100-120, HR <60</p><p><strong>First:</strong> IV beta-blocker (esmolol, labetalol)</p><p><strong>Then if needed:</strong> Vasodilator (nitroprusside, nicardipine)</p><p><strong>Key:</strong> Beta-blocker BEFORE vasodilator</p><p><strong>Pain:</strong> IV opioids (also reduce sympathetic drive)</p>`,
why_chain:[{q:"Why does HR matter so much?",a:"dP/dt (rate of pressure rise) determines shear stress on aortic wall. HR directly affects dP/dt. Fast HR = more shear = more dissection propagation. Beta-blockers reduce both HR and contractility."}],points:15}},

{title:"Complications to Watch",content:`<div class="narrative"><p>While preparing for surgery, what complications must you monitor for?</p></div><div class="socratic-prompt"><h4>Anticipate Problems</h4><p>What are the life-threatening complications of Type A dissection?</p></div>`,
hint_beginner:"Rupture, tamponade, coronary involvement, stroke",hint_advanced:"What's the most common cause of death?",
question:{prompt:"What complications require emergent intervention?",
options:[{text:"Pericardial tamponade (rupture into pericardium), acute severe aortic regurgitation, coronary occlusion (RCA most common), stroke from carotid involvement, mesenteric/limb ischemia",correct:true},
{text:"Only rupture is concerning",correct:false},
{text:"Complications are rare",correct:false},
{text:"Wait for surgery to address complications",correct:false}],
explanation:{correct:"Type A complications: tamponade (rupture into pericardium - may need emergent pericardiocentesis as bridge), acute AR (can cause flash pulmonary edema), coronary involvement (inferior MI if RCA), stroke, malperfusion syndromes. All require immediate recognition.",incorrect:"Multiple life-threatening complications can occur. Tamponade is most common cause of death. Must monitor closely and intervene if needed."},
teaching:`<h4>Type A Complications</h4><p><strong>Tamponade:</strong> Rupture into pericardium - hypotension, JVD</p><p><strong>Acute AR:</strong> Flash pulmonary edema</p><p><strong>Coronary occlusion:</strong> Usually RCA → inferior MI</p><p><strong>Stroke:</strong> Carotid involvement</p><p><strong>Malperfusion:</strong> Limb, mesenteric, renal ischemia</p>`,
why_chain:[{q:"Why is RCA more commonly affected?",a:"RCA ostium is on the right anterior aortic sinus, which is often the site where the intimal tear originates or propagates. LCA involvement is less common but more catastrophic."}],points:10}},

{title:"Type B Management",content:`<div class="narrative"><p>Different patient: Type B dissection (descending only), uncomplicated, with good BP control.</p></div><div class="socratic-prompt"><h4>Different Approach</h4><p>How does Type B management differ from Type A?</p></div>`,
hint_beginner:"Type B often managed medically unless complicated",hint_advanced:"What defines complicated Type B?",
question:{prompt:"How is uncomplicated Type B dissection managed?",
options:[{text:"Medical management: aggressive BP/HR control, pain management, close monitoring; surgery/TEVAR only if complicated (rupture, malperfusion, refractory pain, rapid expansion)",correct:true},
{text:"All dissections need surgery",correct:false},
{text:"No treatment needed for Type B",correct:false},
{text:"Type B is more dangerous than Type A",correct:false}],
explanation:{correct:"Uncomplicated Type B: medical management with BP/HR control, serial imaging. Complicated Type B (rupture, malperfusion, refractory pain/HTN, rapid expansion) needs intervention - usually TEVAR (thoracic endovascular repair) now preferred over open surgery.",incorrect:"Type B often managed medically. Surgery/TEVAR reserved for complications. Uncomplicated Type B has good outcomes with medical therapy."},

function shuffleArray(a){const s=[...a];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s;}
function setDifficulty(l,b){difficulty=l;document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderStage(currentStage);}
function renderStage(i){
const s=stages[i],opts=shuffleArray(s.question.options.map((o,idx)=>({...o,idx}))),ltrs='ABCD';
let hints='';
if(difficulty==='beginner'&&s.hint_beginner)hints=`<div class="hint-beginner" style="display:block;">Hint: ${s.hint_beginner}</div>`;
else if(difficulty==='advanced'&&s.hint_advanced)hints=`<div class="hint-advanced" style="display:block;">Challenge: ${s.hint_advanced}</div>`;
const why=s.question.why_chain?`<div class="why-chain" id="why"><h4>WHY Chain</h4>${s.question.why_chain.map(w=>`<div class="why-item"><div class="why-q">Q: ${w.q}</div><div class="why-a">${w.a}</div></div>`).join('')}</div>`:'';
document.getElementById('progress').style.width=((i)/stages.length*100)+'%';
document.getElementById('scene-container').innerHTML=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${i+1} of ${stages.length}</div><div class="scene-title">${s.title}</div></div>${s.content}${hints}<div class="question-box"><div class="question-prompt">${s.question.prompt}</div><div class="mcq-options">${opts.map((o,j)=>`<div class="mcq-option" data-correct="${o.correct}" onclick="selectOption(this,${i})"><span class="option-letter">${ltrs[j]}</span><span class="option-text">${o.text}</span></div>`).join('')}</div><div class="feedback correct-feedback" id="fb-c"><div class="feedback-title">Correct!</div><div>${s.question.explanation.correct}</div></div><div class="feedback incorrect-feedback" id="fb-i"><div class="feedback-title">Not Quite</div><div>${s.question.explanation.incorrect}</div></div><div class="teaching-point" id="teach">${s.question.teaching}</div>${why}<button class="btn" id="next-btn" onclick="nextStage()">Continue</button></div></div>`;
}
function selectOption(el,i){
if(answeredQuestions.has(i))return;
const c=el.dataset.correct==='true',s=stages[i];
answeredQuestions.add(i);decisionPath.push({stage:s.title,correct:c,points:c?s.question.points:0});
if(c)score+=s.question.points;maxScore+=s.question.points;
document.getElementById('score').textContent=score;document.getElementById('maxScore').textContent=maxScore;
document.querySelectorAll('.mcq-option').forEach(o=>{o.classList.add('disabled');if(o.dataset.correct==='true')o.classList.add('correct');else if(o===el&&!c)o.classList.add('incorrect');});
document.getElementById(c?'fb-c':'fb-i').classList.add('show');
document.getElementById('teach').classList.add('show');
const w=document.getElementById('why');if(w)w.classList.add('show');
document.getElementById('next-btn').classList.add('show');
}
function nextStage(){if(++currentStage<stages.length){renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'});}else showCompletion();}
function showCompletion(){
const p=Math.round(score/maxScore*100);
let g,m,clr;
if(p>=90){g='Outstanding!';clr='#22c55e';m='Excellent dissection management!';}
else if(p>=80){g='Great Work!';clr='#3b82f6';m='Strong grasp. Review Stanford classification.';}
else if(p>=70){g='Good Progress';clr='#f59e0b';m='Focus on BP/HR control sequence.';}
else{g='Keep Learning';clr='#ef4444';m='Review Type A vs B management.';}
document.getElementById('scene-container').innerHTML=`<div class="scene completion"><div class="completion-grade" style="color:${clr}">${g}</div><div class="completion-percent" style="color:${clr}">${p}%</div><div style="font-size:1.3rem;margin-bottom:8px">${score}/${maxScore} points</div><div style="margin:16px 0;color:#e2e8f0">${m}</div><div class="completion-breakdown"><h4 style="margin-bottom:16px">Your Journey</h4>${decisionPath.map((d,j)=>`<div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;"><span style="color:${d.correct?'#4ade80':'#f87171'}">${d.correct?'Y':'N'} ${d.stage}</span><span style="color:#94a3b8">${d.points}/${stages[j].question.points}</span></div>`).join('')}</div></div>`;
document.getElementById('progress').style.width='100%';
}
document.addEventListener('DOMContentLoaded',()=>renderStage(0));


// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
