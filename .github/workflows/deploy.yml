# Deploy is now handled automatically by Cloudflare Pages
# Every push to main auto-deploys via Cloudflare Pages integration
# This workflow is kept for reference but does nothing

name: Deploy (Cloudflare Pages — auto)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Note: deploys now happen automatically via Cloudflare Pages on every push'
        required: false

jobs:
  note:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy info
        run: |
          echo "✅ Cloudflare Pages auto-deploys on every push to main"
          echo "   Check: https://dash.cloudflare.com → Workers & Pages → reasondx"
          echo "   No manual action needed."
