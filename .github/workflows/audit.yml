name: DxSuite Platform Audit

# When this workflow runs
on:
  # Scheduled runs
  schedule:
    - cron: '0 6 * * 1'      # Weekly: Mondays at 6 AM UTC (1 AM EST)
    - cron: '0 6 1 * *'      # Monthly: 1st of month at 6 AM UTC
  
  # Manual trigger (click "Run workflow" button in GitHub)
  workflow_dispatch:
    inputs:
      full_audit:
        description: 'Run full audit including link checks'
        required: false
        default: 'false'
        type: boolean
  
  # Run on pushes to main branch when content changes
  push:
    branches: [main]
    paths:
      - 'ReasonDx/data/**'
      - 'CoachDx/**'
      - 'mechanism/**'
      - 'admin/**'

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Needed to commit audit reports
      issues: write        # Needed to create issues on problems
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 📊 Run Audit Summary
        id: audit
        run: |
          node admin/generate-audit-summary.js
          echo "Generated audit summary"
      
      - name: 🔗 Run Link Check (Weekly/Manual Only)
        if: github.event.schedule == '0 6 * * 1' || github.event.inputs.full_audit == 'true'
        run: |
          node admin/audit-engine.js --links || true
        continue-on-error: true
      
      - name: 📅 Check for date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
      
      - name: 💾 Commit Audit Reports
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add admin/reports/ || true
          git diff --staged --quiet || git commit -m "📊 Automated audit report - ${{ steps.date.outputs.date }}"
          git push || true
      
      - name: 📤 Upload Audit Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ steps.date.outputs.date }}
          path: admin/reports/
          retention-days: 90
      
      - name: 🚨 Create Issue if Guidelines Need Review
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read the latest summary file
            const reportsDir = 'admin/reports';
            const files = fs.readdirSync(reportsDir).filter(f => f.startsWith('summary-'));
            if (files.length === 0) return;
            
            const latestReport = fs.readFileSync(`${reportsDir}/${files.sort().pop()}`, 'utf8');
            
            // Check if there are guidelines needing review
            if (latestReport.includes('REVIEW') || latestReport.includes('CHECK')) {
              // Check for existing open audit issues
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'audit',
                state: 'open'
              });
              
              // Only create if no open audit issue exists
              if (issues.length === 0) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: '📋 Monthly Audit: Guidelines Review Needed',
                  body: `## Automated Audit Report - ${new Date().toLocaleDateString()}
                  
The automated audit has identified items that may need review.

### Action Items
- [ ] Check Sepsis guidelines (SSC) for 2024/2025 updates
- [ ] Monitor ACLS guidelines for 2025 AHA update
- [ ] Review bronchiolitis guidelines (AAP 2014 - may be outdated)

### How to Review
1. Check the \`admin/reports/\` folder for the full audit summary
2. Visit organization websites listed in the report
3. Update relevant deep dives and adventures if guidelines have changed
4. Close this issue when review is complete

---
*This issue was automatically created by the DxSuite audit workflow.*`,
                  labels: ['audit', 'automated', 'review-needed']
                });
                console.log('Created new audit issue');
              } else {
                console.log('Open audit issue already exists, skipping creation');
              }
            }

  # Separate job for monthly PubMed check
  pubmed-check:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 6 1 * *'  # Only on monthly schedule
    permissions:
      issues: write
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 📚 Check PubMed for New Guidelines
        id: pubmed
        run: |
          # Run PubMed monitor (outputs to console)
          node admin/pubmed-monitor.js 2>&1 | tee pubmed-results.txt || true
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}  # Optional: increases rate limit
        continue-on-error: true
