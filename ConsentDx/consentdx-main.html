    <style>

        .main-card {

        .procedure-context {

        .chat-area {

        .checklist-item.covered::before { content: "✓"; color: #4ade80; }
        .checklist-item.missing { color: #ef4444; }
        .checklist-item.missing::before { content: "✗"; color: #ef4444; }

    <div class="container">
        <div class="header">
            <h1>Informed Consent Training</h1>
            <p>Practice obtaining consent using patient-centered language</p>
        </div>
        
        <h3 style="margin-bottom: 12px; color: rgba(255,255,255,0.8);">Select a Scenario:</h3>
        <div class="scenario-selector" id="scenarioSelector"></div>
        
        <div class="main-card" id="mainCard" style="display: none;">
            <div class="patient-panel" id="patientPanel"></div>
            <div class="procedure-context" id="procedureContext"></div>
            <div class="chat-area" id="chatArea"></div>
            <div class="quick-phrases" id="quickPhrases"></div>
            <div class="input-area">
                <textarea id="userInput" placeholder="Explain the procedure to the patient..."></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
        
        <div class="feedback-panel" id="feedbackPanel">
            <h3>📊 Consent Quality Feedback</h3>
            <div id="feedbackContent"></div>
        </div>
    </div>
    
    <script>
        const SCENARIOS = [
            {
                id: 'central-line-anxious',
                title: 'Central Line Placement',
                desc: 'Adult patient, anxious about procedure',
                procedure: 'Central Venous Catheter (Internal Jugular)',
                patient: {
                    name: 'Michael Torres',
                    age: 58,
                    avatar: '👨',
                    mood: 'anxious',
                    moodLabel: 'Anxious',
                    context: 'Admitted for severe pneumonia requiring IV antibiotics. Previous bad experience with needles.',
                    personality: 'Asks many questions, needs reassurance, may interrupt'
                },
                requiredElements: [
                    'What the procedure is (in plain language)',
                    'Why it is needed',
                    'Risks (infection, bleeding, pneumothorax)',
                    'Benefits (reliable IV access)',
                    'Alternatives (peripheral IV, PICC)',
                    'Right to refuse',
                    'Opportunity to ask questions'
                ],
                patientQuestions: [
                    "Will it hurt? I really don't do well with needles.",
                    "What if something goes wrong?",
                    "Is there any other way to give me the antibiotics?",
                    "How long will the tube stay in?",
                    "Will I be awake during this?"
                ],
                ethicalNote: null
            },
            {
                id: 'lumbar-puncture-parent',
                title: 'Lumbar Puncture (Pediatric)',
                desc: 'Explaining to worried parent',
                procedure: 'Lumbar Puncture',
                patient: {
                    name: 'Maria Garcia (mother of 4-year-old Sofia)',
                    age: 34,
                    avatar: '👩',
                    mood: 'anxious',
                    moodLabel: 'Worried Parent',
                    context: 'Sofia has fever, headache, and neck stiffness. Need to rule out meningitis.',
                    personality: 'Very protective, wants detailed information, may become emotional'
                },
                requiredElements: [
                    'What the procedure involves',
                    'Why it is necessary (rule out meningitis)',
                    'Risks specific to children',
                    'How child will be positioned/held',
                    'Pain management approach',
                    'What results will tell us',
                    'Timeline for results'
                ],
                patientQuestions: [
                    "Will my daughter feel the needle? Can you sedate her?",
                    "I've heard this can cause paralysis - is that true?",
                    "Can I stay with her during the procedure?",
                    "What happens if you find something bad?",
                    "Why can't you just do a blood test instead?"
                ],
                ethicalNote: 'Parental consent required; consider assent for older children'
            },
            {
                id: 'chest-tube-emergent',
                title: 'Chest Tube (Emergent)',
                desc: 'Ethical: Consent in emergency',
                procedure: 'Tube Thoracostomy',
                patient: {
                    name: 'James Wilson',
                    age: 45,
                    avatar: '👨',
                    mood: 'cooperative',
                    moodLabel: 'In Distress',
                    context: 'Trauma patient with tension pneumothorax. Hypotensive, severe respiratory distress. Limited time.',
                    personality: 'Can answer yes/no questions only due to distress'
                },
                requiredElements: [
                    'Brief explanation of emergency',
                    'Immediate need for procedure',
                    'Life-saving nature',
                    'Verbal consent if possible',
                    'Document emergency circumstances'
                ],
                patientQuestions: [
                    "What's... happening... to me?",
                    "Am I... going to... be okay?"
                ],
                ethicalNote: 'Emergency exception to informed consent - life-threatening situation. Document that delay would risk life.'
            },
            {
                id: 'picc-elderly-confused',
                title: 'PICC Line (Elderly)',
                desc: 'Ethical: Reduced capacity',
                procedure: 'Peripherally Inserted Central Catheter',
                patient: {
                    name: 'Dorothy Mitchell',
                    age: 84,
                    avatar: '👵',
                    mood: 'confused',
                    moodLabel: 'Mildly Confused',
                    context: 'UTI with mild delirium. Needs 6 weeks IV antibiotics for osteomyelitis. Has healthcare proxy.',
                    personality: 'Pleasant but forgetful, may repeat questions, sometimes oriented'
                },
                requiredElements: [
                    'Assess current capacity',
                    'Simple, clear language',
                    'Involve healthcare proxy appropriately',
                    'Document capacity assessment',
                    'Repeat key information',
                    'Check understanding'
                ],
                patientQuestions: [
                    "What did you say this was for again, dear?",
                    "Where is my daughter? She handles these things.",
                    "I don't want any surgery. Is this surgery?",
                    "Will I be able to go home after?"
                ],
                ethicalNote: 'Capacity assessment required. If lacking capacity, involve healthcare proxy. Patient may still have capacity for simple decisions.'
            },
            {
                id: 'paracentesis-skeptical',
                title: 'Paracentesis',
                desc: 'Skeptical patient, second opinion',
                procedure: 'Abdominal Paracentesis',
                patient: {
                    name: 'Robert Chen',
                    age: 52,
                    avatar: '👨',
                    mood: 'skeptical',
                    moodLabel: 'Skeptical',
                    context: 'Cirrhosis with tense ascites. Has researched procedure online, concerned about complications.',
                    personality: 'Well-informed but distrustful, may challenge recommendations'
                },
                requiredElements: [
                    'Acknowledge concerns',
                    'Provide evidence-based information',
                    'Discuss complication rates honestly',
                    'Explain monitoring during procedure',
                    'Respect autonomy if refuses',
                    'Offer second opinion if desired'
                ],
                patientQuestions: [
                    "I read online that this can cause infection. What's the actual risk?",
                    "Why can't I just take more diuretics instead?",
                    "What are your personal complication rates?",
                    "What if I want to wait and get a second opinion?",
                    "How do I know you're experienced enough to do this?"
                ],
                ethicalNote: null
            },
            {
                id: 'intubation-family',
                title: 'Intubation (Family Discussion)',
                desc: 'Explaining to family post-emergency',
                procedure: 'Endotracheal Intubation (already performed)',
                patient: {
                    name: 'Family of William Brown',
                    age: 'Multiple family members',
                    avatar: '👨‍👩‍👧',
                    mood: 'anxious',
                    moodLabel: 'Distressed Family',
                    context: 'Patient intubated emergently for respiratory failure. Family just arrived. Need to explain what happened.',
                    personality: 'Scared, may be angry about not being contacted earlier'
                },
                requiredElements: [
                    'Explain what happened',
                    'Why emergency action was needed',
                    'Current patient status',
                    'What the breathing tube does',
                    'Next steps and prognosis',
                    'Opportunity for questions',
                    'Visiting information'
                ],
                patientQuestions: [
                    "Why didn't anyone call us before doing this?",
                    "Is he in pain? Can he hear us?",
                    "How long will he be on the machine?",
                    "What are his chances?",
                    "Can we see him now?"
                ],
                ethicalNote: 'Post-emergency family communication - not consent, but critical communication skill'
            }
        ];
        
        let currentScenario = null;
        let conversationHistory = [];
        let exchangeCount = 0;
        const MAX_EXCHANGES = 8;
        
        function init() {
            const selector = document.getElementById('scenarioSelector');
            selector.innerHTML = SCENARIOS.map(s => `
                <button class="scenario-btn" onclick="selectScenario('${s.id}')">
                    <div class="title">${s.title}</div>
                    <div class="desc">${s.desc}</div>
                </button>
            `).join('');
        }
        
        function selectScenario(id) {
            currentScenario = SCENARIOS.find(s => s.id === id);
            conversationHistory = [];
            exchangeCount = 0;
            
            document.querySelectorAll('.scenario-btn').forEach(btn => btn.classList.remove('active'));
            event.target.closest('.scenario-btn').classList.add('active');
            
            document.getElementById('mainCard').style.display = 'block';
            document.getElementById('feedbackPanel').classList.remove('visible');
            
            renderPatientPanel();
            renderProcedureContext();
            renderChat();
            renderQuickPhrases();
        }
        
        function renderPatientPanel() {
            const p = currentScenario.patient;
            document.getElementById('patientPanel').innerHTML = `
                <div class="patient-avatar">${p.avatar}</div>
                <div class="patient-info">
                    <h3>${p.name}</h3>
                    <div class="details">${p.age}${typeof p.age === 'number' ? ' years old' : ''} • ${p.context}</div>
                    <span class="patient-mood mood-${p.mood}">${p.moodLabel}</span>
                </div>
            `;
        }
        
        function renderProcedureContext() {
            const ethical = currentScenario.ethicalNote ? 
                `<span class="ethical-scenario-badge">⚖️ Ethical Consideration</span>` : '';
            document.getElementById('procedureContext').innerHTML = `
                <h4>Procedure: ${currentScenario.procedure} ${ethical}</h4>
                ${currentScenario.ethicalNote ? `<p style="color: #a855f7; font-size: 0.9rem; margin-top: 8px;">Note: ${currentScenario.ethicalNote}</p>` : ''}
            `;
        }
        
        function renderChat() {
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = '';
            
            // Initial patient message
            const initialMessage = getInitialPatientMessage();
            addMessage('patient', initialMessage);
        }
        
        function getInitialPatientMessage() {
            const greetings = {
                'anxious': "Hello, doctor. I've been told I need this procedure but I'm honestly pretty nervous about it...",
                'skeptical': "So, they want to do this procedure on me. I've done some research and I have some concerns I'd like to discuss.",
                'cooperative': "Hello... I understand... you need to do... something?",
                'confused': "Oh hello dear! Are you the nurse? My daughter usually explains things to me..."
            };
            return greetings[currentScenario.patient.mood] || "Hello, I understand you need to explain something to me about a procedure?";
        }
        
        function renderQuickPhrases() {
            const phrases = [
                "I'd like to explain...",
                "The risks include...",
                "The benefits are...",
                "Do you have any questions?",
                "I understand your concern...",
                "Let me make sure you understand..."
            ];
            document.getElementById('quickPhrases').innerHTML = phrases.map(p => 
                `<span class="quick-phrase" onclick="insertPhrase('${p}')">${p}</span>`
            ).join('');
        }
        
        function insertPhrase(phrase) {
            const input = document.getElementById('userInput');
            input.value += (input.value ? ' ' : '') + phrase;
            input.focus();
        }
        
        function addMessage(type, text) {
            const chatArea = document.getElementById('chatArea');
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            msg.textContent = text;
            chatArea.appendChild(msg);
            chatArea.scrollTop = chatArea.scrollHeight;
            
            conversationHistory.push({ type, text });
        }
        
        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage('student', text);
            input.value = '';
            exchangeCount++;
            
            // Generate patient response
            setTimeout(() => {
                if (exchangeCount >= MAX_EXCHANGES) {
                    addMessage('system', '📋 Conversation complete. Generating feedback...');
                    setTimeout(generateFeedback, 1000);
                } else {
                    const response = generatePatientResponse(text);
                    addMessage('patient', response);
                }
            }, 800);
        }
        
        function generatePatientResponse(studentMessage) {
            const questions = currentScenario.patientQuestions;
            const mood = currentScenario.patient.mood;
            
            // Simple response logic based on what student said
            const lowerMsg = studentMessage.toLowerCase();
            
            if (lowerMsg.includes('question') || lowerMsg.includes('ask')) {
                return questions[Math.floor(Math.random() * questions.length)];
            }
            
            if (lowerMsg.includes('risk') || lowerMsg.includes('complication')) {
                if (mood === 'anxious') {
                    return "That sounds scary... Are those complications common? What would you do if that happened?";
                } else if (mood === 'skeptical') {
                    return "What are the actual statistics on those complications? I want real numbers.";
                }
            }
            
            if (lowerMsg.includes('understand') || lowerMsg.includes('make sense')) {
                if (mood === 'confused') {
                    return "I think so... but can you explain that part about the tube again?";
                }
                return "I think I understand. Can you tell me more about what to expect during the procedure?";
            }
            
            if (lowerMsg.includes('consent') || lowerMsg.includes('agree') || lowerMsg.includes('permission')) {
                if (mood === 'skeptical') {
                    return "Before I agree to anything, I want to make sure I've asked all my questions.";
                }
                return "I appreciate you explaining everything. I just have one more question...";
            }
            
            // Return a random question if no specific trigger
            return questions[exchangeCount % questions.length];
        }
        
        function generateFeedback() {
            const panel = document.getElementById('feedbackPanel');
            const content = document.getElementById('feedbackContent');
            
            // Analyze conversation for required elements
            const fullConversation = conversationHistory
                .filter(m => m.type === 'student')
                .map(m => m.text)
                .join(' ')
                .toLowerCase();
            
            const elementsCovered = [];
            const elementsMissing = [];
            
            currentScenario.requiredElements.forEach(element => {
                const keywords = getKeywordsForElement(element);
                const covered = keywords.some(kw => fullConversation.includes(kw));
                if (covered) {
                    elementsCovered.push(element);
                } else {
                    elementsMissing.push(element);
                }
            });
            
            const coverageScore = (elementsCovered.length / currentScenario.requiredElements.length) * 100;
            
            // Language clarity analysis
            const clarityScore = analyzeLanguageClarity(fullConversation);
            
            // Empathy analysis
            const empathyScore = analyzeEmpathy(fullConversation);
            
            content.innerHTML = `
                <div class="feedback-section">
                    <h4>📋 Required Elements Coverage</h4>
                    <div class="checklist">
                        ${currentScenario.requiredElements.map(el => {
                            const covered = elementsCovered.includes(el);
                            return `<div class="checklist-item ${covered ? 'covered' : 'missing'}">${el}</div>`;
                        }).join('')}
                    </div>
                    <div class="score-bar">
                        <div class="score-fill ${coverageScore >= 70 ? 'score-good' : coverageScore >= 50 ? 'score-moderate' : 'score-needs-work'}" 
                             style="width: ${coverageScore}%"></div>
                    </div>
                    <p style="font-size: 0.85rem; margin-top: 8px; color: rgba(255,255,255,0.6);">
                        ${Math.round(coverageScore)}% of required elements addressed
                    </p>
                </div>
                
                <div class="feedback-section">
                    <h4>💬 Language Clarity</h4>
                    <p style="font-size: 0.9rem; color: rgba(255,255,255,0.8);">${clarityScore.feedback}</p>
                    <div class="score-bar">
                        <div class="score-fill ${clarityScore.score >= 70 ? 'score-good' : clarityScore.score >= 50 ? 'score-moderate' : 'score-needs-work'}" 
                             style="width: ${clarityScore.score}%"></div>
                    </div>
                    ${clarityScore.jargonFound.length > 0 ? `
                        <p style="font-size: 0.85rem; margin-top: 8px; color: #fbbf24;">
                            ⚠️ Medical jargon detected: ${clarityScore.jargonFound.join(', ')}
                        </p>
                        <p style="font-size: 0.85rem; color: rgba(255,255,255,0.6);">
                            Consider using patient-friendly alternatives.
                        </p>
                    ` : ''}
                </div>
                
                <div class="feedback-section">
                    <h4>💚 Empathy & Patient-Centeredness</h4>
                    <p style="font-size: 0.9rem; color: rgba(255,255,255,0.8);">${empathyScore.feedback}</p>
                    <div class="score-bar">
                        <div class="score-fill ${empathyScore.score >= 70 ? 'score-good' : empathyScore.score >= 50 ? 'score-moderate' : 'score-needs-work'}" 
                             style="width: ${empathyScore.score}%"></div>
                    </div>
                </div>
                
                ${currentScenario.ethicalNote ? `
                <div class="feedback-section" style="background: rgba(168,85,247,0.1);">
                    <h4 style="color: #a855f7;">⚖️ Ethical Considerations</h4>
                    <p style="font-size: 0.9rem; color: rgba(255,255,255,0.8);">
                        This scenario involves: ${currentScenario.ethicalNote}
                    </p>
                    <p style="font-size: 0.85rem; margin-top: 8px; color: rgba(255,255,255,0.6);">
                        Key principles: Patient autonomy, beneficence, informed decision-making, 
                        and appropriate surrogate involvement when capacity is limited.
                    </p>
                </div>
                ` : ''}
                
                <div class="feedback-section">
                    <h4>📚 Learning Points</h4>
                    <ul>
                        <li>Always use 6th-grade reading level language when possible</li>
                        <li>Confirm understanding with teach-back method</li>
                        <li>Address patient emotions before information delivery</li>
                        <li>Document consent discussion in medical record</li>
                        ${currentScenario.ethicalNote ? '<li>Consider ethical/legal requirements for special situations</li>' : ''}
                    </ul>
                </div>
            `;
            
            panel.classList.add('visible');
            panel.scrollIntoView({ behavior: 'smooth' });
        }
        
        function getKeywordsForElement(element) {
            const keywordMap = {
                'What the procedure is': ['procedure', 'what we', 'involves', 'going to'],
                'Why it is needed': ['because', 'reason', 'need', 'why', 'necessary'],
                'Risks': ['risk', 'complication', 'side effect', 'possibility', 'chance'],
                'Benefits': ['benefit', 'help', 'improve', 'allow', 'advantage'],
                'Alternatives': ['alternative', 'instead', 'other option', 'another way'],
                'Right to refuse': ['refuse', 'choice', 'decide', 'don\'t have to', 'up to you'],
                'Opportunity to ask questions': ['question', 'ask', 'anything else', 'concerns']
            };
            
            for (const [key, keywords] of Object.entries(keywordMap)) {
                if (element.toLowerCase().includes(key.toLowerCase())) {
                    return keywords;
                }
            }
            return element.toLowerCase().split(' ').filter(w => w.length > 3);
        }
        
        function analyzeLanguageClarity(text) {
            const jargon = [
                'catheter', 'lumen', 'sterile', 'aseptic', 'subcutaneous', 'intravascular',
                'pneumothorax', 'hemothorax', 'thrombosis', 'embolism', 'sepsis', 'bacteremia',
                'prophylaxis', 'analgesic', 'sedation', 'anesthesia', 'fluoroscopy'
            ];
            
            const jargonFound = jargon.filter(j => text.includes(j));
            
            const plainLanguageIndicators = [
                'simple terms', 'basically', 'in other words', 'what that means',
                'like a', 'think of it as', 'similar to'
            ];
            
            const usedPlainLanguage = plainLanguageIndicators.some(p => text.includes(p));
            
            let score = 70;
            score -= jargonFound.length * 10;
            if (usedPlainLanguage) score += 15;
            score = Math.max(20, Math.min(100, score));
            
            let feedback;
            if (score >= 70) {
                feedback = "Good use of patient-friendly language. You explained concepts in accessible terms.";
            } else if (score >= 50) {
                feedback = "Moderate clarity. Some medical terms could be explained more simply.";
            } else {
                feedback = "Consider using simpler language. Many patients have limited health literacy.";
            }
            
            return { score, feedback, jargonFound };
        }
        
        function analyzeEmpathy(text) {
            const empathyIndicators = [
                'understand', 'concern', 'worry', 'feel', 'scary', 'nervous',
                'i hear', 'that makes sense', 'it\'s okay', 'normal to feel',
                'appreciate', 'thank you for', 'important to you'
            ];
            
            const empathyCount = empathyIndicators.filter(e => text.includes(e)).length;
            
            let score = Math.min(100, 40 + empathyCount * 15);
            
            let feedback;
            if (score >= 70) {
                feedback = "Excellent empathetic communication. You acknowledged the patient's emotions and concerns.";
            } else if (score >= 50) {
                feedback = "Good effort at empathy. Consider acknowledging emotions more explicitly before diving into information.";
            } else {
                feedback = "Remember to address the patient's emotional state. Acknowledge fears and concerns before explaining the procedure.";
            }
            
            return { score, feedback };
        }
        
        // Handle Enter key
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        init();
    </script>
