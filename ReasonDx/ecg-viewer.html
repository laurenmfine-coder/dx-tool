<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECG Integrated Viewer - Dx Ecosystem</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #3b82f6;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --ecg-bg: #fff8f8;
            --ecg-grid-major: #ffcdd2;
            --ecg-grid-minor: #ffebee;
        }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            line-height: 1.6;
        }
        
        .ecg-viewer {
            background: white;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            margin: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        
        .ecg-header {
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .ecg-title { display: flex; align-items: center; gap: 12px; }
        .ecg-title h2 { font-size: 1.25rem; font-weight: 600; }
        .ecg-badge { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
        .ecg-controls { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .ecg-btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .ecg-btn:hover { background: rgba(255,255,255,0.3); }
        
        .ecg-display {
            background: var(--ecg-bg);
            padding: 20px;
        }
        
        .ecg-paper {
            background: 
                linear-gradient(var(--ecg-grid-minor) 1px, transparent 1px),
                linear-gradient(90deg, var(--ecg-grid-minor) 1px, transparent 1px),
                linear-gradient(var(--ecg-grid-major) 1px, transparent 1px),
                linear-gradient(90deg, var(--ecg-grid-major) 1px, transparent 1px),
                var(--ecg-bg);
            background-size: 5px 5px, 5px 5px, 25px 25px, 25px 25px;
            border-radius: 8px;
            padding: 10px;
            overflow-x: auto;
        }
        
        .ecg-strip {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        .ecg-lead {
            background: rgba(255,255,255,0.5);
            border-radius: 4px;
            padding: 8px;
        }
        
        .ecg-lead-label { font-size: 0.75rem; font-weight: 600; color: #666; margin-bottom: 4px; }
        .ecg-canvas { width: 100%; height: 80px; }
        
        .ecg-rhythm-strip {
            margin-top: 16px;
            background: rgba(255,255,255,0.5);
            border-radius: 8px;
            padding: 12px;
        }
        .ecg-rhythm-label { font-size: 0.8rem; font-weight: 600; color: #666; margin-bottom: 8px; }
        .ecg-rhythm-canvas { width: 100%; height: 100px; }
        
        .ecg-interpretation { padding: 20px 24px; border-top: 1px solid #e2e8f0; }
        .interpretation-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
        .interpretation-header h3 { font-size: 1rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        
        .urgency-badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .urgency-badge.critical { background: #fee2e2; color: #dc2626; }
        .urgency-badge.urgent { background: #fef3c7; color: #d97706; }
        .urgency-badge.routine { background: #d1fae5; color: #059669; }
        .urgency-badge.evaluate { background: #dbeafe; color: #2563eb; }
        
        .findings-list { display: grid; gap: 8px; margin-bottom: 16px; }
        .finding-item {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 10px 14px; background: #f8fafc; border-radius: 8px; font-size: 0.9rem;
        }
        .finding-icon { font-size: 1rem; flex-shrink: 0; }
        .finding-item.abnormal { background: #fef2f2; border-left: 3px solid #ef4444; }
        .finding-item.normal { background: #f0fdf4; border-left: 3px solid #22c55e; }
        
        .ecg-teaching { padding: 20px 24px; background: #f8fafc; border-top: 1px solid #e2e8f0; }
        .teaching-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-weight: 600; color: var(--primary); }
        .teaching-content { font-size: 0.9rem; color: #475569; }
        .teaching-highlight { background: #dbeafe; padding: 12px 16px; border-radius: 8px; margin-top: 12px; border-left: 3px solid var(--primary); }
        
        .ecg-quiz { padding: 20px 24px; border-top: 1px solid #e2e8f0; }
        .quiz-question { font-weight: 500; margin-bottom: 12px; }
        .quiz-options { display: grid; gap: 8px; }
        .quiz-option {
            padding: 12px 16px; background: #f8fafc; border: 2px solid #e2e8f0;
            border-radius: 10px; cursor: pointer; transition: all 0.15s; font-size: 0.9rem;
        }
        .quiz-option:hover { border-color: var(--primary); background: #eff6ff; }
        .quiz-option.correct { border-color: var(--success); background: #d1fae5; }
        .quiz-option.incorrect { border-color: var(--danger); background: #fee2e2; }
        
        .pattern-browser { padding: 20px; background: white; margin: 20px; border-radius: 16px; border: 1px solid #e2e8f0; }
        .pattern-browser h3 { margin-bottom: 16px; font-size: 1.1rem; }
        .pattern-categories { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .category-btn {
            padding: 8px 16px; border-radius: 20px; border: 1px solid #e2e8f0;
            background: white; font-size: 0.85rem; cursor: pointer; transition: all 0.15s;
        }
        .category-btn:hover, .category-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .pattern-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .pattern-card { background: #f8fafc; border-radius: 10px; padding: 12px; cursor: pointer; transition: all 0.15s; border: 2px solid transparent; }
        .pattern-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .pattern-card .pattern-name { font-weight: 500; font-size: 0.9rem; margin-bottom: 4px; }
        .pattern-card .pattern-category { font-size: 0.75rem; color: #64748b; }
        
        @media (max-width: 768px) {
            .ecg-strip { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="ecg-viewer" id="ecgViewer">
        <div class="ecg-header">
            <div class="ecg-title">
                <span>📈</span>
                <h2>12-Lead ECG</h2>
                <span class="ecg-badge" id="ecgPatternBadge">STEMI - Anterior</span>
            </div>
            <div class="ecg-controls">
                <button class="ecg-btn" onclick="ECGViewer.showTeaching()">💡 Teaching</button>
            </div>
        </div>
        
        <div class="ecg-display">
            <div class="ecg-paper">
                <div class="ecg-strip" id="ecgStrip"></div>
                <div class="ecg-rhythm-strip">
                    <div class="ecg-rhythm-label">Lead II Rhythm Strip (25 mm/s, 10 mm/mV)</div>
                    <canvas class="ecg-rhythm-canvas" id="rhythmCanvas"></canvas>
                </div>
            </div>
        </div>
        
        <div class="ecg-interpretation" id="ecgInterpretation">
            <div class="interpretation-header">
                <h3>🔍 ECG Interpretation</h3>
                <span class="urgency-badge critical" id="urgencyBadge">CRITICAL</span>
            </div>
            <div class="findings-list" id="findingsList"></div>
        </div>
        
        <div class="ecg-teaching" id="ecgTeaching" style="display: none;">
            <div class="teaching-header"><span>🎓</span> Teaching Points</div>
            <div class="teaching-content" id="teachingContent"></div>
        </div>
        
        <div class="ecg-quiz" id="ecgQuiz">
            <div class="quiz-question" id="quizQuestion"></div>
            <div class="quiz-options" id="quizOptions"></div>
        </div>
    </div>
    
    <div class="pattern-browser">
        <h3>📚 ECG Pattern Library</h3>
        <div class="pattern-categories" id="patternCategories">
            <button class="category-btn active" data-category="all">All</button>
            <button class="category-btn" data-category="stemi">STEMI</button>
            <button class="category-btn" data-category="arrhythmia">Arrhythmias</button>
            <button class="category-btn" data-category="conduction">Conduction</button>
            <button class="category-btn" data-category="other">Other</button>
        </div>
        <div class="pattern-grid" id="patternGrid"></div>
    </div>

    <script>
    const ECGViewer = {
        currentPattern: null,
        showingTeaching: false,
        
        patterns: {
            'stemi-anterior': {
                id: 'stemi-anterior', name: 'Anterior STEMI', category: 'stemi', urgency: 'critical',
                findings: [
                    { text: 'ST elevation in V1-V4 (>2mm)', abnormal: true },
                    { text: 'Reciprocal ST depression in II, III, aVF', abnormal: true },
                    { text: 'Hyperacute T waves in precordial leads', abnormal: true },
                    { text: 'Normal sinus rhythm', abnormal: false }
                ],
                interpretation: 'Acute anterior STEMI. LAD occlusion. Activate cath lab immediately.',
                teachingPoints: [
                    'Anterior STEMI = LAD territory (V1-V4)',
                    'Larger territory = higher mortality risk',
                    'Door-to-balloon time <90 minutes critical',
                    'Watch for cardiogenic shock, VT/VF'
                ],
                quiz: {
                    question: 'Which coronary artery is most likely occluded?',
                    options: ['Right Coronary Artery (RCA)', 'Left Anterior Descending (LAD)', 'Left Circumflex (LCx)', 'Left Main'],
                    correct: 1,
                    explanation: 'ST elevation in V1-V4 indicates anterior wall involvement, supplied by the LAD.'
                },
                linkedCases: ['chest-pain', 'acs-stemi']
            },
            'stemi-inferior': {
                id: 'stemi-inferior', name: 'Inferior STEMI', category: 'stemi', urgency: 'critical',
                findings: [
                    { text: 'ST elevation in II, III, aVF', abnormal: true },
                    { text: 'ST elevation III > II (suggests RCA)', abnormal: true },
                    { text: 'Reciprocal ST depression in I, aVL', abnormal: true },
                    { text: 'Sinus bradycardia', abnormal: true }
                ],
                interpretation: 'Acute inferior STEMI. RCA most likely. Check V4R for RV involvement.',
                teachingPoints: [
                    'Inferior STEMI = RCA (80%) or LCx (20%)',
                    'ST elevation III > II suggests RCA',
                    'Always check V4R for RV STEMI',
                    'RV STEMI: Avoid nitrates, give fluids'
                ],
                quiz: {
                    question: 'Patient is hypotensive. V4R shows ST elevation. What should you AVOID?',
                    options: ['IV fluids', 'Aspirin', 'Nitroglycerin', 'Heparin'],
                    correct: 2,
                    explanation: 'RV STEMI patients are preload-dependent. Nitroglycerin causes venodilation and severe hypotension.'
                },
                linkedCases: ['chest-pain']
            },
            'afib-rvr': {
                id: 'afib-rvr', name: 'Atrial Fibrillation with RVR', category: 'arrhythmia', urgency: 'urgent',
                findings: [
                    { text: 'Irregularly irregular rhythm', abnormal: true },
                    { text: 'No discernible P waves', abnormal: true },
                    { text: 'Ventricular rate ~140 bpm', abnormal: true },
                    { text: 'Narrow QRS complexes', abnormal: false }
                ],
                interpretation: 'Atrial fibrillation with rapid ventricular response. Rate control needed.',
                teachingPoints: [
                    'Irregularly irregular = think AFib',
                    'Rate vs rhythm control decision',
                    'Anticoagulation: CHA2DS2-VASc score',
                    'Look for underlying cause'
                ],
                quiz: {
                    question: 'What score guides anticoagulation in AFib?',
                    options: ['HEART score', 'Wells score', 'CHA2DS2-VASc', 'PERC score'],
                    correct: 2,
                    explanation: 'CHA2DS2-VASc estimates stroke risk in AFib and guides anticoagulation.'
                },
                linkedCases: ['palpitations']
            },
            'vt': {
                id: 'vt', name: 'Ventricular Tachycardia', category: 'arrhythmia', urgency: 'critical',
                findings: [
                    { text: 'Wide complex tachycardia (QRS >120ms)', abnormal: true },
                    { text: 'Rate ~180 bpm, regular', abnormal: true },
                    { text: 'AV dissociation', abnormal: true },
                    { text: 'Concordance in precordial leads', abnormal: true }
                ],
                interpretation: 'Monomorphic VT. If unstable, cardiovert immediately.',
                teachingPoints: [
                    'Wide complex tachycardia = VT until proven otherwise',
                    'AV dissociation is diagnostic',
                    'Unstable = immediate cardioversion',
                    'Never give CCBs for wide complex tachycardia'
                ],
                quiz: {
                    question: 'Patient with this rhythm has BP 78/50. Next step?',
                    options: ['IV Amiodarone', 'IV Diltiazem', 'Synchronized cardioversion', 'Vagal maneuvers'],
                    correct: 2,
                    explanation: 'Unstable VT requires immediate synchronized cardioversion.'
                },
                linkedCases: ['syncope-arrhythmia']
            },
            'pe': {
                id: 'pe', name: 'Pulmonary Embolism', category: 'other', urgency: 'urgent',
                findings: [
                    { text: 'Sinus tachycardia', abnormal: true },
                    { text: 'S1Q3T3 pattern', abnormal: true },
                    { text: 'T wave inversions V1-V4 (RV strain)', abnormal: true },
                    { text: 'Right axis deviation', abnormal: true }
                ],
                interpretation: 'ECG suggestive of PE with RV strain. Clinical correlation required.',
                teachingPoints: [
                    'Most common finding: Sinus tachycardia',
                    'S1Q3T3 only in 10-20%',
                    'Normal ECG does not rule out PE',
                    'ECG neither sensitive nor specific'
                ],
                quiz: {
                    question: 'Most common ECG finding in PE?',
                    options: ['S1Q3T3', 'Sinus tachycardia', 'Atrial fibrillation', 'ST elevation'],
                    correct: 1,
                    explanation: 'Sinus tachycardia is most common (~40%). S1Q3T3 is classic but rare.'
                },
                linkedCases: ['pulmonary-embolism']
            },
            'hyperkalemia': {
                id: 'hyperkalemia', name: 'Hyperkalemia', category: 'other', urgency: 'critical',
                findings: [
                    { text: 'Peaked T waves', abnormal: true },
                    { text: 'Prolonged PR interval', abnormal: true },
                    { text: 'Widened QRS', abnormal: true },
                    { text: 'Flattened P waves', abnormal: true }
                ],
                interpretation: 'ECG changes of hyperkalemia. Check K+ immediately. Cardiac monitoring.',
                teachingPoints: [
                    'Progression: Peaked T → PR prolonged → Wide QRS → Sine wave',
                    'Calcium gluconate FIRST (membrane stabilization)',
                    'Then shift K+: Insulin/glucose, albuterol',
                    'Remove K+: Kayexalate, dialysis'
                ],
                quiz: {
                    question: 'K+ 7.2, peaked T, wide QRS. First treatment?',
                    options: ['IV Insulin + Glucose', 'IV Calcium gluconate', 'Kayexalate', 'Dialysis'],
                    correct: 1,
                    explanation: 'Calcium gluconate stabilizes cardiac membrane first when ECG changes present.'
                },
                linkedCases: ['acute-kidney-injury']
            },
            'lbbb': {
                id: 'lbbb', name: 'Left Bundle Branch Block', category: 'conduction', urgency: 'evaluate',
                findings: [
                    { text: 'QRS >120ms', abnormal: true },
                    { text: 'Broad R waves in I, aVL, V5-V6', abnormal: true },
                    { text: 'Deep S waves in V1-V3', abnormal: true },
                    { text: 'Appropriate discordance', abnormal: false }
                ],
                interpretation: 'LBBB. Cannot use standard STEMI criteria. Use Sgarbossa criteria.',
                teachingPoints: [
                    'LBBB makes STEMI diagnosis difficult',
                    'Sgarbossa criteria for STEMI in LBBB',
                    'Concordant ST elevation is most specific',
                    'New LBBB alone ≠ cath lab activation'
                ],
                quiz: {
                    question: 'Most specific Sgarbossa criterion for STEMI in LBBB?',
                    options: ['Discordant ST elevation >5mm', 'Concordant ST elevation ≥1mm', 'ST depression V1-V3', 'New LBBB'],
                    correct: 1,
                    explanation: 'Concordant ST elevation (same direction as QRS) is highly specific for STEMI in LBBB.'
                },
                linkedCases: ['chest-pain']
            },
            'normal': {
                id: 'normal', name: 'Normal Sinus Rhythm', category: 'normal', urgency: 'routine',
                findings: [
                    { text: 'Regular rhythm, rate 60-100', abnormal: false },
                    { text: 'P wave before each QRS', abnormal: false },
                    { text: 'PR interval 120-200ms', abnormal: false },
                    { text: 'QRS <120ms', abnormal: false }
                ],
                interpretation: 'Normal sinus rhythm. No acute ischemic changes.',
                teachingPoints: [
                    'Rate 60-100, regular P before each QRS',
                    'PR 120-200ms, QRS <120ms',
                    'Normal ECG does not rule out ACS',
                    'Always compare with prior ECG'
                ],
                quiz: {
                    question: 'Normal ECG rules out which?',
                    options: ['Acute MI', 'Unstable angina', 'PE', 'None of the above'],
                    correct: 3,
                    explanation: 'Normal ECG does not rule out ACS, PE, or many serious conditions.'
                },
                linkedCases: []
            }
        },
        
        init(patternId = 'stemi-anterior') {
            this.loadPattern(patternId);
            this.renderPatternLibrary();
            this.setupEventListeners();
        },
        
        loadPattern(patternId) {
            const pattern = this.patterns[patternId];
            if (!pattern) return;
            this.currentPattern = pattern;
            this.renderECG(pattern);
            this.renderInterpretation(pattern);
            this.renderQuiz(pattern);
            document.getElementById('ecgPatternBadge').textContent = pattern.name;
            document.getElementById('ecgTeaching').style.display = 'none';
            this.showingTeaching = false;
        },
        
        renderECG(pattern) {
            const strip = document.getElementById('ecgStrip');
            const leads = ['I', 'II', 'III', 'aVR', 'aVL', 'aVF', 'V1', 'V2', 'V3', 'V4', 'V5', 'V6'];
            
            strip.innerHTML = leads.map(lead => `
                <div class="ecg-lead">
                    <div class="ecg-lead-label">${lead}</div>
                    <canvas class="ecg-canvas" id="lead-${lead}" width="200" height="80"></canvas>
                </div>
            `).join('');
            
            leads.forEach(lead => this.drawLead(lead, pattern));
            this.drawRhythmStrip(pattern);
        },
        
        drawLead(leadName, pattern) {
            const canvas = document.getElementById(`lead-${leadName}`);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            
            const baseline = canvas.height / 2;
            for (let cycle = 0; cycle < 3; cycle++) {
                this.drawQRS(ctx, cycle * 67, baseline, 67, pattern, leadName);
            }
            ctx.stroke();
        },
        
        drawQRS(ctx, startX, baseline, width, pattern, lead) {
            let stElev = 0;
            if (pattern.id === 'stemi-anterior' && ['V1','V2','V3','V4'].includes(lead)) stElev = 15;
            else if (pattern.id === 'stemi-anterior' && ['II','III','aVF'].includes(lead)) stElev = -8;
            else if (pattern.id === 'stemi-inferior' && ['II','III','aVF'].includes(lead)) stElev = 15;
            else if (pattern.id === 'stemi-inferior' && ['I','aVL'].includes(lead)) stElev = -8;
            
            ctx.moveTo(startX, baseline);
            ctx.quadraticCurveTo(startX + width*0.08, baseline-8, startX + width*0.15, baseline);
            ctx.lineTo(startX + width*0.22, baseline);
            ctx.lineTo(startX + width*0.25, baseline+5);
            ctx.lineTo(startX + width*0.30, baseline-25);
            ctx.lineTo(startX + width*0.35, baseline+10);
            ctx.lineTo(startX + width*0.45, baseline-stElev);
            ctx.quadraticCurveTo(startX + width*0.55, baseline-stElev-(pattern.category==='stemi'?20:12), startX + width*0.65, baseline-stElev*0.5);
            ctx.lineTo(startX + width*0.85, baseline);
        },
        
        drawRhythmStrip(pattern) {
            const canvas = document.getElementById('rhythmCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth || 800;
            canvas.height = 100;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            for (let i = 0; i < Math.floor(canvas.width/100); i++) {
                this.drawQRS(ctx, i*100, 50, 100, pattern, 'II');
            }
            ctx.stroke();
        },
        
        renderInterpretation(pattern) {
            const badge = document.getElementById('urgencyBadge');
            badge.className = `urgency-badge ${pattern.urgency}`;
            badge.textContent = pattern.urgency.toUpperCase();
            
            document.getElementById('findingsList').innerHTML = pattern.findings.map(f => `
                <div class="finding-item ${f.abnormal ? 'abnormal' : 'normal'}">
                    <span class="finding-icon">${f.abnormal ? '⚠️' : '✓'}</span>
                    <span>${f.text}</span>
                </div>
            `).join('') + `
                <div class="finding-item" style="background:#eff6ff;border-left-color:#3b82f6;">
                    <span class="finding-icon">📋</span>
                    <span><strong>Interpretation:</strong> ${pattern.interpretation}</span>
                </div>
            `;
        },
        
        renderQuiz(pattern) {
            document.getElementById('quizQuestion').textContent = pattern.quiz.question;
            document.getElementById('quizOptions').innerHTML = pattern.quiz.options.map((opt, i) => `
                <div class="quiz-option" onclick="ECGViewer.checkAnswer(${i})">${String.fromCharCode(65+i)}. ${opt}</div>
            `).join('');
            const oldExp = document.getElementById('quizExplanation');
            if (oldExp) oldExp.remove();
        },
        
        checkAnswer(idx) {
            const pattern = this.currentPattern;
            document.querySelectorAll('.quiz-option').forEach((opt, i) => {
                opt.classList.remove('correct', 'incorrect');
                if (i === pattern.quiz.correct) opt.classList.add('correct');
                else if (i === idx) opt.classList.add('incorrect');
            });
            if (!document.getElementById('quizExplanation')) {
                const div = document.createElement('div');
                div.id = 'quizExplanation';
                div.style.cssText = 'margin-top:16px;padding:16px;background:#f0fdf4;border-radius:10px;border-left:3px solid #22c55e;';
                div.innerHTML = `<strong>Explanation:</strong> ${pattern.quiz.explanation}`;
                document.getElementById('ecgQuiz').appendChild(div);
            }
        },
        
        showTeaching() {
            this.showingTeaching = !this.showingTeaching;
            const panel = document.getElementById('ecgTeaching');
            panel.style.display = this.showingTeaching ? 'block' : 'none';
            if (this.showingTeaching && this.currentPattern) {
                document.getElementById('teachingContent').innerHTML = `
                    <ul style="margin-left:20px;">${this.currentPattern.teachingPoints.map(p => `<li style="margin-bottom:8px;">${p}</li>`).join('')}</ul>
                    <div class="teaching-highlight">
                        <strong>🔗 Linked Cases:</strong> ${this.currentPattern.linkedCases.join(', ') || 'None'}
                    </div>
                `;
            }
        },
        
        renderPatternLibrary() {
            document.getElementById('patternGrid').innerHTML = Object.values(this.patterns).map(p => `
                <div class="pattern-card" onclick="ECGViewer.loadPattern('${p.id}')">
                    <div class="pattern-name">${p.name}</div>
                    <div class="pattern-category">${p.category} • ${p.urgency}</div>
                </div>
            `).join('');
        },
        
        setupEventListeners() {
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', e => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    this.filterPatterns(e.target.dataset.category);
                });
            });
        },
        
        filterPatterns(cat) {
            const filtered = cat === 'all' ? Object.values(this.patterns) : Object.values(this.patterns).filter(p => p.category === cat);
            document.getElementById('patternGrid').innerHTML = filtered.map(p => `
                <div class="pattern-card" onclick="ECGViewer.loadPattern('${p.id}')">
                    <div class="pattern-name">${p.name}</div>
                    <div class="pattern-category">${p.category} • ${p.urgency}</div>
                </div>
            `).join('');
        },
        
        // API for case integration
        getECGForCase(caseId) {
            const map = {
                'chest-pain': ['stemi-anterior', 'stemi-inferior', 'lbbb', 'normal'],
                'pulmonary-embolism': ['pe', 'normal'],
                'syncope-arrhythmia': ['vt', 'afib-rvr'],
                'acute-kidney-injury': ['hyperkalemia'],
                'palpitations': ['afib-rvr', 'vt', 'normal']
            };
            return map[caseId] || ['normal'];
        }
    };
    
    document.addEventListener('DOMContentLoaded', () => ECGViewer.init());
    window.ECGViewer = ECGViewer;
    </script>
</body>
</html>
