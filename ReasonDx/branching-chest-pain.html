<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branching Case: Chest Pain | ReasonDx</title>
    <style>
        :root {
            --primary: #1E3A5F;
            --primary-light: #2563EB;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --bg: #F8FAFC;
            --card-bg: #FFFFFF;
            --text: #1F2937;
            --text-light: #6B7280;
            --border: #E5E7EB;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-title {
            font-size: 1.3rem;
            font-weight: 600;
        }
        
        .header-subtitle {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .header-stats {
            display: flex;
            gap: 24px;
        }
        
        .stat {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .stat-label {
            font-size: 0.75rem;
            opacity: 0.8;
        }
        
        /* Main Container */
        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px;
        }
        
        /* Progress Path */
        .progress-path {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .path-node {
            background: var(--primary-light);
            color: white;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .path-arrow {
            color: var(--text-light);
        }
        
        /* Stage Card */
        .stage-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            margin-bottom: 24px;
        }
        
        .stage-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stage-title {
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .stage-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .stage-badge.critical { background: #FEE2E2; color: var(--danger); }
        .stage-badge.important { background: #FEF3C7; color: #B45309; }
        .stage-badge.standard { background: #E0F2FE; color: #0369A1; }
        
        .stage-content {
            padding: 24px;
        }
        
        /* Patient Presentation */
        .presentation {
            background: linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            border-left: 4px solid var(--primary-light);
        }
        
        .presentation-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary-light);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .presentation-text {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text);
        }
        
        /* Vitals */
        .vitals {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .vital {
            background: var(--bg);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }
        
        .vital-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text);
        }
        
        .vital-value.abnormal { color: var(--danger); }
        
        .vital-label {
            font-size: 0.75rem;
            color: var(--text-light);
        }
        
        /* Decision Section */
        .decision-section {
            margin-top: 24px;
        }
        
        .decision-prompt {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--primary);
        }
        
        .decisions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .decision-btn {
            background: white;
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .decision-btn:hover {
            border-color: var(--primary-light);
            background: #F8FAFF;
            transform: translateX(4px);
        }
        
        .decision-btn.selected {
            border-color: var(--primary-light);
            background: #EEF2FF;
        }
        
        .decision-icon {
            width: 40px;
            height: 40px;
            background: var(--bg);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        
        .decision-text {
            flex: 1;
        }
        
        .decision-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .decision-desc {
            font-size: 0.9rem;
            color: var(--text-light);
        }
        
        .decision-arrow {
            color: var(--text-light);
            font-size: 1.2rem;
        }
        
        /* Feedback Panel */
        .feedback-panel {
            margin-top: 24px;
            border-radius: 12px;
            padding: 20px;
            display: none;
        }
        
        .feedback-panel.show { display: block; }
        
        .feedback-panel.optimal {
            background: linear-gradient(135deg, #ECFDF5 0%, #D1FAE5 100%);
            border-left: 4px solid var(--success);
        }
        
        .feedback-panel.suboptimal {
            background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%);
            border-left: 4px solid var(--warning);
        }
        
        .feedback-panel.poor {
            background: linear-gradient(135deg, #FEE2E2 0%, #FECACA 100%);
            border-left: 4px solid var(--danger);
        }
        
        .feedback-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .feedback-icon { font-size: 1.5rem; }
        
        .feedback-title {
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .feedback-text {
            line-height: 1.6;
            margin-bottom: 16px;
        }
        
        .feedback-teaching {
            background: rgba(255,255,255,0.6);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.9rem;
        }
        
        .feedback-teaching-label {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 6px;
        }
        
        /* Continue Button */
        .continue-btn {
            background: var(--primary-light);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
        }
        
        .continue-btn:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }
        
        /* Outcome Card */
        .outcome-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 32px;
            text-align: center;
        }
        
        .outcome-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        
        .outcome-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .outcome-card.good .outcome-title { color: var(--success); }
        .outcome-card.fair .outcome-title { color: var(--warning); }
        .outcome-card.poor .outcome-title { color: var(--danger); }
        
        .outcome-summary {
            color: var(--text-light);
            margin-bottom: 24px;
            line-height: 1.6;
        }
        
        .outcome-stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 24px;
        }
        
        .outcome-stat-value {
            font-size: 2rem;
            font-weight: 700;
        }
        
        .outcome-stat-label {
            font-size: 0.85rem;
            color: var(--text-light);
        }
        
        .outcome-lessons {
            background: var(--bg);
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            margin-bottom: 24px;
        }
        
        .outcome-lessons h4 {
            margin-bottom: 12px;
            color: var(--primary);
        }
        
        .outcome-lessons ul {
            margin-left: 20px;
            color: var(--text-light);
            line-height: 1.8;
        }
        
        .restart-btn {
            background: var(--primary-light);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-right: 12px;
        }
        
        .restart-btn:hover {
            background: var(--primary);
        }
        
        .try-different-btn {
            background: white;
            color: var(--primary-light);
            border: 2px solid var(--primary-light);
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Timer Warning */
        .timer-warning {
            background: #FEF3C7;
            border: 1px solid #F59E0B;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: #B45309;
        }
        
        .timer-warning.critical {
            background: #FEE2E2;
            border-color: var(--danger);
            color: #B91C1C;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        /* Hidden */
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div>
            <div class="header-title">🫀 Branching Case: Chest Pain</div>

        <!-- Stage Content - Dynamically Rendered -->
        <div id="stageContainer"></div>

    <script>
        // ===========================================
        // BRANCHING CASE: CHEST PAIN / ACS

        const caseData = {
            id: "acs-branch-001",
            title: "Chest Pain - Critical Decisions",

            // Starting state
            initialState: {

                    vitals: {

                    },
                    prompt: "What is your first priority?",
                    decisions: [
                        {
                            id: "ecg_first",

                                teaching: "ACC/AHA guidelines recommend ECG within 10 minutes for all patients with suspected ACS. Time is myocardium - every minute of delay results in more cardiac cell death."

                            stateChanges: { ecgOrdered: true }

                        {
                            id: "full_history",

                            title: "Complete detailed history",

                    ]
                },
                
                // STAGE 2A: ECG Shows STEMI
                ecg_result_stemi: {
                    id: "ecg_result_stemi",
                    title: "ECG Results",
                    badge: { type: "critical", text: "🚨 Critical Finding" },
                    presentation: `The ECG is completed within 5 minutes of arrival.

**ECG Findings:**
- Sinus rhythm at 96 bpm
- ST elevation in leads V1-V4 (2-3mm)
- Reciprocal ST depression in leads II, III, aVF
- No prior ECG available for comparison

The pattern is consistent with an acute anterior STEMI.`,
                    vitals: {
                        hr: { value: 96, label: "HR", unit: "bpm", abnormal: true },
                        bp: { value: "145/88", label: "BP", unit: "mmHg", abnormal: true },
                        rr: { value: 20, label: "RR", unit: "/min", abnormal: false },

                            feedback: {
                                title: "Excellent Medical Management!",
                                text: "This is the correct medication bundle for STEMI going to cath lab. Aspirin was already given by EMS. Adding heparin (anticoagulation), a P2Y12 inhibitor (dual antiplatelet therapy), and high-intensity statin optimizes outcomes.",
                                teaching: "STEMI medications pre-cath: Aspirin (given), P2Y12 inhibitor (ticagrelor or clopidogrel), anticoagulation (heparin), and high-intensity statin. Beta-blockers are given if no contraindications after stabilization."
                            },
                            stateChanges: { heparinGiven: true }
                        },
                        {
                            id: "just_heparin",
                            icon: "💉",
                            title: "Heparin only",
                            description: "Anticoagulation for the cath lab",
                            next: "good_outcome",
                            quality: "suboptimal",
                            feedback: {
                                title: "Incomplete",
                                text: "Heparin is appropriate, but you're missing the P2Y12 inhibitor which is recommended pre-cath for STEMI. Dual antiplatelet therapy improves outcomes after stenting.",
                                teaching: "Don't forget dual antiplatelet therapy (DAPT) - aspirin + P2Y12 inhibitor. This is standard of care for STEMI patients undergoing PCI."
                            },
                            stateChanges: { heparinGiven: true }
                        },
                        {
                            id: "beta_blocker",
                            icon: "❤️",
                            title: "IV metoprolol",
                            description: "Beta-blocker to reduce myocardial oxygen demand",
                            next: "good_outcome",
                            quality: "suboptimal",
                            feedback: {
                                title: "Not the Priority",
                                text: "Beta-blockers are part of ACS management but are typically given after stabilization, not urgently pre-cath. They're contraindicated if there's concern for cardiogenic shock. Anticoagulation and DAPT are higher priority.",
                                teaching: "Beta-blockers should be given within 24 hours if no contraindications (heart failure, hypotension, bradycardia, heart block). They're not the immediate pre-cath priority."
                            },
                            stateChanges: {}
                        }
                    ]
                },
                
                // STAGE 3B: Delayed ECG showing STEMI
                delayed_ecg_stemi: {
                    id: "delayed_ecg_stemi",
                    title: "Delayed ECG Results",
                    badge: { type: "critical", text: "🚨 STEMI Confirmed" },
                    presentation: `The ECG finally shows:
- ST elevation in V1-V4 (3-4mm, more pronounced than typical)
- New Q waves forming in V2-V3
- Reciprocal changes in inferior leads

The delay has allowed the infarct to evolve. Door time is now 30+ minutes.`,
                    vitals: {
                        hr: { value: 108, label: "HR", unit: "bpm", abnormal: true },
                        bp: { value: "118/72", label: "BP", unit: "mmHg", abnormal: false },
                        rr: { value: 24, label: "RR", unit: "/min", abnormal: true },
                        o2: { value: 93, label: "SpO2", unit: "%", abnormal: true }
                    },
                    timer: { warning: "Door-to-balloon goal at risk!", critical: true },
                    prompt: "STEMI confirmed with significant delay. What now?",
                    decisions: [
                        {
                            id: "emergent_cath",
                            icon: "🏥",
                            title: "Emergent cath lab activation",
                            description: "Activate cath lab immediately despite delay",
                            next: "delayed_outcome",
                            quality: "optimal",
                            feedback: {
                                title: "Correct - But Time Lost",
                                text: "Cath lab activation is still the right call. However, the delay has likely resulted in more myocardial damage. Q waves are already forming, indicating transmural infarction.",
                                teaching: "Even with delays, primary PCI is still preferred if door-to-balloon can be <120 minutes. The patient may have worse outcomes than if the ECG had been done immediately."
                            },
                            stateChanges: { cathLabActivated: true }
                        }
                    ]
                },
                
                // STAGE 3C: Troponin Delay - Patient Deteriorates
                troponin_delay: {
                    id: "troponin_delay",
                    title: "While Waiting for Troponin...",
                    badge: { type: "critical", text: "🚨 Emergency" },
                    presentation: `While waiting for the troponin to result, the patient suddenly clutches his chest and becomes unresponsive.

The monitor shows ventricular fibrillation!

Time wasted waiting for troponin: 35 minutes
Total ischemia time: now 3+ hours`,
                    vitals: {
                        hr: { value: "V-Fib", label: "Rhythm", unit: "", abnormal: true },
                        bp: { value: "--/--", label: "BP", unit: "mmHg", abnormal: true },
                        rr: { value: 0, label: "RR", unit: "/min", abnormal: true },
                        o2: { value: "--", label: "SpO2", unit: "%", abnormal: true }
                    },
                    prompt: "The patient is in cardiac arrest!",
                    decisions: [
                        {
                            id: "start_cpr",
                            icon: "🫀",
                            title: "Begin CPR and ACLS protocol",
                            description: "Initiate resuscitation",
                            next: "arrest_outcome",
                            quality: "optimal",
                            feedback: {
                                title: "Resuscitation Initiated",
                                text: "You begin high-quality CPR. The patient is defibrillated and achieves ROSC after 8 minutes. However, the prolonged ischemia time and arrest have significantly worsened the prognosis.",
                                teaching: "This was preventable. If the cath lab had been activated immediately upon seeing STEMI, the patient would likely not have arrested. V-fib is a common complication of acute MI, especially with prolonged ischemia."
                            },
                            stateChanges: { patientStatus: "critical" }
                        }
                    ]
                },
                
                // STAGE 4: Missed STEMI
                missed_stemi: {
                    id: "missed_stemi",
                    title: "Catastrophic Error",
                    badge: { type: "critical", text: "❌ Missed Diagnosis" },
                    presentation: `The patient is transferred to the telemetry floor with a diagnosis of "NSTEMI."

Two hours later, the floor nurse calls a rapid response. The patient is in cardiogenic shock with a new ECG showing completed anterior MI with Q waves throughout the precordium.

Emergency cath reveals 100% LAD occlusion with extensive myocardial damage. Despite intervention, the patient develops cardiogenic shock requiring mechanical support.`,
                    vitals: {
                        hr: { value: 120, label: "HR", unit: "bpm", abnormal: true },
                        bp: { value: "78/50", label: "BP", unit: "mmHg", abnormal: true },
                        rr: { value: 32, label: "RR", unit: "/min", abnormal: true },
                        o2: { value: 85, label: "SpO2", unit: "%", abnormal: true }
                    },
                    prompt: "This patient has suffered a devastating outcome.",
                    decisions: [
                        {
                            id: "review_case",
                            icon: "📚",
                            title: "Review what went wrong",
                            description: "Understand the critical errors",
                            next: "poor_outcome",
                            quality: "neutral",
                            feedback: {
                                title: "Learning from Error",
                                text: "The failure to obtain an ECG before making a diagnosis led to a missed STEMI. This patient needed emergent cath lab activation hours ago. The delay resulted in cardiogenic shock and will likely lead to heart failure, prolonged hospitalization, or death.",
                                teaching: "KEY LESSON: Never diagnose NSTEMI without first ruling out STEMI with an ECG. In chest pain with cardiac risk factors, ECG is ALWAYS the first priority."
                            },
                            stateChanges: {}
                        }
                    ]
                },
                
                // OUTCOMES
                optimal_outcome: {
                    id: "optimal_outcome",
                    type: "outcome",
                    quality: "good",
                    icon: "🎉",
                    title: "Excellent Outcome!",
                    summary: "The patient underwent successful primary PCI with stent placement to the LAD. Door-to-balloon time was 52 minutes. Troponin peaked at 15 ng/mL. Echocardiogram showed mild anterior hypokinesis with EF 50%. Patient was discharged on day 3 with excellent prognosis.",
                    stats: {
                        doorToBalloon: "52 min",
                        lvFunction: "Preserved",
                        hospitalStay: "3 days"
                    },
                    lessons: [
                        "Immediate ECG in chest pain allows rapid STEMI identification",
                        "Early cath lab activation keeps door-to-balloon time <90 minutes",
                        "Complete ACS medication bundle optimizes outcomes",
                        "Time is myocardium - every minute counts"
                    ]
                },
                
                good_outcome: {
                    id: "good_outcome",
                    type: "outcome",
                    quality: "good",
                    icon: "✅",
                    title: "Good Outcome",
                    summary: "The patient underwent successful PCI. Door-to-balloon time was 68 minutes. Some suboptimal medication choices, but overall good care. Troponin peaked at 22 ng/mL. EF 45% with moderate anterior hypokinesis. Discharged day 4.",
                    stats: {
                        doorToBalloon: "68 min",
                        lvFunction: "Mildly Reduced",
                        hospitalStay: "4 days"
                    },
                    lessons: [
                        "Good ECG prioritization led to timely diagnosis",
                        "Consider complete ACS medication bundle pre-cath",
                        "Outcome was good but could be optimized with guideline-directed therapy"
                    ]
                },
                
                delayed_outcome: {
                    id: "delayed_outcome",
                    type: "outcome",
                    quality: "fair",
                    icon: "⚠️",
                    title: "Suboptimal Outcome",
                    summary: "The patient underwent PCI but door-to-balloon time was 95 minutes due to initial delays. Troponin peaked at 45 ng/mL indicating larger infarct. EF 35% with moderate-severe anterior wall motion abnormality. Required 6-day hospitalization and will need close heart failure follow-up.",
                    stats: {
                        doorToBalloon: "95 min",
                        lvFunction: "Reduced",
                        hospitalStay: "6 days"
                    },
                    lessons: [
                        "Initial delay in obtaining ECG cost valuable time",
                        "Larger infarct size due to prolonged ischemia",
                        "Patient now at higher risk for heart failure",
                        "LESSON: ECG should be first priority in chest pain"
                    ]
                },
                
                arrest_outcome: {
                    id: "arrest_outcome",
                    type: "outcome",
                    quality: "poor",
                    icon: "😔",
                    title: "Poor Outcome",
                    summary: "After ROSC was achieved, the patient underwent emergent PCI. However, the combination of prolonged ischemia and cardiac arrest resulted in significant myocardial damage. EF 25%, requiring inotropic support. Patient developed cardiogenic shock and required 14-day ICU stay with IABP support. Will likely need ICD placement and has high risk of mortality.",
                    stats: {
                        doorToBalloon: "130+ min",
                        lvFunction: "Severely Reduced",
                        hospitalStay: "14+ days ICU"
                    },
                    lessons: [
                        "Waiting for troponin when STEMI is on ECG is never appropriate",
                        "Prolonged ischemia leads to larger infarcts and arrhythmias",
                        "This arrest was potentially preventable with immediate cath lab activation",
                        "CRITICAL: STEMI = immediate reperfusion, no delays for lab confirmation"
                    ]
                },
                
                poor_outcome: {
                    id: "poor_outcome",
                    type: "outcome",
                    quality: "poor",
                    icon: "❌",
                    title: "Devastating Outcome",
                    summary: "The missed STEMI resulted in cardiogenic shock. Despite late PCI and mechanical circulatory support, the patient developed multiorgan failure. After a prolonged ICU course, the patient expired on hospital day 12. A root cause analysis identified failure to obtain timely ECG as the primary systems failure.",
                    stats: {
                        doorToBalloon: ">6 hours",
                        lvFunction: "Cardiogenic Shock",
                        hospitalStay: "Expired Day 12"
                    },
                    lessons: [
                        "NEVER diagnose NSTEMI without ruling out STEMI first",
                        "ECG must be obtained within 10 minutes of arrival for chest pain",
                        "Elevated troponin does NOT tell you STEMI vs NSTEMI - only ECG does",
                        "This death was preventable with basic chest pain protocols"
                    ]
                }
            }
        };
        
        // ===========================================
        // GAME STATE
        // ===========================================
        
        let gameState = {
            currentStage: "initial",
            path: ["Start"],
            decisions: [],
            score: 100,
            startTime: Date.now(),
            patientState: { ...caseData.initialState }
        };
        
        // ===========================================
        // RENDER FUNCTIONS
        // ===========================================
        
        function renderStage(stageId) {
            const stage = caseData.stages[stageId];
            const container = document.getElementById('stageContainer');
            
            if (stage.type === "outcome") {
                renderOutcome(stage);
                return;
            }
            
            let vitalsHtml = '';
            if (stage.vitals) {
                vitalsHtml = `
                    <div class="vitals">
                        ${Object.values(stage.vitals).map(v => `
                            <div class="vital">
                                <div class="vital-value ${v.abnormal ? 'abnormal' : ''}">${v.value}</div>
                                <div class="vital-label">${v.label} ${v.unit}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            let timerHtml = '';
            if (stage.timer) {
                timerHtml = `
                    <div class="timer-warning ${stage.timer.critical ? 'critical' : ''}">
                        ⏱️ ${stage.timer.warning}
                    </div>
                `;
            }
            
            container.innerHTML = `
                <div class="stage-card">
                    <div class="stage-header">
                        <h2 class="stage-title">${stage.title}</h2>
                        <span class="stage-badge ${stage.badge.type}">${stage.badge.text}</span>
                    </div>
                    <div class="stage-content">
                        ${timerHtml}
                        <div class="presentation">
                            <div class="presentation-label">📋 Clinical Situation</div>
                            <div class="presentation-text">${stage.presentation.replace(/\n/g, '<br>')}</div>
                        </div>
                        ${vitalsHtml}
                        <div class="decision-section">
                            <div class="decision-prompt">${stage.prompt}</div>
                            <div class="decisions">
                                ${stage.decisions.map((d, i) => `
                                    <button class="decision-btn" data-index="${i}" onclick="selectDecision(${i})">
                                        <div class="decision-icon">${d.icon}</div>
                                        <div class="decision-text">
                                            <div class="decision-title">${d.title}</div>
                                            <div class="decision-desc">${d.description}</div>
                                        </div>
                                        <div class="decision-arrow">→</div>
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                        <div class="feedback-panel" id="feedbackPanel"></div>
                    </div>
                </div>
            `;
        }
        
        function renderOutcome(outcome) {
            const container = document.getElementById('stageContainer');
            
            container.innerHTML = `
                <div class="outcome-card ${outcome.quality}">
                    <div class="outcome-icon">${outcome.icon}</div>
                    <h2 class="outcome-title">${outcome.title}</h2>
                    <p class="outcome-summary">${outcome.summary}</p>
                    
                    <div class="outcome-stats">
                        <div class="outcome-stat">
                            <div class="outcome-stat-value">${outcome.stats.doorToBalloon}</div>
                            <div class="outcome-stat-label">Door-to-Balloon</div>
                        </div>
                        <div class="outcome-stat">
                            <div class="outcome-stat-value">${outcome.stats.lvFunction}</div>
                            <div class="outcome-stat-label">LV Function</div>
                        </div>
                        <div class="outcome-stat">
                            <div class="outcome-stat-value">${outcome.stats.hospitalStay}</div>
                            <div class="outcome-stat-label">Hospital Stay</div>
                        </div>
                    </div>
                    
                    <div class="outcome-lessons">
                        <h4>📚 Key Lessons</h4>
                        <ul>
                            ${outcome.lessons.map(l => `<li>${l}</li>`).join('')}
                        </ul>
                    </div>
                    
                    <button class="restart-btn" onclick="restartCase()">🔄 Try Again</button>
                    <button class="try-different-btn" onclick="window.location.href='case-generator.html'">🎲 Try Random Variation</button>
                </div>
            `;
            
            // Update final score
            document.getElementById('scoreDisplay').textContent = calculateFinalScore();
        }
        
        function selectDecision(index) {
            const stage = caseData.stages[gameState.currentStage];
            const decision = stage.decisions[index];
            
            // Mark selected
            document.querySelectorAll('.decision-btn').forEach(btn => btn.classList.remove('selected'));
            document.querySelectorAll('.decision-btn')[index].classList.add('selected');
            
            // Update score based on quality
            if (decision.quality === 'optimal') gameState.score += 0;
            else if (decision.quality === 'suboptimal') gameState.score -= 15;
            else if (decision.quality === 'poor') gameState.score -= 30;
            
            // Show feedback
            const feedbackPanel = document.getElementById('feedbackPanel');
            feedbackPanel.className = `feedback-panel show ${decision.quality}`;
            feedbackPanel.innerHTML = `
                <div class="feedback-header">
                    <span class="feedback-icon">${decision.quality === 'optimal' ? '✅' : decision.quality === 'suboptimal' ? '⚠️' : '❌'}</span>
                    <span class="feedback-title">${decision.feedback.title}</span>
                </div>
                <p class="feedback-text">${decision.feedback.text}</p>
                <div class="feedback-teaching">
                    <div class="feedback-teaching-label">💡 Teaching Point</div>
                    ${decision.feedback.teaching}
                </div>
                <button class="continue-btn" onclick="continueToNext('${decision.next}', '${decision.title}')">Continue →</button>
            `;
            
            // Update state
            if (decision.stateChanges) {
                Object.assign(gameState.patientState, decision.stateChanges);
            }
            
            gameState.decisions.push({
                stage: gameState.currentStage,
                choice: decision.id,
                quality: decision.quality
            });
            
            document.getElementById('decisionCount').textContent = gameState.decisions.length;
        }
        
        function continueToNext(nextStage, decisionTitle) {
            gameState.path.push(decisionTitle);
            gameState.currentStage = nextStage;
            
            // Update path display
            document.getElementById('progressPath').innerHTML = gameState.path.map(p => 
                `<span class="path-node">${p}</span>`
            ).join('<span class="path-arrow">→</span>');
            
            renderStage(nextStage);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function calculateFinalScore() {
            const optimal = gameState.decisions.filter(d => d.quality === 'optimal').length;
            const total = gameState.decisions.length;
            const percentage = Math.round((optimal / total) * 100);
            return `${percentage}%`;
        }
        
        function restartCase() {
            gameState = {
                currentStage: "initial",
                path: ["Start"],
                decisions: [],
                score: 100,
                startTime: Date.now(),
                patientState: { ...caseData.initialState }
            };
            
            document.getElementById('progressPath').innerHTML = '<span class="path-node">Start</span>';
            document.getElementById('decisionCount').textContent = '0';
            document.getElementById('scoreDisplay').textContent = '--';
            
            renderStage('initial');
        }
        
        // Timer
        setInterval(() => {
            const elapsed = Math.floor((Date.now() - gameState.startTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            document.getElementById('timeElapsed').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
        
        // Initialize
        renderStage('initial');
    </script>
</body>
</html>
