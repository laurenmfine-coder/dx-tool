<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branching Case: Chest Pain | ReasonDx</title>
    <style>
        :root {
            --primary: #1E3A5F;
            --primary-light: #2563EB;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --bg: #F8FAFC;
            --card-bg: #FFFFFF;
            --text: #1F2937;
            --text-light: #6B7280;
            --border: #E5E7EB;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .header-title { font-size: 1.3rem; font-weight: 600; }
        .header-subtitle { font-size: 0.9rem; opacity: 0.8; }
        
        .header-stats { display: flex; gap: 24px; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-label { font-size: 0.75rem; opacity: 0.8; }
        
        /* Main Container */
        .main { max-width: 900px; margin: 0 auto; padding: 32px; }
        
        /* Progress Path */
        .progress-path {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .path-node {
            background: var(--primary-light);
            color: white;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .path-arrow { color: var(--text-light); }
        
        /* Stage Card */
        .stage-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            margin-bottom: 24px;
        }
        
        .stage-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stage-title { font-size: 1.2rem; font-weight: 600; }
        
        .stage-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .stage-badge.critical { background: #FEE2E2; color: var(--danger); }
        .stage-badge.important { background: #FEF3C7; color: #B45309; }
        .stage-badge.standard { background: #E0F2FE; color: #0369A1; }
        
        .stage-content { padding: 24px; }
        
        /* Patient Presentation */
        .presentation {
            background: linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            border-left: 4px solid var(--primary-light);
        }
        
        .presentation-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary-light);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .presentation-text {
            font-size: 1.05rem;
            line-height: 1.7;
            color: var(--text);
        }
        
        /* Vitals */
        .vitals {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .vital {
            background: var(--bg);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }
        
        .vital-value { font-size: 1.2rem; font-weight: 700; color: var(--text); }
        .vital-value.abnormal { color: var(--danger); }
        .vital-label { font-size: 0.75rem; color: var(--text-light); }
        
        /* Decision Section */
        .decision-section { margin-top: 24px; }
        
        .decision-prompt {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--primary);
        }
        
        .decisions { display: flex; flex-direction: column; gap: 12px; }
        
        .decision-btn {
            background: white;
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .decision-btn:hover {
            border-color: var(--primary-light);
            background: #F8FAFF;
            transform: translateX(4px);
        }
        
        .decision-btn.selected {
            border-color: var(--primary-light);
            background: #EEF2FF;
        }
        
        .decision-icon {
            width: 40px;
            height: 40px;
            background: var(--bg);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        
        .decision-text { flex: 1; }
        .decision-title { font-weight: 600; margin-bottom: 4px; }
        .decision-desc { font-size: 0.9rem; color: var(--text-light); }
        .decision-arrow { color: var(--text-light); font-size: 1.2rem; }
        
        /* Feedback Panel */
        .feedback-panel {
            margin-top: 24px;
            border-radius: 12px;
            padding: 20px;
            display: none;
        }
        
        .feedback-panel.show { display: block; }
        
        .feedback-panel.optimal {
            background: linear-gradient(135deg, #ECFDF5 0%, #D1FAE5 100%);
            border-left: 4px solid var(--success);
        }
        
        .feedback-panel.suboptimal {
            background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%);
            border-left: 4px solid var(--warning);
        }
        
        .feedback-panel.poor {
            background: linear-gradient(135deg, #FEE2E2 0%, #FECACA 100%);
            border-left: 4px solid var(--danger);
        }
        
        .feedback-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        
        .feedback-icon { font-size: 1.5rem; }
        .feedback-title { font-weight: 600; font-size: 1.1rem; }
        .feedback-text { line-height: 1.6; margin-bottom: 16px; }
        
        .feedback-teaching {
            background: rgba(255,255,255,0.6);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        
        .feedback-teaching-label {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 6px;
        }
        
        /* Resources Section */
        .resources-section {
            margin-top: 12px;
        }
        
        .resources-toggle {
            background: rgba(255,255,255,0.8);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--primary);
            transition: all 0.2s;
        }
        
        .resources-toggle:hover {
            background: rgba(255,255,255,1);
        }
        
        .resources-toggle-icon {
            transition: transform 0.2s;
        }
        
        .resources-toggle.open .resources-toggle-icon {
            transform: rotate(180deg);
        }
        
        .resources-list {
            display: none;
            margin-top: 10px;
            background: rgba(255,255,255,0.9);
            border-radius: 8px;
            padding: 12px;
        }
        
        .resources-list.show {
            display: block;
        }
        
        .resource-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .resource-item:last-child {
            border-bottom: none;
        }
        
        .resource-icon {
            font-size: 1rem;
            flex-shrink: 0;
            margin-top: 2px;
        }
        
        .resource-content {
            flex: 1;
        }
        
        .resource-link {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
        }
        
        .resource-link:hover {
            text-decoration: underline;
        }
        
        .resource-desc {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 2px;
        }
        
        .resource-badge {
            display: inline-block;
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .resource-badge.guideline {
            background: #DBEAFE;
            color: #1E40AF;
        }
        
        .resource-badge.pubmed {
            background: #FEE2E2;
            color: #991B1B;
        }
        
        /* Continue Button */
        .continue-btn {
            background: var(--primary-light);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
        }
        
        .continue-btn:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }
        
        /* Outcome Card */
        .outcome-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 32px;
            text-align: center;
        }
        
        .outcome-icon { font-size: 4rem; margin-bottom: 16px; }
        .outcome-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
        
        .outcome-card.good .outcome-title { color: var(--success); }
        .outcome-card.fair .outcome-title { color: var(--warning); }
        .outcome-card.poor .outcome-title { color: var(--danger); }
        
        .outcome-summary {
            color: var(--text-light);
            margin-bottom: 24px;
            line-height: 1.6;
        }
        
        .outcome-stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .outcome-stat-value { font-size: 2rem; font-weight: 700; }
        .outcome-stat-label { font-size: 0.85rem; color: var(--text-light); }
        
        .outcome-lessons {
            background: var(--bg);
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            margin-bottom: 24px;
        }
        
        .outcome-lessons h4 { margin-bottom: 12px; color: var(--primary); }
        .outcome-lessons ul { margin-left: 20px; color: var(--text-light); line-height: 1.8; }
        
        .outcome-resources {
            background: #EEF2FF;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            margin-bottom: 24px;
        }
        
        .outcome-resources h4 {
            margin-bottom: 12px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .restart-btn {
            background: var(--primary-light);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-right: 12px;
        }
        
        .restart-btn:hover { background: var(--primary); }
        
        .try-different-btn {
            background: white;
            color: var(--primary-light);
            border: 2px solid var(--primary-light);
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        /* Timer Warning */
        .timer-warning {
            background: #FEF3C7;
            border: 1px solid #F59E0B;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: #B45309;
        }
        
        .timer-warning.critical {
            background: #FEE2E2;
            border-color: var(--danger);
            color: #B91C1C;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .hidden { display: none !important; }
        
        @media (max-width: 600px) {
            .header { padding: 16px; }
            .main { padding: 16px; }
            .outcome-stats { gap: 16px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div>
            <div class="header-title">🫀 Branching Case: Chest Pain</div>
            <div class="header-subtitle">Your decisions shape the outcome</div>
        </div>
        <div class="header-stats">
            <div class="stat">
                <div class="stat-value" id="timeElapsed">0:00</div>
                <div class="stat-label">Time Elapsed</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="decisionCount">0</div>
                <div class="stat-label">Decisions</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="scoreDisplay">--</div>
                <div class="stat-label">Performance</div>
            </div>
        </div>
    </header>
    
    <main class="main">
        <div class="progress-path" id="progressPath">
            <span class="path-node">Start</span>
        </div>
        <div id="stageContainer"></div>
    </main>
    
    <script>
        // ===========================================
        // EVIDENCE-BASED RESOURCES DATABASE
        // ===========================================
        
        const resources = {
            ecg_timing: [
                {
                    type: "guideline",
                    title: "2021 ACC/AHA/SCAI Guideline for Coronary Artery Revascularization",
                    url: "https://www.ahajournals.org/doi/10.1161/CIR.0000000000001038",
                    desc: "Section 4.1: ECG within 10 minutes of first medical contact"
                },
                {
                    type: "pubmed",
                    title: "De Luca G, et al. Time delay to treatment and mortality in STEMI",
                    url: "https://pubmed.ncbi.nlm.nih.gov/14662259/",
                    desc: "Circulation 2004 - Every 30-min delay increases mortality 7.5%"
                }
            ],
            stemi_management: [
                {
                    type: "guideline",
                    title: "2013 ACCF/AHA STEMI Guidelines",
                    url: "https://www.ahajournals.org/doi/10.1161/CIR.0b013e3182742cf6",
                    desc: "Primary PCI is recommended for STEMI if door-to-balloon <90 min"
                },
                {
                    type: "guideline",
                    title: "2017 ESC STEMI Guidelines",
                    url: "https://academic.oup.com/eurheartj/article/39/2/119/4095042",
                    desc: "European Society of Cardiology recommendations"
                },
                {
                    type: "pubmed",
                    title: "Keeley EC, et al. Primary PCI vs Fibrinolysis Meta-analysis",
                    url: "https://pubmed.ncbi.nlm.nih.gov/12517460/",
                    desc: "Lancet 2003 - PCI superior to fibrinolysis for STEMI"
                }
            ],
            door_to_balloon: [
                {
                    type: "guideline",
                    title: "ACC Door-to-Balloon Initiative",
                    url: "https://www.acc.org/tools-and-practice-support/quality-programs/d2b-alliance",
                    desc: "Target <90 minutes from first medical contact to balloon"
                },
                {
                    type: "pubmed",
                    title: "Nallamothu BK, et al. Times to Treatment in STEMI",
                    url: "https://pubmed.ncbi.nlm.nih.gov/17954541/",
                    desc: "NEJM 2007 - Association of door-to-balloon time with mortality"
                }
            ],
            acs_medications: [
                {
                    type: "guideline",
                    title: "2016 ACC/AHA Guideline on Duration of DAPT",
                    url: "https://www.ahajournals.org/doi/10.1161/CIR.0000000000000404",
                    desc: "Dual antiplatelet therapy recommendations for ACS"
                },
                {
                    type: "pubmed",
                    title: "Wallentin L, et al. Ticagrelor vs Clopidogrel (PLATO)",
                    url: "https://pubmed.ncbi.nlm.nih.gov/19717846/",
                    desc: "NEJM 2009 - Ticagrelor reduces CV events vs clopidogrel"
                },
                {
                    type: "pubmed",
                    title: "Yusuf S, et al. Clopidogrel in ACS (CURE Trial)",
                    url: "https://pubmed.ncbi.nlm.nih.gov/11519503/",
                    desc: "NEJM 2001 - Benefits of clopidogrel + aspirin in ACS"
                }
            ],
            troponin_timing: [
                {
                    type: "guideline",
                    title: "2020 ESC NSTE-ACS Guidelines",
                    url: "https://academic.oup.com/eurheartj/article/42/14/1289/5898842",
                    desc: "High-sensitivity troponin algorithms for diagnosis"
                },
                {
                    type: "pubmed",
                    title: "Reichlin T, et al. Early Diagnosis of MI Using hs-Troponin",
                    url: "https://pubmed.ncbi.nlm.nih.gov/19652124/",
                    desc: "NEJM 2009 - High-sensitivity troponin for early detection"
                }
            ],
            fibrinolysis: [
                {
                    type: "guideline",
                    title: "2013 ACCF/AHA STEMI Guidelines - Fibrinolysis Section",
                    url: "https://www.ahajournals.org/doi/10.1161/CIR.0b013e3182742cf6",
                    desc: "Fibrinolysis when PCI cannot be performed within 120 min"
                },
                {
                    type: "pubmed",
                    title: "Armstrong PW, et al. STREAM Trial",
                    url: "https://pubmed.ncbi.nlm.nih.gov/23477396/",
                    desc: "NEJM 2013 - Pharmacoinvasive strategy vs primary PCI"
                }
            ],
            vfib_stemi: [
                {
                    type: "pubmed",
                    title: "Mehta RH, et al. Ventricular arrhythmias in STEMI",
                    url: "https://pubmed.ncbi.nlm.nih.gov/19808470/",
                    desc: "Circulation 2009 - V-fib incidence and timing in STEMI"
                },
                {
                    type: "guideline",
                    title: "2020 AHA ACLS Guidelines",
                    url: "https://www.ahajournals.org/doi/10.1161/CIR.0000000000000916",
                    desc: "Cardiac arrest management algorithms"
                }
            ],
            cardiogenic_shock: [
                {
                    type: "pubmed",
                    title: "Hochman JS, et al. SHOCK Trial",
                    url: "https://pubmed.ncbi.nlm.nih.gov/10451459/",
                    desc: "NEJM 1999 - Early revascularization in cardiogenic shock"
                },
                {
                    type: "guideline",
                    title: "2017 AHA Scientific Statement on Cardiogenic Shock",
                    url: "https://www.ahajournals.org/doi/10.1161/CIR.0000000000000525",
                    desc: "Contemporary management of cardiogenic shock"
                }
            ]
        };
        
        function renderResources(resourceKeys) {
            const allResources = [];
            resourceKeys.forEach(key => {
                if (resources[key]) {
                    allResources.push(...resources[key]);
                }
            });
            
            if (allResources.length === 0) return '';
            
            const resourcesHtml = allResources.map(r => `
                <div class="resource-item">
                    <span class="resource-icon">${r.type === 'guideline' ? '📋' : '📄'}</span>
                    <div class="resource-content">
                        <a href="${r.url}" target="_blank" rel="noopener" class="resource-link">
                            ${r.title}
                            <span class="resource-badge ${r.type}">${r.type === 'guideline' ? 'Guideline' : 'PubMed'}</span>
                        </a>
                        <div class="resource-desc">${r.desc}</div>
                    </div>
                </div>
            `).join('');
            
            return `
                <div class="resources-section">
                    <button class="resources-toggle" onclick="toggleResources(this)">
                        <span>📚 Evidence-Based Resources (${allResources.length})</span>
                        <span class="resources-toggle-icon">▼</span>
                    </button>
                    <div class="resources-list">
                        ${resourcesHtml}
                    </div>
                </div>
            `;
        }
        
        function toggleResources(btn) {
            btn.classList.toggle('open');
            const list = btn.nextElementSibling;
            list.classList.toggle('show');
        }
        
        // ===========================================
        // CASE DATA WITH RESOURCE REFERENCES
        // ===========================================
        
        const caseData = {
            id: "acs-branch-001",
            title: "Chest Pain - Critical Decisions",
            
            initialState: {
                patientStatus: "stable",
                timeFromOnset: 120,
                troponinOrdered: false,
                ecgOrdered: false,
                cathLabActivated: false,
                aspirinGiven: false,
                heparinGiven: false
            },
            
            stages: {
                initial: {
                    id: "initial",
                    title: "Initial Presentation",
                    badge: { type: "critical", text: "⏱️ Time-Sensitive" },
                    presentation: `A 58-year-old man is brought to the Emergency Department by EMS with a chief complaint of chest pain. 
                    
He describes substernal chest pressure that started 2 hours ago while watching TV. The pain radiates to his left arm and jaw. He appears diaphoretic and anxious. He has a history of hypertension and type 2 diabetes. He takes lisinopril and metformin.

EMS gave him aspirin 325mg en route.`,
                    vitals: {
                        hr: { value: 98, label: "HR", unit: "bpm", abnormal: true },
                        bp: { value: "158/94", label: "BP", unit: "mmHg", abnormal: true },
                        rr: { value: 22, label: "RR", unit: "/min", abnormal: true },
                        o2: { value: 94, label: "SpO2", unit: "%", abnormal: true },
                        temp: { value: 98.6, label: "Temp", unit: "°F", abnormal: false }
                    },
                    prompt: "What is your first priority?",
                    decisions: [
                        {
                            id: "ecg_first",
                            icon: "📊",
                            title: "Order stat ECG",
                            description: "Get an ECG immediately to evaluate for STEMI",
                            next: "ecg_result_stemi",
                            quality: "optimal",
                            feedback: {
                                title: "Excellent Prioritization!",
                                text: "In a patient with chest pain and cardiac risk factors, an ECG should be obtained within 10 minutes of arrival. This is the fastest way to identify a STEMI, which requires emergent intervention.",
                                teaching: "ACC/AHA guidelines recommend ECG within 10 minutes for all patients with suspected ACS. Time is myocardium - every minute of delay results in more cardiac cell death.",
                                resources: ["ecg_timing", "stemi_management"]
                            },
                            stateChanges: { ecgOrdered: true }
                        },
                        {
                            id: "full_history",
                            icon: "📋",
                            title: "Complete detailed history",
                            description: "Take a thorough history before ordering tests",
                            next: "history_delay",
                            quality: "suboptimal",
                            feedback: {
                                title: "Time-Sensitive Situation",
                                text: "While history is important, in a patient with classic ACS symptoms, getting an ECG should not be delayed. You can gather history while the ECG is being performed.",
                                teaching: "In suspected STEMI, parallel processing is key. Order the ECG immediately, then continue your assessment while waiting for results.",
                                resources: ["ecg_timing"]
                            },
                            stateChanges: { timeFromOnset: 135 }
                        },
                        {
                            id: "labs_first",
                            icon: "🧪",
                            title: "Order troponin and CBC/BMP",
                            description: "Get comprehensive labs to evaluate",
                            next: "labs_delay",
                            quality: "suboptimal",
                            feedback: {
                                title: "Labs Can Wait",
                                text: "While troponin is important for ACS diagnosis, it takes time to result. In a patient with ongoing symptoms, the ECG provides immediate, actionable information and should come first.",
                                teaching: "Troponin is useful but takes 30-60 minutes to result. ECG takes 2 minutes and can immediately identify STEMI requiring emergent cath lab activation.",
                                resources: ["troponin_timing", "ecg_timing"]
                            },
                            stateChanges: { troponinOrdered: true, timeFromOnset: 130 }
                        }

            feedbackPanel.innerHTML = `
                <div class="feedback-header">
                    <span class="feedback-icon">${decision.quality === 'optimal' ? '✅' : decision.quality === 'suboptimal' ? '⚠️' : '❌'}</span>
                    <span class="feedback-title">${decision.feedback.title}</span>
                </div>
                <p class="feedback-text">${decision.feedback.text}</p>
                <div class="feedback-teaching">
                    <div class="feedback-teaching-label">💡 Teaching Point</div>
                    ${decision.feedback.teaching}
                </div>
                ${resourcesHtml}
                <button class="continue-btn" onclick="continueToNext('${decision.next}', '${decision.title.replace(/'/g, "\\'")}')">Continue →</button>
            `;
            
            if (decision.stateChanges) {
                Object.assign(gameState.patientState, decision.stateChanges);
            }
            
            gameState.decisions.push({
                stage: gameState.currentStage,
                choice: decision.id,
                quality: decision.quality
            });
            
            document.getElementById('decisionCount').textContent = gameState.decisions.length;
        }
        
        function continueToNext(nextStage, decisionTitle) {
            gameState.path.push(decisionTitle);
            gameState.currentStage = nextStage;
            
            document.getElementById('progressPath').innerHTML = gameState.path.map(p => 
                `<span class="path-node">${p}</span>`
            ).join('<span class="path-arrow">→</span>');
            
            renderStage(nextStage);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function calculateFinalScore() {
            const optimal = gameState.decisions.filter(d => d.quality === 'optimal').length;
            const total = gameState.decisions.length;
            return total > 0 ? `${Math.round((optimal / total) * 100)}%` : '--';
        }
        
        function restartCase() {
            gameState = {
                currentStage: "initial",
                path: ["Start"],
                decisions: [],
                score: 100,
                startTime: Date.now(),
                patientState: { ...caseData.initialState }
            };
            
            document.getElementById('progressPath').innerHTML = '<span class="path-node">Start</span>';
            document.getElementById('decisionCount').textContent = '0';
            document.getElementById('scoreDisplay').textContent = '--';
            
            renderStage('initial');
        }
        
        // Timer
        setInterval(() => {
            const elapsed = Math.floor((Date.now() - gameState.startTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            document.getElementById('timeElapsed').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
        
        // Initialize
        renderStage('initial');
    </script>
</body>
</html>
