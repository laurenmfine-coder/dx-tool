<body>
    <div class="container">
        <div class="header">
            <h1>🧪 Predict Labs</h1>
            <p>Given the clinical scenario, predict what lab abnormalities you would expect</p>
        </div>
        
        <div class="category-tabs" id="categoryTabs">
            <button class="category-tab active" data-category="all">All Scenarios</button>
            <button class="category-tab" data-category="metabolic">Metabolic</button>
            <button class="category-tab" data-category="infectious">Infectious</button>
            <button class="category-tab" data-category="cardiac">Cardiac</button>
            <button class="category-tab" data-category="renal">Renal</button>
            <button class="category-tab" data-category="heme">Hematology</button>
            <button class="category-tab" data-category="hepatic">Hepatic</button>
        </div>
        
        <div class="scenarios-grid" id="scenariosGrid"></div>
        
        <div class="scenario-panel" id="scenarioPanel">
            <div class="scenario-header">
                <h2 id="scenarioTitle"></h2>
                <div class="clinical-vignette" id="clinicalVignette"></div>
            </div>
            
            <div class="labs-section">
                <h3>📊 Predict the Lab Results</h3>
                <p style="color: #64748b; margin-bottom: 16px; font-size: 0.9rem;">
                    For each lab value, predict whether you would expect it to be Low (↓), Normal (—), or High (↑)
                </p>
                <div class="lab-grid" id="labGrid"></div>
                
                <div style="text-align: center; margin-top: 24px;">
                    <button class="btn btn-primary" onclick="checkPredictions()">Check My Predictions</button>
                    <button class="btn btn-secondary" onclick="closeScenario()" style="margin-left: 12px;">Back to List</button>
                </div>
            </div>
            
            <div class="results-panel" id="resultsPanel">
                <div class="score-display">
                    <div class="score-number" id="scoreNumber">0%</div>
                    <div class="score-label">Correct Predictions</div>
                </div>
                
                <div class="explanation-box">
                    <h4>💡 Clinical Explanation</h4>
                    <p id="explanationText"></p>
                </div>
                
                <div class="actions">
                    <button class="btn btn-secondary" onclick="resetScenario()">Try Again</button>
                    <button class="btn btn-primary" onclick="nextScenario()">Next Scenario →</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const SCENARIOS = [
            {
                id: 'dka',
                title: 'Diabetic Ketoacidosis (DKA)',
                category: 'metabolic',
                difficulty: 'medium',
                tags: ['Endocrine', 'Emergency'],
                vignette: 'A 24-year-old woman with Type 1 diabetes presents with 2 days of nausea, vomiting, and abdominal pain. She ran out of insulin 3 days ago. She appears dehydrated with Kussmaul respirations. Her breath has a fruity odor.',
                labs: [
                    { name: 'Glucose', normal: '70-100 mg/dL', expected: 'high' },
                    { name: 'pH', normal: '7.35-7.45', expected: 'low' },
                    { name: 'Bicarbonate', normal: '22-28 mEq/L', expected: 'low' },
                    { name: 'Anion Gap', normal: '8-12 mEq/L', expected: 'high' },
                    { name: 'Potassium', normal: '3.5-5.0 mEq/L', expected: 'high' },
                    { name: 'Sodium', normal: '136-145 mEq/L', expected: 'low' },
                    { name: 'BUN', normal: '7-20 mg/dL', expected: 'high' },
                    { name: 'Serum Ketones', normal: 'Negative', expected: 'high' }
                ],
                explanation: 'In DKA, lack of insulin leads to hyperglycemia and ketone body production, causing metabolic acidosis with elevated anion gap. The acidosis causes potassium to shift out of cells (initially high, but total body K+ is depleted). Sodium appears low due to osmotic dilution from hyperglycemia. BUN is elevated from dehydration. Bicarbonate is consumed buffering the ketoacids.'
            },
            {
                id: 'sepsis',
                title: 'Sepsis / Septic Shock',
                category: 'infectious',
                difficulty: 'medium',
                tags: ['Infectious Disease', 'Critical Care'],
                vignette: 'A 68-year-old man with a history of COPD presents with fever (39.2°C), confusion, and productive cough for 3 days. BP 85/50, HR 118, RR 28. He has crackles in the right lower lobe.',
                labs: [
                    { name: 'WBC', normal: '4,500-11,000/μL', expected: 'high' },
                    { name: 'Lactate', normal: '0.5-2.0 mmol/L', expected: 'high' },
                    { name: 'Procalcitonin', normal: '<0.1 ng/mL', expected: 'high' },
                    { name: 'Creatinine', normal: '0.7-1.3 mg/dL', expected: 'high' },
                    { name: 'Platelets', normal: '150,000-400,000/μL', expected: 'low' },
                    { name: 'pH', normal: '7.35-7.45', expected: 'low' },
                    { name: 'Bicarbonate', normal: '22-28 mEq/L', expected: 'low' },
                    { name: 'Glucose', normal: '70-100 mg/dL', expected: 'high' }
                ],
                explanation: 'Sepsis triggers a systemic inflammatory response with elevated WBC and procalcitonin. Hypoperfusion leads to anaerobic metabolism with elevated lactate and metabolic acidosis (low pH, low bicarb). Acute kidney injury from hypotension causes elevated creatinine. Thrombocytopenia occurs from consumption/DIC. Stress hyperglycemia is common even in non-diabetics.'
            },
            {
                id: 'mi',
                title: 'Acute Myocardial Infarction',
                category: 'cardiac',
                difficulty: 'easy',
                tags: ['Cardiology', 'Emergency'],
                vignette: 'A 58-year-old man with hypertension and smoking history presents with crushing substernal chest pain radiating to his left arm for 2 hours. He is diaphoretic and nauseated. ECG shows ST elevations in leads V1-V4.',
                labs: [
                    { name: 'Troponin I', normal: '<0.04 ng/mL', expected: 'high' },
                    { name: 'CK-MB', normal: '0-5 ng/mL', expected: 'high' },
                    { name: 'BNP', normal: '<100 pg/mL', expected: 'high' },
                    { name: 'Glucose', normal: '70-100 mg/dL', expected: 'high' },
                    { name: 'WBC', normal: '4,500-11,000/μL', expected: 'high' },
                    { name: 'Potassium', normal: '3.5-5.0 mEq/L', expected: 'normal' },
                    { name: 'Creatinine', normal: '0.7-1.3 mg/dL', expected: 'normal' },
                    { name: 'Hemoglobin', normal: '13.5-17.5 g/dL', expected: 'normal' }
                ],
                explanation: 'Acute MI causes release of cardiac biomarkers (troponin, CK-MB) from damaged myocytes - troponin rises within 3-6 hours. BNP elevates due to myocardial wall stress. Stress response causes hyperglycemia and leukocytosis. In uncomplicated MI, electrolytes and renal function may initially be normal.'
            },
            {
                id: 'aki-prerenal',
                title: 'Prerenal Acute Kidney Injury',
                category: 'renal',
                difficulty: 'medium',
                tags: ['Nephrology', 'Critical Care'],
                vignette: 'A 75-year-old woman on lisinopril and furosemide presents after 4 days of diarrhea and poor oral intake. She appears dehydrated with dry mucous membranes. BP 95/60, HR 102. Urine output has been minimal.',
                labs: [
                    { name: 'BUN', normal: '7-20 mg/dL', expected: 'high' },
                    { name: 'Creatinine', normal: '0.7-1.3 mg/dL', expected: 'high' },
                    { name: 'BUN:Cr Ratio', normal: '10-20:1', expected: 'high' },
                    { name: 'Urine Sodium', normal: '>20 mEq/L', expected: 'low' },
                    { name: 'FeNa', normal: '>1%', expected: 'low' },
                    { name: 'Urine Specific Gravity', normal: '1.005-1.030', expected: 'high' },
                    { name: 'Potassium', normal: '3.5-5.0 mEq/L', expected: 'high' },
                    { name: 'Bicarbonate', normal: '22-28 mEq/L', expected: 'low' }
                ],
                explanation: 'Prerenal AKI from dehydration causes elevated BUN and Cr with a high BUN:Cr ratio (>20:1) because urea is passively reabsorbed with water. The kidneys appropriately retain sodium (low urine Na, low FeNa <1%) and concentrate urine (high specific gravity). Metabolic acidosis develops from reduced acid excretion. ACE inhibitors and diuretics worsen the picture.'
            },
            {
                id: 'pe',
                title: 'Pulmonary Embolism',
                category: 'cardiac',
                difficulty: 'medium',
                tags: ['Pulmonary', 'Emergency'],
                vignette: 'A 45-year-old woman presents with sudden onset pleuritic chest pain and dyspnea. She returned from a 12-hour flight 3 days ago and has been on oral contraceptives. O2 sat is 91% on room air. Her right calf is swollen.',
                labs: [
                    { name: 'D-dimer', normal: '<500 ng/mL', expected: 'high' },
                    { name: 'Troponin', normal: '<0.04 ng/mL', expected: 'high' },
                    { name: 'BNP', normal: '<100 pg/mL', expected: 'high' },
                    { name: 'PaO2', normal: '80-100 mmHg', expected: 'low' },
                    { name: 'PaCO2', normal: '35-45 mmHg', expected: 'low' },
                    { name: 'A-a Gradient', normal: '<15 mmHg', expected: 'high' },
                    { name: 'WBC', normal: '4,500-11,000/μL', expected: 'normal' },
                    { name: 'Hemoglobin', normal: '12-16 g/dL', expected: 'normal' }
                ],
                explanation: 'PE causes elevated D-dimer from fibrin degradation. Right heart strain from pulmonary hypertension causes troponin and BNP elevation (markers of severity). Hypoxemia (low PaO2) with hyperventilation (low PaCO2) and widened A-a gradient is classic. The hypoxemia is due to V/Q mismatch. WBC and hemoglobin are typically normal unless there is underlying infection or bleeding.'
            },
            {
                id: 'hepatitis',
                title: 'Acute Viral Hepatitis',
                category: 'hepatic',
                difficulty: 'easy',
                tags: ['Hepatology', 'Infectious'],
                vignette: 'A 28-year-old man presents with fatigue, nausea, and dark urine for 1 week. He recently returned from travel to Southeast Asia. He has right upper quadrant tenderness and scleral icterus.',
                labs: [
                    { name: 'AST', normal: '10-40 U/L', expected: 'high' },
                    { name: 'ALT', normal: '7-56 U/L', expected: 'high' },
                    { name: 'Total Bilirubin', normal: '0.1-1.2 mg/dL', expected: 'high' },
                    { name: 'Direct Bilirubin', normal: '0-0.3 mg/dL', expected: 'high' },
                    { name: 'Alkaline Phosphatase', normal: '44-147 U/L', expected: 'high' },
                    { name: 'Albumin', normal: '3.5-5.0 g/dL', expected: 'normal' },
                    { name: 'PT/INR', normal: '0.8-1.2', expected: 'normal' },
                    { name: 'Platelets', normal: '150,000-400,000/μL', expected: 'normal' }
                ],
                explanation: 'Acute viral hepatitis causes hepatocellular injury with dramatically elevated AST/ALT (often >1000 U/L), typically with ALT > AST. Bilirubin rises causing jaundice. Alkaline phosphatase is mildly elevated. In acute hepatitis, synthetic function (albumin, PT/INR) is usually preserved unless fulminant. Platelets remain normal unless there is chronic liver disease or DIC.'
            },
            {
                id: 'gi-bleed',
                title: 'Upper GI Bleed',
                category: 'heme',
                difficulty: 'medium',
                tags: ['GI', 'Emergency'],
                vignette: 'A 62-year-old man with chronic alcohol use presents with 3 episodes of vomiting bright red blood. He takes ibuprofen daily for back pain. He appears pale with BP 88/58 and HR 115.',
                labs: [
                    { name: 'Hemoglobin', normal: '13.5-17.5 g/dL', expected: 'low' },
                    { name: 'Hematocrit', normal: '38-50%', expected: 'low' },
                    { name: 'MCV', normal: '80-100 fL', expected: 'high' },
                    { name: 'BUN', normal: '7-20 mg/dL', expected: 'high' },
                    { name: 'Creatinine', normal: '0.7-1.3 mg/dL', expected: 'normal' },
                    { name: 'Platelets', normal: '150,000-400,000/μL', expected: 'low' },
                    { name: 'INR', normal: '0.8-1.2', expected: 'high' },
                    { name: 'Lactate', normal: '0.5-2.0 mmol/L', expected: 'high' }
                ],
                explanation: 'GI bleeding causes anemia (low Hgb/Hct). In chronic alcoholics, MCV is often high due to folate deficiency and direct marrow toxicity. BUN rises disproportionately to creatinine because blood in the GI tract is digested and absorbed as protein. Chronic liver disease causes thrombocytopenia and elevated INR. Hypovolemic shock from blood loss causes elevated lactate.'
            },
            {
                id: 'hhs',
                title: 'Hyperosmolar Hyperglycemic State',
                category: 'metabolic',
                difficulty: 'hard',
                tags: ['Endocrine', 'Emergency'],
                vignette: 'An 72-year-old man with Type 2 diabetes is brought from a nursing home with altered mental status. He has had decreased oral intake and a UTI for several days. He is severely dehydrated.',
                labs: [
                    { name: 'Glucose', normal: '70-100 mg/dL', expected: 'high' },
                    { name: 'Serum Osmolality', normal: '275-295 mOsm/kg', expected: 'high' },
                    { name: 'Sodium', normal: '136-145 mEq/L', expected: 'high' },
                    { name: 'BUN', normal: '7-20 mg/dL', expected: 'high' },
                    { name: 'Creatinine', normal: '0.7-1.3 mg/dL', expected: 'high' },
                    { name: 'pH', normal: '7.35-7.45', expected: 'normal' },
                    { name: 'Bicarbonate', normal: '22-28 mEq/L', expected: 'normal' },
                    { name: 'Ketones', normal: 'Negative', expected: 'normal' }
                ],
                explanation: 'HHS differs from DKA: glucose is extremely high (often >600 mg/dL) with severe hyperosmolality (>320 mOsm/kg), but minimal ketosis and no significant acidosis. Patients have enough insulin to prevent ketogenesis but not enough to control glucose. Profound dehydration causes hypernatremia and prerenal azotemia (high BUN/Cr). Mental status changes correlate with osmolality.'
            },
            {
                id: 'anemia-iron',
                title: 'Iron Deficiency Anemia',
                category: 'heme',
                difficulty: 'easy',
                tags: ['Hematology'],
                vignette: 'A 35-year-old woman presents with fatigue and exertional dyspnea. She has heavy menstrual periods. Physical exam reveals pallor and koilonychia (spoon nails).',
                labs: [
                    { name: 'Hemoglobin', normal: '12-16 g/dL', expected: 'low' },
                    { name: 'MCV', normal: '80-100 fL', expected: 'low' },
                    { name: 'Ferritin', normal: '12-150 ng/mL', expected: 'low' },
                    { name: 'Iron', normal: '60-170 μg/dL', expected: 'low' },
                    { name: 'TIBC', normal: '250-370 μg/dL', expected: 'high' },
                    { name: 'Transferrin Sat', normal: '20-50%', expected: 'low' },
                    { name: 'RDW', normal: '11-15%', expected: 'high' },
                    { name: 'Reticulocytes', normal: '0.5-2.5%', expected: 'low' }
                ],
                explanation: 'Iron deficiency causes microcytic anemia (low MCV). Ferritin (iron stores) is the first to drop and is very sensitive. Serum iron is low while TIBC is elevated (the body tries to grab more iron). Transferrin saturation is therefore low. RDW is high because of variable red cell sizes as iron becomes depleted. Reticulocyte count is low because the marrow cannot produce new RBCs without iron.'
            },
            {
                id: 'adrenal-crisis',
                title: 'Adrenal Crisis',
                category: 'metabolic',
                difficulty: 'hard',
                tags: ['Endocrine', 'Emergency'],
                vignette: 'A 55-year-old woman on chronic prednisone for lupus stopped her medication a week ago due to GI upset. She presents with weakness, abdominal pain, and hypotension (BP 78/50) unresponsive to fluids. She has hyperpigmentation.',
                labs: [
                    { name: 'Sodium', normal: '136-145 mEq/L', expected: 'low' },
                    { name: 'Potassium', normal: '3.5-5.0 mEq/L', expected: 'high' },
                    { name: 'Glucose', normal: '70-100 mg/dL', expected: 'low' },
                    { name: 'Cortisol (AM)', normal: '5-25 μg/dL', expected: 'low' },
                    { name: 'BUN', normal: '7-20 mg/dL', expected: 'high' },
                    { name: 'Creatinine', normal: '0.7-1.3 mg/dL', expected: 'high' },
                    { name: 'Calcium', normal: '8.5-10.5 mg/dL', expected: 'high' },
                    { name: 'TSH', normal: '0.4-4.0 mU/L', expected: 'normal' }
                ],
                explanation: 'Adrenal crisis from sudden steroid withdrawal causes cortisol deficiency. Without cortisol and aldosterone: sodium wasting leads to hyponatremia, potassium retention causes hyperkalemia, and hypoglycemia occurs (cortisol is needed for gluconeogenesis). Hypotension causes prerenal azotemia. Hypercalcemia occurs from increased bone resorption and decreased renal calcium excretion. Hyperpigmentation suggests primary adrenal insufficiency from elevated ACTH.'
            }
        ];
        
        let currentScenario = null;
        let userPredictions = {};
        
        function init() {
            // Render category tabs
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    renderScenarios(tab.dataset.category);
                });
            });
            
            renderScenarios('all');
        }
        
        function renderScenarios(category) {
            const filtered = category === 'all' 
                ? SCENARIOS 
                : SCENARIOS.filter(s => s.category === category);
            
            document.getElementById('scenariosGrid').innerHTML = filtered.map(s => `
                <div class="scenario-card" onclick="loadScenario('${s.id}')">
                    <h3>${s.title}</h3>
                    <p>${s.vignette.substring(0, 120)}...</p>
                    <div class="tags">
                        <span class="tag difficulty-${s.difficulty}">${s.difficulty}</span>
                        ${s.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        function loadScenario(id) {
            currentScenario = SCENARIOS.find(s => s.id === id);
            userPredictions = {};
            
            document.getElementById('scenarioTitle').textContent = currentScenario.title;
            document.getElementById('clinicalVignette').textContent = currentScenario.vignette;
            
            document.getElementById('labGrid').innerHTML = currentScenario.labs.map(lab => `
                <div class="lab-item" id="lab-${lab.name.replace(/[^a-zA-Z0-9]/g, '')}">
                    <div class="lab-name">${lab.name}</div>
                    <div class="lab-normal">Normal: ${lab.normal}</div>
                    <div class="lab-prediction">
                        <button class="prediction-btn" onclick="setPrediction('${lab.name}', 'low')">↓ Low</button>
                        <button class="prediction-btn" onclick="setPrediction('${lab.name}', 'normal')">— Normal</button>
                        <button class="prediction-btn" onclick="setPrediction('${lab.name}', 'high')">↑ High</button>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('scenariosGrid').style.display = 'none';
            document.getElementById('categoryTabs').style.display = 'none';
            document.getElementById('scenarioPanel').classList.add('active');
            document.getElementById('resultsPanel').classList.remove('visible');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function setPrediction(labName, value) {
            userPredictions[labName] = value;
            
            const labId = `lab-${labName.replace(/[^a-zA-Z0-9]/g, '')}`;
            document.querySelectorAll(`#${labId} .prediction-btn`).forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.classList.add('selected');
        }
        
        function checkPredictions() {
            let correct = 0;
            let total = currentScenario.labs.length;
            
            currentScenario.labs.forEach(lab => {
                const labId = `lab-${lab.name.replace(/[^a-zA-Z0-9]/g, '')}`;
                const labEl = document.getElementById(labId);
                const userAnswer = userPredictions[lab.name];
                
                labEl.querySelectorAll('.prediction-btn').forEach(btn => {
                    btn.classList.remove('correct', 'incorrect', 'expected');
                    
                    const btnValue = btn.textContent.includes('Low') ? 'low' : 
                                    btn.textContent.includes('High') ? 'high' : 'normal';
                    
                    if (btnValue === lab.expected) {
                        btn.classList.add('expected');
                    }
                    
                    if (btn.classList.contains('selected')) {
                        if (userAnswer === lab.expected) {
                            btn.classList.add('correct');
                            correct++;
                        } else {
                            btn.classList.add('incorrect');
                        }
                    }
                });
            });
            
            const percentage = Math.round((correct / total) * 100);
            document.getElementById('scoreNumber').textContent = `${percentage}%`;
            document.getElementById('explanationText').textContent = currentScenario.explanation;
            document.getElementById('resultsPanel').classList.add('visible');
            
            document.getElementById('resultsPanel').scrollIntoView({ behavior: 'smooth' });
        }
        
        function resetScenario() {
            loadScenario(currentScenario.id);
        }
        
        function nextScenario() {
            const currentIndex = SCENARIOS.findIndex(s => s.id === currentScenario.id);
            const nextIndex = (currentIndex + 1) % SCENARIOS.length;
            loadScenario(SCENARIOS[nextIndex].id);
        }
        
        function closeScenario() {
            document.getElementById('scenarioPanel').classList.remove('active');
            document.getElementById('scenariosGrid').style.display = 'grid';
            document.getElementById('categoryTabs').style.display = 'flex';
        }
        
        init();
    </script>

    
    <div data-dx-tutor
         data-module-title="Predict Labs"
         data-key-points="📊 Predict the Lab Results, ${s.title}, clinical reasoning, differential diagnosis, diagnostic workup, illness scripts"
         data-objectives="Develop systematic clinical reasoning, refine differential diagnosis skills"
         style="display:none;"></div>
    <script src="dx-ai-tutor.js"></script>
<script src="data/rdx-persist.js"></script>
<script src="./js/rdx-nav.js"></script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
<script src="js/rdx-help-widget.js"></script>
</body>
</html>
