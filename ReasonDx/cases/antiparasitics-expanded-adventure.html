rem}.why-a{display:none;margin-top:6px;font-size:0.88rem;color:var(--rdx-text-muted,#64748b)}.next-btn{background:linear-gradient(135deg,#0f766e,#0d9488);color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:600;cursor:pointer;margin:20px 0;display:none;font-family:var(--rdx-font)}.next-btn:hover{opacity:0.9;transform:translateY(-1px)}.completion-card{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:16px;padding:32px;text-align:center;margin:24px 0}.completion-card h2{font-family:var(--rdx-font-serif);color:var(--rdx-teal-dark,#0f766e);margin-bottom:12px}.references-panel{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:16px;margin:20px 0}.references-panel a{display:block;color:var(--rdx-teal,#0d9488);font-size:13px;margin:4px 0;text-decoration:none}.references-panel a:hover{text-decoration:underline}.rdx-crossplatform-nav{background:var(--rdx-bg-card,#f8fafc);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:20px;margin:24px 0}.rdx-crossplatform-nav h4{color:var(--rdx-text-muted,#64748b);margin-bottom:12px;font-size:0.9rem}.rdx-crossplatform-links{display:flex;gap:12px;flex-wrap:wrap}.rdx-crossplatform-link{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:12px 16px;text-decoration:none;color:var(--rdx-text,#1e293b);font-size:13px;font-weight:500;transition:all 0.2s}.rdx-crossplatform-link:hover{background:rgba(13,148,136,0.05);transform:translateY(-2px)}@media(max-width:640px){.score-tracker{top:auto;bottom:12px;right:12px}.container{padding:12px}.vital-signs{grid-template-columns:repeat(3,1fr)}}</style>

<script>let currentStage=0,score=0,difficulty='standard';
const stages=[{
title:"Clinical Scenario",
content:`<div class="narrative"><p>A 28-year-old returning from sub-Saharan Africa with cyclic fevers, rigors, headache, and splenomegaly. Thick smear shows ring-form trophozoites.</p><div class="vital-signs"><div class="vital-item"><span class="label">HR</span><span class="value">112</span></div><div class="vital-item"><span class="label">Temp</span><span class="value">40.1°C</span></div></div></div>`,
hint_beginner:"What is the mechanism of chloroquine?",
hint_advanced:"Consider the pharmacologic principles underlying this drug class.",
question:{
prompt:"What is the mechanism of chloroquine?",
options:[{text:"Concentrates in parasite food vacuole → prevents heme detoxification → toxic heme accumulates → kills parasite. Resistance: PfCRT mutation pumps drug out.",correct:true},{text:"Blocks RNA polymerase",correct:false},{text:"Inhibits folic acid metabolism",correct:false},{text:"Inhibits cell membrane synthesis",correct:false}],
explanation:{correct:"Correct! Concentrates in parasite food vacuole → prevents heme detoxification → toxic heme accumulates → kills parasite. Resistance: PfCRT mutation pumps drug out..",incorrect:"Concentrates in parasite food vacuole → prevents heme detoxification → toxic heme accumulates → kills parasite. Resistance: PfCRT mutation pumps drug out."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Antimalarial MOA</div><div class="pathway"><strong>Chloroquine:</strong> Accumulates in food vacuole → prevents heme polymerization → toxic heme kills parasite<br><strong>Artemisinin:</strong> Endoperoxide bridge activated by iron → free radicals → membrane damage (rapid-acting)<br><strong>Primaquine:</strong> Oxidative damage to mitochondria → kills hypnozoites (liver stage) and gametocytes<br><strong>Atovaquone:</strong> Inhibits mitochondrial electron transport (complex III)</div></div>`,
why_chain:[],
points:10
}
},{
title:"Spectrum & Coverage",
content:`<div class="narrative"><p>Understanding the antimicrobial spectrum guides appropriate use.</p></div>`,
hint_beginner:"What antiparasitic drugs treat the major protozoal infections?",
hint_advanced:"Think about the unique organisms this drug covers that alternatives do not.",
question:{
prompt:"What antiparasitic drugs treat the major protozoal infections?",
options:[{text:"Active only against fungi",correct:false},{text:"Malaria: ACT/chloroquine. Giardia: metronidazole/tinidazole. Amebiasis: metronidazole + paromomycin. Toxoplasma: pyrimethamine + sulfadiazine.",correct:true},{text:"No anaerobic activity",correct:false},{text:"Covers only gram-positive organisms",correct:false}],
explanation:{correct:"Correct! Malaria: ACT/chloroquine. Giardia: metronidazole/tinidazole. Amebiasis: metronidazole + paromomycin. Toxoplasma: pyrimethamine + sulfadiazine..",incorrect:"Malaria: ACT/chloroquine. Giardia: metronidazole/tinidazole. Amebiasis: metronidazole + paromomycin. Toxoplasma: pyrimethamine + sulfadiazine."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Antiprotozoal Drugs</div><div class="pathway"><strong>Giardia:</strong> Metronidazole or tinidazole (activate in anaerobic environment)<br><strong>Amebiasis:</strong> Tissue = metronidazole, then luminal = paromomycin (kills intestinal cysts)<br><strong>Toxoplasma:</strong> Pyrimethamine + sulfadiazine + leucovorin (folinic acid to protect host marrow)<br><strong>Cryptosporidium:</strong> Nitazoxanide (immunocompetent). ART alone for HIV patients.</div></div>`,
why_chain:[],
points:10
}
},{
title:"Dosing & Administration",
content:`<div class="narrative"><p>Proper dosing maximizes efficacy and minimizes toxicity.</p></div>`,
hint_beginner:"Why must primaquine be given for P. vivax/ovale and what must be checked first?",
hint_advanced:"Consider the PK/PD parameters that drive efficacy for this class.",
question:{
prompt:"Why must primaquine be given for P. vivax/ovale and what must be checked first?",
options:[{text:"Always requires IV administration",correct:false},{text:"Fixed dose regardless of indication",correct:false},{text:"Primaquine kills hypnozoites (dormant liver stage) to prevent relapse. MUST check G6PD first — primaquine causes hemolytic anemia in G6PD deficiency.",correct:true},{text:"Dose based on ideal body weight only",correct:false}],
explanation:{correct:"Correct! Primaquine kills hypnozoites (dormant liver stage) to prevent relapse. MUST check G6PD first — primaquine causes hemolytic anemia in G6PD deficiency..",incorrect:"Primaquine kills hypnozoites (dormant liver stage) to prevent relapse. MUST check G6PD first — primaquine causes hemolytic anemia in G6PD deficiency."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">G6PD and Primaquine</div><div class="pathway"><strong>Primaquine/tafenoquine:</strong> Cause oxidative stress → hemolytic anemia in G6PD-deficient patients<br><strong>MUST test G6PD before prescribing</strong><br><strong>G6PD prevalence:</strong> 10-15% in malaria-endemic regions (G6PD heterozygosity is protective against malaria — evolutionary advantage)<br><strong>Alternative:</strong> Tafenoquine (single dose but ALSO requires G6PD testing)</div></div>`,
why_chain:[],
points:10
}
},{
title:"Adverse Effects",
content:`<div class="narrative"><p>Monitoring for side effects is essential for patient safety.</p></div>`,
hint_beginner:"What are ivermectin adverse effects and the Mazzotti reaction?",
hint_advanced:"Consider which effects are dose-dependent vs idiosyncratic.",
question:{
prompt:"What are ivermectin adverse effects and the Mazzotti reaction?",
options:[{text:"No significant adverse effects",correct:false},{text:"Ototoxicity only",correct:false},{text:"Only affects renal function",correct:false},{text:"Ivermectin: generally well-tolerated. Mazzotti reaction in onchocerciasis — inflammatory response to dying microfilariae (fever, rash, hypotension). NOT a drug toxicity per se.",correct:true}],
explanation:{correct:"Correct! Ivermectin: generally well-tolerated. Mazzotti reaction in onchocerciasis — inflammatory response to dying microfilariae (fever, rash, hypotension). NOT a drug toxicity per se..",incorrect:"Ivermectin: generally well-tolerated. Mazzotti reaction in onchocerciasis — inflammatory response to dying microfilariae (fever, rash, hypotension). NOT a drug toxicity per se."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Ivermectin & Helminths</div><div class="pathway"><strong>Ivermectin MOA:</strong> Activates glutamate-gated chloride channels → paralysis and death of helminths<br><strong>Uses:</strong> Strongyloides (drug of choice), onchocerciasis, scabies, lice<br><strong>Albendazole:</strong> Inhibits tubulin polymerization → used for hookworm, roundworm, pinworm, tapeworm (cysts)<br><strong>Praziquantel:</strong> Increases membrane Ca2+ permeability → spastic paralysis of flukes and tapeworms</div></div>`,
why_chain:[],
points:10
}
},{
title:"Resistance",
content:`<div class="narrative"><p>Understanding resistance guides empiric therapy choices.</p></div>`,
hint_beginner:"How does malaria drug resistance develop?",
hint_advanced:"Compare enzymatic modification, target alteration, and efflux as resistance strategies.",
question:{
prompt:"How does malaria drug resistance develop?",
options:[{text:"P. falciparum: chloroquine resistance (PfCRT gene — worldwide). Artemisinin resistance (kelch13 mutations — SE Asia). Requires combination therapy (ACT) to prevent resistance.",correct:true},{text:"Only plasmid-mediated resistance",correct:false},{text:"Resistance occurs only in gram-positives",correct:false},{text:"No resistance has been documented",correct:false}],
explanation:{correct:"Correct! P. falciparum: chloroquine resistance (PfCRT gene — worldwide). Artemisinin resistance (kelch13 mutations — SE Asia). Requires combination therapy (ACT) to prevent resistance..",incorrect:"P. falciparum: chloroquine resistance (PfCRT gene — worldwide). Artemisinin resistance (kelch13 mutations — SE Asia). Requires combination therapy (ACT) to prevent resistance."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Resistance</div><div class="pathway"><strong>Chloroquine:</strong> PfCRT gene mutations → efflux of drug from food vacuole. Worldwide P. falciparum resistance.<br><strong>Artemisinin:</strong> kelch13 mutations → delayed parasite clearance. Emerging in SE Asia, concerning in Africa.<br><strong>ACT strategy:</strong> Artemisinin (rapid kill) + partner drug (slow kill) → prevents resistance to either alone</div></div>`,
why_chain:[],
points:10
}
},{
title:"Clinical Application",
content:`<div class="narrative"><p>Integrating mechanism, spectrum, and resistance data guides optimal clinical use.</p></div>`,
hint_beginner:"What is the drug of choice for each major parasitic infection?",
hint_advanced:"Consider guideline recommendations and antimicrobial stewardship principles.",
question:{
prompt:"What is the drug of choice for each major parasitic infection?",
options:[{text:"Only for prophylaxis",correct:false},{text:"Malaria (falciparum): ACT. Malaria (vivax): chloroquine + primaquine. Strongyloides: ivermectin. Tapeworm: praziquantel. Hookworm: albendazole. Toxoplasma: pyrimethamine + sulfadiazine + leucovorin.",correct:true},{text:"Empiric monotherapy for all infections",correct:false},{text:"Reserved for outpatient use only",correct:false}],
explanation:{correct:"Correct! Malaria (falciparum): ACT. Malaria (vivax): chloroquine + primaquine. Strongyloides: ivermectin. Tapeworm: praziquantel. Hookworm: albendazole. Toxoplasma: pyrimethamine + sulfadiazine + leucovorin..",incorrect:"Malaria (falciparum): ACT. Malaria (vivax): chloroquine + primaquine. Strongyloides: ivermectin. Tapeworm: praziquantel. Hookworm: albendazole. Toxoplasma: pyrimethamine + sulfadiazine + leucovorin."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Drug of Choice Summary</div><div class="pathway"><strong>P. falciparum:</strong> Artemisinin combination therapy (ACT). Severe: IV artesunate.<br><strong>P. vivax/ovale:</strong> Chloroquine + primaquine (check G6PD)<br><strong>Strongyloides:</strong> Ivermectin<br><strong>Tapeworms:</strong> Praziquantel<br><strong>Hookworm/roundworm:</strong> Albendazole<br><strong>Schistosoma:</strong> Praziquantel<br><strong>Toxoplasma:</strong> Pyrimethamine + sulfadiazine + leucovorin</div></div>`,
why_chain:[],
points:10
}
}];
document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hb=document.querySelector('.hint-box');if(hb)hb.style.display=d==='beginner'?'block':'none'}
function toggleReferences(){const c=document.getElementById('referencesContent');const t=document.getElementById('refToggle');if(c.style.display==='none'){c.style.display='block';t.innerHTML='&#9662;'}else{c.style.display='none';t.innerHTML='&#9656;'}}
function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100);document.getElementById('progress').style.width=pct+'%';let h='<h2 class="scene-title">'+st.title+'</h2>';h+='<div class="scene-content">'+st.content+'</div>';if(st.hint_beginner)h+='<div class="hint-box" id="hint-box"'+(difficulty==='beginner'?' style="display:block"':'')+'> '+st.hint_beginner+'</div>';if(difficulty==='advanced'&&st.hint_advanced)h+='<div class="hint-box" style="display:block;background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.15);color:#5b21b6"> '+st.hint_advanced+'</div>';if(st.question){h+='<div class="socratic-prompt"><h4>Clinical Question</h4><p>'+st.question.prompt+'</p></div>';h+='<div class="options-grid" id="options-'+idx+'">';st.question.options.forEach((opt,oi)=>{h+='<button class="option-btn" id="option-'+idx+'-'+oi+'" onclick="checkAnswer('+idx+','+oi+')">'+String.fromCharCode(65+oi)+'. '+opt.text+'</button>'});h+='</div>';h+='<div class="explanation-box" id="explain-'+idx+'"></div>';h+='<div id="teaching-'+idx+'" style="display:none">'+st.question.teaching+'</div>';if(st.question.why_chain&&st.question.why_chain.length>0){h+='<div id="why-'+idx+'" style="display:none">';st.question.why_chain.forEach((wc,wi)=>{h+='<div class="why-chain"><div class="why-q" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'"> '+wc.q+'</div><div class="why-a">'+wc.a+'</div></div>'});h+='</div>'}}h+='<button class="next-btn" id="next-'+idx+'" onclick="nextStage()">Continue &rarr;</button>';document.getElementById('scene-container').innerHTML=h}
function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll('#options-'+si+' .option-btn').forEach((b,i)=>{b.classList.add('disabled');if(st.question.options[i].correct)b.classList.add('correct');if(i===oi&&!opt.correct)b.classList.add('incorrect')});const eb=document.getElementById('explain-'+si);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;eb.className='explanation-box correct';eb.innerHTML='<strong>Correct!</strong> '+st.question.explanation.correct}else{eb.className='explanation-box incorrect';eb.innerHTML='<strong>Not quite.</strong> '+st.question.explanation.incorrect}eb.style.display='block';document.getElementById('teaching-'+si).style.display='block';const wy=document.getElementById('why-'+si);if(wy)wy.style.display='block';document.getElementById('next-'+si).style.display='inline-block'}
function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let lvl='Developing';if(pct>=90)lvl='Mastery';else if(pct>=70)lvl='Proficient';else if(pct>=50)lvl='Competent';document.getElementById('scene-container').innerHTML='<div class="completion-card"><h2>Case Complete!</h2><p style="font-size:2rem;font-weight:700;color:var(--rdx-teal,#0d9488)">'+pct+'%</p><p style="color:var(--rdx-text-muted,#64748b)">Score: '+score+'/'+mx+'</p><p style="margin:12px 0;font-weight:600">Level: '+lvl+'</p><div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="../adventure-hub.html" style="padding:10px 20px;background:var(--rdx-teal,#0d9488);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">More Cases</a><a href="../tools/learning-dashboard.html" style="padding:10px 20px;background:var(--rdx-purple,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">Dashboard</a><button onclick="currentStage=0;score=0;document.getElementById(\'score\').textContent=0;renderStage(0)" style="padding:10px 20px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;cursor:pointer;font-weight:600">Retry</button></div></div>';try{const progress=JSON.parse(localStorage.getItem('reasondx-progress')||'{}');if(!progress.cases)progress.cases={};progress.cases['antiparasitics']=Math.max(progress.cases['antiparasitics']||0,pct);localStorage.setItem('reasondx-progress',JSON.stringify(progress))}catch(e){}}
renderStage(0);</script>
