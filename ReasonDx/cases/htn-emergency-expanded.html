    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"Emergency vs Urgency",content:'<div class="narrative"><p>A <span class="highlight">58-year-old man</span> presents with BP <span class="critical">220/130</span>, severe headache, and confusion. Is this a hypertensive emergency or urgency?</p></div>',question:{prompt:"What DEFINES a hypertensive emergency (vs urgency)?",options:[{text:"SBP >180 or DBP >120",correct:false},{text:"Severely elevated BP WITH acute end-organ damage",correct:true},{text:"Any BP requiring IV medication",correct:false},{text:"BP not responding to oral medications",correct:false}],explanation:{correct:"Correct! Hypertensive EMERGENCY = severe BP + acute end-organ damage. Urgency = severe BP without end-organ damage. The BP number alone does not define it!",incorrect:"It is the presence of END-ORGAN DAMAGE that defines emergency, not the BP number alone."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Key Distinction</div><div class="pathway">HYPERTENSIVE EMERGENCY:\nSevere HTN + acute end-organ damage\n• Encephalopathy\n• Acute stroke\n• Acute MI/Unstable angina\n• Acute heart failure/pulmonary edema\n• Aortic dissection\n• Eclampsia\n• Acute renal failure\n\nHYPERTENSIVE URGENCY:\nSevere HTN WITHOUT end-organ damage\n→ Oral meds, outpatient follow-up</div></div>',why_chain:[],points:10}},
        {title:"End-Organ Damage",content:'<div class="narrative"><p>Your patient has confusion (encephalopathy) and papilledema on fundoscopy. This confirms <span class="critical">hypertensive emergency</span>.</p></div>',question:{prompt:"Which finding indicates hypertensive encephalopathy?",options:[{text:"Chronic headache",correct:false},{text:"Altered mental status with papilledema",correct:true},{text:"Elevated creatinine from chronic kidney disease",correct:false},{text:"History of stroke 2 years ago",correct:false}],explanation:{correct:"Correct! AMS + papilledema = hypertensive encephalopathy. The damage must be ACUTE. Chronic findings (old stroke, CKD) don\'t count as emergency.",incorrect:"Encephalopathy = ACUTE altered mental status with papilledema, seizures, or other neurologic changes. Must be acute, not chronic."},teaching:'<h4>Signs of Acute End-Organ Damage</h4><table class="comparison-table"><tr><th>Organ</th><th>Findings</th></tr><tr><td>Brain</td><td>AMS, seizure, papilledema, focal deficits</td></tr><tr><td>Heart</td><td>Chest pain, pulmonary edema, new ECG changes</td></tr><tr><td>Aorta</td><td>Tearing pain, BP differential, wide mediastinum</td></tr><tr><td>Kidney</td><td>ACUTE rise in Cr, hematuria, proteinuria</td></tr><tr><td>Eyes</td><td>Papilledema, hemorrhages, exudates</td></tr></table>',why_chain:[],points:10}},
        {title:"Treatment Goals",content:'<div class="narrative"><p>You confirm hypertensive emergency with encephalopathy. Now you need to lower BP - but how fast?</p></div><div class="alert-box"><div class="alert-title">⚠️ Don\'t Drop Too Fast!</div><p>Rapid BP reduction can cause stroke, MI, or renal failure due to impaired autoregulation.</p></div>',question:{prompt:"What is the BP reduction goal in the FIRST HOUR for most hypertensive emergencies?",options:[{text:"Normalize BP (<140/90)",correct:false},{text:"Reduce MAP by 25% (not more)",correct:true},{text:"Reduce SBP by 50%",correct:false},{text:"Reduce to 160/100 immediately",correct:false}],explanation:{correct:"Correct! Reduce MAP by no more than 25% in the first hour. Then gradually to 160/100 over next 2-6 hours. Too fast = watershed stroke, MI, renal failure.",incorrect:"25% MAP reduction in first hour is the goal. Normalizing too fast is dangerous - cerebral autoregulation is impaired."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 BP Reduction Goals</div><div class="pathway">MOST EMERGENCIES:\n• Hour 1: Reduce MAP by 25%\n• Hours 2-6: To 160/100-110\n• Days 1-2: Gradually normalize\n\nEXCEPTIONS (need faster reduction):\n• Aortic dissection: SBP <120 in 20 min\n• Acute ischemic stroke with tPA: <185/110\n• Acute hemorrhagic stroke: SBP <140\n• Eclampsia: <160/110 within 30-60 min</div></div>',why_chain:[],points:10}},
        {title:"IV Medication Selection",content:'<div class="narrative"><p>Hypertensive emergencies require <span class="highlight">IV medications</span> for precise, titratable control.</p></div>',question:{prompt:"Which IV medication is FIRST-LINE for most hypertensive emergencies?",options:[{text:"IV hydralazine",correct:false},{text:"IV labetalol or nicardipine",correct:true},{text:"IV nitroglycerin",correct:false},{text:"Sublingual nifedipine",correct:false}],explanation:{correct:"Correct! Labetalol and nicardipine are first-line - titratable, safe, effective. Avoid sublingual nifedipine (unpredictable drops). NTG is for ACS/pulmonary edema specifically.",incorrect:"Labetalol or nicardipine are first-line. Sublingual nifedipine is NEVER used (dangerous unpredictable drops)."},teaching:'<h4>IV Medications</h4><table class="comparison-table"><tr><th>Drug</th><th>Best For</th><th>Avoid If</th></tr><tr style="background:rgba(34,197,94,0.2);"><td>Labetalol</td><td>Most emergencies</td><td>Asthma, bradycardia, HF</td></tr><tr style="background:rgba(34,197,94,0.2);"><td>Nicardipine</td><td>Most emergencies, stroke</td><td>Severe AS</td></tr><tr><td>Nitroprusside</td><td>Most emergencies</td><td>Renal failure (cyanide)</td></tr><tr><td>Esmolol</td><td>Aortic dissection</td><td>Asthma, HF</td></tr><tr><td>Nitroglycerin</td><td>ACS, pulmonary edema</td><td>As sole agent</td></tr><tr><td>Hydralazine</td><td>Eclampsia</td><td>Reflex tachycardia risk</td></tr></table>',why_chain:[],points:10}},
        {title:"Aortic Dissection",content:'<div class="narrative"><p>Different patient: tearing chest pain to back, BP <span class="critical">210/120</span>, BP differential between arms. Suspect aortic dissection.</p></div>',question:{prompt:"What is the BP/HR goal in aortic dissection?",options:[{text:"MAP reduction 25% in 1 hour",correct:false},{text:"SBP <120 AND HR <60 within 20 minutes",correct:true},{text:"SBP <180 within 6 hours",correct:false},{text:"Normalize BP over 24 hours",correct:false}],explanation:{correct:"Correct! Aortic dissection needs aggressive control: SBP <120, HR <60, within 20 minutes. β-blocker FIRST (reduce shear stress), then vasodilator if needed.",incorrect:"Dissection = rapid control. SBP <120, HR <60 in 20 minutes. β-blocker first, then add vasodilator."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Aortic Dissection Protocol</div><div class="pathway">GOAL: SBP <120, HR <60 within 20 min\n\nSTEP 1: β-BLOCKER FIRST\n• Esmolol (short-acting, titratable)\n• Labetalol (α + β blocker)\n\nSTEP 2: ADD VASODILATOR if needed\n• Nicardipine or nitroprusside\n\nWHY β-BLOCKER FIRST?\nVasodilator alone → reflex tachycardia\n→ Increased dP/dt → More shear stress\n→ Propagation of dissection!</div></div>',why_chain:[],points:10}},
        {title:"Stroke Considerations",content:'<div class="narrative"><p>Patient with acute ischemic stroke and BP 195/110. tPA candidate.</p></div>',question:{prompt:"What is the BP goal BEFORE giving tPA for ischemic stroke?",options:[{text:"<220/120",correct:false},{text:"<185/110",correct:true},{text:"<140/90",correct:false},{text:"No BP treatment needed",correct:false}],explanation:{correct:"Correct! For tPA eligibility: BP must be <185/110 before and <180/105 for 24h after. Use labetalol or nicardipine to achieve this.",incorrect:"tPA requires BP <185/110 before administration. Too high = contraindication. Too low = risk of ischemia."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Stroke BP Goals</div><div class="pathway">ACUTE ISCHEMIC STROKE:\n• No tPA: Treat only if >220/120\n• Pre-tPA: <185/110\n• Post-tPA: <180/105 for 24h\n\nACUTE HEMORRHAGIC STROKE:\n• SBP goal <140 (INTERACT2)\n• Rapid reduction appears safe\n\nWHY PERMISSIVE HTN IN ISCHEMIA?\nPenumbra needs perfusion pressure\nAutoregulation is impaired\nLowering BP may extend infarct</div></div>',why_chain:[],points:10}},
        {title:"Case Resolution",content:'<div class="narrative"><p>Your patient with encephalopathy received nicardipine infusion. MAP reduced by 20% in the first hour. Mental status improved over 6 hours as BP was gradually normalized.</p></div><div class="mechanism-box"><div class="mechanism-title">📚 HTN Emergency Summary</div><div class="pathway">EMERGENCY vs URGENCY:\nEmergency = severe BP + END-ORGAN DAMAGE\n\nGOALS (most cases):\n• Hour 1: MAP ↓ 25%\n• Hours 2-6: To 160/100\n• Then gradual normalization\n\nEXCEPTIONS:\n• Dissection: SBP <120 in 20 min\n• tPA stroke: <185/110\n• Hemorrhagic stroke: SBP <140\n\nFIRST-LINE: Labetalol or Nicardipine\nNEVER: Sublingual nifedipine</div></div>',question:{prompt:"Which medication should NEVER be used for hypertensive emergency?",options:[{text:"IV labetalol",correct:false},{text:"IV nicardipine",correct:false},{text:"Sublingual nifedipine",correct:true},{text:"IV nitroprusside",correct:false}],explanation:{correct:"Correct! Sublingual nifedipine causes unpredictable, precipitous BP drops that can cause stroke, MI, or death. It should NEVER be used.",incorrect:"Sublingual nifedipine is NEVER appropriate - causes dangerous unpredictable BP drops."},teaching:'<h4>Key Takeaways</h4><ul style="line-height:2;margin-left:20px;"><li>Emergency = end-organ damage (not just BP number)</li><li>Most cases: MAP ↓25% in hour 1</li><li>Dissection: SBP <120, HR <60 in 20 min</li><li>β-blocker BEFORE vasodilator in dissection</li><li>Labetalol/nicardipine are first-line</li><li>NEVER use sublingual nifedipine</li></ul>',why_chain:[],points:10}},
        {title:"Clinical Integration",content:'<div class="narrative"><p>You synthesize all the clinical information to ensure optimal patient care.</p></div>',question:{prompt:"What principle is MOST important for excellent clinical outcomes?",options:[{text:"Integrating clinical presentation with evidence-based guidelines while reassessing response to treatment",correct:true},{text:"Following protocols exactly without clinical judgment",correct:false},{text:"Ordering comprehensive testing to avoid any missed diagnoses",correct:false},{text:"Making a diagnosis quickly and committing to it without reconsideration",correct:false}],explanation:{correct:"Excellent clinical care combines systematic assessment, evidence-based treatment, and ongoing reassessment. Guidelines inform but don't replace clinical reasoning.",incorrect:"Good clinical care requires flexibility, reassessment, and integration of guidelines with patient-specific factors."},teaching:'<h4>Clinical Reasoning</h4><ul><li>Systematic data gathering</li><li>Evidence-based management</li><li>Regular reassessment</li><li>Patient-centered communication</li></ul>',why_chain:[],points:10}}
    ];
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:var(--rdx-teal-dark,#1f5f8b);margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><p>You mastered Hypertensive Emergency!</p></div>';}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3a90c0'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#b45309'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#b45309'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color: #1f5f8b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
