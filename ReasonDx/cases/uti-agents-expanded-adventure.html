{text-align:center;font-size:13px}.vital-item .label{color:var(--rdx-text-muted,#64748b);font-size:11px;display:block}.vital-item .value{font-weight:700;color:var(--rdx-teal-dark,#1f5f8b)}.socratic-prompt{background:linear-gradient(135deg,rgba(124,58,237,0.06),rgba(40,116,166,0.06));border:1px solid rgba(124,58,237,0.15);border-radius:12px;padding:16px 20px;margin:16px 0}.socratic-prompt h4{color:var(--rdx-purple,#7c3aed);font-size:0.95rem;margin-bottom:8px}.hint-box{background:rgba(217,119,6,0.06);border:1px solid rgba(217,119,6,0.15);border-radius:8px;padding:12px;margin:8px 0;font-size:0.9rem;color:#92400e;display:none}.options-grid{display:grid;gap:10px;margin:16px 0}.option-btn{background:var(--rdx-bg-card,#fff);border:2px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:14px 18px;cursor:pointer;text-align:left;font-size:14px;transition:all 0.2s;font-family:var(--rdx-font)}.option-btn:hover{border-color:var(--rdx-teal,#2874a6);background:rgba(40,116,166,0.03)}.option-btn.correct{border-color:#16a34a;background:rgba(22,163,74,0.06)}.option-btn.incorrect{border-color:#dc2626;background:rgba(220,38,38,0.04)}.option-btn.disabled{pointer-events:none;opacity:0.7}.explanation-box{border-radius:12px;padding:16px;margin:12px 0;display:none}.explanation-box.correct{background:rgba(22,163,74,0.06);border:1px solid rgba(22,163,74,0.2)}.explanation-box.incorrect{background:rgba(220,38,38,0.04);border:1px solid rgba(220,38,38,0.15)}.mechanism-box{background:linear-gradient(135deg,rgba(40,116,166,0.06),rgba(40,116,166,0.02));border:1px solid rgba(40,116,166,0.15);border-radius:12px;padding:20px;margin:16px 0}.mechanism-title{color:var(--rdx-teal-dark,#1f5f8b);font-weight:700;font-size:0.95rem;margin-bottom:10px}.pathway{line-height:1.8;font-size:0.93rem}.why-chain{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:12px;margin:8px 0}.why-q{font-weight:600;color:var(--rdx-purple,#7c3aed);cursor:pointer;font-size:0.9rem}.why-a{display:none;margin-top:6px;font-size:0.88rem;color:var(--rdx-text-muted,#64748b)}.next-btn{background:linear-gradient(135deg,#1f5f8b,#2874a6);color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:600;cursor:pointer;margin:20px 0;display:none;font-family:var(--rdx-font)}.next-btn:hover{opacity:0.9;transform:translateY(-1px)}.completion-card{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:16px;padding:32px;text-align:center;margin:24px 0}.completion-card h2{font-family:var(--rdx-font-serif);color:var(--rdx-teal-dark,#1f5f8b);margin-bottom:12px}.references-panel{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:16px;margin:20px 0}.references-panel a{display:block;color:var(--rdx-teal,#2874a6);font-size:13px;margin:4px 0;text-decoration:none}.references-panel a:hover{text-decoration:underline}.rdx-crossplatform-nav{background:var(--rdx-bg-card,#f8fafc);border:1px solid var(--rdx-border,#e2e8f0);border-radius:12px;padding:20px;margin:24px 0}.rdx-crossplatform-nav h4{color:var(--rdx-text-muted,#64748b);margin-bottom:12px;font-size:0.9rem}.rdx-crossplatform-links{display:flex;gap:12px;flex-wrap:wrap}.rdx-crossplatform-link{background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;padding:12px 16px;text-decoration:none;color:var(--rdx-text,#1e293b);font-size:13px;font-weight:500;transition:all 0.2s}.rdx-crossplatform-link:hover{background:rgba(40,116,166,0.05);transform:translateY(-2px)}@media(max-width:640px){.score-tracker{top:auto;bottom:12px;right:12px}.container{padding:12px}.vital-signs{grid-template-columns:repeat(3,1fr)}}</style>

<script>let currentStage=0,score=0,difficulty='standard';
const stages=[{
title:"Clinical Scenario",
content:`<div class="narrative"><p>A 25-year-old woman with 2 days of dysuria, frequency, and suprapubic pain. Urine dipstick: nitrites+, LE+.</p><div class="vital-signs"><div class="vital-item"><span class="label">HR</span><span class="value">76</span></div><div class="vital-item"><span class="label">Temp</span><span class="value">37.1°C</span></div></div></div>`,
hint_beginner:"What is first-line for uncomplicated cystitis?",
hint_advanced:"Consider the pharmacologic principles underlying this drug class.",
question:{
prompt:"What is first-line for uncomplicated cystitis?",
options:[{text:"Inhibits cell membrane synthesis",correct:false},{text:"Blocks RNA polymerase",correct:false},{text:"Nitrofurantoin 100mg BID × 5 days or TMP-SMX DS BID × 3 days (if local resistance <20%). NOT fluoroquinolones for uncomplicated UTI.",correct:true},{text:"Inhibits folic acid metabolism",correct:false}],
explanation:{correct:"Correct! Nitrofurantoin 100mg BID × 5 days or TMP-SMX DS BID × 3 days (if local resistance <20%). NOT fluoroquinolones for uncomplicated UTI..",incorrect:"Nitrofurantoin 100mg BID × 5 days or TMP-SMX DS BID × 3 days (if local resistance <20%). NOT fluoroquinolones for uncomplicated UTI."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">First-Line UTI Agents</div><div class="pathway"><strong>Uncomplicated cystitis (in order):</strong><br>1. Nitrofurantoin 100mg BID × 5 days<br>2. TMP-SMX DS BID × 3 days (if resistance <20%)<br>3. Fosfomycin 3g single dose<br><strong>NOT first-line:</strong> Fluoroquinolones, beta-lactams (inferior cure rates for cystitis)</div></div>`,
why_chain:[],
points:10
}
},{
title:"Spectrum & Coverage",
content:`<div class="narrative"><p>Understanding the antimicrobial spectrum guides appropriate use.</p></div>`,
hint_beginner:"Why is nitrofurantoin preferred over fluoroquinolones for uncomplicated UTI?",
hint_advanced:"Think about the unique organisms this drug covers that alternatives do not.",
question:{
prompt:"Why is nitrofurantoin preferred over fluoroquinolones for uncomplicated UTI?",
options:[{text:"Covers only gram-positive organisms",correct:false},{text:"No anaerobic activity",correct:false},{text:"Active only against fungi",correct:false},{text:"Narrow spectrum (preserves normal flora, less C. diff risk), high urinary concentration, low resistance rates (3-5%), minimal collateral damage. FQs are too broad and resistance-promoting.",correct:true}],
explanation:{correct:"Correct! Narrow spectrum (preserves normal flora, less C. diff risk), high urinary concentration, low resistance rates (3-5%), minimal collateral damage. FQs are too broad and resistance-promoting..",incorrect:"Narrow spectrum (preserves normal flora, less C. diff risk), high urinary concentration, low resistance rates (3-5%), minimal collateral damage. FQs are too broad and resistance-promoting."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Nitrofurantoin</div><div class="pathway"><strong>MOA:</strong> Reduced by bacterial nitroreductases → reactive intermediates damage DNA, RNA, proteins, and cell wall<br><strong>Spectrum:</strong> E. coli, S. saprophyticus, Enterococcus. NOT Proteus, Pseudomonas, Klebsiella (intrinsic resistance)<br><strong>Key:</strong> Concentrated in urine only → for lower UTI only. Not for pyelo or systemic infections.</div></div>`,
why_chain:[],
points:10
}
},{
title:"Dosing & Administration",
content:`<div class="narrative"><p>Proper dosing maximizes efficacy and minimizes toxicity.</p></div>`,
hint_beginner:"When is nitrofurantoin contraindicated?",
hint_advanced:"Consider the PK/PD parameters that drive efficacy for this class.",
question:{
prompt:"When is nitrofurantoin contraindicated?",
options:[{text:"CrCl <30 mL/min (inadequate urinary concentration), pyelonephritis (poor tissue/serum levels), systemic infections. Use only for lower UTI.",correct:true},{text:"Always requires IV administration",correct:false},{text:"Dose based on ideal body weight only",correct:false},{text:"Fixed dose regardless of indication",correct:false}],
explanation:{correct:"Correct! CrCl <30 mL/min (inadequate urinary concentration), pyelonephritis (poor tissue/serum levels), systemic infections. Use only for lower UTI..",incorrect:"CrCl <30 mL/min (inadequate urinary concentration), pyelonephritis (poor tissue/serum levels), systemic infections. Use only for lower UTI."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Nitrofurantoin Limits</div><div class="pathway"><strong>Contraindications:</strong> CrCl <30 mL/min, pyelonephritis, systemic infection<br><strong>Organisms NOT covered:</strong> Proteus (intrinsic resistance — alkaline urine inactivates drug), Pseudomonas, most Klebsiella<br><strong>Pregnancy:</strong> Safe in 2nd/3rd trimester. Avoid at term (risk of neonatal hemolytic anemia).</div></div>`,
why_chain:[],
points:10
}
},{
title:"Adverse Effects",
content:`<div class="narrative"><p>Monitoring for side effects is essential for patient safety.</p></div>`,
hint_beginner:"What is the most concerning adverse effect of long-term nitrofurantoin?",
hint_advanced:"Consider which effects are dose-dependent vs idiosyncratic.",
question:{
prompt:"What is the most concerning adverse effect of long-term nitrofurantoin?",
options:[{text:"Ototoxicity only",correct:false},{text:"Pulmonary fibrosis (chronic use for prophylaxis) — both acute hypersensitivity pneumonitis and chronic interstitial fibrosis. Also hepatotoxicity and peripheral neuropathy.",correct:true},{text:"Only affects renal function",correct:false},{text:"No significant adverse effects",correct:false}],
explanation:{correct:"Correct! Pulmonary fibrosis (chronic use for prophylaxis) — both acute hypersensitivity pneumonitis and chronic interstitial fibrosis. Also hepatotoxicity and peripheral neuropathy..",incorrect:"Pulmonary fibrosis (chronic use for prophylaxis) — both acute hypersensitivity pneumonitis and chronic interstitial fibrosis. Also hepatotoxicity and peripheral neuropathy."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Nitrofurantoin Toxicity</div><div class="pathway"><strong>Pulmonary:</strong> Acute hypersensitivity pneumonitis (fever, eosinophilia — reversible) or chronic interstitial fibrosis (irreversible, with long-term prophylaxis)<br><strong>Peripheral neuropathy:</strong> Especially in renal impairment (drug accumulates)<br><strong>Hepatotoxicity:</strong> Rare, cholestatic or hepatocellular pattern<br><strong>GI:</strong> Nausea (take with food to reduce). Macrocrystalline formulation better tolerated.</div></div>`,
why_chain:[],
points:10
}
},{
title:"Resistance",
content:`<div class="narrative"><p>Understanding resistance guides empiric therapy choices.</p></div>`,
hint_beginner:"Why is fosfomycin useful as a single-dose UTI treatment?",
hint_advanced:"Compare enzymatic modification, target alteration, and efflux as resistance strategies.",
question:{
prompt:"Why is fosfomycin useful as a single-dose UTI treatment?",
options:[{text:"Only plasmid-mediated resistance",correct:false},{text:"No resistance has been documented",correct:false},{text:"Single 3g oral dose for uncomplicated cystitis. Broad spectrum including ESBL E. coli. Unique mechanism (inhibits MurA, first step of peptidoglycan synthesis). Low resistance. Pregnancy category B.",correct:true},{text:"Resistance occurs only in gram-positives",correct:false}],
explanation:{correct:"Correct! Single 3g oral dose for uncomplicated cystitis. Broad spectrum including ESBL E. coli. Unique mechanism (inhibits MurA, first step of peptidoglycan synthesis). Low resistance. Pregnancy category B..",incorrect:"Single 3g oral dose for uncomplicated cystitis. Broad spectrum including ESBL E. coli. Unique mechanism (inhibits MurA, first step of peptidoglycan synthesis). Low resistance. Pregnancy category B."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Fosfomycin</div><div class="pathway"><strong>MOA:</strong> Inhibits MurA (UDP-N-acetylglucosamine enolpyruvyl transferase) — first step of peptidoglycan synthesis. Unique target → minimal cross-resistance.<br><strong>Dose:</strong> 3g single oral dose<br><strong>Spectrum:</strong> Broad including ESBL E. coli, VRE (urinary). NOT for systemic infections (low serum levels in US oral formulation).</div></div>`,
why_chain:[],
points:10
}
},{
title:"Clinical Application",
content:`<div class="narrative"><p>Integrating mechanism, spectrum, and resistance data guides optimal clinical use.</p></div>`,
hint_beginner:"How do you treat complicated UTI or pyelonephritis?",
hint_advanced:"Consider guideline recommendations and antimicrobial stewardship principles.",
question:{
prompt:"How do you treat complicated UTI or pyelonephritis?",
options:[{text:"Only for prophylaxis",correct:false},{text:"Empiric monotherapy for all infections",correct:false},{text:"Reserved for outpatient use only",correct:false},{text:"Fluoroquinolone (levofloxacin) or ceftriaxone for pyelonephritis. Duration 7-14 days depending on severity. Remove/replace urinary catheter if CAUTI. Always obtain cultures.",correct:true}],
explanation:{correct:"Correct! Fluoroquinolone (levofloxacin) or ceftriaxone for pyelonephritis. Duration 7-14 days depending on severity. Remove/replace urinary catheter if CAUTI. Always obtain cultures..",incorrect:"Fluoroquinolone (levofloxacin) or ceftriaxone for pyelonephritis. Duration 7-14 days depending on severity. Remove/replace urinary catheter if CAUTI. Always obtain cultures."},
teaching:`<div class="mechanism-box"><div class="mechanism-title">Complicated UTI Treatment</div><div class="pathway"><strong>Pyelonephritis (outpatient):</strong> Fluoroquinolone × 7 days or ceftriaxone IM then oral step-down<br><strong>Pyelonephritis (inpatient):</strong> Ceftriaxone IV, fluoroquinolone IV, or pip-tazo if risk factors for resistance<br><strong>CAUTI:</strong> Remove/replace catheter + antibiotics based on culture<br><strong>ESBL UTI:</strong> Carbapenems for systemic; nitrofurantoin or fosfomycin may work for lower UTI</div></div>`,
why_chain:[],
points:10
}
}];
document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');const hb=document.querySelector('.hint-box');if(hb)hb.style.display=d==='beginner'?'block':'none'}
function toggleReferences(){const c=document.getElementById('referencesContent');const t=document.getElementById('refToggle');if(c.style.display==='none'){c.style.display='block';t.innerHTML='&#9662;'}else{c.style.display='none';t.innerHTML='&#9656;'}}
function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100);document.getElementById('progress').style.width=pct+'%';let h='<h2 class="scene-title">'+st.title+'</h2>';h+='<div class="scene-content">'+st.content+'</div>';if(st.hint_beginner)h+='<div class="hint-box" id="hint-box"'+(difficulty==='beginner'?' style="display:block"':'')+'> '+st.hint_beginner+'</div>';if(difficulty==='advanced'&&st.hint_advanced)h+='<div class="hint-box" style="display:block;background:rgba(124,58,237,0.06);border-color:rgba(124,58,237,0.15);color:#5b21b6"> '+st.hint_advanced+'</div>';if(st.question){h+='<div class="socratic-prompt"><h4>Clinical Question</h4><p>'+st.question.prompt+'</p></div>';h+='<div class="options-grid" id="options-'+idx+'">';st.question.options.forEach((opt,oi)=>{h+='<button class="option-btn" id="option-'+idx+'-'+oi+'" onclick="checkAnswer('+idx+','+oi+')">'+String.fromCharCode(65+oi)+'. '+opt.text+'</button>'});h+='</div>';h+='<div class="explanation-box" id="explain-'+idx+'"></div>';h+='<div id="teaching-'+idx+'" style="display:none">'+st.question.teaching+'</div>';if(st.question.why_chain&&st.question.why_chain.length>0){h+='<div id="why-'+idx+'" style="display:none">';st.question.why_chain.forEach((wc,wi)=>{h+='<div class="why-chain"><div class="why-q" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'"> '+wc.q+'</div><div class="why-a">'+wc.a+'</div></div>'});h+='</div>'}}h+='<button class="next-btn" id="next-'+idx+'" onclick="nextStage()">Continue &rarr;</button>';document.getElementById('scene-container').innerHTML=h}
function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll('#options-'+si+' .option-btn').forEach((b,i)=>{b.classList.add('disabled');if(st.question.options[i].correct)b.classList.add('correct');if(i===oi&&!opt.correct)b.classList.add('incorrect')});const eb=document.getElementById('explain-'+si);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;eb.className='explanation-box correct';eb.innerHTML='<strong>Correct!</strong> '+st.question.explanation.correct}else{eb.className='explanation-box incorrect';eb.innerHTML='<strong>Not quite.</strong> '+st.question.explanation.incorrect}eb.style.display='block';document.getElementById('teaching-'+si).style.display='block';const wy=document.getElementById('why-'+si);if(wy)wy.style.display='block';document.getElementById('next-'+si).style.display='inline-block'}
function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let lvl='Developing';if(pct>=90)lvl='Mastery';else if(pct>=70)lvl='Proficient';else if(pct>=50)lvl='Competent';document.getElementById('scene-container').innerHTML='<div class="completion-card"><h2>Case Complete!</h2><p style="font-size:2rem;font-weight:700;color:var(--rdx-teal,#2874a6)">'+pct+'%</p><p style="color:var(--rdx-text-muted,#64748b)">Score: '+score+'/'+mx+'</p><p style="margin:12px 0;font-weight:600">Level: '+lvl+'</p><div style="margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap"><a href="../adventure-hub.html" style="padding:10px 20px;background:var(--rdx-teal,#2874a6);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">More Cases</a><a href="../tools/learning-dashboard.html" style="padding:10px 20px;background:var(--rdx-purple,#7c3aed);color:#fff;border-radius:8px;text-decoration:none;font-weight:600">Dashboard</a><button onclick="currentStage=0;score=0;document.getElementById(\'score\').textContent=0;renderStage(0)" style="padding:10px 20px;background:var(--rdx-bg-card,#fff);border:1px solid var(--rdx-border,#e2e8f0);border-radius:8px;cursor:pointer;font-weight:600">Retry</button></div></div>';try{const progress=JSON.parse(localStorage.getItem('reasondx-progress')||'{}');if(!progress.cases)progress.cases={};progress.cases['uti-agents']=Math.max(progress.cases['uti-agents']||0,pct);localStorage.setItem('reasondx-progress',JSON.stringify(progress))}catch(e){}}
renderStage(0);</script>
