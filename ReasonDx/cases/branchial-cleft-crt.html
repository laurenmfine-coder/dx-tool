    <div class="container">
        <div class="header">
            <h1>🔬 Branchial Cleft Anomalies</h1>
            <div class="score-display">
                <div class="score-item">Score: <strong id="score">0</strong>/<span id="maxScore">60</span></div>
                <div class="score-item">Stage: <span id="stageNum">1</span>/6</div>
            </div>

        <div class="progress-bar"><div class="progress-fill" id="progress" style="width: 16%"></div></div>
        <div id="scene-container"></div>
    </div>
    <script>
    let currentStage = 0, score = 0;
    const stages = [
        {title:"The Lateral Neck Mass",content:'<div class="narrative"><p>A <span class="highlight">7-year-old girl</span> presents with a <span class="highlight">painless mass on the left side of her neck</span> that her mother noticed 2 months ago. The mass has slowly enlarged. No fever, weight loss, or night sweats. On exam, there is a <span class="highlight">3 cm fluctuant, non-tender mass at the anterior border of the sternocleidomastoid muscle</span> at the junction of the upper and middle thirds.</p></div>',question:{prompt:"What is the MOST likely diagnosis?",options:[{text:"Thyroglossal duct cyst",correct:false},{text:"Second branchial cleft cyst",correct:true},{text:"Reactive lymphadenopathy",correct:false},{text:"Cystic hygroma",correct:false}],explanation:{correct:"Correct! This is the classic presentation of a 2nd branchial cleft cyst: painless, fluctuant lateral neck mass at the anterior border of SCM at the junction of upper/middle thirds. Second cleft anomalies account for 90-95% of all branchial anomalies.",incorrect:"A lateral neck mass at the anterior SCM border = 2nd branchial cleft cyst (90-95% of branchial anomalies). Thyroglossal duct cysts are MIDLINE."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 2nd Branchial Cleft Cyst</div><div class="pathway">LOCATION: Anterior border of SCM\n         (junction upper/middle 1/3)\n\nFREQUENCY: 90-95% of all\n           branchial anomalies\n\nINTERNAL OPENING: Tonsillar fossa\n\nTRACT COURSE:\n• Between ICA and ECA\n• Over CN XII and CN IX\n\nPRESENTATION:\n• Painless, fluctuant mass\n• May enlarge with URI\n• "Recurrent neck abscess"</div></div>',points:10}},
        
        {title:"Embryology Connection",content:'<div class="narrative"><p>You explain to the parents that this is a congenital anomaly from incomplete obliteration of embryonic structures during development.</p></div>',question:{prompt:"Which embryonic structure fails to obliterate, leading to 2nd branchial cleft cysts?",options:[{text:"Thyroglossal duct",correct:false},{text:"Cervical sinus of His",correct:true},{text:"Foramen cecum",correct:false},{text:"Rathke's pouch",correct:false}],explanation:{correct:"Correct! During weeks 4-7, the 2nd pharyngeal arch overgrows clefts 2-4, forming the cervical sinus of His. This normally obliterates completely. Persistence of this sinus leads to 2nd branchial cleft anomalies.",incorrect:"The cervical sinus of His forms when the 2nd arch overgrows clefts 2-4 and normally obliterates. Persistence = branchial anomaly."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Embryology</div><div class="pathway">WEEK 4-7 DEVELOPMENT:\n\n2nd pharyngeal arch overgrows\n         ↓\nCovers clefts 2, 3, and 4\n         ↓\nForms CERVICAL SINUS OF HIS\n         ↓\nNormally OBLITERATES completely\n         ↓\nIf persists → Branchial anomaly\n\nANOMALY TYPES:\n• Cyst = enclosed, no opening\n• Sinus = one opening\n• Fistula = two openings</div></div>',points:10}},

        {title:"Anatomy of the Tract",content:'<div class="narrative"><p>If this were a complete fistula rather than a cyst, the tract would follow a predictable anatomical course.</p></div>',question:{prompt:"A complete 2nd branchial fistula would have its INTERNAL opening in the:",options:[{text:"External auditory canal",correct:false},{text:"Pyriform sinus",correct:false},{text:"Tonsillar fossa",correct:true},{text:"Base of tongue",correct:false}],explanation:{correct:"Correct! A 2nd branchial fistula opens internally into the tonsillar fossa. The tract passes between the ICA and ECA, over CN XII and CN IX. Memory aid: 2nd = Tonsil.",incorrect:"2nd branchial = Tonsillar fossa. 1st = EAC (ear). 3rd/4th = Pyriform sinus."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Internal Openings</div><div class="pathway">CLEFT → INTERNAL OPENING\n━━━━━━━━━━━━━━━━━━━━━━━━\n1st  →  External auditory canal\n\n2nd  →  TONSILLAR FOSSA\n        (between ICA and ECA)\n\n3rd  →  Pyriform sinus\n        (above sup. laryngeal n.)\n\n4th  →  Pyriform sinus apex\n        (below sup. laryngeal n.)\n\nMEMORY: 1=Ear, 2=Tonsil, 3/4=Pyriform</div></div>',points:10}},

        {title:"Differential Diagnosis",content:'<div class="narrative"><p>A colleague asks how you distinguished this from a thyroglossal duct cyst.</p></div>',question:{prompt:"What clinical feature BEST distinguishes a thyroglossal duct cyst from a branchial cleft cyst?",options:[{text:"Patient age at presentation",correct:false},{text:"MIDLINE location that elevates with swallowing",correct:true},{text:"Presence of fever",correct:false},{text:"Size of the mass",correct:false}],explanation:{correct:"Correct! Thyroglossal duct cysts are MIDLINE (from foramen cecum to thyroid) and characteristically elevate with swallowing or tongue protrusion because they're attached to the hyoid. Branchial cysts are LATERAL and don't move with swallowing.",incorrect:"Thyroglossal = MIDLINE + moves with swallowing. Branchial = LATERAL + does not move with swallowing."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Thyroglossal vs Branchial</div><div class="pathway">THYROGLOSSAL      BRANCHIAL\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\nMIDLINE           LATERAL\n\nMoves with        Does NOT move\nswallowing        with swallowing\n\nForamen cecum     Pharyngeal\n→ thyroid         cleft origin\n\nSistrunk          Complete\nprocedure         excision\n(remove hyoid)</div></div>',points:10}},

        {title:"The Concerning Adult Case",content:'<div class="narrative"><p>A 52-year-old man presents with a new lateral neck mass in a similar location. He has a 30 pack-year smoking history.</p></div>',question:{prompt:"In an adult over 40 with a new 'branchial cleft cyst,' what must you rule out?",options:[{text:"Thyroid cancer",correct:false},{text:"Cystic metastasis from oropharyngeal SCC",correct:true},{text:"Lymphoma",correct:false},{text:"Carotid body tumor",correct:false}],explanation:{correct:"Correct! In adults >40, a 'branchial cleft cyst' presenting for the first time should raise suspicion for CYSTIC METASTATIC SCC, often HPV-related oropharyngeal cancer. Must evaluate the oropharynx and consider FNA/biopsy!",incorrect:"In adults >40, new lateral cystic neck mass = suspect cystic SCC metastasis until proven otherwise. Evaluate oropharynx!"},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Adult Warning</div><div class="pathway">NEW "BRANCHIAL CYST" IN ADULT >40:\n\n⚠️ SUSPECT CYSTIC SCC METASTASIS!\n\n• Often HPV-related oropharyngeal Ca\n• Tonsil or base of tongue primary\n• May present as cystic neck mass\n  BEFORE primary is obvious\n\nWORKUP:\n• Thorough oropharynx exam\n• FNA with cytology + HPV testing\n• CT neck with contrast\n• Consider PET-CT\n• Panendoscopy if primary not found\n\nDO NOT just excise assuming benign!</div></div>',points:10}},

        {title:"Management",content:'<div class="narrative"><p>You recommend surgical excision for the 7-year-old patient after confirming the diagnosis with ultrasound.</p></div>',question:{prompt:"What is the key surgical principle to prevent recurrence?",options:[{text:"Marsupalization of the cyst",correct:false},{text:"Complete excision of the entire cyst and tract",correct:true},{text:"Aspiration and injection of sclerosant",correct:false},{text:"Antibiotic treatment alone",correct:false}],explanation:{correct:"Correct! COMPLETE surgical excision of the entire cyst and any associated tract is essential to prevent recurrence. Incomplete excision or prior I&D can increase recurrence rates up to 20%. Wait until acute infection resolves before surgery.",incorrect:"Complete excision is essential. Incomplete excision leads to recurrence rates up to 20%."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Surgical Principles</div><div class="pathway">MANAGEMENT:\n• Complete surgical excision\n• Wait if acutely infected\n• Excise ENTIRE tract\n\nSURGICAL TIPS:\n• Methylene blue injection if sinus\n• Horizontal skin crease incision\n• Step-ladder incisions for long tracts\n• Protect carotids, CN XII, CN IX\n\nRECURRENCE RATES:\n• Complete excision: <3%\n• Incomplete/infected: up to 20%\n\n3rd/4th CLEFT OPTIONS:\n• Endoscopic cautery of internal opening\n• Open excision if cautery fails</div></div>',points:10}}
    ];
    
    function updateProgress(){
        document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';
        document.getElementById('stageNum').textContent=currentStage+1;
        document.getElementById('maxScore').textContent=stages.length*10;
    }
    
    function renderStage(){
        const stage=stages[currentStage];
        let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;
        if(stage.question){
            html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';
            stage.question.options.forEach((opt,i)=>{
                html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';
            });
            html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div>';
            html+='<div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';
            if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';
            html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';
        }
        html+='</div>';
        document.getElementById('scene-container').innerHTML=html;
        updateProgress();
    }
    
    function checkAnswer(idx,correct){
        const options=document.querySelectorAll('.mcq-option');
        if(options[0].classList.contains('disabled'))return;
        options.forEach((opt,i)=>{
            opt.classList.add('disabled');
            if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');
            else if(i===idx&&!correct)opt.classList.add('incorrect');
        });
        if(correct){
            document.getElementById('fb-correct').classList.add('show');
            score+=stages[currentStage].question.points;
            document.getElementById('score').textContent=score;
        }else{
            document.getElementById('fb-incorrect').classList.add('show');
        }
        document.getElementById('teaching').classList.add('show');
        document.getElementById('next-btn').classList.add('show');
    }
    
    function nextStage(){
        if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}
        else{document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:var(--rdx-teal-dark,#0f766e);margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><div style="margin-top:20px;padding:15px;background:rgba(59,130,246,0.15);border-radius:12px;border:1px solid rgba(59,130,246,0.3);"><p style="color:var(--rdx-teal-light,#ccfbf1);margin-bottom:10px;font-weight:600;">📚 Learn More:</p><div style="display:flex;flex-wrap:wrap;gap:8px;"><a href="../mechanism/branchial-cleft-anomalies-module.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📘 ReasonDx</a><a href="../mechanism/pharyngeal-apparatus-module.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📘 ReasonDx</a></div><div style="margin-top:10px;"><a href="https://www.ncbi.nlm.nih.gov/books/NBK499914/" target="_blank" style="color:var(--rdx-teal-light,#ccfbf1);font-size:0.8rem;">📖 StatPearls Reference</a></div></div><p>You mastered Branchial Cleft Anomalies!</p></div>';}
    }
    
    renderStage();
    </script>
