<script>
let currentStage=0,score=0,maxScore=0,difficulty='standard',answeredQuestions=new Set(),decisionPath=[];
const stages=[
{title:"The Elevated Eosinophils",content:`<div class="narrative"><p>34-year-old man referred for persistent eosinophilia found on routine labs. AEC 2,400/µL (normal <500). He has mild asthma controlled on ICS and seasonal allergies.</p><p style="margin-top:12px;"><strong>History:</strong> No recent travel, no new medications, no weight loss or fevers<br><strong>Review of Systems:</strong> Occasional heartburn, mild nasal congestion<br><strong>Exam:</strong> Clear lungs, no rash, no lymphadenopathy, no hepatosplenomegaly</p></div><div class="socratic-prompt"><h4>Define and Classify</h4><p>What defines eosinophilia, and how is severity classified?</p></div>`,
hint_beginner:"Mild, moderate, severe based on absolute eosinophil count",hint_advanced:"What AEC level raises concern for organ damage?",
question:{prompt:"AEC 2,400/µL. How do you classify this eosinophilia?",
options:[{text:"Moderate eosinophilia (1,500-5,000/µL); Mild is 500-1,500, Severe (hypereosinophilia) is >5,000; >1,500 warrants workup for underlying cause",correct:true},
{text:"This is normal - no workup needed",correct:false},
{text:"Severe eosinophilia requiring immediate treatment",correct:false},
{text:"Eosinophilia only matters if >10,000",correct:false}],
explanation:{correct:"Classification: Mild (500-1,500/µL), Moderate (1,500-5,000/µL), Severe/Hypereosinophilia (>5,000/µL). Any persistent elevation >500 deserves investigation. >1,500 (hypereosinophilia) warrants thorough workup. >5,000 raises concern for eosinophilic organ damage.",incorrect:"AEC 2,400 is moderate eosinophilia and warrants investigation. Persistent eosinophilia can cause organ damage (heart, lungs, GI, skin, nervous system) even at moderate levels."},
teaching:`<h4>Eosinophilia Classification</h4><p><strong>Mild:</strong> 500-1,500/µL</p><p><strong>Moderate:</strong> 1,500-5,000/µL</p><p><strong>Severe (Hypereosinophilia):</strong> >5,000/µL</p><p><strong>Hypereosinophilic syndrome:</strong> >1,500 + organ damage or dysfunction</p>`,
why_chain:[{q:"Why does the absolute count matter more than percentage?",a:"Percentage can be misleading - a high percentage with low WBC may be normal absolute count. AEC = WBC × eosinophil percentage. Always use absolute eosinophil count for classification and management decisions."}],points:10}},

{title:"The NAACP Mnemonic",content:`<div class="narrative"><p>Approach eosinophilia systematically with the major categories of causes.</p></div><div class="socratic-prompt"><h4>Differential Diagnosis</h4><p>What are the major categories of eosinophilia causes?</p></div>`,
hint_beginner:"NAACP: Neoplasm, Allergy, Adrenal insufficiency, Connective tissue, Parasites",hint_advanced:"What's the most common cause worldwide vs in developed countries?",
question:{prompt:"What causes eosinophilia? (NAACP)",
options:[{text:"Neoplasm (lymphoma, leukemia, solid tumors), Allergy/Atopy (asthma, allergic rhinitis, eczema, drug reactions), Adrenal insufficiency, Connective tissue disease (EGPA, eosinophilic fasciitis), Parasites (helminths - most common worldwide)",correct:true},
{text:"Only parasites cause eosinophilia",correct:false},
{text:"Only allergies cause eosinophilia",correct:false},
{text:"Bacterial infections cause eosinophilia",correct:false}],
explanation:{correct:"NAACP: Neoplasm, Allergy/Atopy, Adrenal insufficiency, Connective tissue disease, Parasites. Also: drugs (common!), primary eosinophilic GI disorders, idiopathic hypereosinophilic syndrome. Worldwide, parasites (helminths) are #1. In developed countries, allergic diseases and drugs are most common.",incorrect:"Multiple categories cause eosinophilia. Bacterial infections typically cause neutrophilia, NOT eosinophilia (exception: scarlet fever recovery). Parasites cause eosinophilia because helminths trigger Th2/IgE response."},
teaching:`<h4>NAACP Differential</h4><p><strong>N</strong>eoplasm: Lymphoma, leukemia, solid tumors</p><p><strong>A</strong>llergy: Asthma, rhinitis, eczema, drug reactions</p><p><strong>A</strong>drenal insufficiency</p><p><strong>C</strong>onnective tissue: EGPA, eosinophilic fasciitis</p><p><strong>P</strong>arasites: Helminths (tissue-invasive especially)</p>`,
why_chain:[{q:"Why don't bacteria cause eosinophilia?",a:"Bacteria trigger Th1 immune response → neutrophils. Parasites (helminths) and allergens trigger Th2 response → IL-5 → eosinophil production and activation. This is why eosinophilia suggests allergy, parasites, or certain malignancies - not bacterial infection."}],points:15}},

{title:"Initial Workup",content:`<div class="narrative"><p>Begin the systematic evaluation.</p></div><div class="socratic-prompt"><h4>Diagnostic Approach</h4><p>What is the initial workup for unexplained eosinophilia?</p></div>`,
hint_beginner:"History is key - travel, drugs, allergies, symptoms",hint_advanced:"When do you need bone marrow biopsy?",
question:{prompt:"What is the initial workup for eosinophilia?",
options:[{text:"Thorough history (travel, medications, allergies, symptoms), CBC with differential, comprehensive metabolic panel, stool ova & parasites (×3 if travel), IgE level, peripheral smear; consider chest X-ray, echocardiogram if significant eosinophilia",correct:true},
{text:"Bone marrow biopsy immediately",correct:false},
{text:"No workup needed until AEC >10,000",correct:false},
{text:"Treat empirically with steroids first",correct:false}],
explanation:{correct:"Systematic workup: detailed history (travel to endemic areas, ALL medications including OTC/supplements, atopic history, symptoms suggesting organ involvement), labs (CBC, CMP, stool O&P ×3 if travel/exposure, IgE, peripheral smear), imaging if needed. Bone marrow if concern for primary hematologic disorder.",incorrect:"History is the most important first step - often reveals the cause (drug, travel, atopy). Bone marrow reserved for unexplained hypereosinophilia or concern for clonal disorder. Don't treat with steroids before diagnosis."},
teaching:`<h4>Eosinophilia Workup</h4><p><strong>History:</strong> Travel, drugs, allergies, symptoms by organ system</p><p><strong>Labs:</strong> CBC, CMP, stool O&P ×3, IgE, peripheral smear</p><p><strong>Consider:</strong> CXR, echo (if HES concern), HIV, B12</p><p><strong>Advanced:</strong> Bone marrow, FISH for FIP1L1-PDGFRA if unexplained</p>`,
why_chain:[{q:"Why stool O&P times three?",a:"Parasites shed eggs intermittently. Single stool sample sensitivity is only 60-70%. Three samples on different days increases sensitivity to >90%. Also consider serology for specific parasites based on exposure history."}],points:10}},

{title:"Drug-Induced Eosinophilia",content:`<div class="narrative"><p>Review of medications reveals the patient started a new supplement 2 months ago. Drug-induced eosinophilia is very common.</p></div><div class="socratic-prompt"><h4>Medication Causes</h4><p>What drugs commonly cause eosinophilia?</p></div>`,
hint_beginner:"Antibiotics, NSAIDs, anticonvulsants are common culprits",hint_advanced:"What is DRESS syndrome?",
question:{prompt:"What medications commonly cause eosinophilia?",
options:[{text:"Antibiotics (penicillins, sulfonamides, quinolones), NSAIDs, anticonvulsants (phenytoin, carbamazepine), allopurinol, supplements; can range from benign eosinophilia to DRESS syndrome",correct:true},
{text:"Only IV medications cause eosinophilia",correct:false},
{text:"Steroids cause eosinophilia",correct:false},
{text:"Drug-induced eosinophilia is rare",correct:false}],
explanation:{correct:"Drug-induced eosinophilia is VERY common. Major culprits: antibiotics (beta-lactams, sulfonamides), NSAIDs, anticonvulsants, allopurinol. Can be benign or part of DRESS syndrome (Drug Reaction with Eosinophilia and Systemic Symptoms). Always review ALL medications including supplements.",incorrect:"Drug-induced eosinophilia is one of the most common causes in developed countries. Steroids actually DECREASE eosinophils. Always suspect medications in any patient with new eosinophilia."},
teaching:`<h4>Drug-Induced Eosinophilia</h4><p><strong>Antibiotics:</strong> Penicillins, cephalosporins, sulfonamides, quinolones</p><p><strong>Anticonvulsants:</strong> Phenytoin, carbamazepine, lamotrigine</p><p><strong>Others:</strong> NSAIDs, allopurinol, famotidine, supplements</p><p><strong>Severe:</strong> DRESS syndrome (eosinophilia + rash + organ involvement)</p>`,
why_chain:[{q:"How long after starting a drug does eosinophilia appear?",a:"Typically 2-8 weeks after starting the medication. DRESS syndrome is characteristically delayed (2-8 weeks). This delayed onset can make the connection less obvious - always ask about medications started in the past 2-3 months."}],points:10}},

{title:"Parasitic Causes",content:`<div class="narrative"><p>Patient denies recent travel but ate sushi regularly. Consider parasitic causes of eosinophilia.</p></div><div class="socratic-prompt"><h4>Parasites and Eosinophilia</h4><p>Which parasites cause eosinophilia, and which don't?</p></div>`,
hint_beginner:"Helminths (worms) cause eosinophilia; protozoa generally don't",hint_advanced:"What is Strongyloides hyperinfection?",
question:{prompt:"Which parasites cause eosinophilia?",
options:[{text:"Helminths (tissue-invasive worms) cause eosinophilia: Strongyloides, Ascaris, hookworm, Toxocara, Trichinella, filarial worms; Protozoa (Giardia, Entamoeba) generally do NOT cause eosinophilia",correct:true},
{text:"All parasites cause eosinophilia equally",correct:false},
{text:"Only tropical parasites cause eosinophilia",correct:false},
{text:"Giardia is the most common cause of eosinophilia",correct:false}],
explanation:{correct:"Key distinction: HELMINTHS (worms) cause eosinophilia; PROTOZOA (Giardia, Entamoeba, Cryptosporidium) generally don't. Tissue-invasive phase is most eosinophilic. Strongyloides is critical - can persist for decades and cause fatal hyperinfection with immunosuppression.",incorrect:"Not all parasites are equal. Helminths trigger Th2/IL-5/eosinophil response. Protozoa don't typically cause eosinophilia. This distinction helps narrow the differential."},
teaching:`<h4>Parasites and Eosinophilia</h4><p><strong>Helminths (YES):</strong> Strongyloides, Ascaris, hookworm, Toxocara, Trichinella, filaria, schistosomiasis</p><p><strong>Protozoa (NO):</strong> Giardia, Entamoeba, Cryptosporidium</p><p><strong>Critical:</strong> Strongyloides - can persist decades, hyperinfection if immunosuppressed</p>`,
why_chain:[{q:"Why is Strongyloides so dangerous?",a:"Strongyloides can autoinfect (complete life cycle within host), persisting for decades after initial infection. If patient becomes immunosuppressed (steroids!), massive autoinfection causes hyperinfection syndrome with up to 90% mortality. Screen before starting steroids in anyone with possible exposure."}],points:15}},

{title:"Eosinophilic GI Disorders",content:`<div class="narrative"><p>Patient mentions heartburn and occasional dysphagia. Consider eosinophilic GI disease.</p></div><div class="socratic-prompt"><h4>GI Manifestations</h4><p>What are the primary eosinophilic GI disorders?</p></div>`,
hint_beginner:"EoE is most common - presents with dysphagia and food impaction",hint_advanced:"How many eosinophils on biopsy define EoE?",
question:{prompt:"What eosinophilic GI disorders should you consider?",
options:[{text:"Eosinophilic esophagitis (EoE) - most common; presents with dysphagia, food impaction; requires ≥15 eos/hpf on biopsy; also eosinophilic gastritis, enteritis, colitis (rarer)",correct:true},
{text:"Eosinophilic GI disease doesn't cause peripheral eosinophilia",correct:false},
{text:"Only diagnosed by blood tests",correct:false},
{text:"EoE only occurs in children",correct:false}],
explanation:{correct:"EoE is increasingly recognized, often with atopy history. Presents: dysphagia, food impaction, heartburn not responsive to PPI. Diagnosis requires ≥15 eos/hpf on esophageal biopsy. May or may not have peripheral eosinophilia. Treatment: PPI trial, swallowed topical steroids, elimination diets.",incorrect:"EoE can occur at any age (increasingly diagnosed in adults). Diagnosis requires biopsy - can't diagnose by blood tests alone. Peripheral eosinophilia may be absent."},
teaching:`<h4>Eosinophilic GI Disorders</h4><p><strong>EoE:</strong> Dysphagia, food impaction, ≥15 eos/hpf, atopy association</p><p><strong>Eosinophilic gastritis:</strong> Nausea, vomiting, abdominal pain</p><p><strong>Eosinophilic enteritis:</strong> Diarrhea, malabsorption, protein loss</p><p><strong>Note:</strong> Peripheral eosinophilia may be mild or absent</p>`,
why_chain:[{q:"What's the connection between EoE and food allergy?",a:"EoE is not classic IgE-mediated food allergy - skin testing and specific IgE are often negative. It's likely a mixed IgE and non-IgE (Th2-mediated) response. Elimination diets work but identifying triggers is challenging. Six-food elimination diet removes most common triggers."}],points:10}},

{title:"Hypereosinophilic Syndrome",content:`<div class="narrative"><p>If no secondary cause found and eosinophilia persists with organ involvement, consider hypereosinophilic syndrome (HES).</p></div><div class="socratic-prompt"><h4>When to Suspect HES</h4><p>What defines hypereosinophilic syndrome?</p></div>`,
hint_beginner:"Persistent hypereosinophilia + organ damage + no secondary cause",hint_advanced:"What genetic abnormality defines a subset of HES?",
question:{prompt:"What defines hypereosinophilic syndrome (HES)?",
options:[{text:"Persistent AEC >1,500/µL + eosinophil-mediated organ damage/dysfunction + exclusion of secondary causes; can be idiopathic, lymphocytic variant (T-cell driven), or myeloproliferative (FIP1L1-PDGFRA positive)",correct:true},
{text:"Any eosinophilia above normal",correct:false},
{text:"Only diagnosed if AEC >50,000",correct:false},
{text:"HES never causes organ damage",correct:false}],
explanation:{correct:"HES criteria: AEC >1,500 on ≥2 occasions + organ damage/dysfunction attributable to eosinophilia + exclusion of secondary causes. Subtypes: idiopathic, lymphocytic (aberrant T-cells producing IL-5), myeloproliferative (FIP1L1-PDGFRA fusion - responds dramatically to imatinib).",incorrect:"HES is defined by persistent hypereosinophilia PLUS organ damage, not just elevated count. The distinction matters because HES requires treatment to prevent irreversible organ damage, especially cardiac."},
teaching:`<h4>Hypereosinophilic Syndrome</h4><p><strong>Criteria:</strong> AEC >1,500 (×2) + organ damage + no secondary cause</p><p><strong>Subtypes:</strong> Idiopathic, lymphocytic (T-cell), myeloproliferative (PDGFRA+)</p><p><strong>Organs affected:</strong> Heart, lungs, skin, GI, nervous system</p><p><strong>Key test:</strong> FIP1L1-PDGFRA (if positive → imatinib)</p>`,
why_chain:[{q:"Why is cardiac involvement so important?",a:"Eosinophilic cardiac disease (Loeffler endocarditis) can cause irreversible endomyocardial fibrosis, restrictive cardiomyopathy, and mural thrombi. Screen with echocardiogram and troponin. Cardiac involvement is a major cause of morbidity and mortality in HES."}],points:15}},

{title:"EGPA (Churg-Strauss)",content:`<div class="narrative"><p>Consider eosinophilic granulomatosis with polyangiitis (EGPA) in patients with asthma and eosinophilia.</p></div><div class="socratic-prompt"><h4>Vasculitis Connection</h4><p>What is EGPA and when should you suspect it?</p></div>`,
hint_beginner:"Asthma + eosinophilia + vasculitis = EGPA",hint_advanced:"What percentage are ANCA positive?",
question:{prompt:"When should you suspect EGPA (Churg-Strauss)?",
options:[{text:"Triad of asthma (often severe/late-onset) + eosinophilia + vasculitis (neuropathy, skin, cardiac, sinus); ANCA positive in ~40% (usually MPO/p-ANCA); eosinophils often very high",correct:true},
{text:"EGPA only affects lungs",correct:false},
{text:"EGPA never has asthma",correct:false},
{text:"All EGPA is ANCA positive",correct:false}],
explanation:{correct:"EGPA (formerly Churg-Strauss): adult-onset or worsening asthma + eosinophilia (often >1,500, can be very high) + vasculitis affecting multiple organs (mononeuritis multiplex, cardiac, skin purpura, sinusitis). ~40% ANCA positive (MPO/p-ANCA pattern). ANCA-negative EGPA tends to have more cardiac involvement.",incorrect:"EGPA is a systemic vasculitis, not just lung disease. The combination of asthma, eosinophilia, and multisystem involvement is the key. Negative ANCA doesn't rule out EGPA."},
teaching:`<h4>EGPA (Churg-Strauss)</h4><p><strong>Triad:</strong> Asthma + eosinophilia + vasculitis</p><p><strong>Organs:</strong> Nerves (mononeuritis multiplex), heart, skin, sinuses, lungs</p><p><strong>ANCA:</strong> ~40% positive (MPO/p-ANCA)</p><p><strong>Treatment:</strong> Steroids ± cyclophosphamide; mepolizumab approved</p>`,
why_chain:[{q:"Why is cardiac involvement critical in EGPA?",a:"Cardiac involvement (myocarditis, coronary arteritis, pericarditis) is the leading cause of death in EGPA. It's more common in ANCA-negative patients. Screen with echo and cardiac MRI if suspected. Early aggressive treatment is critical."}],points:10}},

{title:"Case Synthesis",content:`<div class="narrative"><p>Our patient's eosinophilia was attributed to the new supplement (stopped) plus underlying atopic disease. AEC normalized after supplement discontinuation. No organ involvement identified.</p></div><div class="socratic-prompt"><h4>Key Principles</h4><p>What are the essential principles of eosinophilia evaluation?</p></div>`,
hint_beginner:"Systematic approach with NAACP, always check for organ damage",hint_advanced:"When do you treat empirically?",
question:{prompt:"What are the key principles in evaluating eosinophilia?",
options:[{text:"Use AEC not percentage, classify severity, systematic differential (NAACP), thorough medication review, check for organ involvement (especially cardiac), screen for Strongyloides before steroids, identify and treat underlying cause",correct:true},
{text:"Only treat if AEC >10,000",correct:false},
{text:"All eosinophilia requires steroids",correct:false},
{text:"Eosinophilia is always benign",correct:false}],
explanation:{correct:"Key principles: 1) Use absolute count (AEC), 2) Classify severity, 3) Systematic differential (NAACP + drugs), 4) Detailed medication history, 5) Assess for organ involvement (cardiac, pulmonary, GI, neuro, skin), 6) Screen for Strongyloides before immunosuppression, 7) Treat underlying cause when identified.",incorrect:"Eosinophilia can cause significant organ damage even at moderate levels. Don't dismiss it. Systematic evaluation identifies the cause in most cases. Screen for Strongyloides before steroids to prevent hyperinfection."},
teaching:`<h4>Eosinophilia Summary</h4><p>1. Use AEC, not percentage</p><p>2. Classify: mild (500-1,500), moderate (1,500-5,000), severe (>5,000)</p><p>3. NAACP differential + medications</p><p>4. Assess organ involvement (cardiac echo if >1,500)</p><p>5. Strongyloides screening before steroids</p><p>6. Treat underlying cause</p><p>7. Refer to hematology/allergy if unexplained or end-organ damage</p>`,
why_chain:[{q:"When should you refer to a specialist?",a:"Refer if: unexplained persistent eosinophilia, AEC >1,500 without clear cause, any organ involvement, suspected HES or EGPA, need for steroid therapy (Strongyloides risk), or FIP1L1-PDGFRA testing needed."}],points:10}}
];
function shuffleArray(a){const s=[...a];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s;}
function setDifficulty(l,b){difficulty=l;document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderStage(currentStage);}
function renderStage(i){
const s=stages[i],opts=shuffleArray(s.question.options.map((o,idx)=>({...o,idx}))),ltrs='ABCD';
let hints='';
if(difficulty==='beginner'&&s.hint_beginner)hints=`<div class="hint-beginner" style="display:block;">Hint: ${s.hint_beginner}</div>`;
else if(difficulty==='advanced'&&s.hint_advanced)hints=`<div class="hint-advanced" style="display:block;">Challenge: ${s.hint_advanced}</div>`;
const why=s.question.why_chain?`<div class="why-chain" id="why"><h4>WHY Chain</h4>${s.question.why_chain.map(w=>`<div class="why-item"><div class="why-q">Q: ${w.q}</div><div class="why-a">${w.a}</div></div>`).join('')}</div>`:'';
document.getElementById('progress').style.width=((i)/stages.length*100)+'%';
document.getElementById('scene-container').innerHTML=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${i+1} of ${stages.length}</div><div class="scene-title">${s.title}</div></div>${s.content}${hints}<div class="question-box"><div class="question-prompt">${s.question.prompt}</div><div class="mcq-options">${opts.map((o,j)=>`<div class="mcq-option" data-correct="${o.correct}" onclick="selectOption(this,${i})"><span class="option-letter">${ltrs[j]}</span><span class="option-text">${o.text}</span></div>`).join('')}</div><div class="feedback correct-feedback" id="fb-c"><div class="feedback-title">Correct!</div><div>${s.question.explanation.correct}</div></div><div class="feedback incorrect-feedback" id="fb-i"><div class="feedback-title">Not Quite</div><div>${s.question.explanation.incorrect}</div></div><div class="teaching-point" id="teach">${s.question.teaching}</div>${why}<button class="btn" id="next-btn" onclick="nextStage()">Continue</button></div></div>`;
}
function selectOption(el,i){
if(answeredQuestions.has(i))return;
const c=el.dataset.correct==='true',s=stages[i];
answeredQuestions.add(i);decisionPath.push({stage:s.title,correct:c,points:c?s.question.points:0});
if(c)score+=s.question.points;maxScore+=s.question.points;
document.getElementById('score').textContent=score;document.getElementById('maxScore').textContent=maxScore;
document.querySelectorAll('.mcq-option').forEach(o=>{o.classList.add('disabled');if(o.dataset.correct==='true')o.classList.add('correct');else if(o===el&&!c)o.classList.add('incorrect');});
document.getElementById(c?'fb-c':'fb-i').classList.add('show');
document.getElementById('teach').classList.add('show');
const w=document.getElementById('why');if(w)w.classList.add('show');
document.getElementById('next-btn').classList.add('show');
}
function nextStage(){if(++currentStage<stages.length){renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'});}else showCompletion();}
function showCompletion(){
const p=Math.round(score/maxScore*100);
let g,m,clr;
if(p>=90){g='Outstanding!';clr='#22c55e';m='Excellent eosinophilia workup!';}
else if(p>=80){g='Great Work!';clr='#3a90c0';m='Strong grasp. Review EGPA features.';}
else if(p>=70){g='Good Progress';clr='#f59e0b';m='Focus on helminths vs protozoa distinction.';}
else{g='Keep Learning';clr='#ef4444';m='Review NAACP differential and organ involvement.';}
document.getElementById('scene-container').innerHTML=`<div class="scene completion"><div class="completion-grade" style="color:${clr}">${g}</div><div class="completion-percent" style="color:${clr}">${p}%</div><div style="font-size:1.3rem;margin-bottom:8px">${score}/${maxScore} points</div><div style="margin:16px 0;color:var(--rdx-text)">${m}</div><div class="completion-breakdown"><h4 style="margin-bottom:16px">Your Journey</h4>${decisionPath.map((d,j)=>`<div style="padding:12px 0;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;"><span style="color:${d.correct?'#4ade80':'#f87171'}">${d.correct?'Y':'N'} ${d.stage}</span><span style="color:#94a3b8">${d.points}/${stages[j].question.points}</span></div>`).join('')}</div></div>`;
document.getElementById('progress').style.width='100%';
}
document.addEventListener('DOMContentLoaded',()=>renderStage(0));


// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3a90c0'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#b45309'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#b45309'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color: #1f5f8b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
