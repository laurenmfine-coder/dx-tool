    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"Pelvic Pain and Fever",content:'<div class="narrative"><p>A <span class="highlight">22-year-old woman</span> presents with <span class="critical">lower abdominal pain, fever, and vaginal discharge</span> for 3 days. She is sexually active with a new partner. No contraception use.</p><p style="margin-top:12px;"><strong>Vitals:</strong> T 38.5°C, HR 105<br><strong>Exam:</strong> Lower abdominal tenderness, cervical motion tenderness, adnexal tenderness bilaterally, mucopurulent discharge</p></div>',question:{prompt:"What finding is MOST specific for PID diagnosis?",options:[{text:"Lower abdominal pain",correct:false},{text:"Cervical motion tenderness (chandelier sign)",correct:true},{text:"Vaginal discharge",correct:false},{text:"Fever",correct:false}],explanation:{correct:"Correct! Cervical motion tenderness (CMT) or \"chandelier sign\" is highly suggestive of PID when combined with pelvic/adnexal tenderness. Called chandelier sign because pain makes patient grab the chandelier.",incorrect:"Cervical motion tenderness is key. With adnexal tenderness, highly suggestive of PID."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 PID Diagnostic Criteria (CDC)</div><div class="pathway">MINIMUM CRITERIA (one needed):\n• Cervical motion tenderness (CMT)\n• Uterine tenderness\n• Adnexal tenderness\n\nADDITIONAL CRITERIA (increase specificity):\n• T >38.3°C (101°F)\n• Mucopurulent cervical discharge\n• WBCs on vaginal wet mount\n• Elevated ESR or CRP\n• + GC or CT test\n\nDEFINITIVE (rarely needed):\n• Laparoscopy showing inflammation\n• Endometrial biopsy showing endometritis\n• Imaging showing TOA/pyosalpinx</div></div>',why_chain:[],points:10}},
        {title:"Microbiology",content:'<div class="narrative"><p>PID is usually polymicrobial. What organisms are involved?</p></div>',question:{prompt:"Which organisms MUST be covered in PID treatment?",options:[{text:"E. coli only",correct:false},{text:"Neisseria gonorrhoeae, Chlamydia trachomatis, and anaerobes",correct:true},{text:"Group B strep only",correct:false},{text:"Candida species",correct:false}],explanation:{correct:"Correct! Must cover: N. gonorrhoeae, C. trachomatis, and anaerobes (including BV-associated organisms). Also GI flora if severe. Treatment must be polymicrobial coverage!",incorrect:"Cover GC, CT, and anaerobes. PID is polymicrobial. Single-agent therapy is inadequate."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 PID Microbiology</div><div class="pathway">PRIMARY PATHOGENS:\n• Neisseria gonorrhoeae\n• Chlamydia trachomatis\n\nOTHER ORGANISMS:\n• Anaerobes (Bacteroides, Prevotella)\n• Gardnerella vaginalis (BV-related)\n• Mycoplasma genitalium\n• Enteric gram-negatives (severe cases)\n\nPATHOGENESIS:\nAscending infection from cervix\n→ Endometrium (endometritis)\n→ Fallopian tubes (salpingitis)\n→ Ovaries, peritoneum</div></div>',why_chain:[],points:10}},
        {title:"Outpatient Treatment",content:'<div class="narrative"><p>Your patient has mild-moderate PID without severe features. She can be treated as an outpatient.</p></div>',question:{prompt:"What is the recommended OUTPATIENT regimen for PID?",options:[{text:"Azithromycin alone",correct:false},{text:"Ceftriaxone 500mg IM + doxycycline 100mg BID x 14 days ± metronidazole",correct:true},{text:"Ciprofloxacin only",correct:false},{text:"Amoxicillin-clavulanate",correct:false}],explanation:{correct:"Correct! Outpatient: Ceftriaxone 500mg IM x1 (covers GC) + Doxycycline 100mg BID x14 days (covers CT) ± Metronidazole 500mg BID x14 days (covers anaerobes, especially if BV or TOA concern).",incorrect:"Ceftriaxone (for GC) + Doxycycline x14 days (for CT) ± Metronidazole (anaerobes). Must cover both GC and CT."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Outpatient PID Treatment</div><div class="pathway">CDC RECOMMENDED REGIMEN:\n\nCeftriaxone 500mg IM x 1 dose\n  (covers N. gonorrhoeae)\n+\nDoxycycline 100mg PO BID x 14 days\n  (covers C. trachomatis)\n±\nMetronidazole 500mg PO BID x 14 days\n  (covers anaerobes/BV)\n\nADD METRONIDAZOLE IF:\n• Bacterial vaginosis present\n• TOA suspected\n• Recent uterine instrumentation</div></div>',why_chain:[],points:10}},
        {title:"Indications for Hospitalization",content:'<div class="narrative"><p>When does PID require inpatient treatment?</p></div>',question:{prompt:"Which is an indication for INPATIENT treatment of PID?",options:[{text:"Positive gonorrhea test",correct:false},{text:"Tubo-ovarian abscess (TOA), pregnancy, or failure of outpatient therapy",correct:true},{text:"First episode of PID",correct:false},{text:"Mild cervical motion tenderness",correct:false}],explanation:{correct:"Correct! Admit for: TOA, pregnancy, unable to tolerate oral meds, no improvement at 72h, surgical emergency concern, severe illness. These patients need IV antibiotics.",incorrect:"Admit for: TOA, pregnancy, severe illness, unable to take PO, failed outpatient therapy, surgical emergency concern."},teaching:'<h4>Hospitalization Criteria</h4><table class="comparison-table"><tr><th>Admit for:</th></tr><tr><td>Tubo-ovarian abscess (TOA)</td></tr><tr><td>Pregnancy</td></tr><tr><td>Unable to tolerate oral medications</td></tr><tr><td>No clinical improvement at 72 hours</td></tr><tr><td>Surgical emergency cannot be excluded</td></tr><tr><td>Severe illness (high fever, N/V)</td></tr></table>',why_chain:[],points:10}},
        {title:"Tubo-Ovarian Abscess",content:'<div class="narrative"><p>Imaging shows a <span class="critical">7 cm complex adnexal mass</span>. This is a tubo-ovarian abscess (TOA).</p></div><div class="alert-box"><div class="alert-title">🚨 TOA is a Surgical Emergency if Ruptured!</div><p>Unruptured TOA can often be managed with IV antibiotics. Rupture = peritonitis = emergency surgery.</p></div>',question:{prompt:"What is the INITIAL management of an UNRUPTURED TOA?",options:[{text:"Immediate surgery in all cases",correct:false},{text:"IV antibiotics with close monitoring",correct:true},{text:"Oral antibiotics as outpatient",correct:false},{text:"Observation without antibiotics",correct:false}],explanation:{correct:"Correct! Unruptured TOA: IV antibiotics first (cefotetan + doxycycline or clindamycin + gentamicin). ~70% respond. If no improvement in 48-72h or rupture suspected → drainage or surgery.",incorrect:"Unruptured TOA = IV antibiotics first. ~70% respond. Surgery if failed antibiotics or rupture."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 TOA Management</div><div class="pathway">UNRUPTURED TOA:\n• IV antibiotics (same as inpatient PID)\n• Close monitoring\n• Serial imaging\n• ~70% respond to antibiotics alone\n\nCONSIDER DRAINAGE IF:\n• No improvement at 48-72h\n• Size >8-10 cm\n• Accessible location\n• IR drainage or surgical\n\nRUPTURED TOA:\n• Surgical emergency!\n• Peritonitis, sepsis\n• Urgent laparotomy/laparoscopy</div></div>',why_chain:[],points:10}},
        {title:"Long-Term Complications",content:'<div class="narrative"><p>What are the long-term consequences of PID that you must counsel patients about?</p></div>',question:{prompt:"What is the MOST significant long-term complication of PID?",options:[{text:"Cervical cancer",correct:false},{text:"Infertility, ectopic pregnancy, and chronic pelvic pain",correct:true},{text:"Ovarian cysts",correct:false},{text:"Endometriosis",correct:false}],explanation:{correct:"Correct! PID causes tubal scarring leading to: infertility (10-15% after one episode), ectopic pregnancy (6x increased risk), and chronic pelvic pain. Risk increases with each episode.",incorrect:"PID complications: infertility, ectopic pregnancy, chronic pelvic pain - all from tubal scarring."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Long-Term Sequelae</div><div class="pathway">TUBAL FACTOR INFERTILITY:\n• 10-15% after 1 episode\n• 25-35% after 2 episodes\n• 50-75% after 3+ episodes\n\nECTOPIC PREGNANCY:\n• 6-10x increased risk\n• Due to tubal scarring/damage\n\nCHRONIC PELVIC PAIN:\n• ~20% of patients\n• Adhesions and scarring\n\nPREVENTION:\n• Early treatment crucial\n• Partner treatment\n• STI screening\n• Barrier contraception</div></div>',why_chain:[],points:10}},
        {title:"Case Resolution",content:'<div class="narrative"><p>Your patient was admitted for IV cefotetan and doxycycline. Repeat imaging at 48h showed decreasing TOA size. She completed 14 days of antibiotics with resolution. Counseled on partner treatment, STI prevention, and fertility implications.</p></div><div class="mechanism-box"><div class="mechanism-title">📚 PID & TOA Summary</div><div class="pathway">DIAGNOSIS:\nCMT + uterine/adnexal tenderness\n± fever, discharge, WBCs, + GC/CT\n\nOUTPATIENT:\nCeftriaxone IM + Doxy x14d ± Metro\n\nADMIT FOR:\nTOA, pregnancy, severe, failed outpatient\n\nINPATIENT:\nCefotetan + Doxy OR Clinda + Gent\n\nTOA:\n• IV antibiotics first (~70% respond)\n• Drainage if no improvement\n• Surgery if ruptured\n\nCOMPLICATIONS:\nInfertility, ectopic, chronic pain</div></div>',question:{prompt:"A patient completes outpatient PID treatment but still has pain at follow-up. No improvement. Next step?",options:[{text:"Repeat same antibiotics",correct:false},{text:"Hospitalize for IV antibiotics and imaging",correct:true},{text:"Reassurance only",correct:false},{text:"Oral steroids",correct:false}],explanation:{correct:"Correct! Failed outpatient therapy = admit for IV antibiotics and imaging to evaluate for TOA or other complications. Do not simply repeat the same failed regimen.",incorrect:"Failed outpatient = admit for IV antibiotics and imaging. Must evaluate for TOA or alternative diagnosis."},teaching:'<h4>Key Takeaways</h4><ul style="line-height:2;margin-left:20px;"><li>CMT + pelvic tenderness = PID</li><li>Cover GC, CT, and anaerobes</li><li>Outpatient: ceftriaxone + doxycycline ± metronidazole</li><li>Admit for TOA, pregnancy, severe illness, failed outpatient</li><li>TOA: IV antibiotics first, surgery if ruptured</li><li>Complications: infertility, ectopic, chronic pain</li></ul>',why_chain:[],points:10}},
        {title:"Clinical Integration",content:'<div class="narrative"><p>You synthesize all the clinical information to ensure optimal patient care.</p></div>',question:{prompt:"What principle is MOST important for excellent clinical outcomes?",options:[{text:"Integrating clinical presentation with evidence-based guidelines while reassessing response to treatment",correct:true},{text:"Following protocols exactly without clinical judgment",correct:false},{text:"Ordering comprehensive testing to avoid any missed diagnoses",correct:false},{text:"Making a diagnosis quickly and committing to it without reconsideration",correct:false}],explanation:{correct:"Excellent clinical care combines systematic assessment, evidence-based treatment, and ongoing reassessment. Guidelines inform but don't replace clinical reasoning.",incorrect:"Good clinical care requires flexibility, reassessment, and integration of guidelines with patient-specific factors."},teaching:'<h4>Clinical Reasoning</h4><ul><li>Systematic data gathering</li><li>Evidence-based management</li><li>Regular reassessment</li><li>Patient-centered communication</li></ul>',why_chain:[],points:10}}
    ];
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:var(--rdx-teal-dark,#1f5f8b);margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><p>You mastered PID & TOA!</p></div>';}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3a90c0'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#b45309'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#b45309'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color: #1f5f8b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
