    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"Angioedema Without Urticaria",content:'<div class="narrative"><p>A <span class="highlight">28-year-old woman</span> presents with recurrent episodes of <span class="critical">facial and lip swelling without hives</span>. Family history: mother and brother have similar episodes. Current attack started 12 hours ago.</p><p style="margin-top:12px;">She also reports episodes of severe abdominal pain that resolve spontaneously.</p></div><div class="alert-box"><div class="alert-title">🚨 Angioedema WITHOUT Urticaria = Think HAE!</div><p>Hereditary angioedema does not respond to epinephrine, antihistamines, or steroids.</p></div>',question:{prompt:"What is the key clinical feature distinguishing HAE from allergic angioedema?",options:[{text:"Faster onset of swelling",correct:false},{text:"Angioedema WITHOUT urticaria (hives)",correct:true},{text:"Response to antihistamines",correct:false},{text:"Association with anaphylaxis",correct:false}],explanation:{correct:"Correct! HAE causes angioedema WITHOUT urticaria. Allergic/histamine-mediated angioedema almost always has hives. HAE is bradykinin-mediated, not histamine-mediated.",incorrect:"HAE = angioedema WITHOUT hives. If there are hives, it\'s likely histamine-mediated (allergic), not HAE."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 HAE vs Allergic Angioedema</div><div class="pathway">HEREDITARY ANGIOEDEMA (HAE):\n• Angioedema WITHOUT urticaria\n• Bradykinin-mediated\n• Does NOT respond to epi/antihistamines\n• Family history common\n• Abdominal attacks (bowel wall edema)\n\nALLERGIC ANGIOEDEMA:\n• Usually WITH urticaria (hives)\n• Histamine-mediated\n• Responds to epi/antihistamines/steroids\n• Often identifiable trigger</div></div>',why_chain:[],points:10}},
        {title:"Pathophysiology",content:'<div class="narrative"><p>HAE is caused by a defect in the complement system.</p></div>',question:{prompt:"What is the underlying defect in most HAE cases?",options:[{text:"IgE overproduction",correct:false},{text:"C1-esterase inhibitor (C1-INH) deficiency or dysfunction",correct:true},{text:"Mast cell hyperreactivity",correct:false},{text:"Histamine receptor mutation",correct:false}],explanation:{correct:"Correct! HAE is caused by C1-INH deficiency (Type 1) or dysfunction (Type 2). C1-INH normally inhibits kallikrein. Without it, excess bradykinin causes vascular permeability and angioedema.",incorrect:"HAE = C1-inhibitor deficiency/dysfunction. This leads to excess bradykinin (not histamine) causing swelling."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 HAE Types</div><div class="pathway">TYPE 1 (85%):\n• Low C1-INH level\n• Low C1-INH function\n• Low C4\n\nTYPE 2 (15%):\n• Normal/elevated C1-INH level\n• Low C1-INH FUNCTION\n• Low C4\n\nTYPE 3 (rare):\n• Normal C1-INH level and function\n• Often Factor XII mutation\n• More common in women\n\nPATHWAY:\nC1-INH deficiency → excess kallikrein\n→ excess bradykinin → angioedema</div></div>',why_chain:[],points:10}},
        {title:"Diagnosis",content:'<div class="narrative"><p>You suspect HAE based on the clinical picture and family history. What labs confirm the diagnosis?</p></div>',question:{prompt:"Which lab finding is seen in BOTH Type 1 and Type 2 HAE?",options:[{text:"Low C1-INH level",correct:false},{text:"Low C4 level",correct:true},{text:"Elevated IgE",correct:false},{text:"Low C3 level",correct:false}],explanation:{correct:"Correct! C4 is LOW in both Type 1 and Type 2 HAE (even between attacks). It\'s an excellent screening test. Type 1 has low C1-INH level; Type 2 has normal level but low function.",incorrect:"C4 is low in both types - it\'s the best screening test. C1-INH level distinguishes Type 1 (low) from Type 2 (normal)."},teaching:'<h4>Diagnostic Labs</h4><table class="comparison-table"><tr><th>Test</th><th>Type 1</th><th>Type 2</th></tr><tr style="background:rgba(251,191,36,0.2);"><td>C4</td><td>Low</td><td>Low</td></tr><tr><td>C1-INH level</td><td>Low</td><td>Normal/high</td></tr><tr><td>C1-INH function</td><td>Low</td><td>Low</td></tr><tr><td>C3</td><td>Normal</td><td>Normal</td></tr></table><p style="margin-top:12px;"><strong>C4 is the screening test!</strong> If C4 is normal, HAE is very unlikely.</p>',why_chain:[],points:10}},
        {title:"Acute Attack Treatment",content:'<div class="narrative"><p>Your patient is having an acute attack with lip and tongue swelling. This could progress to airway compromise!</p></div><div class="alert-box"><div class="alert-title">⚠️ Epinephrine/Antihistamines/Steroids Don\'t Work!</div><p>HAE is bradykinin-mediated. Standard anaphylaxis treatment is ineffective.</p></div>',question:{prompt:"What is the FIRST-LINE treatment for acute HAE attack?",options:[{text:"Epinephrine and antihistamines",correct:false},{text:"High-dose steroids",correct:false},{text:"C1-INH concentrate, icatibant, or ecallantide",correct:true},{text:"Fresh frozen plasma only",correct:false}],explanation:{correct:"Correct! First-line: C1-INH concentrate (Berinert, Cinryze), icatibant (bradykinin B2 receptor antagonist), or ecallantide (kallikrein inhibitor). These target the bradykinin pathway.",incorrect:"HAE-specific treatments: C1-INH concentrate, icatibant, or ecallantide. Epi/antihistamines/steroids are ineffective!"},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Acute HAE Treatment</div><div class="pathway">FIRST-LINE OPTIONS:\n\n1. C1-INH CONCENTRATE\n   • Berinert (plasma-derived)\n   • Cinryze, Ruconest\n   • Replaces missing inhibitor\n\n2. ICATIBANT (Firazyr)\n   • Bradykinin B2 receptor antagonist\n   • Blocks bradykinin action\n\n3. ECALLANTIDE (Kalbitor)\n   • Kallikrein inhibitor\n   • Reduces bradykinin production\n\nIF UNAVAILABLE:\nFresh frozen plasma (contains C1-INH)\nBut theoretically could worsen (substrate)</div></div>',why_chain:[],points:10}},
        {title:"Airway Management",content:'<div class="narrative"><p>The patient\'s tongue swelling is worsening. When do you intubate?</p></div>',question:{prompt:"What is the key principle for airway management in HAE?",options:[{text:"Wait for oxygen desaturation before intubating",correct:false},{text:"Early intubation if any laryngeal involvement suspected",correct:true},{text:"Avoid intubation - it worsens swelling",correct:false},{text:"Tracheostomy is never needed",correct:false}],explanation:{correct:"Correct! Early intubation if laryngeal involvement! HAE swelling can progress rapidly and unpredictably. Intubate early - waiting for desaturation may be too late. Have surgical airway backup ready.",incorrect:"Intubate EARLY with any laryngeal involvement. Swelling progresses rapidly. Waiting is dangerous."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Airway Considerations</div><div class="pathway">LARYNGEAL EDEMA:\n• Most dangerous manifestation\n• Can be fatal if untreated\n• May progress rapidly\n\nAIRWAY MANAGEMENT:\n• LOW threshold to intubate\n• Have surgical airway backup\n• Intubate early - don\'t wait!\n• Swelling may make later intubation impossible\n\nEVEN WITH TREATMENT:\n• HAE meds take 30-60 min to work\n• Secure airway first if concern</div></div>',why_chain:[],points:10}},
        {title:"Prophylaxis",content:'<div class="narrative"><p>After the acute attack resolves, you discuss long-term management.</p></div>',question:{prompt:"What is used for LONG-TERM prophylaxis in HAE?",options:[{text:"Daily antihistamines",correct:false},{text:"Chronic steroids",correct:false},{text:"C1-INH concentrate, lanadelumab, or androgens",correct:true},{text:"Omalizumab",correct:false}],explanation:{correct:"Correct! Prophylaxis options: C1-INH concentrate (regular infusions), lanadelumab (anti-kallikrein monoclonal antibody), or attenuated androgens (danazol - increases C1-INH production). Antihistamines/steroids don\'t work.",incorrect:"Prophylaxis: C1-INH concentrate, lanadelumab (Takhzyro), or androgens (danazol). These target the underlying pathway."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Prophylaxis Options</div><div class="pathway">FIRST-LINE:\n• Lanadelumab (Takhzyro)\n  - Anti-kallikrein antibody\n  - SubQ every 2-4 weeks\n• C1-INH concentrate\n  - IV every 3-4 days\n\nSECOND-LINE:\n• Attenuated androgens (danazol)\n  - Increase C1-INH synthesis\n  - Side effects limit use\n\nSHORT-TERM PROPHYLAXIS:\n(Before dental work, surgery)\n• C1-INH concentrate\n• Fresh frozen plasma</div></div>',why_chain:[],points:10}},
        {title:"Case Resolution",content:'<div class="narrative"><p>Your patient received icatibant with improvement in 90 minutes. Labs confirmed Type 1 HAE (low C4, low C1-INH level and function). She was started on lanadelumab prophylaxis and given on-demand icatibant for home use.</p></div><div class="mechanism-box"><div class="mechanism-title">📚 HAE Summary</div><div class="pathway">KEY FEATURES:\n• Angioedema WITHOUT urticaria\n• Bradykinin-mediated (not histamine)\n• Epi/antihistamines/steroids DON\'T WORK\n• Family history common\n\nDIAGNOSIS:\n• C4 is screening test (low in all types)\n• C1-INH level and function\n\nACUTE TREATMENT:\n• C1-INH concentrate, icatibant, ecallantide\n• Early intubation if laryngeal involvement\n\nPROPHYLAXIS:\n• Lanadelumab, C1-INH, or androgens</div></div>',question:{prompt:"A patient with angioedema has NORMAL C4. What does this suggest?",options:[{text:"Type 2 HAE",correct:false},{text:"HAE is very unlikely - consider other causes",correct:true},{text:"Need C1-INH functional assay to confirm",correct:false},{text:"Definitely allergic angioedema",correct:false}],explanation:{correct:"Correct! Normal C4 makes HAE very unlikely (high negative predictive value). Consider ACE-inhibitor angioedema, idiopathic angioedema, or allergic causes.",incorrect:"Normal C4 essentially rules out HAE Types 1 and 2. Consider other causes (ACE-I, allergic, idiopathic)."},teaching:'<h4>Key Takeaways</h4><ul style="line-height:2;margin-left:20px;"><li>HAE = angioedema WITHOUT urticaria</li><li>Bradykinin-mediated, not histamine</li><li>Epi/antihistamines/steroids don\'t work!</li><li>C4 is the screening test</li><li>Treat with C1-INH, icatibant, or ecallantide</li><li>Intubate early for laryngeal involvement</li><li>Prophylaxis: lanadelumab, C1-INH, androgens</li></ul>',why_chain:[],points:10}},
        {title:"Clinical Integration",content:'<div class="narrative"><p>You synthesize all the clinical information to ensure optimal patient care.</p></div>',question:{prompt:"What principle is MOST important for excellent clinical outcomes?",options:[{text:"Integrating clinical presentation with evidence-based guidelines while reassessing response to treatment",correct:true},{text:"Following protocols exactly without clinical judgment",correct:false},{text:"Ordering comprehensive testing to avoid any missed diagnoses",correct:false},{text:"Making a diagnosis quickly and committing to it without reconsideration",correct:false}],explanation:{correct:"Excellent clinical care combines systematic assessment, evidence-based treatment, and ongoing reassessment. Guidelines inform but don't replace clinical reasoning.",incorrect:"Good clinical care requires flexibility, reassessment, and integration of guidelines with patient-specific factors."},teaching:'<h4>Clinical Reasoning</h4><ul><li>Systematic data gathering</li><li>Evidence-based management</li><li>Regular reassessment</li><li>Patient-centered communication</li></ul>',why_chain:[],points:10}}
    ];
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:var(--rdx-teal-dark,#1f5f8b);margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><p>You mastered Hereditary Angioedema!</p></div>';}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3a90c0'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#b45309'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#b45309'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color: #1f5f8b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
