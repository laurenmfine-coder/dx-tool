<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaced Repetition Review | Dx Learning Ecosystem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; color: #1e293b; line-height: 1.6; min-height: 100vh; }
        .header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 16px 24px; }
        .header-inner { max-width: 900px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 700; color: #1e293b; }
        .logo span { color: #3b82f6; }
        .nav { display: flex; gap: 16px; }
        .nav a { color: #64748b; text-decoration: none; font-size: 14px; }
        
        .main { max-width: 700px; margin: 0 auto; padding: 32px 24px; }
        
        .session-header { text-align: center; margin-bottom: 32px; }
        .session-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .session-meta { color: #64748b; font-size: 14px; }
        
        .progress-bar { height: 6px; background: #e2e8f0; border-radius: 3px; margin: 20px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: #3b82f6; border-radius: 3px; transition: width 0.3s; }
        .progress-text { text-align: center; font-size: 13px; color: #64748b; }
        
        .card { background: #fff; border-radius: 16px; padding: 32px; border: 1px solid #e2e8f0; margin-bottom: 24px; }
        
        .card-source { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; margin-bottom: 16px; }
        .card-source.reason { background: #dbeafe; color: #1d4ed8; }
        .card-source.mechanism { background: #d1fae5; color: #047857; }
        .card-source.coach { background: #ede9fe; color: #6d28d9; }
        
        .card-question { font-size: 18px; font-weight: 600; color: #1e293b; margin-bottom: 20px; line-height: 1.5; }
        
        .card-context { background: #f8fafc; padding: 16px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; color: #475569; border: 1px solid #e2e8f0; }
        
        .reveal-btn { display: block; width: 100%; padding: 16px; background: #3b82f6; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 20px; }
        .reveal-btn:hover { background: #2563eb; }
        
        .answer-section { display: none; }
        .answer-section.show { display: block; }
        
        .answer-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .answer-label { font-size: 12px; color: #047857; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 600; }
        .answer-text { font-size: 15px; color: #1e293b; line-height: 1.7; }
        
        .explanation-box { background: #f8fafc; border-left: 4px solid #3b82f6; padding: 16px; border-radius: 0 10px 10px 0; margin-bottom: 20px; }
        .explanation-box h4 { font-size: 14px; color: #1d4ed8; margin-bottom: 8px; }
        .explanation-box p { font-size: 14px; color: #475569; line-height: 1.6; }
        
        .rating-section { text-align: center; }
        .rating-label { font-size: 14px; color: #64748b; margin-bottom: 12px; }
        .rating-buttons { display: flex; gap: 12px; justify-content: center; }
        .rating-btn { flex: 1; padding: 14px 20px; border: 2px solid #e2e8f0; border-radius: 10px; background: #fff; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
        .rating-btn:hover { background: #f8fafc; }
        .rating-btn.again { border-color: #fecaca; color: #b91c1c; }
        .rating-btn.again:hover { background: #fef2f2; }
        .rating-btn.hard { border-color: #fde68a; color: #92400e; }
        .rating-btn.hard:hover { background: #fffbeb; }
        .rating-btn.good { border-color: #bbf7d0; color: #047857; }
        .rating-btn.good:hover { background: #f0fdf4; }
        .rating-btn.easy { border-color: #bfdbfe; color: #1d4ed8; }
        .rating-btn.easy:hover { background: #eff6ff; }
        .rating-interval { font-size: 11px; color: #94a3b8; margin-top: 4px; }
        
        .session-complete { text-align: center; padding: 40px; }
        .complete-icon { font-size: 64px; margin-bottom: 20px; }
        .complete-title { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
        .complete-stats { display: flex; justify-content: center; gap: 32px; margin: 24px 0; }
        .complete-stat { text-align: center; }
        .complete-stat-value { font-size: 28px; font-weight: 700; color: #3b82f6; }
        .complete-stat-label { font-size: 13px; color: #64748b; }
        
        .btn { padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; font-size: 14px; }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-secondary { background: #fff; color: #475569; border: 1px solid #e2e8f0; }
        
        .streak-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 20px; font-size: 14px; color: #92400e; margin-bottom: 20px; }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo">Spaced <span>Review</span></div>
            <nav class="nav">
                <a href="learning-intelligence-dashboard.html">Dashboard</a>
                <a href="index.html">ReasonDx</a>
                <a href="mechanismdx-index.html">MechanismDx</a>
            </nav>
        </div>
    </header>
    
    <main class="main">
        <div id="sessionView">
            <div class="session-header">
                <div class="streak-badge">🔥 12 Day Streak</div>
                <h1 class="session-title">Daily Review Session</h1>
                <p class="session-meta">7 cards due today from across your learning</p>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <p class="progress-text" id="progressText">Card 1 of 7</p>
            
            <div class="card" id="cardContainer">
                <!-- Card content populated by JS -->
            </div>
        </div>
        
        <div id="completeView" class="hidden">
            <div class="card session-complete">
                <div class="complete-icon">🎉</div>
                <div class="complete-title">Session Complete!</div>
                <p style="color: #64748b; margin-bottom: 20px;">Great work maintaining your knowledge across all platforms.</p>
                
                <div class="complete-stats">
                    <div class="complete-stat">
                        <div class="complete-stat-value" id="cardsReviewed">7</div>
                        <div class="complete-stat-label">Cards Reviewed</div>
                    </div>
                    <div class="complete-stat">
                        <div class="complete-stat-value" id="retention">86%</div>
                        <div class="complete-stat-label">Retention Rate</div>
                    </div>
                    <div class="complete-stat">
                        <div class="complete-stat-value" id="timeSpent">4:32</div>
                        <div class="complete-stat-label">Time Spent</div>
                    </div>
                </div>
                
                <div style="display: flex; gap: 12px; justify-content: center; margin-top: 24px;">
                    <button class="btn btn-secondary" onclick="window.location.href='learning-intelligence-dashboard.html'">Back to Dashboard</button>
                    <button class="btn btn-primary" onclick="startNewSession()">Study More</button>
                </div>
            </div>
        </div>
    </main>
    
    <script>
    const cards = [
        {
            id: 1,
            source: 'mechanism',
            sourceName: 'MechanismDx: Pharmacology',
            question: 'What is the mechanism by which ACE inhibitors cause a rise in creatinine?',
            context: 'From your pharmacology module on renal drug effects.',
            answer: 'ACE inhibitors block angiotensin II, which normally constricts the efferent arteriole. Efferent dilation reduces intraglomerular pressure and GFR, causing a rise in creatinine.',
            explanation: 'A 20-30% rise in creatinine is often acceptable and may be nephroprotective long-term. However, a rise >30% suggests bilateral renal artery stenosis or volume depletion.',
            intervals: { again: '10m', hard: '1d', good: '4d', easy: '10d' }
        },
        {
            id: 2,
            source: 'reason',
            sourceName: 'ReasonDx: Chest Pain Case #8',
            question: 'In a patient with suspected PE, what ABG pattern would you expect?',
            context: 'Recall the case of the post-surgical patient with acute dyspnea.',
            answer: 'Respiratory alkalosis with hypoxemia. The patient hyperventilates due to hypoxemia, blowing off CO2 and raising pH.',
            explanation: 'The A-a gradient is elevated due to V/Q mismatch. Metabolic acidosis only occurs in massive PE with shock.',
            intervals: { again: '10m', hard: '1d', good: '3d', easy: '7d' }
        },
        {
            id: 3,
            source: 'coach',
            sourceName: 'CoachDx: Sepsis Session',
            question: 'What are the qSOFA criteria for identifying sepsis outside the ICU?',
            context: 'From your coaching session on early sepsis recognition.',
            answer: 'qSOFA: Respiratory rate >= 22, Altered mental status, Systolic BP <= 100 mmHg. Score >= 2 indicates higher risk.',
            explanation: 'qSOFA is a bedside tool for quick assessment. Full SOFA score requires lab values and is used in ICU settings.',
            intervals: { again: '10m', hard: '1d', good: '5d', easy: '12d' }
        },
        {
            id: 4,
            source: 'mechanism',
            sourceName: 'MechanismDx: Cardiology',
            question: 'What is the mechanism of troponin elevation in pulmonary embolism?',
            context: 'Understanding biomarkers in PE risk stratification.',
            answer: 'RV strain from acute pulmonary hypertension causes myocardial wall stress and troponin release. This indicates RV dysfunction, not coronary ischemia.',
            explanation: 'Elevated troponin in PE is a prognostic marker indicating intermediate-high risk. Combined with RV dilation on echo, it may warrant more aggressive treatment.',
            intervals: { again: '10m', hard: '1d', good: '4d', easy: '9d' }
        },
        {
            id: 5,
            source: 'reason',
            sourceName: 'ReasonDx: Syncope Case #3',
            question: 'What is the Wells Score for PE and how is it used clinically?',
            context: 'Pre-test probability assessment in suspected PE.',
            answer: 'Wells Score assesses PE probability: Clinical signs of DVT (3), PE most likely diagnosis (3), HR>100 (1.5), Immobilization/surgery (1.5), Previous PE/DVT (1.5), Hemoptysis (1), Malignancy (1). Score >4 = PE likely.',
            explanation: 'Combined with D-dimer, Wells Score guides workup. Low probability + negative D-dimer can rule out PE without imaging.',
            intervals: { again: '10m', hard: '1d', good: '3d', easy: '8d' }
        },
        {
            id: 6,
            source: 'mechanism',
            sourceName: 'MechanismDx: Neurology',
            question: 'What is the therapeutic window for IV alteplase in acute ischemic stroke?',
            context: 'Time-critical intervention in stroke management.',
            answer: '4.5 hours from symptom onset (or last known well). Earlier treatment correlates with better outcomes - "time is brain."',
            explanation: 'Contraindications include recent surgery, bleeding history, severe hypertension, and anticoagulant use. CT must exclude hemorrhage first.',
            intervals: { again: '10m', hard: '1d', good: '5d', easy: '14d' }
        },
        {
            id: 7,
            source: 'coach',
            sourceName: 'CoachDx: DKA Session',
            question: 'What is the anion gap formula and what does an elevated gap indicate?',
            context: 'Acid-base interpretation in metabolic emergencies.',
            answer: 'Anion Gap = Na - (Cl + HCO3). Normal 8-12. Elevated gap indicates accumulation of unmeasured anions (lactate, ketones, uremia, toxins).',
            explanation: 'MUDPILES mnemonic: Methanol, Uremia, DKA, Propylene glycol, INH/Iron, Lactic acidosis, Ethylene glycol, Salicylates.',
            intervals: { again: '10m', hard: '1d', good: '4d', easy: '10d' }
        }
    ];
    
    let currentCard = 0;
    let answered = false;
    let startTime = Date.now();
    let results = [];
    
    function renderCard() {
        const card = cards[currentCard];
        const container = document.getElementById('cardContainer');
        
        container.innerHTML = `
            <div class="card-source ${card.source}">${card.sourceName}</div>
            <div class="card-question">${card.question}</div>
            <div class="card-context">${card.context}</div>
            
            <button class="reveal-btn" id="revealBtn" onclick="revealAnswer()">Show Answer</button>
            
            <div class="answer-section" id="answerSection">
                <div class="answer-box">
                    <div class="answer-label">Answer</div>
                    <div class="answer-text">${card.answer}</div>
                </div>
                
                <div class="explanation-box">
                    <h4>Clinical Pearl</h4>
                    <p>${card.explanation}</p>
                </div>
                
                <div class="rating-section">
                    <div class="rating-label">How well did you know this?</div>
                    <div class="rating-buttons">
                        <button class="rating-btn again" onclick="rateCard('again')">
                            Again
                            <div class="rating-interval">${card.intervals.again}</div>
                        </button>
                        <button class="rating-btn hard" onclick="rateCard('hard')">
                            Hard
                            <div class="rating-interval">${card.intervals.hard}</div>
                        </button>
                        <button class="rating-btn good" onclick="rateCard('good')">
                            Good
                            <div class="rating-interval">${card.intervals.good}</div>
                        </button>
                        <button class="rating-btn easy" onclick="rateCard('easy')">
                            Easy
                            <div class="rating-interval">${card.intervals.easy}</div>
                        </button>
                    </div>
                </div>
            </div>
        `;
        
        updateProgress();
    }
    
    function revealAnswer() {
        document.getElementById('revealBtn').style.display = 'none';
        document.getElementById('answerSection').classList.add('show');
        answered = true;
    }
    
    function rateCard(rating) {
        results.push({ cardId: cards[currentCard].id, rating });
        
        currentCard++;
        if (currentCard >= cards.length) {
            showComplete();
        } else {
            answered = false;
            renderCard();
        }
    }
    
    function updateProgress() {
        const progress = (currentCard / cards.length) * 100;
        document.getElementById('progressFill').style.width = progress + '%';
        document.getElementById('progressText').textContent = `Card ${currentCard + 1} of ${cards.length}`;
    }
    
    function showComplete() {
        document.getElementById('sessionView').classList.add('hidden');
        document.getElementById('completeView').classList.remove('hidden');
        
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const minutes = Math.floor(elapsed / 60);
        const seconds = elapsed % 60;
        
        const goodOrEasy = results.filter(r => r.rating === 'good' || r.rating === 'easy').length;
        const retention = Math.round((goodOrEasy / results.length) * 100);
        
        document.getElementById('cardsReviewed').textContent = results.length;
        document.getElementById('retention').textContent = retention + '%';
        document.getElementById('timeSpent').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
    }
    
    function startNewSession() {
        currentCard = 0;
        answered = false;
        results = [];
        startTime = Date.now();
        document.getElementById('sessionView').classList.remove('hidden');
        document.getElementById('completeView').classList.add('hidden');
        renderCard();
    }
    
    // Initialize
    renderCard();
    </script>
</body>
</html>
