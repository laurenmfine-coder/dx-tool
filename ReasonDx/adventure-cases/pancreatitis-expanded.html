<script>
let currentStage=0,score=0,maxScore=0,difficulty='standard',answeredQuestions=new Set(),decisionPath=[];
const stages=[
{title:"The Epigastric Pain",content:`<div class="narrative"><p>48-year-old man presents with sudden-onset severe epigastric pain radiating to the back, associated with nausea and vomiting. Pain started 6 hours ago after a large meal with heavy alcohol consumption.</p><p style="margin-top:12px;"><strong>Vitals:</strong> T 100.8F, HR 108, BP 138/88, RR 20<br><strong>Exam:</strong> Diffuse epigastric tenderness with guarding, decreased bowel sounds, no jaundice<br><strong>Labs pending</strong></p></div><div class="socratic-prompt"><h4>Recognize the Presentation</h4><p>What are the diagnostic criteria for acute pancreatitis?</p></div>`,
hint_beginner:"Need 2 of 3: typical pain, elevated lipase, and/or imaging findings",hint_advanced:"How high does lipase need to be?",
question:{prompt:"Severe epigastric pain radiating to back after alcohol and large meal. What confirms acute pancreatitis?",
options:[{text:"Diagnosis requires 2 of 3 criteria: (1) Characteristic abdominal pain (epigastric, radiating to back), (2) Serum lipase or amylase ≥3x upper limit of normal, (3) Imaging findings consistent with pancreatitis",correct:true},
{text:"Lipase must be elevated in all cases",correct:false},
{text:"CT is always required",correct:false},
{text:"Only clinical presentation needed",correct:false}],
explanation:{correct:"Revised Atlanta criteria: need 2 of 3. Pain + enzyme elevation = diagnosis (no CT needed). CT indicated if: uncertain diagnosis, no improvement in 48-72h, or assessing complications. Lipase is preferred over amylase (more specific, stays elevated longer).",incorrect:"Two of three criteria required. Most patients have pain + elevated lipase - CT not routinely needed for diagnosis. CT reserved for uncertain cases or evaluating complications."},
teaching:`<h4>Acute Pancreatitis Diagnosis</h4><p><strong>2 of 3 criteria:</strong></p><p>1. Characteristic pain (epigastric, radiating to back)</p><p>2. Lipase/amylase ≥3× upper limit of normal</p><p>3. Imaging findings (CT, MRI, or ultrasound)</p><p><strong>Lipase preferred:</strong> More specific, longer elevation</p>`,
why_chain:[{q:"Why lipase over amylase?",a:"Lipase is more specific for pancreatic disease (amylase elevated in salivary disease, macroamylasemia, other GI conditions). Lipase stays elevated longer (7-14 days vs 3-5 for amylase), useful if delayed presentation."}],points:10}},

{title:"Labs Return",content:`<div class="narrative"><p>Labs: Lipase 1,842 U/L (normal <60), WBC 14,200, Hct 48%, BUN 28, Cr 1.1, Glucose 186, Ca 8.8, AST 85, ALT 72, Alk phos 145, Tbili 1.4.</p></div><div class="socratic-prompt"><h4>Assess Severity</h4><p>What findings predict severe pancreatitis?</p></div>`,
hint_beginner:"BISAP and Ranson's criteria predict severity",hint_advanced:"What hematocrit level suggests hemoconcentration?",
question:{prompt:"Lipase 1,842. What predicts severe pancreatitis?",
options:[{text:"BISAP score (BUN >25, Impaired mental status, SIRS, Age >60, Pleural effusion); Hematocrit >44% (hemoconcentration = severe fluid loss); organ failure at presentation",correct:true},
{text:"Lipase level correlates with severity",correct:false},
{text:"All pancreatitis is equally severe",correct:false},
{text:"Only imaging predicts severity",correct:false}],
explanation:{correct:"Severity predictors: BISAP score (simple, at admission), Ranson's criteria (requires 48h), APACHE II. This patient has BUN 28 (>25) and Hct 48% (hemoconcentration = severe third-spacing). Lipase level does NOT correlate with severity - a lipase of 500 can be more severe than 5000.",incorrect:"Lipase level doesn't predict severity! Severity depends on systemic inflammatory response and organ failure. Hemoconcentration (Hct >44%) indicates significant fluid sequestration and predicts worse outcomes."},
teaching:`<h4>Severity Assessment</h4><p><strong>BISAP score (1 point each):</strong> BUN >25, Impaired mental status, SIRS, Age >60, Pleural effusion</p><p><strong>Hemoconcentration:</strong> Hct >44% = severe fluid loss</p><p><strong>Key:</strong> Lipase level does NOT predict severity</p><p><strong>Mild:</strong> No organ failure, no complications</p><p><strong>Severe:</strong> Persistent organ failure (>48h)</p>`,
why_chain:[{q:"Why doesn't lipase correlate with severity?",a:"Lipase level reflects amount of enzyme release, not degree of pancreatic damage or systemic inflammation. A mildly elevated lipase with SIRS and organ failure is severe. Very high lipase with normal vitals may be mild interstitial pancreatitis."}],points:15}},

{title:"Etiology",content:`<div class="narrative"><p>Determine the cause of this patient's pancreatitis.</p></div><div class="socratic-prompt"><h4>Identify the Cause</h4><p>What are the common causes of acute pancreatitis?</p></div>`,
hint_beginner:"GET SMASHED mnemonic; gallstones and alcohol are #1 and #2",hint_advanced:"What about drug-induced pancreatitis?",
question:{prompt:"Heavy alcohol use before presentation. What causes acute pancreatitis?",
options:[{text:"Gallstones (#1, 40%) and Alcohol (#2, 30%) account for 70%; also hypertriglyceridemia (TG >1000), ERCP, drugs, trauma, autoimmune, infections; 15-20% idiopathic",correct:true},
{text:"Only gallstones cause pancreatitis",correct:false},
{text:"Alcohol never causes pancreatitis",correct:false},
{text:"Diet is the main cause",correct:false}],
explanation:{correct:"Major causes: Gallstones (40%) - stone obstructs ampulla; Alcohol (30%) - direct toxic effect on acinar cells; Hypertriglyceridemia (TG >1000); post-ERCP; drugs (azathioprine, valproic acid, thiazides); trauma; autoimmune. GET SMASHED mnemonic.",incorrect:"Gallstones and alcohol are the top two causes by far. This patient with heavy alcohol use likely has alcoholic pancreatitis. However, must rule out gallstones even in alcoholics (can have both)."},
teaching:`<h4>Pancreatitis Etiology</h4><p><strong>Gallstones:</strong> #1 cause (40%)</p><p><strong>Alcohol:</strong> #2 cause (30%)</p><p><strong>Hypertriglyceridemia:</strong> TG >1000 mg/dL</p><p><strong>Others:</strong> ERCP, drugs, trauma, autoimmune</p><p><strong>Idiopathic:</strong> 15-20% (often occult microlithiasis)</p>`,
why_chain:[{q:"How do gallstones cause pancreatitis?",a:"Stone passes into common bile duct and lodges at ampulla of Vater, obstructing both biliary and pancreatic drainage. Back-pressure causes ductal hypertension and premature enzyme activation within the pancreas."}],points:10}},

{title:"Initial Management",content:`<div class="narrative"><p>Begin treatment for acute pancreatitis.</p></div><div class="socratic-prompt"><h4>Resuscitation</h4><p>What is the initial management of acute pancreatitis?</p></div>`,
hint_beginner:"Aggressive IV fluids, pain control, NPO initially",hint_advanced:"What's the evidence for lactated Ringer's?",
question:{prompt:"What is the cornerstone of initial management?",
options:[{text:"Aggressive IV fluid resuscitation (goal-directed, typically 5-10 mL/kg/hr initially with LR preferred), pain control (IV opioids), NPO initially but early oral feeding when tolerated, no prophylactic antibiotics",correct:true},
{text:"Immediate surgery",correct:false},
{text:"Prophylactic antibiotics for all",correct:false},
{text:"Strict NPO for 1 week",correct:false}],
explanation:{correct:"Management pillars: 1) Aggressive fluids - LR preferred (may reduce SIRS), goal-directed (HR, UOP, BUN), typically 5-10 mL/kg/hr initially then titrate. 2) Pain control. 3) NPO initially but early feeding when tolerated (within 24-48h if mild). 4) NO prophylactic antibiotics (no benefit, increases resistance).",incorrect:"Fluids are the cornerstone - pancreatitis causes massive third-spacing. Early feeding improves outcomes (maintains gut barrier). Antibiotics only for infected necrosis, not prophylaxis."},
teaching:`<h4>Initial Management</h4><p><strong>Fluids:</strong> Aggressive, goal-directed (LR preferred); 5-10 mL/kg/hr initially</p><p><strong>Pain:</strong> IV opioids (no evidence morphine causes sphincter spasm)</p><p><strong>Nutrition:</strong> Early oral feeding when tolerated (within 24-48h)</p><p><strong>Antibiotics:</strong> NOT prophylactically; only for infected necrosis</p>`,
why_chain:[{q:"Why is LR preferred over NS?",a:"Small studies suggest LR reduces systemic inflammation (lower CRP, less SIRS) compared to NS. The lactate is metabolized to bicarbonate, potentially buffering acidosis. NS can cause hyperchloremic acidosis with large volumes."}],points:10}},

{title:"Nutrition Timing",content:`<div class="narrative"><p>Patient's pain improving on day 2. When should you feed?</p></div><div class="socratic-prompt"><h4>Early Feeding</h4><p>What is the current evidence on nutrition in pancreatitis?</p></div>`,
hint_beginner:"Early oral feeding is safe and beneficial",hint_advanced:"Enteral vs parenteral nutrition?",
question:{prompt:"Day 2, pain improving. When to start oral intake?",
options:[{text:"Start oral feeding when pain decreasing and patient tolerating; early feeding (within 24-48h) reduces complications and length of stay; no need to wait for lipase normalization or bowel sounds",correct:true},
{text:"Keep NPO until lipase normalizes",correct:false},
{text:"Wait for bowel sounds to return",correct:false},
{text:"TPN is preferred over oral feeding",correct:false}],
explanation:{correct:"Early feeding paradigm shift: Start oral diet when pain improving and patient hungry - don't wait for lipase to normalize or bowel sounds. Early feeding maintains gut barrier, reduces bacterial translocation, shortens hospital stay. If can't tolerate oral, enteral (NG/NJ) preferred over TPN.",incorrect:"Prolonged NPO increases complications. Lipase normalization is NOT required before feeding. Enteral nutrition (oral or tube) is superior to TPN for maintaining gut integrity."},
teaching:`<h4>Nutrition in Pancreatitis</h4><p><strong>Early feeding:</strong> Within 24-48h when tolerated</p><p><strong>Don't wait for:</strong> Lipase normalization, bowel sounds, complete pain resolution</p><p><strong>If oral not tolerated:</strong> Enteral (NG/NJ tube) preferred over TPN</p><p><strong>Diet:</strong> Low-fat solid diet (no need for clear liquids first)</p>`,
why_chain:[{q:"Why enteral over parenteral?",a:"Enteral nutrition maintains gut barrier integrity, preventing bacterial translocation (major source of infected necrosis). TPN leads to gut mucosal atrophy. Multiple trials show enteral reduces infections, organ failure, and mortality."}],points:10}},

{title:"Role of Imaging",content:`<div class="narrative"><p>Pain persists at day 4. When is CT indicated?</p></div><div class="socratic-prompt"><h4>When to Image</h4><p>What is the role of CT in acute pancreatitis?</p></div>`,
hint_beginner:"CT not routine; use for unclear diagnosis or no improvement",hint_advanced:"What is the CT severity index?",
question:{prompt:"Day 4, pain not improving. Is CT indicated now?",
options:[{text:"Yes - CT indicated when: diagnosis uncertain, no clinical improvement by 48-72h, or suspected complications (necrosis, pseudocyst, abscess); contrast-enhanced CT best for assessing necrosis",correct:true},
{text:"CT required at admission for all",correct:false},
{text:"Never need CT in pancreatitis",correct:false},
{text:"Only ultrasound is useful",correct:false}],
explanation:{correct:"CT indications: uncertain diagnosis, no improvement in 48-72h, clinical deterioration, suspected complications. This patient with persistent pain at day 4 needs CT to assess for necrosis or other complications. Contrast-enhanced CT detects necrosis (non-enhancing pancreatic tissue).",incorrect:"CT not routine at admission if diagnosis clear. Reserve for non-improvement or suspected complications. Necrosis best visualized after 72h (earlier CT may underestimate extent)."},
teaching:`<h4>Imaging in Pancreatitis</h4><p><strong>Ultrasound:</strong> All patients - look for gallstones</p><p><strong>CT indications:</strong> Uncertain diagnosis, no improvement 48-72h, worsening</p><p><strong>Timing:</strong> Necrosis best seen after 72h</p><p><strong>CT findings:</strong> Interstitial vs necrotizing; local complications</p>`,
why_chain:[{q:"What's the significance of necrosis?",a:"Necrotizing pancreatitis has higher mortality than interstitial edematous pancreatitis. Necrosis can become infected (infected pancreatic necrosis) - major cause of late mortality. Extent of necrosis (CT severity index) correlates with outcomes."}],points:10}},

{title:"Complications",content:`<div class="narrative"><p>CT shows 40% pancreatic necrosis. Day 10, patient develops fever and rising WBC.</p></div><div class="socratic-prompt"><h4>Infected Necrosis</h4><p>How do you diagnose and manage infected pancreatic necrosis?</p></div>`,
hint_beginner:"Fever + necrosis = suspect infection; may need drainage",hint_advanced:"When is intervention needed for necrosis?",
question:{prompt:"Necrosis + new fever at day 10. What should you suspect and do?",
options:[{text:"Suspect infected pancreatic necrosis - indicated by new fever, rising WBC, clinical deterioration in patient with necrosis; CT may show gas bubbles; treat with antibiotics (carbapenems) and drainage (prefer step-up approach: percutaneous drain first, then endoscopic/surgical if needed)",correct:true},
{text:"Continue observation only",correct:false},
{text:"Immediate open surgery",correct:false},
{text:"Stop antibiotics",correct:false}],
explanation:{correct:"Infected necrosis: new fever, leukocytosis, clinical decline in patient with known necrosis. CT may show gas. Management: antibiotics (carbapenems penetrate necrosis) + drainage. Step-up approach preferred: start with percutaneous/endoscopic drainage, escalate to surgery only if needed. Avoid early surgery (high mortality).",incorrect:"Infected necrosis is a serious complication requiring intervention. The step-up approach (minimally invasive first) has better outcomes than immediate open surgery."},
teaching:`<h4>Infected Pancreatic Necrosis</h4><p><strong>Signs:</strong> New fever, rising WBC, deterioration in patient with necrosis</p><p><strong>CT:</strong> Gas bubbles in necrosis (pathognomonic)</p><p><strong>Antibiotics:</strong> Carbapenems (good penetration)</p><p><strong>Drainage:</strong> Step-up approach - percutaneous → endoscopic → surgical</p>`,
why_chain:[{q:"What is the step-up approach?",a:"Start with least invasive intervention: percutaneous or endoscopic transgastric drainage. If inadequate response, escalate to video-assisted retroperitoneal debridement or open necrosectomy. This approach reduces mortality and complications compared to early open surgery."}],points:15}},

{title:"Gallstone Pancreatitis",content:`<div class="narrative"><p>Different patient: 55-year-old woman with pancreatitis, RUQ ultrasound shows multiple gallstones and dilated CBD.</p></div><div class="socratic-prompt"><h4>Special Considerations</h4><p>How does gallstone pancreatitis management differ?</p></div>`,

{text:"ERCP for all gallstone pancreatitis",correct:false},
{text:"No role for cholecystectomy",correct:false},
{text:"Wait 6 months for cholecystectomy",correct:false}],

{title:"Case Synthesis",content:`<div class="narrative"><p>First patient treated with aggressive fluids, early feeding, and antibiotics + percutaneous drainage for infected necrosis - recovered well. Second patient had same-admission cholecystectomy - no recurrence.</p></div><div class="socratic-prompt"><h4>Key Principles</h4><p>What are the essential principles of acute pancreatitis management?</p></div>`,

];
function shuffleArray(a){const s=[...a];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s;}
function setDifficulty(l,b){difficulty=l;document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderStage(currentStage);}
function renderStage(i){
const s=stages[i],opts=shuffleArray(s.question.options.map((o,idx)=>({...o,idx}))),ltrs='ABCD';
let hints='';
if(difficulty==='beginner'&&s.hint_beginner)hints=`<div class="hint-beginner" style="display:block;">Hint: ${s.hint_beginner}</div>`;
else if(difficulty==='advanced'&&s.hint_advanced)hints=`<div class="hint-advanced" style="display:block;">Challenge: ${s.hint_advanced}</div>`;
const why=s.question.why_chain?`<div class="why-chain" id="why"><h4>WHY Chain</h4>${s.question.why_chain.map(w=>`<div class="why-item"><div class="why-q">Q: ${w.q}</div><div class="why-a">${w.a}</div></div>`).join('')}</div>`:'';
document.getElementById('progress').style.width=((i)/stages.length*100)+'%';
document.getElementById('scene-container').innerHTML=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${i+1} of ${stages.length}</div><div class="scene-title">${s.title}</div></div>${s.content}${hints}<div class="question-box"><div class="question-prompt">${s.question.prompt}</div><div class="mcq-options">${opts.map((o,j)=>`<div class="mcq-option" data-correct="${o.correct}" onclick="selectOption(this,${i})"><span class="option-letter">${ltrs[j]}</span><span class="option-text">${o.text}</span></div>`).join('')}</div><div class="feedback correct-feedback" id="fb-c"><div class="feedback-title">Correct!</div><div>${s.question.explanation.correct}</div></div><div class="feedback incorrect-feedback" id="fb-i"><div class="feedback-title">Not Quite</div><div>${s.question.explanation.incorrect}</div></div><div class="teaching-point" id="teach">${s.question.teaching}</div>${why}<button class="btn" id="next-btn" onclick="nextStage()">Continue</button></div></div>`;
}
function selectOption(el,i){
if(answeredQuestions.has(i))return;
const c=el.dataset.correct==='true',s=stages[i];
answeredQuestions.add(i);decisionPath.push({stage:s.title,correct:c,points:c?s.question.points:0});
if(c)score+=s.question.points;maxScore+=s.question.points;
document.getElementById('score').textContent=score;document.getElementById('maxScore').textContent=maxScore;
document.querySelectorAll('.mcq-option').forEach(o=>{o.classList.add('disabled');if(o.dataset.correct==='true')o.classList.add('correct');else if(o===el&&!c)o.classList.add('incorrect');});
document.getElementById(c?'fb-c':'fb-i').classList.add('show');
document.getElementById('teach').classList.add('show');
const w=document.getElementById('why');if(w)w.classList.add('show');
document.getElementById('next-btn').classList.add('show');
}
function nextStage(){if(++currentStage<stages.length){renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'});}else showCompletion();}
function showCompletion(){
const p=Math.round(score/maxScore*100);
let g,m,clr;
if(p>=90){g='Outstanding!';clr='#22c55e';m='Excellent pancreatitis management!';}
else if(p>=80){g='Great Work!';clr='#3b82f6';m='Strong grasp. Review infected necrosis management.';}
else if(p>=70){g='Good Progress';clr='#f59e0b';m='Focus on severity assessment and nutrition timing.';}
else{g='Keep Learning';clr='#ef4444';m='Review diagnostic criteria and initial management.';}
document.getElementById('scene-container').innerHTML=`<div class="scene completion"><div class="completion-grade" style="color:${clr}">${g}</div><div class="completion-percent" style="color:${clr}">${p}%</div><div style="font-size:1.3rem;margin-bottom:8px">${score}/${maxScore} points</div><div style="margin:16px 0;color:#e2e8f0">${m}</div><div class="completion-breakdown"><h4 style="margin-bottom:16px">Your Journey</h4>${decisionPath.map((d,j)=>`<div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;"><span style="color:${d.correct?'#4ade80':'#f87171'}">${d.correct?'Y':'N'} ${d.stage}</span><span style="color:#94a3b8">${d.points}/${stages[j].question.points}</span></div>`).join('')}</div></div>`;
document.getElementById('progress').style.width='100%';
}
document.addEventListener('DOMContentLoaded',()=>renderStage(0));


// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
