<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COPD Exacerbation | Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #4a5568 0%, #718096 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(74, 85, 104, 0.9); border-radius: 16px; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; background: #718096; margin-left: 10px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #718096, #a0aec0); border-radius: 3px; }
        .scene { background: linear-gradient(135deg, #4a5568, #2d3748); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .scene-header { background: rgba(113, 128, 150, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #a0aec0; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(113,128,150,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #718096, #4a5568); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #a0aec0; }
        .why-chain { background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(113,128,150,0.15)); border: 1px solid rgba(139,92,246,0.3); border-radius: 16px; padding: 24px; margin: 24px 0; }
        .why-chain-title { font-size: 1.2rem; font-weight: 700; color: #c4b5fd; margin-bottom: 20px; }
        .why-item { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
        .why-q { font-weight: 600; color: #e9d5ff; margin-bottom: 10px; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','severity','treatment','steroids','antibiotics','oxygen','niv','intubation','discharge','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">🫁 COPD Exacerbation<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Worsening Shortness of Breath</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would pregnancy change your approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Don't forget to consider mimics and look-alikes</p>
                </div><div class="narrative"><p>A <span class="highlight">67-year-old man</span> with COPD (50 pack-years, home O2) presents with <span class="critical">increased dyspnea, cough, and purulent sputum</span> for 3 days.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 104, BP 148/88, RR 26, SpO2 86% on 2L NC<br><strong>Exam:</strong> Pursed-lip breathing, accessory muscle use, diffuse wheezes<br><strong>ABG:</strong> pH 7.32, pCO2 58, pO2 54, HCO3 28</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 COPD Exacerbation Definition</div><div class="pathway">Acute worsening of respiratory symptoms<br>beyond normal day-to-day variation<br><br><strong>Cardinal symptoms (Anthonisen):</strong><br>1. Increased dyspnea<br>2. Increased sputum volume<br>3. Increased sputum purulence<br><br>All 3 = Type 1 (severe)<br>2 = Type 2, 1 = Type 3</div></div><button class="btn" onclick="nextStage()">Severity →</button></div></div>`;
    };

    window.render_severity = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">Severity Assessment</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate severity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if this patient had renal impairment?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 GOLD Severity Classification</div><table class="comparison-table"><tr><th>Severity</th><th>Definition</th></tr><tr><td>Mild</td><td>SABDs only</td></tr><tr><td>Moderate</td><td>SABDs + antibiotics/steroids</td></tr><tr><td>Severe</td><td>Requires hospitalization</td></tr><tr><td>Very severe</td><td>Respiratory failure, ICU</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 ABG Interpretation</div><p>pH 7.32, pCO2 58, HCO3 28 = <strong>Acute-on-chronic respiratory acidosis</strong><br>Elevated HCO3 shows chronic compensation. Normal pCO2 in severe COPD = patient tiring!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Red Flags</div><div class="pathway">• Accessory muscle use<br>• Paradoxical breathing<br>• New cyanosis<br>• Hemodynamic instability<br>• Altered mental status<br>• Failure to improve</div></div><button class="btn" onclick="nextStage()">Treatment →</button></div></div>`;
    };

    window.render_treatment = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">Bronchodilator Therapy</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Think about the most common causes first</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does immunosuppression affect the differential?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 First-Line Treatment</div><table class="comparison-table"><tr><th>Drug</th><th>Dose</th><th>Frequency</th></tr><tr><td><strong>Albuterol</strong></td><td>2.5-5 mg neb</td><td>q20min × 3, then q1-4h</td></tr><tr><td><strong>Ipratropium</strong></td><td>0.5 mg neb</td><td>q4-6h (continue in COPD!)</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 COPD vs Asthma Difference</div><div class="pathway"><strong>In COPD:</strong><br>• Ipratropium used throughout<br>  (not just first hour like asthma)<br>• Anticholinergics very effective<br>• Less dramatic bronchodilator response<br>• Underlying damage not reversible<br><br>Combo nebs (DuoNeb) often used:<br>Albuterol 2.5mg + Ipratropium 0.5mg</div></div><button class="btn" onclick="nextStage()">Steroids →</button></div></div>`;
    };

    window.render_steroids = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">Systemic Corticosteroids</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the key history element pointing to diagnosis?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would pregnancy change your approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Always reassess if patient not improving as expected</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 REDUCE Trial Changed Practice</div><table class="comparison-table"><tr><th>Drug</th><th>Dose</th><th>Duration</th></tr><tr><td>Prednisone</td><td>40 mg daily</td><td><strong>5 days</strong></td></tr><tr><td>Methylprednisolone</td><td>40-125 mg IV</td><td>If NPO</td></tr></table><p style="margin-top:12px;">5 days = 14 days in efficacy. No taper needed!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Who Benefits Most?</div><div class="pathway"><strong>Eosinophilic phenotype:</strong><br>• Blood eosinophils >2% or >300<br>• Better steroid response<br>• More inflammatory component<br><br><strong>Benefits:</strong><br>• ↓ Treatment failure<br>• ↓ Length of stay<br>• Faster FEV1 recovery<br><br><strong>Monitor:</strong> Hyperglycemia common!</div></div><button class="btn" onclick="nextStage()">Antibiotics →</button></div></div>`;
    };

    window.render_antibiotics = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">When to Use Antibiotics</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if this patient had renal impairment?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Antibiotic Indications</div><ul style="margin-left:20px;line-height:2;"><li>All 3 cardinal symptoms</li><li>2 symptoms including <strong>purulent sputum</strong></li><li>Requiring mechanical ventilation</li><li>CRP >20 or procalcitonin >0.25</li></ul></div><div class="mechanism-box"><div class="mechanism-title">🧬 Antibiotic Selection</div><div class="pathway"><strong>Uncomplicated:</strong><br>• Azithromycin 500mg × 1, 250mg × 4d<br>• Doxycycline 100mg BID × 5d<br>• Amox-clav 875mg BID × 5-7d<br><br><strong>Complicated/FQ risk factors:</strong><br>• Levofloxacin 750mg daily × 5d<br><br><strong>Pseudomonas risk:</strong><br>(severe COPD, bronchiectasis, recent abx)<br>• Ciprofloxacin or antipseudomonal</div></div><div class="why-chain"><div class="why-chain-title">🔗 WHY Chain</div><div class="why-item"><div class="why-q">Why not antibiotics for all?</div>50%+ are viral. Target purulent sputum (bacterial). Unnecessary abx → resistance, C. diff.</div></div><button class="btn" onclick="nextStage()">Oxygen →</button></div></div>`;
    };

    window.render_oxygen = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">Oxygen Therapy</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate severity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does immunosuppression affect the differential?</p>
                </div><div class="alert-box"><div class="alert-title">🚨 Target SpO2: 88-92%!</div><p>Don't aim for normal SpO2 in COPD. High-flow O2 worsens hypercapnia!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why High O2 Is Dangerous</div><div class="pathway"><strong>V/Q mismatch mechanism:</strong><br>O2 releases hypoxic vasoconstriction<br>→ Blood goes to poorly ventilated areas<br>→ ↑ Dead space → CO2 retention<br><br><strong>Haldane effect:</strong><br>Oxygenated Hgb carries less CO2<br>→ CO2 displaced → accumulates<br><br><strong>Hypoxic drive:</strong><br>Less important than traditionally taught<br>but still contributes</div></div><div class="boards-tip"><div class="boards-tip-title">📚 Venturi Mask = Precise FiO2</div><p>Use Venturi mask for precise O2 delivery (24-50%). Titrate to 88-92%.</p></div><button class="btn" onclick="nextStage()">NIV →</button></div></div>`;
    };

    window.render_niv = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 10</div><div class="scene-title">Non-Invasive Ventilation</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Think about the most common causes first</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would pregnancy change your approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fefce8; border:1px solid #eab308; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #eab308;">
                    <p style="margin:0; color:#854d0e; font-size:0.9rem;"><strong>🚫 Common Mistake:</strong> Avoid anchoring bias - keep differential broad initially</p>
                </div><div class="alert-box"><div class="alert-title">🚨 NIV Is First-Line for COPD Respiratory Failure!</div><p>Strong evidence: Reduces intubation, mortality, and length of stay.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 NIV Indications</div><ul style="margin-left:20px;line-height:2;"><li>Respiratory acidosis (pH ≤7.35, pCO2 >45)</li><li>Severe dyspnea with accessory muscles</li><li>Persistent hypoxemia despite O2</li></ul></div><div class="mechanism-box"><div class="mechanism-title">🧬 BiPAP Settings</div><div class="pathway"><strong>Initial:</strong><br>• IPAP: 10-12 (can ↑ to 20)<br>• EPAP: 4-5 cm H2O<br>• FiO2: Target SpO2 88-92%<br><br><strong>Why EPAP helps:</strong><br>Counterbalances auto-PEEP from air trapping<br>→ Easier to trigger breaths<br>→ ↓ Work of breathing<br><br><strong>Reassess 1-2 hours:</strong><br>Improving ABG → continue<br>Worsening → consider intubation</div></div><button class="btn" onclick="nextStage()">Intubation →</button></div></div>`;
    };

    window.render_intubation = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 10</div><div class="scene-title">When to Intubate</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the key history element pointing to diagnosis?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if this patient had renal impairment?</p>
                </div><div class="alert-box"><div class="alert-title">🚨 Intubation Indications</div><ul style="margin-left:20px;"><li>Respiratory arrest</li><li>NIV failure or contraindication</li><li>Altered mental status/unable to protect airway</li><li>Hemodynamic instability</li><li>Refractory hypoxemia</li></ul></div><div class="mechanism-box"><div class="mechanism-title">🧬 Ventilator Strategy</div><div class="pathway"><strong>Goals: Avoid air trapping!</strong><br><br>• Low respiratory rate (10-14)<br>• Low tidal volume (6-8 mL/kg)<br>• High inspiratory flow<br>• Prolonged expiratory time (I:E 1:3-1:4)<br>• Monitor auto-PEEP<br><br><strong>Permissive hypercapnia:</strong><br>Accept CO2 60-80, pH >7.20<br>Better than barotrauma</div></div><div class="why-chain"><div class="why-chain-title">🔗 WHY Chain</div><div class="why-item"><div class="why-q">Why is intubating COPD risky?</div>Positive pressure + air trapping → ↑↑ auto-PEEP → ↓ venous return → hypotension → arrest. Pre-hydrate, anticipate hypotension.</div></div><button class="btn" onclick="nextStage()">Discharge →</button></div></div>`;
    };

    window.render_discharge = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 10</div><div class="scene-title">Discharge Planning</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does immunosuppression affect the differential?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Discharge Checklist</div><ul style="margin-left:20px;line-height:2;"><li>☐ Complete steroid course (5 days total)</li><li>☐ Antibiotics if indicated</li><li>☐ Rescue inhaler (SABA)</li><li>☐ Maintenance inhalers optimized</li><li>☐ Inhaler technique reviewed</li><li>☐ Home O2 if needed (titrate to 88-92%)</li><li>☐ Smoking cessation counseling</li><li>☐ Vaccinations (flu, pneumococcal, COVID)</li><li>☐ Pulmonary rehab referral</li><li>☐ Follow-up in 1-4 weeks</li></ul></div><div class="mechanism-box"><div class="mechanism-title">🧬 Maintenance Therapy (GOLD)</div><div class="pathway"><strong>Group A (low symptoms, low risk):</strong><br>Bronchodilator PRN<br><br><strong>Group B (more symptoms):</strong><br>LABA or LAMA daily<br><br><strong>Group E (exacerbation history):</strong><br>LAMA + LABA<br>Add ICS if eosinophils >300<br><br>After exacerbation → at least Group E therapy</div></div><button class="btn" onclick="nextStage()">Debrief →</button></div></div>`;
    };

    window.render_debrief = function() {

(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];

    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';

    };
