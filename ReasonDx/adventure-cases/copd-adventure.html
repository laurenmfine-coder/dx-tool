<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Breathless Smoker | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#0EA5E9;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#0369A1,#0EA5E9);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(14,165,233,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(14,165,233,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(14,165,233,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🌬️ The Breathless Smoker</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'68M',wt:'72kg',hx:'COPD, increased dyspnea and sputum x3d, 40pk-yr smoker',exam:'Wheezing, prolonged expiration, using accessory muscles',vitals:{HR:'102',BP:'148/88',RR:'28',SpO2:'88%'},labs:{pH:'7.38',pCO2:'52',pO2:'58',WBC:'12.4'}},int:{age:'72F',wt:'58kg',hx:'Severe COPD on home O2 2L, now worse with purulent sputum',exam:'Barrel chest, diminished breath sounds, cyanotic',vitals:{HR:'92',BP:'138/82',RR:'24',SpO2:'85%'},labs:{pH:'7.32',pCO2:'68',pO2:'52',WBC:'14.8'}},adv:{age:'65M',wt:'70kg',hx:'Known CO2 retainer, obtunded, brought by EMS',exam:'Unresponsive, shallow breathing, asterixis',vitals:{HR:'58',BP:'168/92',RR:'8',SpO2:'92%'},labs:{pH:'7.18',pCO2:'98',pO2:'72',HCO3:'38'}}};
const Q=[
{t:'O2 Target',q:'Target SpO2 in COPD exacerbation?',h:'Too much O2 can worsen hypercapnia',o:[{id:'a',txt:'88-92% (avoid hyperoxia)',c:1,p:100},{id:'b',txt:'>95%',c:0,p:0},{id:'c',txt:'100%',c:0,p:0}],fb:{1:'<b>Correct!</b> Target 88-92%. Hyperoxia suppresses hypoxic drive and worsens CO2 retention.',0:'<b>COPD O2:</b> 88-92%. Higher targets can worsen hypercapnic respiratory failure.'}},
{t:'First-Line Treatment',q:'Initial bronchodilator therapy?',h:'SABA + SAMA combination',o:[{id:'a',txt:'Albuterol + ipratropium nebulizers',c:1,p:100},{id:'b',txt:'Albuterol alone',c:0,p:50},{id:'c',txt:'LABA first',c:0,p:20}],fb:{1:'<b>Correct!</b> SABA (albuterol) + SAMA (ipratropium) for acute exacerbation. Combination better than either alone.',0:'<b>Bronchodilators:</b> SABA + SAMA combined for exacerbations.'}},
{t:'Steroid Dosing',q:'Systemic steroid dose for COPD exacerbation?',h:'REDUCE trial changed practice',o:[{id:'a',txt:'Prednisone 40mg x 5 days',c:1,p:100},{id:'b',txt:'Methylpred 125mg IV x 3d then taper',c:0,p:40},{id:'c',txt:'No steroids needed',c:0,p:0}],fb:{1:'<b>Correct!</b> REDUCE trial: 40mg prednisone x 5 days = older longer courses. No taper needed.',0:'<b>Steroids:</b> 40mg x 5 days (REDUCE). No benefit to longer courses.'}},
{t:'Antibiotic Indication',q:'When are antibiotics indicated in COPD exacerbation?',h:'Anthonisen criteria',o:[{id:'a',txt:'Increased dyspnea + increased sputum volume + purulence',c:1,p:100},{id:'b',txt:'All exacerbations',c:0,p:30},{id:'c',txt:'Never',c:0,p:0}],fb:{1:'<b>Correct!</b> Antibiotics if: 2-3 of increased dyspnea, sputum volume, sputum purulence (Anthonisen). Cover H. flu, M. cat, S. pneumo.',0:'<b>Anthonisen:</b> Abx for ≥2 cardinal symptoms or if requiring ventilation.'}},
{t:'BiPAP Indication',q:'When to initiate NIPPV (BiPAP)?',h:'Respiratory acidosis criteria',o:[{id:'a',txt:'pH 7.25-7.35 with pCO2 >45 despite initial therapy',c:1,p:100},{id:'b',txt:'Any hypoxia',c:0,p:20},{id:'c',txt:'Only after intubation fails',c:0,p:0}],fb:{1:'<b>Correct!</b> BiPAP for: pH <7.35 with hypercapnia, accessory muscle use, RR >25. Reduces intubation and mortality.',0:'<b>NIPPV:</b> For hypercapnic respiratory failure (pH 7.25-7.35, elevated CO2).'}},
{t:'BiPAP Settings',q:'Initial BiPAP settings for COPD?',h:'IPAP for ventilation, EPAP for oxygenation',o:[{id:'a',txt:'IPAP 10-12, EPAP 4-5, titrate to comfort and ABG',c:1,p:100},{id:'b',txt:'IPAP 20, EPAP 10',c:0,p:20},{id:'c',txt:'CPAP only',c:0,p:10}],fb:{1:'<b>Correct!</b> Start IPAP 10-12, EPAP 4-5. Increase IPAP for CO2, increase EPAP/FiO2 for O2. Goal pH improvement.',0:'<b>Settings:</b> Start low, titrate. IPAP-EPAP difference drives ventilation.'}},
{t:'Intubation Trigger',q:'When to intubate instead of BiPAP?',h:'Absolute contraindications to NIPPV',o:[{id:'a',txt:'Altered mental status, inability to protect airway, hemodynamic instability',c:1,p:100},{id:'b',txt:'Any pH <7.3',c:0,p:30},{id:'c',txt:'SpO2 <90%',c:0,p:10}],fb:{1:'<b>Correct!</b> Intubate if: obtunded, can\'t protect airway, copious secretions, facial trauma, hemodynamic instability, or NIPPV failure.',0:'<b>Intubation:</b> When NIPPV contraindicated or failing.'}},
{t:'Discharge Planning',q:'What reduces readmission after COPD exacerbation?',h:'Prevent next exacerbation',o:[{id:'a',txt:'Inhaler technique review, smoking cessation, flu/pneumo vaccines, pulm rehab',c:1,p:100},{id:'b',txt:'Chronic oral steroids',c:0,p:0},{id:'c',txt:'Prophylactic antibiotics',c:0,p:20}],fb:{1:'<b>Correct!</b> Discharge bundle: Inhaler education, smoking cessation, vaccinations, pulm rehab, follow-up. Reduces readmission.',0:'<b>Prevention:</b> Inhaler technique, vaccines, smoking cessation, pulm rehab.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next →':'Results →';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🌬️ The Breathless Smoker</h1><p style="color:var(--muted);margin-bottom:32px">COPD: O2 targets, bronchodilators, steroids, BiPAP, intubation</p><button class="start-btn" onclick="go(\'pres\')">Begin Case →</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🫁 Respiratory Emergency</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment →</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">🔍 '+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">💡 '+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit →</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">📌 COPD Exacerbation Pearls</div><div class="pearl-item"><b>O2 target:</b> 88-92% (avoid hyperoxia)</div><div class="pearl-item"><b>Bronchodilators:</b> Albuterol + ipratropium</div><div class="pearl-item"><b>Steroids:</b> Prednisone 40mg x 5 days</div><div class="pearl-item"><b>Antibiotics:</b> If ≥2 Anthonisen criteria</div><div class="pearl-item"><b>BiPAP:</b> pH 7.25-7.35 + hypercapnia</div></div><div class="cross-link"><a href="../mechanism/copd-module.html">MechanismDx: COPD</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
