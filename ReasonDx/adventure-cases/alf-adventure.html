<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liver in Crisis | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#F59E0B;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#D97706,#F59E0B);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(245,158,11,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(245,158,11,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#000;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(245,158,11,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#000}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#FCD34D;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#000;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🫁 Liver in Crisis</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'32F',wt:'58kg',hx:'Intentional acetaminophen overdose 3 days ago, now confused and jaundiced',exam:'Jaundice, asterixis, RUQ tenderness, confused but arousable',vitals:{HR:'98',BP:'98/62',Temp:'99.8°F',SpO2:'96%'},labs:{AST:'8500',ALT:'6200',INR:'4.8',Tbili:'12',Hx:'APAP overdose'}},int:{age:'45F',wt:'72kg',hx:'Recent travel to Mexico, progressive jaundice and confusion over 1 week',exam:'Deep jaundice, grade 2 encephalopathy, tender hepatomegaly',vitals:{HR:'88',BP:'108/68',Temp:'100.2°F',SpO2:'97%'},labs:{AST:'2800',ALT:'3200',INR:'3.2',Tbili:'18',Hx:'? Viral hepatitis'}},adv:{age:'28M',wt:'75kg',hx:'Bodybuilder using supplements, rapid deterioration over 48 hours',exam:'Comatose, cerebral edema signs, coagulopathic bleeding',vitals:{HR:'52',BP:'168/95',Temp:'97.2°F',SpO2:'88%'},labs:{AST:'12000',ALT:'9800',INR:'8.5',Tbili:'22',Cr:'3.8',Hx:'Herbal supplement use, Cushing response'}}};
const Q=[
{t:'Definition',q:'What defines acute liver failure (ALF)?',h:'Key criteria',o:[{id:'a',txt:'Severe liver injury + coagulopathy (INR ≥1.5) + encephalopathy in patient without prior liver disease, within 26 weeks',c:1,p:100},{id:'b',txt:'Any elevated liver enzymes',c:0,p:20},{id:'c',txt:'Chronic cirrhosis with decompensation',c:0,p:20}],fb:{1:'<b>Correct!</b> ALF: Severe acute liver injury + INR ≥1.5 + hepatic encephalopathy + no prior liver disease + onset <26 weeks. Hyperacute (<7d), acute (7-21d), subacute (21d-26wk).',0:'<b>ALF definition:</b> Coagulopathy (INR ≥1.5) + encephalopathy + no prior liver disease.'}},
{t:'Most Common Cause',q:'Most common cause of ALF in the United States?',h:'Often preventable',o:[{id:'a',txt:'Acetaminophen toxicity (~50% of cases)',c:1,p:100},{id:'b',txt:'Viral hepatitis',c:0,p:30},{id:'c',txt:'Alcohol',c:0,p:20}],fb:{1:'<b>Correct!</b> US: APAP ~50%, drug-induced (non-APAP) ~12%, viral hepatitis ~10%, autoimmune, Wilson disease, pregnancy-related. Globally, viral hepatitis more common.',0:'<b>US causes:</b> APAP #1 (~50%). Treat with NAC!'}},
{t:'Initial Workup',q:'Essential initial workup for ALF?',h:'Identify treatable causes',o:[{id:'a',txt:'APAP level, viral hepatitis serologies, autoimmune markers, toxicology, pregnancy test, imaging',c:1,p:100},{id:'b',txt:'Liver biopsy first',c:0,p:20},{id:'c',txt:'CT abdomen only',c:0,p:20}],fb:{1:'<b>Correct!</b> Labs: APAP level, HAV/HBV/HCV/HEV serologies, ANA/ASMA/IgG (autoimmune), ceruloplasmin (Wilson), HSV (if immunocompromised), pregnancy test, toxicology. Imaging for vascular causes.',0:'<b>Workup:</b> APAP level, viral serologies, autoimmune, Wilson, imaging.'}},
{t:'Cerebral Edema',q:'Most feared complication of ALF and how to monitor?',h:'Leading cause of death',o:[{id:'a',txt:'Cerebral edema - monitor with frequent neuro exams, consider ICP monitoring in grade 3-4 encephalopathy',c:1,p:100},{id:'b',txt:'GI bleeding',c:0,p:30},{id:'c',txt:'Renal failure',c:0,p:20}],fb:{1:'<b>Correct!</b> Cerebral edema: Leading cause of death in ALF. Signs: Cushing response (HTN + bradycardia), posturing, pupil changes. Consider ICP monitoring, osmotic therapy, avoid stimulation.',0:'<b>Cerebral edema:</b> Main cause of death. Monitor closely, treat ICP.'}},
{t:'NAC Role',q:'Role of N-acetylcysteine in non-APAP ALF?',h:'Beyond acetaminophen',o:[{id:'a',txt:'Improves transplant-free survival in non-APAP ALF with early stage encephalopathy',c:1,p:100},{id:'b',txt:'Only useful for APAP',c:0,p:40},{id:'c',txt:'Contraindicated in non-APAP',c:0,p:10}],fb:{1:'<b>Correct!</b> NAC improves outcomes in non-APAP ALF with grade 1-2 encephalopathy. Give to ALL ALF patients regardless of cause (unless mushroom poisoning - different protocol).',0:'<b>NAC:</b> Give to ALL ALF patients. Helps even in non-APAP cases.'}},
{t:'Kings College',q:'Kings College Criteria for APAP-induced ALF predict need for transplant. What pH indicates poor prognosis?',h:'Single criterion',o:[{id:'a',txt:'pH <7.30 after fluid resuscitation (alone indicates need for transplant evaluation)',c:1,p:100},{id:'b',txt:'pH <7.45',c:0,p:20},{id:'c',txt:'pH <7.00 only',c:0,p:30}],fb:{1:'<b>Correct!</b> APAP Kings College: pH <7.30 alone = list. OR all three: Grade 3-4 encephalopathy + INR >6.5 + Creatinine >3.4. Contact transplant center early!',0:'<b>Kings College (APAP):</b> pH <7.30 alone, or all 3: HE grade 3-4 + INR >6.5 + Cr >3.4.'}},
{t:'Specific Treatments',q:'Which ALF etiology has a specific antidote beyond NAC?',h:'Time-sensitive treatment',o:[{id:'a',txt:'Amanita mushroom poisoning - penicillin G + silibinin',c:1,p:100},{id:'b',txt:'Viral hepatitis',c:0,p:30},{id:'c',txt:'Drug-induced (non-APAP)',c:0,p:20}],fb:{1:'<b>Correct!</b> Specific treatments: APAP (NAC), Amanita (penicillin G + silibinin), HSV (acyclovir), autoimmune (steroids), Wilson (chelation + exchange), pregnancy (delivery).',0:'<b>Specific Rx:</b> Mushroom (penicillin G + silibinin), HSV (acyclovir), autoimmune (steroids).'}},
{t:'ICU Management',q:'Critical supportive care measures in ALF?',h:'Prevent complications',o:[{id:'a',txt:'Head elevation, avoid sedation, lactulose for encephalopathy, treat hypoglycemia, PPI, correct coagulopathy only if bleeding',c:1,p:100},{id:'b',txt:'Aggressive FFP for all coagulopathy',c:0,p:30},{id:'c',txt:'Heavy sedation',c:0,p:10}],fb:{1:'<b>Correct!</b> ICU: Head elevation 30°, minimal sedation (need neuro exams), lactulose, correct hypoglycemia (impaired gluconeogenesis), PPI, correct coagulopathy only if bleeding/procedure (preserve prognostic value of INR).',0:'<b>ICU care:</b> Head up, avoid sedation, lactulose, treat hypoglycemia. Dont correct INR unless bleeding.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🫁 Liver in Crisis</h1><p style="color:var(--muted);margin-bottom:32px">Acute Liver Failure: Definition, causes, Kings College, cerebral edema, NAC</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🫁 Hepatic Emergency</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">ALF Clinical Pearls</div><div class="pearl-item"><b>Definition:</b> INR ≥1.5 + encephalopathy + no prior liver disease</div><div class="pearl-item"><b>US cause #1:</b> Acetaminophen (~50%)</div><div class="pearl-item"><b>NAC:</b> Give to ALL ALF patients regardless of cause</div><div class="pearl-item"><b>Cerebral edema:</b> Leading cause of death</div><div class="pearl-item"><b>Kings (APAP):</b> pH <7.30 alone = transplant evaluation</div><div class="pearl-item"><b>Dont correct INR:</b> Unless bleeding (preserves prognostic value)</div></div><div class="cross-link"><a href="apap-overdose-adventure-enhanced.html">Related: APAP Overdose</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
