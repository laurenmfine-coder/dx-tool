    <meta charset="UTF-8">

    <title>Subarachnoid Hemorrhage | Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e3a5f 0%, #0891b2 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(88, 28, 135, 0.9); border-radius: 16px; margin-bottom: 20px; }

        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #0891b2, #d8b4fe); border-radius: 3px; }

        .scene-header { background: rgba(147, 51, 234, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #d8b4fe; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(147,51,234,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }

        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }

    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','diagnosis','grading','aneurysm','rebleed','vasospasm','hydrocephalus','medical','outcomes','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">🧠 Subarachnoid Hemorrhage<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">The Worst Headache of My Life</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Time is brain: 1.9 million neurons die per minute in untreated stroke</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> When would you use tenecteplase over alteplase?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Wake-up stroke: DWI-FLAIR mismatch can extend treatment window</p>
                </div><div class="narrative"><p>A <span class="highlight">52-year-old woman</span> presents with <span class="critical">sudden severe headache</span> that started abruptly 3 hours ago while exercising. Describes it as "the worst headache of my life."</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 88, BP 178/102, T 99.4°F<br><strong>Exam:</strong> Photophobia, neck stiffness, mild confusion, no focal deficits<br><strong>GCS:</strong> 14 (E4V4M6)</p></div><div class="alert-box"><div class="alert-title">🚨 Thunderclap Headache = SAH Until Proven Otherwise!</div><p>"Worst headache of life" with sudden onset (seconds to minutes to max intensity) has ~25% chance of being SAH. Must rule out!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 SAH Causes</div><div class="pathway"><strong>Aneurysmal (85%):</strong><br>• Saccular aneurysm rupture<br>• Most common locations: AComm, PComm, MCA<br><br><strong>Non-aneurysmal:</strong><br>• Perimesencephalic (10%, benign)<br>• AVM<br>• Trauma<br>• Vasculitis<br>• Dural sinus thrombosis</div></div><button class="btn" onclick="nextStage()">Diagnosis →</button></div></div>`;
    };

    window.render_diagnosis = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">CT and LP</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> tPA window: 4.5 hours from last known well (with exclusion criteria)</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What's the role of endovascular therapy beyond 24 hours (DAWN/DEFUSE-3)?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Diagnostic Algorithm</div><table class="comparison-table"><tr><th>Step</th><th>Test</th><th>Notes</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>1</strong></td><td>Non-contrast CT head</td><td>95-100% sensitive within 6 hours; ↓ after</td></tr><tr><td><strong>2</strong></td><td>LP (if CT negative)</td><td>Xanthochromia, elevated RBCs (don't clear)</td></tr><tr><td><strong>3</strong></td><td>CTA or DSA</td><td>Find the aneurysm</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 CT Sensitivity Over Time</div><div class="pathway"><strong>CT sensitivity for SAH:</strong><br>• <6 hours: 95-100%<br>• 6-12 hours: ~95%<br>• 12-24 hours: ~90%<br>• >24 hours: ~85%<br>• Day 5+: ~50%<br><br>If CT negative but suspicion high → LP!<br><br><strong>LP findings:</strong><br>• Elevated opening pressure<br>• RBCs that don't clear (tube 1 ≈ tube 4)<br>• Xanthochromia (yellowish CSF from Hgb breakdown)</div></div><div class="alert-box"><div class="alert-title">⚠️ Xanthochromia Takes Time!</div><p>Develops 6-12 hours after SAH. LP too early may miss xanthochromia. But RBCs will be elevated.</p></div><button class="btn" onclick="nextStage()">Grading →</button></div></div>`;
    };

    window.render_grading = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">Severity Grading</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> NIHSS guides severity but don't let a low score delay treatment</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How do you manage stroke in a patient on anticoagulation?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Permissive HTN unless >220/120 (or >185/110 if tPA candidate)</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Hunt-Hess Grade (Clinical)</div><table class="comparison-table"><tr><th>Grade</th><th>Clinical Features</th><th>Mortality</th></tr><tr><td><strong>1</strong></td><td>Asymptomatic or mild headache</td><td>~1%</td></tr><tr><td><strong>2</strong></td><td>Moderate-severe headache, nuchal rigidity, CN palsy</td><td>~5%</td></tr><tr><td><strong>3</strong></td><td>Drowsy, confused, mild focal deficit</td><td>~19%</td></tr><tr><td><strong>4</strong></td><td>Stupor, moderate-severe hemiparesis</td><td>~42%</td></tr><tr><td><strong>5</strong></td><td>Coma, decerebrate posturing</td><td>~77%</td></tr></table></div><div class="boards-tip"><div class="boards-tip-title">📚 Fisher Grade (CT Blood Amount)</div><table class="comparison-table"><tr><th>Grade</th><th>CT Finding</th><th>Vasospasm Risk</th></tr><tr><td><strong>1</strong></td><td>No blood detected</td><td>Low</td></tr><tr><td><strong>2</strong></td><td>Diffuse thin (<1mm) SAH</td><td>Low</td></tr><tr><td><strong>3</strong></td><td>Localized clot or thick (>1mm) SAH</td><td>High</td></tr><tr><td><strong>4</strong></td><td>Intraventricular or intracerebral blood</td><td>Moderate</td></tr></table></div><button class="btn" onclick="nextStage()">Find the Aneurysm →</button></div></div>`;
    };

    window.render_aneurysm = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">Aneurysm Identification & Treatment</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Always check glucose - hypoglycemia can mimic stroke</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> When is permissive hypertension appropriate vs when should you treat BP?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Imaging for Aneurysm</div><table class="comparison-table"><tr><th>Modality</th><th>Sensitivity</th><th>Notes</th></tr><tr><td>CTA</td><td>95-98%</td><td>First-line, fast, widely available</td></tr><tr><td>DSA (angiogram)</td><td>99%+</td><td>Gold standard; required if CTA negative</td></tr><tr><td>MRA</td><td>85-95%</td><td>Non-invasive; less used acutely</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 Secure the Aneurysm Within 24-72 Hours!</div><p>Re-rupture risk is highest in first 24 hours (~4%) and days 7-10. Early treatment prevents devastating rebleeding.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Treatment Options</div><div class="pathway"><strong>Endovascular coiling:</strong><br>• Catheter-based coil deployment<br>• Less invasive<br>• Preferred for posterior circulation<br>• May need repeat treatment<br><br><strong>Surgical clipping:</strong><br>• Craniotomy, clip at neck<br>• More durable<br>• Preferred if hematoma to evacuate<br>• Certain anatomies favor clipping<br><br>ISAT trial: Coiling slightly better outcomes<br>at 1 year for anterior circulation</div></div><button class="btn" onclick="nextStage()">Prevent Rebleeding →</button></div></div>`;
    };

    window.render_rebleed = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">Rebleeding Prevention</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> CT head rules out hemorrhage before considering thrombolytics</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does posterior circulation stroke presentation differ?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Posterior stroke: vertigo, diplopia, ataxia - easily missed!</p>
                </div><div class="alert-box"><div class="alert-title">🚨 Rebleeding = Catastrophic!</div><p>Rebleed mortality is 50-80%. Prevention is critical until aneurysm is secured.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Measures to Prevent Rebleeding</div><table class="comparison-table"><tr><th>Intervention</th><th>Details</th></tr><tr><td><strong>Early aneurysm treatment</strong></td><td>Within 24-72 hours of presentation</td></tr><tr><td><strong>Blood pressure control</strong></td><td>SBP <160 until secured (avoid hypotension too)</td></tr><tr><td><strong>Avoid Valsalva</strong></td><td>Stool softeners, anti-emetics</td></tr><tr><td><strong>Bed rest</strong></td><td>Head of bed 30°, quiet environment</td></tr><tr><td><strong>Pain/anxiety control</strong></td><td>Reduces BP spikes</td></tr><tr><td><strong>Antifibrinolytics</strong></td><td>Tranexamic acid if delay to treatment (controversial)</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Antifibrinolytic Role</div><div class="pathway">Tranexamic acid or aminocaproic acid:<br>• Prevents clot breakdown<br>• ↓ Rebleed risk by ~40%<br>• BUT may ↑ vasospasm, DVT<br><br><strong>Current recommendations:</strong><br>Consider if delay to aneurysm treatment<br>Short-term use only (<72 hours)<br>Stop once aneurysm secured</div></div><button class="btn" onclick="nextStage()">Vasospasm →</button></div></div>`;
    };

    window.render_vasospasm = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">Delayed Cerebral Ischemia</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Large vessel occlusion = consider thrombectomy (extended window)</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> Discuss the role of dual antiplatelet therapy in minor stroke/TIA</p>
                </div><div class="alert-box"><div class="alert-title">🚨 Vasospasm Window: Days 3-14!</div><p>Peak incidence days 7-10. Leading cause of morbidity and mortality after initial bleed. Monitor closely!</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Vasospasm Prevention & Treatment</div><table class="comparison-table"><tr><th>Intervention</th><th>Details</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Nimodipine</strong></td><td>60 mg PO/NG q4h × 21 days - PROVEN to improve outcomes</td></tr><tr><td><strong>Euvolemia</strong></td><td>Avoid hypovolemia (no longer "triple H")</td></tr><tr><td><strong>TCD monitoring</strong></td><td>Daily transcranial Doppler; velocity >200 = severe spasm</td></tr><tr><td><strong>Induced hypertension</strong></td><td>If symptomatic DCI despite euvolemia</td></tr><tr><td><strong>Endovascular rescue</strong></td><td>Intra-arterial verapamil, balloon angioplasty</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Nimodipine Mechanism</div><div class="pathway"><strong>L-type calcium channel blocker:</strong><br>• Prevents calcium influx into neurons<br>• Neuroprotective effects<br>• Does NOT prevent angiographic vasospasm!<br>• But DOES improve outcomes<br><br><strong>Side effect:</strong> Hypotension<br>Can give 30 mg q2h if not tolerated<br><br>Continue full 21 days regardless of<br>whether vasospasm occurs</div></div><button class="btn" onclick="nextStage()">Hydrocephalus →</button></div></div>`;
    };

    window.render_hydrocephalus = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 10</div><div class="scene-title">Hydrocephalus</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Time is brain: 1.9 million neurons die per minute in untreated stroke</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> When would you use tenecteplase over alteplase?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Carotid dissection: young patient, neck pain, Horner syndrome</p>

// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
    
    // Auto-inject hint examples into existing content
    window.rdxInit = function() {
        // Could add dynamic hint injection here based on difficulty
        console.log('ReasonDx Enhanced Features loaded for: Sah Expanded Adventure');
    };
    
    // Initialize on load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.rdxInit);
    } else {
        window.rdxInit();
    }
})();
</script>
