<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Neglected Wound | ReasonDx Adventure</title>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --border: #334155; --text: #F1F5F9; --muted: #94A3B8; --accent: #F97316; --success: #10B981; --warning: #F59E0B; --danger: #DC2626; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
        .header { background: linear-gradient(135deg, #EA580C 0%, #F97316 100%); padding: 12px 20px; position: sticky; top: 0; z-index: 100; }
        .header-row { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .header-title { font-size: 1.1rem; font-weight: 600; }
        .stat { background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 8px; }
        .stat-value { font-size: 1.1rem; font-weight: 700; font-family: monospace; }
        .stat-label { font-size: 0.6rem; opacity: 0.8; text-transform: uppercase; }
        .main { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; }
        .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .card-phase { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
        .card-title { font-size: 1.5rem; font-weight: 700; }
        .card-body { padding: 24px; }
        .narrative { background: linear-gradient(135deg, rgba(249,115,22,0.1), rgba(234,88,12,0.1)); border-left: 4px solid var(--accent); padding: 20px 24px; border-radius: 0 12px 12px 0; margin-bottom: 24px; line-height: 1.8; }
        .narrative .hl { background: rgba(249,115,22,0.3); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .setup-screen { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; }
        .setup-screen h1 { font-size: 2rem; margin-bottom: 8px; }
        .setup-screen .subtitle { color: var(--muted); margin-bottom: 32px; }
        .start-btn { background: var(--accent); color: white; border: none; padding: 16px 48px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .question-section { margin-bottom: 32px; }
        .question-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .question-number { background: var(--accent); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .question-text { font-size: 1.1rem; font-weight: 600; }
        .radio-options { display: flex; flex-direction: column; gap: 10px; }
        .radio-option { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .radio-option:hover { border-color: var(--accent); }
        .radio-option.selected { border-color: var(--accent); background: rgba(249,115,22,0.15); }
        .radio-option.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .radio-option.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .radio-circle { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; }
        .radio-option.selected .radio-circle { border-color: var(--accent); background: radial-gradient(circle, var(--accent) 40%, transparent 40%); }
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .checkbox-item:hover { border-color: var(--accent); }
        .checkbox-item.selected { border-color: var(--accent); background: rgba(249,115,22,0.15); }
        .checkbox-item.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .checkbox-item.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .checkbox-box { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .checkbox-item.selected .checkbox-box { background: var(--accent); border-color: var(--accent); }
        .checkbox-item.selected .checkbox-box::after { content: '✓'; color: white; font-weight: bold; }
        .feedback { padding: 20px; border-radius: 12px; margin: 20px 0; }
        .feedback.excellent { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); }
        .feedback.acceptable { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); }
        .feedback-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .feedback-icon { font-size: 1.5rem; }
        .feedback-title { font-weight: 700; }
        .feedback-text { color: var(--muted); line-height: 1.7; }
        .feedback-text strong { color: var(--text); }
        .alert { padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; }
        .alert.info { background: rgba(249,115,22,0.15); border: 1px solid rgba(249,115,22,0.3); }
        .alert.danger { background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.3); }
        .alert-icon { font-size: 1.5rem; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: 600; margin-bottom: 4px; }
        .alert-desc { font-size: 0.9rem; color: var(--muted); }
        .btn { padding: 14px 28px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-row { display: flex; gap: 12px; margin-top: 24px; }
        .lab-panel { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .lab-panel-title { font-weight: 600; margin-bottom: 16px; color: var(--accent); }
        .lab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .lab-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; }
        .lab-name { font-size: 0.8rem; color: var(--muted); }
        .lab-value { font-size: 1.1rem; font-weight: 700; }
        .lab-value.critical { color: var(--danger); }
        .lab-value.high { color: var(--warning); }
        .lab-range { font-size: 0.7rem; color: var(--muted); }
        .outcome { text-align: center; padding: 40px 20px; }
        .outcome-icon { font-size: 4rem; margin-bottom: 16px; }
        .outcome-title { font-size: 2rem; font-weight: 700; color: var(--success); margin-bottom: 8px; }
        .outcome-desc { color: var(--muted); max-width: 600px; margin: 0 auto 24px; }
        .score-summary { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 24px; margin: 24px auto; max-width: 500px; }
        .score-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .score-row:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <header class="header"><div class="header-row"><div class="header-title">🦶 The Neglected Wound</div><div class="stat"><div class="stat-value" id="scoreDisplay">0</div><div class="stat-label">Points</div></div></div></header>
    <main class="main"><div id="stageContainer"></div></main>
    <script>
    const state = { stage:'setup', score:0 };
    
    function addScore(pts) { state.score += pts; document.getElementById('scoreDisplay').textContent = state.score; }

    const stages = {
        setup: { render: () => `
            <div class="setup-screen">
                <h1>🦶 The Neglected Wound</h1>
                <p class="subtitle">Diabetic foot infection management</p>
                <button class="start-btn" onclick="goTo('presentation')">Begin Case →</button>
            </div>`
        },
        presentation: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Emergency Department</div><div class="card-title">📋 Swollen Red Foot</div></div>
                <div class="card-body">
                    <div class="narrative">A <span class="hl">62-year-old male</span> with <span class="hl">poorly controlled T2DM</span> (HbA1c 10.2%), <span class="hl">peripheral neuropathy</span>, and <span class="hl">PAD</span> presents with a <span class="hl">2-week history of a non-healing foot ulcer</span> that has become increasingly red and swollen over the past 3 days.<br><br>On exam: <span class="hl">2cm plantar ulcer</span> over 1st metatarsal head with <span class="hl">purulent drainage</span>, <span class="hl">erythema extending 4cm</span> from wound edge, <span class="hl">probe-to-bone positive</span>, diminished DP/PT pulses. Foot is malodorous.<br><br>Vitals: Temp 38.4°C, HR 98, BP 142/88.</div>
                    <div class="lab-panel">
                        <div class="lab-panel-title">Laboratory Results</div>
                        <div class="lab-grid">
                            <div class="lab-item"><div class="lab-name">WBC</div><div class="lab-value high">16.8 K</div><div class="lab-range">4.5-11</div></div>
                            <div class="lab-item"><div class="lab-name">ESR</div><div class="lab-value high">82 mm/hr</div><div class="lab-range">&lt;20</div></div>
                            <div class="lab-item"><div class="lab-name">CRP</div><div class="lab-value high">124 mg/L</div><div class="lab-range">&lt;10</div></div>
                            <div class="lab-item"><div class="lab-name">Glucose</div><div class="lab-value high">312 mg/dL</div><div class="lab-range">70-100</div></div>
                            <div class="lab-item"><div class="lab-name">Creatinine</div><div class="lab-value">1.2 mg/dL</div><div class="lab-range">0.7-1.3</div></div>
                            <div class="lab-item"><div class="lab-name">HbA1c</div><div class="lab-value high">10.2%</div><div class="lab-range">&lt;5.7%</div></div>
                        </div>
                    </div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="goTo('severity')">Assess Severity →</button></div>
                </div>
            </div>`
        },
        severity: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Classification</div><div class="card-title">📊 IDSA/IWGDF Severity</div></div>
                <div class="card-body">
                    <div class="alert info"><span class="alert-icon">📋</span><div class="alert-content"><div class="alert-title">DFI Severity Classification</div><div class="alert-desc">Mild: Superficial, &lt;2cm erythema | Moderate: Deeper, &gt;2cm erythema, no systemic signs | Severe: Systemic toxicity or metabolic instability</div></div></div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">1</div><div class="question-text">With probe-to-bone positive, 4cm erythema, fever, and leukocytosis, what is the severity?</div></div>
                        <div class="radio-options" id="sevOpts">
                            <div class="radio-option" data-id="mild" onclick="selectSev('mild')"><div class="radio-circle"></div><span>Mild (outpatient oral antibiotics)</span></div>
                            <div class="radio-option" data-id="moderate" onclick="selectSev('moderate')"><div class="radio-circle"></div><span>Moderate (may need IV antibiotics)</span></div>
                            <div class="radio-option" data-id="severe" onclick="selectSev('severe')"><div class="radio-circle"></div><span>Severe (admission + IV antibiotics + surgery consult)</span></div>
                        </div>
                    </div>
                    <div id="sevFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="sevSubmit" onclick="submitSev()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        probebone: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Osteomyelitis</div><div class="card-title">🦴 Probe-to-Bone Test</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">2</div><div class="question-text">A positive probe-to-bone test (sterile metal probe reaches bone through ulcer) suggests:</div></div>
                        <div class="radio-options" id="ptbOpts">
                            <div class="radio-option" data-id="osteo" onclick="selectPTB('osteo')"><div class="radio-circle"></div><div><strong>High probability of osteomyelitis</strong><br><small style="color:var(--muted)">PPV ~90% in high-risk DFI</small></div></div>
                            <div class="radio-option" data-id="soft" onclick="selectPTB('soft')"><div class="radio-circle"></div><div><strong>Soft tissue infection only</strong><br><small style="color:var(--muted)">Bone not involved</small></div></div>
                            <div class="radio-option" data-id="unreliable" onclick="selectPTB('unreliable')"><div class="radio-circle"></div><div><strong>Test is unreliable</strong><br><small style="color:var(--muted)">Doesn't help diagnosis</small></div></div>
                        </div>
                    </div>
                    <div id="ptbFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="ptbSubmit" onclick="submitPTB()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        imaging: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Imaging</div><div class="card-title">📷 Diagnostic Studies</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">3</div><div class="question-text">What is the best imaging modality for diabetic foot osteomyelitis?</div></div>
                        <div class="radio-options" id="imgOpts">
                            <div class="radio-option" data-id="mri" onclick="selectImg('mri')"><div class="radio-circle"></div><div><strong>MRI</strong><br><small style="color:var(--muted)">Gold standard, best sensitivity/specificity</small></div></div>
                            <div class="radio-option" data-id="xray" onclick="selectImg('xray')"><div class="radio-circle"></div><div><strong>Plain X-ray alone</strong><br><small style="color:var(--muted)">First-line, but limited sensitivity</small></div></div>
                            <div class="radio-option" data-id="ct" onclick="selectImg('ct')"><div class="radio-circle"></div><div><strong>CT scan</strong><br><small style="color:var(--muted)">Better for bone detail</small></div></div>
                            <div class="radio-option" data-id="us" onclick="selectImg('us')"><div class="radio-circle"></div><div><strong>Ultrasound</strong><br><small style="color:var(--muted)">Good for soft tissue</small></div></div>
                        </div>
                    </div>
                    <div id="imgFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="imgSubmit" onclick="submitImg()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        microbiology: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Microbiology</div><div class="card-title">🦠 Common Pathogens</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">4</div><div class="question-text">Which organisms are commonly found in moderate-severe diabetic foot infections?</div></div>
                        <div class="checkbox-grid" id="microOpts">
                            <div class="checkbox-item" data-id="staph" data-correct="true" onclick="toggleMicro('staph')"><div class="checkbox-box"></div><span>S. aureus (including MRSA)</span></div>
                            <div class="checkbox-item" data-id="strep" data-correct="true" onclick="toggleMicro('strep')"><div class="checkbox-box"></div><span>Streptococci</span></div>
                            <div class="checkbox-item" data-id="gnr" data-correct="true" onclick="toggleMicro('gnr')"><div class="checkbox-box"></div><span>Gram-negative rods</span></div>
                            <div class="checkbox-item" data-id="anaerobes" data-correct="true" onclick="toggleMicro('anaerobes')"><div class="checkbox-box"></div><span>Anaerobes</span></div>
                            <div class="checkbox-item" data-id="pseudo" data-correct="true" onclick="toggleMicro('pseudo')"><div class="checkbox-box"></div><span>Pseudomonas</span></div>
                            <div class="checkbox-item" data-id="fungal" data-correct="false" onclick="toggleMicro('fungal')"><div class="checkbox-box"></div><span>Fungal (primary pathogen)</span></div>
                        </div>
                    </div>
                    <div id="microFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="submitMicro()">Submit →</button></div>
                </div>
            </div>`
        },
        antibiotics: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Treatment</div><div class="card-title">💊 Empiric Antibiotics</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">5</div><div class="question-text">For severe DFI with osteomyelitis, what empiric coverage is needed?</div></div>
                        <div class="radio-options" id="abxOpts">
                            <div class="radio-option" data-id="broad" onclick="selectAbx('broad')"><div class="radio-circle"></div><div><strong>Broad spectrum: MRSA + Gram-negatives + Anaerobes</strong><br><small style="color:var(--muted)">Vanc + pip-tazo or carbapenem</small></div></div>
                            <div class="radio-option" data-id="cephalex" onclick="selectAbx('cephalex')"><div class="radio-circle"></div><div><strong>Cephalexin alone</strong><br><small style="color:var(--muted)">First-gen cephalosporin</small></div></div>
                            <div class="radio-option" data-id="cipro" onclick="selectAbx('cipro')"><div class="radio-circle"></div><div><strong>Ciprofloxacin alone</strong><br><small style="color:var(--muted)">Covers Pseudomonas</small></div></div>
                            <div class="radio-option" data-id="vanco" onclick="selectAbx('vanco')"><div class="radio-circle"></div><div><strong>Vancomycin alone</strong><br><small style="color:var(--muted)">Covers MRSA</small></div></div>
                        </div>
                    </div>
                    <div id="abxFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="abxSubmit" onclick="submitAbx()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        outcome: { render: () => `
            <div class="card"><div class="card-body">
                <div class="outcome">
                    <div class="outcome-icon">🎉</div>
                    <div class="outcome-title">Limb Salvaged!</div>
                    <div class="outcome-desc">Patient was admitted and started on vancomycin + piperacillin-tazobactam. MRI confirmed osteomyelitis of the 1st metatarsal. Surgery performed debridement with bone biopsy confirming MRSA osteomyelitis. He received 6 weeks of IV antibiotics, wound care, and glycemic optimization. Limb was saved with eventual wound healing.</div>
                </div>
                <div class="score-summary">
                    <h3 style="margin-bottom:16px">Performance</h3>
                    <div class="score-row"><span>Severity Classification</span><span>${state.sevScore||0}/100</span></div>
                    <div class="score-row"><span>Probe-to-Bone</span><span>${state.ptbScore||0}/100</span></div>
                    <div class="score-row"><span>Imaging Selection</span><span>${state.imgScore||0}/100</span></div>
                    <div class="score-row"><span>Microbiology</span><span>${state.microScore||0}/100</span></div>
                    <div class="score-row"><span>Antibiotic Coverage</span><span>${state.abxScore||0}/100</span></div>
                    <div class="score-row" style="border-top:2px solid var(--border);padding-top:12px"><strong>Total</strong><strong>${state.score}</strong></div>
                </div>
                <div class="feedback excellent"><div class="feedback-header"><span class="feedback-icon">💡</span><span class="feedback-title">DFI Pearls</span></div><div class="feedback-text">
                    • <strong>Severity:</strong> Mild (&lt;2cm erythema, superficial) | Moderate (&gt;2cm, deeper) | Severe (systemic signs, metabolic instability)<br>
                    • <strong>Probe-to-bone:</strong> If positive in high-risk DFI, PPV ~90% for osteomyelitis<br>
                    • <strong>MRI:</strong> Gold standard for osteomyelitis (Sens 90%, Spec 80%); X-ray changes take 2-4 weeks<br>
                    • <strong>Polymicrobial:</strong> Moderate-severe DFI often has Staph + Strep + GNR + Anaerobes<br>
                    • <strong>Severe DFI abx:</strong> MRSA coverage (vanc/dapto/linezolid) + GNR + Anaerobes (pip-tazo, carbapenem)<br>
                    • <strong>Osteomyelitis duration:</strong> 4-6 weeks if bone remains; can shorten if complete resection<br>
                    • <strong>Surgery:</strong> Consult for debridement, assess for abscess, evaluate for revascularization<br>
                    • <strong>Multidisciplinary:</strong> ID, surgery, vascular, wound care, endocrine, orthotics
                </div></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="location.reload()">Play Again</button></div>
            </div></div>`
        }
    };

    let selectedSev = null;
    function selectSev(id) { selectedSev = id; document.querySelectorAll('#sevOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('sevSubmit').disabled = false; }
    function submitSev() {
        document.querySelectorAll('#sevOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'severe') o.classList.add('correct');
            else if (o.dataset.id === selectedSev) o.classList.add('incorrect');
        });
        state.sevScore = selectedSev === 'severe' ? 100 : 40;
        addScore(selectedSev === 'severe' ? 40 : 15);
        document.getElementById('sevFeedback').innerHTML = `<div class="feedback ${selectedSev==='severe'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedSev==='severe'?'✅':'📚'}</span><span class="feedback-title">${selectedSev==='severe'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>Severe DFI:</strong> Systemic signs present (fever 38.4°C, leukocytosis 16.8K). Plus probe-to-bone suggests osteomyelitis. Requires admission, IV antibiotics, and surgical evaluation.</div></div>`;
        document.getElementById('sevSubmit').textContent = 'Continue →';
        document.getElementById('sevSubmit').onclick = () => goTo('probebone');
    }

    let selectedPTB = null;
    function selectPTB(id) { selectedPTB = id; document.querySelectorAll('#ptbOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('ptbSubmit').disabled = false; }
    function submitPTB() {
        document.querySelectorAll('#ptbOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'osteo') o.classList.add('correct');
            else if (o.dataset.id === selectedPTB) o.classList.add('incorrect');
        });
        state.ptbScore = selectedPTB === 'osteo' ? 100 : 40;
        addScore(selectedPTB === 'osteo' ? 40 : 15);
        document.getElementById('ptbFeedback').innerHTML = `<div class="feedback ${selectedPTB==='osteo'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedPTB==='osteo'?'✅':'📚'}</span><span class="feedback-title">${selectedPTB==='osteo'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>Probe-to-bone:</strong> In high-prevalence setting (infected DFU), positive PTB has ~90% PPV for osteomyelitis. Simple, bedside test. If positive, presume osteo until proven otherwise.</div></div>`;
        document.getElementById('ptbSubmit').textContent = 'Continue →';
        document.getElementById('ptbSubmit').onclick = () => goTo('imaging');
    }

    let selectedImg = null;
    function selectImg(id) { selectedImg = id; document.querySelectorAll('#imgOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('imgSubmit').disabled = false; }
    function submitImg() {
        document.querySelectorAll('#imgOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'mri') o.classList.add('correct');
            else if (o.dataset.id === selectedImg) o.classList.add('incorrect');
        });
        state.imgScore = selectedImg === 'mri' ? 100 : (selectedImg === 'xray' ? 50 : 30);
        addScore(selectedImg === 'mri' ? 40 : (selectedImg === 'xray' ? 20 : 10));
        document.getElementById('imgFeedback').innerHTML = `<div class="feedback ${selectedImg==='mri'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedImg==='mri'?'✅':'📚'}</span><span class="feedback-title">${selectedImg==='mri'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>MRI is gold standard:</strong> Sensitivity ~90%, specificity ~80% for osteomyelitis. X-ray is first-line but changes take 2-4 weeks to appear (30-50% bone loss needed). Always get X-ray first, then MRI if osteo suspected.</div></div>`;
        document.getElementById('imgSubmit').textContent = 'Continue →';
        document.getElementById('imgSubmit').onclick = () => goTo('microbiology');
    }

    let selectedMicro = new Set();
    function toggleMicro(id) {
        const el = document.querySelector(`#microOpts .checkbox-item[data-id="${id}"]`);
        if(selectedMicro.has(id)) { selectedMicro.delete(id); el.classList.remove('selected'); }
        else { selectedMicro.add(id); el.classList.add('selected'); }
    }
    function submitMicro() {
        let correct = 0;
        const items = [{id:'staph',c:true},{id:'strep',c:true},{id:'gnr',c:true},{id:'anaerobes',c:true},{id:'pseudo',c:true},{id:'fungal',c:false}];
        items.forEach(i => {
            const el = document.querySelector(`#microOpts .checkbox-item[data-id="${i.id}"]`);
            const sel = selectedMicro.has(i.id);
            if (i.c && sel) { el.classList.add('correct'); correct++; }
            else if (!i.c && sel) { el.classList.add('incorrect'); }
        });
        state.microScore = Math.round(correct / 5 * 100);
        addScore(Math.round(state.microScore / 2.5));
        document.getElementById('microFeedback').innerHTML = `<div class="feedback ${state.microScore>=75?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${state.microScore>=75?'✅':'📚'}</span><span class="feedback-title">DFI Microbiology</span></div><div class="feedback-text"><strong>Moderate-severe DFI is polymicrobial:</strong> S. aureus (MRSA in 20-50%), Streptococci, Enterobacteriaceae, Pseudomonas (especially wet/macerated wounds), Anaerobes (necrotic/gangrenous). Fungal rarely primary pathogen.</div></div>`;
        document.querySelector('#microFeedback').closest('.card-body').querySelector('.btn-row').innerHTML = `<button class="btn btn-primary" onclick="goTo('antibiotics')">Select Antibiotics →</button>`;
    }

    let selectedAbx = null;
    function selectAbx(id) { selectedAbx = id; document.querySelectorAll('#abxOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('abxSubmit').disabled = false; }
    function submitAbx() {
        document.querySelectorAll('#abxOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'broad') o.classList.add('correct');
            else if (o.dataset.id === selectedAbx) o.classList.add('incorrect');
        });
        state.abxScore = selectedAbx === 'broad' ? 100 : 30;
        addScore(selectedAbx === 'broad' ? 40 : 10);
        document.getElementById('abxFeedback').innerHTML = `<div class="feedback ${selectedAbx==='broad'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedAbx==='broad'?'✅':'📚'}</span><span class="feedback-title">${selectedAbx==='broad'?'Correct!':'Critical Point'}</span></div><div class="feedback-text"><strong>Severe DFI needs broad coverage:</strong> MRSA (vanc/dapto/linezolid) + Gram-negatives including Pseudomonas + Anaerobes. Common regimens: Vanc + pip-tazo, or Vanc + cefepime + metronidazole, or Vanc + carbapenem.</div></div>`;
        document.getElementById('abxSubmit').textContent = 'Complete →';
        document.getElementById('abxSubmit').onclick = () => goTo('outcome');
    }

    function goTo(id) { state.stage = id; document.getElementById('stageContainer').innerHTML = stages[id].render(); window.scrollTo(0,0); }
    document.addEventListener('DOMContentLoaded', () => goTo('setup'));
    </script>
</body>
</html>
