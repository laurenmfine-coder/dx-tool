<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Diabetic Foot | ReasonDx Adventure</title><style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#F97316;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#EA580C,#F97316);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(249,115,22,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(249,115,22,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(249,115,22,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#FDBA74;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style></head><body><header class="header"><div class="header-row"><div style="font-weight:600">🦶 Diabetic Foot</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header><main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};const C={easy:{age:'62yo M',wt:'95kg',hx:'DM2 x15yr, foot ulcer x2 weeks, purulent drainage, mild erythema',exam:'2cm ulcer plantar 1st MTP, superficial, <2cm erythema, no crepitus',vitals:{HR:'82',BP:'138/82',Temp:'99.2°F',SpO2:'98%'},labs:{WBC:'11k',Gluc:'245',HbA1c:'8.9%','X-ray':'No osteo'}},int:{age:'58yo F',wt:'88kg',hx:'DM2 poorly controlled, deep ulcer probing to bone, spreading cellulitis',exam:'4cm ulcer with exposed tendon, 5cm erythema, palpable dorsalis pedis',vitals:{HR:'98',BP:'145/88',Temp:'101.2°F',SpO2:'96%'},labs:{WBC:'16k',ESR:'85',CRP:'12','X-ray':'Periosteal reaction'}},adv:{age:'68yo M',wt:'102kg',hx:'Known PAD, gangrenous toes, septic, foul odor, crepitus',exam:'Necrotic toes, crepitus, absent pulses, severe sepsis',vitals:{HR:'118',BP:'92/58',Temp:'103.5°F',SpO2:'91%'},labs:{WBC:'22k',Lactate:'4.2','X-ray':'Gas in soft tissue',Hx:'Wet gangrene + sepsis'}}};
const Q=[{t:'Classification',q:'IDSA classification of diabetic foot infections?',h:'Severity grading',o:[{id:'a',txt:'Mild: Superficial, <2cm erythema. Moderate: Deeper or >2cm erythema. Severe: Systemic signs/sepsis',c:1,p:100},{id:'b',txt:'All are severe',c:0,p:20},{id:'c',txt:'Size only matters',c:0,p:20}],fb:{1:'<b>Correct!</b> IDSA: Uninfected (no purulence/inflammation). Mild: Local, superficial, <2cm. Moderate: Deeper (abscess, osteo) or >2cm cellulitis. Severe: SIRS/sepsis.',0:'<b>IDSA:</b> Mild (<2cm superficial), Moderate (deeper/>2cm), Severe (systemic).'}},{t:'Probe to Bone',q:'Significance of probe-to-bone test in diabetic foot?',h:'Osteomyelitis detection',o:[{id:'a',txt:'Positive probe-to-bone has high PPV (~90%) for osteomyelitis in high-risk ulcers; MRI confirms',c:1,p:100},{id:'b',txt:'Not useful',c:0,p:20},{id:'c',txt:'Always means surgery',c:0,p:20}],fb:{1:'<b>Correct!</b> Probe-to-bone: PPV ~87% for osteo in infected ulcers. If positive + high pretest probability = treat for osteo. MRI is gold standard imaging. Bone biopsy for culture.',0:'<b>Probe-to-bone:</b> High PPV for osteo. Confirm with MRI.'}},{t:'Imaging',q:'Best imaging for diabetic foot osteomyelitis?',h:'Sensitivity comparison',o:[{id:'a',txt:'MRI is most sensitive/specific; X-ray first (low sensitivity but specific), bone scan if MRI contraindicated',c:1,p:100},{id:'b',txt:'X-ray always sufficient',c:0,p:30},{id:'c',txt:'CT scan preferred',c:0,p:20}],fb:{1:'<b>Correct!</b> X-ray first: Low sensitivity (may take 2-4wk to see changes) but specific. MRI: 90% sensitive, 80% specific. Changes on X-ray: Periosteal reaction, cortical erosion.',0:'<b>Imaging:</b> X-ray first, MRI most sensitive for osteo.'}},{t:'Microbiology',q:'Common pathogens in diabetic foot infections?',h:'Coverage targets',o:[{id:'a',txt:'Mild: Gram-positive (Staph, Strep). Moderate/severe: Add gram-negatives, anaerobes, Pseudomonas',c:1,p:100},{id:'b',txt:'Pseudomonas only',c:0,p:20},{id:'c',txt:'Fungal always',c:0,p:20}],fb:{1:'<b>Correct!</b> Mild: S. aureus, Strep. Chronic/severe: Polymicrobial (GNR, anaerobes). Pseudomonas if water exposure, macerated. MRSA risk: Prior MRSA, severe, failed therapy.',0:'<b>Pathogens:</b> Mild = Gram+. Severe = polymicrobial.'}},{t:'Antibiotic Selection',q:'Empiric antibiotics for moderate-severe diabetic foot infection?',h:'Broad coverage',o:[{id:'a',txt:'Broad spectrum: Pip-tazo, ampicillin-sulbactam, or carbapenem. Add vancomycin for MRSA risk.',c:1,p:100},{id:'b',txt:'Oral cephalexin',c:0,p:20},{id:'c',txt:'No antibiotics needed',c:0,p:10}],fb:{1:'<b>Correct!</b> Moderate: Amp-sulbactam, pip-tazo, or ertapenem. Add vanc if MRSA risk. Mild: Oral abx (cephalexin, augmentin, clinda). Culture wound before abx. Duration: 1-2wk soft tissue, 4-6wk osteo.',0:'<b>Moderate-severe:</b> Broad coverage (pip-tazo, amp-sulbactam) ± vanc.'}},{t:'Surgical Indications',q:'When is surgical intervention required in diabetic foot infection?',h:'Urgent debridement',o:[{id:'a',txt:'Abscess, necrotizing infection, gas gangrene, osteomyelitis with sequestrum, compartment syndrome',c:1,p:100},{id:'b',txt:'Never needed',c:0,p:10},{id:'c',txt:'All infections',c:0,p:20}],fb:{1:'<b>Correct!</b> Urgent surgery: Abscess drainage, nec fasc, gas gangrene, severe osteo, critical limb ischemia. Debridement improves antibiotic penetration. May need amputation if limb-threatening.',0:'<b>Surgery:</b> Abscess, nec fasc, gangrene, severe osteo.'}},{t:'Vascular Assessment',q:'Why is vascular assessment critical in diabetic foot?',h:'PAD prevalence',o:[{id:'a',txt:'PAD common in DM; inadequate perfusion impairs healing and increases amputation risk. Check ABI, consider revascularization.',c:1,p:100},{id:'b',txt:'Not important',c:0,p:10},{id:'c',txt:'Always amputate',c:0,p:10}],fb:{1:'<b>Correct!</b> PAD in 50% of DFI. Check pulses, ABI (may be falsely elevated due to calcification), toe pressures. Revascularization before/with wound care if critical limb ischemia.',0:'<b>Vascular:</b> PAD common, check ABI, consider revasc.'}},{t:'Osteomyelitis Treatment',q:'Duration of antibiotics for diabetic foot osteomyelitis?',h:'Bone infection duration',o:[{id:'a',txt:'4-6 weeks if no surgery; can shorten to 2-4 weeks if bone resected with clean margins',c:1,p:100},{id:'b',txt:'3 days',c:0,p:10},{id:'c',txt:'Lifelong',c:0,p:10}],fb:{1:'<b>Correct!</b> DFO duration: 4-6wk medical therapy. If complete resection with clean margins: 2-4wk. Culture bone (not swab) to guide therapy. Follow inflammatory markers.',0:'<b>DFO:</b> 4-6wk abx, shorter if surgically resected.'}}];
let sel=null;function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}function start(){S.q=1;S.stage='question';render();}function go(s){S.stage=s;render();}function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🦶 Diabetic Foot</h1><p style="color:var(--muted);margin-bottom:32px">Diabetic Foot Infection: Classification, osteo workup, antibiotics, surgery</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🦶 Foot Ulcer</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Diabetic Foot Pearls</div><div class="pearl-item"><b>IDSA:</b> Mild <2cm, Moderate deeper/>2cm, Severe systemic</div><div class="pearl-item"><b>Probe-to-bone:</b> High PPV for osteo</div><div class="pearl-item"><b>Imaging:</b> X-ray first, MRI most sensitive</div><div class="pearl-item"><b>Coverage:</b> Mild Gram+, Severe polymicrobial</div><div class="pearl-item"><b>Osteo duration:</b> 4-6 weeks (shorter if resected)</div><div class="pearl-item"><b>Vascular:</b> Always assess - PAD common</div></div><div class="cross-link"><a href="cellulitis-adventure-enhanced.html">Related: Cellulitis</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}document.addEventListener('DOMContentLoaded',render);</script></body></html>
