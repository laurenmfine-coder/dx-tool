<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acute Liver Failure | Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #713f12 0%, #ca8a04 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(113, 63, 18, 0.9); border-radius: 16px; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; background: #ca8a04; margin-left: 10px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ca8a04, #fde047); border-radius: 3px; }
        .scene { background: linear-gradient(135deg, #713f12, #854d0e); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .scene-header { background: rgba(202, 138, 4, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #fde047; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(202,138,4,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #ca8a04, #854d0e); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #fde047; }
        .why-chain { background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(202,138,4,0.15)); border: 1px solid rgba(139,92,246,0.3); border-radius: 16px; padding: 24px; margin: 24px 0; }
        .why-chain-title { font-size: 1.2rem; font-weight: 700; color: #c4b5fd; margin-bottom: 20px; }
        .why-item { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
        .why-q { font-weight: 600; color: #e9d5ff; margin-bottom: 10px; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','definition','etiology','workup','nac','encephalopathy','coagulopathy','cerebral_edema','kings','transplant','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">🫁 Acute Liver Failure<span class="badge">11 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 11</div><div class="scene-title">Confusion and Jaundice</div></div><div class="scene-body"><div class="narrative"><p>A <span class="highlight">32-year-old woman</span> presents with <span class="critical">confusion, jaundice, and RUQ pain</span> × 3 days. Found empty acetaminophen bottles at home. Reports taking "a lot" for headache over past week.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 105, BP 92/58, T 99.8°F<br><strong>Exam:</strong> Jaundiced, asterixis, confused (oriented ×1), mild RUQ tenderness<br><strong>Labs:</strong> AST 8,450, ALT 9,200, T.bili 8.4, INR 4.2, Cr 2.8, pH 7.28, Lactate 6.1</p></div><div class="alert-box"><div class="alert-title">🚨 Acute Liver Failure = Life-Threatening Emergency!</div><p>This patient has coagulopathy (INR >1.5) + encephalopathy + acute liver injury. Mortality without transplant can exceed 80%. Contact transplant center immediately!</p></div><button class="btn" onclick="nextStage()">Definition →</button></div></div>`;
    };

    window.render_definition = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 11</div><div class="scene-title">What Is ALF?</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Acute Liver Failure Definition</div><ul style="margin-left:20px;line-height:2;"><li>Severe acute liver injury (markedly elevated AST/ALT)</li><li><strong>Coagulopathy</strong> (INR ≥1.5)</li><li><strong>Hepatic encephalopathy</strong></li><li>No prior liver disease</li><li>Illness duration <26 weeks</li></ul></div><div class="mechanism-box"><div class="mechanism-title">🧬 Classification by Onset</div><div class="pathway"><strong>Hyperacute:</strong> 0-7 days<br>• Acetaminophen, viral hepatitis, ischemia<br>• Better prognosis (often spontaneous recovery)<br>• Higher cerebral edema risk<br><br><strong>Acute:</strong> 8-28 days<br>• Mixed causes<br><br><strong>Subacute:</strong> 29 days - 26 weeks<br>• Drug reactions, autoimmune, Wilson's<br>• Worse prognosis without transplant<br>• Less cerebral edema</div></div><button class="btn" onclick="nextStage()">Etiology →</button></div></div>`;
    };

    window.render_etiology = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 11</div><div class="scene-title">What Caused It?</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Causes of ALF</div><table class="comparison-table"><tr><th>Cause</th><th>Frequency</th><th>Key Features</th></tr><tr style="background:rgba(239,68,68,0.2);"><td><strong>Acetaminophen</strong></td><td>~50% in US</td><td>Very high AST/ALT (>3500), low bilirubin early</td></tr><tr><td>Drug-induced (non-APAP)</td><td>~12%</td><td>Antibiotics, anticonvulsants, herbals</td></tr><tr><td>Viral hepatitis</td><td>~10%</td><td>Hep A, B, E; rarely C</td></tr><tr><td>Autoimmune hepatitis</td><td>~5%</td><td>ANA, ASMA positive; may need biopsy</td></tr><tr><td>Ischemic hepatitis</td><td>~5%</td><td>"Shock liver"; AST/ALT >1000, rapid rise/fall</td></tr><tr><td>Wilson disease</td><td>~3%</td><td>Young patient, Coombs-negative hemolysis</td></tr><tr><td>Budd-Chiari</td><td>Rare</td><td>Hepatic vein thrombosis</td></tr><tr><td>Indeterminate</td><td>~15%</td><td>No cause found despite workup</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ AST/ALT >1000 Differential</div><p><strong>"VITA":</strong> Viral, Ischemic, Toxin (APAP), Autoimmune. These cause the "1000s" pattern. Alcoholic hepatitis rarely exceeds 300-500.</p></div><button class="btn" onclick="nextStage()">Workup →</button></div></div>`;
    };

    window.render_workup = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 11</div><div class="scene-title">Diagnostic Evaluation</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Essential Workup</div><table class="comparison-table"><tr><th>Test</th><th>Purpose</th></tr><tr><td>Acetaminophen level</td><td>Even if denied; can be undetectable late</td></tr><tr><td>Viral hepatitis serologies</td><td>HAV IgM, HBsAg, HBc IgM, HCV, HEV</td></tr><tr><td>Autoimmune markers</td><td>ANA, ASMA, IgG levels</td></tr><tr><td>Ceruloplasmin, serum copper</td><td>Wilson disease (if <40 years old)</td></tr><tr><td>Pregnancy test</td><td>HELLP, acute fatty liver of pregnancy</td></tr><tr><td>Doppler ultrasound</td><td>Budd-Chiari (hepatic vein thrombosis)</td></tr><tr><td>Blood gas, lactate</td><td>Prognosis, metabolic status</td></tr><tr><td>Factor V level</td><td>Synthetic function (not corrected by FFP)</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Wilson Disease Clues</div><div class="pathway">Consider in ALF with:<br>• Age <40<br>• Coombs-NEGATIVE hemolytic anemia<br>• Markedly elevated bilirubin<br>• Alk phos:T.bili ratio <4<br>• AST:ALT ratio >2<br>• Low uric acid<br><br>Ceruloplasmin may be falsely low in ALF<br>KF rings present in ~50% with liver disease</div></div><button class="btn" onclick="nextStage()">N-Acetylcysteine →</button></div></div>`;
    };

    window.render_nac = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 11</div><div class="scene-title">N-Acetylcysteine (NAC)</div></div><div class="scene-body"><div class="alert-box"><div class="alert-title">🚨 Give NAC to ALL ALF Patients!</div><p>NAC is standard of care for acetaminophen toxicity AND improves outcomes in non-acetaminophen ALF. Start it while you figure out the cause.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 NAC Protocol (21-hour IV)</div><table class="comparison-table"><tr><th>Phase</th><th>Dose</th><th>Duration</th></tr><tr><td>Loading</td><td>150 mg/kg in D5W 200 mL</td><td>1 hour</td></tr><tr><td>Dose 2</td><td>50 mg/kg in D5W 500 mL</td><td>4 hours</td></tr><tr><td>Dose 3</td><td>100 mg/kg in D5W 1000 mL</td><td>16 hours</td></tr></table><p style="margin-top:12px;">Continue until INR <2, encephalopathy resolved, or transplant</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 How NAC Works</div><div class="pathway"><strong>Acetaminophen toxicity:</strong><br>• Replenishes glutathione<br>• Detoxifies NAPQI (toxic metabolite)<br><br><strong>Non-APAP ALF:</strong><br>• Improves microcirculatory flow<br>• Increases oxygen delivery<br>• Scavenges free radicals<br><br>Studies show improved transplant-free<br>survival even in non-APAP ALF!</div></div><button class="btn" onclick="nextStage()">Encephalopathy →</button></div></div>`;
    };

    window.render_encephalopathy = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 11</div><div class="scene-title">Hepatic Encephalopathy</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 West Haven Criteria</div><table class="comparison-table"><tr><th>Grade</th><th>Features</th></tr><tr><td><strong>1</strong></td><td>Mild confusion, sleep disturbance, asterixis may be present</td></tr><tr><td><strong>2</strong></td><td>Lethargy, moderate confusion, asterixis present</td></tr><tr><td><strong>3</strong></td><td>Somnolent but arousable, marked confusion, asterixis if cooperative</td></tr><tr><td><strong>4</strong></td><td>Coma, unresponsive to pain</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Management</div><div class="pathway"><strong>Grade 1-2:</strong><br>• Lactulose (target 2-3 BM/day)<br>• Rifaximin (if chronic, less evidence in ALF)<br>• Avoid sedatives<br>• Monitor closely for progression<br><br><strong>Grade 3-4:</strong><br>• ICU admission<br>• Consider intubation for airway protection<br>• Head of bed 30°<br>• Avoid hypoglycemia, hyponatremia<br>• ICP monitoring if high-risk<br><br>Ammonia level does NOT guide management</div></div><div class="alert-box"><div class="alert-title">⚠️ Encephalopathy ≠ Cerebral Edema</div><p>In ALF, encephalopathy can progress to cerebral edema (unlike cirrhosis). Grade 3-4 encephalopathy = high risk of cerebral edema and herniation.</p></div><button class="btn" onclick="nextStage()">Coagulopathy →</button></div></div>`;
    };

    window.render_coagulopathy = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 11</div><div class="scene-title">Managing Coagulopathy</div></div><div class="scene-body"><div class="alert-box"><div class="alert-title">⚠️ Don't Reflexively Correct INR!</div><p>INR is a PROGNOSTIC marker. Correcting it obscures trend and doesn't prevent bleeding (balanced hemostasis). Only give products if actively bleeding or before procedures.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Coagulopathy Management</div><table class="comparison-table"><tr><th>Scenario</th><th>Management</th></tr><tr><td>No bleeding, no procedures</td><td>Observe; do NOT give FFP/vitamin K routinely</td></tr><tr><td>Active bleeding</td><td>FFP, platelets, cryoprecipitate as needed</td></tr><tr><td>Pre-procedure (lines, LP)</td><td>FFP ± platelets; consider rFVIIa</td></tr><tr><td>Vitamin K deficiency suspected</td><td>Vitamin K 10 mg IV (slow, not IM)</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Balanced Hemostasis?</div><div class="pathway">Liver makes BOTH:<br>• Pro-coagulant factors (II, V, VII, IX, X)<br>• Anti-coagulant factors (Protein C, S, AT)<br><br>In ALF, BOTH are decreased<br>→ "Rebalanced" hemostasis<br>→ Risk of bleeding AND thrombosis!<br><br>INR reflects pro-coagulant factors only<br>→ Overestimates bleeding risk<br><br>VTE prophylaxis is still recommended!</div></div><button class="btn" onclick="nextStage()">Cerebral Edema →</button></div></div>`;
    };

    window.render_cerebral_edema = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 11</div><div class="scene-title">Cerebral Edema & ICP</div></div><div class="scene-body"><div class="alert-box"><div class="alert-title">🚨 Leading Cause of Death in ALF!</div><p>Cerebral edema occurs in ~25-35% of ALF. Risk increases with grade 3-4 encephalopathy, ammonia >150, and hyperacute presentation.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Signs of Elevated ICP</div><ul style="margin-left:20px;line-height:1.8;"><li>Systemic hypertension</li><li>Bradycardia (Cushing reflex)</li><li>Pupillary changes</li><li>Decerebrate/decorticate posturing</li><li>Loss of brainstem reflexes</li></ul></div><div class="mechanism-box"><div class="mechanism-title">🧬 ICP Management</div><div class="pathway"><strong>Prevention:</strong><br>• Head of bed 30°<br>• Avoid hyperthermia (target 35-36°C)<br>• Avoid hyponatremia (keep Na 145-150)<br>• Avoid hypoxia, hypercarbia<br>• Minimize stimulation<br><br><strong>Treatment of elevated ICP:</strong><br>• Mannitol 0.5-1 g/kg bolus<br>• Hypertonic saline (23.4% or 3%)<br>• Hyperventilation (temporary bridge)<br>• Propofol or barbiturate coma<br><br><strong>ICP monitoring:</strong><br>Controversial; consider if grade 3-4<br>encephalopathy awaiting transplant</div></div><button class="btn" onclick="nextStage()">King's College Criteria →</button></div></div>`;
    };

    window.render_kings = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 11</div><div class="scene-title">Prognostic Criteria</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 King's College Criteria - BOARDS FAVORITE</div><div style="margin-bottom:16px;"><strong>ACETAMINOPHEN ALF:</strong></div><table class="comparison-table"><tr><th colspan="2">Transplant indicated if:</th></tr><tr><td colspan="2">pH <7.30 after resuscitation<br><strong>OR all three of:</strong></td></tr><tr><td>INR >6.5</td><td>AND</td></tr><tr><td>Creatinine >3.4</td><td>AND</td></tr><tr><td>Grade 3-4 encephalopathy</td><td></td></tr></table><div style="margin:16px 0;"><strong>NON-ACETAMINOPHEN ALF:</strong></div><table class="comparison-table"><tr><th colspan="2">Transplant indicated if:</th></tr><tr><td colspan="2">INR >6.5 (regardless of encephalopathy grade)<br><strong>OR any three of:</strong></td></tr><tr><td>Age <10 or >40</td><td></td></tr><tr><td>Non-A, non-B hepatitis, drug reaction</td><td></td></tr><tr><td>Jaundice >7 days before encephalopathy</td><td></td></tr><tr><td>INR >3.5</td><td></td></tr><tr><td>Bilirubin >17.5 mg/dL</td><td></td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Other Prognostic Markers</div><div class="pathway"><strong>Poor prognosis indicators:</strong><br>• Factor V <20% (age <30) or <30% (age >30)<br>• Lactate >3.5 after resuscitation<br>• MELD score >30<br>• Ammonia >200 μmol/L<br>• Phosphate >1.2 mmol/L (day 2-3)<br><br><strong>Better prognosis:</strong><br>• APAP overdose (vs other causes)<br>• Hyperacute presentation<br>• Younger age</div></div><button class="btn" onclick="nextStage()">Transplant →</button></div></div>`;
    };

    window.render_transplant = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 10 of 11</div><div class="scene-title">Liver Transplantation</div></div><div class="scene-body"><div class="alert-box"><div class="alert-title">🚨 Contact Transplant Center EARLY!</div><p>Transfer should be considered at first sign of encephalopathy. Don't wait for King's criteria to be met - patient may become too sick to transfer.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Transplant Contraindications</div><table class="comparison-table"><tr><th>Absolute</th><th>Relative</th></tr><tr><td>Uncontrolled sepsis</td><td>Age >65-70</td></tr><tr><td>Severe cardiopulmonary disease</td><td>Morbid obesity</td></tr><tr><td>Extrahepatic malignancy</td><td>HIV (if uncontrolled)</td></tr><tr><td>Active substance abuse</td><td>Poor social support</td></tr><tr><td>Irreversible brain injury</td><td>Psychiatric illness</td></tr><tr><td>Severe irreversible neurologic damage</td><td></td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Bridge Therapies</div><div class="pathway">While awaiting transplant:<br><br><strong>Supportive care:</strong><br>• NAC continuation<br>• ICP management<br>• Vasopressors if needed<br>• Renal replacement therapy (CVVHD)<br>• Stress ulcer prophylaxis<br><br><strong>Liver support devices:</strong><br>• MARS (molecular adsorbent)<br>• Prometheus<br>• Limited evidence; bridge only<br><br><strong>Outcomes:</strong><br>1-year survival post-transplant: ~80%<br>Without transplant if criteria met: ~20%</div></div><button class="btn" onclick="nextStage()">Debrief →</button></div></div>`;
    };

    window.render_debrief = function() {
        return `<div class="scene"><div style="text-align:center;padding:40px;"><div style="font-size:4rem;margin-bottom:12px;">🫁</div><div style="font-size:1.8rem;font-weight:700;color:#4ade80;">Acute Liver Failure Mastery!</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 High-Yield Summary</div><table class="comparison-table"><tr><th>Concept</th><th>Key Point</th></tr><tr><td>Definition</td><td>Coagulopathy (INR ≥1.5) + encephalopathy + no prior liver disease</td></tr><tr><td>#1 Cause (US)</td><td>Acetaminophen (~50%)</td></tr><tr><td>NAC</td><td>Give to ALL ALF patients (APAP and non-APAP)</td></tr><tr><td>INR</td><td>Don't correct unless bleeding/procedure</td></tr><tr><td>King's (APAP)</td><td>pH <7.3 OR (INR >6.5 + Cr >3.4 + Grade 3-4 HE)</td></tr><tr><td>Cerebral edema</td><td>Leading cause of death; keep Na 145-150</td></tr></table></div><div class="tips"><div class="pearl"><div class="tip-header">✓ Pearls</div><ul style="margin-left:16px;"><li>Call transplant center EARLY</li><li>NAC for all ALF (not just APAP)</li><li>INR is prognostic, not therapeutic target</li><li>VTE prophylaxis still indicated</li></ul></div><div class="pitfall"><div class="tip-header">✗ Pitfalls</div><ul style="margin-left:16px;"><li>Correcting INR reflexively</li><li>Missing Wilson disease in young patient</li><li>Delaying transplant evaluation</li><li>Forgetting pregnancy test</li></ul></div></div><button class="btn" onclick="state.stage=0;render()">🔄 Restart Case</button></div></div>`;
    };

    render();
    </script>

<script>
// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
    
    // Auto-inject hint examples into existing content
    window.rdxInit = function() {
        // Could add dynamic hint injection here based on difficulty
        console.log('ReasonDx Enhanced Features loaded for: Alf Expanded Adventure');
    };
    
    // Initialize on load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.rdxInit);
    } else {
        window.rdxInit();
    }
})();
</script>
<!-- ==================== END REASONDX ENHANCED FEATURES ==================== -->
