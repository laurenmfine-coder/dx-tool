<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Kidney SOS | ReasonDx Adventure</title><style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#3B82F6;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#2563EB,#3B82F6);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(59,130,246,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(59,130,246,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(59,130,246,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#93C5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style></head><body><header class="header"><div class="header-row"><div style="font-weight:600">🔬 Kidney SOS</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header><main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};const C={easy:{age:'68yo M',wt:'82kg',hx:'Cr rising from 1.0 to 2.4 over 3 days, decreased urine output, started lisinopril recently',exam:'Dry mucous membranes, trace edema, no CVA tenderness',vitals:{HR:'88',BP:'105/68',Temp:'98.6°F',SpO2:'97%'},labs:{Cr:'2.4',BUN:'48','BUN/Cr':'20',FeNa:'<1%','UA':'Bland'}},int:{age:'55yo F',wt:'70kg',hx:'Cr 1.2 to 3.8 in 48hr, recent CT with contrast, oliguric',exam:'Euvolemic, no rash, recent hospitalization',vitals:{HR:'92',BP:'138/82',Temp:'98.8°F',SpO2:'96%'},labs:{Cr:'3.8',BUN:'52',FeNa:'2.5%','UA':'Muddy brown casts','Urine Na':'45'}},adv:{age:'45yo M',wt:'78kg',hx:'Rapidly rising Cr, new rash, arthralgias, eosinophilia after starting allopurinol',exam:'Maculopapular rash, fever, flank pain',vitals:{HR:'98',BP:'148/92',Temp:'101.2°F',SpO2:'95%'},labs:{Cr:'4.2',BUN:'68',FeNa:'2.8%','UA':'WBC casts, eosinophils','Eos':'12%'}}};
const Q=[{t:'AKI Definition',q:'KDIGO criteria for AKI diagnosis?',h:'Cr rise or UOP decrease',o:[{id:'a',txt:'Cr rise ≥0.3 mg/dL in 48hr OR ≥1.5x baseline in 7 days OR UOP <0.5 mL/kg/hr x 6hr',c:1,p:100},{id:'b',txt:'Cr >2.0 only',c:0,p:20},{id:'c',txt:'BUN >40 only',c:0,p:20}],fb:{1:'<b>Correct!</b> KDIGO AKI: Cr ≥0.3 rise in 48hr, OR Cr ≥1.5x baseline within 7d, OR UOP <0.5 mL/kg/hr x 6hr. Stage by severity.',0:'<b>KDIGO:</b> Cr rise ≥0.3 in 48hr OR ≥1.5x baseline OR oliguria.'}},{t:'Prerenal vs Intrinsic',q:'Best way to differentiate prerenal from intrinsic AKI?',h:'FeNa and urine sediment',o:[{id:'a',txt:'FeNa <1% + bland sediment = prerenal; FeNa >2% + casts = intrinsic (ATN)',c:1,p:100},{id:'b',txt:'BUN/Cr ratio alone',c:0,p:30},{id:'c',txt:'Urine color',c:0,p:20}],fb:{1:'<b>Correct!</b> Prerenal: FeNa <1%, FEUrea <35%, bland sediment, BUN/Cr >20. ATN: FeNa >2%, muddy brown casts. Caution: Diuretics falsely elevate FeNa.',0:'<b>FeNa:</b> <1% prerenal, >2% intrinsic. Check sediment too.'}},{t:'FeNa Calculation',q:'Formula for FeNa?',h:'Fractional excretion',o:[{id:'a',txt:'(Urine Na × Plasma Cr) / (Plasma Na × Urine Cr) × 100',c:1,p:100},{id:'b',txt:'Urine Na / Plasma Na',c:0,p:30},{id:'c',txt:'BUN / Cr',c:0,p:20}],fb:{1:'<b>Correct!</b> FeNa = (UNa × PCr) / (PNa × UCr) × 100. Use FEUrea if on diuretics (FEUrea <35% = prerenal).',0:'<b>FeNa:</b> (UNa × PCr) / (PNa × UCr) × 100.'}},{t:'Urine Sediment',q:'What does muddy brown granular casts indicate?',h:'Tubular injury',o:[{id:'a',txt:'Acute tubular necrosis (ATN) - ischemic or nephrotoxic injury',c:1,p:100},{id:'b',txt:'Prerenal azotemia',c:0,p:20},{id:'c',txt:'Glomerulonephritis',c:0,p:30}],fb:{1:'<b>Correct!</b> Muddy brown casts = ATN (sloughed tubular cells). RBC casts = GN. WBC casts = AIN/pyelonephritis. Hyaline casts = nonspecific.',0:'<b>Muddy brown casts:</b> ATN. RBC casts = GN. WBC casts = AIN.'}},{t:'Contrast-Induced AKI',q:'Risk factors and prevention for contrast-induced AKI?',h:'Volume and timing',o:[{id:'a',txt:'Risk: CKD, DM, volume depletion. Prevent: IV hydration, minimize contrast, hold nephrotoxins',c:1,p:100},{id:'b',txt:'No prevention possible',c:0,p:20},{id:'c',txt:'Prophylactic dialysis',c:0,p:10}],fb:{1:'<b>Correct!</b> CI-AKI: Cr rise 24-72hr post contrast. Risk: eGFR <60, DM, CHF, volume depletion. Prevent: IV NS, low-osmolar contrast, avoid NSAIDs/ACEi.',0:'<b>CI-AKI:</b> Hydration is key. Peaks 24-72hr post contrast.'}},{t:'AIN Features',q:'Classic triad and findings of acute interstitial nephritis?',h:'Drug reaction in kidney',o:[{id:'a',txt:'Fever, rash, eosinophilia (only 10-30% have all 3); WBC casts, urine eosinophils, sterile pyuria',c:1,p:100},{id:'b',txt:'Always has all 3',c:0,p:30},{id:'c',txt:'Muddy brown casts',c:0,p:20}],fb:{1:'<b>Correct!</b> AIN: Drug-induced (PPIs, abx, NSAIDs). Classic triad rare (<30%). WBC casts, urine eosinophils (sens ~67%), sterile pyuria. Biopsy gold standard.',0:'<b>AIN:</b> Fever, rash, eos rare. WBC casts, urine eos suggest.'}},{t:'Postrenal AKI',q:'First test for suspected obstructive (postrenal) AKI?',h:'Imaging choice',o:[{id:'a',txt:'Renal ultrasound - look for hydronephrosis, bladder distension',c:1,p:100},{id:'b',txt:'CT with contrast',c:0,p:20},{id:'c',txt:'MRI',c:0,p:20}],fb:{1:'<b>Correct!</b> Renal US first: Hydronephrosis = obstruction. Check post-void residual if suspected bladder outlet. CT non-contrast if stones suspected.',0:'<b>Postrenal:</b> US first for hydronephrosis.'}},{t:'When to Dialyze',q:'Indications for urgent dialysis in AKI (AEIOU)?',h:'Life-threatening complications',o:[{id:'a',txt:'Acidosis (refractory), Electrolytes (severe hyperK), Ingestion (toxins), Overload (pulmonary edema), Uremia (encephalopathy, pericarditis)',c:1,p:100},{id:'b',txt:'Any Cr >4',c:0,p:30},{id:'c',txt:'Oliguria alone',c:0,p:20}],fb:{1:'<b>Correct!</b> AEIOU: Acidosis (pH <7.1 refractory), Electrolytes (K >6.5 refractory), Ingestion (lithium, methanol), Overload (pulmonary edema), Uremia (bleeding, encephalopathy).',0:'<b>Dialysis AEIOU:</b> Acidosis, Electrolytes, Ingestion, Overload, Uremia.'}}];
let sel=null;function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}function start(){S.q=1;S.stage='question';render();}function go(s){S.stage=s;render();}function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🔬 Kidney SOS</h1><p style="color:var(--muted);margin-bottom:32px">AKI Workup: KDIGO criteria, FeNa, sediment, dialysis indications</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🔬 Rising Creatinine</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">AKI Workup Pearls</div><div class="pearl-item"><b>KDIGO:</b> Cr ≥0.3 in 48hr OR ≥1.5x baseline OR oliguria</div><div class="pearl-item"><b>FeNa:</b> <1% prerenal, >2% intrinsic (ATN)</div><div class="pearl-item"><b>Sediment:</b> Muddy brown = ATN, WBC casts = AIN, RBC casts = GN</div><div class="pearl-item"><b>CI-AKI:</b> Hydration key, peaks 24-72hr</div><div class="pearl-item"><b>AIN:</b> Drug-induced, triad rare (<30%)</div><div class="pearl-item"><b>Dialysis AEIOU:</b> Acidosis, Electrolytes, Ingestion, Overload, Uremia</div></div><div class="cross-link"><a href="aki-adventure-enhanced.html">Related: AKI Management</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}document.addEventListener('DOMContentLoaded',render);</script></body></html>
