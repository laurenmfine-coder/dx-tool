<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawasaki Disease - ReasonDx Socratic Case</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #9d174d 0%, #f472b6 100%); min-height: 100vh; padding: 20px; color: #f8fafc; }
        .container { max-width: 900px; margin: 0 auto; }
        .scene { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        .scene-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .scene-phase { font-size: 0.85rem; color: #fbcfe8; text-transform: uppercase; }
        .scene-title { font-size: 1.5rem; font-weight: 700; color: #fce7f3; }
        .narrative { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px 20px; margin: 16px 0; border-left: 4px solid #f472b6; line-height: 1.7; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .question-box { background: linear-gradient(135deg, rgba(244,114,182,0.15), rgba(251,191,36,0.15)); border: 1px solid rgba(244,114,182,0.3); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .question-prompt { font-size: 1.1rem; font-weight: 600; color: #fce7f3; margin-bottom: 16px; }
        .mcq-options { display: flex; flex-direction: column; gap: 10px; }
        .mcq-option { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: flex-start; gap: 12px; }
        .mcq-option:hover:not(.disabled) { background: rgba(255,255,255,0.1); }
        .mcq-option.disabled { cursor: default; opacity: 0.7; }
        .mcq-option.correct { border-color: #22c55e !important; background: rgba(34,197,94,0.2) !important; opacity: 1 !important; }
        .mcq-option.incorrect { border-color: #ef4444 !important; background: rgba(239,68,68,0.15) !important; }
        .option-letter { font-weight: 700; min-width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 8px; }
        .feedback { margin-top: 16px; padding: 16px; border-radius: 10px; display: none; }
        .feedback.show { display: block; }
        .feedback.correct-feedback { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); }
        .feedback.incorrect-feedback { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); }
        .teaching-point { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3); border-radius: 10px; padding: 16px; margin-top: 16px; display: none; }
        .teaching-point.show { display: block; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(244,114,182,0.1)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 16px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; white-space: pre-line; }
        .btn { background: linear-gradient(135deg, #f472b6, #9d174d); color: white; border: none; padding: 14px 28px; border-radius: 10px; font-weight: 600; cursor: pointer; display: none; margin-top: 16px; }
        .btn.show { display: inline-block; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #f472b6, #fbcfe8); border-radius: 3px; transition: width 0.5s; }
        .score-tracker { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 10px; z-index: 100; }
        .score-value { font-size: 1.4rem; font-weight: 700; color: #4ade80; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #fbcfe8; }
        .alert-box { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); border-radius: 12px; padding: 16px; margin: 16px 0; }
        .alert-title { color: #f87171; font-weight: 700; margin-bottom: 8px; }
        .completion { text-align: center; padding: 60px 40px; }
    
/* Visual Debrief Styles */
.debrief-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; overflow-y: auto; padding: 20px; }
.debrief-overlay.show { display: flex; justify-content: center; align-items: flex-start; }
.debrief-content { background: white; border-radius: 16px; max-width: 800px; width: 100%; padding: 32px; margin: 40px auto; color: #1f2937; }
.debrief-header { text-align: center; margin-bottom: 24px; }
.debrief-grade { font-size: 4rem; margin-bottom: 8px; }
.debrief-score { font-size: 2.5rem; font-weight: 700; }
.debrief-label { font-size: 1rem; color: #6b7280; }
.decision-path { margin: 24px 0; }
.decision-path h3 { font-size: 1.25rem; font-weight: 700; margin-bottom: 16px; color: #1f2937; }
.path-item { padding: 16px; border-radius: 12px; margin-bottom: 12px; }
.path-optimal { background: #dcfce7; border: 2px solid #22c55e; }
.path-suboptimal { background: #fef3c7; border: 2px solid #f59e0b; }
.path-incorrect { background: #fee2e2; border: 2px solid #ef4444; }
.path-stage { font-weight: 700; color: #1f2937; }
.path-choice { font-size: 0.9rem; margin-top: 4px; color: #4b5563; }
.path-better { font-size: 0.85rem; margin-top: 8px; padding: 8px; background: rgba(0,0,0,0.05); border-radius: 6px; color: #6b7280; }
.path-points { font-weight: 600; font-size: 0.9rem; }
.debrief-summary { background: #f3f4f6; padding: 20px; border-radius: 12px; margin-top: 24px; }
.debrief-summary h4 { font-weight: 700; margin-bottom: 12px; }
.debrief-summary ul { margin-left: 20px; }
.debrief-summary li { margin-bottom: 8px; }
.debrief-btn { display: block; width: 100%; padding: 16px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-top: 24px; }
.debrief-btn:hover { opacity: 0.9; }

/* References Panel Styles */
.references-panel { background: linear-gradient(135deg, #eff6ff, #dbeafe); border: 1px solid #bfdbfe; border-radius: 12px; margin: 20px 0; overflow: hidden; }
.references-header { padding: 14px 20px; font-weight: 600; color: #1e40af; display: flex; align-items: center; gap: 8px; cursor: pointer; }
.refs-toggle { background: none; border: none; font-size: 0.8rem; cursor: pointer; margin-left: auto; }
.references-content { padding: 0 20px 16px; display: flex; flex-wrap: wrap; gap: 10px; }
.references-content a { background: white; padding: 8px 14px; border-radius: 8px; text-decoration: none; color: #2563eb; font-size: 0.85rem; border: 1px solid #bfdbfe; transition: all 0.2s; }
.references-content a:hover { background: #2563eb; color: white; }

/* Platform Panel Styles */
.platform-panel { background: linear-gradient(135deg, #faf5ff, #f3e8ff); border: 1px solid #e9d5ff; border-radius: 12px; padding: 16px 20px; margin: 20px 0; }
.platform-header { font-weight: 600; color: #7c3aed; margin-bottom: 12px; }
.platform-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; font-size: 0.9rem; color: #5b21b6; }
.platform-icon { font-size: 1.1rem; }

</style>

<body>
    <div class="score-tracker"><div style="font-size:0.8rem;color:#94a3b8">Score</div><div><span class="score-value" id="score">0</span> / <span id="maxScore">0</span></div></div>
    <div class="container">
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div>

<!-- Open Access References Panel -->
<div class="references-panel" id="referencesPanel">
    <div class="references-header">
        <span>📚</span> Open-Access References
        <button onclick="toggleReferences()" class="refs-toggle">▼</button>
    </div>
    <div class="references-content" id="referencesContent">
        <a href="https://publications.aap.org/pediatrics/article/140/5/e20170280/38425/Diagnosis-Treatment-and-Long-Term-Management-of" target="_blank" rel="noopener">Kawasaki Disease - AAP (AAP)</a>
<a href="https://www.ncbi.nlm.nih.gov/books/NBK537163/" target="_blank" rel="noopener">Kawasaki Disease - StatPearls (StatPearls)</a>
    </div>
</div>
</div>
        <div id="scene-container"></div>
    </div>
    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"The Febrile Child with Rash",content:'<div class="narrative"><p>A <span class="highlight">3-year-old boy</span> has had <span class="critical">fever for 6 days</span>. He has bilateral conjunctival injection (non-purulent), cracked lips, strawberry tongue, a polymorphous rash, and swollen hands/feet.</p></div><div class="alert-box"><div class="alert-title">🚨 Think Kawasaki Disease!</div><p>Leading cause of acquired heart disease in children in developed countries.</p></div>',question:{prompt:"How long must fever persist to diagnose classic Kawasaki disease?",options:[{text:"≥3 days",correct:false},{text:"≥5 days",correct:true},{text:"≥7 days",correct:false},{text:"≥10 days",correct:false}],explanation:{correct:"Correct! Classic Kawasaki requires fever ≥5 days PLUS 4 of 5 clinical criteria. However, treatment should not be delayed if criteria are met before day 5.",incorrect:"Fever ≥5 days is required for classic diagnosis. But don\'t delay treatment waiting for day 5 if diagnosis is clear!"},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Diagnostic Criteria</div><div class="pathway">FEVER ≥5 DAYS plus ≥4 of 5:\n\n1. Bilateral conjunctival injection\n   (non-exudative, limbus sparing)\n\n2. Oral changes\n   (strawberry tongue, cracked lips)\n\n3. Polymorphous rash\n\n4. Extremity changes\n   (edema, erythema, desquamation)\n\n5. Cervical lymphadenopathy\n   (≥1.5 cm, usually unilateral)</div></div>',why_chain:[],points:10}},
        {title:"The Clinical Features",content:'<div class="narrative"><p>Let\'s review each criterion. The mnemonic is <span class="highlight">CRASH and Burn</span>.</p></div>',question:{prompt:"Which feature is NOT part of the classic Kawasaki criteria?",options:[{text:"Strawberry tongue",correct:false},{text:"Non-purulent conjunctivitis",correct:false},{text:"Purulent conjunctivitis",correct:true},{text:"Polymorphous rash",correct:false}],explanation:{correct:"Correct! Kawasaki has NON-purulent (non-exudative) conjunctival injection. Purulent discharge suggests bacterial conjunctivitis. Also limbus-sparing (clear area around iris).",incorrect:"Kawasaki conjunctivitis is NON-purulent. Purulent = bacterial. Also limbus-sparing."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 CRASH and Burn</div><div class="pathway">C - Conjunctivitis (bilateral, non-purulent)\nR - Rash (polymorphous)\nA - Adenopathy (cervical, ≥1.5 cm)\nS - Strawberry tongue (+ lip changes)\nH - Hands/feet (edema, erythema)\n\n...and BURN (fever!)</div></div>',why_chain:[],points:10}},
        {title:"The Cardiac Complication",content:'<div class="narrative"><p>Kawasaki disease is concerning because of its cardiac complications.</p></div>',question:{prompt:"What is the most feared complication of Kawasaki disease?",options:[{text:"Myocarditis",correct:false},{text:"Coronary artery aneurysms",correct:true},{text:"Aortic dissection",correct:false},{text:"Endocarditis",correct:false}],explanation:{correct:"Correct! Coronary artery aneurysms occur in 15-25% of untreated cases. This is why IVIG is critical - it reduces aneurysm risk to ~5%. Kawasaki is the leading cause of acquired heart disease in children.",incorrect:"Coronary artery aneurysms are the main complication (15-25% untreated). IVIG reduces this to ~5%."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Cardiac Complications</div><div class="pathway">CORONARY ARTERY ANEURYSMS:\n• 15-25% if untreated\n• Reduced to ~5% with IVIG\n• May thrombose → MI\n• Giant aneurysms (>8mm) highest risk\n\nOTHER CARDIAC:\n• Myocarditis (common)\n• Pericarditis\n• Valvular regurgitation\n• Heart failure\n\nGET ECHO at diagnosis and 6-8 weeks!</div></div>',why_chain:[],points:10}},
        {title:"Treatment: IVIG",content:'<div class="narrative"><p>You diagnose Kawasaki disease. Time for treatment!</p></div>',question:{prompt:"What is the first-line treatment for Kawasaki disease?",options:[{text:"High-dose aspirin only",correct:false},{text:"IVIG 2 g/kg + high-dose aspirin",correct:true},{text:"Steroids alone",correct:false},{text:"Antibiotics",correct:false}],explanation:{correct:"Correct! IVIG 2 g/kg single infusion over 10-12 hours PLUS high-dose aspirin. This combination reduces coronary aneurysm risk from 25% to ~5%. Give within 10 days of fever onset.",incorrect:"IVIG 2 g/kg + aspirin is first-line. IVIG reduces aneurysm risk significantly. Steroids only for refractory cases."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Treatment Protocol</div><div class="pathway">FIRST-LINE:\n• IVIG 2 g/kg single infusion (10-12h)\n• Aspirin 80-100 mg/kg/day divided q6h\n  (high dose during acute phase)\n\nAFTER FEVER RESOLVES:\n• Aspirin 3-5 mg/kg/day (low dose)\n• Continue 6-8 weeks if no aneurysms\n• Longer if aneurysms present\n\nGIVE WITHIN 10 DAYS OF FEVER ONSET\nfor maximum benefit!</div></div>',why_chain:[],points:10}},
        {title:"Refractory Disease",content:'<div class="narrative"><p>Some children don\'t respond to initial IVIG. Fever persists or recurs within 36 hours.</p></div>',question:{prompt:"What is the next step for IVIG-refractory Kawasaki?",options:[{text:"Add antibiotics",correct:false},{text:"Second dose of IVIG ± corticosteroids",correct:true},{text:"Stop all treatment",correct:false},{text:"Surgical intervention",correct:false}],explanation:{correct:"Correct! IVIG-refractory = fever persists/recurs within 36 hours of IVIG. Give second dose of IVIG 2 g/kg. Consider adding IV methylprednisolone for high-risk or multiply refractory cases.",incorrect:"Second IVIG dose ± steroids for refractory cases. Infliximab is another option for refractory disease."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Refractory Kawasaki</div><div class="pathway">IVIG-REFRACTORY:\nFever persists/recurs within 36h of IVIG\n\nOPTIONS:\n1. Second IVIG 2 g/kg\n2. IV methylprednisolone\n3. Infliximab (TNF-α inhibitor)\n\nHIGH-RISK FEATURES:\n• Age <6 months or >9 years\n• Incomplete response\n• Coronary abnormalities at diagnosis\n• High CRP, low albumin</div></div>',why_chain:[],points:10}},
        {title:"Incomplete Kawasaki",content:'<div class="narrative"><p>What if a child has fever ≥5 days but only 2 or 3 clinical criteria? This is <span class="highlight">incomplete Kawasaki</span>.</p></div>',question:{prompt:"How do you diagnose incomplete Kawasaki disease?",options:[{text:"Cannot diagnose without all 5 criteria",correct:false},{text:"Fever ≥5 days + 2-3 criteria + supportive lab/echo findings",correct:true},{text:"Any fever with rash",correct:false},{text:"Positive blood culture",correct:false}],explanation:{correct:"Correct! Incomplete Kawasaki: fever ≥5 days + 2-3 criteria + supportive labs (elevated CRP/ESR, anemia, elevated ALT, low albumin, sterile pyuria) OR coronary abnormalities on echo.",incorrect:"Incomplete = fever + 2-3 criteria + supportive labs or echo findings. Don\'t miss it - still causes aneurysms!"},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Incomplete Kawasaki</div><div class="pathway">CONSIDER if: Fever ≥5 days + 2-3 criteria\n\nSUPPORTIVE LABS:\n• CRP ≥3 mg/dL or ESR ≥40\n• Anemia for age\n• Platelets ≥450,000 (after day 7)\n• Albumin ≤3.0\n• Elevated ALT\n• WBC ≥15,000\n• Sterile pyuria (≥10 WBC/hpf)\n\nOR POSITIVE ECHO:\n• Coronary abnormality\n\nTreat same as classic Kawasaki!</div></div>',why_chain:[],points:10}},
        {title:"Case Resolution",content:'<div class="narrative"><p>Your patient received IVIG 2 g/kg and high-dose aspirin. Fever resolved within 24 hours. Echo showed no coronary abnormalities. He was transitioned to low-dose aspirin for 6 weeks with normal follow-up echo.</p></div><div class="mechanism-box"><div class="mechanism-title">📚 Kawasaki Summary</div><div class="pathway">DIAGNOSIS (Classic):\nFever ≥5 days + ≥4 of 5 criteria\n(CRASH and Burn)\n\nINCOMPLETE:\nFever + 2-3 criteria + supportive labs/echo\n\nMAIN COMPLICATION:\nCoronary artery aneurysms (15-25% untreated)\n\nTREATMENT:\n• IVIG 2 g/kg + high-dose aspirin\n• Within 10 days of fever onset\n• Low-dose aspirin after fever resolves\n\nFOLLOW-UP:\nEcho at diagnosis and 6-8 weeks</div></div>',question:{prompt:"When should aspirin be transitioned from high-dose to low-dose?",options:[{text:"After IVIG infusion completes",correct:false},{text:"After fever resolves",correct:true},{text:"After 2 weeks regardless of fever",correct:false},{text:"Only if aneurysms develop",correct:false}],explanation:{correct:"Correct! High-dose aspirin continues until afebrile for 48-72 hours, then transition to low-dose (3-5 mg/kg/day). Low-dose continues 6-8 weeks if no aneurysms, longer if present.",incorrect:"Transition after fever resolves (afebrile 48-72h). Continue low-dose for 6-8 weeks minimum."},teaching:'<h4>Key Takeaways</h4><ul style="line-height:2;margin-left:20px;"><li>Fever ≥5 days + 4 of 5 criteria = classic</li><li>CRASH and Burn mnemonic</li><li>Coronary aneurysms = main complication</li><li>IVIG 2 g/kg + aspirin within 10 days</li><li>Echo at diagnosis and 6-8 weeks</li><li>Incomplete KD exists - don\'t miss it!</li></ul>',why_chain:[],points:10}},
        {title:"Clinical Integration",content:'<div class="narrative"><p>You synthesize all the clinical information to ensure optimal patient care.</p></div>',question:{prompt:"What principle is MOST important for excellent clinical outcomes?",options:[{text:"Integrating clinical presentation with evidence-based guidelines while reassessing response to treatment",correct:true},{text:"Following protocols exactly without clinical judgment",correct:false},{text:"Ordering comprehensive testing to avoid any missed diagnoses",correct:false},{text:"Making a diagnosis quickly and committing to it without reconsideration",correct:false}],explanation:{correct:"Excellent clinical care combines systematic assessment, evidence-based treatment, and ongoing reassessment. Guidelines inform but don't replace clinical reasoning.",incorrect:"Good clinical care requires flexibility, reassessment, and integration of guidelines with patient-specific factors."},teaching:'<h4>Clinical Reasoning</h4><ul><li>Systematic data gathering</li><li>Evidence-based management</li><li>Regular reassessment</li><li>Patient-centered communication</li></ul>',why_chain:[],points:10}}
    ];
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:#4ade80;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><p>You mastered Kawasaki Disease!</p></div>';}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}

</script>

<!-- Visual Debrief Overlay -->
<div class="debrief-overlay" id="debriefOverlay" onclick="if(event.target===this)closeDebrief()">
    <div class="debrief-content" id="debriefContent"></div>
</div>
