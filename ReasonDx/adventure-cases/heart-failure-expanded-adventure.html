<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Failure Complete | Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #7f1d1d 0%, #dc2626 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(127, 29, 29, 0.9); border-radius: 16px; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; background: #dc2626; margin-left: 10px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #dc2626, #fca5a5); border-radius: 3px; }
        .scene { background: linear-gradient(135deg, #7f1d1d, #991b1b); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .scene-header { background: rgba(220, 38, 38, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #fca5a5; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .safe { color: #4ade80; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(220, 38, 38, 0.2)); border: 1px solid rgba(139, 92, 246, 0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251, 191, 36, 0.15); border: 1px solid rgba(251, 191, 36, 0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #dc2626, #b91c1c); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #fca5a5; }
        .why-chain { background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(220, 38, 38, 0.15)); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 16px; padding: 24px; margin: 24px 0; }
        .why-chain-title { font-size: 1.2rem; font-weight: 700; color: #c4b5fd; margin-bottom: 20px; }
        .why-item { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
        .why-q { font-weight: 600; color: #e9d5ff; margin-bottom: 10px; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); }
        .pitfall { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival', 'classification', 'hfref_hfpef', 'pathophys', 'bnp', 'acute_tx', 'diuretics', 'vasodilators', 'gdmt', 'arni', 'devices', 'prognosis', 'discharge', 'debrief'];
    const state = { stage: 0 };

    function render() {
        const progress = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">❤️ Heart Failure Complete<span class="badge">14 STAGES</span></div><div style="font-size:1.3rem;font-weight:700">${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>`;
        switch(STAGES[state.stage]) {
            case 'arrival': c += renderArrival(); break;
            case 'classification': c += renderClassification(); break;
            case 'hfref_hfpef': c += renderTypes(); break;
            case 'pathophys': c += renderPathophys(); break;
            case 'bnp': c += renderBNP(); break;
            case 'acute_tx': c += renderAcuteTx(); break;
            case 'diuretics': c += renderDiuretics(); break;
            case 'vasodilators': c += renderVasodilators(); break;
            case 'gdmt': c += renderGDMT(); break;
            case 'arni': c += renderARNI(); break;
            case 'devices': c += renderDevices(); break;
            case 'prognosis': c += renderPrognosis(); break;
            case 'discharge': c += renderDischarge(); break;
            case 'debrief': c += renderDebrief(); break;
        }
        document.getElementById('app').innerHTML = c;
    }

    function renderArrival() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 14</div><div class="scene-title">The Dyspneic Patient</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Look for signs of congestion: JVD, crackles, edema, orthopnea</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> When would you consider inotropic support vs vasodilators in this patient?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Warm and wet = vasodilators + diuretics; Cold and wet = may need inotropes</p>
                </div>
            <div class="narrative"><p>A <span class="highlight">68-year-old man</span> with HTN and prior MI presents with <span class="critical">progressive dyspnea, orthopnea, and leg swelling</span> over 2 weeks.</p>
            <p style="margin-top:12px;"><strong>History:</strong> MI 3 years ago, stents to LAD, EF was 35% on last echo<br><strong>Vitals:</strong> HR 102, BP 148/92, RR 24, SpO2 91% on RA<br><strong>Exam:</strong> JVD to angle of jaw, bibasilar crackles, S3 gallop, 2+ pitting edema to knees<br><strong>Labs:</strong> BNP 1840, Cr 1.6 (baseline 1.1), troponin negative</p></div>
            <div class="alert-box"><div class="alert-title">🚨 Acute Decompensated Heart Failure</div><p>This patient has classic signs of volume overload. Key question: What precipitated this exacerbation?</p></div>
            <div class="mechanism-box"><div class="mechanism-title">🧬 Heart Failure Overview</div><div class="pathway">Heart cannot pump enough blood to meet demands<br>OR can only do so at elevated filling pressures<br><br>Results in:<br>• Backward failure → congestion (edema, JVD)<br>• Forward failure → hypoperfusion (fatigue, renal dysfunction)</div></div>
            <button class="btn" onclick="nextStage()">Classification →</button></div></div>`;
    }

    function renderClassification() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 14</div><div class="scene-title">NYHA & ACC/AHA Staging</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> BNP >400 strongly suggests heart failure as cause of dyspnea</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does the prior MI and EF of 35% affect your diuretic strategy?</p>
                </div>
            <div class="boards-tip"><div class="boards-tip-title">📚 NYHA Functional Classification</div>
            <table class="comparison-table">
                <tr><th>Class</th><th>Symptoms</th></tr>
                <tr><td>I</td><td>No limitation - ordinary activity doesn't cause symptoms</td></tr>
                <tr><td>II</td><td>Slight limitation - comfortable at rest, ordinary activity causes symptoms</td></tr>
                <tr><td>III</td><td>Marked limitation - comfortable at rest, less than ordinary activity causes symptoms</td></tr>
                <tr><td>IV</td><td>Unable to carry out any activity without symptoms; symptoms at rest</td></tr>
            </table></div>
            <div class="boards-tip"><div class="boards-tip-title">📚 ACC/AHA Stages</div>
            <table class="comparison-table">
                <tr><th>Stage</th><th>Description</th></tr>
                <tr><td>A</td><td>At risk (HTN, DM, CAD) but no structural disease or symptoms</td></tr>
                <tr><td>B</td><td>Structural disease (low EF, LVH) but no symptoms</td></tr>
                <tr><td>C</td><td>Structural disease WITH current or prior symptoms</td></tr>
                <tr><td>D</td><td>Refractory HF requiring advanced therapies</td></tr>
            </table>
            <p style="margin-top:8px;">NYHA can fluctuate; ACC/AHA stages only progress (can't go backward)</p></div>
            <div class="narrative"><p><strong>This patient:</strong> NYHA Class III-IV (symptoms with minimal activity, now at rest), ACC/AHA Stage C</p></div>
            <button class="btn" onclick="nextStage()">HFrEF vs HFpEF →</button></div></div>`;
    }

    function renderTypes() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 14</div><div class="scene-title">Types of Heart Failure</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Check volume status - is the patient 'wet' or 'dry'?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What's the role of ultrafiltration if diuretics fail?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Target net negative 1-2L/day with diuresis; faster can cause AKI</p>
                </div>
            <div class="boards-tip"><div class="boards-tip-title">📚 HF Classification by EF</div>
            <table class="comparison-table">
                <tr><th>Type</th><th>EF</th><th>Pathophysiology</th></tr>
                <tr><td><strong>HFrEF</strong></td><td>≤40%</td><td>Reduced contractility (systolic dysfunction)</td></tr>
                <tr><td><strong>HFmrEF</strong></td><td>41-49%</td><td>Mildly reduced (intermediate)</td></tr>
                <tr><td><strong>HFpEF</strong></td><td>≥50%</td><td>Impaired relaxation (diastolic dysfunction)</td></tr>
            </table></div>
            <div class="mechanism-box"><div class="mechanism-title">🧬 HFrEF vs HFpEF Pathophysiology</div><div class="pathway"><strong>HFrEF (Systolic):</strong><br>• Weak squeeze → ↓ stroke volume<br>• Dilated LV<br>• Causes: Post-MI, dilated CMP, chronic MR<br><br><strong>HFpEF (Diastolic):</strong><br>• Normal squeeze but stiff ventricle<br>• Can't relax/fill properly<br>• ↑ filling pressures → congestion<br>• Causes: HTN, LVH, infiltrative (amyloid)<br><br>Treatment differs significantly!</div></div>
            <div class="why-chain"><div class="why-chain-title">🔗 WHY Chain: Why EF Matters</div>
                <div class="why-item"><div class="why-q">Why classify by EF?</div>HFrEF has proven mortality-reducing therapies (ACEi, BB, MRA, ARNI). HFpEF treatment is mostly symptom management - different approach.</div>
            </div>
            <div class="narrative"><p><strong>This patient:</strong> Prior MI, EF 35% = <span class="highlight">HFrEF</span></p></div>
            <button class="btn" onclick="nextStage()">Pathophysiology Deep Dive →</button></div></div>`;
    }

    function renderPathophys() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 14</div><div class="scene-title">The Neurohormonal Cascade</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> EF <40% = HFrEF; EF ≥50% = HFpEF - treatment differs!</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> When should this patient be evaluated for advanced therapies (LVAD/transplant)?</p>
                </div>
            <div class="mechanism-box"><div class="mechanism-title">🧬 Compensatory Mechanisms Gone Wrong</div><div class="pathway"><strong>Initial insult</strong> (MI, HTN, valve disease)<br>→ ↓ Cardiac output<br><br><strong>Compensatory responses:</strong><br>1. RAAS activation → Na/H2O retention → ↑ preload<br>2. SNS activation → ↑ HR, ↑ contractility<br>3. Ventricular remodeling → dilation, hypertrophy<br><br><strong>Short-term:</strong> Maintain CO<br><strong>Long-term:</strong> These become MALADAPTIVE<br>→ Volume overload<br>→ Increased wall stress<br>→ Progressive remodeling<br>→ Worsening HF</div></div>
            <div class="why-chain"><div class="why-chain-title">🔗 WHY Chain: Treatment Targets</div>
                <div class="why-item"><div class="why-q">Why ACEi/ARBs?</div>Block RAAS → reduce preload, afterload, and remodeling. Mortality benefit proven.</div>
                <div class="why-item"><div class="why-q">Why beta-blockers in a "weak heart"?</div>Chronic SNS activation is toxic (apoptosis, arrhythmias). Beta-blockers reduce HR, allow remodeling reversal. Start low, go slow.</div>
                <div class="why-item"><div class="why-q">Why MRAs (spironolactone)?</div>Aldosterone causes fibrosis and K+ wasting. Blocking it reduces mortality by ~30% in severe HF.</div>
            </div>
            <button class="btn" onclick="nextStage()">BNP Interpretation →</button></div></div>`;
    }

    function renderBNP() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 14</div><div class="scene-title">Natriuretic Peptides</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Assess perfusion - are they 'warm' or 'cold'? This guides therapy</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How do you balance preload reduction with maintaining cardiac output?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Cardiorenal syndrome: Rising Cr may be acceptable if patient decongesting</p>
                </div>
            <div class="boards-tip"><div class="boards-tip-title">📚 BNP and NT-proBNP</div>
            <table class="comparison-table">
                <tr><th>Marker</th><th>HF Unlikely</th><th>HF Likely</th><th>Gray Zone</th></tr>
                <tr><td>BNP</td><td><100 pg/mL</td><td>>400 pg/mL</td><td>100-400</td></tr>
                <tr><td>NT-proBNP</td><td><300 pg/mL</td><td>>900 (or age-adjusted)</td><td>300-900</td></tr>
            </table>
            <p style="margin-top:8px;">NT-proBNP age cutoffs: >450 (<50 yo), >900 (50-75), >1800 (>75)</p></div>
            <div class="mechanism-box"><div class="mechanism-title">🧬 What Elevates BNP?</div><div class="pathway">Released from ventricles in response to stretch<br><br><strong>Elevated in:</strong><br>• Heart failure (volume/pressure overload)<br>• ACS, PE, pulmonary HTN<br>• Renal failure (decreased clearance)<br>• Sepsis, critical illness<br>• Age, female sex<br><br><strong>Falsely LOW in:</strong><br>• Obesity (adipose tissue clearance)<br>• Flash pulmonary edema (no time to rise)</div></div>
            <div class="why-chain"><div class="why-chain-title">🔗 WHY Chain: BNP Uses</div>
                <div class="why-item"><div class="why-q">Why check BNP in acute dyspnea?</div>High negative predictive value. BNP <100 essentially rules out HF as cause of dyspnea.</div>
                <div class="why-item"><div class="why-q">Why trend BNP during admission?</div>Decrease >30% from admission suggests successful decongestion. Failure to decrease = poor prognosis.</div>
            </div>
            <div class="narrative"><p><strong>This patient:</strong> BNP 1840 = <span class="critical">markedly elevated</span>, confirms HF exacerbation</p></div>
            <button class="btn" onclick="nextStage()">Acute Treatment →</button></div></div>`;
    }

    function renderAcuteTx() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 14</div><div class="scene-title">Acute Decompensation Management</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Triggers: dietary indiscretion, medication non-compliance, infection, ischemia</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> Discuss the evidence for mineralocorticoid antagonists in HFrEF</p>
                </div>
            <div class="boards-tip"><div class="boards-tip-title">📚 ADHF Profiles ("Warm/Cold, Wet/Dry")</div>
            <table class="comparison-table">
                <tr><th></th><th>Dry (no congestion)</th><th>Wet (congested)</th></tr>
                <tr><td><strong>Warm (perfused)</strong></td><td>Compensated (optimize GDMT)</td><td>Most common - diuretics</td></tr>
                <tr><td><strong>Cold (hypoperfused)</strong></td><td>Consider hypovolemia</td><td>Cardiogenic shock - inotropes</td></tr>
            </table></div>
            <div class="mechanism-box"><div class="mechanism-title">🧬 Assess Perfusion and Congestion</div><div class="pathway"><strong>Signs of CONGESTION (wet):</strong><br>• JVD, hepatojugular reflux<br>• Crackles, S3<br>• Peripheral edema<br>• Orthopnea, PND<br><br><strong>Signs of HYPOPERFUSION (cold):</strong><br>• Narrow pulse pressure<br>• Cool extremities<br>• Altered mentation<br>• Low urine output<br>• Worsening renal function</div></div>
            <div class="narrative"><p><strong>This patient:</strong> JVD, crackles, edema (wet) + normal mentation, BP adequate (warm) = <span class="highlight">Warm and Wet</span> → Primary treatment is diuresis</p></div>
            <button class="btn" onclick="nextStage()">Diuretic Strategy →</button></div></div>`;
    }

    function renderDiuretics() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 14</div><div class="scene-title">Diuretic Therapy</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Look for signs of congestion: JVD, crackles, edema, orthopnea</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> When would you consider inotropic support vs vasodilators in this patient?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> New LBBB + HF symptoms = consider ischemia workup</p>
                </div>
            <div class="boards-tip"><div class="boards-tip-title">📚 Loop Diuretic Dosing</div>
            <table class="comparison-table">
                <tr><th>Principle</th><th>Details</th></tr>
                <tr><td>Initial dose</td><td>IV furosemide ≥ home oral dose (or 40mg if naive)</td></tr>
                <tr><td>Goal output</td><td>3-5 L negative per day initially</td></tr>
                <tr><td>Monitoring</td><td>Daily weights, I/Os, BMP (K+, Cr)</td></tr>
                <tr><td>If inadequate</td><td>Double the dose, then add thiazide</td></tr>
            </table></div>
            <div class="mechanism-box"><div class="mechanism-title">🧬 Diuretic Resistance</div><div class="pathway"><strong>Causes:</strong><br>• Underdosing (need higher IV doses)<br>• Poor gut absorption if edematous<br>• Reduced renal perfusion<br>• Post-diuretic Na retention<br><br><strong>Solutions:</strong><br>1. Increase loop diuretic dose<br>2. Continuous infusion (more consistent levels)<br>3. Add thiazide (sequential nephron blockade)<br>4. Add metolazone (synergistic, watch K+)<br>5. Consider ultrafiltration</div></div>

                <div class="why-item"><div class="why-q">Why IV in acute HF?</div>Gut edema impairs oral absorption. IV bypasses this and provides predictable delivery.</div>

    }

    function renderVasodilators() {

            <button class="btn" onclick="nextStage()">Guideline-Directed Medical Therapy →</button></div></div>`;

    function renderGDMT() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 14</div><div class="scene-title">The Four Pillars of HFrEF</div></div><div class="scene-body">

                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Check volume status - is the patient 'wet' or 'dry'?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What's the role of ultrafiltration if diuretics fail?</p>

                <tr><th>Class</th><th>Drugs</th><th>Key Points</th></tr>
                <tr style="background:rgba(34,197,94,0.15);"><td><strong>ARNI/ACEi/ARB</strong></td><td>Sacubitril-valsartan, lisinopril, losartan</td><td>ARNI preferred if tolerated</td></tr>

                <tr style="background:rgba(34,197,94,0.15);"><td><strong>MRA</strong></td><td>Spironolactone, eplerenone</td><td>If EF ≤35% and NYHA II-IV</td></tr>
                <tr style="background:rgba(34,197,94,0.15);"><td><strong>SGLT2i</strong></td><td>Dapagliflozin, empagliflozin</td><td>Even without DM!</td></tr>

    function renderARNI() {

    function renderDevices() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 11 of 14</div><div class="scene-title">Device Therapy</div></div><div class="scene-body">

            <div class="boards-tip"><div class="boards-tip-title">📚 CRT (Biventricular Pacing) Indications</div>

    function renderPrognosis() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 12 of 14</div><div class="scene-title">Prognostic Markers</div></div><div class="scene-body">

<script>
// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
    
    // Auto-inject hint examples into existing content
    window.rdxInit = function() {
        // Could add dynamic hint injection here based on difficulty
        console.log('ReasonDx Enhanced Features loaded for: Heart Failure Expanded Adventure');
    };
    
    // Initialize on load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.rdxInit);
    } else {
        window.rdxInit();
    }
})();
</script>
