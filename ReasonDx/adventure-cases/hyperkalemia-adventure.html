<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Deadly K | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#F59E0B;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#B45309,#F59E0B);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(245,158,11,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(245,158,11,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#000;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(245,158,11,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#000}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#000;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">⚡ The Deadly K</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'68M',wt:'75kg',hx:'CKD4, missed dialysis x2 sessions, weakness',exam:'Generalized weakness, no distress',vitals:{HR:'58',BP:'152/88',RR:'16'},labs:{K:'6.8',Cr:'6.2',ECG:'Peaked T waves'}},
int:{age:'72F',wt:'60kg',hx:'CHF on spironolactone+lisinopril, fatigue',exam:'Bradycardic, weak',vitals:{HR:'48',BP:'98/62',RR:'18'},labs:{K:'7.4',Cr:'2.1',ECG:'Widened QRS, peaked T'}},
adv:{age:'55M',wt:'85kg',hx:'DM, hyperglycemia 800, found unresponsive',exam:'Unresponsive, Kussmaul respirations',vitals:{HR:'42',BP:'78/40',RR:'28'},labs:{K:'8.2',Cr:'4.8',pH:'7.08',ECG:'Sine wave pattern'}}};
const Q=[
{t:'ECG Recognition',q:'Peaked T waves, widened QRS. What is the arrhythmia risk?',h:'ECG changes predict cardiac toxicity',o:[{id:'a',txt:'High - can progress to VFib/asystole',c:1,p:100},{id:'b',txt:'Low - just monitor',c:0,p:0},{id:'c',txt:'Moderate',c:0,p:30}],fb:{1:'<b>Correct!</b> ECG progression: Peaked T → PR prolongation → QRS widening → Sine wave → VFib/Asystole. Treat immediately with ECG changes!',0:'<b>Critical!</b> ECG changes = cardiac membrane instability. Can rapidly progress to fatal arrhythmia.'}},
{t:'First Treatment',q:'K+ 7.4 with widened QRS. FIRST intervention?',h:'Stabilize the membrane before shifting K+',o:[{id:'a',txt:'IV Calcium gluconate (membrane stabilization)',c:1,p:100},{id:'b',txt:'Insulin + glucose',c:0,p:40},{id:'c',txt:'Kayexalate',c:0,p:0}],fb:{1:'<b>Correct!</b> CALCIUM FIRST! Stabilizes cardiac membrane within minutes. Does NOT lower K+, but prevents arrhythmia while you give other treatments.',0:'<b>Order matters:</b> Calcium → Insulin/glucose → Bicarbonate → Dialysis. Calcium first for membrane protection.'}},
{t:'Calcium Dosing',q:'Calcium gluconate dose for hyperkalemia?',h:'Different preparations have different calcium content',o:[{id:'a',txt:'1-2 g (10-20 mL of 10%) IV over 2-3 min',c:1,p:100},{id:'b',txt:'100 mg IV push',c:0,p:0},{id:'c',txt:'10 g IV',c:0,p:0}],fb:{1:'<b>Correct!</b> Ca gluconate: 1-2 g (10-20 mL of 10% solution) IV over 2-3 min. Can repeat in 5 min if ECG unchanged. CaCl has 3x more calcium (use central line).',0:'<b>Dosing:</b> 1-2 g Ca gluconate IV. Works in 1-3 min, lasts 30-60 min.'}},
{t:'Shifting K+',q:'Best agent to shift K+ into cells?',h:'Think about mechanism and speed',o:[{id:'a',txt:'Insulin 10U regular + D50 (or D10 if diabetic)',c:1,p:100},{id:'b',txt:'Albuterol alone',c:0,p:50},{id:'c',txt:'Bicarbonate alone',c:0,p:30}],fb:{1:'<b>Correct!</b> Insulin + glucose: Most effective shift. 10U regular + 25g dextrose. Onset 15-30 min. Albuterol additive. Bicarb less effective unless acidotic.',0:'<b>Shift agents:</b> Insulin+glucose most reliable. Monitor glucose for 4-6 hrs (hypoglycemia risk).'}},
{t:'Glucose Monitoring',q:'After insulin for hyperkalemia, glucose monitoring duration?',h:'Hypoglycemia is common',o:[{id:'a',txt:'Every 1 hr for at least 4-6 hours',c:1,p:100},{id:'b',txt:'Once at 1 hour',c:0,p:20},{id:'c',txt:'No monitoring needed',c:0,p:0}],fb:{1:'<b>Correct!</b> Hypoglycemia occurs in 10-75% of patients. Check glucose q1hr x 4-6 hrs. Give D50 empirically in ESRD patients. D10 infusion safer than bolus.',0:'<b>Safety!</b> Hypoglycemia is major risk. Frequent glucose monitoring mandatory.'}},
{t:'Removal Agents',q:'Which actually REMOVES K+ from body?',h:'Shift vs remove - different mechanisms',o:[{id:'a',txt:'Dialysis, loop diuretics, Kayexalate/patiromer',c:1,p:100},{id:'b',txt:'Insulin + glucose',c:0,p:0},{id:'c',txt:'Calcium',c:0,p:0}],fb:{1:'<b>Correct!</b> REMOVAL: Dialysis (fastest, most effective), Loop diuretics (if urine output), GI binders (kayexalate, patiromer). Insulin/bicarb/albuterol only SHIFT K+ temporarily.',0:'<b>Shift vs Remove:</b> Calcium=membrane, Insulin/bicarb/albuterol=shift, Dialysis/diuretics/binders=remove.'}},
{t:'Dialysis Indication',q:'When is emergent dialysis indicated?',h:'Refractory or severe',o:[{id:'a',txt:'K+ >6.5 with ECG changes refractory to medical Rx, or K+ >7 in ESRD',c:1,p:100},{id:'b',txt:'Any K+ >5.5',c:0,p:10},{id:'c',txt:'Never emergent',c:0,p:0}],fb:{1:'<b>Correct!</b> Emergent dialysis: Refractory to medical therapy, severe ECG changes, K+ >6.5 with ECG changes, or ESRD with K+ >7. Hemodialysis removes 25-50 mEq/hr.',0:'<b>Dialysis:</b> Most effective removal. Indicated when medical therapy fails or in ESRD.'}},
{t:'Avoid in Hyperkalemia',q:'Which medications should be HELD?',h:'Drug causes matter',o:[{id:'a',txt:'ACEi/ARBs, K-sparing diuretics, NSAIDs',c:1,p:100},{id:'b',txt:'Loop diuretics',c:0,p:0},{id:'c',txt:'Calcium channel blockers',c:0,p:0}],fb:{1:'<b>Correct!</b> STOP: ACEi, ARBs, spironolactone, amiloride, NSAIDs, K+ supplements, TMP-SMX. Review all meds for K+-raising potential.',0:'<b>Med review:</b> Many drugs raise K+. RAAS inhibitors, K-sparing diuretics, NSAIDs all contribute.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML=`<div class="feedback ${opt&&opt.c?'excellent':'incorrect'}">${q.fb[opt&&opt.c?1:0]}</div>`;document.getElementById('sub').textContent=S.q<S.total?'Next →':'Results →';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML=`<div class="setup-screen"><h1>⚡ The Deadly K</h1><p style="color:var(--muted);margin-bottom:32px">Hyperkalemia: ECG changes, calcium dosing, insulin/glucose, dialysis indications</p><button class="start-btn" onclick="go('pres')">Begin Case →</button></div>`;}else if(S.stage==='pres'){document.getElementById('app').innerHTML=`<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🔋 Electrolyte Emergency</div></div><div class="card-body"><div class="narrative"><span class="hl">${c.age}</span> (${c.wt})<br><b>Hx:</b> ${c.hx}<br><b>Exam:</b> ${c.exam}</div><div class="vitals-grid">${Object.entries(c.vitals).map(([k,v])=>`<div class="vital"><div class="vital-label">${k}</div><div class="vital-value">${v}</div></div>`).join('')}</div><div class="lab-grid">${Object.entries(c.labs).map(([k,v])=>`<div class="lab-item"><span class="lab-name">${k}</span><span class="lab-value">${v}</span></div>`).join('')}</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment →</button></div></div></div>`;}else if(S.stage==='question'){const q=Q[S.q-1];document.getElementById('app').innerHTML=`<div class="card"><div class="card-header"><div class="card-phase">Q${S.q}/${S.total}</div><div class="card-title">🔍 ${q.t}</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:${S.q/S.total*100}%"></div></div><div class="question-header"><div class="question-number">${S.q}</div><div style="font-weight:600">${q.q}</div></div><div class="hint">💡 ${q.h}</div><div class="radio-options">${q.o.map(o=>`<div class="radio-option" data-id="${o.id}" onclick="pick('${o.id}')"><div class="radio-circle"></div><div><b>${o.txt}</b></div></div>`).join('')}</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit →</button></div></div></div>`;}else{const pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML=`<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">${pct>=70?'🎉':'📚'}</div><div style="font-size:2rem;font-weight:700;color:${pct>=70?'var(--success)':'var(--warning)'}">${pct>=70?'Complete!':'Review'}</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>${S.score}/${S.max} (${pct}%)</span></div></div><div class="pearls-box"><div class="pearls-title">📌 Hyperkalemia Pearls</div><div class="pearl-item"><b>ECG progression:</b> Peaked T → PR prolonged → QRS wide → Sine wave → VFib</div><div class="pearl-item"><b>Order:</b> Calcium FIRST (membrane), then Insulin+glucose (shift), then Dialysis (remove)</div><div class="pearl-item"><b>Calcium:</b> 1-2g gluconate IV over 2-3 min. Repeat in 5 min if ECG unchanged</div><div class="pearl-item"><b>Insulin:</b> 10U regular + D50. Monitor glucose q1hr x 4-6 hrs</div><div class="pearl-item"><b>Stop:</b> ACEi, ARBs, K-sparing diuretics, NSAIDs, K+ supplements</div></div><div class="cross-link"><a href="../mechanism/potassium-module.html">MechanismDx: Potassium</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href='adventure-hub.html'">Back</button></div></div></div>`;}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
