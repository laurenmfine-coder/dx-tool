<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIC | Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #7f1d1d 0%, #b91c1c 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(127, 29, 29, 0.9); border-radius: 16px; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; background: #b91c1c; margin-left: 10px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #b91c1c, #fca5a5); border-radius: 3px; }
        .scene { background: linear-gradient(135deg, #7f1d1d, #991b1b); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .scene-header { background: rgba(185, 28, 28, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #fca5a5; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(185,28,28,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #b91c1c, #991b1b); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #fca5a5; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','pathophys','causes','labs','scoring','smear','treatment','products','complications','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">🩸 DIC<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Bleeding and Clotting</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would pregnancy change your approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Don't forget to consider mimics and look-alikes</p>
                </div><div class="narrative"><p>A <span class="highlight">58-year-old man</span> with septic shock from pneumonia develops <span class="critical">oozing from IV sites, petechiae, and decreased urine output</span>. Labs show low platelets.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 118, BP 82/50 (on pressors), T 102.4°F<br><strong>Labs:</strong> Plt 42K, PT 22, PTT 52, Fibrinogen 85, D-dimer >20<br><strong>Smear:</strong> Schistocytes present</p></div><div class="alert-box"><div class="alert-title">🚨 DIC = Simultaneous Bleeding AND Clotting!</div><p>Paradox of DIC: widespread microvascular thrombosis CAUSES bleeding by consuming clotting factors and platelets. Both can be happening at once!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 The DIC Paradox</div><div class="pathway">Trigger (sepsis, trauma, etc.)<br>→ Massive thrombin generation<br>→ Widespread microthrombi<br>→ Consumes platelets + factors<br>→ Depletes fibrinogen<br>→ Secondary fibrinolysis<br>→ BLEEDING from consumption</div></div><button class="btn" onclick="nextStage()">Pathophysiology →</button></div></div>`;
    };

    window.render_pathophys = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">Pathophysiology</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate severity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if this patient had renal impairment?</p>
                </div><div class="mechanism-box"><div class="mechanism-title">🧬 DIC Cascade</div><div class="pathway"><strong>Step 1: Trigger</strong><br>Tissue factor exposure or endothelial damage<br><br><strong>Step 2: Thrombin Storm</strong><br>Massive activation of coagulation cascade<br>→ Uncontrolled thrombin generation<br><br><strong>Step 3: Microthrombi</strong><br>Fibrin deposition in microvasculature<br>→ Organ ischemia (kidneys, skin, brain)<br><br><strong>Step 4: Consumption</strong><br>Platelets + clotting factors depleted<br><br><strong>Step 5: Fibrinolysis</strong><br>Plasmin breaks down fibrin<br>→ D-dimers + FDPs elevated<br>→ FDPs inhibit clotting → more bleeding</div></div><div class="alert-box"><div class="alert-title">⚠️ Natural Anticoagulants Depleted!</div><p>Protein C, protein S, antithrombin III all consumed → further loss of regulation → vicious cycle.</p></div><button class="btn" onclick="nextStage()">Causes →</button></div></div>`;
    };

    window.render_causes = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">Causes of DIC</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Think about the most common causes first</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does immunosuppression affect the differential?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 DIC Triggers</div><table class="comparison-table"><tr><th>Category</th><th>Examples</th></tr><tr><td><strong>Infection/Sepsis</strong></td><td>Bacterial (gram-neg especially), viral, fungal, parasitic</td></tr><tr><td><strong>Malignancy</strong></td><td>Acute promyelocytic leukemia (APL), adenocarcinomas (mucin-secreting)</td></tr><tr><td><strong>Obstetric</strong></td><td>Placental abruption, amniotic fluid embolism, HELLP, septic abortion</td></tr><tr><td><strong>Trauma</strong></td><td>Massive tissue injury, burns, head trauma (brain tissue factor)</td></tr><tr><td><strong>Vascular</strong></td><td>Large aortic aneurysm, giant hemangioma (Kasabach-Merritt)</td></tr><tr><td><strong>Toxic</strong></td><td>Snake envenomation, transfusion reaction, drug reactions</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 APL = DIC Emergency!</div><p>Acute promyelocytic leukemia (M3) presents with DIC in 80-90% of cases. Start ATRA immediately - can resolve DIC within days!</p></div><button class="btn" onclick="nextStage()">Labs →</button></div></div>`;
    };

    window.render_labs = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">Laboratory Findings</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the key history element pointing to diagnosis?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would pregnancy change your approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Always reassess if patient not improving as expected</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Classic DIC Lab Pattern</div><table class="comparison-table"><tr><th>Test</th><th>Finding</th><th>Why</th></tr><tr><td><strong>Platelets</strong></td><td>↓↓ Low</td><td>Consumed in microthrombi</td></tr><tr><td><strong>PT/INR</strong></td><td>↑ Prolonged</td><td>Factor consumption</td></tr><tr><td><strong>PTT</strong></td><td>↑ Prolonged</td><td>Factor consumption</td></tr><tr><td><strong>Fibrinogen</strong></td><td>↓↓ Low (<100)</td><td>Consumed + fibrinolysis</td></tr><tr><td><strong>D-dimer</strong></td><td>↑↑↑ Very high</td><td>Fibrin breakdown</td></tr><tr><td><strong>FDP</strong></td><td>↑↑ Elevated</td><td>Fibrin/fibrinogen degradation</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Key Lab Points</div><div class="pathway"><strong>Fibrinogen:</strong><br>• <100 mg/dL = severe DIC<br>• Acute phase reactant - may be "normal"<br>  even when depleted (check trend!)<br><br><strong>D-dimer:</strong><br>• Very sensitive but not specific<br>• Markedly elevated in DIC<br><br><strong>PT/PTT:</strong><br>• Both prolonged (consumption)<br>• Unlike isolated factor deficiency</div></div><button class="btn" onclick="nextStage()">Scoring →</button></div></div>`;
    };

    window.render_scoring = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">ISTH DIC Score</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if this patient had renal impairment?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 ISTH Overt DIC Score</div><table class="comparison-table"><tr><th>Parameter</th><th>Points</th></tr><tr><td><strong>Platelet count</strong></td><td>>100K = 0, 50-100K = 1, <50K = 2</td></tr><tr><td><strong>D-dimer/FDP</strong></td><td>No increase = 0, Moderate = 2, Strong = 3</td></tr><tr><td><strong>Prolonged PT</strong></td><td><3 sec = 0, 3-6 sec = 1, >6 sec = 2</td></tr><tr><td><strong>Fibrinogen</strong></td><td>>100 = 0, <100 = 1</td></tr></table><p style="margin-top:12px;"><strong>Score ≥5:</strong> Compatible with overt DIC<br><strong>Score <5:</strong> Suggestive, not overt - repeat daily</p></div><div class="alert-box"><div class="alert-title">⚠️ Clinical Context Essential!</div><p>DIC is a CLINICAL diagnosis supported by labs. Score requires underlying disorder known to cause DIC. Don't diagnose DIC without a trigger!</p></div><button class="btn" onclick="nextStage()">Blood Smear →</button></div></div>`;
    };

    window.render_smear = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">Peripheral Smear</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate severity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does immunosuppression affect the differential?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Smear Findings</div><table class="comparison-table"><tr><th>Finding</th><th>Significance</th></tr><tr><td><strong>Schistocytes</strong></td><td>RBC fragments from microthrombi shearing</td></tr><tr><td><strong>Thrombocytopenia</strong></td><td>Decreased/absent platelets</td></tr><tr><td><strong>Polychromasia</strong></td><td>Reticulocyte response to hemolysis</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 MAHA in DIC</div><div class="pathway"><strong>Microangiopathic hemolytic anemia:</strong><br>Fibrin strands in microvasculature<br>→ RBCs sheared as they pass through<br>→ Schistocytes (helmet cells, fragments)<br>→ Elevated LDH, low haptoglobin<br>→ Elevated indirect bilirubin<br><br><strong>Differentiating MAHA causes:</strong><br>• DIC: Abnormal PT/PTT, low fibrinogen<br>• TTP: Normal PT/PTT, normal fibrinogen<br>• HUS: Normal PT/PTT, renal failure</div></div><button class="btn" onclick="nextStage()">Treatment →</button></div></div>`;
    };

    window.render_treatment = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 10</div><div class="scene-title">Treatment Principles</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Think about the most common causes first</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would pregnancy change your approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fefce8; border:1px solid #eab308; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #eab308;">
                    <p style="margin:0; color:#854d0e; font-size:0.9rem;"><strong>🚫 Common Mistake:</strong> Avoid anchoring bias - keep differential broad initially</p>
                </div><div class="alert-box"><div class="alert-title">🚨 #1 Priority: Treat the Underlying Cause!</div><p>DIC will not resolve until the trigger is addressed. Antibiotics for sepsis, delivery for obstetric causes, ATRA for APL, debridement for necrotic tissue.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Supportive Treatment</div><table class="comparison-table"><tr><th>Issue</th><th>Treatment</th></tr><tr><td><strong>Active bleeding</strong></td><td>Transfuse to support hemostasis</td></tr><tr><td><strong>Thrombocytopenia</strong></td><td>Platelets if <20K or <50K with bleeding</td></tr><tr><td><strong>Low fibrinogen</strong></td><td>Cryoprecipitate (target >100-150)</td></tr><tr><td><strong>Prolonged PT/PTT</strong></td><td>FFP if actively bleeding</td></tr><tr><td><strong>Thrombosis predominant</strong></td><td>Consider heparin (controversial)</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Transfusion Goals</div><div class="pathway"><strong>Platelets:</strong><br>• Transfuse if <10-20K (prophylactic)<br>• Transfuse if <50K + bleeding<br><br><strong>Fibrinogen (Cryo):</strong><br>• Target >100-150 mg/dL<br>• Each unit cryo raises fibrinogen ~5-10<br><br><strong>FFP:</strong><br>• If bleeding + prolonged PT/PTT<br>• Contains all clotting factors</div></div><button class="btn" onclick="nextStage()">Products →</button></div></div>`;
    };

    window.render_products = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 10</div><div class="scene-title">Blood Products</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the key history element pointing to diagnosis?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if this patient had renal impairment?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Blood Product Contents</div><table class="comparison-table"><tr><th>Product</th><th>Contains</th><th>Use</th></tr><tr><td><strong>FFP</strong></td><td>All clotting factors</td><td>Factor replacement</td></tr><tr><td><strong>Cryoprecipitate</strong></td><td>Fibrinogen, VIII, vWF, XIII</td><td>Fibrinogen replacement</td></tr><tr><td><strong>Platelets</strong></td><td>Platelets</td><td>Thrombocytopenia</td></tr><tr><td><strong>pRBCs</strong></td><td>Red blood cells</td><td>Anemia from blood loss</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ Heparin in DIC?</div><p><strong>Controversial!</strong> Consider ONLY if thrombosis predominant (purpura fulminans, acral ischemia, large vessel thrombosis). Do NOT use if active bleeding. Low-dose if used.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Antifibrinolytics</div><div class="pathway"><strong>TXA (tranexamic acid):</strong><br>Generally AVOID in DIC!<br>→ Inhibits fibrinolysis<br>→ May worsen thrombosis<br><br><strong>Exception:</strong><br>• After underlying cause treated<br>• Ongoing bleeding<br>• Labs improving but hyperfibrinolysis</div></div><button class="btn" onclick="nextStage()">Complications →</button></div></div>`;
    };

    window.render_complications = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 10</div><div class="scene-title">Complications</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does immunosuppression affect the differential?</p>

<script>
// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
    
    // Auto-inject hint examples into existing content
    window.rdxInit = function() {

        console.log('ReasonDx Enhanced Features loaded for: Dic Expanded Adventure');
    };
    
    // Initialize on load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.rdxInit);
    } else {
        window.rdxInit();
    }
})();
</script>
