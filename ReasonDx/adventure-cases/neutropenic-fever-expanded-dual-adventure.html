<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neutropenic Fever | Dual-Mode Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        body.adult { background: linear-gradient(135deg, #1e3a5f 0%, #3b82f6 100%); }
        body.peds { background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%); }
        .container { max-width: 900px; margin: 0 auto; }
        .mode-toggle { display: flex; justify-content: center; margin-bottom: 20px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 4px; }
        .mode-btn { flex: 1; padding: 12px 24px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; background: transparent; color: #e2e8f0; }
        .mode-btn.active { background: rgba(255,255,255,0.2); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-radius: 16px; margin-bottom: 20px; }
        .adult .header { background: rgba(30, 58, 95, 0.9); }
        .peds .header { background: rgba(124, 58, 237, 0.9); }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; margin-left: 10px; }
        .adult .badge { background: #3b82f6; }
        .peds .badge { background: #a78bfa; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; border-radius: 3px; }
        .adult .progress-fill { background: linear-gradient(90deg, #3b82f6, #93c5fd); }
        .peds .progress-fill { background: linear-gradient(90deg, #a78bfa, #c4b5fd); }
        .scene { border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .adult .scene { background: linear-gradient(135deg, #1e3a5f, #1e40af); }
        .peds .scene { background: linear-gradient(135deg, #6d28d9, #7c3aed); }
        .scene-header { padding: 16px 20px; }
        .adult .scene-header { background: rgba(59, 130, 246, 0.15); }
        .peds .scene-header { background: rgba(167, 139, 250, 0.15); }
        .scene-phase { font-size: 0.75rem; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(59,130,246,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .adult .btn { background: linear-gradient(135deg, #3b82f6, #1e40af); }
        .peds .btn { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="adult">
    <div class="container">
        <div class="mode-toggle">
            <button class="mode-btn active" onclick="setMode('adult')">🏥 Adult</button>
            <button class="mode-btn" onclick="setMode('peds')">👶 Pediatric</button>
        </div>
        <div id="app"></div>
    </div>
    <script>
    const STAGES = ['arrival','definitions','risk','workup','empiric','escalation','fungal','duration','prophylaxis','debrief'];
    const state = { stage: 0, mode: 'adult' };

    function setMode(m) { state.mode = m; state.stage = 0; document.body.className = m; document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); render(); }
    function nextStage() { state.stage++; render(); }

    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        const icon = state.mode === 'adult' ? '🦠' : '👶🦠';
        const title = state.mode === 'adult' ? 'Neutropenic Fever' : 'Pediatric Neutropenic Fever';
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">${icon} ${title}<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }

    window.render_arrival = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Fever After Chemotherapy</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would pregnancy change your approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Don't forget to consider mimics and look-alikes</p>
                </div><div class="narrative"><p>A <span class="highlight">58-year-old man</span> with AML, day 10 after induction chemotherapy, presents with <span class="critical">fever to 101.8°F and chills</span>. Has a tunneled central line.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 110, BP 98/60, T 101.8°F, RR 20<br><strong>Labs:</strong> WBC 0.3 (ANC 80), Hgb 8.2, Plt 18K<br><strong>Exam:</strong> Mild mucositis, no focal source, port site clean</p></div><div class="alert-box"><div class="alert-title">🚨 Neutropenic Fever = Medical Emergency!</div><p>ANC <500 + fever = start antibiotics within 60 minutes! Infection can progress to sepsis and death within hours.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why So Dangerous?</div><div class="pathway">No neutrophils → no pus formation<br>→ No inflammatory signs<br>→ Fever may be ONLY sign<br>→ Rapid bacterial proliferation<br>→ Sepsis within hours</div></div><button class="btn" onclick="nextStage()">Definitions →</button></div></div>`;
        } else {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Fever in a Child with Leukemia</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would pregnancy change your approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Don't forget to consider mimics and look-alikes</p>
                </div><div class="narrative"><p>A <span class="highlight">6-year-old girl</span> with ALL, day 14 of induction, presents with <span class="critical">fever to 102.2°F</span>. Parents note she's been more tired today. Has a port-a-cath.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 130, BP 90/55, T 102.2°F, RR 24<br><strong>Labs:</strong> WBC 0.2 (ANC 40), Hgb 7.8, Plt 22K<br><strong>Weight:</strong> 22 kg</p></div><div class="alert-box"><div class="alert-title">🚨 Pediatric Oncologic Emergency!</div><p>ALL is the most common pediatric cancer. Fever during chemotherapy-induced neutropenia requires immediate broad-spectrum antibiotics.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Pediatric Considerations</div><div class="pathway"><strong>Common pediatric malignancies:</strong><br>• ALL (most common)<br>• AML<br>• Neuroblastoma<br>• Lymphoma<br><br>Children may not show typical signs<br>of infection when neutropenic<br><br>Tachycardia may be only early sign!</div></div><button class="btn" onclick="nextStage()">Definitions →</button></div></div>`;
        }
    };

    window.render_definitions = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">Key Definitions</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate severity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if this patient had renal impairment?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Neutropenic Fever Definition</div><table class="comparison-table"><tr><th>Term</th><th>Definition</th></tr><tr><td><strong>Neutropenia</strong></td><td>ANC <500/μL OR <1000 expected to fall to <500</td></tr><tr><td><strong>Fever</strong></td><td>Single temp ≥38.3°C (101°F) OR ≥38.0°C × 1 hour</td></tr><tr><td><strong>Profound</strong></td><td>ANC <100/μL</td></tr><tr><td><strong>Prolonged</strong></td><td>>7 days duration</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 ANC Calculation</div><div class="pathway"><strong>ANC = WBC × (% segs + % bands)</strong><br><br>Example (${state.mode === 'adult' ? 'this patient' : 'this child'}):<br>WBC = ${state.mode === 'adult' ? '0.3 (300/μL)' : '0.2 (200/μL)'}<br>Segs = 20%, Bands = 5%<br>ANC = ${state.mode === 'adult' ? '300' : '200'} × 0.25 = ${state.mode === 'adult' ? '75' : '50'}/μL<br><br>This is PROFOUND neutropenia (ANC <100)</div></div>${state.mode === 'peds' ? `<div class="alert-box"><div class="alert-title">⚠️ Pediatric Note</div><p>Never take rectal temperatures in neutropenic children - risk of bacteremia from mucosal trauma!</p></div>` : ''}<button class="btn" onclick="nextStage()">Risk Stratification →</button></div></div>`;
    };

    window.render_risk = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">MASCC Score</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Think about the most common causes first</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does immunosuppression affect the differential?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 MASCC Risk Index (Adults)</div><table class="comparison-table"><tr><th>Characteristic</th><th>Points</th></tr><tr><td>Burden of illness: mild or none</td><td>5</td></tr><tr><td>Burden of illness: moderate</td><td>3</td></tr><tr><td>No hypotension (SBP >90)</td><td>5</td></tr><tr><td>No COPD</td><td>4</td></tr><tr><td>Solid tumor or no prior fungal infection</td><td>4</td></tr><tr><td>Outpatient status</td><td>3</td></tr><tr><td>No dehydration</td><td>3</td></tr><tr><td>Age <60</td><td>2</td></tr></table><p style="margin-top:12px;"><strong>≥21:</strong> Low risk - outpatient candidate<br><strong><21:</strong> High risk - inpatient required</p></div><button class="btn" onclick="nextStage()">Workup →</button></div></div>`;
        } else {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">Pediatric Risk Stratification</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Think about the most common causes first</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does immunosuppression affect the differential?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Low-Risk Criteria (Pediatric)</div><table class="comparison-table"><tr><th>Low-Risk Features</th></tr><tr><td>ANC ≥100 or rising</td></tr><tr><td>No comorbidities</td></tr><tr><td>No central line infection</td></tr><tr><td>No significant mucositis</td></tr><tr><td>Expected neutropenia <7 days</td></tr><tr><td>No hypotension</td></tr><tr><td>Normal chest X-ray</td></tr><tr><td>Reliable family, close follow-up available</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ High-Risk Features in Children</div><ul style="margin-left:20px;"><li>AML (higher risk than ALL)</li><li>Relapsed leukemia</li><li>HSCT recipient</li><li>Profound neutropenia (ANC <100)</li><li>Significant comorbidity</li><li>Hypotension or ill-appearing</li></ul></div><button class="btn" onclick="nextStage()">Workup →</button></div></div>`;
        }
    };

    window.render_workup = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">Diagnostic Evaluation</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the key history element pointing to diagnosis?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would pregnancy change your approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Always reassess if patient not improving as expected</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Initial Workup</div><table class="comparison-table"><tr><th>Test</th><th>Notes</th></tr><tr><td><strong>Blood cultures × 2</strong></td><td>Peripheral AND from each catheter lumen</td></tr><tr><td><strong>CBC with diff</strong></td><td>Confirm ANC, trending</td></tr><tr><td><strong>CMP</strong></td><td>Renal, hepatic function</td></tr><tr><td><strong>Urinalysis + culture</strong></td><td>Even without symptoms</td></tr><tr><td><strong>Chest X-ray</strong></td><td>Even without respiratory symptoms</td></tr><tr><td><strong>Site-specific cultures</strong></td><td>Wound, stool (C. diff if diarrhea)</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Culture-Negative Fever</div><div class="pathway"><strong>Only 20-30% have documented infection!</strong><br><br>Possible explanations:<br>• Infection present but not culturable<br>• Drug fever, tumor fever<br>• Mucositis (common in ${state.mode === 'peds' ? 'children on chemo' : 'AML induction'})<br><br><strong>Regardless: Treat empirically!</strong><br>Don't wait for culture results</div></div><button class="btn" onclick="nextStage()">Empiric Therapy →</button></div></div>`;
    };

    window.render_empiric = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">Empiric Antibiotics</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if this patient had renal impairment?</p>
                </div><div class="alert-box"><div class="alert-title">🚨 Start Within 60 Minutes!</div><p>Each hour of delay increases mortality. Must cover Pseudomonas aeruginosa.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Empiric Monotherapy Options</div><table class="comparison-table"><tr><th>Drug</th><th>${state.mode === 'adult' ? 'Adult Dose' : 'Pediatric Dose'}</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Cefepime</strong></td><td>${state.mode === 'adult' ? '2 g IV q8h' : '50 mg/kg IV q8h (max 2g)'}</td></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Piperacillin-tazobactam</strong></td><td>${state.mode === 'adult' ? '4.5 g IV q6h' : '100 mg/kg IV q6h (max 4.5g)'}</td></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Meropenem</strong></td><td>${state.mode === 'adult' ? '1 g IV q8h' : '20 mg/kg IV q8h (max 1g)'}</td></tr></table><p style="margin-top:12px;">Monotherapy is adequate for most patients - equivalent to combination therapy.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why These Agents?</div><div class="pathway"><strong>Requirements:</strong><br>• Antipseudomonal activity<br>• Gram-negative coverage<br>• Bactericidal<br>• Good safety profile<br><br>${state.mode === 'peds' ? '<strong>Peds note:</strong> Cefepime or pip-tazo most commonly used. Carbapenems reserved for resistant organisms or severe sepsis.' : ''}</div></div><button class="btn" onclick="nextStage()">When to Escalate →</button></div></div>`;
    };

    window.render_escalation = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">Expanded Coverage</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate severity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does immunosuppression affect the differential?</p>

<script>
// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
    
    // Auto-inject hint examples into existing content
    window.rdxInit = function() {
        // Could add dynamic hint injection here based on difficulty
        console.log('ReasonDx Enhanced Features loaded for: Neutropenic Fever Expanded Dual Adventure');
    };
    
    // Initialize on load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.rdxInit);
    } else {
        window.rdxInit();
    }
})();
</script>
