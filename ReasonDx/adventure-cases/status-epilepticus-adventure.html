<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Seizing Patient | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#8B5CF6;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#6D28D9,#8B5CF6);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(139,92,246,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(139,92,246,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(139,92,246,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">⚡ The Seizing Patient</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'28M',wt:'75kg',hx:'Known epilepsy, missed meds, seizing x8 min',exam:'GTC seizure, not responding to commands',vitals:{HR:'118',BP:'168/98',SpO2:'92%'},labs:{Glu:'142',AED:'Subtherapeutic'}},int:{age:'45F',wt:'68kg',hx:'No seizure hx, found seizing, now 15 min',exam:'Ongoing GTC, cyanotic',vitals:{HR:'128',BP:'178/102',SpO2:'88%'},labs:{Glu:'58',Na:'118'}},adv:{age:'62M',wt:'82kg',hx:'Refractory SE despite benzos and levetiracetam',exam:'Continued seizure activity, intubated',vitals:{HR:'108',BP:'142/88',SpO2:'98%'},labs:{EEG:'Continuous seizure'}}};
const Q=[
{t:'Definition',q:'Status epilepticus definition (updated)?',h:'Time-based criteria changed',o:[{id:'a',txt:'Seizure >5 min OR recurrent seizures without return to baseline',c:1,p:100},{id:'b',txt:'Seizure >30 min',c:0,p:30},{id:'c',txt:'Any seizure',c:0,p:0}],fb:{1:'<b>Correct!</b> SE: >5 min continuous OR 2+ seizures without return to baseline. Old definition was 30 min. Treat at 5 min.',0:'<b>Updated definition:</b> >5 min (not 30). Earlier treatment improves outcomes.'}},
{t:'First-Line Treatment',q:'First-line medication for status epilepticus?',h:'Benzodiazepines',o:[{id:'a',txt:'IV lorazepam 0.1 mg/kg (or IM midazolam if no IV)',c:1,p:100},{id:'b',txt:'Phenytoin first',c:0,p:30},{id:'c',txt:'Propofol',c:0,p:20}],fb:{1:'<b>Correct!</b> First-line: IV lorazepam 4mg (0.1 mg/kg), can repeat x1. IM midazolam 10mg if no IV (RAMPART trial).',0:'<b>First-line:</b> Benzodiazepines. Lorazepam IV or midazolam IM.'}},
{t:'Second-Line',q:'Seizure continues after 2 doses lorazepam. Next?',h:'Established SE',o:[{id:'a',txt:'IV fosphenytoin, levetiracetam, or valproate',c:1,p:100},{id:'b',txt:'More benzodiazepines',c:0,p:20},{id:'c',txt:'Observation',c:0,p:0}],fb:{1:'<b>Correct!</b> Second-line (established SE): Fosphenytoin 20 PE/kg, levetiracetam 60 mg/kg, or valproate 40 mg/kg. All equivalent efficacy.',0:'<b>Second-line:</b> Fosphenytoin, levetiracetam, or valproate. ESETT trial showed equivalence.'}},
{t:'Refractory SE',q:'SE continues after benzo + second-line agent. Definition and treatment?',h:'RSE requires escalation',o:[{id:'a',txt:'Refractory SE - continuous IV anesthetics (propofol, midazolam, pentobarbital)',c:1,p:100},{id:'b',txt:'Repeat second-line agents',c:0,p:30},{id:'c',txt:'Oral medications',c:0,p:0}],fb:{1:'<b>Correct!</b> RSE: Failure of first + second-line. Requires ICU, intubation, continuous IV anesthetics with EEG monitoring.',0:'<b>Refractory SE:</b> Continuous anesthetics + EEG. Burst suppression target.'}},
{t:'Workup',q:'New-onset SE without known epilepsy. Essential workup?',h:'Find the cause',o:[{id:'a',txt:'Glucose, electrolytes, tox screen, CT head, LP if indicated',c:1,p:100},{id:'b',txt:'EEG only',c:0,p:20},{id:'c',txt:'No workup needed',c:0,p:0}],fb:{1:'<b>Correct!</b> STAT glucose, BMP, tox screen, AED levels. CT head for all new-onset. LP if infection suspected. EEG when available.',0:'<b>Workup:</b> Glucose, lytes, tox, CT. LP if infectious concern.'}},
{t:'Hypoglycemia',q:'Patient seizing, glucose 45. First intervention?',h:'Reversible cause',o:[{id:'a',txt:'IV dextrose (D50) immediately - may stop seizure',c:1,p:100},{id:'b',txt:'Benzodiazepines first',c:0,p:30},{id:'c',txt:'CT head first',c:0,p:0}],fb:{1:'<b>Correct!</b> Check glucose immediately. If low, D50 may abort seizure. Always check glucose in any altered mental status.',0:'<b>Glucose:</b> Check and correct immediately. Hypoglycemic seizures stop with dextrose.'}},
{t:'Phenytoin Considerations',q:'Fosphenytoin advantage over phenytoin?',h:'Administration differences',o:[{id:'a',txt:'Faster infusion, less hypotension, can give IM, less tissue necrosis',c:1,p:100},{id:'b',txt:'More effective',c:0,p:20},{id:'c',txt:'No advantage',c:0,p:10}],fb:{1:'<b>Correct!</b> Fosphenytoin: Water-soluble prodrug. Faster infusion (150 PE/min vs 50 mg/min), less purple glove syndrome, IM option.',0:'<b>Fosphenytoin:</b> Better safety profile, faster administration than phenytoin.'}},
{t:'EEG Monitoring',q:'When is continuous EEG monitoring indicated?',h:'Nonconvulsive SE',o:[{id:'a',txt:'Persistent altered mental status after convulsions stop, refractory SE, ICU patients',c:1,p:100},{id:'b',txt:'All seizures',c:0,p:20},{id:'c',txt:'Never needed',c:0,p:0}],fb:{1:'<b>Correct!</b> cEEG for: Unexplained coma/AMS, post-convulsive confusion >20min, RSE, ICU AMS. Up to 20% of comatose ICU patients have nonconvulsive seizures.',0:'<b>cEEG:</b> For persistent AMS, RSE, ICU patients. Detects nonconvulsive SE.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>⚡ The Seizing Patient</h1><p style="color:var(--muted);margin-bottom:32px">Status Epilepticus: Definition, benzos, second-line, refractory, workup</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🧠 Neurologic Emergency</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Status Epilepticus Pearls</div><div class="pearl-item"><b>Definition:</b> >5 min (not 30 min)</div><div class="pearl-item"><b>First-line:</b> IV lorazepam or IM midazolam</div><div class="pearl-item"><b>Second-line:</b> Fosphenytoin, levetiracetam, valproate</div><div class="pearl-item"><b>Refractory:</b> Continuous anesthetics + EEG</div><div class="pearl-item"><b>Always:</b> Check glucose immediately</div></div><div class="cross-link"><a href="../mechanism/neurology.html">MechanismDx: Neurology</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
