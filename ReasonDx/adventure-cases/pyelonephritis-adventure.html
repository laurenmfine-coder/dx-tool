<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Kidney Fire | ReasonDx Adventure</title><style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#8B5CF6;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#7C3AED,#8B5CF6);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(139,92,246,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(139,92,246,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(139,92,246,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style></head><body><header class="header"><div class="header-row"><div style="font-weight:600">🔥 Kidney Fire</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header><main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};const C={easy:{age:'28yo F',wt:'62kg',hx:'Dysuria, frequency x3 days, now fever and flank pain, no vomiting',exam:'CVA tenderness right, suprapubic tenderness, no peritoneal signs',vitals:{HR:'98',BP:'118/72',Temp:'101.8°F',SpO2:'98%'},labs:{WBC:'14k',UA:'Pyuria, bacteria, nitrites+','Cr':'0.9'}},int:{age:'45yo F',wt:'75kg',hx:'DM2, recurrent UTIs, now severe flank pain, rigors, vomiting, unable to tolerate PO',exam:'Ill-appearing, CVA tenderness bilateral, dry mucous membranes',vitals:{HR:'112',BP:'98/62',Temp:'103.5°F',SpO2:'95%'},labs:{WBC:'22k',Cr:'1.6',Gluc:'285',Lactate:'2.4',UA:'WBC casts'}},adv:{age:'62yo M',wt:'88kg',hx:'Known kidney stone, now septic with pyonephrosis, obstructed kidney',exam:'Septic shock, CVA tenderness, distended bladder',vitals:{HR:'128',BP:'78/45',Temp:'104°F',SpO2:'91%'},labs:{WBC:'28k',Cr:'3.2',Lactate:'5.8',CT:'Hydronephrosis with stone'}}};
const Q=[{t:'Diagnosis',q:'How is pyelonephritis diagnosed?',h:'Clinical + lab',o:[{id:'a',txt:'Fever + flank pain + CVA tenderness + pyuria/bacteriuria. Upper tract symptoms distinguish from cystitis.',c:1,p:100},{id:'b',txt:'Dysuria alone',c:0,p:20},{id:'c',txt:'Imaging required',c:0,p:30}],fb:{1:'<b>Correct!</b> Pyelo: Fever, flank/CVA pain, nausea/vomiting + pyuria/bacteriuria. WBC casts specific for upper tract. Culture confirms. Imaging only if complicated or not improving.',0:'<b>Pyelo:</b> Fever + flank pain + CVA tenderness + pyuria.'}},{t:'Uncomplicated vs Complicated',q:'What makes pyelonephritis complicated?',h:'Risk factors',o:[{id:'a',txt:'Male sex, pregnancy, structural abnormality, stones, catheter, immunocompromised, diabetes, recent instrumentation',c:1,p:100},{id:'b',txt:'Any pyelo is complicated',c:0,p:20},{id:'c',txt:'Fever alone',c:0,p:20}],fb:{1:'<b>Correct!</b> Complicated: Male, pregnant, structural (stones, obstruction, reflux), catheter, immunocompromised, DM, hospital-acquired, treatment failure, single kidney.',0:'<b>Complicated:</b> Male, pregnant, structural, catheter, immunocompromised, DM.'}},{t:'Outpatient Treatment',q:'When can pyelonephritis be treated outpatient?',h:'Uncomplicated criteria',o:[{id:'a',txt:'Uncomplicated, tolerating PO, not pregnant, reliable follow-up, no sepsis',c:1,p:100},{id:'b',txt:'Never outpatient',c:0,p:20},{id:'c',txt:'All pyelo outpatient',c:0,p:20}],fb:{1:'<b>Correct!</b> Outpatient if: Uncomplicated, mild-moderate symptoms, tolerating PO, not pregnant, reliable follow-up, no comorbidities. Observe 4-6hr, ensure afebrile trend.',0:'<b>Outpatient:</b> Uncomplicated, tolerating PO, not pregnant, reliable f/u.'}},{t:'Antibiotic Selection',q:'First-line antibiotics for uncomplicated pyelonephritis?',h:'Outpatient regimen',o:[{id:'a',txt:'Fluoroquinolone (cipro 500 BID x7d or levo 750 daily x5d) or TMP-SMX x14d if susceptible',c:1,p:100},{id:'b',txt:'Nitrofurantoin',c:0,p:30},{id:'c',txt:'Amoxicillin alone',c:0,p:20}],fb:{1:'<b>Correct!</b> Outpatient: Cipro 500mg BID x7d or levo 750mg daily x5d. TMP-SMX x14d if local resistance <20%. Nitrofurantoin does NOT achieve renal tissue levels - for cystitis only!',0:'<b>Outpatient pyelo:</b> FQ x5-7d or TMP-SMX x14d. NOT nitrofurantoin.'}},{t:'Inpatient Antibiotics',q:'Empiric IV antibiotics for complicated pyelonephritis?',h:'Broader coverage',o:[{id:'a',txt:'Ceftriaxone, fluoroquinolone, or pip-tazo depending on severity and resistance patterns',c:1,p:100},{id:'b',txt:'Oral amoxicillin',c:0,p:20},{id:'c',txt:'No antibiotics needed',c:0,p:10}],fb:{1:'<b>Correct!</b> Inpatient: Ceftriaxone 1g daily, cipro IV, or pip-tazo if severe/ESBL risk. Add vanc if gram-positive suspected. Narrow based on culture. Duration 10-14d for complicated.',0:'<b>Inpatient:</b> Ceftriaxone, FQ IV, or pip-tazo. Narrow by culture.'}},{t:'Imaging Indications',q:'When is imaging indicated in pyelonephritis?',h:'Rule out complications',o:[{id:'a',txt:'Complicated pyelo, not improving at 48-72hr, concern for obstruction/abscess, recurrent infections',c:1,p:100},{id:'b',txt:'All cases',c:0,p:30},{id:'c',txt:'Never needed',c:0,p:10}],fb:{1:'<b>Correct!</b> Imaging (CT preferred): Not improving 48-72hr, complicated, concern for abscess/obstruction, recurrent, atypical presentation. Hydronephrosis with infection = urologic emergency.',0:'<b>Imaging:</b> If not improving 48-72hr, complicated, abscess concern.'}},{t:'Pyonephrosis',q:'What is pyonephrosis and how is it managed?',h:'Urologic emergency',o:[{id:'a',txt:'Infected obstructed kidney. Urologic emergency - requires urgent drainage (percutaneous nephrostomy or stent) + antibiotics.',c:1,p:100},{id:'b',txt:'Antibiotics only',c:0,p:20},{id:'c',txt:'Watchful waiting',c:0,p:10}],fb:{1:'<b>Correct!</b> Pyonephrosis: Pus in obstructed collecting system. Mortality high without drainage. Emergent decompression (perc nephrostomy tube or ureteral stent) + IV abx + ICU if septic.',0:'<b>Pyonephrosis:</b> Urgent drainage required. Abx alone insufficient.'}},{t:'Treatment Duration',q:'Duration of antibiotic therapy for pyelonephritis?',h:'Based on complexity',o:[{id:'a',txt:'Uncomplicated: 5-7 days with FQ. Complicated: 10-14 days. Abscess/bacteremia may need longer.',c:1,p:100},{id:'b',txt:'3 days for all',c:0,p:20},{id:'c',txt:'6 weeks always',c:0,p:10}],fb:{1:'<b>Correct!</b> Duration: Uncomplicated - FQ 5-7d (or TMP-SMX 14d). Complicated - 10-14d. Abscess - drain + 4-6wk. Follow clinical response and cultures.',0:'<b>Duration:</b> Uncomplicated 5-7d FQ, complicated 10-14d.'}}];
let sel=null;function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}function start(){S.q=1;S.stage='question';render();}function go(s){S.stage=s;render();}function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🔥 Kidney Fire</h1><p style="color:var(--muted);margin-bottom:32px">Pyelonephritis: Diagnosis, antibiotics, imaging, pyonephrosis</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🔥 Flank Pain + Fever</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Pyelonephritis Pearls</div><div class="pearl-item"><b>Diagnosis:</b> Fever + flank pain + CVA tenderness + pyuria</div><div class="pearl-item"><b>Complicated:</b> Male, pregnant, structural, catheter, DM</div><div class="pearl-item"><b>Outpatient:</b> FQ 5-7d or TMP-SMX 14d. NOT nitrofurantoin!</div><div class="pearl-item"><b>Inpatient:</b> Ceftriaxone, FQ IV, or pip-tazo</div><div class="pearl-item"><b>Imaging:</b> If not improving 48-72hr or complicated</div><div class="pearl-item"><b>Pyonephrosis:</b> Urgent drainage + antibiotics</div></div><div class="cross-link"><a href="sepsis-adventure-enhanced.html">Related: Sepsis</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}document.addEventListener('DOMContentLoaded',render);</script></body></html>
