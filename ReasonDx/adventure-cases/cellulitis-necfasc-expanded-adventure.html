<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cellulitis vs NecFasc | Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #7f1d1d 0%, #dc2626 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(127, 29, 29, 0.9); border-radius: 16px; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; background: #dc2626; margin-left: 10px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #dc2626, #fca5a5); border-radius: 3px; }
        .scene { background: linear-gradient(135deg, #7f1d1d, #991b1b); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .scene-header { background: rgba(220, 38, 38, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #fca5a5; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(220,38,38,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #dc2626, #991b1b); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #fca5a5; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','cellulitis','necfasc','hardsoft','lrinec','imaging','antibiotics','surgery','fournier','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">🦠 Cellulitis vs NecFasc<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">The Red Leg</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What comorbidities would change your management approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Always consider mimics and look-alikes in your differential</p>
                </div><div class="narrative"><p>A <span class="highlight">58-year-old diabetic man</span> presents with <span class="critical">rapidly progressive leg pain, swelling, and erythema</span> × 2 days. Started after a small cut. Now confused and febrile.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 118, BP 92/58, T 102.8°F, RR 24<br><strong>Exam:</strong> Dusky erythema, tense edema, crepitus palpable, pain out of proportion to exam</p></div><div class="alert-box"><div class="alert-title">🚨 Red Flags for Necrotizing Fasciitis!</div><p>Pain out of proportion, crepitus, dusky/necrotic skin, systemic toxicity, rapid progression. This is a surgical emergency - mortality increases hourly!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 The Critical Distinction</div><div class="pathway"><strong>Cellulitis:</strong> Infection of dermis/subcutaneous<br>→ Treatable with antibiotics alone<br><br><strong>Necrotizing fasciitis:</strong> Deep fascial necrosis<br>→ Requires EMERGENT surgical debridement<br>→ Antibiotics alone = death<br><br>Delay in surgery = ↑ mortality by 7-9%/hour</div></div><button class="btn" onclick="nextStage()">Cellulitis →</button></div></div>`;
    };

    window.render_cellulitis = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">Uncomplicated Cellulitis</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate acuity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would renal or hepatic impairment affect drug dosing?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Cellulitis Features</div><table class="comparison-table"><tr><th>Feature</th><th>Description</th></tr><tr><td><strong>Appearance</strong></td><td>Erythema, warmth, swelling with indistinct borders</td></tr><tr><td><strong>Pain</strong></td><td>Proportionate to appearance</td></tr><tr><td><strong>Progression</strong></td><td>Slow (over days)</td></tr><tr><td><strong>Systemic signs</strong></td><td>Mild or absent</td></tr><tr><td><strong>Common organisms</strong></td><td>Strep (GAS), Staph aureus</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Cellulitis Treatment</div><div class="pathway"><strong>Non-purulent (no abscess):</strong><br>• Strep coverage: Cephalexin, pen VK<br>• If MRSA risk: Add TMP-SMX or doxy<br><br><strong>Purulent (abscess present):</strong><br>• I&D is primary treatment!<br>• MRSA coverage: TMP-SMX, doxy<br><br><strong>Mark borders</strong> to monitor progression</div></div><button class="btn" onclick="nextStage()">Necrotizing Fasciitis →</button></div></div>`;
    };

    window.render_necfasc = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">Necrotizing Fasciitis</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the most likely diagnosis given this presentation?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if the patient doesn't respond to initial treatment?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Reassess if the patient isn't improving as expected</p>
                </div><div class="alert-box"><div class="alert-title">🚨 "Hard Signs" = OR Immediately!</div><ul style="margin-left:20px;"><li>Crepitus (subcutaneous gas)</li><li>Bullae/skin necrosis</li><li>Pain out of proportion to exam</li><li>Rapid progression despite antibiotics</li><li>Gas on imaging</li><li>Septic shock</li></ul></div><div class="boards-tip"><div class="boards-tip-title">📚 Types of Necrotizing Fasciitis</div><table class="comparison-table"><tr><th>Type</th><th>Organisms</th><th>Location</th></tr><tr><td><strong>Type I (polymicrobial)</strong></td><td>Mixed aerobic + anaerobic</td><td>Perineum, abdomen, diabetics</td></tr><tr><td><strong>Type II (monomicrobial)</strong></td><td>Group A Strep, Staph, Clostridium</td><td>Extremities, any site</td></tr><tr><td><strong>Type III</strong></td><td>Vibrio vulnificus</td><td>Saltwater/shellfish exposure</td></tr></table></div><button class="btn" onclick="nextStage()">Hard vs Soft Signs →</button></div></div>`;
    };

    window.render_hardsoft = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">Clinical Clues</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What key history element is most helpful here?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What's the evidence level for the standard treatment?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Hard vs Soft Signs</div><table class="comparison-table"><tr><th>Hard Signs (OR Now!)</th><th>Soft Signs (High Suspicion)</th></tr><tr><td>Crepitus</td><td>Pain out of proportion</td></tr><tr><td>Skin necrosis/bullae</td><td>Edema beyond erythema</td></tr><tr><td>Gas on imaging</td><td>Tense swelling</td></tr><tr><td>Gray/"dishwater" drainage</td><td>Rapid progression</td></tr><tr><td>Hemodynamic instability</td><td>High fever, tachycardia</td></tr><tr><td>Failure of antibiotics</td><td>Elevated WBC, CRP, lactate</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Pain Out of Proportion</div><div class="pathway"><strong>Most important early clue!</strong><br><br>Superficial skin may look relatively benign<br>BUT deep fascia is necrotic<br>→ Severe deep pain<br>→ Pain seems "too much" for what you see<br><br>Later: Skin nerves destroyed<br>→ Paradoxical ANESTHESIA<br>(worse sign - extensive necrosis)</div></div><button class="btn" onclick="nextStage()">LRINEC Score →</button></div></div>`;
    };

    window.render_lrinec = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">LRINEC Score</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Which physical exam finding is most specific?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> When would you involve subspecialty consultation?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fefce8; border:1px solid #eab308; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #eab308;">
                    <p style="margin:0; color:#854d0e; font-size:0.9rem;"><strong>🚫 Common Mistake:</strong> Avoid anchoring bias - keep your differential broad initially</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Laboratory Risk Indicator for NecFasc</div><table class="comparison-table"><tr><th>Parameter</th><th>Criteria</th><th>Points</th></tr><tr><td><strong>CRP</strong></td><td>≥150 mg/L</td><td>4</td></tr><tr><td><strong>WBC</strong></td><td>15-25K: 1 pt; >25K: 2 pts</td><td>1-2</td></tr><tr><td><strong>Hemoglobin</strong></td><td>11-13.5: 1 pt; <11: 2 pts</td><td>1-2</td></tr><tr><td><strong>Sodium</strong></td><td><135</td><td>2</td></tr><tr><td><strong>Creatinine</strong></td><td>>1.6</td><td>2</td></tr><tr><td><strong>Glucose</strong></td><td>>180</td><td>1</td></tr></table><p style="margin-top:12px;"><strong>Score ≥6:</strong> High suspicion → consider surgery<br><strong>Score ≥8:</strong> Strong predictor (~75% PPV)</p></div><div class="alert-box"><div class="alert-title">⚠️ LRINEC Limitations</div><p>Score can be falsely low early in disease. Clinical judgment trumps score. If high suspicion, explore surgically regardless of score!</p></div><button class="btn" onclick="nextStage()">Imaging →</button></div></div>`;
    };

    window.render_imaging = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">Imaging</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Consider the most common causes first, then rarer ones</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What are the key complications to monitor for?</p>
                </div><div class="alert-box"><div class="alert-title">🚨 Don't Delay Surgery for Imaging!</div><p>If clinical diagnosis is clear (hard signs present), go to OR. Imaging should not delay surgical exploration in unstable patients.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Imaging Findings</div><table class="comparison-table"><tr><th>Modality</th><th>Findings</th><th>Notes</th></tr><tr><td><strong>X-ray</strong></td><td>Subcutaneous gas</td><td>Quick; low sensitivity</td></tr><tr><td><strong>CT</strong></td><td>Gas, fascial thickening, fluid tracking, fat stranding</td><td>Better sensitivity; may show extent</td></tr><tr><td><strong>MRI</strong></td><td>Fascial enhancement, fluid</td><td>Most sensitive but time-consuming</td></tr><tr><td><strong>Ultrasound</strong></td><td>Fascial thickening, fluid</td><td>Bedside; operator-dependent</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 CT Findings</div><div class="pathway"><strong>Suggestive of necrotizing infection:</strong><br>• Subcutaneous/fascial gas<br>• Fascial thickening<br>• Non-enhancing fascia<br>• Fluid tracking along fascial planes<br>• Fat stranding<br><br>Absence of gas doesn't rule out NecFasc!</div></div><button class="btn" onclick="nextStage()">Antibiotics →</button></div></div>`;
    };

    window.render_antibiotics = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 10</div><div class="scene-title">Antibiotic Therapy</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What comorbidities would change your management approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#f5f3ff; border:1px solid #8b5cf6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #8b5cf6;">
                    <p style="margin:0; color:#5b21b6; font-size:0.9rem;"><strong>📋 Board Tip:</strong> Document your clinical reasoning clearly</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Empiric Coverage for NecFasc</div><table class="comparison-table"><tr><th>Coverage</th><th>Agent</th></tr><tr><td><strong>Gram-positive (including MRSA)</strong></td><td>Vancomycin</td></tr><tr><td><strong>Gram-negative</strong></td><td>Piperacillin-tazobactam OR carbapenem</td></tr><tr><td><strong>Anaerobes</strong></td><td>Covered by pip-tazo/carbapenem OR add metronidazole</td></tr><tr><td><strong>Toxin suppression</strong></td><td>Clindamycin (inhibits toxin production)</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Clindamycin?</div><div class="pathway"><strong>Clindamycin is KEY for toxin-producing infections:</strong><br><br>• Inhibits bacterial protein synthesis<br>→ Suppresses toxin production<br>→ Important for GAS, Staph, Clostridium<br><br>• Works even when bacteria not dividing<br>  (Eagle effect with beta-lactams)<br><br>Add to regimen for suspected NecFasc!</div></div><div class="alert-box"><div class="alert-title">⚠️ Vibrio Considerations</div><p>Saltwater/shellfish exposure: Add doxycycline or fluoroquinolone for Vibrio vulnificus coverage.</p></div><button class="btn" onclick="nextStage()">Surgery →</button></div></div>`;
    };

    window.render_surgery = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 10</div><div class="scene-title">Surgical Debridement</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate acuity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would renal or hepatic impairment affect drug dosing?</p>
                </div><div class="alert-box"><div class="alert-title">🚨 Surgery is the ONLY Definitive Treatment!</div><p>Antibiotics without surgery = death. Every hour of delay increases mortality. If in doubt, explore surgically.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Surgical Principles</div><table class="comparison-table"><tr><th>Principle</th><th>Details</th></tr><tr><td><strong>Timing</strong></td><td>EMERGENT - within hours of diagnosis</td></tr><tr><td><strong>Goal</strong></td><td>Remove ALL necrotic tissue</td></tr><tr><td><strong>Extent</strong></td><td>Debride until bleeding, healthy tissue</td></tr><tr><td><strong>Re-exploration</strong></td><td>Planned return to OR in 24-48h</td></tr><tr><td><strong>Wound management</strong></td><td>Leave open; VAC therapy; delayed closure</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Intraoperative Findings</div><div class="pathway"><strong>Confirms diagnosis:</strong><br>• "Dishwater" gray purulent fluid<br>• Easy dissection along fascial planes<br>  ("finger test" positive)<br>• Non-bleeding, gray necrotic tissue<br>• Foul odor<br>• Thrombosed vessels<br><br>Debride until you reach bleeding tissue!</div></div><button class="btn" onclick="nextStage()">Fournier's →</button></div></div>`;
    };

    window.render_fournier = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 10</div><div class="scene-title">Fournier's Gangrene</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the most likely diagnosis given this presentation?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if the patient doesn't respond to initial treatment?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Always consider mimics and look-alikes in your differential</p>

(function() {

    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');

                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';

            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +

            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +

            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
