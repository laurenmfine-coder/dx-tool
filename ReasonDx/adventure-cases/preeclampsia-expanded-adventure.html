    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #be185d 0%, #ec4899 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(190, 24, 93, 0.9); border-radius: 16px; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; background: #ec4899; margin-left: 10px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ec4899, #fbcfe8); border-radius: 3px; }
        .scene { background: linear-gradient(135deg, #be185d, #db2777); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .scene-header { background: rgba(236, 72, 153, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #fbcfe8; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(236,72,153,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #ec4899, #be185d); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #fbcfe8; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','definitions','severity','hellp','magnesium','antihypertensives','eclampsia','delivery','postpartum','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">🤰 Preeclampsia & Eclampsia<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Elevated Blood Pressure at 34 Weeks</div></div><div class="scene-body"><div class="narrative"><p>A <span class="highlight">28-year-old G1P0</span> at 34 weeks presents with <span class="critical">headache, visual changes, and RUQ pain</span>. BP at clinic was 168/108.</p><p style="margin-top:12px;"><strong>Vitals:</strong> BP 172/110, HR 88<br><strong>Labs:</strong> Plt 98K, AST 245, ALT 198, Cr 1.2<br><strong>Urine:</strong> 3+ protein</p></div><div class="alert-box"><div class="alert-title">🚨 Preeclampsia with Severe Features!</div><p>Multiple warning signs: severe BP, symptoms (headache, visual changes, RUQ pain), thrombocytopenia, elevated LFTs. This is an emergency!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Pathophysiology</div><div class="pathway">Abnormal placentation<br>→ Placental ischemia<br>→ Release of anti-angiogenic factors<br>  (sFlt-1, soluble endoglin)<br>→ Widespread endothelial dysfunction<br>→ Vasoconstriction, ↑ permeability<br>→ HTN, proteinuria, edema, organ damage</div></div><button class="btn" onclick="nextStage()">Definitions →</button></div></div>`;
    };

    window.render_definitions = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">Hypertensive Disorders of Pregnancy</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Classifications</div><table class="comparison-table"><tr><th>Disorder</th><th>Definition</th></tr><tr><td><strong>Gestational HTN</strong></td><td>BP ≥140/90 after 20 weeks, NO proteinuria, resolves postpartum</td></tr><tr><td><strong>Preeclampsia</strong></td><td>BP ≥140/90 after 20 weeks + proteinuria OR end-organ dysfunction</td></tr><tr><td><strong>Eclampsia</strong></td><td>Preeclampsia + seizures</td></tr><tr><td><strong>Chronic HTN</strong></td><td>HTN before 20 weeks or persisting >12 weeks postpartum</td></tr><tr><td><strong>Superimposed preeclampsia</strong></td><td>Chronic HTN + new proteinuria or worsening after 20 weeks</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Proteinuria Definition</div><div class="pathway"><strong>Significant proteinuria:</strong><br>• ≥300 mg/24-hour collection<br>• Protein/creatinine ratio ≥0.3<br>• Dipstick ≥1+ (if other methods unavailable)<br><br><strong>Note:</strong> Proteinuria no longer REQUIRED<br>for preeclampsia diagnosis if other<br>severe features present!</div></div><button class="btn" onclick="nextStage()">Severity →</button></div></div>`;
    };

    window.render_severity = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">Severe Features</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Preeclampsia with Severe Features (Any ONE)</div><table class="comparison-table"><tr><th>Feature</th><th>Criteria</th></tr><tr><td><strong>Severe HTN</strong></td><td>SBP ≥160 OR DBP ≥110 (×2, minutes apart)</td></tr><tr><td><strong>Thrombocytopenia</strong></td><td>Platelets <100,000</td></tr><tr><td><strong>Liver dysfunction</strong></td><td>AST/ALT >2× normal OR severe RUQ/epigastric pain</td></tr><tr><td><strong>Renal insufficiency</strong></td><td>Creatinine >1.1 or doubling</td></tr><tr><td><strong>Pulmonary edema</strong></td><td>Clinical or radiographic</td></tr><tr><td><strong>Cerebral/visual symptoms</strong></td><td>Headache, visual changes, altered mental status</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 Severe Features = Delivery Usually Indicated!</div><p>Preeclampsia with severe features after 34 weeks → deliver. Before 34 weeks → consider expectant management only at tertiary center with close monitoring.</p></div><button class="btn" onclick="nextStage()">HELLP →</button></div></div>`;
    };

    window.render_hellp = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">HELLP Syndrome</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 HELLP Criteria</div><table class="comparison-table"><tr><th>Letter</th><th>Finding</th><th>Criteria</th></tr><tr><td><strong>H</strong></td><td>Hemolysis</td><td>Schistocytes, ↑LDH, ↑indirect bili, ↓haptoglobin</td></tr><tr><td><strong>EL</strong></td><td>Elevated Liver enzymes</td><td>AST/ALT >2× upper normal</td></tr><tr><td><strong>LP</strong></td><td>Low Platelets</td><td><100,000</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 HELLP = Severe Preeclampsia Variant!</div><p>May occur without severe HTN or proteinuria! High morbidity: DIC, placental abruption, liver hematoma/rupture. Delivery is definitive treatment.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 HELLP Complications</div><div class="pathway">• DIC (~20%)<br>• Placental abruption<br>• AKI<br>• Pulmonary edema<br>• Liver hematoma/rupture (rare but fatal)<br>• Stroke<br>• Maternal mortality 1-3%</div></div><button class="btn" onclick="nextStage()">Magnesium →</button></div></div>`;
    };

    window.render_magnesium = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">Magnesium Sulfate</div></div><div class="scene-body"><div class="alert-box"><div class="alert-title">🚨 Magnesium = Seizure Prophylaxis!</div><p>Give magnesium to ALL patients with preeclampsia with severe features. It prevents eclamptic seizures and is continued 24-48 hours postpartum.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Magnesium Protocol</div><table class="comparison-table"><tr><th>Phase</th><th>Dose</th></tr><tr><td><strong>Loading</strong></td><td>4-6 g IV over 20-30 minutes</td></tr><tr><td><strong>Maintenance</strong></td><td>1-2 g/hr IV continuous</td></tr><tr><td><strong>Duration</strong></td><td>24-48 hours after delivery</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Magnesium Toxicity</div><div class="pathway"><strong>Therapeutic level:</strong> 4-7 mEq/L<br><br><strong>Signs of toxicity by level:</strong><br>• 8-12: Loss of DTRs<br>• 10-12: Respiratory depression<br>• >12: Cardiac arrest<br><br><strong>Monitor for toxicity:</strong><br>• Check DTRs (patellar reflex)<br>• Monitor respiratory rate (>12)<br>• Urine output (>25-30 mL/hr)<br><br><strong>Antidote:</strong> Calcium gluconate 1g IV</div></div><button class="btn" onclick="nextStage()">Antihypertensives →</button></div></div>`;
    };

    window.render_antihypertensives = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">Blood Pressure Management</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Acute BP Treatment</div><table class="comparison-table"><tr><th>Agent</th><th>Dose</th><th>Notes</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Labetalol</strong></td><td>20 mg IV, then 40, 80 mg q10min</td><td>First-line; max 300 mg</td></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Hydralazine</strong></td><td>5-10 mg IV q20min</td><td>First-line alternative</td></tr><tr><td><strong>Nifedipine</strong></td><td>10-20 mg PO q20-30min</td><td>Immediate-release; max 50 mg</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 BP Goal: <160/110</div><p>Treat severe HTN (≥160/110) within 30-60 minutes to prevent stroke! Don't drop BP too fast - maintain uteroplacental perfusion.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Drugs to AVOID</div><div class="pathway"><strong>ACE inhibitors / ARBs:</strong><br>Teratogenic, contraindicated in pregnancy<br><br><strong>Nitroprusside:</strong><br>Cyanide toxicity risk to fetus<br><br><strong>Atenolol:</strong><br>Associated with fetal growth restriction</div></div><button class="btn" onclick="nextStage()">Eclampsia →</button></div></div>`;
    };

    window.render_eclampsia = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 10</div><div class="scene-title">Eclamptic Seizures</div></div><div class="scene-body"><div class="alert-box"><div class="alert-title">🚨 Eclampsia = Seizures in Preeclampsia!</div><p>Can occur antepartum, intrapartum, or postpartum (up to 4 weeks!). Most occur within 48 hours of delivery.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Eclampsia Management</div><table class="comparison-table"><tr><th>Step</th><th>Action</th></tr><tr><td>1</td><td>Protect airway, position on side</td></tr><tr><td>2</td><td>Magnesium 4-6 g IV bolus (if not already on)</td></tr><tr><td>3</td><td>Magnesium 2 g IV bolus if already on magnesium</td></tr><tr><td>4</td><td>If refractory: Lorazepam 4 mg IV OR Diazepam 5-10 mg IV</td></tr><tr><td>5</td><td>Stabilize mother, then deliver</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Key Points</div><div class="pathway"><strong>Magnesium is first-line for eclampsia!</strong><br>(NOT traditional anticonvulsants)<br><br>• Most seizures self-terminate in 1-2 min<br>• Fetal bradycardia common during seizure<br>  (usually recovers - don't rush to C-section)<br>• Stabilize mother first, then deliver<br>• Delivery is definitive treatment</div></div><button class="btn" onclick="nextStage()">Delivery →</button></div></div>`;
    };

    window.render_delivery = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 10</div><div class="scene-title">Timing of Delivery</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Delivery Timing Guidelines</div><table class="comparison-table"><tr><th>Gestational Age</th><th>Recommendation</th></tr><tr><td><strong>≥37 weeks</strong></td><td>Deliver (any preeclampsia)</td></tr><tr><td><strong>34-36+6 weeks</strong></td><td>Deliver if severe features</td></tr><tr><td><strong><34 weeks</strong></td><td>Expectant management at tertiary center IF stable; steroids for fetal lungs</td></tr><tr><td><strong>Eclampsia/HELLP</strong></td><td>Deliver after stabilization (any GA)</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Steroids for Fetal Lungs</div><div class="pathway"><strong>If <34 weeks and delivery expected:</strong><br>• Betamethasone 12 mg IM × 2 doses, 24h apart<br>  OR<br>• Dexamethasone 6 mg IM q12h × 4 doses<br><br>Reduces RDS, IVH, NEC, death<br><br>Optimal benefit at 48 hours<br>but give even if delivery imminent</div></div><div class="alert-box"><div class="alert-title">⚠️ Route of Delivery</div><p>Vaginal delivery preferred if feasible. C-section for obstetric indications (non-reassuring fetal status, unfavorable cervix with urgent need for delivery).</p></div><button class="btn" onclick="nextStage()">Postpartum →</button></div></div>`;
    };

    window.render_postpartum = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 10</div><div class="scene-title">Postpartum Management</div></div><div class="scene-body"><div class="alert-box"><div class="alert-title">⚠️ Preeclampsia Can Worsen Postpartum!</div><p>BP often peaks 3-6 days postpartum. Continue monitoring. Eclampsia can occur up to 4 weeks postpartum!</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Postpartum Care</div><table class="comparison-table"><tr><th>Intervention</th><th>Duration/Details</th></tr><tr><td><strong>Magnesium</strong></td><td>Continue 24-48 hours post-delivery</td></tr><tr><td><strong>BP monitoring</strong></td><td>Frequent checks, especially days 3-6</td></tr><tr><td><strong>Antihypertensives</strong></td><td>Oral agents (labetalol, nifedipine); avoid ACEi if breastfeeding initially</td></tr><tr><td><strong>NSAIDs</strong></td><td>Avoid if severe HTN, renal dysfunction, or low platelets</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Long-term Risks</div><div class="pathway"><strong>History of preeclampsia increases:</strong><br>• Future preeclampsia (15-20%)<br>• Chronic hypertension (2-4×)<br>• Cardiovascular disease (2×)<br>• Stroke (2×)<br>• Type 2 diabetes<br><br>Counsel on lifestyle modification<br>and long-term CV risk reduction</div></div><button class="btn" onclick="nextStage()">Debrief →</button></div></div>`;
    };

    window.render_debrief = function() {
        return `<div class="scene"><div style="text-align:center;padding:40px;"><div style="font-size:4rem;margin-bottom:12px;">🤰</div><div style="font-size:1.8rem;font-weight:700;color:#4ade80;">Preeclampsia & Eclampsia Mastery!</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 High-Yield Summary</div><table class="comparison-table"><tr><th>Concept</th><th>Key Point</th></tr><tr><td>Definition</td><td>HTN + proteinuria OR end-organ dysfunction after 20 weeks</td></tr><tr><td>Severe features</td><td>BP ≥160/110, plt <100K, elevated LFTs, symptoms</td></tr><tr><td>HELLP</td><td>Hemolysis, Elevated Liver enzymes, Low Platelets</td></tr><tr><td>Magnesium</td><td>Seizure prophylaxis; antidote = calcium gluconate</td></tr><tr><td>BP treatment</td><td>Labetalol or hydralazine first-line; goal <160/110</td></tr><tr><td>Delivery</td><td>Definitive treatment; timing based on severity + GA</td></tr></table></div><div class="tips"><div class="pearl"><div class="tip-header">✓ Pearls</div><ul style="margin-left:16px;"><li>Magnesium for ALL severe preeclampsia</li><li>Check DTRs for Mg toxicity</li><li>BP peaks days 3-6 postpartum</li><li>Delivery is the cure</li></ul></div><div class="pitfall"><div class="tip-header">✗ Pitfalls</div><ul style="margin-left:16px;"><li>Missing HELLP without severe HTN</li><li>ACE inhibitors in pregnancy</li><li>Rushing to C-section during seizure</li><li>Stopping monitoring postpartum</li></ul></div></div><button class="btn" onclick="state.stage=0;render()">🔄 Restart Case</button></div></div>`;
    };

    render();
    </script>

        <div style="background: white; border-radius: 8px; padding: 14px; border-left: 4px solid #10b981;">

            <a href="../CoachDx/mentor-chat.html" style="display: block; color: #2563eb; font-size: 14px;">→ Practice with AI Coach</a>
            <a href="../CoachDx/sbar-trainer.html" style="display: block; color: #2563eb; font-size: 14px;">→ SBAR Communication</a>
        </div>
    </div>
</div>
<!-- END CROSS-PLATFORM LINKS -->
<div class="rdx-refs-panel" id="rdxRefsPanel">
    <div class="rdx-refs-title">📚 References & Evidence-Based Resources</div>
    <div class="rdx-refs-links"><a href="https://www.acog.org/clinical/clinical-guidance" target="_blank" class="text-blue-600 hover:underline">ACOG Practice Bulletins</a> | <a href="https://www.ncbi.nlm.nih.gov/books/NBK570611/" target="_blank" class="text-blue-600 hover:underline">StatPearls: Obstetric Emergencies</a></div>
</div>

<div class="rdx-debrief-overlay" id="rdxDebriefOverlay" style="display:none;">
    <div class="rdx-debrief-panel" id="rdxDebriefContent"></div>
</div>

<script>
// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
    
    // Auto-inject hint examples into existing content
    window.rdxInit = function() {
        // Could add dynamic hint injection here based on difficulty
        console.log('ReasonDx Enhanced Features loaded for: Preeclampsia Expanded Adventure');
    };
    
    // Initialize on load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.rdxInit);
    } else {
        window.rdxInit();
    }
})();
</script>
<!-- ==================== END REASONDX ENHANCED FEATURES ==================== -->

</body>
</html>
