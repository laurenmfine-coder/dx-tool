<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Tiny Wheezers | ReasonDx Adventure</title>
<style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#06B6D4;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#0891B2,#06B6D4);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(6,182,212,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(6,182,212,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#000;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(6,182,212,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#000}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(6,182,212,.1);border:1px solid rgba(6,182,212,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#67E8F9;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#000;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
<header class="header"><div class="header-row"><div style="font-weight:600">👶 Tiny Wheezers</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
<main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'6mo M',wt:'7kg',hx:'URI x3 days, now increased work of breathing, decreased feeding',exam:'Tachypneic, subcostal retractions, diffuse wheezes, adequate O2',vitals:{HR:'148',RR:'52',Temp:'100.4°F',SpO2:'94%'},labs:{Hx:'RSV season, daycare exposure'}},int:{age:'3mo F',wt:'5kg',hx:'Former preemie (32wk), URI symptoms, now apneic episodes',exam:'Lethargic, significant retractions, poor air entry, desaturations',vitals:{HR:'168',RR:'68',Temp:'99.8°F',SpO2:'88%'},labs:{Hx:'Ex-preemie, apnea history'}},adv:{age:'8mo M',wt:'8kg',hx:'Severe respiratory distress, not responding to supportive care',exam:'Exhausted, nasal flaring, head bobbing, minimal air movement',vitals:{HR:'175',RR:'70',Temp:'101°F',SpO2:'82%'},labs:{Hx:'Failed HFNC, considering intubation'}}};
const Q=[
{t:'Etiology',q:'Most common cause of bronchiolitis?',h:'Viral pathogen',o:[{id:'a',txt:'RSV (Respiratory Syncytial Virus) - causes 50-80% of cases',c:1,p:100},{id:'b',txt:'Bacterial infection',c:0,p:20},{id:'c',txt:'Influenza',c:0,p:30}],fb:{1:'<b>Correct!</b> RSV causes most bronchiolitis. Other causes: rhinovirus, parainfluenza, metapneumovirus, adenovirus. Peak season November-March.',0:'<b>RSV:</b> Most common cause (50-80%). Viral, not bacterial.'}},
{t:'Age Group',q:'What age group is bronchiolitis most common?',h:'Developmental vulnerability',o:[{id:'a',txt:'Infants <12 months (peak 2-6 months)',c:1,p:100},{id:'b',txt:'School-age children',c:0,p:20},{id:'c',txt:'Adolescents',c:0,p:10}],fb:{1:'<b>Correct!</b> Bronchiolitis primarily affects infants <12 months (peak 2-6 months). Small airways more vulnerable to obstruction. By age 2, most children have been infected with RSV.',0:'<b>Age:</b> Infants <12 months, peak 2-6 months.'}},
{t:'Diagnosis',q:'How is bronchiolitis diagnosed?',h:'Clinical diagnosis',o:[{id:'a',txt:'Clinical diagnosis based on history and exam - routine testing not recommended',c:1,p:100},{id:'b',txt:'CXR required',c:0,p:30},{id:'c',txt:'Blood tests essential',c:0,p:20}],fb:{1:'<b>Correct!</b> Clinical diagnosis: URI prodrome + lower respiratory signs (wheeze, crackles, increased work of breathing). Routine RSV testing, CXR, and labs NOT recommended for typical cases.',0:'<b>Diagnosis:</b> Clinical. Routine testing not recommended.'}},
{t:'Treatment',q:'Primary treatment for bronchiolitis?',h:'AAP guidelines',o:[{id:'a',txt:'Supportive care: O2 if SpO2 <90%, hydration, nasal suctioning',c:1,p:100},{id:'b',txt:'Bronchodilators',c:0,p:40},{id:'c',txt:'Antibiotics',c:0,p:20}],fb:{1:'<b>Correct!</b> Supportive care only: O2 for SpO2 <90%, hydration (IV/NG if poor feeding), nasal suctioning. Bronchodilators, steroids, and antibiotics NOT routinely recommended.',0:'<b>Treatment:</b> Supportive only. Bronchodilators and steroids NOT recommended.'}},
{t:'High-Risk Groups',q:'Which infants are at highest risk for severe bronchiolitis?',h:'Risk stratification',o:[{id:'a',txt:'Premature infants, <3 months age, CHD, chronic lung disease, immunodeficiency',c:1,p:100},{id:'b',txt:'Term infants only',c:0,p:20},{id:'c',txt:'Older children',c:0,p:10}],fb:{1:'<b>Correct!</b> High risk: Preterm (<37wk), age <3 months, CHD, chronic lung disease, immunodeficiency, neuromuscular disease. Consider palivizumab prophylaxis for high-risk groups.',0:'<b>High risk:</b> Preemies, <3mo, CHD, CLD, immunodeficiency.'}},
{t:'Admission Criteria',q:'Indications for admission in bronchiolitis?',h:'When supportive care needed',o:[{id:'a',txt:'SpO2 <90% on room air, poor feeding/dehydration, significant respiratory distress, apnea, high-risk infant',c:1,p:100},{id:'b',txt:'All bronchiolitis',c:0,p:20},{id:'c',txt:'Positive RSV test',c:0,p:20}],fb:{1:'<b>Correct!</b> Admit if: Hypoxemia (SpO2 <90%), poor feeding/dehydration, significant distress, apnea, high-risk infant (<3mo, preemie, comorbidities), unreliable follow-up.',0:'<b>Admit:</b> Hypoxemia, poor feeding, significant distress, apnea, high-risk.'}},
{t:'Respiratory Support',q:'Escalating respiratory support options for severe bronchiolitis?',h:'Before intubation',o:[{id:'a',txt:'Low-flow O2 → High-flow nasal cannula (HFNC) → CPAP → Intubation',c:1,p:100},{id:'b',txt:'Intubation first',c:0,p:20},{id:'c',txt:'ECMO for all',c:0,p:10}],fb:{1:'<b>Correct!</b> Escalation: Standard O2 → HFNC (1-2 L/kg/min) → CPAP → Intubation. HFNC reduces intubation rates. Heliox sometimes used.',0:'<b>Escalation:</b> O2 → HFNC → CPAP → intubation.'}},
{t:'Prevention',q:'Primary prevention strategy for RSV bronchiolitis in high-risk infants?',h:'Passive immunization',o:[{id:'a',txt:'Palivizumab (anti-RSV monoclonal antibody) monthly during RSV season for high-risk infants',c:1,p:100},{id:'b',txt:'Vaccine for infants',c:0,p:30},{id:'c',txt:'Antibiotics',c:0,p:10}],fb:{1:'<b>Correct!</b> Palivizumab: Monthly injection during RSV season for high-risk infants (preterm <29wk, CHD, CLD). Nirsevimab (longer-acting) now available. RSV vaccines approved for older adults and pregnant women.',0:'<b>Prevention:</b> Palivizumab or nirsevimab for high-risk infants.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>👶 Tiny Wheezers</h1><p style="color:var(--muted);margin-bottom:32px">Bronchiolitis: RSV, supportive care, high-risk groups, respiratory support</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">👶 Infant in Distress</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Bronchiolitis Pearls</div><div class="pearl-item"><b>Cause:</b> RSV most common (50-80%)</div><div class="pearl-item"><b>Age:</b> Infants <12 months, peak 2-6 months</div><div class="pearl-item"><b>Diagnosis:</b> Clinical - no routine testing</div><div class="pearl-item"><b>Treatment:</b> Supportive only (O2, hydration, suction)</div><div class="pearl-item"><b>NOT recommended:</b> Bronchodilators, steroids, antibiotics</div><div class="pearl-item"><b>High risk:</b> Preemies, <3mo, CHD, CLD</div><div class="pearl-item"><b>Prevention:</b> Palivizumab/nirsevimab for high-risk</div></div><div class="cross-link"><a href="peds-croup-adventure-enhanced.html">Related: Croup</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
