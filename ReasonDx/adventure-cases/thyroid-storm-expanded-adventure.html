<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thyroid Storm | Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #b45309 0%, #f59e0b 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(180, 83, 9, 0.9); border-radius: 16px; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; background: #f59e0b; margin-left: 10px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #f59e0b, #fde68a); border-radius: 3px; }
        .scene { background: linear-gradient(135deg, #b45309, #d97706); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .scene-header { background: rgba(245, 158, 11, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #fde68a; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(245,158,11,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #f59e0b, #d97706); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #fde68a; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','burch','triggers','betablock','ptu','iodine','steroids','supportive','disposition','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">🦋 Thyroid Storm<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Fever and Altered Mental Status</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would pregnancy change your approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Don't forget to consider mimics and look-alikes</p>
                </div><div class="narrative"><p>A <span class="highlight">42-year-old woman</span> with Graves' disease (non-compliant with methimazole) presents with <span class="critical">fever, confusion, tachycardia, and diarrhea</span> for 2 days. Had a URI last week.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 148 (irregularly irregular), BP 160/70, T 103.8°F, RR 26<br><strong>Exam:</strong> Agitated, diaphoretic, tremulous, exophthalmos, thyroid bruit<br><strong>Labs:</strong> TSH <0.01, Free T4 6.2 (nl 0.8-1.8)</p></div><div class="alert-box"><div class="alert-title">🚨 Thyroid Storm = Life-Threatening Emergency!</div><p>Mortality 10-30% even with treatment. This is a clinical diagnosis - labs alone cannot differentiate storm from severe thyrotoxicosis. Treatment must start immediately!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Pathophysiology</div><div class="pathway"><strong>NOT just "very high" thyroid hormone!</strong><br><br>Precipitant (infection, surgery, etc.)<br>→ Catecholamine surge<br>→ ↑↑ Tissue sensitivity to T3/T4<br>→ Multi-organ hypermetabolic state<br>→ Cardiovascular collapse, hyperthermia</div></div><button class="btn" onclick="nextStage()">Burch-Wartofsky Score →</button></div></div>`;
    };

    window.render_burch = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">Burch-Wartofsky Score</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate severity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if this patient had renal impairment?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Burch-Wartofsky Point Scale</div><table class="comparison-table"><tr><th>Criterion</th><th>Points</th></tr><tr><td><strong>Temperature</strong></td><td>99-99.9°F: 5, 100-100.9°F: 10, 101-101.9°F: 15, 102-102.9°F: 20, 103-103.9°F: 25, ≥104°F: 30</td></tr><tr><td><strong>CNS effects</strong></td><td>Absent: 0, Mild agitation: 10, Moderate (delirium): 20, Severe (seizures, coma): 30</td></tr><tr><td><strong>GI-Hepatic</strong></td><td>Absent: 0, Moderate (diarrhea, N/V): 10, Severe (jaundice): 20</td></tr><tr><td><strong>Heart rate</strong></td><td>100-109: 5, 110-119: 10, 120-129: 15, 130-139: 20, ≥140: 25</td></tr><tr><td><strong>CHF</strong></td><td>Absent: 0, Mild: 5, Moderate: 10, Severe: 15</td></tr><tr><td><strong>Atrial fibrillation</strong></td><td>Absent: 0, Present: 10</td></tr><tr><td><strong>Precipitant</strong></td><td>Absent: 0, Present: 10</td></tr></table><p style="margin-top:12px;"><strong>≥45:</strong> Thyroid storm<br><strong>25-44:</strong> Impending storm<br><strong><25:</strong> Storm unlikely</p></div><button class="btn" onclick="nextStage()">Triggers →</button></div></div>`;
    };

    window.render_triggers = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">Precipitating Factors</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Think about the most common causes first</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does immunosuppression affect the differential?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Common Triggers</div><table class="comparison-table"><tr><th>Category</th><th>Examples</th></tr><tr><td><strong>Infection</strong></td><td>Most common! URI, UTI, pneumonia</td></tr><tr><td><strong>Surgery/Trauma</strong></td><td>Especially thyroid surgery</td></tr><tr><td><strong>Medication</strong></td><td>Stopping antithyroid drugs, iodine contrast</td></tr><tr><td><strong>Iodine load</strong></td><td>CT contrast, amiodarone</td></tr><tr><td><strong>Pregnancy</strong></td><td>Labor, delivery</td></tr><tr><td><strong>Other</strong></td><td>DKA, PE, MI, CVA, severe emotional stress</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Triggers Matter</div><div class="pathway"><strong>Same thyroid hormone levels but different:</strong><br>Stable thyrotoxicosis vs Storm<br><br><strong>Trigger provides the "second hit":</strong><br>• Catecholamine release (stress, infection)<br>• Cytokine storm<br>• Impaired thermoregulation<br>• Cardiovascular stress<br><br>Always search for and treat precipitant!</div></div><button class="btn" onclick="nextStage()">Beta-Blockers →</button></div></div>`;
    };

    window.render_betablock = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">Step 1: Beta-Blockade</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the key history element pointing to diagnosis?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would pregnancy change your approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Always reassess if patient not improving as expected</p>
                </div><div class="alert-box"><div class="alert-title">🚨 First Priority = Block Catecholamine Effects!</div><p>Beta-blockers address the most immediately life-threatening features: tachycardia, hypertension, tremor, agitation.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Beta-Blocker Options</div><table class="comparison-table"><tr><th>Drug</th><th>Dose</th><th>Notes</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Propranolol</strong></td><td>60-80 mg PO q4-6h<br>OR 1 mg IV slow q10-15min</td><td>Preferred - also blocks T4→T3 conversion</td></tr><tr><td><strong>Esmolol</strong></td><td>500 mcg/kg load, then 50-100 mcg/kg/min</td><td>Short-acting; titratable; if unstable</td></tr><tr><td><strong>Metoprolol</strong></td><td>5 mg IV q5min × 3</td><td>Alternative if propranolol unavailable</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Propranolol is Preferred</div><div class="pathway"><strong>Propranolol has TWO benefits:</strong><br><br>1. Beta-blockade (like all beta-blockers)<br>   → ↓ HR, ↓ BP, ↓ tremor<br><br>2. Inhibits peripheral T4 → T3 conversion<br>   → ↓ Active thyroid hormone<br>   (unique to propranolol at high doses)<br><br><strong>Caution in:</strong><br>• Severe heart failure<br>• Severe bronchospasm<br>→ Use esmolol or very careful dosing</div></div><button class="btn" onclick="nextStage()">PTU/Methimazole →</button></div></div>`;
    };

    window.render_ptu = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">Step 2: Block Hormone Synthesis</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if this patient had renal impairment?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Thionamide Options</div><table class="comparison-table"><tr><th>Drug</th><th>Dose</th><th>Notes</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>PTU</strong></td><td>500-1000 mg load, then 250 mg q4h</td><td>Preferred in storm - blocks T4→T3</td></tr><tr><td><strong>Methimazole</strong></td><td>60-80 mg/day divided</td><td>Alternative if PTU unavailable</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why PTU Preferred in Storm</div><div class="pathway"><strong>PTU has TWO mechanisms:</strong><br><br>1. Blocks thyroid peroxidase (TPO)<br>   → ↓ Hormone synthesis<br>   (same as methimazole)<br><br>2. Blocks peripheral T4 → T3 conversion<br>   → ↓ Active hormone faster<br>   (methimazole does NOT do this)<br><br><strong>Major side effect:</strong><br>Hepatotoxicity (rare but serious)<br>→ PTU only for storm/pregnancy 1st tri<br>→ Methimazole for chronic management</div></div><div class="alert-box"><div class="alert-title">⚠️ PTU Dosing Note</div><p>Loading dose is MUCH higher than chronic dosing. Don't underdose in storm. Can give rectally if patient cannot take PO.</p></div><button class="btn" onclick="nextStage()">Iodine →</button></div></div>`;
    };

    window.render_iodine = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">Step 3: Block Hormone Release</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate severity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does immunosuppression affect the differential?</p>
                </div><div class="alert-box"><div class="alert-title">🚨 Give Iodine ≥1 HOUR After PTU!</div><p>Iodine without PTU blockade can worsen storm (Jod-Basedow effect). PTU must be on board first to block new hormone synthesis.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Iodine Options</div><table class="comparison-table"><tr><th>Drug</th><th>Dose</th></tr><tr><td><strong>SSKI (potassium iodide)</strong></td><td>5 drops PO q6h</td></tr><tr><td><strong>Lugol's solution</strong></td><td>8 drops PO q6h</td></tr><tr><td><strong>Ipodate/Iopanoic acid</strong></td><td>500 mg PO q12h (if available)</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Wolff-Chaikoff Effect</div><div class="pathway"><strong>High iodine concentration:</strong><br>→ Blocks thyroid hormone release<br>→ Also blocks organification<br><br><strong>This is temporary!</strong><br>Thyroid "escapes" after ~10 days<br><br><strong>Why wait for PTU first?</strong><br>Without blocked synthesis, excess iodine<br>becomes substrate for MORE hormone<br>= Jod-Basedow phenomenon<br>= Worsening hyperthyroidism</div></div><button class="btn" onclick="nextStage()">Steroids →</button></div></div>`;
    };

    window.render_steroids = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 10</div><div class="scene-title">Step 4: Glucocorticoids</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Think about the most common causes first</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would pregnancy change your approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fefce8; border:1px solid #eab308; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #eab308;">
                    <p style="margin:0; color:#854d0e; font-size:0.9rem;"><strong>🚫 Common Mistake:</strong> Avoid anchoring bias - keep differential broad initially</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Steroid Dosing</div><table class="comparison-table"><tr><th>Drug</th><th>Dose</th></tr><tr><td><strong>Hydrocortisone</strong></td><td>100 mg IV q8h</td></tr><tr><td><strong>Dexamethasone</strong></td><td>2 mg IV q6h</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Steroids?</div><div class="pathway"><strong>THREE reasons:</strong><br><br>1. Block peripheral T4 → T3 conversion<br>   (third agent that does this!)<br><br>2. Treat relative adrenal insufficiency<br>   (hyperthyroidism ↑ cortisol metabolism)<br><br>3. Treat possible Graves' ophthalmopathy<br>   and autoimmune component<br><br><strong>Taper:</strong><br>Once stable, taper over several days</div></div><div class="alert-box"><div class="alert-title">📋 Treatment Order Summary</div><p>1. Beta-blocker (propranolol preferred)<br>2. PTU (thionamide)<br>3. Iodine (≥1 hour after PTU!)<br>4. Steroids<br>5. Treat precipitant!</p></div><button class="btn" onclick="nextStage()">Supportive Care →</button></div></div>`;
    };

    window.render_supportive = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 10</div><div class="scene-title">Supportive Measures</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the key history element pointing to diagnosis?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if this patient had renal impairment?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Supportive Care</div><table class="comparison-table"><tr><th>Issue</th><th>Management</th></tr><tr><td><strong>Hyperthermia</strong></td><td>Acetaminophen, cooling blankets, ice packs (NOT aspirin!)</td></tr><tr><td><strong>Dehydration</strong></td><td>Aggressive IV fluids + dextrose (high metabolic rate)</td></tr><tr><td><strong>Atrial fibrillation</strong></td><td>Beta-blocker (rate control); cardioverts when euthyroid</td></tr><tr><td><strong>Heart failure</strong></td><td>Diuretics, digoxin (high-output failure)</td></tr><tr><td><strong>Precipitant</strong></td><td>Antibiotics if infection, etc.</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 NO ASPIRIN!</div><p>Aspirin displaces T4 from binding proteins → increases FREE (active) T4 → worsens storm. Use acetaminophen only!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Refractory Cases</div><div class="pathway"><strong>If not responding to standard therapy:</strong><br><br>• Plasmapheresis/plasma exchange<br>  (removes circulating hormone)<br><br>• Cholestyramine<br>  (blocks enterohepatic circulation)<br><br>• Lithium<br>  (blocks hormone release)<br><br>• Emergency thyroidectomy<br>  (last resort)</div></div><button class="btn" onclick="nextStage()">Disposition →</button></div></div>`;
    };

    window.render_disposition = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 10</div><div class="scene-title">Monitoring & Prognosis</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">

(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];

    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
