<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperkalemia Emergency | Dual-Mode Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        body.adult { background: linear-gradient(135deg, #7f1d1d 0%, #dc2626 100%); }
        body.peds { background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%); }
        .container { max-width: 900px; margin: 0 auto; }
        .mode-toggle { display: flex; justify-content: center; margin-bottom: 20px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 4px; }
        .mode-btn { flex: 1; padding: 12px 24px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; background: transparent; color: #e2e8f0; }
        .mode-btn.active { background: rgba(255,255,255,0.2); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-radius: 16px; margin-bottom: 20px; }
        .adult .header { background: rgba(127, 29, 29, 0.9); }
        .peds .header { background: rgba(124, 58, 237, 0.9); }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; margin-left: 10px; }
        .adult .badge { background: #dc2626; }
        .peds .badge { background: #a78bfa; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; border-radius: 3px; }
        .adult .progress-fill { background: linear-gradient(90deg, #dc2626, #fca5a5); }
        .peds .progress-fill { background: linear-gradient(90deg, #a78bfa, #c4b5fd); }
        .scene { border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .adult .scene { background: linear-gradient(135deg, #7f1d1d, #991b1b); }
        .peds .scene { background: linear-gradient(135deg, #6d28d9, #7c3aed); }
        .scene-header { padding: 16px 20px; }
        .adult .scene-header { background: rgba(220, 38, 38, 0.15); }
        .peds .scene-header { background: rgba(167, 139, 250, 0.15); }
        .scene-phase { font-size: 0.75rem; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(220,38,38,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .adult .btn { background: linear-gradient(135deg, #dc2626, #991b1b); }
        .peds .btn { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); }
        .why-chain { background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(220,38,38,0.15)); border: 1px solid rgba(139,92,246,0.3); border-radius: 16px; padding: 24px; margin: 24px 0; }
        .why-chain-title { font-size: 1.2rem; font-weight: 700; color: #c4b5fd; margin-bottom: 20px; }
        .why-item { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
        .why-q { font-weight: 600; color: #e9d5ff; margin-bottom: 10px; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="adult">
    <div class="container">
        <div class="mode-toggle">
            <button class="mode-btn active" onclick="setMode('adult')">🏥 Adult</button>
            <button class="mode-btn" onclick="setMode('peds')">👶 Pediatric</button>
        </div>
        <div id="app"></div>
    </div>
    <script>
    const STAGES = ['arrival','ecg','causes','pseudohyperK','stabilize','shift','eliminate','dialysis','chronic','debrief'];
    const state = { stage: 0, mode: 'adult' };

    function setMode(m) { state.mode = m; state.stage = 0; document.body.className = m; document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); render(); }
    function nextStage() { state.stage++; render(); }

    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        const icon = state.mode === 'adult' ? '⚡' : '👶⚡';
        const title = state.mode === 'adult' ? 'Hyperkalemia Emergency' : 'Pediatric Hyperkalemia';
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">${icon} ${title}<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }

    window.render_arrival = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Weakness and Palpitations</div></div><div class="scene-body"><div class="narrative"><p>A <span class="highlight">58-year-old man</span> with CKD stage 4 and diabetes presents with <span class="critical">progressive weakness and palpitations</span>. Takes lisinopril and spironolactone.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 52 (irregular), BP 108/68<br><strong>Labs:</strong> K+ 7.2 mEq/L, Cr 4.8, BUN 68<br><strong>ECG:</strong> Peaked T waves, widened QRS</p></div><div class="alert-box"><div class="alert-title">🚨 K+ >6.5 with ECG Changes = Emergency!</div><p>This patient is at risk for fatal arrhythmia. Treatment must begin IMMEDIATELY - don't wait for repeat labs!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Hyperkalemia Kills</div><div class="pathway">↑ Extracellular K+<br>→ ↓ K+ gradient across cell membrane<br>→ Resting membrane potential less negative<br>→ Cells partially depolarized at rest<br>→ Impaired depolarization/repolarization<br>→ Conduction abnormalities<br>→ Ventricular fibrillation / asystole</div></div><button class="btn" onclick="nextStage()">ECG Changes →</button></div></div>`;
        } else {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">The Weak Infant</div></div><div class="scene-body"><div class="narrative"><p>A <span class="highlight">3-week-old boy</span> presents with <span class="critical">poor feeding, lethargy, and weakness</span>. Born at term, uncircumcised, with ambiguous genitalia noted at birth.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 110, BP 58/35<br><strong>Labs:</strong> K+ 8.1 mEq/L, Na+ 118, Glucose 45<br><strong>Weight:</strong> 3.2 kg (birth weight 3.5 kg)</p></div><div class="alert-box"><div class="alert-title">🚨 Think Congenital Adrenal Hyperplasia!</div><p>Salt-wasting CAH (21-hydroxylase deficiency) presents with hyponatremia, hyperkalemia, and hypoglycemia in the first weeks of life. Ambiguous genitalia in males = undervirilized; in females = virilized.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Pediatric Causes</div><div class="pathway"><strong>Neonates:</strong><br>• CAH (salt-wasting)<br>• Renal failure<br>• Massive hemolysis<br>• Iatrogenic (K+ in fluids)<br><br><strong>Older children:</strong><br>• Renal disease<br>• Tumor lysis syndrome<br>• Rhabdomyolysis<br>• Medications (ACEi, K+-sparing diuretics)</div></div><button class="btn" onclick="nextStage()">ECG Changes →</button></div></div>`;
        }
    };

    window.render_ecg = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">ECG Progression - BOARDS FAVORITE</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 ECG Changes by K+ Level</div><table class="comparison-table"><tr><th>K+ Level</th><th>ECG Finding</th></tr><tr><td>5.5-6.5</td><td><strong>Peaked T waves</strong> (tall, narrow, "tented")</td></tr><tr><td>6.5-7.5</td><td>Prolonged PR interval, flattened P waves</td></tr><tr><td>7.0-8.0</td><td><strong>Widened QRS</strong></td></tr><tr><td>>8.0</td><td>Loss of P waves, sine wave pattern</td></tr><tr><td>>9.0</td><td>VF, asystole</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ ECG Changes Don't Always Correlate!</div><p>Some patients have severe hyperkalemia without ECG changes. Others have changes at lower levels. Rate of rise matters more than absolute value. TREAT THE PATIENT, not just the number!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why These ECG Changes?</div><div class="pathway"><strong>Peaked T waves:</strong><br>Accelerated repolarization (K+ leaves cells faster)<br><br><strong>Prolonged PR, flat P:</strong><br>Slowed atrial conduction<br><br><strong>Wide QRS:</strong><br>Slowed ventricular conduction<br><br><strong>Sine wave:</strong><br>Fusion of wide QRS with T wave<br>Pre-terminal rhythm!</div></div><button class="btn" onclick="nextStage()">Causes →</button></div></div>`;
    };

    window.render_causes = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">Etiology</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Mechanisms of Hyperkalemia</div><table class="comparison-table"><tr><th>Mechanism</th><th>Causes</th></tr><tr><td><strong>↑ Intake</strong></td><td>K+ supplements, salt substitutes, massive transfusion</td></tr><tr><td><strong>↓ Excretion</strong></td><td>Renal failure, hypoaldosteronism, K+-sparing diuretics</td></tr><tr><td><strong>Transcellular shift</strong></td><td>Acidosis, insulin deficiency, beta-blockers, cell lysis</td></tr><tr><td><strong>Cell lysis</strong></td><td>Rhabdo, tumor lysis, hemolysis, burns</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Common Drug Culprits</div><div class="pathway"><strong>ACE inhibitors / ARBs:</strong><br>↓ Aldosterone → ↓ K+ excretion<br><br><strong>K+-sparing diuretics:</strong><br>Spironolactone, amiloride, triamterene<br><br><strong>NSAIDs:</strong><br>↓ Renin → ↓ aldosterone<br><br><strong>Trimethoprim:</strong><br>Blocks ENaC (like amiloride)<br><br><strong>Heparin:</strong><br>↓ Aldosterone synthesis<br><br><strong>Beta-blockers:</strong><br>↓ K+ uptake into cells</div></div><button class="btn" onclick="nextStage()">Pseudohyperkalemia →</button></div></div>`;
    };

    window.render_pseudohyperK = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">Is It Real?</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Pseudohyperkalemia Causes</div><table class="comparison-table"><tr><th>Cause</th><th>Mechanism</th></tr><tr><td>Hemolyzed sample</td><td>RBC lysis releases K+ in tube</td></tr><tr><td>Prolonged tourniquet</td><td>Local ischemia → K+ release</td></tr><tr><td>Fist clenching</td><td>Muscle releases K+</td></tr><tr><td>Thrombocytosis (>500K)</td><td>K+ released during clotting</td></tr><tr><td>Leukocytosis (>100K)</td><td>WBC fragility</td></tr><tr><td>Difficult draw</td><td>Mechanical hemolysis</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ When to Suspect Pseudohyperkalemia</div><ul style="margin-left:20px;"><li>No ECG changes despite high K+</li><li>Patient asymptomatic</li><li>Known thrombocytosis/leukocytosis</li><li>Difficult blood draw noted</li><li>No obvious cause for true hyperkalemia</li></ul></div><div class="mechanism-box"><div class="mechanism-title">🧬 How to Confirm</div><div class="pathway"><strong>Repeat with plasma (not serum):</strong><br>Plasma = anticoagulated, no clotting<br>Serum = clotted, platelets release K+<br><br>If plasma K+ is normal but serum K+ high<br>→ Pseudohyperkalemia from clotting<br><br><strong>Also:</strong> Redraw with minimal tourniquet,<br>no fist clenching, gentle handling</div></div><button class="btn" onclick="nextStage()">Stabilize the Membrane →</button></div></div>`;
    };

    window.render_stabilize = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">Step 1: Cardiac Protection</div></div><div class="scene-body"><div class="alert-box"><div class="alert-title">🚨 Calcium = First Drug If ECG Changes!</div><p>Calcium stabilizes the cardiac membrane IMMEDIATELY. Give it before anything else if there are ECG changes or K+ >6.5.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Calcium Administration</div><table class="comparison-table"><tr><th>Drug</th><th>Dose</th><th>Notes</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Calcium gluconate 10%</strong></td><td>${state.mode === 'adult' ? '1-2 g (10-20 mL) IV over 2-3 min' : '50-100 mg/kg (0.5-1 mL/kg) IV over 5-10 min'}</td><td>Preferred - less tissue necrosis if extravasates</td></tr><tr><td>Calcium chloride 10%</td><td>${state.mode === 'adult' ? '500-1000 mg IV' : '20 mg/kg IV'}</td><td>3× more elemental Ca; use central line if possible</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 How Calcium Works</div><div class="pathway">Calcium does NOT lower K+!<br><br>It stabilizes the cardiac membrane:<br>• Raises threshold potential<br>• Restores gradient between resting and threshold<br>• Protects against arrhythmias<br><br><strong>Onset:</strong> 1-3 minutes<br><strong>Duration:</strong> 30-60 minutes<br><br>Can repeat if ECG changes persist<br>Buys time while you shift/eliminate K+</div></div><button class="btn" onclick="nextStage()">Shift K+ Into Cells →</button></div></div>`;
    };

    window.render_shift = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">Step 2: Intracellular Shift</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Shifting Therapies</div><table class="comparison-table"><tr><th>Treatment</th><th>Dose</th><th>Onset</th><th>Duration</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Insulin + Glucose</strong></td><td>${state.mode === 'adult' ? 'Regular insulin 10 U IV + D50 25g' : 'Regular insulin 0.1 U/kg + D25 2 mL/kg'}</td><td>15-30 min</td><td>4-6 hr</td></tr><tr><td><strong>Albuterol</strong></td><td>${state.mode === 'adult' ? '10-20 mg nebulized' : '2.5-5 mg nebulized'}</td><td>30 min</td><td>2 hr</td></tr><tr><td><strong>Sodium bicarbonate</strong></td><td>${state.mode === 'adult' ? '50-100 mEq IV' : '1-2 mEq/kg IV'}</td><td>30-60 min</td><td>2 hr</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 Insulin + Glucose: Watch for Hypoglycemia!</div><p>Give glucose WITH insulin. Check glucose at 30, 60, 90, 120 min. ~20% of patients become hypoglycemic. ${state.mode === 'peds' ? 'Higher risk in children!' : ''}</p></div><div class="why-chain"><div class="why-chain-title">🔗 WHY Chain</div><div class="why-item"><div class="why-q">Why does insulin shift K+?</div>Insulin activates Na+/K+-ATPase pump → K+ moves into cells. This is independent of glucose uptake. Effect lasts 4-6 hours.</div><div class="why-item"><div class="why-q">Why is bicarb less reliable?</div>Only works if patient is acidotic. In non-acidotic patients, minimal K+ shift. Best reserved for patients with metabolic acidosis.</div></div><button class="btn" onclick="nextStage()">Eliminate K+ →</button></div></div>`;
    };

    window.render_eliminate = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 10</div><div class="scene-title">Step 3: Remove Potassium</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Elimination Therapies</div><table class="comparison-table"><tr><th>Treatment</th><th>Dose</th><th>Onset</th><th>Notes</th></tr><tr><td><strong>Furosemide</strong></td><td>${state.mode === 'adult' ? '40-80 mg IV' : '1-2 mg/kg IV'}</td><td>15-30 min</td><td>Requires kidney function</td></tr><tr><td><strong>Kayexalate (SPS)</strong></td><td>${state.mode === 'adult' ? '15-60 g PO/PR' : '1 g/kg PO/PR'}</td><td>1-2 hrs</td><td>Slow; risk of bowel necrosis</td></tr><tr><td><strong>Patiromer</strong></td><td>8.4 g PO daily</td><td>7 hrs</td><td>Newer; for chronic use</td></tr><tr><td><strong>Lokelma (ZS-9)</strong></td><td>10 g PO TID × 48h</td><td>1 hr</td><td>Fastest GI binder</td></tr><tr><td><strong>Dialysis</strong></td><td>-</td><td>Immediate</td><td>Most effective; for severe/refractory</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ Kayexalate Controversy</div><p>Slow onset, limited efficacy, risk of intestinal necrosis (especially with sorbitol). Many experts no longer recommend. Newer binders (patiromer, Lokelma) are safer but take hours.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Loop Diuretics</div><div class="pathway">Furosemide blocks NKCC2 in thick ascending limb<br>→ ↓ K+ reabsorption<br>→ ↑ K+ excretion in urine<br><br><strong>Requirements:</strong><br>• Adequate kidney function<br>• Volume to diurese<br><br>Won't work in anuric patients<br>→ Need dialysis</div></div><button class="btn" onclick="nextStage()">Dialysis →</button></div></div>`;
    };

    window.render_dialysis = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 10</div><div class="scene-title">When to Dialyze</div></div><div class="scene-body"><div class="alert-box"><div class="alert-title">🚨 Dialysis Indications</div><ul style="margin-left:20px;"><li>K+ >6.5 with ECG changes refractory to medical therapy</li><li>Severe hyperkalemia (>7.0) with oliguria/anuria</li><li>Rapidly rising K+ despite treatment</li><li>ESRD patient with severe hyperkalemia</li><li>Hyperkalemia with other dialysis indications (acidosis, uremia)</li></ul></div><div class="mechanism-box"><div class="mechanism-title">🧬 Dialysis Effectiveness</div><div class="pathway"><strong>Hemodialysis:</strong><br>• Most effective method<br>• Removes 25-50 mEq K+ per hour<br>• Can lower K+ by 1-2 mEq/L in first hour<br><br><strong>Low-K+ dialysate (0-2 mEq/L):</strong><br>• Faster K+ removal<br>• Higher arrhythmia risk<br><br><strong>Standard K+ dialysate (2-3 mEq/L):</strong><br>• Safer, more gradual<br><br><strong>Peritoneal dialysis:</strong><br>• Slower but option if no HD access</div></div><div class="why-chain"><div class="why-chain-title">🔗 WHY Chain</div><div class="why-item"><div class="why-q">Why does K+ rebound after dialysis?</div>Dialysis removes extracellular K+ rapidly. Intracellular K+ then shifts out to re-equilibrate. May need multiple sessions or continuous therapy.</div></div><button class="btn" onclick="nextStage()">Chronic Management →</button></div></div>`;
    };

    window.render_chronic = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 10</div><div class="scene-title">Preventing Recurrence</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Chronic Management Strategies</div><table class="comparison-table"><tr><th>Strategy</th><th>Details</th></tr><tr><td>Dietary restriction</td><td>Limit high-K+ foods (bananas, oranges, potatoes, tomatoes)</td></tr><tr><td>Medication review</td><td>Stop/reduce ACEi, ARB, K+-sparing diuretics, NSAIDs</td></tr><tr><td>Diuretics</td><td>Thiazide or loop diuretic if volume tolerant</td></tr><tr><td>Fludrocortisone</td><td>If hypoaldosteronism (Type 4 RTA)</td></tr><tr><td>GI K+ binders</td><td>Patiromer or Lokelma for chronic use</td></tr></table></div>${state.mode === 'peds' ? `<div class="alert-box"><div class="alert-title">⚠️ CAH Management</div><p>If CAH confirmed: Hydrocortisone 10-15 mg/m²/day divided TID + Fludrocortisone 0.1-0.2 mg daily. Acute crisis: Stress-dose hydrocortisone 50-100 mg/m² IV bolus.</p></div>` : ''}<div class="mechanism-box"><div class="mechanism-title">🧬 Newer GI Binders</div><div class="pathway"><strong>Patiromer (Veltassa):</strong><br>• Calcium-based polymer<br>• Binds K+ in colon<br>• Give separately from other meds (3h apart)<br>• Takes 7+ hours to work<br><br><strong>Sodium zirconium cyclosilicate (Lokelma):</strong><br>• Highly selective for K+<br>• Works within 1 hour<br>• Can use acutely AND chronically<br>• 10g TID × 48h acute, then 5-10g daily</div></div><button class="btn" onclick="nextStage()">Debrief →</button></div></div>`;
    };

    window.render_debrief = function() {
        return `<div class="scene"><div style="text-align:center;padding:40px;"><div style="font-size:4rem;margin-bottom:12px;">⚡</div><div style="font-size:1.8rem;font-weight:700;color:#4ade80;">${state.mode === 'adult' ? 'Hyperkalemia' : 'Pediatric Hyperkalemia'} Mastery!</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Treatment Algorithm</div><div class="pathway">1. STABILIZE: Calcium (if ECG changes)<br>2. SHIFT: Insulin + glucose, albuterol<br>3. ELIMINATE: Diuretics, dialysis, binders</div></div><div class="boards-tip"><div class="boards-tip-title">📚 ECG Progression</div><div class="pathway">Peaked T → Prolonged PR → Wide QRS → Sine wave → VF/Asystole</div></div><div class="tips"><div class="pearl"><div class="tip-header">✓ Pearls</div><ul style="margin-left:16px;"><li>Calcium FIRST if ECG changes</li><li>Calcium doesn't lower K+</li><li>Give glucose WITH insulin</li><li>Check glucose q30min × 2h</li>${state.mode === 'peds' ? '<li>Think CAH in sick neonate</li>' : ''}</ul></div><div class="pitfall"><div class="tip-header">✗ Pitfalls</div><ul style="margin-left:16px;"><li>Waiting for repeat K+ before treating</li><li>Forgetting glucose with insulin</li><li>Relying on kayexalate alone</li><li>Missing pseudohyperkalemia</li></ul></div></div><button class="btn" onclick="state.stage=0;render()">🔄 Restart Case</button></div></div>`;

(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];

    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
