<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Platelet Crisis | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#EC4899;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#BE185D,#EC4899);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(236,72,153,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(236,72,153,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(236,72,153,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🩸 The Platelet Crisis</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'35F',wt:'62kg',hx:'Fatigue, bruising, confusion x3 days',exam:'Petechiae, mild confusion, no focal deficits',vitals:{HR:'98',BP:'138/82'},labs:{Plt:'12k',Hgb:'8.2',Cr:'1.8',LDH:'580'}},int:{age:'42M',wt:'78kg',hx:'Bloody diarrhea 1 week ago, now AKI',exam:'Pallor, petechiae, anuric',vitals:{HR:'88',BP:'148/92'},labs:{Plt:'28k',Hgb:'7.8',Cr:'6.2',Schisto:'3+'}},adv:{age:'28F',wt:'55kg',hx:'Postpartum day 3, seizure, thrombocytopenia',exam:'Seizure activity, petechiae',vitals:{HR:'112',BP:'168/102'},labs:{Plt:'18k',Hgb:'7.2',LDH:'1240',ADAMTS13:'<5%'}}};
const Q=[
{t:'TTP Pentad',q:'Classic pentad of TTP (though rarely all present)?',h:'FAT RN mnemonic',o:[{id:'a',txt:'Fever, Anemia (MAHA), Thrombocytopenia, Renal dysfunction, Neurologic symptoms',c:1,p:100},{id:'b',txt:'Bleeding only',c:0,p:10},{id:'c',txt:'Isolated thrombocytopenia',c:0,p:20}],fb:{1:'<b>Correct!</b> FAT RN: Fever, Anemia (microangiopathic), Thrombocytopenia, Renal, Neuro. Full pentad rare (<10%). Triad (MAHA + thrombocytopenia + neuro/renal) more common.',0:'<b>TTP pentad:</b> FAT RN. Full pentad rare but classic.'}},
{t:'MAHA Diagnosis',q:'Lab finding confirming microangiopathic hemolytic anemia?',h:'Peripheral smear',o:[{id:'a',txt:'Schistocytes on peripheral smear + elevated LDH + low haptoglobin',c:1,p:100},{id:'b',txt:'Positive Coombs test',c:0,p:20},{id:'c',txt:'Elevated reticulocytes alone',c:0,p:30}],fb:{1:'<b>Correct!</b> MAHA: Schistocytes (fragmented RBCs), elevated LDH, low haptoglobin, elevated indirect bili, negative Coombs (not immune).',0:'<b>MAHA:</b> Schistocytes + high LDH + low haptoglobin. Coombs negative.'}},
{t:'PLASMIC Score',q:'PLASMIC score helps with?',h:'Risk stratification tool',o:[{id:'a',txt:'Predicting ADAMTS13 deficiency likelihood (guides empiric treatment)',c:1,p:100},{id:'b',txt:'Determining platelet transfusion need',c:0,p:20},{id:'c',txt:'Predicting mortality',c:0,p:30}],fb:{1:'<b>Correct!</b> PLASMIC: Plt <30, hemolysis, no cancer, no transplant, MCV <90, INR <1.5, Cr <2. High score = likely severe ADAMTS13 deficiency.',0:'<b>PLASMIC:</b> Predicts ADAMTS13 <10%. Guides empiric plasma exchange.'}},
{t:'Treatment Priority',q:'Suspected TTP. First-line treatment?',h:'Dont delay',o:[{id:'a',txt:'Plasma exchange (plasmapheresis) - removes antibody, replaces ADAMTS13',c:1,p:100},{id:'b',txt:'Platelet transfusion',c:0,p:0},{id:'c',txt:'Steroids alone',c:0,p:30}],fb:{1:'<b>Correct!</b> Plasma exchange urgently (reduces mortality from 90% to 10-20%). Add steroids. Rituximab for refractory. Caplacizumab (anti-vWF).',0:'<b>Plasma exchange:</b> Life-saving. Dont wait for ADAMTS13 results.'}},
{t:'Platelet Transfusion',q:'Should you transfuse platelets in TTP?',h:'Critical concept',o:[{id:'a',txt:'Avoid unless life-threatening bleeding (may worsen thrombosis - "fuel on fire")',c:1,p:100},{id:'b',txt:'Yes, always transfuse',c:0,p:0},{id:'c',txt:'Transfuse if platelets less than 50k',c:0,p:20}],fb:{1:'<b>Correct!</b> Platelet transfusion contraindicated - may cause more microvascular thrombosis ("fuel on fire"). Only if life-threatening hemorrhage.',0:'<b>No platelets!</b> Can worsen thrombosis. Only for severe bleeding.'}},
{t:'HUS vs TTP',q:'Typical HUS (vs TTP) characterized by?',h:'Different pathophysiology',o:[{id:'a',txt:'Shiga toxin (E. coli O157:H7), predominant renal failure, children more common',c:1,p:100},{id:'b',txt:'ADAMTS13 deficiency',c:0,p:30},{id:'c',txt:'Neurologic predominant',c:0,p:20}],fb:{1:'<b>Correct!</b> Typical HUS: Shiga toxin (bloody diarrhea prodrome), severe AKI, kids. TTP: ADAMTS13 deficiency, neuro predominant, adults.',0:'<b>HUS:</b> Shiga toxin, renal focus, kids. TTP: ADAMTS13, neuro, adults.'}},
{t:'ADAMTS13',q:'ADAMTS13 level in TTP?',h:'Diagnostic',o:[{id:'a',txt:'Severely deficient (<10%) - either congenital or acquired (autoantibody)',c:1,p:100},{id:'b',txt:'Elevated',c:0,p:0},{id:'c',txt:'Normal',c:0,p:20}],fb:{1:'<b>Correct!</b> TTP: ADAMTS13 <10% (usually <5%). Acquired (antibody) more common than congenital. HUS has normal ADAMTS13.',0:'<b>ADAMTS13:</b> <10% diagnostic of TTP. Inhibitor assay shows antibody.'}},
{t:'Caplacizumab',q:'Mechanism of caplacizumab in TTP?',h:'Newer therapy',o:[{id:'a',txt:'Anti-vWF nanobody - prevents platelet-vWF interaction and microthrombi',c:1,p:100},{id:'b',txt:'Replaces ADAMTS13',c:0,p:30},{id:'c',txt:'Immunosuppression',c:0,p:20}],fb:{1:'<b>Correct!</b> Caplacizumab blocks vWF-platelet binding. Reduces time to platelet recovery, exacerbations. Used with plasma exchange + steroids.',0:'<b>Caplacizumab:</b> Anti-vWF. Blocks microthrombi formation.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🩸 The Platelet Crisis</h1><p style="color:var(--muted);margin-bottom:32px">TTP/HUS: MAHA, PLASMIC, plasma exchange, ADAMTS13, caplacizumab</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🏥 Hematologic Emergency</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">TTP/HUS Pearls</div><div class="pearl-item"><b>TTP pentad:</b> FAT RN (rarely all present)</div><div class="pearl-item"><b>MAHA:</b> Schistocytes + high LDH + low haptoglobin</div><div class="pearl-item"><b>Treatment:</b> Plasma exchange urgently</div><div class="pearl-item"><b>No platelets!</b> Fuel on fire</div><div class="pearl-item"><b>ADAMTS13:</b> less than 10% diagnostic</div></div><div class="cross-link"><a href="../mechanism/hematology.html">MechanismDx: Hematology</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
