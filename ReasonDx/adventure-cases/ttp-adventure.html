<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bleeding Bruises | ReasonDx Adventure</title>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --border: #334155; --text: #F1F5F9; --muted: #94A3B8; --accent: #EC4899; --success: #10B981; --warning: #F59E0B; --danger: #DC2626; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
        .header { background: linear-gradient(135deg, #DB2777 0%, #EC4899 100%); padding: 12px 20px; position: sticky; top: 0; z-index: 100; }
        .header-row { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .header-title { font-size: 1.1rem; font-weight: 600; }
        .stat { background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 8px; }
        .stat-value { font-size: 1.1rem; font-weight: 700; font-family: monospace; }
        .stat-label { font-size: 0.6rem; opacity: 0.8; text-transform: uppercase; }
        .main { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; }
        .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .card-phase { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
        .card-title { font-size: 1.5rem; font-weight: 700; }
        .card-body { padding: 24px; }
        .narrative { background: linear-gradient(135deg, rgba(236,72,153,0.1), rgba(219,39,119,0.1)); border-left: 4px solid var(--accent); padding: 20px 24px; border-radius: 0 12px 12px 0; margin-bottom: 24px; line-height: 1.8; }
        .narrative .hl { background: rgba(236,72,153,0.3); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .setup-screen { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; }
        .setup-screen h1 { font-size: 2rem; margin-bottom: 8px; }
        .setup-screen .subtitle { color: var(--muted); margin-bottom: 32px; }
        .start-btn { background: var(--accent); color: white; border: none; padding: 16px 48px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .question-section { margin-bottom: 32px; }
        .question-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .question-number { background: var(--accent); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .question-text { font-size: 1.1rem; font-weight: 600; }
        .radio-options { display: flex; flex-direction: column; gap: 10px; }
        .radio-option { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .radio-option:hover { border-color: var(--accent); }
        .radio-option.selected { border-color: var(--accent); background: rgba(236,72,153,0.15); }
        .radio-option.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .radio-option.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .radio-circle { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; }
        .radio-option.selected .radio-circle { border-color: var(--accent); background: radial-gradient(circle, var(--accent) 40%, transparent 40%); }
        .feedback { padding: 20px; border-radius: 12px; margin: 20px 0; }
        .feedback.excellent { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); }
        .feedback.acceptable { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); }
        .feedback-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .feedback-icon { font-size: 1.5rem; }
        .feedback-title { font-weight: 700; }
        .feedback-text { color: var(--muted); line-height: 1.7; }
        .feedback-text strong { color: var(--text); }
        .alert { padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; }
        .alert.info { background: rgba(236,72,153,0.15); border: 1px solid rgba(236,72,153,0.3); }
        .alert.danger { background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.3); }
        .alert-icon { font-size: 1.5rem; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: 600; margin-bottom: 4px; }
        .alert-desc { font-size: 0.9rem; color: var(--muted); }
        .btn { padding: 14px 28px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-row { display: flex; gap: 12px; margin-top: 24px; }
        .lab-panel { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .lab-panel-title { font-weight: 600; margin-bottom: 16px; color: var(--accent); }
        .lab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .lab-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; }
        .lab-name { font-size: 0.8rem; color: var(--muted); }
        .lab-value { font-size: 1rem; font-weight: 700; }
        .lab-value.critical { color: var(--danger); }
        .lab-value.abnormal { color: var(--warning); }
        .lab-range { font-size: 0.7rem; color: var(--muted); }
        .outcome { text-align: center; padding: 40px 20px; }
        .outcome-icon { font-size: 4rem; margin-bottom: 16px; }
        .outcome-title { font-size: 2rem; font-weight: 700; color: var(--success); margin-bottom: 8px; }
        .outcome-desc { color: var(--muted); max-width: 600px; margin: 0 auto 24px; }
        .score-summary { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 24px; margin: 24px auto; max-width: 500px; }
        .score-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .score-row:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <header class="header"><div class="header-row"><div class="header-title">🩸 The Bleeding Bruises</div><div class="stat"><div class="stat-value" id="scoreDisplay">0</div><div class="stat-label">Points</div></div></div></header>
    <main class="main"><div id="stageContainer"></div></main>
    <script>
    const state = { stage:'setup', score:0 };
    
    function addScore(pts) { state.score += pts; document.getElementById('scoreDisplay').textContent = state.score; }

    const stages = {
        setup: { render: () => `
            <div class="setup-screen">
                <h1>🩸 The Bleeding Bruises</h1>
                <p class="subtitle">TTP/HUS recognition and management</p>
                <button class="start-btn" onclick="goTo('presentation')">Begin Case →</button>
            </div>`
        },
        presentation: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Emergency Department</div><div class="card-title">📋 Confusion and Bruising</div></div>
                <div class="card-body">
                    <div class="narrative">A <span class="hl">32-year-old female</span> presents with <span class="hl">3 days of fatigue</span>, <span class="hl">easy bruising</span>, and today her husband noticed she's been <span class="hl">confused and slurring words</span>.<br><br>She has <span class="hl">no significant PMH</span> and takes no medications. On exam she has <span class="hl">petechiae on her legs</span>, <span class="hl">scattered bruises</span>, <span class="hl">mild jaundice</span>, and is <span class="hl">oriented to person only</span>.</div>
                    <div class="lab-panel">
                        <div class="lab-panel-title">Laboratory Results</div>
                        <div class="lab-grid">
                            <div class="lab-item"><div class="lab-name">Hemoglobin</div><div class="lab-value critical">7.2 g/dL</div><div class="lab-range">12-16</div></div>
                            <div class="lab-item"><div class="lab-name">Platelets</div><div class="lab-value critical">12,000/µL</div><div class="lab-range">150-400K</div></div>
                            <div class="lab-item"><div class="lab-name">WBC</div><div class="lab-value">9,800/µL</div><div class="lab-range">4-11K</div></div>
                            <div class="lab-item"><div class="lab-name">Creatinine</div><div class="lab-value abnormal">1.6 mg/dL</div><div class="lab-range">0.6-1.2</div></div>
                            <div class="lab-item"><div class="lab-name">LDH</div><div class="lab-value critical">2,450 U/L</div><div class="lab-range">120-246</div></div>
                            <div class="lab-item"><div class="lab-name">T. Bilirubin</div><div class="lab-value abnormal">3.8 mg/dL</div><div class="lab-range">0.1-1.2</div></div>
                            <div class="lab-item"><div class="lab-name">Haptoglobin</div><div class="lab-value critical">&lt;10 mg/dL</div><div class="lab-range">30-200</div></div>
                            <div class="lab-item"><div class="lab-name">Reticulocytes</div><div class="lab-value abnormal">8.2%</div><div class="lab-range">0.5-2.5</div></div>
                        </div>
                    </div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="goTo('smear')">Review Smear →</button></div>
                </div>
            </div>`
        },
        smear: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Peripheral Smear</div><div class="card-title">🔬 Key Finding</div></div>
                <div class="card-body">
                    <div class="alert info"><span class="alert-icon">🔬</span><div class="alert-content"><div class="alert-title">Peripheral Blood Smear</div><div class="alert-desc">Numerous fragmented RBCs (schistocytes), decreased platelets, no spherocytes</div></div></div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">1</div><div class="question-text">The presence of schistocytes indicates:</div></div>
                        <div class="radio-options" id="smearOpts">
                            <div class="radio-option" data-id="maha" onclick="selectSmear('maha')"><div class="radio-circle"></div><div><strong>Microangiopathic hemolytic anemia (MAHA)</strong><br><small style="color:var(--muted)">RBCs sheared by fibrin strands in small vessels</small></div></div>
                            <div class="radio-option" data-id="iha" onclick="selectSmear('iha')"><div class="radio-circle"></div><div><strong>Immune hemolytic anemia</strong><br><small style="color:var(--muted)">Antibody-mediated destruction</small></div></div>
                            <div class="radio-option" data-id="dic" onclick="selectSmear('dic')"><div class="radio-circle"></div><div><strong>DIC only</strong><br><small style="color:var(--muted)">Coagulation factor consumption</small></div></div>
                        </div>
                    </div>
                    <div id="smearFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="smearSubmit" onclick="submitSmear()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        diagnosis: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Diagnosis</div><div class="card-title">📊 Classic Pentad</div></div>
                <div class="card-body">
                    <div class="alert info"><span class="alert-icon">📋</span><div class="alert-content"><div class="alert-title">Patient Has:</div><div class="alert-desc">MAHA ✓ | Thrombocytopenia ✓ | Neurologic changes ✓ | Renal dysfunction ✓ | Fever (37.9°C) ✓</div></div></div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">2</div><div class="question-text">This classic pentad is most consistent with:</div></div>
                        <div class="radio-options" id="dxOpts">
                            <div class="radio-option" data-id="ttp" onclick="selectDx('ttp')"><div class="radio-circle"></div><div><strong>Thrombotic Thrombocytopenic Purpura (TTP)</strong><br><small style="color:var(--muted)">ADAMTS13 deficiency → uncleaved vWF multimers</small></div></div>
                            <div class="radio-option" data-id="hus" onclick="selectDx('hus')"><div class="radio-circle"></div><div><strong>Hemolytic Uremic Syndrome (HUS)</strong><br><small style="color:var(--muted)">Usually post-infectious, renal-predominant</small></div></div>
                            <div class="radio-option" data-id="itp" onclick="selectDx('itp')"><div class="radio-circle"></div><div><strong>Immune Thrombocytopenia (ITP)</strong><br><small style="color:var(--muted)">Isolated thrombocytopenia</small></div></div>
                        </div>
                    </div>
                    <div id="dxFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="dxSubmit" onclick="submitDx()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        platelets: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Critical Decision</div><div class="card-title">🚨 Platelet Transfusion?</div></div>
                <div class="card-body">
                    <div class="alert danger"><span class="alert-icon">⚠️</span><div class="alert-content"><div class="alert-title">Platelets are 12,000 - Patient is bleeding!</div><div class="alert-desc">The nurse asks if you want to transfuse platelets</div></div></div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">3</div><div class="question-text">Should you transfuse platelets in suspected TTP?</div></div>
                        <div class="radio-options" id="pltOpts">
                            <div class="radio-option" data-id="no" onclick="selectPlt('no')"><div class="radio-circle"></div><div><strong>NO - Platelets can WORSEN TTP!</strong><br><small style="color:var(--muted)">Provides fuel for microvascular thrombosis</small></div></div>
                            <div class="radio-option" data-id="yes" onclick="selectPlt('yes')"><div class="radio-circle"></div><div><strong>YES - Bleeding risk is too high</strong><br><small style="color:var(--muted)">Standard approach to severe thrombocytopenia</small></div></div>
                            <div class="radio-option" data-id="maybe" onclick="selectPlt('maybe')"><div class="radio-circle"></div><div><strong>Only if actively bleeding</strong><br><small style="color:var(--muted)">Case-by-case basis</small></div></div>
                        </div>
                    </div>
                    <div id="pltFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="pltSubmit" onclick="submitPlt()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        treatment: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Treatment</div><div class="card-title">💊 First-Line Therapy</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">4</div><div class="question-text">What is the first-line treatment for TTP?</div></div>
                        <div class="radio-options" id="txOpts">
                            <div class="radio-option" data-id="plex" onclick="selectTx('plex')"><div class="radio-circle"></div><div><strong>Plasma exchange (plasmapheresis) + steroids</strong><br><small style="color:var(--muted)">Remove autoantibodies, replace ADAMTS13</small></div></div>
                            <div class="radio-option" data-id="steroids" onclick="selectTx('steroids')"><div class="radio-circle"></div><div><strong>High-dose steroids alone</strong><br><small style="color:var(--muted)">Immunosuppression</small></div></div>
                            <div class="radio-option" data-id="ivig" onclick="selectTx('ivig')"><div class="radio-circle"></div><div><strong>IVIG</strong><br><small style="color:var(--muted)">Immunomodulation</small></div></div>
                        </div>
                    </div>
                    <div id="txFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="txSubmit" onclick="submitTx()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        plasmic: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Risk Stratification</div><div class="card-title">📊 PLASMIC Score</div></div>
                <div class="card-body">
                    <div class="alert info"><span class="alert-icon">📋</span><div class="alert-content"><div class="alert-title">PLASMIC Score Components</div><div class="alert-desc">Platelet count &lt;30K (+1) | Combined hemolysis variable (+1) | No active cancer (+1) | No solid organ/stem cell transplant (+1) | MCV &lt;90 (+1) | INR &lt;1.5 (+1) | Creatinine &lt;2.0 (+1)</div></div></div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">5</div><div class="question-text">What does the PLASMIC score predict?</div></div>
                        <div class="radio-options" id="plasOpts">
                            <div class="radio-option" data-id="adamts" onclick="selectPlas('adamts')"><div class="radio-circle"></div><div><strong>Likelihood of severe ADAMTS13 deficiency (&lt;10%)</strong><br><small style="color:var(--muted)">High score = likely TTP, start empiric treatment</small></div></div>
                            <div class="radio-option" data-id="mortality" onclick="selectPlas('mortality')"><div class="radio-circle"></div><div><strong>Mortality risk</strong><br><small style="color:var(--muted)">Prognostic score</small></div></div>
                            <div class="radio-option" data-id="response" onclick="selectPlas('response')"><div class="radio-circle"></div><div><strong>Response to plasma exchange</strong><br><small style="color:var(--muted)">Treatment efficacy</small></div></div>
                        </div>
                    </div>
                    <div id="plasFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="plasSubmit" onclick="submitPlas()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        outcome: { render: () => `
            <div class="card"><div class="card-body">
                <div class="outcome">
                    <div class="outcome-icon">🎉</div>
                    <div class="outcome-title">Patient Recovered!</div>
                    <div class="outcome-desc">ADAMTS13 activity returned at &lt;5% with high inhibitor titer, confirming acquired TTP. She received daily plasma exchange plus high-dose steroids. Caplacizumab (anti-vWF) was added. By day 5, platelets rose to 85K and mental status normalized. She completed 14 days of plasma exchange, then transitioned to rituximab for maintenance. Discharged day 18 in excellent condition.</div>
                </div>
                <div class="score-summary">
                    <h3 style="margin-bottom:16px">Performance</h3>
                    <div class="score-row"><span>Smear Interpretation</span><span>${state.smearScore||0}/100</span></div>
                    <div class="score-row"><span>Diagnosis</span><span>${state.dxScore||0}/100</span></div>
                    <div class="score-row"><span>Platelet Decision</span><span>${state.pltScore||0}/100</span></div>
                    <div class="score-row"><span>Treatment</span><span>${state.txScore||0}/100</span></div>
                    <div class="score-row"><span>PLASMIC Understanding</span><span>${state.plasScore||0}/100</span></div>
                    <div class="score-row" style="border-top:2px solid var(--border);padding-top:12px"><strong>Total</strong><strong>${state.score}</strong></div>
                </div>
                <div class="feedback excellent"><div class="feedback-header"><span class="feedback-icon">💡</span><span class="feedback-title">TTP/HUS Pearls</span></div><div class="feedback-text">
                    • <strong>Classic TTP pentad:</strong> MAHA + thrombocytopenia + neuro changes + renal dysfunction + fever (full pentad rare)<br>
                    • <strong>MAHA hallmark:</strong> Schistocytes on smear + ↑LDH + ↑indirect bili + ↓haptoglobin + ↑reticulocytes<br>
                    • <strong>DO NOT GIVE PLATELETS!</strong> Provides substrate for microvascular thrombosis - "fuel on the fire"<br>
                    • <strong>Exception:</strong> Life-threatening bleeding or urgent procedure - then give with caution<br>
                    • <strong>ADAMTS13:</strong> Cleaves vWF multimers. Deficiency → ultra-large vWF → platelet aggregation → microthrombi<br>
                    • <strong>Treatment:</strong> Emergent plasma exchange (removes antibodies, replaces ADAMTS13) + steroids<br>
                    • <strong>Caplacizumab:</strong> Anti-vWF nanobody - blocks platelet-vWF interaction, reduces time to remission<br>
                    • <strong>TTP vs HUS:</strong> TTP = neuro predominant, HUS = renal predominant (esp. in children post-E. coli O157:H7)<br>
                    • <strong>PLASMIC score ≥6:</strong> High probability of severe ADAMTS13 deficiency - start treatment empirically!
                </div></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="location.reload()">Play Again</button></div>
            </div></div>`
        }
    };

    let selectedSmear = null;
    function selectSmear(id) { selectedSmear = id; document.querySelectorAll('#smearOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('smearSubmit').disabled = false; }
    function submitSmear() {
        document.querySelectorAll('#smearOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'maha') o.classList.add('correct');
            else if (o.dataset.id === selectedSmear) o.classList.add('incorrect');
        });
        state.smearScore = selectedSmear === 'maha' ? 100 : 40;
        addScore(selectedSmear === 'maha' ? 40 : 15);
        document.getElementById('smearFeedback').innerHTML = `<div class="feedback ${selectedSmear==='maha'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedSmear==='maha'?'✅':'📚'}</span><span class="feedback-title">${selectedSmear==='maha'?'Correct!':'Key Finding'}</span></div><div class="feedback-text"><strong>Schistocytes = MAHA!</strong> RBCs are mechanically sheared as they pass through fibrin strands in damaged microvasculature. This creates helmet cells, triangular fragments, and other schistocyte morphologies. Look for >1% schistocytes. DIC can cause MAHA too, but check PT/INR/fibrinogen.</div></div>`;
        document.getElementById('smearSubmit').textContent = 'Continue →';
        document.getElementById('smearSubmit').onclick = () => goTo('diagnosis');
    }

    let selectedDx = null;
    function selectDx(id) { selectedDx = id; document.querySelectorAll('#dxOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('dxSubmit').disabled = false; }
    function submitDx() {
        document.querySelectorAll('#dxOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'ttp') o.classList.add('correct');
            else if (o.dataset.id === selectedDx) o.classList.add('incorrect');
        });
        state.dxScore = selectedDx === 'ttp' ? 100 : 50;
        addScore(selectedDx === 'ttp' ? 40 : 20);
        document.getElementById('dxFeedback').innerHTML = `<div class="feedback ${selectedDx==='ttp'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedDx==='ttp'?'✅':'📚'}</span><span class="feedback-title">${selectedDx==='ttp'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>TTP!</strong> The pentad (MAHA, thrombocytopenia, neuro, renal, fever) is classic but the full pentad is rare (~5%). In practice, MAHA + thrombocytopenia + no other explanation = presume TTP! HUS is similar but typically post-diarrheal illness (E. coli O157:H7) with renal-predominant disease.</div></div>`;
        document.getElementById('dxSubmit').textContent = 'Continue →';
        document.getElementById('dxSubmit').onclick = () => goTo('platelets');
    }

    let selectedPlt = null;
    function selectPlt(id) { selectedPlt = id; document.querySelectorAll('#pltOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('pltSubmit').disabled = false; }
    function submitPlt() {
        document.querySelectorAll('#pltOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'no') o.classList.add('correct');
            else if (o.dataset.id === selectedPlt) o.classList.add('incorrect');
        });
        state.pltScore = selectedPlt === 'no' ? 100 : 20;
        addScore(selectedPlt === 'no' ? 40 : 5);
        document.getElementById('pltFeedback').innerHTML = `<div class="feedback ${selectedPlt==='no'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedPlt==='no'?'✅':'📚'}</span><span class="feedback-title">${selectedPlt==='no'?'Critical Point!':'DANGEROUS!'}</span></div><div class="feedback-text"><strong>DO NOT TRANSFUSE PLATELETS in TTP!</strong> This is counterintuitive but crucial. Platelets are consumed in microvascular thrombi. Giving more platelets = more fuel for thrombosis = clinical deterioration, strokes, death. Only give if life-threatening hemorrhage.</div></div>`;
        document.getElementById('pltSubmit').textContent = 'Continue →';
        document.getElementById('pltSubmit').onclick = () => goTo('treatment');
    }

    let selectedTx = null;
    function selectTx(id) { selectedTx = id; document.querySelectorAll('#txOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('txSubmit').disabled = false; }
    function submitTx() {
        document.querySelectorAll('#txOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'plex') o.classList.add('correct');
            else if (o.dataset.id === selectedTx) o.classList.add('incorrect');
        });
        state.txScore = selectedTx === 'plex' ? 100 : 40;
        addScore(selectedTx === 'plex' ? 40 : 15);
        document.getElementById('txFeedback').innerHTML = `<div class="feedback ${selectedTx==='plex'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedTx==='plex'?'✅':'📚'}</span><span class="feedback-title">${selectedTx==='plex'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>Plasma exchange (PLEX) + steroids!</strong> PLEX removes autoantibodies against ADAMTS13 AND replaces the deficient enzyme. Daily exchanges until platelet count >150K for 2+ days. Add caplacizumab (anti-vWF) per recent trials. Without treatment, TTP mortality is ~90%!</div></div>`;
        document.getElementById('txSubmit').textContent = 'Continue →';
        document.getElementById('txSubmit').onclick = () => goTo('plasmic');
    }

    let selectedPlas = null;
    function selectPlas(id) { selectedPlas = id; document.querySelectorAll('#plasOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('plasSubmit').disabled = false; }
    function submitPlas() {
        document.querySelectorAll('#plasOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'adamts') o.classList.add('correct');
            else if (o.dataset.id === selectedPlas) o.classList.add('incorrect');
        });
        state.plasScore = selectedPlas === 'adamts' ? 100 : 40;
        addScore(selectedPlas === 'adamts' ? 40 : 15);
        document.getElementById('plasFeedback').innerHTML = `<div class="feedback ${selectedPlas==='adamts'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedPlas==='adamts'?'✅':'📚'}</span><span class="feedback-title">${selectedPlas==='adamts'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>PLASMIC predicts severe ADAMTS13 deficiency.</strong> Score ≥6 = high probability → start PLEX empirically before ADAMTS13 results return (takes days). Score 0-4 = low probability, consider other diagnoses. This helps guide urgent treatment decisions!</div></div>`;
        document.getElementById('plasSubmit').textContent = 'Complete →';
        document.getElementById('plasSubmit').onclick = () => goTo('outcome');
    }

    function goTo(id) { state.stage = id; document.getElementById('stageContainer').innerHTML = stages[id].render(); window.scrollTo(0,0); }
    document.addEventListener('DOMContentLoaded', () => goTo('setup'));
    </script>
</body>
</html>
