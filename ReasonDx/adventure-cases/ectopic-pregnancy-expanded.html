/* Visual Debrief Styles */

/* Calibration Chart in Debrief */

</style>
</head>

    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"Pelvic Pain in Early Pregnancy",content:'<div class="narrative"><p>A <span class="highlight">28-year-old</span> presents with abdominal pain and vaginal spotting. LMP 6 weeks ago. History of <span class="critical">PID and prior ectopic</span>.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 98, BP 118/72<br><strong>β-hCG:</strong> Positive</p></div><div class="alert-box"><div class="alert-title">🚨 Ectopic Until Proven Otherwise!</div><p>Any reproductive-age woman with pain + positive test = rule out ectopic.</p></div>',question:{prompt:"Most common location for ectopic pregnancy?",options:[{text:"Ovary",correct:false},{text:"Fallopian tube (ampulla)",correct:true},{text:"Cervix",correct:false},{text:"Abdominal cavity",correct:false}],explanation:{correct:"Correct! 95% of ectopics are tubal, with the ampulla being the most common site.",incorrect:"Fallopian tube = 95% of ectopics. Ampulla is the most common segment."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📍 Ectopic Locations</div><div class="pathway">Fallopian tube: 95%\n  • Ampulla: 70%\n  • Isthmus: 12%\n  • Interstitial: 2-4% (most dangerous!)\nOvary: 1-3%\nCervix: <1%</div></div>',why_chain:[],points:10}},
        {title:"Risk Factors",content:'<div class="narrative"><p>This patient has two major risk factors: prior PID and prior ectopic pregnancy.</p></div>',question:{prompt:"What is the STRONGEST risk factor for ectopic?",options:[{text:"Smoking",correct:false},{text:"Prior ectopic pregnancy",correct:true},{text:"IUD use",correct:false},{text:"Age >35",correct:false}],explanation:{correct:"Correct! Prior ectopic increases risk 10-fold. Other major factors: PID, tubal surgery, IUD in place.",incorrect:"Prior ectopic = strongest risk factor (10x increased risk)."},teaching:'<h4>Risk Factors</h4><table class="comparison-table"><tr><th>Factor</th><th>Risk</th></tr><tr style="background:rgba(251,191,36,0.2);"><td>Prior ectopic</td><td>10× risk</td></tr><tr><td>PID/STIs</td><td>Tubal scarring</td></tr><tr><td>Tubal surgery</td><td>Includes ligation</td></tr><tr><td>IUD in place</td><td>50% ectopic if pregnant</td></tr></table><div class="alert-box"><div class="alert-title">⚠️</div><p>50% of ectopics have NO risk factors!</p></div>',why_chain:[],points:10}},
        {title:"The Discriminatory Zone",content:'<div class="narrative"><p>Her β-hCG is <span class="highlight">2,500 mIU/mL</span>. TVUS shows no intrauterine pregnancy.</p></div>',question:{prompt:"If β-hCG is above discriminatory zone (~1,500-2,000) and no IUP is seen, this indicates:",options:[{text:"Normal early pregnancy",correct:false},{text:"Definite ectopic",correct:false},{text:"Abnormal pregnancy (ectopic or failed IUP)",correct:true},{text:"Lab error",correct:false}],explanation:{correct:"Correct! Above the discriminatory zone, you should see an IUP. If not, it is an abnormal pregnancy - either ectopic or failed IUP.",incorrect:"Above discriminatory zone + no IUP = abnormal pregnancy (ectopic or failed IUP)."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📊 β-hCG Interpretation</div><div class="pathway">DISCRIMINATORY ZONE: 1,500-2,000\n\nAbove zone + no IUP = ABNORMAL\nBelow zone + no IUP = Indeterminate\n  → Serial β-hCG q48-72h\n  → Should rise ≥35-53% in 48h\n\nNormal: β-hCG doubles q48-72h</div></div>',why_chain:[],points:10}},
        {title:"Ultrasound Findings",content:'<div class="narrative"><p>TVUS shows: No IUP, <span class="critical">adnexal mass with ring sign</span>, free fluid in pelvis.</p></div>',question:{prompt:"What is the ring of fire sign?",options:[{text:"IUP with yolk sac",correct:false},{text:"Ectopic with peripheral blood flow on Doppler",correct:true},{text:"Corpus luteum cyst",correct:false},{text:"Ovarian torsion",correct:false}],explanation:{correct:"Correct! Ring of fire = increased peripheral vascularity around ectopic on color Doppler.",incorrect:"Ring of fire = peripheral blood flow around ectopic. Corpus luteum can look similar."},teaching:'<h4>US Findings in Ectopic</h4><table class="comparison-table"><tr><th>Finding</th><th>Significance</th></tr><tr><td>No IUP above discriminatory zone</td><td>Suspicious</td></tr><tr style="background:rgba(251,191,36,0.2);"><td>Adnexal mass/ring sign</td><td>Likely ectopic</td></tr><tr><td>Fetal cardiac activity in adnexa</td><td>Definite ectopic</td></tr><tr><td>Free fluid</td><td>Concerning for rupture</td></tr></table>',why_chain:[],points:10}},
        {title:"Ruptured Ectopic",content:'<div class="narrative"><p>The patient suddenly develops <span class="critical">severe pain, HR 125, BP 85/50</span>. She is pale and diaphoretic.</p></div><div class="alert-box"><div class="alert-title">🚨 Surgical Emergency!</div><p>Ruptured ectopic = hemorrhagic shock. Do NOT delay for imaging!</p></div>',question:{prompt:"Most important immediate action?",options:[{text:"CT scan to confirm",correct:false},{text:"Check serial β-hCG",correct:false},{text:"IV access, resuscitation, emergent surgery",correct:true},{text:"Give methotrexate",correct:false}],explanation:{correct:"Correct! Ruptured ectopic is a surgical emergency. Two large-bore IVs, resuscitate, emergent OR.",incorrect:"Don't delay! IV access, resuscitation, emergent surgery. Imaging can wait."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Signs of Rupture</div><div class="pathway">• Sudden severe abdominal pain\n• Hypotension, tachycardia\n• Peritoneal signs\n• Shoulder pain (diaphragm irritation)\n• Syncope\n\nIMM EDIATE:\n1. Two large-bore IVs\n2. Fluid resuscitation\n3. Type and cross\n4. EMERGENT OR</div></div>',why_chain:[],points:10}},
        {title:"Methotrexate Criteria",content:'<div class="narrative"><p>Different scenario: stable patient, unruptured ectopic, β-hCG 1,800, no fetal cardiac activity.</p></div>',question:{prompt:"Which is a CONTRAINDICATION to methotrexate?",options:[{text:"β-hCG <5,000",correct:false},{text:"Fetal cardiac activity",correct:true},{text:"Ectopic <3 cm",correct:false},{text:"Stable patient",correct:false}],explanation:{correct:"Correct! Fetal cardiac activity = contraindication (higher failure rate). Other contraindications: rupture, unstable, immunodeficiency, liver/renal disease.",incorrect:"Fetal cardiac activity is a contraindication - higher MTX failure rate."},teaching:'<h4>Methotrexate Criteria</h4><table class="comparison-table"><tr><th>Inclusion</th><th>Contraindications</th></tr><tr><td>Hemodynamically stable</td><td>Rupture</td></tr><tr><td>Unruptured</td><td>Fetal cardiac activity</td></tr><tr><td>β-hCG <5,000 ideal</td><td>Liver/renal disease</td></tr><tr><td>Ectopic <3-4 cm</td><td>Immunodeficiency</td></tr></table><div class="mechanism-box"><div class="mechanism-title">MTX Protocol</div><div class="pathway">50 mg/m² IM single dose\nCheck β-hCG day 4 and 7\nIf <15% decline → repeat dose\nFollow weekly until β-hCG <5</div></div>',why_chain:[],points:10}},
        {title:"Surgical Management",content:'<div class="narrative"><p>When is surgery preferred over methotrexate?</p></div>',question:{prompt:"Indication for SURGICAL management?",options:[{text:"β-hCG <1,000",correct:false},{text:"Reliable follow-up",correct:false},{text:"Hemodynamic instability or rupture",correct:true},{text:"Ectopic <2 cm",correct:false}],explanation:{correct:"Correct! Surgery for: rupture/instability, MTX contraindication, failed MTX, fetal cardiac activity, high β-hCG, patient preference.",incorrect:"Surgery indicated for unstable/ruptured, MTX contraindication, MTX failure."},teaching:'<div class="mechanism-box"><div class="mechanism-title">🔪 Surgical Options</div><div class="pathway">SALPINGOSTOMY:\n• Linear incision, remove pregnancy\n• Preserves tube\n• Must follow β-hCG to zero\n\nSALPINGECTOMY:\n• Remove entire tube\n• Lower recurrence risk\n• Preferred if tube damaged</div></div>',why_chain:[],points:10}},
        {title:"Case Resolution",content:'<div class="narrative"><p>Patient underwent emergent laparoscopy with salpingectomy. She recovered well and was counseled on 10-15% recurrence risk.</p></div><div class="mechanism-box"><div class="mechanism-title">📚 Summary</div><div class="pathway">ALWAYS CONSIDER in reproductive-age woman\nwith pain + positive pregnancy test\n\n95% are tubal (ampulla most common)\n\nDIAGNOSIS: β-hCG + TVUS\n\nRUPTURED = SURGICAL EMERGENCY\n\nSTABLE: MTX if meets criteria\n\nFOLLOW-UP: β-hCG to zero after salpingostomy</div></div>',question:{prompt:"After salpingostomy, what follow-up is essential?",options:[{text:"No follow-up needed",correct:false},{text:"Weekly ultrasounds",correct:false},{text:"Serial β-hCG until undetectable",correct:true},{text:"Immediate repeat surgery",correct:false}],explanation:{correct:"Correct! After salpingostomy, 5-20% have persistent ectopic tissue. Must follow β-hCG weekly until undetectable.",incorrect:"Must follow β-hCG to zero after salpingostomy - 5-20% have persistent tissue."},teaching:'<h4>Key Takeaways</h4><ul style="line-height:2;margin-left:20px;"><li>Ectopic until proven otherwise</li><li>Prior ectopic = 10x risk</li><li>Ruptured = surgical emergency</li><li>MTX for stable, unruptured, no cardiac activity</li><li>Follow β-hCG after salpingostomy</li></ul>',why_chain:[],points:10}}
    ];
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:#4ade80;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><p>You mastered Ectopic Pregnancy!</p></div>';}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}



// ============================================================================
// EPA & CALIBRATION ENHANCEMENT - ReasonDx
// ============================================================================

// Case EPA Metadata
const caseEPA = {
    id: 'ectopic-pregnancy',
    primaryEPAs: ["EPA-10","EPA-2","EPA-3"],
    secondaryEPAs: ["EPA-4"],
    category: 'OB/GYN'
};

// Response tracking for calibration
let responseHistory = [];
let pendingSelection = null;

// EPA Names for display
const epaNames = {"EPA-1":"Gather H&P","EPA-2":"Prioritize DDx","EPA-3":"Recommend Tests","EPA-4":"Enter Orders","EPA-7":"Apply Evidence","EPA-10":"Recognize Urgency","EPA-12":"Perform Procedures"};

// Override selectOption to add confidence step
const originalSelectOption = typeof selectOption === 'function' ? selectOption : null;

function selectOptionEnhanced(index, correct) {
    const qId = 'q' + currentStage;
    if (answeredQuestions.has(qId)) return;
    
    // Store pending selection
    pendingSelection = { index, correct, stageIdx: currentStage };
    
    // Highlight selected option
    document.querySelectorAll('.mcq-option').forEach((opt, i) => {
        opt.classList.remove('selected');
        if (i === index) opt.classList.add('selected');
    });
    
    // Show confidence slider
    const confContainer = document.getElementById('confidence-container');
    if (confContainer) {
        confContainer.classList.add('show');
        confContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function updateConfidenceDisplay(value) {
    const display = document.getElementById('confidence-display');
    if (display) display.textContent = value + '%';
}

function submitWithConfidence() {
    if (!pendingSelection) return;
    
    const confidence = parseInt(document.getElementById('confidence-slider').value);
    const { index, correct, stageIdx } = pendingSelection;
    const stage = stages[stageIdx];
    
    // Record response with confidence
    responseHistory.push({
        stage: stageIdx + 1,
        stageTitle: stage.title,
        epaFocus: caseEPA.primaryEPAs[0],
        selectedIndex: index,
        selectedText: stage.question.options[index].text,
        correct: correct,
        confidence: confidence,
        points: correct ? stage.question.points : 0,
        maxPoints: stage.question.points
    });
    
    // Hide confidence container
    const confContainer = document.getElementById('confidence-container');
    if (confContainer) confContainer.classList.remove('show');
    
    // Now process the answer (call original logic)
    const qId = 'q' + stageIdx;
    answeredQuestions.add(qId);
    decisionPath[stageIdx] = index;
    
    maxScore += stage.question.points;
    if (correct) score += stage.question.points;
    
    document.getElementById('score').textContent = score;
    document.getElementById('maxScore').textContent = maxScore;
    
    // Show calibration feedback
    showCalibrationFeedback(confidence, correct);
    
    pendingSelection = null;
    renderStage();
}

function showCalibrationFeedback(confidence, correct) {
    // This will be shown in the feedback section after render
    const feedback = document.createElement('div');
    feedback.className = 'calibration-feedback show';
    
    if (correct && confidence >= 70) {
        feedback.classList.add('well-calibrated');
        feedback.innerHTML = '✅ <strong>Well calibrated!</strong> You were confident and correct.';
    } else if (correct && confidence < 50) {
        feedback.classList.add('underconfident');
        feedback.innerHTML = '📚 Correct, but you were uncertain. <strong>Trust your knowledge more!</strong>';
    } else if (!correct && confidence >= 70) {
        feedback.classList.add('overconfident');
        feedback.innerHTML = '⚠️ <strong>Overconfidence detected.</strong> High confidence + wrong answer is where diagnostic errors happen.';
    } else {
        feedback.classList.add('well-calibrated');
        feedback.innerHTML = '📝 Incorrect, but your uncertainty was appropriate. Review this concept.';
    }
    
    // Store for rendering
    window.lastCalibrationFeedback = feedback.outerHTML;
}

// Enhanced debrief with EPA and calibration
function showEnhancedDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    const content = document.getElementById('debriefContent');
    if (!overlay || !content) return;
    
    const percentage = maxScore > 0 ? Math.round((score / maxScore) * 100) : 0;
    
    // Calculate calibration
    const withConf = responseHistory.filter(r => r.confidence !== undefined);
    const correctWithConf = withConf.filter(r => r.correct);
    const incorrectWithConf = withConf.filter(r => !r.correct);
    const avgConfCorrect = correctWithConf.length > 0 
        ? Math.round(correctWithConf.reduce((s,r) => s + r.confidence, 0) / correctWithConf.length) : 0;
    const avgConfIncorrect = incorrectWithConf.length > 0 
        ? Math.round(incorrectWithConf.reduce((s,r) => s + r.confidence, 0) / incorrectWithConf.length) : 0;
    
    // EPA performance
    const epaPerf = {};
    responseHistory.forEach(r => {
        const epa = r.epaFocus || caseEPA.primaryEPAs[0];
        if (!epaPerf[epa]) epaPerf[epa] = { correct: 0, total: 0 };
        epaPerf[epa].total++;
        if (r.correct) epaPerf[epa].correct++;
    });
    
    // Calibration interpretation
    let calibrationMsg = '';
    if (avgConfCorrect - avgConfIncorrect > 20) {
        calibrationMsg = '✅ Good discrimination! You feel more confident when you\'re right.';
    } else if (avgConfIncorrect > 60) {
        calibrationMsg = '⚠️ Overconfidence pattern detected. Practice asking "What would make me wrong?"';
    } else {
        calibrationMsg = '📊 Work on calibration - confidence should differ between correct and incorrect answers.';
    }
    
    content.innerHTML = `
        <div style="text-align:center;margin-bottom:24px;">
            <div style="font-size:4rem;">${percentage >= 80 ? '🏆' : percentage >= 60 ? '👍' : '📚'}</div>
            <div style="font-size:2.5rem;font-weight:700;color:${percentage >= 80 ? '#22c55e' : percentage >= 60 ? '#f59e0b' : '#ef4444'}">${percentage}%</div>
            <div style="color:#6b7280;">Score: ${score}/${maxScore}</div>
        </div>
        
        <div class="epa-debrief-section">
            <h4>📋 EPA Competencies Assessed</h4>
            <div class="epa-progress-grid">
                ${Object.entries(epaPerf).map(([epa, data]) => {
                    const pct = Math.round((data.correct / data.total) * 100);
                    const colorClass = pct >= 80 ? 'high' : pct >= 60 ? 'medium' : 'low';
                    return `<div class="epa-progress-card">
                        <div class="epa-name">${epaNames[epa] || epa}</div>
                        <div class="epa-score ${colorClass}">${pct}%</div>
                    </div>`;
                }).join('')}
            </div>
        </div>
        
        <div class="calibration-debrief">
            <h4>🎯 Confidence Calibration</h4>
            <div class="calibration-stats">
                <div class="calibration-stat">
                    <div class="stat-value" style="color:#22c55e;">${avgConfCorrect}%</div>
                    <div class="stat-label">Avg confidence when correct</div>
                </div>
                <div class="calibration-stat">
                    <div class="stat-value" style="color:${avgConfIncorrect > 60 ? '#ef4444' : '#f59e0b'};">${avgConfIncorrect}%</div>
                    <div class="stat-label">Avg confidence when incorrect</div>
                </div>
            </div>
            <div class="calibration-interpretation">${calibrationMsg}</div>
        </div>
        
        <div class="decision-path">
            <h3>📝 Your Decisions</h3>
            ${responseHistory.map(r => `
                <div class="path-item ${r.correct ? 'path-optimal' : 'path-incorrect'}">
                    <div style="display:flex;justify-content:space-between;">
                        <div>
                            <div class="path-stage">${r.correct ? '✓' : '✗'} Stage ${r.stage}: ${r.stageTitle}</div>
                            <div class="path-choice" style="font-size:0.85rem;color:#6b7280;">${r.confidence}% confident</div>
                        </div>
                        <div class="path-points">${r.points}/${r.maxPoints}</div>
                    </div>
                </div>
            `).join('')}
        </div>
        
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
        <button class="debrief-btn" style="background:#e5e7eb;color:#4b5563;margin-top:8px;" onclick="closeDebrief()">Close</button>
    `;
    
    overlay.classList.add('show');
}

// Replace selectOption globally
window.selectOption = selectOptionEnhanced;

// Store original showDebrief if exists
if (typeof showDebrief === 'function') {
    window.originalShowDebrief = showDebrief;
}
window.showDebrief = showEnhancedDebrief;

</script>

<!-- Visual Debrief Overlay -->
<div class="debrief-overlay" id="debriefOverlay" onclick="if(event.target===this)closeDebrief()">
    <div class="debrief-content" id="debriefContent"></div>
</div>

</body>
