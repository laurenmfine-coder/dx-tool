<script>
let currentStage=0,score=0,maxScore=0,difficulty='standard',answeredQuestions=new Set(),decisionPath=[];
const stages=[
{title:"The Dyspneic Smoker",content:`<div class="narrative"><p>68-year-old man with COPD (FEV1 45% predicted) presents with worsening dyspnea, increased sputum production, and sputum purulence for 3 days.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 102, RR 24, BP 148/88, SpO2 88% on RA, T 100.2°F<br><strong>Exam:</strong> Pursed lip breathing, prolonged expiration, diffuse wheezes and rhonchi, using accessory muscles<br><strong>Baseline:</strong> Uses tiotropium, fluticasone/salmeterol, albuterol PRN. Home O2 2L at night.</p></div><div class="socratic-prompt"><h4>Define the Exacerbation</h4><p>What defines a COPD exacerbation, and how do you classify severity?</p></div>`,
hint_beginner:"Cardinal symptoms: dyspnea, sputum volume, sputum purulence",hint_advanced:"What's the Anthonisen criteria?",
question:{prompt:"What features define this as a COPD exacerbation?",
options:[{text:"Acute worsening of dyspnea, sputum volume, AND sputum purulence beyond normal day-to-day variation - this is a severe (Type I Anthonisen) exacerbation",correct:true},
{text:"Any respiratory symptom in a COPD patient",correct:false},
{text:"Only purulent sputum defines exacerbation",correct:false},
{text:"Must have fever to diagnose exacerbation",correct:false}],
explanation:{correct:"COPD exacerbation = acute worsening beyond normal variability. Anthonisen criteria: Type I (severe) = all 3 cardinal symptoms (dyspnea, sputum volume, purulence). Type II = 2 symptoms. Type III = 1 symptom + URI or fever.",incorrect:"Three cardinal symptoms define exacerbation: increased dyspnea, increased sputum volume, increased sputum purulence. All three present = severe (Type I)."},
teaching:`<h4>COPD Exacerbation Definition</h4><p><strong>Cardinal symptoms:</strong> Dyspnea, sputum volume, sputum purulence</p><p><strong>Type I (severe):</strong> All 3 symptoms</p><p><strong>Type II (moderate):</strong> 2 symptoms</p><p><strong>Type III (mild):</strong> 1 symptom + URI/fever</p>`,
why_chain:[{q:"Why does sputum purulence matter?",a:"Purulent sputum (yellow/green) suggests bacterial infection and predicts antibiotic benefit. Clear sputum = likely viral, less antibiotic benefit."},{q:"What causes most exacerbations?",a:"Viral infections (50-70%), bacterial (~30%, H. flu, M. catarrhalis, S. pneumo), environmental triggers. Often mixed."}],points:10}},

{title:"Oxygen Therapy",content:`<div class="narrative"><p>SpO2 is 88% on room air. You need to provide oxygen.</p></div><div class="socratic-prompt"><h4>The O2 Paradox</h4><p>What is the target SpO2 in COPD exacerbation, and why is this different from other conditions?</p></div>`,
hint_beginner:"COPD patients may have hypercapnic respiratory drive",hint_advanced:"What does the DECAF score predict?",
question:{prompt:"What is the target SpO2 for this COPD patient?",
options:[{text:"88-92% - higher targets can suppress hypoxic drive and worsen hypercapnia in CO2 retainers",correct:true},
{text:"94-98% like all patients",correct:false},
{text:"As high as possible - hypoxia is dangerous",correct:false},
{text:"No supplemental O2 - let them acclimate",correct:false}],
explanation:{correct:"Target 88-92% in COPD. Some patients have chronic CO2 retention and rely on hypoxic drive. Excessive O2 can suppress ventilation → worsening hypercapnia → CO2 narcosis. Titrate O2 to target, check ABG.",incorrect:"COPD target is lower than general population. 88-92% balances oxygenation with risk of hypercapnia. Always check ABG in significant exacerbations."},
teaching:`<h4>Oxygen in COPD</h4><p><strong>Target:</strong> SpO2 88-92%</p><p><strong>Why lower?</strong> Risk of hypercapnia in CO2 retainers</p><p><strong>Method:</strong> Nasal cannula 1-2L, Venturi mask for precise FiO2</p><p><strong>Monitor:</strong> ABG to assess pCO2, pH</p>`,
why_chain:[{q:"Why do some COPD patients retain CO2?",a:"Chronic hypercapnia blunts central chemoreceptor response to CO2. They rely on hypoxic drive (peripheral chemoreceptors). Removing hypoxia removes drive to breathe."},{q:"Does this happen to all COPD patients?",a:"No - only 'blue bloaters' (chronic bronchitis phenotype). 'Pink puffers' (emphysema) maintain drive. But can't always predict, so treat all COPD conservatively."}],points:15}},

{title:"ABG Interpretation",content:`<div class="narrative"><p>ABG on 2L NC: pH 7.32, pCO2 58, pO2 62, HCO3 32</p></div><div class="socratic-prompt"><h4>Interpret the ABG</h4><p>What does this ABG show, and is this acute, chronic, or acute-on-chronic?</p></div>`,
hint_beginner:"pH low + CO2 high = respiratory acidosis; HCO3 helps determine acute vs chronic",hint_advanced:"Expected HCO3 compensation formulas?",
question:{prompt:"What is the acid-base interpretation?",
options:[{text:"Acute-on-chronic respiratory acidosis: pH depressed but not as low as expected for pCO2 58; elevated HCO3 (32) indicates chronic compensation with acute worsening",correct:true},
{text:"Pure acute respiratory acidosis",correct:false},
{text:"Metabolic alkalosis with respiratory compensation",correct:false},
{text:"Normal ABG for COPD patient",correct:false}],
explanation:{correct:"Acute-on-chronic respiratory acidosis. If purely acute, pH would be ~7.22 for pCO2 58 (drops 0.08 per 10 mmHg CO2 rise). Elevated HCO3 (32) shows chronic renal compensation. pH still acidemic = acute component superimposed.",incorrect:"The elevated HCO3 indicates chronic compensation. The acidemic pH indicates acute worsening on top of chronic baseline."},
teaching:`<h4>Respiratory Acidosis Patterns</h4><p><strong>Acute:</strong> pH drops 0.08 per 10 mmHg CO2 rise; HCO3 rises 1 per 10</p><p><strong>Chronic:</strong> HCO3 rises 3.5 per 10 mmHg CO2 (renal compensation)</p><p><strong>Acute-on-chronic:</strong> Elevated HCO3 (chronic) but acidemic pH (acute)</p>`,
why_chain:[{q:"Why does this matter clinically?",a:"Acute-on-chronic is common in COPD exacerbations. Patient has baseline hypercapnia with compensation, now acutely worse. Don't try to normalize their CO2 - aim for their baseline."},{q:"When is intubation indicated?",a:"Severe acidosis (pH <7.25) not responding to NIV, altered mental status, inability to protect airway, hemodynamic instability."}],points:15}},

{title:"Pharmacologic Treatment",content:`<div class="narrative"><p>You initiate treatment beyond oxygen.</p></div><div class="socratic-prompt"><h4>Treatment Bundle</h4><p>What medications are indicated for COPD exacerbation?</p></div>`,
hint_beginner:"Bronchodilators + steroids ± antibiotics",hint_advanced:"What's the GOLD recommendation for steroid duration?",
question:{prompt:"What is the treatment approach?",
options:[{text:"SABA + SAMA (albuterol + ipratropium), systemic steroids (prednisone 40mg x 5 days), antibiotics if purulent sputum or severe exacerbation",correct:true},
{text:"SABA only - other treatments not proven",correct:false},
{text:"Antibiotics for all exacerbations",correct:false},
{text:"High-dose steroids for 2 weeks",correct:false}],
explanation:{correct:"Treatment bundle: 1) SABA ± SAMA (ipratropium adds benefit in COPD, unlike asthma where it's first hour only), 2) Systemic steroids x 5 days (REDUCE trial: 5 days = 14 days), 3) Antibiotics if purulent sputum or severe exacerbation.",incorrect:"Multi-pronged approach: bronchodilators, short-course steroids, antibiotics when indicated. 5-day steroid course is sufficient."},
teaching:`<h4>COPD Exacerbation Treatment</h4><p><strong>Bronchodilators:</strong> Albuterol 2.5mg + ipratropium 0.5mg q4-6h</p><p><strong>Steroids:</strong> Prednisone 40mg x 5 days (no taper)</p><p><strong>Antibiotics:</strong> If purulent sputum or severe (Type I) exacerbation</p>`,
why_chain:[{q:"Why 5 days of steroids?",a:"REDUCE trial showed 5 days = 14 days in efficacy with fewer side effects. Longer courses just add hyperglycemia, insomnia, and adrenal suppression risk."},{q:"Why ipratropium throughout (unlike asthma)?",a:"COPD has more cholinergic bronchoconstriction. Ipratropium provides sustained benefit throughout treatment, not just first hour."}],points:10}},

{title:"Antibiotic Selection",content:`<div class="narrative"><p>This patient has purulent sputum and severe (Type I) exacerbation - antibiotics indicated.</p></div><div class="socratic-prompt"><h4>Choose Wisely</h4><p>What antibiotic coverage is needed?</p></div>`,
hint_beginner:"Target H. flu, M. catarrhalis, S. pneumo",hint_advanced:"When to cover Pseudomonas?",
question:{prompt:"What antibiotic should you prescribe?",
options:[{text:"Amoxicillin-clavulanate, doxycycline, azithromycin, or respiratory fluoroquinolone; cover Pseudomonas if risk factors (frequent exacerbations, recent hospitalization, severe COPD)",correct:true},
{text:"Vancomycin for MRSA coverage",correct:false},
{text:"Penicillin alone is sufficient",correct:false},
{text:"Broad-spectrum IV antibiotics for all",correct:false}],
explanation:{correct:"Target H. influenzae, M. catarrhalis, S. pneumoniae. Options: amox-clav, doxycycline, azithromycin, respiratory FQ. Add Pseudomonas coverage (cipro, pip-tazo) if: frequent exacerbations, recent hospitalization, FEV1 <30%, chronic steroid use.",incorrect:"Standard coverage targets the big three respiratory pathogens. Escalate to Pseudomonas coverage only with specific risk factors."},
teaching:`<h4>Antibiotic Selection in COPD</h4><p><strong>Targets:</strong> H. flu, M. catarrhalis, S. pneumo</p><p><strong>Options:</strong> Amox-clav, doxycycline, azithromycin, levofloxacin</p><p><strong>Pseudomonas coverage if:</strong> FEV1 <30%, frequent exacerbations, recent hospitalization, chronic steroids</p>`,
why_chain:[{q:"Why not antibiotics for all exacerbations?",a:"Antibiotics benefit Type I (all 3 symptoms) and Type II with purulence. Type III (mild) often viral - antibiotics don't help and promote resistance."},{q:"What about procalcitonin?",a:"Can help guide antibiotic use. Low procalcitonin suggests viral etiology. Some studies show procalcitonin-guided therapy reduces antibiotic use without harm."}],points:10}},

{title:"Non-Invasive Ventilation",content:`<div class="narrative"><p>Despite treatment, pH remains 7.30 with pCO2 62. Patient is using accessory muscles.</p></div><div class="socratic-prompt"><h4>NIV Decision</h4><p>When is non-invasive ventilation indicated in COPD exacerbation?</p></div>`,
hint_beginner:"NIV for respiratory acidosis despite initial treatment",hint_advanced:"What are contraindications to NIV?",
question:{prompt:"Is NIV indicated for this patient?",
options:[{text:"Yes - NIV (BiPAP) indicated for respiratory acidosis (pH <7.35 with elevated pCO2) despite initial medical therapy; reduces intubation and mortality",correct:true},
{text:"No - only for pH <7.20",correct:false},
{text:"Yes - all COPD exacerbations need NIV",correct:false},
{text:"No - go straight to intubation",correct:false}],
explanation:{correct:"NIV indicated for respiratory acidosis (pH 7.25-7.35) with hypercapnia not responding to initial treatment. Strong evidence: reduces intubation rate, mortality, length of stay. Use BiPAP (IPAP/EPAP).",incorrect:"NIV is indicated for pH <7.35 with hypercapnia. It's a bridge that often prevents intubation. Don't wait until pH <7.20."},
teaching:`<h4>NIV in COPD Exacerbation</h4><p><strong>Indications:</strong> pH <7.35 with elevated pCO2, accessory muscle use, RR >25</p><p><strong>Benefits:</strong> Reduces intubation 60%, mortality 50%</p><p><strong>Settings:</strong> IPAP 10-15, EPAP 5, titrate to comfort and ABG</p><p><strong>Contraindications:</strong> Unable to protect airway, facial trauma, hemodynamic instability</p>`,
why_chain:[{q:"How does BiPAP help?",a:"IPAP assists inspiration (reduces work of breathing), EPAP maintains alveolar recruitment and counters auto-PEEP. Together they improve ventilation and oxygenation."},{q:"When to intubate despite NIV?",a:"Worsening acidosis, altered mental status, inability to clear secretions, hemodynamic instability, no improvement in 1-2 hours."}],points:15}},

{title:"Discharge Planning",content:`<div class="narrative"><p>After 3 days, patient improved: pH 7.38, pCO2 48, SpO2 92% on 2L (his baseline). Ready for discharge.</p></div><div class="socratic-prompt"><h4>Optimize for Home</h4><p>What should the discharge plan include to prevent future exacerbations?</p></div>`,

question:{prompt:"What should the discharge plan include?",

{text:"PRN albuterol only - controllers not proven",correct:false},
{text:"Continue antibiotics for 14 days total",correct:false},
{text:"Start chronic oral steroids for prevention",correct:false}],
explanation:{correct:"Comprehensive discharge: 1) Complete 5-day steroids, 2) Optimize controllers (LAMA + LABA ± ICS based on GOLD), 3) Verify inhaler technique, 4) Vaccinations, 5) Smoking cessation (most important!), 6) Pulmonary rehab referral, 7) Follow-up in 1-4 weeks.",incorrect:"Exacerbation is an opportunity to optimize therapy. Controllers reduce future exacerbations. Smoking cessation is the only intervention that slows disease progression."},
teaching:`<h4>COPD Discharge Optimization</h4><p><strong>Medications:</strong> LAMA + LABA ± ICS (triple therapy if frequent exacerbations)</p><p><strong>Vaccinations:</strong> Annual flu, pneumococcal (PCV20 or PCV15+PPSV23)</p><p><strong>Smoking cessation:</strong> MOST IMPORTANT - only intervention slowing decline</p><p><strong>Pulmonary rehab:</strong> Reduces exacerbations, improves QOL</p>`,

{title:"Case Synthesis",content:`<div class="narrative"><p>This case illustrates comprehensive COPD exacerbation management from presentation to discharge optimization.</p></div><div class="socratic-prompt"><h4>Key Principles</h4><p>What are the critical differences between COPD and asthma exacerbation management?</p></div>`,
hint_beginner:"O2 target, antibiotic role, NIV indications, chronic management",hint_advanced:"What predicts mortality in COPD exacerbation?",

{text:"COPD exacerbations don't need steroids",correct:false},
{text:"Antibiotics contraindicated in COPD",correct:false}],

teaching:`<h4>COPD vs Asthma Exacerbation</h4><p><strong>O2 target:</strong> COPD 88-92% vs Asthma 93-95%</p><p><strong>Antibiotics:</strong> COPD - indicated if purulent; Asthma - rarely needed</p><p><strong>Ipratropium:</strong> COPD - throughout; Asthma - first hour only</p><p><strong>NIV:</strong> Strong evidence in COPD; less in asthma</p><p><strong>Long-term:</strong> COPD - smoking cessation; Asthma - ICS adherence</p>`,
why_chain:[{q:"What predicts poor outcomes?",a:"DECAF score: Dyspnea (eMRCD 5a/5b), Eosinopenia, Consolidation, Acidemia (pH <7.30), Atrial fibrillation. Predicts in-hospital mortality."}],points:10}}
];
function shuffleArray(a){const s=[...a];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s;}
function setDifficulty(l,b){difficulty=l;document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderStage(currentStage);}
function renderStage(i){
const s=stages[i],opts=shuffleArray(s.question.options.map((o,idx)=>({...o,idx}))),ltrs='ABCD';
let hints='';
if(difficulty==='beginner'&&s.hint_beginner)hints=`<div class="hint-beginner" style="display:block;">Hint: ${s.hint_beginner}</div>`;
else if(difficulty==='advanced'&&s.hint_advanced)hints=`<div class="hint-advanced" style="display:block;">Challenge: ${s.hint_advanced}</div>`;
const why=s.question.why_chain?`<div class="why-chain" id="why"><h4>WHY Chain</h4>${s.question.why_chain.map(w=>`<div class="why-item"><div class="why-q">Q: ${w.q}</div><div class="why-a">${w.a}</div></div>`).join('')}</div>`:'';
document.getElementById('progress').style.width=((i)/stages.length*100)+'%';
document.getElementById('scene-container').innerHTML=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${i+1} of ${stages.length}</div><div class="scene-title">${s.title}</div></div>${s.content}${hints}<div class="question-box"><div class="question-prompt">${s.question.prompt}</div><div class="mcq-options">${opts.map((o,j)=>`<div class="mcq-option" data-correct="${o.correct}" onclick="selectOption(this,${i})"><span class="option-letter">${ltrs[j]}</span><span class="option-text">${o.text}</span></div>`).join('')}</div><div class="feedback correct-feedback" id="fb-c"><div class="feedback-title">Correct!</div><div>${s.question.explanation.correct}</div></div><div class="feedback incorrect-feedback" id="fb-i"><div class="feedback-title">Not Quite</div><div>${s.question.explanation.incorrect}</div></div><div class="teaching-point" id="teach">${s.question.teaching}</div>${why}<button class="btn" id="next-btn" onclick="nextStage()">Continue</button></div></div>`;
}
function selectOption(el,i){
if(answeredQuestions.has(i))return;
const c=el.dataset.correct==='true',s=stages[i];
answeredQuestions.add(i);decisionPath.push({stage:s.title,correct:c,points:c?s.question.points:0});
if(c)score+=s.question.points;maxScore+=s.question.points;
document.getElementById('score').textContent=score;document.getElementById('maxScore').textContent=maxScore;
document.querySelectorAll('.mcq-option').forEach(o=>{o.classList.add('disabled');if(o.dataset.correct==='true')o.classList.add('correct');else if(o===el&&!c)o.classList.add('incorrect');});
document.getElementById(c?'fb-c':'fb-i').classList.add('show');
document.getElementById('teach').classList.add('show');
const w=document.getElementById('why');if(w)w.classList.add('show');
document.getElementById('next-btn').classList.add('show');
}
function nextStage(){if(++currentStage<stages.length){renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'});}else showCompletion();}
function showCompletion(){
const p=Math.round(score/maxScore*100);
let g,m,clr;
if(p>=90){g='Outstanding!';clr='#22c55e';m='Excellent COPD management!';}
else if(p>=80){g='Great Work!';clr='#3b82f6';m='Strong grasp. Review NIV indications.';}
else if(p>=70){g='Good Progress';clr='#f59e0b';m='Focus on O2 targets and ABG interpretation.';}
else{g='Keep Learning';clr='#ef4444';m='Review COPD vs asthma differences.';}
document.getElementById('scene-container').innerHTML=`<div class="scene completion"><div class="completion-grade" style="color:${clr}">${g}</div><div class="completion-percent" style="color:${clr}">${p}%</div><div style="font-size:1.3rem;margin-bottom:8px">${score}/${maxScore} points</div><div style="margin:16px 0;color:#e2e8f0">${m}</div><div class="completion-breakdown"><h4 style="margin-bottom:16px">Your Journey</h4>${decisionPath.map((d,j)=>`<div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;"><span style="color:${d.correct?'#4ade80':'#f87171'}">${d.correct?'Y':'N'} ${d.stage}</span><span style="color:#94a3b8">${d.points}/${stages[j].question.points}</span></div>`).join('')}</div></div>`;
document.getElementById('progress').style.width='100%';
}
document.addEventListener('DOMContentLoaded',()=>renderStage(0));


// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}



// ============================================================================
// EPA & CALIBRATION ENHANCEMENT - ReasonDx
// ============================================================================

// Case EPA Metadata
const caseEPA = {
    id: 'copd-exacerbation',
    primaryEPAs: ["EPA-2","EPA-4","EPA-3"],
    secondaryEPAs: ["EPA-1","EPA-10"],
    category: 'Pulmonary'
};

// Response tracking for calibration
let responseHistory = [];
let pendingSelection = null;

// EPA Names for display
const epaNames = {"EPA-1":"Gather H&P","EPA-2":"Prioritize DDx","EPA-3":"Recommend Tests","EPA-4":"Enter Orders","EPA-7":"Apply Evidence","EPA-10":"Recognize Urgency","EPA-12":"Perform Procedures"};

// Override selectOption to add confidence step
const originalSelectOption = typeof selectOption === 'function' ? selectOption : null;

function selectOptionEnhanced(index, correct) {
    const qId = 'q' + currentStage;
    if (answeredQuestions.has(qId)) return;
    
    // Store pending selection
    pendingSelection = { index, correct, stageIdx: currentStage };
    
    // Highlight selected option
    document.querySelectorAll('.mcq-option').forEach((opt, i) => {
        opt.classList.remove('selected');
        if (i === index) opt.classList.add('selected');
    });
    
    // Show confidence slider
    const confContainer = document.getElementById('confidence-container');
    if (confContainer) {
        confContainer.classList.add('show');
        confContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function updateConfidenceDisplay(value) {
    const display = document.getElementById('confidence-display');
    if (display) display.textContent = value + '%';
}

function submitWithConfidence() {
    if (!pendingSelection) return;
    
    const confidence = parseInt(document.getElementById('confidence-slider').value);
    const { index, correct, stageIdx } = pendingSelection;
    const stage = stages[stageIdx];
    
    // Record response with confidence
    responseHistory.push({
        stage: stageIdx + 1,
        stageTitle: stage.title,
        epaFocus: caseEPA.primaryEPAs[0],
        selectedIndex: index,
        selectedText: stage.question.options[index].text,
        correct: correct,
        confidence: confidence,
        points: correct ? stage.question.points : 0,
        maxPoints: stage.question.points
    });
    
    // Hide confidence container
    const confContainer = document.getElementById('confidence-container');
    if (confContainer) confContainer.classList.remove('show');
    
    // Now process the answer (call original logic)
    const qId = 'q' + stageIdx;
    answeredQuestions.add(qId);
    decisionPath[stageIdx] = index;
    
    maxScore += stage.question.points;
    if (correct) score += stage.question.points;
    
    document.getElementById('score').textContent = score;
    document.getElementById('maxScore').textContent = maxScore;
    
    // Show calibration feedback
    showCalibrationFeedback(confidence, correct);
    
    pendingSelection = null;
    renderStage();
}

function showCalibrationFeedback(confidence, correct) {
    // This will be shown in the feedback section after render
    const feedback = document.createElement('div');
    feedback.className = 'calibration-feedback show';
    
    if (correct && confidence >= 70) {
        feedback.classList.add('well-calibrated');
        feedback.innerHTML = '✅ <strong>Well calibrated!</strong> You were confident and correct.';
    } else if (correct && confidence < 50) {
        feedback.classList.add('underconfident');
        feedback.innerHTML = '📚 Correct, but you were uncertain. <strong>Trust your knowledge more!</strong>';
    } else if (!correct && confidence >= 70) {
        feedback.classList.add('overconfident');
        feedback.innerHTML = '⚠️ <strong>Overconfidence detected.</strong> High confidence + wrong answer is where diagnostic errors happen.';
    } else {
        feedback.classList.add('well-calibrated');
        feedback.innerHTML = '📝 Incorrect, but your uncertainty was appropriate. Review this concept.';
    }
    
    // Store for rendering
    window.lastCalibrationFeedback = feedback.outerHTML;
}

// Enhanced debrief with EPA and calibration
function showEnhancedDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    const content = document.getElementById('debriefContent');
    if (!overlay || !content) return;
    
    const percentage = maxScore > 0 ? Math.round((score / maxScore) * 100) : 0;
    
    // Calculate calibration
    const withConf = responseHistory.filter(r => r.confidence !== undefined);
    const correctWithConf = withConf.filter(r => r.correct);
    const incorrectWithConf = withConf.filter(r => !r.correct);
    const avgConfCorrect = correctWithConf.length > 0 
        ? Math.round(correctWithConf.reduce((s,r) => s + r.confidence, 0) / correctWithConf.length) : 0;
    const avgConfIncorrect = incorrectWithConf.length > 0 
        ? Math.round(incorrectWithConf.reduce((s,r) => s + r.confidence, 0) / incorrectWithConf.length) : 0;
    
    // EPA performance
    const epaPerf = {};
    responseHistory.forEach(r => {
        const epa = r.epaFocus || caseEPA.primaryEPAs[0];
        if (!epaPerf[epa]) epaPerf[epa] = { correct: 0, total: 0 };
        epaPerf[epa].total++;
        if (r.correct) epaPerf[epa].correct++;
    });
    
    // Calibration interpretation
    let calibrationMsg = '';
    if (avgConfCorrect - avgConfIncorrect > 20) {
        calibrationMsg = '✅ Good discrimination! You feel more confident when you\'re right.';
    } else if (avgConfIncorrect > 60) {
        calibrationMsg = '⚠️ Overconfidence pattern detected. Practice asking "What would make me wrong?"';
    } else {
        calibrationMsg = '📊 Work on calibration - confidence should differ between correct and incorrect answers.';
    }
    
    content.innerHTML = `
        <div style="text-align:center;margin-bottom:24px;">
            <div style="font-size:4rem;">${percentage >= 80 ? '🏆' : percentage >= 60 ? '👍' : '📚'}</div>
            <div style="font-size:2.5rem;font-weight:700;color:${percentage >= 80 ? '#22c55e' : percentage >= 60 ? '#f59e0b' : '#ef4444'}">${percentage}%</div>
            <div style="color:#6b7280;">Score: ${score}/${maxScore}</div>
        </div>
        
        <div class="epa-debrief-section">
            <h4>📋 EPA Competencies Assessed</h4>
            <div class="epa-progress-grid">
                ${Object.entries(epaPerf).map(([epa, data]) => {
                    const pct = Math.round((data.correct / data.total) * 100);
                    const colorClass = pct >= 80 ? 'high' : pct >= 60 ? 'medium' : 'low';
                    return `<div class="epa-progress-card">
                        <div class="epa-name">${epaNames[epa] || epa}</div>
                        <div class="epa-score ${colorClass}">${pct}%</div>
                    </div>`;
                }).join('')}
            </div>
        </div>
        
        <div class="calibration-debrief">
            <h4>🎯 Confidence Calibration</h4>
            <div class="calibration-stats">
                <div class="calibration-stat">
                    <div class="stat-value" style="color:#22c55e;">${avgConfCorrect}%</div>
                    <div class="stat-label">Avg confidence when correct</div>
                </div>
                <div class="calibration-stat">
                    <div class="stat-value" style="color:${avgConfIncorrect > 60 ? '#ef4444' : '#f59e0b'};">${avgConfIncorrect}%</div>
                    <div class="stat-label">Avg confidence when incorrect</div>
                </div>
            </div>
            <div class="calibration-interpretation">${calibrationMsg}</div>
        </div>
        
        <div class="decision-path">
            <h3>📝 Your Decisions</h3>
            ${responseHistory.map(r => `
                <div class="path-item ${r.correct ? 'path-optimal' : 'path-incorrect'}">
                    <div style="display:flex;justify-content:space-between;">
                        <div>
                            <div class="path-stage">${r.correct ? '✓' : '✗'} Stage ${r.stage}: ${r.stageTitle}</div>
                            <div class="path-choice" style="font-size:0.85rem;color:#6b7280;">${r.confidence}% confident</div>
                        </div>
                        <div class="path-points">${r.points}/${r.maxPoints}</div>
                    </div>
                </div>
            `).join('')}
        </div>
        
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
        <button class="debrief-btn" style="background:#e5e7eb;color:#4b5563;margin-top:8px;" onclick="closeDebrief()">Close</button>
    `;
    
    overlay.classList.add('show');
}

// Replace selectOption globally
window.selectOption = selectOptionEnhanced;

// Store original showDebrief if exists
if (typeof showDebrief === 'function') {
    window.originalShowDebrief = showDebrief;
}
window.showDebrief = showEnhancedDebrief;

</script>

<!-- Visual Debrief Overlay -->
<div class="debrief-overlay" id="debriefOverlay" onclick="if(event.target===this)closeDebrief()">
    <div class="debrief-content" id="debriefContent"></div>
</div>
