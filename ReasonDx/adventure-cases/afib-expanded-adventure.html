<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atrial Fibrillation | Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #7f1d1d 0%, #dc2626 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(127, 29, 29, 0.9); border-radius: 16px; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; background: #dc2626; margin-left: 10px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #dc2626, #fca5a5); border-radius: 3px; }
        .scene { background: linear-gradient(135deg, #7f1d1d, #991b1b); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .scene-header { background: rgba(220, 38, 38, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #fca5a5; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(220,38,38,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #dc2626, #991b1b); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #fca5a5; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','classification','unstable','ratecontrol','rhythmcontrol','chadsvasc','anticoag','cardioversion','ablation','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">💓 Atrial Fibrillation<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Irregularly Irregular</div></div><div class="scene-body"><div class="narrative"><p>A <span class="highlight">72-year-old man</span> presents with <span class="critical">palpitations and fatigue</span> × 2 days. Has history of HTN and diabetes.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 142 (irregular), BP 138/88<br><strong>ECG:</strong> Irregularly irregular rhythm, no P waves, narrow QRS<br><strong>Exam:</strong> Irregularly irregular pulse, no murmur</p></div><div class="alert-box"><div class="alert-title">🚨 AFib: Most Common Sustained Arrhythmia!</div><p>Affects 2-3% of population. Key concerns: stroke risk (5× higher), heart failure, and symptoms. Management: rate vs rhythm control + anticoagulation.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 ECG Features</div><div class="pathway"><strong>Classic AFib ECG:</strong><br>• Irregularly irregular R-R intervals<br>• Absent P waves<br>• Fibrillatory waves (if visible)<br>• Usually narrow QRS (unless aberrancy/BBB)<br><br><strong>AFib with RVR:</strong><br>Rate >100-110 bpm</div></div><button class="btn" onclick="nextStage()">Classification →</button></div></div>`;
    };

    window.render_classification = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">AFib Classification</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Types of AFib</div><table class="comparison-table"><tr><th>Type</th><th>Definition</th></tr><tr><td><strong>Paroxysmal</strong></td><td>Self-terminates within 7 days (usually <48h)</td></tr><tr><td><strong>Persistent</strong></td><td>Lasts >7 days OR requires cardioversion</td></tr><tr><td><strong>Long-standing persistent</strong></td><td>>12 months duration</td></tr><tr><td><strong>Permanent</strong></td><td>Decision made to not pursue rhythm control</td></tr><tr><td><strong>Valvular</strong></td><td>Associated with mitral stenosis or mechanical valve</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Common Causes</div><div class="pathway"><strong>Cardiac:</strong> HTN, CHF, CAD, valvular disease<br><strong>Pulmonary:</strong> PE, COPD, OSA<br><strong>Metabolic:</strong> Hyperthyroidism, electrolytes<br><strong>Toxic:</strong> Alcohol ("holiday heart"), caffeine<br><strong>Other:</strong> Post-operative, obesity, infection<br><br><strong>Lone AFib:</strong> No identifiable cause, <60 years</div></div><button class="btn" onclick="nextStage()">Unstable AFib →</button></div></div>`;
    };

    window.render_unstable = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">Hemodynamically Unstable</div></div><div class="scene-body"><div class="alert-box"><div class="alert-title">🚨 Unstable = Immediate Cardioversion!</div><p>Signs of instability: Hypotension, chest pain/ACS, altered mental status, severe heart failure. Don't delay for anticoagulation!</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Synchronized Cardioversion</div><table class="comparison-table"><tr><th>Step</th><th>Action</th></tr><tr><td>1</td><td>Sedate (if time permits)</td></tr><tr><td>2</td><td>SYNC mode ON</td></tr><tr><td>3</td><td>Biphasic: 120-200J (start 150J)</td></tr><tr><td>4</td><td>Monophasic: 200J</td></tr><tr><td>5</td><td>Escalate if unsuccessful</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Synchronized?</div><div class="pathway">Sync delivers shock on R wave<br>→ Avoids vulnerable T wave period<br>→ Prevents inducing VF<br><br><strong>NEVER use sync for:</strong><br>• VF (no R waves to sync to)<br>• Pulseless VT<br>• Polymorphic VT</div></div><button class="btn" onclick="nextStage()">Rate Control →</button></div></div>`;
    };

    window.render_ratecontrol = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">Rate Control</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Rate Control Agents</div><table class="comparison-table"><tr><th>Drug</th><th>Dose</th><th>Notes</th></tr><tr><td><strong>Metoprolol</strong></td><td>5 mg IV q5min (max 15mg)</td><td>Avoid in decompensated HF</td></tr><tr><td><strong>Diltiazem</strong></td><td>0.25 mg/kg IV, then 5-15 mg/hr</td><td>Avoid in HFrEF</td></tr><tr><td><strong>Digoxin</strong></td><td>0.5 mg IV, then 0.25 mg q6h</td><td>Slow onset; good for HF</td></tr><tr><td><strong>Amiodarone</strong></td><td>150 mg IV over 10 min</td><td>Rate + rhythm; use if HF/hypotension</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Rate Control Target</div><div class="pathway"><strong>Acute:</strong> HR <110 bpm<br><strong>Chronic:</strong> HR <80 at rest (lenient <110)<br><br><strong>RACE II trial:</strong><br>Lenient (HR <110) = Strict (HR <80)<br>No difference in outcomes!<br><br><strong>Choice of agent:</strong><br>• No HF: Beta-blocker or CCB<br>• HFrEF: Beta-blocker or digoxin<br>• Hypotension: Amiodarone</div></div><button class="btn" onclick="nextStage()">Rhythm Control →</button></div></div>`;
    };

    window.render_rhythmcontrol = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">Rhythm Control</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Antiarrhythmic Drugs</div><table class="comparison-table"><tr><th>Drug</th><th>Class</th><th>Use/Avoid</th></tr><tr><td><strong>Flecainide</strong></td><td>IC</td><td>No structural heart disease</td></tr><tr><td><strong>Propafenone</strong></td><td>IC</td><td>No structural heart disease</td></tr><tr><td><strong>Sotalol</strong></td><td>III</td><td>Avoid in HF, watch QT</td></tr><tr><td><strong>Dofetilide</strong></td><td>III</td><td>Inpatient initiation, watch QT</td></tr><tr><td><strong>Amiodarone</strong></td><td>III</td><td>Any patient; toxicities limit long-term</td></tr><tr><td><strong>Dronedarone</strong></td><td>III</td><td>Avoid in HF/permanent AFib</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ Class IC Warning!</div><p>Flecainide/propafenone contraindicated in structural heart disease (post-MI, HF, LVH). CAST trial showed increased mortality!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Rate vs Rhythm Control</div><div class="pathway"><strong>AFFIRM/RACE trials:</strong><br>No mortality difference!<br><br><strong>Favor rhythm control if:</strong><br>• Younger patients<br>• Symptomatic despite rate control<br>• First episode/early AFib<br>• Tachycardia-mediated cardiomyopathy<br><br><strong>Favor rate control if:</strong><br>• Elderly, asymptomatic<br>• Multiple cardioversion failures<br>• Contraindications to antiarrhythmics</div></div><button class="btn" onclick="nextStage()">CHA₂DS₂-VASc →</button></div></div>`;
    };

    window.render_chadsvasc = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">Stroke Risk Assessment</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 CHA₂DS₂-VASc Score</div><table class="comparison-table"><tr><th>Factor</th><th>Points</th></tr><tr><td><strong>C</strong>HF</td><td>1</td></tr><tr><td><strong>H</strong>ypertension</td><td>1</td></tr><tr><td><strong>A</strong>ge ≥75</td><td>2</td></tr><tr><td><strong>D</strong>iabetes</td><td>1</td></tr><tr><td><strong>S</strong>troke/TIA/thromboembolism</td><td>2</td></tr><tr><td><strong>V</strong>ascular disease (MI, PAD, aortic plaque)</td><td>1</td></tr><tr><td><strong>A</strong>ge 65-74</td><td>1</td></tr><tr><td><strong>S</strong>ex category (female)</td><td>1</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Anticoagulation Decision</div><div class="pathway"><strong>Score 0 (male) or 1 (female):</strong><br>No anticoagulation needed<br><br><strong>Score 1 (male):</strong><br>Consider anticoagulation<br><br><strong>Score ≥2:</strong><br>Anticoagulation recommended<br><br><strong>This patient:</strong><br>Age 72 (1) + HTN (1) + DM (1) = 3<br>→ Anticoagulation indicated!</div></div><button class="btn" onclick="nextStage()">Anticoagulation →</button></div></div>`;
    };

    window.render_anticoag = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 10</div><div class="scene-title">Anticoagulation Options</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Anticoagulant Choices</div><table class="comparison-table"><tr><th>Drug</th><th>Monitoring</th><th>Reversal</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Apixaban</strong></td><td>None</td><td>Andexanet alfa</td></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Rivaroxaban</strong></td><td>None</td><td>Andexanet alfa</td></tr><tr><td><strong>Dabigatran</strong></td><td>None</td><td>Idarucizumab</td></tr><tr><td><strong>Edoxaban</strong></td><td>None</td><td>Andexanet alfa</td></tr><tr><td><strong>Warfarin</strong></td><td>INR (goal 2-3)</td><td>Vitamin K, FFP, PCC</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 DOACs Preferred Over Warfarin!</div><p>Guidelines prefer DOACs: less ICH, no monitoring, fewer interactions. Warfarin only for: mechanical valves, moderate-severe mitral stenosis, severe CKD.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 HAS-BLED Score</div><div class="pathway"><strong>Bleeding risk assessment:</strong><br>H - HTN (uncontrolled, >160)<br>A - Abnormal renal/liver function<br>S - Stroke history<br>B - Bleeding history<br>L - Labile INR<br>E - Elderly (>65)<br>D - Drugs (antiplatelets, NSAIDs) or alcohol<br><br>Score ≥3 = High bleeding risk<br>But high HAS-BLED doesn't mean<br>withhold anticoagulation - means<br>address modifiable risk factors!</div></div><button class="btn" onclick="nextStage()">Cardioversion →</button></div></div>`;
    };

    window.render_cardioversion = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 10</div><div class="scene-title">Elective Cardioversion</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Cardioversion Anticoagulation Rules</div><table class="comparison-table"><tr><th>Scenario</th><th>Approach</th></tr><tr><td><strong>AFib <48 hours</strong></td><td>Cardiovert + start anticoag (if indicated)</td></tr><tr><td><strong>AFib ≥48 hours or unknown</strong></td><td>Option 1: 3 weeks anticoag → cardiovert → 4+ weeks anticoag<br>Option 2: TEE to rule out LAA thrombus → cardiovert</td></tr><tr><td><strong>Hemodynamically unstable</strong></td><td>Immediate cardioversion regardless of duration</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ Why 48 Hours Matters</div><p>Thrombus formation in LA/LAA begins after ~48 hours of AFib. Cardioversion can dislodge thrombus → stroke. Must anticoagulate or do TEE first!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Post-Cardioversion</div><div class="pathway"><strong>Continue anticoag ≥4 weeks post-cardioversion</strong><br>(regardless of rhythm)<br><br>Why? "Atrial stunning" after cardioversion<br>→ LA doesn't contract well<br>→ Risk of thrombus formation<br>→ Takes ~4 weeks to recover<br><br>Long-term anticoag based on CHA₂DS₂-VASc<br>(not whether they're in sinus rhythm)</div></div><button class="btn" onclick="nextStage()">Ablation →</button></div></div>`;
    };

    window.render_ablation = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 10</div><div class="scene-title">Catheter Ablation</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Ablation Indications</div><table class="comparison-table"><tr><th>Indication</th></tr><tr><td>Symptomatic AFib refractory to ≥1 antiarrhythmic</td></tr><tr><td>Patient preference over drug therapy</td></tr><tr><td>Tachycardia-mediated cardiomyopathy</td></tr><tr><td>HFrEF (may improve EF)</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Pulmonary Vein Isolation</div><div class="pathway"><strong>Mechanism:</strong><br>AFib triggers often arise from PVs<br>→ Isolate PVs from LA electrically<br>→ Prevents triggers from initiating AFib<br><br><strong>Success rates:</strong><br>• Paroxysmal: 70-80% single procedure<br>• Persistent: 50-70% (may need repeat)<br><br><strong>Complications:</strong><br>• PV stenosis<br>• Cardiac tamponade<br>• Esophageal injury/fistula (rare, fatal)<br>• Stroke (continue anticoag peri-procedure)</div></div><div class="alert-box"><div class="alert-title">⚠️ Ablation Doesn't Eliminate Stroke Risk!</div><p>Continue anticoagulation based on CHA₂DS₂-VASc even after successful ablation. AFib can recur asymptomatically.</p></div><button class="btn" onclick="nextStage()">Debrief →</button></div></div>`;
    };

    window.render_debrief = function() {
        return `<div class="scene"><div style="text-align:center;padding:40px;"><div style="font-size:4rem;margin-bottom:12px;">💓</div><div style="font-size:1.8rem;font-weight:700;color:#4ade80;">Atrial Fibrillation Mastery!</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 High-Yield Summary</div><table class="comparison-table"><tr><th>Concept</th><th>Key Point</th></tr><tr><td>Unstable</td><td>Immediate synchronized cardioversion</td></tr><tr><td>Rate control</td><td>Beta-blocker or CCB; target HR <110</td></tr><tr><td>CHA₂DS₂-VASc ≥2</td><td>Anticoagulate (DOACs preferred)</td></tr><tr><td>Cardioversion timing</td><td><48h = safe; ≥48h = anticoag 3wk or TEE first</td></tr><tr><td>Class IC drugs</td><td>Avoid in structural heart disease</td></tr><tr><td>Post-ablation</td><td>Continue anticoag based on score</td></tr></table></div><div class="tips"><div class="pearl"><div class="tip-header">✓ Pearls</div><ul style="margin-left:16px;"><li>DOACs preferred over warfarin</li><li>Rate vs rhythm = similar outcomes</li><li>Amiodarone if hypotensive/HF</li><li>48-hour rule for cardioversion</li></ul></div><div class="pitfall"><div class="tip-header">✗ Pitfalls</div><ul style="margin-left:16px;"><li>Class IC in structural heart disease</li><li>Stopping anticoag after ablation</li><li>CCB in HFrEF</li><li>Cardioverting without anticoag (≥48h)</li></ul></div></div><button class="btn" onclick="state.stage=0;render()">🔄 Restart Case</button></div></div>`;
    };

    render();
    </script>

<!-- CROSS-PLATFORM LEARNING LINKS -->
<div class="rdx-crossplatform" style="background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); border-radius: 12px; padding: 20px; margin: 20px auto; max-width: 1000px; border: 1px solid #cbd5e1;">
    <h4 style="font-weight: 700; color: #1e293b; margin-bottom: 16px; font-size: 18px;">🎯 Continue Your Learning</h4>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px;">

<script>
// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
    
    // Auto-inject hint examples into existing content
    window.rdxInit = function() {
        // Could add dynamic hint injection here based on difficulty
        console.log('ReasonDx Enhanced Features loaded for: Afib Expanded Adventure');
    };
    
    // Initialize on load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.rdxInit);
    } else {
        window.rdxInit();
    }
})();
</script>
