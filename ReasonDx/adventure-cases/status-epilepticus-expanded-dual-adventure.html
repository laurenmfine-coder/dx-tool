<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Epilepticus | Dual-Mode Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        body.adult { background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%); }
        body.peds { background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%); }
        .container { max-width: 900px; margin: 0 auto; }
        .mode-toggle { display: flex; justify-content: center; margin-bottom: 20px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 4px; }
        .mode-btn { flex: 1; padding: 12px 24px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; background: transparent; color: #e2e8f0; }
        .mode-btn.active { background: rgba(255,255,255,0.2); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-radius: 16px; margin-bottom: 20px; }
        .adult .header { background: rgba(30, 58, 95, 0.9); }
        .peds .header { background: rgba(124, 58, 237, 0.9); }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; margin-left: 10px; }
        .adult .badge { background: #2563eb; }
        .peds .badge { background: #a78bfa; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; border-radius: 3px; }
        .adult .progress-fill { background: linear-gradient(90deg, #2563eb, #93c5fd); }
        .peds .progress-fill { background: linear-gradient(90deg, #a78bfa, #c4b5fd); }
        .scene { border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .adult .scene { background: linear-gradient(135deg, #1e3a5f, #1e40af); }
        .peds .scene { background: linear-gradient(135deg, #6d28d9, #7c3aed); }
        .scene-header { padding: 16px 20px; }
        .adult .scene-header { background: rgba(37, 99, 235, 0.15); }
        .peds .scene-header { background: rgba(167, 139, 250, 0.15); }
        .scene-phase { font-size: 0.75rem; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(37,99,235,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .adult .btn { background: linear-gradient(135deg, #2563eb, #1e40af); }
        .peds .btn { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); }
        .why-chain { background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(37,99,235,0.15)); border: 1px solid rgba(139,92,246,0.3); border-radius: 16px; padding: 24px; margin: 24px 0; }
        .why-chain-title { font-size: 1.2rem; font-weight: 700; color: #c4b5fd; margin-bottom: 20px; }
        .why-item { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
        .why-q { font-weight: 600; color: #e9d5ff; margin-bottom: 10px; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="adult">
    <div class="container">
        <div class="mode-toggle">
            <button class="mode-btn active" onclick="setMode('adult')">🏥 Adult</button>
            <button class="mode-btn" onclick="setMode('peds')">👶 Pediatric</button>
        </div>
        <div id="app"></div>
    </div>
    <script>
    const STAGES = ['arrival','definition','causes','initial','benzos','second_line','refractory','super_refractory','complications','post_ictal','debrief'];
    const state = { stage: 0, mode: 'adult' };

    function setMode(m) { state.mode = m; state.stage = 0; document.body.className = m; document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); render(); }
    function nextStage() { state.stage++; render(); }

    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        const icon = state.mode === 'adult' ? '⚡' : '👶⚡';
        const title = state.mode === 'adult' ? 'Status Epilepticus' : 'Pediatric Status Epilepticus';
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">${icon} ${title}<span class="badge">11 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }

    window.render_arrival = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 11</div><div class="scene-title">Actively Seizing</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What comorbidities would change your management approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Always consider mimics and look-alikes in your differential</p>
                </div><div class="narrative"><p>EMS brings a <span class="highlight">45-year-old man</span> with <span class="critical">ongoing generalized tonic-clonic seizure</span> for 12 minutes. History of epilepsy, ran out of medications.</p><p style="margin-top:12px;"><strong>EMS report:</strong> Witnessed onset, continuous convulsions, one dose of IM midazolam given<br><strong>Vitals:</strong> HR 130, BP 180/100, RR agonal, SpO2 88%<br><strong>Exam:</strong> Generalized tonic-clonic activity, cyanotic, unresponsive</p></div><div class="alert-box"><div class="alert-title">🚨 Time Is Brain!</div><p>Seizures >5 minutes unlikely to stop spontaneously. Prolonged seizures cause excitotoxic neuronal injury. Treat immediately!</p></div><button class="btn" onclick="nextStage()">Definition →</button></div></div>`;
        } else {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 11</div><div class="scene-title">The Seizing Child</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate acuity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would renal or hepatic impairment affect drug dosing?</p>
                </div><div class="narrative"><p>A <span class="highlight">4-year-old girl</span> arrives with <span class="critical">ongoing seizure</span> for 8 minutes. Developed fever today, then started convulsing.</p><p style="margin-top:12px;"><strong>EMS report:</strong> Generalized tonic-clonic, no IV access yet<br><strong>Vitals:</strong> HR 160, T 103.2°F, SpO2 92%<br><strong>Weight:</strong> 18 kg</p></div><div class="alert-box"><div class="alert-title">⚠️ Febrile Status Epilepticus</div><p>Prolonged febrile seizure (>15 min) requires same urgent treatment as other status. Don't assume it will stop on its own!</p></div><button class="btn" onclick="nextStage()">Definition →</button></div></div>`;
        }
    };

    window.render_definition = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 11</div><div class="scene-title">What Is Status Epilepticus?</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the most likely diagnosis given this presentation?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if the patient doesn't respond to initial treatment?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Reassess if the patient isn't improving as expected</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Status Epilepticus Definition</div><table class="comparison-table"><tr><th>Time</th><th>Clinical Significance</th></tr><tr><td><strong>5 minutes</strong></td><td>Operational definition - START treatment</td></tr><tr><td><strong>30 minutes</strong></td><td>Risk of permanent neuronal injury begins</td></tr><tr><td><strong>60 minutes</strong></td><td>Refractory status epilepticus</td></tr></table><p style="margin-top:12px;"><strong>Old definition:</strong> 30 minutes. <strong>Current:</strong> Treat at 5 minutes!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why 5 Minutes Matters</div><div class="pathway">Most self-limited seizures stop within 2-3 minutes<br><br>After 5 minutes:<br>• GABA receptor internalization begins<br>• Benzodiazepines become less effective<br>• Glutamate excitotoxicity increases<br>• Self-termination unlikely<br><br>Each minute of delay → worse outcomes</div></div><button class="btn" onclick="nextStage()">Causes →</button></div></div>`;
    };

    window.render_causes = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 11</div><div class="scene-title">Etiology</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What key history element is most helpful here?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What's the evidence level for the standard treatment?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Common Causes (Adults)</div><table class="comparison-table"><tr><th>Category</th><th>Examples</th></tr><tr><td><strong>AED non-compliance</strong></td><td>Most common in known epileptics</td></tr><tr><td><strong>Alcohol-related</strong></td><td>Withdrawal, intoxication</td></tr><tr><td><strong>CNS infection</strong></td><td>Meningitis, encephalitis</td></tr><tr><td><strong>Stroke</strong></td><td>Especially hemorrhagic</td></tr><tr><td><strong>Metabolic</strong></td><td>Hypoglycemia, hyponatremia, uremia</td></tr><tr><td><strong>Drugs/toxins</strong></td><td>Cocaine, isoniazid, theophylline</td></tr><tr><td><strong>Tumor</strong></td><td>Primary or metastatic</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ Check Glucose Immediately!</div><p>Hypoglycemia is rapidly reversible cause. Point-of-care glucose should be checked within first minute.</p></div><button class="btn" onclick="nextStage()">Initial Management →</button></div></div>`;
        } else {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 11</div><div class="scene-title">Pediatric Causes</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Which physical exam finding is most specific?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> When would you involve subspecialty consultation?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fefce8; border:1px solid #eab308; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #eab308;">
                    <p style="margin:0; color:#854d0e; font-size:0.9rem;"><strong>🚫 Common Mistake:</strong> Avoid anchoring bias - keep your differential broad initially</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Common Causes (Children)</div><table class="comparison-table"><tr><th>Age</th><th>Common Causes</th></tr><tr><td><strong>Neonate</strong></td><td>HIE, infection, metabolic, structural</td></tr><tr><td><strong>Infant</strong></td><td>Febrile, infection, metabolic</td></tr><tr><td><strong>Toddler</strong></td><td>Febrile SE (most common), infection</td></tr><tr><td><strong>School-age</strong></td><td>AED non-compliance, idiopathic, infection</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Febrile Status Epilepticus</div><div class="pathway">Prolonged febrile seizure (>15 min)<br>• ~5% of febrile seizures become prolonged<br>• Associated with later epilepsy risk<br>• Treat the same as other SE<br>• Also treat the fever!<br><br>Rule out meningitis if:<br>• <6 months old<br>• Prolonged postictal period<br>• Meningeal signs</div></div><button class="btn" onclick="nextStage()">Initial Management →</button></div></div>`;
        }
    };

    window.render_initial = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 11</div><div class="scene-title">First 5 Minutes</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Consider the most common causes first, then rarer ones</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What are the key complications to monitor for?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 ABCs + Immediate Actions</div><ul style="margin-left:20px;line-height:2;"><li><strong>Airway:</strong> Position, suction, NPA/OPA (don't force anything in mouth!)</li><li><strong>Breathing:</strong> O2, BVM if needed</li><li><strong>Circulation:</strong> IV/IO access</li><li><strong>Glucose:</strong> Check immediately, give D50${state.mode === 'peds' ? ' (D25 or D10 in kids)' : ''} if low</li><li><strong>Thiamine:</strong> Give before glucose ${state.mode === 'adult' ? 'in adults' : 'if malnourished'}</li></ul></div><div class="mechanism-box"><div class="mechanism-title">🧬 Stabilization Priorities</div><div class="pathway"><strong>0-5 minutes:</strong><br>• Time the seizure<br>• Protect from injury (pad rails)<br>• Establish IV access<br>• Check fingerstick glucose<br>• Draw labs: BMP, CBC, AED levels, toxicology<br>• Prepare first-line benzodiazepine<br><br>DON'T: Restrain forcefully, put things in mouth</div></div><button class="btn" onclick="nextStage()">Benzodiazepines →</button></div></div>`;
    };

    window.render_benzos = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 11</div><div class="scene-title">First-Line: Benzodiazepines</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What comorbidities would change your management approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#f5f3ff; border:1px solid #8b5cf6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #8b5cf6;">
                    <p style="margin:0; color:#5b21b6; font-size:0.9rem;"><strong>📋 Board Tip:</strong> Document your clinical reasoning clearly</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Benzodiazepine Options</div><table class="comparison-table"><tr><th>Drug</th><th>Route</th><th>Dose</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Midazolam IM</strong></td><td>IM (no IV needed!)</td><td>${state.mode === 'adult' ? '10 mg' : '0.2 mg/kg (max 10 mg)'}</td></tr><tr><td><strong>Lorazepam IV</strong></td><td>IV</td><td>${state.mode === 'adult' ? '4 mg' : '0.1 mg/kg (max 4 mg)'}</td></tr><tr><td><strong>Diazepam IV</strong></td><td>IV</td><td>${state.mode === 'adult' ? '10 mg' : '0.2 mg/kg (max 10 mg)'}</td></tr><tr><td><strong>Diazepam PR</strong></td><td>Rectal</td><td>${state.mode === 'adult' ? '20 mg' : '0.5 mg/kg'}</td></tr><tr><td><strong>Midazolam IN</strong></td><td>Intranasal</td><td>${state.mode === 'peds' ? '0.2 mg/kg (max 10 mg)' : '10 mg'}</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 RAMPART Trial: IM Midazolam = IV Lorazepam</div><p>IM midazolam is as effective as IV lorazepam and faster to give (no IV needed). Give it first if no IV access!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Repeat Dosing</div><div class="pathway">If seizure continues after 5 minutes:<br>→ Give SECOND dose of benzodiazepine<br><br>Maximum 2 doses of benzodiazepines<br>(further doses have diminishing returns<br>and increase respiratory depression)<br><br>After 2 doses → move to second-line agent</div></div><button class="btn" onclick="nextStage()">Second-Line Agents →</button></div></div>`;
    };

    window.render_second_line = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 11</div><div class="scene-title">Second-Line Antiepileptics</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate acuity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would renal or hepatic impairment affect drug dosing?</p>

(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
