<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Failing Filter | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#06B6D4;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#0E7490,#06B6D4);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(6,182,212,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(6,182,212,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#000;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(6,182,212,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#000}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#000;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🫘 The Failing Filter</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'72M',wt:'78kg',hx:'Vomiting x3d, decreased PO, on lisinopril',exam:'Dry membranes, poor turgor',vitals:{HR:'108',BP:'92/58'},labs:{Cr:'3.2',BUN:'58',K:'5.4',FENa:'0.4%'}},int:{age:'58F',wt:'65kg',hx:'Post-cath 24hrs, CKD3 baseline',exam:'Rales, edema',vitals:{HR:'88',BP:'158/92'},labs:{Cr:'4.1',BUN:'42',K:'5.8',FENa:'2.8%'}},adv:{age:'45M',wt:'85kg',hx:'Rhabdo post-marathon, dark urine',exam:'Muscle tenderness',vitals:{HR:'98',BP:'108/68'},labs:{Cr:'6.8',CK:'45000',K:'6.9'}}};
const Q=[
{t:'KDIGO Staging',q:'Cr 1.1→3.2. What stage AKI?',h:'Stage 3=≥3x or Cr≥4',o:[{id:'a',txt:'Stage 3 (≥3x baseline)',c:1,p:100},{id:'b',txt:'Stage 2',c:0,p:40},{id:'c',txt:'Stage 1',c:0,p:0}],fb:{1:'<b>Correct!</b> 3.2/1.1=2.9x=Stage 3. KDIGO: 1(1.5-1.9x), 2(2-2.9x), 3(≥3x or Cr≥4).',0:'<b>KDIGO:</b> Calculate fold-change. ≥3x=Stage 3.'}},
{t:'FENa Interpretation',q:'FENa 0.4%. What type AKI?',h:'Low FENa=kidneys holding Na',o:[{id:'a',txt:'Prerenal (FENa <1%)',c:1,p:100},{id:'b',txt:'Intrinsic/ATN (FENa >2%)',c:0,p:0},{id:'c',txt:'Postrenal',c:0,p:10}],fb:{1:'<b>Correct!</b> FENa <1%=prerenal (kidneys working, underperfused). >2%=ATN (tubular damage).',0:'<b>FENa:</b> <1%=prerenal, >2%=intrinsic.'}},
{t:'FENa Formula',q:'FENa calculation?',h:'Compares Na to Cr clearance',o:[{id:'a',txt:'(UNa×PCr)/(PNa×UCr)×100',c:1,p:100},{id:'b',txt:'UNa/PNa×100',c:0,p:30},{id:'c',txt:'BUN/Cr',c:0,p:0}],fb:{1:'<b>Correct!</b> FENa=(UNa×PCr)/(PNa×UCr)×100. Use FEUrea if on diuretics.',0:'<b>Formula:</b> Needs spot urine Na/Cr and serum Na/Cr.'}},
{t:'Prerenal Treatment',q:'Prerenal AKI with hypotension. First treatment?',h:'Fix underlying cause',o:[{id:'a',txt:'IV fluid resuscitation',c:1,p:100},{id:'b',txt:'Furosemide',c:0,p:0},{id:'c',txt:'Dialysis',c:0,p:10}],fb:{1:'<b>Correct!</b> Prerenal=underperfusion. Give fluids, hold nephrotoxins (ACEi, NSAIDs).',0:'<b>Prerenal:</b> Volume resuscitation. Diuretics contraindicated.'}},
{t:'Contrast Prevention',q:'Prevent contrast nephropathy?',h:'Hydration is key',o:[{id:'a',txt:'IV NS pre/post, minimize contrast, hold metformin',c:1,p:100},{id:'b',txt:'Furosemide before',c:0,p:0},{id:'c',txt:'NAC definitely works',c:0,p:20}],fb:{1:'<b>Correct!</b> Prevention: hydration, minimize contrast, hold metformin. NAC evidence weak.',0:'<b>CIN prevention:</b> Hydration most important.'}},
{t:'Rhabdo Treatment',q:'CK 45000 with AKI. Urine output goal?',h:'Aggressive fluids',o:[{id:'a',txt:'200-300 mL/hr (aggressive IVF)',c:1,p:100},{id:'b',txt:'30 mL/hr',c:0,p:20},{id:'c',txt:'Restrict fluids',c:0,p:0}],fb:{1:'<b>Correct!</b> Rhabdo: AGGRESSIVE fluids, 200-300 mL/hr UOP. Consider bicarb for urine alkalinization.',0:'<b>Rhabdo:</b> May need 10+ L/day. Goal 200-300 mL/hr UOP.'}},
{t:'Dialysis Indications',q:'When emergent dialysis?',h:'AEIOU mnemonic',o:[{id:'a',txt:'Acidosis, Electrolytes (K), Ingestion, Overload, Uremia refractory to Rx',c:1,p:100},{id:'b',txt:'Any Cr >3',c:0,p:10},{id:'c',txt:'Stage 2 AKI',c:0,p:0}],fb:{1:'<b>Correct!</b> AEIOU: Acidosis (pH<7.1), Electrolytes (K>6.5 refractory), Ingestions, Overload, Uremic symptoms.',0:'<b>AEIOU:</b> Dialysis for refractory complications, not Cr number alone.'}},
{t:'Nephrotoxin Hold',q:'Which meds to HOLD in AKI?',h:'Multiple drug classes harm kidneys',o:[{id:'a',txt:'ACEi/ARBs, NSAIDs, aminoglycosides, contrast',c:1,p:100},{id:'b',txt:'Beta-blockers',c:0,p:0},{id:'c',txt:'PPIs only',c:0,p:10}],fb:{1:'<b>Correct!</b> Hold: ACEi/ARBs (↓GFR), NSAIDs (↓renal blood flow), aminoglycosides, contrast, metformin.',0:'<b>Nephrotoxins:</b> ACEi, ARBs, NSAIDs, aminoglycosides, contrast, metformin.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next →':'Results →';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🫘 The Failing Filter</h1><p style="color:var(--muted);margin-bottom:32px">AKI: KDIGO staging, FENa, prerenal vs intrinsic, dialysis indications</p><button class="start-btn" onclick="go(\'pres\')">Begin Case →</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🔬 Renal Emergency</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment →</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">🔍 '+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">💡 '+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit →</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">📌 AKI Pearls</div><div class="pearl-item"><b>KDIGO:</b> Stage 1(1.5-1.9x), 2(2-2.9x), 3(≥3x or Cr≥4)</div><div class="pearl-item"><b>FENa:</b> <1%=prerenal, >2%=ATN. Use FEUrea if on diuretics</div><div class="pearl-item"><b>Prerenal Rx:</b> Fluids, hold nephrotoxins</div><div class="pearl-item"><b>Dialysis (AEIOU):</b> Acidosis, Electrolytes, Ingestion, Overload, Uremia</div><div class="pearl-item"><b>Rhabdo:</b> Aggressive IVF, goal UOP 200-300 mL/hr</div></div><div class="cross-link"><a href="../mechanism/aki-module.html">MechanismDx: AKI</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
