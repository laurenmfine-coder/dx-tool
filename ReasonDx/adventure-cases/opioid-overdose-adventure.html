<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Unresponsive Patient | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#7C3AED;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#5B21B6,#7C3AED);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(124,58,237,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(124,58,237,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(124,58,237,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">💉 The Unresponsive Patient</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'28M',wt:'72kg',hx:'Found unresponsive by friend, known heroin use, needle nearby',exam:'Unresponsive, pinpoint pupils, RR 4, cyanotic',vitals:{HR:'52',BP:'88/52',RR:'4',SpO2:'78%'},labs:{Pupils:'1mm bilat',Hx:'IVDU, track marks'}},int:{age:'45F',wt:'65kg',hx:'Chronic pain patient, prescribed fentanyl patches, found confused',exam:'Somnolent, small pupils, shallow breathing, multiple fentanyl patches on body',vitals:{HR:'58',BP:'92/58',RR:'6',Temp:'96.8°F',SpO2:'82%'},labs:{Pupils:'2mm bilat',Hx:'3 patches visible (should be 1)'}},adv:{age:'19M',wt:'68kg',hx:'Party, unknown substance ingestion, multiple drugs suspected',exam:'Unresponsive, miosis, bradypnea, also has hyperthermia and rigidity',vitals:{HR:'48',BP:'78/48',RR:'4',Temp:'104°F',SpO2:'72%'},labs:{Pupils:'2mm',Hx:'Fentanyl + ?other substances'}}};
const Q=[
{t:'Toxidrome Recognition',q:'Classic triad of opioid toxidrome?',h:'The three key findings',o:[{id:'a',txt:'CNS depression + respiratory depression + miosis (pinpoint pupils)',c:1,p:100},{id:'b',txt:'Tachycardia + mydriasis + hyperthermia',c:0,p:10},{id:'c',txt:'Hypertension + tremor + diaphoresis',c:0,p:10}],fb:{1:'<b>Correct!</b> Opioid toxidrome: CNS depression (sedation → coma), respiratory depression (↓RR, apnea), miosis (pinpoint pupils). Also: hypotension, hypothermia, decreased bowel sounds.',0:'<b>Opioid toxidrome:</b> CNS depression, respiratory depression, miosis.'}},
{t:'Immediate Management',q:'First priority in suspected opioid overdose with respiratory depression?',h:'ABCs first',o:[{id:'a',txt:'Airway management and ventilatory support (bag-mask ventilation)',c:1,p:100},{id:'b',txt:'Naloxone first',c:0,p:40},{id:'c',txt:'IV fluids',c:0,p:20}],fb:{1:'<b>Correct!</b> Airway and breathing first! Provide supplemental O2, bag-mask ventilation if needed. Naloxone important but dont delay ventilation waiting for it.',0:'<b>ABCs first:</b> Secure airway, provide ventilation. Naloxone is adjunct.'}},
{t:'Naloxone Dosing',q:'Appropriate initial naloxone dose for suspected opioid overdose?',h:'Start low, titrate up',o:[{id:'a',txt:'0.04-0.4mg IV, titrate to respiratory effort (avoid full reversal if opioid-dependent)',c:1,p:100},{id:'b',txt:'2mg IV always',c:0,p:30},{id:'c',txt:'10mg IV to ensure reversal',c:0,p:10}],fb:{1:'<b>Correct!</b> Start low (0.04-0.4mg) and titrate. Goal: adequate respirations, NOT full alertness. High doses in dependent patients cause severe withdrawal (vomiting, aspiration risk, agitation).',0:'<b>Naloxone dosing:</b> Start low, titrate to respirations. Avoid precipitating withdrawal.'}},
{t:'Naloxone Routes',q:'Alternative naloxone routes if no IV access?',h:'Multiple options available',o:[{id:'a',txt:'IM, SC, intranasal (4mg), or nebulized - all effective',c:1,p:100},{id:'b',txt:'IV only',c:0,p:20},{id:'c',txt:'Oral only',c:0,p:10}],fb:{1:'<b>Correct!</b> Multiple routes: IM (0.4mg), intranasal (4mg spray), SC, nebulized. Intranasal widely available to lay public. IM may have slightly delayed onset vs IV.',0:'<b>Routes:</b> IM, intranasal, SC all work. Intranasal available OTC.'}},
{t:'Duration Concerns',q:'Why is observation important after naloxone administration?',h:'Half-life mismatch',o:[{id:'a',txt:'Naloxone half-life (30-90 min) shorter than most opioids - resedation can occur',c:1,p:100},{id:'b',txt:'Naloxone causes delayed toxicity',c:0,p:10},{id:'c',txt:'One dose always sufficient',c:0,p:20}],fb:{1:'<b>Correct!</b> Naloxone duration ~30-90 min. Many opioids last longer (methadone 24-36hr, fentanyl patches hours). Monitor for resedation, may need repeat doses or infusion.',0:'<b>Resedation:</b> Naloxone wears off before many opioids. Observe closely.'}},
{t:'Synthetic Opioids',q:'Why might fentanyl overdose require higher naloxone doses?',h:'Potency matters',o:[{id:'a',txt:'Higher receptor affinity and potency require more competitive antagonism',c:1,p:100},{id:'b',txt:'Fentanyl is not an opioid',c:0,p:0},{id:'c',txt:'Lower doses always work',c:0,p:20}],fb:{1:'<b>Correct!</b> Fentanyl is ~100x more potent than morphine with high receptor affinity. May need higher naloxone doses (total 10mg+) and prolonged observation/infusion.',0:'<b>Fentanyl:</b> High potency may require larger naloxone doses.'}},
{t:'Pulmonary Complications',q:'What pulmonary complication should you watch for in opioid overdose?',h:'Even after naloxone',o:[{id:'a',txt:'Non-cardiogenic pulmonary edema (NCPE) - can occur even after reversal',c:1,p:100},{id:'b',txt:'Pneumothorax',c:0,p:10},{id:'c',txt:'Pulmonary embolism',c:0,p:20}],fb:{1:'<b>Correct!</b> NCPE can develop hours after reversal. Pink frothy sputum, hypoxia despite reversal. Treat with O2, positive pressure. Also aspiration pneumonia/pneumonitis common.',0:'<b>NCPE:</b> Can occur even after successful reversal. Monitor oxygenation.'}},
{t:'Discharge Planning',q:'What should be provided to all opioid overdose survivors at discharge?',h:'Harm reduction',o:[{id:'a',txt:'Naloxone prescription/kit, overdose education, addiction treatment referral',c:1,p:100},{id:'b',txt:'Just prescribe more opioids',c:0,p:0},{id:'c',txt:'No follow-up needed',c:0,p:10}],fb:{1:'<b>Correct!</b> Harm reduction: Naloxone kit with training, OEND (overdose education), MAT referral (buprenorphine, methadone), safe injection resources. Prior OD is major risk factor for future OD death.',0:'<b>Discharge:</b> Naloxone kit, education, treatment referral. Prior OD = high risk.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>💉 The Unresponsive Patient</h1><p style="color:var(--muted);margin-bottom:32px">Opioid Overdose: Toxidrome, naloxone dosing, resedation risk, harm reduction</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">💉 Altered Mental Status</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Opioid Overdose Pearls</div><div class="pearl-item"><b>Toxidrome:</b> CNS depression + respiratory depression + miosis</div><div class="pearl-item"><b>ABCs first:</b> Ventilate before/during naloxone</div><div class="pearl-item"><b>Naloxone:</b> Start 0.04-0.4mg, titrate to respirations</div><div class="pearl-item"><b>Routes:</b> IV, IM, intranasal (4mg), SC all effective</div><div class="pearl-item"><b>Resedation:</b> Naloxone shorter than most opioids</div><div class="pearl-item"><b>Fentanyl:</b> May need higher doses (10mg+)</div><div class="pearl-item"><b>Discharge:</b> Naloxone kit, education, treatment referral</div></div><div class="cross-link"><a href="alcohol-withdrawal-adventure-enhanced.html">Related: Alcohol Withdrawal</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
