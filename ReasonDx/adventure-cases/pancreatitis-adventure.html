<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Epigastric Pain | ReasonDx Adventure</title>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --border: #334155; --text: #F1F5F9; --muted: #94A3B8; --accent: #14B8A6; --success: #10B981; --warning: #F59E0B; --danger: #DC2626; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
        .header { background: linear-gradient(135deg, #0D9488 0%, #14B8A6 100%); padding: 12px 20px; position: sticky; top: 0; z-index: 100; }
        .header-row { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .header-title { font-size: 1.1rem; font-weight: 600; }
        .stat { background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 8px; }
        .stat-value { font-size: 1.1rem; font-weight: 700; font-family: monospace; }
        .stat-label { font-size: 0.6rem; opacity: 0.8; text-transform: uppercase; }
        .main { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; }
        .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .card-phase { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
        .card-title { font-size: 1.5rem; font-weight: 700; }
        .card-body { padding: 24px; }
        .narrative { background: linear-gradient(135deg, rgba(20,184,166,0.1), rgba(13,148,136,0.1)); border-left: 4px solid var(--accent); padding: 20px 24px; border-radius: 0 12px 12px 0; margin-bottom: 24px; line-height: 1.8; }
        .narrative .hl { background: rgba(20,184,166,0.3); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .setup-screen { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; }
        .setup-screen h1 { font-size: 2rem; margin-bottom: 8px; }
        .setup-screen .subtitle { color: var(--muted); margin-bottom: 32px; }
        .start-btn { background: var(--accent); color: white; border: none; padding: 16px 48px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .question-section { margin-bottom: 32px; }
        .question-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .question-number { background: var(--accent); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .question-text { font-size: 1.1rem; font-weight: 600; }
        .radio-options { display: flex; flex-direction: column; gap: 10px; }
        .radio-option { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .radio-option:hover { border-color: var(--accent); }
        .radio-option.selected { border-color: var(--accent); background: rgba(20,184,166,0.15); }
        .radio-option.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .radio-option.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .radio-circle { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; }
        .radio-option.selected .radio-circle { border-color: var(--accent); background: radial-gradient(circle, var(--accent) 40%, transparent 40%); }
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .checkbox-item:hover { border-color: var(--accent); }
        .checkbox-item.selected { border-color: var(--accent); background: rgba(20,184,166,0.15); }
        .checkbox-item.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .checkbox-item.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .checkbox-box { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .checkbox-item.selected .checkbox-box { background: var(--accent); border-color: var(--accent); }
        .checkbox-item.selected .checkbox-box::after { content: '✓'; color: white; font-weight: bold; }
        .feedback { padding: 20px; border-radius: 12px; margin: 20px 0; }
        .feedback.excellent { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); }
        .feedback.acceptable { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); }
        .feedback-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .feedback-icon { font-size: 1.5rem; }
        .feedback-title { font-weight: 700; }
        .feedback-text { color: var(--muted); line-height: 1.7; }
        .feedback-text strong { color: var(--text); }
        .alert { padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; }
        .alert.info { background: rgba(20,184,166,0.15); border: 1px solid rgba(20,184,166,0.3); }
        .alert.danger { background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.3); }
        .alert-icon { font-size: 1.5rem; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: 600; margin-bottom: 4px; }
        .alert-desc { font-size: 0.9rem; color: var(--muted); }
        .btn { padding: 14px 28px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-row { display: flex; gap: 12px; margin-top: 24px; }
        .lab-panel { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .lab-panel-title { font-weight: 600; margin-bottom: 16px; color: var(--accent); }
        .lab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .lab-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; }
        .lab-name { font-size: 0.8rem; color: var(--muted); }
        .lab-value { font-size: 1.1rem; font-weight: 700; }
        .lab-value.critical { color: var(--danger); }
        .lab-value.high { color: var(--warning); }
        .lab-range { font-size: 0.7rem; color: var(--muted); }
        .outcome { text-align: center; padding: 40px 20px; }
        .outcome-icon { font-size: 4rem; margin-bottom: 16px; }
        .outcome-title { font-size: 2rem; font-weight: 700; color: var(--success); margin-bottom: 8px; }
        .outcome-desc { color: var(--muted); max-width: 600px; margin: 0 auto 24px; }
        .score-summary { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 24px; margin: 24px auto; max-width: 500px; }
        .score-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .score-row:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <header class="header"><div class="header-row"><div class="header-title">🔥 The Epigastric Pain</div><div class="stat"><div class="stat-value" id="scoreDisplay">0</div><div class="stat-label">Points</div></div></div></header>
    <main class="main"><div id="stageContainer"></div></main>
    <script>
    const state = { stage:'setup', score:0 };
    
    function addScore(pts) { state.score += pts; document.getElementById('scoreDisplay').textContent = state.score; }

    const stages = {
        setup: { render: () => `
            <div class="setup-screen">
                <h1>🔥 The Epigastric Pain</h1>
                <p class="subtitle">Acute pancreatitis diagnosis and management</p>
                <button class="start-btn" onclick="goTo('presentation')">Begin Case →</button>
            </div>`
        },
        presentation: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Emergency Department</div><div class="card-title">📋 Severe Abdominal Pain</div></div>
                <div class="card-body">
                    <div class="narrative">A <span class="hl">48-year-old male</span> presents with <span class="hl">severe epigastric pain radiating to the back</span> for 8 hours. The pain started after a <span class="hl">"heavy drinking weekend"</span>. He has <span class="hl">nausea and multiple episodes of vomiting</span>.<br><br>History: Drinks <span class="hl">6-8 beers daily</span>. Had a <span class="hl">similar episode 2 years ago</span>. On exam: <span class="hl">epigastric tenderness with guarding</span>, decreased bowel sounds.<br><br>Vitals: HR 112, BP 98/62, Temp 38.1°C, RR 22.</div>
                    <div class="lab-panel">
                        <div class="lab-panel-title">Laboratory Results</div>
                        <div class="lab-grid">
                            <div class="lab-item"><div class="lab-name">Lipase</div><div class="lab-value critical">1,842 U/L</div><div class="lab-range">0-160</div></div>
                            <div class="lab-item"><div class="lab-name">Amylase</div><div class="lab-value critical">524 U/L</div><div class="lab-range">30-110</div></div>
                            <div class="lab-item"><div class="lab-name">WBC</div><div class="lab-value high">16.4 K</div><div class="lab-range">4.5-11</div></div>
                            <div class="lab-item"><div class="lab-name">BUN</div><div class="lab-value high">32 mg/dL</div><div class="lab-range">7-20</div></div>
                            <div class="lab-item"><div class="lab-name">Creatinine</div><div class="lab-value high">1.6 mg/dL</div><div class="lab-range">0.7-1.3</div></div>
                            <div class="lab-item"><div class="lab-name">Glucose</div><div class="lab-value high">186 mg/dL</div><div class="lab-range">70-100</div></div>
                        </div>
                    </div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="goTo('diagnosis')">Confirm Diagnosis →</button></div>
                </div>
            </div>`
        },
        diagnosis: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Diagnosis</div><div class="card-title">📋 Revised Atlanta Criteria</div></div>
                <div class="card-body">
                    <div class="alert info"><span class="alert-icon">📋</span><div class="alert-content"><div class="alert-title">Atlanta Criteria (2 of 3 required)</div><div class="alert-desc">1. Characteristic abdominal pain | 2. Lipase/amylase ≥3× ULN | 3. Imaging findings of pancreatitis</div></div></div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">1</div><div class="question-text">Does this patient meet criteria for acute pancreatitis?</div></div>
                        <div class="radio-options" id="dxOpts">
                            <div class="radio-option" data-id="yes" onclick="selectDx('yes')"><div class="radio-circle"></div><div><strong>Yes - meets Atlanta criteria</strong><br><small style="color:var(--muted)">Characteristic pain + lipase >3× ULN</small></div></div>
                            <div class="radio-option" data-id="need_ct" onclick="selectDx('need_ct')"><div class="radio-circle"></div><div><strong>Need CT first</strong><br><small style="color:var(--muted)">Must confirm with imaging</small></div></div>
                            <div class="radio-option" data-id="no" onclick="selectDx('no')"><div class="radio-circle"></div><div><strong>No - lipase not high enough</strong><br><small style="color:var(--muted)">Needs to be higher</small></div></div>
                        </div>
                    </div>
                    <div id="dxFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="dxSubmit" onclick="submitDx()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        etiology: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Etiology</div><div class="card-title">🔍 Common Causes</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">2</div><div class="question-text">What are the TWO most common causes of acute pancreatitis?</div></div>
                        <div class="checkbox-grid" id="etioOpts">
                            <div class="checkbox-item" data-id="gallstones" data-correct="true" onclick="toggleEtio('gallstones')"><div class="checkbox-box"></div><span>Gallstones</span></div>
                            <div class="checkbox-item" data-id="alcohol" data-correct="true" onclick="toggleEtio('alcohol')"><div class="checkbox-box"></div><span>Alcohol</span></div>
                            <div class="checkbox-item" data-id="hypertrig" data-correct="false" onclick="toggleEtio('hypertrig')"><div class="checkbox-box"></div><span>Hypertriglyceridemia</span></div>
                            <div class="checkbox-item" data-id="drugs" data-correct="false" onclick="toggleEtio('drugs')"><div class="checkbox-box"></div><span>Medications</span></div>
                            <div class="checkbox-item" data-id="ercp" data-correct="false" onclick="toggleEtio('ercp')"><div class="checkbox-box"></div><span>Post-ERCP</span></div>
                            <div class="checkbox-item" data-id="trauma" data-correct="false" onclick="toggleEtio('trauma')"><div class="checkbox-box"></div><span>Trauma</span></div>
                        </div>
                    </div>
                    <div id="etioFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="submitEtio()">Submit →</button></div>
                </div>
            </div>`
        },
        severity: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Severity</div><div class="card-title">⚠️ Risk Stratification</div></div>
                <div class="card-body">
                    <div class="alert danger"><span class="alert-icon">📋</span><div class="alert-content"><div class="alert-title">BISAP Score (1 point each)</div><div class="alert-desc">BUN >25 | Impaired mental status | SIRS | Age >60 | Pleural effusion</div></div></div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">3</div><div class="question-text">This patient has BUN 32 and meets SIRS criteria (HR >90, Temp >38, WBC >12K). What is his BISAP score?</div></div>
                        <div class="radio-options" id="sevOpts">
                            <div class="radio-option" data-id="0" onclick="selectSev('0')"><div class="radio-circle"></div><span>0 - Low risk</span></div>
                            <div class="radio-option" data-id="1" onclick="selectSev('1')"><div class="radio-circle"></div><span>1 - Low risk</span></div>
                            <div class="radio-option" data-id="2" onclick="selectSev('2')"><div class="radio-circle"></div><span>2 - Intermediate risk</span></div>
                            <div class="radio-option" data-id="3" onclick="selectSev('3')"><div class="radio-circle"></div><span>3+ - High risk</span></div>
                        </div>
                    </div>
                    <div id="sevFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="sevSubmit" onclick="submitSev()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        treatment: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Treatment</div><div class="card-title">💊 Initial Management</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">4</div><div class="question-text">What are the key components of acute pancreatitis treatment?</div></div>
                        <div class="checkbox-grid" id="txOpts">
                            <div class="checkbox-item" data-id="ivf" data-correct="true" onclick="toggleTx('ivf')"><div class="checkbox-box"></div><span>Aggressive IV fluids (LR preferred)</span></div>
                            <div class="checkbox-item" data-id="pain" data-correct="true" onclick="toggleTx('pain')"><div class="checkbox-box"></div><span>Pain control</span></div>
                            <div class="checkbox-item" data-id="npo_short" data-correct="true" onclick="toggleTx('npo_short')"><div class="checkbox-box"></div><span>Early enteral nutrition (within 24-72h)</span></div>
                            <div class="checkbox-item" data-id="antiemetic" data-correct="true" onclick="toggleTx('antiemetic')"><div class="checkbox-box"></div><span>Antiemetics</span></div>
                            <div class="checkbox-item" data-id="abx" data-correct="false" onclick="toggleTx('abx')"><div class="checkbox-box"></div><span>Prophylactic antibiotics</span></div>
                            <div class="checkbox-item" data-id="npo_long" data-correct="false" onclick="toggleTx('npo_long')"><div class="checkbox-box"></div><span>Prolonged NPO (>7 days)</span></div>
                        </div>
                    </div>
                    <div id="txFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="submitTx()">Submit →</button></div>
                </div>
            </div>`
        },
        fluids: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Fluid Therapy</div><div class="card-title">💧 IV Fluid Strategy</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">5</div><div class="question-text">What is the recommended IV fluid approach in acute pancreatitis?</div></div>
                        <div class="radio-options" id="fluidOpts">
                            <div class="radio-option" data-id="goal" onclick="selectFluid('goal')"><div class="radio-circle"></div><div><strong>Goal-directed fluid resuscitation</strong><br><small style="color:var(--muted)">Moderate (1.5-2.5 mL/kg/hr) with monitoring of response</small></div></div>
                            <div class="radio-option" data-id="aggressive" onclick="selectFluid('aggressive')"><div class="radio-circle"></div><div><strong>Aggressive (>4L in first 24h for everyone)</strong><br><small style="color:var(--muted)">Maximum fluids regardless of response</small></div></div>
                            <div class="radio-option" data-id="restrict" onclick="selectFluid('restrict')"><div class="radio-circle"></div><div><strong>Fluid restriction</strong><br><small style="color:var(--muted)">Minimize third-spacing</small></div></div>
                        </div>
                    </div>
                    <div id="fluidFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="fluidSubmit" onclick="submitFluid()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        outcome: { render: () => `
            <div class="card"><div class="card-body">
                <div class="outcome">
                    <div class="outcome-icon">🎉</div>
                    <div class="outcome-title">Patient Recovered!</div>
                    <div class="outcome-desc">Patient received goal-directed IV LR (250-500 mL/hr initially), pain control, and was started on clear liquids within 24 hours as pain improved. He was advanced to low-fat diet by day 3. RUQ ultrasound showed no gallstones. He was counseled on alcohol cessation and discharged day 5.</div>
                </div>
                <div class="score-summary">
                    <h3 style="margin-bottom:16px">Performance</h3>
                    <div class="score-row"><span>Diagnosis</span><span>${state.dxScore||0}/100</span></div>
                    <div class="score-row"><span>Etiology</span><span>${state.etioScore||0}/100</span></div>
                    <div class="score-row"><span>Severity</span><span>${state.sevScore||0}/100</span></div>
                    <div class="score-row"><span>Treatment</span><span>${state.txScore||0}/100</span></div>
                    <div class="score-row"><span>Fluid Strategy</span><span>${state.fluidScore||0}/100</span></div>
                    <div class="score-row" style="border-top:2px solid var(--border);padding-top:12px"><strong>Total</strong><strong>${state.score}</strong></div>
                </div>
                <div class="feedback excellent"><div class="feedback-header"><span class="feedback-icon">💡</span><span class="feedback-title">Pancreatitis Pearls</span></div><div class="feedback-text">
                    • <strong>Atlanta criteria:</strong> 2 of 3: characteristic pain + lipase ≥3× ULN + imaging findings<br>
                    • <strong>Top causes:</strong> Gallstones (~40%) and Alcohol (~40%) = "GET SMASHED" mnemonic<br>
                    • <strong>Lipase vs amylase:</strong> Lipase more specific and stays elevated longer<br>
                    • <strong>CT timing:</strong> NOT needed for diagnosis if meets Atlanta criteria; use at 72-96h if not improving (assess necrosis)<br>
                    • <strong>Fluids:</strong> Goal-directed LR (preferred over NS - less SIRS), NOT blindly aggressive<br>
                    • <strong>Nutrition:</strong> EARLY enteral feeding within 24-72h (not prolonged NPO!)<br>
                    • <strong>Antibiotics:</strong> NOT prophylactic; only for infected necrosis (FNA-proven)<br>
                    • <strong>Always get RUQ US:</strong> Rule out gallstones as etiology (even if known alcohol use!)
                </div></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="location.reload()">Play Again</button></div>
            </div></div>`
        }
    };

    let selectedDx = null;
    function selectDx(id) { selectedDx = id; document.querySelectorAll('#dxOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('dxSubmit').disabled = false; }
    function submitDx() {
        document.querySelectorAll('#dxOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'yes') o.classList.add('correct');
            else if (o.dataset.id === selectedDx) o.classList.add('incorrect');
        });
        state.dxScore = selectedDx === 'yes' ? 100 : 40;
        addScore(selectedDx === 'yes' ? 40 : 15);
        document.getElementById('dxFeedback').innerHTML = `<div class="feedback ${selectedDx==='yes'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedDx==='yes'?'✅':'📚'}</span><span class="feedback-title">${selectedDx==='yes'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>Meets 2 of 3 Atlanta criteria:</strong> (1) Characteristic epigastric pain radiating to back, (2) Lipase 1,842 is >3× ULN (>480). CT is NOT required for diagnosis if 2 criteria are met!</div></div>`;
        document.getElementById('dxSubmit').textContent = 'Continue →';
        document.getElementById('dxSubmit').onclick = () => goTo('etiology');
    }

    let selectedEtio = new Set();
    function toggleEtio(id) {
        const el = document.querySelector(`#etioOpts .checkbox-item[data-id="${id}"]`);
        if(selectedEtio.has(id)) { selectedEtio.delete(id); el.classList.remove('selected'); }
        else { selectedEtio.add(id); el.classList.add('selected'); }
    }
    function submitEtio() {
        let correct = 0;
        const items = [{id:'gallstones',c:true},{id:'alcohol',c:true},{id:'hypertrig',c:false},{id:'drugs',c:false},{id:'ercp',c:false},{id:'trauma',c:false}];
        items.forEach(i => {
            const el = document.querySelector(`#etioOpts .checkbox-item[data-id="${i.id}"]`);
            const sel = selectedEtio.has(i.id);
            if (i.c && sel) { el.classList.add('correct'); correct++; }
            else if (!i.c && sel) { el.classList.add('incorrect'); }
        });
        state.etioScore = correct === 2 ? 100 : (correct === 1 ? 50 : 20);
        addScore(correct === 2 ? 40 : (correct === 1 ? 20 : 10));
        document.getElementById('etioFeedback').innerHTML = `<div class="feedback ${state.etioScore>=75?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${state.etioScore>=75?'✅':'📚'}</span><span class="feedback-title">Pancreatitis Etiology</span></div><div class="feedback-text"><strong>Top 2 causes (~80%):</strong> Gallstones and Alcohol<br><strong>Other causes:</strong> Hypertriglyceridemia (>1000), post-ERCP, drugs (valproate, azathioprine), hypercalcemia, trauma, idiopathic</div></div>`;
        document.querySelector('#etioFeedback').closest('.card-body').querySelector('.btn-row').innerHTML = `<button class="btn btn-primary" onclick="goTo('severity')">Assess Severity →</button>`;
    }

    let selectedSev = null;
    function selectSev(id) { selectedSev = id; document.querySelectorAll('#sevOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('sevSubmit').disabled = false; }
    function submitSev() {
        document.querySelectorAll('#sevOpts .radio-option').forEach(o => {
            if (o.dataset.id === '2') o.classList.add('correct');
            else if (o.dataset.id === selectedSev) o.classList.add('incorrect');
        });
        state.sevScore = selectedSev === '2' ? 100 : 40;
        addScore(selectedSev === '2' ? 40 : 15);
        document.getElementById('sevFeedback').innerHTML = `<div class="feedback ${selectedSev==='2'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedSev==='2'?'✅':'📚'}</span><span class="feedback-title">${selectedSev==='2'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>BISAP = 2:</strong> BUN >25 ✓ (32) + SIRS ✓ (meets criteria). No impaired mental status, age <60, no pleural effusion mentioned. BISAP ≥3 predicts higher mortality. This patient is intermediate risk.</div></div>`;
        document.getElementById('sevSubmit').textContent = 'Continue →';
        document.getElementById('sevSubmit').onclick = () => goTo('treatment');
    }

    let selectedTx = new Set();
    function toggleTx(id) {
        const el = document.querySelector(`#txOpts .checkbox-item[data-id="${id}"]`);
        if(selectedTx.has(id)) { selectedTx.delete(id); el.classList.remove('selected'); }
        else { selectedTx.add(id); el.classList.add('selected'); }
    }
    function submitTx() {
        let correct = 0;
        const items = [{id:'ivf',c:true},{id:'pain',c:true},{id:'npo_short',c:true},{id:'antiemetic',c:true},{id:'abx',c:false},{id:'npo_long',c:false}];
        items.forEach(i => {
            const el = document.querySelector(`#txOpts .checkbox-item[data-id="${i.id}"]`);
            const sel = selectedTx.has(i.id);
            if (i.c && sel) { el.classList.add('correct'); correct++; }
            else if (!i.c && sel) { el.classList.add('incorrect'); }
        });
        state.txScore = Math.round(correct / 4 * 100);
        addScore(Math.round(state.txScore / 2.5));
        document.getElementById('txFeedback').innerHTML = `<div class="feedback ${state.txScore>=75?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${state.txScore>=75?'✅':'📚'}</span><span class="feedback-title">Pancreatitis Treatment</span></div><div class="feedback-text"><strong>Core treatment:</strong> Goal-directed IVF (LR preferred), pain control, early enteral nutrition (24-72h), antiemetics<br><strong>NOT recommended:</strong> Prophylactic antibiotics (only for proven infected necrosis), prolonged NPO (increases complications!)</div></div>`;
        document.querySelector('#txFeedback').closest('.card-body').querySelector('.btn-row').innerHTML = `<button class="btn btn-primary" onclick="goTo('fluids')">Fluid Strategy →</button>`;
    }

    let selectedFluid = null;
    function selectFluid(id) { selectedFluid = id; document.querySelectorAll('#fluidOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('fluidSubmit').disabled = false; }
    function submitFluid() {
        document.querySelectorAll('#fluidOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'goal') o.classList.add('correct');
            else if (o.dataset.id === selectedFluid) o.classList.add('incorrect');
        });
        state.fluidScore = selectedFluid === 'goal' ? 100 : 40;
        addScore(selectedFluid === 'goal' ? 40 : 15);
        document.getElementById('fluidFeedback').innerHTML = `<div class="feedback ${selectedFluid==='goal'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedFluid==='goal'?'✅':'📚'}</span><span class="feedback-title">${selectedFluid==='goal'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>Goal-directed (not blindly aggressive):</strong> WATERFALL trial showed aggressive fluids increased complications. Use LR (less SIRS than NS), ~1.5-2.5 mL/kg/hr, titrate to UOP, HR, BUN.</div></div>`;
        document.getElementById('fluidSubmit').textContent = 'Complete →';
        document.getElementById('fluidSubmit').onclick = () => goTo('outcome');
    }

    function goTo(id) { state.stage = id; document.getElementById('stageContainer').innerHTML = stages[id].render(); window.scrollTo(0,0); }
    document.addEventListener('DOMContentLoaded', () => goTo('setup'));
    </script>
</body>
</html>
