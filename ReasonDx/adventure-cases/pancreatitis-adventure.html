<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Angry Pancreas | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#EA580C;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#C2410C,#EA580C);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(234,88,12,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(234,88,12,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(234,88,12,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🫗 The Angry Pancreas</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'45M',wt:'85kg',hx:'Epigastric pain to back after heavy drinking',exam:'Tender epigastrium, decreased bowel sounds',vitals:{HR:'98',BP:'128/82'},labs:{Lipase:'1840',WBC:'12.4',Cr:'1.0',Glu:'142'}},int:{age:'52F',wt:'95kg',hx:'RUQ pain, nausea, obese, gallstones on US',exam:'Guarding, + Murphys',vitals:{HR:'108',BP:'118/72'},labs:{Lipase:'2400',WBC:'16.2',ALT:'312',Bili:'2.8'}},adv:{age:'62M',wt:'78kg',hx:'Severe pain x48hrs, confused',exam:'Cullen sign, Grey-Turner, obtunded',vitals:{HR:'124',BP:'88/52'},labs:{Lipase:'3200',WBC:'22.1',Cr:'2.8',Ca:'6.8',PaO2:'58'}}};
const Q=[
{t:'Diagnosis Criteria',q:'How many criteria needed to diagnose acute pancreatitis?',h:'Revised Atlanta',o:[{id:'a',txt:'2 of 3: characteristic pain + lipase 3x ULN + imaging',c:1,p:100},{id:'b',txt:'Lipase elevation alone',c:0,p:30},{id:'c',txt:'All 3 required',c:0,p:10}],fb:{1:'<b>Correct!</b> Atlanta: 2 of 3. Pain + lipase usually enough. CT not needed if clinical dx clear.',0:'<b>Atlanta:</b> 2 of 3 criteria. CT not always needed.'}},
{t:'BISAP Score',q:'BISAP includes which components?',h:'Bedside severity prediction',o:[{id:'a',txt:'BUN>25, Impaired mental status, SIRS, Age>60, Pleural effusion',c:1,p:100},{id:'b',txt:'Lipase level',c:0,p:0},{id:'c',txt:'CT findings',c:0,p:20}],fb:{1:'<b>Correct!</b> BISAP (1pt each): BUN>25, Impaired mentation, SIRS>=2, Age>60, Pleural effusion. Score>=3 = severe.',0:'<b>BISAP:</b> Simple bedside score. >=3 = severe.'}},
{t:'Fluid Resuscitation',q:'Initial fluid rate for acute pancreatitis?',h:'Aggressive early fluids',o:[{id:'a',txt:'LR 250-500 mL/hr initially (3-4L in first 24hrs)',c:1,p:100},{id:'b',txt:'NS 100 mL/hr',c:0,p:20},{id:'c',txt:'Restrict fluids',c:0,p:0}],fb:{1:'<b>Correct!</b> Goal-directed: 250-500 mL/hr initially. LR preferred over NS. Target UOP 0.5 mL/kg/hr.',0:'<b>Aggressive fluids:</b> Massive third-spacing. Early resuscitation reduces necrosis.'}},
{t:'Fluid Type',q:'Preferred crystalloid for pancreatitis?',h:'Balanced vs NS',o:[{id:'a',txt:'Lactated Ringers (reduces SIRS vs NS)',c:1,p:100},{id:'b',txt:'Normal saline',c:0,p:60},{id:'c',txt:'D5W',c:0,p:0}],fb:{1:'<b>Correct!</b> LR preferred. Studies show reduced SIRS vs NS.',0:'<b>LR > NS:</b> Less inflammatory response.'}},
{t:'Nutrition Timing',q:'When to start enteral nutrition?',h:'Early feeding better',o:[{id:'a',txt:'Within 24-72 hrs if tolerated (dont wait for pain resolution)',c:1,p:100},{id:'b',txt:'NPO until pain-free',c:0,p:20},{id:'c',txt:'TPN for first week',c:0,p:0}],fb:{1:'<b>Correct!</b> Early EN (24-72 hrs) reduces infection and mortality. Oral preferred; NG/NJ if needed.',0:'<b>Early feeding:</b> Dont wait for pain or lipase. EN > TPN.'}},
{t:'Gallstone Pancreatitis',q:'ALT >150 suggests gallstone etiology. When to do ERCP?',h:'Cholangitis or obstruction',o:[{id:'a',txt:'Within 24hrs if cholangitis; within 72hrs if persistent obstruction',c:1,p:100},{id:'b',txt:'All gallstone pancreatitis',c:0,p:20},{id:'c',txt:'Never',c:0,p:0}],fb:{1:'<b>Correct!</b> ERCP if cholangitis (<24hrs) or persistent obstruction. Not routine. Cholecystectomy same admission.',0:'<b>ERCP:</b> For cholangitis or persistent obstruction only.'}},
{t:'Antibiotics',q:'Prophylactic antibiotics in severe pancreatitis?',h:'Changed recommendation',o:[{id:'a',txt:'NOT recommended (only if infected necrosis confirmed)',c:1,p:100},{id:'b',txt:'Yes, all severe',c:0,p:20},{id:'c',txt:'Yes, all pancreatitis',c:0,p:0}],fb:{1:'<b>Correct!</b> Prophylactic Abx NOT recommended. Increases fungal infection. Treat only confirmed infected necrosis.',0:'<b>No prophylaxis:</b> Abx only for documented infected necrosis.'}},
{t:'Complication Timing',q:'When do local complications develop?',h:'Early vs late',o:[{id:'a',txt:'Necrosis: days 1-4; Pseudocyst/WON: >4 weeks',c:1,p:100},{id:'b',txt:'Immediately',c:0,p:10},{id:'c',txt:'Only after 2 weeks',c:0,p:30}],fb:{1:'<b>Correct!</b> Early (<4wks): edematous or necrotizing. Late (>4wks): pseudocyst or walled-off necrosis.',0:'<b>Timing:</b> Necrosis early. Walled collections need >4 weeks.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🫗 The Angry Pancreas</h1><p style="color:var(--muted);margin-bottom:32px">Pancreatitis: Diagnosis, severity, fluids, nutrition, ERCP, antibiotics</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🔥 GI Emergency</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Pancreatitis Pearls</div><div class="pearl-item"><b>Diagnosis:</b> 2 of 3: pain + lipase 3x + imaging</div><div class="pearl-item"><b>BISAP:</b> BUN, Impaired, SIRS, Age, Pleural eff</div><div class="pearl-item"><b>Fluids:</b> LR 250-500 mL/hr initially</div><div class="pearl-item"><b>Nutrition:</b> Early EN within 24-72 hrs</div><div class="pearl-item"><b>No prophylactic Abx</b></div></div><div class="cross-link"><a href="../mechanism/gi-hepatology.html">MechanismDx: GI</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
