<script>
let currentStage = 0;
let score = 0;
let maxScore = 0;
let difficulty = 'standard';
let answeredQuestions = new Set();
let decisionPath = [];

const stages = [
    {
        "title": "Initial Presentation",
        "content": "<div class=\"narrative\">\n                <p>A <span class=\"highlight\">34-year-old woman</span> is brought to the ED by ambulance 20 minutes after eating shrimp at a restaurant. She has no known allergies.</p>\n                <p style=\"margin-top:12px;\"><strong>Symptoms:</strong> Diffuse hives, lip swelling, throat tightness, difficulty breathing, feeling \"like I'm going to die\"</p>\n            </div>\n            <div class=\"patient-card\">\n                <h4>Initial Assessment</h4>\n                <div class=\"vitals-grid\">\n                    <div class=\"vital-item\"><div class=\"vital-label\">HR</div><div class=\"vital-value abnormal\">124</div></div>\n                    <div class=\"vital-item\"><div class=\"vital-label\">BP</div><div class=\"vital-value abnormal\">84/52</div></div>\n                    <div class=\"vital-item\"><div class=\"vital-label\">RR</div><div class=\"vital-value abnormal\">28</div></div>\n                    <div class=\"vital-item\"><div class=\"vital-label\">SpO2</div><div class=\"vital-value abnormal\">91% RA</div></div>\n                    <div class=\"vital-item\"><div class=\"vital-label\">Appearance</div><div class=\"vital-value abnormal\">Anxious, urticaria</div></div>\n                </div>\n            </div>",
        "hint_beginner": "What clinical criteria define anaphylaxis? How many organ systems must be involved?",
        "hint_advanced": "Can anaphylaxis occur without skin findings? What percentage of cases lack urticaria?",
        "question": {
            "prompt": "Does this patient meet clinical criteria for anaphylaxis?",
            "options": [
                {
                    "text": "Yes - acute onset with skin involvement (urticaria, angioedema) PLUS respiratory compromise AND hypotension",
                    "correct": true
                },
                {
                    "text": "No - true anaphylaxis requires documented IgE-mediated reaction with prior sensitization history",
                    "correct": false
                },
                {
                    "text": "Uncertain - need to wait for serum tryptase results to confirm mast cell degranulation",
                    "correct": false
                },
                {
                    "text": "Yes - but this is mild anaphylaxis since she is still conscious and talking",
                    "correct": false
                },
                {
                    "text": "No - this is severe allergic reaction but not anaphylaxis since there is no cardiac arrest",
                    "correct": false
                }
            ],
            "explanation": {
                "correct": "This is definite anaphylaxis meeting multiple clinical criteria: acute onset after likely allergen exposure with skin involvement (urticaria, lip angioedema) PLUS respiratory compromise (throat tightness, dyspnea, hypoxia) PLUS cardiovascular involvement (hypotension, tachycardia). This is severe anaphylaxis requiring immediate treatment.",
                "incorrect": "Anaphylaxis is a clinical diagnosis - you don't need lab confirmation or prior sensitization history. This patient has acute onset with skin findings + respiratory symptoms + cardiovascular compromise. The severity (hypotension, hypoxia) makes this severe anaphylaxis requiring immediate intervention."
            },
            "teaching": "<h4>\ud83d\udcda Clinical Criteria for Anaphylaxis</h4>\n                    <p><strong>Anaphylaxis is HIGHLY LIKELY when ANY ONE of these criteria is met:</strong></p>\n                    <ol>\n                        <li>Acute onset (minutes to hours) with skin/mucosal involvement AND (respiratory compromise OR hypotension)</li>\n                        <li>Two or more of the following after likely allergen exposure: skin/mucosal, respiratory, hypotension, GI symptoms</li>\n                        <li>Hypotension after exposure to KNOWN allergen</li>\n                    </ol>\n                    <p><strong>This patient:</strong> \u2713 Skin (urticaria, angioedema) + \u2713 Respiratory (throat tightness, dyspnea) + \u2713 Cardiovascular (hypotension)</p>\n                    <p><em>Note: 10-20% of anaphylaxis cases have NO skin findings!</em></p>",
            "points": 10
        }
    },
    {
        "title": "Immediate Management",
        "content": "<div class=\"narrative\">\n                <p>You recognize anaphylaxis. The patient is on a stretcher in the hallway - the ED is busy. The nurse asks what you need.</p>\n                <p style=\"margin-top:12px;\">Available immediately: IV access being established, cardiac monitor, oxygen</p>\n            </div>",
        "hint_beginner": "What is the FIRST and MOST important medication in anaphylaxis? What is the route of administration?",
        "hint_advanced": "Why is IM preferred over IV for initial epinephrine? What are the pharmacokinetic differences?",
        "question": {
            "prompt": "What is your FIRST pharmacologic intervention?",
            "options": [
                {
                    "text": "Epinephrine 0.3-0.5 mg (0.3-0.5 mL of 1:1000) intramuscularly in the lateral thigh",
                    "correct": true
                },
                {
                    "text": "Diphenhydramine 50 mg IV push to block histamine receptors causing the reaction",
                    "correct": false
                },
                {
                    "text": "Methylprednisolone 125 mg IV to prevent biphasic reaction and reduce inflammation",
                    "correct": false
                },
                {
                    "text": "Epinephrine 0.1 mg (1 mL of 1:10,000) slow IV push for faster onset of action",
                    "correct": false
                },
                {

function shuffleArray(array) {
    const shuffled = [...array];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
}

function setDifficulty(level, btn) {
    difficulty = level;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    document.querySelectorAll('.hint-beginner').forEach(el => {
        el.style.display = level === 'beginner' ? 'block' : 'none';
    });
    document.querySelectorAll('.hint-advanced').forEach(el => {
        el.style.display = level === 'advanced' ? 'block' : 'none';
    });
}

function renderStage(index) {
    const stage = stages[index];
    const container = document.getElementById('scene-container');
    const letters = ['A', 'B', 'C', 'D', 'E'];
    const shuffledOptions = shuffleArray(stage.question.options);
    
    const optionsHTML = shuffledOptions.map((opt, i) => `
        <div class="mcq-option" data-correct="${opt.correct}" data-text="${opt.text.replace(/"/g, '&quot;')}" onclick="selectOption(this)">
            <span class="option-letter">${letters[i]}</span>
            <span class="option-text">${opt.text}</span>
        </div>
    `).join('');
    
    container.innerHTML = `
        <div class="scene">
            <div class="scene-header">
                <div class="scene-phase">Stage ${index + 1} of ${stages.length}</div>
                <div class="scene-title">${stage.title}</div>
            </div>
            <div class="scene-body">
                ${stage.content}
                
                <div class="hint-beginner">🌱 <strong>Hint:</strong> ${stage.hint_beginner}</div>
                <div class="hint-advanced">🎯 <strong>Challenge:</strong> ${stage.hint_advanced}</div>
                
                <div class="question-box">
                    <div class="question-prompt">${stage.question.prompt}</div>
                    <div class="mcq-options" id="options-container">${optionsHTML}</div>
                    
                    <div class="feedback correct-feedback" id="feedback-correct">
                        <div class="feedback-title">✓ Correct!</div>
                        <div class="feedback-explanation">${stage.question.explanation.correct}</div>
                    </div>
                    <div class="feedback incorrect-feedback" id="feedback-incorrect">
                        <div class="feedback-title">✗ Not quite</div>
                        <div class="feedback-explanation">${stage.question.explanation.incorrect}</div>
                    </div>
                    
                    <div class="teaching-point" id="teaching">
                        ${stage.question.teaching}
                    </div>
                    
                    <button class="btn" id="nextBtn" onclick="nextStage()">Continue →</button>
                </div>
            </div>
        </div>
    `;
    
    // Apply difficulty
    document.querySelectorAll('.hint-beginner').forEach(el => {
        el.style.display = difficulty === 'beginner' ? 'block' : 'none';
    });
    document.querySelectorAll('.hint-advanced').forEach(el => {
        el.style.display = difficulty === 'advanced' ? 'block' : 'none';
    });
    
    document.getElementById('progress').style.width = ((index + 1) / stages.length * 100) + '%';
}

function selectOption(element) {
    if (answeredQuestions.has(currentStage)) return;
    answeredQuestions.add(currentStage);
    
    const stage = stages[currentStage];
    const isCorrect = element.dataset.correct === 'true';
    const selectedText = element.dataset.text;
    
    // Track decision
    decisionPath.push({
        stage: currentStage + 1,
        title: stage.title,
        correct: isCorrect,
        selected: selectedText,
        points: isCorrect ? stage.question.points : 0,
        maxPoints: stage.question.points
    });
    
    // Mark options
    document.querySelectorAll('.mcq-option').forEach(opt => {
        opt.classList.add('disabled');
        if (opt.dataset.correct === 'true') opt.classList.add('correct');
    });
    
    if (!isCorrect) element.classList.add('incorrect');
    
    // Update score
    if (isCorrect) {
        score += stage.question.points;
        document.getElementById('feedback-correct').classList.add('show');
    } else {
        document.getElementById('feedback-incorrect').classList.add('show');
    }
    
    maxScore += stage.question.points;
    document.getElementById('score').textContent = score;
    document.getElementById('maxScore').textContent = maxScore;
    
    document.getElementById('teaching').classList.add('show');
    document.getElementById('nextBtn').classList.add('show');
}

function nextStage() {
    currentStage++;
    if (currentStage < stages.length) {
        renderStage(currentStage);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
        showCompletion();
    }
}

function showCompletion() {
    const percentage = Math.round((score / maxScore) * 100);
    let grade, color, emoji;
    if (percentage >= 90) { grade = 'Outstanding!'; color = '#22c55e'; emoji = '🏆'; }
    else if (percentage >= 80) { grade = 'Excellent Work!'; color = '#3b82f6'; emoji = '⭐'; }
    else if (percentage >= 70) { grade = 'Good Progress!'; color = '#eab308'; emoji = '👍'; }
    else { grade = 'Keep Practicing!'; color = '#f87171'; emoji = '📚'; }
    
    const pathHTML = decisionPath.map(d => {
        const icon = d.correct ? '✓' : '✗';
        const cls = d.correct ? 'color: #4ade80' : 'color: #f87171';
        return `<div style="padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between;">
            <span><span style="${cls}; font-weight: 700;">${icon}</span> Stage ${d.stage}: ${d.title}</span>
            <span style="color: #94a3b8;">${d.points}/${d.maxPoints}</span>
        </div>`;
    }).join('');
    
    document.getElementById('scene-container').innerHTML = `
        <div class="scene completion">
            <div style="font-size: 4rem; margin-bottom: 16px;">${emoji}</div>
            <div class="completion-grade" style="color: ${color};">${grade}</div>
            <div class="completion-percent" style="color: ${color};">${percentage}%</div>
            <div class="completion-score">Final Score: ${score} / ${maxScore}</div>
            <div class="completion-message">You've completed this Socratic Case</div>
            
            <div class="completion-breakdown">

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
