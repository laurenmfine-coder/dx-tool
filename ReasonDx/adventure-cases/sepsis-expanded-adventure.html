    <style>

        .scene {

        .scene-header {

        /* Patient info card */
        .patient-card {

        /* Question styling */
        .question-box {

            padding: 20px;
            margin: 20px 0;
        }

            margin-bottom: 16px;
            line-height: 1.5;

        .mcq-options { display: flex; flex-direction: column; gap: 10px; }

            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .mcq-option:hover:not(.selected):not(.correct):not(.incorrect):not(.disabled) {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
            transform: translateX(4px);
        }
        .mcq-option.disabled { cursor: default; opacity: 0.7; }
        .mcq-option.correct { 
            border-color: #22c55e !important; 
            background: rgba(34,197,94,0.2) !important;
            opacity: 1 !important;
        }
        .mcq-option.incorrect { 
            border-color: #ef4444 !important; 
            background: rgba(239,68,68,0.15) !important;
        }
        .option-letter {
            font-weight: 700;
            min-width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            font-size: 0.95rem;
            flex-shrink: 0;
        }
        .mcq-option.correct .option-letter { background: #22c55e; color: white; }
        .mcq-option.incorrect .option-letter { background: #ef4444; color: white; }
        .option-text { flex: 1; line-height: 1.5; }

        .feedback.correct-feedback {
            background: rgba(34,197,94,0.15);
            border: 1px solid rgba(34,197,94,0.3);
        }
        .feedback.incorrect-feedback {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
        }
        .feedback-title {

            margin-bottom: 8px;

            align-items: center;
            gap: 8px;
            font-size: 1.05rem;
        }
        .feedback.correct-feedback .feedback-title { color: #4ade80; }
        .feedback.incorrect-feedback .feedback-title { color: #f87171; }
        .feedback-explanation {
            color: #cbd5e1;
            line-height: 1.6;
        }
        
        /* Teaching point */

        .diff-btn.active { background: #3b82f6; color: white; }
        
        /* Hints */
        .hint-beginner, .hint-advanced {
            padding: 12px 16px;
            border-radius: 8px;
            margin: 12px 0;
            display: none;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .hint-beginner {

            border: 1px solid rgba(34,197,94,0.3);
            color: #86efac;
        }
        .hint-advanced {
            background: rgba(251,191,36,0.15);
            border: 1px solid rgba(251,191,36,0.3);

        .completion-percent { font-size: 3rem; font-weight: 700; margin: 20px 0; }
        .completion-message { color: #94a3b8; font-size: 1.1rem; margin-bottom: 24px; }
        .completion-breakdown { text-align: left; max-width: 500px; margin: 24px auto; }
        .completion-breakdown h4 { color: #94a3b8; margin-bottom: 12px; font-size: 0.9rem; }
        
        /* Cross-platform links */
        .crossplatform {
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-top: 24px;
        }
        .crossplatform h4 { color: #94a3b8; margin-bottom: 16px; font-size: 0.9rem; }
        .crossplatform-links { display: flex; gap: 12px; flex-wrap: wrap; }
        .crossplatform-link {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 12px 16px;
            color: #93c5fd;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;

        .crossplatform-link:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        
        /* Responsive */
        @media (max-width: 768px) {
            .score-tracker { position: static; display: inline-block; margin-bottom: 12px; }
            .difficulty-panel { position: static; display: inline-block; margin-left: 12px; margin-bottom: 12px; }
            body { padding: 12px; }
            .scene { padding: 16px; }
            .vitals-grid { grid-template-columns: repeat(3, 1fr); }
        }
    
/* Visual Debrief Styles */

<script>
let currentStage = 0;
let score = 0;
let maxScore = 0;
let difficulty = 'standard';
let answeredQuestions = new Set();
let decisionPath = [];

const stages = [

function shuffleArray(array) {
    const shuffled = [...array];
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
}

function setDifficulty(level, btn) {
    difficulty = level;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    document.querySelectorAll('.hint-beginner').forEach(el => {
        el.style.display = level === 'beginner' ? 'block' : 'none';
    });
    document.querySelectorAll('.hint-advanced').forEach(el => {
        el.style.display = level === 'advanced' ? 'block' : 'none';
    });
}

function renderStage(index) {
    const stage = stages[index];
    const container = document.getElementById('scene-container');
    const letters = ['A', 'B', 'C', 'D', 'E'];
    const shuffledOptions = shuffleArray(stage.question.options);
    
    const optionsHTML = shuffledOptions.map((opt, i) => `
        <div class="mcq-option" data-correct="${opt.correct}" data-text="${opt.text.replace(/"/g, '&quot;')}" onclick="selectOption(this)">
            <span class="option-letter">${letters[i]}</span>
            <span class="option-text">${opt.text}</span>
        </div>
    `).join('');
    
    container.innerHTML = `
        <div class="scene">
            <div class="scene-header">
                <div class="scene-phase">Stage ${index + 1} of ${stages.length}</div>
                <div class="scene-title">${stage.title}</div>
            </div>
            <div class="scene-body">
                ${stage.content}
                
                <div class="hint-beginner">🌱 <strong>Hint:</strong> ${stage.hint_beginner}</div>
                <div class="hint-advanced">🎯 <strong>Challenge:</strong> ${stage.hint_advanced}</div>
                
                <div class="question-box">
                    <div class="question-prompt">${stage.question.prompt}</div>
                    <div class="mcq-options" id="options-container">${optionsHTML}</div>
                    
                    <div class="feedback correct-feedback" id="feedback-correct">
                        <div class="feedback-title">✓ Correct!</div>
                        <div class="feedback-explanation">${stage.question.explanation.correct}</div>
                    </div>
                    <div class="feedback incorrect-feedback" id="feedback-incorrect">
                        <div class="feedback-title">✗ Not quite</div>
                        <div class="feedback-explanation">${stage.question.explanation.incorrect}</div>
                    </div>
                    
                    <div class="teaching-point" id="teaching">
                        ${stage.question.teaching}
                    </div>
                    
                    <button class="btn" id="nextBtn" onclick="nextStage()">Continue →</button>
                </div>
            </div>
        </div>
    `;
    
    // Apply difficulty
    document.querySelectorAll('.hint-beginner').forEach(el => {
        el.style.display = difficulty === 'beginner' ? 'block' : 'none';
    });
    document.querySelectorAll('.hint-advanced').forEach(el => {
        el.style.display = difficulty === 'advanced' ? 'block' : 'none';
    });
    
    document.getElementById('progress').style.width = ((index + 1) / stages.length * 100) + '%';
}

function selectOption(element) {
    if (answeredQuestions.has(currentStage)) return;
    answeredQuestions.add(currentStage);
    
    const stage = stages[currentStage];
    const isCorrect = element.dataset.correct === 'true';
    const selectedText = element.dataset.text;
    
    // Track decision
    decisionPath.push({
        stage: currentStage + 1,
        title: stage.title,
        correct: isCorrect,
        selected: selectedText,
        points: isCorrect ? stage.question.points : 0,
        maxPoints: stage.question.points
    });
    
    // Mark options
    document.querySelectorAll('.mcq-option').forEach(opt => {
        opt.classList.add('disabled');
        if (opt.dataset.correct === 'true') opt.classList.add('correct');
    });
    
    if (!isCorrect) element.classList.add('incorrect');
    
    // Update score
    if (isCorrect) {
        score += stage.question.points;
        document.getElementById('feedback-correct').classList.add('show');
    } else {
        document.getElementById('feedback-incorrect').classList.add('show');
    }
    
    maxScore += stage.question.points;
    document.getElementById('score').textContent = score;
    document.getElementById('maxScore').textContent = maxScore;
    
    document.getElementById('teaching').classList.add('show');
    document.getElementById('nextBtn').classList.add('show');
}

function nextStage() {
    currentStage++;
    if (currentStage < stages.length) {
        renderStage(currentStage);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
        showCompletion();
    }
}

function showCompletion() {
    const percentage = Math.round((score / maxScore) * 100);
    let grade, color, emoji;
    if (percentage >= 90) { grade = 'Outstanding!'; color = '#22c55e'; emoji = '🏆'; }
    else if (percentage >= 80) { grade = 'Excellent Work!'; color = '#3b82f6'; emoji = '⭐'; }
    else if (percentage >= 70) { grade = 'Good Progress!'; color = '#eab308'; emoji = '👍'; }
    else { grade = 'Keep Practicing!'; color = '#f87171'; emoji = '📚'; }
    
    const pathHTML = decisionPath.map(d => {
        const icon = d.correct ? '✓' : '✗';
        const cls = d.correct ? 'color: #4ade80' : 'color: #f87171';
        return `<div style="padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between;">
            <span><span style="${cls}; font-weight: 700;">${icon}</span> Stage ${d.stage}: ${d.title}</span>
            <span style="color: #94a3b8;">${d.points}/${d.maxPoints}</span>
        </div>`;
    }).join('');
    
    document.getElementById('scene-container').innerHTML = `
        <div class="scene completion">
            <div style="font-size: 4rem; margin-bottom: 16px;">${emoji}</div>
            <div class="completion-grade" style="color: ${color};">${grade}</div>
            <div class="completion-percent" style="color: ${color};">${percentage}%</div>
            <div class="completion-score">Final Score: ${score} / ${maxScore}</div>
            <div class="completion-message">You've completed this Socratic Case</div>
            
            <div class="completion-breakdown">
                <h4>📋 Your Decision Path</h4>
                ${pathHTML}
            </div>
            
            <div class="crossplatform">
                <h4>🎯 Continue Learning</h4>
                <div class="crossplatform-links">
                    <a href="../mechanism/sepsis-shock-module.html" class="crossplatform-link">📚 Sepsis Pathophysiology</a>
<a href="shock-socratic-adventure.html" class="crossplatform-link">🎯 More Critical Care Cases</a>

                </div>
            </div>
            
            <button class="btn show" onclick="location.reload()" style="margin-top: 24px;">Try Again</button>
        </div>

}

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>

// Case EPA Metadata

// EPA Names for display
const epaNames = {"EPA-1":"Gather H&P","EPA-2":"Prioritize DDx","EPA-3":"Recommend Tests","EPA-4":"Enter Orders","EPA-7":"Apply Evidence","EPA-10":"Recognize Urgency","EPA-12":"Perform Procedures"};

// Override selectOption to add confidence step
const originalSelectOption = typeof selectOption === 'function' ? selectOption : null;

function selectOptionEnhanced(index, correct) {
    const qId = 'q' + currentStage;
    if (answeredQuestions.has(qId)) return;
    
    // Store pending selection
    pendingSelection = { index, correct, stageIdx: currentStage };
    
    // Highlight selected option
    document.querySelectorAll('.mcq-option').forEach((opt, i) => {
        opt.classList.remove('selected');
        if (i === index) opt.classList.add('selected');
    });
    
    // Show confidence slider
    const confContainer = document.getElementById('confidence-container');
    if (confContainer) {
        confContainer.classList.add('show');
        confContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function updateConfidenceDisplay(value) {
    const display = document.getElementById('confidence-display');
    if (display) display.textContent = value + '%';
}

function submitWithConfidence() {
    if (!pendingSelection) return;
    
    const confidence = parseInt(document.getElementById('confidence-slider').value);
    const { index, correct, stageIdx } = pendingSelection;
    const stage = stages[stageIdx];
    
    // Record response with confidence
    responseHistory.push({
        stage: stageIdx + 1,
        stageTitle: stage.title,
        epaFocus: caseEPA.primaryEPAs[0],
        selectedIndex: index,
        selectedText: stage.question.options[index].text,
        correct: correct,
        confidence: confidence,
        points: correct ? stage.question.points : 0,
        maxPoints: stage.question.points
    });
    
    // Hide confidence container
    const confContainer = document.getElementById('confidence-container');
    if (confContainer) confContainer.classList.remove('show');
    
    // Now process the answer (call original logic)
    const qId = 'q' + stageIdx;
    answeredQuestions.add(qId);
    decisionPath[stageIdx] = index;
    
    maxScore += stage.question.points;
    if (correct) score += stage.question.points;
    
    document.getElementById('score').textContent = score;
    document.getElementById('maxScore').textContent = maxScore;
    
    // Show calibration feedback
    showCalibrationFeedback(confidence, correct);
    
    pendingSelection = null;
    renderStage();
}

function showCalibrationFeedback(confidence, correct) {
    // This will be shown in the feedback section after render
    const feedback = document.createElement('div');
    feedback.className = 'calibration-feedback show';
    
    if (correct && confidence >= 70) {
        feedback.classList.add('well-calibrated');
        feedback.innerHTML = '✅ <strong>Well calibrated!</strong> You were confident and correct.';
    } else if (correct && confidence < 50) {
        feedback.classList.add('underconfident');
        feedback.innerHTML = '📚 Correct, but you were uncertain. <strong>Trust your knowledge more!</strong>';
    } else if (!correct && confidence >= 70) {
        feedback.classList.add('overconfident');
        feedback.innerHTML = '⚠️ <strong>Overconfidence detected.</strong> High confidence + wrong answer is where diagnostic errors happen.';
    } else {
        feedback.classList.add('well-calibrated');
        feedback.innerHTML = '📝 Incorrect, but your uncertainty was appropriate. Review this concept.';
    }
    
    // Store for rendering
    window.lastCalibrationFeedback = feedback.outerHTML;
}

// Enhanced debrief with EPA and calibration
function showEnhancedDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    const content = document.getElementById('debriefContent');
    if (!overlay || !content) return;
    
    const percentage = maxScore > 0 ? Math.round((score / maxScore) * 100) : 0;
    
    // Calculate calibration
    const withConf = responseHistory.filter(r => r.confidence !== undefined);
    const correctWithConf = withConf.filter(r => r.correct);
    const incorrectWithConf = withConf.filter(r => !r.correct);
    const avgConfCorrect = correctWithConf.length > 0 
        ? Math.round(correctWithConf.reduce((s,r) => s + r.confidence, 0) / correctWithConf.length) : 0;
    const avgConfIncorrect = incorrectWithConf.length > 0 
        ? Math.round(incorrectWithConf.reduce((s,r) => s + r.confidence, 0) / incorrectWithConf.length) : 0;
    
    // EPA performance
    const epaPerf = {};
    responseHistory.forEach(r => {
        const epa = r.epaFocus || caseEPA.primaryEPAs[0];
        if (!epaPerf[epa]) epaPerf[epa] = { correct: 0, total: 0 };
        epaPerf[epa].total++;
        if (r.correct) epaPerf[epa].correct++;
    });
    
    // Calibration interpretation
    let calibrationMsg = '';
    if (avgConfCorrect - avgConfIncorrect > 20) {
        calibrationMsg = '✅ Good discrimination! You feel more confident when you\'re right.';
    } else if (avgConfIncorrect > 60) {
        calibrationMsg = '⚠️ Overconfidence pattern detected. Practice asking "What would make me wrong?"';
    } else {
        calibrationMsg = '📊 Work on calibration - confidence should differ between correct and incorrect answers.';
    }
    
    content.innerHTML = `
        <div style="text-align:center;margin-bottom:24px;">
            <div style="font-size:4rem;">${percentage >= 80 ? '🏆' : percentage >= 60 ? '👍' : '📚'}</div>
            <div style="font-size:2.5rem;font-weight:700;color:${percentage >= 80 ? '#22c55e' : percentage >= 60 ? '#f59e0b' : '#ef4444'}">${percentage}%</div>
            <div style="color:#6b7280;">Score: ${score}/${maxScore}</div>
        </div>
        
        <div class="epa-debrief-section">
            <h4>📋 EPA Competencies Assessed</h4>
            <div class="epa-progress-grid">
                ${Object.entries(epaPerf).map(([epa, data]) => {
                    const pct = Math.round((data.correct / data.total) * 100);
                    const colorClass = pct >= 80 ? 'high' : pct >= 60 ? 'medium' : 'low';
                    return `<div class="epa-progress-card">
                        <div class="epa-name">${epaNames[epa] || epa}</div>
                        <div class="epa-score ${colorClass}">${pct}%</div>
                    </div>`;
                }).join('')}
            </div>
        </div>
        
        <div class="calibration-debrief">
            <h4>🎯 Confidence Calibration</h4>
            <div class="calibration-stats">
                <div class="calibration-stat">
                    <div class="stat-value" style="color:#22c55e;">${avgConfCorrect}%</div>
                    <div class="stat-label">Avg confidence when correct</div>
                </div>
                <div class="calibration-stat">
                    <div class="stat-value" style="color:${avgConfIncorrect > 60 ? '#ef4444' : '#f59e0b'};">${avgConfIncorrect}%</div>
                    <div class="stat-label">Avg confidence when incorrect</div>
                </div>
            </div>
            <div class="calibration-interpretation">${calibrationMsg}</div>
        </div>
        
        <div class="decision-path">
            <h3>📝 Your Decisions</h3>
            ${responseHistory.map(r => `
                <div class="path-item ${r.correct ? 'path-optimal' : 'path-incorrect'}">
                    <div style="display:flex;justify-content:space-between;">
                        <div>
                            <div class="path-stage">${r.correct ? '✓' : '✗'} Stage ${r.stage}: ${r.stageTitle}</div>
                            <div class="path-choice" style="font-size:0.85rem;color:#6b7280;">${r.confidence}% confident</div>
                        </div>
                        <div class="path-points">${r.points}/${r.maxPoints}</div>
                    </div>
                </div>
            `).join('')}
        </div>
        
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
        <button class="debrief-btn" style="background:#e5e7eb;color:#4b5563;margin-top:8px;" onclick="closeDebrief()">Close</button>
    `;
    
    overlay.classList.add('show');
}

// Replace selectOption globally
window.selectOption = selectOptionEnhanced;

// Store original showDebrief if exists
if (typeof showDebrief === 'function') {
    window.originalShowDebrief = showDebrief;
}
window.showDebrief = showEnhancedDebrief;
