<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wheeze Detective | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#22D3EE;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#0891B2,#22D3EE);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(34,211,238,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(34,211,238,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#000;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(34,211,238,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#000}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#000;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🌬️ The Wheeze Detective</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'25F',wt:'62kg',hx:'Allergic rhinitis, eczema hx, wheeze with cats/spring',exam:'Nasal polyps absent, mild wheeze',vitals:{HR:'82',BP:'118/72',SpO2:'98%'},labs:{IgE:'420',Eos:'6%',FeNO:'48ppb',FEV1:'82%'}},int:{age:'45M',wt:'98kg',hx:'Adult-onset wheeze, no allergies, chronic sinusitis',exam:'Nasal polyps, obese',vitals:{HR:'78',BP:'142/88',SpO2:'96%'},labs:{IgE:'85',Eos:'12%',FeNO:'62ppb',FEV1:'68%'}},adv:{age:'58F',wt:'72kg',hx:'Severe asthma, 3 exacerbations/yr despite max therapy',exam:'Barrel chest, prolonged expiration',vitals:{HR:'88',BP:'138/82',SpO2:'94%'},labs:{IgE:'1240',Eos:'18%',FeNO:'85ppb',FEV1:'52%'}}};
const Q=[
{t:'Asthma Phenotypes',q:'Early-onset with atopy, high IgE. Phenotype?',h:'T2-high vs T2-low',o:[{id:'a',txt:'T2-high allergic (eosinophilic) asthma',c:1,p:100},{id:'b',txt:'T2-low neutrophilic asthma',c:0,p:20},{id:'c',txt:'Obesity-related asthma',c:0,p:30}],fb:{1:'<b>Correct!</b> T2-high: Early onset, atopy, high IgE, elevated FeNO, eosinophilia. Best biologic response.',0:'<b>T2-high:</b> Allergic, eosinophilic, elevated biomarkers (IgE, eos, FeNO).'}},
{t:'Biomarker Interpretation',q:'FeNO >25 ppb indicates?',h:'Fractional exhaled nitric oxide',o:[{id:'a',txt:'Type 2 inflammation (eosinophilic airway inflammation)',c:1,p:100},{id:'b',txt:'Neutrophilic inflammation',c:0,p:0},{id:'c',txt:'Poor inhaler technique',c:0,p:30}],fb:{1:'<b>Correct!</b> FeNO >25 ppb suggests T2 inflammation. >50 ppb = high. Predicts steroid response and biologic candidacy.',0:'<b>FeNO:</b> Marker of T2/eosinophilic inflammation. >25 elevated, >50 high.'}},
{t:'Step Therapy',q:'Persistent asthma not controlled on low-dose ICS. Next step?',h:'GINA stepwise approach',o:[{id:'a',txt:'Add LABA (ICS-LABA combination) OR increase ICS dose',c:1,p:100},{id:'b',txt:'Add oral steroids',c:0,p:0},{id:'c',txt:'SABA only',c:0,p:0}],fb:{1:'<b>Correct!</b> Step 3: Low-dose ICS-LABA preferred. Alternative: medium-dose ICS. LTRA add-on option.',0:'<b>Step therapy:</b> ICS → ICS-LABA → Medium/high ICS-LABA → Add-on therapy.'}},
{t:'Biologic Selection',q:'Severe asthma with eos >300, IgE 450. First-line biologic?',h:'Multiple options based on phenotype',o:[{id:'a',txt:'Anti-IL5 (mepolizumab, benralizumab) OR anti-IL4/13 (dupilumab)',c:1,p:100},{id:'b',txt:'Omalizumab only',c:0,p:40},{id:'c',txt:'No biologics until eos >1500',c:0,p:0}],fb:{1:'<b>Correct!</b> Eos >300: Anti-IL5 or dupilumab. High IgE + allergic: omalizumab option. Dupilumab broadest coverage.',0:'<b>Biologic choice:</b> Based on phenotype. Eosinophilic = anti-IL5 or dupilumab.'}},
{t:'AERD Recognition',q:'Asthma + nasal polyps + aspirin sensitivity. Diagnosis?',h:'Samters triad',o:[{id:'a',txt:'AERD (Aspirin-Exacerbated Respiratory Disease)',c:1,p:100},{id:'b',txt:'Allergic asthma',c:0,p:30},{id:'c',txt:'COPD',c:0,p:0}],fb:{1:'<b>Correct!</b> AERD (Samters): Asthma + CRSwNP + NSAID sensitivity. T2-high, often severe. Consider aspirin desensitization.',0:'<b>AERD:</b> Samters triad. Avoid NSAIDs or consider desensitization.'}},
{t:'Severe Asthma Definition',q:'What defines severe asthma?',h:'Despite adherence and technique',o:[{id:'a',txt:'Uncontrolled on high-dose ICS-LABA with good adherence/technique',c:1,p:100},{id:'b',txt:'Any patient needing ICS',c:0,p:0},{id:'c',txt:'FEV1 <50%',c:0,p:30}],fb:{1:'<b>Correct!</b> Severe: Requires Step 4-5 therapy AND either uncontrolled or >=2 exacerbations/yr. Must verify adherence/technique first.',0:'<b>Severe definition:</b> High-dose ICS-LABA + uncontrolled or frequent exacerbations.'}},
{t:'Exacerbation Management',q:'Acute exacerbation in ED. Systemic steroid duration?',h:'Short course preferred',o:[{id:'a',txt:'5-7 days prednisone 40-50mg (no taper needed)',c:1,p:100},{id:'b',txt:'2 weeks with taper',c:0,p:30},{id:'c',txt:'IV steroids for 3 days',c:0,p:20}],fb:{1:'<b>Correct!</b> Exacerbation: 5-7 days oral prednisone. No taper needed for short courses. Equivalent to longer tapers.',0:'<b>Steroids:</b> 5-7 days, no taper. GINA/EPR-3 guidelines.'}},
{t:'ACT Score',q:'Asthma Control Test (ACT) score indicating well-controlled?',h:'5-question validated tool',o:[{id:'a',txt:'ACT >= 20 (max 25)',c:1,p:100},{id:'b',txt:'ACT >= 15',c:0,p:30},{id:'c',txt:'ACT >= 10',c:0,p:0}],fb:{1:'<b>Correct!</b> ACT: >=20 well-controlled, 16-19 not well-controlled, <=15 very poorly controlled.',0:'<b>ACT scoring:</b> >=20 good control. Use at every visit.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🌬️ The Wheeze Detective</h1><p style="color:var(--muted);margin-bottom:32px">Asthma Phenotyping: T2-high/low, biomarkers, biologics, AERD, step therapy</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🫁 Airway Assessment</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Asthma Phenotyping Pearls</div><div class="pearl-item"><b>T2-high:</b> Allergic, eosinophilic, elevated IgE/FeNO/eos</div><div class="pearl-item"><b>FeNO:</b> >25 elevated, >50 high T2 inflammation</div><div class="pearl-item"><b>Biologics:</b> Based on phenotype - anti-IL5, anti-IL4/13, anti-IgE</div><div class="pearl-item"><b>AERD:</b> Asthma + polyps + NSAID sensitivity</div><div class="pearl-item"><b>Exacerbation:</b> Prednisone 5-7 days, no taper</div></div><div class="cross-link"><a href="../mechanism/asthma-module.html">MechanismDx: Asthma</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
