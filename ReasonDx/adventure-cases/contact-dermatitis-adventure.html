<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rash Detective | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#14B8A6;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#0D9488,#14B8A6);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(20,184,166,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(20,184,166,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(20,184,166,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(20,184,166,.1);border:1px solid rgba(20,184,166,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#5EEAD4;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🔍 The Rash Detective</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'35F',wt:'65kg',hx:'Itchy rash on earlobes and wrist for 2 weeks, new jewelry',exam:'Erythematous, vesicular eruption on earlobes and wrist under watch band',vitals:{HR:'72',BP:'118/74',Temp:'98.4°F',SpO2:'99%'},labs:{Hx:'New costume jewelry',Pattern:'Geometric, matches jewelry'}},int:{age:'45M',wt:'82kg',hx:'Healthcare worker with hand dermatitis, worse at work, improves on vacation',exam:'Dorsal hand erythema, fissuring, vesicles at glove line',vitals:{HR:'76',BP:'124/78',Temp:'98.2°F',SpO2:'99%'},labs:{Job:'OR nurse, latex gloves',Pattern:'Spares palms, glove distribution'}},adv:{age:'28F',wt:'58kg',hx:'Hairdresser with chronic hand eczema, periorbital dermatitis from hair products',exam:'Chronic hand dermatitis, bilateral periorbital erythema and edema',vitals:{HR:'68',BP:'112/68',Temp:'98.4°F',SpO2:'99%'},labs:{Job:'Hairdresser x5 years',Suspect:'PPD, fragrance, preservatives'}}};
const Q=[
{t:'Contact Dermatitis Types',q:'What distinguishes allergic contact dermatitis (ACD) from irritant contact dermatitis (ICD)?',h:'Mechanism matters',o:[{id:'a',txt:'ACD: Type IV hypersensitivity (delayed, T-cell); ICD: Direct toxic effect (no sensitization)',c:1,p:100},{id:'b',txt:'ACD is immediate, ICD is delayed',c:0,p:20},{id:'c',txt:'No clinical difference',c:0,p:10}],fb:{1:'<b>Correct!</b> ACD: Delayed (Type IV) T-cell mediated, requires prior sensitization, reactions spread beyond contact area. ICD: Direct chemical/physical damage, anyone can get it, strictly confined to contact area.',0:'<b>Key difference:</b> ACD = immune (Type IV), ICD = direct damage.'}},
{t:'Clinical Clues',q:'Which clinical features suggest allergic rather than irritant contact dermatitis?',h:'Distribution and morphology help',o:[{id:'a',txt:'Geometric/patterned distribution, vesicles, spread beyond contact site, delayed onset',c:1,p:100},{id:'b',txt:'Immediate burning',c:0,p:20},{id:'c',txt:'Only affects hands',c:0,p:10}],fb:{1:'<b>Correct!</b> ACD clues: Geometric pattern matching contactant, vesicles (acute), spreads beyond original site, 24-72h delay after exposure. ICD: burns immediately, strictly confined, often affects everyone exposed.',0:'<b>ACD clues:</b> Geometric pattern, vesicles, spread, delayed onset.'}},
{t:'Common Allergens',q:'Most common contact allergen worldwide?',h:'Think metals',o:[{id:'a',txt:'Nickel (jewelry, belt buckles, cell phones)',c:1,p:100},{id:'b',txt:'Latex',c:0,p:30},{id:'c',txt:'Poison ivy',c:0,p:30}],fb:{1:'<b>Correct!</b> Nickel is #1 allergen globally. Found in jewelry, belt buckles, cell phones, coins. Classic: earlobes, wrist (watch), waistline (buckle). Dimethylglyoxime test can detect nickel.',0:'<b>Nickel:</b> #1 allergen. Classic distribution matches metal contact points.'}},
{t:'Diagnostic Gold Standard',q:'Gold standard test for diagnosing allergic contact dermatitis?',h:'Not skin prick testing',o:[{id:'a',txt:'Patch testing (allergens applied under occlusion for 48-72h)',c:1,p:100},{id:'b',txt:'Skin prick testing',c:0,p:20},{id:'c',txt:'Serum IgE levels',c:0,p:10}],fb:{1:'<b>Correct!</b> Patch testing: Allergens applied on back under occlusion, read at 48h and 72-96h. Tests Type IV (delayed) hypersensitivity. Skin prick tests Type I (immediate). Standard series + occupation-specific.',0:'<b>Patch testing:</b> Gold standard for ACD. Applied 48h, read at 48h and 72-96h.'}},
{t:'Occupational Exposure',q:'Healthcare worker with hand dermatitis in glove distribution. Top considerations?',h:'Occupational contact dermatitis',o:[{id:'a',txt:'Rubber accelerators (thiurams, carbamates) > latex protein allergy',c:1,p:100},{id:'b',txt:'Latex always',c:0,p:40},{id:'c',txt:'Just irritant from handwashing',c:0,p:30}],fb:{1:'<b>Correct!</b> Rubber chemical allergies (thiurams, carbamates, mercaptobenzothiazole) are more common than true latex protein allergy. Latex protein causes Type I (urticaria/anaphylaxis). Rubber chemicals cause Type IV ACD.',0:'<b>Glove dermatitis:</b> Rubber chemicals > latex protein. Different mechanisms.'}},
{t:'Hair Dye Allergy',q:'Active ingredient in permanent hair dyes causing allergic contact dermatitis?',h:'Common occupational allergen',o:[{id:'a',txt:'Paraphenylenediamine (PPD) - cross-reacts with black henna, some medications',c:1,p:100},{id:'b',txt:'Ammonia',c:0,p:20},{id:'c',txt:'Peroxide',c:0,p:20}],fb:{1:'<b>Correct!</b> PPD causes severe ACD to hair dyes. Cross-reactions: black henna tattoos, PABA sunscreens, certain medications (sulfonamides, local anesthetics). Hairdressers at high risk.',0:'<b>PPD:</b> Hair dye allergen. Watch for cross-reactions with black henna.'}},
{t:'Treatment Approach',q:'Management of acute, severe allergic contact dermatitis?',h:'Beyond allergen avoidance',o:[{id:'a',txt:'Allergen avoidance + potent topical steroids (+ short course oral if widespread)',c:1,p:100},{id:'b',txt:'Antihistamines only',c:0,p:20},{id:'c',txt:'Immediate immunotherapy',c:0,p:10}],fb:{1:'<b>Correct!</b> Primary: Identify and avoid allergen. Acute treatment: Potent TCS, wet compresses for vesicles. Systemic steroids if >20% BSA or face/hands severely affected. Barrier creams for prevention.',0:'<b>Treatment:</b> Avoid allergen + topical steroids. Systemic if severe/widespread.'}},
{t:'Prevention Strategies',q:'How can nickel-allergic patients reduce exposure?',h:'Practical advice',o:[{id:'a',txt:'Nickel-free jewelry, barrier creams, coat metal items with clear nail polish',c:1,p:100},{id:'b',txt:'Desensitization shots',c:0,p:20},{id:'c',txt:'Antihistamines preventively',c:0,p:20}],fb:{1:'<b>Correct!</b> Nickel avoidance: Hypoallergenic jewelry, dimethylglyoxime test items before purchase, coat metal with clear polish, barrier creams. No desensitization available for contact allergens.',0:'<b>Nickel avoidance:</b> Hypoallergenic items, barrier strategies, test items for nickel.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🔍 The Rash Detective</h1><p style="color:var(--muted);margin-bottom:32px">Contact Dermatitis: ACD vs ICD, patch testing, common allergens, occupational exposures</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🔍 Patterned Dermatitis</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Contact Dermatitis Pearls</div><div class="pearl-item"><b>ACD vs ICD:</b> ACD = Type IV immune; ICD = direct damage</div><div class="pearl-item"><b>ACD clues:</b> Geometric pattern, vesicles, spread, 24-72h delay</div><div class="pearl-item"><b>#1 allergen:</b> Nickel (jewelry, buckles, phones)</div><div class="pearl-item"><b>Gold standard:</b> Patch testing (read at 48h and 72-96h)</div><div class="pearl-item"><b>Gloves:</b> Rubber chemicals > latex protein allergy</div><div class="pearl-item"><b>Hair dye:</b> PPD - cross-reacts with black henna</div><div class="pearl-item"><b>Treatment:</b> Avoid allergen + potent TCS</div></div><div class="cross-link"><a href="atopic-dermatitis-adventure-enhanced.html">Related: Atopic Dermatitis</a> | <a href="drug-allergy-adventure-enhanced.html">Drug Allergy</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
