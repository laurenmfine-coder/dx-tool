<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acetaminophen Overdose | Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #7f1d1d 0%, #ef4444 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(127, 29, 29, 0.9); border-radius: 16px; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; background: #ef4444; margin-left: 10px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ef4444, #fca5a5); border-radius: 3px; }
        .scene { background: linear-gradient(135deg, #7f1d1d, #b91c1c); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .scene-header { background: rgba(239, 68, 68, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #fca5a5; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(239,68,68,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #ef4444, #b91c1c); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #fca5a5; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','metabolism','stages','nomogram','nac','ivprotocol','chronic','alf','prognosis','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">💊 Acetaminophen Overdose<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">The Intentional Ingestion</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would pregnancy change your approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Don't forget to consider mimics and look-alikes</p>
                </div><div class="narrative"><p>A <span class="highlight">22-year-old woman</span> presents 6 hours after ingesting <span class="critical">"a whole bottle of Tylenol"</span> following an argument with her boyfriend. Estimates ~30 extra-strength tablets (500mg each = ~15g total).</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 88, BP 118/72, T 98.6°F<br><strong>Exam:</strong> Mild nausea, otherwise appears well<br><strong>Labs pending:</strong> APAP level, LFTs, INR, BMP</p></div><div class="alert-box"><div class="alert-title">🚨 Patients Look WELL Early!</div><p>APAP toxicity is insidious. Patients are often asymptomatic in first 24 hours despite ongoing hepatic damage. Don't be falsely reassured!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Toxic Dose</div><div class="pathway"><strong>Single acute ingestion:</strong><br>• >150 mg/kg or >7.5-10g = potentially toxic<br>• >250 mg/kg or >12g = serious toxicity likely<br><br><strong>This patient:</strong><br>15g ingested = definitely toxic range<br><br><strong>Remember:</strong> Many products contain APAP<br>(Vicodin, Percocet, NyQuil, Excedrin)</div></div><button class="btn" onclick="nextStage()">Metabolism →</button></div></div>`;
    };

    window.render_metabolism = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">NAPQI: The Toxic Metabolite</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate severity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if this patient had renal impairment?</p>
                </div><div class="mechanism-box"><div class="mechanism-title">🧬 Normal APAP Metabolism</div><div class="pathway">Acetaminophen<br>    ↓ (90%) Glucuronidation/Sulfation<br>    → Non-toxic metabolites → Urine<br><br>    ↓ (5-10%) CYP2E1 (P450)<br>    → <strong>NAPQI</strong> (toxic!)<br>    ↓ Glutathione<br>    → Non-toxic mercapturic acid → Urine</div></div><div class="alert-box"><div class="alert-title">🚨 What Happens in Overdose</div><p>Glucuronidation/sulfation pathways SATURATE<br>→ More APAP shunted to CYP2E1<br>→ More NAPQI produced<br>→ Glutathione DEPLETED<br>→ NAPQI binds hepatocytes → Cell death</p></div><div class="boards-tip"><div class="boards-tip-title">📚 NAC = Glutathione Donor!</div><p>N-acetylcysteine replenishes glutathione stores, allowing continued detoxification of NAPQI. Most effective if given within 8 hours but still beneficial up to 24+ hours.</p></div><button class="btn" onclick="nextStage()">Clinical Stages →</button></div></div>`;
    };

    window.render_stages = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">Four Stages of Toxicity</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Think about the most common causes first</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does immunosuppression affect the differential?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Clinical Stages - BOARDS FAVORITE</div><table class="comparison-table"><tr><th>Stage</th><th>Time</th><th>Features</th></tr><tr><td><strong>I</strong></td><td>0-24 hours</td><td>Asymptomatic OR nonspecific (N/V, malaise, diaphoresis). Labs often normal!</td></tr><tr><td><strong>II</strong></td><td>24-72 hours</td><td>RUQ pain, ↑ AST/ALT (can be >10,000!), ↑ PT/INR, ↑ bilirubin</td></tr><tr><td><strong>III</strong></td><td>72-96 hours</td><td>Peak hepatotoxicity. May develop ALF: coagulopathy, encephalopathy, renal failure, metabolic acidosis</td></tr><tr><td><strong>IV</strong></td><td>4-14 days</td><td>Recovery OR death. If survive, liver regenerates completely</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ Stage I is Deceptive!</div><p>Patient feels fine → gets discharged → returns in 2-3 days with liver failure. Always check APAP level and use nomogram!</p></div><button class="btn" onclick="nextStage()">Rumack-Matthew Nomogram →</button></div></div>`;
    };

    window.render_nomogram = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">Rumack-Matthew Nomogram</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the key history element pointing to diagnosis?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would pregnancy change your approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Always reassess if patient not improving as expected</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Treatment Line</div><table class="comparison-table"><tr><th>Hours Post-Ingestion</th><th>APAP Level (mcg/mL)</th></tr><tr><td>4 hours</td><td>150</td></tr><tr><td>8 hours</td><td>75</td></tr><tr><td>12 hours</td><td>37.5</td></tr><tr><td>16 hours</td><td>18.75</td></tr><tr><td>24 hours</td><td>~4.7</td></tr></table><p style="margin-top:12px;">If level plots ABOVE or ON the line → Treat with NAC</p></div><div class="alert-box"><div class="alert-title">🚨 Nomogram Rules</div><ul style="margin-left:20px;"><li>Only valid for SINGLE acute ingestion</li><li>Only valid if time of ingestion KNOWN</li><li>Draw level at 4 hours (or ASAP if presenting later)</li><li>NOT valid for chronic/repeated ingestions</li><li>When in doubt, treat!</li></ul></div><div class="mechanism-box"><div class="mechanism-title">🧬 This Patient</div><div class="pathway">Ingestion 6 hours ago<br>APAP level returns: 180 mcg/mL<br><br>At 6 hours, treatment line ≈ 100 mcg/mL<br>Patient's level (180) > treatment line (100)<br><br><strong>→ START NAC!</strong></div></div><button class="btn" onclick="nextStage()">NAC Protocol →</button></div></div>`;
    };

    window.render_nac = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">N-Acetylcysteine</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if this patient had renal impairment?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 NAC Indications</div><table class="comparison-table"><tr><th>Indication</th></tr><tr><td>APAP level above treatment line on nomogram</td></tr><tr><td>Single ingestion >150 mg/kg and level won't return in time</td></tr><tr><td>Unknown time of ingestion + detectable APAP + elevated LFTs</td></tr><tr><td>Evidence of hepatotoxicity (elevated AST/ALT)</td></tr><tr><td>Chronic ingestion with elevated APAP or LFTs</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Oral NAC Protocol (Prescott)</div><div class="pathway"><strong>72-hour oral protocol:</strong><br><br>Loading: 140 mg/kg PO<br>Then: 70 mg/kg PO q4h × 17 doses<br><br>Total: 1330 mg/kg over 72 hours<br><br><strong>Pros:</strong> Equivalent efficacy<br><strong>Cons:</strong> Tastes terrible, causes N/V<br>• Mix with juice/soda<br>• Give antiemetics<br>• Repeat dose if vomit within 1 hour</div></div><button class="btn" onclick="nextStage()">IV Protocol →</button></div></div>`;
    };

    window.render_ivprotocol = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">IV NAC Protocol</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate severity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does immunosuppression affect the differential?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 21-Hour IV Protocol</div><table class="comparison-table"><tr><th>Bag</th><th>Dose</th><th>Duration</th></tr><tr><td><strong>Loading</strong></td><td>150 mg/kg in 200mL D5W</td><td>1 hour</td></tr><tr><td><strong>Bag 2</strong></td><td>50 mg/kg in 500mL D5W</td><td>4 hours</td></tr><tr><td><strong>Bag 3</strong></td><td>100 mg/kg in 1000mL D5W</td><td>16 hours</td></tr></table><p style="margin-top:12px;">Total: 300 mg/kg over 21 hours</p></div><div class="alert-box"><div class="alert-title">⚠️ Anaphylactoid Reactions</div><p>~15-20% have reactions (flushing, urticaria, bronchospasm) - usually during loading dose. NOT true allergy! Slow infusion, give antihistamines, can usually continue.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 When to Stop NAC</div><div class="pathway"><strong>Can stop 21h IV NAC if ALL of:</strong><br>• APAP level undetectable<br>• AST/ALT normal or downtrending<br>• INR <2<br>• Patient clinically well<br><br><strong>Continue NAC if:</strong><br>• Elevated/rising LFTs<br>• Detectable APAP<br>• Evidence of hepatotoxicity<br>• ALF features</div></div><button class="btn" onclick="nextStage()">Chronic Ingestion →</button></div></div>`;
    };

    window.render_chronic = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 10</div><div class="scene-title">Repeated/Chronic Ingestion</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Think about the most common causes first</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would pregnancy change your approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fefce8; border:1px solid #eab308; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #eab308;">
                    <p style="margin:0; color:#854d0e; font-size:0.9rem;"><strong>🚫 Common Mistake:</strong> Avoid anchoring bias - keep differential broad initially</p>
                </div><div class="alert-box"><div class="alert-title">🚨 Nomogram Does NOT Apply!</div><p>Rumack-Matthew nomogram is only for single acute ingestion with known time. Different approach needed for chronic/repeated supratherapeutic ingestion.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Treat Chronic Ingestion If:</div><table class="comparison-table"><tr><th>Indication for NAC</th></tr><tr><td>APAP level >20 mcg/mL + elevated AST/ALT</td></tr><tr><td>Any detectable APAP + AST/ALT elevated</td></tr><tr><td>>150 mg/kg/day for >2 days</td></tr><tr><td>>6g/day in healthy adult</td></tr><tr><td>>4g/day in high-risk patient</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 High-Risk Patients</div><div class="pathway"><strong>Increased susceptibility to APAP toxicity:</strong><br><br>• Chronic alcohol use<br>  (CYP2E1 induction → more NAPQI)<br>• Malnutrition/fasting<br>  (depleted glutathione stores)<br>• HIV/AIDS<br>• Drugs that induce CYP2E1<br>  (isoniazid, phenobarbital, phenytoin)<br><br>Consider lower threshold for NAC</div></div><button class="btn" onclick="nextStage()">Acute Liver Failure →</button></div></div>`;
    };

    window.render_alf = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 10</div><div class="scene-title">Fulminant Hepatic Failure</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the key history element pointing to diagnosis?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if this patient had renal impairment?</p>
                </div><div class="alert-box"><div class="alert-title">🚨 APAP = #1 Cause of ALF in US!</div><p>Accounts for ~50% of acute liver failure cases. Key features: coagulopathy (INR >1.5), encephalopathy, metabolic acidosis.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 King's College Criteria for APAP ALF</div><table class="comparison-table"><tr><th>Transplant Indicated If:</th></tr><tr><td><strong>pH <7.30</strong> after adequate resuscitation</td></tr><tr><td colspan="1" style="text-align:center;font-weight:bold;">OR all three of:</td></tr><tr><td>INR >6.5 (PT >100 sec)</td></tr><tr><td>Creatinine >3.4 mg/dL</td></tr><tr><td>Grade III-IV encephalopathy</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 ALF Management</div><div class="pathway"><strong>Continue NAC</strong> (reduces mortality even in ALF)<br><br><strong>Supportive care:</strong><br>• ICU admission<br>• Avoid sedatives (encephalopathy)<br>• Lactulose for encephalopathy<br>• Correct coagulopathy only if bleeding<br>• Monitor for hypoglycemia, cerebral edema<br><br><strong>Contact transplant center EARLY!</strong><br>Don't wait for King's criteria to be met</div></div><button class="btn" onclick="nextStage()">Prognosis →</button></div></div>`;
    };

    window.render_prognosis = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 10</div><div class="scene-title">Prognosis & Disposition</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does immunosuppression affect the differential?</p>

(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];

    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
