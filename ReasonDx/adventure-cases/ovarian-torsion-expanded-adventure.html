<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ovarian Torsion - Expanded Clinical Reasoning Adventure</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);min-height:100vh;color:#e2e8f0;line-height:1.6;padding:20px}
.container{max-width:800px;margin:0 auto}
.scene{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;margin-bottom:20px}
.scene-header{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.1)}
.scene-phase{font-size:0.85rem;color:#f472b6;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.scene-title{font-size:1.5rem;font-weight:700;color:#fff}
.scene-body{font-size:1rem;color:#cbd5e1}
.alert-box{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);border-radius:12px;padding:16px;margin:16px 0}
.alert-title{color:#f87171;font-weight:700;font-size:1.1rem;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.mechanism-box{background:linear-gradient(135deg,rgba(59,130,246,0.1),rgba(139,92,246,0.1));border:1px solid rgba(96,165,250,0.3);border-radius:12px;padding:16px;margin:16px 0}
.mechanism-title{color:#60a5fa;font-weight:700;font-size:1rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.pathway{font-family:'SF Mono',Monaco,monospace;font-size:0.85rem;color:#94a3b8;padding:12px;background:rgba(0,0,0,0.2);border-radius:8px;white-space:pre-wrap}
.boards-tip{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:12px;padding:16px;margin:16px 0}
.boards-tip-title{color:#4ade80;font-weight:700;margin-bottom:12px}
.comparison-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:0.9rem}
.comparison-table th,.comparison-table td{border:1px solid rgba(255,255,255,0.1);padding:10px;text-align:left}
.comparison-table th{background:rgba(96,165,250,0.2);color:#60a5fa}
.comparison-table tr:nth-child(even){background:rgba(255,255,255,0.02)}
.btn{background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:1rem;cursor:pointer;width:100%;margin-top:16px;transition:transform 0.2s,box-shadow 0.2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(59,130,246,0.4)}
.tips{display:grid;gap:12px;margin-top:16px}
.pearl{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:8px;padding:12px}
.pitfall{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:12px}
.tip-header{font-weight:700;margin-bottom:8px;font-size:0.9rem}
.pearl .tip-header{color:#4ade80}
.pitfall .tip-header{color:#f87171}
.why-chain{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:8px;padding:12px;margin:12px 0}
.why-chain-title{color:#fbbf24;font-weight:700;margin-bottom:8px}
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
const defined = {
    title: "Ovarian Torsion",
    subtitle: "Time-Sensitive Surgical Emergency",
    stages: ["intro","anatomy","presentation","imaging","doppler_trap","ddx","surgery","detorsion","special","debrief"]
};

let state = { stage: 0 };

function nextStage() {
    if (state.stage < defined.stages.length - 1) {
        state.stage++;
        renderStage();
    }
}

function renderStage() {
    const stageName = defined.stages[state.stage];
    const renderFn = window['render_' + stageName];
    if (renderFn) {
        document.getElementById('app').innerHTML = renderFn();
    }
}

window.render_intro = function() {
    return `
    <div class="scene">
        <div class="scene-header">
            <div class="scene-phase">Stage 1 of 10</div>
            <div class="scene-title">🏥 The Case</div>
        </div>
        <div class="scene-body">
            <p style="font-size:1.1rem;margin-bottom:16px;">A 22-year-old presents with <strong>sudden-onset severe right lower quadrant pain</strong> for 6 hours. She reports nausea, vomiting, and the pain is constant and sharp. Last menstrual period was 2 weeks ago.</p>
            
            <div class="alert-box">
                <div class="alert-title">🚨 Why This Is an Emergency</div>
                <p><strong>Ovarian torsion is a surgical emergency.</strong> Delayed diagnosis leads to ovarian necrosis and loss of fertility potential. Time to surgery directly impacts ovarian salvage rates.</p>
            </div>
            
            <div class="mechanism-box">
                <div class="mechanism-title">🧬 Pathophysiology Deep Dive</div>
                <div class="pathway">Ovary rotates on its vascular pedicle
    ↓
Lymphatic obstruction FIRST
    ↓
Ovarian edema develops
    ↓
Venous outflow obstruction
    ↓
Further swelling, arterial compromise
    ↓
Ischemia → Necrosis (if untreated)</div>
            </div>
            
            <div class="why-chain">
                <div class="why-chain-title">🔗 WHY Chain: Intermittent Symptoms</div>
                <p><strong>WHY do some patients have waxing/waning pain?</strong></p>
                <p>→ Partial torsion can spontaneously detorse</p>
                <p>→ This creates intermittent obstruction and relief</p>
                <p>→ Up to 50% of torsion patients report prior similar episodes</p>
                <p>→ This history is a CLUE!</p>
            </div>
            
            <button class="btn" onclick="nextStage()">Understand the Anatomy →</button>
        </div>
    </div>`;
};

window.render_anatomy = function() {
    return `
    <div class="scene">
        <div class="scene-header">
            <div class="scene-phase">Stage 2 of 10</div>
            <div class="scene-title">Anatomic Considerations</div>
        </div>
        <div class="scene-body">
            <div class="boards-tip">
                <div class="boards-tip-title">📚 Risk Factors for Torsion</div>
                <table class="comparison-table">
                    <tr><th>Factor</th><th>Why It Increases Risk</th></tr>
                    <tr style="background:rgba(239,68,68,0.2);"><td><strong>Ovarian mass (4-10 cm)</strong></td><td>Most common! Creates a fulcrum for rotation</td></tr>
                    <tr><td>Ovarian hyperstimulation</td><td>Enlarged ovaries from fertility treatment</td></tr>
                    <tr><td>Pregnancy (especially 1st trimester)</td><td>Corpus luteum cyst + ligament laxity</td></tr>
                    <tr><td>Previous torsion</td><td>Elongated pedicle from prior event</td></tr>
                    <tr><td>Long fallopian tube/ovarian ligament</td><td>More mobility to rotate</td></tr>
                </table>
            </div>
            
            <div class="mechanism-box">
                <div class="mechanism-title">🧬 Which Side is More Common?</div>
                <div class="pathway"><strong>Right side: 60% of cases</strong>

Why?
• Right infundibulopelvic ligament is longer
• Sigmoid colon limits left ovarian mobility
• Similar to appendicitis predominance

<strong>But left-sided torsion is still common!</strong>
Don't be falsely reassured by left-sided pain.</div>
            </div>
            
            <div class="why-chain">
                <div class="why-chain-title">🔗 WHY Chain: Normal Ovaries Can Torse</div>
                <p><strong>WHY can normal ovaries undergo torsion?</strong></p>
                <p>→ In children and adolescents, ovaries are often normal at surgery</p>
                <p>→ Ligamentous laxity in younger patients</p>
                <p>→ Rapid position changes (sports, gymnastics)</p>
                <p>→ Don't exclude torsion just because no mass is seen!</p>
            </div>
            
            <div class="alert-box">
                <div class="alert-title">⚠️ Pediatric Consideration</div>
                <p><strong>In prepubertal girls, the most common adnexal mass causing torsion is a mature cystic teratoma (dermoid).</strong> Up to 15% of torsion in children involves normal ovaries.</p>
            </div>
            
            <button class="btn" onclick="nextStage()">Clinical Presentation →</button>
        </div>
    </div>`;
};

window.render_presentation = function() {
    return `
    <div class="scene">
        <div class="scene-header">
            <div class="scene-phase">Stage 3 of 10</div>
            <div class="scene-title">Clinical Presentation</div>
        </div>
        <div class="scene-body">
            <div class="boards-tip">
                <div class="boards-tip-title">📚 Classic Presentation</div>
                <table class="comparison-table">
                    <tr><th>Symptom/Sign</th><th>Frequency</th><th>Notes</th></tr>
                    <tr style="background:rgba(34,197,94,0.2);"><td><strong>Sudden severe unilateral pain</strong></td><td>~90%</td><td>Most consistent finding</td></tr>
                    <tr><td>Nausea/vomiting</td><td>~70%</td><td>From peritoneal irritation</td></tr>
                    <tr><td>Adnexal mass/tenderness</td><td>~50%</td><td>May be difficult to palpate</td></tr>
                    <tr><td>Low-grade fever</td><td>~20%</td><td>Late finding (necrosis)</td></tr>
                    <tr><td>Peritoneal signs</td><td>~3%</td><td>Usually indicates advanced ischemia</td></tr>
                </table>
            </div>
            
            <div class="mechanism-box">
                <div class="mechanism-title">🧬 Pain Characteristics</div>
                <div class="pathway"><strong>Typical pattern:</strong>
• Sharp, constant, unilateral
• May radiate to flank, groin, or thigh
• Position changes don't help

<strong>Atypical patterns (watch out!):</strong>
• Intermittent colicky pain (partial torsion)
• Gradual onset over days
• Bilateral pain (rare bilateral torsion)
• Mild pain with large mass</div>
            </div>
            
            <div class="why-chain">
                <div class="why-chain-title">🔗 WHY Chain: Vomiting in Torsion</div>
                <p><strong>WHY is nausea/vomiting so common?</strong></p>
                <p>→ Visceral afferents from ovary travel with sympathetic nerves</p>
                <p>→ These converge on vomiting center pathways</p>
                <p>→ Similar to testicular torsion causing nausea in males</p>
                <p>→ Vomiting + pelvic pain = think torsion!</p>
            </div>
            
            <div class="alert-box">
                <div class="alert-title">⚠️ Don't Be Fooled</div>
                <p><strong>Up to 25% of patients have minimal symptoms</strong> - don't exclude torsion based on "not sick enough" appearance.</p>
            </div>
            
            <button class="btn" onclick="nextStage()">Imaging Approach →</button>
        </div>
    </div>`;
};

window.render_imaging = function() {
    return `
    <div class="scene">
        <div class="scene-header">
            <div class="scene-phase">Stage 4 of 10</div>
            <div class="scene-title">Imaging: Ultrasound First</div>
        </div>
        <div class="scene-body">
            <div class="alert-box">
                <div class="alert-title">📋 First-Line Imaging</div>
                <p><strong>Transvaginal ultrasound with Doppler</strong> is the imaging modality of choice. Transabdominal may be needed in pediatric/virgin patients.</p>
            </div>
            
            <div class="boards-tip">
                <div class="boards-tip-title">📚 Ultrasound Findings in Torsion</div>
                <table class="comparison-table">
                    <tr><th>Finding</th><th>Description</th><th>Significance</th></tr>
                    <tr style="background:rgba(34,197,94,0.2);"><td><strong>Enlarged ovary</strong></td><td>&gt;4 cm or &gt;2x contralateral</td><td>Most sensitive finding!</td></tr>
                    <tr><td>Ovarian edema</td><td>Heterogeneous, hypoechoic stroma</td><td>From lymphatic/venous congestion</td></tr>
                    <tr><td>Peripheral follicles</td><td>Ring of follicles pushed peripherally</td><td>Classic but not always present</td></tr>
                    <tr><td>Free fluid</td><td>Pelvic free fluid</td><td>Non-specific but supportive</td></tr>
                    <tr><td>Whirlpool sign</td><td>Twisted vascular pedicle</td><td>Highly specific if seen!</td></tr>
                    <tr><td>Ovarian mass</td><td>Dermoid, cyst, etc.</td><td>Identifies the cause</td></tr>
                </table>
            </div>
            
            <div class="mechanism-box">
                <div class="mechanism-title">🧬 Why Enlarged Ovary is Key</div>
                <div class="pathway">Torsion sequence:
    ↓
1. Lymphatics obstruct first (low pressure)
    ↓
2. Edema accumulates in ovary
    ↓
3. Ovary swells significantly
    ↓
4. Venous then arterial compromise

<strong>Key point:</strong>
Ovarian enlargement occurs BEFORE
loss of arterial flow on Doppler!</div>
            </div>
            
            <button class="btn" onclick="nextStage()">The Doppler Trap →</button>
        </div>
    </div>`;
};

window.render_doppler_trap = function() {
    return `
    <div class="scene">
        <div class="scene-header">
            <div class="scene-phase">Stage 5 of 10</div>
            <div class="scene-title">🚨 The Doppler Trap</div>
        </div>
        <div class="scene-body">
            <div class="alert-box">
                <div class="alert-title">⚠️ BOARDS FAVORITE: Doppler Can Be NORMAL in Torsion!</div>
                <p><strong>Do NOT rely on Doppler flow to exclude torsion!</strong> Up to 60% of surgically confirmed torsion cases have detectable arterial flow on Doppler.</p>
            </div>
            
            <div class="mechanism-box">
                <div class="mechanism-title">🧬 Why Doppler Flow Persists</div>
                <div class="pathway"><strong>Dual blood supply to the ovary:</strong>

1. Ovarian artery (from aorta)
   - Via infundibulopelvic ligament
   
2. Uterine artery branches
   - Via utero-ovarian ligament

<strong>In partial or early torsion:</strong>
• One supply may be preserved
• Intermittent detorsion allows flow
• Venous congestion ≠ arterial loss

<strong>Bottom line:</strong>
Absent flow = likely torsion
PRESENT flow ≠ NO torsion!</div>
            </div>
            
            <div class="boards-tip">
                <div class="boards-tip-title">📚 What DOES Suggest Torsion on US?</div>
                <table class="comparison-table">
                    <tr><th>Finding</th><th>Sensitivity</th><th>Specificity</th></tr>
                    <tr style="background:rgba(34,197,94,0.2);"><td><strong>Enlarged ovary</strong></td><td>~85%</td><td>~75%</td></tr>
                    <tr><td>Absent Doppler flow</td><td>~40%</td><td>~95%</td></tr>
                    <tr><td>Whirlpool sign</td><td>~65%</td><td>~99%</td></tr>
                    <tr><td>Peripheral follicles</td><td>~74%</td><td>~70%</td></tr>
                </table>
            </div>
            
            <div class="why-chain">
                <div class="why-chain-title">🔗 WHY Chain: Clinical Decision-Making</div>
                <p><strong>WHY should you still go to surgery with normal Doppler?</strong></p>
                <p>→ Ultrasound has limited sensitivity for torsion</p>
                <p>→ Clinical suspicion trumps imaging</p>
                <p>→ Delay = necrosis = oophorectomy</p>
                <p>→ The cost of a negative laparoscopy < losing an ovary</p>
            </div>
            
            <button class="btn" onclick="nextStage()">Differential Diagnosis →</button>
        </div>
    </div>`;
};

window.render_ddx = function() {
    return `
    <div class="scene">
        <div class="scene-header">
            <div class="scene-phase">Stage 6 of 10</div>
            <div class="scene-title">Differential Diagnosis</div>
        </div>
        <div class="scene-body">
            <div class="boards-tip">
                <div class="boards-tip-title">📚 Key Differentials to Consider</div>
                <table class="comparison-table">
                    <tr><th>Diagnosis</th><th>Key Distinguishing Features</th></tr>
                    <tr style="background:rgba(239,68,68,0.2);"><td><strong>Ectopic pregnancy</strong></td><td>+ hCG, adnexal mass, may have vaginal bleeding</td></tr>
                    <tr><td>Ruptured ovarian cyst</td><td>Sudden onset, free fluid, may have been known cyst</td></tr>
                    <tr><td>PID/TOA</td><td>Fever, discharge, cervical motion tenderness</td></tr>
                    <tr><td>Appendicitis</td><td>Migration of pain, anorexia, fever, RLQ focus</td></tr>
                    <tr><td>Hemorrhagic corpus luteum</td><td>Mid-cycle, sudden pain, hemoperitoneum</td></tr>
                    <tr><td>Kidney stone</td><td>Colicky pain, hematuria, flank radiation</td></tr>
                </table>
            </div>
            
            <div class="alert-box">
                <div class="alert-title">🚨 Critical First Step</div>
                <p><strong>Always get a pregnancy test!</strong> Ectopic pregnancy is the most dangerous mimic and changes management entirely.</p>
            </div>
            
            <div class="mechanism-box">
                <div class="mechanism-title">🧬 Torsion vs. Ruptured Cyst</div>
                <div class="pathway"><strong>Favors TORSION:</strong>
• Pain constant (not sudden then improving)
• Nausea/vomiting prominent
• Prior similar episodes
• Enlarged ovary on US
• Pain with movement

<strong>Favors RUPTURED CYST:</strong>
• Sudden onset then stabilizes
• Known cyst history
• Mid-cycle timing
• Significant free fluid
• Normal-sized ovary</div>
            </div>
            
            <div class="why-chain">
                <div class="why-chain-title">🔗 WHY Chain: Diagnostic Approach</div>
                <p><strong>WHY isn't there a definitive test for torsion?</strong></p>
                <p>→ No specific lab marker exists</p>
                <p>→ Imaging findings overlap with other pathology</p>
                <p>→ Diagnosis is clinical + imaging + high suspicion</p>
                <p>→ Definitive diagnosis is at surgery</p>
            </div>
            
            <button class="btn" onclick="nextStage()">Surgical Management →</button>
        </div>
    </div>`;
};

window.render_detorsion = function() {
    return `
    <div class="scene">

   - Historical concern of releasing clots

(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
