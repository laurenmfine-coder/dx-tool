<!DOCTYPE html>
<html lang="en">
<head>
<script>
// Auth Guard - Redirect if not logged in
(function(){var AUTH_KEY="reasondx-user";function getAuthPath(){var d=(location.pathname.match(/\//g)||[]).length-1,p="";for(var i=0;i<d;i++)p+="../";return p+"auth/register.html"}function isAuth(){try{var u=localStorage.getItem(AUTH_KEY);if(u){var j=JSON.parse(u);return j&&j.email&&j.name}}catch(e){}return false}if(!isAuth()){sessionStorage.setItem("reasondx-redirect",location.href);location.replace(getAuthPath())}})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARDS Management | Clinical Adventure</title>
    <style>
        :root { --primary: #4A90A4; --primary-dark: #2D5A6A; --accent: #F4A261; --success: #2A9D8F; --danger: #E63946; --bg: #F8FAFC; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; padding: 1rem; }
        .header { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; }
        .header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .header p { opacity: 0.9; font-size: 0.95rem; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.3); border-radius: 4px; margin-top: 1rem; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
        .scene { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 1rem; }
        .scene-title { font-size: 1.1rem; font-weight: 600; color: var(--primary-dark); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .patient-info { background: #E3F2FD; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .vital-signs { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 0.5rem; margin: 1rem 0; }
        .vital { background: white; padding: 0.5rem; border-radius: 6px; text-align: center; border: 1px solid #E0E0E0; }
        .vital-label { font-size: 0.75rem; color: #666; }
        .vital-value { font-weight: 600; color: var(--primary-dark); }
        .vital-value.critical { color: var(--danger); }
        .narrative { line-height: 1.7; margin-bottom: 1.5rem; color: #333; }
        .question { background: #FFF8E1; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border-left: 4px solid var(--accent); }
        .options { display: flex; flex-direction: column; gap: 0.75rem; }
        .option { padding: 1rem; border: 2px solid #E0E0E0; border-radius: 8px; cursor: pointer; transition: all 0.2s; background: white; text-align: left; font-size: 0.95rem; }
        .option:hover { border-color: var(--primary); background: #F0F7FA; }
        .option.selected { border-color: var(--primary); background: #E3F2FD; }
        .option.correct { border-color: var(--success); background: #E8F5E9; }
        .option.incorrect { border-color: var(--danger); background: #FFEBEE; }
        .feedback { padding: 1rem; border-radius: 8px; margin-top: 1rem; display: none; }
        .feedback.show { display: block; animation: fadeIn 0.3s; }
        .feedback.correct { background: #E8F5E9; border-left: 4px solid var(--success); }
        .feedback.incorrect { background: #FFEBEE; border-left: 4px solid var(--danger); }
        .teaching-point { background: linear-gradient(135deg, #E8F5E9, #F1F8E9); padding: 1rem; border-radius: 8px; margin-top: 1rem; }
        .teaching-point h4 { color: var(--success); margin-bottom: 0.5rem; }
        .btn { padding: 0.75rem 1.5rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-secondary { background: white; color: var(--primary); border: 2px solid var(--primary); }
        .nav-row { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }
        .score-card { background: linear-gradient(135deg, var(--success), #1E7D6E); color: white; padding: 2rem; border-radius: 12px; text-align: center; margin-top: 2rem; }
        .score-card h2 { font-size: 2rem; margin-bottom: 0.5rem; }
        .peds-toggle { display: flex; align-items: center; gap: 0.75rem; padding: 1rem; background: #FFF3CD; border-radius: 8px; margin-bottom: 1rem; }
        .toggle-switch { position: relative; width: 50px; height: 26px; background: #ccc; border-radius: 13px; cursor: pointer; transition: background 0.3s; }
        .toggle-switch.active { background: var(--primary); }
        .toggle-switch::after { content: ''; position: absolute; width: 22px; height: 22px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: left 0.3s; }
        .toggle-switch.active::after { left: 26px; }
        .peds-info { background: #E1F5FE; padding: 1rem; border-radius: 8px; margin: 1rem 0; border-left: 4px solid #03A9F4; display: none; }
        .peds-info.show { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 600px) { .vital-signs { grid-template-columns: repeat(3, 1fr); } }
    </style>
    <link rel="stylesheet" href="dx-case-banner-fix.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 ARDS Management</h1>
            <p>Respiratory failure requiring lung-protective ventilation</p>
            <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        </div>
        
        <div class="peds-toggle">
            <span>👶 Show Pediatric Considerations</span>
            <div class="toggle-switch" id="pedsToggle" onclick="togglePeds()"></div>
        </div>
        
        <div id="scene-container"></div>
        <div id="completion" style="display:none;"></div>
    </div>

    <script>
        const scenes = [
  {
    "icon": "🚨",
    "title": "Scene 1: Rapid Deterioration",
    "patient": "58-year-old male with community-acquired pneumonia, day 3 of hospitalization",
    "vitals": [
      {
        "label": "SpO2",
        "value": "82%",
        "critical": true
      },
      {
        "label": "RR",
        "value": "38",
        "critical": true
      },
      {
        "label": "HR",
        "value": "118"
      },
      {
        "label": "BP",
        "value": "138/85"
      },
      {
        "label": "FiO2",
        "value": "100%",
        "critical": true
      }
    ],
    "narrative": "Despite high-flow nasal cannula at 60 L/min and 100% FiO2, the patient remains hypoxic with labored breathing. CXR shows bilateral infiltrates. You calculate P/F ratio: PaO2 58 / FiO2 1.0 = 58.",
    "pedsNote": "Pediatric ARDS uses oxygenation index (OI = MAP × FiO2 × 100 / PaO2) instead of P/F ratio. OI 4-8 = mild, 8-16 = moderate, >16 = severe.",
    "question": "What is the ARDS severity based on P/F ratio?",
    "options": [
      {
        "text": "Mild ARDS (P/F 200-300)",
        "correct": false,
        "feedback": "Mild ARDS is P/F 200-300. This patient has P/F = 58."
      },
      {
        "text": "Moderate ARDS (P/F 100-200)",
        "correct": false,
        "feedback": "Moderate ARDS is P/F 100-200. This patient has P/F = 58."
      },
      {
        "text": "Severe ARDS (P/F <100)",
        "correct": true,
        "feedback": "With P/F = 58, this is severe ARDS. Berlin criteria: Mild 200-300, Moderate 100-200, Severe <100."
      }
    ]
  },
  {
    "icon": "🫁",
    "title": "Scene 2: Intubation Decision",
    "narrative": "The decision is made to intubate. You prepare for rapid sequence intubation. The patient weighs 80 kg (IBW 75 kg based on height 5'10\").",
    "pedsNote": "In pediatric ARDS, use weight-based ETT sizing: uncuffed = age/4 + 4, cuffed = age/4 + 3.5. Always prepare one size up and down.",
    "question": "What initial tidal volume setting is most appropriate for lung-protective ventilation?",
    "options": [
      {
        "text": "600 mL (8 mL/kg IBW)",
        "correct": false,
        "feedback": "This is too high. Traditional tidal volumes (10-12 mL/kg) cause ventilator-induced lung injury. ARDSNet showed 6 mL/kg IBW reduces mortality."
      },
      {
        "text": "450 mL (6 mL/kg IBW)",
        "correct": true,
        "feedback": "Correct! The ARDSNet ARMA trial demonstrated 6 mL/kg IBW reduces mortality from 40% to 31%. For 75 kg IBW: 75 × 6 = 450 mL."
      },
      {
        "text": "300 mL (4 mL/kg IBW)",
        "correct": false,
        "feedback": "While lower is generally better, 4 mL/kg may cause inadequate ventilation and severe hypercapnia. Target 4-6 mL/kg, ideally 6."
      }
    ],
    "teaching": "ARDSNet Protocol: Vt 6 mL/kg IBW, plateau pressure ≤30 cmH2O, permissive hypercapnia acceptable (pH >7.15)."
  },
  {
    "icon": "⚡",
    "title": "Scene 3: Refractory Hypoxemia",
    "vitals": [
      {
        "label": "SpO2",
        "value": "88%",
        "critical": true
      },
      {
        "label": "Vt",
        "value": "450 mL"
      },
      {
        "label": "RR",
        "value": "28"
      },
      {
        "label": "PEEP",
        "value": "10"
      },
      {
        "label": "Pplat",
        "value": "28"
      }
    ],
    "narrative": "On mechanical ventilation with Vt 450, RR 28, PEEP 10, FiO2 100%, the patient remains hypoxic (SpO2 88%). Plateau pressure is 28 cmH2O.",
    "pedsNote": "Pediatric driving pressure targets are similar (keep <15 cmH2O), but compliance varies significantly by age and disease.",
    "question": "What is the next best intervention?",
    "options": [
      {
        "text": "Increase tidal volume to 550 mL",
        "correct": false,
        "feedback": "Increasing Vt would raise Pplat above 30 and worsen VILI. Keep Vt 6 mL/kg IBW."
      },
      {
        "text": "Increase PEEP using ARDSNet high PEEP table",
        "correct": true,
        "feedback": "Correct! Higher PEEP recruits collapsed alveoli, improves V/Q matching, and may allow FiO2 reduction. ARDSNet tables guide PEEP/FiO2 combinations."
      },
      {
        "text": "Switch to pressure-control ventilation",
        "correct": false,
        "feedback": "PC vs VC mode doesn't change outcomes - the lung-protective strategy (Vt, Pplat) matters most."
      }
    ]
  },
  {
    "icon": "🔄",
    "title": "Scene 4: Prone Positioning",
    "narrative": "Despite optimizing PEEP to 16 cmH2O, the P/F ratio remains <100. You consider additional interventions for refractory hypoxemia.",
    "question": "Which intervention has proven mortality benefit in severe ARDS?",
    "options": [
      {
        "text": "Inhaled nitric oxide",
        "correct": false,
        "feedback": "iNO improves oxygenation temporarily but has NO proven mortality benefit in ARDS."
      },
      {
        "text": "Prone positioning for ≥16 hours/day",
        "correct": true,
        "feedback": "The PROSEVA trial showed prone positioning ≥16 hrs/day reduces mortality from 33% to 16% in severe ARDS (P/F <150)."
      },
      {
        "text": "High-frequency oscillatory ventilation",
        "correct": false,
        "feedback": "HFOV showed no benefit and possible harm in adults with ARDS (OSCAR and OSCILLATE trials)."
      }
    ],
    "teaching": "Prone positioning benefits: recruits dorsal lung, improves V/Q matching, reduces compression atelectasis, decreases VILI. Start early in severe ARDS!"
  },
  {
    "icon": "💊",
    "title": "Scene 5: Adjunctive Therapies",
    "narrative": "The patient is now proned. You review additional evidence-based therapies for ARDS.",
    "question": "Which statement about ARDS pharmacotherapy is TRUE?",
    "options": [
      {
        "text": "Routine corticosteroids are recommended for all ARDS",
        "correct": false,
        "feedback": "Steroid evidence is mixed. The DEXA-ARDS trial showed benefit with dexamethasone, but routine use is still debated. Avoid late (>14 days) steroids."
      },
      {
        "text": "Conservative fluid management improves outcomes",
        "correct": true,
        "feedback": "The FACTT trial showed conservative fluid strategy (CVP <4, PAOP <8) improves ventilator-free days without increasing renal failure."
      },
      {
        "text": "Beta-agonists accelerate alveolar fluid clearance",
        "correct": false,
        "feedback": "The BALTI-2 trial showed IV salbutamol was harmful. Albuterol doesn't improve outcomes in ARDS."
      }
    ]
  },
  {
    "icon": "✅",
    "title": "Scene 6: Summary",
    "narrative": "Over the next 7 days with lung-protective ventilation, proning, conservative fluids, and treatment of underlying pneumonia, the patient improves. P/F rises to 250, and he is successfully extubated.",
    "teaching": "ARDS Management Summary:\n• Low Vt (6 mL/kg IBW), Pplat ≤30\n• Optimize PEEP per ARDSNet tables\n• Prone positioning ≥16 hrs if P/F <150\n• Conservative fluid management\n• Treat underlying cause\n• Consider early neuromuscular blockade in severe ARDS"
  }
];
        
        let currentScene = 0;
        let score = 0;
        let pedsMode = false;

        function togglePeds() {
            pedsMode = !pedsMode;
            document.getElementById('pedsToggle').classList.toggle('active', pedsMode);
            document.querySelectorAll('.peds-info').forEach(el => el.classList.toggle('show', pedsMode));
        }

        function renderScene() {
            const scene = scenes[currentScene];
            document.getElementById('progress').style.width = ((currentScene + 1) / scenes.length * 100) + '%';
            
            let html = '<div class="scene">';
            html += '<div class="scene-title">' + scene.icon + ' ' + scene.title + '</div>';
            
            if (scene.patient) {
                html += '<div class="patient-info"><strong>' + scene.patient + '</strong></div>';
            }
            
            if (scene.vitals) {
                html += '<div class="vital-signs">';
                scene.vitals.forEach(v => {
                    html += '<div class="vital"><div class="vital-label">' + v.label + '</div>';
                    html += '<div class="vital-value' + (v.critical ? ' critical' : '') + '">' + v.value + '</div></div>';
                });
                html += '</div>';
            }
            
            html += '<div class="narrative">' + scene.narrative + '</div>';
            
            if (scene.pedsNote) {
                html += '<div class="peds-info' + (pedsMode ? ' show' : '') + '">👶 <strong>Pediatric Note:</strong> ' + scene.pedsNote + '</div>';
            }
            
            if (scene.question) {
                html += '<div class="question"><strong>❓ ' + scene.question + '</strong></div>';
                html += '<div class="options">';
                scene.options.forEach((opt, i) => {
                    html += '<button class="option" onclick="selectOption(' + i + ')" data-correct="' + (opt.correct || false) + '">' + opt.text + '</button>';
                });
                html += '</div>';
                html += '<div class="feedback" id="feedback"></div>';
            }
            
            if (scene.teaching) {
                html += '<div class="teaching-point"><h4>📚 Teaching Point</h4><p>' + scene.teaching + '</p></div>';
            }
            
            html += '<div class="nav-row">';
            if (!scene.question) {
                html += '<button class="btn btn-primary" onclick="nextScene()">Continue →</button>';
            }
            html += '</div></div>';
            
            document.getElementById('scene-container').innerHTML = html;
        }

        function selectOption(index) {
            const options = document.querySelectorAll('.option');
            const feedback = document.getElementById('feedback');
            const scene = scenes[currentScene];
            
            options.forEach((opt, i) => {
                opt.style.pointerEvents = 'none';
                if (i === index) {
                    if (opt.dataset.correct === 'true') {
                        opt.classList.add('correct');
                        score++;
                        feedback.className = 'feedback show correct';
                        feedback.innerHTML = '<strong>✓ Correct!</strong> ' + scene.options[i].feedback;
                    } else {
                        opt.classList.add('incorrect');
                        feedback.className = 'feedback show incorrect';
                        feedback.innerHTML = '<strong>✗ Not quite.</strong> ' + scene.options[i].feedback;
                        // Show correct answer
                        options.forEach((o, j) => {
                            if (o.dataset.correct === 'true') o.classList.add('correct');
                        });
                    }
                }
            });
            
            setTimeout(() => {
                const nav = document.querySelector('.nav-row');
                nav.innerHTML = '<button class="btn btn-primary" onclick="nextScene()">Continue →</button>';
            }, 1000);
        }

        function nextScene() {
            currentScene++;
            if (currentScene >= scenes.length) {
                showCompletion();
            } else {
                renderScene();
                window.scrollTo({top: 0, behavior: 'smooth'});
            }
        }

        function showCompletion() {
            document.getElementById('scene-container').style.display = 'none';
            const pct = Math.round(score / scenes.filter(s => s.question).length * 100);
            document.getElementById('completion').style.display = 'block';
            document.getElementById('completion').innerHTML = 
                '<div class="score-card"><h2>🎉 Case Complete!</h2>' +
                '<p>Score: ' + score + '/' + scenes.filter(s => s.question).length + ' (' + pct + '%)</p></div>' +
                '<div class="nav-row" style="justify-content:center;margin-top:1rem;">' +
                '<a href="index.html" class="btn btn-secondary">← Back to Adventures</a>' +
                '<button class="btn btn-primary" onclick="location.reload()">🔄 Try Again</button></div>';
        }

        renderScene();
    </script>

    <!-- DxSuite AI Tutor Integration -->
    <div data-dx-tutor
         data-module-title="ARDS Management"
         data-key-points="🎉 Case Complete!, clinical reasoning, differential diagnosis, diagnostic workup, illness scripts"
         data-objectives="Develop systematic clinical reasoning, refine differential diagnosis skills"
         style="display:none;"></div>
    <script src="dx-ai-tutor.js"></script>
</body>
</html>
