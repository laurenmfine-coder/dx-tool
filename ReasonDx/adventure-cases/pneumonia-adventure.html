<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Coughing Crisis | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#14B8A6;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#0F766E,#14B8A6);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(20,184,166,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(20,184,166,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(20,184,166,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🦠 The Coughing Crisis</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'52M',wt:'78kg',hx:'Cough, fever, rusty sputum x4d, previously healthy',exam:'RLL crackles, dullness to percussion',vitals:{HR:'98',BP:'128/78',RR:'22',T:'39.2'},labs:{WBC:'16.4',CXR:'RLL consolidation',ProCal:'2.4'}},int:{age:'78F',wt:'55kg',hx:'Nursing home resident, confusion, cough, aspiration risk',exam:'Decreased breath sounds bilat, rhonchi',vitals:{HR:'108',BP:'92/58',RR:'26',T:'38.1'},labs:{WBC:'14.2',CXR:'Bilateral infiltrates',Cr:'1.8'}},adv:{age:'45M',wt:'82kg',hx:'HIV+ (CD4 85), dry cough x2wks, hypoxic on exertion',exam:'Clear lungs, tachypneic, oral thrush',vitals:{HR:'92',BP:'118/72',RR:'28',SpO2:'88%'},labs:{WBC:'8.2',LDH:'480',CXR:'Bilateral interstitial infiltrates'}}};
const Q=[
{t:'Severity Score',q:'Which score determines CAP admission?',h:'Outpatient vs inpatient decision',o:[{id:'a',txt:'CURB-65 or PSI (Pneumonia Severity Index)',c:1,p:100},{id:'b',txt:'APACHE II',c:0,p:20},{id:'c',txt:'qSOFA only',c:0,p:30}],fb:{1:'<b>Correct!</b> CURB-65: Confusion, Urea>7, RR≥30, BP<90/60, Age≥65. 0-1=outpatient, 2=admit, ≥3=ICU consider.',0:'<b>Scoring:</b> CURB-65 or PSI for disposition. qSOFA identifies sepsis.'}},
{t:'CAP Antibiotics',q:'Empiric antibiotics for CAP requiring admission (non-ICU)?',h:'Cover typical + atypical',o:[{id:'a',txt:'Beta-lactam (ceftriaxone) + macrolide (azithro) OR respiratory FQ',c:1,p:100},{id:'b',txt:'Vancomycin + pip-tazo',c:0,p:20},{id:'c',txt:'Amoxicillin alone',c:0,p:30}],fb:{1:'<b>Correct!</b> CAP: Ceftriaxone + azithro (or doxy) OR respiratory FQ (levoflox, moxiflox) alone.',0:'<b>CAP coverage:</b> S. pneumo, H. flu, atypicals. Beta-lactam + macrolide or FQ.'}},
{t:'ICU Criteria',q:'Major criteria for severe CAP requiring ICU?',h:'IDSA/ATS criteria',o:[{id:'a',txt:'Septic shock requiring pressors OR mechanical ventilation',c:1,p:100},{id:'b',txt:'Any hypoxia',c:0,p:20},{id:'c',txt:'WBC >15k',c:0,p:10}],fb:{1:'<b>Correct!</b> Major: septic shock or mech vent. Minor (≥3): RR≥30, PaO2/FiO2<250, multilobar, confusion, BUN>20, WBC<4k, plt<100k, temp<36, hypotension needing fluids.',0:'<b>ICU criteria:</b> 1 major OR 3 minor = ICU admission.'}},
{t:'HCAP/Aspiration',q:'Nursing home patient with aspiration risk. Coverage?',h:'Consider resistant organisms',o:[{id:'a',txt:'Broader coverage: pip-tazo or ceftriaxone + metronidazole',c:1,p:100},{id:'b',txt:'Same as CAP',c:0,p:30},{id:'c',txt:'Vancomycin monotherapy',c:0,p:0}],fb:{1:'<b>Correct!</b> Aspiration/HCAP: Cover GNRs + anaerobes. Pip-tazo or ceftriaxone+metronidazole. Add MRSA coverage if risk factors.',0:'<b>HCAP:</b> Broader coverage for resistant organisms and anaerobes.'}},
{t:'PCP Pneumonia',q:'HIV patient, bilateral interstitial infiltrates, LDH elevated. Likely diagnosis and treatment?',h:'CD4 <200 puts at risk',o:[{id:'a',txt:'PCP - TMP-SMX 15-20 mg/kg/day + steroids if hypoxic',c:1,p:100},{id:'b',txt:'Bacterial CAP - ceftriaxone',c:0,p:20},{id:'c',txt:'TB - RIPE',c:0,p:30}],fb:{1:'<b>Correct!</b> PCP: TMP-SMX (15-20 mg/kg/day of TMP). Add prednisone if PaO2<70 or A-a gradient>35.',0:'<b>PCP:</b> CD4<200, elevated LDH, interstitial pattern. TMP-SMX + steroids if hypoxic.'}},
{t:'Steroid Adjunct',q:'When are steroids indicated in CAP?',h:'Specific indications',o:[{id:'a',txt:'Severe CAP with high inflammatory markers, or PCP with hypoxia',c:1,p:100},{id:'b',txt:'All pneumonia',c:0,p:0},{id:'c',txt:'Never',c:0,p:20}],fb:{1:'<b>Correct!</b> Steroids: PCP with hypoxia (proven), severe CAP (emerging data). Not routine for all CAP.',0:'<b>Steroids:</b> Clear benefit in PCP. Consider in severe CAP.'}},
{t:'Duration',q:'Antibiotic duration for uncomplicated CAP?',h:'Shorter courses effective',o:[{id:'a',txt:'5 days (if afebrile 48-72 hrs and clinically stable)',c:1,p:100},{id:'b',txt:'14 days minimum',c:0,p:20},{id:'c',txt:'Until CXR clears',c:0,p:10}],fb:{1:'<b>Correct!</b> 5 days adequate if: afebrile ≥48hrs, clinically improving, able to take PO. Longer for complications.',0:'<b>Duration:</b> 5 days usually sufficient. Extend for empyema, abscess, or slow response.'}},
{t:'Treatment Failure',q:'No improvement at 72 hrs. Next steps?',h:'Reassess diagnosis and coverage',o:[{id:'a',txt:'CT chest, broaden coverage, consider resistant organisms or alternative dx',c:1,p:100},{id:'b',txt:'Continue same antibiotics longer',c:0,p:10},{id:'c',txt:'Discharge home',c:0,p:0}],fb:{1:'<b>Correct!</b> Failure workup: CT (effusion, abscess, PE), cultures, bronchoscopy if needed. Consider MRSA, Pseudomonas, TB, fungal, or non-infectious causes.',0:'<b>Failure:</b> Reassess diagnosis, imaging, and antibiotic coverage.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next →':'Results →';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🦠 The Coughing Crisis</h1><p style="color:var(--muted);margin-bottom:32px">Pneumonia: CURB-65, CAP antibiotics, ICU criteria, PCP, duration</p><button class="start-btn" onclick="go(\'pres\')">Begin Case →</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🫁 Pulmonary Infection</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment →</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">🔍 '+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">💡 '+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit →</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">📌 Pneumonia Pearls</div><div class="pearl-item"><b>CURB-65:</b> 0-1=outpatient, 2=admit, ≥3=consider ICU</div><div class="pearl-item"><b>CAP:</b> Ceftriaxone + azithro OR respiratory FQ</div><div class="pearl-item"><b>ICU:</b> Septic shock OR mech vent (major criteria)</div><div class="pearl-item"><b>PCP:</b> TMP-SMX + steroids if PaO2<70</div><div class="pearl-item"><b>Duration:</b> 5 days if improving</div></div><div class="cross-link"><a href="../mechanism/pneumonia-module.html">MechanismDx: Pneumonia</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
