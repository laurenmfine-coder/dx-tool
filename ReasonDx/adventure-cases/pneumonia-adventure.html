<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Productive Cough | ReasonDx Adventure</title>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --border: #334155; --text: #F1F5F9; --muted: #94A3B8; --accent: #8B5CF6; --success: #10B981; --warning: #F59E0B; --danger: #DC2626; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
        .header { background: linear-gradient(135deg, #7C3AED 0%, #8B5CF6 100%); padding: 12px 20px; position: sticky; top: 0; z-index: 100; }
        .header-row { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .header-title { font-size: 1.1rem; font-weight: 600; }
        .stat { background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 8px; }
        .stat-value { font-size: 1.1rem; font-weight: 700; font-family: monospace; }
        .stat-label { font-size: 0.6rem; opacity: 0.8; text-transform: uppercase; }
        .main { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; }
        .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .card-phase { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
        .card-title { font-size: 1.5rem; font-weight: 700; }
        .card-body { padding: 24px; }
        .narrative { background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(124,58,237,0.1)); border-left: 4px solid var(--accent); padding: 20px 24px; border-radius: 0 12px 12px 0; margin-bottom: 24px; line-height: 1.8; }
        .narrative .hl { background: rgba(139,92,246,0.3); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .setup-screen { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; }
        .setup-screen h1 { font-size: 2rem; margin-bottom: 8px; }
        .setup-screen .subtitle { color: var(--muted); margin-bottom: 32px; }
        .start-btn { background: var(--accent); color: white; border: none; padding: 16px 48px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .question-section { margin-bottom: 32px; }
        .question-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .question-number { background: var(--accent); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .question-text { font-size: 1.1rem; font-weight: 600; }
        .radio-options { display: flex; flex-direction: column; gap: 10px; }
        .radio-option { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .radio-option:hover { border-color: var(--accent); }
        .radio-option.selected { border-color: var(--accent); background: rgba(139,92,246,0.15); }
        .radio-option.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .radio-option.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .radio-circle { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; }
        .radio-option.selected .radio-circle { border-color: var(--accent); background: radial-gradient(circle, var(--accent) 40%, transparent 40%); }
        .feedback { padding: 20px; border-radius: 12px; margin: 20px 0; }
        .feedback.excellent { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); }
        .feedback.acceptable { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); }
        .feedback-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .feedback-icon { font-size: 1.5rem; }
        .feedback-title { font-weight: 700; }
        .feedback-text { color: var(--muted); line-height: 1.7; }
        .feedback-text strong { color: var(--text); }
        .alert { padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; }
        .alert.info { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3); }
        .alert-icon { font-size: 1.5rem; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: 600; margin-bottom: 4px; }
        .alert-desc { font-size: 0.9rem; color: var(--muted); }
        .btn { padding: 14px 28px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-row { display: flex; gap: 12px; margin-top: 24px; }
        .lab-panel { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .lab-panel-title { font-weight: 600; margin-bottom: 16px; color: var(--accent); }
        .lab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
        .lab-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; }
        .lab-name { font-size: 0.8rem; color: var(--muted); }
        .lab-value { font-size: 1.1rem; font-weight: 700; }
        .lab-value.critical { color: var(--danger); }
        .lab-value.high { color: var(--warning); }
        .lab-range { font-size: 0.7rem; color: var(--muted); }
        .outcome { text-align: center; padding: 40px 20px; }
        .outcome-icon { font-size: 4rem; margin-bottom: 16px; }
        .outcome-title { font-size: 2rem; font-weight: 700; color: var(--success); margin-bottom: 8px; }
        .outcome-desc { color: var(--muted); max-width: 600px; margin: 0 auto 24px; }
        .score-summary { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 24px; margin: 24px auto; max-width: 500px; }
        .score-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .score-row:last-child { border-bottom: none; }
        .curb-box { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .curb-title { font-weight: 600; color: var(--accent); margin-bottom: 12px; }
        .curb-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .curb-item:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <header class="header"><div class="header-row"><div class="header-title">🫁 The Productive Cough</div><div class="stat"><div class="stat-value" id="scoreDisplay">0</div><div class="stat-label">Points</div></div></div></header>
    <main class="main"><div id="stageContainer"></div></main>
    <script>
    const state = { stage:'setup', score:0 };
    
    function addScore(pts) { state.score += pts; document.getElementById('scoreDisplay').textContent = state.score; }

    const stages = {
        setup: { render: () => `
            <div class="setup-screen">
                <h1>🫁 The Productive Cough</h1>
                <p class="subtitle">Community-acquired pneumonia management</p>
                <button class="start-btn" onclick="goTo('presentation')">Begin Case →</button>
            </div>`
        },
        presentation: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Emergency Department</div><div class="card-title">📋 Cough and Fever</div></div>
                <div class="card-body">
                    <div class="narrative">A <span class="hl">67-year-old male</span> with <span class="hl">COPD</span> and <span class="hl">diabetes</span> presents with <span class="hl">3 days of productive cough</span> with yellow-green sputum, <span class="hl">fever (38.8°C)</span>, and <span class="hl">dyspnea</span>.<br><br>Vitals: BP 118/72, HR 102, RR 24, SpO2 91% on RA. Exam reveals <span class="hl">right lower lobe crackles</span> and <span class="hl">dullness to percussion</span>. He is <span class="hl">oriented but appears ill</span>.</div>
                    <div class="lab-panel">
                        <div class="lab-panel-title">Initial Studies</div>
                        <div class="lab-grid">
                            <div class="lab-item"><div class="lab-name">WBC</div><div class="lab-value high">16.8 K</div><div class="lab-range">4.5-11</div></div>
                            <div class="lab-item"><div class="lab-name">BUN</div><div class="lab-value high">24 mg/dL</div><div class="lab-range">7-20</div></div>
                            <div class="lab-item"><div class="lab-name">Creatinine</div><div class="lab-value">1.1 mg/dL</div><div class="lab-range">0.7-1.3</div></div>
                            <div class="lab-item"><div class="lab-name">Procalcitonin</div><div class="lab-value high">2.4 ng/mL</div><div class="lab-range">&lt;0.1</div></div>
                            <div class="lab-item"><div class="lab-name">Lactate</div><div class="lab-value">1.8 mmol/L</div><div class="lab-range">&lt;2</div></div>
                        </div>
                    </div>
                    <div class="alert info"><span class="alert-icon">📷</span><div class="alert-content"><div class="alert-title">Chest X-Ray</div><div class="alert-desc">Right lower lobe consolidation with air bronchograms. No pleural effusion.</div></div></div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="goTo('severity')">Assess Severity →</button></div>
                </div>
            </div>`
        },
        severity: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Risk Stratification</div><div class="card-title">📊 CURB-65 Score</div></div>
                <div class="card-body">
                    <div class="curb-box">
                        <div class="curb-title">Calculate CURB-65</div>
                        <div class="curb-item"><span><strong>C</strong>onfusion</span><span>No = 0</span></div>
                        <div class="curb-item"><span><strong>U</strong>rea (BUN &gt;19 mg/dL)</span><span>Yes (24) = 1</span></div>
                        <div class="curb-item"><span><strong>R</strong>espiratory rate ≥30</span><span>No (24) = 0</span></div>
                        <div class="curb-item"><span><strong>B</strong>P systolic &lt;90 or diastolic ≤60</span><span>No = 0</span></div>
                        <div class="curb-item"><span>Age ≥<strong>65</strong></span><span>Yes (67) = 1</span></div>
                        <div class="curb-item" style="background:rgba(139,92,246,0.2);margin-top:8px;padding:12px;border-radius:8px"><span><strong>Total Score</strong></span><span><strong>2</strong></span></div>
                    </div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">1</div><div class="question-text">Based on CURB-65 score of 2, what is the recommended disposition?</div></div>
                        <div class="radio-options" id="dispOpts">
                            <div class="radio-option" data-id="home" onclick="selectDisp('home')"><div class="radio-circle"></div><span>Outpatient treatment (home)</span></div>
                            <div class="radio-option" data-id="admit" onclick="selectDisp('admit')"><div class="radio-circle"></div><span>Hospital admission (ward)</span></div>
                            <div class="radio-option" data-id="icu" onclick="selectDisp('icu')"><div class="radio-circle"></div><span>ICU admission</span></div>
                        </div>
                    </div>
                    <div id="dispFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="dispSubmit" onclick="submitDisp()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        workup: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Diagnostics</div><div class="card-title">🧪 Additional Workup</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">2</div><div class="question-text">Which diagnostic studies are recommended for this hospitalized CAP patient?</div></div>
                        <div class="radio-options" id="workupOpts">
                            <div class="radio-option" data-id="none" onclick="selectWorkup('none')"><div class="radio-circle"></div><span>No additional workup - treat empirically</span></div>
                            <div class="radio-option" data-id="sputum" onclick="selectWorkup('sputum')"><div class="radio-circle"></div><span>Sputum culture only</span></div>
                            <div class="radio-option" data-id="blood_sputum" onclick="selectWorkup('blood_sputum')"><div class="radio-circle"></div><span>Blood cultures + sputum culture</span></div>
                            <div class="radio-option" data-id="full" onclick="selectWorkup('full')"><div class="radio-circle"></div><span>Blood cultures + sputum + Legionella/pneumococcal urine antigens</span></div>
                        </div>
                    </div>
                    <div id="workupFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="workupSubmit" onclick="submitWorkup()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        antibiotics: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Treatment</div><div class="card-title">💊 Empiric Antibiotics</div></div>
                <div class="card-body">
                    <div class="alert info"><span class="alert-icon">📋</span><div class="alert-content"><div class="alert-title">ATS/IDSA Guidelines</div><div class="alert-desc">Empiric therapy should cover typical (S. pneumoniae, H. influenzae, M. catarrhalis) AND atypical (Mycoplasma, Chlamydia, Legionella) pathogens</div></div></div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">3</div><div class="question-text">What is the appropriate empiric regimen for non-severe CAP (ward admission)?</div></div>
                        <div class="radio-options" id="abxOpts">
                            <div class="radio-option" data-id="azithro" onclick="selectAbx('azithro')"><div class="radio-circle"></div><div><strong>Azithromycin alone</strong><br><small style="color:var(--muted)">Atypical coverage</small></div></div>
                            <div class="radio-option" data-id="ceftri" onclick="selectAbx('ceftri')"><div class="radio-circle"></div><div><strong>Ceftriaxone alone</strong><br><small style="color:var(--muted)">Typical coverage</small></div></div>
                            <div class="radio-option" data-id="ceftri_azithro" onclick="selectAbx('ceftri_azithro')"><div class="radio-circle"></div><div><strong>Ceftriaxone + Azithromycin</strong><br><small style="color:var(--muted)">OR respiratory fluoroquinolone alone</small></div></div>
                            <div class="radio-option" data-id="vanco_zosyn" onclick="selectAbx('vanco_zosyn')"><div class="radio-circle"></div><div><strong>Vancomycin + Piperacillin-tazobactam</strong><br><small style="color:var(--muted)">Broad-spectrum coverage</small></div></div>
                        </div>
                    </div>
                    <div id="abxFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="abxSubmit" onclick="submitAbx()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        steroids: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Adjunctive Therapy</div><div class="card-title">💉 Corticosteroids in CAP</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">4</div><div class="question-text">Should this patient receive corticosteroids?</div></div>
                        <div class="radio-options" id="steroidOpts">
                            <div class="radio-option" data-id="yes_all" onclick="selectSteroid('yes_all')"><div class="radio-circle"></div><span>Yes - all hospitalized CAP patients benefit</span></div>
                            <div class="radio-option" data-id="yes_severe" onclick="selectSteroid('yes_severe')"><div class="radio-circle"></div><span>Yes - but only for severe CAP (ICU-level)</span></div>
                            <div class="radio-option" data-id="no" onclick="selectSteroid('no')"><div class="radio-circle"></div><span>No - steroids have no role in CAP</span></div>
                            <div class="radio-option" data-id="maybe" onclick="selectSteroid('maybe')"><div class="radio-circle"></div><span>Consider for severe CAP with high inflammatory markers</span></div>
                        </div>
                    </div>
                    <div id="steroidFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="steroidSubmit" onclick="submitSteroid()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        duration: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Duration</div><div class="card-title">📅 Treatment Duration</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">5</div><div class="question-text">What is the recommended antibiotic duration for uncomplicated CAP?</div></div>
                        <div class="radio-options" id="durOpts">
                            <div class="radio-option" data-id="3" onclick="selectDur('3')"><div class="radio-circle"></div><span>3 days</span></div>
                            <div class="radio-option" data-id="5" onclick="selectDur('5')"><div class="radio-circle"></div><span>5 days (minimum)</span></div>
                            <div class="radio-option" data-id="10" onclick="selectDur('10')"><div class="radio-circle"></div><span>10-14 days</span></div>
                            <div class="radio-option" data-id="21" onclick="selectDur('21')"><div class="radio-circle"></div><span>21 days</span></div>
                        </div>
                    </div>
                    <div id="durFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="durSubmit" onclick="submitDur()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        outcome: { render: () => `
            <div class="card"><div class="card-body">
                <div class="outcome">
                    <div class="outcome-icon">🎉</div>
                    <div class="outcome-title">Patient Recovered!</div>
                    <div class="outcome-desc">Patient was admitted to the ward and started on ceftriaxone + azithromycin. Sputum culture grew S. pneumoniae. He was afebrile by day 2, transitioned to oral amoxicillin-clavulanate on day 3, and discharged to complete a 5-day total course. Follow-up chest X-ray at 6 weeks showed resolution.</div>
                </div>
                <div class="score-summary">
                    <h3 style="margin-bottom:16px">Performance</h3>
                    <div class="score-row"><span>Disposition</span><span>${state.dispScore||0}/100</span></div>
                    <div class="score-row"><span>Workup</span><span>${state.workupScore||0}/100</span></div>
                    <div class="score-row"><span>Antibiotics</span><span>${state.abxScore||0}/100</span></div>
                    <div class="score-row"><span>Steroids</span><span>${state.steroidScore||0}/100</span></div>
                    <div class="score-row"><span>Duration</span><span>${state.durScore||0}/100</span></div>
                    <div class="score-row" style="border-top:2px solid var(--border);padding-top:12px"><strong>Total</strong><strong>${state.score}</strong></div>
                </div>
                <div class="feedback excellent"><div class="feedback-header"><span class="feedback-icon">💡</span><span class="feedback-title">CAP Pearls</span></div><div class="feedback-text">
                    • <strong>CURB-65:</strong> 0-1 = outpatient, 2 = consider admission, 3+ = hospitalize, 4-5 = ICU<br>
                    • <strong>Non-severe inpatient CAP:</strong> β-lactam + macrolide OR respiratory FQ alone<br>
                    • <strong>Severe CAP (ICU):</strong> β-lactam + macrolide OR β-lactam + FQ (not FQ alone)<br>
                    • <strong>Duration:</strong> Minimum 5 days, can stop when afebrile 48h and clinically stable<br>
                    • <strong>Steroids:</strong> May benefit severe CAP with high CRP/inflammatory markers<br>
                    • <strong>MRSA/Pseudomonas:</strong> Only add if risk factors (prior culture, severe CAP, recent hospitalization)<br>
                    • <strong>Procalcitonin:</strong> Can guide antibiotic de-escalation (stop when &lt;0.25 or ↓80%)
                </div></div>
                <div class="curb-box">
                    <div class="curb-title">CURB-65 Interpretation</div>
                    <div class="curb-item"><span>Score 0-1</span><span>Low risk (1-3% mortality) → Outpatient</span></div>
                    <div class="curb-item"><span>Score 2</span><span>Intermediate (9% mortality) → Consider admission</span></div>
                    <div class="curb-item"><span>Score 3-5</span><span>High risk (15-40% mortality) → Hospitalize/ICU</span></div>
                </div>
                <div class="btn-row"><button class="btn btn-primary" onclick="location.reload()">Play Again</button></div>
            </div></div>`
        }
    };

    let selectedDisp = null;
    function selectDisp(id) { selectedDisp = id; document.querySelectorAll('#dispOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('dispSubmit').disabled = false; }
    function submitDisp() {
        document.querySelectorAll('#dispOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'admit') o.classList.add('correct');
            else if (o.dataset.id === selectedDisp) o.classList.add('incorrect');
        });
        state.dispScore = selectedDisp === 'admit' ? 100 : 40;
        addScore(selectedDisp === 'admit' ? 40 : 15);
        document.getElementById('dispFeedback').innerHTML = `<div class="feedback ${selectedDisp==='admit'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedDisp==='admit'?'✅':'📚'}</span><span class="feedback-title">${selectedDisp==='admit'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>CURB-65 = 2:</strong> Intermediate risk (~9% mortality), hospital admission recommended. Score 0-1 = outpatient, Score ≥3 = consider ICU. Also factor in hypoxia (SpO2 91%), comorbidities (COPD, DM).</div></div>`;
        document.getElementById('dispSubmit').textContent = 'Continue →';
        document.getElementById('dispSubmit').onclick = () => goTo('workup');
    }

    let selectedWorkup = null;
    function selectWorkup(id) { selectedWorkup = id; document.querySelectorAll('#workupOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('workupSubmit').disabled = false; }
    function submitWorkup() {
        document.querySelectorAll('#workupOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'blood_sputum') o.classList.add('correct');
            else if (o.dataset.id === selectedWorkup) o.classList.add('incorrect');
        });
        state.workupScore = selectedWorkup === 'blood_sputum' ? 100 : (selectedWorkup === 'full' ? 80 : 40);
        addScore(selectedWorkup === 'blood_sputum' ? 30 : (selectedWorkup === 'full' ? 25 : 10));
        document.getElementById('workupFeedback').innerHTML = `<div class="feedback ${selectedWorkup==='blood_sputum'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedWorkup==='blood_sputum'?'✅':'📚'}</span><span class="feedback-title">${selectedWorkup==='blood_sputum'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>Non-severe inpatient CAP:</strong> Blood cultures + sputum culture recommended<br><strong>Urine antigens:</strong> Add for severe CAP or specific risk factors (Legionella outbreaks, travel)</div></div>`;
        document.getElementById('workupSubmit').textContent = 'Continue →';
        document.getElementById('workupSubmit').onclick = () => goTo('antibiotics');
    }

    let selectedAbx = null;
    function selectAbx(id) { selectedAbx = id; document.querySelectorAll('#abxOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('abxSubmit').disabled = false; }
    function submitAbx() {
        document.querySelectorAll('#abxOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'ceftri_azithro') o.classList.add('correct');
            else if (o.dataset.id === selectedAbx) o.classList.add('incorrect');
        });
        state.abxScore = selectedAbx === 'ceftri_azithro' ? 100 : 40;
        addScore(selectedAbx === 'ceftri_azithro' ? 40 : 15);
        document.getElementById('abxFeedback').innerHTML = `<div class="feedback ${selectedAbx==='ceftri_azithro'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedAbx==='ceftri_azithro'?'✅':'📚'}</span><span class="feedback-title">${selectedAbx==='ceftri_azithro'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>Non-severe inpatient CAP:</strong> β-lactam (ceftriaxone, ampicillin-sulbactam) + macrolide (azithromycin) OR respiratory FQ alone (levofloxacin, moxifloxacin)<br><strong>Rationale:</strong> Must cover both typical AND atypical pathogens</div></div>`;
        document.getElementById('abxSubmit').textContent = 'Continue →';
        document.getElementById('abxSubmit').onclick = () => goTo('steroids');
    }

    let selectedSteroid = null;
    function selectSteroid(id) { selectedSteroid = id; document.querySelectorAll('#steroidOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('steroidSubmit').disabled = false; }
    function submitSteroid() {
        document.querySelectorAll('#steroidOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'maybe') o.classList.add('correct');
            else if (o.dataset.id === selectedSteroid) o.classList.add('incorrect');
        });
        state.steroidScore = selectedSteroid === 'maybe' ? 100 : (selectedSteroid === 'yes_severe' ? 70 : 40);
        addScore(selectedSteroid === 'maybe' ? 30 : (selectedSteroid === 'yes_severe' ? 20 : 10));
        document.getElementById('steroidFeedback').innerHTML = `<div class="feedback ${selectedSteroid==='maybe'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedSteroid==='maybe'?'✅':'📚'}</span><span class="feedback-title">${selectedSteroid==='maybe'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>Steroids in CAP:</strong> Consider for severe CAP with high inflammatory markers (CRP &gt;150 mg/L). Recent trials suggest benefit in reducing mortality and treatment failure. Not routinely recommended for non-severe CAP.</div></div>`;
        document.getElementById('steroidSubmit').textContent = 'Continue →';
        document.getElementById('steroidSubmit').onclick = () => goTo('duration');
    }

    let selectedDur = null;
    function selectDur(id) { selectedDur = id; document.querySelectorAll('#durOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('durSubmit').disabled = false; }
    function submitDur() {
        document.querySelectorAll('#durOpts .radio-option').forEach(o => {
            if (o.dataset.id === '5') o.classList.add('correct');
            else if (o.dataset.id === selectedDur) o.classList.add('incorrect');
        });
        state.durScore = selectedDur === '5' ? 100 : 40;
        addScore(selectedDur === '5' ? 40 : 15);
        document.getElementById('durFeedback').innerHTML = `<div class="feedback ${selectedDur==='5'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedDur==='5'?'✅':'📚'}</span><span class="feedback-title">${selectedDur==='5'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>Duration:</strong> Minimum 5 days for uncomplicated CAP. Can discontinue when afebrile ≥48h and clinically stable. Longer courses (7-14 days) only for complications (empyema, lung abscess, certain pathogens).</div></div>`;
        document.getElementById('durSubmit').textContent = 'Complete →';
        document.getElementById('durSubmit').onclick = () => goTo('outcome');
    }

    function goTo(id) { state.stage = id; document.getElementById('stageContainer').innerHTML = stages[id].render(); window.scrollTo(0,0); }
    document.addEventListener('DOMContentLoaded', () => goTo('setup'));
    </script>
</body>
</html>
