<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Chest Pain Workup | ReasonDx Adventure</title><style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#EF4444;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#DC2626,#EF4444);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(239,68,68,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(239,68,68,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(239,68,68,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#FCA5A5;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style></head><body><header class="header"><div class="header-row"><div style="font-weight:600">💔 Chest Pain Workup</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header><main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};const C={easy:{age:'52yo M',wt:'88kg',hx:'Substernal chest pressure x2hr, radiating to left arm, with diaphoresis and nausea',exam:'Diaphoretic, anxious, no murmurs, lungs clear',vitals:{HR:'98',BP:'158/92',Temp:'98.6°F',SpO2:'96%'},labs:{Trop:'Pending',ECG:'ST elevation V1-V4',CXR:'No acute process'}},int:{age:'45yo F',wt:'72kg',hx:'Sharp pleuritic chest pain, worse with inspiration, recent viral illness',exam:'Pericardial friction rub, diffuse ST elevation',vitals:{HR:'102',BP:'118/74',Temp:'100.8°F',SpO2:'97%'},labs:{Trop:'Mildly elevated',ECG:'Diffuse ST elevation, PR depression',CXR:'Small pericardial effusion'}},adv:{age:'68yo M',wt:'95kg',hx:'Tearing chest pain radiating to back, HTN, different BP in arms',exam:'Unequal pulses, new aortic regurgitation murmur, widened mediastinum',vitals:{HR:'110',BP:'185/105 R, 142/88 L',Temp:'98.8°F',SpO2:'94%'},labs:{Trop:'Normal',ECG:'LVH, nonspecific changes','D-dimer':'Elevated'}}};
const Q=[{t:'Differential',q:'Life-threatening causes of chest pain to consider first?',h:'Cant miss diagnoses',o:[{id:'a',txt:'ACS, PE, aortic dissection, tension pneumothorax, esophageal rupture, cardiac tamponade',c:1,p:100},{id:'b',txt:'GERD only',c:0,p:20},{id:'c',txt:'Costochondritis',c:0,p:20}],fb:{1:'<b>Correct!</b> Life-threatening 6: ACS (MI/UA), PE, aortic dissection, tension PTX, esophageal rupture (Boerhaave), cardiac tamponade. Rule these out first!',0:'<b>Cant miss:</b> ACS, PE, dissection, tension PTX, Boerhaave, tamponade.'}},{t:'History Features',q:'Which chest pain features suggest cardiac origin?',h:'Classic angina',o:[{id:'a',txt:'Substernal pressure, exertional, radiating to arm/jaw, associated with diaphoresis/nausea, relieved by rest/NTG',c:1,p:100},{id:'b',txt:'Sharp, positional',c:0,p:20},{id:'c',txt:'Reproduced by palpation',c:0,p:30}],fb:{1:'<b>Correct!</b> Cardiac: Substernal, pressure/squeezing, exertional, radiation (arm, jaw, back), associated symptoms (diaphoresis, nausea, dyspnea). Atypical in women, elderly, diabetics.',0:'<b>Cardiac:</b> Substernal pressure, exertional, radiation, diaphoresis.'}},{t:'ECG Interpretation',q:'ECG findings that indicate STEMI?',h:'ST elevation criteria',o:[{id:'a',txt:'ST elevation ≥1mm in 2+ contiguous leads (≥2mm in V2-V3), new LBBB with symptoms',c:1,p:100},{id:'b',txt:'Any ST changes',c:0,p:30},{id:'c',txt:'T wave inversion only',c:0,p:20}],fb:{1:'<b>Correct!</b> STEMI: ST elevation ≥1mm in 2+ contiguous leads (≥2mm in V2-V3 men, ≥1.5mm women). New LBBB with ischemic symptoms = STEMI equivalent. Reciprocal changes support.',0:'<b>STEMI:</b> ST elevation ≥1mm in 2+ contiguous leads.'}},{t:'Troponin Interpretation',q:'How to interpret high-sensitivity troponin results?',h:'Rise and fall pattern',o:[{id:'a',txt:'Elevated troponin + rise/fall pattern suggests MI; stable elevation may be chronic (CKD, HF). Serial testing important.',c:1,p:100},{id:'b',txt:'Any elevation = MI',c:0,p:30},{id:'c',txt:'Normal excludes MI',c:0,p:20}],fb:{1:'<b>Correct!</b> hs-Trop: Look for rise/fall pattern (delta). Chronic elevation in CKD, HF, myocarditis. Type 1 MI: Plaque rupture. Type 2 MI: Supply/demand mismatch. Serial at 0, 3, 6hr.',0:'<b>Troponin:</b> Rise/fall pattern = acute. Stable elevation may be chronic.'}},{t:'Aortic Dissection',q:'Classic presentation and initial test for aortic dissection?',h:'Tearing pain',o:[{id:'a',txt:'Sudden tearing pain radiating to back, BP differential >20mmHg, widened mediastinum on CXR; CTA chest is definitive',c:1,p:100},{id:'b',txt:'Gradual onset',c:0,p:20},{id:'c',txt:'ECG diagnostic',c:0,p:20}],fb:{1:'<b>Correct!</b> Dissection: Sudden, severe, tearing, radiates to back, maximal at onset. Exam: Unequal pulses/BP, new AI murmur. CXR: Wide mediastinum. CTA definitive. Type A = surgery, Type B = medical.',0:'<b>Dissection:</b> Tearing to back, BP differential, CTA for diagnosis.'}},{t:'PE Evaluation',q:'How to risk-stratify suspected PE?',h:'Clinical prediction rules',o:[{id:'a',txt:'Wells score or PERC rule; if low probability + negative D-dimer, PE excluded. Otherwise CTPA.',c:1,p:100},{id:'b',txt:'Always get CTPA',c:0,p:30},{id:'c',txt:'D-dimer alone',c:0,p:20}],fb:{1:'<b>Correct!</b> PE: Wells score (or Geneva). Low risk + PERC negative = no further testing. Low/intermediate + negative D-dimer = excluded. High risk or positive D-dimer = CTPA.',0:'<b>PE:</b> Wells/PERC first, then D-dimer, then CTPA if needed.'}},{t:'Pericarditis',q:'Classic ECG findings in acute pericarditis?',h:'Diffuse changes',o:[{id:'a',txt:'Diffuse ST elevation with PR depression, often with reciprocal PR elevation in aVR',c:1,p:100},{id:'b',txt:'Focal ST elevation',c:0,p:30},{id:'c',txt:'Q waves',c:0,p:20}],fb:{1:'<b>Correct!</b> Pericarditis ECG: Diffuse ST elevation (concave up), PR depression (best in II, III, aVF), PR elevation in aVR. 4 stages. Friction rub pathognomonic.',0:'<b>Pericarditis:</b> Diffuse ST elevation + PR depression.'}},{t:'Risk Stratification',q:'Risk stratification tools for chest pain/ACS?',h:'Decision rules',o:[{id:'a',txt:'HEART score for ED chest pain; TIMI/GRACE for confirmed ACS to guide invasive strategy',c:1,p:100},{id:'b',txt:'Troponin only',c:0,p:30},{id:'c',txt:'No scoring needed',c:0,p:20}],fb:{1:'<b>Correct!</b> HEART score: History, ECG, Age, Risk factors, Troponin (0-10). Low (0-3) = safe discharge. TIMI/GRACE for ACS prognosis and invasive timing.',0:'<b>Risk scores:</b> HEART for ED, TIMI/GRACE for confirmed ACS.'}}];
let sel=null;function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}function start(){S.q=1;S.stage='question';render();}function go(s){S.stage=s;render();}function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>💔 Chest Pain Workup</h1><p style="color:var(--muted);margin-bottom:32px">Differential diagnosis, risk stratification, life-threatening causes</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">💔 Chest Pain</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Chest Pain Pearls</div><div class="pearl-item"><b>Cant miss:</b> ACS, PE, dissection, tension PTX, Boerhaave, tamponade</div><div class="pearl-item"><b>Cardiac:</b> Substernal pressure, exertional, radiation, diaphoresis</div><div class="pearl-item"><b>STEMI:</b> ST elevation ≥1mm in 2+ contiguous leads</div><div class="pearl-item"><b>Dissection:</b> Tearing to back, BP differential, CTA</div><div class="pearl-item"><b>Pericarditis:</b> Diffuse ST elevation + PR depression</div><div class="pearl-item"><b>HEART score:</b> Risk stratify ED chest pain</div></div><div class="cross-link"><a href="acs-adventure-enhanced.html">Related: ACS</a> | <a href="pe-adventure-enhanced.html">PE</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}document.addEventListener('DOMContentLoaded',render);</script></body></html>
