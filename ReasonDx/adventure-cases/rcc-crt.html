<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renal Cell Carcinoma - Clinical Reasoning Case</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #9f1239 0%, #e11d48 100%); min-height: 100vh; padding: 20px; color: #f8fafc; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { background: rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: #fecdd3; }
        .score-display { display: flex; gap: 20px; font-size: 0.9rem; margin-top: 10px; }
        .score-item { background: rgba(255,255,255,0.15); padding: 8px 16px; border-radius: 20px; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; margin-top: 12px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #fecdd3, #fbbf24); border-radius: 3px; transition: width 0.3s; }
        .scene { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        .scene-phase { font-size: 0.85rem; color: #fecdd3; text-transform: uppercase; }
        .scene-title { font-size: 1.5rem; font-weight: 700; color: #fff1f2; margin-top: 4px; }
        .narrative { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px 20px; margin: 16px 0; border-left: 4px solid #e11d48; line-height: 1.7; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #fca5a5; font-weight: 600; }
        .question-box { background: linear-gradient(135deg, rgba(225,29,72,0.2), rgba(251,191,36,0.2)); border: 1px solid rgba(225,29,72,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .question-prompt { font-size: 1.1rem; font-weight: 600; color: #fff1f2; margin-bottom: 16px; }
        .mcq-options { display: flex; flex-direction: column; gap: 10px; }
        .mcq-option { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: flex-start; gap: 12px; }
        .mcq-option:hover:not(.disabled) { background: rgba(255,255,255,0.1); }
        .mcq-option.disabled { cursor: default; opacity: 0.7; }
        .mcq-option.correct { border-color: #22c55e !important; background: rgba(34,197,94,0.2) !important; opacity: 1 !important; }
        .mcq-option.incorrect { border-color: #ef4444 !important; background: rgba(239,68,68,0.2) !important; }
        .option-letter { width: 28px; height: 28px; background: rgba(225,29,72,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
        .feedback { display: none; margin-top: 16px; padding: 16px; border-radius: 10px; }
        .feedback.show { display: block; }
        .correct-feedback { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); }
        .incorrect-feedback { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); }
        .teaching-point { display: none; margin-top: 20px; background: rgba(225,29,72,0.15); border: 1px solid rgba(225,29,72,0.3); border-radius: 12px; padding: 20px; }
        .teaching-point.show { display: block; }
        .mechanism-box { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 16px; margin: 12px 0; }
        .mechanism-title { color: #fecdd3; font-weight: 600; margin-bottom: 10px; }
        .pathway { font-family: 'Monaco', 'Consolas', monospace; font-size: 0.85rem; white-space: pre-wrap; line-height: 1.6; }
        .btn { background: linear-gradient(135deg, #e11d48, #fbbf24); color: white; border: none; padding: 12px 28px; border-radius: 25px; font-weight: 600; cursor: pointer; display: none; margin-top: 16px; }
        .btn.show { display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🫘 Renal Cell Carcinoma</h1>
            <div class="score-display">
                <div class="score-item">Score: <strong id="score">0</strong>/<span id="maxScore">70</span></div>
                <div class="score-item">Stage: <span id="stageNum">1</span>/7</div>
            </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width: 14%"></div></div>
        <div id="scene-container"></div>
    </div>
    <script>
    let currentStage = 0, score = 0;
    const stages = [
        {title:"Incidental Finding",content:'<div class="narrative"><p>A <span class="highlight">58-year-old man</span> had a CT scan for abdominal pain which revealed appendicitis. Incidentally, a <span class="critical">3.5 cm solid, enhancing mass</span> was noted in the upper pole of his left kidney. The appendicitis was treated. He now comes to discuss the kidney mass. He has no urinary symptoms.</p></div>',question:{prompt:"What is the most likely diagnosis for this incidentally discovered renal mass?",options:[{text:"Simple renal cyst",correct:false},{text:"Renal cell carcinoma",correct:true},{text:"Angiomyolipoma",correct:false},{text:"Renal abscess",correct:false}],explanation:{correct:"Correct! A solid, enhancing renal mass in an adult is renal cell carcinoma until proven otherwise. Over 50% of RCCs are now discovered incidentally on imaging performed for other reasons.",incorrect:"Solid + enhancing renal mass = RCC until proven otherwise. Simple cysts don't enhance. AMLs have fat density. Most RCCs are now found incidentally."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 RCC Overview</div><div class="pathway">EPIDEMIOLOGY:\n• Most common primary renal malignancy\n• 3% of adult malignancies\n• M:F = 2:1\n• Peak age: 60-70\n• >50% found INCIDENTALLY!\n\nRISK FACTORS:\n• Smoking (2x risk)\n• Obesity\n• Hypertension\n• Chronic kidney disease/dialysis\n• VHL syndrome\n• Family history\n\nCLASSIC TRIAD (only 10%):\n• Hematuria\n• Flank pain\n• Palpable mass</div></div>',points:10}},
        
        {title:"The Internist's Tumor",content:'<div class="narrative"><p>You review his labs and note <span class="highlight">elevated calcium of 11.8 mg/dL</span> and <span class="highlight">hemoglobin of 18.5 g/dL</span> (elevated). He mentions he\'s had some fatigue recently.</p></div>',question:{prompt:"These lab findings suggest which characteristic of RCC?",options:[{text:"Renal failure from obstruction",correct:false},{text:"Paraneoplastic syndromes",correct:true},{text:"Metastatic disease",correct:false},{text:"Urinary tract infection",correct:false}],explanation:{correct:"Correct! RCC is called 'the internist's tumor' because of its diverse paraneoplastic syndromes (up to 40%!). Hypercalcemia (PTHrP secretion) and erythrocytosis (EPO production) are classic examples.",incorrect:"RCC = 'The Internist's Tumor' due to paraneoplastic syndromes in 40% of patients. Hypercalcemia and erythrocytosis are classic."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Paraneoplastic Syndromes</div><div class="pathway">HYPERCALCEMIA (most common):\n• PTHrP secretion\n• Polyuria, confusion, constipation\n\nERYTHROCYTOSIS:\n• EPO production by tumor\n• Elevated hemoglobin/hematocrit\n\nHYPERTENSION:\n• Renin secretion\n\nSTAUFFER SYNDROME:\n• Hepatic dysfunction WITHOUT mets\n• Elevated alk phos, transaminases\n• Resolves after nephrectomy\n\nOTHER:\n• Fever\n• Anemia (more common than erythrocytosis)\n• Weight loss, cachexia</div></div>',points:10}},

        {title:"Physical Exam Finding",content:'<div class="narrative"><p>On exam, you notice a <span class="critical">new left-sided varicocele</span> in this middle-aged man. He says it developed over the past few months.</p></div>',question:{prompt:"A new LEFT varicocele in an adult male with a left renal mass suggests:",options:[{text:"Benign finding, unrelated to renal mass",correct:false},{text:"Left renal vein involvement by tumor",correct:true},{text:"Right renal vein thrombosis",correct:false},{text:"Testicular cancer",correct:false}],explanation:{correct:"Correct! A new LEFT varicocele in an older male should raise suspicion for RCC with renal vein involvement. The left gonadal vein drains into the left renal vein, so tumor thrombus can obstruct drainage, causing varicocele.",incorrect:"New left varicocele in adult = suspect left renal vein obstruction (RCC thrombus). The left gonadal vein drains into the left renal vein."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Venous Anatomy & RCC</div><div class="pathway">LEFT GONADAL VEIN:\n→ Drains into LEFT RENAL VEIN\n→ If blocked by tumor thrombus\n→ NEW LEFT VARICOCELE\n\nRIGHT GONADAL VEIN:\n→ Drains directly into IVC\n→ New RIGHT varicocele = IVC issue\n\nRCC + VENOUS EXTENSION:\n• 4-10% have renal vein involvement\n• Can extend into IVC\n• Can extend to right atrium\n\nSTAGING IMPLICATIONS:\n• T3a: Renal vein or segmental IVC\n• T3b: IVC below diaphragm\n• T3c: IVC above diaphragm</div></div>',points:10}},

        {title:"Imaging Workup",content:'<div class="narrative"><p>You order dedicated CT imaging. Results show a <span class="highlight">3.5 cm enhancing mass</span> in the left kidney with <span class="critical">tumor thrombus extending into the left renal vein</span>. No lymphadenopathy. No distant metastases.</p></div>',question:{prompt:"What is the clinical stage of this tumor?",options:[{text:"T1a - confined to kidney",correct:false},{text:"T2 - large tumor confined to kidney",correct:false},{text:"T3a - renal vein invasion",correct:true},{text:"T4 - invades beyond Gerota's fascia",correct:false}],explanation:{correct:"Correct! T3a indicates tumor extends into the renal vein or its segmental branches, or invades perirenal fat. The renal vein thrombus upstages this relatively small tumor to T3a.",incorrect:"Renal vein involvement = T3a, regardless of tumor size. T3b = IVC below diaphragm. T3c = IVC above diaphragm or wall invasion."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 TNM Staging</div><div class="pathway">T STAGING:\nT1a: ≤4 cm, confined to kidney\nT1b: >4-7 cm, confined to kidney\nT2a: >7-10 cm, confined to kidney\nT2b: >10 cm, confined to kidney\nT3a: Renal vein, segmental branches,\n     or perirenal fat\nT3b: IVC below diaphragm\nT3c: IVC above diaphragm or wall\nT4: Beyond Gerota\'s fascia, adrenal\n\nPROGNOSTIC IMPACT:\n• Localized: 93% 5-year survival\n• Regional: 70% 5-year survival\n• Distant: 12% 5-year survival</div></div>',points:10}},

        {title:"Surgical Planning",content:'<div class="narrative"><p>With a T3a tumor (renal vein thrombus), you discuss surgical options. The contralateral kidney is normal.</p></div>',question:{prompt:"What is the recommended surgical approach?",options:[{text:"Partial nephrectomy to spare kidney tissue",correct:false},{text:"Radical nephrectomy with thrombectomy",correct:true},{text:"Observation and repeat imaging",correct:false},{text:"Systemic therapy first, then consider surgery",correct:false}],explanation:{correct:"Correct! Radical nephrectomy with tumor thrombectomy is indicated. The renal vein thrombus must be removed. Despite the T3a stage, surgery is still potentially curative if there are no distant metastases.",incorrect:"Radical nephrectomy + thrombectomy is needed. Venous involvement doesn't preclude cure if completely resected."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Surgical Treatment</div><div class="pathway">LOCALIZED RCC:\n\nT1a (≤4 cm):\n• Partial nephrectomy PREFERRED\n• Equivalent oncologic outcomes\n• Preserves renal function\n\nT1b-T2:\n• Partial if technically feasible\n• Radical nephrectomy otherwise\n\nT3 (venous thrombus):\n• Radical nephrectomy\n• Thrombectomy\n• May need cardiopulmonary bypass\n  if extends to heart\n\nKEY POINT:\nEven with IVC thrombus, surgery\ncan be curative if no distant mets!</div></div>',points:10}},

        {title:"Histology",content:'<div class="narrative"><p>After radical nephrectomy, pathology returns: <span class="highlight">Clear cell renal cell carcinoma</span>, Fuhrman grade 3, negative margins.</p></div>',question:{prompt:"Clear cell RCC is characterized by which genetic alteration?",options:[{text:"BRCA mutation",correct:false},{text:"VHL gene inactivation",correct:true},{text:"KRAS mutation",correct:false},{text:"p53 mutation",correct:false}],explanation:{correct:"Correct! Clear cell RCC (70-80% of RCC) is characterized by VHL gene inactivation on chromosome 3p. This leads to HIF accumulation and overexpression of VEGF, which is why these tumors are so vascular and respond to anti-angiogenic therapy.",incorrect:"Clear cell RCC = VHL gene inactivation → HIF accumulation → VEGF overexpression → highly vascular tumor. This is why TKIs work."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 RCC Subtypes</div><div class="pathway">CLEAR CELL (70-80%):\n• VHL gene (3p) inactivation\n• HIF → VEGF pathway\n• Highly vascular\n• Responds to TKIs/immunotherapy\n\nPAPILLARY (10-15%):\n• Type 1: MET mutations, better prognosis\n• Type 2: More aggressive\n• Less vascular\n\nCHROMOPHOBE (5%):\n• Best prognosis\n• Birt-Hogg-Dubé association\n\nCOLLECTING DUCT (<1%):\n• Very aggressive\n• Poor prognosis</div></div>',points:10}},

        {title:"Metastatic Disease",content:'<div class="narrative"><p>A different patient presents with known metastatic RCC - lung metastases discovered at diagnosis.</p></div>',question:{prompt:"What is the CURRENT first-line treatment for metastatic clear cell RCC?",options:[{text:"Conventional chemotherapy (cisplatin)",correct:false},{text:"Radiation therapy",correct:false},{text:"Immunotherapy + TKI combination",correct:true},{text:"High-dose IL-2 alone",correct:false}],explanation:{correct:"Correct! Current first-line for metastatic clear cell RCC is combination immunotherapy (checkpoint inhibitors) + TKI, or dual checkpoint inhibitors. RCC is resistant to conventional chemotherapy and radiation.",incorrect:"Metastatic RCC: Immunotherapy (checkpoint inhibitors) + TKI combinations are now standard. RCC is chemo-resistant."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Systemic Therapy for mRCC</div><div class="pathway">FIRST-LINE OPTIONS:\n• IO/TKI combinations:\n  - Pembrolizumab + axitinib\n  - Nivolumab + cabozantinib\n• IO/IO combination:\n  - Ipilimumab + nivolumab\n\nDRUG CLASSES:\nIMMUNOTHERAPY:\n• Nivolumab, pembrolizumab (PD-1)\n• Ipilimumab (CTLA-4)\n\nTKIs (VEGF pathway):\n• Sunitinib, pazopanib\n• Cabozantinib, axitinib\n\nmTOR INHIBITORS:\n• Temsirolimus, everolimus\n\nCHEMO: NOT effective!\nRADIATION: Palliative only</div></div>',points:10}}
    ];
    
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('stageNum').textContent=currentStage+1;document.getElementById('maxScore').textContent=stages.length*10;}
    
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><strong>✓ Correct!</strong> '+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><strong>✗ Not quite.</strong> '+stage.question.explanation.incorrect+'</div><div class="teaching-point" id="teaching">'+stage.question.teaching+'</div><button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=10;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}document.getElementById('teaching').classList.add('show');document.getElementById('next-btn').classList.add('show');}
    
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene" style="text-align:center;padding:40px;"><h2 style="color:#fecdd3;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong>/70</p><div style="margin-top:20px;padding:15px;background:rgba(59,130,246,0.15);border-radius:10px;border:1px solid rgba(59,130,246,0.3);"><p style="color:#93c5fd;margin-bottom:10px;font-weight:600;">📚 Learn More:</p><div style="display:flex;flex-wrap:wrap;gap:8px;"><a href="rcc-module.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📘 MechanismDx</a><a href="rcc-deepdive.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📊 Deep Dive</a></div><div style="margin-top:10px;"><a href="https://www.ncbi.nlm.nih.gov/books/NBK470336/" target="_blank" style="color:#93c5fd;font-size:0.8rem;">📖 StatPearls Reference</a></div></div><p>You mastered Renal Cell Carcinoma!</p></div>';}}
    
    renderStage();
    </script>

    <!-- DxSuite AI Tutor Integration -->
    <div data-dx-tutor
         data-module-title="Renal Cell Carcinoma"
         data-key-points="🎉 Case Complete!, clinical reasoning, differential diagnosis, diagnostic workup, illness scripts"
         data-objectives="Develop systematic clinical reasoning, refine differential diagnosis skills"
         style="display:none;"></div>
    <script src="dx-ai-tutor.js"></script>
</body>
</html>
