<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Coagulation Cascade | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#F43F5E;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#BE123C,#F43F5E);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(244,63,94,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(244,63,94,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(244,63,94,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🩸 The Coagulation Cascade</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'58M',wt:'82kg',hx:'Sepsis from pneumonia, now oozing from IV sites',exam:'Petechiae, ecchymoses, oozing wounds',vitals:{HR:'112',BP:'88/52'},labs:{Plt:'42k',PT:'22',Fib:'85',DDimer:'High'}},int:{age:'32F',wt:'58kg',hx:'Postpartum hemorrhage, placental abruption',exam:'Massive bleeding, hypotensive',vitals:{HR:'128',BP:'72/48'},labs:{Plt:'38k',PT:'28',Fib:'45',DDimer:'>20'}},adv:{age:'65M',wt:'78kg',hx:'Metastatic pancreatic cancer, new DVT and bleeding',exam:'Leg swelling, GI bleeding',vitals:{HR:'98',BP:'108/68'},labs:{Plt:'58k',PT:'18',DDimer:'High',Fib:'180'}}};
const Q=[
{t:'DIC Pathophysiology',q:'DIC is characterized by?',h:'Simultaneous processes',o:[{id:'a',txt:'Systemic activation of coagulation causing both thrombosis AND bleeding',c:1,p:100},{id:'b',txt:'Isolated bleeding disorder',c:0,p:20},{id:'c',txt:'Isolated thrombosis',c:0,p:20}],fb:{1:'<b>Correct!</b> DIC = consumption coagulopathy. Widespread clotting depletes factors/platelets, causing bleeding. Both thrombosis and hemorrhage occur.',0:'<b>DIC:</b> Coagulation activation → consumption → bleeding AND thrombosis.'}},
{t:'Lab Findings',q:'Classic DIC lab pattern?',h:'Consumption of factors',o:[{id:'a',txt:'Low platelets, prolonged PT/PTT, low fibrinogen, elevated D-dimer, schistocytes',c:1,p:100},{id:'b',txt:'Elevated fibrinogen',c:0,p:10},{id:'c',txt:'Normal platelets',c:0,p:10}],fb:{1:'<b>Correct!</b> DIC: Low plt, prolonged PT/PTT, LOW fibrinogen (consumed), HIGH D-dimer (fibrinolysis), schistocytes (MAHA).',0:'<b>DIC labs:</b> Everything consumed - low plt, low fib, prolonged times, high D-dimer.'}},
{t:'Causes',q:'Common causes of DIC?',h:'Underlying trigger',o:[{id:'a',txt:'Sepsis, trauma, malignancy, obstetric complications (abruption, amniotic embolism)',c:1,p:100},{id:'b',txt:'Vitamin K deficiency',c:0,p:20},{id:'c',txt:'Heparin alone',c:0,p:10}],fb:{1:'<b>Correct!</b> DIC triggers: Sepsis (#1), trauma, burns, malignancy (esp pancreatic, APL), obstetric (abruption, HELLP, AFE), transfusion reaction.',0:'<b>Causes:</b> Sepsis most common. Also trauma, cancer, obstetric.'}},
{t:'Treatment Priority',q:'Most important treatment in DIC?',h:'Address the cause',o:[{id:'a',txt:'Treat underlying cause (sepsis, deliver baby, treat cancer)',c:1,p:100},{id:'b',txt:'Heparin for everyone',c:0,p:20},{id:'c',txt:'Transfuse products only',c:0,p:30}],fb:{1:'<b>Correct!</b> DIC wont resolve without treating trigger. Antibiotics for sepsis, delivery for obstetric, chemo for APL. Supportive transfusions as needed.',0:'<b>Treat the cause!</b> DIC is secondary - fix the underlying problem.'}},
{t:'Transfusion Targets',q:'When to transfuse blood products in DIC?',h:'Supportive care',o:[{id:'a',txt:'Platelets if less than 50k and bleeding (less than 20k prophylactic); FFP/cryo if bleeding; fibrinogen less than 100',c:1,p:100},{id:'b',txt:'Transfuse all patients regardless',c:0,p:20},{id:'c',txt:'Never transfuse',c:0,p:0}],fb:{1:'<b>Correct!</b> Transfuse for bleeding or high-risk procedures. Plt less than 50k if bleeding, FFP for coagulopathy, cryo if fib less than 100.',0:'<b>Transfusion:</b> Based on bleeding/procedure risk. Plt, FFP, cryo as needed.'}},
{t:'Fibrinogen Target',q:'Target fibrinogen level in DIC with bleeding?',h:'Critical factor',o:[{id:'a',txt:'Greater than 100-150 mg/dL (give cryoprecipitate)',c:1,p:100},{id:'b',txt:'Greater than 50 mg/dL',c:0,p:30},{id:'c',txt:'Not important',c:0,p:0}],fb:{1:'<b>Correct!</b> Fibrinogen less than 100 = high bleeding risk. Cryoprecipitate (10 units raises ~50-70). Each unit has ~250mg fibrinogen.',0:'<b>Fibrinogen:</b> Target greater than 100-150. Cryo is treatment of choice.'}},
{t:'Heparin in DIC',q:'When might anticoagulation be considered in DIC?',h:'Controversial area',o:[{id:'a',txt:'Thrombosis-predominant DIC (chronic DIC, Trousseau syndrome) without major bleeding',c:1,p:100},{id:'b',txt:'All DIC',c:0,p:10},{id:'c',txt:'Acute DIC with active bleeding',c:0,p:0}],fb:{1:'<b>Correct!</b> Heparin considered in chronic/thrombotic DIC (malignancy). Contraindicated in acute DIC with bleeding. Very selective use.',0:'<b>Heparin:</b> Only thrombosis-predominant without bleeding. Not routine.'}},
{t:'ISTH Score',q:'ISTH DIC scoring system includes?',h:'Diagnostic criteria',o:[{id:'a',txt:'Platelet count, PT prolongation, fibrinogen level, D-dimer - score greater than 5 = overt DIC',c:1,p:100},{id:'b',txt:'Only D-dimer',c:0,p:20},{id:'c',txt:'Clinical criteria only',c:0,p:20}],fb:{1:'<b>Correct!</b> ISTH score: Plt (0-2), PT (0-2), Fib (0-1), D-dimer (0-3). Score greater than 5 = overt DIC. Serial monitoring useful.',0:'<b>ISTH score:</b> Labs-based. Greater than 5 = overt DIC. Track serially.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🩸 The Coagulation Cascade</h1><p style="color:var(--muted);margin-bottom:32px">DIC: Pathophysiology, labs, causes, treatment, transfusion targets</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🏥 Coagulopathy Emergency</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">DIC Pearls</div><div class="pearl-item"><b>Pathophys:</b> Thrombosis AND bleeding (consumption)</div><div class="pearl-item"><b>Labs:</b> Low plt, low fib, high D-dimer, prolonged PT/PTT</div><div class="pearl-item"><b>Priority:</b> Treat underlying cause</div><div class="pearl-item"><b>Fibrinogen:</b> Target greater than 100, use cryo</div><div class="pearl-item"><b>ISTH:</b> Score greater than 5 = overt DIC</div></div><div class="cross-link"><a href="../mechanism/hematology.html">MechanismDx: Hematology</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
