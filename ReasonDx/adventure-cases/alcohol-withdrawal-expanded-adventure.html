<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alcohol Withdrawal | Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #4a1d6e 0%, #7c3aed 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(74, 29, 110, 0.9); border-radius: 16px; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; background: #7c3aed; margin-left: 10px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #7c3aed, #c4b5fd); border-radius: 3px; }
        .scene { background: linear-gradient(135deg, #4a1d6e, #6d28d9); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .scene-header { background: rgba(124, 58, 237, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #c4b5fd; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(124,58,237,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #7c3aed, #6d28d9); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #c4b5fd; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','timeline','ciwa','benzos','refractory','phenobarbital','dts','wernicke','disposition','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">🍺 Alcohol Withdrawal<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Tremulous and Anxious</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What comorbidities would change your management approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Always consider mimics and look-alikes in your differential</p>
                </div><div class="narrative"><p>A <span class="highlight">52-year-old man</span> admitted for pneumonia becomes increasingly <span class="critical">tremulous, anxious, and diaphoretic</span> 36 hours after admission. Reports drinking "a pint of vodka daily" but hasn't had alcohol since admission.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 118, BP 168/102, T 100.4°F, RR 22<br><strong>Exam:</strong> Tremor, diaphoresis, hyperreflexia, mild confusion<br><strong>Labs:</strong> Glucose 142, Mg 1.4, K 3.2</p></div><div class="alert-box"><div class="alert-title">🚨 Alcohol Withdrawal Can Be Fatal!</div><p>Untreated severe AWS has 15-40% mortality. Early recognition and treatment prevents progression to DTs and seizures.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Pathophysiology</div><div class="pathway"><strong>Chronic alcohol use:</strong><br>↑ GABA activity (inhibitory)<br>↓ Glutamate/NMDA activity (excitatory)<br><br><strong>Withdrawal:</strong><br>↓↓ GABA (tolerance developed)<br>↑↑ Glutamate (receptor upregulation)<br>= CNS hyperexcitability<br>= Autonomic instability</div></div><button class="btn" onclick="nextStage()">Timeline →</button></div></div>`;
    };

    window.render_timeline = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">Withdrawal Timeline</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate acuity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would renal or hepatic impairment affect drug dosing?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 AWS Timeline - BOARDS FAVORITE</div><table class="comparison-table"><tr><th>Time</th><th>Manifestation</th></tr><tr><td><strong>6-12 hours</strong></td><td>Minor: Tremor, anxiety, headache, diaphoresis, palpitations, GI upset</td></tr><tr><td><strong>12-24 hours</strong></td><td>Alcoholic hallucinosis: Visual, auditory, tactile hallucinations (sensorium intact!)</td></tr><tr><td><strong>24-48 hours</strong></td><td>Withdrawal seizures: Generalized tonic-clonic, brief, often clustered</td></tr><tr><td><strong>48-96 hours</strong></td><td>Delirium tremens: Confusion, agitation, hallucinations, autonomic storm</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Key Distinction</div><div class="pathway"><strong>Alcoholic hallucinosis:</strong><br>• Hallucinations with CLEAR sensorium<br>• Patient knows hallucinations aren't real<br>• Oriented, can converse normally<br><br><strong>Delirium tremens:</strong><br>• Hallucinations with ALTERED sensorium<br>• Global confusion, disorientation<br>• Cannot distinguish real from unreal</div></div><button class="btn" onclick="nextStage()">CIWA Protocol →</button></div></div>`;
    };

    window.render_ciwa = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">CIWA-Ar Assessment</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the most likely diagnosis given this presentation?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if the patient doesn't respond to initial treatment?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Reassess if the patient isn't improving as expected</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 CIWA-Ar Scale (0-67 points)</div><table class="comparison-table"><tr><th>Parameter</th><th>Max Score</th></tr><tr><td>Nausea/vomiting</td><td>7</td></tr><tr><td>Tremor</td><td>7</td></tr><tr><td>Paroxysmal sweats</td><td>7</td></tr><tr><td>Anxiety</td><td>7</td></tr><tr><td>Agitation</td><td>7</td></tr><tr><td>Tactile disturbances</td><td>7</td></tr><tr><td>Auditory disturbances</td><td>7</td></tr><tr><td>Visual disturbances</td><td>7</td></tr><tr><td>Headache</td><td>7</td></tr><tr><td>Orientation/clouding</td><td>4</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 CIWA-Based Treatment</div><div class="pathway"><strong>Score <10:</strong> Mild - may not need meds<br><strong>Score 10-15:</strong> Moderate - treat<br><strong>Score 16-20:</strong> Severe - treat aggressively<br><strong>Score >20:</strong> Very severe - ICU consideration<br><br><strong>Reassess q1h</strong> until stable<br>Then q4h if improving</div></div><div class="alert-box"><div class="alert-title">⚠️ CIWA Limitations</div><p>Requires cooperative, communicative patient. Cannot use in intubated, delirious, or severely impaired patients. Consider fixed-dose protocol instead.</p></div><button class="btn" onclick="nextStage()">Benzodiazepines →</button></div></div>`;
    };

    window.render_benzos = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">First-Line: Benzodiazepines</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What key history element is most helpful here?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What's the evidence level for the standard treatment?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Benzodiazepine Options</div><table class="comparison-table"><tr><th>Drug</th><th>Dose</th><th>Features</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Diazepam</strong></td><td>5-20 mg IV q5-10min</td><td>Long-acting; auto-tapering; preferred</td></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Chlordiazepoxide</strong></td><td>25-100 mg PO q6h</td><td>Long-acting; oral; for mild-moderate</td></tr><tr><td><strong>Lorazepam</strong></td><td>2-4 mg IV q15-20min</td><td>No active metabolites; liver disease, elderly</td></tr><tr><td><strong>Midazolam</strong></td><td>2-5 mg IV</td><td>Short-acting; ICU continuous infusion</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Long-Acting Preferred?</div><div class="pathway"><strong>Diazepam/chlordiazepoxide:</strong><br>• Active metabolites provide smooth taper<br>• Less breakthrough symptoms<br>• Less frequent dosing needed<br>• "Auto-tapering" effect<br><br><strong>Lorazepam preferred when:</strong><br>• Liver failure (no hepatic metabolism)<br>• Elderly (less accumulation)<br>• Respiratory compromise</div></div><button class="btn" onclick="nextStage()">Refractory AWS →</button></div></div>`;
    };

    window.render_refractory = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">Benzo-Resistant Withdrawal</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Which physical exam finding is most specific?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> When would you involve subspecialty consultation?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fefce8; border:1px solid #eab308; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #eab308;">
                    <p style="margin:0; color:#854d0e; font-size:0.9rem;"><strong>🚫 Common Mistake:</strong> Avoid anchoring bias - keep your differential broad initially</p>
                </div><div class="alert-box"><div class="alert-title">🚨 Escalating Benzo Requirements = Danger!</div><p>If requiring >40 mg diazepam equivalent/hour or >200 mg in first 3-4 hours, patient has severe/refractory AWS. Add phenobarbital.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Benzo Equivalents</div><table class="comparison-table"><tr><th>Drug</th><th>Equivalent Dose</th></tr><tr><td>Diazepam</td><td>10 mg</td></tr><tr><td>Lorazepam</td><td>2 mg</td></tr><tr><td>Chlordiazepoxide</td><td>25 mg</td></tr><tr><td>Midazolam</td><td>2-3 mg</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Benzos Fail</div><div class="pathway"><strong>GABA receptor changes:</strong><br>Chronic alcohol causes receptor downregulation<br>AND subunit changes<br><br>Benzos work on GABA-A but only at<br>certain subunits (α1, α2, α3, α5)<br><br>Barbiturates work at DIFFERENT site<br>AND can open channel directly<br>(even without GABA)</div></div><button class="btn" onclick="nextStage()">Phenobarbital →</button></div></div>`;
    };

    window.render_phenobarbital = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">Phenobarbital Protocol</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Consider the most common causes first, then rarer ones</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What are the key complications to monitor for?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Phenobarbital Dosing</div><table class="comparison-table"><tr><th>Approach</th><th>Dose</th></tr><tr><td><strong>Adjunct to benzos</strong></td><td>130-260 mg IV q15-30min PRN</td></tr><tr><td><strong>Primary agent</strong></td><td>10 mg/kg IV load, then 130 mg IV q30min PRN</td></tr><tr><td><strong>Maximum</strong></td><td>~20 mg/kg total (monitor for respiratory depression)</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Phenobarbital Advantages</div><div class="pathway"><strong>Works differently than benzos:</strong><br>• Binds different GABA-A site<br>• Can directly open Cl- channel<br>• Long half-life (auto-taper)<br>• Anticonvulsant properties<br><br><strong>Caution:</strong><br>• Respiratory depression (especially + benzos)<br>• Long duration (if oversedated, lasts days)<br>• Monitor for apnea</div></div><div class="alert-box"><div class="alert-title">⚠️ Other Adjuncts</div><p><strong>Propofol:</strong> ICU, intubated patients only<br><strong>Dexmedetomidine:</strong> α2-agonist, reduces benzo requirements, doesn't prevent seizures<br><strong>Ketamine:</strong> NMDA antagonist, emerging role</p></div><button class="btn" onclick="nextStage()">Delirium Tremens →</button></div></div>`;
    };

    window.render_dts = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 10</div><div class="scene-title">Delirium Tremens</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What comorbidities would change your management approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#f5f3ff; border:1px solid #8b5cf6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #8b5cf6;">
                    <p style="margin:0; color:#5b21b6; font-size:0.9rem;"><strong>📋 Board Tip:</strong> Document your clinical reasoning clearly</p>
                </div><div class="alert-box"><div class="alert-title">🚨 DTs = ICU Admission!</div><p>Mortality 5-15% even with treatment. Characterized by: confusion, hallucinations, severe autonomic instability, hyperthermia.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 DTs Risk Factors</div><table class="comparison-table"><tr><th>Risk Factor</th></tr><tr><td>Prior DTs or withdrawal seizures</td></tr><tr><td>Prolonged/heavy alcohol use</td></tr><tr><td>Concurrent acute illness</td></tr><tr><td>Older age</td></tr><tr><td>Abnormal liver function</td></tr><tr><td>Elevated BAL at presentation</td></tr><tr><td>Days since last drink >2</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 DTs Management</div><div class="pathway"><strong>Environment:</strong><br>• ICU, quiet, well-lit room<br>• Constant observation<br>• Restraints if needed for safety<br><br><strong>Medications:</strong><br>• Aggressive IV benzos<br>• Add phenobarbital if refractory<br>• Propofol if intubated<br><br><strong>Supportive:</strong><br>• Fluid resuscitation<br>• Electrolyte repletion (Mg, K, phos)<br>• Cooling if hyperthermic<br>• Thiamine BEFORE glucose!</div></div><button class="btn" onclick="nextStage()">Wernicke's →</button></div></div>`;
    };

    window.render_wernicke = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 10</div><div class="scene-title">Wernicke Encephalopathy</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate acuity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would renal or hepatic impairment affect drug dosing?</p>
                </div><div class="alert-box"><div class="alert-title">🚨 Give Thiamine BEFORE Glucose!</div><p>Glucose metabolism depletes thiamine. Giving glucose first can precipitate or worsen Wernicke's in thiamine-deficient patients.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Classic Triad (only 10-30% have all 3!)</div><table class="comparison-table"><tr><th>Finding</th><th>Description</th></tr><tr><td><strong>Encephalopathy</strong></td><td>Confusion, apathy, inattention (most common)</td></tr><tr><td><strong>Oculomotor dysfunction</strong></td><td>Nystagmus, lateral rectus palsy, gaze palsies</td></tr><tr><td><strong>Ataxia</strong></td><td>Wide-based gait, truncal ataxia</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Thiamine Dosing</div><div class="pathway"><strong>Prophylaxis (all AWS patients):</strong><br>Thiamine 100-250 mg IV daily × 3-5 days<br><br><strong>Treatment (suspected Wernicke's):</strong><br>Thiamine 500 mg IV TID × 2-3 days<br>Then 250 mg IV daily × 3-5 days<br><br><strong>IM absorption unreliable in alcoholics</strong><br>Always give IV in acute setting<br><br>If untreated → Korsakoff syndrome<br>(irreversible memory impairment)</div></div><button class="btn" onclick="nextStage()">Disposition →</button></div></div>`;
    };

    window.render_disposition = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 10</div><div class="scene-title">Other Considerations</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">

(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +

            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +

            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
