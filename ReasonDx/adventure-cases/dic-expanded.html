    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"The Bleeding Septic Patient",content:`<div class="narrative"><p>A <span class="highlight">58-year-old man</span> with urosepsis is in the ICU. He develops <span class="critical">oozing from IV sites</span>, petechiae, and gross hematuria.</p><p style="margin-top:12px;"><strong>Labs:</strong> Plt <span class="critical">35K</span>, PT 22s, PTT 55s, Fibrinogen <span class="critical">85</span>, D-dimer <span class="critical">>20</span></p></div>`,question:{prompt:"What is DIC?",options:[{text:"A primary clotting disorder",correct:false},{text:"Systemic coagulation activation triggered by an underlying condition",correct:true},{text:"A bleeding disorder from platelet dysfunction",correct:false},{text:"Isolated fibrinogen consumption",correct:false}],explanation:{correct:"Correct! DIC is always SECONDARY to an underlying trigger. Systemic coagulation leads to microthrombi, consuming platelets and factors, causing BOTH thrombosis AND bleeding.",incorrect:"DIC is always secondary - there's always a trigger (sepsis, trauma, malignancy). It's not a primary disorder."},teaching:`<div class="mechanism-box"><div class="mechanism-title">🧬 DIC Pathophysiology</div><div class="pathway">Underlying trigger → Tissue factor release
→ Systemic thrombin generation
→ Widespread microthrombi
→ Consumption of platelets + factors
→ PARADOX: Thrombosis AND Bleeding!</div></div>`,why_chain:[{q:"Why both thrombosis and bleeding?",a:"Microthrombi cause organ ischemia. But consuming all platelets/factors leaves nothing for normal hemostasis → bleeding."}],points:10}},
        {title:"Common Triggers",content:`<div class="narrative"><p>DIC requires an underlying trigger. Identifying it is critical.</p></div>`,question:{prompt:"What is the MOST common cause of DIC?",options:[{text:"Trauma/burns",correct:false},{text:"Sepsis",correct:true},{text:"Malignancy",correct:false},{text:"Obstetric complications",correct:false}],explanation:{correct:"Correct! Sepsis accounts for 30-50% of DIC. Endotoxin triggers massive tissue factor release.",incorrect:"Sepsis is #1 (30-50%). Bacteria/endotoxin triggers tissue factor from monocytes and endothelium."},teaching:`<h4>DIC Triggers</h4><table class="comparison-table"><tr><th>Category</th><th>Examples</th></tr><tr style="background:rgba(251,191,36,0.2);"><td>Sepsis</td><td>Gram-negative, meningococcemia</td></tr><tr><td>Trauma</td><td>Major trauma, burns, head injury</td></tr><tr><td>Malignancy</td><td>APL (classic!), adenocarcinomas</td></tr><tr><td>Obstetric</td><td>Abruption, amniotic embolism, HELLP</td></tr></table>`,why_chain:[{q:"Why is APL classic?",a:"APL releases procoagulants from malignant promyelocytes. DIC in 80%+ at diagnosis. ATRA dramatically reduces DIC."}],points:10}},
        {title:"The Classic Lab Pattern",content:`<div class="narrative"><p>Understanding the lab pattern distinguishes DIC from other coagulopathies.</p></div>`,question:{prompt:"Which lab pattern is CLASSIC for DIC?",options:[{text:"Low plt, normal PT/PTT, normal fibrinogen",correct:false},{text:"Low plt, prolonged PT/PTT, LOW fibrinogen, HIGH D-dimer",correct:true},{text:"Normal plt, prolonged PT, normal PTT",correct:false},{text:"Low plt, prolonged PTT only",correct:false}],explanation:{correct:"Correct! DIC = low plt + prolonged PT AND PTT + low fibrinogen + very high D-dimer. Everything consumed, D-dimer skyrockets from fibrinolysis.",incorrect:"Classic DIC: thrombocytopenia + prolonged PT/PTT + low fibrinogen + elevated D-dimer."},teaching:`<h4>DIC Lab Pattern</h4><table class="comparison-table"><tr><th>Test</th><th>Finding</th></tr><tr><td>Platelets</td><td>↓↓ Low</td></tr><tr><td>PT/PTT</td><td>↑ Prolonged</td></tr><tr style="background:rgba(251,191,36,0.2);"><td>Fibrinogen</td><td>↓↓ Low (<100)</td></tr><tr style="background:rgba(251,191,36,0.2);"><td>D-dimer</td><td>↑↑↑ Very high</td></tr></table><div class="alert-box"><div class="alert-title">⚠️</div><p>Fibrinogen is an acute phase reactant - may be "normal" even when depleted. Check the TREND!</p></div>`,why_chain:[],points:10}},
        {title:"ISTH DIC Score",content:`<div class="narrative"><p>The ISTH score helps diagnose overt DIC.</p></div>`,question:{prompt:"What ISTH score indicates overt DIC?",options:[{text:"≥3",correct:false},{text:"≥5",correct:true},{text:"≥7",correct:false},{text:"Any positive",correct:false}],explanation:{correct:"Correct! Score ≥5 = overt DIC. Requires a known underlying disorder that can cause DIC.",incorrect:"Score ≥5 = overt DIC. <5 is suggestive - repeat daily."},teaching:`<h4>ISTH Score</h4><table class="comparison-table"><tr><th>Parameter</th><th>Points</th></tr><tr><td>Plt >100K/50-100K/<50K</td><td>0/1/2</td></tr><tr><td>D-dimer none/mod/strong</td><td>0/2/3</td></tr><tr><td>PT prolong <3s/3-6s/>6s</td><td>0/1/2</td></tr><tr><td>Fibrinogen >100/<100</td><td>0/1</td></tr></table><p><strong>≥5 = Overt DIC</strong></p>`,why_chain:[],points:10}},
        {title:"Peripheral Smear",content:`<div class="narrative"><p>You order a smear to support diagnosis.</p></div>`,question:{prompt:"What is the characteristic smear finding in DIC?",options:[{text:"Spherocytes",correct:false},{text:"Schistocytes (fragmented RBCs)",correct:true},{text:"Target cells",correct:false},{text:"Rouleaux",correct:false}],explanation:{correct:"Correct! Schistocytes = RBC fragments from shearing by fibrin strands. This is MAHA (microangiopathic hemolytic anemia).",incorrect:"Schistocytes from mechanical shearing = MAHA, a hallmark of DIC."},teaching:`<h4>DIC vs TTP vs HUS</h4><table class="comparison-table"><tr><th>Condition</th><th>PT/PTT</th><th>Fibrinogen</th></tr><tr style="background:rgba(251,191,36,0.2);"><td>DIC</td><td>Prolonged</td><td>Low</td></tr><tr><td>TTP</td><td>Normal</td><td>Normal</td></tr><tr><td>HUS</td><td>Normal</td><td>Normal</td></tr></table>`,why_chain:[],points:10}},
        {title:"Treatment Priority",content:`<div class="alert-box"><div class="alert-title">🚨 #1: Treat the Underlying Cause!</div><p>DIC won't resolve until the trigger is addressed.</p></div>`,question:{prompt:"Most important DIC treatment?",options:[{text:"FFP",correct:false},{text:"Platelet transfusion",correct:false},{text:"Treatment of underlying cause",correct:true},{text:"Heparin",correct:false}],explanation:{correct:"Correct! Treat the cause first! Antibiotics for sepsis, delivery for obstetric, ATRA for APL. Transfusions are supportive, not curative.",incorrect:"Treat the cause! Blood products support but won't fix DIC until trigger addressed."},teaching:`<div class="mechanism-box"><div class="mechanism-title">Treatment Priorities</div><div class="pathway">1. TREAT UNDERLYING CAUSE
2. Supportive transfusion for bleeding:
   • Plt if <20K or <50K + bleeding
   • Cryo if fibrinogen <100-150
   • FFP if bleeding + prolonged PT/PTT
3. Heparin only if thrombosis predominates</div></div>`,why_chain:[],points:10}},
        {title:"Blood Products",content:`<div class="narrative"><p>Your patient needs transfusion support.</p></div>`,question:{prompt:"Target fibrinogen in bleeding DIC?",options:[{text:">50 mg/dL",correct:false},{text:">100-150 mg/dL",correct:true},{text:">200 mg/dL",correct:false},{text:">300 mg/dL",correct:false}],explanation:{correct:"Correct! Target fibrinogen >100-150 with cryoprecipitate. Each unit raises fibrinogen ~5-10 mg/dL.",incorrect:"Target >100-150 mg/dL with cryo."},teaching:`<h4>Transfusion Goals</h4><table class="comparison-table"><tr><th>Product</th><th>Goal</th></tr><tr><td>Platelets</td><td>>50K if bleeding</td></tr><tr style="background:rgba(251,191,36,0.2);"><td>Cryoprecipitate</td><td>Fibrinogen >100-150</td></tr><tr><td>FFP</td><td>Control bleeding</td></tr></table>`,why_chain:[],points:10}},
        {title:"Case Resolution",content:`<div class="narrative"><p>With antibiotics, source control, and transfusions, DIC resolves over 48-72 hours.</p></div><div class="mechanism-box"><div class="mechanism-title">📚 Summary</div><div class="pathway">DIC: Secondary systemic coagulation

Causes: Sepsis #1, trauma, malignancy, obstetric

Labs: ↓Plt, ↑PT/PTT, ↓Fibrinogen, ↑↑D-dimer

Smear: Schistocytes

ISTH ≥5 = overt DIC

Treatment: CAUSE FIRST, then transfuse</div></div>`,question:{prompt:"Heparin in DIC?",options:[{text:"Give to all",correct:false},{text:"Always contraindicated",correct:false},{text:"Only if thrombosis predominates",correct:true},{text:"High-dose is treatment of choice",correct:false}],explanation:{correct:"Correct! Heparin only for thrombosis-predominant DIC (purpura fulminans, acral ischemia). Never with active bleeding.",incorrect:"Heparin only for thrombosis-predominant DIC, not routine."},teaching:`<h4>Key Points</h4><ul style="line-height:2;margin-left:20px;"><li>DIC is always secondary</li><li>Sepsis is #1 trigger</li><li>↓plt, ↑PT/PTT, ↓fibrinogen, ↑↑D-dimer</li><li>ISTH ≥5 = overt DIC</li><li><strong>TREAT THE CAUSE FIRST!</strong></li></ul>`,why_chain:[],points:10}}
    ];
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${currentStage+1} of ${stages.length}</div><div class="scene-title">${stage.title}</div></div>${stage.content}`;if(stage.question){html+=`<div class="question-box"><div class="question-prompt">${stage.question.prompt}</div><div class="mcq-options">`;stage.question.options.forEach((opt,i)=>{html+=`<div class="mcq-option" onclick="checkAnswer(${i},${opt.correct})"><div class="option-letter">${String.fromCharCode(65+i)}</div><div>${opt.text}</div></div>`;});html+=`</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>${stage.question.explanation.correct}</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>${stage.question.explanation.incorrect}</div>`;if(stage.question.teaching)html+=`<div class="teaching-point" id="teaching">${stage.question.teaching}</div>`;if(stage.question.why_chain&&stage.question.why_chain.length>0){html+=`<div class="why-chain" id="why-chain"><h4>🔗 WHY Chain</h4>`;stage.question.why_chain.forEach(w=>{html+=`<div style="margin-bottom:12px;padding-left:16px;border-left:2px solid rgba(251,191,36,0.5);"><div style="color:#fbbf24;font-weight:600;margin-bottom:4px;">${w.q}</div><div style="color:#e2e8f0;line-height:1.6;">${w.a}</div></div>`;});html+=`</div>`;}html+=`<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>`;}html+=`</div>`;document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');const w=document.getElementById('why-chain');if(w)w.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML=`<div class="scene completion"><h2 style="color:#4ade80;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>${score}</strong> / ${stages.length*10}</p><p>You've mastered DIC!</p></div>`;}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}

</script>
