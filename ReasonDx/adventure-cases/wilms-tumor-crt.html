    <meta charset="UTF-8">

    <title>Wilms Tumor - Clinical Reasoning Case</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0369a1 0%, #0ea5e9 100%); min-height: 100vh; padding: 20px; color: #f8fafc; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { background: rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: #bae6fd; }
        .score-display { display: flex; gap: 20px; font-size: 0.9rem; margin-top: 10px; }
        .score-item { background: rgba(255,255,255,0.15); padding: 8px 16px; border-radius: 20px; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; margin-top: 12px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #bae6fd, #fbbf24); border-radius: 3px; transition: width 0.3s; }
        .scene { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        .scene-phase { font-size: 0.85rem; color: #bae6fd; text-transform: uppercase; }
        .scene-title { font-size: 1.5rem; font-weight: 700; color: #e0f2fe; margin-top: 4px; }
        .narrative { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px 20px; margin: 16px 0; border-left: 4px solid #0ea5e9; line-height: 1.7; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #fca5a5; font-weight: 600; }
        .question-box { background: linear-gradient(135deg, rgba(14,165,233,0.2), rgba(251,191,36,0.2)); border: 1px solid rgba(14,165,233,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .question-prompt { font-size: 1.1rem; font-weight: 600; color: #e0f2fe; margin-bottom: 16px; }
        .mcq-options { display: flex; flex-direction: column; gap: 10px; }
        .mcq-option { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: flex-start; gap: 12px; }
        .mcq-option:hover:not(.disabled) { background: rgba(255,255,255,0.1); }
        .mcq-option.disabled { cursor: default; opacity: 0.7; }
        .mcq-option.correct { border-color: #22c55e !important; background: rgba(34,197,94,0.2) !important; opacity: 1 !important; }
        .mcq-option.incorrect { border-color: #ef4444 !important; background: rgba(239,68,68,0.2) !important; }
        .option-letter { width: 28px; height: 28px; background: rgba(14,165,233,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
        .feedback { display: none; margin-top: 16px; padding: 16px; border-radius: 10px; }
        .feedback.show { display: block; }
        .correct-feedback { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); }
        .incorrect-feedback { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); }
        .teaching-point { display: none; margin-top: 20px; background: rgba(14,165,233,0.15); border: 1px solid rgba(14,165,233,0.3); border-radius: 12px; padding: 20px; }
        .teaching-point.show { display: block; }
        .mechanism-box { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 16px; margin: 12px 0; }
        .mechanism-title { color: #bae6fd; font-weight: 600; margin-bottom: 10px; }
        .pathway { font-family: 'Monaco', 'Consolas', monospace; font-size: 0.85rem; white-space: pre-wrap; line-height: 1.6; }
        .btn { background: linear-gradient(135deg, #0ea5e9, #fbbf24); color: white; border: none; padding: 12px 28px; border-radius: 25px; font-weight: 600; cursor: pointer; display: none; margin-top: 16px; }
        .btn.show { display: inline-block; }

<body>
    <div class="container">
        <div class="header">
            <h1>🎗️ Wilms Tumor</h1>
            <div class="score-display">
                <div class="score-item">Score: <strong id="score">0</strong>/<span id="maxScore">70</span></div>
                <div class="score-item">Stage: <span id="stageNum">1</span>/7</div>
            </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width: 14%"></div></div>
        <div id="scene-container"></div>
    </div>
    <script>
    let currentStage = 0, score = 0;
    const stages = [
        {title:"Bath Time Discovery",content:'<div class="narrative"><p>A mother brings in her <span class="highlight">3-year-old daughter</span> because she noticed a <span class="critical">"lump" in the child\'s belly</span> during bath time last night. The child has been well - eating normally, active, no fever, no pain. Mom is very worried it appeared "suddenly."</p></div>',question:{prompt:"What is the MOST likely diagnosis for an asymptomatic abdominal mass in a 3-year-old?",options:[{text:"Neuroblastoma",correct:false},{text:"Wilms tumor (nephroblastoma)",correct:true},{text:"Hepatoblastoma",correct:false},{text:"Lymphoma",correct:false}],explanation:{correct:"Correct! Wilms tumor is the most common primary renal malignancy in children and typically presents as an asymptomatic abdominal mass discovered incidentally (often during bathing). Peak age is 3-4 years.",incorrect:"Wilms tumor is most likely in a well-appearing child with an abdominal mass at age 3-4. Neuroblastoma patients are often ill-appearing; neuroblastoma peak age is younger (<2 years)."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Wilms Tumor Basics</div><div class="pathway">EPIDEMIOLOGY:\n• Most common renal malignancy in kids\n• ~500 cases/year in US\n• Peak age: 3-4 years\n• 90% diagnosed before age 7\n• M = F\n\nPRESENTATION:\n• Asymptomatic abdominal mass (classic)\n• Usually discovered by parent/physician\n• Child appears WELL\n• Abdominal pain (30%)\n• Hematuria (20%)\n• Hypertension (25%)\n\n5-YEAR SURVIVAL: >90%!</div></div>',points:10}},
        
        {title:"Physical Exam",content:'<div class="narrative"><p>On exam, you palpate a <span class="critical">large, firm, smooth mass</span> in the left abdomen/flank. It does NOT cross the midline. The child appears well and is playful. Vitals: BP <span class="highlight">128/82</span> (elevated for age).</p></div>',question:{prompt:"What is a critical point about examining a suspected Wilms tumor?",options:[{text:"Vigorous palpation helps determine size",correct:false},{text:"Do NOT aggressively palpate - risk of rupture",correct:true},{text:"The mass should be biopsied in clinic",correct:false},{text:"Crossing the midline confirms the diagnosis",correct:false}],explanation:{correct:"Correct! Wilms tumor is friable and can rupture with vigorous palpation. Tumor rupture causes spillage and upstages the disease (Stage III), worsening prognosis. Gentle examination only!",incorrect:"DO NOT aggressively palpate! Wilms tumor can rupture, causing spillage which upstages to Stage III."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Exam Findings</div><div class="pathway">PHYSICAL EXAM:\n• Smooth, firm flank/abdominal mass\n• Usually does NOT cross midline\n• Child appears WELL (vs neuroblastoma)\n\n⚠️ GENTLE PALPATION ONLY!\n• Wilms is friable\n• Rupture = tumor spillage\n• Spillage → Stage III (worse prognosis)\n\nWILMS vs NEUROBLASTOMA:\n           Wilms      Neuroblastoma\nAge        3-4 yrs    <2 yrs\nAppearance Well       Often ill\nMidline    Doesn\'t    Often crosses\nCalcific.  Rare(10%)  Common(90%)\nMarkers    None       VMA, HVA↑</div></div>',points:10}},

        {title:"Associated Syndromes",content:'<div class="narrative"><p>You notice the child has <span class="highlight">aniridia</span> (absence of iris). You ask about her developmental history, and mom reports she\'s been a bit slower than her siblings.</p></div>',question:{prompt:"Aniridia + Wilms tumor suggests which syndrome?",options:[{text:"Beckwith-Wiedemann syndrome",correct:false},{text:"WAGR syndrome",correct:true},{text:"Denys-Drash syndrome",correct:false},{text:"Li-Fraumeni syndrome",correct:false}],explanation:{correct:"Correct! WAGR syndrome (WT1 deletion at 11p13) = Wilms tumor, Aniridia, Genitourinary anomalies, intellectual disability (Retardation). The aniridia and developmental delay are key clues. These children have 50% risk of developing Wilms tumor.",incorrect:"WAGR = Wilms, Aniridia, GU anomalies, Retardation (intellectual disability). WT1 gene deletion at 11p13."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Associated Syndromes</div><div class="pathway">WAGR SYNDROME (WT1 deletion, 11p13):\n• Wilms tumor (50% risk)\n• Aniridia\n• GU anomalies\n• Retardation (intellectual disability)\n\nBECKWITH-WIEDEMANN (WT2, 11p15):\n• Macroglossia, macrosomia\n• Omphalocele\n• Visceromegaly\n• Hemihypertrophy\n• Ear creases\n• Wilms risk ~5-10%\n\nDENYS-DRASH (WT1 missense):\n• Wilms tumor (90% risk!)\n• Diffuse mesangial sclerosis\n• Ambiguous genitalia (46,XY DSD)\n\nSCREEN at-risk children:\nRenal US every 3-4 months until age 7</div></div>',points:10}},

        {title:"Workup",content:'<div class="narrative"><p>You order imaging. Renal ultrasound confirms a <span class="highlight">large intrarenal mass</span> arising from the left kidney. You plan further staging.</p></div>',question:{prompt:"What is the appropriate imaging workup for suspected Wilms tumor?",options:[{text:"MRI only",correct:false},{text:"Ultrasound, then CT or MRI of abdomen/pelvis + chest imaging",correct:true},{text:"PET scan",correct:false},{text:"No further imaging needed before surgery",correct:false}],explanation:{correct:"Correct! Complete workup includes: Renal US (initial), CT or MRI abdomen/pelvis (staging, assess contralateral kidney, IVC thrombus), and Chest CT (lungs are #1 metastatic site). Look for bilateral disease!",incorrect:"Full staging: US → CT/MRI abdomen/pelvis (assess both kidneys, IVC) + Chest CT (pulmonary mets are most common)."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Imaging Workup</div><div class="pathway">STAGING WORKUP:\n\n1. RENAL ULTRASOUND:\n   • Confirms intrarenal mass\n   • Assess for IVC thrombus\n\n2. CT or MRI ABDOMEN/PELVIS:\n   • Tumor extent\n   • Contralateral kidney (5-10% bilateral)\n   • Lymph nodes\n   • IVC involvement\n\n3. CHEST CT:\n   • Pulmonary metastases\n   • Most common met site\n\nLAB WORK:\n• CBC, chemistry\n• Urinalysis\n• NO specific tumor markers\n  (unlike neuroblastoma)</div></div>',points:10}},

        {title:"Staging",content:'<div class="narrative"><p>CT shows the mass is <span class="highlight">confined to the left kidney</span> with no lymph node involvement. Chest CT is clear. Contralateral kidney is normal.</p></div>',question:{prompt:"If completely resected with negative margins and no lymph node involvement, what stage is this tumor?",options:[{text:"Stage I",correct:true},{text:"Stage II",correct:false},{text:"Stage III",correct:false},{text:"Stage IV",correct:false}],explanation:{correct:"Correct! Stage I = tumor limited to kidney, completely resected, capsule intact, no spillage. This has excellent prognosis (>95% 5-year survival with favorable histology).",incorrect:"Stage I = confined to kidney, completely resected, intact capsule, no spillage. Stage II extends beyond kidney but completely resected. Stage III has residual/spillage."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 COG/NWTS Staging</div><div class="pathway">STAGE I:\n• Limited to kidney\n• Completely resected\n• Capsule intact\n• No spillage\n→ >95% survival (favorable histology)\n\nSTAGE II:\n• Extends beyond kidney\n• Completely resected\n→ ~95% survival\n\nSTAGE III:\n• Residual tumor (non-hematogenous)\n• Lymph node positive\n• Tumor spillage\n• Incomplete resection\n→ ~90% survival\n\nSTAGE IV:\n• Hematogenous metastases\n• Lung, liver, bone, brain\n→ ~80% survival\n\nSTAGE V:\n• Bilateral renal involvement</div></div>',points:10}},

        {title:"Treatment Approach",content:'<div class="narrative"><p>You discuss the treatment plan with the parents. This appears to be localized Wilms tumor.</p></div>',question:{prompt:"What is the standard North American (COG) treatment approach for Wilms tumor?",options:[{text:"Chemotherapy first, then surgery",correct:false},{text:"Upfront nephrectomy, then chemotherapy based on stage/histology",correct:true},{text:"Radiation therapy alone",correct:false},{text:"Observation with serial imaging",correct:false}],explanation:{correct:"Correct! In North America (COG protocol), upfront nephrectomy is performed first for staging and tumor removal. Adjuvant chemotherapy (vincristine, actinomycin D ± doxorubicin) is then given based on stage and histology.",incorrect:"North American approach: Surgery FIRST → then chemotherapy based on stage/histology. European (SIOP) approach uses neoadjuvant chemo first."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Treatment</div><div class="pathway">NORTH AMERICAN (COG) APPROACH:\n1. UPFRONT NEPHRECTOMY\n   • Surgical staging\n   • Tumor removal\n   • Lymph node sampling\n   • Inspect contralateral kidney\n\n2. ADJUVANT THERAPY:\n   Stage I-II (favorable):\n   • Vincristine + Actinomycin D (VA)\n   \n   Stage III-IV:\n   • VAD (add Doxorubicin)\n   • + Flank/lung radiation\n\n   Stage V (bilateral):\n   • Neoadjuvant chemo\n   • Nephron-sparing surgery\n\nEUROPEAN (SIOP): Chemo first, then surgery\n\nOUTCOME: >90% overall survival!</div></div>',points:10}},

        {title:"Histology Matters",content:'<div class="narrative"><p>Pathology returns after nephrectomy. It shows <span class="critical">anaplastic histology</span> - large nuclei with abnormal mitoses.</p></div>',question:{prompt:"How does anaplastic histology affect prognosis and treatment?",options:[{text:"No effect on prognosis",correct:false},{text:"Better prognosis - more differentiated",correct:false},{text:"Worse prognosis - more intensive treatment needed",correct:true},{text:"Indicates benign tumor",correct:false}],explanation:{correct:"Correct! Anaplasia (unfavorable histology, ~10% of cases) indicates worse prognosis and requires more intensive chemotherapy and radiation. Diffuse anaplasia is worse than focal. Associated with TP53 mutations.",incorrect:"Anaplasia = unfavorable histology = worse prognosis. Requires intensified treatment with additional chemotherapy agents and radiation."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Histology</div><div class="pathway">CLASSIC "TRIPHASIC" PATTERN:\n• Blastemal (primitive cells)\n• Epithelial (tubules, glomeruloid)\n• Stromal (muscle, cartilage)\n\nFAVORABLE HISTOLOGY (~90%):\n• No anaplasia\n• Excellent prognosis\n\nUNFAVORABLE (Anaplastic) (~10%):\n• Nuclear enlargement (3x)\n• Hyperchromasia\n• Abnormal mitoses\n• Associated with TP53 mutations\n• More common in older children\n\nANAPLASIA TYPES:\n• Focal: Limited areas\n• Diffuse: Widespread (worse)\n\nTREATMENT INTENSIFIED for anaplasia</div></div>',points:10}}
    ];
    
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('stageNum').textContent=currentStage+1;document.getElementById('maxScore').textContent=stages.length*10;}
    
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><strong>✓ Correct!</strong> '+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><strong>✗ Not quite.</strong> '+stage.question.explanation.incorrect+'</div><div class="teaching-point" id="teaching">'+stage.question.teaching+'</div><button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=10;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}document.getElementById('teaching').classList.add('show');document.getElementById('next-btn').classList.add('show');}
    
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene" style="text-align:center;padding:40px;"><h2 style="color:#bae6fd;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong>/70</p><div style="margin-top:20px;padding:15px;background:rgba(59,130,246,0.15);border-radius:10px;border:1px solid rgba(59,130,246,0.3);"><p style="color:#93c5fd;margin-bottom:10px;font-weight:600;">📚 Learn More:</p><div style="display:flex;flex-wrap:wrap;gap:8px;"><a href="wilms-tumor-module.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📘 MechanismDx</a><a href="pediatric-urology-deepdive.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📊 Deep Dive</a></div><div style="margin-top:10px;"><a href="https://www.ncbi.nlm.nih.gov/books/NBK442004/" target="_blank" style="color:#93c5fd;font-size:0.8rem;">📖 StatPearls Reference</a></div></div><p>You mastered Wilms Tumor!</p><p style="margin-top:15px;color:#fbbf24;">>90% survival with modern treatment!</p></div>';}}
    
    renderStage();
    </script>
