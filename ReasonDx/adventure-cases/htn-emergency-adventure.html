<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Severe Headache | ReasonDx Adventure</title>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --border: #334155; --text: #F1F5F9; --muted: #94A3B8; --accent: #EF4444; --success: #10B981; --warning: #F59E0B; --danger: #DC2626; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
        .header { background: linear-gradient(135deg, #DC2626 0%, #EF4444 100%); padding: 12px 20px; position: sticky; top: 0; z-index: 100; }
        .header-row { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .header-title { font-size: 1.1rem; font-weight: 600; }
        .stat { background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 8px; }
        .stat-value { font-size: 1.1rem; font-weight: 700; font-family: monospace; }
        .stat-label { font-size: 0.6rem; opacity: 0.8; text-transform: uppercase; }
        .main { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; }
        .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .card-phase { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
        .card-title { font-size: 1.5rem; font-weight: 700; }
        .card-body { padding: 24px; }
        .narrative { background: linear-gradient(135deg, rgba(239,68,68,0.1), rgba(220,38,38,0.1)); border-left: 4px solid var(--accent); padding: 20px 24px; border-radius: 0 12px 12px 0; margin-bottom: 24px; line-height: 1.8; }
        .narrative .hl { background: rgba(239,68,68,0.3); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .setup-screen { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; }
        .setup-screen h1 { font-size: 2rem; margin-bottom: 8px; }
        .setup-screen .subtitle { color: var(--muted); margin-bottom: 32px; }
        .start-btn { background: var(--accent); color: white; border: none; padding: 16px 48px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .question-section { margin-bottom: 32px; }
        .question-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .question-number { background: var(--accent); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .question-text { font-size: 1.1rem; font-weight: 600; }
        .radio-options { display: flex; flex-direction: column; gap: 10px; }
        .radio-option { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .radio-option:hover { border-color: var(--accent); }
        .radio-option.selected { border-color: var(--accent); background: rgba(239,68,68,0.15); }
        .radio-option.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .radio-option.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .radio-circle { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; }
        .radio-option.selected .radio-circle { border-color: var(--accent); background: radial-gradient(circle, var(--accent) 40%, transparent 40%); }
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .checkbox-item:hover { border-color: var(--accent); }
        .checkbox-item.selected { border-color: var(--accent); background: rgba(239,68,68,0.15); }
        .checkbox-item.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .checkbox-item.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .checkbox-box { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .checkbox-item.selected .checkbox-box { background: var(--accent); border-color: var(--accent); }
        .checkbox-item.selected .checkbox-box::after { content: '✓'; color: white; font-weight: bold; }
        .feedback { padding: 20px; border-radius: 12px; margin: 20px 0; }
        .feedback.excellent { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); }
        .feedback.acceptable { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); }
        .feedback-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .feedback-icon { font-size: 1.5rem; }
        .feedback-title { font-weight: 700; }
        .feedback-text { color: var(--muted); line-height: 1.7; }
        .feedback-text strong { color: var(--text); }
        .alert { padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; }
        .alert.info { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); }
        .alert.danger { background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.3); }
        .alert-icon { font-size: 1.5rem; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: 600; margin-bottom: 4px; }
        .alert-desc { font-size: 0.9rem; color: var(--muted); }
        .btn { padding: 14px 28px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-row { display: flex; gap: 12px; margin-top: 24px; }
        .lab-panel { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .lab-panel-title { font-weight: 600; margin-bottom: 16px; color: var(--accent); }
        .lab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .lab-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; }
        .lab-name { font-size: 0.8rem; color: var(--muted); }
        .lab-value { font-size: 1.1rem; font-weight: 700; }
        .lab-value.critical { color: var(--danger); }
        .lab-value.high { color: var(--warning); }
        .lab-range { font-size: 0.7rem; color: var(--muted); }
        .outcome { text-align: center; padding: 40px 20px; }
        .outcome-icon { font-size: 4rem; margin-bottom: 16px; }
        .outcome-title { font-size: 2rem; font-weight: 700; color: var(--success); margin-bottom: 8px; }
        .outcome-desc { color: var(--muted); max-width: 600px; margin: 0 auto 24px; }
        .score-summary { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 24px; margin: 24px auto; max-width: 500px; }
        .score-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .score-row:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <header class="header"><div class="header-row"><div class="header-title">🔴 The Severe Headache</div><div class="stat"><div class="stat-value" id="scoreDisplay">0</div><div class="stat-label">Points</div></div></div></header>
    <main class="main"><div id="stageContainer"></div></main>
    <script>
    const state = { stage:'setup', score:0 };
    
    function addScore(pts) { state.score += pts; document.getElementById('scoreDisplay').textContent = state.score; }

    const stages = {
        setup: { render: () => `
            <div class="setup-screen">
                <h1>🔴 The Severe Headache</h1>
                <p class="subtitle">Hypertensive emergency management</p>
                <button class="start-btn" onclick="goTo('presentation')">Begin Case →</button>
            </div>`
        },
        presentation: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Emergency Department</div><div class="card-title">📋 Dangerously High Blood Pressure</div></div>
                <div class="card-body">
                    <div class="narrative">A <span class="hl">54-year-old male</span> with history of <span class="hl">poorly controlled HTN</span> (non-compliant with meds) presents with <span class="hl">severe headache</span>, <span class="hl">blurred vision</span>, and <span class="hl">chest discomfort</span> for 6 hours.<br><br>On exam: <span class="hl">BP 228/134 mmHg</span> (confirmed bilateral), <span class="hl">papilledema on fundoscopy</span>, <span class="hl">S4 gallop</span>. Mental status intact but patient anxious.<br><br>ECG shows <span class="hl">LVH with strain pattern</span>. CXR shows <span class="hl">mild pulmonary edema</span>.</div>
                    <div class="lab-panel">
                        <div class="lab-panel-title">Laboratory Results</div>
                        <div class="lab-grid">
                            <div class="lab-item"><div class="lab-name">Creatinine</div><div class="lab-value high">2.1 mg/dL</div><div class="lab-range">Baseline 1.2</div></div>
                            <div class="lab-item"><div class="lab-name">Troponin</div><div class="lab-value high">0.08 ng/mL</div><div class="lab-range">&lt;0.04</div></div>
                            <div class="lab-item"><div class="lab-name">BNP</div><div class="lab-value high">842 pg/mL</div><div class="lab-range">&lt;100</div></div>
                            <div class="lab-item"><div class="lab-name">LDH</div><div class="lab-value high">412 U/L</div><div class="lab-range">140-280</div></div>
                            <div class="lab-item"><div class="lab-name">Haptoglobin</div><div class="lab-value critical">Low</div><div class="lab-range">-</div></div>
                            <div class="lab-item"><div class="lab-name">Smear</div><div class="lab-value critical">Schistocytes</div><div class="lab-range">-</div></div>
                        </div>
                    </div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="goTo('definition')">Classify →</button></div>
                </div>
            </div>`
        },
        definition: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Classification</div><div class="card-title">🚨 Emergency vs Urgency</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">1</div><div class="question-text">With papilledema, pulmonary edema, AKI, and elevated troponin, this is:</div></div>
                        <div class="radio-options" id="classOpts">
                            <div class="radio-option" data-id="emergency" onclick="selectClass('emergency')"><div class="radio-circle"></div><div><strong>Hypertensive EMERGENCY</strong><br><small style="color:var(--muted)">Severe HTN WITH end-organ damage</small></div></div>
                            <div class="radio-option" data-id="urgency" onclick="selectClass('urgency')"><div class="radio-circle"></div><div><strong>Hypertensive URGENCY</strong><br><small style="color:var(--muted)">Severe HTN without end-organ damage</small></div></div>
                            <div class="radio-option" data-id="neither" onclick="selectClass('neither')"><div class="radio-circle"></div><div><strong>Neither - just elevated BP</strong><br><small style="color:var(--muted)">Asymptomatic hypertension</small></div></div>
                        </div>
                    </div>
                    <div id="classFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="classSubmit" onclick="submitClass()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        endorgan: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">End-Organ Damage</div><div class="card-title">🎯 Target Organs Affected</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">2</div><div class="question-text">Which end-organs show evidence of damage in this patient?</div></div>
                        <div class="checkbox-grid" id="organOpts">
                            <div class="checkbox-item" data-id="brain" data-correct="true" onclick="toggleOrgan('brain')"><div class="checkbox-box"></div><span>Brain (papilledema)</span></div>
                            <div class="checkbox-item" data-id="heart" data-correct="true" onclick="toggleOrgan('heart')"><div class="checkbox-box"></div><span>Heart (troponin, BNP, edema)</span></div>
                            <div class="checkbox-item" data-id="kidney" data-correct="true" onclick="toggleOrgan('kidney')"><div class="checkbox-box"></div><span>Kidney (AKI)</span></div>
                            <div class="checkbox-item" data-id="blood" data-correct="true" onclick="toggleOrgan('blood')"><div class="checkbox-box"></div><span>Blood (MAHA - schistocytes)</span></div>
                            <div class="checkbox-item" data-id="liver" data-correct="false" onclick="toggleOrgan('liver')"><div class="checkbox-box"></div><span>Liver</span></div>
                        </div>
                    </div>
                    <div id="organFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="submitOrgan()">Submit →</button></div>
                </div>
            </div>`
        },
        bpgoal: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">BP Goal</div><div class="card-title">📉 How Fast to Lower?</div></div>
                <div class="card-body">
                    <div class="alert danger"><span class="alert-icon">⚠️</span><div class="alert-content"><div class="alert-title">Critical Concept</div><div class="alert-desc">Lowering BP too quickly can cause ischemic stroke or MI due to impaired autoregulation!</div></div></div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">3</div><div class="question-text">What is the BP lowering goal for hypertensive emergency (without aortic dissection)?</div></div>
                        <div class="radio-options" id="goalOpts">
                            <div class="radio-option" data-id="25_1hr" onclick="selectGoal('25_1hr')"><div class="radio-circle"></div><div><strong>Reduce MAP by 20-25% in first hour</strong><br><small style="color:var(--muted)">Then gradually to 160/100 over 2-6 hours</small></div></div>
                            <div class="radio-option" data-id="normal" onclick="selectGoal('normal')"><div class="radio-circle"></div><div><strong>Normalize BP immediately (&lt;120/80)</strong><br><small style="color:var(--muted)">Get to goal as fast as possible</small></div></div>
                            <div class="radio-option" data-id="50" onclick="selectGoal('50')"><div class="radio-circle"></div><div><strong>Reduce by 50% in first hour</strong><br><small style="color:var(--muted)">Aggressive reduction</small></div></div>
                        </div>
                    </div>
                    <div id="goalFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="goalSubmit" onclick="submitGoal()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        treatment: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Treatment</div><div class="card-title">💊 IV Antihypertensives</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">4</div><div class="question-text">Which IV medications are appropriate for hypertensive emergency?</div></div>
                        <div class="checkbox-grid" id="medOpts">
                            <div class="checkbox-item" data-id="nicardipine" data-correct="true" onclick="toggleMed('nicardipine')"><div class="checkbox-box"></div><span>Nicardipine (IV CCB)</span></div>
                            <div class="checkbox-item" data-id="labetalol" data-correct="true" onclick="toggleMed('labetalol')"><div class="checkbox-box"></div><span>Labetalol</span></div>
                            <div class="checkbox-item" data-id="nitroprusside" data-correct="true" onclick="toggleMed('nitroprusside')"><div class="checkbox-box"></div><span>Nitroprusside</span></div>
                            <div class="checkbox-item" data-id="esmolol" data-correct="true" onclick="toggleMed('esmolol')"><div class="checkbox-box"></div><span>Esmolol</span></div>
                            <div class="checkbox-item" data-id="sublingual" data-correct="false" onclick="toggleMed('sublingual')"><div class="checkbox-box"></div><span>Sublingual nifedipine</span></div>
                            <div class="checkbox-item" data-id="clonidine" data-correct="false" onclick="toggleMed('clonidine')"><div class="checkbox-box"></div><span>Oral clonidine loading</span></div>
                        </div>
                    </div>
                    <div id="medFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="submitMed()">Submit →</button></div>
                </div>
            </div>`
        },
        dissection: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Special Case</div><div class="card-title">🫀 Aortic Dissection</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">5</div><div class="question-text">If this patient had aortic dissection instead, what would be DIFFERENT about BP management?</div></div>
                        <div class="radio-options" id="dissOpts">
                            <div class="radio-option" data-id="aggressive" onclick="selectDiss('aggressive')"><div class="radio-circle"></div><div><strong>More aggressive: SBP &lt;120 AND HR &lt;60 in 20 min</strong><br><small style="color:var(--muted)">Reduce shear stress on dissection</small></div></div>
                            <div class="radio-option" data-id="slower" onclick="selectDiss('slower')"><div class="radio-circle"></div><div><strong>Even slower reduction</strong><br><small style="color:var(--muted)">Avoid ischemia</small></div></div>
                            <div class="radio-option" data-id="same" onclick="selectDiss('same')"><div class="radio-circle"></div><div><strong>Same as other emergencies</strong><br><small style="color:var(--muted)">25% reduction in first hour</small></div></div>
                        </div>
                    </div>
                    <div id="dissFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="dissSubmit" onclick="submitDiss()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        outcome: { render: () => `
            <div class="card"><div class="card-body">
                <div class="outcome">
                    <div class="outcome-icon">🎉</div>
                    <div class="outcome-title">BP Controlled!</div>
                    <div class="outcome-desc">Patient was admitted to ICU and started on nicardipine drip. MAP reduced by 20% in first hour (228/134 → ~185/110), then gradually to 160/100 over next 6 hours. By 24 hours, BP was 150/95. Transitioned to oral medications. Creatinine improved, troponin trended down. Discharged on day 4 with close follow-up.</div>
                </div>
                <div class="score-summary">
                    <h3 style="margin-bottom:16px">Performance</h3>
                    <div class="score-row"><span>Classification</span><span>${state.classScore||0}/100</span></div>
                    <div class="score-row"><span>End-Organ Damage</span><span>${state.organScore||0}/100</span></div>
                    <div class="score-row"><span>BP Goal</span><span>${state.goalScore||0}/100</span></div>
                    <div class="score-row"><span>Medication Selection</span><span>${state.medScore||0}/100</span></div>
                    <div class="score-row"><span>Dissection Knowledge</span><span>${state.dissScore||0}/100</span></div>
                    <div class="score-row" style="border-top:2px solid var(--border);padding-top:12px"><strong>Total</strong><strong>${state.score}</strong></div>
                </div>
                <div class="feedback excellent"><div class="feedback-header"><span class="feedback-icon">💡</span><span class="feedback-title">Hypertensive Emergency Pearls</span></div><div class="feedback-text">
                    • <strong>Emergency vs Urgency:</strong> Emergency = end-organ damage. Urgency = severe HTN without damage<br>
                    • <strong>End-organs:</strong> Brain (encephalopathy, stroke), Heart (ACS, HF), Kidney (AKI), Eyes (papilledema), Blood (MAHA)<br>
                    • <strong>BP goal:</strong> Reduce MAP 20-25% in hour 1, then to ~160/100 over 2-6h, then normal over 24-48h<br>
                    • <strong>Why not normalize quickly?</strong> Chronic HTN shifts autoregulation curve right - rapid drops cause ischemia<br>
                    • <strong>IV agents:</strong> Nicardipine, labetalol, nitroprusside (cyanide toxicity risk), esmolol, fenoldopam<br>
                    • <strong>AVOID:</strong> Sublingual nifedipine (unpredictable drops, strokes!), oral loading for emergencies<br>
                    • <strong>Aortic dissection:</strong> Exception - SBP &lt;120 AND HR &lt;60 within 20 minutes! Beta-blocker FIRST (before vasodilator)
                </div></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="location.reload()">Play Again</button></div>
            </div></div>`
        }
    };

    let selectedClass = null;
    function selectClass(id) { selectedClass = id; document.querySelectorAll('#classOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('classSubmit').disabled = false; }
    function submitClass() {
        document.querySelectorAll('#classOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'emergency') o.classList.add('correct');
            else if (o.dataset.id === selectedClass) o.classList.add('incorrect');
        });
        state.classScore = selectedClass === 'emergency' ? 100 : 30;
        addScore(selectedClass === 'emergency' ? 40 : 10);
        document.getElementById('classFeedback').innerHTML = `<div class="feedback ${selectedClass==='emergency'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedClass==='emergency'?'✅':'📚'}</span><span class="feedback-title">${selectedClass==='emergency'?'Correct!':'Critical Distinction'}</span></div><div class="feedback-text"><strong>Hypertensive EMERGENCY:</strong> Severe HTN (often >180/120) WITH acute end-organ damage. This patient has papilledema (brain), pulmonary edema (heart), troponin elevation (heart), AKI (kidney), and schistocytes (MAHA). Urgency = severe HTN without damage.</div></div>`;
        document.getElementById('classSubmit').textContent = 'Continue →';
        document.getElementById('classSubmit').onclick = () => goTo('endorgan');
    }

    let selectedOrgan = new Set();
    function toggleOrgan(id) {
        const el = document.querySelector(`#organOpts .checkbox-item[data-id="${id}"]`);
        if(selectedOrgan.has(id)) { selectedOrgan.delete(id); el.classList.remove('selected'); }
        else { selectedOrgan.add(id); el.classList.add('selected'); }
    }
    function submitOrgan() {
        let correct = 0;
        const items = [{id:'brain',c:true},{id:'heart',c:true},{id:'kidney',c:true},{id:'blood',c:true},{id:'liver',c:false}];
        items.forEach(i => {
            const el = document.querySelector(`#organOpts .checkbox-item[data-id="${i.id}"]`);
            const sel = selectedOrgan.has(i.id);
            if (i.c && sel) { el.classList.add('correct'); correct++; }
            else if (!i.c && sel) { el.classList.add('incorrect'); }
        });
        state.organScore = Math.round(correct / 4 * 100);
        addScore(Math.round(state.organScore / 2.5));
        document.getElementById('organFeedback').innerHTML = `<div class="feedback ${state.organScore>=75?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${state.organScore>=75?'✅':'📚'}</span><span class="feedback-title">End-Organ Damage</span></div><div class="feedback-text"><strong>Four organs affected:</strong> Brain (papilledema = increased ICP), Heart (elevated troponin/BNP, pulmonary edema), Kidney (AKI), Blood (MAHA with schistocytes from shearing on damaged endothelium). Liver not involved in this case.</div></div>`;
        document.querySelector('#organFeedback').closest('.card-body').querySelector('.btn-row').innerHTML = `<button class="btn btn-primary" onclick="goTo('bpgoal')">Set BP Goal →</button>`;
    }

    let selectedGoal = null;
    function selectGoal(id) { selectedGoal = id; document.querySelectorAll('#goalOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('goalSubmit').disabled = false; }
    function submitGoal() {
        document.querySelectorAll('#goalOpts .radio-option').forEach(o => {
            if (o.dataset.id === '25_1hr') o.classList.add('correct');
            else if (o.dataset.id === selectedGoal) o.classList.add('incorrect');
        });
        state.goalScore = selectedGoal === '25_1hr' ? 100 : 30;
        addScore(selectedGoal === '25_1hr' ? 40 : 10);
        document.getElementById('goalFeedback').innerHTML = `<div class="feedback ${selectedGoal==='25_1hr'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedGoal==='25_1hr'?'✅':'📚'}</span><span class="feedback-title">${selectedGoal==='25_1hr'?'Correct!':'Critical Safety Point'}</span></div><div class="feedback-text"><strong>20-25% MAP reduction in hour 1:</strong> Then to ~160/100 over 2-6 hours, then to normal over 24-48 hours. Chronic HTN shifts cerebral autoregulation curve - rapid normalization causes watershed strokes and myocardial ischemia!</div></div>`;
        document.getElementById('goalSubmit').textContent = 'Continue →';
        document.getElementById('goalSubmit').onclick = () => goTo('treatment');
    }

    let selectedMed = new Set();
    function toggleMed(id) {
        const el = document.querySelector(`#medOpts .checkbox-item[data-id="${id}"]`);
        if(selectedMed.has(id)) { selectedMed.delete(id); el.classList.remove('selected'); }
        else { selectedMed.add(id); el.classList.add('selected'); }
    }
    function submitMed() {
        let correct = 0;
        const items = [{id:'nicardipine',c:true},{id:'labetalol',c:true},{id:'nitroprusside',c:true},{id:'esmolol',c:true},{id:'sublingual',c:false},{id:'clonidine',c:false}];
        items.forEach(i => {
            const el = document.querySelector(`#medOpts .checkbox-item[data-id="${i.id}"]`);
            const sel = selectedMed.has(i.id);
            if (i.c && sel) { el.classList.add('correct'); correct++; }
            else if (!i.c && sel) { el.classList.add('incorrect'); }
        });
        state.medScore = Math.round(correct / 4 * 100);
        addScore(Math.round(state.medScore / 2.5));
        document.getElementById('medFeedback').innerHTML = `<div class="feedback ${state.medScore>=75?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${state.medScore>=75?'✅':'📚'}</span><span class="feedback-title">IV Antihypertensives</span></div><div class="feedback-text"><strong>IV agents:</strong> Nicardipine (easily titratable), labetalol (α+β blocker), nitroprusside (potent, cyanide risk), esmolol (short-acting). <strong>AVOID:</strong> Sublingual nifedipine (banned - unpredictable drops, strokes), oral clonidine (too slow for emergencies).</div></div>`;
        document.querySelector('#medFeedback').closest('.card-body').querySelector('.btn-row').innerHTML = `<button class="btn btn-primary" onclick="goTo('dissection')">Special Case →</button>`;
    }

    let selectedDiss = null;
    function selectDiss(id) { selectedDiss = id; document.querySelectorAll('#dissOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('dissSubmit').disabled = false; }
    function submitDiss() {
        document.querySelectorAll('#dissOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'aggressive') o.classList.add('correct');
            else if (o.dataset.id === selectedDiss) o.classList.add('incorrect');
        });
        state.dissScore = selectedDiss === 'aggressive' ? 100 : 30;
        addScore(selectedDiss === 'aggressive' ? 40 : 10);
        document.getElementById('dissFeedback').innerHTML = `<div class="feedback ${selectedDiss==='aggressive'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedDiss==='aggressive'?'✅':'📚'}</span><span class="feedback-title">${selectedDiss==='aggressive'?'Correct!':'Important Exception'}</span></div><div class="feedback-text"><strong>Aortic dissection is the EXCEPTION:</strong> Goal SBP &lt;120 AND HR &lt;60 within 20 MINUTES to reduce shear stress on dissection. Start β-blocker FIRST (reduce HR and dP/dt), then add vasodilator. Vasodilator alone causes reflex tachycardia which worsens dissection!</div></div>`;
        document.getElementById('dissSubmit').textContent = 'Complete →';
        document.getElementById('dissSubmit').onclick = () => goTo('outcome');
    }

    function goTo(id) { state.stage = id; document.getElementById('stageContainer').innerHTML = stages[id].render(); window.scrollTo(0,0); }
    document.addEventListener('DOMContentLoaded', () => goTo('setup'));
    </script>
</body>
</html>
