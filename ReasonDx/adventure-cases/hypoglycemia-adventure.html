<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugar Crash | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#F59E0B;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#D97706,#F59E0B);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(245,158,11,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(245,158,11,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#000;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(245,158,11,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#000}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#FCD34D;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#000;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🍬 Sugar Crash</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'65M',wt:'82kg',hx:'Diabetic on insulin, found confused, missed dinner last night',exam:'Diaphoretic, tremulous, confused but responsive',vitals:{HR:'108',BP:'148/92',Temp:'98.2°F',SpO2:'98%'},labs:{Glucose:'42',Hx:'Type 2 DM on glargine + lispro'}},int:{age:'48F',wt:'95kg',hx:'New sulfonylurea started, recurrent hypoglycemia despite eating',exam:'Drowsy, diaphoretic, no focal deficits',vitals:{HR:'98',BP:'138/88',Temp:'98.6°F',SpO2:'99%'},labs:{Glucose:'38',Cr:'2.8',Hx:'CKD, new glipizide'}},adv:{age:'55M',wt:'78kg',hx:'Non-diabetic with recurrent hypoglycemia, weight gain, no medications',exam:'Obese, sweating, tremor, recent weight gain',vitals:{HR:'92',BP:'142/88',Temp:'98.4°F',SpO2:'99%'},labs:{Glucose:'35',Insulin:'85 (H)',CPep:'12 (H)',Hx:'Whipple triad present'}}};
const Q=[
{t:'Whipple Triad',q:'What defines the Whipple triad for hypoglycemia?',h:'Diagnostic criteria',o:[{id:'a',txt:'Symptoms consistent with hypoglycemia + low glucose + resolution with glucose administration',c:1,p:100},{id:'b',txt:'Low glucose only',c:0,p:30},{id:'c',txt:'Symptoms only',c:0,p:20}],fb:{1:'<b>Correct!</b> Whipple triad: (1) Symptoms of hypoglycemia, (2) Low plasma glucose (<70 mg/dL), (3) Resolution of symptoms after glucose. All 3 needed for diagnosis.',0:'<b>Whipple triad:</b> Symptoms + low glucose + resolution with treatment.'}},
{t:'Symptoms',q:'Adrenergic symptoms of hypoglycemia include?',h:'Autonomic response',o:[{id:'a',txt:'Tremor, palpitations, sweating, anxiety, hunger',c:1,p:100},{id:'b',txt:'Seizures only',c:0,p:20},{id:'c',txt:'Coma only',c:0,p:10}],fb:{1:'<b>Correct!</b> Adrenergic: Tremor, palpitations, sweating, anxiety, hunger. Neuroglycopenic (more severe): Confusion, drowsiness, seizures, coma. Hypoglycemia unawareness loses adrenergic symptoms.',0:'<b>Symptoms:</b> Adrenergic (early) vs neuroglycopenic (severe).'}},
{t:'Acute Treatment',q:'Immediate treatment for severe hypoglycemia in hospital?',h:'Rapid correction',o:[{id:'a',txt:'IV dextrose 50% (D50) 25-50mL OR glucagon 1mg IM if no IV access',c:1,p:100},{id:'b',txt:'Orange juice only',c:0,p:30},{id:'c',txt:'Wait for labs',c:0,p:10}],fb:{1:'<b>Correct!</b> Severe: D50 25-50mL IV (1 amp = 25g glucose). No IV: Glucagon 1mg IM/SC. Mild/conscious: Oral glucose (15-20g fast-acting carbs). Recheck in 15 min.',0:'<b>Treatment:</b> D50 IV or glucagon IM. Oral if mild and conscious.'}},
{t:'Sulfonylurea Toxicity',q:'Why is sulfonylurea-induced hypoglycemia particularly dangerous?',h:'Duration of action',o:[{id:'a',txt:'Long half-life causing prolonged/recurrent hypoglycemia; may need admission and octreotide',c:1,p:100},{id:'b',txt:'Short duration',c:0,p:20},{id:'c',txt:'Easy to treat',c:0,p:20}],fb:{1:'<b>Correct!</b> Sulfonylureas: Long half-life (especially glipizide, glyburide), worse in renal failure. Often need admission 24-48hr. Octreotide (inhibits insulin release) can help refractory cases.',0:'<b>Sulfonylurea:</b> Long-acting, often needs admission. Consider octreotide.'}},
{t:'Insulinoma Diagnosis',q:'Lab findings suggesting insulinoma?',h:'Endogenous insulin excess',o:[{id:'a',txt:'Low glucose + high insulin + high C-peptide + negative sulfonylurea screen',c:1,p:100},{id:'b',txt:'Low insulin',c:0,p:20},{id:'c',txt:'High glucose',c:0,p:10}],fb:{1:'<b>Correct!</b> Insulinoma: Low glucose + inappropriate insulin (>3) + high C-peptide (>0.6) + negative sulfonylurea screen. If insulin high + C-peptide low = exogenous insulin.',0:'<b>Insulinoma:</b> High insulin + high C-peptide + low glucose.'}},
{t:'Renal Failure',q:'Why does CKD increase hypoglycemia risk in diabetics?',h:'Pharmacokinetics',o:[{id:'a',txt:'Decreased insulin clearance, decreased gluconeogenesis, reduced drug clearance',c:1,p:100},{id:'b',txt:'Increased insulin needs',c:0,p:20},{id:'c',txt:'No effect',c:0,p:10}],fb:{1:'<b>Correct!</b> CKD: Reduced insulin clearance (longer action), reduced renal gluconeogenesis, reduced clearance of sulfonylureas/insulin. Need to reduce insulin doses by 25-50% in advanced CKD.',0:'<b>CKD:</b> Reduced insulin and drug clearance. Reduce doses.'}},
{t:'Beta-Blocker Effect',q:'How do beta-blockers affect hypoglycemia?',h:'Masked symptoms',o:[{id:'a',txt:'Mask adrenergic symptoms (sweating preserved), impair glycogenolysis',c:1,p:100},{id:'b',txt:'Prevent hypoglycemia',c:0,p:20},{id:'c',txt:'No interaction',c:0,p:20}],fb:{1:'<b>Correct!</b> Beta-blockers mask tremor, palpitations, anxiety (adrenergic symptoms). Sweating preserved (cholinergic). Also impair hepatic glycogenolysis. Higher risk of hypoglycemia unawareness.',0:'<b>Beta-blockers:</b> Mask symptoms (except sweating), impair recovery.'}},
{t:'Prevention',q:'Key strategies to prevent recurrent hypoglycemia?',h:'Patient education',o:[{id:'a',txt:'Review medications, adjust doses, ensure regular meals, patient education, consider CGM',c:1,p:100},{id:'b',txt:'Stop all diabetes meds',c:0,p:20},{id:'c',txt:'Higher glucose targets for everyone',c:0,p:20}],fb:{1:'<b>Correct!</b> Prevention: Review/reduce insulin/sulfonylureas, regular meals, teach Rule of 15, hypoglycemia action plan, consider CGM for hypoglycemia unawareness, relaxed A1c targets in high-risk patients.',0:'<b>Prevention:</b> Medication review, education, consider CGM, individualize targets.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🍬 Sugar Crash</h1><p style="color:var(--muted);margin-bottom:32px">Hypoglycemia: Whipple triad, treatment, sulfonylureas, insulinoma</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🍬 Low Blood Sugar</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Hypoglycemia Pearls</div><div class="pearl-item"><b>Whipple:</b> Symptoms + low glucose + resolution with Rx</div><div class="pearl-item"><b>Treatment:</b> D50 IV or glucagon IM</div><div class="pearl-item"><b>Sulfonylurea:</b> Long-acting, may need octreotide</div><div class="pearl-item"><b>Insulinoma:</b> High insulin + high C-peptide</div><div class="pearl-item"><b>CKD:</b> Reduce insulin doses 25-50%</div></div><div class="cross-link"><a href="dka-adventure-enhanced.html">Related: DKA</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
