<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Delayed Reaction | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#EF4444;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#B91C1C,#EF4444);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(239,68,68,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(239,68,68,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(239,68,68,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#FCA5A5;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">💊 The Delayed Reaction</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'28M',wt:'72kg',hx:'Started lamotrigine 3 weeks ago, now fever and spreading rash',exam:'Morbilliform rash on trunk/extremities, facial edema, cervical lymphadenopathy',vitals:{HR:'98',BP:'118/72',Temp:'102.4°F',SpO2:'98%'},labs:{WBC:'12.8',Eos:'18%',ALT:'285',Hx:'New anticonvulsant'}},int:{age:'45F',wt:'68kg',hx:'Allopurinol started 5 weeks ago for gout, diffuse rash, jaundice',exam:'Confluent erythema, facial edema, hepatomegaly, icteric sclerae',vitals:{HR:'108',BP:'102/68',Temp:'103.2°F',SpO2:'96%'},labs:{WBC:'15.2',Eos:'22%',ALT:'850',Cr:'2.1',Hx:'HLA-B*58:01 not checked'}},adv:{age:'62M',wt:'80kg',hx:'Vancomycin x6 weeks for osteomyelitis, rash and renal failure',exam:'Exfoliative erythroderma, bullae formation, oliguria',vitals:{HR:'118',BP:'88/58',Temp:'104°F',SpO2:'92%'},labs:{WBC:'18.5',Eos:'28%',ALT:'1250',Cr:'4.8',Hx:'On multiple antibiotics'}}};
const Q=[
{t:'DRESS Timing',q:'How long after drug initiation does DRESS typically present?',h:'Distinguishes from other drug reactions',o:[{id:'a',txt:'2-8 weeks (longer latency than other drug reactions)',c:1,p:100},{id:'b',txt:'Within 24 hours',c:0,p:10},{id:'c',txt:'6-12 months',c:0,p:10}],fb:{1:'<b>Correct!</b> DRESS has characteristically long latency (2-8 weeks). SJS/TEN typically 1-3 weeks. Immediate reactions within hours.',0:'<b>DRESS timing:</b> 2-8 weeks. This long latency is a key diagnostic feature.'}},
{t:'DRESS Features',q:'Which findings are characteristic of DRESS syndrome?',h:'RegiSCAR criteria',o:[{id:'a',txt:'Fever + rash + lymphadenopathy + eosinophilia + organ involvement',c:1,p:100},{id:'b',txt:'Blisters and skin detachment',c:0,p:20},{id:'c',txt:'Urticaria and angioedema',c:0,p:10}],fb:{1:'<b>Correct!</b> DRESS = Drug Reaction with Eosinophilia and Systemic Symptoms. Key features: fever, morbilliform rash, facial edema, lymphadenopathy, eosinophilia, and organ involvement (liver most common).',0:'<b>DRESS:</b> Fever, rash, LAD, eosinophilia, internal organ involvement.'}},
{t:'Common Culprits',q:'Which drugs most commonly cause DRESS?',h:'High-risk medications',o:[{id:'a',txt:'Anticonvulsants (carbamazepine, phenytoin, lamotrigine), allopurinol, sulfonamides',c:1,p:100},{id:'b',txt:'Penicillins only',c:0,p:20},{id:'c',txt:'NSAIDs',c:0,p:20}],fb:{1:'<b>Correct!</b> Classic DRESS drugs: aromatic anticonvulsants (carbamazepine, phenytoin, lamotrigine, phenobarbital), allopurinol, sulfonamides, dapsone, minocycline, vancomycin.',0:'<b>High-risk drugs:</b> Anticonvulsants, allopurinol, sulfonamides, vancomycin.'}},
{t:'Genetic Risk',q:'HLA-B*58:01 screening is recommended before starting which drug in high-risk populations?',h:'Pharmacogenomic testing',o:[{id:'a',txt:'Allopurinol (especially in Asian populations)',c:1,p:100},{id:'b',txt:'Lamotrigine',c:0,p:30},{id:'c',txt:'All antibiotics',c:0,p:10}],fb:{1:'<b>Correct!</b> HLA-B*58:01 strongly associated with allopurinol-induced DRESS/SJS. Screen in Han Chinese, Thai, Korean populations before starting. HLA-B*15:02 for carbamazepine.',0:'<b>Pharmacogenomics:</b> HLA-B*58:01 for allopurinol, HLA-B*15:02 for carbamazepine.'}},
{t:'Organ Involvement',q:'Most commonly affected internal organ in DRESS?',h:'Monitor this closely',o:[{id:'a',txt:'Liver (hepatitis in 50-80%)',c:1,p:100},{id:'b',txt:'Heart',c:0,p:30},{id:'c',txt:'Lungs',c:0,p:20}],fb:{1:'<b>Correct!</b> Liver involvement most common (50-80%). Also kidney (10-30%), heart (myocarditis), lungs (pneumonitis), thyroid. Multi-organ failure possible.',0:'<b>Organ involvement:</b> Liver most common. Monitor LFTs closely.'}},
{t:'Viral Reactivation',q:'Which viral reactivation is characteristically associated with DRESS?',h:'May contribute to pathogenesis',o:[{id:'a',txt:'HHV-6 reactivation (also EBV, CMV)',c:1,p:100},{id:'b',txt:'HIV',c:0,p:0},{id:'c',txt:'Hepatitis B',c:0,p:20}],fb:{1:'<b>Correct!</b> HHV-6 reactivation occurs in many DRESS cases and may contribute to prolonged/relapsing course. EBV, CMV also seen. Check viral titers.',0:'<b>Viral reactivation:</b> HHV-6, EBV, CMV commonly reactivate in DRESS.'}},
{t:'Treatment',q:'Primary treatment for DRESS syndrome?',h:'Beyond stopping the drug',o:[{id:'a',txt:'Stop culprit drug + systemic corticosteroids for severe cases',c:1,p:100},{id:'b',txt:'Antihistamines only',c:0,p:10},{id:'c',txt:'IVIG first-line',c:0,p:20}],fb:{1:'<b>Correct!</b> Stop drug immediately (most important). Systemic steroids (1-2mg/kg prednisone) for significant organ involvement. Slow taper over weeks to prevent relapse.',0:'<b>Treatment:</b> Stop drug + steroids for severe cases. Slow taper essential.'}},
{t:'Prognosis & Monitoring',q:'Important long-term considerations after DRESS?',h:'Not just acute management',o:[{id:'a',txt:'Mortality 5-10%, monitor for autoimmune sequelae (thyroiditis, diabetes)',c:1,p:100},{id:'b',txt:'Full recovery within days',c:0,p:10},{id:'c',txt:'No long-term effects',c:0,p:10}],fb:{1:'<b>Correct!</b> Mortality 5-10%. Long-term autoimmune sequelae develop in 10-20%: thyroiditis (most common), type 1 diabetes, autoimmune hepatitis. Follow TSH, glucose for 1 year.',0:'<b>Prognosis:</b> 5-10% mortality. Monitor for autoimmune sequelae long-term.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>💊 The Delayed Reaction</h1><p style="color:var(--muted);margin-bottom:32px">DRESS Syndrome: Timing, features, culprits, treatment, and monitoring</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">💊 Severe Drug Reaction</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'\">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">DRESS Clinical Pearls</div><div class="pearl-item"><b>Timing:</b> 2-8 weeks after drug start (longer than other reactions)</div><div class="pearl-item"><b>Features:</b> Fever, rash, facial edema, LAD, eosinophilia, organ involvement</div><div class="pearl-item"><b>Culprits:</b> Anticonvulsants, allopurinol, sulfonamides</div><div class="pearl-item"><b>Pharmacogenomics:</b> HLA-B*58:01 (allopurinol), HLA-B*15:02 (carbamazepine)</div><div class="pearl-item"><b>Organs:</b> Liver most common (50-80%)</div><div class="pearl-item"><b>Viral:</b> HHV-6 reactivation characteristic</div><div class="pearl-item"><b>Treatment:</b> Stop drug + steroids, slow taper</div><div class="pearl-item"><b>Follow-up:</b> Monitor for autoimmune sequelae (thyroiditis)</div></div><div class="cross-link"><a href="drug-allergy-adventure-enhanced.html">Related: Drug Allergy Evaluation</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
