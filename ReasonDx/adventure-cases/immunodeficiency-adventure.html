<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Infection Prone | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#A78BFA;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#7C3AED,#A78BFA);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(167,139,250,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(167,139,250,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(167,139,250,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🛡️ The Infection Prone</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'28M',wt:'75kg',hx:'4 sinus infections, 2 pneumonias in 2 years',exam:'Hypoplastic tonsils, no lymphadenopathy',vitals:{HR:'78',BP:'122/78'},labs:{IgG:'180',IgA:'<7',IgM:'25',Lymph:'1800'}},int:{age:'35F',wt:'62kg',hx:'Recurrent sinopulmonary infections since teens, bronchiectasis',exam:'Clubbing, crackles bilateral bases',vitals:{HR:'82',BP:'118/72'},labs:{IgG:'320',IgA:'45',IgM:'38',CD19:'2%'}},adv:{age:'8M',wt:'25kg',hx:'Recurrent Staph abscesses, pneumatoceles, eczema',exam:'Coarse facies, retained primary teeth',vitals:{HR:'92',BP:'98/62'},labs:{IgE:'8500',Eos:'12%',ANC:'Normal'}}};
const Q=[
{t:'Warning Signs',q:'How many serious infections warrant immunodeficiency workup?',h:'Jeffrey Modell Foundation criteria',o:[{id:'a',txt:'>=2 serious infections/yr OR >=4 ear infections/yr OR >=2 pneumonias/yr',c:1,p:100},{id:'b',txt:'Only 1 hospitalization',c:0,p:20},{id:'c',txt:'Any infection at all',c:0,p:10}],fb:{1:'<b>Correct!</b> JMF 10 Warning Signs include: >=2 deep-seated infections, >=4 ear infections, >=2 pneumonias, recurrent abscesses, FTT, need for IV antibiotics.',0:'<b>JMF criteria:</b> Pattern of recurrent, severe, or unusual infections.'}},
{t:'CVID Diagnosis',q:'Low IgG, low IgA, poor vaccine responses. Diagnosis?',h:'Most common symptomatic primary immunodeficiency',o:[{id:'a',txt:'Common Variable Immunodeficiency (CVID)',c:1,p:100},{id:'b',txt:'X-linked agammaglobulinemia',c:0,p:30},{id:'c',txt:'IgA deficiency only',c:0,p:20}],fb:{1:'<b>Correct!</b> CVID: Low IgG + low IgA or IgM + poor vaccine response. Age >4. Most common symptomatic PID in adults.',0:'<b>CVID:</b> Low IgG/IgA/IgM + poor vaccine responses + exclusion of other causes.'}},
{t:'CVID vs XLA',q:'Male infant with no B cells (CD19 0%). Likely diagnosis?',h:'Absent B cells key finding',o:[{id:'a',txt:'X-linked agammaglobulinemia (Bruton)',c:1,p:100},{id:'b',txt:'CVID',c:0,p:30},{id:'c',txt:'SCID',c:0,p:20}],fb:{1:'<b>Correct!</b> XLA: Male, absent B cells (BTK mutation), very low all Ig classes. Presents 6-12 months when maternal Ab wanes.',0:'<b>XLA:</b> No B cells. Males. Very low immunoglobulins. Recurrent bacterial infections.'}},
{t:'IgG Replacement',q:'CVID treatment mainstay?',h:'Replace the deficient immunoglobulin',o:[{id:'a',txt:'IgG replacement (IVIG or SCIG) lifelong',c:1,p:100},{id:'b',txt:'Prophylactic antibiotics only',c:0,p:30},{id:'c',txt:'Bone marrow transplant',c:0,p:10}],fb:{1:'<b>Correct!</b> IgG replacement standard: IVIG q3-4wks or SCIG weekly. Target trough IgG >500-700. Reduces infections dramatically.',0:'<b>IgG replacement:</b> IVIG or SCIG lifelong. Target adequate trough levels.'}},
{t:'SCIG vs IVIG',q:'Advantage of subcutaneous Ig (SCIG) over IVIG?',h:'Route differences',o:[{id:'a',txt:'Home administration, steady levels, fewer systemic reactions',c:1,p:100},{id:'b',txt:'Higher peak levels',c:0,p:20},{id:'c',txt:'Less frequent dosing',c:0,p:30}],fb:{1:'<b>Correct!</b> SCIG: Home self-administration, stable serum levels (no peaks/troughs), fewer systemic side effects. Weekly dosing.',0:'<b>SCIG:</b> Home-based, steady levels, fewer reactions vs IVIG.'}},
{t:'Hyper-IgE Syndrome',q:'Recurrent Staph abscesses + eczema + very high IgE + retained teeth. Syndrome?',h:'Job syndrome',o:[{id:'a',txt:'Hyper-IgE Syndrome (HIES/Job syndrome)',c:1,p:100},{id:'b',txt:'Atopic dermatitis',c:0,p:30},{id:'c',txt:'CGD',c:0,p:20}],fb:{1:'<b>Correct!</b> HIES: STAT3 mutation. Cold abscesses, pneumatoceles, eczema, retained primary teeth, coarse facies, scoliosis. IgE often >2000.',0:'<b>HIES:</b> Cold Staph abscesses, pneumatoceles, skeletal abnormalities, very high IgE.'}},
{t:'CGD Pattern',q:'Recurrent catalase-positive organism infections (Staph, Aspergillus, Serratia). Defect?',h:'NADPH oxidase deficiency',o:[{id:'a',txt:'Chronic Granulomatous Disease (CGD)',c:1,p:100},{id:'b',txt:'CVID',c:0,p:10},{id:'c',txt:'Complement deficiency',c:0,p:20}],fb:{1:'<b>Correct!</b> CGD: NADPH oxidase defect. Cant kill catalase+ organisms. DHR flow cytometry or NBT test for diagnosis.',0:'<b>CGD:</b> Catalase+ infections (SPLAANE: Staph, Pseudomonas, Listeria, Aspergillus, Nocardia, E.coli).'}},
{t:'Complement Deficiency',q:'Recurrent Neisseria infections (meningococcus). Suspect?',h:'Terminal complement pathway',o:[{id:'a',txt:'Terminal complement deficiency (C5-C9)',c:1,p:100},{id:'b',txt:'IgG deficiency',c:0,p:20},{id:'c',txt:'T-cell deficiency',c:0,p:10}],fb:{1:'<b>Correct!</b> Terminal complement (MAC) deficiency: Recurrent Neisseria. Check CH50 (total hemolytic complement). Vaccinate for Neisseria.',0:'<b>Complement:</b> Neisseria = terminal complement. CH50 screens all complement components.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🛡️ The Infection Prone</h1><p style="color:var(--muted);margin-bottom:32px">Immunodeficiency: CVID, XLA, HIES, CGD, complement deficiency, IgG replacement</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🔬 Immune Evaluation</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Immunodeficiency Pearls</div><div class="pearl-item"><b>CVID:</b> Low IgG + IgA/IgM + poor vaccine response</div><div class="pearl-item"><b>XLA:</b> Males, absent B cells, very low all Ig</div><div class="pearl-item"><b>HIES:</b> Cold abscesses, pneumatoceles, IgE >2000</div><div class="pearl-item"><b>CGD:</b> Catalase+ infections (DHR test)</div><div class="pearl-item"><b>Complement:</b> Neisseria = terminal complement (CH50)</div></div><div class="cross-link"><a href="../mechanism/immunodeficiency-module.html">MechanismDx: Immunodeficiency</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
