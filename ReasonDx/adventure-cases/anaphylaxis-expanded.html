<script>
let currentStage = 0, score = 0, maxScore = 0, difficulty = 'standard', answeredQuestions = new Set(), decisionPath = [];

const stages = [
    {
        title: "The Call",
        content: `<div class="narrative"><p>The triage nurse pages urgently: <em>"32-year-old woman, ate shrimp at a restaurant 15 minutes ago. Now has hives everywhere, lips swelling, and she says her throat feels tight."</em></p><p style="margin-top:12px;">She's being wheeled in now.</p></div>
        <div class="socratic-prompt"><h4>Anticipate Before You See</h4><p>Before this patient arrives, what vital sign abnormalities would you PREDICT in anaphylaxis, and what is the physiological mechanism?</p></div>`,
        hint_beginner: "Anaphylaxis causes massive vasodilation. What happens to blood pressure when vessels dilate?",
        hint_advanced: "Why might some anaphylaxis patients present with bradycardia instead of tachycardia? (Think Bezold-Jarisch reflex)",
        question: {
            prompt: "What hemodynamic changes would you EXPECT in anaphylaxis, and why?",
            options: [
                { text: "Hypotension + tachycardia: massive vasodilation reduces SVR, heart compensates with increased rate", correct: true },
                { text: "Hypertension + tachycardia: catecholamine surge causes vasoconstriction", correct: false },
                { text: "Normal vital signs are typical in early anaphylaxis", correct: false },
                { text: "Hypotension + bradycardia in all cases due to vagal response", correct: false }
            ],
            explanation: {
                correct: "Anaphylaxis causes massive histamine-mediated vasodilation → decreased SVR → hypotension. The heart compensates with tachycardia. Capillary leak compounds the problem by reducing effective circulating volume. Some patients may have paradoxical bradycardia (Bezold-Jarisch reflex).",
                incorrect: "The classic pattern is hypotension + tachycardia due to vasodilation and compensatory response. Histamine and other mediators cause profound vasodilation, not vasoconstriction."
            },
            teaching: `<h4>Hemodynamics of Anaphylaxis</h4><div class="mechanism-box"><div class="mechanism-title">The Cascade</div><div class="pathway">IgE crosslinking on mast cells/basophils
→ Massive degranulation
→ Histamine, tryptase, leukotrienes, PAF release
→ Vasodilation (↓ SVR) + capillary leak
→ Hypotension + relative hypovolemia
→ Compensatory tachycardia</div></div><p style="margin-top:12px;"><strong>Up to 35% of intravascular volume can shift to extravascular space within minutes.</strong></p>`,
            why_chain: [{q: "Why do some patients have bradycardia?", a: "Bezold-Jarisch reflex: severe hypovolemia triggers vagal receptors in the underfilled ventricle, causing paradoxical bradycardia. This is a poor prognostic sign."}, {q: "Why is epinephrine the antidote?", a: "Epinephrine reverses EVERY pathologic mechanism: α1 causes vasoconstriction (↑BP, ↓edema), β1 increases cardiac output, β2 causes bronchodilation AND stabilizes mast cells to stop further mediator release."}],
            points: 10
        }
    },
    {
        title: "First Look",
        content: `<div class="narrative"><p>The patient arrives:</p><ul style="margin-top:8px;"><li><strong>Vitals:</strong> BP 78/50, HR 125, RR 28, SpO2 88% on RA</li><li><strong>Appearance:</strong> Diffuse urticaria, angioedema of lips/tongue, audible stridor, diffuse wheezing</li></ul></div>
        <div class="socratic-prompt"><h4>Recognize the Pattern</h4><p>This patient has skin findings (urticaria, angioedema), respiratory findings (stridor, wheezing), and cardiovascular findings (hypotension). How many organ systems must be involved to diagnose anaphylaxis?</p></div>`,
        hint_beginner: "The diagnostic criteria require involvement of how many systems after allergen exposure?",
        hint_advanced: "Can you diagnose anaphylaxis WITHOUT skin findings? What percentage of cases lack urticaria?",
        question: {
            prompt: "What are the diagnostic criteria for anaphylaxis?",
            options: [
                { text: "Acute onset with skin/mucosal involvement PLUS respiratory compromise OR hypotension (or 2+ systems after known allergen)", correct: true },
                { text: "Urticaria is required for diagnosis - no hives means no anaphylaxis", correct: false },
                { text: "Hypotension alone is sufficient for diagnosis", correct: false },
                { text: "Must have all four systems involved: skin, respiratory, cardiovascular, and GI", correct: false }
            ],
            explanation: {
                correct: "Criterion 1: Acute onset + skin/mucosal involvement + (respiratory OR cardiovascular). Criterion 2: Known allergen + 2+ systems (skin, respiratory, CV, GI). Criterion 3: Hypotension alone after known allergen. IMPORTANT: 10-20% of anaphylaxis has NO skin findings!",
                incorrect: "Anaphylaxis does NOT require skin findings - 10-20% of cases lack urticaria. The criteria focus on multi-system involvement, not a specific organ."
            },
            teaching: `<h4>System Involvement in Anaphylaxis</h4><table class="comparison-table"><tr><th>System</th><th>Manifestations</th><th>Frequency</th></tr><tr><td>Skin/Mucosal</td><td>Urticaria, flushing, angioedema</td><td>80-90%</td></tr><tr><td>Respiratory</td><td>Dyspnea, wheeze, stridor</td><td>70%</td></tr><tr><td>Cardiovascular</td><td>Hypotension, tachycardia</td><td>45%</td></tr><tr><td>GI</td><td>Nausea, vomiting, cramping</td><td>45%</td></tr></table><div class="alert-box"><div class="alert-title">Don't Wait for Hives!</div><p>Cardiovascular collapse can occur without urticaria. If hypotensive after allergen exposure, treat as anaphylaxis.</p></div>`,
            why_chain: [{q: "Why might skin findings be absent?", a: "In severe anaphylaxis with profound hypotension, blood is shunted away from skin to vital organs. Cutaneous manifestations may appear AFTER resuscitation restores perfusion."}, {q: "What's the difference between anaphylaxis and anaphylactoid?", a: "Older terminology. 'Anaphylactoid' meant non-IgE mediated (e.g., contrast, opioids). Now we use 'immunologic' vs 'non-immunologic' anaphylaxis - treatment is identical."}],
            points: 10
        }
    },
    {
        title: "First Intervention",
        content: `<div class="narrative"><p>You've diagnosed anaphylaxis. The nurse has the medication cart ready and asks what to give first.</p><p style="margin-top:12px;">Available: Epinephrine, diphenhydramine, methylprednisolone, albuterol, IV fluids</p></div>
        <div class="socratic-prompt"><h4>The Critical Decision</h4><p>What is the FIRST medication to give in anaphylaxis, and by what route? This decision may be life-or-death.</p></div>`,
        hint_beginner: "There's only ONE first-line medication in anaphylaxis. Everything else is adjunctive.",
        hint_advanced: "Why is IM preferred over subcutaneous? What's the absorption difference and why does it matter?",
        question: {
            prompt: "What is the first-line treatment for anaphylaxis?",
            options: [
                { text: "Epinephrine 0.3-0.5mg IM in the anterolateral thigh - give immediately", correct: true },
                { text: "Diphenhydramine 50mg IV - antihistamines block the allergic response", correct: false },
                { text: "Methylprednisolone 125mg IV - steroids reduce inflammation", correct: false },
                { text: "IV fluids first to restore blood pressure, then medications", correct: false }
            ],
            explanation: {
                correct: "EPINEPHRINE IM is THE treatment for anaphylaxis. There are NO absolute contraindications. Give 0.3-0.5mg (0.01mg/kg in children) IM in the anterolateral thigh. Can repeat every 5-15 minutes. Delayed epinephrine = increased mortality.",
                incorrect: "Antihistamines, steroids, and fluids are all ADJUNCTS - they do NOT treat the life-threatening features of anaphylaxis. Only epinephrine reverses hypotension, bronchospasm, and angioedema."

function shuffleArray(arr) { const s=[...arr]; for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];} return s; }
function setDifficulty(l,b) { difficulty=l; document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderStage(currentStage); }

function renderStage(i) {
    const s=stages[i], opts=shuffleArray(s.question.options.map((o,idx)=>({...o,idx}))), ltrs='ABCD';
    let hints='';
    if(difficulty==='beginner'&&s.hint_beginner) hints=`<div class="hint-beginner" style="display:block;">💡 ${s.hint_beginner}</div>`;
    else if(difficulty==='advanced'&&s.hint_advanced) hints=`<div class="hint-advanced" style="display:block;">🎯 ${s.hint_advanced}</div>`;
    const why=s.question.why_chain?`<div class="why-chain" id="why"><h4>🔗 WHY Chain</h4>${s.question.why_chain.map(w=>`<div class="why-item"><div class="why-q">❓ ${w.q}</div><div class="why-a">${w.a}</div></div>`).join('')}</div>`:'';
    document.getElementById('progress').style.width=((i)/stages.length*100)+'%';
    document.getElementById('scene-container').innerHTML=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${i+1} of ${stages.length}</div><div class="scene-title">${s.title}</div></div>${s.content}${hints}<div class="question-box"><div class="question-prompt">${s.question.prompt}</div><div class="mcq-options">${opts.map((o,j)=>`<div class="mcq-option" data-correct="${o.correct}" onclick="selectOption(this,${i})"><span class="option-letter">${ltrs[j]}</span><span class="option-text">${o.text}</span></div>`).join('')}</div><div class="feedback correct-feedback" id="fb-c"><div class="feedback-title">✓ Excellent!</div><div class="feedback-explanation">${s.question.explanation.correct}</div></div><div class="feedback incorrect-feedback" id="fb-i"><div class="feedback-title">✗ Not Quite</div><div class="feedback-explanation">${s.question.explanation.incorrect}</div></div><div class="teaching-point" id="teach">${s.question.teaching}</div>${why}<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div></div>`;
}

function selectOption(el,i) {
    if(answeredQuestions.has(i)) return;
    const c=el.dataset.correct==='true', s=stages[i];
    answeredQuestions.add(i); decisionPath.push({stage:s.title,correct:c,points:c?s.question.points:0});
    if(c) score+=s.question.points; maxScore+=s.question.points;
    document.getElementById('score').textContent=score; document.getElementById('maxScore').textContent=maxScore;
    document.querySelectorAll('.mcq-option').forEach(o=>{o.classList.add('disabled');if(o.dataset.correct==='true')o.classList.add('correct');else if(o===el&&!c)o.classList.add('incorrect');});
    document.getElementById(c?'fb-c':'fb-i').classList.add('show');
    document.getElementById('teach').classList.add('show');
    const w=document.getElementById('why'); if(w)w.classList.add('show');
    document.getElementById('next-btn').classList.add('show');
}

function nextStage() { if(++currentStage<stages.length){renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'});}else showCompletion(); }

function showCompletion() {
    const p=Math.round(score/maxScore*100);
    let g,m,clr;
    if(p>=90){g='Outstanding!';clr='#22c55e';m='Excellent understanding of anaphylaxis management!';}
    else if(p>=80){g='Great Work!';clr='#3b82f6';m='Strong grasp of anaphylaxis. Review refractory management.';}
    else if(p>=70){g='Good Progress';clr='#f59e0b';m='Solid foundation. Focus on epinephrine first and positioning.';}
    else{g='Keep Learning';clr='#ef4444';m='Review epinephrine dosing, adjunct roles, and discharge planning.';}
    document.getElementById('scene-container').innerHTML=`<div class="scene completion"><div class="completion-grade" style="color:${clr}">${g}</div><div class="completion-percent" style="color:${clr}">${p}%</div><div style="font-size:1.3rem;margin-bottom:8px">${score}/${maxScore} points</div><div class="completion-message">${m}</div><div class="completion-breakdown"><h4>Your Clinical Journey</h4>${decisionPath.map((d,j)=>`<div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;"><span><span style="color:${d.correct?'#22c55e':'#ef4444'}">${d.correct?'✓':'✗'}</span> Stage ${j+1}: ${d.stage}</span><span style="color:#94a3b8">${d.points}/${stages[j].question.points}pts</span></div>`).join('')}</div><div class="crossplatform"><h4>Continue Learning</h4><div class="crossplatform-links"><a href="#" class="crossplatform-link">🧬 MechanismDx: Hypersensitivity Reactions</a><a href="#" class="crossplatform-link">📚 Related: Angioedema Case</a><a href="javascript:location.reload()" class="crossplatform-link">🔄 Restart</a></div></div></div>`;
    document.getElementById('progress').style.width='100%';
}

document.addEventListener('DOMContentLoaded',()=>renderStage(0));


// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}

</script>

<!-- Visual Debrief Overlay -->
<div class="debrief-overlay" id="debriefOverlay" onclick="if(event.target===this)closeDebrief()">
    <div class="debrief-content" id="debriefContent"></div>
</div>

</body>
</html>
