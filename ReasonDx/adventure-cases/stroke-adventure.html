<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Brain Attack | ReasonDx Adventure</title>
    <style>
        :root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#7C3AED;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}
        *{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
        .header{background:linear-gradient(135deg,#5B21B6,#7C3AED);padding:12px 20px;position:sticky;top:0;z-index:100}
        .header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}
        .diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}
        .stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}
        .main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}
        .card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}
        .narrative{background:rgba(124,58,237,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(124,58,237,.3);padding:2px 6px;border-radius:4px}
        .setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}
        .start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}
        .hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}
        .radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}
        .radio-option.selected{border-color:var(--accent);background:rgba(124,58,237,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}
        .radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}
        .feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}
        .btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}
        .vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital.critical{background:rgba(220,38,38,.2);border:1px solid rgba(220,38,38,.4)}
        .vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}
        .lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}
        .score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
        .pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}
        .cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}
        .progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%}
        .question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
    </style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🧠 The Brain Attack</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'68M',wt:'82kg',hx:'Sudden R arm/leg weakness, slurred speech 1hr ago',exam:'R hemiparesis, dysarthria, L gaze deviation',vitals:{HR:'88',BP:'178/98',RR:'16'},labs:{Glu:'142',NIHSS:'14',CT:'No hemorrhage'}},
int:{age:'72F',wt:'65kg',hx:'Found with L weakness, last known well 6hrs ago',exam:'L hemiplegia, neglect, aphasia',vitals:{HR:'92',BP:'195/105',RR:'18'},labs:{Glu:'168',NIHSS:'18',CT:'Hyperdense MCA'}},
adv:{age:'55M',wt:'90kg',hx:'Collapse 2hrs ago, on warfarin for AFib',exam:'Unresponsive, posturing, blown pupil',vitals:{HR:'62',BP:'210/120',RR:'8'},labs:{Glu:'126',INR:'2.8',CT:'Large ICH with midline shift'}}};
const Q=[
{t:'tPA Window',q:'IV alteplase window for ischemic stroke?',h:'Time is brain',o:[{id:'a',txt:'0-4.5 hours from last known well',c:1,p:100},{id:'b',txt:'0-3 hours only',c:0,p:50},{id:'c',txt:'0-6 hours',c:0,p:20}],fb:{1:'<b>Correct!</b> tPA: 0-4.5 hrs. Door-to-needle goal <60 min. Additional exclusions 3-4.5 hr window.',0:'<b>Window:</b> Up to 4.5 hours with specific criteria.'}},
{t:'tPA Dosing',q:'Alteplase dose for acute ischemic stroke?',h:'Different from MI dosing',o:[{id:'a',txt:'0.9 mg/kg (max 90mg): 10% bolus, 90% over 60 min',c:1,p:100},{id:'b',txt:'100 mg total',c:0,p:20},{id:'c',txt:'0.6 mg/kg',c:0,p:30}],fb:{1:'<b>Correct!</b> Stroke: 0.9 mg/kg, max 90mg. 10% bolus + 90% infusion. Lower than MI to reduce ICH.',0:'<b>Dosing:</b> 0.9 mg/kg (max 90), 10% bolus + 90% over 1 hour.'}},
{t:'BP Before tPA',q:'BP threshold before giving tPA?',h:'Must lower for safe thrombolysis',o:[{id:'a',txt:'Lower if >185/110',c:1,p:100},{id:'b',txt:'Lower if >140/90',c:0,p:0},{id:'c',txt:'Never lower BP',c:0,p:0}],fb:{1:'<b>Correct!</b> Pre-tPA: lower if >185/110. Post-tPA: maintain <180/105 x24hrs.',0:'<b>tPA BP limits:</b> <185/110 before, <180/105 after.'}},
{t:'BP Without tPA',q:'Ischemic stroke NOT getting tPA. Treat BP when?',h:'Permissive hypertension',o:[{id:'a',txt:'Only if >220/120',c:1,p:100},{id:'b',txt:'Treat any BP >140',c:0,p:0},{id:'c',txt:'Treat if >180',c:0,p:30}],fb:{1:'<b>Correct!</b> Without tPA: permissive HTN, only treat >220/120. Aggressive lowering worsens penumbra.',0:'<b>Permissive HTN:</b> Allow up to 220/120 without thrombolysis.'}},
{t:'LVO Screening',q:'Which suggests large vessel occlusion needing thrombectomy?',h:'NIHSS and cortical signs',o:[{id:'a',txt:'NIHSS ≥6, cortical signs (aphasia, neglect, gaze)',c:1,p:100},{id:'b',txt:'Any NIHSS',c:0,p:20},{id:'c',txt:'Lacunar only',c:0,p:0}],fb:{1:'<b>Correct!</b> LVO: NIHSS ≥6, cortical signs, hyperdense vessel. CTA confirms. Thrombectomy up to 24hrs with good imaging.',0:'<b>LVO screening:</b> High NIHSS + cortical signs = get CTA.'}},
{t:'Thrombectomy Window',q:'Mechanical thrombectomy window?',h:'DAWN, DEFUSE-3 extended it',o:[{id:'a',txt:'Up to 24 hours with favorable perfusion imaging',c:1,p:100},{id:'b',txt:'0-6 hours only',c:0,p:40},{id:'c',txt:'Same as tPA',c:0,p:20}],fb:{1:'<b>Correct!</b> DAWN/DEFUSE-3: up to 24 hrs with small core, large penumbra on perfusion imaging.',0:'<b>Extended window:</b> 6-24 hours if favorable imaging.'}},
{t:'ICH Reversal',q:c=>c.labs.INR>2?'INR 2.8 with ICH. Reversal?':'Warfarin reversal in ICH?',h:'Rapid reversal critical',o:[{id:'a',txt:'4-factor PCC + Vitamin K 10mg IV',c:1,p:100},{id:'b',txt:'FFP alone',c:0,p:30},{id:'c',txt:'Vitamin K alone',c:0,p:20}],fb:{1:'<b>Correct!</b> ICH + warfarin: 4F-PCC (25-50 U/kg) for rapid reversal + Vit K for sustained effect.',0:'<b>ICH reversal:</b> PCC >> FFP for speed.'}},
{t:'ICH BP Target',q:'Target BP in acute ICH?',h:'INTERACT2, ATACH-2',o:[{id:'a',txt:'SBP <140 if presenting 150-220',c:1,p:100},{id:'b',txt:'SBP <180',c:0,p:40},{id:'c',txt:'SBP <120',c:0,p:20}],fb:{1:'<b>Correct!</b> ICH: Target SBP <140 if presenting 150-220. More aggressive than ischemic. Reduces hematoma expansion.',0:'<b>ICH BP:</b> More aggressive than ischemic stroke. Target <140.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1],c=C[S.diff];let opts=q.o;if(q.dyn){const corr=q.dyn(c);opts=opts.map(o=>({...o,c:o.id===corr?1:0,p:o.id===corr?100:o.p||0}));}const opt=opts.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=opts.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML=`<div class="feedback ${opt&&opt.c?'excellent':'incorrect'}">${q.fb[opt&&opt.c?1:0]}</div>`;document.getElementById('sub').textContent=S.q<S.total?'Next →':'Results →';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML=`<div class="setup-screen"><h1>🧠 The Brain Attack</h1><p style="color:var(--muted);margin-bottom:32px">Stroke: tPA criteria, dosing, BP management, thrombectomy, ICH</p><button class="start-btn" onclick="go('pres')">Begin Case →</button></div>`;}else if(S.stage==='pres'){document.getElementById('app').innerHTML=`<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">⚡ Acute Neurologic Emergency</div></div><div class="card-body"><div class="narrative"><span class="hl">${c.age}</span> (${c.wt})<br><b>Hx:</b> ${c.hx}<br><b>Exam:</b> ${c.exam}</div><div class="vitals-grid">${Object.entries(c.vitals).map(([k,v])=>`<div class="vital"><div class="vital-label">${k}</div><div class="vital-value">${v}</div></div>`).join('')}</div><div class="lab-grid">${Object.entries(c.labs).map(([k,v])=>`<div class="lab-item"><span class="lab-name">${k}</span><span class="lab-value">${v}</span></div>`).join('')}</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment →</button></div></div></div>`;}else if(S.stage==='question'){const q=Q[S.q-1];const qTxt=typeof q.q==='function'?q.q(c):q.q;document.getElementById('app').innerHTML=`<div class="card"><div class="card-header"><div class="card-phase">Q${S.q}/${S.total}</div><div class="card-title">🔍 ${q.t}</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:${S.q/S.total*100}%"></div></div><div class="question-header"><div class="question-number">${S.q}</div><div style="font-weight:600">${qTxt}</div></div><div class="hint">💡 ${q.h}</div><div class="radio-options">${q.o.map(o=>`<div class="radio-option" data-id="${o.id}" onclick="pick('${o.id}')"><div class="radio-circle"></div><div><b>${o.txt}</b></div></div>`).join('')}</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit →</button></div></div></div>`;}else{const pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML=`<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">${pct>=70?'🎉':'📚'}</div><div style="font-size:2rem;font-weight:700;color:${pct>=70?'var(--success)':'var(--warning)'}">${pct>=70?'Complete!':'Review'}</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>${S.score}/${S.max} (${pct}%)</span></div></div><div class="pearls-box"><div class="pearls-title">📌 Stroke Pearls</div><div class="pearl-item"><b>tPA:</b> 0-4.5 hrs, 0.9 mg/kg (max 90), 10% bolus</div><div class="pearl-item"><b>BP pre-tPA:</b> <185/110. Post-tPA: <180/105 x24hrs</div><div class="pearl-item"><b>No tPA:</b> Permissive HTN, treat only >220/120</div><div class="pearl-item"><b>Thrombectomy:</b> Up to 24hrs with favorable imaging</div><div class="pearl-item"><b>ICH:</b> Target SBP <140. PCC + Vit K for warfarin reversal</div></div><div class="cross-link"><a href="../mechanism/stroke-module.html">MechanismDx: Stroke</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href='adventure-hub.html'">Back</button></div></div></div>`;}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
