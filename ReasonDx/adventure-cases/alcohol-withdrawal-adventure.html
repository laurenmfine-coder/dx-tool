<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shaking Patient | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#F59E0B;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#D97706,#F59E0B);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(245,158,11,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(245,158,11,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#000;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(245,158,11,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#000}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#000;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🍺 The Shaking Patient</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'52M',wt:'78kg',hx:'Last drink 24hrs ago, tremor, anxiety, sweating',exam:'Tremulous, tachycardic, diaphoretic, oriented',vitals:{HR:'108',BP:'158/92',T:'37.8'},labs:{BAL:'0',Mg:'1.4',CIWA:'14'}},int:{age:'45M',wt:'82kg',hx:'Heavy drinker, last drink 48hrs ago, now hallucinating',exam:'Visual hallucinations, tremor, agitated but oriented',vitals:{HR:'118',BP:'172/98',T:'38.2'},labs:{BAL:'0',K:'3.2',CIWA:'22'}},adv:{age:'58M',wt:'75kg',hx:'Last drink 72hrs ago, seizing, confused',exam:'GTC seizure, then obtunded, diaphoretic',vitals:{HR:'128',BP:'182/108',T:'39.2'},labs:{Lactate:'4.2',Glu:'68',CIWA:'Unable'}}};
const Q=[
{t:'Timeline',q:'AWS symptoms typically begin when after last drink?',h:'Predictable timeline',o:[{id:'a',txt:'6-24 hours (tremor, anxiety); seizures 24-48hrs; DTs 48-96hrs',c:1,p:100},{id:'b',txt:'Immediately',c:0,p:10},{id:'c',txt:'After 1 week',c:0,p:0}],fb:{1:'<b>Correct!</b> Minor withdrawal 6-24hrs. Seizures 24-48hrs. DTs peak 48-96hrs. Can overlap.',0:'<b>Timeline:</b> Minor 6-24hr, seizures 24-48hr, DTs 48-96hr.'}},
{t:'CIWA Protocol',q:'CIWA-Ar score 18. Recommended action?',h:'Symptom-triggered dosing',o:[{id:'a',txt:'Give benzodiazepine, recheck CIWA in 1 hour',c:1,p:100},{id:'b',txt:'Observe only',c:0,p:20},{id:'c',txt:'Fixed-dose benzodiazepine schedule',c:0,p:40}],fb:{1:'<b>Correct!</b> CIWA-Ar: <8 hold, 8-15 consider treatment, >15 treat. Symptom-triggered uses less benzo and shorter ICU stay.',0:'<b>CIWA:</b> Symptom-triggered > fixed-dose. Recheck after each dose.'}},
{t:'Drug of Choice',q:'First-line medication for alcohol withdrawal?',h:'GABA agonist',o:[{id:'a',txt:'Benzodiazepines (diazepam, lorazepam, chlordiazepoxide)',c:1,p:100},{id:'b',txt:'Phenobarbital first',c:0,p:40},{id:'c',txt:'Antipsychotics',c:0,p:10}],fb:{1:'<b>Correct!</b> Benzos first-line. Long-acting (diazepam) for self-tapering. Lorazepam if liver disease. Phenobarbital for refractory.',0:'<b>First-line:</b> Benzodiazepines. Cross-tolerance with alcohol via GABA.'}},
{t:'DTs Features',q:'Delirium tremens characterized by?',h:'Most severe form',o:[{id:'a',txt:'Delirium + autonomic instability + hallucinations (mortality 5-15% untreated)',c:1,p:100},{id:'b',txt:'Tremor only',c:0,p:10},{id:'c',txt:'Mild anxiety',c:0,p:0}],fb:{1:'<b>Correct!</b> DTs: Altered mental status, autonomic hyperactivity, hallucinations. 5-15% mortality if untreated. ICU admission.',0:'<b>DTs:</b> Delirium + autonomic storm + hallucinations. Medical emergency.'}},
{t:'Refractory Treatment',q:'High-dose benzos not controlling DTs. Add what?',h:'Phenobarbital rescue',o:[{id:'a',txt:'Phenobarbital (alternative GABA agonist)',c:1,p:100},{id:'b',txt:'More diazepam only',c:0,p:30},{id:'c',txt:'Haloperidol alone',c:0,p:20}],fb:{1:'<b>Correct!</b> Phenobarbital for benzo-resistant cases (different GABA-A subunit). Propofol/dexmedetomidine if ICU. Avoid antipsychotics alone.',0:'<b>Refractory:</b> Phenobarbital, propofol, or dexmedetomidine.'}},
{t:'Thiamine',q:'Thiamine in alcohol withdrawal. When to give?',h:'Prevent Wernicke',o:[{id:'a',txt:'BEFORE glucose (prevent Wernicke encephalopathy)',c:1,p:100},{id:'b',txt:'After stabilization',c:0,p:30},{id:'c',txt:'Only if symptomatic',c:0,p:20}],fb:{1:'<b>Correct!</b> Thiamine 100-500mg IV BEFORE glucose. Glucose without thiamine can precipitate Wernicke (confusion, ataxia, ophthalmoplegia).',0:'<b>Thiamine first!</b> Always before glucose. Prevents Wernicke.'}},
{t:'Electrolytes',q:'Key electrolytes to replete in AWS?',h:'Chronic deficiencies',o:[{id:'a',txt:'Magnesium, potassium, phosphorus (all commonly low)',c:1,p:100},{id:'b',txt:'Sodium only',c:0,p:10},{id:'c',txt:'Calcium only',c:0,p:10}],fb:{1:'<b>Correct!</b> Chronic alcoholics: Low Mg, K, Phos. Low Mg lowers seizure threshold and causes refractory hypokalemia.',0:'<b>Electrolytes:</b> Replete Mg, K, Phos. Mg especially important.'}},
{t:'Seizure Risk',q:'Risk factors for withdrawal seizures?',h:'Kindling phenomenon',o:[{id:'a',txt:'Prior withdrawal seizures, prior DTs, concurrent illness, low Mg',c:1,p:100},{id:'b',txt:'Young age',c:0,p:10},{id:'c',txt:'Short drinking history',c:0,p:0}],fb:{1:'<b>Correct!</b> Kindling: Each withdrawal increases seizure risk. Also: prior seizures, prior DTs, heavy/prolonged use, concurrent illness, low Mg.',0:'<b>Risk factors:</b> Kindling effect - prior withdrawals increase risk.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🍺 The Shaking Patient</h1><p style="color:var(--muted);margin-bottom:32px">Alcohol Withdrawal: Timeline, CIWA, benzos, DTs, thiamine, electrolytes</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🏥 Withdrawal Emergency</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Alcohol Withdrawal Pearls</div><div class="pearl-item"><b>Timeline:</b> Minor 6-24hr, seizures 24-48hr, DTs 48-96hr</div><div class="pearl-item"><b>CIWA:</b> Symptom-triggered dosing superior</div><div class="pearl-item"><b>First-line:</b> Benzodiazepines</div><div class="pearl-item"><b>Thiamine:</b> Give BEFORE glucose</div><div class="pearl-item"><b>Electrolytes:</b> Replete Mg, K, Phos</div></div><div class="cross-link"><a href="../mechanism/toxicology.html">MechanismDx: Toxicology</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
