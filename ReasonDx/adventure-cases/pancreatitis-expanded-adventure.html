<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','diagnosis','etiology','severity','fluids','nutrition','complications','necrotizing','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">🥞 Pancreatitis Complete<span class="badge">9 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 9</div><div class="scene-title">Severe Epigastric Pain</div></div><div class="scene-body"><div class="narrative"><p>A <span class="highlight">48-year-old man</span> presents with <span class="critical">severe epigastric pain radiating to the back</span>, nausea, and vomiting for 8 hours. History of heavy alcohol use.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 110, BP 105/70, RR 22, T 100.8°F<br><strong>Exam:</strong> Diffuse abdominal tenderness, guarding, decreased bowel sounds<br><strong>Labs:</strong> Lipase 1,850 U/L (normal <60), WBC 14.2</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Pathophysiology</div><div class="pathway">Premature trypsinogen activation → trypsin<br>→ Autodigestion of pancreas<br>→ Local inflammation → cytokines<br>→ SIRS → potential MODS<br><br>Pain radiates to back (retroperitoneal)</div></div><button class="btn" onclick="nextStage()">Diagnosis →</button></div></div>`;
    };

    window.render_diagnosis = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 9</div><div class="scene-title">Making the Diagnosis</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Revised Atlanta Criteria (2 of 3)</div><table class="comparison-table"><tr><th>#</th><th>Criterion</th></tr><tr><td>1</td><td>Characteristic abdominal pain</td></tr><tr><td>2</td><td>Lipase (or amylase) ≥3× ULN</td></tr><tr><td>3</td><td>Imaging findings</td></tr></table><p style="margin-top:12px;">Pain + lipase ≥3× = diagnosis. CT NOT required!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Lipase vs Amylase</div><div class="pathway"><strong>Lipase preferred:</strong><br>• More specific for pancreas<br>• Stays elevated longer (8-14 days)<br><br>Degree of elevation ≠ severity!</div></div><button class="btn" onclick="nextStage()">Etiology →</button></div></div>`;
    };

    window.render_etiology = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 9</div><div class="scene-title">Causes: I GET SMASHED</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Etiologies</div><table class="comparison-table"><tr><th>Letter</th><th>Cause</th></tr><tr><td><strong>I</strong></td><td>Idiopathic (10-20%)</td></tr><tr><td><strong>G</strong></td><td>Gallstones (#1, 40%)</td></tr><tr><td><strong>E</strong></td><td>Ethanol (#2, 30%)</td></tr><tr><td><strong>T</strong></td><td>Trauma, ERCP</td></tr><tr><td><strong>S</strong></td><td>Steroids, drugs</td></tr><tr><td><strong>M</strong></td><td>Mumps, infections</td></tr><tr><td><strong>A</strong></td><td>Autoimmune (IgG4)</td></tr><tr><td><strong>S</strong></td><td>Scorpion stings</td></tr><tr><td><strong>H</strong></td><td>HyperTG, HyperCa</td></tr><tr><td><strong>E</strong></td><td>ERCP</td></tr><tr><td><strong>D</strong></td><td>Drugs (valproate, thiazides)</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ Always Get RUQ Ultrasound!</div><p>Evaluate for gallstones in ALL patients.</p></div><button class="btn" onclick="nextStage()">Severity →</button></div></div>`;
    };

    window.render_severity = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 9</div><div class="scene-title">Severity Assessment</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 BISAP Score</div><div class="pathway"><strong>B</strong>UN >25 mg/dL<br><strong>I</strong>mpaired mental status<br><strong>S</strong>IRS (≥2 criteria)<br><strong>A</strong>ge >60<br><strong>P</strong>leural effusion<br><br>Score ≥3 → severe pancreatitis</div></div><div class="alert-box"><div class="alert-title">🚨 Revised Atlanta Classification</div><p><strong>Mild:</strong> No organ failure, no complications<br><strong>Moderate:</strong> Transient organ failure (<48h)<br><strong>Severe:</strong> Persistent organ failure (>48h)</p></div><button class="btn" onclick="nextStage()">Fluids →</button></div></div>`;
    };

    window.render_fluids = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 9</div><div class="scene-title">Fluid Resuscitation</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Fluid Strategy</div><table class="comparison-table"><tr><th>Parameter</th><th>Recommendation</th></tr><tr><td>Fluid type</td><td>Lactated Ringer's preferred</td></tr><tr><td>Rate</td><td>250-500 mL/hr initially</td></tr><tr><td>Goals</td><td>HR <120, UOP ≥0.5 mL/kg/hr</td></tr></table></div><div class="why-chain"><div class="why-chain-title">🔗 WHY Chain</div><div class="why-item"><div class="why-q">Why aggressive fluids?</div>Third-spacing + vomiting → hypovolemia → pancreatic hypoperfusion → worsened necrosis.</div><div class="why-item"><div class="why-q">Why LR over NS?</div>NS causes hyperchloremic acidosis. LR may have anti-inflammatory effects.</div></div><button class="btn" onclick="nextStage()">Nutrition →</button></div></div>`;
    };

    window.render_nutrition = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 9</div><div class="scene-title">Early Feeding</div></div><div class="scene-body"><div class="alert-box"><div class="alert-title">🚨 Paradigm Shift: Early Feeding Is Better!</div><p>Old dogma: NPO to "rest pancreas"<br>New evidence: Early enteral feeding reduces infections and mortality!</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Nutrition Approach</div><table class="comparison-table"><tr><th>Severity</th><th>Approach</th></tr><tr><td>Mild</td><td>Oral diet when pain improving</td></tr><tr><td>Moderate-Severe</td><td>Enteral feeding within 48-72h</td></tr></table></div><div class="why-chain"><div class="why-chain-title">🔗 WHY Chain</div><div class="why-item"><div class="why-q">Why enteral > TPN?</div>Maintains gut barrier, reduces bacterial translocation, lowers infection rates.</div></div><button class="btn" onclick="nextStage()">Complications →</button></div></div>`;
    };

    window.render_complications = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 9</div><div class="scene-title">Local Complications</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Fluid Collections</div><table class="comparison-table"><tr><th>Timing</th><th>Non-necrotic</th><th>Necrotic</th></tr><tr><td><4 weeks</td><td>Acute fluid collection</td><td>Acute necrotic collection</td></tr><tr><td>>4 weeks</td><td>Pseudocyst</td><td>Walled-off necrosis (WON)</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Pseudocyst vs WON</div><div class="pathway"><strong>Pseudocyst:</strong> Fluid only, no solid<br>• Drain only if symptomatic/infected<br><br><strong>WON:</strong> Contains necrotic debris<br>• Higher infection risk<br>• May need necrosectomy</div></div><button class="btn" onclick="nextStage()">Necrotizing →</button></div></div>`;
    };

    window.render_necrotizing = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 9</div><div class="scene-title">Infected Necrosis</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Sterile vs Infected</div><table class="comparison-table"><tr><th>Feature</th><th>Sterile</th><th>Infected</th></tr><tr><td>Management</td><td>Supportive</td><td>Abx + drainage</td></tr><tr><td>CT clue</td><td>No gas</td><td>Gas bubbles</td></tr><tr><td>Mortality</td><td>~10%</td><td>~30%</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 Step-Up Approach</div><p>Delay intervention ≥4 weeks if possible!<br>Percutaneous drain → Endoscopic necrosectomy → Surgery (last resort)</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 When to Suspect Infection</div><div class="pathway">• Deterioration after initial improvement<br>• New fever, ↑WBC after 7-10 days<br>• Gas in pancreatic bed on CT</div></div><button class="btn" onclick="nextStage()">Debrief →</button></div></div>`;
    };

    window.render_debrief = function() {
        return `<div class="scene"><div style="text-align:center;padding:40px;"><div style="font-size:4rem;margin-bottom:12px;">🥞</div><div style="font-size:1.8rem;font-weight:700;color:#4ade80;">Pancreatitis Mastery Complete!</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 High-Yield Summary</div><table class="comparison-table"><tr><th>Concept</th><th>Key Point</th></tr><tr><td>Diagnosis</td><td>2 of 3: pain + lipase ≥3× + imaging</td></tr><tr><td>Top causes</td><td>Gallstones (#1), Alcohol (#2)</td></tr><tr><td>Fluids</td><td>LR preferred, goal-directed</td></tr><tr><td>Nutrition</td><td>Early enteral (don't keep NPO!)</td></tr><tr><td>Severity</td><td>BISAP; persistent organ failure = severe</td></tr><tr><td>Infected necrosis</td><td>Gas on CT; step-up approach</td></tr></table></div><div class="tips"><div class="pearl"><div class="tip-header">✓ Pearls</div><ul style="margin-left:16px;"><li>Always RUQ ultrasound</li><li>Lipase level ≠ severity</li><li>Early feeding is better</li><li>Delay intervention for WON</li></ul></div><div class="pitfall"><div class="tip-header">✗ Pitfalls</div><ul style="margin-left:16px;"><li>Keeping NPO too long</li><li>CT too early (<72h)</li><li>Prophylactic antibiotics</li><li>Early surgical necrosectomy</li></ul></div></div><button class="btn" onclick="state.stage=0;render()">🔄 Restart Case</button></div></div>`;
    };

    render();
    </script>

<script>
// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
    
    // Auto-inject hint examples into existing content
    window.rdxInit = function() {
        // Could add dynamic hint injection here based on difficulty
        console.log('ReasonDx Enhanced Features loaded for: Pancreatitis Expanded Adventure');
    };
    
    // Initialize on load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.rdxInit);
    } else {
        window.rdxInit();
    }
})();
