<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>The Persistent Fever | ReasonDx Adventure</title><style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#EC4899;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#DB2777,#EC4899);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(236,72,153,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(236,72,153,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(236,72,153,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(236,72,153,.1);border:1px solid rgba(236,72,153,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#F9A8D4;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style></head><body><header class="header"><div class="header-row"><div style="font-weight:600">🩺 The Persistent Fever</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header><main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};const C={easy:{age:'3yo M',wt:'14kg',hx:'Fever x5 days, red eyes, cracked lips, rash, swollen hands',exam:'Irritable, bilateral conjunctivitis, strawberry tongue, polymorphous rash, edematous hands',vitals:{HR:'138',RR:'24',Temp:'103.8°F',SpO2:'99%'},labs:{WBC:'18k',Plt:'450k',CRP:'12',Hx:'5 classic criteria met'}},int:{age:'8mo M',wt:'8kg',hx:'Fever x7 days, irritable, only 3 classic criteria, elevated inflammatory markers',exam:'Fussy, mildly injected conjunctivae, erythematous BCG scar, no other findings',vitals:{HR:'155',RR:'32',Temp:'104°F',SpO2:'98%'},labs:{WBC:'22k',ESR:'85',CRP:'18',Hx:'Incomplete Kawasaki'}},adv:{age:'4yo F',wt:'16kg',hx:'Treated Kawasaki 2 weeks ago, now cardiac symptoms',exam:'Tachycardic, new murmur, gallop rhythm',vitals:{HR:'145',BP:'85/55',Temp:'99°F',SpO2:'95%'},labs:{Echo:'Giant CAA',Hx:'Coronary artery aneurysms'}}};
const Q=[{t:'Diagnostic Criteria',q:'Classic diagnostic criteria for Kawasaki disease?',h:'Fever plus 4 of 5',o:[{id:'a',txt:'Fever ≥5 days + 4 of 5: Bilateral conjunctivitis, oral changes, rash, extremity changes, cervical LAD',c:1,p:100},{id:'b',txt:'Fever alone',c:0,p:20},{id:'c',txt:'Rash alone',c:0,p:20}],fb:{1:'<b>Correct!</b> Classic KD: Fever ≥5 days + ≥4 of: Bilateral non-exudative conjunctivitis, oral changes (strawberry tongue, cracked lips), polymorphous rash, extremity changes (edema, erythema, peeling), cervical LAD >1.5cm.',0:'<b>KD criteria:</b> Fever ≥5d + 4 of 5 clinical features.'}},{t:'Incomplete Kawasaki',q:'How is incomplete Kawasaki disease diagnosed?',h:'Lab support needed',o:[{id:'a',txt:'Fever ≥5 days + 2-3 criteria + supportive lab findings (elevated CRP/ESR, anemia, elevated WBC/platelets)',c:1,p:100},{id:'b',txt:'Same as complete KD',c:0,p:30},{id:'c',txt:'Cannot be diagnosed',c:0,p:10}],fb:{1:'<b>Correct!</b> Incomplete KD: Fever ≥5d + 2-3 criteria + labs (CRP ≥3, ESR ≥40) + ≥3 supplemental findings or positive echo. More common in infants <1yr.',0:'<b>Incomplete KD:</b> Fewer criteria but labs/echo support diagnosis.'}},{t:'Complication',q:'Most serious complication of Kawasaki disease?',h:'Cardiac emergency',o:[{id:'a',txt:'Coronary artery aneurysms (CAA) - risk ~25% untreated, ~4% with treatment',c:1,p:100},{id:'b',txt:'Renal failure',c:0,p:20},{id:'c',txt:'Lung disease',c:0,p:20}],fb:{1:'<b>Correct!</b> CAA: Major complication, risk ~25% untreated, ~4% treated. Peak aneurysm formation 2-4 weeks. Giant aneurysm (>8mm) = highest MI risk. Echo at diagnosis, 2 weeks, 6-8 weeks.',0:'<b>CAA:</b> Most serious complication. Echo monitoring essential.'}},{t:'First-Line Treatment',q:'First-line treatment for Kawasaki disease?',h:'Within 10 days of fever',o:[{id:'a',txt:'IVIG 2g/kg single dose + high-dose aspirin (80-100 mg/kg/day), ideally within 10 days',c:1,p:100},{id:'b',txt:'Antibiotics',c:0,p:20},{id:'c',txt:'Steroids alone',c:0,p:20}],fb:{1:'<b>Correct!</b> IVIG 2g/kg single infusion + aspirin 80-100 mg/kg/day (anti-inflammatory dose) until afebrile 48hr, then low-dose aspirin (3-5 mg/kg/day) x 6-8 weeks.',0:'<b>Treatment:</b> IVIG 2g/kg + high-dose aspirin within 10 days.'}},{t:'IVIG Resistance',q:'Management of IVIG-resistant Kawasaki disease?',h:'Persistent fever after IVIG',o:[{id:'a',txt:'Second IVIG dose, consider adding corticosteroids, infliximab for refractory cases',c:1,p:100},{id:'b',txt:'Wait and observe',c:0,p:20},{id:'c',txt:'Discontinue treatment',c:0,p:10}],fb:{1:'<b>Correct!</b> IVIG resistance (~10-20%): Second IVIG dose, methylprednisolone, or infliximab. Some centers use steroids with initial IVIG for high-risk patients.',0:'<b>Refractory:</b> Repeat IVIG, add steroids or infliximab.'}},{t:'Aspirin Duration',q:'How long should aspirin be continued after Kawasaki disease?',h:'Based on echo findings',o:[{id:'a',txt:'Low-dose (3-5 mg/kg) x 6-8 weeks if no CAA; indefinitely if CAA present',c:1,p:100},{id:'b',txt:'Lifelong for all',c:0,p:30},{id:'c',txt:'Stop after fever resolves',c:0,p:20}],fb:{1:'<b>Correct!</b> No CAA: Low-dose aspirin 6-8 weeks. Small/medium CAA: Aspirin until regression. Giant CAA: Lifelong antiplatelet ± anticoagulation.',0:'<b>Aspirin:</b> 6-8 weeks if no CAA; longer/indefinite if CAA.'}},{t:'Follow-up Echo',q:'Echo follow-up schedule for Kawasaki disease?',h:'Monitor for aneurysms',o:[{id:'a',txt:'At diagnosis, 2 weeks, and 6-8 weeks; more frequent if abnormal',c:1,p:100},{id:'b',txt:'Once only',c:0,p:20},{id:'c',txt:'Not needed if treated',c:0,p:20}],fb:{1:'<b>Correct!</b> Echo: At diagnosis (baseline), 2 weeks (peak aneurysm formation), 6-8 weeks (most changes occur by then). If abnormal, more frequent monitoring. Annual echo if ever had CAA.',0:'<b>Echo:</b> Diagnosis, 2 weeks, 6-8 weeks. More if abnormal.'}},{t:'Live Vaccines',q:'When can live vaccines be given after IVIG treatment for Kawasaki?',h:'Antibody interference',o:[{id:'a',txt:'Wait 11 months after IVIG (interferes with vaccine response)',c:1,p:100},{id:'b',txt:'Immediately',c:0,p:20},{id:'c',txt:'Never',c:0,p:10}],fb:{1:'<b>Correct!</b> IVIG interferes with live vaccines (MMR, varicella). Wait 11 months post-IVIG. If exposed to measles/varicella within this period, may need additional IVIG.',0:'<b>Live vaccines:</b> Wait 11 months after IVIG.'}}];
let sel=null;function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}function start(){S.q=1;S.stage='question';render();}function go(s){S.stage=s;render();}function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🩺 The Persistent Fever</h1><p style="color:var(--muted);margin-bottom:32px">Kawasaki Disease: Criteria, IVIG, coronary aneurysms, follow-up</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🩺 Prolonged Fever</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Kawasaki Pearls</div><div class="pearl-item"><b>Criteria:</b> Fever ≥5d + 4 of 5 clinical features</div><div class="pearl-item"><b>Complication:</b> Coronary artery aneurysms (~25% untreated)</div><div class="pearl-item"><b>Treatment:</b> IVIG 2g/kg + aspirin within 10 days</div><div class="pearl-item"><b>Echo:</b> Diagnosis, 2 weeks, 6-8 weeks</div><div class="pearl-item"><b>Aspirin:</b> 6-8 weeks if no CAA; longer if CAA</div><div class="pearl-item"><b>Live vaccines:</b> Wait 11 months after IVIG</div></div><div class="cross-link"><a href="peds-febrile-seizure-adventure-enhanced.html">Related: Febrile Seizure</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}document.addEventListener('DOMContentLoaded',render);</script></body></html>
