<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Persistent Fever | ReasonDx Adventure</title>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --border: #334155; --text: #F1F5F9; --muted: #94A3B8; --accent: #FB923C; --success: #10B981; --warning: #F59E0B; --danger: #DC2626; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
        .header { background: linear-gradient(135deg, #EA580C 0%, #FB923C 100%); padding: 12px 20px; position: sticky; top: 0; z-index: 100; }
        .header-row { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .header-title { font-size: 1.1rem; font-weight: 600; }
        .stat { background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 8px; }
        .stat-value { font-size: 1.1rem; font-weight: 700; font-family: monospace; }
        .stat-label { font-size: 0.6rem; opacity: 0.8; text-transform: uppercase; }
        .main { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; }
        .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .card-phase { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
        .card-title { font-size: 1.5rem; font-weight: 700; }
        .card-body { padding: 24px; }
        .narrative { background: linear-gradient(135deg, rgba(251,146,60,0.1), rgba(234,88,12,0.1)); border-left: 4px solid var(--accent); padding: 20px 24px; border-radius: 0 12px 12px 0; margin-bottom: 24px; line-height: 1.8; }
        .narrative .hl { background: rgba(251,146,60,0.3); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .setup-screen { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; }
        .setup-screen h1 { font-size: 2rem; margin-bottom: 8px; }
        .setup-screen .subtitle { color: var(--muted); margin-bottom: 32px; }
        .start-btn { background: var(--accent); color: #0F172A; border: none; padding: 16px 48px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .radio-options { display: flex; flex-direction: column; gap: 10px; }
        .radio-option { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .radio-option:hover { border-color: var(--accent); }
        .radio-option.selected { border-color: var(--accent); background: rgba(251,146,60,0.15); }
        .radio-option.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .radio-option.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .radio-circle { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; }
        .radio-option.selected .radio-circle { border-color: var(--accent); background: radial-gradient(circle, var(--accent) 40%, transparent 40%); }
        .feedback { padding: 20px; border-radius: 12px; margin: 20px 0; }
        .feedback.excellent { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); }
        .feedback.acceptable { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); }
        .feedback-text { color: var(--muted); line-height: 1.7; }
        .feedback-text strong { color: var(--text); }
        .btn { padding: 14px 28px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: var(--accent); color: #0F172A; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-row { display: flex; gap: 12px; margin-top: 24px; }
        .question-section { margin-bottom: 32px; }
        .question-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .question-number { background: var(--accent); color: #0F172A; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .question-text { font-size: 1.1rem; font-weight: 600; }
        .outcome { text-align: center; padding: 40px 20px; }
        .outcome-icon { font-size: 4rem; margin-bottom: 16px; }
        .outcome-title { font-size: 2rem; font-weight: 700; color: var(--success); margin-bottom: 8px; }
        .outcome-desc { color: var(--muted); max-width: 600px; margin: 0 auto 24px; }
        .score-summary { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 24px; margin: 24px auto; max-width: 500px; }
        .score-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .score-row:last-child { border-bottom: none; }
        .alert { padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; }
        .alert.info { background: rgba(251,146,60,0.15); border: 1px solid rgba(251,146,60,0.3); }
        .alert-icon { font-size: 1.5rem; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: 600; margin-bottom: 4px; }
        .alert-desc { font-size: 0.9rem; color: var(--muted); }
    </style>
</head>
<body>
    <header class="header"><div class="header-row"><div class="header-title">🔥 The Persistent Fever</div><div class="stat"><div class="stat-value" id="scoreDisplay">0</div><div class="stat-label">Points</div></div></div></header>
    <main class="main"><div id="stageContainer"></div></main>
    <script>
    const state = { stage:'setup', score:0 };
    function addScore(pts) { state.score += pts; document.getElementById('scoreDisplay').textContent = state.score; }
    const stages = {
        setup: { render: () => `<div class="setup-screen"><h1>🔥 The Persistent Fever</h1><p class="subtitle">Kawasaki disease recognition</p><button class="start-btn" onclick="goTo('presentation')">Begin Case →</button></div>` },
        presentation: { render: () => `<div class="card"><div class="card-header"><div class="card-phase">Pediatric Clinic</div><div class="card-title">📋 Fever Won't Go Away</div></div><div class="card-body"><div class="narrative">A <span class="hl">3-year-old male</span> with <span class="hl">5 days of high fever</span> (39-40°C) unresponsive to acetaminophen. He also has <span class="hl">red eyes without discharge</span>, <span class="hl">cracked red lips</span>, <span class="hl">"strawberry tongue"</span>, <span class="hl">rash on trunk</span>, and <span class="hl">swollen hands/feet</span>.<br><br>He's <span class="hl">irritable</span> but non-toxic. Labs: WBC 18K, platelets 450K, ESR 85, CRP 12.</div><div class="btn-row"><button class="btn btn-primary" onclick="goTo('criteria')">Review Criteria →</button></div></div></div>` },
        criteria: { render: () => `<div class="card"><div class="card-header"><div class="card-phase">Diagnosis</div><div class="card-title">📊 Kawasaki Criteria</div></div><div class="card-body"><div class="alert info"><span class="alert-icon">📋</span><div class="alert-content"><div class="alert-title">Classic Kawasaki = Fever ≥5 days + 4 of 5 criteria</div><div class="alert-desc">1. Bilateral conjunctival injection (no exudate)<br>2. Oral changes (strawberry tongue, cracked lips)<br>3. Extremity changes (edema, erythema, later peeling)<br>4. Polymorphous rash<br>5. Cervical lymphadenopathy (≥1.5cm, usually unilateral)</div></div></div><div class="question-section"><div class="question-header"><div class="question-number">1</div><div class="question-text">How many criteria does this patient meet?</div></div><div class="radio-options" id="q1"><div class="radio-option" data-id="4" onclick="sel('q1','4')"><div class="radio-circle"></div><div><strong>4 criteria (eyes, oral, extremities, rash)</strong><br><small style="color:var(--muted)">Meets classic Kawasaki</small></div></div><div class="radio-option" data-id="2" onclick="sel('q1','2')"><div class="radio-circle"></div><span>2 criteria</span></div><div class="radio-option" data-id="5" onclick="sel('q1','5')"><div class="radio-circle"></div><span>5 criteria</span></div></div></div><div id="fb1"></div><div class="btn-row"><button class="btn btn-primary" id="sub1" onclick="sub1()" disabled>Submit →</button></div></div></div>` },
        complication: { render: () => `<div class="card"><div class="card-header"><div class="card-phase">Complication</div><div class="card-title">💔 Why We Treat</div></div><div class="card-body"><div class="question-section"><div class="question-header"><div class="question-number">2</div><div class="question-text">The most serious complication of untreated Kawasaki:</div></div><div class="radio-options" id="q2"><div class="radio-option" data-id="aneurysm" onclick="sel('q2','aneurysm')"><div class="radio-circle"></div><div><strong>Coronary artery aneurysms</strong><br><small style="color:var(--muted)">#1 cause of acquired heart disease in children</small></div></div><div class="radio-option" data-id="meningitis" onclick="sel('q2','meningitis')"><div class="radio-circle"></div><span>Meningitis</span></div><div class="radio-option" data-id="renal" onclick="sel('q2','renal')"><div class="radio-circle"></div><span>Renal failure</span></div></div></div><div id="fb2"></div><div class="btn-row"><button class="btn btn-primary" id="sub2" onclick="sub2()" disabled>Submit →</button></div></div></div>` },
        treatment: { render: () => `<div class="card"><div class="card-header"><div class="card-phase">Treatment</div><div class="card-title">💊 First-Line Therapy</div></div><div class="card-body"><div class="question-section"><div class="question-header"><div class="question-number">3</div><div class="question-text">Treatment for Kawasaki disease:</div></div><div class="radio-options" id="q3"><div class="radio-option" data-id="ivig_asa" onclick="sel('q3','ivig_asa')"><div class="radio-circle"></div><div><strong>IVIG (2g/kg single dose) + high-dose aspirin</strong><br><small style="color:var(--muted)">Reduces aneurysm risk from 25% to &lt;5%</small></div></div><div class="radio-option" data-id="steroids" onclick="sel('q3','steroids')"><div class="radio-circle"></div><span>Steroids alone</span></div><div class="radio-option" data-id="abx" onclick="sel('q3','abx')"><div class="radio-circle"></div><span>Antibiotics</span></div></div></div><div id="fb3"></div><div class="btn-row"><button class="btn btn-primary" id="sub3" onclick="sub3()" disabled>Submit →</button></div></div></div>` },
        outcome: { render: () => `<div class="card"><div class="card-body"><div class="outcome"><div class="outcome-icon">🎉</div><div class="outcome-title">Kawasaki Treated!</div><div class="outcome-desc">IVIG 2g/kg + high-dose aspirin started day 5 of illness. Fever resolved within 36 hours. Echocardiogram showed normal coronaries. Transitioned to low-dose aspirin at 2 weeks. Follow-up echo at 6 weeks was normal.</div></div><div class="score-summary"><h3 style="margin-bottom:16px">Performance</h3><div class="score-row"><span>Criteria</span><span>${state.s1||0}/100</span></div><div class="score-row"><span>Complication</span><span>${state.s2||0}/100</span></div><div class="score-row"><span>Treatment</span><span>${state.s3||0}/100</span></div><div class="score-row" style="border-top:2px solid var(--border);padding-top:12px"><strong>Total</strong><strong>${state.score}</strong></div></div><div class="feedback excellent"><div class="feedback-text">• <strong>Classic Kawasaki:</strong> Fever ≥5 days + 4/5 criteria<br>• <strong>Incomplete Kawasaki:</strong> Fever ≥5 days + 2-3 criteria + elevated inflammatory markers + echo changes<br>• <strong>Criteria mnemonic "CRASH and Burn":</strong> Conjunctivitis, Rash, Adenopathy, Strawberry tongue, Hand/foot changes + Fever (burn)<br>• <strong>Coronary aneurysms:</strong> 25% untreated → &lt;5% with IVIG within 10 days<br>• <strong>IVIG:</strong> 2g/kg single infusion over 10-12 hours<br>• <strong>Aspirin:</strong> High-dose (80-100 mg/kg/day) until afebrile → low-dose (3-5 mg/kg/day) for 6-8 weeks<br>• <strong>Echo:</strong> Baseline, 2 weeks, 6-8 weeks minimum<br>• <strong>Refractory:</strong> ~10-20% have persistent fever → second IVIG dose or steroids</div></div><div class="btn-row"><button class="btn btn-primary" onclick="location.reload()">Play Again</button></div></div></div>` }
    };
    let ans = {};
    function sel(q,id) { ans[q]=id; document.querySelectorAll(`#${q} .radio-option`).forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('sub'+q.slice(1)).disabled=false; }
    function sub1() {
        document.querySelectorAll('#q1 .radio-option').forEach(o=>{if(o.dataset.id==='4')o.classList.add('correct');else if(o.dataset.id===ans.q1)o.classList.add('incorrect');});
        state.s1=ans.q1==='4'?100:50; addScore(ans.q1==='4'?70:25);
        document.getElementById('fb1').innerHTML=`<div class="feedback ${ans.q1==='4'?'excellent':'acceptable'}"><div class="feedback-text"><strong>4 criteria!</strong> Eyes (conjunctival injection), Oral (strawberry tongue, cracked lips), Extremities (swollen hands/feet), Rash. Missing only lymphadenopathy. Fever ≥5 days + 4 criteria = Classic Kawasaki.</div></div>`;
        document.getElementById('sub1').textContent='Continue →'; document.getElementById('sub1').onclick=()=>goTo('complication');
    }
    function sub2() {
        document.querySelectorAll('#q2 .radio-option').forEach(o=>{if(o.dataset.id==='aneurysm')o.classList.add('correct');else if(o.dataset.id===ans.q2)o.classList.add('incorrect');});
        state.s2=ans.q2==='aneurysm'?100:40; addScore(ans.q2==='aneurysm'?70:20);
        document.getElementById('fb2').innerHTML=`<div class="feedback ${ans.q2==='aneurysm'?'excellent':'acceptable'}"><div class="feedback-text"><strong>Coronary artery aneurysms!</strong> Kawasaki is the #1 cause of acquired heart disease in children in developed countries. Untreated: ~25% develop coronary aneurysms. With IVIG within 10 days: &lt;5%.</div></div>`;
        document.getElementById('sub2').textContent='Continue →'; document.getElementById('sub2').onclick=()=>goTo('treatment');
    }
    function sub3() {
        document.querySelectorAll('#q3 .radio-option').forEach(o=>{if(o.dataset.id==='ivig_asa')o.classList.add('correct');else if(o.dataset.id===ans.q3)o.classList.add('incorrect');});
        state.s3=ans.q3==='ivig_asa'?100:30; addScore(ans.q3==='ivig_asa'?70:15);
        document.getElementById('fb3').innerHTML=`<div class="feedback ${ans.q3==='ivig_asa'?'excellent':'acceptable'}"><div class="feedback-text"><strong>IVIG + Aspirin!</strong> IVIG 2g/kg single dose reduces coronary aneurysm risk dramatically. High-dose ASA (80-100 mg/kg/day) until afebrile, then low-dose (3-5 mg/kg/day) for 6-8 weeks or longer if coronary involvement.</div></div>`;
        document.getElementById('sub3').textContent='Complete →'; document.getElementById('sub3').onclick=()=>goTo('outcome');
    }
    function goTo(id) { state.stage=id; document.getElementById('stageContainer').innerHTML=stages[id].render(); window.scrollTo(0,0); }
    document.addEventListener('DOMContentLoaded', () => goTo('setup'));
    </script>
</body>
</html>
