<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Itchy Mystery | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#FB7185;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#E11D48,#FB7185);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(251,113,133,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(251,113,133,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(251,113,133,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🔴 The Itchy Mystery</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'32F',wt:'65kg',hx:'Hives x3 months, daily, no trigger identified',exam:'Wheals trunk/extremities, dermographism+',vitals:{HR:'78',BP:'118/72'},labs:{CBC:'Normal',TSH:'2.1',CMP:'Normal'}},int:{age:'45M',wt:'82kg',hx:'Chronic hives x8 months, partially responsive to cetirizine 10mg',exam:'Widespread wheals, no angioedema',vitals:{HR:'82',BP:'132/78'},labs:{ANA:'Neg',TSH:'1.8',Tryptase:'8'}},adv:{age:'28F',wt:'58kg',hx:'Hives after exercise and hot showers, resolves in 30min',exam:'Small punctate wheals after exercise test',vitals:{HR:'92',BP:'108/68'},labs:{Methacholine:'Positive',Tryptase:'Normal'}}};
const Q=[
{t:'Acute vs Chronic',q:'Urticaria >6 weeks. Classification?',h:'Duration determines workup',o:[{id:'a',txt:'Chronic urticaria (spontaneous or inducible)',c:1,p:100},{id:'b',txt:'Acute urticaria',c:0,p:0},{id:'c',txt:'Allergic urticaria',c:0,p:30}],fb:{1:'<b>Correct!</b> Chronic: >6 weeks. Usually NOT allergic. 80-90% chronic spontaneous urticaria (CSU) has no identifiable trigger.',0:'<b>Definition:</b> Acute <6wks, Chronic >6wks. Most chronic is idiopathic/autoimmune.'}},
{t:'First-Line Treatment',q:'First-line treatment for chronic urticaria?',h:'Guidelines recommend this class',o:[{id:'a',txt:'Second-generation H1 antihistamine (cetirizine, loratadine, etc)',c:1,p:100},{id:'b',txt:'First-generation antihistamine (diphenhydramine)',c:0,p:30},{id:'c',txt:'Systemic steroids',c:0,p:10}],fb:{1:'<b>Correct!</b> 2nd-gen H1 antihistamine first-line. Less sedating, once-daily dosing. Can uptitrate to 4x standard dose.',0:'<b>First-line:</b> 2nd-gen antihistamines. Avoid 1st-gen due to sedation/anticholinergic effects.'}},
{t:'Antihistamine Dosing',q:'Standard dose cetirizine not working. Next step?',h:'Guidelines allow dose escalation',o:[{id:'a',txt:'Increase to 2-4x standard dose (up to 40mg cetirizine)',c:1,p:100},{id:'b',txt:'Add oral steroids',c:0,p:20},{id:'c',txt:'Switch to first-gen antihistamine',c:0,p:10}],fb:{1:'<b>Correct!</b> Uptitrate 2nd-gen antihistamine up to 4x before adding other agents. Well-tolerated at higher doses.',0:'<b>Uptitrate:</b> Up to 4x dose before adding omalizumab or other agents.'}},
{t:'Omalizumab Indication',q:'Refractory to high-dose antihistamines. Next step?',h:'Anti-IgE therapy',o:[{id:'a',txt:'Omalizumab (anti-IgE, approved for CSU)',c:1,p:100},{id:'b',txt:'Long-term steroids',c:0,p:10},{id:'c',txt:'Immunosuppressants first',c:0,p:30}],fb:{1:'<b>Correct!</b> Omalizumab 150-300mg q4wks for refractory CSU. 65-90% response rate. Avoid chronic steroids.',0:'<b>Omalizumab:</b> FDA-approved for CSU refractory to antihistamines.'}},
{t:'Inducible Urticaria',q:'Hives only with exercise/heat that resolve in 30 min. Type?',h:'Physical trigger',o:[{id:'a',txt:'Cholinergic urticaria (inducible)',c:1,p:100},{id:'b',txt:'Chronic spontaneous urticaria',c:0,p:30},{id:'c',txt:'Food allergy',c:0,p:10}],fb:{1:'<b>Correct!</b> Cholinergic: Small punctate wheals triggered by heat, exercise, stress. Resolves quickly. Treat with antihistamines before triggers.',0:'<b>Cholinergic:</b> Heat/exercise/emotion trigger. Small wheals. Pre-treat with antihistamines.'}},
{t:'Workup Approach',q:'Extensive allergy testing in chronic urticaria?',h:'Low yield in CSU',o:[{id:'a',txt:'NOT recommended routinely (rarely identifies cause)',c:1,p:100},{id:'b',txt:'Test for all foods',c:0,p:0},{id:'c',txt:'Skin prick panel essential',c:0,p:20}],fb:{1:'<b>Correct!</b> Chronic urticaria rarely allergic. Extensive testing low yield. Consider: CBC, TSH, CMP. Skin biopsy if urticarial vasculitis suspected.',0:'<b>Limited workup:</b> CBC, TSH, CMP. Avoid extensive allergy panels - low yield.'}},
{t:'Red Flags',q:'Wheals lasting >24 hrs with bruising. Concern?',h:'Not typical urticaria',o:[{id:'a',txt:'Urticarial vasculitis (needs biopsy)',c:1,p:100},{id:'b',txt:'Severe CSU',c:0,p:30},{id:'c',txt:'Drug reaction',c:0,p:20}],fb:{1:'<b>Correct!</b> Red flags: Wheals >24hrs, painful (not itchy), bruising/purpura, systemic symptoms. Biopsy for leukocytoclastic vasculitis.',0:'<b>Vasculitis:</b> Painful, >24hrs, bruising. Different from typical urticaria.'}},
{t:'UAS7 Score',q:'Urticaria Activity Score measures?',h:'Disease monitoring tool',o:[{id:'a',txt:'Daily wheal count + itch severity over 7 days (max 42)',c:1,p:100},{id:'b',txt:'Tryptase level',c:0,p:10},{id:'c',txt:'Antihistamine doses needed',c:0,p:20}],fb:{1:'<b>Correct!</b> UAS7: Daily wheals (0-3) + itch (0-3) x 7 days. Max 42. Well-controlled <6, mild 7-15, moderate 16-27, severe 28-42.',0:'<b>UAS7:</b> Patient-reported. Track disease activity and treatment response.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🔴 The Itchy Mystery</h1><p style="color:var(--muted);margin-bottom:32px">Urticaria: Acute vs chronic, antihistamine dosing, omalizumab, inducible types</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🩺 Dermatologic Assessment</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Urticaria Pearls</div><div class="pearl-item"><b>Chronic:</b> >6 weeks, usually NOT allergic</div><div class="pearl-item"><b>First-line:</b> 2nd-gen antihistamine, up to 4x dose</div><div class="pearl-item"><b>Refractory:</b> Omalizumab (avoid chronic steroids)</div><div class="pearl-item"><b>Cholinergic:</b> Small wheals with heat/exercise</div><div class="pearl-item"><b>Red flags:</b> >24hr, painful, bruising = vasculitis</div></div><div class="cross-link"><a href="../mechanism/allergy-immunology.html">MechanismDx: Allergy</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
