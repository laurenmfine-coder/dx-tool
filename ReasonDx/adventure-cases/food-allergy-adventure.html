<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Food Reaction | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#84CC16;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#65A30D,#84CC16);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(132,204,22,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(132,204,22,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#000;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(132,204,22,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#000}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#000;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🥜 The Food Reaction</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'8M',wt:'25kg',hx:'Hives and vomiting 30min after eating peanut butter',exam:'Urticaria, no respiratory distress',vitals:{HR:'98',BP:'100/62',SpO2:'99%'},labs:{Hx:'First known exposure'}},int:{age:'16F',wt:'55kg',hx:'Anaphylaxis at restaurant, ate shrimp, peanuts in dessert',exam:'Recovered after epi, now stable',vitals:{HR:'82',BP:'112/72'},labs:{Tryptase:'Pending',IgE:'Pending'}},adv:{age:'4F',wt:'18kg',hx:'Multiple food allergies (egg, milk, peanut), considering OIT',exam:'Well-appearing',vitals:{HR:'88',BP:'92/58'},labs:{PeanutIgE:'85',AraH2:'42'}}};
const Q=[
{t:'IgE-Mediated Features',q:'Classic IgE-mediated food allergy timing and symptoms?',h:'Type I hypersensitivity',o:[{id:'a',txt:'Minutes to 2 hours post-ingestion; urticaria, angioedema, GI, respiratory, anaphylaxis',c:1,p:100},{id:'b',txt:'Days after ingestion',c:0,p:10},{id:'c',txt:'Only GI symptoms',c:0,p:20}],fb:{1:'<b>Correct!</b> IgE-mediated: Rapid onset (min to 2hr). Multi-system: skin (90%), GI (70%), respiratory (50%), cardiovascular. Anaphylaxis risk.',0:'<b>IgE-mediated:</b> Rapid onset, multi-system. Skin most common.'}},
{t:'Top 9 Allergens',q:'Most common food allergens (FALCPA top 9)?',h:'Labeling requirements',o:[{id:'a',txt:'Milk, egg, peanut, tree nuts, wheat, soy, fish, shellfish, sesame',c:1,p:100},{id:'b',txt:'Only peanut and tree nuts',c:0,p:20},{id:'c',txt:'Corn and rice',c:0,p:10}],fb:{1:'<b>Correct!</b> Top 9: Milk (#1 kids), egg, peanut, tree nuts, wheat, soy, fish, shellfish, sesame (added 2023). Account for 90% of reactions.',0:'<b>Top 9:</b> Milk, egg, peanut, tree nuts, wheat, soy, fish, shellfish, sesame.'}},
{t:'Testing Interpretation',q:'Peanut-specific IgE 85 kU/L with positive skin test. Interpretation?',h:'Sensitization vs allergy',o:[{id:'a',txt:'Sensitization confirmed; clinical history determines true allergy (test doesnt prove allergy)',c:1,p:100},{id:'b',txt:'Definitely allergic, avoid forever',c:0,p:30},{id:'c',txt:'Not allergic',c:0,p:10}],fb:{1:'<b>Correct!</b> IgE/SPT show sensitization, not allergy. Must correlate with history. Higher levels = higher probability but not certainty.',0:'<b>Testing:</b> Shows sensitization. Clinical history determines allergy.'}},
{t:'Component Testing',q:'Ara h 2 positive in peanut allergy. Significance?',h:'Component-resolved diagnostics',o:[{id:'a',txt:'Ara h 2 = storage protein, higher risk of systemic reactions; more specific than whole peanut IgE',c:1,p:100},{id:'b',txt:'Low risk allergen',c:0,p:20},{id:'c',txt:'Not clinically useful',c:0,p:20}],fb:{1:'<b>Correct!</b> Ara h 2 (storage protein): High specificity, predicts clinical reactivity better. Ara h 8 (PR-10): Usually mild, cross-reactive with birch.',0:'<b>Component testing:</b> Ara h 2 = higher risk. More specific than whole allergen.'}},
{t:'Management',q:'Confirmed IgE-mediated peanut allergy. Essential management?',h:'Avoidance and emergency plan',o:[{id:'a',txt:'Strict avoidance + epinephrine auto-injectors + action plan + consider OIT',c:1,p:100},{id:'b',txt:'Antihistamines only',c:0,p:20},{id:'c',txt:'Avoid all legumes',c:0,p:30}],fb:{1:'<b>Correct!</b> Management: Strict avoidance, 2 epi auto-injectors, written action plan, MedicAlert. OIT (Palforzia) FDA-approved for peanut.',0:'<b>Management:</b> Avoidance + epi + action plan. Consider OIT.'}},
{t:'Cross-Reactivity',q:'Shrimp-allergic patient asks about other shellfish. Advice?',h:'Shellfish cross-reactivity',o:[{id:'a',txt:'High cross-reactivity within crustaceans (crab, lobster); test before eating; mollusks (clam, oyster) lower cross-react',c:1,p:100},{id:'b',txt:'All shellfish equally risky',c:0,p:30},{id:'c',txt:'No cross-reactivity',c:0,p:10}],fb:{1:'<b>Correct!</b> Crustacean cross-reactivity ~75% (tropomyosin). Mollusks share but lower (~30%). Fish = separate allergen, no cross-react with shellfish.',0:'<b>Shellfish:</b> High within crustaceans, lower with mollusks. Fish separate.'}},
{t:'Oral Immunotherapy',q:'OIT (oral immunotherapy) for food allergy. Goal?',h:'Disease modification',o:[{id:'a',txt:'Desensitization to reduce reaction severity from accidental exposure (not cure)',c:1,p:100},{id:'b',txt:'Complete cure',c:0,p:30},{id:'c',txt:'Replaces epinephrine',c:0,p:0}],fb:{1:'<b>Correct!</b> OIT goal: Raise threshold to protect from accidental exposure. Not cure (need ongoing dosing). Still need epi. Risk of reactions during.',0:'<b>OIT:</b> Desensitization, not cure. Protects from accidental exposure.'}},
{t:'FPIES',q:'Infant with repetitive vomiting 2 hours after formula, no IgE. Diagnosis?',h:'Non-IgE mediated',o:[{id:'a',txt:'FPIES (Food Protein-Induced Enterocolitis Syndrome)',c:1,p:100},{id:'b',txt:'IgE-mediated allergy',c:0,p:20},{id:'c',txt:'Viral gastroenteritis',c:0,p:30}],fb:{1:'<b>Correct!</b> FPIES: Non-IgE, delayed (2-6hr), profuse vomiting +/- diarrhea, can cause shock. Common triggers: milk, soy, rice, oat. IgE negative.',0:'<b>FPIES:</b> Non-IgE, delayed GI symptoms. Milk, soy, grains common triggers.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🥜 The Food Reaction</h1><p style="color:var(--muted);margin-bottom:32px">Food Allergy: IgE-mediated, testing, components, OIT, FPIES</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🏥 Allergic Reaction</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Food Allergy Pearls</div><div class="pearl-item"><b>IgE-mediated:</b> Rapid onset, multi-system</div><div class="pearl-item"><b>Top 9:</b> Milk, egg, peanut, tree nuts, wheat, soy, fish, shellfish, sesame</div><div class="pearl-item"><b>Testing:</b> Shows sensitization, not allergy</div><div class="pearl-item"><b>OIT:</b> Desensitization, not cure</div><div class="pearl-item"><b>FPIES:</b> Non-IgE, delayed GI, IgE negative</div></div><div class="cross-link"><a href="../mechanism/food-allergy-module.html">MechanismDx: Food Allergy</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
