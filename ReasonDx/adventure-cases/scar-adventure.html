<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Drug Eruption | ReasonDx Adventure</title><style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#EF4444;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#B91C1C,#EF4444);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(239,68,68,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(239,68,68,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(239,68,68,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#FCA5A5;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style></head><body><header class="header"><div class="header-row"><div style="font-weight:600">💊 Drug Eruption</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header><main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};const C={easy:{age:'35yo F',wt:'68kg',hx:'Started allopurinol 3 weeks ago, now widespread rash, fever, facial edema, malaise',exam:'Diffuse morbilliform rash with facial edema, hepatomegaly, lymphadenopathy',vitals:{HR:'102',BP:'112/72',Temp:'102.5°F',SpO2:'97%'},labs:{WBC:'15k with 18% eos',AST:'185',ALT:'210',Cr:'1.4',Hx:'DRESS syndrome'}},int:{age:'28yo M',wt:'75kg',hx:'Started TMP-SMX 2 weeks ago, painful targetoid lesions, lip erosions, eye irritation',exam:'Target lesions on palms/soles, oral erosions, bilateral conjunctivitis',vitals:{HR:'98',BP:'118/75',Temp:'101.2°F',SpO2:'98%'},labs:{WBC:'12k','BSA':'<10%',Hx:'SJS suspected'}},adv:{age:'55yo F',wt:'70kg',hx:'Phenytoin x4 weeks, now diffuse blistering, skin sloughing, septic',exam:'Widespread epidermal detachment >30% BSA, positive Nikolsky, mucosal erosions',vitals:{HR:'125',BP:'88/52',Temp:'104°F',SpO2:'90%'},labs:{WBC:'22k',Cr:'2.4',Albumin:'2.1','BSA':'45%',Hx:'TEN with sepsis'}}};
const Q=[{t:'SCAR Types',q:'What are the severe cutaneous adverse reactions (SCARs)?',h:'Life-threatening drug eruptions',o:[{id:'a',txt:'SJS (<10% BSA), TEN (>30% BSA), SJS-TEN overlap (10-30%), DRESS, AGEP',c:1,p:100},{id:'b',txt:'Acne',c:0,p:10},{id:'c',txt:'Eczema',c:0,p:10}],fb:{1:'<b>Correct!</b> SCARs: SJS (<10% BSA detachment), TEN (>30% BSA), SJS-TEN overlap (10-30%), DRESS (Drug Reaction with Eosinophilia and Systemic Symptoms), AGEP (Acute Generalized Exanthematous Pustulosis).',0:'<b>SCARs:</b> SJS, TEN, SJS-TEN overlap, DRESS, AGEP.'}},{t:'SJS/TEN Features',q:'Key features distinguishing SJS/TEN?',h:'Epidermal detachment',o:[{id:'a',txt:'Targetoid lesions, mucosal involvement (eyes, mouth, genitals), epidermal detachment with positive Nikolsky sign',c:1,p:100},{id:'b',txt:'No mucosal involvement',c:0,p:20},{id:'c',txt:'Negative Nikolsky',c:0,p:20}],fb:{1:'<b>Correct!</b> SJS/TEN: Prodrome (fever, malaise), mucosal involvement (≥2 sites), atypical targetoid lesions, epidermal detachment, positive Nikolsky sign (skin sloughs with pressure). Mortality: SJS ~5%, TEN ~30%.',0:'<b>SJS/TEN:</b> Targetoid lesions, mucosal involvement, Nikolsky+.'}},{t:'Common Culprits',q:'Most common drugs causing SJS/TEN?',h:'High-risk medications',o:[{id:'a',txt:'Sulfonamides (TMP-SMX), anticonvulsants (phenytoin, carbamazepine, lamotrigine), allopurinol, NSAIDs, antibiotics',c:1,p:100},{id:'b',txt:'Acetaminophen',c:0,p:20},{id:'c',txt:'Vitamins',c:0,p:10}],fb:{1:'<b>Correct!</b> High-risk: Sulfonamides (TMP-SMX #1), anticonvulsants (phenytoin, CBZ, lamotrigine), allopurinol, nevirapine, NSAIDs (oxicam), abx (penicillins, cephalosporins, FQs). Onset usually 1-8 weeks.',0:'<b>Culprits:</b> Sulfonamides, anticonvulsants, allopurinol, NSAIDs.'}},{t:'DRESS Syndrome',q:'Diagnostic criteria for DRESS syndrome?',h:'RegiSCAR criteria',o:[{id:'a',txt:'Drug exposure + rash + fever + eosinophilia/atypical lymphocytes + lymphadenopathy + organ involvement (liver, kidney, lung)',c:1,p:100},{id:'b',txt:'Rash only',c:0,p:20},{id:'c',txt:'No organ involvement',c:0,p:20}],fb:{1:'<b>Correct!</b> DRESS: Onset 2-8 weeks. Facial edema, morbilliform rash, fever, lymphadenopathy, eosinophilia (>700), atypical lymphocytes, organ involvement (liver 80%, kidney 40%, lung). HHV-6 reactivation common.',0:'<b>DRESS:</b> Rash + fever + eosinophilia + lymphadenopathy + organ involvement.'}},{t:'SCORTEN',q:'What is SCORTEN and how is it used?',h:'Prognosis scoring',o:[{id:'a',txt:'Prognostic score for SJS/TEN mortality using age, malignancy, BSA, HR, BUN, glucose, bicarbonate',c:1,p:100},{id:'b',txt:'Treatment guide',c:0,p:20},{id:'c',txt:'Diagnosis tool',c:0,p:20}],fb:{1:'<b>Correct!</b> SCORTEN: Age ≥40, malignancy, HR ≥120, initial BSA >10%, BUN >28, glucose >252, bicarb <20. Each = 1 point. Mortality: 0-1 (3%), 2 (12%), 3 (35%), 4 (58%), ≥5 (90%).',0:'<b>SCORTEN:</b> Predicts TEN mortality. Higher score = worse prognosis.'}},{t:'Management',q:'Key management principles for SJS/TEN?',h:'Burn unit care',o:[{id:'a',txt:'STOP offending drug, burn unit/ICU, supportive care (fluids, wound care, temp regulation), ophthalmology consult, consider IVIG/steroids controversial',c:1,p:100},{id:'b',txt:'Continue medication',c:0,p:10},{id:'c',txt:'Outpatient management',c:0,p:10}],fb:{1:'<b>Correct!</b> Management: Immediately stop culprit drug (reduces mortality), burn unit transfer (SCORTEN ≥2), aggressive fluids, wound care (non-adhesive), thermoregulation, nutrition, ophthalmology (prevent synechiae). IVIG/steroids controversial.',0:'<b>Management:</b> Stop drug immediately, burn unit, supportive care.'}},{t:'Complications',q:'Major complications of SJS/TEN?',h:'Long-term sequelae',o:[{id:'a',txt:'Ocular (scarring, blindness), sepsis, fluid/electrolyte imbalance, scarring, strictures (esophageal, GU)',c:1,p:100},{id:'b',txt:'No complications',c:0,p:10},{id:'c',txt:'Only skin issues',c:0,p:20}],fb:{1:'<b>Correct!</b> Acute: Sepsis (#1 cause death), fluid loss, electrolyte imbalance. Chronic: Ocular (50% have sequelae - scarring, dry eye, blindness), skin scarring, nail dystrophy, mucosal strictures, PTSD.',0:'<b>Complications:</b> Ocular, sepsis, strictures, scarring.'}},{t:'Prevention',q:'How to prevent recurrence of SCARs?',h:'Drug avoidance',o:[{id:'a',txt:'Lifelong avoidance of culprit drug and cross-reactive drugs, medical alert bracelet, document in medical record',c:1,p:100},{id:'b',txt:'Can rechallenge',c:0,p:10},{id:'c',txt:'No special precautions',c:0,p:10}],fb:{1:'<b>Correct!</b> Prevention: Absolute contraindication to culprit drug (rechallenge can be fatal). Avoid cross-reactive drugs (aromatic anticonvulsants). HLA testing before starting high-risk drugs in certain populations. Medical alert bracelet.',0:'<b>Prevention:</b> Lifelong avoidance, document, medical alert bracelet.'}}];
let sel=null;function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}function start(){S.q=1;S.stage='question';render();}function go(s){S.stage=s;render();}function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>💊 Drug Eruption</h1><p style="color:var(--muted);margin-bottom:32px">SCARs: SJS/TEN, DRESS, recognition, management, prognosis</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">💊 Severe Drug Reaction</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">SCAR Pearls</div><div class="pearl-item"><b>SCARs:</b> SJS (<10% BSA), TEN (>30%), DRESS, AGEP</div><div class="pearl-item"><b>SJS/TEN:</b> Targetoid, mucosal, Nikolsky+, epidermal detachment</div><div class="pearl-item"><b>Culprits:</b> Sulfonamides, anticonvulsants, allopurinol</div><div class="pearl-item"><b>DRESS:</b> Rash + fever + eosinophilia + organ involvement</div><div class="pearl-item"><b>SCORTEN:</b> Predicts TEN mortality</div><div class="pearl-item"><b>Management:</b> Stop drug, burn unit, supportive care</div></div><div class="cross-link"><a href="dress-adventure-enhanced.html">Related: DRESS</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}document.addEventListener('DOMContentLoaded',render);</script></body></html>
