<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Spreading Rash | ReasonDx Adventure</title>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --border: #334155; --text: #F1F5F9; --muted: #94A3B8; --accent: #EF4444; --success: #10B981; --warning: #F59E0B; --danger: #DC2626; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
        .header { background: linear-gradient(135deg, #DC2626 0%, #EF4444 100%); padding: 12px 20px; position: sticky; top: 0; z-index: 100; }
        .header-row { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .header-title { font-size: 1.1rem; font-weight: 600; }
        .stat { background: rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 8px; }
        .stat-value { font-size: 1.1rem; font-weight: 700; font-family: monospace; }
        .stat-label { font-size: 0.6rem; opacity: 0.8; text-transform: uppercase; }
        .main { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; }
        .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .card-phase { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
        .card-title { font-size: 1.5rem; font-weight: 700; }
        .card-body { padding: 24px; }
        .narrative { background: linear-gradient(135deg, rgba(239,68,68,0.1), rgba(220,38,38,0.1)); border-left: 4px solid var(--accent); padding: 20px 24px; border-radius: 0 12px 12px 0; margin-bottom: 24px; line-height: 1.8; }
        .narrative .hl { background: rgba(239,68,68,0.3); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .setup-screen { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; }
        .setup-screen h1 { font-size: 2rem; margin-bottom: 8px; }
        .setup-screen .subtitle { color: var(--muted); margin-bottom: 32px; }
        .start-btn { background: var(--accent); color: white; border: none; padding: 16px 48px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .question-section { margin-bottom: 32px; }
        .question-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .question-number { background: var(--accent); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .question-text { font-size: 1.1rem; font-weight: 600; }
        .radio-options { display: flex; flex-direction: column; gap: 10px; }
        .radio-option { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .radio-option:hover { border-color: var(--accent); }
        .radio-option.selected { border-color: var(--accent); background: rgba(239,68,68,0.15); }
        .radio-option.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .radio-option.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .radio-circle { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; }
        .radio-option.selected .radio-circle { border-color: var(--accent); background: radial-gradient(circle, var(--accent) 40%, transparent 40%); }
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .checkbox-item:hover { border-color: var(--accent); }
        .checkbox-item.selected { border-color: var(--accent); background: rgba(239,68,68,0.15); }
        .checkbox-item.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .checkbox-item.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .checkbox-box { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .checkbox-item.selected .checkbox-box { background: var(--accent); border-color: var(--accent); }
        .checkbox-item.selected .checkbox-box::after { content: '✓'; color: white; font-weight: bold; }
        .feedback { padding: 20px; border-radius: 12px; margin: 20px 0; }
        .feedback.excellent { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); }
        .feedback.acceptable { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); }
        .feedback-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .feedback-icon { font-size: 1.5rem; }
        .feedback-title { font-weight: 700; }
        .feedback-text { color: var(--muted); line-height: 1.7; }
        .feedback-text strong { color: var(--text); }
        .alert { padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; }
        .alert.danger { background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.3); }
        .alert-icon { font-size: 1.5rem; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: 600; margin-bottom: 4px; }
        .alert-desc { font-size: 0.9rem; color: var(--muted); }
        .btn { padding: 14px 28px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-row { display: flex; gap: 12px; margin-top: 24px; }
        .lab-panel { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .lab-panel-title { font-weight: 600; margin-bottom: 16px; color: var(--accent); }
        .lab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
        .lab-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; }
        .lab-name { font-size: 0.8rem; color: var(--muted); }
        .lab-value { font-size: 1.1rem; font-weight: 700; }
        .lab-value.critical { color: var(--danger); }
        .lab-range { font-size: 0.7rem; color: var(--muted); }
        .outcome { text-align: center; padding: 40px 20px; }
        .outcome-icon { font-size: 4rem; margin-bottom: 16px; }
        .outcome-title { font-size: 2rem; font-weight: 700; color: var(--success); margin-bottom: 8px; }
        .outcome-desc { color: var(--muted); max-width: 600px; margin: 0 auto 24px; }
        .score-summary { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 24px; margin: 24px auto; max-width: 500px; }
        .score-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .score-row:last-child { border-bottom: none; }
        .patient-panel { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
        .patient-panel-title { font-size: 0.8rem; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
        .patient-info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
        .patient-info-label { font-size: 0.7rem; color: var(--muted); }
        .patient-info-value { font-weight: 600; }
    </style>
</head>
<body>
    <header class="header"><div class="header-row"><div class="header-title">🔥 The Spreading Rash</div><div class="stat"><div class="stat-value" id="scoreDisplay">0</div><div class="stat-label">Points</div></div></div></header>
    <main class="main"><div id="stageContainer"></div></main>
    <script>
    const state = { stage:'setup', score:0 };
    
    const highRiskDrugs = [
        { id: 'allopurinol', text: 'Allopurinol', isHigh: true },
        { id: 'sulfa', text: 'Sulfonamides', isHigh: true },
        { id: 'anticonv', text: 'Anticonvulsants', isHigh: true },
        { id: 'nsaids', text: 'NSAIDs (oxicam)', isHigh: true },
        { id: 'ace', text: 'ACE inhibitors', isHigh: false },
        { id: 'statins', text: 'Statins', isHigh: false }
    ];

    const sjsFeatures = [
        { id: 'mucosal', text: 'Mucosal involvement (≥2 sites)', isFeat: true },
        { id: 'target', text: 'Atypical targetoid lesions', isFeat: true },
        { id: 'detach', text: 'Epidermal detachment/blisters', isFeat: true },
        { id: 'nikolsky', text: 'Positive Nikolsky sign', isFeat: true },
        { id: 'eos', text: 'Marked eosinophilia', isFeat: false },
        { id: 'lymph', text: 'Lymphadenopathy', isFeat: false }
    ];

    function addScore(pts) { state.score += pts; document.getElementById('scoreDisplay').textContent = state.score; }

    const stages = {
        setup: { render: () => `
            <div class="setup-screen">
                <h1>🔥 The Spreading Rash</h1>
                <p class="subtitle">SJS/TEN recognition and management</p>
                <button class="start-btn" onclick="goTo('referral')">Begin Case →</button>
            </div>`
        },
        referral: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Emergency Department</div><div class="card-title">📋 Widespread Rash</div></div>
                <div class="card-body">
                    <div class="narrative">A <span class="hl">45-year-old male</span> presents with a <span class="hl">rapidly spreading painful rash</span> for 2 days. He was started on <span class="hl">allopurinol 3 weeks ago</span> for gout.<br><br>He developed <span class="hl">fever and malaise</span>, then a painful rash spreading from trunk to face and extremities. Today he has <span class="hl">mouth sores</span> and <span class="hl">painful red eyes</span>.<br><br>Exam: <span class="hl">Dusky red macules with central blistering</span>, <span class="hl">oral erosions</span>, <span class="hl">conjunctival injection</span>. Skin slides off with lateral pressure (<span class="hl">Nikolsky positive</span>). BSA involvement ~<span class="hl">12%</span>.</div>
                    <div class="patient-panel">
                        <div class="patient-panel-title">Patient Information</div>
                        <div class="patient-info-grid">
                            <div><div class="patient-info-label">Age/Sex</div><div class="patient-info-value">45 y/o Male</div></div>
                            <div><div class="patient-info-label">New Drug</div><div class="patient-info-value">Allopurinol (3 wks)</div></div>
                            <div><div class="patient-info-label">BSA involved</div><div class="patient-info-value">~12%</div></div>
                            <div><div class="patient-info-label">Nikolsky</div><div class="patient-info-value">Positive</div></div>
                            <div><div class="patient-info-label">Mucosal</div><div class="patient-info-value">Oral + ocular</div></div>
                            <div><div class="patient-info-label">Fever</div><div class="patient-info-value">39.2°C</div></div>
                        </div>
                    </div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="goTo('diagnosis')">Make Diagnosis →</button></div>
                </div>
            </div>`
        },
        diagnosis: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Diagnosis</div><div class="card-title">🎯 Identify the Reaction</div></div>
                <div class="card-body">
                    <div class="alert danger"><span class="alert-icon">⚠️</span><div class="alert-content"><div class="alert-title">SCAR Classification by BSA</div><div class="alert-desc">SJS: &lt;10% BSA detachment | SJS-TEN overlap: 10-30% | TEN: &gt;30%</div></div></div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">1</div><div class="question-text">What is the most likely diagnosis?</div></div>
                        <div class="radio-options" id="dxOpts">
                            <div class="radio-option" data-id="sjs" onclick="selectDx('sjs')"><div class="radio-circle"></div><div><strong>Stevens-Johnson Syndrome (SJS)</strong><br><small style="color:var(--muted)">&lt;10% BSA epidermal detachment</small></div></div>
                            <div class="radio-option" data-id="overlap" onclick="selectDx('overlap')"><div class="radio-circle"></div><div><strong>SJS-TEN Overlap</strong><br><small style="color:var(--muted)">10-30% BSA epidermal detachment</small></div></div>
                            <div class="radio-option" data-id="ten" onclick="selectDx('ten')"><div class="radio-circle"></div><div><strong>Toxic Epidermal Necrolysis (TEN)</strong><br><small style="color:var(--muted)">&gt;30% BSA epidermal detachment</small></div></div>
                            <div class="radio-option" data-id="dress" onclick="selectDx('dress')"><div class="radio-circle"></div><div><strong>DRESS Syndrome</strong><br><small style="color:var(--muted)">Eosinophilia, organ involvement, minimal blistering</small></div></div>
                        </div>
                    </div>
                    <div id="dxFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="dxSubmit" onclick="submitDx()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        features: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Recognition</div><div class="card-title">🔍 SJS/TEN Features</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">2</div><div class="question-text">Which features are characteristic of SJS/TEN?</div></div>
                        <div class="checkbox-grid" id="featOpts">${sjsFeatures.map(f=>`<div class="checkbox-item" data-id="${f.id}" data-feat="${f.isFeat}" onclick="toggleFeat('${f.id}')"><div class="checkbox-box"></div><span>${f.text}</span></div>`).join('')}</div>
                    </div>
                    <div id="featFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="submitFeat()">Submit →</button></div>
                </div>
            </div>`
        },
        drugs: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Causality</div><div class="card-title">💊 High-Risk Drugs</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">3</div><div class="question-text">Which drugs are HIGH-RISK for SJS/TEN?</div></div>
                        <div class="checkbox-grid" id="drugOpts">${highRiskDrugs.map(d=>`<div class="checkbox-item" data-id="${d.id}" data-high="${d.isHigh}" onclick="toggleDrug('${d.id}')"><div class="checkbox-box"></div><span>${d.text}</span></div>`).join('')}</div>
                    </div>
                    <div id="drugFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="submitDrug()">Submit →</button></div>
                </div>
            </div>`
        },
        management: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Management</div><div class="card-title">🏥 Treatment</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">4</div><div class="question-text">What is the MOST important initial intervention?</div></div>
                        <div class="radio-options" id="mgmtOpts">
                            <div class="radio-option" data-id="stop" onclick="selectMgmt('stop')"><div class="radio-circle"></div><div><strong>Immediately stop the causative drug</strong><br><small style="color:var(--muted)">Remove offending agent ASAP</small></div></div>
                            <div class="radio-option" data-id="steroids" onclick="selectMgmt('steroids')"><div class="radio-circle"></div><div><strong>High-dose IV corticosteroids</strong><br><small style="color:var(--muted)">Immunosuppression</small></div></div>
                            <div class="radio-option" data-id="ivig" onclick="selectMgmt('ivig')"><div class="radio-circle"></div><div><strong>IVIG</strong><br><small style="color:var(--muted)">Anti-Fas ligand antibodies</small></div></div>
                            <div class="radio-option" data-id="cyclo" onclick="selectMgmt('cyclo')"><div class="radio-circle"></div><div><strong>Cyclosporine</strong><br><small style="color:var(--muted)">T-cell inhibition</small></div></div>
                        </div>
                    </div>
                    <div id="mgmtFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="mgmtSubmit" onclick="submitMgmt()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        outcome: { render: () => `
            <div class="card"><div class="card-body">
                <div class="outcome">
                    <div class="outcome-icon">🎉</div>
                    <div class="outcome-title">Patient Survived!</div>
                    <div class="outcome-desc">Allopurinol was stopped immediately. Patient was transferred to burn unit, received aggressive supportive care with wound management and ophthalmology involvement. Cyclosporine was started. After 3 weeks, skin healed with some scarring. He was counseled to NEVER take allopurinol again.</div>
                </div>
                <div class="score-summary">
                    <h3 style="margin-bottom:16px">Performance</h3>
                    <div class="score-row"><span>Diagnosis</span><span>${state.dxScore||0}/100</span></div>
                    <div class="score-row"><span>SJS/TEN Features</span><span>${state.featScore||0}/100</span></div>
                    <div class="score-row"><span>High-Risk Drugs</span><span>${state.drugScore||0}/100</span></div>
                    <div class="score-row"><span>Management</span><span>${state.mgmtScore||0}/100</span></div>
                    <div class="score-row" style="border-top:2px solid var(--border);padding-top:12px"><strong>Total</strong><strong>${state.score}</strong></div>
                </div>
                <div class="feedback excellent"><div class="feedback-header"><span class="feedback-icon">💡</span><span class="feedback-title">SCAR Pearls</span></div><div class="feedback-text">• <strong>SJS/TEN spectrum:</strong> SJS &lt;10%, overlap 10-30%, TEN &gt;30% BSA<br>• <strong>Key features:</strong> Prodrome → targetoid lesions → mucosal involvement → epidermal detachment<br>• <strong>High-risk drugs:</strong> Allopurinol, sulfonamides, anticonvulsants, NSAIDs (oxicam)<br>• <strong>STOP the drug immediately</strong> - single most important intervention<br>• <strong>Burn unit care:</strong> Wound management, fluid/electrolytes, infection prevention<br>• <strong>SCORTEN:</strong> Predicts mortality (age, malignancy, HR, BUN, bicarb, glucose, BSA)<br>• <strong>Ophthalmology urgent</strong> - prevent cicatricial complications<br>• <strong>DRESS vs SJS/TEN:</strong> DRESS has eosinophilia, organ involvement, less blistering</div></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="location.reload()">Play Again</button></div>
            </div></div>`
        }
    };

    let selectedDx = null;
    function selectDx(id) { selectedDx = id; document.querySelectorAll('#dxOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('dxSubmit').disabled = false; }
    function submitDx() {
        document.querySelectorAll('#dxOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'overlap') o.classList.add('correct');
            else if (o.dataset.id === selectedDx) o.classList.add('incorrect');
        });
        state.dxScore = selectedDx === 'overlap' ? 100 : (selectedDx === 'sjs' ? 60 : 40);
        addScore(selectedDx === 'overlap' ? 40 : 15);
        document.getElementById('dxFeedback').innerHTML = `<div class="feedback ${selectedDx==='overlap'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedDx==='overlap'?'✅':'📚'}</span><span class="feedback-title">${selectedDx==='overlap'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>SJS-TEN Overlap:</strong> 12% BSA falls in 10-30% range.<br>• SJS: &lt;10% BSA<br>• Overlap: 10-30%<br>• TEN: &gt;30%<br>DRESS would have eosinophilia, organ involvement, less blistering.</div></div>`;
        document.getElementById('dxSubmit').textContent = 'Continue →';
        document.getElementById('dxSubmit').onclick = () => goTo('features');
    }

    let selectedFeat = new Set();
    function toggleFeat(id) {
        const el = document.querySelector(`#featOpts .checkbox-item[data-id="${id}"]`);
        if(selectedFeat.has(id)) { selectedFeat.delete(id); el.classList.remove('selected'); }
        else { selectedFeat.add(id); el.classList.add('selected'); }
    }
    function submitFeat() {
        let correct = 0;
        sjsFeatures.forEach(f => {
            const el = document.querySelector(`#featOpts .checkbox-item[data-id="${f.id}"]`);
            const sel = selectedFeat.has(f.id);
            if (f.isFeat && sel) { el.classList.add('correct'); correct++; }
            else if (!f.isFeat && sel) { el.classList.add('incorrect'); }
        });
        state.featScore = Math.round(correct / 4 * 100);
        addScore(Math.round(state.featScore / 2.5));
        document.getElementById('featFeedback').innerHTML = `<div class="feedback ${state.featScore>=75?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${state.featScore>=75?'✅':'📚'}</span><span class="feedback-title">SJS/TEN Features</span></div><div class="feedback-text"><strong>SJS/TEN:</strong> Mucosal involvement (≥2 sites), atypical targets, epidermal detachment, Nikolsky+<br><strong>DRESS features (different!):</strong> Eosinophilia, lymphadenopathy, hepatitis</div></div>`;
        document.querySelector('#featFeedback').closest('.card-body').querySelector('.btn-row').innerHTML = `<button class="btn btn-primary" onclick="goTo('drugs')">Identify Culprit →</button>`;
    }

    let selectedDrug = new Set();
    function toggleDrug(id) {
        const el = document.querySelector(`#drugOpts .checkbox-item[data-id="${id}"]`);
        if(selectedDrug.has(id)) { selectedDrug.delete(id); el.classList.remove('selected'); }
        else { selectedDrug.add(id); el.classList.add('selected'); }
    }
    function submitDrug() {
        let correct = 0;
        highRiskDrugs.forEach(d => {
            const el = document.querySelector(`#drugOpts .checkbox-item[data-id="${d.id}"]`);
            const sel = selectedDrug.has(d.id);
            if (d.isHigh && sel) { el.classList.add('correct'); correct++; }
            else if (!d.isHigh && sel) { el.classList.add('incorrect'); }
        });
        state.drugScore = Math.round(correct / 4 * 100);
        addScore(Math.round(state.drugScore / 2.5));
        document.getElementById('drugFeedback').innerHTML = `<div class="feedback ${state.drugScore>=75?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${state.drugScore>=75?'✅':'📚'}</span><span class="feedback-title">High-Risk Drugs</span></div><div class="feedback-text"><strong>Highest risk:</strong> Allopurinol (#1), sulfonamides, anticonvulsants (phenytoin, carbamazepine, lamotrigine, phenobarbital), NSAIDs (especially piroxicam)<br><strong>Others:</strong> Nevirapine, antibiotics</div></div>`;
        document.querySelector('#drugFeedback').closest('.card-body').querySelector('.btn-row').innerHTML = `<button class="btn btn-primary" onclick="goTo('management')">Plan Treatment →</button>`;
    }

    let selectedMgmt = null;
    function selectMgmt(id) { selectedMgmt = id; document.querySelectorAll('#mgmtOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('mgmtSubmit').disabled = false; }
    function submitMgmt() {
        document.querySelectorAll('#mgmtOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'stop') o.classList.add('correct');
            else if (o.dataset.id === selectedMgmt) o.classList.add('incorrect');
        });
        state.mgmtScore = selectedMgmt === 'stop' ? 100 : 40;
        addScore(selectedMgmt === 'stop' ? 40 : 15);
        document.getElementById('mgmtFeedback').innerHTML = `<div class="feedback ${selectedMgmt==='stop'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedMgmt==='stop'?'✅':'📚'}</span><span class="feedback-title">${selectedMgmt==='stop'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>STOP THE DRUG</strong> is the single most important intervention.<br>Early withdrawal associated with better outcomes.<br><br>Other management: Burn unit care, cyclosporine (some evidence), supportive care. IVIG and steroids are controversial.</div></div>`;
        document.getElementById('mgmtSubmit').textContent = 'Complete →';
        document.getElementById('mgmtSubmit').onclick = () => goTo('outcome');
    }

    function goTo(id) { state.stage = id; document.getElementById('stageContainer').innerHTML = stages[id].render(); window.scrollTo(0,0); }
    document.addEventListener('DOMContentLoaded', () => goTo('setup'));
    </script>
</body>
</html>
