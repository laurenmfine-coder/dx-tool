<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Spreading Infection | ReasonDx Adventure</title>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --border: #334155; --text: #F1F5F9; --muted: #94A3B8; --accent: #7C2D12; --success: #10B981; --warning: #F59E0B; --danger: #DC2626; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
        .header { background: linear-gradient(135deg, #9A3412 0%, #C2410C 100%); padding: 12px 20px; position: sticky; top: 0; z-index: 100; }
        .header-row { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .header-title { font-size: 1.1rem; font-weight: 600; }
        .stat { background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 8px; }
        .stat-value { font-size: 1.1rem; font-weight: 700; font-family: monospace; }
        .stat-label { font-size: 0.6rem; opacity: 0.8; text-transform: uppercase; }
        .main { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; }
        .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .card-phase { font-size: 0.75rem; color: #FB923C; text-transform: uppercase; margin-bottom: 4px; }
        .card-title { font-size: 1.5rem; font-weight: 700; }
        .card-body { padding: 24px; }
        .narrative { background: linear-gradient(135deg, rgba(194,65,12,0.1), rgba(154,52,18,0.1)); border-left: 4px solid #FB923C; padding: 20px 24px; border-radius: 0 12px 12px 0; margin-bottom: 24px; line-height: 1.8; }
        .narrative .hl { background: rgba(251,146,60,0.3); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .setup-screen { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; }
        .setup-screen h1 { font-size: 2rem; margin-bottom: 8px; }
        .setup-screen .subtitle { color: var(--muted); margin-bottom: 32px; }
        .start-btn { background: #C2410C; color: white; border: none; padding: 16px 48px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .radio-options { display: flex; flex-direction: column; gap: 10px; }
        .radio-option { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .radio-option:hover { border-color: #FB923C; }
        .radio-option.selected { border-color: #FB923C; background: rgba(251,146,60,0.15); }
        .radio-option.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .radio-option.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .radio-circle { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; }
        .radio-option.selected .radio-circle { border-color: #FB923C; background: radial-gradient(circle, #FB923C 40%, transparent 40%); }
        .feedback { padding: 20px; border-radius: 12px; margin: 20px 0; }
        .feedback.excellent { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); }
        .feedback.acceptable { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); }
        .feedback-text { color: var(--muted); line-height: 1.7; }
        .feedback-text strong { color: var(--text); }
        .btn { padding: 14px 28px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: #C2410C; color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-row { display: flex; gap: 12px; margin-top: 24px; }
        .question-section { margin-bottom: 32px; }
        .question-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .question-number { background: #FB923C; color: #0F172A; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .question-text { font-size: 1.1rem; font-weight: 600; }
        .alert { padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; }
        .alert.danger { background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.3); }
        .alert-icon { font-size: 1.5rem; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: 600; margin-bottom: 4px; }
        .alert-desc { font-size: 0.9rem; color: var(--muted); }
        .outcome { text-align: center; padding: 40px 20px; }
        .outcome-icon { font-size: 4rem; margin-bottom: 16px; }
        .outcome-title { font-size: 2rem; font-weight: 700; color: var(--success); margin-bottom: 8px; }
        .outcome-desc { color: var(--muted); max-width: 600px; margin: 0 auto 24px; }
        .score-summary { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 24px; margin: 24px auto; max-width: 500px; }
        .score-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .score-row:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <header class="header"><div class="header-row"><div class="header-title">🔥 The Spreading Infection</div><div class="stat"><div class="stat-value" id="scoreDisplay">0</div><div class="stat-label">Points</div></div></div></header>
    <main class="main"><div id="stageContainer"></div></main>
    <script>
    const state = { stage:'setup', score:0 };
    function addScore(pts) { state.score += pts; document.getElementById('scoreDisplay').textContent = state.score; }
    const stages = {
        setup: { render: () => `<div class="setup-screen"><h1>🔥 The Spreading Infection</h1><p class="subtitle">Necrotizing fasciitis recognition</p><button class="start-btn" onclick="goTo('presentation')">Begin Case →</button></div>` },
        presentation: { render: () => `<div class="card"><div class="card-header"><div class="card-phase">Emergency Department</div><div class="card-title">📋 Severe Leg Pain</div></div><div class="card-body"><div class="narrative">A <span class="hl">52-year-old diabetic male</span> presents with <span class="hl">2 days of worsening left leg pain</span> after a <span class="hl">minor cut</span> while gardening. He describes the pain as <span class="hl">"out of proportion"</span> to how it looks.<br><br>On exam: <span class="hl">Erythema spreading beyond initial marks</span>, <span class="hl">tense edema</span>, <span class="hl">dusky discoloration</span> centrally, <span class="hl">exquisite tenderness</span>. T 39.2°C, HR 118, BP 98/62.</div><div class="btn-row"><button class="btn btn-primary" onclick="goTo('redflags')">Identify Red Flags →</button></div></div></div>` },
        redflags: { render: () => `<div class="card"><div class="card-header"><div class="card-phase">Red Flags</div><div class="card-title">⚠️ Warning Signs</div></div><div class="card-body"><div class="question-section"><div class="question-header"><div class="question-number">1</div><div class="question-text">The hallmark finding suggesting necrotizing fasciitis vs simple cellulitis is:</div></div><div class="radio-options" id="q1"><div class="radio-option" data-id="pain" onclick="sel('q1','pain')"><div class="radio-circle"></div><div><strong>Pain out of proportion to physical findings</strong><br><small style="color:var(--muted)">Classic early finding</small></div></div><div class="radio-option" data-id="erythema" onclick="sel('q1','erythema')"><div class="radio-circle"></div><span>Erythema</span></div><div class="radio-option" data-id="fever" onclick="sel('q1','fever')"><div class="radio-circle"></div><span>Fever</span></div><div class="radio-option" data-id="swelling" onclick="sel('q1','swelling')"><div class="radio-circle"></div><span>Swelling</span></div></div></div><div id="fb1"></div><div class="btn-row"><button class="btn btn-primary" id="sub1" onclick="sub1()" disabled>Submit →</button></div></div></div>` },
        hardfindings: { render: () => `<div class="card"><div class="card-header"><div class="card-phase">Late Signs</div><div class="card-title">💀 Hard Signs</div></div><div class="card-body"><div class="alert danger"><span class="alert-icon">🚨</span><div class="alert-content"><div class="alert-title">These are LATE/ominous findings:</div><div class="alert-desc">Crepitus, bullae/blisters, skin necrosis, anesthesia (nerve death), hemorrhagic bullae</div></div></div><div class="question-section"><div class="question-header"><div class="question-number">2</div><div class="question-text">What causes crepitus in necrotizing fasciitis?</div></div><div class="radio-options" id="q2"><div class="radio-option" data-id="gas" onclick="sel('q2','gas')"><div class="radio-circle"></div><div><strong>Gas production by bacteria in tissue</strong><br><small style="color:var(--muted)">Clostridium, other anaerobes, or polymicrobial</small></div></div><div class="radio-option" data-id="air" onclick="sel('q2','air')"><div class="radio-circle"></div><span>Atmospheric air entering wound</span></div><div class="radio-option" data-id="edema" onclick="sel('q2','edema')"><div class="radio-circle"></div><span>Tissue edema</span></div></div></div><div id="fb2"></div><div class="btn-row"><button class="btn btn-primary" id="sub2" onclick="sub2()" disabled>Submit →</button></div></div></div>` },
        treatment: { render: () => `<div class="card"><div class="card-header"><div class="card-phase">Treatment</div><div class="card-title">🔪 Definitive Management</div></div><div class="card-body"><div class="question-section"><div class="question-header"><div class="question-number">3</div><div class="question-text">The MOST important treatment for necrotizing fasciitis is:</div></div><div class="radio-options" id="q3"><div class="radio-option" data-id="surgery" onclick="sel('q3','surgery')"><div class="radio-circle"></div><div><strong>EMERGENT surgical debridement</strong><br><small style="color:var(--muted)">Source control is paramount</small></div></div><div class="radio-option" data-id="abx" onclick="sel('q3','abx')"><div class="radio-circle"></div><span>IV antibiotics alone</span></div><div class="radio-option" data-id="imaging" onclick="sel('q3','imaging')"><div class="radio-circle"></div><span>CT scan before any treatment</span></div><div class="radio-option" data-id="observation" onclick="sel('q3','observation')"><div class="radio-circle"></div><span>Admit for observation</span></div></div></div><div id="fb3"></div><div class="btn-row"><button class="btn btn-primary" id="sub3" onclick="sub3()" disabled>Submit →</button></div></div></div>` },
        antibiotics: { render: () => `<div class="card"><div class="card-header"><div class="card-phase">Antibiotics</div><div class="card-title">💊 Coverage</div></div><div class="card-body"><div class="question-section"><div class="question-header"><div class="question-number">4</div><div class="question-text">Empiric antibiotic coverage for nec fasc should include:</div></div><div class="radio-options" id="q4"><div class="radio-option" data-id="broad" onclick="sel('q4','broad')"><div class="radio-circle"></div><div><strong>Broad spectrum: vanc + pip-tazo (or carbapenem) + clindamycin</strong><br><small style="color:var(--muted)">MRSA + GNR + anaerobes + toxin suppression</small></div></div><div class="radio-option" data-id="vanc" onclick="sel('q4','vanc')"><div class="radio-circle"></div><span>Vancomycin alone</span></div><div class="radio-option" data-id="cipro" onclick="sel('q4','cipro')"><div class="radio-circle"></div><span>Ciprofloxacin</span></div></div></div><div id="fb4"></div><div class="btn-row"><button class="btn btn-primary" id="sub4" onclick="sub4()" disabled>Submit →</button></div></div></div>` },
        outcome: { render: () => `<div class="card"><div class="card-body"><div class="outcome"><div class="outcome-icon">🎉</div><div class="outcome-title">Surgery Performed!</div><div class="outcome-desc">Emergent surgical exploration revealed necrotic fascia. Wide debridement performed. Required 3 return trips to OR for re-debridement. Eventually skin grafting. Prolonged hospitalization but survived.</div></div><div class="score-summary"><h3 style="margin-bottom:16px">Performance</h3><div class="score-row"><span>Red Flags</span><span>${state.s1||0}/100</span></div><div class="score-row"><span>Crepitus</span><span>${state.s2||0}/100</span></div><div class="score-row"><span>Treatment</span><span>${state.s3||0}/100</span></div><div class="score-row"><span>Antibiotics</span><span>${state.s4||0}/100</span></div><div class="score-row" style="border-top:2px solid var(--border);padding-top:12px"><strong>Total</strong><strong>${state.score}</strong></div></div><div class="feedback excellent"><div class="feedback-text">• <strong>Pain out of proportion:</strong> #1 early sign - severe pain with minimal skin findings<br>• <strong>Hard signs (late):</strong> Crepitus, bullae, necrosis, anesthesia (nerve death)<br>• <strong>Risk factors:</strong> Diabetes, immunocompromise, IVDU, recent surgery, trauma<br>• <strong>Types:</strong> Type I = polymicrobial (most common); Type II = GAS (strep); Type III = marine Vibrio<br>• <strong>SURGERY IS KEY:</strong> Every hour of delay increases mortality significantly<br>• <strong>Don't wait for imaging!</strong> If high suspicion → OR. CT can help but negative doesn't rule out<br>• <strong>Antibiotics:</strong> Vanc (MRSA) + pip-tazo or carbapenem (GNR + anaerobes) + clindamycin (toxin suppression)<br>• <strong>Clindamycin:</strong> Suppresses toxin production by GAS and Clostridium<br>• <strong>LRINEC score:</strong> Lab risk indicator - CRP, WBC, Hgb, Na, Cr, glucose - can help stratify</div></div><div class="btn-row"><button class="btn btn-primary" onclick="location.reload()">Play Again</button></div></div></div>` }
    };
    let ans = {};
    function sel(q,id) { ans[q]=id; document.querySelectorAll(`#${q} .radio-option`).forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('sub'+q.slice(1)).disabled=false; }
    function sub1() {
        document.querySelectorAll('#q1 .radio-option').forEach(o=>{if(o.dataset.id==='pain')o.classList.add('correct');else if(o.dataset.id===ans.q1)o.classList.add('incorrect');});
        state.s1=ans.q1==='pain'?100:40; addScore(ans.q1==='pain'?50:15);
        document.getElementById('fb1').innerHTML=`<div class="feedback ${ans.q1==='pain'?'excellent':'acceptable'}"><div class="feedback-text"><strong>Pain out of proportion!</strong> This is the classic early clue. The skin may look relatively benign, but the patient has severe, exquisite pain. The infection is deep in fascia - skin changes come later.</div></div>`;
        document.getElementById('sub1').textContent='Continue →'; document.getElementById('sub1').onclick=()=>goTo('hardfindings');
    }
    function sub2() {
        document.querySelectorAll('#q2 .radio-option').forEach(o=>{if(o.dataset.id==='gas')o.classList.add('correct');else if(o.dataset.id===ans.q2)o.classList.add('incorrect');});
        state.s2=ans.q2==='gas'?100:50; addScore(ans.q2==='gas'?50:20);
        document.getElementById('fb2').innerHTML=`<div class="feedback ${ans.q2==='gas'?'excellent':'acceptable'}"><div class="feedback-text"><strong>Bacterial gas production!</strong> Gas-forming organisms (Clostridium, E. coli, Bacteroides, Klebsiella) produce gas in tissues. Crepitus = late/ominous sign. Absence of crepitus does NOT rule out nec fasc!</div></div>`;
        document.getElementById('sub2').textContent='Continue →'; document.getElementById('sub2').onclick=()=>goTo('treatment');
    }
    function sub3() {
        document.querySelectorAll('#q3 .radio-option').forEach(o=>{if(o.dataset.id==='surgery')o.classList.add('correct');else if(o.dataset.id===ans.q3)o.classList.add('incorrect');});
        state.s3=ans.q3==='surgery'?100:20; addScore(ans.q3==='surgery'?50:5);
        document.getElementById('fb3').innerHTML=`<div class="feedback ${ans.q3==='surgery'?'excellent':'acceptable'}"><div class="feedback-text"><strong>EMERGENT SURGERY!</strong> Source control is paramount. Mortality increases ~7-9% for every hour of surgical delay. Antibiotics alone cannot penetrate necrotic tissue. Don't wait for imaging if clinical suspicion is high!</div></div>`;
        document.getElementById('sub3').textContent='Continue →'; document.getElementById('sub3').onclick=()=>goTo('antibiotics');
    }
    function sub4() {
        document.querySelectorAll('#q4 .radio-option').forEach(o=>{if(o.dataset.id==='broad')o.classList.add('correct');else if(o.dataset.id===ans.q4)o.classList.add('incorrect');});
        state.s4=ans.q4==='broad'?100:30; addScore(ans.q4==='broad'?50:10);
        document.getElementById('fb4').innerHTML=`<div class="feedback ${ans.q4==='broad'?'excellent':'acceptable'}"><div class="feedback-text"><strong>Broad coverage!</strong> Empiric: Vancomycin (MRSA) + piperacillin-tazobactam or carbapenem (GNRs + anaerobes) + clindamycin (suppresses toxin production). Narrow based on cultures later.</div></div>`;
        document.getElementById('sub4').textContent='Complete →'; document.getElementById('sub4').onclick=()=>goTo('outcome');
    }
    function goTo(id) { state.stage=id; document.getElementById('stageContainer').innerHTML=stages[id].render(); window.scrollTo(0,0); }
    document.addEventListener('DOMContentLoaded', () => goTo('setup'));
    </script>
</body>
</html>
