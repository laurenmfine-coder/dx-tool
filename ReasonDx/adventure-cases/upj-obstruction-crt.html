    <meta charset="UTF-8">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #065f46 0%, #10b981 100%); min-height: 100vh; padding: 20px; color: #f8fafc; }

        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; margin-top: 12px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #a7f3d0, #fbbf24); border-radius: 3px; transition: width 0.3s; }

        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #fca5a5; font-weight: 600; }
        .question-box { background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(251,191,36,0.2)); border: 1px solid rgba(16,185,129,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .question-prompt { font-size: 1.1rem; font-weight: 600; color: #d1fae5; margin-bottom: 16px; }
        .mcq-options { display: flex; flex-direction: column; gap: 10px; }
        .mcq-option { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: flex-start; gap: 12px; }
        .mcq-option:hover:not(.disabled) { background: rgba(255,255,255,0.1); }
        .mcq-option.disabled { cursor: default; opacity: 0.7; }

        .mcq-option.incorrect { border-color: #ef4444 !important; background: rgba(239,68,68,0.2) !important; }
        .option-letter { width: 28px; height: 28px; background: rgba(16,185,129,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
        .feedback { display: none; margin-top: 16px; padding: 16px; border-radius: 10px; }
        .feedback.show { display: block; }
        .correct-feedback { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); }
        .incorrect-feedback { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); }
        .teaching-point { display: none; margin-top: 20px; background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); border-radius: 12px; padding: 20px; }
        .teaching-point.show { display: block; }
        .mechanism-box { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 16px; margin: 12px 0; }
        .mechanism-title { color: #a7f3d0; font-weight: 600; margin-bottom: 10px; }
        .pathway { font-family: 'Monaco', 'Consolas', monospace; font-size: 0.85rem; white-space: pre-wrap; line-height: 1.6; }
        .btn { background: linear-gradient(135deg, #10b981, #fbbf24); color: white; border: none; padding: 12px 28px; border-radius: 25px; font-weight: 600; cursor: pointer; display: none; margin-top: 16px; }

<body>
    <div class="container">
        <div class="header">
            <h1>🔀 UPJ Obstruction</h1>
            <div class="score-display">
                <div class="score-item">Score: <strong id="score">0</strong>/<span id="maxScore">60</span></div>
                <div class="score-item">Stage: <span id="stageNum">1</span>/6</div>
            </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width: 16%"></div></div>
        <div id="scene-container"></div>
    </div>
    <script>
    let currentStage = 0, score = 0;
    const stages = [
        {title:"Prenatal Finding",content:'<div class="narrative"><p>A pregnant woman has her <span class="highlight">20-week anatomy ultrasound</span>. The report notes <span class="critical">left-sided fetal hydronephrosis</span> with anteroposterior renal pelvic diameter (APD) of 12mm. The <span class="highlight">ureter is NOT dilated</span>. Bladder appears normal. Amniotic fluid is normal.</p></div>',question:{prompt:"What is the most likely cause of unilateral hydronephrosis WITHOUT ureteral dilation?",options:[{text:"Posterior urethral valves",correct:false},{text:"Vesicoureteral reflux",correct:false},{text:"UPJ obstruction",correct:true},{text:"Ureterocele",correct:false}],explanation:{correct:"Correct! UPJ obstruction causes hydronephrosis (dilated renal pelvis) WITHOUT ureteral dilation because the blockage is at the junction of pelvis and ureter. The ureter below is normal. This is the #1 cause of significant prenatal hydronephrosis.",incorrect:"Dilated pelvis WITHOUT dilated ureter = UPJ obstruction. If ureter were dilated too, consider VUR or UVJ obstruction."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Key Differentiator</div><div class="pathway">UPJ OBSTRUCTION:\n• Dilated renal pelvis ✓\n• Ureter NOT dilated ✓\n• Bladder normal\n\nVESICOURETERAL REFLUX:\n• Dilated pelvis\n• Dilated URETER ✓\n• Bladder normal\n\nPOSTERIOR URETHRAL VALVES:\n• BILATERAL hydronephrosis\n• BILATERAL dilated ureters\n• Distended bladder\n• Keyhole sign\n• Male only\n\nUPJ obstruction is #1 cause of\nsignificant prenatal hydronephrosis</div></div>',points:10}},
        
        {title:"Postnatal Evaluation",content:'<div class="narrative"><p>The baby is born at term, healthy male. You plan postnatal imaging.</p></div>',question:{prompt:"When should postnatal renal ultrasound be performed?",options:[{text:"Immediately at birth",correct:false},{text:"At 48-72 hours or later (not immediately)",correct:true},{text:"At 2 weeks of age only",correct:false},{text:"Only if symptomatic",correct:false}],explanation:{correct:"Correct! Postnatal US should be done at 48+ hours, NOT immediately. In the first 24-48 hours, physiologic dehydration and low urine output can make hydronephrosis appear less severe or even normal (false negative).",incorrect:"Wait at least 48 hours for postnatal US. Earlier imaging may miss hydronephrosis due to physiologic dehydration."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Postnatal Workup</div><div class="pathway">TIMING OF POSTNATAL US:\n• Wait at least 48-72 hours\n• Neonatal dehydration = false negative\n• Repeat at 4-6 weeks if concerning\n\nPOSTNATAL WORKUP:\n1. Renal ultrasound (48+ hrs)\n2. VCUG (rule out VUR, especially if\n   ureter dilated or bilateral)\n3. MAG3 renogram at 4-6 weeks\n   (if moderate-severe hydro)\n\nWHY MAG3?\n• Assesses differential function\n• Assesses drainage (obstruction)\n• Guides need for surgery</div></div>',points:10}},

        {title:"MAG3 Renogram",content:'<div class="narrative"><p>Postnatal US confirms <span class="highlight">left hydronephrosis (SFU Grade 3)</span> with no ureteral dilation. VCUG is normal (no reflux). MAG3 renogram is performed at 6 weeks. Results: <span class="highlight">Left kidney function 38%</span>, T1/2 = 25 minutes (delayed washout).</p></div>',question:{prompt:"How do you interpret the MAG3 findings?",options:[{text:"Normal - no obstruction",correct:false},{text:"Decreased function with evidence of obstruction",correct:true},{text:"Non-functioning kidney - needs nephrectomy",correct:false},{text:"Results are indeterminate",correct:false}],explanation:{correct:"Correct! Left kidney function of 38% is decreased (normal >40%), and T1/2 of 25 minutes indicates obstruction (normal <10 min, obstructed >20 min). This suggests significant UPJ obstruction affecting kidney function.",incorrect:"Function 38% (below 40% threshold) + T1/2 >20 min = significant obstruction. This kidney is at risk and likely needs intervention."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 MAG3 Interpretation</div><div class="pathway">DIFFERENTIAL FUNCTION:\n• Normal: Each kidney >40%\n• Concerning: <40% (affected side)\n• Poor: <20%\n\nT1/2 (Washout after furosemide (Lasix)):\n• <10 min = Non-obstructed\n• 10-20 min = Indeterminate\n• >20 min = Obstructed\n\nINDICATIONS FOR SURGERY:\n• Differential function <40%\n• DECLINING function on serial studies\n• Symptomatic (pain, UTI)\n• Worsening hydronephrosis\n\nMANY RESOLVE SPONTANEOUSLY!\nClose observation is reasonable if\nfunction >40% and stable</div></div>',points:10}},

        {title:"Management Decision",content:'<div class="narrative"><p>With left kidney function at 38% and clear evidence of obstruction, you discuss intervention with the family.</p></div>',question:{prompt:"What is the gold standard surgical treatment for UPJ obstruction?",options:[{text:"Nephrectomy",correct:false},{text:"Pyeloplasty",correct:true},{text:"Ureteral stent",correct:false},{text:"Endopyelotomy",correct:false}],explanation:{correct:"Correct! Pyeloplasty (usually Anderson-Hynes dismembered technique) is the gold standard with >95% success rate. It removes the obstructed segment and creates a wide, funnel-shaped anastomosis.",incorrect:"Pyeloplasty is gold standard with 95%+ success. Endopyelotomy has lower success. Stents are temporizing only. Nephrectomy is reserved for non-functioning kidneys."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Surgical Options</div><div class="pathway">PYELOPLASTY (Gold Standard):\n• Anderson-Hynes dismembered technique\n• Removes obstructed UPJ segment\n• Creates wide anastomosis\n• Success rate: 95-98%\n• Open, laparoscopic, or robotic\n\nENDOPYELOTOMY:\n• Endoscopic incision of UPJ\n• Lower success (~70-80%)\n• Select cases only\n\nCROSSING VESSELS:\n• Common finding (especially adults)\n• Transpose during pyeloplasty\n• Move anastomosis anterior to vessel\n\nNEPHRECTOMY:\n• Only if kidney non-functioning (<10%)\n• And contributing to problems</div></div>',points:10}},

        {title:"Observation Scenario",content:'<div class="narrative"><p>Another baby has prenatal left hydronephrosis. Postnatal workup shows: SFU Grade 2 hydronephrosis, VCUG negative, MAG3 shows <span class="highlight">left function 45%</span> with T1/2 of 18 minutes (borderline).</p></div>',question:{prompt:"What is the appropriate management for this baby?",options:[{text:"Immediate pyeloplasty",correct:false},{text:"Observation with serial ultrasounds and repeat MAG3",correct:true},{text:"Prophylactic antibiotics lifelong",correct:false},{text:"No follow-up needed",correct:false}],explanation:{correct:"Correct! With function >40% and borderline obstruction, many cases resolve spontaneously. Observation with serial US and repeat MAG3 in 3-6 months is appropriate. Intervene if function declines or symptoms develop.",incorrect:"Function >40% with borderline T1/2 = observe. Many resolve spontaneously! Serial imaging to monitor. Surgery only if function declines."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Observation Protocol</div><div class="pathway">WHEN TO OBSERVE:\n• Differential function >40%\n• Mild-moderate hydronephrosis\n• Asymptomatic\n• Stable or improving on serial imaging\n\nFOLLOW-UP SCHEDULE:\n• Renal US every 3-6 months\n• Repeat MAG3 at 6-12 months\n• Longer intervals if stable\n\nTRIGGERS FOR INTERVENTION:\n• Function declining (<40% or dropping)\n• Worsening hydronephrosis\n• Symptoms (pain, UTI)\n• Failure to improve over time\n\nSPONTANEOUS RESOLUTION:\n• Common, especially mild cases\n• As bladder grows, relative\n  obstruction may improve</div></div>',points:10}},

        {title:"Dietl Crisis",content:'<div class="narrative"><p>A <span class="highlight">14-year-old boy</span> presents with episodic <span class="critical">severe left flank pain with nausea and vomiting</span>. Episodes last a few hours then resolve. He\'s had 3 episodes in 2 months. Pain seems worse after drinking lots of fluids at sports practice.</p></div>',question:{prompt:"This presentation in an adolescent is classic for:",options:[{text:"Kidney stones",correct:false},{text:"Intermittent UPJ obstruction (Dietl crisis)",correct:true},{text:"Appendicitis",correct:false},{text:"Pyelonephritis",correct:false}],explanation:{correct:"Correct! Dietl crisis is intermittent UPJ obstruction causing episodic severe flank pain with nausea/vomiting, often triggered by increased fluid intake. As the renal pelvis distends, it causes pain, then gradually decompresses and symptoms resolve.",incorrect:"Episodic flank pain + nausea + triggered by fluids = Dietl crisis (intermittent UPJ obstruction). Classic in older children/adolescents with previously undiagnosed UPJO."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Dietl Crisis</div><div class="pathway">DIETL CRISIS:\n• Intermittent UPJ obstruction\n• Episodic severe flank pain\n• Nausea, vomiting\n• Triggered by increased fluids/diuresis\n• Episodes resolve as pelvis decompresses\n\nPRESENTATION IN OLDER CHILDREN/ADULTS:\n• May not have prenatal diagnosis\n• Presents with pain or incidental finding\n• Crossing vessel common in this age group\n\nDIAGNOSIS:\n• US during symptomatic episode\n  (shows hydronephrosis)\n• Diuretic renogram\n• CT if unclear\n\nTREATMENT:\n• Pyeloplasty (address crossing vessel\n  if present)</div></div>',points:10}}
    ];
    
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('stageNum').textContent=currentStage+1;document.getElementById('maxScore').textContent=stages.length*10;}
    
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><strong>✓ Correct!</strong> '+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><strong>✗ Not quite.</strong> '+stage.question.explanation.incorrect+'</div><div class="teaching-point" id="teaching">'+stage.question.teaching+'</div><button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=10;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}document.getElementById('teaching').classList.add('show');document.getElementById('next-btn').classList.add('show');}
    
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene" style="text-align:center;padding:40px;"><h2 style="color:#a7f3d0;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong>/60</p><div style="margin-top:20px;padding:15px;background:rgba(59,130,246,0.15);border-radius:10px;border:1px solid rgba(59,130,246,0.3);"><p style="color:#93c5fd;margin-bottom:10px;font-weight:600;">📚 Learn More:</p><div style="display:flex;flex-wrap:wrap;gap:8px;"><a href="../../mechanism/upj-obstruction-module.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📘 MechanismDx</a><a href="https://www.ncbi.nlm.nih.gov/books/?term=pediatric+urology" target="_blank" title="Deep dive via StatPearls" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📊 Deep Dive</a></div><div style="margin-top:10px;"><a href="https://www.ncbi.nlm.nih.gov/books/NBK540978/" target="_blank" style="color:#93c5fd;font-size:0.8rem;">📖 StatPearls Reference</a></div></div><p>You mastered UPJ Obstruction!</p></div>';}}
    
    renderStage();
    </script>

    <div data-dx-tutor
         data-module-title="UPJ Obstruction"

         data-objectives="Develop systematic clinical reasoning, refine differential diagnosis skills"
         style="display:none;"></div>
