<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Fever Fits | ReasonDx Adventure</title><style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#F97316;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#EA580C,#F97316);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(249,115,22,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(249,115,22,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(249,115,22,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#FDBA74;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style></head><body><header class="header"><div class="header-row"><div style="font-weight:600">🌡️ Fever Fits</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header><main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};const C={easy:{age:'18mo M',wt:'11kg',hx:'GTC seizure x2min during fever from viral URI, now postictal',exam:'Postictal but improving, no focal deficits, febrile, URI symptoms',vitals:{HR:'128',RR:'28',Temp:'103.5°F',SpO2:'99%'},labs:{Hx:'First febrile seizure, simple'}},int:{age:'14mo F',wt:'10kg',hx:'Two seizures in 24hr during febrile illness, focal features',exam:'Alert now, slight right arm weakness, recovering',vitals:{HR:'142',RR:'32',Temp:'102.8°F',SpO2:'97%'},labs:{Hx:'Complex febrile seizure'}},adv:{age:'8mo M',wt:'8kg',hx:'Febrile seizure in infant <12mo, prolonged >15min',exam:'Very drowsy, bulging fontanelle, stiff neck',vitals:{HR:'165',RR:'38',Temp:'104°F',SpO2:'95%'},labs:{Hx:'Concern for meningitis'}}};
const Q=[{t:'Definition',q:'What defines a simple febrile seizure?',h:'Age and characteristics',o:[{id:'a',txt:'Age 6mo-5yr, generalized, <15 min, single in 24hr, no prior neuro issues, quick recovery',c:1,p:100},{id:'b',txt:'Any seizure with fever',c:0,p:30},{id:'c',txt:'Focal seizure with fever',c:0,p:20}],fb:{1:'<b>Correct!</b> Simple febrile seizure: Age 6mo-5yr, generalized (not focal), <15min, single episode in 24hr, developmentally normal, returns to baseline quickly.',0:'<b>Simple FS:</b> Age 6mo-5yr, generalized, <15min, single in 24hr.'}},{t:'Complex Features',q:'What makes a febrile seizure complex?',h:'Red flags',o:[{id:'a',txt:'Focal features, duration >15min, multiple seizures in 24hr, prolonged postictal state',c:1,p:100},{id:'b',txt:'High fever',c:0,p:20},{id:'c',txt:'Age 2-3 years',c:0,p:20}],fb:{1:'<b>Correct!</b> Complex FS: Focal onset/features, >15min duration, recurs within 24hr, prolonged postictal (>1hr), or abnormal neuro exam. Requires more workup.',0:'<b>Complex:</b> Focal, >15min, multiple in 24hr, prolonged postictal.'}},{t:'LP Indications',q:'When is lumbar puncture indicated for febrile seizure?',h:'Meningitis concern',o:[{id:'a',txt:'Signs of meningitis, age <6-12 months, complex features, prolonged postictal, concerning exam',c:1,p:100},{id:'b',txt:'All febrile seizures',c:0,p:30},{id:'c',txt:'Never needed',c:0,p:10}],fb:{1:'<b>Correct!</b> LP if: Meningeal signs, <6-12mo (signs unreliable), incomplete immunization (Hib/Strep pneumo), complex features, abnormal/prolonged recovery. Not routine for simple FS.',0:'<b>LP:</b> Meningeal signs, young infants, complex features, abnormal recovery.'}},{t:'EEG/Imaging',q:'Are EEG and neuroimaging recommended for simple febrile seizures?',h:'AAP guidelines',o:[{id:'a',txt:'Not recommended for simple febrile seizures; consider for complex FS',c:1,p:100},{id:'b',txt:'Required for all',c:0,p:30},{id:'c',txt:'EEG always abnormal',c:0,p:20}],fb:{1:'<b>Correct!</b> Simple FS: EEG and imaging NOT recommended (not predictive, often abnormal after any seizure). Complex FS: Consider EEG and MRI.',0:'<b>Simple FS:</b> No EEG or imaging needed.'}},{t:'Recurrence Risk',q:'What is the recurrence risk after a febrile seizure?',h:'Reassure parents',o:[{id:'a',txt:'~30-35% will have another febrile seizure; risk higher if young age, low fever, family history',c:1,p:100},{id:'b',txt:'100%',c:0,p:10},{id:'c',txt:'<5%',c:0,p:20}],fb:{1:'<b>Correct!</b> Recurrence: ~30-35% overall. Higher risk if: Age <15mo at first FS, lower fever at onset, family history of FS. Most recurrences within 1 year.',0:'<b>Recurrence:</b> ~30-35%. Higher if young age, low fever, family history.'}},{t:'Epilepsy Risk',q:'What is the risk of developing epilepsy after a febrile seizure?',h:'Long-term prognosis',o:[{id:'a',txt:'Simple FS: ~1-2% (slightly above general population); Complex FS: higher risk (~4-6%)',c:1,p:100},{id:'b',txt:'50% will develop epilepsy',c:0,p:20},{id:'c',txt:'No increased risk',c:0,p:20}],fb:{1:'<b>Correct!</b> Epilepsy risk: Simple FS ~1-2% (general pop 1%). Complex FS higher risk. Risk factors: Complex features, family history epilepsy, pre-existing neuro abnormality.',0:'<b>Epilepsy risk:</b> Simple FS ~1-2%, Complex FS ~4-6%.'}},{t:'Prophylaxis',q:'Is prophylactic anticonvulsant therapy recommended for febrile seizures?',h:'Risks vs benefits',o:[{id:'a',txt:'NOT recommended - risks of daily medications outweigh benefits; reassurance and fever management instead',c:1,p:100},{id:'b',txt:'Always prescribe phenobarbital',c:0,p:20},{id:'c',txt:'Valproate for all',c:0,p:10}],fb:{1:'<b>Correct!</b> Prophylaxis NOT recommended. Side effects of daily AEDs outweigh benefits. PRN rectal diazepam controversial. Focus: Parent education, fever management, reassurance.',0:'<b>No prophylaxis:</b> Risks outweigh benefits. Reassure, educate, manage fever.'}},{t:'Parent Education',q:'Key points for parent education after febrile seizure?',h:'Reduce anxiety',o:[{id:'a',txt:'Benign condition, good prognosis, seizure first aid, when to call 911, fever doesnt cause brain damage',c:1,p:100},{id:'b',txt:'Child will have epilepsy',c:0,p:10},{id:'c',txt:'Never let fever occur',c:0,p:20}],fb:{1:'<b>Correct!</b> Educate: Generally benign, excellent prognosis, doesnt cause brain damage, seizure first aid (protect, position, time), call 911 if >5min, future fevers are okay.',0:'<b>Education:</b> Benign, good prognosis, fever doesnt cause brain damage.'}}];
let sel=null;function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}function start(){S.q=1;S.stage='question';render();}function go(s){S.stage=s;render();}function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🌡️ Fever Fits</h1><p style="color:var(--muted);margin-bottom:32px">Febrile Seizures: Simple vs complex, LP indications, prognosis, education</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🌡️ Seizure with Fever</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Febrile Seizure Pearls</div><div class="pearl-item"><b>Simple:</b> Age 6mo-5yr, generalized, <15min, single</div><div class="pearl-item"><b>Complex:</b> Focal, >15min, multiple, prolonged postictal</div><div class="pearl-item"><b>LP:</b> If meningeal signs, <12mo, complex, abnormal recovery</div><div class="pearl-item"><b>No routine EEG/imaging:</b> For simple FS</div><div class="pearl-item"><b>Recurrence:</b> ~30-35%</div><div class="pearl-item"><b>Epilepsy risk:</b> Simple ~1-2%, Complex ~4-6%</div><div class="pearl-item"><b>No prophylaxis:</b> Reassure and educate parents</div></div><div class="cross-link"><a href="status-epilepticus-adventure-enhanced.html">Related: Status Epilepticus</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}document.addEventListener('DOMContentLoaded',render);</script></body></html>
