<script>
let currentStage=0,score=0,maxScore=0,difficulty='standard',answeredQuestions=new Set(),decisionPath=[];
const stages=[
{title:"The Confused Elder",content:`<div class="narrative"><p>78-year-old woman brought from nursing home for confusion and lethargy over 2 days.</p><p style="margin-top:12px;"><strong>Vitals:</strong> T 98.2F, HR 82, BP 128/76, RR 16<br><strong>Exam:</strong> Lethargic but arousable, no focal deficits, mild peripheral edema<br><strong>Labs:</strong> Na 118, K 4.2, Cr 1.1, Glucose 95<br><strong>Meds:</strong> HCTZ, lisinopril, sertraline</p></div><div class="socratic-prompt"><h4>Framework First</h4><p>What is the systematic approach to hyponatremia?</p></div>`,
hint_beginner:"Check osmolality first, then volume status, then urine studies",hint_advanced:"What causes pseudohyponatremia?",
question:{prompt:"What is the first step in evaluating hyponatremia?",
options:[{text:"Check serum osmolality to confirm true hypotonic hyponatremia (rule out pseudohyponatremia from hyperglycemia, lipids, proteins)",correct:true},
{text:"Start treatment immediately",correct:false},
{text:"Order head CT",correct:false},
{text:"Check urine sodium only",correct:false}],
explanation:{correct:"First step: serum osmolality. True hyponatremia is hypotonic (<280). Pseudohyponatremia: hyperglycemia (correct Na by 1.6-2.4 per 100 glucose), hyperlipidemia, hyperproteinemia. This patient has normal glucose, so likely true hyponatremia.",incorrect:"Must confirm true hypotonic hyponatremia first. Hyperglycemia causes dilutional hyponatremia (correct Na by 1.6-2.4 per 100 mg/dL glucose above 100)."},
teaching:`<h4>Hyponatremia Framework</h4><p><strong>Step 1:</strong> Serum osmolality (confirm hypotonic)</p><p><strong>Step 2:</strong> Volume status (hypo/eu/hypervolemic)</p><p><strong>Step 3:</strong> Urine osmolality and sodium</p><p><strong>Pseudohyponatremia:</strong> Hyperglycemia, lipids, proteins</p>`,
why_chain:[{q:"How does hyperglycemia cause hyponatremia?",a:"High glucose creates osmotic gradient, pulling water into intravascular space, diluting sodium. For every 100 mg/dL glucose above 100, add 1.6-2.4 to measured Na."}],points:10}},

{title:"Volume Assessment",content:`<div class="narrative"><p>Serum osm: 248 (low, confirming true hypotonic hyponatremia). Assess volume status.</p></div><div class="socratic-prompt"><h4>Clinical Volume Assessment</h4><p>How do you determine volume status, and what does it tell you about etiology?</p></div>`,
hint_beginner:"JVP, edema, skin turgor, mucous membranes",hint_advanced:"Why is clinical volume assessment often inaccurate?",
question:{prompt:"This patient has mild peripheral edema. What volume category?",
options:[{text:"Hypervolemic hyponatremia - edema suggests total body water excess; think CHF, cirrhosis, nephrotic syndrome, or renal failure",correct:true},
{text:"Hypovolemic - must be dehydrated",correct:false},
{text:"Euvolemic - edema is normal in elderly",correct:false},
{text:"Cannot determine without CVP monitoring",correct:false}],
explanation:{correct:"Peripheral edema = hypervolemic state (excess total body water). Causes: CHF, cirrhosis, nephrotic syndrome, renal failure. However, clinical volume assessment has ~50% accuracy - urine studies help clarify.",incorrect:"Edema indicates hypervolemia. This narrows differential to CHF, cirrhosis, nephrotic syndrome, or renal failure."},
teaching:`<h4>Volume-Based Classification</h4><p><strong>Hypovolemic:</strong> GI losses, diuretics, adrenal insufficiency</p><p><strong>Euvolemic:</strong> SIADH, hypothyroid, psychogenic polydipsia</p><p><strong>Hypervolemic:</strong> CHF, cirrhosis, nephrotic, renal failure</p>`,
why_chain:[{q:"Why is volume assessment difficult?",a:"Clinical signs (JVP, edema, skin turgor) have poor sensitivity and specificity. Chronic illness masks signs. Urine studies (UNa, Uosm) provide better physiologic information."}],points:10}},

{title:"Urine Studies",content:`<div class="narrative"><p>Urine studies: Uosm 420, UNa 45</p></div><div class="socratic-prompt"><h4>Interpret the Urine</h4><p>What do the urine osmolality and sodium indicate?</p></div>`,
hint_beginner:"Uosm >100 = kidneys concentrating; UNa >20 suggests renal sodium loss",hint_advanced:"What's the role of urine osmolality in hyponatremia workup?",
question:{prompt:"Uosm 420, UNa 45. What does this indicate?",
options:[{text:"Concentrated urine (Uosm >100) indicates ADH is active - kidneys ARE concentrating; UNa >20 suggests diuretic effect or SIADH-like physiology",correct:true},
{text:"Dilute urine indicates primary polydipsia",correct:false},
{text:"UNa is not relevant",correct:false},
{text:"These values are normal",correct:false}],
explanation:{correct:"Uosm >100 means kidneys ARE concentrating (ADH active) - rules out primary polydipsia (would have Uosm <100). UNa >20 in hyponatremia suggests: diuretic use, SIADH, or renal salt wasting. In hypervolemic patient, diuretic effect likely.",incorrect:"High Uosm (>100) means ADH is active. In hypervolemic hyponatremia with high UNa, consider diuretic effect or underlying renal/cardiac issues."},
teaching:`<h4>Urine Studies Interpretation</h4><p><strong>Uosm >100:</strong> ADH active (appropriate or inappropriate)</p><p><strong>Uosm <100:</strong> Suppressed ADH (polydipsia, beer potomania)</p><p><strong>UNa >20:</strong> Renal sodium loss (diuretics, SIADH, salt-wasting)</p><p><strong>UNa <20:</strong> Extrarenal loss or low effective arterial volume</p>`,
why_chain:[{q:"Why check urine osmolality?",a:"Determines if kidneys can dilute urine appropriately. If Na low but kidneys making concentrated urine, ADH is active (either appropriately or SIADH)."}],points:15}},

{title:"Identify the Cause",content:`<div class="narrative"><p>Patient on HCTZ, sertraline. Has mild CHF. Diuretic started 3 weeks ago.</p></div><div class="socratic-prompt"><h4>Pinpoint Etiology</h4><p>What is the most likely cause of this patient's hyponatremia?</p></div>`,
hint_beginner:"Thiazides are notorious for causing hyponatremia",hint_advanced:"How do thiazides cause hyponatremia differently than loop diuretics?",
question:{prompt:"What is the most likely cause?",
options:[{text:"Thiazide-induced hyponatremia - HCTZ impairs diluting capacity without affecting concentrating ability; high risk in elderly women",correct:true},
{text:"SIADH from sertraline only",correct:false},
{text:"Pure CHF-related hyponatremia",correct:false},
{text:"Adrenal insufficiency",correct:false}],
explanation:{correct:"Thiazides are the #1 drug cause of hyponatremia. They impair diluting segment (distal tubule) without affecting concentrating ability. Risk factors: elderly, female, low body weight. Sertraline can also cause SIADH, but thiazide is primary culprit here.",incorrect:"Thiazides are most common drug cause. They impair diluting segment (DCT) while loop diuretics impair concentrating (medulla). Elderly women at highest risk."},
teaching:`<h4>Thiazide-Induced Hyponatremia</h4><p><strong>Mechanism:</strong> Blocks NaCl reabsorption in DCT (diluting segment)</p><p><strong>Unlike loops:</strong> Doesn't impair medullary concentrating</p><p><strong>Risk factors:</strong> Elderly, female, low body weight, low solute intake</p><p><strong>SSRIs:</strong> Can cause SIADH, additive risk</p>`,
why_chain:[{q:"Why don't loop diuretics cause as much hyponatremia?",a:"Loops impair the medullary concentrating mechanism by blocking NKCC2 in thick ascending limb. This reduces ability to concentrate urine, so free water is excreted. Thiazides spare concentrating ability."}],points:15}},

{title:"Treatment Approach",content:`<div class="narrative"><p>Na 118, patient symptomatic (lethargic). How do you approach treatment?</p></div><div class="socratic-prompt"><h4>Safe Correction</h4><p>What is the safe rate of sodium correction, and why?</p></div>`,
hint_beginner:"Correct slowly to avoid osmotic demyelination syndrome",hint_advanced:"What determines target correction rate?",
question:{prompt:"What is the maximum safe sodium correction rate?",
options:[{text:"8-10 mEq/L in first 24 hours; faster correction risks osmotic demyelination syndrome (ODS); even slower (4-6) if high risk (chronic, severe, alcoholism)",correct:true},
{text:"Correct as fast as possible to relieve symptoms",correct:false},
{text:"No limit - just recheck in 24 hours",correct:false},
{text:"1 mEq/L per hour is safe",correct:false}],
explanation:{correct:"Maximum 8-10 mEq/L in 24 hours. Faster correction causes ODS (pontine myelinolysis) - devastating neurologic injury. High-risk patients (chronic >48h, severe, alcoholism, malnutrition): limit to 4-6 mEq/L/24h.",incorrect:"Overcorrection causes ODS. The brain adapts to hyponatremia by losing osmoles; rapid correction creates osmotic stress that damages myelin. 8-10 max, lower if chronic."},
teaching:`<h4>Safe Sodium Correction</h4><p><strong>Max rate:</strong> 8-10 mEq/L in 24 hours</p><p><strong>High-risk (chronic/severe):</strong> 4-6 mEq/L in 24 hours</p><p><strong>ODS risk factors:</strong> Chronic (>48h), severe (<120), alcoholism, malnutrition, hypokalemia</p><p><strong>Monitor:</strong> Na q2-4h during active treatment</p>`,
why_chain:[{q:"Why does rapid correction cause ODS?",a:"Brain adapts to hyponatremia by losing intracellular osmoles (organic solutes). When Na corrected quickly, water leaves brain cells faster than osmoles can be regained, causing cellular shrinkage and demyelination - especially in pons."}],points:15}},

{title:"Treatment Implementation",content:`<div class="narrative"><p>Na 118, symptomatic. What specific treatment?</p></div><div class="socratic-prompt"><h4>Choose Treatment</h4><p>What treatment is appropriate for this symptomatic patient?</p></div>`,
hint_beginner:"Symptomatic hyponatremia may need hypertonic saline",hint_advanced:"When to use desmopressin clamp?",
question:{prompt:"What is the initial treatment approach?",
options:[{text:"Stop HCTZ immediately; for symptomatic patient, consider hypertonic saline (3% NaCl) with frequent Na monitoring; target 4-6 mEq/L increase in first 24h given chronicity",correct:true},
{text:"IV normal saline bolus rapidly",correct:false},
{text:"Fluid restriction only",correct:false},
{text:"Start vasopressin",correct:false}],
explanation:{correct:"Stop the offending agent (HCTZ). For symptomatic chronic hyponatremia: 3% saline cautiously with frequent monitoring. Goal: raise Na 4-6 mEq/L in 24h (chronic = higher ODS risk). Can use DDAVP clamp to prevent overcorrection.",incorrect:"Must stop thiazide. Symptomatic patients may need hypertonic saline, but correct slowly for chronic hyponatremia. NS can cause overcorrection when kidneys recover."},
teaching:`<h4>Treatment by Category</h4><p><strong>Acute symptomatic:</strong> 3% saline 100-150mL boluses</p><p><strong>Chronic symptomatic:</strong> 3% saline slowly, strict limits</p><p><strong>Hypervolemic:</strong> Fluid restriction, diuretics, treat underlying</p><p><strong>Thiazide-induced:</strong> Stop thiazide + careful correction</p>`,
why_chain:[{q:"What is DDAVP clamp?",a:"Give DDAVP to prevent water excretion during correction, combined with 3% saline. This provides controlled, predictable correction and prevents overcorrection when thiazide effect wears off."}],points:10}},

{title:"Overcorrection Management",content:`<div class="narrative"><p>Na corrects from 118 to 130 in 18 hours (12 mEq/L rise - too fast!).</p></div><div class="socratic-prompt"><h4>Rescue Strategy</h4><p>What do you do if sodium corrects too quickly?</p></div>`,
hint_beginner:"Re-lower sodium with D5W and DDAVP",hint_advanced:"What is the evidence for re-lowering?",
question:{prompt:"Sodium overcorrected. What is the rescue strategy?",
options:[{text:"Give DDAVP + D5W to re-lower sodium back toward safe range; goal is to keep total 24h correction under 8-10 mEq/L",correct:true},
{text:"Nothing - just monitor for ODS",correct:false},
{text:"Give more hypertonic saline",correct:false},
{text:"Emergent dialysis",correct:false}],
explanation:{correct:"Overcorrection rescue: DDAVP (prevents water excretion) + D5W (adds free water) to intentionally re-lower Na. Aim to bring total 24h correction under 10 mEq/L. Case reports suggest this prevents ODS if done early.",incorrect:"Active rescue with DDAVP + D5W can prevent ODS if done within hours of overcorrection. Don't just watch and wait."},
teaching:`<h4>Overcorrection Rescue</h4><p><strong>DDAVP:</strong> 2-4 mcg IV q8h (prevents water excretion)</p><p><strong>D5W:</strong> 3-6 mL/kg/h (adds free water)</p><p><strong>Goal:</strong> Re-lower Na to keep 24h correction under 10</p><p><strong>Timing:</strong> Most effective if done within hours</p>`,
why_chain:[{q:"Does re-lowering actually prevent ODS?",a:"Case series suggest re-lowering sodium after overcorrection can prevent ODS if done early (within 12-24h). The damage from rapid correction takes time to become irreversible."}],points:10}},

{title:"Case Synthesis",content:`<div class="narrative"><p>HCTZ stopped, Na corrected carefully to 126 over 48 hours. Patient mental status improved. Discharged on loop diuretic instead.</p></div><div class="socratic-prompt"><h4>Key Principles</h4><p>What are the essential principles of hyponatremia management?</p></div>`,

{text:"Treat all hyponatremia the same way",correct:false},
{text:"Rapid correction is safe if symptomatic",correct:false},
{text:"Only treat if Na under 120",correct:false}],

teaching:`<h4>Hyponatremia Summary</h4><p>1. Confirm hypotonic (serum osm <280)</p><p>2. Assess volume status</p><p>3. Urine osm and sodium</p><p>4. Identify and treat cause</p><p>5. Correct slowly: 8-10 mEq/L/24h (4-6 if chronic)</p><p>6. Monitor Na q2-4h during treatment</p><p>7. Rescue with DDAVP + D5W if overcorrect</p>`,
why_chain:[{q:"Why switch to loop diuretic?",a:"Loops impair concentrating ability (unlike thiazides), so they cause less hyponatremia risk. For patients who need diuretics but had thiazide-induced hyponatremia, loops are safer."}],points:10}}
];
function shuffleArray(a){const s=[...a];for(let i=s.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[s[i],s[j]]=[s[j],s[i]];}return s;}
function setDifficulty(l,b){difficulty=l;document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderStage(currentStage);}
function renderStage(i){
const s=stages[i],opts=shuffleArray(s.question.options.map((o,idx)=>({...o,idx}))),ltrs='ABCD';
let hints='';
if(difficulty==='beginner'&&s.hint_beginner)hints=`<div class="hint-beginner" style="display:block;">Hint: ${s.hint_beginner}</div>`;
else if(difficulty==='advanced'&&s.hint_advanced)hints=`<div class="hint-advanced" style="display:block;">Challenge: ${s.hint_advanced}</div>`;
const why=s.question.why_chain?`<div class="why-chain" id="why"><h4>WHY Chain</h4>${s.question.why_chain.map(w=>`<div class="why-item"><div class="why-q">Q: ${w.q}</div><div class="why-a">${w.a}</div></div>`).join('')}</div>`:'';
document.getElementById('progress').style.width=((i)/stages.length*100)+'%';
document.getElementById('scene-container').innerHTML=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${i+1} of ${stages.length}</div><div class="scene-title">${s.title}</div></div>${s.content}${hints}<div class="question-box"><div class="question-prompt">${s.question.prompt}</div><div class="mcq-options">${opts.map((o,j)=>`<div class="mcq-option" data-correct="${o.correct}" onclick="selectOption(this,${i})"><span class="option-letter">${ltrs[j]}</span><span class="option-text">${o.text}</span></div>`).join('')}</div><div class="feedback correct-feedback" id="fb-c"><div class="feedback-title">Correct!</div><div>${s.question.explanation.correct}</div></div><div class="feedback incorrect-feedback" id="fb-i"><div class="feedback-title">Not Quite</div><div>${s.question.explanation.incorrect}</div></div><div class="teaching-point" id="teach">${s.question.teaching}</div>${why}<button class="btn" id="next-btn" onclick="nextStage()">Continue</button></div></div>`;
}
function selectOption(el,i){
if(answeredQuestions.has(i))return;
const c=el.dataset.correct==='true',s=stages[i];
answeredQuestions.add(i);decisionPath.push({stage:s.title,correct:c,points:c?s.question.points:0});
if(c)score+=s.question.points;maxScore+=s.question.points;
document.getElementById('score').textContent=score;document.getElementById('maxScore').textContent=maxScore;
document.querySelectorAll('.mcq-option').forEach(o=>{o.classList.add('disabled');if(o.dataset.correct==='true')o.classList.add('correct');else if(o===el&&!c)o.classList.add('incorrect');});
document.getElementById(c?'fb-c':'fb-i').classList.add('show');
document.getElementById('teach').classList.add('show');
const w=document.getElementById('why');if(w)w.classList.add('show');
document.getElementById('next-btn').classList.add('show');
}
function nextStage(){if(++currentStage<stages.length){renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'});}else showCompletion();}
function showCompletion(){
const p=Math.round(score/maxScore*100);
let g,m,clr;
if(p>=90){g='Outstanding!';clr='#22c55e';m='Excellent hyponatremia management!';}
else if(p>=80){g='Great Work!';clr='#3b82f6';m='Strong grasp. Review correction rates.';}
else if(p>=70){g='Good Progress';clr='#f59e0b';m='Focus on volume assessment and ODS prevention.';}
else{g='Keep Learning';clr='#ef4444';m='Review systematic approach and safe correction.';}
document.getElementById('scene-container').innerHTML=`<div class="scene completion"><div class="completion-grade" style="color:${clr}">${g}</div><div class="completion-percent" style="color:${clr}">${p}%</div><div style="font-size:1.3rem;margin-bottom:8px">${score}/${maxScore} points</div><div style="margin:16px 0;color:#e2e8f0">${m}</div><div class="completion-breakdown"><h4 style="margin-bottom:16px">Your Journey</h4>${decisionPath.map((d,j)=>`<div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;justify-content:space-between;"><span style="color:${d.correct?'#4ade80':'#f87171'}">${d.correct?'Y':'N'} ${d.stage}</span><span style="color:#94a3b8">${d.points}/${stages[j].question.points}</span></div>`).join('')}</div></div>`;
document.getElementById('progress').style.width='100%';
}
document.addEventListener('DOMContentLoaded',()=>renderStage(0));


// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}



// ============================================================================
// EPA & CALIBRATION ENHANCEMENT - ReasonDx
// ============================================================================

// Case EPA Metadata
const caseEPA = {
    id: 'hyponatremia',
    primaryEPAs: ["EPA-3","EPA-2","EPA-4"],
    secondaryEPAs: ["EPA-1"],
    category: 'Nephrology'
};

// Response tracking for calibration
let responseHistory = [];
let pendingSelection = null;

// EPA Names for display
const epaNames = {"EPA-1":"Gather H&P","EPA-2":"Prioritize DDx","EPA-3":"Recommend Tests","EPA-4":"Enter Orders","EPA-7":"Apply Evidence","EPA-10":"Recognize Urgency","EPA-12":"Perform Procedures"};

// Override selectOption to add confidence step
const originalSelectOption = typeof selectOption === 'function' ? selectOption : null;

function selectOptionEnhanced(index, correct) {
    const qId = 'q' + currentStage;
    if (answeredQuestions.has(qId)) return;
    
    // Store pending selection
    pendingSelection = { index, correct, stageIdx: currentStage };
    
    // Highlight selected option
    document.querySelectorAll('.mcq-option').forEach((opt, i) => {
        opt.classList.remove('selected');
        if (i === index) opt.classList.add('selected');
    });
    
    // Show confidence slider
    const confContainer = document.getElementById('confidence-container');
    if (confContainer) {
        confContainer.classList.add('show');
        confContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function updateConfidenceDisplay(value) {
    const display = document.getElementById('confidence-display');
    if (display) display.textContent = value + '%';
}

function submitWithConfidence() {
    if (!pendingSelection) return;
    
    const confidence = parseInt(document.getElementById('confidence-slider').value);
    const { index, correct, stageIdx } = pendingSelection;
    const stage = stages[stageIdx];
    
    // Record response with confidence
    responseHistory.push({
        stage: stageIdx + 1,
        stageTitle: stage.title,
        epaFocus: caseEPA.primaryEPAs[0],
        selectedIndex: index,
        selectedText: stage.question.options[index].text,
        correct: correct,
        confidence: confidence,
        points: correct ? stage.question.points : 0,
        maxPoints: stage.question.points
    });
    
    // Hide confidence container
    const confContainer = document.getElementById('confidence-container');
    if (confContainer) confContainer.classList.remove('show');
    
    // Now process the answer (call original logic)
    const qId = 'q' + stageIdx;
    answeredQuestions.add(qId);
    decisionPath[stageIdx] = index;
    
    maxScore += stage.question.points;
    if (correct) score += stage.question.points;
    
    document.getElementById('score').textContent = score;
    document.getElementById('maxScore').textContent = maxScore;
    
    // Show calibration feedback
    showCalibrationFeedback(confidence, correct);
    
    pendingSelection = null;
    renderStage();
}

function showCalibrationFeedback(confidence, correct) {
    // This will be shown in the feedback section after render
    const feedback = document.createElement('div');
    feedback.className = 'calibration-feedback show';
    
    if (correct && confidence >= 70) {
        feedback.classList.add('well-calibrated');
        feedback.innerHTML = '✅ <strong>Well calibrated!</strong> You were confident and correct.';
    } else if (correct && confidence < 50) {
        feedback.classList.add('underconfident');
        feedback.innerHTML = '📚 Correct, but you were uncertain. <strong>Trust your knowledge more!</strong>';
    } else if (!correct && confidence >= 70) {
        feedback.classList.add('overconfident');
        feedback.innerHTML = '⚠️ <strong>Overconfidence detected.</strong> High confidence + wrong answer is where diagnostic errors happen.';
    } else {
        feedback.classList.add('well-calibrated');
        feedback.innerHTML = '📝 Incorrect, but your uncertainty was appropriate. Review this concept.';
    }
    
    // Store for rendering
    window.lastCalibrationFeedback = feedback.outerHTML;
}

// Enhanced debrief with EPA and calibration
function showEnhancedDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    const content = document.getElementById('debriefContent');
    if (!overlay || !content) return;
    
    const percentage = maxScore > 0 ? Math.round((score / maxScore) * 100) : 0;
    
    // Calculate calibration
    const withConf = responseHistory.filter(r => r.confidence !== undefined);
    const correctWithConf = withConf.filter(r => r.correct);
    const incorrectWithConf = withConf.filter(r => !r.correct);
    const avgConfCorrect = correctWithConf.length > 0 
        ? Math.round(correctWithConf.reduce((s,r) => s + r.confidence, 0) / correctWithConf.length) : 0;
    const avgConfIncorrect = incorrectWithConf.length > 0 
        ? Math.round(incorrectWithConf.reduce((s,r) => s + r.confidence, 0) / incorrectWithConf.length) : 0;
    
    // EPA performance
    const epaPerf = {};
    responseHistory.forEach(r => {
        const epa = r.epaFocus || caseEPA.primaryEPAs[0];
        if (!epaPerf[epa]) epaPerf[epa] = { correct: 0, total: 0 };
        epaPerf[epa].total++;
        if (r.correct) epaPerf[epa].correct++;
    });
    
    // Calibration interpretation
    let calibrationMsg = '';
    if (avgConfCorrect - avgConfIncorrect > 20) {
        calibrationMsg = '✅ Good discrimination! You feel more confident when you\'re right.';
    } else if (avgConfIncorrect > 60) {
        calibrationMsg = '⚠️ Overconfidence pattern detected. Practice asking "What would make me wrong?"';
    } else {
        calibrationMsg = '📊 Work on calibration - confidence should differ between correct and incorrect answers.';
    }
    
    content.innerHTML = `
        <div style="text-align:center;margin-bottom:24px;">
            <div style="font-size:4rem;">${percentage >= 80 ? '🏆' : percentage >= 60 ? '👍' : '📚'}</div>
            <div style="font-size:2.5rem;font-weight:700;color:${percentage >= 80 ? '#22c55e' : percentage >= 60 ? '#f59e0b' : '#ef4444'}">${percentage}%</div>
            <div style="color:#6b7280;">Score: ${score}/${maxScore}</div>
        </div>
        
        <div class="epa-debrief-section">
            <h4>📋 EPA Competencies Assessed</h4>
            <div class="epa-progress-grid">
                ${Object.entries(epaPerf).map(([epa, data]) => {
                    const pct = Math.round((data.correct / data.total) * 100);
                    const colorClass = pct >= 80 ? 'high' : pct >= 60 ? 'medium' : 'low';
                    return `<div class="epa-progress-card">
                        <div class="epa-name">${epaNames[epa] || epa}</div>
                        <div class="epa-score ${colorClass}">${pct}%</div>
                    </div>`;
                }).join('')}
            </div>
        </div>
        
        <div class="calibration-debrief">
            <h4>🎯 Confidence Calibration</h4>
            <div class="calibration-stats">
                <div class="calibration-stat">
                    <div class="stat-value" style="color:#22c55e;">${avgConfCorrect}%</div>
                    <div class="stat-label">Avg confidence when correct</div>
                </div>
                <div class="calibration-stat">
                    <div class="stat-value" style="color:${avgConfIncorrect > 60 ? '#ef4444' : '#f59e0b'};">${avgConfIncorrect}%</div>
                    <div class="stat-label">Avg confidence when incorrect</div>
                </div>
            </div>
            <div class="calibration-interpretation">${calibrationMsg}</div>
        </div>
        
        <div class="decision-path">
            <h3>📝 Your Decisions</h3>
            ${responseHistory.map(r => `
                <div class="path-item ${r.correct ? 'path-optimal' : 'path-incorrect'}">
                    <div style="display:flex;justify-content:space-between;">
                        <div>
                            <div class="path-stage">${r.correct ? '✓' : '✗'} Stage ${r.stage}: ${r.stageTitle}</div>
                            <div class="path-choice" style="font-size:0.85rem;color:#6b7280;">${r.confidence}% confident</div>
                        </div>
                        <div class="path-points">${r.points}/${r.maxPoints}</div>
                    </div>
                </div>
            `).join('')}
        </div>
        
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
        <button class="debrief-btn" style="background:#e5e7eb;color:#4b5563;margin-top:8px;" onclick="closeDebrief()">Close</button>
    `;
    
    overlay.classList.add('show');
}

// Replace selectOption globally
window.selectOption = selectOptionEnhanced;

// Store original showDebrief if exists
if (typeof showDebrief === 'function') {
    window.originalShowDebrief = showDebrief;
}
window.showDebrief = showEnhancedDebrief;

</script>

<!-- Visual Debrief Overlay -->
<div class="debrief-overlay" id="debriefOverlay" onclick="if(event.target===this)closeDebrief()">
    <div class="debrief-content" id="debriefContent"></div>
</div>

</body>
