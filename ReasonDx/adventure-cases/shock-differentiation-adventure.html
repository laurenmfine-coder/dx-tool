<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Failing Pump | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#DC2626;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#991B1B,#DC2626);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(220,38,38,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(220,38,38,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(220,38,38,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#FCA5A5;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">💔 The Failing Pump</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'65M',wt:'78kg',hx:'Chest pain, diaphoresis, now hypotensive after large anterior MI',exam:'Cool extremities, JVD, crackles bilateral bases, weak pulse',vitals:{HR:'112',BP:'78/52',Temp:'97.8°F',SpO2:'88%'},labs:{Lactate:'4.8',ScvO2:'55%',Hx:'STEMI, cardiogenic shock'}},int:{age:'42F',wt:'65kg',hx:'Fever, dysuria, now confused and hypotensive despite 2L fluids',exam:'Warm extremities, delayed cap refill, tachypneic',vitals:{HR:'118',BP:'82/48',Temp:'102.8°F',SpO2:'94%'},labs:{Lactate:'5.2',WBC:'22k',Hx:'UTI source, septic shock'}},adv:{age:'28M',wt:'82kg',hx:'MVC with chest trauma, progressive hypotension, muffled heart sounds',exam:'JVD, muffled heart sounds, pulsus paradoxus',vitals:{HR:'128',BP:'72/58',Temp:'98.2°F',SpO2:'92%'},labs:{Lactate:'3.8',Hx:'Becks triad present'}}};
const Q=[
{t:'Shock Definition',q:'What defines shock at the cellular level?',h:'Beyond blood pressure',o:[{id:'a',txt:'Inadequate tissue oxygen delivery leading to cellular hypoxia and organ dysfunction',c:1,p:100},{id:'b',txt:'Low blood pressure only',c:0,p:30},{id:'c',txt:'Fast heart rate',c:0,p:10}],fb:{1:'<b>Correct!</b> Shock = inadequate tissue perfusion/oxygenation. Can have shock with normal BP (compensated). Key markers: lactate, mental status, urine output, cap refill.',0:'<b>Shock:</b> Inadequate tissue O2 delivery. BP alone is insufficient.'}},
{t:'Four Categories',q:'What are the four main categories of shock?',h:'Hemodynamic classification',o:[{id:'a',txt:'Distributive, Cardiogenic, Hypovolemic, Obstructive',c:1,p:100},{id:'b',txt:'Septic, Hemorrhagic, Cardiac',c:0,p:30},{id:'c',txt:'Warm shock and cold shock only',c:0,p:20}],fb:{1:'<b>Correct!</b> Four types: Distributive (sepsis, anaphylaxis, neurogenic), Cardiogenic (MI, arrhythmia), Hypovolemic (hemorrhage, dehydration), Obstructive (PE, tamponade, tension PTX).',0:'<b>4 types:</b> Distributive, Cardiogenic, Hypovolemic, Obstructive.'}},
{t:'Distributive Shock',q:'Hemodynamic profile of distributive (septic) shock?',h:'Vasodilation pattern',o:[{id:'a',txt:'Low SVR, high CO (early), warm extremities initially',c:1,p:100},{id:'b',txt:'High SVR, low CO',c:0,p:30},{id:'c',txt:'Normal SVR',c:0,p:20}],fb:{1:'<b>Correct!</b> Distributive: Low SVR (vasodilation), initially high/normal CO (hyperdynamic), warm extremities. Later: myocardial depression, cold extremities. Sepsis, anaphylaxis, neurogenic all distributive.',0:'<b>Distributive:</b> Low SVR, initially high CO, warm extremities.'}},
{t:'Cardiogenic Shock',q:'Hemodynamic profile of cardiogenic shock?',h:'Pump failure',o:[{id:'a',txt:'Low CO, high SVR (compensatory vasoconstriction), elevated filling pressures',c:1,p:100},{id:'b',txt:'Low SVR, high CO',c:0,p:20},{id:'c',txt:'Normal filling pressures',c:0,p:20}],fb:{1:'<b>Correct!</b> Cardiogenic: Low CO (pump failure), high SVR (compensation), high PCWP/CVP. Cold extremities, JVD, pulmonary edema. Avoid excessive fluids!',0:'<b>Cardiogenic:</b> Low CO, high SVR, high filling pressures. Cold, wet.'}},
{t:'Obstructive Shock',q:'What findings suggest obstructive shock from cardiac tamponade?',h:'Becks triad',o:[{id:'a',txt:'Becks triad: JVD, hypotension, muffled heart sounds; pulsus paradoxus',c:1,p:100},{id:'b',txt:'Clear lung sounds only',c:0,p:20},{id:'c',txt:'Wide pulse pressure',c:0,p:10}],fb:{1:'<b>Correct!</b> Tamponade (Becks triad): JVD, hypotension, muffled heart sounds. Pulsus paradoxus >10mmHg. Electrical alternans on ECG. Emergency pericardiocentesis needed.',0:'<b>Tamponade:</b> Becks triad + pulsus paradoxus. Echo confirms.'}},
{t:'Lactate Significance',q:'What does an elevated lactate indicate in shock?',h:'Marker of perfusion',o:[{id:'a',txt:'Tissue hypoperfusion and anaerobic metabolism; higher lactate = worse prognosis',c:1,p:100},{id:'b',txt:'Infection only',c:0,p:20},{id:'c',txt:'Dehydration only',c:0,p:20}],fb:{1:'<b>Correct!</b> Lactate reflects anaerobic metabolism from hypoperfusion. >2 mmol/L abnormal, >4 severe. Serial lactate clearance guides resuscitation. Target >10% decrease per 2 hours.',0:'<b>Lactate:</b> Tissue hypoperfusion marker. Track clearance.'}},
{t:'Initial Resuscitation',q:'First-line vasopressor for septic shock after adequate fluid resuscitation?',h:'Surviving Sepsis guidelines',o:[{id:'a',txt:'Norepinephrine (target MAP ≥65 mmHg)',c:1,p:100},{id:'b',txt:'Dopamine',c:0,p:30},{id:'c',txt:'Phenylephrine',c:0,p:20}],fb:{1:'<b>Correct!</b> Norepinephrine first-line for septic shock (alpha + beta effects). Target MAP ≥65. Add vasopressin if refractory. Dopamine associated with more arrhythmias.',0:'<b>Septic shock:</b> Norepinephrine first-line. Target MAP ≥65.'}},
{t:'Cardiogenic Shock Pressors',q:'Preferred inotrope/vasopressor approach for cardiogenic shock?',h:'Different from sepsis',o:[{id:'a',txt:'Dobutamine for inotropy ± norepinephrine for pressure; avoid excessive fluids',c:1,p:100},{id:'b',txt:'Aggressive fluid resuscitation',c:0,p:20},{id:'c',txt:'Phenylephrine alone',c:0,p:20}],fb:{1:'<b>Correct!</b> Cardiogenic: Dobutamine (β1 agonist) for inotropy, ± norepinephrine if hypotensive. Limit fluids (already volume overloaded). Consider mechanical support (IABP, Impella).',0:'<b>Cardiogenic:</b> Dobutamine ± norepinephrine. Limit fluids!'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>💔 The Failing Pump</h1><p style="color:var(--muted);margin-bottom:32px">Shock Differentiation: 4 types, hemodynamics, lactate, vasopressors</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">💔 Hemodynamic Instability</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Shock Differentiation Pearls</div><div class="pearl-item"><b>Definition:</b> Inadequate tissue O2 delivery, not just low BP</div><div class="pearl-item"><b>4 Types:</b> Distributive, Cardiogenic, Hypovolemic, Obstructive</div><div class="pearl-item"><b>Distributive:</b> Low SVR, high CO, warm (early)</div><div class="pearl-item"><b>Cardiogenic:</b> Low CO, high SVR, cold, high filling pressures</div><div class="pearl-item"><b>Tamponade:</b> Becks triad + pulsus paradoxus</div><div class="pearl-item"><b>Lactate:</b> Perfusion marker, track clearance</div><div class="pearl-item"><b>Septic:</b> Norepinephrine first-line</div><div class="pearl-item"><b>Cardiogenic:</b> Dobutamine ± norepi, limit fluids</div></div><div class="cross-link"><a href="sepsis-adventure-enhanced.html">Related: Sepsis</a> | <a href="acs-adventure-enhanced.html">ACS</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
