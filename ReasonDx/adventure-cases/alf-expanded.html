    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"The Confused Jaundiced Patient",content:`<div class="narrative"><p>A <span class="highlight">32-year-old woman</span> with no significant PMH presents with 5 days of nausea, vomiting, and progressive <span class="critical">jaundice</span>. She is now <span class="critical">confused</span> and her family is very concerned.</p><p style="margin-top:12px;"><strong>Vitals:</strong> BP 100/60, HR 110, T 37.8°C<br><strong>Exam:</strong> Jaundice, asterixis present, confused but arousable, no hepatomegaly<br><strong>Labs:</strong> AST 4,200, ALT 5,100, T.bili 18, <span class="critical">INR 3.8</span>, Cr 1.4</p></div>`,question:{prompt:"What defines Acute Liver Failure (ALF)?",options:[{text:"Elevated AST/ALT above 1000",correct:false},{text:"Coagulopathy (INR ≥1.5) + encephalopathy in patient without pre-existing liver disease",correct:true},{text:"Jaundice with elevated bilirubin >10",correct:false},{text:"Liver failure requiring ICU admission",correct:false}],explanation:{correct:"Correct! ALF is defined by: (1) Coagulopathy (INR ≥1.5), (2) Encephalopathy, (3) NO pre-existing liver disease, (4) Illness duration <26 weeks. This patient meets all criteria.",incorrect:"ALF requires coagulopathy (INR ≥1.5) AND encephalopathy in someone without chronic liver disease. Elevated LFTs and jaundice are supportive but not defining features."},teaching:`<div class="mechanism-box"><div class="mechanism-title">📋 ALF Definition</div><div class="pathway">ACUTE LIVER FAILURE requires ALL of:
• INR ≥1.5 (coagulopathy)
• Any degree of encephalopathy
• NO pre-existing liver disease
• Illness duration <26 weeks

Classification by time to encephalopathy:
• Hyperacute: <7 days (best prognosis!)
• Acute: 7-21 days
• Subacute: 21 days - 26 weeks (worst)</div></div>`,why_chain:[{q:"Why does hyperacute have better prognosis?",a:"Paradoxically, rapid onset (like APAP) causes massive but potentially reversible hepatocyte injury. Subacute course suggests slower, more complete destruction with less regeneration potential."}],points:10}},
        {title:"Etiology: What Caused This?",content:`<div class="narrative"><p>You need to identify the cause urgently. On further history, she admits to taking <span class="critical">"a lot of Tylenol"</span> for headaches over the past week but denies intentional overdose.</p></div>`,question:{prompt:"What is the #1 cause of acute liver failure in the United States?",options:[{text:"Viral hepatitis (Hepatitis A, B)",correct:false},{text:"Acetaminophen toxicity",correct:true},{text:"Autoimmune hepatitis",correct:false},{text:"Drug-induced liver injury (non-APAP)",correct:false}],explanation:{correct:"Correct! Acetaminophen accounts for ~50% of ALF cases in the US. It's also the most treatable cause with NAC. Always check APAP level even if patient denies use!",incorrect:"Acetaminophen is #1 in the US (~50%). Viral hepatitis is more common worldwide. Always check APAP level - patients often don't realize they took it (combination products)."},teaching:`<h4>ALF Etiology</h4><table class="comparison-table"><tr><th>Cause</th><th>Percentage (US)</th></tr><tr style="background:rgba(251,191,36,0.2);"><td>Acetaminophen</td><td>~50%</td></tr><tr><td>Drug-induced (non-APAP)</td><td>~12%</td></tr><tr><td>Viral hepatitis</td><td>~10%</td></tr><tr><td>Autoimmune</td><td>~5%</td></tr><tr><td>Ischemic/shock liver</td><td>~5%</td></tr><tr><td>Wilson disease</td><td>~5%</td></tr><tr><td>Indeterminate</td><td>~15%</td></tr></table>`,why_chain:[{q:"What if APAP level is undetectable?",a:"Late presentation! APAP is metabolized within 24-48 hours. Undetectable level doesn't rule out APAP toxicity. Look at pattern: very high AST/ALT (often >3000), low bilirubin early, and history."}],points:10}},
        {title:"N-Acetylcysteine: Give It Early!",content:`<div class="narrative"><p>You send an APAP level and it returns at <span class="highlight">45 mcg/mL</span> (therapeutic <20). She estimates taking ~6-8 extra-strength tablets daily for 5-6 days.</p></div><div class="alert-box"><div class="alert-title">🚨 Give NAC to ALL ALF Patients!</div><p>NAC is standard of care for APAP toxicity AND improves outcomes in non-APAP ALF. Start it immediately!</p></div>`,question:{prompt:"Which statement about NAC in ALF is TRUE?",options:[{text:"NAC only works within 8 hours of ingestion",correct:false},{text:"NAC should be given to all ALF patients regardless of cause",correct:true},{text:"NAC is contraindicated in non-APAP ALF",correct:false},{text:"Oral NAC is preferred over IV in ALF",correct:false}],explanation:{correct:"Correct! NAC benefits ALL ALF patients. For APAP: replenishes glutathione. For non-APAP: improves microcirculation, oxygen delivery, and scavenges free radicals. Studies show improved transplant-free survival.",incorrect:"NAC benefits all ALF, not just APAP. It's effective even late in APAP toxicity. IV is preferred in ALF (reliable absorption, patient may be vomiting/encephalopathic)."},teaching:`<div class="mechanism-box"><div class="mechanism-title">📋 NAC Protocol (21-hour IV)</div><div class="pathway">Loading: 150 mg/kg in D5W 200mL over 1 hour
Dose 2: 50 mg/kg in D5W 500mL over 4 hours
Dose 3: 100 mg/kg in D5W 1000mL over 16 hours

Continue until:
• INR <2, AND
• Encephalopathy resolved, OR
• Transplant occurs</div></div>`,why_chain:[{q:"How does NAC help in non-APAP ALF?",a:"Improves microcirculatory flow, increases oxygen delivery to hepatocytes, and scavenges free radicals. Multiple trials show improved transplant-free survival in non-APAP ALF."}],points:10}},
        {title:"Hepatic Encephalopathy Management",content:`<div class="narrative"><p>Your patient has <span class="highlight">Grade 2-3 encephalopathy</span> - she's confused, lethargic, and has asterixis.</p></div>`,question:{prompt:"How does encephalopathy in ALF differ from cirrhosis?",options:[{text:"It's typically milder in ALF",correct:false},{text:"It can progress to cerebral edema in ALF",correct:true},{text:"Lactulose is contraindicated in ALF",correct:false},{text:"Ammonia levels guide treatment in ALF",correct:false}],explanation:{correct:"Correct! In ALF, encephalopathy can progress to cerebral edema and herniation - the leading cause of death. This doesn't happen in chronic liver disease. Grade 3-4 = high risk.",incorrect:"Cerebral edema is unique to ALF. In cirrhosis, encephalopathy rarely causes cerebral edema. This makes ALF encephalopathy much more dangerous."},teaching:`<h4>West Haven Criteria</h4><table class="comparison-table"><tr><th>Grade</th><th>Features</th></tr><tr><td>1</td><td>Mild confusion, sleep disturbance</td></tr><tr><td>2</td><td>Lethargy, moderate confusion, asterixis</td></tr><tr style="background:rgba(239,68,68,0.2);"><td>3</td><td>Somnolent but arousable, marked confusion</td></tr><tr style="background:rgba(239,68,68,0.2);"><td>4</td><td>Coma, unresponsive</td></tr></table><div class="alert-box"><div class="alert-title">⚠️ Grade 3-4 = High Cerebral Edema Risk!</div><p>Consider ICU, intubation for airway protection, ICP monitoring if awaiting transplant.</p></div>`,why_chain:[{q:"Why does ALF cause cerebral edema but cirrhosis doesn't?",a:"In ALF, massive ammonia surge + systemic inflammation overwhelm brain's ability to adapt. In chronic disease, astrocytes slowly adapt to elevated ammonia. The rapidity of ALF prevents adaptation."}],points:10}},
        {title:"Coagulopathy: To Correct or Not?",content:`<div class="narrative"><p>The patient's INR is <span class="critical">3.8</span>. A colleague suggests giving FFP to "fix the coagulopathy."</p></div>`,question:{prompt:"What is the recommended approach to coagulopathy in ALF?",options:[{text:"Give FFP to all patients with INR >2",correct:false},{text:"Do not routinely correct INR; it's a prognostic marker",correct:true},{text:"Give vitamin K to all ALF patients",correct:false},{text:"Coagulopathy means high bleeding risk - avoid all procedures",correct:false}],explanation:{correct:"Correct! INR is a prognostic marker - correcting it obscures the trend. ALF has 'balanced' hemostasis (both pro- and anti-coagulant factors decreased). Only give FFP for active bleeding or pre-procedure.",incorrect:"Don't routinely correct INR! It's prognostic, not just a bleeding risk. Paradoxically, ALF patients have balanced hemostasis and still need DVT prophylaxis."},teaching:`<div class="mechanism-box"><div class="mechanism-title">🧬 Balanced Hemostasis in ALF</div><div class="pathway">Liver makes BOTH:
• Pro-coagulant factors (II, V, VII, IX, X)
• Anti-coagulant factors (Protein C, S, AT)

In ALF, BOTH are decreased
→ "Rebalanced" hemostasis
→ Risk of bleeding AND thrombosis!

INR reflects pro-coagulant factors only
→ Overestimates true bleeding risk

VTE prophylaxis is still recommended!</div></div>`,why_chain:[{q:"When should you give FFP?",a:"Active bleeding or before invasive procedures (central line, ICP monitor). Giving FFP otherwise wastes a valuable prognostic marker and doesn't prevent spontaneous bleeding."}],points:10}},

    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${currentStage+1} of ${stages.length}</div><div class="scene-title">${stage.title}</div></div>${stage.content}`;if(stage.question){html+=`<div class="question-box"><div class="question-prompt">${stage.question.prompt}</div><div class="mcq-options">`;stage.question.options.forEach((opt,i)=>{html+=`<div class="mcq-option" onclick="checkAnswer(${i},${opt.correct})"><div class="option-letter">${String.fromCharCode(65+i)}</div><div>${opt.text}</div></div>`;});html+=`</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>${stage.question.explanation.correct}</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>${stage.question.explanation.incorrect}</div>`;if(stage.question.teaching)html+=`<div class="teaching-point" id="teaching">${stage.question.teaching}</div>`;if(stage.question.why_chain&&stage.question.why_chain.length>0){html+=`<div class="why-chain" id="why-chain"><h4>🔗 WHY Chain</h4>`;stage.question.why_chain.forEach(w=>{html+=`<div class="why-item"><div class="why-q">${w.q}</div><div style="color:#e2e8f0;line-height:1.6;">${w.a}</div></div>`;});html+=`</div>`;}html+=`<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>`;}html+=`</div>`;document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');const w=document.getElementById('why-chain');if(w)w.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML=`<div class="scene completion"><h2 style="color:#4ade80;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>${score}</strong> / ${stages.length*10}</p><p>You've mastered Acute Liver Failure!</p></div>`;}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}



// ============================================================================
// EPA & CALIBRATION ENHANCEMENT - ReasonDx
// ============================================================================

// Case EPA Metadata
const caseEPA = {
    id: 'alf',
    primaryEPAs: ["EPA-10","EPA-2","EPA-3"],
    secondaryEPAs: ["EPA-4"],
    category: 'Gastroenterology'
};

// Response tracking for calibration
let responseHistory = [];
let pendingSelection = null;

// EPA Names for display
const epaNames = {"EPA-1":"Gather H&P","EPA-2":"Prioritize DDx","EPA-3":"Recommend Tests","EPA-4":"Enter Orders","EPA-7":"Apply Evidence","EPA-10":"Recognize Urgency","EPA-12":"Perform Procedures"};

// Override selectOption to add confidence step
const originalSelectOption = typeof selectOption === 'function' ? selectOption : null;

function selectOptionEnhanced(index, correct) {
    const qId = 'q' + currentStage;
    if (answeredQuestions.has(qId)) return;
    
    // Store pending selection
    pendingSelection = { index, correct, stageIdx: currentStage };
    
    // Highlight selected option
    document.querySelectorAll('.mcq-option').forEach((opt, i) => {
        opt.classList.remove('selected');
        if (i === index) opt.classList.add('selected');
    });
    
    // Show confidence slider
    const confContainer = document.getElementById('confidence-container');
    if (confContainer) {
        confContainer.classList.add('show');
        confContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function updateConfidenceDisplay(value) {
    const display = document.getElementById('confidence-display');
    if (display) display.textContent = value + '%';
}

function submitWithConfidence() {
    if (!pendingSelection) return;
    
    const confidence = parseInt(document.getElementById('confidence-slider').value);
    const { index, correct, stageIdx } = pendingSelection;
    const stage = stages[stageIdx];
    
    // Record response with confidence
    responseHistory.push({
        stage: stageIdx + 1,
        stageTitle: stage.title,
        epaFocus: caseEPA.primaryEPAs[0],
        selectedIndex: index,
        selectedText: stage.question.options[index].text,
        correct: correct,
        confidence: confidence,
        points: correct ? stage.question.points : 0,
        maxPoints: stage.question.points
    });
    
    // Hide confidence container
    const confContainer = document.getElementById('confidence-container');
    if (confContainer) confContainer.classList.remove('show');
    
    // Now process the answer (call original logic)
    const qId = 'q' + stageIdx;
    answeredQuestions.add(qId);
    decisionPath[stageIdx] = index;
    
    maxScore += stage.question.points;
    if (correct) score += stage.question.points;
    
    document.getElementById('score').textContent = score;
    document.getElementById('maxScore').textContent = maxScore;
    
    // Show calibration feedback
    showCalibrationFeedback(confidence, correct);
    
    pendingSelection = null;
    renderStage();
}

function showCalibrationFeedback(confidence, correct) {
    // This will be shown in the feedback section after render
    const feedback = document.createElement('div');
    feedback.className = 'calibration-feedback show';
    
    if (correct && confidence >= 70) {
        feedback.classList.add('well-calibrated');
        feedback.innerHTML = '✅ <strong>Well calibrated!</strong> You were confident and correct.';
    } else if (correct && confidence < 50) {
        feedback.classList.add('underconfident');
        feedback.innerHTML = '📚 Correct, but you were uncertain. <strong>Trust your knowledge more!</strong>';
    } else if (!correct && confidence >= 70) {
        feedback.classList.add('overconfident');
        feedback.innerHTML = '⚠️ <strong>Overconfidence detected.</strong> High confidence + wrong answer is where diagnostic errors happen.';
    } else {
        feedback.classList.add('well-calibrated');
        feedback.innerHTML = '📝 Incorrect, but your uncertainty was appropriate. Review this concept.';
    }
    
    // Store for rendering
    window.lastCalibrationFeedback = feedback.outerHTML;
}

// Enhanced debrief with EPA and calibration
function showEnhancedDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    const content = document.getElementById('debriefContent');
    if (!overlay || !content) return;
    
    const percentage = maxScore > 0 ? Math.round((score / maxScore) * 100) : 0;
    
    // Calculate calibration
    const withConf = responseHistory.filter(r => r.confidence !== undefined);
    const correctWithConf = withConf.filter(r => r.correct);
    const incorrectWithConf = withConf.filter(r => !r.correct);
    const avgConfCorrect = correctWithConf.length > 0 
        ? Math.round(correctWithConf.reduce((s,r) => s + r.confidence, 0) / correctWithConf.length) : 0;
    const avgConfIncorrect = incorrectWithConf.length > 0 
        ? Math.round(incorrectWithConf.reduce((s,r) => s + r.confidence, 0) / incorrectWithConf.length) : 0;
    
    // EPA performance
    const epaPerf = {};
    responseHistory.forEach(r => {
        const epa = r.epaFocus || caseEPA.primaryEPAs[0];
        if (!epaPerf[epa]) epaPerf[epa] = { correct: 0, total: 0 };
        epaPerf[epa].total++;
        if (r.correct) epaPerf[epa].correct++;
    });
    
    // Calibration interpretation
    let calibrationMsg = '';
    if (avgConfCorrect - avgConfIncorrect > 20) {
        calibrationMsg = '✅ Good discrimination! You feel more confident when you\'re right.';
    } else if (avgConfIncorrect > 60) {
        calibrationMsg = '⚠️ Overconfidence pattern detected. Practice asking "What would make me wrong?"';
    } else {
        calibrationMsg = '📊 Work on calibration - confidence should differ between correct and incorrect answers.';
    }
    
    content.innerHTML = `
        <div style="text-align:center;margin-bottom:24px;">
            <div style="font-size:4rem;">${percentage >= 80 ? '🏆' : percentage >= 60 ? '👍' : '📚'}</div>
            <div style="font-size:2.5rem;font-weight:700;color:${percentage >= 80 ? '#22c55e' : percentage >= 60 ? '#f59e0b' : '#ef4444'}">${percentage}%</div>
            <div style="color:#6b7280;">Score: ${score}/${maxScore}</div>
        </div>
        
        <div class="epa-debrief-section">
            <h4>📋 EPA Competencies Assessed</h4>
            <div class="epa-progress-grid">
                ${Object.entries(epaPerf).map(([epa, data]) => {
                    const pct = Math.round((data.correct / data.total) * 100);
                    const colorClass = pct >= 80 ? 'high' : pct >= 60 ? 'medium' : 'low';
                    return `<div class="epa-progress-card">
                        <div class="epa-name">${epaNames[epa] || epa}</div>
                        <div class="epa-score ${colorClass}">${pct}%</div>
                    </div>`;
                }).join('')}
            </div>
        </div>
        
        <div class="calibration-debrief">
            <h4>🎯 Confidence Calibration</h4>
            <div class="calibration-stats">
                <div class="calibration-stat">
                    <div class="stat-value" style="color:#22c55e;">${avgConfCorrect}%</div>
                    <div class="stat-label">Avg confidence when correct</div>
                </div>
                <div class="calibration-stat">
                    <div class="stat-value" style="color:${avgConfIncorrect > 60 ? '#ef4444' : '#f59e0b'};">${avgConfIncorrect}%</div>
                    <div class="stat-label">Avg confidence when incorrect</div>
                </div>
            </div>
            <div class="calibration-interpretation">${calibrationMsg}</div>
        </div>
        
        <div class="decision-path">
            <h3>📝 Your Decisions</h3>
            ${responseHistory.map(r => `
                <div class="path-item ${r.correct ? 'path-optimal' : 'path-incorrect'}">
                    <div style="display:flex;justify-content:space-between;">
                        <div>
                            <div class="path-stage">${r.correct ? '✓' : '✗'} Stage ${r.stage}: ${r.stageTitle}</div>
                            <div class="path-choice" style="font-size:0.85rem;color:#6b7280;">${r.confidence}% confident</div>
                        </div>
                        <div class="path-points">${r.points}/${r.maxPoints}</div>
                    </div>
                </div>
            `).join('')}
        </div>
        
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
        <button class="debrief-btn" style="background:#e5e7eb;color:#4b5563;margin-top:8px;" onclick="closeDebrief()">Close</button>
    `;
    
    overlay.classList.add('show');
}

// Replace selectOption globally
window.selectOption = selectOptionEnhanced;

// Store original showDebrief if exists
if (typeof showDebrief === 'function') {
    window.originalShowDebrief = showDebrief;
}
window.showDebrief = showEnhancedDebrief;

</script>

<!-- Visual Debrief Overlay -->
<div class="debrief-overlay" id="debriefOverlay" onclick="if(event.target===this)closeDebrief()">
    <div class="debrief-content" id="debriefContent"></div>
</div>
