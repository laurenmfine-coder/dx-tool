<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pneumonia Complete | Dual-Mode Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; transition: background 0.3s; }
        body.adult { background: linear-gradient(135deg, #0f766e 0%, #14b8a6 100%); }
        body.peds { background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%); }
        .container { max-width: 900px; margin: 0 auto; }
        .mode-toggle { display: flex; justify-content: center; margin-bottom: 20px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 4px; }
        .mode-btn { flex: 1; padding: 12px 24px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s; background: transparent; color: #e2e8f0; }
        .mode-btn.active { background: rgba(255,255,255,0.2); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-radius: 16px; margin-bottom: 20px; }
        .adult .header { background: rgba(15, 118, 110, 0.9); }
        .peds .header { background: rgba(124, 58, 237, 0.9); }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; margin-left: 10px; }
        .adult .badge { background: #14b8a6; }
        .peds .badge { background: #a78bfa; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; border-radius: 3px; transition: background 0.3s; }
        .adult .progress-fill { background: linear-gradient(90deg, #14b8a6, #5eead4); }
        .peds .progress-fill { background: linear-gradient(90deg, #a78bfa, #c4b5fd); }
        .scene { border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .adult .scene { background: linear-gradient(135deg, #0f766e, #0d9488); }
        .peds .scene { background: linear-gradient(135deg, #6d28d9, #7c3aed); }
        .scene-header { padding: 16px 20px; }
        .adult .scene-header { background: rgba(20, 184, 166, 0.15); }
        .peds .scene-header { background: rgba(167, 139, 250, 0.15); }
        .scene-phase { font-size: 0.75rem; text-transform: uppercase; }
        .adult .scene-phase { color: #5eead4; }
        .peds .scene-phase { color: #c4b5fd; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .safe { color: #4ade80; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(20, 184, 166, 0.2)); border: 1px solid rgba(139, 92, 246, 0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251, 191, 36, 0.15); border: 1px solid rgba(251, 191, 36, 0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .adult .btn { background: linear-gradient(135deg, #14b8a6, #0d9488); }
        .peds .btn { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); }
        .adult .comparison-table th { color: #5eead4; }
        .peds .comparison-table th { color: #c4b5fd; }
        .why-chain { background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(20, 184, 166, 0.15)); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 16px; padding: 24px; margin: 24px 0; }
        .why-chain-title { font-size: 1.2rem; font-weight: 700; color: #c4b5fd; margin-bottom: 20px; }
        .why-item { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
        .why-q { font-weight: 600; color: #e9d5ff; margin-bottom: 10px; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); }
        .pitfall { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="adult">
    <div class="container">
        <div class="mode-toggle">
            <button class="mode-btn active" onclick="setMode('adult')">🏥 Adult</button>
            <button class="mode-btn" onclick="setMode('peds')">👶 Pediatric</button>
        </div>
        <div id="app"></div>
    </div>
    <script>
    const STAGES = ['arrival', 'classification', 'severity', 'organisms', 'workup', 'antibiotics', 'atypicals', 'viral', 'complications', 'disposition', 'prevention', 'debrief'];
    const state = { stage: 0, mode: 'adult' };

    function setMode(mode) {
        state.mode = mode;
        state.stage = 0;
        document.body.className = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.querySelector(`.mode-btn:${mode === 'adult' ? 'first' : 'last'}-child`).classList.add('active');
        render();
    }

    function render() {
        const progress = ((state.stage + 1) / STAGES.length) * 100;
        const icon = state.mode === 'adult' ? '🫁' : '👶🫁';
        const title = state.mode === 'adult' ? 'Pneumonia Complete' : 'Pediatric Pneumonia';
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">${icon} ${title}<span class="badge">12 STAGES</span></div><div style="font-size:1.3rem;font-weight:700">${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }

    window.render_arrival = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 12</div><div class="scene-title">Cough and Fever</div></div><div class="scene-body"><div class="narrative"><p>A <span class="highlight">58-year-old man</span> with COPD and DM presents with <span class="critical">productive cough, fever, and dyspnea</span> for 3 days.</p><p style="margin-top:12px;"><strong>Vitals:</strong> T 101.8°F, HR 108, BP 128/78, RR 24, SpO2 91% on RA<br><strong>Exam:</strong> Rhonchi and crackles RLL, dullness to percussion, egophony<br><strong>Labs:</strong> WBC 16.8, procalcitonin 2.4 ng/mL</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Pneumonia Pathophysiology</div><div class="pathway">Pathogen reaches alveoli via:<br>• Aspiration of oropharyngeal flora (most common)<br>• Inhalation of aerosolized droplets<br>• Hematogenous spread (rare)<br><br>→ Alveolar inflammation<br>→ Exudate fills airspaces<br>→ Consolidation (V/Q mismatch)<br>→ Hypoxemia</div></div><button class="btn" onclick="nextStage()">Classification →</button></div></div>`;
        } else {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 12</div><div class="scene-title">The Sick Child</div></div><div class="scene-body"><div class="narrative"><p>A <span class="highlight">3-year-old boy</span> presents with <span class="critical">fever, cough, and fast breathing</span> for 2 days. Mom says he's not eating well.</p><p style="margin-top:12px;"><strong>Vitals:</strong> T 102.4°F, HR 140, RR 48, SpO2 93% on RA<br><strong>Exam:</strong> Nasal flaring, subcostal retractions, decreased breath sounds RLL, crackles<br><strong>Appearance:</strong> Irritable but consolable</p></div><div class="alert-box"><div class="alert-title">🚨 Tachypnea Is the Most Sensitive Sign!</div><p>WHO defines tachypnea as: <2mo: >60/min, 2-12mo: >50/min, 1-5yr: >40/min, >5yr: >20/min. Tachypnea without URI symptoms = pneumonia until proven otherwise.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Pediatric Differences</div><div class="pathway">Children have:<br>• Smaller airways → easier obstruction<br>• Less collateral ventilation<br>• Higher metabolic demands<br>• Different organism spectrum by age<br><br>Clinical signs more important than CXR in kids!</div></div><button class="btn" onclick="nextStage()">Classification →</button></div></div>`;
        }
    };

    window.render_classification = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 12</div><div class="scene-title">CAP vs HAP vs VAP</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Pneumonia Classification</div><table class="comparison-table"><tr><th>Type</th><th>Definition</th><th>Key Organisms</th></tr><tr><td><strong>CAP</strong></td><td>Community-acquired; onset outside hospital</td><td>S. pneumoniae, H. flu, atypicals</td></tr><tr><td><strong>HAP</strong></td><td>≥48h after hospital admission</td><td>MRSA, Pseudomonas, GNRs</td></tr><tr><td><strong>VAP</strong></td><td>≥48h after intubation</td><td>MDR organisms, Pseudomonas</td></tr><tr><td><strong>HCAP</strong></td><td>No longer used (2016 guidelines)</td><td>Treat as CAP unless risk factors</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Classification Matters</div><div class="pathway"><strong>CAP:</strong> Empiric coverage for typical + atypical<br><strong>HAP/VAP:</strong> Broader coverage for resistant organisms<br><br>Key question: Does patient have risk factors for MDR?<br>• IV antibiotics in past 90 days<br>• Hospitalization ≥5 days<br>• High local MRSA/Pseudomonas rates<br>• Structural lung disease</div></div><div class="narrative"><p><strong>This patient:</strong> Symptoms started at home, no recent hospitalization = <span class="highlight">Community-Acquired Pneumonia (CAP)</span></p></div><button class="btn" onclick="nextStage()">Severity Assessment →</button></div></div>`;
        } else {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 12</div><div class="scene-title">Bacterial vs Viral</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Pediatric Pneumonia: Viral vs Bacterial</div><table class="comparison-table"><tr><th>Feature</th><th>Viral</th><th>Bacterial</th></tr><tr><td>Age</td><td><5 years most common</td><td>Any age; more severe</td></tr><tr><td>Onset</td><td>Gradual, with URI prodrome</td><td>More acute</td></tr><tr><td>Fever</td><td>Low-moderate</td><td>High (>39°C)</td></tr><tr><td>CXR</td><td>Diffuse interstitial, bilateral</td><td>Lobar consolidation</td></tr><tr><td>WBC</td><td>Normal or lymphocytic</td><td>Leukocytosis with left shift</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ Overlap Is Common!</div><p>Viral pneumonia can be complicated by bacterial superinfection. If high fever persists >48-72h or child worsens, suspect bacterial component.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Viral Is More Common in Kids</div><div class="pathway">Children <5 years:<br>• 70-80% of pneumonia is VIRAL<br>• RSV, influenza, parainfluenza, rhinovirus<br>• Less developed adaptive immunity<br><br>Bacterial pneumonia:<br>• Often follows viral URI<br>• S. pneumoniae most common bacterial cause<br>• Mycoplasma increases in school-age children</div></div><button class="btn" onclick="nextStage()">Severity Assessment →</button></div></div>`;
        }
    };

    window.render_severity = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 12</div><div class="scene-title">CURB-65 and PSI</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 CURB-65 Score</div><table class="comparison-table"><tr><th>Letter</th><th>Criteria</th><th>Points</th></tr><tr><td><strong>C</strong></td><td>Confusion (new onset)</td><td>1</td></tr><tr><td><strong>U</strong></td><td>Urea >7 mmol/L (BUN >19)</td><td>1</td></tr><tr><td><strong>R</strong></td><td>Respiratory rate ≥30</td><td>1</td></tr><tr><td><strong>B</strong></td><td>Blood pressure <90 systolic or ≤60 diastolic</td><td>1</td></tr><tr><td><strong>65</strong></td><td>Age ≥65</td><td>1</td></tr></table><p style="margin-top:12px;"><strong>Score interpretation:</strong> 0-1: Outpatient | 2: Consider admission | 3-5: ICU consideration</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 IDSA/ATS Severe CAP Criteria</div><div class="pathway"><strong>Major criteria (1 = ICU):</strong><br>• Septic shock requiring vasopressors<br>• Respiratory failure requiring mechanical ventilation<br><br><strong>Minor criteria (≥3 = ICU):</strong><br>• RR ≥30<br>• PaO2/FiO2 ≤250<br>• Multilobar infiltrates<br>• Confusion<br>• BUN ≥20<br>• WBC <4,000<br>• Platelets <100,000<br>• Temp <36°C<br>• Hypotension requiring fluids</div></div><div class="narrative"><p><strong>This patient:</strong> Age 58 (0), no confusion (0), BUN 24 (1), RR 24 (0), BP normal (0) = <span class="highlight">CURB-65 = 1</span> → Consider outpatient vs observation</p></div><button class="btn" onclick="nextStage()">Common Organisms →</button></div></div>`;
        } else {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 12</div><div class="scene-title">Pediatric Severity Assessment</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Signs of Severe Pneumonia in Children</div><table class="comparison-table"><tr><th>Finding</th><th>Significance</th></tr><tr><td>SpO2 <90%</td><td>Requires oxygen, admission</td></tr><tr><td>Severe retractions</td><td>Increased work of breathing</td></tr><tr><td>Grunting</td><td>Creating auto-PEEP; severe</td></tr><tr><td>Nasal flaring</td><td>Respiratory distress</td></tr><tr><td>Inability to feed</td><td>Too dyspneic to eat</td></tr><tr><td>Altered mental status</td><td>Hypoxia or sepsis</td></tr><tr><td>Apnea</td><td>Especially in infants</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 Admission Criteria (Any ONE)</div><ul style="margin-left:20px;"><li>Age <6 months with suspected bacterial pneumonia</li><li>SpO2 <90% on room air</li><li>Moderate-severe respiratory distress</li><li>Dehydration or unable to maintain hydration</li><li>Failed outpatient therapy</li><li>Concern for complications (effusion, empyema)</li></ul></div><div class="narrative"><p><strong>This patient:</strong> SpO2 93%, subcostal retractions, RR 48 = <span class="critical">Moderate respiratory distress</span> → Admit for observation and treatment</p></div><button class="btn" onclick="nextStage()">Common Organisms →</button></div></div>`;
        }
    };

    window.render_organisms = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 12</div><div class="scene-title">CAP Pathogens</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Common CAP Organisms</div><table class="comparison-table"><tr><th>Organism</th><th>Frequency</th><th>Classic Features</th></tr><tr><td><strong>S. pneumoniae</strong></td><td>#1 (30-40%)</td><td>Rust-colored sputum, lobar consolidation</td></tr><tr><td><strong>H. influenzae</strong></td><td>Common in COPD</td><td>Exacerbation of chronic lung disease</td></tr><tr><td><strong>M. pneumoniae</strong></td><td>Young adults</td><td>Dry cough, gradual onset, "walking pneumonia"</td></tr><tr><td><strong>C. pneumoniae</strong></td><td>5-10%</td><td>Pharyngitis, hoarseness preceding</td></tr><tr><td><strong>Legionella</strong></td><td>2-5%</td><td>GI symptoms, hyponatremia, travel/water exposure</td></tr><tr><td><strong>Viruses</strong></td><td>20-30%</td><td>Influenza, RSV, COVID-19</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Typical vs Atypical</div><div class="pathway"><strong>TYPICAL (pyogenic):</strong><br>S. pneumoniae, H. influenzae, S. aureus<br>• Abrupt onset, high fever, productive cough<br>• Lobar consolidation on CXR<br>• Respond to beta-lactams<br><br><strong>ATYPICAL:</strong><br>Mycoplasma, Chlamydia, Legionella<br>• Gradual onset, dry cough, extrapulmonary symptoms<br>• Interstitial/patchy infiltrates<br>• Need macrolide or fluoroquinolone</div></div><button class="btn" onclick="nextStage()">Diagnostic Workup →</button></div></div>`;
        } else {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 12</div><div class="scene-title">Pediatric Pathogens by Age</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Organisms by Age - BOARDS FAVORITE</div><table class="comparison-table"><tr><th>Age</th><th>Common Organisms</th></tr><tr><td><strong>0-3 weeks</strong></td><td>GBS, E. coli, Listeria (maternal flora)</td></tr><tr><td><strong>3 wks - 3 mo</strong></td><td>RSV, Chlamydia trachomatis, S. pneumoniae</td></tr><tr><td><strong>3 mo - 5 yr</strong></td><td>Viruses (RSV, influenza), S. pneumoniae, H. flu</td></tr><tr><td><strong>≥5 years</strong></td><td>Mycoplasma, S. pneumoniae, Chlamydia pneumoniae</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ Chlamydia trachomatis Pneumonia</div><p>1-3 month old with: staccato cough, no fever, conjunctivitis history, eosinophilia. CXR shows hyperinflation. Treat with macrolide!</p></div><div class="why-chain"><div class="why-chain-title">🔗 WHY Chain: Age-Based Organisms</div><div class="why-item"><div class="why-q">Why GBS in neonates?</div>Acquired from maternal vaginal flora during delivery. Late-onset (7-90 days) from horizontal transmission.</div><div class="why-item"><div class="why-q">Why Mycoplasma in school-age?</div>Spread via respiratory droplets in schools. Children <5 rarely get Mycoplasma due to immature immune response needed to cause symptoms.</div></div><button class="btn" onclick="nextStage()">Diagnostic Workup →</button></div></div>`;
        }
    };

    window.render_workup = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 12</div><div class="scene-title">Diagnostic Studies</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 CAP Workup</div><table class="comparison-table"><tr><th>Test</th><th>When to Order</th></tr><tr><td>CXR</td><td>All patients with suspected pneumonia</td></tr><tr><td>Blood cultures</td><td>Severe CAP, ICU admission</td></tr><tr><td>Sputum culture</td><td>Severe CAP, intubated patients</td></tr><tr><td>Procalcitonin</td><td>Helps distinguish bacterial vs viral</td></tr><tr><td>Urine Legionella Ag</td><td>Severe CAP, suspicious history</td></tr><tr><td>Urine pneumococcal Ag</td><td>Severe CAP</td></tr><tr><td>Respiratory viral panel</td><td>During flu season, immunocompromised</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Procalcitonin Interpretation</div><div class="pathway">Procalcitonin rises with bacterial infection<br><br><strong>Levels:</strong><br>• <0.1 ng/mL: Bacterial unlikely<br>• 0.1-0.25: Bacterial possible<br>• 0.25-0.5: Bacterial likely<br>• >0.5: Bacterial very likely<br><br>Can guide antibiotic duration:<br>Stop abx when PCT <0.25 or ↓80% from peak</div></div><div class="narrative"><p><strong>This patient:</strong> CXR shows RLL consolidation. Procalcitonin 2.4 = <span class="critical">bacterial infection very likely</span></p></div><button class="btn" onclick="nextStage()">Antibiotic Selection →</button></div></div>`;
        } else {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 12</div><div class="scene-title">Do We Need a CXR?</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Pediatric Pneumonia Workup</div><table class="comparison-table"><tr><th>Test</th><th>Indication</th></tr><tr><td>CXR</td><td>NOT routine for outpatient; get if hospitalized, hypoxic, or diagnostic uncertainty</td></tr><tr><td>CBC</td><td>Hospitalized patients; not routine for outpatient</td></tr><tr><td>Blood culture</td><td>Hospitalized, severe, or failed outpatient therapy</td></tr><tr><td>Viral testing</td><td>Flu season (can guide oseltamivir)</td></tr><tr><td>Procalcitonin</td><td>May help distinguish bacterial vs viral</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ CXR Is NOT Required for Outpatient Pediatric CAP!</div><p>Clinical diagnosis is sufficient. CXR should be obtained for: hospitalization, hypoxia, severe/complicated disease, diagnostic uncertainty, or treatment failure.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 CXR Patterns</div><div class="pathway"><strong>Lobar consolidation:</strong> Bacterial (S. pneumoniae)<br><strong>Interstitial/bilateral:</strong> Viral or atypical<br><strong>Round pneumonia:</strong> Classic for S. pneumoniae in kids<br><strong>Cavitation:</strong> S. aureus, Klebsiella, TB<br><strong>Pleural effusion:</strong> Complicated pneumonia</div></div><button class="btn" onclick="nextStage()">Antibiotic Selection →</button></div></div>`;
        }
    };

    window.render_antibiotics = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 12</div><div class="scene-title">Empiric CAP Treatment</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 IDSA CAP Guidelines</div><table class="comparison-table"><tr><th>Setting</th><th>Regimen</th></tr><tr><td><strong>Outpatient, healthy</strong></td><td>Amoxicillin OR doxycycline OR macrolide*</td></tr><tr><td><strong>Outpatient, comorbidities</strong></td><td>Amox-clav + macrolide OR respiratory FQ</td></tr><tr><td><strong>Inpatient, non-severe</strong></td><td>Beta-lactam + macrolide OR respiratory FQ alone</td></tr><tr><td><strong>Inpatient, severe (ICU)</strong></td><td>Beta-lactam + macrolide OR beta-lactam + FQ</td></tr></table><p style="margin-top:8px;">*Macrolide only if local resistance <25%</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Cover Atypicals?</div><div class="pathway">Atypicals (Mycoplasma, Chlamydia, Legionella)<br>cause 15-25% of CAP<br><br>Beta-lactams DON'T cover atypicals!<br>(No cell wall in Mycoplasma, intracellular in others)<br><br>Must add macrolide or use fluoroquinolone<br><br>Exception: Very mild outpatient CAP in healthy<br>patient can use amoxicillin alone</div></div><div class="why-chain"><div class="why-chain-title">🔗 WHY Chain: Combination Therapy</div><div class="why-item"><div class="why-q">Why beta-lactam + macrolide better than FQ alone?</div>Studies show better outcomes with combination. Macrolides have immunomodulatory effects beyond antibacterial activity.</div></div><button class="btn" onclick="nextStage()">Atypical Pneumonias →</button></div></div>`;
        } else {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 12</div><div class="scene-title">Pediatric Antibiotic Selection</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Outpatient Pediatric CAP Treatment</div><table class="comparison-table"><tr><th>Age/Scenario</th><th>First-Line</th><th>Alternative</th></tr><tr><td><strong>Preschool (presumed viral)</strong></td><td>Supportive care</td><td>Amoxicillin if bacterial suspected</td></tr><tr><td><strong>Suspected bacterial</strong></td><td>Amoxicillin 90 mg/kg/day</td><td>Amox-clav if H. flu concern</td></tr><tr><td><strong>School-age (Mycoplasma)</strong></td><td>Azithromycin</td><td>Doxycycline if >8 years</td></tr><tr><td><strong>Penicillin allergy</strong></td><td>Azithromycin or cephalosporin</td><td>Levofloxacin if severe allergy</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ High-Dose Amoxicillin!</div><p>Use 90 mg/kg/day (divided BID or TID) to overcome pneumococcal resistance. Standard dose (45 mg/kg/day) may fail for intermediate-resistant strains.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Inpatient Pediatric Treatment</div><div class="pathway"><strong>Fully immunized, non-severe:</strong><br>Ampicillin IV 150-200 mg/kg/day<br><br><strong>Not fully immunized or severe:</strong><br>Ceftriaxone 50-100 mg/kg/day<br><br><strong>Suspected Mycoplasma/atypical:</strong><br>Add azithromycin<br><br><strong>Suspected S. aureus (necrotizing):</strong><br>Add vancomycin or clindamycin</div></div><button class="btn" onclick="nextStage()">Atypical Pneumonias →</button></div></div>`;
        }

    window.render_atypicals = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 12</div><div class="scene-title">Atypical Pneumonias</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Atypical Pneumonia Features</div><table class="comparison-table"><tr><th>Organism</th><th>Classic Clues</th><th>Treatment</th></tr><tr><td><strong>Mycoplasma</strong></td><td>${state.mode === 'adult' ? 'Young adult, dry cough, bullous myringitis, cold agglutinins' : 'School-age child, gradual onset, headache, dry cough'}</td><td>Azithromycin, doxycycline</td></tr><tr><td><strong>Legionella</strong></td><td>GI symptoms, hyponatremia, hotel/cruise, elevated LFTs</td><td>Azithromycin, levofloxacin</td></tr><tr><td><strong>Chlamydia pneumoniae</strong></td><td>Pharyngitis → hoarseness → cough, gradual</td><td>Azithromycin, doxycycline</td></tr>${state.mode === 'peds' ? '<tr><td><strong>C. trachomatis</strong></td><td>1-3 mo, staccato cough, afebrile, conjunctivitis hx</td><td>Azithromycin</td></tr>' : ''}</table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Atypicals Are "Atypical"</div><div class="pathway"><strong>Mycoplasma:</strong> No cell wall → beta-lactams useless<br><strong>Legionella:</strong> Intracellular → need macrolide/FQ<br><strong>Chlamydia:</strong> Obligate intracellular<br><br>All require antibiotics that penetrate cells<br>or target protein/DNA synthesis:<br>• Macrolides<br>• Fluoroquinolones<br>• Tetracyclines</div></div><div class="why-chain"><div class="why-chain-title">🔗 WHY Chain: Legionella Clues</div><div class="why-item"><div class="why-q">Why hyponatremia in Legionella?</div>Legionella causes SIADH. Also, diarrhea (common in Legionella) leads to volume depletion → ADH release.</div><div class="why-item"><div class="why-q">Why urine antigen test?</div>Legionella is hard to culture. Urine antigen detects serogroup 1 (most common) and remains positive for weeks even after antibiotics.</div></div><button class="btn" onclick="nextStage()">Viral Pneumonia →</button></div></div>`;
    };

    window.render_viral = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 12</div><div class="scene-title">Influenza and COVID-19</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Viral Pneumonia Treatment</div><table class="comparison-table"><tr><th>Virus</th><th>Treatment</th><th>Notes</th></tr><tr><td><strong>Influenza</strong></td><td>Oseltamivir 75mg BID × 5 days</td><td>Most effective within 48h; still give if hospitalized</td></tr><tr><td><strong>COVID-19</strong></td><td>Remdesivir, dexamethasone (if hypoxic)</td><td>Antivirals if within 5-7 days of symptoms</td></tr><tr><td><strong>RSV (adult)</strong></td><td>Supportive; ribavirin if immunocompromised</td><td>Increasing recognition in adults</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 When to Suspect Viral</div><div class="pathway"><strong>Favors viral pneumonia:</strong><br>• Flu season<br>• Bilateral interstitial infiltrates<br>• Normal-low procalcitonin<br>• Lymphopenia (especially COVID)<br>• Myalgias, headache prominent<br><br><strong>Bacterial superinfection:</strong><br>• Improvement then worsening ("double sickening")<br>• New fever after afebrile period<br>• Lobar consolidation on imaging<br>• Rising procalcitonin</div></div><button class="btn" onclick="nextStage()">Complications →</button></div></div>`;
        } else {

        }
    };

    window.render_complications = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 12</div><div class="scene-title">Complicated Pneumonia</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Pneumonia Complications</div><table class="comparison-table"><tr><th>Complication</th><th>Features</th><th>Management</th></tr><tr><td><strong>Parapneumonic effusion</strong></td><td>Fluid adjacent to pneumonia</td><td>Thoracentesis if significant; antibiotics may be sufficient</td></tr><tr><td><strong>Empyema</strong></td><td>Pus in pleural space; pH <7.2, glucose <60, positive culture</td><td>Chest tube drainage ± fibrinolytics or VATS</td></tr><tr><td><strong>Lung abscess</strong></td><td>Cavitation with air-fluid level</td><td>Prolonged antibiotics (4-6 weeks); drainage if no improvement</td></tr><tr><td><strong>Necrotizing pneumonia</strong></td><td>Multiple small cavities; S. aureus, Klebsiella</td><td>Broad antibiotics; high mortality</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Parapneumonic Effusion Staging</div><div class="pathway"><strong>Simple (uncomplicated):</strong><br>• Clear fluid, pH >7.2, glucose >60<br>• Negative culture and gram stain<br>• Usually resolves with antibiotics alone<br><br><strong>Complicated:</strong><br>• pH <7.2 OR glucose <60 OR positive culture<br>• Requires drainage (chest tube)<br><br><strong>Empyema:</strong><br>• Frankly purulent<br>• Requires drainage + consider VATS</div></div><div class="alert-box"><div class="alert-title">🚨 Suspect Complication If:</div><ul style="margin-left:20px;"><li>Persistent fever >72h despite appropriate antibiotics</li><li>Failure to improve clinically</li><li>New or worsening pleural effusion</li><li>Increasing oxygen requirements</li></ul></div><button class="btn" onclick="nextStage()">Disposition →</button></div></div>`;

    window.render_disposition = function() {

            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 10 of 12</div><div class="scene-title">Discharge Criteria</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Clinical Stability for Discharge</div><ul style="margin-left:20px;line-height:2;"><li>Temperature ≤37.8°C (100°F)</li><li>Heart rate ≤100 bpm</li><li>Respiratory rate ≤24</li><li>Systolic BP ≥90 mmHg</li><li>SpO2 ≥90% on room air (or baseline)</li><li>Able to maintain oral intake</li><li>Normal mental status (or baseline)</li></ul></div><div class="mechanism-box"><div class="mechanism-title">🧬 Antibiotic Duration</div><div class="pathway"><strong>Uncomplicated CAP:</strong> 5 days minimum<br>• Can stop when afebrile ≥48h AND<br>• ≤1 sign of instability<br><br><strong>May need longer if:</strong><br>• S. aureus, Pseudomonas<br>• Lung abscess, empyema<br>• Slow clinical response<br><br><strong>Procalcitonin-guided:</strong><br>Stop when PCT <0.25 or ↓80% from peak</div></div><div class="tips"><div class="pearl"><div class="tip-header">✓ Before Discharge</div><ul style="margin-left:16px;"><li>Switch to oral antibiotics</li><li>Ensure follow-up CXR in 6-8 weeks (especially smokers)</li><li>Smoking cessation counseling</li><li>Vaccinations (pneumococcal, influenza)</li></ul></div><div class="pitfall"><div class="tip-header">✗ Don't Discharge If</div><ul style="margin-left:16px;"><li>Still requiring supplemental O2</li><li>Unable to eat/drink</li><li>Unstable comorbidities</li><li>Social factors preventing adherence</li></ul></div></div><button class="btn" onclick="nextStage()">Prevention →</button></div></div>`;

 CAP</li><li>Standard-dose amoxicillin (use HIGH dose)</li>`}<li>Discharging before clinically stable</li><li>Forgetting vaccination counseling</li></ul></div></div><button class="btn" onclick="state.stage=0;render()">🔄 Restart Case</button></div></div>`;
    };

    function nextStage() { state.stage++; render(); }

    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
    
    // Auto-inject hint examples into existing content
    window.rdxInit = function() {
        // Could add dynamic hint injection here based on difficulty
        console.log('ReasonDx Enhanced Features loaded for: Pneumonia Expanded Dual Adventure');
    };
    
    // Initialize on load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.rdxInit);
    } else {
        window.rdxInit();
    }
})();
</script>
<!-- ==================== END REASONDX ENHANCED FEATURES ==================== -->

</body>
</html>
