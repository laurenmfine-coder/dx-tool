<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DRESS & SCARs - ReasonDx Socratic Case</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #831843 0%, #db2777 100%); min-height: 100vh; padding: 20px; color: #f8fafc; }
        .container { max-width: 900px; margin: 0 auto; }
        .scene { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        .scene-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .scene-phase { font-size: 0.85rem; color: #f9a8d4; text-transform: uppercase; }
        .scene-title { font-size: 1.5rem; font-weight: 700; color: #fbcfe8; }
        .narrative { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px 20px; margin: 16px 0; border-left: 4px solid #db2777; line-height: 1.7; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .question-box { background: linear-gradient(135deg, rgba(219,39,119,0.15), rgba(251,191,36,0.15)); border: 1px solid rgba(219,39,119,0.3); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .question-prompt { font-size: 1.1rem; font-weight: 600; color: #fbcfe8; margin-bottom: 16px; }
        .mcq-options { display: flex; flex-direction: column; gap: 10px; }
        .mcq-option { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: flex-start; gap: 12px; }
        .mcq-option:hover:not(.disabled) { background: rgba(255,255,255,0.1); }
        .mcq-option.disabled { cursor: default; opacity: 0.7; }
        .mcq-option.correct { border-color: #22c55e !important; background: rgba(34,197,94,0.2) !important; opacity: 1 !important; }
        .mcq-option.incorrect { border-color: #ef4444 !important; background: rgba(239,68,68,0.15) !important; }
        .option-letter { font-weight: 700; min-width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 8px; }
        .feedback { margin-top: 16px; padding: 16px; border-radius: 10px; display: none; }
        .feedback.show { display: block; }
        .feedback.correct-feedback { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); }
        .feedback.incorrect-feedback { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); }
        .teaching-point { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3); border-radius: 10px; padding: 16px; margin-top: 16px; display: none; }
        .teaching-point.show { display: block; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(219,39,119,0.1)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 16px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; white-space: pre-line; }
        .btn { background: linear-gradient(135deg, #db2777, #831843); color: white; border: none; padding: 14px 28px; border-radius: 10px; font-weight: 600; cursor: pointer; display: none; margin-top: 16px; }
        .btn.show { display: inline-block; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #db2777, #f9a8d4); border-radius: 3px; transition: width 0.5s; }
        .score-tracker { display: inline-block; background: rgba(0,0,0,0.8); padding: 12px 20px; border-radius: 10px; margin-right: 12px; vertical-align: top; }
        .score-value { font-size: 1.4rem; font-weight: 700; color: #4ade80; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #f9a8d4; }
        .alert-box { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); border-radius: 12px; padding: 16px; margin: 16px 0; }
        .alert-title { color: #f87171; font-weight: 700; margin-bottom: 8px; }
        .completion { text-align: center; padding: 60px 40px; }
    
/* Visual Debrief Styles */
.debrief-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; overflow-y: auto; padding: 20px; }
.debrief-overlay.show { display: flex; justify-content: center; align-items: flex-start; }
.debrief-content { background: white; border-radius: 16px; max-width: 800px; width: 100%; padding: 32px; margin: 40px auto; color: #1f2937; }
.debrief-header { text-align: center; margin-bottom: 24px; }
.debrief-grade { font-size: 4rem; margin-bottom: 8px; }
.debrief-score { font-size: 2.5rem; font-weight: 700; }
.debrief-label { font-size: 1rem; color: #6b7280; }

.decision-path h3 { font-size: 1.25rem; font-weight: 700; margin-bottom: 16px; color: #1f2937; }

.debrief-summary ul { margin-left: 20px; }
.debrief-summary li { margin-bottom: 8px; }
.debrief-btn { display: block; width: 100%; padding: 16px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-top: 24px; }

/* References Panel Styles */

.references-content a:hover { background: #2563eb; color: white; }

/* Platform Panel Styles */
.platform-panel { background: linear-gradient(135deg, #faf5ff, #f3e8ff); border: 1px solid #e9d5ff; border-radius: 12px; padding: 16px 20px; margin: 20px 0; }
.platform-header { font-weight: 600; color: #7c3aed; margin-bottom: 12px; }
.platform-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; font-size: 0.9rem; color: #5b21b6; }
.platform-icon { font-size: 1.1rem; }

/* Mobile Responsive - iPhone 16/17 optimized */
        @media (max-width: 480px) {
            body { padding: 12px !important; }
            .container { padding: 0; }
            .scene { padding: 16px; margin-bottom: 14px; border-radius: 12px; }
            .scene-title { font-size: 1.25rem; }
            .narrative { padding: 12px 14px; margin: 12px 0; font-size: 0.95rem; }
            .socratic-prompt { padding: 14px; }

            .question-prompt { font-size: 1rem; }

            .teaching-point { padding: 12px; }
            table { font-size: 0.75rem; }
            th, td { padding: 6px 8px; }
            .nav-buttons { flex-direction: column; gap: 10px; }

        }

    <div class="score-tracker"><div style="font-size:0.8rem;color:#94a3b8">Score</div><div><span class="score-value" id="score">0</span> / <span id="maxScore">0</span></div></div>
    <div class="container">
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div>

<!-- Open Access References Panel -->
<div class="references-panel" id="referencesPanel">
    <div class="references-header">
        <span>📚</span> Open-Access References
        <button onclick="toggleReferences()" class="refs-toggle">▼</button>
    </div>
    <div class="references-content" id="referencesContent">
        <a href="https://www.ncbi.nlm.nih.gov/books/NBK499920/" target="_blank" rel="noopener">DRESS Syndrome - StatPearls (StatPearls)</a>

</div>
</div>
        <div id="scene-container"></div>
    </div>
    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"The Severe Drug Reactions",content:'<div class="narrative"><p>A <span class="highlight">35-year-old man</span> started phenytoin 3 weeks ago. He presents with <span class="critical">fever, diffuse rash, facial edema, and lymphadenopathy</span>. Labs show eosinophilia and elevated LFTs.</p></div><div class="alert-box"><div class="alert-title">🚨 SCARs: Severe Cutaneous Adverse Reactions</div><p>DRESS, SJS, TEN, AGEP - potentially life-threatening drug reactions requiring immediate recognition.</p></div>',question:{prompt:"What does DRESS stand for?",options:[{text:"Drug Reaction with Erythema and Systemic Symptoms",correct:false},{text:"Drug Reaction with Eosinophilia and Systemic Symptoms",correct:true},{text:"Dermatologic Reaction with Extensive Skin Sloughing",correct:false},{text:"Drug-Related Exanthematous Syndrome",correct:false}],explanation:{correct:"Correct! DRESS = Drug Reaction with Eosinophilia and Systemic Symptoms. Key features: rash + fever + eosinophilia + internal organ involvement (liver, kidney, heart).",incorrect:"DRESS = Drug Reaction with Eosinophilia and Systemic Symptoms. The E is for Eosinophilia, a hallmark feature."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 DRESS Syndrome Features</div><div class="pathway">CLASSIC TRIAD:\n• Skin eruption (morbilliform, may become purpuric)\n• Hematologic abnormality (eosinophilia, atypical lymphocytes)\n• Internal organ involvement\n\nOTHER FEATURES:\n• Fever\n• Lymphadenopathy\n• Facial edema (characteristic!)\n\nLATENCY: 2-8 weeks after drug initiation\n(longer than other drug reactions!)</div></div>',why_chain:[],points:10}},
        {title:"Common Culprits",content:'<div class="narrative"><p>Identifying the causative drug is critical. This patient was started on phenytoin - a classic cause.</p></div>',question:{prompt:"Which drug class is MOST commonly associated with DRESS?",options:[{text:"Beta-blockers",correct:false},{text:"Aromatic anticonvulsants (phenytoin, carbamazepine)",correct:true},{text:"ACE inhibitors",correct:false},{text:"Fluoroquinolones",correct:false}],explanation:{correct:"Correct! Aromatic anticonvulsants (phenytoin, carbamazepine, lamotrigine, phenobarbital) are the most common causes. Allopurinol and sulfonamides are also frequent culprits.",incorrect:"Aromatic anticonvulsants are the #1 cause. Remember: Phenytoin, Carbamazepine, Lamotrigine, Phenobarbital, Allopurinol, Sulfonamides."},teaching:'<h4>Common DRESS Culprits</h4><table class="comparison-table"><tr><th>Drug Class</th><th>Examples</th></tr><tr style="background:rgba(251,191,36,0.2);"><td>Anticonvulsants</td><td>Phenytoin, carbamazepine, lamotrigine, phenobarbital</td></tr><tr><td>Allopurinol</td><td>Especially with HLA-B*5801</td></tr><tr><td>Sulfonamides</td><td>TMP-SMX, sulfasalazine</td></tr><tr><td>Antibiotics</td><td>Vancomycin, minocycline</td></tr><tr><td>Others</td><td>Dapsone, abacavir</td></tr></table>',why_chain:[],points:10}},
        {title:"SJS vs TEN",content:'<div class="narrative"><p>Different patient: started allopurinol 2 weeks ago. Now has <span class="critical">painful skin lesions with blistering, mucosal involvement</span>, and skin detaching with light touch.</p></div>',question:{prompt:"SJS and TEN are distinguished by:",options:[{text:"The causative drug",correct:false},{text:"Percentage of body surface area (BSA) with epidermal detachment",correct:true},{text:"Presence or absence of fever",correct:false},{text:"Whether mucous membranes are involved",correct:false}],explanation:{correct:"Correct! SJS: <10% BSA detachment. SJS-TEN overlap: 10-30%. TEN: >30% BSA. Both can have mucosal involvement and fever.",incorrect:"BSA with epidermal detachment distinguishes them. SJS <10%, TEN >30%. Both have mucosal involvement."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 SJS-TEN Spectrum</div><div class="pathway">SJS: <10% BSA detachment\nSJS-TEN overlap: 10-30% BSA\nTEN: >30% BSA detachment\n\nCOMMON FEATURES:\n• Prodrome (fever, malaise)\n• Painful skin lesions\n• Target/atypical target lesions\n• Positive Nikolsky sign\n• Mucosal involvement (eyes, mouth, genitals)\n\nLATENCY: 1-3 weeks (shorter than DRESS)</div></div>',why_chain:[],points:10}},
        {title:"Nikolsky Sign",content:'<div class="narrative"><p>You examine the patient with suspected TEN. You notice skin sloughing with lateral pressure.</p></div>',question:{prompt:"What is a positive Nikolsky sign?",options:[{text:"Target-shaped lesions on palms",correct:false},{text:"Skin sloughing with lateral pressure on apparently normal skin",correct:true},{text:"Mucosal erosions",correct:false},{text:"Facial edema",correct:false}],explanation:{correct:"Correct! Nikolsky sign = applying lateral pressure causes the epidermis to separate and slough. Indicates loss of epidermal-dermal cohesion. Seen in TEN, pemphigus, and staphylococcal scalded skin syndrome.",incorrect:"Nikolsky sign = skin sloughs with lateral pressure. Indicates epidermal detachment."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 TEN Physical Exam</div><div class="pathway">NIKOLSKY SIGN:\nLateral pressure on normal skin → sloughing\n(positive in TEN, pemphigus, SSSS)\n\nASBOE-HANSEN SIGN:\nPressure on blister → spreads laterally\n\nOTHER FINDINGS:\n• Sheet-like epidermal detachment\n• Dusky red/violaceous skin\n• Mucosal erosions (>90%)\n• Eyes: Conjunctival injection, pseudomembranes</div></div>',why_chain:[],points:10}},
        {title:"DRESS vs SJS/TEN",content:'<div class="narrative"><p>How do you distinguish DRESS from SJS/TEN? Both are severe drug reactions.</p></div>',question:{prompt:"Which finding is MORE characteristic of DRESS than SJS/TEN?",options:[{text:"Skin sloughing",correct:false},{text:"Eosinophilia and internal organ involvement",correct:true},{text:"Mucosal erosions",correct:false},{text:"Positive Nikolsky sign",correct:false}],explanation:{correct:"Correct! DRESS has eosinophilia and internal organ involvement (hepatitis, nephritis, myocarditis). SJS/TEN has skin sloughing and mucosal erosions but less systemic organ involvement.",incorrect:"DRESS = eosinophilia + organ involvement. SJS/TEN = epidermal detachment + mucosal erosions."},teaching:'<h4>DRESS vs SJS/TEN</h4><table class="comparison-table"><tr><th>Feature</th><th>DRESS</th><th>SJS/TEN</th></tr><tr><td>Latency</td><td>2-8 weeks</td><td>1-3 weeks</td></tr><tr><td>Skin</td><td>Morbilliform, no blistering</td><td>Blistering, detachment</td></tr><tr><td>Eosinophilia</td><td>YES (hallmark)</td><td>No</td></tr><tr><td>Organ involvement</td><td>Liver, kidney, heart</td><td>Less common</td></tr><tr><td>Mucosal</td><td>Less prominent</td><td>Severe (90%)</td></tr><tr><td>Facial edema</td><td>Characteristic</td><td>No</td></tr><tr><td>Mortality</td><td>5-10%</td><td>10-30% (TEN)</td></tr></table>',why_chain:[],points:10}},
        {title:"Management",content:'<div class="narrative"><p>You have confirmed DRESS syndrome. What is the management?</p></div>',question:{prompt:"What is the MOST important step in managing DRESS?",options:[{text:"Start high-dose IV steroids immediately",correct:false},{text:"Immediately discontinue the offending drug",correct:true},{text:"Start cyclosporine",correct:false},{text:"Perform plasmapheresis",correct:false}],explanation:{correct:"Correct! STOP THE DRUG immediately! This is the most important intervention. Systemic corticosteroids are used for severe cases (organ involvement) but drug withdrawal is critical.",incorrect:"Stop the drug immediately! This is paramount. Steroids are supportive but not the first step."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 DRESS Management</div><div class="pathway">1. STOP THE OFFENDING DRUG (critical!)\n\n2. SUPPORTIVE CARE:\n• Emollients, antihistamines\n• Monitor organ function closely\n\n3. SYSTEMIC STEROIDS if:\n• Significant organ involvement\n• Prednisone 0.5-1 mg/kg/day\n• Slow taper (weeks-months)\n\n4. AVOID RE-EXPOSURE:\n• Cross-reactivity within drug classes\n• Document allergy prominently</div></div>',why_chain:[],points:10}},
        {title:"TEN Management",content:'<div class="narrative"><p>For TEN, management is more complex and may require ICU care.</p></div>',question:{prompt:"Where should patients with TEN be managed?",options:[{text:"General medical floor",correct:false},{text:"Burn unit or ICU",correct:true},{text:"Outpatient with close follow-up",correct:false},{text:"Dermatology ward",correct:false}],explanation:{correct:"Correct! TEN should be managed in a burn unit or ICU. Patients need wound care similar to burns, fluid resuscitation, infection prevention, and multidisciplinary care.",incorrect:"TEN = burn unit or ICU. These patients need specialized wound care, like burn patients."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 TEN Management</div><div class="pathway">SUPPORTIVE (most important!):\n• STOP THE DRUG\n• Burn unit/ICU transfer\n• Wound care (non-adherent dressings)\n• Fluid/electrolyte management\n• Nutritional support\n• Eye care (ophthalmology consult)\n• Pain management\n\nCONTROVERSIAL THERAPIES:\n• IVIG - mixed evidence\n• Cyclosporine - some benefit\n• Steroids - controversial\n• TNF-α inhibitors\n\nMORTALITY: Use SCORTEN score</div></div>',why_chain:[],points:10}},
        {title:"Case Resolution",content:'<div class="narrative"><p>Your DRESS patient had phenytoin stopped and was started on prednisone for hepatic involvement. His symptoms improved over 2 weeks. He was counseled to avoid all aromatic anticonvulsants.</p></div><div class="mechanism-box"><div class="mechanism-title">📚 SCARs Summary</div><div class="pathway">DRESS:\n• Latency 2-8 weeks\n• Eosinophilia + organ involvement\n• Facial edema, lymphadenopathy\n• Anticonvulsants, allopurinol\n\nSJS/TEN:\n• Latency 1-3 weeks\n• Epidermal detachment + mucosal erosions\n• Nikolsky sign positive\n• SJS <10%, TEN >30% BSA\n\nMANAGEMENT:\n• STOP THE DRUG (critical!)\n• Supportive care\n• TEN → burn unit/ICU</div></div>',question:{prompt:"A patient with DRESS to carbamazepine should avoid:",options:[{text:"Only carbamazepine",correct:false},{text:"All aromatic anticonvulsants due to cross-reactivity",correct:true},{text:"All oral medications",correct:false},{text:"Only anticonvulsants",correct:false}],explanation:{correct:"Correct! Cross-reactivity exists among aromatic anticonvulsants (phenytoin, carbamazepine, phenobarbital, lamotrigine). Avoid the entire class, not just the culprit drug.",incorrect:"Cross-reactivity among aromatic anticonvulsants is high (up to 75%). Avoid all: phenytoin, carbamazepine, phenobarbital, lamotrigine."},teaching:'<h4>Key Takeaways</h4><ul style="line-height:2;margin-left:20px;"><li>DRESS: eosinophilia + organ involvement, 2-8 week latency</li><li>SJS/TEN: epidermal detachment, mucosal erosions, Nikolsky+</li><li>SJS <10% BSA, TEN >30% BSA</li><li>STOP THE DRUG immediately</li><li>TEN requires burn unit/ICU care</li><li>Avoid cross-reactive drugs</li></ul>',why_chain:[],points:10}}
    ];
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:#4ade80;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><p>You mastered DRESS & SCARs!</p></div>';}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}

</script>

<!-- Visual Debrief Overlay -->
<div class="debrief-overlay" id="debriefOverlay" onclick="if(event.target===this)closeDebrief()">
    <div class="debrief-content" id="debriefContent"></div>
</div>

</body>
</html>
