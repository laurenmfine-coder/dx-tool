<!-- Open Access References Panel -->

    <div class="references-content" id="referencesContent">

    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"Painful Vaginal Bleeding",content:'<div class="narrative"><p>A <span class="highlight">32-year-old G3P2</span> at 34 weeks presents with <span class="critical">sudden onset abdominal pain and dark vaginal bleeding</span>. History of chronic hypertension. She recently used cocaine.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 115, BP 90/60<br><strong>Exam:</strong> Uterus is tender and rigid ("board-like"). Fetal heart rate shows late decelerations.</p></div><div class="alert-box"><div class="alert-title">🚨 Placental Abruption!</div><p>Painful bleeding + rigid uterus + fetal distress = abruption until proven otherwise.</p></div>',question:{prompt:"What is the CLASSIC presentation of placental abruption?",options:[{text:"Painless bright red bleeding",correct:false},{text:"Painful vaginal bleeding with uterine tenderness/rigidity",correct:true},{text:"No bleeding with fetal distress only",correct:false},{text:"Gradual onset of contractions",correct:false}],explanation:{correct:"Correct! Classic abruption: painful vaginal bleeding + uterine tenderness/rigidity (\"board-like uterus\") + fetal distress. However, 20% have concealed hemorrhage with no visible bleeding!",incorrect:"Painful bleeding + rigid/tender uterus = abruption. Remember 20% have concealed bleeding (no visible blood)."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Abruption vs Previa</div><div class="pathway">PLACENTAL ABRUPTION:\n• PAINFUL bleeding\n• Uterine tenderness/rigidity\n• Fetal distress common\n• Dark blood (old)\n• May have concealed hemorrhage (20%)\n\nPLACENTA PREVIA:\n• PAINLESS bleeding\n• Soft, non-tender uterus\n• Fetal distress less common (unless severe)\n• Bright red blood\n• Always visible bleeding</div></div>',why_chain:[],points:10}},
        {title:"Risk Factors",content:'<div class="narrative"><p>This patient has two major risk factors: chronic hypertension and cocaine use.</p></div>',question:{prompt:"What is the STRONGEST risk factor for placental abruption?",options:[{text:"Advanced maternal age",correct:false},{text:"Hypertensive disorders (chronic HTN, preeclampsia)",correct:true},{text:"Gestational diabetes",correct:false},{text:"Multiparity alone",correct:false}],explanation:{correct:"Correct! Hypertension (chronic or preeclampsia) is the strongest risk factor. Others: prior abruption, trauma, cocaine/tobacco use, PPROM, polyhydramnios, thrombophilias.",incorrect:"Hypertension is #1 risk factor. Cocaine causes acute vasospasm → abruption."},teaching:'<h4>Risk Factors for Abruption</h4><table class="comparison-table"><tr><th>Risk Factor</th><th>Notes</th></tr><tr style="background:rgba(251,191,36,0.2);"><td>Hypertensive disorders</td><td>Chronic HTN, preeclampsia - strongest!</td></tr><tr><td>Prior abruption</td><td>Recurrence risk 10-15%</td></tr><tr><td>Cocaine use</td><td>Causes vasospasm</td></tr><tr><td>Smoking</td><td>Dose-dependent risk</td></tr><tr><td>Trauma</td><td>Motor vehicle accident, assault</td></tr><tr><td>PPROM</td><td>Especially with oligohydramnios</td></tr><tr><td>Thrombophilias</td><td>Factor V Leiden, etc.</td></tr></table>',why_chain:[],points:10}},
        {title:"Diagnosis",content:'<div class="narrative"><p>How do you confirm the diagnosis of placental abruption?</p></div>',question:{prompt:"What is the role of ultrasound in diagnosing abruption?",options:[{text:"Ultrasound can definitively rule out abruption",correct:false},{text:"Ultrasound has low sensitivity - abruption is a CLINICAL diagnosis",correct:true},{text:"Ultrasound is 95% sensitive",correct:false},{text:"CT scan is preferred over ultrasound",correct:false}],explanation:{correct:"Correct! Ultrasound sensitivity is only 25-50%. A negative ultrasound does NOT rule out abruption! Diagnosis is clinical: painful bleeding + rigid uterus + fetal distress. US may show retroplacental hematoma.",incorrect:"Ultrasound sensitivity is LOW (25-50%). Abruption is a CLINICAL diagnosis. Negative US doesn\'t rule it out!"},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Diagnosis</div><div class="pathway">CLINICAL DIAGNOSIS:\n• Painful vaginal bleeding\n• Uterine tenderness/rigidity\n• Fetal heart rate abnormalities\n• High-frequency contractions\n\nULTRASOUND:\n• Sensitivity only 25-50%\n• May see retroplacental hematoma\n• Negative US does NOT rule out!\n• Useful to rule out previa\n\nLABS:\n• CBC (may show ↓Hgb)\n• Coagulation (DIC risk)\n• Type and screen\n• Fibrinogen (↓ in severe cases)\n• Kleihauer-Betke (fetomaternal hemorrhage)</div></div>',why_chain:[],points:10}},
        {title:"Complications: DIC",content:'<div class="narrative"><p>Labs show: fibrinogen 95 mg/dL (low), PT/PTT prolonged, platelets 85,000. This suggests DIC.</p></div>',question:{prompt:"Why does severe abruption cause DIC?",options:[{text:"Blood loss alone",correct:false},{text:"Release of tissue factor/thromboplastin from placenta into maternal circulation",correct:true},{text:"Infection",correct:false},{text:"Preeclampsia always accompanies abruption",correct:false}],explanation:{correct:"Correct! Placental separation releases tissue factor (thromboplastin) into maternal circulation → activates coagulation cascade → consumption of clotting factors → DIC. Fibrinogen <200 is concerning.",incorrect:"Tissue factor from placenta → activates coagulation → consumptive coagulopathy (DIC)."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 DIC in Abruption</div><div class="pathway">MECHANISM:\nPlacental separation →\nTissue factor released →\nCoagulation cascade activated →\nFactor consumption → DIC\n\nLAB FINDINGS:\n• ↓ Fibrinogen (<200 = severe)\n• ↓ Platelets\n• ↑ PT/PTT\n• ↑ D-dimer\n• ↑ FDP\n\nMANAGEMENT:\n• Replace blood products\n• FFP for coagulopathy\n• Cryoprecipitate for fibrinogen <100\n• Platelets if <50,000 and bleeding</div></div>',why_chain:[],points:10}},
        {title:"Management",content:'<div class="narrative"><p>This patient is hemodynamically unstable with fetal distress. What is the management?</p></div>',question:{prompt:"What is the management of SEVERE abruption with fetal distress at 34 weeks?",options:[{text:"Expectant management until 37 weeks",correct:false},{text:"Immediate delivery (usually emergent cesarean)",correct:true},{text:"Tocolytics to stop contractions",correct:false},{text:"Betamethasone and wait 48 hours",correct:false}],explanation:{correct:"Correct! Severe abruption with maternal instability or fetal distress = emergent delivery (usually cesarean). Do not delay for steroids. Resuscitate simultaneously. Vaginal delivery possible if imminent.",incorrect:"Severe abruption = emergent delivery. Don\'t delay for steroids. Cesarean unless vaginal delivery is imminent."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Management Algorithm</div><div class="pathway">SEVERE ABRUPTION:\n(Hemodynamic instability, fetal distress)\n→ Emergent delivery (cesarean)\n→ Simultaneous resuscitation\n→ Blood products as needed\n→ Prepare for PPH/DIC\n\nMODERATE ABRUPTION:\n(Stable mother and fetus)\n→ Continuous fetal monitoring\n→ IV access, type and screen\n→ Steroids if <34 weeks\n→ Deliver if worsening\n\nMILD ABRUPTION:\n(Stable, reassuring fetal status)\n→ May observe if preterm\n→ Deliver at 37 weeks\n→ Close monitoring</div></div>',why_chain:[],points:10}},
        {title:"Fetal Complications",content:'<div class="narrative"><p>Abruption is dangerous for both mother and fetus.</p></div>',question:{prompt:"What is the MOST common cause of fetal death in placental abruption?",options:[{text:"Prematurity",correct:false},{text:"Hypoxia from uteroplacental insufficiency",correct:true},{text:"Infection",correct:false},{text:"Congenital anomalies",correct:false}],explanation:{correct:"Correct! Fetal hypoxia from placental separation (uteroplacental insufficiency) is the main cause of fetal death. Abruption accounts for 10-20% of all perinatal deaths. Early delivery is key.",incorrect:"Hypoxia from placental separation causes fetal distress and death. Prompt delivery is critical."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Fetal Complications</div><div class="pathway">HYPOXIA/ASPHYXIA:\n• Placental separation →\n  reduced oxygen delivery\n• Fetal distress (late decels, bradycardia)\n• Fetal death (10-20% of perinatal deaths)\n\nOTHER FETAL COMPLICATIONS:\n• Prematurity (if early delivery)\n• Anemia (fetomaternal hemorrhage)\n• Growth restriction (if chronic)\n• Neurologic injury\n\nKLEIHAUER-BETKE TEST:\n• Detects fetal cells in maternal blood\n• Quantifies fetomaternal hemorrhage\n• Guides RhoGAM dosing in Rh- mothers</div></div>',why_chain:[],points:10}},
        {title:"Case Resolution",content:'<div class="narrative"><p>Given severe abruption with maternal instability and fetal distress, emergent cesarean was performed. The baby had Apgars of 4/7 and required NICU care. Mother received 4 units PRBCs and FFP for DIC. Both recovered well.</p></div><div class="mechanism-box"><div class="mechanism-title">📚 Placental Abruption Summary</div><div class="pathway">PRESENTATION:\nPainful bleeding + rigid uterus + fetal distress\n(20% have concealed hemorrhage)\n\nRISK FACTORS:\nHypertension (#1), cocaine, prior abruption, trauma\n\nDIAGNOSIS:\nClinical! US sensitivity only 25-50%\n\nCOMPLICATIONS:\n• DIC (tissue factor release)\n• Fetal hypoxia/death\n• Hemorrhagic shock\n\nMANAGEMENT:\nSevere = emergent delivery\nMild = may observe if stable and preterm</div></div>',question:{prompt:"A pregnant patient with vaginal bleeding has a soft, non-tender uterus and no pain. What is the most likely diagnosis?",options:[{text:"Placental abruption",correct:false},{text:"Placenta previa",correct:true},{text:"Uterine rupture",correct:false},{text:"Vasa previa",correct:false}],explanation:{correct:"Correct! Painless bleeding + soft non-tender uterus = placenta previa. Abruption is painful with rigid uterus. Do NOT perform digital exam until previa is ruled out by ultrasound!",incorrect:"Painless bleeding + soft uterus = previa. Painful + rigid = abruption."},teaching:'<h4>Key Takeaways</h4><ul style="line-height:2;margin-left:20px;"><li>Painful bleeding + rigid uterus = abruption</li><li>Painless bleeding + soft uterus = previa</li><li>20% of abruptions have concealed hemorrhage</li><li>Hypertension is the #1 risk factor</li><li>Ultrasound cannot rule out abruption</li><li>Severe abruption = emergent delivery</li><li>Watch for DIC</li></ul>',why_chain:[],points:10}},
        {title:"Clinical Integration",content:'<div class="narrative"><p>You synthesize all the clinical information to ensure optimal patient care.</p></div>',question:{prompt:"What principle is MOST important for excellent clinical outcomes?",options:[{text:"Integrating clinical presentation with evidence-based guidelines while reassessing response to treatment",correct:true},{text:"Following protocols exactly without clinical judgment",correct:false},{text:"Ordering comprehensive testing to avoid any missed diagnoses",correct:false},{text:"Making a diagnosis quickly and committing to it without reconsideration",correct:false}],explanation:{correct:"Excellent clinical care combines systematic assessment, evidence-based treatment, and ongoing reassessment. Guidelines inform but don't replace clinical reasoning.",incorrect:"Good clinical care requires flexibility, reassessment, and integration of guidelines with patient-specific factors."},teaching:'<h4>Clinical Reasoning</h4><ul><li>Systematic data gathering</li><li>Evidence-based management</li><li>Regular reassessment</li><li>Patient-centered communication</li></ul>',why_chain:[],points:10}}
    ];
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:#4ade80;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><p>You mastered Placental Abruption!</p></div>';}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}

</script>

<!-- Visual Debrief Overlay -->
<div class="debrief-overlay" id="debriefOverlay" onclick="if(event.target===this)closeDebrief()">
    <div class="debrief-content" id="debriefContent"></div>
</div>
