<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fainting Spell | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#6366F1;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#4F46E5,#6366F1);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(99,102,241,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(99,102,241,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(99,102,241,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">💫 The Fainting Spell</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'22F',wt:'58kg',hx:'Passed out during blood draw, prodrome of warmth/nausea',exam:'Now alert, normal vitals, no injury',vitals:{HR:'68',BP:'112/72'},labs:{ECG:'Normal sinus',Hgb:'12.8'}},int:{age:'72M',wt:'78kg',hx:'Syncope while walking, no prodrome, brief LOC',exam:'Systolic murmur radiating to carotids',vitals:{HR:'62',BP:'138/82'},labs:{ECG:'LVH',BNP:'420'}},adv:{age:'45M',wt:'85kg',hx:'Syncope during exercise, family hx sudden death age 35',exam:'Normal exam at rest',vitals:{HR:'72',BP:'128/78'},labs:{ECG:'Deep T inversions V1-V4'}}};
const Q=[
{t:'Syncope Definition',q:'True syncope requires?',h:'Key features',o:[{id:'a',txt:'Transient LOC with rapid onset, brief duration, spontaneous complete recovery',c:1,p:100},{id:'b',txt:'Any fall',c:0,p:10},{id:'c',txt:'Prolonged unconsciousness',c:0,p:10}],fb:{1:'<b>Correct!</b> Syncope = transient LOC from global cerebral hypoperfusion. Rapid onset, short duration (<1min), spontaneous recovery.',0:'<b>Definition:</b> Transient LOC, rapid onset, brief, spontaneous recovery.'}},
{t:'Risk Stratification',q:'Which syncope feature suggests HIGH risk for adverse outcome?',h:'San Francisco Syncope Rule components',o:[{id:'a',txt:'Syncope during exertion, abnormal ECG, no prodrome, structural heart disease',c:1,p:100},{id:'b',txt:'Prodrome of warmth and nausea',c:0,p:10},{id:'c',txt:'Occurs while standing for long time',c:0,p:20}],fb:{1:'<b>Correct!</b> High risk: Exertional, no prodrome, abnormal ECG, heart disease, family hx sudden death. Low risk: situational triggers, prodrome.',0:'<b>High risk:</b> Exertional, cardiac hx, abnormal ECG, no warning.'}},
{t:'Vasovagal Diagnosis',q:'Classic vasovagal syncope features?',h:'Most common type',o:[{id:'a',txt:'Prodrome (warmth, nausea, diaphoresis), trigger (standing, pain, emotion), rapid recovery',c:1,p:100},{id:'b',txt:'No warning, during exertion',c:0,p:10},{id:'c',txt:'Prolonged confusion after',c:0,p:10}],fb:{1:'<b>Correct!</b> Vasovagal: Clear trigger + prodrome + quick recovery. Most common cause (40%). Benign prognosis.',0:'<b>Vasovagal:</b> Trigger + prodrome + rapid recovery. Most common, benign.'}},
{t:'Cardiac Causes',q:'Exertional syncope with systolic murmur. Top concern?',h:'Structural heart disease',o:[{id:'a',txt:'Aortic stenosis (or HCM if young)',c:1,p:100},{id:'b',txt:'Vasovagal',c:0,p:10},{id:'c',txt:'Orthostatic hypotension',c:0,p:20}],fb:{1:'<b>Correct!</b> Exertional syncope + murmur = aortic stenosis until proven otherwise. In young patients, consider HCM. Both high mortality risk.',0:'<b>Exertional + murmur:</b> Aortic stenosis or HCM. High risk - needs echo.'}},
{t:'ECG Findings',q:'ECG findings suggesting high-risk arrhythmic cause?',h:'Look for these',o:[{id:'a',txt:'Long QT, Brugada pattern, WPW, deep T inversions (HCM), epsilon wave (ARVC)',c:1,p:100},{id:'b',txt:'Normal sinus rhythm only',c:0,p:20},{id:'c',txt:'Sinus bradycardia',c:0,p:30}],fb:{1:'<b>Correct!</b> High-risk ECG: Long QT (>470ms), Brugada (coved ST V1-2), WPW (delta wave), HCM (deep TWI), ARVC (epsilon wave).',0:'<b>Dangerous ECG:</b> Long QT, Brugada, WPW, HCM pattern, ARVC.'}},
{t:'Workup',q:'Minimum workup for all syncope patients?',h:'Essential tests',o:[{id:'a',txt:'ECG and orthostatic vitals (consider echo if cardiac suspicion)',c:1,p:100},{id:'b',txt:'CT head for all',c:0,p:20},{id:'c',txt:'EEG for all',c:0,p:10}],fb:{1:'<b>Correct!</b> All syncope: ECG + orthostatics + history. Echo if structural heart suspected. Holter/loop if arrhythmia suspected. Head CT rarely indicated.',0:'<b>Essential:</b> ECG + orthostatics for all. Echo if cardiac concern.'}},
{t:'Orthostatic Hypotension',q:'Orthostatic hypotension definition?',h:'BP change on standing',o:[{id:'a',txt:'SBP drop >=20 or DBP drop >=10 within 3 min of standing',c:1,p:100},{id:'b',txt:'Any BP drop',c:0,p:30},{id:'c',txt:'HR increase only',c:0,p:20}],fb:{1:'<b>Correct!</b> OH: SBP drop >=20, DBP drop >=10, or symptoms within 3 min standing. Causes: dehydration, meds, autonomic dysfunction.',0:'<b>OH:</b> SBP drop >=20 or DBP >=10 within 3 min standing.'}},
{t:'Disposition',q:'Young patient, typical vasovagal features, normal ECG. Disposition?',h:'Risk stratification guides management',o:[{id:'a',txt:'Safe for discharge with return precautions',c:1,p:100},{id:'b',txt:'Admit for telemetry',c:0,p:20},{id:'c',txt:'Emergent cardiology consult',c:0,p:10}],fb:{1:'<b>Correct!</b> Low-risk (vasovagal features, normal ECG, young, no cardiac hx) = safe discharge. High-risk features = admission for monitoring.',0:'<b>Low risk:</b> Discharge with precautions. High risk: admit for monitoring.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>💫 The Fainting Spell</h1><p style="color:var(--muted);margin-bottom:32px">Syncope: Risk stratification, vasovagal, cardiac causes, ECG red flags</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🏥 Syncope Evaluation</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Syncope Pearls</div><div class="pearl-item"><b>Definition:</b> Transient LOC, rapid onset, spontaneous recovery</div><div class="pearl-item"><b>High risk:</b> Exertional, no prodrome, abnormal ECG</div><div class="pearl-item"><b>Vasovagal:</b> Trigger + prodrome = benign</div><div class="pearl-item"><b>ECG red flags:</b> Long QT, Brugada, WPW, HCM, ARVC</div><div class="pearl-item"><b>Workup:</b> ECG + orthostatics for all</div></div><div class="cross-link"><a href="../mechanism/syncope-arrhythmia-module.html">MechanismDx: Syncope</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
