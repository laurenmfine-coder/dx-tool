<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fainting Spell | ReasonDx Adventure</title>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --border: #334155; --text: #F1F5F9; --muted: #94A3B8; --accent: #8B5CF6; --success: #10B981; --warning: #F59E0B; --danger: #DC2626; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
        .header { background: linear-gradient(135deg, #7C3AED 0%, #8B5CF6 100%); padding: 12px 20px; position: sticky; top: 0; z-index: 100; }
        .header-row { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .header-title { font-size: 1.1rem; font-weight: 600; }
        .stat { background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 8px; }
        .stat-value { font-size: 1.1rem; font-weight: 700; font-family: monospace; }
        .stat-label { font-size: 0.6rem; opacity: 0.8; text-transform: uppercase; }
        .main { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; }
        .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .card-phase { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
        .card-title { font-size: 1.5rem; font-weight: 700; }
        .card-body { padding: 24px; }
        .narrative { background: linear-gradient(135deg, rgba(139,92,246,0.1), rgba(124,58,237,0.1)); border-left: 4px solid var(--accent); padding: 20px 24px; border-radius: 0 12px 12px 0; margin-bottom: 24px; line-height: 1.8; }
        .narrative .hl { background: rgba(139,92,246,0.3); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .setup-screen { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; }
        .setup-screen h1 { font-size: 2rem; margin-bottom: 8px; }
        .setup-screen .subtitle { color: var(--muted); margin-bottom: 32px; }
        .start-btn { background: var(--accent); color: white; border: none; padding: 16px 48px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .question-section { margin-bottom: 32px; }
        .question-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .question-number { background: var(--accent); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .question-text { font-size: 1.1rem; font-weight: 600; }
        .radio-options { display: flex; flex-direction: column; gap: 10px; }
        .radio-option { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .radio-option:hover { border-color: var(--accent); }
        .radio-option.selected { border-color: var(--accent); background: rgba(139,92,246,0.15); }
        .radio-option.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .radio-option.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .radio-circle { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; }
        .radio-option.selected .radio-circle { border-color: var(--accent); background: radial-gradient(circle, var(--accent) 40%, transparent 40%); }
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .checkbox-item:hover { border-color: var(--accent); }
        .checkbox-item.selected { border-color: var(--accent); background: rgba(139,92,246,0.15); }
        .checkbox-item.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .checkbox-item.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .checkbox-box { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .checkbox-item.selected .checkbox-box { background: var(--accent); border-color: var(--accent); }
        .checkbox-item.selected .checkbox-box::after { content: '✓'; color: white; font-weight: bold; }
        .feedback { padding: 20px; border-radius: 12px; margin: 20px 0; }
        .feedback.excellent { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); }
        .feedback.acceptable { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); }
        .feedback-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .feedback-icon { font-size: 1.5rem; }
        .feedback-title { font-weight: 700; }
        .feedback-text { color: var(--muted); line-height: 1.7; }
        .feedback-text strong { color: var(--text); }
        .alert { padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; }
        .alert.info { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3); }
        .alert.danger { background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.3); }
        .alert-icon { font-size: 1.5rem; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: 600; margin-bottom: 4px; }
        .alert-desc { font-size: 0.9rem; color: var(--muted); }
        .btn { padding: 14px 28px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-row { display: flex; gap: 12px; margin-top: 24px; }
        .lab-panel { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .lab-panel-title { font-weight: 600; margin-bottom: 16px; color: var(--accent); }
        .lab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .lab-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; }
        .lab-name { font-size: 0.8rem; color: var(--muted); }
        .lab-value { font-size: 1.1rem; font-weight: 700; }
        .lab-value.critical { color: var(--danger); }
        .lab-value.high { color: var(--warning); }
        .lab-range { font-size: 0.7rem; color: var(--muted); }
        .outcome { text-align: center; padding: 40px 20px; }
        .outcome-icon { font-size: 4rem; margin-bottom: 16px; }
        .outcome-title { font-size: 2rem; font-weight: 700; color: var(--success); margin-bottom: 8px; }
        .outcome-desc { color: var(--muted); max-width: 600px; margin: 0 auto 24px; }
        .score-summary { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 24px; margin: 24px auto; max-width: 500px; }
        .score-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .score-row:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <header class="header"><div class="header-row"><div class="header-title">😵 The Fainting Spell</div><div class="stat"><div class="stat-value" id="scoreDisplay">0</div><div class="stat-label">Points</div></div></div></header>
    <main class="main"><div id="stageContainer"></div></main>
    <script>
    const state = { stage:'setup', score:0 };
    
    function addScore(pts) { state.score += pts; document.getElementById('scoreDisplay').textContent = state.score; }

    const stages = {
        setup: { render: () => `
            <div class="setup-screen">
                <h1>😵 The Fainting Spell</h1>
                <p class="subtitle">Syncope evaluation and risk stratification</p>
                <button class="start-btn" onclick="goTo('presentation')">Begin Case →</button>
            </div>`
        },
        presentation: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Emergency Department</div><div class="card-title">📋 Sudden Loss of Consciousness</div></div>
                <div class="card-body">
                    <div class="narrative">A <span class="hl">68-year-old male</span> with <span class="hl">hypertension</span> and <span class="hl">prior MI 5 years ago</span> (EF 35%) presents after a <span class="hl">witnessed syncopal episode</span> while sitting in church. His wife reports he <span class="hl">suddenly slumped over</span> without warning and was <span class="hl">unresponsive for ~30 seconds</span>.<br><br>He had <span class="hl">brief jerking movements</span>. No tongue biting or incontinence. He was <span class="hl">confused for 1-2 minutes</span> after, then fully recovered. On exam: Normal neuro exam, <span class="hl">irregular pulse</span>.<br><br>Vitals: HR 72, BP 128/78, orthostatics negative.</div>
                    <div class="lab-panel">
                        <div class="lab-panel-title">Initial Workup</div>
                        <div class="lab-grid">
                            <div class="lab-item"><div class="lab-name">ECG</div><div class="lab-value high">LBBB, PVCs</div><div class="lab-range">-</div></div>
                            <div class="lab-item"><div class="lab-name">Troponin</div><div class="lab-value">0.03 ng/mL</div><div class="lab-range">&lt;0.04</div></div>
                            <div class="lab-item"><div class="lab-name">Glucose</div><div class="lab-value">98 mg/dL</div><div class="lab-range">70-100</div></div>
                            <div class="lab-item"><div class="lab-name">Hgb</div><div class="lab-value">13.2 g/dL</div><div class="lab-range">13.5-17.5</div></div>
                            <div class="lab-item"><div class="lab-name">BMP</div><div class="lab-value">Normal</div><div class="lab-range">-</div></div>
                            <div class="lab-item"><div class="lab-name">Prior EF</div><div class="lab-value critical">35%</div><div class="lab-range">&gt;55%</div></div>
                        </div>
                    </div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="goTo('definition')">Define Syncope →</button></div>
                </div>
            </div>`
        },
        definition: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Definition</div><div class="card-title">📚 True Syncope vs Mimics</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">1</div><div class="question-text">True syncope is defined as transient loss of consciousness due to:</div></div>
                        <div class="radio-options" id="defOpts">
                            <div class="radio-option" data-id="cerebral" onclick="selectDef('cerebral')"><div class="radio-circle"></div><div><strong>Global cerebral hypoperfusion</strong><br><small style="color:var(--muted)">Transient decrease in blood flow to brain</small></div></div>
                            <div class="radio-option" data-id="seizure" onclick="selectDef('seizure')"><div class="radio-circle"></div><div><strong>Seizure activity</strong><br><small style="color:var(--muted)">Abnormal electrical activity</small></div></div>
                            <div class="radio-option" data-id="metabolic" onclick="selectDef('metabolic')"><div class="radio-circle"></div><div><strong>Metabolic derangement</strong><br><small style="color:var(--muted)">Hypoglycemia, electrolytes</small></div></div>
                            <div class="radio-option" data-id="any" onclick="selectDef('any')"><div class="radio-circle"></div><div><strong>Any cause of unconsciousness</strong><br><small style="color:var(--muted)">All LOC is syncope</small></div></div>
                        </div>
                    </div>
                    <div id="defFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="defSubmit" onclick="submitDef()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        etiology: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Etiology</div><div class="card-title">🔍 Syncope Categories</div></div>
                <div class="card-body">
                    <div class="alert info"><span class="alert-icon">📋</span><div class="alert-content"><div class="alert-title">The Big Three</div><div class="alert-desc">Reflex (vasovagal) | Orthostatic | Cardiac (arrhythmia or structural)</div></div></div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">2</div><div class="question-text">Given sudden onset while sitting, no prodrome, history of MI with EF 35%, and ECG showing LBBB with PVCs, what is the most likely etiology?</div></div>
                        <div class="radio-options" id="etioOpts">
                            <div class="radio-option" data-id="vasovagal" onclick="selectEtio('vasovagal')"><div class="radio-circle"></div><span>Vasovagal (reflex) syncope</span></div>
                            <div class="radio-option" data-id="orthostatic" onclick="selectEtio('orthostatic')"><div class="radio-circle"></div><span>Orthostatic hypotension</span></div>
                            <div class="radio-option" data-id="cardiac" onclick="selectEtio('cardiac')"><div class="radio-circle"></div><span>Cardiac syncope (likely arrhythmia)</span></div>
                            <div class="radio-option" data-id="seizure" onclick="selectEtio('seizure')"><div class="radio-circle"></div><span>Seizure (not syncope)</span></div>
                        </div>
                    </div>
                    <div id="etioFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="etioSubmit" onclick="submitEtio()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        redflags: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Risk Stratification</div><div class="card-title">🚨 High-Risk Features</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">3</div><div class="question-text">Which features suggest HIGH-RISK (cardiac) syncope?</div></div>
                        <div class="checkbox-grid" id="redOpts">
                            <div class="checkbox-item" data-id="structural" data-correct="true" onclick="toggleRed('structural')"><div class="checkbox-box"></div><span>Known structural heart disease</span></div>
                            <div class="checkbox-item" data-id="lowef" data-correct="true" onclick="toggleRed('lowef')"><div class="checkbox-box"></div><span>Low ejection fraction</span></div>
                            <div class="checkbox-item" data-id="exertion" data-correct="true" onclick="toggleRed('exertion')"><div class="checkbox-box"></div><span>Syncope during exertion</span></div>
                            <div class="checkbox-item" data-id="noprodrome" data-correct="true" onclick="toggleRed('noprodrome')"><div class="checkbox-box"></div><span>No prodrome (sudden)</span></div>
                            <div class="checkbox-item" data-id="abnecg" data-correct="true" onclick="toggleRed('abnecg')"><div class="checkbox-box"></div><span>Abnormal ECG</span></div>
                            <div class="checkbox-item" data-id="prodrome" data-correct="false" onclick="toggleRed('prodrome')"><div class="checkbox-box"></div><span>Prodrome with nausea/warmth</span></div>
                            <div class="checkbox-item" data-id="standing" data-correct="false" onclick="toggleRed('standing')"><div class="checkbox-box"></div><span>Triggered by prolonged standing</span></div>
                        </div>
                    </div>
                    <div id="redFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="submitRed()">Submit →</button></div>
                </div>
            </div>`
        },
        workup: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Workup</div><div class="card-title">🔬 Next Steps</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">4</div><div class="question-text">What is the most important next test for this high-risk patient with suspected cardiac syncope?</div></div>
                        <div class="radio-options" id="testOpts">
                            <div class="radio-option" data-id="echo" onclick="selectTest('echo')"><div class="radio-circle"></div><div><strong>Echocardiogram + Cardiac monitoring</strong><br><small style="color:var(--muted)">Assess structure and capture arrhythmia</small></div></div>
                            <div class="radio-option" data-id="tilt" onclick="selectTest('tilt')"><div class="radio-circle"></div><div><strong>Tilt table test</strong><br><small style="color:var(--muted)">For vasovagal syncope</small></div></div>
                            <div class="radio-option" data-id="eeg" onclick="selectTest('eeg')"><div class="radio-circle"></div><div><strong>EEG</strong><br><small style="color:var(--muted)">Rule out seizure</small></div></div>
                            <div class="radio-option" data-id="cta" onclick="selectTest('cta')"><div class="radio-circle"></div><div><strong>CT angiography</strong><br><small style="color:var(--muted)">Look for PE</small></div></div>
                        </div>
                    </div>
                    <div id="testFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="testSubmit" onclick="submitTest()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        disposition: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Disposition</div><div class="card-title">🏥 Admit or Discharge?</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">5</div><div class="question-text">What is the appropriate disposition for this patient?</div></div>
                        <div class="radio-options" id="dispOpts">
                            <div class="radio-option" data-id="admit" onclick="selectDisp('admit')"><div class="radio-circle"></div><div><strong>Admit for cardiac monitoring</strong><br><small style="color:var(--muted)">High-risk features require inpatient workup</small></div></div>
                            <div class="radio-option" data-id="discharge" onclick="selectDisp('discharge')"><div class="radio-circle"></div><div><strong>Discharge with outpatient follow-up</strong><br><small style="color:var(--muted)">ECG was done, can follow up</small></div></div>
                            <div class="radio-option" data-id="obs" onclick="selectDisp('obs')"><div class="radio-circle"></div><div><strong>6-hour observation then discharge</strong><br><small style="color:var(--muted)">Brief monitoring sufficient</small></div></div>
                        </div>
                    </div>
                    <div id="dispFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="dispSubmit" onclick="submitDisp()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        outcome: { render: () => `
            <div class="card"><div class="card-body">
                <div class="outcome">
                    <div class="outcome-icon">🎉</div>
                    <div class="outcome-title">Diagnosis Made!</div>
                    <div class="outcome-desc">Patient was admitted to telemetry. Cardiac monitoring captured an episode of non-sustained ventricular tachycardia. Given his low EF (35%) and VT, he was referred for ICD placement for secondary prevention of sudden cardiac death. Discharged on day 3 with ICD and cardiology follow-up.</div>
                </div>
                <div class="score-summary">
                    <h3 style="margin-bottom:16px">Performance</h3>
                    <div class="score-row"><span>Syncope Definition</span><span>${state.defScore||0}/100</span></div>
                    <div class="score-row"><span>Etiology</span><span>${state.etioScore||0}/100</span></div>
                    <div class="score-row"><span>High-Risk Features</span><span>${state.redScore||0}/100</span></div>
                    <div class="score-row"><span>Testing</span><span>${state.testScore||0}/100</span></div>
                    <div class="score-row"><span>Disposition</span><span>${state.dispScore||0}/100</span></div>
                    <div class="score-row" style="border-top:2px solid var(--border);padding-top:12px"><strong>Total</strong><strong>${state.score}</strong></div>
                </div>
                <div class="feedback excellent"><div class="feedback-header"><span class="feedback-icon">💡</span><span class="feedback-title">Syncope Pearls</span></div><div class="feedback-text">
                    • <strong>Definition:</strong> Transient LOC due to global cerebral hypoperfusion (NOT seizure, hypoglycemia, etc.)<br>
                    • <strong>Big three:</strong> Reflex (vasovagal) ~50%, Orthostatic ~15%, Cardiac ~15%, Unknown ~20%<br>
                    • <strong>Cardiac red flags:</strong> Structural heart disease, low EF, abnormal ECG, exertional, no prodrome, palpitations before<br>
                    • <strong>Convulsive syncope:</strong> Brief jerking is common in syncope (hypoxia to brain) - doesn't mean seizure<br>
                    • <strong>ECG is mandatory:</strong> For ALL syncope patients in ED - can identify arrhythmia, ischemia, WPW, long QT, Brugada<br>
                    • <strong>Admit if:</strong> High-risk features, suspected cardiac, serious injury, unexplained with heart disease<br>
                    • <strong>Tilt table:</strong> For suspected vasovagal when diagnosis unclear, NOT for suspected cardiac
                </div></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="location.reload()">Play Again</button></div>
            </div></div>`
        }
    };

    let selectedDef = null;
    function selectDef(id) { selectedDef = id; document.querySelectorAll('#defOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('defSubmit').disabled = false; }
    function submitDef() {
        document.querySelectorAll('#defOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'cerebral') o.classList.add('correct');
            else if (o.dataset.id === selectedDef) o.classList.add('incorrect');
        });
        state.defScore = selectedDef === 'cerebral' ? 100 : 40;
        addScore(selectedDef === 'cerebral' ? 40 : 15);
        document.getElementById('defFeedback').innerHTML = `<div class="feedback ${selectedDef==='cerebral'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedDef==='cerebral'?'✅':'📚'}</span><span class="feedback-title">${selectedDef==='cerebral'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>True syncope = global cerebral hypoperfusion.</strong> Seizure, hypoglycemia, stroke, intoxication cause LOC but are NOT syncope. This distinction matters for workup and management!</div></div>`;
        document.getElementById('defSubmit').textContent = 'Continue →';
        document.getElementById('defSubmit').onclick = () => goTo('etiology');
    }

    let selectedEtio = null;
    function selectEtio(id) { selectedEtio = id; document.querySelectorAll('#etioOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('etioSubmit').disabled = false; }
    function submitEtio() {
        document.querySelectorAll('#etioOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'cardiac') o.classList.add('correct');
            else if (o.dataset.id === selectedEtio) o.classList.add('incorrect');
        });
        state.etioScore = selectedEtio === 'cardiac' ? 100 : 40;
        addScore(selectedEtio === 'cardiac' ? 40 : 15);
        document.getElementById('etioFeedback').innerHTML = `<div class="feedback ${selectedEtio==='cardiac'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedEtio==='cardiac'?'✅':'📚'}</span><span class="feedback-title">${selectedEtio==='cardiac'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>Cardiac syncope:</strong> Sudden onset without prodrome + structural heart disease (prior MI, low EF) + abnormal ECG (LBBB, PVCs) = high suspicion for ventricular arrhythmia. Brief jerking is "convulsive syncope," not seizure.</div></div>`;
        document.getElementById('etioSubmit').textContent = 'Continue →';
        document.getElementById('etioSubmit').onclick = () => goTo('redflags');
    }

    let selectedRed = new Set();
    function toggleRed(id) {
        const el = document.querySelector(`#redOpts .checkbox-item[data-id="${id}"]`);
        if(selectedRed.has(id)) { selectedRed.delete(id); el.classList.remove('selected'); }
        else { selectedRed.add(id); el.classList.add('selected'); }
    }
    function submitRed() {
        let correct = 0;
        const items = [{id:'structural',c:true},{id:'lowef',c:true},{id:'exertion',c:true},{id:'noprodrome',c:true},{id:'abnecg',c:true},{id:'prodrome',c:false},{id:'standing',c:false}];
        items.forEach(i => {
            const el = document.querySelector(`#redOpts .checkbox-item[data-id="${i.id}"]`);
            const sel = selectedRed.has(i.id);
            if (i.c && sel) { el.classList.add('correct'); correct++; }
            else if (!i.c && sel) { el.classList.add('incorrect'); }
        });
        state.redScore = Math.round(correct / 5 * 100);
        addScore(Math.round(state.redScore / 2.5));
        document.getElementById('redFeedback').innerHTML = `<div class="feedback ${state.redScore>=75?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${state.redScore>=75?'✅':'📚'}</span><span class="feedback-title">High-Risk Features</span></div><div class="feedback-text"><strong>Cardiac red flags:</strong> Known heart disease, low EF, exertional, sudden/no prodrome, abnormal ECG, palpitations, family hx sudden death<br><strong>LOW risk (vasovagal):</strong> Prodrome (nausea/warmth), triggered by standing/stress/pain</div></div>`;
        document.querySelector('#redFeedback').closest('.card-body').querySelector('.btn-row').innerHTML = `<button class="btn btn-primary" onclick="goTo('workup')">Plan Workup →</button>`;
    }

    let selectedTest = null;
    function selectTest(id) { selectedTest = id; document.querySelectorAll('#testOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('testSubmit').disabled = false; }
    function submitTest() {
        document.querySelectorAll('#testOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'echo') o.classList.add('correct');
            else if (o.dataset.id === selectedTest) o.classList.add('incorrect');
        });
        state.testScore = selectedTest === 'echo' ? 100 : 40;
        addScore(selectedTest === 'echo' ? 40 : 15);
        document.getElementById('testFeedback').innerHTML = `<div class="feedback ${selectedTest==='echo'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedTest==='echo'?'✅':'📚'}</span><span class="feedback-title">${selectedTest==='echo'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>Echo + Cardiac monitoring:</strong> Echo confirms structural disease and EF. Continuous monitoring (telemetry, Holter, loop recorder) to capture arrhythmia. Tilt table is for vasovagal. EEG only if true seizure suspected.</div></div>`;
        document.getElementById('testSubmit').textContent = 'Continue →';
        document.getElementById('testSubmit').onclick = () => goTo('disposition');
    }

    let selectedDisp = null;
    function selectDisp(id) { selectedDisp = id; document.querySelectorAll('#dispOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('dispSubmit').disabled = false; }
    function submitDisp() {
        document.querySelectorAll('#dispOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'admit') o.classList.add('correct');
            else if (o.dataset.id === selectedDisp) o.classList.add('incorrect');
        });
        state.dispScore = selectedDisp === 'admit' ? 100 : 30;
        addScore(selectedDisp === 'admit' ? 40 : 10);
        document.getElementById('dispFeedback').innerHTML = `<div class="feedback ${selectedDisp==='admit'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedDisp==='admit'?'✅':'📚'}</span><span class="feedback-title">${selectedDisp==='admit'?'Correct!':'Critical Point'}</span></div><div class="feedback-text"><strong>ADMIT:</strong> Multiple high-risk features (structural heart disease, low EF, abnormal ECG, sudden onset). Risk of fatal arrhythmia. Needs inpatient telemetry monitoring and expedited workup. Discharge would be dangerous!</div></div>`;
        document.getElementById('dispSubmit').textContent = 'Complete →';
        document.getElementById('dispSubmit').onclick = () => goTo('outcome');
    }

    function goTo(id) { state.stage = id; document.getElementById('stageContainer').innerHTML = stages[id].render(); window.scrollTo(0,0); }
    document.addEventListener('DOMContentLoaded', () => goTo('setup'));
    </script>
</body>
</html>
