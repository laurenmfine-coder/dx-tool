<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DKA Complete | Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #7c2d12 0%, #c2410c 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(124, 45, 18, 0.9); border-radius: 16px; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; background: #ea580c; margin-left: 10px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ea580c, #fdba74); border-radius: 3px; }
        .scene { background: linear-gradient(135deg, #7c2d12, #9a3412); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .scene-header { background: rgba(234, 88, 12, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #fdba74; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .safe { color: #4ade80; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(234, 88, 12, 0.2)); border: 1px solid rgba(139, 92, 246, 0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251, 191, 36, 0.15); border: 1px solid rgba(251, 191, 36, 0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #ea580c, #c2410c); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #fdba74; }
        .why-chain { background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(234, 88, 12, 0.15)); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 16px; padding: 24px; margin: 24px 0; }
        .why-chain-title { font-size: 1.2rem; font-weight: 700; color: #c4b5fd; margin-bottom: 20px; }
        .why-item { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
        .why-q { font-weight: 600; color: #e9d5ff; margin-bottom: 10px; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); }
        .pitfall { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival', 'diagnosis', 'pathophys', 'fluid_resus', 'potassium', 'insulin', 'anion_gap', 'bicarb', 'cerebral_edema', 'transition', 'hhs', 'precipitants', 'prevention', 'debrief'];
    const state = { stage: 0 };

    function render() {
        const progress = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">🍬 DKA Complete<span class="badge">14 STAGES</span></div><div style="font-size:1.3rem;font-weight:700">${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>`;
        switch(STAGES[state.stage]) {
            case 'arrival': c += renderArrival(); break;
            case 'diagnosis': c += renderDiagnosis(); break;
            case 'pathophys': c += renderPathophys(); break;
            case 'fluid_resus': c += renderFluids(); break;
            case 'potassium': c += renderPotassium(); break;
            case 'insulin': c += renderInsulin(); break;
            case 'anion_gap': c += renderAnionGap(); break;
            case 'bicarb': c += renderBicarb(); break;
            case 'cerebral_edema': c += renderCerebralEdema(); break;
            case 'transition': c += renderTransition(); break;
            case 'hhs': c += renderHHS(); break;
            case 'precipitants': c += renderPrecipitants(); break;
            case 'prevention': c += renderPrevention(); break;
            case 'debrief': c += renderDebrief(); break;
        }
        document.getElementById('app').innerHTML = c;
    }

    function renderArrival() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 14</div><div class="scene-title">The Dehydrated Diabetic</div></div><div class="scene-body">
            <div class="narrative"><p>A <span class="highlight">24-year-old woman</span> with Type 1 DM presents with <span class="critical">nausea, vomiting, abdominal pain, and confusion</span> for 2 days. She ran out of insulin last week.</p>
            <p style="margin-top:12px;"><strong>Vitals:</strong> HR 124, BP 92/58, RR 28 (deep), T 99.1°F<br><strong>Exam:</strong> Dry mucous membranes, fruity breath, diffuse abdominal tenderness, lethargic<br><strong>Labs:</strong> Glucose 486, pH 7.18, HCO3 8, K 5.8, Na 131, BUN 38, Cr 1.9</p></div>
            <div class="alert-box"><div class="alert-title">🚨 DKA Triad</div><p>Hyperglycemia + Ketosis + Acidosis = DKA. This is a medical emergency requiring immediate treatment.</p></div>
            <div class="mechanism-box"><div class="mechanism-title">🧬 DKA Overview</div><div class="pathway">Insulin deficiency + counter-regulatory hormones<br>→ Hyperglycemia (no glucose uptake)<br>→ Lipolysis → free fatty acids → ketones<br>→ Metabolic acidosis<br>→ Osmotic diuresis → dehydration<br>→ Electrolyte depletion</div></div>
            <button class="btn" onclick="nextStage()">Diagnostic Criteria →</button></div></div>`;
    }

    function renderDiagnosis() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 14</div><div class="scene-title">Making the Diagnosis</div></div><div class="scene-body">
            <div class="boards-tip"><div class="boards-tip-title">📚 DKA Diagnostic Criteria</div>
            <table class="comparison-table">
                <tr><th>Parameter</th><th>Mild</th><th>Moderate</th><th>Severe</th></tr>
                <tr><td>Glucose</td><td colspan="3">>250 mg/dL (usually)</td></tr>
                <tr><td>pH</td><td>7.25-7.30</td><td>7.00-7.24</td><td><7.00</td></tr>
                <tr><td>HCO3</td><td>15-18</td><td>10-15</td><td><10</td></tr>
                <tr><td>Anion gap</td><td colspan="3">>12 (elevated)</td></tr>
                <tr><td>Ketones</td><td colspan="3">Positive (serum or urine)</td></tr>
                <tr><td>Mental status</td><td>Alert</td><td>Drowsy</td><td>Stupor/coma</td></tr>
            </table></div>
            <div class="mechanism-box"><div class="mechanism-title">🧬 Euglycemic DKA</div><div class="pathway">DKA with glucose <250 mg/dL<br><br>Causes:<br>• SGLT2 inhibitors (empagliflozin, dapagliflozin)<br>• Pregnancy<br>• Partial treatment<br>• Poor oral intake<br><br>⚠️ Don't rule out DKA just because glucose isn't sky-high!</div></div>
            <div class="narrative"><p><strong>This patient:</strong> pH 7.18, HCO3 8, glucose 486 = <span class="critical">Moderate-Severe DKA</span></p></div>
            <button class="btn" onclick="nextStage()">Pathophysiology Deep Dive →</button></div></div>`;
    }

    function renderPathophys() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 14</div><div class="scene-title">The Metabolic Cascade</div></div><div class="scene-body">
            <div class="mechanism-box"><div class="mechanism-title">🧬 Complete DKA Pathophysiology</div><div class="pathway"><strong>INSULIN DEFICIENCY:</strong><br>→ Glucose can't enter cells<br>→ Hyperglycemia (liver gluconeogenesis ↑)<br>→ Osmotic diuresis (glucose in urine)<br>→ Volume depletion + electrolyte loss<br><br><strong>COUNTER-REGULATORY EXCESS:</strong><br>Glucagon, cortisol, catecholamines, GH all ↑<br>→ Lipolysis in adipose tissue<br>→ Free fatty acids to liver<br>→ Beta-oxidation → Acetyl-CoA<br>→ Ketogenesis: acetoacetate, β-hydroxybutyrate<br>→ Metabolic acidosis (ketoacids)</div></div>
            <div class="why-chain"><div class="why-chain-title">🔗 WHY Chain: Symptoms</div>
                <div class="why-item"><div class="why-q">Why Kussmaul respirations?</div>Metabolic acidosis → respiratory compensation → deep, rapid breathing to blow off CO2.</div>
                <div class="why-item"><div class="why-q">Why fruity breath?</div>Acetone (ketone) is volatile and exhaled through lungs, producing characteristic odor.</div>
                <div class="why-item"><div class="why-q">Why abdominal pain?</div>Unclear mechanism - possibly gastroparesis, mesenteric ischemia from dehydration, or direct effect of ketones. Resolves with treatment.</div>
                <div class="why-item"><div class="why-q">Why altered mental status?</div>Hyperosmolality → brain cell dehydration. Acidosis also impairs neuronal function.</div>
            </div>
            <button class="btn" onclick="nextStage()">Fluid Resuscitation →</button></div></div>`;
    }

    function renderFluids() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 14</div><div class="scene-title">Fluid Resuscitation</div></div><div class="scene-body">
            <div class="alert-box"><div class="alert-title">🚨 Fluids Are Priority #1</div><p>Average fluid deficit in DKA is 5-7 liters. Aggressive early resuscitation improves outcomes.</p></div>
            <div class="boards-tip"><div class="boards-tip-title">📚 Fluid Protocol</div>
            <table class="comparison-table">
                <tr><th>Phase</th><th>Fluid</th><th>Rate</th></tr>
                <tr><td><strong>Initial (Hour 1)</strong></td><td>NS (0.9% NaCl)</td><td>1-1.5 L bolus</td></tr>
                <tr><td><strong>Subsequent</strong></td><td>NS or 1/2 NS*</td><td>250-500 mL/hr</td></tr>
                <tr><td><strong>When glucose <200</strong></td><td>D5 1/2 NS</td><td>150-250 mL/hr</td></tr>
            </table>
            <p style="margin-top:8px;">*Use 1/2 NS if corrected Na normal/high; NS if corrected Na low</p></div>
            <div class="mechanism-box"><div class="mechanism-title">🧬 Corrected Sodium</div><div class="pathway">Measured Na is falsely low due to osmotic water shift<br><br>Corrected Na = Measured Na + 1.6 × [(Glucose - 100)/100]<br><br>Example: Na 131, Glucose 486<br>Corrected = 131 + 1.6 × (386/100) = 131 + 6.2 = <strong>137</strong><br><br>If corrected Na >145 → use 1/2 NS<br>If corrected Na <135 → use NS</div></div>
            <div class="why-chain"><div class="why-chain-title">🔗 WHY Chain: Why NS First?</div>
                <div class="why-item"><div class="why-q">Why not start insulin immediately?</div>Insulin drives K+ into cells. If you don't give fluids and check K+ first, you can cause fatal hypokalemia.</div>
                <div class="why-item"><div class="why-q">Why switch to D5 when glucose drops?</div>You need to continue insulin to clear ketones, but need dextrose to prevent hypoglycemia. Glucose target is 150-200, not "normal."</div>
            </div>
            <button class="btn" onclick="nextStage()">Potassium Management →</button></div></div>`;
    }

    function renderPotassium() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 14</div><div class="scene-title">The Potassium Paradox</div></div><div class="scene-body">
            <div class="alert-box"><div class="alert-title">🚨 BOARDS FAVORITE: K+ May Be High But Total Body K+ Is LOW</div><p>Serum K+ is often elevated in DKA, but total body potassium is severely depleted. Insulin will cause rapid drop!</p></div>
            <div class="mechanism-box"><div class="mechanism-title">🧬 Why K+ Appears High</div><div class="pathway">Total body K+ depleted by:<br>• Osmotic diuresis (urinary losses)<br>• Vomiting<br>• Secondary hyperaldosteronism<br><br>But serum K+ elevated because:<br>• Acidosis → H+ enters cells, K+ exits<br>• Insulin deficiency → K+ stays extracellular<br>• Hyperosmolality → water leaves cells, K+ follows<br><br>When you give insulin:<br>→ K+ shifts INTO cells rapidly<br>→ Serum K+ plummets<br>→ Fatal arrhythmias if not replaced!</div></div>
            <div class="boards-tip"><div class="boards-tip-title">📚 Potassium Protocol</div>
            <table class="comparison-table">
                <tr><th>Serum K+</th><th>Action</th></tr>
                <tr style="background:rgba(239,68,68,0.2);"><td><strong><3.3 mEq/L</strong></td><td>HOLD insulin, give 20-40 mEq/hr K+ until >3.3</td></tr>
                <tr><td>3.3-5.3 mEq/L</td><td>Give 20-30 mEq K+ per liter of fluid</td></tr>
                <tr><td>>5.3 mEq/L</td><td>Don't add K+ to fluids, recheck in 2 hours</td></tr>
            </table></div>
            <div class="narrative"><p><strong>This patient:</strong> K+ 5.8 → Don't add K+ initially, but recheck frequently. Expect rapid drop with insulin.</p></div>
            <button class="btn" onclick="nextStage()">Insulin Therapy →</button></div></div>`;
    }

    function renderInsulin() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 14</div><div class="scene-title">Insulin Protocol</div></div><div class="scene-body">
            <div class="boards-tip"><div class="boards-tip-title">📚 Insulin Administration</div>
            <table class="comparison-table">
                <tr><th>Step</th><th>Details</th></tr>
                <tr><td><strong>Confirm K+ ≥3.3</strong></td><td>Do NOT start insulin if K+ <3.3!</td></tr>
                <tr><td><strong>Bolus (optional)</strong></td><td>0.1 units/kg IV regular insulin</td></tr>
                <tr><td><strong>Infusion</strong></td><td>0.1 units/kg/hr OR 0.14 units/kg/hr (no bolus)</td></tr>
                <tr><td><strong>Goal</strong></td><td>Glucose ↓ by 50-70 mg/dL per hour</td></tr>
                <tr><td><strong>If not dropping</strong></td><td>Double infusion rate</td></tr>
            </table></div>
            <div class="mechanism-box"><div class="mechanism-title">🧬 Why IV Regular Insulin?</div><div class="pathway">• Short half-life (5-7 min) → easy to titrate<br>• Predictable onset<br>• Can stop immediately if needed<br><br>SubQ insulin in severe DKA:<br>• Poor absorption (dehydration, hypoperfusion)<br>• Unpredictable kinetics<br>• Harder to adjust rapidly<br><br>Only use SubQ for mild DKA if IV not available</div></div>
            <div class="why-chain"><div class="why-chain-title">🔗 WHY Chain: Glucose Goals</div>
                <div class="why-item"><div class="why-q">Why not drop glucose faster?</div>Rapid osmolality changes can cause cerebral edema, especially in children. Steady 50-70 mg/dL/hr is safe.</div>
                <div class="why-item"><div class="why-q">Why keep glucose 150-200?</div>You need continued insulin to clear ketones. If glucose drops too low, you'll have to stop insulin before ketosis resolves.</div>
            </div>
            <button class="btn" onclick="nextStage()">Anion Gap Monitoring →</button></div></div>`;
    }

    function renderAnionGap() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 14</div><div class="scene-title">Following the Gap</div></div><div class="scene-body">
            <div class="boards-tip"><div class="boards-tip-title">📚 Anion Gap Calculation</div><div class="pathway">AG = Na - (Cl + HCO3)<br>Normal = 8-12<br><br>This patient: 131 - (98 + 8) = <strong>25</strong> (elevated)</div></div>
            <div class="mechanism-box"><div class="mechanism-title">🧬 Why Follow the Gap?</div><div class="pathway">Ketoacids (β-hydroxybutyrate, acetoacetate)<br>→ Unmeasured anions<br>→ Elevated anion gap<br><br>As DKA resolves:<br>• Ketones metabolized to HCO3<br>• Gap closes<br>• HCO3 normalizes<br><br><strong>Gap closure = DKA resolution</strong><br>More reliable than glucose or pH alone!</div></div>
            <div class="alert-box"><div class="alert-title">⚠️ β-Hydroxybutyrate vs Ketone Testing</div><p>Urine ketones detect acetoacetate, NOT β-hydroxybutyrate (the predominant ketone in DKA). During treatment, β-HB converts to acetoacetate → urine ketones may transiently INCREASE even as patient improves. Follow the anion gap, not urine ketones!</p></div>
            <div class="why-chain"><div class="why-chain-title">🔗 WHY Chain: Delta-Delta</div>
                <div class="why-item"><div class="why-q">What is delta-delta?</div>Compares change in AG to change in HCO3. In pure DKA, they should change 1:1 (delta ratio 1-2).</div>
                <div class="why-item"><div class="why-q">Why check it?</div>Delta >2 suggests concurrent metabolic alkalosis. Delta <1 suggests concurrent non-AG acidosis. DKA patients often have mixed disorders.</div>
            </div>
            <button class="btn" onclick="nextStage()">Bicarbonate Controversy →</button></div></div>`;
    }

    function renderBicarb() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 14</div><div class="scene-title">To Give Bicarb or Not?</div></div><div class="scene-body">
            <div class="alert-box"><div class="alert-title">🚨 Bicarbonate Is Almost Never Indicated!</div><p>Routine bicarbonate administration in DKA does NOT improve outcomes and may cause harm.</p></div>
            <div class="mechanism-box"><div class="mechanism-title">🧬 Why NOT to Give Bicarb</div><div class="pathway"><strong>Theoretical harms:</strong><br>• Paradoxical CNS acidosis (CO2 crosses BBB faster)<br>• Worsened hypokalemia (alkalosis shifts K+ into cells)<br>• Delayed ketone clearance<br>• Tissue hypoxia (left-shift of O2-Hgb curve)<br><br><strong>Studies show:</strong><br>No benefit in pH >6.9<br>Possible harm in pediatric patients</div></div>
            <div class="boards-tip"><div class="boards-tip-title">📚 When Bicarb MAY Be Considered</div>
            <table class="comparison-table">
                <tr><th>Indication</th><th>Dose</th></tr>
                <tr><td>pH <6.9 (severe acidosis)</td><td>100 mEq NaHCO3 in 400 mL over 2h</td></tr>
                <tr><td>Life-threatening hyperkalemia</td><td>As temporizing measure</td></tr>
            </table>
            <p style="margin-top:8px;">Even at pH <6.9, evidence is weak. Many centers don't give bicarb at all.</p></div>
            <div class="why-chain"><div class="why-chain-title">🔗 WHY Chain: Acidosis Self-Corrects</div>
                <div class="why-item"><div class="why-q">How does acidosis resolve without bicarb?</div>Insulin stops ketogenesis. Existing ketones are metabolized to bicarbonate. The body regenerates its own buffer.</div>
            </div>
            <button class="btn" onclick="nextStage()">Cerebral Edema →</button></div></div>`;
    }

    function renderCerebralEdema() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 14</div><div class="scene-title">The Dreaded Complication</div></div><div class="scene-body">
            <div class="alert-box"><div class="alert-title">🚨 Cerebral Edema: Rare But Deadly</div><p>Occurs in ~1% of pediatric DKA but mortality is 20-25%. Much rarer in adults. Watch for neurologic changes!</p></div>
            <div class="mechanism-box"><div class="mechanism-title">🧬 Cerebral Edema Mechanism</div><div class="pathway">Brain adapts to hyperosmolality by:<br>→ Generating idiogenic osmoles (taurine, etc.)<br>→ These take time to dissipate<br><br>Rapid correction of hyperosmolality:<br>→ Osmotic gradient favors water into brain<br>→ Brain swelling<br>→ Increased ICP<br>→ Herniation<br><br>Risk factors:<br>• Young age (<5 years)<br>• New-onset DM<br>• Longer symptom duration<br>• Severe acidosis at presentation<br>• Excessive fluid administration</div></div>
            <div class="boards-tip"><div class="boards-tip-title">📚 Warning Signs & Management</div>
            <table class="comparison-table">
                <tr><th>Warning Signs</th><th>Management</th></tr>
                <tr><td>Headache, confusion worsening</td><td>Reduce fluid rate</td></tr>
                <tr><td>Bradycardia, HTN (Cushing)</td><td>Mannitol 0.5-1 g/kg IV</td></tr>
                <tr><td>Pupil changes, posturing</td><td>Hypertonic saline (3%)</td></tr>
                <tr><td>Seizures</td><td>Elevate HOB, intubate if needed</td></tr>
            </table></div>
            <button class="btn" onclick="nextStage()">Transition to SubQ →</button></div></div>`;
    }

    function renderTransition() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 10 of 14</div><div class="scene-title">DKA Resolution Criteria</div></div><div class="scene-body">
            <div class="boards-tip"><div class="boards-tip-title">📚 When Is DKA Resolved?</div>
            <table class="comparison-table">
                <tr><th>Parameter</th><th>Target</th></tr>
                <tr><td>Glucose</td><td><200 mg/dL</td></tr>
                <tr><td>pH</td><td>>7.30</td></tr>
                <tr><td>Bicarbonate</td><td>≥18 mEq/L</td></tr>
                <tr><td>Anion gap</td><td>≤12</td></tr>
            </table>
            <p style="margin-top:8px;">Need at least 2 of these (glucose + one other) to confirm resolution.</p></div>
            <div class="mechanism-box"><div class="mechanism-title">🧬 Transition Protocol</div><div class="pathway"><strong>Prerequisites:</strong><br>• DKA resolved (above criteria)<br>• Patient eating<br>• No nausea/vomiting<br><br><strong>Steps:</strong><br>1. Give SubQ long-acting insulin (glargine/detemir)<br>2. Continue IV insulin for 2-4 HOURS after SubQ<br>3. Then discontinue IV insulin<br>4. Start meal-time rapid-acting insulin<br><br>⚠️ NEVER stop IV before SubQ has had time to work!<br>Gap in insulin → rebound DKA within hours</div></div>
            <div class="why-chain"><div class="why-chain-title">🔗 WHY Chain: The Overlap</div>
                <div class="why-item"><div class="why-q">Why overlap IV and SubQ?</div>SubQ long-acting insulin takes 2-4 hours to start working. If you stop IV before this, patient has no insulin coverage → ketogenesis restarts.</div>
            </div>
            <button class="btn" onclick="nextStage()">DKA vs HHS →</button></div></div>`;
    }

    function renderHHS() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 11 of 14</div><div class="scene-title">Hyperosmolar Hyperglycemic State</div></div><div class="scene-body">
            <div class="boards-tip"><div class="boards-tip-title">📚 DKA vs HHS</div>
            <table class="comparison-table">
                <tr><th>Feature</th><th>DKA</th><th>HHS</th></tr>
                <tr><td>Typical patient</td><td>Type 1 DM, younger</td><td>Type 2 DM, elderly</td></tr>
                <tr><td>Glucose</td><td>>250 (often 300-800)</td><td>>600 (often >1000)</td></tr>
                <tr><td>pH</td><td><7.30</td><td>>7.30</td></tr>
                <tr><td>Ketones</td><td>Strongly positive</td><td>Negative or trace</td></tr>
                <tr><td>Osmolality</td><td>Variable</td><td>>320 mOsm/kg</td></tr>
                <tr><td>Mental status</td><td>Variable</td><td>Often severely altered</td></tr>
                <tr><td>Mortality</td><td>~1%</td><td>10-20%</td></tr>
            </table></div>
            <div class="mechanism-box"><div class="mechanism-title">🧬 Why No Ketosis in HHS?</div><div class="pathway">HHS patients have SOME residual insulin<br>→ Enough to suppress lipolysis/ketogenesis<br>→ But not enough for glucose uptake<br><br>Result:<br>• Extreme hyperglycemia (no ketone "ceiling")<br>• Profound dehydration (10-12 L deficit)<br>• Hyperosmolality → coma<br>• But minimal acidosis</div></div>
            <div class="alert-box"><div class="alert-title">⚠️ HHS Treatment Differences</div><p>HHS needs MORE fluids (bigger deficit), LESS insulin (more sensitive), and SLOWER correction (high stroke risk). Fluid resuscitation is even more critical than in DKA.</p></div>
            <button class="btn" onclick="nextStage()">Finding the Precipitant →</button></div></div>`;
    }

    function renderPrecipitants() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 12 of 14</div><div class="scene-title">What Caused This?</div></div><div class="scene-body">
            <div class="boards-tip"><div class="boards-tip-title">📚 Common DKA Precipitants (The 5 I's)</div>
            <table class="comparison-table">
                <tr><th>I</th><th>Precipitant</th><th>Notes</th></tr>
                <tr><td><strong>I</strong>nfection</td><td>UTI, pneumonia, sepsis</td><td>Most common cause (~40%)</td></tr>
                <tr><td><strong>I</strong>nsulin (lack of)</td><td>Non-compliance, pump failure</td><td>~25% of cases</td></tr>
                <tr><td><strong>I</strong>nfarction</td><td>MI, stroke, mesenteric</td><td>Stress hormones trigger DKA</td></tr>
                <tr><td><strong>I</strong>ntoxication</td><td>Alcohol, cocaine</td><td>Also consider drugs of abuse</td></tr>
                <tr><td><strong>I</strong>atrogenic</td><td>Steroids, SGLT2i, antipsychotics</td><td>Medication-induced</td></tr>
            </table></div>
            <div class="alert-box"><div class="alert-title">🚨 Always Look for Infection!</div><p>Patients may not have fever (hypothermia possible), and WBC is often elevated from stress demargination even without infection. Get cultures, UA, CXR on everyone.</p></div>
            <div class="mechanism-box"><div class="mechanism-title">🧬 New-Onset T1DM</div><div class="pathway">~20% of DKA is the presenting event of T1DM<br><br>Autoimmune destruction of β-cells<br>→ Eventually insufficient insulin<br>→ DKA is first presentation<br><br>Classic history: Weeks of polyuria, polydipsia,<br>weight loss, then acute decompensation</div></div>
            <div class="narrative"><p><strong>This patient:</strong> Ran out of insulin = <span class="highlight">insulin non-compliance</span> as precipitant</p></div>
            <button class="btn" onclick="nextStage()">Prevention →</button></div></div>`;
    }

    function renderPrevention() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 13 of 14</div><div class="scene-title">Preventing Recurrence</div></div><div class="scene-body">
            <div class="boards-tip"><div class="boards-tip-title">📚 Sick Day Rules for Diabetics</div>
            <ul style="margin-left:20px;line-height:2;">
                <li><strong>NEVER stop insulin</strong> - may need MORE when sick</li>
                <li>Check blood glucose every 4 hours</li>
                <li>Check urine/blood ketones if glucose >300</li>
                <li>Stay hydrated (sugar-free fluids)</li>
                <li>Contact provider if vomiting, ketones present, or glucose stays >300</li>
            </ul></div>
            <div class="mechanism-box"><div class="mechanism-title">🧬 Why Insulin Needs INCREASE When Sick</div><div class="pathway">Illness → stress hormones (cortisol, catecholamines)<br>→ Insulin resistance increases<br>→ MORE insulin needed, not less<br><br>Common mistake: Patient feels sick, not eating<br>→ "I don't need insulin if I'm not eating"<br>→ DKA develops</div></div>
            <div class="tips">
                <div class="pearl"><div class="tip-header">✓ Before Discharge</div><ul style="margin-left:16px;"><li>Ensure patient has insulin and supplies</li><li>Diabetes education consult</li><li>Address barriers (cost, access)</li><li>Follow-up within 1 week</li></ul></div>
                <div class="pitfall"><div class="tip-header">✗ Recurrence Risk Factors</div><ul style="margin-left:16px;"><li>Prior DKA episodes</li><li>Psychiatric comorbidity</li><li>Substance abuse</li><li>Limited access to healthcare</li></ul></div>
            </div>
            <button class="btn" onclick="nextStage()">Debrief →</button></div></div>`;
    }

    function renderDebrief() {
        return `<div class="scene"><div style="text-align:center;padding:40px;"><div style="font-size:4rem;margin-bottom:12px;">🍬</div><div style="font-size:1.8rem;font-weight:700;color:#4ade80;">DKA Mastery Complete!</div></div><div class="scene-body">
            <div class="boards-tip"><div class="boards-tip-title">📚 High-Yield Summary</div>
            <table class="comparison-table">
                <tr><th>Concept</th><th>Key Point</th></tr>
                <tr><td>Diagnosis</td><td>Hyperglycemia + ketosis + acidosis (AG elevation)</td></tr>
                <tr><td>Fluids</td><td>NS first (1-1.5L), then based on corrected Na</td></tr>
                <tr><td>Potassium</td><td>HOLD insulin if K+ <3.3; total body K+ is LOW</td></tr>
                <tr><td>Insulin</td><td>0.1 u/kg/hr; target glucose drop 50-70/hr</td></tr>
                <tr><td>Resolution</td><td>AG closed, pH >7.30, HCO3 ≥18</td></tr>
                <tr><td>Bicarb</td><td>Almost never indicated (maybe if pH <6.9)</td></tr>
                <tr><td>Transition</td><td>Overlap SubQ and IV insulin by 2-4 hours</td></tr>
            </table></div>
            <div class="why-chain"><div class="why-chain-title">🔗 Master WHY Chain</div>
                <div class="why-item"><div class="why-q">Why is K+ high but total body low?</div>Acidosis + insulin deficiency shift K+ extracellularly; osmotic diuresis causes massive K+ losses.</div>
                <div class="why-item"><div class="why-q">Why follow anion gap?</div>Gap closure = ketone clearance = true DKA resolution. More reliable than glucose or urine ketones.</div>
                <div class="why-item"><div class="why-q">Why overlap insulins?</div>SubQ takes hours to work; stopping IV before overlap → ketogenesis restarts → rebound DKA.</div>
            </div>
            <div class="tips">
                <div class="pearl"><div class="tip-header">✓ Clinical Pearls</div><ul style="margin-left:16px;"><li>Fluids before insulin</li><li>K+ before insulin</li><li>Add dextrose when glucose <200</li><li>Always find the precipitant</li></ul></div>
                <div class="pitfall"><div class="tip-header">✗ Avoid These Pitfalls</div><ul style="margin-left:16px;"><li>Starting insulin when K+ <3.3</li><li>Stopping IV insulin without SubQ overlap</li><li>Giving bicarb routinely</li><li>Using urine ketones to guide treatment</li></ul></div>
            </div>
            <button class="btn" onclick="location.reload()">🔄 Restart Case</button></div></div>`;
    }

    function nextStage() { state.stage++; render(); }
    render();

<script>
// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
    
    // Auto-inject hint examples into existing content
    window.rdxInit = function() {

    // Initialize on load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.rdxInit);

        window.rdxInit();

})();
</script>
