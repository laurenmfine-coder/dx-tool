<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Racing Heart | ReasonDx Adventure</title>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --border: #334155; --text: #F1F5F9; --muted: #94A3B8; --accent: #EF4444; --success: #10B981; --warning: #F59E0B; --danger: #DC2626; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
        .header { background: linear-gradient(135deg, #DC2626 0%, #EF4444 100%); padding: 12px 20px; position: sticky; top: 0; z-index: 100; }
        .header-row { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .header-title { font-size: 1.1rem; font-weight: 600; }
        .stat { background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 8px; }
        .stat-value { font-size: 1.1rem; font-weight: 700; font-family: monospace; }
        .stat-label { font-size: 0.6rem; opacity: 0.8; text-transform: uppercase; }
        .main { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; }
        .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .card-phase { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
        .card-title { font-size: 1.5rem; font-weight: 700; }
        .card-body { padding: 24px; }
        .narrative { background: linear-gradient(135deg, rgba(239,68,68,0.1), rgba(220,38,38,0.1)); border-left: 4px solid var(--accent); padding: 20px 24px; border-radius: 0 12px 12px 0; margin-bottom: 24px; line-height: 1.8; }
        .narrative .hl { background: rgba(239,68,68,0.3); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .setup-screen { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; }
        .setup-screen h1 { font-size: 2rem; margin-bottom: 8px; }
        .setup-screen .subtitle { color: var(--muted); margin-bottom: 32px; }
        .start-btn { background: var(--accent); color: white; border: none; padding: 16px 48px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .question-section { margin-bottom: 32px; }
        .question-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .question-number { background: var(--accent); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .question-text { font-size: 1.1rem; font-weight: 600; }
        .radio-options { display: flex; flex-direction: column; gap: 10px; }
        .radio-option { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .radio-option:hover { border-color: var(--accent); }
        .radio-option.selected { border-color: var(--accent); background: rgba(239,68,68,0.15); }
        .radio-option.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .radio-option.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .radio-circle { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; }
        .radio-option.selected .radio-circle { border-color: var(--accent); background: radial-gradient(circle, var(--accent) 40%, transparent 40%); }
        .feedback { padding: 20px; border-radius: 12px; margin: 20px 0; }
        .feedback.excellent { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); }
        .feedback.acceptable { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); }
        .feedback-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .feedback-icon { font-size: 1.5rem; }
        .feedback-title { font-weight: 700; }
        .feedback-text { color: var(--muted); line-height: 1.7; }
        .feedback-text strong { color: var(--text); }
        .alert { padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; }
        .alert.info { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); }
        .alert.danger { background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.3); }
        .alert-icon { font-size: 1.5rem; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: 600; margin-bottom: 4px; }
        .alert-desc { font-size: 0.9rem; color: var(--muted); }
        .btn { padding: 14px 28px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-row { display: flex; gap: 12px; margin-top: 24px; }
        .ecg-panel { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 20px; margin: 20px 0; font-family: monospace; }
        .ecg-title { font-weight: 600; margin-bottom: 12px; color: var(--accent); }
        .ecg-finding { padding: 8px 0; border-bottom: 1px solid var(--border); }
        .ecg-finding:last-child { border-bottom: none; }
        .outcome { text-align: center; padding: 40px 20px; }
        .outcome-icon { font-size: 4rem; margin-bottom: 16px; }
        .outcome-title { font-size: 2rem; font-weight: 700; color: var(--success); margin-bottom: 8px; }
        .outcome-desc { color: var(--muted); max-width: 600px; margin: 0 auto 24px; }
        .score-summary { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 24px; margin: 24px auto; max-width: 500px; }
        .score-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .score-row:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <header class="header"><div class="header-row"><div class="header-title">💓 The Racing Heart</div><div class="stat"><div class="stat-value" id="scoreDisplay">0</div><div class="stat-label">Points</div></div></div></header>
    <main class="main"><div id="stageContainer"></div></main>
    <script>
    const state = { stage:'setup', score:0 };
    function addScore(pts) { state.score += pts; document.getElementById('scoreDisplay').textContent = state.score; }

    const stages = {
        setup: { render: () => `
            <div class="setup-screen">
                <h1>💓 The Racing Heart</h1>
                <p class="subtitle">SVT recognition and WPW danger</p>
                <button class="start-btn" onclick="goTo('presentation')">Begin Case →</button>
            </div>`
        },
        presentation: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Emergency Department</div><div class="card-title">📋 Palpitations and Dizziness</div></div>
                <div class="card-body">
                    <div class="narrative">A <span class="hl">28-year-old female</span> presents with <span class="hl">sudden onset palpitations</span> and <span class="hl">lightheadedness</span> for <span class="hl">45 minutes</span>. She says her heart is <span class="hl">"racing like crazy."</span><br><br>She's had <span class="hl">similar episodes before</span> that usually resolve on their own. No chest pain, no syncope. <span class="hl">No cardiac history</span>, takes no medications.</div>
                    <div class="ecg-panel">
                        <div class="ecg-title">12-Lead ECG Findings</div>
                        <div class="ecg-finding">Rate: 186 bpm</div>
                        <div class="ecg-finding">Rhythm: Regular</div>
                        <div class="ecg-finding">QRS: Narrow (90 ms)</div>
                        <div class="ecg-finding">P waves: Difficult to see, possibly retrograde after QRS</div>
                        <div class="ecg-finding">BP: 108/72 mmHg</div>
                    </div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="goTo('rhythm')">Identify Rhythm →</button></div>
                </div>
            </div>`
        },
        rhythm: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Rhythm</div><div class="card-title">📊 What's the Rhythm?</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">1</div><div class="question-text">Regular narrow complex tachycardia at 186 bpm is most likely:</div></div>
                        <div class="radio-options" id="rhythmOpts">
                            <div class="radio-option" data-id="svt" onclick="selectRhythm('svt')"><div class="radio-circle"></div><div><strong>Supraventricular tachycardia (SVT/AVNRT/AVRT)</strong><br><small style="color:var(--muted)">Re-entrant circuit involving AV node</small></div></div>
                            <div class="radio-option" data-id="afib" onclick="selectRhythm('afib')"><div class="radio-circle"></div><div><strong>Atrial fibrillation with RVR</strong><br><small style="color:var(--muted)">Irregularly irregular</small></div></div>
                            <div class="radio-option" data-id="vt" onclick="selectRhythm('vt')"><div class="radio-circle"></div><div><strong>Ventricular tachycardia</strong><br><small style="color:var(--muted)">Wide complex</small></div></div>
                            <div class="radio-option" data-id="sinus" onclick="selectRhythm('sinus')"><div class="radio-circle"></div><div><strong>Sinus tachycardia</strong><br><small style="color:var(--muted)">Physiologic response</small></div></div>
                        </div>
                    </div>
                    <div id="rhythmFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="rhythmSubmit" onclick="submitRhythm()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        treatment: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Treatment</div><div class="card-title">💊 First-Line for Stable SVT</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">2</div><div class="question-text">For stable narrow-complex SVT, what is the first intervention?</div></div>
                        <div class="radio-options" id="txOpts">
                            <div class="radio-option" data-id="vagal" onclick="selectTx('vagal')"><div class="radio-circle"></div><div><strong>Vagal maneuvers (Valsalva, carotid massage)</strong><br><small style="color:var(--muted)">First-line, non-pharmacologic</small></div></div>
                            <div class="radio-option" data-id="adenosine" onclick="selectTx('adenosine')"><div class="radio-circle"></div><div><strong>Adenosine 6mg IV push immediately</strong><br><small style="color:var(--muted)">Drug therapy first</small></div></div>
                            <div class="radio-option" data-id="cardiovert" onclick="selectTx('cardiovert')"><div class="radio-circle"></div><div><strong>Synchronized cardioversion</strong><br><small style="color:var(--muted)">Electricity</small></div></div>
                        </div>
                    </div>
                    <div id="txFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="txSubmit" onclick="submitTx()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        adenosine: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Adenosine</div><div class="card-title">💉 Administration</div></div>
                <div class="card-body">
                    <div class="alert info"><span class="alert-icon">📋</span><div class="alert-content"><div class="alert-title">Vagal maneuvers failed - giving adenosine</div><div class="alert-desc">How should it be administered?</div></div></div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">3</div><div class="question-text">Correct adenosine administration:</div></div>
                        <div class="radio-options" id="adenOpts">
                            <div class="radio-option" data-id="rapid" onclick="selectAden('rapid')"><div class="radio-circle"></div><div><strong>6mg rapid IV push + immediate 20mL NS flush (large proximal vein)</strong><br><small style="color:var(--muted)">Half-life is 10 seconds!</small></div></div>
                            <div class="radio-option" data-id="slow" onclick="selectAden('slow')"><div class="radio-circle"></div><div><strong>6mg slow IV push over 2 minutes</strong><br><small style="color:var(--muted)">Prevent side effects</small></div></div>
                            <div class="radio-option" data-id="drip" onclick="selectAden('drip')"><div class="radio-circle"></div><div><strong>6mg in 100mL NS infusion</strong><br><small style="color:var(--muted)">Continuous infusion</small></div></div>
                        </div>
                    </div>
                    <div id="adenFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="adenSubmit" onclick="submitAden()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        wpw: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Post-Conversion</div><div class="card-title">⚠️ WPW Pattern!</div></div>
                <div class="card-body">
                    <div class="alert danger"><span class="alert-icon">🚨</span><div class="alert-content"><div class="alert-title">After conversion, baseline ECG shows:</div><div class="alert-desc">Short PR interval (~100ms), delta wave (slurred QRS upstroke), widened QRS</div></div></div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">4</div><div class="question-text">This patient has WPW (Wolf-Parkinson-White). Why is this dangerous?</div></div>
                        <div class="radio-options" id="wpwOpts">
                            <div class="radio-option" data-id="afib" onclick="selectWPW('afib')"><div class="radio-circle"></div><div><strong>If AFib develops, accessory pathway can conduct rapidly → VFib</strong><br><small style="color:var(--muted)">AV node blockers can be lethal</small></div></div>
                            <div class="radio-option" data-id="svt" onclick="selectWPW('svt')"><div class="radio-circle"></div><div><strong>More SVT episodes</strong><br><small style="color:var(--muted)">Frequent recurrence</small></div></div>
                            <div class="radio-option" data-id="slow" onclick="selectWPW('slow')"><div class="radio-circle"></div><div><strong>Risk of bradycardia</strong><br><small style="color:var(--muted)">Slow conduction</small></div></div>
                        </div>
                    </div>
                    <div id="wpwFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="wpwSubmit" onclick="submitWPW()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        danger: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Critical Warning</div><div class="card-title">🚫 What to AVOID in WPW + AFib</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">5</div><div class="question-text">If a WPW patient develops AFib with wide complex, which drug is CONTRAINDICATED?</div></div>
                        <div class="radio-options" id="dangerOpts">
                            <div class="radio-option" data-id="avblock" onclick="selectDanger('avblock')"><div class="radio-circle"></div><div><strong>AV node blockers (adenosine, CCBs, beta-blockers, digoxin)</strong><br><small style="color:var(--muted)">Block AV node → ALL conduction through accessory pathway → VFib!</small></div></div>
                            <div class="radio-option" data-id="procainamide" onclick="selectDanger('procainamide')"><div class="radio-circle"></div><div><strong>Procainamide</strong><br><small style="color:var(--muted)">Slows accessory pathway</small></div></div>
                            <div class="radio-option" data-id="amio" onclick="selectDanger('amio')"><div class="radio-circle"></div><div><strong>Amiodarone</strong><br><small style="color:var(--muted)">Broad antiarrhythmic</small></div></div>
                        </div>
                    </div>
                    <div id="dangerFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="dangerSubmit" onclick="submitDanger()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        outcome: { render: () => `
            <div class="card"><div class="card-body">
                <div class="outcome">
                    <div class="outcome-icon">🎉</div>
                    <div class="outcome-title">SVT Terminated!</div>
                    <div class="outcome-desc">Adenosine 6mg converted the rhythm to sinus. Post-conversion ECG revealed WPW pattern (delta wave, short PR). She was admitted for monitoring and referred to EP for ablation. She underwent successful accessory pathway ablation and has been arrhythmia-free.</div>
                </div>
                <div class="score-summary">
                    <h3 style="margin-bottom:16px">Performance</h3>
                    <div class="score-row"><span>Rhythm ID</span><span>${state.rhythmScore||0}/100</span></div>
                    <div class="score-row"><span>First-Line Treatment</span><span>${state.txScore||0}/100</span></div>
                    <div class="score-row"><span>Adenosine Admin</span><span>${state.adenScore||0}/100</span></div>
                    <div class="score-row"><span>WPW Danger</span><span>${state.wpwScore||0}/100</span></div>
                    <div class="score-row"><span>Contraindicated Drugs</span><span>${state.dangerScore||0}/100</span></div>
                    <div class="score-row" style="border-top:2px solid var(--border);padding-top:12px"><strong>Total</strong><strong>${state.score}</strong></div>
                </div>
                <div class="feedback excellent"><div class="feedback-header"><span class="feedback-icon">💡</span><span class="feedback-title">SVT/WPW Pearls</span></div><div class="feedback-text">
                    • <strong>SVT = regular narrow complex tachycardia</strong> (usually 150-250 bpm) - most commonly AVNRT or AVRT<br>
                    • <strong>Treatment sequence:</strong> Vagal maneuvers → Adenosine 6mg → 12mg → 12mg → cardioversion if unstable<br>
                    • <strong>Adenosine technique:</strong> RAPID push + immediate flush, large proximal vein (half-life ~10 sec)<br>
                    • <strong>WPW triad:</strong> Short PR (<120ms) + delta wave + wide QRS (due to pre-excitation via accessory pathway)<br>
                    • <strong>WPW DANGER:</strong> AFib can conduct rapidly via accessory pathway (no AV node delay) → VFib/sudden death<br>
                    • <strong>NEVER in WPW + AFib:</strong> AV node blockers (adenosine, CCBs, β-blockers, digoxin) → all conduction through bypass tract<br>
                    • <strong>Safe in WPW + AFib:</strong> Procainamide, ibutilide, or cardioversion<br>
                    • <strong>Definitive treatment:</strong> EP study + catheter ablation of accessory pathway (cure rate >95%)
                </div></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="location.reload()">Play Again</button></div>
            </div></div>`
        }
    };

    let selectedRhythm = null;
    function selectRhythm(id) { selectedRhythm = id; document.querySelectorAll('#rhythmOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('rhythmSubmit').disabled = false; }
    function submitRhythm() {
        document.querySelectorAll('#rhythmOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'svt') o.classList.add('correct');
            else if (o.dataset.id === selectedRhythm) o.classList.add('incorrect');
        });
        state.rhythmScore = selectedRhythm === 'svt' ? 100 : 40;
        addScore(selectedRhythm === 'svt' ? 40 : 15);
        document.getElementById('rhythmFeedback').innerHTML = `<div class="feedback ${selectedRhythm==='svt'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedRhythm==='svt'?'✅':'📚'}</span><span class="feedback-title">${selectedRhythm==='svt'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>SVT (AVNRT or AVRT)!</strong> Key features: Regular, narrow complex, very fast (150-250 bpm), sudden onset/offset. AFib is irregular. VT is wide complex. Sinus tach rarely exceeds 150-160 and has normal P waves.</div></div>`;
        document.getElementById('rhythmSubmit').textContent = 'Continue →';
        document.getElementById('rhythmSubmit').onclick = () => goTo('treatment');
    }

    let selectedTx = null;
    function selectTx(id) { selectedTx = id; document.querySelectorAll('#txOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('txSubmit').disabled = false; }
    function submitTx() {
        document.querySelectorAll('#txOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'vagal') o.classList.add('correct');
            else if (o.dataset.id === selectedTx) o.classList.add('incorrect');
        });
        state.txScore = selectedTx === 'vagal' ? 100 : 50;
        addScore(selectedTx === 'vagal' ? 40 : 20);
        document.getElementById('txFeedback').innerHTML = `<div class="feedback ${selectedTx==='vagal'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedTx==='vagal'?'✅':'📚'}</span><span class="feedback-title">${selectedTx==='vagal'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>Vagal maneuvers first!</strong> Modified Valsalva, carotid massage (avoid if bruit/stroke risk), or ice water to face. Success rate ~20-50%. Non-invasive, no drugs. If fails → adenosine.</div></div>`;
        document.getElementById('txSubmit').textContent = 'Continue →';
        document.getElementById('txSubmit').onclick = () => goTo('adenosine');
    }

    let selectedAden = null;
    function selectAden(id) { selectedAden = id; document.querySelectorAll('#adenOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('adenSubmit').disabled = false; }
    function submitAden() {
        document.querySelectorAll('#adenOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'rapid') o.classList.add('correct');
            else if (o.dataset.id === selectedAden) o.classList.add('incorrect');
        });
        state.adenScore = selectedAden === 'rapid' ? 100 : 30;
        addScore(selectedAden === 'rapid' ? 40 : 10);
        document.getElementById('adenFeedback').innerHTML = `<div class="feedback ${selectedAden==='rapid'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedAden==='rapid'?'✅':'📚'}</span><span class="feedback-title">${selectedAden==='rapid'?'Correct!':'Critical Technique'}</span></div><div class="feedback-text"><strong>RAPID push + immediate flush!</strong> Adenosine half-life is ~10 seconds. Must reach heart before degradation. Use large proximal IV (antecubital or central), push fast, follow with 20mL NS flush. Warn patient about transient chest tightness/flushing.</div></div>`;
        document.getElementById('adenSubmit').textContent = 'Continue →';
        document.getElementById('adenSubmit').onclick = () => goTo('wpw');
    }

    let selectedWPW = null;
    function selectWPW(id) { selectedWPW = id; document.querySelectorAll('#wpwOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('wpwSubmit').disabled = false; }
    function submitWPW() {
        document.querySelectorAll('#wpwOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'afib') o.classList.add('correct');
            else if (o.dataset.id === selectedWPW) o.classList.add('incorrect');
        });
        state.wpwScore = selectedWPW === 'afib' ? 100 : 40;
        addScore(selectedWPW === 'afib' ? 40 : 15);
        document.getElementById('wpwFeedback').innerHTML = `<div class="feedback ${selectedWPW==='afib'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedWPW==='afib'?'✅':'📚'}</span><span class="feedback-title">${selectedWPW==='afib'?'Critical Concept!':'Review'}</span></div><div class="feedback-text"><strong>AFib + WPW = potential sudden death!</strong> The accessory pathway has no rate-limiting AV nodal delay. If AFib occurs, impulses conduct rapidly (250-300+ bpm) directly to ventricles → VFib. AV blockers make this WORSE by blocking the "safe" pathway.</div></div>`;
        document.getElementById('wpwSubmit').textContent = 'Continue →';
        document.getElementById('wpwSubmit').onclick = () => goTo('danger');
    }

    let selectedDanger = null;
    function selectDanger(id) { selectedDanger = id; document.querySelectorAll('#dangerOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('dangerSubmit').disabled = false; }
    function submitDanger() {
        document.querySelectorAll('#dangerOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'avblock') o.classList.add('correct');
            else if (o.dataset.id === selectedDanger) o.classList.add('incorrect');
        });
        state.dangerScore = selectedDanger === 'avblock' ? 100 : 30;
        addScore(selectedDanger === 'avblock' ? 40 : 10);
        document.getElementById('dangerFeedback').innerHTML = `<div class="feedback ${selectedDanger==='avblock'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedDanger==='avblock'?'✅':'📚'}</span><span class="feedback-title">${selectedDanger==='avblock'?'Life-Saving Knowledge!':'DANGER!'}</span></div><div class="feedback-text"><strong>AV node blockers are CONTRAINDICATED!</strong> Adenosine, CCBs (diltiazem, verapamil), β-blockers, digoxin all block AV node. This forces ALL conduction through the accessory pathway → extremely rapid ventricular response → VFib → death. Use procainamide, ibutilide, or cardioversion instead.</div></div>`;
        document.getElementById('dangerSubmit').textContent = 'Complete →';
        document.getElementById('dangerSubmit').onclick = () => goTo('outcome');
    }

    function goTo(id) { state.stage = id; document.getElementById('stageContainer').innerHTML = stages[id].render(); window.scrollTo(0,0); }
    document.addEventListener('DOMContentLoaded', () => goTo('setup'));
    </script>
</body>
</html>
