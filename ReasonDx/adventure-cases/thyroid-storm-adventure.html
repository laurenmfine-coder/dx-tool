<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thyroid Storm | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#F97316;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#C2410C,#F97316);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(249,115,22,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(249,115,22,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(249,115,22,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🔥 The Thyroid Storm</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'35F',wt:'55kg',hx:'Known Graves, stopped meds, now fever, agitation, palpitations',exam:'Tremor, lid lag, goiter, diaphoretic, agitated',vitals:{HR:'142',BP:'158/68',T:'39.8'},labs:{TSH:'<0.01',FT4:'6.8',FT3:'18'}},int:{age:'52F',wt:'62kg',hx:'Recent IV contrast, now altered, hypotensive',exam:'Tachycardic, warm, confused',vitals:{HR:'158',BP:'88/52',T:'40.2'},labs:{TSH:'<0.01',FT4:'8.2'}},adv:{age:'28F',wt:'58kg',hx:'New AFib with RVR, HF symptoms, no known thyroid disease',exam:'JVD, rales, irregular rhythm, exophthalmos',vitals:{HR:'168',BP:'142/78',T:'38.8'},labs:{TSH:'<0.01',BNP:'1840'}}};
const Q=[
{t:'Burch-Wartofsky Score',q:'How is thyroid storm diagnosed?',h:'Clinical scoring system',o:[{id:'a',txt:'Burch-Wartofsky Score >=45 (clinical criteria, not just labs)',c:1,p:100},{id:'b',txt:'TSH alone',c:0,p:20},{id:'c',txt:'T4 level >10',c:0,p:20}],fb:{1:'<b>Correct!</b> Burch-Wartofsky: Temp, CNS, GI, CV, precipitant. >=45 = storm, 25-44 = impending. Labs dont distinguish storm from severe hyperthyroidism.',0:'<b>Clinical diagnosis:</b> Burch-Wartofsky score. Labs similar in storm vs severe hyperthyroidism.'}},
{t:'Treatment Order',q:'Correct order of thyroid storm treatment?',h:'Sequence matters',o:[{id:'a',txt:'Beta-blocker → PTU/methimazole → iodine (1hr after PTU) → steroids',c:1,p:100},{id:'b',txt:'Iodine first',c:0,p:0},{id:'c',txt:'Surgery immediately',c:0,p:10}],fb:{1:'<b>Correct!</b> BB first (symptom control), then thionamide (block synthesis), then iodine 1hr later (block release - Wolff-Chaikoff). Steroids decrease T4→T3.',0:'<b>Order:</b> BB → PTU → Iodine (wait 1hr) → Steroids. Iodine before PTU worsens storm.'}},
{t:'Why PTU Before Iodine',q:'Why give PTU at least 1 hour before iodine?',h:'Prevent hormone synthesis from iodine',o:[{id:'a',txt:'Block organification first so iodine cant become more T4',c:1,p:100},{id:'b',txt:'No specific reason',c:0,p:10},{id:'c',txt:'Iodine inactivates PTU',c:0,p:20}],fb:{1:'<b>Correct!</b> PTU blocks TPO (organification). If you give iodine first, thyroid uses it to make more hormone (Jod-Basedow).',0:'<b>Sequence:</b> PTU blocks hormone synthesis. Then iodine blocks release (Wolff-Chaikoff).'}},
{t:'PTU vs Methimazole',q:'PTU advantage over methimazole in thyroid storm?',h:'Extra mechanism',o:[{id:'a',txt:'PTU also blocks peripheral T4→T3 conversion',c:1,p:100},{id:'b',txt:'Faster onset',c:0,p:30},{id:'c',txt:'No difference',c:0,p:20}],fb:{1:'<b>Correct!</b> PTU inhibits type 1 deiodinase (peripheral conversion). Methimazole only blocks thyroid synthesis. PTU preferred in storm.',0:'<b>PTU:</b> Blocks synthesis AND peripheral conversion. Preferred in storm.'}},
{t:'Beta-Blocker Choice',q:'Preferred beta-blocker in thyroid storm?',h:'Consider comorbidities',o:[{id:'a',txt:'Propranolol (also blocks T4→T3) or esmolol if concern for HF',c:1,p:100},{id:'b',txt:'Metoprolol only',c:0,p:40},{id:'c',txt:'Avoid all beta-blockers',c:0,p:0}],fb:{1:'<b>Correct!</b> Propranolol: Non-selective, also inhibits T4→T3. Esmolol: Short-acting, titratable if HF concern.',0:'<b>Propranolol:</b> Preferred for extra T4→T3 blocking. Esmolol if unstable.'}},
{t:'Steroid Rationale',q:'Why give hydrocortisone in thyroid storm?',h:'Multiple reasons',o:[{id:'a',txt:'Decreases T4→T3, treats relative adrenal insufficiency, anti-inflammatory',c:1,p:100},{id:'b',txt:'Treats underlying Graves',c:0,p:20},{id:'c',txt:'Not indicated',c:0,p:0}],fb:{1:'<b>Correct!</b> Steroids: Block peripheral conversion, treat relative adrenal insufficiency (increased cortisol metabolism), anti-inflammatory.',0:'<b>Steroids:</b> Multiple mechanisms. Give hydrocortisone 100mg q8h.'}},
{t:'Precipitants',q:'Common precipitants of thyroid storm?',h:'What triggers decompensation',o:[{id:'a',txt:'Infection, surgery, trauma, iodine contrast, stopping medications, DKA',c:1,p:100},{id:'b',txt:'Only infection',c:0,p:20},{id:'c',txt:'Spontaneous only',c:0,p:10}],fb:{1:'<b>Correct!</b> Always look for precipitant: Infection (#1), surgery, trauma, iodine load (contrast, amiodarone), med non-compliance, DKA, MI.',0:'<b>Precipitants:</b> Infection most common. Also surgery, iodine, trauma, DKA.'}},
{t:'Cardiac Complications',q:'New AFib in thyrotoxicosis. Key management difference?',h:'Rate control challenges',o:[{id:'a',txt:'Often refractory to digoxin (increased clearance), need higher BB doses',c:1,p:100},{id:'b',txt:'Standard AFib treatment',c:0,p:30},{id:'c',txt:'Immediate cardioversion',c:0,p:20}],fb:{1:'<b>Correct!</b> Digoxin less effective (increased clearance). Need higher BB doses. AFib often converts with euthyroid state. Anticoagulate.',0:'<b>AFib:</b> Resistant to digoxin. Higher BB doses needed. Often resolves with treatment.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🔥 The Thyroid Storm</h1><p style="color:var(--muted);margin-bottom:32px">Thyroid Storm: Burch-Wartofsky, treatment order, PTU vs MMI, precipitants</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🌡️ Endocrine Emergency</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Thyroid Storm Pearls</div><div class="pearl-item"><b>Diagnosis:</b> Burch-Wartofsky >=45 (clinical)</div><div class="pearl-item"><b>Order:</b> BB → PTU → Iodine (1hr later) → Steroids</div><div class="pearl-item"><b>PTU:</b> Also blocks peripheral T4→T3</div><div class="pearl-item"><b>Propranolol:</b> Preferred (blocks conversion too)</div><div class="pearl-item"><b>Find precipitant:</b> Infection most common</div></div><div class="cross-link"><a href="../mechanism/thyroid-module.html">MechanismDx: Thyroid</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
