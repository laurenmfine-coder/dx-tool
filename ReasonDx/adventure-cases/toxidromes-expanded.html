<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toxidromes | Dual-Mode Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        body.adult { background: linear-gradient(135deg, #065f46 0%, #10b981 100%); }
        body.peds { background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%); }
        .container { max-width: 900px; margin: 0 auto; }
        .mode-toggle { display: flex; justify-content: center; margin-bottom: 20px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 4px; }
        .mode-btn { flex: 1; padding: 12px 24px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; background: transparent; color: #e2e8f0; }
        .mode-btn.active { background: rgba(255,255,255,0.2); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-radius: 16px; margin-bottom: 20px; }
        .adult .header { background: rgba(6, 95, 70, 0.9); }
        .peds .header { background: rgba(124, 58, 237, 0.9); }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; margin-left: 10px; }
        .adult .badge { background: #10b981; }
        .peds .badge { background: #a78bfa; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; border-radius: 3px; }
        .adult .progress-fill { background: linear-gradient(90deg, #10b981, #6ee7b7); }
        .peds .progress-fill { background: linear-gradient(90deg, #a78bfa, #c4b5fd); }
        .scene { border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .adult .scene { background: linear-gradient(135deg, #065f46, #047857); }
        .peds .scene { background: linear-gradient(135deg, #6d28d9, #7c3aed); }
        .scene-header { padding: 16px 20px; }
        .adult .scene-header { background: rgba(16, 185, 129, 0.15); }
        .peds .scene-header { background: rgba(167, 139, 250, 0.15); }
        .scene-phase { font-size: 0.75rem; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(16,185,129,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .adult .btn { background: linear-gradient(135deg, #10b981, #047857); }
        .peds .btn { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    
/* EPA Badge Styles */
.epa-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.epa-badge { 
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
    background: rgba(139,92,246,0.2); border: 1px solid rgba(139,92,246,0.4); color: #c4b5fd;
}
.epa-badge.primary { background: rgba(59,130,246,0.25); border-color: rgba(59,130,246,0.5); color: #93c5fd; }
.epa-badge .epa-level { background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 10px; font-size: 0.65rem; }

/* Confidence Slider Styles */
.confidence-container {
    background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(139,92,246,0.15));
    border: 1px solid rgba(59,130,246,0.3);
    border-radius: 12px;
    padding: 20px;
    margin: 16px 0;
    display: none;
}
.confidence-container.show { display: block; }
.confidence-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.confidence-icon { font-size: 1.2rem; }
.confidence-label { font-weight: 600; color: #e2e8f0; }
.confidence-slider-wrapper { position: relative; margin-bottom: 8px; }
.confidence-slider {
    width: 100%; height: 8px; border-radius: 4px;
    background: rgba(255,255,255,0.1); outline: none; -webkit-appearance: none;
}
.confidence-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6); cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.confidence-labels { display: flex; justify-content: space-between; font-size: 0.65rem; color: rgba(255,255,255,0.5); margin-top: 4px; }
.confidence-value { text-align: center; font-size: 2rem; font-weight: 700; margin: 12px 0; color: #fbbf24; }
.confidence-submit {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    color: white; border: none; border-radius: 8px;
    font-weight: 600; font-size: 1rem; cursor: pointer;
}
.confidence-submit:hover { opacity: 0.9; transform: translateY(-1px); }

/* Calibration Feedback */
.calibration-feedback {
    background: rgba(0,0,0,0.3); border-radius: 8px; padding: 12px 16px; margin-top: 12px;
    display: none; font-size: 0.9rem;
}
.calibration-feedback.show { display: block; }
.calibration-feedback.well-calibrated { border-left: 3px solid #22c55e; }
.calibration-feedback.overconfident { border-left: 3px solid #ef4444; }
.calibration-feedback.underconfident { border-left: 3px solid #fbbf24; }

/* Process Feedback Styles */
.process-feedback {
    background: linear-gradient(135deg, rgba(251,191,36,0.1), rgba(239,68,68,0.1));
    border: 1px solid rgba(251,191,36,0.3);
    border-radius: 12px;
    padding: 16px;
    margin-top: 16px;
    display: none;
}
.process-feedback.show { display: block; }
.process-feedback h4 { color: #fbbf24; margin-bottom: 12px; }

/* Selected option before submit */
.mcq-option.selected { border-color: #3b82f6 !important; background: rgba(59,130,246,0.2) !important; }

/* EPA Progress in Debrief */
.epa-debrief-section { margin: 24px 0; }
.epa-debrief-section h4 { color: #1f2937; margin-bottom: 16px; font-size: 1.1rem; }
.epa-progress-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
.epa-progress-card { background: #f9fafb; border-radius: 10px; padding: 14px; text-align: center; }
.epa-progress-card .epa-name { font-size: 0.75rem; color: #6b7280; margin-bottom: 4px; }
.epa-progress-card .epa-score { font-size: 1.5rem; font-weight: 700; }
.epa-progress-card .epa-score.high { color: #22c55e; }
.epa-progress-card .epa-score.medium { color: #f59e0b; }
.epa-progress-card .epa-score.low { color: #ef4444; }

/* Calibration Chart in Debrief */
.calibration-debrief { margin: 24px 0; padding: 20px; background: #f9fafb; border-radius: 12px; }
.calibration-debrief h4 { color: #1f2937; margin-bottom: 16px; }
.calibration-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; text-align: center; }
.calibration-stat { padding: 16px; background: white; border-radius: 8px; }
.calibration-stat .stat-value { font-size: 2rem; font-weight: 700; }
.calibration-stat .stat-label { font-size: 0.85rem; color: #6b7280; margin-top: 4px; }
.calibration-interpretation { margin-top: 16px; padding: 12px; background: white; border-radius: 8px; font-size: 0.9rem; }

</style>
</head>
<body class="adult">
    <div class="container">
        <div class="mode-toggle">
            <button class="mode-btn active" onclick="setMode('adult')">🏥 Adult</button>
            <button class="mode-btn" onclick="setMode('peds')">👶 Pediatric</button>
        </div>
        <div id="app"></div>
    </div>
    <script>
    const STAGES = ['overview','sympathomimetic','anticholinergic','cholinergic','opioid','sedative','serotonin','antidotes','decontam','debrief'];
    const state = { stage: 0, mode: 'adult' };

    function setMode(m) { state.mode = m; state.stage = 0; document.body.className = m; document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); render(); }
    function nextStage() { state.stage++; render(); }

    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        const icon = state.mode === 'adult' ? '☠️' : '👶☠️';
        const title = state.mode === 'adult' ? 'Toxidromes' : 'Pediatric Toxicology';
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">${icon} ${title}<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }

    window.render_overview = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Pattern Recognition</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What comorbidities would change your management approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Always consider mimics and look-alikes in your differential</p>
                </div><div class="narrative"><p>A <span class="highlight">24-year-old man</span> is brought in <span class="critical">unresponsive</span>. Found at a party.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 42, BP 88/52, RR 6, Pupils: 1mm bilateral<br><strong>Exam:</strong> Obtunded, cool/clammy</p></div><div class="alert-box"><div class="alert-title">🚨 Recognize the Toxidrome!</div><p>Toxidromes are patterns that point to drug classes. This guides treatment before labs return!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Vital Sign Clues</div><div class="pathway"><strong>Pupils:</strong><br>• Dilated: Sympathomimetic, anticholinergic<br>• Constricted: Opioid, cholinergic<br><br><strong>Heart rate:</strong><br>• Tachy: Sympathomimetic, anticholinergic<br>• Brady: Opioid, cholinergic, sedative<br><br><strong>Temp:</strong><br>• High: Sympathomimetic, anticholinergic, serotonin<br>• Low: Opioid, sedative</div></div><button class="btn" onclick="nextStage()">Sympathomimetic →</button></div></div>`;
        } else {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Pediatric Poisoning</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate acuity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would renal or hepatic impairment affect drug dosing?</p>
                </div><div class="narrative"><p>A <span class="highlight">2-year-old girl</span> found playing in grandmother's <span class="critical">pill organizer</span>.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 155, BP 78/50, T 99.8°F<br><strong>Weight:</strong> 12 kg</p></div><div class="alert-box"><div class="alert-title">🚨 "One Pill Can Kill" in Toddlers!</div><p>CCBs, opioids, sulfonylureas, TCAs, clonidine, camphor - all dangerous with single pill!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Pediatric Pearls</div><div class="pathway"><strong>Common exposures (age 1-5):</strong><br>• Cosmetics, cleaning products<br>• Analgesics (acetaminophen!)<br><br><strong>Most dangerous:</strong><br>• Prescription meds (CCB, opioids, TCAs)<br>• Iron supplements<br><br><strong>Poison Control: 1-800-222-1222</strong></div></div><button class="btn" onclick="nextStage()">Sympathomimetic →</button></div></div>`;
        }
    };

    window.render_sympathomimetic = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">Sympathomimetic Toxidrome</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the most likely diagnosis given this presentation?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if the patient doesn't respond to initial treatment?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Reassess if the patient isn't improving as expected</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 "Fight or Flight" Overdrive</div><table class="comparison-table"><tr><th>Finding</th><th>Description</th></tr><tr><td>Pupils</td><td>Mydriasis (dilated)</td></tr><tr><td>HR/BP</td><td>Tachycardia, hypertension</td></tr><tr><td>Temp</td><td>Hyperthermia</td></tr><tr><td>Skin</td><td>Diaphoretic (SWEATY - unlike anticholinergic!)</td></tr><tr><td>Mental status</td><td>Agitation, psychosis, seizures</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Causes & Treatment</div><div class="pathway"><strong>Causes:</strong><br>• Cocaine, amphetamines, MDMA<br>• Synthetic cathinones ("bath salts")<br>• Caffeine, pseudoephedrine<br><br><strong>Treatment:</strong><br>• Benzos (agitation, seizures, HTN)<br>• Cooling for hyperthermia<br>• Avoid beta-blockers in cocaine!<br>  (unopposed alpha = worse HTN)${state.mode === 'peds' ? '<br><br><strong>Peds:</strong> ADHD med overdose, decongestants' : ''}</div></div><button class="btn" onclick="nextStage()">Anticholinergic →</button></div></div>`;
    };

    window.render_anticholinergic = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">Anticholinergic Toxidrome</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What key history element is most helpful here?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What's the evidence level for the standard treatment?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 "Mad as a Hatter, Blind as a Bat..."</div><table class="comparison-table"><tr><th>Mnemonic</th><th>Finding</th></tr><tr><td>Blind as a bat</td><td>Mydriasis, blurred vision</td></tr><tr><td>Red as a beet</td><td>Flushed skin</td></tr><tr><td>Hot as a hare</td><td>Hyperthermia</td></tr><tr><td>Dry as a bone</td><td>Dry skin, mucous membranes</td></tr><tr><td>Mad as a hatter</td><td>Delirium, hallucinations</td></tr><tr><td>Full as a flask</td><td>Urinary retention</td></tr><tr><td>Tachy as a...</td><td>Tachycardia</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Causes & Treatment</div><div class="pathway"><strong>Causes:</strong><br>• Antihistamines (diphenhydramine!)<br>• TCAs, antipsychotics<br>• Jimson weed, deadly nightshade<br>• Atropine, scopolamine<br><br><strong>Key distinction from sympathomimetic:</strong><br>DRY skin (no sweating)<br><br><strong>Antidote:</strong> Physostigmine<br>(use carefully - can cause seizures, bradycardia)${state.mode === 'peds' ? '<br><br><strong>Peds:</strong> Benadryl OD very common!' : ''}</div></div><button class="btn" onclick="nextStage()">Cholinergic →</button></div></div>`;
    };

    window.render_cholinergic = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">Cholinergic Toxidrome</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Which physical exam finding is most specific?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> When would you involve subspecialty consultation?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fefce8; border:1px solid #eab308; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #eab308;">
                    <p style="margin:0; color:#854d0e; font-size:0.9rem;"><strong>🚫 Common Mistake:</strong> Avoid anchoring bias - keep your differential broad initially</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 "SLUDGE + Killer B's"</div><table class="comparison-table"><tr><th>SLUDGE</th><th>Killer B's</th></tr><tr><td><strong>S</strong>alivation</td><td><strong>B</strong>radycardia</td></tr><tr><td><strong>L</strong>acrimation</td><td><strong>B</strong>ronchospasm</td></tr><tr><td><strong>U</strong>rination</td><td><strong>B</strong>ronchorrhea</td></tr><tr><td><strong>D</strong>efecation</td><td></td></tr><tr><td><strong>G</strong>I distress</td><td></td></tr><tr><td><strong>E</strong>mesis</td><td></td></tr></table><p style="margin-top:12px;">Also: Miosis (constricted pupils), muscle fasciculations</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Causes & Treatment</div><div class="pathway"><strong>Causes:</strong><br>• Organophosphates (pesticides, nerve agents)<br>• Carbamates<br>• Physostigmine overdose<br><br><strong>Treatment:</strong><br>• Atropine (large doses! titrate to secretions)<br>• Pralidoxime (2-PAM) for organophosphates<br>• Benzos for seizures<br>• Decontamination (remove clothes!)${state.mode === 'peds' ? '<br><br><strong>Peds atropine:</strong> 0.02-0.05 mg/kg IV' : ''}</div></div><button class="btn" onclick="nextStage()">Opioid →</button></div></div>`;
    };

    window.render_opioid = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">Opioid Toxidrome</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Consider the most common causes first, then rarer ones</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What are the key complications to monitor for?</p>

// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';

        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +

            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +

        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
    
    // Auto-inject hint examples into existing content
    window.rdxInit = function() {
        // Could add dynamic hint injection here based on difficulty
        console.log('ReasonDx Enhanced Features loaded for: Toxidromes Expanded Dual Adventure');
    };
    
    // Initialize on load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.rdxInit);
    } else {
        window.rdxInit();

})();


// ============================================================================
// EPA & CALIBRATION ENHANCEMENT - ReasonDx
// ============================================================================

// Case EPA Metadata
const caseEPA = {
    id: 'toxidromes',
    primaryEPAs: ["EPA-10","EPA-2","EPA-4"],
    secondaryEPAs: ["EPA-3"],
    category: 'Toxicology'
};

// Response tracking for calibration
let responseHistory = [];
let pendingSelection = null;

// EPA Names for display
const epaNames = {"EPA-1":"Gather H&P","EPA-2":"Prioritize DDx","EPA-3":"Recommend Tests","EPA-4":"Enter Orders","EPA-7":"Apply Evidence","EPA-10":"Recognize Urgency","EPA-12":"Perform Procedures"};

// Override selectOption to add confidence step
const originalSelectOption = typeof selectOption === 'function' ? selectOption : null;

function selectOptionEnhanced(index, correct) {
    const qId = 'q' + currentStage;
    if (answeredQuestions.has(qId)) return;
    
    // Store pending selection
    pendingSelection = { index, correct, stageIdx: currentStage };
    
    // Highlight selected option
    document.querySelectorAll('.mcq-option').forEach((opt, i) => {
        opt.classList.remove('selected');
        if (i === index) opt.classList.add('selected');
    });
    
    // Show confidence slider
    const confContainer = document.getElementById('confidence-container');
    if (confContainer) {
        confContainer.classList.add('show');
        confContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function updateConfidenceDisplay(value) {
    const display = document.getElementById('confidence-display');
    if (display) display.textContent = value + '%';
}

function submitWithConfidence() {
    if (!pendingSelection) return;
    
    const confidence = parseInt(document.getElementById('confidence-slider').value);
    const { index, correct, stageIdx } = pendingSelection;
    const stage = stages[stageIdx];
    
    // Record response with confidence
    responseHistory.push({
        stage: stageIdx + 1,
        stageTitle: stage.title,
        epaFocus: caseEPA.primaryEPAs[0],
        selectedIndex: index,
        selectedText: stage.question.options[index].text,
        correct: correct,
        confidence: confidence,
        points: correct ? stage.question.points : 0,
        maxPoints: stage.question.points
    });
    
    // Hide confidence container
    const confContainer = document.getElementById('confidence-container');
    if (confContainer) confContainer.classList.remove('show');
    
    // Now process the answer (call original logic)
    const qId = 'q' + stageIdx;
    answeredQuestions.add(qId);
    decisionPath[stageIdx] = index;
    
    maxScore += stage.question.points;
    if (correct) score += stage.question.points;
    
    document.getElementById('score').textContent = score;
    document.getElementById('maxScore').textContent = maxScore;
    
    // Show calibration feedback
    showCalibrationFeedback(confidence, correct);
    
    pendingSelection = null;
    renderStage();
}

function showCalibrationFeedback(confidence, correct) {
    // This will be shown in the feedback section after render
    const feedback = document.createElement('div');
    feedback.className = 'calibration-feedback show';
    
    if (correct && confidence >= 70) {
        feedback.classList.add('well-calibrated');
        feedback.innerHTML = '✅ <strong>Well calibrated!</strong> You were confident and correct.';
    } else if (correct && confidence < 50) {
        feedback.classList.add('underconfident');
        feedback.innerHTML = '📚 Correct, but you were uncertain. <strong>Trust your knowledge more!</strong>';
    } else if (!correct && confidence >= 70) {
        feedback.classList.add('overconfident');
        feedback.innerHTML = '⚠️ <strong>Overconfidence detected.</strong> High confidence + wrong answer is where diagnostic errors happen.';
    } else {
        feedback.classList.add('well-calibrated');
        feedback.innerHTML = '📝 Incorrect, but your uncertainty was appropriate. Review this concept.';
    }
    
    // Store for rendering
    window.lastCalibrationFeedback = feedback.outerHTML;
}

// Enhanced debrief with EPA and calibration
function showEnhancedDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    const content = document.getElementById('debriefContent');
    if (!overlay || !content) return;
    
    const percentage = maxScore > 0 ? Math.round((score / maxScore) * 100) : 0;
    
    // Calculate calibration
    const withConf = responseHistory.filter(r => r.confidence !== undefined);
    const correctWithConf = withConf.filter(r => r.correct);
    const incorrectWithConf = withConf.filter(r => !r.correct);
    const avgConfCorrect = correctWithConf.length > 0 
        ? Math.round(correctWithConf.reduce((s,r) => s + r.confidence, 0) / correctWithConf.length) : 0;
    const avgConfIncorrect = incorrectWithConf.length > 0 
        ? Math.round(incorrectWithConf.reduce((s,r) => s + r.confidence, 0) / incorrectWithConf.length) : 0;
    
    // EPA performance
    const epaPerf = {};
    responseHistory.forEach(r => {
        const epa = r.epaFocus || caseEPA.primaryEPAs[0];
        if (!epaPerf[epa]) epaPerf[epa] = { correct: 0, total: 0 };
        epaPerf[epa].total++;
        if (r.correct) epaPerf[epa].correct++;
    });
    
    // Calibration interpretation
    let calibrationMsg = '';
    if (avgConfCorrect - avgConfIncorrect > 20) {
        calibrationMsg = '✅ Good discrimination! You feel more confident when you\'re right.';
    } else if (avgConfIncorrect > 60) {
        calibrationMsg = '⚠️ Overconfidence pattern detected. Practice asking "What would make me wrong?"';
    } else {
        calibrationMsg = '📊 Work on calibration - confidence should differ between correct and incorrect answers.';
    }
    
    content.innerHTML = `
        <div style="text-align:center;margin-bottom:24px;">
            <div style="font-size:4rem;">${percentage >= 80 ? '🏆' : percentage >= 60 ? '👍' : '📚'}</div>
            <div style="font-size:2.5rem;font-weight:700;color:${percentage >= 80 ? '#22c55e' : percentage >= 60 ? '#f59e0b' : '#ef4444'}">${percentage}%</div>
            <div style="color:#6b7280;">Score: ${score}/${maxScore}</div>
        </div>
        
        <div class="epa-debrief-section">
            <h4>📋 EPA Competencies Assessed</h4>
            <div class="epa-progress-grid">
                ${Object.entries(epaPerf).map(([epa, data]) => {
                    const pct = Math.round((data.correct / data.total) * 100);
                    const colorClass = pct >= 80 ? 'high' : pct >= 60 ? 'medium' : 'low';
                    return `<div class="epa-progress-card">
                        <div class="epa-name">${epaNames[epa] || epa}</div>
                        <div class="epa-score ${colorClass}">${pct}%</div>
                    </div>`;
                }).join('')}
            </div>
        </div>
        
        <div class="calibration-debrief">
            <h4>🎯 Confidence Calibration</h4>
            <div class="calibration-stats">
                <div class="calibration-stat">
                    <div class="stat-value" style="color:#22c55e;">${avgConfCorrect}%</div>
                    <div class="stat-label">Avg confidence when correct</div>
                </div>
                <div class="calibration-stat">
                    <div class="stat-value" style="color:${avgConfIncorrect > 60 ? '#ef4444' : '#f59e0b'};">${avgConfIncorrect}%</div>
                    <div class="stat-label">Avg confidence when incorrect</div>
                </div>
            </div>
            <div class="calibration-interpretation">${calibrationMsg}</div>
        </div>
        
        <div class="decision-path">
            <h3>📝 Your Decisions</h3>
            ${responseHistory.map(r => `
                <div class="path-item ${r.correct ? 'path-optimal' : 'path-incorrect'}">
                    <div style="display:flex;justify-content:space-between;">
                        <div>
                            <div class="path-stage">${r.correct ? '✓' : '✗'} Stage ${r.stage}: ${r.stageTitle}</div>
                            <div class="path-choice" style="font-size:0.85rem;color:#6b7280;">${r.confidence}% confident</div>
                        </div>
                        <div class="path-points">${r.points}/${r.maxPoints}</div>
                    </div>
                </div>
            `).join('')}
        </div>
        
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
        <button class="debrief-btn" style="background:#e5e7eb;color:#4b5563;margin-top:8px;" onclick="closeDebrief()">Close</button>
    `;
    
    overlay.classList.add('show');
}

// Replace selectOption globally
window.selectOption = selectOptionEnhanced;

// Store original showDebrief if exists
if (typeof showDebrief === 'function') {
    window.originalShowDebrief = showDebrief;
}
window.showDebrief = showEnhancedDebrief;

</script>
<!-- ==================== END REASONDX ENHANCED FEATURES ==================== -->
