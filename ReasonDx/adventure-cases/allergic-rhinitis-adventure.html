<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sneezing Season | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#14B8A6;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#0D9488,#14B8A6);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(20,184,166,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(20,184,166,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#000;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(20,184,166,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#000}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#000;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🤧 The Sneezing Season</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'25F',wt:'62kg',hx:'Seasonal sneezing, itchy eyes, clear rhinorrhea every spring',exam:'Pale boggy turbinates, allergic shiners',vitals:{HR:'72',BP:'112/68'},labs:{Symptoms:'Moderate-severe'}},int:{age:'38M',wt:'85kg',hx:'Year-round congestion, snoring, failed OTC antihistamines',exam:'Nasal polyps, deviated septum',vitals:{HR:'78',BP:'128/82'},labs:{SPT:'Dust mite, cat positive'}},adv:{age:'12M',wt:'42kg',hx:'AR with uncontrolled asthma, considering immunotherapy',exam:'AR signs, mild wheeze',vitals:{HR:'82',BP:'108/68'},labs:{IgE:'420',FeNO:'48'}}};
const Q=[
{t:'ARIA Classification',q:'ARIA classification of allergic rhinitis based on?',h:'Duration and severity',o:[{id:'a',txt:'Intermittent vs persistent AND mild vs moderate-severe (impact on QoL)',c:1,p:100},{id:'b',txt:'Seasonal vs perennial only',c:0,p:40},{id:'c',txt:'Age of onset',c:0,p:10}],fb:{1:'<b>Correct!</b> ARIA: Intermittent (<4d/wk or <4wks) vs Persistent. Mild vs Mod-Severe (sleep, daily activities, work/school affected).',0:'<b>ARIA:</b> Duration (intermittent/persistent) + severity (mild/mod-severe).'}},
{t:'First-Line Treatment',q:'First-line pharmacotherapy for moderate-persistent AR?',h:'Most effective class',o:[{id:'a',txt:'Intranasal corticosteroids (most effective for all symptoms)',c:1,p:100},{id:'b',txt:'Oral antihistamines only',c:0,p:40},{id:'c',txt:'Decongestants',c:0,p:20}],fb:{1:'<b>Correct!</b> INCS most effective: All symptoms including congestion. 2nd-gen antihistamines for mild. Combination for refractory.',0:'<b>INCS:</b> First-line for moderate-severe. Most effective overall.'}},
{t:'Antihistamine Selection',q:'2nd generation antihistamines preferred over 1st gen because?',h:'Side effect profile',o:[{id:'a',txt:'Less sedation, less anticholinergic effects, once daily dosing',c:1,p:100},{id:'b',txt:'More effective',c:0,p:30},{id:'c',txt:'Cheaper',c:0,p:10}],fb:{1:'<b>Correct!</b> 2nd gen (cetirizine, loratadine, fexofenadine): Less CNS penetration, less sedation, no anticholinergic. Equal efficacy.',0:'<b>2nd gen:</b> Less sedation, safer profile. Equal efficacy to 1st gen.'}},
{t:'Nasal Spray Technique',q:'Proper INCS technique includes?',h:'Maximize effectiveness',o:[{id:'a',txt:'Aim away from septum, slight head tilt forward, dont sniff hard',c:1,p:100},{id:'b',txt:'Spray toward septum',c:0,p:20},{id:'c',txt:'Tilt head back',c:0,p:20}],fb:{1:'<b>Correct!</b> Technique: Prime pump, aim laterally (away from septum), gentle inspiration. Prevents epistaxis, improves deposition.',0:'<b>Technique:</b> Aim away from septum, head slightly forward, gentle sniff.'}},
{t:'Immunotherapy Indications',q:'Allergen immunotherapy (AIT) indicated when?',h:'Disease modification',o:[{id:'a',txt:'Moderate-severe symptoms despite pharmacotherapy, or desire to modify disease course',c:1,p:100},{id:'b',txt:'All AR patients',c:0,p:20},{id:'c',txt:'Only children',c:0,p:10}],fb:{1:'<b>Correct!</b> AIT: Inadequate response to meds, significant side effects, desire for disease modification. Only treatment that changes natural history.',0:'<b>AIT:</b> For refractory symptoms or disease modification. Changes natural history.'}},
{t:'SCIT vs SLIT',q:'SCIT vs SLIT comparison?',h:'Routes of immunotherapy',o:[{id:'a',txt:'SCIT: Office visits, faster efficacy, anaphylaxis risk. SLIT: Home dosing, safer, slower onset',c:1,p:100},{id:'b',txt:'No difference',c:0,p:20},{id:'c',txt:'SLIT more effective',c:0,p:20}],fb:{1:'<b>Correct!</b> SCIT: Weekly shots x4-6mo then monthly x3-5yr. SLIT: Daily sublingual at home. Both effective. SCIT slightly faster/more robust.',0:'<b>SCIT vs SLIT:</b> SCIT=office, faster. SLIT=home, safer.'}},
{t:'Comorbidities',q:'Conditions commonly associated with allergic rhinitis?',h:'United airway',o:[{id:'a',txt:'Asthma (80% overlap), allergic conjunctivitis, sinusitis, otitis media, sleep disturbance',c:1,p:100},{id:'b',txt:'No associated conditions',c:0,p:10},{id:'c',txt:'Only sinusitis',c:0,p:30}],fb:{1:'<b>Correct!</b> United airway: AR and asthma linked. Treating AR improves asthma control. Also conjunctivitis, sinusitis, OME, poor sleep.',0:'<b>Comorbidities:</b> Asthma (80%), conjunctivitis, sinusitis. United airway.'}},
{t:'Red Flags',q:'Red flags suggesting NOT simple allergic rhinitis?',h:'When to investigate further',o:[{id:'a',txt:'Unilateral symptoms, bloody discharge, anosmia, nasal crusting, severe pain',c:1,p:100},{id:'b',txt:'Seasonal pattern',c:0,p:10},{id:'c',txt:'Bilateral symptoms',c:0,p:10}],fb:{1:'<b>Correct!</b> Red flags: Unilateral (tumor, foreign body), epistaxis, anosmia (polyps, tumor), crusting (GPA), pain. Need further workup.',0:'<b>Red flags:</b> Unilateral, bloody, anosmia, crusting, pain. Not simple AR.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🤧 The Sneezing Season</h1><p style="color:var(--muted);margin-bottom:32px">Allergic Rhinitis: ARIA, INCS, antihistamines, immunotherapy, comorbidities</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🏥 Allergy Clinic</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Allergic Rhinitis Pearls</div><div class="pearl-item"><b>ARIA:</b> Duration + severity classification</div><div class="pearl-item"><b>First-line:</b> Intranasal corticosteroids</div><div class="pearl-item"><b>Technique:</b> Aim away from septum</div><div class="pearl-item"><b>AIT:</b> Only disease-modifying treatment</div><div class="pearl-item"><b>United airway:</b> 80% asthma overlap</div></div><div class="cross-link"><a href="../mechanism/allergy-immunology.html">MechanismDx: Allergy</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
