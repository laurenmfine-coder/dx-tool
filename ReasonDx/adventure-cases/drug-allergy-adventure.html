<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Suspicious Rash | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#F472B6;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#BE185D,#F472B6);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(244,114,182,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(244,114,182,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(244,114,182,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">💊 The Suspicious Rash</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'35F',wt:'68kg',hx:'Urticaria after amoxicillin 30 min ago, childhood penicillin rash',exam:'Diffuse urticaria, no angioedema, stable',vitals:{HR:'88',BP:'128/78'},labs:{History:'Childhood rash with penicillin'}},int:{age:'52M',wt:'82kg',hx:'Needs hip replacement, reported penicillin allergy age 10',exam:'No current symptoms',vitals:{HR:'72',BP:'138/82'},labs:{PenTest:'Negative skin test'}},adv:{age:'28F',wt:'62kg',hx:'Rash, fever, facial swelling 3wks after starting allopurinol',exam:'Morbilliform rash, facial edema, lymphadenopathy',vitals:{HR:'102',BP:'108/68',T:'39.1'},labs:{Eos:'18%',ALT:'245',Cr:'1.8'}}};
const Q=[
{t:'Penicillin Cross-Reactivity',q:'True penicillin allergy. Cross-reactivity with cephalosporins?',h:'Updated data shows low risk',o:[{id:'a',txt:'1-2% with all cephalosporins (not 10% as previously thought)',c:1,p:100},{id:'b',txt:'10% cross-reactivity',c:0,p:30},{id:'c',txt:'100% - never give cephalosporins',c:0,p:0}],fb:{1:'<b>Correct!</b> Cross-reactivity ~1-2% overall. Higher with 1st gen (similar R1 side chain). 3rd/4th gen very low risk.',0:'<b>Updated data:</b> 1-2% cross-reactivity. The 10% myth is outdated.'}},
{t:'Skin Testing',q:'Penicillin skin testing includes which components?',h:'Major and minor determinants',o:[{id:'a',txt:'Penicilloyl-polylysine (major) + penicillin G + minor determinant mix',c:1,p:100},{id:'b',txt:'Amoxicillin only',c:0,p:20},{id:'c',txt:'Penicillin G only',c:0,p:30}],fb:{1:'<b>Correct!</b> Full testing: PPL (major determinant), penicillin G, minor determinant mix. NPV >95% if all negative.',0:'<b>Testing:</b> Major + minor determinants. Negative test = safe to give penicillin.'}},
{t:'Negative Skin Test',q:'Negative penicillin skin test. Next step?',h:'Oral challenge confirms safety',o:[{id:'a',txt:'Oral amoxicillin challenge (usually single dose)',c:1,p:100},{id:'b',txt:'Full penicillin course without challenge',c:0,p:30},{id:'c',txt:'Never give penicillin anyway',c:0,p:0}],fb:{1:'<b>Correct!</b> After negative skin test: oral challenge (typically amoxicillin 250-500mg). If tolerated, remove penicillin allergy label.',0:'<b>After negative test:</b> Oral challenge confirms. Then de-label the patient.'}},
{t:'DRESS Criteria',q:'Rash + fever + eosinophilia + organ involvement. Diagnosis?',h:'Drug Reaction with Eosinophilia and Systemic Symptoms',o:[{id:'a',txt:'DRESS syndrome (RegiSCAR criteria)',c:1,p:100},{id:'b',txt:'Simple drug rash',c:0,p:20},{id:'c',txt:'SJS/TEN',c:0,p:30}],fb:{1:'<b>Correct!</b> DRESS: Rash + fever + eosinophilia + organ involvement (liver, kidney, lung) + lymphadenopathy. Onset 2-8 wks.',0:'<b>DRESS:</b> Systemic reaction with eosinophilia and organ involvement. High mortality.'}},
{t:'DRESS Treatment',q:'Confirmed DRESS syndrome. Treatment?',h:'Stop drug + supportive',o:[{id:'a',txt:'Stop offending drug + systemic corticosteroids',c:1,p:100},{id:'b',txt:'Continue drug at lower dose',c:0,p:0},{id:'c',txt:'Antihistamines only',c:0,p:20}],fb:{1:'<b>Correct!</b> DRESS: Immediate drug discontinuation + systemic steroids (prednisone 1-2 mg/kg). Monitor for viral reactivation (HHV-6).',0:'<b>DRESS Rx:</b> Stop drug immediately. Steroids for severe cases.'}},
{t:'SJS/TEN Distinction',q:'How to distinguish SJS from TEN?',h:'Body surface area involvement',o:[{id:'a',txt:'SJS <10% BSA, SJS-TEN overlap 10-30%, TEN >30%',c:1,p:100},{id:'b',txt:'Same disease, different names',c:0,p:10},{id:'c',txt:'TEN has blisters, SJS doesnt',c:0,p:20}],fb:{1:'<b>Correct!</b> SJS <10% BSA detachment, TEN >30%. Both have mucosal involvement and epidermal necrosis.',0:'<b>BSA classification:</b> <10% SJS, 10-30% overlap, >30% TEN.'}},
{t:'Desensitization Indication',q:'When is drug desensitization appropriate?',h:'No alternative exists',o:[{id:'a',txt:'When drug is essential and no safe alternative (eg penicillin for syphilis in pregnancy)',c:1,p:100},{id:'b',txt:'Any patient with drug allergy',c:0,p:10},{id:'c',txt:'DRESS or SJS history',c:0,p:0}],fb:{1:'<b>Correct!</b> Desensitization for IgE-mediated reactions when drug essential. NEVER for DRESS, SJS/TEN, or severe cutaneous reactions.',0:'<b>Desensitization:</b> Only for IgE-mediated. Contraindicated in severe delayed reactions.'}},
{t:'Common Culprits',q:'Most common drugs causing DRESS?',h:'Anticonvulsants and antibiotics',o:[{id:'a',txt:'Anticonvulsants (carbamazepine, phenytoin), allopurinol, sulfonamides',c:1,p:100},{id:'b',txt:'Penicillins only',c:0,p:20},{id:'c',txt:'NSAIDs',c:0,p:30}],fb:{1:'<b>Correct!</b> DRESS culprits: Aromatic anticonvulsants, allopurinol (especially in HLA-B*5801+), sulfonamides, vancomycin.',0:'<b>DRESS drugs:</b> Anticonvulsants, allopurinol, sulfonamides most common.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>💊 The Suspicious Rash</h1><p style="color:var(--muted);margin-bottom:32px">Drug Allergy: Penicillin testing, cross-reactivity, DRESS, SJS/TEN, desensitization</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">💉 Drug Reaction</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Drug Allergy Pearls</div><div class="pearl-item"><b>Cross-reactivity:</b> PCN-ceph only 1-2% (not 10%)</div><div class="pearl-item"><b>Skin test:</b> PPL + penicillin G + minor determinants</div><div class="pearl-item"><b>DRESS:</b> Rash + fever + eos + organ involvement. Steroids.</div><div class="pearl-item"><b>SJS/TEN:</b> <10% vs >30% BSA detachment</div><div class="pearl-item"><b>Desensitization:</b> Only IgE-mediated, never DRESS/SJS</div></div><div class="cross-link"><a href="../mechanism/allergy-immunology.html">MechanismDx: Allergy</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
