<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypoglycemia | Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0369a1 0%, #0ea5e9 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(3, 105, 161, 0.9); border-radius: 16px; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; background: #0ea5e9; margin-left: 10px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #0ea5e9, #7dd3fc); border-radius: 3px; }
        .scene { background: linear-gradient(135deg, #0369a1, #0284c7); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .scene-header { background: rgba(14, 165, 233, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #7dd3fc; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(14,165,233,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #0ea5e9, #0284c7); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #7dd3fc; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','whipple','symptoms','causes','diabetic','nondiabetic','workup','treatment','prevention','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">📉 Hypoglycemia<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Found Unresponsive</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What comorbidities would change your management approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Always consider mimics and look-alikes in your differential</p>
                </div><div class="narrative"><p>A <span class="highlight">68-year-old diabetic man</span> on insulin is found <span class="critical">confused and diaphoretic</span> by his wife. He skipped dinner last night.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 110, BP 160/95, diaphoretic<br><strong>Glucose:</strong> 38 mg/dL<br><strong>Meds:</strong> Glargine 40 units daily, lispro with meals</p></div><div class="alert-box"><div class="alert-title">🚨 Hypoglycemia is an Emergency!</div><p>Brain depends on glucose. Prolonged hypoglycemia causes permanent neurological damage. Treat immediately - don't wait for labs!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why This Happens</div><div class="pathway"><strong>This patient:</strong><br>• Took evening insulin<br>• Skipped dinner<br>• Glucose used overnight without replacement<br>• Long-acting insulin continues to work<br>→ Morning hypoglycemia<br><br><strong>Most common causes in diabetics:</strong><br>• Missed meals<br>• Too much insulin<br>• Increased activity<br>• Alcohol</div></div><button class="btn" onclick="nextStage()">Whipple's Triad →</button></div></div>`;
    };

    window.render_whipple = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">Whipple's Triad</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate acuity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would renal or hepatic impairment affect drug dosing?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Whipple's Triad (Diagnostic Criteria)</div><table class="comparison-table"><tr><th>Criterion</th><th>Description</th></tr><tr><td><strong>1. Symptoms</strong></td><td>Consistent with hypoglycemia</td></tr><tr><td><strong>2. Low glucose</strong></td><td>Documented at time of symptoms</td></tr><tr><td><strong>3. Resolution</strong></td><td>Symptoms resolve with glucose correction</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Definition of Hypoglycemia</div><div class="pathway"><strong>Diabetic patients:</strong><br>• Alert value: <70 mg/dL<br>• Clinically significant: <54 mg/dL<br><br><strong>Non-diabetic patients:</strong><br>• Generally <55 mg/dL with symptoms<br>• Whipple's triad required for diagnosis<br><br><strong>Severe hypoglycemia:</strong><br>Any level requiring assistance from another person</div></div><button class="btn" onclick="nextStage()">Symptoms →</button></div></div>`;
    };

    window.render_symptoms = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">Clinical Manifestations</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the most likely diagnosis given this presentation?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if the patient doesn't respond to initial treatment?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Reassess if the patient isn't improving as expected</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Adrenergic vs Neuroglycopenic</div><table class="comparison-table"><tr><th>Adrenergic (Early)</th><th>Neuroglycopenic (Late)</th></tr><tr><td>Tremor</td><td>Confusion</td></tr><tr><td>Palpitations</td><td>Difficulty concentrating</td></tr><tr><td>Anxiety</td><td>Behavioral changes</td></tr><tr><td>Diaphoresis</td><td>Visual changes</td></tr><tr><td>Hunger</td><td>Seizures</td></tr><tr><td>Pallor</td><td>Loss of consciousness</td></tr><tr><td>Tachycardia</td><td>Coma, death</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 Hypoglycemia Unawareness</div><p>Repeated hypoglycemia → blunted counter-regulatory response → no warning symptoms! Patient goes straight to neuroglycopenic symptoms. Common in tight control, long-standing DM.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Counter-Regulatory Hormones</div><div class="pathway">As glucose falls:<br>1. ↓ Insulin secretion (68 mg/dL)<br>2. ↑ Glucagon (68 mg/dL)<br>3. ↑ Epinephrine (65 mg/dL) → symptoms<br>4. ↑ Cortisol, GH (~60 mg/dL)<br><br>In diabetics, glucagon response often impaired<br>→ Depend on epinephrine for symptoms</div></div><button class="btn" onclick="nextStage()">Causes →</button></div></div>`;
    };

    window.render_causes = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">Causes of Hypoglycemia</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What key history element is most helpful here?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What's the evidence level for the standard treatment?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Etiology</div><table class="comparison-table"><tr><th>Category</th><th>Examples</th></tr><tr><td><strong>Drug-induced</strong></td><td>Insulin, sulfonylureas, alcohol</td></tr><tr><td><strong>Critical illness</strong></td><td>Sepsis, liver failure, renal failure</td></tr><tr><td><strong>Hormone deficiency</strong></td><td>Adrenal insufficiency, hypopituitarism</td></tr><tr><td><strong>Endogenous hyperinsulinism</strong></td><td>Insulinoma, nesidioblastosis</td></tr><tr><td><strong>Factitious</strong></td><td>Exogenous insulin/sulfonylurea use</td></tr><tr><td><strong>Other</strong></td><td>Non-islet cell tumors, post-gastric bypass</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ Ill or Medicated Patient</div><p>Most hypoglycemia in adults is in diabetics on treatment or critically ill patients. Spontaneous hypoglycemia in healthy-appearing adults is rare!</p></div><button class="btn" onclick="nextStage()">Diabetic Causes →</button></div></div>`;
    };

    window.render_diabetic = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">Hypoglycemia in Diabetics</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Which physical exam finding is most specific?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> When would you involve subspecialty consultation?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fefce8; border:1px solid #eab308; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #eab308;">
                    <p style="margin:0; color:#854d0e; font-size:0.9rem;"><strong>🚫 Common Mistake:</strong> Avoid anchoring bias - keep your differential broad initially</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Common Precipitants</div><table class="comparison-table"><tr><th>Factor</th><th>Mechanism</th></tr><tr><td><strong>Missed/delayed meal</strong></td><td>Insulin without carb intake</td></tr><tr><td><strong>Insulin excess</strong></td><td>Wrong dose, stacking</td></tr><tr><td><strong>Increased activity</strong></td><td>↑ Glucose uptake</td></tr><tr><td><strong>Alcohol</strong></td><td>Inhibits gluconeogenesis</td></tr><tr><td><strong>Renal impairment</strong></td><td>↓ Insulin clearance</td></tr><tr><td><strong>Weight loss</strong></td><td>↓ Insulin requirements</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 High-Risk Medications</div><div class="pathway"><strong>Insulin:</strong> Any type can cause hypoglycemia<br>• Rapid-acting: Lispro, aspart, glulisine<br>• Long-acting: Glargine, detemir, degludec<br><br><strong>Sulfonylureas:</strong> Stimulate insulin release<br>• Glyburide (longest-acting, most hypos)<br>• Glipizide, glimepiride<br><br><strong>Lower risk:</strong><br>Metformin, SGLT2i, GLP-1 agonists<br>(rarely cause hypo alone)</div></div><button class="btn" onclick="nextStage()">Non-Diabetic →</button></div></div>`;
    };

    window.render_nondiabetic = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">Non-Diabetic Hypoglycemia</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Consider the most common causes first, then rarer ones</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What are the key complications to monitor for?</p>
                </div><div class="alert-box"><div class="alert-title">🚨 Rare but Important!</div><p>Spontaneous hypoglycemia in non-diabetic adults is uncommon. Requires thorough evaluation. Key: Is insulin appropriately suppressed?</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Insulinoma Workup</div><table class="comparison-table"><tr><th>Test</th><th>Insulinoma</th><th>Exogenous Insulin</th><th>Sulfonylurea</th></tr><tr><td>Glucose</td><td>Low</td><td>Low</td><td>Low</td></tr><tr><td>Insulin</td><td>High</td><td>High</td><td>High</td></tr><tr><td>C-peptide</td><td>High</td><td>LOW</td><td>High</td></tr><tr><td>Proinsulin</td><td>High</td><td>Low</td><td>High</td></tr><tr><td>SU screen</td><td>Negative</td><td>Negative</td><td>POSITIVE</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 C-peptide is Key!</div><div class="pathway"><strong>C-peptide:</strong><br>• Released 1:1 with endogenous insulin<br>• NOT present in exogenous insulin<br><br>Low glucose + high insulin + LOW C-peptide<br>= Exogenous insulin (factitious)<br><br>Low glucose + high insulin + HIGH C-peptide<br>= Endogenous hyperinsulinism<br>→ Insulinoma or sulfonylurea</div></div><button class="btn" onclick="nextStage()">Workup →</button></div></div>`;
    };

    window.render_workup = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 10</div><div class="scene-title">Diagnostic Approach</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What comorbidities would change your management approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#f5f3ff; border:1px solid #8b5cf6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #8b5cf6;">
                    <p style="margin:0; color:#5b21b6; font-size:0.9rem;"><strong>📋 Board Tip:</strong> Document your clinical reasoning clearly</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 72-Hour Fast</div><table class="comparison-table"><tr><th>Phase</th><th>Details</th></tr><tr><td><strong>Indication</strong></td><td>Suspected insulinoma, unexplained hypoglycemia</td></tr><tr><td><strong>Duration</strong></td><td>Up to 72 hours (most positive by 48h)</td></tr><tr><td><strong>End fast when</strong></td><td>Glucose <45 with symptoms</td></tr><tr><td><strong>Labs at end</strong></td><td>Glucose, insulin, C-peptide, proinsulin, β-hydroxybutyrate, SU screen</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Interpreting Results</div><div class="pathway"><strong>During fast, should see:</strong><br>• ↓ Insulin (appropriately suppressed)<br>• ↑ β-hydroxybutyrate (ketones)<br>• ↓ C-peptide<br><br><strong>Insulinoma shows:</strong><br>• Insulin ≥3 µU/mL (inappropriately high)<br>• C-peptide ≥0.6 ng/mL<br>• β-hydroxybutyrate ≤2.7 mmol/L (low ketones)<br>• Proinsulin ≥5 pmol/L<br><br>If positive → Localization imaging<br>(CT, MRI, EUS)</div></div><button class="btn" onclick="nextStage()">Treatment →</button></div></div>`;
    };

    window.render_treatment = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 10</div><div class="scene-title">Acute Treatment</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate acuity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would renal or hepatic impairment affect drug dosing?</p>
                </div><div class="alert-box"><div class="alert-title">🚨 Treat First, Ask Questions Later!</div><p>Don't wait for confirmation if hypoglycemia suspected clinically. Brain damage occurs within minutes of severe hypoglycemia.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Treatment Options</div><table class="comparison-table"><tr><th>Patient Status</th><th>Treatment</th></tr><tr><td><strong>Conscious, able to swallow</strong></td><td>15-20g fast-acting carbs (juice, glucose tabs)</td></tr><tr><td><strong>Unconscious, IV access</strong></td><td>D50 25-50 mL IV (12.5-25g glucose)</td></tr><tr><td><strong>Unconscious, no IV</strong></td><td>Glucagon 1 mg IM/SQ/intranasal</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Rule of 15</div><div class="pathway"><strong>Conscious patient:</strong><br>1. Give 15g fast-acting carbs<br>2. Wait 15 minutes<br>3. Recheck glucose<br>4. If still <70, repeat 15g<br>5. Once >70, eat snack with protein/fat<br><br><strong>IV dextrose:</strong><br>• D50 = 25g in 50 mL<br>• D10 preferred for continuous infusion<br>• D50 can cause phlebitis</div></div><button class="btn" onclick="nextStage()">Prevention →</button></div></div>`;
    };

    window.render_prevention = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 10</div><div class="scene-title">Prevention Strategies</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the most likely diagnosis given this presentation?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if the patient doesn't respond to initial treatment?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">

(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];

    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +

            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +

            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
