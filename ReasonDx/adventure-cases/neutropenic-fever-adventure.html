<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Febrile Neutropenic | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#06B6D4;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#0891B2,#06B6D4);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(6,182,212,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(6,182,212,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#000;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(6,182,212,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#000}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#000;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🦠 The Febrile Neutropenic</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'58M',wt:'78kg',hx:'AML s/p chemo day 10, fever 38.5C, no localizing symptoms',exam:'Port site clean, no rashes, lungs clear',vitals:{HR:'98',BP:'118/72',T:'38.5'},labs:{ANC:'180',WBC:'0.4',Plt:'28k'}},int:{age:'45F',wt:'62kg',hx:'Lymphoma s/p chemo, fever 39.2C, perianal pain',exam:'Perianal erythema, tender, no fluctuance',vitals:{HR:'112',BP:'98/62',T:'39.2'},labs:{ANC:'50',Lactate:'2.8'}},adv:{age:'62M',wt:'85kg',hx:'HSCT day +14, fever, new pulmonary infiltrates',exam:'Hypoxic, diffuse crackles',vitals:{HR:'108',BP:'108/68',T:'38.8',SpO2:'88%'},labs:{ANC:'20',BDG:'High',Galact:'Positive'}}};
const Q=[
{t:'Definition',q:'Febrile neutropenia definition?',h:'ANC + temperature',o:[{id:'a',txt:'ANC less than 500 (or expected to fall) + single temp >=38.3C or >=38C for 1hr',c:1,p:100},{id:'b',txt:'Any fever with cancer',c:0,p:20},{id:'c',txt:'WBC less than 4000',c:0,p:30}],fb:{1:'<b>Correct!</b> ANC less than 500/uL (or less than 1000 and falling) + fever >=38.3C once OR >=38.0C sustained 1hr.',0:'<b>Definition:</b> ANC less than 500 + fever. Critical to recognize promptly.'}},
{t:'Time to Antibiotics',q:'Time goal from fever recognition to antibiotics?',h:'Mortality increases with delay',o:[{id:'a',txt:'Within 60 minutes (ideally 30 min) - each hour delay increases mortality',c:1,p:100},{id:'b',txt:'Within 4 hours',c:0,p:30},{id:'c',txt:'After cultures return',c:0,p:0}],fb:{1:'<b>Correct!</b> Door-to-antibiotic less than 60 min. Studies show 18% increased mortality per hour of delay. Dont wait for cultures.',0:'<b>Timing:</b> Within 60 min. Every hour delay increases mortality.'}},
{t:'Empiric Coverage',q:'Empiric antibiotic for uncomplicated febrile neutropenia?',h:'Anti-pseudomonal',o:[{id:'a',txt:'Anti-pseudomonal beta-lactam monotherapy (cefepime, pip-tazo, meropenem)',c:1,p:100},{id:'b',txt:'Vancomycin alone',c:0,p:20},{id:'c',txt:'Oral fluoroquinolone',c:0,p:20}],fb:{1:'<b>Correct!</b> Monotherapy: Cefepime, pip-tazo, meropenem, or imipenem. Add vancomycin only for specific indications.',0:'<b>Monotherapy:</b> Anti-pseudomonal beta-lactam. Cefepime most common.'}},
{t:'When to Add Vancomycin',q:'Indications to add vancomycin to empiric regimen?',h:'Not routine',o:[{id:'a',txt:'Hemodynamic instability, skin/soft tissue infection, catheter infection, MRSA colonized',c:1,p:100},{id:'b',txt:'All febrile neutropenia',c:0,p:20},{id:'c',txt:'Never add vancomycin',c:0,p:10}],fb:{1:'<b>Correct!</b> Add vanc for: Hypotension, pneumonia, skin infection, catheter site infection, known MRSA, mucositis. Not routine.',0:'<b>Vancomycin:</b> Only for specific indications. Routine use increases resistance.'}},
{t:'MASCC Score',q:'MASCC score used for?',h:'Risk stratification',o:[{id:'a',txt:'Identify low-risk patients who may be eligible for outpatient oral antibiotics',c:1,p:100},{id:'b',txt:'Determine antibiotic choice',c:0,p:30},{id:'c',txt:'Predict mortality',c:0,p:30}],fb:{1:'<b>Correct!</b> MASCC >=21 = low risk. Consider oral cipro + amox-clav outpatient if reliable, close follow-up, no high-risk features.',0:'<b>MASCC:</b> Risk stratification. High score = low risk, consider outpatient.'}},
{t:'Fungal Coverage',q:'When to add empiric antifungal?',h:'Prolonged neutropenia',o:[{id:'a',txt:'Persistent fever after 4-7 days of antibiotics in high-risk patient',c:1,p:100},{id:'b',txt:'All febrile neutropenia',c:0,p:20},{id:'c',txt:'Never empirically',c:0,p:10}],fb:{1:'<b>Correct!</b> Add antifungal if fever persists 4-7 days on antibiotics. Consider earlier if high-risk (prolonged neutropenia, HSCT, steroids).',0:'<b>Antifungal:</b> Persistent fever 4-7 days. Earlier if high-risk.'}},
{t:'G-CSF',q:'Role of G-CSF in febrile neutropenia?',h:'Not always indicated',o:[{id:'a',txt:'Consider if high-risk features, pneumonia, sepsis, or expected prolonged neutropenia',c:1,p:100},{id:'b',txt:'All febrile neutropenia',c:0,p:30},{id:'c',txt:'Contraindicated',c:0,p:10}],fb:{1:'<b>Correct!</b> G-CSF not routine. Consider for high-risk: Pneumonia, sepsis, fungal infection, prolonged expected neutropenia, age >65.',0:'<b>G-CSF:</b> Reserved for high-risk features. Not routine.'}},
{t:'Duration',q:'How long to continue antibiotics in uncomplicated FN?',h:'Depends on ANC recovery',o:[{id:'a',txt:'Until afebrile AND ANC >=500 for 48hrs (minimum usually 7 days)',c:1,p:100},{id:'b',txt:'Fixed 14 days',c:0,p:30},{id:'c',txt:'Stop when afebrile',c:0,p:20}],fb:{1:'<b>Correct!</b> Continue until afebrile x48hrs AND ANC recovering >=500. If documented infection, treat that duration.',0:'<b>Duration:</b> Afebrile + ANC >=500 for 48hrs. Usually minimum 7 days.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🦠 The Febrile Neutropenic</h1><p style="color:var(--muted);margin-bottom:32px">Febrile Neutropenia: Definition, empiric abx, MASCC, fungal coverage</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🏥 Oncologic Emergency</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Febrile Neutropenia Pearls</div><div class="pearl-item"><b>Definition:</b> ANC less than 500 + fever >=38.3C</div><div class="pearl-item"><b>Timing:</b> Antibiotics within 60 min</div><div class="pearl-item"><b>Empiric:</b> Anti-pseudomonal monotherapy</div><div class="pearl-item"><b>Vancomycin:</b> Only for specific indications</div><div class="pearl-item"><b>Antifungal:</b> If persistent fever 4-7 days</div></div><div class="cross-link"><a href="../mechanism/infectious-disease.html">MechanismDx: ID</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
