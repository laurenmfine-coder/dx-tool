<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Failing Pump | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#EF4444;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#B91C1C,#EF4444);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(239,68,68,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(239,68,68,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(239,68,68,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🫀 The Failing Pump</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'62M',wt:'88kg',hx:'Dyspnea, orthopnea, 5kg weight gain x2wks',exam:'JVD, S3, 2+ edema, bibasilar crackles',vitals:{HR:'92',BP:'142/88'},labs:{BNP:'1240',Cr:'1.3',EF:'30%'}},int:{age:'75F',wt:'60kg',hx:'Exertional dyspnea, HTN, DM, preserved EF',exam:'Mild edema, clear lungs',vitals:{HR:'78',BP:'158/92'},labs:{BNP:'420',Cr:'1.1',EF:'55%'}},adv:{age:'58M',wt:'95kg',hx:'Acute decompensation, cold extremities, on carvedilol',exam:'Cool, clammy, JVD, hypotensive',vitals:{HR:'110',BP:'78/52'},labs:{BNP:'2800',Cr:'2.4',Lactate:'4.2',EF:'15%'}}};
const Q=[
{t:'HF Classification',q:'EF 30%. Classification?',h:'HFrEF <40%, HFmrEF 40-49%, HFpEF ≥50%',o:[{id:'a',txt:'HFrEF (reduced EF <40%)',c:1,p:100},{id:'b',txt:'HFmrEF (40-49%)',c:0,p:30},{id:'c',txt:'HFpEF (≥50%)',c:0,p:0}],fb:{1:'<b>Correct!</b> EF 30% = HFrEF. Treatment differs by phenotype.',0:'<b>Classification:</b> <40% reduced, 40-49% mildly reduced, ≥50% preserved.'}},
{t:'GDMT Pillars',q:'Four pillars of GDMT for HFrEF?',h:'Mortality-reducing therapies',o:[{id:'a',txt:'ARNI/ACEi + BB + MRA + SGLT2i',c:1,p:100},{id:'b',txt:'Diuretics + digoxin',c:0,p:20},{id:'c',txt:'ACEi + BB only',c:0,p:40}],fb:{1:'<b>Correct!</b> 4 pillars: ARNI (or ACEi/ARB) + BB + MRA + SGLT2i. Diuretics for symptoms only.',0:'<b>GDMT:</b> ARNI + BB + MRA + SGLT2i all reduce mortality.'}},
{t:'Diuretic Dosing',q:'Home furosemide 40mg PO. IV dose for ADHF?',h:'IV bioavailability higher',o:[{id:'a',txt:'40-80 mg IV (1-2.5x home dose)',c:1,p:100},{id:'b',txt:'20 mg IV',c:0,p:20},{id:'c',txt:'160 mg IV',c:0,p:30}],fb:{1:'<b>Correct!</b> ADHF: IV dose = 1-2.5x home oral. Goal UOP 3-5 L/day.',0:'<b>Dosing:</b> Match or exceed home dose IV.'}},
{t:'Cardiogenic Shock',q:'Hypotensive HF. Initial vasopressor?',h:'Depends on perfusion',o:[{id:'a',txt:'Norepinephrine (if hypotensive)',c:1,p:100},{id:'b',txt:'Dopamine',c:0,p:30},{id:'c',txt:'Milrinone first',c:0,p:20}],fb:{1:'<b>Correct!</b> Hypotensive: NE first. Low output without hypotension: dobutamine.',0:'<b>Agent:</b> NE if hypotensive, dobutamine if normotensive low-output.'}},
{t:'Beta-Blocker in ADHF',q:'Acute decompensation on home carvedilol. Continue?',h:'Warm vs cold',o:[{id:'a',txt:'Continue/reduce if warm; hold if cold/shocked',c:1,p:100},{id:'b',txt:'Always stop BB',c:0,p:0},{id:'c',txt:'Always continue full dose',c:0,p:20}],fb:{1:'<b>Correct!</b> Warm=continue/reduce. Cold=hold. Never abruptly stop. Never START BB in ADHF.',0:'<b>Nuanced:</b> Continue if perfused, hold if shocked.'}},
{t:'Diuretic Resistance',q:'Poor response to IV furosemide. Next step?',h:'Sequential nephron blockade',o:[{id:'a',txt:'Add thiazide (metolazone)',c:1,p:100},{id:'b',txt:'Switch to oral',c:0,p:0},{id:'c',txt:'Stop diuretics',c:0,p:0}],fb:{1:'<b>Correct!</b> Add metolazone 2.5-5mg for sequential nephron blockade.',0:'<b>Resistance:</b> Increase dose, add thiazide, or continuous infusion.'}},
{t:'Cardiorenal',q:'Cr rising with diuresis. Stop diuretics?',h:'Decongestion often priority',o:[{id:'a',txt:'Continue if still congested - transient Cr rise OK',c:1,p:100},{id:'b',txt:'Stop all diuretics',c:0,p:0},{id:'c',txt:'Start dialysis',c:0,p:10}],fb:{1:'<b>Correct!</b> Transient Cr rise acceptable during decongestion. Persistent congestion worsens outcomes.',0:'<b>Don\'t fear Cr rise!</b> Mild increases during effective decongestion acceptable.'}},
{t:'SGLT2i',q:'When to start SGLT2i in HFrEF?',h:'Recent trials show early safe',o:[{id:'a',txt:'Can start during hospitalization once stable',c:1,p:100},{id:'b',txt:'Only after discharge',c:0,p:40},{id:'c',txt:'Only if diabetic',c:0,p:20}],fb:{1:'<b>Correct!</b> SGLT2i reduce HF hospitalizations regardless of DM. Safe to start in-hospital.',0:'<b>SGLT2i:</b> Benefit independent of diabetes. EMPULSE showed in-hospital safety.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next →':'Results →';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🫀 The Failing Pump</h1><p style="color:var(--muted);margin-bottom:32px">Heart Failure: Classification, GDMT, diuretics, cardiogenic shock</p><button class="start-btn" onclick="go(\'pres\')">Begin Case →</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">💔 Cardiac Decompensation</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment →</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">🔍 '+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">💡 '+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit →</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">📌 Heart Failure Pearls</div><div class="pearl-item"><b>Classification:</b> HFrEF <40%, HFmrEF 40-49%, HFpEF ≥50%</div><div class="pearl-item"><b>GDMT:</b> ARNI + BB + MRA + SGLT2i (all reduce mortality)</div><div class="pearl-item"><b>Diuretics:</b> IV dose = 1-2.5x home PO dose</div><div class="pearl-item"><b>Shock:</b> NE if hypotensive, dobutamine if low-output</div><div class="pearl-item"><b>BB:</b> Continue if warm, hold if cold/shocked</div></div><div class="cross-link"><a href="../mechanism/hf-module.html">MechanismDx: Heart Failure</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
