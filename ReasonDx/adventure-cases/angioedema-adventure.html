<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Swelling Emergency | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#F87171;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#DC2626,#F87171);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(248,113,113,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(248,113,113,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(248,113,113,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">😮 The Swelling Emergency</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'55M',wt:'88kg',hx:'Lip swelling 2hrs after starting lisinopril',exam:'Lip angioedema, no urticaria, no stridor',vitals:{HR:'82',BP:'148/92'},labs:{Meds:'Lisinopril started 1 week ago'}},int:{age:'32F',wt:'62kg',hx:'Recurrent facial/abdominal swelling since teens, family hx',exam:'Facial edema, no urticaria',vitals:{HR:'78',BP:'118/72'},labs:{C4:'<5',C3:'Normal'}},adv:{age:'45F',wt:'68kg',hx:'Severe laryngeal edema, on ACEi, not responding to epi',exam:'Stridor, drooling, tongue swelling',vitals:{HR:'108',BP:'142/88',SpO2:'91%'},labs:{Hx:'ACEi x3yrs, first episode'}}};
const Q=[
{t:'Histaminergic vs Bradykinin',q:'Angioedema WITHOUT urticaria. Mechanism?',h:'Key distinction',o:[{id:'a',txt:'Bradykinin-mediated (ACEi, HAE)',c:1,p:100},{id:'b',txt:'Histamine/IgE-mediated',c:0,p:30},{id:'c',txt:'Unknown',c:0,p:20}],fb:{1:'<b>Correct!</b> No urticaria = likely bradykinin. With urticaria = histaminergic/allergic. Critical distinction for treatment.',0:'<b>Key rule:</b> Urticaria = histaminergic. No urticaria = bradykinin (wont respond to antihistamines).'}},
{t:'ACEi Angioedema',q:'ACEi angioedema. Why doesnt epinephrine work well?',h:'Mediator difference',o:[{id:'a',txt:'Bradykinin-mediated, not histamine - epi targets wrong pathway',c:1,p:100},{id:'b',txt:'Wrong dose of epi',c:0,p:20},{id:'c',txt:'Epi always works',c:0,p:0}],fb:{1:'<b>Correct!</b> ACEi angioedema = bradykinin excess (decreased degradation). Epi/antihistamines/steroids minimally effective.',0:'<b>ACEi mechanism:</b> Bradykinin accumulation. Epi targets wrong pathway.'}},
{t:'ACEi Treatment',q:'ACEi angioedema with airway compromise. Treatment?',h:'Specific therapies available',o:[{id:'a',txt:'Icatibant (bradykinin B2 antagonist) or C1-INH concentrate, secure airway',c:1,p:100},{id:'b',txt:'Epinephrine alone',c:0,p:30},{id:'c',txt:'High-dose steroids',c:0,p:20}],fb:{1:'<b>Correct!</b> Icatibant or C1-INH if available. Prepare for airway management. FFP if specific agents unavailable.',0:'<b>ACEi Rx:</b> Icatibant, C1-INH, or FFP. Airway management priority.'}},
{t:'HAE Screening',q:'Recurrent angioedema without urticaria, family history. First test?',h:'Complement pathway',o:[{id:'a',txt:'C4 level (screening test - low in HAE)',c:1,p:100},{id:'b',txt:'IgE level',c:0,p:10},{id:'c',txt:'Tryptase',c:0,p:20}],fb:{1:'<b>Correct!</b> C4 is screening test - low during AND between attacks in HAE. If low, check C1-INH level and function.',0:'<b>C4:</b> Screening test for HAE. Low = check C1-INH level and function.'}},
{t:'HAE Types',q:'Low C4, low C1-INH level and function. HAE type?',h:'Type 1 vs Type 2',o:[{id:'a',txt:'HAE Type 1 (85% - low quantity)',c:1,p:100},{id:'b',txt:'HAE Type 2 (dysfunctional)',c:0,p:40},{id:'c',txt:'Acquired angioedema',c:0,p:20}],fb:{1:'<b>Correct!</b> Type 1: Low C1-INH level AND function. Type 2: Normal/high level, low function. Acquired: check C1q (low in acquired).',0:'<b>HAE types:</b> Type 1 = low level. Type 2 = dysfunctional. Check C1q to exclude acquired.'}},
{t:'HAE Acute Treatment',q:'Acute HAE attack with laryngeal involvement. Treatment?',h:'On-demand therapy',o:[{id:'a',txt:'C1-INH concentrate, icatibant, or ecallantide',c:1,p:100},{id:'b',txt:'Epinephrine and steroids',c:0,p:20},{id:'c',txt:'Antihistamines',c:0,p:0}],fb:{1:'<b>Correct!</b> HAE acute: C1-INH (Berinert, Cinryze), icatibant (Firazyr), ecallantide (Kalbitor). NOT epi/steroids/antihistamines.',0:'<b>HAE acute Rx:</b> C1-INH, icatibant, or ecallantide. Traditional allergic Rx doesnt work.'}},
{t:'HAE Prophylaxis',q:'HAE with frequent attacks. Long-term prophylaxis?',h:'Prevent attacks',o:[{id:'a',txt:'Lanadelumab (anti-kallikrein) or subcutaneous C1-INH',c:1,p:100},{id:'b',txt:'Daily antihistamines',c:0,p:0},{id:'c',txt:'Long-term steroids',c:0,p:10}],fb:{1:'<b>Correct!</b> Prophylaxis: Lanadelumab q2-4wks, SC C1-INH twice weekly, or berotralstat (oral). Danazol rarely used now.',0:'<b>HAE prophylaxis:</b> Lanadelumab, SC C1-INH, berotralstat. Modern therapies very effective.'}},
{t:'Acquired Angioedema',q:'New-onset angioedema age 50, low C1-INH and low C1q. Consider?',h:'Not hereditary',o:[{id:'a',txt:'Acquired angioedema (associated with lymphoproliferative disorders)',c:1,p:100},{id:'b',txt:'HAE presenting late',c:0,p:30},{id:'c',txt:'ACEi angioedema',c:0,p:20}],fb:{1:'<b>Correct!</b> Acquired: Low C1q (normal in HAE). Associated with lymphoma, MGUS, autoimmune. Screen for underlying malignancy.',0:'<b>Acquired:</b> Low C1q distinguishes from HAE. Look for lymphoproliferative disease.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>😮 The Swelling Emergency</h1><p style="color:var(--muted);margin-bottom:32px">Angioedema: ACEi, HAE types, bradykinin vs histamine, acute treatment</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🚨 Airway Emergency</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Angioedema Pearls</div><div class="pearl-item"><b>Key rule:</b> No urticaria = bradykinin (not histaminergic)</div><div class="pearl-item"><b>ACEi:</b> Icatibant or C1-INH. Epi doesnt work well</div><div class="pearl-item"><b>HAE screen:</b> C4 (low during and between attacks)</div><div class="pearl-item"><b>HAE acute:</b> C1-INH, icatibant, ecallantide</div><div class="pearl-item"><b>Acquired:</b> Low C1q (normal in HAE)</div></div><div class="cross-link"><a href="../mechanism/allergy-immunology.html">MechanismDx: Allergy</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
