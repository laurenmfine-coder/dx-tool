    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"Recurrent Anaphylaxis Without Trigger",content:'<div class="narrative"><p>A <span class="highlight">45-year-old woman</span> presents with <span class="critical">recurrent episodes of flushing, hypotension, and near-syncope</span>. Episodes occur without clear trigger. She also has chronic diarrhea and a history of severe reactions to bee stings. Exam shows brownish skin lesions that urticate when rubbed.</p></div>',question:{prompt:"What sign is demonstrated when skin lesions urticate (wheal and flare) with rubbing?",options:[{text:"Nikolsky sign",correct:false},{text:"Darier sign",correct:true},{text:"Auspitz sign",correct:false},{text:"Koebner phenomenon",correct:false}],explanation:{correct:"Correct! Darier sign: urticaria pigmentosa lesions urticate (wheal and flare) when stroked or rubbed. This is pathognomonic for cutaneous mastocytosis - mast cells degranulate with mechanical stimulation.",incorrect:"Darier sign = lesions urticate when rubbed. Pathognomonic for cutaneous mastocytosis."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Clinical Clues</div><div class="pathway">SUSPECT MAST CELL DISORDER:\n• Recurrent anaphylaxis without trigger\n• Flushing + hypotension\n• Urticaria pigmentosa (brownish macules)\n• Darier sign positive\n• GI symptoms (diarrhea, cramping)\n• Severe hymenoptera reactions\n• Osteoporosis (unexplained)\n\nDARIER SIGN:\nRubbing skin lesion → wheal/flare\n= mast cell degranulation</div></div>',why_chain:[],points:10}},
        {title:"Understanding Mastocytosis",content:'<div class="narrative"><p>Mastocytosis is a clonal disorder of mast cells. It can be limited to skin or involve systemic organs.</p></div>',question:{prompt:"What mutation is found in >90% of systemic mastocytosis?",options:[{text:"JAK2 V617F",correct:false},{text:"KIT D816V",correct:true},{text:"BCR-ABL",correct:false},{text:"BRAF V600E",correct:false}],explanation:{correct:"Correct! KIT D816V mutation is found in >90% of systemic mastocytosis. This activating mutation causes uncontrolled mast cell proliferation. Important for diagnosis and has treatment implications.",incorrect:"KIT D816V is found in >90% of systemic mastocytosis. This is an activating mutation causing mast cell proliferation."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Mastocytosis Classification</div><div class="pathway">CUTANEOUS MASTOCYTOSIS:\n• Limited to skin\n• Urticaria pigmentosa most common\n• Usually children, often resolves\n\nSYSTEMIC MASTOCYTOSIS:\n• Mast cells infiltrate organs\n• Bone marrow, liver, spleen, GI\n• KIT D816V mutation >90%\n\nVARIANTS:\n• Indolent SM (most common adult)\n• Smoldering SM\n• SM with associated hematologic neoplasm\n• Aggressive SM\n• Mast cell leukemia (rare)</div></div>',why_chain:[],points:10}},
        {title:"Diagnosis: Serum Tryptase",content:'<div class="narrative"><p>You order labs to evaluate for mastocytosis.</p></div>',question:{prompt:"What is the BEST screening test for systemic mastocytosis?",options:[{text:"Serum IgE",correct:false},{text:"Serum tryptase",correct:true},{text:"Urinary histamine",correct:false},{text:"Skin biopsy only",correct:false}],explanation:{correct:"Correct! Serum tryptase is the best screening test. Baseline tryptase >20 ng/mL is a minor criterion for diagnosis. Also useful during acute episodes (peak 1-2h, lasts 24h). Confirm with bone marrow biopsy.",incorrect:"Serum tryptase is the screening test. >20 ng/mL is a minor diagnostic criterion. Bone marrow biopsy confirms."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Diagnostic Criteria</div><div class="pathway">MAJOR CRITERION:\n• Multifocal dense mast cell aggregates\n  (≥15 mast cells) in bone marrow or\n  extracutaneous tissue\n\nMINOR CRITERIA (need 3, or 1 + major):\n• >25% spindle-shaped mast cells\n• KIT D816V mutation\n• CD25 or CD2 expression on mast cells\n• Serum tryptase >20 ng/mL\n\nWORKUP:\n• Serum tryptase (baseline)\n• Bone marrow biopsy\n• KIT mutation analysis\n• Consider skin biopsy</div></div>',why_chain:[],points:10}},
        {title:"Mast Cell Activation Syndrome",content:'<div class="narrative"><p>Some patients have mast cell symptoms but don\'t meet criteria for mastocytosis. This is Mast Cell Activation Syndrome (MCAS).</p></div>',question:{prompt:"What distinguishes MCAS from systemic mastocytosis?",options:[{text:"MCAS has more severe symptoms",correct:false},{text:"MCAS has episodic symptoms but no clonal mast cell population",correct:true},{text:"MCAS only affects the skin",correct:false},{text:"MCAS has higher tryptase levels",correct:false}],explanation:{correct:"Correct! MCAS: episodic mast cell activation symptoms BUT no clonal mast cell population (no KIT mutation, no abnormal aggregates). Tryptase rises during attacks but baseline is often normal.",incorrect:"MCAS = symptoms of mast cell activation WITHOUT clonal mast cell disease. No KIT mutation, no aggregates."},teaching:'<h4>MCAS vs Mastocytosis</h4><table class="comparison-table"><tr><th>Feature</th><th>MCAS</th><th>Systemic Mastocytosis</th></tr><tr><td>Clonal mast cells</td><td>No</td><td>Yes</td></tr><tr><td>KIT mutation</td><td>No</td><td>Yes (>90%)</td></tr><tr><td>Baseline tryptase</td><td>Usually normal</td><td>Often >20</td></tr><tr><td>Tryptase during attack</td><td>↑ >20% + 2</td><td>↑↑</td></tr><tr><td>BM aggregates</td><td>No</td><td>Yes</td></tr></table>',why_chain:[],points:10}},
        {title:"Triggers and Avoidance",content:'<div class="narrative"><p>Patients with mast cell disorders must avoid triggers that can cause degranulation.</p></div>',question:{prompt:"Which is a common trigger for mast cell degranulation?",options:[{text:"Cold temperatures only",correct:false},{text:"NSAIDs, opioids, radiocontrast, hymenoptera stings, temperature extremes",correct:true},{text:"Antihistamines",correct:false},{text:"Epinephrine",correct:false}],explanation:{correct:"Correct! Common triggers: NSAIDs, opioids (morphine, codeine), radiocontrast, alcohol, hymenoptera stings, temperature extremes, stress, infections. Patients need to carry epinephrine and avoid triggers.",incorrect:"Triggers include NSAIDs, opioids, contrast, alcohol, stings, temperature extremes. Avoidance is crucial."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Trigger Avoidance</div><div class="pathway">COMMON TRIGGERS:\n• NSAIDs (aspirin may be okay in some)\n• Opioids (morphine, codeine, meperidine)\n  - Fentanyl usually safer\n• Radiocontrast (premedicate!)\n• Alcohol\n• Hymenoptera stings\n• Temperature extremes\n• Physical exertion\n• Emotional stress\n\nALWAYS CARRY:\n• Epinephrine auto-injectors (2+)\n• Medical alert bracelet</div></div>',why_chain:[],points:10}},
        {title:"Treatment",content:'<div class="narrative"><p>How do you manage patients with mast cell disorders?</p></div>',question:{prompt:"What is the FIRST-LINE maintenance therapy for mast cell disorders?",options:[{text:"Systemic corticosteroids",correct:false},{text:"H1 and H2 antihistamines",correct:true},{text:"Omalizumab",correct:false},{text:"Chemotherapy",correct:false}],explanation:{correct:"Correct! H1 + H2 antihistamines are first-line for symptom control. H1 (cetirizine, loratadine) for skin/flushing. H2 (famotidine) for GI symptoms. Add cromolyn, leukotriene inhibitors as needed.",incorrect:"H1 + H2 antihistamines are first-line. Combine for skin and GI symptom control."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Treatment</div><div class="pathway">MAINTENANCE THERAPY:\n• H1 antihistamines (cetirizine, loratadine)\n• H2 antihistamines (famotidine)\n• Cromolyn sodium (GI symptoms)\n• Leukotriene inhibitors (montelukast)\n\nACUTE ATTACKS:\n• Epinephrine for anaphylaxis\n• Corticosteroids\n• IV fluids\n\nADVANCED/AGGRESSIVE SM:\n• Midostaurin (KIT inhibitor)\n• Avapritinib\n• Cladribine\n• Interferon-alpha</div></div>',why_chain:[],points:10}},
        {title:"Case Resolution",content:'<div class="narrative"><p>Your patient had serum tryptase of 35 ng/mL. Bone marrow biopsy showed mast cell aggregates with KIT D816V mutation. Diagnosed with indolent systemic mastocytosis. Started on H1/H2 blockers with good symptom control. She carries two epinephrine auto-injectors.</p></div><div class="mechanism-box"><div class="mechanism-title">📚 Mast Cell Disorders Summary</div><div class="pathway">SUSPECT IF:\n• Recurrent anaphylaxis without trigger\n• Urticaria pigmentosa + Darier sign\n• Flushing, hypotension, GI symptoms\n\nKEY TESTS:\n• Serum tryptase (>20 = minor criterion)\n• Bone marrow biopsy\n• KIT D816V mutation\n\nMCAS vs MASTOCYTOSIS:\n• MCAS: symptoms without clonal cells\n• SM: clonal mast cell population\n\nTREATMENT:\n• Trigger avoidance\n• H1 + H2 antihistamines\n• Always carry epinephrine</div></div>',question:{prompt:"A patient with mastocytosis needs surgery. What medication should be AVOIDED?",options:[{text:"Fentanyl",correct:false},{text:"Propofol",correct:false},{text:"Morphine",correct:true},{text:"Midazolam",correct:false}],explanation:{correct:"Correct! Avoid morphine, codeine, meperidine - these cause direct mast cell degranulation. Fentanyl is generally safer. Premedicate with antihistamines and steroids for procedures.",incorrect:"Avoid morphine (causes mast cell degranulation). Fentanyl is safer. Premedicate for procedures."},teaching:'<h4>Key Takeaways</h4><ul style="line-height:2;margin-left:20px;"><li>Darier sign = pathognomonic for cutaneous mastocytosis</li><li>KIT D816V mutation in >90% of systemic mastocytosis</li><li>Serum tryptase >20 is a minor criterion</li><li>MCAS = symptoms without clonal cells</li><li>Avoid NSAIDs, opioids (except fentanyl), contrast</li><li>H1 + H2 antihistamines first-line</li><li>Always carry epinephrine</li></ul>',why_chain:[],points:10}},
        {title:"Clinical Integration",content:'<div class="narrative"><p>You synthesize all the clinical information to ensure optimal patient care.</p></div>',question:{prompt:"What principle is MOST important for excellent clinical outcomes?",options:[{text:"Integrating clinical presentation with evidence-based guidelines while reassessing response to treatment",correct:true},{text:"Following protocols exactly without clinical judgment",correct:false},{text:"Ordering comprehensive testing to avoid any missed diagnoses",correct:false},{text:"Making a diagnosis quickly and committing to it without reconsideration",correct:false}],explanation:{correct:"Excellent clinical care combines systematic assessment, evidence-based treatment, and ongoing reassessment. Guidelines inform but don't replace clinical reasoning.",incorrect:"Good clinical care requires flexibility, reassessment, and integration of guidelines with patient-specific factors."},teaching:'<h4>Clinical Reasoning</h4><ul><li>Systematic data gathering</li><li>Evidence-based management</li><li>Regular reassessment</li><li>Patient-centered communication</li></ul>',why_chain:[],points:10}}
    ];
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:#4ade80;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><p>You mastered Mast Cell Disorders!</p></div>';}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
