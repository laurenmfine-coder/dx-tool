body { transition: background 0.3s, color 0.3s; }

        :root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#DC2626;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}
        *{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
        .header{background:linear-gradient(135deg,#991B1B,#DC2626);padding:12px 20px;position:sticky;top:0;z-index:100}
        .header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}
        .diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}
        .stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}
        .main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}
        .card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}
        .narrative{background:rgba(220,38,38,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(220,38,38,.3);padding:2px 6px;border-radius:4px}
        .setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}
        .start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}
        .hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD;display:none}
        .hint.show{display:block}
        .radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}
        .radio-option.selected{border-color:var(--accent);background:rgba(220,38,38,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}
        .radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}
        .feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}
        .btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}
        .vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital.critical{background:rgba(220,38,38,.2)}
        .vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}
        .lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}
        .score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
        .pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}
        .cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}
        .progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px;transition:width 0.3s}
        .question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
        .why-chain{background:linear-gradient(135deg,rgba(124,58,237,0.08),rgba(139,92,246,0.12));border:1px solid rgba(124,58,237,0.25);border-radius:12px;padding:20px;margin:20px 0}
        .why-title{font-weight:700;color:#7C3AED;margin-bottom:16px;font-size:1.1rem}
        .why-item{margin:14px 0;padding:12px 16px;background:rgba(255,255,255,0.5);border-left:4px solid #8B5CF6;border-radius:0 8px 8px 0}
        .why-q{color:#6D28D9;font-weight:600;font-style:italic;margin-bottom:6px}
        .why-a{color:#374151;font-size:0.95rem;line-height:1.7}
        .xlinks{background:linear-gradient(135deg,rgba(16,185,129,0.08),rgba(59,130,246,0.08));border:1px solid rgba(16,185,129,0.25);border-radius:12px;padding:20px;margin:20px 0}
        .xlinks-title{font-weight:700;color:#059669;margin-bottom:16px;font-size:1rem}
        .xlinks-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
        .xlink{display:flex;align-items:center;gap:12px;padding:14px 16px;background:white;border:1px solid #e5e7eb;border-radius:10px;text-decoration:none;color:#1f2937;transition:all 0.2s}
        .xlink:hover{border-color:#10B981;box-shadow:0 4px 12px rgba(16,185,129,0.15);transform:translateY(-2px)}
        .xicon{font-size:1.3rem}
        .xtitle{font-weight:600;font-size:0.95rem}
        .refs{background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.2);border-radius:10px;padding:14px 18px;margin:20px 0;font-size:0.9rem}
        .refs a{color:#2563EB;text-decoration:none;font-weight:500}
        .refs a:hover{text-decoration:underline}

<div style="position: fixed; top: 10px; right: 10px; z-index: 9999; display: flex; gap: 6px; background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 20px;">
    <button onclick="document.body.setAttribute('data-theme','dark')" style="width: 24px; height: 24px; border-radius: 50%; border: 2px solid #fff; background: #1e293b; cursor: pointer;" title="Dark"></button>
    <button onclick="document.body.setAttribute('data-theme','light')" style="width: 24px; height: 24px; border-radius: 50%; border: 2px solid #fff; background: #f8fafc; cursor: pointer;" title="Light"></button>
    <button onclick="document.body.setAttribute('data-theme','high-contrast')" style="width: 24px; height: 24px; border-radius: 50%; border: 2px solid #fff; background: #000; cursor: pointer;" title="High Contrast"></button>
    <button onclick="document.body.setAttribute('data-theme','sepia')" style="width: 24px; height: 24px; border-radius: 50%; border: 2px solid #fff; background: #f4ecd8; cursor: pointer;" title="Sepia"></button>
</div>

    <header class="header"><div class="header-row"><div style="font-weight:600">💔 The Crushing Weight</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'58M',wt:'82kg',hx:'Crushing chest pain radiating to L arm x1hr, diaphoretic',exam:'Anxious, diaphoretic, S4 gallop',vitals:{HR:'98',BP:'158/92',RR:'20'},labs:{TropI:'2.4',ECG:'ST elevation V1-V4'}},
int:{age:'72F',wt:'65kg',hx:'Atypical chest discomfort, dyspnea, DM, CKD3',exam:'JVD, bibasilar crackles',vitals:{HR:'88',BP:'142/88',RR:'24'},labs:{TropI:'0.8',ECG:'ST depression V4-V6'}},
adv:{age:'45M',wt:'95kg',hx:'Cocaine use 2hrs ago, now crushing chest pain',exam:'Agitated, HTN, dilated pupils',vitals:{HR:'118',BP:'195/110',RR:'22'},labs:{TropI:'0.15',ECG:'ST elevation II,III,aVF'}}};
const Q=[
{t:'ECG Territory',q:'ST elevation V1-V4. Which artery?',h:'Anterior leads = LAD',o:[{id:'a',txt:'LAD (Left Anterior Descending)',c:1,p:100},{id:'b',txt:'RCA',c:0,p:0},{id:'c',txt:'LCx',c:0,p:20}],fb:{1:'<b>Correct!</b> V1-V4 = anterior = LAD. II,III,aVF = inferior = RCA. I, aVL, V5-V6 = lateral = LCx.',0:'<b>Territory:</b> Anterior(V1-V4)=LAD, Inferior(II,III,aVF)=RCA, Lateral=LCx.'}},
{t:'STEMI Criteria',q:'ECG criteria for STEMI?',h:'J-point elevation in contiguous leads',o:[{id:'a',txt:'≥1mm STE in 2+ leads (≥2mm V2-V3 men)',c:1,p:100},{id:'b',txt:'Any ST elevation',c:0,p:20},{id:'c',txt:'Troponin only',c:0,p:0}],fb:{1:'<b>Correct!</b> ≥1mm in 2+ contiguous leads, ≥2mm V2-V3 (men), ≥1.5mm V2-V3 (women). New LBBB counts.',0:'<b>Criteria:</b> Must meet threshold in ≥2 contiguous leads.'}},
{t:'Door-to-Balloon',q:'Target D2B time for primary PCI?',h:'ACC/AHA quality metric',o:[{id:'a',txt:'≤90 minutes',c:1,p:100},{id:'b',txt:'≤120 minutes',c:0,p:50},{id:'c',txt:'≤60 minutes',c:0,p:30}],fb:{1:'<b>Correct!</b> D2B ≤90 min. If >120 min to PCI, give fibrinolytics (D2N ≤30 min).',0:'<b>Timing:</b> D2B ≤90 min. Lytics if PCI delayed >120 min.'}},
{t:'Aspirin Loading',q:'Aspirin loading dose for ACS?',h:'Non-enteric, chewed',o:[{id:'a',txt:'162-325 mg chewed',c:1,p:100},{id:'b',txt:'81 mg',c:0,p:20},{id:'c',txt:'500 mg',c:0,p:0}],fb:{1:'<b>Correct!</b> ASA 162-325 mg chewed + P2Y12 (ticagrelor 180mg or clopidogrel 600mg).',0:'<b>Loading:</b> ASA 162-325 chewed + P2Y12 inhibitor.'}},
{t:'Heparin Dosing',q:'UFH bolus for PCI?',h:'Weight-based, ACS specific',o:[{id:'a',txt:'60-70 U/kg bolus (max 5000U)',c:1,p:100},{id:'b',txt:'80 U/kg bolus',c:0,p:50},{id:'c',txt:'5000 U fixed',c:0,p:30}],fb:{1:'<b>Correct!</b> ACS: 60-70 U/kg (max 4000-5000U), then 12-15 U/kg/hr. Target ACT 250-300s.',0:'<b>ACS dosing:</b> Lower than VTE (60-70 vs 80 U/kg).'}},
{t:'Cocaine ACS',q:c=>c.hx.includes('Cocaine')?'First-line for cocaine chest pain?':'Contraindicated in cocaine ACS?',h:'Beta-blockers dangerous',o:[{id:'a',txt:'Benzos + NTG (AVOID beta-blockers)',c:1,p:100},{id:'b',txt:'Metoprolol',c:0,p:0},{id:'c',txt:'Aspirin only',c:0,p:30}],fb:{1:'<b>Correct!</b> Cocaine: benzos (reduce sympathetic), NTG, ASA. NO beta-blockers (unopposed alpha = coronary vasoconstriction).',0:'<b>Critical!</b> Beta-blockers contraindicated in cocaine ACS.'}},
{t:'Troponin Kinetics',q:'hs-Troponin peaks at?',h:'Affects serial measurement strategy',o:[{id:'a',txt:'12-24 hours (detectable 1-3 hrs)',c:1,p:100},{id:'b',txt:'6-8 hours',c:0,p:50},{id:'c',txt:'48-72 hours',c:0,p:20}],fb:{1:'<b>Correct!</b> hs-TnI: detectable 1-3 hrs, peaks 12-24 hrs, normalizes 5-14 days. Serial at 0/3 hrs.',0:'<b>Kinetics:</b> Rises 1-3 hrs, peaks 12-24 hrs.'}},
{t:'NSTEMI Timing',q:'When to cath high-risk NSTEMI?',h:'GRACE score guides urgency',o:[{id:'a',txt:'Early invasive: within 24 hours',c:1,p:100},{id:'b',txt:'Immediate (<2 hrs)',c:0,p:40},{id:'c',txt:'Conservative',c:0,p:20}],fb:{1:'<b>Correct!</b> High-risk NSTEMI: <24 hrs. Very high risk (refractory, unstable): immediate <2 hrs.',0:'<b>Risk stratification:</b> GRACE score determines timing.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1],c=C[S.diff];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML=`<div class="feedback ${opt&&opt.c?'excellent':'incorrect'}">${q.fb[opt&&opt.c?1:0]}</div>`;document.getElementById('sub').textContent=S.q<S.total?'Next →':'Results →';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){
    const c=C[S.diff];
    if(S.stage==='setup'){
        document.getElementById('app').innerHTML=`<div class="setup-screen"><h1>💔 The Crushing Weight</h1><p style="color:var(--muted);margin-bottom:32px">ACS: STEMI recognition, ECG territory, antiplatelet dosing, PCI timing</p><button class="start-btn" onclick="go('pres')">Begin Case →</button></div>`;
    }else if(S.stage==='pres'){
        document.getElementById('app').innerHTML=`<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🚨 Cardiac Emergency</div></div><div class="card-body"><div class="narrative"><span class="hl">${c.age}</span> (${c.wt})<br><b>Hx:</b> ${c.hx}<br><b>Exam:</b> ${c.exam}</div><div class="vitals-grid">${Object.entries(c.vitals).map(([k,v])=>`<div class="vital"><div class="vital-label">${k}</div><div class="vital-value">${v}</div></div>`).join('')}</div><div class="lab-grid">${Object.entries(c.labs).map(([k,v])=>`<div class="lab-item"><span class="lab-name">${k}</span><span class="lab-value">${v}</span></div>`).join('')}</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment →</button></div></div></div>`;
    }else if(S.stage==='question'){
        const q=Q[S.q-1];
        const qTxt=typeof q.q==='function'?q.q(c):q.q;
        // FIXED: Only show hint on Easy mode
        const hintHtml = S.diff==='easy' ? `<div class="hint show">💡 ${q.h}</div>` : '';
        document.getElementById('app').innerHTML=`<div class="card"><div class="card-header"><div class="card-phase">Q${S.q}/${S.total}</div><div class="card-title">🔍 ${q.t}</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:${S.q/S.total*100}%"></div></div><div class="question-header"><div class="question-number">${S.q}</div><div style="font-weight:600">${qTxt}</div></div>${hintHtml}<div class="radio-options">${q.o.map(o=>`<div class="radio-option" data-id="${o.id}" onclick="pick('${o.id}')"><div class="radio-circle"></div><div><b>${o.txt}</b></div></div>`).join('')}</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit →</button></div></div></div>`;
    }else{
        const pct=S.max>0?Math.round(S.score/S.max*100):0;
        document.getElementById('app').innerHTML=`<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">${pct>=70?'🎉':'📚'}</div><div style="font-size:2rem;font-weight:700;color:${pct>=70?'var(--success)':'var(--warning)'}}">${pct>=70?'Complete!':'Review'}</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>${S.score}/${S.max} (${pct}%)</span></div></div><div class="pearls-box"><div class="pearls-title">📌 ACS Pearls</div><div class="pearl-item"><b>Territory:</b> V1-V4=LAD, II/III/aVF=RCA, I/aVL/V5-6=LCx</div><div class="pearl-item"><b>D2B:</b> ≤90 min. Lytics if PCI >120 min</div><div class="pearl-item"><b>Loading:</b> ASA 162-325 chewed + P2Y12</div><div class="pearl-item"><b>Heparin:</b> 60-70 U/kg bolus (max 5000U)</div><div class="pearl-item"><b>Cocaine:</b> NO beta-blockers! Benzos + NTG</div></div><div class="why-chain"><div class="why-title">🔬 WHY Chain: Understanding the Mechanism</div><div class="why-item"><div class="why-q">Why dual antiplatelet?</div><div class="why-a">Aspirin (COX-1) + P2Y12 inhibitor = synergistic effect on different mechanisms.</div></div><div class="why-item"><div class="why-q">Why ticagrelor over clopidogrel?</div><div class="why-a">PLATO showed mortality benefit. Faster, more potent, reversible.</div></div><div class="why-item"><div class="why-q">Why door-to-balloon <90 min?</div><div class="why-a">Each 30-min delay increases mortality. Time is muscle.</div></div></div><div class="xlinks"><div class="xlinks-title">🔗 Continue Learning</div><div class="xlinks-grid"><a href="../mechanism/acs-module.html" class="xlink"><span class="xicon">🧬</span><span class="xtitle">MechanismDx: ACS</span></a><a href="chest-pain-adventure.html" class="xlink"><span class="xicon">🎮</span><span class="xtitle">Chest Pain</span></a><a href="afib-adventure.html" class="xlink"><span class="xicon">🎮</span><span class="xtitle">AFib</span></a></div></div><div class="refs"><span class="ref-label">📚 References:</span> <a href="https://www.ahajournals.org/" target="_blank">AHA/ACC ACS Guidelines 2021</a> | <a href="https://www.ncbi.nlm.nih.gov/books/NBK459364/" target="_blank">StatPearls</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href='adventure-hub.html'">Back</button></div></div></div>`;
    }
}
document.addEventListener('DOMContentLoaded',render);
</script>
