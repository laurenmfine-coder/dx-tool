<script>
(function(){var AUTH_KEY="reasondx-user";function getAuthPath(){var d=(location.pathname.match(/\//g)||[]).length-1,p="";for(var i=0;i<d;i++)p+="../";return p+"auth/register.html"}function isAuth(){try{var u=localStorage.getItem(AUTH_KEY);if(u){var j=JSON.parse(u);return j&&j.email&&j.name}}catch(e){}return false}if(!isAuth()){sessionStorage.setItem("reasondx-redirect",location.href);location.replace(getAuthPath())}})();

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Anxiety Disorders - ReasonDx Clinical Reasoning Trainer</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0c4a6e 0%,#0ea5e9 100%);min-height:100vh;padding:20px;color:#f8fafc}.container{max-width:900px;margin:0 auto}.scene{background:rgba(255,255,255,0.08);border-radius:16px;padding:24px;margin-bottom:20px}.scene-header{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.1)}.scene-phase{font-size:0.85rem;color:#7dd3fc;text-transform:uppercase}.scene-title{font-size:1.5rem;font-weight:700;color:#bae6fd}.narrative{background:rgba(255,255,255,0.05);border-radius:12px;padding:16px 20px;margin:16px 0;border-left:4px solid #0ea5e9;line-height:1.7}.highlight{color:#fbbf24;font-weight:600}.critical{color:#f87171;font-weight:600}.socratic-prompt{background:linear-gradient(135deg,rgba(251,191,36,0.2),rgba(14,165,233,0.15));border:1px solid rgba(251,191,36,0.4);border-radius:12px;padding:20px;margin:16px 0}.socratic-prompt h4{color:#fbbf24;font-size:0.9rem;text-transform:uppercase;margin-bottom:12px}.socratic-prompt p{font-size:1.1rem;line-height:1.6;font-style:italic;color:#fef3c7}.question-box{background:linear-gradient(135deg,rgba(14,165,233,0.15),rgba(251,191,36,0.15));border:1px solid rgba(14,165,233,0.3);border-radius:12px;padding:20px;margin:20px 0}.question-prompt{font-size:1.1rem;font-weight:600;color:#bae6fd;margin-bottom:16px}.mcq-options{display:flex;flex-direction:column;gap:10px}.mcq-option{background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.15);border-radius:10px;padding:14px 18px;cursor:pointer;transition:all 0.2s;display:flex;align-items:flex-start;gap:12px}.mcq-option:hover:not(.disabled){background:rgba(255,255,255,0.1);transform:translateX(4px)}.mcq-option.disabled{cursor:default;opacity:0.7}.mcq-option.correct{border-color:#22c55e!important;background:rgba(34,197,94,0.2)!important;opacity:1!important}.mcq-option.incorrect{border-color:#ef4444!important;background:rgba(239,68,68,0.15)!important}.option-letter{font-weight:700;min-width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.1);border-radius:8px}.feedback{margin-top:16px;padding:16px;border-radius:10px;display:none}.feedback.show{display:block}.feedback.correct-feedback{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3)}.feedback.incorrect-feedback{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3)}.feedback-title{font-weight:700;margin-bottom:8px}.teaching-point{background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.3);border-radius:10px;padding:16px;margin-top:16px;display:none}.teaching-point.show{display:block}.teaching-point h4{color:#c4b5fd;margin-bottom:12px}.mechanism-box{background:linear-gradient(135deg,rgba(139,92,246,0.2),rgba(14,165,233,0.1));border:1px solid rgba(139,92,246,0.4);border-radius:12px;padding:20px;margin:16px 0}.mechanism-title{font-weight:700;color:#c4b5fd;margin-bottom:12px}.pathway{background:rgba(0,0,0,0.3);border-radius:8px;padding:14px;font-family:monospace;font-size:0.9rem;line-height:1.8;white-space:pre-line}.btn{background:linear-gradient(135deg,#0ea5e9,#0369a1);color:white;border:none;padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;display:none;margin-top:16px}.btn.show{display:inline-block}.progress-bar{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;margin-bottom:20px}.progress-fill{height:100%;background:linear-gradient(90deg,#0ea5e9,#7dd3fc);border-radius:3px;transition:width 0.5s}.score-tracker{display:inline-block;background:rgba(0,0,0,0.8);padding:12px 20px;border-radius:10px;margin-right:12px;vertical-align:top}.score-label{font-size:0.8rem;color:#94a3b8}.score-value{font-size:1.4rem;font-weight:700;color:#4ade80}.difficulty-panel{position:static;display:inline-block;background:rgba(255,255,255,0.95);padding:12px 16px;border-radius:10px;margin-left:12px}.diff-btns{display:flex;gap:4px}.diff-btn{padding:6px 10px;border:none;border-radius:6px;font-size:0.75rem;cursor:pointer;background:#f1f5f9;color:#475569}.diff-btn.active{background:#0ea5e9;color:white}.completion{text-align:center;padding:60px 40px}.references-panel{background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1px solid #bfdbfe;border-radius:12px;margin:20px 0;overflow:hidden}.references-header{padding:14px 20px;font-weight:600;color:#1e40af;display:flex;align-items:center;gap:8px;cursor:pointer}.refs-toggle{background:none;border:none;font-size:0.8rem;cursor:pointer;margin-left:auto}.references-content{padding:0 20px 16px;display:flex;flex-wrap:wrap;gap:10px}.references-content a{background:white;padding:8px 14px;border-radius:8px;text-decoration:none;color:#2563eb;font-size:0.85rem;border:1px solid #bfdbfe;transition:all 0.2s}.references-content a:hover{background:#2563eb;color:white}.nav-buttons{display:flex;gap:12px;margin-top:20px;justify-content:center}.nav-btn{background:linear-gradient(135deg,#0ea5e9,#0369a1);color:white;border:none;padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block}@media(max-width:480px){body{padding:12px!important}.scene{padding:16px;margin-bottom:14px}.scene-title{font-size:1.25rem}.narrative{padding:12px 14px;font-size:0.95rem}.mcq-option{padding:12px 14px;min-height:48px}.score-tracker,.difficulty-panel{position:static!important;display:block;margin:8px 0;width:100%}}@media(pointer:coarse){.mcq-option,.nav-btn,button{min-height:44px}}
    </style>

<body>
    <div class="score-tracker"><div class="score-label">Score</div><div><span class="score-value" id="score">0</span> / <span id="maxScore">0</span></div></div>
    <div class="difficulty-panel"><div style="font-size:0.75rem;color:#475569;margin-bottom:8px;font-weight:600">Difficulty</div><div class="diff-btns">
        <button class="diff-btn" onclick="setDifficulty('beginner',this)">Beginner</button>
        <button class="diff-btn active" onclick="setDifficulty('standard',this)">Standard</button>
        <button class="diff-btn" onclick="setDifficulty('advanced',this)">Advanced</button>
    </div></div>
    <div class="container">
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
<div class="references-panel"><div class="references-header"><span>📚</span> Open-Access References<button onclick="toggleReferences()" class="refs-toggle">▼</button></div><div class="references-content" id="referencesContent"><a href="https://www.ncbi.nlm.nih.gov/books/" target="_blank" rel="noopener">Anxiety Disorders - StatPearls</a>
<a href="https://www.ncbi.nlm.nih.gov/pmc/" target="_blank" rel="noopener">Anxiety Disorders - NCBI</a></div></div>
        <div id="scene-container"></div>
    </div>
    <script>
    let decisionPath=[],currentStage=0,score=0,difficulty='standard';
    const stages=[{
        title: "Identifying Anxiety Disorders",
        content: `<div class="narrative"><p>A patient presents with <span class='highlight'>Patient with persistent worry affecting daily functioning for 8 months</span>. You need to identify the key underlying concept.</p></div><div class="socratic-prompt"><h4>Recognition</h4><p>What is the MOST fundamental concept in Anxiety Disorders?</p></div>`,
        hint_beginner: "Review the fundamentals of this topic.",
        hint_advanced: "Consider the underlying mechanism.",
        question: {
            prompt: "What is the MOST fundamental concept in Anxiety Disorders?",
            options: [{ text: "GAD: excessive worry more days than not for ≥6 months, difficulty controlling worry, 3+ somatic symptoms", correct: true, explanation: "GAD: excessive worry more days than not for ≥6 months, difficulty controlling worry, 3+ somatic symptoms" }, { text: "Panic disorder: recurrent unexpected panic attacks + ≥1 month of concern about future attacks", correct: false, explanation: "Important but secondary. The primary concept: GAD: excessive worry more days than not for ≥6 months, difficulty controlling worry, 3+ somatic symptoms" }, { text: "Comprehensive testing before clinical reasoning", correct: false, explanation: "Clinical reasoning should guide the diagnostic approach." }, { text: "This finding is typically incidental", correct: false, explanation: "This requires clinical attention. Key: GAD: excessive worry more days than not for ≥6 months, difficulty controlling worry, 3+ somatic symptoms" }],
            explanation: { correct: "Correct! Review the teaching point.", incorrect: "Review the teaching point for the correct reasoning." },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">📋 Teaching Point</div><div class="pathway">• GAD: excessive worry more days than not for ≥6 months, difficulty controlling worry, 3+ somatic symptoms\n• Panic disorder: recurrent unexpected panic attacks + ≥1 month of concern about future attacks\n• Social anxiety: marked fear of social situations where exposed to scrutiny</div></div>`,
            why_chain: [],
            points: 10
        }
    },
    {
        title: "Key Features of Anxiety Disorders",
        content: `<div class="narrative"><p>You're working through the diagnostic features of <span class='highlight'>Anxiety Disorders</span>.</p></div><div class="socratic-prompt"><h4>Diagnosis</h4><p>Which feature is MOST diagnostically important?</p></div>`,
        hint_beginner: "Review the fundamentals of this topic.",
        hint_advanced: "Consider the underlying mechanism.",
        question: {
            prompt: "Which feature is MOST diagnostically important?",
            options: [{ text: "Social anxiety: marked fear of social situations where exposed to scrutiny", correct: true, explanation: "Social anxiety: marked fear of social situations where exposed to scrutiny" }, { text: "First-line treatment: SSRIs (or SNRIs) for all anxiety disorders; CBT is equally effective", correct: false, explanation: "Consider: Social anxiety: marked fear of social situations where exposed to scrutiny" }, { text: "Empiric treatment without confirmation", correct: false, explanation: "Confirm the diagnosis when possible." }, { text: "Observation and reassessment in 2 weeks", correct: false, explanation: "More immediate diagnostic attention is warranted." }],
            explanation: { correct: "Correct! Review the teaching point.", incorrect: "Review the teaching point for the correct reasoning." },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">📋 Teaching Point</div><div class="pathway">• Social anxiety: marked fear of social situations where exposed to scrutiny\n• First-line treatment: SSRIs (or SNRIs) for all anxiety disorders; CBT is equally effective\n• Benzodiazepines: short-term relief only, risk of dependence — not first-line maintenance therapy</div></div>`,
            why_chain: [],
            points: 10
        }
    },
    {
        title: "Managing Anxiety Disorders",
        content: `<div class="narrative"><p>Diagnosis of <span class='highlight'>Anxiety Disorders</span> is confirmed. Plan the management.</p></div><div class="socratic-prompt"><h4>Management</h4><p>What is the MOST critical management step?</p></div>`,
        hint_beginner: "Review the fundamentals of this topic.",
        hint_advanced: "Consider the underlying mechanism.",
        question: {
            prompt: "What is the MOST critical management step?",
            options: [{ text: "Benzodiazepines: short-term relief only, risk of dependence — not first-line maintenance therapy", correct: true, explanation: "Benzodiazepines: short-term relief only, risk of dependence — not first-line maintenance therapy" }, { text: "Watchful waiting only", correct: false, explanation: "Active management is indicated. Key: Benzodiazepines: short-term relief only, risk of dependence — not first-line maintenance therapy" }, { text: "Immediate surgical referral for all cases", correct: false, explanation: "Management should be individualized to the presentation." }, { text: "Outpatient follow-up in 6 months", correct: false, explanation: "More timely intervention is typically needed." }],
            explanation: { correct: "Correct! Review the teaching point.", incorrect: "Review the teaching point for the correct reasoning." },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">📋 Teaching Point</div><div class="pathway">• Social anxiety: marked fear of social situations where exposed to scrutiny\n• First-line treatment: SSRIs (or SNRIs) for all anxiety disorders; CBT is equally effective\n• Benzodiazepines: short-term relief only, risk of dependence — not first-line maintenance therapy</div></div>`,
            why_chain: [],
            points: 15
        }
    }];
    document.getElementById('maxScore').textContent=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);
    function setDifficulty(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
    function toggleReferences(){const c=document.getElementById('referencesContent');c.style.display=c.style.display==='none'?'flex':'none'}
    function renderStage(idx){if(idx>=stages.length){showCompletion();return}const st=stages[idx];const pct=((idx)/stages.length*100).toFixed(0);document.getElementById('progress').style.width=pct+'%';let html=`<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${idx+1} of ${stages.length}</div><div class="scene-title">${st.title}</div></div>${st.content}`;if(st.question){const letters=['A','B','C','D'];html+=`<div class="question-box"><div class="question-prompt">${st.question.prompt}</div><div class="mcq-options" id="options-${idx}">`;st.question.options.forEach((opt,oi)=>{html+=`<div class="mcq-option" onclick="checkAnswer(${idx},${oi})" id="opt-${idx}-${oi}"><div class="option-letter">${letters[oi]}</div><div class="option-text">${opt.text}</div></div>`});html+=`</div><div class="feedback" id="feedback-${idx}"></div>`;if(st.question.teaching)html+=`<div class="teaching-point" id="teaching-${idx}">${st.question.teaching}</div>`;html+=`<button class="btn" id="next-${idx}" onclick="nextStage()">Continue →</button></div>`}html+=`</div>`;document.getElementById('scene-container').innerHTML=html}
    function checkAnswer(si,oi){const st=stages[si];const opt=st.question.options[oi];document.querySelectorAll(`#options-${si} .mcq-option`).forEach((el,i)=>{el.classList.add('disabled');if(st.question.options[i].correct)el.classList.add('correct')});if(!opt.correct)document.getElementById(`opt-${si}-${oi}`).classList.add('incorrect');const fb=document.getElementById(`feedback-${si}`);if(opt.correct){score+=st.question.points;document.getElementById('score').textContent=score;fb.className='feedback show correct-feedback';fb.innerHTML=`<div class="feedback-title">✅ Correct! (+${st.question.points} pts)</div><p>${opt.explanation||st.question.explanation.correct}</p>`}else{fb.className='feedback show incorrect-feedback';fb.innerHTML=`<div class="feedback-title">❌ Not quite</div><p>${opt.explanation||st.question.explanation.incorrect}</p>`}const tp=document.getElementById(`teaching-${si}`);if(tp)tp.classList.add('show');document.getElementById(`next-${si}`).classList.add('show');decisionPath.push({stage:st.title,correct:opt.correct,choice:opt.text})}
    function nextStage(){currentStage++;renderStage(currentStage);window.scrollTo({top:0,behavior:'smooth'})}
    function showCompletion(){const mx=stages.reduce((s,st)=>s+(st.question?st.question.points:0),0);const pct=mx>0?Math.round(score/mx*100):0;document.getElementById('progress').style.width='100%';let g=pct>=90?'🏆':pct>=70?'⭐':pct>=50?'📚':'🔄';document.getElementById('scene-container').innerHTML=`<div class="scene completion"><div style="font-size:4rem;margin-bottom:16px">${g}</div><div style="font-size:2.5rem;font-weight:700">${pct}%</div><div style="color:#94a3b8;margin-bottom:24px">Final Score: ${score} / ${mx}</div><div class="nav-buttons"><a href="../adventure-hub.html" class="nav-btn">🏠 Adventure Hub</a><button class="nav-btn" onclick="location.reload()">🔄 Retry</button></div></div>`}
    renderStage(0);
    </script>
