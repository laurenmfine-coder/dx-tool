<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Febrile Seizures - Expanded Clinical Reasoning Adventure</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);min-height:100vh;color:#e2e8f0;line-height:1.6;padding:20px}
.container{max-width:800px;margin:0 auto}

.boards-tip-title{color:#4ade80;font-weight:700;margin-bottom:12px}
.comparison-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:0.9rem}
.comparison-table th,.comparison-table td{border:1px solid rgba(255,255,255,0.1);padding:10px;text-align:left}
.comparison-table th{background:rgba(96,165,250,0.2);color:#60a5fa}
.comparison-table tr:nth-child(even){background:rgba(255,255,255,0.02)}
.btn{background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:1rem;cursor:pointer;width:100%;margin-top:16px;transition:transform 0.2s,box-shadow 0.2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(59,130,246,0.4)}
.tips{display:grid;gap:12px;margin-top:16px}
.pearl{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:8px;padding:12px}
.pitfall{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:12px}
.tip-header{font-weight:700;margin-bottom:8px;font-size:0.9rem}
.pearl .tip-header{color:#4ade80}
.pitfall .tip-header{color:#f87171}
.why-chain{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:8px;padding:12px;margin:12px 0}
.why-chain-title{color:#fbbf24;font-weight:700;margin-bottom:8px}
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
const defined = {
    title: "Febrile Seizures",
    subtitle: "Simple vs Complex, Workup & Prognosis",
    stages: ["intro","definition","simple_complex","pathophys","workup","lumbar_puncture","eeg_imaging","recurrence","treatment","debrief"]
};

let state = { stage: 0 };

function nextStage() {
    if (state.stage < defined.stages.length - 1) {
        state.stage++;
        renderStage();
    }
}

function renderStage() {
    const stageName = defined.stages[state.stage];
    const renderFn = window['render_' + stageName];
    if (renderFn) {
        document.getElementById('app').innerHTML = renderFn();
    }
}

                </div>
            <p style="font-size:1.1rem;margin-bottom:16px;">A 14-month-old presents after a <strong>2-minute generalized tonic-clonic seizure</strong> at home. Parents report the child has had a fever for 1 day with runny nose. The child appears well on arrival, is alert, and has a temperature of 39.2°C.</p>
            
            <div class="alert-box">
                <div class="alert-title">🚨 Parental Fear</div>

                <div class="mechanism-title">🧬 Epidemiology</div>
                <div class="pathway"><strong>Febrile seizures are COMMON:</strong>

• Peak age: 12-18 months
• Age range: 6 months to 5 years

<strong>Strong genetic component:</strong>
• 25-40% have family history
• Multiple genes identified</div>
            </div>
            
            <div class="why-chain">
                <div class="why-chain-title">🔗 WHY Chain: Why This Age?</div>
                <p><strong>WHY do febrile seizures occur only in young children?</strong></p>
                <p>→ Immature CNS has lower seizure threshold</p>
                <p>→ Temperature-sensitive ion channels more active</p>
                <p>→ Myelination incomplete</p>
                <p>→ By age 5-6, brain matures and threshold rises</p>

window.render_definition = function() {

                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would renal or hepatic impairment affect drug dosing?</p>
                </div>
            <div class="boards-tip">
                <div class="boards-tip-title">📚 AAP Definition of Febrile Seizure</div>
                <table class="comparison-table">
                    <tr><th>Criterion</th><th>Requirement</th></tr>
                    <tr style="background:rgba(34,197,94,0.2);"><td>Age</td><td>6 months to 5 years</td></tr>
                    <tr><td>Temperature</td><td>≥38°C (100.4°F)</td></tr>
                    <tr><td>Exclusions</td><td>No CNS infection</td></tr>
                    <tr><td>Exclusions</td><td>No metabolic abnormality</td></tr>
                    <tr><td>Exclusions</td><td>No prior afebrile seizures</td></tr>
                </table>
            </div>
            
            <div class="mechanism-box">
                <div class="mechanism-title">🧬 Key Points on Definition</div>
                <div class="pathway"><strong>Fever can come AFTER seizure:</strong>
• Seizure may be first sign of illness
• Post-ictal temp elevation also occurs
• Both still count as "febrile seizure"

<strong>What's NOT a febrile seizure:</strong>
• Age < 6 months or > 5 years
• Seizure with meningitis/encephalitis
• Prior unprovoked seizures
• Known epilepsy syndrome
• Seizure from other CNS pathology</div>
            </div>
            
            <div class="why-chain">
                <div class="why-chain-title">🔗 WHY Chain: Rate of Temperature Rise</div>
                <p><strong>WHY do seizures often occur early in illness?</strong></p>
                <p>→ Rate of temperature rise may matter more than absolute temp</p>
                <p>→ Rapid rise triggers seizure before temp peaks</p>
                <p>→ This explains why parents often don't realize child was febrile</p>
            </div>
            
            <button class="btn" onclick="nextStage()">Simple vs. Complex →</button>
        </div>
    </div>`;
};

                    <tr><td><strong>Duration</strong></td><td>&lt;15 minutes</td><td>≥15 minutes</td></tr>
                    <tr><td><strong>Type</strong></td><td>Generalized</td><td>Focal/partial features</td></tr>
                    <tr><td><strong>Recurrence in 24h</strong></td><td>None</td><td>Recurs within 24 hours</td></tr>
                    <tr><td><strong>Post-ictal</strong></td><td>Brief (usually &lt;1 hour)</td><td>May have Todd's paralysis</td></tr>

3. Recurs within 24 hours

• Duration ≥30 minutes
• Subset of complex febrile seizures
• ~5% of all febrile seizures

            </div>
            
            <div class="why-chain">
                <div class="why-chain-title">🔗 WHY Chain: Why Does Complexity Matter?</div>

                <p>→ Focal features suggest localized brain vulnerability</p>
                <p>→ Prolonged seizures may cause hippocampal injury</p>

                <p>→ BUT: majority still won't develop epilepsy!</p>

                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What's the evidence level for the standard treatment?</p>
                </div>
            <div class="mechanism-box">
                <div class="mechanism-title">🧬 Why Does Fever Trigger Seizures?</div>
                <div class="pathway"><strong>Multiple mechanisms:</strong>

1. <strong>Temperature-sensitive channels</strong>
   • TRPV1 and other receptors
   • Enhanced neuronal excitability

2. <strong>Cytokine effects</strong>
   • IL-1β is proconvulsant
   • Increases at fever onset
   
3. <strong>Respiratory alkalosis</strong>
   • Fever → hyperventilation
   • Alkalosis lowers seizure threshold

4. <strong>Immature GABAergic inhibition</strong>
   • GABA is less inhibitory in young brain
   • Chloride gradient reversed</div>
            </div>
            
            <div class="boards-tip">
                <div class="boards-tip-title">📚 Genetic Factors</div>
                <table class="comparison-table">
                    <tr><th>Gene</th><th>Function</th></tr>
                    <tr><td>SCN1A</td><td>Sodium channel - also seen in Dravet syndrome</td></tr>
                    <tr><td>SCN1B</td><td>Sodium channel beta subunit</td></tr>
                    <tr><td>GABRG2</td><td>GABA receptor - inhibitory</td></tr>
                </table>
                <p style="margin-top:12px;"><strong>Family history:</strong> 25-40% have first-degree relative with febrile seizures</p>
            </div>
            
            <div class="why-chain">
                <div class="why-chain-title">🔗 WHY Chain: IL-1β Role</div>
                <p><strong>WHY is IL-1β proconvulsant?</strong></p>
                <p>→ Produced early in fever response</p>
                <p>→ Enhances glutamate release</p>
                <p>→ Inhibits GABA activity</p>
                <p>→ May explain why seizures occur at fever onset, not peak</p>
            </div>
            
            <button class="btn" onclick="nextStage()">ED Workup →</button>
        </div>
    </div>`;
};

<script>
// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
