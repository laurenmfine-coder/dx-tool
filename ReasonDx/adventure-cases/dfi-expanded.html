<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Diabetic Foot Infection | Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #78350f 0%, #d97706 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(120, 53, 15, 0.9); border-radius: 16px; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; background: #d97706; margin-left: 10px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #d97706, #fcd34d); border-radius: 3px; }
        .scene { background: linear-gradient(135deg, #78350f, #92400e); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .scene-header { background: rgba(217, 119, 6, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #fcd34d; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(217,119,6,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #d97706, #92400e); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #fcd34d; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    /* Mobile Responsive - iPhone 16/17 optimized */
        @media (max-width: 480px) {
            body { padding: 12px !important; }
            .container { padding: 0; }
            .scene { padding: 16px; margin-bottom: 14px; border-radius: 12px; }
            .scene-title { font-size: 1.25rem; }
            .narrative { padding: 12px 14px; margin: 12px 0; font-size: 0.95rem; }
            .socratic-prompt { padding: 14px; }
            .question-box { padding: 14px; }
            .question-prompt { font-size: 1rem; }
            .mcq-option { padding: 12px 14px; min-height: 48px; }
            .option-text { font-size: 0.9rem; }
            .teaching-point { padding: 12px; }
            table { font-size: 0.75rem; }
            th, td { padding: 6px 8px; }
            .nav-buttons { flex-direction: column; gap: 10px; }
            .nav-btn { width: 100%; padding: 14px; min-height: 48px; }
            .dx-nav { padding: 10px 12px; }
            .dx-nav-links { gap: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .dx-nav-link { padding: 6px 10px; font-size: 12px; white-space: nowrap; }
            .score-tracker, .difficulty-panel { position: static !important; display: block; margin: 8px 0; width: 100%; }
        }
        @media (pointer: coarse) { .mcq-option, .nav-btn, button { min-height: 44px; } }

    </style>
</head>
<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','classification','osteomyelitis','imaging','microbiology','antibiotics','surgery','offloading','prevention','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">🦶 Diabetic Foot Infection<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">The Infected Foot Ulcer</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What comorbidities would change your management approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Always consider mimics and look-alikes in your differential</p>
                </div><div class="narrative"><p>A <span class="highlight">62-year-old man</span> with T2DM (A1c 9.8%) and peripheral neuropathy presents with a <span class="critical">foul-smelling ulcer on plantar surface of right foot</span> × 2 weeks. Notes redness spreading up foot.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 98, BP 142/88, T 101.2°F<br><strong>Exam:</strong> 3×2 cm ulcer with purulent drainage, probe-to-bone positive, erythema extending 4 cm, dorsal foot swelling<br><strong>Labs:</strong> WBC 15.2, ESR 85, CRP 12.4, Glucose 342</p></div><div class="alert-box"><div class="alert-title">🚨 Diabetic Foot Infection = Limb Threat!</div><p>DFI is the leading cause of non-traumatic amputation. ~25% of diabetics will develop foot ulcer; 50% of those become infected.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Diabetics Get Infections</div><div class="pathway"><strong>Neuropathy:</strong> Can't feel injuries<br><strong>Vascular disease:</strong> Poor blood flow<br><strong>Immune dysfunction:</strong> Impaired WBC function<br><strong>Hyperglycemia:</strong> Bacterial growth medium<br><br>Result: Small wound → Unnoticed →<br>Infection → Spread → Osteomyelitis</div></div><button class="btn" onclick="nextStage()">Classification →</button></div></div>`;
    };

    window.render_classification = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">IDSA/IWGDF Classification</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate acuity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would renal or hepatic impairment affect drug dosing?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Infection Severity</div><table class="comparison-table"><tr><th>Grade</th><th>Clinical Findings</th><th>Setting</th></tr><tr><td><strong>Uninfected</strong></td><td>Wound without signs of infection</td><td>Outpatient</td></tr><tr><td><strong>Mild</strong></td><td>≥2 signs of inflammation, cellulitis ≤2 cm, superficial only</td><td>Outpatient</td></tr><tr><td><strong>Moderate</strong></td><td>Cellulitis >2 cm, deep tissue involvement, no SIRS</td><td>Often inpatient</td></tr><tr><td><strong>Severe</strong></td><td>SIRS or metabolic instability, limb-threatening</td><td>Inpatient + surgery</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Signs of Infection</div><div class="pathway"><strong>Classic signs (need ≥2):</strong><br>• Erythema<br>• Warmth<br>• Swelling/induration<br>• Tenderness/pain<br>• Purulent discharge<br><br><strong>BUT in diabetics:</strong><br>May lack pain (neuropathy)<br>May lack erythema (vascular disease)<br>May be afebrile despite severe infection</div></div><button class="btn" onclick="nextStage()">Osteomyelitis →</button></div></div>`;
    };

    window.render_osteomyelitis = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">Probe-to-Bone Test</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the most likely diagnosis given this presentation?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if the patient doesn't respond to initial treatment?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Reassess if the patient isn't improving as expected</p>
                </div><div class="alert-box"><div class="alert-title">🚨 Positive Probe-to-Bone = High Risk Osteomyelitis!</div><p>If sterile metal probe reaches bone through ulcer → 85% positive predictive value for osteomyelitis in high-risk patients.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Osteomyelitis Diagnosis</div><table class="comparison-table"><tr><th>Test</th><th>Sensitivity</th><th>Specificity</th><th>Notes</th></tr><tr><td>Probe-to-bone</td><td>60-87%</td><td>85%</td><td>Bedside test; high PPV if pre-test probability high</td></tr><tr><td>Plain X-ray</td><td>54%</td><td>68%</td><td>Changes take 2+ weeks; first-line imaging</td></tr><tr><td>MRI</td><td>90%</td><td>82%</td><td>Best imaging; bone marrow edema</td></tr><tr><td>Bone biopsy</td><td>Gold standard</td><td>Gold standard</td><td>Culture guides therapy</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 X-ray Findings</div><div class="pathway"><strong>Early (may be absent):</strong><br>• Soft tissue swelling<br>• Periosteal reaction<br><br><strong>Later (2+ weeks):</strong><br>• Cortical erosion<br>• Lucency<br>• Sequestrum (dead bone)<br><br>Normal X-ray does NOT rule out osteo!</div></div><button class="btn" onclick="nextStage()">Imaging →</button></div></div>`;
    };

    window.render_imaging = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">When to Image</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What key history element is most helpful here?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What's the evidence level for the standard treatment?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Imaging Algorithm</div><table class="comparison-table"><tr><th>Scenario</th><th>Imaging Choice</th></tr><tr><td>Initial evaluation, all DFI</td><td>Plain X-ray (look for osteo, gas, foreign body)</td></tr><tr><td>Suspected osteo, X-ray negative</td><td>MRI (best for marrow edema)</td></tr><tr><td>MRI contraindicated</td><td>WBC-labeled nuclear scan</td></tr><tr><td>Pre-surgical planning</td><td>MRI (delineate extent)</td></tr><tr><td>Vascular assessment</td><td>ABI, arterial Doppler, CTA/MRA</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 MRI Findings in Osteomyelitis</div><div class="pathway"><strong>T1-weighted:</strong><br>• Low signal in marrow (replaces fat)<br><br><strong>T2-weighted/STIR:</strong><br>• High signal (edema)<br><br><strong>With contrast:</strong><br>• Enhancement of infected bone<br>• Abscess rim enhancement<br><br>Sensitivity ~90%, Specificity ~82%<br>Can be confusing with Charcot arthropathy</div></div><div class="alert-box"><div class="alert-title">⚠️ Check Vascular Status!</div><p>Peripheral arterial disease present in 50%+ of DFI. Check ABI (>0.9 normal). Poor perfusion = poor healing = consider revascularization.</p></div><button class="btn" onclick="nextStage()">Microbiology →</button></div></div>`;
    };

    window.render_microbiology = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">What Bugs?</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Which physical exam finding is most specific?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> When would you involve subspecialty consultation?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fefce8; border:1px solid #eab308; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #eab308;">
                    <p style="margin:0; color:#854d0e; font-size:0.9rem;"><strong>🚫 Common Mistake:</strong> Avoid anchoring bias - keep your differential broad initially</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Organisms by Infection Type</div><table class="comparison-table"><tr><th>Type</th><th>Typical Organisms</th></tr><tr><td><strong>Mild, acute</strong></td><td>Staph aureus (including MRSA), Strep</td></tr><tr><td><strong>Moderate/chronic</strong></td><td>Polymicrobial: Staph, Strep, Enterococcus, GNR</td></tr><tr><td><strong>Severe/limb-threatening</strong></td><td>Above + Pseudomonas, Anaerobes</td></tr><tr><td><strong>Recent antibiotics</strong></td><td>MRSA, resistant GNR, Pseudomonas</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Proper Culture Technique</div><div class="pathway"><strong>DON'T:</strong> Swab the wound surface<br>(colonizers, not pathogens)<br><br><strong>DO:</strong><br>• Debride wound first<br>• Culture DEEP tissue or base<br>• Curettage of ulcer base<br>• Bone biopsy if osteomyelitis suspected<br><br><strong>If surgery:</strong><br>Send tissue and bone for culture + histo</div></div><div class="alert-box"><div class="alert-title">⚠️ MRSA Risk Factors</div><p>Prior MRSA, recent hospitalization, recent antibiotics, nursing home, hemodialysis. Consider empiric MRSA coverage if risk factors present.</p></div><button class="btn" onclick="nextStage()">Antibiotics →</button></div></div>`;
    };

    window.render_antibiotics = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">Antibiotic Selection</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Consider the most common causes first, then rarer ones</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What are the key complications to monitor for?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Empiric Therapy by Severity</div><table class="comparison-table"><tr><th>Severity</th><th>Regimen</th><th>Duration</th></tr><tr><td><strong>Mild</strong></td><td>Cephalexin, Amox-clav, or Doxycycline<br>(add TMP-SMX or doxy if MRSA risk)</td><td>1-2 weeks</td></tr><tr><td><strong>Moderate</strong></td><td>Amp-sulbactam, Piperacillin-tazo,<br>or Ceftriaxone + Metronidazole<br>± Vancomycin (if MRSA risk)</td><td>2-3 weeks</td></tr><tr><td><strong>Severe</strong></td><td>Vancomycin + Piperacillin-tazo<br>or Vancomycin + Cefepime + Metronidazole</td><td>2-4 weeks</td></tr><tr><td><strong>Osteomyelitis</strong></td><td>Based on bone culture;<br>6 weeks if bone remains, shorter if resected</td><td>4-6 weeks</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Duration Pearls</div><div class="pathway"><strong>Soft tissue only:</strong> 1-2 weeks usually sufficient<br><br><strong>Osteomyelitis:</strong><br>• Bone resected → 2-5 days post-op<br>• Bone debrided but remains → 4-6 weeks<br>• No surgery → 6+ weeks (often fails)<br><br><strong>Shorten if:</strong> Adequate debridement, good cultures<br><strong>Lengthen if:</strong> Slow response, retained hardware</div></div><button class="btn" onclick="nextStage()">Surgery →</button></div></div>`;
    };

    window.render_surgery = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 10</div><div class="scene-title">Surgical Management</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What comorbidities would change your management approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#f5f3ff; border:1px solid #8b5cf6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #8b5cf6;">
                    <p style="margin:0; color:#5b21b6; font-size:0.9rem;"><strong>📋 Board Tip:</strong> Document your clinical reasoning clearly</p>
                </div><div class="alert-box"><div class="alert-title">🚨 Urgent Surgery Indications</div><ul style="margin-left:20px;"><li>Abscess/deep space infection</li><li>Necrotizing fasciitis</li><li>Gas gangrene</li><li>Compartment syndrome</li><li>Severe infection with systemic toxicity</li><li>Extensive necrosis</li></ul></div><div class="boards-tip"><div class="boards-tip-title">📚 Surgical Options</div><table class="comparison-table"><tr><th>Procedure</th><th>Indication</th></tr><tr><td>Debridement</td><td>Remove necrotic tissue, drain pus</td></tr><tr><td>Partial ray amputation</td><td>Toe + metatarsal head involvement</td></tr><tr><td>Transmetatarsal amputation</td><td>Multiple toe involvement</td></tr><tr><td>Below-knee amputation</td><td>Extensive infection, non-reconstructable PAD</td></tr><tr><td>Revascularization</td><td>Critical limb ischemia + salvageable foot</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Limb Salvage vs Amputation</div><div class="pathway"><strong>Favor salvage if:</strong><br>• Adequate blood supply (or revascularizable)<br>• Limited bone involvement<br>• Patient ambulatory, wants to save limb<br><br><strong>Favor amputation if:</strong><br>• Non-reconstructable vascular disease<br>• Extensive tissue loss<br>• Life-threatening sepsis<br>• Non-ambulatory patient<br>• Failed previous attempts</div></div><button class="btn" onclick="nextStage()">Offloading →</button></div></div>`;
    };

    window.render_offloading = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 10</div><div class="scene-title">Pressure Offloading</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate acuity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would renal or hepatic impairment affect drug dosing?</p>

<script>
// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
    
    // Auto-inject hint examples into existing content
    window.rdxInit = function() {
        // Could add dynamic hint injection here based on difficulty
        console.log('ReasonDx Enhanced Features loaded for: Dfi Expanded Adventure');

    // Initialize on load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.rdxInit);
    } else {
        window.rdxInit();
    }
})();
</script>
