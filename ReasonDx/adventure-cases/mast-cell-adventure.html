<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Flushing Episodes | ReasonDx Adventure</title>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --border: #334155; --text: #F1F5F9; --muted: #94A3B8; --accent: #EC4899; --success: #10B981; --warning: #F59E0B; --danger: #DC2626; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
        .header { background: linear-gradient(135deg, #DB2777 0%, #EC4899 100%); padding: 12px 20px; position: sticky; top: 0; z-index: 100; }
        .header-row { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .header-title { font-size: 1.1rem; font-weight: 600; }
        .stat { background: rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 8px; }
        .stat-value { font-size: 1.1rem; font-weight: 700; font-family: monospace; }
        .stat-label { font-size: 0.6rem; opacity: 0.8; text-transform: uppercase; }
        .main { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; }
        .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .card-phase { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
        .card-title { font-size: 1.5rem; font-weight: 700; }
        .card-body { padding: 24px; }
        .narrative { background: linear-gradient(135deg, rgba(236,72,153,0.1), rgba(219,39,119,0.1)); border-left: 4px solid var(--accent); padding: 20px 24px; border-radius: 0 12px 12px 0; margin-bottom: 24px; line-height: 1.8; }
        .narrative .hl { background: rgba(236,72,153,0.3); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .setup-screen { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; }
        .setup-screen h1 { font-size: 2rem; margin-bottom: 8px; }
        .setup-screen .subtitle { color: var(--muted); margin-bottom: 32px; }
        .start-btn { background: var(--accent); color: white; border: none; padding: 16px 48px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .question-section { margin-bottom: 32px; }
        .question-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .question-number { background: var(--accent); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .question-text { font-size: 1.1rem; font-weight: 600; }
        .radio-options { display: flex; flex-direction: column; gap: 10px; }
        .radio-option { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .radio-option:hover { border-color: var(--accent); }
        .radio-option.selected { border-color: var(--accent); background: rgba(236,72,153,0.15); }
        .radio-option.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .radio-option.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .radio-circle { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; }
        .radio-option.selected .radio-circle { border-color: var(--accent); background: radial-gradient(circle, var(--accent) 40%, transparent 40%); }
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .checkbox-item:hover { border-color: var(--accent); }
        .checkbox-item.selected { border-color: var(--accent); background: rgba(236,72,153,0.15); }
        .checkbox-item.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .checkbox-item.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .checkbox-box { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .checkbox-item.selected .checkbox-box { background: var(--accent); border-color: var(--accent); }
        .checkbox-item.selected .checkbox-box::after { content: '✓'; color: white; font-weight: bold; }
        .feedback { padding: 20px; border-radius: 12px; margin: 20px 0; }
        .feedback.excellent { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); }
        .feedback.acceptable { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); }
        .feedback-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .feedback-icon { font-size: 1.5rem; }
        .feedback-title { font-weight: 700; }
        .feedback-text { color: var(--muted); line-height: 1.7; }
        .feedback-text strong { color: var(--text); }
        .alert { padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; }
        .alert.danger { background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.3); }
        .alert-icon { font-size: 1.5rem; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: 600; margin-bottom: 4px; }
        .alert-desc { font-size: 0.9rem; color: var(--muted); }
        .btn { padding: 14px 28px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: transparent; border: 2px solid var(--border); color: var(--text); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-row { display: flex; gap: 12px; margin-top: 24px; }
        .lab-panel { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .lab-panel-title { font-weight: 600; margin-bottom: 16px; color: var(--accent); }
        .lab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .lab-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; }
        .lab-name { font-size: 0.8rem; color: var(--muted); }
        .lab-value { font-size: 1.1rem; font-weight: 700; }
        .lab-value.critical { color: var(--danger); }
        .lab-range { font-size: 0.7rem; color: var(--muted); }
        .outcome { text-align: center; padding: 40px 20px; }
        .outcome-icon { font-size: 4rem; margin-bottom: 16px; }
        .outcome-title { font-size: 2rem; font-weight: 700; color: var(--success); margin-bottom: 8px; }
        .outcome-desc { color: var(--muted); max-width: 600px; margin: 0 auto 24px; }
        .score-summary { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 24px; margin: 24px auto; max-width: 500px; }
        .score-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .score-row:last-child { border-bottom: none; }
        .patient-panel { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
        .patient-panel-title { font-size: 0.8rem; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
        .patient-info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; }
        .patient-info-label { font-size: 0.7rem; color: var(--muted); }
        .patient-info-value { font-weight: 600; }
    </style>
</head>
<body>
    <header class="header"><div class="header-row"><div class="header-title">🔥 The Flushing Episodes</div><div class="stat"><div class="stat-value" id="scoreDisplay">0</div><div class="stat-label">Points</div></div></div></header>
    <main class="main"><div id="stageContainer"></div></main>
    <script>
    const state = { stage:'setup', score:0 };
    const triggers = [
        { id: 'heat', text: 'Heat/temperature changes', isTrig: true },
        { id: 'stress', text: 'Emotional stress', isTrig: true },
        { id: 'alcohol', text: 'Alcohol', isTrig: true },
        { id: 'nsaids', text: 'NSAIDs', isTrig: true },
        { id: 'venom', text: 'Insect stings', isTrig: true },
        { id: 'dairy', text: 'Dairy products', isTrig: false }
    ];
    const treatments = [
        { id: 'h1h2', text: 'H1 + H2 antihistamines', correct: true },
        { id: 'epi', text: 'Epinephrine auto-injector', correct: true },
        { id: 'cromolyn', text: 'Cromolyn sodium', correct: true },
        { id: 'steroids', text: 'Daily oral steroids', correct: false }
    ];

    function addScore(pts) { state.score += pts; document.getElementById('scoreDisplay').textContent = state.score; }

    const stages = {
        setup: { render: () => `
            <div class="setup-screen">
                <h1>🔥 The Flushing Episodes</h1>
                <p class="subtitle">MCAS vs Mastocytosis evaluation</p>
                <button class="start-btn" onclick="goTo('referral')">Begin Case →</button>
            </div>`
        },
        referral: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Allergy Clinic</div><div class="card-title">📋 Recurrent Anaphylaxis</div></div>
                <div class="card-body">
                    <div class="narrative">A <span class="hl">42-year-old female</span> presents with <span class="hl">recurrent flushing episodes</span> over 2 years. Episodes include facial flushing, rapid heartbeat, abdominal cramping, and sometimes near-syncope.<br><br>She's been to the ER <span class="hl">3 times</span> for "anaphylaxis" - once after a bee sting, once after ibuprofen, and once <span class="hl">without trigger</span>. Symptoms worsen with heat, stress, and alcohol.<br><br>Exam reveals <span class="hl">brown macules on trunk</span> that become raised when rubbed (<span class="hl">Darier's sign positive</span>).</div>
                    <div class="patient-panel">
                        <div class="patient-panel-title">Patient Information</div>
                        <div class="patient-info-grid">
                            <div><div class="patient-info-label">Age/Sex</div><div class="patient-info-value">42 y/o Female</div></div>
                            <div><div class="patient-info-label">ER visits</div><div class="patient-info-value">3 (anaphylaxis)</div></div>
                            <div><div class="patient-info-label">Skin Finding</div><div class="patient-info-value">Darier's sign +</div></div>
                            <div><div class="patient-info-label">Duration</div><div class="patient-info-value">2 years</div></div>
                        </div>
                    </div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="goTo('labs')">Review Labs →</button></div>
                </div>
            </div>`
        },
        labs: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Laboratory</div><div class="card-title">🧪 Workup</div></div>
                <div class="card-body">
                    <div class="lab-panel">
                        <div class="lab-panel-title">Mast Cell Markers</div>
                        <div class="lab-grid">
                            <div class="lab-item"><div class="lab-name">Baseline Tryptase</div><div class="lab-value critical">28 ng/mL</div><div class="lab-range">&lt;11.4</div></div>
                            <div class="lab-item"><div class="lab-name">24h Urine Histamine</div><div class="lab-value critical">Elevated</div></div>
                            <div class="lab-item"><div class="lab-name">Skin Biopsy</div><div class="lab-value critical">↑ Mast cells</div></div>
                        </div>
                    </div>
                    <div class="alert danger"><span class="alert-icon">🚨</span><div class="alert-content"><div class="alert-title">Elevated Baseline Tryptase</div><div class="alert-desc">Tryptase 28 ng/mL (>20 is major criterion for systemic mastocytosis)</div></div></div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="goTo('diagnosis')">Make Diagnosis →</button></div>
                </div>
            </div>`
        },
        diagnosis: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Diagnosis</div><div class="card-title">🎯 MCAS vs Mastocytosis</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">1</div><div class="question-text">Most likely diagnosis?</div></div>
                        <p style="color:var(--muted);margin-bottom:16px;font-size:0.85rem">Key findings: Tryptase 28, Darier's sign+, urticaria pigmentosa, recurrent anaphylaxis</p>
                        <div class="radio-options" id="dxOpts">
                            <div class="radio-option" data-id="mcas" onclick="selectDx('mcas')"><div class="radio-circle"></div><div><strong>MCAS</strong><br><small style="color:var(--muted)">Normal baseline tryptase, no clonal cells</small></div></div>
                            <div class="radio-option" data-id="sm" onclick="selectDx('sm')"><div class="radio-circle"></div><div><strong>Systemic Mastocytosis</strong><br><small style="color:var(--muted)">Clonal mast cell proliferation, elevated tryptase</small></div></div>
                            <div class="radio-option" data-id="idiopathic" onclick="selectDx('idiopathic')"><div class="radio-circle"></div><div><strong>Idiopathic Anaphylaxis</strong><br><small style="color:var(--muted)">No identifiable cause</small></div></div>
                        </div>
                    </div>
                    <div id="dxFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="dxSubmit" onclick="submitDx()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        triggers_q: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Education</div><div class="card-title">⚡ Triggers</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">2</div><div class="question-text">Common mast cell triggers?</div></div>
                        <div class="checkbox-grid" id="trigOpts">${triggers.map(t=>`<div class="checkbox-item" data-id="${t.id}" data-trig="${t.isTrig}" onclick="toggleTrig('${t.id}')"><div class="checkbox-box"></div><span>${t.text}</span></div>`).join('')}</div>
                    </div>
                    <div id="trigFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="submitTrig()">Submit →</button></div>
                </div>
            </div>`
        },
        treatment: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Management</div><div class="card-title">💊 Treatment</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">3</div><div class="question-text">Appropriate treatments?</div></div>
                        <div class="checkbox-grid" id="rxOpts">${treatments.map(t=>`<div class="checkbox-item" data-id="${t.id}" data-correct="${t.correct}" onclick="toggleRx('${t.id}')"><div class="checkbox-box"></div><span>${t.text}</span></div>`).join('')}</div>
                    </div>
                    <div id="rxFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="submitRx()">Submit →</button></div>
                </div>
            </div>`
        },
        outcome: { render: () => `
            <div class="card"><div class="card-body">
                <div class="outcome">
                    <div class="outcome-icon">🎉</div>
                    <div class="outcome-title">Mastocytosis Diagnosed!</div>
                    <div class="outcome-desc">Patient started on H1/H2 blockers, cromolyn, and given epinephrine. Bone marrow confirmed systemic mastocytosis (KIT D816V+). Symptoms well-controlled.</div>
                </div>
                <div class="score-summary">
                    <h3 style="margin-bottom:16px">Performance</h3>
                    <div class="score-row"><span>Diagnosis</span><span>${state.dxScore||0}/100</span></div>
                    <div class="score-row"><span>Triggers</span><span>${state.trigScore||0}/100</span></div>
                    <div class="score-row"><span>Treatment</span><span>${state.rxScore||0}/100</span></div>
                    <div class="score-row" style="border-top:2px solid var(--border);padding-top:12px"><strong>Total</strong><strong>${state.score}</strong></div>
                </div>
                <div class="feedback excellent"><div class="feedback-header"><span class="feedback-icon">💡</span><span class="feedback-title">Mast Cell Pearls</span></div><div class="feedback-text">• <strong>Tryptase >20</strong> baseline = mastocytosis (not MCAS)<br>• <strong>Darier's sign</strong> = urticaria pigmentosa<br>• <strong>WHO criteria:</strong> 1 major + 1 minor OR 3 minor<br>• <strong>KIT D816V</strong> in >90% systemic mastocytosis<br>• <strong>Treatment:</strong> H1+H2, cromolyn, trigger avoidance, epinephrine<br>• <strong>High anaphylaxis risk</strong> - always prescribe epinephrine</div></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="location.reload()">Play Again</button><button class="btn btn-secondary" onclick="location.href='adventure-hub.html'">← Adventures</button></div>
            </div></div>`
        }
    };

    let selectedDx = null;
    function selectDx(id) { selectedDx = id; document.querySelectorAll('#dxOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('dxSubmit').disabled = false; }
    function submitDx() {
        document.querySelectorAll('#dxOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'sm') o.classList.add('correct');
            else if (o.dataset.id === selectedDx) o.classList.add('incorrect');
        });
        state.dxScore = selectedDx === 'sm' ? 100 : 40;
        addScore(selectedDx === 'sm' ? 40 : 15);
        document.getElementById('dxFeedback').innerHTML = `<div class="feedback ${selectedDx==='sm'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedDx==='sm'?'✅':'📚'}</span><span class="feedback-title">${selectedDx==='sm'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>Systemic Mastocytosis:</strong> Tryptase 28 (>20), Darier's sign+, urticaria pigmentosa, recurrent anaphylaxis. MCAS has normal baseline tryptase.</div></div>`;
        document.getElementById('dxSubmit').textContent = 'Continue →';
        document.getElementById('dxSubmit').onclick = () => goTo('triggers_q');
    }

    let selectedTrig = new Set();
    function toggleTrig(id) {
        const el = document.querySelector(`#trigOpts .checkbox-item[data-id="${id}"]`);
        if(selectedTrig.has(id)) { selectedTrig.delete(id); el.classList.remove('selected'); }
        else { selectedTrig.add(id); el.classList.add('selected'); }
    }
    function submitTrig() {
        let correct = 0;
        triggers.forEach(t => {
            const el = document.querySelector(`#trigOpts .checkbox-item[data-id="${t.id}"]`);
            const sel = selectedTrig.has(t.id);
            if (t.isTrig && sel) { el.classList.add('correct'); correct++; }
            else if (!t.isTrig && sel) { el.classList.add('incorrect'); }
        });
        state.trigScore = Math.round(correct / 5 * 100);
        addScore(Math.round(state.trigScore / 2.5));
        document.getElementById('trigFeedback').innerHTML = `<div class="feedback ${state.trigScore>=75?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${state.trigScore>=75?'✅':'📚'}</span><span class="feedback-title">Triggers</span></div><div class="feedback-text"><strong>Common:</strong> Heat, stress, alcohol, NSAIDs, opioids, exercise, insect stings. Always carry epinephrine!</div></div>`;
        document.querySelector('#trigFeedback').closest('.card-body').querySelector('.btn-row').innerHTML = `<button class="btn btn-primary" onclick="goTo('treatment')">Plan Treatment →</button>`;
    }

    let selectedRx = new Set();
    function toggleRx(id) {
        const el = document.querySelector(`#rxOpts .checkbox-item[data-id="${id}"]`);
        if(selectedRx.has(id)) { selectedRx.delete(id); el.classList.remove('selected'); }
        else { selectedRx.add(id); el.classList.add('selected'); }
    }
    function submitRx() {
        let correct = 0;
        treatments.forEach(t => {
            const el = document.querySelector(`#rxOpts .checkbox-item[data-id="${t.id}"]`);
            const sel = selectedRx.has(t.id);
            if (t.correct && sel) { el.classList.add('correct'); correct++; }
            else if (!t.correct && sel) { el.classList.add('incorrect'); }
        });
        state.rxScore = Math.round(correct / 3 * 100);
        addScore(Math.round(state.rxScore / 2.5));
        document.getElementById('rxFeedback').innerHTML = `<div class="feedback ${state.rxScore>=75?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${state.rxScore>=75?'✅':'📚'}</span><span class="feedback-title">Treatment</span></div><div class="feedback-text"><strong>Mainstays:</strong> H1+H2 antihistamines, cromolyn, epinephrine. <strong>Avoid:</strong> Daily steroids (side effects outweigh benefits).</div></div>`;
        document.querySelector('#rxFeedback').closest('.card-body').querySelector('.btn-row').innerHTML = `<button class="btn btn-primary" onclick="goTo('outcome')">Complete →</button>`;
    }

    function goTo(id) { state.stage = id; document.getElementById('stageContainer').innerHTML = stages[id].render(); window.scrollTo(0,0); }
    document.addEventListener('DOMContentLoaded', () => goTo('setup'));
    </script>
</body>
</html>
