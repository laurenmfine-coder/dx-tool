<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hemifacial Microsomia - ReasonDx Clinical Reasoning Case</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%); min-height: 100vh; padding: 20px; color: #f8fafc; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { background: rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
        .header h1 { font-size: 1.5rem; color: #fef3c7; }
        .score-display { display: flex; gap: 20px; font-size: 0.9rem; }
        .score-item { background: rgba(255,255,255,0.15); padding: 8px 16px; border-radius: 20px; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; margin-top: 12px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #4ade80, #fbbf24); border-radius: 3px; transition: width 0.3s; }
        .scene { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        .scene-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .scene-phase { font-size: 0.85rem; color: #c4b5fd; text-transform: uppercase; letter-spacing: 1px; }
        .scene-title { font-size: 1.5rem; font-weight: 700; color: #e9d5ff; margin-top: 4px; }
        .narrative { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px 20px; margin: 16px 0; border-left: 4px solid #a78bfa; line-height: 1.7; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .question-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(236,72,153,0.2)); border: 1px solid rgba(168,85,247,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .question-prompt { font-size: 1.1rem; font-weight: 600; color: #e9d5ff; margin-bottom: 16px; }
        .mcq-options { display: flex; flex-direction: column; gap: 10px; }
        .mcq-option { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: flex-start; gap: 12px; }
        .mcq-option:hover:not(.disabled) { background: rgba(255,255,255,0.1); }
        .mcq-option.disabled { cursor: default; opacity: 0.7; }
        .mcq-option.correct { border-color: #22c55e !important; background: rgba(34,197,94,0.2) !important; opacity: 1 !important; }
        .mcq-option.incorrect { border-color: #ef4444 !important; background: rgba(239,68,68,0.2) !important; }
        .option-letter { width: 28px; height: 28px; background: rgba(139,92,246,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
        .feedback { display: none; margin-top: 16px; padding: 16px; border-radius: 10px; }
        .feedback.show { display: block; }
        .correct-feedback { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); }
        .incorrect-feedback { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); }
        .teaching-point { display: none; margin-top: 20px; background: rgba(139,92,246,0.15); border: 1px solid rgba(168,85,247,0.3); border-radius: 12px; padding: 20px; }
        .teaching-point.show { display: block; }
        .mechanism-box { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 16px; margin: 12px 0; }
        .mechanism-title { color: #c4b5fd; font-weight: 600; font-size: 1rem; margin-bottom: 10px; }
        .pathway { font-family: 'Monaco', 'Consolas', monospace; font-size: 0.85rem; white-space: pre-wrap; line-height: 1.6; color: #e2e8f0; }
        .btn { background: linear-gradient(135deg, #a78bfa, #f472b6); color: white; border: none; padding: 12px 28px; border-radius: 25px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: none; margin-top: 16px; }
        .btn.show { display: inline-block; }
        .btn:hover { transform: translateY(-2px); }
        .alert-box { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.3); border-radius: 10px; padding: 16px; margin: 16px 0; }
        .alert-title { color: #fbbf24; font-weight: 700; margin-bottom: 8px; }
        .completion { text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👤 Hemifacial Microsomia</h1>
            <div class="score-display">
                <div class="score-item">Score: <strong id="score">0</strong>/<span id="maxScore">60</span></div>
                <div class="score-item">Stage: <span id="stageNum">1</span>/6</div>
            </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width: 16%"></div></div>
        <div id="scene-container"></div>
    </div>
    <script>
    let currentStage = 0, score = 0;
    const stages = [
        {title:"The Asymmetric Newborn",content:'<div class="narrative"><p>A <span class="highlight">3-day-old female</span> is noted to have significant facial asymmetry. The right side of her face appears underdeveloped compared to the left. On examination, you note a <span class="highlight">small, malformed right ear</span> (microtia), <span class="highlight">preauricular skin tags</span>, and the <span class="critical">chin deviates toward the right side</span>.</p><p style="margin-top:12px;"><strong>Additional findings:</strong> Right facial nerve weakness with incomplete eye closure. Right cheek appears flatter with less soft tissue.</p></div>',question:{prompt:"What is the second most common facial birth defect after cleft lip/palate?",options:[{text:"Craniosynostosis",correct:false},{text:"Hemifacial microsomia",correct:true},{text:"Pierre Robin sequence",correct:false},{text:"Treacher Collins syndrome",correct:false}],explanation:{correct:"Correct! Hemifacial microsomia (HFM) is the SECOND most common facial birth defect, occurring in 1:3,500-5,600 births. It involves underdevelopment of structures from the 1st and 2nd pharyngeal arches, typically unilateral (70%) or asymmetrically bilateral (30%).",incorrect:"Hemifacial microsomia is the 2nd most common facial anomaly after clefts. It's more common than craniosynostosis, Pierre Robin, or Treacher Collins."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Hemifacial Microsomia Basics</div><div class="pathway">HEMIFACIAL MICROSOMIA:\n• 2nd most common facial birth defect\n• Incidence: 1:3,500-5,600\n• Male:Female = 3:2\n• Right side more common (60%)\n• Unilateral 70%, bilateral 30%\n\nAFFECTED STRUCTURES:\n(1st & 2nd pharyngeal arch derivatives)\n• Mandible\n• Maxilla/zygoma\n• Ear (external, middle)\n• Facial nerve\n• Muscles of mastication\n• Soft tissue\n\nAlso called:\n• Craniofacial microsomia\n• Oculo-auriculo-vertebral spectrum\n• Goldenhar syndrome (with dermoids)</div></div>',points:10}},
        
        {title:"The OMENS Classification",content:'<div class="narrative"><p>You use the OMENS classification to systematically document the severity of involvement in this patient.</p></div>',question:{prompt:"In the OMENS classification, what does each letter represent?",options:[{text:"Occlusion, Mandible, Ear, Nose, Skin",correct:false},{text:"Orbit, Mandible, Ear, Nerve, Soft tissue",correct:true},{text:"Orbit, Maxilla, Eye, Nerve, Spine",correct:false},{text:"Occiput, Mandible, Ear, Neck, Soft tissue",correct:false}],explanation:{correct:"Correct! OMENS = Orbit, Mandible, Ear, Nerve (facial), Soft tissue. Each component is graded 0-3 based on severity, allowing standardized documentation and communication between specialists.",incorrect:"OMENS = Orbit, Mandible, Ear, Nerve, Soft tissue. This systematic classification helps grade severity of each affected structure."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 OMENS Classification</div><div class="pathway">O - ORBIT (0-3)\n  0: Normal\n  1: Abnormal size\n  2: Abnormal position\n  3: Abnormal size AND position\n\nM - MANDIBLE (0-3, Pruzansky)\n  0: Normal\n  1: Small but normal shape\n  2a: Abnormal ramus, functional TMJ\n  2b: Abnormal ramus, non-functional TMJ\n  3: Absent ramus/condyle/TMJ\n\nE - EAR (0-3)\n  0-3: Normal to severe microtia\n\nN - NERVE (Facial, 0-3)\n  0-3: None to all branches affected\n\nS - SOFT TISSUE (0-3)\n  0-3: None to severe deficiency</div></div>',points:10}},

        {title:"Associated Anomalies",content:'<div class="narrative"><p>You know that hemifacial microsomia is part of the oculo-auriculo-vertebral spectrum (OAVS) and may have associated anomalies requiring screening.</p></div><div class="alert-box"><div class="alert-title">⚠️ Screen for Associated Anomalies</div><p>HFM can be associated with cardiac, vertebral, and renal anomalies that need evaluation.</p></div>',question:{prompt:"Which screening test is MOST urgent to obtain in a newborn with HFM?",options:[{text:"CT facial bones",correct:false},{text:"MRI brain",correct:false},{text:"Audiology assessment (ABR)",correct:true},{text:"Genetic testing",correct:false}],explanation:{correct:"Correct! Hearing assessment is MOST urgent because conductive hearing loss is extremely common (from ear canal atresia and middle ear anomalies) and impacts language development. Early amplification during the critical language window is essential.",incorrect:"Audiology is most urgent! Hearing loss affects language development. Early intervention with hearing aids or BAHA during the critical period is essential."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Associated Anomaly Screening</div><div class="pathway">PRIORITY SCREENING:\n\n1. AUDIOLOGY (Most urgent!)\n   • Conductive loss very common\n   • ABR in newborn period\n   • Early amplification critical\n\n2. CARDIAC (15-30%)\n   • Echocardiogram\n   • VSD, conotruncal defects\n\n3. VERTEBRAL (20-35%)\n   • Spine X-ray\n   • Hemivertebrae, scoliosis\n\n4. RENAL (10-15%)\n   • Renal ultrasound\n   • Agenesis, ectopia\n\n5. OPHTHALMOLOGY\n   • Epibulbar dermoid (Goldenhar)\n   • Coloboma\n\nGOLDENHAR = HFM + epibulbar\ndermoid + vertebral anomalies</div></div>',points:10}},

        {title:"Etiology",content:'<div class="narrative"><p>The parents ask what caused this condition. You explain the proposed mechanisms.</p></div>',question:{prompt:"What is the most widely accepted theory for the etiology of hemifacial microsomia?",options:[{text:"Genetic mutation in a single gene",correct:false},{text:"Vascular disruption (stapedial artery hemorrhage)",correct:true},{text:"Teratogenic medication exposure",correct:false},{text:"Amniotic band syndrome",correct:false}],explanation:{correct:"Correct! The vascular disruption theory (stapedial artery hemorrhage) is most widely accepted. Hemorrhage from this artery during weeks 4-8 disrupts development of ipsilateral 1st and 2nd pharyngeal arch structures, explaining the typically unilateral involvement.",incorrect:"Vascular disruption (stapedial artery hemorrhage) is the most accepted theory. This explains why involvement is typically unilateral - the hemorrhage affects one side."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Etiology Theories</div><div class="pathway">VASCULAR DISRUPTION (Most accepted):\n• Stapedial artery hemorrhage\n• Weeks 4-8 of development\n• Disrupts 1st/2nd arch structures\n• Explains UNILATERAL involvement\n\nOTHER THEORIES:\n• Neural crest cell migration defect\n• Genetic factors (rare familial)\n• Teratogenic (thalidomide, retinoic acid)\n\nMOST CASES:\n• Sporadic (98%)\n• Familial only 2%\n• No single gene identified\n\nRISK FACTORS:\n• Maternal diabetes\n• Multiple gestation\n• Vasoactive medications</div></div>',points:10}},

        {title:"Surgical Timeline",content:'<div class="narrative"><p>You discuss the staged reconstructive approach with the family. Multiple surgeries will be needed over many years.</p></div>',question:{prompt:"At what age is autologous rib cartilage ear reconstruction (microtia repair) typically performed?",options:[{text:"1-2 years",correct:false},{text:"3-4 years",correct:false},{text:"6-10 years",correct:true},{text:"After 16 years",correct:false}],explanation:{correct:"Correct! Microtia reconstruction with rib cartilage is typically done at age 6-10 years. This allows adequate rib cartilage development while still being before significant peer pressure in school years. The contralateral ear is used as a template.",incorrect:"Microtia repair is typically at 6-10 years, when rib cartilage is adequate but before significant school-age peer pressure."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Surgical Timeline</div><div class="pathway">AGE        PROCEDURE\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n0-6 mo     Hearing aids/BAHA\n           (soft band)\n\n2-4 yr     Mandibular distraction\n           (if severe asymmetry)\n\n6-10 yr    MICROTIA RECONSTRUCTION\n           (rib cartilage graft)\n\n8-12 yr    Canaloplasty\n           (if anatomically feasible)\n\nAdolescence:\n           • Orthognathic surgery\n           • Soft tissue augmentation\n           • Fat grafting\n           • Final refinements\n\nMICROTIA OPTIONS:\n• Rib cartilage (Brent/Nagata)\n• Medpor implant\n• Prosthetic ear</div></div>',points:10}},

        {title:"Prognosis",content:'<div class="narrative"><p>You counsel the parents about the long-term outlook for their daughter.</p></div>',question:{prompt:"What is the expected cognitive outcome for most patients with hemifacial microsomia?",options:[{text:"Significant intellectual disability",correct:false},{text:"Normal intelligence in most cases",correct:true},{text:"Moderate learning disability",correct:false},{text:"Depends on the OMENS score",correct:false}],explanation:{correct:"Correct! Most patients with HFM have NORMAL intelligence. The primary developmental concern is hearing loss affecting language development, which is why early audiology and amplification is critical. Psychosocial support is important throughout childhood.",incorrect:"Intelligence is typically NORMAL in HFM. The main developmental concern is hearing loss affecting language. Early hearing intervention is key."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Prognosis</div><div class="pathway">COGNITIVE:\n• Normal intelligence in most\n• Hearing loss can affect language\n  if not addressed early\n• Academic support may be needed\n\nFUNCTIONAL:\n• Good outcomes with staged\n  reconstruction\n• Hearing rehabilitation critical\n• Multiple surgeries over years\n\nPSYCHOSOCIAL:\n• Support essential throughout\n• Facial difference impacts QOL\n• Peer relationships important\n• Family counseling helpful\n\nKEY POINTS:\n• Early hearing = language success\n• Multidisciplinary team essential\n• Long-term follow-up needed\n• Generally excellent prognosis!</div></div>',points:10}}
    ];
    
    function updateProgress(){
        document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';
        document.getElementById('stageNum').textContent=currentStage+1;
        document.getElementById('maxScore').textContent=stages.length*10;
    }
    
    function renderStage(){
        const stage=stages[currentStage];
        let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;
        if(stage.question){
            html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';
            stage.question.options.forEach((opt,i)=>{
                html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';
            });
            html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div>';
            html+='<div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';
            if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';
            html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';
        }
        html+='</div>';
        document.getElementById('scene-container').innerHTML=html;
        updateProgress();
    }
    
    function checkAnswer(idx,correct){
        const options=document.querySelectorAll('.mcq-option');
        if(options[0].classList.contains('disabled'))return;
        options.forEach((opt,i)=>{
            opt.classList.add('disabled');
            if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');
            else if(i===idx&&!correct)opt.classList.add('incorrect');
        });
        if(correct){
            document.getElementById('fb-correct').classList.add('show');
            score+=stages[currentStage].question.points;
            document.getElementById('score').textContent=score;
        }else{
            document.getElementById('fb-incorrect').classList.add('show');
        }
        const t=document.getElementById('teaching');
        if(t)t.classList.add('show');
        document.getElementById('next-btn').classList.add('show');
    }
    
    function nextStage(){
        if(currentStage<stages.length-1){
            currentStage++;
            renderStage();
            window.scrollTo(0,0);
        }else{
            document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:#a78bfa;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><div style="margin-top:20px;padding:15px;background:rgba(59,130,246,0.15);border-radius:10px;border:1px solid rgba(59,130,246,0.3);"><p style="color:#93c5fd;margin-bottom:10px;font-weight:600;">📚 Learn More:</p><div style="display:flex;flex-wrap:wrap;gap:8px;"><a href="hemifacial-microsomia-module.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📘 MechanismDx</a><a href="hemifacial-microsomia-deepdive.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📊 Deep Dive</a></div><div style="margin-top:10px;"><a href="https://www.ncbi.nlm.nih.gov/books/NBK557424/" target="_blank" style="color:#93c5fd;font-size:0.8rem;">📖 StatPearls Reference</a></div></div><p>You mastered Hemifacial Microsomia!</p></div>';
        }
    }
    
    renderStage();
    </script>

    <!-- DxSuite AI Tutor Integration -->
    <div data-dx-tutor
         data-module-title="Hemifacial Microsomia"
         data-key-points="🎉 Case Complete!, clinical reasoning, differential diagnosis, diagnostic workup, illness scripts"
         data-objectives="Develop systematic clinical reasoning, refine differential diagnosis skills"
         style="display:none;"></div>
    <script src="dx-ai-tutor.js"></script>
</body>
</html>
