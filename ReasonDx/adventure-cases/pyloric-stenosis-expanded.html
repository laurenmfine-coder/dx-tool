    <script>
    let decisionPath = [];
let currentStage = 0, score = 0;
    const stages = [
        {title:"The Vomiting Infant",content:'<div class="narrative"><p>A <span class="highlight">4-week-old firstborn male</span> presents with <span class="critical">progressive, projectile, non-bilious vomiting</span> after feeds for 1 week. He is always hungry after vomiting. Parents note decreased wet diapers.</p><p style="margin-top:12px;"><strong>Exam:</strong> Mildly dehydrated, visible gastric peristalsis, palpable "olive" in RUQ</p></div>',question:{prompt:"What is the CLASSIC age of presentation for pyloric stenosis?",options:[{text:"First week of life",correct:false},{text:"2-6 weeks of age",correct:true},{text:"6 months of age",correct:false},{text:"1 year of age",correct:false}],explanation:{correct:"Correct! Pyloric stenosis typically presents at 2-6 weeks of age (peak 3-5 weeks). Rarely presents before 1 week or after 12 weeks. Firstborn males are at highest risk.",incorrect:"Classic presentation: 2-6 weeks (peak 3-5 weeks). Earlier or later is atypical."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Pyloric Stenosis Basics</div><div class="pathway">AGE: 2-6 weeks (peak 3-5 weeks)\n\nRISK FACTORS:\n• Firstborn male (4:1 male:female)\n• Family history\n• Erythromycin exposure (infant or maternal)\n• Bottle feeding\n\nPATHOPHYSIOLOGY:\n• Hypertrophy of pyloric muscle\n• Gastric outlet obstruction\n• Progressive over days-weeks</div></div>',why_chain:[],points:10}},
        {title:"The Classic Presentation",content:'<div class="narrative"><p>What makes the vomiting of pyloric stenosis distinctive?</p></div>',question:{prompt:"What type of vomiting is CLASSIC for pyloric stenosis?",options:[{text:"Bilious vomiting",correct:false},{text:"Projectile, non-bilious vomiting",correct:true},{text:"Bloody vomiting",correct:false},{text:"Effortless regurgitation",correct:false}],explanation:{correct:"Correct! Projectile, NON-bilious vomiting is classic. Obstruction is proximal to the ampulla of Vater, so bile cannot reflux back. Infant is hungry immediately after vomiting (\"hungry vomiter\").",incorrect:"Projectile + non-bilious = pyloric stenosis. Bilious vomiting suggests obstruction DISTAL to ampulla."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Classic Features</div><div class="pathway">VOMITING:\n• Projectile (forceful)\n• Non-bilious (obstruction proximal to bile duct)\n• Immediately after feeds\n• Progressive over days\n• "Hungry vomiter" - wants to eat right after\n\nPHYSICAL EXAM:\n• Visible gastric peristalsis (waves L→R)\n• Palpable "olive" in RUQ\n  (hypertrophied pylorus)\n• Dehydration signs\n\n"OLIVE" palpated in only 25-75% of cases</div></div>',why_chain:[],points:10}},
        {title:"The Classic Electrolyte Abnormality",content:'<div class="narrative"><p>Labs are drawn. What electrolyte pattern do you expect?</p></div>',question:{prompt:"What is the CLASSIC electrolyte abnormality in pyloric stenosis?",options:[{text:"Hyperkalemic metabolic acidosis",correct:false},{text:"Hypochloremic, hypokalemic metabolic alkalosis",correct:true},{text:"Hyperchloremic metabolic acidosis",correct:false},{text:"Respiratory alkalosis",correct:false}],explanation:{correct:"Correct! Loss of gastric acid (HCl) → hypochloremic, hypokalemic metabolic alkalosis. This is the classic \"contraction alkalosis.\" Must correct before surgery!",incorrect:"HCl loss → hypochloremic, hypokalemic metabolic ALKALOSIS. The classic pattern."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Electrolyte Mechanism</div><div class="pathway">LOSS OF GASTRIC CONTENTS:\n• H+ loss → metabolic alkalosis\n• Cl- loss → hypochloremia\n• K+ loss (vomiting + renal wasting)\n\nRENAL COMPENSATION:\n• Kidneys try to retain H+\n• Exchange H+ for K+ → more K+ loss\n• "Paradoxical aciduria"\n  (acid urine despite alkalosis)\n\nCLASSIC PATTERN:\n↓ Cl-, ↓ K+, ↑ HCO3-, ↑ pH\n\nMUST CORRECT BEFORE SURGERY!</div></div>',why_chain:[],points:10}},
        {title:"Diagnosis: Ultrasound",content:'<div class="narrative"><p>You order an abdominal ultrasound to confirm the diagnosis.</p></div>',question:{prompt:"What ultrasound findings confirm pyloric stenosis?",options:[{text:"Pyloric wall thickness >3mm and channel length >15mm",correct:true},{text:"Intussusception target sign",correct:false},{text:"Free fluid in abdomen",correct:false},{text:"Dilated loops of bowel",correct:false}],explanation:{correct:"Correct! US criteria: pyloric muscle thickness >3mm AND pyloric channel length >15-17mm. Also look for \"target sign\" on transverse and \"shoulder sign\" on longitudinal views.",incorrect:"Pyloric thickness >3mm + length >15mm confirms diagnosis. \"3-15 rule\" or \"π rule\" (3.14)."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Ultrasound Criteria</div><div class="pathway">DIAGNOSTIC CRITERIA:\n• Muscle thickness >3 mm\n• Channel length >15-17 mm\n• Pyloric diameter >13 mm\n\nMNEMONIC: "π" (3.14)\nor "3-15" rule\n\nUS FINDINGS:\n• "Target sign" (transverse view)\n• "Shoulder sign" (muscle bulging into antrum)\n• "Cervix sign"\n• Elongated pyloric channel\n\nSENSITIVITY: >95%\nSPECIFICITY: ~100%</div></div>',why_chain:[],points:10}},
        {title:"Management: Fluid Resuscitation First",content:'<div class="narrative"><p>Diagnosis confirmed. What is the first step in management?</p></div><div class="alert-box"><div class="alert-title">⚠️ Surgery is NOT emergent!</div><p>Pyloric stenosis is a medical emergency (dehydration), not a surgical emergency. Stabilize first!</p></div>',question:{prompt:"What is the FIRST step in managing pyloric stenosis?",options:[{text:"Emergent surgery",correct:false},{text:"IV fluid resuscitation and electrolyte correction",correct:true},{text:"NG tube decompression only",correct:false},{text:"Oral rehydration",correct:false}],explanation:{correct:"Correct! IV fluid resuscitation and electrolyte correction BEFORE surgery. Pyloric stenosis is a medical emergency (dehydration/electrolytes), not a surgical emergency. Surgery after stabilization.",incorrect:"Fluids and electrolyte correction FIRST! Surgery is not emergent. Correct Cl, K, dehydration before OR."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Pre-operative Management</div><div class="pathway">STEP 1: IV FLUID RESUSCITATION\n• NS or D5 ½NS with KCl\n• Correct dehydration\n• Correct hypochloremia\n• Correct hypokalemia\n\nGOALS BEFORE SURGERY:\n• Adequate urine output\n• Cl >100 mEq/L\n• K >3.0 mEq/L\n• HCO3 <30 mEq/L\n\nNPO + NG tube if needed\n\nSURGERY can wait 24-48h for stabilization!</div></div>',why_chain:[],points:10}},
        {title:"Surgical Treatment",content:'<div class="narrative"><p>After fluid resuscitation, the infant is ready for surgery.</p></div>',question:{prompt:"What is the definitive surgical treatment for pyloric stenosis?",options:[{text:"Pyloroplasty",correct:false},{text:"Ramstedt pyloromyotomy",correct:true},{text:"Gastric bypass",correct:false},{text:"Total gastrectomy",correct:false}],explanation:{correct:"Correct! Ramstedt pyloromyotomy: longitudinal incision through the hypertrophied pyloric muscle down to (but not through) the mucosa. Can be done open or laparoscopically. Curative!",incorrect:"Pyloromyotomy = cutting the muscle, not the mucosa. Curative procedure."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Pyloromyotomy</div><div class="pathway">RAMSTEDT PYLOROMYOTOMY:\n• Longitudinal incision through muscle\n• Down to but NOT through mucosa\n• Releases obstruction\n• Laparoscopic or open approach\n\nPOST-OP:\n• Feeds typically started within 6-24h\n• May have some vomiting initially\n  (normal, resolves)\n• Excellent prognosis\n\nCOMPLICATIONS (rare):\n• Mucosal perforation\n• Incomplete myotomy\n• Wound infection</div></div>',why_chain:[],points:10}},
        {title:"Case Resolution",content:'<div class="narrative"><p>Your patient received IV NS with KCl for 18 hours. Electrolytes normalized (Cl 102, K 3.8, HCO3 26). Laparoscopic pyloromyotomy was performed successfully. Feeds started at 8 hours post-op. Discharged home on day 2 feeding well.</p></div><div class="mechanism-box"><div class="mechanism-title">📚 Pyloric Stenosis Summary</div><div class="pathway">PRESENTATION:\n• Age 2-6 weeks, firstborn male\n• Projectile, non-bilious vomiting\n• "Hungry vomiter"\n• Olive mass, visible peristalsis\n\nLABS:\nHypochloremic, hypokalemic metabolic alkalosis\n\nDIAGNOSIS:\nUS: thickness >3mm, length >15mm\n\nMANAGEMENT:\n1. IV fluids + electrolyte correction FIRST\n2. Pyloromyotomy after stabilization\n\nSurgery is NOT emergent - stabilize first!</div></div>',question:{prompt:"A 4-week-old has bilious vomiting. Is this pyloric stenosis?",options:[{text:"Yes, classic presentation",correct:false},{text:"No - bilious vomiting suggests obstruction distal to ampulla of Vater",correct:true},{text:"Yes, if projectile",correct:false},{text:"Need ultrasound to confirm",correct:false}],explanation:{correct:"Correct! Bilious vomiting = obstruction DISTAL to ampulla of Vater. Think malrotation with volvulus (surgical emergency!). Pyloric stenosis is non-bilious because obstruction is proximal to bile entry.",incorrect:"Bilious = distal obstruction. Pyloric stenosis is non-bilious. Bilious vomiting in neonate = think malrotation!"},teaching:'<h4>Key Takeaways</h4><ul style="line-height:2;margin-left:20px;"><li>Age 2-6 weeks, firstborn male</li><li>Projectile, NON-bilious vomiting</li><li>Hypochloremic, hypokalemic metabolic alkalosis</li><li>US: thickness >3mm, length >15mm</li><li>Correct fluids/electrolytes BEFORE surgery</li><li>Pyloromyotomy is curative</li><li>Bilious vomiting = NOT pyloric stenosis!</li></ul>',why_chain:[],points:10}},
        {title:"Clinical Integration",content:'<div class="narrative"><p>You synthesize all the clinical information to ensure optimal patient care.</p></div>',question:{prompt:"What principle is MOST important for excellent clinical outcomes?",options:[{text:"Integrating clinical presentation with evidence-based guidelines while reassessing response to treatment",correct:true},{text:"Following protocols exactly without clinical judgment",correct:false},{text:"Ordering comprehensive testing to avoid any missed diagnoses",correct:false},{text:"Making a diagnosis quickly and committing to it without reconsideration",correct:false}],explanation:{correct:"Excellent clinical care combines systematic assessment, evidence-based treatment, and ongoing reassessment. Guidelines inform but don't replace clinical reasoning.",incorrect:"Good clinical care requires flexibility, reassessment, and integration of guidelines with patient-specific factors."},teaching:'<h4>Clinical Reasoning</h4><ul><li>Systematic data gathering</li><li>Evidence-based management</li><li>Regular reassessment</li><li>Patient-centered communication</li></ul>',why_chain:[],points:10}}
    ];
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('maxScore').textContent=stages.length*10;}
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-header"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div></div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><div style="font-weight:700;margin-bottom:8px;">✓ Correct!</div>'+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><div style="font-weight:700;margin-bottom:8px;">✗ Not quite</div>'+stage.question.explanation.incorrect+'</div>';if(stage.question.teaching)html+='<div class="teaching-point" id="teaching">'+stage.question.teaching+'</div>';html+='<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=stages[currentStage].question.points;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}const t=document.getElementById('teaching');if(t)t.classList.add('show');document.getElementById('next-btn').classList.add('show');}
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene completion"><h2 style="color:#4ade80;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong> / '+stages.length*10+'</p><p>You mastered Pyloric Stenosis!</p></div>';}}
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}

</script>

<!-- Visual Debrief Overlay -->
<div class="debrief-overlay" id="debriefOverlay" onclick="if(event.target===this)closeDebrief()">
    <div class="debrief-content" id="debriefContent"></div>
</div>
