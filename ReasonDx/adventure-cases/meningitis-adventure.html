<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Stiff Neck | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#F97316;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#C2410C,#F97316);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(249,115,22,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(249,115,22,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(249,115,22,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🧠 The Stiff Neck</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'22M',wt:'75kg',hx:'College student, fever, severe headache, neck stiffness x1d',exam:'Nuchal rigidity, photophobia, + Kernig, petechial rash',vitals:{HR:'112',BP:'108/62',T:'39.8'},labs:{WBC:'18.2',CSF:'Gram+ diplococci'}},int:{age:'68F',wt:'62kg',hx:'DM, fever, confusion x2d, recent sinusitis',exam:'Altered, neck stiff, no focal deficits',vitals:{HR:'98',BP:'148/88',T:'38.9'},labs:{WBC:'14.8',CSF:'PMN predominant, low glucose'}},adv:{age:'35M',wt:'80kg',hx:'HIV+ (CD4 45), headache x1wk, fever, confusion',exam:'Papilledema, CN VI palsy, minimal neck stiffness',vitals:{HR:'88',BP:'138/82',T:'38.2'},labs:{WBC:'6.2',CSF:'Lymphocytes, India ink +'}}};
const Q=[
{t:'Classic Triad',q:'Classic triad of bacterial meningitis?',h:'Present in <50% of patients',o:[{id:'a',txt:'Fever + neck stiffness + altered mental status',c:1,p:100},{id:'b',txt:'Fever + rash + headache',c:0,p:40},{id:'c',txt:'Headache + vomiting + photophobia',c:0,p:30}],fb:{1:'<b>Correct!</b> Classic triad present in only 44%. 95% have at least 2 of 4: headache, fever, neck stiffness, AMS.',0:'<b>Triad:</b> Fever, nuchal rigidity, AMS. Most have at least 2 of these.'}},
{t:'LP Timing',q:'When should LP be delayed for CT first?',h:'Risk of herniation',o:[{id:'a',txt:'Focal neuro deficits, papilledema, seizure, immunocompromised, GCS<10',c:1,p:100},{id:'b',txt:'All suspected meningitis',c:0,p:10},{id:'c',txt:'Never delay LP',c:0,p:0}],fb:{1:'<b>Correct!</b> CT before LP if: focal deficits, papilledema, seizure within 1wk, immunocompromised, GCS<10, or age>60. Give antibiotics before CT!',0:'<b>CT first:</b> When herniation risk present. BUT give antibiotics immediately regardless.'}},
{t:'Empiric Antibiotics',q:'Empiric antibiotics for adult bacterial meningitis?',h:'Cover common pathogens',o:[{id:'a',txt:'Vancomycin + ceftriaxone (+ ampicillin if >50 or immunocompromised)',c:1,p:100},{id:'b',txt:'Ceftriaxone alone',c:0,p:40},{id:'c',txt:'Penicillin G',c:0,p:20}],fb:{1:'<b>Correct!</b> Vanc (MRSA, resistant pneumo) + ceftriaxone (pneumo, meningococcus, H flu). Add ampicillin >50yo for Listeria.',0:'<b>Empiric:</b> Vanc + ceftriaxone. Add ampicillin for Listeria risk (age>50, immunocompromised, alcoholism).'}},
{t:'Dexamethasone',q:'When to give dexamethasone in meningitis?',h:'Timing is critical',o:[{id:'a',txt:'Give BEFORE or WITH first antibiotic dose (not after)',c:1,p:100},{id:'b',txt:'After culture results',c:0,p:0},{id:'c',txt:'Never indicated',c:0,p:10}],fb:{1:'<b>Correct!</b> Dexamethasone 0.15 mg/kg q6h x4d. Give before or with first antibiotic. Reduces mortality in pneumococcal meningitis.',0:'<b>Timing:</b> Steroids BEFORE or WITH antibiotics. No benefit if given after.'}},
{t:'CSF Interpretation',q:'CSF: WBC 1200 (90% PMN), protein 180, glucose 25 (serum 120). Pattern?',h:'Bacterial vs viral vs fungal',o:[{id:'a',txt:'Bacterial meningitis (PMN predominant, low glucose)',c:1,p:100},{id:'b',txt:'Viral meningitis',c:0,p:0},{id:'c',txt:'Fungal meningitis',c:0,p:20}],fb:{1:'<b>Correct!</b> Bacterial: PMN predominant, high protein, LOW glucose (<40 or ratio<0.4). Viral: lymphocytes, normal glucose. Fungal: lymphocytes, low glucose.',0:'<b>CSF patterns:</b> Bacterial=PMN/low glucose. Viral=lymph/normal glucose. Fungal=lymph/low glucose.'}},
{t:'Cryptococcal Meningitis',q:'HIV patient with headache, + India ink. Treatment?',h:'Antifungal induction',o:[{id:'a',txt:'Amphotericin B + flucytosine x2wks, then fluconazole consolidation',c:1,p:100},{id:'b',txt:'Fluconazole alone',c:0,p:30},{id:'c',txt:'Ceftriaxone',c:0,p:0}],fb:{1:'<b>Correct!</b> Crypto: Induction (AmB + 5-FC x2wks) → Consolidation (fluconazole 400mg x8wks) → Maintenance (fluconazole 200mg until CD4>200).',0:'<b>Crypto treatment:</b> AmB + flucytosine induction, then fluconazole.'}},
{t:'Prophylaxis',q:'Close contacts of meningococcal meningitis. Prophylaxis?',h:'Prevent secondary cases',o:[{id:'a',txt:'Ciprofloxacin 500mg x1 OR rifampin x2d OR ceftriaxone IM x1',c:1,p:100},{id:'b',txt:'No prophylaxis needed',c:0,p:0},{id:'c',txt:'Penicillin',c:0,p:20}],fb:{1:'<b>Correct!</b> Chemoprophylaxis for close contacts within 24 hrs. Cipro single dose (adults), rifampin x2d, or ceftriaxone IM (pregnant).',0:'<b>Prophylaxis:</b> Cipro, rifampin, or ceftriaxone for close contacts.'}},
{t:'HSV Encephalitis',q:'Altered mental status, fever, temporal lobe on MRI. Add what?',h:'Viral encephalitis treatment',o:[{id:'a',txt:'Acyclovir 10 mg/kg IV q8h',c:1,p:100},{id:'b',txt:'More antibiotics',c:0,p:20},{id:'c',txt:'Steroids only',c:0,p:10}],fb:{1:'<b>Correct!</b> HSV encephalitis: Acyclovir 10 mg/kg q8h x14-21d. Start empirically if suspected. Temporal lobe involvement classic.',0:'<b>HSV encephalitis:</b> Acyclovir 10 mg/kg q8h. Dont delay for PCR.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🧠 The Stiff Neck</h1><p style="color:var(--muted);margin-bottom:32px">Meningitis: LP timing, empiric Abx, dexamethasone, CSF patterns, crypto</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🦠 CNS Infection</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Meningitis Pearls</div><div class="pearl-item"><b>Empiric:</b> Vanc + ceftriaxone. Add ampicillin if >50</div><div class="pearl-item"><b>Steroids:</b> Dexamethasone BEFORE or WITH first antibiotic</div><div class="pearl-item"><b>CT first:</b> Focal deficits, papilledema, seizure, immunocompromised</div><div class="pearl-item"><b>Bacterial CSF:</b> PMN predominant, low glucose</div><div class="pearl-item"><b>HSV:</b> Acyclovir 10 mg/kg q8h</div></div><div class="cross-link"><a href="../mechanism/neurology.html">MechanismDx: Neurology</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
