    <script>
    let decisionPath = [];
let currentStage = 0, score = 0, difficulty = 'standard';
    const stages = [
    {
        title: "The Seizing Patient",
        content: `<div class="narrative"><p>EMS brings a <span class="highlight">45-year-old man</span> with <span class="critical">ongoing generalized tonic-clonic seizure</span> for 12 minutes. History of epilepsy, ran out of medications 3 days ago.</p><p style="margin-top:12px;"><strong>EMS report:</strong> Witnessed onset, continuous convulsions, one dose of IM midazolam (10 mg) given en route<br><strong>Vitals:</strong> HR 130, BP 180/100, RR agonal, SpO2 88%<br><strong>Exam:</strong> Generalized tonic-clonic activity, cyanotic, unresponsive</p></div>
        <div class="alert-box"><div class="alert-title">🚨 Time Is Brain!</div><p>Seizures >5 minutes unlikely to stop spontaneously. Prolonged seizures cause excitotoxic neuronal injury. Treat immediately!</p></div>
        <div class="socratic-prompt"><h4>Critical Thinking</h4><p>What defines status epilepticus and why has the definition changed from 30 minutes to 5 minutes?</p></div>`,
        hint_beginner: "Most self-limited seizures stop within 2-3 minutes. Think about why 5 minutes is the new threshold.",
        hint_advanced: "What molecular changes occur at the GABA receptor level during prolonged seizures that affect treatment?",
        question: {
            prompt: "What is the CURRENT operational definition of status epilepticus that should trigger immediate treatment?",
            options: [
                { text: "Continuous seizure activity for ≥30 minutes", correct: false },
                { text: "Continuous seizure activity for ≥5 minutes", correct: true },
                { text: "Two or more seizures with full recovery between", correct: false },
                { text: "Any seizure lasting longer than 2 minutes", correct: false }
            ],
            explanation: {
                correct: "Correct! The operational definition is ≥5 minutes of continuous seizure activity. Most self-limited seizures stop within 2-3 minutes, so after 5 minutes, self-termination is unlikely and treatment should begin immediately.",
                incorrect: "The 30-minute definition is outdated. Current guidelines define status epilepticus as ≥5 minutes of continuous seizure activity. By 30 minutes, permanent neuronal injury has already begun."
            },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">🧬 Why 5 Minutes Matters</div><div class="pathway">Most self-limited seizures stop within 2-3 minutes

After 5 minutes of continuous seizure:
• GABA receptor internalization begins
• Benzodiazepines become LESS effective
• Glutamate excitotoxicity increases
• Self-termination becomes unlikely
• Each additional minute → worse outcomes

Old definition (30 min) → permanent injury already occurring
New definition (5 min) → TREAT NOW before injury begins</div></div>`,
            why_chain: [{q: "Why do benzodiazepines become less effective over time?", a: "During prolonged seizures, GABA-A receptors are internalized from the cell surface into the cytoplasm. This reduces the number of receptors available for benzodiazepines to enhance. By 30 minutes, benzo efficacy drops dramatically."}, {q: "What is the significance of 30 minutes then?", a: "30 minutes marks when permanent neuronal injury reliably begins due to excitotoxicity. This is why early aggressive treatment is critical - we want to stop seizures BEFORE this point, not at this point."}],
            points: 10
        }
    },
    {
        title: "Initial Stabilization",
        content: `<div class="narrative"><p>You take over care in the ED. The patient continues seizing. EMS gave IM midazolam 5 minutes ago with no response.</p><p>Your team needs to stabilize the patient while preparing treatment.</p></div>
        <div class="socratic-prompt"><h4>Immediate Actions</h4><p>What are the critical stabilization steps in the first 5 minutes while preparing definitive treatment?</p></div>`,
        hint_beginner: "Think ABCs plus the 'don't forget' reversible cause. What metabolic derangement can both cause and result from seizures?",
        hint_advanced: "Why do we give thiamine before glucose in certain populations?",
        question: {
            prompt: "Which immediate action is MOST critical and should be done within the first minute?",
            options: [
                { text: "CT head to rule out structural cause", correct: false },
                { text: "Point-of-care glucose check", correct: true },
                { text: "Lumbar puncture for CSF analysis", correct: false },
                { text: "EEG to confirm seizure activity", correct: false }
            ],
            explanation: {
                correct: "Correct! Hypoglycemia is a rapidly reversible cause of seizures. Point-of-care glucose should be checked within the first minute - it takes seconds and can identify a treatable cause immediately.",
                incorrect: "Checking glucose is the most critical immediate action. Hypoglycemia causes seizures and is rapidly reversible with dextrose. CT, LP, and EEG are important but not first-minute priorities."
            },
            teaching: `<h4>First 5 Minutes - Stabilization</h4><table class="comparison-table"><tr><th>Action</th><th>Rationale</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Airway</strong></td><td>Position, suction, NPA/OPA - do NOT force anything in mouth</td></tr><tr><td><strong>Breathing</strong></td><td>Supplemental O2, BVM if needed</td></tr><tr><td><strong>Circulation</strong></td><td>IV/IO access (2 lines if possible)</td></tr><tr style="background:rgba(251,191,36,0.2);"><td><strong>Glucose</strong></td><td>Check immediately - give D50 if low</td></tr><tr><td><strong>Thiamine</strong></td><td>Give before glucose in alcoholics/malnourished</td></tr><tr><td><strong>Labs</strong></td><td>BMP, CBC, AED levels, toxicology</td></tr></table>`,
            why_chain: [{q: "Why thiamine before glucose?", a: "In thiamine-deficient patients (alcoholics, malnourished), giving glucose can precipitate Wernicke encephalopathy by depleting remaining thiamine stores. Giving thiamine first prevents this complication."}, {q: "What labs are most important?", a: "BMP (electrolytes, glucose), AED levels (in known epileptics), toxicology screen. CBC and LFTs are helpful but less immediately actionable."}],
            points: 10
        }
    },
    {
        title: "First-Line Treatment",
        content: `<div class="narrative"><p>IV access is established. Glucose is 110 mg/dL. The patient has now been seizing for approximately 15 minutes total.</p><p>EMS already gave IM midazolam 10 mg with no response.</p></div>
        <div class="socratic-prompt"><h4>Benzodiazepine Strategy</h4><p>Given that one dose of midazolam has failed, what is your next move for first-line treatment?</p></div>`,
        hint_beginner: "How many total doses of benzodiazepines should you give before moving to second-line agents?",
        hint_advanced: "What did the RAMPART trial demonstrate about IM vs IV benzodiazepines?",
        question: {
            prompt: "What is the appropriate NEXT step given that IM midazolam was given 5 minutes ago without response?",
            options: [
                { text: "Give another dose of IM midazolam", correct: false },
                { text: "Give IV lorazepam 4 mg as second benzodiazepine dose", correct: true },
                { text: "Skip benzos entirely, move directly to fosphenytoin", correct: false },
                { text: "Wait another 10 minutes for midazolam to work", correct: false }
            ],
            explanation: {
                correct: "Correct! Give a second benzodiazepine dose. IV lorazepam 4 mg is appropriate since you now have IV access. Maximum of 2 benzodiazepine doses, then move to second-line agents.",
                incorrect: "A second benzodiazepine dose is indicated. After one dose fails (wait ~5 min), give a second dose. Now that IV access is available, IV lorazepam is preferred. Don't skip to second-line without trying 2 benzo doses."
            },
            teaching: `<h4>Benzodiazepine Options</h4><table class="comparison-table"><tr><th>Drug</th><th>Route</th><th>Adult Dose</th><th>Notes</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Midazolam</strong></td><td>IM</td><td>10 mg</td><td>No IV needed - RAMPART showed = IV lorazepam</td></tr><tr><td><strong>Lorazepam</strong></td><td>IV</td><td>4 mg</td><td>Preferred if IV available</td></tr><tr><td><strong>Diazepam</strong></td><td>IV/PR</td><td>10 mg IV / 20 mg PR</td><td>Alternative options</td></tr><tr><td><strong>Midazolam</strong></td><td>IN</td><td>10 mg</td><td>For prehospital/no IV</td></tr></table>
<div class="alert-box"><div class="alert-title">⚠️ Maximum 2 Benzodiazepine Doses</div><p>Further doses have diminishing returns and increase respiratory depression risk. After 2 doses, move to second-line agent.</p></div>`,
            why_chain: [{q: "Why is IM midazolam as effective as IV lorazepam?", a: "The RAMPART trial showed IM midazolam was non-inferior to IV lorazepam. Though IV onset is faster, the time saved by not needing IV access makes IM equally effective in practice."}, {q: "Why limit to 2 benzodiazepine doses?", a: "After 2 doses, additional benzos show diminishing efficacy (GABA receptor trafficking) but continuing respiratory depression risk. Better to escalate to second-line agents with different mechanisms."}],
            points: 10
        }
    },
    {
        title: "Second-Line Agent Selection",
        content: `<div class="narrative"><p>Despite two adequate doses of benzodiazepines, the patient continues seizing (now ~20 minutes).</p><p>You need to select a <span class="highlight">second-line antiepileptic drug</span>.</p></div>
        <div class="socratic-prompt"><h4>Evidence-Based Choice</h4><p>What did the ESETT trial teach us about second-line agent selection in status epilepticus?</p></div>`,
        hint_beginner: "Three drugs are commonly used: levetiracetam, fosphenytoin, and valproate. Which has the fewest drug interactions?",
        hint_advanced: "In what patient populations should you specifically AVOID valproate?",
        question: {
            prompt: "Based on the ESETT trial, which statement about second-line agents is TRUE?",
            options: [
                { text: "Fosphenytoin is clearly superior with ~70% efficacy", correct: false },
                { text: "Levetiracetam, fosphenytoin, and valproate are similarly effective (~50%)", correct: true },
                { text: "Valproate is preferred in all patients due to safety profile", correct: false },
                { text: "Phenobarbital should be first choice as second-line", correct: false }
            ],
            explanation: {
                correct: "Correct! The ESETT trial showed that levetiracetam, fosphenytoin, and valproate are similarly effective (~47-50% success rate). Choice depends on patient factors and availability.",
                incorrect: "The ESETT trial demonstrated equivalence among levetiracetam, fosphenytoin, and valproate at approximately 50% efficacy. No single agent is clearly superior - selection is based on patient factors."

    function setDifficulty(d, btn) {
        difficulty = d;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.hint-beginner').forEach(h => h.style.display = d === 'beginner' ? 'block' : 'none');
        document.querySelectorAll('.hint-advanced').forEach(h => h.style.display = d === 'advanced' ? 'block' : 'none');
    }
    function updateProgress() {
        document.getElementById('progress').style.width = ((currentStage + 1) / stages.length * 100) + '%';
        document.getElementById('maxScore').textContent = stages.length * 10;
    }
    function renderStage() {
        const stage = stages[currentStage];
        const container = document.getElementById('scene-container');
        let html = `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${currentStage + 1} of ${stages.length}</div><div class="scene-title">${stage.title}</div></div>`;
        if (stage.hint_beginner) html += `<div class="hint-beginner" style="display:${difficulty === 'beginner' ? 'block' : 'none'}">🌱 <strong>Beginner Hint:</strong> ${stage.hint_beginner}</div>`;
        if (stage.hint_advanced) html += `<div class="hint-advanced" style="display:${difficulty === 'advanced' ? 'block' : 'none'}">🎯 <strong>Advanced Challenge:</strong> ${stage.hint_advanced}</div>`;
        html += stage.content;
        if (stage.question) {
            html += `<div class="question-box"><div class="question-prompt">${stage.question.prompt}</div><div class="mcq-options">`;
            stage.question.options.forEach((opt, i) => {
                html += `<div class="mcq-option" onclick="checkAnswer(${i}, ${opt.correct})"><div class="option-letter">${String.fromCharCode(65 + i)}</div><div>${opt.text}</div></div>`;
            });
            html += `</div><div class="feedback correct-feedback" id="fb-correct"><div class="feedback-title">✓ Correct!</div>${stage.question.explanation.correct}</div>`;
            html += `<div class="feedback incorrect-feedback" id="fb-incorrect"><div class="feedback-title">✗ Not quite</div>${stage.question.explanation.incorrect}</div>`;
            if (stage.question.teaching) html += `<div class="teaching-point" id="teaching">${stage.question.teaching}</div>`;
            if (stage.question.why_chain && stage.question.why_chain.length > 0) {
                html += `<div class="why-chain" id="why-chain"><h4>🔗 WHY Chain - Dig Deeper</h4>`;
                stage.question.why_chain.forEach(w => {
                    html += `<div class="why-item"><div class="why-q">${w.q}</div><div class="why-a">${w.a}</div></div>`;
                });
                html += `</div>`;
            }
            html += `<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>`;
        }
        html += `</div>`;
        container.innerHTML = html;
        updateProgress();
    }
    function checkAnswer(idx, correct) {
        const options = document.querySelectorAll('.mcq-option');
        if (options[0].classList.contains('disabled')) return;
        options.forEach((opt, i) => {
            opt.classList.add('disabled');
            if (stages[currentStage].question.options[i].correct) opt.classList.add('correct');
            else if (i === idx && !correct) opt.classList.add('incorrect');
        });
        if (correct) {
            document.getElementById('fb-correct').classList.add('show');
            score += stages[currentStage].question.points;
            document.getElementById('score').textContent = score;
        } else {
            document.getElementById('fb-incorrect').classList.add('show');

        if (teaching) teaching.classList.add('show');
        const whyChain = document.getElementById('why-chain');

        document.getElementById('next-btn').classList.add('show');

                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}

</script>
