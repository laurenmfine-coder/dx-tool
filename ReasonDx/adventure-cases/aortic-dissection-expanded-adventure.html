<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aortic Dissection | Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #7f1d1d 0%, #b91c1c 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(127, 29, 29, 0.9); border-radius: 16px; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; background: #b91c1c; margin-left: 10px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #b91c1c, #fca5a5); border-radius: 3px; }
        .scene { background: linear-gradient(135deg, #7f1d1d, #991b1b); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .scene-header { background: rgba(185, 28, 28, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #fca5a5; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(185,28,28,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #b91c1c, #7f1d1d); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #fca5a5; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','classification','presentation','imaging','complications','medical','typeA','typeB','followup','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">🫀 Aortic Dissection<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Tearing Chest Pain</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What comorbidities would change your management approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Always consider mimics and look-alikes in your differential</p>
                </div><div class="narrative"><p>A <span class="highlight">58-year-old man</span> with hypertension presents with <span class="critical">sudden onset severe chest pain radiating to back</span>, described as "tearing." Started 2 hours ago while lifting furniture.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 105, BP 185/110 (R arm), 148/92 (L arm), RR 24<br><strong>Exam:</strong> Diaphoretic, anxious, harsh systolic murmur at right sternal border<br><strong>ECG:</strong> Sinus tachycardia, LVH, no STEMI</p></div><div class="alert-box"><div class="alert-title">🚨 BP Differential >20 mmHg = Red Flag!</div><p>Arm BP difference suggests arch vessel involvement. Classic for dissection extending into subclavian artery.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Pathophysiology</div><div class="pathway">Intimal tear → blood enters media<br>→ Creates false lumen<br>→ Propagates anterograde/retrograde<br>→ Can obstruct branches<br>→ Can rupture externally<br><br>True lumen: Where blood should flow<br>False lumen: Dissection plane</div></div><button class="btn" onclick="nextStage()">Classification →</button></div></div>`;
    };

    window.render_classification = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">Stanford vs DeBakey</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate acuity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would renal or hepatic impairment affect drug dosing?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Classification Systems</div><table class="comparison-table"><tr><th>Stanford</th><th>Anatomy</th><th>Management</th></tr><tr style="background:rgba(239,68,68,0.2);"><td><strong>Type A</strong></td><td>Involves ascending aorta (regardless of origin)</td><td><strong>SURGERY</strong></td></tr><tr><td><strong>Type B</strong></td><td>Descending aorta only (distal to L subclavian)</td><td>Medical (unless complicated)</td></tr></table><table class="comparison-table" style="margin-top:20px;"><tr><th>DeBakey</th><th>Description</th></tr><tr><td>Type I</td><td>Originates in ascending, extends to descending</td></tr><tr><td>Type II</td><td>Ascending aorta only</td></tr><tr><td>Type III</td><td>Descending aorta only</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 Stanford A = Surgical Emergency!</div><p>Mortality increases 1-2% per HOUR without surgery. Type A has 50% mortality at 48 hours if untreated.</p></div><button class="btn" onclick="nextStage()">Presentation →</button></div></div>`;
    };

    window.render_presentation = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">Clinical Features</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the most likely diagnosis given this presentation?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if the patient doesn't respond to initial treatment?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Reassess if the patient isn't improving as expected</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Classic Presentation</div><table class="comparison-table"><tr><th>Feature</th><th>Frequency</th></tr><tr><td><strong>Sudden severe chest/back pain</strong></td><td>~90%</td></tr><tr><td>"Tearing" or "ripping" quality</td><td>~50%</td></tr><tr><td>Maximal at onset</td><td>~85%</td></tr><tr><td>Radiates to back</td><td>~50%</td></tr><tr><td>Migratory pain</td><td>~15%</td></tr><tr><td>Hypertension</td><td>~70%</td></tr><tr><td>Pulse deficit</td><td>~30%</td></tr><tr><td>Aortic regurgitation murmur</td><td>~30% (Type A)</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Risk Factors</div><div class="pathway"><strong>Most common:</strong><br>• Hypertension (70%+)<br>• Age >60<br>• Male sex<br><br><strong>Connective tissue disorders:</strong><br>• Marfan syndrome<br>• Ehlers-Danlos (vascular type)<br>• Bicuspid aortic valve<br>• Turner syndrome<br><br><strong>Other:</strong><br>• Cocaine use<br>• Pregnancy (3rd trimester)<br>• Aortic instrumentation<br>• Family history</div></div><button class="btn" onclick="nextStage()">Imaging →</button></div></div>`;
    };

    window.render_imaging = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">Diagnostic Imaging</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What key history element is most helpful here?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What's the evidence level for the standard treatment?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Imaging Modalities</div><table class="comparison-table"><tr><th>Test</th><th>Sensitivity</th><th>Best For</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>CT Angiography</strong></td><td>95-100%</td><td>First-line in stable patients</td></tr><tr><td><strong>TEE</strong></td><td>98%</td><td>Unstable, OR, bedside</td></tr><tr><td><strong>MRA</strong></td><td>98%</td><td>Chronic dissection, follow-up</td></tr><tr><td>Chest X-ray</td><td>60-90%</td><td>Screening only (wide mediastinum)</td></tr><tr><td>TTE</td><td>60-80%</td><td>Proximal ascending, pericardial effusion</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 CTA Findings</div><div class="pathway"><strong>Intimal flap:</strong> Linear filling defect<br><br><strong>True vs false lumen:</strong><br>• True lumen: Smaller, higher enhancement<br>• False lumen: Larger, delayed/less enhancement<br><br><strong>Look for:</strong><br>• Extent of dissection<br>• Branch vessel involvement<br>• Pericardial effusion (tamponade risk)<br>• Rupture signs</div></div><div class="alert-box"><div class="alert-title">⚠️ CXR Findings (Low Sensitivity!)</div><p>Wide mediastinum (>8cm), abnormal aortic contour, left pleural effusion, calcium sign (displaced intimal calcium). Normal CXR does NOT rule out dissection!</p></div><button class="btn" onclick="nextStage()">Complications →</button></div></div>`;
    };

    window.render_complications = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">Life-Threatening Complications</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Which physical exam finding is most specific?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> When would you involve subspecialty consultation?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fefce8; border:1px solid #eab308; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #eab308;">
                    <p style="margin:0; color:#854d0e; font-size:0.9rem;"><strong>🚫 Common Mistake:</strong> Avoid anchoring bias - keep your differential broad initially</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Branch Vessel Involvement</div><table class="comparison-table"><tr><th>Vessels</th><th>Complication</th></tr><tr><td>Coronary arteries</td><td>STEMI (usually RCA → inferior MI)</td></tr><tr><td>Brachiocephalic/carotid</td><td>Stroke, altered mental status</td></tr><tr><td>Subclavian</td><td>Arm ischemia, BP differential</td></tr><tr><td>Celiac/mesenteric</td><td>Mesenteric ischemia, abdominal pain</td></tr><tr><td>Renal arteries</td><td>Renal failure, flank pain</td></tr><tr><td>Iliacs</td><td>Leg ischemia, pulse deficit</td></tr><tr><td>Spinal arteries</td><td>Paraplegia</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 Type A Complications</div><ul style="margin-left:20px;"><li><strong>Aortic rupture:</strong> Hemopericardium, tamponade, exsanguination</li><li><strong>Aortic regurgitation:</strong> Acute heart failure</li><li><strong>Coronary malperfusion:</strong> Acute MI</li><li><strong>Tamponade:</strong> Hypotension, JVD, muffled sounds</li></ul></div><button class="btn" onclick="nextStage()">Medical Management →</button></div></div>`;
    };

    window.render_medical = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">Initial Medical Therapy</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Consider the most common causes first, then rarer ones</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What are the key complications to monitor for?</p>
                </div><div class="alert-box"><div class="alert-title">🚨 Anti-Impulse Therapy - Start Immediately!</div><p>Goal: Reduce aortic wall stress by lowering HR and BP. This slows dissection propagation.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Medical Management</div><table class="comparison-table"><tr><th>Step</th><th>Treatment</th><th>Target</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>1. Beta-blocker FIRST</strong></td><td>Esmolol 500 mcg/kg bolus → 50-200 mcg/kg/min<br>OR Labetalol 20 mg IV boluses</td><td>HR <60 bpm</td></tr><tr><td><strong>2. Then vasodilator</strong></td><td>Nicardipine 5-15 mg/hr<br>OR Nitroprusside 0.25-10 mcg/kg/min</td><td>SBP 100-120 mmHg</td></tr><tr><td><strong>3. Pain control</strong></td><td>Morphine or fentanyl</td><td>Comfort + ↓ catecholamines</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Beta-Blocker FIRST?</div><div class="pathway"><strong>Vasodilators alone = DANGEROUS!</strong><br><br>Vasodilators cause reflex tachycardia<br>→ ↑ dP/dt (rate of pressure rise)<br>→ ↑ Aortic wall stress<br>→ Propagates dissection<br><br>Beta-blocker first:<br>→ ↓ HR and contractility<br>→ ↓ dP/dt<br>→ THEN add vasodilator safely</div></div><button class="btn" onclick="nextStage()">Type A Surgery →</button></div></div>`;
    };

    window.render_typeA = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 10</div><div class="scene-title">Type A: Surgical Emergency</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What comorbidities would change your management approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#f5f3ff; border:1px solid #8b5cf6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #8b5cf6;">
                    <p style="margin:0; color:#5b21b6; font-size:0.9rem;"><strong>📋 Board Tip:</strong> Document your clinical reasoning clearly</p>
                </div><div class="alert-box"><div class="alert-title">🚨 Type A = OR Immediately!</div><p>Call cardiac surgery STAT. Continue anti-impulse therapy. Without surgery, mortality is 1-2%/hour in first 48 hours.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Surgical Options</div><table class="comparison-table"><tr><th>Procedure</th><th>Indication</th></tr><tr><td>Ascending aorta replacement</td><td>Standard for Type A</td></tr><tr><td>Aortic root replacement (Bentall)</td><td>Root involvement, severe AR, Marfan</td></tr><tr><td>Valve-sparing root replacement</td><td>Younger patients, good valve</td></tr><tr><td>Hemiarch replacement</td><td>Arch entry tear</td></tr><tr><td>Total arch + elephant trunk</td><td>Extensive arch involvement</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Surgical Principles</div><div class="pathway"><strong>Goals:</strong><br>• Resect intimal tear<br>• Obliterate false lumen entry<br>• Replace diseased aorta with graft<br>• Restore competence of aortic valve<br><br><strong>Techniques:</strong><br>• Cardiopulmonary bypass<br>• Deep hypothermic circulatory arrest<br>  (for arch work)<br><br><strong>Mortality:</strong> 15-25% surgical<br>(vs 50%+ at 48h without surgery)</div></div><button class="btn" onclick="nextStage()">Type B Management →</button></div></div>`;
    };

    window.render_typeB = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 10</div><div class="scene-title">Type B: Usually Medical</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate acuity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would renal or hepatic impairment affect drug dosing?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Type B Management</div><table class="comparison-table"><tr><th>Type B</th><th>Management</th></tr><tr><td><strong>Uncomplicated</strong></td><td>Medical therapy: anti-impulse, pain control</td></tr><tr><td><strong>Complicated</strong></td><td>TEVAR (thoracic endovascular aortic repair)</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 Complicated Type B Indications for TEVAR</div><ul style="margin-left:20px;"><li>Malperfusion syndrome (limb, renal, mesenteric ischemia)</li><li>Rupture or impending rupture</li><li>Refractory pain despite medical therapy</li><li>Refractory hypertension</li><li>Rapid aortic expansion (>10mm/year)</li><li>Aortic diameter >55-60mm</li></ul></div><div class="mechanism-box"><div class="mechanism-title">🧬 TEVAR Basics</div><div class="pathway"><strong>Thoracic Endovascular Aortic Repair:</strong><br>• Stent graft via femoral artery<br>• Covers primary intimal tear<br>• Promotes false lumen thrombosis<br>• Less invasive than open surgery<br><br><strong>Advantages:</strong><br>• Lower perioperative mortality<br>• Faster recovery<br><br><strong>Risks:</strong><br>• Endoleak<br>• Spinal cord ischemia<br>• Stroke</div></div><button class="btn" onclick="nextStage()">Follow-Up →</button></div></div>`;
    };

    window.render_followup = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 10</div><div class="scene-title">Long-Term Management</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the most likely diagnosis given this presentation?</p>
                </div>

(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
