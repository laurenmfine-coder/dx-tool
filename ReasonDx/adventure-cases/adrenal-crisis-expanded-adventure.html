<!DOCTYPE html>

<head>

    <title>Adrenal Crisis | Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #713f12 0%, #ca8a04 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(113, 63, 18, 0.9); border-radius: 16px; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; background: #ca8a04; margin-left: 10px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ca8a04, #fde68a); border-radius: 3px; }
        .scene { background: linear-gradient(135deg, #713f12, #a16207); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .scene-header { background: rgba(202, 138, 4, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #fde68a; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(202,138,4,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #ca8a04, #a16207); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #fde68a; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','causes','primaryvssecondary','labs','treatment','fluids','steroids','precipitants','prevention','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">⚡ Adrenal Crisis<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Hypotension and Confusion</div></div><div class="scene-body"><div class="narrative"><p>A <span class="highlight">62-year-old woman</span> on chronic prednisone for COPD presents with <span class="critical">confusion, severe weakness, abdominal pain, and hypotension</span>. She ran out of prednisone 5 days ago and developed a "stomach bug" 2 days ago.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 118, BP 78/52, T 100.8°F<br><strong>Exam:</strong> Lethargic, diffuse abdominal tenderness, hyperpigmentation<br><strong>Labs:</strong> Na 126, K 5.8, Glucose 58, Cr 1.9</p></div><div class="alert-box"><div class="alert-title">🚨 Adrenal Crisis = Life-Threatening!</div><p>Mortality without treatment is very high. Classic triad: hypotension, hyponatremia, hyperkalemia. Give steroids BEFORE waiting for confirmatory tests!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Crisis Occurs</div><div class="pathway">Adrenal insufficiency + stressor<br>→ Inadequate cortisol response<br>→ Loss of vascular tone (hypotension)<br>→ Loss of glucocorticoid effects<br>→ Cardiovascular collapse<br><br><strong>This patient:</strong><br>Chronic steroids → HPA suppression<br>Abrupt stop + infection = crisis</div></div><button class="btn" onclick="nextStage()">Causes →</button></div></div>`;
    };

    window.render_causes = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">Causes of Adrenal Insufficiency</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Etiology</div><table class="comparison-table"><tr><th>Type</th><th>Causes</th></tr><tr><td><strong>Primary (Addison's)</strong></td><td>Autoimmune (80% developed world), TB, adrenal hemorrhage (Waterhouse-Friderichsen), metastases, infections (HIV, CMV, fungal)</td></tr><tr><td><strong>Secondary</strong></td><td>Pituitary disease, tumors, surgery, radiation, Sheehan syndrome</td></tr><tr><td><strong>Tertiary</strong></td><td>Chronic steroid use → HPA suppression (MOST COMMON!)</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 #1 Cause = Steroid Withdrawal!</div><p>Patients on >7.5 mg prednisone (or equivalent) for >3 weeks can have HPA suppression. Abrupt cessation + stress = crisis.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Waterhouse-Friderichsen Syndrome</div><div class="pathway">Bilateral adrenal hemorrhage<br>→ Acute adrenal crisis<br><br>Classically with <strong>meningococcemia</strong><br>Also: other severe sepsis, DIC,<br>anticoagulation, trauma<br><br>Signs: Purpura, DIC, shock, adrenal failure</div></div><button class="btn" onclick="nextStage()">Primary vs Secondary →</button></div></div>`;
    };

    window.render_primaryvssecondary = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">Primary vs Secondary/Tertiary</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Key Differences</div><table class="comparison-table"><tr><th>Feature</th><th>Primary</th><th>Secondary/Tertiary</th></tr><tr><td><strong>Hyperpigmentation</strong></td><td>YES (↑ACTH)</td><td>NO</td></tr><tr><td><strong>Hyperkalemia</strong></td><td>YES (↓aldosterone)</td><td>NO (aldosterone intact)</td></tr><tr><td><strong>ACTH level</strong></td><td>HIGH</td><td>LOW</td></tr><tr><td><strong>Aldosterone</strong></td><td>DEFICIENT</td><td>NORMAL</td></tr><tr><td><strong>Salt craving</strong></td><td>YES</td><td>Less common</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why the Differences?</div><div class="pathway"><strong>Primary (adrenal destruction):</strong><br>↓ Cortisol + ↓ Aldosterone<br>→ ↑ ACTH (trying to stimulate)<br>→ ACTH → MSH → hyperpigmentation<br>→ ↓ Aldosterone → hyperkalemia, hyponatremia<br><br><strong>Secondary/Tertiary (pituitary/hypothalamic):</strong><br>↓ ACTH → ↓ Cortisol<br>But: Aldosterone regulated by RAAS<br>→ Aldosterone relatively preserved<br>→ No hyperkalemia<br>→ No hyperpigmentation (low ACTH)</div></div><button class="btn" onclick="nextStage()">Labs →</button></div></div>`;
    };

    window.render_labs = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">Laboratory Findings</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Classic Lab Abnormalities</div><table class="comparison-table"><tr><th>Finding</th><th>Mechanism</th></tr><tr><td><strong>Hyponatremia</strong></td><td>↓ Cortisol → ↑ ADH + ↓ aldosterone</td></tr><tr><td><strong>Hyperkalemia</strong></td><td>↓ Aldosterone (primary only)</td></tr><tr><td><strong>Hypoglycemia</strong></td><td>↓ Cortisol → ↓ gluconeogenesis</td></tr><tr><td><strong>Azotemia</strong></td><td>Hypovolemia, prerenal AKI</td></tr><tr><td><strong>Eosinophilia</strong></td><td>↓ Cortisol (no longer suppressed)</td></tr><tr><td><strong>Hypercalcemia</strong></td><td>↓ Cortisol → ↑ GI absorption (rare)</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Diagnostic Testing</div><div class="pathway"><strong>Cortisol level:</strong><br>• Random cortisol <3 μg/dL = definitive AI<br>• Random cortisol >15-18 = AI unlikely<br>• In between = need stimulation test<br><br><strong>ACTH stimulation test (Cosyntropin):</strong><br>Give 250 mcg IV/IM<br>Check cortisol at 30 and 60 min<br>Normal: cortisol >18-20 μg/dL<br><br><strong>In CRISIS:</strong> Draw cortisol/ACTH,<br>then TREAT. Don't wait for results!</div></div><button class="btn" onclick="nextStage()">Treatment →</button></div></div>`;
    };

    window.render_treatment = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">Emergency Treatment</div></div><div class="scene-body"><div class="alert-box"><div class="alert-title">🚨 Don't Delay Treatment for Testing!</div><p>If adrenal crisis suspected, draw cortisol/ACTH then immediately give steroids + fluids. Treatment saves lives; waiting for labs can kill.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Acute Treatment Steps</div><table class="comparison-table"><tr><th>Step</th><th>Action</th></tr><tr><td><strong>1. IV access</strong></td><td>Large bore, prepare for fluids</td></tr><tr><td><strong>2. Labs</strong></td><td>Cortisol, ACTH, BMP, glucose</td></tr><tr><td><strong>3. Steroids</strong></td><td>Hydrocortisone 100 mg IV STAT</td></tr><tr><td><strong>4. Fluids</strong></td><td>NS or D5NS 1-2L bolus, then continue</td></tr><tr><td><strong>5. Dextrose</strong></td><td>D50 if hypoglycemic</td></tr><tr><td><strong>6. Monitor</strong></td><td>Vitals, glucose, electrolytes</td></tr><tr><td><strong>7. Identify trigger</strong></td><td>Infection? Non-compliance? Surgery?</td></tr></table></div><button class="btn" onclick="nextStage()">Fluids →</button></div></div>`;
    };

    window.render_fluids = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">Fluid Resuscitation</div></div><div class="scene-body"><div class="mechanism-box"><div class="mechanism-title">🧬 Why Massive Fluid Deficits?</div><div class="pathway"><strong>Cortisol deficiency:</strong><br>• ↓ Vascular tone → vasodilation<br>• ↑ Capillary permeability<br>• ↓ Cardiac contractility<br><br><strong>Aldosterone deficiency (primary):</strong><br>• Renal Na wasting<br>• Volume depletion<br><br>Patients can be 10-20% volume depleted!</div></div><div class="boards-tip"><div class="boards-tip-title">📚 Fluid Protocol</div><table class="comparison-table"><tr><th>Phase</th><th>Fluid</th><th>Rate</th></tr><tr><td><strong>Initial</strong></td><td>NS or D5NS</td><td>1-2 L over first 1-2 hours</td></tr><tr><td><strong>Ongoing</strong></td><td>NS or D5NS</td><td>Continue based on hemodynamics</td></tr><tr><td><strong>If hypoglycemic</strong></td><td>D5NS or D50 bolus</td><td>Monitor glucose frequently</td></tr></table><p style="margin-top:12px;"><strong>Why D5?</strong> Cortisol needed for gluconeogenesis. Patients are hypoglycemia-prone.</p></div><button class="btn" onclick="nextStage()">Steroids →</button></div></div>`;
    };

    window.render_steroids = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 10</div><div class="scene-title">Steroid Replacement</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Steroid Dosing in Crisis</div><table class="comparison-table"><tr><th>Phase</th><th>Hydrocortisone Dose</th></tr><tr><td><strong>Initial bolus</strong></td><td>100 mg IV</td></tr><tr><td><strong>Day 1</strong></td><td>50-100 mg IV q6-8h (or 200 mg/24h continuous)</td></tr><tr><td><strong>Day 2-3</strong></td><td>Taper by 50% if improving</td></tr><tr><td><strong>Maintenance</strong></td><td>Oral hydrocortisone 15-25 mg/day</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Hydrocortisone?</div><div class="pathway"><strong>Hydrocortisone preferred because:</strong><br>• Has mineralocorticoid activity<br>• At stress doses (>50 mg), provides<br>  adequate mineralocorticoid effect<br>• No need for separate fludrocortisone acutely<br><br><strong>Alternative: Dexamethasone 4 mg IV</strong><br>• Use if need ACTH stim test<br>  (dex doesn't interfere with cortisol assay)<br>• No mineralocorticoid activity<br>• Add fludrocortisone if primary AI</div></div><div class="alert-box"><div class="alert-title">⚠️ Fludrocortisone</div><p>Only needed for PRIMARY adrenal insufficiency after acute phase. Dose: 0.05-0.2 mg PO daily. Not needed in secondary/tertiary (aldosterone preserved).</p></div><button class="btn" onclick="nextStage()">Precipitants →</button></div></div>`;
    };

    window.render_precipitants = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 10</div><div class="scene-title">Crisis Precipitants</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Common Triggers</div><table class="comparison-table"><tr><th>Trigger</th><th>Examples</th></tr><tr><td><strong>Infection</strong></td><td>GI illness, pneumonia, UTI - most common!</td></tr><tr><td><strong>Medication</strong></td><td>Stopping steroids, starting rifampin/phenytoin</td></tr><tr><td><strong>Stress</strong></td><td>Surgery, trauma, severe illness</td></tr><tr><td><strong>Adrenal events</strong></td><td>Hemorrhage, infarction (anticoagulation)</td></tr><tr><td><strong>Pregnancy</strong></td><td>Increased cortisol requirements</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 Always Find the Trigger!</div><p>Adrenal crisis rarely occurs in isolation. There's almost always a precipitant. Treating the trigger is as important as treating the crisis.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Drugs That Accelerate Cortisol Metabolism</div><div class="pathway"><strong>CYP3A4 inducers:</strong><br>• Rifampin<br>• Phenytoin<br>• Phenobarbital<br>• Carbamazepine<br><br>Starting these in patient on chronic steroids<br>→ May need to INCREASE steroid dose<br>→ Or can precipitate AI</div></div><button class="btn" onclick="nextStage()">Prevention →</button></div></div>`;
    };

    window.render_prevention = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 10</div><div class="scene-title">Stress Dosing & Prevention</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Stress Dose Guidelines</div><table class="comparison-table"><tr><th>Stress Level</th><th>Hydrocortisone Dose</th></tr><tr><td><strong>Minor illness/procedure</strong></td><td>Double usual dose for 2-3 days</td></tr><tr><td><strong>Moderate stress</strong></td><td>50 mg IV/PO BID for 2-3 days</td></tr><tr><td><strong>Major surgery/illness</strong></td><td>100 mg IV, then 50 mg q8h, taper</td></tr><tr><td><strong>Critical illness/sepsis</strong></td><td>100 mg IV q8h until stable</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Patient Education</div><div class="pathway"><strong>Every AI patient needs:</strong><br><br>• Medical alert bracelet<br>• Emergency injection kit (hydrocortisone)<br>• Written instructions for stress dosing<br>• Education for family/caregivers<br><br><strong>When to stress dose:</strong><br>• Fever >38°C<br>• Vomiting/diarrhea<br>• Any significant illness<br>• Procedures/surgery<br><br><strong>When to seek emergency care:</strong><br>• Unable to keep meds down<br>• Signs of crisis</div></div><button class="btn" onclick="nextStage()">Debrief →</button></div></div>`;
    };

    window.render_debrief = function() {
        return `<div class="scene"><div style="text-align:center;padding:40px;"><div style="font-size:4rem;margin-bottom:12px;">⚡</div><div style="font-size:1.8rem;font-weight:700;color:#4ade80;">Adrenal Crisis Mastery!</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 High-Yield Summary</div><table class="comparison-table"><tr><th>Concept</th><th>Key Point</th></tr><tr><td>Classic triad</td><td>Hypotension, hyponatremia, hyperkalemia</td></tr><tr><td>#1 cause</td><td>Chronic steroid withdrawal</td></tr><tr><td>Primary vs Secondary</td><td>Hyperkalemia + hyperpigmentation = primary</td></tr><tr><td>Treatment</td><td>Hydrocortisone 100 mg IV + fluids</td></tr><tr><td>Don't delay</td><td>Draw labs then treat immediately</td></tr><tr><td>Fludrocortisone</td><td>Only needed for primary AI (chronic)</td></tr></table></div><div class="tips"><div class="pearl"><div class="tip-header">✓ Pearls</div><ul style="margin-left:16px;"><li>Treat first, confirm later</li><li>Hydrocortisone has mineralocorticoid activity</li><li>Find the precipitant</li><li>Stress dosing prevents crisis</li></ul></div><div class="pitfall"><div class="tip-header">✗ Pitfalls</div><ul style="margin-left:16px;"><li>Waiting for labs to treat</li><li>Forgetting to look for trigger</li><li>Not educating on stress dosing</li><li>Missing HPA suppression in steroid users</li></ul></div></div><button class="btn" onclick="state.stage=0;render()">🔄 Restart Case</button></div></div>`;
    };

    render();
    </script>

<div class="rdx-debrief-overlay" id="rdxDebriefOverlay" style="display:none;">
    <div class="rdx-debrief-panel" id="rdxDebriefContent"></div>
</div>

<script>
// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
    
    // Auto-inject hint examples into existing content
    window.rdxInit = function() {
        // Could add dynamic hint injection here based on difficulty
        console.log('ReasonDx Enhanced Features loaded for: Adrenal Crisis Expanded Adventure');
    };
    
    // Initialize on load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.rdxInit);
    } else {
        window.rdxInit();
    }
})();
</script>
<!-- ==================== END REASONDX ENHANCED FEATURES ==================== -->
