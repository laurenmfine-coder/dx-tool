<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asthma Exacerbation | Dual-Mode Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        body.adult { background: linear-gradient(135deg, #065f46 0%, #10b981 100%); }
        body.peds { background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%); }
        .container { max-width: 900px; margin: 0 auto; }
        .mode-toggle { display: flex; justify-content: center; margin-bottom: 20px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 4px; }
        .mode-btn { flex: 1; padding: 12px 24px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; background: transparent; color: #e2e8f0; }
        .mode-btn.active { background: rgba(255,255,255,0.2); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-radius: 16px; margin-bottom: 20px; }
        .adult .header { background: rgba(6, 95, 70, 0.9); }
        .peds .header { background: rgba(124, 58, 237, 0.9); }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; margin-left: 10px; }
        .adult .badge { background: #10b981; }
        .peds .badge { background: #a78bfa; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; border-radius: 3px; }
        .adult .progress-fill { background: linear-gradient(90deg, #10b981, #6ee7b7); }
        .peds .progress-fill { background: linear-gradient(90deg, #a78bfa, #c4b5fd); }
        .scene { border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .adult .scene { background: linear-gradient(135deg, #065f46, #047857); }
        .peds .scene { background: linear-gradient(135deg, #6d28d9, #7c3aed); }
        .scene-header { padding: 16px 20px; }
        .adult .scene-header { background: rgba(16, 185, 129, 0.15); }
        .peds .scene-header { background: rgba(167, 139, 250, 0.15); }
        .scene-phase { font-size: 0.75rem; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(16,185,129,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .adult .btn { background: linear-gradient(135deg, #10b981, #047857); }
        .peds .btn { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); }
        .why-chain { background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(16,185,129,0.15)); border: 1px solid rgba(139,92,246,0.3); border-radius: 16px; padding: 24px; margin: 24px 0; }
        .why-chain-title { font-size: 1.2rem; font-weight: 700; color: #c4b5fd; margin-bottom: 20px; }
        .why-item { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
        .why-q { font-weight: 600; color: #e9d5ff; margin-bottom: 10px; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="adult">
    <div class="container">
        <div class="mode-toggle">
            <button class="mode-btn active" onclick="setMode('adult')">🏥 Adult</button>
            <button class="mode-btn" onclick="setMode('peds')">👶 Pediatric</button>
        </div>
        <div id="app"></div>
    </div>
    <script>
    const STAGES = ['arrival','severity','initial_tx','steroids','magnesium','escalation','intubation','disposition','prevention','debrief'];
    const state = { stage: 0, mode: 'adult' };

    function setMode(m) { state.mode = m; state.stage = 0; document.body.className = m; document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); render(); }
    function nextStage() { state.stage++; render(); }

    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        const icon = state.mode === 'adult' ? '🌬️' : '👶🌬️';
        const title = state.mode === 'adult' ? 'Asthma Exacerbation' : 'Pediatric Asthma';
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">${icon} ${title}<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }

    window.render_arrival = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Can't Catch My Breath</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What comorbidities would change your management approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Always consider mimics and look-alikes in your differential</p>
                </div><div class="narrative"><p>A <span class="highlight">32-year-old woman</span> with asthma presents with <span class="critical">severe dyspnea and wheezing</span> for 6 hours. Used rescue inhaler 8 times without relief.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 118, BP 138/88, RR 28, SpO2 89% on RA<br><strong>Exam:</strong> Tripoding, speaking in phrases, diffuse wheezing, accessory muscle use<br><strong>Peak flow:</strong> 180 L/min (predicted 450)</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Asthma Pathophysiology</div><div class="pathway">Trigger exposure<br>→ Mast cell degranulation<br>→ Bronchoconstriction + inflammation<br>→ Airway edema, mucus plugging<br>→ Air trapping, hyperinflation<br>→ V/Q mismatch → hypoxemia<br><br>Severe: auto-PEEP, respiratory fatigue</div></div><button class="btn" onclick="nextStage()">Severity Assessment →</button></div></div>`;
        } else {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">The Wheezing Child</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate acuity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would renal or hepatic impairment affect drug dosing?</p>
                </div><div class="narrative"><p>A <span class="highlight">5-year-old boy</span> with known asthma presents with <span class="critical">cough, wheeze, and respiratory distress</span> for 1 day. URI symptoms for 3 days prior.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 140, RR 40, SpO2 90% on RA, T 100.4°F<br><strong>Exam:</strong> Nasal flaring, subcostal retractions, diffuse wheezing, prolonged expiratory phase<br><strong>Weight:</strong> 20 kg</p></div><div class="alert-box"><div class="alert-title">⚠️ Viral URI = #1 Trigger in Kids</div><p>Respiratory viral infections (rhinovirus, RSV) trigger most pediatric asthma exacerbations. Bacterial infection is uncommon.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Pediatric Differences</div><div class="pathway">Children have:<br>• Smaller airways (resistance ∝ 1/r⁴)<br>• More compliant chest wall<br>• Fewer collateral ventilation pathways<br>• Higher risk of respiratory failure<br><br>Silent chest = ominous sign<br>(no air movement)</div></div><button class="btn" onclick="nextStage()">Severity Assessment →</button></div></div>`;
        }
    };

    window.render_severity = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">How Bad Is It?</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the most likely diagnosis given this presentation?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if the patient doesn't respond to initial treatment?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Reassess if the patient isn't improving as expected</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Severity Classification</div><table class="comparison-table"><tr><th>Feature</th><th>Mild-Moderate</th><th>Severe</th><th>Life-Threatening</th></tr><tr><td>Speech</td><td>Sentences</td><td>Phrases/words</td><td>Unable to speak</td></tr><tr><td>Mental status</td><td>Normal</td><td>Agitated</td><td>Drowsy/confused</td></tr><tr><td>RR</td><td>${state.mode === 'adult' ? '≤25' : '↑ for age'}</td><td>${state.mode === 'adult' ? '>25' : '↑↑ for age'}</td><td>Bradypnea</td></tr><tr><td>Accessory muscles</td><td>None/mild</td><td>Moderate</td><td>Paradoxical breathing</td></tr><tr><td>Wheeze</td><td>Moderate</td><td>Loud</td><td>Silent chest</td></tr><tr><td>SpO2</td><td>>92%</td><td>90-92%</td><td><90%</td></tr><tr><td>Peak flow</td><td>>50%</td><td>33-50%</td><td><33%</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 Red Flags for Imminent Arrest</div><ul style="margin-left:20px;"><li>Silent chest (no air movement)</li><li>Cyanosis</li><li>Altered mental status/exhaustion</li><li>Bradycardia</li><li>Hypotension</li><li>Normal/rising pCO2 (should be LOW)</li></ul></div><button class="btn" onclick="nextStage()">Initial Treatment →</button></div></div>`;
    };

    window.render_initial_tx = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">First-Line Treatment</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What key history element is most helpful here?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What's the evidence level for the standard treatment?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Initial Management</div><table class="comparison-table"><tr><th>Treatment</th><th>Dose</th><th>Frequency</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Albuterol (SABA)</strong></td><td>${state.mode === 'adult' ? '2.5-5 mg neb' : '2.5 mg neb (<20kg) or 5 mg (>20kg)'}</td><td>q20min × 3, then q1-4h</td></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Ipratropium</strong></td><td>${state.mode === 'adult' ? '0.5 mg neb' : '0.25-0.5 mg neb'}</td><td>q20min × 3 (first hour only)</td></tr><tr><td><strong>Oxygen</strong></td><td>Target SpO2 ${state.mode === 'adult' ? '93-95%' : '94-98%'}</td><td>Continuous</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Combination Therapy?</div><div class="pathway"><strong>Albuterol (β2 agonist):</strong><br>• Relaxes bronchial smooth muscle<br>• Fast onset (5-15 min)<br>• Duration 4-6 hours<br><br><strong>Ipratropium (anticholinergic):</strong><br>• Blocks muscarinic receptors<br>• Reduces secretions<br>• Additive bronchodilation<br>• Only for SEVERE exacerbations<br>• Only needed in FIRST HOUR<br><br>Continuous nebs if severe (10-15 mg/hr)</div></div><div class="why-chain"><div class="why-chain-title">🔗 WHY Chain</div><div class="why-item"><div class="why-q">Why not ipratropium for all doses?</div>Studies show benefit only in first hour for severe exacerbations. Continued use doesn't add benefit and increases side effects.</div></div><button class="btn" onclick="nextStage()">Steroids →</button></div></div>`;
    };

    window.render_steroids = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">Systemic Corticosteroids</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Which physical exam finding is most specific?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> When would you involve subspecialty consultation?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fefce8; border:1px solid #eab308; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #eab308;">
                    <p style="margin:0; color:#854d0e; font-size:0.9rem;"><strong>🚫 Common Mistake:</strong> Avoid anchoring bias - keep your differential broad initially</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Steroid Dosing</div><table class="comparison-table"><tr><th>Drug</th><th>Dose</th><th>Notes</th></tr><tr><td><strong>Prednisone PO</strong></td><td>${state.mode === 'adult' ? '40-60 mg' : '1-2 mg/kg (max 60 mg)'}</td><td>If able to take PO</td></tr><tr><td><strong>Methylpred IV</strong></td><td>${state.mode === 'adult' ? '125 mg' : '1-2 mg/kg'}</td><td>If NPO or severe</td></tr><tr><td><strong>Dexamethasone</strong></td><td>${state.mode === 'adult' ? '12-16 mg' : '0.6 mg/kg (max 16 mg)'}</td><td>Single dose or 2 days</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 Give Steroids EARLY!</div><p>Steroids take 4-6 hours to work. The earlier you give them, the sooner they help. Don't wait to see if bronchodilators work first!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Steroids Work</div><div class="pathway">Corticosteroids:<br>• ↓ Airway inflammation<br>• ↓ Mucus production<br>• ↑ β2 receptor responsiveness<br>• ↓ Capillary permeability<br><br>Onset: 4-6 hours (not immediate!)<br><br><strong>Duration:</strong><br>• Prednisone: 5 days (no taper needed)<br>• Dexamethasone: 1-2 doses (longer acting)</div></div><div class="why-chain"><div class="why-chain-title">🔗 WHY Chain</div><div class="why-item"><div class="why-q">Why is dexamethasone becoming popular?</div>Longer half-life means 1-2 doses = 5 days of prednisone. Better compliance, especially in ${state.mode === 'peds' ? 'kids (tastes better!)' : 'outpatients'}. Studies show equivalent efficacy.</div></div><button class="btn" onclick="nextStage()">Magnesium →</button></div></div>`;
    };

    window.render_magnesium = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">Magnesium Sulfate</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Consider the most common causes first, then rarer ones</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What are the key complications to monitor for?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Magnesium for Severe Asthma</div><table class="comparison-table"><tr><th>Route</th><th>Dose</th><th>Indication</th></tr><tr><td><strong>IV</strong></td><td>${state.mode === 'adult' ? '2 g over 20 min' : '25-75 mg/kg (max 2 g) over 20 min'}</td><td>Severe exacerbation, poor response to initial tx</td></tr><tr><td><strong>Nebulized</strong></td><td>150 mg with albuterol</td><td>Less evidence, sometimes used</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 How Magnesium Helps</div><div class="pathway">Magnesium:<br>• Smooth muscle relaxant<br>• Inhibits Ca²⁺ influx<br>• Blocks acetylcholine release<br>• Inhibits mast cell degranulation<br><br>Best evidence for SEVERE exacerbations<br>• FEV1 <25% predicted<br>• Not responding to initial therapy<br><br>Side effects: Flushing, hypotension<br>(give slowly over 20 min)</div></div><div class="why-chain"><div class="why-chain-title">🔗 WHY Chain</div><div class="why-item"><div class="why-q">When to give magnesium?</div>Reserve for severe exacerbations not responding to bronchodilators + steroids. Give early in severe cases - don't wait until patient is crashing.</div></div><button class="btn" onclick="nextStage()">Escalation Therapies →</button></div></div>`;
    };

    window.render_escalation = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">Refractory Asthma</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What comorbidities would change your management approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#f5f3ff; border:1px solid #8b5cf6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #8b5cf6;">
                    <p style="margin:0; color:#5b21b6; font-size:0.9rem;"><strong>📋 Board Tip:</strong> Document your clinical reasoning clearly</p>

<script>
// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
