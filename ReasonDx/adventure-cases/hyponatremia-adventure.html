<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Low Salt | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#3B82F6;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#1D4ED8,#3B82F6);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(59,130,246,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(59,130,246,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(59,130,246,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🧂 The Low Salt</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'72F',wt:'58kg',hx:'Thiazide started 2wks ago, now confused',exam:'Euvolemic, oriented x1',vitals:{HR:'78',BP:'128/78'},labs:{Na:'118',K:'3.2',Osm:'248',UOsm:'450',UNa:'45'}},int:{age:'55M',wt:'75kg',hx:'SCLC, fatigue, nausea x1wk',exam:'Euvolemic, no edema',vitals:{HR:'82',BP:'138/82'},labs:{Na:'122',K:'4.0',Osm:'258',UOsm:'520',UNa:'65'}},adv:{age:'45F',wt:'62kg',hx:'Marathon runner, collapsed at finish, seizing',exam:'Altered, seizing',vitals:{HR:'108',BP:'148/92'},labs:{Na:'112',K:'4.2',Osm:'238',UOsm:'180'}}};
const Q=[
{t:'First Step',q:'Na 118. What is the FIRST diagnostic step?',h:'True vs pseudo',o:[{id:'a',txt:'Check serum osmolality (rule out pseudohyponatremia)',c:1,p:100},{id:'b',txt:'Give hypertonic saline',c:0,p:20},{id:'c',txt:'Fluid restrict',c:0,p:30}],fb:{1:'<b>Correct!</b> Serum Osm first. Low (<280)=hypotonic (true). Normal=pseudohyponatremia (lipids, proteins). High=hyperglycemia, mannitol.',0:'<b>First:</b> Confirm true hyponatremia with serum osmolality.'}},
{t:'Volume Status',q:'After confirming hypotonic hyponatremia, next step?',h:'Guides treatment',o:[{id:'a',txt:'Assess volume status (hypo, eu, hypervolemic)',c:1,p:100},{id:'b',txt:'Give 3% saline',c:0,p:20},{id:'c',txt:'Order MRI brain',c:0,p:10}],fb:{1:'<b>Correct!</b> Volume status determines cause: Hypo (GI/renal loss), Eu (SIADH, hypothyroid, adrenal), Hyper (CHF, cirrhosis, nephrotic).',0:'<b>Volume status:</b> Key to differential and treatment.'}},
{t:'SIADH Criteria',q:'Euvolemic, UOsm>100, UNa>40, low serum Osm. Diagnosis?',h:'Diagnosis of exclusion',o:[{id:'a',txt:'SIADH (after excluding hypothyroid and adrenal insufficiency)',c:1,p:100},{id:'b',txt:'Primary polydipsia',c:0,p:20},{id:'c',txt:'Diuretic-induced',c:0,p:30}],fb:{1:'<b>Correct!</b> SIADH: Euvolemic, serum Osm<275, UOsm>100 (usually >300), UNa>40. Must exclude hypothyroid, adrenal insufficiency first.',0:'<b>SIADH:</b> Inappropriate ADH despite low osmolality.'}},
{t:'Acute Symptomatic',q:'Na 112 with seizure. Immediate treatment?',h:'Severe symptoms need urgent correction',o:[{id:'a',txt:'3% hypertonic saline 100-150mL bolus over 10-20 min',c:1,p:100},{id:'b',txt:'Normal saline',c:0,p:20},{id:'c',txt:'Fluid restriction',c:0,p:0}],fb:{1:'<b>Correct!</b> Acute symptomatic: 3% saline 100-150mL bolus, can repeat x2 if needed. Goal: raise Na 4-6 mEq/L to stop symptoms.',0:'<b>Symptomatic:</b> 3% saline bolus for seizures/severe AMS.'}},
{t:'Correction Rate',q:'Maximum safe Na correction rate in chronic hyponatremia?',h:'Avoid osmotic demyelination',o:[{id:'a',txt:'8-10 mEq/L in 24 hrs (6-8 if high risk)',c:1,p:100},{id:'b',txt:'20 mEq/L in 24 hrs',c:0,p:0},{id:'c',txt:'2 mEq/L per hour',c:0,p:30}],fb:{1:'<b>Correct!</b> Limit: 8-10 mEq/L in 24hrs, 6-8 if high risk (alcoholism, malnutrition, K<3, Na<105). Overcorrection causes ODS.',0:'<b>ODS risk:</b> Limit correction to 8-10 mEq/L/day.'}},
{t:'Overcorrection',q:'Na corrected 14 mEq in 12 hours. What to do?',h:'Prevent ODS',o:[{id:'a',txt:'Relower Na with D5W +/- desmopressin',c:1,p:100},{id:'b',txt:'Continue current management',c:0,p:0},{id:'c',txt:'Give more hypertonic saline',c:0,p:0}],fb:{1:'<b>Correct!</b> Overcorrection: Give D5W (3-6 mL/kg/hr) +/- desmopressin 2mcg q8h to relower. Target lowering 1-2 mEq/hr until safe range.',0:'<b>Overcorrection Rx:</b> D5W and desmopressin to relower Na.'}},
{t:'Thiazide Hyponatremia',q:'New thiazide with Na 118. Treatment?',h:'Common cause in elderly',o:[{id:'a',txt:'Stop thiazide, often need NS initially (volume depleted)',c:1,p:100},{id:'b',txt:'Continue thiazide, add salt tablets',c:0,p:0},{id:'c',txt:'3% saline',c:0,p:30}],fb:{1:'<b>Correct!</b> Thiazide-induced: Stop drug, give NS (often volume depleted despite appearing euvolemic). Usually corrects within days.',0:'<b>Thiazide:</b> Stop drug, give NS. Watch for rapid correction.'}},
{t:'Exercise-Associated',q:'Marathon runner with Na 112, seizing. Pathophysiology?',h:'Excessive free water intake',o:[{id:'a',txt:'Exercise-associated hyponatremia (excess hypotonic fluid intake)',c:1,p:100},{id:'b',txt:'SIADH',c:0,p:30},{id:'c',txt:'Salt loss from sweat',c:0,p:20}],fb:{1:'<b>Correct!</b> EAH: Excessive hypotonic fluid intake during exercise overwhelms kidneys. Treat with 3% saline if symptomatic. Do NOT give more fluids.',0:'<b>EAH:</b> From overdrinking, not salt loss. 3% saline for symptoms.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🧂 The Low Salt</h1><p style="color:var(--muted);margin-bottom:32px">Hyponatremia: Volume status, SIADH, correction rate, ODS prevention</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🔬 Electrolyte Emergency</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Hyponatremia Pearls</div><div class="pearl-item"><b>First:</b> Serum Osm to confirm true hyponatremia</div><div class="pearl-item"><b>Then:</b> Volume status (hypo, eu, hypervolemic)</div><div class="pearl-item"><b>SIADH:</b> Euvolemic, UOsm>100, UNa>40</div><div class="pearl-item"><b>Symptomatic:</b> 3% saline 100-150mL bolus</div><div class="pearl-item"><b>Limit:</b> 8-10 mEq/L per 24hrs (avoid ODS)</div></div><div class="cross-link"><a href="../mechanism/hyponatremia-module.html">MechanismDx: Hyponatremia</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
