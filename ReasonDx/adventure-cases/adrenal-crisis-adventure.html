<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Crashing Cortisol | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#A855F7;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#7E22CE,#A855F7);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(168,85,247,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(168,85,247,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(168,85,247,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">⚠️ The Crashing Cortisol</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'45F',wt:'62kg',hx:'On chronic prednisone for RA, now vomiting, hypotensive',exam:'Hyperpigmentation, hypotensive, lethargic',vitals:{HR:'112',BP:'78/52'},labs:{Na:'128',K:'5.8',Glu:'58',Cortisol:'2.1'}},int:{age:'32M',wt:'78kg',hx:'Recent bilateral adrenal hemorrhage (anticoagulated)',exam:'Abdominal pain, shock',vitals:{HR:'128',BP:'72/48'},labs:{Na:'124',K:'6.2',Cortisol:'<1'}},adv:{age:'28F',wt:'55kg',hx:'Autoimmune polyglandular syndrome, flu-like illness x3d',exam:'Hyperpigmented, vitiligo, severely hypotensive',vitals:{HR:'118',BP:'68/42'},labs:{Na:'122',K:'6.4',Glu:'42',ACTH:'420'}}};
const Q=[
{t:'Classic Triad',q:'Classic lab findings in primary adrenal insufficiency?',h:'Mineralocorticoid + glucocorticoid deficiency',o:[{id:'a',txt:'Hyponatremia, hyperkalemia, hypoglycemia',c:1,p:100},{id:'b',txt:'Hypernatremia, hypokalemia',c:0,p:0},{id:'c',txt:'Normal electrolytes',c:0,p:20}],fb:{1:'<b>Correct!</b> Primary AI: Low aldosterone (hyperK, hypoNa) + low cortisol (hypoglycemia). Secondary AI: No hyperK (aldosterone intact).',0:'<b>Primary AI:</b> HypoNa + HyperK + hypoglycemia. Aldosterone AND cortisol deficient.'}},
{t:'Immediate Treatment',q:'Suspected adrenal crisis. First treatment?',h:'Dont wait for labs',o:[{id:'a',txt:'IV hydrocortisone 100mg bolus + NS fluids (dont wait for cortisol)',c:1,p:100},{id:'b',txt:'Wait for cortisol level',c:0,p:0},{id:'c',txt:'Oral prednisone',c:0,p:20}],fb:{1:'<b>Correct!</b> Empiric treatment saves lives. Hydrocortisone 100mg IV, then 50-100mg q6-8h. Aggressive NS resuscitation. Treat hypoglycemia.',0:'<b>Dont wait!</b> Empiric hydrocortisone. Can draw cortisol before but dont delay treatment.'}},
{t:'Steroid Dosing',q:'Why hydrocortisone preferred over dexamethasone in crisis?',h:'Mineralocorticoid activity',o:[{id:'a',txt:'Hydrocortisone has mineralocorticoid activity (helps with volume)',c:1,p:100},{id:'b',txt:'Faster onset',c:0,p:30},{id:'c',txt:'No difference',c:0,p:20}],fb:{1:'<b>Correct!</b> Hydrocortisone: Gluco + mineralocorticoid. Dex: Only glucocorticoid. In crisis, need both. High-dose hydrocortisone provides mineralocorticoid effect.',0:'<b>Hydrocortisone:</b> Provides mineralocorticoid activity. Dex lacks this.'}},
{t:'ACTH Level',q:'Primary vs secondary AI - how does ACTH help differentiate?',h:'Feedback loop',o:[{id:'a',txt:'Primary: High ACTH (adrenal failure). Secondary: Low ACTH (pituitary failure)',c:1,p:100},{id:'b',txt:'ACTH same in both',c:0,p:20},{id:'c',txt:'Primary has low ACTH',c:0,p:10}],fb:{1:'<b>Correct!</b> Primary: Adrenal gland fails → ACTH rises (no feedback). Secondary: Pituitary fails → ACTH low → adrenals atrophy.',0:'<b>ACTH:</b> High = primary (Addisons). Low = secondary/tertiary.'}},
{t:'Causes Primary',q:'Most common cause of primary adrenal insufficiency in developed countries?',h:'Autoimmune',o:[{id:'a',txt:'Autoimmune adrenalitis (21-hydroxylase antibodies)',c:1,p:100},{id:'b',txt:'TB (most common worldwide)',c:0,p:40},{id:'c',txt:'Metastatic cancer',c:0,p:20}],fb:{1:'<b>Correct!</b> Developed: Autoimmune #1 (80%). Check 21-OH antibodies. Worldwide: TB still common. Also: hemorrhage, mets, infections.',0:'<b>Etiology:</b> Autoimmune in developed countries. TB worldwide.'}},
{t:'Secondary Cause',q:'Most common cause of secondary adrenal insufficiency?',h:'Iatrogenic',o:[{id:'a',txt:'Chronic glucocorticoid therapy (HPA suppression)',c:1,p:100},{id:'b',txt:'Pituitary tumor',c:0,p:30},{id:'c',txt:'Autoimmune',c:0,p:20}],fb:{1:'<b>Correct!</b> Chronic steroids suppress ACTH → adrenal atrophy. Even >2-3 weeks of prednisone >7.5mg can cause suppression.',0:'<b>Secondary AI:</b> Exogenous steroids most common. HPA suppression.'}},
{t:'Sick Day Rules',q:'Patient on chronic steroids gets pneumonia. Stress dosing?',h:'Prevent crisis',o:[{id:'a',txt:'Double or triple maintenance dose during illness',c:1,p:100},{id:'b',txt:'Stop steroids',c:0,p:0},{id:'c',txt:'No change needed',c:0,p:10}],fb:{1:'<b>Correct!</b> Sick day rules: Double dose for minor illness, triple for major. Unable to take PO → parenteral steroids. Never stop abruptly.',0:'<b>Stress dosing:</b> 2-3x maintenance during illness. Prevents crisis.'}},
{t:'Fludrocortisone',q:'When is fludrocortisone needed in addition to hydrocortisone?',h:'Mineralocorticoid replacement',o:[{id:'a',txt:'Primary AI (need mineralocorticoid replacement for chronic management)',c:1,p:100},{id:'b',txt:'All adrenal insufficiency',c:0,p:30},{id:'c',txt:'Never needed',c:0,p:10}],fb:{1:'<b>Correct!</b> Primary AI: Need both gluco + mineralocorticoid (fludrocortisone 0.05-0.2mg daily). Secondary: Aldosterone intact, no fludro needed.',0:'<b>Fludrocortisone:</b> Only for primary AI. Secondary has intact aldosterone.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>⚠️ The Crashing Cortisol</h1><p style="color:var(--muted);margin-bottom:32px">Adrenal Crisis: Lab findings, empiric treatment, primary vs secondary, stress dosing</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🚨 Endocrine Emergency</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Adrenal Crisis Pearls</div><div class="pearl-item"><b>Labs:</b> HypoNa + HyperK + hypoglycemia (primary)</div><div class="pearl-item"><b>Treatment:</b> Hydrocortisone 100mg IV, dont wait</div><div class="pearl-item"><b>Primary:</b> High ACTH, needs fludrocortisone</div><div class="pearl-item"><b>Secondary:</b> Low ACTH, aldosterone intact</div><div class="pearl-item"><b>Stress dosing:</b> 2-3x during illness</div></div><div class="cross-link"><a href="../mechanism/endocrine-emergencies.html">MechanismDx: Endocrine</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
