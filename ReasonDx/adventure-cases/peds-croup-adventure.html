<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Barking Seal | ReasonDx Adventure</title><style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#8B5CF6;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#7C3AED,#8B5CF6);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(139,92,246,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(139,92,246,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(139,92,246,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style></head><body><header class="header"><div class="header-row"><div style="font-weight:600">🦭 Barking Seal</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header><main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};const C={easy:{age:'2yo M',wt:'12kg',hx:'Barky cough x2 days, low grade fever, URI symptoms, worse at night',exam:'Barky cough, mild stridor at rest, no retractions, playful',vitals:{HR:'118',RR:'28',Temp:'100.8°F',SpO2:'98%'},labs:{Westley:'2 (mild)',Hx:'Parainfluenza season'}},int:{age:'18mo F',wt:'10kg',hx:'Worsening stridor, respiratory distress, decreased oral intake',exam:'Stridor at rest, moderate retractions, anxious, not improving with mist',vitals:{HR:'145',RR:'42',Temp:'101.2°F',SpO2:'92%'},labs:{Westley:'6 (moderate)',Hx:'Not responding to home treatment'}},adv:{age:'3yo M',wt:'14kg',hx:'Severe respiratory distress, drooling, toxic appearance',exam:'Severe stridor, tripoding, drooling, altered mental status',vitals:{HR:'165',RR:'48',Temp:'103.5°F',SpO2:'85%'},labs:{Westley:'12 (severe)',Hx:'Consider epiglottitis'}}};
const Q=[{t:'Etiology',q:'Most common cause of croup (laryngotracheobronchitis)?',h:'Viral pathogen',o:[{id:'a',txt:'Parainfluenza virus (types 1 and 3 most common)',c:1,p:100},{id:'b',txt:'Bacterial infection',c:0,p:20},{id:'c',txt:'RSV',c:0,p:30}],fb:{1:'<b>Correct!</b> Parainfluenza causes ~75% of croup. Other causes: RSV, influenza, adenovirus, rhinovirus. Peak age 6mo-3yr. Fall/winter predominance.',0:'<b>Croup:</b> Parainfluenza #1 cause. Viral, not bacterial.'}},{t:'Classic Presentation',q:'Classic triad of croup symptoms?',h:'Seal bark',o:[{id:'a',txt:'Barky (seal-like) cough, inspiratory stridor, hoarse voice',c:1,p:100},{id:'b',txt:'Wheezing and crackles',c:0,p:20},{id:'c',txt:'Productive cough',c:0,p:20}],fb:{1:'<b>Correct!</b> Classic triad: Barky cough (seal bark), inspiratory stridor, hoarse voice. Often preceded by URI symptoms. Worse at night. Steeple sign on X-ray (subglottic narrowing).',0:'<b>Croup triad:</b> Barky cough + stridor + hoarse voice.'}},{t:'Severity Assessment',q:'What indicates severe croup?',h:'Westley score components',o:[{id:'a',txt:'Stridor at rest, significant retractions, decreased air entry, cyanosis, altered mental status',c:1,p:100},{id:'b',txt:'Cough only',c:0,p:20},{id:'c',txt:'Fever alone',c:0,p:20}],fb:{1:'<b>Correct!</b> Westley score: Stridor (0-2), retractions (0-3), air entry (0-2), cyanosis (0-5), LOC (0-5). Mild ≤2, Moderate 3-7, Severe ≥8.',0:'<b>Severe:</b> Stridor at rest, retractions, poor air entry, AMS.'}},{t:'Corticosteroids',q:'Role of corticosteroids in croup treatment?',h:'Mainstay of therapy',o:[{id:'a',txt:'Single dose dexamethasone (0.6 mg/kg, max 10mg) for ALL croup - reduces symptoms and return visits',c:1,p:100},{id:'b',txt:'Only for severe croup',c:0,p:30},{id:'c',txt:'Not recommended',c:0,p:10}],fb:{1:'<b>Correct!</b> Dexamethasone for ALL croup (even mild): 0.6 mg/kg PO/IM/IV (max 10mg). Single dose effective. Reduces symptoms, hospitalization, return visits. Effect in 2-4 hours.',0:'<b>Steroids:</b> Dexamethasone for ALL croup, even mild. Single dose.'}},{t:'Nebulized Epinephrine',q:'When is nebulized epinephrine indicated?',h:'Moderate-severe croup',o:[{id:'a',txt:'Moderate-severe croup with stridor at rest; onset in minutes but wears off in 2 hours',c:1,p:100},{id:'b',txt:'All croup cases',c:0,p:20},{id:'c',txt:'Only with steroids failure',c:0,p:30}],fb:{1:'<b>Correct!</b> Nebulized epi (0.5mL/kg racemic or 5mL L-epi): Moderate-severe croup. Works in minutes, wears off in 2hr. Observe 2-4hr after epi for rebound. Always give steroids too.',0:'<b>Nebulized epi:</b> Moderate-severe. Works fast, observe for rebound.'}},{t:'Epiglottitis vs Croup',q:'How to differentiate epiglottitis from croup?',h:'Bacterial emergency',o:[{id:'a',txt:'Epiglottitis: Toxic, drooling, tripoding, muffled voice, high fever, NO barky cough; croup: barky cough, hoarse voice',c:1,p:100},{id:'b',txt:'Same presentation',c:0,p:20},{id:'c',txt:'Epiglottitis has stridor only',c:0,p:20}],fb:{1:'<b>Correct!</b> Epiglottitis (rare now with Hib vaccine): Toxic, drooling (cant swallow), tripoding, muffled (not hoarse) voice, high fever, NO cough. Dont examine throat! Airway emergency.',0:'<b>Epiglottitis:</b> Toxic, drooling, no cough. Croup: Barky cough, hoarse.'}},{t:'Admission Criteria',q:'Indications for admission in croup?',h:'When outpatient unsafe',o:[{id:'a',txt:'Persistent stridor at rest after treatment, hypoxia, severe distress, unreliable follow-up, young age (<6mo)',c:1,p:100},{id:'b',txt:'All croup',c:0,p:20},{id:'c',txt:'Mild croup',c:0,p:10}],fb:{1:'<b>Correct!</b> Admit if: Persistent stridor at rest after steroids/epi, hypoxia, dehydration, unreliable follow-up, young infant (<6mo), repeated epi doses needed.',0:'<b>Admit:</b> Persistent stridor after Rx, hypoxia, dehydration, young infant.'}},{t:'Discharge Criteria',q:'When can a child with croup be safely discharged?',h:'After observation',o:[{id:'a',txt:'No stridor at rest, tolerating PO, adequate oxygenation, reliable follow-up, 2-4hr after epi if given',c:1,p:100},{id:'b',txt:'Immediately after steroids',c:0,p:30},{id:'c',txt:'After any improvement',c:0,p:20}],fb:{1:'<b>Correct!</b> Discharge if: No stridor at rest, tolerating PO, SpO2 normal, no distress, 2-4hr observation after epi (watch for rebound), reliable follow-up.',0:'<b>Discharge:</b> No stridor at rest, tolerating PO, observe 2-4hr post-epi.'}}];
let sel=null;function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}function start(){S.q=1;S.stage='question';render();}function go(s){S.stage=s;render();}function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🦭 Barking Seal</h1><p style="color:var(--muted);margin-bottom:32px">Croup: Diagnosis, steroids, nebulized epi, epiglottitis differentiation</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🦭 Stridor</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Croup Pearls</div><div class="pearl-item"><b>Cause:</b> Parainfluenza virus #1</div><div class="pearl-item"><b>Triad:</b> Barky cough + stridor + hoarse voice</div><div class="pearl-item"><b>Steroids:</b> Dexamethasone for ALL croup (even mild)</div><div class="pearl-item"><b>Nebulized epi:</b> Moderate-severe, observe 2-4hr</div><div class="pearl-item"><b>Epiglottitis:</b> Toxic, drooling, NO cough, dont examine</div></div><div class="cross-link"><a href="peds-bronchiolitis-adventure-enhanced.html">Related: Bronchiolitis</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}document.addEventListener('DOMContentLoaded',render);</script></body></html>
