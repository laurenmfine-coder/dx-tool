<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Crashing Trauma | ReasonDx Adventure</title>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --border: #334155; --text: #F1F5F9; --muted: #94A3B8; --accent: #3B82F6; --success: #10B981; --warning: #F59E0B; --danger: #DC2626; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
        .header { background: linear-gradient(135deg, #2563EB 0%, #3B82F6 100%); padding: 12px 20px; position: sticky; top: 0; z-index: 100; }
        .header-row { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .header-title { font-size: 1.1rem; font-weight: 600; }
        .stat { background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 8px; }
        .stat-value { font-size: 1.1rem; font-weight: 700; font-family: monospace; }
        .stat-label { font-size: 0.6rem; opacity: 0.8; text-transform: uppercase; }
        .main { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; }
        .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .card-phase { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
        .card-title { font-size: 1.5rem; font-weight: 700; }
        .card-body { padding: 24px; }
        .narrative { background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(37,99,235,0.1)); border-left: 4px solid var(--accent); padding: 20px 24px; border-radius: 0 12px 12px 0; margin-bottom: 24px; line-height: 1.8; }
        .narrative .hl { background: rgba(59,130,246,0.3); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .setup-screen { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; }
        .setup-screen h1 { font-size: 2rem; margin-bottom: 8px; }
        .setup-screen .subtitle { color: var(--muted); margin-bottom: 32px; }
        .start-btn { background: var(--accent); color: white; border: none; padding: 16px 48px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .question-section { margin-bottom: 32px; }
        .question-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .question-number { background: var(--accent); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .question-text { font-size: 1.1rem; font-weight: 600; }
        .radio-options { display: flex; flex-direction: column; gap: 10px; }
        .radio-option { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .radio-option:hover { border-color: var(--accent); }
        .radio-option.selected { border-color: var(--accent); background: rgba(59,130,246,0.15); }
        .radio-option.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .radio-option.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .radio-circle { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; }
        .radio-option.selected .radio-circle { border-color: var(--accent); background: radial-gradient(circle, var(--accent) 40%, transparent 40%); }
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .checkbox-item:hover { border-color: var(--accent); }
        .checkbox-item.selected { border-color: var(--accent); background: rgba(59,130,246,0.15); }
        .checkbox-item.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .checkbox-item.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .checkbox-box { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .checkbox-item.selected .checkbox-box { background: var(--accent); border-color: var(--accent); }
        .checkbox-item.selected .checkbox-box::after { content: '✓'; color: white; font-weight: bold; }
        .feedback { padding: 20px; border-radius: 12px; margin: 20px 0; }
        .feedback.excellent { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); }
        .feedback.acceptable { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); }
        .feedback-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .feedback-icon { font-size: 1.5rem; }
        .feedback-title { font-weight: 700; }
        .feedback-text { color: var(--muted); line-height: 1.7; }
        .feedback-text strong { color: var(--text); }
        .alert { padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; }
        .alert.info { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); }
        .alert.danger { background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.3); }
        .alert-icon { font-size: 1.5rem; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: 600; margin-bottom: 4px; }
        .alert-desc { font-size: 0.9rem; color: var(--muted); }
        .btn { padding: 14px 28px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-row { display: flex; gap: 12px; margin-top: 24px; }
        .exam-panel { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .exam-panel-title { font-weight: 600; margin-bottom: 16px; color: var(--accent); }
        .exam-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .exam-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; }
        .exam-name { font-size: 0.8rem; color: var(--muted); }
        .exam-value { font-size: 1rem; font-weight: 700; }
        .exam-value.critical { color: var(--danger); }
        .exam-value.abnormal { color: var(--warning); }
        .outcome { text-align: center; padding: 40px 20px; }
        .outcome-icon { font-size: 4rem; margin-bottom: 16px; }
        .outcome-title { font-size: 2rem; font-weight: 700; color: var(--success); margin-bottom: 8px; }
        .outcome-desc { color: var(--muted); max-width: 600px; margin: 0 auto 24px; }
        .score-summary { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 24px; margin: 24px auto; max-width: 500px; }
        .score-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .score-row:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <header class="header"><div class="header-row"><div class="header-title">🫁 The Crashing Trauma</div><div class="stat"><div class="stat-value" id="scoreDisplay">0</div><div class="stat-label">Points</div></div></div></header>
    <main class="main"><div id="stageContainer"></div></main>
    <script>
    const state = { stage:'setup', score:0 };
    
    function addScore(pts) { state.score += pts; document.getElementById('scoreDisplay').textContent = state.score; }

    const stages = {
        setup: { render: () => `
            <div class="setup-screen">
                <h1>🫁 The Crashing Trauma</h1>
                <p class="subtitle">Tension pneumothorax recognition and treatment</p>
                <button class="start-btn" onclick="goTo('presentation')">Begin Case →</button>
            </div>`
        },
        presentation: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Trauma Bay</div><div class="card-title">📋 Motorcycle Crash</div></div>
                <div class="card-body">
                    <div class="narrative">A <span class="hl">28-year-old male</span> arrives after a <span class="hl">high-speed motorcycle crash</span>. He was thrown from the bike and found <span class="hl">15 feet from the vehicle</span>. Helmet was on but cracked.<br><br>On arrival: <span class="hl">Severe respiratory distress</span>, <span class="hl">cyanotic</span>, <span class="hl">agitated</span>. He's intubated for airway protection but immediately becomes <span class="hl">more hypotensive</span> and <span class="hl">harder to ventilate</span>.<br><br>The RT reports <span class="hl">very high peak airway pressures</span> and <span class="hl">difficulty bagging</span>.</div>
                    <div class="exam-panel">
                        <div class="exam-panel-title">Physical Examination</div>
                        <div class="exam-grid">
                            <div class="exam-item"><div class="exam-name">Blood Pressure</div><div class="exam-value critical">72/40 mmHg</div></div>
                            <div class="exam-item"><div class="exam-name">Heart Rate</div><div class="exam-value critical">138 bpm</div></div>
                            <div class="exam-item"><div class="exam-name">SpO2</div><div class="exam-value critical">78%</div></div>
                            <div class="exam-item"><div class="exam-name">Trachea</div><div class="exam-value critical">Deviated LEFT</div></div>
                            <div class="exam-item"><div class="exam-name">Right Chest</div><div class="exam-value critical">↓ breath sounds, hyperresonant</div></div>
                            <div class="exam-item"><div class="exam-name">JVD</div><div class="exam-value abnormal">Present</div></div>
                        </div>
                    </div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="goTo('diagnosis')">Make Diagnosis →</button></div>
                </div>
            </div>`
        },
        diagnosis: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Diagnosis</div><div class="card-title">🚨 Clinical Diagnosis</div></div>
                <div class="card-body">
                    <div class="alert danger"><span class="alert-icon">⚠️</span><div class="alert-content"><div class="alert-title">Patient is crashing!</div><div class="alert-desc">Hypotension, hypoxia, difficult ventilation, tracheal deviation, absent breath sounds</div></div></div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">1</div><div class="question-text">What is the most likely diagnosis?</div></div>
                        <div class="radio-options" id="dxOpts">
                            <div class="radio-option" data-id="tension" onclick="selectDx('tension')"><div class="radio-circle"></div><div><strong>Tension Pneumothorax</strong><br><small style="color:var(--muted)">Air accumulation causing mediastinal shift</small></div></div>
                            <div class="radio-option" data-id="simple" onclick="selectDx('simple')"><div class="radio-circle"></div><div><strong>Simple Pneumothorax</strong><br><small style="color:var(--muted)">Air without hemodynamic compromise</small></div></div>
                            <div class="radio-option" data-id="tamponade" onclick="selectDx('tamponade')"><div class="radio-circle"></div><div><strong>Cardiac Tamponade</strong><br><small style="color:var(--muted)">Pericardial fluid</small></div></div>
                            <div class="radio-option" data-id="hemothorax" onclick="selectDx('hemothorax')"><div class="radio-circle"></div><div><strong>Massive Hemothorax</strong><br><small style="color:var(--muted)">Blood in pleural space</small></div></div>
                        </div>
                    </div>
                    <div id="dxFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="dxSubmit" onclick="submitDx()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        action: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Immediate Action</div><div class="card-title">⚡ What Do You Do?</div></div>
                <div class="card-body">
                    <div class="alert danger"><span class="alert-icon">🚨</span><div class="alert-content"><div class="alert-title">This is a CLINICAL diagnosis!</div><div class="alert-desc">Patient will die if you don't act NOW</div></div></div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">2</div><div class="question-text">What is the immediate next step?</div></div>
                        <div class="radio-options" id="actOpts">
                            <div class="radio-option" data-id="decompress" onclick="selectAct('decompress')"><div class="radio-circle"></div><div><strong>Immediate needle decompression of RIGHT chest</strong><br><small style="color:var(--muted)">Don't wait for imaging</small></div></div>
                            <div class="radio-option" data-id="cxr" onclick="selectAct('cxr')"><div class="radio-circle"></div><div><strong>Portable chest X-ray first</strong><br><small style="color:var(--muted)">Confirm before intervening</small></div></div>
                            <div class="radio-option" data-id="ct" onclick="selectAct('ct')"><div class="radio-circle"></div><div><strong>CT chest</strong><br><small style="color:var(--muted)">Better imaging</small></div></div>
                            <div class="radio-option" data-id="fluids" onclick="selectAct('fluids')"><div class="radio-circle"></div><div><strong>Aggressive IV fluids first</strong><br><small style="color:var(--muted)">Treat shock</small></div></div>
                        </div>
                    </div>
                    <div id="actFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="actSubmit" onclick="submitAct()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        technique: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Procedure</div><div class="card-title">💉 Needle Decompression</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">3</div><div class="question-text">What is the preferred site for needle decompression?</div></div>
                        <div class="radio-options" id="siteOpts">
                            <div class="radio-option" data-id="5th_lat" onclick="selectSite('5th_lat')"><div class="radio-circle"></div><div><strong>5th intercostal space, anterior axillary line</strong><br><small style="color:var(--muted)">Current preferred site (thinner chest wall)</small></div></div>
                            <div class="radio-option" data-id="2nd_mcl" onclick="selectSite('2nd_mcl')"><div class="radio-circle"></div><div><strong>2nd intercostal space, midclavicular line</strong><br><small style="color:var(--muted)">Traditional site</small></div></div>
                            <div class="radio-option" data-id="4th" onclick="selectSite('4th')"><div class="radio-circle"></div><div><strong>4th intercostal space, midaxillary line</strong><br><small style="color:var(--muted)">Alternative site</small></div></div>
                        </div>
                    </div>
                    <div id="siteFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="siteSubmit" onclick="submitSite()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        followup: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Definitive Treatment</div><div class="card-title">📋 After Needle Decompression</div></div>
                <div class="card-body">
                    <div class="alert info"><span class="alert-icon">✅</span><div class="alert-content"><div class="alert-title">Rush of air on decompression!</div><div class="alert-desc">BP improving to 94/62, SpO2 rising to 91%</div></div></div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">4</div><div class="question-text">What is required after needle decompression?</div></div>
                        <div class="radio-options" id="defOpts">
                            <div class="radio-option" data-id="chest_tube" onclick="selectDef('chest_tube')"><div class="radio-circle"></div><div><strong>Tube thoracostomy (chest tube)</strong><br><small style="color:var(--muted)">Definitive treatment - needle is temporizing</small></div></div>
                            <div class="radio-option" data-id="observe" onclick="selectDef('observe')"><div class="radio-circle"></div><div><strong>Observation only</strong><br><small style="color:var(--muted)">Needle is sufficient</small></div></div>
                            <div class="radio-option" data-id="repeat" onclick="selectDef('repeat')"><div class="radio-circle"></div><div><strong>Repeat needle decompression PRN</strong><br><small style="color:var(--muted)">As needed basis</small></div></div>
                        </div>
                    </div>
                    <div id="defFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="defSubmit" onclick="submitDef()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        findings: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Classic Findings</div><div class="card-title">📊 Tension Pneumothorax Signs</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">5</div><div class="question-text">Which are classic findings of tension pneumothorax?</div></div>
                        <div class="checkbox-grid" id="findOpts">
                            <div class="checkbox-item" data-id="hypotension" data-correct="true" onclick="toggleFind('hypotension')"><div class="checkbox-box"></div><span>Hypotension</span></div>
                            <div class="checkbox-item" data-id="tracheal" data-correct="true" onclick="toggleFind('tracheal')"><div class="checkbox-box"></div><span>Tracheal deviation (away)</span></div>
                            <div class="checkbox-item" data-id="jvd" data-correct="true" onclick="toggleFind('jvd')"><div class="checkbox-box"></div><span>JVD</span></div>
                            <div class="checkbox-item" data-id="absent_bs" data-correct="true" onclick="toggleFind('absent_bs')"><div class="checkbox-box"></div><span>Absent breath sounds</span></div>
                            <div class="checkbox-item" data-id="hyperresonance" data-correct="true" onclick="toggleFind('hyperresonance')"><div class="checkbox-box"></div><span>Hyperresonance to percussion</span></div>
                            <div class="checkbox-item" data-id="dullness" data-correct="false" onclick="toggleFind('dullness')"><div class="checkbox-box"></div><span>Dullness to percussion</span></div>
                        </div>
                    </div>
                    <div id="findFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="submitFind()">Submit →</button></div>
                </div>
            </div>`
        },
        outcome: { render: () => `
            <div class="card"><div class="card-body">
                <div class="outcome">
                    <div class="outcome-icon">🎉</div>
                    <div class="outcome-title">Patient Stabilized!</div>
                    <div class="outcome-desc">Immediate needle decompression produced rush of air. BP rose to 98/64, SpO2 to 94%. A 32-French chest tube was placed with return of 200mL air. Post-procedure CXR showed full lung re-expansion. Patient also had rib fractures and pulmonary contusion. He was admitted to trauma ICU and discharged 6 days later.</div>
                </div>
                <div class="score-summary">
                    <h3 style="margin-bottom:16px">Performance</h3>
                    <div class="score-row"><span>Diagnosis</span><span>${state.dxScore||0}/100</span></div>
                    <div class="score-row"><span>Immediate Action</span><span>${state.actScore||0}/100</span></div>
                    <div class="score-row"><span>Procedure Site</span><span>${state.siteScore||0}/100</span></div>
                    <div class="score-row"><span>Definitive Treatment</span><span>${state.defScore||0}/100</span></div>
                    <div class="score-row"><span>Classic Findings</span><span>${state.findScore||0}/100</span></div>
                    <div class="score-row" style="border-top:2px solid var(--border);padding-top:12px"><strong>Total</strong><strong>${state.score}</strong></div>
                </div>
                <div class="feedback excellent"><div class="feedback-header"><span class="feedback-icon">💡</span><span class="feedback-title">Tension Pneumothorax Pearls</span></div><div class="feedback-text">
                    • <strong>CLINICAL diagnosis:</strong> Do NOT wait for imaging - patient will die!<br>
                    • <strong>Classic triad:</strong> Hypotension + JVD + absent breath sounds (+ tracheal deviation)<br>
                    • <strong>Mechanism:</strong> One-way valve → air accumulates → mediastinal shift → ↓venous return → obstructive shock<br>
                    • <strong>Tracheal deviation:</strong> AWAY from affected side (pushed by pressure)<br>
                    • <strong>Needle decompression site:</strong> 5th ICS anterior axillary line preferred (thinner chest wall) or 2nd ICS MCL<br>
                    • <strong>Needle must be long enough:</strong> 3.25 inch (8cm) recommended - standard 1.5 inch often fails<br>
                    • <strong>Needle is TEMPORIZING:</strong> Always follow with chest tube (tube thoracostomy)<br>
                    • <strong>Tension vs simple:</strong> Tension = hemodynamic compromise; simple = stable vital signs<br>
                    • <strong>Post-intubation deterioration:</strong> Think tension pneumothorax! Positive pressure worsens it
                </div></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="location.reload()">Play Again</button></div>
            </div></div>`
        }
    };

    let selectedDx = null;
    function selectDx(id) { selectedDx = id; document.querySelectorAll('#dxOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('dxSubmit').disabled = false; }
    function submitDx() {
        document.querySelectorAll('#dxOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'tension') o.classList.add('correct');
            else if (o.dataset.id === selectedDx) o.classList.add('incorrect');
        });
        state.dxScore = selectedDx === 'tension' ? 100 : 30;
        addScore(selectedDx === 'tension' ? 40 : 10);
        document.getElementById('dxFeedback').innerHTML = `<div class="feedback ${selectedDx==='tension'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedDx==='tension'?'✅':'📚'}</span><span class="feedback-title">${selectedDx==='tension'?'Correct!':'Critical Distinction'}</span></div><div class="feedback-text"><strong>Tension pneumothorax:</strong> Absent breath sounds + hyperresonance + tracheal deviation AWAY + hypotension + JVD. Tamponade has muffled hearts + JVD but bilateral breath sounds. Hemothorax has DULLNESS (blood is heavy). Simple pneumothorax is stable!</div></div>`;
        document.getElementById('dxSubmit').textContent = 'Continue →';
        document.getElementById('dxSubmit').onclick = () => goTo('action');
    }

    let selectedAct = null;
    function selectAct(id) { selectedAct = id; document.querySelectorAll('#actOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('actSubmit').disabled = false; }
    function submitAct() {
        document.querySelectorAll('#actOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'decompress') o.classList.add('correct');
            else if (o.dataset.id === selectedAct) o.classList.add('incorrect');
        });
        state.actScore = selectedAct === 'decompress' ? 100 : 20;
        addScore(selectedAct === 'decompress' ? 40 : 5);
        document.getElementById('actFeedback').innerHTML = `<div class="feedback ${selectedAct==='decompress'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedAct==='decompress'?'✅':'📚'}</span><span class="feedback-title">${selectedAct==='decompress'?'Life-Saving Action!':'Critical Error'}</span></div><div class="feedback-text"><strong>IMMEDIATE needle decompression!</strong> Tension pneumothorax is a CLINICAL diagnosis. Waiting for imaging kills patients. Decompress the affected side (RIGHT - where breath sounds are absent, trachea deviated AWAY). Every second counts.</div></div>`;
        document.getElementById('actSubmit').textContent = 'Continue →';
        document.getElementById('actSubmit').onclick = () => goTo('technique');
    }

    let selectedSite = null;
    function selectSite(id) { selectedSite = id; document.querySelectorAll('#siteOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('siteSubmit').disabled = false; }
    function submitSite() {
        const correct = selectedSite === '5th_lat' || selectedSite === '2nd_mcl';
        document.querySelectorAll('#siteOpts .radio-option').forEach(o => {
            if (o.dataset.id === '5th_lat') o.classList.add('correct');
            else if (o.dataset.id === '2nd_mcl' && selectedSite === '2nd_mcl') o.classList.add('correct');
            else if (o.dataset.id === selectedSite) o.classList.add('incorrect');
        });
        state.siteScore = selectedSite === '5th_lat' ? 100 : (selectedSite === '2nd_mcl' ? 80 : 30);
        addScore(selectedSite === '5th_lat' ? 40 : (selectedSite === '2nd_mcl' ? 35 : 10));
        document.getElementById('siteFeedback').innerHTML = `<div class="feedback ${correct?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${correct?'✅':'📚'}</span><span class="feedback-title">${correct?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>5th ICS, anterior axillary line</strong> is now preferred (ATLS 10th ed) - chest wall is thinner here, higher success rate. 2nd ICS MCL is traditional and still acceptable. Use a LONG needle (3.25 inch/8cm) - standard 1.5 inch needles often fail to reach pleural space.</div></div>`;
        document.getElementById('siteSubmit').textContent = 'Continue →';
        document.getElementById('siteSubmit').onclick = () => goTo('followup');
    }

    let selectedDef = null;
    function selectDef(id) { selectedDef = id; document.querySelectorAll('#defOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('defSubmit').disabled = false; }
    function submitDef() {
        document.querySelectorAll('#defOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'chest_tube') o.classList.add('correct');
            else if (o.dataset.id === selectedDef) o.classList.add('incorrect');
        });
        state.defScore = selectedDef === 'chest_tube' ? 100 : 30;
        addScore(selectedDef === 'chest_tube' ? 40 : 10);
        document.getElementById('defFeedback').innerHTML = `<div class="feedback ${selectedDef==='chest_tube'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedDef==='chest_tube'?'✅':'📚'}</span><span class="feedback-title">${selectedDef==='chest_tube'?'Correct!':'Critical Point'}</span></div><div class="feedback-text"><strong>Chest tube is ALWAYS required!</strong> Needle decompression is a temporizing measure only. The needle can kink, dislodge, or occlude. Place a chest tube (tube thoracostomy) as soon as possible for definitive management.</div></div>`;
        document.getElementById('defSubmit').textContent = 'Continue →';
        document.getElementById('defSubmit').onclick = () => goTo('findings');
    }

    let selectedFind = new Set();
    function toggleFind(id) {
        const el = document.querySelector(`#findOpts .checkbox-item[data-id="${id}"]`);
        if(selectedFind.has(id)) { selectedFind.delete(id); el.classList.remove('selected'); }
        else { selectedFind.add(id); el.classList.add('selected'); }
    }
    function submitFind() {
        let correct = 0;
        const items = [{id:'hypotension',c:true},{id:'tracheal',c:true},{id:'jvd',c:true},{id:'absent_bs',c:true},{id:'hyperresonance',c:true},{id:'dullness',c:false}];
        items.forEach(i => {
            const el = document.querySelector(`#findOpts .checkbox-item[data-id="${i.id}"]`);
            const sel = selectedFind.has(i.id);
            if (i.c && sel) { el.classList.add('correct'); correct++; }
            else if (!i.c && sel) { el.classList.add('incorrect'); }
        });
        state.findScore = Math.round(correct / 5 * 100);
        addScore(Math.round(state.findScore / 2.5));
        document.getElementById('findFeedback').innerHTML = `<div class="feedback ${state.findScore>=75?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${state.findScore>=75?'✅':'📚'}</span><span class="feedback-title">Classic Findings</span></div><div class="feedback-text"><strong>Tension pneumothorax:</strong> Hypotension (obstructive shock), JVD (impaired venous return), absent breath sounds (affected side), tracheal deviation (away from tension), HYPERRESONANCE (air). Dullness = fluid (hemothorax/effusion).</div></div>`;
        document.querySelector('#findFeedback').closest('.card-body').querySelector('.btn-row').innerHTML = `<button class="btn btn-primary" onclick="goTo('outcome')">Complete Case →</button>`;
    }

    function goTo(id) { state.stage = id; document.getElementById('stageContainer').innerHTML = stages[id].render(); window.scrollTo(0,0); }
    document.addEventListener('DOMContentLoaded', () => goTo('setup'));
    </script>
</body>
</html>
