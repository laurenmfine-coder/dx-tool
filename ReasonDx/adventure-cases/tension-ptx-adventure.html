<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Pressure | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#EF4444;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#B91C1C,#EF4444);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(239,68,68,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(239,68,68,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(239,68,68,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#FCA5A5;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🎈 Under Pressure</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'24M',wt:'72kg',hx:'Stab wound to right chest, progressive dyspnea and hypotension',exam:'Absent breath sounds right, tracheal deviation left, JVD',vitals:{HR:'128',BP:'78/52',RR:'32',SpO2:'82%'},labs:{Hx:'Penetrating trauma'}},int:{age:'55F',wt:'68kg',hx:'On ventilator for pneumonia, sudden desaturation and hypotension',exam:'Absent BS left, difficult to ventilate, subcutaneous emphysema',vitals:{HR:'138',BP:'72/48',RR:'Vent',SpO2:'75%'},labs:{Hx:'Barotrauma suspected'}},adv:{age:'19M',wt:'75kg',hx:'Tall, thin male with sudden pleuritic chest pain while at rest',exam:'Decreased BS right, trachea midline, stable VS',vitals:{HR:'92',BP:'122/78',RR:'20',SpO2:'95%'},labs:{Hx:'Primary spontaneous PTX'}}};
const Q=[
{t:'Pathophysiology',q:'What causes cardiovascular collapse in tension pneumothorax?',h:'Mechanical obstruction',o:[{id:'a',txt:'Mediastinal shift compresses vena cava, decreasing venous return and cardiac output',c:1,p:100},{id:'b',txt:'Direct cardiac injury',c:0,p:20},{id:'c',txt:'Blood loss only',c:0,p:10}],fb:{1:'<b>Correct!</b> Tension PTX: One-way valve allows air entry but not exit → progressive pressure → mediastinal shift → IVC/SVC compression → decreased preload → obstructive shock.',0:'<b>Mechanism:</b> Mediastinal shift compresses great vessels, reducing venous return.'}},
{t:'Clinical Diagnosis',q:'Classic findings of tension pneumothorax?',h:'Clinical diagnosis - dont wait for imaging',o:[{id:'a',txt:'Hypotension, JVD, absent breath sounds, tracheal deviation (late), hyperresonance',c:1,p:100},{id:'b',txt:'Bilateral wheezing',c:0,p:10},{id:'c',txt:'Normal breath sounds',c:0,p:10}],fb:{1:'<b>Correct!</b> Classic: Hypotension, JVD (impaired venous return), absent BS on affected side, tracheal deviation AWAY (late sign), hyperresonance to percussion. CLINICAL DIAGNOSIS!',0:'<b>Signs:</b> Absent BS, JVD, hypotension, tracheal deviation (late).'}},
{t:'Immediate Treatment',q:'Immediate treatment for tension pneumothorax?',h:'Dont wait for imaging',o:[{id:'a',txt:'Needle decompression (2nd ICS MCL or 4th/5th ICS AAL) followed by tube thoracostomy',c:1,p:100},{id:'b',txt:'Wait for CXR confirmation',c:0,p:10},{id:'c',txt:'Oxygen only',c:0,p:10}],fb:{1:'<b>Correct!</b> Immediate needle decompression: 2nd ICS midclavicular line OR 4th/5th ICS anterior axillary line (preferred - less adipose tissue). Follow with chest tube. CLINICAL diagnosis = immediate treatment.',0:'<b>Treatment:</b> Needle decompression immediately, then chest tube. Dont wait for imaging!'}},
{t:'Needle Location',q:'Preferred site for needle decompression in adults?',h:'Anatomic considerations',o:[{id:'a',txt:'4th/5th ICS anterior axillary line (higher success rate, less soft tissue)',c:1,p:100},{id:'b',txt:'2nd ICS only',c:0,p:40},{id:'c',txt:'Subcostal approach',c:0,p:10}],fb:{1:'<b>Correct!</b> Traditional: 2nd ICS MCL. Studies show 4th/5th ICS AAL has higher success (less adipose tissue, larger pleural space). Use at least 8cm needle. Go ABOVE the rib (neurovascular bundle below).',0:'<b>Site:</b> 4th/5th ICS AAL preferred (higher success). 2nd ICS MCL alternative.'}},
{t:'Simple vs Tension',q:'How does simple pneumothorax differ from tension pneumothorax?',h:'Hemodynamic stability is key',o:[{id:'a',txt:'Simple: stable VS, no mediastinal shift; Tension: hypotension, JVD, mediastinal shift',c:1,p:100},{id:'b',txt:'Same thing',c:0,p:10},{id:'c',txt:'Simple has larger pneumothorax',c:0,p:20}],fb:{1:'<b>Correct!</b> Simple PTX: Stable vitals, no tension physiology. May observe if small (<2cm), primary spontaneous. Tension PTX: Life-threatening, obstructive shock, requires immediate decompression.',0:'<b>Difference:</b> Tension = hemodynamic compromise + mediastinal shift.'}},
{t:'Primary Spontaneous',q:'Risk factors for primary spontaneous pneumothorax?',h:'Classic patient',o:[{id:'a',txt:'Tall, thin young males; smoking; family history; Marfan/EDS',c:1,p:100},{id:'b',txt:'Obese patients',c:0,p:10},{id:'c',txt:'Athletes only',c:0,p:20}],fb:{1:'<b>Correct!</b> Classic: Tall thin male (20-40yo) with subpleural blebs. Smoking increases risk 20x. Connective tissue disorders (Marfan, EDS). Recurrence: 30% within 1-2 years.',0:'<b>Primary spontaneous:</b> Tall thin young males, smokers, Marfan/EDS.'}},
{t:'Iatrogenic Causes',q:'Most common cause of iatrogenic pneumothorax?',h:'Procedural complication',o:[{id:'a',txt:'Central line placement (especially subclavian), thoracentesis, mechanical ventilation',c:1,p:100},{id:'b',txt:'Blood draws',c:0,p:10},{id:'c',txt:'Foley catheter placement',c:0,p:0}],fb:{1:'<b>Correct!</b> Common iatrogenic causes: Central venous catheter (subclavian > IJ), thoracentesis, lung biopsy, positive pressure ventilation (barotrauma). Always get post-procedure CXR.',0:'<b>Iatrogenic:</b> Central lines (subclavian), thoracentesis, mechanical ventilation.'}},
{t:'Ventilator Considerations',q:'What should you do if a ventilated patient suddenly decompensates with high airway pressures?',h:'DOPE mnemonic',o:[{id:'a',txt:'Disconnect from vent, consider tension PTX, use DOPE mnemonic (Displacement, Obstruction, PTX, Equipment)',c:1,p:100},{id:'b',txt:'Increase vent settings',c:0,p:20},{id:'c',txt:'Sedate further',c:0,p:10}],fb:{1:'<b>Correct!</b> DOPE: Displacement (ETT), Obstruction (mucus plug), Pneumothorax, Equipment failure. Disconnect from vent (rules out auto-PEEP, allows assessment). Tension PTX common in mechanically ventilated patients.',0:'<b>DOPE:</b> Displacement, Obstruction, Pneumothorax, Equipment. Disconnect and assess.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🎈 Under Pressure</h1><p style="color:var(--muted);margin-bottom:32px">Tension Pneumothorax: Recognition, needle decompression, simple vs tension</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🎈 Respiratory Distress</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Tension PTX Pearls</div><div class="pearl-item"><b>Mechanism:</b> Mediastinal shift → IVC compression → obstructive shock</div><div class="pearl-item"><b>Signs:</b> Absent BS, JVD, hypotension, tracheal deviation (late)</div><div class="pearl-item"><b>Treatment:</b> Needle decompression immediately, then chest tube</div><div class="pearl-item"><b>Site:</b> 4th/5th ICS AAL preferred (or 2nd ICS MCL)</div><div class="pearl-item"><b>Primary spontaneous:</b> Tall thin young males, smokers</div><div class="pearl-item"><b>DOPE:</b> Displacement, Obstruction, Pneumothorax, Equipment</div></div><div class="cross-link"><a href="shock-differentiation-adventure-enhanced.html">Related: Shock Types</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
