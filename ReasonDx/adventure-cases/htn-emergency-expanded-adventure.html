<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypertensive Emergency | Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #7f1d1d 0%, #dc2626 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(127, 29, 29, 0.9); border-radius: 16px; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; background: #dc2626; margin-left: 10px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #dc2626, #fca5a5); border-radius: 3px; }
        .scene { background: linear-gradient(135deg, #7f1d1d, #991b1b); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .scene-header { background: rgba(220, 38, 38, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #fca5a5; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(220,38,38,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #dc2626, #991b1b); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #fca5a5; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','definitions','endorgan','workup','goals','ivagents','neuro','cardiac','aortic','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">🩺 Hypertensive Emergency<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Severely Elevated Blood Pressure</div></div><div class="scene-body"><div class="narrative"><p>A <span class="highlight">58-year-old man</span> with history of poorly controlled HTN presents with <span class="critical">severe headache, blurred vision, and chest discomfort</span>. Ran out of BP meds 2 weeks ago.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 102, BP 228/134, RR 22<br><strong>Exam:</strong> Papilledema, S4 gallop, bibasilar crackles<br><strong>ECG:</strong> LVH with strain pattern</p></div><div class="alert-box"><div class="alert-title">🚨 End-Organ Damage = Emergency!</div><p>The BP number alone doesn't define emergency. It's the presence of acute end-organ damage that distinguishes hypertensive EMERGENCY from URGENCY.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Pathophysiology</div><div class="pathway">Severe HTN → exceeds autoregulation<br>→ Endothelial damage<br>→ Fibrinoid necrosis of arterioles<br>→ Target organ ischemia/damage<br><br><strong>Key organs:</strong><br>Brain, heart, kidneys, eyes, aorta</div></div><button class="btn" onclick="nextStage()">Definitions →</button></div></div>`;
    };

    window.render_definitions = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">Emergency vs Urgency</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Critical Distinction</div><table class="comparison-table"><tr><th>Feature</th><th>HTN Emergency</th><th>HTN Urgency</th></tr><tr><td><strong>BP</strong></td><td>Usually >180/120</td><td>Usually >180/120</td></tr><tr><td><strong>End-organ damage</strong></td><td>YES (acute)</td><td>NO</td></tr><tr><td><strong>Treatment</strong></td><td>IV meds, ICU</td><td>Oral meds, observe</td></tr><tr><td><strong>BP reduction</strong></td><td>Minutes to hours</td><td>Hours to days</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ Asymptomatic Severe HTN</div><p>Patient with BP 200/110 but NO symptoms and NO end-organ damage = Urgency, not Emergency. Don't aggressively lower BP! Risk of stroke/MI from hypoperfusion.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Not Drop BP Fast?</div><div class="pathway"><strong>Cerebral autoregulation:</strong><br>Chronic HTN shifts curve RIGHT<br>→ Brain "needs" higher MAP to perfuse<br><br>Rapid BP drop → watershed ischemia<br>→ Stroke, even at "normal" BP<br><br>Exception: Aortic dissection<br>(needs rapid reduction)</div></div><button class="btn" onclick="nextStage()">End-Organ Damage →</button></div></div>`;
    };

    window.render_endorgan = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">Target Organ Damage</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Types of HTN Emergency</div><table class="comparison-table"><tr><th>Organ</th><th>Manifestation</th></tr><tr><td><strong>Brain</strong></td><td>Hypertensive encephalopathy, ICH, ischemic stroke</td></tr><tr><td><strong>Heart</strong></td><td>ACS, acute pulmonary edema, aortic dissection</td></tr><tr><td><strong>Kidney</strong></td><td>Acute hypertensive nephrosclerosis</td></tr><tr><td><strong>Eye</strong></td><td>Papilledema, retinal hemorrhages, exudates</td></tr><tr><td><strong>Vascular</strong></td><td>Aortic dissection</td></tr><tr><td><strong>Other</strong></td><td>Eclampsia, HELLP, pheochromocytoma crisis</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Hypertensive Encephalopathy</div><div class="pathway"><strong>Symptoms:</strong><br>Headache, confusion, visual changes,<br>nausea/vomiting, seizures<br><br><strong>Exam:</strong><br>Papilledema, focal deficits possible<br><br><strong>Imaging:</strong><br>PRES (posterior reversible encephalopathy)<br>→ Bilateral parieto-occipital edema on MRI<br><br>Reversible if treated promptly!</div></div><button class="btn" onclick="nextStage()">Workup →</button></div></div>`;
    };

    window.render_workup = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">Initial Evaluation</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Workup for HTN Emergency</div><table class="comparison-table"><tr><th>Test</th><th>Looking For</th></tr><tr><td>CBC</td><td>MAHA (schistocytes) - malignant HTN</td></tr><tr><td>BMP</td><td>AKI, electrolytes</td></tr><tr><td>Urinalysis</td><td>Proteinuria, hematuria, RBC casts</td></tr><tr><td>Troponin</td><td>Cardiac ischemia</td></tr><tr><td>BNP</td><td>Heart failure</td></tr><tr><td>ECG</td><td>Ischemia, LVH, arrhythmia</td></tr><tr><td>CXR</td><td>Pulmonary edema, widened mediastinum</td></tr><tr><td>Fundoscopy</td><td>Papilledema, hemorrhages, exudates</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ Consider Secondary Causes</div><p>• Renal artery stenosis<br>• Pheochromocytoma<br>• Primary aldosteronism<br>• Medication non-compliance<br>• Drug use (cocaine, amphetamines)</p></div><button class="btn" onclick="nextStage()">BP Goals →</button></div></div>`;
    };

    window.render_goals = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">Blood Pressure Targets</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 General BP Reduction Goals</div><table class="comparison-table"><tr><th>Condition</th><th>Target</th><th>Timeframe</th></tr><tr><td><strong>Most HTN emergencies</strong></td><td>↓ MAP 20-25%</td><td>First 1 hour</td></tr><tr><td>Then</td><td>160/100-110</td><td>Next 2-6 hours</td></tr><tr><td>Then</td><td>Normal</td><td>24-48 hours</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 EXCEPTIONS - Different Targets!</div><table class="comparison-table"><tr><th>Condition</th><th>Target</th></tr><tr><td><strong>Aortic dissection</strong></td><td>SBP <120 in 20 min + HR <60</td></tr><tr><td><strong>Ischemic stroke (tPA)</strong></td><td><185/110 before, <180/105 after</td></tr><tr><td><strong>ICH</strong></td><td>SBP <140 (if presenting 150-220)</td></tr><tr><td><strong>Preeclampsia/Eclampsia</strong></td><td>SBP <160, DBP <110</td></tr></table></div><button class="btn" onclick="nextStage()">IV Agents →</button></div></div>`;
    };

    window.render_ivagents = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">IV Antihypertensives</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 First-Line IV Agents</div><table class="comparison-table"><tr><th>Drug</th><th>Dose</th><th>Best For</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Nicardipine</strong></td><td>5-15 mg/hr IV</td><td>Most emergencies; predictable</td></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Labetalol</strong></td><td>20-80 mg IV bolus or 0.5-2 mg/min</td><td>Aortic dissection, most emergencies</td></tr><tr><td><strong>Esmolol</strong></td><td>500 mcg/kg load, 50-200 mcg/kg/min</td><td>Aortic dissection (short-acting)</td></tr><tr><td><strong>Nitroprusside</strong></td><td>0.25-10 mcg/kg/min</td><td>Most effective; cyanide risk</td></tr><tr><td><strong>Nitroglycerin</strong></td><td>5-200 mcg/min</td><td>ACS, pulmonary edema</td></tr><tr><td><strong>Clevidipine</strong></td><td>1-2 mg/hr, titrate</td><td>Ultra-short acting CCB</td></tr><tr><td><strong>Hydralazine</strong></td><td>10-20 mg IV</td><td>Pregnancy (eclampsia)</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Nicardipine Often First?</div><div class="pathway">• Predictable dose-response<br>• No reflex tachycardia (vs hydralazine)<br>• No cyanide toxicity (vs nitroprusside)<br>• Can use in most situations<br>• Easy to titrate<br><br><strong>Avoid if:</strong> Severe aortic stenosis</div></div><button class="btn" onclick="nextStage()">Neurologic Emergency →</button></div></div>`;
    };

    window.render_neuro = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 10</div><div class="scene-title">Neurologic Emergencies</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 HTN + Neuro Emergency</div><table class="comparison-table"><tr><th>Condition</th><th>BP Target</th><th>Agent</th></tr><tr><td><strong>HTN encephalopathy</strong></td><td>↓ MAP 20-25% in 1h</td><td>Nicardipine, labetalol</td></tr><tr><td><strong>Ischemic stroke (no tPA)</strong></td><td>Permissive HTN <220/120</td><td>Often observe</td></tr><tr><td><strong>Ischemic stroke (tPA candidate)</strong></td><td><185/110 pre-tPA, <180/105 post</td><td>Nicardipine, labetalol</td></tr><tr><td><strong>ICH</strong></td><td>SBP <140 (if 150-220)</td><td>Nicardipine</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ Ischemic Stroke Caution!</div><p>Don't aggressively lower BP in ischemic stroke unless:<br>• tPA candidate (need <185/110)<br>• BP >220/120<br>• Other indication (HF, dissection, AKI)<br><br>Permissive HTN maintains penumbra perfusion!</p></div><button class="btn" onclick="nextStage()">Cardiac Emergency →</button></div></div>`;
    };

    window.render_cardiac = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 10</div><div class="scene-title">Cardiac Emergencies</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 HTN + Cardiac Emergency</div><table class="comparison-table"><tr><th>Condition</th><th>Preferred Agents</th><th>Notes</th></tr><tr><td><strong>ACS</strong></td><td>Nitroglycerin, esmolol, labetalol</td><td>↓ Preload, ↓ afterload, ↓ HR</td></tr><tr><td><strong>Acute pulmonary edema</strong></td><td>Nitroglycerin, nitroprusside</td><td>Vasodilators ↓ preload/afterload</td></tr><tr><td><strong>Aortic dissection</strong></td><td>Esmolol + nicardipine</td><td>Beta-blocker FIRST, then vasodilator</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Flash Pulmonary Edema</div><div class="pathway"><strong>Mechanism:</strong><br>Severe HTN → ↑↑ afterload<br>→ LV can't eject → ↑ LVEDP<br>→ Pulmonary congestion<br><br><strong>Treatment:</strong><br>• Nitroglycerin (↓ preload + afterload)<br>• Nitroprusside (if severe)<br>• Diuretics (furosemide)<br>• NIPPV (BiPAP)<br>• Treat underlying cause</div></div><button class="btn" onclick="nextStage()">Aortic Dissection →</button></div></div>`;
    };

    window.render_aortic = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 10</div><div class="scene-title">Aortic Dissection</div></div><div class="scene-body"><div class="alert-box"><div class="alert-title">🚨 Most Aggressive BP Control!</div><p>Target: SBP <120 AND HR <60 within 20 minutes. Beta-blocker FIRST (reduce dP/dt), then vasodilator.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Anti-Impulse Therapy</div><table class="comparison-table"><tr><th>Step</th><th>Agent</th><th>Goal</th></tr><tr><td><strong>1. Beta-blocker</strong></td><td>Esmolol or labetalol</td><td>HR <60 bpm</td></tr><tr><td><strong>2. Vasodilator</strong></td><td>Nicardipine or nitroprusside</td><td>SBP <120 mmHg</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why Beta-Blocker FIRST?</div><div class="pathway">Vasodilator alone → reflex tachycardia<br>→ ↑ dP/dt (rate of pressure rise)<br>→ ↑ Shear stress on aortic wall<br>→ Propagates dissection!<br><br>Beta-blocker first:<br>→ ↓ HR and contractility<br>→ ↓ dP/dt<br>→ THEN safe to add vasodilator</div></div><div class="alert-box"><div class="alert-title">⚠️ Exception: Cocaine-Induced HTN</div><p>NO beta-blockers! Causes unopposed alpha stimulation → worsens HTN. Use benzos ± nicardipine/phentolamine.</p></div><button class="btn" onclick="nextStage()">Debrief →</button></div></div>`;
    };

    window.render_debrief = function() {
        return `<div class="scene"><div style="text-align:center;padding:40px;"><div style="font-size:4rem;margin-bottom:12px;">🩺</div><div style="font-size:1.8rem;font-weight:700;color:#4ade80;">HTN Emergency Mastery!</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 High-Yield Summary</div><table class="comparison-table"><tr><th>Concept</th><th>Key Point</th></tr><tr><td>Emergency vs Urgency</td><td>End-organ damage defines emergency</td></tr><tr><td>General goal</td><td>↓ MAP 20-25% in first hour</td></tr><tr><td>Aortic dissection</td><td>SBP <120 + HR <60 in 20 min</td></tr><tr><td>Beta-blocker first</td><td>Before vasodilator in dissection</td></tr><tr><td>Ischemic stroke</td><td>Permissive HTN unless tPA candidate</td></tr><tr><td>Cocaine HTN</td><td>NO beta-blockers! Use benzos</td></tr></table></div><div class="tips"><div class="pearl"><div class="tip-header">✓ Pearls</div><ul style="margin-left:16px;"><li>End-organ damage = emergency</li><li>Nicardipine good for most situations</li><li>Beta-blocker before vasodilator in dissection</li><li>Don't drop BP too fast (watershed stroke)</li></ul></div><div class="pitfall"><div class="tip-header">✗ Pitfalls</div><ul style="margin-left:16px;"><li>Treating numbers not symptoms</li><li>Dropping BP too fast</li><li>Beta-blockers in cocaine</li><li>Aggressive BP lowering in ischemic stroke</li></ul></div></div><button class="btn" onclick="state.stage=0;render()">🔄 Restart Case</button></div></div>`;
    };

    render();
    </script>

<div class="rdx-crossplatform" style="background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); border-radius: 12px; padding: 20px; margin: 20px auto; max-width: 1000px; border: 1px solid #cbd5e1;">

<div class="rdx-debrief-overlay" id="rdxDebriefOverlay" style="display:none;">
    <div class="rdx-debrief-panel" id="rdxDebriefContent"></div>
</div>

<script>
// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
    
    // Auto-inject hint examples into existing content
    window.rdxInit = function() {
        // Could add dynamic hint injection here based on difficulty
        console.log('ReasonDx Enhanced Features loaded for: Htn Emergency Expanded Adventure');
    };
    
    // Initialize on load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.rdxInit);
    } else {
        window.rdxInit();
    }
})();
</script>
<!-- ==================== END REASONDX ENHANCED FEATURES ==================== -->
