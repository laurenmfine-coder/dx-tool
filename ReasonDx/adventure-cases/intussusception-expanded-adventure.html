        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }

        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #a78bfa, #7c3aed); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #c4b5fd; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }

        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }

        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }

<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','pathophys','clinical','currantjelly','ultrasound','xray','enema','surgery','leadpoints','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">👶🔄 Intussusception<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Intermittent Crying Episodes</div></div><div class="scene-body"><div class="narrative"><p>A <span class="highlight">9-month-old boy</span> presents with <span class="critical">episodes of inconsolable crying, drawing up his legs, then appearing normal between episodes</span>. One episode of vomiting. No fever.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 130, T 98.8°F<br><strong>Exam:</strong> Between episodes: soft abdomen, "sausage-shaped" mass RUQ<br><strong>History:</strong> Recent viral illness</p></div><div class="alert-box"><div class="alert-title">🚨 Classic Intussusception!</div><p>Most common cause of bowel obstruction in children 6-36 months. Episodic colicky pain with pain-free intervals is the hallmark. Don't miss it!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 What is Intussusception?</div><div class="pathway"><strong>Definition:</strong><br>Telescoping of proximal bowel into distal bowel<br><br><strong>Most common type:</strong><br>Ileocolic (ileum into colon) - 90%<br><br><strong>Peak age:</strong> 6-36 months<br>(peak at 5-9 months)<br><br><strong>Male:Female:</strong> 3:1</div></div><button class="btn" onclick="nextStage()">Pathophysiology →</button></div></div>`;
    };

    window.render_pathophys = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">Mechanism</div></div><div class="scene-body"><div class="mechanism-box"><div class="mechanism-title">🧬 How Intussusception Develops</div><div class="pathway">Lead point (lymphoid tissue, Peyer's patches)<br>→ Gets "caught" by peristalsis<br>→ Drags proximal bowel into distal<br>→ Telescoping<br>→ Mesenteric compression<br>→ Venous obstruction → edema<br>→ Arterial compromise → ischemia<br>→ Necrosis → perforation (if untreated)</div></div><div class="boards-tip"><div class="boards-tip-title">📚 Why This Age?</div><table class="comparison-table"><tr><th>Factor</th><th>Explanation</th></tr><tr><td><strong>Peyer's patches</strong></td><td>Lymphoid tissue enlarges with viral infections</td></tr><tr><td><strong>Viral illness</strong></td><td>Often follows URI or gastroenteritis</td></tr><tr><td><strong>Rotavirus vaccine</strong></td><td>Small increased risk post-vaccination</td></tr><tr><td><strong>Weaning</strong></td><td>New food antigens stimulate Peyer's patches</td></tr></table></div><button class="btn" onclick="nextStage()">Clinical Features →</button></div></div>`;
    };

    window.render_clinical = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">Classic Triad</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Classic Triad (only ~20% have all 3!)</div><table class="comparison-table"><tr><th>Feature</th><th>Frequency</th></tr><tr><td><strong>Colicky abdominal pain</strong></td><td>~85-90%</td></tr><tr><td><strong>Vomiting</strong></td><td>~80%</td></tr><tr><td><strong>Currant jelly stool</strong></td><td>~20% (LATE sign!)</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Pain Characteristics</div><div class="pathway"><strong>Episodic/intermittent:</strong><br>• Sudden severe pain (peristaltic waves)<br>• Infant draws up legs, screams<br>• Lasts 15-30 minutes<br>• Pain-FREE intervals (appears normal!)<br><br><strong>As disease progresses:</strong><br>• Intervals shorten<br>• Lethargy increases<br>• May become less responsive</div></div><div class="alert-box"><div class="alert-title">⚠️ Lethargy May Be Only Sign!</div><p>Some infants present with lethargy alone, without obvious pain. Always consider intussusception in unexplained lethargy in infants.</p></div><button class="btn" onclick="nextStage()">Currant Jelly Stool →</button></div></div>`;
    };

    window.render_currantjelly = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">Currant Jelly Stool</div></div><div class="scene-body"><div class="alert-box"><div class="alert-title">🚨 Currant Jelly = LATE Finding!</div><p>Indicates mucosal sloughing and bleeding. Suggests prolonged intussusception with ischemia. Absence does NOT rule out intussusception!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why "Currant Jelly"?</div><div class="pathway"><strong>Pathophysiology:</strong><br>Venous congestion<br>→ Mucosal edema<br>→ Mucosal sloughing<br>→ Blood + mucus mix<br>→ Red jelly-like stool<br><br><strong>Timing:</strong><br>Usually 12+ hours after symptom onset<br>Late finding = concern for ischemia</div></div><div class="boards-tip"><div class="boards-tip-title">📚 Physical Exam Findings</div><table class="comparison-table"><tr><th>Finding</th><th>Notes</th></tr><tr><td><strong>"Sausage-shaped" mass</strong></td><td>RUQ or epigastric; present in ~60%</td></tr><tr><td><strong>Empty RLQ (Dance sign)</strong></td><td>Cecum has migrated</td></tr><tr><td><strong>Distension</strong></td><td>Later finding with obstruction</td></tr><tr><td><strong>Lethargy</strong></td><td>May be profound</td></tr></table></div><button class="btn" onclick="nextStage()">Ultrasound →</button></div></div>`;
    };

    window.render_ultrasound = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">Ultrasound Diagnosis</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Ultrasound Findings</div><table class="comparison-table"><tr><th>View</th><th>Finding</th><th>Description</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Transverse</strong></td><td>"Target" or "Donut" sign</td><td>Concentric rings of bowel wall</td></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Longitudinal</strong></td><td>"Pseudokidney" sign</td><td>Layers of bowel resemble kidney</td></tr><tr><td>Either</td><td>Trapped mesenteric fat</td><td>Echogenic center</td></tr><tr><td>Either</td><td>Lymph nodes</td><td>May see lead point</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 Ultrasound is Diagnostic Test of Choice!</div><p>Sensitivity >98%, Specificity >98%. Non-invasive, no radiation. Should be first-line imaging in suspected intussusception.</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Target Sign</div><div class="pathway"><strong>Cross-section shows:</strong><br>• Outer hypoechoic ring (edematous outer bowel)<br>• Inner echogenic layer (mucosa)<br>• Central hypoechoic (inner bowel)<br>• May see mesenteric fat (crescent)<br><br>Classic "bulls-eye" or "target" appearance</div></div><button class="btn" onclick="nextStage()">X-ray →</button></div></div>`;
    };

    window.render_xray = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">Plain Radiograph</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 X-ray Findings</div><table class="comparison-table"><tr><th>Finding</th><th>Significance</th></tr><tr><td><strong>Normal</strong></td><td>Does NOT rule out intussusception!</td></tr><tr><td><strong>Soft tissue mass</strong></td><td>RUQ, may see "meniscus sign"</td></tr><tr><td><strong>Paucity of gas in RLQ</strong></td><td>Displaced cecum</td></tr><tr><td><strong>Small bowel obstruction</strong></td><td>Air-fluid levels (late)</td></tr><tr><td><strong>Free air</strong></td><td>Perforation (surgical emergency!)</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ X-ray is Often Normal Early!</div><p>X-ray has low sensitivity (~45%). A normal X-ray does NOT exclude intussusception. Ultrasound is the test of choice.</p></div><button class="btn" onclick="nextStage()">Air/Contrast Enema →</button></div></div>`;
    };

    window.render_enema = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 10</div><div class="scene-title">Enema Reduction</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Enema Reduction</div><table class="comparison-table"><tr><th>Type</th><th>Details</th></tr><tr><td><strong>Air enema</strong></td><td>Preferred; safe, high success rate</td></tr><tr><td><strong>Contrast (barium/water-soluble)</strong></td><td>Alternative; diagnostic + therapeutic</td></tr><tr><td><strong>Success rate</strong></td><td>~80-95%</td></tr><tr><td><strong>Recurrence</strong></td><td>~10% after successful reduction</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 Contraindications to Enema</div><p><strong>Do NOT attempt enema if:</strong> Peritonitis, perforation, shock, prolonged symptoms (>48h is relative). Surgery instead!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Procedure</div><div class="pathway"><strong>Technique:</strong><br>1. IV access, NPO, surgical backup<br>2. Insert rectal catheter<br>3. Insufflate air (or contrast) under pressure<br>4. Watch for reflux into terminal ileum<br>5. Complete reduction = air in small bowel<br><br><strong>"Rule of 3s":</strong><br>• Max pressure 120 mmHg (air)<br>• Max 3 attempts<br>• Max 3 minutes each attempt</div></div><button class="btn" onclick="nextStage()">Surgery →</button></div></div>`;
    };

    window.render_surgery = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 10</div><div class="scene-title">Surgical Management</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Surgical Indications</div><table class="comparison-table"><tr><th>Indication</th></tr><tr><td>Failed enema reduction (after 3 attempts)</td></tr><tr><td>Perforation (free air)</td></tr><tr><td>Peritonitis</td></tr><tr><td>Hemodynamic instability</td></tr><tr><td>Prolonged symptoms with high ischemia risk</td></tr><tr><td>Pathologic lead point suspected (>3 years old)</td></tr><tr><td>Multiple recurrences</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Surgical Approach</div><div class="pathway"><strong>Options:</strong><br>• Manual reduction (squeeze out intussusceptum)<br>• Resection if necrotic or lead point<br><br><strong>Laparoscopic vs Open:</strong><br>Depends on surgeon preference, stability<br><br><strong>Prognosis:</strong><br>Excellent with timely treatment<br>Mortality <1% in developed countries</div></div><button class="btn" onclick="nextStage()">Lead Points →</button></div></div>`;
    };

    window.render_leadpoints = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 10</div><div class="scene-title">Pathologic Lead Points</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 When to Suspect Lead Point</div><table class="comparison-table"><tr><th>Clue</th><th>Implication</th></tr><tr><td><strong>Age >3-5 years</strong></td><td>More likely pathologic cause</td></tr><tr><td><strong>Multiple recurrences</strong></td><td>Need to look for lead point</td></tr><tr><td><strong>Small bowel-small bowel</strong></td><td>Usually has lead point</td></tr><tr><td><strong>Adult intussusception</strong></td><td>~90% have pathologic cause</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Types of Lead Points</div><div class="pathway"><strong>In children (when present):</strong><br>• Meckel's diverticulum (most common)<br>• Polyp<br>• Lymphoma<br>• Duplication cyst<br>• Henoch-Schönlein purpura (HSP)<br><br><strong>In adults:</strong><br>• Malignancy (most common!)<br>• Benign tumor/polyp<br>• Meckel's<br>• Adhesions<br><br>Most pediatric intussusception is IDIOPATHIC<br>(hypertrophied Peyer's patches)</div></div><button class="btn" onclick="nextStage()">Debrief →</button></div></div>`;
    };

    window.render_debrief = function() {
        return `<div class="scene"><div style="text-align:center;padding:40px;"><div style="font-size:4rem;margin-bottom:12px;">👶🔄</div><div style="font-size:1.8rem;font-weight:700;color:#4ade80;">Intussusception Mastery!</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 High-Yield Summary</div><table class="comparison-table"><tr><th>Concept</th><th>Key Point</th></tr><tr><td>Peak age</td><td>6-36 months (peak 5-9 months)</td></tr><tr><td>Classic triad</td><td>Colicky pain, vomiting, currant jelly stool</td></tr><tr><td>Currant jelly</td><td>LATE sign - don't wait for it!</td></tr><tr><td>Imaging of choice</td><td>Ultrasound (target/donut sign)</td></tr><tr><td>Treatment</td><td>Air enema reduction (~90% success)</td></tr><tr><td>Lead points</td><td>Suspect if >3-5 years or recurrent</td></tr></table></div><div class="tips"><div class="pearl"><div class="tip-header">✓ Pearls</div><ul style="margin-left:16px;"><li>Pain-free intervals are classic</li><li>Lethargy may be only sign</li><li>Normal X-ray doesn't rule out</li><li>Ultrasound is highly accurate</li></ul></div><div class="pitfall"><div class="tip-header">✗ Pitfalls</div><ul style="margin-left:16px;"><li>Waiting for currant jelly stool</li><li>Relying on X-ray to rule out</li><li>Enema with peritonitis/perforation</li><li>Missing lead point in older child</li></ul></div></div><button class="btn" onclick="state.stage=0;render()">🔄 Restart Case</button></div></div>`;
    };

    render();
    </script>

<div class="rdx-refs-panel" id="rdxRefsPanel">
    <div class="rdx-refs-title">📚 References & Evidence-Based Resources</div>
    <div class="rdx-refs-links"><a href="https://www.aap.org/en/clinical-guidance/" target="_blank" class="text-blue-600 hover:underline">AAP Clinical Guidelines</a> | <a href="https://www.ncbi.nlm.nih.gov/books/NBK526088/" target="_blank" class="text-blue-600 hover:underline">StatPearls: Pediatric Assessment</a></div>
</div>

<div class="rdx-debrief-overlay" id="rdxDebriefOverlay" style="display:none;">
    <div class="rdx-debrief-panel" id="rdxDebriefContent"></div>
</div>

<script>
// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
    
    // Auto-inject hint examples into existing content
    window.rdxInit = function() {
        // Could add dynamic hint injection here based on difficulty
        console.log('ReasonDx Enhanced Features loaded for: Intussusception Expanded Adventure');
    };
    
    // Initialize on load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.rdxInit);
    } else {
        window.rdxInit();
    }
})();
</script>
<!-- ==================== END REASONDX ENHANCED FEATURES ==================== -->

</body>
</html>
