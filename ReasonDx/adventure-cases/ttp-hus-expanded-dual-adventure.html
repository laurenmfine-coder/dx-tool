<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTP-HUS | Dual-Mode Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        body.adult { background: linear-gradient(135deg, #7f1d1d 0%, #b91c1c 100%); }
        body.peds { background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%); }
        .container { max-width: 900px; margin: 0 auto; }
        .mode-toggle { display: flex; justify-content: center; margin-bottom: 20px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 4px; }
        .mode-btn { flex: 1; padding: 12px 24px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; background: transparent; color: #e2e8f0; }
        .mode-btn.active { background: rgba(255,255,255,0.2); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-radius: 16px; margin-bottom: 20px; }
        .adult .header { background: rgba(127, 29, 29, 0.9); }
        .peds .header { background: rgba(124, 58, 237, 0.9); }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; margin-left: 10px; }
        .adult .badge { background: #b91c1c; }
        .peds .badge { background: #a78bfa; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; border-radius: 3px; }
        .adult .progress-fill { background: linear-gradient(90deg, #b91c1c, #fca5a5); }
        .peds .progress-fill { background: linear-gradient(90deg, #a78bfa, #c4b5fd); }
        .scene { border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .adult .scene { background: linear-gradient(135deg, #7f1d1d, #991b1b); }
        .peds .scene { background: linear-gradient(135deg, #6d28d9, #7c3aed); }
        .scene-header { padding: 16px 20px; }
        .adult .scene-header { background: rgba(185, 28, 28, 0.15); }
        .peds .scene-header { background: rgba(167, 139, 250, 0.15); }
        .scene-phase { font-size: 0.75rem; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(185,28,28,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .adult .btn { background: linear-gradient(135deg, #b91c1c, #991b1b); }
        .peds .btn { background: linear-gradient(135deg, #a78bfa, #7c3aed); }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="adult">
    <div class="container">
        <div class="mode-toggle">
            <button class="mode-btn active" onclick="setMode('adult')">🏥 Adult (TTP)</button>
            <button class="mode-btn" onclick="setMode('peds')">👶 Pediatric (HUS)</button>
        </div>
        <div id="app"></div>
    </div>
    <script>
    const STAGES = ['arrival','features','pathophys','labs','scoring','differentiation','treatment','supportive','prognosis','debrief'];
    const state = { stage: 0, mode: 'adult' };

    function setMode(m) { state.mode = m; state.stage = 0; document.body.className = m; document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); render(); }
    function nextStage() { state.stage++; render(); }

    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        const icon = state.mode === 'adult' ? '🩸' : '👶🩸';
        const title = state.mode === 'adult' ? 'TTP' : 'HUS';
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">${icon} ${title}<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }

    window.render_arrival = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Confusion and Bruising</div></div><div class="scene-body"><div class="narrative"><p>A <span class="highlight">32-year-old woman</span> presents with <span class="critical">confusion, fatigue, and petechiae</span> × 3 days. Previously healthy.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 108, BP 142/88, T 100.6°F<br><strong>Labs:</strong> Hgb 7.2, Plt 12K, Cr 1.4, LDH 1850<br><strong>Smear:</strong> Numerous schistocytes</p></div><div class="alert-box"><div class="alert-title">🚨 TTP = Hematologic Emergency!</div><p>Untreated mortality >90%. With plasma exchange, survival >80%. Don't wait for ADAMTS13 results!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Key Finding</div><div class="pathway"><strong>MAHA + Thrombocytopenia</strong><br>= Think TMA!<br><br>Schistocytes + ↓ platelets + hemolysis<br>+ Normal PT/PTT (NOT DIC!)<br>→ TTP until proven otherwise</div></div><button class="btn" onclick="nextStage()">Classic Features →</button></div></div>`;
        } else {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Bloody Diarrhea Then Pallor</div></div><div class="scene-body"><div class="narrative"><p>A <span class="highlight">3-year-old boy</span> presents with <span class="critical">pallor, decreased urine output, and irritability</span>. Had bloody diarrhea 5 days ago that resolved.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 130, BP 110/75 (elevated for age), oliguria<br><strong>Labs:</strong> Hgb 6.8, Plt 45K, Cr 3.2, LDH 2200<br><strong>Smear:</strong> Schistocytes, helmet cells</p></div><div class="alert-box"><div class="alert-title">🚨 Classic HUS Presentation!</div><p>Bloody diarrhea → 5-10 days later → MAHA + thrombocytopenia + AKI. Most common cause of acute renal failure in children!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 The Triad</div><div class="pathway"><strong>HUS Classic Triad:</strong><br>1. Microangiopathic hemolytic anemia<br>2. Thrombocytopenia<br>3. Acute kidney injury<br><br>Preceded by diarrheal illness<br>(usually E. coli O157:H7)</div></div><button class="btn" onclick="nextStage()">Features →</button></div></div>`;
        }
    };

    window.render_features = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">Classic TTP Pentad</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 TTP Pentad (Only 5-10% have all 5!)</div><table class="comparison-table"><tr><th>Feature</th><th>Frequency</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>MAHA (schistocytes)</strong></td><td>~100%</td></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Thrombocytopenia</strong></td><td>~100%</td></tr><tr><td><strong>Neurologic symptoms</strong></td><td>~65%</td></tr><tr><td><strong>Renal dysfunction</strong></td><td>~50% (usually mild)</td></tr><tr><td><strong>Fever</strong></td><td>~25%</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ Don't Wait for Full Pentad!</div><p>MAHA + thrombocytopenia alone is enough to suspect TTP. Waiting kills patients!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Neurologic Manifestations</div><div class="pathway">• Confusion (most common)<br>• Headache<br>• Focal deficits<br>• Seizures<br>• "Waxing and waning" symptoms</div></div><button class="btn" onclick="nextStage()">Pathophysiology →</button></div></div>`;
        } else {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">HUS Features</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Typical vs Atypical HUS</div><table class="comparison-table"><tr><th>Feature</th><th>Typical (STEC-HUS)</th><th>Atypical (aHUS)</th></tr><tr><td>Age</td><td>Children <5 years</td><td>Any age</td></tr><tr><td>Trigger</td><td>Diarrhea (bloody)</td><td>No diarrhea</td></tr><tr><td>Cause</td><td>Shiga toxin (E. coli)</td><td>Complement dysregulation</td></tr><tr><td>Prognosis</td><td>Good (supportive care)</td><td>Poor without treatment</td></tr><tr><td>Treatment</td><td>Supportive</td><td>Eculizumab</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 STEC-HUS = Most Common!</div><p>90% of pediatric HUS is STEC-HUS (Shiga toxin-producing E. coli). Usually follows bloody diarrhea by 5-10 days.</p></div><button class="btn" onclick="nextStage()">Pathophysiology →</button></div></div>`;
        }
    };

    window.render_pathophys = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">ADAMTS13 Deficiency</div></div><div class="scene-body"><div class="mechanism-box"><div class="mechanism-title">🧬 TTP Mechanism</div><div class="pathway"><strong>Normal:</strong><br>ADAMTS13 cleaves ultra-large vWF multimers<br>→ Prevents spontaneous platelet clumping<br><br><strong>TTP:</strong><br>ADAMTS13 deficient (<10% activity)<br>→ Ultra-large vWF multimers persist<br>→ Spontaneous platelet aggregation<br>→ Microthrombi in small vessels<br>→ Platelet consumption<br>→ RBC shearing → schistocytes<br>→ Organ ischemia</div></div><div class="boards-tip"><div class="boards-tip-title">📚 Types of TTP</div><table class="comparison-table"><tr><th>Type</th><th>Mechanism</th></tr><tr><td><strong>Acquired (immune)</strong></td><td>Autoantibody to ADAMTS13 (~95%)</td></tr><tr><td><strong>Congenital (Upshaw-Schulman)</strong></td><td>Inherited ADAMTS13 deficiency (~5%)</td></tr></table></div><button class="btn" onclick="nextStage()">Labs →</button></div></div>`;
        } else {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">Shiga Toxin Mechanism</div></div><div class="scene-body"><div class="mechanism-box"><div class="mechanism-title">🧬 STEC-HUS Pathophysiology</div><div class="pathway">E. coli O157:H7 (or other STEC)<br>→ Produces Shiga toxin (Stx)<br>→ Toxin absorbed from gut<br>→ Binds Gb3 receptors on endothelium<br>  (especially renal glomeruli!)<br>→ Endothelial damage<br>→ Platelet activation + microthrombi<br>→ RBC shearing → schistocytes<br>→ Glomerular injury → AKI</div></div><div class="alert-box"><div class="alert-title">⚠️ Why Kidneys Are Hit Hardest</div><p>Renal endothelium has highest concentration of Gb3 receptors → kidneys are primary target in HUS (unlike TTP where brain is more affected).</p></div><button class="btn" onclick="nextStage()">Labs →</button></div></div>`;
        }
    };

    window.render_labs = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">Laboratory Findings</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 TMA Lab Pattern</div><table class="comparison-table"><tr><th>Test</th><th>Finding</th><th>Reason</th></tr><tr><td><strong>Hemoglobin</strong></td><td>↓↓ Low</td><td>Hemolysis</td></tr><tr><td><strong>Platelets</strong></td><td>↓↓ Low</td><td>Consumption</td></tr><tr><td><strong>LDH</strong></td><td>↑↑↑ Very high</td><td>Hemolysis + ischemia</td></tr><tr><td><strong>Haptoglobin</strong></td><td>↓↓ Undetectable</td><td>Binds free Hgb</td></tr><tr><td><strong>Indirect bili</strong></td><td>↑ Elevated</td><td>Hemolysis</td></tr><tr><td><strong>Reticulocytes</strong></td><td>↑ Elevated</td><td>Marrow response</td></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>PT/PTT</strong></td><td>NORMAL</td><td>Not consumption coagulopathy</td></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Fibrinogen</strong></td><td>NORMAL</td><td>Not DIC!</td></tr><tr><td><strong>Smear</strong></td><td>Schistocytes</td><td>RBC fragmentation</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 TTP/HUS vs DIC</div><p>Normal PT/PTT and fibrinogen distinguishes TTP/HUS from DIC. In DIC, all are abnormal!</p></div>${state.mode === 'adult' ? `<div class="mechanism-box"><div class="mechanism-title">🧬 ADAMTS13</div><div class="pathway"><strong>Send ADAMTS13 activity BEFORE plasma!</strong><br>But don't wait for results to treat<br><br>• <10% activity = TTP<br>• >20% = Less likely TTP<br>• Inhibitor (antibody) = immune TTP</div></div>` : `<div class="mechanism-box"><div class="mechanism-title">🧬 Stool Studies</div><div class="pathway"><strong>Send stool for:</strong><br>• Shiga toxin PCR/EIA<br>• E. coli O157:H7 culture<br>  (requires sorbitol-MacConkey agar)<br><br>May be negative if tested late<br>(toxin may have cleared)</div></div>`}<button class="btn" onclick="nextStage()">Scoring →</button></div></div>`;
    };

    window.render_scoring = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">PLASMIC Score</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 PLASMIC Score for TTP</div><table class="comparison-table"><tr><th>Criterion</th><th>Points</th></tr><tr><td><strong>P</strong>latelet count <30K</td><td>1</td></tr><tr><td>Hemo<strong>L</strong>ysis (retic >2.5%, haptoglobin undetectable, or indirect bili >2)</td><td>1</td></tr><tr><td><strong>A</strong>ctive cancer (none)</td><td>1</td></tr><tr><td><strong>S</strong>tem cell or organ transplant (none)</td><td>1</td></tr><tr><td><strong>M</strong>CV <90 fL</td><td>1</td></tr><tr><td><strong>I</strong>NR <1.5</td><td>1</td></tr><tr><td><strong>C</strong>reatinine <2.0</td><td>1</td></tr></table><p style="margin-top:12px;"><strong>Score 0-4:</strong> Low probability (~0-4%)<br><strong>Score 5:</strong> Intermediate (~24%)<br><strong>Score 6-7:</strong> High probability (~72%)</p></div><div class="alert-box"><div class="alert-title">⚠️ Clinical Judgment Still Key!</div><p>PLASMIC helps but doesn't replace clinical judgment. High suspicion + MAHA + thrombocytopenia → treat empirically!</p></div><button class="btn" onclick="nextStage()">TTP vs HUS →</button></div></div>`;
        } else {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">Severity Assessment</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 HUS Severity Indicators</div><table class="comparison-table"><tr><th>Finding</th><th>Implication</th></tr><tr><td>Anuria >24 hours</td><td>Likely needs dialysis</td></tr><tr><td>Severe HTN</td><td>Fluid overload, may need dialysis</td></tr><tr><td>Seizures</td><td>CNS involvement (less common)</td></tr><tr><td>Hgb <6</td><td>Likely needs transfusion</td></tr><tr><td>Platelets <20K</td><td>Severe consumption</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Dialysis Indications</div><div class="pathway"><strong>~50% of STEC-HUS need dialysis:</strong><br>• Anuria/severe oliguria<br>• Volume overload<br>• Refractory hypertension<br>• Severe electrolyte abnormalities<br>• Uremic symptoms<br><br>Usually temporary (days to weeks)</div></div><button class="btn" onclick="nextStage()">Differentiation →</button></div></div>`;
        }
    };

    window.render_differentiation = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">TTP vs HUS vs DIC</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Differentiating TMAs</div><table class="comparison-table"><tr><th>Feature</th><th>TTP</th><th>HUS</th><th>DIC</th></tr><tr><td>Age</td><td>Adults</td><td>Children</td><td>Any</td></tr><tr><td>Trigger</td><td>None/autoimmune</td><td>Diarrhea</td><td>Sepsis, trauma</td></tr><tr><td>Neuro</td><td>+++</td><td>+</td><td>+</td></tr><tr><td>Renal</td><td>+ (mild)</td><td>+++ (severe)</td><td>++</td></tr><tr><td>PT/PTT</td><td>Normal</td><td>Normal</td><td>Prolonged</td></tr><tr><td>Fibrinogen</td><td>Normal</td><td>Normal</td><td>Low</td></tr><tr><td>ADAMTS13</td><td><10%</td><td>Normal</td><td>Normal</td></tr></table></div><div class="alert-box"><div class="alert-title">🚨 Key Distinguishing Points</div><p><strong>TTP:</strong> More neuro, less renal, ADAMTS13 <10%<br><strong>HUS:</strong> More renal, usually diarrheal prodrome<br><strong>DIC:</strong> Abnormal coags (PT/PTT, fibrinogen)</p></div><button class="btn" onclick="nextStage()">Treatment →</button></div></div>`;
    };

    window.render_treatment = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 10</div><div class="scene-title">Plasma Exchange</div></div><div class="scene-body"><div class="alert-box"><div class="alert-title">🚨 Plasma Exchange is Life-Saving!</div><p>Reduces mortality from >90% to <20%. Start IMMEDIATELY if TTP suspected. Don't wait for ADAMTS13!</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Treatment Protocol</div><table class="comparison-table"><tr><th>Therapy</th><th>Details</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Plasma exchange (PEX)</strong></td><td>Daily until platelets >150K × 2 days</td></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Corticosteroids</strong></td><td>Methylprednisolone 1g/day × 3, then prednisone</td></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Caplacizumab</strong></td><td>Anti-vWF nanobody (if available)</td></tr><tr><td><strong>Rituximab</strong></td><td>For refractory/relapsing cases</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 How PEX Works</div><div class="pathway"><strong>Removes:</strong><br>• Anti-ADAMTS13 antibodies<br>• Ultra-large vWF multimers<br><br><strong>Replaces:</strong><br>• Functional ADAMTS13<br><br>1-1.5 plasma volumes exchanged daily<br>Continue until sustained remission</div></div><button class="btn" onclick="nextStage()">Supportive Care →</button></div></div>`;
        } else {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 10</div><div class="scene-title">Supportive Care</div></div><div class="scene-body"><div class="alert-box"><div class="alert-title">🚨 STEC-HUS = Supportive Care Only!</div><p>No specific treatment for typical HUS. Antibiotics may WORSEN outcome by increasing toxin release. Focus on supportive care.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Management</div><table class="comparison-table"><tr><th>Intervention</th><th>Details</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>IV fluids</strong></td><td>Careful volume management</td></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Dialysis</strong></td><td>If indicated (~50% need it)</td></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Blood transfusion</strong></td><td>For severe anemia</td></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>BP control</strong></td><td>Antihypertensives if needed</td></tr><tr style="background:rgba(239,68,68,0.2);"><td><strong>NO antibiotics</strong></td><td>May worsen by ↑ toxin release!</td></tr><tr style="background:rgba(239,68,68,0.2);"><td><strong>NO anti-diarrheals</strong></td><td>May prolong toxin exposure</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Why No Antibiotics?</div><div class="pathway">Antibiotics kill E. coli<br>→ Bacterial lysis<br>→ Massive Shiga toxin release<br>→ May WORSEN HUS!<br><br>Some studies show 17× increased risk<br>of HUS with antibiotic use</div></div><button class="btn" onclick="nextStage()">Specific Therapies →</button></div></div>`;
        }
    };

    window.render_supportive = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 10</div><div class="scene-title">Caplacizumab & Rituximab</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Newer Therapies</div><table class="comparison-table"><tr><th>Agent</th><th>Mechanism</th><th>Use</th></tr><tr><td><strong>Caplacizumab</strong></td><td>Anti-vWF nanobody, blocks platelet binding</td><td>Added to PEX + steroids</td></tr><tr><td><strong>Rituximab</strong></td><td>Anti-CD20, depletes B cells making antibody</td><td>Refractory or relapsing TTP</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Caplacizumab</div><div class="pathway"><strong>Benefits:</strong><br>• Faster platelet recovery<br>• Fewer PEX sessions needed<br>• Lower recurrence rate<br><br><strong>Dosing:</strong><br>11 mg IV before first PEX<br>Then 11 mg SQ daily<br>Continue 30 days after PEX stops</div></div><div class="alert-box"><div class="alert-title">⚠️ Platelet Transfusion</div><p>Generally AVOID platelet transfusion in TTP! May "add fuel to fire" by providing more platelets to form microthrombi. Exception: life-threatening bleeding or procedures.</p></div><button class="btn" onclick="nextStage()">Prognosis →</button></div></div>`;
        } else {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 10</div><div class="scene-title">Atypical HUS</div></div><div class="scene-body"><div class="alert-box"><div class="alert-title">🚨 Atypical HUS is Different!</div><p>No diarrheal prodrome + HUS features = suspect aHUS. Requires complement-directed therapy!</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Atypical HUS Treatment</div><table class="comparison-table"><tr><th>Agent</th><th>Mechanism</th></tr><tr><td><strong>Eculizumab</strong></td><td>Anti-C5 antibody, blocks terminal complement</td></tr><tr><td><strong>Ravulizumab</strong></td><td>Long-acting anti-C5 (less frequent dosing)</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 aHUS Pathophysiology</div><div class="pathway"><strong>Complement dysregulation:</strong><br>Mutations in complement regulators<br>(Factor H, Factor I, MCP, etc.)<br>→ Uncontrolled complement activation<br>→ Endothelial damage<br>→ TMA<br><br><strong>aHUS can occur at any age</strong><br>May be triggered by infection, pregnancy,<br>or drugs but NO diarrhea</div></div><button class="btn" onclick="nextStage()">Prognosis →</button></div></div>`;
        }
    };

    window.render_prognosis = function() {
        if (state.mode === 'adult') {
            return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 10</div><div class="scene-title">Outcomes & Follow-up</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 TTP Prognosis</div><table class="comparison-table"><tr><th>Outcome</th><th>Rate</th></tr><tr><td>Survival with PEX</td><td>>80-90%</td></tr><tr><td>Relapse rate</td><td>~30-40% (lifetime)</td></tr><tr><td>Refractory to initial PEX</td><td>~10-20%</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Long-term Monitoring</div><div class="pathway"><strong>Follow-up required:</strong><br>• ADAMTS13 activity monitoring<br>• Watch for relapse (fatigue, petechiae)<br>• Educate patient on warning signs<br><br><strong>Relapse triggers:</strong><br>• Infection<br>• Surgery<br>• Pregnancy<br>• May occur years later</div></div><button class="btn" onclick="nextStage()">Debrief →</button></div></div>`;

        }

<script>
// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
    
    // Auto-inject hint examples into existing content
    window.rdxInit = function() {
        // Could add dynamic hint injection here based on difficulty
        console.log('ReasonDx Enhanced Features loaded for: Ttp Hus Expanded Dual Adventure');
    };
    
    // Initialize on load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.rdxInit);
    } else {
        window.rdxInit();
    }
})();
</script>
