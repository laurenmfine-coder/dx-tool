<head>

    <title>Small Bowel Obstruction | Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #92400e 0%, #f59e0b 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(146, 64, 14, 0.9); border-radius: 16px; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; background: #f59e0b; margin-left: 10px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #f59e0b, #fcd34d); border-radius: 3px; }
        .scene { background: linear-gradient(135deg, #92400e, #b45309); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .scene-header { background: rgba(245, 158, 11, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #fcd34d; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(245,158,11,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #f59e0b, #b45309); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #fcd34d; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','causes','clinicalfeatures','xray','ct','strangulation','partialcomplete','nonop','surgery','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">🔄 Small Bowel Obstruction<span class="badge">10 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 10</div><div class="scene-title">Crampy Pain and Vomiting</div></div><div class="scene-body"><div class="narrative"><p>A <span class="highlight">65-year-old man</span> with prior appendectomy presents with <span class="critical">crampy abdominal pain, distension, nausea, and no BM/flatus × 2 days</span>.</p><p style="margin-top:12px;"><strong>Vitals:</strong> HR 102, BP 128/78<br><strong>Exam:</strong> Distended, tympanic, high-pitched bowel sounds, mild diffuse tenderness, well-healed RLQ scar</p></div><div class="alert-box"><div class="alert-title">🚨 Classic SBO Presentation!</div><p>Prior surgery is #1 risk factor (adhesions). Triad: colicky pain, vomiting, distension. Key question: Is there strangulation?</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Cardinal Symptoms</div><div class="pathway"><strong>Classic SBO tetrad:</strong><br>1. Colicky/crampy abdominal pain<br>2. Nausea and vomiting<br>3. Abdominal distension<br>4. Obstipation (no stool/flatus)<br><br>Proximal SBO: More vomiting, less distension<br>Distal SBO: More distension, less vomiting</div></div><button class="btn" onclick="nextStage()">Causes →</button></div></div>`;
    };

    window.render_causes = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 10</div><div class="scene-title">Etiology</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Causes of SBO</div><table class="comparison-table"><tr><th>Cause</th><th>Frequency</th><th>Key Features</th></tr><tr><td><strong>Adhesions</strong></td><td>~60-75%</td><td>Prior surgery (MC cause in developed world)</td></tr><tr><td><strong>Hernia</strong></td><td>~15%</td><td>Inguinal, femoral, incisional, internal</td></tr><tr><td><strong>Malignancy</strong></td><td>~5-10%</td><td>Especially if no prior surgery</td></tr><tr><td><strong>Crohn's disease</strong></td><td>~5%</td><td>Strictures from chronic inflammation</td></tr><tr><td><strong>Intussusception</strong></td><td>Rare in adults</td><td>Often has lead point (tumor)</td></tr><tr><td><strong>Gallstone ileus</strong></td><td>Rare</td><td>Large stone in terminal ileum, air in biliary tree</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ Always Check for Hernias!</div><p>Examine ALL hernia sites: inguinal, femoral, umbilical, incisional. Femoral hernias high risk for strangulation!</p></div><button class="btn" onclick="nextStage()">Clinical Features →</button></div></div>`;
    };

    window.render_clinicalfeatures = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 10</div><div class="scene-title">History and Exam</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Clinical Features</div><table class="comparison-table"><tr><th>Feature</th><th>Details</th></tr><tr><td><strong>Pain pattern</strong></td><td>Colicky, crampy, comes in waves (peristalsis against obstruction)</td></tr><tr><td><strong>Vomiting</strong></td><td>Initially gastric → then bilious → then feculent (late)</td></tr><tr><td><strong>Distension</strong></td><td>Greater with distal obstruction</td></tr><tr><td><strong>Bowel sounds</strong></td><td>High-pitched, "tinkling" early; absent late</td></tr><tr><td><strong>Last BM/flatus</strong></td><td>Complete = none; partial = some gas/stool</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Proximal vs Distal SBO</div><div class="pathway"><strong>Proximal (jejunal):</strong><br>• Early, profuse vomiting<br>• Less distension<br>• Bilious vomit<br>• Rapid dehydration/electrolyte loss<br><br><strong>Distal (ileal):</strong><br>• More distension<br>• Less vomiting (later onset)<br>• Feculent vomiting (late)<br>• More air-fluid levels on XR</div></div><button class="btn" onclick="nextStage()">X-ray →</button></div></div>`;
    };

    window.render_xray = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 10</div><div class="scene-title">Abdominal X-ray</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 XR Findings</div><table class="comparison-table"><tr><th>Finding</th><th>Description</th></tr><tr><td><strong>Dilated small bowel</strong></td><td>>3 cm diameter</td></tr><tr><td><strong>Air-fluid levels</strong></td><td>Multiple, different heights ("step-ladder")</td></tr><tr><td><strong>Valvulae conniventes</strong></td><td>Lines cross entire bowel width (vs haustra in colon)</td></tr><tr><td><strong>Decompressed colon</strong></td><td>Little/no gas in colon</td></tr><tr><td><strong>"String of pearls"</strong></td><td>Small gas bubbles in fluid-filled loops</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Small Bowel vs Large Bowel</div><div class="pathway"><strong>Small bowel:</strong><br>• Central location<br>• Valvulae conniventes (cross entire lumen)<br>• >3 cm = dilated<br><br><strong>Large bowel:</strong><br>• Peripheral/frames abdomen<br>• Haustra (don't cross entire lumen)<br>• >6 cm = dilated (>9 cm cecum = risk perforation)</div></div><button class="btn" onclick="nextStage()">CT Scan →</button></div></div>`;
    };

    window.render_ct = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 10</div><div class="scene-title">CT Imaging</div></div><div class="scene-body"><div class="alert-box"><div class="alert-title">🚨 CT is Gold Standard for SBO!</div><p>Sensitivity 90-95%. Identifies transition point, cause, complications. Get CT with IV contrast (oral contrast not needed and delays).</p></div><div class="boards-tip"><div class="boards-tip-title">📚 CT Findings</div><table class="comparison-table"><tr><th>Finding</th><th>Significance</th></tr><tr><td><strong>Transition point</strong></td><td>Dilated proximal → decompressed distal bowel</td></tr><tr><td><strong>"Small bowel feces" sign</strong></td><td>Feculent material in small bowel (obstruction)</td></tr><tr><td><strong>Cause identification</strong></td><td>Adhesion, hernia, tumor, etc.</td></tr><tr><td><strong>Closed loop</strong></td><td>C or U-shaped dilated loop, two transition points</td></tr><tr><td><strong>Mesenteric haziness</strong></td><td>Edema, concerning for ischemia</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Findings Suggesting Strangulation</div><div class="pathway"><strong>CT signs of bowel ischemia:</strong><br>• Lack of bowel wall enhancement<br>• Mesenteric haziness/stranding<br>• Mesenteric vessel engorgement<br>• Bowel wall thickening<br>• Pneumatosis intestinalis<br>• Portal venous gas<br>• Ascites</div></div><button class="btn" onclick="nextStage()">Strangulation →</button></div></div>`;
    };

    window.render_strangulation = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 10</div><div class="scene-title">Strangulation</div></div><div class="scene-body"><div class="alert-box"><div class="alert-title">🚨 Strangulation = Surgical Emergency!</div><p>Compromised blood supply → bowel necrosis. Mortality increases dramatically with delay. Clinical signs may be subtle until late!</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Signs of Strangulation</div><table class="comparison-table"><tr><th>Clinical Signs</th><th>Lab/Imaging Signs</th></tr><tr><td>Constant (vs colicky) pain</td><td>Elevated lactate</td></tr><tr><td>Fever</td><td>Metabolic acidosis</td></tr><tr><td>Tachycardia out of proportion</td><td>Elevated WBC</td></tr><tr><td>Peritonitis (rebound, guarding)</td><td>CT: lack of enhancement, pneumatosis</td></tr><tr><td>Hemodynamic instability</td><td>CT: portal venous gas</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Closed-Loop Obstruction</div><div class="pathway"><strong>High risk for strangulation!</strong><br><br>Segment obstructed at BOTH ends<br>→ Bowel cannot decompress<br>→ Rapid distension<br>→ Venous outflow obstruction<br>→ Arterial inflow compromised<br>→ Ischemia → necrosis<br><br>Causes: Volvulus, incarcerated hernia,<br>adhesive band around loop</div></div><button class="btn" onclick="nextStage()">Partial vs Complete →</button></div></div>`;
    };

    window.render_partialcomplete = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 10</div><div class="scene-title">Partial vs Complete SBO</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Classification</div><table class="comparison-table"><tr><th>Type</th><th>Features</th><th>Management</th></tr><tr><td><strong>Partial (PSBO)</strong></td><td>Some gas/stool passing, gas in colon on XR</td><td>Usually non-operative trial</td></tr><tr><td><strong>Complete</strong></td><td>No flatus/stool, no colon gas</td><td>Higher likelihood of needing surgery</td></tr><tr><td><strong>High-grade</strong></td><td>Near-complete, minimal flow</td><td>Close monitoring, low threshold for OR</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Water-Soluble Contrast Challenge</div><div class="pathway"><strong>Gastrografin challenge:</strong><br>• Give oral water-soluble contrast<br>• XR at 8-24 hours<br><br><strong>Contrast in colon = partial/resolving</strong><br>→ Likely to resolve with non-op management<br><br><strong>No contrast in colon at 24h:</strong><br>→ Complete obstruction<br>→ Likely needs surgery<br><br>Also therapeutic (osmotic, stimulates motility)</div></div><button class="btn" onclick="nextStage()">Non-Operative Management →</button></div></div>`;
    };

    window.render_nonop = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 8 of 10</div><div class="scene-title">Non-Operative Management</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Conservative Treatment</div><table class="comparison-table"><tr><th>Intervention</th><th>Purpose</th></tr><tr><td><strong>NPO</strong></td><td>Bowel rest</td></tr><tr><td><strong>IV fluids</strong></td><td>Replace losses (can be massive!)</td></tr><tr><td><strong>NGT decompression</strong></td><td>Decompress stomach, prevent aspiration</td></tr><tr><td><strong>Foley catheter</strong></td><td>Monitor output/resuscitation</td></tr><tr><td><strong>Serial exams</strong></td><td>Detect deterioration</td></tr><tr><td><strong>Electrolyte correction</strong></td><td>Vomiting causes hypokalemia, metabolic alkalosis</td></tr></table></div><div class="alert-box"><div class="alert-title">⚠️ Time Limit for Non-Op Trial</div><p>Most successful resolution occurs within 24-48 hours. No improvement by 3-5 days → surgery. Don't prolong trial if patient deteriorating!</p></div><div class="mechanism-box"><div class="mechanism-title">🧬 Success Predictors</div><div class="pathway"><strong>Factors favoring non-op success:</strong><br>• Partial obstruction<br>• Adhesive disease (without hernia)<br>• No peritonitis<br>• Contrast in colon at 24h<br><br><strong>Factors favoring surgery:</strong><br>• Complete obstruction<br>• Strangulation signs<br>• Hernia<br>• No prior surgery (? tumor)</div></div><button class="btn" onclick="nextStage()">Surgery →</button></div></div>`;
    };

    window.render_surgery = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 9 of 10</div><div class="scene-title">Surgical Management</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 Indications for Surgery</div><table class="comparison-table"><tr><th>Indication</th></tr><tr><td>Strangulation/peritonitis</td></tr><tr><td>Complete obstruction not resolving</td></tr><tr><td>Incarcerated hernia</td></tr><tr><td>Closed-loop obstruction</td></tr><tr><td>No improvement with non-op trial (3-5 days)</td></tr><tr><td>Pneumatosis, portal venous gas</td></tr><tr><td>Suspected malignancy</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Surgical Options</div><div class="pathway"><strong>Adhesiolysis:</strong><br>• Lysis of adhesive bands<br>• Laparoscopic if stable, experienced surgeon<br>• Open if complicated, multiple prior surgeries<br><br><strong>Bowel resection:</strong><br>• If necrosis/non-viable bowel<br>• Primary anastomosis if healthy<br>• Ostomy if contaminated/unstable<br><br><strong>Hernia repair:</strong><br>• Reduce contents<br>• Assess viability<br>• Repair defect</div></div><button class="btn" onclick="nextStage()">Debrief →</button></div></div>`;
    };

    window.render_debrief = function() {
        return `<div class="scene"><div style="text-align:center;padding:40px;"><div style="font-size:4rem;margin-bottom:12px;">🔄</div><div style="font-size:1.8rem;font-weight:700;color:#4ade80;">SBO Mastery!</div></div><div class="scene-body"><div class="boards-tip"><div class="boards-tip-title">📚 High-Yield Summary</div><table class="comparison-table"><tr><th>Concept</th><th>Key Point</th></tr><tr><td>#1 Cause</td><td>Adhesions (prior surgery)</td></tr><tr><td>Imaging</td><td>CT with IV contrast (gold standard)</td></tr><tr><td>Strangulation signs</td><td>Constant pain, fever, peritonitis, ↑lactate</td></tr><tr><td>Initial management</td><td>NPO, IVF, NGT, serial exams</td></tr><tr><td>Contrast challenge</td><td>Contrast in colon = likely to resolve</td></tr><tr><td>Surgery indications</td><td>Strangulation, complete obstruction, hernia</td></tr></table></div><div class="tips"><div class="pearl"><div class="tip-header">✓ Pearls</div><ul style="margin-left:16px;"><li>Always examine hernia sites</li><li>CT identifies transition point + cause</li><li>Gastrografin is diagnostic AND therapeutic</li><li>Closed-loop = high strangulation risk</li></ul></div><div class="pitfall"><div class="tip-header">✗ Pitfalls</div><ul style="margin-left:16px;"><li>Missing incarcerated hernia</li><li>Prolonged non-op trial with complete SBO</li><li>Delaying surgery with strangulation</li><li>Missing malignancy (no prior surgery)</li></ul></div></div><button class="btn" onclick="state.stage=0;render()">🔄 Restart Case</button></div></div>`;
    };

    render();
    </script>

            <a href="../CoachDx/sbar-trainer.html" style="display: block; color: #2563eb; font-size: 14px;">→ SBAR Communication</a>
        </div>
    </div>
</div>
<!-- END CROSS-PLATFORM LINKS -->
<div class="rdx-refs-panel" id="rdxRefsPanel">
    <div class="rdx-refs-title">📚 References & Evidence-Based Resources</div>
    <div class="rdx-refs-links"><a href="https://gi.org/guidelines/" target="_blank" class="text-blue-600 hover:underline">ACG Guidelines</a> | <a href="https://www.ncbi.nlm.nih.gov/books/NBK470300/" target="_blank" class="text-blue-600 hover:underline">StatPearls: GI Bleeding</a></div>
</div>

<div class="rdx-debrief-overlay" id="rdxDebriefOverlay" style="display:none;">
    <div class="rdx-debrief-panel" id="rdxDebriefContent"></div>
</div>

<script>
// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
    
    // Auto-inject hint examples into existing content
    window.rdxInit = function() {
        // Could add dynamic hint injection here based on difficulty
        console.log('ReasonDx Enhanced Features loaded for: Sbo Expanded Adventure');
    };
    
    // Initialize on load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.rdxInit);
    } else {
        window.rdxInit();
    }
})();
</script>
<!-- ==================== END REASONDX ENHANCED FEATURES ==================== -->

</body>
</html>
