<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Hot Skin | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#F97316;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#EA580C,#F97316);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(249,115,22,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(249,115,22,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(249,115,22,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#FDBA74;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🔥 Red Hot Skin</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'52M',wt:'95kg',hx:'Red, swollen left leg x3 days, started after minor cut, no fever',exam:'Erythema, warmth, edema left lower leg, no fluctuance, intact sensation',vitals:{HR:'82',BP:'138/88',Temp:'99.8°F',SpO2:'98%'},labs:{WBC:'11.2k',Hx:'Type 2 DM, obesity'}},int:{age:'35F',wt:'72kg',hx:'Rapidly spreading arm erythema, high fever, severe pain, recent cat bite',exam:'Rapidly advancing erythema, lymphangitic streaking, axillary LAD, bullae forming',vitals:{HR:'118',BP:'102/62',Temp:'103.2°F',SpO2:'96%'},labs:{WBC:'18k',CRP:'24',Hx:'Cat bite 2 days ago'}},adv:{age:'62M',wt:'88kg',hx:'Diabetic with foot ulcer, now dusky discoloration, crepitus, shock',exam:'Dusky foot with crepitus, foul discharge, pain out of proportion',vitals:{HR:'128',BP:'78/48',Temp:'101.8°F',SpO2:'92%'},labs:{WBC:'22k',Lactate:'5.8',Glucose:'425',Hx:'DM with neuropathy'}}};
const Q=[
{t:'Common Pathogens',q:'Most common organisms causing non-purulent cellulitis?',h:'Gram-positive coverage',o:[{id:'a',txt:'Beta-hemolytic streptococci (Group A strep) and Staphylococcus aureus',c:1,p:100},{id:'b',txt:'Gram-negative rods',c:0,p:20},{id:'c',txt:'Anaerobes only',c:0,p:10}],fb:{1:'<b>Correct!</b> Non-purulent cellulitis: Beta-hemolytic strep (GAS most common), S. aureus. Purulent cellulitis: More likely MRSA. Animal bites: Pasteurella. Water exposure: Vibrio, Aeromonas.',0:'<b>Pathogens:</b> Strep and staph most common. Consider MRSA if purulent.'}},
{t:'Treatment Selection',q:'First-line outpatient antibiotic for uncomplicated non-purulent cellulitis?',h:'IDSA guidelines',o:[{id:'a',txt:'Cephalexin or dicloxacillin (cover strep and MSSA)',c:1,p:100},{id:'b',txt:'Vancomycin',c:0,p:20},{id:'c',txt:'Fluoroquinolone',c:0,p:20}],fb:{1:'<b>Correct!</b> Non-purulent: Cephalexin 500mg QID or dicloxacillin. If purulent/abscess: Add MRSA coverage (TMP-SMX, doxycycline). Duration typically 5-7 days (can extend if slow response).',0:'<b>Treatment:</b> Cephalexin for non-purulent. Add MRSA coverage if purulent.'}},
{t:'MRSA Considerations',q:'When should MRSA coverage be added to cellulitis treatment?',h:'Risk stratification',o:[{id:'a',txt:'Purulent cellulitis, abscess present, MRSA risk factors, penetrating trauma, IVDU',c:1,p:100},{id:'b',txt:'All cellulitis',c:0,p:30},{id:'c',txt:'Never needed',c:0,p:10}],fb:{1:'<b>Correct!</b> Add MRSA coverage (TMP-SMX, doxycycline, clindamycin) for: Purulent infection, abscess, prior MRSA, IVDU, penetrating trauma, treatment failure.',0:'<b>MRSA:</b> Add if purulent, abscess, or risk factors.'}},
{t:'Erysipelas vs Cellulitis',q:'How does erysipelas differ from cellulitis?',h:'Depth of infection',o:[{id:'a',txt:'Erysipelas: Superficial dermis, sharply demarcated, raised borders; Cellulitis: Deeper dermis/subcutaneous, indistinct borders',c:1,p:100},{id:'b',txt:'Same entity',c:0,p:30},{id:'c',txt:'Different organisms',c:0,p:20}],fb:{1:'<b>Correct!</b> Erysipelas: Upper dermis, sharply demarcated raised borders, often face/legs. Almost always GAS. Cellulitis: Deeper, borders not well-defined. Both treated similarly.',0:'<b>Erysipelas:</b> Superficial, sharp borders. Cellulitis: Deeper, indistinct borders.'}},
{t:'Necrotizing Fasciitis',q:'Red flags suggesting necrotizing fasciitis rather than simple cellulitis?',h:'Surgical emergency',o:[{id:'a',txt:'Pain out of proportion, rapid spread, crepitus, bullae, dusky discoloration, systemic toxicity',c:1,p:100},{id:'b',txt:'Mild erythema',c:0,p:10},{id:'c',txt:'Slow progression',c:0,p:10}],fb:{1:'<b>Correct!</b> NF red flags: Pain out of proportion to exam, rapid progression, crepitus (gas), hemorrhagic bullae, dusky/necrotic skin, systemic toxicity. LRINEC score can help. Surgical emergency!',0:'<b>NF red flags:</b> Pain out of proportion, crepitus, bullae, dusky skin, rapid spread.'}},
{t:'Bite Wounds',q:'Antibiotic of choice for animal bite wounds (cat, dog)?',h:'Polymicrobial coverage',o:[{id:'a',txt:'Amoxicillin-clavulanate (covers Pasteurella, strep, staph, anaerobes)',c:1,p:100},{id:'b',txt:'Cephalexin alone',c:0,p:30},{id:'c',txt:'Metronidazole alone',c:0,p:20}],fb:{1:'<b>Correct!</b> Animal bites: Amoxicillin-clavulanate (covers Pasteurella multocida, oral flora, anaerobes). Cat bites higher infection risk (deep puncture). Prophylaxis recommended for most bites.',0:'<b>Bite wounds:</b> Amoxicillin-clavulanate. Covers Pasteurella and anaerobes.'}},
{t:'Admission Criteria',q:'Indications for hospitalization in cellulitis?',h:'Severity assessment',o:[{id:'a',txt:'Systemic toxicity, failed outpatient therapy, immunocompromised, rapid spread, concern for deep infection',c:1,p:100},{id:'b',txt:'Any cellulitis',c:0,p:10},{id:'c',txt:'Only if abscess present',c:0,p:20}],fb:{1:'<b>Correct!</b> Admit for: Sepsis/systemic toxicity, outpatient failure, immunocompromise, facial cellulitis, rapid spread, NF concern, unable to take PO, need for IV antibiotics, debridement needed.',0:'<b>Admit:</b> Systemic toxicity, failed outpatient Rx, immunocompromise, rapid spread.'}},
{t:'Diabetes Considerations',q:'Special considerations for cellulitis in diabetic patients?',h:'Higher risk population',o:[{id:'a',txt:'Higher risk of MRSA and gram-negatives, deeper infection, may have minimal symptoms due to neuropathy',c:1,p:100},{id:'b',txt:'Same as non-diabetics',c:0,p:30},{id:'c',txt:'Only treat with topicals',c:0,p:10}],fb:{1:'<b>Correct!</b> Diabetics: Higher MRSA risk, polymicrobial infections (add gram-negative coverage), osteomyelitis risk, may have minimal pain (neuropathy), poor wound healing. Low threshold for imaging.',0:'<b>Diabetic:</b> Broader coverage, watch for osteo, may lack pain due to neuropathy.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🔥 Red Hot Skin</h1><p style="color:var(--muted);margin-bottom:32px">Cellulitis: Pathogens, treatment, MRSA, NF red flags, bites, diabetic foot</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🔥 Skin Infection</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Cellulitis Pearls</div><div class="pearl-item"><b>Pathogens:</b> Strep and staph. MRSA if purulent</div><div class="pearl-item"><b>Non-purulent:</b> Cephalexin or dicloxacillin</div><div class="pearl-item"><b>MRSA:</b> Add TMP-SMX or doxy if purulent/abscess</div><div class="pearl-item"><b>Erysipelas:</b> Superficial, sharp borders (GAS)</div><div class="pearl-item"><b>NF red flags:</b> Pain out of proportion, crepitus, bullae</div><div class="pearl-item"><b>Bites:</b> Amoxicillin-clavulanate (Pasteurella)</div><div class="pearl-item"><b>Diabetic:</b> Broader coverage, watch for osteo</div></div><div class="cross-link"><a href="nec-fasc-adventure.html">Related: Nec Fasc</a> | <a href="dfi-adventure.html">DFI</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
