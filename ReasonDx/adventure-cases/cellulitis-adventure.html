<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Red Leg | ReasonDx Adventure</title>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --border: #334155; --text: #F1F5F9; --muted: #94A3B8; --accent: #F97316; --success: #10B981; --warning: #F59E0B; --danger: #DC2626; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
        .header { background: linear-gradient(135deg, #EA580C 0%, #F97316 100%); padding: 12px 20px; position: sticky; top: 0; z-index: 100; }
        .header-row { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .header-title { font-size: 1.1rem; font-weight: 600; color: white; }
        .stat { background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 8px; }
        .stat-value { font-size: 1.1rem; font-weight: 700; font-family: monospace; color: white; }
        .stat-label { font-size: 0.6rem; opacity: 0.8; text-transform: uppercase; color: white; }
        .main { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; }
        .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .card-phase { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
        .card-title { font-size: 1.5rem; font-weight: 700; }
        .card-body { padding: 24px; }
        .narrative { background: linear-gradient(135deg, rgba(249,115,22,0.1), rgba(234,88,12,0.1)); border-left: 4px solid var(--accent); padding: 20px 24px; border-radius: 0 12px 12px 0; margin-bottom: 24px; line-height: 1.8; }
        .narrative .hl { background: rgba(249,115,22,0.3); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .setup-screen { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; }
        .setup-screen h1 { font-size: 2rem; margin-bottom: 8px; }
        .setup-screen .subtitle { color: var(--muted); margin-bottom: 32px; }
        .start-btn { background: var(--accent); color: white; border: none; padding: 16px 48px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .question-section { margin-bottom: 32px; }
        .question-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .question-number { background: var(--accent); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .question-text { font-size: 1.1rem; font-weight: 600; }
        .radio-options { display: flex; flex-direction: column; gap: 10px; }
        .radio-option { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .radio-option:hover { border-color: var(--accent); }
        .radio-option.selected { border-color: var(--accent); background: rgba(249,115,22,0.15); }
        .radio-option.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .radio-option.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .radio-circle { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; }
        .radio-option.selected .radio-circle { border-color: var(--accent); background: radial-gradient(circle, var(--accent) 40%, transparent 40%); }
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .checkbox-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .checkbox-item:hover { border-color: var(--accent); }
        .checkbox-item.selected { border-color: var(--accent); background: rgba(249,115,22,0.15); }
        .checkbox-item.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .checkbox-item.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .checkbox-box { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .checkbox-item.selected .checkbox-box { background: var(--accent); border-color: var(--accent); }
        .checkbox-item.selected .checkbox-box::after { content: '✓'; color: white; font-weight: bold; }
        .feedback { padding: 20px; border-radius: 12px; margin: 20px 0; }
        .feedback.excellent { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); }
        .feedback.acceptable { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); }
        .feedback-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .feedback-icon { font-size: 1.5rem; }
        .feedback-title { font-weight: 700; }
        .feedback-text { color: var(--muted); line-height: 1.7; }
        .feedback-text strong { color: var(--text); }
        .alert { padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; }
        .alert.danger { background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.3); }
        .alert.info { background: rgba(249,115,22,0.15); border: 1px solid rgba(249,115,22,0.3); }
        .alert-icon { font-size: 1.5rem; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: 600; margin-bottom: 4px; }
        .alert-desc { font-size: 0.9rem; color: var(--muted); }
        .btn { padding: 14px 28px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-row { display: flex; gap: 12px; margin-top: 24px; }
        .outcome { text-align: center; padding: 40px 20px; }
        .outcome-icon { font-size: 4rem; margin-bottom: 16px; }
        .outcome-title { font-size: 2rem; font-weight: 700; color: var(--success); margin-bottom: 8px; }
        .outcome-desc { color: var(--muted); max-width: 600px; margin: 0 auto 24px; }
        .score-summary { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 24px; margin: 24px auto; max-width: 500px; }
        .score-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .score-row:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <header class="header"><div class="header-row"><div class="header-title">🦵 The Red Leg</div><div class="stat"><div class="stat-value" id="scoreDisplay">0</div><div class="stat-label">Points</div></div></div></header>
    <main class="main"><div id="stageContainer"></div></main>
    <script>
    const state = { stage:'setup', score:0 };
    
    function addScore(pts) { state.score += pts; document.getElementById('scoreDisplay').textContent = state.score; }

    const necrotizingFeatures = [
        { id: 'pain', text: 'Pain out of proportion to exam', isNec: true },
        { id: 'bullae', text: 'Hemorrhagic bullae', isNec: true },
        { id: 'crep', text: 'Crepitus on palpation', isNec: true },
        { id: 'rapid', text: 'Rapid progression despite antibiotics', isNec: true },
        { id: 'skin_necrosis', text: 'Skin necrosis/dusky discoloration', isNec: true },
        { id: 'systemic', text: 'Severe systemic toxicity/shock', isNec: true },
        { id: 'mild_ery', text: 'Mild erythema with clear borders', isNec: false },
        { id: 'no_fever', text: 'Afebrile with stable vitals', isNec: false }
    ];

    const stages = {
        setup: { render: () => `
            <div class="setup-screen">
                <h1>🦵 The Red Leg</h1>
                <p class="subtitle">Cellulitis vs necrotizing fasciitis</p>
                <button class="start-btn" onclick="goTo('presentation')">Begin Case →</button>
            </div>`
        },
        presentation: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Emergency Department</div><div class="card-title">📋 Leg Pain and Swelling</div></div>
                <div class="card-body">
                    <div class="narrative">A <span class="hl">54-year-old male</span> with <span class="hl">diabetes</span> and <span class="hl">obesity</span> presents with <span class="hl">right lower leg pain and redness</span> for 2 days. He scraped his shin while gardening 4 days ago.<br><br>On exam: <span class="hl">erythema from ankle to mid-calf</span> with <span class="hl">warmth and tenderness</span>. The borders are <span class="hl">indistinct but not rapidly spreading</span>. <span class="hl">No bullae, crepitus, or necrosis</span>.<br><br>Vitals: Temp 38.4°C, HR 92, BP 134/82. Labs: WBC 14.2K.</div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="goTo('diagnosis')">Make Diagnosis →</button></div>
                </div>
            </div>`
        },
        diagnosis: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Diagnosis</div><div class="card-title">🎯 Identify the Condition</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">1</div><div class="question-text">What is the most likely diagnosis?</div></div>
                        <div class="radio-options" id="dxOpts">
                            <div class="radio-option" data-id="cellulitis" onclick="selectDx('cellulitis')"><div class="radio-circle"></div><div><strong>Non-purulent cellulitis</strong><br><small style="color:var(--muted)">Diffuse skin infection without abscess</small></div></div>
                            <div class="radio-option" data-id="abscess" onclick="selectDx('abscess')"><div class="radio-circle"></div><div><strong>Skin abscess</strong><br><small style="color:var(--muted)">Localized collection requiring drainage</small></div></div>
                            <div class="radio-option" data-id="nec_fasc" onclick="selectDx('nec_fasc')"><div class="radio-circle"></div><div><strong>Necrotizing fasciitis</strong><br><small style="color:var(--muted)">Surgical emergency</small></div></div>
                            <div class="radio-option" data-id="dvt" onclick="selectDx('dvt')"><div class="radio-circle"></div><div><strong>Deep vein thrombosis</strong><br><small style="color:var(--muted)">Venous clot</small></div></div>
                        </div>
                    </div>
                    <div id="dxFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="dxSubmit" onclick="submitDx()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        organisms: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Microbiology</div><div class="card-title">🦠 Causative Organisms</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">2</div><div class="question-text">What are the most common organisms in non-purulent cellulitis?</div></div>
                        <div class="radio-options" id="orgOpts">
                            <div class="radio-option" data-id="staph_strep" onclick="selectOrg('staph_strep')"><div class="radio-circle"></div><div><strong>Beta-hemolytic strep (GAS) and S. aureus</strong><br><small style="color:var(--muted)">Most common pathogens</small></div></div>
                            <div class="radio-option" data-id="mrsa" onclick="selectOrg('mrsa')"><div class="radio-circle"></div><div><strong>MRSA primarily</strong><br><small style="color:var(--muted)">Methicillin-resistant staph</small></div></div>
                            <div class="radio-option" data-id="pseudomonas" onclick="selectOrg('pseudomonas')"><div class="radio-circle"></div><div><strong>Pseudomonas</strong><br><small style="color:var(--muted)">Gram-negative rod</small></div></div>
                            <div class="radio-option" data-id="anaerobes" onclick="selectOrg('anaerobes')"><div class="radio-circle"></div><div><strong>Anaerobes</strong><br><small style="color:var(--muted)">Anaerobic bacteria</small></div></div>
                        </div>
                    </div>
                    <div id="orgFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="orgSubmit" onclick="submitOrg()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        treatment: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Treatment</div><div class="card-title">💊 Antibiotic Selection</div></div>
                <div class="card-body">
                    <div class="alert info"><span class="alert-icon">📋</span><div class="alert-content"><div class="alert-title">IDSA Guidelines</div><div class="alert-desc">Non-purulent cellulitis: Cover beta-hemolytic strep and MSSA. MRSA coverage NOT routinely needed unless risk factors or treatment failure.</div></div></div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">3</div><div class="question-text">What is the appropriate empiric antibiotic for non-purulent cellulitis (no abscess)?</div></div>
                        <div class="radio-options" id="abxOpts">
                            <div class="radio-option" data-id="cephalexin" onclick="selectAbx('cephalexin')"><div class="radio-circle"></div><div><strong>Cephalexin (Keflex)</strong><br><small style="color:var(--muted)">First-gen cephalosporin, covers strep and MSSA</small></div></div>
                            <div class="radio-option" data-id="tmp_smx" onclick="selectAbx('tmp_smx')"><div class="radio-circle"></div><div><strong>TMP-SMX (Bactrim) alone</strong><br><small style="color:var(--muted)">MRSA coverage</small></div></div>
                            <div class="radio-option" data-id="clinda" onclick="selectAbx('clinda')"><div class="radio-circle"></div><div><strong>Clindamycin</strong><br><small style="color:var(--muted)">Covers staph and strep</small></div></div>
                            <div class="radio-option" data-id="vanco" onclick="selectAbx('vanco')"><div class="radio-circle"></div><div><strong>IV Vancomycin</strong><br><small style="color:var(--muted)">Broad gram-positive coverage</small></div></div>
                        </div>
                    </div>
                    <div id="abxFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="abxSubmit" onclick="submitAbx()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        mrsa: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Special Considerations</div><div class="card-title">🦠 When to Cover MRSA</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">4</div><div class="question-text">In which situations should you add MRSA coverage for cellulitis?</div></div>
                        <div class="checkbox-grid" id="mrsaOpts">
                            <div class="checkbox-item" data-id="purulent" data-correct="true" onclick="toggleMRSA('purulent')"><div class="checkbox-box"></div><span>Purulent drainage/abscess</span></div>
                            <div class="checkbox-item" data-id="ivdu" data-correct="true" onclick="toggleMRSA('ivdu')"><div class="checkbox-box"></div><span>IV drug use</span></div>
                            <div class="checkbox-item" data-id="failure" data-correct="true" onclick="toggleMRSA('failure')"><div class="checkbox-box"></div><span>Failed initial beta-lactam therapy</span></div>
                            <div class="checkbox-item" data-id="prior_mrsa" data-correct="true" onclick="toggleMRSA('prior_mrsa')"><div class="checkbox-box"></div><span>Prior MRSA infection</span></div>
                            <div class="checkbox-item" data-id="all" data-correct="false" onclick="toggleMRSA('all')"><div class="checkbox-box"></div><span>All cellulitis cases</span></div>
                            <div class="checkbox-item" data-id="diabetic" data-correct="false" onclick="toggleMRSA('diabetic')"><div class="checkbox-box"></div><span>Diabetes alone</span></div>
                        </div>
                    </div>
                    <div id="mrsaFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="submitMRSA()">Submit →</button></div>
                </div>
            </div>`
        },
        necrotizing: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Red Flags</div><div class="card-title">🚨 Necrotizing Fasciitis</div></div>
                <div class="card-body">
                    <div class="alert danger"><span class="alert-icon">⚠️</span><div class="alert-content"><div class="alert-title">Surgical Emergency</div><div class="alert-desc">Necrotizing fasciitis requires emergent surgical debridement. Mortality 20-40% even with treatment.</div></div></div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">5</div><div class="question-text">Which features suggest necrotizing fasciitis over simple cellulitis?</div></div>
                        <div class="checkbox-grid" id="necOpts">${necrotizingFeatures.map(f=>`<div class="checkbox-item" data-id="${f.id}" data-nec="${f.isNec}" onclick="toggleNec('${f.id}')"><div class="checkbox-box"></div><span>${f.text}</span></div>`).join('')}</div>
                    </div>
                    <div id="necFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="submitNec()">Submit →</button></div>
                </div>
            </div>`
        },
        outcome: { render: () => `
            <div class="card"><div class="card-body">
                <div class="outcome">
                    <div class="outcome-icon">🎉</div>
                    <div class="outcome-title">Patient Recovered!</div>
                    <div class="outcome-desc">Patient was started on IV cefazolin and transitioned to oral cephalexin after 48 hours of improvement. He completed a 5-day course with full resolution. He was counseled on skin hygiene and early recognition of recurrence.</div>
                </div>
                <div class="score-summary">
                    <h3 style="margin-bottom:16px">Performance</h3>
                    <div class="score-row"><span>Diagnosis</span><span>${state.dxScore||0}/100</span></div>
                    <div class="score-row"><span>Organisms</span><span>${state.orgScore||0}/100</span></div>
                    <div class="score-row"><span>Antibiotic Selection</span><span>${state.abxScore||0}/100</span></div>
                    <div class="score-row"><span>MRSA Indications</span><span>${state.mrsaScore||0}/100</span></div>
                    <div class="score-row"><span>Necrotizing Signs</span><span>${state.necScore||0}/100</span></div>
                    <div class="score-row" style="border-top:2px solid var(--border);padding-top:12px"><strong>Total</strong><strong>${state.score}</strong></div>
                </div>
                <div class="feedback excellent"><div class="feedback-header"><span class="feedback-icon">💡</span><span class="feedback-title">Skin Infection Pearls</span></div><div class="feedback-text">
                    • <strong>Non-purulent cellulitis:</strong> Beta-hemolytic strep (#1) and MSSA. Treat with cephalexin, dicloxacillin, or cefazolin<br>
                    • <strong>Purulent (abscess):</strong> S. aureus (often MRSA). I&D is primary treatment; add TMP-SMX or doxycycline<br>
                    • <strong>MRSA coverage:</strong> Only for purulent infections, IVDU, prior MRSA, or treatment failure<br>
                    • <strong>Necrotizing fasciitis red flags:</strong> Pain out of proportion, crepitus, bullae, necrosis, rapid spread, shock<br>
                    • <strong>Nec fasc treatment:</strong> Emergent surgical debridement + broad-spectrum abx (vanc + pip-tazo + clindamycin)<br>
                    • <strong>Duration:</strong> 5 days typically sufficient for uncomplicated cellulitis
                </div></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="location.reload()">Play Again</button></div>
            </div></div>`
        }
    };

    let selectedDx = null;
    function selectDx(id) { selectedDx = id; document.querySelectorAll('#dxOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('dxSubmit').disabled = false; }
    function submitDx() {
        document.querySelectorAll('#dxOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'cellulitis') o.classList.add('correct');
            else if (o.dataset.id === selectedDx) o.classList.add('incorrect');
        });
        state.dxScore = selectedDx === 'cellulitis' ? 100 : 40;
        addScore(selectedDx === 'cellulitis' ? 40 : 15);
        document.getElementById('dxFeedback').innerHTML = `<div class="feedback ${selectedDx==='cellulitis'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedDx==='cellulitis'?'✅':'📚'}</span><span class="feedback-title">${selectedDx==='cellulitis'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>Non-purulent cellulitis:</strong> Diffuse erythema, warmth, tenderness WITHOUT abscess or purulent drainage. No crepitus, bullae, or necrosis rules out necrotizing infection. Entry point (scrape) is typical.</div></div>`;
        document.getElementById('dxSubmit').textContent = 'Continue →';
        document.getElementById('dxSubmit').onclick = () => goTo('organisms');
    }

    let selectedOrg = null;
    function selectOrg(id) { selectedOrg = id; document.querySelectorAll('#orgOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('orgSubmit').disabled = false; }
    function submitOrg() {
        document.querySelectorAll('#orgOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'staph_strep') o.classList.add('correct');
            else if (o.dataset.id === selectedOrg) o.classList.add('incorrect');
        });
        state.orgScore = selectedOrg === 'staph_strep' ? 100 : 40;
        addScore(selectedOrg === 'staph_strep' ? 30 : 10);
        document.getElementById('orgFeedback').innerHTML = `<div class="feedback ${selectedOrg==='staph_strep'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedOrg==='staph_strep'?'✅':'📚'}</span><span class="feedback-title">${selectedOrg==='staph_strep'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>Non-purulent cellulitis organisms:</strong> Beta-hemolytic streptococcus (especially Group A strep) is #1, followed by MSSA. MRSA is uncommon in non-purulent cellulitis without risk factors.</div></div>`;
        document.getElementById('orgSubmit').textContent = 'Continue →';
        document.getElementById('orgSubmit').onclick = () => goTo('treatment');
    }

    let selectedAbx = null;
    function selectAbx(id) { selectedAbx = id; document.querySelectorAll('#abxOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('abxSubmit').disabled = false; }
    function submitAbx() {
        document.querySelectorAll('#abxOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'cephalexin') o.classList.add('correct');
            else if (o.dataset.id === selectedAbx) o.classList.add('incorrect');
        });
        state.abxScore = selectedAbx === 'cephalexin' ? 100 : (selectedAbx === 'clinda' ? 70 : 40);
        addScore(selectedAbx === 'cephalexin' ? 40 : (selectedAbx === 'clinda' ? 25 : 10));
        document.getElementById('abxFeedback').innerHTML = `<div class="feedback ${selectedAbx==='cephalexin'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedAbx==='cephalexin'?'✅':'📚'}</span><span class="feedback-title">${selectedAbx==='cephalexin'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>Non-purulent cellulitis:</strong> Cephalexin, dicloxacillin, or cefazolin (IV). TMP-SMX alone has poor strep coverage. Vancomycin is overkill for uncomplicated cellulitis. Clindamycin is an alternative but has rising resistance.</div></div>`;
        document.getElementById('abxSubmit').textContent = 'Continue →';
        document.getElementById('abxSubmit').onclick = () => goTo('mrsa');
    }

    let selectedMRSA = new Set();
    function toggleMRSA(id) {
        const el = document.querySelector(`#mrsaOpts .checkbox-item[data-id="${id}"]`);
        if(selectedMRSA.has(id)) { selectedMRSA.delete(id); el.classList.remove('selected'); }
        else { selectedMRSA.add(id); el.classList.add('selected'); }
    }
    function submitMRSA() {
        let correct = 0;
        const items = [{id:'purulent',c:true},{id:'ivdu',c:true},{id:'failure',c:true},{id:'prior_mrsa',c:true},{id:'all',c:false},{id:'diabetic',c:false}];
        items.forEach(i => {
            const el = document.querySelector(`#mrsaOpts .checkbox-item[data-id="${i.id}"]`);
            const sel = selectedMRSA.has(i.id);
            if (i.c && sel) { el.classList.add('correct'); correct++; }
            else if (!i.c && sel) { el.classList.add('incorrect'); }
        });
        state.mrsaScore = Math.round(correct / 4 * 100);
        addScore(Math.round(state.mrsaScore / 2.5));
        document.getElementById('mrsaFeedback').innerHTML = `<div class="feedback ${state.mrsaScore>=75?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${state.mrsaScore>=75?'✅':'📚'}</span><span class="feedback-title">MRSA Coverage</span></div><div class="feedback-text"><strong>Add MRSA coverage for:</strong> Purulent infection/abscess, IVDU, prior MRSA, treatment failure<br><strong>NOT needed for:</strong> All cases or diabetes alone (unless other risk factors)</div></div>`;
        document.querySelector('#mrsaFeedback').closest('.card-body').querySelector('.btn-row').innerHTML = `<button class="btn btn-primary" onclick="goTo('necrotizing')">Learn Red Flags →</button>`;
    }

    let selectedNec = new Set();
    function toggleNec(id) {
        const el = document.querySelector(`#necOpts .checkbox-item[data-id="${id}"]`);
        if(selectedNec.has(id)) { selectedNec.delete(id); el.classList.remove('selected'); }
        else { selectedNec.add(id); el.classList.add('selected'); }
    }
    function submitNec() {
        let correct = 0;
        necrotizingFeatures.forEach(f => {
            const el = document.querySelector(`#necOpts .checkbox-item[data-id="${f.id}"]`);
            const sel = selectedNec.has(f.id);
            if (f.isNec && sel) { el.classList.add('correct'); correct++; }
            else if (!f.isNec && sel) { el.classList.add('incorrect'); }
        });
        state.necScore = Math.round(correct / 6 * 100);
        addScore(Math.round(state.necScore / 2.5));
        document.getElementById('necFeedback').innerHTML = `<div class="feedback ${state.necScore>=75?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${state.necScore>=75?'✅':'📚'}</span><span class="feedback-title">Necrotizing Fasciitis Signs</span></div><div class="feedback-text"><strong>Red flags:</strong> Pain out of proportion, hemorrhagic bullae, crepitus, rapid spread, skin necrosis, systemic toxicity/shock<br><strong>Management:</strong> Emergent surgery + broad-spectrum antibiotics (vanc + pip-tazo + clindamycin for toxin suppression)</div></div>`;
        document.querySelector('#necFeedback').closest('.card-body').querySelector('.btn-row').innerHTML = `<button class="btn btn-primary" onclick="goTo('outcome')">Complete Case →</button>`;
    }

    function goTo(id) { state.stage = id; document.getElementById('stageContainer').innerHTML = stages[id].render(); window.scrollTo(0,0); }
    document.addEventListener('DOMContentLoaded', () => goTo('setup'));
    </script>
</body>
</html>
