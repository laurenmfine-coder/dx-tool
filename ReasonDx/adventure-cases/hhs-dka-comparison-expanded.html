<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetic Emergencies | HHS vs DKA Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #7c2d12 0%, #ea580c 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(124, 45, 18, 0.9); border-radius: 16px; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; background: #ea580c; margin-left: 10px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ea580c, #fdba74); border-radius: 3px; }
        .scene { background: linear-gradient(135deg, #7c2d12, #9a3412); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .scene-header { background: rgba(234, 88, 12, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #fdba74; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(234,88,12,0.2)); border: 1px solid rgba(139,92,246,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #ea580c, #9a3412); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #fdba74; }
        .why-chain { background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(234,88,12,0.15)); border: 1px solid rgba(139,92,246,0.3); border-radius: 16px; padding: 24px; margin: 24px 0; }
        .why-chain-title { font-size: 1.2rem; font-weight: 700; color: #c4b5fd; margin-bottom: 20px; }
        .why-item { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
        .why-q { font-weight: 600; color: #e9d5ff; margin-bottom: 10px; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
        .pitfall { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    
/* EPA Badge Styles */
.epa-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.epa-badge { 
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
    background: rgba(139,92,246,0.2); border: 1px solid rgba(139,92,246,0.4); color: #c4b5fd;
}
.epa-badge.primary { background: rgba(59,130,246,0.25); border-color: rgba(59,130,246,0.5); color: #93c5fd; }
.epa-badge .epa-level { background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 10px; font-size: 0.65rem; }

/* Confidence Slider Styles */
.confidence-container {
    background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(139,92,246,0.15));
    border: 1px solid rgba(59,130,246,0.3);
    border-radius: 12px;
    padding: 20px;
    margin: 16px 0;
    display: none;
}
.confidence-container.show { display: block; }
.confidence-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.confidence-icon { font-size: 1.2rem; }
.confidence-label { font-weight: 600; color: #e2e8f0; }
.confidence-slider-wrapper { position: relative; margin-bottom: 8px; }
.confidence-slider {
    width: 100%; height: 8px; border-radius: 4px;
    background: rgba(255,255,255,0.1); outline: none; -webkit-appearance: none;
}
.confidence-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6); cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.confidence-labels { display: flex; justify-content: space-between; font-size: 0.65rem; color: rgba(255,255,255,0.5); margin-top: 4px; }
.confidence-value { text-align: center; font-size: 2rem; font-weight: 700; margin: 12px 0; color: #fbbf24; }
.confidence-submit {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    color: white; border: none; border-radius: 8px;
    font-weight: 600; font-size: 1rem; cursor: pointer;
}
.confidence-submit:hover { opacity: 0.9; transform: translateY(-1px); }

/* Calibration Feedback */
.calibration-feedback {
    background: rgba(0,0,0,0.3); border-radius: 8px; padding: 12px 16px; margin-top: 12px;
    display: none; font-size: 0.9rem;
}
.calibration-feedback.show { display: block; }
.calibration-feedback.well-calibrated { border-left: 3px solid #22c55e; }
.calibration-feedback.overconfident { border-left: 3px solid #ef4444; }
.calibration-feedback.underconfident { border-left: 3px solid #fbbf24; }

/* Process Feedback Styles */
.process-feedback {
    background: linear-gradient(135deg, rgba(251,191,36,0.1), rgba(239,68,68,0.1));
    border: 1px solid rgba(251,191,36,0.3);
    border-radius: 12px;
    padding: 16px;
    margin-top: 16px;
    display: none;
}
.process-feedback.show { display: block; }
.process-feedback h4 { color: #fbbf24; margin-bottom: 12px; }

/* Selected option before submit */
.mcq-option.selected { border-color: #3b82f6 !important; background: rgba(59,130,246,0.2) !important; }

/* EPA Progress in Debrief */
.epa-debrief-section { margin: 24px 0; }
.epa-debrief-section h4 { color: #1f2937; margin-bottom: 16px; font-size: 1.1rem; }
.epa-progress-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
.epa-progress-card { background: #f9fafb; border-radius: 10px; padding: 14px; text-align: center; }
.epa-progress-card .epa-name { font-size: 0.75rem; color: #6b7280; margin-bottom: 4px; }
.epa-progress-card .epa-score { font-size: 1.5rem; font-weight: 700; }
.epa-progress-card .epa-score.high { color: #22c55e; }
.epa-progress-card .epa-score.medium { color: #f59e0b; }
.epa-progress-card .epa-score.low { color: #ef4444; }

/* Calibration Chart in Debrief */
.calibration-debrief { margin: 24px 0; padding: 20px; background: #f9fafb; border-radius: 12px; }
.calibration-debrief h4 { color: #1f2937; margin-bottom: 16px; }
.calibration-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; text-align: center; }
.calibration-stat { padding: 16px; background: white; border-radius: 8px; }
.calibration-stat .stat-value { font-size: 2rem; font-weight: 700; }
.calibration-stat .stat-label { font-size: 0.85rem; color: #6b7280; margin-top: 4px; }
.calibration-interpretation { margin-top: 16px; padding: 12px; background: white; border-radius: 8px; font-size: 0.9rem; }

</style>
</head>
<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','comparison','pathophys','diagnosis','fluids','potassium','insulin','monitoring','complications','overlap','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">🍬 HHS vs DKA Complete<span class="badge">11 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 11</div><div class="scene-title">Two Patients, Two Emergencies</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> DKA triad: Hyperglycemia (usually >250), Ketosis, Acidosis (pH <7.3)</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What's the role of bicarbonate therapy in severe DKA (pH <6.9)?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Continue insulin drip until anion gap closes, not just until glucose normalizes</p>
                </div><div class="narrative"><p><strong>Patient A:</strong> <span class="highlight">28-year-old woman</span> with T1DM, <span class="critical">nausea, vomiting, abdominal pain</span> × 1 day. Ran out of insulin.</p><p><strong>Vitals:</strong> HR 112, BP 95/60, RR 28 (Kussmaul), T 99.2°F<br><strong>Labs:</strong> Glucose 485, pH 7.18, HCO3 10, Anion gap 28, Ketones +++</p><p style="margin-top:20px;"><strong>Patient B:</strong> <span class="highlight">72-year-old man</span> with T2DM, <span class="critical">profound weakness, confusion</span> × 3 days. Caregiver noticed decreased intake.</p><p><strong>Vitals:</strong> HR 98, BP 100/55, RR 18, T 100.4°F<br><strong>Labs:</strong> Glucose 1,150, pH 7.32, HCO3 22, Serum Osm 385, Ketones trace</p></div><div class="alert-box"><div class="alert-title">🚨 Patient A = DKA | Patient B = HHS</div><p>Both are diabetic emergencies with high mortality. Different pathophysiology, different presentations, overlapping treatment.</p></div><button class="btn" onclick="nextStage()">Compare DKA vs HHS →</button></div></div>`;
    };

    window.render_comparison = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 11</div><div class="scene-title">DKA vs HHS - Key Differences</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Fluid first! Start with 1-2L NS in first hour, then reassess</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does SGLT2 inhibitor-associated euglycemic DKA differ in management?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Side-by-Side Comparison</div><table class="comparison-table"><tr><th>Feature</th><th>DKA</th><th>HHS</th></tr><tr><td>Diabetes type</td><td>Usually T1DM</td><td>Usually T2DM</td></tr><tr><td>Onset</td><td>Hours to 1-2 days</td><td>Days to weeks</td></tr><tr><td>Glucose</td><td>Usually 300-800</td><td>Usually >600 (often >1000)</td></tr><tr><td>pH</td><td><7.3 (often <7.2)</td><td>>7.3</td></tr><tr><td>HCO3</td><td><18 mEq/L</td><td>>18 mEq/L</td></tr><tr><td>Ketones</td><td>Strongly positive</td><td>Absent/trace</td></tr><tr><td>Serum Osm</td><td>Variable (may be ↑)</td><td>>320 mOsm/kg</td></tr><tr><td>Anion gap</td><td>Elevated (>12)</td><td>Normal or mildly ↑</td></tr><tr><td>Mental status</td><td>Alert to obtunded</td><td>Often severely altered</td></tr><tr><td>Mortality</td><td>~1-5%</td><td>~10-20%</td></tr></table></div><button class="btn" onclick="nextStage()">Pathophysiology →</button></div></div>`;
    };

    window.render_pathophys = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 11</div><div class="scene-title">Why the Difference?</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Potassium before insulin: If K <3.3, hold insulin until K repleted</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> When should you suspect cerebral edema (especially in pediatrics)?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Transition to subQ insulin with 2-hour overlap before stopping IV</p>
                </div><div class="mechanism-box"><div class="mechanism-title">🧬 DKA Pathophysiology</div><div class="pathway"><strong>Absolute insulin deficiency:</strong><br>No insulin → glucose can't enter cells<br>→ Body thinks it's starving<br>→ Lipolysis → FFA to liver<br>→ Ketogenesis → β-hydroxybutyrate, acetoacetate<br>→ Metabolic acidosis (anion gap)<br><br>Ketones = the problem<br>Glucose elevated but acidosis kills</div></div><div class="mechanism-box"><div class="mechanism-title">🧬 HHS Pathophysiology</div><div class="pathway"><strong>Relative insulin deficiency:</strong><br>SOME insulin present (enough to prevent ketosis)<br>→ Glucose keeps rising<br>→ Osmotic diuresis → profound dehydration<br>→ Hyperosmolarity → altered mental status<br><br>No ketosis because insulin suppresses lipolysis<br>Dehydration = the problem (often 8-10L deficit)</div></div><div class="why-chain"><div class="why-chain-title">🔗 WHY Chain</div><div class="why-item"><div class="why-q">Why don't HHS patients make ketones?</div>They have enough insulin to suppress lipolysis but not enough to allow glucose uptake. It only takes a tiny amount of insulin to prevent ketogenesis.</div></div><button class="btn" onclick="nextStage()">Diagnostic Criteria →</button></div></div>`;
    };

    window.render_diagnosis = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 11</div><div class="scene-title">Diagnostic Criteria</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Anion gap = Na - (Cl + HCO3); normal 8-12, DKA typically >20</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How do you transition from IV to subcutaneous insulin optimally?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 DKA Criteria</div><table class="comparison-table"><tr><th>Parameter</th><th>Mild</th><th>Moderate</th><th>Severe</th></tr><tr><td>Glucose</td><td colspan="3">>250 mg/dL</td></tr><tr><td>pH</td><td>7.25-7.30</td><td>7.00-7.24</td><td><7.00</td></tr><tr><td>HCO3</td><td>15-18</td><td>10-15</td><td><10</td></tr><tr><td>Anion gap</td><td>>10</td><td>>12</td><td>>12</td></tr><tr><td>Mental status</td><td>Alert</td><td>Drowsy</td><td>Stupor/coma</td></tr></table></div><div class="boards-tip"><div class="boards-tip-title">📚 HHS Criteria</div><ul style="margin-left:20px;line-height:2;"><li>Glucose >600 mg/dL</li><li>Serum osmolality >320 mOsm/kg</li><li>pH >7.30, HCO3 >18</li><li>Absent or trace ketones</li><li>Altered mental status</li></ul></div><div class="alert-box"><div class="alert-title">⚠️ Euglycemic DKA - BOARDS FAVORITE!</div><p>DKA with glucose <250! Seen with SGLT2 inhibitors (empagliflozin, dapagliflozin). Still has acidosis and ketones!</p></div><button class="btn" onclick="nextStage()">Fluid Resuscitation →</button></div></div>`;
    };

    window.render_fluids = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 11</div><div class="scene-title">Aggressive Fluid Replacement</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Look for precipitant: Infection, Infarction, Insulin non-compliance</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> Discuss the two-bag system for glucose/insulin management</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Mucormycosis: Diabetic + facial pain + black eschar - emergency!</p>
                </div><div class="alert-box"><div class="alert-title">🚨 Fluids Are MORE Important Than Insulin!</div><p>Both DKA and HHS are profoundly dehydrated. Fluid resuscitation is the FIRST priority. Average deficit: DKA 3-6L, HHS 8-10L.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Fluid Protocol</div><table class="comparison-table"><tr><th>Phase</th><th>Fluid</th><th>Rate</th></tr><tr><td>Initial (1-2h)</td><td>0.9% NS</td><td>1-1.5 L/hr (15-20 mL/kg/hr)</td></tr><tr><td>Subsequent</td><td>0.45% NS (if corrected Na normal/high)</td><td>250-500 mL/hr</td></tr><tr><td>When glucose <300 (DKA) or <250-300 (HHS)</td><td>D5 + 0.45% NS</td><td>150-250 mL/hr</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Corrected Sodium</div><div class="pathway">Corrected Na = Measured Na + 1.6 × [(Glucose - 100) / 100]<br><br>Example: Na 128, Glucose 600<br>Corrected = 128 + 1.6 × (500/100) = 128 + 8 = 136<br><br>If corrected Na is LOW → use 0.9% NS<br>If corrected Na is HIGH → use 0.45% NS<br><br>HHS: Go slower (risk of cerebral edema<br>with rapid osmolality changes)</div></div><button class="btn" onclick="nextStage()">Potassium →</button></div></div>`;
    };

    window.render_potassium = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 11</div><div class="scene-title">The Potassium Paradox</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Check glucose hourly; goal is drop of 50-70 mg/dL per hour</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> When should this patient be admitted to ICU vs floor?</p>
                </div><div class="alert-box"><div class="alert-title">🚨 K+ May Look High But Total Body K+ Is LOW!</div><p>Acidosis shifts K+ out of cells. Once you give insulin, K+ rushes back in → hypokalemia → arrhythmias!</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Potassium Protocol - CRITICAL</div><table class="comparison-table"><tr><th>Serum K+</th><th>Action</th></tr><tr style="background:rgba(239,68,68,0.2);"><td><strong><3.3 mEq/L</strong></td><td><strong>HOLD ILIN!</strong> Give K+ 20-40 mEq/hr until >3.3</td></tr><tr><td>3.3-5.3 mEq/L</td><td>Add K+ 20-30 mEq to each liter of fluids</td></tr><tr><td>>5.3 mEq/L</td><td>Don't add K+; recheck every 2h</td></tr></table></div><div class="why-chain"><div class="why-chain-title">🔗 WHY Chain</div><div class="why-item"><div class="why-q">Why does K+ appear high in DKA?</div>1) Acidosis: H+ enters cells, K+ exits to maintain electroneutrality. 2) Insulin deficiency: Insulin normally drives K+ into cells. 3) Hyperosmolarity: Water leaves cells, K+ follows.</div><div class="why-item"><div class="why-q">Why hold insulin if K+ <3.3?</div>Insulin will drive remaining K+ into cells → severe hypokalemia → fatal arrhythmias. Fix K+ BEFORE insulin!</div></div><button class="btn" onclick="nextStage()">Insulin →</button></div></div>`;
    };

    window.render_insulin = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 11</div><div class="scene-title">Insulin Therapy</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> DKA triad: Hyperglycemia (usually >250), Ketosis, Acidosis (pH <7.3)</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What's the role of bicarbonate therapy in severe DKA (pH <6.9)?</p>

                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Correct sodium for glucose: Add 1.6 mEq/L per 100 mg/dL glucose >100</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Insulin Protocol</div><table class="comparison-table"><tr><th>Parameter</th><th>DKA</th><th>HHS</th></tr><tr><td>Start when</td><td>K+ ≥3.3, after initial fluids</td><td>Same; HHS may not need much initially</td></tr><tr><td>Bolus</td><td>0.1 U/kg IV (optional)</td><td>Often not given</td></tr><tr><td>Infusion</td><td>0.1 U/kg/hr OR 0.14 U/kg/hr (no bolus)</td><td>0.05-0.1 U/kg/hr (often lower)</td></tr><tr><td>Glucose goal</td><td>↓ 50-75 mg/dL/hr</td><td>↓ 50-75 mg/dL/hr</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 When to Add Dextrose</div><div class="pathway"><strong>DKA:</strong> When glucose reaches 200-250<br><strong>HHS:</strong> When glucose reaches 250-300<br><br>Add D5 to fluids (D5-0.45% NS)<br><br>WHY? Continue insulin to clear ketones (DKA)<br>or correct osmolality (HHS), but prevent<br>hypoglycemia.<br><br>Target glucose: 150-200 mg/dL</div></div><div class="alert-box"><div class="alert-title">⚠️ Don't Stop Insulin When Glucose Normalizes!</div><p>In DKA, you need insulin to CLOSE THE ANION GAP. Keep infusion running until gap closes, then transition to SubQ.</p></div><button class="btn" onclick="nextStage()">Monitoring →</button></div></div>`;

    window.render_monitoring = function() {

                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does SGLT2 inhibitor-associated euglycemic DKA differ in management?</p>

                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Potassium before insulin: If K <3.3, hold insulin until K repleted</p>

                </div><div class="boards-tip"><div class="boards-tip-title">📚 Overlap Syndrome</div><p>~30% of hyperglycemic emergencies have features of BOTH DKA and HHS!</p><table class="comparison-table" style="margin-top:16px;"><tr><th>Features</th></tr><tr><td>Glucose >600 (HHS-like)</td></tr><tr><td>pH <7.3 with ketosis (DKA-like)</td></tr><tr><td>Osmolality >320 (HHS-like)</td></tr><tr><td>Significant acidosis (DKA-like)</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Management of Mixed Syndrome</div><div class="pathway">Treat the most life-threatening component first:<br><br>1. Acidosis severe? → Treat like DKA<br>2. Profound dehydration/hyperosmolar?<br>   → More aggressive (but careful) fluids<br>3. Both? → Address both simultaneously<br><br><strong>Key principles:</strong><br>• Fluids first<br>• Replace K+ before/with insulin<br>• Close the gap (DKA component)<br>• Correct osmolality gradually (HHS)</div></div><button class="btn" onclick="nextStage()">Debrief →</button></div></div>`;

                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> Discuss the two-bag system for glucose/insulin management</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#f5f3ff; border:1px solid #8b5cf6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #8b5cf6;">
                    <p style="margin:0; color:#5b21b6; font-size:0.9rem;"><strong>📋 Board Tip:</strong> Beta-hydroxybutyrate is more accurate than urine ketones for monitoring</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 High-Yield Summary</div><table class="comparison-table"><tr><th>DKA</th><th>HHS</th></tr><tr><td>Ketosis + acidosis</td><td>Hyperosmolarity</td></tr><tr><td>T1DM usually</td><td>T2DM usually</td></tr><tr><td>Glucose 300-800</td><td>Glucose >600 (often >1000)</td></tr><tr><td>pH <7.3</td><td>pH >7.3</td></tr><tr><td>Mortality ~1-5%</td><td>Mortality ~10-20%</td></tr></table></div><div class="tips"><div class="pearl"><div class="tip-header">✓ Pearls</div><ul style="margin-left:16px;"><li>Fluids before insulin</li><li>K+ <3.3 = HOLD insulin</li><li>Continue insulin until gap closes</li><li>2-4h overlap IV → SubQ</li></ul></div><div class="pitfall"><div class="tip-header">✗ Pitfalls</div><ul style="margin-left:16px;"><li>Stopping insulin when glucose normalizes</li><li>Forgetting to replace K+</li><li>Rapid correction (cerebral edema)</li><li>Missing euglycemic DKA (SGLT2i)</li></ul></div></div><button class="btn" onclick="state.stage=0;render()">🔄 Restart Case</button></div></div>`;

<script>
// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
            '<h4 style="font-weight:600;color:#374151;margin-bottom:8px;">🎯 Performance Legend</h4>' +
            '<div style="display:flex;flex-wrap:wrap;gap:16px;font-size:0.9rem;">' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px;"></span> Optimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#eab308;border-radius:2px;"></span> Suboptimal</span>' +
            '<span style="display:flex;align-items:center;gap:6px;"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px;"></span> Incorrect</span>' +
            '</div></div>' +
            '<div style="display:flex;gap:12px;">' +
            '<button onclick="document.getElementById(\'rdxDebriefOverlay\').style.display=\'none\'" style="flex:1;padding:14px;background:#f3f4f6;border:none;border-radius:12px;font-weight:600;cursor:pointer;">Close</button>' +
            '<button onclick="location.reload()" style="flex:1;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:12px;font-weight:600;cursor:pointer;">🔄 Try Again</button>' +
            '</div>';
        
        document.getElementById('rdxDebriefOverlay').style.display = 'flex';
    };
    
    // Auto-inject hint examples into existing content
    window.rdxInit = function() {
        // Could add dynamic hint injection here based on difficulty
        console.log('ReasonDx Enhanced Features loaded for: Hhs Dka Comparison Expanded Adventure');
    };
    
    // Initialize on load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', window.rdxInit);
    } else {
        window.rdxInit();
    }
})();


// ============================================================================
// EPA & CALIBRATION ENHANCEMENT - ReasonDx
// ============================================================================

// Case EPA Metadata
const caseEPA = {
    id: 'hhs-dka-comparison',
    primaryEPAs: ["EPA-10","EPA-4","EPA-3"],
    secondaryEPAs: ["EPA-2","EPA-1"],
    category: 'Endocrine'
};

// Response tracking for calibration
let responseHistory = [];
let pendingSelection = null;

// EPA Names for display
const epaNames = {"EPA-1":"Gather H&P","EPA-2":"Prioritize DDx","EPA-3":"Recommend Tests","EPA-4":"Enter Orders","EPA-7":"Apply Evidence","EPA-10":"Recognize Urgency","EPA-12":"Perform Procedures"};

// Override selectOption to add confidence step
const originalSelectOption = typeof selectOption === 'function' ? selectOption : null;

function selectOptionEnhanced(index, correct) {
    const qId = 'q' + currentStage;
    if (answeredQuestions.has(qId)) return;
    
    // Store pending selection
    pendingSelection = { index, correct, stageIdx: currentStage };
    
    // Highlight selected option
    document.querySelectorAll('.mcq-option').forEach((opt, i) => {
        opt.classList.remove('selected');
        if (i === index) opt.classList.add('selected');
    });
    
    // Show confidence slider
    const confContainer = document.getElementById('confidence-container');
    if (confContainer) {
        confContainer.classList.add('show');
        confContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function updateConfidenceDisplay(value) {
    const display = document.getElementById('confidence-display');
    if (display) display.textContent = value + '%';
}

function submitWithConfidence() {
    if (!pendingSelection) return;
    
    const confidence = parseInt(document.getElementById('confidence-slider').value);
    const { index, correct, stageIdx } = pendingSelection;
    const stage = stages[stageIdx];
    
    // Record response with confidence
    responseHistory.push({
        stage: stageIdx + 1,
        stageTitle: stage.title,
        epaFocus: caseEPA.primaryEPAs[0],
        selectedIndex: index,
        selectedText: stage.question.options[index].text,
        correct: correct,
        confidence: confidence,
        points: correct ? stage.question.points : 0,
        maxPoints: stage.question.points
    });
    
    // Hide confidence container
    const confContainer = document.getElementById('confidence-container');
    if (confContainer) confContainer.classList.remove('show');
    
    // Now process the answer (call original logic)
    const qId = 'q' + stageIdx;
    answeredQuestions.add(qId);
    decisionPath[stageIdx] = index;
    
    maxScore += stage.question.points;
    if (correct) score += stage.question.points;
    
    document.getElementById('score').textContent = score;
    document.getElementById('maxScore').textContent = maxScore;
    
    // Show calibration feedback
    showCalibrationFeedback(confidence, correct);
    
    pendingSelection = null;
    renderStage();
}

function showCalibrationFeedback(confidence, correct) {
    // This will be shown in the feedback section after render
    const feedback = document.createElement('div');
    feedback.className = 'calibration-feedback show';
    
    if (correct && confidence >= 70) {
        feedback.classList.add('well-calibrated');
        feedback.innerHTML = '✅ <strong>Well calibrated!</strong> You were confident and correct.';
    } else if (correct && confidence < 50) {
        feedback.classList.add('underconfident');
        feedback.innerHTML = '📚 Correct, but you were uncertain. <strong>Trust your knowledge more!</strong>';
    } else if (!correct && confidence >= 70) {
        feedback.classList.add('overconfident');
        feedback.innerHTML = '⚠️ <strong>Overconfidence detected.</strong> High confidence + wrong answer is where diagnostic errors happen.';
    } else {
        feedback.classList.add('well-calibrated');
        feedback.innerHTML = '📝 Incorrect, but your uncertainty was appropriate. Review this concept.';
    }
    
    // Store for rendering
    window.lastCalibrationFeedback = feedback.outerHTML;
}

// Enhanced debrief with EPA and calibration
function showEnhancedDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    const content = document.getElementById('debriefContent');
    if (!overlay || !content) return;
    
    const percentage = maxScore > 0 ? Math.round((score / maxScore) * 100) : 0;
    
    // Calculate calibration
    const withConf = responseHistory.filter(r => r.confidence !== undefined);
    const correctWithConf = withConf.filter(r => r.correct);
    const incorrectWithConf = withConf.filter(r => !r.correct);
    const avgConfCorrect = correctWithConf.length > 0 
        ? Math.round(correctWithConf.reduce((s,r) => s + r.confidence, 0) / correctWithConf.length) : 0;
    const avgConfIncorrect = incorrectWithConf.length > 0 
        ? Math.round(incorrectWithConf.reduce((s,r) => s + r.confidence, 0) / incorrectWithConf.length) : 0;
    
    // EPA performance
    const epaPerf = {};
    responseHistory.forEach(r => {
        const epa = r.epaFocus || caseEPA.primaryEPAs[0];
        if (!epaPerf[epa]) epaPerf[epa] = { correct: 0, total: 0 };
        epaPerf[epa].total++;
        if (r.correct) epaPerf[epa].correct++;
    });
    
    // Calibration interpretation
    let calibrationMsg = '';
    if (avgConfCorrect - avgConfIncorrect > 20) {
        calibrationMsg = '✅ Good discrimination! You feel more confident when you\'re right.';
    } else if (avgConfIncorrect > 60) {
        calibrationMsg = '⚠️ Overconfidence pattern detected. Practice asking "What would make me wrong?"';
    } else {
        calibrationMsg = '📊 Work on calibration - confidence should differ between correct and incorrect answers.';
    }
    
    content.innerHTML = `
        <div style="text-align:center;margin-bottom:24px;">
            <div style="font-size:4rem;">${percentage >= 80 ? '🏆' : percentage >= 60 ? '👍' : '📚'}</div>
            <div style="font-size:2.5rem;font-weight:700;color:${percentage >= 80 ? '#22c55e' : percentage >= 60 ? '#f59e0b' : '#ef4444'}">${percentage}%</div>
            <div style="color:#6b7280;">Score: ${score}/${maxScore}</div>
        </div>
        
        <div class="epa-debrief-section">
            <h4>📋 EPA Competencies Assessed</h4>
            <div class="epa-progress-grid">
                ${Object.entries(epaPerf).map(([epa, data]) => {
                    const pct = Math.round((data.correct / data.total) * 100);
                    const colorClass = pct >= 80 ? 'high' : pct >= 60 ? 'medium' : 'low';
                    return `<div class="epa-progress-card">
                        <div class="epa-name">${epaNames[epa] || epa}</div>
                        <div class="epa-score ${colorClass}">${pct}%</div>
                    </div>`;
                }).join('')}
            </div>
        </div>
        
        <div class="calibration-debrief">
            <h4>🎯 Confidence Calibration</h4>
            <div class="calibration-stats">
                <div class="calibration-stat">
                    <div class="stat-value" style="color:#22c55e;">${avgConfCorrect}%</div>
                    <div class="stat-label">Avg confidence when correct</div>
                </div>
                <div class="calibration-stat">
                    <div class="stat-value" style="color:${avgConfIncorrect > 60 ? '#ef4444' : '#f59e0b'};">${avgConfIncorrect}%</div>
                    <div class="stat-label">Avg confidence when incorrect</div>
                </div>
            </div>
            <div class="calibration-interpretation">${calibrationMsg}</div>
        </div>
        
        <div class="decision-path">
            <h3>📝 Your Decisions</h3>
            ${responseHistory.map(r => `
                <div class="path-item ${r.correct ? 'path-optimal' : 'path-incorrect'}">
                    <div style="display:flex;justify-content:space-between;">
                        <div>
                            <div class="path-stage">${r.correct ? '✓' : '✗'} Stage ${r.stage}: ${r.stageTitle}</div>
                            <div class="path-choice" style="font-size:0.85rem;color:#6b7280;">${r.confidence}% confident</div>
                        </div>
                        <div class="path-points">${r.points}/${r.maxPoints}</div>
                    </div>
                </div>
            `).join('')}
        </div>
        
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
        <button class="debrief-btn" style="background:#e5e7eb;color:#4b5563;margin-top:8px;" onclick="closeDebrief()">Close</button>
    `;
    
    overlay.classList.add('show');
}

// Replace selectOption globally
window.selectOption = selectOptionEnhanced;

// Store original showDebrief if exists
if (typeof showDebrief === 'function') {
    window.originalShowDebrief = showDebrief;
}
window.showDebrief = showEnhancedDebrief;

</script>
<!-- ==================== END REASONDX ENHANCED FEATURES ==================== -->
