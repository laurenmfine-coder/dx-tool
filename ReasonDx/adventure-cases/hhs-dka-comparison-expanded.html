    <style>

<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = ['arrival','comparison','pathophys','diagnosis','fluids','potassium','insulin','monitoring','complications','overlap','debrief'];
    const state = { stage: 0 };
    function render() {
        const p = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header"><div style="font-size:1.3rem;font-weight:700">🍬 HHS vs DKA Complete<span class="badge">11 STAGES</span></div><div>${state.stage + 1}/${STAGES.length}</div></div><div class="progress-bar"><div class="progress-fill" style="width:${p}%"></div></div>`;
        c += window['render_' + STAGES[state.stage]]();
        document.getElementById('app').innerHTML = c;
    }
    function nextStage() { state.stage++; render(); }

    window.render_arrival = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 11</div><div class="scene-title">Two Patients, Two Emergencies</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> DKA triad: Hyperglycemia (usually >250), Ketosis, Acidosis (pH <7.3)</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What's the role of bicarbonate therapy in severe DKA (pH <6.9)?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Continue insulin drip until anion gap closes, not just until glucose normalizes</p>
                </div><div class="narrative"><p><strong>Patient A:</strong> <span class="highlight">28-year-old woman</span> with T1DM, <span class="critical">nausea, vomiting, abdominal pain</span> × 1 day. Ran out of insulin.</p><p><strong>Vitals:</strong> HR 112, BP 95/60, RR 28 (Kussmaul), T 99.2°F<br><strong>Labs:</strong> Glucose 485, pH 7.18, HCO3 10, Anion gap 28, Ketones +++</p><p style="margin-top:20px;"><strong>Patient B:</strong> <span class="highlight">72-year-old man</span> with T2DM, <span class="critical">profound weakness, confusion</span> × 3 days. Caregiver noticed decreased intake.</p><p><strong>Vitals:</strong> HR 98, BP 100/55, RR 18, T 100.4°F<br><strong>Labs:</strong> Glucose 1,150, pH 7.32, HCO3 22, Serum Osm 385, Ketones trace</p></div><div class="alert-box"><div class="alert-title">🚨 Patient A = DKA | Patient B = HHS</div><p>Both are diabetic emergencies with high mortality. Different pathophysiology, different presentations, overlapping treatment.</p></div><button class="btn" onclick="nextStage()">Compare DKA vs HHS →</button></div></div>`;
    };

    window.render_comparison = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 11</div><div class="scene-title">DKA vs HHS - Key Differences</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Fluid first! Start with 1-2L NS in first hour, then reassess</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does SGLT2 inhibitor-associated euglycemic DKA differ in management?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Side-by-Side Comparison</div><table class="comparison-table"><tr><th>Feature</th><th>DKA</th><th>HHS</th></tr><tr><td>Diabetes type</td><td>Usually T1DM</td><td>Usually T2DM</td></tr><tr><td>Onset</td><td>Hours to 1-2 days</td><td>Days to weeks</td></tr><tr><td>Glucose</td><td>Usually 300-800</td><td>Usually >600 (often >1000)</td></tr><tr><td>pH</td><td><7.3 (often <7.2)</td><td>>7.3</td></tr><tr><td>HCO3</td><td><18 mEq/L</td><td>>18 mEq/L</td></tr><tr><td>Ketones</td><td>Strongly positive</td><td>Absent/trace</td></tr><tr><td>Serum Osm</td><td>Variable (may be ↑)</td><td>>320 mOsm/kg</td></tr><tr><td>Anion gap</td><td>Elevated (>12)</td><td>Normal or mildly ↑</td></tr><tr><td>Mental status</td><td>Alert to obtunded</td><td>Often severely altered</td></tr><tr><td>Mortality</td><td>~1-5%</td><td>~10-20%</td></tr></table></div><button class="btn" onclick="nextStage()">Pathophysiology →</button></div></div>`;
    };

    window.render_pathophys = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 11</div><div class="scene-title">Why the Difference?</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Potassium before insulin: If K <3.3, hold insulin until K repleted</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> When should you suspect cerebral edema (especially in pediatrics)?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Transition to subQ insulin with 2-hour overlap before stopping IV</p>
                </div><div class="mechanism-box"><div class="mechanism-title">🧬 DKA Pathophysiology</div><div class="pathway"><strong>Absolute insulin deficiency:</strong><br>No insulin → glucose can't enter cells<br>→ Body thinks it's starving<br>→ Lipolysis → FFA to liver<br>→ Ketogenesis → β-hydroxybutyrate, acetoacetate<br>→ Metabolic acidosis (anion gap)<br><br>Ketones = the problem<br>Glucose elevated but acidosis kills</div></div><div class="mechanism-box"><div class="mechanism-title">🧬 HHS Pathophysiology</div><div class="pathway"><strong>Relative insulin deficiency:</strong><br>SOME insulin present (enough to prevent ketosis)<br>→ Glucose keeps rising<br>→ Osmotic diuresis → profound dehydration<br>→ Hyperosmolarity → altered mental status<br><br>No ketosis because insulin suppresses lipolysis<br>Dehydration = the problem (often 8-10L deficit)</div></div><div class="why-chain"><div class="why-chain-title">🔗 WHY Chain</div><div class="why-item"><div class="why-q">Why don't HHS patients make ketones?</div>They have enough insulin to suppress lipolysis but not enough to allow glucose uptake. It only takes a tiny amount of insulin to prevent ketogenesis.</div></div><button class="btn" onclick="nextStage()">Diagnostic Criteria →</button></div></div>`;
    };

    window.render_diagnosis = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 11</div><div class="scene-title">Diagnostic Criteria</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Anion gap = Na - (Cl + HCO3); normal 8-12, DKA typically >20</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How do you transition from IV to subcutaneous insulin optimally?</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 DKA Criteria</div><table class="comparison-table"><tr><th>Parameter</th><th>Mild</th><th>Moderate</th><th>Severe</th></tr><tr><td>Glucose</td><td colspan="3">>250 mg/dL</td></tr><tr><td>pH</td><td>7.25-7.30</td><td>7.00-7.24</td><td><7.00</td></tr><tr><td>HCO3</td><td>15-18</td><td>10-15</td><td><10</td></tr><tr><td>Anion gap</td><td>>10</td><td>>12</td><td>>12</td></tr><tr><td>Mental status</td><td>Alert</td><td>Drowsy</td><td>Stupor/coma</td></tr></table></div><div class="boards-tip"><div class="boards-tip-title">📚 HHS Criteria</div><ul style="margin-left:20px;line-height:2;"><li>Glucose >600 mg/dL</li><li>Serum osmolality >320 mOsm/kg</li><li>pH >7.30, HCO3 >18</li><li>Absent or trace ketones</li><li>Altered mental status</li></ul></div><div class="alert-box"><div class="alert-title">⚠️ Euglycemic DKA - BOARDS FAVORITE!</div><p>DKA with glucose <250! Seen with SGLT2 inhibitors (empagliflozin, dapagliflozin). Still has acidosis and ketones!</p></div><button class="btn" onclick="nextStage()">Fluid Resuscitation →</button></div></div>`;
    };

    window.render_fluids = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 11</div><div class="scene-title">Aggressive Fluid Replacement</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Look for precipitant: Infection, Infarction, Insulin non-compliance</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> Discuss the two-bag system for glucose/insulin management</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Mucormycosis: Diabetic + facial pain + black eschar - emergency!</p>
                </div><div class="alert-box"><div class="alert-title">🚨 Fluids Are MORE Important Than Insulin!</div><p>Both DKA and HHS are profoundly dehydrated. Fluid resuscitation is the FIRST priority. Average deficit: DKA 3-6L, HHS 8-10L.</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Fluid Protocol</div><table class="comparison-table"><tr><th>Phase</th><th>Fluid</th><th>Rate</th></tr><tr><td>Initial (1-2h)</td><td>0.9% NS</td><td>1-1.5 L/hr (15-20 mL/kg/hr)</td></tr><tr><td>Subsequent</td><td>0.45% NS (if corrected Na normal/high)</td><td>250-500 mL/hr</td></tr><tr><td>When glucose <300 (DKA) or <250-300 (HHS)</td><td>D5 + 0.45% NS</td><td>150-250 mL/hr</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 Corrected Sodium</div><div class="pathway">Corrected Na = Measured Na + 1.6 × [(Glucose - 100) / 100]<br><br>Example: Na 128, Glucose 600<br>Corrected = 128 + 1.6 × (500/100) = 128 + 8 = 136<br><br>If corrected Na is LOW → use 0.9% NS<br>If corrected Na is HIGH → use 0.45% NS<br><br>HHS: Go slower (risk of cerebral edema<br>with rapid osmolality changes)</div></div><button class="btn" onclick="nextStage()">Potassium →</button></div></div>`;
    };

    window.render_potassium = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 11</div><div class="scene-title">The Potassium Paradox</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Check glucose hourly; goal is drop of 50-70 mg/dL per hour</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> When should this patient be admitted to ICU vs floor?</p>
                </div><div class="alert-box"><div class="alert-title">🚨 K+ May Look High But Total Body K+ Is LOW!</div><p>Acidosis shifts K+ out of cells. Once you give insulin, K+ rushes back in → hypokalemia → arrhythmias!</p></div><div class="boards-tip"><div class="boards-tip-title">📚 Potassium Protocol - CRITICAL</div><table class="comparison-table"><tr><th>Serum K+</th><th>Action</th></tr><tr style="background:rgba(239,68,68,0.2);"><td><strong><3.3 mEq/L</strong></td><td><strong>HOLD ILIN!</strong> Give K+ 20-40 mEq/hr until >3.3</td></tr><tr><td>3.3-5.3 mEq/L</td><td>Add K+ 20-30 mEq to each liter of fluids</td></tr><tr><td>>5.3 mEq/L</td><td>Don't add K+; recheck every 2h</td></tr></table></div><div class="why-chain"><div class="why-chain-title">🔗 WHY Chain</div><div class="why-item"><div class="why-q">Why does K+ appear high in DKA?</div>1) Acidosis: H+ enters cells, K+ exits to maintain electroneutrality. 2) Insulin deficiency: Insulin normally drives K+ into cells. 3) Hyperosmolarity: Water leaves cells, K+ follows.</div><div class="why-item"><div class="why-q">Why hold insulin if K+ <3.3?</div>Insulin will drive remaining K+ into cells → severe hypokalemia → fatal arrhythmias. Fix K+ BEFORE insulin!</div></div><button class="btn" onclick="nextStage()">Insulin →</button></div></div>`;
    };

    window.render_insulin = function() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 7 of 11</div><div class="scene-title">Insulin Therapy</div></div><div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> DKA triad: Hyperglycemia (usually >250), Ketosis, Acidosis (pH <7.3)</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What's the role of bicarbonate therapy in severe DKA (pH <6.9)?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Correct sodium for glucose: Add 1.6 mEq/L per 100 mg/dL glucose >100</p>
                </div><div class="boards-tip"><div class="boards-tip-title">📚 Insulin Protocol</div><table class="comparison-table"><tr><th>Parameter</th><th>DKA</th><th>HHS</th></tr><tr><td>Start when</td><td>K+ ≥3.3, after initial fluids</td><td>Same; HHS may not need much initially</td></tr><tr><td>Bolus</td><td>0.1 U/kg IV (optional)</td><td>Often not given</td></tr><tr><td>Infusion</td><td>0.1 U/kg/hr OR 0.14 U/kg/hr (no bolus)</td><td>0.05-0.1 U/kg/hr (often lower)</td></tr><tr><td>Glucose goal</td><td>↓ 50-75 mg/dL/hr</td><td>↓ 50-75 mg/dL/hr</td></tr></table></div><div class="mechanism-box"><div class="mechanism-title">🧬 When to Add Dextrose</div><div class="pathway"><strong>DKA:</strong> When glucose reaches 200-250<br><strong>HHS:</strong> When glucose reaches 250-300<br><br>Add D5 to fluids (D5-0.45% NS)<br><br>WHY? Continue insulin to clear ketones (DKA)<br>or correct osmolality (HHS), but prevent<br>hypoglycemia.<br><br>Target glucose: 150-200 mg/dL</div></div><div class="alert-box"><div class="alert-title">⚠️ Don't Stop Insulin When Glucose Normalizes!</div><p>In DKA, you need insulin to CLOSE THE ANION GAP. Keep infusion running until gap closes, then transition to SubQ.</p></div><button class="btn" onclick="nextStage()">Monitoring →</button></div></div>`;

<script>
// ReasonDx Enhanced Features Module
(function() {
    // Decision tracking
    window.rdxDecisionPath = window.rdxDecisionPath || [];
    window.rdxTotalScore = window.rdxTotalScore || 0;
    window.rdxMaxScore = window.rdxMaxScore || 0;
    window.rdxDifficulty = 'intermediate';
    
    // Difficulty control
    window.rdxSetDifficulty = function(level) {
        window.rdxDifficulty = level;
        document.querySelectorAll('.rdx-diff-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById('rdx-btn-' + level).classList.add('active');
        
        // Update hint visibility
        document.querySelectorAll('.rdx-hint-beginner').forEach(el => {
            el.style.display = level === 'beginner' ? 'block' : 'none';
        });
        document.querySelectorAll('.rdx-hint-advanced').forEach(el => {
            el.style.display = level === 'advanced' ? 'block' : 'none';
        });
    };
    
    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,
            optimalChoice: optimalChoice,
            optimalText: optimalText
        });
        window.rdxTotalScore += points;
        window.rdxMaxScore += maxPoints;
    };
    
    // Show visual debrief
    window.rdxShowDebrief = function() {
        const percentage = window.rdxMaxScore > 0 ? Math.round((window.rdxTotalScore / window.rdxMaxScore) * 100) : 0;
        
        let grade, gradeColor, gradeEmoji;
        if (percentage >= 90) { grade = 'Outstanding!'; gradeColor = '#16a34a'; gradeEmoji = '🏆'; }
        else if (percentage >= 80) { grade = 'Excellent!'; gradeColor = '#2563eb'; gradeEmoji = '⭐'; }
        else if (percentage >= 70) { grade = 'Good Work!'; gradeColor = '#ca8a04'; gradeEmoji = '👍'; }
        else { grade = 'Keep Learning!'; gradeColor = '#dc2626'; gradeEmoji = '📚'; }
        
        let pathHTML = '';
        if (window.rdxDecisionPath.length > 0) {
            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' : 
                               (d.points >= d.maxPoints * 0.5 ? 'rdx-path-suboptimal' : 'rdx-path-wrong');
                let icon = d.isOptimal ? '✓' : (d.points >= d.maxPoints * 0.5 ? '~' : '✗');
                return '<div class="' + pathClass + ' rdx-path-item">' +
                    '<div style="display:flex;justify-content:space-between;align-items:start;">' +
                    '<div>' +
                    '<strong>' + icon + ' Stage ' + d.stage + ':</strong> ' + d.title +
                    '<div style="font-size:0.9rem;margin-top:4px;">Your choice: <strong>' + d.choice + '</strong> - ' + d.outcome + '</div>' +
                    (!d.isOptimal ? '<div style="font-size:0.85rem;color:#6b7280;margin-top:4px;">💡 Better: ' + d.optimalChoice + '</div>' : '') +
                    '</div>' +
                    '<span style="font-size:0.85rem;font-weight:600;background:#f3f4f6;padding:4px 8px;border-radius:4px;">' + d.points + '/' + d.maxPoints + '</span>' +
                    '</div></div>';
            }).join('');
        } else {
            pathHTML = '<p style="color:#6b7280;text-align:center;padding:20px;">Complete the case to see your decision path!</p>';
        }
        
        document.getElementById('rdxDebriefContent').innerHTML = 
            '<div style="text-align:center;margin-bottom:24px;">' +
            '<div style="font-size:4rem;margin-bottom:16px;">' + gradeEmoji + '</div>' +
            '<h2 style="font-size:1.75rem;font-weight:700;color:#1f2937;">Case Complete!</h2>' +
            '<div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px;">' +
            '<span style="font-size:2.5rem;font-weight:700;color:' + gradeColor + ';">' + percentage + '%</span>' +
            '<span style="font-size:1.25rem;color:#6b7280;">' + grade + '</span>' +
            '</div></div>' +
            '<h3 style="font-weight:700;color:#374151;margin-bottom:16px;">📊 Your Decision Path</h3>' +
            '<div style="margin-bottom:24px;">' + pathHTML + '</div>' +
            '<div style="background:#f9fafb;border-radius:12px;padding:16px;margin-bottom:24px;">' +
