<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sting | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#FBBF24;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#D97706,#FBBF24);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(251,191,36,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(251,191,36,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#000;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(251,191,36,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#000}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#000;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">🐝 The Sting</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'42M',wt:'85kg',hx:'Bee sting 20min ago, hives spreading, throat tight',exam:'Diffuse urticaria, mild stridor, no hypotension',vitals:{HR:'108',BP:'128/82',SpO2:'96%'},labs:{Hx:'First systemic reaction'}},int:{age:'55F',wt:'68kg',hx:'Yellow jacket sting, prior anaphylaxis 2yrs ago, no epi used',exam:'Urticaria, wheezing, dizzy',vitals:{HR:'118',BP:'88/58',SpO2:'92%'},labs:{Tryptase:'Pending',Hx:'Prior anaphylaxis'}},adv:{age:'35M',wt:'78kg',hx:'Beekeeper, multiple stings, on beta-blocker for HTN',exam:'Severe angioedema, stridor, refractory hypotension',vitals:{HR:'62',BP:'72/48',SpO2:'88%'},labs:{Hx:'Beta-blocker use'}}};
const Q=[
{t:'Reaction Classification',q:'Systemic urticaria + respiratory symptoms after sting. Grade?',h:'Mueller grading system',o:[{id:'a',txt:'Grade III (systemic + respiratory)',c:1,p:100},{id:'b',txt:'Large local reaction',c:0,p:0},{id:'c',txt:'Grade I (urticaria only)',c:0,p:30}],fb:{1:'<b>Correct!</b> Mueller: I=urticaria/pruritus, II=+angioedema/GI, III=+respiratory, IV=+cardiovascular. Grade III-IV need VIT.',0:'<b>Mueller grades:</b> I-II cutaneous, III respiratory, IV cardiovascular.'}},
{t:'Acute Management',q:'First-line treatment for venom anaphylaxis?',h:'Same as all anaphylaxis',o:[{id:'a',txt:'Epinephrine IM 0.3-0.5mg (anterolateral thigh)',c:1,p:100},{id:'b',txt:'Antihistamines first',c:0,p:20},{id:'c',txt:'IV steroids',c:0,p:20}],fb:{1:'<b>Correct!</b> Epinephrine IM first, always. Antihistamines and steroids are adjuncts only.',0:'<b>Epinephrine first!</b> Delays increase mortality risk.'}},
{t:'Beta-Blocker Challenge',q:'Anaphylaxis in patient on beta-blocker, refractory to epi. Next?',h:'Glucagon bypasses beta-blockade',o:[{id:'a',txt:'Glucagon 1-5mg IV (bypasses beta-receptor)',c:1,p:100},{id:'b',txt:'More epinephrine only',c:0,p:30},{id:'c',txt:'Stop treatment',c:0,p:0}],fb:{1:'<b>Correct!</b> Glucagon activates cAMP via non-adrenergic pathway. Also consider IV epinephrine infusion.',0:'<b>Glucagon:</b> 1-5mg IV for beta-blocker refractory anaphylaxis.'}},
{t:'Testing Indication',q:'Who needs venom allergy testing?',h:'Risk stratification',o:[{id:'a',txt:'Any systemic reaction (not just large local)',c:1,p:100},{id:'b',txt:'All bee stings',c:0,p:10},{id:'c',txt:'Only Grade IV reactions',c:0,p:30}],fb:{1:'<b>Correct!</b> Test anyone with systemic symptoms. Large local reactions have <5% risk of future anaphylaxis.',0:'<b>Testing:</b> Systemic reactions warrant testing. Large local = low risk.'}},
{t:'Testing Timing',q:'When to perform venom skin testing after reaction?',h:'Allow sensitization to stabilize',o:[{id:'a',txt:'Wait 4-6 weeks (avoid false negatives)',c:1,p:100},{id:'b',txt:'Immediately',c:0,p:20},{id:'c',txt:'Wait 1 year',c:0,p:30}],fb:{1:'<b>Correct!</b> Wait 4-6 weeks. Testing too early may yield false negatives due to anergy. sIgE can be drawn earlier.',0:'<b>Timing:</b> 4-6 weeks for skin testing. sIgE can be earlier.'}},
{t:'VIT Indication',q:'Grade III reaction, positive venom testing. Management?',h:'Venom immunotherapy',o:[{id:'a',txt:'Venom immunotherapy (VIT) - 98% effective',c:1,p:100},{id:'b',txt:'Avoidance only',c:0,p:30},{id:'c',txt:'Epi auto-injector only',c:0,p:40}],fb:{1:'<b>Correct!</b> VIT reduces re-sting reaction from 60% to 2%. Only disease-modifying treatment. Duration typically 5 years.',0:'<b>VIT:</b> 98% effective. Standard 5-year course.'}},
{t:'VIT Duration',q:'Standard duration of venom immunotherapy?',h:'Landmark studies',o:[{id:'a',txt:'5 years (can consider lifelong if severe initial reaction or mast cell disorder)',c:1,p:100},{id:'b',txt:'1 year',c:0,p:20},{id:'c',txt:'Lifelong for everyone',c:0,p:30}],fb:{1:'<b>Correct!</b> Standard 5 years. Consider indefinite if: initial severe reaction, systemic reaction during VIT, mast cell disorder, high exposure.',0:'<b>Duration:</b> 5 years standard. Longer for high-risk patients.'}},
{t:'Mastocytosis Connection',q:'Recurrent severe sting anaphylaxis with elevated baseline tryptase. Consider?',h:'Mast cell disorder screening',o:[{id:'a',txt:'Mastocytosis/mast cell activation syndrome',c:1,p:100},{id:'b',txt:'IgE deficiency',c:0,p:0},{id:'c',txt:'Complement deficiency',c:0,p:10}],fb:{1:'<b>Correct!</b> Elevated baseline tryptase (>11.4) suggests mastocytosis. Higher VIT failure risk. Consider lifelong VIT and bone marrow evaluation.',0:'<b>Mastocytosis:</b> Screen with baseline tryptase if severe reactions.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>🐝 The Sting</h1><p style="color:var(--muted);margin-bottom:32px">Venom Allergy: Grading, acute management, testing, VIT, mastocytosis</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🦟 Envenomation Emergency</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Venom Allergy Pearls</div><div class="pearl-item"><b>Mueller:</b> I-II cutaneous, III respiratory, IV cardiovascular</div><div class="pearl-item"><b>Testing:</b> Wait 4-6 weeks, systemic reactions only</div><div class="pearl-item"><b>VIT:</b> 98% effective, standard 5 years</div><div class="pearl-item"><b>Beta-blocker:</b> Glucagon 1-5mg IV if refractory</div><div class="pearl-item"><b>Mastocytosis:</b> Check baseline tryptase if severe</div></div><div class="cross-link"><a href="../mechanism/allergy-immunology.html">MechanismDx: Allergy</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
