<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Swelling Mystery | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#8B5CF6;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#7C3AED,#8B5CF6);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(139,92,246,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(139,92,246,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(139,92,246,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">😮 The Swelling Mystery</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'24F',wt:'62kg',hx:'Recurrent facial/lip swelling since teens, no hives, episodes last 2-3 days',exam:'Right facial edema, lip swelling, no urticaria',vitals:{HR:'78',BP:'118/72',SpO2:'99%'},labs:{C4:'4 (L)',Hx:'Father has similar episodes'}},int:{age:'32M',wt:'75kg',hx:'Severe abdominal pain episodes, diagnosed as IBS, now facial swelling',exam:'Periorbital edema, diffuse abdominal tenderness, hypoactive bowel sounds',vitals:{HR:'92',BP:'108/68',SpO2:'98%'},labs:{C4:'6 (L)',C1INH:'12 (L)',Hx:'Sister died of laryngeal edema'}},adv:{age:'45F',wt:'68kg',hx:'New onset angioedema at age 42, no family history, on ACEi, weight loss',exam:'Tongue swelling, mild stridor',vitals:{HR:'88',BP:'142/88',SpO2:'95%'},labs:{C4:'2 (L)',C1INH:'8 (L)',C1q:'Low',Hx:'B-symptoms present'}}};
const Q=[
{t:'Screening Test',q:'Best initial screening test for hereditary angioedema?',h:'Highly sensitive even between attacks',o:[{id:'a',txt:'C4 level (low in >95% of HAE even between attacks)',c:1,p:100},{id:'b',txt:'C3 level',c:0,p:10},{id:'c',txt:'Total IgE',c:0,p:0}],fb:{1:'<b>Correct!</b> C4 is the best screening test - low in >95% of HAE patients even during asymptomatic periods. If C4 normal, HAE very unlikely.',0:'<b>C4:</b> Screen first. If low, proceed to C1-INH level and function.'}},
{t:'HAE Classification',q:'Low C4, low C1-INH level, low C1-INH function. HAE type?',h:'Three main types based on lab patterns',o:[{id:'a',txt:'Type I HAE (85% of cases - quantitative deficiency)',c:1,p:100},{id:'b',txt:'Type II HAE (dysfunctional protein)',c:0,p:40},{id:'c',txt:'Acquired angioedema',c:0,p:20}],fb:{1:'<b>Correct!</b> Type I = low level AND function (85%). Type II = normal/high level but low function (15%). Both are autosomal dominant.',0:'<b>HAE Types:</b> I = low quantity, II = dysfunctional protein, both have low C4.'}},
{t:'Type II Recognition',q:'C4 low, C1-INH level NORMAL, C1-INH function LOW. Diagnosis?',h:'Protein present but doesnt work',o:[{id:'a',txt:'HAE Type II (dysfunctional C1-INH)',c:1,p:100},{id:'b',txt:'HAE Type I',c:0,p:30},{id:'c',txt:'Normal variant',c:0,p:0}],fb:{1:'<b>Correct!</b> Type II has normal or elevated C1-INH level but reduced function. Must test both level AND function to catch Type II.',0:'<b>Type II:</b> Normal level but low function. Always test function!'}},
{t:'Acquired vs Hereditary',q:'New onset angioedema at age 45, low C4, low C1-INH, LOW C1q. Concern?',h:'C1q helps differentiate',o:[{id:'a',txt:'Acquired C1-INH deficiency (low C1q suggests lymphoproliferative/autoimmune)',c:1,p:100},{id:'b',txt:'HAE Type I',c:0,p:30},{id:'c',txt:'ACE-inhibitor angioedema',c:0,p:20}],fb:{1:'<b>Correct!</b> Low C1q suggests acquired disease - associated with lymphoma, MGUS, autoimmune conditions. HAE has normal C1q. Late onset = think acquired.',0:'<b>Acquired:</b> Low C1q, late onset, no family history. Screen for malignancy.'}},
{t:'Abdominal Attacks',q:'HAE patient with severe cramping abdominal pain, vomiting, no peritoneal signs. Cause?',h:'Common HAE manifestation',o:[{id:'a',txt:'GI wall angioedema (bowel wall edema mimics acute abdomen)',c:1,p:100},{id:'b',txt:'Appendicitis',c:0,p:20},{id:'c',txt:'Unrelated IBS',c:0,p:10}],fb:{1:'<b>Correct!</b> GI attacks occur in ~90% of HAE patients. Can cause severe pain, ascites, mimics surgical abdomen. Treat with HAE therapy, not surgery.',0:'<b>GI attacks:</b> Common in HAE. Look for pattern, treat medically first.'}},
{t:'Acute Treatment',q:'HAE laryngeal attack with stridor. First-line treatment?',h:'Bradykinin pathway target',o:[{id:'a',txt:'Icatibant (bradykinin B2 receptor antagonist) OR C1-INH concentrate',c:1,p:100},{id:'b',txt:'Epinephrine and antihistamines',c:0,p:20},{id:'c',txt:'High-dose corticosteroids',c:0,p:10}],fb:{1:'<b>Correct!</b> HAE is bradykinin-mediated, NOT histamine. Epi/antihistamines/steroids dont work. Use icatibant, ecallantide, or C1-INH concentrate.',0:'<b>HAE treatment:</b> Target bradykinin. Antihistamines/steroids ineffective.'}},
{t:'Prophylaxis Options',q:'HAE patient with 4+ attacks/month despite on-demand therapy. Prophylaxis?',h:'Modern prophylactic options',o:[{id:'a',txt:'Lanadelumab (anti-kallikrein mAb) or berotralstat (oral kallikrein inhibitor)',c:1,p:100},{id:'b',txt:'Daily antihistamines',c:0,p:0},{id:'c',txt:'Chronic steroids',c:0,p:0}],fb:{1:'<b>Correct!</b> Lanadelumab (SC q2-4wks) or berotralstat (oral daily) reduce attacks 70-90%. C1-INH prophylaxis also effective.',0:'<b>Prophylaxis:</b> Lanadelumab, berotralstat, or C1-INH. NOT antihistamines/steroids.'}},
{t:'Triggers & Precautions',q:'What commonly triggers HAE attacks and should be avoided?',h:'ACE-inhibitors especially dangerous',o:[{id:'a',txt:'ACE inhibitors, estrogen-containing contraceptives, trauma/procedures',c:1,p:100},{id:'b',txt:'NSAIDs',c:0,p:20},{id:'c',txt:'Beta-blockers',c:0,p:10}],fb:{1:'<b>Correct!</b> ACEi absolutely contraindicated (inhibits bradykinin breakdown). Estrogens can worsen attacks. Give prophylaxis before dental/surgical procedures.',0:'<b>Triggers:</b> ACEi contraindicated, avoid estrogens, pre-procedure prophylaxis.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>😮 The Swelling Mystery</h1><p style="color:var(--muted);margin-bottom:32px">Hereditary Angioedema: Types, diagnosis, C4/C1-INH testing, acute treatment, prophylaxis</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">😮 Recurrent Angioedema</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'\">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">HAE Clinical Pearls</div><div class="pearl-item"><b>Screening:</b> C4 level (low in >95% even between attacks)</div><div class="pearl-item"><b>Type I:</b> Low C1-INH level AND function (85%)</div><div class="pearl-item"><b>Type II:</b> Normal level, low function (15%)</div><div class="pearl-item"><b>Acquired:</b> Low C1q, late onset, check for lymphoma</div><div class="pearl-item"><b>Treatment:</b> Icatibant, C1-INH, ecallantide (NOT epi/antihistamines)</div><div class="pearl-item"><b>Prophylaxis:</b> Lanadelumab, berotralstat, C1-INH</div><div class="pearl-item"><b>Avoid:</b> ACE inhibitors absolutely contraindicated</div></div><div class="cross-link"><a href="angioedema-adventure-enhanced.html">Related: Angioedema Differential</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
