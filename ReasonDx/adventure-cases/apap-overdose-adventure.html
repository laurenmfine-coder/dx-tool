<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Empty Bottle | ReasonDx Adventure</title>
    <style>
        :root { --bg: #0F172A; --card: #1E293B; --border: #334155; --text: #F1F5F9; --muted: #94A3B8; --accent: #84CC16; --success: #10B981; --warning: #F59E0B; --danger: #DC2626; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
        .header { background: linear-gradient(135deg, #65A30D 0%, #84CC16 100%); padding: 12px 20px; position: sticky; top: 0; z-index: 100; }
        .header-row { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .header-title { font-size: 1.1rem; font-weight: 600; color: white; }
        .stat { background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 8px; }
        .stat-value { font-size: 1.1rem; font-weight: 700; font-family: monospace; color: white; }
        .stat-label { font-size: 0.6rem; opacity: 0.8; text-transform: uppercase; color: white; }
        .main { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 20px; }
        .card-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
        .card-phase { font-size: 0.75rem; color: var(--accent); text-transform: uppercase; margin-bottom: 4px; }
        .card-title { font-size: 1.5rem; font-weight: 700; }
        .card-body { padding: 24px; }
        .narrative { background: linear-gradient(135deg, rgba(132,204,22,0.1), rgba(101,163,13,0.1)); border-left: 4px solid var(--accent); padding: 20px 24px; border-radius: 0 12px 12px 0; margin-bottom: 24px; line-height: 1.8; }
        .narrative .hl { background: rgba(132,204,22,0.3); padding: 2px 6px; border-radius: 4px; font-weight: 500; }
        .setup-screen { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; text-align: center; }
        .setup-screen h1 { font-size: 2rem; margin-bottom: 8px; }
        .setup-screen .subtitle { color: var(--muted); margin-bottom: 32px; }
        .start-btn { background: var(--accent); color: white; border: none; padding: 16px 48px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .question-section { margin-bottom: 32px; }
        .question-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .question-number { background: var(--accent); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .question-text { font-size: 1.1rem; font-weight: 600; }
        .radio-options { display: flex; flex-direction: column; gap: 10px; }
        .radio-option { display: flex; align-items: center; gap: 12px; padding: 14px 18px; background: rgba(0,0,0,0.2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; }
        .radio-option:hover { border-color: var(--accent); }
        .radio-option.selected { border-color: var(--accent); background: rgba(132,204,22,0.15); }
        .radio-option.correct { border-color: var(--success); background: rgba(16,185,129,0.15); }
        .radio-option.incorrect { border-color: var(--danger); background: rgba(220,38,38,0.15); }
        .radio-circle { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; }
        .radio-option.selected .radio-circle { border-color: var(--accent); background: radial-gradient(circle, var(--accent) 40%, transparent 40%); }
        .feedback { padding: 20px; border-radius: 12px; margin: 20px 0; }
        .feedback.excellent { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); }
        .feedback.acceptable { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); }
        .feedback-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .feedback-icon { font-size: 1.5rem; }
        .feedback-title { font-weight: 700; }
        .feedback-text { color: var(--muted); line-height: 1.7; }
        .feedback-text strong { color: var(--text); }
        .alert { padding: 16px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 12px; }
        .alert.danger { background: rgba(220,38,38,0.15); border: 1px solid rgba(220,38,38,0.3); }
        .alert.info { background: rgba(132,204,22,0.15); border: 1px solid rgba(132,204,22,0.3); }
        .alert-icon { font-size: 1.5rem; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: 600; margin-bottom: 4px; }
        .alert-desc { font-size: 0.9rem; color: var(--muted); }
        .btn { padding: 14px 28px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 1rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-row { display: flex; gap: 12px; margin-top: 24px; }
        .lab-panel { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .lab-panel-title { font-weight: 600; margin-bottom: 16px; color: var(--accent); }
        .lab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .lab-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; }
        .lab-name { font-size: 0.8rem; color: var(--muted); }
        .lab-value { font-size: 1.1rem; font-weight: 700; }
        .lab-value.critical { color: var(--danger); }
        .lab-value.high { color: var(--warning); }
        .lab-range { font-size: 0.7rem; color: var(--muted); }
        .outcome { text-align: center; padding: 40px 20px; }
        .outcome-icon { font-size: 4rem; margin-bottom: 16px; }
        .outcome-title { font-size: 2rem; font-weight: 700; color: var(--success); margin-bottom: 8px; }
        .outcome-desc { color: var(--muted); max-width: 600px; margin: 0 auto 24px; }
        .score-summary { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 24px; margin: 24px auto; max-width: 500px; }
        .score-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .score-row:last-child { border-bottom: none; }
        .nomogram { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .nomogram-title { font-weight: 600; color: var(--accent); margin-bottom: 12px; }
        .nomogram-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .nomogram-item:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <header class="header"><div class="header-row"><div class="header-title">💊 The Empty Bottle</div><div class="stat"><div class="stat-value" id="scoreDisplay">0</div><div class="stat-label">Points</div></div></div></header>
    <main class="main"><div id="stageContainer"></div></main>
    <script>
    const state = { stage:'setup', score:0 };
    
    function addScore(pts) { state.score += pts; document.getElementById('scoreDisplay').textContent = state.score; }

    const stages = {
        setup: { render: () => `
            <div class="setup-screen">
                <h1>💊 The Empty Bottle</h1>
                <p class="subtitle">Acetaminophen toxicity management</p>
                <button class="start-btn" onclick="goTo('presentation')">Begin Case →</button>
            </div>`
        },
        presentation: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Emergency Department</div><div class="card-title">📋 Intentional Ingestion</div></div>
                <div class="card-body">
                    <div class="narrative">A <span class="hl">19-year-old female</span> is brought in by her roommate after admitting to taking <span class="hl">"a whole bottle" of Extra Strength Tylenol</span> approximately <span class="hl">6 hours ago</span> following an argument with her boyfriend.<br><br>The bottle contained <span class="hl">50 tablets of 500mg acetaminophen</span> (estimated 25g total). She now has <span class="hl">mild nausea</span> but no vomiting. She appears <span class="hl">alert and oriented</span> with normal vital signs.<br><br>Vitals: BP 118/72, HR 78, RR 14, Temp 37.0°C.</div>
                    <div class="alert danger"><span class="alert-icon">⚠️</span><div class="alert-content"><div class="alert-title">Toxic Dose</div><div class="alert-desc">Toxic dose: >150 mg/kg or >7.5g in adults. This patient ingested ~25g (>400 mg/kg for 60kg patient)</div></div></div>
                    <div class="btn-row"><button class="btn btn-primary" onclick="goTo('phases')">Understand Phases →</button></div>
                </div>
            </div>`
        },
        phases: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Pathophysiology</div><div class="card-title">⏱️ Clinical Phases</div></div>
                <div class="card-body">
                    <div class="alert info"><span class="alert-icon">📋</span><div class="alert-content"><div class="alert-title">APAP Toxicity Timeline</div><div class="alert-desc">Phase 1 (0-24h): Asymptomatic or mild GI | Phase 2 (24-72h): Hepatotoxicity begins | Phase 3 (72-96h): Peak injury | Phase 4: Recovery or death</div></div></div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">1</div><div class="question-text">At 6 hours post-ingestion with only mild nausea, why is this patient still at serious risk?</div></div>
                        <div class="radio-options" id="phaseOpts">
                            <div class="radio-option" data-id="asymptomatic" onclick="selectPhase('asymptomatic')"><div class="radio-circle"></div><div><strong>Phase 1 is often asymptomatic</strong><br><small style="color:var(--muted)">Liver injury hasn't manifested yet</small></div></div>
                            <div class="radio-option" data-id="no_risk" onclick="selectPhase('no_risk')"><div class="radio-circle"></div><div><strong>No symptoms = no risk</strong><br><small style="color:var(--muted)">She would be sick by now if toxic</small></div></div>
                            <div class="radio-option" data-id="vomited" onclick="selectPhase('vomited')"><div class="radio-circle"></div><div><strong>She likely vomited most of it</strong><br><small style="color:var(--muted)">GI decontamination occurred</small></div></div>
                        </div>
                    </div>
                    <div id="phaseFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="phaseSubmit" onclick="submitPhase()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        nomogram: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Risk Assessment</div><div class="card-title">📊 Rumack-Matthew Nomogram</div></div>
                <div class="card-body">
                    <div class="lab-panel">
                        <div class="lab-panel-title">4-Hour Acetaminophen Level</div>
                        <div class="lab-grid">
                            <div class="lab-item"><div class="lab-name">APAP Level</div><div class="lab-value critical">185 mcg/mL</div><div class="lab-range">Therapeutic &lt;20</div></div>
                            <div class="lab-item"><div class="lab-name">Time Since Ingestion</div><div class="lab-value">6 hours</div><div class="lab-range">-</div></div>
                            <div class="lab-item"><div class="lab-name">AST</div><div class="lab-value">32 U/L</div><div class="lab-range">10-40</div></div>
                            <div class="lab-item"><div class="lab-name">ALT</div><div class="lab-value">28 U/L</div><div class="lab-range">7-56</div></div>
                        </div>
                    </div>
                    <div class="nomogram">
                        <div class="nomogram-title">Rumack-Matthew Treatment Line</div>
                        <div class="nomogram-item"><span>4 hours post-ingestion</span><span>≥150 mcg/mL = Treat</span></div>
                        <div class="nomogram-item"><span>8 hours post-ingestion</span><span>≥75 mcg/mL = Treat</span></div>
                        <div class="nomogram-item"><span>12 hours post-ingestion</span><span>≥37.5 mcg/mL = Treat</span></div>
                        <div class="nomogram-item"><span>16 hours post-ingestion</span><span>≥18.75 mcg/mL = Treat</span></div>
                    </div>
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">2</div><div class="question-text">With APAP level 185 mcg/mL at 6 hours, does this patient need treatment?</div></div>
                        <div class="radio-options" id="nomoOpts">
                            <div class="radio-option" data-id="yes_above" onclick="selectNomo('yes_above')"><div class="radio-circle"></div><div><strong>Yes - above treatment line</strong><br><small style="color:var(--muted)">Level exceeds threshold at this time point</small></div></div>
                            <div class="radio-option" data-id="no_normal_lft" onclick="selectNomo('no_normal_lft')"><div class="radio-circle"></div><div><strong>No - LFTs are normal</strong><br><small style="color:var(--muted)">Wait for liver injury to develop</small></div></div>
                            <div class="radio-option" data-id="recheck" onclick="selectNomo('recheck')"><div class="radio-circle"></div><div><strong>Recheck level in 4 hours first</strong><br><small style="color:var(--muted)">Need serial levels</small></div></div>
                        </div>
                    </div>
                    <div id="nomoFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="nomoSubmit" onclick="submitNomo()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        antidote: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Treatment</div><div class="card-title">💉 N-Acetylcysteine (NAC)</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">3</div><div class="question-text">What is the mechanism of NAC in acetaminophen toxicity?</div></div>
                        <div class="radio-options" id="nacOpts">
                            <div class="radio-option" data-id="glutathione" onclick="selectNAC('glutathione')"><div class="radio-circle"></div><div><strong>Replenishes glutathione stores</strong><br><small style="color:var(--muted)">Detoxifies toxic metabolite NAPQI</small></div></div>
                            <div class="radio-option" data-id="binding" onclick="selectNAC('binding')"><div class="radio-circle"></div><div><strong>Binds APAP in GI tract</strong><br><small style="color:var(--muted)">Prevents absorption</small></div></div>
                            <div class="radio-option" data-id="excretion" onclick="selectNAC('excretion')"><div class="radio-circle"></div><div><strong>Enhances renal excretion</strong><br><small style="color:var(--muted)">Increases APAP clearance</small></div></div>
                            <div class="radio-option" data-id="cyp450" onclick="selectNAC('cyp450')"><div class="radio-circle"></div><div><strong>Inhibits CYP450 metabolism</strong><br><small style="color:var(--muted)">Blocks NAPQI formation</small></div></div>
                        </div>
                    </div>
                    <div id="nacFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="nacSubmit" onclick="submitNAC()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        timing: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Timing</div><div class="card-title">⏰ NAC Window</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">4</div><div class="question-text">What is the critical window for NAC efficacy?</div></div>
                        <div class="radio-options" id="timeOpts">
                            <div class="radio-option" data-id="8h" onclick="selectTime('8h')"><div class="radio-circle"></div><div><strong>Within 8 hours of ingestion</strong><br><small style="color:var(--muted)">Nearly 100% effective if given in time</small></div></div>
                            <div class="radio-option" data-id="24h" onclick="selectTime('24h')"><div class="radio-circle"></div><div><strong>Within 24 hours</strong><br><small style="color:var(--muted)">Still very effective</small></div></div>
                            <div class="radio-option" data-id="anytime" onclick="selectTime('anytime')"><div class="radio-circle"></div><div><strong>Any time after ingestion</strong><br><small style="color:var(--muted)">Equally effective whenever given</small></div></div>
                        </div>
                    </div>
                    <div id="timeFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="timeSubmit" onclick="submitTime()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        protocol: { render: () => `
            <div class="card">
                <div class="card-header"><div class="card-phase">Protocol</div><div class="card-title">📋 NAC Administration</div></div>
                <div class="card-body">
                    <div class="question-section">
                        <div class="question-header"><div class="question-number">5</div><div class="question-text">Which NAC protocol is preferred for most patients?</div></div>
                        <div class="radio-options" id="protOpts">
                            <div class="radio-option" data-id="iv21" onclick="selectProt('iv21')"><div class="radio-circle"></div><div><strong>IV 21-hour protocol</strong><br><small style="color:var(--muted)">150 mg/kg load → 50 mg/kg over 4h → 100 mg/kg over 16h</small></div></div>
                            <div class="radio-option" data-id="oral72" onclick="selectProt('oral72')"><div class="radio-circle"></div><div><strong>Oral 72-hour protocol</strong><br><small style="color:var(--muted)">140 mg/kg load → 70 mg/kg q4h × 17 doses</small></div></div>
                            <div class="radio-option" data-id="both" onclick="selectProt('both')"><div class="radio-circle"></div><div><strong>Both are acceptable options</strong><br><small style="color:var(--muted)">IV often preferred for vomiting/severe cases</small></div></div>
                        </div>
                    </div>
                    <div id="protFeedback"></div>
                    <div class="btn-row"><button class="btn btn-primary" id="protSubmit" onclick="submitProt()" disabled>Submit →</button></div>
                </div>
            </div>`
        },
        outcome: { render: () => `
            <div class="card"><div class="card-body">
                <div class="outcome">
                    <div class="outcome-icon">🎉</div>
                    <div class="outcome-title">Patient Recovered!</div>
                    <div class="outcome-desc">NAC was started within 6 hours of ingestion. LFTs peaked at AST 84, ALT 92 on day 2 and normalized by day 4. She completed the 21-hour IV NAC protocol, received psychiatric evaluation, and was discharged to outpatient mental health follow-up on day 3.</div>
                </div>
                <div class="score-summary">
                    <h3 style="margin-bottom:16px">Performance</h3>
                    <div class="score-row"><span>Phase Understanding</span><span>${state.phaseScore||0}/100</span></div>
                    <div class="score-row"><span>Nomogram Interpretation</span><span>${state.nomoScore||0}/100</span></div>
                    <div class="score-row"><span>NAC Mechanism</span><span>${state.nacScore||0}/100</span></div>
                    <div class="score-row"><span>Timing Knowledge</span><span>${state.timeScore||0}/100</span></div>
                    <div class="score-row"><span>Protocol Selection</span><span>${state.protScore||0}/100</span></div>
                    <div class="score-row" style="border-top:2px solid var(--border);padding-top:12px"><strong>Total</strong><strong>${state.score}</strong></div>
                </div>
                <div class="feedback excellent"><div class="feedback-header"><span class="feedback-icon">💡</span><span class="feedback-title">APAP Toxicity Pearls</span></div><div class="feedback-text">
                    • <strong>Toxic dose:</strong> >150 mg/kg single ingestion or >7.5g in adults<br>
                    • <strong>Phase 1 (0-24h):</strong> Often asymptomatic! Don't be falsely reassured<br>
                    • <strong>NAPQI:</strong> Toxic metabolite normally detoxified by glutathione; depleted in overdose<br>
                    • <strong>Nomogram:</strong> Plot 4+ hour level on Rumack-Matthew; treat if above treatment line<br>
                    • <strong>NAC window:</strong> Nearly 100% effective if started within 8 hours<br>
                    • <strong>NAC mechanism:</strong> Replenishes glutathione to detoxify NAPQI<br>
                    • <strong>Late presentation:</strong> NAC still beneficial even after 24h (improves outcomes in hepatotoxicity)<br>
                    • <strong>King's College Criteria:</strong> For transplant consideration (pH <7.3, or INR >6.5 + Cr >3.4 + Grade 3-4 encephalopathy)
                </div></div>
                <div class="btn-row"><button class="btn btn-primary" onclick="location.reload()">Play Again</button></div>
            </div></div>`
        }
    };

    let selectedPhase = null;
    function selectPhase(id) { selectedPhase = id; document.querySelectorAll('#phaseOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('phaseSubmit').disabled = false; }
    function submitPhase() {
        document.querySelectorAll('#phaseOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'asymptomatic') o.classList.add('correct');
            else if (o.dataset.id === selectedPhase) o.classList.add('incorrect');
        });
        state.phaseScore = selectedPhase === 'asymptomatic' ? 100 : 30;
        addScore(selectedPhase === 'asymptomatic' ? 40 : 10);
        document.getElementById('phaseFeedback').innerHTML = `<div class="feedback ${selectedPhase==='asymptomatic'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedPhase==='asymptomatic'?'✅':'📚'}</span><span class="feedback-title">${selectedPhase==='asymptomatic'?'Correct!':'Critical Point'}</span></div><div class="feedback-text"><strong>Phase 1 is often asymptomatic!</strong> This is the most dangerous aspect of APAP toxicity. Patients may feel fine initially while hepatic injury is developing. Liver enzyme elevation typically doesn't appear until 24-48 hours.</div></div>`;
        document.getElementById('phaseSubmit').textContent = 'Continue →';
        document.getElementById('phaseSubmit').onclick = () => goTo('nomogram');
    }

    let selectedNomo = null;
    function selectNomo(id) { selectedNomo = id; document.querySelectorAll('#nomoOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('nomoSubmit').disabled = false; }
    function submitNomo() {
        document.querySelectorAll('#nomoOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'yes_above') o.classList.add('correct');
            else if (o.dataset.id === selectedNomo) o.classList.add('incorrect');
        });
        state.nomoScore = selectedNomo === 'yes_above' ? 100 : 30;
        addScore(selectedNomo === 'yes_above' ? 40 : 10);
        document.getElementById('nomoFeedback').innerHTML = `<div class="feedback ${selectedNomo==='yes_above'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedNomo==='yes_above'?'✅':'📚'}</span><span class="feedback-title">${selectedNomo==='yes_above'?'Correct!':'Critical Point'}</span></div><div class="feedback-text"><strong>Treat based on nomogram, not LFTs!</strong> At 6 hours, treatment line is ~112 mcg/mL. Level of 185 is well above. Normal LFTs at this point are expected - hepatotoxicity hasn't manifested yet. Don't wait for liver injury!</div></div>`;
        document.getElementById('nomoSubmit').textContent = 'Continue →';
        document.getElementById('nomoSubmit').onclick = () => goTo('antidote');
    }

    let selectedNAC = null;
    function selectNAC(id) { selectedNAC = id; document.querySelectorAll('#nacOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('nacSubmit').disabled = false; }
    function submitNAC() {
        document.querySelectorAll('#nacOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'glutathione') o.classList.add('correct');
            else if (o.dataset.id === selectedNAC) o.classList.add('incorrect');
        });
        state.nacScore = selectedNAC === 'glutathione' ? 100 : 40;
        addScore(selectedNAC === 'glutathione' ? 40 : 15);
        document.getElementById('nacFeedback').innerHTML = `<div class="feedback ${selectedNAC==='glutathione'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedNAC==='glutathione'?'✅':'📚'}</span><span class="feedback-title">${selectedNAC==='glutathione'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>NAC replenishes glutathione,</strong> which is needed to detoxify NAPQI (the toxic metabolite of acetaminophen). When glutathione is depleted, NAPQI binds to hepatocytes causing necrosis.</div></div>`;
        document.getElementById('nacSubmit').textContent = 'Continue →';
        document.getElementById('nacSubmit').onclick = () => goTo('timing');
    }

    let selectedTime = null;
    function selectTime(id) { selectedTime = id; document.querySelectorAll('#timeOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('timeSubmit').disabled = false; }
    function submitTime() {
        document.querySelectorAll('#timeOpts .radio-option').forEach(o => {
            if (o.dataset.id === '8h') o.classList.add('correct');
            else if (o.dataset.id === selectedTime) o.classList.add('incorrect');
        });
        state.timeScore = selectedTime === '8h' ? 100 : (selectedTime === '24h' ? 60 : 30);
        addScore(selectedTime === '8h' ? 40 : (selectedTime === '24h' ? 25 : 10));
        document.getElementById('timeFeedback').innerHTML = `<div class="feedback ${selectedTime==='8h'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedTime==='8h'?'✅':'📚'}</span><span class="feedback-title">${selectedTime==='8h'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>Within 8 hours:</strong> NAC is nearly 100% effective at preventing hepatotoxicity. Efficacy decreases after 8 hours but NAC is still beneficial even late (improves survival in established hepatotoxicity).</div></div>`;
        document.getElementById('timeSubmit').textContent = 'Continue →';
        document.getElementById('timeSubmit').onclick = () => goTo('protocol');
    }

    let selectedProt = null;
    function selectProt(id) { selectedProt = id; document.querySelectorAll('#protOpts .radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id)); document.getElementById('protSubmit').disabled = false; }
    function submitProt() {
        document.querySelectorAll('#protOpts .radio-option').forEach(o => {
            if (o.dataset.id === 'both') o.classList.add('correct');
            else if (o.dataset.id === selectedProt) o.classList.add('incorrect');
        });
        state.protScore = selectedProt === 'both' ? 100 : 60;
        addScore(selectedProt === 'both' ? 40 : 25);
        document.getElementById('protFeedback').innerHTML = `<div class="feedback ${selectedProt==='both'?'excellent':'acceptable'}"><div class="feedback-header"><span class="feedback-icon">${selectedProt==='both'?'✅':'📚'}</span><span class="feedback-title">${selectedProt==='both'?'Correct!':'Review'}</span></div><div class="feedback-text"><strong>Both protocols are effective.</strong> IV 21-hour is often preferred (faster, no GI issues, better for vomiting patients). Oral 72-hour is an option if IV unavailable. Continue NAC until APAP undetectable, INR <2, and improving LFTs.</div></div>`;
        document.getElementById('protSubmit').textContent = 'Complete →';
        document.getElementById('protSubmit').onclick = () => goTo('outcome');
    }

    function goTo(id) { state.stage = id; document.getElementById('stageContainer').innerHTML = stages[id].render(); window.scrollTo(0,0); }
    document.addEventListener('DOMContentLoaded', () => goTo('setup'));
    </script>
</body>
</html>
