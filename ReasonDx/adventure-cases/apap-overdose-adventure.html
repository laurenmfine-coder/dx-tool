<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Silent Toxin | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#EF4444;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#B91C1C,#EF4444);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(239,68,68,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(239,68,68,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(239,68,68,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#FCA5A5;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">💊 The Silent Toxin</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'22F',wt:'58kg',hx:'Intentional ingestion of ~30 Tylenol tablets 4 hours ago',exam:'Alert, mild nausea, RUQ tenderness, no jaundice',vitals:{HR:'88',BP:'118/72',Temp:'98.4°F',SpO2:'99%'},labs:{APAP:'180 mcg/mL',AST:'42',ALT:'38',INR:'1.0',Hx:'4 hours post-ingestion'}},int:{age:'35M',wt:'75kg',hx:'Chronic alcohol use, taking extra-strength Tylenol for days for back pain',exam:'Jaundiced, confused, RUQ tenderness, asterixis',vitals:{HR:'102',BP:'98/62',Temp:'99.8°F',SpO2:'96%'},labs:{APAP:'45 mcg/mL',AST:'8500',ALT:'6200',INR:'4.2',Hx:'Staggered ingestion'}},adv:{age:'28F',wt:'62kg',hx:'Unknown time of ingestion, found unresponsive, empty pill bottles',exam:'Obtunded, jaundiced, diffuse abdominal tenderness, coagulopathic',vitals:{HR:'118',BP:'88/52',Temp:'97.2°F',SpO2:'94%'},labs:{APAP:'25 mcg/mL',AST:'12000',ALT:'9500',INR:'6.8',Cr:'2.8',Hx:'Unknown timing'}}};
const Q=[
{t:'Toxic Dose',q:'What is the potentially toxic dose of acetaminophen in a single acute ingestion?',h:'Weight-based threshold',o:[{id:'a',txt:'>150 mg/kg or >7.5-10g total in adults',c:1,p:100},{id:'b',txt:'Any amount above recommended dose',c:0,p:30},{id:'c',txt:'>500 mg/kg',c:0,p:10}],fb:{1:'<b>Correct!</b> Toxic threshold: >150 mg/kg single dose or >7.5g in adults. Lower threshold (>75 mg/kg) in high-risk patients (chronic alcohol, malnutrition, enzyme-inducing drugs).',0:'<b>Toxic dose:</b> >150 mg/kg or >7.5-10g adults. Lower for high-risk patients.'}},
{t:'Rumack-Matthew Nomogram',q:'When can the Rumack-Matthew nomogram be used?',h:'Timing matters',o:[{id:'a',txt:'Single acute ingestion with known time, APAP level drawn 4-24 hours post-ingestion',c:1,p:100},{id:'b',txt:'Any acetaminophen ingestion',c:0,p:30},{id:'c',txt:'Chronic ingestions',c:0,p:10}],fb:{1:'<b>Correct!</b> Nomogram only valid for: Single acute ingestion, known time of ingestion, level at 4-24 hours. NOT valid for chronic/staggered ingestions or unknown time.',0:'<b>Nomogram:</b> Only for acute single ingestion with known time, level at 4-24hr.'}},
{t:'NAC Indications',q:'When should N-acetylcysteine (NAC) be started?',h:'When in doubt, treat',o:[{id:'a',txt:'APAP level above treatment line, suspected toxic ingestion with no level yet, or any hepatotoxicity',c:1,p:100},{id:'b',txt:'Only if level above line',c:0,p:40},{id:'c',txt:'Only with liver failure',c:0,p:10}],fb:{1:'<b>Correct!</b> Start NAC if: Level above treatment line, level unavailable but toxic dose suspected, evidence of hepatotoxicity regardless of level. NAC most effective within 8 hours but beneficial up to 24+ hours.',0:'<b>NAC:</b> Start empirically if any concern. Most effective <8hr but still helps later.'}},
{t:'NAC Mechanism',q:'How does N-acetylcysteine protect against APAP toxicity?',h:'Glutathione precursor',o:[{id:'a',txt:'Replenishes glutathione to detoxify NAPQI (toxic metabolite)',c:1,p:100},{id:'b',txt:'Directly binds acetaminophen',c:0,p:20},{id:'c',txt:'Blocks absorption',c:0,p:10}],fb:{1:'<b>Correct!</b> NAC is glutathione precursor. APAP metabolized to NAPQI by CYP2E1. Normally glutathione detoxifies NAPQI. In overdose, glutathione depleted → NAPQI causes hepatocyte necrosis.',0:'<b>Mechanism:</b> NAC replenishes glutathione to neutralize NAPQI.'}},
{t:'Clinical Phases',q:'What characterizes Stage 1 (0-24 hours) of APAP toxicity?',h:'Deceptively benign',o:[{id:'a',txt:'Often asymptomatic or mild nonspecific symptoms (nausea, vomiting, malaise)',c:1,p:100},{id:'b',txt:'Fulminant liver failure',c:0,p:10},{id:'c',txt:'Always severe symptoms',c:0,p:10}],fb:{1:'<b>Correct!</b> Stage 1: Often asymptomatic! Stage 2 (24-72hr): RUQ pain, rising LFTs. Stage 3 (72-96hr): Peak hepatotoxicity. Stage 4: Recovery or death. Beware the deceptively well patient!',0:'<b>Stage 1:</b> Often asymptomatic - dont be falsely reassured!'}},
{t:'Staggered Ingestion',q:'How to approach suspected staggered/chronic APAP ingestion?',h:'Nomogram doesnt apply',o:[{id:'a',txt:'Nomogram invalid; treat if APAP detectable + elevated LFTs, or toxic dose over 24hr period',c:1,p:100},{id:'b',txt:'Use nomogram as usual',c:0,p:30},{id:'c',txt:'Wait for liver failure',c:0,p:10}],fb:{1:'<b>Correct!</b> Staggered ingestion: Nomogram NOT valid. Treat with NAC if: detectable APAP + ANY transaminase elevation, or ingested >150mg/kg over any 24hr period. Lower threshold in chronic alcoholics.',0:'<b>Staggered:</b> Nomogram invalid. Treat if APAP detectable + elevated LFTs.'}},
{t:'Kings College Criteria',q:'Kings College Criteria predict need for liver transplant. Which finding alone indicates poor prognosis?',h:'Single criterion = list for transplant',o:[{id:'a',txt:'Arterial pH <7.30 after resuscitation (or lactate >3 after resuscitation)',c:1,p:100},{id:'b',txt:'AST >1000',c:0,p:20},{id:'c',txt:'INR >2',c:0,p:20}],fb:{1:'<b>Correct!</b> pH <7.30 alone = list for transplant. OR all 3: Grade 3-4 encephalopathy + INR >6.5 + Creatinine >3.4. Contact transplant center early!',0:'<b>Kings College:</b> pH <7.30 alone, OR: encephalopathy + INR >6.5 + Cr >3.4.'}},
{t:'NAC Duration',q:'How long should NAC be continued?',h:'Until clinical endpoints',o:[{id:'a',txt:'Until INR <2, AST/ALT trending down, APAP undetectable, encephalopathy resolving',c:1,p:100},{id:'b',txt:'Fixed 21-hour protocol only',c:0,p:30},{id:'c',txt:'24 hours regardless',c:0,p:20}],fb:{1:'<b>Correct!</b> Continue NAC until: INR <2 (or normalized), AST/ALT declining, APAP undetectable, clinically improving. May need longer than standard 21-hour IV protocol in severe cases.',0:'<b>NAC duration:</b> Until clinical improvement, not fixed duration in severe cases.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>💊 The Silent Toxin</h1><p style="color:var(--muted);margin-bottom:32px">Acetaminophen Overdose: Nomogram, NAC treatment, stages, Kings College criteria</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">💊 APAP Ingestion</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">APAP Overdose Pearls</div><div class="pearl-item"><b>Toxic dose:</b> >150 mg/kg or >7.5-10g in adults</div><div class="pearl-item"><b>Nomogram:</b> Only for single acute ingestion, known time, 4-24hr level</div><div class="pearl-item"><b>NAC:</b> Most effective <8hr but beneficial even late</div><div class="pearl-item"><b>Stage 1:</b> Often asymptomatic - dont be reassured!</div><div class="pearl-item"><b>Staggered:</b> Nomogram invalid, treat if APAP + elevated LFTs</div><div class="pearl-item"><b>Kings College:</b> pH <7.30 alone = transplant evaluation</div></div><div class="cross-link"><a href="alf-adventure.html">Related: Acute Liver Failure</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
