<!DOCTYPE html>
<html lang="en">
<head>
<script>
// Auth Guard - Redirect if not logged in
(function(){var AUTH_KEY="reasondx-user";function getAuthPath(){var d=(location.pathname.match(/\//g)||[]).length-1,p="";for(var i=0;i<d;i++)p+="../";return p+"auth/register.html"}function isAuth(){try{var u=localStorage.getItem(AUTH_KEY);if(u){var j=JSON.parse(u);return j&&j.email&&j.name}}catch(e){}return false}if(!isAuth()){sessionStorage.setItem("reasondx-redirect",location.href);location.replace(getAuthPath())}})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidney Stones - Clinical Reasoning Case</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #064e3b 0%, #10b981 100%); min-height: 100vh; padding: 20px; color: #f8fafc; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { background: rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .header h1 { font-size: 1.5rem; color: #6ee7b7; }
        .score-display { display: flex; gap: 20px; font-size: 0.9rem; margin-top: 10px; }
        .score-item { background: rgba(255,255,255,0.15); padding: 8px 16px; border-radius: 20px; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; margin-top: 12px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #6ee7b7, #fbbf24); border-radius: 3px; transition: width 0.3s; }
        .scene { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        .scene-phase { font-size: 0.85rem; color: #6ee7b7; text-transform: uppercase; }
        .scene-title { font-size: 1.5rem; font-weight: 700; color: #d1fae5; margin-top: 4px; }
        .narrative { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px 20px; margin: 16px 0; border-left: 4px solid #10b981; line-height: 1.7; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .question-box { background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(251,191,36,0.2)); border: 1px solid rgba(16,185,129,0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .question-prompt { font-size: 1.1rem; font-weight: 600; color: #d1fae5; margin-bottom: 16px; }
        .mcq-options { display: flex; flex-direction: column; gap: 10px; }
        .mcq-option { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: flex-start; gap: 12px; }
        .mcq-option:hover:not(.disabled) { background: rgba(255,255,255,0.1); }
        .mcq-option.disabled { cursor: default; opacity: 0.7; }
        .mcq-option.correct { border-color: #22c55e !important; background: rgba(34,197,94,0.2) !important; opacity: 1 !important; }
        .mcq-option.incorrect { border-color: #ef4444 !important; background: rgba(239,68,68,0.2) !important; }
        .option-letter { width: 28px; height: 28px; background: rgba(16,185,129,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
        .feedback { display: none; margin-top: 16px; padding: 16px; border-radius: 10px; }
        .feedback.show { display: block; }
        .correct-feedback { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); }
        .incorrect-feedback { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); }
        .teaching-point { display: none; margin-top: 20px; background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); border-radius: 12px; padding: 20px; }
        .teaching-point.show { display: block; }
        .mechanism-box { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 16px; margin: 12px 0; }
        .mechanism-title { color: #6ee7b7; font-weight: 600; margin-bottom: 10px; }
        .pathway { font-family: 'Monaco', 'Consolas', monospace; font-size: 0.85rem; white-space: pre-wrap; line-height: 1.6; }
        .btn { background: linear-gradient(135deg, #10b981, #fbbf24); color: white; border: none; padding: 12px 28px; border-radius: 25px; font-weight: 600; cursor: pointer; display: none; margin-top: 16px; }
        .btn.show { display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💎 Kidney Stones</h1>
            <div class="score-display">
                <div class="score-item">Score: <strong id="score">0</strong>/<span id="maxScore">60</span></div>
                <div class="score-item">Stage: <span id="stageNum">1</span>/6</div>
            </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width: 16%"></div></div>
        <div id="scene-container"></div>
    </div>
    <script>
    let currentStage = 0, score = 0;
    const stages = [
        {title:"Acute Presentation",content:'<div class="narrative"><p>A <span class="highlight">38-year-old man</span> presents to the ED with sudden onset <span class="critical">severe left flank pain</span> radiating to his groin. He is writhing on the bed, unable to find a comfortable position. He has <span class="highlight">nausea and has vomited twice</span>. Vitals: T 37.2°C, HR 102, BP 148/92.</p></div>',question:{prompt:"What is the most likely diagnosis?",options:[{text:"Acute appendicitis",correct:false},{text:"Nephrolithiasis (kidney stone)",correct:true},{text:"Abdominal aortic aneurysm",correct:false},{text:"Acute pyelonephritis",correct:false}],explanation:{correct:"Correct! Classic renal colic: sudden severe colicky flank pain radiating to groin, patient writhing (can't get comfortable), nausea/vomiting. The pain pattern follows the path of stone migration.",incorrect:"The classic presentation of renal colic includes sudden severe flank pain radiating to groin, inability to find comfortable position, and nausea/vomiting."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Classic Renal Colic</div><div class="pathway">SYMPTOMS:\n• Sudden onset severe colicky pain\n• Flank → lower abdomen → groin\n• Patient RESTLESS (vs peritonitis = still)\n• Nausea, vomiting\n• Hematuria (85-90%)\n\nPAIN LOCATION BY STONE POSITION:\n• Renal pelvis → deep flank/CVA\n• Mid-ureter → anterior abdomen\n• Distal ureter → groin/testicle/labia\n• UVJ → bladder symptoms</div></div>',points:10}},
        
        {title:"Initial Workup",content:'<div class="narrative"><p>Urinalysis shows <span class="highlight">20-50 RBCs/HPF</span> but no WBCs or bacteria. Creatinine is 1.0. He is afebrile.</p></div>',question:{prompt:"What is the BEST imaging study for this patient?",options:[{text:"KUB (plain X-ray)",correct:false},{text:"Renal ultrasound",correct:false},{text:"Non-contrast CT abdomen/pelvis",correct:true},{text:"IV pyelogram",correct:false}],explanation:{correct:"Correct! Non-contrast CT is the GOLD STANDARD for suspected nephrolithiasis. It has 95-100% sensitivity, visualizes ALL stone types (including radiolucent), and can identify alternative diagnoses.",incorrect:"Non-contrast CT is the gold standard - 95-100% sensitivity, sees all stone types, fast, and can identify other pathology."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Imaging for Kidney Stones</div><div class="pathway">NON-CONTRAST CT:\n• GOLD STANDARD\n• 95-100% sensitivity\n• Sees ALL stone types\n• Shows hydronephrosis\n• Fast\n\nWHEN TO USE OTHER MODALITIES:\n• Ultrasound: Pregnancy, children\n• KUB: Follow known radiopaque stones\n• CT with contrast: NOT for stones\n  (contrast obscures them)</div></div>',points:10}},

        {title:"CT Findings",content:'<div class="narrative"><p>CT shows a <span class="highlight">4mm stone in the left distal ureter</span> with mild proximal hydroureter. No perinephric stranding. Right kidney is normal.</p></div>',question:{prompt:"What is the likelihood this stone will pass spontaneously?",options:[{text:"Less than 20%",correct:false},{text:"About 50%",correct:false},{text:"About 90%",correct:true},{text:"100% - all stones this size pass",correct:false}],explanation:{correct:"Correct! Stones <5mm have approximately 90% spontaneous passage rate. Stones 5-10mm pass about 50% of the time. Stones >10mm rarely pass spontaneously.",incorrect:"Stone size predicts passage: <5mm = ~90% pass, 5-10mm = ~50% pass, >10mm = unlikely to pass."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Spontaneous Passage Rates</div><div class="pathway">BY STONE SIZE:\n• <5mm  → ~90% pass\n• 5-10mm → ~50% pass\n• >10mm → Rarely pass\n\nBY LOCATION:\n• Proximal ureter: Longer to pass\n• Distal ureter: More likely to pass\n\nFACTORS THAT HELP PASSAGE:\n• Hydration\n• Alpha-blocker (tamsulosin)\n• Time (up to 4-6 weeks)</div></div>',points:10}},

        {title:"Medical Management",content:'<div class="narrative"><p>You decide to trial conservative management for this 4mm stone. The patient asks what medications might help.</p></div>',question:{prompt:"Which medication facilitates stone passage?",options:[{text:"Furosemide",correct:false},{text:"Tamsulosin (alpha-blocker)",correct:true},{text:"Hydrochlorothiazide",correct:false},{text:"Allopurinol",correct:false}],explanation:{correct:"Correct! Tamsulosin relaxes ureteral smooth muscle, facilitating stone passage. This is called Medical Expulsive Therapy (MET). It's most beneficial for stones 5-10mm.",incorrect:"Tamsulosin (alpha-blocker) relaxes the ureter and facilitates passage. Thiazides and allopurinol are for PREVENTION, not acute treatment."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Medical Expulsive Therapy (MET)</div><div class="pathway">ALPHA-BLOCKERS (Tamsulosin):\n• Relax ureteral smooth muscle\n• Facilitate stone passage\n• Most benefit for 5-10mm stones\n\nACUTE MANAGEMENT:\n• Pain control (NSAIDs first-line)\n• Hydration\n• Alpha-blocker\n• Strain urine for stone analysis\n• Follow-up imaging in 2-4 weeks</div></div>',points:10}},

        {title:"Stone Analysis",content:'<div class="narrative"><p>The patient passes the stone after 5 days. Analysis shows <span class="highlight">calcium oxalate</span>.</p></div>',question:{prompt:"What dietary modification should you recommend for prevention?",options:[{text:"Restrict calcium intake",correct:false},{text:"Increase fluids and reduce sodium intake",correct:true},{text:"Increase oxalate-rich foods",correct:false},{text:"Restrict all protein",correct:false}],explanation:{correct:"Correct! Key preventive measures: increase fluid intake (>2.5L urine/day), REDUCE sodium (not calcium!). Restricting calcium actually INCREASES oxalate absorption and stone risk.",incorrect:"Don't restrict calcium! Increase fluids and REDUCE SODIUM. Calcium binds oxalate in the gut and reduces its absorption."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Calcium Oxalate Stone Prevention</div><div class="pathway">DO:\n• Increase fluids (>2.5L urine/day)\n• Reduce sodium (<2300mg/day)\n• Normal calcium intake WITH meals\n• Increase citrate (fruits/veggies)\n\nDON\'T:\n• Restrict calcium (increases oxalate\n  absorption → MORE stones!)\n• Eat calcium separately from meals\n\nMEDICATIONS (if recurrent):\n• Thiazides (for hypercalciuria)\n• Potassium citrate (for hypocitraturia)</div></div>',points:10}},

        {title:"Complicated Stone",content:'<div class="narrative"><p>Another patient presents: 52-year-old with known 8mm ureteral stone. Today she has <span class="critical">fever of 39.2°C</span>, <span class="critical">chills</span>, and worsening flank pain. WBC is 18,000.</p></div>',question:{prompt:"What is the MOST appropriate next step?",options:[{text:"IV antibiotics and observe",correct:false},{text:"Increase alpha-blocker dose",correct:false},{text:"Urgent decompression (stent or nephrostomy)",correct:true},{text:"Schedule elective ureteroscopy",correct:false}],explanation:{correct:"Correct! Obstructing stone + infection = UROLOGIC EMERGENCY! This is pyonephrosis/obstructive pyelonephritis. Requires URGENT decompression (ureteral stent or nephrostomy tube) plus IV antibiotics. Sepsis risk is high!",incorrect:"Infected obstructing stone is an EMERGENCY! Needs urgent decompression (stent or nephrostomy) + IV antibiotics. Antibiotics alone cannot clear an infected, obstructed system."},teaching:'<div class="mechanism-box"><div class="mechanism-title">📋 Complicated Stone = EMERGENCY</div><div class="pathway">RED FLAGS:\n• Obstruction + FEVER/INFECTION\n• Solitary kidney with obstruction\n• Bilateral obstruction\n• Acute kidney injury\n\nMANAGEMENT:\n1. IV antibiotics IMMEDIATELY\n2. URGENT DECOMPRESSION:\n   • Ureteral stent OR\n   • Nephrostomy tube\n3. Definitive stone treatment LATER\n   (after infection controlled)\n\nDO NOT delay decompression!\nSepsis risk is high!</div></div>',points:10}}
    ];
    
    function updateProgress(){document.getElementById('progress').style.width=((currentStage+1)/stages.length*100)+'%';document.getElementById('stageNum').textContent=currentStage+1;document.getElementById('maxScore').textContent=stages.length*10;}
    
    function renderStage(){const stage=stages[currentStage];let html='<div class="scene"><div class="scene-phase">Stage '+(currentStage+1)+' of '+stages.length+'</div><div class="scene-title">'+stage.title+'</div>'+stage.content;if(stage.question){html+='<div class="question-box"><div class="question-prompt">'+stage.question.prompt+'</div><div class="mcq-options">';stage.question.options.forEach((opt,i)=>{html+='<div class="mcq-option" onclick="checkAnswer('+i+','+opt.correct+')"><div class="option-letter">'+String.fromCharCode(65+i)+'</div><div>'+opt.text+'</div></div>';});html+='</div><div class="feedback correct-feedback" id="fb-correct"><strong>✓ Correct!</strong> '+stage.question.explanation.correct+'</div><div class="feedback incorrect-feedback" id="fb-incorrect"><strong>✗ Not quite.</strong> '+stage.question.explanation.incorrect+'</div><div class="teaching-point" id="teaching">'+stage.question.teaching+'</div><button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>';}html+='</div>';document.getElementById('scene-container').innerHTML=html;updateProgress();}
    
    function checkAnswer(idx,correct){const options=document.querySelectorAll('.mcq-option');if(options[0].classList.contains('disabled'))return;options.forEach((opt,i)=>{opt.classList.add('disabled');if(stages[currentStage].question.options[i].correct)opt.classList.add('correct');else if(i===idx&&!correct)opt.classList.add('incorrect');});if(correct){document.getElementById('fb-correct').classList.add('show');score+=10;document.getElementById('score').textContent=score;}else{document.getElementById('fb-incorrect').classList.add('show');}document.getElementById('teaching').classList.add('show');document.getElementById('next-btn').classList.add('show');}
    
    function nextStage(){if(currentStage<stages.length-1){currentStage++;renderStage();window.scrollTo(0,0);}else{document.getElementById('scene-container').innerHTML='<div class="scene" style="text-align:center;padding:40px;"><h2 style="color:#6ee7b7;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>'+score+'</strong>/60</p><div style="margin-top:20px;padding:15px;background:rgba(59,130,246,0.15);border-radius:10px;border:1px solid rgba(59,130,246,0.3);"><p style="color:#93c5fd;margin-bottom:10px;font-weight:600;">📚 Learn More:</p><div style="display:flex;flex-wrap:wrap;gap:8px;"><a href="kidney-stones-module.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📘 MechanismDx</a><a href="kidney-stones-deepdive.html" style="padding:6px 12px;background:rgba(255,255,255,0.1);border-radius:20px;color:#a5f3fc;text-decoration:none;font-size:0.85rem;">📊 Deep Dive</a></div><div style="margin-top:10px;"><a href="https://www.ncbi.nlm.nih.gov/books/NBK442014/" target="_blank" style="color:#93c5fd;font-size:0.8rem;">📖 StatPearls Reference</a></div></div><p>You mastered Kidney Stones!</p></div>';}}
    
    renderStage();
    </script>

    <!-- DxSuite AI Tutor Integration -->
    <div data-dx-tutor
         data-module-title="Kidney Stones"
         data-key-points="🎉 Case Complete!, clinical reasoning, differential diagnosis, diagnostic workup, illness scripts"
         data-objectives="Develop systematic clinical reasoning, refine differential diagnosis skills"
         style="display:none;"></div>
    <script src="dx-ai-tutor.js"></script>
</body>
</html>
