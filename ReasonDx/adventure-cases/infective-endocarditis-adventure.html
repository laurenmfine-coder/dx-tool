<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infective Endocarditis | Clinical Adventure</title>
    <style>
        :root { --primary: #4A90A4; --primary-dark: #2D5A6A; --accent: #F4A261; --success: #2A9D8F; --danger: #E63946; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #F8FAFC; }
        .container { max-width: 900px; margin: 0 auto; padding: 1rem; }
        .header { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; }
        .header h1 { font-size: 1.5rem; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.3); border-radius: 4px; margin-top: 1rem; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
        .scene { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .scene-title { font-size: 1.1rem; font-weight: 600; color: var(--primary-dark); margin-bottom: 1rem; }
        .patient-info { background: #E3F2FD; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .vitals { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 0.5rem; margin: 1rem 0; }
        .vital { background: white; padding: 0.5rem; border-radius: 6px; text-align: center; border: 1px solid #ddd; }
        .vital-label { font-size: 0.7rem; color: #666; }
        .vital-value { font-weight: 600; }
        .vital-value.critical { color: var(--danger); }
        .narrative { line-height: 1.7; margin-bottom: 1.5rem; }
        .question { background: #FFF8E1; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border-left: 4px solid var(--accent); }
        .options { display: flex; flex-direction: column; gap: 0.75rem; }
        .option { padding: 1rem; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; background: white; text-align: left; }
        .option:hover { border-color: var(--primary); }
        .option.correct { border-color: var(--success); background: #E8F5E9; }
        .option.incorrect { border-color: var(--danger); background: #FFEBEE; }
        .feedback { padding: 1rem; border-radius: 8px; margin-top: 1rem; display: none; }
        .feedback.show { display: block; }
        .feedback.correct { background: #E8F5E9; border-left: 4px solid var(--success); }
        .feedback.incorrect { background: #FFEBEE; border-left: 4px solid var(--danger); }
        .teaching { background: #E8F5E9; padding: 1rem; border-radius: 8px; margin-top: 1rem; }
        .teaching h4 { color: var(--success); margin-bottom: 0.5rem; }
        .btn { padding: 0.75rem 1.5rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; }
        .btn-primary { background: var(--primary); color: white; }
        .nav-row { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .score-card { background: var(--success); color: white; padding: 2rem; border-radius: 12px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>❤️ Infective Endocarditis</h1>
            <p>Duke criteria, embolic phenomena, and surgical timing</p>
            <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        </div>
        <div id="scene-container"></div>
        <div id="completion" style="display:none;"></div>
    </div>
    <script>
const scenes = [
    {
        icon: '🏥', title: 'Scene 1: Initial Presentation',
        patient: '42-year-old male with IVDU presents with 3 weeks of fevers, chills, fatigue',
        vitals: [{label:'Temp',value:'38.9°C',critical:true},{label:'HR',value:'105'},{label:'BP',value:'118/72'},{label:'SpO2',value:'94%',critical:true},{label:'RR',value:'22'}],
        narrative: 'He reports injecting heroin for 5 years. Exam reveals a new 3/6 systolic murmur at LLSB that increases with inspiration, splinter hemorrhages in nail beds, and small painful nodules on fingertips.',
        question: 'The murmur increasing with inspiration suggests involvement of which valve?',
        options: [
            {text:'Mitral valve',correct:false,feedback:'Mitral murmurs don\'t typically change with respiration. Left-sided murmurs are relatively constant.'},
            {text:'Tricuspid valve',correct:true,feedback:'Correct! Right-sided murmurs increase with inspiration (increased venous return). IVDU-associated endocarditis most commonly affects the tricuspid valve.'},
            {text:'Aortic valve',correct:false,feedback:'Aortic murmurs don\'t typically change with respiration.'}
        ]
    },
    {
        icon: '🔬', title: 'Scene 2: Duke Criteria',
        narrative: 'You order 3 sets of blood cultures from different sites. TTE shows a 1.5 cm mobile vegetation on the tricuspid valve with moderate regurgitation.',
        question: 'Based on current findings, how many Duke criteria does this patient meet?',
        options: [
            {text:'1 Major + 2 Minor = Possible IE',correct:false,feedback:'Let\'s count: Major: vegetation on echo (1), pending cultures. Minor: IVDU (predisposition), fever, vascular phenomena (splinter hemorrhages), immunologic phenomena (Osler nodes). He already has 1 major + 4 minor!'},
            {text:'1 Major + 4 Minor = Definite IE',correct:true,feedback:'Correct! 1 Major (vegetation) + ≥3 Minor (IVDU, fever, vascular phenomena, immunologic phenomena) = Definite IE by Duke criteria. If cultures are positive with typical organism, that adds another major.'},
            {text:'Need culture results to make diagnosis',correct:false,feedback:'While cultures help, the Duke criteria already show definite IE: 1 major + 4 minor criteria met.'}
        ],
        teaching: 'Duke Criteria: Definite IE = 2 major OR 1 major + 3 minor OR 5 minor. Major: positive cultures (typical organisms), positive echo. Minor: predisposition, fever, vascular phenomena, immunologic phenomena, microbiologic evidence not meeting major.'
    },
    {
        icon: '🦠', title: 'Scene 3: Culture Results',
        narrative: 'Blood cultures grow Staphylococcus aureus (MSSA) in all 3 sets within 18 hours.',
        question: 'What is the recommended empiric antibiotic regimen for MSSA native valve endocarditis?',
        options: [
            {text:'Vancomycin 15-20 mg/kg IV q8-12h',correct:false,feedback:'Vancomycin is for MRSA. For MSSA, beta-lactams are preferred due to superior bactericidal activity.'},
            {text:'Nafcillin or oxacillin 2g IV q4h',correct:true,feedback:'Correct! Nafcillin/oxacillin is first-line for MSSA endocarditis. Cefazolin 2g IV q8h is an alternative. Duration: 6 weeks for native valve (right-sided IVDU may be 4 weeks in selected cases).'},
            {text:'Ceftriaxone 2g IV daily',correct:false,feedback:'Ceftriaxone is used for Strep viridans endocarditis, not Staph aureus.'}
        ]
    },
    {
        icon: '🫁', title: 'Scene 4: Complication',
        narrative: 'Day 5: Patient develops pleuritic chest pain and hemoptysis. CXR shows multiple peripheral nodular infiltrates bilaterally.',
        question: 'What complication has developed?',
        options: [
            {text:'Hospital-acquired pneumonia',correct:false,feedback:'The pattern (multiple peripheral nodules with hemoptysis) is classic for septic emboli, not typical pneumonia.'},
            {text:'Septic pulmonary emboli from tricuspid vegetation',correct:true,feedback:'Correct! Multiple peripheral nodular infiltrates in a patient with right-sided endocarditis = septic pulmonary emboli. They may cavitate. This is a common complication of tricuspid IE.'},
            {text:'Pulmonary edema from heart failure',correct:false,feedback:'PE from HF would show bilateral infiltrates in a different pattern (perihilar, Kerley B lines), not peripheral nodules.'}
        ]
    },
    {
        icon: '🔪', title: 'Scene 5: Surgical Consultation',
        narrative: 'Despite antibiotics, the patient has persistent bacteremia at 1 week. Repeat echo shows the vegetation has increased to 2.2 cm.',
        question: 'Which is an indication for EARLY surgical intervention in IE?',
        options: [
            {text:'Vegetation size alone',correct:false,feedback:'Size alone is not an absolute indication. Large vegetations (>10mm) with emboli or other factors warrant surgery consideration.'},
            {text:'Heart failure, uncontrolled infection, recurrent emboli, or >10mm vegetation with emboli',correct:true,feedback:'Correct! AHA Class I indications: valve dysfunction causing HF, perivalvular abscess, persistent bacteremia >5-7 days, fungal IE, recurrent emboli despite antibiotics. Large mobile vegetations with emboli are Class IIa.'},
            {text:'Any right-sided endocarditis',correct:false,feedback:'Right-sided IE often responds to medical therapy alone. Surgery is reserved for specific indications like persistent sepsis or large vegetations with emboli.'}
        ],
        teaching: 'Surgical timing: Early surgery (within days) for HF, abscess, fungal IE. Consider surgery for persistent bacteremia >5-7 days, enlarging vegetation, recurrent emboli. Right-sided IE surgery is less common but considered for vegetation >20mm or refractory sepsis.'
    },
    {
        icon: '✅', title: 'Scene 6: Outcome',
        narrative: 'Given persistent bacteremia and enlarging vegetation with septic emboli, the patient undergoes tricuspid valve repair. Cultures clear within 48 hours post-op. He completes 6 weeks of antibiotics and is referred to addiction medicine.',
        teaching: 'IE Key Points:\n• Duke criteria: 2 major OR 1 major + 3 minor OR 5 minor = definite\n• MSSA: Nafcillin/oxacillin; MRSA: Vancomycin + rifampin ± gentamicin\n• Surgical indications: HF, abscess, persistent infection, emboli\n• Right-sided IE: Often medical; surgery for large vegetation/sepsis\n• Addiction medicine referral essential for IVDU patients'
    }
];
        let currentScene = 0, score = 0;
        function renderScene() {
            const s = scenes[currentScene];
            document.getElementById('progress').style.width = ((currentScene+1)/scenes.length*100)+'%';
            let h = '<div class="scene"><div class="scene-title">'+(s.icon||'📋')+' '+s.title+'</div>';
            if(s.patient) h += '<div class="patient-info"><strong>'+s.patient+'</strong></div>';
            if(s.vitals) { h += '<div class="vitals">'; s.vitals.forEach(v => h += '<div class="vital"><div class="vital-label">'+v.label+'</div><div class="vital-value'+(v.critical?' critical':'')+'">'+v.value+'</div></div>'); h += '</div>'; }
            h += '<div class="narrative">'+s.narrative+'</div>';
            if(s.question) { h += '<div class="question"><strong>❓ '+s.question+'</strong></div><div class="options">'; s.options.forEach((o,i) => h += '<button class="option" onclick="select('+i+')" data-c="'+!!o.correct+'">'+o.text+'</button>'); h += '</div><div class="feedback" id="fb"></div>'; }
            if(s.teaching) h += '<div class="teaching"><h4>📚 Teaching Point</h4><p>'+s.teaching+'</p></div>';
            h += '<div class="nav-row">'+(s.question?'':'<button class="btn btn-primary" onclick="next()">Continue →</button>')+'</div></div>';
            document.getElementById('scene-container').innerHTML = h;
        }
        function select(i) {
            const opts = document.querySelectorAll('.option'), fb = document.getElementById('fb'), s = scenes[currentScene];
            opts.forEach((o,j) => { o.style.pointerEvents='none'; if(j===i){ if(o.dataset.c==='true'){ o.classList.add('correct'); score++; fb.className='feedback show correct'; fb.innerHTML='<strong>✓ Correct!</strong> '+s.options[i].feedback; } else { o.classList.add('incorrect'); fb.className='feedback show incorrect'; fb.innerHTML='<strong>✗ Not quite.</strong> '+s.options[i].feedback; opts.forEach(x=>{ if(x.dataset.c==='true') x.classList.add('correct'); }); }}});
            setTimeout(()=>{ document.querySelector('.nav-row').innerHTML='<button class="btn btn-primary" onclick="next()">Continue →</button>'; },800);
        }
        function next() { currentScene++; if(currentScene >= scenes.length) complete(); else { renderScene(); window.scrollTo({top:0,behavior:'smooth'}); }}
        function complete() { document.getElementById('scene-container').style.display='none'; const q=scenes.filter(s=>s.question).length; document.getElementById('completion').innerHTML='<div class="score-card"><h2>🎉 Case Complete!</h2><p>Score: '+score+'/'+q+' ('+Math.round(score/q*100)+'%)</p></div><div class="nav-row" style="justify-content:center;margin-top:1rem;"><a href="../adventure-hub.html" class="btn btn-primary">← Back</a></div>'; document.getElementById('completion').style.display='block'; }
        renderScene();
    </script>
</body>
</html>
