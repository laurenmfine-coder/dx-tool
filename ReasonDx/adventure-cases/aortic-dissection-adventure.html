<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Tearing Pain | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#EF4444;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#B91C1C,#EF4444);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(239,68,68,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(239,68,68,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(239,68,68,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#C4B5FD;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">💔 The Tearing Pain</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'62M',wt:'88kg',hx:'Sudden tearing chest pain radiating to back, HTN',exam:'BP 180/110 R arm, 150/90 L arm, AR murmur',vitals:{HR:'92',BP:'180/110',BPL:'150/90'},labs:{DDimer:'Elevated',CXR:'Wide mediastinum'}},int:{age:'45M',wt:'78kg',hx:'Marfan syndrome, acute chest pain',exam:'Tall, arachnodactyly, new AR murmur',vitals:{HR:'108',BP:'168/92'},labs:{Echo:'Dilated root'}},adv:{age:'58F',wt:'68kg',hx:'Chest pain, now stroke symptoms and leg ischemia',exam:'R hemiparesis, pulseless L leg, hypotensive',vitals:{HR:'118',BP:'82/58'},labs:{Lactate:'6.2'}}};
const Q=[
{t:'Stanford Classification',q:'Dissection involving ascending aorta. Classification?',h:'Type A vs B',o:[{id:'a',txt:'Stanford Type A (surgical emergency)',c:1,p:100},{id:'b',txt:'Stanford Type B',c:0,p:30},{id:'c',txt:'DeBakey Type III',c:0,p:20}],fb:{1:'<b>Correct!</b> Type A: Involves ascending aorta (regardless of origin). Type B: Descending only. Type A = surgical emergency.',0:'<b>Stanford:</b> A = ascending (surgical). B = descending only (medical).'}},
{t:'Initial BP Management',q:'Type A dissection, BP 180/110. Target and agent?',h:'Reduce shear stress',o:[{id:'a',txt:'SBP 100-120, HR <60. IV esmolol or labetalol FIRST',c:1,p:100},{id:'b',txt:'Nitroprusside first',c:0,p:20},{id:'c',txt:'No BP control needed',c:0,p:0}],fb:{1:'<b>Correct!</b> Beta-blocker FIRST (reduce dP/dt), THEN vasodilator if needed. Nitroprusside alone causes reflex tachycardia.',0:'<b>Anti-impulse therapy:</b> BB first to reduce shear stress. Target SBP 100-120, HR <60.'}},
{t:'Imaging Choice',q:'Suspected aortic dissection. Best confirmatory test?',h:'Speed and accuracy',o:[{id:'a',txt:'CT angiography (fast, widely available, high sensitivity)',c:1,p:100},{id:'b',txt:'Chest X-ray',c:0,p:10},{id:'c',txt:'ECG',c:0,p:0}],fb:{1:'<b>Correct!</b> CTA: Fast, >95% sensitive/specific. TEE if unstable (bedside). MRA excellent but time-consuming.',0:'<b>CTA:</b> Test of choice. TEE for unstable patients.'}},
{t:'Type A Management',q:'Confirmed Type A dissection. Definitive treatment?',h:'Time is aorta',o:[{id:'a',txt:'Emergent surgical repair (mortality increases 1-2%/hour)',c:1,p:100},{id:'b',txt:'Medical management only',c:0,p:0},{id:'c',txt:'Endovascular repair',c:0,p:20}],fb:{1:'<b>Correct!</b> Type A: Emergent open surgery. Without surgery, mortality 1-2%/hour early. Medical Rx only if prohibitive surgical risk.',0:'<b>Type A:</b> Surgical emergency. Medical management = death.'}},
{t:'Type B Management',q:'Uncomplicated Type B dissection. Management?',h:'Medical vs surgical',o:[{id:'a',txt:'Medical management (BP control, pain control)',c:1,p:100},{id:'b',txt:'Emergent surgery',c:0,p:20},{id:'c',txt:'No treatment',c:0,p:0}],fb:{1:'<b>Correct!</b> Uncomplicated Type B: Medical Rx. TEVAR for complicated (malperfusion, rupture, refractory pain, rapid expansion).',0:'<b>Type B:</b> Medical unless complicated. TEVAR for complications.'}},
{t:'Malperfusion',q:'Dissection with leg ischemia and rising lactate. Term and urgency?',h:'Branch vessel involvement',o:[{id:'a',txt:'Malperfusion syndrome - requires urgent intervention',c:1,p:100},{id:'b',txt:'Expected finding, observe',c:0,p:0},{id:'c',txt:'Unrelated to dissection',c:0,p:10}],fb:{1:'<b>Correct!</b> Malperfusion: Branch vessel compromise (renal, mesenteric, limb, spinal). Converts uncomplicated to complicated. Urgent intervention.',0:'<b>Malperfusion:</b> Branch compromise = complicated dissection. Urgent intervention.'}},
{t:'Risk Factors',q:'Key risk factors for aortic dissection?',h:'Who gets dissections',o:[{id:'a',txt:'HTN, connective tissue disorders (Marfan, Ehlers-Danlos), bicuspid aortic valve',c:1,p:100},{id:'b',txt:'Diabetes primarily',c:0,p:10},{id:'c',txt:'Low cholesterol',c:0,p:0}],fb:{1:'<b>Correct!</b> HTN (70%), connective tissue disease, bicuspid valve, cocaine, pregnancy, prior cardiac surgery, trauma.',0:'<b>Risk factors:</b> HTN #1. Also Marfan, bicuspid valve, cocaine.'}},
{t:'ADD Risk Score',q:'What does ADD-RS help determine?',h:'Aortic Dissection Detection Risk Score',o:[{id:'a',txt:'Pre-test probability to guide D-dimer and imaging',c:1,p:100},{id:'b',txt:'Mortality prediction',c:0,p:30},{id:'c',txt:'Surgical timing',c:0,p:20}],fb:{1:'<b>Correct!</b> ADD-RS: High-risk conditions + pain features + exam findings. Score 0-1 with negative D-dimer may avoid CTA. Score >1 = CTA.',0:'<b>ADD-RS:</b> Stratifies pre-test probability. Guides use of D-dimer and CTA.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>💔 The Tearing Pain</h1><p style="color:var(--muted);margin-bottom:32px">Aortic Dissection: Stanford classification, BP management, Type A vs B, malperfusion</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">🚨 Vascular Emergency</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Aortic Dissection Pearls</div><div class="pearl-item"><b>Type A:</b> Ascending = surgical emergency</div><div class="pearl-item"><b>Type B:</b> Descending = medical unless complicated</div><div class="pearl-item"><b>BP:</b> BB first, then vasodilator. Target SBP 100-120</div><div class="pearl-item"><b>Malperfusion:</b> Branch compromise = urgent intervention</div><div class="pearl-item"><b>CTA:</b> Test of choice, TEE if unstable</div></div><div class="cross-link"><a href="../mechanism/acs.html">MechanismDx: Cardiovascular</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
