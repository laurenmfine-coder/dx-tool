    <script>
    let decisionPath = [];
let currentStage = 0, score = 0, difficulty = 'standard';
    const stages = [
    {
        title: "The Systematic Approach",
        content: `<div class="narrative"><p>A <span class="highlight">55-year-old diabetic man</span> presents obtunded. His ABG shows:</p><p style="margin-top:12px;font-family:monospace;background:rgba(0,0,0,0.3);padding:12px;border-radius:8px;"><strong>pH 7.22</strong> | PaCO₂ 24 | HCO₃ 10 | Na 140 | Cl 100 | K 5.8 | Glucose 450</p></div>
        <div class="socratic-prompt"><h4>Step-by-Step Analysis</h4><p>What is the systematic approach to interpreting an ABG, and what is the primary disorder here?</p></div>`,
        hint_beginner: "Step 1: Look at pH (<7.35 = acidemia, >7.45 = alkalemia).",
        hint_advanced: "After identifying the primary disorder, always check if compensation is appropriate.",
        question: {
            prompt: "What is the FIRST step in acid-base interpretation?",
            options: [
                { text: "Calculate the anion gap", correct: false },
                { text: "Look at the pH to determine acidemia or alkalemia", correct: true },
                { text: "Check the PaCO₂", correct: false },
                { text: "Calculate the delta-delta ratio", correct: false }
            ],
            explanation: {
                correct: "Correct! Step 1: Look at pH. This patient has pH 7.22 = acidemia. Then determine if it's metabolic (look at HCO₃) or respiratory (look at PaCO₂) as the primary process.",
                incorrect: "Always start with pH. It tells you acidemia (<7.35) or alkalemia (>7.45). Then identify the primary disorder. Anion gap and delta-delta come later."
            },
            teaching: `<div class="mechanism-box"><div class="mechanism-title">📋 Systematic ABG Interpretation</div><div class="pathway">STEP 1: pH → Acidemia or Alkalemia?
  • pH < 7.35 = Acidemia
  • pH > 7.45 = Alkalemia

STEP 2: Primary disorder?
  • Low HCO₃ + acidemia = Metabolic acidosis
  • High PaCO₂ + acidemia = Respiratory acidosis
  • High HCO₃ + alkalemia = Metabolic alkalosis
  • Low PaCO₂ + alkalemia = Respiratory alkalosis

STEP 3: Is compensation appropriate?

STEP 4: If metabolic acidosis → Calculate AG

STEP 5: If elevated AG → Calculate delta-delta</div></div>`,
            why_chain: [{q: "Why is pH the first step?", a: "pH tells you the net effect of all acid-base processes. Even if you have two opposing disorders, the pH tells you which one is 'winning' or if they're balanced."}, {q: "Can pH be normal with an acid-base disorder?", a: "Yes! Mixed disorders can result in normal pH. That's why you must look at HCO₃ and PaCO₂ even when pH is normal."}],
            points: 10
        }
    },
    {
        title: "Metabolic Acidosis: Calculate the Anion Gap",
        content: `<div class="narrative"><p>You've identified <span class="highlight">metabolic acidosis</span> (pH 7.22, HCO₃ 10). Now calculate the anion gap.</p><p style="margin-top:12px;font-family:monospace;">Na 140 | Cl 100 | HCO₃ 10</p></div>
        <div class="socratic-prompt"><h4>Anion Gap</h4><p>What is the anion gap formula, and what does an elevated AG indicate?</p></div>`,
        hint_beginner: "AG = Na - (Cl + HCO₃). Normal is 8-12.",
        hint_advanced: "Remember to adjust AG for albumin: for each 1 g/dL albumin below 4, add 2.5 to the AG.",
        question: {
            prompt: "This patient's anion gap is 30 (140 - 100 - 10). What does an elevated anion gap indicate?",
            options: [
                { text: "Loss of bicarbonate from the GI tract", correct: false },
                { text: "Accumulation of an unmeasured acid", correct: true },
                { text: "Renal tubular acidosis", correct: false },
                { text: "Dilutional acidosis from saline", correct: false }
            ],
            explanation: {
                correct: "Correct! Elevated AG indicates an unmeasured anion (acid) has accumulated. The acid's H⁺ consumes HCO₃, and its anion remains, increasing the gap. Use MUDPILES to identify the cause.",
                incorrect: "Elevated AG = unmeasured acid accumulation. The added acid consumes bicarbonate (lowering it) while its anion replaces HCO₃ (widening the gap). GI losses and RTA cause non-AG acidosis."
            },
            teaching: `<h4>MUDPILES: Causes of Anion Gap Metabolic Acidosis</h4><table class="comparison-table"><tr><th>Letter</th><th>Cause</th><th>Clues</th></tr><tr><td><strong>M</strong></td><td>Methanol</td><td>Osmol gap, visual changes</td></tr><tr><td><strong>U</strong></td><td>Uremia</td><td>Elevated BUN/Cr</td></tr><tr style="background:rgba(251,191,36,0.2);"><td><strong>D</strong></td><td>DKA</td><td>Hyperglycemia, ketones</td></tr><tr><td><strong>P</strong></td><td>Propylene glycol</td><td>IV lorazepam infusion</td></tr><tr><td><strong>I</strong></td><td>INH, Iron</td><td>History of ingestion</td></tr><tr style="background:rgba(251,191,36,0.2);"><td><strong>L</strong></td><td>Lactic acidosis</td><td>Shock, sepsis, metformin</td></tr><tr><td><strong>E</strong></td><td>Ethylene glycol</td><td>Osmol gap, oxalate crystals</td></tr><tr><td><strong>S</strong></td><td>Salicylates</td><td>Tinnitus, mixed disorder</td></tr></table>`,
            why_chain: [{q: "Why does AG increase with added acid?", a: "Acid = H⁺ + anion. The H⁺ is buffered by HCO₃ (consuming it). The anion remains and replaces the lost HCO₃. Since Na and Cl stay the same, the gap widens."}, {q: "What is a normal AG?", a: "Traditionally 12 ± 4. Modern analyzers give 6-10. Always know your lab's normal range. An AG >20 is almost always pathologic."}],
            points: 10
        }
    },
    {
        title: "Compensation: Is It Appropriate?",
        content: `<div class="narrative"><p>This patient has metabolic acidosis with HCO₃ of 10. The PaCO₂ is 24. Is the respiratory compensation appropriate?</p></div>
        <div class="socratic-prompt"><h4>Expected Compensation</h4><p>How do you calculate expected PaCO₂ in metabolic acidosis?</p></div>`,
        hint_beginner: "Winter's formula: Expected PaCO₂ = 1.5 × [HCO₃] + 8 (±2).",
        hint_advanced: "If actual PaCO₂ is higher than expected, there's a concomitant respiratory acidosis.",
        question: {
            prompt: "Using Winter's formula, the expected PaCO₂ for HCO₃ of 10 is approximately:",
            options: [
                { text: "30-34 mmHg", correct: false },
                { text: "21-25 mmHg", correct: true },
                { text: "15-19 mmHg", correct: false },
                { text: "35-40 mmHg", correct: false }
            ],
            explanation: {
                correct: "Correct! Winter's formula: 1.5 × 10 + 8 = 23 (±2), so expected range is 21-25. Patient's PaCO₂ of 24 is within range = appropriate compensation = pure metabolic acidosis.",
                incorrect: "Winter's formula: Expected PaCO₂ = 1.5 × [HCO₃] + 8 (±2) = 1.5 × 10 + 8 = 23 ± 2 = 21-25 mmHg. This patient's PaCO₂ of 24 shows appropriate compensation."
            },
            teaching: `<h4>Compensation Formulas</h4><table class="comparison-table"><tr><th>Disorder</th><th>Expected Compensation</th></tr><tr style="background:rgba(34,197,94,0.2);"><td><strong>Metabolic acidosis</strong></td><td>PaCO₂ = 1.5 × [HCO₃] + 8 (±2) - Winter's</td></tr><tr><td><strong>Metabolic alkalosis</strong></td><td>PaCO₂ = 0.7 × [HCO₃] + 21 (±2)</td></tr><tr><td><strong>Acute resp acidosis</strong></td><td>HCO₃ ↑ 1 per 10 ↑ PaCO₂</td></tr><tr><td><strong>Chronic resp acidosis</strong></td><td>HCO₃ ↑ 3.5 per 10 ↑ PaCO₂</td></tr><tr><td><strong>Acute resp alkalosis</strong></td><td>HCO₃ ↓ 2 per 10 ↓ PaCO₂</td></tr><tr><td><strong>Chronic resp alkalosis</strong></td><td>HCO₃ ↓ 5 per 10 ↓ PaCO₂</td></tr></table>`,
            why_chain: [{q: "Why can't compensation fully normalize pH?", a: "Compensation is a physiologic response, not a pathologic process. The body will not overcompensate. If pH is normal with significantly abnormal values, suspect a mixed disorder."}, {q: "What if compensation is inadequate?", a: "If PaCO₃ is higher than expected, there's also a respiratory acidosis. If lower than expected, there's also a respiratory alkalosis."}],
            points: 10
        }
    },
    {
        title: "Delta-Delta: Unmasking Hidden Disorders",
        content: `<div class="narrative"><p>You've confirmed an anion gap metabolic acidosis with appropriate respiratory compensation. But is there another metabolic disorder hiding?</p><p style="margin-top:12px;">AG = 30 | HCO₃ = 10</p></div>
        <div class="alert-box"><div class="alert-title">🔑 HIGH-YIELD: The Delta-Delta Ratio</div><p>The delta-delta reveals additional metabolic disorders hiding behind an anion gap acidosis.</p></div>
        <div class="socratic-prompt"><h4>Delta-Delta Analysis</h4><p>How do you calculate and interpret the delta-delta ratio?</p></div>`,
        hint_beginner: "ΔAG = AG - 12; ΔHCO₃ = 24 - measured HCO₃. Ratio = ΔAG/ΔHCO₃.",
        hint_advanced: "Ratio <1 suggests concurrent non-AG acidosis; ratio >2 suggests concurrent metabolic alkalosis.",
        question: {
            prompt: "This patient's delta-delta ratio is: ΔAG (30-12=18) / ΔHCO₃ (24-10=14) = 1.3. This indicates:",
            options: [
                { text: "Pure anion gap metabolic acidosis", correct: true },
                { text: "AGMA plus non-anion gap metabolic acidosis", correct: false },
                { text: "AGMA plus metabolic alkalosis", correct: false },
                { text: "Non-anion gap metabolic acidosis alone", correct: false }
            ],
            explanation: {
                correct: "Correct! Delta-delta ratio of 1-2 indicates pure AGMA. The rise in AG matches the fall in HCO₃ (1:1 relationship expected when an acid is added).",
                incorrect: "Ratio 1-2 = pure AGMA. Ratio <1 = AGMA + non-AG acidosis (extra HCO₃ loss). Ratio >2 = AGMA + metabolic alkalosis (something raising HCO₃)."

    function setDifficulty(d, btn) {
        difficulty = d;
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.hint-beginner').forEach(h => h.style.display = d === 'beginner' ? 'block' : 'none');
        document.querySelectorAll('.hint-advanced').forEach(h => h.style.display = d === 'advanced' ? 'block' : 'none');
    }
    function updateProgress() {
        document.getElementById('progress').style.width = ((currentStage + 1) / stages.length * 100) + '%';
        document.getElementById('maxScore').textContent = stages.length * 10;
    }
    function renderStage() {
        const stage = stages[currentStage];
        const container = document.getElementById('scene-container');
        let html = `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage ${currentStage + 1} of ${stages.length}</div><div class="scene-title">${stage.title}</div></div>`;
        if (stage.hint_beginner) html += `<div class="hint-beginner" style="display:${difficulty === 'beginner' ? 'block' : 'none'}">🌱 <strong>Beginner Hint:</strong> ${stage.hint_beginner}</div>`;
        if (stage.hint_advanced) html += `<div class="hint-advanced" style="display:${difficulty === 'advanced' ? 'block' : 'none'}">🎯 <strong>Advanced Challenge:</strong> ${stage.hint_advanced}</div>`;
        html += stage.content;
        if (stage.question) {
            html += `<div class="question-box"><div class="question-prompt">${stage.question.prompt}</div><div class="mcq-options">`;
            stage.question.options.forEach((opt, i) => {
                html += `<div class="mcq-option" onclick="checkAnswer(${i}, ${opt.correct})"><div class="option-letter">${String.fromCharCode(65 + i)}</div><div>${opt.text}</div></div>`;
            });
            html += `</div><div class="feedback correct-feedback" id="fb-correct"><div class="feedback-title">✓ Correct!</div>${stage.question.explanation.correct}</div>`;
            html += `<div class="feedback incorrect-feedback" id="fb-incorrect"><div class="feedback-title">✗ Not quite</div>${stage.question.explanation.incorrect}</div>`;
            if (stage.question.teaching) html += `<div class="teaching-point" id="teaching">${stage.question.teaching}</div>`;
            if (stage.question.why_chain && stage.question.why_chain.length > 0) {
                html += `<div class="why-chain" id="why-chain"><h4>🔗 WHY Chain - Dig Deeper</h4>`;
                stage.question.why_chain.forEach(w => {
                    html += `<div class="why-item"><div class="why-q">${w.q}</div><div class="why-a">${w.a}</div></div>`;
                });
                html += `</div>`;
            }
            html += `<button class="btn" id="next-btn" onclick="nextStage()">Continue →</button></div>`;
        }
        html += `</div>`;
        container.innerHTML = html;
        updateProgress();
    }
    function checkAnswer(idx, correct) {
        const options = document.querySelectorAll('.mcq-option');
        if (options[0].classList.contains('disabled')) return;
        options.forEach((opt, i) => {
            opt.classList.add('disabled');
            if (stages[currentStage].question.options[i].correct) opt.classList.add('correct');
            else if (i === idx && !correct) opt.classList.add('incorrect');
        });
        if (correct) {
            document.getElementById('fb-correct').classList.add('show');
            score += stages[currentStage].question.points;
            document.getElementById('score').textContent = score;
        } else {
            document.getElementById('fb-incorrect').classList.add('show');
        }
        const teaching = document.getElementById('teaching');
        if (teaching) teaching.classList.add('show');
        const whyChain = document.getElementById('why-chain');
        if (whyChain) whyChain.classList.add('show');
        document.getElementById('next-btn').classList.add('show');
    }
    function nextStage() {
        if (currentStage < stages.length - 1) { currentStage++; renderStage(); window.scrollTo(0, 0); }
        else {
            document.getElementById('scene-container').innerHTML = `<div class="scene completion"><h2 style="color:#4ade80;margin-bottom:20px;">🎉 Case Complete!</h2><p style="font-size:1.3rem;margin-bottom:20px;">Final Score: <strong>${score}</strong> / ${stages.length * 10}</p><p style="margin-bottom:30px;">You've mastered Acid-Base Disorders!</p><div style="text-align:left;max-width:500px;margin:0 auto;"><h4 style="color:#7dd3fc;margin-bottom:12px;">Key Points:</h4><ul style="line-height:2;"><li>Start with pH (acidemia vs alkalemia)</li><li>MUDPILES = AG acidosis causes</li><li>HARDASS = non-AG acidosis causes</li><li>Delta-delta reveals hidden disorders</li><li>Urine Cl classifies met alkalosis</li></ul></div></div>`;
        }
    }
    renderStage();
    

// Visual Debrief Functions
function showDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (!overlay) return;
    
    const percentage = Math.round((score / maxScore) * 100) || 0;
    let grade, gradeEmoji, gradeColor;
    
    if (percentage >= 90) { grade = 'Outstanding!'; gradeEmoji = '🏆'; gradeColor = '#22c55e'; }
    else if (percentage >= 80) { grade = 'Excellent!'; gradeEmoji = '🌟'; gradeColor = '#3b82f6'; }
    else if (percentage >= 70) { grade = 'Good Work!'; gradeEmoji = '👍'; gradeColor = '#f59e0b'; }
    else { grade = 'Keep Learning!'; gradeEmoji = '📚'; gradeColor = '#ef4444'; }
    
    let pathHTML = '';
    if (typeof decisionPath !== 'undefined' && decisionPath.length > 0) {
        pathHTML = decisionPath.map(d => {
            const pathClass = d.isOptimal ? 'path-optimal' : (d.points >= (d.maxPoints || 10) * 0.5 ? 'path-suboptimal' : 'path-incorrect');
            const icon = d.isOptimal ? '✓' : (d.points >= (d.maxPoints || 10) * 0.5 ? '~' : '✗');
            return `
                <div class="path-item ${pathClass}">
                    <div style="display:flex;justify-content:space-between;align-items:start;">
                        <div>
                            <div class="path-stage">${icon} Stage ${d.stage}: ${d.title}</div>
                            <div class="path-choice">Your choice: <strong>${d.choice || d.selectedText || 'N/A'}</strong></div>
                            ${!d.isOptimal && d.optimalChoice ? `<div class="path-better">💡 Better choice: ${d.optimalChoice}</div>` : ''}
                        </div>
                        <div class="path-points" style="color:${d.isOptimal ? '#22c55e' : '#f59e0b'}">${d.points}/${d.maxPoints || 10}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('debriefContent').innerHTML = `
        <div class="debrief-header">
            <div class="debrief-grade">${gradeEmoji}</div>
            <div class="debrief-score" style="color:${gradeColor}">${percentage}%</div>
            <div class="debrief-label">${grade}</div>
        </div>
        <div class="decision-path">
            <h3>📊 Your Decision Path</h3>
            ${pathHTML || '<p style="color:#6b7280;text-align:center;">Complete the case to see your decisions!</p>'}
        </div>
        <div class="debrief-summary">
            <h4>🎯 Performance Legend</h4>
            <ul>
                <li><span style="color:#22c55e;font-weight:600;">✓ Green</span> = Optimal choice (full points)</li>
                <li><span style="color:#f59e0b;font-weight:600;">~ Yellow</span> = Acceptable but not optimal (partial points)</li>
                <li><span style="color:#ef4444;font-weight:600;">✗ Red</span> = Incorrect (minimal/no points)</li>
            </ul>
        </div>
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
    `;
    
    overlay.classList.add('show');
}

function closeDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    if (overlay) overlay.classList.remove('show');
}

function toggleReferences() {
    const content = document.getElementById('referencesContent');
    const toggle = document.querySelector('.refs-toggle');
    if (content.style.display === 'none') {
        content.style.display = 'flex';
        toggle.textContent = '▼';
    } else {
        content.style.display = 'none';
        toggle.textContent = '▶';
    }
}
