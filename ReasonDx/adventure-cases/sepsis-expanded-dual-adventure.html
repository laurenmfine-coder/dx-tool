<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sepsis & Septic Shock | Dual-Mode Clinical Case</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; transition: background 0.3s; }
        body.adult { background: linear-gradient(135deg, #991b1b 0%, #1e3a8a 100%); }
        body.peds { background: linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%); }
        .container { max-width: 900px; margin: 0 auto; }
        .mode-toggle { display: flex; justify-content: center; margin-bottom: 20px; background: rgba(0,0,0,0.3); border-radius: 12px; padding: 4px; }
        .mode-btn { flex: 1; padding: 12px 24px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s; background: transparent; color: #e2e8f0; font-size: 1rem; }
        .mode-btn:hover { background: rgba(255,255,255,0.1); }
        .mode-btn.active { background: rgba(255,255,255,0.25); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-radius: 16px; margin-bottom: 20px; background: rgba(0,0,0,0.2); }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 3px; transition: width 0.3s; background: linear-gradient(90deg, #3b82f6, #8b5cf6); }
        .scene { background: rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .scene-header { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .scene-phase { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .scene-title { font-size: 1.5rem; font-weight: 700; margin-top: 4px; }
        .narrative { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px 20px; margin: 16px 0; border-left: 4px solid #3b82f6; line-height: 1.7; }
        .highlight { color: #60a5fa; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .lab-value { color: #fbbf24; font-weight: 600; }
        .question-box { background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(139,92,246,0.15)); border: 1px solid rgba(59,130,246,0.3); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .question-prompt { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; }
        .mcq-options { display: flex; flex-direction: column; gap: 10px; }
        .mcq-option { background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 14px 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: flex-start; gap: 12px; }
        .mcq-option:hover:not(.disabled) { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }
        .mcq-option.correct { background: rgba(34,197,94,0.2); border-color: #22c55a; }
        .mcq-option.incorrect { background: rgba(239,68,68,0.2); border-color: #ef4444; }
        .mcq-option.disabled { opacity: 0.6; cursor: not-allowed; }
        .option-letter { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-weight: 700; flex-shrink: 0; }
        .feedback { display: none; padding: 16px; border-radius: 10px; margin-top: 16px; }
        .feedback.show { display: block; }
        .correct-feedback { background: rgba(34,197,94,0.2); border: 1px solid #22c55a; }
        .incorrect-feedback { background: rgba(239,68,68,0.2); border: 1px solid #ef4444; }
        .teaching-point { background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 12px; padding: 20px; margin-top: 16px; display: none; }
        .teaching-point.show { display: block; }
        .teaching-point h4 { color: #fbbf24; margin-bottom: 12px; }
        .teaching-point ul, .teaching-point ol { margin-left: 20px; margin-top: 8px; }
        .teaching-point li { margin-bottom: 6px; }
        .btn { display: none; padding: 16px 28px; border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; margin-top: 16px; font-size: 1rem; background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
        .btn.show { display: block; }
        .btn:hover { opacity: 0.9; }
        .score-tracker { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); padding: 12px 20px; border-radius: 12px; text-align: center; z-index: 100; }
        .score-value { font-size: 1.5rem; font-weight: 700; }
        .debrief-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: none; overflow-y: auto; padding: 20px; }
        .debrief-overlay.show { display: flex; justify-content: center; align-items: flex-start; }
        .debrief-content { background: white; border-radius: 16px; max-width: 800px; width: 100%; padding: 32px; margin: 40px auto; color: #1f2937; }
        .path-item { padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; }
        .path-optimal { background: #dcfce7; border-left: 4px solid #22c55e; }
        .path-suboptimal { background: #fef3c7; border-left: 4px solid #f59e0b; }
        .path-incorrect { background: #fee2e2; border-left: 4px solid #ef4444; }
        .refs { margin-top: 24px; padding: 16px; background: rgba(255,255,255,0.05); border-radius: 12px; }
        .refs h4 { color: #94a3b8; margin-bottom: 12px; font-size: 0.9rem; }
        .refs a { color: #60a5fa; text-decoration: none; display: block; margin-bottom: 8px; }
        .refs a:hover { text-decoration: underline; }
    
/* EPA Badge Styles */
.epa-badges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.epa-badge { 
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
    background: rgba(139,92,246,0.2); border: 1px solid rgba(139,92,246,0.4); color: #c4b5fd;
}
.epa-badge.primary { background: rgba(59,130,246,0.25); border-color: rgba(59,130,246,0.5); color: #93c5fd; }
.epa-badge .epa-level { background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 10px; font-size: 0.65rem; }

/* Confidence Slider Styles */
.confidence-container {
    background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(139,92,246,0.15));
    border: 1px solid rgba(59,130,246,0.3);
    border-radius: 12px;
    padding: 20px;
    margin: 16px 0;
    display: none;
}
.confidence-container.show { display: block; }
.confidence-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.confidence-icon { font-size: 1.2rem; }
.confidence-label { font-weight: 600; color: #e2e8f0; }
.confidence-slider-wrapper { position: relative; margin-bottom: 8px; }
.confidence-slider {
    width: 100%; height: 8px; border-radius: 4px;
    background: rgba(255,255,255,0.1); outline: none; -webkit-appearance: none;
}
.confidence-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6); cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.confidence-labels { display: flex; justify-content: space-between; font-size: 0.65rem; color: rgba(255,255,255,0.5); margin-top: 4px; }
.confidence-value { text-align: center; font-size: 2rem; font-weight: 700; margin: 12px 0; color: #fbbf24; }
.confidence-submit {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    color: white; border: none; border-radius: 8px;
    font-weight: 600; font-size: 1rem; cursor: pointer;
}
.confidence-submit:hover { opacity: 0.9; transform: translateY(-1px); }

/* Calibration Feedback */
.calibration-feedback {
    background: rgba(0,0,0,0.3); border-radius: 8px; padding: 12px 16px; margin-top: 12px;
    display: none; font-size: 0.9rem;
}
.calibration-feedback.show { display: block; }
.calibration-feedback.well-calibrated { border-left: 3px solid #22c55e; }
.calibration-feedback.overconfident { border-left: 3px solid #ef4444; }
.calibration-feedback.underconfident { border-left: 3px solid #fbbf24; }

/* Process Feedback Styles */
.process-feedback {
    background: linear-gradient(135deg, rgba(251,191,36,0.1), rgba(239,68,68,0.1));
    border: 1px solid rgba(251,191,36,0.3);
    border-radius: 12px;
    padding: 16px;
    margin-top: 16px;
    display: none;
}
.process-feedback.show { display: block; }
.process-feedback h4 { color: #fbbf24; margin-bottom: 12px; }

/* Selected option before submit */
.mcq-option.selected { border-color: #3b82f6 !important; background: rgba(59,130,246,0.2) !important; }

/* EPA Progress in Debrief */
.epa-debrief-section { margin: 24px 0; }
.epa-debrief-section h4 { color: #1f2937; margin-bottom: 16px; font-size: 1.1rem; }
.epa-progress-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
.epa-progress-card { background: #f9fafb; border-radius: 10px; padding: 14px; text-align: center; }
.epa-progress-card .epa-name { font-size: 0.75rem; color: #6b7280; margin-bottom: 4px; }
.epa-progress-card .epa-score { font-size: 1.5rem; font-weight: 700; }
.epa-progress-card .epa-score.high { color: #22c55e; }
.epa-progress-card .epa-score.medium { color: #f59e0b; }
.epa-progress-card .epa-score.low { color: #ef4444; }

/* Calibration Chart in Debrief */
.calibration-debrief { margin: 24px 0; padding: 20px; background: #f9fafb; border-radius: 12px; }
.calibration-debrief h4 { color: #1f2937; margin-bottom: 16px; }
.calibration-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; text-align: center; }
.calibration-stat { padding: 16px; background: white; border-radius: 8px; }
.calibration-stat .stat-value { font-size: 2rem; font-weight: 700; }
.calibration-stat .stat-label { font-size: 0.85rem; color: #6b7280; margin-top: 4px; }
.calibration-interpretation { margin-top: 16px; padding: 12px; background: white; border-radius: 8px; font-size: 0.9rem; }

</style>
</head>
<body class="adult">
    <div class="score-tracker">
        <div style="font-size:0.8rem;color:#94a3b8">Score</div>
        <div><span class="score-value" id="score">0</span> / <span id="maxScore">80</span></div>
    </div>
    <div class="container">
        <div class="mode-toggle">
            <button class="mode-btn active" onclick="setMode('adult')">🏥 Adult</button>
            <button class="mode-btn" onclick="setMode('peds')">👶 Pediatric</button>
        </div>
        <div class="header">
            <div style="font-size:1.3rem;font-weight:700" id="caseTitle">🏥 Sepsis & Septic Shock</div>
            <div id="stageIndicator">Stage 1 of 8</div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
        <div id="scene-container"></div>

<!-- Confidence Slider -->
<div class="confidence-container" id="confidence-container">
    <div class="confidence-header">
        <span class="confidence-icon">🎯</span>
        <span class="confidence-label">How confident are you in your answer?</span>
    </div>
    <div class="confidence-slider-wrapper">
        <input type="range" class="confidence-slider" id="confidence-slider" 
               min="0" max="100" value="50" 
               oninput="updateConfidenceDisplay(this.value)">
        <div class="confidence-labels">
            <span>Guessing</span><span>Uncertain</span><span>Fairly Sure</span><span>Very Sure</span><span>Certain</span>
        </div>
    </div>
    <div class="confidence-value" id="confidence-display">50%</div>
    <button class="confidence-submit" onclick="submitWithConfidence()">Submit Answer</button>
</div>

    </div>
    <div class="debrief-overlay" id="debriefOverlay" onclick="if(event.target===this)closeDebrief()">
        <div class="debrief-content" id="debriefContent"></div>
    </div>
    <script>
    let currentStage = 0;
    let currentMode = 'adult';
    let score = 0;
    let decisionPath = [];
    const maxScore = 80;
    
    const stages = {
        adult: [{
            title: "Recognition",
            narrative: `A <span class="highlight">68-year-old woman</span> with diabetes presents with <span class="critical">fever, confusion, and hypotension</span>.<br><br><strong>Vitals:</strong> HR 118, BP 82/48, RR 24, SpO2 92%, T 102.8°F<br><strong>Exam:</strong> Confused, warm extremities, decreased urine output`,
            question: "What criteria define sepsis in adults?",
            options: [{text:"Suspected infection + qSOFA ≥2 (RR≥22, SBP≤100, altered mentation)",correct:true,points:10},{text:"Any fever with tachycardia",correct:false,points:2},{text:"Positive blood cultures only",correct:false,points:0},{text:"WBC > 12,000",correct:false,points:3}],
            teaching: `<h4>Sepsis-3 Criteria</h4><ul><li>Suspected/documented infection PLUS</li><li>qSOFA ≥2: RR≥22, SBP≤100, Altered mentation</li><li>OR SOFA score increase ≥2</li></ul><p><strong>Septic Shock:</strong> Sepsis + vasopressors needed + lactate >2 despite fluids</p>`
        },{
            title: "Initial Resuscitation",
            narrative: `You recognize sepsis. Labs return: <span class="lab-value">Lactate 4.2</span>, WBC 18.4, Cr 2.1.<br>Blood cultures drawn.`,
            question: "What is the FIRST priority in the Hour-1 bundle?",
            options: [{text:"30 mL/kg crystalloid bolus + broad-spectrum antibiotics within 1 hour",correct:true,points:10},{text:"Start vasopressors immediately",correct:false,points:3},{text:"Wait for culture results",correct:false,points:0},{text:"Order CT scan first",correct:false,points:2}],
            teaching: `<h4>Surviving Sepsis Hour-1 Bundle</h4><ol><li>Measure lactate (repeat if >2)</li><li>Blood cultures before antibiotics</li><li>Broad-spectrum antibiotics</li><li>30 mL/kg crystalloid for hypotension or lactate ≥4</li><li>Vasopressors if hypotensive after fluids (target MAP ≥65)</li></ol>`
        },{
            title: "Vasopressor Selection",
            narrative: `After 2L crystalloid, BP remains <span class="critical">76/44</span>. MAP 55.`,
            question: "What is the first-line vasopressor for septic shock?",
            options: [{text:"Norepinephrine - first-line per guidelines",correct:true,points:10},{text:"Dopamine",correct:false,points:3},{text:"Phenylephrine",correct:false,points:2},{text:"Epinephrine first",correct:false,points:4}],
            teaching: `<h4>Vasopressor Hierarchy in Septic Shock</h4><ol><li><strong>Norepinephrine</strong> - FIRST LINE (α1 + β1)</li><li><strong>Vasopressin</strong> - Add if NE dose escalating (0.03 U/min)</li><li><strong>Epinephrine</strong> - Add for cardiac dysfunction</li></ol><p>Target: MAP ≥65 mmHg</p>`
        },{
            title: "Antibiotic Selection",
            narrative: `Source suspected to be urinary (recent catheterization).`,
            question: "What empiric antibiotic regimen is appropriate?",
            options: [{text:"Piperacillin-tazobactam or Meropenem + Vancomycin if MRSA risk",correct:true,points:10},{text:"Oral ciprofloxacin",correct:false,points:0},{text:"Narrow-spectrum ampicillin only",correct:false,points:2},{text:"Wait for cultures",correct:false,points:0}],
            teaching: `<h4>Empiric Antibiotics in Sepsis</h4><ul><li>Give within 1 HOUR of recognition</li><li>Broad-spectrum initially, de-escalate when cultures return</li><li>Cover likely pathogens based on suspected source</li><li>Add MRSA coverage if risk factors</li></ul>`
        },{
            title: "Source Control",
            narrative: `CT abdomen shows <span class="critical">perforated appendicitis with abscess</span>.`,
            question: "What is the next critical step?",
            options: [{text:"Emergent surgical consultation for source control within 6-12 hours",correct:true,points:10},{text:"Continue antibiotics alone",correct:false,points:2},{text:"Repeat imaging in 24 hours",correct:false,points:0},{text:"Discharge with oral antibiotics",correct:false,points:0}],
            teaching: `<h4>Source Control in Sepsis</h4><ul><li>Identify source: imaging, exam, labs</li><li>Drainage of abscess/empyema</li><li>Debridement of necrotic tissue</li><li>Removal of infected devices</li><li>Should occur within 6-12 hours when feasible</li></ul>`
        },{
            title: "Monitoring & Resuscitation Endpoints",
            narrative: `After interventions: MAP 68, HR 98, lactate trending down.`,
            question: "Which is the BEST marker of adequate resuscitation?",
            options: [{text:"Lactate clearance (decreasing lactate) + improving clinical status",correct:true,points:10},{text:"CVP 8-12 alone",correct:false,points:3},{text:"Urine output only",correct:false,points:4},{text:"Normal heart rate",correct:false,points:3}],
            teaching: `<h4>Resuscitation Endpoints</h4><ul><li><strong>Lactate clearance</strong> - most predictive of outcome</li><li>MAP ≥65 mmHg</li><li>Urine output ≥0.5 mL/kg/hr</li><li>Improving mental status</li><li>Central venous O2 saturation ≥70% (if available)</li></ul>`
        },{
            title: "Complications",
            narrative: `Day 2: Patient develops <span class="critical">worsening hypoxia</span>. CXR shows bilateral infiltrates.`,
            question: "What complication has likely developed?",
            options: [{text:"ARDS (Acute Respiratory Distress Syndrome)",correct:true,points:10},{text:"Simple fluid overload only",correct:false,points:4},{text:"New pneumonia",correct:false,points:3},{text:"Pulmonary embolism",correct:false,points:2}],
            teaching: `<h4>Sepsis Complications</h4><ul><li><strong>ARDS</strong> - lung injury, bilateral infiltrates, P/F ratio < 300</li><li><strong>AKI</strong> - from hypoperfusion, nephrotoxins</li><li><strong>DIC</strong> - coagulopathy</li><li><strong>Hepatic dysfunction</strong></li><li><strong>Encephalopathy</strong></li></ul>`
        },{
            title: "Case Resolution",
            narrative: `Day 5: Patient extubated, vasopressors weaned, lactate normal. Cultures grew E. coli.`,
            question: "What is the recommended antibiotic duration for uncomplicated bacteremia?",
            options: [{text:"7-10 days for uncomplicated bacteremia, de-escalate to targeted therapy",correct:true,points:10},{text:"3 days is sufficient",correct:false,points:0},{text:"21 days minimum",correct:false,points:3},{text:"6 weeks IV antibiotics",correct:false,points:1}],
            teaching: `<h4>Key Takeaways - Adult Sepsis</h4><ul><li>Early recognition with qSOFA/SOFA</li><li>Hour-1 bundle: lactate, cultures, antibiotics, fluids</li><li>Norepinephrine first-line vasopressor</li><li>Source control within 6-12 hours</li><li>De-escalate antibiotics when possible</li></ul>`
        }],
        peds: [{
            title: "The Sick Child",
            narrative: `A <span class="highlight">3-year-old boy</span> presents with <span class="critical">fever, lethargy, and mottled skin</span>. Mom says he had a cold for 2 days.<br><br><strong>Vitals:</strong> HR 180, BP 70/40, RR 40, SpO2 94%, T 103.2°F<br><strong>Exam:</strong> Lethargic, mottled extremities, cap refill 5 seconds<br><strong>Weight:</strong> 15 kg`,
            question: "What is the MOST concerning finding in this child?",
            options: [{text:"Hypotension with tachycardia and prolonged cap refill - decompensated shock",correct:true,points:10},{text:"Fever - indicates infection",correct:false,points:3},{text:"Tachycardia alone",correct:false,points:4},{text:"Lethargy - needs sleep",correct:false,points:0}],
            teaching: `<h4>⚠️ Pediatric Sepsis - Key Differences</h4><ul><li><strong>Hypotension is LATE</strong> - children compensate until they crash</li><li>Look for: Tachycardia, poor perfusion, altered mental status BEFORE BP drops</li><li>Use age-appropriate vital sign thresholds</li><li>pSOFA score (modified for pediatrics)</li></ul>`
        },{
            title: "Pediatric Fluid Resuscitation",
            narrative: `You recognize septic shock. IV access obtained.<br><strong>Weight:</strong> 15 kg`,
            question: "What is the initial fluid bolus for pediatric septic shock?",
            options: [{text:"20 mL/kg crystalloid bolus over 5-10 minutes, may repeat up to 40-60 mL/kg",correct:true,points:10},{text:"10 mL/kg slowly over 1 hour",correct:false,points:2},{text:"30 mL/kg like adults",correct:false,points:5},{text:"No fluids - go straight to vasopressors",correct:false,points:0}],
            teaching: `<h4>Pediatric Sepsis Resuscitation</h4><ul><li><strong>20 mL/kg bolus</strong> over 5-10 minutes (faster than adults!)</li><li>Reassess after each bolus</li><li>May give 40-60 mL/kg in first hour if needed</li><li>Watch for hepatomegaly, rales (fluid overload signs)</li><li>For this 15 kg child: 20 × 15 = <strong>300 mL bolus</strong></li></ul>`
        },{
            title: "Pediatric Vasopressor Selection",
            narrative: `After 40 mL/kg fluid (600 mL), the child remains hypotensive with cold extremities.`,
            question: "What vasopressor approach is recommended for COLD pediatric septic shock?",
            options: [{text:"Epinephrine - provides inotropy for cold shock with poor cardiac output",correct:true,points:10},{text:"Norepinephrine first like adults",correct:false,points:5},{text:"Dopamine only",correct:false,points:3},{text:"No vasopressors in children",correct:false,points:0}],
            teaching: `<h4>Pediatric Vasopressor Selection</h4><ul><li><strong>COLD shock</strong> (poor perfusion, cool extremities): Start with <strong>Epinephrine</strong></li><li><strong>WARM shock</strong> (vasodilated, bounding pulses): Start with <strong>Norepinephrine</strong></li><li>Most pediatric septic shock is COLD (unlike adults)</li></ul>`
        },{
            title: "Pediatric Empiric Antibiotics",
            narrative: `No clear source identified. Previously healthy child.`,
            question: "What empiric coverage is appropriate for this previously healthy child with sepsis?",
            options: [{text:"Ceftriaxone + Vancomycin to cover common pathogens including resistant organisms",correct:true,points:10},{text:"Amoxicillin only",correct:false,points:1},{text:"Same as adults - meropenem",correct:false,points:4},{text:"Azithromycin",correct:false,points:0}],
            teaching: `<h4>Pediatric Sepsis Antibiotics by Age</h4><ul><li><strong>< 3 months:</strong> Ampicillin + Cefotaxime/Gentamicin (cover Listeria, GBS)</li><li><strong>3 mo - 3 yr:</strong> Ceftriaxone ± Vancomycin</li><li><strong>> 3 yr:</strong> Similar to adults</li></ul>`
        },{
            title: "Pediatric Source Identification",
            narrative: `CXR shows right lower lobe consolidation. Likely bacterial pneumonia.`,
            question: "Besides antibiotics, what additional intervention may be needed?",
            options: [{text:"If parapneumonic effusion/empyema develops, may need drainage",correct:true,points:10},{text:"Routine chest tube for all pneumonia",correct:false,points:0},{text:"No additional intervention ever needed",correct:false,points:2},{text:"Immediate thoracotomy",correct:false,points:0}],
            teaching: `<h4>Pediatric Source Control</h4><ul><li>Most common sources: Respiratory, GI, GU, skin/soft tissue</li><li>Pneumonia may → empyema requiring drainage</li><li>Appendicitis/abscess → surgery/IR drainage</li><li>Line infections → remove catheter</li></ul>`
        },{
            title: "Pediatric Resuscitation Goals",
            narrative: `After fluids and epinephrine: HR 140, BP 85/50, cap refill 3 seconds.`,
            question: "What clinical finding BEST indicates improving perfusion?",
            options: [{text:"Improving capillary refill, mental status, and urine output",correct:true,points:10},{text:"Normal blood pressure alone",correct:false,points:4},{text:"Normal heart rate",correct:false,points:3},{text:"Warm skin temperature only",correct:false,points:3}],
            teaching: `<h4>Pediatric Resuscitation Goals</h4><ul><li><strong>Cap refill < 2 seconds</strong></li><li>Normal pulses, no differential between central/peripheral</li><li>Warm extremities</li><li>Urine output > 1 mL/kg/hr</li><li>Normal mental status</li><li>Lactate normalizing</li></ul>`
        },{
            title: "Pediatric Sepsis Complications",
            narrative: `Child received 80 mL/kg fluid. Now has hepatomegaly and new crackles.`,
            question: "What complication should you be concerned about?",
            options: [{text:"Fluid overload - may need to slow fluids and consider inotropes",correct:true,points:10},{text:"Continue aggressive fluid boluses",correct:false,points:0},{text:"This is expected and not concerning",correct:false,points:1},{text:"Pneumonia progression",correct:false,points:3}],
            teaching: `<h4>Pediatric-Specific Complications</h4><ul><li><strong>Fluid overload</strong> - watch for hepatomegaly, rales, edema</li><li>May need to transition to inotropes if fluid-refractory</li><li><strong>Cerebral edema</strong> - especially in DKA, meningitis</li><li><strong>Adrenal insufficiency</strong> - consider hydrocortisone if refractory shock</li></ul>`
        },{
            title: "Case Resolution",
            narrative: `Day 4: Child improving, weaned off epinephrine, tolerating feeds. Blood culture grew Strep pneumoniae.`,
            question: "What is the most important long-term consideration?",
            options: [{text:"Ensure immunizations are up-to-date; consider immunology workup if recurrent",correct:true,points:10},{text:"No follow-up needed",correct:false,points:0},{text:"Lifelong prophylactic antibiotics",correct:false,points:2},{text:"Avoid all future vaccines",correct:false,points:0}],
            teaching: `<h4>Key Takeaways - Pediatric Sepsis</h4><ul><li>Hypotension is LATE - recognize compensated shock early</li><li>20 mL/kg boluses (faster than adults)</li><li>COLD shock → Epinephrine; WARM shock → Norepinephrine</li><li>Age-appropriate antibiotic selection</li><li>Watch for fluid overload</li><li>Ensure vaccination status</li></ul>`
        }]
    };
    
    function setMode(mode) {
        currentMode = mode;
        currentStage = 0;
        score = 0;
        decisionPath = [];
        document.body.className = mode;
        document.querySelectorAll('.mode-btn').forEach((b,i) => {
            b.classList.toggle('active', (mode === 'adult' && i === 0) || (mode === 'peds' && i === 1));
        });
        document.getElementById('score').textContent = '0';
        document.getElementById('caseTitle').innerHTML = mode === 'adult' ? '🏥 Sepsis & Septic Shock' : '👶 Sepsis & Septic Shock (Pediatric)';
        renderStage();
    }
    
    function renderStage() {
        const stage = stages[currentMode][currentStage];
        document.getElementById('stageIndicator').textContent = `Stage ${currentStage + 1} of ${stages[currentMode].length}`;
        document.getElementById('progress').style.width = ((currentStage + 1) / stages[currentMode].length * 100) + '%';
        
        let optionsHtml = stage.options.map((opt, i) => `
            <div class="mcq-option" onclick="checkAnswer(${i})" data-index="${i}">
                <div class="option-letter">${String.fromCharCode(65 + i)}</div>
                <div>${opt.text}</div>
            </div>
        `).join('');
        
        document.getElementById('scene-container').innerHTML = `
            <div class="scene">
                <div class="scene-header">
                    <div class="scene-phase">Stage ${currentStage + 1} of ${stages[currentMode].length}</div>
                    <div class="scene-title">${stage.title}</div>
                </div>
                <div class="narrative">${stage.narrative}</div>
                <div class="question-box">
                    <div class="question-prompt">${stage.question}</div>
                    <div class="mcq-options">${optionsHtml}</div>
                    <div class="feedback correct-feedback" id="fb-correct">✓ Correct!</div>
                    <div class="feedback incorrect-feedback" id="fb-incorrect">✗ Not quite</div>
                    <div class="teaching-point" id="teaching">${stage.teaching}</div>
                    <button class="btn" id="next-btn" onclick="nextStage()">${currentStage < stages[currentMode].length - 1 ? 'Continue →' : 'View Results →'}</button>
                </div>
            </div>
        `;
    }
    
    function checkAnswer(index) {
        const stage = stages[currentMode][currentStage];
        const options = document.querySelectorAll('.mcq-option');
        const selected = stage.options[index];
        
        options.forEach((opt, i) => {
            opt.classList.add('disabled');
            if (stage.options[i].correct) opt.classList.add('correct');
            else if (i === index) opt.classList.add('incorrect');
        });
        
        const points = selected.points;
        score += points;
        document.getElementById('score').textContent = score;
        
        decisionPath.push({
            stage: currentStage + 1,
            title: stage.title,
            choice: selected.text.substring(0, 50) + '...',
            points: points,
            maxPoints: 10,
            isOptimal: selected.correct,
            optimalChoice: stage.options.find(o => o.correct)?.text.substring(0, 50) + '...'
        });
        
        if (selected.correct) document.getElementById('fb-correct').classList.add('show');
        else document.getElementById('fb-incorrect').classList.add('show');
        document.getElementById('teaching').classList.add('show');
        document.getElementById('next-btn').classList.add('show');
    }
    
    function nextStage() {
        currentStage++;
        if (currentStage < stages[currentMode].length) renderStage();
        else showDebrief();
    }
    
    function showDebrief() {
        const percentage = Math.round((score / maxScore) * 100);
        let grade, emoji, color;
        if (percentage >= 90) { grade = 'Outstanding!'; emoji = '🏆'; color = '#22c55e'; }
        else if (percentage >= 80) { grade = 'Excellent!'; emoji = '🌟'; color = '#3b82f6'; }
        else if (percentage >= 70) { grade = 'Good Work!'; emoji = '👍'; color = '#f59e0b'; }
        else { grade = 'Keep Learning!'; emoji = '📚'; color = '#ef4444'; }
        
        const pathHtml = decisionPath.map(d => `
            <div class="path-item ${d.isOptimal ? 'path-optimal' : d.points >= 5 ? 'path-suboptimal' : 'path-incorrect'}">
                <div style="display:flex;justify-content:space-between;">
                    <div>
                        <strong>${d.isOptimal ? '✓' : '○'} Stage ${d.stage}:</strong> ${d.title}<br>
                        <span style="font-size:0.9rem;color:#666;">Your choice: ${d.choice}</span>
                        ${!d.isOptimal ? `<br><span style="font-size:0.85rem;color:#888;">💡 Better: ${d.optimalChoice}</span>` : ''}
                    </div>
                    <div style="font-weight:600;color:${d.isOptimal ? '#22c55e' : '#f59e0b'};">${d.points}/10</div>
                </div>
            </div>
        `).join('');
        
        document.getElementById('debriefContent').innerHTML = `
            <div style="text-align:center;margin-bottom:24px;">
                <div style="font-size:4rem;">${emoji}</div>
                <div style="font-size:2.5rem;font-weight:700;color:${color}">${percentage}%</div>
                <div style="color:#666;">${grade}</div>
            </div>
            <h3 style="margin:20px 0 16px;font-weight:700;">📊 Your Decision Path (${currentMode === 'adult' ? 'Adult' : 'Pediatric'} Mode)</h3>
            ${pathHtml}
            <button onclick="location.reload()" style="width:100%;padding:16px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:white;border:none;border-radius:12px;font-size:1.1rem;font-weight:600;cursor:pointer;margin-top:24px;">🔄 Try Again</button>
        `;
        document.getElementById('debriefOverlay').classList.add('show');
    }
    
    function closeDebrief() { document.getElementById('debriefOverlay').classList.remove('show'); }
    renderStage();
    

// ============================================================================
// EPA & CALIBRATION ENHANCEMENT - ReasonDx
// ============================================================================

// Case EPA Metadata
const caseEPA = {
    id: 'sepsis',
    primaryEPAs: ["EPA-10","EPA-2","EPA-4"],
    secondaryEPAs: ["EPA-1","EPA-3","EPA-7"],
    category: 'Critical Care'
};

// Response tracking for calibration
let responseHistory = [];
let pendingSelection = null;

// EPA Names for display
const epaNames = {"EPA-1":"Gather H&P","EPA-2":"Prioritize DDx","EPA-3":"Recommend Tests","EPA-4":"Enter Orders","EPA-7":"Apply Evidence","EPA-10":"Recognize Urgency","EPA-12":"Perform Procedures"};

// Override selectOption to add confidence step
const originalSelectOption = typeof selectOption === 'function' ? selectOption : null;

function selectOptionEnhanced(index, correct) {
    const qId = 'q' + currentStage;
    if (answeredQuestions.has(qId)) return;
    
    // Store pending selection
    pendingSelection = { index, correct, stageIdx: currentStage };
    
    // Highlight selected option
    document.querySelectorAll('.mcq-option').forEach((opt, i) => {
        opt.classList.remove('selected');
        if (i === index) opt.classList.add('selected');
    });
    
    // Show confidence slider
    const confContainer = document.getElementById('confidence-container');
    if (confContainer) {
        confContainer.classList.add('show');
        confContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function updateConfidenceDisplay(value) {
    const display = document.getElementById('confidence-display');
    if (display) display.textContent = value + '%';
}

function submitWithConfidence() {
    if (!pendingSelection) return;
    
    const confidence = parseInt(document.getElementById('confidence-slider').value);
    const { index, correct, stageIdx } = pendingSelection;
    const stage = stages[stageIdx];
    
    // Record response with confidence
    responseHistory.push({
        stage: stageIdx + 1,
        stageTitle: stage.title,
        epaFocus: caseEPA.primaryEPAs[0],
        selectedIndex: index,
        selectedText: stage.question.options[index].text,
        correct: correct,
        confidence: confidence,
        points: correct ? stage.question.points : 0,
        maxPoints: stage.question.points
    });
    
    // Hide confidence container
    const confContainer = document.getElementById('confidence-container');
    if (confContainer) confContainer.classList.remove('show');
    
    // Now process the answer (call original logic)
    const qId = 'q' + stageIdx;
    answeredQuestions.add(qId);
    decisionPath[stageIdx] = index;
    
    maxScore += stage.question.points;
    if (correct) score += stage.question.points;
    
    document.getElementById('score').textContent = score;
    document.getElementById('maxScore').textContent = maxScore;
    
    // Show calibration feedback
    showCalibrationFeedback(confidence, correct);
    
    pendingSelection = null;
    renderStage();
}

function showCalibrationFeedback(confidence, correct) {
    // This will be shown in the feedback section after render
    const feedback = document.createElement('div');
    feedback.className = 'calibration-feedback show';
    
    if (correct && confidence >= 70) {
        feedback.classList.add('well-calibrated');
        feedback.innerHTML = '✅ <strong>Well calibrated!</strong> You were confident and correct.';
    } else if (correct && confidence < 50) {
        feedback.classList.add('underconfident');
        feedback.innerHTML = '📚 Correct, but you were uncertain. <strong>Trust your knowledge more!</strong>';
    } else if (!correct && confidence >= 70) {
        feedback.classList.add('overconfident');
        feedback.innerHTML = '⚠️ <strong>Overconfidence detected.</strong> High confidence + wrong answer is where diagnostic errors happen.';
    } else {
        feedback.classList.add('well-calibrated');
        feedback.innerHTML = '📝 Incorrect, but your uncertainty was appropriate. Review this concept.';
    }
    
    // Store for rendering
    window.lastCalibrationFeedback = feedback.outerHTML;
}

// Enhanced debrief with EPA and calibration
function showEnhancedDebrief() {
    const overlay = document.getElementById('debriefOverlay');
    const content = document.getElementById('debriefContent');
    if (!overlay || !content) return;
    
    const percentage = maxScore > 0 ? Math.round((score / maxScore) * 100) : 0;
    
    // Calculate calibration
    const withConf = responseHistory.filter(r => r.confidence !== undefined);
    const correctWithConf = withConf.filter(r => r.correct);
    const incorrectWithConf = withConf.filter(r => !r.correct);
    const avgConfCorrect = correctWithConf.length > 0 
        ? Math.round(correctWithConf.reduce((s,r) => s + r.confidence, 0) / correctWithConf.length) : 0;
    const avgConfIncorrect = incorrectWithConf.length > 0 
        ? Math.round(incorrectWithConf.reduce((s,r) => s + r.confidence, 0) / incorrectWithConf.length) : 0;
    
    // EPA performance
    const epaPerf = {};
    responseHistory.forEach(r => {
        const epa = r.epaFocus || caseEPA.primaryEPAs[0];
        if (!epaPerf[epa]) epaPerf[epa] = { correct: 0, total: 0 };
        epaPerf[epa].total++;
        if (r.correct) epaPerf[epa].correct++;
    });
    
    // Calibration interpretation
    let calibrationMsg = '';
    if (avgConfCorrect - avgConfIncorrect > 20) {
        calibrationMsg = '✅ Good discrimination! You feel more confident when you\'re right.';
    } else if (avgConfIncorrect > 60) {
        calibrationMsg = '⚠️ Overconfidence pattern detected. Practice asking "What would make me wrong?"';
    } else {
        calibrationMsg = '📊 Work on calibration - confidence should differ between correct and incorrect answers.';
    }
    
    content.innerHTML = `
        <div style="text-align:center;margin-bottom:24px;">
            <div style="font-size:4rem;">${percentage >= 80 ? '🏆' : percentage >= 60 ? '👍' : '📚'}</div>
            <div style="font-size:2.5rem;font-weight:700;color:${percentage >= 80 ? '#22c55e' : percentage >= 60 ? '#f59e0b' : '#ef4444'}">${percentage}%</div>
            <div style="color:#6b7280;">Score: ${score}/${maxScore}</div>
        </div>
        
        <div class="epa-debrief-section">
            <h4>📋 EPA Competencies Assessed</h4>
            <div class="epa-progress-grid">
                ${Object.entries(epaPerf).map(([epa, data]) => {
                    const pct = Math.round((data.correct / data.total) * 100);
                    const colorClass = pct >= 80 ? 'high' : pct >= 60 ? 'medium' : 'low';
                    return `<div class="epa-progress-card">
                        <div class="epa-name">${epaNames[epa] || epa}</div>
                        <div class="epa-score ${colorClass}">${pct}%</div>
                    </div>`;
                }).join('')}
            </div>
        </div>
        
        <div class="calibration-debrief">
            <h4>🎯 Confidence Calibration</h4>
            <div class="calibration-stats">
                <div class="calibration-stat">
                    <div class="stat-value" style="color:#22c55e;">${avgConfCorrect}%</div>
                    <div class="stat-label">Avg confidence when correct</div>
                </div>
                <div class="calibration-stat">
                    <div class="stat-value" style="color:${avgConfIncorrect > 60 ? '#ef4444' : '#f59e0b'};">${avgConfIncorrect}%</div>
                    <div class="stat-label">Avg confidence when incorrect</div>
                </div>
            </div>
            <div class="calibration-interpretation">${calibrationMsg}</div>
        </div>
        
        <div class="decision-path">
            <h3>📝 Your Decisions</h3>
            ${responseHistory.map(r => `
                <div class="path-item ${r.correct ? 'path-optimal' : 'path-incorrect'}">
                    <div style="display:flex;justify-content:space-between;">
                        <div>
                            <div class="path-stage">${r.correct ? '✓' : '✗'} Stage ${r.stage}: ${r.stageTitle}</div>
                            <div class="path-choice" style="font-size:0.85rem;color:#6b7280;">${r.confidence}% confident</div>
                        </div>
                        <div class="path-points">${r.points}/${r.maxPoints}</div>
                    </div>
                </div>
            `).join('')}
        </div>
        
        <button class="debrief-btn" onclick="location.reload()">🔄 Try Again</button>
        <button class="debrief-btn" style="background:#e5e7eb;color:#4b5563;margin-top:8px;" onclick="closeDebrief()">Close</button>
    `;
    
    overlay.classList.add('show');
}

// Replace selectOption globally
window.selectOption = selectOptionEnhanced;

// Store original showDebrief if exists
if (typeof showDebrief === 'function') {
    window.originalShowDebrief = showDebrief;
}
window.showDebrief = showEnhancedDebrief;

</script>
