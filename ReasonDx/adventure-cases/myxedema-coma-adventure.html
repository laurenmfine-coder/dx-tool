<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myxedema Coma | Clinical Adventure</title>
    <style>
        :root { --primary: #4A90A4; --primary-dark: #2D5A6A; --accent: #F4A261; --success: #2A9D8F; --danger: #E63946; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #F8FAFC; }
        .container { max-width: 900px; margin: 0 auto; padding: 1rem; }
        .header { background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: white; padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem; }
        .header h1 { font-size: 1.5rem; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.3); border-radius: 4px; margin-top: 1rem; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
        .scene { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .scene-title { font-size: 1.1rem; font-weight: 600; color: var(--primary-dark); margin-bottom: 1rem; }
        .patient-info { background: #E3F2FD; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .vitals { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 0.5rem; margin: 1rem 0; }
        .vital { background: white; padding: 0.5rem; border-radius: 6px; text-align: center; border: 1px solid #ddd; }
        .vital-label { font-size: 0.7rem; color: #666; }
        .vital-value { font-weight: 600; }
        .vital-value.critical { color: var(--danger); }
        .narrative { line-height: 1.7; margin-bottom: 1.5rem; }
        .question { background: #FFF8E1; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border-left: 4px solid var(--accent); }
        .options { display: flex; flex-direction: column; gap: 0.75rem; }
        .option { padding: 1rem; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; background: white; text-align: left; }
        .option:hover { border-color: var(--primary); }
        .option.correct { border-color: var(--success); background: #E8F5E9; }
        .option.incorrect { border-color: var(--danger); background: #FFEBEE; }
        .feedback { padding: 1rem; border-radius: 8px; margin-top: 1rem; display: none; }
        .feedback.show { display: block; }
        .feedback.correct { background: #E8F5E9; border-left: 4px solid var(--success); }
        .feedback.incorrect { background: #FFEBEE; border-left: 4px solid var(--danger); }
        .teaching { background: #E8F5E9; padding: 1rem; border-radius: 8px; margin-top: 1rem; }
        .teaching h4 { color: var(--success); margin-bottom: 0.5rem; }
        .btn { padding: 0.75rem 1.5rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; }
        .btn-primary { background: var(--primary); color: white; }
        .nav-row { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .score-card { background: var(--success); color: white; padding: 2rem; border-radius: 12px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦋 Myxedema Coma</h1>
            <p>Severe hypothyroidism emergency - a clinical rarity but boards favorite!</p>
            <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
        </div>
        <div id="scene-container"></div>
        <div id="completion" style="display:none;"></div>
    </div>
    <script>
const scenes = [
    {
        icon: '🚨', title: 'Scene 1: ED Presentation',
        patient: '72-year-old female found unresponsive at home in winter',
        vitals: [{label:'Temp',value:'34.2°C',critical:true},{label:'HR',value:'48',critical:true},{label:'BP',value:'88/60',critical:true},{label:'RR',value:'8',critical:true},{label:'SpO2',value:'89%',critical:true},{label:'GCS',value:'7',critical:true}],
        narrative: 'EMS found her on the floor, minimally responsive. Home medications unknown. Exam: bradycardic, hypotensive, hypothermic. Diffuse non-pitting edema (myxedema), coarse dry skin, delayed reflexes with slow relaxation phase. Neck scar noted.',
        question: 'The neck scar and clinical picture suggest what underlying condition?',
        options: [
            {text:'Carotid endarterectomy - stroke',correct:false,feedback:'Stroke wouldn\'t cause this metabolic picture with hypothermia, bradycardia, and myxedema.'},
            {text:'Previous thyroidectomy - severe hypothyroidism',correct:true,feedback:'Correct! The triad of hypothermia, bradycardia, altered mental status plus myxedema and a neck scar (thyroidectomy) points to myxedema coma from severe hypothyroidism.'},
            {text:'Parathyroidectomy - hypocalcemia',correct:false,feedback:'Hypocalcemia causes tetany and QT prolongation, not this clinical picture.'}
        ]
    },
    {
        icon: '🔬', title: 'Scene 2: Labs Return',
        narrative: 'TSH: >100 mIU/L (normal 0.5-4.5), Free T4: <0.1 ng/dL (normal 0.8-1.8), Cortisol: 8 mcg/dL (low-normal), Sodium: 122 mEq/L, Glucose: 52 mg/dL.',
        question: 'Why must you give stress-dose steroids BEFORE thyroid hormone?',
        options: [
            {text:'Thyroid hormone depletes cortisol stores',correct:false,feedback:'Not exactly - the issue is accelerated cortisol metabolism.'},
            {text:'Thyroid hormone increases cortisol metabolism, unmasking adrenal insufficiency',correct:true,feedback:'Correct! Giving T4/T3 without cortisol can precipitate adrenal crisis. Hypothyroidism masks adrenal insufficiency by slowing cortisol clearance. Always give steroids first or simultaneously.'},
            {text:'Steroids improve thyroid hormone absorption',correct:false,feedback:'Steroids don\'t affect thyroid hormone absorption.'}
        ],
        teaching: 'Treatment order: 1) Stress-dose steroids (hydrocortisone 100mg IV), 2) IV levothyroxine loading, 3) Consider T3. Never give thyroid hormone without cortisol coverage!'
    },
    {
        icon: '💊', title: 'Scene 3: Treatment Initiation',
        narrative: 'You give hydrocortisone 100mg IV. Now you need to address the thyroid deficiency.',
        question: 'What is the recommended initial treatment for myxedema coma?',
        options: [
            {text:'Oral levothyroxine 100mcg daily',correct:false,feedback:'Oral absorption is unreliable in myxedema coma due to ileus and poor gut perfusion. IV is required.'},
            {text:'IV levothyroxine 200-400mcg loading dose, then 50-100mcg IV daily',correct:true,feedback:'Correct! IV T4 loading (200-400mcg) followed by daily IV dosing. Some add IV T3 (5-20mcg) for faster onset, but this is controversial and may increase arrhythmia risk.'},
            {text:'IV T3 alone 25mcg q8h',correct:false,feedback:'T3 alone is too risky - rapid effect can cause arrhythmias and MI. T4 provides more stable levels.'}
        ]
    },
    {
        icon: '🌡️', title: 'Scene 4: Supportive Care',
        narrative: 'The patient remains hypothermic at 34.5°C. You consider rewarming strategies.',
        question: 'What is the recommended approach to hypothermia in myxedema coma?',
        options: [
            {text:'Active external rewarming with forced-air warming blankets',correct:false,feedback:'Aggressive external rewarming causes peripheral vasodilation, worsening hypotension - dangerous in myxedema coma.'},
            {text:'Passive rewarming only - blankets, warm room, warm IV fluids',correct:true,feedback:'Correct! Passive rewarming is preferred. Active rewarming causes vasodilation → cardiovascular collapse. Let thyroid hormone gradually restore thermogenesis.'},
            {text:'Heated peritoneal lavage',correct:false,feedback:'Too aggressive - the cardiovascular system cannot handle rapid temperature changes in myxedema coma.'}
        ],
        teaching: 'Supportive care: Passive rewarming, mechanical ventilation if needed (hypercapnia common), careful fluid resuscitation, dextrose for hypoglycemia, correct hyponatremia gradually.'
    },
    {
        icon: '⚠️', title: 'Scene 5: Precipitants',
        narrative: 'You investigate what triggered this crisis. Family arrives and reports she ran out of thyroid medication 2 months ago and recently had a UTI.',
        question: 'Which is the MOST COMMON precipitant of myxedema coma?',
        options: [
            {text:'Cold exposure alone',correct:false,feedback:'Cold exposure is a precipitant but not the most common.'},
            {text:'Infection (pneumonia, UTI, sepsis)',correct:true,feedback:'Correct! Infection is the #1 precipitant, followed by medication non-compliance, cold exposure, CNS depressants, and surgery. Always search for and treat underlying infection.'},
            {text:'Iodine deficiency',correct:false,feedback:'Iodine deficiency causes chronic hypothyroidism but doesn\'t typically precipitate myxedema coma in developed countries.'}
        ]
    },
    {
        icon: '✅', title: 'Scene 6: Recovery',
        narrative: 'With IV levothyroxine, hydrocortisone, antibiotics for UTI, and supportive care, the patient gradually improves. Mental status normalizes by day 4. She\'s transitioned to oral thyroid replacement.',
        teaching: 'Myxedema Coma Summary:\n• Triad: Hypothermia + AMS + Precipitant in hypothyroid patient\n• Treatment: Steroids FIRST, then IV T4 ± T3\n• Passive rewarming only\n• Find and treat precipitant (infection most common)\n• Mortality: 20-40% even with treatment\n• Prevention: Medication compliance, avoid precipitants'
    }
];
        let currentScene = 0, score = 0;
        function renderScene() {
            const s = scenes[currentScene];
            document.getElementById('progress').style.width = ((currentScene+1)/scenes.length*100)+'%';
            let h = '<div class="scene"><div class="scene-title">'+(s.icon||'📋')+' '+s.title+'</div>';
            if(s.patient) h += '<div class="patient-info"><strong>'+s.patient+'</strong></div>';
            if(s.vitals) { h += '<div class="vitals">'; s.vitals.forEach(v => h += '<div class="vital"><div class="vital-label">'+v.label+'</div><div class="vital-value'+(v.critical?' critical':'')+'">'+v.value+'</div></div>'); h += '</div>'; }
            h += '<div class="narrative">'+s.narrative+'</div>';
            if(s.question) { h += '<div class="question"><strong>❓ '+s.question+'</strong></div><div class="options">'; s.options.forEach((o,i) => h += '<button class="option" onclick="select('+i+')" data-c="'+!!o.correct+'">'+o.text+'</button>'); h += '</div><div class="feedback" id="fb"></div>'; }
            if(s.teaching) h += '<div class="teaching"><h4>📚 Teaching Point</h4><p>'+s.teaching+'</p></div>';
            h += '<div class="nav-row">'+(s.question?'':'<button class="btn btn-primary" onclick="next()">Continue →</button>')+'</div></div>';
            document.getElementById('scene-container').innerHTML = h;
        }
        function select(i) {
            const opts = document.querySelectorAll('.option'), fb = document.getElementById('fb'), s = scenes[currentScene];
            opts.forEach((o,j) => { o.style.pointerEvents='none'; if(j===i){ if(o.dataset.c==='true'){ o.classList.add('correct'); score++; fb.className='feedback show correct'; fb.innerHTML='<strong>✓ Correct!</strong> '+s.options[i].feedback; } else { o.classList.add('incorrect'); fb.className='feedback show incorrect'; fb.innerHTML='<strong>✗ Not quite.</strong> '+s.options[i].feedback; opts.forEach(x=>{ if(x.dataset.c==='true') x.classList.add('correct'); }); }}});
            setTimeout(()=>{ document.querySelector('.nav-row').innerHTML='<button class="btn btn-primary" onclick="next()">Continue →</button>'; },800);
        }
        function next() { currentScene++; if(currentScene >= scenes.length) complete(); else { renderScene(); window.scrollTo({top:0,behavior:'smooth'}); }}
        function complete() { document.getElementById('scene-container').style.display='none'; const q=scenes.filter(s=>s.question).length; document.getElementById('completion').innerHTML='<div class="score-card"><h2>🎉 Case Complete!</h2><p>Score: '+score+'/'+q+' ('+Math.round(score/q*100)+'%)</p></div><div class="nav-row" style="justify-content:center;margin-top:1rem;"><a href="../adventure-hub.html" class="btn btn-primary">← Back</a></div>'; document.getElementById('completion').style.display='block'; }
        renderScene();
    </script>
</body>
</html>
