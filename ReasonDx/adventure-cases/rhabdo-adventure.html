<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muscle Breakdown | ReasonDx Adventure</title>
    <style>:root{--bg:#0F172A;--card:#1E293B;--border:#334155;--text:#F1F5F9;--muted:#94A3B8;--accent:#F97316;--success:#10B981;--warning:#F59E0B;--danger:#DC2626}*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}.header{background:linear-gradient(135deg,#EA580C,#F97316);padding:12px 20px;position:sticky;top:0;z-index:100}.header-row{display:flex;justify-content:space-between;align-items:center;max-width:1200px;margin:0 auto}.diff-toggle{display:flex;background:rgba(0,0,0,.3);border-radius:8px}.diff-btn{padding:6px 12px;font-size:.75rem;cursor:pointer;border:none;background:0 0;color:rgba(255,255,255,.7);font-weight:600}.diff-btn.active{background:rgba(255,255,255,.2);color:#fff}.stat{text-align:center;background:rgba(0,0,0,.2);padding:6px 14px;border-radius:8px}.stat-value{font-size:1.1rem;font-weight:700;font-family:monospace}.stat-label{font-size:.6rem;opacity:.8}.main{max-width:900px;margin:0 auto;padding:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:20px}.card-header{padding:20px 24px;border-bottom:1px solid var(--border)}.card-phase{font-size:.75rem;color:var(--accent);text-transform:uppercase}.card-title{font-size:1.5rem;font-weight:700}.card-body{padding:24px}.narrative{background:rgba(249,115,22,.1);border-left:4px solid var(--accent);padding:20px;border-radius:0 12px 12px 0;margin-bottom:20px}.narrative .hl{background:rgba(249,115,22,.3);padding:2px 6px;border-radius:4px}.setup-screen{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center}.start-btn{background:var(--accent);color:#fff;border:none;padding:16px 48px;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}.hint{background:rgba(59,130,246,.15);padding:12px 16px;border-radius:8px;margin-bottom:16px;color:#93C5FD}.radio-options{display:flex;flex-direction:column;gap:10px}.radio-option{display:flex;align-items:center;gap:12px;padding:14px 18px;background:rgba(0,0,0,.2);border:2px solid var(--border);border-radius:10px;cursor:pointer}.radio-option.selected{border-color:var(--accent);background:rgba(249,115,22,.15)}.radio-option.correct{border-color:var(--success);background:rgba(16,185,129,.15)}.radio-option.incorrect{border-color:var(--danger);background:rgba(220,38,38,.15)}.radio-circle{width:22px;height:22px;border:2px solid var(--border);border-radius:50%}.radio-option.selected .radio-circle{border-color:var(--accent);background:radial-gradient(circle,var(--accent) 40%,transparent 40%)}.feedback{padding:20px;border-radius:12px;margin:20px 0}.feedback.excellent{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3)}.feedback.incorrect{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3)}.btn{padding:14px 28px;border-radius:10px;font-weight:600;cursor:pointer;border:none}.btn-primary{background:var(--accent);color:#fff}.btn:disabled{opacity:.5}.btn-row{display:flex;gap:12px;margin-top:24px}.btn-link{background:0 0;border:2px solid var(--border);color:var(--text)}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:12px;margin:20px 0}.vital{background:rgba(0,0,0,.2);padding:12px;border-radius:10px;text-align:center}.vital-label{font-size:.7rem;color:var(--muted)}.vital-value{font-size:1.3rem;font-weight:700;font-family:monospace}.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:16px 0}.lab-item{display:flex;justify-content:space-between;padding:8px 12px;background:rgba(0,0,0,.2);border-radius:6px}.lab-name{color:var(--muted)}.lab-value{font-family:monospace;font-weight:600}.score-summary{background:rgba(0,0,0,.2);border-radius:12px;padding:24px;margin:24px auto;max-width:600px}.score-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.pearls-box{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:20px;margin-top:20px}.pearls-title{font-weight:700;color:var(--success);margin-bottom:12px}.pearl-item{padding:8px 0;border-bottom:1px solid rgba(16,185,129,.2);font-size:.95rem}.cross-link{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);border-radius:8px;padding:12px 16px;margin-top:12px}.cross-link a{color:#FDBA74;text-decoration:none}.progress-bar{background:rgba(255,255,255,.1);border-radius:10px;height:8px;margin:20px 0}.progress-fill{background:var(--accent);height:100%;border-radius:10px}.question-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}.question-number{background:var(--accent);color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}</style>
</head>
<body>
    <header class="header"><div class="header-row"><div style="font-weight:600">💪 Muscle Breakdown</div><div style="display:flex;gap:12px;align-items:center"><div class="diff-toggle"><button class="diff-btn active" onclick="setDiff('easy')">Easy</button><button class="diff-btn" onclick="setDiff('int')">Intermediate</button><button class="diff-btn" onclick="setDiff('adv')">Advanced</button></div><div class="stat"><div class="stat-value" id="score">0</div><div class="stat-label">Points</div></div></div></div></header>
    <main class="main"><div id="app"></div></main>
<script>
const S={stage:'setup',score:0,max:0,diff:'easy',q:0,total:8};
const C={easy:{age:'28M',wt:'82kg',hx:'Intense CrossFit workout yesterday, now severe muscle pain and dark urine',exam:'Diffuse muscle tenderness, swollen thighs, tea-colored urine',vitals:{HR:'98',BP:'138/88',Temp:'99.1°F',SpO2:'99%'},labs:{CK:'45,000 (H)',Cr:'1.4',K:'5.2',Hx:'New to CrossFit'}},int:{age:'45M',wt:'95kg',hx:'Found down after cocaine binge, confused, muscle rigidity',exam:'Agitated, diffuse rigidity, diaphoretic, mydriasis',vitals:{HR:'128',BP:'178/102',Temp:'103.8°F',SpO2:'94%'},labs:{CK:'125,000 (H)',Cr:'3.2',K:'6.8',Hx:'Cocaine use'}},adv:{age:'62F',wt:'70kg',hx:'Started statin 3 weeks ago, progressive weakness, now oliguric',exam:'Proximal weakness, diffuse tenderness, minimal urine output',vitals:{HR:'92',BP:'148/92',Temp:'98.6°F',SpO2:'97%'},labs:{CK:'85,000 (H)',Cr:'5.8',K:'6.2',Hx:'New atorvastatin'}}};
const Q=[
{t:'Diagnosis',q:'CK level threshold for rhabdomyolysis diagnosis?',h:'Muscle enzyme elevation',o:[{id:'a',txt:'CK >5x upper limit of normal (typically >1000 U/L)',c:1,p:100},{id:'b',txt:'Any CK elevation',c:0,p:30},{id:'c',txt:'CK >100,000 only',c:0,p:20}],fb:{1:'<b>Correct!</b> Rhabdomyolysis defined as CK >5x ULN. Higher CK correlates with AKI risk. CK >15,000-20,000 significantly increases renal risk.',0:'<b>Definition:</b> CK >5x ULN. Higher levels = higher AKI risk.'}},
{t:'Common Causes',q:'Most common causes of rhabdomyolysis?',h:'Think trauma, toxins, exertion',o:[{id:'a',txt:'Trauma/crush injury, exertional, drugs/toxins (statins, cocaine, alcohol)',c:1,p:100},{id:'b',txt:'Infections only',c:0,p:20},{id:'c',txt:'Autoimmune diseases',c:0,p:20}],fb:{1:'<b>Correct!</b> Common causes: Trauma/immobilization, exertional (exercise, seizures, heat stroke), toxins (alcohol, cocaine, statins), infections, electrolyte disorders.',0:'<b>Causes:</b> Trauma, exertion, drugs/toxins most common.'}},
{t:'AKI Mechanism',q:'How does rhabdomyolysis cause acute kidney injury?',h:'Myoglobin nephrotoxicity',o:[{id:'a',txt:'Myoglobin causes tubular obstruction, direct toxicity, and renal vasoconstriction',c:1,p:100},{id:'b',txt:'CK directly damages kidneys',c:0,p:20},{id:'c',txt:'Volume overload',c:0,p:10}],fb:{1:'<b>Correct!</b> Myoglobin precipitates in tubules (especially in acidic urine), causes direct oxidative injury, and triggers renal vasoconstriction. CK itself is not nephrotoxic.',0:'<b>Mechanism:</b> Myoglobin (not CK) causes tubular obstruction and toxicity.'}},
{t:'Fluid Therapy',q:'Primary treatment for rhabdomyolysis to prevent AKI?',h:'Volume is key',o:[{id:'a',txt:'Aggressive IV fluids (goal UOP 200-300 mL/hr)',c:1,p:100},{id:'b',txt:'Fluid restriction',c:0,p:0},{id:'c',txt:'Diuretics first',c:0,p:20}],fb:{1:'<b>Correct!</b> Aggressive crystalloid resuscitation is cornerstone. Goal UOP 200-300 mL/hr (or 3 mL/kg/hr). May need 10+ L/day initially. Monitor for volume overload.',0:'<b>Fluids:</b> Aggressive hydration, target UOP 200-300 mL/hr.'}},
{t:'Urine Alkalinization',q:'Role of bicarbonate in rhabdomyolysis treatment?',h:'Controversial practice',o:[{id:'a',txt:'Urine alkalinization (target pH >6.5) may reduce myoglobin precipitation - evidence limited',c:1,p:100},{id:'b',txt:'Always required',c:0,p:30},{id:'c',txt:'Contraindicated',c:0,p:20}],fb:{1:'<b>Correct!</b> Bicarb may help by alkalinizing urine (reduces myoglobin precipitation) and treating acidosis. Evidence is limited. Use if severe rhabdo or metabolic acidosis.',0:'<b>Bicarb:</b> Optional, may help with severe cases. Evidence limited.'}},
{t:'Compartment Syndrome',q:'When to suspect compartment syndrome in rhabdomyolysis?',h:'Surgical emergency',o:[{id:'a',txt:'Pain out of proportion, pain with passive stretch, tense compartment, paresthesias',c:1,p:100},{id:'b',txt:'Only with fractures',c:0,p:20},{id:'c',txt:'High CK alone',c:0,p:20}],fb:{1:'<b>Correct!</b> 5 Ps: Pain (especially passive stretch), Pressure (tense), Paresthesias, Paralysis, Pulselessness (late). Compartment pressure >30 mmHg or within 30 of diastolic = fasciotomy.',0:'<b>Compartment syndrome:</b> Pain with passive stretch is key early sign.'}},
{t:'Electrolyte Management',q:'Most dangerous early electrolyte abnormality in rhabdomyolysis?',h:'Released from damaged muscle',o:[{id:'a',txt:'Hyperkalemia (can cause fatal arrhythmias)',c:1,p:100},{id:'b',txt:'Hyponatremia',c:0,p:20},{id:'c',txt:'Hypercalcemia',c:0,p:10}],fb:{1:'<b>Correct!</b> Hyperkalemia from muscle breakdown is life-threatening. Also watch for hyperphosphatemia (early), hypocalcemia (early), hypercalcemia (recovery phase).',0:'<b>Electrolytes:</b> Hyperkalemia is most dangerous early. Treat aggressively.'}},
{t:'Dialysis Indications',q:'When is dialysis indicated in rhabdomyolysis?',h:'Standard AKI indications',o:[{id:'a',txt:'Refractory hyperkalemia, severe acidosis, volume overload, uremic symptoms',c:1,p:100},{id:'b',txt:'CK >50,000 alone',c:0,p:30},{id:'c',txt:'All rhabdomyolysis cases',c:0,p:10}],fb:{1:'<b>Correct!</b> Dialysis for standard AKI indications (AEIOU). High CK alone is not indication. Most patients recover renal function with aggressive fluids.',0:'<b>Dialysis:</b> Standard AKI indications, not CK level alone.'}}
];
let sel=null;
function setDiff(d){S.diff=d;document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','int','adv'][i]===d));if(S.stage!=='setup'){S.stage='setup';S.score=0;S.max=0;S.q=0;document.getElementById('score').textContent='0';}render();}
function addPts(p,m){S.score+=p;S.max+=m;document.getElementById('score').textContent=S.score;}
function pick(id){sel=id;document.querySelectorAll('.radio-option').forEach(o=>o.classList.toggle('selected',o.dataset.id===id));document.getElementById('sub').disabled=false;}
function submit(){const q=Q[S.q-1];const opt=q.o.find(o=>o.id===sel);addPts(opt.p||0,100);document.querySelectorAll('.radio-option').forEach(o=>{const op=q.o.find(x=>x.id===o.dataset.id);if(op&&op.c)o.classList.add('correct');else if(o.dataset.id===sel)o.classList.add('incorrect');});document.getElementById('fb').innerHTML='<div class="feedback '+(opt&&opt.c?'excellent':'incorrect')+'">'+q.fb[opt&&opt.c?1:0]+'</div>';document.getElementById('sub').textContent=S.q<S.total?'Next':'Results';document.getElementById('sub').onclick=next;}
function next(){if(S.q<S.total){S.q++;sel=null;render();}else{S.stage='outcome';render();}}
function start(){S.q=1;S.stage='question';render();}
function go(s){S.stage=s;render();}
function render(){const c=C[S.diff];if(S.stage==='setup'){document.getElementById('app').innerHTML='<div class="setup-screen"><h1>💪 Muscle Breakdown</h1><p style="color:var(--muted);margin-bottom:32px">Rhabdomyolysis: Diagnosis, causes, AKI prevention, fluid management, compartment syndrome</p><button class="start-btn" onclick="go(\'pres\')">Begin Case</button></div>';}else if(S.stage==='pres'){document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Presentation</div><div class="card-title">💪 Muscle Injury</div></div><div class="card-body"><div class="narrative"><span class="hl">'+c.age+'</span> ('+c.wt+')<br><b>Hx:</b> '+c.hx+'<br><b>Exam:</b> '+c.exam+'</div><div class="vitals-grid">'+Object.entries(c.vitals).map(function(e){return'<div class="vital"><div class="vital-label">'+e[0]+'</div><div class="vital-value">'+e[1]+'</div></div>';}).join('')+'</div><div class="lab-grid">'+Object.entries(c.labs).map(function(e){return'<div class="lab-item"><span class="lab-name">'+e[0]+'</span><span class="lab-value">'+e[1]+'</span></div>';}).join('')+'</div><div class="btn-row"><button class="btn btn-primary" onclick="start()">Begin Assessment</button></div></div></div>';}else if(S.stage==='question'){var q=Q[S.q-1];document.getElementById('app').innerHTML='<div class="card"><div class="card-header"><div class="card-phase">Q'+S.q+'/'+S.total+'</div><div class="card-title">'+q.t+'</div></div><div class="card-body"><div class="progress-bar"><div class="progress-fill" style="width:'+(S.q/S.total*100)+'%"></div></div><div class="question-header"><div class="question-number">'+S.q+'</div><div style="font-weight:600">'+q.q+'</div></div><div class="hint">'+q.h+'</div><div class="radio-options">'+q.o.map(function(o){return'<div class="radio-option" data-id="'+o.id+'" onclick="pick(\''+o.id+'\')"><div class="radio-circle"></div><div><b>'+o.txt+'</b></div></div>';}).join('')+'</div><div id="fb"></div><div class="btn-row"><button class="btn btn-primary" id="sub" onclick="submit()" disabled>Submit</button></div></div></div>';}else{var pct=S.max>0?Math.round(S.score/S.max*100):0;document.getElementById('app').innerHTML='<div class="card"><div class="card-body"><div style="text-align:center;padding:40px"><div style="font-size:4rem">'+(pct>=70?'🎉':'📚')+'</div><div style="font-size:2rem;font-weight:700;color:'+(pct>=70?'var(--success)':'var(--warning)')+'">'+(pct>=70?'Complete!':'Review')+'</div></div><div class="score-summary"><div class="score-row"><span>Score</span><span>'+S.score+'/'+S.max+' ('+pct+'%)</span></div></div><div class="pearls-box"><div class="pearls-title">Rhabdomyolysis Pearls</div><div class="pearl-item"><b>Diagnosis:</b> CK >5x ULN (typically >1000)</div><div class="pearl-item"><b>Causes:</b> Trauma, exertion, drugs/toxins (statins, cocaine)</div><div class="pearl-item"><b>Fluids:</b> Aggressive IVF, target UOP 200-300 mL/hr</div><div class="pearl-item"><b>Bicarb:</b> Consider for severe cases, evidence limited</div><div class="pearl-item"><b>Hyperkalemia:</b> Most dangerous early electrolyte issue</div><div class="pearl-item"><b>Compartment:</b> Pain with passive stretch = emergency</div><div class="pearl-item"><b>Dialysis:</b> Standard AKI indications, not CK level</div></div><div class="cross-link"><a href="aki-adventure-enhanced.html">Related: AKI</a> | <a href="hyperkalemia-adventure-enhanced.html">Hyperkalemia</a></div><div class="btn-row" style="justify-content:center;margin-top:30px"><button class="btn btn-primary" onclick="location.reload()">Retry</button><button class="btn btn-link" onclick="location.href=\'adventure-hub.html\'">Back</button></div></div></div>';}}
document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
