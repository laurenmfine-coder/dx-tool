<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GI Bleed Complete | Clinical Adventure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #7f1d1d 0%, #b91c1c 100%); min-height: 100vh; color: #e2e8f0; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: rgba(127, 29, 29, 0.9); border-radius: 16px; margin-bottom: 20px; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; background: #dc2626; margin-left: 10px; }
        .progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #dc2626, #fca5a5); border-radius: 3px; }
        .scene { background: linear-gradient(135deg, #7f1d1d, #991b1b); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
        .scene-header { background: rgba(220, 38, 38, 0.15); padding: 16px 20px; }
        .scene-phase { font-size: 0.75rem; color: #fca5a5; text-transform: uppercase; }
        .scene-title { font-size: 1.4rem; font-weight: 700; }
        .scene-body { padding: 24px; }
        .highlight { color: #fbbf24; font-weight: 600; }
        .critical { color: #f87171; font-weight: 600; }
        .safe { color: #4ade80; font-weight: 600; }
        .mechanism-box { background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(220, 38, 38, 0.2)); border: 1px solid rgba(139, 92, 246, 0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .mechanism-title { font-weight: 700; color: #c4b5fd; margin-bottom: 12px; }
        .pathway { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.9rem; line-height: 1.8; }
        .boards-tip { background: rgba(251, 191, 36, 0.15); border: 1px solid rgba(251, 191, 36, 0.4); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .boards-tip-title { font-weight: 700; color: #fbbf24; margin-bottom: 10px; }
        .alert-box { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); border-radius: 12px; padding: 20px; margin: 20px 0; }
        .alert-title { font-weight: 700; color: #f87171; margin-bottom: 10px; }
        .btn { padding: 16px 28px; background: linear-gradient(135deg, #dc2626, #b91c1c); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; width: 100%; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(220, 38, 38, 0.4); }
        .comparison-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.85rem; }
        .comparison-table th, .comparison-table td { padding: 10px; text-align: left; border: 1px solid rgba(255,255,255,0.1); }
        .comparison-table th { background: rgba(0,0,0,0.3); color: #fca5a5; }
        .why-chain { background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(220, 38, 38, 0.15)); border: 1px solid rgba(139, 92, 246, 0.3); border-radius: 16px; padding: 24px; margin: 24px 0; }
        .why-chain-title { font-size: 1.2rem; font-weight: 700; color: #c4b5fd; margin-bottom: 20px; }
        .why-item { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 18px; margin-bottom: 14px; }
        .why-q { font-weight: 600; color: #e9d5ff; margin-bottom: 10px; }
        .outcome-banner { text-align: center; padding: 40px; }
        .tips { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 24px 0; }
        .pearl, .pitfall { padding: 20px; border-radius: 12px; }
        .pearl { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.3); }
        .pitfall { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); }
        .tip-header { font-weight: 600; margin-bottom: 10px; }
        .pearl .tip-header { color: #4ade80; }
        .pitfall .tip-header { color: #f87171; }
        @media (max-width: 640px) { .tips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="app"></div>
    <script>
    const STAGES = [
        'arrival', 'upper_vs_lower', 'ugib_etiologies', 'risk_stratification', 
        'resuscitation', 'transfusion', 'ppi_role', 'endoscopy_timing', 
        'endoscopic_therapy', 'post_endo', 'variceal_bleed', 'lower_gi', 
        'rebleeding', 'debrief'
    ];
    const state = { stage: 0 };

    function render() {
        const progress = ((state.stage + 1) / STAGES.length) * 100;
        let c = `<div class="header">
            <div style="font-size:1.3rem;font-weight:700">🩸 GI Bleed Complete<span class="badge">14 STAGES</span></div>
            <div style="font-size:1.3rem;font-weight:700">${state.stage + 1}/${STAGES.length}</div></div>
            <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>`;
        
        switch(STAGES[state.stage]) {
            case 'arrival': c += renderArrival(); break;
            case 'upper_vs_lower': c += renderUpperVsLower(); break;
            case 'ugib_etiologies': c += renderUGIBEtiologies(); break;
            case 'risk_stratification': c += renderRiskStrat(); break;
            case 'resuscitation': c += renderResuscitation(); break;
            case 'transfusion': c += renderTransfusion(); break;
            case 'ppi_role': c += renderPPI(); break;
            case 'endoscopy_timing': c += renderEndoscopyTiming(); break;
            case 'endoscopic_therapy': c += renderEndoscopicTherapy(); break;
            case 'post_endo': c += renderPostEndo(); break;
            case 'variceal_bleed': c += renderVariceal(); break;
            case 'lower_gi': c += renderLowerGI(); break;
            case 'rebleeding': c += renderRebleeding(); break;
            case 'debrief': c += renderDebrief(); break;
        }
        document.getElementById('app').innerHTML = c;
    }

    function renderArrival() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 1 of 14</div><div class="scene-title">The Bleeding Patient</div></div>
            <div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would pregnancy change your approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#eff6ff; border:1px solid #3b82f6; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #3b82f6;">
                    <p style="margin:0; color:#1e40af; font-size:0.9rem;"><strong>💡 Clinical Pearl:</strong> Don't forget to consider mimics and look-alikes</p>
                </div>
                <div class="narrative"><p>A <span class="highlight">68-year-old man</span> presents to the ED with <span class="critical">coffee-ground emesis and melena</span> since this morning.</p>
                <p style="margin-top:12px;"><strong>History:</strong> HTN, osteoarthritis (takes ibuprofen daily), H. pylori treated 10 years ago<br>
                <strong>Vitals:</strong> HR 112, BP 92/58, RR 20, SpO2 96% on RA<br>
                <strong>Exam:</strong> Pale, diaphoretic, abdomen soft with epigastric tenderness, melena on rectal</p></div>
                
                <div class="alert-box"><div class="alert-title">🚨 Recognize Hemodynamic Instability</div>
                    <p>Tachycardia + hypotension suggests significant blood loss (>15-30% blood volume). This patient needs immediate resuscitation.</p></div>
                
                <div class="mechanism-box"><div class="mechanism-title">🧬 GI Bleed Pathophysiology Overview</div>
                    <div class="pathway">Mucosal injury (NSAID, H. pylori, stress)<br>→ Erosion into submucosal vessels<br>→ Arterial bleeding (peptic ulcer) or venous (varices)<br>→ Hematemesis/melena (upper) or hematochezia (lower)<br>→ Volume depletion → ↓ preload → ↓ cardiac output<br>→ Compensatory tachycardia → eventual shock</div></div>
                <button class="btn" onclick="nextStage()">Upper vs Lower GI Bleed →</button>
            </div></div>`;
    }

    function renderUpperVsLower() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 2 of 14</div><div class="scene-title">Localizing the Bleed</div></div>
            <div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate severity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if this patient had renal impairment?</p>
                </div>
                <div class="boards-tip"><div class="boards-tip-title">📚 Upper vs Lower GI Bleeding</div>
                    <table class="comparison-table">
                        <tr><th>Feature</th><th>Upper GIB</th><th>Lower GIB</th></tr>
                        <tr><td><strong>Location</strong></td><td>Proximal to ligament of Treitz</td><td>Distal to ligament of Treitz</td></tr>
                        <tr><td><strong>Presentation</strong></td><td>Hematemesis, coffee grounds, melena</td><td>Hematochezia, maroon stool</td></tr>
                        <tr><td><strong>BUN:Cr ratio</strong></td><td>>20:1 (digested blood = urea)</td><td>Normal</td></tr>
                        <tr><td><strong>NG aspirate</strong></td><td>Blood or coffee grounds</td><td>Clear or bilious</td></tr>
                    </table></div>
                
                <div class="mechanism-box"><div class="mechanism-title">🧬 Why Does UGIB Cause Melena?</div>
                    <div class="pathway">Blood in upper GI tract<br>→ Hemoglobin exposed to gastric acid<br>→ Oxidation of heme → hematin (black)<br>→ Transit through small bowel (>14 hours)<br>→ Bacterial degradation<br>→ Black, tarry, malodorous stool (melena)<br><br>⚠️ Brisk UGIB can cause hematochezia<br>(rapid transit = no time for oxidation)</div></div>

                <div class="why-chain"><div class="why-chain-title">🔗 WHY Chain: BUN:Cr Ratio</div>
                    <div class="why-item"><div class="why-q">Why is BUN elevated in UGIB?</div>
                        Blood in GI tract is digested → protein broken down → absorbed as amino acids → converted to urea in liver</div>
                    <div class="why-item"><div class="why-q">Why doesn't Cr rise equally?</div>
                        Creatinine comes from muscle metabolism, not diet. GI blood doesn't contain significant creatinine.</div>
                    <div class="why-item"><div class="why-q">Why is this ratio useful?</div>
                        BUN:Cr >20:1 has ~90% specificity for UGIB vs LGIB or non-GI causes of anemia.</div>
                </div>
                
                <div class="narrative"><p><strong>This patient:</strong> Coffee-ground emesis + melena + BUN 42/Cr 1.4 (ratio 30:1) = <span class="critical">Upper GI bleed</span></p></div>
                <button class="btn" onclick="nextStage()">UGIB Etiologies →</button>
            </div></div>`;
    }

    function renderUGIBEtiologies() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 3 of 14</div><div class="scene-title">Causes of Upper GI Bleeding</div></div>
            <div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Think about the most common causes first</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does immunosuppression affect the differential?</p>
                </div>
                <div class="boards-tip"><div class="boards-tip-title">📚 UGIB Etiologies by Frequency</div>
                    <table class="comparison-table">
                        <tr><th>Cause</th><th>%</th><th>Key Features</th></tr>
                        <tr><td><strong>Peptic ulcer disease</strong></td><td>40-50%</td><td>NSAID use, H. pylori, epigastric pain</td></tr>
                        <tr><td><strong>Erosive disease</strong></td><td>15-25%</td><td>Multiple superficial erosions, often stress-related</td></tr>
                        <tr><td><strong>Esophageal varices</strong></td><td>10-15%</td><td>Cirrhosis, massive bleeding</td></tr>
                        <tr><td><strong>Mallory-Weiss tear</strong></td><td>5-10%</td><td>Retching/vomiting before hematemesis</td></tr>
                        <tr><td><strong>Malignancy</strong></td><td>2-5%</td><td>Weight loss, anemia, older age</td></tr>
                        <tr><td><strong>Dieulafoy lesion</strong></td><td>1-2%</td><td>Massive bleed, normal-looking mucosa</td></tr>
                    </table></div>
                
                <div class="mechanism-box"><div class="mechanism-title">🧬 Peptic Ulcer Pathophysiology</div>
                    <div class="pathway"><strong>Normal gastric defense:</strong><br>Mucus layer + bicarbonate + prostaglandins<br>→ Protects against acid/pepsin<br><br><strong>NSAIDs:</strong><br>Inhibit COX-1 → ↓ prostaglandins<br>→ ↓ mucus, ↓ bicarbonate, ↓ blood flow<br>→ Mucosal breakdown → ulceration<br><br><strong>H. pylori:</strong><br>Urease → ammonia (neutralizes local acid)<br>→ But causes chronic inflammation<br>→ Disrupts mucosal defense → ulcer</div></div>

                <div class="alert-box"><div class="alert-title">⚠️ High-Risk Features for Rebleeding</div>
                    <ul style="margin-left: 20px; margin-top: 8px;">
                        <li>Visible vessel in ulcer base</li>
                        <li>Active spurting or oozing</li>
                        <li>Adherent clot</li>
                        <li>Ulcer size >2cm</li>
                        <li>Posterior duodenal ulcer (near GDA)</li>
                    </ul></div>

                <div class="narrative"><p><strong>This patient:</strong> Daily NSAID use = high risk for peptic ulcer disease. Most likely diagnosis is <span class="highlight">NSAID-induced gastric or duodenal ulcer</span>.</p></div>
                <button class="btn" onclick="nextStage()">Risk Stratification →</button>
            </div></div>`;
    }

    function renderRiskStrat() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 4 of 14</div><div class="scene-title">Risk Stratification</div></div>
            <div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> What's the key history element pointing to diagnosis?</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How would pregnancy change your approach?</p>
                </div>
                <div class="rdx-clinical-pearl" style="background:#fef2f2; border:1px solid #ef4444; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #ef4444;">
                    <p style="margin:0; color:#991b1b; font-size:0.9rem;"><strong>⚠️ Don't Miss:</strong> Always reassess if patient not improving as expected</p>
                </div>
                <div class="boards-tip"><div class="boards-tip-title">📚 Glasgow-Blatchford Score (Pre-Endoscopy)</div>
                    <table class="comparison-table">
                        <tr><th>Parameter</th><th>Points</th></tr>
                        <tr><td>BUN 18.2-22.4 mg/dL</td><td>2</td></tr>
                        <tr><td>BUN 22.4-28 mg/dL</td><td>3</td></tr>
                        <tr><td>BUN 28-70 mg/dL</td><td>4</td></tr>
                        <tr><td>BUN >70 mg/dL</td><td>6</td></tr>
                        <tr><td>Hgb 12-13 (men) or 10-12 (women)</td><td>1</td></tr>
                        <tr><td>Hgb 10-12 (men) or <10 (women)</td><td>3</td></tr>
                        <tr><td>Hgb <10 (men)</td><td>6</td></tr>
                        <tr><td>SBP 100-109</td><td>1</td></tr>
                        <tr><td>SBP 90-99</td><td>2</td></tr>
                        <tr><td>SBP <90</td><td>3</td></tr>
                        <tr><td>HR ≥100</td><td>1</td></tr>
                        <tr><td>Melena</td><td>1</td></tr>
                        <tr><td>Syncope</td><td>2</td></tr>
                        <tr><td>Hepatic disease</td><td>2</td></tr>
                        <tr><td>Cardiac failure</td><td>2</td></tr>
                    </table>
                    <p style="margin-top: 12px;"><strong>GBS = 0:</strong> Very low risk, consider outpatient management<br>
                    <strong>GBS ≥6:</strong> High risk, needs inpatient care and likely intervention</p></div>
                
                <div class="boards-tip"><div class="boards-tip-title">📚 Rockall Score (Post-Endoscopy)</div>
                    <p>Predicts rebleeding and mortality AFTER endoscopy. Incorporates endoscopic findings:</p>
                    <ul style="margin-left: 20px; margin-top: 8px;">
                        <li>Clean base ulcer = low risk</li>
                        <li>Flat pigmented spot = low risk</li>
                        <li>Adherent clot = intermediate risk</li>
                        <li>Visible vessel = high risk</li>
                        <li>Active bleeding = high risk</li>
                    </ul></div>

                <div class="narrative"><p><strong>This patient's GBS:</strong> BUN 42 (4 pts) + Hgb 8.2 (6 pts) + SBP 92 (2 pts) + HR 112 (1 pt) + Melena (1 pt) = <span class="critical">14 points = High risk</span></p></div>
                <button class="btn" onclick="nextStage()">Resuscitation →</button>
            </div></div>`;
    }

    function renderResuscitation() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 5 of 14</div><div class="scene-title">Initial Resuscitation</div></div>
            <div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Start with ABCs - Airway, Breathing, Circulation</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> What if this patient had renal impairment?</p>
                </div>
                <div class="alert-box"><div class="alert-title">🚨 ABCs of GI Bleed Resuscitation</div>
                    <ol style="margin-left: 20px; line-height: 2.2;">
                        <li><strong>Airway:</strong> Intubate if massive hematemesis + altered mental status</li>
                        <li><strong>Breathing:</strong> Supplemental O2, monitor SpO2</li>
                        <li><strong>Circulation:</strong> 2 large-bore IVs (18G or larger), crystalloid resuscitation</li>
                    </ol></div>
                
                <div class="boards-tip"><div class="boards-tip-title">📚 IV Access Principles</div>
                    <table class="comparison-table">
                        <tr><th>Catheter Size</th><th>Flow Rate</th><th>Use</th></tr>
                        <tr><td>14G</td><td>~300 mL/min</td><td>Massive transfusion</td></tr>
                        <tr><td>16G</td><td>~200 mL/min</td><td>Active bleeding</td></tr>
                        <tr><td>18G</td><td>~100 mL/min</td><td>Standard resuscitation</td></tr>
                        <tr><td>20G</td><td>~60 mL/min</td><td>Maintenance only</td></tr>
                    </table>
                    <p style="margin-top: 10px;">Flow rate ∝ r⁴ (Poiseuille's law) - catheter diameter matters more than length!</p></div>
                
                <div class="mechanism-box"><div class="mechanism-title">🧬 Why Crystalloid Before Blood?</div>
                    <div class="pathway">Acute blood loss → ↓ intravascular volume<br>→ ↓ venous return → ↓ cardiac output<br>→ Tissue hypoperfusion<br><br>Crystalloid:<br>• Immediately available<br>• Restores intravascular volume<br>• Buys time for crossmatch<br><br>⚠️ Don't over-resuscitate!<br>Aggressive fluids before hemostasis<br>→ Dilutional coagulopathy<br>→ May worsen bleeding</div></div>

                <div class="narrative"><p><strong>Orders:</strong> 2 large-bore IVs, 1L LR bolus, type & screen, crossmatch 4 units PRBCs, CBC, BMP, coags, LFTs</p></div>
                <button class="btn" onclick="nextStage()">Transfusion Strategy →</button>
            </div></div>`;
    }

    function renderTransfusion() {
        return `<div class="scene"><div class="scene-header"><div class="scene-phase">Stage 6 of 14</div><div class="scene-title">Transfusion Thresholds</div></div>
            <div class="scene-body">
                <div class="rdx-hint-beginner" style="display:none; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #10b981;">
                    <p style="margin:0; color:#065f46; font-size:0.9rem;">🌱 <strong>Beginner Hint:</strong> Review vital signs carefully - they indicate severity</p>
                </div>
                <div class="rdx-hint-advanced" style="display:none; background:#fef3c7; border:1px solid #fcd34d; border-radius:8px; padding:12px 16px; margin:12px 0; border-left:4px solid #f59e0b;">
                    <p style="margin:0; color:#92400e; font-size:0.9rem;">🎯 <strong>Advanced Challenge:</strong> How does immunosuppression affect the differential?</p>
                </div>
                <div class="boards-tip"><div class="boards-tip-title">📚 Restrictive vs Liberal Transfusion</div>
                    <table class="comparison-table">
                        <tr><th>Strategy</th><th>Threshold</th><th>Evidence</th></tr>
                        <tr style="background:rgba(34,197,94,0.2);"><td><strong>Restrictive</strong></td><td>Hgb <7 g/dL</td><td>↓ mortality, ↓ rebleeding in UGIB</td></tr>
                        <tr><td>Liberal</td><td>Hgb <9 g/dL</td><td>Traditional approach, now discouraged</td></tr>
                        <tr><td>ACS exception</td><td>Hgb <8 g/dL</td><td>Higher threshold for active cardiac ischemia</td></tr>
                    </table></div>
                
                <div class="mechanism-box"><div class="mechanism-title">🧬 Why Restrictive is Better</div>
                    <div class="pathway"><strong>Villanueva et al. (NEJM 2013):</strong><br>Restrictive (Hgb <7) vs Liberal (Hgb <9)<br><br>Restrictive transfusion:<br>→ ↓ 45-day mortality (5% vs 9%)<br>→ ↓ Rebleeding (10% vs 16%)<br>→ ↓ Complications<br><br><strong>Mechanism:</strong><br>Transfusion → ↑ portal pressure<br>→ Especially harmful in varices<br>→ Triggers rebleeding<br><br>Also: transfusion is immunosuppressive<br>and associated with nosocomial infection</div></div>

        });

    // Track a decision
    window.rdxTrackDecision = function(stageId, stageTitle, choiceId, choiceText, outcome, points, maxPoints, isOptimal, optimalChoice, optimalText) {
        window.rdxDecisionPath.push({
            stage: stageId,
            title: stageTitle,
            choice: choiceId,
            choiceText: choiceText,
            outcome: outcome,
            points: points,
            maxPoints: maxPoints,
            isOptimal: isOptimal,

        let pathHTML = '';

            pathHTML = window.rdxDecisionPath.map(d => {
                let pathClass = d.isOptimal ? 'rdx-path-optimal' :
