<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReasonDx — Emergency Department</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e14;font-family:'DM Sans',system-ui,sans-serif;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column}

/* Nav bar */
.topnav{display:flex;align-items:center;gap:12px;padding:12px 24px;background:rgba(15,20,28,.95);border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:10}
.topnav .brand{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:#DC2626;letter-spacing:.02em}
.topnav .sep{width:1px;height:16px;background:rgba(255,255,255,.08)}
.topnav .page-title{font-size:13px;font-weight:600;color:rgba(255,255,255,.5)}
.topnav .nav-links{margin-left:auto;display:flex;gap:6px}
.nav-link{font-size:11px;color:rgba(255,255,255,.35);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);padding:5px 12px;border-radius:6px;text-decoration:none;font-weight:600;transition:all .15s}
.nav-link:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}

/* Hero section */
.hero{text-align:center;padding:48px 24px 32px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(220,38,38,.06),transparent);pointer-events:none}
.hero h1{font-size:38px;font-weight:300;color:#fff;letter-spacing:-1px;margin-bottom:6px}
.hero h1 span{color:#DC2626;font-weight:600}
.hero .sub{color:rgba(255,255,255,.35);font-size:14px;max-width:520px;margin:0 auto 24px;line-height:1.7}
.hero .enter-btn{display:inline-flex;align-items:center;gap:8px;background:#DC2626;color:#fff;font-size:15px;font-weight:700;padding:14px 36px;border-radius:10px;border:none;cursor:pointer;transition:all .2s;letter-spacing:.02em;text-decoration:none;font-family:'DM Sans',sans-serif}
.hero .enter-btn:hover{background:#B91C1C;transform:translateY(-2px);box-shadow:0 8px 24px rgba(220,38,38,.3)}

/* Board section */
.board-section{flex:1;padding:0 24px 48px;max-width:900px;margin:0 auto;width:100%}
.board-label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.2);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.board-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}

/* Patient cards */
.patient-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.patient-card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .2s;text-decoration:none;display:block;position:relative;overflow:hidden}
.patient-card:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.12);transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.3)}
.patient-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:2px 0 0 2px}
.patient-card.critical::before{background:#DC2626}
.patient-card.urgent::before{background:#D97706}
.pc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pc-room{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:#DC2626;background:rgba(220,38,38,.1);padding:3px 8px;border-radius:5px;letter-spacing:.03em}
.pc-room.urgent{color:#D97706;background:rgba(217,119,6,.1)}
.pc-name{font-weight:600;font-size:14px;color:rgba(255,255,255,.85)}
.pc-demo{font-size:11px;color:rgba(255,255,255,.3);margin-left:auto;font-family:'JetBrains Mono',monospace}
.pc-cc{font-size:12px;color:rgba(255,255,255,.45);line-height:1.5}
.pc-bottom{display:flex;align-items:center;gap:8px;margin-top:10px}
.pc-acuity{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:100px}
.pc-acuity.critical{color:#EF4444;background:rgba(239,68,68,.1)}
.pc-acuity.urgent{color:#FBBF24;background:rgba(251,191,36,.1)}
.pc-vitals{font-size:10px;color:rgba(255,255,255,.2);font-family:'JetBrains Mono',monospace;margin-left:auto}

/* Stats bar */
.stats-bar{display:flex;gap:20px;justify-content:center;margin-bottom:32px;flex-wrap:wrap}
.stat{text-align:center}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700}
.stat-num.red{color:#EF4444}
.stat-num.amber{color:#FBBF24}
.stat-num.green{color:#34D399}
.stat-label{font-size:10px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

@media(max-width:600px){
  .hero h1{font-size:28px}
  .patient-grid{grid-template-columns:1fr}
  .topnav{padding:10px 16px;flex-wrap:wrap}
}
</style>
</head>
<body>

<nav class="topnav">
  <div class="brand">ReasonDx</div>
  <div class="sep"></div>
  <div class="page-title">Emergency Department</div>
  <div class="nav-links">
    <a class="nav-link" href="hospital-3d.html">🏥 Hospital</a>
    <a class="nav-link" href="training.html">🎓 Training Hub</a>
  </div>
</nav>

<div class="hero">
  <h1><span>Emergency</span> Department</h1>
  <p class="sub">10 patients are waiting. Interview, examine, order diagnostics, and make disposition decisions in a fully interactive clinical simulation.</p>
  <a class="enter-btn" href="legacy/ed-board-v2.html">🚑 Open ED Track Board</a>
</div>

<div class="board-section">
  <div class="stats-bar">
    <div class="stat"><div class="stat-num red">6</div><div class="stat-label">Critical</div></div>
    <div class="stat"><div class="stat-num amber">4</div><div class="stat-label">Urgent</div></div>
    <div class="stat"><div class="stat-num green">10</div><div class="stat-label">Total</div></div>
  </div>

  <div class="board-label">Patient Board Preview</div>
  <div class="patient-grid" id="patient-grid"></div>
</div>

<script>
const PATIENTS = [
  {room:1,name:'James Morrison',age:'58M',cc:'Chest pain — radiating to L arm/jaw, diaphoretic',acuity:'critical',esi:2,vitals:'HR 102 · BP 158/94'},
  {room:2,name:'Anthony Russo',age:'52M',cc:'Substernal pressure — exertional angina now at rest',acuity:'urgent',esi:3,vitals:'HR 92 · BP 158/94'},
  {room:3,name:'Rachel Torres',age:'28F',cc:'Pleuritic chest pain — worse supine, friction rub',acuity:'urgent',esi:3,vitals:'HR 92 · BP 128/78'},
  {room:4,name:'Sarah Chen',age:'24F',cc:'RLQ abdominal pain — migrating, fever, guarding',acuity:'urgent',esi:3,vitals:'HR 92 · BP 128/78'},
  {room:5,name:'Thomas Walsh',age:'76M',cc:'Pulsatile abdominal mass — hypotensive, back pain',acuity:'critical',esi:1,vitals:'HR 118 · BP 82/58'},
  {room:6,name:'Maria Gonzalez',age:'31F',cc:'Acute dyspnea — tachycardic, hypoxic, calf swelling',acuity:'critical',esi:2,vitals:'HR 118 · BP 132/82'},
  {room:7,name:'Patricia Chen',age:'72F',cc:'Acute dyspnea — crackles, JVD, 3+ edema, AFib/RVR',acuity:'critical',esi:2,vitals:'HR 128 · BP 178/104'},
  {room:8,name:'Harold Washington',age:'68M',cc:'Worsening dyspnea — COPD exacerbation, purulent sputum',acuity:'urgent',esi:3,vitals:'HR 104 · BP 148/82'},
  {room:9,name:'Robert Williams',age:'42M',cc:'Thunderclap headache — worst of life, nuchal rigidity',acuity:'critical',esi:2,vitals:'HR 88 · BP 172/98'},
  {room:10,name:'David Park',age:'19M',cc:'Fever, confusion, petechiae — neck stiffness, toxic',acuity:'critical',esi:1,vitals:'HR 124 · BP 94/58'}
];

const grid = document.getElementById('patient-grid');
PATIENTS.forEach(p => {
  const isCrit = p.acuity === 'critical';
  const card = document.createElement('a');
  card.href = 'legacy/ed-board-v2.html';
  card.className = 'patient-card ' + p.acuity;
  card.innerHTML =
    '<div class="pc-top">' +
      '<span class="pc-room' + (isCrit ? '' : ' urgent') + '">R' + p.room + '</span>' +
      '<span class="pc-name">' + p.name + '</span>' +
      '<span class="pc-demo">' + p.age + '</span>' +
    '</div>' +
    '<div class="pc-cc">' + p.cc + '</div>' +
    '<div class="pc-bottom">' +
      '<span class="pc-acuity ' + p.acuity + '">' + p.acuity.toUpperCase() + ' · ESI ' + p.esi + '</span>' +
      '<span class="pc-vitals">' + p.vitals + '</span>' +
    '</div>';
  grid.appendChild(card);
});
</script>
</body>
</html>
