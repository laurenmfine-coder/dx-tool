<style>
:root {
    --brand:#2874A6; --brand-dark:#1B4F72; --brand-light:#D4E6F1;
    --bg:#F8FAFC; --bg-card:#FFFFFF; --text:#1E293B;
    --text-muted:#64748B; --text-dim:#94A3B8; --border:#E2E8F0;
    --red:#EF4444; --amber:#F59E0B; --green:#10B981; --purple:#7C3AED;
    --font: 'IBM Plex Sans', -apple-system, sans-serif;
    --mono:'JetBrains Mono',monospace;
    --serif: 'IBM Plex Sans',Georgia,serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

.app{max-width:780px;margin:0 auto;padding:24px;padding-bottom:100px}

/* Header */
.page-header{margin-bottom:28px}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--brand);text-decoration:none;font-size:13px;font-weight:500;margin-bottom:12px}
.page-header h1{font-family:var(--serif);font-size:26px;font-weight:700;margin-bottom:6px}
.page-header p{color:var(--text-muted);font-size:14px;line-height:1.5}

/* Specialist Grid */
.spec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
.spec-card{
    background:var(--bg-card);border:2px solid var(--border);border-radius:14px;
    padding:14px 10px;cursor:pointer;transition:all .2s;text-align:center;
}
.spec-card:hover{border-color:var(--brand);transform:translateY(-2px)}
.spec-card.selected{border-color:var(--brand);box-shadow:0 0 0 1px var(--brand),0 4px 16px rgba(40,116,166,.12)}
.spec-icon{font-size:32px;margin-bottom:6px}
.spec-name{font-weight:700;font-size:12px;margin-bottom:2px}
.spec-sub{font-size:10px;color:var(--text-dim)}

/* Case selection */
.case-section{margin-bottom:24px}
.case-section .label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);margin-bottom:8px}
.case-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.case-opt{
    background:var(--bg-card);border:1.5px solid var(--border);border-radius:10px;
    padding:12px;cursor:pointer;transition:all .15s;
}
.case-opt:hover{border-color:var(--brand)}
.case-opt.selected{border-color:var(--brand);background:rgba(40,116,166,.04)}
.case-opt .co-title{font-weight:600;font-size:13px;margin-bottom:2px}
.case-opt .co-meta{font-size:11px;color:var(--text-muted)}

.start-btn{
    background:var(--brand);color:white;border:none;border-radius:10px;
    padding:14px 36px;font-family:var(--font);font-size:15px;font-weight:600;
    cursor:pointer;transition:all .2s;width:100%;margin-top:16px;
}
.start-btn:hover{filter:brightness(1.1)}
.start-btn:disabled{opacity:.4;cursor:not-allowed}

/* Phone ring */
.ring-overlay{
    position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);
    display:flex;align-items:center;justify-content:center;z-index:200;
    animation:fadeIn .2s;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ring-card{
    background:var(--bg-card);border-radius:24px;padding:36px;text-align:center;
    min-width:320px;box-shadow:0 20px 60px rgba(0,0,0,.2);
    animation:ringShake .35s ease-in-out infinite;
}
@keyframes ringShake{0%,100%{transform:rotate(0)}25%{transform:rotate(-1.5deg)}75%{transform:rotate(1.5deg)}}
.ring-card .ring-icon{font-size:48px;margin-bottom:12px}
.ring-card .ring-label{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.ring-card .ring-name{font-size:20px;font-weight:700;margin-bottom:4px}
.ring-card .ring-dept{font-size:13px;color:var(--text-muted);margin-bottom:20px}
.answer-btn{
    background:var(--green);color:white;border:none;border-radius:12px;
    padding:12px 36px;font-family:var(--font);font-size:15px;font-weight:600;
    cursor:pointer;transition:all .2s;
}
.answer-btn:hover{filter:brightness(1.1)}

/* Chat interface */
.chat-panel{
    background:var(--bg-card);border:1.5px solid var(--border);border-radius:16px;
    overflow:hidden;margin-bottom:16px;
}
.chat-header{
    padding:14px 18px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:12px;
}
.chat-avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.chat-header-info .ch-name{font-weight:700;font-size:14px}
.chat-header-info .ch-dept{font-size:11px;color:var(--text-muted)}
.chat-header .ch-status{margin-left:auto;font-size:11px;font-weight:600;padding:3px 10px;border-radius:6px}
.status-active{background:#DCFCE7;color:#166534}
.status-ended{background:var(--border);color:var(--text-dim)}

.chat-body{padding:18px;min-height:200px;max-height:420px;overflow-y:auto}
.msg{margin-bottom:14px;max-width:85%;animation:msgIn .25s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.consultant{margin-right:auto}
.msg.student{margin-left:auto}
.msg-bubble{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5}
.msg.consultant .msg-bubble{background:#F1F5F9;color:var(--text);border-bottom-left-radius:4px}
.msg.student .msg-bubble{background:var(--brand);color:white;border-bottom-right-radius:4px}
.msg-sender{font-size:10px;font-weight:600;color:var(--text-dim);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.typing-indicator{display:flex;gap:4px;padding:10px 14px}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);animation:typeBounce .6s infinite alternate}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes typeBounce{from{opacity:.3;transform:translateY(0)}to{opacity:1;transform:translateY(-4px)}}

/* Response options */
.resp-area{padding:14px 18px;border-top:1px solid var(--border);background:#FAFBFC}
.resp-label{font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.resp-options{display:flex;flex-direction:column;gap:6px}
.resp-btn{
    background:white;border:1.5px solid var(--border);border-radius:10px;
    padding:10px 14px;text-align:left;cursor:pointer;font-family:var(--font);
    font-size:13px;color:var(--text);transition:all .15s;line-height:1.4;
}
.resp-btn:hover{border-color:var(--brand);background:rgba(40,116,166,.03)}
.resp-btn.selected{border-color:var(--brand);background:var(--brand-light)}
.resp-btn:disabled{opacity:.5;cursor:not-allowed}

/* Free text input */
.free-input-row{display:flex;gap:8px;margin-top:8px}
.free-input{
    flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;
    font-family:var(--font);font-size:13px;outline:none;resize:none;min-height:42px;
}
.free-input:focus{border-color:var(--brand)}
.send-btn{
    background:var(--brand);color:white;border:none;border-radius:10px;
    padding:10px 16px;font-family:var(--font);font-size:13px;font-weight:600;
    cursor:pointer;flex-shrink:0;
}
.send-btn:hover{filter:brightness(1.1)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}

/* Feedback */
.feedback-card{
    background:var(--bg-card);border:1.5px solid var(--border);border-radius:16px;
    padding:24px;margin-top:20px;
}
.feedback-card h3{font-family:var(--serif);font-size:20px;margin-bottom:16px}
.fb-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.fb-label{font-size:12px;color:var(--text-muted);width:160px}
.fb-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.fb-fill{height:100%;border-radius:3px;transition:width .8s}
.fb-val{font-family:var(--mono);font-size:12px;font-weight:600;width:36px;text-align:right}
.fb-text{font-size:13px;color:var(--text-muted);line-height:1.6;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.fb-actions{display:flex;gap:10px;margin-top:16px}
.fb-btn{padding:10px 20px;border-radius:10px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.fb-btn.primary{background:var(--brand);color:white}
.fb-btn.secondary{background:var(--bg);color:var(--text-muted);border:1px solid var(--border)}

/* Disposition badge */
.disposition{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:10px;font-size:13px;font-weight:600;margin:12px 0}
.disp-accepted{background:#DCFCE7;color:#166534}
.disp-deferred{background:#FEF3C7;color:#92400E}
.disp-redirected{background:#FEE2E2;color:#B91C1C}
.disp-pending{background:#E0F2FE;color:#0369A1}

@media(max-width:640px){
    .spec-grid{grid-template-columns:repeat(2,1fr)}
    .case-grid{grid-template-columns:1fr}
    .app{padding:16px}
}
/* RDX Loading */
.rdx-loading{position:fixed;inset:0;z-index:8000;background:#F8FAFC;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .3s}
.rdx-loading.hide{opacity:0;pointer-events:none}
.rdx-spinner{width:40px;height:40px;border:3px solid #E2E8F0;border-top-color:#2874A6;border-radius:50%;animation:rdxSpin .8s linear infinite}
@keyframes rdxSpin{to{transform:rotate(360deg)}}
.rdx-load-text{font-family:"IBM Plex Sans",sans-serif;font-size:14px;color:#64748B;font-weight:500}
</style>

        <h1>🧠 Clinical Reasoning Trainer</h1>
        <p>You placed a consult. Now the specialist is calling back — and they have questions. Present your case, justify the consult, and handle pushback.</p>
    </div>

    <!-- Setup -->
    <div id="setupPanel">
        <div class="case-section">
            <div class="label">Choose a Specialist</div>
            <div class="spec-grid" id="specGrid"></div>
        </div>

            <div class="label">Choose a Scenario</div>
            <div class="case-grid" id="caseGrid"></div>
        </div>

    </div>

    <!-- Game -->
    <div id="gameArea" style="display:none"></div>
</div>

<script>
// ════════════════════════════════════════════════════════════
// SPECIALISTS
// ════════════════════════════════════════════════════════════
const SPECIALISTS = {
    cardiology: {
        name:'Dr. Vasquez', title:'Cardiology Fellow',
        icon:'❤️', color:'#EF4444', bgColor:'#FEE2E2',
        style:'direct', personality:'Efficient and focused. Wants the bottom line fast. Gets impatient with disorganized presentations but respects trainees who know their stuff.',
        commonQs:['What does the ECG show?','What\'s the troponin trend?','Is there hemodynamic instability?','What\'s their EF?']
    },
    pulmonology: {
        name:'Dr. Okafor', title:'Pulmonary/Critical Care',
        icon:'🫁', color:'#3B82F6', bgColor:'#DBEAFE',
        style:'thorough', personality:'Teaching-oriented. Asks a lot of questions not to challenge you, but because they want you to learn. Will push you to think through the physiology.',
        commonQs:['What\'s the ABG?','What does the chest X-ray show?','What\'s their work of breathing?','Are they on any supplemental O2?']
    },
    neurology: {
        name:'Dr. Kim', title:'Neurology Attending',
        icon:'🧠', color:'#8B5CF6', bgColor:'#EDE9FE',
        style:'precise', personality:'Extremely detail-oriented. Wants a thorough neuro exam before they come see the patient. Will ask about specific deficits and timing.',
        commonQs:['When was symptom onset?','What\'s the NIH stroke scale?','Any focal deficits?','CT or MRI results?']
    },
    surgery: {
        name:'Dr. Nguyen', title:'Surgery Chief Resident',
        icon:'🔪', color:'#059669', bgColor:'#D1FAE5',
        style:'blunt', personality:'Busy and direct. Wants to know: does this patient need an operation? If yes, when? If no, why are you calling? Not rude, just efficient.',
        commonQs:['Is there peritonitis?','When did symptoms start?','Have they had CT?','Are they hemodynamically stable?']
    },
    gi: {
        name:'Dr. Patel', title:'GI Fellow',
        icon:'🫁', color:'#D97706', bgColor:'#FEF3C7',
        style:'collegial', personality:'Friendly and approachable but thorough. Wants to know if endoscopy is needed and how urgently. Appreciates when you\'ve thought through the GI workup.',
        commonQs:['Any hematemesis or melena?','What\'s the hemoglobin trend?','Are they on anticoagulation?','Have they had a GI bleed before?']
    },
    nephrology: {
        name:'Dr. Santos', title:'Nephrology Attending',
        icon:'🫘', color:'#0891B2', bgColor:'#CFFAFE',
        style:'academic', personality:'Loves to teach. Will ask you about the pathophysiology and make sure you understand the mechanism before making a plan. Speaks deliberately.',
        commonQs:['What\'s the urine output?','Did you check a UA with microscopy?','What\'s the FENa?','Is this AKI or CKD?']
    },
    id: {
        name:'Dr. Washington', title:'Infectious Disease',
        icon:'🦠', color:'#16A34A', bgColor:'#DCFCE7',
        style:'methodical', personality:'Systematic and evidence-based. Will ask about cultures, sensitivities, and antibiotic history. Wants you to narrow, not broaden.',
        commonQs:['What cultures have been sent?','How long on current antibiotics?','Any recent hospitalizations?','What\'s the source?']
    },
    psych: {
        name:'Dr. Rivera', title:'Psychiatry Attending',
        icon:'💭', color:'#EC4899', bgColor:'#FCE7F3',
        style:'empathetic', personality:'Calm and thoughtful. Asks about the whole picture — psychosocial, safety, capacity. Will ask whether medical causes have been ruled out first.',
        commonQs:['Is the patient currently suicidal?','Has medical delirium been ruled out?','Are they willing to engage voluntarily?','What\'s their baseline function?']
    },
    allergy: {
        name:'Dr. Fine', title:'Allergy/Immunology Attending',
        icon:'🧪', color:'#2874A6', bgColor:'#EBF5FB',
        style:'systematic', personality:'Patient and methodical. Wants a detailed drug/reaction history with timeline and symptoms. Will ask about prior allergist evaluations and what testing has been done. Teaching-oriented — will explain the reasoning behind the plan.',
        commonQs:['What exactly happened during the reaction?','How long after drug administration?','Has the patient seen an allergist before?','What alternatives do you need?']
    },
    endocrine: {
        name:'Dr. Blackwell', title:'Endocrinology Fellow',
        icon:'🦋', color:'#7C3AED', bgColor:'#F5F3FF',
        style:'analytical', personality:'Loves numbers and trends. Will ask about lab values, trajectories, and previous A1Cs. Expects you to know the insulin regimen details. Patient but precise.',
        commonQs:['What\'s the anion gap?','What insulin are they on at home?','When was the last A1C?','Is there a precipitant?']
    },
    heme: {
        name:'Dr. Adeyemi', title:'Hematology Attending',
        icon:'🩸', color:'#DC2626', bgColor:'#FEF2F2',
        style:'thorough', personality:'Systematic and evidence-based. Asks about labs in detail, timing, and anticoagulation history. Wants to know your clinical question before the full story.',
        commonQs:['What anticoagulant are they on?','When was the last dose?','Is there active bleeding?','What\'s the platelet count and INR?']
    },
    rheum: {
        name:'Dr. Castellano', title:'Rheumatology Attending',
        icon:'🦴', color:'#D97706', bgColor:'#FFFBEB',
        style:'academic', personality:'Loves pathophysiology. Will ask about serologies, complement levels, and extra-renal manifestations. Teaching-oriented — will walk you through the reasoning.',
        commonQs:['What serologies have you sent?','Any extra-renal manifestations?','What\'s the creatinine trend?','Has the patient had a kidney biopsy?']
    },
    obgyn: {
        name:'Dr. Nakamura', title:'OB/GYN Attending',
        icon:'🤰', color:'#EC4899', bgColor:'#FCE7F3',
        style:'urgent', personality:'Focused on maternal and fetal safety. Wants gestational age, blood pressures, and symptoms immediately. Will ask about fetal status and delivery planning.',
        commonQs:['What\'s the gestational age?','Blood pressure trend?','Any headache, visual changes, or RUQ pain?','Fetal heart rate pattern?']
    },
    palliative: {
        name:'Dr. Worthington', title:'Palliative Medicine',
        icon:'🕊️', color:'#059669', bgColor:'#ECFDF5',
        style:'empathetic', personality:'Calm, unhurried, deeply attentive. Asks about the patient as a person, not just the disease. Wants to understand values, fears, and what matters most.',
        commonQs:['What does the patient understand about their illness?','What matters most to them?','Who is their decision-maker?','What are the family\'s expectations?']
    },
    tox: {
        name:'Dr. Reeves', title:'Toxicology Fellow',
        icon:'☠️', color:'#16A34A', bgColor:'#DCFCE7',
        style:'rapid', personality:'Fast-paced, protocol-driven. Wants the ingestion details immediately: what, when, how much. Expects you to have activated the poison control protocol.',
        commonQs:['What was ingested?','When?','How much?','What\'s the acetaminophen level and the time since ingestion?']
    },
    allergy_derm: {
        name:'Dr. Chandra', title:'A/I Fellow (Derm Rotation)',
        icon:'🧴', color:'#D97706', bgColor:'#FFFBEB',
        style:'methodical', personality:'Focused on morphology and timeline. Wants to know exactly what the rash looks like, when it started relative to the drug, and what systemic features are present. Will teach you the difference between SJS, DRESS, and AGEP.',
        commonQs:['When did the drug start relative to the rash?','Describe the morphology — macules, papules, vesicles, pustules?','Any mucosal involvement?','What are the eosinophils and liver enzymes?']
    },
    allergy_pulm: {
        name:'Dr. Fine', title:'A/I Attending (Asthma Clinic)',
        icon:'🫁', color:'#2874A6', bgColor:'#EBF5FB',
        style:'systematic', personality:'Phenotype-driven. Wants biomarkers before discussing treatment. Will ask about eosinophils, FeNO, IgE, and comorbidities. Teaching-oriented — will walk through biologic selection rationale.',
        commonQs:['What are the eosinophils and FeNO?','How many exacerbations in the past year?','Any nasal polyps or aspirin sensitivity?','Has adherence been verified?']
    },
    allergy_ed: {
        name:'Dr. Khoury', title:'A/I On-Call Fellow',
        icon:'🚨', color:'#DC2626', bgColor:'#FEF2F2',
        style:'rapid', personality:'Urgent and focused. Needs to know immediately: is this mast cell or bradykinin? Urticaria present or absent? What has been given and did it work? Will guide emergency treatment in real time.',
        commonQs:['Is there urticaria?','Did epi help?','Any family history of angioedema?','Is she on an ACE inhibitor?']
    },
    allergy_heme: {
        name:'Dr. Vasquez', title:'A/I Attending (Mast Cell Clinic)',
        icon:'🔬', color:'#7C3AED', bgColor:'#F5F3FF',
        style:'investigative', personality:'Detective-like. Wants every detail of every episode — trigger, timing, symptoms, response to treatment. Will ask about tryptase levels obsessively. Connects clinical patterns to underlying mast cell pathology.',
        commonQs:['What was the baseline tryptase?','Describe each episode in detail — trigger, timeline, symptoms.','Any skin findings between episodes?','Has anyone checked KIT D816V?']
    }
};

// ════════════════════════════════════════════════════════════
// SCENARIOS (per specialty)
// ════════════════════════════════════════════════════════════
const SCENARIOS = {
    cardiology: [
        {
            id:'nstemi-consult', title:'Chest Pain — NSTEMI?',
            meta:'68F, troponin trending up',
            patient:'68-year-old woman with substernal chest pain x 3 hours. Hx of HTN, DM2, former smoker. Troponin 0.28 → 0.52. ECG: ST depressions V4-V6. On heparin drip and aspirin. Hemodynamically stable.',
            idealPresentation:'Organized SBAR: who the patient is, why you\'re consulting (trending troponins with ECG changes), what you\'ve done so far, and what you need (timing of cath, risk stratification).',
            consultQuestion:'Should she go to cath urgently vs. next-day? GRACE/TIMI score implications.',
            exchanges:[
                {consultant:'Hey, I got your page. What do you have for me?', type:'open', hint:'Present your case — who is the patient, what\'s the clinical picture, and what\'s your question?'},
                {consultant:'What\'s the troponin trend? Just one value or serial?', type:'detail', key:'troponin-trend'},
                {consultant:'ECG — can you describe the changes specifically? Which leads?', type:'detail', key:'ecg-findings'},
                {consultant:'Is she having active chest pain right now? Any hemodynamic instability?', type:'urgency', key:'current-status'},
                {consultant:'Sounds like she needs a cath. Has she gotten her loading doses? P2Y12 inhibitor?', type:'management', key:'meds-given'}
            ],
            scoring:{
                organization:'Did you present in a structured format (SBAR or similar)?',
                clinicalData:'Did you include troponin trend, ECG findings, vitals, and risk factors?',
                question:'Did you clearly state what you needed from cardiology?',

function renderSetup() {
    const grid = document.getElementById('specGrid');
    grid.innerHTML = Object.entries(SPECIALISTS).map(([key, s]) => `
        <div class="spec-card" id="spec-${key}" onclick="selectSpec('${key}')">
            <div class="spec-icon">${s.icon}</div>
            <div class="spec-name">${s.name}</div>
            <div class="spec-sub">${s.title}</div>
        </div>
    `).join('');
}

function selectSpec(key) {
    selectedSpec = key;
    selectedCase = null;
    document.querySelectorAll('.spec-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('spec-'+key)?.classList.add('selected');
    renderCases();
    updateStartBtn();
}

function renderCases() {
    const grid = document.getElementById('caseGrid');
    const cases = SCENARIOS[selectedSpec] || [];
    grid.innerHTML = cases.map(c => `
        <div class="case-opt" id="case-${c.id}" onclick="selectCase('${c.id}')">
            <div class="co-title">${c.title}</div>
            <div class="co-meta">${c.meta}</div>
        </div>
    `).join('');
}

function selectCase(id) {
    selectedCase = id;
    document.querySelectorAll('.case-opt').forEach(c => c.classList.remove('selected'));
    document.getElementById('case-'+id)?.classList.add('selected');
    updateStartBtn();
}

function updateStartBtn() {
    document.getElementById('startBtn').disabled = !(selectedSpec && selectedCase);
}

// ════════════════════════════════════════════════════════════
// GAME FLOW
// ════════════════════════════════════════════════════════════
function startConsult() {
    const cases = SCENARIOS[selectedSpec] || [];
    currentScenario = cases.find(c => c.id === selectedCase);
    if (!currentScenario) return;
    exchangeIndex = 0;
    studentResponses = [];

    document.getElementById('setupPanel').style.display = 'none';
    document.getElementById('gameArea').style.display = 'block';

    // Show patient brief
    const spec = SPECIALISTS[selectedSpec];
    document.getElementById('gameArea').innerHTML = `
        <div class="chat-panel" style="margin-bottom:16px;">
            <div style="padding:18px;background:#FFFBEB;border-bottom:1px solid #FDE68A;">
                <div style="font-size:11px;font-weight:700;color:#92400E;text-transform:uppercase;margin-bottom:6px;">📋 Patient Brief — Review Before the Call</div>
                <div style="font-size:13px;line-height:1.6;color:#78350F;">${currentScenario.patient}</div>
                <div style="margin-top:10px;font-size:12px;color:#92400E;font-style:italic;">💡 ${currentScenario.idealPresentation}</div>
            </div>
        </div>
        <button type="button" class="start-btn" onclick="ringPhone()">📱 Call ${spec.title}</button>
    `;
}

function ringPhone() {
    const spec = SPECIALISTS[selectedSpec];
    const overlay = document.createElement('div');
    overlay.className = 'ring-overlay';
    overlay.id = 'ringOverlay';
    overlay.innerHTML = `
        <div class="ring-card">
            <div class="ring-icon">${spec.icon}</div>
            <div class="ring-label">Calling back...</div>
            <div class="ring-name">${spec.name}</div>
            <div class="ring-dept">${spec.title}</div>
            <button type="button" class="answer-btn" onclick="answerCall()">Answer Call</button>
        </div>
    `;
    document.body.appendChild(overlay);
}

function answerCall() {
    document.getElementById('ringOverlay')?.remove();
    const spec = SPECIALISTS[selectedSpec];

    document.getElementById('gameArea').innerHTML = `
        <div class="chat-panel" id="chatPanel">
            <div class="chat-header">
                <div class="chat-avatar" style="background:${spec.bgColor}">${spec.icon}</div>
                <div class="chat-header-info">
                    <div class="ch-name">${spec.name}</div>
                    <div class="ch-dept">${spec.title}</div>
                </div>
                <div class="ch-status status-active">On Call</div>
            </div>
            <div class="chat-body" id="chatBody"></div>
            <div class="resp-area" id="respArea"></div>
        </div>
    `;

    // First consultant message
    setTimeout(() => showConsultantMessage(0), 800);
}

function showConsultantMessage(idx) {
    if (idx >= currentScenario.exchanges.length) {
        endConsult();
        return;
    }
    exchangeIndex = idx;
    const exchange = currentScenario.exchanges[idx];
    const spec = SPECIALISTS[selectedSpec];
    const body = document.getElementById('chatBody');

    // Typing indicator
    body.innerHTML += `<div class="msg consultant" id="typing"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
    body.scrollTop = body.scrollHeight;

    setTimeout(() => {
        document.getElementById('typing')?.remove();
        body.innerHTML += `
            <div class="msg consultant">
                <div class="msg-sender">${spec.name}</div>
                <div class="msg-bubble">${exchange.consultant}</div>
            </div>
        `;
        body.scrollTop = body.scrollHeight;
        showResponseInput(idx);
    }, 1200 + Math.random() * 800);
}

function showResponseInput(idx) {
    const exchange = currentScenario.exchanges[idx];
    const area = document.getElementById('respArea');

    area.innerHTML = `
        <div class="resp-label">${exchange.hint || 'Your response'}</div>
        <div class="free-input-row">
            <textarea class="free-input" id="freeResponse" placeholder="Type your response..." rows="2" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendResponse()}"></textarea>
            <button type="button" id="voiceBtn" title="Click to speak" onclick="VoiceInput.toggle('freeResponse')" style="width:36px;height:36px;min-width:36px;border-radius:50%;border:1.5px solid #E2E8F0;background:#fff;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0"><span id="voiceIcon">🎤</span></button>
            <button type="button" class="send-btn" onclick="sendResponse()">Send</button>
        </div>
        <div id="voiceStatus" class="voice-status" style="display:none;font-size:11px;color:#6B7280;padding:4px 0"></div>
    `;
    document.getElementById('freeResponse')?.focus();
}

function sendResponse() {
    const input = document.getElementById('freeResponse');
    const text = input?.value.trim();
    if (!text) return;

    studentResponses.push({ exchange: exchangeIndex, response: text });

    const body = document.getElementById('chatBody');
    body.innerHTML += `
        <div class="msg student">
            <div class="msg-sender">You</div>
            <div class="msg-bubble">${text}</div>
        </div>
    `;
    body.scrollTop = body.scrollHeight;

    document.getElementById('respArea').innerHTML = '<div style="padding:8px;font-size:12px;color:var(--text-dim);text-align:center;">Waiting for response...</div>';

    setTimeout(() => showConsultantMessage(exchangeIndex + 1), 600);
}

// ════════════════════════════════════════════════════════════
// END & SCORING
// ════════════════════════════════════════════════════════════
function endConsult() {
    const spec = SPECIALISTS[selectedSpec];
    const sc = currentScenario;

    // Update status
    document.querySelector('.ch-status')?.classList.replace('status-active','status-ended');
    if (document.querySelector('.ch-status')) document.querySelector('.ch-status').textContent = 'Call Ended';

    // Score based on response content
    const allText = studentResponses.map(r => r.response).join(' ').toLowerCase();
    const scores = {};
    let total = 0;

    // Organization — did they structure their initial response?
    const firstResp = (studentResponses[0]?.response || '').toLowerCase();
    const hasStructure = firstResp.length > 80 && (firstResp.includes('year') || firstResp.includes('patient') || firstResp.includes('presenting'));
    scores.organization = hasStructure ? 85 : (firstResp.length > 40 ? 60 : 35);

    // Clinical data — did they include key details?
    let dataHits = 0;
    const dataTerms = ['troponin','ecg','vital','bp','heart rate','hr ','temp','wbc','ct ','mri','xray','x-ray','culture','creatinine','potassium','hemoglobin','hgb','lactate','abg'];
    dataTerms.forEach(t => { if (allText.includes(t)) dataHits++; });
    scores.clinicalData = Math.min(100, 30 + dataHits * 12);

    // Clear question — did they ask something specific?
    const hasQuestion = allText.includes('?') || allText.includes('would you recommend') || allText.includes('should we') || allText.includes('do you think') || allText.includes('wondering');
    scores.question = hasQuestion ? 80 : 40;

    // Anticipation — response length and detail in follow-ups
    const followUpResponses = studentResponses.slice(1);
    const avgLen = followUpResponses.length > 0 ? followUpResponses.reduce((s, r) => s + r.response.length, 0) / followUpResponses.length : 0;
    scores.anticipation = avgLen > 60 ? 85 : (avgLen > 30 ? 65 : 40);

    const overall = Math.round((scores.organization + scores.clinicalData + scores.question + scores.anticipation) / 4);
    const color = s => s >= 75 ? 'var(--green)' : s >= 50 ? 'var(--amber)' : 'var(--red)';

    // Disposition
    const dispType = overall >= 70 ? 'accepted' : (overall >= 45 ? 'deferred' : 'redirected');
    const dispText = { accepted:'Consult Accepted ✅', deferred:'Deferred — Call Back with More Info 🔄', redirected:'Needs Improvement ❌' };
    const dispClass = { accepted:'disp-accepted', deferred:'disp-deferred', redirected:'disp-redirected' };

    document.getElementById('respArea').innerHTML = '';
    document.getElementById('gameArea').innerHTML += `
        <div class="disposition ${dispClass[dispType]}">${dispText[dispType]}</div>
        <div class="feedback-card">
            <h3>📊 Consult Performance</h3>
            <div class="fb-row">
                <div class="fb-label">Organization</div>
                <div class="fb-bar"><div class="fb-fill" style="width:${scores.organization}%;background:${color(scores.organization)}"></div></div>
                <div class="fb-val" style="color:${color(scores.organization)}">${scores.organization}%</div>
            </div>
            <div class="fb-row">
                <div class="fb-label">Clinical Data</div>
                <div class="fb-bar"><div class="fb-fill" style="width:${scores.clinicalData}%;background:${color(scores.clinicalData)}"></div></div>
                <div class="fb-val" style="color:${color(scores.clinicalData)}">${scores.clinicalData}%</div>
            </div>
            <div class="fb-row">
                <div class="fb-label">Clear Question</div>
                <div class="fb-bar"><div class="fb-fill" style="width:${scores.question}%;background:${color(scores.question)}"></div></div>
                <div class="fb-val" style="color:${color(scores.question)}">${scores.question}%</div>
            </div>
            <div class="fb-row">
                <div class="fb-label">Anticipation</div>
                <div class="fb-bar"><div class="fb-fill" style="width:${scores.anticipation}%;background:${color(scores.anticipation)}"></div></div>
                <div class="fb-val" style="color:${color(scores.anticipation)}">${scores.anticipation}%</div>
            </div>
            <div class="fb-row" style="padding-top:10px;border-top:1px solid var(--border);margin-top:6px;">
                <div class="fb-label" style="font-weight:700;color:var(--text)">Overall</div>
                <div class="fb-bar"><div class="fb-fill" style="width:${overall}%;background:${color(overall)}"></div></div>
                <div class="fb-val" style="color:${color(overall)};font-size:14px">${overall}%</div>
            </div>

            <div class="fb-text">
                <strong>Scoring Criteria:</strong><br>
                • <strong>Organization:</strong> ${sc.scoring.organization}<br>
                • <strong>Clinical Data:</strong> ${sc.scoring.clinicalData}<br>
                • <strong>Clear Question:</strong> ${sc.scoring.question}<br>
                • <strong>Anticipation:</strong> ${sc.scoring.anticipation}
            </div>

            <div class="fb-text" style="border-top:1px solid var(--border);padding-top:14px;margin-top:14px;">
                <strong>💡 Key Teaching Point:</strong><br>${sc.teaching}
            </div>

            <div class="fb-actions">
                <button type="button" class="fb-btn primary" onclick="resetConsult()">Try Another Consult</button>
                <a href="virtual-emr.html?setting=ed" class="fb-btn secondary" style="text-decoration:none">← Back to Virtual EMR</a>
            </div>
        </div>
    `;
    window.scrollTo({ top: document.body.scrollHeight, behavior:'smooth' });
}

function resetConsult() {
    selectedSpec = null;
    selectedCase = null;
    currentScenario = null;
    exchangeIndex = 0;
    studentResponses = [];
    document.getElementById('setupPanel').style.display = 'block';
    document.getElementById('gameArea').style.display = 'none';
    document.getElementById('gameArea').innerHTML = '';
    document.querySelectorAll('.spec-card,.case-opt').forEach(c => c.classList.remove('selected'));
    document.getElementById('caseGrid').innerHTML = '';
    updateStartBtn();
    window.scrollTo({ top: 0, behavior:'smooth' });
}

// Init
renderSetup();
</script>

<script src="js/rdx-persist.js"></script>

<script src="js/dx-bias-assessment.js"></script>
<script>
// Bias hooks for Consultant Callback
(function() {
  var origSend = window.sendResponse;
  if (origSend) {
    window.sendResponse = function() {
      var input = document.getElementById('freeResponse');
      var text = input ? input.value.trim() : '';
      if (text) {
        BiasAssessment.logExchange('student', text, { stage:'ConsultCallback', specialist: window.selectedSpec || '' });
        BiasAssessment.setContext('Consultant Callback — ' + (window.selectedSpec || 'Specialist') + ' consult');
      }
      origSend.apply(this, arguments);
    };
  }
  // Also log consultant messages
  var origShowConsultant = window.showConsultantMessage;
  if (origShowConsultant) {
    window.showConsultantMessage = function(idx) {
      origShowConsultant.apply(this, arguments);
      // Log the consultant message after it renders
      setTimeout(function() {
        var msgs = document.querySelectorAll('.msg.consultant .msg-bubble');
        if (msgs.length > 0) {
          var lastMsg = msgs[msgs.length - 1];
          BiasAssessment.logExchange('consultant', lastMsg.textContent || '', { characterName: window.selectedSpec || 'Specialist', stage:'ConsultCallback' });
        }
      }, 800);
    };
  }
  // Hide voice if unsupported
  if (typeof VoiceInput !== 'undefined' && !VoiceInput.isSupported()) {
    document.addEventListener('DOMContentLoaded', function() {
      var vb = document.getElementById('voiceBtn');
      if (vb) vb.style.display = 'none';
    });
  }
})();
</script>
